problem: >-
  High-risk root and ascending-aorta patients still move through an emergency workflow designed for open surgery: outside-hospital
  CT scans are reviewed ad hoc, transfers are coordinated by phone, and tertiary centers rebuild anatomy, eligibility, and
  OR-versus-cath-lab decisions from scratch under extreme time pressure. That delay is deadly in a pathology family the cluster
  says can carry mortality up to 65 percent, and it also makes early minimally invasive programs hard to run because potential
  candidates are missed before the right team sees them. The clinical bottleneck is no longer only inventing the device; it is
  converting scattered imaging and referral data into a procedure-ready decision fast enough to matter.
targetUser:
  primary: Structural-heart program director or aortic center operations lead at a U.S. tertiary hospital preparing for investigational transfemoral root or ascending-aorta procedures
  secondary: Cardiac surgery transfer coordinator, cath-lab manager, or on-call imaging specialist handling emergency aortic referrals
  buyer: Service-line VP for cardiovascular care, chief of cardiac surgery, or structural-heart program administrator
startupThesis:
  nonObviousInsight: >-
    As minimally invasive root and ascending-aorta devices move toward first-in-human use, the scarcest asset is not another
    implant design but the workflow that turns a remote CT scan into an accepted transfer, a sized case, and a coordinated
    hybrid-team procedure plan. Most people see a device story; the nearer-term software wedge is the operating layer that lets
    centers safely absorb these cases without relying on heroics from surgeons, imaging physicians, and transfer nurses.
  beachhead: >-
    U.S. tertiary aortic centers and large academic structural-heart programs receiving emergency and urgent ascending-aorta
    referrals from 10 or more spoke hospitals while preparing to evaluate patients for investigational catheter-based root or
    ascending-aorta interventions
  wedge: >-
    A CT-to-cath transfer control plane that ingests outside imaging, structures anatomy and acuity, flags likely minimally
    invasive candidates, assembles a board-ready sizing packet, and routes the case to the correct surgeon, interventionalist,
    and transfer team within minutes
  whyNowCatalyst: >-
    Veritas' financing, transfemoral device design, and push toward first-in-human use show the market is moving from invention
    to execution, which makes patient-selection and transfer orchestration newly urgent infrastructure.
  ventureScalePath: >-
    Start with ascending-aorta candidate triage and transfer, then expand into broader structural-heart case intake, procedure
    planning, hybrid OR scheduling, post-market registry workflows, and eventually the referral and imaging control plane for
    complex cardiovascular interventions across health-system networks.
solution: >-
  The product sits between spoke-hospital imaging, transfer centers, and tertiary aortic programs. It ingests outside CT scans
  and referral packets, standardizes key anatomy and acuity fields, and produces a structured case view showing whether the
  patient looks open-surgery-only, device-trial-eligible, or in need of immediate escalation. For the receiving center, it
  creates a single board-ready packet with imaging snapshots, device-sizing checkpoints, transfer status, and role-specific tasks
  for surgery, interventional cardiology, anesthesia, and cath-lab scheduling. For spoke hospitals, it replaces fax-and-phone
  escalation with a guided submission workflow that reduces back-and-forth and speeds acceptance decisions. The first release is
  sold as a transfer and planning layer for investigational programs, but the long-term asset is a proprietary dataset on
  complex-aortic anatomy, referral patterns, and conversion from diagnosis to intervention.
goToMarketSeed:
  firstCustomer: >-
    An academic medical center or quaternary cardiovascular institute with a dedicated aortic center, active structural-heart
    program, and a high volume of emergency ascending-aorta transfers from community hospitals across a multistate region
  buyingTrigger: >-
    Launch of an investigational minimally invasive aortic program, a partnership with a device company for early cases, or a
    rise in failed and delayed transfers that exposes lost candidates and poor on-call coordination
  currentAlternative: >-
    Phone-and-fax transfer workflows, surgeon-by-surgeon CT review in PACS, manual case boards, open-surgery-first triage, and
    ad hoc support from device reps or internal coordinators
  switchingReason: >-
    This wedge helps centers evaluate and accept the right patients faster without replacing core PACS or EMR systems, while
    giving structural-heart and surgery teams a shared anatomy-to-procedure workflow they do not have today
  pricingHypothesis: >-
    Annual enterprise subscription priced by receiving center and spoke-hospital network size, plus onboarding fees for imaging
    workflow setup and optional per-case modules for advanced planning and registry export
