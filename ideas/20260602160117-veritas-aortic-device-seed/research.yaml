reportMemo:
  executiveTakeaways:
    - The real near-term pain is not device design alone; it is converting a remote CT scan into an accepted, anatomically characterized, board-ready case quickly enough to save the patient and capture the procedure.
    - 'The beachhead is commercially real but narrow: roughly a few hundred U.S. tertiary hubs, not a massive standalone software market, so venture upside depends on expanding from acute aortic intake into broader structural-heart and cardiovascular referral workflows.'
    - Adjacent vendors already cover image exchange, AI alerting, or structural-heart planning, but no incumbent owns the full outside-CT-to-transfer-to-sizing packet workflow for ascending-aorta programs.
    - 'Category timing is the biggest risk: if transcatheter ascending-aorta programs mature slowly, the product must still prove ROI as a high-acuity transfer and planning layer for current surgical and hybrid aortic workflows.'
  marketDefinition: The relevant market is software and workflow infrastructure for tertiary aortic and structural-heart programs that must ingest outside CT data, triage high-acuity referrals, coordinate specialist acceptance, and prepare intervention-ready planning packets. The startup is not competing in generic PACS, generic transfer-center software, or generic radiology AI; it sits at the narrow operating layer where an acute aortic referral becomes a procedure-ready hub case.
  customerAndBuyer: Primary user is the structural-heart program director, aortic center operations lead, or senior coordinator inside a tertiary cardiovascular hub. Secondary users are transfer-center staff, imaging specialists, cardiac surgeons, and interventional cardiologists. The economic buyer is typically the cardiovascular service-line VP, chief of cardiac surgery, or structural-heart administrator who owns referral capture, downstream procedural revenue, and quality metrics.
  buyingTriggers:
    - point: Launching an investigational or minimally invasive ascending-aorta program turns candidate identification and transfer readiness into a board-level operating problem rather than an ad hoc surgeon workflow.
      sourceRefs:
        - 1
        - 2
        - 3
        - 28
        - 29
    - point: ATAAD transfer delays, incomplete handoff packets, and long-distance rerouting materially worsen outcomes, making standardized intake and routing worth paying for at regional hubs.
      sourceRefs:
        - 4
        - 6
        - 7
        - 8
        - 9
        - 10
    - point: Structural-heart programs already live inside standardized CT-planning, registry, and outcomes-reporting environments, so another workflow layer is plausible when it accelerates complex-case capture.
      sourceRefs:
        - 12
        - 13
        - 14
        - 15
        - 19
  willingnessToPay:
    summary: Budget logic is strongest when sold against lost referral capture, duplicated imaging, slower transfer acceptance, and downstream procedural economics. Hospitals already commit meaningful operational spend to structural-heart programs, image sharing, and planning software, so a focused aortic control plane can win if it shows faster accepted cases and fewer missed candidates rather than promising generic AI savings.
    sourceRefs:
      - 13
      - 14
      - 15
      - 18
      - 19
      - 24
  competitiveLandscape: 'Competition comes from four adjacent stacks: AI alerting and care-coordination vendors, vendor-neutral image-exchange infrastructure, structural-heart planning suites, and the entrenched manual substitute of PACS plus phone/fax plus surgeon-by-surgeon judgment. The proposed startup wins only if it stitches those fragments into one aortic-specific operating flow.'
  incumbentThesis:
    - incumbentClass: Image-exchange vendors
      point: They can move CT data and reduce repeat scans, but they do not decide whether the case is minimally invasive, who should be alerted, or what sizing packet is needed next.
      sourceRefs:
        - 24
        - 25
        - 26
    - incumbentClass: AI alerting vendors
      point: Viz.ai and RapidAI prove hospitals buy specialty workflow AI, but their center of gravity is alerting and team communication across broader disease lines, not aortic-specific transfer acceptance and board-ready planning.
      sourceRefs:
        - 16
        - 17
        - 18
    - incumbentClass: Structural-heart planning suites
      point: Planning tools such as 3mensio, TeraRecon, Materialise, Medis, and Circle are strong once a case is already accepted and the CT is in-house, but they do not own spoke-to-hub intake or emergency routing.
      sourceRefs:
        - 19
        - 20
        - 21
        - 22
        - 23
    - incumbentClass: Manual transfer stack
      point: Phone, fax, PACS review, and internal coordinators remain credible because they are familiar and flexible, but the literature shows they also create missing data, multiple handoffs, and unmeasured delay.
      sourceRefs:
        - 4
        - 7
        - 9
        - 24
  regulatoryLandscape: This product can stay outside the highest-regulation zone only if it remains clinician-in-the-loop decision support and orchestration rather than autonomous diagnosis or unsupervised treatment selection. Acute-aortic transfer guidelines and consensus statements already imply high documentation and handoff expectations, while investigational-device programs add protocol sensitivity around who is screened, accepted, and ultimately treated.
  technologyLandscape: 'The enabling stack is already here: DICOM and IHE provide interoperability rails, vendor-neutral image exchange is mature, CT-based structural-heart planning is standardized, and cardiovascular AI platforms already deliver specialty alerts and cloud collaboration. The hard problem is packaging those pieces into one aortic-specific workflow that starts before the patient reaches the hub.'
  distributionChannels:
    - point: Founder-led sales into tertiary aortic and structural-heart chiefs are the primary motion because the wedge is a narrow, high-consequence operational pain.
      sourceRefs:
        - 1
        - 2
        - 3
        - 12
        - 13
    - point: Device innovators, registry-heavy trial sites, and early minimally invasive programs are the best beachhead channels because they feel the candidate-selection bottleneck first.
      sourceRefs:
