  validationPlan:
    - priority: high
      question: How many urgent ascending-aorta referrals per year does one target hub truly process, and how many currently die, divert, or age out before multidisciplinary review?
      evidenceToGather: Twelve months of transfer logs by diagnosis, imaging-receipt timestamp, acceptance decision time, and final treatment disposition at 3 to 5 target hubs.
    - priority: high
      question: Which data elements consistently go missing from outside-hospital CT referrals and cause the longest back-and-forth loops?
      evidenceToGather: Packet completeness audits across spoke hospitals, including missing CT phases, coronary detail, vitals, operative contraindications, and contact information.
    - priority: medium
      question: Will aortic and structural-heart leaders accept a layer-on-top workflow before replacing PACS or transfer-center systems?
      evidenceToGather: Integration-scoping interviews with 3mensio, Sectra, and two large health-system imaging teams, plus pilot procurement feedback from one aortic center.
    - priority: medium
      question: Can the product credibly expand from acute aortic intake into broader structural-heart referral management without losing focus?
      evidenceToGather: Shadow workflows for TAVR, TMVR, and complex arch cases at the same sites, looking for shared packet, routing, and planning tasks.
