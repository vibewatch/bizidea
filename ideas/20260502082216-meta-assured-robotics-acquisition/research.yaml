    - 12
  - point: European deployments may feel the compliance pull earlier because AI Act obligations layer on top of machinery and workplace-safety requirements.
    sourceRefs:
    - 26
    - 27
  sensitivityCases:
  - case: Pure-humanoid-only market
    impact: If the company stays inside only current humanoid warehouse pilots, the realistic near-term TAM compresses sharply because there are still few public production-adjacent programs.
    sourceRefs:
    - 2
    - 6
