modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      TargetAccounts --> DesignPartners
      DesignPartners --> ProductionAccounts
      ProductionAccounts --> Revenue
      Revenue --> DeliveryCOGS
      Revenue --> GrossProfit
      GrossProfit --> Opex
      GrossProfit --> Cash
modelSanity:
  - checkName: Revenue engine
    finding: Base-case revenue is driven by growing from 4 to 15 paying programs while blended ACV rises from design-partner levels toward the researched $160K steady-state account value.
  - checkName: Must go right
    finding: Onboarding has to become template-driven so one solutions-heavy workflow does not permanently cap gross margin below the 70% target.
  - checkName: Model breaks if
    finding: If sales cycles stretch and the company exits Y3 closer to 11 accounts than 15, downside cash remains positive but next-round proof and margin quality both weaken materially.
  - checkName: Next-round proof
    finding: The next financing is justified once the company shows 8-10 paying accounts, multiple design-partner-to-production conversions, sub-5-day time to first benchmark, and one adjacent industrial workflow using the same product.
sanityChecks:
  ruleOf40: "Y3 growth 100.3% + EBITDA margin -6.3% = 94.0%"
  burnMultiple: "Y2 burn multiple ~0.7x using $494.5K EBITDA burn over $692.3K added revenue, improving to ~0.1x on the Y3 exit quarter."
  revenuePerFte: "$202K Y3 on 9.5 average FTE (low end of the $200-400K early SaaS benchmark, reasonable only if the company keeps the services mix contained)."
  flags:
    - The model still exits Y3 below $2.0M of recognized revenue, so venture-scale upside depends on expanding beyond a humanoid-only wedge into adjacent industrial embodied-AI programs.
    - Revenue concentration risk is high because 15 accounts represent a meaningful share of the researched 80-account SAM.
    - Gross-margin improvement depends on benchmark reuse and faster onboarding; if customer data access or integrations stay bespoke, the company trends toward a services-heavy model.
