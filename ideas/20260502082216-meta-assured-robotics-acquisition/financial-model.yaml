assumptions:
  - id: A1
    name: Model start month
    value: "2026-05"
    unit: month
    source: "[BP date 2026-05-02]"
  - id: A2
    name: Starting cash after pre-seed close
    value: "2000"
    unit: USDK
    source: "[BP fundingAsk $2-4M range]; base case uses the low end needed to clear the 12-24 month milestone set plus a 6-month buffer."
  - id: A3
    name: Year-1 paying accounts at end of period
    value: "4"
    unit: accounts
    source: "[BP milestones 0-12 months: sign 3-5 paid design partners]; base case uses 4."
  - id: A4
    name: Year-2 paying accounts at end of period
    value: "9"
    unit: accounts
    source: "[BP milestones 12-24 months: expand to 8-10 paying accounts]; base case uses 9."
  - id: A5
    name: Year-3 paying accounts at end of period
    value: "15"
    unit: accounts
    source: "[BP milestones 24-36 months] and [Research market.som rationale: 15 reachable accounts]."
  - id: A6
    name: Year-1 blended revenue per active account
    value: "12.0"
    unit: USDK per month
    source: "[BP gtm.pricing: $25k-$50k design partner over 6-10 weeks and $60k-$180k annual contracts]; base case uses a blended midpoint during the design-partner-to-production transition."
  - id: A7
    name: Year-2 blended revenue per active account
    value: "12.5"
    unit: USDK per month
    source: "[Research bottomUpSizingDrivers: ~$150k average annual contract value] => ~$12.5k monthly."
  - id: A8
    name: Year-3 blended revenue per active account
    value: "13.3"
    unit: USDK per month
    source: "[Research market.som rationale: ~$160k blended ACV] => ~$13.3k monthly."
  - id: A9
    name: Variable delivery COGS rate
    value: "15% in Y1, 12% in Y2, 10% in Y3"
    unit: percent of revenue
    source: "[BP businessModel.targetGrossMarginPct 70]; startup-finance heuristic assumes adapters and benchmark reuse improve delivery efficiency over time."
  - id: A10
    name: Solutions payroll loaded into COGS
    value: "160"
    unit: USDK annualized per FTE
    source: "[BP team: solutions engineer owns onboarding and release-review workflows]; startup-finance heuristic treats this role as service-delivery cost until onboarding is repeatable."
  - id: A11
    name: Founder/CEO loaded cash compensation
    value: "180"
    unit: USDK annualized per FTE
    source: "Startup-finance heuristic for a pre-seed technical founder taking below-market cash comp."
  - id: A12
    name: Engineering loaded cash compensation
    value: "180"
    unit: USDK annualized per FTE
    source: "Startup-finance heuristic for early robotics / infrastructure engineers, including payroll tax and benefits."
  - id: A13
    name: Sales loaded cash compensation
    value: "170"
    unit: USDK annualized per FTE
    source: "[BP says initial deals are founder-led and technical]; startup-finance heuristic assumes one later AE with modest pre-seed cash plus variable comp."
  - id: A14
    name: G&A loaded cash compensation
    value: "130"
    unit: USDK annualized per FTE
    source: "Startup-finance heuristic for one finance / ops hire plus payroll burden."
  - id: A15
    name: Hiring ramp
    value: "Integrations engineer by Month 3, benchmark / ML engineer by Month 6, solutions engineer by Month 9, first AE in Y2, first ops hire in late Y2, second solutions FTE in early Y3, fifth engineer in late Y3"
    unit: timing
    source: "[BP team roles and startTiming] plus a conservative founder-led GTM heuristic because the buyer set is concentrated."
  - id: A16
    name: Non-payroll R&D tooling spend
    value: "3-4"
    unit: USDK per month
    source: "Startup-finance heuristic for cloud, testing, security, and developer tools for a small infrastructure startup."
  - id: A17
    name: Non-payroll sales and marketing spend
    value: "4-5 in Y1; 7-24 in Y2-Y3"
    unit: USDK per month
    source: "[BP gtm.channels: founder-led outbound, ecosystem referrals, design partners]; startup-finance heuristic assumes travel-heavy enterprise selling but no broad paid demand-gen."
  - id: A18
    name: Non-payroll G&A overhead
    value: "5 in Y1; 4-5 in Y2-Y3 plus one late-Y2 ops hire"
    unit: USDK per month
    source: "Startup-finance heuristic for legal, accounting, insurance, and back-office overhead."
  - id: A19
    name: Steady-state CAC
    value: "75"
    unit: USDK per production customer
    source: "[BP gtm.funnelTargets] and narrow enterprise-sales motion; heuristic assumes technical discovery, travel, founder time, and one solutions-heavy pilot before production conversion."
  - id: A20
    name: Steady-state monthly churn
    value: "2.0"
    unit: percent
    source: "Startup-finance heuristic for early, sticky infrastructure software sold into small but still-evolving enterprise robotics programs."
  - id: A21
    name: Cash conversion assumption
    value: "EBITDA approximates cash movement after funding close"
    unit: policy
    source: "Startup-finance heuristic: no debt, no capex line, and collections/payables are assumed to net out at this stage."
