scenarios:
  downside:
    description: Buyer density stays thin, production conversions slip by 1-2 quarters, and onboarding remains more services-heavy.
    y3RevenueK: 1420.0
    y3EbitdaK: -420.0
    cashLowPointK: 180.0
    keyAssumptionChanges:
      - End-Y2 accounts drop from 9 to 7.
      - End-Y3 accounts drop from 15 to 11.
      - Blended ACV tops out at $150K instead of $160K.
      - Gross margin only reaches 68% because solutions work does not template fast enough.
  base:
    description: Four Y1 design-partner accounts become a 15-account production base by Q4Y3 at roughly $160K blended ACV exit pricing.
    y3RevenueK: 1915.3
    y3EbitdaK: -120.3
    cashLowPointK: 757.7
    keyAssumptionChanges:
      - No change from A3-A21 base assumptions.
  upside:
    description: Adjacent industrial workflows open faster, design partners convert quicker, and expansion modules lift blended ACV.
    y3RevenueK: 2450.0
    y3EbitdaK: 180.0
    cashLowPointK: 820.0
    keyAssumptionChanges:
      - End-Y2 accounts rise from 9 to 10.
      - End-Y3 accounts rise from 15 to 18.
      - Blended ACV reaches $170K with more governance-reporting and overage revenue.
      - Gross margin reaches 75% as onboarding becomes template-first earlier.
