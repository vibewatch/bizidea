    baseCase: "当前精瘦招聘节奏"
    upsideCase: "再多推迟一位非核心岗位，等多拿下两个量产客户后再招"
    y3RevenueImpactK: -60.0
    cashImpactK: -150.0
modelDiagram:
  title: 单位经济流转
  mermaid: |
    flowchart LR
      TargetAccounts[目标账户] --> DesignPartners[付费共创客户]
      DesignPartners --> ProductionAccounts[量产账户]
      ProductionAccounts --> Revenue[收入]
      Revenue --> DeliveryCOGS[交付 COGS]
      Revenue --> GrossProfit[毛利]
      GrossProfit --> Opex[运营费用]
      GrossProfit --> Cash[现金]
modelSanity:
  - checkName: 收入引擎
    finding: 基准情景的收入，是靠付费项目数从 4 增长到 15，同时混合 ACV 从共创阶段逐步走向研究里约 $160K 的稳态账户价值。
  - checkName: 必须顺利的环节
    finding: 客户导入必须尽快转向模板化，否则单一工作流上的解决方案投入会长期压低毛利，过不了 70% 目标线。
  - checkName: 模型会在哪种情况下失灵
    finding: 如果销售周期拉长，到 Y3 结束时账户数更接近 11 而不是 15，下行情景下现金虽然还不至于见底，但下一轮融资所需的证明和毛利质量都会明显变差。
  - checkName: 下一轮融资所需证明
    finding: 只要公司能做到 8-10 个付费账户、多个共创转量产案例、首套基准上线时间低于 5 天，并证明 1 个相邻工业工作流能复用同一产品，下一轮融资就讲得通。
sanityChecks:
  ruleOf40: "Y3 growth 100.3% + EBITDA margin -6.3% = 94.0%"
  burnMultiple: "Y2 burn multiple ~0.7x，按 $494.5K EBITDA burn / $692.3K 新增收入计算；到 Y3 退出季度改善到约 0.1x。"
  revenuePerFte: "Y3 为 $202K / FTE，按平均 9.5 FTE 计算（处于早期 SaaS $200-400K 基准的低位，只有在服务占比被压住的前提下才算合理）。"
  flags:
    - 到 Y3 结束，已确认收入仍低于 $2.0M，所以创投级上行一定依赖从纯人形机器人切口继续扩向相邻工业具身智能项目。
    - 收入集中度风险很高，因为 15 个账户已经占了研究中 80 个 SAM 账户里相当可观的一部分。
    - 毛利改善的前提，是基准复用和更快的客户导入；如果数据获取或集成始终保持定制化，公司会越来越像服务业务。