slug: humanoid-release-gate
date: 2026-05-02
currency: USD
modelStartMonth: 2026-05
assumptions:
  - id: A1
    name: 模型起始月份
    value: "2026-05"
    unit: month
    source: "[BP date 2026-05-02]"
  - id: A2
    name: pre-seed 交割后的期初现金
    value: "2000"
    unit: USDK
    source: "[BP fundingAsk $2-4M range]；基准情形采用实现 12-24 个月里程碑并额外预留 6 个月缓冲所需的低位融资额。"
  - id: A3
    name: 第 1 年期末付费账户数
    value: "4"
    unit: accounts
    source: "[BP milestones 0-12 months: sign 3-5 paid design partners]；基准情形取 4。"
  - id: A4
    name: 第 2 年期末付费账户数
    value: "9"
    unit: accounts
    source: "[BP milestones 12-24 months: expand to 8-10 paying accounts]；基准情形取 9。"
  - id: A5
    name: 第 3 年期末付费账户数
    value: "15"
    unit: accounts
    source: "[BP milestones 24-36 months] 与 [Research market.som rationale: 15 reachable accounts]。"
  - id: A6
    name: 第 1 年单个活跃账户的混合月收入
    value: "12.0"
    unit: USDK per month
    source: "[BP gtm.pricing: $25k-$50k design partner over 6-10 weeks and $60k-$180k annual contracts]；基准情形采用设计伙伴向正式生产过渡期的中位混合值。"
  - id: A7
    name: 第 2 年单个活跃账户的混合月收入
    value: "12.5"
    unit: USDK per month
    source: "[Research bottomUpSizingDrivers: ~$150k average annual contract value] => 约 $12.5k 月收入。"
  - id: A8
    name: 第 3 年单个活跃账户的混合月收入
    value: "13.3"
    unit: USDK per month
    source: "[Research market.som rationale: ~$160k blended ACV] => 约 $13.3k 月收入。"
  - id: A9
    name: 可变交付 COGS 比例
    value: "15% in Y1, 12% in Y2, 10% in Y3"
    unit: percent of revenue
    source: "[BP businessModel.targetGrossMarginPct 70]；创业财务经验假设适配器与基准复用会逐步提高交付效率。"
  - id: A10
    name: 计入 COGS 的解决方案团队年化总薪酬
    value: "160"
    unit: USDK annualized per FTE
    source: "[BP team: solutions engineer owns onboarding and release-review workflows]；创业财务经验假设在 onboarding 可重复之前，这个岗位都应视为交付成本。"
  - id: A11
    name: 创始人/CEO 年化现金总薪酬
    value: "180"
    unit: USDK annualized per FTE
    source: "创业财务经验假设：pre-seed 技术创始人领取低于市场价的现金薪酬。"
  - id: A12
    name: 工程团队年化现金总薪酬
    value: "180"
    unit: USDK annualized per FTE
    source: "创业财务经验假设，适用于早期机器人/基础设施工程师，含工资税与福利。"
  - id: A13
    name: 销售团队年化现金总薪酬
    value: "170"
    unit: USDK annualized per FTE
    source: "[BP says initial deals are founder-led and technical]；创业财务经验假设在后期补一名 AE，现金薪酬较克制，并带少量浮动。"
  - id: A14
    name: G&A 团队年化现金总薪酬
    value: "130"
    unit: USDK annualized per FTE
    source: "创业财务经验假设，适用于一名财务/运营岗位及相应薪税负担。"
  - id: A15
    name: 招聘节奏
    value: "第 3 个月前补集成工程师，第 6 个月前补基准 / ML 工程师，第 9 个月前补解决方案工程师，第 2 年补首位 AE，第 2 年后期补首位运营岗位，第 3 年前期补第二位解决方案 FTE，第 3 年后期补第 5 位工程师"
    unit: timing
    source: "[BP team roles and startTiming]，并叠加了一个保守的创始人主导 GTM 假设，因为买方高度集中。"
  - id: A16
    name: 非薪酬研发工具支出
    value: "3-4"
    unit: USDK per month
    source: "创业财务经验假设，覆盖小型基础设施初创公司的云、测试、安全与开发工具。"
  - id: A17
    name: 非薪酬销售与市场支出
    value: "4-5 in Y1; 7-24 in Y2-Y3"
    unit: USDK per month
    source: "[BP gtm.channels: founder-led outbound, ecosystem referrals, design partners]；创业财务经验假设销售重差旅、轻大规模付费获客。"
  - id: A18
    name: 非薪酬 G&A 开销
    value: "5 in Y1; 4-5 in Y2-Y3 plus one late-Y2 ops hire"
    unit: USDK per month
    source: "创业财务经验假设，覆盖法务、会计、保险与后台运营费用。"
  - id: A19
    name: 稳态 CAC
    value: "75"
    unit: USDK per production customer
    source: "[BP gtm.funnelTargets] 及窄企业销售路径；经验假设包含技术发现、差旅、创始人投入，以及一个解决方案较重的试点后再转生产。"
  - id: A20
    name: 稳态月流失率
    value: "2.0"
    unit: percent
    source: "创业财务经验假设，适用于卖给小而仍在变化中的企业机器人项目、但粘性较强的早期基础设施软件。"
  - id: A21
    name: 现金转换假设
    value: "融资到账后，EBITDA 大体可近似代表现金变动"
    unit: policy
    source: "创业财务经验假设：无债务、无资本开支，且在这个阶段回款与应付大体相互抵消。"
