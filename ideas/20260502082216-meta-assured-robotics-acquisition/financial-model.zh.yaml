slug: humanoid-release-gate
date: 2026-05-02
currency: USD
modelStartMonth: 2026-05
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-05
  unit: 月
  source: '[BP date 2026-05-02]'
- id: A2
  name: pre-seed 完成后的起始现金
  value: '2000'
  unit: USDK
  source: '[BP fundingAsk $2-4M range]；基础情景采用满足 12-24 个月里程碑并额外留出 6 个月缓冲所需的低端金额。'
- id: A3
  name: 第 1 年期末付费账户数
  value: '4'
  unit: 账户
  source: '[BP milestones 0-12 months: sign 3-5 paid design partners]；基础情景采用 4。'
- id: A4
  name: 第 2 年期末付费账户数
  value: '9'
  unit: 账户
  source: '[BP milestones 12-24 months: expand to 8-10 paying accounts]；基础情景采用 9。'
- id: A5
  name: 第 3 年期末付费账户数
  value: '15'
  unit: 账户
  source: '[BP milestones 24-36 months] 与 [Research market.som rationale: 15 reachable accounts]。'
- id: A6
  name: 第 1 年每个活跃账户的混合收入
  value: '12.0'
  unit: 千美元/月
  source: '[BP gtm.pricing: $25k-$50k design partner over 6-10 weeks and $60k-$180k annual contracts]；基础情景采用设计合作伙伴向生产合同过渡期间的混合中位值。'
- id: A7
  name: 第 2 年每个活跃账户的混合收入
  value: '12.5'
  unit: 千美元/月
  source: '[Research bottomUpSizingDrivers: ~$150k average annual contract value] => 月均约 ~$12.5k。'
- id: A8
  name: 第 3 年每个活跃账户的混合收入
  value: '13.3'
  unit: 千美元/月
  source: '[Research market.som rationale: ~$160k blended ACV] => 月均约 ~$13.3k。'
- id: A9
  name: 可变交付 COGS 比率
  value: Y1 为 15%，Y2 为 12%，Y3 为 10%
  unit: 占收入百分比
  source: '[BP businessModel.targetGrossMarginPct 70]；创业财务启发式假设适配器与基准复用会随着时间推移提升交付效率。'
- id: A10
  name: 计入 COGS 的解决方案团队薪酬
  value: '160'
  unit: 每 FTE 年化千美元
  source: '[BP team: solutions engineer owns onboarding and release-review workflows]；创业财务启发式在上线流程实现可重复前，将该角色视为服务交付成本。'
- id: A11
  name: 创始人/CEO 全成本现金薪酬
  value: '180'
  unit: 每 FTE 年化千美元
  source: 创业财务启发式：适用于拿较低市场水平现金薪酬的技术型 pre-seed 创始人。
- id: A12
  name: 工程团队全成本现金薪酬
  value: '180'
  unit: 每 FTE 年化千美元
  source: 创业财务启发式：适用于早期机器人 / 基础设施工程师，已含工资税和福利。
- id: A13
  name: 销售团队全成本现金薪酬
  value: '170'
  unit: 每 FTE 年化千美元
  source: '[BP says initial deals are founder-led and technical]；创业财务启发式假设后续会有 1 名 AE，采用较低的 pre-seed 现金薪酬加浮动激励。'
- id: A14
  name: G&A 全成本现金薪酬
  value: '130'
  unit: 每 FTE 年化千美元
  source: 创业财务启发式：适用于 1 名财务 / 运营招聘及其薪酬附加成本。
- id: A15
  name: 招聘节奏
  value: 第 3 个月招聘集成工程师，第 6 个月招聘基准 / ML 工程师，第 9 个月招聘解决方案工程师，Y2 招首位 AE，Y2 后期招首位运营人员，Y3 前期增配第二位解决方案 FTE，Y3 后期招聘第五位工程师
  unit: 时间安排
  source: '[BP team roles and startTiming]，并结合买方群体高度集中的保守型创始人主导 GTM 启发式。'
- id: A16
  name: 非薪酬研发工具支出
  value: 3-4
  unit: 千美元/月
  source: 创业财务启发式：适用于小型基础设施初创公司的云、测试、安全和开发者工具支出。
- id: A17
  name: 非薪酬销售与市场支出
  value: Y1 为 4-5；Y2-Y3 为 7-24
  unit: 千美元/月
  source: '[BP gtm.channels: founder-led outbound, ecosystem referrals, design partners]；创业财务启发式假设企业销售差旅较重，但不做大范围付费获客。'
- id: A18
  name: 非薪酬 G&A 间接费用
  value: Y1 为 5；Y2-Y3 为 4-5，外加 Y2 后期 1 名运营招聘
  unit: 千美元/月
  source: 创业财务启发式：适用于法务、会计、保险和后台运营间接费用。
- id: A19
  name: 稳态 CAC
  value: '75'
  unit: 每个生产客户的千美元
  source: '[BP gtm.funnelTargets] 与窄范围企业销售动作；启发式假设在转产前需要技术发现、差旅、创始人时间，以及一个解决方案投入较重的试点。'
- id: A20
  name: 稳态月流失率
  value: '2.0'
  unit: 百分比
  source: 创业财务启发式：适用于销售给规模较小但仍在演进中的企业机器人项目的早期高粘性基础设施软件。
- id: A21
  name: 现金转化假设
  value: 融资完成后，以 EBITDA 近似现金变动
  unit: 口径
  source: 创业财务启发式：该阶段假设无债务、无资本开支科目，且应收应付大体相互抵消。
