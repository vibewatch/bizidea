scenarios:
  downside:
    description: 买家密度依旧偏薄，量产转化比预期晚 1-2 个季度，客户导入也更偏服务型。
    y3RevenueK: 1420.0
    y3EbitdaK: -420.0
    cashLowPointK: 180.0
    keyAssumptionChanges:
      - Y2 期末账户数从 9 降到 7。
      - Y3 期末账户数从 15 降到 11。
      - 混合 ACV 封顶在 $150K，而不是 $160K。
      - 由于解决方案工作没能快速模板化，毛利率只能到 68%。
  base:
    description: 第 1 年 4 个付费共创账户，到 Q4Y3 长成 15 个量产账户，退出时混合 ACV 约为 $160K。
    y3RevenueK: 1915.3
    y3EbitdaK: -120.3
    cashLowPointK: 757.7
    keyAssumptionChanges:
      - A3-A21 基准假设不变。
  upside:
    description: 相邻工业工作流打开得更快，共创客户转量产更顺，扩展模块也把混合 ACV 继续抬高。
    y3RevenueK: 2450.0
    y3EbitdaK: 180.0
    cashLowPointK: 820.0
    keyAssumptionChanges:
      - Y2 期末账户数从 9 升到 10。
      - Y3 期末账户数从 15 升到 18。
      - 受治理报告和超额收入拉动，混合 ACV 提升到 $170K。
      - 由于客户导入更早转向模板优先，毛利率能到 75%。
