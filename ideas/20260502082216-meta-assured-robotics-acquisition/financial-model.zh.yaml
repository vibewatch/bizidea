  upsideCase: 将一项非核心招聘延后到再赢得两个生产客户之后
  y3RevenueImpactK: -60.0
  cashImpactK: -150.0
modelDiagram:
  title: 单位经济模型流程
  mermaid: "flowchart LR\n  TargetAccounts[目标账户] --> DesignPartners[设计合作伙伴]\n  DesignPartners --> ProductionAccounts[生产账户]\n  ProductionAccounts --> Revenue[收入]\n  Revenue --> DeliveryCOGS[交付成本]\n  Revenue --> GrossProfit[毛利润]\n  GrossProfit --> Opex[运营支出]\n  GrossProfit --> Cash[现金]\n"
modelSanity:
- checkName: 收入引擎
  finding: 基础情景收入的驱动因素，是付费项目数从 4 增长到 15，同时混合 ACV 从设计合作伙伴水平提升至研究得出的 $160K 稳态账户价值。
- checkName: 必须顺利实现的事项
  finding: 上线必须走向模板驱动，才能避免单个解决方案投入较重的工作流长期将毛利率压在 70% 目标以下。
- checkName: 模型失效条件
  finding: 如果销售周期拉长，公司在 Y3 期末更接近 11 个账户而非 15 个， downside 情景下现金虽仍为正，但下一轮融资证明和利润质量都会明显变弱。
- checkName: 下一轮融资证明
  finding: 当公司展示出 8-10 个付费账户、多个设计合作伙伴转生产的案例、少于 5 天的首个基准形成时间，以及一个使用同一产品的相邻工业工作流时，下一轮融资就具备充分依据。
sanityChecks:
  ruleOf40: Y3 growth 100.3% + EBITDA margin -6.3% = 94.0%
  burnMultiple: Y2 的 burn multiple 约为 ~0.7x，以 $494.5K EBITDA 消耗对应 $692.3K 新增收入计算；到 Y3 退出季度改善至 ~0.1x。
  revenuePerFte: Y3 在平均 9.5 个 FTE 下实现 $202K/FTE（处于早期 SaaS $200-400K 基准的低端，只有在公司把服务占比控制住时才算合理）。
  flags:
  - 模型在 Y3 期末的已确认收入仍低于 $2.0M，因此风投级上行取决于是否能从仅限人形机器人的切入口扩展到相邻工业具身 AI 项目。
  - 收入集中度风险较高，因为 15 个账户已占研究中 80 个 SAM 账户的显著份额。
  - 毛利率改善取决于基准复用和更快上线；如果客户数据访问或集成持续保持定制化，公司将走向重服务模式。
