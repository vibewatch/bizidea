scenarios:
  downside:
    description: 买方密度维持低位，转生产时间比预期晚 1-2 个季度，且 onboarding 仍明显偏服务化。
    y3RevenueK: 1420.0
    y3EbitdaK: -420.0
    cashLowPointK: 180.0
    keyAssumptionChanges:
      - 第 2 年期末账户数从 9 降到 7。
      - 第 3 年期末账户数从 15 降到 11。
      - 混合 ACV 最高只能到 $150K，而不是 $160K。
      - 毛利率只能到 68%，因为解决方案团队的工作没能足够快模板化。
  base:
    description: 第 1 年 4 个设计伙伴账户，到 Q4Y3 长成 15 个生产账户，退出时的混合 ACV 约为 $160K。
    y3RevenueK: 1915.3
    y3EbitdaK: -120.3
    cashLowPointK: 757.7
    keyAssumptionChanges:
      - A3-A21 的基准假设不变。
  upside:
    description: 相邻工业工作流更快打开，设计伙伴转化速度更高，扩展模块也抬升了混合 ACV。
    y3RevenueK: 2450.0
    y3EbitdaK: 180.0
    cashLowPointK: 820.0
    keyAssumptionChanges:
      - 第 2 年期末账户数从 9 提升到 10。
      - 第 3 年期末账户数从 15 提升到 18。
      - 由于治理报告和超额收入更多，混合 ACV 提升到 $170K。
      - 随着 onboarding 更早转向模板优先，毛利率提升到 75%。
