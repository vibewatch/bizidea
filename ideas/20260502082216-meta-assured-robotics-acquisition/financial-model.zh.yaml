    y3RevenueImpactK: -60.0
    cashImpactK: -150.0
modelDiagram:
  title: 单位经济流转图
  mermaid: |
    flowchart LR
      TargetAccounts[目标账户] --> DesignPartners[设计伙伴]
      DesignPartners --> ProductionAccounts[生产账户]
      ProductionAccounts --> Revenue[收入]
      Revenue --> DeliveryCOGS[交付 COGS]
      Revenue --> GrossProfit[毛利润]
      GrossProfit --> Opex[运营费用]
      GrossProfit --> Cash[现金]
modelSanity:
  - checkName: 收入引擎
    finding: 基准情形下，收入来自付费项目从 4 个增长到 15 个，同时混合 ACV 逐步从设计伙伴阶段抬升到研究中约 $160K 的稳态水平。
  - checkName: 必须做对的事
    finding: onboarding 必须转向模板优先，否则只要解决方案团队还得深度介入，毛利率就会长期卡在 70% 目标以下。
  - checkName: 模型何时失效
    finding: 如果销售周期被拉长，而公司到第 3 年末更接近 11 个账户而不是 15 个，虽然 downside 现金仍为正，但下一轮融资证明和利润质量都会明显变差。
  - checkName: 下一轮融资证明
    finding: 当公司拿到 8-10 个付费账户、出现多次设计伙伴转生产、把首个基准时间压到 5 天以内，并证明一个相邻工业工作流也能复用同一产品时，下一轮融资才更站得住脚。
sanityChecks:
  ruleOf40: "Y3 growth 100.3% + EBITDA margin -6.3% = 94.0%"
  burnMultiple: "Y2 burn multiple ~0.7x using $494.5K EBITDA burn over $692.3K added revenue, improving to ~0.1x on the Y3 exit quarter."
  revenuePerFte: "$202K Y3 on 9.5 average FTE（处在早期 SaaS 常见 $200-400K 区间的低端；只有在服务成分被压住时，这个数字才算合理）。"
  flags:
    - 模型到第 3 年末的已确认收入仍低于 $2.0M，因此 venture 级上行空间取决于能否从人形机器人切口扩到相邻工业具身 AI 项目。
    - 收入集中风险很高，因为 15 个账户就已占到研究中 80 个 SAM 账户的显著份额。
    - 毛利率能否改善，取决于基准复用和更快的 onboarding；如果客户数据接入和集成始终保持定制化，公司就会越来越像一家服务型业务。
