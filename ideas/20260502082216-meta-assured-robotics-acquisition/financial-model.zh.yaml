scenarios:
  downside:
    description: 买方密度持续偏低，转产时间推迟 1-2 个季度，且上线流程仍更偏服务化。
    y3RevenueK: 1420.0
    y3EbitdaK: -420.0
    cashLowPointK: 180.0
    keyAssumptionChanges:
    - Y2 期末账户数从 9 降至 7。
    - Y3 期末账户数从 15 降至 11。
    - 混合 ACV 上限为 $150K，而非 $160K。
    - 由于解决方案工作模板化速度不够快，毛利率只能达到 68%。
  base:
    description: 4 个 Y1 设计合作伙伴账户在 Q4Y3 演化为 15 个生产账户，退出时混合 ACV 约为 $160K。
    y3RevenueK: 1915.3
    y3EbitdaK: -120.3
    cashLowPointK: 757.7
    keyAssumptionChanges:
    - 与 A3-A21 基础假设相比无变化。
  upside:
    description: 相邻工业工作流打开更快，设计合作伙伴转化更快，扩展模块抬升了混合 ACV。
    y3RevenueK: 2450.0
    y3EbitdaK: 180.0
    cashLowPointK: 820.0
    keyAssumptionChanges:
    - Y2 期末账户数从 9 升至 10。
    - Y3 期末账户数从 15 升至 18。
    - 随着更多治理报告和超额收入，混合 ACV 达到 $170K。
    - 由于更早实现模板优先的上线方式，毛利率达到 75%。
