slug: humanoid-release-gate
date: 2026-05-02
currency: USD
modelStartMonth: 2026-05
assumptions:
  - id: A1
    name: 模型起始月份
    value: "2026-05"
    unit: month
    source: "[BP date 2026-05-02]"
  - id: A2
    name: pre-seed 交割后的期初现金
    value: "2000"
    unit: USDK
    source: "[BP fundingAsk $2-4M range]；基准情景取能覆盖 12-24 个月里程碑外加 6 个月缓冲的低位。"
  - id: A3
    name: 第 1 年期末付费账户数
    value: "4"
    unit: accounts
    source: "[BP 0-12 个月里程碑：签下 3-5 个付费共创客户]；基准情景取 4。"
  - id: A4
    name: 第 2 年期末付费账户数
    value: "9"
    unit: accounts
    source: "[BP milestones 12-24 months: expand to 8-10 paying accounts]；基准情景取 9。"
  - id: A5
    name: 第 3 年期末付费账户数
    value: "15"
    unit: accounts
    source: "[BP milestones 24-36 months] and [Research market.som rationale: 15 reachable accounts]."
  - id: A6
    name: 第 1 年单个活跃账户月均混合收入
    value: "12.0"
    unit: USDK per month
    source: "[BP gtm.pricing：6-10 周的付费共创项目为 $25k-$50k，年度合同为 $60k-$180k]；基准情景取共创客户向量产合同过渡期的中位混合值。"
  - id: A7
    name: 第 2 年单个活跃账户月均混合收入
    value: "12.5"
    unit: USDK per month
    source: "[Research bottomUpSizingDrivers: ~$150k average annual contract value] => 月均约 $12.5k。"
  - id: A8
    name: 第 3 年单个活跃账户月均混合收入
    value: "13.3"
    unit: USDK per month
    source: "[Research market.som rationale: ~$160k blended ACV] => 月均约 $13.3k。"
  - id: A9
    name: 可变交付 COGS 比例
    value: "Y1 为 15%，Y2 为 12%，Y3 为 10%"
    unit: percent of revenue
    source: "[BP businessModel.targetGrossMarginPct 70]；创业财务假设认为适配器和基准复用会逐年提升交付效率。"
  - id: A10
    name: 计入 COGS 的解决方案团队满载成本
    value: "160"
    unit: USDK annualized per FTE
    source: "[BP team：解决方案工程师负责客户导入与发布评审流程]；在客户导入尚未标准化前，这个岗位按交付成本处理。"
  - id: A11
    name: 创始人/CEO 满载现金薪酬
    value: "180"
    unit: USDK annualized per FTE
    source: "pre-seed 技术型创始人低于市场价领取现金薪酬的创业财务假设。"
  - id: A12
    name: 工程团队满载现金薪酬
    value: "180"
    unit: USDK annualized per FTE
    source: "早期机器人 / 基础设施工程师的创业财务假设，已含薪税和福利。"
  - id: A13
    name: 销售团队满载现金薪酬
    value: "170"
    unit: USDK annualized per FTE
    source: "[BP says initial deals are founder-led and technical]；创业财务假设为后期增加 1 名 AE，现金底薪不高，含少量浮动。"
  - id: A14
    name: G&A 满载现金薪酬
    value: "130"
    unit: USDK annualized per FTE
    source: "1 名财务 / 运营岗位加薪税负担的创业财务假设。"
  - id: A15
    name: 招聘节奏
    value: "Month 3 增加集成工程师，Month 6 增加基准 / ML 工程师，Month 9 增加解决方案工程师，Y2 增加首位 AE，Y2 后段增加首位运营岗位，Y3 前段增加第二位解决方案岗位，Y3 后段增加第五位工程师"
    unit: timing
    source: "[BP team roles and startTiming]，并叠加“早期仍由创始人主导销售”的保守假设，因为买方集中。"
  - id: A16
    name: 非薪酬 R&D 工具支出
    value: "3-4"
    unit: USDK per month
    source: "小型基础设施创业公司在云、测试、安全和开发工具上的创业财务假设。"
  - id: A17
    name: 非薪酬销售与市场支出
    value: "Y1 为 4-5；Y2-Y3 为 7-24"
    unit: USDK per month
    source: "[BP gtm.channels：创始人主导外呼、生态转介绍、共创客户拓展]；创业财务假设认为企业销售差旅偏重，但不做大规模付费获客。"
  - id: A18
    name: 非薪酬 G&A 开销
    value: "Y1 为 5；Y2-Y3 为 4-5，Y2 后段再加 1 名运营岗位"
    unit: USDK per month
    source: "法务、会计、保险和后台支出的创业财务假设。"
  - id: A19
    name: 稳态 CAC
    value: "75"
    unit: 每个量产客户的 USDK
    source: "[BP gtm.funnelTargets] and narrow enterprise-sales motion；假设技术发现、差旅、创始人时间和一轮偏重解决方案的试点共同构成获客成本。"
  - id: A20
    name: 稳态月度流失率
    value: "2.0"
    unit: percent
    source: "面向小而仍在变化的企业机器人项目、但具黏性的早期基础设施软件之创业财务假设。"
  - id: A21
    name: 现金转换假设
    value: "融资完成后，EBITDA 近似现金变动"
    unit: policy
    source: "创业财务假设：无债务、无单独 capex 项，回款和应付款在现阶段近似抵消。"
