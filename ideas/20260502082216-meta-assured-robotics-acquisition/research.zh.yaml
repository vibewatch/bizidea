    - 8
    - 10
    - 28
  - case: 现有可观测性或仿真厂商做捆绑
    impact: 如果 Foxglove、Formant 或 Isaac 加上一层轻量审批能力，创业公司就必须靠工作流深度和基准语料库取胜，而不是表层功能。
    sourceRefs:
    - 18
