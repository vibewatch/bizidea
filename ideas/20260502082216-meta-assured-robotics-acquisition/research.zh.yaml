  - friction: 异构机器人日志、schema 和仿真栈
    severity: 高
    affectedBuyer: 自主平台负责人
    mitigation: 先从 ROS 2 / MCAP / Foxglove 友好的适配器和一个狭窄工作流开始，再逐步扩展覆盖。
    sourceRefs:
    - 24
    - 33
    - 34
  - friction: 证明基准结果的 sim-to-real 相关性
    severity: 高
    affectedBuyer: CTO / 工程副总裁
    mitigation: 将 Isaac 或其他仿真输出与现场日志和遥操作轨迹结合，并把发布报告与站点实际结果绑定。
    sourceRefs:
    - 22
    - 23
    - 35
  - friction: 每次新部署都要通过安全与合规审查
    severity: 中
    affectedBuyer: 验证负责人 / 客户运营赞助人
    mitigation: 让报告映射到现有的风险管理和安全证据预期，而不是发明一套新的合规流程。
    sourceRefs:
    - 25
    - 26
    - 27
  - friction: 内部自建惯性
    severity: 高
    affectedBuyer: 工程副总裁
    mitigation: 证明其基准创建更快、面向客户的发布证据更整洁，优于 ROS bag + 仪表盘工作流。
    sourceRefs:
    - 18
    - 21
    - 24
    - 31
    - 32
