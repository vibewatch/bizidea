    sourceRefs:
    - 4
    - 29
  adoptionFrictionMatrix:
  - friction: 机器人日志、schema 和仿真栈差异太大
    severity: high
    affectedBuyer: 自治平台负责人
    mitigation: 先从 ROS 2 / MCAP / Foxglove 友好的适配器做起，只打一个窄工作流，再慢慢扩覆盖。
    sourceRefs:
    - 24
    - 33
    - 34
  - friction: 很难证明仿真结果真能映射到真实现场
    severity: high
    affectedBuyer: CTO / VP Engineering
    mitigation: 把 Isaac 或其他仿真输出和现场日志、遥操作轨迹混在一起看，再把发布报告直接连到站点结果上。
    sourceRefs:
    - 22
    - 23
    - 35
  - friction: 每次新部署都要重新过安全与合规评审
    severity: medium
    affectedBuyer: 验证负责人 / 客户运营发起人
    mitigation: 把报告对齐到现有风险管理和安全证据要求，不要再发明一套新的合规流程。
    sourceRefs:
    - 25
    - 26
    - 27
  - friction: 团队习惯继续内部自研
    severity: high
    affectedBuyer: VP Engineering
    mitigation: 证明自己比“ROS bag + 看板”工作流更快搭出基准，也能更干净地生成面向客户的发布证据。
    sourceRefs:
    - 18
    - 21
    - 24
    - 31
    - 32
market:
  tam:
    value: $45.0M
    rationale: 自下而上的估算是：全球大约 300 个工业具身智能项目，落在仓储/制造相邻工作流里，每个项目每年约有 $150k 的发布验证支出，总计约 $45.0M；横向校验后，这仍只是 $10.5B 的 2028 年仓储机器人市场和更大人形机器人预测市场里的一小块软件切片。
    isEstimate: true
    sourceRefs:
    - 18
    - 20
    - 29
    - 30
  sam:
    value: $12.0M
    rationale: 可服务市场假设北美和欧洲约有 80 个项目，已经有活跃试点或临近商业化，落在仓储/制造工作流里，每个项目年支出约 $150k。
    isEstimate: true
    sourceRefs:
    - 2
    - 6
    - 8
    - 10
    - 12
    - 29
  som:
    value: $2.4M
    rationale: 第 3 年可触达份额假设能拿下 15 个从共创客户转成参考客户的账户，混合 ACV 约 $160k，包含实施与超额收入。
    isEstimate: true
    sourceRefs:
    - 2
    - 6
    - 10
    - 18
    - 20
bottomUpSizingDrivers:
- driver: 总可覆盖单位数
  value: 约 300 个全球工业具身智能项目，集中在仓储/制造相邻工作流
  source: calc from [2][6][8][10][12][14][15][16][17][29][30]
- driver: 平均年度合同价值
  value: 约 $150k / 项目
  source: calc from adjacent pricing proxies [18][20][31]
- driver: 初始可服务单位数
  value: 约 80 个北美/欧洲项目，已在跑试点或接近商业化
  source: calc from [2][6][8][10][12][29]
categoryDynamics:
  growthRate: 11.4%-39.2% CAGR across adjacent warehouse robotics and humanoid market reports
  growthRateSourceRefs:
  - 29
  - 30
  tailwinds:
  - point: 资本还在持续流向人形机器人和机器人基础模型公司，软件预算和紧迫感因此都能维持。
    sourceRefs:
    - 14
    - 15
    - 16
    - 17
  - point: BMW、Mercedes、GXO 以及集成商牵头的仓储试点都已出现公开商业里程碑，说明这个品类正从实验室演示走向接近量产的环境。
    sourceRefs:
    - 2
    - 6
    - 8
    - 10
    - 11
  - point: 底层仓储机器人采用率本身就在提升，随着时间推移，可靠性和上线工具的价值也会更高。
    sourceRefs:
    - 29
  headwinds:
  - point: 人形机器人的 ROI 仍有争议，一些行业媒体还在怀疑这些机器人今天到底适合哪些场景。
    sourceRefs:
    - 4
    - 5
  - point: 安全、文档和集成负担会拖慢部署，也会让软件采购往后推，哪怕技术兴趣很高。
    sourceRefs:
    - 25
    - 26
    - 27
  - point: 现有可观测性、仿真和内部工具已经能覆盖工作流的一大部分，买方可能会继续拖着不买点状方案。
    sourceRefs:
    - 18
    - 21
    - 22
    - 24
    - 31
    - 32
competitors:
- name: Foxglove
  stage: scale-up
  wedge: 面向日志、MCAP 和机群数据的机器人可视化、数据平台与协作。
  pricing: Pro 起价为 $20/月，另加 $42/用户/月 和 $45/设备/月；企业版定制报价。
  strength: 机器人原生 UX 很深，在 ROS / MCAP 生态里根扎得很稳。
  weaknessVsUs: 它并不把自己定位成客户任务级发布审批的系统记录。
  sourceRefs:
  - 18
  - 19
  - 33
  - 34
- name: Formant
  stage: scale-up
  wedge: 机群可观测性、遥操作和机器人运营工作流软件。
  pricing: 定制报价 / 演示驱动的企业销售。
  strength: 很适合量产机群监控和远程运营。
  weaknessVsUs: 更偏运营，不是把客户任务级上线决策和发布闸门绑在一起的前置基准层。
  sourceRefs:
  - 20
  - 21
- name: NVIDIA Isaac Sim
  stage: incumbent
  wedge: 基于物理的机器人仿真、合成数据和开发平台。
  pricing: 隶属于 NVIDIA 机器人生态；并不强调单独的审批工作流定价。
  strength: 类目标准级的仿真能力和开发者心智。
  weaknessVsUs: 仿真只是输入之一；它并不掌握跨客户站点的真实任务血缘，也不负责最后签字放行。
  sourceRefs:
  - 22
  - 23
  - 35
- name: Weights & Biases / MLflow
  stage: incumbent
  wedge: 面向 AI 团队的通用实验跟踪与模型评估。
  pricing: W&B Pro 起价 $60/月；MLflow 开源或随平台分发。
  strength: AI 基础设施团队都很熟，记录实验和评估模型都顺手。
  weaknessVsUs: 缺少机器人任务语义、遥操作上下文，以及面向运营发布审批的工作流。
  sourceRefs:
  - 31
  - 32
- name: Open-source ROS2 + internal scripts
  stage: substitute
  wedge: 团队内部自建的回放、看板、notebook 和仿真测试。
  pricing: 开源软件，加内部工程时间。
  strength: 灵活，而且早期团队马上就能用。
  weaknessVsUs: 很难跨客户扩展，可审计性弱，也积不出会越滚越厚的基准语料库。
  sourceRefs:
  - 24
  - 34
regulatoryTechnicalConstraints:
- point: 工作场所部署依然要服从机械与机器人安全要求，所以任何发布工件都得嵌进现有 OSHA 风格的安全审查，而不是绕开它。
  sourceRefs:
  - 26
- point: AI 治理要求越来越偏向有文档的风险管理流程和可追溯证据，尤其对企业买家和受监管地区更是如此。
  sourceRefs:
  - 25
  - 27
- point: 仿真和真实世界之间的落差依然很大；如果产品只给仿真跑分，客户不会拿它来做部署决策。
  sourceRefs:
  - 22
  - 23
  - 35
- point: 遥测标准化并不轻松，因为团队往往同时横跨 ROS bag、Foxglove、Formant 和自定义流水线。
  sourceRefs:
  - 21
  - 24
  - 33
  - 34
validationSignals:
- point: Meta 收购 Assured Robot Intelligence，并把团队并入 Superintelligence Labs，说明机器人专用软件人才已经拿到真实战略预算。
  sourceRefs:
  - 1
- point: Accenture、Vodafone Procure & Connect 和 SAP 公开在人形机器人仓储运营里做试点，说明企业出资的工作流实验已经开始。
  sourceRefs:
  - 2
  - 3
- point: Figure 声称已在 BMW 的生产中做出贡献，Agility 也表示 Digit 在 GXO 的商业部署中搬运了 100,000 个 tote，说明市场已经过了纯演示阶段。
  sourceRefs:
  - 6
  - 10
  - 11
- point: Apptronik、1X、Skild AI 和 Physical Intelligence 都拿到了大额融资，说明投资人依旧相信具身智能商业化会继续往前走。
  sourceRefs:
  - 14
  - 15
  - 16
  - 17
- point: Figure 推出 Helix 这类偏 VLA 的控制模型，说明模型发布节奏和评估复杂度都在上升。
  sourceRefs:
  - 7
- point: Figure 的招聘信息和相邻生态文档都表明，围绕具身智能部署基础设施的招聘和工具建设仍在继续。
  sourceRefs:
  - 7
  - 24
  - 35
openQuestions:
- 现在到底有多少人形机器人或相邻具身智能 OEM，部署节奏已经快到今天就需要专门的发布闸门，而不是等 12-24 个月后再说？
- 在他们先标准化更广泛的机群运营或可观测性平台之前，买方会不会接受一个点状方案？
- OEM 和终端客户愿意给出多大范围的数据使用权，允许复用遥操作轨迹、仓库视频和事故日志？
- 哪个首个工作流最容易长出可重复的基准库：tote moving、trailer unloading、case picking，还是 pallet-side handling？
