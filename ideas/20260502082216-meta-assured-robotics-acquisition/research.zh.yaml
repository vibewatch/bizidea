  - point: 欧洲的合规牵引可能会来得更早，因为 AI Act 的义务会叠加在机械与工作场所安全要求之上。
    sourceRefs:
    - 26
    - 27
  sensitivityCases:
  - case: 只做人形机器人市场
    impact: 如果公司只盯着当前的人形机器人仓储试点，近期可实现 TAM 会被明显压缩，因为公开的生产前后项目仍然不多。
    sourceRefs:
