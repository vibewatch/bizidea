  - 17
- point: Figure 推出了 Helix——一个偏 VLA 的控制模型——进一步说明模型发布节奏和评估复杂度都在上升。
  sourceRefs:
  - 7
- point: Figure 的招聘信息和相邻生态文档表明，围绕具身 AI 部署基础设施的人员建设和工具建设仍在继续。
  sourceRefs:
  - 7
  - 24
  - 35
openQuestions:
- 目前有多少人形机器人或相邻具身 AI OEM 拥有足够的部署节奏，因而现在就需要专门的发布闸门，而不是等到 12-24 个月后？
- 在标准化更广泛的车队运营或可观测性平台之前，买方会接受一个点状方案吗？
- OEM 和终端客户究竟能为遥操作轨迹、仓库视频和事故日志授予怎样的数据权利，以支持基准复用？
- 哪个首个工作流最能快速形成可重复的基准库：料箱搬运、拖车卸货、拣箱，还是托盘侧处理？
