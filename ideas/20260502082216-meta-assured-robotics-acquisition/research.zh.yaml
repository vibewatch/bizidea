    point: OSHA、NIST 和欧盟 AI Act 的要求会抬高留档与安全负担，这会在提高可追溯性价值的同时，也让部署速度变慢。
    sourceRefs:
    - 25
    - 26
    - 27
  - factor: 环境
    impact: neutral
    point: 对这一软件切口来说，环境因素只是次要影响项；不过仓储能耗和硬件利用率 ROI 仍会影响部署节奏。
    sourceRefs:
    - 4
    - 29
  adoptionFrictionMatrix:
  - friction: 机器人日志、schema 与仿真栈高度异构
    severity: high
    affectedBuyer: 自主平台负责人
    mitigation: 先从 ROS 2 / MCAP / Foxglove 友好的适配器和一个很窄的工作流起步，再逐步放宽支持范围。
    sourceRefs:
    - 24
    - 33
    - 34
  - friction: 很难证明基准结果具备 sim-to-real 相关性
    severity: high
    affectedBuyer: CTO / VP Engineering
    mitigation: 把 Isaac 或其他仿真输出，与现场日志和遥操作轨迹混在一起看，再把发布报告直接绑到实际站点结果上。
    sourceRefs:
    - 22
    - 23
    - 35
  - friction: 每次新部署都要经过安全与合规审查
    severity: medium
    affectedBuyer: 验证负责人 / 客户运营赞助人
    mitigation: 让报告去对齐现有风险管理和安全证据预期，而不是硬造一套全新的合规流程。
    sourceRefs:
    - 25
    - 26
    - 27
  - friction: 内部自建惯性
    severity: high
    affectedBuyer: VP Engineering
    mitigation: 要证明自己比“ROS bag + 仪表盘”的拼装流程更快产出基准、更干净地面向客户交付发布证据。
    sourceRefs:
    - 18
    - 21
    - 24
    - 31
    - 32
market:
  tam:
    value: $45.0M
    rationale: '自下而上估算：全球大约 300 个活跃在仓储 / 制造相邻工作流中的工业具身 AI 项目 × 每个项目约 $150k 的年化发布验证支出 = 约 $45.0M；横向交叉验证后，它仍只是 $10.5B 的 2028 年仓储机器人市场和更广义人形机器人预测中的一小条软件细分。'
    isEstimate: true
    sourceRefs:
    - 18
