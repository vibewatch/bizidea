    - 22
    - 23
    - 24
    - 33
    - 34
    - 35
  - point: Accenture、GXO、BMW、Mercedes 这类系统集成商和企业共创客户，一旦把产品框定成“降低上线风险”而不是通用 AI 工具，就能变成转介绍入口。
    sourceRefs:
    - 2
    - 3
    - 8
    - 10
    - 12
  partnershipEcosystem:
  - point: 仿真和遥测伙伴很关键，因为产品必须叠在 ROS bag、可观测性流和仿真输出之上，而不是把它们替掉。
    sourceRefs:
    - 18
    - 21
    - 22
