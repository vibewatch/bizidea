  validationPlan:
  - priority: high
    question: 现在到底有多少目标 OEM 会把每周或双周一次的模型/控制器更新发到真实工业试点里？
    evidenceToGather: 访谈 10 位自治负责人，结合招聘信息、发布节奏线索和试点扩张时间表交叉验证。
  - priority: high
    question: 在客户买更完整的机群运营平台之前，他们愿不愿意先为一个点状解决方案付钱？
    evidenceToGather: 拿已经在用 Foxglove、Formant 或内部栈的团队做试点方案测试，对比采购摩擦和预算归属。
  - priority: medium
    question: 针对仓库视频、遥操作轨迹和日志，客户到底愿意给到多大范围的数据使用权，允许基准复用？
    evidenceToGather: 和两家 OEM、一个企业部署合作方做安全 / 采购评审。
  - priority: medium
    question: 哪个首个工作流能最快长出可复用的基准库：tote moving、case picking、trailer unloading，还是 pallet-side handling？
    evidenceToGather: 和共创客户做范围界定，并对每个工作流各做一次基准构建工时研究。
