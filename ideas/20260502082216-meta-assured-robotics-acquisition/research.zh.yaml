  validationPlan:
  - priority: high
    question: 现在到底有多少目标 OEM，真的会把模型 / 控制器更新以周更或双周更的节奏发到活跃工业试点里？
    evidenceToGather: 访谈 10 位自主负责人，并结合招聘信息、发版节奏痕迹和试点扩张时间线交叉验证。
  - priority: high
    question: 在买更宽的车队运营平台之前，买方会不会先为一个点状方案买单？
    evidenceToGather: 向已经在用 Foxglove、Formant 或内部栈的团队测试试点提案，对比购买阻力与实际 owner。
  - priority: medium
    question: 客户能授予多大范围的数据权限，让仓储视频、遥操作轨迹与日志可以被复用为基准？
    evidenceToGather: 与 2 家 OEM 和 1 家企业部署伙伴做安全 / 采购审查。
  - priority: medium
    question: '第一个最容易长出可复用基准库的工作流，到底是料箱搬运、件拣选、拖车卸货，还是托盘侧处理？'
    evidenceToGather: 与设计伙伴一起做需求界定，并对每个工作流各做一次基准构建耗时研究。
