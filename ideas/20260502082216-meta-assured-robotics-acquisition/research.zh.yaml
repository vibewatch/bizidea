    - 13
  dataMoats:
  - point: 真正有防守力的资产，是跨多个机器人项目和站点收集到的客户任务级基准语料、失效特征和发布结果。
    sourceRefs:
    - 6
    - 10
    - 11
  - point: 跨 ROS、Foxglove、Formant 和 Isaac 的适配器与标准化 schema，能带来切换成本；但更强的护城河，还是和上线决策绑在一起的基准血缘。
    sourceRefs:
