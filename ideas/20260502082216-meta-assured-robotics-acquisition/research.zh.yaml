  growthRate: 相邻仓储机器人和人形机器人市场报告给出的 CAGR 为 11.4%-39.2%
  growthRateSourceRefs:
  - 29
  - 30
  tailwinds:
  - point: 资本继续流向人形机器人和机器人基础模型公司，保持了软件预算和市场紧迫性。
    sourceRefs:
    - 14
    - 15
    - 16
    - 17
  - point: BMW、Mercedes、GXO 以及集成商主导的仓储试点等公开商业里程碑，表明该品类正从实验室演示走向接近生产的环境。
    sourceRefs:
