    - 12
    - 13
  dataMoats:
  - point: 最有防御性的资产，是横跨多个机器人项目和站点沉淀下来的客户专属任务基准语料库、失败特征以及发布结果。
    sourceRefs:
    - 6
    - 10
    - 11
  - point: 跨 ROS、Foxglove、Formant 和 Isaac 的适配器与标准 schema 能形成一定切换成本，但更强的护城河，还是与 rollout 决策绑定的基准血缘。
    sourceRefs:
    - 21
    - 23
    - 24
    - 33
    - 34
    - 35
  geographicConsiderations:
  - point: 北美和欧洲最适合率先落地，因为公开部署已经覆盖美国物流、德国仓储试点、BMW 制造和 Mercedes 工业项目。
    sourceRefs:
    - 2
