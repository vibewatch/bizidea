    - 23
    - 24
    - 33
    - 34
    - 35
  - point: 当产品被定义成“降低 rollout 风险”，而不是“另一个 AI 工具”后，系统集成商和企业设计伙伴，比如 Accenture、GXO、BMW 和 Mercedes，也能成为转介绍路径。
    sourceRefs:
    - 2
    - 3
    - 8
    - 10
    - 12
  partnershipEcosystem:
  - point: 仿真和遥测合作伙伴很关键，因为产品必须叠在 ROS bag、可观测性流和仿真输出之上，而不是替代它们。
    sourceRefs:
