    isEstimate: true
    sourceRefs:
    - 2
    - 6
    - 10
    - 18
    - 20
bottomUpSizingDrivers:
- driver: 总可触达单位数
  value: ~300 个全球工业具身 AI 项目，分布在仓储 / 制造相邻工作流中
  source: calc from [2][6][8][10][12][14][15][16][17][29][30]
- driver: 平均年合同额
  value: 每个项目约 ~$150k
  source: calc from adjacent pricing proxies [18][20][31]
- driver: 初始可服务单位数
  value: 北美和欧洲约 ~80 个正在跑试点或即将商业化的项目
  source: calc from [2][6][8][10][12][29]
categoryDynamics:
  growthRate: 相邻仓储机器人与人形机器人市场报告给出的 CAGR 为 11.4%-39.2%
  growthRateSourceRefs:
  - 29
  - 30
  tailwinds:
  - point: 资本仍在持续流向人形机器人和机器人基础模型公司，因此软件预算与项目紧迫性都还在。
    sourceRefs:
    - 14
    - 15
    - 16
    - 17
  - point: BMW、Mercedes、GXO 以及由集成商主导的仓储试点，都已经拿出公开商业化里程碑，说明赛道正从实验室演示走向接近生产的环境。
    sourceRefs:
    - 2
    - 6
    - 8
    - 10
    - 11
  - point: 仓储机器人底层采用率还在持续扩大，这会让可靠性和 rollout 工具的价值逐年上升。
    sourceRefs:
    - 29
  headwinds:
  - point: 人形机器人的 ROI 仍有争议，一些行业媒体对它今天到底在哪些场景真有用，依旧保持怀疑。
    sourceRefs:
    - 4
    - 5
  - point: 安全、留档和集成负担都可能拖慢部署，也会让软件采购节奏晚于技术兴趣。
    sourceRefs:
    - 25
    - 26
    - 27
  - point: 现有可观测性、仿真和内部工具已经覆盖了工作流的一大部分，买方完全可能继续拖延购买点状方案。
    sourceRefs:
    - 18
    - 21
    - 22
    - 24
    - 31
    - 32
competitors:
- name: Foxglove
  stage: scale-up
  wedge: 面向日志、MCAP 和车队数据的机器人可视化、数据平台与协作工具。
  pricing: Pro 起价为 $20/month，另加 $42/user/month 和 $45/device/month；企业版单独报价。
  strength: 机器人原生 UX 很深，且在 ROS / MCAP 生态里的位置很强。
  weaknessVsUs: 它并没有被定义成客户任务发布审批的系统记录层。
  sourceRefs:
  - 18
  - 19
  - 33
  - 34
- name: Formant
  stage: scale-up
  wedge: 面向车队可观测性、遥操作和机器人运营工作流的软件。
  pricing: 定制报价 / demo-led 企业定价。
  strength: 在生产车队监控和远程运营场景里很强。
  weaknessVsUs: 更偏运营，而不是在客户专属 rollout 决策前做基准闸门。
  sourceRefs:
  - 20
  - 21
- name: NVIDIA Isaac Sim
  stage: incumbent
  wedge: 基于物理的机器人仿真、合成数据与开发平台。
  pricing: 属于 NVIDIA 机器人生态的一部分；并未重点强调独立、透明的审批工作流定价。
  strength: 类目标准级仿真工具，且开发者心智极强。
  weaknessVsUs: 仿真只是输入之一；它并不掌握跨客户站点的真实任务血缘和发布签核。
  sourceRefs:
  - 22
  - 23
  - 35
- name: Weights & Biases / MLflow
  stage: incumbent
  wedge: 面向 AI 团队的通用实验追踪与模型评估工具。
  pricing: W&B Pro 起价 $60/month；MLflow 为开源 / 平台分发模式。
  strength: AI 团队对这类实验日志和评估基础设施非常熟悉。
  weaknessVsUs: 缺少机器人任务语义、遥操作上下文，以及面向运营放行的审批工作流。
  sourceRefs:
  - 31
  - 32
- name: Open-source ROS2 + internal scripts
  stage: substitute
  wedge: 团队内部自建的回放、仪表盘、notebook 与仿真测试组合。
  pricing: 开源软件外加内部工程时间。
  strength: 灵活，而且早期团队立刻就能开用。
  weaknessVsUs: 很难跨客户扩张，可审计性弱，也沉淀不出会越滚越厚的基准语料库。
  sourceRefs:
  - 24
  - 34
regulatoryTechnicalConstraints:
- point: 工作场所部署仍然受制于机械与机器人安全预期，因此任何发布产物都必须嵌进现有 OSHA 风格的安全审查，而不是绕开它。
  sourceRefs:
  - 26
- point: AI 治理预期越来越强调成体系的风险管理流程和可追溯证据，尤其是在企业买方和受监管地区。
  sourceRefs:
  - 25
  - 27
- point: 仿真与现实之间的差距依然明显；如果产品只给仿真结果打分，客户不会放心拿它来做部署决策。
  sourceRefs:
  - 22
  - 23
  - 35
- point: 遥测标准化本身就不简单，因为团队往往同时横跨 ROS bag、Foxglove、Formant 和自定义数据管道。
  sourceRefs:
  - 21
  - 24
  - 33
  - 34
validationSignals:
- point: Meta 收购了 Assured Robot Intelligence，并把团队并入 Superintelligence Labs，这说明机器人专用软件人才已经对应到真实的战略支出。
  sourceRefs:
  - 1
- point: Accenture、Vodafone Procure & Connect 与 SAP 公开在仓储场景试点人形机器人，说明企业赞助的工作流实验已经开始。
  sourceRefs:
  - 2
  - 3
- point: Figure 声称其机器人已对 BMW 的生产作出贡献，而 Agility 表示 Digit 在 GXO 的商业部署里已搬运 100,000 个料箱，这都说明市场已走出纯演示阶段。
  sourceRefs:
  - 6
  - 10
  - 11
- point: Apptronik、1X、Skild AI 和 Physical Intelligence 都拿到了大额融资，再次证明投资人仍相信具身 AI 的商业化路径。
  sourceRefs:
  - 14
  - 15
  - 16
  - 17
- point: Figure 推出了 Helix 这类面向 VLA 的控制模型，说明模型发布节奏和评估复杂度都在继续上升。
  sourceRefs:
  - 7
- point: Figure 的招聘信息和相邻生态文件都说明，围绕具身 AI 部署基础设施的招聘和工具建设仍在持续。
  sourceRefs:
  - 7
  - 24
  - 35
openQuestions:
- 现在到底有多少人形机器人或相邻具身 AI OEM，已经具备足够的部署节奏，需要立即采购一套专门的发布闸门，而不是等到 12-24 个月后？
- 在更宽的车队运营或可观测性平台标准化之前，买方会先接受一个点状方案吗？
- OEM 和终端客户能给出多大范围的数据权限，让遥操作轨迹、仓库视频和事故日志被复用成基准？
- '哪个首个工作流最容易长出可重复的基准库：料箱搬运、拖车卸货、件拣选，还是托盘侧处理？'
