  validationPlan:
  - priority: 高
    question: 今天究竟有多少目标 OEM 会把每周或每两周的模型/控制器更新发布到真实工业试点中？
    evidenceToGather: 与自主系统负责人进行 10 次访谈，并收集招聘信息、发布节奏工件和试点扩展时间线。
  - priority: 高
    question: 买方会在购买更广泛的车队运营平台之前，为一个点状方案付费吗？
    evidenceToGather: 对已使用 Foxglove、Formant 或内部栈的团队测试试点提案；比较购买摩擦和预期 owner。
  - priority: 中
    question: 客户对仓库视频、遥操作轨迹和日志，究竟能授予怎样的数据权利以支持基准复用？
    evidenceToGather: 与两家 OEM 和一家企业部署伙伴进行安全 / 采购审查。
  - priority: 中
    question: 哪个首个工作流能最快产出可复用的基准库：料箱搬运、拣箱、拖车卸货，还是托盘侧处理？
    evidenceToGather: 进行设计合作伙伴范围界定，并对每个工作流做一次基准构建时间研究。
