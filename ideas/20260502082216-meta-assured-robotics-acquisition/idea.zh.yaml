      Pain --> Product[任务级发布闸门]
      Product --> Outcome[带着证据更快扩试点]
businessModelCanvas:
  customerSegments: [人形机器人 OEM, 销售仓储试点方案的具身智能创业公司]
  valuePropositions: [部署前提前拦住任务回归, 缩短试点扩站周期, 产出可审计的可靠性证据]
  channels: [创始人主导销售, 机器人试点集成商转介绍, 具身智能生态合作]
  customerRelationships: [高触达导入, 联合设计基准, 技术成功管理]
  revenueStreams: [年度 SaaS 合同, 按量计费的仿真与回归运行, 高级可靠性报告]
  keyResources: [基准语料库, 机器人遥测适配器, 发布分析软件]
  keyActivities: [接入试点数据, 运行回归测试, 扩充基准库]
  keyPartners: [仿真厂商, 机器人集成商, 仓储试点运营方]
  costStructure: [工程人才, 回归运行算力, 客户导入与支持]
jobsToBeDone:
  - job: 当一个人形机器人试点准备扩到新的仓库站点时，帮自治负责人证明最新模型仍能完成核心任务，这样他们就能更有把握地批准部署。
    currentAlternative: 人工仿真检查，加上少量真机测试
    successMetric: 发布审批时间缩短，发版后的任务失败率下降
  - job: 当硬件或策略更新落地时，帮验证负责人找出哪些客户工作流退化了，这样他们就能在企业客户评审前拦住高风险版本。
    currentAlternative: 零散脚本和基于电子表格的 QA
    successMetric: 在现场部署前被抓出来的回归问题数量
ideaScorecard:
  signalStrength:
    score: 4
    rationale: 多个已验证来源都显示，Meta 收购了一支人形机器人软件团队，并把它放进最高优先级的 AI 组织。
  painIntensity:
    score: 4
    rationale: 试点扩站一旦失败，机器人创业公司不仅花钱，还会伤害客户信任，哪怕市场还在早期。
  wedgeClarity:
    score: 5
    rationale: 面向人形机器人发布的客户任务级回归测试，范围具体、需求紧迫，也比泛机器人平台更容易调研。
  defensibility:
    score: 4
    rationale: 防守力可以从专有基准语料、发布数据和围绕试点证据形成的工作流锁定中长出来。
  ventureScale:
    score: 4
    rationale: 以人形机器人为滩头市场后，可以继续扩到多类机器人和多种行业的具身智能部署基础设施。
topRisks:
  - name: 市场时机
    description: 人形机器人部署的放量速度可能低于预期，导致早期客户的软件预算释放更慢。
    mitigation: 先盯住已经在跑付费仓储试点的团队，同时支持复用同一发布工作流的相邻移动操控项目。
  - name: 内部自研压力
    description: 一旦需求被看清，头部机器人创业公司可能会自己做验证工具。
    mitigation: 靠速度取胜——无缝接现有仿真器，并掌握他们暂时还没有的客户任务级基准语料库。
  - name: 集成摩擦
    description: 机器人日志和仿真栈过于异构，可能让客户导入太依赖服务。
    mitigation: 先围绕一个仓储工作流，只支持一套窄范围的 ROS2 和常见仿真适配器，再逐步扩大协议覆盖。