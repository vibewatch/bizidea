jobsToBeDone:
- job: 当某个人形机器人试点即将扩展到新的仓库站点时，帮助自主系统负责人证明最新模型仍能完成核心任务，从而有信心批准部署。
  currentAlternative: 手工仿真检查加有限真机测试
  successMetric: 发布审批时间下降，发布后任务失败减少
- job: 当硬件或策略更新上线时，帮助验证负责人发现哪些客户工作流出现回归，以便在企业评审前拦截高风险发布。
  currentAlternative: 临时脚本和基于电子表格的 QA
  successMetric: 现场部署前捕捉到的回归数量
ideaScorecard:
  signalStrength:
    score: 4
