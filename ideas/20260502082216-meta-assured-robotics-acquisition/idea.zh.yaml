  painIntensity:
    score: 4
    rationale: 对机器人初创公司而言，试点扩展失败成本高昂且会损害信誉，即便市场仍处于早期。
  wedgeClarity:
    score: 5
    rationale: 围绕人形机器人发布的客户任务回归测试足够具体且紧迫，也比广义机器人平台更容易验证。
  defensibility:
    score: 4
    rationale: 防御力可以来自专有基准语料库、发布数据以及围绕试点证据形成的工作流锁定。
  ventureScale:
    score: 4
    rationale: 以人形机器人为起点后，可扩展为覆盖多个机器人类别和行业的具身 AI 部署基础设施。
topRisks:
- name: Market timing
  description: 人形机器人部署的扩张速度可能低于预期，从而推迟早期客户的软件预算。
  mitigation: 先服务已经在进行付费仓储试点的团队，并支持使用同一发布工作流的相邻移动操作项目。
- name: Internal-build pressure
  description: 一旦需求变得明显，头部机器人初创公司可能会尝试自建验证工具。
  mitigation: 通过与现有仿真器快速集成，以及掌握客户特定的基准语料库来取胜，而这些语料库对方尚不具备。
- name: Integration friction
  description: 异构机器人日志和仿真栈可能让上线过程过度依赖服务。
  mitigation: 先从单一仓储工作流的窄范围 ROS2 和常见仿真适配器开始，再逐步扩大协议覆盖。
