problem: 人形机器人创业公司正从研究演示迈向仓储和工业场景的付费试点，但模型每更新一次、硬件每改一版，都可能把某个站点的具体任务跑坏。现在自治团队还得靠零散的仿真测试、电子表格清单和昂贵的真机试跑来判断一次发布是否安全。这会拖慢试点扩张，也让企业客户更难相信系统足够可靠，愿意把更多机器人放进现场。
targetUser:
  primary: 在进行仓储试点的 Series A-B 人形机器人创业公司里，负责自治或 ML 平台的负责人
  secondary: 同一家公司里的机器人测试与验证负责人
  buyer: 人形机器人 OEM 的 VP Engineering 或 CTO
startupThesis:
  nonObviousInsight: 稀缺资产已经不只是机器人硬件，更是能带着证据把机器人专用模型版本发出去的能力。Meta 收购一支做人形基础模型的团队，说明控制点正在从纯模型研究转向发布可信度。
  beachhead: 面向正在 3PL 仓库扩张 tote-moving、bin-picking 或 pallet-side handling 试点的人形机器人创业公司，做发布验证
  wedge: 把试点日志和遥操作轨迹变成客户任务级回归测试，为人形机器人模型更新设一道发布闸门
  whyNowCatalyst: Meta 为强化人形机器人 AI 收购 ARI，说明机器人专用软件预算现在已经真实存在，创业公司必须在不组建 Meta 级自治团队的前提下更快发版。
  ventureScalePath: 先从人形机器人试点的发布闸门切入，再扩到跨机群遥测、基准数据网络、仿真编排、面向客户的可靠性报告，最终做成仓储、制造和服务机器人具身智能部署的控制平面。
solution: 产品会接入仿真运行结果、机器人日志和遥操作轨迹，再把这些数据整理成与每个客户工作流绑定、可反复运行的任务基准。新模型准备上线前，平台会在这些基准上批量跑回归测试，标出失效模式，并生成一份发布报告，方便自治团队和运营团队、客户一起审阅。它一开始只做一层窄而深的发布闸门，而不是整套机器人基础设施，所以团队不必替换现有仿真器和 ML 工具链。时间一长，公司还能积累起面向真实仓储人形任务的最大基准语料库，变成防守力很强的数据资产。
goToMarketSeed:
  firstCustomer: 拥有 2-10 个仓储试点、每周发模型版本、验证团队又不大的 Series A-B 人形机器人创业公司
  buyingTrigger: 试点即将从一个站点扩到多个客户站点，或客户评审前必须签字确认一次重大模型/硬件更新
  currentAlternative: 团队内部自研，加上一套人工测试脚本、电子表格和少量真机试跑
  switchingReason: 这条切口能用客户任务数据给出更快、可审计的发布决策，又不用把内部验证团队扩得更大
  pricingHypothesis: 按机器人项目和基准套件收费的年度平台合同，起步约 $60k-$180k / 年，另加按量计费的仿真超额费用
whyNow:
  - point: Meta 的收购证明，人形机器人软件预算已经从探索性研究走向真实的战略支出。
    signalRefs: [大厂预算已经流向人形机器人模型团队]
    sourceRefs: [1, 3, 4]
  - point: 连机器人基础模型都已经值得买下来，围绕模型发布可信度的配套工具因此变得更重要。
    signalRefs: [人形机器人基础模型已经成了收购标的]
    sourceRefs: [1, 2]
  - point: 人形机器人团队必须把模型发布和硬件项目更紧地捆在一起，对发布闸门这一层的需求随之抬升。
    signalRefs: [模型研发和硬件研发正在并轨]
    sourceRefs: [3]
  - point: 随着 Meta 把稀缺具身智能团队收进体内，创业公司只能靠软件杠杆，而不是按人头去跟大厂拼军备竞赛。
    signalRefs: [稀缺的具身智能人才正在被大厂收编]
    sourceRefs: [1, 4]
differentiator: 和通用 MLOps 或机器人仿真工具不同，这条切口围绕的是人形机器人试点里“某个客户任务能不能放行”这件事。随着产品积累真实仓储任务里的基准定义、失效特征和发布证据，它会越来越难被替代，因为创业公司很难从零把这一整套客户任务级评估语料重建出来。这套客户专属评估语料最终可以沉淀成具身智能是否已准备就绪的系统记录。
