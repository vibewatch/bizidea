problem: 人形机器人初创公司正从研究演示走向付费仓储和工业试点，但每次模型更新或硬件微调都可能破坏站点特定任务。如今，自主系统团队往往依赖临时性的仿真测试、电子表格清单以及昂贵的真机试跑来判断一次发布是否安全。这会拖慢试点扩展，也削弱向需要高可靠性的企业客户证明效果的能力。
targetUser:
  primary: 在仓储试点中运营的 A-B 轮人形机器人初创公司的自主系统负责人或 ML 平台负责人
  secondary: 同一公司的机器人测试与验证负责人
  buyer: 人形机器人 OEM 的工程副总裁或 CTO
startupThesis:
  nonObviousInsight: 稀缺资产不再只是机器人硬件，而是能否带着证据交付机器人专用模型版本。Meta 对人形基础模型团队的收购式招募表明，控制点正从单纯的模型研究转向发布信心。
  beachhead: 为在人形机器人初创公司扩展 3PL 仓库中的料箱搬运、拣箱或托盘侧处理试点提供发布验证
  wedge: 将试点日志和遥操作轨迹转化为人形机器人模型更新发布闸门的客户特定任务回归测试
  whyNowCatalyst: Meta 收购 ARI 以强化人形 AI，表明机器人专用软件预算已经启动，使初创公司在不雇佣 Meta 级别自主系统团队的前提下加快交付变得更迫切。
  ventureScalePath: 先从人形机器人试点的发布闸门切入，再扩展到跨车队遥测、基准数据网络、仿真编排、面向客户的可靠性报告，最终成为覆盖仓储、制造和服务机器人的具身 AI 部署控制平面。
solution: 产品接入初创公司真实试点中的仿真运行、机器人日志和遥操作轨迹，并将其转化为与各客户工作流绑定的可重复任务基准。在新模型发布前，平台会在这些基准上执行回归测试、标记失效模式，并生成可供自主系统团队与运营和客户共同审阅的发布报告。它一开始是一层聚焦的发布闸门，而不是完整机器人技术栈，因此团队可以保留现有的仿真器和 ML 工具。随着时间推移，公司可以积累真实仓储人形任务中规模最大的基准语料库，形成可防御的数据资产。
goToMarketSeed:
  firstCustomer: 拥有 2-10 个仓储试点、每周发布模型、且自主系统验证团队较小的 A-B 轮人形机器人初创公司
  buyingTrigger: 某个试点即将从单一站点扩展到多个客户站点，或一次重大模型/硬件更新必须在客户评审前完成认证
  currentAlternative: 内部自研，加上仿真中的手工测试脚本、电子表格以及有限的真机试跑
  switchingReason: 该切入口能让初创公司在无需扩大内部验证团队的情况下，基于客户特定任务数据更快且可审计地做出发布决策。
  pricingHypothesis: 按机器人项目和基准套件计费的年度平台合同，起价约为每年 $60k-$180k，超出部分按仿真使用量计费。
