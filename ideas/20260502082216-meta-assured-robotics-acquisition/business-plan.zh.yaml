slug: humanoid-release-gate
date: '2026-05-02'
executiveSummary: >-
  Meta 收购 Assured Robot Intelligence，再加上具身智能公司持续融资，说明围绕人形机器人和相邻工业机器人项目的软件预算正在成形，不过首批买家仍然很窄。短期最疼的场景，是试点跨站点扩张，或者模型、硬件大改之后的发布审批，因为零散仿真、电子表格和少量真机试跑，很难给出足够可信的上线证据。公司应该卖一层发布验证软件，把机器人日志、仿真结果和遥操作轨迹整理成客户任务级基准套件，再产出可审计的放行/拦截报告。首个客户是一家 Series A-B 人形机器人 OEM，已有 2-10 个仓储试点、验证团队不大；经济买方是正面对客户评审或多站点扩张压力的 CTO 或 VP Engineering。整套打法刻意避开完整机群运营、通用 MLOps 和替换仿真平台，而是叠在 ROS 2、Foxglove、Formant 和 NVIDIA Isaac 之上。研究给出的初始切口规模大约是 $45.0M TAM、$12.0M SAM、$2.4M 第 3 年 SOM，所以真正的创投上行取决于：先在人形机器人里把这条工作流跑通，再向相邻工业具身智能项目扩出去。最主要的反证风险有两个：一是今天真正具备足够部署节奏、愿意买单的 OEM 太少；二是客户内部那套拼装栈已经“够用”，足以挡住新工具。围绕仓库视频、遥操作轨迹和日志的数据权利，眼下也还没跑通，必须尽早验证，因为它同时决定护城河能否形成，也决定客户导入怎么设计。
problem:
  - 人形机器人和相邻具身智能 OEM 很难证明：某次新模型或硬件修订之后，客户专属的仓储任务在试点扩站或企业评审前依然能稳定通过。
  - 现有替代方案通常是 ROS bag 回放、重跑仿真、看板和电子表格拼出来的临时栈，既抬高验证人力，也拖慢发布签字，还留不下像样的审计轨迹。
solution:
  - 做一层发布闸门，接入仿真结果、机器人日志和遥操作轨迹，把每个客户工作流沉淀成可重复运行的基准套件。
  - 产出基准血缘、回归告警和面向客户的发布报告，让工程和运营团队在不替换现有机器人栈的前提下，也能做出有记录的放行/拦截决策。
whyWeWin:
  - 现有厂商分别卡在可观测性、仿真和通用 AI 工具上，没有谁把客户任务级机器人放行审批做成系统记录。
  - 产品会越用越厚：基准定义、失效特征和真实上线结果会滚成专有语料库。
  - 采购触发点又尖又能算账：多站点上线，或重大策略/硬件改版叠加客户 deadline，都会逼出预算。
strategicChoices:
  beachhead: 在北美和欧洲，把 tote-moving、bin-picking 或 pallet-side handling 试点往外扩的 Series A-B 人形机器人 OEM。
  wedgeRationale: 买家已经有仿真器、看板和内部脚本，缺的不是更大的机器人平台，而是一条窄而深的发布签字工作流，能把某一组客户任务绑到可审计的放行工件上。
  sequencingRationale: 先围绕一个仓储工作流和少量适配器，做离线发布验证；销售上由创始人直接打进集中分布的试点项目；等基准构建速度和试点转量产的转化率跑出来后，再补面向客户的报告和相邻工作流覆盖。早期先补集成和基准工程师，而不是先堆 GTM 人头，因为真正卡脖子的还是导入速度。
  notYet:
    - 完整的机群运营和遥操作工作流软件。
    - 通用机器人模型训练或实验跟踪基础设施。
    - 在工业场景还没跑出可重复上线证据前，就大举进入服务机器人或消费机器人市场。
    - 超出“有文档的发布证据”之外的自动化安全认证承诺。
market:
  tam: 基于大约 300 个全球工业具身智能项目、每个项目每年约 $150k 发布验证支出，估算 TAM 为 $45.0M。
  sam: 基于北美和欧洲约 80 个正在跑试点或接近商业化的仓储/制造项目，估算 SAM 为 $12.0M。
  som: 基于第 3 年可拿下 15 个账户、混合 ACV 约 $160k，估算可触达 SOM 为 $2.4M。
  segments:
    - 已在仓储或制造场景跑真实试点的 Series A-B 人形机器人和相邻具身智能 OEM。
    - 需要在多个站点之间把上线证据标准化的企业部署项目和系统集成商。
  buyingProcess: >-
    销售起点应该是验证负责人或自治平台工程师——通常发生在站点扩张或重大版本待发的时候；等客户团队亲眼看到，现有 ROS 2、可观测性和仿真工具能被这套软件串起来，发布签字时间明显缩短，再推进到 CTO 或 VP Engineering 批准。早期交易会非常技术导向，也更适合创始人亲自打单，而不是等采购部门发平台型招标。
product:
  mvp: >-
    MVP 应该先支持 ROS 2 日志接入、单一仓储工作流的历史基准构建、横跨仿真和现场轨迹的回归打分，以及面向单个机器人项目的签字版发布报告。第一步先在近期试点数据上离线跑通，不急着做常开监控或大范围机群覆盖。
  sixMonth: 跑通一个接近量产的工作流，支持 ROS 2 与 Foxglove 数据导入、基准版本管理、发布报告，并让 1 家付费共创客户完成至少 2 次带闸门的发布。
  twelveMonth: 拿下 3-5 家共创客户，补上 NVIDIA Isaac 和 Formant 连接器，做出能跨相似仓储任务复用的基准模板，并把发布签字时间明确压下来。
  twentyFourMonth: 从纯人形机器人项目扩到相邻工业具身智能工作流，比如同样依赖发布治理流程的移动操控或仓储自动化团队。
  keyBets:
    - 某一个仓储工作流会比定制化的一次性测试方案更快长出可复用的基准模板。
    - 客户会更相信“仿真证据 + 现场轨迹 + 遥操作轨迹”混合出来的发布报告，而不是只看仿真分数。
    - 只覆盖 ROS 2、Foxglove、Formant 和 NVIDIA Isaac，就足够拿下前 5 个客户。
    - 到第一个客户之后，每新增一个站点，基准构建时间都能压到 1 周以内。
gtm:
  wedge: 面向即将扩站，或正要经历重大模型/硬件发布的人形机器人仓储试点，做客户任务级回归闸门。
  channels:
    - 创始人直接外呼，打进公开可见的试点项目，找 CTO 和 VP Engineering。
    - 通过 ROS 2、Foxglove、Formant 和 NVIDIA Isaac 生态关系做技术转介绍与联合销售。
    - 通过仓储集成商和企业共创客户，做转介绍和共创客户拓展。
  funnelTargets: 目标账户到技术发现 40%+，发现到付费共创客户 20-30%，共创客户到年度量产合同 50%+，量产后追加站点或工作流扩展 60%+
  pricing: 先卖 $25k-$50k、周期 6-10 周的付费共创项目，用来搭第一套基准；再转成按机器人项目和基准套件收费的年度合同，价格约 $60k-$180k，仿真与回归运行超额另计。这样定价，刚好锚定客户新增验证人力和上线延误的替代成本。
businessModel:
  revenueStreams:
    - 按机器人项目和基准套件收费的年度软件合同。
    - 仿真和回归执行带来的按量超额收入。
    - 面向新工作流或新站点的付费导入与基准设计包。
    - 更高级的面向客户可靠性与治理报告。
  unitOfValue: 以机器人项目 + 基准套件为计费单位，再通过站点、工作流和回归运行量扩张。
  targetGrossMarginPct: 70
  expansionLevers:
    - 在同一机器人项目下新增更多客户站点。
    - 第一套基准库建起来后，继续加相邻仓储工作流。
    - 为企业评审补上治理报告和基准血缘模块。
    - 用同一发布工作流，扩进相邻工业具身智能项目。
strategyMap:
  northStarMetric: 有多少量产客户站点，把每次发布都放进平台做闸门审批。
  inputMetrics:
    - 签下的付费共创客户数。
    - 生成第一套基准的中位天数。
    - 相比客户原有流程，发布签字周期缩短了多少。
    - 每次发布在现场部署前抓到多少回归问题。
    - 试点转量产的转化率。
  moatsToBuild:
    - 覆盖仓储和轻工业任务的跨客户基准语料库。
    - 跨 ROS 2、Foxglove、Formant 和 NVIDIA Isaac 的标准化遥测与仿真 schema。
    - 深嵌在上线决策里的审批工作流历史和面向客户的发布工件。
  killCriteria:
    - 第 12 个月前，在做完 30 次合格目标账户对话后，仍然签不下 3 个付费共创客户。
    - 前 2 个量产试点，发布签字时间缩短不到 30%。
    - 到第 3 次部署之后，单个客户的基准导入仍需超过 3 个工程师周。
    - 付费共创客户里，6 个月内转成年度量产合同的比例低于 50%。
  mermaid: |
    flowchart LR
      Wedge[仓储发布闸门切口] --> MVP[离线基准与发布报告]
      MVP --> Proof[签字更快且部署前抓到回归]
      Proof --> Expansion[扩站点、扩工作流、扩到相邻具身智能项目]
investorMemo:
  verdict:
    call: Watch
    conviction: 工作流痛点真实、替代方案也真实，但今天纯人形机器人的买家密度 still 太薄，暂时难给高确信。
    whyBelieve: 公开试点扩张、大额具身智能融资，以及 Meta 的 acqui-hire，都在说明市场确实需要一套能把发布可信度文档化的软件。
    whyDoubt: 短期市场又小又分散，而内部拼装栈很强；如果不能尽快向相邻市场扩，这个独立发布闸门产品很难长成创投规模。
    nextDiligence: 验证至少有 3 家在跑真实工业试点的 OEM，愿意在更广的机群运营平台标准化之前，先为发布签字点状方案付钱。
  firstCustomer:
    title: Series A-B 人形机器人 OEM 的自治负责人。
    profile: 一家 150-400 人的机器人公司，已经跑起 2-10 个仓储试点，策略或控制器更新频繁，但没有一支很大的专职验证平台团队。
    trigger: 试点要扩到第二个客户站点，或一次重大模型/硬件更新必须在企业评审前获得批准。
    buyer: VP Engineering or CTO
    initialContract: 先以 $25k-$50k 的付费共创合作搭起一套基准，并为一条发布线设闸；如果这套工作流进入正式签字流程，再转成 $60k-$180k 的年度合同。
  mustBeTrue:
    - 未来 12 个月里，北美和欧洲至少有 10 家具身智能 OEM 会在真实工业试点里保持按月或更快的发布节奏。
    - 至少一半合格的共创客户候选人，会把发布审批视作工程管理层可预算的问题，而不是内部工具 backlog。
    - 前 3 次部署都能用一套窄适配器完成导入，不会把业务拖成定制服务公司。
    - 发布报告能把签字时间压缩至少 30%，同时抓到客户认定为实质性的回归。
    - 产品能从人形机器人扩到相邻工业具身智能工作流，而不用把基准和适配器整套重做。
  diligenceQuestions:
    - 目标 OEM 里，今天真正在仓储或制造试点里发版本的到底有多少，而不是只停留在路线图里？
    - 现在谁在为发布签字买单：CTO、VP Engineering、自治平台负责人，还是运营团队？
    - 什么样的证据，才会让客户愿意放弃电子表格和脚本，改用一套专门审批工作流？
    - 哪个首个工作流最容易沉淀出可复用的跨客户基准库？
    - 哪些数据共享或隐私限制，会卡住遥操作轨迹、仓库视频和日志的复用？
  riskHeatmap:
    - risk: 市场时机
      likelihood: High
      impact: High
      leadingIndicator: 前 20 通发现电话里，不到 5 个合格线索明确表示自己已有多站点试点或临近扩张计划。
      mitigation: 先盯住已经在跑付费仓储或制造试点的项目，同时把 ICP 扩到相邻工业具身智能团队，而不只盯人形机器人。
    - risk: 内部自研替代
      likelihood: High
      impact: High
      leadingIndicator: 潜在客户持续选择扩写 ROS 回放、看板和 notebook，而不是签付费共创项目。
      mitigation: 靠部署速度、审批工作流深度和客户任务级基准血缘取胜，而不是比表层分析功能。
    - risk: 集成摩擦
      likelihood: Medium
      impact: High
      leadingIndicator: 前 3 个客户中，第一套基准的中位构建时间超过 2 周，或每次都需要新写一套数据流水线。
      mitigation: 早期只支持 ROS 2 加一小组遥测/仿真连接器，在扩大协议范围前先把客户导入产品化。
    - risk: 数据权利和安全限制
      likelihood: Medium
      impact: Medium
      leadingIndicator: 安全评审阻止存储或复用构建跨账户基准模板所需的现场轨迹。
      mitigation: 支持客户隔离部署；必要时只保留基准元数据、不保留敏感原始影像；并尽早把 DPA 条款谈清楚。
operatingAssumptions:
  - assumption: 已经有足够多的目标 OEM 在跑带有重复发布的试点，能支撑初始销售漏斗。
    basis: research.yaml
    validationTest: 访谈 10 位自治负责人，确认至少 6 位的真实工业试点与按月或更快的发布节奏绑定。
    decisionImpact: 如果不成立，公司就该收窄成少数灯塔客户的共创服务，或更早扩向相邻工业机器人类别。
  - assumption: 在标准化更广的机群运营平台之前，工程管理层愿意先买发布签字工具。
    basis: idea.yaml
    validationTest: 从已经在用内部工具或可观测性栈的潜在客户里，签下至少 2 个付费共创合同。
    decisionImpact: 如果不成立，就该把产品重定位成通过现有平台销售的模块，而不是继续主打独立软件 GTM。
  - assumption: 前 3 个客户可以靠 ROS 2、Foxglove 和 NVIDIA Isaac 集成完成导入，不需要重度定制数据工程。
    basis: operator judgment
    validationTest: 前 3 次部署都把“第一套基准上线”时间压进 10 个工作日内。
    decisionImpact: 如果不成立，招聘节奏、毛利预期和融资需求都会明显向服务型模式漂移。
  - assumption: 即便原始数据需要隔离，客户仍愿意开放足够多的日志和遥操作轨迹，用来构建可复用的基准模板。
    basis: research.yaml
    validationTest: 在产品化跨客户模板前，先通过 2 家客户的安全评审，并把可接受的数据保留条款写清楚。
    decisionImpact: 如果不成立，护城河会变弱，路线图也该更偏向单租户工作流软件，而不是继续讲数据网络故事。
  - assumption: 某一个仓储工作流能够变成可复制的产品模板，而不是每次都重做一套基准项目。
    basis: idea.yaml
    validationTest: 对比 3 家共创客户的基准构建工作量，到第 3 个客户时，模板复用要把配置时间至少砍掉 50%。
    decisionImpact: 如果不成立，公司就该继续收窄到一个明确工作流，或者放弃创投式扩张假设。
experimentRoadmap:
  - horizon: 0–90 天
    experiment: 与公开试点项目里的自治负责人、验证负责人和工程买方做 12 次 ICP 访谈。
    hypothesis: 试点扩站和重大版本签字，足够痛，能逼出独立预算。
    successMetric: 12 次访谈里，至少 8 次确认存在与近期部署里程碑绑定的真实发布审批痛点。
    owner: Founder/CEO
  - horizon: 0–90 天
    experiment: 围绕一个仓储工作流和一种基准套件格式，拿下 2 份共创客户 LOI。
    hypothesis: 只要把切口讲成“降低发布风险”，潜在客户在完整产品出现前也愿意承诺。
    successMetric: 2 份已签 LOI，写明触发事件和预计启动时间。
    owner: Founder/CEO
  - horizon: 90–180 天
    experiment: 做出 ROS 2 日志接入、离线基准构建和发布报告的 MVP 适配栈。
    hypothesis: 只要集成范围足够窄，哪怕先基于历史数据，也能在自动化实时流水线之前交付价值。
    successMetric: 第一个客户在开放数据后的 10 个工作日内拿到可用发布报告。
    owner: Founding eng
  - horizon: 90–180 天
    experiment: 围绕最近一个发布周期，跑 1 个付费试点，并把平台结果和客户现有 QA 流程对比。
    hypothesis: 平台至少能抓到 1 个实质性回归，并缩短发布评审时间。
    successMetric: 跑出 1 个付费试点，证明签字时间缩短 30%+，或在部署前抓到一项有记录的回归问题。
    owner: Robotics solutions engineer
  - horizon: 180–360 天
    experiment: 补上 NVIDIA Isaac 与 Foxglove 导入，并生成可带去企业评审会议的上线报告。
    hypothesis: 更完整的证据包装，会提高试点转量产的转化率，也会减轻内部 champion 的推动成本。
    successMetric: 看过面向企业的报告后，50%+ 的共创客户转成年度合同。
    owner: Founding eng
  - horizon: 180–540 天
    experiment: 在纯人形机器人之外，测试 1 个相邻工业具身智能项目的扩展。
    hypothesis: 这套发布治理工作流能迁移到相邻的移动操控或仓储自动化团队，产品只需小改。
    successMetric: 在相邻类别里拿下 1 个付费 POC，且复用现有基准和适配栈的比例达到 70% 以上。
    owner: Founder/CEO
operations:
  - 把客户导入标准化成三件事：隔离式数据接入、基准 schema 映射、固定版式的发布报告。
  - 用 issue 跟踪和 runbook 持续量化：首套基准生成时间、回归运行周转时间、试点转量产转化率。
  - 尽早建安全控制、DPA 模板和基于角色的访问权限，因为仓储遥测和视频一定会碰到采购审查。
  - 跟 ROS 2 生态工具、Foxglove、Formant 和 NVIDIA Isaac 维持集成伙伴关系，减少“拆旧换新”的顾虑。
  - 把每次客户基准评审都当成产品学习闭环，而不是一次定制咨询项目。
team:
  - role: 创始人/CEO
    startTiming: Month 0
    rationale: 负责创始人主导销售、共创客户范围界定和生态伙伴关系，因为首批买家集中而且技术密度高。
  - role: 创始工程师
    startTiming: Month 0
    rationale: 先把基准引擎、发布报告工作流和第一版产品架构搭起来，再扩表面积。
  - role: 机器人集成工程师
    startTiming: Month 3
    rationale: 把 ROS 2、Foxglove 和 NVIDIA Isaac 的适配器产品化，让客户导入速度越来越快，而不是服务工作越堆越重。
  - role: 基准与 ML 工程师
    startTiming: Month 6
    rationale: 等第一批客户数据跑起来后，继续把失效分类、基准版本管理和回归打分做深。
  - role: 解决方案工程师
    startTiming: Month 9
    rationale: 接手共创客户的技术导入和发布评审流程，让创始人能把精力继续放在产品和新销售上。
milestones:
  - horizon: 0–12 个月
    items:
      - 在人形机器人或相邻工业具身智能项目里签下 3-5 家付费共创客户。
      - 上线 MVP，覆盖 ROS 2 接入、一个仓储工作流基准模板和可签字的发布报告。
      - 在 2 个客户试点里，证明发布签字时间至少缩短 30%，或在部署前抓到明确回归问题。
      - 至少把 2 家共创客户转成年度量产合同。
  - horizon: 12–24 个月
    items:
      - 把付费账户扩到 8-10 家，覆盖人形机器人和相邻工业具身智能工作流。
      - 把第一套基准上线的中位时间压到 5 个工作日以内。
      - 做到跨多个客户站点复用基准，并产出可直接带进企业评审的上线报告。
      - 证明至少 1 个非人形机器人类别也能复用同一套发布治理工作流。
  - horizon: 24–36 个月
    items:
      - 达到 15 个量产账户，接近研究给出的第 3 年 SOM 目标。
      - 在头部客户里成为跨多个站点的发布审批系统记录。
      - 上线治理报告和跨项目基准分析等扩展模块。
risks:
  - risk: 今天具备足够真实部署节奏、愿意立刻采购的人形机器人 OEM 数量，可能比预想更少。
    likelihood: High
    impact: High
    mitigation: 先卖给公开活跃的试点项目；等工作流跑通后，把 ICP 扩到相邻工业具身智能团队。
  - risk: 买家继续用内部脚本、可观测性工具和仿真平台，不愿接受独立审批产品。
    likelihood: High
    impact: High
    mitigation: 把产品定位成叠在现有工具之上的审批系统记录，并在付费试点里证明签字速度可量化提升。
  - risk: 集成和数据标准化工作过重，导致每次部署都像服务项目，撑不起软件型经济模型。
    likelihood: Medium
    impact: High
    mitigation: 限制早期连接器范围，把一个工作流模板化，并把导入时长当成董事会级指标来盯。
  - risk: 客户的数据权利、隐私或安全限制，会挡住跨客户基准复用。
    likelihood: Medium
    impact: Medium
    mitigation: 提供客户隔离存储；即便原始轨迹不能共享，也把可复用的元数据和基准 schema 产品化。
fundingAsk:
  stage: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: 这 18 个月的 runway，应该足够养起核心产品团队，做出第一套适配器和基准栈，拿下 3-5 个共创客户，把至少 2 个转成年度量产合同，并验证能否从纯人形机器人扩到相邻项目。