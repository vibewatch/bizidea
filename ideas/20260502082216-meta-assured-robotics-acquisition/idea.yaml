jobsToBeDone:
  - job: When a humanoid pilot is about to expand to a new warehouse site, help the autonomy lead prove the latest model will still complete core tasks, so they can approve deployment with confidence.
    currentAlternative: Manual simulation checks plus limited on-robot testing
    successMetric: Release approval time falls and post-release task failures decline
  - job: When a hardware or policy update lands, help the validation lead detect which customer workflows regressed, so they can block risky releases before an enterprise review.
    currentAlternative: Ad hoc scripts and spreadsheet-based QA
    successMetric: Number of regressions caught before field deployment
