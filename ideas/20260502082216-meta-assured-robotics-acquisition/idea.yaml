topRisks:
  - name: Market timing
    description: Humanoid deployments may scale slower than expected, delaying software budgets at early customers.
    mitigation: Start with teams already running paid warehouse pilots and support adjacent mobile-manipulation programs using the same release workflow.
  - name: Internal-build pressure
    description: Top robot startups may try to build their own validation tooling once the need is obvious.
    mitigation: Win on speed by integrating with existing sims and by owning the customer-specific benchmark corpus they do not yet have.
  - name: Integration friction
    description: Heterogeneous robot logs and simulation stacks could make onboarding too services-heavy.
    mitigation: Begin with a narrow ROS2 and common sim adapter set for one warehouse workflow before broadening protocol coverage.
