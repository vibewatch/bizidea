topRisks:
  - name: Procurement timing risk
    description: Early interceptor suppliers may still have lumpy pilot budgets and delayed production awards, which can slow initial sales cycles.
    mitigation: Focus on teams already entering low-rate production reviews and sell against a near-term lot-release milestone rather than abstract digital transformation.
  - name: Classified workflow friction
    description: Defense manufacturers may resist a new system if it cannot live inside secure environments or connect to restricted engineering data.
    mitigation: Start with unclassified release-board workflows, support air-gapped deployment patterns, and integrate through existing approved data exports first.
  - name: Incumbent tool overlap
    description: Buyers may assume their PLM, MES, or QMS stack already covers the problem and push back on another software layer.
    mitigation: Position the product as the missing cross-functional release-decision layer, prove ROI on one lot-cycle reduction, and integrate with incumbent systems instead of replacing them.
