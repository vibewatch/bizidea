scenarios:
  downside:
    description: air-gapped 部署持续高度定制化，一项生产授标延后，公司到 Y3 末只有 5 个活跃项目，且合同价值更低。
    y3RevenueK: 1680.0
    y3EbitdaK: -430.0
    cashLowPointK: -120.0
    keyAssumptionChanges:
    - 每个活跃项目的综合年度收入停在约 $350K，而不是 $400K。
    - Y3 的第二个项目拖到年后才落地，所以公司以 5 个而不是 6 个活跃项目结束 Y3。
    - 由于安全实施仍然偏服务化，期末毛利率只到约 70%。
  base:
    description: 公司在 Y1 转成 2 个付费项目，Y2 末做到 4 个活跃生产项目，并在 Q4Y3 达到研究里的 6 项目 SOM 场景。
    y3RevenueK: 2166.68
    y3EbitdaK: -111.85
    cashLowPointK: 445.04
    keyAssumptionChanges:
    - 每个活跃项目的综合年度收入，从试点占比高的 Y1 的 $150K，爬升到 Y3 生产使用阶段的 $400K。
    - 新增付费项目按模型节奏推进：Y1 为 2 个、Y2 为 2 个、Y3 为 2 个。
    - 随着安全部署和证据包模板标准化，毛利率从 Y1 的 35%-60% 提升到 Q4Y3 的 75%。
  upside:
    description: 一个 lighthouse 案例和伙伴转介绍加速了第二项目扩张，在团队规模没有明显变大的情况下，Y3 又多拉进来一个生产项目。
    y3RevenueK: 2500.0
    y3EbitdaK: 180.0
    cashLowPointK: 520.0
    keyAssumptionChanges:
    - 随着供应商协同和分析模块更早附着，每个活跃项目的综合年度收入提升到约 $425K。
    - 由于一个现有客户更早扩到第二型号族，公司以 7 个活跃项目结束 Y3。
    - 更多部署复用预清理模板，期末毛利率接近 77%。
