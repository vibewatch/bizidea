  cashImpactK: -130.0
modelDiagram:
  title: 单位经济流转
  mermaid: |
    flowchart LR
      TargetAccounts[目标账户] --> DesignPartners[Design Partners]
      DesignPartners --> PaidPilots[付费试点]
      PaidPilots --> ProductionPrograms[生产项目]
      ProductionPrograms --> ExpansionPrograms[扩张项目]
      ProductionPrograms --> SubscriptionRevenue[订阅收入]
      ExpansionPrograms --> SubscriptionRevenue
      SubscriptionRevenue --> GrossProfit[毛利润]
      GrossProfit --> Cash[现金]
modelSanity:
- checkName: 收入引擎
  finding: 基准情景的收入由两条线驱动：付费项目数从 Y1 的 2 个爬到 Q4Y3 的 6 个活跃项目，同时每个项目的综合年度价值从 $150K 的试点收入成熟到 $400K 的生产合同。
- checkName: 必须跑通的前提
  finding: 安全部署必须足够快地模板化，毛利率才能从试点期低于 50% 的服务型结构，提升到 Y3 的约 74%-75%，而不需要交付团队的扩张速度快过收入。
- checkName: 模型失效条件
  finding: 如果生产授标延后，或者买方把支出压在试点价位附近，下行情景就会把现金打成负值，因为到 Y3 为止模型只有 6 个 logo，集中度很高。
- checkName: 下一轮证明点
  finding: 只要公司在 Q4Y2 之前做到 4 个活跃生产项目、拿到第一次第二项目扩张，并把安全部署压到 6 周以内，seed 故事就会最扎实。
sanityChecks:
  ruleOf40: Y3 增长率 116.7% + EBITDA 利润率 -5.2% = 111.5%
  burnMultiple: Y2 的 burn multiple 约为 0.8x（$692K burn / $900K net-new ARR），到 Y3 改善到约 0.1x（$112K burn / $1.2M net-new ARR）。
  revenuePerFte: Y3 为每名 FTE $270.8K（对比 benchmark：国防工作流 SaaS 常见为 $200-400K）
  flags:
  - 基准情景下公司到 Y3 仍略微 EBITDA 为负，因此很可能会在大规模向相邻弹药扩张之前就启动 seed 融资。
  - Q4Y3 只有 6 个活跃项目，意味着只要有一个续约延后或一个生产授标滑掉，收入就会明显变形。
  - 毛利率的假设建立在导出式数据和证据包部署能标准化复用之上；如果 air-gapped 集成持续高度定制，毛利会掉到目标以下。
