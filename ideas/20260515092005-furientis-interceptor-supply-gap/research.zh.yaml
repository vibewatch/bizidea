competitors:
- name: Siemens Teamcenter + Polarion + Opcenter
  stage: incumbent
  wedge: 数字主线：把 PLM、ALM 与制造运营管理打通
  pricing: 企业定制报价
  strength: 在复杂制造场景里，对产品数据、需求和工厂流程的覆盖很深
  weaknessVsUs: 但它不是围着国防专属的批次放行板构建的，没法天然把测试新发现直接连到供应商重新定型和政府证据包。
  sourceRefs:
  - 32
  - 31
  - 30
- name: PTC Windchill + Codebeamer
  stage: incumbent
  wedge: PLM + ALM，擅长工程变更与可追溯工作流
  pricing: 企业定制报价
  strength: 对工程变更、产品数据和软件生命周期追溯治理很强
  weaknessVsUs: 但核心仍是宽口径工程治理，不是每次拦截弹测试或供应商变化之后的那一次生产就绪性决策。
  sourceRefs:
  - 24
  - 21
  - 23
  - 22
- name: Palantir Warp Speed
  stage: scale-up
  wedge: 国防制造与供应链操作系统
  pricing: 企业定制报价
  strength: 数据集成能力强，且在国防制造里正建立更强可信度
  weaknessVsUs: 但平台打法更重、更宽，可能比围绕一个批次和一个弹药型号族做的专用放行工作流更慢。
  sourceRefs:
  - 11
  - 27
  - 26
  - 25
- name: Tulip
  stage: scale-up
  wedge: 面向航空航天与国防制造的一线工厂 App 层工作流
  pricing: 企业定制报价
  strength: 车间一线工作流上线快，可用性强
  weaknessVsUs: 但在国防构型治理、供应商重新定型逻辑和面向客户的证据打包上，原生能力更弱。
  sourceRefs:
  - 33
regulatoryTechnicalConstraints:
- point: 受 ITAR 管控的技术数据，会直接限制托管、数据共享和跨境支持模式。
  sourceRefs:
  - 34
- point: NIST SP 800-171 合规把非联邦国防承包商系统处理 CUI 的底线抬高了。
  sourceRefs:
  - 18
- point: 防空与导弹防御项目在加速开发和实装时，正承受更强的领先实践要求。
  sourceRefs:
  - 35
- point: 反无人机项目从原型走向生产时，需要的证据和就绪性治理，会比原型工作流原本承载的更正式。
  sourceRefs:
  - 7
  - 1
validationSignals:
- point: Furientis 表示，产能和可规模化的低成本弹药已经等不起了 [13]。
  sourceRefs:
  - 13
- point: Anduril 表示，它大约用 18 个月就把一套反无人机方案从原型推到了 DIU production OT [1]。
  sourceRefs:
  - 1
- point: Epirus 专门为了把 Leonidas 产能超规模化而完成了一轮大融资 [9]。
  sourceRefs:
  - 9
- point: Lockheed 已经明确把导弹产出表述成“弹药加速”和“生产爬坡” [16][17]。
  sourceRefs:
  - 16
  - 17
- point: RTX、Northrop 和 L3Harris 都把火箭发动机与导弹扩产列为战略优先级 [28][19][14]。
  sourceRefs:
  - 28
  - 19
  - 14
openQuestions:
- 一个放行编排 overlay 的预算，究竟掌握在谁手里：制造副总裁、构型管理负责人，还是项目运营负责人？
- 滩头项目上的月度飞测变化，实际有多高比例会逼出供应商重新定型，而不是只在内部工程里收口？
- 第一版产品能不能靠部分非密数据把价值跑出来，还是买方一上来就会要求和更敏感的工程系统深度集成？
- 有融资的拦截弹创业公司会不会接受一个全新的软件品类，还是会坚持把这套工作流塞进 Palantir、PLM 或现有数字主线合同里？
