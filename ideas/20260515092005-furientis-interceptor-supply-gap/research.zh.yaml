  validationPlan:
  - priority: high
    question: 制造负责人会不会为一个独立的放行编排层买单，还是只会接受它作为现有平台之上的 overlay？
    evidenceToGather: 采访 8-10 位正在进入 LRIP 的拦截弹/效应器项目制造或构型负责人，把最近 3 次 release-board 周期里的人工时和延期成本量出来。
  - priority: high
    question: 每月飞测带来的新发现，实际有多频繁会逼出供应商重新定型、批次隔离或作业指导书变更？
    evidenceToGather: 至少从 3 个项目拿到真实的工程变更包，逐项映射“变了什么、谁批了、放行花了多久”。
  - priority: medium
    question: 产品能不能先落在部分非密工作流里，同时把价值跑出来？
    evidenceToGather: 先在 release-board 准备和证据打包上做一轮 design partner 部署，不直接吃进最敏感的设计数据。
  - priority: medium
    question: 在第一次 6 周实施里，最硬的现有系统依赖到底是哪一个？
    evidenceToGather: 分别给一个 Teamcenter/Windchill 环境和一个 Palantir/Tulip 风格的运营栈做原型连接器，量出第一次 live lot 的落地时间。
