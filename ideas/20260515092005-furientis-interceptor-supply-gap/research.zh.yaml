  sensitivityCases:
  - case: 生产授标或 OT 后续延后 12-18 个月
    impact: 负面：痛点还在，但紧迫度和预算会从项目级刚需掉回“可有可无的数字化转型”。
    sourceRefs:
    - 1
    - 9
    - 10
  - case: 现有厂商把“够用”的放行看板打包进已有 PLM 或平台合同
    impact: 负面：如果创业公司证明不了自己能显著更快地让审批过关，ACV 和差异化都会被压缩。
    sourceRefs:
