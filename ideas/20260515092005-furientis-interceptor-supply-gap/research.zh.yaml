    - 24
    - 23
    - 33
  - case: 导弹和反无人机补库比预期更快加速
    impact: 正面：每新增一条爬坡产线，可审计放行编排的价值都会更高，因为设计扰动、供应商变化和吞吐压力会一起叠加。
