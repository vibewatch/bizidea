slug: interceptor-ramp-readiness-os
date: '2026-05-15'
executiveSummary: Interceptor Ramp Readiness OS 是一层站在供应商侧的放行编排系统，服务对象是那些正从高频飞测走向首条低速量产线的美国反无人机拦截弹团队。最急的痛点不是通用 PLM 记账，而是每次测试事件之后，工程、制造、质量、供应商和项目团队得花上几天甚至几周，手工判断下一批次到底还能不能放。MVP 先落在一个拦截弹型号族和一块放行委员会上，把每个测试新发现映射成 BOM 变化、供应商重新定型任务、作业指导书更新和政府证据包。第一批买方会是未来两个季度内就要面对 production OT、LRIP 关卡或测试后设计更新的 COO、制造副总裁或 GM。GTM 以创始人直销为主，只打大约 30 个可触达的美国项目，并接入现有 PLM 和 MOM 栈，让产品先做补层，不做 rip-and-replace。研究测得滩头 SAM 为 $13.5M、第 3 年 SOM 为 $2.4M，所以这笔生意能不能成立，关键取决于：先用一个关键工作流站住，再向火箭发动机、相邻弹药和盟友工厂扩张。只要它拿下现有厂商没协调好的那层放行决策层，并持续沉淀“哪类变更模式过审最快”的数据，它就有赢面。现在最大的未解问题是：制造负责人会不会愿意买一个独立 overlay；月度测试变化到底有多频繁会逼出供应商重新定型；以及在更深的安全集成之前，能不能先靠部分非密部署把价值证明出来。
problem:
- PLM 导出、表格、供应商邮件和豁免评审拼出来的手工变更委员会，让团队很难把一次月度飞测后的设计变化快速变成获批的生产批次。
- 库存压力、固体火箭发动机瓶颈和政府就绪性评审，让每一次批次放行延误都要在进度可信度、产线吞吐和合同时点上付出高代价。
solution:
- 一套安全控制平面会把每次测试事件或供应商变化，直接转成受治理的批次放行工作流，里面带着 BOM 变化、重新定型任务、作业指导书更新和证据缺口。
- 第一条工作流刻意收窄：只盯一个拦截弹型号族、一块放行委员会和一套生产就绪性材料包，不替换客户现有的 PLM、MES 或 QMS 栈，也能把下一次批次放行往前拉几天。
whyWeWin:
- 现有的 PLM、ALM、MOM 和数据平台厂商虽然握着相邻记录，但它们并不会原生回答一个国防专属问题：一个被改过的批次，现在到底能不能放。
- 每多经过一个批次，系统就会多沉淀一层专有图谱：测试新发现、供应商影响、审批路径和放行结果之间是怎么连的。这个东西越滚越厚，通用工具或单一 OEM 就越难复制。
strategicChoices:
  beachhead: 美国反无人机拦截弹项目里，那些至少完成了 6 次飞测，并会在未来两个季度内面对低速量产爬坡或 production OT 评审的团队。
  wedgeRationale: 最快能证明价值的，不是宽口径数字主线软件，而是一条痛得发狠的 release-board 工作流：一旦决策滑掉，就会直接卡住真实批次，把表格协同的成本赤裸裸地暴露出来，而且节省了多少天可以直接量。
  sequencingRationale: 先在一个拦截弹型号族上，用非密或轻受控的 overlay 起步；等团队把周期压缩跑出来，再加更深的 PLM 和供应商集成。原因很简单：在 lighthouse workflow 出现之前，安全部署和集成负担太重，根本不值得先解。
  notYet:
  - 现在先别讲“覆盖所有工作流的国防工厂操作系统”这种大话。
  - 在还没证明 release-board 准备和证据打包的价值之前，先别做全量涉密系统接入。
  - 先不扩到商业航天或非国防制造。
market:
  tam: $48.0M
  sam: $13.5M
  som: $2.4M
  segments:
  - 正在进入 LRIP 的美国反无人机和短程拦截弹制造商
  - 相邻的固体火箭发动机与精确弹药产线
  buyingProcess: 这笔交易大概率会由弹药项目的 COO、制造副总裁或 GM 发起，但构型管理、质量、安全和企业架构团队都会影响采用，因为这条工作流会碰到 CUI、供应商数据和现有系统。最现实的切入口，不是自上而下的数字化转型预算，而是围绕某个真实生产就绪性里程碑去卖一轮付费试点。
product:
  mvp: MVP 只覆盖一个拦截弹型号族和一块放行委员会。它吃进测试事件变化，以及导出的 PLM、供应商和作业指导书数据，然后给下一批次吐出一个可放行判断、一张缺失证据清单和一份可审计材料包。
  sixMonth: 交付 release-board 工作台、evidence-packet 生成器、批次谱系，以及面向一个 PLM 系统和一个运营栈的首批连接器。
  twelveMonth: 在至少两个活跃项目里跑出生产级使用，补上供应商协同和偏差跟踪，并把本地化或 air-gapped 部署模式打磨扎实。
  twentyFourMonth: 从单型号族放行编排，扩到多项目工厂视图、火箭发动机和相邻弹药工作流，以及审批周期表现基准。
  keyBets:
  - 在更深的涉密集成之前，部分非密 overlay 就能证明可量化价值。
  - 只要有一条工作流能把“测试到批次放行”的时间缩短至少 30%，就足以压过“和现有厂商重叠”的质疑。
  - 跨项目沉淀下来的放行结果数据，最终会长成一个有防御力的 benchmark 产品，而不只是实施副产物。
gtm:
  wedge: 由创始人亲自打单，先拿下一个正面临紧迫批次放行里程碑的制造负责人；付费试点只围绕一个拦截弹型号族的下一次 release board。
  channels:
  - 创始人直接卖给工业化、制造和项目运营负责人
  - 通过 Palantir、Siemens、PTC、Tulip 和国防制造集成商做集成型引荐
  - 在原型转生产触发点足够明确的国防创新、OTA 和 production-transition 生态里找线索
  funnelTargets: 目标账户→合格试点 20-30%，合格试点→付费试点 50%+，付费试点→年度生产合同 60%+，首个项目→第二项目扩张 12 个月内 30%+
  pricing: 先围绕一条真实放行工作流收付费试点费，再转成按拦截弹型号族收取的年度订阅费，外加上线和集成费用。定价基准不是席位数，而是一次批次放行延误和手工就绪性劳动的成本。
businessModel:
  revenueStreams:
  - 按活跃拦截弹型号族或生产项目收年度平台订阅费
  - 上线、集成和安全部署服务
  - 供应商协同、审计报告和多项目分析高级模块
  unitOfValue: 用平台做批次放行决策的活跃拦截弹型号族或弹药项目
  targetGrossMarginPct: 70
  expansionLevers:
  - 同一客户内新增拦截弹型号族或弹药项目
  - 供应商协同和对外证据共享工作流
  - 美国切口跑通后，扩到火箭发动机、相邻弹药和盟友工厂部署
strategyMap:
  northStarMetric: 通过平台放行、且证据包完整的获批生产批次数
  inputMetrics:
  - 从测试事件到批次获批放行的天数
  - 由测试和供应商变化自动生成的放行任务占比
  - 试点转生产合同的转化率
  - 部署后到首个 live lot 的时间
  - 从首个项目扩到第二个项目的扩张率
  moatsToBuild:
  - 把测试新发现和供应商、BOM、作业指导书、证据影响连起来的历史图谱
  - 面向重新定型、偏差和 release-board 审批的国防专用工作流模板
  - 符合 ITAR 与 NIST 800-171 约束的嵌入式集成和部署模式
  killCriteria:
  - 10 个目标买方里，不到 3 个确认“批次放行延误”足够痛，值得专门拨预算。
  - design partner 上线后 9 个月内，没有一个付费试点转成年度生产合同。
  - 连续两轮试点里，到首个 live lot 的时间都超过 8 周，原因是必需集成过重。
  mermaid: |
    flowchart LR
      Wedge[单一拦截弹型号族放行委员会] --> MVP[测试到批次编排 MVP]
      MVP --> Proof[更短放行周期与可审计证据]
      Proof --> Expansion[更多项目、供应商与弹药产线]
investorMemo:
  verdict:
    call: 观察
    conviction: 痛点和切口都很清楚，但初始市场偏窄，买方预算行为还没有被证明。
    whyBelieve: 月度测试节奏、产能爬坡压力，以及现有工作流的空白，共同打开了一条可信的窄放行决策层切口。
    whyDoubt: 滩头市场规模不大，而采购、安全和现有平台重叠，可能会让一个独立品类跑不出足够快的扩张速度。
    nextDiligence: 先拿下一个 design partner，把 release-board 延误量清楚，并证明付费试点能在真实项目上把“测试到批次放行”的时间压下来。
  firstCustomer:
    title: 一家有风投支持、正进入 LRIP 的反无人机拦截弹项目里的制造副总裁
    profile: 一家 75-400 人规模的美国国防制造商：至少做成了 6 次飞测，有一个活跃军种或 OTA 关系，并会在一个季度内迎来批次放行评审。
    trigger: 测试后的设计更新或一次生产就绪性关卡，会逼着团队证明每个受影响的零件、发动机批次、供应商和作业指导书现在都仍然合格。
    buyer: 该弹药项目的 COO、制造副总裁或 GM
    initialContract: 先签一轮 $75k-$150k 的付费试点，覆盖一个 release-board 周期；如果这条工作流成为生产批次的 system of record，再转成每个型号族每年 $300k-$500k 的平台合同，并另收上线费用。
  mustBeTrue:
  - 目标项目在测试或供应商变化之后，确实会出现高频、跨部门的放行工作，而不只是内部工程更新。
  - 只要能在真实项目上把放行周期压缩至少 30%，经济买方就愿意为一个 overlay 产品拨预算。
  - 第一轮部署可以先靠导出数据或部分非密数据证明价值，而不必一上来就做深度安全集成。
  - 现有的 PLM、MOM 和 Palantir 式平台，没法在现有合同里通过简单配置解决同一个问题。
  - 拿下一个拦截弹型号族后，能在 12-18 个月内可信地扩到火箭发动机或相邻弹药的第二项目。
  diligenceQuestions:
  - 目标项目最近 3 次批次放行延误分别是什么，分别烧掉了多少人力或进度？
  - 第一次销售里，究竟是哪位高管真正掌控放行编排 overlay 的预算？
  - 在不吃进最敏感设计数据的前提下，支持第一次 live 放行决策的最小数据集到底是什么？
  - 实际工作里，测试变化有多频繁会逼出供应商重新定型、批次隔离或作业指导书重写？
  - 第一次 6 周部署里，哪一个现有系统集成是硬依赖，又有多少依赖可以绕开？
operatingAssumptions:
- assumption: 只要付费试点和真实 release-board 里程碑绑在一起，制造负责人就会愿意买单，而不是把它当成泛软件现代化项目。
  basis: research.yaml
  validationTest: 采访 8-10 位正在进入 LRIP 的制造或构型负责人，并围绕明确的即将到来的放行事件拿到至少 2 份 pilot LOI。
  decisionImpact: 如果不成立，公司就得改走现有平台、集成商或服务驱动渠道，而不是继续靠创始人直销。
- assumption: 只靠部分非密部署，也能在不全量吃进 ITAR 管控技术数据的前提下，把放行周期压下来。
  basis: research.yaml
  validationTest: 和一个 design partner 跑一轮试点，只用导出的变更包和 evidence-pack 工作流，并验证至少一个 live lot 能端到端跑完。
  decisionImpact: 如果不成立，实施成本和销售周期都会显著抬升，客户范围会更窄，融资方案也会更偏重服务。
- assumption: 单一拦截弹型号族的工作流一旦在生产中跑通，就能支撑每年 $300k-$500k 的软件价值。
  basis: idea.yaml
  validationTest: 在试点中量化节省的人力、避免的延误和减少的审计材料准备时间，支撑这一价位带的 ROI 转化方案。
  decisionImpact: 如果不成立，公司就得靠多工作流打包或更低价扩展产品来补，这会拖低毛利并拉长回本。
- assumption: 第一个 lighthouse win 会在 12-18 个月内向相邻项目、供应商或弹药产线扩张。
  basis: research.yaml
  validationTest: 跟踪前两个客户是否至少各自有一个共享供应商或同类放行治理痛点的相邻项目，并在首个生产合同后一年内拿下一单扩张销售。
  decisionImpact: 如果不成立，venture case 会被压缩，因为滩头 SAM 和 SOM 都太小，撑不起超额回报。
experimentRoadmap:
- horizon: 0–90 天
  experiment: 访谈并量化滩头账户里的 release-board 痛点
  hypothesis: 目标买方会报出足够重复、且跨部门人工成本够高的延误，足以支撑付费试点。
  successMetric: 完成 10 次访谈、量出 3 次放行延误，并围绕具名生产里程碑拿到 2 份 pilot LOI
  owner: 创始人/CEO
- horizon: 0–90 天
  experiment: 基于导出的客户数据做 release-board 原型
  hypothesis: 产品在不替换现有系统的前提下，也能产出可信的可放行清单和证据包。
  successMetric: 原型吃进一份真实变更包，并为一个真实或近期批次吐出全部所需任务和缺失证据
  owner: 创始工程师
- horizon: 90–180 天
  experiment: 试跑一条真实的拦截弹型号族工作流
  hypothesis: 系统能在第一个 design partner 身上，把“测试到批次放行”的时间至少压缩 30%。
  successMetric: 实测周期缩短 30%+，并从第一块 live release board 拿到正向买方背书
  owner: 前线部署工程师
- horizon: 90–180 天
  experiment: 验证安全部署模式
  hypothesis: 本地化或 air-gapped 部署选项能在 6 周内装好，不需要一次性的定制架构。
  successMetric: 第二个试点里，到第一个 live lot 的时间低于 6 周
  owner: 安全负责人
- horizon: 6–12 个月
  experiment: 测试集成驱动的渠道动作
  hypothesis: 在这个窄市场里，Palantir、PLM 或制造集成商带来的机会会比纯 outbound 更热。
  successMetric: 拿到 3 个由伙伴引入的合格试点，并至少关单 1 个生产合同
  owner: 创始人/CEO
- horizon: 6–12 个月
  experiment: 测试向相邻弹药工作流扩展
  hypothesis: 同一套证据模型只需很有限的产品改造，就能从一个拦截弹型号族扩到火箭发动机或相邻弹药的放行治理。
  successMetric: 现有客户接受 1 份第二项目扩张提案
  owner: 产品负责人
operations:
- 从第一天起就按美国优先部署：托管考虑 ITAR，审批按角色拆，控制满足 NIST 800-171。
- 准备一套面向导出式 PLM、ALM、MOM、供应商和靶场数据的集成工具包，让试点不必等系统全量替换。
- 沉淀标准 release-board 模板，覆盖偏差跟踪、重新定型、批次谱系和证据包拼装。
- 实施时保持高触达：每次部署只盯一个具名客户 champion 和一个可量化生产里程碑。
team:
- role: 创始人/CEO
  startTiming: 第 0 个月
  rationale: 滩头市场高度集中，而且强依赖信任，所以创始人必须亲自抓销售、国防 design partner 拓展和伙伴关系。
- role: 创始工程师
  startTiming: 第 0 个月
  rationale: 要在前两个季度内支撑起 live pilot，就得尽快把工作流引擎、证据模型和首批集成搭起来。
- role: 前线部署工程师
  startTiming: 第 2 个月
  rationale: 核心任务是把实施时间压下来，接住客户特有的数据映射，并把试点沉淀成可复制的部署手册。
- role: 制造工作流专家
  startTiming: 第 3 个月
  rationale: 要把国防变更控制、质量和批次放行逻辑编码进产品里，不能让产品只停留在通用 SaaS 假设。
- role: 安全与合规负责人
  startTiming: 第 6 个月
  rationale: 产品要想获得更大项目的信任，先得把安全部署、审计轨迹和出口管制感知控制做好。
milestones:
- horizon: 0–12 个月
  items:
  - 签下 2 个即将迎来生产就绪性里程碑的 design partner
  - 交付覆盖一个拦截弹型号族放行委员会和一条证据包工作流的 MVP
  - 完成第一次 live 试点，并至少把 1 个账户转成年度生产合同
  - 在一个客户工作流里，把“测试到批次放行”的时间压缩至少 30%
- horizon: 12–24 个月
  items:
  - 把活跃生产项目做到 4 个，覆盖拦截弹或相邻弹药产线
  - 上线供应商协同、偏差跟踪和多项目报表模块
  - 在现有客户内拿下第一笔第二项目或火箭发动机工作流扩张销售
  - 把本地化或 air-gapped 部署标准化，到首个 live lot 的时间控制在 6 周以内
- horizon: 24–36 个月
  items:
  - 把活跃项目做到 6 个，对齐研究里的第 3 年 SOM 场景
  - 建立 partner-led 分发，至少有 2 个可重复合作的集成伙伴
  - 从反无人机拦截弹扩到相邻精确弹药或盟友工厂工作流
  - 发布匿名化客户工作流上的放行周期 benchmark 洞察
risks:
- risk: 采购节奏滑坡，目标项目推迟 LRIP 或 production OT 决策。
  likelihood: Medium
  impact: High
  mitigation: 把目标账户收紧到未来两个季度内有明确放行里程碑的团队，只围绕一个紧急 board cycle 打单，不卖长期转型故事。
- risk: 买方认为现有的 PLM、MOM 或平台合同已经够用了。
  likelihood: High
  impact: High
  mitigation: 先在一个真实批次上把周期压缩的结果量出来，再把产品定位成缺失的放行决策层，而不是替代 system of record。
- risk: ITAR、CUI 和 air-gapped 部署要求，把实施拖得太慢、太重服务。
  likelihood: High
  impact: High
