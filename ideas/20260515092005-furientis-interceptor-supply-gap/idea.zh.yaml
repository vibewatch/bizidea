topRisks:
- name: 采购节奏风险
  description: 早期拦截弹供应商的试点预算可能仍然起伏很大，正式生产授标也可能延后，这会拖慢最初的销售周期。
  mitigation: 盯住那些已经要进低速量产评审的团队，把销售锚定在近端的批次放行里程碑上，而不是抽象的数字化转型。
- name: 涉密工作流阻力
  description: 如果新系统不能运行在安全环境里，或者接不上受限的工程数据，国防制造商很可能直接排斥。
  mitigation: 先从非密级的放行委员会工作流切入，支持 air-gapped 部署模式，并优先通过现有的已批准数据导出来集成。
- name: 现有工具重叠
  description: 买方可能会觉得自己的 PLM、MES 或 QMS 已经覆盖了这个问题，从而排斥再上一层软件。
  mitigation: 把产品讲成缺失的跨部门放行决策层；先在一个批次周期缩短上把 ROI 跑出来，再与现有系统集成，而不是替换它们。
