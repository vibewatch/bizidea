problem: 反无人机拦截弹创业公司现在已经能靠高频飞测证明性能，但从原型试制走到可重复的工厂产出，管理方式仍是割裂的 PLM 记录、表格、供应商邮件和豁免评审。机体微调、发动机改动或测试新发现，都会牵动合格零件、批次追溯、作业指导书和政府证据包。库存压力一上来，真正卡住产能的就不是设计本身，而是怎么把测试驱动的设计变更变成获批的生产放行，同时不砸掉合规和良率。
targetUser:
  primary: 75-400 人规模、正在打造首条年产 100-1,000 枚产线的美国国防创业公司里，负责短程反无人机拦截弹或效应器项目的制造副总裁或工业化负责人
  secondary: 负责工程变更、供应商审批和批次谱系的构型管理负责人或质量总监
  buyer: 高速扩张中的拦截弹供应商里，负责弹药项目的 COO、制造副总裁或 GM
startupThesis:
  nonObviousInsight: 低成本拦截弹最难的地方，已经不只是造出更便宜的导弹。项目一旦进入 4 周设计周期、月度飞测，最稀缺的能力就变成：能不能足够快地把每一次测试带来的变化，翻成合格供应商更新、工厂更新和证据更新，从而撑住高节拍产出。谁拿下这层“变更到放行”的基础设施，谁就有机会成为下一代弹药制造的关键底座。
  beachhead: 美国反无人机拦截弹项目里，那些刚从高频原型测试切到首条低速初始生产线的团队，需要工程变更与批次放行编排。
  wedge: 一套安全的“测试到工厂就绪”系统：在放出新生产批次前，把每次飞测新发现映射到 BOM 变化、供应商重新定型任务、作业指导书更新和政府证据包。
  whyNowCatalyst: Furientis 的成本目标、月度测试节奏、自建发动机能力，以及与海军和陆军的早期关系，都说明市场正在从精致但小批量的拦截弹原型，转向眼下就得解决的高节拍制造。
  ventureScalePath: 先拿下一个反无人机拦截弹型号族，再扩到巡飞弹、固体火箭发动机产线，以及多项目国防工厂，最终成为更广义精确弹药工业底座里负责变更控制、批次就绪和供应商定型的 system of record。
solution: 产品夹在工程、制造、质量和政府项目团队之间。它吃进测试事件、构型变化、供应商状态和工艺变更，然后给每个批次产出一个统一的放行判断：哪里变了、哪些地方要重新定型、缺了什么证据、产线能不能安全出货。过去项目经理得在邮件和表格之间手工跑变更委员会；现在系统会直接生成国防场景下的工作流，比如替代料审批、发动机批次追溯、偏差跟踪和面向客户的生产证据包。最先落地的场景很窄，但痛得最深：把一次月度飞测和下一个获批生产批次之间的天数压下来，而且先只服务一个拦截弹项目。时间一长，系统沉淀下来的数据图谱会变成专有基准：哪些供应商、工艺变化和测试模式，真的能在不抬高失效率的前提下，把弹药产出拉起来。
goToMarketSeed:
  firstCustomer: 一家美国反无人机拦截弹创业公司，或一家中型导弹供应商：至少已经完成 6 次成功飞测，有一个活跃的海军或陆军试点关系，并计划在未来两个季度内启动低速量产爬坡。
  buyingTrigger: 一场生产就绪性评审、OTA 授奖，或一次测试后的设计更新，逼着团队在放出新批次时证明：每个受影响的供应商、发动机和作业指导书仍然处于合格状态。
  currentAlternative: PLM 和 MES 系统，再加表格、共享盘、手工豁免委员会以及工程变更会议。
  switchingReason: 这个切口不是替换核心工程系统，而是把最慢的跨部门一步压缩掉——把每个测试发现直接翻成受治理的生产放行工作流，并把它和批次证据、供应商状态绑在一起。
  pricingHypothesis: 按每个活跃拦截弹型号族收年费平台费，外加实施和集成费用；后续扩容则按生产批次、供应商席位或新增弹药项目计费。
