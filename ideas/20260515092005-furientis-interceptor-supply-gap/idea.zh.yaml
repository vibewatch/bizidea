jobsToBeDone:
- job: 当一次飞测让我们的拦截弹某个子系统发生变化时，帮制造团队把所有要更新的供应商、作业指导书和证据包一次性找全，这样下一批次就能放出去，不会被突如其来的合规问题绊住。
  currentAlternative: 在 PLM 导出、表格和邮件线程之间手工跑工程变更委员会
  successMetric: 从测试事件到生产批次获批放行的天数
- job: 当采购方追问我们能不能安全放大量产时，帮项目团队把哪些零件、发动机批次和供应商已经定型讲清楚，好让我们更有把握拿下下一轮生产增量。
  currentAlternative: 静态 PowerPoint 更新、临时拼的就绪性材料包，以及人工供应商状态审查
  successMetric: 拼出一套生产就绪性证据包所需的时间
