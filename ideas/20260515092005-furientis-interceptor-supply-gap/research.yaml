openQuestions:
- 'Which exact functional owner controls budget for a release-orchestration overlay: VP Manufacturing, configuration management, or program operations?'
- How often do monthly flight-test changes on beachhead programs actually force supplier requalification versus internal-only engineering updates?
- Can the first product prove value using partially unclassified data, or will buyers demand deep integration with more sensitive engineering systems immediately?
- Will venture-backed interceptor startups tolerate a new software category, or will they insist the workflow ride inside Palantir, PLM, or incumbent digital-thread contracts?
