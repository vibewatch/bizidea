  validationPlan:
  - priority: high
    question: Will heads of manufacturing buy a standalone release-orchestration layer, or only an overlay sold through an incumbent platform?
    evidenceToGather: Interview 8-10 manufacturing or configuration leaders at interceptor and effector programs entering LRIP and quantify the last three release-board cycles in labor hours and delay cost.
  - priority: high
    question: How often do monthly test findings actually force supplier requalification, lot segregation, or work-instruction changes?
    evidenceToGather: Collect real engineering-change packets from at least three programs and map what changed, who approved it, and how long the release took.
  - priority: medium
    question: Can the product land in a partially unclassified workflow first and still prove value?
    evidenceToGather: Pilot a design-partner deployment on release-board prep and evidence packaging without ingesting the most sensitive design data.
  - priority: medium
    question: Which incumbent system is the hardest dependency in the first six-week implementation?
    evidenceToGather: Prototype connectors to one Teamcenter/Windchill environment and one Palantir/Tulip-style operations stack; measure time-to-first-live-lot.
