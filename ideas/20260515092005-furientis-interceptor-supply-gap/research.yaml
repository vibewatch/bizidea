reportMemo:
  executiveTakeaways:
  - 'Interceptor makers are explicitly optimizing for throughput, not just performance: Furientis says production capacity is decisive, Anduril is building Arsenal-1 for tens of thousands of systems per year, and Epirus raised capital to hyperscale Leonidas production [12][13][2][9].'
  - 'The real choke point is governance between test findings and approved lots: GAO flags the need for stronger leading practices in air and missile defense while PLM, ALM, and MOM incumbents still split engineering, software, and factory execution across separate systems [35][32][31][30][24][21][23][22].'
  - 'Competition is adjacent rather than direct: Palantir, Siemens, PTC, and Tulip already sell into defense or industrial workflows, but none is natively organized around a monthly flight-test-to-lot-release decision for munitions programs [27][26][25][32][30][24][33].'
  - The beachhead software TAM is modest on its own, so the venture case depends on expanding from counter-UAS interceptors into rocket motors, adjacent munitions, and allied factories once the startup owns the release-decision layer [4][2][11][16][19][14].
  marketDefinition: 'Supplier-side release-orchestration software for U.S. counter-UAS interceptor, short-range air-defense, and related solid-rocket-motor programs: a control plane that converts flight-test changes, supplier substitutions, and process deviations into one auditable lot-release decision. It sits above PLM/ALM/MOM and below final government acceptance, with the first wedge in teams moving from prototype cadence to low-rate production [12][13][35][1][9][32][31][30].'
  customerAndBuyer: Primary daily users are configuration-management leads, manufacturing engineers, quality directors, and industrialization teams that have to clear the next lot after every test event or supplier change. The economic buyer is usually the COO, VP Manufacturing, or GM of a munitions program because the problem directly affects schedule, contract credibility, and output volume [12][13][3][1][9][16][17].
  buyingTriggers:
  - point: A production OT, low-rate initial production gate, or post-test design update forces the team to prove every affected part, supplier, and work instruction is still releasable.
    sourceRefs:
    - 12
    - 35
    - 1
    - 9
    - 10
  - point: A solid-rocket-motor, component, or dual-source initiative exposes how much manual requalification and supplier coordination still sits outside the system of record.
    sourceRefs:
    - 6
    - 20
    - 4
    - 28
    - 14
  - point: Counter-UAS demand or air-defense replenishment pressure makes one slipped release board materially expensive.
    sourceRefs:
    - 7
    - 5
    - 8
    - 15
    - 29
  willingnessToPay:
    summary: 'Budget exists in adjacent categories: manufacturers are already funding production acceleration and digital-thread infrastructure, while Palantir, Siemens, PTC, and Tulip sell workflow, traceability, and manufacturing software into complex industrial environments. The likely pitch is not greenfield spend but saving one high-stakes lot release or production review inside an existing program budget [27][26][32][30][24][23][22][33][16][17][28].'
    sourceRefs:
