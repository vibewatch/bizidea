modelDiagram:
  title: "unit economics flow"
  mermaid: |
    flowchart LR
      TargetAccounts --> DesignPartners
      DesignPartners --> PaidPilots
      PaidPilots --> ProductionPrograms
      ProductionPrograms --> ExpansionPrograms
      ProductionPrograms --> SubscriptionRevenue
      ExpansionPrograms --> SubscriptionRevenue
      SubscriptionRevenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: "Revenue engine"
    finding: "Base-case revenue is driven by a rise from 2 paid programs in Y1 to 6 active programs by Q4Y3 while blended annual program value matures from $150K pilots to $400K production contracts."
  - checkName: "Must go right"
    finding: "Secure deployments must become template-led fast enough for gross margin to move from sub-50% pilot work to roughly 74-75% by Y3 without adding delivery headcount faster than revenue."
  - checkName: "Model breaks if"
    finding: "The downside case turns cash negative if production awards slip or buyers cap spend near pilot pricing, because the model only has six logos by Y3 and concentration risk is high."
  - checkName: "Next-round proof"
    finding: "The seed story is strongest once Q4Y2 exits with 4 active production programs, the first second-program expansion, and a repeatable sub-six-week secure deployment motion."
sanityChecks:
  ruleOf40: "Y3 growth 116.7% + EBITDA margin -5.2% = 111.5%"
  burnMultiple: "Y2 burn multiple is about 0.8x ($692K burn / $900K net-new ARR), improving to about 0.1x in Y3 ($112K burn / $1.2M net-new ARR)."
  revenuePerFte: "$270.8K Y3 (benchmark $200-400K defense workflow SaaS)"
  flags:
    - "The base case is still slightly EBITDA-negative in Y3, so the company likely starts a seed process before broad adjacent-munitions expansion."
    - "Only 6 active programs by Q4Y3 means one delayed renewal or one slipped production award would materially change the topline."
    - "Gross margin assumes exported-data and evidence-packet deployments become repeatable; fully bespoke air-gapped integrations would pull margins below target."
