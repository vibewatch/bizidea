problem: AI 编码工具正在把依赖问题从“我们现有依赖图里有没有漏洞”改写成“这周又有多少净新增包进了依赖图”。安全团队和平台团队如今要面对一波又一波 AI 生成的 PR：里面塞进了陌生的开源包，速度快到人工根本审不过来，而真正会在落地前彻底评估依赖的组织还不到 40%。现有 SCA 工具最擅长的是包已经进仓库、甚至已经装到开发者电脑之后再报警，但真正该守的关口，是新依赖第一次出现在 PR 里的那一刻。没有包引入工作流，AI 编码工具一次错误推荐，就会默认变成生产策略。
targetUser:
  primary: 一家 AI 原生 B2B 软件公司的平台安全负责人；团队每天要合入几十个 AI 辅助生成的 PR。
  secondary: 负责内部包标准和 CI 策略的资深平台工程师。
  buyer: VP Engineering 或产品安全负责人。
startupThesis:
  nonObviousInsight: 新冒出来的瓶颈，不只是把扫描做得更准，而是要管住 AI 编码工具带来的新依赖采用速度。代码生成越来越便宜之后，选哪个包本质上变成了一个采购流程，真正该控的点也前移到了依赖第一次被提进 PR 的那一刻。
  beachhead: Series B-D 的 AI 原生 SaaS 公司，工程师规模在 150-600 人之间，使用 monorepo，已经正式铺开 Cursor 或 Copilot，但平台安全团队很小，现在还靠 Slack 或 code review 去审批高风险包。
  wedge: 一个 GitHub 原生的依赖引入闸门：它会识别 PR 里每个第一次出现的包，自动生成 provenance 和行为简报，给出已批准替代项，并在策略负责人批准或拒绝前阻止合并。
  whyNowCatalyst: 这组信号说明，AI 驱动开发正在加速放大依赖风险，企业买家已经在为开发者优先的供应链工具付费，而决策窗口最短只有 6 分钟——逼着团队必须把包审批前移到 PR 本身。
  ventureScalePath: 先从 code review 里净新增开源包的审批层做起，再扩成一套开源采购系统，覆盖组织级 allowlist、内部包目录、制品镜像、许可证策略，以及所有第三方代码进入 SDLC 时可供保险级审计追溯的轨迹。
solution: 产品接入 GitHub、GitLab 或 Bitbucket，持续盯住整个组织里 manifest 和 lockfile 的 diff，专门抓第一次出现的依赖新增。只要 PR 引入新包，系统就会自动拼出一份给审查者看的简报：维护者历史、发布节奏异常、混淆或 install-script 风险、公司内部使用上下文，以及公司里已经存在的一个或多个获批替代项。安全团队可以一次批准全组织复用、带理由拒绝，或者把依赖先放进临时隔离分支做更深测试。整个流程就是给小平台安全团队设计的：不用每个包都从零查起，他们只需要维护策略模板和内部可信目录，而这套目录会随着每次决策持续复利。再往后，同样的简报还能回流到 Cursor、Copilot 和内部编码 Agent，让开发者在开 PR 之前就先看到更安全的包建议。
goToMarketSeed:
  firstCustomer: 首个客户应该是一家 200-400 人规模的 AI 原生 B2B SaaS 公司：在共享 monorepo 里使用 Cursor 或 Copilot，平台安全工程师只有 1-3 人，但 AI 辅助编码已经频繁引入全新的 JavaScript 或 Python 包。
  buyingTrigger: 触发购买的通常是 AI 编码铺开后的安全复盘、一次和陌生包有关的险情，或同业压力——比如看到 Anthropic、Cursor、Vercel 已经在买依赖安全工具。
  currentAlternative: 现有替代方案通常是 Socket 或 Snyk 在 CI 里报警、Slack 里人工审批、Excel allowlist，以及“尽量用常见包”这类没有执行力的一刀切规则。
  switchingReason: 现有工具大多是在依赖已经进图之后才告诉团队有风险；这个产品把第一次采用新包改成一个快速、可复用的审批流程，还顺手给出 provenance 证据和更安全的替代建议。
  pricingHypothesis: 按受保护工程师席位收年费的平台订阅，再叠加净新增包审查量、策略自动化和内部包目录集成的高级用量档。
