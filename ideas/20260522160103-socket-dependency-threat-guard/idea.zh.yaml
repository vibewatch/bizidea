topRisks:
- name: 现有厂商捆绑
  description: 现有依赖安全厂商完全可能补上一套基础 PR 审批工作流，在公司还没做出品牌前就把这个切口压扁。
  mitigation: 不要只拼扫描，而要在工作流深度、替代推荐和内部目录复利上赢；同时尽早锁定共创客户。
- name: 审查摩擦引发反弹
  description: 如果这道闸门拖慢 merge，或者制造出很多噪音和误报，工程师与买家都会绕开它，甚至把策略降回只审计不拦截。
  mitigation: 先用 advisory mode 上线，提供一键批准，并把生成审查结果的 SLA 压紧；等信任建立后再逐步扩 blocking 规则。
- name: AI 原生团队之外紧迫性不足
  description: 传统软件团队可能还没强烈感受到包引入的痛点，在出现一次看得见的事故前，不愿意再买一层新控制。
  mitigation: 前两年只盯正式铺开编码助手的 AI 原生软件公司，用它们的包引入量数据证明 ROI。
