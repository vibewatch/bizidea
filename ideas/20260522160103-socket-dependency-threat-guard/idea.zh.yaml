jobsToBeDone:
- job: 当 AI 编码工具开始每天往代码仓里塞进陌生包时，帮平台安全团队只放行真正安全的那些，这样团队既能继续快跑，也不会让高风险代码顺手变成标准技术栈的一部分。
  currentAlternative: CI 扫描器，加 Slack 线程和临时的 code-review 评论
  successMetric: 90% 的净新增包，都能在 merge 之前拿到一份有记录的批准或拒绝决定。
- job: 当开发者为了高优先级功能提议引入一个新依赖时，帮团队迅速找到已经获批的替代项或安全路径，这样发版节奏就不会卡在一次时间压力下做出的高风险开源决策上。
  currentAlternative: 人工查包，或者直接照抄 AI 编码助手给的建议
  successMetric: 在降低高风险批准率的同时，把第一次审查新包的中位处理时间压在 1 个工作日以内。
