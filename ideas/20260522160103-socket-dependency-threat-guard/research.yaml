    - 87
  - factor: social
    impact: positive
    point: Developers widely use AI tools but remain frustrated by almost-right outputs, which raises tolerance for guardrails around dependency choices.
    sourceRefs:
    - 112
  - factor: technological
    impact: positive
    point: Registry provenance and attestations make dependency trust evidence more machine-readable than it was a few years ago.
    sourceRefs:
    - 120
    - 74
  - factor: legal
    impact: positive
    point: The EU CRA increases pressure for lifecycle vulnerability handling and clearer evidence about software components.
    sourceRefs:
    - 19
  adoptionFrictionMatrix:
  - friction: Blocking merges can create developer backlash if the review brief is noisy or slow
    severity: high
    affectedBuyer: VP Engineering and engineering managers
    mitigation: Launch in advisory mode, auto-approve trusted packages, and keep approval SLA below one business day.
    sourceRefs:
    - 112
    - 24
  - friction: Existing AppSec tooling overlap makes buyers ask why this is not just another scanner
    severity: high
    affectedBuyer: Head of Product Security
    mitigation: Position the product as package procurement workflow and reusable policy memory, not vulnerability scanning.
    sourceRefs:
    - 86
    - 108
    - 17
  - friction: Ecosystem and private-registry complexity can make package identity and approval logic messy
    severity: medium
    affectedBuyer: Staff platform engineer
    mitigation: Start with GitHub, npm, and PyPI; add private-registry and transitive-resolution support through staged integrations.
    sourceRefs:
    - 24
    - 33
    - 120
    - 74
