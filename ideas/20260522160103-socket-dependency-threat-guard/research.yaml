reportMemo:
  executiveTakeaways:
  - The pain is moving upstream from fixing vulnerable packages after adoption to governing whether new packages should enter the repo at all.
  - Incumbents validate budget and urgency, but most still emphasize detection and remediation more than approval workflow memory.
  - A credible wedge exists if the product becomes the policy memory and substitute engine inside the PR, not just another scanner.
  marketDefinition: Developer-security workflow software for governing first-time open-source dependency adoption at pull-request time, especially in AI-assisted software teams.
  customerAndBuyer: Primary users are platform-security and staff platform-engineering teams at AI-native SaaS companies with small security teams and frequent net-new package additions. Economic buyers are VP Engineering and product-security leaders who already own AppSec and secure SDLC budgets.
  buyingTriggers:
  - point: Formal AI coding rollouts increase dependency churn while developers remain skeptical of AI output quality, which makes package review a visible control gap.
    sourceRefs:
    - 112
    - 23
    - 45
    - 115
  - point: Rising malicious-package volume and real-time supply-chain attacks make post-merge review feel too late for security teams.
    sourceRefs:
    - 111
    - 77
    - 106
  - point: Compliance and procurement programs increasingly ask for auditable OSS controls, sanctioned repositories, and lifecycle vulnerability handling.
    sourceRefs:
    - 46
    - 47
    - 48
    - 19
  willingnessToPay:
    summary: 'Buyers already accept per-developer security spend: GitHub Code Security is $30 per active committer per month and Snyk Team starts from $25 per contributing developer per month, so a narrower dependency-intake workflow can be budgeted if it demonstrably reduces manual review time and blocks risky package introductions earlier.'
    sourceRefs:
    - 22
    - 87
  competitiveLandscape: 'Competition is crowded but uneven. GitHub and GitLab own the merge surface, broad AppSec suites own budget lines, and supply-chain specialists own malware and reachability narratives. The proposed startup is strongest if it focuses on a narrow approval workflow: first-time package intake, substitute suggestions, and reusable policy memory.'
  incumbentThesis:
  - incumbentClass: SCM platforms
    point: GitHub and GitLab already sit in the pull-request path, but their current dependency features center on visibility, status checks, and policy primitives rather than deep org-specific package procurement decisions.
    sourceRefs:
    - 24
    - 20
    - 33
    - 39
  - incumbentClass: Broad AppSec suites
    point: Snyk wins on platform breadth and consolidation, which makes it attractive to buyers standardizing AppSec, but that breadth also makes first-time package approval a sub-workflow rather than the core product.
    sourceRefs:
    - 87
    - 86
  - incumbentClass: Supply-chain specialists
    point: Socket and Endor Labs are closest to the threat thesis, but both still lead with package intelligence, malware blocking, reachability, or firewalling more than PR-native approval memory and substitute guidance.
    sourceRefs:
    - 106
    - 104
    - 17
    - 18
  - incumbentClass: Provenance and attestation tooling
    point: npm provenance and PyPI attestations improve integrity evidence, but they do not decide whether a given package should be adopted inside a specific engineering organization.
    sourceRefs:
    - 120
    - 74
  regulatoryLandscape: 'The regulatory pull is indirect but meaningful: U.S. secure-software guidance rewards sanctioned repositories, SCA, and provenance controls, while the EU CRA raises the cost of weak lifecycle vulnerability handling. That makes auditable dependency-intake controls easier to justify during procurement even when no rule explicitly mandates this category.'
  technologyLandscape: The enabling stack is improving quickly. SCMs expose PR checks and status gates, registries are adding provenance and attestations, and standards such as SBOM make trust evidence more machine-readable. The startup should assume the raw signals will commoditize and compete on workflow orchestration and policy memory.
  distributionChannels:
  - point: GitHub and GitLab integration-led distribution is credible because dependency review, approval policies, and status checks already exist inside the PR workflow.
    sourceRefs:
    - 24
    - 20
    - 33
    - 39
  - point: Incident-led outbound into AppSec and platform teams should resonate when AI rollout, malicious-package spikes, or executive secure-SDLC initiatives make current manual approvals look fragile.
    sourceRefs:
    - 112
    - 111
    - 77
    - 113
  partnershipEcosystem:
  - point: npm provenance and PyPI attestations are natural upstream data partners because they improve the quality of package provenance briefs.
    sourceRefs:
    - 120
    - 74
  - point: OpenSSF metadata and SCM-native ecosystems are useful downstream partners because Scorecard, dependency graphs, and merge checks can enrich or distribute policy decisions.
    sourceRefs:
    - 54
    - 24
    - 33
  dataMoats:
  - point: NIST explicitly recommends sanctioned internal repositories for vetted open-source components; a startup that records every approval can turn that guidance into a living internal package catalog.
    sourceRefs:
    - 47
    - 46
  - point: Combining public trust signals such as provenance, attestations, and scorecards with each customer’s own historical approvals can create a substitute graph and faster future decisions.
    sourceRefs:
    - 120
    - 74
    - 54
  geographicConsiderations:
  - point: EU-facing software vendors will feel additional urgency because CRA reporting obligations start in 2026 and broader lifecycle obligations apply from 2027.
    sourceRefs:
    - 19
  - point: U.S. federal and federally influenced buyers already have language around SSDF, SCA, and sanctioned repositories, which can help a control-plane narrative land earlier in regulated accounts.
    sourceRefs:
    - 46
    - 47
    - 48
  sensitivityCases:
  - case: GitHub expands native dependency review into richer approval workflows and package policy memory
    impact: The wedge narrows quickly because the default merge surface already belongs to GitHub for many target buyers.
    sourceRefs:
    - 24
    - 20
    - 22
  - case: AI coding adoption stays high but trust remains low
    impact: Need for a human-governed intake layer increases because developers still ship AI-assisted code while expressing frustration with almost-right outputs.
    sourceRefs:
    - 112
    - 23
    - 115
  - case: Provenance and attestations become common defaults across registries
    impact: Signal collection commoditizes, so product value shifts toward approval workflow speed, substitute recommendation quality, and audit trails.
    sourceRefs:
    - 120
    - 74
  validationPlan:
  - priority: high
    question: How many first-time npm and PyPI package additions does a 250-developer AI-assisted team create per month?
    evidenceToGather: Manifest and lockfile diff data from 5-10 design partners before and after Copilot/Cursor rollout.
  - priority: high
    question: What is the current median time and owner path for approving a risky new dependency?
    evidenceToGather: Slack threads, Jira tickets, PR comments, and post-incident reviews from platform-security teams.
  - priority: medium
    question: Will buyers prefer advisory mode first or immediate blocking for unknown packages?
    evidenceToGather: Pilot results segmented by team maturity, false-positive tolerance, and incident history.
  - priority: medium
    question: Which ecosystems need day-one depth beyond JavaScript and Python?
    evidenceToGather: Language mix and private-registry patterns across design partners in devtools, fintech, and AI infra.
