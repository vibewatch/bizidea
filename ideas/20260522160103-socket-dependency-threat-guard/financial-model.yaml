slug: ai-dependency-intake-gate
date: '2026-05-22'
currency: USD
modelStartMonth: 2026-06
assumptions:
  - id: A1
    name: Model start after pre-seed close
    value: 2026-06
    unit: YYYY-MM
    source: '[BP date + fundingAsk] Model starts the month after the dated plan so the pre-seed cash is available before operating spend begins.'
  - id: A2
    name: Opening cash
    value: '3600.0'
    unit: USDK
    source: '[BP fundingAsk targetFundingRangeUsd $2–4M] Base case uses a $3.6M pre-seed, toward the high end of the stated range, to reach the Q4Y2 milestone and preserve a 6-month cash buffer.'
  - id: A3
    name: Starting customers (M1)
    value: '0'
    unit: count
    source: '[BP product MVP + BP milestones 0–12 months] The company starts pre-revenue and must first ship the GitHub-first advisory workflow before any paid pilot begins.'
  - id: A4
    name: Paid pilot price
    value: '18.0'
    unit: USDK per 90-day pilot
    source: '[BP investorMemo.initialContract $15k-$25k pilot] Base case uses the midpoint of the researched pilot range.'
  - id: A5
    name: Initial production ACV
    value: '54.0'
    unit: annualK per customer
    source: '[BP gtm.pricing $15-$25 per protected engineer per month + beachhead 150-600 engineers] Assumes roughly 300 protected engineers at the low end of the seat benchmark for first production deployments.'
  - id: A6
    name: Y3 exit ACV
    value: '82.0'
    unit: annualK per customer
    source: '[BP businessModel.expansionLevers + BP gtm.pricing + Research willingnessToPay] Assumes mature customers expand toward roughly 325 protected engineers with higher automation and review-volume tiers by Y3.'
  - id: A7
    name: Y1 customer ramp
    value: M6 1, M8 2, M10 3, M12 4 paying customers
    unit: customersEop
    source: '[BP milestones 0–12 months] Directly anchored to launching 3 paid pilots and converting at least 2 to annual subscriptions inside the first year.'
  - id: A8
    name: Y2 customer ramp
    value: Q1Y2 5, Q2Y2 7, Q3Y2 9, Q4Y2 12 customers
    unit: customersEop
    source: '[BP milestones 12–24 months] Fits the 10-15 production-customer goal by month 24 with a smooth but still enterprise-like quarterly ramp.'
  - id: A9
    name: Y3 customer ramp
    value: Q1Y3 18, Q2Y3 28, Q3Y3 40, Q4Y3 65 customers
    unit: customersEop
    source: '[BP milestones 24–36 months + Research market.som] Base case discounts the plan''s roughly-100-customer aspiration to 65 by Q4Y3 to reflect sales friction, while still assuming partner channels begin to work.'
  - id: A10
    name: Revenue recognition method
    value: customersEop × blended realized price for the month or quarter
    unit: formula
    source: '[BP gtm pricing + BP businessModel revenueStreams] Used so reported revenue reconciles directly to customer counts and the ACV ladder without a separate cohort billing table.'
  - id: A11
    name: Y1 gross margin
    value: '60.0'
    unit: percent
    source: '[BP businessModel.targetGrossMarginPct 70] Early pilots carry onboarding, analyst review, and customer-support drag before deployment becomes repeatable.'
  - id: A12
    name: Y2 gross margin
    value: '65.0'
    unit: percent
    source: '[BP businessModel.targetGrossMarginPct 70] Margin improves once advisory-mode onboarding, policy templates, and audit exports are productized across early production customers.'
  - id: A13
    name: Y3 gross margin
    value: '70.0'
    unit: percent
    source: '[BP businessModel.targetGrossMarginPct 70] Base case reaches the target margin once the GitHub-first workflow is mostly software-delivered and customer support is leveraged over a broader base.'
  - id: A14
    name: Monthly logo churn for unit economics
    value: '1.5'
    unit: percent
    source: '[Startup-finance heuristic] Narrow enterprise security workflows with annual contracts can underwrite 1.0%-2.0% monthly churn before broad platform expansion is proven; base case uses the midpoint.'
  - id: A15
    name: Steady-state CAC
    value: '45.0'
    unit: USDK per customer
    source: '[BP gtm.funnelTargets + BP operatingAssumptions founder-led outbound] Assumes founder-led sales plus one GTM hire can close security pilots in the mid-five-figure acquisition-cost range.'
  - id: A16
    name: Loaded salary bands
    value: Founder 180; Eng 210; Security research 200; Product or deployment 190; Sales or GTM 220; Success 160; G&A 140
    unit: annualK per FTE
    source: '[BP team + startup-finance heuristic] Uses lean US software-security cash comp with payroll taxes and benefits included.'
  - id: A17
    name: Hiring schedule
    value: Security research M2; Product lead M6; GTM lead M9; Success M13; second engineer M15; second GTM M18; second product or deployment M28; third engineer M33; G&A M35
    unit: timing
    source: '[BP team + BP sequencingRationale] Keeps hiring behind product proof and pilot conversion rather than staffing for the full SOM target immediately.'
  - id: A18
    name: Headcount endpoint
    value: 5 FTE by Q4Y1, 8 FTE by Q4Y2, and 11 FTE by Q4Y3
    unit: FTE
    source: '[BP team + BP milestones] Maintains a deliberately lean org for a GitHub-native workflow product instead of building a heavy services bench.'
  - id: A19
    name: Operating expense method
    value: Department lines reflect fully loaded functional spend and salaryK is a disclosed payroll memo line, not an additional charge on top of opex
    unit: policy
    source: '[BP operations + startup-finance heuristic] The model shows payroll explicitly for headcount reconciliation while keeping EBITDA tied to total functional opex.'
  - id: A20
    name: Funding sizing rule
    value: Raise enough to reach the Q4Y2 milestone and still retain at least 6 months of buffer into Y3
    unit: policy
    source: '[BP fundingAsk runwayMonths 18 + model requirement] The raise size follows the explicit milestone-plus-buffer rule rather than the bare minimum to survive 18 months.'
  - id: A21
    name: Cash flow simplification
    value: Ending cash equals opening cash plus cumulative EBITDA
    unit: formula
    source: '[Startup-finance heuristic] Assumes minimal capex, debt, and working-capital distortion for an asset-light software startup.'
