scenarios:
  downside:
    description: Slower pilot conversion and weaker partner-sourced pipeline keep the company below blocking-mode adoption targets through Y3.
    y3RevenueK: 2023.6
    y3EbitdaK: -539.2
    cashLowPointK: 634.1
    keyAssumptionChanges:
      - Customer ramp ends Y3 at 45 customers instead of 65.
      - Exit ACV lands closer to $74K because fewer accounts expand seat coverage or automation tier.
      - Gross margin improves only to 67% because onboarding and support stay more manual.
  base:
    description: Founder-led pilots convert on plan, partner referrals begin contributing in Y3, and expansion inside accounts lifts ACV over time.
    y3RevenueK: 2922.5
    y3EbitdaK: 60.7
    cashLowPointK: 858.1
    keyAssumptionChanges:
      - Customer ramp reaches 12 production customers by Q4Y2 and 65 by Q4Y3.
      - ACV rises from roughly $54K initial production to roughly $82K by Q4Y3.
      - Gross margin reaches the business-plan target of 70% in Y3.
  upside:
    description: Package-volume pain is acute enough that partner channels and design-partner references accelerate both logo growth and multi-repo expansion.
    y3RevenueK: 3558.0
    y3EbitdaK: 471.2
    cashLowPointK: 934.9
    keyAssumptionChanges:
      - Customer ramp reaches 80 customers by Q4Y3.
      - ACV expansion arrives earlier as more customers buy larger covered-engineer footprints.
      - Gross margin reaches 71% with cleaner onboarding and less services drag.
