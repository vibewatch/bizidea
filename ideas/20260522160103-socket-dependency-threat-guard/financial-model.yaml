modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Leads --> Pilots
      Pilots --> ProductionCustomers
      ProductionCustomers --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: Revenue engine
    finding: Base-case revenue is driven by growing from 12 customers at Q4Y2 to 65 at Q4Y3 while expanding ACV from roughly $54K to roughly $82K through broader repo coverage and automation tiers.
  - checkName: Must go right
    finding: The company must convert pilots to annual subscriptions on roughly a 90-day cycle and start getting partner-sourced pipeline by Y3 to support the modeled logo ramp.
  - checkName: Model breaks if
    finding: If package-intake volume is too low to justify 300-plus protected seats or sales cycles stretch to 120 days, cash trends toward the downside case and Y3 profitability disappears.
  - checkName: Next-round proof
    finding: Hitting 10-12 production customers with advisory-to-blocking adoption by Q4Y2 is the milestone that should justify the next financing.
sanityChecks:
  ruleOf40: 'Y3 growth 493.4% + EBITDA margin 2.1% = 495.5% (inflated by the very small Y2 revenue base).'
  burnMultiple: 'Y2 burn multiple is about 2.3x based on $1.18M burn to add roughly $0.52M of ARR; the model improves to positive EBITDA in Q3Y3.'
  revenuePerFte: '$265.7K Y3 using 11 Q4Y3 FTE (benchmark roughly $200–400K SaaS).'
  flags:
    - The base case still requires a sharp acceleration from 12 customers at Q4Y2 to 65 at Q4Y3, so partner-channel execution is the single biggest forecasting risk.
    - The model assumes customers eventually cover more than the 250-seat SOM cross-check because multi-repo expansion and automation tiers lift ACV; if buyers resist that expansion, Y3 revenue will undershoot.
    - Real package-intake volume per target engineering team remains unproven in the source material, so retention and expansion depend on pilot evidence that recurring review volume is actually high enough.
