slug: ai-dependency-intake-gate
date: '2026-05-22'
executiveSummary: >-
  This company should start as a GitHub-native dependency intake gate for
  AI-assisted software teams, not as a broad software composition analysis or
  runtime supply-chain platform. The first customer is a Series B-D AI-native
  B2B SaaS company with 150-600 engineers, a shared monorepo, formal Cursor or
  Copilot rollout, and only 1-3 platform-security engineers who currently
  approve unfamiliar packages in Slack or PR comments. The buying trigger is
  usually an AI coding rollout review, a near miss involving an unfamiliar
  package, or executive pressure to show auditable OSS controls before the next
  procurement or compliance review. Research supports a focused market with an
  estimated $168.0M TAM, $38.4M SAM, and a reachable $4.8M year-3 SOM if the
  company can convert roughly 100 beachhead customers at the modeled
  per-developer spend. The product should begin in advisory mode on GitHub for
  npm and PyPI dependencies, prove that it shortens first-time package review
  while steering developers toward approved substitutes, and only then expand
  into blocking policies, more ecosystems, and broader OSS procurement controls.
  The deliberate tradeoff is to own the first-time package approval decision
  inside the PR instead of competing head-on with GitHub, Snyk, Socket, and
  Endor on full-spectrum scanning breadth. The biggest disconfirming risks are
  that target teams do not add enough net-new packages each month to justify a
  standalone workflow product, or that GitHub and specialist incumbents add
  "good enough" approval memory before this startup builds meaningful policy
  data. The inputs do not quantify real package-intake volume per target
  engineering team, so pilot design must test that pain directly before the
  company scales hiring or spend.
problem:
  - AI coding tools increase the number of unfamiliar open-source packages proposed in pull requests faster than small platform-security teams can review them.
  - Existing scanners and manual Slack approvals usually act after a package is already in the repo, leaving no reusable, auditable approval memory at the moment of first adoption.
solution:
  - Detect every first-time npm and PyPI dependency introduced in a GitHub pull request, generate a provenance and behavior brief, and route the decision to the right policy owner before merge.
  - Build an internal catalog of approved packages, rejected packages, and safer substitutes so future PRs resolve faster and developers are nudged toward known-good options.
whyWeWin:
  - The wedge is narrower than broad SCA platforms and maps directly to the first package-adoption decision where urgency, buyer ownership, and measurable workflow ROI are clearest.
  - Approval history compounds into org-specific policy memory and substitute recommendations that incumbents do not yet appear to center as the core workflow.
  - Starting inside GitHub PRs matches how the beachhead customer already reviews AI-written code, which lowers change-management burden relative to a separate security console.
strategicChoices:
  beachhead: >-
    Series B-D AI-native B2B SaaS companies with 150-600 engineers, a GitHub
    monorepo, formal Cursor or Copilot rollout, and a small platform-security
    team that already reviews risky package additions manually.
  wedgeRationale: >-
    First-time package intake is a narrower and faster-to-prove problem than
    broad dependency scanning because buyers can measure review time,
    pre-merge-policy coverage, and reduction in risky approvals within one
    pilot, without replacing their existing AppSec stack.
  sequencingRationale: >-
    Start with GitHub plus npm and PyPI in advisory mode because deployment
    speed and low review friction matter more than ecosystem breadth at the
    pre-seed stage. After the company proves fast review generation, policy
    adoption, and pilot conversion, it should add blocking mode, substitute
    intelligence, audit exports, then broader SCM and registry coverage.
  notYet:
    - Full vulnerability management, reachability analysis, or post-adoption SCA remediation
    - GitLab, Bitbucket, and long-tail package ecosystems before GitHub plus npm and PyPI is repeatable
    - IDE-time recommendation surfaces inside Cursor or Copilot before the PR gate proves buyer pull
    - Large regulated-enterprise packaging that requires heavy private-deployment and procurement work
market:
  tam: "$168.0M estimated TAM based on roughly 3,500 target-like AI-rollout software companies globally, about 250 protected developers per company, and about $192 annual spend per developer."
  sam: "$38.4M estimated SAM based on roughly 800 North America and Europe beachhead companies with 150-600 engineers and formal AI coding rollout."
  som: "$4.8M modeled year-3 SOM based on roughly 100 customers at about 250 protected developers and about $192 annual spend per developer."
  segments:
    - "Primary segment: AI-native B2B SaaS companies with 150-600 engineers, GitHub-centered workflows, and frequent net-new JavaScript or Python package additions"
    - "Secondary segment: larger software companies that need auditable OSS procurement controls after the GitHub-first wedge is proven"
  buyingProcess: >-
    The operational champion is usually the platform-security lead or staff
    platform engineer, while the economic buyer is typically the VP Engineering
    or Head of Product Security. The deal should start as a narrow GitHub pilot
    after an AI rollout review or near miss, then convert when the customer sees
    faster package decisions, fewer manual approvals, and a reusable approved
    package catalog.
product:
  mvp: >-
    The MVP should be a GitHub app for npm and PyPI that flags first-time
    dependency additions, produces a reviewer brief, supports one-click approve
    or reject decisions, and records an org-level approved package catalog. It
    should launch in advisory mode first with clear PR comments, decision logs,
    and substitute suggestions when an already approved internal option exists.
  sixMonth: >-
    Prove advisory-mode deployment in under two weeks for GitHub repos using npm
    or PyPI, ship approve or reject workflow templates, and demonstrate that
    median first-time package review time falls below one business day.
  twelveMonth: >-
    Add blocking policies for unknown packages, better substitute
    recommendations, Slack or ticketing handoff, audit-ready exports, and policy
    coverage across more repos inside the same customer.
  twentyFourMonth: >-
    Expand into GitLab or Bitbucket, private-registry and artifact-mirroring
    controls, broader package ecosystems, and upstream recommendation feeds for
    coding agents once the company has enough policy memory to influence package
    choice before PR creation.
  keyBets:
    - GitHub plus npm and PyPI covers enough early demand to land the first 3-5 paid pilots.
    - Advisory mode can earn trust and usage before customers demand merge-blocking by default.
    - Org-specific approved-substitute memory materially shortens review time after the first few dozen package decisions.
    - Buyers will pay a standalone budget line for package-intake workflow rather than treating it as a feature request for existing AppSec vendors.
gtm:
  wedge: >-
    Sell a paid GitHub pilot that governs first-time npm and PyPI package
    additions for one engineering organization, then convert to an annual
    subscription once the customer relies on the policy catalog and starts
    blocking unknown packages on protected branches.
  channels:
    - Direct founder-led outbound to platform-security leaders, staff platform engineers, and VP Engineering buyers at AI-native SaaS companies with formal AI coding rollout
    - Design-partner GitHub app pilots that start in advisory mode and convert to org-wide policy coverage
    - Secure-SDLC consultants and cyber-insurance-adjacent advisors that surface weak OSS approval controls after incidents or control reviews
  funnelTargets: "Lead to qualified pilot 20-30%, pilot to production 50%+, and median pilot kickoff to annual contract under 90 days."
  pricing: >-
    Annual subscription priced by protected engineer seat with a minimum
    platform fee and premium tiers for higher review volume, automations, and
    catalog integrations. The working assumption is roughly $15-$25 per
    protected engineer per month, which fits the researched budget benchmarks
    from adjacent developer-security tools, with a paid pilot credited toward an
    annual contract if the customer converts.
businessModel:
  revenueStreams:
    - Annual subscription for dependency-intake workflow coverage
    - Premium automation and review-volume tiers for higher package-intake teams
    - Enterprise add-ons for audit exports, package-catalog sync, and artifact mirroring
  unitOfValue: Protected engineer seat with policy automation tier for net-new package reviews
  targetGrossMarginPct: 70
  expansionLevers:
    - Increase repo and team coverage inside the same customer after the first package catalog is trusted
    - Add more ecosystems, private-registry integrations, and policy modules
    - Move from PR approval workflow into broader OSS procurement and sanctioned-repository controls
strategyMap:
  northStarMetric: Percentage of first-time package additions that receive a documented decision before merge with median review time under one business day
  inputMetrics:
    - Number of first-time package additions reviewed per active customer per month
    - Median time from PR open to package approval or rejection
    - Percentage of decisions resolved with an approved substitute instead of a new package
    - Pilot to production conversion rate
    - Percentage of covered repos running blocking mode after advisory rollout
  moatsToBuild:
    - Org-specific package approval memory tied to real merge decisions
    - Approved-substitute graph built from customer history and public trust signals
    - Lightweight deployment and policy templates that fit GitHub branch protection and status-check workflows
    - Audit trail that maps package-intake decisions to security and procurement evidence
  killCriteria:
    - Fewer than 3 paid pilots after 30 qualified beachhead conversations
    - Median first-time package volume below 10 meaningful reviews per month across pilot customers
    - Pilot to production conversion below 50% after the first 6 pilots
    - More than 70% of qualified prospects choose native GitHub or existing vendor workflows without requiring substitute memory or reusable approvals
  mermaid: |
    flowchart LR
      Wedge[GitHub first-time package intake wedge] --> MVP[GitHub npm and PyPI advisory gate]
      MVP --> Proof[Faster documented package decisions and approved catalog]
      Proof --> Expansion[Blocking policies, more ecosystems, and OSS procurement controls]
investorMemo:
  verdict:
    call: "Meet / investigate further"
    conviction: Strong wedge clarity and buyer timing, but conviction depends on proving real package-intake volume and durable differentiation against GitHub and specialist incumbents.
    whyBelieve: The plan targets a specific pre-merge workflow gap that existing budgets, technical surfaces, and buyer pain already validate.
    whyDoubt: The same PR surface that makes distribution attractive also gives GitHub and adjacent security vendors a fast path to copy shallow approval workflows.
    nextDiligence: Confirm 3 paid pilots that show meaningful first-time package volume, sub-one-day review cycles, and at least 50% pilot-to-production intent before scaling the team.
  firstCustomer:
    title: Platform security lead at an AI-native SaaS company
    profile: A Series B-D B2B SaaS company with 200-400 engineers, a GitHub monorepo, formal Cursor or Copilot rollout, and 1-3 platform-security engineers handling JavaScript or Python package approvals.
    trigger: An AI rollout review, recent dependency near miss, or board or procurement request for auditable OSS controls exposes that package approvals still happen ad hoc.
    buyer: VP Engineering or Head of Product Security
    initialContract: "$15k-$25k paid pilot over 60-90 days for one org or repo group, converting to roughly $40k-$75k annual subscription based on protected engineer count and automation tier."
  mustBeTrue:
    - Target customers must experience enough first-time npm or PyPI package additions each month to justify a standalone approval workflow.
    - Advisory-mode deployment must reduce median package review time to under one business day without creating developer backlash.
    - At least half of pilots must convert because reusable package memory and substitute guidance are valued beyond what GitHub or existing scanners already provide.
    - A protected-engineer pricing model around the researched benchmark must fit existing AppSec or engineering budgets without heavy services work.
    - GitHub-first design partners must provide enough policy data to build a defensible substitute and approval memory before incumbents close the feature gap.
  diligenceQuestions:
    - How many net-new npm and PyPI package approvals does the target customer actually process per month after an AI rollout?
    - What percent of target buyers will start in advisory mode versus demanding immediate blocking on unknown packages?
    - In live evaluations, which package-review steps are still unresolved by GitHub dependency review, Socket, Snyk, or Endor Labs?
    - How often can the product recommend an already approved substitute instead of approving a new external package?
    - What level of false positives or review latency causes engineering teams to bypass the workflow?
operatingAssumptions:
  - assumption: GitHub plus npm and PyPI covers enough early demand to secure the first 3-5 paid pilots.
    basis: idea.yaml
    validationTest: Track ecosystem and SCM requirements across the first 15 qualified opportunities and confirm that at least 3 paid pilots can start without GitLab, Bitbucket, or non-JS or Python depth.
    decisionImpact: If false, the roadmap must shift earlier toward more integrations and likely higher implementation cost.
  - assumption: Buyers prefer advisory rollout first and enable blocking only after the review brief proves accurate and fast.
    basis: research.yaml
    validationTest: Run 10 buyer design reviews and require at least 7 to accept advisory-first deployment with explicit success criteria for switching to blocking mode.
    decisionImpact: If false, the product needs stronger policy controls, support, and trust features in the MVP, increasing build scope and sales friction.
  - assumption: Protected-engineer pricing at roughly $15-$25 per month is acceptable if the workflow measurably reduces manual review time.
    basis: research.yaml
    validationTest: Test 3 packaging options in at least 8 budget-owner conversations and secure 2 paid pilots with written conversion expectations in the target range.
    decisionImpact: If false, the company must lower ACV expectations, narrow scope further, or rely more on enterprise add-ons than seat economics.
  - assumption: Org-specific approval memory and substitute suggestions materially improve pilot conversion and retention.
    basis: idea.yaml
    validationTest: Measure whether teams with at least 25 recorded decisions resolve repeat package requests faster and convert at higher rates than teams using only first-order package briefs.
    decisionImpact: If false, differentiation weakens and the company risks becoming another scanner feature rather than a durable workflow system.
  - assumption: Founder-led outbound can win the first beachhead customers before formal enterprise sales hiring.
    basis: operator judgment
    validationTest: Build a 30-account target list and require at least 3 paid pilots or signed pilot LOIs by month 9 from founder-led motion alone.
    decisionImpact: If false, the company should revisit wedge clarity and channel fit before adding burn through GTM hires.
experimentRoadmap:
  - horizon: "0–90 days"
    experiment: ICP and package-volume discovery
    hypothesis: The beachhead customer sees enough first-time package additions after AI rollout to treat package intake as a recurring operating problem.
    successMetric: 12 target interviews completed with at least 8 matching the ICP and 6 sharing evidence of recurring first-time package approvals.
    owner: Founder CEO
  - horizon: "0–90 days"
    experiment: Concierge dependency-brief trial
    hypothesis: A manually generated provenance brief plus substitute recommendation can resolve first-time package decisions faster than the customer's current Slack or PR workflow.
    successMetric: 2 design partners benchmark at least 20 historical package requests each and show median decision time under one business day.
    owner: Founding eng
  - horizon: "90–180 days"
    experiment: Advisory-mode GitHub pilot
    hypothesis: A GitHub app for npm and PyPI can deploy in under two weeks and generate enough trusted recommendations to support paid pilots.
    successMetric: 3 paid pilots launched with median time to first usable recommendation under 14 days.
    owner: Founding eng
  - horizon: "90–180 days"
    experiment: Pricing and conversion test
    hypothesis: Protected-engineer pricing with pilot credit converts better than pure usage-based pricing.
    successMetric: Preferred package wins in at least 5 of 8 pricing conversations and appears in 2 signed pilot agreements.
    owner: Founder CEO
  - horizon: "6–12 months"
    experiment: Advisory-to-blocking conversion
    hypothesis: Customers will enable blocking mode on covered repos once review accuracy and SLA are proven in advisory mode.
    successMetric: At least 2 production customers enable blocking on protected branches within 90 days of pilot success.
    owner: Product lead
  - horizon: "12–18 months"
    experiment: Partner-sourced pipeline
    hypothesis: Secure-SDLC consultants and cyber-insurance-adjacent advisors can source qualified pilots with similar conversion to founder-led outbound.
    successMetric: 25% of qualified pipeline comes from 2 active partners with pilot conversion no worse than founder-led sales.
    owner: GTM lead
operations:
  - Maintain package metadata ingestion, provenance parsing, and policy-decision logging as a core daily operating system, not a side workflow.
  - Run reviewer-SLA monitoring so advisory mode stays fast enough that engineering teams do not bypass the gate.
  - Keep a least-privilege GitHub deployment and clear audit exports for every approve or reject decision.
  - Use design partners to refine substitute recommendations and policy templates before expanding ecosystems or compliance packaging.
team:
  - role: Founder CEO
    startTiming: Month 0
    rationale: Own design-partner sales, buyer discovery, pricing, and early partner development while the wedge is still being proven.
  - role: Founding eng
    startTiming: Month 0
    rationale: Build the GitHub app, dependency-diff engine, reviewer brief generation, and decision-memory system required for the MVP.
  - role: Security research engineer
    startTiming: Month 2
    rationale: Improve provenance analysis, substitute heuristics, and package-risk signal quality without expanding into full SCA breadth.
  - role: Product lead
    startTiming: Month 6
    rationale: Standardize onboarding, policy templates, and advisory-to-blocking rollout once the first pilots reveal repeatable workflow needs.
  - role: GTM lead
    startTiming: Month 9
    rationale: Add sales capacity only after the company proves pilot conversion, acceptable pricing, and a repeatable GitHub-first deployment motion.
milestones:
  - horizon: "0–12 months"
    items:
      - Launch 3 paid GitHub pilots focused on npm and PyPI first-time dependency intake.
      - Prove median first-time package review time under one business day for at least 2 design partners.
      - Convert at least 2 pilots to annual subscriptions with reusable package-catalog adoption.
      - Standardize advisory-mode deployment and policy templates for the beachhead ICP.
  - horizon: "12–24 months"
    items:
      - Reach 10-15 production customers with blocking mode enabled on covered repos for a meaningful subset of package decisions.
      - Add substitute intelligence, audit exports, and broader repo coverage within existing customers.
      - Establish 2 partner channels that generate qualified pipeline without changing the core ICP.
      - Expand selectively into additional SCM or registry support only after GitHub plus npm and PyPI onboarding is repeatable.
  - horizon: "24–36 months"
    items:
      - Reach roughly 100 customers at blended pricing consistent with the modeled SOM.
      - Add adjacent OSS procurement controls such as internal catalog sync or artifact mirroring while keeping PR intake as the proof anchor.
      - Demonstrate that approval memory and substitute data improves win rate and retention against incumbent alternatives.
risks:
  - risk: GitHub or an incumbent supply-chain vendor ships good-enough approval memory and compresses the standalone wedge.
    likelihood: High
    impact: High
    mitigation: Move faster on org-specific substitute guidance, reusable approvals, and workflow depth that customers operationalize before incumbents prioritize the niche.
  - risk: Review friction causes engineering teams to bypass or disable the workflow.
    likelihood: Medium
    impact: High
    mitigation: Launch in advisory mode, keep response SLA tight, auto-approve known-safe packages, and measure bypass behavior before expanding blocking rules.
  - risk: Real package-intake volume at the beachhead is too low to support a standalone vendor.
    likelihood: Medium
    impact: High
    mitigation: Validate package-volume thresholds in discovery and narrow sales only to teams with clear AI-rollout-driven churn before scaling GTM.
  - risk: Private registries, transitive dependencies, and ecosystem edge cases make implementation services-heavy.
    likelihood: Medium
    impact: Medium
    mitigation: Hold the initial scope to GitHub plus npm and PyPI and defer broader private-registry complexity until onboarding metrics are repeatable.
  - risk: Buyers treat the product as compliance theater unless it clearly reduces approval time and risky package adoption.
    likelihood: Medium
    impact: Medium
    mitigation: Lead sales with workflow metrics and pre-merge decision coverage, not generic supply-chain fear or regulatory messaging.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2–4M"
  runwayMonths: 18
  useOfFundsSummary: Fund 18 months to build the GitHub-first MVP, secure 3-5 paid pilots, prove advisory-to-production conversion on npm and PyPI package intake, and establish a repeatable beachhead motion before expanding integrations or sales headcount.
