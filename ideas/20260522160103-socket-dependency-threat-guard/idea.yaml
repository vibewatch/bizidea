jobsToBeDone:
  - job: >-
      When AI coding tools start introducing unfamiliar packages into our repo every day, help our platform-security team
      approve only the safe ones, so we can move fast without letting risky code become part of the standard stack.
    currentAlternative: CI scanners plus Slack threads and ad hoc code-review comments
    successMetric: >-
      Ninety percent of net-new package additions receive a documented approval or rejection decision before merge.
  - job: >-
      When a developer proposes a new dependency for a high-priority feature, help the team find an already approved
      substitute or safe path quickly, so shipping does not depend on a risky open-source decision made under time pressure.
    currentAlternative: Manual package research or copying what an AI coding assistant suggested
    successMetric: >-
      Median time to resolve a first-time package review stays under one business day while reducing risky approvals.
