differentiator: >-
  Socket, Snyk, and similar products are strongest as scanning and alerting systems; this idea is a workflow system for
  deciding whether a net-new package should enter the codebase at all. Its moat comes from compounding internal decision
  data: every approval creates a reusable package catalog, substitute graph, and org-specific policy memory that gets more
  valuable as AI-generated code increases package churn. If executed well, it becomes the control plane between coding
  agents and the universe of third-party code, not just another red-yellow-green scanner.
