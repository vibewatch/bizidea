topRisks:
  - name: Incumbent bundling
    description: Existing dependency-security vendors could add a basic PR approval workflow and compress the wedge before the company builds brand.
    mitigation: Win on workflow depth, substitute recommendations, and internal catalog compounding rather than on raw scanning alone, then lock in design partners early.
  - name: Review friction backlash
    description: If the gate slows merges or creates noisy false positives, engineers and buyers will bypass it or reduce policies to audit-only mode.
    mitigation: Launch with advisory mode, one-click approvals, and tight SLAs on review generation, then expand blocking rules only after trust is earned.
  - name: Weak urgency outside AI-native teams
    description: Traditional software teams may not yet feel enough package-intake pain to buy a new control layer before a visible incident.
    mitigation: Focus the first two years on AI-native software companies with formal coding-assistant rollouts and use their package-volume metrics to prove ROI.
