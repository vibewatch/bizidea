modelDiagram:
  title: 单位经济流转图
  mermaid: "flowchart LR\n  Leads --> Pilots\n  Pilots --> ProductionCustomers\n  ProductionCustomers --> Revenue\n  Revenue --> GrossProfit\n  GrossProfit --> Cash\n"
modelSanity:
- checkName: 收入引擎
  finding: 基准情景的收入引擎来自两个杠杆：客户数从 Q4Y2 的 12 个涨到 Q4Y3 的 65 个，同时依靠更广仓库覆盖和自动化档位，把 ACV 从约 $54K 拉到约 $82K。
- checkName: 必须做对的事
  finding: 公司必须把 pilot 按大约 90 天的节奏转成年约，并在 Y3 开始拿到伙伴带来的 pipeline，才撑得住模型里的 logo 爬坡。
- checkName: 模型会失效，如果
  finding: 如果包引入量低到撑不起 300+ 受保护席位，或者销售周期被拉长到 120 天，现金走势就会滑向 downside 情景，Y3 的盈利也会消失。
- checkName: 下一轮融资证明点
  finding: 在 Q4Y2 前做到 10-12 个生产客户，并跑通从 advisory 到 blocking 的采用，就是最能支撑下一轮融资的里程碑。
sanityChecks:
  ruleOf40: Y3 增长 493.4% + EBITDA 利润率 2.1% = 495.5%（主要被很小的 Y2 收入基数放大）。
  burnMultiple: 按约 $1.18M 的 burn 换来约 $0.52M 的 ARR 增量计算，Y2 burn multiple 约为 2.3x；模型在 Q3Y3 转为正 EBITDA。
  revenuePerFte: 按 Q4Y3 的 11 FTE 计算，Y3 人均收入约 $265.7K（SaaS 基准大约 $200–400K）。
  flags:
  - 基准情景仍要求客户数从 Q4Y2 的 12 个猛拉到 Q4Y3 的 65 个，因此伙伴渠道执行是最大的预测风险。
  - 模型假设客户最终覆盖的席位会超过 SOM 交叉校验里的 250 席，因为多仓库扩张和自动化档位会继续抬高 ACV；如果买家不接受这种扩张，Y3 收入就会低于模型。
  - 目标工程团队真实的包引入量，在源材料里仍未被证实，因此留存和扩张最终都取决于 pilot 能否证明反复审查量确实足够高。
