fundingAsk:
  round: pre-seed
  amountM: 3.6
  runwayMonths: 24
  milestone: 在 Q4Y2 前做到 10-12 个生产客户、跑通可复用的 advisory-to-blocking rollout，并至少建立 1 条伙伴带来的 pipeline 渠道，同时仍保留 6 个月现金缓冲。
