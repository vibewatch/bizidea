slug: ai-dependency-intake-gate
date: '2026-05-22'
currency: USD
modelStartMonth: 2026-06
assumptions:
- id: A1
  name: pre-seed 完成后的模型起始时间
  value: 2026-06
  unit: YYYY-MM
  source: '[BP date + fundingAsk] 模型从计划日期后的次月开始，这样 pre-seed 资金会在运营支出启动前到位。'
- id: A2
  name: 期初现金
  value: '3600.0'
  unit: USDK
  source: '[BP fundingAsk targetFundingRangeUsd $2–4M] 基准情景采用 $3.6M 的 pre-seed，靠近给定区间上沿，以便跑到 Q4Y2 里程碑并保留 6 个月现金缓冲。'
- id: A3
  name: 起始客户数（M1）
  value: '0'
  unit: count
  source: '[BP product MVP + BP milestones 0–12 months] 公司从零收入起步，必须先交付 GitHub-first 的 advisory 工作流，之后才会启动付费 pilot。'
- id: A4
  name: 付费 pilot 价格
  value: '18.0'
  unit: USDK per 90-day pilot
  source: '[BP investorMemo.initialContract $15k-$25k pilot] 基准情景采用研究区间的中点。'
- id: A5
  name: 初始生产 ACV
  value: '54.0'
  unit: annualK per customer
  source: '[BP gtm.pricing $15-$25 per protected engineer per month + beachhead 150-600 engineers] 假设首批生产部署按席位基准低端测算，约覆盖 300 名受保护工程师。'
- id: A6
  name: Y3 退出 ACV
  value: '82.0'
  unit: annualK per customer
  source: '[BP businessModel.expansionLevers + BP gtm.pricing + Research willingnessToPay] 假设成熟客户到 Y3 会扩到约 325 名受保护工程师，并购买更高自动化与更高审查量档位。'
- id: A7
  name: Y1 客户爬坡
  value: M6 1、M8 2、M10 3、M12 4 个付费客户
  unit: customersEop
  source: '[BP milestones 0–12 months] 直接锚定在第一年启动 3 个付费 pilot，并至少把其中 2 个转成年约。'
- id: A8
  name: Y2 客户爬坡
  value: Q1Y2 5、Q2Y2 7、Q3Y2 9、Q4Y2 12 个客户
  unit: customersEop
  source: '[BP milestones 12–24 months] 用平滑但仍保留企业销售特征的季度爬坡，匹配 24 个月时达到 10-15 个生产客户的目标。'
- id: A9
  name: Y3 客户爬坡
  value: Q1Y3 18、Q2Y3 28、Q3Y3 40、Q4Y3 65 个客户
  unit: customersEop
  source: '[BP milestones 24–36 months + Research market.som] 基准情景把计划里约 100 客户的目标折到 Q4Y3 的 65 个，以反映销售摩擦，同时仍假设伙伴渠道开始起作用。'
- id: A10
  name: 收入确认方法
  value: customersEop × 当月或当季的加权实现价格
  unit: formula
  source: '[BP gtm pricing + BP businessModel revenueStreams] 这样建模后，收入可以直接和客户数及 ACV 阶梯对上，不需要单独再做 cohort 计费表。'
- id: A11
  name: Y1 毛利率
  value: '60.0'
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct 70] 早期 pilot 还背着 onboarding、分析师审查和客户支持的拖累，部署尚未可复用。'
- id: A12
  name: Y2 毛利率
  value: '65.0'
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct 70] 一旦 advisory mode 的 onboarding、策略模板和审计导出在早期生产客户里产品化，毛利率就会改善。'
- id: A13
  name: Y3 毛利率
  value: '70.0'
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct 70] 当 GitHub-first 工作流大多靠软件交付，客户支持也能摊到更广客户基数上时，基准情景就能达到目标毛利率。'
- id: A14
  name: 单位经济模型中的月度 logo churn
  value: '1.5'
  unit: percent
  source: '[Startup-finance heuristic] 对签年约的窄型企业安全工作流来说，在更宽平台扩张尚未被验证前，1.0%-2.0% 的月 churn 是能成立的；基准情景取中点。'
- id: A15
  name: 稳态 CAC
  value: '45.0'
  unit: USDK per customer
  source: '[BP gtm.funnelTargets + BP operatingAssumptions founder-led outbound] 假设创始人主导销售再配 1 名 GTM，就能把安全 pilot 的获客成本控制在中五位数美元。'
- id: A16
  name: 全包薪酬带
  value: 创始人 180；工程 210；安全研究 200；产品或部署 190；销售或 GTM 220；客户成功 160；G&A 140
  unit: annualK per FTE
  source: '[BP team + startup-finance heuristic] 采用精简的美国软件安全团队现金薪酬口径，已包含薪资税和福利。'
- id: A17
  name: 招聘节奏
  value: 安全研究 M2；产品负责人 M6；GTM 负责人 M9；客户成功 M13；第二名工程师 M15；第二名 GTM M18；第二名产品或部署 M28；第三名工程师 M33；G&A M35
  unit: timing
  source: '[BP team + BP sequencingRationale] 招聘节奏跟在产品验证和 pilot 转化之后，而不是一开始就按完整 SOM 目标配满人。'
- id: A18
  name: 期末 headcount
  value: Q4Y1 达到 5 FTE，Q4Y2 达到 8 FTE，Q4Y3 达到 11 FTE
  unit: FTE
  source: '[BP team + BP milestones] 对 GitHub 原生工作流产品来说，组织刻意保持精简，而不是搭一支重服务团队。'
- id: A19
  name: 运营费用口径
  value: 各部门费用线反映的是全包职能支出，salaryK 只是单独披露的人力备忘行，不是叠加在 opex 之上的额外费用。
  unit: policy
  source: '[BP operations + startup-finance heuristic] 模型会单独披露 payroll，方便和 headcount 对账，但 EBITDA 仍只和总职能 opex 挂钩。'
- id: A20
  name: 融资规模规则
  value: 融资要足够支撑公司跑到 Q4Y2 里程碑，并在进入 Y3 时仍保留至少 6 个月缓冲。
  unit: policy
  source: '[BP fundingAsk runwayMonths 18 + model requirement] 融资规模遵循“里程碑 + 缓冲”的明确规则，而不是只筹够活 18 个月的最低金额。'
- id: A21
  name: 现金流简化假设
  value: 期末现金 = 期初现金 + 累计 EBITDA
  unit: formula
  source: '[Startup-finance heuristic] 假设这是一家轻资产软件创业公司，因此 capex、债务和营运资本扰动都很小。'
