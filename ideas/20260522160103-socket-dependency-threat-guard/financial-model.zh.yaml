scenarios:
  downside:
    description: pilot 转化更慢、伙伴带来的 pipeline 更弱，公司到 Y3 都达不到 blocking mode 的采用目标。
    y3RevenueK: 2023.6
    y3EbitdaK: -539.2
    cashLowPointK: 634.1
    keyAssumptionChanges:
    - Y3 结束时客户数为 45，而不是 65。
    - 由于扩大席位覆盖或自动化档位的账户更少，退出 ACV 更接近 $74K。
    - 因为 onboarding 和支持仍然偏人工，毛利率只提升到 67%。
  base:
    description: 创始人主导的 pilot 按计划转化，伙伴推荐在 Y3 开始贡献，账户内部扩张也逐步抬高 ACV。
    y3RevenueK: 2922.5
    y3EbitdaK: 60.7
    cashLowPointK: 858.1
    keyAssumptionChanges:
    - 客户爬坡在 Q4Y2 达到 12 个生产客户，在 Q4Y3 达到 65 个。
    - ACV 从初始生产阶段约 $54K，提升到 Q4Y3 的约 $82K。
    - 毛利率在 Y3 达到商业计划设定的 70% 目标。
  upside:
    description: 包量痛点足够尖锐，因此伙伴渠道和共创客户背书同时加速 logo 增长与多仓库扩张。
    y3RevenueK: 3558.0
    y3EbitdaK: 471.2
    cashLowPointK: 934.9
    keyAssumptionChanges:
    - 客户爬坡在 Q4Y3 达到 80 个。
    - 更多客户更早购买更大的受保护工程师覆盖范围，因此 ACV 扩张来得更早。
    - 由于 onboarding 更顺、服务拖累更少，毛利率达到 71%。
