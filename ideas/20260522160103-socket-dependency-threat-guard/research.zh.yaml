competitors:
- name: Socket
  stage: 成长期
  wedge: 以 GitHub 原生工作流、firewalling 和可达性分析为核心，主动做恶意包与供应链检测。
  pricing: 开源使用免费，另有付费 Team 和 Enterprise 档，支持年付折扣和 startup 定价。
  strength: 在供应链专属检测上品牌强，且已经拿到一批 AI 原生客户 logo。
  weaknessVsUs: 它的核心仍是威胁检测和包情报，而不是第一次引入新包时的审批记忆和替代推荐。
  sourceRefs:
  - 103
  - 106
  - 104
  - 108
- name: Snyk
  stage: 在位企业
  wedge: 覆盖 SCA、代码、容器和 IaC 安全的广义开发者安全平台。
  pricing: 有免费档；Team 起价是每名贡献型开发者每月 $25；企业版单独报价。
  strength: 整合叙事强、开发者集成深，而且早就占住 AppSec 预算。
  weaknessVsUs: 净新增依赖采购这件事，很容易被包进更大的平台里，而不是被当成一条独立工作流来做深。
  sourceRefs:
  - 87
  - 86
- name: Endor Labs
  stage: 成长期
  wedge: 主打 OSS 治理、可达性与 package firewalling，重点是降噪并拦下高风险包。
  pricing: 企业定制定价。
  strength: OSS 风险模型深、治理叙事强，也具备上游 package firewall 能力。
  weaknessVsUs: 它更靠近运行时或安装时策略，以及更宽的 OSS 治理；离一个专为 AI 生成包引入设计的 GitHub 原生审批层还有距离。
  sourceRefs:
  - 17
  - 18
- name: GitHub Code Security / Dependency Review
  stage: 在位企业
  wedge: 在默认代码托管入口上，原生提供 pull-request 级依赖可见性和安全执行能力。
  pricing: GitHub Code Security 为每个活跃 committer 每月 $30；dependency review 对公开仓库和符合条件的付费计划可用。
  strength: 它直接掌握 merge 入口，不需要再跨一个供应商就能下发安全控制。
  weaknessVsUs: 它主要做的是通用依赖可见性和基础策略原语，而不是可复用的引入决策、替代指引或包采购记忆。
  sourceRefs:
  - 22
  - 24
  - 20
