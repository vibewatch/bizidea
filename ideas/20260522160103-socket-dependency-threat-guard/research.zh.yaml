openQuestions:
- 在 150-600 人规模、已经 rollout Copilot 或 Cursor 的 AI 原生 SaaS 滩头市场里，首次引入依赖的真实月度量到底有多大？
- 买家会在事故发生前就接受 blocking mode，还是大多数人都会先要求 advisory mode，再加人工升级链路？
- 基于内部包目录生成替代推荐，多久会被开发者觉得过时或无关，进而失去说服力？
- 这个切口究竟是靠 GitHub-first 分发扩得更快，还是靠本来就掌握策略设计权的安全顾问与合规项目扩得更快？
