  adoptionFrictionMatrix:
  - friction: 如果审查简报噪音太大或太慢，阻止 merge 很容易招来开发者反弹
    severity: 高
    affectedBuyer: VP Engineering 与工程经理
    mitigation: 先以 advisory mode 上线，自动批准可信包，并把审批 SLA 压到 1 个工作日以内。
    sourceRefs:
    - 112
    - 24
