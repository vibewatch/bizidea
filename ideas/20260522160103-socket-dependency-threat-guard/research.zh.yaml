    severity: 中
    affectedBuyer: 资深平台工程师
    mitigation: 先做 GitHub、npm 和 PyPI，再通过分阶段集成补上私有 registry 与传递依赖解析。
    sourceRefs:
    - 24
    - 33
    - 120
    - 74
