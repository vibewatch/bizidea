reportMemo:
  executiveTakeaways:
  - 痛点正在前移：问题不再是依赖用了之后怎么修，而是新包到底该不该进仓库。
  - 现有厂商已经验证了预算和紧迫性，但大多数产品强调的仍是检测与补救，而不是可复用的审批工作流记忆。
  - 如果产品能成为 PR 里的策略记忆和替代引擎，而不是又一个扫描器，这个切口就站得住。
  marketDefinition: 一类面向开发者安全工作流的软件：专门在 pull-request 阶段治理首次采用开源依赖，尤其适用于 AI 辅助开发团队。
  customerAndBuyer: 核心用户是 AI 原生 SaaS 公司的平台安全团队和资深平台工程团队——安全人手少，但净新增包很多。真正拍板的是已经掌管 AppSec 和 secure SDLC 预算的 VP Engineering 与产品安全负责人。
  buyingTriggers:
  - point: 正式铺开 AI 编码后，依赖 churn 抬升，但开发者对 AI 输出质量依旧不放心，于是包审查一下就暴露成明显控制缺口。
    sourceRefs:
    - 112
    - 23
    - 45
    - 115
  - point: 恶意包数量上升、实时供应链攻击变多，让安全团队越来越觉得 merge 之后再审已经太晚。
    sourceRefs:
    - 111
    - 77
    - 106
  - point: 合规和采购项目越来越常问：有没有可审计的 OSS 控制、受认可仓库，以及全生命周期的漏洞处理机制。
    sourceRefs:
    - 46
    - 47
    - 48
    - 19
  willingnessToPay:
    summary: 买家已经接受按开发者计费的安全预算：GitHub Code Security 是每个活跃 committer 每月 $30，Snyk Team 起价是每个贡献型开发者每月 $25。所以如果一个更窄的依赖引入工作流能明确减少人工审查时间，并更早拦下高风险包，它就能拿到预算。
    sourceRefs:
    - 22
    - 87
  competitiveLandscape: 竞争很挤，但并不均匀。GitHub 和 GitLab 占住 merge 入口，广义 AppSec 套件占住预算线，供应链专精厂商占住恶意包与可达性叙事。这个创业方向只有把自己钉在一个窄流程上才最强：第一次包引入、替代建议，以及可复用的策略记忆。
  incumbentThesis:
  - incumbentClass: SCM 平台
    point: GitHub 和 GitLab 本来就在 pull-request 路径上，但它们现在的依赖能力主要还是可见性、状态检查和基础策略原语，而不是深入到组织专属的包采购决策。
    sourceRefs:
    - 24
    - 20
    - 33
    - 39
  - incumbentClass: 广义 AppSec 套件
    point: Snyk 靠平台广度和整合能力取胜，这对想统一 AppSec 的买家很有吸引力；但也正因为太广，第一次包审批只是它里面一个子流程，不是核心产品。
    sourceRefs:
    - 87
    - 86
  - incumbentClass: 供应链专精厂商
    point: Socket 和 Endor Labs 离这个威胁叙事最近，但两家主打的还是包情报、恶意包拦截、可达性或 firewall，而不是 PR 原生的审批记忆和替代指引。
    sourceRefs:
    - 106
    - 104
    - 17
    - 18
  - incumbentClass: provenance 与 attestation 工具
    point: npm provenance 和 PyPI attestations 能增强完整性证据，但它们并不回答：某个包在一家具体工程组织里到底该不该被采用。
    sourceRefs:
    - 120
    - 74
  regulatoryLandscape: 监管的拉力不是硬性指向这个品类，但很有分量：美国安全软件指引会奖励受认可仓库、SCA 和 provenance 控制，欧盟 CRA 则抬高了薄弱漏洞生命周期处理的代价。这样一来，即便没有哪条规则直接要求买这类产品，采购阶段也更容易把可审计的依赖引入控制讲通。
  technologyLandscape: 底层能力正在快速成熟。SCM 已经能暴露 PR 检查和状态闸门，registry 正在补 provenance 与 attestation，SBOM 一类标准也在让信任证据更机器可读。创业公司要默认这些原始信号迟早会商品化，因此真正该拼的是工作流编排和策略记忆。
  distributionChannels:
  - point: 走 GitHub 和 GitLab 集成分发是可信的，因为 dependency review、approval policy 和 status check 本来就在 PR 工作流里。
    sourceRefs:
    - 24
    - 20
    - 33
    - 39
  - point: 当 AI rollout、恶意包高峰，或者高层推动 secure-SDLC 项目时，面向 AppSec 和平台团队做 incident-led outbound，会很容易打中当前手工审批的脆弱点。
    sourceRefs:
    - 112
    - 111
    - 77
    - 113
  partnershipEcosystem:
  - point: npm provenance 和 PyPI attestations 是天然的上游数据伙伴，因为它们能直接提高包 provenance 简报的质量。
    sourceRefs:
    - 120
    - 74
  - point: OpenSSF 元数据和 SCM 原生生态是很好的下游伙伴，因为 Scorecard、dependency graph 和 merge check 都能用来增强或分发策略决策。
    sourceRefs:
    - 54
    - 24
    - 33
  dataMoats:
  - point: NIST 明确建议企业为经过审核的开源组件维护受认可的内部仓库；如果创业公司把每次批准都记录下来，就能把这条指导变成一套活的内部包目录。
    sourceRefs:
    - 47
    - 46
  - point: 把 provenance、attestation、scorecard 这类公开信任信号，与每个客户自己的历史批准记录拼在一起，就能逐步长出替代图谱和更快的后续决策。
    sourceRefs:
    - 120
    - 74
    - 54
  geographicConsiderations:
  - point: 面向欧盟的软件厂商会更急，因为 CRA 的报告义务从 2026 年开始，全生命周期义务从 2027 年起进一步落地。
    sourceRefs:
    - 19
  - point: 美国联邦及受联邦影响的买家，已经在 SSDF、SCA 和受认可仓库上有明确语言，这能让“控制平面”这套叙事更早在强监管账户里落地。
    sourceRefs:
    - 46
    - 47
    - 48
  sensitivityCases:
  - case: GitHub 把原生 dependency review 扩成更完整的审批工作流与包策略记忆
    impact: 切口会很快变窄，因为对很多目标买家来说，默认 merge 入口本来就掌握在 GitHub 手里。
    sourceRefs:
    - 24
    - 20
    - 22
  - case: AI 编码采用继续走高，但信任感依然偏低
    impact: 对人工治理的引入层需求会更强，因为开发者仍在交付 AI 辅助代码，却持续抱怨“差一点对”的输出。
    sourceRefs:
    - 112
    - 23
    - 115
  - case: provenance 和 attestation 在各大 registry 里变成默认配置
    impact: 信号采集会迅速商品化，产品价值会转移到审批速度、替代建议质量和审计轨迹。
    sourceRefs:
    - 120
    - 74
  validationPlan:
  - priority: 高
    question: 一个 250 人规模、使用 AI 辅助开发的团队，每月到底会产生多少次首次 npm / PyPI 包引入？
    evidenceToGather: 从 5-10 个共创客户收集 Copilot/Cursor rollout 前后的 manifest 与 lockfile diff 数据。
  - priority: 高
    question: 现在审批一个高风险新依赖，中位耗时是多少，责任链路又是怎么走的？
    evidenceToGather: 收集平台安全团队的 Slack 线程、Jira 工单、PR 评论和事故复盘。
  - priority: 中
    question: 买家会更偏好先上 advisory mode，还是一开始就要求对未知包直接 blocking？
    evidenceToGather: 按团队成熟度、对误报的容忍度和事故历史切分 pilot 结果。
  - priority: 中
    question: 除了 JavaScript 和 Python，第一天就必须做深的生态还有哪些？
    evidenceToGather: 梳理 devtools、fintech 和 AI infra 共创客户的语言组合与私有 registry 模式。
