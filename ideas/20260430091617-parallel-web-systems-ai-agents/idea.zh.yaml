problem: 营收周期团队很想用 AI 智能体去处理支付方门户里的理赔状态、资格核验和事前授权跟进，但这些智能体总会在登录、MFA、页面改版、限流以及缺少审计链路时失手。结果，团队只能退回到离岸人工、脆弱的 Playwright 脚本，或仍需持续盯防的老式 RPA。真正痛的，不是生成文字，而是让智能体在第三方网站上稳定完成带认证、受合规约束的工作，可靠到足以替代一部分人力。
targetUser:
  primary: 美国营收周期管理（RCM）外包公司的自动化或运营副总裁，负责跨多个支付方门户做理赔跟进
  secondary: AI 原生 RCM 厂商的产品负责人，希望把浏览器智能体嵌入拒付管理工作流
  buyer: 外包 RCM 服务商的 COO 或运营高级副总裁
startupThesis:
  nonObviousInsight: 下一层真正稀缺的智能体基础设施，不是更强的推理，而是在带认证的网站内部做长期稳定、符合策略约束的执行。市场信号已经表明，投资人愿意为 Web 访问基础设施本身买单；真正的切口，是把这层能力垂直化到一个门户密集、且 uptime 与可审计性直接映射到回款的工作流里。
  beachhead: 面向美国中型 RCM 外包商的理赔状态与事前授权跟进，它们通常要跨几十个支付方门户作业
  wedge: 一套面向支付方门户智能体的带认证浏览器运行时，内置会话持久化、UI 漂移检测、人工接管和审计日志
  whyNowCatalyst: Parallel 围绕开放 Web 基础设施迅速完成 $100M 融资并达到 $2B 估值，说明企业正从试点走向生产，而浏览器执行恰好卡住了这一步。
  ventureScalePath: 先从支付方门户切入，再把同一套运行时扩展到 provider enrollment、药房福利工作流、催收，以及其他任何要求智能体在第三方 Web 系统中执行的受监管行业。
solution: 构建一套位于 LLM 智能体与支付方门户之间的托管运行时。它负责凭据保管、MFA 交接、持久浏览器会话、selector 漂移监控、策略校验，以及可完整回放的审计日志，让运营团队可以信任高频门户作业。首个产品会为最常见的理赔状态与事前授权流程提供预置连接器；一旦页面变化或触发策略规则，就把任务送入人工接管队列。客户既可以通过 API 接入，也可以挂到现有智能体或 RPA 栈上，从而替换脆弱的浏览器自动化，而不需要推翻整条工作流。
goToMarketSeed:
  firstCustomer: 一家拥有 500+ 员工的美国 RCM 外包公司，离岸团队仍在手工跨主流支付方门户检查理赔状态和事前授权
  buyingTrigger: 公司推进降本，或一项 AI 自动化试点因为门户智能体在生产环境中失败率太高而卡住
  currentAlternative: 离岸人工、内部 Playwright/Selenium 脚本，或带手工异常处理的老式 RPA 机器人
  switchingReason: 这个切口能比内部自建更快地把不可靠的浏览器自动化变成可审计的生产系统，而且长期维护成本低于通用 RPA
  pricingHypothesis: 平台费外加按成功完成的门户任务或活跃支付方门户工作流计费的 usage 模式
