    currentAlternative: 人工离岸团队加电子表格任务队列
    successMetric: 每个理赔状态任务的处理成本，以及 A/R 天数
  - job: 当浏览器智能体试点在生产环境频频失手时，帮自动化负责人部署一套可靠的门户运行时，让规模化不再建立在反复修脚本上。
    currentAlternative: 内部 Playwright/Selenium 机器人或通用 RPA
    successMetric: 门户任务在极少人工干预下的成功完成率
