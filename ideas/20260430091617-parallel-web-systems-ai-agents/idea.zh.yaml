problem: 收入周期公司希望用 AI 智能体处理支付方门户中的索赔状态、资格核验与事前授权跟进，但这些智能体会在登录、MFA、页面变动、限流以及缺失审计轨迹等环节失效。结果，团队不得不退回到离岸人工、脆弱的 Playwright 脚本，或仍需持续盯守的传统 RPA。真正痛苦的缺口不在于生成文本，而在于让智能体足够稳定地完成第三方网站上的认证且合规敏感的工作，从而真正替代人头。
targetUser:
  primary: 美国一家收入周期管理公司的自动化或运营副总裁，该公司需要跨多个支付方门户处理索赔跟进
  secondary: AI 原生 RCM 供应商中的产品负责人，希望将浏览器智能体嵌入拒付管理工作流
  buyer: 外包 RCM 服务商的 COO 或运营高级副总裁
startupThesis:
  nonObviousInsight: 下一层稀缺的智能体技术栈能力，不是更聪明的推理，而是在认证网站内部可持续、策略安全的执行。市场信号表明，投资人正在奖励 Web 访问基础设施本身；更优切入方式，是围绕一个门户密集型工作流做垂直化，因为这里的正常运行时间和可审计性可以直接映射到回款收入。
  beachhead: 面向美国中型 RCM 外包商、跨数十个支付方门户执行的索赔状态与事前授权跟进
  wedge: 一套面向支付方门户智能体的认证浏览器运行时，具备会话持久化、UI 漂移检测、人工兜底和审计日志
  whyNowCatalyst: Parallel 围绕开放 Web 基础设施快速完成 $100 million 融资并达到 $2 billion 估值，这表明企业正从试点走向生产，而智能体部署恰好开始撞上浏览器执行瓶颈。
  ventureScalePath: 先从支付方门户切入，再将同一运行时扩展到提供方注册、药房福利工作流、催收，以及之后任何要求智能体在第三方 Web 系统中操作的受监管行业。
solution: 构建一个位于 LLM 智能体与支付方门户之间的托管运行时。它负责凭证保管、MFA 交接、持久化浏览器会话、选择器漂移监控、策略检查，以及可回放的完整审计日志，让运营团队能够信任高吞吐量的门户工作。首个产品将内置最常见索赔状态与事前授权工作流的预构建连接器，并在页面变化或策略规则触发时提供人工接管队列。客户可通过 API 或现有的智能体与 RPA 技术栈进行集成，从而替换脆弱的浏览器自动化，而无需替换其余工作流。
