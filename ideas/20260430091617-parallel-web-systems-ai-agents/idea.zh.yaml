problem: 营收周期服务商当然想让 AI 智能体去付款方门户里跑理赔状态查询、资格核验和事前授权跟进，但这些智能体一撞上登录、MFA、页面改版、限流和审计留痕缺口，就很容易当场掉链子。结果团队还是只能靠离岸人力、脆弱的 Playwright 脚本，或者那种需要人一直盯着的老式 RPA。真正难的从来不是生成几段文字，而是让智能体在第三方网站里把带认证、带合规约束的工作稳定做完，稳定到足以真正替掉一部分人头。
targetUser:
  primary: 美国营收周期管理公司里负责自动化或运营的副总裁，团队要跨多个付款方门户处理理赔跟进
  secondary: AI 原生 RCM 厂商里，把浏览器智能体塞进拒付管理工作流的产品负责人
  buyer: 外包型 RCM 服务商的 COO 或运营高级副总裁
startupThesis:
  nonObviousInsight: 下一层真正稀缺的能力，不是把推理再堆聪明一点，而是在带认证的网站里稳定、合规地把动作跑完。市场已经给出信号：投资人愿意为网页访问基础设施本身付高价；真正能切进去的方式，是把这层基础设施垂直到一个门户密集、且 uptime 和可审计性直接影响回款的工作流里。
  beachhead: 美国中型 RCM 外包商，跨几十个付款方门户做理赔状态与事前授权跟进
  wedge: 一套给付款方门户智能体用的认证浏览器运行时，内置会话持久化、界面漂移检测、人工接管和审计日志
  whyNowCatalyst: Parallel 围绕开放网页基础设施在很短时间内拿下 $100 million 融资、估值冲到 $2 billion，说明企业刚准备把智能体从试点推向生产，就已经集体撞上浏览器执行上限。
  ventureScalePath: 先把付款方门户跑透，再用同一套运行时扩到医生资质注册、药品福利流程、催收，以及更广义的受监管行业——凡是智能体必须在第三方网页系统里亲自操作的地方，都能继续外溢。
solution: 做一层夹在 LLM 智能体和付款方门户之间的托管运行时。它负责凭证保管、MFA 交接、浏览器会话持久化、选择器漂移监控、策略校验，以及完整可回放的审计日志，让运营团队敢把高频门户任务真正放上去。第一版产品直接带上常见理赔状态和事前授权流程的预置连接器；只要页面改版，或命中策略规则，就把任务送回人工接管队列。客户既可以通过 API 接入，也可以塞进现有智能体或 RPA 栈里，把脆弱的浏览器自动化换掉，而不用把整条工作流推倒重来。
goToMarketSeed:
  firstCustomer: 一家 500+ 员工的美国 RCM 外包商，离岸团队还在多个主流付款方门户里手工查理赔状态和事前授权
  buyingTrigger: 管理层要压人工成本，或者一个 AI 自动化试点卡死在生产阶段，因为门户智能体的失败率始终压不下去
  currentAlternative: 离岸人工团队、内部 Playwright/Selenium 脚本，或带人工异常处理的老式 RPA 机器人
  switchingReason: 这个切口能把原本不可靠的浏览器自动化，尽快拉成可审计的生产系统；比内部自建更快落地，也比通用 RPA 更省长期维护。
  pricingHypothesis: 平台费叠加按成功完成的门户任务，或按活跃付款方门户工作流计费。
