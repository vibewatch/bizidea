topRisks:
- name: 门户访问阻力
  description: 支付方可能会修改界面或反机器人控制，从而压低自动化成功率。
  mitigation: 先从有人在环的工作流切入，保持快速漂移检测工具，并优先选择即便是半自动化也能带来明显 ROI 的客户。
- name: 合规与凭据风险
  description: 处理医疗凭据和浏览器操作，可能引发安全与合规方面的异议。
  mitigation: 采用基于保管库的凭据管理、细粒度审计日志、最小权限访问，并优先通过已运行医疗合规计划的 RCM 厂商落地。
- name: 横向平台竞争
  description: 资金充足的通用智能体基础设施厂商，可能向下进入同一工作流。
  mitigation: 用垂直深度、预置支付方工作流和可量化的现金回收结果取胜，而不是拼通用浏览器能力。
