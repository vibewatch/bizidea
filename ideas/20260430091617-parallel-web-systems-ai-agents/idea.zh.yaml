topRisks:
  - name: 门户访问阻力
    description: 付款方可能调整界面或反机器人策略，直接压低自动化成功率。
    mitigation: 先从人在回路里的流程切入，做快漂移检测工具，并优先服务那些即便是半自动也能打出强 ROI 的客户。
  - name: 合规与凭证风险
    description: 处理医疗凭证和浏览器动作，本身就会触发安全与合规质疑。
    mitigation: 采用保险库式凭证管理、细粒度审计日志、最小权限控制，并先通过已经具备医疗合规体系的 RCM 厂商切入。
  - name: 横向平台竞争
    description: 资金充足的通用智能体基础设施厂商，可能顺着能力栈下探到同一工作流。
    mitigation: 靠垂直深度、预置付款方流程和可量化回款结果取胜，而不是只拼通用浏览器能力。
