topRisks:
  - name: 门户访问阻力
    description: 付款方可能改界面、调反机器人策略，直接把自动化成功率往下打。
    mitigation: 先从人在回路里的流程切入，把漂移检测工具做快，并优先服务那些即便只做到半自动也能打出强 ROI 的客户。
  - name: 合规与凭证风险
    description: 处理医疗凭证和浏览器动作，本身就很容易招来安全与合规质疑。
    mitigation: 采用保险库式凭证管理、细粒度审计日志和最小权限控制，并先借已经具备医疗合规体系的 RCM 厂商切进去。
  - name: 横向平台竞争
    description: 资金充足的通用智能体基础设施厂商，可能顺着能力栈往下压到同一工作流。
    mitigation: 靠垂直深度、预置付款方流程和可量化回款结果取胜，而不是只拼通用浏览器能力。
