differentiator: 大多数智能体平台停在编排层，大多数浏览器自动化工具停在脚本层。这家公司要吃下中间最脏、也最值钱的生产层：认证会话、门户漂移、策略约束，以及单一高价值工作流里的可审计执行。先从付款方门户切进去后，它会积累一套专有遥测：哪些流程最容易断、哪些站点最会限流、出了问题该怎样安全恢复。通用智能体栈拿不到这层数据，也就很难复制这种可靠性护城河。
