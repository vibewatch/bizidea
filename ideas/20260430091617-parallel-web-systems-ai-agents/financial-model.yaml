modelDiagram:
  title: unit economics flow
  mermaid: |-
    flowchart LR
      Leads --> PaidPilots
      PaidPilots --> ProductionCustomers
      ProductionCustomers --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
- checkName: Revenue engine
  finding: The base case reaches roughly $6.0M exit ARR by converting 3 paid pilots into production in Y1, scaling to 6 production customers by Y2, and finishing Y3 with 15 customers at about $400K ACV.
- checkName: Must go right
  finding: Pilots must clear the >85% task-success threshold quickly enough to keep the discovery-to-production cycle near 6 months and preserve the 50%+ conversion assumption.
- checkName: Model breaks if
  finding: The downside case shows that a 9-month sales cycle or a 65% gross margin outcome pulls Y3 EBITDA back below zero and compresses the cash floor toward roughly $0.45M.
- checkName: Next-round proof
  finding: Six production customers plus the first embedded partner deployment by month 24 is the milestone that should justify a larger seed round.
sanityChecks:
  ruleOf40: Y3 growth 118.1% + EBITDA margin 10.1% = 128.2%
  burnMultiple: Y2 burn multiple ~0.3x using $0.36M EBITDA loss against about $1.2M of net new ARR from 3 to 6 production customers.
  revenuePerFte: $379K Y3 using average FTE of ~12.5 (benchmark roughly $200-400K for vertical SaaS).
  flags:
  - The model assumes the top five payer portals cover enough volume to avoid a materially larger connector roadmap; if not, R&D spend and implementation time both rise.
  - Early enterprise procurement is modeled with baseline BAA, vaulting, audit logs, and tenant isolation rather than a heavier certification burden; tougher security reviews could delay cash conversion.
  - Revenue is concentrated in a small number of accounts through Y2, so one slipped pilot conversion would move both revenue and cash materially.
  - Portal workflow demand is assumed to remain meaningful through the next 24 months despite CMS interoperability deadlines; faster API migration would pressure Y3 expansion.
