scenarios:
  downside:
    description: Slower procurement and heavier human fallback push pilot conversion down and delay production starts by roughly two quarters.
    y3RevenueK: 3500.0
    y3EbitdaK: -250.0
    cashLowPointK: 450.0
    keyAssumptionChanges:
    - Pilot-to-production conversion drops from >50% to ~40%.
    - Production ACV averages $350K instead of $400K.
    - Gross margin lands at 65% because exception handling stays labor-intensive.
  base:
    description: Base case converts the initial paid design partners into repeatable production contracts and reaches the SOM framing by Q4 Y3.
    y3RevenueK: 4740.0
    y3EbitdaK: 478.5
    cashLowPointK: 1384.0
    keyAssumptionChanges:
    - Paid pilots convert at 50%+ once task success stays above 85%.
    - Production ACV holds near $400K with 70% gross margin.
    - Hiring remains milestone-based rather than front-loaded.
  upside:
    description: A faster partner channel and stronger within-account expansion lift both customer count and ACV without materially accelerating hires.
    y3RevenueK: 5600.0
    y3EbitdaK: 900.0
    cashLowPointK: 1500.0
    keyAssumptionChanges:
    - Pilot-to-production conversion reaches ~65%.
    - Blended ACV expands to ~$425K through more workflows per account.
    - Partner-led distribution contributes 3 Y3 wins without extra quota-carrying hires before Q4.
