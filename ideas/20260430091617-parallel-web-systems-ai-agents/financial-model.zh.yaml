slug: payer-portal-agent-runtime
date: '2026-04-30'
currency: USD
modelStartMonth: 2026-05
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-05
  unit: yyyy-mm
  source: '[由 BP.date 2026-04-30 推导]'
- id: A2
  name: Pre-seed 融资在 M1 完成
  value: '2.4'
  unit: USD M
  source: '[基于 BP.fundingAsk targetFundingRangeUsd $2-4M；按达到 24 个月里程碑并保留 6 个月缓冲配置]'
- id: A3
  name: 融资前起始现金
  value: '0'
  unit: USD K
  source: '[创业财务经验法则：模型假设本轮融资从 M1 起覆盖运营计划]'
- id: A4
  name: 付费试点定价
  value: '20'
  unit: USD K per month for 3 months
  source: '[BP.gtm 定价为年度平台费加使用费；按创业经验将试点设为目标 ACV 的约 15%]'
- id: A5
  name: 正式生产客户 ACV
  value: '400'
  unit: USD K per year
  source: '[BP.market.som 与 RS.market.som 假设约 15 个客户、每个客户年支出约 $400K]'
- id: A6
  name: 目标毛利率
  value: '70'
  unit: percent
  source: '[BP.businessModel.targetGrossMarginPct]'
- id: A7
  name: 第 1 年客户爬坡
  value: 签约 4 个试点；到 M12 转化 3 个正式生产客户
  unit: customers
  source: '[BP.milestones 0-12 months 和 BP.gtm funnel targets]'
- id: A8
  name: 第 2 年客户爬坡
  value: 到 M24 达到 6 个正式生产客户
  unit: customers
  source: '[BP.milestones 12-24 months]'
- id: A9
  name: 第 3 年客户爬坡
  value: 到 M36 达到 15 个正式生产客户
  unit: customers
  source: '[BP.milestones 24-36 months 和 RS.market.som]'
- id: A10
  name: 从商机发现到生产上线周期
  value: '6'
  unit: months
  source: '[BP.gtm 中的 90 天付费试点加企业采购；创业经验估算实施滞后期]'
- id: A11
  name: 用于单位经济模型的月度客户流失率
  value: '2.0'
  unit: percent
  source: '[适用于账户集中的早期垂直企业 SaaS 的创业财务经验法则]'
- id: A12
  name: 创始人/高管全包成本薪酬
  value: '180'
  unit: USD K annual
  source: '[创业财务经验法则：$150K 现金工资加 20% 福利/税费负担]'
- id: A13
  name: 工程全包成本薪酬
  value: '204'
  unit: USD K annual per FTE
  source: '[创业财务经验法则：$170K 现金工资加 20% 福利/税费负担]'
- id: A14
  name: 安全/平台全包成本薪酬
  value: '228'
  unit: USD K annual per FTE
  source: '[创业财务经验法则：$190K 现金工资加 20% 福利/税费负担]'
- id: A15
  name: 解决方案/实施全包成本薪酬
  value: '162'
  unit: USD K annual per FTE
  source: '[创业财务经验法则：$135K 现金工资加 20% 福利/税费负担]'
- id: A16
  name: 销售/合作伙伴全包成本薪酬
  value: '192'
  unit: USD K annual per FTE
  source: '[创业财务经验法则：首位企业销售采用 $160K 底薪加浮动，再加 20% 负担]'
- id: A17
  name: 运营/合规全包成本薪酬
  value: '156'
  unit: USD K annual per FTE
  source: '[创业财务经验法则：$130K 现金工资加 20% 福利/税费负担]'
- id: A18
  name: 招聘时间表
  value: M1 配置创始人与首位工程师；M3 安全；M4 解决方案；M9 首位销售；随后 M13 增聘 1 名工程师、M16 运营、M18 解决方案、M20 工程师、M24 销售、M25 工程师、M28 解决方案、M31 工程师、M34 销售
  unit: timing
  source: '[基于 BP.team startTiming 与里程碑驱动的扩张经验法则]'
- id: A19
  name: 非薪资运营费用阶梯提升
  value: Y1/Y2/Y3 的 R&D 工具分别为 12/15/18 K 每月，G&A 为 10/12/14 K，S&M 为 3/6/8 K
  unit: USD K per month
  source: '[适用于云运行时、安全工具、法务/合规、差旅和轻量需求生成的创业财务经验法则]'
- id: A20
  name: 每个正式生产客户的混合 CAC
