modelDiagram:
  title: 单位经济模型流转
  mermaid: "flowchart LR\n  Leads --> PaidPilots\n  PaidPilots --> ProductionCustomers\n  ProductionCustomers --> Revenue\n  Revenue --> GrossProfit\n  GrossProfit --> Cash"
modelSanity:
- checkName: 收入引擎
  finding: 基础情景下，公司通过在 Y1 把 3 个付费试点转成生产客户、到 Y2 达到 6 家生产客户，并在 Y3 末以约 15 家客户、每家约 $400K ACV 收官，从而做到约 $6.0M 的 exit ARR。
- checkName: 必须成立的前提
  finding: 试点必须足够快地跨过 >85% 的任务成功率门槛，才能把 discovery-to-production 周期维持在约 6 个月，并守住 50%+ 的转化假设。
- checkName: 模型会失灵的情况
  finding: 下行情景显示，如果销售周期拉长到 9 个月，或毛利率只有 65%，Y3 EBITDA 会重新跌回负值，现金低点也会压缩到约 $0.45M。
- checkName: 下一轮融资所需证明
  finding: 到第 24 个月时做到 6 家生产客户并完成首个嵌入式伙伴部署，是支撑下一轮更大 seed 融资的关键证明点。
sanityChecks:
  ruleOf40: Y3 growth 118.1% + EBITDA margin 10.1% = 128.2%
  burnMultiple: Y2 burn multiple ~0.3x using $0.36M EBITDA loss against about $1.2M of net new ARR from 3 to 6 production customers.
  revenuePerFte: $379K Y3 using average FTE of ~12.5 (benchmark roughly $200-400K for vertical SaaS).
  flags:
  - 模型默认前五个支付方门户覆盖了足够多的任务量，因此不需要显著更长的连接器路线图；如果这个前提不成立，R&D 支出和实施时间都会上升。
  - 早期企业采购按 BAA、保管库、审计日志和租户隔离来建模，而不是更重的认证负担；如果安全评审更严，回款转化就会延迟。
  - 到 Y2 为止，收入仍集中在少数账户中，因此任何一个试点转化的延后，都会明显影响收入和现金。
  - 模型假设未来 24 个月里门户工作流仍具有足够分量，尽管 CMS 已设定互操作性时限；如果 API 迁移更快，Y3 扩张会承压。
