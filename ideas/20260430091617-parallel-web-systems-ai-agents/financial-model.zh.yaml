  name: 招聘节奏
  value: M1 配齐创始人与首位工程师；M3 招安全；M4 招解决方案；M9 招首位销售；之后在 M13 招 1 名工程师、M16 招运营、M18 招解决方案、M20 招工程师、M24 招销售、M25 招工程师、M28 招解决方案、M31 招工程师、M34 招销售
  unit: timing
  source: '[来自 BP.team 的 startTiming，并叠加基于里程碑的扩编启发式]'
- id: A19
  name: 非薪酬 opex 阶梯
  value: Y1/Y2/Y3 的月度非薪酬费用分别抬升为：R&D 工具 12/15/18 K，G&A 10/12/14 K，S&M 3/6/8 K
  unit: USD K per month
  source: '[针对云运行时、安全工具、法务/合规、差旅与轻量获客的创业财务启发式]'
