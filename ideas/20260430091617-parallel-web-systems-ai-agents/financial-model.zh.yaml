    baseCase: Milestone-based hiring plan
    upsideCase: 2 hires deferred until after 8 production customers
    y3RevenueImpactK: -80
    cashImpactK: -360
modelDiagram:
  title: 单位经济流转
  mermaid: |-
    flowchart LR
      Leads[线索] --> PaidPilots[付费试点]
      PaidPilots --> ProductionCustomers[正式生产客户]
      ProductionCustomers --> Revenue[收入]
      Revenue --> GrossProfit[毛利润]
      GrossProfit --> Cash[现金]
modelSanity:
  - checkName: 收入引擎
    finding: 基准情形下，到 Y3 退出时 ARR 约为 $6.0M，路径是：Y1 把 3 个付费试点转成正式生产，Y2 扩到 6 家正式生产客户，Y3 收在 15 家、每家约 $400K ACV。
  - checkName: 必须跑顺的环节
    finding: 试点必须足够快地把任务成功率拉过 85%，这样从线索到正式生产的周期才能稳在 6 个月附近，50%+ 的转化假设才站得住。
  - checkName: 模型会在哪些地方失灵
    finding: 下行情形表明，只要销售周期拉到 9 个月，或毛利率掉到 65%，Y3 EBITDA 就会重新转负，现金低点也会压缩到约 $0.45M。
  - checkName: 下一轮融资证明点
    finding: 到 month 24 拿下 6 家正式生产客户，并完成首个嵌入式伙伴部署，应是支撑更大 seed 轮的核心节点。
sanityChecks:
  ruleOf40: Y3 growth 118.1% + EBITDA margin 10.1% = 128.2%
  burnMultiple: Y2 burn multiple ~0.3x using $0.36M EBITDA loss against about $1.2M of net new ARR from 3 to 6 production customers.
  revenuePerFte: $379K Y3 using average FTE of ~12.5 (benchmark roughly $200-400K for vertical SaaS).
  flags:
    - 模型默认前五个付款方门户就能覆盖足够任务量，否则连接器路线图和实施成本都会同步上升。
    - 早期企业采购按 BAA、保险库、审计日志和租户隔离为基线；如果安全审查更重，现金回收会明显后移。
    - 到 Y2 之前，收入集中在少数账户中，因此只要一个试点转正滑掉，收入和现金都会明显受伤。
    - 模型默认未来 24 个月门户工作仍有足够体量；如果 API 迁移更快，Y3 扩张会承压。
