modelDiagram:
  title: 单位经济流程
  mermaid: |
    flowchart LR
      Leads[线索] --> PaidPilots[付费试点]
      PaidPilots --> ProductionCustomers[正式生产客户]
      ProductionCustomers --> Revenue[收入]
      Revenue --> GrossProfit[毛利润]
      GrossProfit --> Cash[现金]
modelSanity:
- checkName: Revenue engine
  finding: 基础情形通过在 Y1 将 3 个付费试点转成生产合同、Y2 扩展到 6 个生产客户，并以约 15 个客户、每个约 $400K ACV 结束 Y3，从而达到约 $6.0M 的退出 ARR。
- checkName: Must go right
  finding: 要成立，试点必须足够快地跨过 >85% 的任务成功率门槛，才能把从商机发现到生产上线周期维持在约 6 个月，并守住 50%+ 的转化假设。
- checkName: Model breaks if
  finding: 下行情形表明，如果销售周期拉长到 9 个月或毛利率只有 65%，Y3 EBITDA 会重新跌回零以下，现金最低点也会压缩到约 $0.45M。
- checkName: Next-round proof
  finding: 到第 24 个月实现 6 个生产客户并完成首个嵌入式合作伙伴部署，是足以支撑更大种子轮的证明节点。
sanityChecks:
  ruleOf40: Y3 growth 118.1% + EBITDA margin 10.1% = 128.2%
  burnMultiple: Y2 的 burn multiple 约为 0.3x，以 $0.36M 的 EBITDA 亏损对应从 3 个到 6 个生产客户带来的约 $1.2M 净新增 ARR 计算。
  revenuePerFte: Y3 每 FTE 收入为 $379K，按平均约 12.5 FTE 计算（垂直 SaaS 基准约为 $200-400K）。
  flags:
  - 模型假设前五大支付方门户覆盖了足够任务量，因此无需显著扩大连接器路线图；若不成立，R&D 支出和实施时间都会上升。
  - 早期企业采购按 BAA、保管、审计日志和租户隔离作为基线，而不是更重的认证负担；更严格的安全审查可能延迟现金转化。
  - 到 Y2 前收入集中在少数账户，一次试点转化延迟就会显著影响收入和现金。
  - 模型假设在 CMS 互操作性截止期限下，未来 24 个月门户工作流需求仍然重要；更快的 API 迁移会压缩 Y3 扩张。
