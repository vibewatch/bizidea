scenarios:
  downside:
    description: 采购更慢、人工兜底更重，导致试点转生产的转化率下降，生产启动大约晚两个季度。
    y3RevenueK: 3500.0
    y3EbitdaK: -250.0
    cashLowPointK: 450.0
    keyAssumptionChanges:
    - 试点转生产的转化率从 >50% 降到约 40%。
    - 生产 ACV 平均只有 $350K，而不是 $400K。
    - 由于异常处理仍偏人力密集，毛利率落在 65%。
  base:
    description: 基础情景假设首批付费 design partner 能顺利转成可复制的生产合同，并在 Y3 Q4 达到 SOM 框架。
    y3RevenueK: 4740.0
    y3EbitdaK: 478.5
    cashLowPointK: 1384.0
    keyAssumptionChanges:
    - 当任务成功率稳定高于 85% 时，付费试点的转化率维持在 50%+。
    - 生产 ACV 稳定在约 $400K，毛利率保持 70%。
    - 招聘继续按里程碑推进，而不是提前前置。
  upside:
    description: 更快的伙伴渠道和更强的单客户扩张，能同时抬高客户数和 ACV，而不必明显提前扩编。
    y3RevenueK: 5600.0
    y3EbitdaK: 900.0
    cashLowPointK: 1500.0
    keyAssumptionChanges:
    - 试点转生产的转化率提高到约 65%。
    - 由于单客户承载更多工作流，综合 ACV 扩大到约 $425K。
    - 伙伴主导分发在 Y3 贡献 3 个新单，而无需在 Q4 前增加更多带 quota 的销售。
