scenarios:
  downside:
    description: 采购更慢且人工兜底更重，压低试点转化率，并将正式生产启动时间大致推迟两个季度。
    y3RevenueK: 3500.0
    y3EbitdaK: -250.0
    cashLowPointK: 450.0
    keyAssumptionChanges:
    - 试点到生产转化率从 >50% 降至约 40%。
    - 正式生产 ACV 平均为 $350K，而非 $400K。
    - 由于异常处理仍然劳动密集，毛利率落在 65%。
  base:
    description: 基础情形下，最初的付费设计合作伙伴会转化为可复制的生产合同，并在 Y3 Q4 达到 SOM 框架。
    y3RevenueK: 4740.0
    y3EbitdaK: 478.5
    cashLowPointK: 1384.0
    keyAssumptionChanges:
    - 当任务成功率持续高于 85% 时，付费试点转化率达到 50%+。
    - 正式生产 ACV 稳定在约 $400K，毛利率为 70%。
    - 招聘仍按里程碑推进，而非前置铺开。
  upside:
    description: 更快的合作伙伴渠道和更强的账户内扩张，在不明显加速招聘的情况下同时抬升客户数和 ACV。
    y3RevenueK: 5600.0
    y3EbitdaK: 900.0
    cashLowPointK: 1500.0
    keyAssumptionChanges:
    - 试点到生产转化率达到约 65%。
    - 通过单账户内更多工作流，混合 ACV 提升到约 $425K。
    - 在 Q4 之前无需新增配额销售人员，合作伙伴主导分销就能贡献 3 个 Y3 胜单。
