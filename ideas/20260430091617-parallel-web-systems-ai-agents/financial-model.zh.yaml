assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-05
  unit: yyyy-mm
  source: '[来自 BP.date 2026-04-30]'
- id: A2
  name: pre-seed 融资在 M1 完成
  value: '2.4'
  unit: USD M
  source: '[来自 BP.fundingAsk 的 $2-4M 区间；按达到 24 个月里程碑并预留 6 个月缓冲来定尺]'
- id: A3
  name: 融资前起始现金
  value: '0'
  unit: USD K
  source: '[创业财务启发式：模型假设本轮融资从 M1 起覆盖经营计划]'
- id: A4
  name: 付费试点定价
  value: '20'
  unit: USD K per month for 3 months
  source: '[来自 BP.gtm 的年度平台费 + usage 定价；按创业阶段启发式，将试点定在目标 ACV 的约 15%]'
- id: A5
  name: 生产客户 ACV
  value: '400'
  unit: USD K per year
  source: '[BP.market.som 与 RS.market.som 假设约 15 家客户、每家每年约 $400K 支出]'
- id: A6
  name: 目标毛利率
  value: '70'
  unit: percent
  source: '[来自 BP.businessModel.targetGrossMarginPct]'
- id: A7
  name: 第 1 年客户爬坡
  value: 第 1 年签下 4 个试点；到 M12 转成 3 个生产客户
  unit: customers
  source: '[来自 BP.milestones 的 0-12 个月目标和 BP.gtm 漏斗目标]'
- id: A8
  name: 第 2 年客户爬坡
  value: 到 M24 达到 6 个生产客户
  unit: customers
  source: '[来自 BP.milestones 的 12-24 个月目标]'
- id: A9
  name: 第 3 年客户爬坡
  value: 到 M36 达到 15 个生产客户
  unit: customers
  source: '[来自 BP.milestones 的 24-36 个月目标与 RS.market.som]'
- id: A10
  name: 从发现到生产的销售周期
  value: '6'
  unit: months
  source: '[来自 BP.gtm 的 90 天付费试点 + 企业采购节奏；并按创业启发式加入实施滞后]'
- id: A11
  name: 用于单位经济模型的月度 logo churn
  value: '2.0'
  unit: percent
  source: '[面向账户集中型早期垂直企业 SaaS 的创业财务启发式]'
- id: A12
  name: 创始人/高管全口径年薪
  value: '180'
  unit: USD K annual
  source: '[创业财务启发式：$150K 现金薪酬 + 20% 福利/税负]'
- id: A13
  name: 工程岗位全口径年薪
  value: '204'
  unit: USD K annual per FTE
  source: '[创业财务启发式：$170K 现金薪酬 + 20% 福利/税负]'
- id: A14
  name: 安全/平台岗位全口径年薪
  value: '228'
  unit: USD K annual per FTE
  source: '[创业财务启发式：$190K 现金薪酬 + 20% 福利/税负]'
- id: A15
  name: 解决方案/实施岗位全口径年薪
  value: '162'
  unit: USD K annual per FTE
  source: '[创业财务启发式：$135K 现金薪酬 + 20% 福利/税负]'
- id: A16
  name: 销售/伙伴岗位全口径年薪
  value: '192'
  unit: USD K annual per FTE
  source: '[创业财务启发式：首位企业销售按 $160K 底薪+浮动，再加 20% 税负]'
- id: A17
  name: 运营/合规岗位全口径年薪
  value: '156'
  unit: USD K annual per FTE
  source: '[创业财务启发式：$130K 现金薪酬 + 20% 福利/税负]'
