  - variable: CAC
    downsideCase: $130K per production customer
    baseCase: $95K per production customer
    upsideCase: $75K per production customer
    y3RevenueImpactK: -180
    cashImpactK: -525
  - variable: churn
    downsideCase: 3.0% 月度客户流失率
    baseCase: 2.0% 月度客户流失率
    upsideCase: 1.0% 月度客户流失率
    y3RevenueImpactK: -320
    cashImpactK: -280
  - variable: sales cycle
    downsideCase: 9 months from discovery to production
    baseCase: 6 months from discovery to production
    upsideCase: 4.5 months from discovery to production
    y3RevenueImpactK: -720
