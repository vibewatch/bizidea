assumptions:
  - id: A1
    name: 模型起始月份
    value: 2026-05
    unit: yyyy-mm
    source: '[Derived from BP.date 2026-04-30] 以商业计划日期后的首月作为模型起点。'
  - id: A2
    name: pre-seed 融资在 M1 交割
    value: '2.4'
    unit: USD M
    source: '[BP.fundingAsk targetFundingRangeUsd $2-4M] 取中位数，确保能覆盖 24 个月里程碑外加 6 个月缓冲。'
  - id: A3
    name: 融资前期初现金
    value: '0'
    unit: USD K
    source: '[Startup-finance heuristic] 模型假设从 M1 起主要由本轮融资支撑运营。'
  - id: A4
    name: 付费试点定价
    value: '20'
    unit: USD K per month for 3 months
    source: '[BP.gtm pricing annual platform fee plus usage] 试点价按目标 ACV 的约 15% 设定。'
  - id: A5
    name: 正式生产客户 ACV
    value: '400'
    unit: USD K per year
    source: '[BP.market.som and RS.market.som] 研究与商业计划都按约 15 家客户、每家 ~$400K 年支出建模。'
  - id: A6
    name: 目标毛利率
    value: '70'
    unit: percent
    source: '[BP.businessModel.targetGrossMarginPct]'
  - id: A7
    name: 第 1 年客户爬坡
    value: 4 pilots signed; 3 production conversions by M12
    unit: customers
    source: '[BP.milestones 0-12 months and BP.gtm funnel targets]'
  - id: A8
    name: 第 2 年客户爬坡
    value: 6 production customers by M24
    unit: customers
    source: '[BP.milestones 12-24 months]'
  - id: A9
    name: 第 3 年客户爬坡
    value: 15 production customers by M36
    unit: customers
    source: '[BP.milestones 24-36 months and RS.market.som]'
  - id: A10
    name: 从发现到正式生产的销售周期
    value: '6'
    unit: months
    source: '[BP.gtm] 90 天付费试点 + 企业采购与实施时滞，按创业财务启发式估算。'
  - id: A11
    name: 单位经济里的月度客户流失率
    value: '2.0'
    unit: percent
    source: '[Startup-finance heuristic] 适用于早期、客户集中度较高的垂直企业 SaaS。'
  - id: A12
    name: Founder/Exec 全包年薪
    value: '180'
    unit: USD K annual
    source: '[Startup-finance heuristic] 约 $150K 现金 + 20% 福利与税负。'
  - id: A13
    name: 工程岗位全包年薪
    value: '204'
    unit: USD K annual per FTE
    source: '[Startup-finance heuristic] 约 $170K 现金 + 20% 福利与税负。'
  - id: A14
    name: 安全/平台岗位全包年薪
    value: '228'
    unit: USD K annual per FTE
    source: '[Startup-finance heuristic] 约 $190K 现金 + 20% 福利与税负。'
  - id: A15
    name: 解决方案/实施岗位全包年薪
    value: '162'
    unit: USD K annual per FTE
    source: '[Startup-finance heuristic] 约 $135K 现金 + 20% 福利与税负。'
  - id: A16
    name: 销售/合作伙伴岗位全包年薪
    value: '192'
    unit: USD K annual per FTE
    source: '[Startup-finance heuristic] 首位企业销售按 $160K 底薪+浮动，再加 20% 负担。'
  - id: A17
    name: 运营/合规岗位全包年薪
    value: '156'
    unit: USD K annual per FTE
    source: '[Startup-finance heuristic] 约 $130K 现金 + 20% 福利与税负。'
  - id: A18
    name: 招聘顺序
    value: Founder and first engineer in M1; security M3; solutions M4; first seller M9; then 1 engineer M13, ops M16, solutions M18, engineer M20, seller M24, engineer M25, solutions M28, engineer M31, seller M34
    unit: timing
    source: '[BP.team startTiming plus milestone-based scaling heuristic]'
  - id: A19
    name: 非薪酬运营成本台阶
    value: R&D tools 12/15/18 K per month, G&A 10/12/14 K, S&M 3/6/8 K across Y1/Y2/Y3
    unit: USD K per month
    source: '[Startup-finance heuristic] 覆盖云运行时、安全工具、法务合规、差旅和轻量获客。'
