  amountM: 2.4
  runwayMonths: 24
  milestone: 拿下 6 家正式生产客户、完成首个嵌入式伙伴部署，并在进入 seed 轮前仍保留 6 个月现金缓冲。
  useOfFunds:
    - bucket: 工程研发
      amountUsd: 1104000
      percentage: 46
    - bucket: GTM
      amountUsd: 600000
      percentage: 25
    - bucket: 综合管理
      amountUsd: 300000
      percentage: 12.5
    - bucket: 缓冲（6 个月）
      amountUsd: 396000
      percentage: 16.5
scenarios:
  downside:
    description: 若采购更慢、人工兜底更重，试点转正会下滑，并把正式生产启动时间整体推迟约两个季度。
    y3RevenueK: 3500
    y3EbitdaK: -250
    cashLowPointK: 450
    keyAssumptionChanges:
      - 试点转正式生产的转化率从 50%+ 降到约 40%。
      - 正式生产 ACV 从 $400K 下滑到约 $350K。
      - 由于异常处理仍偏重人工，毛利率只落在 65%。
  base:
    description: 基准情形假设首批付费共创客户能稳定转成正式生产合同，并在 Y3 Q4 跑到 SOM 对应的规模。
    y3RevenueK: 4740
    y3EbitdaK: 478.5
    cashLowPointK: 1384
    keyAssumptionChanges:
      - 当任务成功率稳定超过 85% 时，付费试点转化率维持在 50%+。
      - 正式生产 ACV 维持在约 $400K，毛利率保持 70%。
      - 招聘继续按里程碑推进，而不是前置大幅扩编。
  upside:
    description: 如果伙伴渠道更快起量、同账户扩张更强，客户数和 ACV 都会抬升，而无需显著提前招聘。
    y3RevenueK: 5600
    y3EbitdaK: 900
    cashLowPointK: 1500
    keyAssumptionChanges:
      - 试点转正式生产的转化率提升到约 65%。
      - 通过同一客户内增加更多工作流，混合 ACV 扩到约 $425K。
      - 伙伴分发在 Y3 贡献 3 个新客户，且 Q4 之前无需额外增加专职销售。
