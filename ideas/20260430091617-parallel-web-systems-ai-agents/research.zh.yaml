      sourceRefs:
        - 10
        - 23
        - 24
        - 35
    competitiveRivalry:
      score: 4
      rationale: 资本正在涌入智能体网页基础设施，现有厂商和医疗工作流公司也不断推出相邻产品，赛道既拥挤又碎片化。
      sourceRefs:
        - 1
        - 12
        - 17
        - 23
  pestle:
    - factor: 政治
      impact: positive
      point: CMS 正积极推动互操作性与事前授权改革，这会给流程现代化带来带预算的紧迫感。
      sourceRefs:
        - 2
        - 3
    - factor: 经济
      impact: positive
      point: 拒付和事前授权行政成本仍直接侵蚀医疗机构与 RCM 公司的利润，所以节省人力的工具更容易立项。
      sourceRefs:
        - 4
        - 11
        - 35
    - factor: 社会
      impact: positive
      point: 事前授权带来的患者放弃治疗和医生倦怠，让行政自动化的意义不止停在后台效率。
      sourceRefs:
        - 4
        - 5
    - factor: 技术
      impact: positive
      point: 电脑操作模型和浏览器智能体工具进步很快，能自动化的工作流范围已经超过老式 RPA 的上限。
      sourceRefs:
        - 13
        - 17
        - 27
        - 28
    - factor: 法律
      impact: negative
      point: 医疗凭证存储、录屏和第三方网站自动化，会触发合规、审计和安全评审义务。
      sourceRefs:
        - 14
        - 33
        - 39
  adoptionFrictionMatrix:
    - friction: 围绕凭证、录屏和 PHI 暴露的安全审查
      severity: high
      affectedBuyer: COO、CISO、IT 安全团队
      mitigation: 接入保险库、提供 BAA、强化隔离，并把会话控制做成可审计。
      sourceRefs:
        - 14
        - 25
        - 39
    - friction: 门户漂移、等待状态和脆弱的 UI 改版
      severity: high
      affectedBuyer: 自动化负责人
      mitigation: 提供会话录制、运行时间线，以及针对头部付款方门户的垂直操作手册。
      sourceRefs:
        - 15
        - 22
        - 25
    - friction: MFA、CAPTCHA 与反机器人保护
      severity: high
      affectedBuyer: 运营和平台团队
      mitigation: 保留人在回路中的审批、持久化会话、安全的 2FA 编排，以及选择性代理。
      sourceRefs:
        - 16
        - 18
        - 19
        - 21
        - 26
        - 33
    - friction: 买方被上一代 RPA 失望教育过
      severity: medium
      affectedBuyer: 运营和财务管理层
      mitigation: 别卖泛化自动化故事，直接围绕任务成功率、A/R 天数和追回的拒付来卖。
      sourceRefs:
        - 11
        - 23
        - 24
    - friction: 付款方采纳 CMS 规则后，API 迁移节奏仍不确定
      severity: medium
      affectedBuyer: 平台和产品负责人
      mitigation: 把产品定位成 API 与遗留门户之间的桥接层加例外层。
      sourceRefs:
        - 2
        - 34
market:
  tam:
    value: $26.2B
