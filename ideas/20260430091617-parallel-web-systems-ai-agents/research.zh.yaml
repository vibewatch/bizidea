    isEstimate: true
    sourceRefs:
    - 4
    - 8
    - 29
    - 31
  sam:
    value: $0.8B
    rationale: 估算假设，全国负担中约 3% 位于最初海滩头，即由中型外包 RCM 公司和 AI 原生 RCM 供应商处理的门户密集型事前授权与索赔状态工作。
    isEstimate: true
    sourceRefs:
    - 4
    - 8
    - 31
  som:
    value: $6.0M
