      sourceRefs:
        - 20
        - 23
        - 27
    buyerPower:
      score: 4
      rationale: 目标买方手里有人工、自建脚本、RPA 套件和现有 RCM 平台等可信替代，所以在扩大预算前，一定会先逼着产品拿出 ROI 和可靠性证据。
      sourceRefs:
        - 4
        - 11
        - 23
        - 24
    threatOfEntrants:
      score: 4
      rationale: Playwright、Selenium、Skyvern 和横向浏览器运行时都把技术门槛往下压了，哪怕医疗垂直执行深度仍然更难搭。
      sourceRefs:
