  sourceRefs:
  - 1
- point: Automation Anywhere has an explicit agentic healthcare RCM offer with quantified value claims around claim turnaround and denial rework.
  sourceRefs:
  - 23
- point: Waystar is expanding authorization automation and generative AI across its platform, showing incumbent product investment around the same workflow.
  sourceRefs:
  - 12
- point: Allegheny Health and Humata publicly claim automation of more than 200,000 prior authorizations annually with a 96% first-pass approval rate, showing live enterprise adoption.
  sourceRefs:
  - 36
- point: WEDI survey results show many providers and payers are not ready for CMS prior-auth interoperability requirements, which creates near-term demand for bridge solutions.
  sourceRefs:
