topRisks:
  - name: "Portal access resistance"
    description: "Payers may change interfaces or anti-bot controls in ways that reduce automation success."
    mitigation: "Start with human-in-the-loop workflows, maintain fast drift-detection tooling, and prioritize customers where semi-automation still creates strong ROI."
  - name: "Compliance and credential risk"
    description: "Handling healthcare credentials and browser actions could trigger security and compliance objections."
    mitigation: "Use vault-based credentialing, detailed audit logs, least-privilege access, and launch first through RCM vendors already operating under healthcare compliance programs."
  - name: "Horizontal platform competition"
    description: "Well-funded general agent infrastructure vendors may move down-market into the same workflow."
    mitigation: "Win on vertical depth, prebuilt payer workflows, and measurable cash-collection outcomes rather than generic browser capability."
