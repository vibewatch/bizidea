  - priority: high
    question: "RevOps 负责人会在佣金或权限事故发生前购买上线前关卡，还是只有在痛点变得可见后才行动？"
    evidenceToGather: "访谈 12～15 位已运行 Salesforce 和 HubSpot 自动化的 RevOps 负责人和业务系统总监；收集审批工作流、近期事故和当前 QA 产出物。"
