competitors:
- name: Retool
  stage: scale-up
  wedge: "面向开发者的内部应用和工作流构建器，对 AI 构建应用有明确的企业治理主张。"
  pricing: "按构建器和内部用户席位分级公开定价，另有企业计划。"
  strength: "在内部工具领域分发能力强，围绕 SSO、RBAC、审计日志和受管生产工作流有清晰的主张。"
  weaknessVsUs: "构建器范围内的管控无法跨 Salesforce、HubSpot、电子表格和非 Retool 自动化认证 RevOps 逻辑。"
  sourceRefs:
  - 4
  - 5
  - 6
- name: Microsoft Power Platform / Power Apps
  stage: incumbent
  wedge: "面向业务构建应用的捆绑低代码套件，内置 DLP、ALM 和采用治理。"
  pricing: "Power Apps 专属授权页，提供开发者和用户计划；企业经济体系融入更广泛的 Microsoft 授权。"
  strength: "大规模分发能力加上现有企业软件资产内的第一方治理原语。"
  weaknessVsUs: "在客户标准化于 Microsoft 时效果最好；对于 Salesforce 和 HubSpot 为主的 RevOps 技术栈，作为中立关卡的效果较弱。"
  sourceRefs:
  - 9
  - 10
  - 11
  - 12
- name: Superblocks
  stage: scale-up
  wedge: "企业 AI 内部应用平台，具备预发和生产环境、基于 Git 的源代码管理、可观测性和 RBAC。"
  pricing: "Teams 月费 $125（按年计费 $100）；企业定价定制。"
  strength: "安全意识强的企业定位，以及对 AI 生成内部应用的清晰支持。"
  weaknessVsUs: "仍以构建器平台为首要定位，而非跨他处构建的应用或 CRM 原生工作流的独立管控平面。"
  sourceRefs:
  - 7
  - 8
- name: Salto
  stage: scale-up
  wedge: "面向 Salesforce 和其他业务系统的跨 SaaS 变更管理，具备定时摘取、提升、预览和回滚功能。"
  pricing: "企业主导定价；摘取到的帮助页面上没有自助式公开报价。"
  strength: "在所有厂商中最接近业务系统发布管理和跨环境差异分析。"
  weaknessVsUs: "针对配置和数据部署优化，而非 AI 构建应用内部 RevOps 公式、关联和权限的上线前模拟。"
  sourceRefs:
  - 21
  - 22
- name: Gearset
  stage: scale-up
  wedge: "针对部署、回滚、备份和治理的 Salesforce DevOps 工作流，现已延伸至 AI 生成变更管理。"
  pricing: "公开定价 Starter 起 $215，Teams 起 $320 每用户每月。"
  strength: "买家预算清晰，Salesforce 发布工作流成熟，已被管理员和 DevOps 团队信任。"
  weaknessVsUs: "Salesforce 中心化且以元数据为主导；不是跨构建器、HubSpot 和电子表格逻辑的中立发布关卡。"
  sourceRefs:
  - 19
  - 20
regulatoryTechnicalConstraints:
- point: >-
    准确的模拟依赖 Salesforce 沙盒、权限集和 DevOps Center 元数据流保持可访问且稳定。
  sourceRefs:
