  willingnessToPay:
    summary: >-
      相邻工具已有明确的预算：Superblocks 列出 Teams 月费 $125（按年计费 $100），
      Gearset 列出 Starter $215、Teams $320 每用户每月，Retool 和 Power Apps 均有正式的
      商业定价而非实验性测试版套餐 [4][7][9][19]。
    sourceRefs:
    - 4
    - 7
    - 9
