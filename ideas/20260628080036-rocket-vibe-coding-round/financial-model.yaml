scenarios:
  downside:
    description: Budget ownership stays reactive and sales cycles lengthen, leaving the company below plan on both customer count and price realization while services work stays heavier.
    y3RevenueK: 2770.7
    y3EbitdaK: -920.6
    cashLowPointK: -558.6
    keyAssumptionChanges:
      - Y1 exits with 8 paid customers, Y2 with 28, and Y3 with 75 instead of 100.
      - Blended ARR lands at $45K in Y1 and $55K in Y2-Y3 instead of $50K and $60K.
      - Gross margin slips from 72% to 70% because onboarding and policy setup remain more manual.
  base:
    description: Founder-led selling plus consultancy referrals turns the first pilots into a repeatable enterprise motion that reaches 100 paid customers by Y3 exit without outsized hiring.
    y3RevenueK: 3787.5
    y3EbitdaK: -285.9
    cashLowPointK: 213.6
    keyAssumptionChanges:
      - Customer counts follow A7, A8, and A9, reaching 35 paid customers by Y2 exit and 100 by Y3 exit.
      - Blended ARR stays at $50K in Y1 and $60K in Y2-Y3 while gross margin stays at the 72% business-plan target.
      - The team reaches 13 end-of-Y3 FTE, with solutions and engineering depth added before scaled GTM hiring.
  upside:
    description: Reference accounts and partner referrals compress acquisition time enough to reach the research SOM pace earlier, with modestly better pricing and cleaner delivery margins.
    y3RevenueK: 5240.6
    y3EbitdaK: 652.0
    cashLowPointK: 873.0
    keyAssumptionChanges:
      - Y1 exits with 12 paid customers, Y2 with 45, and Y3 with 120.
      - Blended ARR rises to $55K in Y1 and $65K in Y2-Y3 as more accounts buy extra workflow bundles faster.
      - Gross margin improves from 72% to 74% because connector reuse and policy templates reduce manual setup time.
sensitivity:
  - variable: ARPU
    downsideCase: Y2-Y3 blended ARR settles at $55K because customers stay closer to the base platform package and buy fewer workflow bundles.
    baseCase: The base case holds $60K blended annual ARR once customers move beyond pilot scope.
    upsideCase: Y2-Y3 blended ARR reaches $65K as more accounts add workflow bundles and multi-builder scope.
    y3RevenueImpactK: -315.6
    cashImpactK: -276.1
  - variable: CAC
    downsideCase: Acquisition efficiency worsens and the company exits Y3 at 85 customers because more deals require custom proof work and broader stakeholder education.
    baseCase: The modeled motion keeps fully loaded CAC near $19.3K by leaning on founder-led selling and consultancy referrals.
    upsideCase: Channel quality improves and the business reaches 110+ customers on similar spend because partner-sourced opportunities convert faster.
    y3RevenueImpactK: -633.7
    cashImpactK: -495.7
  - variable: churn
    downsideCase: Retention behaves like the company exits Y3 at 90 customers because some early pilots never become embedded in RevOps operating cadence.
    baseCase: The base path assumes 1.8% monthly churn for unit economics while the modeled customer path already bakes in moderate attrition.
    upsideCase: Retention behaves like the company exits Y3 slightly above plan because approval workflows and audit history become sticky once deployed.
    y3RevenueImpactK: -337.5
    cashImpactK: -245.5
  - variable: sales cycle
    downsideCase: Pilot-to-annual conversion slips by roughly one quarter as security review and budget approval drag on.
    baseCase: The base case assumes the event-driven wedge keeps pilots moving into annual contracts within the 30-90 day ranges described in the plan.
    upsideCase: Case studies and partner referrals pull deals forward by about a quarter once the first 20 customers are live.
    y3RevenueImpactK: -885.0
    cashImpactK: -680.1
  - variable: gross margin
    downsideCase: Gross margin stays at 70% because policy setup and data mapping remain more service-heavy than planned.
    baseCase: The base case stays at the 72% gross-margin target from the business plan.
    upsideCase: Gross margin reaches 74% as reusable templates and connector maturity reduce manual work.
    y3RevenueImpactK: 0.0
    cashImpactK: -103.7
  - variable: hiring pace
    downsideCase: Customer-facing and support hires are pulled forward by about two quarters before the same revenue base arrives.
    baseCase: The base case waits to add CSM2, finance/ops, and data-QA depth until later-stage evidence supports the spend.
    upsideCase: The team delays non-critical hires by one quarter because onboarding stays more standardized than expected.
    y3RevenueImpactK: 0.0
    cashImpactK: -427.4
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      ChangeEvents[Comp-plan resets / CRM migrations] --> Pilots
      Pilots --> PaidCustomers
      PaidCustomers --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: Revenue engine
    finding: Base-case revenue is driven by growing paid accounts from 10 at Y1 exit to 35 at Y2 exit and 100 at Y3 exit at roughly $60K blended ARR per customer.
  - checkName: Must go right
    finding: The company has to keep founder-led and partner-sourced conversion moving fast enough to hit 20+ paid customers by month 18 before scaling GTM headcount.
  - checkName: Model breaks if
    finding: If sales cycles slip by about a quarter or customers hold the company near pilot pricing, cash turns negative before Y3 ends.
  - checkName: Next-round proof
    finding: A credible next financing case appears once the business reaches roughly $1.2M ARR, 20+ paid customers, and one working consultancy co-sell channel with cash still above zero.
sanityChecks:
  ruleOf40: Y3 growth 202.4% + EBITDA margin -7.5% = 194.9% (well above 40, though flattered by a small Y2 base).
  burnMultiple: About 0.5x in Y2 on roughly $1.6M of net new ARR, then about 0.1x in Y3 on roughly $3.9M of net new ARR as burn compresses toward break-even.
  revenuePerFte: $291K Y3 revenue per end-of-year FTE (inside the rough $200K-$400K early enterprise SaaS benchmark).
  flags:
    - The base case still assumes a very fast ramp from 35 customers at Y2 exit to 100 at Y3 exit, which requires the consultancy and referral motion to become truly repeatable.
    - CAC is attractive only if the GTM wedge keeps attaching to concrete change events rather than broad AI-governance education.
    - The model excludes deferred-revenue timing, capex, and financing between rounds, so actual cash timing could be lumpier than EBITDA implies.
    - Gross margin holds only if onboarding, permission mapping, and regression-test setup become more templated instead of drifting into custom services work.
