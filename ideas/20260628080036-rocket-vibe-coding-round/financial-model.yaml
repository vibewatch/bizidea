slug: revops-app-guardrail
date: '2026-06-28'
currency: USD
modelStartMonth: 2026-07
assumptions:
  - id: A1
    name: Model start month
    value: 2026-07
    unit: YYYY-MM
    source: "[business-plan.yaml date] first full operating month after the 2026-06-28 plan date."
  - id: A2
    name: Opening cash after pre-seed close
    value: '2200'
    unit: USDK
    source: "[business-plan.yaml fundingAsk.targetFundingRangeUsd; fundingAsk.runwayMonths] modeled near the low end of the stated $2–4M range while still preserving a buffer through the 36-month base case."
  - id: A3
    name: Revenue unit
    value: Paid customer account
    unit: definition
    source: "[business-plan.yaml businessModel.unitOfValue; investorMemo.firstCustomer.initialContract] one paid RevOps account is the customer unit used in the model."
  - id: A4
    name: Y1 blended annual ARR per paid account
    value: '50'
    unit: USDK/account-year
    source: "[business-plan.yaml milestones Month 12 ~$500k ARR at 8–10 customers] implies roughly $50K blended ARR per paid account in Year 1."
  - id: A5
    name: Y2-Y3 blended annual ARR per paid account
    value: '60'
    unit: USDK/account-year
    source: "[business-plan.yaml market.som; milestones Month 18, Month 24, Month 36] the plan repeatedly converges around ~$60K ARR per customer at scale."
  - id: A6
    name: Revenue recognition timing
    value: Midpoint customer count within each month or quarter
    unit: policy
    source: "[startup-finance heuristic] new customers are assumed to land halfway through each modeled period on average."
  - id: A7
    name: Y1 month-end customer path
    value: 0,0,0,0,1,2,3,4,5,7,8,10
    unit: paid customers
    source: "[business-plan.yaml milestones Month 6, Month 9, Month 12] reaches 2 conversions by month 6, 5 paid customers by month 9, and 10 by month 12."
  - id: A8
    name: Y2 quarter-end customers
    value: Q1Y2 14; Q2Y2 20; Q3Y2 27; Q4Y2 35
    unit: paid customers
    source: "[business-plan.yaml milestones Month 18 and Month 24] the quarterly ramp interpolates between 10 customers at Y1 exit, 20+ by month 18, and 35 by month 24."
  - id: A9
    name: Y3 quarter-end customers
    value: Q1Y3 45; Q2Y3 60; Q3Y3 80; Q4Y3 100
    unit: paid customers
    source: "[business-plan.yaml milestones Month 30 and Month 36; research.yaml market.som] base case reaches the low end of the 100+ customer goal while remaining below the researched 120-customer SOM case."
  - id: A10
    name: Target gross margin
    value: '72'
    unit: percent
    source: "[business-plan.yaml businessModel.targetGrossMarginPct] modeled as 28% COGS and 72% gross margin throughout the base case."
  - id: A11
    name: Monthly churn for unit economics
    value: '1.8'
    unit: percent
    source: "[startup-finance heuristic] early enterprise infrastructure software should be sticky, but the product is still pre-scale and workflow-specific."
  - id: A12
    name: Founding CEO loaded cash compensation
    value: '150'
    unit: USDK/year
    source: "[business-plan.yaml team Founding CEO and GTM lead] startup-finance heuristic for a modest founder cash salary plus payroll taxes and benefits."
  - id: A13
    name: Founding backend engineer loaded cash compensation
    value: '190'
    unit: USDK/year
    source: "[business-plan.yaml team Founding backend engineer] startup-finance heuristic for a senior CRM-integration technical founder package."
  - id: A14
    name: Sales engineer / RevOps solutions consultant loaded cash compensation
    value: '160'
    unit: USDK/year
    source: "[business-plan.yaml team Sales engineer and RevOps solutions consultant] startup-finance heuristic for a high-touch solutions hire needed before a pure AE."
  - id: A15
    name: Second backend engineer loaded cash compensation
    value: '180'
    unit: USDK/year
    source: "[business-plan.yaml team Second backend engineer] startup-finance heuristic for the second platform engineer added after initial pilot proof."
  - id: A16
    name: Later engineering hires loaded cash compensation
    value: '170'
    unit: USDK/year
    source: "[business-plan.yaml product twelveMonth, twentyFourMonth; operations] startup-finance heuristic for product/security, platform, and data-QA engineering hires supporting connector breadth and reliability."
  - id: A17
    name: Account executive loaded cash compensation
    value: '180'
    unit: USDK/year
    source: "[business-plan.yaml strategicChoices.sequencingRationale] startup-finance heuristic for the first quota-carrying enterprise sellers added only after the solutions-led motion is proven."
  - id: A18
    name: Customer success manager loaded cash compensation
    value: '125'
    unit: USDK/year
    source: "[business-plan.yaml milestones Month 18 and Month 24] startup-finance heuristic for post-sale onboarding and renewal support once the account base passes 20 customers."
  - id: A19
    name: Partnerships lead loaded cash compensation
    value: '145'
    unit: USDK/year
    source: "[business-plan.yaml gtm.channels; experimentRoadmap RevOps consultancy co-sell pilot] startup-finance heuristic for the first ecosystem hire once consultancy referrals matter."
  - id: A20
    name: Finance and ops manager loaded cash compensation
    value: '110'
    unit: USDK/year
    source: "[startup-finance heuristic] lean back-office hire added only after the customer base and audit burden expand in Year 3."
  - id: A21
    name: Hiring cadence
    value: CEO and founding engineer in M1; sales engineer in M3; second backend engineer in M9; product/security engineer in M13; AE1 in M16; platform engineer in M18; CSM1 in M20; partnerships lead in M22; AE2 in M24; CSM2 in M27; finance/ops in M30; data-QA engineer in M33
    unit: timing
    source: "[business-plan.yaml team; strategicChoices.sequencingRationale; milestones] solutions and connector depth come before scaled sales hiring, then support and operations follow the growing installed base."
  - id: A22
    name: Functional payroll allocation
    value: CEO 70% S&M / 30% G&A; founding and later engineers 100% R&D; sales engineer 50% S&M / 30% R&D / 20% G&A; AEs 100% S&M; CSMs 25% S&M / 75% G&A; partnerships 80% S&M / 20% G&A; finance/ops 100% G&A
    unit: allocation
    source: "[business-plan.yaml team rationales; operations] allocation follows who sells the wedge, who builds the connectors and test engine, and who carries onboarding and admin load."
  - id: A23
    name: Non-payroll operating spend
    value: Y1 S&M = $8K + 7% of revenue monthly, R&D = $8K + $0.25K per average customer monthly, G&A = $7K + $0.15K per average customer monthly; Y2 S&M = $12K + 7% of revenue, R&D = $10K + $0.30K per average customer, G&A = $9K + $0.20K per average customer; Y3 S&M = $15K + 6% of revenue, R&D = $12K + $0.35K per average customer, G&A = $11K + $0.25K per average customer
    unit: USDK/month
    source: "[startup-finance heuristic] covers cloud, security tooling, travel, legal, audit, and partner enablement for a lean enterprise infrastructure startup."
  - id: A24
    name: Cash conversion policy
    value: EBITDA approximates operating cash movement
    unit: policy
    source: "[startup-finance heuristic] the model excludes debt, capex, taxes, and working-capital timing so operating cash tracks EBITDA."
  - id: A25
    name: Blended CAC per new customer
    value: '19.3'
    unit: USDK/new customer
    source: Calculated from modeled Y2-Y3 sales and marketing spend of $1,734.3K divided by 90 net new customers.
  - id: A26
    name: Funding milestone for the next round
    value: 20+ paid customers, roughly $1.2M ARR, a live consultancy co-sell motion, and positive evidence that connector breadth can support the path to 35 customers
    unit: milestone
    source: "[business-plan.yaml milestones Month 18 and Month 24; fundingAsk.useOfFundsSummary] the round is sized to reach the stronger month-18 proof point and still retain roughly six months of operating buffer."
