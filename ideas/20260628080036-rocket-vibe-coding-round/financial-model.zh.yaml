  round: pre-seed
  amountM: 2.2
  runwayMonths: 24
  milestone: "在现金仍高于零之前，达到 20 个以上付费客户、约 $1.2M ARR，以及一个可运转的咨询商联合销售渠道，同时保留约六个月的现金缓冲，再推进下一轮融资。"
  useOfFunds:
    - bucket: Engineering
      amountUsd: 920000
      percentage: 41.8
    - bucket: GTM
      amountUsd: 700000
      percentage: 31.8
    - bucket: G&A
      amountUsd: 250000
      percentage: 11.4
    - bucket: "Buffer (6 mo)"
      amountUsd: 330000
      percentage: 15.0
scenarios:
  downside:
    description: "预算归属保持被动，销售周期拉长，导致公司在客户数量和价格实现上均低于计划，服务工作量持续偏重。"
    y3RevenueK: 2770.7
    y3EbitdaK: -920.6
    cashLowPointK: -558.6
    keyAssumptionChanges:
      - "Y1 末 8 个付费客户，Y2 末 28 个，Y3 末 75 个（而非 100 个）。"
      - "Y1 混合 ARR 落在 $45K，Y2-Y3 落在 $55K（而非 $50K 和 $60K）。"
      - "毛利率因导入和策略配置仍较手动而从 72% 下滑至 70%。"
  base:
    description: "创始人主导销售加咨询商推荐将首批试点变成可复制的企业动作，在不过度扩充招聘的情况下，Y3 末达到 100 个付费客户。"
    y3RevenueK: 3787.5
    y3EbitdaK: -285.9
    cashLowPointK: 213.6
    keyAssumptionChanges:
      - "客户数按 A7、A8、A9 增长，Y2 末 35 个付费客户，Y3 末 100 个。"
      - "Y1 混合 ARR 保持 $50K，Y2-Y3 保持 $60K，毛利率维持业务计划目标的 72%。"
      - "团队 Y3 末达到 13 个全职员工，解决方案和工程深度优先于规模化 GTM 招聘。"
  upside:
    description: "参考客户和合作伙伴推荐压缩了获客时间，足以更早达到研究报告 SOM 节奏，定价稍好、交付利润率更干净。"
    y3RevenueK: 5240.6
    y3EbitdaK: 652.0
    cashLowPointK: 873.0
    keyAssumptionChanges:
      - "Y1 末 12 个付费客户，Y2 末 45 个，Y3 末 120 个。"
      - "随更多账户更快购买额外工作流包，Y1 混合 ARR 升至 $55K，Y2-Y3 升至 $65K。"
      - "连接器复用和策略模板减少手动配置时间，毛利率从 72% 提升至 74%。"
sensitivity:
  - variable: ARPU
    downsideCase: "Y2-Y3 混合 ARR 稳定在 $55K——客户停留在基础平台套餐附近，购买较少工作流包。"
    baseCase: "基准情景在客户超出试点范围后维持 $60K 混合年度 ARR。"
    upsideCase: "随更多账户追加工作流包和多构建器范围，Y2-Y3 混合 ARR 达到 $65K。"
    y3RevenueImpactK: -315.6
    cashImpactK: -276.1
  - variable: CAC
    downsideCase: "获客效率下降，公司 Y3 末仅达 85 个客户——更多交易需要定制化证明工作和更广泛的利益相关方教育。"
    baseCase: "建模动作靠创始人主导销售和咨询商推荐，将全成本 CAC 维持在约 $19.3K。"
    upsideCase: "渠道质量提升，公司在相似支出下达到 110 个以上客户——合作伙伴来源机会转化更快。"
    y3RevenueImpactK: -633.7
    cashImpactK: -495.7
  - variable: churn
    downsideCase: "留存表现如同 Y3 末仅 90 个客户——部分早期试点从未融入 RevOps 运营节奏。"
    baseCase: "基准路径假设单位经济模型月度流失率 1.8%，而建模客户路径已内含适度流失。"
    upsideCase: "留存表现略好于计划——审批工作流和审计历史一旦部署便产生黏性。"
    y3RevenueImpactK: -337.5
    cashImpactK: -245.5
  - variable: sales cycle
    downsideCase: "由于安全审查和预算审批拖延，试点转年度合同滑后约一个季度。"
    baseCase: "基准情景假设事件驱动的切口让试点在计划描述的 30～90 天范围内转为年度合同。"
    upsideCase: "首批 20 个客户上线后，案例研究和合作伙伴推荐将交易提前约一个季度。"
    y3RevenueImpactK: -885.0
    cashImpactK: -680.1
  - variable: gross margin
    downsideCase: "毛利率维持在 70%——策略配置和数据映射的服务化程度高于计划。"
    baseCase: "基准情景维持业务计划 72% 的毛利率目标。"
    upsideCase: "可复用模板和连接器成熟减少手动工作，毛利率达到 74%。"
    y3RevenueImpactK: 0.0
    cashImpactK: -103.7
  - variable: hiring pace
    downsideCase: "客户面向和支持招聘提前约两个季度，但同样的营收基础尚未到来。"
    baseCase: "基准情景等到更晚期的证据支持支出，才增加 CSM2、财务/运营和数据-QA 深度。"
    upsideCase: "由于导入比预期更标准化，团队将非关键招聘推迟一个季度。"
    y3RevenueImpactK: 0.0
    cashImpactK: -427.4
modelDiagram:
  title: "单位经济模型流程"
  mermaid: |
    flowchart LR
      ChangeEvents[Comp-plan resets / CRM migrations] --> Pilots
      Pilots --> PaidCustomers
      PaidCustomers --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: "营收引擎"
    finding: "基准情景营收由付费账户从 Y1 末 10 个增长至 Y2 末 35 个、Y3 末 100 个驱动，每客户混合 ARR 约 $60K。"
  - checkName: "必须做对的事"
    finding: "公司必须保持创始人主导和合作伙伴来源的转化速度，在规模化 GTM 招聘前于第 18 个月达到 20 个以上付费客户。"
  - checkName: "模型失效条件"
    finding: "若销售周期滑后约一个季度，或客户将公司锁定在试点定价附近，Y3 结束前现金转负。"
  - checkName: "下一轮融资证明"
    finding: "当业务达到约 $1.2M ARR、20 个以上付费客户，以及一个可运转的咨询商联合销售渠道且现金仍高于零时，可信的下一轮融资案例出现。"
sanityChecks:
  ruleOf40: "Y3 增长率 202.4% + EBITDA 利润率 -7.5% = 194.9%（远高于 40，尽管受 Y2 基数较小的虚高影响）。"
  burnMultiple: "Y2 净新增 ARR 约 $1.6M 时燃烧倍数约 0.5 倍，Y3 净新增 ARR 约 $3.9M 时约 0.1 倍——燃烧趋近盈亏平衡。"
  revenuePerFte: "Y3 末员工人均营收 $291K（在早期企业 SaaS 约 $200K～$400K 基准范围内）。"
  flags:
    - "基准情景仍假设 Y2 末 35 个客户到 Y3 末 100 个的极快增速，这需要咨询商和推荐动作真正具有可复制性。"
    - "CAC 具有吸引力的前提是 GTM 切口持续锚定具体变更事件，而非广泛的 AI 治理教育。"
    - "模型排除了递延收入时点、资本支出和两轮之间的融资，因此实际现金时点可能比 EBITDA 暗示的更不均匀。"
    - "毛利率成立的前提是导入、权限映射和回归测试配置变得更加模板化，而非滑向定制服务工作。"
