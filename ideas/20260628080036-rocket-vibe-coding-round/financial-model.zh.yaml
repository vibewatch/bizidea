slug: revops-app-guardrail
date: '2026-06-28'
currency: USD
modelStartMonth: 2026-07
assumptions:
  - id: A1
    name: "模型起始月份"
    value: 2026-07
    unit: YYYY-MM
    source: "[business-plan.yaml date] 计划日期 2026-06-28 后的第一个完整运营月份。"
  - id: A2
    name: "Pre-Seed 完成后的期初现金"
    value: '2200'
    unit: USDK
    source: "[business-plan.yaml fundingAsk.targetFundingRangeUsd; fundingAsk.runwayMonths] 取 $2～4M 范围的低端建模，同时保留足够缓冲覆盖 36 个月基准情景。"
  - id: A3
    name: "收入计量单位"
    value: "付费客户账户"
    unit: definition
    source: "[business-plan.yaml businessModel.unitOfValue; investorMemo.firstCustomer.initialContract] 模型以一个付费 RevOps 账户作为客户计量单位。"
  - id: A4
    name: "Y1 每付费账户年均混合 ARR"
    value: '50'
    unit: USDK/account-year
    source: "[business-plan.yaml milestones Month 12 ~$500k ARR at 8–10 customers] 第一年每付费账户混合 ARR 约 $50K。"
  - id: A5
    name: "Y2-Y3 每付费账户年均混合 ARR"
    value: '60'
    unit: USDK/account-year
    source: "[business-plan.yaml market.som; milestones Month 18, Month 24, Month 36] 计划反复收敛至规模化后每客户约 $60K ARR。"
  - id: A6
    name: "收入确认时点"
    value: "每月或每季度期间的中点客户数"
    unit: policy
    source: "[startup-finance heuristic] 假设新客户平均在每个建模周期的中点落地。"
  - id: A7
    name: "Y1 月末客户路径"
    value: 0,0,0,0,1,2,3,4,5,7,8,10
    unit: paid customers
    source: "[business-plan.yaml milestones Month 6, Month 9, Month 12] 第 6 个月完成 2 次转化，第 9 个月 5 个付费客户，第 12 个月 10 个。"
  - id: A8
    name: "Y2 季末客户数"
    value: "Q1Y2 14；Q2Y2 20；Q3Y2 27；Q4Y2 35"
    unit: paid customers
    source: "[business-plan.yaml milestones Month 18 and Month 24] 季度增长插值：Y1 末 10 个客户，第 18 个月 20 个以上，第 24 个月 35 个。"
  - id: A9
    name: "Y3 季末客户数"
    value: "Q1Y3 45；Q2Y3 60；Q3Y3 80；Q4Y3 100"
    unit: paid customers
    source: "[business-plan.yaml milestones Month 30 and Month 36; research.yaml market.som] 基准情景达到 100 个以上客户目标的低端，同时低于研究报告的 120 客户 SOM 情景。"
  - id: A10
    name: "目标毛利率"
    value: '72'
    unit: percent
    source: "[business-plan.yaml businessModel.targetGrossMarginPct] 整个基准情景建模为 28% COGS、72% 毛利率。"
  - id: A11
    name: "单位经济模型月度流失率"
    value: '1.8'
    unit: percent
    source: "[startup-finance heuristic] 早期企业基础设施软件应具有较高黏性，但产品仍处于规模化前阶段且工作流特定。"
  - id: A12
    name: "创始人/CEO 含税现金薪酬"
    value: '150'
    unit: USDK/year
    source: "[business-plan.yaml team Founding CEO and GTM lead] 创始人适度现金薪资加薪资税和福利的初创财务经验值。"
  - id: A13
    name: "创始后端工程师含税现金薪酬"
    value: '190'
    unit: USDK/year
    source: "[business-plan.yaml team Founding backend engineer] 高级 CRM 集成技术创始人薪资包的初创财务经验值。"
  - id: A14
    name: "销售工程师/RevOps 解决方案顾问含税现金薪酬"
    value: '160'
    unit: USDK/year
    source: "[business-plan.yaml team Sales engineer and RevOps solutions consultant] 纯销售 AE 之前所需的高触达解决方案招聘的初创财务经验值。"
  - id: A15
    name: "第二后端工程师含税现金薪酬"
    value: '180'
    unit: USDK/year
    source: "[business-plan.yaml team Second backend engineer] 初始试点证明后加入的第二位平台工程师的初创财务经验值。"
  - id: A16
    name: "后续工程招聘含税现金薪酬"
    value: '170'
    unit: USDK/year
    source: "[business-plan.yaml product twelveMonth, twentyFourMonth; operations] 支持连接器广度和可靠性的产品/安全、平台和数据-QA 工程招聘的初创财务经验值。"
  - id: A17
    name: "客户主管含税现金薪酬"
    value: '180'
    unit: USDK/year
    source: "[business-plan.yaml strategicChoices.sequencingRationale] 仅在解决方案主导动作验证后才加入的首批配额制企业销售人员的初创财务经验值。"
  - id: A18
    name: "客户成功经理含税现金薪酬"
    value: '125'
    unit: USDK/year
    source: "[business-plan.yaml milestones Month 18 and Month 24] 客户群超过 20 个后，售后导入与续约支持的初创财务经验值。"
  - id: A19
    name: "合作伙伴负责人含税现金薪酬"
    value: '145'
    unit: USDK/year
    source: "[business-plan.yaml gtm.channels; experimentRoadmap RevOps consultancy co-sell pilot] 咨询商推荐开始重要后的首个生态系统招聘的初创财务经验值。"
  - id: A20
    name: "财务与运营经理含税现金薪酬"
    value: '110'
    unit: USDK/year
    source: "[startup-finance heuristic] 仅在 Y3 客户群和审计负担扩大后才加入的精简后台招聘。"
  - id: A21
    name: "招聘节奏"
    value: "M1 加入 CEO 和创始工程师；M3 销售工程师；M9 第二后端工程师；M13 产品/安全工程师；M16 AE1；M18 平台工程师；M20 CSM1；M22 合作伙伴负责人；M24 AE2；M27 CSM2；M30 财务/运营；M33 数据-QA 工程师"
    unit: timing
    source: "[business-plan.yaml team; strategicChoices.sequencingRationale; milestones] 解决方案和连接器深度优先于规模化 GTM 招聘，再由支持和运营跟随增长中的安装基础。"
  - id: A22
    name: "职能薪资分配"
    value: "CEO 70% S&M / 30% G&A；创始及后续工程师 100% R&D；销售工程师 50% S&M / 30% R&D / 20% G&A；AE 100% S&M；CSM 25% S&M / 75% G&A；合作伙伴 80% S&M / 20% G&A；财务/运营 100% G&A"
    unit: allocation
    source: "[business-plan.yaml team rationales; operations] 分配遵循谁销售切口、谁构建连接器和测试引擎、谁承担导入和行政负担的逻辑。"
  - id: A23
    name: "非薪资运营支出"
    value: "Y1 S&M = $8K + 营收的 7% 每月，R&D = $8K + $0.25K × 平均客户数每月，G&A = $7K + $0.15K × 平均客户数每月；Y2 S&M = $12K + 营收的 7%，R&D = $10K + $0.30K × 平均客户数，G&A = $9K + $0.20K × 平均客户数；Y3 S&M = $15K + 营收的 6%，R&D = $12K + $0.35K × 平均客户数，G&A = $11K + $0.25K × 平均客户数"
    unit: USDK/month
    source: "[startup-finance heuristic] 覆盖精简企业基础设施初创公司的云服务、安全工具、差旅、法律、审计和合作伙伴赋能。"
  - id: A24
    name: "现金转化策略"
    value: "EBITDA 近似运营现金变动"
    unit: policy
    source: "[startup-finance heuristic] 模型排除债务、资本支出、税项和运营资金时点，使运营现金与 EBITDA 同步。"
  - id: A25
    name: "每新客户混合 CAC"
    value: '19.3'
    unit: USDK/new customer
    source: "由模型中 Y2-Y3 销售与营销支出 $1,734.3K 除以净新增 90 个客户计算得出。"
  - id: A26
    name: "下一轮融资里程碑"
    value: "20 个以上付费客户、约 $1.2M ARR、一个活跃的咨询商联合销售动作，以及连接器广度能支撑达到 35 个客户路径的积极证据"
    unit: milestone
    source: "[business-plan.yaml milestones Month 18 and Month 24; fundingAsk.useOfFundsSummary] 本轮规模设计为达到更强的第 18 个月验证节点，并仍保留约六个月的运营缓冲。"
