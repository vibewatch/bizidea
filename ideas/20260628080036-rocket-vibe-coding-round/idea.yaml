differentiator: >-
  Generic AI-governance products focus on model routing or agent permissions, while low-code tools
  focus on building the app itself. This company sits at the workflow-release layer, where
  revenue-critical business apps need schema-aware testing, approval evidence, and rollback even if
  they were created by non-engineers. Defensibility comes from a growing corpus of RevOps-specific
  regression tests, permission graphs, and change-history data that becomes harder to replace as
  more apps and policy rules flow through the system.
conceptDiagram:
  title: RevOps app guardrail
  mermaid: |
    flowchart LR
      RevOps[RevOps team] --> Builder[AI app builder]
      Builder --> Gate[Release gate]
      Gate --> Tests[Schema and permission tests]
      Tests --> Approval[Approval and rollback]
      Approval --> Outcome[Trusted live workflow]
