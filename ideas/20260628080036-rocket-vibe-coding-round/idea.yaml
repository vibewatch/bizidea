jobsToBeDone:
  - job: >-
      When comp plans or approval policies change, help revenue systems managers ship an updated
      internal app without breaking permissions or formulas, so they can keep sales moving without
      waiting on engineering.
    currentAlternative: Spreadsheet updates, Salesforce admin work, Retool prototypes, and manual QA.
    successMetric: Time from request to live workflow and number of post-launch incidents.
  - job: >-
      When a new AI-built workflow is ready, help RevOps leaders prove it is safe to launch and
      easy to roll back, so they can adopt vibe coding without creating shadow IT risk.
    currentAlternative: Ad hoc demos, human spot checks, and slow business-systems release queues.
    successMetric: Approval cycle time and rollback-free production launches.
ideaScorecard:
  signalStrength:
    score: 3
    rationale: >-
      The signal is real but moderate because the cluster rests on one report about funding talks
      rather than a closed round or disclosed enterprise traction.
  painIntensity:
    score: 4
    rationale: >-
      Broken deal-desk, commission, or renewal workflows directly disrupt bookings and seller trust,
      which makes the underlying problem painful for revenue teams.
  wedgeClarity:
    score: 5
    rationale: >-
      A release gate for AI-built RevOps apps is a narrow, concrete entry product with obvious first
      users, triggers, and failure modes.
  defensibility:
    score: 4
    rationale: >-
      Company-specific permission graphs, schema mappings, and regression libraries should compound
      with each governed workflow and make the product sticky over time.
  ventureScale:
    score: 4
    rationale: >-
      The beachhead is narrow, but the same control layer can expand into many business-built
      internal workflows across large enterprises.
topRisks:
  - name: Budget arrives later than adoption
    description: >-
      Enterprises may experiment with vibe coding inside RevOps before they create a dedicated
      governance budget line.
    mitigation: >-
      Sell first as release assurance for existing low-code and AI-built revenue workflows so value
      shows up immediately as fewer incidents and faster launches.
  - name: Builder platforms add native controls
    description: >-
      Leading vibe-coding vendors could ship basic approval and testing features that narrow the
      standalone wedge.
    mitigation: >-
      Stay builder-agnostic and go deeper on cross-tool policy, CRM-aware regression testing, and
      audit evidence that spans every internal app source.
  - name: Customer schemas are messy
    description: >-
      Heavily customized Salesforce and HubSpot instances can make automated test generation and
      onboarding harder than expected.
    mitigation: >-
      Start with narrow, high-frequency RevOps workflows and guided config scanners, then expand
      coverage as the system learns each account’s schema.
