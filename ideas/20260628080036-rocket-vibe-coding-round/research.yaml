competitors:
- name: Retool
  stage: scale-up
  wedge: Developer-friendly internal app and workflow builder with explicit enterprise governance messaging for AI-built apps.
  pricing: Public tiered pricing by builder and internal-user seat, plus enterprise plan.
  strength: Strong distribution in internal tools and a clear story around SSO, RBAC, audit logs, and governed production
    workflows.
  weaknessVsUs: Builder-scoped controls do not certify RevOps logic across Salesforce, HubSpot, spreadsheets, and non-Retool
    automations.
  sourceRefs:
  - 4
  - 5
  - 6
- name: Microsoft Power Platform / Power Apps
  stage: incumbent
  wedge: Bundled low-code suite with first-party DLP, ALM, and adoption governance for business-built apps.
  pricing: Dedicated Power Apps licensing page with developer and user plans; enterprise economics roll into broader Microsoft
    licensing.
  strength: Massive distribution plus first-party governance primitives inside an existing enterprise software estate.
  weaknessVsUs: Best when customers standardize on Microsoft; weaker as a neutral gate for Salesforce- and HubSpot-heavy RevOps
    stacks.
  sourceRefs:
  - 9
  - 10
  - 11
  - 12
- name: Superblocks
  stage: scale-up
  wedge: Enterprise AI internal-app platform with staging and production environments, Git-based source control, observability,
    and RBAC.
  pricing: Teams starts at $125 per AI Builder monthly ($100 billed annually); enterprise custom.
  strength: Security-conscious enterprise posture and clear support for AI-generated internal apps.
  weaknessVsUs: Still a builder platform first, rather than an independent control plane over apps built elsewhere or native
    CRM workflows.
  sourceRefs:
  - 7
  - 8
- name: Salto
  stage: scale-up
  wedge: Cross-SaaS change management for Salesforce and other business systems with scheduled fetches, promotion, previews,
    and reverts.
  pricing: Enterprise-led pricing; no self-serve public rate on fetched help pages.
  strength: Closer than most vendors to business-systems release management and cross-environment diffs.
  weaknessVsUs: Optimized for configuration and data deployment, not pre-release simulation of RevOps formulas, joins, and
    permissions inside AI-built apps.
  sourceRefs:
  - 21
  - 22
- name: Gearset
  stage: scale-up
  wedge: Salesforce DevOps workflow for deployments, rollback, backup, and governance, now extending into AI-generated change
    management.
  pricing: Starter from $215 and Teams from $320 per user/month on public pricing.
  strength: Clear buyer budget and mature Salesforce release workflow already trusted by admin and DevOps teams.
  weaknessVsUs: Salesforce-centric and metadata-led; it is not a neutral release gate across builders, HubSpot, and spreadsheet
    logic.
  sourceRefs:
  - 19
  - 20
