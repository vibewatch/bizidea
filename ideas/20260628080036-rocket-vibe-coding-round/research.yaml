    sourceRefs:
    - 13
    - 15
    - 17
    - 18
    - 21
    - 22
  - point: Partnerships with internal app builders become useful once the startup can serve as the governance story those
      vendors need for enterprise rollouts.
    sourceRefs:
    - 5
    - 8
    - 10
    - 11
  partnershipEcosystem:
  - point: Salesforce and HubSpot implementation partners matter because they control change windows and often own sandbox
      and deployment work.
    sourceRefs:
    - 13
    - 15
    - 16
    - 17
  - point: Builder vendors can provide release hooks, source control, environments, and execution logs that make pre-release
      testing easier.
    sourceRefs:
    - 6
    - 8
    - 10
    - 11
  - point: The Salesforce DevOps ecosystem could become a partner channel if the startup proves value on logic simulation
      beyond metadata deployment.
    sourceRefs:
    - 19
    - 20
    - 21
    - 22
    - 23
    - 24
  dataMoats:
  - point: A cross-account library of approved field mappings, object joins, and negative test cases for common RevOps workflows
      can compound quickly.
    sourceRefs:
    - 17
    - 18
    - 21
    - 22
    - 36
  - point: Deployment telemetry linking who changed what, in which environment, and what rollback or approval path followed
      can become a sticky operational dataset.
    sourceRefs:
    - 6
    - 11
    - 18
    - 21
    - 22
  - point: Permission-graph templates spanning Salesforce, HubSpot, and builder-native access layers can make risk scoring
      harder to replace.
    sourceRefs:
    - 10
