problem: >-
  营收运营（RevOps）负责人承受着巨大压力——要在中央工程团队排期之前，更快交付报价审批流、
  佣金计算器和续约例外应用。Vibe coding 工具让这些团队得以用自然语言生成内部应用，
  但生成的工作流可能悄悄映射错误的 CRM 字段、暴露不该看的记录，或在流程变更时破坏佣金逻辑。
  企业因此多出了一类"影子运营软件"——比传统低代码应用创建更快，却缺乏测试、审批和回滚规范。
targetUser:
  primary: "中等规模 B2B SaaS 公司（300～2,000 人）中负责 Salesforce 与 HubSpot 的 RevOps 负责人或业务系统总监"
  secondary: "负责报价台、佣金和续约工作流的营收系统经理与 Salesforce 管理员"
  buyer: "VP 营收运营或业务系统总监"
startupThesis:
  nonObviousInsight: >-
    在 vibe coding 领域，最终胜出的企业赢家可能是管控层而非构建器——因为最高频的痛点
    集中在业务侧工作流，那里的逻辑每周都在变，一旦出错立刻影响营收。
  beachhead: >-
    使用 AI 应用构建器的中等规模 B2B SaaS 公司（300～2,000 人）RevOps 团队——他们在
    Salesforce、HubSpot 和电子表格之上创建报价台审批流、佣金计算器和续约例外应用。
  wedge: >-
    一个面向 AI 构建的 RevOps 应用的发布关卡：模拟权限与数据关联，对比上一个上线版本
    的逻辑差异，并在部署前提供审批加一键回滚。
  whyNowCatalyst: >-
    Rocket 的融资谈判和四月的企业推广表明，vibe coding 正在进入企业内部应用创建场景，
    企业需要在 RevOps 自建工作流大量扩散之前建立管控机制。
  ventureScalePath: >-
    从营收关键的 GTM 工作流起步，再将同一套策略、测试和审计层扩展到财务运营、
    客服运营、HR 运营，最终覆盖所有业务构建的内部工作流，不论由哪个构建器生成。
solution: >-
  产品插在 AI 应用构建器与生产部署之间，专为营收运营工作流服务。它为每个生成的应用
  快照数据结构、权限、公式和审批逻辑，然后对沙盒 CRM 和电子表格数据运行预部署测试，
  捕获断裂的关联、过宽的权限以及影响薪酬的逻辑变更。经理拿到的是白话差异报告、
  风险评分、审批流程，以及发布后若出现问题的一键回滚。随着时间积累，系统会学习已批准
  的对象、字段映射和策略模板，把零散的 vibe-coded 应用变成一个有治理的目录，
  而非影子 IT。
goToMarketSeed:
  firstCustomer: >-
    B 轮至 D 轮 B2B SaaS 公司的 RevOps 负责人，员工 100～500 名销售，
    同时使用 Salesforce 和 HubSpot，运营团队 3～10 人，正在用 AI 构建器
    试验报价台或佣金应用。
  buyingTrigger: >-
    薪酬方案调整、CRM 字段迁移，或不增加工程师编制就必须实现报价台与续约
    工作流自动化的指令。
  currentAlternative: >-
    电子表格和 Airtable、Retool 等通用低代码工具，以及中央 IT 或业务系统 QA 队列。
  switchingReason: >-
    让 RevOps 在几天内交付业务自建应用，同时保留手动 QA 或通用应用构建器
    无法提供的测试、权限审查和回滚能力。
  pricingHypothesis: >-
    年度平台费加按受管应用数量或活跃工作流数量收费，费率与纳入策略的
    营收关键应用数挂钩。
