jobsToBeDone:
  - job: >-
      当薪酬方案或审批策略变更时，帮助营收系统经理在不破坏权限或公式的前提下
      交付更新后的内部应用，让销售不停摆、不等工程。
    currentAlternative: "电子表格更新、Salesforce 管理员操作、Retool 原型和人工 QA。"
    successMetric: "从需求到上线工作流的时长，以及上线后的事故数量。"
  - job: >-
      当一个 AI 构建的工作流准备就绪时，帮助 RevOps 负责人证明它可以安全上线、
      随时可回滚，让他们能采用 vibe coding 而不制造影子 IT 风险。
    currentAlternative: "临时演示、人工抽查，以及缓慢的业务系统发布队列。"
    successMetric: "审批周期时长和无回滚的生产上线次数。"
ideaScorecard:
  signalStrength:
    score: 3
    rationale: >-
      信号真实但偏弱——整个集群依赖一篇关于融资谈判的报道，而非已完成的融资
      或披露的企业牵引力。
  painIntensity:
    score: 4
    rationale: >-
      报价台、佣金或续约工作流出问题会直接冲击预订量和销售信任，这让
      营收团队的底层痛点相当剧烈。
  wedgeClarity:
    score: 5
    rationale: >-
      面向 AI 构建 RevOps 应用的发布关卡是一个边界清晰的切入产品，
      首批用户、触发场景和失败模式一目了然。
  defensibility:
    score: 4
    rationale: >-
      公司级权限图谱、数据结构映射和回归测试库会随每个受管工作流复利积累，
      让产品随时间变得越来越难以替换。
  ventureScale:
    score: 4
    rationale: >-
      滩头市场很窄，但同一管控层可以扩展到大型企业内众多业务构建的内部工作流。
topRisks:
  - name: 预算滞后于采用进度
    description: >-
      企业可能在 RevOps 内部试验 vibe coding 之后，才为治理单独设立预算项。
    mitigation: >-
      先作为现有低代码和 AI 构建营收工作流的发布保障工具来销售，
      让价值以更少事故和更快上线的形式立竿见影地体现。
  - name: 构建器平台推出原生管控功能
    description: >-
      头部 vibe coding 厂商可能推出基础审批和测试功能，压缩独立产品的切口空间。
    mitigation: >-
      保持构建器无关性，深耕跨工具策略、感知 CRM 的回归测试，以及跨越所有
      内部应用来源的审计凭证。
  - name: 客户数据结构过于复杂
    description: >-
      高度定制的 Salesforce 和 HubSpot 实例会让自动化测试生成和客户导入
      比预期更困难。
    mitigation: >-
      从高频且边界明确的 RevOps 工作流和引导式配置扫描器入手，再随系统
      学习各账户数据结构逐步扩大覆盖范围。
