businessModelCanvas:
  customerSegments:
    - 旗下拥有 5–20 款已收购垂直 SaaS 产品的 PE 支持软件控股公司
    - 运营软件并购整合的无担保发起人及家族办公室
    - 希望复刻 Circeus 或 Beacon 模式的成长期控股公司
  valuePropositions:
    - 90 天内在整个组合资产中部署 AI 智能体，无需重构任何一款产品
    - 用 50 万–150 万美元/年的平台订阅替代 200 万–500 万美元的中央 AI 工程团队建设
    - 提供符合 PE 汇报周期的组合资产 AI 绩效仪表盘，方便向 LP 汇报
    - 通过共享智能体库复利积累价值——每次部署后，下一次部署更快更省
  channels:
    - 直接触达软件专注型基金的 PE 运营合伙人和组合公司 CTO
    - 活跃于软件并购整合领域的 M&A 顾问和 SaaS 集成咨询商的转介绍
    - 伦敦和阿姆斯特丹的 PE 运营合伙人论坛及软件 M&A 会议
  customerRelationships:
    - 与控股公司签订覆盖 3 家以上组合公司的多年期企业合同
    - 每款产品 90 天激活期间嵌入专属部署成功团队
    - 每季度与控股公司领导层进行组合 AI 绩效复盘
  revenueStreams:
    - 每家组合公司每年 SaaS 授权费（每款产品 8 万–15 万美元）
    - 已记录 AI 可归因增量 ARR 的 5–10% 成功费用
    - 针对非标准垂直 SaaS 数据库结构的自定义连接器开发专业服务费
  keyResources:
    - 覆盖 20+ 种垂直 SaaS 工作流模式的预建 AI 智能体库
    - 适配常见遗留 SaaS 技术栈的数据库与 API 连接器库
    - 具备垂直 SaaS 集成经验的 AI 部署工程团队
  keyActivities:
    - 构建并维护 AI 智能体目录和连接器库
    - 客户部署工程及 90 天激活支持
    - 组合资产绩效监控与控股公司仪表盘开发
  keyPartners:
    - EBRD 及欧洲创新融资机构（负责客户引荐）
    - PE 运营合伙人网络和软件 M&A 顾问
    - 智能体执行层的云推理服务商，包括 Anthropic 和 AWS Bedrock
  costStructure:
    - 智能体开发与连接器维护的工程团队
    - 客户成功与部署工程人员
    - 组合资产规模下智能体执行的云推理及基础设施费用
    - 面向 PE 运营合伙人网络的销售与市场投入

