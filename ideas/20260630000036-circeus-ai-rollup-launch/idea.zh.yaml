problem: >-
  软件控股公司和 PE 支持的并购整合方在收购垂直 SaaS 业务后，缺乏将每款产品 AI 化的中央工程能力。
  为每家组合公司单独组建专属 AI 团队成本过高；像 Circeus 那样打造一支中央团队需要超过 2.2 亿美元和数年持续投入。
  与此同时，AI 原生竞争对手正以组合公司无法应对的速度侵蚀每款被收购遗留 SaaS 产品的客户基础，而
  LP 对 AI 改造路线图的要求已从期望变为在收购交割后 12 个月内就要兑现的条件。

targetUser:
  primary: PE 支持的软件控股公司 CTO 或工程负责人，旗下拥有 5–20 款已收购的垂直 SaaS 产品
  secondary: 被控股公司接管的组合公司产品团队，需要在收购交割后 90 天内上线 AI 功能
  buyer: PE 运营合伙人或控股公司 CEO，负责批准跨组合资产的中央技术基础设施投入

startupThesis:
  nonObviousInsight: >-
    PE 软件并购整合的价值创造引擎正从金融工程切换到 AI 工程。
    新的制约不是资金——EBRD 和成长期 PE 随时准备投入——而是执行速度：
    交割后，控股公司能以多快的速度在 10–20 款被收购产品上跑通一套 AI 层？
    Circeus 花了四年和 2.2 亿美元从内部摸出了这条路；其他每家软件并购整合方
    现在面临同样的挑战，却没有复制这条路的资金跑道。这催生了一个新的 B2B 基础设施品类——
    组合资产 AI 部署平台——24 个月前它并不存在，今天也没有专门为此打造的厂商。
  beachhead: >-
    欧洲或北美 PE 支持的软件控股公司，旗下拥有 5–15 款已收购的垂直 SaaS 产品
    （各自 ARR 在 50 万–500 万美元），已承诺推进 AI 改造路线图、但尚未组建中央 AI 工程团队
  wedge: >-
    一套预建 AI 智能体目录，覆盖垂直 SaaS 五大最常见工作流模式
    （工单分流、流失预测、文档摘要、自动预约、预测性追加销售），
    可通过 API 连接器部署，无需触碰核心产品代码
  whyNowCatalyst: >-
    Circeus 获 EBRD 支持公开亮相，以及 Bending Spoons、Beacon、Circeus 构成的新兴阵营，
    证明 AI 原生软件收购已成被验证的赛道。这让每家非 AI 型 PE 软件运营方清醒地意识到
    自身面临的竞争差距，并催生了对"追赶平台"的即时需求。
  ventureScalePath: >-
    先服务欧洲和北美 30–50 家软件控股公司；将智能体目录扩展至 50+ 种垂直 SaaS 工作流模式；
    再演进为覆盖交易来源评分、AI 就绪性尽调和组合资产基准测试的组合情报层，
    成为任何旗下运营五家以上企业的软件并购整合方都离不开的基础设施。

solution: >-
  一个专为软件控股公司设计的模块化 AI 智能体平台。平台通过标准数据库和 API 连接器接入各被收购
  组合公司，部署一套涵盖最常见垂直 SaaS 工作流的预建 AI 智能体目录——包括工单自动化、流失预测、
  文档摘要和自动预约——并为控股公司提供一个追踪全组合 AI 驱动 KPI 的中央仪表盘。
  每款产品的部署目标是 90 天内上线，核心产品架构不作改动。与已记录的 AI 驱动预订量挂钩的
  成功费用保持激励一致。共享 AI 技能库随每次部署持续增长，跨组合资产复利累积价值，
  护城河随时间不断加深。

goToMarketSeed:
  firstCustomer: >-
    总部位于伦敦或阿姆斯特丹的 PE 成长基金，过去三年已收购 5–10 家垂直 SaaS 公司，
    涉及专业服务、建筑科技或现场服务软件领域，且至少在两个组合细分市场面临来自 AI 原生入局者的竞争压力
  buyingTrigger: >-
    组合公司在竞争中输给 AI 原生对手，或 LP 质问 GP：为何软件组合在收购交割 12 个月后仍未上线 AI 功能
  currentAlternative: >-
    组建中央 AI 工程团队（成本高、周期长，入职磨合需 6–12 个月）；
    委托咨询公司做一次性 AI 改造项目（成本高且无法跨组合复用）；
    或等待各组合公司各自独立建设 AI（太慢、缺乏统筹）
  switchingReason: >-
    预建智能体和连接器将原本需要 12 个月的内部 AI 建设压缩为 90 天部署，
    控股公司无需自行招聘或管理中央工程团队，直接复刻 Circeus 打法，
    且所需资本承诺仅为从头自建的零头
  pricingHypothesis: >-
    每家组合公司每年 8 万–15 万美元的 SaaS 授权费，加上已记录 AI 可归因增量 ARR 的
    5–10% 成功费用；控股公司层面的企业合同覆盖 3 家以上组合公司并享受批量折扣，
    目标每家控股公司客户总 ACV 达 50 万–150 万美元

whyNow:
  - point: >-
      Circeus、Bending Spoons 和 Beacon 已将 AI 原生软件收购确立为公认赛道，
      非 AI 型 PE 软件运营方由此强烈意识到竞争劣势，为追赶平台创造了紧迫的预算需求。
    signalRefs: ["AI 原生并购模式获机构背书"]
    sourceRefs: [4]
  - point: >-
      Circeus 公开披露的成果——客户体验自动化率 80%、预订量两位数增长——为 PE 的 LP 和
      运营合伙人提供了可向自己组合资产发起追责的具体基准，
      AI 改造由此从锦上添花变成契约级要求。
    signalRefs: ["18 次收购验证 AI 实际回报"]
    sourceRefs: [1]
  - point: >-
      Circeus 证明集中 AI 工程比各公司自建更能创造价值，验证了共享平台架构，
      也意味着缺乏这一集中化能力的控股公司在其所有竞争市场中都处于结构性劣势。
    signalRefs: ["集中 AI 工程优于各公司自建"]
    sourceRefs: [2]
  - point: >-
      欧洲碎片化垂直 SaaS 市场 AI 渗透率系统性偏低，意味着大量已被收购的组合公司
      亟需完成 AI 改造——否则 AI 原生挑战者将蚕食其客户基础，并压低收购倍数。
    signalRefs: ["欧洲垂直 SaaS 碎片化且 AI 渗透率低"]
    sourceRefs: [4]

differentiator: >-
  与 LangChain、Vercel AI SDK 等通用 AI 开发平台不同，本平台专为收购后场景设计：
  预建智能体直接映射已知的垂直 SaaS 工作流模式，无需自定义提示词工程；
  连接器针对遗留 SaaS 数据库结构设计，而非面向全新技术栈。
  与管理咨询公司相比，平台提供可复制的 90 天部署，无持续项目费用，并通过共享智能体库
  在组合资产间复利积累价值。与 Circeus 内部模式相比，本平台向任何控股公司开放，
  无需投入 2.2 亿美元资本，也无需自建中央工程团队。

