  defensibility:
    score: 3
    rationale: 共享智能体库随每次部署复利积累，形成工作流网络效应；但现有 AI 平台厂商只要投入足够资源就能添加组合管理功能，近期可防御性因此有限。
  ventureScale:
    score: 4
    rationale: "全球数以千计的 PE 支持软件并购整合方，每家旗下 5–20 家组合公司；每家组合公司 ACV 10 万–15 万美元、每家控股公司 10 家组合公司，则单客户 ACV 可达 100 万–150 万美元，100 家控股公司客户即可打出 ARR 1 亿美元的可信路径。"

topRisks:
  - name: PE 预算审批延迟
    description: 组合公司受控股公司审批周期和收购后整合冻结的制约，采购决策可能在交割后推迟 6–18 个月。
    mitigation: 直接向有权批准中央基础设施支出的运营合伙人或控股公司 CTO 销售；将试点结构化为标准 100 天收购后整合计划中的一项预算条目，使采购流程正常化。
  - name: 集成复杂度低估
    description: 遗留垂直 SaaS 产品的数据库结构差异极大、API 文档残缺、代码库老化，实际连接器工程量可能远超预估，推高交付成本和周期。
    mitigation: 将初始智能体目录限定在五种工作流模式，并为十大最常见垂直 SaaS 数据库栈提供预建连接器；对非标连接器收取专业服务费，并将该收入再投入连接器库扩展。
  - name: Circeus 平台竞争
    description: Circeus、Beacon 或 Bending Spoons 可能将内部 AI 部署工具商业化，向第三方控股公司出售，以经过验证的资历和已有客户案例入场。
    mitigation: 优先服务无担保发起人、家族办公室和成长期 PE 基金——这些机构规模太小，不会成为上述平台的收购目标，因此永久属于可触达市场；在威胁成型前深度集成 Allvue、DealCloud 等 PE 工作流工具，建立转换成本。
