slug: saas-rollup-ai-engine
date: '2026-06-30'
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-07
  unit: YYYY-MM
  source: '[business-plan.yaml date] 计划日期 2026-06-30 后的第一个完整运营月。'
- id: A2
  name: 种子轮交割后期初现金
  value: '3000'
  unit: USDK
  source: '[business-plan.yaml fundingAsk.targetFundingRangeUsd] 按 2–4M 种子融资区间中值 300 万美元建模，资金覆盖下一个里程碑节点的 24 个月加缓冲。'
- id: A3
  name: 收入计量单位
  value: 活跃付费已部署组合产品
  unit: 定义
  source: '[business-plan.yaml gtm.pricing; business-plan.yaml businessModel.revenueStreams] 定价以每款已部署组合产品为单位，因此客户计数代表活跃付费产品部署数，而非控股公司 logo 数。'
- id: A4
  name: 每个活跃付费部署的混合年化 ARPU
  value: '165'
  unit: USDK/产品·年
  source: '[business-plan.yaml gtm.pricing; business-plan.yaml investorMemo.firstCustomer.initialContract; research.yaml bottomUpSizingDrivers] 高于 12 万美元的市场规模代理值，因为基准情景包含授权收入以及 3 款产品控股公司套餐内的适度成功费用贡献。'
- id: A5
  name: 收入确认时间
  value: 每月或每季度内期中客户数
  unit: 政策
  source: '[初创财务启发式] 假设新付费部署平均落在每个报告期的中间时点。'
- id: A6
  name: 第一年月末客户路径
  value: M1 0; M2 0; M3 0; M4 1; M5 1; M6 1; M7 1; M8 2; M9 2; M10 2; M11 2; M12 3
  unit: 活跃付费已部署组合产品
  source: '[business-plan.yaml milestones 0-12 months; experimentRoadmap; investorMemo.firstCustomer.initialContract] 反映两次付费共创客户部署以及第 12 个月前签下的首个 3 款产品付费控股公司合同。'
- id: A7
  name: 第二年季末客户数
  value: Q1Y2 5; Q2Y2 8; Q3Y2 12; Q4Y2 15
  unit: 活跃付费已部署组合产品
  source: '[business-plan.yaml milestones 12-24 months] 对齐第二年末 3 家以上付费控股公司、10 栈连接器库和 ARR 150 万美元以上。'
- id: A8
  name: 第三年季末客户数
  value: Q1Y3 18; Q2Y3 22; Q3Y3 27; Q4Y3 31
  unit: 活跃付费已部署组合产品
  source: '[business-plan.yaml milestones 24-36 months; research.yaml market.som] 达到 5 家以上付费控股公司和 ARR 300 万美元以上，同时远低于研究的 90 款产品 SOM 上限。'
- id: A9
  name: 毛利率目标
  value: '72'
  unit: 百分比
  source: '[business-plan.yaml businessModel.targetGrossMarginPct] 按确认收入 28% COGS 建模。'
- id: A10
  name: 单位经济模型月流失率
  value: '1.3'
  unit: 百分比
  source: '[business-plan.yaml product.keyBets; business-plan.yaml milestones 12-24 months] 1.3% 月流失率意味着年化毛留存率约 85.4%，与计划 85% 以上续约目标吻合。'
- id: A11
  name: 联合创始人/CEO 含税薪酬（年化）
  value: '168'
  unit: USDK/年
  source: '[business-plan.yaml team Founding CEO] 创始人主导企业 GTM 套餐（含工资税和福利）的初创财务启发式。'
- id: A12
  name: 联合创始人/CTO 含税薪酬（年化）
  value: '204'
  unit: USDK/年
  source: '[business-plan.yaml team Founding CTO] 承担连接器、模型和安全架构的高级 AI 平台创始人的初创财务启发式。'
- id: A13
  name: 部署工程师含税薪酬（年化）
  value: '150'
  unit: USDK/年
  source: '[business-plan.yaml team Deployment engineer] 支持 90 天部署的面向客户集成工程师的初创财务启发式。'
- id: A14
  name: 销售副总裁含税薪酬（年化）
  value: '210'
  unit: USDK/年
  source: '[business-plan.yaml team VP Sales] 早期共创客户验证后加入的第一位企业销售的初创财务启发式。'
- id: A15
  name: 产品工程师含税薪酬（年化）
  value: '174'
  unit: USDK/年
  source: '[business-plan.yaml product sixMonth; operations] 负责智能体目录和连接器库产品化的高级工程师的初创财务启发式。'
- id: A16
  name: 第二名部署工程师含税薪酬（年化）
  value: '150'
  unit: USDK/年
  source: '[business-plan.yaml milestones 12-24 months] 活跃部署达到多控股公司规模后，第二名集成工程师的初创财务启发式。'
- id: A17
  name: 解决方案架构师含税薪酬（年化）
  value: '162'
  unit: USDK/年
  source: '[business-plan.yaml operations; risks] 兼任售前和实施负责人、协助避免服务蔓延的初创财务启发式。'
- id: A18
  name: 应用 AI 工程师含税薪酬（年化）
  value: '186'
  unit: USDK/年
  source: '[business-plan.yaml product twentyFourMonth] 扩展初始两种工作流以外智能体目录的初创财务启发式。'
- id: A19
  name: 客户主管含税薪酬（年化）
  value: '174'
  unit: USDK/年
  source: '[business-plan.yaml gtm.funnelTargets; strategicChoices.sequencingRationale] 创始人主导验证后第一位背配额销售的初创财务启发式。'
- id: A20
  name: 合规/数据工程师含税薪酬（年化）
  value: '162'
  unit: USDK/年
  source: '[research.yaml regulatoryTechnicalConstraints; business-plan.yaml operations] 部署规模扩大后负责隐私、审计日志和数据治理打包的初创财务启发式。'
- id: A21
  name: 客户成功经理含税薪酬（年化）
  value: '132'
  unit: USDK/年
  source: '[business-plan.yaml milestones 24-36 months] 活跃产品部署数超过 25 后，负责续约和扩展支持的初创财务启发式。'
- id: A22
  name: 招聘节奏
  value: CEO 和 CTO 第 1 个月；部署工程师第 4 个月；销售副总裁第 10 个月；产品工程师第 13 个月；第二名部署工程师第 16 个月；解决方案架构师第 19 个月；应用 AI 工程师第 22 个月；客户主管第 25 个月；合规/数据工程师第 28 个月；客户成功经理第 34 个月
  unit: 时间节点
  source: '[business-plan.yaml team; milestones; strategicChoices.sequencingRationale] 在扩张商业团队之前先保障共创客户交付人员，合规和 CS 岗位仅在部署密度足够后才添加。'
- id: A23
  name: 职能薪酬分配
  value: "CEO 70% 销售市场 / 30% 管理行政；CTO 100% 研发；部署工程师 65% 研发 / 35% 管理行政；销售副总裁和客户主管 100% 销售市场；产品工程师和应用 AI 工程师 100% 研发；解决方案架构师 30% 销售市场 / 20% 研发 / 50% 管理行政；合规/数据工程师 80% 研发 / 20% 管理行政；客户成功经理 20% 销售市场 / 80% 管理行政"
  unit: 分配
  source: '[business-plan.yaml team rationales; operations; research.yaml adoptionFrictionMatrix] 反映谁负责推销切口、谁构建可复用产品、谁承担部署治理工作。'
- id: A24
  name: 非薪酬运营支出
  value: "第一年 销售市场 7K + 月收入 4%，研发 10K + 月均客户数 × 1.2K，管理行政 8K + 月均客户数 × 0.4K；第二年 销售市场 9K + 收入 4.5%，研发 12K + 月均客户数 × 1.5K，管理行政 10K + 月均客户数 × 0.5K；第三年 销售市场 10K + 收入 4.5%，研发 14K + 月均客户数 × 1.7K，管理行政 12K + 月均客户数 × 0.6K"
  unit: USDK/月
  source: '[初创财务启发式] 覆盖面向 PE 客户的企业部署动作所需的云推理、差旅、安全审查、法务和合规开销。'
- id: A25
  name: 现金转化政策
  value: EBITDA 近似反映运营现金变动
  unit: 政策
  source: '[初创财务启发式] 本阶段不建模债务、资本支出、税费或重大营运资金波动。'
- id: A26
  name: 每个净新增付费部署的混合 CAC
  value: '48.8'
  unit: USDK/新增付费部署产品
  source: 由建模的第 2–3 年销售市场支出 136.69 万美元除以 28 个净新增付费部署产品计算得出。
- id: A27
  name: 融资里程碑
  value: 在启动 A 轮融资流程前，实现 15 个跨至少 3 家控股公司的活跃付费产品部署、10 栈连接器覆盖、ARR 150 万美元以上，以及首次续约留存率超过 85%
  unit: 里程碑
  source: '[business-plan.yaml milestones 12-24 months; fundingAsk.useOfFundsSummary] 用于确定当前种子轮规模，含 6 个月运营缓冲。'
