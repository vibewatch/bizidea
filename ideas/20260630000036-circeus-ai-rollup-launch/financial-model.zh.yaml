scenarios:
  downside:
    description: 共创客户部署模板化时间超出预期，采购推迟，第三年末活跃产品数更少、成功费用实现滞后、交付拖累更重。
    y3RevenueK: 2820.0
    y3EbitdaK: -890.0
    cashLowPointK: 280.0
    keyAssumptionChanges:
    - 第一年末 2 个付费部署，第二年末 10 个，第三年末 22 个（而非 31 个）。
    - 混合年化 ARPU 从 16.5 万美元降至 15 万美元，因更多客户停留在试点定价阶段、成功费用滞后。
    - 毛利率从 72% 降至 69%，因连接器定制和合规工作服务属性依然偏重。
  base:
    description: 创始人主导销售加专注的交付团队，将两名共创客户转化为可复制的 3 款产品控股公司着陆，第三年末达到 31 个活跃付费部署。
    y3RevenueK: 3712.6
    y3EbitdaK: -279.7
    cashLowPointK: 1181.1
    keyAssumptionChanges:
    - 客户数按 A6、A7、A8 推进，第二年末达到 15 个活跃付费部署，第三年末达到 31 个。
    - 混合年化 ARPU 维持 16.5 万美元，毛利率维持商业计划 72% 目标。
    - 第三年末人员编制达到 11 名全职员工，交付和合规岗位仅在部署密度证明合理后才添加。
  upside:
    description: 标杆客户的赢单充分压缩销售周期，第三年前就能以更高定价落地更多控股公司，连接器复用率更好。
    y3RevenueK: 4875.0
    y3EbitdaK: 620.0
    cashLowPointK: 1600.0
    keyAssumptionChanges:
    - 第一年末 4 个付费部署，第二年末 18 个，第三年末 36 个——控股公司案例引导更多产品提前加入。
    - 混合年化 ARPU 从 16.5 万美元升至 17.5 万美元，更多客户直接以 3–5 款产品企业套餐起签。
    - 毛利率从 72% 升至 74%，连接器复用降低了每款产品的部署人力成本。
sensitivity:
- variable: ARPU
  downsideCase: 买家抵制完整成功费用附加，并更多要求批量折扣，混合年化 ARPU 落在 15 万美元附近。
  baseCase: 混合年化 ARPU 维持建模的 16.5 万美元。
  upsideCase: 更多合同直接以 3–5 款产品范围起签后，混合年化 ARPU 达到 17.5 万美元。
  y3RevenueImpactK: -337.5
  cashImpactK: -243.0
- variable: CAC
  downsideCase: 每家新控股公司需要更多创始人时间、差旅和采购辅助，销售市场强度升至收入 6% 附近。
  baseCase: 建模 CAC 维持每个新增付费部署约 4.88 万美元。
  upsideCase: 合作伙伴引荐和可复制案例让销售市场强度向收入 4% 漂移。
  y3RevenueImpactK: 0.0
  cashImpactK: -120.0
- variable: 流失率
  downsideCase: 毛留存率表现如同第三年末少 4 个活跃部署，因为平台被当作试点层而非核心运营基础设施。
  baseCase: 基准情景假设 1.3% 月流失率，即年化毛留存率约 85%。
  upsideCase: 多产品控股公司工作流形成操作黏性，留存表现如同第三年末多 2–3 个部署。
  y3RevenueImpactK: -480.0
  cashImpactK: -350.0
- variable: 销售周期
  downsideCase: 安全、数据治理和控股公司审批环节使试点到生产的周期约延长一个季度。
  baseCase: 基准情景维持在研究的 3–6 个月决策窗口和 90 天部署目标内。
  upsideCase: 标杆客户将周期缩短约一个季度，并将扩展产品拉前。
  y3RevenueImpactK: -371.3
  cashImpactK: -290.0
- variable: 毛利率
  downsideCase: 更多部署需要定制连接器和审计工作，毛利率维持在 69% 附近。
  baseCase: 毛利率维持商业计划 72% 目标。
  upsideCase: 连接器复用和标准化治理降低每次部署的人力成本，毛利率达到 74%。
  y3RevenueImpactK: 0.0
  cashImpactK: -111.4
- variable: 招聘节奏
  downsideCase: 客户成功经理和额外交付人员需提前约 6 个月以支持定制工作。
  baseCase: 基准情景在第三年末部署数超过 25 后才添加一名 CS 岗位。
  upsideCase: 标准化连接器承担了更多支持负载，团队维持基准招聘计划。
  y3RevenueImpactK: 0.0
  cashImpactK: -150.0
modelDiagram:
  title: 单位经济模型流程
  mermaid: |
    flowchart LR
      Outreach[PE operating partner outreach] --> DesignPartners
      DesignPartners --> PaidProducts[Live paid product deployments]
      PaidProducts --> Revenue[License plus success-fee revenue]
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
- checkName: 收入引擎
  finding: 基准情景收入来自活跃付费产品部署数从第一年末 3 个增长至第三年末 31 个，每个混合年化价值约 16.5 万美元。
- checkName: 必须做对的事
  finding: 团队必须保持 90 天部署的可复制性，在第二年末前达到 15 个活跃产品，同时不让公司演变为服务属性偏重的集成商。
- checkName: 模型失效条件
  finding: 若采购和部署周期滑向悲观情景，现金将在公司达到规模之前压缩至约 28 万美元低点附近。
- checkName: 下一轮融资证明
  finding: 当种子资金将公司带至 3 家以上控股公司的 15 个活跃产品、ARR 150 万美元以上和首次续约留存率超过 85% 时，A 轮案例最为充分。
sanityChecks:
  ruleOf40: "第三年增长率 164.7% + EBITDA 利润率 -7.5% = 157.2%（方向上强劲，但仍受第二年低基数帮助）。"
  burnMultiple: "第二年净新增 ARR 约 198 万美元，资金消耗倍数约 0.4x；第三年净新增 ARR 约 264 万美元，改善至约 0.1x。"
  revenuePerFte: "第三年末 FTE 人均收入约 33.75 万美元（在早期企业 SaaS 20 万–40 万美元粗略基准范围内）。"
  flags:
  - 模型按付费已部署组合产品而非控股公司 logo 计数，因此客户集中度实际上高于客户数量指标所示。
  - ARPU 假设公司能在研究备忘录每款产品 12 万美元支出代理值之上捕获部分成功费用经济；若归因认可度弱，该值将承压。
  - 买家宇宙集中、PE 决策周期不规律，少数控股公司审批延迟即可实质性影响第二、第三年收入。
  - EBITDA 在第三年大部分时间仍为负，若提前招聘或连接器复用率偏低，下一轮融资时间可能早于计划。
