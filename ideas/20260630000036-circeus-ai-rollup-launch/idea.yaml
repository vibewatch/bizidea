ideaScorecard:
  signalStrength:
    score: 4
    rationale: "Circeus EBRD-backed launch with concrete portfolio AI outcomes (80% automation, double-digit bookings) validated by category peers Beacon and Bending Spoons; four same-day sources but round size undisclosed reduces top-score confidence."
  painIntensity:
    score: 4
    rationale: PE software operators face quantifiable competitive pressure from AI-native entrants and LP scrutiny on AI transformation timelines; the cost of inaction is measurable and growing as the Circeus benchmark becomes industry-visible.
  wedgeClarity:
    score: 5
    rationale: A pre-built AI agent catalog deployable via connectors without rebuilding each portfolio product is a concrete, testable, narrow entry point with a specific 90-day activation timeline and aligned success-fee pricing.
  defensibility:
    score: 3
    rationale: A shared agent library compounds with each deployment creating workflow network effects; however, incumbent AI platforms could add portfolio-management features with sufficient investment, limiting near-term defensibility.
  ventureScale:
    score: 4
    rationale: "Thousands of PE-backed software roll-ups globally, each with 5-20 portfolio companies; a $100K-150K ACV per company at 10 companies per holdco yields $1-1.5M ACV per customer, with a credible path to $100M ARR at 100 holdco customers."
topRisks:
  - name: PE budget approval lag
    description: Portfolio companies are constrained by holdco approval cycles and post-acquisition integration freezes that can delay purchasing decisions by 6-18 months after close.
    mitigation: Sell directly to the operating partner or holdco CTO who can approve central infrastructure spend; structure pilots as line items in the standard 100-day post-acquisition integration plan to normalize the purchase.
  - name: Integration depth underestimation
    description: Legacy vertical SaaS products have highly variable schemas, undocumented APIs, and aging codebases that may require significantly more connector engineering than estimated, inflating delivery costs and timelines.
    mitigation: Limit the initial agent catalog to five workflow patterns with pre-built connectors for the ten most common vertical SaaS database stacks; charge professional services fees for niche connectors and reinvest that revenue into expanding the connector library.
  - name: Circeus platform competition
    description: Circeus, Beacon, or Bending Spoons could commercialize their internal AI deployment tooling and sell it to third-party holding companies, entering the market with proven credentials and an established customer reference base.
    mitigation: Target fundless sponsors, family offices, and growth PE firms that are too small to attract acquisition by these platforms and are therefore permanently in the addressable market; build deep integrations with PE workflow tools such as Allvue and DealCloud to create switching costs before the threat materializes.
