problem: >-
  Software holding companies and PE-backed roll-ups that acquire vertical SaaS businesses
  lack the central AI engineering capacity to modernize each product. Building a dedicated AI
  team per portfolio company is cost-prohibitive; hiring one central team as Circeus did
  required $220M+ and years of deliberate effort. Meanwhile, AI-native competitors are eroding
  the customer bases of every acquired legacy SaaS product faster than the typical holdco can
  respond, and LP expectations now include demonstrated AI transformation roadmaps within
  12 months of acquisition close.
targetUser:
  primary: CTO or Head of Engineering at a PE-backed software holding company with 5-20 acquired vertical SaaS products
  secondary: Portfolio company product teams inherited by a holding company that needs AI features shipped within 90 days of acquisition close
  buyer: PE operating partner or holdco CEO approving central technology infrastructure spend across the portfolio
startupThesis:
  nonObviousInsight: >-
    PE software roll-up value creation is shifting from financial engineering to AI engineering.
    The new constraint is not capital — EBRD and growth PE are ready to fund — but execution
    velocity: how quickly can a holding company deploy an AI layer across 10-20 acquired products
    after close? Circeus took four years and $220M to build this internally; every other software
    roll-up operator now faces the same challenge without the runway to replicate it. This creates
    a new B2B infrastructure category — portfolio AI deployment platforms — that did not exist
    24 months ago and for which no purpose-built vendor exists today.
  beachhead: >-
    PE-backed software holding companies in Europe or North America with 5-15 acquired vertical
    SaaS products (each $500K-$5M ARR) that have committed to an AI transformation roadmap but
    have not yet hired a central AI engineering team
  wedge: >-
    A pre-built AI agent catalog covering the five most common vertical SaaS workflow patterns
    (support ticket deflection, churn prediction, document summarization, auto-booking, and
    predictive upsell) deployable via API connector without touching core product code
  whyNowCatalyst: >-
    Circeus's EBRD-backed public launch and the emerging Bending Spoons-Beacon-Circeus cohort
    prove that AI-native software acquisition is a validated category, making every non-AI PE
    software operator acutely aware of the competitive gap they face and driving immediate demand
    for a catch-up platform.
  ventureScalePath: >-
    Start as a deployment platform for 30-50 European and North American software holding companies;
    expand the agent catalog to 50+ vertical SaaS workflow patterns; evolve into a portfolio
    intelligence layer covering deal sourcing scores, AI-readiness diligence, and portfolio
    benchmarking that becomes indispensable to any software roll-up operator running five or more
    companies.
solution: >-
  A modular AI agent platform purpose-built for software holding companies. The platform connects
  to acquired portfolio companies via standard database and API connectors, deploys a catalog of
  pre-built AI agents for the most common vertical SaaS workflows including support automation,
  churn prediction, document summarization, and auto-booking, and provides the holdco with a
  central dashboard tracking AI-driven KPIs across the entire portfolio. Deployment targets
  90 days per product with no changes to core product architecture. Success fees tied to
  documented AI-driven bookings create aligned incentives. A shared AI skill library grows with
  each deployment, compounding value across the portfolio and widening the moat over time.
goToMarketSeed:
  firstCustomer: >-
    A London- or Amsterdam-based PE growth fund that has acquired 5-10 vertical SaaS companies
    in the last three years in professional services, construction tech, or field services
    software, and is now facing competitive pressure from AI-native entrants in at least two
    portfolio segments
  buyingTrigger: >-
    A portfolio company losing deals to an AI-native competitor, or an LP asking the GP why their
    software portfolio has not shipped AI features 12 months after acquisition close
  currentAlternative: >-
    Hiring a central AI engineering team (expensive and slow with a 6-12 month ramp), engaging
    a consulting firm for one-off AI transformation projects (expensive and not repeatable), or
    waiting for each portfolio company to build AI independently (too slow and uncoordinated)
  switchingReason: >-
    Pre-built agents and connectors compress a 12-month internal AI build into a 90-day
    deployment without requiring the holdco to hire or manage a central engineering team,
    directly replicating the Circeus playbook at a fraction of the capital commitment required
    to build it from scratch
  pricingHypothesis: >-
    Annual SaaS license of $80K-$150K per portfolio company plus a 5-10% success fee on
    documented AI-attributable incremental ARR; holdco-level enterprise contract covers 3+ portfolio
    companies with volume discount, targeting $500K-$1.5M total ACV per holdco customer
