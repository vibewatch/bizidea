  fiveForces:
    supplierPower:
      score: 3
      rationale: 云和模型厂商实力强，但并非唯一——Azure、AWS、Anthropic 及平台工具提供了多套可行的技术栈，供应商议价能力因此处于中等而非极强的水平。
      sourceRefs: [35, 36, 37, 38, 42]
    buyerPower:
      score: 4
      rationale: 买家宇宙小且眼光老练，合同金额大，控股公司可以选择内部团队、咨询商或横向平台，买家议价能力较强。
      sourceRefs: [17, 19, 25, 40]
    threatOfEntrants:
      score: 3
      rationale: 工具层门槛下降很快，但真正的组合专属剧本、数据治理打包方案和部署案例参考仍需时间积累。
      sourceRefs: [16, 17, 37, 42, 44]
    threatOfSubstitutes:
      score: 4
      rationale: 买家可以用咨询主导的改造、云原生自建或内部平台团队替代，初创公司必须证明比多个可信替代方案更快实现 ROI。
      sourceRefs: [19, 40, 41, 44, 48]
    competitiveRivalry:
      score: 4
      rationale: 直接纯正面竞争仍然稀薄，但周边竞争激烈——企业 AI 平台和系统集成商都在向智能体化、工作流级部署方向移动。
      sourceRefs: [3, 40, 42, 43, 48]
  pestle:
    - factor: 政治
      impact: neutral
      point: 欧洲机构正公开支持实体经济的 AI 现代化，有利于这一品类，但监管执法仍将影响部署设计。
      sourceRefs: [1, 27, 29]
    - factor: 经济
      impact: positive
      point: 随着软件增长趋于正常化、附加收购活动持续活跃，以技术为核心的 PE 机构持续寻找新的价值创造杠杆。
      sourceRefs: [15, 24, 25]
    - factor: 社会
      impact: positive
      point: 软件买家对关键任务产品内置自动化和 AI 原生工作流的预期不断提升，给被收购遗留产品带来持续的追赶压力。
      sourceRefs: [1, 3, 16]
    - factor: 技术
      impact: positive
      point: 智能体工具、编排框架和云护栏的成熟度已足以支撑产品化的组合资产部署。
      sourceRefs: [37, 42, 44, 47, 48]
    - factor: 法律
      impact: negative
      point: AI 和隐私法规要求日志记录、风险控制、人工监督，以及在自动化面向客户工作流时明确的数据处理边界。
      sourceRefs: [27, 28, 30, 31, 36]
    - factor: 环境
      impact: neutral
      point: AI 基础设施需求快速增长，但计算成本和容量是这家初创公司更直接的关切，直接的环境定位暂不是重点。
      sourceRefs: [26]
  adoptionFrictionMatrix:
    - friction: 被收购产品间遗留数据和 API 的高度异构
      severity: high
      affectedBuyer: 控股公司 CTO 和中央平台负责人
      mitigation: 先从所需定制集成最少的五种工作流模式入手，优先交付连接器模板。
      sourceRefs: [5, 17, 48]
    - friction: 客户数据访问的隐私和合规审查
      severity: high
      affectedBuyer: 运营合伙人、法务总顾问和安全负责人
      mitigation: 从 MVP 起就提供私有部署选项、审计日志，以及映射到 AI 和隐私合规义务的工作流专属控件。
      sourceRefs: [27, 30, 35, 36, 37, 38]
    - friction: AI 驱动收入提升与正常组合改善的归因区分
      severity: medium
      affectedBuyer: 运营合伙人和 CFO
      mitigation: 在上线前做好基线埋点，先从财务团队已经信任的效率指标入手。
      sourceRefs: [1, 16, 19]
    - friction: 担心又变成另一个定制咨询项目
      severity: medium
      affectedBuyer: 控股公司 CEO
      mitigation: 卖固定的部署模板——可复用的智能体目录、清晰的切换里程碑、控股公司级 KPI 仪表盘。
      sourceRefs: [3, 17, 40, 42]

market:
  tam:
    value: $288.0M
    rationale: >-
      估算基于全球约 300 家符合多资产组合特征的软件收购方或控股公司，
      乘以平均 8 款符合条件的组合产品，再乘以每款产品部署加治理工具
      的年化软件支出代理值 12 万美元（300 × 8 × $120K）。
      单位假设以异常高的垂直 SaaS 交易流和碎片化软件供给为锚，
      支出代理值是 PE 和企业平台来源所描述 AI 及改造预算的保守切片。
    isEstimate: true
    sourceRefs: [8, 16, 22, 24, 25, 40, 44, 46]
  sam:
    value: $86.4M
    rationale: >-
      将 TAM 收窄至欧洲加北美的滩头市场，约 90 家符合条件的买家控股公司，
      同样按 8 款产品平均和每款每年 12 万美元支出代理值计算（90 × 8 × $120K）。
    isEstimate: true
    sourceRefs: [8, 10, 11, 15, 24, 25]
  som:
    value: $10.8M
    rationale: >-
      第三年可实现场景：15 家控股公司，每家部署 6 款产品，每款年化支出 12 万美元
      （15 × 6 × $120K），这一预测基于聚焦的直销动作，而非广泛的市场渗透。
    isEstimate: true
    sourceRefs: [3, 16, 17, 25, 40]

bottomUpSizingDrivers:
  - driver: 可触达软件收购方账户总数
    value: "估计约 300 家全球控股公司或永久资本运营方，拥有多产品软件组合"
    source: "[8], [22], [24], [25], calc"
