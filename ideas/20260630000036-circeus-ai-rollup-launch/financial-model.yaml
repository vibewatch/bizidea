assumptions:
- id: A1
  name: Model start month
  value: 2026-07
  unit: YYYY-MM
  source: '[business-plan.yaml date] first full operating month after the 2026-06-30 plan date.'
- id: A2
  name: Opening cash after seed close
  value: '3000'
  unit: USDK
  source: '[business-plan.yaml fundingAsk.targetFundingRangeUsd] modeled at $3.0M, the midpoint of the stated $2-4M seed range, to fund 24 months to the next milestone plus buffer.'
- id: A3
  name: Revenue unit
  value: Active paid deployed portfolio product
  unit: definition
  source: '[business-plan.yaml gtm.pricing; business-plan.yaml businessModel.revenueStreams] pricing is per deployed portfolio product, so customer counts represent live paid product deployments rather than holdco logos.'
- id: A4
  name: Blended annual ARPU per active paid deployment
  value: '165'
  unit: USDK/product-year
  source: '[business-plan.yaml gtm.pricing; business-plan.yaml investorMemo.firstCustomer.initialContract; research.yaml bottomUpSizingDrivers] set above the $120K market-sizing proxy because the base case includes both license revenue and a modest success-fee contribution inside 3-product holdco packages.'
- id: A5
  name: Revenue recognition timing
  value: Midpoint customer count within each month or quarter
  unit: policy
  source: '[startup-finance heuristic] assumes new paid deployments land roughly halfway through each reporting period on average.'
- id: A6
  name: Y1 month-end customer path
  value: M1 0; M2 0; M3 0; M4 1; M5 1; M6 1; M7 1; M8 2; M9 2; M10 2; M11 2; M12 3
  unit: active paid deployed portfolio products
  source: '[business-plan.yaml milestones 0-12 months; experimentRoadmap; investorMemo.firstCustomer.initialContract] reflects two paid design-partner deployments and a first 3-product paying holdco contract by month 12.'
- id: A7
  name: Y2 quarter-end customers
  value: Q1Y2 5; Q2Y2 8; Q3Y2 12; Q4Y2 15
  unit: active paid deployed portfolio products
  source: '[business-plan.yaml milestones 12-24 months] aligns to 3+ paying holdcos, a 10-stack connector library, and $1.5M+ ARR by the end of year two.'
- id: A8
  name: Y3 quarter-end customers
  value: Q1Y3 18; Q2Y3 22; Q3Y3 27; Q4Y3 31
  unit: active paid deployed portfolio products
  source: '[business-plan.yaml milestones 24-36 months; research.yaml market.som] reaches 5+ paying holdcos and $3M+ ARR while staying far below the researched 90-product SOM ceiling.'
- id: A9
  name: Gross margin target
  value: '72'
  unit: percent
  source: '[business-plan.yaml businessModel.targetGrossMarginPct] modeled as 28% COGS on recognized revenue.'
- id: A10
  name: Monthly churn for unit economics
  value: '1.3'
  unit: percent
  source: '[business-plan.yaml product.keyBets; business-plan.yaml milestones 12-24 months] 1.3% monthly churn implies about 85.4% annual gross retention, matching the plan''s 85%+ renewal target.'
