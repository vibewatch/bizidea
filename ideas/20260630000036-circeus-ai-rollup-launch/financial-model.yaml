scenarios:
  downside:
    description: Design-partner deployments take longer to template and procurement slips, leaving the company with fewer live products, lower success-fee realization, and more delivery drag by Y3.
    y3RevenueK: 2820.0
    y3EbitdaK: -890.0
    cashLowPointK: 280.0
    keyAssumptionChanges:
    - Y1 exits with 2 paid deployments, Y2 with 10, and Y3 with 22 instead of 31.
    - Blended annual ARPU falls from $165K to $150K as more customers stay on pilot-style pricing and success fees lag.
    - Gross margin slips from 72% to 69% because connector customization and compliance work stay more services-heavy.
  base:
    description: Founder-led selling plus a focused delivery team turns two design partners into repeatable 3-product holdco landings and 31 live paid deployments by Y3 exit.
    y3RevenueK: 3712.6
    y3EbitdaK: -279.7
    cashLowPointK: 1181.1
    keyAssumptionChanges:
    - Customer counts follow A6, A7, and A8, reaching 15 live paid deployments by Y2 exit and 31 by Y3 exit.
    - Blended annual ARPU stays at $165K while gross margin stays at the 72% business-plan target.
    - Headcount reaches 11 end-of-Y3 FTE, with delivery and compliance hires added only after deployment density justifies them.
  upside:
    description: Reference wins compress sales cycles enough to land more holdcos sooner, allowing higher-priced multi-product packages with better connector reuse by Y3.
    y3RevenueK: 4875.0
    y3EbitdaK: 620.0
    cashLowPointK: 1600.0
    keyAssumptionChanges:
    - Y1 exits with 4 paid deployments, Y2 with 18, and Y3 with 36 as holdco references pull additional products forward.
    - Blended annual ARPU rises from $165K to $175K as more customers convert directly into 3-5 product enterprise packages.
    - Gross margin improves from 72% to 74% because connector reuse lowers deployment labor per product.
sensitivity:
- variable: ARPU
  downsideCase: Blended annual ARPU settles near $150K because buyers resist full success-fee attachment and push more volume discounting.
  baseCase: Blended annual ARPU stays at $165K as modeled.
  upsideCase: Blended annual ARPU reaches $175K once more contracts start at 3-5 product scope.
  y3RevenueImpactK: -337.5
  cashImpactK: -243.0
- variable: CAC
  downsideCase: S&M intensity rises toward 6% of revenue because each new holdco needs more founder time, travel, and procurement hand-holding.
  baseCase: Modeled CAC stays near $48.8K per new paid deployment.
  upsideCase: Partner intros and repeatable references let S&M intensity drift toward 4% of revenue.
  y3RevenueImpactK: 0.0
  cashImpactK: -120.0
- variable: churn
  downsideCase: Gross retention behaves like Y3 exits 4 live deployments lower because the platform is treated as a pilot layer rather than core operating infrastructure.
  baseCase: The base case assumes 1.3% monthly churn, which is roughly 85% annual gross retention.
  upsideCase: Retention behaves like Y3 exits 2-3 deployments higher because multi-product holdco workflows become operationally sticky.
  y3RevenueImpactK: -480.0
  cashImpactK: -350.0
- variable: sales cycle
  downsideCase: Security, data-governance, and holdco approval steps add about one quarter to the pilot-to-production cycle.
  baseCase: The base case stays inside the researched 3-6 month decision window and 90-day deployment target.
  upsideCase: Reference customers shorten cycle time by about one quarter and pull expansion products forward.
  y3RevenueImpactK: -371.3
  cashImpactK: -290.0
- variable: gross margin
  downsideCase: Gross margin stays closer to 69% because more deployments need bespoke connector and audit work.
  baseCase: Gross margin stays at the 72% plan target.
  upsideCase: Gross margin reaches 74% as connector reuse and standardized governance reduce labor per deployment.
  y3RevenueImpactK: 0.0
  cashImpactK: -111.4
- variable: hiring pace
  downsideCase: A customer success manager and an extra delivery hire must be pulled forward by roughly 6 months to support custom work.
  baseCase: The base case adds only one CS hire late in Y3 after deployment count passes 25.
  upsideCase: The team keeps the base hiring plan because standardized connectors absorb more of the support load.
  y3RevenueImpactK: 0.0
  cashImpactK: -150.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Outreach[PE operating partner outreach] --> DesignPartners
      DesignPartners --> PaidProducts[Live paid product deployments]
      PaidProducts --> Revenue[License plus success-fee revenue]
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
- checkName: Revenue engine
  finding: Base-case revenue comes from growing live paid product deployments from 3 at Y1 exit to 31 at Y3 exit at roughly $165K of blended annual value each.
- checkName: Must go right
  finding: The team must keep 90-day deployments repeatable enough to reach 15 live products by Y2 exit without turning the company into a services-heavy integrator.
- checkName: Model breaks if
  finding: If procurement and deployment timelines slip toward the downside case, cash compresses toward a roughly $280K floor before the company reaches scale.
- checkName: Next-round proof
  finding: The Series A case is strongest once the seed capital gets the company to 15 live products across 3+ holdcos, $1.5M+ ARR, and first-renewal retention above 85%.
sanityChecks:
  ruleOf40: Y3 growth 164.7% + EBITDA margin -7.5% = 157.2% (strong directionally, though still helped by a small Y2 base).
  burnMultiple: About 0.4x in Y2 on roughly $1980.0K of net new ARR, improving to about 0.1x in Y3 on roughly $2640.0K of net new ARR.
  revenuePerFte: $337.5K Y3 revenue per end-of-year FTE (inside the rough $200K-$400K early enterprise SaaS benchmark).
  flags:
  - The model counts paid deployed portfolio products rather than holdco logos, so customer concentration remains higher than the customer-count line suggests.
  - ARPU assumes the company captures some success-fee economics above the research memo's $120K per-product spend proxy; weak attribution acceptance would pressure that value.
  - The buyer universe is concentrated and PE decision cycles are lumpy, so a small number of delayed holdco approvals can materially shift Y2-Y3 revenue.
  - EBITDA stays negative through most of Y3, so any early hiring pull-forward or lower connector reuse would likely force the next round sooner than planned.
