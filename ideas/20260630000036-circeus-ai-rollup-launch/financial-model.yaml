  name: Customer success manager loaded cash compensation
  value: '132'
  unit: USDK/year
  source: '[business-plan.yaml milestones 24-36 months] startup-finance heuristic for renewal and expansion support once the business passes 25 live product deployments.'
- id: A22
  name: Hiring cadence
  value: CEO and CTO in M1; deployment engineer in M4; VP Sales in M10; product engineer in M13; second deployment engineer in M16; solutions architect in M19; applied AI engineer in M22; account executive in M25; compliance/data engineer in M28; customer success manager in M34
  unit: timing
  source: '[business-plan.yaml team; milestones; strategicChoices.sequencingRationale] keeps design-partner delivery staffed before scaling the commercial team, then adds compliance and CS only after deployment density rises.'
- id: A23
  name: Functional payroll allocation
  value: CEO 70% S&M / 30% G&A; CTO 100% R&D; deployment engineers 65% R&D / 35% G&A; VP Sales and AE 100% S&M; product engineer and applied AI engineer 100% R&D; solutions architect 30% S&M / 20% R&D / 50% G&A; compliance/data engineer 80% R&D / 20% G&A; customer success manager 20% S&M / 80% G&A
  unit: allocation
  source: '[business-plan.yaml team rationales; operations; research.yaml adoptionFrictionMatrix] reflects who sells the wedge, who builds reusable product, and who absorbs deployment governance work.'
- id: A24
  name: Non-payroll operating spend
  value: Y1 S&M 7K + 4% of revenue monthly, R&D 10K + 1.2K per average customer monthly, G&A 8K + 0.4K per average customer monthly; Y2 S&M 9K + 4.5% of revenue, R&D 12K + 1.5K per average customer, G&A 10K + 0.5K per average customer; Y3 S&M 10K + 4.5% of revenue, R&D 14K + 1.7K per average customer, G&A 12K + 0.6K per average customer
  unit: USDK/month
  source: '[startup-finance heuristic] covers cloud inference, travel, security review, legal, and compliance overhead for an enterprise PE-facing deployment motion.'
- id: A25
  name: Cash conversion policy
  value: EBITDA approximates operating cash movement
  unit: policy
  source: '[startup-finance heuristic] no debt, capex, taxes, or material working-capital swings are modeled at this stage.'
- id: A26
  name: Blended CAC per net new paid deployment
  value: '48.8'
  unit: USDK/new paid deployed product
  source: Calculated from modeled Y2-Y3 sales and marketing spend of 1366.9K divided by 28 net new paid deployed products.
- id: A27
  name: Funding milestone
  value: 15 live paid product deployments across at least 3 holdcos, 10-connector coverage, $1.5M+ ARR, and first-renewal retention above 85% before the Series A process
  unit: milestone
  source: '[business-plan.yaml milestones 12-24 months; fundingAsk.useOfFundsSummary] used to size the current seed plus a 6-month operating buffer.'
