  name: Account executive loaded cash compensation
  value: '174'
  unit: USDK/year
  source: '[business-plan.yaml gtm.funnelTargets; strategicChoices.sequencingRationale] startup-finance heuristic for the first quota-carrying seller after repeatable founder-led proof.'
