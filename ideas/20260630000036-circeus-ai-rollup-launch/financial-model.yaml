  name: Compliance/data engineer loaded cash compensation
  value: '162'
  unit: USDK/year
  source: '[research.yaml regulatoryTechnicalConstraints; business-plan.yaml operations] startup-finance heuristic for privacy, audit-log, and data-governance packaging as deployments scale.'
