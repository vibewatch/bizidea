slug: saas-rollup-ai-engine
date: '2026-06-30'
executiveSummary: >-
  PE-backed software roll-ups face a structural AI execution gap: Circeus took $220M and four
  years to build a shared AI engineering layer across 18 acquisitions, yet every competing holdco
  now faces LP and board demands for an equivalent roadmap within 12 months of each new acquisition
  close. No neutral vendor fills this gap — AI-native acquirers (Circeus, Beacon) use internal
  platforms for their own assets, and horizontal AI tools (Palantir AIP, LangChain) require the
  holdco to define portfolio templates, attribution models, and rollout governance from scratch.
  The proposed startup fills this gap with a modular AI agent platform purpose-built for
  post-acquisition software portfolios: pre-built agents covering five high-ROI vertical SaaS
  workflow patterns deployed via API and database connectors in 90 days without touching core
  product code, managed through a holdco-level KPI dashboard. The beachhead is European and
  North American PE growth funds with 5-15 acquired vertical SaaS products and no central AI
  engineering team — approximately 90 qualifying holdcos in the SAM. First revenue from an annual
  SaaS license ($80K-$150K per product) plus a 5-10% success fee on documented AI-attributable
  ARR keeps incentives aligned with portfolio value creation. The research-estimated SAM is
  $86.4M; year-three SOM is $10.8M at 15 holdcos with 6 products each. A seed round of $2-4M
  buys 18 months of runway to deliver two design-partner deployments, validate the 90-day
  activation claim and finance-verifiable attribution, and close a first paying holdco customer.

problem:
  - >-
    PE and permanent-capital software holdcos cannot deploy AI features across acquired vertical
    SaaS products fast enough: hiring a central AI engineering team takes 6-12 months and
    requires $2M-$5M in annual payroll; consulting-led one-off builds are expensive and do not
    compound across the portfolio.
  - >-
    LP and board expectations now include measurable AI transformation proof within 12 months of
    each acquisition close, yet most holdcos still have scattered pilots rather than a
    portfolio-level deployment playbook — a gap made visible by Circeus's publicly reported
    metrics of 80% CX automation and double-digit net-new bookings across 18 acquisitions.
  - >-
    Legacy vertical SaaS products have heterogeneous schemas and undocumented APIs that make it
    impractical for each portfolio company to build AI independently within the operating timelines
    imposed by PE value-creation plans.

solution:
  - >-
    A modular AI agent platform connecting to acquired portfolio companies via standard database
    and API connectors, with a pre-built catalog of agents covering support ticket deflection,
    churn prediction, document summarization, auto-booking, and predictive upsell — the five
    highest-ROI workflow patterns across vertical SaaS.
  - >-
    Targeted 90-day deployment cycle per portfolio product with no changes to core product
    architecture; a holdco-level dashboard tracks AI-driven KPIs (automation rate, churn delta,
    incremental ARR) across the entire portfolio, giving operating partners LP-ready reporting.
  - >-
    A shared AI skill library that compounds across the portfolio: each deployment adds connector
    templates, workflow baselines, and attribution benchmarks that reduce deployment cost and
    time for the next product.

whyWeWin:
  - >-
    Purpose-built for the post-acquisition context: pre-built agents map to known vertical SaaS
    workflow patterns and connectors are designed for legacy SaaS database schemas, eliminating
    custom prompt engineering and bespoke integration work that horizontal platforms require.
  - >-
    Circeus and Beacon prove the value of a shared AI layer but serve only their own assets; no
    neutral vendor offering a portfolio-deployment product exists today, creating a clear
    white-space position.
  - >-
    Success-fee pricing aligned to AI-attributable ARR lift eliminates the renewal objection that
    kills consulting-led alternatives and positions the platform inside the holdco's value-creation
    P&L rather than an IT cost center.
  - >-
    Cross-portfolio deployment telemetry becomes a proprietary template library that generic
    tooling vendors cannot replicate — each successive deployment becomes faster and cheaper,
    compounding the moat over time.

strategicChoices:
  beachhead: >-
    European and North American PE growth funds with 5-15 acquired vertical SaaS products
    (each $500K-$5M ARR) in professional services, construction tech, or field services software
    that have committed to an AI transformation roadmap but have not yet hired a central AI
    engineering team — approximately 90 qualifying holdcos in the SAM.
  wedgeRationale: >-
    This narrow beachhead creates the fastest proof because every qualifying holdco shares the
    same structural problem: no central AI team, the same LP scrutiny timeline, and similar
    legacy SaaS schemas. The same agent catalog and connector templates can serve multiple
    customers without bespoke re-engineering. Landing one holdco and deploying across 3-5
    portfolio products produces referenceable proof faster than targeting individual portfolio
    companies, which would require separately navigating each product team's approval process.
  sequencingRationale: >-
    Product validation before paid sales: two design-partner deployments in months 0-6 validate
    the 90-day activation claim and produce the attribution data needed to close a paying holdco
    by month 12. Direct founder-led outreach precedes channel partnerships because the ICP is
    small, identifiable by name, and decisions sit with one or two people. Cloud co-sell and SI
    partnerships are deferred until a repeatable deployment playbook exists so partners can
    operationalize rather than customize every engagement.
  notYet:
    - Direct sales to individual portfolio companies rather than at the holdco level
    - Consumer or broad-enterprise SaaS outside the PE-portfolio context
    - AI diligence scoring for deal sourcing (compelling adjacent product but requires a separate proprietary dataset)
    - Building proprietary foundation models or fine-tuning infrastructure
    - Geographic expansion to APAC and LATAM before proving a repeatable European and North American deployment model

market:
  tam: "$288M — ~300 global software acquirers x 8 eligible portfolio products x $120K annual spend per product (research.yaml estimate)"
  sam: "$86.4M — ~90 qualifying Europe and North America holdcos x 8 products x $120K (research.yaml estimate)"
  som: "$10.8M — 15 holdcos x 6 products x $120K in year three (research.yaml estimate)"
  segments:
    - PE-backed software holding companies with 5-15 acquired vertical SaaS products in Europe and North America
    - Fundless sponsors and family offices running software roll-ups without in-house AI engineering capacity
  buyingProcess: >-
    The operating partner or holdco CEO owns the AI value-creation mandate and can approve
    central infrastructure spend; typical decision cycle is 3-6 months including security
    review, data-governance sign-off, and pilot structuring, with pilots often structured as
    line items in the 100-day post-acquisition integration plan.

product:
  mvp: >-
    Connector-plus-agent kit for support ticket deflection and churn prediction deployable against
    PostgreSQL and common SaaS API schemas, with a holdco-level KPI dashboard covering automation
    rate and AI-attributable churn delta — targeted 90-day deployment, no core code changes.
  sixMonth: >-
    Full five-agent catalog (support deflection, churn prediction, document summarization,
    auto-booking, predictive upsell) with connectors for the ten most common vertical SaaS
    database stacks, plus a validated attribution methodology accepted by at least two
    design-partner finance teams.
  twelveMonth: >-
    Multi-holdco portfolio dashboard with cross-customer benchmark reporting; self-serve connector
    configuration reducing per-product setup from weeks to days; first GA customer on production
    contract covering at least three portfolio products.
  twentyFourMonth: >-
    Portfolio intelligence layer with AI-readiness scoring for new acquisition targets; expanded
    agent catalog covering 20+ workflow patterns; cloud co-sell partnership with at least one
    hyperscaler; five or more paying holdco customers on multi-product contracts.
  keyBets:
    - The 90-day deployment claim is achievable for at least 80% of target vertical SaaS products without requiring core code changes
    - Finance-verifiable attribution of AI-driven ARR lift is achievable within 6 months of each deployment
    - Cross-portfolio telemetry compounds into a deployment template library that reduces marginal deployment cost materially by year two
    - A shared AI skill library creates sufficient lock-in to sustain 90%+ gross revenue retention at renewal

gtm:
  wedge: >-
    Direct founder-led outreach to PE operating partners and holdco CTOs at software-focused
    European and North American growth funds, starting with funds whose portfolio companies are
    actively losing deals to AI-native entrants — the highest-urgency buying trigger identified
    in research.
  channels:
    - Direct outreach to PE operating partners and portfolio CTOs via warm introductions from M&A advisors
    - PE operating partner forums and software M&A conferences in London and Amsterdam
    - M&A lenders and software investment banks who see fragmented software assets and modernization bottlenecks early in the deal cycle
    - Cloud and model ecosystem co-sell (deferred until a repeatable deployment playbook is proven)
  funnelTargets: >-
    Outreach to qualified holdco meeting 25-35%; pilot-to-production conversion 50%+;
    holdco expansion from first 3 products to full portfolio within 12 months of initial
    deployment.
  pricing: >-
    Annual SaaS license of $80K-$150K per portfolio product plus a 5-10% success fee on
    documented AI-attributable incremental ARR; holdco-level enterprise contract covering 3+
    portfolio companies with volume discount targeting $500K-$1.5M total ACV per holdco.
    Pricing rationale: success-fee structure aligns incentives and anchors ROI against the
    $2M-$5M cost of building a central AI engineering team internally.

businessModel:
  revenueStreams:
    - Annual SaaS license per portfolio product ($80K-$150K per product per year)
    - Success fee of 5-10% on documented AI-attributable incremental ARR per deployed product
    - Professional services for custom connector development covering niche vertical SaaS schemas not in standard library
  unitOfValue: AI-enabled ARR uplift delivered per deployed portfolio product
  targetGrossMarginPct: 72
  expansionLevers:
    - Land at 3 products per holdco and expand to full portfolio as deployment proof accumulates
    - Upsell portfolio intelligence module (AI-readiness scoring for acquisition targets) after production track record
    - Agent catalog expansion into 20+ workflow patterns creates new deployment opportunities within existing accounts
    - Cross-holdco benchmarking data as a market intelligence product sold to PE operating partners

strategyMap:
  northStarMetric: AI-attributable ARR uplift per deployed portfolio product (annualized, finance-verified)
  inputMetrics:
    - Number of portfolio products in production deployment
    - 90-day activation rate (percentage of started deployments live within 90 days)
    - AI-attributable ARR lift at 6 months post-deployment
    - Gross revenue retention at first annual renewal
    - Connector library coverage (percentage of target SaaS stacks with pre-built connectors)
  moatsToBuild:
    - Cross-portfolio deployment telemetry driving a proprietary template library that reduces marginal deployment cost
    - Connector library for legacy SaaS schemas not available in generic platforms
    - Attribution methodology accepted by PE finance teams and audit-ready for LP reporting
    - Multi-year holdco contracts with per-product expansion rights creating high switching costs
  killCriteria:
    - "Activation rate below 50% in first 3 design-partner deployments after 6 months of iteration: revisit 90-day deployment claim"
    - "Zero paying holdco customers by month 18: pivot to advisory-led deployment or shut down"
    - "Gross revenue retention below 70% at first renewal cycle: platform-market fit insufficient for venture scale"
    - "Two or more AI-native acquirers (Circeus or Beacon) launch a third-party vendor product within 12 months: reassess differentiation and accelerate connector depth"
  mermaid: |
    flowchart LR
      Wedge[Direct outreach to PE operating partners] --> DesignPartner[2 design-partner deployments]
      DesignPartner --> Proof[90-day activation plus AI ARR attribution]
      Proof --> FirstPaying[First paying holdco customer]
      FirstPaying --> Catalog[5-agent catalog plus 10-connector library]
      Catalog --> Expansion[Multi-product expansion per holdco]
      Expansion --> Intelligence[Portfolio intelligence layer]
      Intelligence --> ScaleGTM[Cloud co-sell plus SI channels]

investorMemo:
  verdict:
    call: "Meet / investigate further"
    conviction: >-
      Credible category thesis and strong wedge clarity, but the 90-day deployment promise and
      finance-verifiable attribution are unproven assumptions that must be validated before
      conviction rises to conviction-level.
    whyBelieve: >-
      Circeus's EBRD-backed launch and publicly reported outcomes (80% CX automation, double-digit
      new bookings across 18 acquisitions) prove the portfolio AI layer value; no neutral vendor
      sells this capability to third-party holdcos today, and the SAM is $86.4M with a
      concentrated, identifiable buyer universe of ~90 qualifying holdcos.
    whyDoubt: >-
      The startup must beat PE enterprise decision cycles of 3-6 months and the risk that
      Circeus, Beacon, or Accenture packages a competing portfolio-deployment product before
      this team accumulates enough deployment references to defend market position.
    nextDiligence: >-
      Conduct 10-15 operator interviews with PE software operating partners to confirm they
      would pay $80K-$150K per product annually for a vendor-neutral deployment platform rather
      than build internally or engage a system integrator.
  firstCustomer:
    title: PE software operating partner at a London- or Amsterdam-based growth fund
    profile: >-
      Growth fund with $200M-$1B AUM that has acquired 5-10 vertical SaaS companies in the
      last three years in professional services, construction tech, or field services software,
      now facing competitive pressure from AI-native entrants in at least two portfolio segments.
    trigger: >-
      A portfolio company loses a head-to-head deal to an AI-native competitor, or an LP asks
      the GP why two or more portfolio products have not shipped AI features 12 months after
      acquisition close.
    buyer: PE operating partner or holdco CEO
    initialContract: >-
      $80K-$150K pilot license for 1-2 portfolio products plus a 5-10% success fee on
      AI-attributable ARR lift; conversion path to 3-5 products ($400K-$750K ACV) within
      12 months of proven deployment.
  mustBeTrue:
    - >-
      At least 20 qualifying PE software holdcos in Europe and North America will pay $500K+
      annually for a vendor-neutral portfolio AI deployment platform rather than build internally
      or engage a system integrator.
    - >-
      The 90-day activation target is achievable for 80% of vertical SaaS products using API
      and database connectors without requiring core product code changes.
    - >-
      AI-attributable ARR lift of 10%+ is measurable and finance-verifiable within 6 months of
      deployment across at least two workflow patterns.
    - >-
      Gross revenue retention exceeds 85% at first annual renewal because holdco switching costs
      (re-integration, loss of attribution benchmarks) outweigh platform migration benefits.
    - >-
      Circeus, Beacon, and Bending Spoons do not commercialize their internal platforms for
      third-party holdcos within the first 24 months of the startup's operation.
  diligenceQuestions:
    - >-
      Of the ~90 qualifying holdcos in the SAM, how many have an active board-level AI mandate
      but no central AI engineering team today, and which specific funds sit in that cohort?
    - >-
      Which of the five workflow patterns produces measurable, finance-verifiable ROI fastest
      across heterogeneous vertical SaaS products, and what is the actual integration effort
      required per pattern?
    - >-
      Do PE operating partners prefer a vendor-neutral deployment layer or will most bundle
      this into a broader SI relationship to reduce vendor management overhead?
    - >-
      What is the realistic connector engineering effort for the ten most common vertical SaaS
      legacy schemas, and at what point does the no-core-code-changes promise break down?
    - >-
      What is the likely competitive response from Accenture AI Refinery and Palantir AIP if
      this startup wins 3-5 reference customers and generates published case studies?

operatingAssumptions:
  - assumption: >-
      90-day deployment is achievable for at least 80% of target vertical SaaS products using
      API and database connectors without changes to core product code.
    basis: idea.yaml
    validationTest: >-
      Complete two design-partner pilots in months 0-6 and measure actual days-to-production
      against 90-day target; document blockers and connector gaps per product.
    decisionImpact: >-
      If activation time exceeds 180 days for most products, the platform's core value
      proposition collapses; would need to narrow scope to fewer, simpler workflow patterns
      or add a managed-services component with higher pricing.
  - assumption: >-
      AI-attributable ARR lift of 10%+ is measurable and accepted by holdco finance teams
      within 6 months of deployment.
    basis: idea.yaml
    validationTest: >-
      Instrument before-and-after baselines in the first two design-partner deployments and
      submit attribution analysis to each holdco CFO or operating partner for sign-off.
    decisionImpact: >-
      Without finance-verified attribution, the success-fee revenue stream is unenforceable;
      pricing and ARR model would need revision to a pure SaaS license with a weaker ROI story.
  - assumption: >-
      The economic buyer (PE operating partner or holdco CEO) can approve a $500K-$1.5M central
      infrastructure contract without requiring portfolio-company-level buy-in or integration
      freeze overrides.
    basis: research.yaml
    validationTest: >-
      In initial sales conversations, map the approval chain for the first two prospective
      holdcos and record actual decision timeline from first meeting to signed contract.
    decisionImpact: >-
      If approval requires portfolio-company consent at each product, sales cycles extend to
      12-18+ months; would require a lower-entry per-product pilot to build bottom-up demand
      before holdco-level contracts are viable.
  - assumption: >-
      No AI-native acquirer (Circeus, Beacon) or major SI (Accenture) launches a competing
      vendor-neutral portfolio AI deployment product within the first 24 months.
    basis: research.yaml
    validationTest: >-
      Monitor Circeus, Beacon, and Accenture product pages and press releases quarterly;
      set a 6-month early-warning tripwire if any announces a third-party offering.
    decisionImpact: >-
      If a credentialed competitor launches within 18 months, accelerate differentiation
      through connector depth for long-tail legacy schemas and exclusivity on PE
      operating-partner relationships rather than competing on agent catalog breadth.
  - assumption: >-
      A seed round of $2-4M provides sufficient runway for 18 months to complete two
      design-partner deployments, validate attribution methodology, and close a first paying
      holdco customer at $400K+ ACV.
    basis: operator judgment
    validationTest: >-
      Build a 24-month headcount and burn model; test assumptions against actual hiring cost
      for 2-3 deployment engineers and one senior enterprise sales lead in London or Amsterdam.
    decisionImpact: >-
      If costs are materially higher than assumed, raise a larger seed ($4-6M), trim headcount
      to a leaner founding team, or convert early design partners to paid pilots sooner to
      reduce cash dependency.

experimentRoadmap:
  - horizon: 0-90 days
    experiment: Design-partner discovery sprint
    hypothesis: >-
      15 targeted outreach conversations with PE software operating partners will yield
      2-3 design partners willing to provide portfolio access and co-fund a 90-day pilot.
    successMetric: 2 signed design-partner agreements with clear data-access and attribution terms by day 90
    owner: Founding CEO
  - horizon: 0-90 days
    experiment: Connector feasibility audit
    hypothesis: >-
      5 of the 10 most common vertical SaaS database schemas (PostgreSQL, MySQL, common REST
      API patterns) can be connected with pre-built templates in under 2 weeks per product.
    successMetric: Functional connector prototype for 3 target schemas with documented integration effort log
    owner: Founding CTO
  - horizon: 90-180 days
    experiment: First design-partner deployment
    hypothesis: >-
      Support ticket deflection and churn prediction agents can be deployed into a live
      portfolio product in under 90 days with documented pre/post KPI baselines.
    successMetric: Production deployment live within 90 days; finance-verifiable churn delta or deflection rate by day 180
    owner: Founding CTO and deployment engineer
  - horizon: 90-180 days
    experiment: Attribution methodology validation
    hypothesis: >-
      A before/after instrumentation approach using holdco-approved KPI definitions will
      produce an attribution report accepted by the operating partner and CFO as LP-reportable.
    successMetric: Signed attribution methodology accepted by at least one holdco finance team
    owner: Founding CEO and operating partner contact
  - horizon: 180-270 days
    experiment: Second design-partner deployment and connector reuse validation
    hypothesis: >-
      Connectors and agents developed in the first deployment can be reused for a second
      holdco with 40%+ less engineering effort, validating the shared library compounding thesis.
    successMetric: Second product deployed in under 60 days versus 90-day baseline; connector reuse rate above 60%
    owner: Founding CTO
  - horizon: 270-365 days
    experiment: First commercial contract close
    hypothesis: >-
      Reference outcomes from two design-partner deployments are sufficient to close a first
      paying holdco customer at $400K-$750K ACV for a 3-product package.
    successMetric: Signed enterprise contract with minimum 3-product scope and annual license commitment
    owner: Founding CEO and VP Sales

operations:
  - "Core engineering: agent catalog development, connector library, and holdco KPI dashboard on cloud inference stack (Azure or AWS Bedrock with enterprise data governance controls)"
  - "Deployment engineering: dedicated deployment success team embedded with each holdco during 90-day activation periods"
  - "Attribution tooling: before/after instrumentation framework with finance-approved KPI definitions and audit log export"
  - "Compliance baseline: private-deployment options, audit logs, and workflow-specific privacy controls mapped to EU AI Act, UK ICO guidance, and NIST AI RMF obligations"
  - "CRM and pipeline tracking: founder-operated outreach to named PE operating partners at 30-50 priority funds in London, Amsterdam, and New York"

team:
  - role: Founding CEO (enterprise GTM)
    startTiming: Month 0
    rationale: >-
      Must have direct PE or software M&A operating-partner relationships to access the first
      design partners without a sales team; prior experience closing enterprise contracts in
      the $200K-$1M ACV range essential for the first two holdco closes.
  - role: Founding CTO (AI platform and connector engineering)
    startTiming: Month 0
    rationale: >-
      Must be capable of building the MVP connector library and agent catalog without a broader
      engineering team for the first 6 months; experience with legacy SaaS integration
      (PostgreSQL, REST API connectors) and AI orchestration frameworks is essential to
      validate the 90-day deployment claim.
  - role: Deployment engineer (integration and customer success)
    startTiming: Month 3
    rationale: >-
      Required for the first design-partner deployment to handle connector customization and
      on-site integration work alongside the CTO; SaaS integration engineering background
      preferred over AI research background.
  - role: VP Sales (enterprise PE accounts)
    startTiming: Month 9
    rationale: >-
      Hired after first design-partner deployments produce reference outcomes; must carry a
      quota for the first paying holdco close and navigate PE operating-partner relationships
      independently of the founder.

milestones:
  - horizon: 0-12 months
    items:
      - "Signed 2 design-partner agreements with PE software holdcos (month 3)"
      - "MVP connector kit and first two agents in production at one design-partner portfolio product (month 6)"
      - "Finance-verified attribution report accepted by one holdco operating partner (month 8)"
      - "Second design-partner deployment live with 40%+ connector reuse rate validated (month 10)"
      - "First paying holdco enterprise contract signed at $400K+ ACV covering 3 products (month 12)"
  - horizon: 12-24 months
    items:
      - "Full 5-agent catalog deployed across 3+ paying holdco customers"
      - "Connector library covering 10 most common vertical SaaS stacks with average setup time below 2 weeks"
      - "Cross-holdco benchmark dataset with at least 10 deployed products providing attribution comparisons"
      - "Cloud co-sell agreement with one hyperscaler (Azure or AWS)"
      - "$1.5M+ ARR with 85%+ gross revenue retention at first renewal cycle"
  - horizon: 24-36 months
    items:
      - "Portfolio intelligence module (AI-readiness scoring for acquisition targets) in early access with 2+ holdcos"
      - "Agent catalog expanded to 20+ workflow patterns beyond the initial five"
      - "5+ paying holdco customers on multi-product contracts representing 15+ deployed portfolio products"
      - "$3M+ ARR tracking toward the $10.8M year-three SOM"
      - "Defensible cross-portfolio telemetry data moat supporting a Series A raise"

risks:
  - risk: PE decision cycle lag (3-18 months post-acquisition integration freeze delays purchasing)
    likelihood: High
    impact: High
    mitigation: >-
      Sell to the operating partner who can approve central infrastructure spend without
      portfolio-company consent; structure pilots as line items in standard 100-day
      post-acquisition integration plans; target funds with existing AI mandates to
      accelerate the first signed contract.
  - risk: Integration complexity underestimation (legacy schemas exceed pre-built connector coverage)
    likelihood: High
    impact: Medium
    mitigation: >-
      Limit initial catalog to five workflow patterns with connectors for the ten most common
      database stacks; charge professional services fees for niche connectors and reinvest
      that revenue into expanding the library; set transparent SoW boundaries upfront.
  - risk: AI-native acquirer (Circeus or Beacon) or Accenture launches a competing neutral-vendor product
    likelihood: Medium
    impact: High
    mitigation: >-
      Target fundless sponsors and family offices permanently outside the acquirer addressable
      market; build deep PE-workflow integrations (Allvue, DealCloud) and connector depth for
      long-tail legacy schemas that large competitors will not prioritize initially.
  - risk: Attribution methodology rejected by holdco finance teams (success fee unenforceable)
    likelihood: Medium
    impact: High
    mitigation: >-
      Co-develop attribution methodology with the first design partner's finance team from day
      one; start with efficiency metrics (ticket deflection rate, churn delta) that finance teams
      already trust before attempting incremental ARR attribution.
  - risk: EU AI Act or GDPR compliance requirements extend deployment timelines significantly
    likelihood: Medium
    impact: Medium
    mitigation: >-
      Offer private-deployment options with audit logs and workflow-specific privacy controls
      from the MVP; build compliance packaging into the standard deployment template rather
      than as a custom add-on.
  - risk: Buyer concentration risk if qualifying holdco universe is smaller than the estimated 90
    likelihood: Low
    impact: High
    mitigation: >-
      Validate count of qualifying SAM holdcos through operator interviews in months 0-3; if
      the universe is smaller than expected, expand eligibility to smaller holdcos with 3-5
      products or accelerate North American channel to increase the reachable universe.

fundingAsk:
  round: seed
  targetFundingRangeUsd: "$2-4M"
  runwayMonths: 18
  useOfFundsSummary: >-
    18 months of runway to: deliver two design-partner deployments validating the 90-day
    activation claim and finance-verifiable attribution methodology; hire a deployment engineer
    (month 3) and VP Sales (month 9); build the initial 5-agent catalog and connector library
    for the 10 most common vertical SaaS stacks; close the first paying holdco customer at
    $400K+ ACV; and produce the cross-portfolio telemetry dataset needed to defend
    differentiation before a Series A.
