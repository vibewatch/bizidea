  round: pre-seed
  amountM: 2.0
  runwayMonths: 30
  milestone: "在第 2 年第 4 季度达到 5 个实时付费批次，证明运营者准备时间节省 30% 以上，首套模板在第二细分中至少复用 60%，并在进入第 3 年时仍保留约六个月的采购缓冲。"
  useOfFunds:
    - bucket: Engineering
      amountUsd: 900000
      percentage: 45
    - bucket: GTM
      amountUsd: 300000
