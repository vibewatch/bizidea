      percentage: 32
scenarios:
  downside:
    description: "公共采购延迟，一个试点未能转化，公司以 6 个付费批次、较低 ACV 和较低毛利率结束第 3 年。"
    y3RevenueK: 315.0
    y3EbitdaK: -507.95
    cashLowPointK: 318.0
    keyAssumptionChanges:
      - "第 3 年第 4 季度末为 6 个付费批次，而非 8 个。"
      - "混合年化批次收入降至约 $60K。"
      - "毛利率停滞在约 67%，因为权限管理、导出和配置持续依赖人工。"
  base:
    description: "公司在第 1 年签约 2 个付费批次，在第 2 年第 4 季度达到 5 个实时批次，第 3 年末以 8 个付费批次跨少量灯塔项目退出。"
    y3RevenueK: 430.63
    y3EbitdaK: -419.51
    cashLowPointK: 551.74
    keyAssumptionChanges:
      - "与 A1–A23 匹配：M12 有 2 个付费批次，第 2 年第 4 季度达到 5 个，第 3 年第 4 季度达到 8 个。"
      - "使用 $65K 混合年化批次收入和 A5、A6 下的中点上线时间。"
      - "毛利率从第 1 年中 50% 区间提升至第 3 年约 70%，团队在建模期间保持 5 人。"
  upside:
    description: "首个灯塔账户引荐邻近项目，一个买方内启动第二个批次，基准报告在第 3 年支撑略高的 ACV。"
    y3RevenueK: 476.0
    y3EbitdaK: -377.22
    cashLowPointK: 642.0
    keyAssumptionChanges:
      - "第 3 年第 4 季度末为 9 个付费批次，而非 8 个。"
      - "混合年化批次收入升至约 $68K。"
      - "毛利率达到 71–72%，因为模板复用和可控导出减少了人工支持。"
