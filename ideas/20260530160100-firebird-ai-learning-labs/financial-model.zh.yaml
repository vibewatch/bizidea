  - variable: ARPU
    downsideCase: "每活跃批次年化收入 $60K"
    baseCase: "每活跃批次年化收入 $65K"
    upsideCase: "每活跃批次年化收入 $70K"
    y3RevenueImpactK: -33.13
    cashImpactK: -23.2
  - variable: CAC
    downsideCase: "创始人时间和采购投入持续高企导致 CAC $50K"
    baseCase: "CAC $38K"
    upsideCase: "合伙人引荐更热情，CAC $30K"
    y3RevenueImpactK: 0.0
    cashImpactK: -48.0
  - variable: churn
    downsideCase: "首次年度续约后月度流失率 2.5%"
    baseCase: "月度流失率 1.5%"
    upsideCase: "月度流失率 1.0%"
    y3RevenueImpactK: -48.0
    cashImpactK: -34.0
  - variable: sales cycle
    downsideCase: "从试点启动到年度生产续约需 9 个月"
    baseCase: "约 6 个月"
    upsideCase: "约 4–5 个月"
    y3RevenueImpactK: -105.0
    cashImpactK: -78.0
  - variable: gross margin
    downsideCase: "稳态毛利率 67%"
    baseCase: "稳态毛利率约 70%"
    upsideCase: "稳态毛利率 72%"
    y3RevenueImpactK: 0.0
    cashImpactK: -39.0
  - variable: hiring pace
    downsideCase: "在可复用性证明之前提前招聘专职销售和支持承包商"
    baseCase: "第 3 年全程保持 5 名 FTE"
    upsideCase: "保持创始人主导 GTM，用合伙人承担配置工作"
    y3RevenueImpactK: -20.0
    cashImpactK: -85.0
modelDiagram:
  title: 单位经济模型流程
  mermaid: |
    flowchart LR
      TargetLabs --> PaidCohorts
      PaidCohorts --> SubscriptionRevenue
      SubscriptionRevenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: 收入引擎
