jobsToBeDone:
  - job: When a venture lab launches a new AI-native deep-tech cohort, help program operators decide which teams deserve more capital and support, so they can fund the best startups with less manual review.
    currentAlternative: Spreadsheets, mentor notes, and manually assembled investment memos
    successMetric: Time to investment decision and percentage of ventures with complete milestone evidence
  - job: When researcher-founders need to prove traction to mentors and funders, help them turn their technical work into diligence-ready artifacts, so they can secure continued support without administrative drag.
    currentAlternative: Reformatting project updates in slides, docs, and ad hoc data rooms
    successMetric: Hours saved per team per month and conversion rate from incubated team to funded startup
