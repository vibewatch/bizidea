topRisks:
  - name: Budget concentration
    description: Early customers may be a small number of government-backed or philanthropic programs with long sales cycles.
    mitigation: Start with venture labs and university incubators already launching cohorts, then use proven ROI to enter slower sovereign programs.
  - name: Weak predictive power
    description: Capturing founder artifacts may not initially predict which teams become fundable companies well enough to justify a premium platform.
    mitigation: Sell first on workflow consolidation and diligence-speed ROI, then layer predictive benchmarking only after several cohorts of outcome data.
  - name: IP and privacy sensitivity
    description: Research teams may resist logging AI-assisted work if they fear ownership leakage or exposure of pre-patent technical details.
    mitigation: Offer role-based access, exportable audit trails, and deployment options aligned with enterprise controls and local IP-governance policies.
