  sensitivityCases:
  - case: Firebird 及类似实验室将批次规模保持极小，对手工工作流感到满意
    impact: 若运营者只管几个创业项目且感受不到行政负担，紧迫性下降，创业公司须转为以尽调速度而非规模价值来证明产品价值。
    sourceRefs:
    - 1
    - 2
  - case: 买方倾向于拼合现有加速器、CRM 和工作区工具
    impact: 创业公司必须凭借有见地的模板、更少的重复打包工作和更高的决策质量取胜，而非靠另一个仪表盘。
