competitors:
- name: Dealum
  stage: scale-up
  wedge: 覆盖申请入驻、投票、组合追踪和交易共享的加速器与投资网络运营平台。
  pricing: $479/month scale tier listed publicly; lower accelerator tiers also available
  strength: 申请入驻、评估工作流、联合投资和项目管理方面很强。
  weaknessVsUs: 公开定位止步于加速器运营，未涵盖 AI 工作溯源、硬科技里程碑或知识产权移交。
  sourceRefs:
  - 22
  - 23
- name: AcceleratorApp
  stage: scale-up
  wedge: 面向加速器和孵化器的申请处理与批次管理软件。
  pricing: Custom quote / demo-led
  strength: 表单、评委、会议和评估漏斗的运营自动化很强。
  weaknessVsUs: 似乎针对高量申请评审优化，而非将持续研究活动转化为融资级证据。
  sourceRefs:
  - 24
  - 25
- name: Affinity
  stage: incumbent
  wedge: 面向创始人、导师、投资人和私募资本工作流的关系智能 CRM。
  pricing: $2,000-$2,700 per user per year plus enterprise tier
  strength: 同类最佳的网络图谱和跨邮件与会议的活动捕捉。
  weaknessVsUs: 每席位贵，且未明确为成果转化里程碑、构件溯源或结构化尽调包构建。
  sourceRefs:
  - 26
  - 27
- name: Wellspring
  stage: incumbent
  wedge: 覆盖披露、文件归档、合同、财务和报告的 TTO 后台平台。
  pricing: Enterprise / custom
  strength: 在技术转让办公室运营和合规密集型工作流上深度契合机构需求。
  weaknessVsUs: 更接近发明管理，而非实时创业实验室执行、创始人辅导和投资决策支持。
  sourceRefs:
  - 28
- name: Inteum
  stage: incumbent
  wedge: 企业级知识产权管理，具备日益增强的 AI 赋能成果转化和合作伙伴发现能力。
  pricing: Enterprise / custom
  strength: 在 TTO 领域有认可度，并可信地向 AI 辅助研究成果转化工作流延伸。
  weaknessVsUs: 仍以办公室系统和大学-产业合作为主，而非批次级创业运营节奏。
  sourceRefs:
  - 29
regulatoryTechnicalConstraints:
- point: AI 辅助专利或商标申请仍要求负责任且真实的提交，不能视为完全自主流程。
  sourceRefs:
  - 33
- point: 纯 AI 生成的产出不自动获得版权保护，系统应区分人类贡献与模型输出。
  sourceRefs:
  - 35
- point: 为欧洲客户集中化处理创始人、导师和评审人数据，将触发 GDPR 关于处理和访问控制的义务。
  sourceRefs:
  - 36
- point: 围绕 AI 训练和输出的权利管理与归属问题，使溯源和审计轨迹在战略上举足轻重。
  sourceRefs:
  - 34
validationSignals:
- point: Firebird 明确每年目标支持五个技术创业项目，同时将 AI 访问扩展至 50,000 名用户。
  sourceRefs:
  - 1
- point: 亚美尼亚政府已承诺五年内为 AI 算力分配投入资金，展示真实的公共基础设施预算。
  sourceRefs:
  - 2
- point: Hub71 表明主权支持的生态系统会将创业激励、创业孵化支持和股权换现金项目标准化。
  sourceRefs:
  - 13
  - 14
  - 15
- point: Cambridge、Oxford 和 AUTM 数据证实，衍生公司创建和成果转化运营是周期性机构工作流，而非一次性项目。
  sourceRefs:
  - 5
