openQuestions:
- 主权支持的创业实验室会购买独立工作流软件，还是期望将高触达创业建设服务捆绑进工具？
- 哪些构件类型最能预测一个团队获得更多资金或毕业成为已融资创业公司？
- 机器人、航空航天和生命科学批次需要多大程度的受限访问或本地部署？
- 早期客户能否在不触发知识产权反弹的前提下共享足够多的匿名结果数据，以建立真实的基准护城河？
