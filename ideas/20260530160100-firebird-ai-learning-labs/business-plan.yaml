slug: researcher-spinout-os
date: '2026-05-30'
executiveSummary: >-
  Researcher Spinout OS should start as workflow software for sovereign-backed venture labs and technical university incubators launching AI-native deep-tech cohorts, not as a general accelerator stack or TTO back office.
  The first customer is a managing director, COO, or head of venture creation running a 5-10 company researcher-spinout cohort in Armenia or a similar public programme where secure AI access, mentor capacity, and seed support already exist.
  The urgent pain is not teaching teams how to use AI; it is deciding which teams deserve more credits, mentors, and seed checks without rebuilding the evidence packet every week.
  The MVP should capture AI-assisted build artifacts, milestone evidence, reviewer decisions, and IP handoffs in one audit trail, then output investment-ready scorecards and diligence rooms.
  Go-to-market should begin with one paid cohort deployment tied to a new lab launch or first funding committee, because that trigger concentrates budget, urgency, and measurable ROI in reduced memo-prep time and faster support allocation.
  Pricing should start as a cohort-based annual subscription with a paid pilot or setup package, since buyers already spend on generic collaboration tools and can justify premium software only if it replaces manual coordination.
  If the company wins, it can build a defensible dataset linking venture artifacts, milestone progress, and funding outcomes across deep-tech cohorts, but that moat matters only after proving workflow ROI first.
  The largest disconfirming risks are that early cohorts remain too small for software budgets, buyers want bundled services instead of SaaS, and IP sensitivity limits artifact capture; budget ownership and deployment requirements are still open diligence items rather than proven facts.
problem:
  - "Sovereign-backed venture labs and technical university incubators still run researcher-spinout cohorts through spreadsheets, docs, mentor notes, and ad hoc memos, so funding and support decisions depend on fragmented evidence."
  - "That fragmentation forces founders to repackage the same technical work for operators, mentors, investors, and grant committees while leaving IP handoffs and milestone progress hard to audit."
solution:
  - "Provide a cohort operating system that captures AI-assisted build artifacts, experiment notes, customer discovery, reviewer decisions, and IP transitions in one permissioned timeline."
  - "Turn that timeline into milestone scorecards, investment memos, and exportable diligence rooms so operators can allocate credits, mentors, and capital from a shared evidence model."
whyWeWin:
  - "The wedge sits between accelerator operations suites and TTO back-office systems, targeting the exact workflow where deep-tech milestone tracking, investment decisions, and IP provenance intersect."
  - "National AI access programmes such as Firebird create a new operator pain point now: model access is abundant, but venture-formation discipline is not."
  - "If the product becomes the system of record for milestone completion, reviewer decisions, and funding outcomes across multiple cohorts, its templates and benchmark data compound faster than a generic collaboration stack can match."
strategicChoices:
  beachhead: "Sovereign-backed deep-tech venture labs launching their first 5-10 AI-native spinouts from researchers in Armenia and similar public ecosystems before expanding into broader university commercialization teams."
  wedgeRationale: >-
    This beachhead creates faster proof than selling a broad commercialization suite because one buyer controls the cohort, the review workflow repeats every week, and ROI can be measured in decision speed and evidence completeness.
    It avoids the slower path of replacing a full TTO system or winning thousands of founders directly before the company has proof that its workflow improves funding decisions.
  sequencingRationale: >-
    Product should start with evidence capture, milestone templates, permissions, and exportable investment packets because those solve the immediate operator bottleneck exposed by new cohort launches.
    GTM should stay founder-led through the first two production deployments, with workflow implementation talent hired before sales scale, because the core question is whether the product behaves like repeatable software rather than disguised services.
    University TTO and public-program expansion should wait until a sovereign-backed lab proves that one deployment can convert into recurring software spend and reusable templates.
  notYet:
    - "Generic accelerator application management"
    - "Full TTO docketing or patent administration"
    - "Founder education content marketplace"
    - "Expansion beyond lighthouse public programmes before two repeatable production accounts"
market:
  tam: "$24.0M estimated TAM based on about 400 global commercialization and venture-formation offices at roughly $60k ACV."
  sam: "$6.0M estimated SAM based on about 100 sovereign-backed or research-intensive deep-tech programmes across Armenia, the GCC, the UK, and adjacent public commercialization ecosystems at roughly $60k ACV."
  som: "$0.5M estimated year-3 SOM based on about 8 lighthouse accounts at roughly $60k-$70k ACV under a relationship-led sales motion."
  segments:
    - "Sovereign-backed deep-tech venture labs and public venture builders"
    - "Technical university incubators and commercialization offices running researcher-spinout cohorts"
  buyingProcess: >-
    The process starts when a new venture lab, AI cohort, or funding committee forces operators to formalize intake, milestone review, and support allocation beyond spreadsheets and shared drives.
    The day-to-day champion is usually a program operator or venture principal, while the economic buyer is the managing director, COO, or head of venture creation after operations, IT, and IP stakeholders review data handling and workflow fit.
product:
  mvp: >-
    MVP is a cohort workflow system that ingests founder updates, artifacts, experiment logs, and reviewer decisions into a permissioned timeline mapped to deep-tech milestone templates.
    It should output live scorecards, weekly review packets, and exportable diligence rooms while relying on integrations and controlled exports instead of trying to replace CRM, storage, or patent systems in v1.
  sixMonth: "Launch one paid design-partner cohort with milestone templates for robotics, aerospace, and life-science spinouts, plus permissions, audit trails, and memo-generation workflows."
  twelveMonth: "Convert the first deployment to production, prove at least one 30%+ reduction in operator prep time for reviews or diligence, and reuse the template set in a second lighthouse account."
  twentyFourMonth: "Support 5-8 live accounts across sovereign-backed labs and university commercialization teams, add benchmark reporting on milestone progression and funding conversion, and selectively expand into adjacent commercialization workflows."
  keyBets:
    - "Operators will pay for software before predictive benchmarking exists if workflow consolidation cuts review and memo-prep time materially."
    - "Researcher-founders will accept selective artifact capture if permissions, export controls, and IP handoff records are explicit."
    - "Deep-tech milestone templates can be standardized enough across labs to avoid bespoke rebuilds for every customer."
    - "A cohort-based system can land in a narrow beachhead first and still expand into adjacent commercialization accounts later."
gtm:
  wedge: "Sell the product as the default operating rail for one new researcher-spinout cohort, starting before the first investment committee so the buyer can allocate mentors, credits, and seed capital from one shared evidence base."
  channels:
    - "Founder-led direct sales to managing directors, COOs, and heads of venture creation at sovereign-backed labs and technical incubators"
    - "Partnerships with national AI programmes, university innovation offices, and public commercialization initiatives that already convene target cohorts"
    - "Warm referrals from mentors, seed funds, and commercialization advisors already involved in cohort reviews"
  funnelTargets: "Lead→qualified pilot 20-30%, qualified pilot→paid pilot 30-40%, pilot→production 50%+, and production→referral or second-account expansion 25%+ within 12 months."
  pricing: "$15k-25k paid pilot or cohort-setup package converting to $40k-75k annual subscription per active cohort, with add-on fees for external diligence rooms or benchmark analytics only after production; this matches the researched willingness-to-pay range and keeps the first contract tied to a clear launch event."
businessModel:
  revenueStreams:
    - "Annual platform subscription per active cohort"
    - "Paid onboarding and workflow-template implementation"
    - "Premium modules for external diligence rooms, cross-cohort analytics, and benchmark reporting"
  unitOfValue: "Active venture cohort under management"
  targetGrossMarginPct: 70
  expansionLevers:
    - "Expand from one cohort to multiple programmes inside the same sovereign lab or university account"
    - "Add university commercialization and public-funding workflows once core cohort reviews are live"
    - "Monetize benchmark reporting on milestone conversion, evidence completeness, and funding outcomes"
    - "Sell additional external reviewer and diligence-room capacity to mentors, funds, and partner programmes"
strategyMap:
  northStarMetric: "Spinout teams advanced from intake to investment-ready decision with complete milestone evidence"
  inputMetrics:
    - "Paid design partners signed"
    - "Median days from weekly update to committee-ready decision packet"
    - "Percentage of teams with complete milestone evidence by review date"
    - "Pilot-to-production conversion rate"
    - "Annual contract value per live account"
    - "Number of benchmarkable cohort records captured"
  moatsToBuild:
    - "Deep-tech milestone-template library spanning prototype readiness, validation, IP handoff, and funding-readiness gates"
    - "Artifact graph linking prompts, code, experiments, reviewer comments, and investment decisions across cohorts"
    - "Benchmark dataset on which evidence patterns correlate with progression, funding, and operator time savings"
  killCriteria:
    - "Fewer than 2 paid lighthouse deployments signed within 9 months of focused founder-led selling"
    - "First production account fails to reduce operator review or memo-prep time by at least 30%"
    - "Customers refuse to convert above $40k annual ACV after pilot even when usage is embedded in a live cohort"
  mermaid: |
    flowchart LR
      Wedge[Researcher-spinout cohort wedge] --> MVP[Evidence and milestone OS]
      MVP --> Proof[Faster reviews and cleaner diligence]
      Proof --> Expansion[University and public-program expansion]
investorMemo:
  verdict:
    call: "Watch"
    conviction: "Credible buyer pain and timing, but conviction stays limited until two paid deployments prove standalone budget, repeatable ACV, and expansion beyond a tiny first market."
    whyBelieve: "Research shows real venture-lab buyers, a concrete launch trigger, and a product gap between accelerator ops tools, relationship CRM, and TTO systems."
    whyDoubt: "The reachable market is small and buyer power is high, so the company can fail even with a good product if cohorts stay small or procurement turns the motion into services."
    nextDiligence: "The next proof point is two paid cohort deployments with measured cycle-time savings, named budget owners, and at least one conversion path to a $40k+ annual software contract."
  firstCustomer:
    title: "Head of venture creation at a sovereign-backed deep-tech lab"
    profile: "A lean programme team running its first 5-10 researcher-founded spinouts in robotics, aerospace, or life sciences while coordinating mentors, AI credits, and seed support across multiple reviewers."
    trigger: "A new venture lab or national AI cohort launches and the first funding committee needs comparable evidence across teams without hiring more operations staff."
    buyer: "Managing director, COO, or head of venture creation"
    initialContract: "$15k-25k paid pilot covering one cohort launch, converting to $40k-75k annual subscription if the product becomes the default workflow for reviews, support allocation, and diligence exports."
  mustBeTrue:
    - "At least 2 target accounts run enough cohort reviews each year that manual memo prep and support allocation are painful budget line items."
    - "The economic buyer can approve standalone software spend instead of requiring a bundled venture-building services contract."
    - "Founders and operators will log enough artifacts to make scorecards useful without blocking adoption on IP sensitivity."
    - "One deployment can cut review-prep or diligence-packaging time by 30%+ within a single cohort cycle."
    - "A first Armenia-style lighthouse account can open at least one adjacent sovereign or university programme within 12 months."
  diligenceQuestions:
    - "How many ventures, reviewers, and formal funding decisions does the first target account handle each year?"
    - "Who actually owns budget and procurement for cohort operations software inside a sovereign-backed lab?"
    - "Which artifact classes materially change funding decisions, and which are too sensitive to require in-product capture?"
    - "What deployment, residency, and permissions requirements are mandatory for robotics, aerospace, and life-science cohorts?"
    - "Why would the buyer choose this system over Dealum, Affinity, Notion, or a stitched internal workflow?"
operatingAssumptions:
  - assumption: "Early buyers will purchase standalone workflow software rather than insisting that venture-building services be bundled into the contract."
    basis: research.yaml
    validationTest: "Run pricing and packaging interviews with at least 5 programme leaders and procurement owners, then secure 2 paid pilots sold primarily as software."
    decisionImpact: "If false, the company must either price for a services-heavy model or narrow to buyers with cleaner software budgets."
  - assumption: "A $40k-75k annual cohort subscription is acceptable once the workflow is embedded in a live programme."
    basis: research.yaml
    validationTest: "Measure time saved and conversion impact in the first pilot, then win at least 1 annual contract above $40k within 60 days of pilot review."
    decisionImpact: "If false, ACV drops below plan and the company needs a larger market or lower-cost operating model."
  - assumption: "Selective capture, granular permissions, and exportable audit trails are enough to overcome IP and pre-patent sensitivity."
    basis: research.yaml
    validationTest: "Test permission and redaction workflows with 2 prospective customers and confirm that at least 80% of required review artifacts can be captured or referenced in product."
    decisionImpact: "If false, the product should narrow to operator-side memo assembly rather than full evidence capture."
  - assumption: "Deep-tech milestone templates built for Firebird-style labs will transfer to adjacent university commercialization teams with limited customization."
    basis: idea.yaml
    validationTest: "Map one sovereign lab workflow and one university commercialization workflow and confirm that at least 60% of milestone objects and review states can be reused."
    decisionImpact: "If false, the roadmap should stay in one narrow buyer segment and delay multi-segment expansion."
  - assumption: "Public or university procurement and security review can be completed fast enough to launch a pilot inside one cohort cycle."
    basis: operator judgment
    validationTest: "Track one live deal from security review to pilot go-live and keep elapsed time under 120 days."
    decisionImpact: "If false, the company must raise more capital, narrow to faster buyers, or build a partner-led implementation motion."
experimentRoadmap:
  - horizon: "0-90 days"
    experiment: "Buyer and budget-owner discovery"
    hypothesis: "The same operator feeling the pain can also identify a software budget owner and buying path before a cohort starts."
    successMetric: "10 target-account interviews completed, with at least 3 buyers naming a budget source and launch trigger for a paid pilot."
    owner: "Founder/CEO"
  - horizon: "0-90 days"
    experiment: "Artifact-sensitivity workflow test"
    hypothesis: "Selective capture and permission controls are sufficient for teams to log the evidence needed for review decisions."
    successMetric: "2 design partners approve a draft permissions model and required-artifact matrix without removing more than 20% of review-critical evidence."
    owner: "Founding eng"
  - horizon: "90-180 days"
    experiment: "First paid design-partner cohort"
    hypothesis: "A new lab launch or first funding committee creates enough urgency to buy a paid pilot before custom development requests sprawl."
    successMetric: "1 paid pilot signed at $15k+ with a named economic buyer, live cohort timeline, and scoped v1 workflow."
    owner: "Founder/CEO"
  - horizon: "90-180 days"
    experiment: "Review-packet automation deployment"
    hypothesis: "Automated scorecards and memo generation cut operator prep time versus spreadsheets and docs."
    successMetric: "First pilot reduces weekly review or diligence-packaging time by at least 30% across 5 or more ventures."
    owner: "Workflow lead"
  - horizon: "6-12 months"
    experiment: "Pilot-to-production conversion"
    hypothesis: "If the workflow becomes the default operating rail for one cohort, the buyer will convert to annual software spend."
    successMetric: "At least 1 pilot converts to a 12-month contract above $40k ACV within 60 days of the cohort retrospective."
    owner: "Founder/CEO"
  - horizon: "12-18 months"
    experiment: "Second-segment transfer test"
    hypothesis: "The first lighthouse implementation can be reused in an adjacent sovereign or university account without bespoke rebuild."
    successMetric: "1 second account signs using a template set that reuses at least 60% of the first deployment's workflow objects."
    owner: "Solutions engineer"
operations:
  - "Maintain milestone-template libraries for robotics, aerospace, and life-science venture formation, with explicit review states, evidence requirements, and IP handoff checkpoints."
  - "Run a permissions and export-control model that lets founders, operators, mentors, and external investors see different slices of the same cohort record."
  - "Track operator time saved, evidence completeness, and funding-decision cycle time on every live cohort so ROI is measurable from the first deployment."
  - "Use integrations and controlled exports for storage, collaboration, and IP systems instead of absorbing full-system replacement scope into early deals."
team:
  - role: "Founder/CEO"
    startTiming: "Month 0"
    rationale: "Own founder-led sales, customer discovery, and the first two procurement processes because budget authority and packaging are still uncertain."
  - role: "Founding eng"
    startTiming: "Month 0"
    rationale: "Build the workflow engine, permission model, integrations, and audit trail needed for the first production cohort."
  - role: "Workflow lead"
    startTiming: "Month 2"
    rationale: "Translate venture-lab reviews, milestone templates, and IP handoff requirements into repeatable product configuration instead of bespoke services."
  - role: "Solutions engineer"
    startTiming: "Month 6"
    rationale: "Shorten implementation cycles and own data migration, customer setup, and analytics instrumentation after the first lighthouse account."
  - role: "Full-stack/security engineer"
    startTiming: "Month 8"
    rationale: "Harden permissions, logging, and deployment options once customer security review becomes a gating factor for expansion."
milestones:
  - horizon: "0-12 months"
    items:
      - "Complete 10+ buyer interviews and sign 2 paid lighthouse pilots."
      - "Deploy one production cohort workflow covering evidence capture, milestone reviews, memo generation, and diligence export."
      - "Demonstrate at least 30% improvement in operator review-prep or diligence-packaging time on the first production account."
      - "Convert at least 1 pilot into a 12-month contract above $40k ACV."
  - horizon: "12-24 months"
    items:
      - "Reach 3-5 production accounts across sovereign-backed labs and university commercialization teams."
      - "Reuse the core milestone-template system in a second segment with at least 60% configuration reuse."
      - "Launch benchmark reporting on evidence completeness, progression rates, and review-cycle timing."
      - "Prove that onboarding effort per new account is falling rather than growing with each deployment."
  - horizon: "24-36 months"
    items:
      - "Reach 8 lighthouse accounts and roughly $0.5M annual recurring revenue if ACV and expansion assumptions hold."
      - "Become the default system of record for funding-readiness reviews in at least one sovereign-backed network and one university commercialization cluster."
      - "Use accumulated cohort data to release evidence-based scoring and benchmarking products without replacing customer ownership of sensitive IP."
risks:
  - risk: "The first market is too small and relationship-driven to support venture-scale outcomes before expansion."
    likelihood: "High"
    impact: "High"
    mitigation: "Treat the first segment as a proof wedge, require a second-segment transfer test by month 18, and avoid building segment-specific features that do not generalize."
  - risk: "Buyers choose bundled services or existing tool stacks over a standalone system of record."
    likelihood: "High"
    impact: "High"
    mitigation: "Price pilots around a concrete cohort trigger, prove operator time savings early, and integrate with incumbent tools instead of forcing rip-and-replace."
  - risk: "IP and privacy concerns block enough artifact capture to make scorecards incomplete."
    likelihood: "Medium"
    impact: "High"
    mitigation: "Support selective capture, redaction, role-based access, and exportable audit trails so sensitive work can be referenced without universal visibility."
  - risk: "Public-sector procurement and security review stretch longer than one cohort cycle."
    likelihood: "Medium"
    impact: "High"
    mitigation: "Sell before cohort launch, keep v1 architecture lightweight, and use paid pilots or design-partner scopes that can start before full enterprise rollout."
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2-3M"
  runwayMonths: 18
  useOfFundsSummary: "Fund 18 months to land 2 paid lighthouse pilots, convert at least 2 production accounts, build the core workflow, permissions, and benchmark-data foundation, and prove whether the beachhead can support repeatable $40k-$75k ACV software rather than services."
