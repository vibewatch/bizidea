slug: researcher-spinout-os
date: '2026-05-30'
executiveSummary: >-
  Researcher Spinout OS 应作为工作流软件起步，服务于主权支持的创业实验室和技术大学孵化器，帮助其启动 AI 原生硬科技批次，而非定位为通用加速器平台或 TTO 后台系统。
  第一个客户是负责 5–10 家研究员创业公司批次的总监、COO 或企业创建负责人，所在地为亚美尼亚或类似的公共项目——那里已具备安全 AI 访问、导师能力和种子支持。
  紧迫的痛点不是教团队如何使用 AI，而是在不每周重建证据包的前提下，判断哪些团队值得更多积分、导师和种子资金。
  MVP 应将 AI 辅助构建构件、里程碑证据、评审人决策和知识产权移交纳入统一审计轨迹，再输出投资级评分卡和尽调室。
  GTM 应从绑定新实验室启动或首次融资委员会的一次付费批次部署起步，因为这个触发点将预算、紧迫性和可量化 ROI——缩短备忘录准备时间和加快资源分配——集中到了一起。
  定价应以基于批次的年度订阅加付费试点或启动包为起点，因为买方本已在通用协作工具上有支出，只有产品能替代手工协调时，才能为高价软件买单。
  如果公司成功，可建立连接创业构件、里程碑进展和融资结果的可防御数据集，但这条护城河只有在先证明工作流 ROI 之后才有意义。
  最大的不确认风险是：早期批次规模太小，软件预算无从产生；买方希望捆绑服务而非 SaaS；知识产权敏感性限制了构件捕捉——预算归属和部署要求仍是待核实的尽调事项，尚未被证实。
problem:
  - "主权支持的创业实验室和技术大学孵化器仍在用电子表格、文档、导师笔记和临时备忘录管理研究员创业批次，融资和资源决策依赖碎片化的证据。"
  - "碎片化迫使创始人为运营者、导师、投资人和拨款委员会反复打包相同的技术内容，同时让知识产权移交和里程碑进展难以审计。"
solution:
  - "提供一套批次操作系统，将 AI 辅助构建构件、实验笔记、客户发现、评审人决策和知识产权流转纳入统一的权限管理时间线。"
  - "将时间线转化为里程碑评分卡、投资备忘录和可导出的尽调室，让运营者可以从共享证据模型中分配积分、导师和资金。"
whyWeWin:
  - "切入点夹在加速器运营套件和 TTO 后台系统之间，精准指向硬科技里程碑追踪、投资决策和知识产权溯源交汇的工作流。"
  - "Firebird 等国家 AI 访问计划制造了一个当下即存的运营者痛点：模型访问已经充裕，但创业形成纪律却付之阙如。"
  - "一旦产品成为里程碑完成、评审人决策和融资结果的记录系统，其模板和基准数据的积累速度是任何通用协作工具栈无法比拟的。"
strategicChoices:
  beachhead: "主权支持的硬科技创业实验室——在亚美尼亚及类似公共生态中启动首批 5–10 家 AI 原生研究员衍生公司，之后再扩展至更广泛的大学成果转化团队。"
  wedgeRationale: >-
    这个滩头市场比销售宽泛的成果转化套件产生证据更快：单一买方控制整个批次，评审工作流每周重复，ROI 可直接体现在决策速度和证据完整度上。
    这条路绕开了替换完整 TTO 系统或在公司还没有证明工作流改善融资决策之前就直接赢得大量创始人的更慢路径。
  sequencingRationale: >-
    产品应先从证据捕捉、里程碑模板、权限管理和可导出投资包入手，因为这些解决了新批次启动所暴露的即时运营者瓶颈。
    GTM 应在前两次生产部署期间保持创始人主导，优先雇用工作流实施人才而非扩张销售，因为核心问题是产品能否像可复用软件而非变相服务那样运行。
    大学 TTO 和公共项目扩展应等到主权支持的实验室证明一次部署能转化为可复用模板和持续软件支出之后再启动。
  notYet:
    - "通用加速器申请管理"
    - "完整的 TTO 文件归档或专利管理"
    - "创始人教育内容市场"
    - "在两个可复用生产账户落地之前向灯塔公共项目以外扩展"
market:
  tam: "估计 TAM 为 $24.0M，约 400 个全球成果转化和创业形成机构，ACV 约 $60k。"
  sam: "估计 SAM 为 $6.0M，约 100 个亚美尼亚、GCC、英国及邻近公共成果转化生态中的主权支持或研究密集型硬科技项目，ACV 约 $60k。"
  som: "估计第 3 年 SOM 为 $0.5M，约 8 个灯塔账户，ACV 约 $60k–$70k，采用关系驱动的销售模式。"
  segments:
    - "主权支持的硬科技创业实验室和公共创业孵化器"
    - "运行研究员衍生批次的技术大学孵化器和成果转化办公室"
  buyingProcess: >-
    流程始于新创业实验室、AI 批次或融资委员会迫使运营者将申请入驻、里程碑评审和资源分配规范化到电子表格和共享云盘之上。
    日常推动者通常是项目运营者或创业负责人，经济买方则是运营、IT 和知识产权利益相关方审查数据处理和工作流适配之后的总监、COO 或企业创建负责人。
product:
  mvp: >-
    MVP 是一套批次工作流系统，将创始人更新、构件、实验日志和评审人决策摄入映射到硬科技里程碑模板的权限管理时间线中。
    它应输出实时评分卡、每周评审包和可导出尽调室，同时在 v1 阶段依赖集成和可控导出，而非试图替换 CRM、存储或专利系统。
  sixMonth: "用机器人、航空航天和生命科学衍生公司的里程碑模板加权限管理、审计轨迹和备忘录生成工作流，上线一个付费共创客户批次。"
  twelveMonth: "将首次部署转为生产，证明至少一次运营者评审或尽调准备时间降低 30% 以上，并在第二个灯塔账户复用模板集。"
  twentyFourMonth: "支撑 5–8 个跨主权支持实验室和大学成果转化团队的实时账户，新增里程碑进展和融资转化的基准报告，并有选择地扩展至邻近成果转化工作流。"
  keyBets:
    - "如果工作流整合能显著缩短评审和备忘录准备时间，运营者愿意在预测性基准分析出现之前先买软件。"
    - "只要权限、导出管控和知识产权移交记录足够明确，研究员创始人会接受选择性构件捕捉。"
    - "硬科技里程碑模板在不同实验室间的标准化程度足以避免为每个客户从头重建。"
    - "基于批次的系统可以先在窄滩头扎根，之后再扩展至邻近成果转化账户。"
gtm:
  wedge: "将产品作为一个新研究员创业批次的默认运营轨道来销售，在第一次融资委员会之前就切入，让买方可以从共享证据基础中分配导师、积分和种子资金。"
  channels:
    - "创始人主导直接销售给主权支持实验室和技术孵化器的总监、COO 和企业创建负责人"
    - "与国家 AI 项目、大学创新办公室和已汇聚目标批次的公共成果转化计划建立合作伙伴关系"
    - "来自已参与批次评审的导师、种子基金和成果转化顾问的温性引荐"
  funnelTargets: "线索→合格试点 20–30%，合格试点→付费试点 30–40%，试点→生产 50% 以上，生产→引荐或第二账户扩展 25% 以上（12 个月内）。"
  pricing: "付费试点或批次启动包 $15k–$25k，转化为每活跃批次 $40k–$75k 年度订阅，外部尽调室或基准分析仅在生产后收附加费；这与研究所得的付费意愿区间匹配，并将首份合同绑定到明确的启动事件。"
businessModel:
  revenueStreams:
    - "按活跃批次收取年度平台订阅费"
    - "付费入驻和工作流模板实施费"
    - "外部尽调室、跨批次分析和基准报告的高级模块费"
  unitOfValue: "管理中的活跃创业批次"
  targetGrossMarginPct: 70
  expansionLevers:
    - "从同一主权实验室或大学账户内的单批次扩展至多个项目"
    - "核心批次评审上线后，增加大学成果转化和公共融资工作流"
    - "通过里程碑转化、证据完整度和融资结果的基准报告变现"
    - "向导师、基金和合作项目出售额外的外部评审人和尽调室容量"
strategyMap:
  northStarMetric: "从入驻到投资就绪决策、里程碑证据完整的衍生企业团队数量"
  inputMetrics:
    - "签约付费共创客户数"
    - "从每周更新到委员会就绪决策包的中位天数"
    - "在评审日期前里程碑证据完整的团队比例"
    - "试点转生产转化率"
    - "每个实时账户的年度合同价值"
    - "捕获的可基准化批次记录数量"
  moatsToBuild:
    - "覆盖原型就绪度、验证、知识产权移交和融资就绪关卡的硬科技里程碑模板库"
    - "连接跨批次提示词、代码、实验、评审人意见和投资决策的构件图谱"
    - "记录哪些证据模式与进展、融资和运营者时间节省相关的基准数据集"
  killCriteria:
    - "在创始人主导销售聚焦的 9 个月内，签约付费灯塔部署少于 2 个"
    - "首个生产账户未能将运营者评审或备忘录准备时间减少至少 30%"
    - "试点使用已嵌入实时批次后，客户仍拒绝转化至年度 ACV $40k 以上"
  mermaid: |
    flowchart LR
      Wedge[Researcher-spinout cohort wedge] --> MVP[Evidence and milestone OS]
      MVP --> Proof[Faster reviews and cleaner diligence]
      Proof --> Expansion[University and public-program expansion]
investorMemo:
  verdict:
    call: "观察"
    conviction: "买方痛点和时机可信，但在两次付费部署证明独立预算、可复用 ACV 和超越极小初始市场的扩展路径之前，信心保持有限。"
    whyBelieve: "研究显示真实的创业实验室买方、具体的启动触发器，以及加速器运营工具、关系 CRM 和 TTO 系统之间存在产品空白。"
    whyDoubt: "可及市场较小，买方议价能力高；即使产品出色，若批次保持小规模或采购将销售模式变为服务，公司仍可能失败。"
    nextDiligence: "下一个证明点是两次付费批次部署，需有可量化的周期时间节省、明确的预算负责人，以及至少一条通往年度软件合同 $40k 以上的转化路径。"
  firstCustomer:
    title: "主权支持的硬科技实验室企业创建负责人"
    profile: "一个精干的项目团队，管理机器人、航空航天或生命科学领域首批 5–10 家研究员创立的衍生公司，同时协调多位评审人的导师、AI 积分和种子支持。"
    trigger: "新创业实验室或国家 AI 批次启动，首次融资委员会需要在不增加运营人员的前提下跨团队比较证据。"
    buyer: "总监、COO 或企业创建负责人"
    initialContract: "付费试点 $15k–$25k，覆盖一次批次启动；若产品成为评审、资源分配和尽调导出的默认工作流，则转化为年度订阅 $40k–$75k。"
  mustBeTrue:
    - "至少 2 个目标账户每年进行足够多的批次评审，手工备忘录准备和资源分配是实质性的预算痛点。"
    - "经济买方可以批准独立软件支出，而无需要求捆绑创业建设服务合同。"
    - "创始人和运营者会记录足够多的构件，使评分卡有实质内容，而不会因知识产权敏感性阻断采用。"
    - "单次部署可在一个批次周期内将评审准备或尽调打包时间缩短 30% 以上。"
    - "首个亚美尼亚式灯塔账户能在 12 个月内打开至少一个邻近的主权或大学项目。"
  diligenceQuestions:
    - "首个目标账户每年处理多少个创业项目、评审人和正式融资决策？"
    - "在主权支持的实验室内，谁实际拥有批次运营软件的预算和采购权？"
    - "哪些构件类别实质性地影响融资决策，哪些过于敏感而不宜在产品内捕捉？"
    - "机器人、航空航天和生命科学批次的强制部署、驻场和权限要求是什么？"
    - "买方为何会选择这套系统，而非 Dealum、Affinity、Notion 或内部拼合工作流？"
operatingAssumptions:
  - assumption: "早期买方会购买独立工作流软件，而非坚持将创业建设服务捆绑进合同。"
    basis: research.yaml
    validationTest: "与至少 5 位项目负责人和采购方进行定价和打包访谈，然后争取 2 个主要以软件形式销售的付费试点。"
    decisionImpact: "如果为假，公司必须按服务重型模式定价，或缩窄至预算更干净的买方。"
  - assumption: "工作流嵌入实时项目后，年度批次订阅 $40k–$75k 可被接受。"
    basis: research.yaml
    validationTest: "在首个试点中量化节省时间和转化影响，然后在试点评审后 60 天内赢得至少 1 份年度合同，ACV $40k 以上。"
    decisionImpact: "如果为假，ACV 低于计划，公司需要更大的市场或更低的运营成本。"
  - assumption: "选择性捕捉、细粒度权限和可导出审计轨迹足以克服知识产权和专利前敏感性。"
    basis: research.yaml
    validationTest: "与 2 个潜在客户测试权限和脱敏工作流，确认至少 80% 的评审必要构件可在产品内捕捉或引用。"
    decisionImpact: "如果为假，产品应收窄为运营者侧备忘录组装，而非全量证据捕捉。"
  - assumption: "为 Firebird 式实验室构建的硬科技里程碑模板可以以有限的定制工作量迁移至邻近大学成果转化团队。"
    basis: idea.yaml
    validationTest: "梳理一个主权实验室工作流和一个大学成果转化工作流，确认至少 60% 的里程碑对象和评审状态可复用。"
    decisionImpact: "如果为假，路线图应停留在单一窄买方细分，延迟多细分扩展。"
  - assumption: "公共或大学采购及安全审查可在足够快的时间内完成，让试点在一个批次周期内上线。"
    basis: operator judgment
    validationTest: "追踪一个从安全审查到试点上线的真实交易，将耗时控制在 120 天以内。"
    decisionImpact: "如果为假，公司必须筹更多资金、缩窄至更快的买方，或建立合伙人主导的实施模式。"
experimentRoadmap:
  - horizon: "0–90 天"
    experiment: "买方和预算负责人发现"
    hypothesis: "感受到痛点的运营者同样能在批次启动前识别软件预算负责人和购买路径。"
    successMetric: "完成 10 个目标账户访谈，其中至少 3 位买方能点名说出付费试点的预算来源和启动触发器。"
    owner: "创始人/CEO"
  - horizon: "0–90 天"
    experiment: "构件敏感性工作流测试"
    hypothesis: "选择性捕捉和权限管控足以让团队记录评审决策所需的证据。"
    successMetric: "2 个共创客户批准权限模型草案和必需构件矩阵，且删减的评审关键证据不超过 20%。"
    owner: "创始工程师"
  - horizon: "90–180 天"
    experiment: "首个付费共创客户批次"
    hypothesis: "新实验室启动或首次融资委员会产生足够的紧迫性，让买方在定制开发需求蔓延之前先购买付费试点。"
    successMetric: "以 $15k 以上签约 1 个付费试点，有明确的经济买方、实时批次时间线和有范围界定的 v1 工作流。"
    owner: "创始人/CEO"
  - horizon: "90–180 天"
    experiment: "评审包自动化部署"
    hypothesis: "自动化评分卡和备忘录生成比电子表格和文档节省运营者准备时间。"
    successMetric: "首个试点在 5 个以上创业项目中将每周评审或尽调打包时间减少至少 30%。"
    owner: "流程负责人"
  - horizon: "6–12 个月"
    experiment: "试点转生产转化"
    hypothesis: "工作流成为一个批次的默认运营轨道后，买方会转化为年度软件支出。"
    successMetric: "至少 1 个试点在批次复盘后 60 天内转化为年度合同，ACV $40k 以上。"
    owner: "创始人/CEO"
  - horizon: "12–18 个月"
    experiment: "第二细分迁移测试"
    hypothesis: "首个灯塔实施可以不经全面重建而复用至邻近的主权或大学账户。"
    successMetric: "1 个第二账户使用模板集签约，工作流对象复用率至少达到首次部署的 60%。"
    owner: "解决方案工程师"
operations:
  - "维护机器人、航空航天和生命科学创业形成的里程碑模板库，含明确的评审状态、证据要求和知识产权移交检查点。"
  - "运行权限和导出管控模型，让创始人、运营者、导师和外部投资人看到同一批次记录的不同切片。"
  - "在每个实时批次上追踪运营者节省时间、证据完整度和融资决策周期时间，使 ROI 从第一次部署起即可量化。"
  - "对存储、协作和知识产权系统使用集成和可控导出，而非将全系统替换范围纳入早期交易。"
team:
  - role: "创始人/CEO"
    startTiming: "第 0 个月"
    rationale: "主导创始人销售、客户发现和前两个采购流程，因为预算权威和打包方式仍不确定。"
  - role: "创始工程师"
    startTiming: "第 0 个月"
    rationale: "构建首个生产批次所需的工作流引擎、权限模型、集成和审计轨迹。"
  - role: "流程负责人"
    startTiming: "第 2 个月"
    rationale: "将创业实验室评审、里程碑模板和知识产权移交要求转化为可复用的产品配置，而非定制服务。"
  - role: "解决方案工程师"
    startTiming: "第 6 个月"
    rationale: "在首个灯塔账户之后缩短实施周期，负责数据迁移、客户配置和分析埋点。"
  - role: "全栈/安全工程师"
    startTiming: "第 8 个月"
    rationale: "在客户安全审查成为扩展门槛之后，加固权限、日志和部署选项。"
milestones:
  - horizon: "0–12 个月"
    items:
      - "完成 10 个以上买方访谈，签署 2 个付费灯塔试点。"
      - "上线一套生产批次工作流，覆盖证据捕捉、里程碑评审、备忘录生成和尽调导出。"
      - "在首个生产账户上证明运营者评审准备或尽调打包时间至少提升 30%。"
      - "将至少 1 个试点转化为 ACV $40k 以上的 12 个月合同。"
  - horizon: "12–24 个月"
    items:
      - "在主权支持实验室和大学成果转化团队中达到 3–5 个生产账户。"
      - "在第二个细分中以至少 60% 配置复用率复用核心里程碑模板系统。"
      - "推出证据完整度、进展速率和评审周期时间的基准报告。"
      - "证明每个新账户的入驻工作量正在下降而非增加。"
  - horizon: "24–36 个月"
    items:
      - "达到 8 个灯塔账户，若 ACV 和扩展假设成立，年度经常性收入约 $0.5M。"
      - "在至少一个主权支持网络和一个大学成果转化集群中成为融资就绪评审的默认记录系统。"
      - "利用积累的批次数据发布基于证据的评分和基准产品，同时不取代客户对敏感知识产权的所有权。"
risks:
  - risk: "首个市场规模过小、关系驱动性过强，在扩展之前无法支撑风险投资级结果。"
    likelihood: "High"
    impact: "High"
    mitigation: "将第一个细分视为证明切口，要求在第 18 个月前完成第二细分迁移测试，避免构建不可泛化的细分专属功能。"
  - risk: "买方选择捆绑服务或现有工具栈，而非独立的记录系统。"
    likelihood: "High"
    impact: "High"
    mitigation: "将试点定价绑定到具体批次触发点，尽早证明运营者时间节省，并与现有厂商工具集成而非强制替换。"
  - risk: "知识产权和隐私顾虑阻断足够多的构件捕捉，使评分卡不完整。"
    likelihood: "Medium"
    impact: "High"
    mitigation: "支持选择性捕捉、脱敏、基于角色的访问和可导出审计轨迹，让敏感工作可被引用而无需全局可见。"
  - risk: "公共部门采购和安全审查时间超出一个批次周期。"
    likelihood: "Medium"
    impact: "High"
    mitigation: "在批次启动前销售，保持 v1 架构轻量，使用付费试点或共创客户范围，在企业全面推广前就可以开始。"
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2-3M"
  runwayMonths: 18
  useOfFundsSummary: "用 18 个月资金拿下 2 个付费灯塔试点，转化至少 2 个生产账户，构建核心工作流、权限管理和基准数据基础，并验证滩头市场能否支撑可复用的 $40k–$75k ACV 软件而非服务。"
