scenarios:
  downside:
    description: "Public procurement slips, one pilot fails to convert, and the company ends Y3 with only 6 paid cohorts at lower ACV and lower gross margin."
    y3RevenueK: 315.0
    y3EbitdaK: -507.95
    cashLowPointK: 318.0
    keyAssumptionChanges:
      - "Q4Y3 ends at 6 paid cohorts instead of 8."
      - "Blended annual revenue per cohort falls to about $60K."
      - "Gross margin stalls near 67% because permissions, exports, and setup stay manual."
  base:
    description: "The company signs 2 paid cohorts in Y1, reaches 5 live cohorts by Q4Y2, and exits Y3 with 8 paid cohorts across a small set of lighthouse programmes."
    y3RevenueK: 430.63
    y3EbitdaK: -419.51
    cashLowPointK: 551.74
    keyAssumptionChanges:
      - "Matches A1-A23 with 2 paid cohorts at M12, 5 by Q4Y2, and 8 by Q4Y3."
      - "Uses a $65K blended annual revenue per active cohort and midpoint go-live timing under A5 and A6."
      - "Gross margin improves from the mid-50s in Y1 to about 70% in Y3 while the team stays at 5 FTE through the modeled period."
  upside:
    description: "The first lighthouse account refers adjacent programmes, a second cohort launches inside one buyer, and benchmark reporting supports slightly higher ACV by Y3."
    y3RevenueK: 476.0
    y3EbitdaK: -377.22
    cashLowPointK: 642.0
    keyAssumptionChanges:
      - "Q4Y3 ends at 9 paid cohorts instead of 8."
      - "Blended annual revenue per cohort rises to about $68K."
      - "Gross margin reaches 71-72% as template reuse and controlled exports reduce manual support."
