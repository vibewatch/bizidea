    y3RevenueImpactK: -20.0
    cashImpactK: -85.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      TargetLabs --> PaidCohorts
      PaidCohorts --> SubscriptionRevenue
      SubscriptionRevenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: Revenue engine
    finding: "Base-case revenue comes from moving from 2 paid cohorts at M12 to 8 at Q4Y3 while holding blended ACV near $65K and adding roughly one cohort every one to two quarters."
  - checkName: Must go right
    finding: "The first two lighthouse deployments must convert into reusable templates so implementation stays productized enough for a 5-person team to support the next accounts."
  - checkName: Model breaks if
    finding: "If procurement stretches and Y3 ends closer to 6 cohorts at about $60K ACV, cash compresses toward roughly $318K before the seed narrative is proven."
  - checkName: Next-round proof
    finding: "The next financing is justified once Q4Y2 shows 5 live cohorts, 30%+ operator time savings, and credible second-segment reuse rather than bespoke services."
sanityChecks:
  ruleOf40: "Y3 growth 112.0% + EBITDA margin -97.4% = 14.6%"
  burnMultiple: "Y2 burn multiple 2.68x on about $195K net new ARR, improving to 2.15x in Y3 on about $195K net new ARR."
  revenuePerFte: "$86K Y3 on 5 exit FTE (benchmark $200-400K SaaS)"
  flags:
    - "The model is capital efficient enough to stay solvent on a $2.0M pre-seed, but it is not remotely breakeven by Y3 because the beachhead is small and procurement-heavy."
    - "Revenue per FTE stays well below classic SaaS benchmarks, so the company must prove that this wedge expands into adjacent commercialization workflows before it can support venture-scale outcomes."
    - "The financial plan assumes founder-led sales through Y3; if the team hires sales earlier without faster conversions, burn rises materially before revenue catches up."
    - "Gross margin reaches the BP target only in Y3, so any extra manual security or export work would directly weaken cash and the seed fundraising case."
