    signalRefs: [目标项目是硬科技，非轻量级应用]
    sourceRefs: [1, 2]
differentiator: >-
  这不是另一个学习平台或创始人社区。切入点是项目侧运营基础设施——将 AI 辅助工作转化为符合投资级标准的进展记录、所有权归属和深度尽调材料；
  在那些连简单路演软件都嫌太浅的硬科技领域，这一差异尤为突出。
  公司可以通过连接创始人行为、里程碑完成情况和融资结果的构件图谱建立防御性优势——覆盖的创业实验室越多，评分卡和工作流模板的价值随每批次持续积累。
