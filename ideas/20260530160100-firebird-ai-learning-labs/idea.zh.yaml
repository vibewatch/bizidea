jobsToBeDone:
  - job: 当创业实验室启动新的 AI 原生硬科技批次时，帮助项目运营者判断哪些团队值得更多资金和支持，从而以更少的手工评审把钱投给最优秀的创业项目。
    currentAlternative: 电子表格、导师笔记和手工汇总的投资备忘录
    successMetric: 达成投资决策的时间，以及里程碑证据完整的创业项目比例
  - job: 当研究员创始人需要向导师和投资人证明进展时，帮助他们把技术工作转化为尽调就绪的成果，从而在无行政负担的情况下获得持续支持。
    currentAlternative: 在幻灯片、文档和临时数据室中反复格式化项目更新
    successMetric: 每个团队每月节省的工时，以及从孵化团队到获得融资创业公司的转化率
