topRisks:
  - name: 预算高度集中
    description: 早期客户可能集中在少数几个政府支持或慈善基金驱动的项目中，销售周期漫长。
    mitigation: 从已启动批次的创业实验室和大学孵化器切入，再以经过验证的 ROI 进入更慢的主权项目。
  - name: 预测能力不足
    description: 仅捕捉创始人构件，可能最初还不足以预测哪些团队会成为可融资企业，难以支撑高价平台定位。
    mitigation: 首先以工作流整合和尽调效率 ROI 为切入点，待积累多批次结果数据后再逐步引入预测基准分析。
  - name: 知识产权与隐私敏感性
    description: 如果研究团队担忧所有权泄露或专利申请前技术细节曝光，可能会抵触记录 AI 辅助工作。
    mitigation: 提供基于角色的访问控制、可导出的审计轨迹，以及与企业管控和本地知识产权治理政策相匹配的部署选项。
