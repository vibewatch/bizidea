  sensitivityCases:
  - case: Firebird and similar labs keep cohorts very small and stay comfortable with manual workflows
    impact: Urgency drops if operators only manage a handful of ventures and do not feel the administrative burden, pushing the startup to prove value on diligence speed rather than volume alone.
    sourceRefs:
    - 1
    - 2
  - case: Buyers prefer stitching together existing accelerator, CRM, and workspace tools
    impact: The startup must win on opinionated templates, less duplicate packaging work, and better decision quality, not just another dashboard.
