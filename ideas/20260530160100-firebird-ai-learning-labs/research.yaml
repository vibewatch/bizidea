  validationPlan:
  - priority: high
    question: How many operator hours per venture are currently spent collecting updates, preparing memos, and assembling diligence packages?
    evidenceToGather: Interview 10-15 venture-lab and TTO operators across Armenia, GCC, and UK programmes and map current-process time by venture stage.
  - priority: high
    question: 'Which artifact classes actually change funding or graduation decisions: prompts, code commits, experiment logs, customer calls, or IP assignments?'
    evidenceToGather: Shadow two live cohorts and capture the evidence requests that recur in weekly reviews and investment committees.
  - priority: medium
    question: Will sovereign-backed labs buy standalone software, or will they expect services and venture-builder support bundled with the tooling?
    evidenceToGather: Run pricing and packaging interviews with programme leaders plus procurement owners at three public innovation organisations.
  - priority: medium
    question: How much residency, on-prem, or restricted-access deployment is required for sensitive robotics, aerospace, and life-science work?
    evidenceToGather: Review security requirements with two prospective customers and one external counsel or data-protection advisor.
