competitors:
- name: Dealum
  stage: scale-up
  wedge: Accelerator and investor-network operations spanning applications, voting, portfolio tracking, and deal sharing.
  pricing: $479/month scale tier listed publicly; lower accelerator tiers also available
  strength: Strong on intake, evaluator workflows, syndication, and program administration for accelerators.
  weaknessVsUs: Public positioning centers on accelerator operations rather than AI-work provenance, deep-tech milestones, or IP handoff.
  sourceRefs:
  - 22
  - 23
- name: AcceleratorApp
  stage: scale-up
  wedge: Application-processing and cohort-management software for accelerators and incubators.
  pricing: Custom quote / demo-led
  strength: Strong operational automation around forms, judges, meetings, and evaluation funnels.
  weaknessVsUs: Appears optimized for high-volume application review, not for turning ongoing research activity into funding-grade evidence.
  sourceRefs:
  - 24
  - 25
- name: Affinity
  stage: incumbent
  wedge: Relationship-intelligence CRM for founders, mentors, investors, and private-capital workflows.
  pricing: $2,000-$2,700 per user per year plus enterprise tier
  strength: Best-in-class network graph and activity capture across email and meetings.
  weaknessVsUs: Expensive per seat and not explicitly built for commercialization milestones, artifact provenance, or structured diligence packets.
  sourceRefs:
  - 26
  - 27
- name: Wellspring
  stage: incumbent
  wedge: TTO back-office platform for disclosures, docketing, contracts, financials, and reporting.
  pricing: Enterprise / custom
  strength: Deep institutional fit for technology-transfer office operations and compliance-heavy workflows.
  weaknessVsUs: Closer to invention administration than to live venture-lab execution, founder coaching, and investment decision support.
  sourceRefs:
  - 28
- name: Inteum
  stage: incumbent
  wedge: Enterprise IP management with growing AI-enabled commercialization and partner-discovery capabilities.
  pricing: Enterprise / custom
  strength: Recognized TTO footprint and credible move toward AI-assisted research commercialization workflows.
  weaknessVsUs: Still oriented around office systems and university-industry partnering rather than cohort-level venture operating cadence.
  sourceRefs:
  - 29
regulatoryTechnicalConstraints:
- point: AI-assisted patent or trademark work still requires accountable, truthful submissions and cannot be treated as a fully autonomous process.
  sourceRefs:
  - 33
- point: Purely AI-generated outputs do not automatically receive copyright protection, so the system should distinguish human contribution from model output.
  sourceRefs:
  - 35
- point: Centralizing founder, mentor, and reviewer data for European customers invokes GDPR obligations around processing and access control.
  sourceRefs:
  - 36
- point: Rights-management and attribution questions around AI training and outputs make provenance and audit trails strategically important.
  sourceRefs:
  - 34
