slug: ninjacart-ipo-supply-chain
date: "2026-07-04"
currency: USD
modelStartMonth: "2026-08"
assumptions:
  - id: A1
    name: Model start month
    value: "2026-08"
    unit: YYYY-MM
    source: '[BP date 2026-07-04] the model begins with the first full operating month after the dated business plan.'
  - id: A2
    name: Opening cash / pre-seed raise
    value: $2.0M
    unit: USD
    source: '[BP fundingAsk targetFundingRangeUsd $2-3M + BP fundingAsk runwayMonths 18 + model cash curve] the base case uses the low end of the BP range to fund the 18-month proof plan plus roughly six months of buffer.'
  - id: A3
    name: Starting paying logos
    value: '0'
    unit: count
    source: '[BP executiveSummary + BP milestones 0-12 months] the company starts pre-revenue and must first win paid pilots.'
  - id: A4
    name: Paying customer definition
    value: A paid pilot or a production operator contract under active spoilage monitoring.
    unit: definition
    source: '[BP gtm.pricing + BP businessModel.revenueStreams] customersEop counts any operator already paying for pilot or production scope.'
  - id: A5
    name: Paid pilot economics
    value: $15K over about 2 months (~$7.5K per month)
    unit: USD/logo
    source: '[BP investorMemo.firstCustomer.initialContract $10k-$20k paid pilot] the base case uses the midpoint of the BP pilot range.'
  - id: A6
    name: Production contract and expansion economics
    value: Initial rollouts start near $96K-$128K ARR and mature toward about $144K annual value by Y3.
    unit: USD/logo/year
    source: '[Research market.bottomUpSizingDrivers ~$2.4k / year per node + BP investorMemo.firstCustomer.initialContract $75k-$150k annual software plus shared savings] 40-60 monitored nodes plus modest gainshare and reporting attach drive the production contract range.'
  - id: A7
    name: Customer ramp
    value: M12 exit 2 paying logos, Q4Y2 exit 3, and Q4Y3 exit 6.
    unit: customersEop
    source: '[BP milestones 0-12, 12-24, and 24-36 months + Research market.som] the base case reaches roughly 330 live nodes by Q4Y3, slightly below the researched seven-win SOM because GTM stays intentionally lean until pilot conversion is proven.'
  - id: A8
    name: Revenue recognition convention
    value: 'Period-end paying logos multiplied by blended realized revenue per logo for that period: Y1 at about $7.5K-$8.25K per month, Y2 at about $28.5K-$32.0K per quarter, and Y3 at about $34.5K-$36.0K per quarter.'
    unit: formula
    source: '[BP gtm.pricing + BP investorMemo.firstCustomer.initialContract + Research market.som] this keeps revenue directly traceable to paying logos while reflecting the mix of pilots, initial rollouts, and modest module attach.'
  - id: A9
    name: Gross margin ramp
    value: About 50%-63% in Y1, 66%-73% in Y2, and 74%-75% in Y3.
    unit: gross margin percent
    source: '[BP businessModel.targetGrossMarginPct 75 + BP operations + startup-finance heuristic] early photo-labeling, integration, and pilot support are services-heavy before connector reuse and standard operating playbooks improve margin.'
  - id: A10
    name: Hiring timeline
    value: Founder, founding engineer, and ML/CV engineer at launch; solutions in M3; customer success in M6; commercial in M12; platform/data engineer in M18; second GTM hire in M34.
    unit: timeline
    source: '[BP team + BP strategicChoices.sequencingRationale + startup-finance heuristic] the model follows the BP sequence of product and integration first, then customer success, then scaled GTM only after production rollout proof.'
  - id: A11
    name: Founder / product loaded compensation
    value: $60K
    unit: USD/year
    source: '[BP operations owner Founder / product + startup-finance heuristic: India B2B SaaS pre-seed] founder cash comp is lean but fully loaded.'
  - id: A12
    name: Founding engineer loaded compensation
    value: $72K
    unit: USD/year
    source: '[BP team founding eng + startup-finance heuristic: India B2B SaaS pre-seed] reflects senior full-stack and connector work without public-company cash levels.'
  - id: A13
    name: ML / computer vision loaded compensation
    value: $84K
    unit: USD/year
    source: '[BP team ML / computer vision engineer + startup-finance heuristic: India applied-ML startup] the first model owner is the highest-paid technical hire because SKU grading accuracy is the core proof point.'
  - id: A14
    name: Solutions / integration loaded compensation
    value: $60K
    unit: USD/year
    source: '[BP team solutions / integration engineer + startup-finance heuristic: India B2B SaaS pre-seed] covers reusable write-back work across fragmented inventory and POS stacks.'
  - id: A15
    name: Customer success / ops loaded compensation
    value: $42K
    unit: USD/year
    source: '[BP team customer success / ops analyst + startup-finance heuristic: India B2B SaaS pre-seed] reflects a hybrid implementation, reporting, and account-adoption role.'
  - id: A16
    name: Commercial lead loaded compensation
    value: $66K
    unit: USD/year
    source: '[BP team commercial lead + startup-finance heuristic: India enterprise SaaS] the first dedicated seller is hired only after one repeatable production rollout exists.'
  - id: A17
    name: Platform / data engineer loaded compensation
    value: $66K
    unit: USD/year
    source: '[BP product twelveMonth reusable connectors + startup-finance heuristic] this hire absorbs connector hardening and data-pipeline work once the first operator is live.'
  - id: A18
    name: Second GTM / partnerships loaded compensation
    value: $54K
    unit: USD/year
    source: '[BP gtm.channels partner-led referrals + startup-finance heuristic] the second GTM seat is deferred until late Y3 so the model does not overbuild sales ahead of proof.'
  - id: A19
    name: Payroll allocation to P&L lines
    value: Founder 40% S&M / 35% R&D / 25% G&A; engineering and ML 100% R&D; solutions 50% S&M / 50% R&D; customer success 60% S&M / 40% G&A; commercial roles 100% S&M.
    unit: allocation
    source: '[BP team role rationales + BP operations] maps salary into the operating functions that actually drive pilots, integrations, and rollout adoption.'
  - id: A20
    name: Non-payroll opex ramp
    value: Non-payroll spend rises from about $9K per month pre-pilot to about $26.5K per month by Q4Y3.
    unit: USD/month
    source: '[BP operations + BP risks + startup-finance heuristic] covers field travel, image labeling, cloud inference, legal/compliance, and partner-integration costs without assuming a large services organization.'
  - id: A21
    name: Cash conversion convention
    value: Cash movement equals EBITDA.
    unit: formula
    source: '[startup-finance heuristic] capex, taxes, financing fees, and working-capital timing are assumed immaterial at pre-seed scale.'
  - id: A22
    name: Steady-state monthly logo churn
    value: 1.8%
    unit: percent per month
    source: '[startup-finance heuristic for early workflow SaaS + BP strategicChoices.wedgeRationale] once a store-network rollout is live the workflow should be sticky, but the model stays conservative because the wedge is still narrow.'
  - id: A23
    name: CAC convention
    value: Total 36-month sales and marketing spend divided by 6 net new paying logos.
    unit: formula
    source: '[model calc using base-case S&M spend + BP gtm.channels + BP gtm.funnelTargets] this captures founder-led outbound, VC intros, and partner-led selling across the full buildout period.'
  - id: A24
    name: Next-round milestone for funding sizing
    value: Before the seed raise, prove one 40-plus-node rollout, 2-3 operators under contract, one reusable connector, and the first paid benchmarking or board-reporting module.
    unit: milestone
    source: '[BP fundingAsk.useOfFundsSummary + BP milestones 0-12 and 12-24 months] this is the proof package that shows the wedge can expand beyond a one-off markdown pilot.'
  - id: A25
    name: Quarterly salary-roll convention
    value: Y2-Y3 salary rows use actual monthly hires inside each quarter rather than just quarter-end snapshots.
    unit: convention
    source: '[Headcount column convention + BP team startTiming] this keeps the salary line internally consistent even though the headcount table only shows year-end snapshots for Y2 and Y3.'
