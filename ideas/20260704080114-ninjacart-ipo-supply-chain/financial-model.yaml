scenarios:
  downside:
    description: Pilot-to-production conversion slips by roughly one quarter, one planned Y3 logo stays at pilot scope, and connector work remains more bespoke than planned.
    y3RevenueK: 510.0
    y3EbitdaK: -352.0
    cashLowPointK: 690.0
    keyAssumptionChanges:
      - Q4Y3 customersEop reaches 4 instead of 6.
      - Mature annual value per production logo exits near $120K instead of $144K because live-node density and gainshare attach stay lighter.
      - Gross margin exits near 70% because onboarding and data-labeling stay more manual.
  base:
    description: Two Y1 pilots convert into a small set of dense rollouts, same-account expansion does most of the work, and modest benchmarking attach lifts mature logo value toward the top of the BP production range.
    y3RevenueK: 720.0
    y3EbitdaK: -215.9
    cashLowPointK: 954.0
    keyAssumptionChanges:
      - M12 ends with 2 paying logos, Q4Y2 with 3, and Q4Y3 with 6.
      - Mature production logos reach about $144K annual value at roughly 55-60 live nodes plus modest module and gainshare attach.
      - Gross margin reaches the 75% target only after reusable connectors and pilot operating playbooks standardize.
  upside:
    description: A second connector shortens go-live time, same-account density expands faster, and one adjacent DC or wholesaler node attaches in Y3 without requiring a large services team.
    y3RevenueK: 900.0
    y3EbitdaK: -95.0
    cashLowPointK: 1035.0
    keyAssumptionChanges:
      - Q4Y3 customersEop reaches 7 instead of 6.
      - Blended annual value per mature logo moves toward $150K as supplier benchmarking and adjacent-node scope attach earlier.
      - Gross margin exits near 76% because connector reuse cuts implementation work faster than planned.
sensitivity:
  - variable: ARPU
    downsideCase: Production logos settle about 10% below the modeled $144K annual value.
    baseCase: Mature production logos average about $144K annual value by Q4Y3.
    upsideCase: Benchmarking and adjacent-node attach push mature annual value toward $150K.
    y3RevenueImpactK: -72.0
    cashImpactK: -54.0
  - variable: CAC
    downsideCase: Founder and investor-intro channels underperform and CAC rises toward $135K per logo.
    baseCase: CAC stays near $110K because the buyer set is concentrated and partner-led intros help.
    upsideCase: Connector partners and VC intros keep CAC closer to $95K per logo.
    y3RevenueImpactK: -36.0
    cashImpactK: -150.0
  - variable: churn
    downsideCase: Monthly logo churn rises to 2.5% because the wedge feels too narrow outside dense fresh corridors.
    baseCase: Monthly logo churn holds at 1.8% once a rollout is live.
    upsideCase: Monthly logo churn stays near 1.2% because supplier reporting and compliance workflows deepen retention.
    y3RevenueImpactK: -28.0
    cashImpactK: -42.0
  - variable: sales cycle
    downsideCase: Pilot-to-production conversion stretches from roughly 90 to roughly 150 days.
    baseCase: Paid pilots convert in about one quarter once finance signs off on the waste baseline.
    upsideCase: A strong first case study compresses conversion toward roughly 60 days.
    y3RevenueImpactK: -108.0
    cashImpactK: -140.0
  - variable: gross margin
    downsideCase: Gross margin exits near 70% because onboarding and labeling stay too bespoke.
    baseCase: Gross margin exits at 75% after connector reuse and tighter pilot SOPs.
    upsideCase: Gross margin reaches 77% as more of the workflow becomes standardized.
    y3RevenueImpactK: 0.0
    cashImpactK: -36.0
  - variable: hiring pace
    downsideCase: Platform and second GTM hires come forward before revenue is ready, adding cost without changing logo count.
    baseCase: Growth hires are held to milestone gates and mostly arrive after the first production rollout is live.
    upsideCase: The second GTM seat is delayed until a seventh logo is in pipeline, preserving cash without hurting delivery.
    y3RevenueImpactK: -18.0
    cashImpactK: -96.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Accounts[Target operators] --> Pilots[Paid pilots]
      Pilots --> LiveNodes[Live monitored nodes]
      LiveNodes --> Subscription[Per-node subscription]
      LiveNodes --> Gainshare[Shared savings and reporting attach]
      Subscription --> Revenue
      Gainshare --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: Revenue engine
    finding: The base case is driven by two Y1 pilots converting into six dense production logos by Q4Y3, with most growth coming from same-account node expansion rather than a wide new-logo ramp.
  - checkName: Must go right
    finding: Sales cycle and pilot ROI must stay close to the base sensitivity because the $2.0M pre-seed assumes one quarter is enough to turn a paid pilot into a 40-plus-node rollout.
  - checkName: Model breaks if
    finding: The downside case shows the model weakens quickly if mature logo value falls toward $120K or if conversion stretches toward 150 days, because cash still burns while the team remains integration-heavy.
  - checkName: Next-round proof
    finding: The next financing is justified once one rollout is live across 40-plus nodes, 2-3 operators are contracted, connector reuse is real, and a paid benchmarking module proves the wedge can expand beyond markdowns.
sanityChecks:
  ruleOf40: Y3 growth 130.8% + EBITDA margin -30.0% = 100.8%
  burnMultiple: Y2 burn multiple 1.8x, improving to 0.5x in Y3 as same-account expansion outruns new-logo spend.
  revenuePerFte: $90.0K Y3 (benchmark $200-400K SaaS)
  flags:
    - The model still exits Y3 below $1M of annual revenue, so venture-scale upside depends on adjacent modules or a later geography expansion rather than the India fresh-store wedge alone.
    - Revenue per FTE stays well below mature SaaS benchmarks because integrations, store-change management, and proof-heavy selling remain labor intensive.
    - 'Customer concentration is high: with only 6 paying logos in the base case, one delayed rollout would meaningfully move both revenue and runway.'
    - The gross-margin target only works if reusable connectors and pilot SOPs really reduce bespoke onboarding; if they do not, the downside case needs a faster follow-on round.
