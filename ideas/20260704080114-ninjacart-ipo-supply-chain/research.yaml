market:
  tam:
    value: $9.6M
    rationale: 'Bottom-up estimate: (~5,500 large-network quick-commerce nodes from Blinkit, Zepto, Instamart, and Flipkart Minutes [30][31] x 60% fresh-capable share because fresh produce and dairy still lag broader mix [1]) + ~700 adjacent fresh-grocery/DC nodes est. = ~4,000 relevant nodes; x ~$2.4k annual spend per live node, cross-checked against spoilage-loss economics [7][8] and public per-location software benchmarks [29][33].'
