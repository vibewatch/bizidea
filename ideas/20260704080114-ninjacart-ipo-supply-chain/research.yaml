    value: $0.8M
    rationale: Year-3 reachable share modeled as ~350 live nodes (roughly seven operator wins at ~50 nodes each) x ~$2.4k ARR per node after proving pilots in top-density corridors first.
    isEstimate: true
    sourceRefs:
    - 3
    - 30
    - 31
