    sourceRefs:
    - 1
    - 7
    - 8
    - 29
    - 30
    - 31
    - 33
  sam:
    value: $4.3M
    rationale: 'Apply beachhead constraint: ~45% of TAM nodes sit in operators and corridors where 50-300 store deployments are realistic; non-metros remain only ~20% of GMV and subscale cities have weaker order density, so SAM excludes the thinnest geographies [3].'
    isEstimate: true
    sourceRefs:
    - 3
