openQuestions:
- What share of fresh-produce write-offs at 50-300 store operators comes from intake-quality errors versus in-store handling or forecasting errors?
- Which exact order, inventory, and POS stacks dominate the beachhead, and what write-paths exist today for automated markdowns or transfers?
- Do FSSAI practices or packaging norms materially limit dynamic markdowns for pre-packed produce SKUs relative to loose produce?
- How much spoilage reduction can be demonstrated within a 30-45 day pilot window, which is likely the minimum board-level proof period?
