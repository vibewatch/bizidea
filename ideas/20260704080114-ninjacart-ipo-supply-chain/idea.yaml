topRisks:
  - name: "Vertically integrated incumbents build it in-house"
    description: "Ninjacart and similarly funded logistics platforms could bundle spoilage forecasting into their own stack and undercut a standalone SaaS vendor."
    mitigation: "Focus the beachhead on operators who explicitly do not want to hand sourcing control to a vertically integrated platform, and move fast to build a cross-operator data advantage before incumbents prioritize this feature."
  - name: "Integration friction with fragmented POS systems"
    description: "Dark-store operators run varied, sometimes homegrown inventory/POS systems, which could slow onboarding and blow up implementation cost per customer."
    mitigation: "Ship a standalone intake app with a simple API/webhook layer first so customers get value before a deep POS integration is required."
  - name: "Computer-vision grading accuracy across produce categories"
    description: "Ripeness and defect grading models trained on limited SKUs may not generalize across the wide variety of fruits and vegetables each store carries, undermining trust in the markdown triggers."
    mitigation: "Launch with a narrow set of high-waste, high-volume SKU categories (e.g. leafy greens, tomatoes, bananas) and expand category coverage only after grading accuracy is validated with pilot customers."
