differentiator: >-
  Unlike Ninjacart and other vertically integrated supply-chain platforms,
  this product does not require owning trucks, warehouses, or farmer
  relationships — it is a software-only layer that any dark-store operator
  can adopt without ceding sourcing control or margin. Unlike generic
  inventory/ERP software, the core IP is a spoilage-forecasting model
  trained on produce-specific decay curves and store-level environmental
  data, tied directly to an automated markdown action rather than a static
  dashboard.
conceptDiagram:
  title: "Spoilage-to-markdown loop for dark stores"
  mermaid: |
    flowchart LR
      Intake[Store staff photographs incoming crate] --> Grade[CV model grades ripeness and defect rate]
      Grade --> Forecast[Spoilage-window forecast per batch]
      Forecast --> Risk{Spoilage risk rising?}
      Risk -- Yes --> Markdown[Auto markdown or store transfer]
      Risk -- No --> Monitor[Continue daily monitoring]
      Markdown --> Outcome[Waste written off drops, EBITDA improves]
      Forecast --> Sourcing[Weekly supplier and route feedback]
