slug: ninjacart-ipo-supply-chain
date: "2026-07-04"
currency: USD
modelStartMonth: "2026-08"
assumptions:
  - id: A1
    name: "模型起始月份"
    value: "2026-08"
    unit: YYYY-MM
    source: '[BP date 2026-07-04] 模型从商业计划书日期后的第一个完整运营月份开始。'
  - id: A2
    name: "初始现金 / Pre-seed 融资额"
    value: $2.0M
    unit: USD
    source: '[BP fundingAsk targetFundingRangeUsd $2-3M + BP fundingAsk runwayMonths 18 + 模型现金曲线] 基准情景取 BP 融资区间的下限，用来支撑 18 个月的验证计划，外加约 6 个月的缓冲。'
  - id: A3
    name: "起始付费客户数"
    value: '0'
    unit: count
    source: '[BP executiveSummary + BP milestones 0-12 months] 公司从零收入起步，必须先拿下付费试点。'
  - id: A4
    name: "付费客户定义"
    value: "一个正在做变质监测的付费试点或正式生产合同运营商。"
    unit: definition
    source: '[BP gtm.pricing + BP businessModel.revenueStreams] customersEop 统计任何一个已经在为试点或生产范围付费的运营商。'
  - id: A5
    name: "付费试点经济模型"
    value: "约 2 个月 $15K（每月约 $7.5K）。"
    unit: USD/logo
    source: '[BP investorMemo.firstCustomer.initialContract $10k-$20k 付费试点] 基准情景取 BP 试点区间的中值。'
  - id: A6
    name: "生产合同与扩张经济模型"
    value: "首批推广年化价值约 $96K-$128K，第 3 年成熟到约 $144K。"
    unit: USD/logo/year
    source: '[研究 market.bottomUpSizingDrivers 约 $2.4k/年/节点 + BP investorMemo.firstCustomer.initialContract 年度软件 $75k-$150k 加效果分成] 40-60 个受监测节点，加上适度的效果分成和报告模块加购，共同拉动生产合同区间。'
  - id: A7
    name: "客户增长节奏"
    value: "第 12 个月末 2 家付费客户，Y2 Q4 末 3 家，Y3 Q4 末 6 家。"
    unit: customersEop
    source: '[BP milestones 0-12、12-24 和 24-36 个月 + 研究 market.som] 基准情景到 Y3 Q4 达到约 330 个在运营节点，略低于研究测算的七家客户 SOM，因为 GTM 在试点转化得到验证前刻意保持精简。'
  - id: A8
    name: "收入确认口径"
    value: '期末付费客户数乘以该期每客户已实现的混合收入：Y1 约每月 $7.5K-$8.25K，Y2 约每季度 $28.5K-$32.0K，Y3 约每季度 $34.5K-$36.0K。'
    unit: formula
    source: '[BP gtm.pricing + BP investorMemo.firstCustomer.initialContract + 研究 market.som] 让收入直接可追溯到付费客户数，同时反映试点、首批推广和适度模块加购的组合。'
  - id: A9
    name: "毛利率爬坡节奏"
    value: "Y1 约 50%-63%，Y2 约 66%-73%，Y3 约 74%-75%。"
    unit: gross margin percent
    source: '[BP businessModel.targetGrossMarginPct 75 + BP operations + 创业融资经验法则] 早期拍照标注、集成和试点支持偏人工，在连接器复用和标准操作规程改善之前，毛利率较低。'
  - id: A10
    name: "招聘时间线"
    value: "创始人、创始工程师和机器学习/计算机视觉工程师在启动时到位；解决方案工程师第 3 个月；客户成功第 6 个月；商务负责人第 12 个月；平台/数据工程师第 18 个月；第二位 GTM 招聘第 34 个月。"
    unit: timeline
    source: '[BP team + BP strategicChoices.sequencingRationale + 创业融资经验法则] 模型沿用 BP 的顺序：先产品和集成，再客户成功，只有在生产环境推广得到验证后才扩大 GTM。'
  - id: A11
    name: "创始人/产品的全额薪酬"
    value: $60K
    unit: USD/year
    source: '[BP operations 负责人 创始人/产品 + 创业融资经验法则：印度 B2B SaaS pre-seed 阶段] 创始人现金薪酬精简但足额计入。'
  - id: A12
    name: "创始工程师的全额薪酬"
    value: $72K
    unit: USD/year
    source: '[BP team 创始工程师 + 创业融资经验法则：印度 B2B SaaS pre-seed 阶段] 反映资深全栈和连接器开发工作，但未达上市公司现金水平。'
  - id: A13
    name: "机器学习/计算机视觉的全额薪酬"
    value: $84K
    unit: USD/year
    source: '[BP team 机器学习/计算机视觉工程师 + 创业融资经验法则：印度应用型 ML 创业公司] 第一位模型负责人是薪酬最高的技术岗，因为 SKU 分级准确率是核心验证点。'
  - id: A14
    name: "解决方案/集成工程师的全额薪酬"
    value: $60K
    unit: USD/year
    source: '[BP team 解决方案/集成工程师 + 创业融资经验法则：印度 B2B SaaS pre-seed 阶段] 覆盖跨碎片化库存和 POS 系统的可复用回写工作。'
  - id: A15
    name: "客户成功/运营的全额薪酬"
    value: $42K
    unit: USD/year
    source: '[BP team 客户成功/运营分析师 + 创业融资经验法则：印度 B2B SaaS pre-seed 阶段] 反映一个兼顾实施、报告和客户采纳的混合岗位。'
  - id: A16
    name: "商务负责人的全额薪酬"
    value: $66K
    unit: USD/year
    source: '[BP team 商务负责人 + 创业融资经验法则：印度企业级 SaaS] 只有在一次可复制的生产环境推广跑通之后，才招聘第一位专职销售。'
  - id: A17
    name: "平台/数据工程师的全额薪酬"
    value: $66K
    unit: USD/year
    source: '[BP product twelveMonth 可复用连接器 + 创业融资经验法则] 这个岗位在第一个运营商上线后，承接连接器加固和数据管道工作。'
  - id: A18
    name: "第二位 GTM/合作伙伴关系的全额薪酬"
    value: $54K
    unit: USD/year
    source: '[BP gtm.channels 合作伙伴引荐 + 创业融资经验法则] 第二个 GTM 岗位延后到 Y3 末，避免在验证完成前过早堆砌销售团队。'
  - id: A19
    name: "薪酬到损益表科目的分摊"
    value: "创始人 40% 销售市场 / 35% 研发 / 25% 行政管理；工程与 ML 100% 研发；解决方案 50% 销售市场 / 50% 研发；客户成功 60% 销售市场 / 40% 行政管理；商务岗位 100% 销售市场。"
    unit: allocation
    source: '[BP team 各岗位理由 + BP operations] 把薪酬映射到真正驱动试点、集成和推广采纳的运营职能。'
  - id: A20
    name: "非薪酬运营支出爬坡"
    value: "非薪酬支出从试点前每月约 $9K，涨到 Y3 Q4 每月约 $26.5K。"
    unit: USD/month
    source: '[BP operations + BP risks + 创业融资经验法则] 覆盖实地差旅、图像标注、云端推理、法务/合规和合作伙伴集成成本，不假设组建大型服务团队。'
  - id: A21
    name: "现金转换口径"
    value: "现金变动等于 EBITDA。"
    unit: formula
    source: '[创业融资经验法则] 在 pre-seed 规模下，假设资本支出、税费、融资费用和营运资金时点影响可忽略不计。'
  - id: A22
    name: "稳态月度客户流失率"
    value: 1.8%
    unit: percent per month
    source: '[早期工作流 SaaS 的创业融资经验法则 + BP strategicChoices.wedgeRationale] 一旦门店网络推广上线，工作流应该有较强粘性，但由于切口仍然较窄，模型保持保守。'
  - id: A23
    name: "CAC 口径"
    value: "36 个月销售与市场支出总额，除以 6 个净新增付费客户。"
    unit: formula
    source: '[模型计算，基于基准情景 S&M 支出 + BP gtm.channels + BP gtm.funnelTargets] 涵盖整个建设期内创始人主导外拓、VC 引荐和合作伙伴销售。'
  - id: A24
    name: "融资规模设定的下一轮里程碑"
    value: "在种子轮融资前，需证明一个 40 节点以上的推广、2-3 家运营商在约、一个可复用连接器，以及第一个付费对标或报告模块。"
    unit: milestone
    source: '[BP fundingAsk.useOfFundsSummary + BP milestones 0-12 和 12-24 个月] 这是证明切口能扩展到单次降价试点之外的证据组合。'
  - id: A25
    name: "季度薪酬滚算口径"
    value: "Y2-Y3 薪酬行使用每季度内实际的按月招聘数据，而不只是季度末快照。"
    unit: convention
    source: '[人员编制列口径 + BP team startTiming] 即便人员编制表在 Y2 和 Y3 只显示年末快照，这样处理也能让薪酬行内部保持一致。'
