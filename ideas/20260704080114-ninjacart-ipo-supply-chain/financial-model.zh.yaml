    y3EbitdaK: -352.0
    cashLowPointK: 690.0
    keyAssumptionChanges:
      - "Y3 Q4 付费客户数为 4，而不是 6。"
      - "生产合同成熟年化价值退出到约 $120K，而不是 $144K，因为在运营节点密度和效果分成加购都偏弱。"
      - "毛利率退出到约 70%，因为上线和数据标注仍偏人工。"
  base:
    description: "两个 Y1 试点转化为一小批密集推广，同客户内部扩张承担了大部分增长，适度的对标模块加购把成熟客户价值推高到 BP 生产合同区间的上限附近。"
    y3RevenueK: 720.0
    y3EbitdaK: -215.9
    cashLowPointK: 954.0
    keyAssumptionChanges:
      - "第 12 个月末 2 家付费客户，Y2 Q4 达到 3 家，Y3 Q4 达到 6 家。"
      - "成熟生产客户在约 55-60 个在运营节点上达到约 $144K 年化价值，加上适度的模块和效果分成加购。"
      - "毛利率要等到可复用连接器和试点运营规程标准化之后，才能达到 75% 的目标。"
  upside:
    description: "第二个连接器缩短了上线时间，同客户内部密度扩张更快，一个邻近配送中心或批发商节点在 Y3 接入，且无需组建大型服务团队。"
    y3RevenueK: 900.0
    y3EbitdaK: -95.0
    cashLowPointK: 1035.0
    keyAssumptionChanges:
      - "Y3 Q4 付费客户数达到 7，而不是 6。"
      - "随着供应商对标和邻近节点范围更早接入，成熟客户的混合年化价值向 $150K 靠拢。"
      - "毛利率退出到约 76%，因为连接器复用比计划更快地削减了实施工作量。"
sensitivity:
  - variable: "ARPU"
    downsideCase: "生产客户价值稳定在比模型 $144K 年化值低约 10% 的水平。"
    baseCase: "成熟生产客户到 Y3 Q4 平均年化价值约 $144K。"
    upsideCase: "对标和邻近节点加购把成熟年化价值推高到约 $150K。"
    y3RevenueImpactK: -72.0
    cashImpactK: -54.0
  - variable: "CAC"
    downsideCase: "创始人渠道和投资人引荐表现不佳，CAC 升至每客户约 $135K。"
    baseCase: "由于买家群体集中且有合作伙伴引荐助力，CAC 维持在约 $110K。"
    upsideCase: "连接器合作伙伴和 VC 引荐让 CAC 更接近每客户 $95K。"
    y3RevenueImpactK: -36.0
    cashImpactK: -150.0
  - variable: "流失率"
    downsideCase: "由于切口在密集生鲜走廊之外显得过窄，月度客户流失率升至 2.5%。"
    baseCase: "推广一旦上线，月度客户流失率维持在 1.8%。"
    upsideCase: "供应商报告和合规工作流加深了客户粘性，月度客户流失率维持在约 1.2%。"
    y3RevenueImpactK: -28.0
    cashImpactK: -42.0
  - variable: "销售周期"
    downsideCase: "试点转生产的周期从约 90 天拉长到约 150 天。"
    baseCase: "一旦财务部门认可损耗基线，付费试点约一个季度即可转化。"
    upsideCase: "一个有力的首个案例研究把转化周期压缩到约 60 天。"
    y3RevenueImpactK: -108.0
    cashImpactK: -140.0
  - variable: "毛利率"
    downsideCase: "由于上线和标注仍过于依赖定制，毛利率退出到约 70%。"
    baseCase: "连接器复用和更紧凑的试点操作规程之后，毛利率退出到 75%。"
    upsideCase: "随着更多工作流实现标准化，毛利率达到 77%。"
    y3RevenueImpactK: 0.0
    cashImpactK: -36.0
  - variable: "招聘节奏"
    downsideCase: "平台岗位和第二个 GTM 招聘提前到收入尚未匹配的阶段，增加了成本却没有带来客户数增长。"
    baseCase: "成长型招聘严格卡在里程碑门槛上，大多在第一次生产环境推广上线之后才到位。"
    upsideCase: "第二个 GTM 岗位延后到第七个客户进入管线之后，既保留现金又不影响交付。"
    y3RevenueImpactK: -18.0
    cashImpactK: -96.0
modelDiagram:
  title: 单位经济模型流程
  mermaid: |
    flowchart LR
      Accounts[Target operators] --> Pilots[Paid pilots]
      Pilots --> LiveNodes[Live monitored nodes]
      LiveNodes --> Subscription[Per-node subscription]
      LiveNodes --> Gainshare[Shared savings and reporting attach]
      Subscription --> Revenue
      Gainshare --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: "收入引擎"
    finding: "基准情景由两个 Y1 试点转化为 Y3 Q4 六个密集生产客户驱动，大部分增长来自同客户内部的节点扩张，而不是大范围新客户拓展。"
  - checkName: "必须做对的事"
    finding: "销售周期和试点 ROI 必须紧贴基准敏感性假设，因为这 $2.0M 的 pre-seed 融资假设一个季度就足以把付费试点转化为 40 节点以上的推广。"
  - checkName: "模型崩溃条件"
    finding: "下行情景显示，一旦成熟客户价值跌向 $120K，或转化周期拉长到 150 天，模型会迅速走弱——因为团队仍然集成密集，现金还在持续消耗。"
  - checkName: "下轮融资证明"
    finding: "只有当一个推广跑通 40 节点以上、2-3 家运营商已签约、连接器复用得到验证，且一个付费对标模块证明切口能扩展到降价之外，下一轮融资才站得住脚。"
sanityChecks:
  ruleOf40: "Y3 增长率 130.8% + EBITDA 利润率 -30.0% = 100.8%"
  burnMultiple: "Y2 净烧钱倍数 1.8x，随着同客户内部扩张跑赢新客户支出，Y3 改善到 0.5x。"
  revenuePerFte: "$90.0K Y3（SaaS 基准 $200-400K）"
  flags:
    - "模型在 Y3 末仍低于 100 万美元年营收，说明风险投资级别的上行空间要靠邻近模块或后续地域扩张，而不能只靠印度生鲜前置仓这一个切口。"
    - "由于集成、门店变更管理和验证驱动型销售仍高度依赖人力，人均全职员工营收远低于成熟 SaaS 基准。"
    - "客户集中度很高：基准情景中只有 6 家付费客户，任何一个推广延迟都会明显影响收入和现金跑道。"
    - "毛利率目标只有在可复用连接器和试点操作规程真正减少定制化上线工作时才能实现；如果做不到，下行情景就需要更快启动下一轮融资。"
