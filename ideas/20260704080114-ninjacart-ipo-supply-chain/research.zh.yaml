  pestle:
  - factor: political
    impact: neutral
    point: 针对电商运营商的食品安全执法在收紧，这提高了流程规范的要求，但不会直接创造类似补贴的需求。
    sourceRefs:
    - 9
    - 10
  - factor: economic
    impact: positive
    point: 投资人对即时零售盈利能力的压力，让减损和利润修复成为经济上的核心购买动机。
    sourceRefs:
    - 4
    - 5
    - 32
  - factor: social
    impact: positive
    point: 便利性需求持续增长，但新鲜度在生鲜和乳制品的购物体验中仍然是敏感环节。
    sourceRefs:
    - 1
    - 2
  - factor: technological
    impact: positive
    point: 生鲜 AI、预测和降价工作流已经商业化，这降低了新进入者面临的技术可行性风险。
    sourceRefs:
    - 15
    - 18
    - 20
    - 23
  - factor: legal
    impact: negative
    point: 食品安全、保质期、追溯和个人数据方面的义务，都会增加实施负担，也提高了操作草率的代价。
    sourceRefs:
    - 9
    - 10
    - 12
    - 13
    - 14
  - factor: environmental
    impact: positive
    point: 减少食物浪费既契合可持续叙事，也带来成本改善，让这个切入点在战略上更容易站得住脚。
    sourceRefs:
    - 8
    - 19
    - 24
  adoptionFrictionMatrix:
  - friction: POS 和订单系统碎片化带来的集成摩擦
    severity: high
    affectedBuyer: 运营负责人 / IT
    mitigation: 先从一个独立的入库应用和 webhook 层起步，再深入到核心系统的写回集成。
    sourceRefs:
    - 26
    - 27
    - 28
    - 29
  - friction: 模型在不同生鲜品类间的信任度
    severity: high
    affectedBuyer: 门店运营负责人
    mitigation: 先从一小批高损耗 SKU 和人工审批阈值起步，再逐步扩大自主权。
    sourceRefs:
    - 7
    - 15
    - 20
  - friction: 门店实际运营中批次和保质期数据稀疏
    severity: medium
    affectedBuyer: 供应链分析负责人
    mitigation: 要求入库拍照、结构化原因代码，以及符合 GS1 标准的标识，快速改善数据结构。
    sourceRefs:
    - 9
    - 11
    - 12
  - friction: 摄像头和员工数据带来的隐私顾虑
    severity: medium
    affectedBuyer: 法务 / IT
    mitigation: 采用目的限定、短期保留窗口、基于角色的访问控制，并尽可能在设备端脱敏。
    sourceRefs:
    - 13
    - 14
  - friction: 核心走廊之外订单密度偏低
    severity: high
    affectedBuyer: CFO / 扩张负责人
    mitigation: 先在密度最高的城市集群起步，再向密度较低的第二波地区推进。
    sourceRefs:
    - 3
    - 30
market:
  tam:
    value: $9.6M
    rationale: "自下而上估算：（来自 Blinkit、Zepto、Instamart 和 Flipkart Minutes 的约 5,500 个大网络即时零售节点 [30][31] × 60% 生鲜适配份额，因为生鲜和乳制品在整体品类结构中仍然滞后 [1]）+ 约 700 个相邻生鲜杂货/配送中心节点估算 = 约 4,000 个相关节点；× 每个上线节点约 2,400 美元的年支出，并与损耗经济模型 [7][8] 及公开的按点位软件定价基准 [29][33] 交叉核对。"
    isEstimate: true
    sourceRefs:
    - 1
    - 7
    - 8
    - 29
    - 30
    - 31
    - 33
  sam:
    value: $4.3M
    rationale: "施加滩头市场约束：约 45% 的 TAM 节点位于 50-300 家门店部署可行的运营商和走廊之内；非一线城市 GMV 占比仍只有约 20%，规模不足的城市订单密度更弱，因此 SAM 排除了密度最薄弱的地区 [3]。"
    isEstimate: true
    sourceRefs:
    - 3
    - 30
    - 31
  som:
    value: $0.8M
    rationale: 第 3 年可触达份额建模为约 350 个上线节点（约合 7 家运营商各拿下约 50 个节点），先在密度最高的走廊验证试点后，按每节点约 2,400 美元 ARR 计算。
    isEstimate: true
    sourceRefs:
    - 3
    - 30
    - 31
bottomUpSizingDrivers:
- driver: 大网络即时零售节点数
  value: ≈5,500 个节点
  source: '[30][31] + 测算'
- driver: 该网络中生鲜适配份额
  value: 60% 估算
  source: '[1] + 估算'
- driver: 相邻生鲜杂货 / 配送中心节点
  value: ~700 估算
