    currentAlternative: "店员靠肉眼检查，没有数据记录"
    successMetric: "到货 5 分钟内完成分级的批次占比"
  - job: "某批货的变质风险越过阈值时，帮运营团队自动完成降价或调拨，这样才能把收入抢回来，而不是直接报废。"
    currentAlternative: "店员只有等变质肉眼可见才发现，然后直接报废"
    successMetric: "每店每月变质核销的下降百分比"
  - job: "准备董事会或投资人汇报时，帮供应链负责人拿出可信的减损趋势，支撑公司的盈利路径叙事。"
    currentAlternative: "靠零散案例或手工汇总估算损耗，没有统一方法论"
    successMetric: "上报董事会的损耗占收入比逐月下降幅度"
ideaScorecard:
  signalStrength:
    score: 4
    rationale: "Ninjacart 的融资、IPO 筹备和明确的减损叙事，是一个强有力、可核实的最新信号（初筛评分 4）。"
  painIntensity:
    score: 4
