problem: >-
  即时零售和生鲜电商的前置仓，如今搬运的易腐 SKU 早已超出人手和系统的设计承载，但几乎没有一家能预测某批生鲜会在未来
  6-24 小时内变质。店员只能靠肉眼判断新鲜度，降价或报废总是慢半拍，损耗核销因此成了侵蚀边际贡献利润的最大项之一——而这正是投资人在整个赛道追赶
  Ninjacart 级 EBITDA 盈利水平时反复盘问的指标。中腰部运营商没有底气像头部玩家那样自建数据科学团队，"像
  Ninjacart 一样盈利"和"还在为损耗流血"之间的差距，每个融资周期都在拉大。
targetUser:
  primary: "印度二三线城市、运营 50-300 个前置仓的 A/B 轮即时零售和生鲜电商平台的运营及供应链负责人"
  secondary: "为即时零售前置仓供货的独立区域批发商和现代渠道生鲜经销商"
  buyer: "前置仓运营商的运营负责人或供应链副总裁"
startupThesis:
  nonObviousInsight: >-
    所有人都以为生鲜这局的赢家是 Ninjacart 这类产地直采到零售的聚合平台，但真正紧迫的缺口其实在下游一层：中腰部前置仓运营商如今被按
    Ninjacart 同款 EBITDA 和损耗指标考核，却没人有 Ninjacart 那套自建数据科学能力去预测每批货的变质情况。这个缺口是一个独立的、纯软件的市场——不需要拥有卡车、仓库，也不需要农户关系。
  beachhead: "印度二三线城市、运营 50-300 个前置仓、且没有自建数据科学团队的 A/B 轮即时零售和生鲜平台运营负责人"
  wedge: "一套“拍照+App”的 SKU 入库分级工具，配合变质预测与自动降价引擎，几周内即可接入前置仓现有的 POS/库存系统，无需更换硬件。"
  whyNowCatalyst: "Ninjacart 的 IPO 筹备和 EBITDA 里程碑重置了整个生鲜品类的投资人预期，中腰部运营商现在都得拿出站得住脚的减损故事才能拿到下一轮融资。"
  ventureScalePath: "先从印度即时零售前置仓的单店变质预测和动态降价切入，扩展到跨店生鲜调拨和上游采购建议，再把变质预测模型授权给东南亚和中东北非的生鲜电商平台及餐饮批发商，最终成为所有不想自建 Ninjacart 那套技术栈的运营商的默认易腐品决策层。"
solution: >-
  先上线一个轻量入库 App，店员给刚到货的果蔬箱拍照；计算机视觉模型几秒内就能给出成熟度和次品率评分，并按批次和
  SKU 记录下来。预测层把这个评分与动销速度、门店温湿度信号、历史变质曲线结合起来，算出每批货的变质窗口。一旦某批货的风险越过阈值，系统会在运营商现有的
  App/POS 里自动触发降价，或者建议调拨到周转更快的附近门店——赶在报废之前把货救回来。同一套数据每周还会转化成上游采购反馈（哪些供应商、路线或品类损耗最高），供运营团队跟经销商重新谈判。
