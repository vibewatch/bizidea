  switchingReason: "一个纯软件插件几周内就能拿出可量化的减损效果，不用招数据科学团队，也不用换 POS 系统，省下来的钱直接体现在投资人现在紧盯的 EBITDA 指标上"
  pricingHypothesis: "按店收取月度 SaaS 费用，外加与损耗核销降幅挂钩的效果分成"
