  wedgeClarity:
    score: 4
    rationale: "从拍照入库到自动降价的闭环，是一个范围窄、可落地的首发产品，不需要拥有物流基础设施。"
  defensibility:
    score: 3
    rationale: "生鲜专属的衰变曲线数据会随着门店和 SKU 增多不断复利积累，但计算机视觉分级模型长期看仍会被资金雄厚的竞争对手复制。"
  ventureScale:
    score: 3
    rationale: "印度前置仓这个滩头市场规模不小，但要走出风险投资级别的路径，还得看能否成功扩张到邻近地区和批发商细分市场。"
topRisks:
  - name: "垂直整合的现有厂商自建同款能力"
    description: "Ninjacart 和同类获投的物流平台，可能把变质预测打包进自己的技术栈，从而挤压独立 SaaS 厂商的生存空间。"
    mitigation: "把滩头市场聚焦在明确不愿把采购控制权交给垂直整合平台的运营商上，趁现有厂商还没把这个功能列为优先级，抢先建立跨运营商的数据优势。"
  - name: "碎片化 POS 系统带来的集成摩擦"
    description: "前置仓运营商用的库存/POS 系统五花八门，有些还是自研的，这会拖慢上线速度，也会推高单客户的实施成本。"
    mitigation: "先上线一个独立的入库 App，配上简单的 API/webhook 层，让客户在深度对接 POS 之前就能先看到价值。"
  - name: "跨生鲜品类的计算机视觉分级准确率"
    description: "在有限 SKU 上训练出的成熟度和次品分级模型，未必能泛化到每家门店经营的各类果蔬上，这会削弱对降价触发机制的信任。"
    mitigation: "先从高损耗、高销量的少数 SKU 品类切入（比如叶菜、番茄、香蕉），等试点客户验证分级准确率之后，再扩大品类覆盖范围。"
