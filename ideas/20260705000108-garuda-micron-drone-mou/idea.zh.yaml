differentiator: |-
  市面上通用的 PLM 或 QMS 工具是给单一公司的内部工程数据用的；这个工作区不一样，它就是为两家独立公司必须联合向一个谁都无法完全掌控的政府买家证明认证就绪度这个特定时刻而生的。它编码的是印度特有的 CEMILAC、DGQA 和本土化含量要求，而不是通用的 ISO 质量流程；定价和范围也锁定在单个 MoU 或单个项目，而不是企业级 QMS 整体上线——那种投入，两家刚合作的公司在第一天都不会答应。
conceptDiagram:
  title: OEM-供应商联合认证流程
  mermaid: |-
    flowchart LR
      OEM[无人机集成商] --> MoU[已签署的 MoU 项目]
      供应商[部件制造商] --> MoU
      MoU --> 工作区[联合认证工作区]
      工作区 --> 清单[CEMILAC / DGQA 清单映射]
      清单 --> 缺口[证据缺口预警]
      缺口 --> 证据包[合并证据包]
      证据包 --> 标书[国防部标书提交]
