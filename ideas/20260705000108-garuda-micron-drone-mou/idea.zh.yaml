problem: |-
  像 Garuda Aerospace 这样的印度无人机 OEM，正赶着满足政府对游荡弹药和载荷型无人机的本土化要求，办法是和 Micron Instruments 这类老牌精密部件厂商临时签下 MoU。这些刚组建的两公司合作，没有任何共享系统来规划、举证并提交国防部标书要求的联合 CEMILAC 适航和 DGQA 质量保证材料包。双方各自用电子表格和邮件追踪自己的图纸、测试报告和本土化含量证明，只要有一项证据缺失或对不上，就可能在一个固定的提交窗口临近截止时，拖垮甚至取消一份价值数十亿卢比的标书资格。
targetUser:
  primary: 印度无人机 OEM（如 Garuda Aerospace）的项目或质量总监，刚通过 MoU 与老牌国防部件厂商结成合作，共同研发游荡弹药或载荷型无人机
  secondary: 合作方老牌国防部件厂商（引信、弹药或精密仪器制造商）的质量与认证负责人，需要为联合提交材料补齐配套证据
  buyer: 无人机 OEM 一方的项目副总裁或认证负责人，因为标书截止日期由他们把关，提交延误或被取消资格的代价也由他们承担
startupThesis:
  nonObviousInsight: 印度推进国防无人机本土化，逼出的是一批全新、临时拼凑的两公司合作（无人机集成商挂靠到老牌弹药和仪器厂商身上），而不是单一公司内部的扩张；市面上又没有平台来管理国防部标书要求的、跨公司的联合认证证据链。于是真正卡住 MoU 转化为落地装备速度的，不是核心技术风险，而是整合风险。
  beachhead: 过去 12 个月内与老牌国防部件厂商签署 MoU、共同研发游荡弹药或载荷型无人机，且必须为一份在途国防部标书提交联合 CEMILAC/DGQA 认证材料包的印度无人机集成商（50-500 名员工规模）
  wedge: 一个联合认证证据工作区：把 CEMILAC 适航和 DGQA 质量保证要求映射成两家合作公司共用的检查清单，按部件追踪本土化含量证明，并在提交截止日期前标出缺失或对不上的证据
  whyNowCatalyst: Garuda Aerospace 与 Micron Instruments 签下这份 MoU 时，印度无人机市场预计将突破 ₹20,000 crore——这说明 OEM 正在实实在在地组建这类临时认证合作，速度已经快过任何能管理它们的共享工具。
  ventureScalePath: 先从一对 MoU 伙伴的联合认证工作流做起，扩展到连接众多 OEM-供应商组合、贯穿 DRDO、CEMILAC 和 DGQA 流程的国防工业认证网络，最终成为国防部采购官员查阅本土化含量和适航审计记录时依赖的系统记录，覆盖印度整个无人机和弹药供应体系。
solution: |-
  一个带权限管理的共享工作区，供无人机集成商和部件制造商伙伴共同为某个具体项目（比如某型游荡弹药）规划联合 CEMILAC 适航和 DGQA 质量提交材料。平台会导入双方各自的图纸、测试报告和物料清单，将其映射到标书要求的具体认证清单项和本土化含量门槛，并标出双方实际交付内容之间的缺口或版本不一致。它按标书截止日期把提交就绪度换算成百分比，并生成用于国防部提交的合并证据包与本土化含量证书。双方的项目经理用同一个仪表盘协作，不用再在两家运行着不同内部质量系统的公司之间对电子表格和邮件往来。
goToMarketSeed:
  firstCustomer: Garuda Aerospace 或同类正筹备 IPO 的印度无人机 OEM 的项目或质量总监，目前正与老牌国防部件厂商执行第一个基于 MoU 的联合研发项目，产品是游荡弹药或载荷型无人机
  buyingTrigger: 与部件制造商伙伴新签 MoU，并拿到一个联合认证提交的固定国防部标书截止日期
  currentAlternative: 两家合作公司的质量团队之间，靠电子表格、邮件和共享网盘临时对账的手工流程
  switchingReason: 漏掉或对不上一项证据，就可能让一份价值数十亿卢比的标书被取消资格；一份共享、可审计的清单能补上这个缺口，又不用逼着任何一方去套用对方的内部质量系统
  pricingHypothesis: 按项目订阅收费，定价是标书价值的一小部分，按工作区里的认证工作流数量和合作公司数量分档
