topRisks:
- name: MoU 卡在合同落地之前
  description: 很多国防 MoU 高调宣布，却始终没转化成有资金、挂钩标书的项目，导致没有认证工作量可服务。
  mitigation: 销售前先确认 MoU 背后有在途的国防部标书或有资金支持的项目，而不是把 MoU 公告本身当成购买信号。
- name: 近期可触达市场偏小
  description: 任一年度里，追求游荡弹药或载荷型无人机的印度 OEM-供应商 MoU 组合数量有限，限制了早期收入天花板。
  mitigation: 把认证映射引擎扩展到其他由本土化驱动的国防市场，覆盖印度更广泛的弹药和无人系统供应体系，而不只是第一批 MoU 客户。
- name: 数据敏感性与保密顾虑阻碍 SaaS 采用
  description: 国防工程和测试数据常常受出口管制或涉密，让 OEM 和供应商不愿把证据放进第三方云工作区。
  mitigation: 提供本地部署或物理隔离部署选项，并把初期产品范围限定在非涉密的本土化含量和行政类认证证据，而不是涉密工程数据。
