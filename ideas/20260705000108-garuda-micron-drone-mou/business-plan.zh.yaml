slug: defence-mou-certification-os
date: '2026-07-05'
executiveSummary: |-
  像 Garuda Aerospace 这样的印度无人机集成商，正与 Micron Instruments（引信和弹药）这类老牌国防部件厂商签下临时 MoU，共同研发游荡弹药和载荷型无人机，但市面上没有任何共享系统能规划、举证并提交国防部标书要求的联合 CEMILAC 适航、DGAQA 质量和本土化含量材料包。每个合作方目前都用电子表格和邮件各自追踪图纸、测试报告和本土化含量证明，一旦有一项证据缺失或对不上，就可能拖垮甚至取消一份数十亿卢比级别的标书。这份计划瞄准一个窄切口：为一对 MoU 伙伴的一个项目做联合认证证据工作区，定价和范围都低于企业级 PLM/QMS 的承诺——那种承诺，两家刚合作的公司在第一天都不会做。研究证实，这套监管体系异常具体（CEMILAC、IMTAR、DGAQA、DAP 2020、Buy Indian-IDDM），现有厂商（Siemens、PTC、IBM DOORS、Jama、Aras）在单一公司可追溯性上很强，但没有一家预先适配印度特有的两公司证据包。近期可触达市场偏小（按研究测算，第 3 年 SOM 约 $0.7M），且仅靠单一信源的 MoU 信号支撑，所以当务之急是先确认哪些公告出的 MoU 真正挂着在途标书或有资金支持的项目，再决定要不要继续投入。这门生意能否成立，取决于能否随着印度本土化推进持续，从一对 MoU 伙伴扩展到更大的国防工业认证网络。
problem:
- |-
  印度无人机 OEM 正与老牌国防部件厂商组建全新的临时两公司合作，以满足游荡弹药和载荷型无人机的本土化要求，但双方都没有共享系统来规划或举证国防部标书要求的联合 CEMILAC/DGAQA 认证材料包。
- |-
  每个合作方都用电子表格和邮件追踪图纸、测试报告和本土化含量证明；一项证据缺失或对不上，就可能在固定提交窗口临近截止的几个月里，拖垮甚至取消一份价值数十亿卢比的标书。研究证实，MoU 能否转化为标书这一风险，目前也只有单一信源支撑，尚未得到独立验证。
solution:
- |-
  一个带权限管理的共享工作区，供无人机集成商和部件制造商伙伴为一个项目规划联合 CEMILAC 适航和 DGAQA 质量提交材料，把双方的图纸、测试报告和 BOM 映射到标书要求的具体清单项和本土化含量门槛。
- |-
  平台会标出双方实际交付内容之间的缺口或版本不一致，按标书截止日期把提交就绪度换算成百分比，并生成用于国防部提交的合并证据包与本土化含量证书——这是一层叠加，不是推倒重来替换任何一方的内部 QMS 或 PLM 系统。
whyWeWin:
- |-
  切口窄而具体——是为一对 MoU 伙伴的一个项目编排联合认证证据，而不是做一个通用合规平台；它编码了 CEMILAC、IMTAR、DGAQA 和 Buy（Indian-IDDM）本土化含量规则，而抓取到的现有厂商（Siemens、PTC、IBM DOORS、Jama、Aras）没有一家原生预先适配这套印度两公司国防标书证据包。
- |-
  针对具体领域的要求编码，加上与 CEMILAC/DGAQA 认证顾问的关系，能沉淀出一套可复用的条款-证据对照库，随着每个项目完成不断复利积累——这道护城河，通用 PLM 厂商得花上好几年做印度本地实地工作才能复制。
strategicChoices:
  beachhead: |-
    过去 12 个月内与老牌国防部件厂商签署 MoU、共同研发游荡弹药或载荷型无人机，且必须为一份在途的、明确指名的国防部标书或有资金支持的项目提交联合 CEMILAC/DGAQA 认证材料包的印度无人机集成商（50-500 名员工规模）。
  wedgeRationale: |-
    一对有在途标书截止日期的 MoU 伙伴，能快速拿出具体证明（截止日期前完成的证据项占比），又不用逼着任何一方在第一天就迁出自己的内部 QMS 或 PLM 系统。如果一开始就做更大的动作——完整的国防工业认证网络，或通用的印度全域合规套件——会在一个项目证明模式跑通之前，就把产品做散。
  sequencingRationale: |-
    产品必须先证明能端到端跑通一次联合提交（证据映射、缺口检测、材料包生成），再去投入更大的要求库或 OEM-供应商网络；销售也必须先确认有在途标书，才能去推销软件——研究显示，痛点只有在提交截止日期定下来之后才会变得尖锐，MoU 公告阶段还不算。
  notYet:
  - |-
    覆盖众多 OEM-供应商组合、DRDO 及国防部采购官员的完整国防工业认证网络，作为系统记录——推迟到至少 3-5 个项目跑通之后再做。
  - |-
    涉密或出口管制类工程数据的处理——初期范围只限于非涉密的行政、测试和本土化含量证据。
  - |-
    出口或非印度的国防认证市场——产品必须先把印度特有的 CEMILAC/DGAQA/DAP 规则编码进去，地理扩张才谈得上可信。
market:
  tam: $9.6M（研究测算：印度约 80 个认证密集型军用无人机工作流 × 每个项目约 $120k 的年度综合工作流预算）
  sam: $2.2M（研究测算：中型无人机集成商中约 18 个滩头项目，具备新建供应商/联合投标关系且有在途提交压力 × 约 $120k）
  som: 第 3 年 $0.7M（研究测算：通过直销 OEM 加顾问/集成商推荐，赢下约 6 个项目，每个约 $120k）
  segments:
  - |-
    正执行基于 MoU 的联合研发项目、生产游荡弹药或载荷型无人机的印度无人机集成商（50-500 名员工规模）
  - |-
    与新兴无人机 OEM 合作、需要提供配套本土化含量和质量证据的老牌国防部件厂商（引信、弹药、精密仪器）
  buyingProcess: |-
    一旦 MoU 转化为一个明确的标书截止日期，由 OEM 一方的项目副总裁或认证负责人发起采购；供应商一方的质量负责人是必需的共同用户，但不是经济买家，所以销售动作必须先拿下 OEM 买家，再把供应商作为附属席位接入。
product:
  mvp: |-
    一个面向单个 OEM-供应商项目组合的联合工作区，导入图纸、测试报告和 BOM 明细，将其映射到 CEMILAC/DGAQA 清单与本土化含量门槛，并针对单个标书截止日期，标出缺失或对不上的证据。
  sixMonth: |-
    新增针对标书截止日期的自动就绪度百分比追踪，以及一键生成用于国防部提交的合并证据包与本土化含量证书，并在 2-3 个付费共创客户项目上完成验证。
  twelveMonth: |-
    把要求库扩展到覆盖多条认证赛道（游荡弹药、载荷型无人机、ISR VTOL），支持 5-8 个并行的 OEM-供应商项目，并提供本地部署/受控托管选项来化解涉密数据方面的顾虑。
  twentyFourMonth: |-
    开始把多对 OEM-供应商组合连接进一套共享的条款-证据与供应商资质数据集，构成更大国防工业认证系统的早期网络层——前提是在至少 10 个已完成项目上证明单位经济模型成立。
  keyBets:
  - |-
    买家会为一个独立的证据工作区付费，前提是它被绑定到“省下一个标期”的 ROI，而不是泛泛的数字化转型支出——研究显示这一点尚未证实，需要直接验证。
  - |-
    要有足够多的 MoU 公告在 12 个月内转化为有资金、挂钩标书的工作，才能在前 1-2 个共创客户之外撑起一条持续的销售管道。
gtm:
  wedge: |-
    在公开 MoU 公告发布后立即直接向 OEM 一方的认证/项目负责人销售，但在提出软件方案之前，必须严格确认有一份明确指名、在途的国防部标书或有资金支持的项目——MoU 公告本身不算购买信号。
  channels:
  - MoU 签署后，创始人亲自联系筹备 IPO 的印度无人机 OEM 的项目/认证负责人
  - 来自 CEMILAC/DGAQA 认证顾问的推荐——他们最先看到证据缺口
  - PLM/ALM 实施商的拉动式引流，把产品定位成叠加层而非替换品
  funnelTargets: MoU 追踪线索 → 确认为在途标书/有资金支持的项目 20-30%；合格项目 → 付费试点 40-50%；试点 → 续约多项目合同 50% 以上
  pricing: |-
    按项目订阅收费，定价是标书价值的一小部分，按工作区里的认证工作流数量和合作公司数量分档；面向首次联合提交提供可选的认证顾问服务，抵消早期偏重服务的上线投入。
businessModel:
  revenueStreams:
  - 按认证工作流数量分档的按项目订阅费
  - 面向首次 OEM-供应商联合提交的可选认证顾问服务
  unitOfValue: 一个按单一标书/提交截止日期追踪的联合 OEM-供应商认证项目
  targetGrossMarginPct: 65
  expansionLevers:
  - 在现有客户内新增认证赛道（游荡弹药、载荷型无人机、ISR VTOL）
  - 从一对 OEM-供应商，扩展到同一家 OEM 下多对并行的合作组合
  - 叠加跨项目基准数据（证据项延误情况、补救责任归属、关卡耗时）
strategyMap:
  northStarMetric: 在追踪的认证项目中，能在标书截止日期前达到 100% 证据就绪度的项目占比
  inputMetrics:
  - 确认有在途标书或有资金支持截止日期的 MoU 衍生项目数量
  - 签约的付费项目工作区数量
  - 证据就绪度达到 100% 时，距截止日期的平均天数
  - OEM 客户在连续项目中的续约率
  moatsToBuild:
  - 覆盖 CEMILAC、IMTAR、DGAQA、DAP 及本土化要求的可复用条款-证据对照库
  - 专有的部件级本土化含量与供应商资质就绪度数据集
  - 与 CEMILAC/DGAQA 认证顾问的关系，作为推荐与验证渠道
  killCriteria:
  - |-
    在追踪的前 20 对 MoU 中，若 12 个月内转化为明确标书或有资金支持项目的不足 3 对，说明 MoU 转标书的管道太薄，撑不起持续的销售管道。
  - |-
    在前 5 个共创客户项目中，若愿意为软件付费（而非只为围绕提交的服务/咨询付费）的不足 2 个，说明独立产品的假设不成立。
  mermaid: |-
    flowchart LR
      切口[有明确标书的 MoU 伙伴] --> MVP[联合认证工作区]
      MVP --> 验证[截止日期前的证据就绪度百分比]
      验证 --> 扩展[多项目客户 + 认证网络]
investorMemo:
  verdict:
    call: 观察
    conviction: 切口锐利、范围清晰，痛点也确实尖锐，但证据只靠单一信源支撑，近期 TAM 又偏小——值得持续关注，等 MoU 转标书的证据坐实。
    whyBelieve: |-
      认证瓶颈正好卡在研究和初筛都指出的合资双方接口上，而现有厂商（Siemens、PTC、IBM DOORS、Jama、Aras）没有一家预先适配印度两公司标书所需的 CEMILAC/DGAQA/本土化要求。
    whyDoubt: |-
      目前只有一篇抓取到的文章能佐证 Garuda-Micron 这份 MoU 的范围和时间表，研究测算的第 3 年 SOM 也不到 $1M，而且尚未确认 OEM 会不会为独立软件付费，还是只愿意为绑定在途提交的服务买单。
    nextDiligence: |-
      建一份追踪表，覆盖近期 20 份印度国防无人机 MoU，确认未来两个季度内哪些挂着在途标书、原型试飞或提交截止日期。
  firstCustomer:
    title: 筹备 IPO 的印度无人机集成商项目或质量总监
    profile: |-
      一家 50-500 名员工规模的无人机 OEM（如 Garuda Aerospace），过去 12 个月内与老牌国防部件厂商签署 MoU，共同研发游荡弹药或载荷型无人机。
    trigger: |-
      与部件制造商伙伴新签 MoU，并拿到一个联合认证提交的固定国防部标书截止日期。
    buyer: 无人机 OEM 一方的项目副总裁或认证负责人
    initialContract: |-
      单项目试点，定价是标书价值的一小部分（研究测算的综合预算约每项目 $120k），若试点按时拿下标书，就转为多项目订阅。
  mustBeTrue:
  - 在追踪的前 20 对 MoU 中，至少有 3-5 对能在 12 个月内转化为明确、有资金支持的标书。
  - OEM 买家会为绑定“省下一个标期” ROI 的独立软件付费，而不是只愿意为咨询服务买单。
  - 非涉密的行政、测试和本土化含量证据，能放进共享云工作区，而不引发前 2-3 个共创客户的保密顾虑。
  - CEMILAC/DGAQA/本土化要求的条款-证据对照库，能比现有 PLM/ALM 厂商加装印度专属模块更快建成并验证。
  - 在前两个季度内，至少有一段认证顾问或咨询关系转化为一条合格的推荐线索。
  diligenceQuestions:
  - Garuda-Micron 这份 MoU，能否独立追溯到一个具体的、有资金支持的项目或标书时间表，而不只是公告阶段的报道？
  - 在印度约 600 家无人机相关企业中，目前有多少家和部件制造商签有在途 MoU，并挂着明确指名的国防部标书截止日期？
  - 目标买家目前在认证上的支出，有多少花在顾问/人力，多少花在软件？他们愿不愿意把这部分预算挪过来？
  - 对前几个共创客户而言，哪些证据材料能放进共享云工作区，哪些必须走本地部署/物理隔离？
operatingAssumptions:
- assumption: |-
    相当一部分公告出的 OEM-供应商 MoU，会在 12 个月内转化为有资金支持、挂钩标书的认证工作，而不是停留在公告阶段。
  basis: research.yaml
  validationTest: |-
    追踪近期 20 份印度国防无人机 MoU，核实其中有多少在两个季度内挂着在途标书、原型试飞或提交截止日期。
  decisionImpact: |-
    如果转化不足 3-5 份，说明这个滩头市场太薄，撑不起一家独立公司，计划就必须转向更宽泛的合规咨询模式或换一个切入点。
- assumption: |-
    OEM 买家会为一份独立软件订阅付费，而不是只肯出钱请顾问或买绑定在途提交的服务。
  basis: research.yaml
  validationTest: |-
    按研究的验证计划，访谈 8-10 位 OEM 认证或项目负责人，比较他们在一个在途标书上，工程师、顾问和进度延误各自占用的预算。
  decisionImpact: |-
    如果买家只肯为服务付费，商业模式就要从 SaaS 订阅转向服务主导、利润率更低、扩张更慢的模式，融资额度和招聘计划也要跟着改。
- assumption: |-
    非涉密的行政、测试和本土化含量证据，能放进共享云工作区处理，而不会给早期共创客户带来保密或出口管制方面的顾虑。
  basis: research.yaml
  validationTest: |-
    用一份脱敏证据集，在一家 OEM 和一家供应商之间试点，明确把受控工程数据和行政、本土化材料分开处理。
  decisionImpact: |-
    如果云端部署被卡住，产品从第一天起就得走本地部署/物理隔离，服务成本会上升，销售周期也会变慢，融资额度也要跟着调整。
- assumption: |-
    这个印度特有的窄切口（面向两公司项目的 CEMILAC/DGAQA/本土化映射），能扛住现有 PLM/ALM 厂商加装印度专属模块的冲击。
  basis: 经营判断
  validationTest: |-
    监测 Siemens、PTC、IBM、Jama 或 Aras 是否会在 12-18 个月内推出印度国防专属认证模块或合作关系。
  decisionImpact: |-
    如果有现有厂商先动手，创业公司就必须加快建立跨项目基准数据这类网络型护城河，或把自己重新定位成叠加/集成伙伴，而不是独立系统。
experimentRoadmap:
- horizon: 0-90 天
  experiment: 建一份追踪表，覆盖近期 20 份印度 OEM-供应商国防无人机 MoU
  hypothesis: 在追踪窗口内，20 份 MoU 里至少有 3-5 份会显现出在途标书或有资金支持项目的迹象
  successMetric: 确认挂着明确指名标书/提交截止日期的追踪 MoU 数量
  owner: 创始人/CEO
- horizon: 0-90 天
  experiment: 访谈 8-10 位 OEM 认证/项目负责人，了解目前认证支出的分配情况
  hypothesis: 如果软件能明显缩短就绪时间，买家会把一部分顾问/人力预算挪过去
  successMetric: 能明确说出愿意重新分配的预算项的受访者人数
  owner: 创始人/CEO
- horizon: 3-6 个月
  experiment: 与一对 OEM-供应商伙伴，在一份在途标书上跑一次付费试点
  hypothesis: 相比手工流程，这个工作区能在标书截止日期前把证据就绪度提到 100%，且缺件事故更少
  successMetric: 证据就绪度百分比，以及达到 100% 就绪度时距截止日期的天数
  owner: 创始人 + 第一位工程师
- horizon: 3-6 个月
  experiment: 在一家 OEM 和一家供应商之间，试点一套脱敏（仅限非涉密）证据集
  hypothesis: 行政、测试和本土化含量证据，能放进共享云工作区处理，而不引发保密方面的顾虑
  successMetric: 试点完成，且没有出现因保密问题引发的数据处理例外情况
  owner: 创始人 + 第一位工程师
- horizon: 6-12 个月
  experiment: 与一位 CEMILAC/DGAQA 认证顾问或咨询机构建立推荐关系
  hypothesis: 认证顾问会推荐合格的 OEM-供应商项目，因为他们本来就在提交前看到证据缺口
  successMetric: 通过该顾问关系获得的合格线索数量
  owner: 创始人/CEO
- horizon: 6-12 个月
  experiment: 把要求库扩展到游荡弹药之外的第二条认证赛道（载荷型无人机或 ISR VTOL）
  hypothesis: 条款-证据映射引擎能在不同认证赛道之间通用，不需要推倒重做
  successMetric: 映射新认证赛道所需时间，相对第一条赛道的比较
  owner: 第一位工程师
operations:
- 把 CEMILAC/IMTAR/DGAQA/DAP/本土化要求库编码成核心映射引擎
- 维护与 CEMILAC/DGAQA 认证顾问的关系，作为推荐与验证伙伴
- 支持本地部署或受控托管选项，化解涉密数据带来的采用阻力
- 用认证顾问服务的合作机会，资助并验证首次 OEM-供应商联合上线
team:
- role: 创始工程师（合规映射与工作流引擎）
  startTiming: 第 0 个月
  rationale: |-
    核心产品赌注是要求-证据映射引擎；必须先在一个真实项目材料包上把它建成并验证，才能让后续的销售扩张站得住脚。
- role: 领域/认证顾问（CEMILAC/DGAQA 专家，兼职或合同制）
  startTiming: 第 0 个月
  rationale: |-
    要正确编码印度特有的认证和本土化要求，需要直接接触认证专家；这也是计划中作为推荐渠道的关系。
- role: 创始人主导销售/客户成功
  startTiming: 第 0 个月
  rationale: |-
    MoU 签署后由创始人直接联系项目/认证负责人，是已确认的首个销售动作；在前 2-3 个付费试点拿下之前，没理由招一位专职销售。
- role: 第二位工程师（部署/本地部署与集成）
  startTiming: 第 9 个月
  rationale: |-
    一旦第二批共创客户出现涉密数据方面的顾虑，本地部署/受控托管以及 PLM 叠加集成就变得必要。
milestones:
- horizon: 0-12 个月
  items:
  - 完成覆盖 20 份公告出的印度国防无人机 OEM-供应商合作的 MoU 转标书追踪表
  - 拿下 2-3 个在途标书上的付费共创客户项目
  - 至少 1 个项目在截止日期前达到 100% 证据就绪度
  - 通过 8-10 次买家访谈验证独立软件的付费意愿
- horizon: 12-24 个月
  items:
  - 扩展到 5-8 个并行的 OEM-供应商项目工作区
  - 上线本地部署/受控托管选项
  - 与一位 CEMILAC/DGAQA 认证顾问建立至少一段推荐关系
  - 覆盖至少两条认证赛道（游荡弹药与载荷型无人机/ISR VTOL）
- horizon: 24-36 个月
  items:
  - 达成 10 个以上已完成项目，并证明能在连续标期中续约
  - 开始把多对 OEM-供应商组合连接进一套共享的条款-证据数据集
  - 评估是否扩展到超出首批 MoU 群体的更大国防工业认证网络
risks:
- risk: 许多公告出的国防 MoU 始终未能转化为有资金支持、挂钩标书的项目
  likelihood: High
  impact: High
  mitigation: |-
    销售前先确认 MoU 背后挂着在途国防部标书或有资金支持的项目，不要把 MoU 公告本身当成购买信号。
- risk: 近期可触达市场偏小，压低了早期收入天花板
  likelihood: High
  impact: Medium
  mitigation: |-
    把认证映射引擎扩展到其他由本土化驱动的国防市场，覆盖首批 MoU 群体之外印度更广泛的弹药和无人系统供应体系。
- risk: 数据敏感性与保密顾虑阻碍 SaaS/云端采用
  likelihood: Medium
  impact: High
  mitigation: |-
    提供本地部署或物理隔离部署选项，并把初期产品范围限定在非涉密的本土化含量和行政类认证证据，而不是涉密工程数据。
- risk: 现有 PLM/ALM 厂商（Siemens、PTC、IBM、Jama、Aras）把印度专属认证清单能力打包进更大的套件
  likelihood: Medium
  impact: Medium
  mitigation: |-
    在印度特有的要求编码和跨项目基准数据上跑得比通用套件更快，并把自己定位成能与那些工具集成的叠加层，而不是正面争夺企业级 PLM 预算。
- risk: 买家只愿意出钱请顾问/咨询，而不肯为独立软件订阅付费
  likelihood: Medium
  impact: High
  mitigation: |-
    早期交易中把认证顾问服务和软件打包销售以证明价值，等就绪时间上的 ROI 得到验证后，再逐步拆分成软件主导的模式。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $0.5-1.5M
  runwayMonths: 18
  useOfFundsSummary: |-
    18 个月的现金跑道，用于养一位创始工程师和一位兼职认证领域顾问，把映射引擎建成并在 2-3 个付费共创客户项目上验证；创始人亲自主导销售，确认并拿下 MoU 衍生的标书；并在第 9 个月左右招募第二位工程师，在涉密数据顾虑出现后上线本地部署/受控托管。
