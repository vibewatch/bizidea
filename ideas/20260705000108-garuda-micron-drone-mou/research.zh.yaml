  sensitivityCases:
  - case: 拟议的新无人机激励政策与分阶段无人机支出计划大致按计划推进
    impact: 正面影响：更多 OEM 和供应商会从公告阶段的合作走向有资金支持、认证密集的项目，活跃工作区数量随之扩大。
    sourceRefs:
