    - 20
    - 21
  - case: 涉密数据规则或客户内部政策，逼得部署提前采用物理隔离方案
    impact: 负面影响：上线变得更依赖人力服务、速度更慢，会压缩软件毛利，也拖慢公司的推进速度。
    sourceRefs:
    - 7
