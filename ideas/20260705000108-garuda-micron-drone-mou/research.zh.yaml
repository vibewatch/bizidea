  - case: PLM/ALM 现有厂商把“够用就行”的清单核对与提交报告功能打包进更大的套件
    impact: 负面影响：除非能证明就绪速度明显更快、遗漏证据明显更少，否则这家初创公司可能会被困成一个狭窄的咨询式叠加层。
