competitors:
- name: Siemens Teamcenter + Polarion
  stage: 现有厂商
  wedge: 面向复杂、高合规要求产品开发的 PLM + ALM 数字线程，提供端到端可追溯性。
  pricing: Teamcenter X 公开分级报价，企业级扩展另行报价；Polarion 走联系销售/报价制。
  strength: 在企业级技术栈里，PLM、生命周期可追溯性、供应商协作与审计就绪度的组合覆盖面最广。
  weaknessVsUs: 定位是企业级全生命周期管控，没有预先适配印度国防监管机构，也不针对单份跨公司标书证据包。
  sourceRefs:
  - 31
  - 32
  - 33
  - 34
- name: PTC Windchill + Codebeamer
  stage: 现有厂商
  wedge: 面向航空航天与国防的数字工程底座，主打就绪度、PLM 与 ALM 定位。
  pricing: 定制化企业报价 / 联系销售。
  strength: 在认证风险、就绪度，以及打通工程/制造/服务流程方面叙事有力。
  weaknessVsUs: 本质仍是宽泛的转型软件，默认客户拥有内部系统主导权，且需要大量配置工作。
  sourceRefs:
  - 35
  - 36
  - 37
- name: IBM DOORS Next
  stage: 现有厂商
  wedge: 面向受监管、软件定义类项目的需求管理底座。
  pricing: 定制化企业报价。
  strength: 为大型工程组织提供深度的需求治理、审批与合规可追溯性。
  weaknessVsUs: 以需求为中心，而非跨两家公司、逐部件编排证据，也不针对 MoD 专项举证。
  sourceRefs:
  - 38
- name: Jama Connect
  stage: 成长期
  wedge: 面向安全关键与机载系统开发的可追溯性与需求管理。
  pricing: 定制化企业报价。
  strength: 认证相关的产品话术有力，也有客户案例证明可追溯性能替代重度依赖 Word/Excel 的审查流程。
  weaknessVsUs: 仍以需求和设计保障为核心，不涉及印度特有的供应商证据、本土化或标书就绪度流程。
  sourceRefs:
  - 39
- name: Aras Innovator
  stage: 现有厂商
  wedge: 可定制的数字线程平台，覆盖产品工程、质量、技术文档与项目管理。
  pricing: 定制化企业报价 / 平台主导定价。
  strength: 灵活的平台，能把需求、质量、文档与生命周期数据整合进同一个模型。
  weaknessVsUs: 需要定制开发和系统集成，不是能直接交给一对有截止日期压力的印度无人机合作方使用的现成工作区。
  sourceRefs:
  - 40
