  validationPlan:
  - priority: 高
    question: 有多少新签的 OEM-供应商 MoU，会在 12 个月内转化为有资金、与标书挂钩的认证工作？
    evidenceToGather: 建一个实时追踪器，覆盖 20 起近期印度国防无人机合作，核实哪些已有在途标书、原型试飞或提交截止日期。
  - priority: 高
    question: 针对游荡弹药和载荷型无人机项目，CEMILAC、DGAQA 和 Buy（Indian-IDDM）证据包之间，究竟有哪些共通的证据项？
    evidenceToGather: 收集三份真实的项目证据包或顾问清单，梳理其中重叠的表格、签字、测试报告和本土化含量计算。
  - priority: 中
    question: 买家会为软件付费，还是只愿意为围绕某次提交的项目服务付费？
    evidenceToGather: 访谈 8-10 位 OEM 一方的认证或项目负责人，比较他们在工程师、顾问上的现有支出，以及某次在途投标的延期情况。
  - priority: 中
    question: 哪些数据可以放进共享工作区，而不会触发涉密或物理隔离方面的反对？
    evidenceToGather: 与一家 OEM 和一家供应商试点一套脱敏证据集，把受控工程数据与行政、测试、本土化类证据区分开。
