  - variable: CAC
    downsideCase: $50K CAC if each program needs more founder travel and direct qualification effort
    baseCase: $43K CAC through founder-led sales plus advisor referrals
    upsideCase: $38K CAC if referrals convert with less direct pursuit cost
    y3RevenueImpactK: 0.0
    cashImpactK: -21.0
  - variable: churn
    downsideCase: 3.0% monthly churn when completed tenders do not reliably turn into follow-on program work
    baseCase: 2.5% monthly churn
    upsideCase: 2.0% monthly churn when OEMs reuse the workspace on successive programs
    y3RevenueImpactK: -48.3
    cashImpactK: -44.4
  - variable: sales cycle
    downsideCase: One Y2 and one Y3 program launch slip by roughly one quarter
    baseCase: 10 cumulative paid program launches over 36 months
    upsideCase: One extra late-Y2 close and one extra Y3 close land inside the same budget cycle
    y3RevenueImpactK: -134.6
    cashImpactK: -114.8
  - variable: gross margin
    downsideCase: Steady-state gross margin stays around 63%-64% because deployment remains services-heavy
    baseCase: Steady-state gross margin reaches about 65%
    upsideCase: Steady-state gross margin reaches about 66%-67% after template reuse improves
    y3RevenueImpactK: 0.0
    cashImpactK: -28.3
  - variable: hiring pace
    downsideCase: Pull the sales hire and third engineer forward by one quarter before repeatability is proven
    baseCase: Sales hire starts in M16 and third engineer starts in M27
    upsideCase: Keep the third engineer hire back until second-track demand is clearly pulling through
    y3RevenueImpactK: 0.0
    cashImpactK: -43.5
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      PublicMoUs --> QualifiedTenders
      AdvisorReferrals --> QualifiedTenders
      QualifiedTenders --> PaidPrograms
      PaidPrograms --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: Revenue engine
    finding: The base case reaches about $0.75M Y3 revenue by launching 10 paid programs over 36 months and ending with roughly 6.5 active program workspaces at the researched $120K annual value.
  - checkName: Must go right
    finding: Announced MoUs must convert into live tender-linked work often enough to support four Y2 launches without forcing an early second GTM hire.
  - checkName: Model breaks if
    finding: If two planned program launches slip and onboarding keeps gross margin closer to 64%, downside cash compresses toward about $50K and a bridge round is likely.
  - checkName: Next-round proof
    finding: A seed case exists only after one on-time joint submission, a second certification track, one advisor-led referral, and about five active paid programs are proven by Q4Y2.
sanityChecks:
  ruleOf40: Y3 growth 36.8% + EBITDA margin -12.4% = 24.4%
  burnMultiple: Y3 burn multiple 0.5x (-$92.8K EBITDA on $201.8K net new revenue)
  revenuePerFte: $150K Y3 using 5 Q4Y3 FTE (benchmark $200-400K SaaS)
  flags:
    - Year-3 revenue lands only slightly above the researched ~$0.7M SOM, so the business still looks subscale unless it expands beyond the first MoU wedge.
    - Revenue per FTE stays below typical SaaS benchmarks because onboarding, tender qualification, and advisor-led delivery remain engineering-heavy through Y3.
    - The model still assumes enough public MoUs convert into live tenders to support 10 paid launches in 36 months, which research explicitly labels an open validation question.
    - Gross margin reaches the BP target only after repeatable templates emerge; earlier air-gapped or on-prem demands would pressure both runway and the funding ask.
