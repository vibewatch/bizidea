scenarios:
  downside:
    description: MoU-to-tender conversion is slower, one late-Y2 and one late-Y3 program slip out, and onboarding remains more bespoke than planned.
    y3RevenueK: 589.5
    y3EbitdaK: -209.6
    cashLowPointK: 49.9
    keyAssumptionChanges:
      - Cumulative paid program launches fall from 10 to 8 because one Y2 and one Y3 close slip out.
      - Monthly program churn rises to 2.8% as some tender-cycle work does not renew into the next bid.
      - Steady-state gross margin exits around 64% instead of 66% because more onboarding remains services-heavy.
  base:
    description: Three Y1 design partners grow into a lean 10-program, 36-month launch path without adding a large GTM team.
    y3RevenueK: 750.7
    y3EbitdaK: -92.8
    cashLowPointK: 214.0
    keyAssumptionChanges:
      - Paid program launches land at 3 in Y1, 4 in Y2, and 3 in Y3 for 10 cumulative programs.
      - Blended annual revenue per active paid program stays at the researched $120K level.
      - Gross margin rises into the 64%-66% range as the mapping library and controlled-hosting patterns become repeatable.
  upside:
    description: Advisor referrals and repeatable templates pull forward one extra late-Y2 close and one extra Y3 close while pricing and margin improve modestly.
    y3RevenueK: 950.9
    y3EbitdaK: 47.4
    cashLowPointK: 351.4
    keyAssumptionChanges:
      - Blended annual revenue per active paid program improves to about $126K as advisory and multi-track attach increase.
      - One extra late-Y2 program and one extra Y3 program close without adding a second sales hire.
      - Monthly churn improves to 2.2% and steady-state gross margin exits near 67% as template reuse compounds.
