openQuestions:
- Can the Garuda-Micron partnership be independently tied to a specific funded program, tender, or certification timeline beyond the announcement-stage coverage?
- How many recent Indian OEM-supplier drone MoUs actually convert into live CEMILAC/DGAQA submission work within 12 months?
- Which evidence artifacts can remain in a shared cloud workspace versus requiring on-prem or air-gapped handling?
- Will OEM buyers fund a standalone workflow product, or will they only buy services bundled with consultants or incumbent PLM rollouts?
