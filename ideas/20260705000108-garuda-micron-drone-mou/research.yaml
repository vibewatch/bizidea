  validationPlan:
  - priority: high
    question: How many fresh OEM-supplier MoUs convert into funded, tender-linked certification work within 12 months?
    evidenceToGather: Build a live tracker of 20 recent Indian defence-UAV partnerships and verify which ones have active tender, prototype-flight, or submission deadlines.
  - priority: high
    question: Which exact artifact sets are common across CEMILAC, DGAQA, and Buy (Indian-IDDM) evidence packs for loitering-munition and payload-UAV programs?
    evidenceToGather: Collect three real program packs or consultant checklists and map overlapping forms, signatures, test reports, and indigenous-content calculations.
  - priority: medium
    question: Will buyers fund software, or only project services wrapped around a live submission?
    evidenceToGather: Interview 8-10 OEM certification or program heads and compare current spend on engineers, consultants, and schedule slippage for one active bid.
  - priority: medium
    question: What data can live in a shared workspace without triggering classification or air-gap objections?
    evidenceToGather: Pilot a sanitized evidence set with one OEM and one supplier, distinguishing controlled engineering data from administrative, test, and indigenisation artifacts.
