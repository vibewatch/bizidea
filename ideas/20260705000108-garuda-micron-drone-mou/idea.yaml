topRisks:
  - name: MoUs stall before real contracts
    description: Many defence MoUs are announced with fanfare but never convert into funded, tender-linked programs, leaving no certification workload to serve.
    mitigation: Qualify prospects by confirming an active MoD tender or funded program tied to the MoU before selling, rather than treating the MoU announcement alone as a buying signal.
  - name: Small near-term addressable market
    description: The number of Indian OEM-supplier MoU pairs pursuing loitering munitions or payload UAVs in any given year is limited, capping early revenue.
    mitigation: Expand the certification-mapping engine to other indigenization-driven defence markets and to India's broader munitions and unmanned-systems supply base beyond the first MoU cohort.
  - name: Data-sensitivity and classification concerns block SaaS adoption
    description: Defence engineering and test data is often export-controlled or classified, making OEMs and suppliers reluctant to put evidence into a third-party cloud workspace.
    mitigation: Offer an on-premises or air-gapped deployment option and scope the initial product to unclassified indigenization-content and administrative certification evidence rather than classified engineering data.
