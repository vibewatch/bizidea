scenarios:
  downside:
    description: MoU 转标书的速度放缓，一个第 2 年末和一个第 3 年末的项目延期跳票，上线过程也比计划更依赖定制化。
    y3RevenueK: 589.5
    y3EbitdaK: -209.6
    cashLowPointK: 49.9
    keyAssumptionChanges:
    - 累计付费项目上线数从 10 个降到 8 个，因为一个第 2 年和一个第 3 年的成交延期跳票。
    - 月项目流失率升到 2.8%，因为部分标期工作没能续入下一个标期。
    - 稳态毛利率收在约 64% 而非 66%，因为更多上线过程仍偏重服务投入。
  base:
    description: 三个第 1 年共创客户，成长为一条 36 个月、10 个项目的精简上线路径，不需要组建庞大的 GTM 团队。
    y3RevenueK: 750.7
    y3EbitdaK: -92.8
    cashLowPointK: 214.0
    keyAssumptionChanges:
    - 付费项目上线数第 1 年 3 个、第 2 年 4 个、第 3 年 3 个，累计 10 个项目。
    - 每个活跃付费项目的年化综合收入维持在研究测算的 $120K 水平。
    - 随着映射库和受控托管模式变得可复用，毛利率升到 64%-66% 区间。
  upside:
    description: 顾问推荐和可复用模板，把一个原本在第 2 年末和一个第 3 年的成交都提前拉进来，同时定价和利润率也小幅改善。
    y3RevenueK: 950.9
    y3EbitdaK: 47.4
    cashLowPointK: 351.4
    keyAssumptionChanges:
    - 随着顾问服务和多赛道搭售增加，每个活跃付费项目的年化综合收入提升到约 $126K。
    - 多拿下一个第 2 年末项目和一个第 3 年项目，且不需要新增第二位销售。
    - 月流失率改善到 2.2%，随着模板复用不断积累，稳态毛利率收在约 67%。
sensitivity:
- variable: ARPU
  downsideCase: 每个活跃付费项目年化综合收入 $114K
  baseCase: 每个活跃付费项目年化综合收入 $120K
  upsideCase: 每个活跃付费项目年化综合收入 $126K
  y3RevenueImpactK: -37.2
  cashImpactK: -44.8
- variable: CAC
  downsideCase: 如果每个项目都需要更多创始人差旅和直接资质核实工作，CAC 为 $50K
  baseCase: 靠创始人主导销售加顾问推荐，CAC 为 $43K
  upsideCase: 如果推荐线索的直接跟进成本更低，CAC 为 $38K
  y3RevenueImpactK: 0.0
  cashImpactK: -21.0
- variable: 流失率
  downsideCase: 如果已完成的标书不能稳定转化为后续项目工作，月流失率为 3.0%
  baseCase: 月流失率 2.5%
  upsideCase: 如果 OEM 在连续项目中重复使用同一工作区，月流失率为 2.0%
  y3RevenueImpactK: -48.3
  cashImpactK: -44.4
- variable: 销售周期
  downsideCase: 一个第 2 年和一个第 3 年的项目上线延期约一个季度
  baseCase: 36 个月内累计 10 个付费项目上线
  upsideCase: 多拿下一个第 2 年末成交和一个第 3 年成交，且都落在同一预算周期内
  y3RevenueImpactK: -134.6
  cashImpactK: -114.8
- variable: 毛利率
  downsideCase: 由于部署仍偏重服务投入，稳态毛利率维持在约 63%-64%
  baseCase: 稳态毛利率达到约 65%
  upsideCase: 模板复用改善后，稳态毛利率达到约 66%-67%
  y3RevenueImpactK: 0.0
  cashImpactK: -28.3
- variable: 招聘节奏
  downsideCase: 在可复用性得到验证之前，把销售岗和第三位工程师的招聘都提前一个季度
  baseCase: 销售岗从第 16 个月起步，第三位工程师从第 27 个月起步
  upsideCase: 把第三位工程师的招聘往后推，直到第二条赛道的需求明显拉动为止
  y3RevenueImpactK: 0.0
  cashImpactK: -43.5
modelDiagram:
  title: 单位经济流转
  mermaid: "flowchart LR\n  公开MoU --> 合格标书\n  顾问推荐 --> 合格标书\n  合格标书 --> 付费项目\n  付费项目 --> 收入\n  收入 --> 毛利润\n  毛利润 --> 现金\n"
modelSanity:
- checkName: 收入引擎
  finding: 基线情形靠 36 个月内上线 10 个付费项目，到年末维持约 6.5 个活跃项目工作区（按研究测算的 $120K 年化价值），第 3 年收入达到约 $0.75M。
- checkName: 必须跑通的地方
  finding: 公告出的 MoU 必须足够频繁地转化为在途标书挂钩的工作，才能支撑第 2 年 4 次上线，而不用被迫提前招募第二位 GTM 人员。
- checkName: 模型会在哪种情况下失灵
  finding: 如果两个计划中的项目上线跳票，且上线过程让毛利率维持在接近 64%，下行情形的现金会压缩到约 $50K 左右，很可能需要一轮过桥融资。
- checkName: 下一轮融资证明点
  finding: 只有在 Q4Y2 前验证了一次按时的联合提交、一条第二认证赛道、一段顾问引荐关系，以及约五个活跃付费项目之后，种子轮的理由才站得住。
sanityChecks:
  ruleOf40: 第 3 年增长 36.8% + EBITDA 利润率 -12.4% = 24.4%
  burnMultiple: 第 3 年 burn multiple 为 0.5x（-$92.8K EBITDA，对应 $201.8K 净新增收入）
  revenuePerFte: 第 3 年按 5 名 Q4Y3 FTE 计算，每名 FTE 约 $150K 收入（SaaS 基准约 $200-400K）
  flags:
  - 第 3 年收入只略高于研究测算的约 $0.7M SOM，除非扩展到第一个 MoU 切口之外，否则这门生意的体量仍显偏小。
  - 由于上线、标书资质核实和顾问主导交付在第 3 年之前都偏重工程投入，每名 FTE 的收入仍低于典型 SaaS 基准。
  - 模型仍然假设有足够多的公开 MoU 转化为在途标书，才能撑起 36 个月内 10 次付费上线——而研究明确把这一点标为尚待验证的开放问题。
  - 毛利率只有在可复用模板出现之后，才能达到商业计划的目标；更早出现的物理隔离或本地部署需求，会同时挤压现金跑道和融资额度。
