slug: drone-propulsion-ramp-os
date: '2026-06-02'
executiveSummary: 推进件爬坡 OS 是面向美国国防无人机 OEM 的供应侧控制平面，服务对象是正在开第二、第三装配点、却被稀缺电机或小型喷气发动机卡住产出的公司。最急的痛点不是泛泛的工厂可视化，而是每周都要拍板：哪一批受限推进件该发往哪座工厂、哪条机型、配哪套放行材料，既不能让产线停住，也不能让重点项目断粮。最理想的首个客户，是一家 150–800 人的无人机制造商：有一个在跑的 Pentagon 支持项目，12 个月内有新厂上线，而分配会议还在靠表格、ERP 导出和供应商电话推进。MVP 应该先挂在一条机型、最多两座工厂之上，接入批次状态、工厂产能、项目优先级和放行证据，给出下一轮分配建议，并在物料流动前把阻塞点亮出来。GTM、定价和实施都围着一个可量化承诺转：在真实工厂爬坡期，别让推进件短缺带来排期滑坡，而且不去替换 ERP、PLM 或 MES。研究支持这件事确有需求，也撑得起六位数 ACV；但滩头市场很窄，模型里的 SAM 只有 $29.0M、Y3 SOM 只有 $3.6M，所以向相邻受限零件和更多项目扩张不是可选项，而是必选项。真能形成护城河，靠的是批次-工厂-机型结果数据、可复用的放行材料模板，以及能适配 CUI、ITAR 和 Blue UAS 证据要求的部署模式。最大的反证风险有三个：推进件并不经常是每周真正的主瓶颈；独立叠加层抢不到预算，反而被现有套件吸收；或者安全部署要求太重，让 pilot 过慢、服务化过深。
problem:
- 无人机 OEM 从一个工厂扩展到分布式工厂网络，仍然通过电子表格、ERP 解决方法、供应商电话和每周跨职能会议来分配稀缺的推进环节。
- 一个错误的批次分配决策可能会导致一条新航线闲置，使最高优先级的飞机系列挨饿，或者由于出处、资格或现场准备情况证据不完整而引发发布延迟。
- 现有的 ERP、PLM 和 MES 工具记录库存和可追溯性，但它们不拥有针对国防特定的每周选择，即下一个稀缺发动机或发动机批次应在站点和项目中流向何处。
solution:
- 构建安全分配覆盖，将推进批次状态、站点容量、项目优先级和发布准备证据结合到针对多个站点的一款飞机系列的每周建议中。
- MVP 应显示哪批产品发往哪个地点、如果决定发生变化哪些输出将被阻止，以及装运前所需的谱系、工作说明和批准包是否完整。
- 最初的部署故意缩小范围：一个现役飞机系列，最多两个站点，从现有系统导出或 API 馈送的数据，以及一个实时坡道里程碑，可以测量避免的线路空闲事件。
whyWeWin:
- 楔子是一个决策层，而不是另一个记录系统，这使得产品更容易进入根深蒂固的国防制造堆栈。
- 价值与现任者目前未能彻底解决的董事会级运营事件相关：在可追溯性和发布约束下每周分配受限推进环节。
- 每个部署都会混合有关批次结果、现场准备情况、供应商可靠性和发布包​​重用的专有数据，而通用套件不会自然地聚合这些数据。
- 市场时机是有利的，因为 Pentagon 需求、新工厂和 Blue UAS 来源压力正在推动买家从原型模式转向可重复吞吐量。
strategicChoices:
  beachhead: 美国国防无人机 OEM 具有 2-5 组装场地，是一种主动消耗性打击或独立于跑道的飞机系列，并且在现场生产过程中固体火箭发动机或小型喷气发动机经常出现短缺。
  wedgeRationale: 这一滩头阵地产生了最快的证据，因为用户、买家、触发因素和投资回报率是紧密结合的：运营副总裁首先感受到痛苦，网站开放或错过构建里程碑会触发预算，而成功是可以衡量的，因为推进驱动的生产线停止次数更少，一个在线家庭的发布准备速度更快。更广泛的工厂软件或多组件规划会减慢验证速度，并在初创公司获得参考之前进行直接的现有比较。
  sequencingRationale: 产品应该从一个系列的导出数据分配和发布数据包编排开始，因为这是证明价值的最小工作流程，无需完整的安全或架构重组。在最初的几次部署中，GTM 保持了创始人主导和实施为主的状态，因为安全审查、系统映射和运营信任比漏斗顶部的数量更重要。招聘遵循以下顺序：首先是工作流工程和前向部署，其次是安全强化，只有在公司能够展示一种可重复的部署模式和一种扩展路径后才能扩大销售规模。
  notYet:
  - 完整 ERP、PLM 或 MES 替代品
  - 分类任务规划或命令与控制工作流程
  - Pentagon 或 primes 的买方采购分析
  - 在三个生产参考上线之前进行非国防制造扩张
  - 推进前广泛的多组件优化被证明是第一个可重复的楔子
market:
  tam: $0.13B 的自下而上 TAM，按约 120 家美国及盟友的国防 UAS 或消耗型打击制造商 / 项目组估算；这些买家需要合规的多站点分配软件，按每个“机型 × 站点”部署约 $350k ACV 计。
  sam: $29.0M 的初始 SAM，按约 25 家近期美国买家估算；这些买家已经在运营或正在新开多个站点，单个 ACV 约 $330k。
  som: $3.6M 的第 3 年 SOM，按 6 家客户、每家约 2 个站点、单个部署约 $300k ACV，并通过直销与重集成部署拿下计算。
  segments:
  - 主要：美国国防无人机 OEM，员工规模 150-800 人，已有一条 Pentagon 支持的在产机型，并运营 2-5 个分布式装配点
  - 第二：一旦相同的释放和分配模型推广到推进之外，相邻的自主飞机或徘徊弹药制造商
  buyingProcess: 实际的做法是，当新站点开业或分配错误已经威胁到生产里程碑时，由创始人领导的准备情况审核。经济买家通常是自主系统业务的 COO、运营副总裁或总经理，但质量、安全、供应链和企业架构利益相关者会影响采用，因为工作流程涉及 CUI、ITAR 和现有记录系统。
product:
  mvp: 为一个飞机系列和最多两个站点提供安全的每周分配工作空间，获取推进批次状态、站点容量、计划优先级和发布准备字段，然后建议下一个稀缺批次应该去哪里，并输出缺失证据清单。它应该首先处理导出的或 API 馈送的数据，而不是需要深度替换现有系统。
  sixMonth: 将分配板、发布包模板、批次谱系视图、两个站点选项的场景比较以及第一个连接器集发送到一个 ERP 或 PLM 工作流程以及一个供应商状态源中。
  twelveMonth: 添加供应商协作、跨多个站点的产品组合视图、Blue UAS 和 NDAA 证据模板以及强化的 GovCloud 或 Azure Government 单租户部署模式。
  twentyFourMonth: 从推进分配扩展到邻近的受限组件，例如能源、航空电子设备或电子设备，同时在现有客户内部添加多程序基准测试和跨系列分配支持。
  keyBets:
  - 如果能够防止现场坡道上至少一次由推进驱动的时间表延误，买家将资助狭窄的覆盖范围。
  - 在客户需要完全飞地或气隙部署之前，首次部署可以使用导出或轻度集成的数据证明价值。
  - 发布包编排是楔子的一部分，而不是附属功能，因为出处和准备情况证据是使分配决策可执行的因素。
  - 一旦推动力证明了购买动议，数据模型就可以推广到其他受约束的子组件。
gtm:
  wedge: 将一个现场坡道部署出售给 OEM，开设第二个站点或添加第二个飞机系列，将该产品定位为阻止每周推进环节分配错误成为明显的计划延迟的最快方法。
  channels:
  - 由创始人直接向首席运营官、运营副总裁、制造领导者和推进供应经理进行销售
  - 通过国防制造集成商和邻近的 PLM、MES、ERP 或安全云供应商由合作伙伴主导的介绍
  - 通过 DIU、Blue UAS、Replicator 和国防生产就绪网络（站点扩展可见）进行程序驱动的采购
  funnelTargets: 目标账户->合格准备审核 20-30%；准备情况审核->付费试点 30-40%；有偿试点->年生产合同 50%+；第一份生产合同 -> 12 个月内的第二个地点或第二个系列扩建 30%+
  pricing: 每个现役飞机系列和工厂现场部署的价格，而不是每个座位的价格。从 8-12 周付费试点开始，大约为 $75k-$125k，用于一个实时分配工作流程，然后转换为一个家庭在最多两个站点的 $250k-$350k 年度订阅，再加上入职和安全部署费用。这与研究的六位数 ACV 逻辑相匹配，并根据避免的线路空闲事件和合规劳动力而不是通用软件预算来制定销售。
businessModel:
  revenueStreams:
  - 每个活跃飞机系列和站点部署的年度平台订阅
  - 入职、集成和安全部署服务
  - 用于供应商协作、多程序分析和政府就绪发布报告的高级模块
  unitOfValue: 使用该平台进行主动飞机系列和站点部署，以做出每周受限分配决策
  targetGrossMarginPct: 70
  expansionLevers:
  - 在同一客户内添加第二个和第三个站点
  - 从一个飞机系列扩展到其他系列或项目
  - 从推进推广到其他受约束的子组件
  - 嵌入控制平面后，出售供应商协作和证据报告模块
strategyMap:
  northStarMetric: 通过平台执行每周飞机系列分配周期，不会出现因推进而导致生产线中断的情况
  inputMetrics:
  - 每季度完成的付费准备审核
  - 首次可用分配建议的试点时间
  - 附有完整放行证据的每周分配决策的百分比
  - 试点合同到年度合同的转化率
  - 从第一个家庭或站点到第二个部署的扩展率
  moatsToBuild:
  - 连接地块、地点、家庭、延误和发布结果的历史数据集
  - 可重复使用的 Blue UAS、NDAA 和现场准备证据模板
  - 适合 CUI 和 ITAR 环境的安全部署和集成模式
  killCriteria:
  - 首批 10 目标买家中少于 3 的人确认推进分配是 3 每周运营痛点，值得融资
  - 首次上线后 9 个月内没有付费试点转换为年度制作合同
  - 由于安全性和集成阻力太高，首次可用部署时间在连续两个试点中都保持在 8 周以上
  - 第一个客户年度合同价值的不到 30% 在 18 个月内扩展到第二个站点、第二个系列或相邻组件工作流程
  mermaid: "flowchart LR\n  Wedge[Propulsion allocation wedge] --> MVP[Weekly allocator plus release packet]\n  MVP --> Proof[Fewer line stalls and faster site readiness]\n  Proof --> Expansion[More sites, families, and constrained components]\n"
investorMemo:
  verdict:
    call: 观察
    conviction: 强烈的痛苦和时机，但只有在付费试点中证明预算所有权和安全部署速度之前，才具有适度的信心。
    whyBelieve: 狭窄的分配和证据控制平面直接位于稀缺推进环节和工厂吞吐量之间的路径上，这是当前系统最薄弱的地方。
    whyDoubt: 最初可触及的市场很小，现有企业或内部工作流程可能会吸收预算，除非初创公司在一次现场活动中证明了可观的投资回报率。
    nextDiligence: 赢得两名多站点无人机 OEM 的付费飞行员，并展示一名飞行员在降低现场节目中推进驱动的进度风险后转为六位数的年度合同。
  firstCustomer:
    title: 多站点美国国防无人机 OEM 运营副总裁
    profile: 一家 150-800 个体制造商，拥有一个活跃的 Pentagon 支持的飞机系列，第二个站点开放或扩建，并且经常出现电机或小型喷气发动机短缺。
    trigger: 新工厂的启动、第二架飞机系列或最近错过的建造里程碑都暴露出当前的电子表格和会议流程无法自信地分配受限推进环节。
    buyer: 首席运营官或运营副总裁
    initialContract: 8-12 周付费飞行员在 $75k-$125k 购买一个飞机系列和一个实时分配工作流程，如果系统成为多站点推进决策的每周记录，则转换为 $250k-$350k 年度合同加上入职。
  mustBeTrue:
  - 至少第一个 10 目标 OEM 中的 3 确认推进分配是一种反复出现的执行痛苦，而不是偶尔的例外。
  - 第一个试点可以使用导出或轻度集成的数据在 6-8 周内上线，而无需等待完全分类部署。
  - 该产品将第一个生产客户的手动分配和发布准备周期时间至少缩短了 25%。
  - 买家将以 $250k+ 年度价格点从运营或生产准备预算中为独立的覆盖提供资金。
  - 一个生产客户在 12-18 个月内扩展到第二个站点、第二个系列或相邻的受限组件工作流程。
  diligenceQuestions:
  - 目标 OEM 的最后三次推进驱动生产延迟是多少？每次延迟的进度或劳动力成本是多少？
  - 这条工作流的第一笔软件预算到底归谁：COO、VP Operations、CIO，还是项目 GM？
  - 在安全区部署成为强制要求之前，有多少首次分配工作流程可以保留在未分类或已清理的数据中？
  - 与电池、电子设备或其他受限部件相比，推进环节有多少次成为真正的每周瓶颈？
  - 哪个现有系统或集成商最有可能通过配置或捆绑来消除楔子？
operatingAssumptions:
- assumption: 推进环节分配是每周一次的痛苦，足以在多站点无人机 OEM 上赚取独立预算。
  basis: research.yaml
  validationTest: 采访 2-5 站点 OEMs 的 10 运营和供应链领导者，并确保至少获得与指定坡道里程碑相关的 2 付费试点承诺。
  decisionImpact: 如果错误，请将公司范围缩小到更广泛的受限组件分配器，或重新定位为通过集成商而不是独立软件销售的服务。
- assumption: 首次部署无需获取最敏感的机密设计数据即可证明其价值。
  basis: research.yaml
  validationTest: 对导出或清理的数据运行一项试点，并记录哪些数据元素真正需要 enclave 或本地处理。
  decisionImpact: 如果错误，销售周期会延长，部署成本会上升，并且目标市场会缩小到更少的大客户。
- assumption: $250k-$350k 年度合同相对于避免生产线停机和人工准备工作而言是可信的。
  basis: idea.yaml
  validationTest: 根据 3 客户事后分析构建 ROI 案例，并在试点转换期间以两个价格点测试提案的接受度。
  decisionImpact: 如果错误，公司必须要么转向高端市场，捆绑更多工作流程，要么接受利润率较低的服务——高定价。
- assumption: 发布数据包和证据编排对于加强楔子非常重要，而不是分散分配器的注意力。
  basis: research.yaml
  validationTest: 跟踪一个站点准备情况或批次发布工作流程，并量化收集谱系、出处和批准工件所花费的时间，而不是做出分配选择本身。
  decisionImpact: 如果为 false，则将产品范围简化为纯粹的分配建议并推迟合规性工作流程功能。
- assumption: 在第一个灯塔获胜后，数据模型可以从推进推广到其他受限部分。
  basis: 操作员判断
  validationTest: 在早期客户处绘制一个相邻组件工作流程（例如航空电子设备或电子设备），并测量批次、站点和证据对象的重复使用。
  decisionImpact: 如果为假，则风险投资案例会减弱，因为滩头阵地 SAM 对于风险投资规模扩张来说仍然太窄。
experimentRoadmap:
- horizon: 0–90 天
  experiment: 对目标多站点无人机 OEM 的运营和推进供应负责人进行结构化发现访谈。
  hypothesis: 推进分配和释放准备是 3 现场爬坡期间每周最痛苦的事情。
  successMetric: 10 采访完成，6 买家将工作流程列为紧急，2 账户同意付费准备审核。
  owner: 创始人/CEO
- horizon: 0–90 天
  experiment: 使用从一个设计合作伙伴导出的批次、场地和项目优先级数据构建 MVP 分配器。
  hypothesis: 可以在深度 ERP 或 PLM 集成之前交付有用的推荐引擎。
  successMetric: 在 6 周或更短的时间内生成一份端到端的每周分配建议和阻碍报告。
  owner: 创始工程师
- horizon: 90–180 天
  experiment: 在现场启动或有限批次活动期间试行一种实时飞机系列工作流程。
  hypothesis: 该平台可以将手动分配和发布准备周期时间至少缩短 25%。
  successMetric: 经测量，周期时间缩短了 25%+，并且客户记录了一次避免或缩短的生产线停顿事件。
  owner: 前线部署工程师
- horizon: 90–180 天
  experiment: 验证 GovCloud、Azure Government 和单租户选项的安全部署模式。
  hypothesis: 该产品可以通过初始买家安全审查，无需为每个帐户定制架构。
  successMetric: 两个目标帐户只需进行少量修改即可批准一种标准部署模式。
  owner: 安全负责人
- horizon: 6–12 个月
  experiment: 通过一家制造集成商和一家相邻的软件供应商测试合作伙伴主导的分发。
  hypothesis: 在这个狭窄的市场中，来自合作伙伴的机会比纯粹的冷出境机会更快地结束。
  successMetric: 3 合作伙伴提供的合格飞行员和至少 1 签订的年度合同。
  owner: 创始人/CEO
- horizon: 12–18 个月
  experiment: 将一个客户从推进扩展到第二个站点、第二个系列或相邻的受限组件工作流程。
  hypothesis: 第一个灯塔帐户包含足够的相邻痛苦来支持快速扩张，而无需采取新的销售行动。
  successMetric: 一份扩建合同在首次生产上线后的 12 个月内完成。
  owner: 产品负责人
operations:
- 美国托管的部署手册，具有基于角色的访问、审核日志和控制，符合第一个试点的 CUI 和 ITAR 期望
- 用于导出 ERP、PLM、供应商和电子表格数据的集成工具包，以便飞行员无需完全重新平台即可启动
- 标准每周运营节奏，由客户运营、质量和供应链负责人审查分配决策和阻碍证据
- 可重复使用的发布包模板，用于 Blue UAS、NDAA 来源和现场准备检查，以减少实施差异
team:
- role: 创始人/CEO
  startTiming: 第 0 个月
  rationale: 拥有自己的创始人领导的销售、设计合作伙伴招募以及国防集成商关系，因为第一个市场集中且信任度高。
- role: 创始工程师
  startTiming: 第 0 个月
  rationale: 足够快地构建分配引擎、现场数据模型和首次集成，以支持前两个季度的现场试点。
- role: 前线部署工程师
  startTiming: 第 2 个月
  rationale: 压缩试点设置时间，将客户数据映射到产品中，并将定制部署转换为可重复的实施手册。
- role: 制造流程专家
  startTiming: 第 3 个月
  rationale: 对真实的分配、发布和可追溯性逻辑进行编码，以便产品反映国防工厂实际上如何做出每周决策。
- role: 安全负责人
  startTiming: 第 6 个月
  rationale: 在大型项目或第二站点扩展关闭之前，安全部署、可审核性和合规性状况将成为限制因素。
milestones:
- horizon: 0–12 个月
  items:
  - 通过现场多站点坡道活动与 2 付费设计合作伙伴签约
  - 为一个飞机系列、两个站点和一个发布包工作流程运送 MVP
  - 将至少 1 试点转化为年度生产合同
  - 向一位客户展示手动分配和准备周期时间减少 25% 以上
- horizon: 12–24 个月
  items:
  - 跨客户或扩展站点实现 4 主动生产部署
  - 启动供应商协作、产品组合视图和强化的安全部署包
  - 完成对第二个地点、第二个家庭或相邻受限组件的首次扩张销售
  - 标准化部署，使首次可用工作流程的时间缩短至 6 周
- horizon: 24–36 个月
  items:
  - 触达 6 活跃客户，与调研年份-3 SOM 案例一致
  - 建立 2 可重复分销或集成合作伙伴
  - 除了推进之外，扩展到至少一个附加的受限组件工作流程
  - 发布有关分配延迟和站点就绪阻止因素的匿名基准见解
risks:
- risk: 在目标细分市场中，推进环节常常不是每周具有约束力的瓶颈。
  likelihood: Medium
  impact: High
  mitigation: 尽早验证组件优先级，为相邻受限部件设计对象模型，如果访谈显示另一个瓶颈占主导地位，则转动楔子。
- risk: 买家认为 ERP、PLM、Palantir 或内部工具就足够好了。
  likelihood: High
  impact: High
  mitigation: 销售避免在一个实时工作流程中发生的线路空闲事件，而不是通用可见性，并作为记录系统的替代品进行集成而不是正面竞争。
- risk: 安全性、CUI 和 ITAR 部署要求导致试点速度过慢且服务繁重。
  likelihood: High
  impact: High
  mitigation: 从清理或导出的数据工作流程开始，尽早强化一种标准的安全部署模式，并避免在产品验证之前进行定制的深度集成。
- risk: 运营、项目领导和 IT 之间的预算所有权仍然不明确。
  likelihood: Medium
  impact: Medium
  mitigation: 在准备审核范围确定期间需要指定执行发起人，并与投资回报率挂钩，以避免进度延误并减少协调工作。
- risk: 超出初始推进楔的扩展比模型弱。
  likelihood: Medium
  impact: High
  mitigation: 在筹集下一轮资金之前，将第一个客户扩展到第二个站点、系列或受限组件作为必需的里程碑。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: 把 MVP 分配器和安全部署包做出来，补齐第一批前线部署与流程岗位，拿下 2 个付费共创客户，至少把 1 个 pilot 转成生产收入，并在下一轮融资前证明 1 笔扩张销售。
