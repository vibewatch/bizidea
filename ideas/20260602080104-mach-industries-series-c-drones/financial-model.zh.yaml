modelDiagram:
  title: 单位经济模型流转
  mermaid: "flowchart LR\n  Accounts[Target drone OEM accounts] --> Audits[Paid readiness audits]\n  Audits --> Pilots[Paid pilots]\n  Pilots --> Deployments[Annual deployments]\n  Deployments --> Revenue[Recurring revenue plus onboarding]\n  Revenue --> GrossProfit[70% gross profit]\n  GrossProfit --> Cash[Cash runway]"
modelSanity:
- checkName: 收入引擎
  finding: 基本情况收入来自 Q4Y3 的 12 付费家庭站点部署，其中大部分增长由试点转换驱动，少量来自灯塔账户内的扩展收入。
- checkName: 必须做对的事
  finding: 该公司必须对导出或净化的数据进行早期部署，以便在安全审查和服务拖累狭窄的市场之前进行转换。
- checkName: 模型失效条件
  finding: 如果销售周期延长至 6+ 个月或推进环节不再成为约束性瓶颈，则下行收入将降至 $2.2M，现金压缩至大约 $140K。
- checkName: 下一轮融资证明点
  finding: 仅当 Q4Y2 显示至少 4 生产部署、一次扩展销售以及可降低 CAC 和实施风险的可重复安全部署模式时，下一轮才是合理的。
sanityChecks:
  ruleOf40: Y3 增长 98.2% + EBITDA 利润率 -3.1% = 95.1%
  burnMultiple: Y2 burn $632K / net new ARR $1.2M = 0.5x
  revenuePerFte: Y3 每名期末 FTE 对应收入 $218K（对标重部署型企业 SaaS 的 $200–400K）
  flags:
  - 最初的 SAM 仅与 $29M 有关，因此该模型需要在现有帐户内进行扩展，而不是纯粹的新徽标增长来证明风险回报的合理性。
  - Y3 仍然略微负于 EBITDA，这对于安全、实施繁重的防御工作流程来说是可信的，但为延迟转换留下的空间很小。
  - 每个 FTE 的收入接近软件基准的低端，因为通过 Y3 进行前向部署和合规性劳动力仍然有意义。
