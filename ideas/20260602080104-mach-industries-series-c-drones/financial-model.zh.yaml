slug: drone-propulsion-ramp-os
date: '2026-06-02'
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: 模型开始月份
  value: 2026-07
  unit: YYYY-MM
  source: '[BP 日期 2026-06-02] 计划日期后的第一个完整月份。'
- id: A2
  name: 从种子期结束前开始现金
  value: '2400'
  unit: USDK
  source: '[BPfundingAsk targetFundingRangeUsd $2-4M] 基本情况在模型开始时使用 $2.4M 收盘价，因为它达到了 Q4Y2 里程碑，并且仍然留下 6-month 缓冲区。'
- id: A3
  name: 建模客户单位
  value: 活跃的飞机系列和现场部署
  unit: 单元
  source: '[BP gtm.pricing 和 businessModel.unitOfValue] 定价是按家庭站点部署计算的，因此模型客户代表付费部署而不是徽标。'
- id: A4
  name: 已支付试点价格
  value: '100'
  unit: 每个 3-month 试点的 USDK
  source: '[BP gtm.pricing $75k-$125k 试点] 中点假设。'
- id: A5
  name: 年产量认购价
  value: '300'
  unit: 每年每次部署 USDK
  source: 【BP gtm.pricing $250k-$350k 包年订阅】； [研究市场.som $300k ACV]。
- id: A6
  name: 一次性入职和安全部署费用
  value: '40'
  unit: USDK 每年兑换
  source: '[BP gtm.pricing 入职和安全部署费用] 用于强化部署工作的保守附加组件。'
- id: A7
  name: 混合毛利率目标
  value: '70'
  unit: 百分比
  source: '[BP BusinessModel.targetGrossMarginPct 70] 应用于整个基本案例。'
- id: A8
  name: Y1 部署坡道
  value: M5 首飞； M8 第二飞行员； M9 首次年度转换； M12 第二次年度转换
  unit: 定时
  source: '[BP milestones 0-12 months sign 2 paid design partners and convert at least 1 to annual] 基本情形假设两个灯塔 pilot 都会在年内转化，pilot 周期为 8-12 周。'
- id: A9
  name: Y2 季末付费部署
  value: 3, 4, 5, 6
  unit: 部署
  source: '[BP 里程碑 12-24 月达到 4 活跃生产部署]随着试点转换和一条扩展路径的打开，基本案例退出 Y2，并进行 6 付费部署。'
- id: A10
  name: Y3 季末付费部署
  value: 7, 9, 11, 12
  unit: 部署
  source: '[BP milestones 24-36 months reach 6 active customers]; [Research market.som 6 customers x 2 sites x 1 family x $300k ACV] 基本情形到 Q4Y3 跑到 12 个付费部署。'
- id: A11
  name: 生产部署的每月变动
  value: '2.0'
  unit: 百分比
  source: '[初创企业融资启发式：具有集中国防买家的粘性企业工作流程软件]假设保留率良好，但存在一些计划和预算风险。'
- id: A12
  name: 加载年薪范围
  value: 执行 200；工程 170；前沿部署 150；工作流程 140；安全 180；销售 180； G&A 110
  unit: 每 FTE USDK
  source: '[初创企业融资启发：美国种子前防御企业软件团队，满载工资税和福利]。'
- id: A13
  name: Y1 招聘顺序
  value: M1 创始人+创始工程师； M2 前向部署； M3 工作流程中小企业； M6 安全领先； M8 二管轮； M11 管理及行政支持
  unit: 雇用
  source: '[BP 团队 startTiming+strategyChoices.sequencingRationale]。'
- id: A14
  name: Y2-Y3 聘用顺序
  value: M16 首次销售招聘； M18 第二次前沿部署； M21 三管轮； M27 第二工作流程雇用； M30 四轮工程师； M32 第二销售招聘； M34 聘请第二名高管
  unit: 雇用
  source: '[BP 里程碑和排序理由] 扩大销售要等到部署手册开始重复。'
- id: A15
  name: 非薪资运营支出增长
  value: Y1 月度 25-44； Y2 季刊 80-95； Y3 季刊 83-97
  unit: USDK 嵌入 opex
  source: '[BP 运营 + 研究监管技术约束 + 采用摩擦矩阵] 涵盖安全云、旅行、合规性和实施工具。'
- id: A16
  name: 满载 CAC
  value: '120'
  unit: 每个新的付费部署 USDK
  source: '[初创企业融资启发式：创始人领导的国防企业销售，包括差旅、安全审查和飞行员支持]。'
- id: A17
  name: 下一轮融资里程碑
  value: Q4Y2 与 4+ 生产部署、一次扩展销售和可重复的安全部署模式
  unit: 里程碑
  source: '[BP 里程碑 12-24 月 + InvestorMemo.nextDiligence]。'
- id: A18
  name: 资金缓冲规则
  value: '6'
  unit: 月
  source: '[任务说明] 要求的大小要达到里程碑，并在基本情况下留下大约六个月的剩余现金。'
- id: A19
  name: 现金转换假设
  value: '100'
  unit: EBITDA 兑现的百分比
  source: '[初创企业融资启发式]模型假设没有债务、税收、资本支出或营运资本波动大到足以破坏 EBITDA 到现金的前滚。'
