scenarios:
  downside:
    description: 安全审查保持定制，飞行员转换速度较慢，业务以 8 付费部署而不是 12 结束 Y3。
    y3RevenueK: 2150.0
    y3EbitdaK: -640.0
    cashLowPointK: 140.0
    keyAssumptionChanges:
    - 试点转年度转换从 BP 底线滑落至约 35%。
    - Q4Y3 付费部署达到 8 而不是 12。
    - 毛利率保持在 65%，因为实施工作仍然以服务为主。
  base:
    description: 两个设计合作伙伴进行了转换，Y2 证明了可重复的安全部署，而 Y3 则以 12 付费部署结束，大致覆盖 6 徽标。
    y3RevenueK: 3052.5
    y3EbitdaK: -93.2
    cashLowPointK: 732.5
    keyAssumptionChanges:
    - 试点定价处于中点，并转换为 $300K 年度合同加上 $40K 入职。
    - Q4Y2 以 6 付费部署退出，Q4Y3 以 12 退出。
    - 随着安全部署模板的标准化，毛利率达到了 70% 的 BP 目标。
  upside:
    description: 一个合作伙伴渠道开始在 Y2 中工作，灯塔帐户内部的扩张加速，Y3 以 14 付费部署结束。
    y3RevenueK: 3900.0
    y3EbitdaK: 360.0
    cashLowPointK: 900.0
    keyAssumptionChanges:
    - 通过更快的导出数据部署，试点到年度的转化率提高到约 60%。
    - Q4Y3 付费部署达到了 14，因为现有客户可以更快地添加第二个站点或系列。
    - 一旦入职变得更加模板化，毛利率就会提高到 72%。
