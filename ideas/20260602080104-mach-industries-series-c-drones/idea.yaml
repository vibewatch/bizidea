problem: >-
  U.S. defense drone startups can now win real Pentagon demand, but they still
  plan production with spreadsheets, ERP workarounds, supplier calls, and
  plant-by-plant tribal knowledge. When scarce solid rocket motors or small jet
  engines must be allocated across multiple airframes, lot dates, and newly
  opened sites, one bad assumption can idle a line or starve the highest-priority
  program. The bottleneck is no longer only airframe design; it is deciding which
  propulsion lot can ship from which factory, under which release evidence, fast
  enough to keep decentralized output on schedule.
targetUser:
  primary: >-
    VP Operations or head of manufacturing at a 150-800 person U.S. defense
    drone startup opening 2-5 decentralized assembly sites for expendable or
    runway-independent strike aircraft
  secondary: >-
    Propulsion supply manager or manufacturing program lead responsible for
    allocating constrained motor and engine lots across programs and plants
  buyer: >-
    COO, VP Operations, or GM of autonomous systems at a fast-scaling defense
    drone manufacturer
startupThesis:
  nonObviousInsight: >-
    The next defense-drone winners will not be chosen only by who designs the
    best aircraft. As startups open distributed factories, the scarce asset
    becomes the ability to turn constrained propulsion lots into reliable
    site-by-site output without losing traceability or starving priority
    programs. Whoever owns that constrained-allocation and release layer can
    become the control plane for the drone industrial base.
  beachhead: >-
    Scarce-propulsion allocation and site-readiness orchestration for U.S.
    defense drone startups opening 2-5 decentralized assembly sites for one
    active expendable-strike or runway-independent aircraft program
  wedge: >-
    A secure control plane that maps each motor or jet-engine lot to specific
    drone variants, factory sites, release packets, and shipment priorities,
    then flags where a constrained component will block output before a line
    goes idle
  whyNowCatalyst: >-
    Mach's new facilities, Forge network, DIU-funded Navy aircraft program, and
    vertical integration into constrained propulsion show the market has shifted
    from drone experimentation to multi-site production planning now.
  ventureScalePath: >-
    Start with propulsion allocation for one drone family, then expand into
    energetics, airframes, electronics, and supplier-collaboration workflows
    across loitering munitions, autonomous strike aircraft, and broader defense
    factories that run distributed capacity networks.
solution: >-
  The product sits above ERP, PLM, and supplier portals as the decision layer
  for constrained drone production. It ingests factory capacity, propulsion lot
  status, qualification rules, build plans, and program priorities, then tells
  operations leaders which site should build which units with which scarce
  components this week. It also generates the release packet for each
  factory-program combination, so teams know whether the right lot genealogy,
  work instructions, and evidence are in place before material moves. The first
  workflow is intentionally narrow: prevent one constrained motor or engine lot
  from causing schedule slips across a newly opened second or third plant. Over
  time, the system becomes the operating record for how defense drone companies
  allocate scarce subcomponents across an expanding network of factories and
  programs.
goToMarketSeed:
  firstCustomer: >-
    A U.S. defense drone startup with one active DIU, Navy, or SOCOM-backed
    aircraft program, at least one second factory opening in the next 12 months,
    and recurring shortages in rocket-motor or small-jet-engine supply
  buyingTrigger: >-
    Opening a new Forge-style site, adding a second aircraft family, or missing
    a build milestone because scarce propulsion lots cannot be allocated with
    confidence across plants
  currentAlternative: >-
    ERP and PLM systems plus spreadsheets, supplier phone calls, shared drives,
    and weekly cross-functional allocation meetings
  switchingReason: >-
    The wedge does not ask teams to rip out their manufacturing stack; it
    removes the ugliest coordination problem by turning constrained propulsion
    allocation and release readiness into one shared system of record
  pricingHypothesis: >-
    Annual subscription priced per active aircraft family and factory site, with
    onboarding fees for secure integrations and premium modules for supplier
    collaboration or government-ready release reporting
