topRisks:
  - name: Classified workflow friction
    description: Defense manufacturers may resist adopting a new control layer if it cannot fit secure or partially air-gapped environments.
    mitigation: Start with an unclassified planning workflow, support secure on-prem or enclave deployments early, and integrate with existing approved systems instead of replacing them.
  - name: Too narrow a starting category
    description: A wedge built around rocket motors and small jet engines could cap early revenue if only a few programs fit the profile.
    mitigation: Design the data model for any constrained subcomponent from day one and expand next into energetics, avionics, and electronics once the first propulsion workflow lands.
  - name: Incumbent stack entrenchment
    description: ERP, PLM, or custom internal tooling may already own parts of factory planning and make buyers skeptical of another dashboard.
    mitigation: Sell measurable schedule protection on one aircraft family, integrate into existing systems of record, and prove value through avoided line-idle events rather than broad transformation claims.
