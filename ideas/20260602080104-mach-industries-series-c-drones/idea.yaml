jobsToBeDone:
  - job: >-
      When a scarce motor or engine lot clears production, help our operations
      team decide which plant and aircraft variant should receive it first, so
      we protect the highest-priority schedule without creating hidden shortages
      elsewhere.
    currentAlternative: >-
      Spreadsheet-based allocation reviews and supplier calls led by program
      managers and operations heads
    successMetric: Schedule adherence across active plants after each propulsion allocation cycle
  - job: >-
      When we open a new factory for one drone family, help our manufacturing
      lead know whether the site has the right constrained components, evidence,
      and release status to start building, so we do not launch a line that
      immediately stalls.
    currentAlternative: >-
      Manual readiness checklists across ERP exports, email, and ad hoc launch meetings
    successMetric: Days from site launch to stable first-pass production output
