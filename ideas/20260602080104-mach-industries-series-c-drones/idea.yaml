differentiator: >-
  Existing ERP, APS, and PLM tools can record inventory or configuration, but
  they do not answer the defense-specific question of where the next scarce
  propulsion lot should go across multiple drone plants and programs. This
  company would own the constrained-allocation layer that ties component
  scarcity, site readiness, and release evidence into one weekly operating
  decision. Defensibility comes from accumulating proprietary data on how real
  drone factories consume scarce propulsion, where yield or delay risk emerges,
  and which allocation choices preserve program throughput under defense-grade
  traceability requirements.
