openQuestions:
- How often is propulsion the binding weekly constraint versus batteries, electronics, or another part in the exact 150-800 employee startup segment?
- Will likely buyers require fully enclave or partially air-gapped deployments before they will trust a new decision layer with lot and release data?
- How much of the buyer pain is allocation logic versus the evidence-packet and readiness workflow around each site and program?
- Can the startup land inside existing ERP/PLM budgets, or will it need separate production-readiness line items tied to a program milestone?
