openQuestions:
- 在 150-800 员工创业细分市场中，与电池、电子设备或其他部件相比，推进环节成为具有约束力的每周约束的频率有多少？
- 可能的买家会需要完全飞地或部分气隙部署才能信任包含批次和发布数据的新决策层吗？
- 分配逻辑与每个站点和计划的证据包和准备工作流程相比，给买家带来了多少痛苦？
- 初创公司能否在现有的 ERP/PLM 预算范围内实现，还是需要与计划里程碑相关的单独的生产准备项目？
