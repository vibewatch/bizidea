  wedge: 可组合的 MES 和执行工作流程可实现可追溯性、质量和审计准备。
  pricing: 定制/未公开
  strength: 快速的工作流程调整和强大的跨站点竣工记录捕获。
  weaknessVsUs: 执行层而不是一个受限分配的大脑，用于跨程序的稀缺推进。
  sourceRefs:
  - 29
- name: IFS
  stage: 现任者
  wedge: 集成航空航天和国防 ERP/资产/制造套件。
  pricing: 定制/未公开
  strength: 深入的企业足迹和广泛的合规性/流程覆盖范围。
  weaknessVsUs: 重型套件部署；不是一个可以快速降落在一个飞机系列上的狭窄决策层。
  sourceRefs:
  - 30
- name: Dassault DELMIA
  stage: 现任者
  wedge: 全球运营和制造规划软件与更广泛的数字线程工具相关。
  pricing: 定制/未公开
  strength: 先进制造领域内强大的规划和运营血统。
  weaknessVsUs: 总体规划平台，而不是国防无人机放行证据和稀缺批次分配器。
  sourceRefs:
  - 31
- name: ProShop ERP
  stage: 扩大规模
  wedge: 面向国防的 ERP/MES/QMS 专注于可追溯性、调度和车间可视性。
  pricing: 定制/未公开
  strength: 为受监管的制造商提供实用的可追溯性和实时 WIP 可见性。
  weaknessVsUs: 比跨多个项目的多站点推进分配更接近数字化商店管理。
  sourceRefs:
  - 32
