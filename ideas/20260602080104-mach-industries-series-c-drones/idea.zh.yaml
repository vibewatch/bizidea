differentiator: 现有 ERP、APS 和 PLM 工具能记库存、记配置，但答不出国防制造里最关键的那道题：下一批稀缺推进件，到底该发往哪座无人机工厂、支持哪个项目。这个公司要拿下的是受限分配层，把零件短缺、工厂就绪度和放行证据拧成一周一次的核心运营决策。真正的防御性来自三类数据：真实无人机工厂怎么消耗稀缺推进件、良率或延期风险会在哪里冒头、以及哪种分配选择能在国防级追溯要求下守住项目吞吐。
