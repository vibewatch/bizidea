problem: 美国国防无人机创业公司已经能拿到真正的 Pentagon 需求，但产能规划仍靠电子表格、ERP 临时拼法、供应商电话和按厂沉淀的经验。固体火箭发动机或小型喷气发动机一旦稀缺，就得在多种机型、不同批次日期和新开的工厂之间做分配；一个错误假设，就可能让产线停摆，或者把最高优先级项目饿死。瓶颈已经不只是机体设计，而是要足够快地判断：哪一批推进件该从哪座工厂发往哪里、带着哪套放行证据，才能让分布式产能按计划爬坡。
targetUser:
  primary: 美国国防无人机创业公司中负责运营或制造的 VP，团队规模 150–800 人，正在为消耗型打击机或无跑道打击机项目新开 2–5 个分布式装配点。
  secondary: 负责在不同项目和工厂之间分配受限电机或发动机批次的推进供应经理或制造项目负责人。
  buyer: 高速扩张中的国防无人机制造商里，负责自主系统业务的 COO、运营 VP 或 GM。
startupThesis:
  nonObviousInsight: 下一批胜出的国防无人机公司，不会只靠谁把飞机设计得更好。随着创业公司把工厂铺开，真正稀缺的资产变成了一件事：能不能把受限的推进件批次稳稳转成各工厂可兑现的产出，同时不丢追溯性，也不让重点项目断粮。谁拿住这层受限分配和放行控制，谁就有机会变成无人机工业底座的控制平面。
  beachhead: 面向美国国防无人机创业公司的受限推进件分配与工厂就绪编排；这些公司正在为一条正在执行的消耗型打击机或无跑道打击机项目新开 2–5 个分布式装配点。
  wedge: 一套安全控制平面，把每个电机或喷气发动机批次映射到具体无人机型号、工厂、放行材料和发货优先级，并在产线停下来之前提前指出哪颗受限零件会卡住产出。
  whyNowCatalyst: Mach 新工厂、Forge 网络、DIU 资助的 Navy 飞机项目，以及它向受限推进环节的垂直整合，都说明市场已经从“试验无人机”切到“多工厂量产计划”。
  ventureScalePath: 先从一条无人机产品线的推进件分配切入，再把范围扩到含能材料、机体、电子件和供应商协同流程，最终覆盖游荡弹药、自主打击飞机以及更广泛的分布式国防工厂网络。
solution: 产品位于 ERP、PLM 和供应商门户之上，专门负责受限无人机产能的决策。它吃进工厂产能、推进件批次状态、资质规则、生产计划和项目优先级，然后告诉运营负责人：这周哪座工厂该用哪些稀缺推进件生产哪些机体。系统还会为每个“工厂-项目”组合生成放行材料包，让团队在物料流转前就知道批次谱系、作业指导书和证明材料是否齐全。第一条工作流故意收得很窄：别让一批受限电机或发动机，把新开的第二或第三座工厂一起拖慢。时间一长，这套系统会变成国防无人机公司在不断扩张的工厂和项目网络里分配稀缺子部件的运营底账。
goToMarketSeed:
  firstCustomer: 一家美国国防无人机创业公司：已有一个 DIU、Navy 或 SOCOM 支持的在产项目，未来 12 个月内至少会再开一座工厂，而且长期被火箭发动机或小型喷气发动机短缺困住。
  buyingTrigger: 新开 Forge 式工厂、增加第二条机型，或因为受限推进件无法跨厂稳妥分配而错过生产里程碑。
  currentAlternative: ERP、PLM，再加电子表格、供应商电话、共享盘和每周跨部门分配会。
  switchingReason: 这个切口不要求团队把制造系统整套推倒重来；它只把最难看的协同问题拿出来，变成一套共享的系统记录：受限推进件分配 + 放行就绪。
  pricingHypothesis: 按“在产机型 × 工厂站点”收年费；安全集成和上线收实施费；供应商协同和面向政府的放行报告再卖高级模块。
