topRisks:
- name: 涉密流程摩擦
  description: 如果新的控制层无法适应安全或部分气隙环境，国防制造商可能会拒绝采用它。
  mitigation: 从非机密规划工作流程开始，尽早支持安全的本地或飞地部署，并与现有批准的系统集成而不是替换它们。
- name: 起步品类太窄
  description: 如果只有少数项目符合这种情况，围绕火箭发动机和小型喷气发动机构建的楔子可能会限制早期收入。
  mitigation: 从第一天起就为任何受限子组件设计数据模型，并在第一个推进工作流程落地后扩展到能量学、航空电子设备和电子设备。
- name: 现有系统栈根深蒂固
  description: ERP、PLM 或定制内部工具可能已经拥有部分工厂规划，并使买家对另一个仪表板持怀疑态度。
  mitigation: 销售针对某一飞机系列的可衡量的进度保护，集成到现有的记录系统中，并通过避免线路闲置事件而不是广泛的改造索赔来证明价值。
