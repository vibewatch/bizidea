jobsToBeDone:
- job: 当稀缺的发动机或发动机批次清理生产时，帮助我们的运营团队决定哪个工厂和飞机型号应该首先接收它，这样我们就可以保护最高优先级的时间表，而不会在其他地方造成隐藏的短缺。
  currentAlternative: 由项目经理和运营主管领导的基于电子表格的分配审查和供应商电话
  successMetric: 在每个推进分配周期后安排活跃工厂的遵守情况
- job: 当我们为一个无人机系列开设一家新工厂时，请帮助我们的制造主管了解该工厂是否拥有合适的受限组件、证据和发布状态来开始建造，这样我们就不会启动一条立即停顿的生产线。
  currentAlternative: 跨 ERP 导出、电子邮件和临时启动会议的手动准备清单
  successMetric: 从现场启动到稳定的首轮产量所需的天数
