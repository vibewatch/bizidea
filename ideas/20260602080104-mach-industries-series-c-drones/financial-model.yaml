modelDiagram:
  title: unit economics flow
  mermaid: |-
    flowchart LR
      Accounts[Target drone OEM accounts] --> Audits[Paid readiness audits]
      Audits --> Pilots[Paid pilots]
      Pilots --> Deployments[Annual deployments]
      Deployments --> Revenue[Recurring revenue plus onboarding]
      Revenue --> GrossProfit[70% gross profit]
      GrossProfit --> Cash[Cash runway]
modelSanity:
  - checkName: Revenue engine
    finding: Base-case revenue comes from 12 paid family-site deployments by Q4Y3, with most growth driven by pilot conversions and a small amount of expansion revenue inside lighthouse accounts.
  - checkName: Must go right
    finding: The company must keep early deployments on exported or sanitized data so pilots convert before security review and services drag overwhelm the narrow market.
  - checkName: Model breaks if
    finding: If sales cycles stretch to 6+ months or propulsion stops being the binding bottleneck, downside revenue falls toward $2.2M and cash compresses to roughly $140K.
  - checkName: Next-round proof
    finding: The next round is justified only if Q4Y2 shows at least 4 production deployments, one expansion sale, and a repeatable secure deployment pattern that lowers CAC and implementation risk.
sanityChecks:
  ruleOf40: Y3 growth 98.2% + EBITDA margin -3.1% = 95.1%
  burnMultiple: Y2 burn $632K / net new ARR $1.2M = 0.5x
  revenuePerFte: Y3 $218K per exit FTE (benchmark $200–400K deployment-heavy enterprise SaaS)
  flags:
    - Initial SAM is only about $29M, so the model needs expansion inside existing accounts rather than pure new-logo growth to justify venture returns.
    - Y3 is still slightly EBITDA negative, which is believable for a secure, implementation-heavy defense workflow but leaves little room for delayed conversions.
    - Revenue per FTE sits near the low end of software benchmarks because forward deployment and compliance labor remain meaningful through Y3.
