assumptions:
  - id: A1
    name: Model start month
    value: 2026-07
    unit: YYYY-MM
    source: '[BP date 2026-06-02] first full month after plan date.'
  - id: A2
    name: Opening cash from pre-seed close
    value: '2400'
    unit: USDK
    source: '[BP fundingAsk targetFundingRangeUsd $2-4M] base case uses a $2.4M close at model start because it reaches the Q4Y2 milestone and still leaves a 6-month buffer.'
  - id: A3
    name: Modeled customer unit
    value: active aircraft-family and site deployment
    unit: unit
    source: '[BP gtm.pricing and businessModel.unitOfValue] pricing is per family-site deployment, so model customers represent paid deployments rather than logos.'
  - id: A4
    name: Paid pilot price
    value: '100'
    unit: USDK per 3-month pilot
    source: '[BP gtm.pricing $75k-$125k pilot] midpoint assumption.'
  - id: A5
    name: Annual production subscription price
    value: '300'
    unit: USDK per deployment per year
    source: '[BP gtm.pricing $250k-$350k annual subscription]; [Research market.som $300k ACV].'
  - id: A6
    name: One-time onboarding and secure deployment fee
    value: '40'
    unit: USDK per annual conversion
    source: '[BP gtm.pricing onboarding and secure-deployment fees] conservative add-on for hardened rollout work.'
  - id: A7
    name: Blended gross margin target
    value: '70'
    unit: percent
    source: '[BP businessModel.targetGrossMarginPct 70] applied throughout the base case.'
  - id: A8
    name: Y1 deployment ramp
    value: M5 first pilot; M8 second pilot; M9 first annual conversion; M12 second annual conversion
    unit: timing
    source: '[BP milestones 0-12 months sign 2 paid design partners and convert at least 1 to annual] base case assumes both lighthouse pilots convert by year-end after 8-12 week pilots.'
  - id: A9
    name: Y2 quarter-end paid deployments
    value: 3, 4, 5, 6
    unit: deployments
    source: '[BP milestones 12-24 months reach 4 active production deployments] base case exits Y2 with 6 paid deployments as pilots convert and one expansion path opens.'
  - id: A10
    name: Y3 quarter-end paid deployments
    value: 7, 9, 11, 12
    unit: deployments
    source: '[BP milestones 24-36 months reach 6 active customers]; [Research market.som 6 customers x 2 sites x 1 family x $300k ACV] base case reaches 12 paid deployments by Q4Y3.'
  - id: A11
    name: Monthly churn on production deployments
    value: '2.0'
    unit: percent
    source: '[startup-finance heuristic: sticky enterprise workflow software with concentrated defense buyers] assumes good retention but some program and budget risk.'
  - id: A12
    name: Loaded annual salary bands
    value: Exec 200; Engineering 170; Forward deployment 150; Workflow 140; Security 180; Sales 180; G&A 110
    unit: USDK per FTE
    source: '[startup-finance heuristic: U.S. pre-seed defense enterprise software team, fully loaded with payroll tax and benefits].'
  - id: A13
    name: Y1 hiring sequence
    value: M1 founder + founding eng; M2 forward deployment; M3 workflow SME; M6 security lead; M8 second engineer; M11 G&A support
    unit: hires
    source: '[BP team startTiming + strategicChoices.sequencingRationale].'
  - id: A14
    name: Y2-Y3 hiring sequence
    value: M16 first sales hire; M18 second forward deployment; M21 third engineer; M27 second workflow hire; M30 fourth engineer; M32 second sales hire; M34 second exec hire
    unit: hires
    source: '[BP milestones and sequencingRationale] scaled sales waits until the deployment playbook starts repeating.'
  - id: A15
    name: Non-salary operating spend ramp
    value: Y1 monthly 25-44; Y2 quarterly 80-95; Y3 quarterly 83-97
    unit: USDK embedded in opex
    source: '[BP operations + research regulatoryTechnicalConstraints + adoptionFrictionMatrix] covers secure cloud, travel, compliance, and implementation tooling.'
  - id: A16
    name: Fully loaded CAC
    value: '120'
    unit: USDK per new paid deployment
    source: '[startup-finance heuristic: founder-led defense enterprise sales with travel, security review, and pilot support].'
  - id: A17
    name: Funding milestone for next round
    value: Q4Y2 with 4+ production deployments, one expansion sale, and a repeatable secure deployment pattern
    unit: milestone
    source: '[BP milestones 12-24 months + investorMemo.nextDiligence].'
  - id: A18
    name: Funding buffer rule
    value: '6'
    unit: months
    source: '[Task instruction] ask is sized to reach the milestone and leave roughly six months of remaining cash under the base case.'
  - id: A19
    name: Cash conversion assumption
    value: '100'
    unit: percent of EBITDA to cash
    source: '[startup-finance heuristic] model assumes no debt, taxes, capex, or working-capital swings large enough to break EBITDA-to-cash roll-forward.'
