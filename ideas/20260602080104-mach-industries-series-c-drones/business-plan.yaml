slug: drone-propulsion-ramp-os
date: '2026-06-02'
executiveSummary: >-
  Drone Propulsion Ramp OS is a supplier-side control plane for U.S. defense drone
  OEMs that are opening second and third assembly sites while scarce motors or
  small jet engines gate output. The urgent pain is not generic factory
  visibility; it is the weekly decision of which constrained propulsion lot
  should go to which site, aircraft family, and release packet without idling a
  line or starving a priority program. The best first customer is a 150-800
  person drone manufacturer with one active Pentagon-backed program, a new site
  coming online inside 12 months, and recurring allocation meetings still run in
  spreadsheets, ERP exports, and supplier calls. The MVP should land as an
  overlay on one aircraft family and up to two sites, ingesting lot status, site
  capacity, program priorities, and release evidence to recommend the next
  allocation cycle and flag blockers before material moves. Go-to-market,
  pricing, and implementation all center on one measurable promise: prevent
  propulsion-driven schedule slips during a live factory ramp without replacing
  ERP, PLM, or MES. Research supports real demand and a credible six-figure ACV,
  but the beachhead is narrow, with a modeled $29.0M SAM and $3.6M year-3 SOM,
  so expansion into adjacent constrained components and additional programs is
  required rather than optional. The moat, if earned, comes from lot-site-family
  outcome data, reusable release-packet templates, and deployment patterns that
  fit CUI, ITAR, and Blue UAS evidence requirements. The biggest disconfirming
  risks are that propulsion is not the binding weekly bottleneck often enough, a
  standalone overlay cannot secure budget against incumbent suites, or secure
  deployment requirements make pilots too slow and services-heavy.
problem:
  - >-
    Drone OEMs scaling from one plant to a distributed factory network still
    allocate scarce propulsion through spreadsheets, ERP workarounds, supplier
    calls, and weekly cross-functional meetings.
  - >-
    One wrong lot-allocation decision can idle a new line, starve the
    highest-priority aircraft family, or trigger a release delay because
    provenance, qualification, or site-readiness evidence is incomplete.
  - >-
    Incumbent ERP, PLM, and MES tools record inventory and traceability, but they
    do not own the defense-specific weekly choice of where the next scarce motor
    or engine lot should go across sites and programs.
solution:
  - >-
    Build a secure allocation overlay that combines propulsion lot status, site
    capacity, program priority, and release-readiness evidence into a weekly
    recommendation for one aircraft family across multiple sites.
  - >-
    The MVP should show which lot goes to which site, what output is blocked if
    that decision changes, and whether the required genealogy, work
    instructions, and approval packet are complete before shipment.
  - >-
    Initial deployments are deliberately narrow: one active aircraft family, up
    to two sites, exported or API-fed data from existing systems, and one live
    ramp milestone where avoided line-idle events can be measured.
whyWeWin:
  - >-
    The wedge is a decision layer, not another system of record, which makes the
    product easier to land inside entrenched defense manufacturing stacks.
  - >-
    Value is tied to a board-level operating event that incumbents do not solve
    cleanly today: weekly allocation of constrained propulsion under traceability
    and release constraints.
  - >-
    Each deployment compounds proprietary data on lot outcomes, site readiness,
    supplier reliability, and release-packet reuse that generic suites do not
    naturally aggregate.
  - >-
    Market timing is favorable because Pentagon demand, new factories, and Blue
    UAS provenance pressure are pushing buyers from prototype mode into repeatable
    throughput.
strategicChoices:
  beachhead: >-
    U.S. defense drone OEMs with 2-5 assembly sites, one active expendable-strike
    or runway-independent aircraft family, and recurring scarcity in solid rocket
    motors or small jet engines during a live production ramp.
  wedgeRationale: >-
    This beachhead yields the fastest proof because the user, buyer, trigger, and
    ROI are tightly aligned: VP Operations feels the pain first, a site opening or
    missed build milestone triggers budget, and success is measurable as fewer
    propulsion-driven line stops and faster release readiness on one live family.
    Broader factory software or multi-component planning would slow proof and
    invite direct incumbent comparison before the startup has reference wins.
  sequencingRationale: >-
    Product should start with exported-data allocation and release-packet
    orchestration for one family because that is the minimum workflow that proves
    value without requiring a full security or architecture replatform. GTM stays
    founder-led and implementation-heavy through the first few deployments because
    security review, system mapping, and operational trust matter more than top-
    of-funnel volume. Hiring follows that sequence: workflow engineering and
    forward deployment first, security hardening next, scaled sales only after the
    company can show one repeatable deployment pattern and one expansion path.
  notYet:
    - Full ERP, PLM, or MES replacement
    - Classified mission-planning or command-and-control workflows
    - Buyer-side procurement analytics for the Pentagon or primes
    - Non-defense manufacturing expansion before three production references are live
    - Broad multi-component optimization before propulsion proves to be the first repeatable wedge
market:
  tam: "$0.13B bottom-up TAM based on roughly 120 U.S. and allied defense-UAS or attritable-strike manufacturers or program groups needing regulated multi-site allocation software at about $350k ACV per family-site deployment."
  sam: "$29.0M initial SAM based on about 25 near-term U.S. buyers already operating or opening multiple sites at roughly $330k ACV."
  som: "$3.6M year-3 SOM based on 6 customers, about 2 sites each, and roughly $300k ACV landed through direct sales and integration-heavy deployments."
  segments:
    - "Primary: U.S. defense drone OEMs with 150-800 employees, one active Pentagon-backed aircraft family, and 2-5 distributed assembly sites"
    - "Secondary: adjacent autonomous-aircraft or loitering-munition manufacturers once the same release-and-allocation model generalizes beyond propulsion"
  buyingProcess: >-
    The practical entry is a founder-led readiness audit when a new site is
    opening or an allocation mistake has already threatened a production
    milestone. The economic buyer is usually the COO, VP Operations, or GM of the
    autonomous-systems business, but quality, security, supply-chain, and
    enterprise-architecture stakeholders influence adoption because the workflow
    touches CUI, ITAR, and existing systems of record.
product:
  mvp: >-
    A secure weekly allocation workspace for one aircraft family and up to two
    sites that ingests propulsion lot status, site capacity, program priority, and
    release-readiness fields, then recommends where the next scarce lot should go
    and outputs a missing-evidence checklist. It should work first on exported or
    API-fed data rather than requiring deep replacement of incumbent systems.
  sixMonth: >-
    Ship the allocation board, release-packet templates, lot genealogy view,
    scenario comparison for two site options, and first connector set into one
    ERP or PLM workflow plus one supplier-status feed.
  twelveMonth: >-
    Add supplier collaboration, portfolio views across multiple sites, Blue UAS
    and NDAA evidence templates, and hardened GovCloud or Azure Government single-
    tenant deployment patterns.
  twentyFourMonth: >-
    Expand from propulsion allocation into adjacent constrained components such as
    energetics, avionics, or electronics, while adding multi-program benchmarking
    and cross-family allocation support inside existing customers.
  keyBets:
    - >-
      A buyer will fund a narrow overlay if it can prevent at least one
      propulsion-driven schedule slip on a live ramp.
    - >-
      The first deployment can prove value using exported or lightly integrated
      data before the customer requires a fully enclave or air-gapped rollout.
    - >-
      Release-packet orchestration is part of the wedge, not a side feature,
      because provenance and readiness evidence are what make allocation decisions
      executable.
    - >-
      The data model can generalize to other constrained subcomponents once
      propulsion proves the buying motion.
gtm:
  wedge: >-
    Sell one live ramp deployment to an OEM opening a second site or adding a
    second aircraft family, positioning the product as the fastest way to stop
    weekly propulsion allocation mistakes from becoming visible program delays.
  channels:
    - Direct founder-led sales to COOs, VPs of Operations, manufacturing leaders, and propulsion-supply managers
    - Partner-led introductions through defense manufacturing integrators and adjacent PLM, MES, ERP, or secure-cloud vendors
    - Program-driven sourcing through DIU, Blue UAS, Replicator, and defense production-readiness networks where site expansion is visible
  funnelTargets: "Target account -> qualified readiness audit 20-30%; readiness audit -> paid pilot 30-40%; paid pilot -> annual production contract 50%+; first production contract -> second site or second family expansion 30%+ within 12 months"
  pricing: >-
    Price per active aircraft family and factory-site deployment rather than per
    seat. Start with an 8-12 week paid pilot at roughly $75k-$125k for one live
    allocation workflow, then convert to a $250k-$350k annual subscription for
    one family across up to two sites, plus onboarding and secure-deployment fees.
    This matches the researched six-figure ACV logic and frames the sale against
    avoided line-idle events and compliance labor rather than generic software
    budgets.
businessModel:
  revenueStreams:
    - Annual platform subscription per active aircraft family and site deployment
    - Onboarding, integration, and secure deployment services
    - Premium modules for supplier collaboration, multi-program analytics, and government-ready release reporting
  unitOfValue: Active aircraft-family and site deployment using the platform for weekly constrained-allocation decisions
  targetGrossMarginPct: 70
  expansionLevers:
    - Add second and third sites within the same customer
    - Expand from one aircraft family into additional families or programs
    - Generalize from propulsion into other constrained subcomponents
    - Sell supplier collaboration and evidence-reporting modules once the control plane is embedded
strategyMap:
  northStarMetric: Weekly aircraft-family allocation cycles executed through the platform without a propulsion-caused line stoppage
  inputMetrics:
    - Paid readiness audits completed per quarter
    - Pilot time to first usable allocation recommendation
    - Percentage of weekly allocation decisions accompanied by complete release evidence
    - Pilot-to-annual-contract conversion rate
    - Expansion rate from first family or site into a second deployment
  moatsToBuild:
    - Historical dataset linking lots, sites, families, delays, and release outcomes
    - Reusable Blue UAS, NDAA, and site-readiness evidence templates
    - Secure deployment and integration patterns that fit CUI and ITAR environments
  killCriteria:
    - Fewer than 3 of the first 10 target buyers confirm propulsion allocation is a top-3 weekly operating pain worth funding
    - No paid pilot converts to an annual production contract within 9 months of first go-live
    - Time to first usable deployment stays above 8 weeks in two consecutive pilots because security and integration drag are too high
    - Less than 30% of the first customer's annual contract value expands into a second site, second family, or adjacent component workflow within 18 months
  mermaid: |
    flowchart LR
      Wedge[Propulsion allocation wedge] --> MVP[Weekly allocator plus release packet]
      MVP --> Proof[Fewer line stalls and faster site readiness]
      Proof --> Expansion[More sites, families, and constrained components]
investorMemo:
  verdict:
    call: Watch
    conviction: Strong pain and timing, but moderate confidence only until budget ownership and secure deployment speed are proven in paid pilots.
    whyBelieve: A narrow allocation-and-evidence control plane sits directly on the path between scarce propulsion and factory throughput, which is where current systems are weakest.
    whyDoubt: The reachable market is initially small and incumbents or in-house workflows may absorb the budget unless the startup proves sharp ROI on one live ramp event.
    nextDiligence: Win two paid pilots at multi-site drone OEMs and show one converts to a six-figure annual contract after reducing propulsion-driven schedule risk on a live program.
  firstCustomer:
    title: VP Operations at a multi-site U.S. defense drone OEM
    profile: A 150-800 person manufacturer with one active Pentagon-backed aircraft family, a second site opening or ramping, and recurring shortages in motors or small jet engines.
    trigger: A new factory launch, second aircraft family, or recent missed build milestone exposes that the current spreadsheet-and-meeting process cannot allocate constrained propulsion with confidence.
    buyer: COO or VP Operations
    initialContract: An 8-12 week paid pilot at $75k-$125k for one aircraft family and one live allocation workflow, converting to a $250k-$350k annual contract plus onboarding if the system becomes the weekly record for multi-site propulsion decisions.
  mustBeTrue:
    - At least 3 of the first 10 target OEMs confirm propulsion allocation is a recurring executive pain rather than an occasional exception.
    - A first pilot can go live in 6-8 weeks using exported or lightly integrated data without waiting for a full classified deployment.
    - The product reduces manual allocation and release-prep cycle time by at least 25% on the first production customer.
    - Buyers will fund a standalone overlay from operations or production-readiness budgets at a $250k+ annual price point.
    - One production customer expands into a second site, second family, or adjacent constrained component workflow within 12-18 months.
  diligenceQuestions:
    - What were the last three propulsion-driven production delays at target OEMs, and what did each cost in schedule or labor?
    - Which executive owns the first software budget for this workflow: COO, VP Operations, CIO, or program GM?
    - How much of the first allocation workflow can stay in unclassified or sanitized data before enclave deployment becomes mandatory?
    - How often is propulsion the real weekly bottleneck versus batteries, electronics, or another constrained part?
    - Which incumbent system or integrator is most likely to neutralize the wedge with configuration or bundling?
operatingAssumptions:
  - assumption: Propulsion allocation is a weekly pain severe enough to earn standalone budget at multi-site drone OEMs.
    basis: research.yaml
    validationTest: Interview 10 operations and supply-chain leaders at 2-5 site OEMs and secure at least 2 paid pilot commitments tied to named ramp milestones.
    decisionImpact: If false, narrow the company to a broader constrained-component allocator or reposition as services sold through integrators rather than standalone software.
  - assumption: The first deployment can prove value without ingesting the most sensitive classified design data.
    basis: research.yaml
    validationTest: Run one pilot on exported or sanitized data and document which data elements truly require enclave or on-prem handling.
    decisionImpact: If false, sales cycles lengthen, deployment cost rises, and the target market narrows to fewer larger accounts.
  - assumption: A $250k-$350k annual contract is credible relative to avoided line stoppage and manual readiness labor.
    basis: idea.yaml
    validationTest: Build ROI cases from 3 customer postmortems and test proposal acceptance at two price points during pilot conversion.
    decisionImpact: If false, the company must either move upmarket, bundle more workflows, or accept lower-margin services-heavy pricing.
  - assumption: Release-packet and evidence orchestration is important enough to strengthen the wedge rather than distract from the allocator.
    basis: research.yaml
    validationTest: Shadow one site-readiness or lot-release workflow and quantify time spent gathering genealogy, provenance, and approval artifacts versus making the allocation choice itself.
    decisionImpact: If false, simplify product scope toward pure allocation recommendations and defer compliance workflow features.
  - assumption: The data model can generalize from propulsion into other constrained parts after the first lighthouse win.
    basis: operator judgment
    validationTest: Map one adjacent component workflow such as avionics or electronics at an early customer and measure reuse of lot, site, and evidence objects.
    decisionImpact: If false, the venture case weakens because the beachhead SAM remains too narrow for venture-scale expansion.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Run structured discovery interviews with operations and propulsion-supply leaders at target multi-site drone OEMs.
    hypothesis: Propulsion allocation and release readiness are top-3 weekly pains during a live ramp.
    successMetric: 10 interviews completed, 6 buyers rank the workflow as urgent, and 2 accounts agree to a paid readiness audit.
    owner: Founder CEO
  - horizon: 0–90 days
    experiment: Build an MVP allocator using exported lot, site, and program-priority data from one design partner.
    hypothesis: A useful recommendation engine can be delivered before deep ERP or PLM integration.
    successMetric: One end-to-end weekly allocation recommendation and blocker report generated in 6 weeks or less.
    owner: Founding eng
  - horizon: 90–180 days
    experiment: Pilot one live aircraft-family workflow during a site launch or constrained-lot event.
    hypothesis: The platform can cut manual allocation and release-prep cycle time by at least 25%.
    successMetric: Measured 25%+ cycle-time reduction and one avoided or shortened line-stall event documented by the customer.
    owner: Forward deployment engineer
  - horizon: 90–180 days
    experiment: Validate secure deployment patterns across GovCloud, Azure Government, and single-tenant options.
    hypothesis: The product can pass initial buyer security review without a bespoke architecture for each account.
    successMetric: Two target accounts approve one standard deployment pattern with only minor modifications.
    owner: Security lead
  - horizon: 6–12 months
    experiment: Test partner-led distribution through one manufacturing integrator and one adjacent software vendor.
    hypothesis: Partner-sourced opportunities close faster than pure cold outbound in this narrow market.
    successMetric: 3 partner-sourced qualified pilots and at least 1 closed annual contract.
    owner: Founder CEO
  - horizon: 12–18 months
    experiment: Expand one customer from propulsion into a second site, second family, or adjacent constrained component workflow.
    hypothesis: The first lighthouse account contains enough adjacent pain to support fast expansion without a new sales motion.
    successMetric: One expansion contract closed within 12 months of first production go-live.
    owner: Product lead
operations:
  - U.S.-hosted deployment playbook with role-based access, audit logs, and controls aligned to CUI and ITAR expectations from the first pilot
  - Integration toolkit for exported ERP, PLM, supplier, and spreadsheet data so pilots can start without full replatforming
  - Standard weekly operating cadence with customer ops, quality, and supply-chain champions reviewing allocation decisions and blocker evidence
  - Reusable release-packet templates for Blue UAS, NDAA provenance, and site-readiness checks to reduce implementation variance
team:
  - role: Founder CEO
    startTiming: Month 0
    rationale: Own founder-led sales, design-partner recruiting, and defense-integrator relationships because the first market is concentrated and trust-heavy.
  - role: Founding eng
    startTiming: Month 0
    rationale: Build the allocation engine, lot-site data model, and first integrations fast enough to support a live pilot in the first two quarters.
  - role: Forward deployment engineer
    startTiming: Month 2
    rationale: Compress pilot setup time, map customer data into the product, and convert bespoke deployments into a repeatable implementation playbook.
  - role: Manufacturing workflow SME
    startTiming: Month 3
    rationale: Encode real allocation, release, and traceability logic so the product reflects how defense factories actually make weekly decisions.
  - role: Security lead
    startTiming: Month 6
    rationale: Secure deployment, auditability, and compliance posture become gating factors before larger programs or second-site expansions will close.
milestones:
  - horizon: 0–12 months
    items:
      - Sign 2 paid design partners with live multi-site ramp events
      - Ship MVP for one aircraft family, two sites, and one release-packet workflow
      - Convert at least 1 pilot into an annual production contract
      - Demonstrate 25%+ reduction in manual allocation and readiness cycle time at one customer
  - horizon: 12–24 months
    items:
      - Reach 4 active production deployments across customers or expanded sites
      - Launch supplier collaboration, portfolio views, and hardened secure deployment package
      - Close first expansion sale into a second site, second family, or adjacent constrained component
      - Standardize deployment so time to first usable workflow is under 6 weeks
  - horizon: 24–36 months
    items:
      - Reach 6 active customers, consistent with the researched year-3 SOM case
      - Establish 2 repeatable distribution or integration partners
      - Expand beyond propulsion into at least one additional constrained-component workflow
      - Publish anonymized benchmark insights on allocation delays and site-readiness blockers
risks:
  - risk: Propulsion is not the binding weekly bottleneck often enough across the target segment.
    likelihood: Medium
    impact: High
    mitigation: Validate component priority early, design the object model for adjacent constrained parts, and pivot the wedge if interviews show another bottleneck dominates.
  - risk: Buyers decide ERP, PLM, Palantir, or internal tooling is good enough.
    likelihood: High
    impact: High
    mitigation: Sell avoided line-idle events on one live workflow, not generic visibility, and integrate rather than compete head-on as a system-of-record replacement.
  - risk: Security, CUI, and ITAR deployment requirements make pilots too slow and services-heavy.
    likelihood: High
    impact: High
    mitigation: Start with sanitized or exported-data workflows, harden one standard secure deployment pattern early, and avoid bespoke deep integrations before product proof.
  - risk: Budget ownership remains ambiguous between operations, program leadership, and IT.
    likelihood: Medium
    impact: Medium
    mitigation: Require a named executive sponsor during readiness-audit scoping and tie ROI to avoided schedule slips and reduced coordination labor.
  - risk: Expansion beyond the initial propulsion wedge is weaker than modeled.
    likelihood: Medium
    impact: High
    mitigation: Treat first-customer expansion into a second site, family, or constrained component as a required milestone before raising the next round.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: Build the MVP allocator and secure deployment package, hire the first forward deployment and workflow hires, close 2 paid design partners, convert at least 1 pilot into production revenue, and prove one expansion sale before the next round.
