slug: semiconductor-change-sim-os
date: '2026-05-20'
executiveSummary: >-
  Semiconductor Change Sim OS 瞄准的是欧洲半导体设备子系统供应商里一个很窄、但真会卡业务的工作流：在发货日期滑掉前，先把
  OEM 的工程变更请求答出来。第一批用户是管理真空、热控或晶圆搬运模块的项目负责人或仿真负责人，预算拥有者大概率是工程副总裁或产品线
  GM。产品不打算替代 Ansys、COMSOL、Teamcenter，或底层 Physics-AI 基础设施；它是架在这些系统之上的一层，把变更差异、经
  surrogate screening 的分析结果和历史资质模板，拼成当天就能交给 OEM 的响应材料包。这个切口有吸引力，是因为触发点、买家、定价逻辑和分发动作，都围着发货风险转，而不是泛泛的
  AI 效率故事。研究支持一个不大、但站得住的滩头市场：TAM 约 $60.0M、SAM 约 $24.0M、到第 3 年的 SOM 约 $3.6M，因此投资逻辑取决于能否先把单一工作流跑通，再往相邻的发布与资质场景扩。最大的战略优势是工作流足够具体：现有厂商分别守着求解器深度、PLM 或数字孪生基础设施，但在现有资料里，没有谁把“供应商侧变更单资质材料包”当成主战场。采用风险同样真实存在，因为买家在愿意拿
  surrogate screening 结果去面向客户决策之前，一定会先要审计能力、求解器升级规则、RBAC 和合规文档。最大的不确定性在于：OEM 到底多常接受这种材料、最终资质材料包究竟由哪个团队掌控，以及目标供应商手里究竟有没有足够历史仿真数据可做校准。所以前
  6 个月不能按放量期来跑，必须按“先把证据做出来”的计划执行。
problem:
  - 半导体子系统供应商今天仍然要靠 CAE 积压、电子表格和手工拼包，来回答 OEM 的设计变更请求，这会把一次发货风险事件拖成多天甚至数周的响应周期。
  - 现有求解器、PLM 和数字孪生工具能管模型和数据，但往往产不出 ASML 级再认证真正需要的客户材料包、升级逻辑和审计链。
solution:
  - 接入需求差异、CAD 修订、历史求解器输出和资质模板，再用校准后的 surrogate screening 先过一遍；只有不确定或高风险案例才送去做高保真 CAE。
  - 自动生成面向 OEM 的变更影响材料包，写清假设、模型 lineage、合规检查点和建议下一步；只要置信阈值达标，项目团队当天就能把答复发出去。
whyWeWin:
  - 公司卡在“仿真证据变成发货日期商业决策”的那道工作流边界上，这比卖一个通用工程 copilot 更急，也更容易量化。
  - 每做一个部署，就会多积累一层专有变更模式数据、被接受的材料包结构和升级阈值；这些跨模块数据，现有厂商和单个供应商都看不到全貌。
strategicChoices:
  beachhead: 面向 100–1,000 人规模的欧洲半导体设备子系统供应商，这些公司给 ASML 级 OEM 提供真空、热控或晶圆搬运模块，并且经常要处理工程变更再认证请求。
  wedgeRationale: 这个滩头市场触发事件清楚、内部瓶颈稀缺，ROI 也能直接量到“答复耗时”和“避免发货延期”；如果一开始就去打更大的工业 Physics-AI 类别，集成更重，证据闭环反而更弱。
  sequencingRationale: 先用文件式接入、审计能力和单一模块族材料包生成，把“可信”和“省时间”证明出来，再往更深集成、更广模块覆盖、渠道合作和相邻工作流扩。
  notYet:
    - 替代完整求解器，或直接做物理模型创作
    - 在半导体参考客户跑出来之前，就去扩航空航天、汽车和能源供应商
    - 跳出变更资质审核和发布准备度，去做通用工程 copilot
    - 第一代产品就做深度 PLM 或 CAD 重平台项目
market:
  tam: 约 $60.0M 的欧洲 TAM，按 300 家子系统供应商、每家年 ACV 约 $200k 建模得出。
  sam: 约 $24.0M 的欧洲 SAM，按 120 家可触达供应商建模，这些公司集中在光刻、计量、真空和晶圆搬运密集走廊。
  som: 在信任驱动的企业销售节奏下，第 3 年 SOM 约 $3.6M，对应 18 个生产账户、每个账户年 ACV 约 $200k。
  segments:
    - '主市场：服务光刻、计量、真空和晶圆搬运 OEM 项目的欧洲子系统供应商'
    - '次市场：可从一个已验证模块族扩到更广发布工作流的相邻半导体模块供应商'
  buyingProcess: >-
    一旦 OEM 的变更请求威胁到发货或验收时间，预算大概率会从现有工程软件、仿真或数字线程预算里挪出来。项目负责人或仿真负责人先推动试点，工程副总裁或事业部
    GM 批预算，安全、架构和质量评审则会用审计能力、RBAC 和求解器升级控制来卡生产上线。
product:
  mvp: >-
    MVP 先面向一个模块族，接 CAD、PLM、求解器和文档系统的导出文件与轻量 API，然后产出带明确置信阈值、lineage 和人工复核的
    surrogate screening 影响摘要与资质材料包。第一天就不该碰自动批准发布、深度套件替代，或大范围多物理覆盖。
  sixMonth: 把 2–3 家半导体共创客户转成可重复交付的试点，围绕真空、热控和晶圆搬运模块，补齐材料包模板、RBAC、审计日志和求解器 handoff 规则。
  twelveMonth: 在每个账户的多个活跃模块项目中上线生产部署，按需补 FMI、OPC UA 等标准感知集成，并把响应时间下降和 pilot→production 转化率跑出基准。
  twentyFourMonth: 从变更资质审核扩到相邻发布工作流，例如周期性再认证、发布准备度和工程变更治理；再带着这些证据切入航空航天和能源设备供应商等相似高证明负担场景。
  keyBets:
    - 买家会比起黑盒推荐引擎，更早接受“先看 lineage 的材料包工作流”
    - 只靠导出文件和标准感知归一化，就足以先把第一版价值交付出来，不必立刻深接 Teamcenter 和 CAD
    - 一个模块族的部署，能扩成同一账户内多个活跃项目的标准做法
    - 同一套证据生成核心，可以扩到相邻发布工作流，而不会变成高服务比重的定制项目
gtm:
  wedge: 当 OEM 的设计变更或再认证请求威胁到某个子系统模块已承诺的发货日期时，立刻卖出一套有仿真支撑的变更单副驾。
  channels:
    - 直接 outbound 给目标供应商内部的项目工程负责人、仿真负责人和工程副总裁
    - 通过欧洲半导体产业集群网络和既有供应链关系，做共创客户销售
    - 等第一批部署跑顺后，再接入仿真顾问、CAE 渠道商和 PLM 集成商的转介绍与实施合作
  funnelTargets: Lead→合格试点 20–30%，试点→生产 50%+，转生产后的账户里 60%+ 能在 6 个月内扩到第二个活跃项目。
  pricing: 按活跃模块项目收年费订阅，再对工程变更决策次数和生成的资质材料包分档计费，因为买家是在项目层面感到价值，也能先从一个有风险的模块族切入，再扩成全账户标准。
businessModel:
  revenueStreams:
    - 年度平台订阅
    - 按活跃模块项目、工程变更决策次数或生成的资质材料包收使用费
    - 面向复杂环境的付费 onboarding、校准和连接器配置
  unitOfValue: 用这套平台去回答工程变更和再认证请求的活跃模块项目
  targetGrossMarginPct: 70
  expansionLevers:
    - 同一供应商账户里的更多模块项目
    - 周期性再认证、发布准备度和工程变更治理等相邻工作流
    - 面向高合规、高安全要求买家的高级治理、审计和部署选项
strategyMap:
  northStarMetric: 用生产环境生成的资质材料包回答工程变更请求，并且无需大改就被接受的次数
  inputMetrics:
    - 从 OEM 变更请求到客户可接收答复的中位耗时
    - 试点从搭建到产出第一份材料包的时间
    - 无需完整求解器重跑就能解决的案例占比
    - pilot→production 转化率
    - 每个生产账户下的活跃模块项目数
  moatsToBuild:
    - 跨客户、按模块类型沉淀的已被接受资质材料包结构库
    - 记录 surrogate 输出何时会被接受、何时会升级到完整 CAE 的可靠性数据集
    - 让采购能放心的治理层：含审计日志、RBAC、lineage 和合规检查点
  killCriteria:
    - 前 10 个合格试点里，不到 3 个能在 12 个月内转成生产
    - 校准后仍有超过 70% 的试点案例必须完整重跑求解器，省时 ROI 不够
    - 只靠导出工件时，试点搭建的中位时间仍超过 8 周，说明落地过于依赖服务
  mermaid: |
    flowchart LR
      Wedge[滩头切口] --> MVP[MVP]
      MVP --> Proof[证明点]
      Proof --> Expansion[扩张动作]
investorMemo:
  verdict:
    call: 见面 / 继续深挖
    conviction: 切口锋利、买家痛点也站得住，值得约合伙人见面；但前提是先证明 OEM 真会信这种经 surrogate screening 的材料包工作流。
    whyBelieve: 公司打的是一个影响发货的资质工作流：买家明确、触发点明确，且现有厂商虽然围住了周边，却没有真正把它吃透。
    whyDoubt: 初始市场确实窄；如果供应商或 OEM 对几乎所有实质性变更都仍要求完整求解器重跑，产品就会失效。
    nextDiligence: 找 10–15 家目标供应商和至少 1 个面向 OEM 的应用团队验证：当天交付的 surrogate screening 材料包，能不能撑过真实再认证决策。
  firstCustomer:
    title: 欧洲半导体子系统供应商里的项目负责人或仿真负责人
    profile: 100–1,000 人规模，服务 ASML 级 OEM 项目，经常处理真空、热控或晶圆搬运模块变更，同时 CAE 队列长期超载。
    trigger: OEM 的设计变更或再认证请求威胁到已承诺的发货日期或验收节点。
    buyer: 工程副总裁，或某条子系统产品线的总经理
    initialContract: "$50k-$100k 的单模块族付费试点；一旦转生产、并在 2–5 个活跃项目里标准化，年化支出大约升到 $150k-$250k。"
  mustBeTrue:
    - 至少一半受访目标供应商，都会反复遇到威胁发货或资质时间线的工程变更请求。
    - 第一批共创客户里，能在 6 周内用导出工件做出一份可用材料包。
    - 经济买家愿意从现有工程软件或数字线程预算里为产品买单，而不是等一个全新的 AI 预算科目。
    - 只要升级规则写清楚，面向 OEM 的团队会接受这类经 surrogate screening 的材料包来处理相当一部分低到中风险变更。
    - 生产账户能在 12 个月内从一个模块族扩到多个活跃项目，证明这不是一次性试点，而是真有平台潜力。
  diligenceQuestions:
    - 目标供应商到底多常遇到会实质威胁发货或验收节点的变更请求？
    - 一家 ASML 级 OEM 接受 surrogate screening 答复，究竟要看到什么材料包和什么升级规则？
    - 今天最终资质材料包究竟归哪个团队管，因此谁才真正控制预算？
    - 目标客户手里到底有多少历史求解器和资质数据可用来做校准？
    - Siemens、Altair、COMSOL 或内部工具，复制出足够多的材料包工作流来阻断扩张，到底有多容易？
operatingAssumptions:
  - assumption: 真实 ICP 至少包含 120 个可触达的欧洲账户，这些账户持续存在变更资质痛点，而且流程成熟到能接受软件叠加层。
    basis: research.yaml
    validationTest: 访谈 20 家供应商，至少筛出 10 家符合变更频率、导出就绪度，以及 6 个月内愿意跑试点的标准。
    decisionImpact: 如果不成立，就把滩头市场收窄到单一模块类别，并放慢 GTM 招聘，因为初始市场比模型里更小。
  - assumption: 第一批部署只靠导出文件和文档系统就够，不必立刻深接 PLM 和 CAD。
    basis: research.yaml
    validationTest: 用导出的 CAD、求解器和资质工件，完成 3 个共创客户试点，并在 6 周内交出第一版价值。
    decisionImpact: 如果不成立，路线图必须更早把集成提前，且公司得补更多 solutions engineering 产能，烧钱会更快。
  - assumption: 与其让 AI 全自动做工程决策，买家会更早接受“有置信阈值 + 人工复核”的工作流。
    basis: research.yaml
    validationTest: 在试点复盘里，让用户把“先看 lineage 的材料包生成”与“重推荐、轻依据”的输出并排比较，测审批通过率。
    decisionImpact: 如果不成立，就先把产品重定位成可追溯性软件，弱化对仿真加速的承诺。
  - assumption: 以项目为单位的定价，在单次成功试点后能撑起约 $150k-$250k 的年化生产支出。
    basis: idea.yaml
    validationTest: 在 8–10 次买家访谈里，用真实近期变更事件测试试点价格、生产阈值和预算归属。
    decisionImpact: 如果不成立，定价就得下探或转成服务驱动，毛利和风险投资级规模假设都会被削弱。
  - assumption: 半导体参考客户能为航空航天、汽车和能源供应商等相似资质场景打开相邻扩张。
    basis: idea.yaml
    validationTest: 拿到前 2 个生产客户后，再做 10 个相邻市场 discovery call，评估模板复用和购买中心重合度。
    decisionImpact: 如果不成立，公司就应按更窄的半导体工作流业务来配置财务和团队，而不是按更广的平台故事来烧钱。
experimentRoadmap:
  - horizon: 0–90 天
    experiment: 访谈 15 位欧洲真空、热控和晶圆搬运供应商里的项目负责人、仿真负责人和应用工程师。
    hypothesis: 这个滩头市场里，足够多的变更请求会威胁发货，因此可以跑事件驱动的试点销售。
    successMetric: 至少 10 次访谈记录到最近一次工程变更响应耗时超过 2 天，或直接把发货置于风险之中。
    owner: CEO
  - horizon: 0–90 天
    experiment: 做一个 concierge pilot，把某个共创客户的一次变更请求，用导出工件和人工校准转成一份资质材料包草稿。
    hypothesis: 买家会先为“当天把材料包拼出来”买单，而不是一上来就要求全自动化。
    successMetric: 两家共创客户给材料包实用性打分 8/10 以上，并要求重复跑同类流程。
    owner: Founding engineer
  - horizon: 0–90 天
    experiment: 测两种试点包装：一种主打材料包生成，另一种主打求解器分流 + 材料包生成。
    hypothesis: 最终会有一种 bundle 自然成为更清晰的预算锚点。
    successMetric: 至少 70% 的试点相关方，把同一个 package 选为最主要购买理由。
    owner: Product lead
  - horizon: 3–6 个月
    experiment: 在试点账户里，拿 RBAC、审计日志、模型 lineage 和求解器升级控制去跑安全和质量评审。
    hypothesis: 真正卡生产上线的，是治理和可追溯性缺口，而不是基础模型可行性。
    successMetric: 三个试点账户都能靠同一套基线控制包通过评审。
    owner: Platform lead
  - horizon: 6–12 个月
    experiment: 与一家服务目标供应商群体的仿真顾问或 PLM 集成商，正式落地一个转介绍或实施合作。
    hypothesis: 借伙伴落地，能降低 onboarding 成本，同时不丢掉产品主导权。
    successMetric: 至少一个伙伴来源试点上线，而且搭建时间低于创始人亲自推动的试点。
    owner: CEO
  - horizon: 6–12 个月
    experiment: 在首批生产账户内，推动第二个项目扩张。
    hypothesis: 一旦一个模块族证明价值，在现有账户里扩项目，比重新赢一个新 logo 更容易也更便宜。
    successMetric: 至少 60% 的生产账户，在上线后 6 个月内新增第二个活跃项目。
    owner: Account lead
operations:
  - 针对 CAD、求解器和资质工件，建安全的接入、存储和留存控制
  - 为各模块族材料包结构和合规检查点建立模板管理流程
  - 按 AI 治理与 OT 安全审查要求，补齐审计日志、RBAC 和审批控制
  - 形成一套以文件式 onboarding 为先、再逐步深接的 solutions engineering 作战手册
  - 给 CAE 顾问、渠道商和 PLM 集成商做伙伴 enablement
team:
  - role: 创始工程师
    startTiming: Month 0
    rationale: 先把接入、校准、lineage 和材料包生成核心做出来，再去扩组织。
  - role: 行业产品与解决方案负责人
    startTiming: Month 0
    rationale: 把半导体资质工作流翻成可复用模板、试点范围和买家能听懂的包装语言。
  - role: 应用物理与 ML 工程师
    startTiming: Month 1
    rationale: 负责首批模块族的 surrogate model 校准、置信阈值和求解器升级逻辑。
  - role: 解决方案工程师
    startTiming: Month 4
    rationale: 把部署从创始人瓶颈里解放出来，让导出工件 onboarding 能在多个账户里重复。
  - role: 企业客户经理
    startTiming: Month 6
    rationale: 只有在 ICP、触发点和定价动作跑顺后，才放大 direct outbound 和生产转化。
  - role: 安全与平台工程师
    startTiming: Month 9
    rationale: 补硬部署、RBAC、审计和软件供应链控制；这些能力决定能不能真正进企业生产。
milestones:
  - horizon: 0–12 个月
    items:
      - 在真空、热控或晶圆搬运模块类别里签下 2–3 家共创客户
      - 6 周内用导出工件交付第一份生产级资质材料包
      - 至少把 2 个试点转成付费生产账户
      - 上线 RBAC、审计日志、lineage 视图和明确的求解器升级控制
  - horizon: 12–24 个月
    items:
      - 做到 8–10 个生产账户，并证明第二个项目扩张可以重复
      - 为现有客户加入发布准备度和周期性再认证工作流
      - 至少拿下 2 个顾问、渠道商或集成商生态合作
      - 证明从 OEM 变更请求到客户可接收答复的中位响应时间显著下降
  - horizon: 24–36 个月
    items:
      - 在欧洲做到或超过模型里的 18 账户 SOM 路径，或按真实转化数据收窄命题
      - 带着同一套材料包生成与治理核心，进入一个相邻工业垂类
      - 把平台坐实成每个账户跨多个模块族的变更资质系统记录层
risks:
  - risk: 供应商或 OEM 对大多数实质性变更都不接受经 surrogate screening 的证据。
    likelihood: High
    impact: High
    mitigation: 先从低到中风险变更类别切入，给出明确升级阈值，先把被接受的材料包证据做出来，再逐步增加自动化。
  - risk: 只靠文件式 onboarding，覆盖不了主流 CAD、PLM 和求解器工作流，因此难以重复部署。
    likelihood: Medium
    impact: High
    mitigation: 把第一批 ICP 收窄到少数模块族和源系统，先把最高频连接器产品化。
  - risk: 现有 PLM、CAE 或 Physics-AI 厂商把足够多的工作流能力捆进去，压低买家的付费意愿。
    likelihood: Medium
    impact: Medium
    mitigation: 靠跨栈速度、OEM 可直接使用的材料包质量，以及更轻的部署方式取胜，而不是去比求解器宽度或套件深度。
  - risk: 半导体这个初始滩头市场太小或推进太慢，撑不起风险投资节奏。
    likelihood: Medium
    impact: High
    mitigation: 用前 12 个月先证明模块族可复制和相邻工作流扩张，再决定是否加速招人。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $3-5M
  runwayMonths: 18
  useOfFundsSummary: 这 18 个月跑道，买的是首批共创客户试点、生产级信任与治理能力、可重复的文件式 onboarding，以及把半导体参考客户转成更广垂类扩张之前所需的第一支 GTM 团队。
