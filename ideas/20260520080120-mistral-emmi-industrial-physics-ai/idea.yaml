jobsToBeDone:
  - job: >-
      When an OEM requests a module design change close to qualification, help
      the program and simulation lead determine the likely impact quickly, so
      they can answer the customer without slipping the delivery plan.
    currentAlternative: Waiting for a full CAE rerun and coordinating updates through spreadsheets and email
    successMetric: Hours from engineering-change request to customer-ready answer
  - job: >-
      When a supplier must defend a revised design to an OEM quality or
      applications team, help the applications engineer generate traceable
      evidence fast, so they can clear requalification with fewer back-and-forth
      cycles.
    currentAlternative: Manual report assembly from solver screenshots, spreadsheets, and prior qualification documents
    successMetric: Number of customer requalification loops per design change
ideaScorecard:
  signalStrength:
    score: 4
    rationale: The acquisition, stated industry targets, and ASML collaboration together make this a credible signal that physics-AI is becoming strategic infrastructure in industrial engineering.
  painIntensity:
    score: 4
    rationale: Delayed engineering-change answers can directly threaten ship dates, customer trust, and utilization of scarce simulation teams.
  wedgeClarity:
    score: 5
    rationale: Semiconductor subsystem qualification after a design change is a narrow workflow with a concrete trigger, buyer, and measurable response-time ROI.
  defensibility:
    score: 4
    rationale: Defensibility can compound through calibrated surrogate models, qualification templates, and proprietary data on which change patterns trigger escalation or acceptance.
  ventureScale:
    score: 4
    rationale: The same workflow exists across semiconductor, aerospace, automotive, and energy equipment suppliers, creating a path from one vertical to a broader industrial release platform.
topRisks:
  - name: Model trust gap
    description: Suppliers and OEMs may reject surrogate-model outputs if they cannot see when a case should be escalated to a full solver.
    mitigation: Ship confidence thresholds, calibration logs, and mandatory handoff rules that route uncertain cases into incumbent CAE workflows.
  - name: Incumbent bundling
    description: Large CAE or PLM vendors could add lightweight change-analysis assistants and use distribution to compress pricing.
    mitigation: Focus on cross-system qualification workflows, customer evidence generation, and multi-tool orchestration that incumbents do not own end to end.
  - name: Narrow initial entry point
    description: A first wedge limited to semiconductor subsystem suppliers could constrain early pipeline if the ICP is too small or slow-moving.
    mitigation: Start with the highest-frequency change workflows in semiconductor equipment, then expand the same product into aerospace and energy equipment suppliers with similar qualification pain.
