differentiator: >-
  This is not another general engineering copilot and not a replacement CAE
  solver. The product sits on the exact boundary where simulation results,
  customer qualification, and ship-date decisions collide, so the ROI is tied
  to saved delivery milestones rather than abstract productivity gains. Over
  time it builds defensibility from proprietary change-outcome data,
  qualification templates, and escalation patterns across many suppliers that
  no single OEM or incumbent solver vendor sees in aggregate.
