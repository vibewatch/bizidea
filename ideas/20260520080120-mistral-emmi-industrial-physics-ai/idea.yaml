problem: >-
  Semiconductor equipment suppliers still route engineering-change decisions
  through overloaded CAE queues, spreadsheet change boards, and manual customer
  qualification packets. When an OEM requests a design tweak to a vacuum,
  thermal, or wafer-handling module, suppliers often wait days or weeks for
  fresh simulation runs before they can answer whether yield, thermal margins,
  or delivery dates are at risk. That slows revenue, burns scarce simulation
  talent, and makes smaller subsystem vendors look unreliable to their largest
  OEM customers.
targetUser:
  primary: >-
    Program and simulation leads at 100-1,000 person European semiconductor
    equipment subsystem suppliers shipping vacuum, thermal-control, or
    wafer-handling modules into ASML-class OEM programs
  secondary: >-
    Applications engineers and technical account managers responsible for
    customer requalification responses
  buyer: VP Engineering or general manager of a subsystem product line
startupThesis:
  nonObviousInsight: >-
    Physics-AI will not get bought first as a generic simulation platform; it
    will get bought where simulation output directly determines whether a
    supplier can answer a customer change request and keep a ship date. The new
    opportunity is not replacing Ansys or COMSOL, but wrapping them with a
    workflow layer that turns model results into fast commercial and technical
    decisions.
  beachhead: >-
    Engineering-change impact and qualification evidence for European
    semiconductor equipment subsystem suppliers serving lithography, metrology,
    and wafer-handling OEM programs
  wedge: >-
    A simulation-backed change-order copilot that turns CAD and requirement
    deltas into fast surrogate-model reruns, risk summaries, and OEM-ready
    qualification packets
  whyNowCatalyst: >-
    Mistral's acquisition of Emmi and its cited ASML collaboration show that
    physics-AI has moved from research novelty to strategic engineering
    infrastructure, making response-time bottlenecks in supplier qualification
    newly urgent.
  ventureScalePath: >-
    Start with semiconductor subsystem change decisions, then expand into
    aerospace, automotive, and energy equipment suppliers that face the same
    simulation-backed release, qualification, and engineering-change workflows.
solution: >-
  Semiconductor Change Sim OS would ingest requirement changes, CAD revisions,
  prior solver outputs, and qualification templates from the supplier's
  existing engineering stack. It would use calibrated physics-AI surrogate
  models to screen likely thermal, flow, vibration, or throughput impacts in
  minutes, then route only uncertain or high-risk cases to the incumbent full
  solver. The product would generate a customer-ready response packet with the
  affected parameters, assumptions, model lineage, and recommended next action
  for the OEM. It would also maintain a history of which change patterns
  repeatedly create late requalification work so engineering leaders can spot
  fragile module architectures and staff the right simulation resources sooner.
  The initial deployment would integrate with exported files and document
  systems instead of asking suppliers to replace their existing CAE stack.
