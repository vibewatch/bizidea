openQuestions:
- How often do ASML-class OEMs accept surrogate-screened evidence versus insisting on a fresh full solver rerun for changed vacuum, thermal, or wafer-transfer modules?
- 'Which system of record actually owns the final qualification packet today: PLM, simulation teams, program management, or customer-facing applications engineering?'
- Can a first deployment succeed with exported files and document systems, or will most target accounts demand deeper Teamcenter / CAD / solver integration from day one?
- What share of the modeled 300-account TAM has enough historical simulation data to calibrate trustworthy surrogate thresholds in the first six months?
