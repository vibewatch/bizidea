  validationPlan:
  - priority: high
    question: How often do target subsystem suppliers receive engineering-change requests that threaten a shipment or acceptance milestone?
    evidenceToGather: 10-15 interviews with program leads and applications engineers at European vacuum, thermal-control, and wafer-handling suppliers; collect recent ECN timelines and escalation paths.
  - priority: high
    question: What evidence packet is sufficient for an ASML-class OEM to accept a surrogate-screened answer instead of insisting on a full rerun?
    evidenceToGather: Sample qualification templates, redlined OEM responses, and solver escalation criteria from at least three suppliers and one OEM-facing applications team.
  - priority: medium
    question: Can a file/API-light deployment cover the dominant CAD, PLM, and solver export formats without a long services engagement?
    evidenceToGather: Prototype ingestion against exported artifacts from Teamcenter, common CAD revisions, and incumbent solver results; measure setup time and manual cleanup.
