slug: semiconductor-change-sim-os
date: '2026-05-20'
currency: USD
modelStartMonth: '2026-06'
assumptions:
  - id: A1
    name: 模型起始月份
    value: '2026-06'
    unit: month
    source: '[business-plan date；创业财务启发式：把模型起始月设在报告日期之后的下一个月]'
  - id: A2
    name: M1 期初融资流入
    value: '3.2'
    unit: USDM
    source: '[business-plan fundingAsk round pre-seed 和 targetFundingRangeUsd $3-5M；取区间偏下中位，足以覆盖 Y2 生产账户里程碑并留一定缓冲]'
  - id: A3
    name: 起始付费生产账户
    value: '0'
    unit: count
    source: '[business-plan milestones：第 1 年重点是把试点转生产，所以模型起点时还没有生产账户上线]'
  - id: A4
    name: 每个生产账户的年 ACV
    value: '200.0'
    unit: USDK
    source: '[business-plan market SOM 和 research.market.som：按每家供应商账户约 $200k 年 ACV 建模]'
  - id: A5
    name: 每个生产账户的月经常性收入
    value: '16.667'
    unit: USDK
    source: '[由 A4 推导：$200k / 12 个月]'
  - id: A6
    name: 第 1 年生产账户计划
    value: '2 by M12'
    unit: count
    source: '[business-plan 0-12 month milestone：至少把 2 个试点转成付费生产账户]'
  - id: A7
    name: 第 2 年生产账户计划
    value: '9 by Q4Y2'
    unit: count
    source: '[business-plan 12-24 month milestone：做到 8-10 个生产账户]'
  - id: A8
    name: 第 3 年生产账户计划
    value: '18 by Q4Y3'
    unit: count
    source: '[business-plan market SOM 和 research.market.som：18 个生产账户对应第 3 年的 SOM 路径]'
  - id: A9
    name: 收入确认方法
    value: average of beginning and ending active production accounts times $16.667K per month or $50K per quarter
    unit: formula
    source: '[由 A4 推导，并采用签约时点启发式，使收入能和客户数 × ARPU 对齐]'
  - id: A10
    name: 目标毛利率
    value: '70'
    unit: pct
    source: '[business-plan businessModel.targetGrossMarginPct]'
  - id: A11
    name: 单位经济模型中的月度 logo churn
    value: '1.25'
    unit: pct
    source: '[创业财务启发式：垂直企业工作流软件一旦部署通常较粘，但仍处早期，因此保留非零流失]'
  - id: A12
    name: 预测客户数按整账户口径计，已净额扣除流失
    value: rounded whole-account plan
    unit: policy
    source: '[创业财务启发式：运营模型跟踪的是净生产账户，而不是分数形式的月度流失账户]'
  - id: A13
    name: CEO 全成本年现金薪酬
    value: '150'
    unit: USDK
    source: '[business-plan experimentRoadmap 由 CEO 负责；创业财务启发式：欧洲工业软件创始人的薪资加负担成本]'
  - id: A14
    name: 创始工程师全成本年现金薪酬
    value: '185'
    unit: USDK
    source: '[business-plan team；创业财务启发式：欧洲创始工程师薪资加负担成本]'
  - id: A15
    name: 行业产品与解决方案负责人全成本年现金薪酬
    value: '160'
    unit: USDK
    source: '[business-plan team；创业财务启发式：行业产品负责人薪资加负担成本]'
  - id: A16
    name: 应用物理与 ML 工程师全成本年现金薪酬
    value: '190'
    unit: USDK
    source: '[business-plan team；创业财务启发式：欧洲应用物理和 surrogate model 人才薪资加负担成本]'
  - id: A17
    name: 解决方案工程师全成本年现金薪酬
    value: '150'
    unit: USDK
    source: '[business-plan team；创业财务启发式：偏部署导向的企业解决方案人才薪资加负担成本]'
  - id: A18
    name: 企业 AE 全成本年现金薪酬
    value: '200'
    unit: USDK
    source: '[business-plan team；创业财务启发式：技术型企业 AE 的固定加浮动薪酬和负担成本]'
  - id: A19
    name: 安全与平台工程师全成本年现金薪酬
    value: '180'
    unit: USDK
    source: '[business-plan team；创业财务启发式：企业级加固与合规工程人才薪资加负担成本]'
  - id: A20
    name: 客户成功与实施全成本年现金薪酬
    value: '130'
    unit: USDK
    source: '[business-plan milestone：证明第二个项目可重复扩张；创业财务启发式：售后交付人才薪资加负担成本]'
  - id: A21
    name: ML 与集成工程师全成本年现金薪酬
    value: '180'
    unit: USDK
    source: '[business-plan 的产品与运营需求；创业财务启发式：集成和数据管线工程人才薪资加负担成本]'
  - id: A22
    name: 产品与项目运营全成本年现金薪酬
    value: '120'
    unit: USDK
    source: '[business-plan 的运营与合作需求；创业财务启发式：精简创业团队的运营支持成本]'
  - id: A23
    name: 根据计划的初始招聘时点
    value: founder seller, founding engineer, and domain lead at M1; applied physics engineer M2; solutions engineer M4; AE M7; security/platform engineer M10
    unit: timing
    source: '[business-plan team 和 sequencingRationale]'
  - id: A24
    name: 后续招聘节奏
    value: customer success M18; second AE M20; ML and integrations engineer M22; product and program ops M31
    unit: timing
    source: '[business-plan 12-24 month milestone 加创业财务启发式：在生产转化可重复前保持精简]'
  - id: A25
    name: 非工资 opex 节奏
    value: Y1 S&M 3-7K per month, R&D 5-8K per month, G&A 6-7K per month; Y2-Y3 quarterly non-payroll opex rises only as pilots convert and governance needs expand
    unit: USDK
    source: '[创业财务启发式：前期以文件式 onboarding 和 direct outbound 为主，法务、保险与软件开销保持克制]'
  - id: A26
    name: 每个新生产账户的全成本 CAC
    value: '90.0'
    unit: USDK
    source: '[business-plan 的 GTM 以创始人主导直销为主，顾问和集成商后置；创业财务启发式：工业企业信任型销售动作的 CAC]'
  - id: A27
    name: 现金转换政策
    value: EBITDA approximates operating cash flow
    unit: policy
    source: '[创业财务启发式：早期软件模型不单独建债务、capex 或营运资本波动]'
  - id: A28
    name: 融资用途拆分
    value: 43.8 percent engineering, 28.1 percent GTM, 12.5 percent G&A, 15.6 percent six-month buffer
    unit: pct
    source: '[由模型里的薪酬结构、非工资开销和所需里程碑缓冲推导]'
