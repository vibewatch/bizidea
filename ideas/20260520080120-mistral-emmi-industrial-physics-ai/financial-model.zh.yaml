scenarios:
  downside:
    description: OEM 建立信任的速度更慢，所以到 Q4Y3 只做到 14 个生产账户，毛利结构也更偏服务。
    y3RevenueK: 2200.0
    y3EbitdaK: -817.0
    cashLowPointK: 160.0
    keyAssumptionChanges:
      - 到 Y3 结束时只有 14 个生产账户，而不是 18 个，因为试点转生产时间晚了 1-2 个季度。
      - 毛利率停在 65%，因为 onboarding 和验证在更长时间里都仍然高度定制。
      - CAC 升到约 115K，因为创始人和解决方案团队仍需深度参与每一单。
  base:
    description: 公司在 Y1 转化 2 个试点，到 Q4Y2 做到 9 个生产账户，并在 Y3 结束时按完整 18 账户 SOM 路径落地，毛利率 70%。
    y3RevenueK: 2675.0
    y3EbitdaK: -374.7
    cashLowPointK: 707.4
    keyAssumptionChanges:
      - 年 ACV 维持模型中的每个生产账户 200K。
      - 试点转生产转化率保持在 business-plan 里 50%+ 的目标水平。
      - 在看到生产转化可重复之前，招聘节奏持续保持精简。
  upside:
    description: 参考客户缩短尽调周期，usage tiers 开始起效，公司在 Y3 结束时账户数和混合变现都略好于基准。
    y3RevenueK: 3150.0
    y3EbitdaK: 20.0
    cashLowPointK: 890.0
    keyAssumptionChanges:
      - 到 Y3 结束时有 20 个生产账户，而不是 18 个，因为伙伴转介绍和客户案例缩短了销售周期。
      - 混合年 ACV 提升到约 210K，因为第二个项目和 usage fees 更早开始贡献。
      - 随着材料包模板和治理控制更可复用，毛利率提升到 72%。
sensitivity:
  - variable: ARPU
    downsideCase: 如果买家只愿把产品限定在单一、很窄的模块工作流里，年 ACV 会降到 180K。
    baseCase: 每个生产账户年 ACV 为 200K。
    upsideCase: 如果 usage tier 和第二个项目扩张更早启动，年 ACV 可升到 220K。
    y3RevenueImpactK: -267.5
    cashImpactK: -187.3
  - variable: CAC
    downsideCase: 如果每次部署都仍然需要创始人和解决方案团队重度参与，每个新生产账户 CAC 会升到 115K。
    baseCase: 每个新生产账户 CAC 为 90K。
    upsideCase: 如果顾问和集成商能先筛出更优线索，CAC 可降到 70K。
    y3RevenueImpactK: 0.0
    cashImpactK: -450.0
  - variable: churn
    downsideCase: 如果产品停留在项目制，而没能跨项目标准化，月度 logo churn 会升到 2.0%。
    baseCase: 月度 logo churn 为 1.25%。
    upsideCase: 一旦治理能力和材料包模板嵌进客户流程，月度 logo churn 可降到 0.8%。
    y3RevenueImpactK: -150.0
    cashImpactK: -120.0
  - variable: sales cycle
    downsideCase: 如果 OEM 信任和内部审批都比预期更慢，试点转生产周期会拉长到 9 个月。
    baseCase: 在创始人主导销售模式下，试点转生产周期为 6-7 个月。
    upsideCase: 一旦有首批半导体参考客户，周期可缩短到 4-5 个月。
    y3RevenueImpactK: -450.0
    cashImpactK: -360.0
  - variable: gross margin
    downsideCase: 如果试点持续偏服务化，且求解器升级支持仍要靠人工，毛利率会掉到 65%。
    baseCase: 毛利率为 70%。
    upsideCase: 一旦材料包生成、治理和 onboarding 变得更可重复，毛利率可升到 72%。
    y3RevenueImpactK: 0.0
    cashImpactK: -175.0
  - variable: hiring pace
    downsideCase: 如果生产转化还没证明可重复，就把更多售后和运营岗位提前拉进 Y2。
    baseCase: Y2-Y3 维持精简扩编，只在看到生产规模化后再补运营支持。
    upsideCase: 如果伙伴辅助 onboarding 跑通，就把一个支持岗位延后到下一轮融资后再招。
    y3RevenueImpactK: 0.0
    cashImpactK: -160.0
modelDiagram:
  title: 单位经济模型流程
  mermaid: |
    flowchart LR
      Targets[目标供应商] --> Pilots[共创客户试点]
      Pilots --> Customers[生产账户]
      Customers --> Expansion[第二个活跃项目]
      Expansion --> Revenue[订阅与使用收入]
      Revenue --> GrossProfit[70 percent gross profit]
      GrossProfit --> Opex[精简招聘与交付开支]
      Opex --> Cash[期末现金]
modelSanity:
  - checkName: 收入引擎
    finding: 基准情形下的收入，来自 M12 前转化 2 个试点、Q4Y2 做到 9 个生产账户，以及 Y3 结束时做到 18 个账户、每个账户年 ACV 约 200K。
  - checkName: 必须成立的前提
    finding: 买家必须足够信任“先看 lineage、再做 surrogate screening”的材料包，才能让试点转生产维持在 50%+ 左右，并在早期客户里启动第二个项目扩张。
  - checkName: 模型会失效的条件
    finding: 如果 OEM 仍要求对几乎每次变更都完整重跑求解器，且周期拖到 9 个月左右，那么在公司做到 Y2 生产账户里程碑前， downside 情形下现金最低点会逼近约 0.2M。
  - checkName: 下一轮融资的证明点
    finding: 只要公司做出 8-10 个生产账户、第二个项目扩张可重复，以及治理能力完整的部署——并能在 6 周内把导出工件变成客户可直接使用的材料包——下一轮融资就站得住。
sanityChecks:
  ruleOf40: Y3 growth 161.0% + EBITDA margin -14.0% = 147.0%.
  burnMultiple: Y2 burn multiple 0.7x = $1.020M burn / $1.400M net-new ARR; Y3 burn multiple 0.2x = $0.375M burn / $1.800M net-new ARR.
  revenuePerFte: $243K Y3 on 11 Q4Y3 FTE (heuristic benchmark $200K-$400K vertical SaaS).
  flags:
    - Y3 的终点直接走到 research 里的完整 18 账户 SOM 路径，因此几乎没有给 ICP 收窄或信任建立延后的空间。
    - 模型把毛利率一直维持在 70%，但早期 onboarding 仍以文件式为主；如果现实里部署更偏服务化，公司会更接近 downside 情形。
    - 到 Q4Y3 才刚接近 break-even，这意味着只要销售周期更慢一点，或多提前招一个人，下一轮融资规模大概率就得加大。
    - 收入假设建立在“相当一部分低到中风险变更可接受 surrogate screening 材料包”之上；如果这点不成立，ROI 和销售转化会一起变弱。
