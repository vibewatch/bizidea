scenarios:
  downside:
    description: OEM trust builds more slowly, so production reaches only 14 accounts by Q4Y3 and margin stays more services-heavy.
    y3RevenueK: 2200.0
    y3EbitdaK: -817.0
    cashLowPointK: 160.0
    keyAssumptionChanges:
      - End Y3 with 14 production accounts instead of 18 because pilot-to-production timing slips by 1-2 quarters.
      - Gross margin stays at 65 percent because onboarding and validation remain bespoke for longer.
      - CAC rises to roughly 115K as founder and solutions effort remain heavily involved in every deal.
  base:
    description: The company converts 2 pilots in Y1, reaches 9 production accounts by Q4Y2, and ends Y3 at the full 18-account SOM path on 70 percent gross margin.
    y3RevenueK: 2675.0
    y3EbitdaK: -374.7
    cashLowPointK: 707.4
    keyAssumptionChanges:
      - Annual ACV stays at the modeled 200K per production account.
      - Pilot-to-production conversion remains consistent with the business-plan 50 percent plus target.
      - Hiring stays lean until repeatable production conversion is visible.
  upside:
    description: Reference accounts shorten diligence, usage tiers activate, and the company exits Y3 with modestly better account count and blended monetization.
    y3RevenueK: 3150.0
    y3EbitdaK: 20.0
    cashLowPointK: 890.0
    keyAssumptionChanges:
      - End Y3 with 20 production accounts instead of 18 because partner referrals and references shorten the sales cycle.
      - Blended annual ACV rises to about 210K as second-program and usage fees turn on earlier.
      - Gross margin improves to 72 percent as packet templates and governance controls become more reusable.
sensitivity:
  - variable: ARPU
    downsideCase: 180K annual ACV if buyers cap the product at one narrow module workflow.
    baseCase: 200K annual ACV per production account.
    upsideCase: 220K annual ACV with earlier usage-tier and second-program expansion.
    y3RevenueImpactK: -267.5
    cashImpactK: -187.3
  - variable: CAC
    downsideCase: 115K per new production account if every deployment still needs heavy founder and solutions effort.
    baseCase: 90K per new production account.
    upsideCase: 70K per new production account if consultants and integrators pre-qualify better prospects.
    y3RevenueImpactK: 0.0
    cashImpactK: -450.0
  - variable: churn
    downsideCase: 2.0 percent monthly logo churn if the product stays project-like rather than standardizing across programs.
    baseCase: 1.25 percent monthly logo churn.
    upsideCase: 0.8 percent monthly logo churn once governance and packet templates are embedded.
    y3RevenueImpactK: -150.0
    cashImpactK: -120.0
  - variable: sales cycle
    downsideCase: 9-month pilot-to-production cycle because OEM trust and internal approval take longer than expected.
    baseCase: 6-7 month pilot-to-production cycle in the founder-led motion.
    upsideCase: 4-5 month cycle once the first semiconductor reference accounts exist.
    y3RevenueImpactK: -450.0
    cashImpactK: -360.0
  - variable: gross margin
    downsideCase: 65 percent if pilots remain services-heavy and solver-escalation support stays manual.
    baseCase: 70 percent gross margin.
    upsideCase: 72 percent once packet generation, governance, and onboarding become more repeatable.
    y3RevenueImpactK: 0.0
    cashImpactK: -175.0
  - variable: hiring pace
    downsideCase: Pull additional post-sale and ops hires into Y2 before production conversion is repeatable.
    baseCase: Keep the Y2-Y3 ramp lean and add ops support only after production scale is visible.
    upsideCase: Delay one support hire until after the next round because partner-assisted onboarding works.
    y3RevenueImpactK: 0.0
    cashImpactK: -160.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Targets[Target suppliers] --> Pilots[Design-partner pilots]
      Pilots --> Customers[Production accounts]
      Customers --> Expansion[Second active programs]
      Expansion --> Revenue[Subscription and usage revenue]
      Revenue --> GrossProfit[70 percent gross profit]
      GrossProfit --> Opex[Lean hiring and delivery spend]
      Opex --> Cash[Ending cash]
modelSanity:
  - checkName: Revenue engine
    finding: Base-case revenue comes from converting 2 pilots by M12, reaching 9 production accounts by Q4Y2, and exiting Y3 at 18 accounts paying roughly 200K ACV.
  - checkName: Must go right
    finding: Buyers must trust lineage-first surrogate-screened packets enough for pilot-to-production conversion to stay near the 50 percent plus target and for second-program expansion to begin inside early accounts.
  - checkName: Model breaks if
    finding: If OEMs still demand full solver reruns and the cycle drifts toward 9 months, downside cash falls toward roughly 0.2M before the company earns the Y2 production-account milestone.
  - checkName: Next-round proof
    finding: The next financing is justified once the company shows 8-10 production accounts, repeatable second-program expansion, and governance-complete deployments that turn exported artifacts into customer-ready packets in 6 weeks or less.
sanityChecks:
  ruleOf40: Y3 growth 161.0% + EBITDA margin -14.0% = 147.0%.
  burnMultiple: Y2 burn multiple 0.7x = $1.020M burn / $1.400M net-new ARR; Y3 burn multiple 0.2x = $0.375M burn / $1.800M net-new ARR.
  revenuePerFte: $243K Y3 on 11 Q4Y3 FTE (heuristic benchmark $200K-$400K vertical SaaS).
  flags:
    - The Y3 endpoint reaches the full 18-account SOM path from the research, so there is little room for ICP shrinkage or delayed trust-building.
    - The model holds gross margin at 70 percent even while early onboarding is file-based, so a more services-heavy deployment reality would move the company toward the downside case.
    - Q4Y3 only reaches near break-even, which means a slower sales cycle or one additional pull-forward hire would likely increase the next round size.
    - Revenue assumes surrogate-screened packets are accepted for a meaningful share of low-to-medium risk changes; if not, ROI and sales conversion both weaken at once.
