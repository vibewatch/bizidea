    - point: Physics-AI 平台活动正在加速：Mistral 收购 Emmi，JuliaHub 也为 Dyad 融到大额新资金。
      sourceRefs:
        - 1
        - 31
        - 32
        - 33
    - point: 数字孪生基础设施已经被云厂商和工业软件厂商商业化，overlay 工作流公司不用再去承担整个平台风险。
      sourceRefs:
        - 27
        - 41
        - 45
        - 46
    - point: 欧洲半导体政策与产业集群密度，为前期客户发现提供了高度集中的地理基础。
      sourceRefs:
        - 11
        - 12
        - 60
  headwinds:
    - point: 初始滩头市场只是更广泛半导体供应商基盘中的一小块，因此增长高度依赖 ICP 选得准。
      sourceRefs:
        - 4
        - 11
        - 12
    - point: 现有厂商已经占住相邻的 CAE、PLM 和数字线程工作流，因此集成负担和捆绑风险都会偏高。
      sourceRefs:
        - 26
        - 27
        - 28
        - 30
        - 65
    - point: 治理、安全和材料合规要求，都会抬高任何 AI 参与工程放行工作流的证明成本。
      sourceRefs:
        - 58
        - 59
        - 61
        - 62
        - 63
        - 64
competitors:
  - name: Siemens Teamcenter / Simcenter
    stage: 现有厂商
    wedge: 在一套大型工业软件套件里，把数字孪生、仿真数据管理和调试整合到一起。
    pricing: 企业级 / 询价制；抓取到的工作流页面没有公开定价。
    strength: 在工程组织内部覆盖面深，而且能借安装基盘放大渗透。
    weaknessVsUs: 套件太重，不够聚焦“当天就要给 OEM 的变更资质材料包”。
    sourceRefs:
      - 26
      - 27
      - 28
  - name: COMSOL Semiconductor Module
    stage: 现有厂商
    wedge: 面向半导体器件及相关物理问题的高保真多物理建模。
    pricing: 抓取到的模块页未公开许可证价格。
    strength: 在半导体建模团队中，求解器深度和可信度都很强。
    weaknessVsUs: 有求解器深度，不等于就有跨系统资质工作流、材料包生成和升级治理。
    sourceRefs:
      - 65
  - name: Altair romAI
    stage: 现有厂商
    wedge: 通过 reduced-order modeling 和 system identification，加速高成本的 CFD、DEM 和 FEA 分析。
    pricing: 企业级 / marketplace 导向；抓取到的页面没有公开标价。
    strength: 在模型加速和系统级工作流部署上的故事很强。
    weaknessVsUs: 更像通用 ROM 工具，而不是面向半导体供应商的资质副驾。
    sourceRefs:
      - 30
  - name: JuliaHub Dyad
    stage: 成长期公司
    wedge: 面向工业工程师的 agentic、physics-based 建模与仿真环境。
    pricing: 企业级定价；抓取到的产品页和融资页都没有公开价格。
    strength: 动能强、刚融到大额资金，而且明确把自己定位成面向物理系统的 AI。
    weaknessVsUs: 站位仍偏上游，更多围着建模和设计自动化，而不是供应商侧响应运营。
    sourceRefs:
      - 31
      - 32
      - 33
  - name: NVIDIA PhysicsNeMo
    stage: 现有厂商
    wedge: 基于 NVIDIA 基础设施的物理约束与工程 AI 框架和工具链。
    pricing: 以框架为核心；客户开支更多体现为 GPU 与平台基础设施成本，而不是打包好的工作流 SKU。
    strength: 技术可信度很高，而且基础设施生态强。
    weaknessVsUs: 应用层、工作流层和信任层仍要客户或伙伴自己拼。
    sourceRefs:
      - 34
regulatoryTechnicalConstraints:
  - point: 任何会影响工程放行决策的工作流，都必须具备人工复核控制、模型 lineage 和治理纪律，才能满足企业对 AI 风险的预期。
    sourceRefs:
      - 58
      - 61
      - 62
  - point: 子系统材料或部件一旦变化，就可能触发 RoHS / REACH 合规检查，这些内容也必须反映在资质材料包里。
    sourceRefs:
      - 63
      - 64
  - point: 颗粒控制、精密密封和稳定晶圆搬运都是硬物理约束，因此许多 surrogate 输出都不可能在没有升级的前提下被直接信任。
    sourceRefs:
      - 17
      - 18
      - 19
  - point: PLM、求解器和工业数据环境之间的互操作，更可能依赖 FMI、OPC UA 这类标准，而不是某一家私有栈通吃。
    sourceRefs:
      - 55
      - 56
validationSignals:
  - point: Mistral 收购 Emmi 来补齐 Physics-AI，已经明确说明这一层在工业技术栈里具备战略重要性。
    sourceRefs:
      - 1
  - point: Brooks 表示，它的 reticle interface 已经装在当今所有 EUV 光刻机上，同时其 300 mm load port 安装基数超过 10,000，且在 2 nm 节点上通过了可靠性与洁净度验证。
    sourceRefs:
      - 16
  - point: ASML 披露其供应商数量达到 5,100 家，说明这套生态既足够大，也足够分散，公司切进去并不缺潜在对象。
    sourceRefs:
      - 4
  - point: VDL ETG 公开提到其长期服务光刻等复杂半导体设备客户，说明供应商侧模块市场真实存在，而且专业化很深。
    sourceRefs:
      - 14
openQuestions:
  - ASML 级 OEM 到底多常会接受经 surrogate screening 的证据，而不是坚持要求对真空、热控或晶圆搬运模块做一次新的完整求解器重跑？
  - 今天最终资质材料包的 system of record 究竟归谁：PLM、仿真团队、项目管理，还是面向客户的应用工程？
  - 第一版部署只靠导出文件和文档系统就能成功，还是多数目标账户从第一天起就要求深接 Teamcenter / CAD / 求解器？
  - 在模型里的 300 个 TAM 账户里，有多少真有足够历史仿真数据，能在前 6 个月校准出可信的 surrogate threshold？
