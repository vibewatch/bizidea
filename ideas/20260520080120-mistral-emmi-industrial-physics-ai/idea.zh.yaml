problem: >-
  半导体设备子系统供应商今天仍然靠排满的 CAE 队列、电子表格变更评审和手工客户资质材料，来回应 OEM 的工程变更。只要
  OEM 要求调整真空、热控或晶圆搬运模块设计，供应商往往得再等几天甚至几周，才能拿到新的仿真结果，然后才知道良率、热裕量或交付日期会不会受影响。这既拖慢收入，又耗掉稀缺的仿真人才，也会让规模较小的子系统供应商在大 OEM 面前显得不可靠。
targetUser:
  primary: >-
    欧洲 100–1,000 人规模的半导体设备子系统供应商里的项目负责人和仿真负责人——这些公司给 ASML 级 OEM
    项目提供真空、热控或晶圆搬运模块
  secondary: 负责回复客户再认证需求的应用工程师和技术客户经理
  buyer: 工程副总裁，或某条子系统产品线的总经理
startupThesis:
  nonObviousInsight: >-
    Physics-AI 最先被买单，不会是因为它是一套通用仿真平台；真正会先付费的场景，是仿真结果直接决定供应商能不能回客户的变更请求、守住发货日期。新机会不在替代
    Ansys 或 COMSOL，而在外面包一层工作流，把模型结果直接变成商业和技术决策。
  beachhead: >-
    服务欧洲半导体设备子系统供应商、覆盖光刻、计量和晶圆搬运 OEM 项目的工程变更影响分析与资质证明
  wedge: >-
    一款由仿真支撑的变更单副驾，把 CAD 与需求变更转成快速 surrogate model 重跑、风险摘要，以及可直接交给 OEM 的资质材料包
  whyNowCatalyst: >-
    Mistral 收购 Emmi，并点名与 ASML 的合作，说明 Physics-AI 已经从研究新鲜事变成战略级工程基础设施，供应商资质响应慢的问题也因此变得更急。
  ventureScalePath: >-
    先从半导体子系统变更决策切进去，再扩到航空航天、汽车、能源设备供应商；这些行业同样要靠仿真支撑发布、资质审核和工程变更工作流。
solution: >-
  Semiconductor Change Sim OS 会接入供应商现有工程栈中的需求变更、CAD 修订、历史求解器输出和资质模板。产品先用校准过的
  Physics-AI surrogate model，在几分钟内筛出热、流体、振动或吞吐量可能受影响的地方；只有不确定或高风险的案例，才升级给现有全量求解器。随后系统自动生成一份可直接发给客户的响应材料包，写清受影响参数、前提假设、模型 lineage，以及建议给
  OEM 的下一步动作。它还会持续记录哪些变更模式反复拖出晚到的再认证工作，让工程负责人看出哪些模块架构最脆弱，并更早把仿真资源配到位。首版部署先接导出文件和文档系统，不要求供应商替换现有 CAE 栈。
goToMarketSeed:
  firstCustomer: >-
    服务 ASML 级 OEM、拥有 50–300 名机械和仿真工程师、且经常要处理真空、热控或晶圆搬运模块工程变更的欧洲半导体子系统供应商
  buyingTrigger: OEM 或晶圆厂客户提出设计变更或再认证要求，直接威胁已承诺的发货日期或验收节点
  currentAlternative: Ansys 或 COMSOL 分析师、内部脚本、电子表格变更评审，以及手工准备资质答复的工程服务公司
  switchingReason: >-
    这个切口让项目团队当天就能拿到有仿真支撑的答案，不必排队等稀缺的 CAE 资源；只有少数真要高保真分析的案例，才继续沿用现有求解器工作流。
  pricingHypothesis: 按活跃模块项目收年费订阅，并对工程变更决策次数和生成的资质材料包分档计费
whyNow:
  - point: Mistral 收购 Emmi，说明工业客户现在需要的是 LLM 之外再加一层 Physics-AI，这等于给围绕工程决策的新软件类别做了验证。
    signalRefs:
      - Physics-AI 正在成为 LLM 之外的必备层
    sourceRefs: [1]
  - point: 公告最先点名的行业就是半导体、航空航天、汽车和能源，这意味着需求正出现在那些仿真答复一旦延迟就会卡住关键交付收入的领域。
    signalRefs:
      - 仿真加速正落到高价值工业垂类
    sourceRefs: [1]
  - point: 公告提到 ASML 与 Mistral 的合作，说明先进设备 OEM 现在就想把 AI 嵌进产品工作流，也逼着供应商更快拿出可信证据。
    signalRefs:
      - ASML 级 OEM 的需求正在把整条技术栈往上拉
    sourceRefs: [1]
  - point: 一家种子期公司大约一年内就被收购，说明战略平台正在提前整合，也给更垂直的工作流应用留下窗口，能在大套件把一切收进去之前先拿下中端市场。
    signalRefs:
      - 平台整合正在提前发生
    sourceRefs: [1]
differentiator: >-
  这不是又一个通用工程 copilot，也不是替代 CAE 求解器的产品。它卡在仿真结果、客户资质审核和发货日期决策正面碰撞的那条边界上，所以
  ROI 对应的是保住交付节点，而不是抽象的效率提升。时间越久，它就越能靠跨供应商积累的专有变更结果数据、资质模板和升级模式，建出护城河——这些数据单个
  OEM 或现有求解器厂商都看不到全局。
