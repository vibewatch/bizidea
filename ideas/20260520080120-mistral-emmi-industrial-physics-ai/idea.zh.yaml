jobsToBeDone:
  - job: >-
      当 OEM 在资质审核临近时提出模块设计变更，帮项目负责人和仿真负责人尽快判断影响，好让他们在不拖交付计划的前提下回复客户。
    currentAlternative: 等完整 CAE 重跑，再靠电子表格和邮件协调更新
    successMetric: 从工程变更请求到可直接给客户的答复，耗时多少小时
  - job: >-
      当供应商必须向 OEM 的质量团队或应用团队证明修订后的设计站得住脚时，帮应用工程师快速生成可追溯证据，好让再认证少来回几轮。
    currentAlternative: 从求解器截图、电子表格和旧资质文档里手工拼报告
    successMetric: 每次设计变更触发的客户再认证往返轮次
ideaScorecard:
  signalStrength:
    score: 4
    rationale: 这笔收购、公告点名的行业，以及与 ASML 的合作，合在一起足以说明 Physics-AI 正在变成工业工程里的战略基础设施。
  painIntensity:
    score: 4
    rationale: 工程变更答复一旦延迟，直接会威胁发货日期、客户信任，以及稀缺仿真团队的利用率。
  wedgeClarity:
    score: 5
    rationale: 半导体子系统在设计变更后的资质审核，是一个非常窄但很清晰的工作流：触发事件明确、买家明确、响应时间 ROI 也能量化。
  defensibility:
    score: 4
    rationale: 只要把校准过的 surrogate model、资质模板，以及哪些变更模式会触发升级或被接受的数据积起来，护城河就会越滚越厚。
  ventureScale:
    score: 4
    rationale: 这套工作流同样存在于半导体、航空航天、汽车和能源设备供应商里，因此有机会从一个垂类走向更广的工业发布平台。
topRisks:
  - name: 模型信任缺口
    description: 如果供应商和 OEM 看不清什么时候该升级到完整求解器，就可能不会接受 surrogate model 的输出。
    mitigation: 上线置信阈值、校准日志和强制 handoff 规则，把不确定案例自动送回现有 CAE 工作流。
  - name: 现有厂商捆绑销售
    description: 大型 CAE 或 PLM 厂商可能会补上轻量级变更分析助手，再靠渠道压缩价格。
    mitigation: 聚焦跨系统资质工作流、客户证据生成，以及现有厂商没有端到端掌控的多工具编排。
  - name: 初始切口过窄
    description: 如果第一阶段只盯半导体子系统供应商，且 ICP 太小或节奏太慢，早期 pipeline 可能受限。
    mitigation: 先吃下半导体设备里最常见的变更工作流，再把同一套产品扩到航空航天和能源设备供应商的相似资质场景。
