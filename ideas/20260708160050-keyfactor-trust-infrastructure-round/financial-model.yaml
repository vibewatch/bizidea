modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      QualifiedProgram --> PaidPilot
      PaidPilot --> ProductionPlatform
      ProductionPlatform --> ExpansionModules
      ProductionPlatform --> Revenue
      ExpansionModules --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: Revenue engine
    finding: Base-case revenue comes from growing active governed-platform contracts from 3 at Y1 exit to 8 by Q4Y2 and 10 by Y3 while blended ACV rises toward $400K through add-on modules and adjacent-cluster expansion.
  - checkName: Must go right
    finding: The company must keep first value near 45 days and convert paid pilots into production subscriptions on schedule because the Y2 customer ramp does most of the work in the base case.
  - checkName: Model breaks if
    finding: If banks push cutovers beyond one budget cycle or force the product into services-heavy overlays on top of incumbents, the downside case drives cash low point to roughly $3.5M negative.
  - checkName: Next-round proof
    finding: The next financing is justified once the business shows 5 active governed-platform contracts, 2 successful production cutovers, and at least one partner-ready deployment playbook with repeatable 45-day delivery.
sanityChecks:
  ruleOf40: Y3 growth 103.7% + EBITDA margin -9.5% = 94.2%
  burnMultiple: Y3 burn multiple is about 0.3x based on roughly $350.4K EBITDA burn against about $1360.0K of exit-ARR expansion from 8 to 10 active platforms.
  revenuePerFte: $336K Y3 recognized revenue per 11 q4 FTE (benchmark roughly $200K-$400K for enterprise infrastructure SaaS).
  flags:
    - The model assumes paid pilots are monetized at roughly $100K over four months; if pilots turn into discounted discovery work, Y1 cash need rises materially.
    - Gross-margin improvement depends on the 45-day bank-ready playbook holding; if every deployment still needs heavy custom engineering, the downside case becomes more likely.
    - The company is still selling beside large incumbents, so a slower standalone budget decision can hurt both sales-cycle timing and CAC at the same time.
    - LTV and churn are heuristic because there is no public retention dataset for workflow-specific trust-infrastructure change-control software yet.
