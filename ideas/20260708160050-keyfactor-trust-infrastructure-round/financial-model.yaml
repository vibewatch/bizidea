scenarios:
  downside:
    description: Pilot conversions slip, incumbent overlap slows standalone budget approval, and deployment work stays more services-heavy than planned.
    y3RevenueK: 2569.6
    y3EbitdaK: -1265.0
    cashLowPointK: -3477.9
    keyAssumptionChanges:
      - End-Y2 active governed platforms fall from 8 to 6.
      - End-Y3 active governed platforms fall from 10 to 8.
      - Blended annual revenue per active platform tops out near $350K instead of $400K.
      - Steady-state gross margin reaches only 68% because deployment work remains more bespoke.
  base:
    description: Three paid pilots in Y1 become 8 active governed-platform contracts by Q4Y2 and 10 by Y3 as the first-stack deployment and expansion motion become repeatable.
    y3RevenueK: 3696.3
    y3EbitdaK: -350.4
    cashLowPointK: -2339.3
    keyAssumptionChanges:
      - No change from A1-A26 base assumptions.
  upside:
    description: Paid pilots convert faster, partner-sourced opportunities start contributing in Y2, and add-on modules lift both platform count and blended ACV earlier.
    y3RevenueK: 4672.8
    y3EbitdaK: 446.4
    cashLowPointK: -1441.1
    keyAssumptionChanges:
      - End-Y2 active governed platforms rise from 8 to 9.
      - End-Y3 active governed platforms rise from 10 to 12.
      - Blended annual revenue per active platform reaches about $425K as PQC policy packs and audit reporting attach sooner.
      - Steady-state gross margin reaches 74% as the bank-ready playbook reduces bespoke delivery time.
