slug: pqc-cutover-flightdeck
date: '2026-07-08'
executiveSummary: 这套 PQC cutover flightdeck 一开始就该被做成某条强监管 AI 工作流的变更控制层，而不是另一套机器身份大而全平台。滩头市场是北美前 200 大银行：内部 AI 助手或反欺诈平台跑在 Kubernetes 上，背后接企业 CA，而且已经被 2026-2027 年的 PQC 或证书有效期专项卡住。研究给出的紧迫感很足：证书有效期缩短、AI 驱动的机器身份扩张，以及董事会支持的 PQC 要求，正在把证书工作从后台运维改写成发布控制问题。首个产品要做的是把证书依赖理清、把轮换先干跑一遍，再为 mesh、网关和工作负载身份编排分阶段发布与回滚，先服务一条绝不能出事的平台。第一单应该卖成付费的 cutover 就绪项目，再转成受治理 AI 平台的年订阅，因为买方本来就在为相邻的信任基础设施和迁移项目掏钱。前期先直销，等第一套标准栈能重复交付后，再借 PKI、Kubernetes 和服务网格集成商放大。这个计划真正要验证的，不是技术能不能做出来，而是银行会不会在现有 PKI 套件之外，再给一层独立 cutover 层单列预算；这件事看起来说得通，但还没被证实，必须用付费试点去打。最大的战略风险也不是技术可行性，而是集成复杂度和预算摩擦会不会把产品锁死在服务项目或现有厂商功能里。研究给出了市场规模和相邻付费意愿的估算，但还没找到这条工作流的具名买家和独立定价锚点，所以前期证明必须盯住交付速度、付费试点，以及试点转生产的效率。
problem:
- 大银行的 AI 平台团队往外加网关、mesh、agent 和服务账号的速度，已经快过 PKI 团队梳理证书归属的速度；所以一旦证书有效期缩短，或 PQC cutover 启动，AI 工作流恰好在进生产的节骨眼上，故障风险就会跳出来。
- 现有 CLM、CA 和库存工具会签发、会追踪，但它们不会围绕一条真实应用，把整条 mesh→gateway→workload 路径上的影响半径、维护顺序和回滚先演练一遍。
solution:
- 先把企业 CA、Kubernetes、服务网格、API 网关、密钥存储和工作负载元数据接起来，为一条受治理的 AI 平台画出活的依赖图，再在变更窗口打开前模拟短周期或 PQC 证书轮换。
- 再把仿真变成执行层：签发、审批、健康检查、发布和回滚都按步骤跑，并能导出证据，这样安全、SRE 和审计团队不用再开战情室，也敢批这次 cutover。
whyWeWin:
- 我们卖进去的是最容易出事故的 cutover 窗口，而这正是现有厂商和内部脚本最容易失手的地方：到底什么会断、该按什么顺序轮换、出问题后又该怎么按现有拓扑退回来。
- 依赖图、反复积累的 cutover 遥测，以及面向强监管 AI 工作流的审计级证据，会慢慢叠成工作流原生护城河——这不是更大而全的机器身份平台光靠库存表就能拿到的数据。
strategicChoices:
  beachhead: 北美前 200 大银行：在 Kubernetes 上跑一条内部 AI 助手或反欺诈分析平台，用 Istio 或 Linkerd，背后接企业 CA，而且已经启动了带明确时间表的 PQC 或证书有效期变更项目。
  wedgeRationale: 这一刀切得准：有明确触发器、有清晰的高管买方，失败代价还很贵。先卖一条绝不能失手的 AI 工作流，比一上来就卖整个企业的横向信任编排，更快做出证据。
  sequencingRationale: 产品先从一套带明确假设的标准栈和影子演练起步，因为买方要先看见证据，才敢开自动化；GTM 先由创始人直销，盯着具名 cutover 项目打，因为预算绑在某个硬截止期上；招聘则先补工程和解决方案深度，因为在渠道放大前，真正卡脖子的是部署能不能重复交付。
  notYet:
  - 不做证书颁发机构替换，也不卖全套机器身份平台。
  - 不在第一条受治理 AI 平台之外，去卖全企业通用证书库存。
  - 先不碰银行之外的行业，也不碰会打破第一套标准栈交付剧本的多云边角场景。
market:
  tam: 按约 3,000 家全球强监管企业估算：这些企业都有复杂的云原生和 AI 资产，每家首年控制层 ACV 约 $300k，对应 TAM 约 $0.9B。
  sam: 按北美前 200 家银行估算：每家先从 2 条受治理 AI 平台起步，每平台年 ACV 约 $300k，对应窄滩头市场 SAM 约 $120.0M。
  som: 按第 3 年可触达 10 个 logo 估算：先拿下一条工作流，再往相邻 cluster 和 gateway 扩，混合 ACV 约 $400k，对应 SOM 约 $4.0M。
  segments:
  - 在正式 PQC 或短周期证书项目下，把内部 AI 助手、反欺诈或资金业务工作流搬到 Kubernetes 上的北美前 200 大银行。
  - 一旦银行剧本被证实，其他同样有云原生 AI 工作负载和明确密码迁移要求的强监管企业。
  buyingProcess: 通常是密码工程或平台主管安全负责人先把 PKI 运维和 SRE 负责人拉到同一条、带明确 cutover 日期的 AI 工作流上。只有当 CISO 或基础设施高管能把预算挂到某个 PQC 或证书有效期专项上，并看见这条工作流的干跑证据、审批链和回滚就绪度，交易才会真正关单。
product:
  mvp: MVP 只做一套带银行色彩的标准栈：一个企业 CA、一个 Kubernetes 集群、Istio 或 Linkerd、一个 API 网关，以及单条 AI 工作流的一层 secrets。它要交付的是依赖映射、影响半径演练、责任人定位、cutover runbook、分阶段发布、健康检查和回滚证据；刻意不做 CA 替换、宽泛多云支持和全企业库存。
  sixMonth: 6 个月内把第一套标准栈打成包：证据导出、审批流和第二条服务网格路径都补上，让共创客户在 45 天内跑出可用演练结果。
  twelveMonth: 12 个月内补齐生产级回滚自动化、短周期与 PQC 轮换的可复用策略包，再接入第二个 CA 或云 CA 路径，把对定制工程的依赖压下去。
  twentyFourMonth: 24 个月内从单条 AI 平台的 cutover，扩到跨多个 cluster、gateway 和迁移事件的企业级密码变更控制，再补上董事会和审计报表，但仍不去替代现有 CA。
  keyBets:
  - 买方愿意为更快、更安全的 cutover 和上线批准付钱，而不是再买一块库存看板。
  - 一套带明确假设的银行标准栈，能足够快地跑出首个价值，不至于把企业销售拖成低毛利服务项目。
  - cutover 遥测和证据模板会提高试点转生产率，并推动老客户继续扩。
gtm:
  wedge: 先把一条贴着客户数据的 AI 工作流卖成付费的 cutover 就绪项目：从依赖发现和干跑演练切入，等首个变更窗口跑通后，再转成年订阅。
  channels:
  - 由创始人直销给有明确 PQC 或证书有效期专项的银行：对象是密码工程、平台主管安全、CISO 和基础设施高管。
  - 找已经在做 cert-manager、CA 和 cluster 发布工作的 PKI、Kubernetes 与服务网格实施伙伴。
  - 与 PQC 迁移顾问、强监管行业 MSSP 和审计导向的咨询公司合作，让他们把绝不能失手的 cutover 项目带进来。
  funnelTargets: 线索→合格 cutover 项目 15-25%；合格项目→付费试点 40%+；付费试点→生产 50%+；进入生产的账户里，50%+ 能在 12 个月内从第一条工作流扩到第二条。
  pricing: 先卖一条工作流的 $75k-$125k 付费试点，再转成每个受治理 AI 平台每年 $250k-$350k 的订阅，按活跃 cluster 和机器身份计价；PQC 策略包和托管 cutover 波次再做加价模块。这样更贴合买方按项目管理的信任基础设施预算，也和研究里首年约 $300k 的 ACV 假设一致。
businessModel:
  revenueStreams:
  - 按活跃 cluster 和机器身份数收取受治理 AI 平台的年订阅费，前提是这些身份已被纳入演练和发布控制。
  - 绑定正式迁移项目的 PQC 策略、报表和证据留存高级模块。
  - 首波 cutover 服务包，以及早期账户里的伙伴协助部署服务。
  unitOfValue: 受治理的 AI 平台：按活跃 Kubernetes cluster、gateway 身份，以及纳入演练和发布控制的机器身份来计量。
  targetGrossMarginPct: 70
  expansionLevers:
  - 在同一家银行里，从一条 AI 工作流扩到更多 cluster、gateway 和机器身份域。
  - 让客户从干跑证据，继续买到自动发布、回滚和审计报表模块。
  - 把同一层控制从短周期证书轮换，扩到更广的 PQC 和企业级密码迁移项目。
strategyMap:
  northStarMetric: 在 flightdeck 控制下，以零 Sev-1 事故完成证书策略变更的生产 AI 平台数。
  inputMetrics:
  - 从 kickoff 到第一条工作流跑出可用依赖图的天数。
  - 合格项目转付费试点的比例。
  - 付费试点转生产的比例。
  - 按计划完成机器身份轮换、且没有 Sev-1 事故或错过发布日期的占比。
  - 进入生产的账户里，12 个月内扩到第二条受治理工作流的占比。
  moatsToBuild:
  - 一张活的依赖图，把强监管 AI 平台里的证书、工作负载、网关、信任包和具名负责人都串起来。
  - 历史 cutover 遥测，记录活轮换里的失败特征、安全维护顺序和回滚成功率。
  - 面向审计的证据包，把密码变更直接映射到审批、监控和 PQC 就绪里程碑。
  killCriteria:
  - 如果前 12 家目标银行里，不到 4 家在未来 12 个月内有带明确日期的 AI 工作流 cutover，那“时间点已到”的判断就是错的。
  - 如果前 5 个付费试点里，不到 2 个能在第 15 个月前按年化 "$250k+" 的价值转成生产，说明独立预算这套逻辑不成立。
  - 如果第一套标准栈在 45 天内都跑不出可用依赖图，集成拖拽就会直接卡死 GTM 效率。
  mermaid: |
    flowchart LR
      Wedge[Bank AI workflow cutover] --> MVP[Dependency graph plus dry-run]
      MVP --> Proof[Zero-Sev-1 production rotations]
      Proof --> Expansion[More clusters, gateways, and migration programs]
investorMemo:
  verdict:
    call: 值得见 / 继续尽调
    conviction: 问题信号强、银行切口也够准，但前提是必须证明：中立的 cutover 层能在现有 PKI 套件旁边单独拿到预算。
    whyBelieve: 这套计划瞄准的是一个董事会看得见的发布控制问题——证书有效期缩短、PQC 要求和 AI 身份扩张，已经把高管紧迫感推上来了。
    whyDoubt: 同一批买方早就在给 Keyfactor、CyberArk/Venafi、DigiCert 或 AppViewX 付钱；如果部署速度和故障风险下降做不出明显优势，创业公司很容易被挤回服务项目或现有厂商功能里。
    nextDiligence: 先做 8-10 场银行共创客户访谈，验证一条具名 AI 工作流能不能在一个预算周期内先变成付费 cutover 试点，再顺利转生产。
  firstCustomer:
    title: 美国前 50 大银行的密码工程总监
    profile: 一家大银行正在 Kubernetes 和 Istio 上跑内部联络中心助手与欺诈调查 copilot，中央 PKI、服务网格和网关团队都卷进了上线审批。
    trigger: 董事会支持的 PQC 或证书有效期项目，逼着银行在下一次生产发布前，先轮换一条贴着客户数据的 AI 平台上的机器身份。
    buyer: CISO 或基础设施执行副总裁
    initialContract: 先卖一条工作流的 $75k-$125k 付费试点；当第一条受治理 AI 平台正式上线后，再转成每年 $250k-$350k 的订阅。随着相邻 cluster 和 gateway 域继续扩，账户的混合 ACV 有机会抬到研究里测算的第 3 年约 $400k。
  mustBeTrue:
  - 至少有一个大型银行细分客群，会在未来 12 个月内碰到带明确日期的 AI 工作流证书 cutover，而不只是长期 PQC 规划。
  - 买方会把影响半径演练和回滚证据，当成独立于证书库存和生命周期管理的一笔采购。
  - 一套标准首栈能在 45 天内跑出可用的依赖映射，不需要大量定制服务。
  - 只要买方看见干跑证据和在线回滚控制，超过一半的付费试点就能转成生产。
  - 在现有厂商把切口抹平之前，公司能从一条受治理 AI 工作流，扩到更广的密码变更项目。
  diligenceQuestions:
  - 北美前 200 大银行里，现在到底有多少家在跑具名的 AI 工作流，而且 cutover 日期已经定在证书有效期或 PQC 项目里？
  - 在已经部署 Keyfactor、CyberArk/Venafi、DigiCert 或 AppViewX 的账户里，谁握着独立 cutover 层的预算？
  - 哪条集成路径最快跑出首个价值：企业 CA + Istio、企业 CA + Linkerd，还是云 CA + cert-manager？
  - 银行 CISO 看到哪些证据或指标，才会相信一次干跑可以安全推进到自动化的在线轮换？
  - 真实银行的证书轮换里，最常反复出现的失败信号是什么：trust bundle 滞后、责任人不清、审批拖延，还是应用依赖断裂？
operatingAssumptions:
- assumption: 北美前 200 大银行里，有一块足够大的子集在未来 12 个月内确实存在具名 AI 工作流，而且带着明确的证书有效期或 PQC cutover 日期。
  basis: research.yaml
  validationTest: 前 20 场银行访谈里，至少确认 6 个合格机会：都有具名工作流、目标日期和高管 sponsor。
  decisionImpact: 如果不成立，公司就该推迟只做银行的策略，或者先从 AI 工作流之外的短周期证书项目切入。
- assumption: 即便银行已经用了现有机器身份套件，仍愿意给独立 cutover 层单独出钱。
  basis: research.yaml
  validationTest: 在已经跑 Keyfactor、CyberArk/Venafi、DigiCert 或 AppViewX 的账户里，至少拿下 3 个付费试点。
  decisionImpact: 如果不成立，产品就得改成由伙伴交付的模块，或干脆走服务覆盖层，而不是独立软件平台。
- assumption: 一套带明确假设的标准栈，可以在不被定制工程吞没的情况下交付可用的依赖映射和演练结果。
  basis: 团队判断
  validationTest: 用同一套核心 playbook 完成 3 个共创客户部署，而且每个账户的定制工作都压在 3 个工程师周以内。
  decisionImpact: 如果不成立，毛利率和部署速度都会断，范围就得继续收窄，或者把服务明确做成一条独立业务。
- assumption: 干跑证据和回滚控制，能显著提高上线批准和试点转生产率。
  basis: idea.yaml
  validationTest: 以前 4 个付费试点为样本，至少有 2 个能在试点开始后的 6 个月内，按约定 cutover 标准转进生产。
  decisionImpact: 如果不成立，产品也许更适合被定位成发现或故障响应工具，而不是变更控制软件。
- assumption: 从一条 AI 工作流扩到相邻 cluster 和 gateway 的能力，足够支撑企业级 ACV 继续增长。
  basis: 团队判断
  validationTest: 前 5 个生产账户里，至少有 2 个能在 12 个月内再买一条受治理工作流或一个模块。
  decisionImpact: 如果不成立，这个窄切口可能滚不出风投级账户经济性，扩张逻辑就得重写。
experimentRoadmap:
- horizon: 0–90 天
  experiment: 访谈 20 位银行密码工程、平台主管安全和 SRE 负责人，再加 5 家实施伙伴，确认 AI 工作流上带明确日期的证书有效期或 PQC 变更。
  hypothesis: 至少有 6 家银行已经点名某条 AI 工作流会在未来 12 个月内 cutover，而且高管 sponsor 很清楚。
  successMetric: 拿到 6 个以上合格机会：具名工作流、上线日期、当前工具链和采购委员会都被画清。
  owner: 创始人/CEO
- horizon: 0–90 天
  experiment: 先做一个依赖图和干跑 UI 原型，覆盖一套标准栈：一个企业 CA、Kubernetes、Istio 和一个 API 网关。
  hypothesis: 买方对影响半径演练和回滚顺序的反应，会明显强过再看一块库存看板。
  successMetric: 4 个以上共创客户机会在看过原型和示例 cutover runbook 后，要求继续做技术试点。
  owner: 创始工程师
- horizon: 0–90 天
  experiment: 拿一位共创客户的历史拓扑跑一次模拟轮换，并导出审批证据包。
  hypothesis: 安全和平台团队会把审批证据看成上线准备的一部分，而不只是运维文档。
  successMetric: 2 个机会明确同意进入付费 discovery 或试点，并写下生产上线标准。
  owner: 创始工程师
- horizon: 3–6 个月
  experiment: 把 45 天首栈部署打成产品包，并交付前 3 个共创客户实施。
  hypothesis: 同一套 playbook 能在不把项目拖成重服务定制的前提下，稳定跑出可用依赖图。
  successMetric: 3 个部署都能在 kickoff 后 45 天内交出可用图谱和演练结果。
  owner: 解决方案工程师
- horizon: 6–12 个月
  experiment: 把 3 个共创客户转成付费试点，并且都绑定到一条真实的证书有效期或 PQC cutover 上。
  hypothesis: 即便还没把自动化做满，只要产品能明显降低故障风险和审批摩擦，买方也愿意先付钱。
  successMetric: 签下 3 个单价 "$75k+" 的付费试点，而且成功标准都和某个变更窗口绑定。
  owner: 创始人/CEO
- horizon: 6–12 个月
  experiment: 执行前 2 次真实在线轮换，带上分阶段发布、健康检查和回滚控制。
  hypothesis: 真实 cutover 的生产证明能让至少一半的付费试点转成生产，也会给伙伴渠道攒出第一批证据。
  successMetric: 完成 2 次生产 cutover，零 Sev-1 事故，而且每个账户里至少触发 1 次扩张对话。
  owner: 创始工程师
- horizon: 12–18 个月
  experiment: 签下 3 家 PKI 或 Kubernetes 实施伙伴，并测一轮由伙伴主导的见效速度。
  hypothesis: 只要首栈产品包稳定下来，集成商既能带来合格试点，也能把部署压在 45 天内。
  successMetric: 签下 3 家伙伴，并拿到 2 个由伙伴带来的试点，而且首个价值都在 45 天内交付。
  owner: 合作负责人
operations:
- 维护一套可重复的上线 playbook：把每条受治理工作流的 CA、mesh、gateway、secrets、负责人、审批步骤和回滚联系人都映射清楚。
- 把 cutover 证据导进客户现有的 SIEM、GRC 或审计系统，而不是第一天就去重造一座全功能 trust-control tower。
- 每个生产账户在开启在线轮换前，都必须点名安全负责人、SRE 负责人和回滚批准人。
- 优先和企业 CA 厂商、Kubernetes 咨询公司和 PQC 顾问建立集成与转介绍合作，而不是试图替掉现有工具。
team:
- role: 创始工程师
  startTiming: 第 0 个月
  rationale: 把依赖图、干跑引擎和在线发布控制搭出来，先让共创客户试点有说服力。
- role: 创始人/CEO
  startTiming: 第 0 个月
  rationale: 前几单必须由创始人亲自卖、亲自定价和打包，因为这阶段最重要的是教育问题和拿回反馈闭环。
- role: 解决方案工程师
  startTiming: 第 3 个月
  rationale: 把部署摩擦压下来，把 45 天 playbook 固化住，别让试点一启动就把工程带宽吃光。
- role: 密码学 / 平台产品负责人
  startTiming: 第 6 个月
  rationale: 把试点里学到的东西沉淀成可复用的 PQC 和短周期证书策略包、审批流与证据导出。
- role: 合作负责人
  startTiming: 第 12 个月
  rationale: 等首栈部署和试点转化都可重复后，再通过 PKI、Kubernetes 和审计伙伴放大。
milestones:
- horizon: 0–12 个月
  items:
  - 把第一套银行可用标准栈打成包：一个企业 CA、Kubernetes、Istio 或 Linkerd、一个 API 网关和一层 secrets。
  - 签下 6-8 个共创客户，并把至少 3 个转成绑定具名 cutover 窗口的付费试点。
  - 完成 2 次在线生产轮换，零 Sev-1 事故，并沉淀可复用的证据包。
  - 证明 45 天内能跑出首个价值，而且试点能在一个预算周期内转生产。
- horizon: 12–24 个月
  items:
  - 补上第二个 CA 或云 CA 集成路径，再把回滚自动化和策略模板做强。
  - 把生产客户做到账面 8-12 家，并让第二条工作流扩张在早期银行账户里变成可重复动作。
  - 让伙伴开始实质性贡献 pipeline，同时不丢掉这套带明确假设的部署模型。
  - 上线面向 PQC 和证书有效期项目的董事会 / 审计报表。
- horizon: 24–36 个月
  items:
  - 做到 10 家以上银行或强监管企业生产客户，让他们持续用平台处理密码变更事件。
  - 从单一 AI 工作流切口，扩到跨多个 cluster 和 gateway 的企业级密码变更控制。
  - 在证书有效期与 PQC 迁移里，长成审批、演练证据和回滚历史的系统记录层。
risks:
- risk: 现有机器身份厂商补上足够多的演练与回滚功能，把独立切口直接压扁。
  likelihood: High
  impact: High
  mitigation: 靠更深的应用路径依赖映射、单一银行工作流里更快建立信心的速度，以及跨 CA、mesh、gateway 和 workload 各层的中立编排取胜。
- risk: 集成拖拽把部署硬生生拖成定制服务项目。
  likelihood: Medium
  impact: High
  mitigation: 首产品只做一套带明确假设的标准栈，盯住 45 天见效时间，并在放大销售前先补解决方案人才。
- risk: 银行把 PQC 继续当战略规划，而不是短期运营开支，于是 cutover 层预算被往后拖。
  likelihood: Medium
  impact: High
  mitigation: 前期销售先锚在短周期证书轮换和具名 AI 平台上线闸门，等运维紧迫感被坐实后，再把 PQC 模块挂上去。
- risk: 买方认定现有的 Keyfactor、CyberArk/Venafi、DigiCert 或 AppViewX 部署已经够用。
  likelihood: Medium
  impact: High
  mitigation: 在已经跑现有工具的账户里做并排试点，把故障风险下降和上线审批提速量化出来。
- risk: 在线轮换控制带来误报或操作者不信任，拖慢生产采用。
  likelihood: Medium
  impact: Medium
  mitigation: 先以影子模式运行，强制保留明确回滚检查点，再把健康检查阈值调顺后，才放开自动阻断或大规模轮换。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $3-5M
  runwayMonths: 18
  useOfFundsSummary: 18 个月的资金，要买出第一套打包好的银行标准栈、6-8 个共创客户、3 个付费试点、2 次生产 cutover、证据与报表模块，以及证明 45 天内可重复部署所需的早期解决方案与合作岗位。
