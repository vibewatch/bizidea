competitors:
- name: Keyfactor
  stage: scale-up
  wedge: Trust Control Plane，覆盖密码资产发现、签发、证书生命周期自动化和 PQC 就绪。
  pricing: 定制定价 / 企业版
  strength: installed base 深、银行渗透强，而且把信任基础设施和 AI / PQC 紧迫感绑在一起讲得很顺。
  weaknessVsUs: 它占的是大平台叙事，不是围绕单一 AI 平台 cutover 的银行专用演练与回滚 flightdeck。
  sourceRefs:
  - 1
  - 2
  - 3
- name: CyberArk / Venafi
  stage: incumbent
  wedge: 端到端机器身份安全，覆盖证书、工作负载身份、secrets、PKI 和 Kubernetes 自动化。
  pricing: 定制定价 / 企业版
  strength: 身份安全分发能力极强，收购 Venafi 之后机器身份平台故事更完整。
  weaknessVsUs: 类目宽度是优势，但产品叙事仍偏平台级安全，而不是围绕某条强监管 AI 工作流做依赖感知的发布控制。
  sourceRefs:
  - 4
  - 5
  - 6
- name: DigiCert Trust Lifecycle Manager
  stage: incumbent
  wedge: CA 无关的证书生命周期管理，集成面很广，也在补 PQC 支持。
  pricing: 定制定价 / 企业版
  strength: 企业信任品牌强，云、服务器、服务管理和 DevOps 环境上的集成面很宽。
  weaknessVsUs: 它更像生命周期管理，而不是围绕一条真实 mesh 与 gateway 拓扑做影响半径仿真和回滚编排。
  sourceRefs:
  - 7
  - 8
- name: AppViewX
  stage: scale-up
  wedge: 证书生命周期管理、47 天证书就绪、Kubernetes 证书控制，以及 PQC / crypto-agility 叙事。
  pricing: 定制定价 / 企业版
  strength: 对短周期证书、Kubernetes 和 crypto-agility 的运维包装很直接。
  weaknessVsUs: 它更接近 CLM 现代化和合规，不是真正去吃下一条银行 AI 平台上线时的干跑 + 回滚顺序。
  sourceRefs:
