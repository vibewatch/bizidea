openQuestions:
- 北美前 200 大银行里，到底有多少家会在未来 12 个月内碰上具名 AI 工作流的证书有效期或 PQC cutover，而不只是一个长期大计划？
- 买方会不会把独立 cutover 层当成单独的控制平面预算，还是坚持要求 Keyfactor、CyberArk/Venafi 或 AppViewX 把这条工作流吃进去？
