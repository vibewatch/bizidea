  validationPlan:
  - priority: high
    question: 北美头部银行里，到底有多少家会在未来 12 个月内让某条 AI 工作流碰上带明确日期的证书有效期或 PQC cutover？
    evidenceToGather: 访谈与当前银行发布日历绑定的密码工程、平台主管安全负责人、服务网格集成商和云 PKI 伙伴。
  - priority: high
    question: 买方会不会为独立的 cutover 层掏钱，而不是继续依赖现有机器身份套件和内部脚本？
    evidenceToGather: 在当前 Keyfactor/CyberArk/AppViewX 部署旁边，跑并行 discovery 与干跑试点，记录预算归属和背后原因。
  - priority: medium
    question: 在服务型拖拽冒出来前，一套带明确假设的标准栈最多能自动发现多少证书到工作负载的依赖数据？
    evidenceToGather: 在 3-5 个共创客户里，测量一套企业 CA、一个 mesh、一个 gateway 和一层 secrets 栈，跑出可用依赖图需要多久。
