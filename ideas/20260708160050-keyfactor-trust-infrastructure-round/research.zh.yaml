  - incumbentClass: 开源云原生身份栈
    point: Kubernetes CSR API、cert-manager、trust-manager、SPIFFE/SPIRE、Linkerd 和云私有 CA 给出了底层积木，但它们没有依赖图、轮换顺序逻辑，也没有强监管 cutover 所需的董事会级证据。
    sourceRefs:
