  - incumbentClass: 密码姿态与 PQC 平台
    point: SandboxAQ 和相邻姿态工具能找出隐藏的密码资产，也会做暴露建模，但它们并没有把自己定位成面向操作者的 flightdeck，去管理 mesh 与 gateway 的分阶段 cutover。
    sourceRefs:
    - 12
    - 13
    - 15
    - 16
  - incumbentClass: 内部变更管理
    point: 银行当然可以继续靠工单、表格和脚本硬扛，但 Linkerd 自己的修复指引和 CyberArk 对故障风险的表述都说明，在更短证书有效期和 mTLS 依赖下，手工证书运维到底有多脆。
    sourceRefs:
    - 35
    - 36
    - 37
    - 40
  regulatoryLandscape: PQC 迁移、证书有效期策略以及金融行业 AI 治理，都在从抽象风险议题变成要拿证据、要受监管审视的事项。能赢的产品，不该只宣称自己自动化，而要帮客户真的证明：库存、审批、测试、监控和回滚都准备好了。
  technologyLandscape: 现成技术栈已经足够成熟，可以今天就接：Kubernetes 暴露证书 API，cert-manager 和 trust-manager 会自动化签发与 bundle，服务网格依赖 mTLS，云厂商也提供私有 CA 服务。难点不在有没有积木，而在怎么把这些层拼成一条活应用路径上的安全变更控制工作流。
  distributionChannels:
  - point: 只要能绑到大银行里一项具名的 PQC 或短周期证书项目，而且生产日期就在眼前，直销效果最好。
