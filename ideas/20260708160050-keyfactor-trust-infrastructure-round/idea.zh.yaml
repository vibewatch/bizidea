topRisks:
- name: 现有厂商捆绑
  description: 大型 PKI 和机器身份厂商完全可能补上一层基础 cutover 编排，守住自己的 installed base。
  mitigation: 靠跨栈演练、影响半径建模，以及跨 CA、服务网格、网关和 AI 平台工具的回滚工作流取胜——这些恰恰是现有厂商最难协同好的地方。
- name: 集成拖拽
  description: 想从 CA、mesh、gateway 和应用团队那里抽出可靠的依赖数据，首批部署很容易被拖慢。
  mitigation: 先把产品压到一套带银行色彩的标准栈：Kubernetes、Istio 或 Linkerd、一个企业 CA、一个 AI 平台集群，再把首个 cutover 打包成 45 天交付。
- name: 预算模糊
  description: 有些银行在出事故或碰到审计死线前，可能只把 PQC 和证书工作当成内部项目管理，而不是单独的软件预算。
  mitigation: 先卖给有董事会支持的 PQC 或证书有效期缩短项目，而且必须绑定一条绝不能失手的 AI 工作流，把成功直接量化成少停机和更快拿到上线批准。
