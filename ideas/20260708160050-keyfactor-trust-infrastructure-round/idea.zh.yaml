jobsToBeDone:
- job: 当银行需要在一条内部 AI 平台上缩短证书有效期，或启动 PQC 迁移时，帮平台主管安全团队把所有依赖先演练清楚、把切换顺序排好，这样机器身份轮换就不会把贴着客户的服务拉下线。
  currentAlternative: 变更工单、CA 看板、维护窗口和自写轮换脚本。
  successMetric: 目标证书零 Sev-1 事故完成轮换的比例，以及是否按期发布。
- job: 当一张不合规或即将过期的证书出现在在线 AI 工作流里时，帮我们迅速找出负责人、影响半径和回滚路径，好在审计问题扩散或故障扩大前先处理掉。
  currentAlternative: 围着 PKI 拉战情室，再手工逐级问到服务负责人。
  successMetric: 定位负责人并完成安全轮换的平均耗时。
