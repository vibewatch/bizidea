problem: 银行里的 AI 平台团队正在以快过中央 PKI 团队梳理权属的速度，往外加网关、服务网格端点、代理和服务账号。等证书有效期再缩短、PQC 迁移一启动，只要有一张没人认领的证书，就可能让贴着客户数据的 AI 工作流直接掉线，或者把一次生产发布拖上几周。现有 PKI 套件会签发、会盘点，但很少给应用和平台负责人一层安全的彩排环境，让他们在不打挂系统的前提下轮换成千上万张互相依赖的证书。
targetUser:
  primary: 北美前 200 大银行里负责密码工程或平台主管安全的总监/负责人，正把内部 AI 助手和反欺诈分析服务推到 Kubernetes 生产环境。
  secondary: 负责银行 AI 平台里的服务网格、API 网关和证书轮换的首席 SRE 或平台工程师。
  buyer: CISO 或基础设施执行副总裁
startupThesis:
  nonObviousInsight: 眼下最容易拿到预算的，不是把所有证书颁发机构都换掉，而是那层变更管理：先理清哪些 AI workload 依赖哪些证书，把短周期和 PQC 轮换先演练一遍，再让平台团队切换时不用把生产 agent 下线。
  beachhead: 北美前 200 大银行：内部 AI 助手和反欺诈分析平台跑在 Kubernetes 上，用 Istio 或 Linkerd，背后有企业级 CA，还背着 2026-2027 年的 PQC 就绪要求。
  wedge: 一套 cutover flightdeck：先在一条贴着客户数据的 AI 平台里找全证书依赖，再把短周期和 PQC 证书轮换干跑一遍，并为服务网格和网关身份自动编排发布与回滚。
  whyNowCatalyst: Keyfactor 融资超 $1B，而报道又把 AI 驱动的扩张、证书有效期收缩和 PQC 迁移摆在一起，说明信任运维已经从后台杂务变成迫在眉睫的发布控制问题。
  ventureScalePath: 先拿下一家银行的一套 AI 平台，再往全企业扩——密码资产发现、策略自动化、供应商迁移、机器身份全生命周期，以及每次 PQC 或证书有效期变化都要用到的董事会汇报层。
solution: 产品会接入企业 CA、Kubernetes 集群、服务网格、API 网关、密钥存储和 AI 平台控制面，先在一条高风险 AI 工作流里画出活的依赖图：每张证书、每个 workload、负责人和下游调用路径都对应上。接着它会把短周期和 PQC 证书策略先在这张图上做影子测试，直接告诉团队轮换时哪些服务、agent 和外部依赖会断。团队拿到的不再是一份泛泛的证书清单，而是一套有维护顺序、审批点和回滚检查点的 cutover 方案。真到上线窗口，平台会自动处理签发、分阶段轮换、健康检查和快速回滚，覆盖 mesh、gateway 和 workload 身份。时间一长，这套系统记录层会从今天这条 AI 平台，长成所有密码学迁移的变更控制层。
goToMarketSeed:
  firstCustomer: 一家美国前 50 大银行：AI 平台团队正在 Kubernetes 和 Istio 上扩内部联络中心助手与欺诈调查 copilot，并且必须在下一次生产发布前把证书有效期缩短。
  buyingTrigger: 董事会支持的 PQC 项目，或压缩证书有效期的专项，逼着某条贴着客户数据的 AI 平台在获准上线前先轮换机器身份。
  currentAlternative: 手工梳理证书清单、通用 PKI 治理套件、变更工单、维护窗口，以及叠在现有 CA 工具上的自写轮换脚本。
  switchingReason: 首个客户会换过来，是因为这套 flightdeck 能把影响半径亮出来，按现有拓扑把整次切换先演练一遍，再给出可回滚的把握，这是通用 PKI 看板和脚本做不到的。
  pricingHypothesis: 按受治理的 AI 集群数和活跃机器身份数收年订阅费，PQC 策略包和托管 cutover 波次另收高级模块费。
