scenarios:
  downside:
    description: 试点转化打滑，现有厂商重叠让独立预算更难过会，部署工作也比计划更偏重服务。
    y3RevenueK: 2569.6
    y3EbitdaK: -1265.0
    cashLowPointK: -3477.9
    keyAssumptionChanges:
    - Y2 年末的活跃受治理平台从 8 个降到 6 个。
    - Y3 年末从 10 个降到 8 个。
    - 每个活跃平台的混合年收入封顶在约 $350K，而不是 $400K。
    - 稳态毛利率只能到 68%，因为部署工作仍然更定制。
  base:
    description: Y1 的 3 个付费试点会在 Q4Y2 变成 8 份活跃受治理平台合同，到 Y3 扩到 10 份；随着首栈部署和扩张动作越来越可重复，曲线按基准情景推进。
    y3RevenueK: 3696.3
    y3EbitdaK: -350.4
    cashLowPointK: -2339.3
    keyAssumptionChanges:
    - A1-A26 基准假设不变。
  upside:
    description: 付费试点转化更快，Y2 就开始吃到伙伴带来的机会，加价模块也更早把平台数量和混合 ACV 往上抬。
    y3RevenueK: 4672.8
    y3EbitdaK: 446.4
    cashLowPointK: -1441.1
    keyAssumptionChanges:
    - Y2 年末的活跃受治理平台从 8 个升到 9 个。
    - Y3 年末从 10 个升到 12 个。
    - 随着 PQC 策略包和审计报表更早挂上去，每个活跃平台的混合年收入可到约 $425K。
    - 银行标准剧本把定制交付时间压下来后，稳态毛利率可升到 74%。
