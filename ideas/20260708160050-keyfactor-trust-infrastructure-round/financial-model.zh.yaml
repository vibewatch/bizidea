  downsideCase: 如果产品更像项目而不是运营控制层，月度流失率为 2.0%
  baseCase: 月度流失率为 1.2%
  upsideCase: 如果工作流锁定更强、第二波扩张成功，月度流失率为 0.7%
  y3RevenueImpactK: -260.0
  cashImpactK: -300.0
- variable: 销售周期
  downsideCase: 从合格项目走到签约平台的平均周期为 12 个月
  baseCase: 平均周期为 8-9 个月
  upsideCase: 一旦 2 次生产 cutover 可以对外举例，平均周期可缩到 6-7 个月
  y3RevenueImpactK: -700.0
  cashImpactK: -760.0
- variable: 毛利率
  downsideCase: 稳态毛利率为 68%，因为实施仍然偏重服务
  baseCase: 稳态毛利率为 72%
  upsideCase: 当交付剧本标准化后，稳态毛利率为 74%
  y3RevenueImpactK: 0.0
  cashImpactK: -260.0
- variable: 招聘节奏
  downsideCase: 在生产背书还没可复制前，就提前拉进 1 名工程和 1 名 GTM
  baseCase: 按当前与里程碑绑定的招聘爬坡
  upsideCase: 在伙伴来源 pipeline 还没被证明前，先把 1 个非核心增长岗位往后拖
  y3RevenueImpactK: -90.0
  cashImpactK: -280.0
modelDiagram:
  title: 单位经济模型流转图
  mermaid: |
    flowchart LR
      QualifiedProgram --> PaidPilot
      PaidPilot --> ProductionPlatform
      ProductionPlatform --> ExpansionModules
      ProductionPlatform --> Revenue
      ExpansionModules --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
- checkName: 收入引擎
  finding: 基准情景下的收入，来自活跃受治理平台合同从 Y1 末的 3 个，爬到 Q4Y2 的 8 个、Y3 的 10 个；与此同时，随着加价模块和相邻集群扩张推进，混合 ACV 朝 $400K 抬升。
- checkName: 必须成立的条件
  finding: 公司必须把首个可用结果压在 45 天左右，并按计划把付费试点转成生产订阅，因为基准情景里 Y2 的客户爬坡承担了大部分增长。
- checkName: 模型失效条件
  finding: 如果银行把 cutover 往后拖过一个预算周期，或者强行把产品压成叠在现有厂商之上的重服务覆盖层，下行情景会把现金低点打到约 -$3.5M。
- checkName: 下一轮证明
  finding: 当公司做到 5 份活跃受治理平台合同、2 次成功的生产 cutover，以及至少一套伙伴可复制、45 天交付的部署剧本时，下一轮融资才真正站得住。
sanityChecks:
  ruleOf40: Y3 增长率 103.7% + EBITDA 利润率 -9.5% = 94.2%
  burnMultiple: Y3 burn multiple 约 0.3x：大约 $350.4K 的 EBITDA burn，对上从 8 个活跃平台扩到 10 个平台带来的约 $1360.0K exit ARR 增量。
  revenuePerFte: Y3 确认收入 $336K / 11 名 q4 FTE（企业基础设施 SaaS 的常见区间大约是 $200K-$400K）。
  flags:
  - 模型默认付费试点 4 个月大致收 $100K；如果试点最后变成打折 discovery 服务，Y1 现金需求会明显抬高。
  - 毛利率能不能上来，取决于 45 天银行标准剧本是否站得住；如果每次部署都还要大量定制工程，下行情景就更容易发生。
  - 公司依然是在大厂旁边卖产品，所以只要独立预算决策放慢，销售周期和 CAC 会一起变差。
  - LTV 和流失率目前只能靠经验估算，因为面向特定工作流的信任基础设施变更控制软件，还没有公开的留存数据集。
