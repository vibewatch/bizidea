slug: pqc-cutover-flightdeck
date: '2026-07-08'
currency: USD
modelStartMonth: 2026-08
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-08
  unit: 月
  source: '[business-plan.date 2026-07-08；模型从下一月开始。]'
- id: A2
  name: 付费试点中位价
  value: '100'
  unit: USDK / 每个工作流
  source: '[business-plan.gtm.pricing $75k-$125k 付费试点区间]；模型取中位数。'
- id: A3
  name: 初始生产 ACV
  value: '300'
  unit: USDK ARR / 每个受治理 AI 平台
  source: '[business-plan.gtm.pricing $250k-$350k annual subscription] [research.market.sam 每个平台年 ACV 约 $300k]'
- id: A4
  name: 首轮扩张后的混合 ACV
  value: Y2 为 330；Y3 为 400
  unit: USDK ARR / 每个活跃受治理平台
  source: '[business-plan.businessModel.expansionLevers] [business-plan.market.som $400k blended ACV] [research.market.som 10 reachable logos at about $400k blended ACV]；Y2 先按温和扩张算到 $330K，Y3 再抬到账户层面的 $400K 混合 ACV。'
- id: A5
  name: 试点在收入模型中的处理方式
  value: 付费试点按 1 个活跃受治理平台计；Y1 为 25.0K/月，Y2 为 27.5K/月，Y3 为 33.3K/月
  unit: 公式
  source: '[A2] [A3] [A4] [business-plan.gtm.wedge 先卖付费 cutover 就绪项目，再转订阅]'
- id: A6
  name: 第 1 年活跃平台爬坡
  value: M6 1; M8 2; M11 3
  unit: 期末客户数
  source: '[business-plan.milestones 0-12 months 3 paid pilots and 2 production cutovers] [business-plan.product.sixMonth]；第 1 年按里程碑做保守爬坡：M6 拿到第 1 个付费平台，M11 走到 3 个。'
- id: A7
  name: 第 2 年活跃平台爬坡
  value: M13 3; M14 4; M15 4; M16 4; M17 5; M18 5; M19 6; M20 6; M21 7; M22 7; M23 7; M24 8
  unit: 期末客户数
  source: '[business-plan.milestones 12-24 months 8-12 production customers] [business-plan.team Head of partnerships Month 12]；第 2 年的爬坡由伙伴招聘和首栈可复制性交付共同支撑。'
- id: A8
  name: 第 3 年活跃平台爬坡
  value: M25 8; M26 8; M27 9; M28 9; M29 9; M30 9; M31 9; M32 10; M33 10; M34 10; M35 10; M36 10
  unit: 期末客户数
  source: '[business-plan.milestones 24-36 months 10+ production customers] [research.market.som $4.0M year-3 SOM]；第 3 年以 10 家客户的 SOM 目标为上限，不再额外激进外推。'
- id: A9
  name: 毛利率爬坡
  value: 55% Y1 / 66% Y2 / 72% Y3
  unit: 百分比
  source: '[business-plan.businessModel.targetGrossMarginPct 70]，再叠加创业财务经验：早期付费试点在银行剧本跑通前，本来就更重交付。'
- id: A10
  name: 企业平均销售周期
  value: 8-9
  unit: 月
  source: '[business-plan.gtm.funnelTargets] [business-plan.investorMemo.mustBeTrue]，再结合银行安全基础设施销售的创业财务经验。'
- id: A11
  name: 创始人 / CEO 含税现金薪酬
  value: '180'
  unit: USDK / 年 / 每 FTE
  source: '[business-plan.team Founder CEO]，再结合低于市场价的创始人现金薪酬、税费和福利的创业财务经验。'
- id: A12
  name: 工程团队含税现金薪酬
  value: '240'
  unit: USDK / 年 / 每 FTE
  source: '[business-plan.team Founding eng]，再结合资深安全与平台工程师的创业财务经验。'
- id: A13
  name: 产品 / 平台负责人含税现金薪酬
  value: '240'
  unit: USDK / 年 / 每 FTE
  source: '[business-plan.team Cryptography / platform product lead]，再结合重领域产品负责人的创业财务经验。'
- id: A14
  name: 解决方案 / 实施含税现金薪酬
  value: '210'
  unit: USDK / 年 / 每 FTE
  source: '[business-plan.team Solutions engineer]，再结合偏交付型安全人才的创业财务经验。'
- id: A15
  name: GTM / 合作含税现金薪酬
  value: '220'
  unit: USDK / 年 / 每 FTE
  source: '[business-plan.team Head of partnerships]，再结合早期企业合作与现场销售人才的创业财务经验。'
- id: A16
  name: G&A / 运营含税现金薪酬
  value: '140'
  unit: USDK / 年 / 每 FTE
  source: 创业财务经验：早期财务和运营岗位要扛银行采购、合同和 vendor review。
- id: A17
  name: 招聘节奏
  value: 创始人 M1；工程 M1/M15/M28；解决方案 M3/M18/M31；产品 M7；GTM M12/M27；运营 M19
  unit: 招聘月份
  source: '[business-plan.team] [business-plan.strategicChoices.sequencingRationale] [business-plan.fundingAsk.useOfFundsSummary]；招聘顺序完全跟着首栈交付、试点转化和伙伴放量的节奏走。'
- id: A18
  name: 销售与营销非薪酬开支
  value: M1-M6 为 12K/月；M7-M12 为 15K/月；M13-M18 为 18K/月；M19-M24 为 22K/月；M25-M30 为 26K/月；M31-M36 为 30K/月
  unit: USDK / 月
  source: '[business-plan.gtm.channels 创始人直销 + 伙伴渠道]，再结合银行差旅、研讨会、伙伴拓展和安全会议的创业财务经验。'
- id: A19
  name: 研发工具、实验室与安全云开支
  value: M1-M6 为 15K/月；M7-M12 为 18K/月；M13-M18 为 20K/月；M19-M24 为 22K/月；M25-M30 为 24K/月；M31-M36 为 26K/月
  unit: USDK / 月
  source: '[business-plan.product.mvp and twelveMonth roadmap] [business-plan.operations] [research.regulatoryTechnicalConstraints]；随着产品从 MVP 走到第二阶段路线图，研发和安全云开支按验证节奏缓慢上台阶。'
- id: A20
  name: G&A 非薪酬开支
  value: M1-M6 为 10K/月；M7-M12 为 12K/月；M13-M18 为 14K/月；M19-M24 为 16K/月；M25-M30 为 18K/月；M31-M36 为 20K/月
  unit: USDK / 月
  source: '[business-plan.operations]，再结合银行销售周期里的法务、审计、合规、保险和后台软件的创业财务经验。'
- id: A21
  name: 单位经济模型里的月度 logo 流失率
  value: '1.2'
  unit: 百分比
  source: 创业财务经验：这类企业基础设施软件黏性强，但公司仍处早期；上面的客户爬坡按净流失后口径建模。
- id: A22
  name: 稳态 CAC
  value: '225'
  unit: USDK / 每个活跃受治理平台
  source: '[business-plan.gtm.funnelTargets]，再结合创始人主导的银行销售、伙伴拓展和长采购周期的建模。'
- id: A23
  name: 经营模型期初现金
  value: '0'
  unit: USDK
  source: 建模约定：资金需求体现在 fundingAsk，而不是假设期初现金。
- id: A24
  name: 现金转换约定
  value: 现金变动按 EBITDA 近似，不假设债务、capex 或营运资金带来的正向收益
  unit: 公式
  source: 对轻资产软件公司的保守创业财务经验。
- id: A25
  name: pre-seed 证明点
  value: 到第 18 个月，公司要拿出打包好的首栈部署、3 个付费试点、2 次生产 cutover、5 份活跃受治理平台合同、45 天见效时间，以及早期伙伴验证。
  unit: 里程碑
  source: '[business-plan.milestones 0-12 and 12-24 months] [business-plan.fundingAsk.useOfFundsSummary]；这个里程碑定义了公司在下一轮融资前必须交齐的证据包。'
- id: A26
  name: pre-seed 融资规模
  value: 3.0M pre-seed，配 24 个月现金跑道
  unit: USDM
  source: '[business-plan.fundingAsk targetFundingRangeUsd $3-5M and runwayMonths 18]，再加 6 个月缓冲，以及为银行采购、审计和集成打滑预留储备，对应 [business-plan.risks] 和 [research.openQuestions]。'
