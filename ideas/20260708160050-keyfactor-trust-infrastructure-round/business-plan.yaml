slug: pqc-cutover-flightdeck
date: "2026-07-08"
executiveSummary: >-
  PQC cutover flightdeck should start as a change-control layer for one
  regulated AI workflow, not as another machine-identity suite. The beachhead is
  top-200 North American banks running internal AI assistant or fraud platforms
  on Kubernetes with an enterprise CA and a 2026-2027 PQC or certificate-
  lifetime program. Research supports the urgency: shrinking certificate
  lifetimes, AI-driven machine-identity sprawl, and board-backed PQC mandates
  turn certificate work into a release-control problem rather than a background
  admin task. The first product should map certificate dependencies, dry-run
  rotations, and coordinate staged rollout plus rollback across mesh, gateway,
  and workload identities for one must-not-fail platform. The first sale should
  be a paid cutover-readiness engagement that converts into an annual
  subscription for the governed AI platform, because buyers already fund
  adjacent trust-infrastructure and migration programs. The company should sell
  direct first, then use PKI, Kubernetes, and service-mesh integrators once the
  first-stack deployment is repeatable. This plan assumes banks will buy a
  dedicated cutover layer despite incumbent PKI suites; that assumption is
  plausible but not yet proven and must be validated in paid pilots. The biggest
  strategic risk is not technical feasibility but whether integration plus
  budget friction keeps the product trapped as services or an incumbent feature.
  Research provides estimated market size and adjacent willingness-to-pay
  signals, but it does not identify named buyers or standalone pricing
  benchmarks for this exact workflow, so early proof must focus on deployment
  speed, paid pilots, and pilot-to-production conversion.
problem:
  - AI platform teams in large banks are adding gateways, meshes, agents, and service accounts faster than PKI teams can map certificate ownership, so shorter lifetimes or PQC cutovers create outage risk at the exact moment an AI workflow is moving into production.
  - Existing CLM, CA, and inventory tools can issue and track credentials, but they do not rehearse blast radius, maintenance sequencing, and rollback across the full mesh-to-gateway-to-workload path for one live application.
solution:
  - Build a live dependency graph for one governed AI platform by connecting the enterprise CA, Kubernetes, service mesh, API gateway, secret store, and workload metadata, then simulate short-lived or PQC certificate rotations before the change window opens.
  - Turn the simulation into an execution layer that stages issuance, approvals, health checks, rollout, and rollback with evidence exports, so security, SRE, and audit teams can approve a cutover without a war room.
whyWeWin:
  - We sell into the outage-critical cutover window that incumbents and internal scripts handle poorly: proving what breaks, in what order to rotate, and how to reverse the change on current topology.
  - The combination of dependency graph, repeated cutover telemetry, and audit-ready evidence for regulated AI workflows can compound into a workflow-native moat that broader machine-identity platforms do not get from inventory alone.
strategicChoices:
  beachhead: Top-200 North American banks running one internal AI assistant or fraud-analysis platform on Kubernetes with Istio or Linkerd, an enterprise CA, and a dated PQC or certificate-lifetime change program.
  wedgeRationale: This slice has a named buying trigger, a clear executive buyer, and an expensive failure mode; selling one must-not-fail AI workflow creates proof faster than pitching horizontal trust orchestration across the whole enterprise.
  sequencingRationale: Product starts with one opinionated stack and shadow rehearsal because buyers need evidence before automation; GTM starts with founder-led direct sales into named cutover programs because budget is tied to one deadline; hiring starts with engineering and solutions depth because deployment repeatability is the gating constraint before channel scale.
  notYet:
    - Replacing certificate authorities or selling a full machine-identity suite.
    - Broad enterprise-wide certificate inventory outside the first governed AI platform.
    - Non-bank verticals and multicloud edge cases that break the first-stack deployment playbook.
market:
  tam: >-
    Estimated $0.9B TAM based on roughly 3,000 global regulated enterprises with
    complex cloud-native and AI estates at about $300k initial annual control-
    layer ACV.
  sam: >-
    Estimated $120.0M SAM based on about 200 top North American bank logos, two
    initial governed AI platforms per bank, and about $300k annual ACV per
    platform.
  som: >-
    Estimated $4.0M year-3 SOM based on 10 reachable logos at about $400k
    blended ACV after landing one workflow and expanding to adjacent clusters
    and gateways.
  segments:
    - Top-200 North American banks moving internal AI assistants, fraud, or treasury workflows onto Kubernetes under formal PQC or short-lived-certificate programs.
    - Other regulated enterprises with cloud-native AI workloads and explicit cryptographic migration mandates once the bank playbook is proven.
  buyingProcess: >-
    The process starts with a cryptography engineering or platform security
    leader assembling PKI operations and SRE owners around one named AI workflow
    that has a dated cutover. The deal closes when the CISO or infrastructure
    executive can attach budget to a PQC or certificate-lifetime program and
    sees dry-run evidence, approvals, and rollback readiness for that workflow.
product:
  mvp: >-
    MVP covers one bank-ready stack: one enterprise CA, one Kubernetes cluster,
    Istio or Linkerd, one API gateway, and one secrets layer for a single AI
    workflow. It delivers dependency mapping, blast-radius rehearsal, owner
    resolution, cutover runbooks, staged rollout, health checks, and rollback
    evidence, while deliberately excluding CA replacement, broad multicloud
    support, and enterprise-wide inventory.
  sixMonth: Ship a packaged first-stack deployment with evidence exports, approval workflows, and support for the second service-mesh path so design partners can reach usable rehearsal output in 45 days or less.
  twelveMonth: Add production-grade rollback automation, reusable policy packs for short-lived and PQC rotations, and a second CA or cloud CA integration path to reduce dependence on custom engineering.
  twentyFourMonth: Expand from one AI platform cutover to enterprise cryptographic change control across multiple clusters, gateways, and migration events, adding board and audit reporting without trying to replace the incumbent CA.
  keyBets:
    - Buyers will pay for faster safe cutovers and launch approval, not for another inventory dashboard.
    - One opinionated bank stack can reach first value fast enough to support enterprise sales without services-heavy gross margins.
    - Cutover telemetry and evidence templates will improve pilot-to-production conversion and expansion inside existing accounts.
gtm:
  wedge: Sell a paid cutover-readiness package for one customer-data-adjacent AI workflow, beginning with dependency discovery and dry-run rehearsal and converting to a live rotation subscription once the first change window succeeds.
  channels:
    - Founder-led direct sales to cryptography engineering, platform security, CISO, and infrastructure executives inside banks with dated PQC or certificate-lifetime programs.
    - PKI, Kubernetes, and service-mesh implementation partners that already own cert-manager, CA, and cluster rollout work.
    - PQC migration advisors, regulated-industry MSSPs, and audit-focused consultancies that can surface must-not-fail cutover programs.
  funnelTargets: "Lead→qualified cutover program 15-25%, qualified program→paid pilot 40%+, paid pilot→production 50%+, first workflow→second workflow expansion within 12 months in 50%+ of production accounts."
  pricing: >-
    Start with a $75k-$125k paid pilot for one workflow, then convert to a
    $250k-$350k annual subscription per governed AI platform priced by active
    clusters and machine identities, with add-on modules for PQC policy packs
    and managed cutover waves. This matches program-level trust-infrastructure
    budgets better than per-seat or per-certificate pricing and stays
    consistent with the researched $300k initial ACV assumption.
businessModel:
  revenueStreams:
    - Annual platform subscription for governed AI platforms priced by active clusters and machine identities under rehearsal and rollout control.
    - Premium PQC policy, reporting, and evidence-retention modules tied to formal migration programs.
    - Paid first-wave cutover packages and partner-assisted deployment services during early accounts.
  unitOfValue: Governed AI platform, measured by active Kubernetes clusters, gateway identities, and machine identities covered by rehearsal and rollout control.
  targetGrossMarginPct: 70
  expansionLevers:
    - Expand from one AI workflow to additional clusters, gateways, and machine-identity domains inside the same bank.
    - Move customers from dry-run evidence to automated rollout, rollback, and audit-reporting modules.
    - Extend the same control layer from short-lived certificate rotations into broader PQC and enterprise cryptographic migration programs.
strategyMap:
  northStarMetric: Number of production AI platforms completing certificate-policy changes with zero Sev-1 incidents under flightdeck control.
  inputMetrics:
    - Days from kickoff to usable dependency graph for the first workflow.
    - Qualified program to paid pilot conversion rate.
    - Paid pilot to production conversion rate.
    - Percentage of planned machine identities rotated without Sev-1 incident or missed release date.
    - Share of production accounts expanding to a second governed workflow within 12 months.
  moatsToBuild:
    - A living dependency graph linking certificates, workloads, gateways, trust bundles, and named owners inside regulated AI platforms.
    - Historical cutover telemetry showing failure signatures, safe maintenance sequences, and rollback success across live rotations.
    - Audit-ready evidence packs mapping cryptographic changes to approvals, monitoring, and PQC readiness milestones.
  killCriteria:
    - If fewer than 4 of the first 12 target-bank prospects have a dated AI-workflow cutover inside the next 12 months, the timing thesis is wrong.
    - If fewer than 2 of the first 5 paid pilots convert to production at "$250k+" annualized value by month 15, the standalone budget thesis is wrong.
    - If the first-stack deployment cannot produce a usable dependency graph in 45 days or less, integration drag will block efficient go-to-market.
  mermaid: |
    flowchart LR
      Wedge[Bank AI workflow cutover] --> MVP[Dependency graph plus dry-run]
      MVP --> Proof[Zero-Sev-1 production rotations]
      Proof --> Expansion[More clusters, gateways, and migration programs]
investorMemo:
  verdict:
    call: "Meet / investigate further"
    conviction: Strong problem signal and a precise bank wedge, but conviction depends on proving that a neutral cutover layer gets budgeted alongside incumbent PKI suites.
    whyBelieve: The plan targets a board-visible release-control problem where shorter certificate lifetimes, PQC mandates, and AI identity sprawl already create executive urgency.
    whyDoubt: The same buyers already pay Keyfactor, CyberArk/Venafi, DigiCert, or AppViewX, so the startup may be forced into services or feature territory unless deployment speed and outage-risk reduction are clearly superior.
    nextDiligence: Validate in 8-10 bank design-partner conversations whether one named AI workflow can become a paid cutover pilot and convert to production within one budget cycle.
  firstCustomer:
    title: Director of Cryptography Engineering at a top-50 U.S. bank
    profile: A large bank running an internal contact-center assistant and fraud-investigation copilot on Kubernetes and Istio, with central PKI, service-mesh, and gateway teams all involved in launch approval.
    trigger: A board-backed PQC or certificate-lifetime program forces the bank to rotate machine identities on one customer-data-adjacent AI platform before the next production rollout.
    buyer: CISO or EVP of Infrastructure
    initialContract: >-
      $75k-$125k paid pilot for one workflow converting into a $250k-$350k annual
      subscription when the first governed AI platform goes live, with expansion
      to adjacent clusters and gateway domains lifting blended ACV toward the
      researched $400k year-3 account value.
  mustBeTrue:
    - At least one large-bank segment has dated AI-workflow certificate cutovers in the next 12 months, not just long-range PQC planning.
    - Buyers view blast-radius rehearsal and rollback evidence as a distinct purchase from certificate inventory and lifecycle management.
    - A packaged first-stack deployment can reach usable dependency mapping in 45 days or less without heavy custom services.
    - More than half of paid pilots convert to production once buyers see dry-run evidence and live rollback controls.
    - The company can expand from one governed AI workflow to broader cryptographic change programs before incumbents neutralize the wedge.
  diligenceQuestions:
    - How many top-200 North American banks currently have a named AI workflow with a dated certificate-lifetime or PQC cutover?
    - In accounts already using Keyfactor, CyberArk/Venafi, DigiCert, or AppViewX, who owns budget for a dedicated cutover layer?
    - Which integration path produces first value fastest: enterprise CA plus Istio, enterprise CA plus Linkerd, or cloud CA plus cert-manager?
    - What evidence or metrics convince a bank CISO that a dry-run can safely move to automated live rotation?
    - Which failure signatures recur most in real bank certificate rotations: trust-bundle lag, owner ambiguity, approval delay, or application dependency breakage?
operatingAssumptions:
  - assumption: A meaningful subset of top-200 North American banks has a named AI workflow with a dated certificate-lifetime or PQC cutover in the next 12 months.
    basis: research.yaml
    validationTest: Confirm at least 6 qualified prospects with named workflow, target date, and executive sponsor across the first 20 bank interviews.
    decisionImpact: If false, the company should delay bank-only focus or anchor first on shorter-lived certificate programs outside AI workflows.
  - assumption: Banks will fund a dedicated cutover layer even when they already use an incumbent machine-identity suite.
    basis: research.yaml
    validationTest: Close at least 3 paid pilots in accounts already running Keyfactor, CyberArk/Venafi, DigiCert, or AppViewX.
    decisionImpact: If false, the product must reposition as a partner-delivered module or a services-led overlay rather than a standalone software platform.
  - assumption: One opinionated stack can deliver usable dependency mapping and rehearsal without custom engineering dominating every deal.
    basis: operator judgment
    validationTest: Complete 3 design-partner deployments with the same core playbook and less than 3 engineer-weeks of account-specific work each.
    decisionImpact: If false, gross margin and deployment velocity break, so scope must narrow further or services must become an explicit line of business.
  - assumption: Dry-run evidence and rollback controls materially improve launch approval and pilot-to-production conversion.
    basis: idea.yaml
    validationTest: Convert at least 2 of the first 4 paid pilots to production within 6 months of pilot start based on agreed cutover criteria.
    decisionImpact: If false, the product may be better positioned as discovery or incident-response tooling rather than change-control software.
  - assumption: Expansion from one AI workflow to adjacent clusters and gateways is strong enough to support enterprise ACV growth.
    basis: operator judgment
    validationTest: At least 2 of the first 5 production accounts buy a second governed workflow or module within 12 months.
    decisionImpact: If false, the narrow wedge may not compound into venture-scale account economics and the expansion thesis should be revised.
experimentRoadmap:
  - horizon: "0–90 days"
    experiment: Interview 20 bank cryptography, platform-security, and SRE leaders plus 5 implementation partners about dated certificate-lifetime or PQC changes on AI workflows.
    hypothesis: At least 6 banks have a named AI workflow with a cutover inside the next 12 months and a clear executive sponsor.
    successMetric: 6+ qualified prospects with named workflow, launch date, current tooling, and buying committee mapped.
    owner: Founder CEO
  - horizon: "0–90 days"
    experiment: Build a prototype dependency graph and dry-run UI for one opinionated stack covering one enterprise CA, Kubernetes, Istio, and one API gateway.
    hypothesis: Buyers will react more strongly to blast-radius rehearsal and rollback sequencing than to another inventory dashboard.
    successMetric: 4+ design-partner prospects request a technical pilot after seeing the prototype and sample cutover runbook.
    owner: Founding eng
  - horizon: "0–90 days"
    experiment: Run one simulated rotation with a design partner's historical topology and export the approval evidence pack.
    hypothesis: Security and platform teams will treat approval evidence as part of launch readiness, not just operational documentation.
    successMetric: 2 prospects agree to paid discovery or pilot with explicit production go-live criteria.
    owner: Founding eng
  - horizon: "3–6 months"
    experiment: Package a 45-day first-stack deployment and deliver the first 3 design-partner implementations.
    hypothesis: The same playbook can produce usable dependency mapping without services-heavy customization.
    successMetric: 3 deployments reach usable graph and rehearsal output within 45 days of kickoff.
    owner: Solutions engineer
  - horizon: "6–12 months"
    experiment: Convert 3 design partners into paid pilots tied to one live certificate-lifetime or PQC cutover.
    hypothesis: Buyers will pay before full automation if the product reduces outage risk and approval friction on a named release.
    successMetric: 3 paid pilots signed at "$75k+" each with success criteria tied to one change window.
    owner: Founder CEO
  - horizon: "6–12 months"
    experiment: Execute the first 2 live rotations with staged rollout, health checks, and rollback controls.
    hypothesis: Production proof on live cutovers will convert at least half of paid pilots and create the evidence base needed for partner channels.
    successMetric: 2 production cutovers completed with zero Sev-1 incidents and at least 1 expansion conversation inside each account.
    owner: Founding eng
  - horizon: "12–18 months"
    experiment: Recruit 3 PKI or Kubernetes implementation partners and measure partner-led time-to-value.
    hypothesis: Integrators can source qualified pilots and keep deployment under 45 days once the first-stack package is stable.
    successMetric: 3 signed partners and 2 partner-sourced pilots with first value delivered in 45 days or less.
    owner: Head of partnerships
operations:
  - Maintain a repeatable onboarding playbook that maps CA, mesh, gateway, secrets, owners, approval steps, and rollback contacts for each governed workflow.
  - Export cutover evidence into customer SIEM, GRC, or audit systems rather than building a full trust-control tower on day one.
  - Require every production account to name a security owner, SRE owner, and rollback approver before live rotation is enabled.
  - Build integration and referral partnerships with enterprise CA vendors, Kubernetes consultancies, and PQC advisory firms rather than replacing incumbent tooling.
team:
  - role: Founding eng
    startTiming: Month 0
    rationale: Build the dependency graph, dry-run engine, and live rollout controls needed for credible design-partner pilots.
  - role: Founder CEO
    startTiming: Month 0
    rationale: Own bank design-partner sales, pricing, and packaging because the first deals depend on problem education and tight feedback loops.
  - role: Solutions engineer
    startTiming: Month 3
    rationale: Reduce deployment friction, codify the 45-day playbook, and protect engineering bandwidth as pilots start.
  - role: "Cryptography / platform product lead"
    startTiming: Month 6
    rationale: Turn pilot learnings into reusable PQC and short-lived-certificate policy packs, approval workflows, and evidence exports.
  - role: Head of partnerships
    startTiming: Month 12
    rationale: Scale through PKI, Kubernetes, and audit partners only after first-stack deployments and pilot conversions are repeatable.
milestones:
  - horizon: "0–12 months"
    items:
      - Package the first bank-ready stack for one enterprise CA, Kubernetes, Istio or Linkerd, one API gateway, and one secrets layer.
      - Sign 6-8 design partners and convert at least 3 into paid pilots tied to named cutover windows.
      - Complete 2 live production rotations with zero Sev-1 incidents and reusable evidence packs.
      - Prove first value in 45 days or less and pilot-to-production conversion within one budget cycle.
  - horizon: "12–24 months"
    items:
      - Add a second CA or cloud CA integration path plus stronger rollback automation and policy templates.
      - Grow to 8-12 production customers and make second-workflow expansion a repeatable motion inside early bank accounts.
      - Make partners a material source of pipeline without losing the opinionated deployment model.
      - Launch board and audit reporting for PQC and certificate-lifetime programs.
  - horizon: "24–36 months"
    items:
      - Reach 10+ bank or regulated-enterprise production customers using the platform for recurring cryptographic change events.
      - Expand from one AI workflow wedge into broader enterprise cryptographic change control across multiple clusters and gateways.
      - Become the system of record for approvals, rehearsal evidence, and rollback history during certificate-lifetime and PQC migrations.
risks:
  - risk: Incumbent machine-identity vendors add enough rehearsal and rollback functionality to collapse the standalone wedge.
    likelihood: High
    impact: High
    mitigation: Win on deeper application-path dependency mapping, faster time-to-confidence on one bank workflow, and neutral cross-stack orchestration across CA, mesh, gateway, and workload layers.
  - risk: Integration drag turns deployments into custom services engagements.
    likelihood: Medium
    impact: High
    mitigation: Constrain the first product to one opinionated stack, measure 45-day time-to-value, and hire solutions talent before scaling sales.
  - risk: Banks treat PQC as strategic planning instead of near-term operational spend, delaying budget for a cutover layer.
    likelihood: Medium
    impact: High
    mitigation: Anchor early sales on short-lived certificate rotations and named AI-platform launch gates, then attach PQC modules once operational urgency is established.
  - risk: Buyers decide existing Keyfactor, CyberArk/Venafi, DigiCert, or AppViewX deployments are good enough.
    likelihood: Medium
    impact: High
    mitigation: Prove quantified outage-risk reduction and faster launch approval in side-by-side pilots inside accounts already running incumbent tooling.
  - risk: Live rotation controls create false positives or operator mistrust, slowing production adoption.
    likelihood: Medium
    impact: Medium
    mitigation: Start in shadow mode, require explicit rollback checkpoints, and tune health-check thresholds before enabling automated blocking or rotation at scale.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$3-5M"
  runwayMonths: 18
  useOfFundsSummary: 18 months buys the first packaged bank-ready stack, 6-8 design partners, 3 paid pilots, 2 production cutovers, evidence and reporting modules, and the early solutions and partnership hires needed to prove repeatable deployment in 45 days or less.
