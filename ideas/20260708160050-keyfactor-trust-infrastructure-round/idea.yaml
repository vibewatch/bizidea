topRisks:
  - name: "Incumbent bundling"
    description: "Large PKI and machine-identity vendors could add basic cutover orchestration to protect their installed base."
    mitigation: "Win on cross-stack rehearsal, blast-radius modeling, and rollback workflows across certificate authority, service mesh, gateway, and AI platform tooling that incumbents do not coordinate well."
  - name: "Integration drag"
    description: "Extracting reliable dependency data from certificate authorities, meshes, gateways, and application teams can slow first deployments."
    mitigation: "Start with one opinionated bank-ready stack using Kubernetes, Istio or Linkerd, one enterprise certificate authority, and one AI platform cluster, and package a 45-day first cutover."
  - name: "Budget ambiguity"
    description: "Some banks may treat post-quantum and certificate work as internal program management rather than a software line item until an outage or audit deadline hits."
    mitigation: "Sell into board-backed post-quantum or certificate-lifetime reduction programs tied to one must-not-fail AI workflow, with success measured in avoided downtime and faster launch approval."
