openQuestions:
- How many top-200 North American banks have a named AI workflow with a dated certificate-lifetime or PQC cutover in the next 12 months, rather than a broad long-range program?
- Will buyers fund a dedicated cutover layer as a separate control-plane line item, or insist that Keyfactor, CyberArk/Venafi, or AppViewX absorb the workflow?
- How much certificate-to-workload dependency data can be auto-discovered from one enterprise CA, one mesh, one gateway, and one secrets stack before services effort dominates the deal?
- 'Which failure signatures recur most often during real short-lived-certificate rotations in service-mesh-heavy bank environments: trust bundle lag, owner ambiguity, approval delay, or application dependency breakage?'
