  - incumbentClass: Open-source cloud-native identity stack
    point: Kubernetes CSR APIs, cert-manager, trust-manager, SPIFFE/SPIRE, Linkerd, and cloud private CAs provide the primitives, but not the dependency graph, sequencing logic, or board-ready evidence for a regulated cutover.
    sourceRefs:
