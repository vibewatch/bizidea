  - incumbentClass: In-house change management
    point: Banks can continue with tickets, spreadsheets, and scripts, but Linkerd's own remediation guidance and CyberArk's outage framing show how brittle manual certificate operations remain under shorter lifetimes and mTLS dependence.
    sourceRefs:
