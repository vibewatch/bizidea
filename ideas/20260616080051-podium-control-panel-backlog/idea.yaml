differentiator: >-
  Incumbent eCAD tools help author drawings, and panel shops monetize capacity,
  but neither system owns the cross-company change order, compliance evidence,
  and routing workflow. This product lands above the authoring stack and above
  any single fabricator as the system of record for panel revisions across a
  fragmented supply base. Its defensibility comes from accumulated libraries of
  approved panel modules, shop performance benchmarks, and change-cycle data
  across machine families.
