ideaScorecard:
  signalStrength:
    score: 5
    rationale: The cluster includes concrete claims on 12-plus-week lead times, a named software workflow, and demonstrated throughput, which is unusually specific for an industrial bottleneck.
  painIntensity:
    score: 5
    rationale: Panel revisions can delay machine delivery and plant start-up, directly affecting revenue, customer acceptance, and utilization of scarce controls engineers.
  wedgeClarity:
    score: 5
    rationale: Buyer-side panel change control is a narrow workflow with explicit inputs, outputs, buyers, and acute budget triggers.
  defensibility:
    score: 4
    rationale: Proprietary revision histories, approved modules, and shop-performance data create compounding workflow advantages, though incumbents could copy basic features.
  ventureScale:
    score: 4
    rationale: The beachhead is narrow but can expand into the broader operating system for outsourced industrial electrical assemblies and installed-base service changes.
topRisks:
  - name: Incumbent panel shops build it first
    description: Fast-growing panel manufacturers may extend their own software and try to keep change-order workflows captive inside one shop network.
    mitigation: Land as the buyer-side system of record that works across many shops and preserves leverage for OEMs rather than tying them to one fabricator.
  - name: Fragmented electrical data
    description: OEMs may have messy eCAD exports, inconsistent I/O lists, and poor document hygiene that make automation hard on day one.
    mitigation: Start with the most common export formats and a services-assisted onboarding motion on one machine family before broad automation.
  - name: Sales may look like a custom workflow tool
    description: If the product feels like bespoke process software, enterprise buyers may expect heavy implementation and slow ROI proof.
    mitigation: Sell on late-change triggers, package value around days saved per revision, and productize repeatable templates for common packaging and conveyor architectures.
