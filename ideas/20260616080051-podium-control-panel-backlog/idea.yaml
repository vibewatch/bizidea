problem: >-
  U.S. machine OEMs and system integrators still manage control-panel revisions
  through PDF redlines, eCAD edits, spreadsheets, and calls to local UL 508A
  shops. When a customer spec changes late or a commissioning issue forces an
  electrical update, senior controls engineers must manually reconcile I/O
  lists, drawings, BOMs, compliance notes, and shop instructions. Because lead
  times already run past 12 weeks and key knowledge lives in technicians'
  heads, even a small panel change can delay machine shipment or plant startup.
targetUser:
  primary: >-
    Controls engineering managers at U.S. packaging and material-handling OEMs
    shipping custom machines while outsourcing UL 508A panel builds
  secondary: >-
    Project managers and lead controls engineers at regional system integrators
    retrofitting food and beverage production lines
  buyer: >-
    Director of controls engineering or VP operations at a mid-market machine
    OEM with recurring outsourced panel revisions
startupThesis:
  nonObviousInsight: >-
    The scarce asset in industrial automation is no longer just panel assembly
    labor; it is the approval-ready electrical change package that lets any
    qualified shop execute a revision without hunting down tribal knowledge.
    Once requirements, eCAD, and shop-floor instructions are connected in
    software, the company that owns the cross-company change order and
    compliance evidence layer can scale faster than a single faster panel shop.
  beachhead: >-
    Sustaining-engineering and change-order workflows for U.S. packaging and
    conveyor OEMs that outsource UL 508A panel builds and push frequent
    revisions during factory acceptance and early field installs
  wedge: >-
    A control-panel ECO cloud that ingests I/O lists, eCAD exports, and
    marked-up redlines, then generates revised drawings, compliance packets,
    RFQ-ready files, and shop-floor rework instructions for approved panel
    shops
  whyNowCatalyst: >-
    Podium's funding and software-to-fabrication workflow show control-panel
    design is finally software-addressable, which makes compliant revision
    management across fragmented suppliers the next urgent bottleneck.
  ventureScalePath: >-
    Start with late-stage panel revisions for packaging and material-handling
    OEMs, then expand into multi-shop capacity routing, approved component
    libraries, installed-base service documentation, and eventually the
    operating system for industrial electrical assemblies.
solution: >-
  The product sits between OEM controls teams and the external panel shops that
  actually build or rework the hardware. It parses requirements, I/O lists,
  eCAD outputs, and field redlines to create a traceable revision package with
  drawing diffs, updated BOMs, compliance checklists, and technician-ready work
  instructions. The workflow tracks approvals across controls, purchasing, and
  the chosen UL shop so schedule and price changes stop living in email
  threads. When a revision is urgent, the system can route the same package to a
  pre-qualified shop based on capability, lead time, and prior quality history.
  Over time it builds a reusable library of approved circuit modules, labor
  norms, and execution outcomes for common machine families, shrinking each
  future change cycle.
goToMarketSeed:
  firstCustomer: >-
    A 100-800 employee U.S. packaging or material-handling OEM with 5-20
    controls engineers and 3-10 external UL 508A panel shops supporting 50-300
    custom machine builds per year
  buyingTrigger: >-
    A late customer-spec change or commissioning issue threatens shipment dates
    because a panel revision will blow up delivery lead times
  currentAlternative: >-
    eCAD files, PDF redlines, spreadsheet BOMs, project-manager email threads,
    and back-and-forth with local panel shops or in-house technicians
  switchingReason: >-
    The wedge turns each revision into a traceable package a qualified shop can
    quote and execute immediately, cutting weeks of expert coordination without
    forcing the OEM to replace its authoring tools or build in-house panel
    capacity
  pricingHypothesis: >-
    Annual SaaS subscription based on active machine programs or connected panel
    shops, plus usage fees for each released panel revision
