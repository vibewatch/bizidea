slug: ul-panel-revision-cloud
date: '2026-06-16'
currency: USD
modelStartMonth: "2026-07"
assumptions:
  - id: A1
    name: Model start month
    value: "2026-07"
    unit: month
    source: "[BP date 2026-06-16] The model starts in the first full month after the business-plan date."
  - id: A2
    name: Starting cash after pre-seed close
    value: "$2.5M"
    unit: usdM
    source: "[BP fundingAsk targetFundingRangeUsd $2–4M; BP fundingAsk.runwayMonths 18] The base case uses a $2.5M close so the company can fund the initial five-person team, reach the year-2 proof points, and still hold a six-month operating buffer."
  - id: A3
    name: Paid pilot pricing
    value: "$30K over 3 months"
    unit: usdK_per_pilot
    source: "[BP investorMemo.firstCustomer.initialContract] The midpoint of the BP's $25K-$40K 8-12 week pilot range is modeled as roughly $10K monthly pilot revenue."
  - id: A4
    name: Mature annual logo value
    value: "$85K annual revenue per paying OEM logo"
    unit: usdK_per_logo_year
    source: "[BP gtm.pricing; BP businessModel.revenueStreams; research.market.som] The model uses the research $75K annual spend envelope plus modest per-revision usage and first-expansion revenue once a machine family is live."
  - id: A5
    name: Customer ramp
    value: "4 paying logos by M12, 14 by Q4Y2, and 32 by Q4Y3"
    unit: customers
    source: "[BP milestones; BP gtm.funnelTargets; research.market.som] This follows the plan to close 2-4 paid pilots in year 1, convert at least 2, and approach the research year-3 SOM path through additional OEM logos and repeat machine-family programs."
  - id: A6
    name: Expansion inside landed accounts
    value: "Quarterly revenue per mature logo rises from about $20K in early Y2 to about $21K-$22K in Y3 as more machine families, approved shops, and revision volume attach"
    unit: usdK_per_logo_quarter
    source: "[BP businessModel.expansionLevers; BP milestones 12–24 months and 24–36 months] Most year-3 growth comes from repeat programs and added supplier nodes inside landed OEMs, not from major price increases."
  - id: A7
    name: Gross margin ramp
    value: "45%-59% in Y1, 60%-67% in Y2, and 68%-70% in Y3"
    unit: percent
    source: "[BP businessModel.targetGrossMarginPct 70; BP operatingAssumptions] Early pilots carry services-assisted normalization and compliance support before templates and libraries pull the model toward the 70% software target."
  - id: A8
    name: Monthly churn
    value: "1.5%"
    unit: percent
    source: "Startup-finance heuristic for sticky industrial workflow software sold into embedded engineering and operations teams; renewals should be durable once approved-shop workflows are live, but pre-scale execution risk still warrants non-zero churn."
  - id: A9
    name: Fully loaded CAC
    value: "$45K per paying OEM logo"
    unit: usdK_per_customer
    source: "[BP gtm.channels; BP market.buyingProcess; research.reportMemo.buyingTriggers] Founder-led field selling, workflow audits, travel, and pilot onboarding make CAC meaningfully higher than SMB SaaS, but still compatible with the BP's $60K-$90K annual contract range."
  - id: A10
    name: Loaded salary bands
    value: "CEO/GTM founder $170K; founding and full-stack engineering $175K; integration engineering $170K; product/electrical $165K; solutions $145K; partnerships $150K; ops/finance $125K"
    unit: usdK_per_fte_year
    source: "Startup-finance heuristic for a U.S. pre-seed industrial software startup, mapped directly to the domain-heavy roles in [BP team] and the implementation-first sequencing in [BP strategicChoices.sequencingRationale]."
  - id: A11
    name: Headcount ramp snapshots
    value: "CEO/GTM founder 1/1/1/1/1/1; founding eng 1/1/1/1/1/1; product/electrical lead 1/1/1/1/1/1; solutions architect 0/1/1/1/1/1; integration engineer 0/0/1/1/1/1; full-stack engineer 0/0/0/0/1/1; partnerships-GTM 0/0/0/0/0/1; ops-finance 0/0/0/0/0/1 across q1y1/q2y1/q3y1/q4y1/q4y2/q4y3"
    unit: fte
    source: "[BP team; BP strategicChoices.sequencingRationale] The ramp keeps year 1 focused on product, implementation, and connector standardization, then adds scale engineering and GTM only after pilots prove repeatability."
  - id: A12
    name: Quarterly payroll smoothing
    value: "Y2 and Y3 salary expense ramps between the required headcount snapshots rather than stepping only at year-end"
    unit: method
    source: "[Financial Modeler contract] Quarterly salary expense is smoothed so the P&L stays consistent with the BP hiring sequence and the fixed six-column headcount schema."
  - id: A13
    name: Non-payroll operating budgets
    value: "Y1 non-salary opex $20K-$30K per month; Y2 non-salary opex $66K-$84K per quarter; Y3 non-salary opex $85K-$95K per quarter"
    unit: usdK
    source: "Startup-finance heuristic for cloud software carrying travel, security, insurance, legal, standards/compliance work, and moderate compute costs on top of a founder-led sales motion."
  - id: A14
    name: Downside scenario deltas
    value: "24 paying logos by Q4Y3, $75K mature annual logo value, and 66% steady-state gross margin"
    unit: scenario_inputs
    source: "[BP risks; BP operatingAssumptions; research.reportMemo.sensitivityCases] The downside assumes urgent revision volume is patchier, onboarding stays services-heavy, and shop data-sharing is weaker than planned."
  - id: A15
    name: Upside scenario deltas
    value: "36 paying logos by Q4Y3, $95K mature annual logo value, and 72% steady-state gross margin"
    unit: scenario_inputs
    source: "[BP businessModel.expansionLevers; research.reportMemo.validationSignals] The upside assumes the first machine-family wins create faster referrals from approved shops and earlier attachment of routing and benchmarking modules."
  - id: A16
    name: Cash conversion simplification
    value: "EBITDA approximates cash movement after the financing close"
    unit: method
    source: "Startup-finance heuristic for an asset-light software company with no debt, tax, or capex line modeled separately at this stage."
