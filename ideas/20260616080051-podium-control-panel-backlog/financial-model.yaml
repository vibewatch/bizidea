modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Triggers[Urgent panel revisions] --> Pilots[Paid pilots]
      Pilots --> Subs[Annual subscriptions]
      Subs --> Expansion[More machine families + approved shops]
      Expansion --> Revenue[Revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Ending cash]
modelSanity:
  - checkName: Revenue engine
    finding: "Base-case revenue is driven by 32 paying OEM logos by Q4Y3, with most year-3 dollars coming from repeat machine-family and approved-shop expansion inside already-landed accounts."
  - checkName: Must go right
    finding: "The company must standardize enough input formats and compliance templates that implementation hours fall about 50% by year 2 while founder-led selling still converts late-change pilots into annual contracts."
  - checkName: Model breaks if
    finding: "The downside case appears if sales cycles stretch and onboarding stays services-heavy, because that combination pushes Y3 EBITDA to roughly negative $330K and drives the cash low point toward about $430K."
  - checkName: Next-round proof
    finding: "The next round is justified once the business reaches roughly 12-14 paying OEM logos, launches supplier scorecards in production, and proves onboarding effort is falling fast enough to protect the 70% gross-margin path."
sanityChecks:
  ruleOf40: "Y3 growth 159.6% + EBITDA margin 0.5% = 160.1%."
  burnMultiple: "Y2 burn multiple is about 0.7x on roughly $0.90M of net new exit ARR; Y3 is near breakeven while adding about $1.44M of additional exit ARR."
  revenuePerFte: "$278K Y3 using $2.22M revenue and 8 year-end FTE (benchmark $200–400K SaaS)."
  flags:
    - "The model still depends on founder-led selling through most of Y2, so any slip in pilot conversion or referral density quickly shows up in cash."
    - "Gross margin only reaches the BP target if the first input formats and compliance templates standardize quickly; otherwise the business looks more like industrial services than software."
    - "Year-3 customer count needs steady same-vertical logo additions without a large field-sales team, so the shop-referral and repeat-machine-family motion has to become truly repeatable."
