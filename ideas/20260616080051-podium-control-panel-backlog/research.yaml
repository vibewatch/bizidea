    - 117
  geographicConsiderations:
  - point: The U.S. is the cleanest first market because the UL panel shop program covers U.S. and Canadian markets while the machine-builder workflow here is anchored by a shared UL/NFPA/OSHA compliance stack.
    sourceRefs:
    - 46
    - 48
    - 51
  - point: Regions with tighter panel capacity or switchgear backlogs should feel the strongest pull for multi-shop routing and standardized revision packets.
    sourceRefs:
    - 19
    - 100
  - point: Canada is a logical later adjacency because UL covers both markets, but the operational playbook should stay U.S.-first while the startup codifies the workflow.
    sourceRefs:
