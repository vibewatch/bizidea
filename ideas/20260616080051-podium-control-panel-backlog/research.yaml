  sensitivityCases:
  - case: Component lead times normalize faster than expected
    impact: Urgency shifts from pure speed to traceability, supplier comparison, and compliance confidence, but the workflow remains painful if revisions still cross company boundaries.
    sourceRefs:
    - 19
    - 20
    - 47
  - case: Large panel shops push their own customer portals
    impact: The startup must stay vendor-neutral and win on cross-shop benchmarking and routing rather than trying to out-build the builders.
    sourceRefs:
    - 24
    - 114
    - 115
  - case: UL and machinery standards continue to evolve
    impact: Compliance automation becomes more valuable because every revision needs fresh evidence, approved-part logic, and clearer documentation.
    sourceRefs:
    - 50
    - 56
  validationPlan:
  - priority: high
    question: How many outsourced panel revisions per year does a 100-800 employee packaging or conveyor OEM actually release, and what share are urgent after FAT or early field install?
    evidenceToGather: Export revision logs, RFQs, and schedule slips from 5-10 target OEMs and one approved panel shop per account.
  - priority: high
    question: 'Which input formats dominate the first 20 target accounts: EPLAN, Solid Edge, AutoCAD Electrical exports, spreadsheets, PDF redlines, or manual BOMs?'
    evidenceToGather: Collect sample ECO packets and shop quoting packages from pilots to prioritize import and normalization work.
  - priority: medium
    question: Will approved UL 508A shops share enough lead-time, quote, and quality data for the platform to become a routing layer rather than just a document packager?
    evidenceToGather: Pilot supplier-scorecard terms with 3-5 UL shops and test whether they accept standardized package schemas and post-job feedback loops.
