  fiveForces:
    supplierPower:
      score: 4
      rationale: UL-listed panel shops and critical components remain constrained, and the evidence base still points to long or volatile lead times. That gives certified suppliers real leverage unless the buyer can route across more than one shop [19][46][100][115].
      sourceRefs:
      - 19
      - 46
      - 100
      - 115
    buyerPower:
      score: 3
      rationale: Buyers can always stay with email, redlines, or a favored shop, but the cost of a delayed machine shipment makes them responsive once the bottleneck is visible to operations leadership [13][21][101].
      sourceRefs:
      - 13
      - 21
      - 101
    threatOfEntrants:
      score: 3
      rationale: Generic PLM/change tools and incumbent eCAD vendors can move into the space, but electrical semantics, supplier routing, and compliance packets make this harder than adding a simple workflow module [27][30][32][47][117].
      sourceRefs:
      - 27
      - 30
      - 32
      - 47
      - 117
    threatOfSubstitutes:
      score: 4
      rationale: The default substitute is still manual coordination plus a strong panel-shop relationship, and fast-turn builders can also solve pain without new software [24][100][101][114].
      sourceRefs:
      - 24
      - 100
      - 101
      - 114
    competitiveRivalry:
      score: 3
      rationale: Adjacency is crowded, but direct buyer-side cross-shop control-panel ECO software is still sparse, so rivalry is meaningful yet not fully commoditized [27][30][32][115].
      sourceRefs:
