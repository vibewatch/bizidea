  adoptionFrictionMatrix:
  - friction: Dirty electrical inputs and inconsistent redlines
    severity: high
    affectedBuyer: Controls engineering manager
    mitigation: Start with services-assisted onboarding on one machine family and normalize exports before asking for deep integration.
