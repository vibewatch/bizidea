problem: 美国机器 OEM 和系统集成商至今还靠 PDF 红线、eCAD 修改、表格和给本地 UL 508A 车间打电话来处理控制面板修订。客户规格临时变更，或调试时冒出问题要改电气，资深控制工程师就得手工把 I/O 列表、图纸、BOM、合规备注和车间指令重新对齐。交期本来就已经拖过 12 周，关键知识又压在老师傅脑子里，所以哪怕只是一个小改动，也可能把整机出货或工厂投产往后拖。
targetUser:
  primary: 在美国包装和物料搬运 OEM 里负责控制工程的经理；这类公司一边发定制设备，一边把 UL 508A 控制面板外包出去。
  secondary: 给食品饮料产线做改造的区域型系统集成商里的项目经理和首席控制工程师。
  buyer: 中型机器 OEM 里负责控制工程的总监或运营副总裁，这类公司经常有外包面板修订。
startupThesis:
  nonObviousInsight: 工业自动化里最稀缺的资产，已经不只是装配控制面板的人手，而是一套随时能过审的电气变更包——让任何合格车间都能直接执行修订，不用再四处打捞隐性经验。只要把需求、eCAD 和车间指令在软件里连起来，真正能放大规模的，就不是某一家更快的面板车间，而是谁掌握了跨公司变更单和合规证据这一层。
  beachhead: 先打美国包装和输送设备 OEM 的维保工程与变更单流程。这些公司把 UL 508A 面板外包出去，又在 FAT 和早期现场安装阶段频繁改图。
  wedge: 控制面板 ECO 云：吃进 I/O 列表、eCAD 导出和标注红线，吐出修订图纸、合规包、可直接发 RFQ 的文件，以及给获批面板车间用的返工指令。
  whyNowCatalyst: Podium 的融资和“软件直连制造”的流程已经说明，控制面板设计终于能被软件重构了。接下来最急的瓶颈，就是怎么在分散的供应商之间把合规修订管起来。
  ventureScalePath: 先从包装和物料搬运 OEM 的后期面板修订切进去，再往多车间产能路由、获批元件库、存量设备服务文档，最后做到工业电气总成的操作系统。
solution: 产品卡在 OEM 控制团队和真正负责生产或返工的外部面板车间之间。它解析需求、I/O 列表、eCAD 输出和现场红线，生成一套可追溯的修订包，里面有图纸差异、更新后的 BOM、合规检查清单和技师可直接照做的工单。流程里把控制、采购和选定的 UL 车间审批都串起来，交期和价格变化就不用再埋在邮件线程里。修订一旦紧急，系统还能按能力、交期和过往质量记录，把同一套包分发给预先筛过的车间。时间越久，它沉淀的获批电路模块、工时基准和执行结果库越厚，后面每一轮变更都会更快。
goToMarketSeed:
  firstCustomer: 首批客户应是 100–800 人规模的美国包装或物料搬运 OEM：有 5–20 名控制工程师、3–10 家外部 UL 508A 面板车间，每年支撑 50–300 台定制设备。
  buyingTrigger: 客户规格临时变更，或调试问题威胁出货日期，因为一次面板修订就会把交付交期彻底拉爆。
  currentAlternative: eCAD 文件、PDF 红线、表格版 BOM、项目经理邮件线程，以及和本地面板车间或内部技师来回拉扯。
  switchingReason: 这个切口把每次修订都变成一套可追溯的标准包，合格车间拿到就能报价、立刻开干，省掉几周专家协调时间，也不用逼 OEM 更换现有设计工具或自己建面板产能。
  pricingHypothesis: 按活跃机型项目或已接入的面板车间收年费 SaaS 订阅，再对每次正式发布的面板修订收使用费。
