jobsToBeDone:
- job: 当某个机型项目临时收到客户电气变更时，帮控制工程经理尽快把面板修订打成包，这样 OEM 不用手工重搭文档链，也能守住出货日期。
  currentAlternative: 手工红线、表格版 BOM 更新，以及电话或邮件协调面板车间
  successMetric: 从提出修订到面板返工或发布包获批的天数
- job: 当产线改造项目冒出意外的控制问题时，帮系统集成商重新拉起合规图纸和车间指令，让工厂不用等完整重设计就能复产。
  currentAlternative: 靠资深技师的隐性经验，加上紧急改图和向本地车间求人插单
  successMetric: 从现场发现问题到面板修复装上的时间
ideaScorecard:
  signalStrength:
    score: 5
    rationale: 这个线索同时给出了 12 周以上交期、点名的软件流程和已验证的吞吐能力，对工业瓶颈来说已经非常具体。
  painIntensity:
    score: 5
    rationale: 面板修订会直接拖慢整机交付和工厂开线，伤的是收入、客户验收和稀缺控制工程师的人效。
  wedgeClarity:
    score: 5
    rationale: 买方侧的面板变更控制是条很窄但很清晰的流程：输入、输出、买家和预算触发点都摆在台面上。
  defensibility:
    score: 4
    rationale: 专有修订历史、获批模块和车间绩效数据会不断叠加流程优势，不过基础功能仍可能被现有厂商抄走。
  ventureScale:
    score: 4
    rationale: 滩头市场不大，但有机会继续长成外包工业电气总成和存量服务变更的操作系统。
topRisks:
- name: 现有面板车间先做出来
  description: 增长很快的面板制造商可能把自家软件继续往前伸，把变更单流程锁死在单一车间网络里。
  mitigation: 先占住买方侧系统记录层，而且要能跨多家车间运转，帮 OEM 守住议价权，而不是把它们绑进某一家制造商。
- name: 电气数据太碎
  description: OEM 的 eCAD 导出、I/O 列表和文档卫生可能一团乱，让自动化在第一天就卡壳。
  mitigation: 先支持最常见的导出格式，并在一条机型上用服务辅助导入，等流程跑顺再扩大自动化。
- name: 销售看起来像定制流程软件
  description: 如果产品给人的感觉是定制流程工具，大企业买家就会预期重实施、慢兑现 ROI。
  mitigation: 围绕晚变更触发场景来卖，把价值包装成每次修订能省下多少天，再把包装和输送设备常见架构沉淀成可复制模板。
