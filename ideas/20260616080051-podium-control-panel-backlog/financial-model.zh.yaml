scenarios:
  downside:
    description: 紧急修订量比预期更跳，格式归一化也更依赖人工，所以转化和扩张都比计划更晚落地。
    y3RevenueK: 1640.0
    y3EbitdaK: -330.0
    cashLowPointK: 430.0
    keyAssumptionChanges:
    - Q4Y3 的付费 logo 数从 32 降到 24。
    - 成熟年度 logo 价值从约 $85K 降到约 $75K，因为第二条机型家族的扩张更慢。
    - 毛利率只能爬到约 66%，因为导入和合规复核持续偏服务化。
    - 创始人主导销售周期从大约 6–9 个月拉长到大约 9–12 个月。
  base:
    description: 基准情景下，第 1 年签下 4 个付费试点，Q4Y2 达到 14 个付费 logo，并在 Y3 结束时做到 32 个付费 OEM logo，基本贴着研究里的 SOM 路径走。
    y3RevenueK: 2220.0
    y3EbitdaK: 11.7
    cashLowPointK: 878.4
    keyAssumptionChanges:
    - 试点定价基本落在 BP 中点：3 个月约 $30K。
    - 转化后的 logo 稳在约 $85K 年收入，外加少量按次修订和早期扩张收入。
    - 毛利率在 Q3Y3–Q4Y3 达到 BP 目标的 70%。
    - 第 3 年的大部分增长来自已落地 OEM 内部的重复机型与获批车间扩张，而不是大规模增招企业销售。
  upside:
    description: 获批车间转介绍、更干净的输入标准化，以及更早挂上路由模块，会让 logo 增长和毛利率都快于计划。
    y3RevenueK: 2950.0
    y3EbitdaK: 480.0
    cashLowPointK: 940.0
    keyAssumptionChanges:
    - Q4Y3 的付费 logo 数从 32 提到 36。
    - 成熟年度 logo 价值从约 $85K 提到约 $95K，因为路由和基准分析模块更早挂上去。
    - 随着模板覆盖扩张速度快于支持负担，毛利率提升到约 72%。
    - 来自获批 UL 508A 车间的联合销售转介绍，会把从工作流审计到付费试点的时间进一步缩短。
