modelDiagram:
  title: 单位经济模型流转
  mermaid: "flowchart LR\n  Triggers[Urgent panel revisions] --> Pilots[Paid pilots]\n  Pilots --> Subs[Annual subscriptions]\n  Subs --> Expansion[More machine families + approved shops]\n  Expansion --> Revenue[Revenue]\n  Revenue --> GrossProfit[Gross profit]\n  GrossProfit --> Cash[Ending cash]\n"
modelSanity:
- checkName: 收入引擎
  finding: 基准收入由 Q4Y3 的 32 个付费 OEM logo 驱动，而第 3 年的大部分收入来自已落地账户内部的重复机型和获批车间扩张。
- checkName: 必须跑对的地方
  finding: 公司必须把足够多的输入格式和合规模板标准化，让实施工时到第 2 年下降约 50%；同时，创始人主导销售还得把晚变更试点转成年度合同。
- checkName: 模型会失真如果
  finding: 如果销售周期拉长、导入又继续偏服务化，下行情景就会出现：Y3 EBITDA 会跌到约 -$330K，现金低点也会逼近约 $430K。
- checkName: 下一轮融资验证
  finding: 当业务做到约 12–14 个付费 OEM logo、让供应商记分卡在生产环境上线，并证明导入投入下降得足够快、能守住 70% 毛利路径时，下一轮融资才站得住。
sanityChecks:
  ruleOf40: Y3 增长 159.6% + EBITDA 利润率 0.5% = 160.1%。
  burnMultiple: Y2 的 burn multiple 约为 0.7x，对应约 $0.90M 的新增退出 ARR；Y3 接近盈亏平衡，同时新增约 $1.44M 的退出 ARR。
  revenuePerFte: $2.22M 收入、8 名年末 FTE 对应 Y3 人均收入约 $278K（SaaS 基准为 $200–400K）。
  flags:
  - 模型在 Y2 的大部分时间里仍依赖创始人主导销售，所以只要试点转化或转介绍密度有一点滑坡，现金马上会反映出来。
  - 只有首批输入格式和合规模板足够快地标准化，毛利率才能达到 BP 目标；否则这门生意更像工业服务，而不是软件。
  - 第 3 年的客户数需要在没有大规模外勤销售团队的情况下，稳定新增同垂类 logo，所以“车间转介绍 + 重复机型”这套动作必须真正可复制。
