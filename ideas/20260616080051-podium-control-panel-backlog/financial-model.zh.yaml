slug: ul-panel-revision-cloud
date: '2026-06-16'
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-07
  unit: month
  source: '[BP date 2026-06-16] 模型从 business-plan 日期之后的第一个完整月份开始。'
- id: A2
  name: pre-seed 交割后起始现金
  value: $2.5M
  unit: usdM
  source: '[BP fundingAsk targetFundingRangeUsd $2–4M; BP fundingAsk.runwayMonths 18] 基准情景按 $2.5M 交割建模，这样公司既能养起最初 5 人团队、跑到第 2 年验证点，还能留出 6 个月运营缓冲。'
- id: A3
  name: 付费试点定价
  value: $30K / 3 个月
  unit: usdK_per_pilot
  source: '[BP investorMemo.firstCustomer.initialContract] 按 BP 里 $25K–$40K、8–12 周试点区间的中点建模，约等于每月 $10K 试点收入。'
- id: A4
  name: 成熟客户年度 logo 价值
  value: 每个付费 OEM logo 年收入 $85K
  unit: usdK_per_logo_year
  source: '[BP gtm.pricing; BP businessModel.revenueStreams; research.market.som] 模型采用研究里每年 $75K 的支出包络，再叠加少量按次修订费用，以及单条机型跑通后的第一层扩张收入。'
- id: A5
  name: 客户爬坡
  value: M12 达到 4 个付费 logo，Q4Y2 达到 14 个，Q4Y3 达到 32 个
  unit: customers
  source: '[BP milestones; BP gtm.funnelTargets; research.market.som] 这遵循了第 1 年签下 2–4 个付费试点、至少转化 2 个，并通过更多 OEM logo 和重复机型项目，逼近研究里第 3 年 SOM 路径的计划。'
- id: A6
  name: 已落地账户内的扩张
  value: 成熟 logo 的单季度收入，会从 Y2 早期约 $20K，提升到 Y3 的约 $21K–$22K，因为接入了更多机型、获批车间和修订量。
  unit: usdK_per_logo_quarter
  source: '[BP businessModel.expansionLevers; BP milestones 12–24 months and 24–36 months] 第 3 年的大部分增长来自已落地 OEM 内部的重复项目和新增供应商节点，不是大幅提价。'
- id: A7
  name: 毛利率爬坡
  value: Y1 为 45%–59%，Y2 为 60%–67%，Y3 为 68%–70%
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct 70; BP operatingAssumptions] 早期试点仍带有服务辅助的归一化和合规支持；随着模板和库成熟，模型才会逐步靠向 70% 的软件目标毛利。'
- id: A8
  name: 月流失率
  value: 1.5%
  unit: percent
  source: 这是工业工作流软件的创业财务经验值：卖给深嵌工程和运营团队后，一旦获批车间流程跑起来，续费通常较稳；但在规模化前，执行风险仍要求模型保留非零流失。
- id: A9
  name: 全负荷 CAC
  value: 每个付费 OEM logo 为 $45K
  unit: usdK_per_customer
  source: '[BP gtm.channels; BP market.buyingProcess; research.reportMemo.buyingTriggers] 创始人主导的线下销售、工作流审计、差旅和试点导入，让 CAC 明显高于 SMB SaaS，但仍和 BP 里的 $60K–$90K 年合同区间相容。'
- id: A10
  name: 全成本薪酬带
  value: CEO/GTM 创始人 $170K；创始与全栈工程 $175K；集成工程 $170K；产品/电气 $165K；解决方案 $145K；合作伙伴 $150K；运营/财务 $125K
  unit: usdK_per_fte_year
  source: 面向美国 pre-seed 工业软件创业公司的财务经验值，并直接映射到 [BP team] 的重领域角色和 [BP strategicChoices.sequencingRationale] 的先实施后规模化节奏。
- id: A11
  name: 人数爬坡快照
  value: 按 q1y1/q2y1/q3y1/q4y1/q4y2/q4y3：CEO/GTM 创始人 1/1/1/1/1/1；创始工程师 1/1/1/1/1/1；产品/电气负责人 1/1/1/1/1/1；解决方案架构师 0/1/1/1/1/1；集成工程师 0/0/1/1/1/1；全栈工程师 0/0/0/0/1/1；合作伙伴-GTM 0/0/0/0/0/1；运营-财务 0/0/0/0/0/1
  unit: fte
  source: '[BP team; BP strategicChoices.sequencingRationale] 这个爬坡让第 1 年聚焦产品、实施和连接器标准化；只有在试点证明可重复后，才补规模化工程和 GTM。'
- id: A12
  name: 季度薪酬平滑
  value: Y2 和 Y3 的薪酬费用按所需人数快照之间平滑爬坡，而不是只在年末台阶式跳变
  unit: method
  source: '[Financial Modeler contract] 季度薪酬费用做了平滑处理，这样 P&L 才能和 BP 的招聘节奏及固定的六列 headcount 结构保持一致。'
- id: A13
  name: 非薪资运营预算
  value: Y1 非薪资 opex 每月 $20K–$30K；Y2 每季 $66K–$84K；Y3 每季 $85K–$95K
  unit: usdK
  source: 这是云软件公司的创业财务经验值：除了创始人主导销售外，还要覆盖差旅、安全、保险、法务、标准/合规工作以及中等强度算力成本。
- id: A14
  name: 下行情景变量
  value: Q4Y3 为 24 个付费 logo、成熟年度 logo 价值 $75K、稳态毛利率 66%
  unit: scenario_inputs
  source: '[BP risks; BP operatingAssumptions; research.reportMemo.sensitivityCases] 下行情景假设紧急修订量更零散，导入持续偏服务化，车间数据共享也弱于计划。'
- id: A15
  name: 上行情景变量
  value: Q4Y3 为 36 个付费 logo、成熟年度 logo 价值 $95K、稳态毛利率 72%
  unit: scenario_inputs
  source: '[BP businessModel.expansionLevers; research.reportMemo.validationSignals] 上行情景假设首批机型胜利会更快带来获批车间转介绍，并让路由和基准分析模块更早挂上去。'
- id: A16
  name: 现金转换简化
  value: 融资交割后，用 EBITDA 近似现金变动
  unit: method
  source: 这是轻资产软件公司的创业财务经验值：现阶段模型未单独展开债务、税项或资本开支。
