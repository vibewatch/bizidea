  - point: 元件交期波动和熟练工短缺，仍在拖慢电气总成。
    sourceRefs:
    - 19
    - 20
    - 100
  - point: 这条工作流横跨多套现有系统，所以集成和变更管理本身就可能成为销售阻力。
    sourceRefs:
    - 27
    - 30
    - 32
    - 106
    - 117
  - point: 标准与合规变化一边强化价值主张，一边也抬高实施复杂度。
    sourceRefs:
    - 47
    - 50
    - 56
competitors:
- name: Podium Automation
  stage: 成长期
  wedge: 用软件提速的 UL 508A 面板垂直一体化“设计—制造—测试—发货”模式。
  pricing: 按项目收设计费，再给制造报价；官网写明固定设计费里包含 2 次图纸修订。
  strength: 证明买方会为了更短周期和更可见的执行迁移预算。
  weaknessVsUs: 它的工作流绑在 Podium 自己的产能上，不是买方控制的多车间路由层。
  sourceRefs:
  - 13
  - 24
- name: EPLAN
  stage: 现有厂商
  wedge: 面向面板与机器工程的电气设计、零件数据，以及 ERP / PDM 集成。
  pricing: 按报价销售的企业软件。
  strength: 电气语义很深，在面板制造商和 OEM 工程师里有强装机信誉。
  weaknessVsUs: 它优化的是工程设计，不是外包车间 RFQ 打包和买方侧执行控制。
  sourceRefs:
  - 27
  - 28
  - 106
- name: Siemens Solid Edge
  stage: 现有厂商
  wedge: 给工业机械工程团队用的机电一体化设计与数据管理。
  pricing: 按报价销售的企业软件。
  strength: 很适合想把电气设计并入更大产品数据体系的机器制造商。
  weaknessVsUs: 设计系统更重，而且没有专门面向外包面板修订的买方侧工作流。
  sourceRefs:
  - 30
  - 62
  - 111
- name: OpenBOM
  stage: 成长期
  wedge: 云端 BOM、修订和供应商协作，按席位 + 数据定价。
  pricing: 按月或按年收编辑席位费和数据条目费；只读用户无限免费。
  strength: 网页原生协作模型更现代，而且明确支持 change order、revision 和外部查看者。
  weaknessVsUs: 它是通用产品数据层，不懂电气语义、UL 打包逻辑和面板车间工单。
  sourceRefs:
  - 35
  - 65
  - 117
- name: nVent HOFFMAN
  stage: 现有厂商
  wedge: 通过设计到制造和面板车间自动化，让面板生产更快、更一致。
  pricing: 软件按报价，加自动化硬件和服务。
  strength: 真正掌控了影响制造速度的杠杆，比如机柜改造、自动布线和车间工作流工具。
  weaknessVsUs: 它为车间效率而生，不是覆盖多家获批供应商的中立买方系统。
  sourceRefs:
  - 114
  - 115
regulatoryTechnicalConstraints:
- point: UL 508A 修订现在会触到控制回路电压上限、断开逻辑、SCCR 相关细节和可接受元件来源标准，所以修订自动化必须始终带着合规意识。
  sourceRefs:
  - 47
  - 50
  - 56
- point: 现场返工和调试步骤必须遵守 OSHA 上锁挂牌和电气安全作业规范，这会限制紧急变更的执行自由度。
  sourceRefs:
  - 51
- point: NEMA 机柜要求和特定环境约束，会挡住那些想当然的标准化或跨机型替代。
  sourceRefs:
  - 54
- point: 控制面板 ECO 往往还连着网络、HMI 和控制架构影响，所以平台不能把每次修订都当成简单的图纸 diff。
  sourceRefs:
  - 87
  - 111
validationSignals:
- point: Podium 已经融到 $18M，而且称两年内交付了 200 多块面板，说明更快的面板工作流背后确实有商业拉力。
  sourceRefs:
  - 13
  - 14
- point: Fourth Power、The Lumber Manufactory 以及 PanelTEK 这类快周转案例都说明，只要运营受威胁，买方愿意花钱把修订周期压缩。
  sourceRefs:
  - 15
  - 16
  - 101
- point: nVent 正明确把面板车间自动化和面板车间受众工作流拿出来卖，从供应侧解决同一个时延问题，这也反向证明这个瓶颈足够大，值得单独做工具。
  sourceRefs:
  - 114
  - 115
openQuestions:
- 一家典型的 100–800 人包装或输送设备 OEM，每年到底处理多少外包面板 ECO？其中有多大比例是在 FAT 或早期现场安装后变成紧急单？
- 前 20 个共创客户最常见的设计栈是什么：EPLAN、Solid Edge、AutoCAD Electrical 导出、表格，还是 PDF 红线？
- 获批 UL 508A 车间愿意共享足够的报价、交期和缺陷数据吗？这样路由和基准分析才能变成护城河。
- 修订后的 BOM 多久会触发机柜、SCCR 或环境等级变化，而不是简单换个元件就算完？
