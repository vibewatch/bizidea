slug: datacenter-drawdown-risk-os
date: '2026-07-11'
currency: USD
modelStartMonth: 2026-08
assumptions:
- id: A1
  name: 模型启动月份
  value: 2026-08
  unit: month
  source: '[BP date 2026-07-11] 模型从商业计划日期后的下一个月份启动。'
- id: A2
  name: 期初现金 / 种子前轮融资
  value: '2.0'
  unit: USDM
  source: '[BP fundingAsk targetFundingRangeUsd $2–4M; BP runwayMonths 18] 基准情形取融资区间下沿，并按精简团队配置，把现金跑道拉到 30 个月，覆盖下一轮融资证明点。'
- id: A3
  name: 模型里的客户单位
  value: 一个付费贷款方账户，在一套被监控的组合上运行拨款工作流；第二个项目或第二条业务条线的扩张，先体现在 ARPU 上，再体现在客户数上。
  unit: definition
  source: '[BP businessModel.unitOfValue; BP gtm pricing; BP milestones] 经济买方是贷款团队，但随着更多已融资项目被纳入监控，收入会先在同一账户里向上扩。'
- id: A4
  name: 每个活跃付费账户的混合年收入
  value: M5-M12 $180K; M13-M18 $220K; M19-M24 $245K; M25-M28 $265K; M29-M32 $285K; M33-M36 $300K
  unit: USDK per customer-year
  source: '[Research market.som $180k per active project-year; BP gtm pricing $150k-$300k ARR per lender; BP funnelTargets second-project expansion 50%+] 这条爬坡假设，平台费和多项目监控会在第 3 年后段把 ARPU 抬到计划区间上沿，而不只是靠新客户数。'
- id: A5
  name: 目标毛利率
  value: '70'
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct 70] 一旦资料集和部署方式做成模板，基准情形里毛利率就按这个水平持平。'
- id: A6
  name: 付费账户净新增节奏
  value: M1-M12 期末账户数 = 0,0,0,0,1,1,1,2,2,2,3,3；Q1Y2 4；Q2Y2 4；Q3Y2 5；Q4Y2 5；Q1Y3 5；Q2Y3 6；Q3Y3 6；Q4Y3 6
  unit: count
  source: '[BP milestones; BP gtm wedge] 这条节奏让公司在第 1 年落下 3 个付费共创客户，第 2 年末做到 5 个付费账户，第 3 年末做到 6 个。'
- id: A7
  name: 现有贷款方账户内的扩张
  value: 前 5 家正式上线贷款方里，有 2 家会在第 3 年后段加上第二个被监控项目或第二条业务条线。
  unit: account expansion
  source: '[BP gtm funnelTargets first production lender -> second project or desk expansion within 12 months 50%+; BP milestones 12-24 months] 第 3 年的 ARPU 抬升，更多来自账户内扩张，而不是单纯多拿新客户。'
- id: A8
  name: 各岗位的全成本现金薪酬
  value: 创始人 / CEO 120；创始工程师 160；实施负责人 110；产品负责人 130；合作负责人 130；投资组合风险分析师 / 客户成功 95；安全 / 部署工程师 145
  unit: USDK per year
  source: '[BP team; startup-finance heuristic for a lean GCC/EMEA enterprise-software team with benefits and payroll tax] 薪酬按精简的 GCC/EMEA 企业软件团队设定，低于美国沿海大厂基准，因为计划里不需要一支庞大的美国销售队伍。'
- id: A9
  name: 招聘节奏
  value: M1 创始人 / CEO 与创始工程师；M3 实施负责人；M5 产品负责人；M10 合作负责人；M16 投资组合风险分析师 / 客户成功；M22 安全 / 部署工程师
  unit: timing
  source: '[BP team startTiming; BP strategicChoices.sequencingRationale] 在任何规模化商业扩张前，先把交付和建立信任的岗位补齐。'
- id: A10
  name: 职能薪酬分摊
  value: 创始人 / CEO：60% S&M / 40% G&A；创始工程师和产品负责人：100% R&D；实施负责人：60% R&D / 40% G&A；合作负责人：100% S&M；投资组合风险分析师 / 客户成功：35% S&M / 65% G&A；安全 / 部署工程师：70% R&D / 30% G&A
  unit: allocation
  source: '[BP team rationales] 用来把人力成本滚进各条职能 P&L。'
- id: A11
  name: 非薪酬运营开支爬坡
  value: S&M 非薪酬支出从 $6K/mo 涨到 $16K/mo；R&D 工具/云/安全支出从 $8K/mo 涨到 $17K/mo；G&A 从 $5K/mo 涨到 $10K/mo
  unit: USDK per month
  source: '[Startup-finance heuristic anchored to BP local VPC deployment, travel-heavy founder sales, security diligence, and partner integration needs.] 基于本地 VPC 部署、重差旅的创始人销售、安全尽调和伙伴接入需求做估算。'
- id: A12
  name: 稳态 CAC
  value: '125'
  unit: USDK per customer
  source: '[BP 创始人主导主动外拓加伙伴渠道; startup-finance heuristic] 贷款方采购保守、共创客户陪跑又重，所以在口碑出现前，CAC 仍按低六位数看。'
- id: A13
  name: 月度客户流失率
  value: '2.0'
  unit: percent
  source: '[BP businessModel expansion levers; startup-finance heuristic] 一旦嵌进贷款方工作流，产品会很黏；但买方群体太窄、项目周期又有自然切换，所以仍按非零流失率处理。'
- id: A14
  name: 现金转换政策
  value: EBITDA 大致等于现金变动
  unit: policy
  source: '[Startup-finance heuristic] 当前模型里不考虑债务、capex、税或实质性的营运资金波动。'
- id: A15
  name: 下一轮融资证明点
  value: 在 30 个月内做到 5 个正式上线贷款方账户、6–8 个处于监控下的活跃项目年、2 次第二项目/第二业务条线扩张，以及 1 套可重复的本地 VPC 部署模板
  unit: milestone
  source: '[BP milestones 12-24 months and 24-36 months; BP fundingAsk.useOfFundsSummary] 这个里程碑就是种子前轮融资额的定标点，并额外留出 6 个月缓冲。'
- id: A16
  name: 第 3 年不做规模化商业扩招
  value: 除非公司明显跑赢基准情形，否则在补完安全岗位后，总人数就固定在 7 FTE。
  unit: policy
  source: '[BP strategicChoices.sequencingRationale; BP notYet] 在窄工作流没跑出可重复性之前，不加 AE，也不上相邻市场团队。'
