scenarios:
  downside:
    description: 一个试点没能转正，本地部署工作量持续重于计划，公司到第 3 年末只做到 5 个付费贷款方账户。
    y3RevenueK: 1159.6
    y3EbitdaK: -586.2
    cashLowPointK: 193.5
    keyAssumptionChanges:
    - 付费账户净新增在第 1 年末、第 2 年末和第 3 年末分别只做到 3、4、5 个，而不是 3、5、6 个。
    - 每个活跃账户的混合年收入最高只到 $260K，而不是 $300K，因为第二项目扩张来得更晚。
    - 毛利率最终只能稳在 67%，而不是 70%，因为本地 VPC 部署和数据归一化仍然更偏定制。
  base:
    description: 3 个付费共创客户转成可复制、可引用的贷款方工作流，前几家正式账户内部也跑出了扩张，公司到第 3 年末做到 6 个付费账户。
    y3RevenueK: 1599.7
    y3EbitdaK: -243.5
    cashLowPointK: 738.0
    keyAssumptionChanges:
    - 付费账户净新增按 A6 走，在第 1 年末、第 2 年末和第 3 年末分别做到 3、5、6 个。
    - 每个活跃账户的混合年收入按 A4 抬升：试点阶段从 $180K 起步，到第 3 年后段升到 $300K。
    - 毛利率守在 70% 的计划目标，因为导入范围始终很窄，部署也停留在本地 VPC，而不是客户定制本地机房。
  upside:
    description: 伙伴带来的信任加速了转化，2 次扩张都来得更早，公司到第 3 年末做到 8 个付费账户，毛利率也略好。
    y3RevenueK: 1977.2
    y3EbitdaK: 60.3
    cashLowPointK: 1122.7
    keyAssumptionChanges:
    - 付费账户净新增在第 1 年末、第 2 年末和第 3 年末分别做到 3、6、8 个，因为首批由伙伴带来的试点更早落地。
    - 随着基准报告和第二项目扩张在 Q4Y3 之前就到位，每个活跃账户的混合年收入更早摸到 $300K。
    - 毛利率升到 72%，因为本地部署和证据接入在不同贷款方之间更容易模板化。
sensitivity:
- variable: ARPU
  downsideCase: 如果第二项目扩张不及预期，第 3 年后段的混合 ARPU 会卡在大约 $255K。
  baseCase: 第 3 年整体混合 ARPU 约 $285K，后段稳态能到 $300K。
  upsideCase: 如果基准报告和第二项目扩张提前发生，混合 ARPU 会被拉到 $300K 以上。
  y3RevenueImpactK: -160.0
  cashImpactK: -115.0
- variable: CAC
  downsideCase: 如果每一单仍都得靠创始人亲自硬推，CAC 会升到大约 $150K。
  baseCase: 随着第 2 年开始有伙伴引荐帮忙，CAC 大致守在 $125K。
  upsideCase: 一旦可引用的工程师和顾问开始喂管道，CAC 会往 $100K 靠。
  y3RevenueImpactK: 0.0
  cashImpactK: -150.0
- variable: churn
  downsideCase: 如果项目完工后没有扩到业务条线层面，月流失率会上到 3.0%。
  baseCase: 因为产品一直嵌在活跃贷款方工作流里，月流失率大致守在 2.0%。
  upsideCase: 一旦基准和观察名单功能把切换成本抬高，月流失率可改善到 1.5%。
  y3RevenueImpactK: -120.0
  cashImpactK: -90.0
- variable: sales cycle
  downsideCase: 如果安全审查和数据共享审批再多拖大约一个季度，每次付费转化都会更慢。
  baseCase: 首个付费试点在第 5 个月落地，后续账户按 A6 节奏转化。
  upsideCase: 如果伙伴证明足够强，尽调会被压缩，并把 1 次正式转化提前到 H1Y2。
  y3RevenueImpactK: -260.0
  cashImpactK: -180.0
- variable: gross margin
  downsideCase: 如果部署和资料清洗一直偏服务化，毛利率最终只能稳在 67%。
  baseCase: 毛利率守在 70% 的计划目标。
  upsideCase: 一旦部署和证据接入标准化，毛利率可升到 72%。
  y3RevenueImpactK: 0.0
  cashImpactK: -85.0
- variable: hiring pace
  downsideCase: 如果在验证可重复性之前就提前拉入额外实施或安全岗位，现金压力会更大。
  baseCase: 招聘按 A9 走，在补完安全岗位后保持不再扩招。
  upsideCase: 如果一项非关键岗位延后到种子轮之后再补，现金压力会更轻。
  y3RevenueImpactK: 0.0
  cashImpactK: -130.0
modelDiagram:
  title: 单位经济流转
  mermaid: "flowchart LR\n  TargetLenders --> PaidPilots\n  PaidPilots --> ProductionPortfolios\n  ProductionPortfolios --> ProjectExpansion\n  ProductionPortfolios --> Revenue\n  ProjectExpansion --> Revenue\n  Revenue --> GrossProfit\n  GrossProfit --> Cash\n"
modelSanity:
- checkName: 收入引擎
  finding: 基准情形下，收入来自 Q4Y3 的 6 个付费贷款方账户；随着 2 次第二项目扩张落地，每个账户的混合年收入会从试点期的 $180K 抬到 $300K。
- checkName: 必须跑对的事
  finding: 前 3 个付费贷款方试点必须转成可重复的正式工作流，这样公司才能在不提前补齐完整销售团队的前提下，让 ARPU 往上扩。
- checkName: 模型失效的条件
  finding: 如果扩张卡住、本地部署又始终定制化，下行情形下到 Q4Y3 手里只剩大约 $0.2M 现金，公司就得更早启动融资。
- checkName: 下一轮融资凭证
  finding: 一个站得住的种子轮故事应该是：在这笔 30 个月融资窗口内，做到 5 个正式贷款方账户、6–8 个活跃项目年、2 次第二项目扩张，以及 1 套可复用的本地 VPC 部署模板。
sanityChecks:
  ruleOf40: 第 3 年增长 60.5% + EBITDA 利润率 -15.2% = 45.3%。
  burnMultiple: 第 2 年 burn multiple 约 0.6x：$413.9K 的 EBITDA burn，对上大约 $685K 的净新增 ARR（从第 1 年末约 $540K 的 exit ARR 增到第 2 年约 $1225K）。
  revenuePerFte: 按 7 FTE 计算，第 3 年期末每个 FTE 对应收入约 $228.5K（垂直 SaaS 的粗略基准：$200K-$400K）。
  flags:
  - 基准情形仍押注一个非常小的 GCC 贷款方买家池，所以只要错过一簇关键账户，模型就会被明显拉动。
  - 收入假设依赖第 3 年后段的混合 ARPU 通过第二项目或第二条业务条线扩张走到 BP 区间上沿，而不是只靠新客户增长。
  - 在补完安全岗位后，团队规模就不再扩，所以只要导入往重服务滑，实施产能就会不够，毛利率也会承压。
  - 公司到第 3 年仍是 EBITDA 亏损，因此管理层必须在它完全自我造血前，就提前启动种子轮融资流程。
