scenarios:
  downside:
    description: One pilot fails to convert, local deployment work stays heavier than planned, and the company exits Y3 with only 5 paying lender accounts.
    y3RevenueK: 1159.6
    y3EbitdaK: -586.2
    cashLowPointK: 193.5
    keyAssumptionChanges:
    - Net paying accounts end at 3 in Y1, 4 in Y2, and 5 in Y3 instead of 3, 5, and 6.
    - Blended annual revenue per active account tops out at $260K instead of $300K because second-project expansion lands later.
    - Gross margin settles at 67% instead of the 70% target because local-VPC deployment and data normalization remain more custom.
  base:
    description: Three paid design partners convert into referenceable lender workflows, expansion lands inside the first production accounts, and the company exits Y3 with 6 paying accounts.
    y3RevenueK: 1599.7
    y3EbitdaK: -243.5
    cashLowPointK: 738.0
    keyAssumptionChanges:
    - Net paying accounts follow A6 and end at 3 in Y1, 5 in Y2, and 6 in Y3.
    - Blended annual revenue per active account follows A4 and rises from $180K in the pilot phase to $300K by late Y3.
    - Gross margin holds at the 70% plan target because onboarding remains narrow and deployment stays local-VPC rather than bespoke on-prem.
  upside:
    description: Partner-led trust-building pulls conversions forward, two expansions happen earlier, and the company exits Y3 with 8 paying accounts at slightly better margin.
    y3RevenueK: 1977.2
    y3EbitdaK: 60.3
    cashLowPointK: 1122.7
    keyAssumptionChanges:
    - Net paying accounts end at 3 in Y1, 6 in Y2, and 8 in Y3 because the first partner-sourced pilots land earlier.
    - Blended annual revenue per active account reaches $300K sooner as benchmark reporting and second-project expansion arrive before Q4Y3.
    - Gross margin improves to 72% because local deployment and evidence ingestion become more templated across lenders.
sensitivity:
- variable: ARPU
  downsideCase: Late-Y3 blended ARPU stalls around $255K as second-project expansion under-delivers.
  baseCase: Blended ARPU reaches about $285K across Y3 and $300K in late-year steady state.
  upsideCase: Benchmark reporting and second-project expansion pull blended ARPU above $300K.
  y3RevenueImpactK: -160.0
  cashImpactK: -115.0
- variable: CAC
  downsideCase: CAC rises to roughly $150K because every sale stays founder-led and direct.
  baseCase: CAC stays near $125K as partner introductions start helping by Y2.
  upsideCase: CAC falls toward $100K once referenceable engineers and advisers feed the pipeline.
  y3RevenueImpactK: 0.0
  cashImpactK: -150.0
- variable: churn
  downsideCase: Monthly churn rises to 3.0% because projects complete without desk-level expansion.
  baseCase: Monthly churn holds around 2.0% because the product stays embedded in live lender workflows.
  upsideCase: Monthly churn improves to 1.5% as benchmark and watchlist features raise switching costs.
  y3RevenueImpactK: -120.0
  cashImpactK: -90.0
- variable: sales cycle
  downsideCase: Security review and data-sharing approvals add roughly one quarter to each paid conversion.
  baseCase: The first paid pilot lands in month 5 and later accounts convert on the A6 timetable.
  upsideCase: Partner proof compresses diligence and pulls one production conversion into H1Y2.
  y3RevenueImpactK: -260.0
  cashImpactK: -180.0
- variable: gross margin
  downsideCase: Gross margin settles at 67% because deployment and artifact cleanup stay services-heavy.
  baseCase: Gross margin holds at the 70% plan target.
  upsideCase: Gross margin reaches 72% once deployment and evidence ingestion are standardized.
  y3RevenueImpactK: 0.0
  cashImpactK: -85.0
- variable: hiring pace
  downsideCase: An extra implementation or security hire is pulled forward before repeatability is proven.
  baseCase: Headcount follows A9 and stays flat after the security hire.
  upsideCase: One noncritical hire is deferred until after the seed round.
  y3RevenueImpactK: 0.0
  cashImpactK: -130.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      TargetLenders --> PaidPilots
      PaidPilots --> ProductionPortfolios
      ProductionPortfolios --> ProjectExpansion
      ProductionPortfolios --> Revenue
      ProjectExpansion --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
- checkName: Revenue engine
  finding: Base-case revenue comes from 6 paying lender accounts by Q4Y3, with blended annual revenue per account rising from $180K in pilots to $300K as two second-project expansions land.
- checkName: Must go right
  finding: The first three paid lender pilots must convert into repeatable production workflows so ARPU expands without adding a full sales team before seed.
- checkName: Model breaks if
  finding: If expansion stalls and local deployment stays custom, the downside case leaves only about $0.2M of cash by Q4Y3 and forces an earlier raise.
- checkName: Next-round proof
  finding: A credible seed story is 5 production lender accounts, 6-8 active project-years under monitoring, two second-project expansions, and a reusable local-VPC deployment pattern reached inside the 30-month raise.
sanityChecks:
  ruleOf40: Y3 growth 60.5% + EBITDA margin -15.2% = 45.3%.
  burnMultiple: 'Y2 burn multiple is ~0.6x: $413.9K EBITDA burn against roughly $685K of net new ARR (from about $540K exit ARR in Y1 to about $1225K in Y2).'
  revenuePerFte: '$228.5K Y3 revenue per end-of-year FTE on 7 FTE (rough vertical SaaS benchmark: $200K-$400K).'
  flags:
  - The base case still depends on a very small GCC lender buyer universe, so one missed cluster of accounts can move the model materially.
  - Revenue assumes blended ARPU reaches the top end of the BP range by late Y3 through second-project or second-desk expansion, not just new-logo growth.
  - Headcount stays flat after the security hire, so any slip toward services-heavy onboarding would require more implementation capacity and pressure gross margin.
  - The company is still EBITDA negative in Y3, so management would need to start the seed process before it is fully self-funding.
