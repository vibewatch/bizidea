slug: datacenter-drawdown-risk-os
date: '2026-07-11'
currency: USD
modelStartMonth: 2026-08
assumptions:
- id: A1
  name: Model start month
  value: 2026-08
  unit: month
  source: '[BP date 2026-07-11] The model starts in the month after the business plan date.'
- id: A2
  name: Opening cash / pre-seed raise
  value: '2.0'
  unit: USDM
  source: '[BP fundingAsk targetFundingRangeUsd $2–4M; BP runwayMonths 18] Base case uses the low end of the stated range and sizes it for a lean 30-month run to the next financing proof point.'
- id: A3
  name: Modeled customer unit
  value: Paying lender account running the drawdown workflow on one monitored portfolio, with second-project or second-desk expansion captured in ARPU before logo count.
  unit: definition
  source: '[BP businessModel.unitOfValue; BP gtm pricing; BP milestones] The economic buyer is a lender team, but revenue expands inside the account as more financed projects are monitored.'
- id: A4
  name: Blended annual revenue per active paying account
  value: M5-M12 $180K; M13-M18 $220K; M19-M24 $245K; M25-M28 $265K; M29-M32 $285K; M33-M36 $300K
  unit: USDK per customer-year
  source: '[Research market.som $180k per active project-year; BP gtm pricing $150k-$300k ARR per lender; BP funnelTargets second-project expansion 50%+] The ramp assumes platform fees and multi-project monitoring lift ARPU toward the top of the plan range by late Y3.'
- id: A5
  name: Target gross margin
  value: '70'
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct 70] Held flat in the base case once the artifact set and deployment pattern are templated.'
- id: A6
  name: Net paying-account ramp
  value: M1-M12 EOP accounts = 0,0,0,0,1,1,1,2,2,2,3,3; Q1Y2 4; Q2Y2 4; Q3Y2 5; Q4Y2 5; Q1Y3 5; Q2Y3 6; Q3Y3 6; Q4Y3 6
  unit: count
  source: '[BP milestones; BP gtm wedge] This pace lands 3 paid design partners in Y1, 5 paying accounts by the end of Y2, and 6 by the end of Y3.'
- id: A7
  name: Expansion inside existing lender accounts
  value: Two of the first five production lenders add a second monitored project or desk by late Y3.
  unit: account expansion
  source: '[BP gtm funnelTargets first production lender -> second project or desk expansion within 12 months 50%+; BP milestones 12-24 months] This expansion drives the ARPU step-up more than raw logo count in Y3.'
- id: A8
  name: Loaded cash compensation by role
  value: CEO founder 120; founding eng 160; implementation lead 110; product lead 130; partnerships lead 130; portfolio risk analyst/customer success 95; security/deployment engineer 145
  unit: USDK per year
  source: '[BP team; startup-finance heuristic for a lean GCC/EMEA enterprise-software team with benefits and payroll tax] Salaries are set below US coastal benchmarks because the plan does not require a large US-based sales force.'
- id: A9
  name: Hiring cadence
  value: M1 CEO founder and founding eng; M3 implementation lead; M5 product lead; M10 partnerships lead; M16 portfolio risk analyst/customer success; M22 security/deployment engineer
  unit: timing
  source: '[BP team startTiming; BP strategicChoices.sequencingRationale] Delivery and trust-building hires come before any scaled commercial expansion.'
- id: A10
  name: Functional payroll allocation
  value: CEO 60% S&M / 40% G&A; founding eng and product lead 100% R&D; implementation lead 60% R&D / 40% G&A; partnerships lead 100% S&M; portfolio risk analyst/customer success 35% S&M / 65% G&A; security/deployment engineer 70% R&D / 30% G&A
  unit: allocation
  source: '[BP team rationales] Used to roll headcount cost into the functional P&L lines.'
- id: A11
  name: Non-payroll operating spend ramp
  value: S&M non-payroll rises from $6K/mo to $16K/mo; R&D tooling/cloud/security rises from $8K/mo to $17K/mo; G&A rises from $5K/mo to $10K/mo
  unit: USDK per month
  source: '[Startup-finance heuristic anchored to BP local VPC deployment, travel-heavy founder sales, security diligence, and partner integration needs.]'
- id: A12
  name: Steady-state CAC
  value: '125'
  unit: USDK per customer
  source: '[BP founder-led outbound plus partner channels; startup-finance heuristic] Conservative lender procurement and design-partner handholding keep CAC in the low six figures until references accumulate.'
- id: A13
  name: Monthly customer churn
  value: '2.0'
  unit: percent
  source: '[BP businessModel expansion levers; startup-finance heuristic] Once embedded in a lender workflow the product should be sticky, but the niche buyer set and project-cycle turnover justify non-trivial churn.'
- id: A14
  name: Cash conversion policy
  value: EBITDA approximates cash movement
  unit: policy
  source: '[Startup-finance heuristic] No debt, capex, tax, or material working-capital swings are modeled at this stage.'
- id: A15
  name: Next-round proof point
  value: Within 30 months reach 5 production lender accounts, 6-8 active project-years under monitoring, 2 second-project or desk expansions, and one repeatable local-VPC deployment pattern
  unit: milestone
  source: '[BP milestones 12-24 months and 24-36 months; BP fundingAsk.useOfFundsSummary] This is the milestone used to size the pre-seed ask with a six-month buffer.'
- id: A16
  name: No scaled Y3 commercial hiring before seed
  value: Headcount stays flat at 7 FTE after the security hire unless the company beats the base case.
  unit: policy
  source: '[BP strategicChoices.sequencingRationale; BP notYet] The plan avoids adding an AE or adjacent-market team before the narrow lender workflow is repeatable.'
