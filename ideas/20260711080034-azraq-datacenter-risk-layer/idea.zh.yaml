differentiator: 顾问卖的是阶段性研究，开发商一侧的工具优化的是选址，通用项目控制软件也只停在进度跟踪。这家公司卡住的是贷款方真正拍板的那一刻：拨款、豁免和契约判断，也就是资本到底动不动。它的护城河来自把实时的延期、劳动力、监管和基础设施信号，映射到已融资园区的真实信贷结果上——这套数据集既不是发起方天然会攒的，也不是顾问天然会攒的。
