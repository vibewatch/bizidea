jobsToBeDone:
- job: 当发起方申请下一笔工程拨款时，帮投资组合风险负责人判断该不该放款，这样贷款方既能把资金放出去，又不会漏掉隐藏的进度滑坡或契约偏离。
  currentAlternative: 独立工程师报告和基于表格的拨款检查清单
  successMetric: 从收到发起方资料包到作出放行、暂缓或豁免决定的小时数
- job: 当多个园区同时在建时，帮基础设施融资团队排出哪些贷款最该先介入，这样他们能提前拦住本可避免的延期、豁免或重组。
  currentAlternative: 季度投资组合复盘和手工观察名单
  successMetric: 在下一次计划中的贷款方审查前，提前识别出重大项目风险变化所需的时间
