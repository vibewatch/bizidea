topRisks:
- name: 信任与责任
  description: 贷款方可能不愿让软件左右多百万美元级设施的建设拨款决定。
  mitigation: 先从“证据挂钩的建议层”做起：保留人工签字、审计日志，并和现有工程师流程做并排对照。
- name: 数据新鲜度缺口
  description: 在部分 GCC 司法辖区或交易对手那里，许可、供电交付和劳动力信号可能零散、滞后。
  mitigation: 先从沙特和阿联酋起步，只接可重复的数据源；对外展示置信度和缺失数据告警，而不是把不确定性藏起来。
- name: 现有渠道冲突
  description: 独立工程师和项目控制厂商，可能会抵触一款威胁到它们在贷款方汇报里角色的产品。
  mitigation: 把它们定位成数据与复核伙伴：前端仍吃进它们认证过的输入，只是帮它们生成面向贷款方的工作流，也顺手为它们创造新的监控收入。
