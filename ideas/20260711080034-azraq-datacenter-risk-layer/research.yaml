  validationPlan:
  - priority: high
    question: What share of Saudi and UAE campus construction is actually third-party debt funded rather than balance-sheet financed?
    evidenceToGather: Interview five regional banks, two private-credit funds, and two developer CFO teams; map live drawdown workflows by project.
  - priority: high
    question: Which engineer, utility, and sponsor artifacts are structured enough to automate without a heavy services layer?
    evidenceToGather: Collect ten recent draw packages and classify every data field by source, format, and refresh cadence.
  - priority: medium
    question: Will GCC lenders require local VPC or on-prem deployment to satisfy data-residency and cybersecurity reviews?
    evidenceToGather: Run security diligence with two design partners and log mandatory controls, hosting constraints, and approval timelines.
  - priority: medium
    question: Can the company partner with independent engineers rather than being perceived as billable-work displacement?
    evidenceToGather: Test a co-branded pilot where engineer observations feed startup-generated exception memos and compare turnaround time with the incumbent process.
