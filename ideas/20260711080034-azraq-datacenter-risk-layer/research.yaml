competitors:
- name: Azraq
  stage: seed
  wedge: AI-powered data-centre asset and portfolio risk layer spanning market, environmental, infrastructure, labour, regulatory, and covenant factors.
  pricing: Not public.
  strength: Direct lender-grade positioning and finance-oriented outputs such as covenant-breach probability.
  weaknessVsUs: Still early; public positioning is broader risk intelligence, not obviously embedded in monthly drawdown and waiver operations.
  sourceRefs:
  - 1
  - 2
- name: BankStride
  stage: scale-up
  wedge: Horizontal covenant tracking, loan documentation, and construction draw workflow automation for banks and private lenders.
  pricing: Not public.
  strength: Fits lender compliance, checklist, and audit-trail workflows.
  weaknessVsUs: Generic to commercial lending; lacks data-centre-specific engineering, power, and connectivity models.
  sourceRefs:
  - 19
  - 20
- name: Buildots
  stage: scale-up
  wedge: Site-progress intelligence and predictive delay analytics for data-centre construction owners and delivery teams.
  pricing: Not public.
  strength: Real schedule and MEP visibility on live builds.
  weaknessVsUs: Built for sponsor and owner execution rather than lender covenant and disbursement decisions.
  sourceRefs:
  - 21
  - 22
  - 23
- name: nPlan
  stage: scale-up
  wedge: AI schedule forecasting and project-assurance dashboards trained on large historical project-programme datasets.
  pricing: Not public.
  strength: Strong delay-forecasting and project-controls credibility.
  weaknessVsUs: Schedule-centric and horizontal; still needs lender workflow, document, and asset-specific risk packaging.
  sourceRefs:
  - 24
  - 25
  - 26
- name: Hillmann Consulting
  stage: incumbent
  wedge: Independent construction loan monitoring, site observation, draw review, and disbursement services.
  pricing: Services-based / custom.
  strength: Trusted, audit-ready, and aligned with existing lender processes.
  weaknessVsUs: Labour-intensive and episodic; knowledge compounds less cleanly into software benchmarks across portfolios.
  sourceRefs:
  - 17
  - 18
