openQuestions:
- What share of Saudi and UAE data-centre construction is actually third-party debt funded rather than sponsor financed?
- Which engineer, utility, and sponsor artifacts are structured enough to automate without a heavy services layer?
- How often do draw holds or waivers stem from power-delivery, labour, or permit drift rather than pure budget variance?
- Will GCC lenders insist on local VPC or on-prem deployment, and how much does that slow procurement?
