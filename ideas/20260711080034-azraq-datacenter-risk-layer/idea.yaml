topRisks:
  - name: "Trust and liability"
    description: >-
      Lenders may hesitate to let software influence construction disbursements on multimillion-dollar facilities.
    mitigation: >-
      Start as an evidence-linked recommendation layer with human sign-off, audit logs, and side-by-side comparison against incumbent engineer workflows.
  - name: "Data freshness gaps"
    description: >-
      Permitting, power-delivery, and labour signals may be patchy or delayed in some GCC jurisdictions or counterparties.
    mitigation: >-
      Launch in Saudi Arabia and the UAE first, integrate only repeatable data sources, and expose confidence levels plus missing-data alerts instead of hiding uncertainty.
  - name: "Incumbent channel conflict"
    description: >-
      Independent engineers and project-controls vendors could resist a product that threatens their role in lender reporting.
    mitigation: >-
      Position them as data and review partners, generating lender-facing workflows that still incorporate their certified inputs and create new monitoring revenue for them.
