problem: >-
  GCC banks and infra-debt funds are approving first-wave data-centre construction loans, but once a campus is financed they still monitor progress through sponsor updates, independent engineer reports, and covenant spreadsheets. That leaves lenders blind to labour shortages, power-delivery slippage, permitting drift, or environmental issues until the next static report lands, even though the sources say a one-month delay on a 60MW facility can cost about $14.2 million in lost revenue. The result is slow drawdown approvals, reactive waivers, and avoidable downside in an asset class that is supposed to behave like disciplined infrastructure credit.
targetUser:
  primary: >-
    Portfolio monitoring director or project-finance risk lead at a GCC bank or infra-debt fund managing construction loans for 20-120MW data-centre campuses
  secondary: >-
    Project controls or finance lead at a GCC data-centre developer who must satisfy multiple lender reporting packages after financial close
  buyer: >-
    Head of infrastructure finance or portfolio risk at a GCC lender with live data-centre construction exposure
startupThesis:
  nonObviousInsight: >-
    The new pain is not only winning underwriting faster; it is keeping already-approved construction debt safe between close and each drawdown. Once delay losses are measurable in eight figures and risk factors change weekly, the most valuable workflow is continuous lender surveillance, not another prettier diligence memo.
  beachhead: >-
    Drawdown approval and covenant monitoring for GCC banks and infra-debt funds with 3-15 live loans into 20-120MW hyperscale or colocation campuses, where monthly disbursements still depend on consultant reports and sponsor spreadsheets.
  wedge: >-
    A lender workbench that ingests sponsor updates, independent engineer output, and external infrastructure-risk signals to score drawdown readiness, flag covenant drift, and auto-build exception memos before each disbursement.
  whyNowCatalyst: >-
    Azraq's funding plus cited evidence that 57 percent of projects slipped and that a one-month delay on a 60MW campus can cost $14.2 million show data-centre lenders now have a quantified reason to replace static review with continuous monitoring.
  ventureScalePath: >-
    Start with GCC data-centre construction debt, then expand the same monitoring and risk-benchmark layer into global digital infrastructure, project-finance insurers, warehouse lenders, and adjacent assets such as substations, batteries, and industrial campuses.
solution: >-
  The product is a post-close risk operating system for data-centre lenders. It connects sponsor schedules, lender covenants, engineer reports, utility and permitting updates, labour and infrastructure signals, and market-demand assumptions into one deal graph, then produces a live drawdown-readiness score for every project. Instead of waiting for a quarterly PDF, portfolio teams get exception alerts when schedule float, power-delivery milestones, or regulatory conditions move outside approved thresholds, along with an evidence-backed waiver or hold memo. The first workflow is monthly construction disbursement approval; the second is portfolio watchlisting across multiple live campuses. Over time, the company builds a proprietary dataset linking early risk drift to delays, waivers, restructurings, and recoveries across digital-infrastructure loans.
goToMarketSeed:
  firstCustomer: >-
    Portfolio risk head at a GCC commercial bank or private-credit lender with 3-10 live Saudi or UAE data-centre construction loans and recurring monthly drawdown approvals
  buyingTrigger: >-
    A sponsor requests the next construction disbursement while schedule, labour availability, power-delivery timing, or permitting assumptions have changed since the last independent engineer report.
  currentAlternative: >-
    Independent engineer reports, sponsor progress decks, consultant diligence updates, covenant spreadsheets, and email-based waiver approval workflows.
  switchingReason: >-
    The wedge gives lenders a faster, auditable yes-hold-waive decision before each drawdown, reducing manual reconciliation and surfacing delay risk before it becomes a surprise credit event.
  pricingHypothesis: >-
    Annual subscription per lending team plus per-active-project monitoring fees priced by committed debt or MW under construction.
