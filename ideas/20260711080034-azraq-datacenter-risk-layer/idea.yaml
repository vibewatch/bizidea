differentiator: >-
  Consultants sell episodic studies, sponsor-side developer tools optimize site selection, and generic project-controls software stops at schedule tracking. This company owns the lender's moment of truth: the drawdown, waiver, and covenant decision that decides whether capital moves. Its moat grows from mapping live slippage, labour, regulatory, and infrastructure signals to actual credit outcomes across financed campuses, a dataset neither sponsors nor consultants naturally accumulate.
