scenarios:
  downside:
    description: Slower insurer adoption keeps production adds muted, contracts land nearer the middle of the pricing band, and calibration labor drags gross margin.
    y3RevenueK: 1460.0
    y3EbitdaK: -560.0
    cashLowPointK: 180.0
    keyAssumptionChanges:
      - Annual revenue per workflow falls to about $100K.
      - New workflow adds slip to roughly 1-2 per quarter in Y3.
      - Gross margin tops out around 68% because human review stays in the loop longer.
  base:
    description: The company converts a few insurer references into steady workflow expansion while holding pricing in the upper half of the planned production band.
    y3RevenueK: 1990.0
    y3EbitdaK: -213.2
    cashLowPointK: 803.77
    keyAssumptionChanges:
      - Annual revenue per workflow stays at $120K.
      - New workflow adds follow 2,2,2,2 in Y2 and 2,2,3,3 in Y3.
      - Gross margin rises from 60% in early pilots to 72% in Y3.
  upside:
    description: Design-partner success drives faster partner referrals, more expansion inside each carrier, and cleaner unit economics by the second year.
    y3RevenueK: 2640.0
    y3EbitdaK: 120.0
    cashLowPointK: 1040.0
    keyAssumptionChanges:
      - Annual revenue per workflow reaches about $135K through larger production scopes.
      - Workflow adds accelerate to roughly 3-4 per quarter in Y3.
      - Gross margin improves to 74% as calibration labor and storage costs normalize.
sensitivity:
  - variable: ARPU
    downsideCase: "$100K annual revenue per workflow"
    baseCase: "$120K annual revenue per workflow"
    upsideCase: "$135K annual revenue per workflow"
    y3RevenueImpactK: -365.0
    cashImpactK: -255.0
  - variable: CAC
    downsideCase: "$75K CAC because pilots take more founder time and more security work"
    baseCase: "$60.1K CAC"
    upsideCase: "$48K CAC via partner-sourced opportunities"
    y3RevenueImpactK: -110.0
    cashImpactK: -255.0
  - variable: churn
    downsideCase: 3.5% monthly churn after first contract terms end
    baseCase: 2.5% monthly churn
    upsideCase: 1.5% monthly churn
    y3RevenueImpactK: -145.0
    cashImpactK: -120.0
  - variable: sales cycle
    downsideCase: 9-month pilot-to-production cycle
    baseCase: 6-7 month blended cycle
    upsideCase: 4-5 month cycle with partner warm intros
    y3RevenueImpactK: -290.0
    cashImpactK: -315.0
  - variable: gross margin
    downsideCase: 68% steady-state gross margin
    baseCase: 72% steady-state gross margin
    upsideCase: 74% steady-state gross margin
    y3RevenueImpactK: 0.0
    cashImpactK: -145.0
  - variable: hiring pace
    downsideCase: Add GTM and CS one to two quarters ahead of revenue proof
    baseCase: Hire only after production proof points
    upsideCase: Delay one non-critical GTM hire until workflow count exceeds 15
    y3RevenueImpactK: -70.0
    cashImpactK: -190.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Prospects --> Pilots
      Pilots --> PaidWorkflows
      PaidWorkflows --> UsageAndWorkflowFees
      UsageAndWorkflowFees --> GrossProfit
      GrossProfit --> OperatingCash
modelSanity:
  - checkName: Revenue engine
    finding: The base case grows from 4 paid workflows at the end of Y1 to 22 by Q4Y3, with $120K blended annual revenue per workflow doing most of the revenue work.
  - checkName: Must go right
    finding: Security review and pilot conversion must stay tight enough for the team to keep landing roughly two new paid workflows per quarter before the Y3 acceleration.
  - checkName: Model breaks if
    finding: If contracts settle closer to $100K and gross margin stalls near 68%, downside cash falls toward roughly $180K before the company proves the next round case.
  - checkName: Next-round proof
    finding: The next financing is justified if the company exits Y2 with 12 paid workflows, >70% gross margin, and credible intra-account expansion beyond the first FNOL deployment.
sanityChecks:
  ruleOf40: Y3 growth 99.0% + EBITDA margin -10.71% = 88.29%
  burnMultiple: Y2 burn multiple 0.57x, improving to 0.18x in Y3 on net new ARR.
  revenuePerFte: "$181K Y3 on 11 exit FTE (benchmark $200-400K SaaS)"
  flags:
    - Revenue per exit FTE is still a bit below classic SaaS benchmarks because customer-cloud deployment, calibration, and compliance support remain labor intensive through Y3.
    - The model depends on holding pricing near the upper half of the BP production band; if insurers buy closer to $75K-$100K per workflow, the path to near-breakeven slips materially.
    - Gross margin only clears the BP target after Y1 because the model assumes manual review and storage overhead decline as rulebooks stabilize.
    - Cash low point occurs at the end of the modeled period, so a one-to-two quarter delay in pilot conversion would likely pull fundraising forward.
