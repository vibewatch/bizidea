scenarios:
  downside:
    description: 保险公司采用更慢，生产转化更弱，合同价格落在价格带中段，且校准所需人工把毛利率拖住。
    y3RevenueK: 1460.0
    y3EbitdaK: -560.0
    cashLowPointK: 180.0
    keyAssumptionChanges:
    - 每个工作流的年收入降到约 $100K。
    - Y3 新增工作流放缓到每季度约 1-2 个。
    - 由于人工复核留在环路里更久，毛利率只能爬到约 68%。
  base:
    description: 公司把少数保险客户背书转成稳定扩张，同时把价格守在既定生产价格带的上半区。
    y3RevenueK: 1990.0
    y3EbitdaK: -213.2
    cashLowPointK: 803.77
    keyAssumptionChanges:
    - 每个工作流年收入维持在 $120K。
    - 新增工作流按 Y2 的 2,2,2,2 和 Y3 的 2,2,3,3 节奏推进。
    - 毛利率从早期试点的 60% 提升到 Y3 的 72%。
  upside:
    description: 共创客户 成功更顺利，带来更快的伙伴推荐、单一保险账户内更深扩张，以及第 2 年更干净的单位经济模型。
    y3RevenueK: 2640.0
    y3EbitdaK: 120.0
    cashLowPointK: 1040.0
    keyAssumptionChanges:
    - 凭借更大的生产范围，每个工作流年收入抬升到约 $135K。
    - Y3 新增工作流加速到每季度约 3-4 个。
    - 随着校准人工和存储成本回归常态，毛利率提升到 74%。
