  downsideCase: 在收入验证前提前 1-2 个季度补 GTM 和 CS
  baseCase: 只在生产验证点跑出后才招聘
  upsideCase: 把一名非关键 GTM 招聘延后到工作流数超过 15 之后
  y3RevenueImpactK: -70.0
  cashImpactK: -190.0
modelDiagram:
  title: 单位经济模型流转
  mermaid: |
    flowchart LR
      Prospects --> Pilots
      Pilots --> PaidWorkflows
      PaidWorkflows --> UsageAndWorkflowFees
      UsageAndWorkflowFees --> GrossProfit
      GrossProfit --> OperatingCash
modelSanity:
- checkName: 收入引擎
  finding: 基准情形下，付费工作流从 Y1 末的 4 个涨到 Q4Y3 的 22 个，核心收入主要由每个工作流 $120K 的混合年收入拉动。
- checkName: 必须跑顺的事
  finding: 安全审查和试点转生产必须足够紧，团队才能在 Y3 加速前稳定做到每季度约 2 个新增付费工作流。
- checkName: 模型会在哪种情况下失真
  finding: 如果合同价格更接近 $100K、毛利率又卡在 68% 左右，公司在证明下一轮融资前，最差现金会压到约 $180K。
- checkName: 下一轮融资证明
  finding: 只要公司在 Y2 末做到 12 个付费工作流、毛利率 >70%，并证明首个 FNOL 部署后能在账户内继续扩张，就足以支撑下一轮融资。
sanityChecks:
  ruleOf40: Y3 增长率 99.0% + EBITDA 利润率 -10.71% = 88.29%
  burnMultiple: Y2 burn multiple 为 0.57x，按净新增 ARR 计算，Y3 改善到 0.18x。
  revenuePerFte: Y3 退出时 11 名 FTE 对应 $181K/FTE（经典 SaaS 基准为 $200-400K）
  flags:
  - 退出时的人均收入仍略低于经典 SaaS 基准，因为客户云部署、校准和合规支持在 Y3 之前都还是重人力。
  - 模型高度依赖价格能守在 BP 生产价格带的上半区；如果保险公司更愿意按每个工作流 $75K-$100K 购买，接近盈亏平衡的时间点会明显后移。
  - 模型要到 Y1 之后才能超过 BP 目标毛利率，因为前期仍假设人工复核和存储开销会随着 rulebook 稳定而逐步下降。
  - 最低现金点出现在建模期末，所以若试点转生产再晚 1-2 个季度，融资动作大概率要提前。
