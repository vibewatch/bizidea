  downsideCase: 试点到生产要 9 个月
  baseCase: 混合周期 6-7 个月
  upsideCase: 借伙伴暖介绍把周期压到 4-5 个月
  y3RevenueImpactK: -290.0
  cashImpactK: -315.0
- variable: 毛利率
  downsideCase: 稳定期毛利率 68%
  baseCase: 稳定期毛利率 72%
  upsideCase: 稳定期毛利率 74%
  y3RevenueImpactK: 0.0
  cashImpactK: -145.0
