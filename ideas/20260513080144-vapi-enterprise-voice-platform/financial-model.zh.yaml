  y3RevenueImpactK: -365.0
  cashImpactK: -255.0
- variable: CAC
  downsideCase: CAC 为 $75K，因为试点更吃创始人时间，也需要更多安全工作
  baseCase: CAC 为 $60.1K
  upsideCase: 通过伙伴带来的机会把 CAC 压到 $48K
  y3RevenueImpactK: -110.0
  cashImpactK: -255.0
- variable: 流失率
  downsideCase: 首轮合同结束后月流失率 3.5%
  baseCase: 月流失率 2.5%
  upsideCase: 月流失率 1.5%
  y3RevenueImpactK: -145.0
  cashImpactK: -120.0
