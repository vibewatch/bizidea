  adoptionFrictionMatrix:
  - friction: Security review over recordings and transcripts
    severity: high
    affectedBuyer: Compliance and security leaders
    mitigation: Offer customer-controlled retention, export, and deployment choices tied to existing platform logs and storage controls.
