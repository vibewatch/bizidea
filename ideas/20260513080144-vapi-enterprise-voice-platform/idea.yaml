problem: >-
  Enterprises deploying AI voice agents via Vapi, Retell, or Bland AI are
  routing millions of calls through systems with no equivalent of software
  observability. Legacy call-center QA vendors sample 1–2% of calls manually
  and score human agents on soft-skills rubrics they cannot apply to LLM-generated
  responses. Regulated industries — insurance, healthcare, fintech — face audit
  exposure on every AI call that fails to read a required disclosure or misroutes
  an escalation, yet no purpose-built compliance monitoring layer exists for AI
  voice agents. Compliance teams discover failures only after a customer complaint
  or regulatory inquiry surfaces them.
targetUser:
  primary: "VP of CX Automation or Head of Contact Center Operations at a US property-and-casualty insurance company (500–5,000 seat call center) that has deployed or is deploying AI voice agents for claims first-notice-of-loss or policy renewal calls"
  secondary: "Compliance officer or QA team lead responsible for call recording and state insurance department audit readiness at the same firm"
  buyer: "Chief Compliance Officer or VP of Operations who owns audit risk and call center technology budget"
startupThesis:
  nonObviousInsight: >-
    Enterprises treat AI voice QA as a call-center problem solvable by existing
    WFM vendors like NICE or Verint, but those platforms were built to evaluate
    human agents against soft-skills rubrics. They cannot score AI agents against
    dynamic LLM outputs, detect prompt drift, or trace which model version
    produced a given call outcome. A purpose-built observability layer for AI
    voice agents is a new product category that incumbent call-center vendors
    cannot enter without rebuilding their scoring engines from scratch — creating
    a two-to-three year window for a specialist to own the space.
  beachhead: "US P&C insurance companies (regional carriers and MGAs under $2B DWP) with live Vapi or Retell deployments handling FNOL claims intake calls, who must demonstrate TCPA compliance and state-mandated script adherence on 100% of recorded calls"
  wedge: "Automated script-adherence scoring and TCPA-compliant audit-trail export for AI agent calls in insurance claims intake workflows"
  whyNowCatalyst: >-
    Vapi's 1B-call milestone and Amazon Ring's zero-to-100% inbound migration
    in two weeks show that enterprise AI voice adoption is now outpacing the
    capacity of any manual QA process, making compliance exposure acute in the
    first half of 2026.
  ventureScalePath: >-
    Win P&C insurance FNOL compliance as the beachhead, then expand playbook
    coverage to healthcare scheduling and fintech collections — the three
    regulated verticals Vapi names as its strongest traction sectors. Layer in
    real-time escalation routing and agent performance benchmarking to become
    the standard AI voice ops platform for regulated enterprises globally,
    targeting the $2B+ US contact center QA market and its international analog.
solution: >-
  A compliance operations platform that ingests 100% of AI voice agent call
  audio and metadata from Vapi, Retell, and Bland AI via native API integrations,
  then scores each call against configurable regulatory playbooks using LLM-native
  evaluation — checking script adherence, required-disclosure delivery, escalation
  routing, and consent capture. Every call generates a timestamped audit record
  exportable to insurance department or TCPA audit formats. Real-time alerts
  fire when the AI agent deviates from a mandatory script segment or fails to
  escalate a distressed caller. A drift dashboard surfaces model-level degradation
  across call cohorts so compliance and engineering teams can act before a
  regulatory trigger occurs.
goToMarketSeed:
  firstCustomer: "Head of CX Automation at a US regional P&C insurer or MGA (under $2B DWP) running Vapi for FNOL intake at 5,000–50,000 calls per month, where the same person owns both the AI deployment and the compliance reporting obligation"
  buyingTrigger: "A state insurance department audit request or internal legal review that exposes inability to produce a compliant call record for a specific AI agent interaction"
  currentAlternative: "Manual QA team sampling 1–2% of call recordings scored in spreadsheets, or retrofitting a sales conversation intelligence tool like Gong or Chorus that has no insurance-regulation playbooks"
  switchingReason: >-
    100% call coverage with automated disclosure-adherence scoring and
    one-click TCPA audit exports replaces a 1–2% manual sample, eliminating
    regulatory exposure at roughly one-tenth the labor cost per call reviewed.
  pricingHypothesis: "Per-call consumption pricing at $0.008–$0.015 per scored call, with a compliance module add-on at $2,000–$5,000 per month per active workflow, targeting $50K–$200K ARR per insurer in year one"
