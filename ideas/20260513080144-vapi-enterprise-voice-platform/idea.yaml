ideaScorecard:
  signalStrength:
    score: 4
    rationale: "1B calls processed, 10x ARR growth, named enterprise customers including Amazon Ring and New York Life — production-scale evidence that voice AI is mission-critical; score is 4 not 5 because Vapi's own funding is the primary signal rather than a broad multi-company trend."
  painIntensity:
    score: 5
    rationale: "Regulated enterprises face existential audit risk on every non-compliant AI voice call; the pain is not inconvenience but potential regulatory fines, license risk, and class-action exposure under TCPA and state insurance codes."
  wedgeClarity:
    score: 5
    rationale: "TCPA script-adherence audit trails for P&C insurance FNOL AI calls is a crisp, verifiable workflow with a specific buyer, a clear compliance trigger, and a measurable output — a timestamped exportable audit record."
  defensibility:
    score: 3
    rationale: "Vapi could build this natively; NICE and Verint could expand into AI scoring; moat must be earned through regulatory playbook depth, audit-history switching costs, and multi-platform coverage before incumbents react."
  ventureScale:
    score: 4
    rationale: "US contact center QA market is roughly $2B; adding global regulated industries with AI voice penetration and the escalating compliance burden across insurance, healthcare, and fintech creates a $10B+ addressable opportunity over five years."
topRisks:
  - name: "Platform vertical integration"
    description: "Vapi, Retell, or Bland AI add built-in governance and compliance modules as they spend their Series B capital on monitoring tooling, commoditizing the core wedge."
    mitigation: "Launch multi-platform from day one; build deep regulatory playbook IP (insurance, HIPAA, FDCPA) that no infrastructure vendor will invest in for a niche vertical; position as the compliance layer on top of any voice platform, not a Vapi-only tool."
  - name: "Slow regulated sales cycles"
    description: "Insurance compliance buyers have 6–18 month procurement processes requiring security reviews, legal sign-off, and procurement committees that can stall revenue traction before product-market fit is confirmed."
    mitigation: "Target MGAs and regional carriers under $2B DWP where the CX Automation head is also the compliance decision-maker; offer a time-boxed 30-day free pilot scoped to one call flow with zero data-egress requirements."
  - name: "Audio data privacy and sovereignty"
    description: "Accessing full call audio for LLM scoring triggers HIPAA, TCPA, and state insurance data-handling obligations, and enterprise legal teams may block any third-party processor from touching call recordings."
    mitigation: "Deploy as a bring-your-own-cloud model where call audio never leaves the customer's own cloud tenant; obtain SOC 2 Type II and HIPAA BAA certification in year one; offer on-premises scoring as a premium tier for the most restrictive buyers."
