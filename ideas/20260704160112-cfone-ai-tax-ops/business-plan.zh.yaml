slug: approval-only-tax-workbench
date: '2026-07-04'
executiveSummary: >-
  服务数百家自营中小企业的日本法人税务师事务所，面对的是一个反复出现的审核产能问题，而不只是一个记账软件问题：发票制度和电子账簿保存规则让每份客户档案的证据留存和可审计要求都上了一个台阶，而持牌审核人员的时间却始终稀缺。这家公司卖的是一套审核杠杆工作台，卡在记账系统和持牌税理士审核人员之间，把账目、文件和反复出现的咨询线索，变成带明确证据链接和客户审批环节的申报材料包。首个滩头市场刻意做窄：30-100
  人的法人税务师事务所，拥有 500 家以上零售、餐饮、诊所和本地服务类中小企业客户，这些客户已经数字化收集记录，且在结账和申报季感受到积压。购买触发点和产品定价高度契合：审核人员流失、申报季积压，或是不想多招资深税务专才就扩张的计划，都会催生预算和紧迫感。研究测算显示日本首发市场的 TAM 约为 4120 万美元，实际可触达的 SAM 约为 1000 万美元，模型测算的第 3 年 SOM 约为 90 万美元——这是一个锋利的入场切口，而不是一个自成体系的完整规模级市场。因此公司必须把自己定位成叠加在 freee、Money Forward 和文件工作流之上的审核控制层，而不是又一个中小企业记账前端或自动申报机器人。研究中仍有两个关键缺口没有解决：5146 家 CPTA 法人里到底有多少真正符合目标画像，以及审核人员的工时里有多少仍花在重建证据上，而不是做税务判断。由于信任、合规和上手风险仍是主要约束，合理的融资姿态是一轮 Pre-seed，规模足以验证 2-3
  个付费试点，并证明可重复的百万日元级别年度合同价值，之后再考虑更广泛的工作流扩张。

problem:
  - >-
    发票制度和电子账簿保存规则，把中小企业税务准备变成一套反复出现的证据管理工作流，但大多数事务所每个周期仍要在记账工具、邮件、
    Excel 和申报准备之间重建客户背景。
  - >-
    真正的约束是持牌审核人员的吞吐量：当资深审核人员把时间花在重建记录和重复答复上，事务所就没法在不按比例增聘专才的情况下新增中小企业客户。
  - >-
    现有的记账套件和记账自动化工具能减少数据录入，但它们并不掌控咨询记忆、申报材料包组装，以及跨客户档案的审核异常路由。

solution:
  - >-
    接入 freee 或 Money Forward 的记账数据、客户文件和既往咨询背景，整合进一个统一工作区，组装出证据可追溯到底层记录的申报就绪材料包。
  - >-
    起草常见税务问题的答案和申报口径，只把有歧义或高风险的项目转给持牌审核人员，强制人工审批并保留完整修改记录。
  - >-
    给事务所提供品牌化的客户审批门户，以及关于异常率、审核修改和处理周期的事务所层面分析，帮助他们把审核人力的使用标准化。

whyWeWin:
  - >-
    产品围绕日本的持牌审核边界设计，符合人工签字的法律和信任要求，而不是要求事务所相信自动化能完全取代税务执业。
  - >-
    freee、Money Forward 和 e-Tax 已经开放了足够的开发者接口，让现在就搭建一层工作流成为可行，而现有厂商仍未做到跨客户的审核控制层。
  - >-
    每一条经审核批准的答复、异常和申报材料包，都会变成事务所专属的决策记忆，不断改进未来的草稿并抬高转换成本。
  - >-
    从已经数字化就绪的法人事务所切入，比直接卖给中小企业更快出证据，因为买家、用户和信任关口都在同一个事务所里，能立刻衡量审核吞吐量。

strategicChoices:
  beachhead: >-
    30-100 名员工、500 家以上中小企业客户、资深审核人员编制不大的日本法人税务师事务所，尤其是已经通过 freee、Money Forward
    或标准化文件收集数字化传送记录的零售、餐饮、诊所和本地服务类客户所在事务所。
  wedgeRationale: >-
    这个细分市场有可衡量的审核瓶颈、季节性紧迫感和重复出现的客户档案工作流，一个审核团队加一批 75-150 名客户就能在一个季节内证明吞吐量。一个面向中小企业自助的税务 App 或整套办公软件替代方案，会引入多个买家和更高的信任风险——在公司还没有证据证明审核人员愿意接受这套工作流之前，这样做代价太大。
  sequencingRationale: >-
    优先搭建审核队列、证据图谱和 freee/Money Forward 连接器，因为这些是证明能在真实客户档案上省时间的最小必要能力。在组建规模化销售团队之前先招聘实施和客户成功人力，因为前 3-5 家事务所更需要工作流设计、安全审查和策略配置，而不是外呼量。等核心申报季试点持续提升审核吞吐量、上手时间稳定在六周以内之后，再补上传统系统对接、渠道合作和相邻工作流。
  notYet:
    - 直接面向中小企业自助的税务软件
    - 替代 TKC、MJS 或 JDL 环境的完整税务事务所 ERP
    - 没有持牌人工审批的自动税务建议或申报
    - 在核心审核队列得到验证之前涉足工资、放贷和银行嵌入式工作流

market:
  tam: "4120 万美元（研究测算：5146 家 CPTA 法人 × 每家约 8000 美元的年度平台支出，并与公开的日本记账软件价格锚点交叉核对）"
  sam: "1000 万美元（研究测算：约 1000 家已法人化、数字化就绪、多团队的事务所，符合 200-1500 名客户的滩头画像）"
  som: "90 万美元第 3 年（研究测算：75 个可触达的客户 × 通过直销和生态转介实现的约 12000 美元混合 ACV）"
  segments:
    - 在数字化记账系统上服务自营中小企业的日本法人税务师事务所
    - 想在各地团队之间统一审核工作流的多分支顾问事务所
  buyingProcess: >-
    通常由运营负责人、COO 或主管合伙人在审核人员流失、申报积压或客户增长目标暴露出硬性产能上限时发起。持牌审核人员、安全审查人员和实施负责人随后验证信任、数据处理和技术栈契合度；第一份合同最可信的形式，是在一个审核团队和一批客户群上做的季节性试点。

product:
  mvp: >-
    一个人机协同的审核工作区，服务已数字化收集材料的中小企业客户档案：从 freee 或 Money Forward 拉取账目数据，组装带证据链接的申报材料包，起草重复咨询的答案，并把异常路由给持牌审核人员。MVP 刻意限定在一个审核小组和一批范围较窄的客户群，而不是一整套办公操作系统。
  sixMonth: >-
    上线 freee 和 Money Forward 连接器、带证据链接的异常队列、审核修改追踪和客户审批门户，随后运行 2-3 个各覆盖 75-150 份客户档案的付费试点。
  twelveMonth: >-
    增加事务所策略库、跨客户群的审核分析，以及对混合传统系统的导出支持，让产品能从一个分支或审核小组扩展到整个事务所部署。
  twentyFourMonth: >-
    在现有账户内上线相邻工作流模块，从消费税或年终材料包准备等密切相关的咨询和申报工作量开始，同时保留同一套审核控制层和证据图谱。
  keyBets:
    - >-
      审核人员会信任带明确证据链接的草稿材料包，愿意从空白档案审核转向只审异常。
    - >-
      freee 和 Money Forward 的覆盖面足以拿下前 3-5 家事务所，不需要先做深度的传统系统原生支持。
    - >-
      一个试点客户群能在一个季节内看到每位审核人员处理的客户档案至少提升 20%，或准备时间至少下降 30%。
    - >-
      策略库和审核反馈数据会让上手更可复制，并支撑毛利率维持在 70% 以上。

gtm:
  wedge: >-
    把"审核就绪的申报材料包和异常路由"卖给已经在用数字化账目、却仍靠一小群持牌审核人员清理结账和申报工作的法人税务师事务所；第一个证明点是一个申报周期内每位审核人员处理的中小企业客户档案数量增加。
  channels:
    - 创始人直销，面向法人 CPTA 事务所的主管合伙人、COO 和运营负责人
    - 通过 freee 和 Money Forward 顾问网络及集成伙伴实现生态转介
    - 已经看到高积压事务所的文件数字化和记账外包伙伴转介
  funnelTargets: "目标事务所 → 合格试点 20-30%；合格试点 → 付费季节性试点 40-50%；付费试点 → 年度正式合同 60%+；首个分支 → 第二分支或客户群扩张 50%+"
  pricing: >-
    按事务所或审核小组收取年度平台订阅费，外加按活跃客户收取的月费，以及年度申报或分析高级模块。这与已研究出的价格锚点相符——
    入门级记账工具本就已被付费使用，把产品定位成一个由审核杠杆而非通用 AI 坐席许可证支撑的百万日元级事务所预算项目。

businessModel:
  revenueStreams:
    - 按事务所或审核小组收取的年度平台订阅费
    - 按活跃客户收取的月度工作流费用
    - 高级年度申报材料包和审核分析模块
    - 面向新分支或新技术栈的上手与工作流配置费
  unitOfValue: 在签约事务所内通过审核工作流管理的活跃中小企业客户档案
  targetGrossMarginPct: 70
  expansionLevers:
    - 从一个审核小组或分支扩展到整个事务所
    - 在同一客户内新增相邻的申报和咨询工作流
    - 向上销售分析、对标和溢出审核支持模块

strategyMap:
  northStarMetric: 每位持牌审核人员每月清理到客户审批环节的中小企业客户档案数
  inputMetrics:
    - 每份客户档案花费的审核人员分钟数
    - 起草建议未经实质性重写就被采纳的比例
    - 数字化就绪试点客户群的异常率
    - 从收到记录到客户审批所需的天数
    - 试点转正式合同的转化率
    - 新分支或新事务所的平均上手时间
  moatsToBuild:
    - 事务所专属的审核批准税务决策、打法手册和异常模式库
    - 连接文件、账目活动、审核修改和最终申报的跨系统证据图谱
    - 跨中小企业常见工作流的审核吞吐量和异常模式对标数据集
  killCriteria:
    - 在与 40 家以上目标事务所沟通后，第 12 个月仍不足 3 个付费试点
    - 试点客户群未能把每位审核人员处理的客户档案提升至少 20%，也未能把每份档案的准备时间降低至少 30%
    - 数字化就绪试点客户群中，超过 25% 的档案仍需人工重建，原因是源数据质量或集成不足
  mermaid: |
    flowchart LR
      Wedge[Incorporated tax-firm reviewer backlog] --> MVP[Reviewer queue plus evidence-linked filing packet MVP]
      MVP --> Proof[Higher reviewer throughput and faster client approval]
      Proof --> Expansion[Practice-wide rollout and adjacent tax workflows]

investorMemo:
  verdict:
    call: "观察"
    conviction: "真实的痛点加上一个逻辑自洽的工作流切口，但信心仍然有限，直到公司在真实事务所中证明足够多的目标客户和可衡量的审核工时节省。"
    whyBelieve: "监管层面的数字化推进、审核人力稀缺，以及现有厂商在咨询记忆和异常路由上的空白，都为一个审核杠杆控制层提供了可信的现实理由。"
    whyDoubt: "初始买家池有限，现有记账套件已经掌控了大部分工作流入口，研究也还没证明到底能回收多少审核时间。"
    nextDiligence: "在为更广泛的扩张下注之前，先拿到基线审核工时数据，并在一个数字化就绪的客户群里跑出一个至少提升 20% 吞吐量的付费试点。"
  firstCustomer:
    title: 日本法人税务师事务所的 COO 或主管合伙人
    profile: >-
      一家 30-100 人的事务所，拥有 500 家以上自营中小企业客户，记录已数字化收集，且有一支不大的资深审核人员团队处理大多数咨询和申报。
    trigger: >-
      申报季积压、审核人员流失，或是不想多招持牌专才就扩张客户的计划，让当前的人工准备方式在经济上难以为继。
    buyer: 主管合伙人或 COO
    initialContract: >-
      一份约 80 万-150 万日元的付费季节性试点，覆盖一个审核小组和 75-150 份活跃客户档案，一旦吞吐量和信任指标得到验证，转为约 200 万-400 万日元的年化订阅加按客户收费。
  mustBeTrue:
    - 5146 家 CPTA 法人中，有足够比例符合 500+ 客户、数字化就绪、多审核人员的画像，能支撑高效的获客渠道建设。
    - 目标事务所的审核工时仍主要花在证据重建和重复答复起草上，而不是不可压缩的税务判断工作。
    - freee 和 Money Forward 的集成能覆盖大多数可触达的早期试点，不需要替换记录系统。
    - 一个试点能在一个申报季内，把每位审核人员处理的客户档案提升至少 20%，或把每份档案的准备时间降低至少 30%。
    - 一旦工作流证明了审核杠杆和可信的人工控制，主管合伙人会把试点转成百万日元级别的年度支出。
  diligenceQuestions:
    - 按客户数、员工规模和数字化技术栈就绪度，到底有多少法人事务所真正符合目标画像？
    - 三家指定的目标事务所目前每份档案的基线审核工时、修改率和申报周期分别是多少？
    - 前 20 个潜在客户中，哪种已安装的技术栈占主导，每个连接器或导出路径要花多久部署？
    - 目标事务所在向工作流分享纳税人数据之前，需要哪些 APPI、境内处理和客户同意方面的管控？
    - freee、Money Forward 或 CFOne 多快能加入审核路由功能，从而压缩这个独立切口？

operatingAssumptions:
  - assumption: 有足够多的 CPTA 法人符合目标画像，可以支撑一套聚焦的直销打法。
    basis: research.yaml
    validationTest: 建立并筛选至少 150 家法人事务所的名单，再通过访谈或公开资料确认其中至少 40 家符合 500+ 客户和数字化就绪的标准。
    decisionImpact: 如果符合条件的事务所太少，滩头市场就必须收窄到紧迫感更高的子细分，或在地理和工作流上扩大范围。
  - assumption: 审核产能压力主要来自重建证据和重复咨询背景，而不是判断本身。
    basis: research.yaml
    validationTest: 在三家试点事务所里，跨一次月结和一次申报周期做时间动作基线研究，按重建、起草和判断分别统计审核工时。
    decisionImpact: 如果判断类工作才是大头，产品承诺就必须从吞吐量杠杆转向文档、分析或人力支持。
  - assumption: freee 和 Money Forward 的覆盖面足以支撑第一年的试点。
    basis: research.yaml
    validationTest: 在拓客阶段梳理前 20 家目标事务所的记账技术栈，确认至少 60% 能通过 freee、Money Forward 或简单导出服务。
    decisionImpact: 如果传统系统占主导，路线图就必须提前纳入 TKC、MJS 或 JDL 的互操作，并接受更慢的实施周期。
  - assumption: 只要数据保持可审计、人工审批和可运营管控，事务所就会批准在 AI 辅助工作流中使用纳税人数据。
    basis: research.yaml
    validationTest: 在第一个正式试点之前，完成一次涵盖 APPI 处理、审计日志和模型路由管控的法律顾问评审和一次客户安全审查。
    decisionImpact: 如果客户要求比计划更严格的管控，部署成本会上升，市场打法也可能需要转向拥有安全预算的更大型事务所。
  - assumption: 只要定价与审核吞吐量提升挂钩而不是笼统的自动化宣称，百万日元级别的年度定价就是可以接受的。
    basis: operator judgment
    validationTest: 向前五家共创客户提供试点转正式的定价，衡量至少两家能否在目标 ACV 区间内转化。
    decisionImpact: 如果只有大幅降价才能转化，公司就必须简化上手流程、降低服务负担，或重新评估风投规模的经济性。

experimentRoadmap:
  - horizon: "0-90 天"
    experiment: 在三家法人共创客户事务所中做基线审核时间动作研究
    hypothesis: 审核瓶颈主要由证据重建和重复起草驱动，而不是不可压缩的判断工作
    successMetric: 试点客户群中至少 40% 的审核相关工时花在可重建的准备任务上
    owner: 创始人 / 领域负责人
  - horizon: "0-90 天"
    experiment: 建立首份 150 家目标客户名单，并筛选技术栈、客户数量和分支结构的契合度
    hypothesis: 至少 25% 的可触达法人事务所符合数字化就绪、500+ 客户的滩头画像
    successMetric: 识别出 40 家以上符合目标画像、且有指定买家联系人的事务所
    owner: 创始人 / GTM 负责人
  - horizon: "0-90 天"
    experiment: 与一个试点候选一起做纳税人数据处理的安全和法律设计评审
    hypothesis: 人工审批、审计日志和受控模型路由足以通过第一次客户安全审查
    successMetric: 一个共创客户批准试点范围，且不需要根本性不同的部署模式
    owner: 创始人 / 安全顾问
  - horizon: "3-6 个月"
    experiment: 向一个覆盖 75-150 份客户档案的审核小组部署以 freee 为先的 MVP
    hypothesis: 带证据链接的异常队列能在不破坏审核信任的前提下降低准备工作量
    successMetric: 每位审核人员处理的客户档案比基线提升 20% 以上，或每份档案的准备时间下降 30% 以上
    owner: 创始工程师
  - horizon: "6-12 个月"
    experiment: 增加 Money Forward 支持，把另外两家事务所转为付费季节性试点
    hypothesis: 这个切口不是单一事务所的工作流特例，能在主流数字化技术栈上复制
    successMetric: 共计三个付费试点，freee 和 Money Forward 上各至少有一个
    owner: 产品与实施负责人
  - horizon: "9-15 个月"
    experiment: 通过顾问网络、记账外包商或文件接入伙伴测试一条生态转介渠道
    hypothesis: 一旦试点投资回报得到证明，伙伴渠道能降低获客成本
    successMetric: 通过伙伴渠道获得五次合格会面，或一个付费试点
    owner: 创始人 / GTM 负责人

operations:
  - 跟踪 NTA e-Tax、发票制度和电子记录规则的变化，在每个申报季前更新审核打法手册
  - 为每份客户档案维护可审计的文件接入、可检索的证据留存和审核修改日志
  - 每周运行一次审核反馈循环，把被采纳的修改变成事务所策略规则和异常模板
  - 为 freee、Money Forward 和文件收集的上手流程使用标准化实施手册，把新部署周期控制在六周以内
  - 提供申报季支持和升级路径，避免试点事务所把产品当成一个实验性的边缘工具

team:
  - role: 创始人/CEO
    startTiming: 第 0 个月
    rationale: 必须直接向主管合伙人销售，把税务师事务所的痛点转化为工作流设计，并主导早期共创客户关系。
  - role: 创始工程师
    startTiming: 第 0 个月
    rationale: 搭建决定试点速度和信任度的审核工作区、证据图谱，以及首批 freee 或 Money Forward 集成。
  - role: 应用 AI 与工作流工程师
    startTiming: 第 1 个月
    rationale: 把审核修改和事务所规则，转化为安全的起草、异常路由和策略库功能。
  - role: 实施与客户成功负责人
    startTiming: 第 3 个月
    rationale: 早期客户需要的是高触达的上手流程、客户群筛选、培训和 KPI 衡量，而不是规模化的销售覆盖。
  - role: 安全与合规顾问
    startTiming: 第 0 个月
    rationale: 客户是否批准取决于站得住脚的纳税人数据处理、可审计性，以及从第一天起就清晰的人机协同管控。
  - role: 客户经理
    startTiming: 第 9 个月
    rationale: 只有在前两个试点证明了可重复的投资回报、买家话术和上手范围之后，才增加专职销售人力。

milestones:
  - horizon: "0-12 个月"
    items:
      - 在东京或近畿地区签下 3 个数字化就绪法人事务所的付费试点，建立审核吞吐量基线指标
      - 上线 freee 和 Money Forward 支持、带证据链接的审核队列，以及面向一个重复出现的中小企业工作流的客户审批门户
      - 在 2 个试点客户群中证明每位审核人员处理的客户档案提升至少 20%，或每份档案的准备时间降低至少 30%
      - 把至少 2 个试点转为年度正式合同，并把上手时间控制在六周以内
  - horizon: "12-24 个月"
    items:
      - 从小组级试点扩展到 5-10 家事务所的整所部署
      - 增加策略库、对标分析，以及针对混合传统系统的导出型支持
      - 在现有账户内上线一个相邻的申报或咨询工作流，并锁定一个生态转介伙伴
  - horizon: "24-36 个月"
    items:
      - 通过多分支扩张打法达到 20-30 家正式部署事务所，并证明可重复的百万日元级 ACV
      - 建立覆盖常见中小企业税务工作流的可防御审核决策数据集，并展示来自增值模块的净收入扩张
      - 根据现有客户的扩张拉力，决定是拓展到更广泛的税务运营工作流，还是转向嵌入式渠道

risks:
  - risk: 审核人员可能不够信任草稿材料包，不愿从人工审核转向只审异常。
    likelihood: High
    impact: High
    mitigation: 先从范围较窄的客户群做起，在每条建议背后展示证据，并以实测的采纳率和修改率提升作为扩张的门槛。
  - risk: 客户文件混乱和记账质量不佳，可能让上手变得过于依赖人工服务。
    likelihood: High
    impact: High
    mitigation: 先只面向数字化就绪的事务所，限定 MVP 的证据集范围，并在试点启动前要求完成上手就绪检查。
  - risk: freee、Money Forward 或 CFOne 可能加入类似的审核路由功能，压缩这个切口。
    likelihood: Medium
    impact: High
    mitigation: 靠跨技术栈的审核控制层、事务所专属的策略记忆，以及更快接入混合工作流的实施速度取胜，而不是做一个通用记账界面。
  - risk: 目标客户池可能太小或增长太慢，无法支撑高效的获客扩张。
    likelihood: Medium
    impact: High
    mitigation: 尽早验证目标契合密度，先集中在都市圈，只有转化数据证明合理性之后才组建规模化销售团队。
  - risk: APPI 或客户数据治理要求可能比计划更严格，需要更严的部署管控。
    likelihood: Medium
    impact: High
    mitigation: 从第一个试点开始就设计可审计路由和最小数据暴露，并做客户安全审查，而不是事后再补管控。

fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: 搭建 2-3 个实施密集型付费试点所需的 freee 和 Money Forward 集成、证据图谱、审核工作流和安全管控；资助首批实施和客户成功岗位；在启动面向更广泛工作流扩张的种子轮之前，先做到可重复的百万日元级年度合同。
