topRisks:
  - name: Reviewer trust liability
    description: If senior reviewers do not trust the drafted advice and filing packets, the product collapses back into manual checking and loses its economic edge.
    mitigation: Launch with explicit evidence links on every recommendation, keep human sign-off mandatory, and prove reduced edit rates on narrowly scoped early cohorts.
  - name: Messy source data
    description: Inconsistent client documents and bookkeeping hygiene could make onboarding expensive and cause too many false exceptions.
    mitigation: Start with firms that already collect records digitally, standardize ingestion around common document types, and gate expansion on measured exception rates.
  - name: Channel resistance
    description: Tax-accounting firms may fear that automation vendors will eventually bypass them and sell directly to SMB clients.
    mitigation: Position the product as reviewer-leverage infrastructure, preserve firm branding in the client approval flow, and make practice-level throughput gains the core ROI story.
