jobsToBeDone:
  - job: When a senior reviewer is buried in SMB filing prep, help the firm's ops team turn each client into a reviewer-ready packet, so they can add clients without proportional specialist hiring.
    currentAlternative: Junior staff manually assemble records across bookkeeping tools, email, and spreadsheets before partner review
    successMetric: More active SMB clients cleared per licensed reviewer per month
  - job: When a business owner asks repeat tax questions during close or filing season, help the reviewer answer with the right context instantly, so they can resolve advice requests without reopening the entire file.
    currentAlternative: Searching prior emails, notes, and ledger exports to reconstruct the client's situation
    successMetric: Faster consultation turnaround and lower rework per advice or filing case
