problem: >-
  Japanese small businesses rarely have in-house tax staff, so bookkeeping, advisory questions, and filing work spill into
  outside tax-accounting firms that already run on thin reviewer capacity. The same client context gets re-created across
  ledgers, email consultations, document requests, and filing prep, which makes each new SMB client feel like a headcount
  problem instead of a software problem. When expert tax advice is scarce, the bottleneck is not generating a draft return;
  it is compressing the licensed reviewer time needed to turn messy client records into an answer a business owner can
  confidently approve.
targetUser:
  primary: >-
    Operations lead or managing partner at a Japanese bookkeeping and tax-accounting firm serving hundreds of owner-operated
    SMBs without internal finance teams
  secondary: Senior licensed reviewer responsible for signing off client advice and final filings
  buyer: Managing partner or COO of a multi-team tax-accounting practice
startupThesis:
  nonObviousInsight: >-
    The winner is not another SMB bookkeeping app or tax chatbot. The real wedge is a reviewer-leverage layer for firms
    that already own client trust, because once bookkeeping, consultation, and filing are treated as one approval chain,
    software can eliminate most clerical preparation while reserving scarce expert time for judgment calls.
  beachhead: >-
    Japanese bookkeeping and licensed tax-accounting firms serving 200-1500 owner-operated retail, restaurant, clinic, and
    local-services SMBs that already send records digitally but still depend on partner or senior-reviewer sign-off for tax
    consultations and filings
  wedge: >-
    An approval-only consultation-and-filing workbench that ingests client books and documents, drafts recurring tax
    answers and filing positions, and routes only ambiguous or high-risk items to a licensed reviewer before client
    approval
  whyNowCatalyst: >-
    CFOne's funded approval-only workflow shows that end-to-end tax-ops automation is becoming credible just as triage
    identifies adviser scarcity as the forcing function that makes reviewer-leverage software urgent.
  ventureScalePath: >-
    Start by helping tax-accounting firms serve more SMB clients per reviewer, then expand into direct SMB close workflows,
    payroll and consumption-tax operations, lender-ready financial packages, and embedded tax-ops infrastructure for banks,
    payroll platforms, and vertical SaaS products serving small businesses.
solution: >-
  The product sits between the firm's bookkeeping stack and the licensed reviewer, turning fragmented client records into a
  single consultation-to-filing workspace. It continuously assembles the evidence behind each tax position, drafts answers
  to repeat client questions, and builds filing-ready packets with explicit provenance back to the underlying documents and
  ledger movements. Reviewers see an exception queue instead of a blank file, so they spend time on the minority of items
  that require judgment rather than on clerical reconstruction. SMB clients receive a clean approval portal that explains
  what changed, what needs confirmation, and what will be filed. The first release focuses on firms already serving
  hundreds of owner-managed SMBs, because they can measure value quickly in reviewer throughput, faster close cycles, and
  fewer missed consultations.
goToMarketSeed:
  firstCustomer: >-
    A 30-100 person Japanese bookkeeping and tax-accounting firm with 500+ owner-operated SMB clients in retail,
    restaurants, clinics, and local services, where a small senior-reviewer bench clears most consultations and filings
  buyingTrigger: >-
    Senior reviewer attrition, filing-season backlog, or a push to add new SMB clients without hiring more tax specialists
    creates budget and urgency
  currentAlternative: >-
    Cloud bookkeeping software, spreadsheets, email-based client consultations, document chasing by junior staff, and
    manual sign-off by licensed tax accountants
  switchingReason: >-
    The workbench preserves the firm's existing client relationships and review authority while replacing repetitive prep
    work with an approval-only queue that is faster to trust than a fully autonomous filing bot
  pricingHypothesis: >-
    Platform subscription per firm plus per-active-client monthly fees, with premium pricing for annual filing packets,
    reviewer analytics, and outsourced overflow-review modules
