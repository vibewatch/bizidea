slug: approval-only-tax-workbench
date: '2026-07-04'
currency: USD
modelStartMonth: 2026-08
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-08
  unit: 月
  source: '[BP date 2026-07-04]；模型假设 Pre-seed 在计划日期次月完成交割。'
- id: A2
  name: M1 期初现金
  value: '2000'
  unit: USDK
  source: '[BP fundingAsk targetFundingRangeUsd $2-4M]；基准情形采用区间下限。'
- id: A3
  name: M1 期初付费事务所数量
  value: '0'
  unit: 数量
  source: '[BP milestones 0-12 months] 首批付费试点是近期里程碑，而不是现有基础。'
- id: A4
  name: 每个活跃事务所的混合年收入
  value: '34.0'
  unit: USDK
  source: '[BP gtm pricing; BP investorMemo initialContract; Research willingnessToPay] 综合了平台订阅费、按活跃客户收费，以及适度的模块/上手收入。'
- id: A5
  name: 第一年每月新增付费事务所数
  value: '[0, 0, 1, 0, 1, 0, 0, 1, 0, 0, 0, 0]'
  unit: 数量
  source: '[BP product sixMonth; BP milestones 0-12 months] 创始人主导的打法在第一年拿下三个付费试点。'
- id: A6
  name: 第二年每季度新增付费事务所数
  value: '[1,2,2,2]'
  unit: 数量
  source: '[BP milestones 12-24 months] 从试点扩展到第二年末的 5-10 家事务所落地。'
- id: A7
  name: 第三年每季度新增付费事务所数
  value: '[3,4,4,4]'
  unit: 数量
  source: '[BP milestones 24-36 months] 通过小组到整所的扩张和伙伴转介，达到 20-30 家正式部署事务所。'
- id: A8
  name: 新增客户的收入确认方式
  value: 落地当月按整月收入的 50% 确认
  unit: 公式
  source: '创业公司财务经验法则：新签 B2B 账户通常在月中上线，因此收入采用期初期末平均活跃客户数（(BoP+EoP)/2）计算。'
- id: A9
  name: 客户留存处理方式
  value: 36 个月经营模型中不设显式客户流失；仅在计算 LTV 时使用 2.0% 的稳态月流失率
  unit: 政策
  source: '[BP investorMemo initialContract] 早期客户是年度、实施密集型合同；这一经验法则让经营模型保持简单，同时长期单位经济模型仍保持保守。'
- id: A10
  name: COGS 占收入比例
  value: 38% M1-M6；32% M7-M12；29% Y2；26% Y3
  unit: 百分比
  source: '[BP targetGrossMarginPct 70; BP keyBets; Research adoptionFrictionMatrix] 随着打法手册成熟，人工证据重建、支持和模型路由成本逐步下降。'
- id: A11
  name: 创始人/CEO 含附加成本薪酬
  value: '84.0'
  unit: 千美元/年/FTE
  source: '创业公司财务经验法则：日本种子期垂直 SaaS 创始人拿低于市场水平但现金支付的薪酬。'
- id: A12
  name: 工程含附加成本薪酬
  value: '100.0'
  unit: 千美元/年/FTE
  source: '创业公司财务经验法则：日本种子期应用软件工程师薪酬，含薪资负担。'
- id: A13
  name: 实施/客户成功含附加成本薪酬
  value: '72.0'
  unit: 千美元/年/FTE
  source: '创业公司财务经验法则：日本实施密集型 B2B SaaS 运营岗位薪酬，含薪资负担。'
- id: A14
  name: 销售/GTM 含附加成本薪酬
  value: '90.0'
  unit: 千美元/年/FTE
  source: '创业公司财务经验法则：面向高信任门槛的日本工作流销售的早期客户经理招聘薪酬。'
- id: A15
  name: 安全与合规覆盖
  value: 外部顾问的常年顾问费计入 G&A，一直持续到 Y3
  unit: 人力配置
  source: '[BP team security and compliance advisor] 计划中在招聘全职合规人员之前先由顾问提供支持。'
- id: A16
  name: 非人力运营支出爬坡
  value: R&D 每月 3/4/4/5K，S&M 每月 2/3/4/5K，G&A 每月 4/5/5/6K，分别对应 Y1H1/Y1H2/Y2/Y3
  unit: 千美元/月
  source: '创业公司财务经验法则，参考实施密集型日本 SaaS 公司在云/LLM 支出、伙伴差旅、法务和安全审查方面的需求设定。'
- id: A17
  name: 第二年招聘提速
  value: 在 Q2Y2 增加第三名工程师，在 Q3Y2 增加第二名实施负责人
  unit: 人力事件
  source: '[BP sequencingRationale; BP team] 在规模化销售之前先补充实施产能。'
- id: A18
  name: 第三年招聘提速
  value: 在可重复的试点转正式验证完成后，于 Q2Y3 增加第二名 GTM 代表
  unit: 人力事件
  source: '[BP team account executive; BP milestones 24-36 months] 销售招聘要滞后于验证和参考客户。'
- id: A19
  name: 混合 CAC
  value: '16.2'
  unit: 千美元/客户
  source: '按模型中第二至第三年的销售薪酬加 35.55 万美元的 GTM 项目支出，除以 22 家新增事务所计算得出；不含实施人力成本。'
- id: A20
  name: 融资额规模测算规则
  value: 24 个月里程碑加 6 个月缓冲
  unit: 政策
  source: '开发者指示；[BP fundingAsk runwayMonths 18] 与里程碑时间点共同指向一个保守的 30 个月规划周期。'
