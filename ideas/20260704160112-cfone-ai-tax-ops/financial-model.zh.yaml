scenarios:
  downside:
    description: 伙伴渠道拓客更慢，混合合同价值贴近试点转正式的下限，服务负担也让毛利率低于计划。
    y3RevenueK: 360.0
    y3EbitdaK: -625.5
    cashLowPointK: 317.05
    keyAssumptionChanges:
    - 每个活跃事务所的混合年收入降至 3 万美元
    - 第二、三年新增明显放缓，第三年末活跃事务所停滞在 16 家
    - 第三年毛利率只达到 70%
  base:
    description: 第一年的三个付费试点转化为有节奏的小组到整所落地，上手打法手册把第三年毛利率提升到 70% 出头。
    y3RevenueK: 573.75
    y3EbitdaK: -452.93
    cashLowPointK: 535.96
    keyAssumptionChanges:
    - 每个活跃事务所的混合年收入维持在 3.4 万美元
    - 新增客户按第二年 [1,2,2,2]、第三年 [3,4,4,4] 的节奏推进
    - 毛利率从第一年上半年的 62% 提升到第三年的 74%
  upside:
    description: 参考客户和生态转介带来更多整所级别的签约，自动化也比计划更快地降低人工实施负担。
    y3RevenueK: 752.08
    y3EbitdaK: -305.92
    cashLowPointK: 736.42
    keyAssumptionChanges:
    - 每个活跃事务所的混合年收入升至 3.8 万美元
    - 靠更快的伙伴主导扩张，第三年末活跃事务所达到 30 家
    - 第三年毛利率达到 76%
sensitivity:
- variable: ARPU
  downsideCase: 每个活跃事务所的混合年收入 3 万美元
  baseCase: 每个活跃事务所的混合年收入 3.4 万美元
  upsideCase: 每个活跃事务所的混合年收入 3.8 万美元
  y3RevenueImpactK: -67.5
  cashImpactK: -72.1
- variable: CAC
  downsideCase: 如果建立信任仍主要靠创始人，CAC 为 2.2 万美元
  baseCase: CAC 为 1.62 万美元
  upsideCase: 借助生态转介，CAC 降至 1.2 万美元
  y3RevenueImpactK: 0.0
  cashImpactK: -130.0
- variable: 流失率
  downsideCase: 年度试点续约后月流失率为 3.0%
  baseCase: 月流失率为 2.0%
  upsideCase: 月流失率为 1.0%
  y3RevenueImpactK: -106.3
  cashImpactK: -83.7
- variable: 销售周期
  downsideCase: 平均周期 9 个月，损失一个季度的扩张
  baseCase: 混合周期约 6 个月
  upsideCase: 借助转介和收窄的试点范围，周期缩短到 4-5 个月
  y3RevenueImpactK: -147.3
  cashImpactK: -135.2
- variable: 毛利率
  downsideCase: 稳态毛利率 70%
  baseCase: 稳态毛利率 74%
  upsideCase: 稳态毛利率 76%
  y3RevenueImpactK: 0.0
  cashImpactK: -27.1
- variable: 招聘节奏
  downsideCase: 在需求得到验证之前，就提前招入第三名工程师和第二名 GTM 代表
  baseCase: 按模型中的招聘计划执行
  upsideCase: 招聘卡在里程碑上，验证出现之前始终控制支出
  y3RevenueImpactK: 0.0
  cashImpactK: -185.5
modelDiagram:
  title: 单位经济模型流程
  mermaid: |
    flowchart LR
      TargetFirms --> PaidPilots
      PaidPilots --> ProductionFirms
      ProductionFirms --> SubscriptionAndUsageRevenue
      SubscriptionAndUsageRevenue --> GrossProfit
      GrossProfit --> OperatingCash
modelSanity:
- checkName: 收入引擎
  finding: 基准情形下，第三年收入达到 57.375 万美元——从第一年的 3 家付费事务所，增长到第三年的 25 家活跃事务所，混合年合同价值 3.4 万美元。
- checkName: 必须做对的事
  finding: 实施必须控制在六周以内，公司才能在不组建庞大服务团队的情况下，把三个试点在第二年末转化为 8-10 家正式部署事务所。
- checkName: 模型失效条件
  finding: 如果合同价值降到 3 万美元附近，第三年活跃事务所停滞在 16 家左右，下行情形会把第三年收入压缩到 36 万美元，几乎没有余地应对种子轮的延迟。
- checkName: 下轮融资验证点
  finding: 一旦公司展示出 8-10 家正式部署事务所、超过 70% 的毛利率，以及从付费试点到百万日元级年度合同的可重复转化，下一轮融资就站得住脚。
sanityChecks:
  ruleOf40: 第三年增速 175.51% + EBITDA 利润率 -78.94% = 96.57%
  burnMultiple: 第二年燃烧乘数 2.37 倍，第三年随净新增 ARR 改善到 0.89 倍。
  revenuePerFte: 以第三年末 8 名全职员工计，第三年人均收入约 7.2 万美元（SaaS 基准区间为 20 万-40 万美元；数值偏低是因为模型在切口阶段仍以实施密集和日本市场优先为主）。
  flags:
  - 人均收入远低于成熟 SaaS 的基准水平，公司需要证明实施工作和审核支持不会随每新增一家事务所而线性增长。
  - 模型刻意假设前 36 个月没有显式客户流失；如果早期试点续约失败，实际现金转化会比基准情形更差。
  - 客户池受限于约 1000 家的实际 SAM，一旦错过第二分支扩张或相邻工作流模块，风投规模的结果会很快见顶。
  - 只有在首批客户群之后，杂乱源数据的重建工作量明显下降，毛利率才能达到 70% 出头；数据质量不佳会把服务负担重新推回 COGS。
