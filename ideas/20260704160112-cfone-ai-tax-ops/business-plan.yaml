slug: approval-only-tax-workbench
date: '2026-07-04'
executiveSummary: >-
  Japanese incorporated tax-accounting firms serving hundreds of owner-operated
  SMBs face a recurring reviewer-capacity problem, not just a bookkeeping
  software problem: invoice and electronic-record rules increased the evidence
  and auditability burden around every client file, while licensed reviewer time
  remains scarce. This company sells a reviewer-leverage workbench that sits
  between bookkeeping systems and the licensed zeirishi reviewer, turning books,
  documents, and recurring consultation threads into reviewer-ready filing
  packets with explicit evidence links and a client approval step. The initial
  beachhead is intentionally narrow: 30-100 person incorporated tax-accounting
  firms with 500+ SMB clients in retail, restaurants, clinics, and local
  services that already collect records digitally and feel backlog during close
  and filing season. The buying trigger is coherent with the product and pricing:
  reviewer attrition, filing-season backlog, or a growth plan that would
  otherwise require more senior tax hires. Research-derived sizing suggests a
  Japan-first TAM of about $41.2M, a practical SAM of about $10.0M, and a
  modeled year-3 SOM of about $0.9M, so this is a sharp entry wedge rather than
  a complete venture-scale market on its own. The company must therefore win as
  a reviewer control plane layered across freee, Money Forward, and document
  workflows, not as another SMB accounting frontend or an autonomous tax bot.
  Two core gaps remain unresolved in the research: how many of the 5,146 CPTA
  corporations actually fit the target profile, and what share of reviewer hours
  is still spent reconstructing evidence rather than making tax judgments.
  Because trust, compliance, and onboarding risk are still the gating factors,
  the right financing posture is a pre-seed round sized to prove 2-3 paid pilots
  and repeatable low-million-yen ACV before broader workflow expansion.

problem:
  - >-
    Invoice-system and electronic-books-preservation rules turned SMB tax prep
    into a recurring evidence-management workflow, but most firms still rebuild
    client context across bookkeeping tools, email, spreadsheets, and filing
    prep every cycle.
  - >-
    The binding constraint is licensed reviewer throughput: when senior
    reviewers spend time reconstructing records and repeat answers, firms cannot
    add SMB clients without proportional specialist hiring.
  - >-
    Incumbent accounting suites and bookkeeping automation tools reduce data
    entry, but they do not own consultation memory, filing-packet assembly, and
    reviewer exception routing across mixed client files.

solution:
  - >-
    Ingest freee or Money Forward accounting data, client documents, and prior
    consultation context into a single workspace that assembles filing-ready
    packets with evidence linked back to underlying records.
  - >-
    Draft recurring tax answers and filing positions, then route only ambiguous
    or high-risk items to a licensed reviewer with mandatory human approval and
    a full edit trail.
  - >-
    Give firms a branded client approval portal and practice-level analytics on
    exception rates, reviewer edits, and cycle time so they can standardize how
    reviewer capacity is used.

whyWeWin:
  - >-
    The product is designed around Japan's licensed-review boundary, so it fits
    the legal and trust requirement for human sign-off instead of asking firms to
    believe in autonomous tax practice replacement.
  - >-
    freee, Money Forward, and e-Tax already expose enough developer surface to
    make a workflow layer feasible now, while incumbents still stop short of a
    cross-client reviewer control plane.
  - >-
    Every reviewer-approved answer, exception, and filing packet becomes
    firm-specific decision memory that improves future drafts and raises
    switching costs.
  - >-
    Starting with digitally ready, incorporated firms produces faster proof than
    selling direct to SMBs because the buyer, user, and trust gate all sit
    inside one practice that can measure reviewer throughput immediately.

strategicChoices:
  beachhead: >-
    Japanese incorporated tax-accounting firms with 30-100 staff, 500+ SMB
    clients, and a small senior-reviewer bench, especially firms serving retail,
    restaurant, clinic, and local-services businesses that already send records
    digitally through freee, Money Forward, or standardized document collection.
  wedgeRationale: >-
    This segment has a measurable reviewer bottleneck, seasonal urgency, and
    repeated client-file workflows, so one reviewer team and one 75-150 client
    cohort can show throughput proof inside a season. A broader SMB self-serve
    tax app or full office-suite replacement would introduce multiple buyers and
    much higher trust risk before the company has any evidence that reviewers
    accept the workflow.
  sequencingRationale: >-
    Build the reviewer queue, evidence graph, and freee/Money Forward connectors
    first because those are the minimum surfaces needed to prove time saved on
    real client files. Hire implementation and customer-success capacity before a
    scaled sales team because the first 3-5 firms will need workflow design,
    security review, and policy configuration more than outbound volume. Add
    legacy-stack coverage, channel partnerships, and adjacent workflows only
    after the core filing-season pilot consistently improves reviewer throughput
    and onboarding stays under six weeks.
  notYet:
    - Direct SMB self-serve tax software
    - Full tax-office ERP replacement for TKC, MJS, or JDL environments
    - Autonomous tax advice or filing without licensed human approval
    - Payroll, lending, and bank-embedded workflows before the core reviewer queue is proven

market:
  tam: "$41.2M (research estimate: 5,146 CPTA corporations × roughly $8k annual platform spend per practice, cross-checked against public Japan accounting-software price anchors)"
  sam: "$10.0M (research estimate: about 1,000 incorporated, digitally ready, multi-team firms that fit the 200-1500 client beachhead)"
  som: "$0.9M year-3 (research estimate: 75 reachable logos × roughly $12k blended ACV through direct sales and ecosystem referrals)"
  segments:
    - Incorporated Japanese tax-accounting firms serving owner-operated SMBs on digital bookkeeping stacks
    - Multi-office advisory firms that want standardized reviewer workflows across local teams
  buyingProcess: >-
    The operations lead, COO, or managing partner usually initiates when
    reviewer attrition, filing backlog, or a client-growth target exposes a hard
    capacity limit. The licensed reviewer, security reviewer, and implementation
    owner then validate trust, data handling, and stack fit; the first contract
    is most credible as a seasonal pilot on one reviewer team and one client
    cohort.

product:
  mvp: >-
    One human-in-the-loop reviewer workspace for digitally collected SMB client
    files that pulls ledger data from freee or Money Forward, assembles an
    evidence-linked filing packet, drafts repeat consultation answers, and
    routes exceptions to a licensed reviewer. The MVP is intentionally limited to
    one reviewer pod and one narrow client cohort rather than a full office
    operating system.
  sixMonth: >-
    Ship freee and Money Forward connectors, an evidence-linked exception queue,
    reviewer edit tracking, and a client approval portal, then run 2-3 paid
    pilots covering 75-150 client files each.
  twelveMonth: >-
    Add practice policy libraries, cross-cohort reviewer analytics, and export
    support for mixed incumbent stacks so the product can expand from one office
    or reviewer pod to practice-wide deployment.
  twentyFourMonth: >-
    Launch adjacent workflow modules inside existing accounts, starting with
    closely related consultation and filing workloads such as consumption-tax or
    year-end packet preparation, while preserving the same reviewer control plane
    and evidence graph.
  keyBets:
    - >-
      Reviewers will trust draft packets with explicit evidence links enough to
      move from blank-file review to exception-only review.
    - >-
      freee and Money Forward coverage will be sufficient to land the first 3-5
      firms before deep native legacy-stack support is required.
    - >-
      A practice can see at least 20% higher client files cleared per reviewer
      or at least 30% lower prep time on a pilot cohort within one season.
    - >-
      Policy libraries and reviewer feedback data will make onboarding more
      repeatable and support gross margins at or above 70%.

gtm:
  wedge: >-
    Sell "reviewer-ready filing packets and exception routing" to incorporated
    tax firms that already run on digital books but still clear close and filing
    work through a small licensed-reviewer bench; the first proof point is more
    SMB client files cleared per reviewer during one filing cycle.
  channels:
    - Founder-led direct sales to managing partners, COOs, and practice operations leads at incorporated CPTA firms
    - Ecosystem referrals through freee and Money Forward advisor networks and integration partners
    - Document-digitization, bookkeeping-outsourcer, and reviewer-network partners that already see high-backlog firms
  funnelTargets: "target firm → qualified pilot 20-30%; qualified pilot → paid seasonal pilot 40-50%; paid pilot → annual production contract 60%+; first office → second office or cohort expansion 50%+"
  pricing: >-
    Annual platform subscription per firm or reviewer pod, plus per-active-client
    monthly fees and premium annual filing or analytics modules. This matches the
    researched price anchor that entry bookkeeping tools are already paid for and
    positions the product as a low-million-yen practice budget justified by
    reviewer leverage, not as a new generic AI seat license.

businessModel:
  revenueStreams:
    - Annual platform subscription by firm or reviewer pod
    - Per-active-client monthly workflow fee
    - Premium annual filing-packet and reviewer-analytics modules
    - Onboarding and workflow-configuration fees for new offices or stacks
  unitOfValue: Active SMB client file managed through the reviewer workflow inside a contracted practice
  targetGrossMarginPct: 70
  expansionLevers:
    - Expand from one reviewer pod or office to the broader practice
    - Add adjacent filing and consultation workflows inside the same customer
    - Upsell analytics, benchmarking, and overflow-review support modules

strategyMap:
  northStarMetric: SMB client files cleared to client approval per licensed reviewer per month
  inputMetrics:
    - Reviewer minutes spent per client file
    - Percentage of drafted recommendations accepted without material rewrite
    - Exception rate across digitally ready pilot cohorts
    - Days from records received to client approval
    - Pilot-to-production conversion rate
    - Average onboarding time for a new firm or office
  moatsToBuild:
    - Firm-specific library of reviewer-approved tax decisions, playbooks, and exception patterns
    - Cross-system evidence graph linking documents, ledger activity, reviewer edits, and final filings
    - Benchmark dataset on reviewer throughput and exception patterns across recurring SMB workflows
  killCriteria:
    - Fewer than 3 paid pilots by month 12 after 40 or more target-firm conversations
    - Pilot cohorts fail to improve client files cleared per reviewer by at least 20% or fail to reduce prep time per file by at least 30% versus baseline
    - More than 25% of files in digitally ready pilot cohorts still require manual reconstruction because source-data hygiene or integrations are too weak
  mermaid: |
    flowchart LR
      Wedge[Incorporated tax-firm reviewer backlog] --> MVP[Reviewer queue plus evidence-linked filing packet MVP]
      MVP --> Proof[Higher reviewer throughput and faster client approval]
      Proof --> Expansion[Practice-wide rollout and adjacent tax workflows]

investorMemo:
  verdict:
    call: "Watch"
    conviction: "Real pain and a coherent workflow wedge, but conviction stays limited until the company proves enough target-fit logos and measurable reviewer-hour savings inside live firms."
    whyBelieve: "Regulatory digitization, reviewer scarcity, and incumbent gaps around consultation memory and exception routing create a credible reason for a reviewer-leverage control plane now."
    whyDoubt: "The initial buyer pool is finite, incumbent accounting suites already control much of the workflow surface, and the research does not yet prove how much reviewer time is actually recoverable."
    nextDiligence: "Get baseline reviewer-hour data and one paid pilot showing at least 20% throughput improvement on a digitally ready client cohort before underwriting broader expansion."
  firstCustomer:
    title: COO or managing partner of an incorporated Japanese tax-accounting firm
    profile: >-
      A 30-100 person practice with 500+ owner-operated SMB clients, digital
      record collection, and a small senior-reviewer bench that clears most
      consultations and filings.
    trigger: >-
      Filing-season backlog, reviewer attrition, or a growth plan to add SMB
      clients without hiring more licensed specialists makes current manual prep
      economically untenable.
    buyer: Managing partner or COO
    initialContract: >-
      A paid seasonal pilot of roughly ¥0.8M-¥1.5M for one reviewer pod and
      75-150 active client files, converting to roughly ¥2M-¥4M annualized
      subscription plus per-client fees once throughput and trust metrics are
      proven.
  mustBeTrue:
    - Enough of the 5,146 CPTA corporations fit the 500+ client, digitally ready, multi-reviewer profile to support efficient pipeline building.
    - Reviewer time in target firms is still dominated by evidence reconstruction and repeat-answer drafting rather than by irreducible tax judgment work.
    - freee and Money Forward integrations cover a majority of reachable early pilots without forcing source-of-record replacement.
    - A pilot can improve client files cleared per reviewer by at least 20% or cut prep time per file by at least 30% within one filing season.
    - Managing partners will convert a pilot into low-million-yen annual spend once the workflow proves reviewer leverage and trusted human control.
  diligenceQuestions:
    - How many incorporated firms actually match the target profile by client count, staff size, and digital-stack readiness?
    - What is the current baseline reviewer time per file, edit rate, and filing-cycle time in three named target firms?
    - Which installed stack mix dominates the first 20 prospects, and how long does each connector or export path take to deploy?
    - What APPI, onshore processing, and customer-consent controls do target firms require before sharing taxpayer data with the workflow?
    - How quickly could freee, Money Forward, or CFOne add reviewer-routing features that narrow the standalone wedge?

operatingAssumptions:
  - assumption: A large enough subset of CPTA corporations matches the target profile for a focused direct-sales motion.
    basis: research.yaml
    validationTest: Build and qualify a list of at least 150 incorporated firms, then confirm by interview or public profile that at least 40 match the 500+ client and digital-readiness criteria.
    decisionImpact: If too few firms qualify, the beachhead must narrow to a higher-urgency subsegment or widen geographically and by workflow.
  - assumption: Reviewer-capacity pain is primarily caused by reconstructing evidence and repeat consultation context.
    basis: research.yaml
    validationTest: Run time-and-motion baselines in three pilot firms across one monthly close and one filing cycle, measuring reviewer hours by reconstruction, drafting, and judgment.
    decisionImpact: If judgment work dominates, the product promise must shift from throughput leverage to documentation, analytics, or staffing support.
  - assumption: freee and Money Forward coverage is sufficient to support the first year of pilots.
    basis: research.yaml
    validationTest: During discovery, map the accounting stack of the first 20 target firms and confirm that at least 60% can be served through freee, Money Forward, or simple exports.
    decisionImpact: If legacy stacks dominate, the roadmap must pull forward TKC, MJS, or JDL interoperability and accept a slower implementation cycle.
  - assumption: Firms will approve taxpayer-data use in an AI-assisted workflow if data stays auditable, human-approved, and operationally controlled.
    basis: research.yaml
    validationTest: Complete one counsel review and one customer security review covering APPI handling, audit logs, and model-routing controls before the first production pilot.
    decisionImpact: If customers require stricter controls than planned, deployment cost rises and the go-to-market may need to shift toward larger firms with security budgets.
  - assumption: Low-million-yen annual pricing is acceptable when tied to reviewer-throughput gains rather than generic automation claims.
    basis: operator judgment
    validationTest: Offer paid pilot-to-production pricing to the first five design partners and measure whether at least two convert at the target ACV band.
    decisionImpact: If conversion only works at much lower ACV, the company must simplify onboarding, reduce service load, or reconsider venture-scale economics.

experimentRoadmap:
  - horizon: "0-90 days"
    experiment: Baseline reviewer time-and-motion study across three incorporated design-partner firms
    hypothesis: Reviewer bottlenecks are driven by evidence reconstruction and repeat drafting, not mainly by irreducible judgment work
    successMetric: At least 40% of reviewer-adjacent hours in pilot cohorts are spent on reconstructable prep tasks
    owner: Founder / domain lead
  - horizon: "0-90 days"
    experiment: Build the first 150-account target list and qualify stack, client-count, and office-structure fit
    hypothesis: At least 25% of reachable incorporated firms fit the digital-ready, 500+ client beachhead
    successMetric: 40 or more target-fit firms identified with named buyer contacts
    owner: Founder / GTM lead
  - horizon: "0-90 days"
    experiment: Security and legal design review on taxpayer-data handling with one pilot candidate
    hypothesis: Human approval, audit logs, and controlled model routing are enough to pass the first customer security review
    successMetric: One design partner approves pilot scope without requiring a fundamentally different deployment model
    owner: Founder / security advisor
  - horizon: "3-6 months"
    experiment: Deploy a freee-first MVP to one reviewer pod covering 75-150 client files
    hypothesis: An evidence-linked exception queue can reduce prep effort without breaking reviewer trust
    successMetric: 20% or better improvement in client files cleared per reviewer or 30% lower prep time per file versus baseline
    owner: Founding engineer
  - horizon: "6-12 months"
    experiment: Add Money Forward support and convert two additional firms into paid seasonal pilots
    hypothesis: The wedge is not a single-firm workflow artifact and can repeat across the dominant digital stacks
    successMetric: Three paid pilots total, with at least one on each of freee and Money Forward
    owner: Product and implementation lead
  - horizon: "9-15 months"
    experiment: Test one ecosystem referral channel through an advisor network, bookkeeping outsourcer, or document-ingestion partner
    hypothesis: Partner-sourced pipeline can lower acquisition cost once pilot ROI is proven
    successMetric: Five qualified meetings or one paid pilot sourced through a partner channel
    owner: Founder / GTM lead

operations:
  - Monitor NTA e-Tax, invoice-system, and electronic-record rule changes and update reviewer playbooks before each filing cycle
  - Maintain auditable document ingestion, searchable evidence retention, and reviewer edit logs for every client file
  - Run a weekly reviewer-feedback loop that turns accepted edits into firm policy rules and exception templates
  - Use a standardized implementation playbook for freee, Money Forward, and document-collection onboarding to keep new deployments under six weeks
  - Provide filing-season support and escalation paths so pilot firms do not treat the product as an experimental side tool

team:
  - role: Founder / CEO
    startTiming: Month 0
    rationale: Must sell directly to managing partners, translate tax-firm pain into workflow design, and own early design-partner relationships.
  - role: Founding eng
    startTiming: Month 0
    rationale: Builds the reviewer workspace, evidence graph, and first freee or Money Forward integrations that determine pilot speed and trust.
  - role: Applied AI and workflow engineer
    startTiming: Month 1
    rationale: Turns reviewer edits and practice rules into safe drafting, exception routing, and policy-library features.
  - role: Implementation and customer success lead
    startTiming: Month 3
    rationale: Early customers need white-glove onboarding, cohort selection, training, and KPI measurement more than scaled sales coverage.
  - role: Security and compliance advisor
    startTiming: Month 0
    rationale: Customer approval depends on defensible taxpayer-data handling, auditability, and clear human-in-the-loop controls from day one.
  - role: Account executive
    startTiming: Month 9
    rationale: Only add dedicated sales capacity after the first two pilots establish repeatable ROI, buyer language, and onboarding scope.

milestones:
  - horizon: "0-12 months"
    items:
      - Sign 3 paid pilots with digitally ready incorporated firms in Tokyo or Kinki and establish baseline reviewer-throughput metrics
      - Ship freee and Money Forward support, evidence-linked reviewer queue, and client approval portal for one recurring SMB workflow
      - Prove at least 20% higher client files cleared per reviewer or at least 30% lower prep time per file in 2 pilot cohorts
      - Convert at least 2 pilots into annual production contracts and keep onboarding under six weeks
  - horizon: "12-24 months"
    items:
      - Expand from pod-level pilots to practice-wide rollouts in 5-10 firms
      - Add policy libraries, benchmark analytics, and export-based support for mixed incumbent stacks
      - Launch one adjacent filing or consultation workflow inside existing accounts and secure one ecosystem referral partner
  - horizon: "24-36 months"
    items:
      - Reach 20-30 production firms with multi-office expansion motion and evidence of repeatable low-million-yen ACV
      - Build a defensible reviewer-decision dataset across recurring SMB tax workflows and demonstrate net revenue expansion from add-on modules
      - Decide whether to widen into broader tax-ops workflows or embedded channels based on expansion pull from existing customers

risks:
  - risk: Reviewers may not trust draft packets enough to move from manual review to exception-only review.
    likelihood: High
    impact: High
    mitigation: Start with narrow cohorts, expose evidence behind every recommendation, and gate scale on measured acceptance and edit-rate improvement.
  - risk: Messy client documents and bookkeeping hygiene could make onboarding too service-heavy.
    likelihood: High
    impact: High
    mitigation: Only target digitally ready firms first, limit the MVP evidence set, and require onboarding readiness checks before pilot launch.
  - risk: freee, Money Forward, or CFOne could add similar reviewer-routing features and compress the wedge.
    likelihood: Medium
    impact: High
    mitigation: Win as a cross-stack reviewer control plane with practice-specific policy memory and faster implementation into mixed workflows, not as a generic accounting UI.
  - risk: The target logo universe may be too small or too slow-moving for efficient pipeline growth.
    likelihood: Medium
    impact: High
    mitigation: Validate target-fit density early, concentrate on metro regions first, and only hire scaled sales after conversion data justifies it.
  - risk: APPI or customer data-governance expectations may require stricter deployment controls than planned.
    likelihood: Medium
    impact: High
    mitigation: Design for auditable routing, minimal data exposure, and customer security review from the first pilot rather than retrofitting controls later.

fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: Build the freee and Money Forward integrations, evidence graph, reviewer workflow, and security controls needed for 2-3 implementation-heavy paid pilots; fund the first implementation and customer-success hires; and reach repeatable low-million-yen annual contracts before a seed round aimed at broader workflow expansion.
