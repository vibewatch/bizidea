  pestle:
  - factor: 政治
    impact: positive
    point: 日本公共部门政策持续推动税务和发票数字化，为让这些强制要求变得可用的工作流软件创造了有利背景。
    sourceRefs:
    - 14
    - 24
  - factor: 经济
    impact: positive
    point: 合规成本不成比例地压在小型事务所和中小企业身上，因此能压缩文书性税务工作的软件，有一个直接的投资回报叙事。
    sourceRefs:
    - 45
    - 46
  - factor: 社会
    impact: positive
    point: 老龄化社会加上有限的持牌专业人员基数，会让审核杠杆软件的价值随时间增加。
    sourceRefs:
    - 22
    - 27
    - 30
  - factor: 技术
    impact: positive
    point: NTA 和主要记账厂商都提供了公开 API 和开发者工具，让编排在技术上现在就可行，而不只是假设。
    sourceRefs:
    - 31
    - 67
    - 68
    - 69
  - factor: 法律
    impact: positive
    point: 税理士的专属执业权，加上发票和记录留存规则，为一套人机协同、证据丰富的工作流创造了硬性需求，而不是一个通用聊天机器人。
    sourceRefs:
    - 10
    - 11
    - 16
    - 17
  - factor: 环境
    impact: neutral
    point: 电子发票和电子记录工作流减少了纸质处理，但环保收益相较合规和人力杠杆是次要的。
    sourceRefs:
    - 7
    - 14
  adoptionFrictionMatrix:
  - friction: 审核信任与责任顾虑
    severity: high
    affectedBuyer: 资深持牌审核人员
    mitigation: 先从范围较窄的申报材料包做起，让每条建议背后的证据都可见，并明确保留人工最终审批。
    sourceRefs:
    - 16
    - 17
    - 64
  - friction: 客户文件混乱、记账质量参差不齐
    severity: high
    affectedBuyer: 事务所运营负责人
    mitigation: 先从已经数字化收集文件的事务所入手，先把一个小范围的证据集标准化，再考虑扩张。
    sourceRefs:
    - 7
    - 9
    - 88
  - friction: 现有记账和事务所技术栈的集成碎片化
    severity: medium
    affectedBuyer: COO 或 IT 负责人
    mitigation: 优先打造一流的 freee 和 Money Forward 连接器，再为 TKC 式事务所支持传统导出方式。
    sourceRefs:
    - 67
    - 68
    - 69
    - 72
  - friction: 客户池狭窄、销售周期高度依赖信任
    severity: medium
    affectedBuyer: 主管合伙人
    mitigation: 先围绕一个审核团队和一批客户群卖一个季节性试点，再在整个事务所推广。
    sourceRefs:
    - 22
    - 42
    - 83
