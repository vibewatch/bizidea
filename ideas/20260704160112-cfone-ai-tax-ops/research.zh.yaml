  headwinds:
  - point: 《税理士法》要求人工判断始终在环，因此产品不能作为自动税务执业替代品来卖。
    sourceRefs:
    - 16
    - 17
  - point: 由于法人 CPTA 事务所基数只有 5146 家，初始客户池是有限的。
    sourceRefs:
    - 22
  - point: 现有厂商的套件已经占据了许多目标事务所的记账和发票入口。
    sourceRefs:
    - 59
    - 62
    - 92
competitors:
- name: CFOne
  stage: scale-up
  wedge: 面向小微企业的只需审批 AI 税务操作系统。
  pricing: 每年 10 万日元，直接面向中小企业的 SaaS（公开披露）。
  strength: 新一轮融资、明确的只需审批定位，加上自述的 50 多个客户案例验证，让它成为最清晰的直接对标对象。
  weaknessVsUs: 它的公开定位面向中小企业本身；对多审核人员的事务所运营和事务所层面的工作量路由，优化得并不明显。
  sourceRefs:
  - 49
  - 50
- name: freee
  stage: incumbent
  wedge: 云记账加税务申报，以及面向顾问的 AI 工作流。
  pricing: 公开的套餐制定价；顾问事务所套餐按产品和模块浮动。
  strength: 庞大的装机量、顾问计划、公开 API 和不断增长的 AI 功能，让它牢牢掌控着记账入口。
  weaknessVsUs: 它最强的地方在账目和通用后台，而不是跨客户的咨询记忆、申报材料包组装和审核异常路由。
  sourceRefs:
  - 59
  - 60
  - 61
  - 62
  - 64
  - 67
- name: Money Forward Cloud
  stage: incumbent
  wedge: 覆盖广泛的云端后台套件，具备记账 API、MCP 工具，并按企业规模分阶段推广。
  pricing: 公开的中小企业记账套餐起价为每月 2480 日元；顾问事务所套餐定价未明确公开。
  strength: 2300 多个集成、开发者工具，以及在会计事务所中的强渗透率，让它成为一个强势的平台方。
  weaknessVsUs: 它的广度可能让税务咨询和申报异常处理分散在各个模块里，而不是收拢进一个审核队列。
  sourceRefs:
  - 68
  - 69
  - 92
- name: TKC
  stage: incumbent
  wedge: 深耕税务事务所系统、电子申报模块，并通过行业渠道分发的执业软件。
  pricing: 报价制/未见公开自助定价。
  strength: 强大的税务事务所分销渠道和广泛的申报覆盖，让 TKC 成为许多事务所信赖的传统技术栈。
  weaknessVsUs: 它的强项是宽泛的事务所软件，而不是一层能跨混合客户系统运作的轻量级 AI 原生审核控制层。
  sourceRefs:
  - 72
  - 73
- name: STREAMED
  stage: scale-up
  wedge: AI 加人工的记账自动化，可接入多种记账系统。
  pricing: 报价制/以免费试用为主的公开定位。
  strength: 数据录入减少带来清晰的投资回报，宣称 99.9% 的准确率，并通过 API 支持 freee 和 Money Forward，使它成为准备工作的实用替代品。
  weaknessVsUs: 它止步于接入和记账；并不掌控税务咨询逻辑、申报口径组装或审核记忆。
  sourceRefs:
  - 88
regulatoryTechnicalConstraints:
- point: 税务代理、税务文件编制和税务咨询专属授权给持牌 CPTA 或 CPTA 法人，因此工作流必须保留明确的人工签字环节。
  sourceRefs:
  - 16
  - 17
  - 27
- point: 发票制度的合规依赖于留存合格发票及相关记录，以支持进项税抵扣处理。
  sourceRefs:
  - 10
  - 11
  - 13
- point: 根据电子账簿保存制度，电子交易数据必须以可检索、可留存的数字形式保存。
  sourceRefs:
  - 7
  - 9
- point: "e-Tax 集成是一个真实但有边界的技术接口：NTA 公开了 API 和规格，但申报架构仍然是专用的，而不是一个通用的双向记账 API。"
  sourceRefs:
  - 31
validationSignals:
- point: 一个直接对标对象已经融到资，并把只需审批的 AI 税务概念商业化，说明这个问题已经成熟到值得投资的程度。
  sourceRefs:
  - 49
  - 50
- point: 91% 的受访日本企业表示担忧发票制度，说明痛点持续存在，且已经超出了记账界面本身。
  sourceRefs:
  - 43
- point: 一位独立执业的税务师公开描述自己用 freee API 加 Claude，以审核为中心的工作流管理 60 个客户关系，验证了这家初创公司想要产品化的审核杠杆行为。
  sourceRefs:
  - 64
  - 67
- point: freee 和 Money Forward 都开放了开发者接口，让在不替换记录系统的前提下搭建编排层在技术上可行。
  sourceRefs:
  - 67
  - 68
  - 69
openQuestions:
- 5146 家 CPTA 法人里，到底有多少真正符合 500+ 中小企业客户、30-100 名员工、资深审核人员编制不大的目标画像？
- 目标事务所里，审核人员的时间有多大比例仍然花在重建证据上，而不是做真正的税务判断？
- NTA 会不会把 e-Tax 开发者接口扩展到足以支持更原生的工作流自动化，还是申报提交仍将局限于专用工具和导出方式？
- 相比扩展已经信赖的现有技术栈，事务所愿不愿意在 freee、Money Forward、TKC 或 MJS 之上再加一层工作流？
