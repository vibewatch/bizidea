competitors:
- name: CFOne
  stage: scale-up
  wedge: Approval-only AI tax operating system for small businesses.
  pricing: ¥100,000/year direct SMB SaaS (public claim).
  strength: Fresh funding, explicit approval-only positioning, and self-reported proof across 50+ client cases make it the clearest direct analog.
  weaknessVsUs: Its public pitch is SMB-facing; it is less obviously optimized for multi-reviewer firm operations and practice-level workload routing.
  sourceRefs:
  - 49
  - 50
- name: freee
  stage: incumbent
  wedge: Cloud accounting plus tax filing and advisor-focused AI workflows.
  pricing: Public plan-based pricing; advisor-firm bundle varies by product and module.
  strength: Large installed base, advisor program, public APIs, and growing AI features give it strong control over bookkeeping entry points.
  weaknessVsUs: It is strongest at books and generic back office, not at cross-client consultation memory, filing-packet assembly, and reviewer exception routing.
  sourceRefs:
  - 59
  - 60
  - 61
  - 62
  - 64
  - 67
- name: Money Forward Cloud
  stage: incumbent
  wedge: Broad cloud back-office suite with accounting APIs, MCP tooling, and phased adoption across business sizes.
  pricing: Public SMB accounting starts at ¥2,480/month; advisor-firm bundle pricing is not clearly public.
  strength: 2,300+ integrations, developer tooling, and strong accounting-firm penetration make it a formidable platform owner.
  weaknessVsUs: Its breadth can leave tax consultation and filing exception handling fragmented across modules rather than collapsed into one reviewer queue.
  sourceRefs:
  - 68
  - 69
  - 92
- name: TKC
  stage: incumbent
  wedge: Deep tax-office systems, electronic filing modules, and practice software distributed through the profession.
  pricing: Quote-based / no public self-serve pricing surfaced.
  strength: Strong tax-office distribution and broad filing coverage make TKC the trusted legacy stack for many firms.
  weaknessVsUs: Its strength is broad office software, not a lightweight AI-native reviewer control plane that works across mixed client systems.
  sourceRefs:
  - 72
  - 73
- name: STREAMED
  stage: scale-up
  wedge: AI plus human bookkeeping automation that plugs into many accounting systems.
  pricing: Quote-based / free-trial-led public positioning.
  strength: Clear ROI on data-entry reduction, 99.9% accuracy claim, and support for freee and Money Forward via API make it a practical substitute for prep work.
  weaknessVsUs: It stops at ingestion and bookkeeping; it does not own tax consultation logic, filing-position assembly, or reviewer memory.
  sourceRefs:
  - 88
regulatoryTechnicalConstraints:
- point: Tax proxy, tax-document preparation, and tax consultation are reserved to licensed CPTAs or CPTA corporations, so the workflow must preserve explicit human sign-off.
  sourceRefs:
  - 16
  - 17
  - 27
- point: Invoice-system compliance depends on preserving qualified invoices and related records to support input-tax-credit treatment.
  sourceRefs:
  - 10
  - 11
  - 13
- point: Electronic transaction data must be stored in searchable, preservable digital form under the electronic-books-preservation regime.
  sourceRefs:
  - 7
  - 9
- point: 'e-Tax integration is a real but bounded technical surface: NTA publishes APIs and specs, yet filing architecture is still specialized rather than one generic two-way accounting API.'
  sourceRefs:
  - 31
validationSignals:
- point: A direct analog already raised capital and commercialized an approval-only AI-tax message, which suggests the problem is buyer-ready enough to fund.
  sourceRefs:
  - 49
  - 50
- point: Ninety-one percent of surveyed Japanese companies reported concerns about the invoice system, pointing to persistent workflow pain beyond bookkeeping UI.
  sourceRefs:
  - 43
- point: A solo tax professional publicly describes using freee API plus Claude to run 60 client relationships in a review-centered workflow, validating the reviewer-leverage behavior the startup wants to productize.
  sourceRefs:
  - 64
  - 67
- point: Both freee and Money Forward expose developer surfaces, making an orchestration layer technically feasible without replacing the book-of-record system.
  sourceRefs:
  - 67
  - 68
  - 69
openQuestions:
- How many of the 5,146 CPTA corporations actually match the target profile of 500+ SMB clients, 30-100 staff, and a small senior-review bench?
- What percentage of reviewer time inside target firms is still spent reconstructing evidence rather than making actual tax judgments?
- Will NTA expand e-Tax developer surfaces enough for more native workflow automation, or will filing submission remain constrained to specialized tools and exports?
- How willing are firms to add a second workflow layer on top of freee, Money Forward, TKC, or MJS instead of expanding the incumbent stack they already trust?
