    - 11
    - 13
  geographicConsiderations:
  - point: Tokyo and Kinki hold the largest CPTA member concentrations, so metro-first practice acquisition is pragmatic even though the product must support clients nationwide.
    sourceRefs:
    - 22
  sensitivityCases:
  - case: freee or Money Forward deepen advisor AI, reviewer routing, and filing automation faster than expected.
    impact: Standalone wedge narrows and the product may need to position as a cross-stack orchestration layer rather than a full workflow destination.
    sourceRefs:
    - 62
    - 68
    - 69
  - case: Invoice and electronic-record work settles into routine process instead of partner-level backlog.
    impact: Urgency could slip from workflow software budget to minor process cleanup, reducing near-term willingness to trial a new layer.
    sourceRefs:
    - 7
    - 10
    - 43
  - case: Target firms already solve most input-side pain with bookkeeping automation or outsourcing.
    impact: The startup must narrow its promise to consultation memory and filing exceptions, because generic data-entry ROI will not be enough to sell the full product.
    sourceRefs:
    - 45
    - 88
  validationPlan:
  - priority: high
    question: What share of reviewer hours is currently spent reconstructing evidence versus making actual tax judgments inside target firms?
    evidenceToGather: Time-and-motion baselines from three incorporated firms during one monthly close cycle and one filing-period cycle.
  - priority: high
    question: How many of the 5,146 CPTA corporations actually match the 500+ client, multi-reviewer, digitally collected-record profile?
    evidenceToGather: Partner interviews, firm websites, and list-building across the largest regional associations plus one channel partner survey.
  - priority: medium
    question: 'Which installed stack is hardest to integrate without replacement: freee, Money Forward, TKC, MJS, or mixed legacy exports?'
    evidenceToGather: Connector scoping sessions with one pilot candidate on each of the main bookkeeping or office-stack families.
  - priority: low
    question: Do APPI and customer expectations force redaction, onshore routing, or extra human review for taxpayer data sent into LLM workflows?
    evidenceToGather: Counsel memo plus one security review with a design partner before any production pilot.
