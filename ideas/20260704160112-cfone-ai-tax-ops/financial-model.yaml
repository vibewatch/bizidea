modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      TargetFirms --> PaidPilots
      PaidPilots --> ProductionFirms
      ProductionFirms --> SubscriptionAndUsageRevenue
      SubscriptionAndUsageRevenue --> GrossProfit
      GrossProfit --> OperatingCash
modelSanity:
- checkName: Revenue engine
  finding: The base case reaches $573.75K of Y3 revenue by growing from three paying firms in Y1 to 25 active firms in Y3 at a $34K blended annual contract value.
- checkName: Must go right
  finding: Implementation has to stay under six weeks so the company can turn three pilots into 8-10 production firms by the end of Y2 without hiring a large services team.
- checkName: Model breaks if
  finding: If contract value falls toward $30K and Y3 active firms stall near 16, the downside case compresses Y3 revenue to $360K and leaves little room for a delayed seed round.
- checkName: Next-round proof
  finding: The next financing is justified once the company shows 8-10 production firms, >70% gross margin, and repeatable conversion from paid pilot to low-million-yen annual contract.
sanityChecks:
  ruleOf40: Y3 growth 175.51% + EBITDA margin -78.94% = 96.57%
  burnMultiple: Y2 burn multiple 2.37x, improving to 0.89x in Y3 on net new ARR.
  revenuePerFte: Approximately $72K Y3 on 8 exit FTE (benchmark $200–400K SaaS; low because the model stays implementation-heavy and Japan-first through the wedge stage).
  flags:
  - Revenue per exit FTE is far below mature SaaS benchmarks, so the business needs proof that implementation work and reviewer support will not scale linearly with each new firm.
  - The model intentionally assumes no explicit logo churn in the first 36 months; if early pilots fail to renew, actual cash conversion will be worse than the base case.
  - The logo universe is constrained by a roughly 1,000-firm practical SAM, so missing second-office expansion or adjacent workflow modules would cap the venture outcome quickly.
  - Gross margin only reaches the mid-70s if messy source-data reconstruction declines materially after the first cohorts; weak data hygiene would push services load back into COGS.
