scenarios:
  downside:
    description: Partner-sourced pipeline is slower, blended contract value lands closer to the pilot-to-production floor, and service load keeps gross margin below plan.
    y3RevenueK: 360.0
    y3EbitdaK: -625.5
    cashLowPointK: 317.05
    keyAssumptionChanges:
    - Blended annual revenue per active firm falls to $30K
    - End-Y3 active firms stall at 16 because Y2-Y3 adds slow materially
    - Gross margin only reaches 70% in Y3
  base:
    description: Three paid pilots in Y1 convert into a measured pod-to-practice rollout, while onboarding playbooks lift gross margin into the mid-70s by Y3.
    y3RevenueK: 573.75
    y3EbitdaK: -452.93
    cashLowPointK: 535.96
    keyAssumptionChanges:
    - Blended annual revenue per active firm holds at $34K
    - Customer adds follow [1,2,2,2] in Y2 and [3,4,4,4] in Y3
    - Gross margin rises from 62% in Y1H1 to 74% in Y3
  upside:
    description: Reference accounts and ecosystem referrals pull forward more practice-wide wins, while automation reduces manual implementation load faster than planned.
    y3RevenueK: 752.08
    y3EbitdaK: -305.92
    cashLowPointK: 736.42
    keyAssumptionChanges:
    - Blended annual revenue per active firm rises to $38K
    - End-Y3 active firms reach 30 through faster partner-led expansion
    - Gross margin reaches 76% in Y3
