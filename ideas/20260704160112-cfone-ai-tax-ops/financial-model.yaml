  source: '[BP fundingAsk targetFundingRangeUsd $2-4M]; base case uses the low end of the stated range.'
- id: A3
  name: Starting paying firms (M1)
  value: '0'
  unit: count
  source: '[BP milestones 0-12 months] first paid pilots are a near-term milestone, not an existing base.'
- id: A4
  name: Blended annual revenue per active firm
  value: '34.0'
  unit: USDK
  source: '[BP gtm pricing; BP investorMemo initialContract; Research willingnessToPay] blends platform subscription, per-active-client fees, and modest module/onboarding revenue.'
- id: A5
  name: Year 1 new paying firms by month
  value: '[0, 0, 1, 0, 1, 0, 0, 1, 0, 0, 0, 0]'
  unit: count
  source: '[BP product sixMonth; BP milestones 0-12 months] founder-led motion lands three paid pilots in the first year.'
- id: A6
  name: Year 2 new paying firms by quarter
  value: '[1,2,2,2]'
  unit: count
  source: '[BP milestones 12-24 months] expands from pilots to 5-10 firm rollouts by end of year 2.'
- id: A7
  name: Year 3 new paying firms by quarter
  value: '[3,4,4,4]'
  unit: count
  source: '[BP milestones 24-36 months] reaches 20-30 production firms through pod-to-practice expansion and partner referrals.'
- id: A8
  name: Revenue recognition for new wins
  value: 50% of full month in landing month
  unit: formula
  source: 'Startup finance heuristic: new B2B accounts usually go live mid-month, so revenue uses average active customers ((BoP+EoP)/2).'
- id: A9
  name: Logo-retention treatment
  value: No explicit logo churn in the 36-month operating model; 2.0% steady-state monthly churn used for LTV only
  unit: policy
  source: '[BP investorMemo initialContract] early customers are annual, implementation-heavy contracts; heuristic keeps the operating model simple while long-run unit economics remain conservative.'
- id: A10
  name: COGS as % of revenue
  value: 38% M1-M6; 32% M7-M12; 29% Y2; 26% Y3
  unit: percent
  source: '[BP targetGrossMarginPct 70; BP keyBets; Research adoptionFrictionMatrix] manual evidence reconstruction, support, and model-routing costs fade as playbooks mature.'
- id: A11
  name: Fully-loaded founder/CEO salary
  value: '84.0'
  unit: USDK annual per FTE
  source: 'Startup finance heuristic: Japan seed-stage vertical SaaS founder on a below-market but cash-paying salary.'
- id: A12
  name: Fully-loaded engineering salary
  value: '100.0'
  unit: USDK annual per FTE
  source: 'Startup finance heuristic: Japan seed-stage applied software engineer with payroll load.'
- id: A13
  name: Fully-loaded implementation/customer success salary
  value: '72.0'
  unit: USDK annual per FTE
  source: 'Startup finance heuristic: implementation-heavy B2B SaaS operator in Japan with payroll load.'
- id: A14
  name: Fully-loaded sales/GTM salary
  value: '90.0'
  unit: USDK annual per FTE
  source: 'Startup finance heuristic: early enterprise/account-executive hire for a trust-heavy Japan workflow sale.'
- id: A15
  name: Security and compliance coverage
  value: External advisor retainer embedded in G&A through Y3
  unit: staffing
  source: '[BP team security and compliance advisor] the plan specifies advisor support before a full-time compliance hire.'
- id: A16
  name: Non-payroll opex ramp
  value: R&D 3/4/4/5K, S&M 2/3/4/5K, G&A 4/5/5/6K monthly across Y1H1/Y1H2/Y2/Y3
  unit: USDK per month
  source: Startup finance heuristic anchored to cloud/LLM spend, partner travel, legal, and security-review needs for an implementation-heavy Japan SaaS.
- id: A17
  name: Y2 hiring step-up
  value: Add a third engineer in Q2Y2 and a second implementation lead in Q3Y2
  unit: headcount event
  source: '[BP sequencingRationale; BP team] implementation capacity is added before scaled sales.'
- id: A18
  name: Y3 hiring step-up
  value: Add a second GTM rep in Q2Y3 after repeatable pilot-to-production proof
  unit: headcount event
  source: '[BP team account executive; BP milestones 24-36 months] sales hiring trails proof and reference accounts.'
- id: A19
  name: Blended CAC
  value: '16.2'
  unit: USDK per customer
  source: Calculated from modeled Y2-Y3 sales payroll plus GTM program spend of $355.5K over 22 new firms; excludes implementation payroll.
- id: A20
  name: Funding ask sizing rule
  value: 24-month milestone plus 6-month buffer
  unit: policy
  source: Developer instruction; [BP fundingAsk runwayMonths 18] and milestone timing imply a conservative 30-month planning envelope.
