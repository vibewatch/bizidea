    - 嵌入税务工作流的后期中小企业财务平台
  valuePropositions:
    - 把零散的中小企业账目和咨询记录，整合成审核就绪的申报材料包
    - 在保留人工签字的前提下提高持牌审核人员的吞吐量
    - 让中小企业客户获得更清爽、可全程溯源的审批体验
  channels:
