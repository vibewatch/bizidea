  costStructure:
    - 模型开发与文件处理
    - 系统集成与实施
    - 客户成功与审核工作流设计
    - 垂直行业销售与合规运营
jobsToBeDone:
  - job: 资深审核人员被中小企业申报准备工作淹没时，帮事务所运营团队把每个客户都整理成审核就绪的材料包，这样新增客户不必按比例多招专才。
    currentAlternative: 初级员工在记账工具、邮件和 Excel 之间手工整理记录，再交给合伙人审核
    successMetric: 每位持牌审核人员每月能处理的活跃中小企业客户数增加
  - job: 企业主在结账或申报季反复提出税务问题时，帮审核人员立刻调出正确背景来回答，不用重新翻开整份档案就能处理咨询请求。
    currentAlternative: 翻找过去的邮件、笔记和账本导出文件来还原客户情况
    successMetric: 咨询响应更快，每个建议或申报案例的返工更少
ideaScorecard:
  signalStrength:
    score: 4
    rationale: 工作流信号异常具体，还伴随新一轮融资，但证据基础仍只有一个窗口期内的来源。
  painIntensity:
    score: 5
    rationale: 初筛明确指出税务顾问稀缺，任何服务大量中小企业的事务所都会把审核人员的时间视为硬性产能瓶颈。
  wedgeClarity:
    score: 5
    rationale: 面向高客户量日本税务师事务所的只需审批咨询与申报工作台，是一个范围窄、可衡量、买家明确的首发产品。
  defensibility:
    score: 4
    rationale: 事务所专属的决策历史、溯源图谱和审核反馈应能形成转换成本，不过这个赛道也会吸引现有厂商入场。
  ventureScale:
    score: 4
    rationale: 滩头市场可以扩展到更广泛的中小企业财务运营和嵌入式税务基础设施，但要做出超额规模，初始市场仍需要相邻产品补充。
topRisks:
  - name: 审核信任风险
    description: 如果资深审核人员不信任起草的建议和申报材料包，产品就会退回人工核对，经济优势也随之消失。
    mitigation: 上线时每条建议都附明确证据链接，坚持人工签字为强制环节，并在范围较窄的早期客户群中证明修改率下降。
  - name: 源数据混乱
    description: 客户文件不统一、记账质量参差不齐，可能让上手成本变高，还会造成过多的虚假异常。
    mitigation: 先从已经数字化收集记录的事务所入手，围绕常见文件类型统一接入方式，并以实测的异常率作为扩张的门槛。
  - name: 渠道阻力
    description: 税务师事务所可能担心自动化厂商最终会绕过自己，直接向中小企业客户销售。
    mitigation: 把产品定位成审核杠杆基础设施，在客户审批流程中保留事务所自己的品牌，并把事务所层面的吞吐量提升作为核心的投资回报叙事。
