jobsToBeDone:
  - job: >-
      When our engineering org approves a new IDE extension or update, help our
      platform security team verify that it cannot access sensitive credentials
      or alter high-risk project files, so we can keep developers productive
      without opening a silent supply-chain path.
    currentAlternative: MDM allowlists plus ad hoc manual review
    successMetric: Time to approve or block an extension update with a clear blast-radius assessment
  - job: >-
      When a suspicious extension event occurs on a developer workstation, help
      our security team quarantine only the affected secrets, repos, and
      workflows, so we can contain the incident without rotating everything in
      the engineering stack.
    currentAlternative: Generic EDR alerting plus broad manual credential rotation
    successMetric: Time from suspicious extension alert to confirmed revocation of affected credentials
