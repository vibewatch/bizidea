differentiator: >-
  Most developer-security tools stop at package provenance, secret detection, or
  generic endpoint telemetry. This company would own the missing runtime layer
  where approved IDE extensions actually execute, touch secrets, and alter
  repository state before code reaches CI. Its moat can compound through an
  extension-behavior graph tied to enterprise-specific credential inventories,
  repo topologies, and incident-response playbooks that get sharper with every
  containment event.
