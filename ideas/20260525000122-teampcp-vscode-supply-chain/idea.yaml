problem: >-
  Platform security teams still treat IDE extensions as low-risk productivity
  add-ons even though they run inside the developer's highest-privilege working
  environment. A malicious extension can silently read local cloud and secret
  manager credentials, alter project files, and seed downstream CI compromise
  before code review or runtime security tools ever see the change. Existing
  controls like marketplace verification, MDM allowlists, EDR, and GitHub
  secret scanning do not give teams a purpose-built layer for extension
  behavior, blast-radius mapping, and immediate credential containment.
targetUser:
  primary: >-
    Platform security and developer-platform engineers at software companies
    with 200-2,000 engineers standardized on VS Code or Cursor, GitHub Actions,
    and local cloud or secret-manager CLIs on developer laptops
  secondary: >-
    Endpoint engineering and security operations leaders who own IDE baselines,
    extension policy, and incident response for engineering workstations
  buyer: >-
    Director of platform engineering, head of product security, or chief
    information security officer at a software company with centralized
    developer-tooling policy
startupThesis:
  nonObviousInsight: >-
    The new control point is not the package registry or the CI runner by
    itself. It is the trusted extension runtime on the developer workstation,
    where a "verified" tool can deliver malicious behavior after installation
    and bridge local secrets into downstream repository and CI compromise. The
    winning company will pair runtime extension monitoring with secret graphing
    and one-click containment, not just static provenance checks.
  beachhead: >-
    Series B-D software companies with 300-1,500 engineers, a managed VS Code
    or Cursor extension baseline, GitHub Actions release pipelines, and local
    use of AWS, Kubernetes, Vault, or 1Password CLI credentials during
    day-to-day development
  wedge: >-
    An IDE extension trust firewall that fingerprints extension behavior,
    detects secret-access and file-mutation anomalies on workspace open, and
    launches scoped credential quarantine plus rotation workflows when a risky
    extension is observed
  whyNowCatalyst: >-
    The TeamPCP incident proved that a verified VS Code extension can breach
    GitHub itself in under 18 minutes and steal both workstation and CI
    credentials, turning IDE runtime trust into an urgent board-level control
    gap.
  ventureScalePath: >-
    Start with VS Code and Cursor extension runtime security, then expand into
    local AI coding agents, JetBrains plugins, browser-based developer tools,
    and broader machine-identity governance across the full software-delivery
    chain.
solution: >-
  IDE Extension Trust Firewall plugs into the enterprise extension baseline,
  endpoint agent, and secret systems already used by engineering. It scores
  every installed extension against observed behaviors such as credential-file
  access, shell execution, workspace-open callbacks, outbound network patterns,
  and unauthorized mutation of workflow or config files. When it detects a
  high-risk extension, it can isolate that workstation, revoke or rotate the
  specific GitHub, cloud, and vault credentials in reach, and generate a
  blast-radius report showing which repos, workflows, and environments may have
  been touched. The first release is deliberately narrow: protect managed VS
  Code fleets without forcing security teams to ban extensions outright or run
  a full laptop-forensics program after every scare.
goToMarketSeed:
  firstCustomer: >-
    A Series C dev-tools, security, or infrastructure software company with
    400-1,200 engineers, standardized VS Code images, 20+ GitHub repositories,
    and a small platform-security team responsible for developer laptop policy
    and GitHub Actions hardening
  buyingTrigger: >-
    A recent developer-tooling incident, extension-policy review, or executive
    request to prove that approved IDE extensions cannot leak cloud, vault, or
    CI credentials before the next security audit or enterprise deal
  currentAlternative: >-
    Marketplace verification, MDM allowlists, generic EDR, GitHub secret
    scanning, and manual credential rotation coordinated across platform and
    security teams after an incident
  switchingReason: >-
    This wedge watches what extensions actually do at runtime and ties findings
    directly to credential quarantine and repo-impact analysis, which is much
    faster and more actionable than static allowlists or generic endpoint alerts
  pricingHypothesis: >-
    Annual platform fee based on protected developer workstations and managed
    extension installs, with premium usage pricing for automated credential
    rotation and blast-radius investigations
