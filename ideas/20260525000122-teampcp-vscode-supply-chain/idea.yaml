topRisks:
  - name: Native platform catch-up
    description: Microsoft, GitHub, or large endpoint vendors could add stronger extension attestation and policy controls that shrink the category.
    mitigation: Focus on cross-tool runtime behavior, credential blast-radius mapping, and automated containment workflows that go beyond marketplace attestation.
  - name: Endpoint deployment friction
    description: Security teams may resist another workstation agent if installation or false positives disrupt developer workflows.
    mitigation: Start with managed-fleet telemetry and monitor mode, then phase in enforcement only for high-confidence secret-access and file-mutation patterns.
  - name: Budget ambiguity
    description: Buyers may split ownership across endpoint, AppSec, and platform engineering teams, slowing initial sales cycles.
    mitigation: Sell through a concrete incident-response ROI story around reduced rotation time and avoided repo or CI shutdowns, then package integrations that satisfy each team.
