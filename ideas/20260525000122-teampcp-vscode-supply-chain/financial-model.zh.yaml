modelDiagram:
  title: 单位经济流转
  mermaid: |
    flowchart LR
      Leads --> PaidPilots
      PaidPilots --> ProductionAccounts
      ProductionAccounts --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: 收入引擎
    finding: 基础案例收入来自将三个付费试点转化为适度的企业标志客户群，再通过席位扩张和隔离工作流将 ACV 从约 $144K 提升至 $200K。
  - checkName: 必须做对的事
    finding: 公司必须在接近模型中 90 天路径的同时，在单个托管机群上验证低误报率，保持试点到生产的转化节奏。
  - checkName: 模型会在何时崩塌
    finding: 如果能集中管理扩展策略的目标账户数量少于商业计划假设，部署速度和 Y3Q4 客户数都将滑向下行情景。
  - checkName: 下轮融资证明点
    finding: 到 Y2Q4 拿下 8 个付费账户，其中至少 2 个完成生产转化，并具备可信的 GitHub 加机密收敛能力，应足以支撑下次融资。
sanityChecks:
