scenarios:
  downside:
    description: 试点转化放缓、更多人工服务需求，以及买家对 VS Code 单一覆盖的顾虑，共同推迟了 Y3 的生产落地。
    y3RevenueK: 2816.0
    y3EbitdaK: -286.0
    cashLowPointK: 402.0
    keyAssumptionChanges:
      - Y3Q4 客户数达到 22 而非 32。
      - 退出 ACV 落在约 $180K，因为较少账户扩大席位或购买高级隔离工作流。
      - 毛利率只达到 74%，因为更多调查和上线工作仍依赖人工交付。
  base:
    description: 公司在 Y1 拿下 3 个付费试点，在 Y2 将最佳账户转化，然后在 Y3 通过更广泛的席位覆盖和收敛自动化提升 ACV。
    y3RevenueK: 3893.0
    y3EbitdaK: 254.4
    cashLowPointK: 632.7
    keyAssumptionChanges:
      - 客户增长到 Y2Q4 达到 8 个付费账户，到 Y3Q4 达到 32 个。
      - 实现定价从 $72K 付费试点逐步升至约 $200K 退出 ACV，随生产和自动化比例提升而提高。
      - 毛利率在 Y3 达到 78% 的商业模式目标。
  upside:
    description: 强力的共创客户背书和托管机群内部更快的扩展将收入前置，无需大幅增加招聘。
    y3RevenueK: 4650.0
    y3EbitdaK: 690.0
    cashLowPointK: 780.0
    keyAssumptionChanges:
      - Y3Q4 客户数达到 40 而非 32。
      - 退出 ACV 达到约 $215K，因为更多账户新增第二业务单元和自动化隔离。
      - 毛利率达到 79%，因为上线和响应剧本标准化更快。
