slug: ide-extension-trust-firewall
date: '2026-05-25'
currency: USD
modelStartMonth: '2026-06'
assumptions:
  - id: A1
    name: 模型起始月份
    value: '2026-06'
    unit: YYYY-MM
    source: '[BP date + BP fundingAsk] 模型从计划日期后的第一个完整月份开始，确保天使轮资金在支出开始前到位。'
  - id: A2
    name: 期初现金与天使轮规模
    value: '3300.0'
    unit: USDK
    source: '[BP fundingAsk targetFundingRangeUsd $2–4M + BP fundingAsk.runwayMonths 18] 基础案例采用 $3.3M 天使轮（略高于中间值），以确保到达 Y2Q4 转化里程碑后仍持有约 6 个月缓冲。'
  - id: A3
    name: 起始客户数（第 1 月）
    value: '0'
    unit: accounts
    source: '[BP product MVP + BP milestones 0–12 months] 公司从零收入起步，需先交付审计模式以及首批 GitHub 和机密集成。'
  - id: A4
    name: 付费试点价格
    value: '72.0'
    unit: USDK per 90-day pilot
    source: '[BP investorMemo.firstCustomer.initialContract $40k-$80k paid 90-day pilot] 基础案例取单个托管工程机群在事件驱动情形下的报价区间中上值。'
  - id: A5
    name: 初始生产 ACV
    value: '144.0'
    unit: annualK per customer
    source: '[BP investorMemo.firstCustomer.initialContract $120k-$250k annual deployment] 基础案例取年度生产报价区间的中下值，反映含最低平台费的首个机群部署。'
  - id: A6
    name: Y3 退出 ACV
    value: '200.0'
    unit: annualK per customer
    source: '[BP gtm.pricing + BP businessModel.expansionLevers + BP investorMemo.firstCustomer.initialContract] 假设账户在 Y3 已扩大受保护席位并采购隔离和调查工作流。'
  - id: A7
    name: Y1 客户增长节奏
    value: 'M6 1, M8 2, M10 3, M12 3 paying accounts'
    unit: customersEop
    source: '[BP milestones 0–12 months + BP experimentRoadmap] 直接锚定于第一年拿下 3 个付费共创客户试点的目标。'
  - id: A8
    name: Y2 客户增长节奏
    value: 'Q1Y2 4, Q2Y2 5, Q3Y2 6, Q4Y2 8 paying accounts'
    unit: customersEop
    source: '[BP milestones 12–24 months] 假设首批试点后有温和的企业级转化，有一个扩展账户，但尚无大规模渠道。'
  - id: A9
    name: Y3 客户增长节奏
    value: 'Q1Y3 11, Q2Y3 15, Q3Y3 22, Q4Y3 32 paying accounts'
    unit: customersEop
    source: '[BP milestones 24–36 months + research market.som] 基础案例保持在数十个灯塔账户，与已研究的 Y3 SOM 及 VS Code 优先策略一致。'
  - id: A10
    name: 收入确认阶梯
    value: 'Y1 M6-M12 uses $24K monthly pilot revenue per account; Y2 quarterly realized price per account is $36K, $36K, $40K, $45K; Y3 quarterly realized price per account is $45K, $48K, $49K, $50K'
    unit: USDK per customer period
    source: '[A4 + A5 + A6 + BP sequencingRationale] 收入按期末客户数乘以混合实现价格确认，价格从试点费用逐步过渡至生产订阅加自动化追加销售。'
  - id: A11
    name: 毛利率爬坡
    value: 'Y1 50.0%, Y2 71.8%, Y3 77.6%; quarterly path 68%, 70%, 72%, 74%, 76%, 77%, 78%, 78%'
    unit: percent
    source: '[BP businessModel.targetGrossMarginPct 78 + BP strategicChoices.sequencingRationale] 早期试点包含更多上线和调查支持，业务在 Y3 才达到目标毛利率。'
  - id: A12
    name: 单位经济用月度标志客户流失率
    value: '1.8'
    unit: percent
    source: '[Startup-finance heuristic] 含年度合同的企业安全工具留存应优于中小企业 SaaS，但该品类尚早期且面临捆绑风险。'
  - id: A13
    name: 稳态 CAC
    value: '75.0'
    unit: USDK per customer
    source: '[BP gtm.channels + BP gtm.funnelTargets + research reportMemo.buyingTriggers] 事件驱动的企业安全销售和付费试点支持更高的 CAC，高于水平型 SaaS。'
  - id: A14
    name: 含税薪酬区间
    value: 'Founder 180; Engineering 220; Security/Detection 210; Solutions/Success 180; Sales/GTM 230; G&A 140'
    unit: annualK per FTE
    source: '[BP team + startup-finance heuristic] 采用含工资税和福利的精简但资深的美国软件安全现金薪酬。'
  - id: A15
    name: 招聘时间表
    value: 'Security integrations M2; detection engineer M4; solutions engineer M6; first GTM hire M15; second engineer M17; customer success M19; third engineer M28; second GTM M31; G&A M33'
    unit: timing
    source: '[BP team + BP strategicChoices.sequencingRationale] 招聘晚于信号质量和试点转化的验证，而非提前备人。'
  - id: A16
    name: 人员编制端点
    value: '3 FTE by Q1Y1, 5 by Q2Y1, 8 by Q4Y2, and 11 by Q4Y3'
    unit: FTE
    source: '[BP team + BP fundingAsk] 保持天使轮规模下的精简团队，同时覆盖产品、集成、部署和创始人主导 GTM。'
  - id: A17
    name: 运营支出计划
    value: 'Y1 monthly opex ramps from $75K to $134K; Y2 quarterly opex is $420K, $450K, $495K, $540K; Y3 quarterly opex is $600K, $660K, $725K, $780K'
    unit: USDK
    source: '[BP operations + BP experimentRoadmap + startup-finance heuristic] 支出随红队实验室、企业部署工作、差旅、保险和合规需求增长，集中在产品和集成上。'
  - id: A18
    name: 职能运营支出结构
    value: 'R&D remains the largest line through Y3; sales and marketing ramps after M15; G&A rises with enterprise security insurance, legal, and compliance needs'
    unit: policy
    source: '[BP operations + BP fundingAsk.useOfFundsSummary] 各部门按职能总支出建模；薪酬行是披露的薪资备忘录，用于核对，不是运营支出之外的额外费用。'
  - id: A19
    name: 现金流简化假设
    value: Ending cash equals opening cash plus cumulative EBITDA
    unit: formula
    source: '[Startup-finance heuristic] 假设轻资产软件公司几乎无资本开支、无债务、无营运资金扭曲和递延收入时间差。'
  - id: A20
    name: 融资规模规则
    value: Raise enough to reach the Q4Y2 proof point and preserve about 6 months of operating buffer
    unit: policy
    source: '[BP fundingAsk.runwayMonths 18 + model requirement] 本轮规模对应下一个融资里程碑加缓冲，而非最短生存跑道。'
