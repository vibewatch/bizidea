      publishedDate: '2026-05-22'
      company: StepSecurity
      eventType: incident
      fetchVerified: true
      keyPoints:
        - "Megalodon 行动于 5 月 18 日在六小时内向 5,500 多个开源仓库注入恶意 CI 工作流文件，系统性攻击分支保护规则薄弱的仓库。"
        - "外泄载荷将所有收集到的凭据压缩打包后，通过 HTTPS POST 发送至 216.126.225.129:8443，利用 CI Runner 不受限的出站网络访问。"
        - "攻击映射到 MITRE ATT&CK T1195.002（d-PPE 类）；工作流 YAML 文件受到的安全审查远少于应用代码，是防御薄弱的攻击面。"
  signals:
    - title: Marketplace 认证徽章无法保障运行时安全
      description: Nx Console 持有已验证发布者徽章，安装量高达 220 万，但一次恶意更新仍成功攻破 GitHub，说明仅凭扩展来源检查远远不够。
      sourceRefs: [3]
    - title: 数分钟的 Marketplace 暴露足以造成企业级损害
      description: 投毒扩展仅上线 18 分钟，就波及数千名开发者、造成 3,800 个内部仓库被盗，说明买家需要持续运行时管控，而非周期性审计。
      sourceRefs: [1, 2, 3]
    - title: IDE 扩展现在同时窃取开发者与 CI 凭据
      description: 恶意载荷直接从开发者工作站收集 Vault、AWS、GitHub、Kubernetes、1Password 和 Docker 凭据，将端点爆炸半径与 CI 爆炸半径合并成一条攻击路径。
      sourceRefs: [2, 3]
    - title: CI 工作流文件是防御薄弱的下游外泄攻击面
      description: StepSecurity 的 Megalodon 报告显示，攻击者还利用工作流 YAML 从 5,500 多个仓库外泄机密，证明入侵不会止步于开发者笔记本。
      sourceRefs: [4]
    - title: 单一攻击行动正将 IDE、软件包与 CI 攻击面串联
      description: TeamPCP 与 Mini Shai-Hulud 事件将恶意扩展、npm 包入侵与 CI 机密窃取串联成一场针对开发者工具链的协同攻击。
      sourceRefs: [1, 2, 4]
problem: >-
  平台安全团队仍将 IDE 扩展视为低风险的生产力插件，却忽视了它们运行在开发者权限
  最高的工作环境中。恶意扩展能在代码审查或运行时安全工具察觉之前，静默读取本地
  云凭据与密钥管理器凭据、篡改项目文件，并向下游 CI 植入隐患。现有控制手段——
  Marketplace 验证、MDM 白名单、EDR、GitHub 机密扫描——都无法为团队提供专门针对
  扩展行为、爆炸半径映射和即时凭据收敛的防护层。
targetUser:
  primary: >-
    规模在 200–2,000 名工程师的软件公司中，统一使用 VS Code 或 Cursor、GitHub
    Actions 以及开发者笔记本上本地云或密钥管理器 CLI 的平台安全与开发者平台工程师
  secondary: >-
    负责工程工作站 IDE 基线、扩展策略及事件响应的端点工程与安全运营负责人
  buyer: >-
    拥有集中开发者工具策略的软件公司的平台工程总监、产品安全负责人或首席信息安全官
startupThesis:
  nonObviousInsight: >-
    新的控制点不是软件包注册表或 CI Runner 本身，而是开发者工作站上受信任的扩展
    运行时——"已验证"的工具可以在安装后投递恶意行为，将本地机密桥接至下游仓库与
    CI 入侵。赢家将把运行时扩展监控与机密关系图、一键收敛能力配对，而不仅仅是
    静态来源检查。
  beachhead: >-
    拥有 300–1,500 名工程师、托管 VS Code 或 Cursor 扩展基线、GitHub Actions
    发布流水线，以及日常开发中本地使用 AWS、Kubernetes、Vault 或 1Password CLI
    凭据的 B–D 轮软件公司
  wedge: >-
    一套 IDE 扩展信任防火墙：对扩展行为进行指纹采集，在工作区打开时检测机密访问
    与文件变更异常，并在发现高风险扩展时触发限定范围的凭据隔离和轮换工作流
  whyNowCatalyst: >-
    TeamPCP 事件证明，一个已验证的 VS Code 扩展可在不到 18 分钟内攻破 GitHub
    本身，同时窃取工作站凭据与 CI 凭据，将 IDE 运行时信任变成紧迫的董事会级
    管控缺口。
  ventureScalePath: >-
    从 VS Code 和 Cursor 扩展运行时安全起步，向本地 AI 编码 Agent、JetBrains
    插件、浏览器端开发工具以及整条软件交付链上的机器身份治理延伸。
solution: >-
  IDE 扩展信任防火墙接入企业已有的扩展基线、端点 Agent 和机密系统。它对每个已安装
  扩展的观测行为打分，包括凭据文件访问、Shell 执行、工作区打开回调、出站网络模式
  以及对工作流或配置文件的非授权变更。检测到高风险扩展后，可隔离对应工作站，吊销
  或轮换其触及的 GitHub、云和 Vault 凭据，并生成爆炸半径报告——列明哪些仓库、工作
  流和环境可能已被波及。首个版本刻意保持克制：在不强制安全团队全面禁止扩展或每次
  安全事件后都运行完整笔记本取证的前提下，保护托管 VS Code 机群。
goToMarketSeed:
  firstCustomer: >-
    工程师规模 400–1,200 人、统一使用标准化 VS Code 镜像、拥有 20 个以上 GitHub
    仓库、以及一支负责开发者笔记本策略和 GitHub Actions 加固的小型平台安全团队的
    C 轮开发工具、安全或基础设施软件公司
  buyingTrigger: >-
    近期发生开发者工具安全事件、开展扩展策略审查，或高层要求在下次安全审计或企业
    商务谈判前证明已批准的 IDE 扩展不会泄露云、Vault 或 CI 凭据
  currentAlternative: >-
    Marketplace 验证、MDM 白名单、通用 EDR、GitHub 机密扫描，以及事件发生后由
    平台团队与安全团队协作完成的人工凭据轮换
  switchingReason: >-
    这个切口能实时观测扩展的行为，并将发现直接与凭据隔离和仓库影响分析挂钩，比
    静态白名单或通用端点告警快得多，也更有可操作性
  pricingHypothesis: >-
    按受保护开发者工作站和托管扩展安装数量收取年度平台费，对自动凭据轮换和爆炸
    半径调查功能额外收取高级用量费
whyNow:
  - point: Nx Console 的验证徽章和 220 万安装量未能阻止恶意更新攻破 GitHub，Marketplace 已验证状态不再能让买家放心。
    signalRefs: [Marketplace 认证徽章无法保障运行时安全]
    sourceRefs: [3]
  - point: 仅 18 分钟的暴露窗口就足以感染数千名开发者并外泄 3,800 个内部仓库，证明时间点式扩展审计远远不够。
    signalRefs: [数分钟的 Marketplace 暴露足以造成企业级损害]
    sourceRefs: [1, 2, 3]
  - point: 该扩展从工作站收集了云、Vault、GitHub、Kubernetes、Docker 和密码管理器凭据，使 IDE 入侵等同于机器身份入侵。
    signalRefs: [IDE 扩展现在同时窃取开发者与 CI 凭据]
    sourceRefs: [2, 3]
  - point: 同一攻击行动还将恶意工作流 YAML 注入 5,500 多个仓库，迫切需要能将笔记本入侵与下游 CI 收敛连接起来的产品。
    signalRefs: [CI 工作流文件是防御薄弱的下游外泄攻击面, 单一攻击行动正将 IDE、软件包与 CI 攻击面串联]
    sourceRefs: [1, 2, 4]
differentiator: >-
  大多数开发者安全工具止步于包来源、机密检测或通用端点遥测。这家公司将占据缺失的
  运行时层——已批准的 IDE 扩展实际执行、接触机密、改变仓库状态都在代码进入 CI 之
  前发生。护城河可通过与企业特定凭据库、仓库拓扑和事件响应剧本绑定的扩展行为图来
  持续加深，每次收敛事件都让图谱更精准。
conceptDiagram:
  title: IDE 扩展信任闭环
  mermaid: |
    flowchart LR
      Buyer[Platform security lead] --> Pain[Trusted IDE extensions can exfiltrate secrets]
