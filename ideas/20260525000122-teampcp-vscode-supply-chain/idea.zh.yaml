        - "恶意 Nx Console VS Code 扩展 18.95.0 版本于 5 月 18 日 12:30 UTC 上传至 Visual Studio Marketplace，18 分钟内即被撤下，但仍有数千名开发者感染。"
        - "被盗凭据涵盖 Kubernetes、AWS IAM、npm、1Password、GitHub Token，以及从开发者工作站收集的 GCP/Docker 凭据。"
        - "同一行动还在 AntV 命名空间下发布了 637 个恶意 npm 包，进一步扩大下游暴露面。"
    - id: 3
      title: "GitHub 攻击溯源：恶意 Nx Console VS Code 扩展是元凶"
      url: https://www.infosecurity-magazine.com/news/github-breach-nx-console-vs-code/
      publisher: Infosecurity Magazine
      publishedDate: '2026-05-19'
      company: GitHub
      eventType: incident
      fetchVerified: true
      keyPoints:
        - "Nx Console 在 VS Code Marketplace 拥有 220 万次安装量及已验证发布者徽章，证明发布者验证无法阻止供应链入侵。"
        - "恶意载荷在工作区打开时静默收集 Vault Token、AWS IMDS、GCP Docker 凭据、GitHub Actions 机密以及 1Password CLI 保险库内容。"
        - "Nx Console 安全公告 GHSA-c9j4-9m59-847w 建议立即升级至 18.100.0；仅 18 分钟的暴露窗口就已足以攻破 GitHub 本身。"
    - id: 4
