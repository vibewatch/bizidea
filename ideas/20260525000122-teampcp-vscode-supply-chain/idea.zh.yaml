jobsToBeDone:
  - job: >-
      当工程组织批准新 IDE 扩展或更新时，帮助平台安全团队确认它无法访问敏感凭据或
      篡改高风险项目文件，从而在不开放隐蔽供应链通道的前提下保障开发者效率。
    currentAlternative: MDM 白名单加临时人工审核
    successMetric: 在附带明确爆炸半径评估的情况下，批准或拦截一次扩展更新所需的时间
  - job: >-
      当开发者工作站发生可疑扩展事件时，帮助安全团队仅隔离受影响的机密、仓库和
      工作流，在不轮换整个工程栈的前提下完成事件收敛。
    currentAlternative: 通用 EDR 告警加大范围人工凭据轮换
    successMetric: 从可疑扩展告警到确认吊销受影响凭据所需的时间
ideaScorecard:
  signalStrength:
    score: 5
    rationale: >-
      四个抓取来源记录了一起具体的高危事件，直接将 IDE 入侵与仓库窃取和 CI 机密
      暴露关联起来。
  painIntensity:
    score: 5
    rationale: >-
      一个恶意扩展可能迫使团队对开发者、云、Vault 和 CI 身份执行紧急轮换，同时
      暴露源代码、中断正常工程运作。
  wedgeClarity:
    score: 5
    rationale: >-
      第一个产品具体且可落地：针对托管 IDE 扩展机群的运行时监控与收敛能力。
  defensibility:
    score: 4
    rationale: >-
      将扩展行为、机密库与仓库爆炸半径关联的专有关系图，能形成通用端点或 AppSec
      工具所缺乏的切换成本。
  ventureScale:
    score: 4
    rationale: >-
      滩头市场从 VS Code 和 Cursor 起步，但可向更广泛的开发者运行时安全和软件
      交付栈上的机器身份治理延伸。
topRisks:
  - name: 原生平台追赶
    description: Microsoft、GitHub 或大型端点厂商可能加强扩展证明与策略控制，压缩细分市场空间。
    mitigation: 聚焦跨工具运行时行为、凭据爆炸半径映射和自动收敛工作流，打造超越 Marketplace 证明的差异化能力。
  - name: 端点部署阻力
    description: 如果安装过程或误报干扰了开发者工作流，安全团队可能拒绝再引入一个工作站 Agent。
    mitigation: 以托管机群遥测和监控模式起步，只在高置信度的机密访问与文件变更模式下才逐步开启强制执行。
  - name: 预算归属不明
    description: 买家可能将购买决策分散在端点、AppSec 和平台工程团队之间，拖慢初始销售周期。
    mitigation: 围绕缩短轮换时间、避免仓库或 CI 停服的具体事件响应 ROI 故事来销售，再打包满足各团队需求的集成能力。
