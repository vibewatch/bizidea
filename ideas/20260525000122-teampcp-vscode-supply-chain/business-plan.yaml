slug: ide-extension-trust-firewall
date: '2026-05-25'
executiveSummary: >-
  TeamPCP's poisoned Nx Console release showed that a verified VS Code extension
  can bridge from a developer laptop into repository theft and CI credential
  exposure in minutes, which creates a concrete control gap for software
  companies that standardize on VS Code or Cursor and GitHub Actions. The
  company should start with Series B-D software businesses that already manage
  extension policy for 300-1,500 engineers, because those buyers feel the pain
  acutely and can deploy one managed-fleet pilot without re-architecting their
  whole security stack. The product wedge is an audit-first extension trust
  firewall that observes runtime behaviors on workspace open, flags anomalous
  secret access or workflow mutation, and maps the likely blast radius across
  GitHub, cloud, vault, and password-manager identities. The first proof point
  is not broad prevention; it is cutting alert-to-containment time and reducing
  how many credentials and repositories have to be rotated after a suspicious
  extension event. The most important strategic choice is to stay narrowly
  focused on managed VS Code fleets and downstream credential containment before
  expanding into JetBrains, browser IDEs, or generalized AI agent governance.
  Research supports the urgency, the buyer profile, and the adjacent budget, but
  it does not yet prove how many target accounts centrally manage extension
  baselines tightly enough for fast rollout. The main disconfirming risk is that
  Microsoft, GitHub, or broader workstation-security vendors close the gap
  before the startup earns a behavioral data moat and trusted response
  workflows. This is investable as a pre-seed design-partner company if early
  pilots show low false-positive rates, credible integrations with AWS,
  GitHub, 1Password, and Vault, and at least one paid conversion triggered by
  an incident review or audit deadline.
problem:
  - >-
      Platform-security teams already use allowlists, secret scanning, and EDR,
      but those controls do not tell them what an approved IDE extension
      actually did at runtime before code reached review or CI.
  - >-
      When a workstation-side developer-tool compromise happens, responders
      often rotate too many credentials too slowly because they cannot quickly
      determine which repos, workflows, and machine identities the extension
      touched.
solution:
  - >-
      Deploy an audit-first trust firewall for managed VS Code fleets that
      profiles extension behavior at activation and workspace open, including
      secret-file access, shell execution, file mutation, and outbound network
      activity.
  - >-
      Pair detections with a credential and repository blast-radius graph plus
      scoped quarantine workflows for GitHub, AWS, Vault, Kubernetes, and
      1Password so customers can contain only the assets likely exposed.
whyWeWin:
  - >-
      The wedge is narrower than broad AppSec or endpoint security, so the
      product can reach proof faster by solving one urgent workflow where native
      controls are visibly incomplete.
  - >-
      A compounding moat can form from proprietary baselines of legitimate
      extension behavior and from incident data linking endpoint events to real
      credentials, repositories, and response playbooks.
strategicChoices:
  beachhead: >-
    Series B-D software companies with 300-1,500 engineers, centralized VS Code
    extension policy, GitHub Actions delivery, and local use of AWS, Vault,
    Kubernetes, or 1Password credentials during day-to-day development.
  wedgeRationale: >-
    This slice has the clearest urgency because one poisoned extension can
    create both workstation and CI fallout, and it is narrow enough that a
    single managed-fleet pilot can prove value faster than trying to cover every
    editor, package surface, and AI tool at once.
  sequencingRationale: >-
    The company should ship monitoring and blast-radius analysis before full
    auto-remediation, because buyers first need confidence that the sensor fits
    existing laptop controls and does not disrupt developers; once alert quality
    is proven, automated quarantine and rotation become easier to justify and
    price.
  notYet:
    - JetBrains, browser IDEs, and unmanaged contractor fleets
    - Full package-firewall coverage beyond extension-runtime events
    - General-purpose AI agent governance outside the IDE workstation
market:
  tam: >-
    Estimated TAM $6.2B based on 100M GitHub developers, 73.6% VS Code share,
    70% employed share, and a conservative $10 per protected developer per
    month.
  sam: >-
    Estimated SAM $744.0M by filtering to software companies with 300-1,500
    engineers, formal platform-security ownership, and managed developer
    environments.
  som: >-
    Estimated year-3 SOM $8.9M, roughly 1.2% of SAM, which implies winning a
    few dozen lighthouse accounts before the category is heavily bundled by
    incumbents.
  segments:
    - Platform-security and developer-platform teams in managed VS Code fleets
    - Endpoint-engineering and security-operations leaders responsible for engineering workstations
  buyingProcess: >-
    Deals should start after an extension incident, policy review, or audit
    request and usually require agreement from platform security, endpoint
    engineering, and the GitHub or cloud admin team. The practical land motion
    is a paid audit-mode pilot on one managed fleet, then expansion after the
    startup proves faster containment and acceptable false-positive rates.
product:
  mvp: >-
    Version one covers managed VS Code fleets only. It observes extension
    runtime behavior on activation and workspace open, flags high-risk secret
    access or workflow mutation, and produces a blast-radius report plus manual
    or API-triggered containment actions for GitHub, AWS, Vault, and
    1Password.
  sixMonth: >-
    Ship audit mode, approved-extension baselining, GitHub repository impact
    mapping, and first-party integrations for GitHub, AWS, Vault, 1Password,
    and Kubernetes credential sources.
  twelveMonth: >-
    Add policy tuning, automated scoped quarantine, production-ready incident
    drill workflows, and early Cursor or Open VSX compatibility for accounts
    already standardized on VS Code APIs.
  twentyFourMonth: >-
    Expand the policy plane to adjacent AI coding tools and additional editors
    only after the company has strong deployment references and a reusable
    machine-identity graph that makes cross-surface response meaningfully better
    than native controls.
  keyBets:
    - Buyers will tolerate an audit-first sensor on managed developer laptops if it fits existing endpoint controls.
    - Extension-behavior baselines can reach useful precision without blocking common developer workflows.
    - Scoped credential quarantine is valuable enough to justify a new budget line beyond existing AppSec spend.
    - VS Code-first data and integrations will create a faster moat than launching broad editor coverage immediately.
gtm:
  wedge: >-
    Sell an audit-mode extension trust firewall for one managed VS Code fleet
    and tie the pilot to a specific outcome, namely faster extension-incident
    containment with fewer unnecessary credential rotations.
  channels:
    - Incident-led outbound to platform-security and developer-platform leaders after extension or GitHub Actions scares
    - Design-partner selling through GitHub, secrets-management, and incident-response ecosystems
    - Credibility building in developer-security and platform-engineering communities
  funnelTargets: "Security review to qualified pilot 20-30%, pilot to weekly active deployment 70%+, pilot to paid production 50%+, first team to multi-business-unit expansion 40%+ within 12 months"
  pricing: >-
    Annual SaaS priced per protected developer workstation with a minimum
    platform fee, plus a premium tier for automated quarantine and
    investigations; this matches seat-based security budgets while tying price
    to the scope of developers and extensions actually protected.
businessModel:
  revenueStreams:
    - Annual subscription for protected developer workstations and managed extension coverage
    - Premium automation fees for scoped credential rotation and blast-radius investigations
    - High-touch onboarding and incident-drill services for enterprise rollouts
  unitOfValue: Protected developer workstation under managed extension policy
  targetGrossMarginPct: 78
  expansionLevers:
    - Expand from one managed fleet to more engineering business units and repositories
    - Add more secret systems and automated response actions per account
    - Extend from VS Code into adjacent editors and AI-assisted developer tools after proof
strategyMap:
  northStarMetric: Protected developers covered by an active extension policy with containment-ready credential mapping
  inputMetrics:
    - Approved extensions behavior-profiled per customer
    - Mean time from suspicious event to scoped containment recommendation
    - False-positive override rate per 100 protected developers
    - Pilot to production conversion rate
    - Production accounts expanding to a second business unit
  moatsToBuild:
    - Proprietary baseline corpus of legitimate extension runtime behavior
    - Customer-specific graph linking local secret systems, repos, and workflows
    - Library of tested containment playbooks across GitHub, AWS, Vault, 1Password, and Kubernetes
    - Incident data showing which detections convert into real customer savings and faster response
  killCriteria:
    - Fewer than 3 of the first 10 design-partner accounts can centrally enforce extension policy well enough to run the pilot
    - Audit-mode pilots generate more than 5 high-severity false positives per 100 developers per month after 60 days of tuning
    - Fewer than 2 paid pilots convert to annual production within 12 months despite a recent extension-policy or incident trigger
  mermaid: |
    flowchart LR
      Wedge[Managed VS Code fleet pilot] --> MVP[Runtime profiling and blast-radius graph]
      MVP --> Proof[Faster scoped containment with low false positives]
      Proof --> Expansion[More business units then adjacent editors and AI tools]
investorMemo:
  verdict:
    call: "Meet / investigate further"
    conviction: >-
      Strong incident-driven wedge with real buyer pain, but conviction depends
      on proving deployment readiness and budget ownership before incumbents
      bundle the category.
    whyBelieve: >-
      The startup targets a newly urgent control gap between marketplace trust
      signals and actual runtime behavior, and the researched first customer can
      buy on a concrete incident-response ROI story.
    whyDoubt: >-
      The category may close quickly if Microsoft, GitHub, Endor, or Aikido add
      comparable workstation controls before a standalone product earns a data
      and workflow advantage.
    nextDiligence: >-
      Validate with three design partners that a VS Code-only audit pilot can
      integrate with existing endpoint controls and cut containment time enough
      to win a paid production rollout.
  firstCustomer:
    title: Platform-security lead at a Series C dev-tools, security, or infrastructure software company
    profile: >-
      A 400-1,200 engineer company with standardized VS Code images, GitHub
      Actions release pipelines, and local AWS, Vault, or 1Password usage on
      developer laptops.
    trigger: A recent extension scare, extension-policy review, or enterprise audit asking how approved IDE tools are governed.
    buyer: Director or VP of platform engineering, head of product security, or CISO
    initialContract: >-
      A $40k-$80k paid 90-day pilot for one managed engineering fleet, expected
      to convert into a $120k-$250k annual deployment once GitHub and at least
      two major secret systems are integrated and containment MTTR improves by
      more than 50%.
  mustBeTrue:
    - At least half of interviewed target accounts already manage extension policies centrally enough to support a one-fleet pilot.
    - Buyers value scoped credential quarantine enough to pay beyond existing GitHub, AppSec, and EDR tooling.
    - Audit-mode detection can stay below the false-positive threshold that would cause developers to demand blanket allowlisting instead.
    - GitHub plus AWS, Vault, and 1Password integrations cover the majority of exposed secrets in the first beachhead accounts.
    - Microsoft and adjacent vendors do not ship equivalent runtime containment fast enough to commoditize the wedge in the next 18 months.
  diligenceQuestions:
    - How many target accounts can export current extension policy and version data on day one of a pilot?
    - Which buyer actually signs the first contract when platform security, endpoint engineering, and AppSec all touch the problem?
    - What incident-response time savings matter enough for a customer to convert from pilot to production?
    - Which secret stores and CI identities are mandatory in the first release versus nice to have?
    - How differentiated is the product if Microsoft improves attestation and admin defaults but not containment workflows?
operatingAssumptions:
  - assumption: Most beachhead accounts already have managed VS Code fleets and can deploy an audit-only sensor without reworking laptop management.
    basis: research.yaml
    validationTest: Win 3 design partners that can deploy the sensor to at least 200 developers within 45 days using existing endpoint controls.
    decisionImpact: If false, narrow the ICP to more centralized enterprises or move the product up-stack into repository-only monitoring.
  - assumption: GitHub, AWS, Vault, 1Password, and Kubernetes integrations cover the majority of high-value credential exposure in early accounts.
    basis: idea.yaml
    validationTest: For the first 5 pilots, map all credential types seen on sampled engineering workstations and confirm these integrations cover at least 80% of incident-critical credentials.
    decisionImpact: If false, the roadmap and hiring plan must shift toward broader secrets coverage before automation can be sold credibly.
  - assumption: Buyers will accept seat-based pricing with a minimum platform fee if the product reduces containment time and unnecessary rotation scope.
    basis: research.yaml
    validationTest: Convert at least 2 paid pilots to annual contracts at the target minimum fee without discounting below the planned floor.
    decisionImpact: If false, pricing must move toward incident-response or usage-based packaging and revenue ramp will slow.
  - assumption: Extension-behavior baselines can become accurate enough in audit mode before customers demand blocking.
    basis: operator judgment
    validationTest: Keep high-severity override rates below 5 per 100 developers per month by day 60 in at least 3 pilots.
    decisionImpact: If false, the product needs a narrower ruleset or more manual-service packaging before scalable SaaS rollout.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Interview 15 platform-security and developer-platform leaders in the beachhead ICP and collect their current extension-policy artifacts.
    hypothesis: At least 8 target accounts already manage extension allowlists or version controls centrally enough for a fast pilot.
    successMetric: 8 or more qualified accounts share policy details and agree to a follow-up pilot design session.
    owner: Founder CEO
  - horizon: 0–90 days
    experiment: Run a red-team lab on managed macOS and Windows images using common approved extensions plus a simulated malicious update.
    hypothesis: Audit-mode telemetry can distinguish risky secret access and workflow mutation without breaking normal editor workflows.
    successMetric: Detect the simulated malicious extension while keeping fewer than 3 severe false positives across 20 approved extensions.
    owner: Founding eng
  - horizon: 0–180 days
    experiment: Build design-partner integrations for GitHub, AWS, Vault, and 1Password and test blast-radius mapping on seeded credentials.
    hypothesis: The first integration set is sufficient to produce a response graph customers find operationally useful.
    successMetric: 3 design partners confirm that mapped assets cover at least 80% of the credentials they would rotate in a real incident.
    owner: Security integrations engineer
  - horizon: 0–180 days
    experiment: Sell 3 paid audit-mode pilots tied to a recent extension-policy review or security audit deadline.
    hypothesis: Incident-driven outbound and audit-triggered demand can produce paid pilots before the product offers full automated remediation.
    successMetric: 3 paid pilots signed with start dates inside 6 months and minimum pilot fees above $40k.
    owner: Founder CEO
  - horizon: 6–12 months
    experiment: Turn on scoped auto-quarantine for GitHub tokens and one cloud credential family in the most mature pilot.
    hypothesis: Customers will trust automation after 60 days of high-quality audit data and measurable containment gains.
    successMetric: One pilot moves from recommendation-only to automated containment and shows containment MTTR improved by more than 50%.
    owner: Security response lead
  - horizon: 12–18 months
    experiment: Expand one production customer from VS Code-only coverage to Cursor or Open VSX-compatible environments.
    hypothesis: Adjacent editor expansion increases account value without forcing a new buying motion.
    successMetric: One customer expands deployment by more than 25% in protected seats through adjacent editor coverage.
    owner: Product lead
operations:
  - Extension-policy ingestion from VS Code enterprise controls and golden-image workflows
  - Runtime telemetry pipeline that profiles extension activation, file mutation, process launch, and outbound network behavior
  - Credential graph service linking developer workstations to GitHub repos, cloud roles, secret stores, and CI workflows
  - Incident runbook engine for quarantine, rotation, and post-incident evidence collection
  - Red-team simulation lab on managed macOS and Windows developer images
team:
  - role: Founding eng
    startTiming: Month 0
    rationale: Build the runtime sensor, blast-radius graph, and first GitHub plus secrets integrations.
  - role: Founder CEO
    startTiming: Month 0
    rationale: Run design-partner sales, customer discovery, and incident-led outbound into platform-security buyers.
  - role: Security integrations engineer
    startTiming: Month 2
    rationale: Own AWS, Vault, 1Password, Kubernetes, and GitHub containment workflows that make the pilot operationally credible.
  - role: Detection engineer
    startTiming: Month 4
    rationale: Improve behavior baselines, reduce false positives, and codify high-confidence extension-risk rules.
  - role: Solutions engineer
    startTiming: Month 6
    rationale: Shorten enterprise deployment cycles and translate pilot findings into paid production rollouts.
milestones:
  - horizon: 0–12 months
    items:
      - Ship VS Code audit-mode MVP with GitHub repository impact mapping
      - Win 3 paid design-partner pilots in the beachhead ICP
      - Reach less than 5 severe false-positive overrides per 100 developers per month in tuned pilots
      - Launch first scoped containment actions for GitHub and one cloud or vault integration
  - horizon: 12–24 months
    items:
      - Convert at least 2 pilot accounts into annual production deployments
      - Add automated quarantine playbooks for GitHub, AWS, Vault, and 1Password
      - Expand one production account into a second business unit or adjacent editor environment
      - Publish customer evidence showing materially faster containment and narrower rotation scope than manual response
  - horizon: 24–36 months
    items:
      - Build a multi-surface machine-identity graph spanning IDE, CI, and AI coding-tool events
      - Add selective support for adjacent editors only where the same response workflow remains intact
      - Establish repeatable channel referrals through incident-response and secrets-management partners
      - Prepare for a larger growth round on the back of multi-account expansion and durable detection performance
risks:
  - risk: Microsoft, GitHub, or adjacent security vendors bundle comparable runtime controls before the startup earns differentiation.
    likelihood: Medium
    impact: High
    mitigation: Win on extension-specific containment workflows, customer data moat, and faster deployment into one managed fleet.
  - risk: False positives or laptop-performance overhead undermine trust with developers and platform teams.
    likelihood: High
    impact: High
    mitigation: Start in audit mode, baseline approved extensions first, and gate automation behind clear confidence thresholds.
  - risk: Buyer ownership remains split across platform engineering, AppSec, and endpoint teams, slowing first deals.
    likelihood: Medium
    impact: Medium
    mitigation: Sell on a concrete incident-response outcome and use a paid pilot that forces one executive sponsor to own the rollout.
  - risk: VS Code-only coverage feels too narrow for buyers with Cursor, Open VSX, or mixed-editor fleets.
    likelihood: Medium
    impact: Medium
    mitigation: Position VS Code as the proof wedge, then add compatible adjacent environments only after production reference accounts exist.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2–4M
  runwayMonths: 18
  useOfFundsSummary: >-
    Eighteen months should fund a five-person team, design-partner deployments,
    core GitHub and secrets integrations, an audit-first product launch, and
    enough customer evidence to prove pilot-to-production conversion before a
    seed round.
