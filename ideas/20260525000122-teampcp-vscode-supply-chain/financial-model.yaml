modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Leads --> PaidPilots
      PaidPilots --> ProductionAccounts
      ProductionAccounts --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: Revenue engine
    finding: Base-case revenue comes from converting three paid pilots into a modest enterprise logo base and then lifting ACV from roughly $144K to $200K through seat expansion and quarantine workflows.
  - checkName: Must go right
    finding: The company must keep pilot-to-production conversion near the modeled 90-day path while proving low false positives on one managed fleet.
  - checkName: Model breaks if
    finding: If fewer target accounts can centrally manage extension policy than the business plan assumes, both deployment speed and Q4Y3 customer count fall toward the downside case.
  - checkName: Next-round proof
    finding: Reaching 8 paying accounts by Q4Y2 with at least 2 production conversions and credible GitHub-plus-secrets containment should justify the next financing.
sanityChecks:
  ruleOf40: 'Y3 growth 321.3% + EBITDA margin 6.5% = 327.8% (inflated by the small Y2 revenue base).'
  burnMultiple: 'Y2 burn multiple is about 2.2x based on $1.24M burn to add roughly $0.58M of ARR from Q4Y1 to Q4Y2; the model turns EBITDA positive in Q3Y3.'
  revenuePerFte: '$353.9K Y3 using 11 Q4Y3 FTE (benchmark roughly $200–400K SaaS).'
  flags:
    - The base case still depends on landing 3 paid pilots by month 10 and then converting enterprise buyers without discounting below the planned minimum platform fee.
    - The source material does not prove how many 300-1,500 engineer targets can centrally manage extension baselines today, so deployment readiness is the main forecast risk.
    - Q4Y3 assumes 32 customers before broad editor expansion, so bundling by Microsoft, GitHub, Endor, or Aikido could compress both ACV and logo growth faster than the model allows.
