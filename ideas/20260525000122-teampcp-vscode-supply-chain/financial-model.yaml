assumptions:
  - id: A1
    name: Model start month
    value: '2026-06'
    unit: YYYY-MM
    source: '[BP date + BP fundingAsk] Model starts the first full month after the dated plan so the pre-seed cash is available before spend begins.'
  - id: A2
    name: Opening cash and pre-seed size
    value: '3300.0'
    unit: USDK
    source: '[BP fundingAsk targetFundingRangeUsd $2–4M + BP fundingAsk.runwayMonths 18] Base case uses a $3.3M pre-seed, slightly above the midpoint, to reach the Q4Y2 conversion milestone and still carry a 6-month buffer.'
  - id: A3
    name: Starting customers (M1)
    value: '0'
    unit: accounts
    source: '[BP product MVP + BP milestones 0–12 months] The company starts pre-revenue and must first ship audit mode plus the first GitHub and secrets integrations.'
  - id: A4
    name: Paid pilot price
    value: '72.0'
    unit: USDK per 90-day pilot
    source: '[BP investorMemo.firstCustomer.initialContract $40k-$80k paid 90-day pilot] Base case uses the upper-middle of the stated pilot range for one managed engineering fleet with incident-review urgency.'
  - id: A5
    name: Initial production ACV
    value: '144.0'
    unit: annualK per customer
    source: '[BP investorMemo.firstCustomer.initialContract $120k-$250k annual deployment] Base case uses the lower-middle of the stated production range to reflect a first fleet deployment with a minimum platform fee.'
  - id: A6
    name: Y3 exit ACV
    value: '200.0'
    unit: annualK per customer
    source: '[BP gtm.pricing + BP businessModel.expansionLevers + BP investorMemo.firstCustomer.initialContract] Assumes accounts expand protected seats and adopt quarantine and investigation workflows by Y3.'
  - id: A7
    name: Y1 customer ramp
    value: 'M6 1, M8 2, M10 3, M12 3 paying accounts'
    unit: customersEop
    source: '[BP milestones 0–12 months + BP experimentRoadmap] Directly anchored to winning 3 paid design-partner pilots in the first year.'
  - id: A8
    name: Y2 customer ramp
    value: 'Q1Y2 4, Q2Y2 5, Q3Y2 6, Q4Y2 8 paying accounts'
    unit: customersEop
    source: '[BP milestones 12–24 months] Assumes moderate enterprise conversion after the first pilots, with one expansion account but no broad channel scale yet.'
  - id: A9
    name: Y3 customer ramp
    value: 'Q1Y3 11, Q2Y3 15, Q3Y3 22, Q4Y3 32 paying accounts'
    unit: customersEop
    source: '[BP milestones 24–36 months + research market.som] Keeps the base case at a few dozen lighthouse accounts, consistent with the researched Y3 SOM and the plan to stay VS Code-first.'
  - id: A10
    name: Revenue recognition ladder
    value: 'Y1 M6-M12 uses $24K monthly pilot revenue per account; Y2 quarterly realized price per account is $36K, $36K, $40K, $45K; Y3 quarterly realized price per account is $45K, $48K, $49K, $50K'
    unit: USDK per customer period
    source: '[A4 + A5 + A6 + BP sequencingRationale] Revenue is recognized as customersEop multiplied by a blended realized price that transitions from pilot fees to production subscriptions plus automation upsell.'
  - id: A11
    name: Gross margin ramp
    value: 'Y1 50.0%, Y2 71.8%, Y3 77.6%; quarterly path 68%, 70%, 72%, 74%, 76%, 77%, 78%, 78%'
    unit: percent
    source: '[BP businessModel.targetGrossMarginPct 78 + BP strategicChoices.sequencingRationale] Early pilots include heavier onboarding and investigation support before the business reaches the target margin by Y3.'
  - id: A12
    name: Monthly logo churn for unit economics
    value: '1.8'
    unit: percent
    source: '[Startup-finance heuristic] Enterprise security tooling with annual contracts should retain better than SMB SaaS, but the category is early and exposed to bundling risk.'
  - id: A13
    name: Steady-state CAC
    value: '75.0'
    unit: USDK per customer
    source: '[BP gtm.channels + BP gtm.funnelTargets + research reportMemo.buyingTriggers] Incident-led enterprise security selling and paid pilots justify a higher CAC than horizontal SaaS.'
  - id: A14
    name: Loaded salary bands
    value: 'Founder 180; Engineering 220; Security/Detection 210; Solutions/Success 180; Sales/GTM 230; G&A 140'
    unit: annualK per FTE
    source: '[BP team + startup-finance heuristic] Uses lean but senior US software-security cash compensation with payroll taxes and benefits included.'
  - id: A15
    name: Hiring schedule
    value: 'Security integrations M2; detection engineer M4; solutions engineer M6; first GTM hire M15; second engineer M17; customer success M19; third engineer M28; second GTM M31; G&A M33'
    unit: timing
    source: '[BP team + BP strategicChoices.sequencingRationale] Hiring stays behind proof of signal quality and pilot conversion instead of staffing ahead of demand.'
  - id: A16
    name: Headcount endpoint
    value: '3 FTE by Q1Y1, 5 by Q2Y1, 8 by Q4Y2, and 11 by Q4Y3'
    unit: FTE
    source: '[BP team + BP fundingAsk] Keeps the company lean enough for a pre-seed while still covering product, integrations, deployment, and founder-led GTM.'
  - id: A17
    name: Opex schedule
    value: 'Y1 monthly opex ramps from $75K to $134K; Y2 quarterly opex is $420K, $450K, $495K, $540K; Y3 quarterly opex is $600K, $660K, $725K, $780K'
    unit: USDK
    source: '[BP operations + BP experimentRoadmap + startup-finance heuristic] Spend ramps with red-team lab, enterprise deployment work, travel, insurance, and compliance, while remaining concentrated in product and integrations.'
  - id: A18
    name: Functional opex mix
    value: 'R&D remains the largest line through Y3; sales and marketing ramps after M15; G&A rises with enterprise security insurance, legal, and compliance needs'
    unit: policy
    source: '[BP operations + BP fundingAsk.useOfFundsSummary] Department lines are modeled as total functional spend, while salaryK is a disclosed payroll memo line for reconciliation rather than an extra expense on top of opex.'
  - id: A19
    name: Cash flow simplification
    value: Ending cash equals opening cash plus cumulative EBITDA
    unit: formula
    source: '[Startup-finance heuristic] Assumes minimal capex, debt, working-capital distortion, and deferred-revenue timing effects for an asset-light software company.'
  - id: A20
    name: Funding sizing rule
    value: Raise enough to reach the Q4Y2 proof point and preserve about 6 months of operating buffer
    unit: policy
    source: '[BP fundingAsk.runwayMonths 18 + model requirement] The round is sized to the next financing milestone plus buffer rather than to the shortest possible survival runway.'
