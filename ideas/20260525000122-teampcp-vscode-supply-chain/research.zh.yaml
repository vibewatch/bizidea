    - 6
  - factor: social
    impact: positive
    point: GitHub 上的 AI 辅助开发活动持续增长，而高知名度的开发者工具事件让安全团队对高权限工作流保持警惕，增加了对额外管控的接受度。
    sourceRefs:
    - 14
