reportMemo:
  executiveTakeaways:
  - "已验证发布者徽章和 Marketplace 扫描降低了风险，但并未消除风险：扩展以 VS Code 级别的权限运行，一次短暂的投毒 Nx Console 版本发布仍然导致 GitHub 仓库被窃。"
  - 目标买家已有白名单、机密扫描和 GitHub Actions 加固，但他们缺少一款能将扩展运行时行为与即时凭据隔离和仓库爆炸半径分析关联起来的产品。
  - "市场被非人类凭据的结构性蔓延所拉动：一台被入侵的开发者工作站可以在代码审查发现任何异常之前，桥接到云、Vault、密码管理器和 CI 身份。"
  - 竞争在相邻品类中已十分激烈，但精确缺口仍是扩展专项运行时收敛，而非单独的依赖扫描或下游 CI 加固。
  marketDefinition: 这个市场处于开发者工作站安全、软件供应链安全和机器身份治理的交叉地带。近期切口是在托管 VS Code 或 Cursor 机群中监控并收敛高风险 IDE 扩展行为，防止其蔓延至仓库、CI 和云凭据。
  customerAndBuyer: 主要用户是拥有 300–1,500 名工程师、标准化 VS Code 或 Cursor 环境和 GitHub Actions 交付流程的软件公司的平台安全与开发者平台工程师。经济买家是平台工程总监或副总裁、产品安全负责人以及已掌管开发者工具策略和事件响应的 CISO。
  buyingTriggers:
  - point: 一起具体的扩展事件或高层对已批准工具可信度的审查，能将 Marketplace 验证从一个安慰信号变成董事会级别的管控缺口。
    sourceRefs:
    - 21
    - 23
    - 36
  - point: Megalodon 等工作流入侵事件让平台团队意识到，单个开发者侧立足点可以蔓延到 CI、云和仓库机密。
    sourceRefs:
    - 10
    - 16
  - point: 机器身份蔓延提高了人工响应成本，因为被入侵的工作站能暴露的非人类凭据远超安全团队能快速手工列举的数量。
    sourceRefs:
    - 9
    - 7
    - 2
  - point: AI 编码和 Agent 落地增加了购买额外防护的付费意愿，因为本地工具现在更自主地读取仓库、运行命令并接触机密。
    sourceRefs:
    - 14
    - 5
  willingnessToPay:
    summary: 可比的 AppSec 和供应链厂商已有按席位或企业计划的定价，这支持了只要能明确缩短事件响应时间和凭据轮换范围，针对更窄的扩展运行时管控同样存在预算空间。
    sourceRefs:
    - 27
    - 30
    - 6
  competitiveLandscape: Endor 是最近的战略竞争对手，因为它已将 AI 编码 Agent 和工作站定位为新的控制平面。Aikido 是最接近的端点替代方案，提供设备上拦截和最低版本龄控制。Socket、Snyk 和 GitHub 掌握依赖和仓库原生预算，而 StepSecurity 则在下游 GitHub Actions 加固方面最强，而非 IDE 立足点环节。
  incumbentThesis:
  - incumbentClass: Microsoft 与 GitHub 原生控制
    point: Microsoft 和 GitHub 已提供发布者信任、白名单、机密扫描和工作流加固，但不在运行时检查扩展行为，也不在检测到可疑行为后自动隔离该恶意扩展所接触的具体凭据。
    sourceRefs:
    - 36
    - 37
    - 23
  - incumbentClass: 代码仓库与依赖安全平台
    point: GitHub Advanced Security、Socket 和 Snyk 掌握仓库原生和软件包情报工作流，但它们更聚焦于依赖、Pull Request 和已推送代码，而非开发者机器上的扩展进程行为。
    sourceRefs:
    - 31
    - 29
    - 28
  - incumbentClass: Agent 治理与工作站安全厂商
    point: Endor 和 Aikido 验证了对工作站和 Agent 管控的市场需求，但其现有定位比扩展专项隔离和仓库影响映射更宽泛，为更精准的切口产品留下了空间。
    sourceRefs:
    - 5
    - 6
  - incumbentClass: CI 加固专项厂商
    point: StepSecurity 在恶意工作流代码进入 GitHub Actions 之后效果最强，但无法阻止 IDE 扩展在开发者工作站上窃取凭据的初始动作。
    sourceRefs:
    - 34
  regulatoryLandscape: 目前尚无针对 IDE 扩展运行时管控的具体法规，但安全 SDLC 和供应链框架正在推动买家走向更具可审计性的开发者工具治理。SSDF、SLSA 和 OWASP CI/CD 指南均强调在部署上游建立更强的来源追溯、工作流完整性和预防性管控。
  technologyLandscape: "核心技术事实是清晰的：VS Code 扩展主机拥有与 VS Code 相同的权限，企业管理员已可通过中央策略对扩展进行白名单和版本固定，开发者笔记本上通常持有云、Vault、Kubernetes 和密码管理器凭据（存于本地凭据链或配置文件中）。这使得运行时检查和收敛在技术上切实可行。"
  distributionChannels:
  - point: 通过已负责扩展策略和标准镜像的平台安全与开发者平台团队切入托管 VS Code 机群。
    sourceRefs:
    - 37
    - 19
  - point: 在扩展或 GitHub Actions 安全事件后，以事件驱动的主动触达切入——此时现有替代方案显得被动且力不从心。
    sourceRefs:
    - 21
    - 5
  - point: 通过 GitHub 和机密管理生态系的合作伙伴主导落地是可行的，因为买家已依赖这些系统进行认证、CI 和策略管理。
    sourceRefs:
    - 1
    - 20
  partnershipEcosystem:
  - point: Microsoft 和 VS Code 管理员控制是自然的策略摄取合作伙伴，因为扩展白名单和发布者信任已在机群层面存在。
    sourceRefs:
    - 36
    - 37
    - 23
  - point: GitHub 仍是最佳的下游富集合作伙伴，因为依赖审查、机密扫描和工作流安全数据都有助于在端点事件后确定仓库爆炸半径。
    sourceRefs:
    - 11
    - 12
    - 15
    - 17
  - point: 机密提供商在第一天就至关重要，因为买家会根据产品能否真正隔离 AWS、1Password、Vault 和 Kubernetes 中的凭据来判断其价值——而不仅仅是发出告警。
    sourceRefs:
    - 4
    - 1
    - 20
    - 22
  dataMoats:
  - point: 持久的护城河可以来自合法扩展在文件访问、进程启动和网络模式方面的运行时行为基线。
    sourceRefs:
    - 36
    - 35
    - 23
  - point: 另一个护城河是将扩展事件与本地机密系统和配置路径关联起来的凭据关系图——大多数 AppSec 工具目前并未对此建模。
    sourceRefs:
    - 9
    - 8
    - 3
    - 1
    - 20
    - 22
  - point: Marketplace Token 和包发布者遥测可以复合成跨来源的声誉关系图，比单纯的静态来源检查更快发现高风险更新。
    sourceRefs:
    - 38
    - 39
    - 40
  geographicConsiderations:
  - point: GitHub 报告其开发者基础持续全球增长，因此工作站优先的安全产品必须支持分布式、多地域的工程团队，而非假设安全团队集中在一处。
    sourceRefs:
    - 14
  - point: 买家画像在大型企业中更为成熟，因为平台工程采用在拥有 500 名以上员工的正式平台团队的组织中已是主流。
    sourceRefs:
    - 19
  sensitivityCases:
  - case: Microsoft 实质性强化扩展证明、信任提示和管理员策略默认值
    impact: 初创公司必须从信任信号聚合转向差异化的运行时检测、爆炸半径映射和凭据收敛。
    sourceRefs:
    - 37
    - 23
  - case: GitHub、Endor 或 Aikido 将工作站检测捆绑至现有平台
    impact: 定价能力迅速收窄；初创公司需要凭借更快的部署速度、更低的误报率或更深的扩展专项响应工作流胜出。
    sourceRefs:
    - 5
  - case: 攻击者从 VS Code Marketplace 转向 Open VSX、Cursor 以及相邻的包或 CI 攻击面
    impact: 除非将策略平面扩展至更广泛的 AI 辅助开发者环境，否则 VS Code 单一产品将显得过于狭窄。
    sourceRefs:
    - 38
    - 29
  validationPlan:
  - priority: high
    question: 目前有多少目标账户已在 VS Code 或 Cursor 上集中管理扩展白名单和版本？
    evidenceToGather: 10 次共创客户访谈，加上来自托管机群管理员的已导出策略配置。
  - priority: high
    question: 平台安全团队能接受多高的误报率，超过该阈值才会默认拦截扩展安装或更新？
    evidenceToGather: 仅审计模式试点数据，显示常见工程扩展在 30 天内的告警与覆盖比率。
  - priority: medium
    question: 哪些机密系统必须在第一天集成才能让隔离能力显得可信？
    evidenceToGather: 来自目标买家的事件后凭据库，涵盖 AWS、1Password、Vault、Kubernetes 和 GitHub。
  - priority: medium
    question: 轻量级运行时传感器能否与现有端点管控共存而不破坏开发者工作流？
    evidenceToGather: 在托管 macOS 和 Windows 开发者镜像上的红队模拟和端点性能基准测试。
