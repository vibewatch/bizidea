  - factor: technological
    impact: positive
    point: 扩展和 Agent 工具现在跨越文件系统、软件包、机密和 CI，形成了传统仓库扫描器无法观测的独特运行时攻击面。
    sourceRefs:
    - 36
  - factor: legal
    impact: positive
    point: 围绕来源追溯、策略执行和工作流完整性的框架性期望，使得在没有特定法规之前就能更容易为预防性管控提供依据。
    sourceRefs:
    - 26
    - 25
  adoptionFrictionMatrix:
  - friction: 另一个端点或编辑器侧管控可能被视为运营负担过重
    severity: high
    affectedBuyer: 平台工程负责人
    mitigation: 以审计模式起步，接入现有扩展白名单而非替换它们。
    sourceRefs:
    - 37
    - 19
  - friction: 对合法扩展活动的误报可能损害开发者信任
    severity: high
    affectedBuyer: 开发者效率负责人
    mitigation: 在已批准扩展上训练行为基线，支持每个扩展的版本固定和快速覆盖工作流。
    sourceRefs:
    - 36
    - 37
  - friction: 当工作站持有大量非人类身份时，精准隔离正确的凭据很有难度
    severity: high
    affectedBuyer: 产品安全团队
    mitigation: 优先与最常见的机密链集成，维护凭据关系图而非发出笼统的全量轮换建议。
    sourceRefs:
    - 9
    - 7
    - 2
  - friction: 对于使用 Cursor 或其他 VSCode 衍生编辑器的买家，VS Code 单一覆盖可能显得过于狭窄
    severity: medium
    affectedBuyer: CISO
    mitigation: 第一版锚定 VS Code API，但快速将 Open VSX 和 AI 编辑器兼容性纳入路线图。
    sourceRefs:
    - 38
market:
  tam:
    value: $6.2B
    rationale: "自下而上测算：1 亿 GitHub 开发者 × 73.6% VS Code 占比 × 70% 在职比例 × 每位受保护开发者每月 $10（保守折扣自 GitHub 机密保护和代码安全席位定价），即 100M × 0.736 × 0.70 × $10 × 12。"
    isEstimate: true
    sourceRefs:
    - 14
    - 32
    - 33
  sam:
    value: $744.0M
    rationale: 对 TAM 应用 12% 的滩头筛选系数，筛选条件为拥有 300–1,500 名工程师、正式平台/安全职能和托管开发者环境的软件公司；估算锚定于 500 名以上员工组织中的平台工程采用率。
    isEstimate: true
    sourceRefs:
    - 19
    - 33
  som:
    value: $8.9M
    rationale: 第 3 年可达市场份额建模为约占 SAM 的 1.2%，对应在品类被在位企业大规模捆绑前拿下数十个共创客户和灯塔账户。
    isEstimate: true
    sourceRefs:
    - 29
