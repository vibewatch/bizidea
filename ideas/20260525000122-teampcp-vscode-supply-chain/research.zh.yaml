  stage: scale-up
  wedge: 软件包声誉、依赖情报、GitHub PR 覆盖以及企业包防火墙部署。
  pricing: 开源免费；创业折扣和企业计划按需询价。
  strength: 供应链品牌强劲，已有以 GitHub 为核心的企业防火墙部署动作。
  weaknessVsUs: 更专注于软件包和 PR，而非开发者机器上已安装可信 IDE 扩展的运行时行为。
  sourceRefs:
  - 29
  - 31
  - 30
- name: StepSecurity
  stage: scale-up
  wedge: 面向公开和企业仓库的 GitHub Actions 加固和 CI/CD 攻击路径削减。
  pricing: 定制企业打包报价。
  strength: 下游 CI 态势强劲，具体的 GitHub Actions 威胁教育内容丰富。
  weaknessVsUs: 聚焦于恶意变更进入 CI 后的工作流和 Runner 风险，而非开发者笔记本上 IDE 扩展的运行时行为。
  sourceRefs:
  - 34
- name: Aikido Security
  stage: scale-up
  wedge: 针对软件包、扩展和 AI 工具的设备上恶意软件拦截和最低版本龄策略。
  pricing: 定制企业报价。
  strength: 清晰的设备上故事，直接引用了 Nx Console 类扩展攻击模式。
  weaknessVsUs: 现有定位更强调黑名单和版本龄限制，深度凭据关系图和事件专项隔离工作流方面较弱。
  sourceRefs:
  - 5
  - 6
- name: Snyk
  stage: incumbent
  wedge: 含 IDE 插件和按贡献者计费打包的广义 AppSec 和软件供应链平台。
  pricing: 免费版、Team、Ignite 和 Enterprise 分级，按贡献开发者计费或按报价。
  strength: 已有成熟的预算线和广泛的开发者安全覆盖。
  weaknessVsUs: 产品广度使本地扩展运行时收敛成为子功能机会，而非产品核心。
  sourceRefs:
  - 28
regulatoryTechnicalConstraints:
- point: VS Code 扩展继承 VS Code 级别的权限，因此任何可信的管控必须在本地实时观测活动，而非仅依赖仓库扫描。
  sourceRefs:
  - 36
  - 35
- point: 企业扩展白名单和版本固定已存在，新产品必须在不强迫客户替换这些管控的前提下进行补充。
  sourceRefs:
  - 37
- point: GitHub Actions 和云认证使用短期、工作流铸造的身份，收敛必须覆盖超越长期静态机密的范围。
  sourceRefs:
  - 13
  - 16
- point: 开发者工作站通常通过环境变量、配置文件、kubeconfig、服务账户和本地机密工具暴露凭据，扩展可触达的爆炸半径因此更广。
  sourceRefs:
  - 4
  - 3
  - 22
  - 1
  - 20
validationSignals:
- point: Microsoft 在 VS Code 1.96 中新增了组织级别的允许扩展和版本控制，显示企业买家已在要求集中化的扩展治理。
  sourceRefs:
  - 37
- point: Microsoft 报告 2025 年审查了 136 个扩展并删除了其中 110 个恶意扩展，证明扩展 Marketplace 滥用已足够活跃，产生了有意义的修复量。
  sourceRefs:
  - 23
- point: Wiz 在 500 多个扩展中发现了 550 个经验证的机密，包括超过 100 个泄露的 VS Code Marketplace PAT，证明扩展更新通道本身可以成为攻击向量。
  sourceRefs:
  - 38
- point: StepSecurity 记录了 5,500 多个仓库在六小时内遭受恶意工作流注入，强化了将端点检测与 CI 收敛连接起来的下游价值。
  sourceRefs:
  - 34
openQuestions:
- 现有多少 300–1,500 名工程师规模的软件公司已集中管理 VS Code 或 Cursor 扩展基线，足以支持快速试点？
- 平台安全团队能接受多高的误报阈值，超过该阈值就会停止自动拦截高风险扩展更新？
- 哪些机密存储和 CI 身份在第一个版本中必须集成，才能让隔离和爆炸半径报告在真实事件中可信？
- Microsoft、GitHub、Endor 或 Aikido 会以多快的速度用更强的原生扩展运行时或工作站管控填补这一缺口？
