  adoptionFrictionMatrix:
  - friction: Another endpoint or editor-side control may be seen as operationally heavy
    severity: high
    affectedBuyer: Platform engineering leader
    mitigation: Launch in audit mode first and integrate with existing extension allowlists rather than replacing them.
    sourceRefs:
    - 37
    - 19
  - friction: False positives on legitimate extension activity could hurt developer trust
    severity: high
    affectedBuyer: Developer productivity owner
    mitigation: Train behavior baselines on approved extensions and support per-extension version pinning plus rapid override workflows.
    sourceRefs:
    - 36
    - 37
  - friction: Containing the right credentials is hard when workstations hold many non-human identities
    severity: high
    affectedBuyer: Product security team
    mitigation: Prioritize integrations with the most common secret chains and maintain a credential graph instead of issuing generic rotate-everything advice.
