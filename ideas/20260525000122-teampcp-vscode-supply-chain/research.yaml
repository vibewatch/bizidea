    impact: positive
    point: AI-assisted development activity is rising on GitHub while high-profile developer-tool incidents keep security teams cautious, which increases tolerance for extra controls around high-privilege workflows.
    sourceRefs:
    - 14
    - 5
  - factor: technological
    impact: positive
    point: Extensions and agent tools now reach across filesystems, packages, secrets, and CI, creating a distinct runtime attack surface that legacy repo scanners do not observe.
    sourceRefs:
    - 36
  - factor: legal
    impact: positive
    point: Framework-driven expectations around provenance, policy enforcement, and workflow integrity make it easier to justify preventive controls even before a specific mandate appears.
    sourceRefs:
