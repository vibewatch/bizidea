  validationPlan:
  - priority: 高
    question: 开发商会在站点控制前采购，还是只有在已经聘请顾问后才会采购？
    evidenceToGather: 访谈 5-8 位欧洲托管型数据中心和 AI 园区开发负责人，了解土地选择权前后支出审批权的差异。
  - priority: 高
    question: 哪 2-3 个辖区的电网 + 市政工作流具有足够重复性，适合优先产品化？
    evidenceToGather: 收集 20 份近期申请材料包，并与芬兰、荷兰和德国的本地顾问复盘。
  - priority: 中
    question: 什么样的最小数据集能够形成可靠的 48 小时 no-go 决策？
    evidenceToGather: 围绕地块、变电站、光纤、水资源和许可变量，对 15 个历史项目进行回测。
  - priority: 中
    question: EPC 或工程顾问能否成为渠道，而不会把公司拉向咨询型经济模型？
    evidenceToGather: 与 2 家咨询机构试行转介绍和限定范围实施条款，并衡量服务尾部风险。
