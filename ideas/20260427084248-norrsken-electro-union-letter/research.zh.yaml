  sensitivityCases:
  - case: 《Cloud and AI Development Act》显著加快可持续数据中心许可
    impact: 上行情景：更多项目从观望转入积极站点筛选，扩大短期 SAM，并缩短工作流软件的回本周期。
    sourceRefs:
