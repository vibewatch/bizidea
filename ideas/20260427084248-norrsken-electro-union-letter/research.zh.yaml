  - case: AI capex 暂停，或 hyperscaler 需求集中到少数超大型园区
    impact: 下行情景：即使 MW 增长，项目数量仍会下降，减少工作流席位数，并把创业公司推向更高接触式的大客户交易。
    sourceRefs:
    - 3
