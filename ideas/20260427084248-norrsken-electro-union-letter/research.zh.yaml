market:
  tam:
    value: $36.0M
    rationale: 欧洲大负载数据中心开发工作流支出的保守 TAM：以 JLL 给出的 2025 年 FLAP-D 在运容量 3.6 GW 作为下限锚点，套用欧盟“数据中心容量至少增至 3 倍”的政策信号（对应在该基数上新增 7.2 GW），再按平均每个项目阶段 40 MW 估算，可得到 180 个项目阶段；每个活跃阶段按 $200k 年度工作流预算计算。这里还没把工厂电气化和大多数非核心欧盟市场算进去。
    isEstimate: true
    sourceRefs:
    - 3
    - 18
    - 28
  sam:
    value: $9.0M
    rationale: 短期 SAM 假设，建模出来的欧洲项目阶段 TAM 中约 25% 落在北欧、德国和荷兰这个滩头市场；仅芬兰就已报告 100 个待建项目，而荷兰行业报告也持续强调电网瓶颈。即 45 个项目阶段 × 每个 $200k。
    isEstimate: true
    sourceRefs:
    - 4
    - 5
    - 9
    - 10
  som:
    value: $2.4M
    rationale: Y3 的 SOM 假设覆盖约 8-10 个开发账户、12 个项目阶段，每个阶段约 $200k；前提是创业公司成为更早期的“筛选 + 提交”工作流，而不是只做一层轻咨询覆盖。
    isEstimate: true
    sourceRefs:
    - 19
    - 20
    - 28
    - 29
bottomUpSizingDrivers:
- driver: 下限容量锚点
  value: 2025 年 FLAP-D 在运容量 3.6 GW
  source: '[3]'
- driver: 政策扩张信号
  value: 欧盟目标是在 5-7 年内至少把数据中心容量扩至 3 倍
  source: '[18]'
- driver: 平均项目阶段规模
  value: 40 MW 估算值，落在 10-100 MW 滩头范围内，低于 hyperscale 的 100+ MW
  source: calc from [28] and thesis
- driver: 每个活跃阶段的工作流预算
  value: 估算 $200k = $150k 平台费 + $50k 项目工作流费
  source: est.
categoryDynamics:
  growthRate: 若欧盟在 6 年内把容量扩到 3 倍，则对应隐含年化增长约 20%
  growthRateSourceRefs:
  - 18
  tailwinds:
  - point: 欧盟政策已经明确希望扩张 AI 与数据中心基础设施，而不只是“勉强容忍”它的存在。
    sourceRefs:
    - 12
    - 18
  - point: 电网、储能和 PPA 改革，让“拿电路径”越来越像一个可以被软件解决的工作流。
    sourceRefs:
    - 13
    - 16
    - 17
  - point: 北欧仍因供电可靠、电价更低以及可再生能源可得性，对大负载选址很有吸引力。
    sourceRefs:
    - 9
    - 10
    - 26
  headwinds:
  - point: 在成熟枢纽市场，并网等待时间可能长达十年，这不是软件单独就能抹平的问题。
    sourceRefs:
    - 3
  - point: 社区反对和本地环境约束，仍可能在后期直接杀掉项目。
    sourceRefs:
    - 28
    - 29
  - point: 围绕能耗、用水和可持续性的监管审视，会让证明材料更复杂，即使市场本身还在增长。
    sourceRefs:
    - 11
    - 12
competitors:
- name: Paces
  stage: scale-up
  wedge: 面向电力与数据中心开发商的 AI 辅助选址、模块化尽调与拿电路径工作流。
  pricing: Custom / contact sales
  strength: 最接近的产品类比；对可行地块、更实时的电网模型和更快尽调有很强的 framing。
  weaknessVsUs: 以美国为先，覆盖范围也更偏广泛电力开发；并未明确围绕“欧洲市政许可 + 大负载地块筛选”做定位。
  sourceRefs:
  - 19
  - 20
  - 21
- name: Neara
  stage: scale-up
  wedge: 以物理模型驱动的公用事业 digital twin，用于网络建模、韧性分析和设计自动化。
  pricing: Custom / contact sales
  strength: 在公用事业侧有很强的技术可信度，digital twin 定位也很鲜明。
  weaknessVsUs: 它优化的是公用事业公司的网络规划，而不是开发商侧的地块排序、辖区模板或提交流程。
  sourceRefs:
  - 27
  - 30
- name: Piclo
  stage: scale-up
  wedge: 面向网络灵活性采购与运营的独立市场平台。
  pricing: Custom / contact sales
  strength: 真正连接 DSO/TSO 分发体系，也具备对受限本地市场的运营可见性。
  weaknessVsUs: 它解决的是灵活性变现与调度，不负责大负载地块选择或许可材料生成。
  sourceRefs:
  - 22
  - 23
  - 24
- name: Ramboll
  stage: incumbent
  wedge: 覆盖数据中心全生命周期的选址、尽调、工程设计与许可服务。
  pricing: Custom advisory / project fees
  strength: 值得信任的 incumbent，能同时覆盖电力、用水、社区沟通和许可。
  weaknessVsUs: 以服务交付为主，扩张速度慢，也不擅长把重复经验沉淀成开发商侧的 system of record。
  sourceRefs:
  - 28
  - 29
regulatoryTechnicalConstraints:
- point: 并网规则、门槛和可行性高度依赖本地 TSO/DSO 条件，因此不存在一套足够覆盖全欧洲的统一数据模型。
  sourceRefs:
  - 9
  - 10
- point: 数据中心报告与评级规则，抬高了围绕能耗、用水和可再生能源采购的证据负担。
  sourceRefs:
  - 11
  - 12
- point: 有价值的建议越来越依赖把并网、PPA、储能和灵活性连起来，而不是把它们分成孤立工作流。
  sourceRefs:
  - 13
  - 16
  - 17
  - 23
- point: 输出必须能被内部委员会、顾问和主管部门解释清楚；黑盒打分不足以支撑真实许可申请。
  sourceRefs:
  - 20
  - 21
  - 28
- point: 社区接受度、用水、噪音与土地用途约束，仍超出软件供应商的直接控制范围。
  sourceRefs:
  - 28
  - 29
validationSignals:
- point: 欧盟已明确提出，未来 5-7 年要把数据中心容量扩到 3 倍。
  sourceRefs:
  - 18
- point: FLAP-D 空置率已降至 6.3%，且 83% 的 pipeline 已被预租，说明稀缺性是真实存在的。
  sourceRefs:
  - 3
- point: 芬兰报告称有 100 个待建数据中心项目，并计划在 8 年内新增 4,000+ MW 南向输电能力。
  sourceRefs:
  - 10
- point: 荷兰市场报告已从“增长叙事”转向“瓶颈叙事”，与创业 thesis 高度一致。
  sourceRefs:
  - 4
  - 5
- point: Piclo 的 DSO/TSO 档案显示，灵活性市场正扩展到停电管理和本地约束场景，从而抬高了“负载 + 灵活性联动规划”的价值。
  sourceRefs:
  - 23
  - 24
- point: Paces 正在推出更贴近数据中心、更实时的电网工作流功能，这验证了买方确实想买软件，而不只是研究报告。
  sourceRefs:
  - 19
  - 20
  - 21
openQuestions:
- 欧洲的 colocation 与 AI 园区开发商，会在拿到 site control 之前购买工作流订阅，还是一定要等到顾问预算已经拨好？
- 哪些首批司法辖区具备足够的公用事业与市政流程重复性，能让模板累积成真正的护城河？
- 产品能否在不变成定制工程服务的前提下，把地块可行性的 no-go 判断压缩到 48 小时？
- 哪一类伙伴——工程顾问、EPC、公用事业公司，还是能源市场专家——能加速分发，又不压垮毛利？
