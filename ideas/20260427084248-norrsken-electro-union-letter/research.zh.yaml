market:
  tam:
    value: $36.0M
    rationale: 欧洲大负载数据中心开发工作流支出的保守 TAM（含滩头相邻市场）：以 JLL 所示 2025 年 FLAP-D 在运容量 3.6 GW 作为下限代理，套用欧委会提出的数据中心容量扩至 3 倍目标（即在该基数上新增 7.2 GW），再除以估算的平均项目阶段规模 40 MW，得到 180 个项目阶段，并乘以每个活跃阶段估算的 $200k 年工作流预算。该口径不含工厂电气化和多数非核心欧盟市场。
    isEstimate: true
    sourceRefs:
    - 3
    - 18
    - 28
  sam:
    value: $9.0M
    rationale: 短期 SAM 假设：建模得到的欧洲项目阶段 TAM 中，约 25% 位于北欧、德国和荷兰这三个建议滩头市场；其中仅芬兰就报告有 100 个待定项目，而荷兰行业报告也显示持续的电网瓶颈。即 45 个建模项目阶段 × $200k。
    isEstimate: true
    sourceRefs:
    - 4
    - 5
    - 9
    - 10
  som:
    value: $2.4M
    rationale: Y3 SOM 假设：约 8-10 个开发账户中覆盖 12 个项目阶段，每个阶段约 $200k；只有当创业公司真正成为更前置的“筛选 + 提交”工作流，而不是轻量咨询覆盖层时，这一假设才可信。
    isEstimate: true
    sourceRefs:
    - 19
    - 20
    - 28
    - 29
