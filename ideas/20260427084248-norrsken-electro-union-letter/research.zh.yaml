- driver: 平均项目阶段规模
  value: 估算 40 MW，位于 10-100 MW 滩头区间内；低于 >100 MW 的 hyperscale
  source: calc from [28] and thesis
- driver: 每个活跃阶段的工作流支出
  value: 估算 $200k = $150k 平台费 + $50k 项目工作流费
  source: est.
categoryDynamics:
  growthRate: 如果欧盟在 6 年内将容量扩大到 3 倍，则隐含欧盟数据中心容量年增长约为 ~20%
  growthRateSourceRefs:
  - 18
  tailwinds:
  - point: 欧盟政策现在明确以增长 AI 与数据中心基础设施为目标，而不只是被动容忍。
    sourceRefs:
    - 12
    - 18
  - point: 电网、储能和 PPA 改革使“电力落地路径”更适合被软件化。
    sourceRefs:
    - 13
    - 16
    - 17
  - point: 由于电力可靠性更高、价格更低且可获得可再生能源，北欧仍适合承接大负载选址。
    sourceRefs:
    - 9
    - 10
    - 26
  headwinds:
  - point: 成熟枢纽的并网等待时间可能长达十年，这是软件单独无法消除的。
    sourceRefs:
    - 3
  - point: 社区反对以及本地环境约束，仍可能在流程后期扼杀项目。
    sourceRefs:
    - 28
    - 29
  - point: 围绕能源、水资源与可持续性的监管审查，令证明过程更复杂，尽管市场仍在增长。
    sourceRefs:
    - 11
    - 12
competitors:
- name: Paces
  stage: 成长期
  wedge: 面向电力和数据中心开发商的 AI 辅助选址、模块化尽调与电力落地路径工作流。
  pricing: 定制 / 联系销售
  strength: 最接近的产品类比；围绕可行站点、更新鲜的电网模型和更快尽调有很强的叙事。
  weaknessVsUs: 以美国为先，且覆盖更广泛的电力开发；在欧洲市政许可与大负载站点资格评估上的定位并不清晰。
  sourceRefs:
  - 19
  - 20
  - 21
- name: Neara
  stage: 成长期
  wedge: 面向网络建模、韧性分析与设计自动化的物理引擎公用事业数字孪生。
  pricing: 定制 / 联系销售
  strength: 在公用事业侧具备深厚技术可信度，数字孪生定位强。
  weaknessVsUs: 优化的是公用事业侧网络规划，而不是开发商侧的站点排序、辖区模板或提交流程。
  sourceRefs:
  - 27
  - 30
- name: Piclo
  stage: 成长期
  wedge: 独立的网络灵活性采购与运营市场平台。
  pricing: 定制 / 联系销售
  strength: 拥有真实的 DSO/TSO 分发关系，以及受限本地市场的运营可见性。
  weaknessVsUs: 解决的是灵活性变现与调度，而不是大负载站点选择或许可材料生成。
  sourceRefs:
  - 22
  - 23
  - 24
- name: Ramboll
  stage: 既有巨头
  wedge: 覆盖数据中心选址、尽调、工程设计与许可服务的全生命周期方案。
  pricing: 定制咨询 / 项目收费
  strength: 值得信赖的 incumbent，在电力、水资源、社区与许可方面覆盖广泛。
  weaknessVsUs: 服务型交付更难扩张，也不擅长把重复学习沉淀成开发商侧核心记录系统。
  sourceRefs:
  - 28
  - 29
regulatoryTechnicalConstraints:
- point: 并网规则、门槛与可行性取决于本地 TSO/DSO 条件，因此单一的泛欧洲数据模型并不足够。
  sourceRefs:
  - 9
  - 10
- point: 数据中心报告与评级规则提高了能源、水资源和可再生能源采购方面的证据负担。
  sourceRefs:
  - 11
  - 12
- point: 有价值的建议越来越依赖把并网、PPA、储能和灵活性联动起来，而不是把它们视为彼此独立的工作流。
  sourceRefs:
  - 13
  - 16
  - 17
  - 23
- point: 输出必须能向内部委员会、顾问和主管部门解释清楚；黑箱式评分不足以支撑真实许可流程。
  sourceRefs:
  - 20
  - 21
  - 28
- point: 本地社区接受度、水资源获取、噪声和土地使用约束，仍超出软件供应商的直接控制范围。
  sourceRefs:
  - 28
  - 29
validationSignals:
- point: 欧盟如今已明确提出要在 5-7 年内将数据中心容量扩大到 3 倍。
  sourceRefs:
  - 18
- point: FLAP-D 空置率已降至 6.3%，且 83% 的管线已被预租，显示稀缺性真实存在。
  sourceRefs:
  - 3
- point: 芬兰报告有 100 个待定数据中心项目，并计划在 8 年内新增超过 4,000 MW 的南向输电能力。
  sourceRefs:
  - 10
- point: 荷兰市场报告已从增长叙事转向瓶颈叙事，这与创业公司论点一致。
  sourceRefs:
  - 4
  - 5
- point: Piclo 的 DSO/TSO 画像显示，灵活性市场正扩展到停电管理和本地约束场景，提高了整合式负载灵活性规划的价值。
  sourceRefs:
  - 23
  - 24
- point: Paces 正在推出面向数据中心且电网数据更新更快的工作流功能，这验证了买方想要的是软件，而不只是研究报告。
  sourceRefs:
  - 19
  - 20
  - 21
openQuestions:
- 欧洲托管型数据中心和 AI 园区开发商会在站点控制前购买工作流订阅，还是只有在已经为顾问预算后才会购买？
- 哪些初始辖区在公用事业和市政流程上具备足够重复性，能让模板形成可防御护城河？
- 产品能否在不演变成定制工程服务的前提下，对站点可行性做出可靠的 48 小时 no-go 判断？
- 哪类合作伙伴——工程顾问、EPC、公用事业公司还是能源市场专家——能在不压缩毛利的情况下加速分销？
