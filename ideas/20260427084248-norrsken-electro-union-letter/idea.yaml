problem: European data-center developers and electrifying industrial operators do not just need more clean power; they need specific sites that can win grid access and local permits before projects die in queue limbo. Today they stitch together consultants, utility calls, zoning reviews, and rough storage assumptions in spreadsheets, while energy-price volatility makes every month of delay more expensive. As electrification targets rise and AI load accelerates, the scarce asset becomes permitable megawatts, not just generation capacity.
targetUser:
  primary: Development and energy-infrastructure leads at European colocation developers and industrial park operators planning 10-100 MW new-load projects.
  secondary: Energy consultants and EPC firms advising large industrial electrification projects.
  buyer: VP Development, Head of Energy Infrastructure, or Country GM at a European data-center developer.
startupThesis:
  nonObviousInsight: Europe's next bottleneck is not inventing better electrons; it is converting a planned load into a financeable, permitable, grid-connected project at a specific site before competitors consume the available capacity.
  beachhead: 10-100 MW AI colocation and GPU-campus developers in the Nordics, Germany, and the Netherlands evaluating secondary sites where grid access, local approvals, and storage design are uncertain.
  wedge: A grid-readiness workbench that ranks candidate sites, models interconnection and behind-the-meter flexibility options, and auto-generates utility and municipal permit packages.
  whyNowCatalyst: Norrsken's 50% electrification push explicitly names permitting delays, high power prices, and rising AI data-center demand, turning grid-readiness from an engineering detail into an immediate growth blocker.
  ventureScalePath: Start with AI and colocation campuses, then expand the same permit-and-capacity workflow into factory electrification, EV depots, district heat conversion, and the financing marketplace around storage and flexible load.
solution: "The product is a workflow system for project developers to go from target geography to submission-ready power plan. It ingests site attributes, tariff assumptions, local planning constraints, and project load shape, then recommends a bankable configuration: utility interconnection path, storage or flexibility add-ons, and a sequenced permit checklist. It auto-builds the evidence pack for utilities, municipalities, and internal investment committees, so teams stop paying consultants to recreate the same package from scratch on every site. Over time, the company builds a proprietary dataset of which site profiles, application structures, and flexibility designs actually get approved, creating a feedback moat around permit success by megawatt and geography."
goToMarketSeed:
  firstCustomer: A Nordic or Dutch colocation developer evaluating a second 20-80 MW AI campus and comparing 5-10 candidate sites before filing interconnection and planning applications.
  buyingTrigger: An anchor tenant LOI, land option, or internal expansion decision that forces the team to prove the site can secure power and permits on a board-level timeline.
  currentAlternative: Energy consultants, law firms, internal spreadsheets, and direct back-and-forth with utilities and municipalities.
  switchingReason: The platform cuts dead-end site work earlier, packages stronger applications faster, and surfaces storage or flexible-load designs that improve the odds of winning scarce capacity.
  pricingHypothesis: Annual platform subscription priced by active development region plus per-project fees tied to megawatts submitted.
