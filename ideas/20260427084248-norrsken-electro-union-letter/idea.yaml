topRisks:
  - name: Data availability
    description: Utility queue, hosting-capacity, and local permitting data may be fragmented or hard to standardize across jurisdictions.
    mitigation: Start in a small number of geographies with repeatable workflows and combine public data with customer-supplied documents and partner integrations.
  - name: Services creep
    description: Early customers may demand bespoke modeling and permit support that turns the company into a consultancy.
    mitigation: Productize every recurring deliverable into templates, scoped modules, and partner-delivered service layers outside the core software team.
  - name: Long enterprise sales cycles
    description: Data-center and industrial developers may buy only when a live project reaches a gating event.
    mitigation: Sell into concrete project milestones, price by active project, and use advisory and EPC partners to enter already-funded developments.
