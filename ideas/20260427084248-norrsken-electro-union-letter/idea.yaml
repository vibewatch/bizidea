  - point: Repeated energy price shocks make faster grid access economically urgent rather than merely operationally convenient.
    signalRefs: [Energy-cost pressure is now strategic]
    sourceRefs: [2]
  - point: Permitting delays are already publicly identified as a competitiveness bottleneck, creating urgency for workflow tools instead of more advisory labor.
    signalRefs: [Permitting delays are a core deployment bottleneck]
    sourceRefs: [1]
  - point: AI data-center demand is increasing competition for the same scarce grid-ready sites, which raises willingness to pay for faster site qualification.
    signalRefs: [AI load growth is colliding with grid scarcity]
    sourceRefs: [1]
differentiator: Most incumbents attack this problem as bespoke advisory work after a site is already chosen. This company wedges in earlier with software that helps developers decide where to pursue capacity at all, then turns the messy interconnection-plus-permitting process into a reusable system of record. The moat comes from approval outcome data, jurisdiction-specific templates, and design recommendations that connect grid access with storage and flexibility choices rather than treating them as separate workstreams.
