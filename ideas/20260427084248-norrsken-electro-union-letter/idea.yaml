jobsToBeDone:
  - job: When I am screening new European sites for a large-load project, help me identify which ones can realistically secure power and permits, so I can stop wasting months on dead-end locations.
    currentAlternative: Consultant-led feasibility studies and spreadsheet-based site screening
    successMetric: Shorter time to site shortlist and higher share of shortlisted sites that proceed to application
  - job: When I am preparing an interconnection and planning submission, help me produce a credible power-plan package, so I can win internal approval and move faster with utilities and municipalities.
    currentAlternative: Internal PM work plus external legal and engineering advisors
    successMetric: Faster submission cycle time and improved approval rate per submitted megawatt
