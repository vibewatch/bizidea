slug: grid-ready-load-permits
date: '2026-04-27'
currency: USD
modelStartMonth: '2026-05'
assumptions:
  - id: A1
    name: 模型起始月份
    value: '2026-05'
    unit: month
    source: '[BP 日期为 2026-04-27；模型从次月开始]'
  - id: A2
    name: 融资前期初现金
    value: '150.0'
    unit: USDK
    source: '[创业公司财务经验值：pre-seed 交割前创始团队仅保留少量现金]'
  - id: A3
    name: 每个活跃付费账户的月度综合收入
    value: '20.0'
    unit: USDK per month
    source: '[BP 定价为每年 €120k-180k 平台费 + 每个活项目 €25k-75k；research 的 SOM 采用每个活跃阶段约 $200k；模型按年均 $240k ARPA 估算]'
  - id: A4
    name: Y1 付费账户爬坡
    value: 'M1-M12 customers EOP = 0,0,0,1,1,1,2,2,2,3,3,4'
    unit: count
    source: '[BP 里程碑：12 个月内拿下 3 个付费设计伙伴，并完成 2 个试点转年约]'
  - id: A5
    name: Y2 付费账户爬坡
    value: 'Q1-Q4 Y2 customers EOP = 5,6,7,8'
    unit: count
    source: '[BP 的 12-24 个月目标：上线德国、支持 10-12 个活跃项目阶段，并在首批账户中实现多区域扩张]'
  - id: A6
    name: Y3 付费账户爬坡
    value: 'Q1-Q4 Y3 customers EOP = 9,10,11,11'
    unit: count
    source: '[Research 的 SOM：到 Y3 覆盖约 8-10 个账户、12 个项目阶段；模型按年末 11 个付费账户处理]'
  - id: A7
    name: Y1 毛利率
    value: '65.0'
    unit: percent
    source: '[BP 目标毛利率为 70%；考虑前期导入重、数据获取重，首年保守下调]'
  - id: A8
    name: Y2 毛利率
    value: '68.0'
    unit: percent
    source: '[BP 目标毛利率为 70%；假设标准化导入后开始出现部分经营杠杆]'
  - id: A9
    name: Y3 毛利率
    value: '70.0'
    unit: percent
    source: '[BP businessModel 里的 targetGrossMarginPct 为 70]'
  - id: A10
    name: 各岗位完全成本年薪
    value: 'CEO/domain founder 144K; founding eng 168K; grid/product eng 156K; solutions engineer 132K; GTM lead 168K; backend eng 156K; account executive 150K; finance/admin 96K; senior eng 162K; customer success manager 126K'
    unit: USDK annualized
    source: '[BP 团队规划 + 欧洲种子期创业公司薪酬经验值，含约 20% 税费与福利]'
  - id: A11
    name: 招聘节奏
    value: 'M0 CEO and founding eng; M2 grid/product eng; M4 solutions engineer; M9 GTM lead; M16 backend eng + AE + finance/admin; M25 senior eng; M28 second AE + CSM'
    unit: timing
    source: '[BP 团队段落中的 startTiming + 保守的后续招聘节奏]'
  - id: A12
    name: 非薪酬运营成本爬坡
    value: 'Y1 non-payroll opex grows from 24K to 40K per month; Y2 quarterly non-payroll opex 108K, 117.5K, 137.5K, 157.5K; Y3 quarterly non-payroll opex 187K, 206K, 218K, 248K'
    unit: USDK
    source: '[按 BP 成本结构估算的数据许可、地图/云资源、差旅、法务、保险和伙伴支持等创业公司运营成本经验值]'
  - id: A13
    name: CAC
    value: '126.0'
    unit: USDK per customer
    source: '[BP 漏斗目标 + 基础设施企业软件在创始人主导、项目门槛较高销售场景下的经验值]'
  - id: A14
    name: 月度 logo churn
    value: '1.8'
    unit: percent
    source: '[基于项目制企业账户、续约和区域扩张存在波动风险的保守经验值]'
  - id: A15
    name: 融资需求
    value: '2.5'
    unit: USDM
    source: '[BP fundingAsk 为 $2-3M；模型按中位数估算，以支撑验证里程碑并预留 6 个月缓冲]'
  - id: A16
    name: 资金用途拆分
    value: 'Engineering 42%; GTM 22%; G&A 12%; buffer 24%'
    unit: percent
    source: '[根据招聘计划、BP 的资金用途叙事和 6 个月现金缓冲要求推导]'
