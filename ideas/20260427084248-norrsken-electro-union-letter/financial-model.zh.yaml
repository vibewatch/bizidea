assumptions:
  - id: A1
    name: 模型起始月份
    value: '2026-05'
    unit: month
    source: '[BP date 2026-04-27; 模型于次月启动]'
  - id: A2
    name: 融资前起始现金
    value: '150.0'
    unit: USDK
    source: '[创业公司财务经验法则：pre-seed 完成前创始团队仅有最低限度现金]'
  - id: A3
    name: 每个活跃付费账户的综合月收入
    value: '20.0'
    unit: USDK per month
    source: '[BP pricing €120k-180k 年平台费 + €25k-75k 每个真实项目；research SOM 假设每个活跃阶段约 $200k；模型按 $240k 综合年化 ARPA 处理]'
  - id: A4
    name: Y1 付费账户爬坡
    value: 'M1-M12 customers EOP = 0,0,0,1,1,1,2,2,2,3,3,4'
    unit: count
    source: '[BP milestones：12 个月内 3 个付费设计合作伙伴，2 个试点转年度合同]'
  - id: A5
    name: Y2 付费账户爬坡
    value: 'Q1-Q4 Y2 customers EOP = 5,6,7,8'
    unit: count
    source: '[BP 12-24 month milestones：上线德国，支持 10-12 个活跃项目阶段，并在首批账户内完成跨区域扩张]'
  - id: A6
    name: Y3 付费账户爬坡
    value: 'Q1-Q4 Y3 customers EOP = 9,10,11,11'
    unit: count
    source: '[Research SOM：到 Y3 在 8-10 个账户中覆盖 12 个项目阶段；模型按年末 11 个付费账户处理]'
  - id: A7
    name: Y1 毛利率
    value: '65.0'
    unit: percent
    source: '[BP target gross margin 70%；考虑首年高接触上线与数据获取，保守下调]'
  - id: A8
    name: Y2 毛利率
    value: '68.0'
    unit: percent
    source: '[BP target gross margin 70%；标准化上线后体现部分经营杠杆]'
  - id: A9
    name: Y3 毛利率
    value: '70.0'
    unit: percent
    source: '[BP businessModel targetGrossMarginPct 70]'
  - id: A10
    name: 各岗位含附加成本的年化薪酬
    value: 'CEO/domain founder 144K; founding eng 168K; grid/product eng 156K; solutions engineer 132K; GTM lead 168K; backend eng 156K; account executive 150K; finance/admin 96K; senior eng 162K; customer success manager 126K'
    unit: USDK annualized
    source: '[BP team plan + 欧洲种子阶段创业公司薪酬经验法则，含约 20% 税费/福利]'
  - id: A11
    name: 招聘时点
    value: 'M0 CEO and founding eng; M2 grid/product eng; M4 solutions engineer; M9 GTM lead; M16 backend eng + AE + finance/admin; M25 senior eng; M28 second AE + CSM'
    unit: timing
    source: '[BP team section startTiming + 保守的后续招聘节奏]'
  - id: A12
    name: 非薪酬运营成本扩张
    value: 'Y1 non-payroll opex grows from 24K to 40K per month; Y2 quarterly non-payroll opex 108K, 117.5K, 137.5K, 157.5K; Y3 quarterly non-payroll opex 187K, 206K, 218K, 248K'
    unit: USDK
    source: '[创业公司财务经验法则：覆盖数据授权、制图/云服务、差旅、法务、保险与合作伙伴支持，并按 BP 成本结构校准]'
  - id: A13
    name: CAC
    value: '126.0'
    unit: USDK per customer
    source: '[BP funnel targets + 企业基础设施软件经验法则：创始人主导销售且项目驱动周期较长]'
  - id: A14
    name: 月度 logo 流失率
    value: '1.8'
    unit: percent
    source: '[面向项目型企业账户的保守经验法则，考虑续费与跨区域扩张风险]'
  - id: A15
    name: 融资需求
    value: '2.5'
    unit: USDM
    source: '[BP fundingAsk targetFundingRangeUsd $2-3M；模型取中值，用于支撑验证里程碑并预留 6 个月缓冲]'
