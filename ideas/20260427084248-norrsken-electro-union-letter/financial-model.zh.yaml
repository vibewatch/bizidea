scenarios:
  downside:
    description: 在 site control 之前的购买速度更慢、销售周期整体晚一个季度、且德国扩张前的综合定价更低。
    y3RevenueK: 1800.0
    y3EbitdaK: -1020.0
    cashLowPointK: -2280.0
    keyAssumptionChanges:
      - 每个账户的月度综合收入降到 18K。
      - Y2 和 Y3 的新增客户大致都延后一季度。
      - 因为更多伙伴支持仍留在交付里，Y3 毛利率只能到 66%。
  base:
    description: 创始人主导销售拿下关键里程碑账户，标准化模板逐步把毛利率拉向 BP 目标。
    y3RevenueK: 2400.0
    y3EbitdaK: -695.0
    cashLowPointK: -1860.6
    keyAssumptionChanges:
      - 每个活跃账户的月度综合收入维持在 20K。
      - 客户数在 Y2 达到 8 个、Y3 达到 11 个。
      - 毛利率从 Y1 的 65% 提升到 Y3 的 70%。
  upside:
    description: 试点转正和第二区域扩张都更快发生，在不按比例增加人手的情况下提高单账户密度。
    y3RevenueK: 3000.0
    y3EbitdaK: -420.0
    cashLowPointK: -1600.0
    keyAssumptionChanges:
      - 因区域扩张和项目费挂载更强，每个账户的月度综合收入提升到 22K。
      - Y3 年末付费账户不是 11 个，而是 13 个。
      - 模板复用减少重度伙伴导入，让毛利率升到 73%。
sensitivity:
  - variable: 客单价
    downsideCase: 因试点只能以定价区间低端转正，每个账户的月度综合收入降到 18K。
    baseCase: 每个账户的月度综合收入维持在 20K。
    upsideCase: 随着项目费附加和第二区域扩张增强，每个账户的月度综合收入升到 22K。
    y3RevenueImpactK: 240.0
    cashImpactK: 360.0
  - variable: 获客成本
    downsideCase: 因为活项目资格认定更慢、创始人时间仍 heavily 偏销售，CAC 升到 160K。
    baseCase: CAC 维持在 126K。
    upsideCase: 借助伙伴转介绍和更精准的触发点销售，CAC 降到 100K。
    y3RevenueImpactK: 160.0
    cashImpactK: 190.0
  - variable: 流失率
    downsideCase: 若客户把产品当成单项目工具，月度 churn 升到 2.5%。
    baseCase: 月度 churn 为 1.8%。
    upsideCase: 一旦工作流成为跨区域的 system of record，月度 churn 降到 1.2%。
    y3RevenueImpactK: 120.0
    cashImpactK: 150.0
  - variable: 销售周期
    downsideCase: 因买方等到顾问已介入后才推进，付费试点整体晚一个季度成交。
    baseCase: 围绕项目门槛的创始人销售与 BP 漏斗节奏一致。
    upsideCase: 更清晰的 ROI 叙事让试点整体提前一个季度。
    y3RevenueImpactK: 300.0
    cashImpactK: 280.0
  - variable: 毛利率
    downsideCase: 因数据与伙伴成本持续偏高，Y3 毛利率停在 66%。
    baseCase: Y3 毛利率达到 70%。
    upsideCase: 借助模板复用与更紧的实施边界，Y3 毛利率达到 73%。
    y3RevenueImpactK: 0.0
    cashImpactK: 96.0
  - variable: 招聘节奏
    downsideCase: 在尚未证明可重复性前，公司就按时执行 Y2 与 Y3 招聘计划。
    baseCase: 招聘遵循模型里的 milestone-based 节奏。
    upsideCase: 在年度转化指标达标前，延后 2 个 GTM 或 CS 岗位。
    y3RevenueImpactK: 0.0
    cashImpactK: 180.0
modelDiagram:
  title: 单位经济流转
  mermaid: |
    flowchart LR
      TargetAccounts --> QualifiedLiveProjects
      QualifiedLiveProjects --> PaidPilots
      PaidPilots --> AnnualAccounts
      AnnualAccounts --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: 收入引擎
    finding: 基准情景的收入核心，是到 Y3 拿下 11 个付费区域账户；每个账户对应约 $240K 的年化价值，并和真实项目工作流绑定。
  - checkName: 必须做对的事
    finding: 公司必须在顾问全面进场之前或同时拿到预算，让创始人卖出的试点足够快转成年度软件合同，才能支撑 Y2 的销售招聘。
  - checkName: 模型何时失效
    finding: 只要销售周期整体晚一个季度，或交付重新变重服务，Y3 收入就会跌破 $1.8M，现金低点也会明显向 downside 情景靠拢。
  - checkName: 下一轮融资所需证明
    finding: 至少把 2 个试点在 2 个辖区里转成年度合同，才足以支撑为了德国和相邻工业场景扩张去融种子轮。
sanityChecks:
  ruleOf40: Y3 增长率 62.2% + EBITDA 利润率 -29.0% = 33.2%；虽然还没到 40% 基准，但对 pre-seed 阶段来说，只要学习质量足够高，这个水平可以接受。
  burnMultiple: Y3 burn multiple 约为 0.76x（-$695K EBITDA / $920K 净新增收入），对于仍在投入地理模板建设的企业工作流公司来说算是高效。
  revenuePerFte: Y3 每名 FTE 贡献 $218K 收入（$2.4M / 11 FTE），处在可信垂直 SaaS 基准的较低端，但明显好于服务主导模型。
  flags:
    - 只有当伙伴交付的边缘案例和定制工程始终留在核心团队之外，毛利率才有机会达到 BP 目标。
    - 模型默认买方会在顾问全面介入前付费；如果这个前提不成立，CAC 和销售周期都会迅速恶化。
    - 滩头收入集中度很高，因为前 8-11 个账户几乎都来自少数欧洲辖区里的大型负载开发预算。
    - 若 pre-seed 不能及时交割，现金会转负，因此融资时间本身就是经营前提，而不是背景假设。