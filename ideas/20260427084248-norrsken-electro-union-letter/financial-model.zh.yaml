scenarios:
  downside:
    description: 站点控制前采购更慢、销售周期延后一季度，以及在德国扩张前的综合定价更低。
    y3RevenueK: 1800.0
    y3EbitdaK: -1020.0
    cashLowPointK: -2280.0
    keyAssumptionChanges:
      - 每账户综合月收入降至 18K。
      - Y2 和 Y3 的新增客户均大致延后一季度。
      - 由于更多合作伙伴支持仍留在交付环节，Y3 毛利率仅达到 66%。
  base:
    description: 创始人主导销售拿下里程碑账户，标准化模板逐步把毛利率提升至 BP 目标水平。
    y3RevenueK: 2400.0
    y3EbitdaK: -695.0
    cashLowPointK: -1860.6
    keyAssumptionChanges:
      - 每个活跃账户的综合月收入保持在 20K。
      - 客户爬坡在 Y2 达到 8 个账户、Y3 达到 11 个。
      - 毛利率从 Y1 的 65% 提升至 Y3 的 70%。
  upside:
    description: 更快的试点转化和第二区域扩张，在不成比例增加人员的情况下带来更高账户密度。
    y3RevenueK: 3000.0
    y3EbitdaK: -420.0
    cashLowPointK: -1600.0
    keyAssumptionChanges:
      - 由于更好的跨区域扩张和项目费附着率，每账户综合月收入升至 22K。
      - Y3 年末退出时为 13 个付费账户，而非 11 个。
      - 随着模板复用减少重合作伙伴的上线工作，毛利率升至 73%。
sensitivity:
  - variable: ARPU
    downsideCase: 由于试点按定价区间低端转化，每账户综合月收入下滑至 18K。
    baseCase: 每账户综合月收入保持在 20K。
    upsideCase: 受更多项目费附着与第二区域扩张推动，每账户综合月收入达到 22K。
    y3RevenueImpactK: 240.0
    cashImpactK: 360.0
  - variable: CAC
    downsideCase: 由于真实项目资格确认耗时更久且创始人大量投入销售，CAC 升至 160K。
    baseCase: CAC 保持在 126K。
    upsideCase: 通过合作伙伴转介绍和更聚焦触发器的销售，CAC 降至 100K。
    y3RevenueImpactK: 160.0
    cashImpactK: 190.0
  - variable: churn
    downsideCase: 如果客户把产品当作单项目工具，月流失率升至 2.5%。
    baseCase: 月流失率为 1.8%。
    upsideCase: 一旦工作流成为跨区域的核心记录系统，月流失率降至 1.2%。
    y3RevenueImpactK: 120.0
    cashImpactK: 150.0
  - variable: sales cycle
    downsideCase: 由于买方要等到顾问已经介入后才行动，付费试点晚一季度成交。
    baseCase: 由项目节点驱动、创始人主导的销售与 BP 漏斗节奏一致。
    upsideCase: 更清晰的 ROI 逻辑让试点提前一季度落地。
    y3RevenueImpactK: 300.0
    cashImpactK: 280.0
  - variable: gross margin
    downsideCase: 由于数据与合作伙伴成本持续偏高，Y3 毛利率停留在 66%。
    baseCase: Y3 毛利率达到 70%。
    upsideCase: 借助模板复用与更严控的实施范围，Y3 毛利率提升至 73%。
    y3RevenueImpactK: 0.0
    cashImpactK: 96.0
  - variable: hiring pace
    downsideCase: 在尚未证明可复制性前，公司就按时完成 Y2 和 Y3 招聘计划。
    baseCase: 招聘遵循模型设定的里程碑节奏。
    upsideCase: 两个 GTM 或 CS 岗位延后至年度转化指标达成后再招聘。
    y3RevenueImpactK: 0.0
    cashImpactK: 180.0
modelDiagram:
  title: 单位经济流转
  mermaid: |
    flowchart LR
      TargetAccounts --> QualifiedLiveProjects
      QualifiedLiveProjects --> PaidPilots
      PaidPilots --> AnnualAccounts
      AnnualAccounts --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: 收入引擎
    finding: 基准情景收入来自于到 Y3 拿下 11 个付费区域账户，每个账户综合年价值为 $240K，并与真实项目工作流绑定。
  - checkName: 必须做对的事
    finding: 公司必须在顾问之前或至少与顾问同步拿到预算，这样创始人主导的试点才能足够快转化为年度软件合同，支撑 Y2 的销售招聘。
  - checkName: 模型失效条件
    finding: 只要销售周期延后一季度，或交付明显偏服务化，Y3 收入就会跌破 $1.8M，现金低点也会逼近 downside 情景。
  - checkName: 下一轮融资证明
    finding: 至少将 2 个试点在 2 个辖区中转化为年度合同，是支撑德国扩张与相邻工业市场扩张的种子轮融资证明点。
sanityChecks:
  ruleOf40: Y3 growth 62.2% + EBITDA margin -29.0% = 33.2%；虽仍低于 40% 基准，但对 pre-seed 阶段、且学习质量较高的公司而言可以接受。
  burnMultiple: Y3 burn multiple 约为 0.76x（-$695K EBITDA 对应 $920K 净新增收入），对于仍在投资地域扩张的企业工作流公司而言效率较高。
  revenuePerFte: $218K Y3（$2.4M revenue / 11 FTE），处于可信垂直 SaaS 基准的较低端，但明显好于服务主导模型。
  flags:
    - 只有当合作伙伴交付的边缘案例和定制工程留在核心团队之外时，毛利率才能达到 BP 目标。
    - 模型假设买方会在全面聘请顾问前付费；如果这一 gating assumption 错误，CAC 与销售周期都会迅速恶化。
    - 由于前 8-11 个账户都绑定在少数欧洲辖区的大负载开发预算上，滩头收入集中度很高。
    - 如果没有 pre-seed 融资落地，现金将转负，因此融资时点本身就是运营依赖，而不是背景假设。
