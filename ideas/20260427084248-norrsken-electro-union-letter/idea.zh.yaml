problem: >-
  欧洲数据中心开发商和工业电气化运营商真正缺的，不只是更多清洁电力，而是能在项目死于排队之前，先拿到并网和本地许可的具体地块。今天的团队仍靠顾问、电网公司来回沟通、分散的 zoning 审查和粗糙储能假设拼电子表格；电价波动又让每拖一个月都更贵。电气化目标上调、AI 负载加速之后，稀缺资产已经变成“可获批、可并网的兆瓦”，而不是抽象的发电能力。
targetUser:
  primary: 规划 10-100 MW 新增负载项目的欧洲 colocation 开发商与工业园区运营商中的开发负责人和能源基础设施负责人。
  secondary: 为大型工业电气化项目提供建议的能源顾问和 EPC 公司。
  buyer: 欧洲数据中心开发商里的 VP Development、Head of Energy Infrastructure 或国家总经理。
startupThesis:
  nonObviousInsight: 欧洲下一道瓶颈不是造出更好的电子，而是在竞争对手吃掉可用容量之前，把规划中的负载落到某个地块上，并证明它可融资、可获批、可并网。
  beachhead: 先服务北欧、德国和荷兰正在评估二线地块的 10-100 MW AI colocation 与 GPU 园区开发商；这些项目的并网条件、本地审批和储能设计都还没被证实。
  wedge: 一个电网就绪工作台：给候选地块排序，建模并网路径与表后灵活性方案，并自动生成给电网公司和市政部门看的许可材料包。
  whyNowCatalyst: Norrsken 的 50% 电气化倡议把许可拖延、高电价和 AI 数据中心需求放在同一张桌上，“电网是否就绪”不再是工程细节，而是当期增长瓶颈。
  ventureScalePath: 先吃 AI 与 colocation 园区，再把同一套“许可 + 容量”工作流扩到工厂电气化、EV 车队站点、区域供热改造，以及储能和柔性负载融资市场。
solution: >-
  产品是一套项目开发工作流，帮助团队从目标区域走到可提交的供电方案。它吃进地块属性、电价与 tariff 假设、本地规划约束和项目负载曲线，然后给出可融资配置：走哪条并网路径，是否加入储能或其他灵活性方案，许可清单该按什么顺序推进。系统还会自动生成给电网公司、市政部门和内部投资委员会的证据包，让团队不用每换一块地就重新请顾问从零拼材料。项目越多，公司越能沉淀出专有数据：什么地块特征、申请结构和灵活性设计，更容易在不同兆瓦等级和地区获批，并把许可成功率变成可复利的反馈护城河。
goToMarketSeed:
  firstCustomer: 正在评估第二个 20-80 MW AI 园区、并在提交并网与规划申请前比较 5-10 个候选地块的北欧或荷兰 colocation 开发商。
  buyingTrigger: 一个 anchor tenant 的 LOI、土地选择权，或内部扩张决策，迫使团队必须在董事会时间表内证明这个地块拿得到电也办得下许可。
  currentAlternative: 能源顾问、律所、内部电子表格，以及与电网公司和市政部门的直接来回沟通。
  switchingReason: 平台能更早砍掉死路地块、更快拼出更强的申请材料，并提前暴露出哪些储能或柔性负载设计能提高稀缺容量的争取成功率。
  pricingHypothesis: 按活跃开发区域收取年费，再按提交的兆瓦规模收取单项目费用。
whyNow:
  - point: 欧洲范围内的电气化目标正在推高需要获批并完成并网的新负载项目数量。
    signalRefs: [电气化需求已无法回避]
    sourceRefs: [1, 2]
  - point: 连续出现的能源价格冲击，让更快拿到电网接入从“运营上更方便”变成了经济上必须马上解决的问题。
    signalRefs: [电价压力已上升为战略问题]
    sourceRefs: [2]
  - point: 许可拖延已经被公开点名为竞争力瓶颈，这让市场更需要工作流工具，而不是继续堆更多顾问人力。
    signalRefs: [许可拖延已成部署核心瓶颈]
    sourceRefs: [1]
  - point: AI 数据中心需求正在加剧对同一批稀缺“电网就绪”地块的争夺，也抬高了客户为更快完成地块筛选而付费的意愿。
    signalRefs: [AI 负载增长正撞上电网稀缺]
    sourceRefs: [1]
differentiator: >-
  多数现有厂商等地块已经选定后，才把问题当定制咨询来做。这家公司更早进入，用软件先帮开发商判断“这个容量到底值不值得追”，再把混乱的并网 + 许可流程沉成可复用的系统记录。护城河来自审批结果数据、分司法辖区模板，以及把电网接入和储能/柔性方案连在一起的建议，而不是把这些工作拆成互不相干的几条线。
conceptDiagram:
  title: 电网就绪兆瓦操作系统
  mermaid: |
    flowchart LR
      Buyer[开发负责人或能源负责人] --> Pain[并网不确定与许可拖延]
      Pain --> Product[电网就绪工作台]
      Product --> Outcome[更快获批的兆瓦与更低项目风险]
businessModelCanvas:
  customerSegments: [欧洲 colocation 开发商, 工业园区运营商, 工厂电气化团队]
  valuePropositions: [更早找到可行的电网就绪地块, 提高许可与并网成功率, 减少重度依赖顾问的返工]
  channels: [直接销售, 能源咨询合作伙伴, 数据中心与工业基础设施网络]
  customerRelationships: [高触达试点, 工作流导入, 按区域与项目组合扩张]
  revenueStreams: [年度 SaaS 订阅, 按项目提交收费, 可选的结果导向咨询模块]
  keyResources: [许可模板, 电网与 tariff 数据集, 审批结果数据, 能源建模引擎]
  keyActivities: [地块筛选, 许可材料包生成, 并网工作流编排, 审批结果学习]
  keyPartners: [能源顾问, EPC 公司, 储能开发商, 本地许可专家]
  costStructure: [数据获取, 产品工程, 能源领域专家, 企业销售]
jobsToBeDone:
  - job: 当我在欧洲为大型负载项目筛选新地块时，帮我找出哪些地块现实中真的有机会拿到电和许可，这样我就不用再把几个月耗在根本走不通的位置上。
    currentAlternative: 顾问主导的可行性研究，以及基于电子表格的地块初筛
    successMetric: 从地块筛选到 shortlist 的时间更短，且 shortlist 中继续推进到申请阶段的比例更高
  - job: 当我准备并网和规划材料时，帮我更快拼出一份可信的供电方案包，这样我既能拿到内部批准，也能更快和电网公司及市政部门推进。
    currentAlternative: 内部 PM 协调加外部法律与工程顾问
    successMetric: 提交流程周期更短，且按已提交兆瓦计算的获批率更高
ideaScorecard:
  signalStrength:
    score: 4
    rationale: 这一组信号直接点出了高电价、许可拖延和 AI 需求是当前瓶颈，尽管信源范围仍偏窄。
  painIntensity:
    score: 5
    rationale: 并网延误或失败足以直接杀死多兆瓦项目，也会在高电价市场里显著恶化单位经济模型。
  wedgeClarity:
    score: 4
    rationale: 初始产品非常聚焦：就是为一小群大型负载开发商做电网就绪与许可材料工作流。
  defensibility:
    score: 4
    rationale: 审批结果数据、分地区模板和嵌入式工作流，让产品不只是一个更好看的看板。
  ventureScale:
    score: 5
    rationale: 同一层运行系统可以横向扩展到数据中心、工业电气化、储能与融资工作流，并覆盖欧洲更多市场。
topRisks:
  - name: 数据可得性
    description: 电网排队、hosting capacity 与本地许可数据可能非常碎片化，也不容易在不同司法辖区之间标准化。
    mitigation: 先从少数几个工作流可重复的区域切入，把公开数据、客户提供材料与合作伙伴集成拼在一起。
  - name: 服务蔓延
    description: 早期客户可能会不断提出定制建模和许可支持要求，把公司慢慢拖成咨询公司。
    mitigation: 把每一项重复交付都产品化成模板、边界明确的模块，以及由伙伴交付的服务层，不让核心软件团队被吞掉。
  - name: 企业销售周期过长
    description: 数据中心与工业开发商可能只有在真实项目走到关键节点时才会下单。
    mitigation: 围绕具体项目里程碑销售，按活跃项目定价，并借咨询与 EPC 伙伴切入已经拿到预算的开发案。
