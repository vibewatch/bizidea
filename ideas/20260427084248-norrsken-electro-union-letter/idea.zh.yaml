jobsToBeDone:
  - job: 当我为大型负载项目筛选新的欧洲站点时，帮我识别哪些站点现实中有机会拿到电力和许可，这样我就不会在走不通的位置上浪费数月时间。
    currentAlternative: 顾问主导的可行性研究与基于电子表格的站点筛选
    successMetric: 更短的站点入围时间，以及入围站点进入申请阶段的比例更高
  - job: 当我准备并网和规划申请时，帮我产出一套可信的电力方案材料包，这样我就能赢得内部批准，并更快推进与公用事业公司及市政部门的沟通。
    currentAlternative: 内部项目经理工作叠加外部法律与工程顾问
    successMetric: 更快的提交周期，以及按已提交兆瓦计算的更高审批率
