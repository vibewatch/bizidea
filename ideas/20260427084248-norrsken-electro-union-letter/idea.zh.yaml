    score: 4
    rationale: 这一组信号直接点出了高电价、许可拖延和 AI 需求是当前瓶颈，尽管信源范围仍偏窄。
  painIntensity:
    score: 5
    rationale: 并网延误或失败足以直接杀死多兆瓦项目，也会在高电价市场里显著恶化单位经济模型。
  wedgeClarity:
    score: 4
    rationale: 初始产品非常聚焦：就是为一小群大型负载开发商做电网就绪与许可材料工作流。
  defensibility:
    score: 4
    rationale: 审批结果数据、分地区模板和嵌入式工作流，让产品不只是一个更好看的看板。
  ventureScale:
    score: 5
    rationale: 同一层运行系统可以横向扩展到数据中心、工业电气化、储能与融资工作流，并覆盖欧洲更多市场。
topRisks:
  - name: 数据可得性
    description: 电网排队、hosting capacity 与本地许可数据可能非常碎片化，也不容易在不同司法辖区之间标准化。
    mitigation: 先从少数几个工作流可重复的区域切入，把公开数据、客户提供材料与合作伙伴集成拼在一起。
  - name: 服务蔓延
    description: 早期客户可能会不断提出定制建模和许可支持要求，把公司慢慢拖成咨询公司。
    mitigation: 把每一项重复交付都产品化成模板、边界明确的模块，以及由伙伴交付的服务层，不让核心软件团队被吞掉。
  - name: 企业销售周期过长
    description: 数据中心与工业开发商可能只有在真实项目走到关键节点时才会下单。
    mitigation: 围绕具体项目里程碑销售，按活跃项目定价，并借咨询与 EPC 伙伴切入已经拿到预算的开发案。
