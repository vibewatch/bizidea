topRisks:
  - name: 数据可得性
    description: 公用事业排队数据、承载容量数据和本地许可数据在不同辖区可能高度碎片化，且难以标准化。
    mitigation: 先从少数几个工作流可复用的地区起步，将公开数据与客户提供文件及合作方集成结合起来。
  - name: 服务化蔓延
    description: 早期客户可能要求定制建模和许可支持，导致公司逐步滑向咨询业务。
    mitigation: 将每一个反复出现的交付物都产品化为模板、范围明确的模块，以及由合作伙伴提供的服务层，置于核心软件团队之外。
  - name: 企业销售周期长
    description: 数据中心与工业开发商可能只有在真实项目进入关键节点时才会采购。
    mitigation: 围绕具体项目里程碑销售、按活跃项目定价，并借助顾问和 EPC 合作伙伴进入已获预算支持的项目开发流程。
