problem: >-
  对欧洲的数据中心开发商和正在推进电气化的工业运营商来说，真正短缺的不只是更多清洁电力，而是那些能在项目死在排队地狱之前，先拿下电网接入和本地许可的具体地块。今天，团队仍靠顾问、和电网公司的来回沟通、分散的 zoning 审查以及粗糙的储能假设拼电子表格；而电价波动又让每多拖一个月都更贵。随着电气化目标不断上调、AI 负载继续加速，真正稀缺的资产变成了“可获批、可并网的兆瓦”，而不只是发电能力本身。
targetUser:
  primary: 规划 10-100 MW 新增负载项目的欧洲 colocation 开发商与工业园区运营商中的开发负责人和能源基础设施负责人。
  secondary: 为大型工业电气化项目提供建议的能源顾问和 EPC 公司。
  buyer: 欧洲数据中心开发商里的 VP Development、Head of Energy Infrastructure 或国家总经理。
startupThesis:
  nonObviousInsight: 欧洲下一个瓶颈不是发明更好的电子，而是要在竞争对手吃掉可用容量之前，把“规划中的负载”转成某个具体地块上可融资、可获批、可并网的项目。
  beachhead: 在北欧、德国和荷兰评估二线地块的 10-100 MW AI colocation 与 GPU 园区开发商；这些地块的并网条件、本地审批和储能设计都还存在较大不确定性。
  wedge: 一个“电网就绪”工作台，对候选地块排序，建模并网路径与表后灵活性方案，并自动生成面向电网公司和市政审批的许可材料包。
  whyNowCatalyst: Norrsken 推动 50% 电气化的公开倡议，明确点出了许可拖延、高电价和上升中的 AI 数据中心需求，使“电网是否就绪”从工程细节一下变成了即时增长瓶颈。
  ventureScalePath: 先服务 AI 与 colocation 园区，再把同一套“许可 + 容量”工作流扩展到工厂电气化、EV 车队站点、区域供热改造，以及围绕储能与柔性负载的融资市场。
solution: >-
  这款产品是一套面向项目开发团队的工作流系统，帮助他们从目标区域一路走到可提交的供电方案。它会吃进地块属性、电价与 tariff 假设、本地规划约束和项目负载曲线，然后给出一个可融资的配置：选择哪条并网路径、是否加入储能或其他灵活性方案，以及应该按什么顺序推进许可清单。系统还会自动生成给电网公司、市政部门和内部投资委员会使用的证据包，让团队不再为每个地块都重新花钱请顾问从零拼一次材料。随着项目积累，公司会沉淀出一份专有数据集，知道哪些地块特征、申请结构和灵活性设计更容易在不同兆瓦规模和地区获批，从而把“许可成功率”变成可复利的反馈护城河。
goToMarketSeed:
  firstCustomer: 正在评估第二个 20-80 MW AI 园区、并在提交并网与规划申请前比较 5-10 个候选地块的北欧或荷兰 colocation 开发商。
  buyingTrigger: 一个 anchor tenant 的 LOI、土地选择权，或内部扩张决策，迫使团队必须在董事会时间表内证明这个地块拿得到电也办得下许可。
  currentAlternative: 能源顾问、律所、内部电子表格，以及与电网公司和市政部门的直接来回沟通。
  switchingReason: 平台能更早砍掉死路地块、更快拼出更强的申请材料，并提前暴露出哪些储能或柔性负载设计能提高稀缺容量的争取成功率。
  pricingHypothesis: 按活跃开发区域收取年费，再按提交的兆瓦规模收取单项目费用。
whyNow:
  - point: 欧洲范围内的电气化目标正在推高需要获批并完成并网的新负载项目数量。
    signalRefs: [电气化需求已无法回避]
    sourceRefs: [1, 2]
  - point: 连续出现的能源价格冲击，让更快拿到电网接入从“运营上更方便”变成了经济上必须马上解决的问题。
    signalRefs: [电价压力已上升为战略问题]
    sourceRefs: [2]
  - point: 许可拖延已经被公开点名为竞争力瓶颈，这让市场更需要工作流工具，而不是继续堆更多顾问人力。
    signalRefs: [许可拖延已成部署核心瓶颈]
    sourceRefs: [1]
  - point: AI 数据中心需求正在加剧对同一批稀缺“电网就绪”地块的争夺，也抬高了客户为更快完成地块筛选而付费的意愿。
    signalRefs: [AI 负载增长正撞上电网稀缺]
    sourceRefs: [1]
differentiator: >-
  大多数现有厂商把这个问题当成在地块已经选定之后才介入的定制化咨询服务。本公司则更早切入，用软件先帮助开发商决定“到底值不值得追这个容量”，再把混乱的并网加许可流程变成一套可复用的系统记录。真正的护城河来自审批结果数据、按司法辖区沉淀的模板，以及把电网接入和储能/柔性方案连起来给建议，而不是把这些工作流拆成互不相干的几块。
