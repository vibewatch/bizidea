jobsToBeDone:
  - job: 当我在欧洲为大型负载项目筛选新地块时，帮我找出哪些地块现实中真的有机会拿到电和许可，这样我就不用再把几个月耗在根本走不通的位置上。
    currentAlternative: 顾问主导的可行性研究，以及基于电子表格的地块初筛
    successMetric: 从地块筛选到 shortlist 的时间更短，且 shortlist 中继续推进到申请阶段的比例更高
  - job: 当我准备并网和规划材料时，帮我更快拼出一份可信的供电方案包，这样我既能拿到内部批准，也能更快和电网公司及市政部门推进。
    currentAlternative: 内部 PM 协调加外部法律与工程顾问
    successMetric: 提交流程周期更短，且按已提交兆瓦计算的获批率更高
ideaScorecard:
