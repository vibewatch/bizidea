slug: grid-ready-load-permits
date: '2026-04-27'
executiveSummary: >-
  This company is a Europe-focused workflow platform for developers that need
  to turn a candidate site into a permitable, grid-connectable 10-100 MW load
  project before competitors consume scarce capacity. The initial customer is a
  colocation or AI-campus development team in the Nordics or Netherlands that
  has an anchor tenant, land option, or expansion mandate and must prove path
  to power on a board-level timeline. The product wedge is not generic grid
  intelligence; it is a system that ranks sites, models interconnection plus
  storage or flexibility options, and generates submission-ready utility and
  municipal packages. The strategic logic is to win earlier than consultants in
  the site-screening workflow, then retain the project as the system of record
  through submission and approval. Research supports the pain, timing, and
  policy tailwinds, but not yet the buying behavior; the most important unknown
  is whether developers will pay for software before they have already hired
  consultants. The beachhead market is credible but narrow, so venture scale
  depends on proving repeatability in 2-3 jurisdictions and then expanding the
  same workflow into factory electrification and adjacent flexible-load
  projects. The company should therefore raise a pre-seed round to validate the
  48-hour no-go workflow, convert design partners into annual contracts, and
  build jurisdiction-specific approval data rather than expand horizontally too
  early.
problem:
  - Large-load developers in Europe lose months on candidate sites that never secure grid capacity or local permits.
  - Today's workflow is fragmented across consultants, utilities, municipalities, and internal spreadsheets, so teams discover fatal issues too late and pay repeatedly for bespoke studies.
solution:
  - A grid-readiness workbench that scores candidate sites for path-to-power viability across grid access, planning constraints, and optional storage or flexibility design.
  - Submission workflow software that turns project inputs into reusable utility, municipal, and investment-committee evidence packs instead of bespoke consultant decks.
whyWeWin:
  - We enter earlier than advisory incumbents by helping developers decide where not to spend time before site control hardens.
  - Product defensibility compounds from approval-outcome data, jurisdiction templates, and design recommendations that link interconnection with BESS and flexible-load choices.
strategicChoices:
  beachhead: 10-100 MW AI colocation and GPU-campus developers in Finland, Sweden, the Netherlands, and then Germany evaluating secondary sites with uncertain grid access and planning risk.
  wedgeRationale: >-
    This segment feels the pain first because land options, tenant LOIs, and
    board approvals are time-bound while grid scarcity is acute. It offers
    repeated site-screening decisions, six-figure project economics, and enough
    complexity to justify software before the company tackles broader industrial
    electrification.
  sequencingRationale: >-
    Start with a narrow no-go and submission workflow in 2-3 repeatable
    geographies, sell directly into live projects, use advisers as delivery
    wrappers only after templates exist, and hire product plus domain talent
    before a scaled sales team. This order maximizes learning on approval data
    and minimizes the risk of becoming a consultancy.
  notYet:
    - Generic ESG or data-centre reporting software
    - Utility-side network planning tools
    - Full project engineering and permit-consulting services
    - Factory electrification outside the first validated jurisdictions
market:
  tam: "$36.0M"
  sam: "$9.0M"
  som: "$2.4M"
  segments:
    - European colocation and AI-campus developers pursuing 10-100 MW projects
    - Industrial park operators and factory electrification teams with similar path-to-power workflows
  buyingProcess: >-
    Buying is triggered by a live expansion event such as an anchor-tenant LOI,
    land option, or internal build decision. The user is the development or
    energy lead; the economic buyer is typically the VP or Head of Development
    or country GM who owns site control, utility engagement, and internal capex
    approval.
product:
  mvp: >-
    MVP covers Finland and the Netherlands for site screening, red-flag scoring,
    configurable interconnection and BESS scenarios, and generation of
    submission-ready utility and municipal checklists plus document packs for
    one live project team. It must deliver a credible 48-hour no-go on site
    viability using customer data plus repeatable jurisdiction templates.
  sixMonth: >-
    Ship production MVP in Finland and the Netherlands, support 5-10 live site
    comparisons, capture structured reasons for no-go decisions, and launch a
    submission workspace that replaces spreadsheet-based status tracking.
  twelveMonth: >-
    Add Germany, portfolio views across active projects, approval-outcome
    benchmarking, and partner-delivered modules for storage or flexibility
    scenarios without expanding into bespoke engineering.
  twentyFourMonth: >-
    Become the system of record for European path-to-power workflows across the
    Nordics, Netherlands, and Germany, with reusable templates for adjacent
    factory and industrial electrification projects and benchmark data on
    approval probability by site profile and megawatt class.
  keyBets:
    - A minimum dataset can reliably eliminate bad sites within 48 hours without full engineering studies.
    - Customers will pay for earlier-stage workflow software before site control is finalized.
    - BESS and flexible-load scenario design materially improves submission quality and win rate.
    - Jurisdiction templates in a few geographies create faster compounding than broad Europe coverage at launch.
gtm:
  wedge: >-
    Sell a live-project pilot to a Nordic or Dutch colocation developer
    comparing 5-10 candidate sites for a 20-80 MW campus, then convert to an
    annual regional subscription once the tool becomes the default screen-and-
    submit workflow.
  channels:
    - Founder-led direct sales into colocation and AI-campus expansion teams
    - Referral and implementation partnerships with engineering advisers and EPCs already on live developments
    - Targeted industry network access through data-centre and digital-infrastructure ecosystems in the Nordics, Netherlands, and Germany
  funnelTargets: "Target account→qualified live project 25-35%, qualified project→paid pilot 40%+, paid pilot→annual production contract 60%+, retained account→second-region expansion 50%+ by month 18."
  pricing: >-
    Annual subscription priced by active geography plus per-project workflow
    fees tied to submitted megawatts. Initial target is €120k-180k annual
    platform spend for one region plus €25k-75k per live project, because the
    value is avoiding dead-end site work, consultant rework, and powered-land
    premiums rather than selling seats.
businessModel:
  revenueStreams:
    - Annual regional workflow subscription
    - Per-project submission and approval-workspace fees
    - Premium scenario modules for storage, flexibility, and investment-committee packs
  unitOfValue: Active development project phase, with submitted megawatts as the expansion driver
  targetGrossMarginPct: 70
  expansionLevers:
    - Add new jurisdictions inside existing customer accounts
    - Expand from site screening into portfolio-level approval workflow and benchmarking
    - Extend the same workflow into factory electrification, EV depots, and district heat conversion after beachhead proof
strategyMap:
  northStarMetric: Annualized megawatts in customer workflows that reach submission-ready status
  inputMetrics:
    - Median hours from new site intake to no-go or shortlist decision
    - Pilot-to-annual conversion rate
    - Average number of candidate sites screened per live project
    - Share of submissions using BESS or flexibility scenarios
    - Approval or accepted-for-review rate per submitted project
    - Number of jurisdictions with reusable templates backed by 5+ completed projects
  moatsToBuild:
    - Approval-outcome dataset by geography, load size, and application structure
    - Jurisdiction-specific template library for utilities, municipalities, and internal committees
    - Embedded partner ecosystem for storage, flexibility, and advisory delivery around a software-controlled workflow
  killCriteria:
    - Fewer than 3 paid design partners or pilots after 9 months of founder-led selling into 40+ qualified accounts
    - No measurable reduction of at least 30% in time-to-no-go or submission cycle time in first 5 live projects
    - Services revenue or bespoke delivery exceeds 40% of total revenue by month 12
    - Fewer than 2 jurisdictions achieve repeatable template reuse across 5 projects each within 18 months
  mermaid: |
    flowchart LR
      Wedge[Beachhead wedge] --> MVP[MVP]
      MVP --> Proof[Proof points]
      Proof --> Expansion[Expansion motion]
      Wedge --> Data[Jurisdiction templates and approval data]
      Data --> Proof
      Proof --> Moat[System of record and benchmark moat]
      Moat --> Expansion
investorMemo:
  verdict:
    call: Watch
    conviction: Strong pain and timing, but conviction stays limited until buyers prove they will pay for software before consultant-led feasibility has already started.
    whyBelieve: Grid scarcity, live data-centre expansion pressure, and fragmented permitting workflows create a credible wedge where faster no-go decisions can save customers meaningful project cost.
    whyDoubt: The initial beachhead is narrow and the company has not yet shown that local data quality and pre-site-control buying behavior are strong enough to support scalable software economics.
    nextDiligence: Secure 2-3 design partners in Finland or the Netherlands and show one converted annual contract with quantified cycle-time savings on a live project.
  firstCustomer:
    title: VP Development at a Nordic or Dutch colocation developer
    profile: A developer managing a second 20-80 MW campus, comparing multiple land options, and coordinating utilities, municipal approvals, and internal investment committee deadlines.
    trigger: An anchor-tenant LOI, land option expiry, or board-approved expansion plan that requires a defensible path-to-power in weeks rather than months.
    buyer: VP Development or Head of Energy Infrastructure
    initialContract: €40k-80k paid pilot for one geography and one live project, with conversion to €150k-300k annual software plus project fees once adopted as the default regional workflow.
  mustBeTrue:
    - At least half of interviewed colocation developers must confirm they can authorize workflow spend before full consultant engagement on a live project.
    - The product must eliminate or deprioritize bad sites within 48 hours with acceptable accuracy on at least 10 back-tested projects.
    - At least 60% of paid pilots must convert into annual contracts because the software stays in use beyond initial screening.
    - Two initial jurisdictions must show enough process repeatability for templates to be reused across at least 5 projects each.
    - At least one adjacent market beyond colocation must show the same workflow can command similar ACV without a full product rewrite.
  diligenceQuestions:
    - Who currently owns the budget line before site control: development, energy infrastructure, or external advisers?
    - What minimum dataset is needed for a credible no-go decision in Finland, the Netherlands, and Germany?
    - How much of the workflow can remain software-led before customers demand bespoke engineering sign-off?
    - Which part of the process actually drives willingness to pay: site ranking, submission packaging, or internal approval speed?
    - Do adviser and EPC partners accelerate distribution, or do they pull the company into low-margin services delivery?
  riskHeatmap:
    - risk: Fragmented grid and permitting data prevents a reliable productized workflow
      likelihood: High
      impact: High
      leadingIndicator: Early pilots require manual analyst intervention on most projects or cannot reach a 48-hour no-go decision
      mitigation: Start in 2-3 jurisdictions, combine customer-supplied documents with public data, and only automate fields that recur across projects
    - risk: Customers buy only after consultants are engaged, shrinking software wedge
      likelihood: Medium
      impact: High
      leadingIndicator: Discovery calls praise the workflow but stall until after land is optioned and external studies are already commissioned
      mitigation: Sell into concrete gating events, price pilots against active projects, and position the tool as pre-consultant triage plus submission control
    - risk: Services creep overwhelms SaaS margins
      likelihood: High
      impact: High
      leadingIndicator: Custom modeling, document rewriting, or partner-managed analyses exceed 40% of delivery effort by month 12
      mitigation: Productize every repeated deliverable, set fixed implementation scopes, and route bespoke engineering to partners
    - risk: Beachhead market is too narrow for venture outcomes without adjacent expansion
      likelihood: Medium
      impact: High
      leadingIndicator: Strong pilot feedback does not translate into multi-project expansion or credible demand from industrial electrification accounts
      mitigation: Validate one adjacent workflow by month 12 and use common path-to-power primitives rather than building data-centre-only software
operatingAssumptions:
  - assumption: Developers will pay for workflow software before or alongside consultant engagement when a live project hits a power-access deadline.
    basis: research.yaml
    validationTest: Interview 8-10 development leads and close at least 2 paid pilots tied to active site-screening projects before formal permit consultants are retained.
    decisionImpact: If false, reposition the product as post-site-control submission software sold through advisers rather than direct pre-screening workflow.
  - assumption: Finland and the Netherlands have enough process repeatability to let templates materially reduce cycle time.
    basis: research.yaml
    validationTest: Collect and structure 20 historical application packs across both geographies and show at least 70% of core data fields and checklist steps can be standardized.
    decisionImpact: If false, narrow to a single jurisdiction first and delay cross-border expansion and hiring.
  - assumption: A 48-hour no-go can be delivered from site, grid, fibre, water, and load-shape inputs without bespoke engineering each time.
    basis: research.yaml
    validationTest: Back-test 15 past projects and hit at least 80% agreement with expert no-go or shortlist conclusions using the product workflow.
    decisionImpact: If false, reduce MVP promise to workflow orchestration and document automation rather than decision intelligence.
  - assumption: BESS and flexible-load scenarios are decision-relevant enough to justify premium pricing and stronger approval odds.
    basis: idea.yaml
    validationTest: In first 5 pilots, measure whether customers use scenario outputs in utility or internal submissions and whether those projects progress faster than baseline.
    decisionImpact: If false, keep storage and flexibility as partner modules and focus core product on screening plus permitting workflow.
  - assumption: The company can keep software gross margins above 70% despite high-touch onboarding.
    basis: operator judgment
    validationTest: Track implementation hours, partner pass-through cost, and support burden over the first 10 deployments; software and standardized implementation should exceed 70% of revenue.
    decisionImpact: If false, slow sales hiring, raise prices, and constrain custom delivery until product scope is tighter.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Founder-led discovery and pricing interviews with colocation developers in Finland, the Netherlands, and Germany
    hypothesis: Buyers will fund a pilot from a live project budget if the workflow materially reduces dead-site work before consultant spend escalates.
    successMetric: 8+ qualified interviews, 3 pilot proposals, and at least 2 verbal commitments to paid pilots at target pricing
    owner: CEO
  - horizon: 0–90 days
    experiment: Back-test historical sites against MVP scoring logic and no-go criteria
    hypothesis: A narrow dataset can reproduce expert shortlist or no-go decisions with enough accuracy to save time early in the funnel.
    successMetric: 15 back-tests completed with 80%+ agreement on site disposition and median turnaround under 48 hours
    owner: Founding eng
  - horizon: 90–180 days
    experiment: Paid design-partner pilots in Finland and the Netherlands
    hypothesis: Development teams will adopt the product through site screening and submission preparation, not just for one-off analysis.
    successMetric: 3 paid pilots launched, 2 live submissions supported, and 60%+ weekly active usage among core project team members
    owner: CEO
  - horizon: 90–180 days
    experiment: Advisory and EPC partner program with fixed implementation scope
    hypothesis: Partners can accelerate distribution without causing custom-delivery overhang if implementation boundaries are explicit.
    successMetric: 2 partner agreements signed and partner-driven work stays below 25% of total delivery hours
    owner: GTM lead
  - horizon: 180–365 days
    experiment: Germany jurisdiction-template launch and multi-project expansion inside first accounts
    hypothesis: Customers that prove value in one region will expand to a second region faster than net-new accounts can be won.
    successMetric: 2 existing customers add a second geography and template reuse cuts onboarding time by at least 40%
    owner: Product lead
  - horizon: 180–365 days
    experiment: Adjacent industrial electrification pilot
    hypothesis: The same path-to-power workflow can win a factory or industrial park project with limited product changes.
    successMetric: 1 paid non-colocation pilot with ACV within 25% of beachhead pricing and no major architecture rewrite
    owner: CEO
operations:
  - Build a jurisdiction-template library that stores utility forms, municipal checklist logic, and required evidence artifacts by geography.
  - Run every pilot through a structured project-review process that captures no-go reasons, approval outcomes, and missing data fields back into the product.
  - Use a CRM plus deal-stage rubric tied to buying triggers such as LOIs, land options, and board approvals rather than generic lead scoring.
  - Contract specialist advisers and EPC partners under fixed-scope statements of work so bespoke engineering stays outside the core team.
  - Maintain auditable document-generation and QA workflows because submission credibility matters more than dashboard polish.
team:
  - role: CEO / domain founder
    startTiming: Month 0
    rationale: Owns founder-led sales, partner development, and customer discovery with development and energy-infrastructure buyers.
  - role: Founding eng
    startTiming: Month 0
    rationale: Builds the core workflow engine, data model, and document-generation system needed for the MVP.
  - role: Grid and geospatial product engineer
    startTiming: Month 2
    rationale: Translates site, network, and scenario logic into reusable decision rules and jurisdiction templates.
  - role: Solutions engineer / implementation lead
    startTiming: Month 4
    rationale: Ensures pilots deploy quickly, captures structured customer feedback, and prevents the founders from absorbing all onboarding work.
  - role: GTM lead
    startTiming: Month 9
    rationale: Added only after design-partner conversion proves a repeatable buying trigger and pricing basis.
milestones:
  - horizon: 0–12 months
    items:
      - Sign 3 paid design partners in Finland and the Netherlands
      - Deliver 48-hour no-go workflow on 15 back-tested and 5 live projects
      - Convert at least 2 pilots into annual contracts
      - Launch reusable submission templates in 2 jurisdictions
  - horizon: 12–24 months
    items:
      - Expand into Germany and support 10-12 active project phases
      - Achieve 70%+ gross margin with standardized onboarding and partner-delivered edge cases
      - Prove multi-region expansion inside at least 3 customer accounts
      - Win first paid adjacent industrial electrification customer
  - horizon: 24–36 months
    items:
      - Become system of record for path-to-power workflow across 3-4 European jurisdictions
      - Build approval benchmarking dataset across 30+ completed project workflows
      - Reach credible adjacency traction in factory electrification or EV-depot projects
      - Demonstrate that software-led expansion, not bespoke services, drives the majority of new revenue
risks:
  - risk: Grid, utility, and municipal data remain too fragmented to support repeatable software recommendations.
    likelihood: High
    impact: High
    mitigation: Narrow the initial geography set, ingest customer and partner documents, and automate only the highest-repeatability workflow steps first.
  - risk: Early customers ask for consultancy-style modeling and permit support that erodes product focus and margins.
    likelihood: High
    impact: High
    mitigation: Keep fixed pilot scope, push bespoke engineering to partners, and convert repeated outputs into templates before hiring more services capacity.
  - risk: Developers may buy only at late-stage project gates, extending sales cycles and weakening the screening wedge.
    likelihood: Medium
    impact: High
    mitigation: Target funded live projects with near-term land or tenant deadlines and price initial contracts against active project economics.
  - risk: The beachhead is too small unless the workflow expands into adjacent electrification markets.
    likelihood: Medium
    impact: High
    mitigation: Validate one adjacent segment within the first 12 months using the same core path-to-power primitives and pricing logic.
fundingAsk:
  stage: pre-seed
  targetFundingRangeUsd: $2-3M
  runwayMonths: 18
  useOfFundsSummary: >-
    Fund 18 months of product build, data acquisition, and founder-led customer
    validation to prove 2-3 jurisdictions, convert design partners into annual
    contracts, and reach a repeatable software-first path-to-power workflow
    before scaling sales.
