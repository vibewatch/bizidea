market:
  tam:
    value: $36.0M
    rationale: 'Conservative beachhead-adjacent TAM for European large-load data-centre development workflow spend: use JLL’s 3.6 GW FLAP-D live-capacity base as a lower-bound proxy, apply the Commission target to triple data-centre capacity (=> 7.2 GW net new capacity on that base), divide by an estimated 40 MW average project phase, then multiply 180 project phases by an estimated $200k annual workflow budget per active phase. Excludes factory electrification and most non-core EU markets.'
    isEstimate: true
    sourceRefs:
    - 3
    - 18
    - 28
  sam:
    value: $9.0M
    rationale: Near-term SAM assumes ~25% of the modeled Europe project-phase TAM sits in the Nordics, Germany and the Netherlands, the proposed beachhead where Finland alone reports 100 pending projects and Dutch industry reports persistent grid bottlenecks. 45 modeled project phases x $200k.
    isEstimate: true
    sourceRefs:
    - 4
    - 5
    - 9
    - 10
  som:
    value: $2.4M
    rationale: Year-3 SOM assumes 12 project phases across roughly 8-10 development accounts at about $200k each, which is credible only if the startup becomes the earlier-stage screen-and-submit workflow rather than a light advisory overlay.
    isEstimate: true
    sourceRefs:
    - 19
    - 20
    - 28
    - 29
