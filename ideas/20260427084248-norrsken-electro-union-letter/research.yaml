competitors:
- name: Paces
  stage: scale-up
  wedge: AI-assisted siting, modular diligence and path-to-power workflows for power and data-centre developers.
  pricing: Custom / contact sales
  strength: Closest product analogue; strong framing around viable sites, fresher grid models and faster diligence.
  weaknessVsUs: US-first and broader across power development; not clearly positioned around European municipal permitting plus large-load site qualification.
  sourceRefs:
  - 19
  - 20
  - 21
- name: Neara
  stage: scale-up
  wedge: Physics-enabled utility digital twin for network modelling, resilience and design automation.
  pricing: Custom / contact sales
  strength: Deep technical credibility with utilities and strong digital-twin positioning.
  weaknessVsUs: Optimised for utility-side network planning, not developer-side site ranking, jurisdiction templates or submission workflow.
  sourceRefs:
  - 27
  - 30
- name: Piclo
  stage: scale-up
  wedge: Independent marketplace for network flexibility procurement and operations.
  pricing: Custom / contact sales
  strength: Real DSO/TSO distribution and operational visibility into constrained local markets.
  weaknessVsUs: Solves flexibility monetisation and dispatch, not large-load site selection or permit-pack generation.
  sourceRefs:
  - 22
  - 23
  - 24
- name: Ramboll
  stage: incumbent
  wedge: Full-lifecycle data-centre site selection, due diligence, engineering design and permitting services.
  pricing: Custom advisory / project fees
  strength: Trusted incumbent with breadth across power, water, community and permitting.
  weaknessVsUs: Services-heavy delivery is slower to scale and weak at turning repeated learnings into a developer-side system of record.
  sourceRefs:
  - 28
  - 29
