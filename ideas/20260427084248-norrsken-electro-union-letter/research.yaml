reportMemo:
  executiveTakeaways:
  - The scarce asset is not generic clean power; it is bankable, permitable megawatts at specific sites. JLL shows FLAP-D vacancy at 6.3% and connection lead times up to 10 years, while Ramboll says interconnection queues beyond five years are pushing land banking and pre-powered land. [3][29]
  - 'Policy is moving toward the thesis, not against it: the EU wants to at least triple data-centre capacity in 5-7 years while simultaneously tightening data-centre reporting and speeding grids, storage, PPAs and permitting. [18][11][13][16][17]'
  - The workflow is still fragmented and services-heavy. Paces is the closest software analogue, but it is US-centric and broader than Europe-specific load-side permitting; Ramboll shows how much value still sits inside bespoke due diligence and permit strategy. [19][20][21][28][29]
  - Nordics and the Netherlands are credible beachheads. Fingrid says Finland already has 100 pending data-centre projects, while Dutch industry reports frame the market as having moved from boom to bottlenecks. [10][4][5]
  - 'Willingness to pay should exist because the avoided cost is large: powered-land premiums, dead-end site-control work and consultant cycles dwarf a six-figure workflow subscription if the product kills bad sites early or shortens submission cycles. [3][21][29]'
  - The main venture risk is not demand creation; it is execution. The startup must win earlier in the workflow than consultants and then compound local approval data fast enough to become a system of record rather than a nicer study generator. [15][19][28][29]
  marketDefinition: This market is narrowly defined as workflow software for large-load project developers that need to qualify a site, model path-to-power options, coordinate interconnection inputs and generate submission-ready permitting packages for 10-100 MW projects in Europe. It includes AI campuses, colocation developments and adjacent power-intensive sites where grid access and local approvals are gating; it excludes generic ESG reporting, utility asset management, and purely upstream renewable project origination tools. [3][18][28][29]
  customerAndBuyer: Initial users are development managers, energy-infrastructure leads and origination teams at European colocation and AI-campus developers. The economic buyer is typically the VP/Head of Development or country GM who owns site control, utility engagement and internal investment approvals. The painful jobs are screening sites before competitors lock them up, proving a credible path to power, and assembling a board- and regulator-ready package without waiting on slow consultant cycles. [3][19][21][28][29]
  buyingTriggers:
  - point: Anchor-tenant LOI, expansion mandate or land-option deadline forces a developer to prove path-to-power quickly.
    sourceRefs:
    - 3
    - 19
    - 29
  - point: Grid scarcity makes pre-commitment the default in major markets, pulling diligence earlier in the funnel.
    sourceRefs:
    - 3
  - point: New or faster permitting windows around grids, PPAs and storage make earlier submissions economically valuable.
    sourceRefs:
    - 13
    - 16
    - 17
  willingnessToPay:
    summary: There is real budget pressure behind this problem because developers already pay indirectly via powered-land premiums, consultant-led feasibility studies, optioned-but-unbuildable sites and delay against scarce grid capacity. JLL and Ramboll both show that speed-to-power now changes land economics, while Paces markets faster modular diligence as a direct alternative to slow expert studies. [3][21][28][29]
    sourceRefs:
    - 3
    - 21
    - 28
    - 29
  competitiveLandscape: 'The direct-software field is still relatively thin. Paces is the closest product analogue on siting, due diligence and path-to-power workflows; Neara is a utility-side digital twin that can answer network-design questions but is not built as a developer system-of-record; Piclo owns flexibility-market procurement and DSO/TSO distribution, not site selection or municipal permitting; Ramboll represents the default incumbent: high-end services that span site selection, due diligence, design and permitting. In practice, the dominant substitute remains a patchwork of consultants, utility interactions and internal GIS models. [19][20][21][22][23][24][27][28][29][30]'
  incumbentThesis:
  - incumbentClass: Engineering consultancies
    point: Consultancies do not win by default because they monetise bespoke effort after a site is already in motion; a developer-side workbench can move earlier, kill bad sites faster and retain learnings across the portfolio instead of restarting each study. [21][28][29]
    sourceRefs:
    - 21
    - 28
    - 29
  - incumbentClass: Utility digital-twin platforms
    point: Utility-side tools such as Neara help network owners model resilience and design, but they are not designed as buyer-side permitting CRMs for colocation developers managing site options, municipal workflows and internal investment committees. [27][30]
    sourceRefs:
    - 27
    - 30
  - incumbentClass: Flexibility and market-access platforms
    point: Piclo can help unlock flexibility contracts and visibility into constrained zones, but it solves monetisation and dispatch of flexible assets rather than the full site-ranking and permit-packaging problem. [22][23][24]
    sourceRefs:
    - 22
    - 23
    - 24
  - incumbentClass: In-house spreadsheets and GIS stacks
    point: Developers can assemble internal workflows, but Paces’ own category framing shows that disconnected tools, stale models and sequential diligence are the core failure mode; a product can win if it materially reduces time-to-no-go and time-to-submission. [19][20][21]
    sourceRefs:
    - 19
    - 20
    - 21
  regulatoryLandscape: The EU is increasing both pressure and opportunity. Data-centre energy reporting is now mandatory for larger facilities and is moving toward an EU-wide rating scheme; the Commission is also issuing fresh guidance on grids, storage and network charges, consulting on AI-in-energy, and pushing PPAs and acceleration areas under the renewables framework. The likely outcome is more standardisation of what “good” projects look like, but not harmonisation of local zoning, water, noise and community acceptance. [11][12][13][14][15][16][17][18][28]
  technologyLandscape: The technical stack that matters is geospatial + grid-model + permitting workflow, not a generic sustainability dashboard. Buyers need parcel screening, substation and corridor intelligence, withdrawal/deliverability checks, optional BESS/flexibility configurations, and document outputs that survive utility and municipal scrutiny. The category direction is toward fresher grid models, modular diligence and explainable design logic. [20][21][27][28][29][30]
  distributionChannels:
  - point: Direct sales into active expansion programs at colocation developers and AI-campus sponsors is the primary motion because the pain is most acute at live site deadlines.
    sourceRefs:
    - 3
    - 28
    - 29
  - point: Engineering advisers, EPCs and due-diligence firms are realistic referral or implementation partners because they already sit in the workflow and can be service wrappers around software.
    sourceRefs:
    - 28
    - 29
  - point: Flexibility and energy-market partners can become channel-adjacent because BESS, PPAs and demand response increasingly affect path-to-power economics.
    sourceRefs:
    - 16
    - 17
    - 23
    - 24
  partnershipEcosystem:
  - point: TSOs/DSOs and municipal authorities are data and approval chokepoints, so integrations or repeatable templates by geography matter more than generic SaaS integrations.
    sourceRefs:
    - 10
    - 15
