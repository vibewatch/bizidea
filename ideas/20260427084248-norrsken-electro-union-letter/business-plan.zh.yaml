slug: grid-ready-load-permits
date: '2026-04-27'
executiveSummary: >-
  这家公司是一家聚焦欧洲的工作流平台，服务对象是那些必须在竞争对手吃掉稀缺容量之前，把候选地块变成可获批、可并网的 10-100 MW 负载项目的开发团队。最初的客户会是北欧或荷兰的 colocation 或 AI 园区开发团队：他们已经拿到 anchor tenant、土地选择权或扩张任务，必须在董事会时间表内证明“拿电路径”走得通。产品切口不是泛泛的电网情报，而是一套能够给地块排序、建模并网加储能/柔性方案、并生成可提交给电网公司和市政部门材料包的系统。战略逻辑是先在地块筛选工作流里比顾问更早赢下位置，再把项目一路留在系统里，直到提交和审批。研究已经证明了痛点、时机和政策顺风，但还没有证明购买行为；最大的未知仍然是，开发商会不会在请顾问之前就愿意为软件买单。滩头市场真实存在，但规模偏窄，因此要做成 venture outcome，前提是先在 2-3 个司法辖区里证明可重复性，再把同一套工作流扩展到工厂电气化和相邻的柔性负载项目。所以公司更适合筹一轮 pre-seed，用来验证 48 小时 no-go 工作流、把设计伙伴转成年约，并优先积累按辖区沉淀的审批数据，而不是过早横向摊大饼。
problem:
  - 欧洲的大型负载开发团队常常在候选地块上浪费数月，最后才发现根本拿不到电网容量或本地许可。
  - 现在的流程被顾问、电网公司、市政部门和内部电子表格切得七零八落，因此团队往往太晚才发现致命问题，还得为定制研究一再重复付费。
solution:
  - 一个电网就绪工作台，围绕并网条件、规划约束以及可选的储能或柔性方案，对候选地块的“拿电可行性”打分。
  - 一套提交流程软件，把项目输入转成可复用的电网公司、市政部门和投资委员会证据包，而不再是每次都重新拼装的顾问 deck。
whyWeWin:
  - 我们比咨询类 incumbents 更早切入，因为我们先帮开发商决定哪些地块不值得浪费时间，而不是等 site control 锁死后才进场。
  - 产品防守力会随着审批结果数据、分地区模板，以及把并网和 BESS/柔性负载决策连起来的设计建议不断复利。
strategicChoices:
  beachhead: 在芬兰、瑞典、荷兰，随后是德国，评估次级地块、且面临并网和规划风险不确定性的 10-100 MW AI colocation 与 GPU 园区开发商。
  wedgeRationale: >-
    这一细分市场最先感到疼，因为土地选择权、租户 LOI 和董事会批准都有明确时限，而电网稀缺又非常真实。这里会反复发生地块筛选决策，单个项目经济体量达到六位数美金，复杂度也足以支撑软件先成立，再往更宽的工业电气化扩张。
  sequencingRationale: >-
    先在 2-3 个可重复的地理市场里，把 no-go 与提交流程做窄做深；直接卖给活项目；等模板沉淀出来后，再让顾问充当交付外壳；团队建设也先补产品和领域能力，而不是先堆销售。这个顺序能最大化对审批数据的学习速度，也最能降低公司被拖成咨询业务的风险。
  notYet:
    - 通用 ESG 或数据中心报告软件
    - 面向公用事业公司的网络规划工具
    - 全流程项目工程与许可咨询服务
    - 在首批验证辖区之外的工厂电气化场景
market:
  tam: "$36.0M"
  sam: "$9.0M"
  som: "$2.4M"
  segments:
    - 推进 10-100 MW 项目的欧洲 colocation 与 AI 园区开发商
    - 具备相似“拿电路径”工作流的工业园区运营商与工厂电气化团队
  buyingProcess: >-
    购买通常由一个真实扩张事件触发，比如 anchor tenant 的 LOI、土地选择权到期，或内部建造决策。日常用户是开发负责人或能源负责人；真正的经济买方通常是 VP/Head of Development 或国家总经理，他们掌握 site control、电网对接和内部 capex 审批。
product:
  mvp: >-
    MVP 先覆盖芬兰与荷兰，提供地块筛选、红旗打分、可配置的并网与 BESS 情景，以及面向一个真实项目团队的“可提交”清单和文档包生成能力。它必须依靠客户数据加上可复用的辖区模板，在 48 小时内给出可信的地块 no-go 判断。
  sixMonth: >-
    在芬兰与荷兰交付生产级 MVP，支持 5-10 个活跃地块对比，结构化记录 no-go 原因，并上线能替代电子表格状态跟踪的提交工作区。
  twelveMonth: >-
    加入德国，支持跨活跃项目的组合视图、审批结果基准，以及由伙伴交付的储能或柔性方案模块，但不扩展到定制工程服务。
  twentyFourMonth: >-
    在北欧、荷兰和德国成为欧洲“拿电路径”工作流的 system of record，并为相邻的工厂与工业电气化项目沉淀可复用模板，以及按地块特征和兆瓦等级划分的审批概率基准数据。
  keyBets:
    - 一套最小数据集，能够在不做完整工程研究的前提下，于 48 小时内可靠地筛掉坏地块。
    - 客户愿意在 site control 最终敲定之前，就为更早阶段的工作流软件买单。
    - BESS 和柔性负载情景设计，能显著提升提交材料质量和胜率。
    - 少数几个辖区的模板，起步时比一上来覆盖广泛欧洲市场更能形成复利。
gtm:
  wedge: >-
    先把一个活项目试点卖给正在比较 5-10 个候选地块、准备建设 20-80 MW 园区的北欧或荷兰 colocation 开发商；等工具成为默认的“筛选 + 提交”工作流后，再转成按区域收取的年度订阅。
  channels:
    - 创始人主导，直接销售给 colocation 与 AI 园区扩张团队
    - 与已经深度介入活项目的工程顾问和 EPC 建立转介绍与实施合作
    - 通过北欧、荷兰和德国的数据中心与数字基础设施生态获取定向行业触达
  funnelTargets: "目标账户→合格活项目 25-35%，合格项目→付费试点 40%+，付费试点→年度正式合同 60%+，留存账户→第二区域扩张在第 18 个月前达到 50%+。"
  pricing: >-
    按活跃地理区域收年费，再加按已提交兆瓦计算的项目工作流费用。初始目标是一地每年 €120k-180k 的平台支出，再加每个活项目 €25k-75k，因为客户买的不是 seat，而是更早砍掉死路地块、减少顾问返工和避开 powered-land 溢价。
businessModel:
  revenueStreams:
    - 区域年度工作流订阅
    - 按项目提交与审批工作区收费
    - 面向储能、柔性负载和投资委员会材料包的高级情景模块
  unitOfValue: 活跃开发项目阶段，以提交的兆瓦数作为扩张驱动
  targetGrossMarginPct: 70
  expansionLevers:
    - 在现有客户账户里增加新辖区
    - 从地块筛选扩展到组合级审批工作流与基准分析
    - 在滩头市场验证后，把同一工作流扩展到工厂电气化、EV 站点和区域供热改造
strategyMap:
  northStarMetric: 客户工作流中达到“可提交状态”的年化兆瓦数
  inputMetrics:
    - 从新地块录入到 no-go 或 shortlist 决策的中位耗时
    - 试点转年度合同的转化率
    - 每个活项目筛过的候选地块平均数量
    - 使用 BESS 或柔性负载情景的提交占比
    - 每个已提交项目的获批率或 accepted-for-review 比例
    - 具备 5+ 个完结项目支撑的可复用辖区模板数量
  moatsToBuild:
    - 按地理、负载规模和申请结构划分的审批结果数据集
    - 面向电网公司、市政部门与内部委员会的分辖区模板库
    - 围绕软件可控工作流嵌入的储能、柔性负载与咨询伙伴生态
  killCriteria:
    - 创始人卖了 9 个月、触达 40+ 个合格账户后，付费设计伙伴或试点仍少于 3 个
    - 前 5 个活项目中，no-go 时间或提交周期没有至少 30% 的可测量改善
    - 到第 12 个月，服务收入或定制交付占总收入仍超过 40%
    - 18 个月内，少于 2 个辖区在各 5 个项目上实现可重复的模板复用
  mermaid: |
    flowchart LR
      Wedge[滩头切口] --> MVP[MVP]
      MVP --> Proof[验证点]
      Proof --> Expansion[扩张动作]
      Wedge --> Data[辖区模板与审批数据]
      Data --> Proof
      Proof --> Moat[系统记录与基准护城河]
      Moat --> Expansion
investorMemo:
  verdict:
    call: Watch
    conviction: 痛点和时机都很强，但在买方证明自己会在顾问主导可研开始前就为软件买单之前，判断仍应保持克制。
    whyBelieve: 电网稀缺、真实存在的数据中心扩张压力，以及碎片化的许可工作流，共同构成了一个可信切口；更快给出 no-go 可以为客户省下实打实的项目成本。
    whyDoubt: 初始滩头市场偏窄，而公司还没证明本地数据质量和“site control 之前下单”的购买行为，足以支撑可扩展的软件经济模型。
    nextDiligence: 在芬兰或荷兰拿下 2-3 个设计伙伴，并展示至少 1 个活项目中量化周期收益、且已转成年度合同的案例。
  firstCustomer:
    title: 北欧或荷兰 colocation 开发商的 VP Development
    profile: 正在推进第二个 20-80 MW 园区、同时比较多个土地选项，并要协调电网公司、市政审批与内部投资委员会时间表的开发负责人。
    trigger: 一个 anchor tenant 的 LOI、土地选择权到期，或董事会批准后的扩张计划，要求团队在几周而不是几个月内拿出一条经得起推敲的“拿电路径”。
    buyer: VP Development 或 Head of Energy Infrastructure
    initialContract: 先为一个辖区和一个活项目签 €40k-80k 的付费试点；一旦产品成为默认区域工作流，再转成每年 €150k-300k 的软件合同加项目费用。
  mustBeTrue:
    - 至少一半受访的 colocation 开发商必须确认：在活项目里，即便还没全面聘请顾问，他们也能为工作流软件拍板预算。
    - 产品必须能在至少 10 个回测项目上，用可接受精度在 48 小时内筛掉或降级坏地块。
    - 至少 60% 的付费试点必须转成年约，因为软件在初筛之后仍持续被使用。
    - 两个首批辖区必须展现出足够的流程重复性，使模板能在各自至少 5 个项目中复用。
    - 除了 colocation 之外，至少还有一个相邻市场能证明同样的工作流在不重写产品的前提下拿到相近 ACV。
  diligenceQuestions:
    - 在 site control 之前，预算线到底归开发团队、能源基础设施团队，还是外部顾问？
    - 在芬兰、荷兰和德国，要做出可信的 no-go 判断，最小数据集到底需要什么？
    - 在客户要求定制工程签字之前，这条工作流有多少比例能保持软件主导？
    - 真正驱动付费意愿的是地块排序、提交打包，还是内部审批提速？
    - 顾问和 EPC 伙伴会加速分发，还是把公司拖进低毛利的服务交付？
  riskHeatmap:
    - risk: 碎片化的电网与许可数据让产品化工作流无法可靠成立
      likelihood: High
      impact: High
      leadingIndicator: 早期试点在大多数项目上都需要人工分析师介入，或根本做不出 48 小时 no-go 判断
      mitigation: 从 2-3 个辖区起步，把客户提供的文件与公开数据拼起来，并只自动化那些在项目间重复出现的字段
    - risk: 客户只有在顾问已介入后才会购买，导致软件切口变窄
      likelihood: Medium
      impact: High
      leadingIndicator: 访谈普遍认可工作流价值，但只要土地已被 option、外部研究已启动，商机才会推进
      mitigation: 围绕具体 gating event 销售，按活项目定价，并把产品定位成“顾问进场前的分诊 + 提交控制”
    - risk: 服务蔓延吞掉 SaaS 毛利
      likelihood: High
      impact: High
      leadingIndicator: 到第 12 个月，定制建模、文档重写或伙伴管理分析占掉超过 40% 的交付精力
      mitigation: 把重复交付全部产品化，固定实施边界，并把定制工程转给伙伴
    - risk: 滩头市场过窄，若没有相邻扩张就难以支撑 venture 结果
      likelihood: Medium
      impact: High
      leadingIndicator: 试点反馈很好，但既没有转成多项目扩张，也看不到工业电气化账户的可信需求
      mitigation: 在第 12 个月前验证一个相邻工作流，并沿用同一套“拿电路径”原语，而不是做成只服务数据中心的软件
operatingAssumptions:
  - assumption: 当活项目碰到拿电时间节点时，开发商会在请顾问之前或同时，为工作流软件买单。
    basis: research.yaml
    validationTest: 访谈 8-10 位开发负责人，并在正式许可顾问进场前，围绕正在筛选地块的活项目签下至少 2 个付费试点。
    decisionImpact: 如果不成立，就把产品重新定位成 site control 之后、通过顾问销售的提交软件，而不是直接卖给前期筛选环节。
  - assumption: 芬兰与荷兰具备足够流程重复性，能让模板明显缩短周期。
    basis: research.yaml
    validationTest: 收集并结构化 20 份历史申请包，证明两地至少 70% 的核心字段与清单步骤可被标准化。
    decisionImpact: 如果不成立，就先收窄到单一辖区，并推迟跨境扩张与招聘。
  - assumption: 只凭地块、电网、光纤、水与负载曲线输入，就能在 48 小时内给出 no-go，而不必每次都做定制工程。
    basis: research.yaml
    validationTest: 回测 15 个历史项目，并用产品工作流在 no-go 或 shortlist 结论上达到至少 80% 的专家一致性。
    decisionImpact: 如果不成立，就把 MVP 承诺收缩成工作流编排与文档自动化，而不是决策智能。
  - assumption: BESS 与柔性负载情景足够影响决策，既能支撑溢价，也能提高审批胜率。
    basis: idea.yaml
    validationTest: 在前 5 个试点里，衡量客户是否把这些情景用于电网或内部提交，以及这些项目推进速度是否优于基线。
    decisionImpact: 如果不成立，就把储能和柔性负载保留为伙伴模块，把核心产品继续聚焦在筛选加许可工作流。
  - assumption: 即使导入过程很重，公司仍能把软件毛利率维持在 70% 以上。
    basis: operator judgment
    validationTest: 跟踪前 10 次部署的实施工时、伙伴转付成本与支持负担；软件和标准化实施收入占比应超过 70%。
    decisionImpact: 如果不成立，就放慢销售招聘、提高价格，并在产品边界更清晰前压缩定制交付。
experimentRoadmap:
  - horizon: 0–90 天
    experiment: 创始人亲自完成面向芬兰、荷兰与德国 colocation 开发商的探索与定价访谈
    hypothesis: 只要这套工作流能在顾问费用膨胀前显著减少死路地块，买方就愿意从活项目预算里拿钱做试点。
    successMetric: 完成 8+ 次合格访谈、发出 3 份试点方案，并拿到至少 2 个按目标价格推进的口头付费承诺
    owner: CEO
  - horizon: 0–90 天
    experiment: 用历史地块回测 MVP 打分逻辑与 no-go 标准
    hypothesis: 一套收窄后的数据集，可以足够准确地复现专家的 shortlist 或 no-go 判断，从而在漏斗前端节省时间。
    successMetric: 完成 15 个回测，在地块处置结论上的一致率达到 80%+，且中位周转时间低于 48 小时
    owner: Founding eng
  - horizon: 90–180 天
    experiment: 在芬兰与荷兰上线付费设计伙伴试点
    hypothesis: 开发团队会把产品贯穿用于地块筛选和提交准备，而不是只拿来做一次性分析。
    successMetric: 启动 3 个付费试点、支持 2 个真实提交，并在核心项目成员中达到 60%+ 的周活跃使用率
    owner: CEO
  - horizon: 90–180 天
    experiment: 建立边界清晰的顾问与 EPC 伙伴实施计划
    hypothesis: 只要实施边界明确，伙伴就能加速分发，而不会留下太重的定制交付尾巴。
    successMetric: 签下 2 份伙伴协议，且伙伴驱动工作占全部交付工时的比例低于 25%
    owner: GTM lead
  - horizon: 180–365 天
    experiment: 上线德国辖区模板，并在首批账户内推动多项目扩张
    hypothesis: 客户一旦在一个区域看到价值，扩展到第二个区域的速度会快于拿下全新的净新客户。
    successMetric: 2 个现有客户新增第二个地理区域，且模板复用把导入时间至少砍掉 40%
    owner: Product lead
  - horizon: 180–365 天
    experiment: 做一个相邻的工业电气化试点
    hypothesis: 同一套“拿电路径”工作流，只需少量产品改动，就能拿下一个工厂或工业园区项目。
    successMetric: 拿到 1 个付费的非 colocation 试点，ACV 不低于滩头价格的 75%，且无需重大架构重写
    owner: CEO
operations:
  - 建一套辖区模板库，按地区存放电网公司表单、市政清单逻辑和所需证据材料。
  - 让每个试点都走一遍结构化项目复盘，把 no-go 原因、审批结果和缺失字段反写回产品。
  - 用 CRM 加一套和 LOI、土地选择权、董事会批准等 buying trigger 绑定的销售阶段规则，而不是泛泛 lead scoring。
  - 用 fixed-scope 的工作说明书来签 specialist advisers 和 EPC 伙伴，把定制工程隔离在核心团队之外。
  - 保持可审计的文档生成与 QA 流程，因为提交材料的可信度比看板是否漂亮更重要。
team:
  - role: 创始人 / 领域型 CEO
    startTiming: Month 0
    rationale: 负责创始人主导销售、伙伴拓展，以及面向开发和能源基础设施买方的客户发现。
  - role: 创始工程师
    startTiming: Month 0
    rationale: 搭建 MVP 所需的核心工作流引擎、数据模型和文档生成系统。
  - role: 电网与地理空间产品工程师
    startTiming: Month 2
    rationale: 把地块、网络和情景逻辑翻成可复用的决策规则与辖区模板。
  - role: 解决方案工程师 / 实施负责人
    startTiming: Month 4
    rationale: 确保试点快速上线、结构化收集客户反馈，并避免所有导入工作都压到创始人身上。
  - role: GTM 负责人
    startTiming: Month 9
    rationale: 只有当设计伙伴转化证明购买触发点和定价基础可重复之后，才增加这类岗位。
milestones:
  - horizon: 0–12 个月
    items:
      - 在芬兰和荷兰签下 3 个付费设计伙伴
      - 在 15 个回测项目和 5 个活项目上交付 48 小时 no-go 工作流
      - 至少把 2 个试点转成年度合同
      - 在 2 个辖区上线可复用的提交模板
  - horizon: 12–24 个月
    items:
      - 扩张到德国，并支持 10-12 个活跃项目阶段
      - 通过标准化导入和伙伴处理边缘案例，把毛利率做到 70%+
      - 在至少 3 个客户账户里证明多区域扩张
      - 赢下第一个付费的相邻工业电气化客户
  - horizon: 24–36 个月
    items:
      - 在 3-4 个欧洲辖区里成为“拿电路径”工作流的 system of record
      - 在 30+ 个完结项目工作流上建立审批基准数据集
      - 在工厂电气化或 EV 站点项目上证明可信的相邻增长
      - 证明新增收入主要来自软件驱动扩张，而不是定制服务
risks:
  - risk: 电网、公用事业公司和市政数据仍然过于碎片化，无法支撑可重复的软件建议。
    likelihood: High
    impact: High
    mitigation: 缩小初始地理范围，接入客户和伙伴提供的文件，并优先自动化重复性最高的工作流步骤。
  - risk: 早期客户会不断要求咨询式建模与许可支持，侵蚀产品聚焦和毛利率。
    likelihood: High
    impact: High
    mitigation: 固定试点边界，把定制工程推给伙伴，并在增加服务人手前，先把重复输出做成模板。
  - risk: 开发商可能只会在项目后期关键节点购买，导致销售周期被拉长，也削弱前期筛选切口。
    likelihood: Medium
    impact: High
    mitigation: 围绕近期土地或租户期限的已获资助活项目销售，并把初始合同和活项目经济账绑定起来。
  - risk: 如果工作流不能扩展到相邻电气化市场，滩头市场本身可能太小。
    likelihood: Medium
    impact: High
    mitigation: 在前 12 个月内用同一套“拿电路径”原语与定价逻辑验证一个相邻细分市场。
fundingAsk:
  stage: pre-seed
  targetFundingRangeUsd: $2-3M
  runwayMonths: 18
  useOfFundsSummary: >-
    用 18 个月资金完成产品开发、数据获取和创始人主导客户验证，证明 2-3 个辖区跑得通，把设计伙伴转成年度合同，并在放大销售前先跑出一条以软件为主的可重复“拿电路径”工作流。