scenarios:
  downside:
    description: Slower pre-site-control buying, one-quarter sales-cycle slippage, and lower blended pricing before Germany expansion.
    y3RevenueK: 1800.0
    y3EbitdaK: -1020.0
    cashLowPointK: -2280.0
    keyAssumptionChanges:
      - Blended monthly revenue per account falls to 18K.
      - Y2 and Y3 customer additions each slip by roughly one quarter.
      - Gross margin reaches only 66% by Y3 because more partner support remains in delivery.
  base:
    description: Founder-led sales lands the milestone accounts and standardized templates gradually lift gross margin toward the BP target.
    y3RevenueK: 2400.0
    y3EbitdaK: -695.0
    cashLowPointK: -1860.6
    keyAssumptionChanges:
      - Monthly blended revenue per active account stays at 20K.
      - Customer ramp reaches 8 accounts in Y2 and 11 in Y3.
      - Gross margin improves from 65% in Y1 to 70% in Y3.
  upside:
    description: Faster pilot conversion and second-region expansion produce stronger account density without a proportionate headcount step-up.
    y3RevenueK: 3000.0
    y3EbitdaK: -420.0
    cashLowPointK: -1600.0
    keyAssumptionChanges:
      - Blended monthly revenue per account rises to 22K from better regional expansion and project-fee attach.
      - Y3 exits at 13 paid accounts rather than 11.
      - Gross margin reaches 73% as template reuse reduces partner-heavy onboarding.
sensitivity:
  - variable: ARPU
    downsideCase: Blended monthly account revenue slips to 18K because pilots convert at the low end of the pricing range.
    baseCase: Blended monthly account revenue stays at 20K.
    upsideCase: Blended monthly account revenue reaches 22K with more project-fee attach and second-region expansion.
    y3RevenueImpactK: 240.0
    cashImpactK: 360.0
  - variable: CAC
    downsideCase: CAC rises to 160K because live-project qualification takes longer and founder time stays sales-heavy.
    baseCase: CAC stays at 126K.
    upsideCase: CAC falls to 100K through partner referrals and tighter trigger-based selling.
    y3RevenueImpactK: 160.0
    cashImpactK: 190.0
  - variable: churn
    downsideCase: Monthly churn rises to 2.5% if customers treat the product as a one-project tool.
    baseCase: Monthly churn is 1.8%.
    upsideCase: Monthly churn falls to 1.2% once the workflow becomes the system of record across regions.
    y3RevenueImpactK: 120.0
    cashImpactK: 150.0
  - variable: sales cycle
    downsideCase: Paid pilots close one quarter later because buyers wait until consultants are already engaged.
    baseCase: Project-gated founder-led selling matches the BP funnel timing.
    upsideCase: A clearer ROI case pulls pilots forward by one quarter.
    y3RevenueImpactK: 300.0
    cashImpactK: 280.0
  - variable: gross margin
    downsideCase: Y3 gross margin stalls at 66% because data and partner costs stay elevated.
    baseCase: Y3 gross margin reaches 70%.
    upsideCase: Y3 gross margin reaches 73% through template reuse and tighter implementation scope.
    y3RevenueImpactK: 0.0
    cashImpactK: 96.0
  - variable: hiring pace
    downsideCase: The company hires the Y2 and Y3 plan on time before repeatability is proven.
    baseCase: Hiring follows the modeled milestone-based ramp.
    upsideCase: Two GTM or CS hires are delayed until annual conversion metrics are met.
    y3RevenueImpactK: 0.0
    cashImpactK: 180.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      TargetAccounts --> QualifiedLiveProjects
      QualifiedLiveProjects --> PaidPilots
      PaidPilots --> AnnualAccounts
      AnnualAccounts --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: Revenue engine
    finding: Base-case revenue is driven by reaching 11 paid regional accounts by Y3 at a blended $240K annual account value tied to live project workflows.
  - checkName: Must go right
    finding: The company has to win budget before or alongside consultants so founder-led pilots convert into annual software contracts fast enough to justify the Y2 sales hires.
  - checkName: Model breaks if
    finding: A one-quarter sales-cycle slip or services-heavy delivery keeps Y3 revenue under $1.8M and pushes the cash low point toward the downside case.
  - checkName: Next-round proof
    finding: Converting at least 2 pilots into annual contracts across 2 jurisdictions is the proof point that supports a seed raise for Germany and adjacent industrial expansion.
sanityChecks:
  ruleOf40: Y3 growth 62.2% + EBITDA margin -29.0% = 33.2%; improving but still below the 40% benchmark, which is acceptable at pre-seed if learning quality is high.
  burnMultiple: Y3 burn multiple about 0.76x (-$695K EBITDA on $920K net new revenue), which is efficient for an enterprise workflow company still investing in geography buildout.
  revenuePerFte: $218K Y3 ($2.4M revenue / 11 FTE), within the low end of credible vertical SaaS benchmarks and materially better than a services-led model.
  flags:
    - Gross margin only reaches the BP target if partner-delivered edge cases and bespoke engineering stay outside the core team.
    - The model assumes buyers pay before full consultant engagement; if that gating assumption is wrong, both CAC and sales cycle worsen quickly.
    - Beachhead revenue concentration is high because the first 8-11 accounts are all tied to large-load development budgets in a few European jurisdictions.
    - Cash turns negative without a pre-seed close, so fundraising timing is itself an operating dependency rather than a background assumption.
