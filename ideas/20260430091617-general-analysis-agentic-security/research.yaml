    "willingnessToPay": {
      "summary": "Adjacent identity and automation budgets are already real. Okta publicly prices workforce identity from $6-$17 per user/month and highlights $26K process savings from provisioning plus roughly $1M of access-certification and audit-prep savings, while Moveworks and helpdesk automation pages show 88%+ autonomous resolution and major deflection gains. That suggests buyers can fund a dedicated control layer if it protects or unlocks materially larger automation ROI.",
