    "competitiveLandscape": "Direct competitors cluster into horizontal AI-security vendors (Zenity, Noma Security, Prompt Security, Lakera) and identity-led incumbents (Okta). Zenity and Noma push broad visibility, posture, and runtime protection; Prompt emphasizes MCP and gateway control; Lakera emphasizes runtime visibility and outcome control; Okta brings native identity, provisioning, and emerging agent-governance primitives. Substitutes include Workato, Tines, and Moveworks, which let enterprises build and govern workflows or agents inside their own platforms, plus developer-led alternatives such as Permit.io, Pangea, LangChain/LangGraph, manual approvals, SIEM correlation, and in-house proxy scripts. The startup only deserves space if it is meaningfully better at cross-system release gating for sensitive actions than these broader platforms are.",
