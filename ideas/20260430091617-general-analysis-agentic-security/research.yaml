  "reportMemo": {
    "executiveTakeaways": [
      "The strongest evidence says demand appears when internal agents move from read-only copilots to production write actions; that is where identity, audit, and kill-switch gaps become budget-worthy.",
      "Enterprise AI use is scaling faster than governance maturity: Deloitte reports worker access to AI rose 50% in 2025 while only 34% of companies are truly reimagining the business around AI, and nearly 60% still cite integration as the main agentic-AI barrier.",
      "The proposed wedge is sharper than most horizontal AI-security vendors: sequence-level release control for high-risk SaaS actions, rather than generic prompt scanning, model posture, or broad red-teaming.",
      "Incumbents are moving fast\u2014Okta, Workato, Tines, and Moveworks all now market agent, MCP, or identity-governance capabilities\u2014so the startup must win on neutrality across systems and on staging-to-production drift detection.",
      "Technical friction is real and defensible: Okta, Google, Slack, Atlassian, and Microsoft all expose rate limits or throttling constraints, so reliable inline enforcement and unified logging are hard to build but valuable once solved.",
      "The category is investable but timing-sensitive: General Analysis raised $10M and Noma later raised $100M, yet standalone demand may lag if buyers keep agents read-only or accept bundled controls from identity and automation incumbents."
    ],
    "marketDefinition": "Runtime security and governance software for internal, action-taking enterprise AI agents that can change state in SaaS systems such as Okta, Google Workspace, Slack, Jira, and adjacent ITSM / IAM tools. The core buyer is the CISO, identity-security lead, or AI-platform owner at North American and European mid-market and enterprise companies deploying internal IT or employee-support agents. This definition intentionally excludes generic model hosting, read-only chatbots, prompt-only guardrail SDKs, and broad AI posture tools that do not sit in the execution path of high-risk actions.",
    "customerAndBuyer": "Initial ICP: software and internet companies with roughly 1,000-10,000 employees that already use enterprise identity and IT automation tooling and are piloting internal helpdesk or access-provisioning agents. The day-to-day user is the AI platform engineer, security engineer, or IAM admin; the economic buyer is usually the CISO, director of identity security, or enterprise IT/security leader. The urgent job is to let agents complete high-volume tasks without giving up least privilege, human escalation, or auditability. Budget most plausibly comes from identity security, ITSM automation, or AI governance programs rather than pure model spend.",
    "buyingTriggers": [
      {
        "point": "The immediate trigger is production approval for a write-enabled helpdesk or IAM workflow, when existing read-only evaluation or human-in-the-loop approaches begin to bottleneck ROI.",
