    "regulatoryLandscape": "Formal regulation is not yet specific to internal IT agents, but the compliance direction is clear. NIST, OWASP, ENISA, and the UK NCSC all emphasize risk management, logging, human oversight, and security-by-design for AI systems, while the EU AI Act raises the governance bar for deployers operating in Europe. For a product that intermediates provisioning or employee-data workflows, auditability, least privilege, and policy traceability will matter well before a buyer classifies the agent as high risk.",
    "technologyLandscape": "The technical stack is shifting from chat interfaces to tool use, computer use, and MCP-style agent connectivity. Anthropic documents computer-use and tool-use capabilities; Okta and Workato now market agent identity and MCP control; Tines and Moveworks are packaging enterprise agent builders. That makes runtime policy, traceability, and kill-switch behavior more important\u2014but also harder\u2014because the product must work across rate-limited APIs, fragmented audit logs, and evolving orchestration frameworks.",
