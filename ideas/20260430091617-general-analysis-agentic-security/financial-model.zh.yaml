scenarios:
  downside:
    description: 具备写权限的智能体采用延后，且原生控制在更多对比测试中胜出，导致生产转化放缓。
    y3RevenueK: 1830.0
    y3EbitdaK: -1119.0
    cashLowPointK: -140.0
    keyAssumptionChanges:
    - EOY3 客户数从 32 降至 24
    - Y3 混合 ARPU 从 $96K 降至 $90K
    - 销售周期从少于 90 天拉长到约 150 天
  base:
    description: 由创始人主导的试点逐步转化为一家稳定但仍然狭窄的企业工作流安全业务。
    y3RevenueK: 2448.0
    y3EbitdaK: -686.4
    cashLowPointK: 739.35
    keyAssumptionChanges:
    - Q4Y3 达到 32 个付费客户
    - Y3 混合 ARPU 为 $96K，毛利率 70%
    - 到 Q4Y3 维持 12 名 FTE，而不是更早扩成完整企业团队
  upside:
    description: 安全评审切口奏效更快，且多工作流扩张在首批标杆账户中就开始出现。
    y3RevenueK: 2890.0
    y3EbitdaK: -410.0
    cashLowPointK: 1120.0
    keyAssumptionChanges:
    - EOY3 客户数从 32 升至 36
    - 通过用量与合规扩张，Y3 混合 ARPU 从 $96K 提升到 $105K
    - 伙伴来源销售管道足以降低 CAC，从而在不增加招聘的情况下维持增长
