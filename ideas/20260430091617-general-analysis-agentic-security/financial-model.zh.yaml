scenarios:
  downside:
    description: 可写智能体的采用节奏放缓，而原生控制在更多竞争评估里胜出，导致生产转化变慢。
    y3RevenueK: 1830
    y3EbitdaK: -1119
    cashLowPointK: -140
    keyAssumptionChanges:
      - EOY3 付费客户从 32 个降到 24 个
      - Y3 混合 ARPU 从 $96K 降到 $90K
      - 销售周期从 90 天以内拉长到约 150 天
  base:
    description: 创始人主导的试点能逐步转成一门稳定但仍集中的企业流程安全生意。
    y3RevenueK: 2448
    y3EbitdaK: -686.4
    cashLowPointK: 739.35
    keyAssumptionChanges:
      - 到 Q4Y3 达到 32 个付费客户
      - Y3 混合 ARPU 为 $96K，毛利率为 70%
      - 到 Q4Y3 团队维持在 12 FTE，而不是更早扩成完整企业销售团队
  upside:
    description: 安全评审切口起效很快，灯塔客户也更早开始做多流程扩张。
    y3RevenueK: 2890
    y3EbitdaK: -410
    cashLowPointK: 1120
    keyAssumptionChanges:
      - EOY3 付费客户从 32 个升到 36 个
      - 借助 usage 和合规模块扩张，Y3 混合 ARPU 从 $96K 拉升到 $105K
      - 伙伴带来的线索把 CAC 压低到够维持原招聘节奏
