    y3RevenueImpactK: 306
    cashImpactK: 214
  - variable: CAC
    downsideCase: CAC 升到 $65K，导致团队扩张更慢、加单更少
    baseCase: CAC 为 $55K
    upsideCase: 通过伙伴转介绍把 CAC 降到 $45K
    y3RevenueImpactK: 240
    cashImpactK: 180
  - variable: 流失率
    downsideCase: 首条窄流程的月流失率为 2.5%
    baseCase: 月流失率为 1.5%
    upsideCase: 扩张动作跑通后，月流失率降到 1.0%
    y3RevenueImpactK: 220
    cashImpactK: 150
  - variable: 销售周期
    downsideCase: 试点到生产转化周期为 150 天
    baseCase: 试点到生产转化周期少于 90 天
    upsideCase: 转化周期缩短到 60 天
    y3RevenueImpactK: 300
    cashImpactK: 220
  - variable: 毛利率
    downsideCase: 如果部署变得更偏服务化，GM 降到 65%
    baseCase: GM 为 70%
    upsideCase: 如果连接器复用更顺，GM 拉升到 75%
    y3RevenueImpactK: 0
    cashImpactK: 122
  - variable: 招聘节奏
    downsideCase: 在转化尚未可复制前就提前加 2 个人
    baseCase: 到 Q4Y3 团队达到 12 FTE
    upsideCase: 等拿下 10 个生产客户后再延后补 2 个岗位
    y3RevenueImpactK: 0
    cashImpactK: 280
modelDiagram:
  title: 单位经济模型流转
  mermaid: |-
    flowchart LR
      Leads[安全评审线索] --> Pilots[付费试点]
      Pilots --> Customers[进入保护的生产工作流]
      Customers --> Revenue[平台费 + usage 收入]
      Revenue --> GrossProfit[70% 毛利润]
      GrossProfit --> Cash[runway 与现金缓冲]
      Customers --> TraceData[动作轨迹数据护城河]
      TraceData --> Expansion[通过更多工作流和模块拉高 ARPU]
modelSanity:
  - checkName: 收入引擎
    finding: 基准情形下，收入来自付费流程 / 账户从 6 个增至 32 个，同时混合 ARPU 从试点占主导时的 $72K 抬升到生产合同与 usage 扩张驱动的 $96K。
  - checkName: 必须跑对的环节
    finding: 模型成立的前提，是围绕安全评审的试点转化率持续高于 60%，且转正周期大致维持在 90 天内，这样创始人主导的 CAC 才能维持在中等五位数。
  - checkName: 什么时候会坏掉
    finding: 如果买方继续让智能体停留在只读，或者部署长期带着高服务属性，downside 情形会在下一轮募资前把现金打穿到负值。
  - checkName: 下一轮需要证实什么
    finding: 一个可信赖的 Series A 故事，应该是 10+ 个生产客户、跨多个连接器的覆盖，以及低到够支持“从单流程扩到账户级控制”的误报水平。
sanityChecks:
  ruleOf40: Y3 增长率 141.8% + EBITDA 利润率 -28.0% = 113.8%
  burnMultiple: Y3 的 burn multiple 约为 0.5x，对应 $686.4K EBITDA 消耗和 $1344.0K 新增 ARR；相比 Y2 约 0.8x 显著改进。
  revenuePerFte: Y3 在 Q4Y3 配置 12 FTE 时，人均收入约为 $204K（SaaS 参考区间 $200–400K）
  flags:
    - 基准情形到 Q4Y3 达到 32 个付费客户，距离研究里第 3 年 35 个账户的 SOM 上限已不远；如果没有多流程扩张，后续空间会显得偏紧。
    - 毛利率直接按 70% 目标持平处理；如果连接器工作和客户上线一直偏服务化，burn 和估值质量都会迅速恶化。
    - 现金保持为正，前提是模型从种子轮交割后起算，并把 EBITDA 视作现金的合理近似；递延收入节奏和 capex 并未显式展开。
