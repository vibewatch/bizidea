slug: agent-access-release-firewall
date: '2026-04-30'
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: 付费客户定义
  value: 1 个付费受保护工作流/账户等价单位
  unit: definition
  source: '[BP businessModel.unitOfValue] 收入按付费工作流/账户等价单位建模，而不是按席位建模。'
- id: A2
  name: 模型起始与融资时点
  value: 2026-07
  unit: YYYY-MM
  source: '[BP fundingAsk] 模型从种子轮关闭后开始，使现金滚动反映经营表现，而不是融资前时点。'
- id: A3
  name: 期初现金
  value: '3300'
  unit: USDK
  source: '[BP fundingAsk $3-4M] 假设为 $3.2M 种子轮加约 $0.1M 创始人/种子前现金（创业财务经验法则）。'
- id: A4
  name: Y1 混合已实现 ARPU
  value: '72'
  unit: USDK annual per paying customer
  source: '[BP gtm.pricing] 低于 $75k-$120k 的生产 ACV，因为 Y1 以试点为主，且早期工作流有折扣。'
- id: A5
  name: Y2 混合 ARPU
  value: '90'
  unit: USDK annual per paying customer
  source: '[BP gtm.pricing; Research market.som] 与市场测算中生产合同比例更高时使用的 $85k-$90k 混合 ACV 一致。'
- id: A6
  name: Y3 混合 ARPU
  value: '96'
  unit: USDK annual per paying customer
  source: '[BP businessModel.expansionLevers] 假设用量与合规模块有温和扩张，同时仍处于首工作流 $75k-$120k 区间之内。'
- id: A7
  name: 客户爬坡
  value: 6 EOY1 / 18 EOY2 / 32 EOY3
  unit: paying customers
  source: '[BP milestones; Research market.som] 以第 1 年 3 个付费试点、24 个月时 10 个生产客户，以及到第 3 年仍低于研究中 35 个可触达账户上限为锚。'
- id: A8
  name: 目标毛利率
  value: '70'
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct] 作为基础情景下软件稳态毛利率。'
- id: A9
  name: 月度账户/工作流流失率
  value: '1.5'
  unit: percent
  source: '[Startup-finance heuristic] 早期企业安全产品虽以年度合同为主，但首工作流范围较窄时，通常按 1-2% 月流失率保守建模，直到扩张被验证。'
- id: A10
  name: 全成本 CAC
  value: '55'
  unit: USDK per new customer
  source: '[BP gtm.funnelTargets] 围绕安全评审、且试点到生产少于 90 天的创始人主导企业销售，CAC 通常落在中五位数区间（创业财务经验法则）。'
- id: A11
  name: 试点转化与销售周期
  value: 转化率 60%+；试点到生产少于 90 天
  unit: funnel
  source: '[BP gtm.funnelTargets] 直接用于支撑基础客户爬坡假设。'
- id: A12
  name: 全成本薪资区间
  value: 创始人 144 / 工程 210 / 产品安全 216 / 解决方案 180 / 销售 210 / G&A 156
  unit: USDK annual per FTE
  source: '[Startup-finance heuristic] 远程优先的美国企业基础设施创业公司薪酬，并计入约 20% 福利/工资税负载。'
- id: A13
  name: 招聘节奏
  value: 起始 3 名 FTE，Y1 Q4 达到 6 人，Y2 Q4 达到 8 人，Y3 Q4 达到 12 人
  unit: FTE
  source: '[BP team] 直接招聘与创始人、创始工程师、安全产品负责人、第 6 个月解决方案工程师、第 9 个月 GTM 负责人一致，之后再按经验法则补充连接器与可复制企业销售岗位。'
- id: A14
  name: 非薪酬运营支出
  value: Y1 每月约 18-25，到 Y3 每季度升至 80-110
  unit: USDK
  source: '[BP costStructure] 覆盖云日志、安全/合规、软件、差旅和法务，采用精简创业财务经验法则。'
- id: A15
  name: 现金转换假设
  value: EBITDA 近似代表经营现金流
  unit: policy
  source: '[Startup-finance heuristic] 假设资产轻型 SaaS 基础设施创业公司资本开支、债务和营运资本扭曲极小，因此 EBITDA 近似经营现金流。'
- id: A16
  name: 融资目标
  value: 在保留 6 个月缓冲的前提下，实现 10+ 个生产客户与多连接器验证
  unit: milestone
  source: '[BP milestones; BP fundingAsk] 该假设用于确定种子轮规模，而不是单纯最大化资金跑道。'
