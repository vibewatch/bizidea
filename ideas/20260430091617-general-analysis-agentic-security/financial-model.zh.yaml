slug: agent-access-release-firewall
date: 2026-04-30
currency: USD
modelStartMonth: 2026-07
assumptions:
  - id: A1
    name: 付费客户定义。
    value: 1 paid protected workflow/account equivalent
    unit: 定义
    source: "[BP businessModel.unitOfValue] 收入模型按付费流程 / 账户等价单位计，不按 seat 计。"
  - id: A2
    name: 模型起始与融资时点
    value: 2026-07
    unit: YYYY-MM
    source: "[BP fundingAsk] 模型从种子轮交割后起算，这样现金滚动反映的是经营表现，而不是交割前的融资节奏。"
  - id: A3
    name: 期初现金
    value: "3300"
    unit: USDK
    source: "[BP fundingAsk $3-4M] 假设完成 $3.2M 种子轮，并另有约 $0.1M 创始人 / pre-seed 现金（startup-finance heuristic）。"
  - id: A4
    name: Y1 混合已实现 ARPU
    value: "72"
    unit: USDK annual per paying customer
    source: "[BP gtm.pricing] 低于 $75k-$120k 的生产 ACV，由于 Y1 以试点为主，前期流程会打折。"
  - id: A5
    name: Y2 混合 ARPU
    value: "90"
    unit: USDK annual per paying customer
    source: "[BP gtm.pricing; Research market.som] 与市场测算中采用的 $85k-$90k 混合 ACV 对齐，前提是生产合同逐渐占主导。"
  - id: A6
    name: Y3 混合 ARPU
    value: "96"
    unit: USDK annual per paying customer
    source: "[BP businessModel.expansionLevers] 假设 usage 和合规模块带来温和扩张，同时仍落在首条流程 $75k-$120k 的表述区间内。"
  - id: A7
    name: 客户爬坡
    value: 6 EOY1 / 18 EOY2 / 32 EOY3
    unit: 付费客户数
    source: "[BP milestones; Research market.som] 以第 1 年 3 个付费试点、第 24 个月 10 个生产客户为锚点，同时仍低于研究里第 3 年 35 个可触达账户的 SOM 上限。"
  - id: A8
    name: 目标毛利率
    value: "70"
    unit: 百分比
    source: "[BP businessModel.targetGrossMarginPct] 作为软件模型稳态的基准毛利。"
  - id: A9
    name: 月度 logo/workflow 流失率
    value: "1.5"
    unit: 百分比
    source: "[Startup-finance heuristic] 前期企业安全产品通常签年约，不过初始流程较窄，在扩张动作被证实前，常按 1-2% 月流失率保守建模。"
  - id: A10
    name: Fully loaded CAC
    value: "55"
    unit: USDK per new customer
    source: "[BP gtm.funnelTargets] 创始人主导的企业销售、围绕安全评审推进、且试点到生产低于 90 天时，CAC 常落在中等五位数区间（startup-finance heuristic）。"
  - id: A11
    name: 试点转化与销售周期
    value: 转化率 60%+；试点到生产少于 90 天
    unit: 漏斗指标
    source: "[BP gtm.funnelTargets] 这是撑起基准客户爬坡的直接前提。"
  - id: A12
    name: Fully loaded 薪资区间
    value: Founder 144 / Eng 210 / Product-Security 216 / Solutions 180 / Sales 210 / G&A 156
    unit: USDK annual per FTE
    source: "[Startup-finance heuristic] 按 remote-first 的美国企业基础设施团队估算，并包含约 20% 福利与 payroll load。"
  - id: A13
    name: 招聘节奏
    value: 3 FTE at start, 6 by Q4Y1, 8 by Q4Y2, 12 by Q4Y3
    unit: FTE
    source: "[BP team] 先对应创始人、创始工程师、安全产品负责人、Month 6 的解决方案工程师、Month 9 的 GTM 负责人，后续再按连接器与企业销售复制所需做启发式补充。"
  - id: A14
    name: 非薪资运营支出
    value: about 18-25 per month in Y1 rising to 80-110 per quarter by Y3
    unit: USDK
    source: "[BP costStructure] 覆盖云日志、安全合规、软件、差旅与法务，按 lean startup-finance heuristic 估算。"
  - id: A15
    name: 现金转换假设
    value: EBITDA 近似经营现金流
    unit: 口径
    source: "[Startup-finance heuristic] 假设这是一家轻资产 SaaS 基础设施创业公司，capex、债务和营运资金扰动都很小。"
  - id: A16
    name: 融资目标
    value: 在保留 6 个月现金缓冲的前提下，做到 10+ 个生产客户并证实多连接器能力
    unit: 里程碑
    source: "[BP milestones; BP fundingAsk] 种子轮规模以“跑到关键里程碑”为目标，而不是盲目拉长 runway。"
