modelDiagram:
  title: 单位经济流转
  mermaid: |-
    flowchart LR
      Leads[Security review leads] --> Pilots[Paid pilots]
      Pilots --> Customers[Production workflows under protection]
      Customers --> Revenue[Platform + usage revenue]
      Revenue --> GrossProfit[70% gross profit]
      GrossProfit --> Cash[Runway and buffer]
      Customers --> TraceData[Action-trace data moat]
      TraceData --> Expansion[Higher ARPU via more workflows and modules]
modelSanity:
- checkName: 收入引擎
  finding: 基准收入来自受保护工作流/账户数从 6 增长到 32，同时混合 ARPU 从试点期的 $72K 逐步提升到 $96K；随着生产合同和用量扩张占比上升，这一假设成立。
- checkName: 必须成立的前提
  finding: 模型依赖安全评审试点在约 90 天内、以高于 60% 的比例转成生产合同，这样创始人主导的 CAC 才能维持在中等五位数。
- checkName: 模型会在何时失效
  finding: 如果买方把代理长期停留在只读模式，或部署变得过于服务化，那么 downside 情景会让下一轮融资前的现金跌破零。
- checkName: 下一轮融资要讲的故事
  finding: 对 Series A 来说，可信的证明是 10+ 个生产客户、多连接器覆盖，以及足够低的误报率，证明产品能从单条工作流扩展到账户级控制层。
sanityChecks:
  ruleOf40: Y3 growth 141.8% + EBITDA margin -28.0% = 113.8%
  burnMultiple: Y3 burn multiple about 0.5x using $686.4K EBITDA burn over $1344.0K net new ARR; improves from roughly 0.8x in Y2.
  revenuePerFte: $204K Y3 with 12 FTE at Q4Y3 (benchmark $200–400K SaaS)
  flags:
  - 基准情景在 Q4Y3 达到 32 个付费客户，这意味着在没有多工作流扩张的前提下，距离研究中第 3 年 35 个账户的 SOM 上限已经不远。
  - 毛利率被固定在 70% 目标值；如果连接器工作和客户 onboarding 长期偏服务化，现金消耗和估值质量都会很快恶化。
  - 现金之所以保持为正，是因为模型从种子轮到账后起算，并假设 EBITDA 能较好近似现金流，因此没有显式建模递延收入时点和 capex。
