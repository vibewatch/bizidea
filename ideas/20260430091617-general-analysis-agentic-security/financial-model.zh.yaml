  upsideCase: 在拥有 10 个生产客户后再延后 2 个岗位
  y3RevenueImpactK: 0.0
  cashImpactK: 280.0
modelDiagram:
  title: 单位经济性流转
  mermaid: |
    flowchart LR
      Leads[安全评审线索] --> Pilots[付费试点]
      Pilots --> Customers[受保护的生产工作流]
      Customers --> Revenue[平台费 + 用量收入]
      Revenue --> GrossProfit[70% 毛利]
      GrossProfit --> Cash[资金跑道与缓冲]
      Customers --> TraceData[动作轨迹数据护城河]
      TraceData --> Expansion[通过更多工作流与模块提升 ARPU]
modelSanity:
- checkName: 收入引擎
  finding: 基础情景收入来自付费受保护工作流/账户从 6 个增长到 32 个，同时混合 ARPU 随着生产合同和用量扩张接棒，从以试点为主的 $72K 提升到 $96K。
- checkName: 必须跑对的环节
  finding: 模型依赖围绕安全评审的试点在约 90 天内以 60% 以上的比例转成正式合同，这样创始人主导 CAC 才能维持在中五位数。
- checkName: 模型会在哪些情况下失效
  finding: 如果买方让智能体持续只读，或部署变得过度服务化，下行情景会在下一轮融资前把现金打到零以下。
- checkName: 下一轮融资要证明什么
  finding: 一个可信的 Series A 故事应该是：10+ 个生产客户、多连接器覆盖，以及足够低的误报，证明产品能从单一工作流扩展到账户级控制。
sanityChecks:
  ruleOf40: Y3 growth 141.8% + EBITDA margin -28.0% = 113.8%
  burnMultiple: Y3 burn multiple 约 0.5x，即 $686.4K EBITDA burn 对应 $1344.0K 净新增 ARR；相比 Y2 的约 0.8x 有所改善。
  revenuePerFte: Q4Y3 为 12 名 FTE 时，Y3 人均收入约 $204K（SaaS 参考区间 $200–400K）。
  flags:
  - 基础情景在 Q4Y3 达到 32 个付费客户，而研究中第 3 年 SOM 仅有 35 个账户，因此若不形成多工作流扩张，头部空间有限。
  - 模型把毛利率固定在 70% 目标；如果连接器工作和客户导入持续偏服务化，burn 和估值质量都会迅速恶化。
  - 现金保持为正，是因为模型从种子轮交割后开始计算，并假设 EBITDA 可以近似代表现金，因此未显式建模递延收入时点和 capex。
