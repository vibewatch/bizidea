slug: agent-access-release-firewall
date: '2026-04-30'
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: 付费客户定义
  value: 1 paid protected workflow/account equivalent
  unit: definition
  source: '[BP businessModel.unitOfValue] 收入按付费工作流/账户等价单位建模，而不是按座位数。'
- id: A2
  name: 模型起始时间与融资时点
  value: 2026-07
  unit: YYYY-MM
  source: '[BP fundingAsk] 模型从种子轮完成后开始，这样现金滚动能反映经营表现，而不是融资到账时点。'
- id: A3
  name: 期初现金
  value: '3300'
  unit: USDK
  source: '[BP fundingAsk $3-4M] 假设 $3.2M 种子轮资金，加上约 $0.1M 创始人 / pre-seed 现金（startup-finance heuristic）。'
- id: A4
  name: 第 1 年混合已实现 ARPU
  value: '72'
  unit: USDK annual per paying customer
  source: '[BP gtm.pricing] 低于 $75k-$120k 的生产 ACV，因为第 1 年以试点为主，早期工作流有折扣。'
- id: A5
  name: 第 2 年混合 ARPU
  value: '90'
  unit: USDK annual per paying customer
  source: '[BP gtm.pricing; Research market.som] 与市场测算里使用的 $85k-$90k 混合 ACV 一致，假设生产合同在第 2 年成为主导。'
- id: A6
  name: 第 3 年混合 ARPU
  value: '96'
  unit: USDK annual per paying customer
  source: '[BP businessModel.expansionLevers] 假设用量扩张和合规模块带来温和上行，同时仍保持在首条工作流 $75k-$120k 的范围内。'
- id: A7
  name: 客户爬坡
  value: 6 EOY1 / 18 EOY2 / 32 EOY3
  unit: paying customers
  source: '[BP milestones; Research market.som] 以第 1 年 3 个付费试点、第 24 个月 10 个生产客户为锚，并且第 3 年仍低于研究中 35 个可触达账户的 SOM 上限。'
- id: A8
  name: 目标毛利率
  value: '70'
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct] 作为软件业务稳态毛利率的基线假设。'
- id: A9
  name: 月度 logo / workflow 流失率
  value: '1.5'
  unit: percent
  source: '[Startup-finance heuristic] 早期企业安全产品虽然签年约，但首条工作流范围较窄，在扩张动作跑通前，通常会按 1-2% 的月流失率来保守建模。'
- id: A10
  name: Fully loaded CAC
  value: '55'
  unit: USDK per new customer
  source: '[BP gtm.funnelTargets] 由创始人主导、围绕安全评审销售、且试点到生产少于 90 天的企业销售动作，CAC 通常落在中等五位数区间（startup-finance heuristic）。'
- id: A11
  name: 试点转化率与销售周期
  value: 60%+ conversion; under 90 days pilot-to-production
  unit: funnel
  source: '[BP gtm.funnelTargets] 这些参数被直接用于支撑基准客户爬坡。'
- id: A12
  name: 全额成本薪资区间
  value: Founder 144 / Eng 210 / Product-Security 216 / Solutions 180 / Sales 210 / G&A 156
  unit: USDK annual per FTE
  source: '[Startup-finance heuristic] 假设为 remote-first 的美国企业基础设施团队，并包含约 20% 的福利和 payroll load。'
- id: A13
  name: 招聘爬坡
  value: 3 FTE at start, 6 by Q4Y1, 8 by Q4Y2, 12 by Q4Y3
  unit: FTE
  source: '[BP team] 直接对应创始人、创始工程师、安全产品负责人、第 6 个月解决方案工程师、第 9 个月 GTM 负责人，以及为连接器和可复制企业销售追加的启发式招聘。'
- id: A14
  name: 非人力运营开支
  value: about 18-25 per month in Y1 rising to 80-110 per quarter by Y3
  unit: USDK
  source: '[BP costStructure] 覆盖云端日志、安全/合规、软件、差旅与法务，按精益 startup-finance heuristic 估算。'
- id: A15
  name: 现金转换假设
  value: EBITDA approximates operating cash flow
  unit: policy
  source: '[Startup-finance heuristic] 假设这是一家轻资产 SaaS 基础设施创业公司，因此 capex、债务与营运资本扰动都很小。'
- id: A16
  name: 融资目标
  value: Reach 10+ production customers and multi-connector proof with 6 months of buffer
  unit: milestone
  source: '[BP milestones; BP fundingAsk] 这一目标用于决定种子轮规模，而不是单纯追求更长跑道。'
