date: '2026-04-30'
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: Paying customer definition
  value: 1 paid protected workflow/account equivalent
  unit: definition
  source: '[BP businessModel.unitOfValue] Revenue is modeled on paid workflow/account equivalents rather than seats.'
- id: A2
  name: Model start and financing timing
  value: 2026-07
  unit: YYYY-MM
  source: '[BP fundingAsk] Model starts just after the seed close so cash roll-forward reflects operating performance rather than pre-close fundraising timing.'
- id: A3
  name: Opening cash
  value: '3300'
  unit: USDK
  source: '[BP fundingAsk $3-4M] Assumes a $3.2M seed plus about $0.1M founder/pre-seed cash (startup-finance heuristic).'
- id: A4
  name: Y1 blended realized ARPU
  value: '72'
  unit: USDK annual per paying customer
  source: '[BP gtm.pricing] Below the $75k-$120k production ACV because Y1 is pilot-heavy and early workflows are discounted.'
- id: A5
  name: Y2 blended ARPU
  value: '90'
  unit: USDK annual per paying customer
  source: '[BP gtm.pricing; Research market.som] Matches the $85k-$90k blended ACV used in market sizing once production contracts dominate.'
- id: A6
  name: Y3 blended ARPU
  value: '96'
  unit: USDK annual per paying customer
  source: '[BP businessModel.expansionLevers] Assumes modest usage and compliance-module expansion while staying inside the stated $75k-$120k first-workflow range.'
- id: A7
  name: Customer ramp
  value: 6 EOY1 / 18 EOY2 / 32 EOY3
  unit: paying customers
  source: '[BP milestones; Research market.som] Anchored to 3 paid pilots in year 1, 10 production customers by 24 months, and still below the research SOM ceiling of 35 reachable accounts by year 3.'
- id: A8
  name: Target gross margin
  value: '70'
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct] Used as the base-case steady-state software gross margin.'
- id: A9
  name: Monthly logo/workflow churn
  value: '1.5'
  unit: percent
  source: '[Startup-finance heuristic] Early enterprise-security products with annual contracts but narrow initial workflow scope often underwrite 1-2% monthly churn until expansion is proven.'
- id: A10
  name: Fully loaded CAC
  value: '55'
  unit: USDK per new customer
  source: '[BP gtm.funnelTargets] Founder-led enterprise sales with a sub-90-day pilot motion and security-review selling typically land in the mid-five-figure CAC range (startup-finance heuristic).'
- id: A11
  name: Pilot conversion and sales cycle
  value: 60%+ conversion; under 90 days pilot-to-production
  unit: funnel
  source: '[BP gtm.funnelTargets] Directly used to justify the base customer ramp.'
- id: A12
  name: Loaded salary bands
  value: Founder 144 / Eng 210 / Product-Security 216 / Solutions 180 / Sales 210 / G&A 156
  unit: USDK annual per FTE
  source: '[Startup-finance heuristic] Remote-first US enterprise-infra compensation with roughly 20% benefits/payroll load.'
- id: A13
  name: Hiring ramp
  value: 3 FTE at start, 6 by Q4Y1, 8 by Q4Y2, 12 by Q4Y3
  unit: FTE
  source: '[BP team] Direct hires match the founder, founding eng, security product lead, month-6 solutions engineer, month-9 GTM lead, then heuristic follow-on hires for connectors and repeatable enterprise selling.'
- id: A14
  name: Non-payroll operating spend
  value: about 18-25 per month in Y1 rising to 80-110 per quarter by Y3
  unit: USDK
  source: '[BP costStructure] Covers cloud logging, security/compliance, software, travel, and legal using lean startup-finance heuristics.'
- id: A15
  name: Cash conversion assumption
  value: EBITDA approximates operating cash flow
  unit: policy
  source: '[Startup-finance heuristic] Assumes minimal capex, debt, and working-capital distortion for an asset-light SaaS infrastructure startup.'
- id: A16
  name: Fundraising objective
  value: Reach 10+ production customers and multi-connector proof with 6 months of buffer
  unit: milestone
  source: '[BP milestones; BP fundingAsk] Used to size the seed rather than maximizing runway for its own sake.'
