modelDiagram:
  title: unit economics flow
  mermaid: |-
    flowchart LR
      Leads[Security review leads] --> Pilots[Paid pilots]
      Pilots --> Customers[Production workflows under protection]
      Customers --> Revenue[Platform + usage revenue]
      Revenue --> GrossProfit[70% gross profit]
      GrossProfit --> Cash[Runway and buffer]
      Customers --> TraceData[Action-trace data moat]
      TraceData --> Expansion[Higher ARPU via more workflows and modules]
modelSanity:
- checkName: Revenue engine
  finding: Base-case revenue comes from growing from 6 to 32 paying protected workflows/accounts while blended ARPU steps from pilot-heavy $72K to $96K as production contracts and usage expansion take over.
- checkName: Must go right
  finding: The model depends on security-review pilots converting above 60% and within roughly 90 days so founder-led CAC stays in the mid-five figures.
- checkName: Model breaks if
  finding: If buyers keep agents read-only or deployments become services-heavy, the downside case drives cash below zero before the next round.
- checkName: Next-round proof
  finding: A credible Series A story is 10+ production customers, multi-connector coverage, and false positives low enough to show the product can expand from one workflow to account-wide control.
sanityChecks:
  ruleOf40: Y3 growth 141.8% + EBITDA margin -28.0% = 113.8%
  burnMultiple: Y3 burn multiple about 0.5x using $686.4K EBITDA burn over $1344.0K net new ARR; improves from roughly 0.8x in Y2.
  revenuePerFte: $204K Y3 with 12 FTE at Q4Y3 (benchmark $200–400K SaaS)
  flags:
  - Base case reaches 32 paying customers by Q4Y3, which leaves limited headroom versus the 35-account year-3 SOM in research without multi-workflow expansion.
  - Gross margin is held at the 70% target; if connector work and customer onboarding stay services-heavy, both burn and valuation quality worsen quickly.
  - Cash stays positive because the model starts post-seed close and assumes EBITDA is a fair proxy for cash, so deferred revenue timing and capex are not modeled explicitly.
