scenarios:
  downside:
    description: Write-enabled agent adoption slips and native controls win more bake-offs, slowing production conversions.
    y3RevenueK: 1830.0
    y3EbitdaK: -1119.0
    cashLowPointK: -140.0
    keyAssumptionChanges:
    - EOY3 customers fall from 32 to 24
    - Y3 blended ARPU drops from $96K to $90K
    - Sales cycle extends from under 90 days to roughly 150 days
  base:
    description: Founder-led pilots convert into a steady but still narrow enterprise workflow security business.
    y3RevenueK: 2448.0
    y3EbitdaK: -686.4
    cashLowPointK: 739.35
    keyAssumptionChanges:
    - 32 paying customers by Q4Y3
    - $96K blended Y3 ARPU with 70% gross margin
    - Hiring stays at 12 FTE by Q4Y3 rather than scaling a full enterprise team earlier
  upside:
    description: The security-review wedge works quickly and multi-workflow expansion starts inside the first lighthouse accounts.
    y3RevenueK: 2890.0
    y3EbitdaK: -410.0
    cashLowPointK: 1120.0
    keyAssumptionChanges:
    - EOY3 customers rise from 32 to 36
    - Y3 blended ARPU increases from $96K to $105K through usage and compliance expansion
    - Partner-sourced pipeline reduces CAC enough to keep hiring unchanged
