slug: agent-access-release-firewall
date: '2026-04-30'
executiveSummary: >-
  企业一旦把内部智能体从只读 copilots 推到可写操作，尤其是让它去碰 Okta、Google
  Workspace、Jira、Slack 这类系统，就会撞上一道值得单独立预算的控制缺口。这家公司最该先做的，不是泛化的 AI 安全平台，而是一款足够窄的“发布防火墙”：它代理所有会改状态的 tool call，把线上动作图谱和 staging
  里已批准的基线逐条对比，再在执行前拦住或升级处理那些新出现的高风险路径。第一个客户画像也很清楚：员工规模 1,000-10,000 人、正在上线内部 IT
  帮助台或访问开通智能体的软件/互联网公司；真正的购买触发点，是安全评审准备给生产写权限放行的那个时刻。研究显示，相邻的身份、安全自动化与 AI 治理预算本来就存在；初始滩头对应的 SAM 约为
  $76.5M，而第 3 年可触达的 SOM 约为 $3.2M。因此 GTM 最合理的打法，是围绕一条 Okta + Google
  Workspace 工作流卖付费试点，再在 go-live 时转成年费生产合同。整个计划刻意避开“广义 AI 安全”叙事，先把更低误报、更快审计取证、更强跨系统控制这些硬结果做出来，证明自己比 Okta、Workato、Tines 或内部脚本更能打。最主要的反证风险也很清楚：一是企业继续把智能体锁在只读，二是买方觉得在位者打包的控制已经“够用了”。公开研究还没给出精确的生产新颖路径比例，也没证明这是一条完全独立的预算线，所以前 6 个月必须把重心放在 shadow mode 轨迹、定价测试和架构评审胜率，而不是功能铺摊子。
problem:
  - 企业可以在 staging 里测试智能体，但一到生产环境，尤其是智能体拿到身份、工单和管理系统写权限时，信心就会明显下滑。
  - 人工审批、SIEM 回溯和通用 guardrail SDK 会把自动化拖慢，而且仍然补不上序列级运行时控制和可直接审计的证据。
solution:
  - 在智能体和企业 SaaS 系统之间部署一层中立的发布防火墙，检查每一次会改状态的 tool call、权限请求以及跨应用动作路径。
  - 从 staging 和早期生产里学会哪些动作图谱已被批准，再对新的高风险序列执行拦截、限流或升级审批，同时留下完整决策轨迹，供安全审查与合规使用。
whyWeWin:
  - 这个切口比横向 AI 安全套件更窄，但和生产 go-live 那一刻强绑定；正是在那里，预算、紧迫性和可量化风险都会被同时放大。
  - 面向异构 SaaS 工作流的跨系统运行时控制，比模型侧提示词过滤更难，也更能沉淀防御力，因为它需要连接器、归一化日志，以及在真实 API 约束下稳定执行策略。
  - 一套覆盖 IAM 与 IT 帮助台工作流的“已批准 / 已拒绝 / 已升级”动作路径语料，会随着时间沉淀成更好的策略模板、更低的误报率和更强的审计证据。
strategicChoices:
  beachhead: >-
    北美的软件与互联网公司，员工规模 1,000-10,000 人，正把内部 IT 帮助台或访问开通智能体带着 Okta 和 Google Workspace 写权限推向生产。
  wedgeRationale: >-
    这条工作流有明确的经济买方——身份或安全负责人；有离散且清晰的 go-live 批准事件；潜在爆炸半径大；而且连接器面还足够小，能比横向跨部门 AI 安全产品更快证明价值。
  sequencingRationale: >-
    先在一条高风险 IAM 工作流上做 shadow mode 追踪和带审批意识的强制控制，因为如果不能先证明误报低、审计证据干净，后面无论扩销售、加连接器还是扩团队，都会踩空。只有当公司能证明试点到生产的转化可重复、并且在架构评审里能正面赢过原生控制之后，才值得继续扩张。
  notYet:
    - 面向外部客户的支持型智能体
    - 财务与采购智能体
    - 宽泛的 AI-SPM、提示词过滤或员工 AI 使用监控
    - 在拿下第一批北美共创客户前就深做欧洲定制部署变体
market:
  tam: "$630.0M 估算 TAM，假设全球最终有 7,000 家企业会为可写内部智能体采购方案，单家混合 ACV 约 $90k。"
  sam: "$76.5M 估算 SAM，假设北美与欧洲约有 900 家软件或互联网企业落在 1,000-10,000 人的初始滩头区间，混合 ACV 约 $85k。"
  som: "$3.2M 估算第 3 年 SOM，假设通过围绕生产 go-live 的直销动作，可触达 35 家灯塔 / 共创客户，单家 ACV 约 $90k。"
  segments:
    - 主要客群：部署内部 IT 帮助台或 IAM 智能体的软件与互联网企业
    - 次级客群：正把员工支持自动化扩到 Slack、Jira 和 Microsoft 生态的大型企业
  buyingProcess: >-
    日常使用者通常是 AI 平台工程师、安全工程师或 IAM 管理员，但真正拍板掏钱的往往是 CISO、身份安全总监或企业 IT/安全负责人。交易最合理的起点，是生产前的安全评审；先围绕一条工作流跑窄试点，再在买方批准生产写权限、同时需要可审计控制时转正。
product:
  mvp: >-
    MVP 范围是：针对一条横跨 Okta 和 Google Workspace 的访问开通工作流，提供 shadow mode 加 inline 发布闸门。它至少要包含连接器级策略执行、动作图谱新颖性检测、人工升级审批队列，以及可导出的审计轨迹。
  sixMonth: >-
    把一条可生产的 Okta + Google Workspace 工作流跑通，补齐基线与生产漂移检测、审批路由、可回放日志，以及最小权限访问变更的策略模板。
  twelveMonth: >-
    新增 Slack、Jira 和 Microsoft Graph 覆盖，支持客户级策略调优、回滚与异常处理，并打包好用于审计和事故复盘的证据导出能力。
  twentyFourMonth: >-
    从 IAM 帮助台工作流扩到更广泛的内部运营智能体，引入伙伴分发的集成能力，并用累计下来的生产轨迹数据发布工作流专属风险模型与基准策略。
  keyBets:
    - 生产动作路径和 staging 之间会有足够多的偏离，足以支撑一层独立的漂移检测与审批产品。
    - 只要误报不高，买方会接受“只对新动作或高敏动作做审批”，而不是要求所有请求都走人工。
    - 只靠两个初始连接器加一条高风险工作流，就足以拿下第一批合同，而不必一开始就覆盖整个系统版图。
    - 在构建器和身份在位者之外提供一层中立控制，安全团队会认为这件事有价值。
gtm:
  wedge: >-
    卖一单围绕访问开通工作流的付费生产前试点，在安全评审阶段先跑 shadow mode；等智能体拿到写权限批准后，再转成年费生产合同。
  channels:
    - 由创始人亲自外呼已经在试点帮助台自动化的 CISO、身份安全负责人和 AI 平台团队
    - 通过 Okta、Workato、Tines、Moveworks 等身份与 IT 自动化生态做共创客户销售
    - 借助已经负责权限开通和审计项目的安全 / IAM 实施伙伴铺渠道
  funnelTargets: "安全评审线索到合格试点转化 25-35%，试点到付费生产转化 60%+，从试点启动到生产合同控制在 90 天以内。"
  pricing: >-
    以“每条受保护生产工作流的年费 + 按状态变更动作计费”为核心定价，因为这更贴近身份与自动化预算持有人，也能把价格和受保护的动作量对齐，并在企业级全面铺开之前避免过早采用 seat-based 定价。初始假设是试点收 $20k-$40k，转生产后第一条工作流的年化 ACV 约为 $75k-$120k。
businessModel:
  revenueStreams:
    - 发布防火墙平台的年度订阅费
    - 按受保护状态变更动作计费
    - 高级合规、报告与策略模板模块
  unitOfValue: 受保护的生产工作流与受保护的状态变更动作
  targetGrossMarginPct: 70
  expansionLevers:
    - 第一条工作流 go-live 后，在同一客户内继续加更多工作流
    - 把连接器扩到 Slack、Jira、Microsoft Graph 和相邻 ITSM 系统
    - 从单一工作流强制控制，扩成账号级审计和策略打包销售
strategyMap:
  northStarMetric: 例行场景下无需人工复核、且零事故完成的受保护生产动作数
  inputMetrics:
    - 试点到生产的转化率
    - 新动作误报率
    - 升级动作的审批中位耗时
    - 每个客户处于强制控制下的生产工作流数量
    - 连接器可用性与策略决策延迟
  moatsToBuild:
    - 企业动作路径中“已批准 / 已拒绝 / 已升级”的专有语料库
    - 面向 IAM 与员工支持工作流的跨应用策略模板
    - 具备归一化日志和重试意识的深连接器能力
    - 靠可重复的审计证据和事故取证建立起来的安全评审可信度
  killCriteria:
    - 围绕可写工作流做了 30 次共创客户交流后，付费试点签约仍少于 3 个
    - 前 5 个试点里，试点到生产转化率低于 40%
    - shadow mode 新颖路径检测在两轮客户迭代后，例行动作误报仍高于 15%
    - 在后期评估里，买方至少 70% 的时候都选择在位者打包控制而非独立试点
  mermaid: |
    flowchart LR
      Wedge[Okta 与 Google Workspace 访问开通切口] --> MVP[shadow mode 与发布闸门 MVP]
      MVP --> Proof[低误报 + 可直接审计的轨迹]
      Proof --> Expansion[更多工作流、更多连接器、更多伙伴渠道]
investorMemo:
  verdict:
    call: Meet / investigate further
    conviction: 这是一个很有希望的安全切口，买方痛点真实；但要建立更高信心，必须证明它能拿到独立预算，而且生产控制确实强过在位平台。
    whyBelieve: 这套方案咬住的是一个非常具体的 go-live 时点——安全、可审计性和自动化 ROI 在那里正面相撞——比卖泛化 AI 安全姿态更扎实。
    whyDoubt: 身份、工作流和 AI 安全在位者都已经开始上相邻功能；如果新颖路径检测和跨系统中立性做不出明显优势，创业公司很容易被边缘化。
    nextDiligence: 先验证 3 次架构评审胜出，再拿到 1 份 shadow mode 数据集，证明真实访问开通工作流里确实存在有意义的 staging-to-production 漂移。
  firstCustomer:
    title: 正在部署内部 IT 帮助台智能体的身份安全团队
    profile: 一家员工 1,000-10,000 人、使用 Okta 和 Google Workspace、并准备自动化员工访问变更的软件公司。
    trigger: 给智能体放开身份与管理系统生产写权限前的安全评审
    buyer: CISO 或身份安全总监
    initialContract: 单条工作流的付费试点，价格 $20k-$40k；一旦获批上生产，再转成约 $75k-$120k 年化 ACV
  mustBeTrue:
    - 至少一半目标买方要把“智能体生产写权限审批”当成一笔有预算的安全评审，而不只是工程 checklist。
    - shadow mode 轨迹必须显示出足够多的新路径或高风险路径，才能证明发布闸门比静态 allowlist 更有价值。
    - 产品必须把例行动作误报压得足够低，买方才会接受“选择性升级”，而不是回到“全部人工审批”。
    - 在若干次竞争性评估里，安全买方必须更愿意选中立的跨系统控制层，而不是只依赖 Okta、Workato、Tines 或内部脚本。
    - 第一条生产工作流必须能支撑 $75k-$120k 的初始 ACV，而且不能靠大量定制服务硬堆出来。
  diligenceQuestions:
    - 早期客户试点里，经 staging 批准的 IAM 动作图谱到底会多频繁地偏离真实生产行为？
    - 这笔预算在现实里到底归谁：身份安全、IT 运营，还是 AI 治理？
    - 除了 Okta 和 Google Workspace 之外，拿下前 5 单到底还需要多少连接器？
    - 真到现场 bake-off 时，买方为什么不会觉得 Okta 或工作流平台的原生控制“已经够用”？
    - 误报高到什么程度，运营团队就会彻底放弃 inline enforcement？
  riskHeatmap:
    - risk: 买方继续把智能体锁在只读，采购触发点被削弱
      likelihood: Medium
      impact: High
      leadingIndicator: 目标访谈里，不到 20% 的团队计划在未来 12 个月内让智能体带写权限上线
      mitigation: 只盯已进入生产审批的团队，并先卖 shadow mode 可观测能力，在写权限获批时自然升级
    - risk: 在位者打包控制已经“够用”
      likelihood: High
      impact: High
      leadingIndicator: 多数竞争性评估还没跑试点，买方就直接选了 Okta、Workato 或内部控制
      mitigation: 销售重点放在跨系统发布闸门、staging-to-production 漂移证据和原生工具无法统一的审计能力上
    - risk: 实施逐渐变成高服务占比项目
      likelihood: Medium
      impact: High
      leadingIndicator: 第一条受保护工作流上线时间超过 45 天，或反复需要客户特定连接器开发
      mitigation: 先把连接器范围收窄，把一条工作流模板化；在部署可复制前，延后广覆盖定制
    - risk: 误报拖慢运营节奏
      likelihood: Medium
      impact: High
      leadingIndicator: 做完策略调优后，shadow mode 里仍有超过 15% 的例行动作被升级
      mitigation: 先观测后强制，先用客户真实轨迹训练，再只拦高风险动作
    - risk: 企业安全销售周期超过早期 runway 假设
      likelihood: Medium
      impact: Medium
      leadingIndicator: 前 10 个机会里，从第一次见面到付费试点的中位时间超过 120 天
      mitigation: 把初始销售严格绑定在单一生产审批事件上，试点范围保持足够窄，成功标准必须量化
operatingAssumptions:
  - assumption: 买方会接受只对新动作或高敏动作做人审升级，而不是要求每一步都写死 deterministic allowlist。
    basis: research.yaml
    validationTest: 做 10 场买方访谈，再加 2 场 shadow mode 试点评审，确认安全团队是否把选择性升级视为首选控制设计。
    decisionImpact: 如果不成立，产品就必须退回更窄的确定性策略执行，异常检测这部分切口会被削弱。
  - assumption: 只靠 Okta 和 Google Workspace 覆盖，就足以拿下前 3 个付费部署。
    basis: idea.yaml
    validationTest: 跟踪前 15 个合格机会里的连接器异议，确认至少有 3 家客户愿意只从这两个系统起步。
    decisionImpact: 如果不成立，路线图和招聘都得更早转向广连接器覆盖，且上线节奏会变慢。
  - assumption: 买方愿意接受首条工作流约 $75k-$120k 的 ACV，因为产品守住的是更大的自动化收益和审计成本。
    basis: research.yaml
    validationTest: 在至少 8 场预算持有人访谈里测试 3 套定价结构，并拿到 2 份书面接受目标区间的试点范围。
    decisionImpact: 如果不成立，公司就得缩产品范围、压 CAC 目标，或把更多工作流打包进基础合同。
  - assumption: 生产新颖度和 API 行为能产出足够强的差异化风险信号，同时又不至于把误报拉到不可用。
    basis: operator judgment
    validationTest: 拿到 1 份真实 shadow mode 数据集，覆盖至少 1,000 个受保护动作，并在调优后把误报压到 15% 以下。
    decisionImpact: 如果不成立，核心产品假设就会被削弱，公司应转向审计日志或审批基础设施。
  - assumption: 创始人主导、围绕安全评审的直销，能在 9 个月内打出前 5 个付费试点。
    basis: operator judgment
    validationTest: 建起 30 个账户的管道，并要求在第 9 个月前至少拿下 5 个付费试点或已签字的试点 LOI。
    decisionImpact: 如果不成立，公司应在继续扩编前重新审视切口、渠道组合或融资需求。
experimentRoadmap:
  - horizon: 0–90 天
    experiment: 围绕生产 go-live 评审做买方发现
    hypothesis: 身份安全负责人和 AI 平台负责人会描述出一个清晰的批准事件，也能指出谁是真正预算 owner。
    successMetric: 完成 10 场访谈，其中至少 6 场确认未来 12 个月内存在活跃或计划中的带写权限智能体部署
    owner: Founder CEO
  - horizon: 0–90 天
    experiment: 为一条访问开通工作流采集 shadow mode 轨迹
    hypothesis: 真实生产行为和 staging 之间会有足够大的偏离，能暴露出值得拦截的新动作路径。
    successMetric: 1 家共创客户贡献至少 1,000 次动作，且能量化新路径比例并经过分析师审查其事故相关性
    owner: Founding eng
  - horizon: 90–180 天
    experiment: 把 shadow mode 试点转成强制控制付费合同
    hypothesis: 只要试点和生产审批绑定，窄范围方案就能在 90 天内转成年费合同。
    successMetric: 启动 3 个付费试点，其中至少 2 个转成生产订阅
    owner: Founder CEO
  - horizon: 90–180 天
    experiment: 测试定价与打包方式
    hypothesis: 平台费加受保护动作计费，比纯 usage 或纯 seat-based 定价更容易过会。
    successMetric: 在 8 场定价访谈里，这套打包至少赢下 5 次，并写进 2 份已签试点范围
    owner: Founder CEO
  - horizon: 6–12 个月
    experiment: 验证连接器扩展是否真能提胜率
    hypothesis: 新增 Slack、Jira 和 Microsoft Graph 后，后期机会的胜率会明显提升，同时不会把实施变成重服务项目。
    successMetric: 合格机会胜率至少提升 20%，且平均部署时间仍控制在 45 天以内
    owner: Product lead
  - horizon: 12–18 个月
    experiment: 验证伙伴供给线索
    hypothesis: 身份与 IT 自动化伙伴能以低于纯外呼的 CAC 持续提供高质量试点。
    successMetric: 合格 pipeline 里有 30% 来自 2 家活跃伙伴，且试点转化率不低于创始人外呼渠道
    owner: GTM lead
operations:
  - 把员工访问开通这条参考工作流标准化，配套可复用策略模板和测试数据
  - 在所有已支持的 SaaS 连接器里补齐归一化日志、回放和证据导出能力
  - 维护一套覆盖审批、回滚、kill switch 与事故响应的安全评审操作手册
  - 尽量借助共创客户和 IAM 集成商做实施杠杆，而不是堆定制服务团队
team:
  - role: 创始人 / CEO
    startTiming: Month 0
    rationale: 在形成可复制销售动作前，亲自负责创始人主导销售、安全评审发现、定价和共创客户转化。
  - role: 创始工程师
    startTiming: Month 0
    rationale: 负责把控制平面、连接器架构和 shadow mode 埋点搭起来，做出第一性证明。
  - role: 安全产品负责人
    startTiming: Month 0
    rationale: 把 IAM 和审计需求翻成策略模板、审批体验和客户部署范围。
  - role: 解决方案工程师
    startTiming: Month 6
    rationale: 加快试点上线、处理客户安全问卷，避免部署长期卡在创始人身上。
  - role: GTM 负责人
    startTiming: Month 9
    rationale: 只有当试点到生产的转化已被证明可复制，而且聚焦型外呼与伙伴打法已成形时，这个岗位才值得加。
milestones:
  - horizon: 0–12 个月
    items:
      - 围绕带写权限的 IT 帮助台或访问开通 go-live，拿下 3 个付费共创客户试点
      - 让 Okta 与 Google Workspace 的生产强制控制上线，补齐 shadow mode、审批队列和审计导出
      - 把试点到生产转化率做到 60% 以上
      - 标准工作流的部署时间控制在 45 天以内
      - 从首批客户里沉淀可复制的 ROI 与审计证据案例
  - horizon: 12–24 个月
    items:
      - 扩到 Slack、Jira 和 Microsoft Graph，覆盖相邻内部支持工作流
      - 建起由身份与自动化生态驱动的伙伴 pipeline
      - 达到 10 家生产客户，并在早期账户里完成多工作流扩张
      - 经策略调优后，把例行动作误报降到 10% 以下
  - horizon: 24–36 个月
    items:
      - 在灯塔账户里成为多类内部智能体工作流的默认控制层
      - 基于累计轨迹数据推出打包的合规与 benchmark 模块
      - 只有在部署与数据处理要求都标准化后，才进入有选择的欧洲账户
      - 证明从一条工作流向账号级策略覆盖扩张的动作已经可复制
risks:
  - risk: 企业推迟给内部智能体开放写权限，采购触发点变弱
    likelihood: Medium
    impact: High
    mitigation: 把 pipeline 锁定在已获批准的自动化项目上，并先卖 shadow mode 可观测能力，等 go-live 时再转成强制控制
  - risk: 身份或工作流在位者的原生控制压缩差异化空间
    likelihood: High
    impact: High
    mitigation: 竞争点放在中立的跨系统强制控制、动作图谱漂移检测和统一审计证据，而不是基础策略检查
  - risk: 连接器和 API 复杂度让部署过于定制，毛利被侵蚀
    likelihood: Medium
    impact: High
    mitigation: 早期先收紧连接器范围，把一条工作流模板化，并在大规模扩张前持续衡量部署投入
  - risk: 误报或延迟削弱团队对 inline enforcement 的信任
    likelihood: Medium
    impact: High
    mitigation: 先从 shadow mode 起步，初期只拦高风险动作，并在全量强制前设定明确性能阈值
  - risk: 安全销售周期长过早期 runway
    likelihood: Medium
    impact: Medium
    mitigation: 把第一笔销售严格绑定在定义清楚的生产审批事件上，试点范围足够窄，成功标准必须量化
fundingAsk:
  stage: seed
  targetFundingRangeUsd: $3-4M
  runwayMonths: 18
  useOfFundsSummary: >-
    18 个月的 runway 应该足以覆盖核心创始产品团队、3-5 个共创客户部署、滩头工作流所需的初始连接器覆盖、安全与审计就绪工作，以及“付费试点能稳定转成生产订阅”这件事的验证，再决定是否扩销售。