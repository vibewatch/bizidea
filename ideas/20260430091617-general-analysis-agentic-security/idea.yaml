topRisks:
  - name: Platform vendors add native controls
    description: Identity providers or agent-platform vendors could ship basic policy checks and narrow the wedge.
    mitigation: Focus on cross-system action graphs, simulation-to-production drift detection, and audit evidence across heterogeneous tools where native controls are weakest.
  - name: Customers delay write-enabled agents
    description: If enterprises keep agents read-only for longer than expected, adoption could lag despite strong interest.
    mitigation: Sell first into teams with approved helpdesk automation programs and support read-only observability that expands into enforcement at go-live.
  - name: Long enterprise security sales cycles
    description: Security infrastructure deals can take multiple quarters and require heavy validation.
    mitigation: Offer a lightweight pilot on one high-risk workflow such as Okta access provisioning with clear ROI and compliance deliverables in 30 days.
