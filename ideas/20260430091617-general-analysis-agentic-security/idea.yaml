jobsToBeDone:
  - job: When my company is ready to let an internal IT agent make production access changes, help me enforce safe action boundaries, so I can automate support without creating a security incident.
    currentAlternative: Human approval on every sensitive step plus ad hoc allowlists
    successMetric: Percentage of access requests automated without policy violations or incident escalations
  - job: When auditors or security leaders ask how our agents behaved in production, help me show complete runtime evidence, so I can prove controls without weeks of manual log review.
    currentAlternative: SIEM queries and manual reconstruction of app logs
    successMetric: Time to produce an auditable incident or compliance report
