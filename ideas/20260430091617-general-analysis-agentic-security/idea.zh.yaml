businessModelCanvas:
  customerSegments: [部署内部 IT 与运营代理的企业软件公司, 安全团队和 AI 平台团队]
  valuePropositions: [安全释放具备写权限的代理能力, 抓住只会在生产里出现的代理失效, 提供可用于审计的控制证据]
  channels: [直销, 安全共创客户, 身份与 ITSM 实施伙伴]
  customerRelationships: [高触达试点, 联合安全评审, 通过新增代理工作流扩张]
  revenueStreams: [年度平台订阅, 按受保护的状态变更动作收取用量费, 高级合规模块]
  keyResources: [运行时策略引擎, 接入企业 SaaS 系统的连接器, 生产轨迹数据集]
  keyActivities: [构建连接器, 在动作图上训练异常模型, 支持客户安全上线]
  keyPartners: [身份提供商, ITSM 平台, 企业 AI 编排厂商]
  costStructure: [工程研发, 云端推理与日志, 企业销售, 安全合规]
jobsToBeDone:
  - job: 当公司准备让内部 IT 代理在生产环境里修改访问权限时，帮我守住安全动作边界，这样我就能把支持流程自动化，而不至于酿成安全事故。
    currentAlternative: 每个敏感步骤都走人工审批，再加一些临时 allowlist
    successMetric: 在没有策略违规或事故升级的前提下，被自动化处理的访问请求占比
  - job: 当审计方或安全负责人追问代理在生产里到底做了什么时，帮我拿出完整的运行时证据，这样我就不用花几周时间手工拼日志。
    currentAlternative: 用 SIEM 查询，再手工重建各应用日志
    successMetric: 产出一份可审计事故或合规报告所需的时间
ideaScorecard:
  signalStrength:
    score: 4
    rationale: 融资事件和来源里明确的企业代理安全表述，说明需求可信，尽管当前时间窗口内只有两条来源。
  painIntensity:
    score: 5
    rationale: 一个高权限代理在生产环境里做错一次动作，就可能带来严重的安全、合规和停机风险。
  wedgeClarity:
    score: 5
    rationale: 从具备写权限的 IT 访问代理切入，并围绕具体的发布防火墙工作流展开，切口足够清楚。
  defensibility:
    score: 4
    rationale: 跨系统集成能力加上专有的高风险生产动作轨迹语料，能逐步积累成耐久护城河。
  ventureScale:
    score: 4
    rationale: 滩头市场有机会扩展成多类企业代理的广义控制平面，不过平台型现有厂商仍是威胁。
topRisks:
  - name: 平台厂商补上原生控制能力
    description: 身份提供商或代理平台厂商可能上线基础策略检查，从而压缩这个切口。
    mitigation: 聚焦跨系统动作图、仿真到生产的漂移检测，以及异构工具之间最难被原生方案统一的审计证据。
  - name: 客户推迟具备写权限的代理落地
    description: 如果企业比预期更久地把代理维持在只读模式，即便兴趣很强，采用速度也会放慢。
    mitigation: 先卖给已批准帮助台自动化项目的团队，并提供只读可观测性，在 go-live 时自然扩展到强制控制。
  - name: 企业安全销售周期过长
    description: 安全基础设施交易往往跨越多个季度，还需要沉重的验证流程。
    mitigation: 先围绕一个高风险工作流——比如 Okta 权限开通——提供轻量试点，在 30 天内给出清晰 ROI 与合规交付物。
