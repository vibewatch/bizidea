problem: 企业可以在沙盒里安全演示智能体，但一旦这些智能体在生产环境中获得对身份、工单和管理系统的写权限，信心就会迅速下降。离线评测和提示词护栏无法捕捉那些只会在混乱真实 SaaS 状态下出现的新型动作链、权限错误或上下文漂移。因此，公司要么让高价值智能体长期保持只读，要么把每一步都拖入人工审批。
targetUser:
  primary: 负责把内部可执行动作的智能体部署进生产 SaaS 工作流的 AI 平台与安全工程师。
  secondary: 正在推进员工帮助台和权限开通自动化的 IT 运维负责人。
  buyer: 在部署内部智能体的企业中负责决策的 CISO 或身份安全总监。
startupThesis:
  nonObviousInsight: 智能体 AI 真正的安全瓶颈不是模型毒性，而是在生产系统里治理实时工具调用序列；那里的身份、权限和数据状态与任何沙盒测试都不同。
  beachhead: 正在上线内部 IT 帮助台智能体、可在 Okta、Google Workspace、Jira 和 Slack 中开通或变更权限的中型市场和大型软件公司。
  wedge: 一种发布防火墙，在预发布环境学习已批准的智能体动作图谱，将其与真实生产轨迹比较，并在执行前阻断或升级处理新的高风险动作路径。
  whyNowCatalyst: 最新融资以及来源中对“面向智能体系统的企业安全层”的明确表述，表明企业正在从智能体实验走向生产部署，运行时控制因此变得紧迫。
  ventureScalePath: 先从权限开通智能体起步，再扩展到财务、客户支持和工程智能体，成为企业智能体集群跨系统的策略、可观测性与合规控制平面。
solution: 产品位于企业智能体与其可操作系统之间，代理每一次工具调用、权限请求和状态变更动作。它会根据预发布环境与早期生产环境建立期望动作序列基线，然后标记那些仿真与生产不一致的情况，例如异常权限提升、跨应用跳转或越权数据访问。团队无需把人工塞进每一个工作流，只需对新的或敏感的动作要求升级审批。每次决策都会被记录为可审计轨迹，用于安全复核、合规和事故后的取证分析。
goToMarketSeed:
  firstCustomer: 员工数 1,000-10,000 的 B 轮到上市软件公司，正在试点一个对 Okta 和 Google Workspace 拥有写权限的内部 IT 帮助台智能体。
  buyingTrigger: 内部支持或权限开通智能体获准从沙盒测试进入生产写操作的那一刻。
  currentAlternative: 在通用安全护栏 SDK、SIEM 日志和内部脚本之上叠加人工审批工作流。
  switchingReason: 这个切口能在保住智能体自动化 ROI 的同时，提供通用 LLM 安全工具没有的运行时控制和审计证据。
  pricingHypothesis: 按受保护的生产智能体工作流数量和每月状态变更动作数定价的年度平台费。
