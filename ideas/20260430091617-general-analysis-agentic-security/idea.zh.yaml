    signalRefs:
      - 智能体一上线，安全预算才真正启动
    sourceRefs:
      - 1
      - 2
differentiator: >-
  多数 AI
  安全产品盯的是提示词、模型输出或离线评测；这家公司盯的是跨真实企业系统的运行时授权，以及动作序列级别的异常检测。最贵的事故，偏偏就发生在那里。它的护城河有机会沉淀成一套专有资产：生产环境里的智能体动作轨迹语料、策略模板，以及面向敏感企业应用的流程风险模型。
