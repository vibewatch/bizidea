jobsToBeDone:
- job: 当公司准备让内部 IT 智能体在生产环境中执行权限变更时，帮助我划定安全动作边界，这样我就能自动化支持流程而不引发安全事故。
  currentAlternative: 对每个敏感步骤都进行人工审批，再加上临时允许列表
  successMetric: 在不触发策略违规或事故升级的情况下完成自动化的权限请求占比
- job: 当审计人员或安全负责人询问智能体在生产环境中的行为时，帮助我展示完整的运行时证据，这样我就能无需数周人工查日志也能证明控制有效。
  currentAlternative: 通过 SIEM 查询并手工重建应用日志
  successMetric: 生成一份可审计事故或合规报告所需的时间
