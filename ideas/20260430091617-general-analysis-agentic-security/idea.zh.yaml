    score: 4
    rationale: 这一滩头阵地可扩展为多类企业智能体的广义控制平面，但现有平台厂商仍是威胁。
topRisks:
- name: 平台厂商加入原生控制
  description: 身份提供商或智能体平台厂商可能推出基础策略检查，从而压缩切口空间。
  mitigation: 聚焦跨系统动作图谱、仿真到生产环境漂移检测，以及在异构工具间最难由原生控制覆盖的审计证据。
- name: 客户推迟让智能体具备写权限
  description: 如果企业让智能体保持只读的时间长于预期，即使兴趣很强，采用速度也会滞后。
  mitigation: 优先销售给已经批准帮助台自动化项目的团队，并先提供只读可观测性，在正式上线时扩展为执行控制。
- name: 企业安全销售周期过长
  description: 安全基础设施交易往往跨越多个季度，并需要大量验证。
  mitigation: 先围绕单一高风险工作流提供轻量试点，例如 Okta 权限开通，并在 30 天内交付明确的 ROI 与合规成果。
