problem: 企业可以在沙盒里安全演示代理，但一旦这些代理在生产环境中获得对身份、工单和管理系统的写权限，信心就会迅速下降。离线评测和提示词护栏，抓不住那些只会在真实 SaaS 脏状态里出现的新型动作链、权限错误或上下文漂移。结果就是，公司要么让高价值代理永远停留在只读模式，要么给每一步动作都塞进人工审批。
targetUser:
  primary: 负责把内部可执行动作的代理部署进生产 SaaS 工作流的 AI 平台工程师与安全工程师。
  secondary: 正在推进员工帮助台与权限开通自动化的 IT 运营负责人。
  buyer: 在部署内部代理的企业中担任 CISO 或身份安全总监的买方。
startupThesis:
  nonObviousInsight: Agentic AI 真正的安全瓶颈，不在模型会不会输出有害内容，而在如何治理生产系统里的实时工具调用序列——因为那里的身份、权限和数据状态，和任何沙盒测试都不一样。
  beachhead: 正在推出内部 IT 帮助台代理的中型与大型软件公司；这些代理需要在 Okta、Google Workspace、Jira 和 Slack 里开通权限或修改访问设置。
  wedge: 一道发布防火墙：先在预发环境里学习已批准的代理动作图，再与线上生产轨迹对比，在执行前拦截或升级处理那些高风险、前所未见的动作路径。
  whyNowCatalyst: 新近融资以及来源里反复出现的“面向 agentic 系统的企业安全层”表述，说明企业已经从代理实验走向生产部署，而运行时控制正因此变得紧迫。
  ventureScalePath: 先从权限开通类代理切入，再扩展到财务、客服和工程代理，最终成为企业代理集群跨系统的策略、可观测性与合规控制平面。
solution: 产品位于企业代理与其可操作系统之间，代理每一次工具调用、权限请求和状态变更动作都要先经过它。系统会基于预发环境和早期生产数据建立“正常动作序列”的基线，然后识别仿真与生产之间的漂移，例如异常提权、跨应用跳转或越策略的数据访问。团队无需在人类审批和完全自动化之间二选一，而是只对新颖或敏感动作启用升级审批。每一个决策都会被记录成可审计的轨迹，供安全复盘、合规检查和事后取证使用。
goToMarketSeed:
  firstCustomer: 员工规模 1,000-10,000 人、正在试点内部 IT 帮助台代理，并准备让其在 Okta 与 Google Workspace 中执行写操作的 B 轮至上市软件公司。
  buyingTrigger: 当内部支持代理或权限开通代理获准从沙盒测试进入生产写操作的那一刻。
  currentAlternative: 在通用 guardrail SDK、SIEM 日志和内部脚本之上再叠一层手工审批流程。
  switchingReason: 这个切口既保住代理自动化的 ROI，又能给安全团队提供通用 LLM 安全工具给不了的运行时控制与审计证据。
  pricingHypothesis: 按受保护的生产代理工作流数量，加上每月状态变更动作量收取年度平台费。
whyNow:
  - point: Agentic AI 安全正在吸引专门的创业融资，这强烈说明企业买方已经开始为这个问题单独划预算。
    signalRefs: [类别融资验证企业预算正在形成]
    sourceRefs: [1, 2]
  - point: 最关键的失效模式，已经从提示词质量转向生产运行时漂移，因此需要新的基础设施层。
    signalRefs: [从仿真到生产的漂移是核心失效模式]
    sourceRefs: [1]
  - point: 企业开始要求围绕代理建立独立的安全层，而不只是做评估工具，这给新的控制平面品类留出了空间。
    signalRefs: [买方需要代理专属的安全层]
    sourceRefs: [1, 2]
  - point: 当企业把代理真正放进带写权限的生产工作流时，安全紧迫性会瞬间抬头，这也构成了清晰的购买触发点。
    signalRefs: [代理一旦上线部署，安全紧迫性就会出现]
    sourceRefs: [1, 2]
differentiator: 大多数 AI 安全产品聚焦提示词、模型输出或离线评估；这个公司则聚焦真实企业系统里的运行时授权与序列级异常检测，因为代价最高的失败就发生在那里。它的护城河，最终可以沉淀为一套专有的生产代理动作轨迹语料、策略模板，以及面向敏感企业应用的工作流风险模型。
