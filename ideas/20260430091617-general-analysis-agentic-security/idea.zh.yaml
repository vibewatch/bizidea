jobsToBeDone:
  - job: 当公司准备让内部 IT 智能体在生产环境里直接改访问权限时，帮我守住动作边界，这样我才能把支持自动化跑起来，又不引爆安全事故。
    currentAlternative: 每个敏感步骤都人工审批，再加零散 allowlist
    successMetric: 在没有策略违规或事故升级的前提下，访问请求被自动化处理的比例
  - job: 当审计方或安全负责人追问智能体在生产里到底做了什么时，帮我把完整运行证据拿出来，这样我不用花几周手工翻日志也能证实控制到位。
    currentAlternative: 查 SIEM，再手工拼各应用日志
    successMetric: 产出可审计事故报告或合规报告所需的时间
ideaScorecard:
  signalStrength:
    score: 4
    rationale: 融资加上来源里对企业智能体安全的明确表述，够说明需求可信，虽然窗口期内只有两条来源。
  painIntensity:
    score: 5
    rationale: 一个高权限智能体在生产里做错一次动作，就可能带来严重的安全、合规和停机风险。
  wedgeClarity:
    score: 5
    rationale: 先从带写权限的 IT 访问智能体切入，再围绕发布防火墙这条具体流程展开，切口非常清楚。
  defensibility:
    score: 4
    rationale: 跨系统集成能力加上专有的高风险生产动作轨迹语料，有机会累积成耐久护城河。
  ventureScale:
    score: 4
    rationale: 这个滩头最终能扩成多类企业智能体的广义控制平面，不过平台型在位者仍是威胁。
topRisks:
  - name: 平台厂商补上原生控制能力
    description: 身份交付商或智能体平台厂商可能很快上线基础策略检查，压缩这个切口的空间。
    mitigation: 把重点放在跨系统动作图谱、模拟到生产的漂移检测，以及异构工具之间最难统一的审计证据上。
  - name: 客户推迟给智能体开放写权限
    description: 如果企业在更长时间里都把智能体锁在只读，即便兴趣很高，采用节奏也会后移。
    mitigation: 先卖给已批准帮台自动化项目的团队，并交付只读可观测能力，在 go-live 时自然升级成强制控制。
  - name: 企业安全销售周期过长
    description: 安全基础设施交易很容易拖多个季度，同时往往要经历重度证实。
    mitigation: 先用一个高风险流程做轻量试点，比如 Okta 权限开通，在 30 天内交付清晰 ROI 和合规成果。
