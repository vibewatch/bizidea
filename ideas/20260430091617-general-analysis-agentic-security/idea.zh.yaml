problem: >-
  企业在沙箱里能把智能体演示得很顺，可一旦这些智能体要去碰生产环境里的身份、工单和管理系统写权限，信心就会立刻往下掉。离线评测和提示词护栏，抓不住那些只会在真实 SaaS
  杂乱状态里冒出来的新动作链、权限失误和上下文漂移。结果只剩两条路：要么把真正有价值的智能体永远锁在只读，要么每一步都重新塞回人工审批，把自动化效率活活拖慢。
targetUser:
  primary: 负责把内部执行型智能体部署到生产 SaaS 流程里的 AI 平台工程师和安全工程师。
  secondary: 正在推进员工帮台与权限开通自动化的 IT 运营负责人。
  buyer: 在部署内部智能体的企业里，通常是 CISO 或身份安全总监。
startupThesis:
  nonObviousInsight: 智能体 AI 真正的安全瓶颈，不是模型会不会吐出危险内容，而是怎么在生产系统里管住一连串真实工具调用——那里身份、权限和数据状态，和任何沙箱测试都不是一回事。
  beachhead: 正在上线内部 IT 帮台智能体的中型市场和大型软件公司；这些智能体能在 Okta、Google Workspace、Jira 和 Slack 里开通权限或改动访问配置。
  wedge: 一道发布防火墙：先在 staging 学会哪些智能体动作图谱是被批准的，再和生产环境的实时轨迹逐条比对；一旦发现新的高风险路径，就在执行前拦截或升级审批。
  whyNowCatalyst: 新融资以及“面向智能体系统的企业安全层”这种明确信号，说明企业正把智能体从实验推向生产，而一旦进入运行时，控制层就变成刚需。
  ventureScalePath: 先拿访问开通类智能体切进去，再扩到财务、客服和工程智能体，最后变成企业智能体集群跨系统的策略、可观测性与合规控制平面。
solution: >-
  产品卡在企业智能体和它能操作的各类系统之间，代理每一次工具调用、权限请求和会改状态的动作。它先用 staging
  和前期生产数据搭出“正常动作序列”基线，再盯住模拟环境与生产环境之间的漂移，比如异常提权、跨应用跳转，或越过策略边界的数据访问。团队只需要对新出现或高敏动作触发升级审批，不必把整条流程重新塞回人工。每一次决策都会留下可审计轨迹，方便安全复盘、合规检查和事故取证。
goToMarketSeed:
  firstCustomer: 已在试点内部 IT 帮台智能体、并准备给 Okta 和 Google Workspace 写权限的 Series B 到上市软件公司，员工规模约 1,000-10,000 人。
  buyingTrigger: 内部支持或访问开通智能体从沙箱测试被批准切到生产写操作的那一刻。
  currentAlternative: 在泛用 guardrail SDK、SIEM 日志和内部脚本之上，再额外叠一层人工审批流。
  switchingReason: 这个切口能保住智能体自动化的 ROI，同时给安全团队补上泛用 LLM 安全工具做不到的运行时控制和审计证据。
  pricingHypothesis: 按受保护的生产智能体流程数量收年费，再叠加按月计费的状态变更动作量。
