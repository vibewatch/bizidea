categoryDynamics:
  growthRate: 2025 年员工获得 AI 使用权限的比例增长 50%
  growthRateSourceRefs:
    - 2
  tailwinds:
    - point: Deloitte 表示，2025 年员工获得 AI 使用权限的比例增长 50%，而 AI 项目中有 40%+ 进入生产的公司占比也将翻倍，这会直接推高对生产控制层的需求。
      sourceRefs:
        - 2
    - point: Deloitte 还说，预计 2025 年有 80% 的自动化负责人会加快 AI 代理投资，因此代理周边平台开支会在短期内增加。
      sourceRefs:
        - 3
    - point: CrowdStrike 报告称，AI 增强型对手发动的攻击增长了 89%，这会强化围绕自主系统的安全紧迫性。
      sourceRefs:
        - 6
    - point: Okta、Workato、Tines 与 Moveworks 都已经在明确产品化代理、MCP 或代理构建能力，说明平台栈正在从聊天走向动作执行。
      sourceRefs:
        - 12
        - 18
        - 19
        - 20
  headwinds:
    - point: Deloitte 调查显示，接近 60% 的 AI 负责人认为，采用 agentic AI 的最大难点是集成，这会拖慢成交节奏。
      sourceRefs:
        - 4
    - point: Okta 自己的代理安全页面称，44% 的组织仍没有建立治理机制，这意味着早期销售会背上沉重的教育与变更管理负担。
      sourceRefs:
        - 12
    - point: 关键 SaaS 系统里的 API 配额、节流与重试行为，会显著提高在线控制的实施复杂度。
      sourceRefs:
        - 26
        - 27
        - 28
        - 29
        - 30
competitors:
  - name: Zenity
    stage: scale-up
    wedge: 面向 SaaS 托管、设备端与自研代理的 AI 代理治理、可观测性与 AI-SPM。
    pricing: 企业定制定价；未找到公开自助价格。
    strength: 围绕 AI 代理治理以及 Microsoft / SaaS 生态，拥有很强的跨平台定位。
    weaknessVsUs: 更偏姿态管理与可观测性的大平台，未必像一个专门针对敏感 IAM / 帮助台动作路径的发布防火墙那样鲜明。
    sourceRefs:
      - 21
  - name: Noma Security
    stage: scale-up
    wedge: 集中的 AI 代理安全平台，覆盖运行时保护、AI-SPM、红队测试与 MCP。
    pricing: 企业定制定价；未找到公开自助价格。
    strength: 资金充足，平台覆盖广，对代理运行时保护和集中可见性有明确叙事。
    weaknessVsUs: 横向覆盖越广，越容易稀释它在内部 IT 工作流里“预发到生产漂移 + 审批”这个细分问题上的聚焦。
    sourceRefs:
      - 22
      - 40
  - name: Prompt Security
    stage: scale-up
    wedge: 面向员工、自研应用与代码助手的实时 MCP 保护、AI gateway 检查与治理。
    pricing: 企业定制定价；未找到公开自助价格。
    strength: 对 MCP、数据泄露、提示词注入和可搜索审计日志有清晰聚焦。
    weaknessVsUs: 更偏服务器 / 内容 / gateway 视角，而不是面向多应用运营动作的序列级授权控制。
    sourceRefs:
      - 23
  - name: Lakera
    stage: scale-up
    wedge: 面向 AI 应用与代理的运行时可见性与保护，强调结果控制。
    pricing: 企业定制定价；未找到公开自助价格。
    strength: 对代理行为的运行时安全与攻击检测叙事很强。
    weaknessVsUs: 整体定位仍然比“企业 SaaS 变更工作流专用发布防火墙”更宽。
    sourceRefs:
      - 24
  - name: Okta
    stage: incumbent
    wedge: 面向代理和 workforce app 的代理身份治理、跨应用访问、权限开通与身份治理控制。
    pricing: 公开的 workforce 套件起价为每用户每月 $6-$17；代理治理相关组件更像企业定制。
    strength: 原生身份上下文、生命周期控制，以及在企业 IAM 团队中的既有分发能力。
    weaknessVsUs: 在 Okta 自身身份边界内位置极强，但未必天然就是所有代理动作与编排栈的中立、跨系统运行时控制平面。
    sourceRefs:
      - 12
      - 13
      - 14
      - 15
      - 31
regulatoryTechnicalConstraints:
  - point: 企业买方会预期看到最小权限、人工 override 与可审计性，因为越来越多 AI 治理框架都把这些列为已部署系统的基本控制。
    sourceRefs:
      - 7
      - 8
      - 9
      - 10
      - 39
  - point: 在线策略执行必须扛住 Okta、Google、Slack、Jira 与 Microsoft Graph 各自的 API 限流与节流约束。
    sourceRefs:
      - 26
      - 27
      - 28
      - 29
      - 30
  - point: 一个有用的产品必须把异构系统的日志归一化；否则无论事故取证还是合规举证，依旧只能得到碎片化证据。
    sourceRefs:
      - 12
      - 17
      - 18
      - 36
      - 37
  - point: 工具使用与 computer use 会放大单次模型错误的爆炸半径，因为系统可以在生产环境里跨多个资源连续执行动作。
    sourceRefs:
      - 11
      - 18
      - 19
      - 20
validationSignals:
  - point: General Analysis 完成了 $10M 种子轮融资，目标就是构建面向 agentic 系统的企业安全层。
    sourceRefs:
      - 1
  - point: 随后 Noma Security 又宣布了一笔围绕 AI 代理安全的 $100M 融资，说明后续资本也在流入这个品类。
    sourceRefs:
      - 40
  - point: Okta 已经开始销售代理身份治理与面向 AI 代理交互的 Cross App Access，这验证了现有厂商的产品注意力。
    sourceRefs:
      - 12
      - 13
  - point: Workato 正在销售 Enterprise MCP 与 Agent Studio，并强调已验证用户访问、角色控制与生产代理审计轨迹。
    sourceRefs:
      - 18
      - 19
      - 36
  - point: Moveworks 展示了 IT 帮助台与 IAM 相邻工作流里的高自动化结果，说明运营场景已经真实存在。
    sourceRefs:
      - 16
      - 17
openQuestions:
  - 买方会把代理运行时控制视为一条全新的预算线，还是认为它理应被身份或工作流平台打包进来？
  - 在 Okta / Google Workspace / Jira 工作流真正上线后，生产动作路径的新颖度比率到底有多高？
  - 客户会接受只对新颖或敏感动作做 step-up approval，还是一开始就要求完全确定性的 allowlist？
  - 要赢下第一单，究竟需要覆盖多少跨应用系统：只做 Okta 与 Google Workspace 就够，还是必须连 Slack / Jira / ITSM 一起拿下？
  - 在欧洲及其他监管更重的环境里，安全买方会要求什么样的日志与策略决策部署模型？
