reportMemo:
  executiveTakeaways:
    - 最强的证据指向同一个结论：真正愿意掏预算的需求，出现在内部代理从只读 Copilot 迈向生产写操作时；因为到了这一步，身份、审计与 kill-switch 的缺口就不再只是“最好有”，而是必须补上。
    - 企业 AI 的使用规模，跑得比治理成熟度更快。Deloitte 说，2025 年员工获得 AI 使用权限的比例增长了 50%，但真正围绕 AI 重构业务的公司只有 34%；与此同时，接近 60% 的受访者仍把集成视为 agentic AI 的首要障碍。
    - 拟议中的切口，比多数横向 AI 安全厂商都更锋利：它卖的是高风险 SaaS 动作的序列级发布控制，而不是泛化的提示词扫描、模型姿态管理或大而全的红队测试。
    - 现有厂商动作很快——Okta、Workato、Tines 与 Moveworks 都已经在卖代理、MCP 或身份治理能力——所以创业公司必须靠跨系统的中立性，以及从预发到生产的漂移检测赢下来。
    - 技术阻力不仅真实，而且具备防守性：Okta、Google、Slack、Atlassian 与 Microsoft 都暴露了限流或节流约束，因此可靠的在线执行控制和统一日志并不好做；一旦做出来，价值也很高。
    - 这个品类值得投，但对时点很敏感：General Analysis 拿了 $10M，之后 Noma 又拿了 $100M；可如果买方长期把代理停在只读模式，或者接受身份与自动化现有厂商打包的控制层，独立需求就可能迟迟起不来。
  marketDefinition: 面向内部、可执行动作的企业 AI 代理的运行时安全与治理软件。它保护的对象，是那些能在 Okta、Google Workspace、Slack、Jira 以及相邻 ITSM / IAM 工具中改写状态的代理。核心买方是部署内部 IT 或员工支持代理的北美与欧洲中型、大型企业中的 CISO、身份安全负责人或 AI 平台负责人。这里明确不包括通用模型托管、只读聊天机器人、只在提示词层生效的 guardrail SDK，以及那些不处在高风险动作执行路径上的泛 AI 姿态管理工具。
  customerAndBuyer: 初始 ICP 是员工规模约 1,000-10,000 人的软件与互联网公司；它们已经在使用企业身份与 IT 自动化工具，并正在试点内部帮助台或权限开通代理。日常用户通常是 AI 平台工程师、安全工程师或 IAM 管理员；经济买方一般是 CISO、身份安全总监或企业 IT / 安全负责人。眼下最急的工作，是让代理把高频任务真正跑完，同时不牺牲最小权限、人工升级处理和可审计性。最可能动用的预算，来自身份安全、ITSM 自动化或 AI 治理项目，而不是纯模型开支。
  buyingTriggers:
    - point: 最直接的触发点，是某个具备写权限的帮助台或 IAM 工作流获准上线生产；到了这一步，原来的只读评估或 human-in-the-loop 方案会开始卡住 ROI。
      sourceRefs:
        - 12
        - 14
        - 16
        - 17
    - point: 第二个触发点是审计或认证压力：一旦代理碰到权限开通、访问审查或员工数据，买方就需要能搜索、能复盘、能解释“代理做了什么、为什么这样做”的证据。
      sourceRefs:
        - 12
        - 15
        - 17
        - 18
    - point: 事故压力也很重要。IBM 把 AI 相关事故与缺失的访问控制和治理联系起来，这会让预防型运行时控制更容易被批准。
      sourceRefs:
        - 5
        - 12
  willingnessToPay:
    summary: 相邻预算已经存在，而且并不虚。Okta 公开把 workforce identity 定价在每用户每月 $6-$17，并强调权限开通能带来 $26K 的流程节约，以及大约 $1M 的访问认证与审计准备节省；Moveworks 和帮助台自动化页面则展示了 88%+ 的自主解决率和显著的工单分流效果。这说明，只要一层独立控制层能保护、或者放大更大的自动化 ROI，买方就有理由为它付费。
    sourceRefs:
      - 14
      - 15
      - 16
      - 31
  competitiveLandscape: 直接竞争对手可以分成两组：一组是横向 AI 安全厂商，如 Zenity、Noma Security、Prompt Security 与 Lakera；另一组是以身份为核心的现有厂商，如 Okta。Zenity 和 Noma 主打广谱可见性、姿态管理与运行时保护；Prompt 强调 MCP 与 gateway 控制；Lakera 强调运行时可见性与结果控制；Okta 则携带原生身份、权限开通和新兴的代理治理原语。替代方案还包括 Workato、Tines 和 Moveworks——企业可以直接在这些平台内部构建并治理工作流或代理——以及 Permit.io、Pangea、LangChain/LangGraph、人工审批、SIEM 关联分析和内部代理脚本等工程师主导方案。只有当这家创业公司在敏感动作的跨系统发布闸门上，明显优于这些更宽的平台时，它才配拥有独立空间。
  incumbentThesis:
    - incumbentClass: 云与身份平台
      point: Okta 这类身份厂商可以为代理做认证、注册和撤销，但这并不自动意味着它们就是最好的跨系统运行时防火墙。真正的切口，是跨应用的中立序列控制，而不只是身份签发。
      sourceRefs:
        - 12
        - 13
        - 14
        - 15
    - incumbentClass: 工作流与编排平台
      point: Workato、Tines 和 Moveworks 能帮助客户构建或自动化工作流，但买方仍可能想要一层独立的安全控制，因为“帮你搭系统的人”未必也是最值得信任的生产高风险动作裁判。
      sourceRefs:
        - 16
        - 18
        - 19
        - 20
    - incumbentClass: 横向 AI 安全套件
      point: Zenity、Noma、Prompt 和 Lakera 都覆盖广义 AI 风险，但它们的定位比这里的滩头市场更宽。如果一款聚焦的发布防火墙，能在 IAM / 帮助台动作图、预发基线与审批感知升级处理上显著更强，仍然有机会赢。
      sourceRefs:
        - 21
        - 22
        - 23
        - 24
    - incumbentClass: 开源与开发者工具
      point: Permit、Pangea、LangChain 等构件，确实能帮助工程团队自己拼一套控制层，但要在企业 SaaS 上把授权、连接器、审批、审计日志和 7x24 运行拼到一起，难度依然不低，通常也比直接买产品慢得多。
      sourceRefs:
        - 25
        - 32
  regulatoryLandscape: 目前还没有专门针对内部 IT 代理的细颗粒法规，但治理方向已经很清楚。NIST、OWASP、ENISA 和英国 NCSC 都在强调 AI 系统的风险管理、日志、人工监督和安全内建；而欧盟 AI Act 进一步抬高了欧洲部署方的治理门槛。对于一个要夹在权限开通或员工数据工作流中的产品来说，可审计性、最小权限与策略可追溯性，往往会在买方正式把代理归类为“高风险系统”之前，就先成为成交门槛。
  technologyLandscape: 技术栈正在从聊天界面，转向工具使用、computer use 与 MCP 风格的代理连接。Anthropic 记录了 computer use 和 tool use 能力；Okta 与 Workato 已开始销售代理身份和 MCP 控制；Tines 与 Moveworks 也在打包企业代理构建器。这让运行时策略、可追溯性与 kill-switch 行为变得更重要——也更难——因为产品必须横跨受限速的 API、碎片化的审计日志，以及不断变化的编排框架来工作。
  distributionChannels:
    - point: 最干净的初始切口，是在一条高风险工作流——通常是访问变更或 IT 支持自动化——进入生产前的安全评审中，直接卖进去。
      sourceRefs:
        - 12
        - 14
        - 16
        - 17
    - point: 第二条渠道，是从身份、编排与 IT 自动化生态切入，因为团队本来就在 Okta、Workato、Tines 与 Moveworks 这类系统里部署工作流和代理。
      sourceRefs:
        - 13
        - 18
        - 19
        - 20
  partnershipEcosystem:
    - point: 身份平台与治理厂商是天然伙伴，因为它们掌握策略决策和审计轨迹所需的用户、应用、权限和认证上下文。
      sourceRefs:
        - 12
        - 13
        - 15
        - 35
    - point: IT 编排与员工支持平台也是合理的渠道伙伴，因为具备写权限的代理最早 go-live 的地方，往往就是这些工作流附近。
      sourceRefs:
        - 16
        - 18
        - 19
        - 20
        - 36
        - 38
  dataMoats:
    - point: 真正有防守性的资产，是跨常见企业工作流里那些“被批准、被拒绝、被升级处理”的生产动作路径语料，尤其当这些路径还能绑定人工反馈和事后事故结果时。
      sourceRefs:
        - 1
        - 12
        - 18
        - 21
        - 22
    - point: 随着时间推移，围绕访问变更、审批和回滚模式沉淀下来的跨应用策略模板，价值很可能比泛化的模型侧安全数据更高。
      sourceRefs:
        - 12
        - 15
        - 17
        - 18
  geographicConsiderations:
    - point: 北美是最务实的起步区域，因为企业身份、IT 自动化与 AI 代理生态都已活跃，厂商 go-to-market 体系也更成熟。
      sourceRefs:
        - 2
        - 12
        - 16
        - 18
    - point: 欧洲会是一个有吸引力的后续市场，因为 AI Act 和欧洲安全指引会带来更强的治理压力；但这也大概率意味着更重的数据处理与采购要求。
      sourceRefs:
        - 9
        - 10
        - 39
  sensitivityCases:
    - case: 代理的只读阶段比预期多持续 12-24 个月
      impact: 滩头 SAM 会被明显压缩，因为真正的购买触发点是生产写权限，而不是泛化的代理实验。
      sourceRefs:
        - 2
        - 3
        - 4
    - case: 现有厂商把“够用”的原生控制直接打包进去
      impact: 如果创业公司在跨系统动作图与中立执行上没有明显领先，独立 ACV 就可能被压缩到一个 feature price 的水平。
      sourceRefs:
        - 12
        - 13
        - 18
        - 19
        - 31
        - 34
    - case: API 与日志层的摩擦比预期更糟
      impact: 实施会变得更偏服务化，价值兑现时间被拉长，毛利也可能更像安全咨询而不是软件。
      sourceRefs:
        - 26
        - 27
        - 28
        - 29
        - 30
  validationPlan:
    - priority: high
      question: CISO 会愿意买一层中立的发布防火墙，而不是只依赖 Okta、Workato 或内部审批吗？
      evidenceToGather: 完成 10 次设计伙伴访谈，再收集至少 3 份真实的安全架构评审文档，对比独立控制与原生控制方案。
    - priority: high
      question: 在 IAM 与帮助台工作流里，预发环境批准的动作图究竟有多频繁会与真实生产行为出现偏离？
      evidenceToGather: 在一条 Okta / Google Workspace 权限开通工作流里跑 shadow mode 轨迹，测量新颖度比率并复核误报。
    - priority: medium
      question: 买方最自然接受的定价基础是什么：按受保护工作流、按动作量，还是平台费加用量？
      evidenceToGather: 围绕当前身份治理、IT 自动化与 AI 安全工具支出，访谈预算负责人并测试定价锚点。
    - priority: medium
      question: 在真实 API 配额和重试模式下，在线执行控制能否保持足够可靠？
      evidenceToGather: 在 Okta、Google、Slack、Jira 与 Microsoft Graph 上做压测，拿到延迟、重试与故障模式数据。
    - priority: low
      question: 早期客户到底会提出多高的欧盟本地化部署或法律评审要求？
      evidenceToGather: 至少 3 通欧洲买方电话，再配合 DPA 或安全问卷里的法务 redline。
analysisModels:
  marketMapDiagram:
    title: Agentic 运行时安全市场图
    mermaid: |
      quadrantChart
        title Market map
        x-axis Low specialization --> High specialization
        y-axis Low urgency --> High urgency
        Okta: [0.40, 0.80]
        Lakera: [0.55, 0.72]
