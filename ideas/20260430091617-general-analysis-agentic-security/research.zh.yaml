        Noma Security: [0.72, 0.83]
        Zenity: [0.78, 0.81]
        Proposed startup: [0.90, 0.92]
  fiveForces:
    supplierPower:
      score: 3
      rationale: 产品依赖第三方 SaaS API、审计表面，以及模型 / 编排生态，因此 Okta、Google、Slack、Atlassian 与 Microsoft 这类平台天然掌握一定集成议价权。
      sourceRefs:
        - 26
        - 27
        - 28
        - 29
        - 30
    buyerPower:
      score: 4
      rationale: 早期买方集中、对安全敏感，而且可以把独立工具与打包式的身份、ITSM 或工作流替代方案放在一起比较，因此在标准化采购前，一定会要求试点和实证。
      sourceRefs:
        - 12
        - 16
        - 18
        - 31
    threatOfEntrants:
      score: 3
      rationale: 新的 AI 安全创业公司可以很快入场，但深连接器、高风险审批和生产轨迹数据，会让这个品类比单纯做提示词过滤更难。
      sourceRefs:
        - 21
        - 22
        - 23
        - 24
        - 25
    threatOfSubstitutes:
      score: 4
      rationale: 人工审批、SIEM 关联、原生身份控制和工作流构建器，对第一单来说都是真实替代方案，尤其在客户仍处于早期部署阶段时。
      sourceRefs:
        - 12
        - 18
        - 19
        - 20
        - 25
    competitiveRivalry:
      score: 4
      rationale: 这个空间里已经挤着横向 AI 安全厂商、身份现有厂商、编排平台与开发者工具，因此差异化必须非常明确。
      sourceRefs:
        - 21
        - 22
        - 23
        - 24
        - 12
  pestle:
    - factor: 政治
      impact: neutral
      point: 政府和标准组织正在把 AI 安全推向“必须有文档化控制与监督”的方向，而不是放任式部署。
      sourceRefs:
        - 7
        - 9
        - 10
    - factor: 经济
      impact: positive
      point: 企业正在扩大 AI 使用权限，并且已经开始报告真实收益，这会支持围绕“让自动化安全到可以上线”的预算形成。
      sourceRefs:
        - 2
        - 16
    - factor: 社会
      impact: positive
      point: 员工使用 AI 的速度还在上升，这会迫使企业把零散实验升级成受治理的运营系统。
      sourceRefs:
        - 2
        - 4
    - factor: 技术
      impact: positive
      point: 工具使用、computer use 与 MCP 风格连接显著抬高了运行时控制与可观测性的必要性。
      sourceRefs:
        - 11
        - 12
        - 18
        - 20
    - factor: 法律
      impact: negative
      point: 权限开通与员工支持工作流天然会碰到身份与个人数据，因此隐私、访问审查与审计日志会拉长采购周期。
      sourceRefs:
        - 9
        - 10
        - 39
  adoptionFrictionMatrix:
    - friction: 跨应用 API 的节流与重试行为，会让在线执行控制更复杂
      severity: high
      affectedBuyer: AI 平台工程师 / 安全工程师
      mitigation: 先从 shadow mode 起步，把不紧急的检查做成排队处理，并为每个连接器建立带显式重试策略的降级逻辑。
      sourceRefs:
        - 26
        - 27
        - 28
        - 29
        - 30
    - friction: 对“新颖但合法”的动作路径误报，可能很快把信任磨没
      severity: high
      affectedBuyer: IT 运营负责人
      mitigation: 先做阶段性学习，再只对高风险或偏离基线的序列启用 step-up approval。
      sourceRefs:
        - 1
        - 12
        - 21
        - 22
    - friction: 安全所有权横跨身份、安全平台与 ITSM 团队
      severity: medium
      affectedBuyer: CISO / 身份安全总监
      mitigation: 首单只卖一条工作流，明确控制 owner，并绑定一个可量化的审计或自动化结果。
      sourceRefs:
        - 12
        - 15
        - 17
        - 35
    - friction: 欧洲买方可能会要求更严格的日志、数据处理与治理保证
      severity: medium
      affectedBuyer: 欧盟安全或合规负责人
      mitigation: 提供区域化部署选项、明确的数据保留控制，以及可导出的审计证据。
      sourceRefs:
        - 9
        - 10
        - 39
market:
  tam:
