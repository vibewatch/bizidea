reportMemo:
  executiveTakeaways:
    - 最硬的一条证据很明确：真正的需求，不是在内部智能体还停留在只读助手时冒出来，而是在它开始直接改生产数据之后；也正是在那里，身份控制、审计链和紧急刹车能力的缺口才会变成值得单独拨预算的问题。
    - >-
      企业 AI 使用的扩张速度，已跑在治理成熟度前面。Deloitte 说 2025 年员工获得 AI 访问权限的比例上涨了 50%，不过真正围绕 AI 重构业务的公司只有 34%，同时将近 60%
      的公司仍把集成视作 agentic AI 的首要障碍。
    - 这个提案的切口，比大多数横向 AI 安全厂商更锋利：它卖的是高风险 SaaS 动作的序列级发布控制，而不是泛泛的提示词扫描、模型姿态管理或大而全的对抗测试。
    - >-
      在位者推进速度很快——Okta、Workato、Tines 和 Moveworks 都已在卖智能体、MCP 或身份治理相关能力——因此创业公司必须靠“跨系统中立性”和“从 staging
      到生产的漂移检测”赢，而不是靠概念包装。
    - >-
      技术阻力真实存在，同时反过来也是防御点：Okta、Google、Slack、Atlassian 和 Microsoft
      都有限流或节流约束，因此要把内联强制控制和统一日志真正跑稳并不容易；但一旦跑通，价值也会很高。
    - >-
      这是个值得投的方向，不过节奏很敏感：General Analysis 融了 $10M，后来的 Noma 甚至融了 $100M；可如果买方继续把智能体锁在只读，或者接受身份 /
      自动化在位者打包控制，独立产品的需求就会滞后。
  marketDefinition: >-
    这是面向内部执行型企业 AI 智能体的运行时安全与治理软件。它服务的对象，是那些会在 Okta、Google Workspace、Slack、Jira 以及相邻 ITSM / IAM
    工具里改状态的智能体。核心买方是北美和欧洲中型市场及大型企业里的 CISO、身份安全负责人或 AI 平台负责人，他们正在部署内部 IT
    或员工支持智能体。这个定义刻意排除了泛用模型托管、只读聊天机器人、只做提示词护栏的 SDK，以及那些不处在高风险动作执行路径上的广义 AI 姿态工具。
  customerAndBuyer: >-
    初始 ICP 很清楚：软件和互联网公司，员工规模大约 1,000-10,000 人，已在使用企业级身份与 IT 自动化工具，并在试点内部帮台或访问开通智能体。日常使用者通常是 AI 平台工程师、安全工程师或
    IAM 管理员；真正拍板掏钱的，往往是 CISO、身份安全总监或企业 IT / 安全负责人。最迫切的工作，是让智能体把高频任务真正跑完，同时又不丢掉最小权限、人审升级和可审计性。预算更可能来自身份安全、ITSM
    自动化或 AI 治理项目，而不是纯模型开销。
  buyingTriggers:
    - point: 最直接的触发点，是一条带写权限的帮台或 IAM 流程准备上生产；这时原本还能勉强凑合的只读评测和人工兜底，开始真正卡住 ROI。
      sourceRefs:
        - 12
        - 14
        - 16
        - 17
    - point: 第二个触发点来自审计或认证压力：一旦智能体碰到权限开通、访问审查或员工数据，买方就必须拿出可检索证据，说明智能体到底做了什么、为什么这么做。
      sourceRefs:
        - 12
        - 15
        - 17
        - 18
    - point: 事故压力也在抬升。IBM 把 AI 相关事故和访问控制、治理缺位联系在一起，这让预防型运行时控制更容易过会。
      sourceRefs:
        - 5
        - 12
  willingnessToPay:
    summary: >-
      相邻预算本来就真实存在。Okta 公开给 workforce identity 定价在每用户每月 $6-$17，并强调访问开通能省下 $26K 流程成本，以及约 $1M
      的访问认证和审计准备成本；Moveworks 与帮台自动化页面也展示了 88%+ 的自动解决率和大幅度分流效果。这说明，只要一层独立控制真能守住或放大更大的自动化 ROI，买方就有可能为它单独拨钱。
    sourceRefs:
      - 14
      - 15
      - 16
      - 31
  competitiveLandscape: >-
    直接竞争对手大致分成两堆：一堆是横向 AI 安全厂商，如 Zenity、Noma Security、Prompt Security、Lakera；另一堆是以身份为中心的在位者，比如 Okta。Zenity 和
    Noma 主打广谱可见性、姿态管理与运行时防护；Prompt 更强调 MCP 和 gateway 控制；Lakera 强调运行时可见性与 outcome control；Okta 则天然带着身份、开通和新兴
    agent governance 能力。替代方案还包括 Workato、Tines、Moveworks
    这类能在自己平台里构建并治理流程或智能体的厂商，以及开发者自建路线：Permit.io、Pangea、LangChain / LangGraph、人工审批、SIEM 关联分析和内部 proxy
    脚本。只有当创业公司在“敏感动作的跨系统发布闸门”上显著强过这些更宽的平台时，它才值得存在。
  incumbentThesis:
    - incumbentClass: 云与身份平台
      point: Okta 这类身份厂商能给智能体做认证、登记和撤销，不过这并不意味着它们就是最适合的跨系统运行时防火墙。真正的切口在于跨应用的中立序列控制，而不止是发身份。
      sourceRefs:
        - 12
        - 13
        - 14
        - 15
    - incumbentClass: 流程与编排平台
      point: Workato、Tines 和 Moveworks 能帮客户搭流程、做自动化，不过买方仍可能希望有一层独立安全控制，由于“构建器”未必总是最值得信任的生产高风险动作裁判。
      sourceRefs:
        - 16
        - 18
        - 19
        - 20
    - incumbentClass: 横向 AI 安全套件
      point: >-
        Zenity、Noma、Prompt 和 Lakera 都覆盖更宽的 AI 风险面，不过它们的定位比这个滩头更泛。如果一个专注型发布防火墙，能在 IAM / 帮台动作图谱、staging
        基线和带审批意识的升级逻辑上显著更强，它仍有机会赢。
      sourceRefs:
        - 21
        - 22
        - 23
        - 24
    - incumbentClass: 开源与开发者工具
      point: >-
        Permit、Pangea、LangChain 这类积木确实能帮工程团队自己搭控制层，不过要把授权、连接器、审批、审计日志和 7x24 运维跨企业 SaaS
        系统真正拼起来，难度依旧不低，往往也比直接买产品更慢。
      sourceRefs:
        - 25
        - 32
  regulatoryLandscape: >-
    针对内部 IT 智能体的专门监管还没完全成形，不过合规方向已很清楚。NIST、OWASP、ENISA 和英国 NCSC 都在强调 AI 系统的风险管理、日志留存、人类监督与
    security-by-design；欧盟 AI Act
    也在抬高欧洲部署方的治理门槛。对一个夹在权限开通或员工数据流程中间的产品来说，可审计性、最小权限和策略可追溯性，会先于“高风险系统”正式定性，提前成为采购要求。
  technologyLandscape: >-
    技术栈正从聊天界面，转向工具调用、计算机操作和 MCP 风格的智能体连接。Anthropic 已把计算机操作与工具调用能力文档化；Okta 和 Workato 开始卖智能体身份与 MCP 控制；Tines 和
    Moveworks 也在把企业智能体构建器打包成产品。这让运行时策略、轨迹可追溯和紧急刹车能力变得更重要——也更难做——由于产品必须跨越限流 API、碎片化审计日志，以及还在快速演化的编排框架。
  distributionChannels:
    - point: 先围绕一条高风险流程——通常是访问变更或 IT 支持自动化——切进生产前安全评审，仍是最干净的启动渠道。
      sourceRefs:
        - 12
        - 14
        - 16
        - 17
    - point: 第二条渠道来自身份、编排与 IT 自动化生态，由于团队本来就在这些平台里部署流程和智能体，比如 Okta、Workato、Tines 和 Moveworks。
      sourceRefs:
        - 13
        - 18
        - 19
        - 20
  partnershipEcosystem:
    - point: 身份平台和治理厂商是天然伙伴，由于它们手上有用户、应用、权限和认证上下文，这些正是做策略判断和审计链所需的原材料。
      sourceRefs:
        - 12
        - 13
        - 15
        - 35
    - point: IT 编排和员工支持平台也是合理渠道，由于可写智能体往往就是先在这些流程里上线。
      sourceRefs:
        - 16
        - 18
        - 19
        - 20
        - 36
        - 38
  dataMoats:
    - point: 真正能沉淀下来的防御资产，是一套覆盖常见企业流程、且附带人工反馈与事故结果标签的“已批准 / 已拒绝 / 已升级”生产动作路径语料。
      sourceRefs:
        - 1
        - 12
        - 18
        - 21
        - 22
    - point: 长期看，跨应用的访问变更、审批和回滚模式策略模板，可能比泛化的模型侧安全数据更值钱。
      sourceRefs:
        - 12
        - 15
        - 17
        - 18
  geographicConsiderations:
    - point: 北美是最务实的首发区域，由于企业身份、IT 自动化和 AI 智能体生态在这里已活跃起来，厂商 GTM 体系也成熟得多。
      sourceRefs:
        - 2
        - 12
        - 16
        - 18
    - point: 欧洲是个有吸引力的后续市场，由于 AI Act 和欧洲安全指引会推高治理要求；但这也意味着更重的数据处理和采购要求。
      sourceRefs:
        - 9
        - 10
        - 39
  sensitivityCases:
    - case: 智能体继续只读的时间，比预期再拖 12-24 个月
      impact: 滩头 SAM 会被显著压缩，由于真正的采购触发点是生产写权限，而不是泛泛的实验兴趣。
      sourceRefs:
        - 2
        - 3
        - 4
    - case: 在位者打包的原生控制“已够用”
      impact: 独立产品的 ACV 很可能被压到 feature pricing，除非创业公司能在跨系统动作图谱和中立执行上清楚胜出。
      sourceRefs:
        - 12
        - 13
        - 18
        - 19
        - 31
        - 34
    - case: API 与日志摩擦比预期更糟
      impact: 实施会更像重服务项目，time to value 被拉长，毛利也会更像安全咨询而不是软件。
      sourceRefs:
        - 26
        - 27
        - 28
        - 29
        - 30
  validationPlan:
    - priority: high
      question: CISO 会不会真的买一层中立发布防火墙，而不是继续依赖 Okta、Workato 或内部审批流？
      evidenceToGather: 做 10 场共创客户访谈，并至少收集 3 份真实安全架构评审文档，对比独立方案和原生控制。
    - priority: high
      question: 在 IAM 和帮台流程里，staging 已批准的动作图谱和真实生产行为到底会多频繁地分叉？
      evidenceToGather: 在一条 Okta / Google Workspace 权限开通流程上跑 shadow mode，量化 novelty rate，并逐条复核误报。
    - priority: medium
      question: 买方觉得哪种定价锚点最自然：按受保护流程、按动作量，还是平台费加 usage？
      evidenceToGather: 围绕眼下身份治理、IT 自动化和 AI 安全支出，与预算 owner 做定价访谈。
    - priority: medium
      question: 在真实 API 配额和重试模式下，inline enforcement 能不能保持稳定？
      evidenceToGather: 对 Okta、Google、Slack、Jira 和 Microsoft Graph 跑压力测试，记录延迟、重试与失败模式。
    - priority: low
      question: 欧洲前期客户到底会提出多重的数据本地化或法务审查要求？
      evidenceToGather: 至少完成 3 通欧洲买方电话，并收集一版 DPA 或安全问卷里的法务 redline。
analysisModels:
  marketMapDiagram:
    title: 智能体运行时安全市场图
    mermaid: |
      quadrantChart
        title 市场图
        x-axis 低专用性 --> 高专用性
        y-axis 低紧迫性 --> 高紧迫性
        Okta: [0.40, 0.80]
        Lakera: [0.55, 0.72]
        Prompt Security: [0.63, 0.76]
        Noma Security: [0.72, 0.83]
        Zenity: [0.78, 0.81]
        拟议创业公司: [0.90, 0.92]
  fiveForces:
    supplierPower:
      score: 3
      rationale: 产品依赖第三方 SaaS API、审计面和模型 / 编排生态，因此 Okta、Google、Slack、Atlassian、Microsoft 这类平台天然拥有一定集成杠杆。
      sourceRefs:
        - 26
        - 27
        - 28
        - 29
        - 30
    buyerPower:
      score: 4
      rationale: 前期买方数量集中、安全意识强，同时能直接比较独立工具与打包进身份、ITSM 或流程平台里的替代方案，因此他们一定会要求试点和证据。
      sourceRefs:
        - 12
        - 16
        - 18
        - 31
    threatOfEntrants:
      score: 3
      rationale: 新的 AI 安全创业公司能很快入场，不过深连接器、高风险审批和生产轨迹数据，让这个品类远比单纯做提示词过滤更难。
      sourceRefs:
        - 21
        - 22
        - 23
        - 24
        - 25
    threatOfSubstitutes:
      score: 4
      rationale: 人工审批、SIEM 关联、原生身份控制和流程构建器，都是第一单里真实存在的替代方案，尤其当客户还处在部署前期时。
      sourceRefs:
        - 12
        - 18
        - 19
        - 20
        - 25
    competitiveRivalry:
      score: 4
      rationale: 赛道里已同时存在广谱 AI 安全厂商、身份在位者、编排平台和开发者工具，因此差异化必须讲得极具体。
      sourceRefs:
        - 21
        - 22
        - 23
        - 24
        - 12
  pestle:
    - factor: 政策
      impact: neutral
      point: 政府与标准机构正在把 AI 安全往“有文档、可监督”的控制体系推，而不是放任式部署。
      sourceRefs:
        - 7
        - 9
        - 10
    - factor: 经济
      impact: positive
      point: 企业正在扩大 AI 使用并报告真实收益，这会支持“先把自动化做安全，再大规模上线”的预算逻辑。
      sourceRefs:
        - 2
        - 16
    - factor: 社会
      impact: positive
      point: 员工使用 AI 的速度在变快，这会逼企业从零散实验转向有治理的运营系统。
      sourceRefs:
        - 2
        - 4
    - factor: 技术
      impact: positive
      point: tool use、computer use 和 MCP 式连接，显著放大了运行时控制与可观测性的必要性。
      sourceRefs:
        - 11
        - 12
        - 18
        - 20
    - factor: 法律
      impact: negative
      point: 权限开通和员工支持流程会碰到身份与个人数据，因此隐私、访问审查和日志要求会拖长采购。
      sourceRefs:
        - 9
        - 10
        - 39
  adoptionFrictionMatrix:
    - friction: 跨应用 API 的限流与重试行为，让内联强制控制更难跑稳
      severity: high
      affectedBuyer: AI 平台工程师 / 安全工程师
      mitigation: 先从影子模式启动，把不紧急检查排队处理，并为每个连接器补齐带明确重试策略的兜底逻辑。
      sourceRefs:
        - 26
        - 27
        - 28
        - 29
        - 30
    - friction: 新动作里既合法又陌生的路径，会带来误报并消耗信任
      severity: high
      affectedBuyer: IT 运营负责人
      mitigation: 采用分阶段学习，只对高风险或超出基线的序列触发升级审批。
      sourceRefs:
        - 1
        - 12
        - 21
        - 22
    - friction: 安全归属横跨身份、AI 平台与 ITSM 团队
      severity: medium
      affectedBuyer: CISO / 身份安全总监
      mitigation: 第一条流程必须有明确控制负责人，并绑定一个可量化的审计或自动化结果。
      sourceRefs:
        - 12
        - 15
        - 17
        - 35
    - friction: 欧洲买方可能要求更严格的日志、数据处理与治理承诺
      severity: medium
      affectedBuyer: 欧盟安全或合规负责人
      mitigation: 交付区域化部署选项、明确保留策略控制和可导出的审计证据。
      sourceRefs:
        - 9
        - 10
        - 39
market:
  tam:
    value: $630.0M
    rationale: >-
      估算方法：假设全球最终有 7,000 家企业会部署可写内部智能体，再乘以约 $90k 的混合年化合同额；企业数量参考大企业身份 / 自动化买方基数和加速中的智能体投资信号，ACV
      则锚定相邻的身份与授权支出水平。
    isEstimate: true
    sourceRefs:
      - 3
      - 12
      - 31
      - 32
      - 34
  sam:
    value: $76.5M
    rationale: 估算方法：把 TAM 缩到最可能先买单的群体后，假设北美和欧洲有 900 家软件 / 互联网企业落在 1,000-10,000 人的初始滩头，再乘以约 $85k 的混合 ACV。
    isEstimate: true
    sourceRefs:
      - 2
      - 3
      - 12
      - 16
      - 17
  som:
    value: $3.2M
    rationale: 估算方法：假设第 3 年能通过围绕生产 go-live 的直销动作，触达 35 家共创 / 灯塔客户，每家约 $90k ACV，且初期只上线一条流程。
    isEstimate: true
    sourceRefs:
      - 1
      - 12
      - 16
      - 17
bottomUpSizingDrivers:
  - driver: 总可服务单位数
    value: 7,000 家全球企业（估）未来有可能部署可写内部智能体
    source: calc using [3], [12], [31]
  - driver: 滩头账户数
    value: 北美 / 欧洲约 900 家、员工规模 1,000-10,000 人的软件与互联网企业（估）
    source: calc using [2], [3], [16], [17]
  - driver: 混合年化合同额
    value: 每个账户约 $85k-$90k（估）
    source: calc using [31], [32], [33], [34]
  - driver: 第 3 年可触达客户数
    value: 35 个账户
    source: est. based on enterprise direct-sales ramp
categoryDynamics:
  growthRate: 2025 年员工获得 AI 访问权限增长 50%
  growthRateSourceRefs:
    - 2
  tailwinds:
    - point: Deloitte 称，2025 年员工 AI 访问权限拉升了 50%，同时 AI 项目中 40%+ 已进生产的公司占比还将翻倍，这会直接推高生产级控制的需求。
      sourceRefs:
        - 2
    - point: Deloitte 还提到，2025 年预计有 80% 的自动化负责人会加速对 AI 智能体的投入，这会在短期内拉动围绕智能体的平台预算。
      sourceRefs:
        - 3
    - point: CrowdStrike 报告称，由 AI 赋能的对手攻击增长了 89%，进一步放大了围绕自治系统的安全紧迫性。
      sourceRefs:
        - 6
    - point: Okta、Workato、Tines 和 Moveworks 都在明确把 agent、MCP 或 agent-builder 做成产品，说明平台栈正从聊天走向动作执行。
      sourceRefs:
        - 12
        - 18
        - 19
        - 20
  headwinds:
    - point: Deloitte 调研里，将近 60% 的 AI 负责人认为集成是采用 agentic AI 的头号障碍，这会直接拖慢成交节奏。
      sourceRefs:
        - 4
    - point: Okta 自己的 agent-security 页面说，44% 的组织还没有任何治理机制，也就是说前期销售要承担很重的教育和变更管理负担。
      sourceRefs:
        - 12
    - point: 关键 SaaS 系统普遍有 API 配额、限流与重试行为，这会抬高 inline control 的实现复杂度。
      sourceRefs:
        - 26
        - 27
        - 28
        - 29
        - 30
competitors:
  - name: Zenity
    stage: scale-up
    wedge: 覆盖 SaaS 托管、设备侧和自建智能体的 AI agent governance、可观测性与 AI-SPM。
    pricing: 企业定制定价；未找到公开 self-serve 价格。
    strength: 在 AI agent governance 以及 Microsoft / SaaS 生态上，跨平台定位很强。
    weaknessVsUs: 更宽的姿态与可观测性叙事，可能不如“面向敏感 IAM / 帮台动作路径的窄发布防火墙”那样有主见。
    sourceRefs:
      - 21
  - name: Noma Security
    stage: scale-up
    wedge: 集中式 AI agent security 平台，覆盖运行时防护、AI-SPM、red teaming 和 MCP。
    pricing: 企业定制定价；未找到公开 self-serve 价格。
    strength: 资金充足、平台化程度高，同时明确覆盖 agent 的运行时保护与集中可见性。
    weaknessVsUs: 横向覆盖很宽，容易冲淡其在内部 IT 流程里“staging-to-production 漂移 + 审批控制”这一具体问题上的专注度。
    sourceRefs:
      - 22
      - 40
  - name: Prompt Security
    stage: scale-up
    wedge: 面向员工、内建应用和代码助手的实时 MCP 防护、AI gateway 检查与治理。
    pricing: 企业定制定价；未找到公开 self-serve 价格。
    strength: 对 MCP、数据泄漏、提示词注入和可检索审计日志的表述很清楚。
    weaknessVsUs: 更偏 server / content / gateway 视角，不如多应用操作序列授权这个点集中。
    sourceRefs:
      - 23
  - name: Lakera
    stage: scale-up
    wedge: 面向 AI 应用与智能体的运行时可见性与保护，强调 outcome control。
    pricing: 企业定制定价；未找到公开 self-serve 价格。
    strength: 运行时安全叙事强，对 agent 行为攻击检测也有鲜明 framing。
    weaknessVsUs: 定位依然比“企业 SaaS 变更流程的专用发布防火墙”更泛。
    sourceRefs:
      - 24
  - name: Okta
    stage: incumbent
    wedge: 面向智能体和 workforce app 的身份治理、跨应用访问、开通以及身份治理控制。
    pricing: 公开 workforce 套件从每用户每月 $6-$17 起，agent governance 相关组件看起来更偏 enterprise / custom。
    strength: 天然掌握身份上下文、生命周期控制，并已分发到企业 IAM 团队。
    weaknessVsUs: 在 Okta 自己的身份边界内位置最好，不过未必就是所有 agent 动作和编排栈的中立跨系统运行时控制平面。
    sourceRefs:
      - 12
      - 13
      - 14
      - 15
      - 31
regulatoryTechnicalConstraints:
  - point: 企业买方会要求最小权限、人类覆盖和可审计性，由于 AI 治理框架越来越明确地把这些控制写进已部署系统的基本要求里。
    sourceRefs:
      - 7
      - 8
      - 9
      - 10
      - 39
  - point: Inline policy enforcement 必须扛住 Okta、Google、Slack、Jira 和 Microsoft Graph 的 API 限流与 throttling。
    sourceRefs:
      - 26
      - 27
      - 28
      - 29
      - 30
  - point: 真正有用的产品必须把异构系统日志归一化；否则，事故后的取证与合规证据仍会被分散在各处。
    sourceRefs:
      - 12
      - 17
      - 18
      - 36
      - 37
  - point: Tool use 和 computer use 会放大单次模型失误的爆炸半径，由于系统能在生产环境里跨多个资源连续执行动作。
    sourceRefs:
      - 11
      - 18
      - 19
      - 20
validationSignals:
  - point: General Analysis 完成了 $10M 种子轮，目标就是为智能体系统搭企业安全层。
    sourceRefs:
      - 1
  - point: Noma Security 后续又宣布了围绕 AI agent security 的 $100M 融资，说明后续资本也正在进场。
    sourceRefs:
      - 40
  - point: Okta 已开始卖面向 AI agent 交互的 agent identity governance 和 Cross App Access，这证实了在位者的产品关注度。
    sourceRefs:
      - 12
      - 13
  - point: Workato 把 Enterprise MCP 和 Agent Studio 包装成具备已证实用户访问、角色控制和审计轨迹的生产能力。
    sourceRefs:
      - 18
      - 19
      - 36
  - point: Moveworks 公布了 IT 帮台与 IAM 相邻流程中的高自动化结果，说明这个运营情境已是真需求，而不是 PPT。
    sourceRefs:
      - 16
      - 17
openQuestions:
  - 买方会把 agent-runtime control 看成一条新增预算线，还是只愿意把它当作身份或流程平台里的一个 feature？
  - 在 Okta / Google Workspace / Jira 流程真正上线后，生产动作路径的新颖度到底有多高？
  - 客户会接受只对新动作或高敏动作做升级审批，还是会先要求完全 deterministic 的 allowlist？
  - 要赢下第一单，究竟只覆盖 Okta 和 Google Workspace 就够了，还是必须把 Slack / Jira / ITSM 一起带上？
  - 在欧洲和其他强监管环境里，安全买方到底会要求什么样的日志与策略决策部署模型？
