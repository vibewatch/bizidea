  validationPlan:
  - priority: high
    question: What share of remote-assist minutes today comes from semantic public-scene issues versus low-level autonomy failures?
    evidenceToGather: Collect 30-60 days of intervention logs from three fleets and tag each event by root cause, severity, and eventual operator action.
  - priority: high
    question: Will operators trust automated tagging enough to let the system push temporary fleet rules before full human review?
    evidenceToGather: Run a shadow-mode pilot with one fleet that compares recommended actions, human overrides, and false-positive / false-negative outcomes.
  - priority: medium
    question: Which existing systems must the product plug into on day one to avoid becoming another dashboard?
    evidenceToGather: Interview 8-10 remote-ops leaders and document the telemetry, incident, teleop, and dispatch tools they already use.
  - priority: medium
    question: How much budget can a fleet justify for this layer as a standalone line item versus bundling it into broader ops software?
    evidenceToGather: Test willingness to pay against teams already using teleoperation or observability platforms, and anchor against saved operator minutes or avoided launch delays.
