  adoptionFrictionMatrix:
  - friction: Classifier errors on rare scenes can either create missed hazards or excessive pauses
    severity: high
    affectedBuyer: Safety engineering lead
    mitigation: Launch with conservative categories, shadow-mode evaluation, and explicit human review on the highest-risk scene types.
    sourceRefs:
    - 1
    - 7
    - 63
  - friction: Integrating with existing teleop, dispatch, and incident workflows is non-trivial
    severity: high
    affectedBuyer: Remote operations lead
    mitigation: Ship as a companion layer with APIs, alerts, and audit logs that plug into existing RobOps systems before replacing anything.
    sourceRefs:
    - 29
    - 30
    - 32
  - friction: Public-sidewalk accessibility scrutiny can halt or slow rollouts even when robots work technically
    severity: high
    affectedBuyer: Policy or operations buyer
    mitigation: Make exclusion zones, narrow-sidewalk rules, and evidence-rich incident review core product outputs rather than afterthoughts.
