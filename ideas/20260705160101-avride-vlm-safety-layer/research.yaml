openQuestions:
- What percentage of remote-assist minutes at the best ICP fleets is actually driven by semantic public-scene anomalies instead of lower-level autonomy failures?
- Which operators would permit automatic temporary geofence or behavior-rule propagation before a human confirms the scene tag?
- How often do city or campus video/privacy policies create procurement friction for low-frequency snapshot upload, even with local anonymization?
- Will on-device multimodal models erode the cloud-watcher window faster than workflow and data-network effects can compound?
