    - 48
    - 49
  - friction: Cloud snapshots and human fallback still depend on reliable connectivity and privacy handling
    severity: medium
    affectedBuyer: Head of autonomy or legal lead
    mitigation: Use local anonymization, low-frequency snapshot policies, and graceful degradation when network quality drops.
