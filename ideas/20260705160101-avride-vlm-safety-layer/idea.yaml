differentiator: >-
  Teleoperation software helps humans drive or recover a robot after something
  goes wrong, while generic fleet tools mostly report status after the fact.
  This product owns the missing middle layer: semantic incident detection,
  temporary fleet-wide policy updates, and evidence-rich escalation workflows
  built specifically for public-street autonomy. Its moat compounds through a
  cross-fleet dataset of rare scenes, recommended behaviors, and real outcomes
  that no single operator or OEM can observe at comparable breadth.
