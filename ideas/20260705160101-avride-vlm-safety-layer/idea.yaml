topRisks:
  - name: "Niche initial market"
    description: "If sidewalk robot deployments stay small or concentrated in a few operators, the beachhead could take longer to compound into a large software business."
    mitigation: "Win the category with live operators first, then expand the same product into campus shuttles, patrol robots, and other low-speed autonomy fleets."
  - name: "OEM absorption"
    description: "Robot OEMs may try to bundle their own semantic safety layer as onboard compute improves, compressing standalone software margin."
    mitigation: "Own the operator-side workflow layer, multi-fleet edge-case corpus, and fleet-wide policy analytics so the product stays valuable whether inference runs in the cloud or on-device."
  - name: "Safety liability"
    description: "A false negative on a high-stakes scene could create a public incident, while false positives could slow service enough to hurt ROI."
    mitigation: "Launch with conservative pause defaults, confidence thresholds, and human review for the highest-risk categories before automating more of the decision loop."
