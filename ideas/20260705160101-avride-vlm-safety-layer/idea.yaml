problem: >-
  Low-speed delivery robots handle mapped sidewalks reasonably well, but they
  still break on temporary, human-meaningful situations like police tape,
  ambulances, or sudden roadwork. Today those cases bounce to remote operators
  who manually inspect feeds, decide whether to pause or reroute, and then push
  instructions one robot at a time. As fleets scale, that semantic edge-case
  queue becomes both the safety bottleneck and the hidden labor cost that can
  cap expansion.
targetUser:
  primary: "Director of remote operations or autonomy operations at a sidewalk delivery robot operator running live public-street fleets."
  secondary: "Safety engineering lead responsible for intervention policy, incident review, and operator tooling."
  buyer: "VP operations, head of autonomy, or GM responsible for fleet safety and unit economics."
startupThesis:
  nonObviousInsight: >-
    The next failure mode in sidewalk robotics is not basic perception accuracy;
    it is organizational latency in responding to rare semantic disruptions that
    ordinary autonomy stacks do not understand. What changed is that cloud VLMs
    can now classify those scenes cheaply from anonymized snapshots every few
    seconds, making a shared incident-policy layer practical before onboard
    compute catches up.
  beachhead: >-
    Remote-operations teams at U.S. sidewalk delivery robot fleets already
    running 50-300 robots across one or two dense urban or campus markets, where
    roadwork, police activity, and temporary event closures trigger repeated
    manual escalations.
  wedge: >-
    A semantic incident-control plane that classifies unusual public-street
    scenes from low-frequency snapshots, opens a remote-assist ticket only when
    needed, and pushes temporary geofences and behavior rules to nearby robots.
  whyNowCatalyst: >-
    Avride's production use of cloud VLM watchers shows operators can already
    turn rare street anomalies into machine-readable safety events today, while
    the autonomy stack itself still lacks that semantic layer.
  ventureScalePath: >-
    Start with sidewalk delivery robots, then expand the same incident-control
    plane into campus shuttles, security patrol robots, curbside delivery
    vehicles, and other low-speed autonomy fleets that face temporary real-world
    scene disruptions in public spaces.
solution: >-
  Street Scene Escalation OS would ingest anonymized snapshots, robot pose, map
  context, and dispatch state from a live fleet, then classify unusual scenes
  into a narrow safety taxonomy such as emergency response, police activity,
  crowding, temporary closure, or roadwork. The product would recommend a safe
  action—pause, reroute, yield, or escalate to a human—and automatically push a
  temporary rule to nearby robots so one discovered disruption protects the
  whole fleet. It would route only the highest-confidence or highest-severity
  cases to remote operators with the relevant evidence prepackaged, reducing the
  number of humans staring at mostly normal video. Over time, the company would
  build the system of record for semantic safety events, their outcomes, and the
  policies that keep public-street robot fleets incident-free.
goToMarketSeed:
  firstCustomer: >-
    A U.S. sidewalk robot operator with 75-250 active robots in one metro, a
    staffed 24/7 remote-assist center, and weekly service disruptions from
    construction, campus events, or emergency-response activity.
  buyingTrigger: >-
    The fleet expands to continuous multi-neighborhood service and remote-assist
    minutes spike because roadwork, police tape, or pop-up events create more
    manual interventions than the existing team can absorb.
  currentAlternative: >-
    Manual workflow using teleoperators, fleet dashboards, Slack or radio
    dispatch, and hard-coded autonomy rules with no shared semantic incident
    memory.
  switchingReason: >-
    The first customer switches because the product turns one robot's discovery
    of a high-stakes street disruption into fleet-wide safety rules and a
    prioritized intervention queue, reducing both public-incident risk and
    remote-ops labor.
  pricingHypothesis: >-
    Annual SaaS priced per active robot or monitored robot-hour, with premium
    modules for insurer reporting, city-facing audit trails, and multi-fleet
    benchmarking.
