scenarios:
  downside:
    description: Semantic-anomaly share of remote-assist load proves smaller than claimed, new-fleet starts slow, pricing lands near the bottom of the stated ranges, and integration work keeps gross margin below target.
    y3RevenueK: 860.0
    y3EbitdaK: -2720.4
    cashLowPointK: -2577.6
    keyAssumptionChanges:
      - Customer count reaches only 7 by Q4Y3 instead of 10 (adds 1/0/1/1 in Y2, 1/0/1/1 in Y3) as pilot-to-production conversion slips.
      - Blended ARPU falls to $150K (Y2) / $160K (Y3) instead of $165K / $180K as buyers push toward the low end of the stated pricing range.
      - Gross margin caps at 58% (Y2) / 62% (Y3) instead of 63% / 70% because onboarding stays services-heavy.
  base:
    description: Base case follows the BP milestone sequence -- 2 paid pilots in Y1, 5 paying fleet accounts by Q4Y2 (mid of the stated 3-5 range), and 10 customers by Q4Y3 at the SOM's $180K mature ARPU, with gross margin reaching the 70% target in Y3.
    y3RevenueK: 1327.5
    y3EbitdaK: -2324.4
    cashLowPointK: -2087.5
    keyAssumptionChanges:
      - Blended ARPU steps from $120K (Y1, pilot-only) to $165K (Y2) to $180K (Y3) as pilots convert to production pricing.
      - Customer count grows 0/1/2/2 (Y1) then +1/+1/+0/+1 (Y2) then +1/+1/+2/+1 (Y3) to reach 10 by Q4Y3, matching the $1.8M Y3 SOM exactly at exit.
      - Hiring reaches 11 FTE by Q4Y2 and 15 FTE by Q4Y3, and the model requires a follow-on raise before Q1Y3 without new financing.
  upside:
    description: Design-partner references make the founder-led motion repeatable, adjacent-fleet expansion pulls forward, and pricing lands near the top of the stated production range as premium reporting modules attach.
    y3RevenueK: 1947.5
    y3EbitdaK: -1851.4
    cashLowPointK: -1465.3
    keyAssumptionChanges:
      - Customer count reaches 13 by Q4Y3 (vs. 10 base) as the adjacent-fleet pilot and a second metro pull additional accounts forward.
      - Blended ARPU rises to $175K (Y2) / $205K (Y3) as premium audit/insurer/benchmarking modules attach faster.
      - Gross margin reaches 65% (Y2) / 72% (Y3) as connectors and audit exports standardize ahead of plan.
sensitivity:
  - variable: ARPU
    downsideCase: "$160K mature (Y3) annual value per fleet account"
    baseCase: "$180K mature (Y3) annual value per fleet account"
    upsideCase: "$200K mature (Y3) annual value per fleet account"
    y3RevenueImpactK: -147.5
    cashImpactK: -137.5
  - variable: CAC
    downsideCase: "Founder-led motion slows; only 6 net new fleets sign in Y2-Y3 instead of 8, pushing effective CAC well above $300K"
    baseCase: "~$238.7K CAC on 8 net new fleets signed in Y2-Y3"
    upsideCase: "Design-partner referrals keep S&M spend flat while 10 net new fleets sign in Y2-Y3, pulling CAC toward $190K"
    y3RevenueImpactK: -405.0
    cashImpactK: -348.5
  - variable: churn
    downsideCase: "2.5%/month logo churn shortens average life to ~40 months, cutting LTV and requiring extra gross adds to hold the same net Y3 count"
    baseCase: "1.5%/month logo churn, 66.7-month average life"
    upsideCase: "1.0%/month logo churn on sticky safety-workflow accounts, extending average life toward 100 months"
    y3RevenueImpactK: -90.0
    cashImpactK: -85.0
  - variable: sales cycle
    downsideCase: Every Y2-Y3 fleet signing slips by one quarter as procurement and data/privacy review take longer.
    baseCase: Fleet signings land on the BP milestone cadence (3-5 by Q4Y2, 10 by Q4Y3).
    upsideCase: Reference deployments and standardized data-sharing agreements pull signings forward by about one quarter.
    y3RevenueImpactK: -225.0
    cashImpactK: -222.5
  - variable: gross margin
    downsideCase: Y3 gross margin tops out at 62% because integration and shadow-mode review work stays services-heavy.
    baseCase: Y3 gross margin reaches the BP's 70% target.
    upsideCase: Y3 gross margin reaches 74% as connectors, audit exports, and hybrid cloud-edge deployment standardize ahead of plan.
    y3RevenueImpactK: 0.0
    cashImpactK: -136.1
  - variable: hiring pace
    downsideCase: The Y2-Y3 hiring ramp (to 11 FTE by Q4Y2, 15 by Q4Y3) is pulled forward by one quarter ahead of revenue proof.
    baseCase: Hiring follows the interpolated ramp tied to production conversion and adjacent-fleet proof points.
    upsideCase: The final Y3 engineering and CS hires slip a quarter later until after the adjacent-fleet transfer pilot proves out.
    y3RevenueImpactK: 0.0
    cashImpactK: -220.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Pilots[Paid pilot fleet accounts] --> Production[Production fleet accounts]
      Production --> Expansion[Second metro / adjacent-fleet expansion]
      Expansion --> Revenue[Recognized revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash after opex]
modelSanity:
  - checkName: Revenue engine
    finding: Base-case revenue comes from growing 2 paying pilot fleets at the end of Y1 into 10 active fleet accounts by Q4Y3 at a mature ~$180K annual value per account, matching the research SOM exactly at exit.
  - checkName: Must go right
    finding: The first paid pilot must convert into a $150K-$220K production contract and prove the 30%+ remote-assist-minute reduction milestone so 3-5 more fleets sign in Y2 without a disproportionate rise in CAC.
  - checkName: Model breaks if
    finding: If new-fleet signings slow to the CAC-downside case, Y3 revenue falls by about $405K and the cash trough deepens by roughly $349K, forcing the follow-on raise to happen earlier than planned.
  - checkName: Next-round proof
    finding: The seed pitch is strongest once the company converts the first pilot to production, signs 3-5 paying fleets, ships the manual-approval audit workflow, and completes one adjacent-fleet transfer pilot -- the BP's 12-24 month milestone this raise is sized to reach.
sanityChecks:
  ruleOf40: "Y3 revenue growth 121.9% + EBITDA margin -175.1% = -53.2% (deeply negative because the company is still in early fleet-acquisition mode against a small SAM, not a rule-of-40 comparison case yet)."
  burnMultiple: "Y3 burn multiple ~3.2x ($2,324.4K burn / $729.4K net new revenue), reflecting opex still well ahead of the small $9.0M SAM's revenue potential."
  revenuePerFte: "~$88.5K Y3 on 15 year-end FTE, well below the typical $200K-$400K SaaS benchmark -- expected at this stage given the narrow beachhead, but a real efficiency risk if adjacent-fleet expansion stalls."
  flags:
    - "The model requires a follow-on seed round before month ~22 (Q1Y3), since cumulative burn pushes cash negative without new financing; the buffer beyond the stated 18-month runway is thinner than a full 6 months."
    - "Revenue per FTE (~$88.5K Y3) and burn multiple (~3.2x) are both weak versus typical SaaS benchmarks, consistent with the business plan's own 'Watch, not yet a clear venture-scale winner' investor verdict."
    - "Customer counts are single-digit through Y2 and only reach 10 by Y3, so each delayed or lost fleet logo swings revenue and cash materially -- the churn, CAC, and payback figures are illustrative at this N, not statistically robust."
    - "CAC payback (~22.7 months) and LTV/CAC (~2.9x) sit below typical enterprise SaaS health thresholds (12-18 months payback, 3x+ LTV/CAC), echoing the research report's own diligence gap about willingness to pay full production pricing."
    - "Gross margin ramping from 55% to the BP's 70% target is largely an assumption; if paid pilots stay services-heavy longer than modeled, EBITDA and cash would land materially worse than the base case (see gross margin sensitivity)."
