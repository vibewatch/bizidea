slug: street-scene-escalation-os
date: "2026-07-05"
currency: USD
modelStartMonth: 2026-08
assumptions:
  - id: A1
    name: Model start month
    value: 2026-08
    unit: YYYY-MM
    source: "[BP date 2026-07-05] model starts the month after the business-plan date."
  - id: A2
    name: Opening cash at M1 (pre-seed raise)
    value: "$3.0M"
    unit: USD
    source: "[BP fundingAsk targetFundingRangeUsd $2-4M + runwayMonths 18] uses a mid-to-upper pre-seed check sized against the modeled 18-24 month burn schedule, deployed in full at model start."
  - id: A3
    name: Starting active paying fleet accounts
    value: "0"
    unit: count
    source: "[BP executiveSummary + milestones 0-12 months] the company is pre-revenue at model start and must first land design partners."
  - id: A4
    name: Active customer definition
    value: One paying sidewalk-fleet operator account in paid pilot or production monitoring, tracked as customersEop
    unit: definition
    source: "[BP businessModel.unitOfValue 'Active robot in a monitored service area', aggregated to the fleet-account level because pricing and milestones are stated per operator account]"
  - id: A5
    name: Y1 paid-pilot contract values
    value: Pilot 1 signs M4 at ~$120K annualized run-rate ($10K/mo); pilot 2 signs M8 at the same run-rate, giving 2 active pilots by Q4Y1
    unit: USD/customer/year
    source: "[BP investorMemo.firstCustomer.initialContract '$40k-$75k for one metro' pilot pricing, expressed as an annualized run-rate for a 3-6 month paid pilot] + [BP milestones 0-12mo 'close one paid pilot... land two design partners']"
  - id: A6
    name: Blended ARPU ramp
    value: Y1 $120K/yr (pilot-rate only); Y2 $165K/yr (mix of pilot and early production accounts); Y3 $180K/yr (mature production rate)
    unit: USD/customer/year
    source: "[BP investorMemo.firstCustomer.initialContract '$150k-$220k ARR' production range + Research market.som '10 customers at about $180k ARR each'] Y3 mature ARPU is set at the SOM's stated per-customer ARR."
  - id: A7
    name: Customer count cadence
    value: Y1 ends at 2 pilots; Y2 adds 1/1/0/1 per quarter to end at 5; Y3 adds 1/1/2/1 per quarter to end at 10
    unit: count
    source: "[BP milestones 12-24mo 'reach three to five paying customers' + 24-36mo 'reach 10 customers and roughly $1.8M ARR'] + [BP gtm.funnelTargets 50%+ pilot-to-production conversion]"
  - id: A8
    name: Y3 exit ARR reconciles to SOM
    value: 10 customers x $180K = $1.8M exit ARR
    unit: USD
    source: "[Research market.som '$1.8M year-3 SOM based on 10 customers at about $180k ARR each'] used directly as the Q4Y3 exit run-rate check; full-year Y3 recognized revenue ($1,327.5K) is lower because customers ramp in during the year."
  - id: A9
    name: Gross margin ramp
    value: Y1 55%; Y2 63%; Y3 70%
    unit: pct of revenue
    source: "[BP businessModel.targetGrossMarginPct 70] Y1-Y2 run below target because paid pilots are integration- and shadow-mode-review heavy; Y3 reaches the stated target as connectors and audit workflows standardize per BP sequencingRationale."
  - id: A10
    name: Monthly active-account churn (for LTV only)
    value: 1.5%/month
    unit: pct/month
    source: "[startup-finance heuristic for concentrated enterprise-safety accounts] used only to derive average customer life for unit economics; the discrete Y1-Y3 customer counts above do not model fractional logo loss because the base is single-digit through Y2."
  - id: A11
    name: Founder/CEO loaded compensation
    value: "$180K/year"
    unit: USD/year
    source: "[BP team Founder/CEO, Month 0 start] modest founder cash pay plus payroll taxes and benefits, consistent with pre-seed-stage founder comp heuristics."
  - id: A12
    name: Engineering loaded compensation
    value: "$205K/year"
    unit: USD/year
    source: "[BP team Founding eng, Month 0 start] senior platform/data engineering talent with payroll load."
  - id: A13
    name: Safety/ML lead loaded compensation
    value: "$210K/year"
    unit: USD/year
    source: "[BP team Safety/ML lead, Month 1 start] specialized VLM/taxonomy and evaluation-harness talent, priced slightly above general engineering given scarcity."
  - id: A14
    name: Forward deployed integration engineer loaded compensation
    value: "$190K/year"
    unit: USD/year
    source: "[BP team Forward deployed integration engineer, Month 6 start] customer-facing deployment engineering into heterogeneous RobOps/telemetry stacks."
  - id: A15
    name: Customer success & safety ops loaded compensation
    value: "$150K/year"
    unit: USD/year
    source: "[BP team Customer success and safety ops, Month 9 start] labeling QA, weekly intervention reviews, and city/insurer reporting support."
  - id: A16
    name: Sales/partnerships loaded compensation
    value: "$220K/year"
    unit: USD/year
    source: "[BP gtm.channels founder-led + integration-led distribution + Research competitor set being enterprise/custom-priced] OTE-equivalent for the first dedicated seller/partnerships hire added in Y2 once founder-led sales needs support."
  - id: A17
    name: Hiring timeline
    value: "M1 Founder/CEO + Founding eng; M2 Safety/ML lead; M6 Forward deployed integration engineer; M9 Customer success/safety ops; M10 second engineer; Y2 adds a second Safety/ML hire, a second forward-deployed engineer, a second CS hire, and the first Sales/Partnerships hire (smooth ramp to Q4Y2); Y3 adds a third engineer, a third Safety/ML hire, a third CS hire, and a second Sales/Partnerships hire (smooth ramp to Q4Y3)"
    unit: timeline
    source: "[BP team startTiming for the first five roles] extended into Y2-Y3 using [BP milestones 12-24mo/24-36mo] which require production support, adjacent-fleet transfer, and a 10-customer book that the Month-0-9 team alone cannot service."
  - id: A18
    name: Payroll allocation to P&L lines
    value: Founder/CEO 60% S&M / 40% G&A; Engineering 100% R&D; Safety/ML 100% R&D; Forward deployed integration engineer 50% S&M / 50% R&D; Customer success & safety ops 70% S&M / 30% G&A; Sales/Partnerships 100% S&M
    unit: allocation
    source: "[BP team rationales + BP operations] maps each role's actual day-to-day work (founder-led sales vs. taxonomy/engine build vs. customer deployment vs. weekly safety review) into the operating lines used in the P&L."
  - id: A19
    name: Non-payroll sales & marketing spend
    value: "$3K/mo M1-6, $6K/mo M7-12, then $14K/mo Y2, $20K/mo Y3"
    unit: USD/month
    source: "[BP gtm.channels 'Founder-led direct sales' + design-partner entry + integration-led distribution] heuristic for pilot-site travel, conference/robotics-event presence, and partner enablement rather than paid demand generation."
  - id: A20
    name: Non-payroll R&D spend
    value: "$6K/mo M1-6, $10K/mo M7-12, then $16K/mo Y2, $22K/mo Y3"
    unit: USD/month
    source: "[BP product MVP 'ingests anonymized snapshots... classifies scenes' + Research VLM/cloud-inference workflow] heuristic for cloud/GPU inference, shadow-mode evaluation compute, and data/labeling tooling that scales with active fleets."
  - id: A21
    name: Non-payroll G&A spend
    value: "$4K/mo M1-6, $6K/mo M7-12, then $9K/mo Y2, $12K/mo Y3"
    unit: USD/month
    source: "[BP operations 'Local anonymization, retention, and privacy controls' + accessibility/insurer reporting obligations] heuristic for legal, insurance, and privacy/compliance counsel tied to city and insurer review requirements."
  - id: A22
    name: Y2/Y3 headcount interpolation convention
    value: Fractional per-role FTE is interpolated linearly each quarter between the Q4Y1, Q4Y2, and Q4Y3 snapshots
    unit: modeling convention
    source: "[Schema headcount column convention] avoids sharp step-changes in the salary line since no single BP-stated hire date exists for every Y2-Y3 role; produces a smooth payroll ramp from $1,140K (Q4Y1) to $2,115K (Q4Y2) to $2,900K (Q4Y3) annualized."
  - id: A23
    name: Cash conversion convention
    value: Cash movement equals EBITDA
    unit: modeling convention
    source: "[startup-finance heuristic] assumes capex, debt service, taxes, and working-capital swings are immaterial at pre-seed/early-seed scale for a software-and-integration business."
  - id: A24
    name: CAC calculation convention
    value: "$238.7K = (Y2+Y3 sales & marketing spend of $1,909.5K) / 8 net new customers added in Y2-Y3"
    unit: USD/new customer
    source: "[BP gtm.funnelTargets '20 target ICP accounts per year to 6-8 qualified evaluations, 2-3 paid pilots'] a narrow, founder-led enterprise motion against a 45-fleet SAM implies a high dollar cost per closed logo relative to ARPU."
  - id: A25
    name: LTV calculation convention
    value: LTV = mature ARPU x mature gross margin x (avg customer life months / 12)
    unit: modeling convention
    source: "[standard SaaS unit-economics heuristic] applied using the Y3 mature ARPU ($180K) and Y3 gross margin (70%) with the 1.5%/month churn heuristic (A10), giving a 66.7-month average life."
  - id: A26
    name: Revenue reconciliation convention
    value: Monthly/quarterly revenueK = customersEop (or intra-period average customer count) x blended ARPU / 12 (or /4 for quarters)
    unit: modeling convention
    source: "[Task constraint: P&L revenue must reconcile to customers x ARPU] uses the average of period-start and period-end customer counts within each Y2/Y3 quarter to avoid overstating revenue from accounts signed at the end of the period."
  - id: A27
    name: Funding ask sizing
    value: "$3.0M pre-seed, sized against the modeled 18-24 month burn schedule"
    unit: USD
    source: "[BP fundingAsk targetFundingRangeUsd $2-4M + runwayMonths 18 + BP milestones 12-24mo] funds cumulative Y1-Y2 burn of about $2,763K through the month-24 milestone (3-5 paying customers, first pilot converted to production), leaving roughly one quarter of buffer before a follow-on seed round must close."
  - id: A28
    name: Category growth context
    value: 22.99% CAGR proxy category growth (2026-2035)
    unit: pct CAGR
    source: "[Research categoryDynamics.growthRate '22.99% CAGR (proxy: autonomous last-mile delivery market, 2026-2035)'] used only as directional context for the rule-of-40 sanity check, not as a direct revenue driver given the much narrower $9.0M SAM."
