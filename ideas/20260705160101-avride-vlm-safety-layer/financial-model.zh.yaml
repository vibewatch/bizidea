modelSanity:
- checkName: 收入引擎
  finding: 基准情景的收入，来自把第 1 年末的 2 个付费试点车队，扩大到第 3 年第 4 季度的 10 个活跃车队账户，成熟期每账户年值约 $180K，期末数字与研究里的 SOM 完全吻合。
- checkName: 必须跑通的事
  finding: 第一个付费试点必须转化为 $150K-$220K 的生产合同，并证明远程协助分钟数下降 30% 以上的里程碑，这样第 2 年才能再签下 3-5 支车队，而 CAC 不会不成比例地上升。
- checkName: 模型失效条件
  finding: 如果新车队签约速度放缓到 CAC 下行情景，第 3 年收入会减少约 $405K，现金低点还会再深约 $349K，迫使下一轮融资比计划提前。
- checkName: 下一轮融资证明
  finding: 一旦公司把第一个试点转为生产环境、签下 3-5 支付费车队、上线人工审批的审计工作流，并完成一次相邻车队迁移试点——也就是这轮融资对应要达到的 BP 12-24 个月里程碑——种子轮的说服力就会最强。
sanityChecks:
  ruleOf40: "第 3 年收入增速 121.9% + EBITDA 利润率 -175.1% = -53.2%（深度为负，因为公司仍处于针对一个小 SAM 的早期获客阶段，还谈不上用 rule-of-40 来对标）。"
  burnMultiple: "第 3 年烧钱倍数约 3.2 倍（烧钱 $2,324.4K / 净新增收入 $729.4K），反映出运营支出仍明显跑在 $9.0M 这个小 SAM 的收入潜力前面。"
  revenuePerFte: "第 3 年年末 15 个 FTE 对应人均收入约 $88.5K，明显低于典型 SaaS $200K-$400K 的基准——考虑到滩头市场狭窄，这在当前阶段是预期之内的，但如果相邻车队扩展停滞，就是一个真实的效率风险。"
  flags:
  - "模型要求在第 22 个月左右（第 3 年第 1 季度）之前完成新一轮种子融资，因为若无新融资，累计烧钱会让现金转负；超出既定 18 个月现金跑道的缓冲，其实不到完整的 6 个月。"
  - "第 3 年人均收入（约 $88.5K）和烧钱倍数（约 3.2 倍），相对典型 SaaS 基准都偏弱，这与商业计划自己给出的“观察，尚非明确的规模化赢家”投资判断是一致的。"
  - "客户数在第 2 年结束前一直是个位数，第 3 年也只到 10 个，所以每延迟或流失一个车队客户，都会对收入和现金造成实质性摆动——在这样的样本量下，流失率、CAC 和回本周期这些数字只是示意性的，谈不上统计意义上的稳健。"
  - "CAC 回本周期（约 22.7 个月）和 LTV/CAC（约 2.9 倍），都低于典型企业级 SaaS 的健康阈值（回本 12-18 个月，LTV/CAC 3 倍以上），这也呼应了研究报告自己提出的尽调缺口——买家是否愿意支付完整的生产级定价。"
  - "毛利率从 55% 爬升到 BP 设定的 70% 目标，在很大程度上仍是一项假设；如果付费试点比模型设想的更长时间保持服务重投入，EBITDA 和现金的实际表现会明显差于基准情景（参见毛利率敏感性分析）。"
