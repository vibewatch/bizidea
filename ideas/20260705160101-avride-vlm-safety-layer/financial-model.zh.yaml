scenarios:
  downside:
    description: 语义类异常占远程协助负荷的比例，被证明比宣称的要小；新车队起步缓慢；定价落在既定区间的低端；集成工作也让毛利率一直低于目标。
    y3RevenueK: 860.0
    y3EbitdaK: -2720.4
    cashLowPointK: -2577.6
    keyAssumptionChanges:
    - 客户数到第 3 年第 4 季度只到 7 个，而不是 10 个（第 2 年新增 1/0/1/1，第 3 年新增 1/0/1/1），因为试点转生产环境的进度放缓。
    - 混合 ARPU 降至第 2 年 $150K / 第 3 年 $160K，而不是 $165K / $180K，因为买家把价格压向既定区间的低端。
    - 毛利率封顶在第 2 年 58% / 第 3 年 62%，而不是 63% / 70%，因为上线过程一直偏重服务投入。
  base:
    description: 基准情景遵循 BP 的里程碑顺序——第 1 年 2 个付费试点，第 2 年第 4 季度达到 5 个付费车队账户（落在既定 3-5 区间中段），第 3 年第 4 季度按 SOM 的成熟 ARPU $180K 达到 10 个客户，毛利率在第 3 年达到 70% 的目标。
    y3RevenueK: 1327.5
    y3EbitdaK: -2324.4
    cashLowPointK: -2087.5
    keyAssumptionChanges:
    - 混合 ARPU 从第 1 年（仅试点价）的 $120K，爬升到第 2 年的 $165K，再到第 3 年的 $180K，对应试点转向生产定价。
    - 客户数第 1 年按 0/1/2/2 增长，第 2 年新增 +1/+1/+0/+1，第 3 年新增 +1/+1/+2/+1，到第 3 年第 4 季度达到 10 个，期末恰好对上第 3 年 $1.8M 的 SOM。
    - 招聘规模到第 2 年第 4 季度达到 11 个 FTE，第 3 年第 4 季度达到 15 个 FTE；若无新融资，模型要求在第 3 年第 1 季度之前完成新一轮融资。
  upside:
    description: 共创客户的案例让创始人主导的销售动作可复制，相邻车队的扩展提前发生，随着高级报告模块的搭售，定价也落在既定生产价区间的高端。
    y3RevenueK: 1947.5
    y3EbitdaK: -1851.4
    cashLowPointK: -1465.3
    keyAssumptionChanges:
    - 客户数到第 3 年第 4 季度达到 13 个（基准情景为 10 个），因为相邻车队试点和第二个都市圈提前拉来了更多账户。
    - 混合 ARPU 上升到第 2 年 $175K / 第 3 年 $205K，因为高级审计/保险/对标模块的搭售速度更快。
    - 毛利率达到第 2 年 65% / 第 3 年 72%，因为连接器和审计导出功能比计划提前实现标准化。
