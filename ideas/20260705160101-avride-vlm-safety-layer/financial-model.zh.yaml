slug: street-scene-escalation-os
date: "2026-07-05"
currency: USD
modelStartMonth: 2026-08
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-08
  unit: YYYY-MM
  source: "[BP date 2026-07-05] 模型起始月定为商业计划日期之后的下一个月。"
- id: A2
  name: 第 1 个月期初现金（种子前期融资）
  value: "$3.0M"
  unit: USD
  source: "[BP fundingAsk targetFundingRangeUsd $2-4M + runwayMonths 18] 按 $2-4M 区间偏中高段的种子前期融资额建模，对应 18-24 个月的烧钱节奏，在模型起点一次性到账。"
- id: A3
  name: 期初活跃付费车队账户数
  value: "0"
  unit: count
  source: "[BP executiveSummary + milestones 0-12 months] 公司在模型起点尚无收入，必须先拿下共创客户。"
- id: A4
  name: 活跃客户定义
  value: 一个处于付费试点或生产监测阶段的付费人行道车队运营商账户，记为 customersEop
  unit: definition
  source: "[BP businessModel.unitOfValue“监测服务区内的一台在线机器人”，因定价和里程碑均按运营商账户表述，这里汇总到车队账户层级]"
- id: A5
  name: 第 1 年付费试点合同价值
  value: 试点 1 于第 4 个月签约，年化运行率约 $120K（每月 $10K）；试点 2 于第 8 个月以同样运行率签约，到第 1 年第 4 季度共有 2 个活跃试点
  unit: USD/customer/year
  source: "[BP investorMemo.firstCustomer.initialContract“单一都市圈 $40k-$75k”的试点定价，换算成 3-6 个月付费试点的年化运行率] + [BP milestones 0-12mo“拿下一个付费试点……拿下两个共创客户”]"
- id: A6
  name: 混合 ARPU 爬坡路径
  value: 第 1 年 $120K/年（仅试点价）；第 2 年 $165K/年（试点与早期生产账户混合）；第 3 年 $180K/年（成熟生产价）
  unit: USD/customer/year
  source: "[BP investorMemo.firstCustomer.initialContract“$150k-$220k ARR”生产价区间 + Research market.som“10 个客户、每个约 $180k ARR”] 第 3 年的成熟 ARPU，直接取 SOM 里给出的单客户 ARR。"
- id: A7
  name: 客户数增长节奏
  value: 第 1 年末为 2 个试点；第 2 年每季度新增 1/1/0/1，年末达到 5 个；第 3 年每季度新增 1/1/2/1，年末达到 10 个
  unit: count
  source: "[BP milestones 12-24mo“达到三到五个付费客户”+ 24-36mo“达到 10 个客户，ARR 约 $1.8M”] + [BP gtm.funnelTargets 试点转生产环境转化率 50% 以上]"
- id: A8
  name: 第 3 年期末 ARR 与 SOM 对齐
  value: 10 个客户 × $180K = $1.8M 期末 ARR
  unit: USD
  source: "[Research market.som“第 3 年 SOM 约 $1.8M，基于 10 个客户、每个约 $180k ARR”] 直接作为第 3 年第 4 季度期末运行率的校验值；第 3 年全年确认收入（$1,327.5K）更低，是因为客户是在年内逐步上线的。"
- id: A9
  name: 毛利率爬坡路径
  value: 第 1 年 55%；第 2 年 63%；第 3 年 70%
  unit: pct of revenue
  source: "[BP businessModel.targetGrossMarginPct 70] 第 1-2 年低于目标值，因为付费试点集成和影子模式复核工作量大；第 3 年随连接器和审计工作流按 BP sequencingRationale 标准化，达到既定目标。"
- id: A10
  name: 月度活跃账户流失率（仅用于 LTV 测算）
  value: 1.5%/month
  unit: pct/month
  source: "[针对集中型企业安全账户的创业财务经验值] 仅用于推导单位经济模型里的平均客户生命周期；上文第 1-3 年的离散客户数并未建模零星流失，因为第 2 年前的基数仍是个位数。"
- id: A11
  name: 创始人/CEO 综合薪酬
  value: "$180K/year"
  unit: USD/year
  source: "[BP team 创始人/CEO，第 0 个月起] 适度的创始人现金薪酬，加上薪资税和福利，符合种子前期阶段创始人薪酬的经验区间。"
- id: A12
  name: 工程综合薪酬
  value: "$205K/year"
  unit: USD/year
  source: "[BP team 创始工程师，第 0 个月起] 资深平台/数据工程人才，含薪资负担。"
- id: A13
  name: 安全/机器学习负责人综合薪酬
  value: "$210K/year"
  unit: USD/year
  source: "[BP team 安全/机器学习负责人，第 1 个月起] 专精 VLM/分类体系和评估框架的人才，因稀缺性定价略高于普通工程岗位。"
- id: A14
  name: 前线部署集成工程师综合薪酬
  value: "$190K/year"
  unit: USD/year
  source: "[BP team 前线部署集成工程师，第 6 个月起] 面向客户、负责在异构 RobOps/遥测技术栈中做部署工程。"
- id: A15
  name: 客户成功与安全运营综合薪酬
  value: "$150K/year"
  unit: USD/year
  source: "[BP team 客户成功与安全运营，第 9 个月起] 负责标注质检、每周干预复盘，以及城市/保险公司报告支持。"
- id: A16
  name: 销售/合作伙伴综合薪酬
  value: "$220K/year"
  unit: USD/year
  source: "[BP gtm.channels 创始人主导 + 集成式分发 + Research 竞品集普遍走企业定制定价] 对应第 2 年创始人主导销售需要支援时，招入的第一位专职销售/合作伙伴的 OTE 等值薪酬。"
- id: A17
  name: 招聘时间线
  value: 第 1 个月：创始人/CEO + 创始工程师；第 2 个月：安全/机器学习负责人；第 6 个月：前线部署集成工程师；第 9 个月：客户成功/安全运营；第 10 个月：第二名工程师；第 2 年新增第二名安全/机器学习人员、第二名前线部署工程师、第二名客户成功人员，以及第一名销售/合作伙伴（平滑爬坡至第 2 年第 4 季度）；第 3 年新增第三名工程师、第三名安全/机器学习人员、第三名客户成功人员，以及第二名销售/合作伙伴（平滑爬坡至第 3 年第 4 季度）
  unit: timeline
  source: "[BP team 前五个岗位的 startTiming] 结合 [BP milestones 12-24mo/24-36mo] 延展到第 2-3 年，因为生产支持、相邻车队迁移和 10 个客户的服务量，光靠第 0-9 个月组建的团队撑不住。"
- id: A18
  name: 薪酬在损益表科目间的分摊
  value: 创始人/CEO 60% 销售与市场 / 40% 管理费用；工程 100% 研发；安全/机器学习 100% 研发；前线部署集成工程师 50% 销售与市场 / 50% 研发；客户成功与安全运营 70% 销售与市场 / 30% 管理费用；销售/合作伙伴 100% 销售与市场
  unit: allocation
  source: "[BP team rationales + BP operations] 把每个岗位实际的日常工作（创始人主导销售、分类体系/引擎搭建、客户部署、每周安全复盘）对应到损益表使用的运营科目上。"
- id: A19
  name: 非薪酬类销售与市场支出
  value: "第 1-6 个月 $3K/mo，第 7-12 个月 $6K/mo；第 2 年 $14K/mo，第 3 年 $20K/mo"
  unit: USD/month
  source: "[BP gtm.channels“创始人主导直接销售”+ 共创客户切入 + 集成式分发] 经验估算涵盖试点现场差旅、参加机器人行业会展，以及合作伙伴赋能，而非付费需求生成。"
- id: A20
  name: 非薪酬类研发支出
  value: "第 1-6 个月 $6K/mo，第 7-12 个月 $10K/mo；第 2 年 $16K/mo，第 3 年 $22K/mo"
  unit: USD/month
  source: "[BP product MVP“接入匿名快照……给场景分类” + Research 中的 VLM/云端推理工作流] 经验估算涵盖云端/GPU 推理、影子模式评估算力，以及随在线车队规模扩大的数据/标注工具支出。"
- id: A21
  name: 非薪酬类管理费用支出
  value: "第 1-6 个月 $4K/mo，第 7-12 个月 $6K/mo；第 2 年 $9K/mo，第 3 年 $12K/mo"
  unit: USD/month
  source: "[BP operations“本地匿名化、保留期和隐私控制” + 无障碍/保险公司报告义务] 经验估算涵盖与城市和保险公司审查要求挂钩的法律、保险及隐私/合规顾问费用。"
- id: A22
  name: 第 2-3 年人力插值规则
  value: 各岗位的小数 FTE，在第 1 年第 4 季度、第 2 年第 4 季度、第 3 年第 4 季度这几个快照点之间按季度线性插值
  unit: modeling convention
  source: "[Schema headcount 列规则] 避免薪酬科目出现陡峭跳变，因为并非每个第 2-3 年岗位都有 BP 明确给出的入职日期；由此得到从 $1,140K（第 1 年第 4 季度）到 $2,115K（第 2 年第 4 季度）再到 $2,900K（第 3 年第 4 季度）的平滑年化薪酬爬坡。"
- id: A23
  name: 现金转化规则
  value: 现金变动等于 EBITDA
  unit: modeling convention
  source: "[创业财务经验值] 假设在种子前期/早期种子规模下，对一家软件加集成业务而言，资本支出、债务偿付、税费和营运资金波动都可忽略不计。"
- id: A24
  name: CAC 计算规则
  value: "$238.7K = （第 2+3 年销售与市场支出 $1,909.5K）/ 第 2-3 年净新增 8 个客户"
  unit: USD/new customer
  source: "[BP gtm.funnelTargets“每年锁定 20 个目标 ICP 账户，转化出 6-8 个合格评估、2-3 个付费试点”] 面对只有 45 支车队的 SAM，这种狭窄的创始人主导型企业销售，意味着相对 ARPU 而言，每拿下一个客户的单价成本会偏高。"
- id: A25
  name: LTV 计算规则
  value: LTV = 成熟期 ARPU × 成熟期毛利率 ×（平均客户生命周期月数 / 12）
  unit: modeling convention
  source: "[标准 SaaS 单位经济模型经验值] 使用第 3 年成熟期 ARPU（$180K）和第 3 年毛利率（70%），配合 A10 中 1.5%/月的流失率经验值，得到 66.7 个月的平均生命周期。"
- id: A26
  name: 收入核对规则
  value: 月度/季度 revenueK = customersEop（或期间内平均客户数）× 混合 ARPU / 12（季度则除以 4）
  unit: modeling convention
  source: "[任务约束：损益表收入必须与客户数 × ARPU 核对一致] 在第 2/3 年的每个季度内，取期初和期末客户数的平均值，避免因期末才签约的客户而高估收入。"
- id: A27
  name: 融资额测算
  value: "$3.0M 种子前期融资，按建模的 18-24 个月烧钱节奏测算"
  unit: USD
  source: "[BP fundingAsk targetFundingRangeUsd $2-4M + runwayMonths 18 + BP milestones 12-24mo] 覆盖第 1-2 年累计约 $2,763K 的烧钱额，支撑到第 24 个月的里程碑（3-5 个付费客户，第一个试点转为生产环境），留出大约一个季度的缓冲，之后就必须完成新一轮种子融资交割。"
- id: A28
  name: 品类增长背景
  value: "22.99% CAGR 品类增长代理指标（2026-2035）"
  unit: pct CAGR
  source: "[Research categoryDynamics.growthRate“22.99% CAGR（代理指标：自主末端配送市场，2026-2035）”] 仅作为 rule-of-40 合理性检验的方向性背景，并非直接的收入驱动因素，因为实际 SAM 只有 $9.0M，窄得多。"
