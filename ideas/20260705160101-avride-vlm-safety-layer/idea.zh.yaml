problem: >-
  低速配送机器人应付已建图的人行道还算过得去，但一遇到警戒线、救护车、突发施工这类临时
  性、需要人类理解的情况就容易翻车。眼下这些情况全靠远程操作员人工看画面、判断该暂停还
  是绕行，再一台一台推送指令。车队规模一大，这条语义边缘案例队列就成了安全瓶颈，也成了
  压住扩张速度的隐性人力成本。
targetUser:
  primary: "运营着真实上路车队的人行道配送机器人公司里，负责远程运营或自主系统运营的总监。"
  secondary: "负责干预策略、事故复盘和操作员工具的安全工程负责人。"
  buyer: "对车队安全和单位经济模型负责的运营副总裁、自主系统负责人或总经理。"
startupThesis:
  nonObviousInsight: >-
    人行道机器人下一个失效点，不在基础感知准不准，而在组织对罕见语义干扰的反应有多慢——
    这类干扰恰恰是普通自主系统看不懂的。真正变了的是：云端 VLM 现在能用每隔几秒一张的匿
    名快照就便宜地把这些场景分好类，让一套共享的事件策略层能在车载算力追上来之前就先落地。
  beachhead: >-
    美国人行道配送机器人车队的远程运营团队，车队规模已在 50-300 台、覆盖一到两个人口密
    集的城区或校园市场，施工、警务活动和临时活动封路在这些地方反复触发人工升级。
  wedge: >-
    一套语义事件控制平面：靠低频快照给异常的公共街景分类，只有真正需要时才开远程协助工
    单，并把临时地理围栏和行为规则推送给附近机器人。
  whyNowCatalyst: >-
    Avride 已经在生产环境里用上云端 VLM 监测系统，这说明运营商现在就能把罕见街景异常变
    成机器可读的安全事件，而自主系统本身仍缺这层语义能力。
  ventureScalePath: >-
    从人行道配送机器人切入，再把同一套事件控制平面扩展到校园摆渡车、安保巡逻机器人、路
    边配送车等其他在公共空间会遇到临时场景干扰的低速自主车队。
solution: >-
  Street Scene Escalation OS 会接入真实车队的匿名快照、机器人姿态、地图上下文和调度状
  态，把异常场景归入一套精简的安全分类——应急响应、警务活动、人群聚集、临时封闭或施工。
  产品会给出安全动作建议——暂停、绕行、避让，或升级给人工——并自动把临时规则推送给附
  近机器人，让一次发现的干扰就能护住整个车队。它只把置信度最高或严重程度最高的案例连同
  打包好的证据交给远程操作员，减少人工盯着大多正常画面的工作量。假以时日，公司会把语义
  安全事件、处理结果，以及维持人行道机器人车队零事故运行的各项策略，都沉淀成一套系统记录。
goToMarketSeed:
  firstCustomer: >-
    一家美国人行道机器人运营商，在单一都市圈运营 75-250 台在线机器人，配有 24/7 值守的
    远程协助中心，每周都会因施工、校园活动或应急响应遇到服务中断。
  buyingTrigger: >-
    车队扩展到多个社区连续运营后，施工、警戒线或临时活动带来的人工干预量超出现有团队承
    受能力，远程协助分钟数随之飙升。
  currentAlternative: >-
    靠遥操作员、车队仪表盘、Slack 或对讲机调度，加上写死的自主规则手工处理，没有共享的
    语义事件记忆。
  switchingReason: >-
    第一个客户愿意换产品，是因为它能把一台机器人发现的高风险街景干扰，直接变成全车队的
    安全规则和分优先级的干预队列，同时压低公共事故风险和远程运营的人力成本。
  pricingHypothesis: >-
    按在线机器人数或监测机器人时长计费的年度 SaaS，另设保险报告、面向城市的审计记录、
    多车队对标等高级模块。
