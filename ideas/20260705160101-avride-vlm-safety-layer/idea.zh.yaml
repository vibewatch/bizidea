topRisks:
- name: "初始市场太小众"
  description: "如果人行道机器人的部署规模一直不大，或集中在少数几家运营商手里，滩头市场可能要花更久才能滚成一门大生意。"
  mitigation: "先在真实运营商那里拿下这个品类，再把同一套产品扩展到校园摆渡车、巡逻机器人和其他低速自主车队。"
- name: "被 OEM 吸纳"
  description: "随着车载算力提升，机器人 OEM 可能会把自己的语义安全层打包进产品，压缩独立软件的利润空间。"
  mitigation: "牢牢守住运营商侧的工作流层、跨车队边缘案例语料库和车队级策略分析，让推理无论是跑在云端还是设备端，产品都不可替代。"
- name: "安全责任风险"
  description: "一次高风险场景的漏判可能酿成公共事故，而误报太多又会拖慢服务，伤及 ROI。"
  mitigation: "上线时先用保守的暂停默认值、置信度阈值，并对风险最高的类别保留人工复核，之后再逐步扩大自动化范围。"
