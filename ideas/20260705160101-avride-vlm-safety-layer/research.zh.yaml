    sourceRefs:
    - 18
    - 51
  adoptionFrictionMatrix:
  - friction: 罕见场景的分类错误，要么会漏掉风险，要么会导致过度暂停
    severity: high
    affectedBuyer: 安全工程负责人
    mitigation: 上线时先用保守的分类、影子模式评估，并对风险最高的场景类型保留明确的人工复核。
    sourceRefs:
    - 1
    - 7
    - 63
  - friction: 与现有的遥操作、调度和事件工作流集成并不简单
    severity: high
    affectedBuyer: 远程运营负责人
    mitigation: 先以带 API、告警和审计日志的配套层形式接入现有 RobOps 系统，而不是一上来就替换它们。
    sourceRefs:
    - 29
    - 30
    - 32
  - friction: 即便机器人技术上运转正常，公共人行道的无障碍审查也可能叫停或拖慢上线
    severity: high
    affectedBuyer: 政策或运营方买家
    mitigation: 把排除区域、狭窄人行道规则和证据齐全的事故复盘，做成核心产品输出，而不是事后补丁。
    sourceRefs:
    - 41
    - 46
    - 48
    - 49
  - friction: 云端快照和人工兜底，仍依赖可靠的网络连接和隐私处理
    severity: medium
    affectedBuyer: 自主系统负责人或法务负责人
    mitigation: 采用本地匿名化、低频快照策略，并在网络质量下降时优雅降级。
    sourceRefs:
    - 1
    - 30
    - 32
