      - 30
      - 32
      - 36
      - 45
    competitiveRivalry:
      score: 4
      rationale: 目前直接做语义控制的厂商还不多，但运营商内部团队和相邻平台离得足够近，一旦这个切口被证明有价值，它们能很快扩张进来。
      sourceRefs:
      - 17
      - 29
      - 32
      - 36
  pestle:
  - factor: 政治
    impact: negative
    point: 即便技术已经就绪，市议会、县政府工作人员和试点评审仍能实质性地拖慢甚至重塑部署方案。
    sourceRefs:
    - 45
