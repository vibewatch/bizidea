modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Launches[Launch or fundraise trigger] --> Pilots[Paid pilot logos]
      Pilots --> Subs[Annual subscriptions]
      Subs --> Revenue[Revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash]
modelSanity:
  - checkName: "Revenue engine"
    finding: "Base-case revenue is driven by growing from 5 paying logos at Y1 end to 20 by Q4Y2 and 45 by Q4Y3 while holding mature ACV at the planned $18K level."
  - checkName: "Must go right"
    finding: "Event-led pilots must renew into always-on subscriptions fast enough that one founder plus one sales hire can carry the 20-logo Q4Y2 milestone without adding a second GTM hire."
  - checkName: "Model breaks if"
    finding: "If churn rises toward 3% or agency referrals fail to reduce CAC, the downside case pushes cash below zero before the business reaches the next financing."
  - checkName: "Next-round proof"
    finding: "Hitting 20 logos, $360K ARR, 50%+ pilot conversion, and one agency co-sell by Q4Y2 is the proof set that should justify the next round."
sanityChecks:
  ruleOf40: "Y3 growth 167.5% + EBITDA margin -116.9% = 50.6%."
  burnMultiple: "Y2 burn multiple is about 3.2x based on roughly $0.9M of burn to add about $0.285M of exit ARR from $75K to $360K."
  revenuePerFte: "$123.0K Y3 using 5 Q4Y3 FTE (benchmark roughly $200-400K SaaS)."
  flags:
    - "Revenue per FTE remains below a typical SaaS benchmark because the company is still proving renewal and workflow depth at a small ACV."
    - "Base-case CAC payback of about 23 months is long for an $18K ACV product and depends on agency referrals lowering direct-sales inefficiency over time."
    - "The model assumes event-led customers renew into always-on monitoring often enough to keep churn near 2.0%, which is still unproven in the research and business plan."
    - "Reaching 45 logos with only 5 FTE is operationally lean; if onboarding or correction work stays manual, headcount will need to rise and cash will tighten."
