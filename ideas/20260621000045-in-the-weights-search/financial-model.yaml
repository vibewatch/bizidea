scenarios:
  downside:
    description: "Renewals stay event-led, the agency channel contributes later, and the year-3 logo count stalls below the business-plan milestone path."
    y3RevenueK: 492.0
    y3EbitdaK: -845.0
    cashLowPointK: -92.0
    keyAssumptionChanges:
      - "Q4Y3 ends at 36 logos instead of 45."
      - "Blended mature ACV settles near $16.5K instead of $18K because more demand remains pilot-like or discounted."
      - "Gross margin reaches only 68% because onboarding and correction work stay more services-heavy."
  base:
    description: "Founder-led sales and one sales hire convert launch-readiness pilots into always-on subscriptions quickly enough to reach the exact 5/20/45 logo milestone path in the business plan."
    y3RevenueK: 615.0
    y3EbitdaK: -718.7
    cashLowPointK: 133.6
    keyAssumptionChanges:
      - "Paying logos rise from 5 at Y1 end to 20 at Q4Y2 and 45 at Q4Y3."
      - "Mature logos reach the planned $18K ACV by Q2Y2 and hold that level through Y3."
      - "Gross margin normalizes to the 72% business-model target as the workflow becomes more repeatable."
  upside:
    description: "Agency referrals and stronger renewal proof pull forward new logos, while software mix improves earlier than planned."
    y3RevenueK: 738.0
    y3EbitdaK: -575.0
    cashLowPointK: 255.0
    keyAssumptionChanges:
      - "Q4Y3 ends at 52 logos instead of 45."
      - "Blended mature ACV reaches about $19.5K as company and product monitoring upsells attach earlier."
      - "Gross margin reaches 74% because onboarding and evidence workflows standardize faster."
