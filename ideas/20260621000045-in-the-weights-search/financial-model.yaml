assumptions:
  - id: A1
    name: "Model start month"
    value: "2026-07"
    unit: "YYYY-MM"
    source: "[BP date 2026-06-21] the model starts in the first full month after the dated business plan."
  - id: A2
    name: "Opening cash / seed raise"
    value: "$2.4M"
    unit: "USD"
    source: "[BP fundingAsk targetFundingRangeUsd $1.5-2.5M + BP fundingAsk runwayMonths 18 + model cash curve] the base case uses the upper end of the stated seed range so the company can reach the Q4Y2 milestone and still hold roughly six months of buffer."
  - id: A3
    name: "Starting active paying logos"
    value: "0"
    unit: "count"
    source: "[BP milestones 0-12 months] the company starts pre-revenue and must first convert launch-moment buyers into paid pilots."
  - id: A4
    name: "Active paying logo definition"
    value: "A customer in a paid pilot or annual subscription"
    unit: "definition"
    source: "[BP businessModel.revenueStreams + BP gtm.pricing] customersEop counts any logo already paying for launch-readiness or always-on monitoring."
  - id: A5
    name: "Year-1 realized revenue per paying logo ramp"
    value: "M5-M12 rises from about $0.5K/month to about $1.25K/month"
    unit: "USD/logo/month"
    source: "[BP gtm.pricing + BP milestones 0-12 months + BP experimentRoadmap] this blended realization keeps year-1 revenue consistent with 3 paid pilots, 5 paying logos by Month 12, and a $75K ARR run-rate by year end."
  - id: A6
    name: "Steady-state annual contract value"
    value: "$18K ARR (~$1.5K/month)"
    unit: "USD/logo/year"
    source: "[BP gtm.pricing target ACV ~$18k + Research market.som 45 logos = $0.81M] the mature logo value matches both the pricing target and the researched SOM math."
  - id: A7
    name: "Customer ramp"
    value: "5 paying logos by M12, 20 by Q4Y2, 45 by Q4Y3"
    unit: "customersEop"
    source: "[BP milestones 0-12, 12-24, 24-36 months + Research market.som] the base case matches the business-plan milestone path exactly."
  - id: A8
    name: "Gross margin ramp"
    value: "45-60% in Y1, 62-70% in Y2, 71-72% in Y3"
    unit: "gross margin percent"
    source: "[BP businessModel.targetGrossMarginPct 72 + BP operatingAssumptions + Research regulatoryTechnicalConstraints] early pilots stay services-heavy before repeatable onboarding and correction workflows move the mix toward the 72% target."
  - id: A9
    name: "CEO / co-founder loaded compensation"
    value: "$150K"
    unit: "USD/year"
    source: "[BP team CEO / co-founder + startup-finance heuristic] lean founder cash compensation plus payroll taxes and benefits."
  - id: A10
    name: "CTO / co-founder loaded compensation"
    value: "$160K"
    unit: "USD/year"
    source: "[BP team CTO / co-founder + startup-finance heuristic] technical founder pay stays lean relative to venture-backed software peers."
  - id: A11
    name: "Customer Success / Comms Specialist loaded compensation"
    value: "$120K"
    unit: "USD/year"
    source: "[BP team Customer Success / Comms Specialist + startup-finance heuristic] reflects a domain specialist handling onboarding, launch-readiness delivery, and case-study production."
  - id: A12
    name: "Head of Sales loaded compensation"
    value: "$180K"
    unit: "USD/year"
    source: "[BP team Head of Sales + startup-finance heuristic] includes variable compensation and travel for an early enterprise seller."
  - id: A13
    name: "Product engineer loaded compensation"
    value: "$165K"
    unit: "USD/year"
    source: "[startup-finance heuristic anchored to BP product scope] one additional engineer is added once the core correction workflow is validated and the roadmap expands beyond named executives."
  - id: A14
    name: "Hiring timeline"
    value: "M1 founders, M6 Customer Success / Comms, M10 Head of Sales, M15 product engineer"
    unit: "timeline"
    source: "[BP team + BP milestones + BP fundingAsk.useOfFundsSummary] hiring follows the explicit year-1 roles first, then adds only one product hire in year 2 to stay capital efficient."
  - id: A15
    name: "No dedicated G&A hire inside the 3-year model"
    value: "Founders and vendors cover finance, legal, and admin overhead"
    unit: "operating model"
    source: "[BP team lists four named roles and no ops hire + startup-finance heuristic] the company stays lean and uses outside counsel, bookkeeping, and software tools instead of a full-time back-office role."
  - id: A16
    name: "Payroll allocation to P&L lines"
    value: "CEO 70% S&M and 30% G&A; CTO and product engineer 100% R&D; Customer Success 60% S&M and 40% R&D; Head of Sales 100% S&M"
    unit: "allocation"
    source: "[BP team role rationales + BP operations] this maps compensation into the functional spend lines used in the model."
  - id: A17
    name: "Non-payroll opex ramp"
    value: "Monthly non-payroll spend rises from about $6K/$6K/$5K in S&M/R&D/G&A early in Y1 to about $15K/$10K/$8K by Q4Y3"
    unit: "USD/month"
    source: "[BP operations + BP gtm.channels + startup-finance heuristic] covers model API spend, cloud, travel, content, legal, insurance, and conference presence without assuming a large paid-demand engine."
  - id: A18
    name: "Cash conversion convention"
    value: "Cash movement equals EBITDA"
    unit: "formula"
    source: "[startup-finance heuristic] taxes, debt service, capex, and working-capital timing are assumed immaterial at this stage."
  - id: A19
    name: "Steady-state monthly logo churn"
    value: "2.0%"
    unit: "percent per month"
    source: "[startup-finance heuristic for early workflow SaaS + BP risks] annual contracts and white-glove onboarding support low churn, but event-led buying keeps the assumption above mature enterprise-software levels."
  - id: A20
    name: "CAC convention"
    value: "Y2-Y3 sales and marketing spend divided by 40 net new logos after Y1"
    unit: "formula"
    source: "[model calc + BP gtm.funnelTargets + BP milestones] CAC is measured across the scale-up years rather than pilot months so it reflects the repeatable go-to-market motion."
  - id: A21
    name: "Funding sizing rule"
    value: "Raise enough seed capital to reach the Q4Y2 milestone and still retain roughly 6 months of buffer"
    unit: "rule"
    source: "[BP fundingAsk runwayMonths 18 + BP milestones 12-24 months + model cash curve] the base case sizes the round to reach 20 logos, first agency co-sell proof, and 50%+ pilot conversion before the next financing."
