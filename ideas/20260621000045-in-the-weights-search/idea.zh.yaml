jobsToBeDone:
  - job: >-
      当我们即将发布重大产品或融资公告时，帮助传播团队了解并修正顶级助手对创始人和公司的描述，
      让潜在客户和记者在第一时间看到准确的叙事。
    currentAlternative: 手动查询几个聊天机器人、联系 SEO 代理机构，以及被动修改简历和新闻页面
    successMetric: 高严重性幻觉数量减少，以及发布日前生成经审批的 AI 端口径包所需时间缩短
  - job: >-
      当分析师、候选人或买家开始将 LLM 作为第一步研究工具时，帮助我们追踪各模型的答案偏移，
      并证明事实素材是否改善了一致性，让高管可信度不会悄无声息地下滑。
    currentAlternative: Google 虚荣搜索、媒体监测仪表板，以及销售或 PR 团队零散截图
    successMetric: 跨追踪模型的每周答案一致性评分，以及无关键事实错误的追踪实体占比
ideaScorecard:
  signalStrength:
    score: 3
    rationale: 核心信号真实且新颖，但仅依托一篇发布文章，缺乏买家预算或采用情况的广泛独立证明。
  painIntensity:
    score: 4
    rationale: 错误的 AI 答案可直接损害企业信任——尤其在创始人可信度至关重要时，影响触及发布、融资、招聘和销售。
  wedgeClarity:
    score: 4
    rationale: 针对特定高管和公告时刻的跨模型无搜索监测，远比通用品牌分析或 SEO 工具更加聚焦。
  defensibility:
    score: 3
    rationale: 基准历史、工作流整合和纠正效果数据可以形成粘性，但 SEO、PR 科技或模型可观测性领域的现有厂商可能进入这一赛道。
  ventureScale:
    score: 4
    rationale: 滩头市场可从创业公司传播团队扩展至更广泛的企业品牌治理、产品答案情报和上市公司声誉工作流。
topRisks:
  - name: 预算可能被视为可选项
    description: 传播团队可能认为 AI 声誉管理有趣但非必要，直到某次发布或危机迫使他们采取行动。
    mitigation: 先围绕高风险事件销售，证明避免的幻觉和更快的上市就绪，再转化为常态化订阅。
  - name: 模型行为部分不可控
    description: 封闭模型的更新可能很慢或不一致，客户无法直接改变其隐含偏好。
    mitigation: 将产品定位为监测加纠正工作流，聚焦可量化的偏移减少，并支持多种素材类型，而非承诺确定性控制。
  - name: 现有厂商可能捆绑相邻功能
    description: SEO 套件、PR 软件或 AI 可观测性厂商一旦这一赛道变得可见，就可能添加基础模型答案追踪功能。
    mitigation: 深耕传播专属工作流、审批闭环、上市日历和专有跨模型纠正基准数据——这些是通用工具难以快速复制的。
