market:
  tam:
    value: $126.0M
    rationale: '自下而上估算：Vainu 7 万家 SaaS 样本显示约 10% 的厂商超过 50 名员工（约 90% 低于该门槛）；7,000 家 × 预估年合同价值 $18k = $126.0M。'
    isEstimate: true
    sourceRefs:
    - 22
    - 36
    - 42
  sam:
    value: $31.5M
    rationale: '对创始人主导的网络安全/开发者工具及类似信任敏感型 B2B 软件厂商（英语优先市场）应用预估 25% 过滤：7,000 × 25% × $18k = $31.5M。'
    isEstimate: true
    sourceRefs:
    - 19
    - 36
    - 42
  som:
    value: $0.8M
    rationale: '第 3 年可达滩头市场假设通过事件驱动直销和代理机构引流，以预估 $18k ARR 获得 45 个付费客户：45 × $18k = $0.81M。'
    isEstimate: true
    sourceRefs:
    - 15
    - 16
    - 22
