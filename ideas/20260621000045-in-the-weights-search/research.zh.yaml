    - 10
    - 12
  adoptionFrictionMatrix:
  - friction: 买家将 AI 声誉视为有趣但非必要
    severity: high
    affectedBuyer: 传播负责人
    mitigation: 先围绕发布、融资和分析师时刻销售，再扩展至常态化覆盖。
    sourceRefs:
    - 1
    - 16
  - friction: 封闭模型更新缓慢且不一致
    severity: high
    affectedBuyer: 传播负责人和高管赞助人
    mitigation: 围绕监测、升级和有证据支撑的纠正来定位产品，而非承诺确定性控制。
    sourceRefs:
    - 6
    - 9
  - friction: 安全/法务审核增加采购阻力
    severity: medium
    affectedBuyer: 营销副总裁和采购利益相关方
    mitigation: 从第一天起就提供审计日志、模型列表、人工审核节点和清晰的数据处理规范。
    sourceRefs:
    - 3
    - 5
    - 15
  - friction: 相邻工具已声称解决 AI 可见度问题
    severity: medium
    affectedBuyer: CMO 或营销副总裁
    mitigation: 以高管记忆准确性、审批工作流和事件特定就绪度作为差异化，而非通用声量份额指标。
    sourceRefs:
    - 19
