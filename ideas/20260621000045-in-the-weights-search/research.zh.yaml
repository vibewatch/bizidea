competitors:
- name: Semrush AI Toolkit
  stage: incumbent
  wedge: 将广泛的 SEO 套件延伸至 AI 品牌提及和可见度分析。
  pricing: 捆绑在更广泛的 Semrush 平台内；赛道综述援引 Semrush 工具的入门定价从 $99/月起。
  strength: 分发渠道、现有 SEO 工作流，以及向现有营销团队的自然交叉销售路径。
  weaknessVsUs: 默认面向品牌可见度和需求生成用例，而非针对创始人和公司记忆准确性的受治理纠正工作流。
  sourceRefs:
  - 19
  - 20
- name: OtterlyAI
  stage: startup
  wedge: 专注于引用、声量份额和趋势追踪的自助式 AI 搜索监测。
  pricing: Lite $29/月；Standard $189/月；Premium $489/月。
  strength: 定价透明、入门门槛低，AI 搜索指标清晰。
  weaknessVsUs: 追踪正在发生什么，但对审批工作流、高管简历准确性和发布专属纠正运营的支持较弱。
  sourceRefs:
  - 21
  - 22
- name: Rankscale
  stage: startup
  wedge: 跨多个引擎的深度 AI 搜索分析，涵盖竞争对手、引用和情感视图。
  pricing: 积分计费，网站可见免费试用和企业套餐。
  strength: 引擎覆盖广，对 GEO 从业者的分析能力强。
  weaknessVsUs: 面向 AI 搜索优化团队，而非管理围绕具名人物和公告的叙事风险的传播负责人。
  sourceRefs:
  - 23
- name: Brandlight
  stage: startup
  wedge: 具有引用分析和代理机构友好定位的企业 AI 可见度平台。
  pricing: 定制/联系销售。
