risks:
  - risk: "传播团队将 AI 声誉监测视为可选项，首次发布事件结束后不续费。"
    likelihood: High
    impact: High
    mitigation: "将首个试点设计为交付纵向偏移数据而非仅发布前报告；将常态化监测作为默认合同，事件套餐作为附加项。"
  - risk: "封闭模型更新缓慢或不一致，使纠正时间线不可预测，损害客户对工作流的信任。"
    likelihood: Medium
    impact: Medium
    mitigation: "就每个模型的纠正时间线设定明确预期；将成功指标聚焦于偏移评分走势而非确定性 SLA；合同中包含模型不稳定性披露条款。"
  - risk: "Semrush、Meltwater 或 AI 可见度创业公司在赛道可见后将高管记忆审计作为功能添加，使监测层商品化。"
    likelihood: Medium
    impact: High
    mitigation: "加速深度工作流整合（审批闭环、上市日历、新闻室连接器）和纵向基准数据——这些是通用附加功能 12 个月内无法复制的。"
  - risk: "采购决策链复杂性（法务、安全、高管赞助人）将试点销售周期延长至 90 天以上，拖慢概念验证。"
    likelihood: Medium
    impact: Medium
    mitigation: "早期试点瞄准规模较小的公司（100–250 人），单一传播负责人即可审批；企业动作留至第 2 年案例研究形成后。"
  - risk: "创始团队缺乏足够的传播领域可信度，在没有领域顾问或早期招聘的情况下无法关闭信任敏感型交易。"
    likelihood: Low
    impact: High
    mitigation: "在首次销售拓展前，以承诺传播团队引荐为条件招募一位资深传播高管担任顾问；若探索访谈需要反复温热引荐，考虑引入传播领域联合创始人。"

