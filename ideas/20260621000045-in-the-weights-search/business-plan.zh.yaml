    owner: "创始人/CEO"

operations:
  - "模型 API 调用通过多提供商抽象层路由，避免单一厂商速率限制和成本激增。"
  - "答案聚类基于 embedding 和余弦相似度；严重性评分使用按模型更新周期每季度校准的评分标准。"
  - "纠正素材发布导出结构化 JSON-LD、HTML 摘录和 markdown，用于 CMS 或新闻室集成。"
  - "审计日志按实体按模型按运行批次存储，以满足监管透明度和内部治理要求。"
  - "高触达入职会议，为每个新账户界定经审批的事实、品牌声音和升级联系人。"

