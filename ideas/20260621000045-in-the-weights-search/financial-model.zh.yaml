scenarios:
  downside:
    description: "续费停留在事件驱动模式，代理机构渠道贡献延迟，第 3 年客户数停滞于商业计划书里程碑路径以下。"
    y3RevenueK: 492.0
    y3EbitdaK: -845.0
    cashLowPointK: -92.0
    keyAssumptionChanges:
      - "Q4Y3 以 36 个客户收尾，而非 45 个。"
      - "成熟混合 ACV 稳定在约 $16.5K，而非 $18K，因为更多需求停留在试点型或折扣型。"
      - "毛利率仅达到 68%，因为入职和纠正工作服务比重仍偏高。"
  base:
    description: "创始人主导销售加一名销售员工，足够快地将上市就绪试点转化为常态化订阅，完全达成商业计划书 5/20/45 客户里程碑路径。"
    y3RevenueK: 615.0
    y3EbitdaK: -718.7
    cashLowPointK: 133.6
    keyAssumptionChanges:
      - "付费客户从 Y1 末 5 个增至 Q4Y2 20 个、Q4Y3 45 个。"
      - "成熟客户 Q2Y2 达到计划 $18K ACV 并维持至 Y3。"
      - "毛利率随工作流可重复性提升，向 72% 商业模式目标正常化。"
  upside:
    description: "代理机构引荐和更强的续费证明提前带来新客户，同时软件收入比重早于计划改善。"
    y3RevenueK: 738.0
    y3EbitdaK: -575.0
    cashLowPointK: 255.0
    keyAssumptionChanges:
      - "Q4Y3 以 52 个客户收尾，而非 45 个。"
      - "公司和产品监测追加销售更早落地，成熟混合 ACV 达到约 $19.5K。"
      - "入职和证据工作流标准化加速，毛利率达到 74%。"
