slug: "llm-reputation-ops"
date: "2026-06-21"
currency: USD
modelStartMonth: "2026-07"
assumptions:
  - id: A1
    name: "模型起始月份"
    value: "2026-07"
    unit: "YYYY-MM"
    source: "[BP date 2026-06-21] 模型从商业计划书日期之后的第一个完整月份开始。"
  - id: A2
    name: "期初现金/种子融资"
    value: "$2.4M"
    unit: "USD"
    source: "[BP fundingAsk targetFundingRangeUsd $1.5-2.5M + BP fundingAsk runwayMonths 18 + model cash curve] 基础情景取既定种子融资区间上限，使公司能够达到 Q4Y2 里程碑，同时仍保留约六个月缓冲。"
  - id: A3
    name: "期初活跃付费客户数"
    value: "0"
    unit: "count"
    source: "[BP milestones 0-12 months] 公司从零收入起步，需先将发布时刻买家转化为付费试点。"
  - id: A4
    name: "活跃付费客户定义"
    value: "处于付费试点或年付订阅中的客户"
    unit: "definition"
    source: "[BP businessModel.revenueStreams + BP gtm.pricing] customersEop 统计所有已为上市就绪或常态化监测付费的客户。"
  - id: A5
    name: "第 1 年每付费客户实现收入爬坡"
    value: "M5–M12 从约 $0.5K/月 升至约 $1.25K/月"
    unit: "USD/logo/month"
    source: "[BP gtm.pricing + BP milestones 0-12 months + BP experimentRoadmap] 这一混合实现率使第 1 年收入与 3 个付费试点、第 12 月 5 个付费客户以及年末 $75K ARR 运行率保持一致。"
  - id: A6
    name: "稳态年合同价值"
    value: "$18K ARR（约 $1.5K/月）"
    unit: "USD/logo/year"
    source: "[BP gtm.pricing target ACV ~$18k + Research market.som 45 logos = $0.81M] 成熟客户价值同时符合定价目标和研究 SOM 测算。"
  - id: A7
    name: "客户爬坡路径"
    value: "M12 为 5 个付费客户，Q4Y2 为 20 个，Q4Y3 为 45 个"
    unit: "customersEop"
    source: "[BP milestones 0-12, 12-24, 24-36 months + Research market.som] 基础情景完全遵循商业计划书里程碑路径。"
  - id: A8
    name: "毛利率爬坡"
    value: "Y1 为 45–60%，Y2 为 62–70%，Y3 为 71–72%"
    unit: "gross margin percent"
    source: "[BP businessModel.targetGrossMarginPct 72 + BP operatingAssumptions + Research regulatoryTechnicalConstraints] 早期试点服务比重较高，随着可重复入职和纠正工作流逐步优化，混合毛利向 72% 目标靠拢。"
  - id: A9
    name: "创始人/CEO 含税薪酬"
    value: "$150K"
    unit: "USD/year"
    source: "[BP team CEO / co-founder + startup-finance heuristic] 精简创始人现金薪酬加薪资税和福利。"
  - id: A10
    name: "联合创始人/CTO 含税薪酬"
    value: "$160K"
    unit: "USD/year"
    source: "[BP team CTO / co-founder + startup-finance heuristic] 技术创始人薪酬相对风险投资软件同行保持精简。"
  - id: A11
    name: "客户成功/传播专员含税薪酬"
    value: "$120K"
    unit: "USD/year"
    source: "[BP team Customer Success / Comms Specialist + startup-finance heuristic] 反映了负责入职、上市就绪交付和案例研究生产的领域专员薪酬。"
  - id: A12
    name: "销售负责人含税薪酬"
    value: "$180K"
    unit: "USD/year"
    source: "[BP team Head of Sales + startup-finance heuristic] 包含早期企业销售人员的浮动薪酬和出差费用。"
  - id: A13
    name: "产品工程师含税薪酬"
    value: "$165K"
    unit: "USD/year"
    source: "[startup-finance heuristic anchored to BP product scope] 核心纠正工作流验证且路线图扩展至具名高管以外后，新增一名工程师。"
  - id: A14
    name: "招聘时间线"
    value: "M1 创始人，M6 客户成功/传播，M10 销售负责人，M15 产品工程师"
    unit: "timeline"
    source: "[BP team + BP milestones + BP fundingAsk.useOfFundsSummary] 招聘先执行第 1 年明确角色，第 2 年仅新增一名产品人员以保持资本效率。"
  - id: A15
    name: "3 年模型内无专职 G&A 招聘"
    value: "创始人和外部供应商承担财务、法务和行政开销"
    unit: "operating model"
    source: "[BP team lists four named roles and no ops hire + startup-finance heuristic] 公司保持精简，使用外部律所、记账和软件工具，而非全职后台人员。"
  - id: A16
    name: "薪酬分配至 P&L 各项"
    value: "CEO 70% S&M + 30% G&A；CTO 和产品工程师 100% R&D；客户成功 60% S&M + 40% R&D；销售负责人 100% S&M"
    unit: "allocation"
    source: "[BP team role rationales + BP operations] 将薪酬映射至模型所用的职能支出科目。"
  - id: A17
    name: "非薪酬运营支出爬坡"
    value: "月度非薪酬支出从 Y1 初期 S&M/R&D/G&A 约 $6K/$6K/$5K 升至 Q4Y3 约 $15K/$10K/$8K"
    unit: "USD/month"
    source: "[BP operations + BP gtm.channels + startup-finance heuristic] 涵盖模型 API 费用、云计算、出差、内容、法务、保险和会议参展，不假设大规模付费需求引擎。"
  - id: A18
    name: "现金转化惯例"
    value: "现金变动等于 EBITDA"
    unit: "formula"
    source: "[startup-finance heuristic] 在此阶段假设税款、债务服务、资本支出和营运资本时间差均不重要。"
  - id: A19
    name: "稳态月度客户流失率"
    value: "2.0%"
    unit: "percent per month"
    source: "[startup-finance heuristic for early workflow SaaS + BP risks] 年付合同和高触达入职支撑低流失率，但事件驱动购买使这一假设高于成熟企业软件水平。"
  - id: A20
    name: "CAC 计算惯例"
    value: "Y2–Y3 销售与营销支出除以 Y1 后净新增的 40 个客户"
    unit: "formula"
    source: "[model calc + BP gtm.funnelTargets + BP milestones] CAC 在规模化年份衡量，而非试点月份，以反映可重复 GTM 路径。"
  - id: A21
    name: "融资规模规则"
    value: "种子融资规模足以达到 Q4Y2 里程碑并仍保留约 6 个月缓冲"
    unit: "rule"
    source: "[BP fundingAsk runwayMonths 18 + BP milestones 12-24 months + model cash curve] 基础情景将本轮规模定为在下轮融资前达到 20 个客户、首个代理机构联合销售证明和 50%+ 试点转化的规模。"
