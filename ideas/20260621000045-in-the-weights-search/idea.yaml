jobsToBeDone:
  - job: >-
      When we are about to launch a major product or fundraising announcement, help our communications team see and fix
      what top assistants say about the founder and company, so prospects and reporters encounter an accurate narrative
      first.
    currentAlternative: Manual prompting across a few chatbots, SEO agencies, and reactive PR edits to bios and press pages
    successMetric: Reduction in high-severity hallucinations and time to produce an approved AI-facing message pack before launch day
  - job: >-
      When analysts, candidates, or buyers start using LLMs as their first research step, help us monitor answer drift
      across models and prove whether our factual assets are improving consistency, so executive credibility does not
      degrade silently.
    currentAlternative: Google vanity searches, media-monitoring dashboards, and anecdotal screenshots from sales or PR teams
    successMetric: Weekly answer-consistency score across tracked models and percentage of tracked entities with no critical factual errors
ideaScorecard:
  signalStrength:
    score: 3
    rationale: The core signal is real and novel, but it rests on a single launch article rather than broad independent proof of budget or adoption.
  painIntensity:
    score: 4
    rationale: Bad AI answers can directly hurt enterprise trust during launches, fundraising, recruiting, and sales, especially when founder credibility matters.
  wedgeClarity:
    score: 4
    rationale: Cross-model no-search monitoring for specific executives and announcement moments is much sharper than generic brand analytics or SEO tooling.
  defensibility:
    score: 3
    rationale: Benchmark history, workflow integrations, and correction-outcome data can create stickiness, but incumbents in SEO, PR tech, or model observability could move into the category.
  ventureScale:
    score: 4
    rationale: The beachhead can expand from startup comms teams into broader enterprise brand governance, product answer intelligence, and public-company reputation workflows.
topRisks:
  - name: Budget may feel discretionary
    description: Communications teams may see AI reputation as interesting but non-essential until a launch or crisis forces action.
    mitigation: Sell around high-stakes events first, prove avoided hallucinations and faster launch readiness, then convert into always-on subscriptions.
  - name: Model behavior is partly uncontrollable
    description: Closed models may not update quickly or may answer from hidden priors that customers cannot directly change.
    mitigation: Position the product as monitoring plus correction workflow, focus on measurable drift reduction, and support multiple asset types instead of promising deterministic control.
  - name: Incumbents can bundle adjacent features
    description: SEO suites, PR software, or AI observability vendors could add basic model-answer tracking once the category is visible.
    mitigation: Go deep on communications-specific workflows, approval loops, launch calendars, and proprietary cross-model correction benchmarks that generic tools will lack.
