competitors:
- name: Semrush AI Toolkit
  stage: incumbent
  wedge: Extends a broad SEO suite into AI brand mentions and visibility analytics.
  pricing: Bundled within the broader Semrush platform; category roundup cites entry pricing from $99/mo for Semrush tooling.
  strength: Distribution, incumbent SEO workflows, and a natural cross-sell path into existing marketing teams.
  weaknessVsUs: Defaults to brand visibility and demand-gen use cases rather than governed correction workflows for founder and company memory accuracy.
  sourceRefs:
  - 19
  - 20
- name: OtterlyAI
  stage: startup
  wedge: Self-serve AI-search monitoring focused on citations, share of voice, and trend tracking.
  pricing: Lite from $29/mo; Standard $189/mo; Premium $489/mo.
  strength: Transparent pricing, easy onboarding, and clear AI-search metrics.
  weaknessVsUs: Tracks what is happening but is less oriented to approval workflows, executive-bio accuracy, and launch-specific correction operations.
  sourceRefs:
  - 21
  - 22
- name: Rankscale
  stage: startup
  wedge: Deep AI-search analytics across many engines with competitor, citation, and sentiment views.
  pricing: Credit-based pricing with free-trial and enterprise packs visible on the site.
  strength: Broad engine coverage and strong analysis for GEO practitioners.
  weaknessVsUs: Built for AI-search optimization teams more than communications leaders managing narrative risk around named people and announcements.
  sourceRefs:
  - 23
- name: Brandlight
  stage: startup
  wedge: Enterprise AI-visibility platform with citation analysis and agency-friendly positioning.
  pricing: Custom / contact sales.
  strength: Enterprise-grade posture, Fortune 500 positioning, and strong emphasis on attribution and citation analysis.
  weaknessVsUs: Brand-visibility framing is broader than the proposed narrow job of no-search executive-memory governance before critical moments.
  sourceRefs:
  - 24
- name: Peec AI
  stage: startup
  wedge: AI-search analytics for marketing teams with model-specific trackers and daily monitoring.
  pricing: Official pricing page shows multi-tier brand plans and enterprise custom; category roundup cites entry pricing from €89/mo.
  strength: Clear marketing-team positioning, multi-model coverage, and agency-friendly packaging.
  weaknessVsUs: Still centered on marketing visibility rather than a comms-native workflow for correcting factual narratives across executives and company entities.
  sourceRefs:
  - 19
  - 25
  - 26
