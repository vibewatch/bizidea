  validationPlan:
  - priority: high
    question: Will comms leaders budget for this between launches, or only during acute events?
    evidenceToGather: 10-15 buyer interviews plus two paid pilot proposals tied to real launch calendars.
  - priority: high
    question: Which content changes actually alter no-search model answers for founders and company summaries?
    evidenceToGather: Controlled before/after tests across GPT, Claude, Gemini, Grok, and Perplexity using bios, FAQ pages, press-room snippets, and third-party citations.
  - priority: medium
    question: Does the buyer want a monitoring dashboard, a managed service, or a correction workflow system?
    evidenceToGather: Pilot comparisons across self-serve dashboard, white-glove audit, and approval-centric workflow variants.
  - priority: medium
    question: Can agencies become a scalable channel without collapsing gross margin?
    evidenceToGather: Agency discovery calls and one co-sold pilot with a PR or executive-communications firm.
