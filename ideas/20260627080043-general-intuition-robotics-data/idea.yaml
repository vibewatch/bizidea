topRisks:
  - name: World-model adoption lags
    description: "If external physical-AI APIs take longer to mature than expected, some startups may keep relying on in-house policies and delay buying a replay layer."
    mitigation: "Position the product first as a model-agnostic replay and regression system that improves internal stacks today, then deepen API-specific packaging as adoption arrives."
  - name: Integration heterogeneity
    description: "Early robotics teams use inconsistent robot logs, controller schemes, and simulator formats, which can make onboarding costly."
    mitigation: "Start with a narrow set of quadruped-focused connectors and a canonical import spec, then expand formats only after repeatable deployment patterns emerge."
  - name: Narrow initial market
    description: "Quadruped inspection startups are a small logo pool by themselves, so the beachhead could be too tight if expansion takes too long."
    mitigation: "Use quadrupeds to prove the replay compiler, then move into adjacent mobile-robot and humanoid programs that share the same sim-to-field data problem."
