differentiator: >-
  Existing robotics-data vendors lean toward teleoperation labor, annotation services, or end-to-end model ownership.
  This startup instead owns the action schema, replay compiler, and regression harness that sit between a customer's
  robot stack and whichever world-model API it wants to test. That makes it useful even when customers switch model
  vendors or keep some policies in-house. The moat compounds from normalized replay history, failure taxonomies, and
  benchmark suites tied to real deployment environments rather than generic simulation scenes.
