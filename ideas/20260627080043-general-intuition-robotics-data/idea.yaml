jobsToBeDone:
  - job: >-
      When we expand a quadruped pilot into a new facility, help our autonomy team turn old simulator runs and field
      failures into reusable training and evaluation assets, so we can adapt behavior without burning weeks of new robot
      collection time.
    currentAlternative: "Manual curation from ROS bags, simulator exports, and engineer notebooks"
    successMetric: "Days from new-site data receipt to a validated model candidate"
  - job: >-
      When we test an outside world-model API or a new fine-tune, help our ML platform team replay the same edge cases
      across versions, so we can ship upgrades without rediscovering known failures in customer sites.
    currentAlternative: "Ad hoc regression scripts and engineer memory of past incidents"
    successMetric: "Regression pass rate on site-specific replay suites before deployment"
ideaScorecard:
  signalStrength:
    score: 4
    rationale: "Three same-day sources converge on the same non-obvious signal that gameplay-style action data is becoming core infrastructure for physical AI."
  painIntensity:
    score: 4
