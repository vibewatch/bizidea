problem: >-
  Quadruped robotics startups now have access to more simulator footage, teleop sessions, and robot logs than they can
  productively use, but those records usually sit in incompatible formats without portable action labels or benchmark
  tasks. That makes every new customer site an expensive data-engineering exercise just to adapt or evaluate a model.
  As world-model APIs start to emerge, the bottleneck shifts from collecting any data at all to compiling high-signal
  replay data that can actually improve policies and catch regressions before field expansion.
targetUser:
  primary: "Head of autonomy or ML platform at a Series A-B quadruped inspection robotics startup running 5-20 enterprise pilots in warehouses, data centers, or industrial facilities"
  secondary: "Data-engineering or autonomy lead responsible for simulator replays, ROS logs, and evaluation workflows"
  buyer: "Head of autonomy, CTO, or VP engineering"
startupThesis:
  nonObviousInsight: >-
    Most robotics teams still think the scarce resource is raw robot hours. The General Intuition signal suggests the
    scarcer resource is portable, action-labeled replay data that can bridge simulation, controller input, and limited
    real-world adaptation. If third-party world models become API-accessible, the highest-value layer will be the system
    that turns every intervention and simulator run into reusable training and evaluation assets.
  beachhead: >-
    Series A-B quadruped inspection robotics startups serving warehouses, data centers, or industrial facilities, with
    mixed simulator and ROS stacks, 5-20 live enterprise pilots, and a need to adapt navigation behavior across new
    indoor sites without collecting weeks of fresh robot data each time
  wedge: >-
    A replay compiler that ingests ROS bags, gamepad inputs, teleop interventions, and simulator sessions, then emits
    action-labeled episodes, edge-case slices, and regression suites for one chosen world-model API
  whyNowCatalyst: >-
    General Intuition's financing and promised API rollout make third-party physical-AI models newly available, while
    its sim-to-real claim makes structured replay data the urgent missing layer for teams trying to use them.
  ventureScalePath: >-
    Start with quadruped inspection teams, then expand the same replay compiler and evaluation layer into warehouse
    AMRs, humanoids, and manipulation robots until it becomes the vendor-neutral data plane between robot fleets,
    simulators, and foundation-model providers.
solution: >-
  The product starts as a read-only data plane that ingests robot logs, simulator replays, controller inputs, and field
  interventions into one canonical action schema. It automatically segments sessions into reusable episodes, surfaces
  edge cases like blocked paths or failed recovery maneuvers, and produces model-ready bundles for a selected
  world-model API. Teams also get a replay-based regression harness that tests a new model or fine-tune against the
  same site-specific situations before they push it to customer robots. Because the system is vendor-neutral, a startup
  can compare internal policies against outside APIs without rebuilding its data stack every quarter. Over time, the
  platform becomes the historical memory for what each robot learned, where it failed, and which replay assets drove
  better field performance.
goToMarketSeed:
  firstCustomer: >-
    A 30-120 person quadruped inspection startup with enterprise pilots across warehouses or data centers, ROS logs and
    simulator data spread across separate tools, and a planned model refresh before expanding to 3-5 new customer sites
  buyingTrigger: >-
    Preparing for a customer-site expansion, evaluating a third-party world-model API, or missing deployment timelines
    because each field failure requires manual replay curation and ad hoc retraining work
  currentAlternative: "Custom ROS bag parsers, notebooks, generic labeling tools, internal eval scripts, and manual teleop review"
  switchingReason: >-
    The replay compiler creates one action-labeled dataset and regression workflow across simulation and field logs,
    which is faster and less brittle than maintaining bespoke pipelines every time the team tests a new model or enters
    a new site.
  pricingHypothesis: "Annual software subscription priced by active robot program and monthly replay hours, plus onboarding for data-source connectors"
