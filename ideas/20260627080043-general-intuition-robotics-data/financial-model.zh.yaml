    y3RevenueImpactK: -144.0
    cashImpactK: -110.0
  - variable: CAC
    downsideCase: "$90K CAC，直销持续依赖创始人"
    baseCase: "$64.5K CAC"
    upsideCase: "$50K CAC，有一个合作伙伴来源的管道"
    y3RevenueImpactK: 0.0
    cashImpactK: -306.0
  - variable: churn
    downsideCase: "3.0% 月度客户流失率"
    baseCase: "2.0% 月度客户流失率"
    upsideCase: "1.0% 月度客户流失率"
    y3RevenueImpactK: -94.0
    cashImpactK: -110.0
