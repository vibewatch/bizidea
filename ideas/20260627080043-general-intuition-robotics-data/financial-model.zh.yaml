scenarios:
  downside:
    description: "连接器产品化推迟，试点到年度转化减弱，公司以仅 12 个活跃项目和较低的混合 ARPU 退出第 3 年。"
    y3RevenueK: 1404.0
    y3EbitdaK: -506.0
    cashLowPointK: 560.0
    keyAssumptionChanges:
      - "混合年度 ARPU 降至约 $144K，因为高级基准模块未能附加。"
      - "客户路径止步于 12 个活跃付费项目而非 15 个，因为试点到年度转化率跌破 50% 目标。"
      - "稳态毛利率顶格在 68% 附近，因为更多连接器工作仍偏向服务型实施。"
  base:
    description: "四足机器人窄切口得到复制，创始人主导销售将早期审计转化为订阅，毛利率在第 3 年达到 70% 的软件目标。"
    y3RevenueK: 1872.0
    y3EbitdaK: -152.4
    cashLowPointK: 920.1
    keyAssumptionChanges:
      - "混合年度 ARPU 稳定在 $156K，在计划 $120K–$180K 初始 ARR 区间内。"
      - "客户数在 Q4Y2 达到 7 个，Q4Y3 达到 15 个，与商业计划里程碑和研究 SOM 一致。"
      - "毛利率随着只读部署范围和连接器复用取代手工回放工作，升至约 70%。"
  upside:
    description: "合作伙伴来源的管道和基准追加销售提前拉动新增，使公司达到 18 个活跃项目并更早实现 EBITDA 转正。"
    y3RevenueK: 2228.0
    y3EbitdaK: 101.0
    cashLowPointK: 1010.0
    keyAssumptionChanges:
      - "混合年度 ARPU 升至约 $162K，因为基准历史和治理模块更早附加。"
      - "客户路径以 18 个活跃付费项目退出第 3 年，因为一个生态合作成为真正的渠道。"
      - "毛利率达到约 71–73%，因为接入工作在第 2 年末已大部分产品化。"
