modelSanity:
  - checkName: 收入引擎
    finding: "基础情景收入来自活跃付费机器人项目从 3 增长至 15、混合 ARPU 约 $156K，而非过早假设宽泛的平台收入。"
  - checkName: 必须做对的事
    finding: "前五个客户必须共享相同的 ROS、MCAP、仿真器和遥操作连接器模式，毛利率才能从第 1 年试点密集的水平升至第 3 年约 70%。"
  - checkName: 模型崩溃条件
    finding: "若销售周期延伸至 9 个月或 ARPU 滑至 $144K，下行情景现金将跌向约 $0.6M，当前的早期融资将不再覆盖相邻品类扩展。"
  - checkName: 下轮融资论据
    finding: "下一轮融资的故事是 Q4Y2 达到 7 个订阅客户，加上证明同一套回放范式可扩展到至少一个相邻移动机器人工作流。"
sanityChecks:
  ruleOf40: "第 3 年增长率 118% + EBITDA 利润率 -8% = 110%。"
  burnMultiple: "第 2 年净新增 ARR $624K 对应的烧钱倍数约 0.8x，第 3 年随毛利率和销售效率成熟改善至约 0.1x。"
  revenuePerFte: "第 3 年末 8 名 FTE 对应 $234K（SaaS 参考基准约 $200–400K）。"
  flags:
    - "滩头市场刻意做窄，因此在第 3 年 15 个客户的基础上损失一个客户，会对 ARR 和现金产生明显影响。"
    - "模型假设前五个客户可以用同一套核心连接器集服务；如果不成立，毛利率和招聘计划都会恶化。"
    - "融资规模保持精简，仅因为公司在第 3 年全程保持 10 名以下 FTE，且规避了机器人控制面的范围。"
