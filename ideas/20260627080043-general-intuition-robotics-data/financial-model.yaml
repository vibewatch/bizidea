scenarios:
  downside:
    description: "Connector productization slips, pilot-to-annual conversion weakens, and the company exits Y3 with only 12 active programs at lower blended ARPU."
    y3RevenueK: 1404.0
    y3EbitdaK: -506.0
    cashLowPointK: 560.0
    keyAssumptionChanges:
      - "Blended annual ARPU falls to roughly $144K because premium benchmark modules do not attach."
      - "Customer path ends at 12 active paid programs instead of 15 because pilot-to-annual conversion drops below the 50% target."
      - "Steady-state gross margin tops out near 68% because more connector work remains services-heavy."
  base:
    description: "The narrow quadruped wedge repeats, founder-led sales converts early audits into subscriptions, and gross margin reaches the 70% software target by Y3."
    y3RevenueK: 1872.0
    y3EbitdaK: -152.4
    cashLowPointK: 920.1
    keyAssumptionChanges:
      - "Blended annual ARPU holds at $156K, within the plan's $120K-$180K initial ARR band."
      - "Customer count reaches 7 by Q4Y2 and 15 by Q4Y3, matching the business plan milestone and research SOM."
      - "Gross margin rises to about 70% as read-only deployment scope and connector reuse replace manual replay work."
  upside:
    description: "Partner-sourced pipeline and benchmark upsell pull additions forward so the business reaches 18 active programs and turns EBITDA-positive earlier."
    y3RevenueK: 2228.0
    y3EbitdaK: 101.0
    cashLowPointK: 1010.0
    keyAssumptionChanges:
      - "Blended annual ARPU rises to roughly $162K as benchmark history and governance modules attach earlier."
      - "Customer path exits Y3 at 18 active paid programs because one ecosystem partnership becomes a real channel."
      - "Gross margin reaches roughly 71-73% because onboarding becomes mostly productized by late Y2."
