modelDiagram:
  title: "unit economics flow"
  mermaid: |
    flowchart LR
      Leads[Site expansion and model-refresh triggers] --> PaidAudits[Paid replay audits]
      PaidAudits --> Programs[Active paid robot programs]
      Programs --> Revenue[Subscription and module revenue]
      Revenue --> GrossProfit[Gross profit after onboarding and cloud COGS]
      GrossProfit --> Cash[Cash to fund connectors and GTM]
modelSanity:
  - checkName: Revenue engine
    finding: "Base-case revenue comes from growing from 3 to 15 active paid robot programs at roughly $156K blended ARPU, not from assuming broad platform revenue too early."
  - checkName: Must go right
    finding: "The first five logos must share the same ROS, MCAP, simulator, and teleop connector pattern so gross margin can rise from pilot-heavy Y1 levels to about 70% by Y3."
  - checkName: Model breaks if
    finding: "If the sales cycle stretches toward 9 months or ARPU slips toward $144K, downside cash falls toward roughly $0.6M and the current pre-seed stops covering adjacent-category expansion."
  - checkName: Next-round proof
    finding: "The next financing story is 7 subscription customers by Q4Y2 plus proof that the same replay schema expands into at least one adjacent mobile-robot workflow."
sanityChecks:
  ruleOf40: "Y3 growth 118% + EBITDA margin -8% = 110%."
  burnMultiple: "Y2 burn multiple is roughly 0.8x on $624K of net new ARR, improving to about 0.1x in Y3 as gross margin and sales efficiency mature."
  revenuePerFte: "$234K Y3 on 8 ending FTE (benchmark roughly $200-400K SaaS)."
  flags:
    - "The beachhead is intentionally narrow, so one lost logo in a 15-customer Y3 base would move ARR and cash meaningfully."
    - "The model assumes the first five customers can be served with the same core connector set; if not, gross margin and hiring both worsen."
    - "The funding ask stays lean only because the company remains below 10 FTE through Y3 and avoids on-robot control-plane scope."
