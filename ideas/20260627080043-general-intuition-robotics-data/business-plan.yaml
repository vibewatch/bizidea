slug: quadruped-replay-data-plane
date: '2026-06-27'
executiveSummary: >-
  Quadruped inspection startups already collect simulator runs, teleop interventions, and field logs, but they still
  treat each site expansion and model refresh as a bespoke data-engineering project. The proposed company sells a
  read-only replay data plane that compiles ROS bags, MCAP logs, controller input, and simulator sessions into a
  canonical action schema, then emits model-ready datasets and regression suites for deployment decisions. The first
  customer is a 30-120 person quadruped inspection company with 5-20 live pilots that is preparing to roll out to new
  facilities and cannot afford weeks of manual replay curation before every model change. The core go-to-market motion
  is a paid replay audit and connector onboarding tied to a concrete buying trigger such as a site expansion or external
  model evaluation, followed by conversion into an annual subscription priced by active robot program and replay volume.
  The deliberate wedge is narrow because the evidence supports urgent pain in inspection workflows, while broader
  embodied-AI categories would add connector sprawl before the product proves repeatable ROI. The business can win if
  it becomes the system of record for site-specific failures, regression cases, and cross-vendor model comparisons
  before observability or RobOps incumbents add comparable replay-compilation workflows. The biggest disconfirming risk
  is that target customers either keep most policy work in-house or accept existing observability tools plus scripts as
  good enough, which would cap both willingness to pay and venture scale. Market sizing in the research supports an
  initial software category but also shows a constrained beachhead, so the company should be financed as a disciplined
  pre-seed data-infrastructure bet rather than a broad platform build from day one.
problem:
  - "Site expansion and model refreshes still require manual curation across ROS logs, simulator exports, teleop traces, and engineer notes."
  - "Teams cannot reliably replay the same edge cases across model versions, so regressions are rediscovered in customer facilities."
solution:
  - "Ingest ROS bags, MCAP logs, simulator sessions, and controller inputs into one canonical action schema without changing the robot control stack."
  - "Automatically segment reusable episodes, package training bundles for one chosen world-model stack, and gate deployments with site-specific replay suites."
whyWeWin:
  - "The wedge is narrower than observability or fleet software: action-labeled replay compilation tied directly to model adaptation and rollout decisions."
  - "A normalized history of failures, interventions, and benchmark outcomes compounds into switching costs when customers compare in-house and external models."
strategicChoices:
  beachhead: "Series A-B quadruped inspection robotics teams in North America and Europe expanding warehouse, factory, or data-center deployments."
  wedgeRationale: >-
    This slice has recurring missions, real site-expansion deadlines, ROS-native data exhaust, and public evidence of
    enterprise deployments, so it can prove whether replay compilation reduces adaptation time faster than a broader
    robotics platform pitch.
  sequencingRationale: >-
    Start with read-only ingestion and regression because that clears safety objections, minimizes integration surface,
    and creates measurable proof before the company attempts write-back workflows, broader embodiment coverage, or
    deeper model-specific automation.
  notYet:
    - "Humanoid and manipulation programs with materially different action schemas"
    - "Closed-loop autonomy orchestration or robot command-and-control"
    - "Generic observability dashboards that duplicate Foxglove, Formant, or InOrbit"
market:
  tam: "$37.5M modeled annual software spend across advanced mobile and physical-AI robot programs."
  sam: "$9.0M across roughly 60 North America and Europe inspection and adjacent mobile-robot programs."
  som: "$1.8M by year 3 at 15 customers and roughly $120k average ACV."
  segments:
    - "Primary: Series A-B quadruped inspection robotics startups running 5-20 enterprise pilots"
    - "Secondary: Adjacent mobile-robot autonomy teams evaluating external physical-AI or world-model stacks"
  buyingProcess: >-
    The autonomy or ML-platform lead usually runs the evaluation because they own replay curation and deployment
    quality. A paid replay audit tied to a site expansion or model refresh should convert to a 6-figure annual
    contract only after the CTO or Head of Autonomy sees shorter validation cycles and higher predeployment regression
    coverage.
product:
  mvp: >-
    A read-only replay compiler for quadruped teams that ingests ROS bags, MCAP logs, teleop input, and simulator
    sessions, normalizes them into one action schema, and exports edge-case slices plus regression suites for one
    selected model stack. It must include selective upload and audit trails because bandwidth limits and safety review
    are adoption blockers from day one.
  sixMonth: "Support the first two design partners with three repeatable connectors, replay segmentation, and side-by-side regression on internal versus one external model stack."
  twelveMonth: "Turn the product into a standard deployment gate for 5-7 customers with policy-version comparison, site-level benchmark history, and self-serve replay review for autonomy teams."
  twentyFourMonth: "Expand the same schema and regression engine into adjacent mobile-robot programs while adding cross-vendor benchmark modules and higher-margin workflow automation."
  keyBets:
    - "Three connectors can cover the first five customers without custom one-off services work."
    - "Replay-based regression is painful enough to budget above generic observability spend."
    - "Customers will trust replay suites more if benchmark results are tied to historical field incidents rather than simulation scores alone."
gtm:
  wedge: "Paid replay audit plus connector onboarding for a quadruped team facing an imminent site expansion or model refresh."
  channels:
    - "Founder-led outbound to Heads of Autonomy, CTOs, and ML-platform leads at quadruped inspection startups"
    - "Design-partner pilots attached to upcoming facility rollouts or external model evaluations"
    - "Integration-led partnerships with MCAP, simulator, and model-stack ecosystems"
  funnelTargets: "Target 30-40% intro-to-qualified pilot, 50%+ pilot-to-annual conversion, and first expansion within 9 months through added sites or robot programs."
  pricing: "Charge a paid onboarding and replay audit of roughly $30k-$60k, then convert to annual software priced by active robot program and replay hours with initial ARR typically targeted at $120k-$180k."
businessModel:
  revenueStreams:
    - "Annual software subscription"
    - "Connector onboarding and replay-audit implementation fees"
    - "Premium benchmark comparison and additional site-history modules"
  unitOfValue: "Active robot program with a replay-volume band"
  targetGrossMarginPct: 70
  expansionLevers:
    - "Expand from one inspection program into additional customer sites"
    - "Add adjacent mobile-robot teams that can reuse the same connector set"
    - "Upsell benchmark comparison, retention, and governance workflows"
strategyMap:
  northStarMetric: "Days from new-site data receipt to a regression-passed model candidate"
  inputMetrics:
    - "Time to first imported replay corpus"
    - "Percent of known edge cases represented in reusable suites"
    - "Pilot-to-production conversion rate"
    - "Number of additional sites or programs expanded per customer"
  moatsToBuild:
    - "Canonical action schema across sim, teleop, and field logs"
    - "Site-specific failure and intervention corpus"
    - "Benchmark history linking replay results to field outcomes"
  killCriteria:
    - "Fewer than 3 of the first 5 prospects share a connector pattern that can be productized"
    - "Paid pilots fail to cut model-validation cycle time by at least 30%"
    - "Less than 50% of pilots convert to annual contracts within 6 months"
  mermaid: |
    flowchart LR
      Wedge[Quadruped site-expansion wedge] --> MVP[Read-only replay compiler]
      MVP --> Proof[Shorter validation cycles and caught regressions]
      Proof --> Expansion[More sites more robot programs and adjacent mobile robots]
investorMemo:
  verdict:
    call: Watch
    conviction: "Clear workflow pain and a crisp wedge, but the beachhead is small and external-model timing still needs proof."
    whyBelieve: "The product targets a concrete deployment bottleneck that existing observability and RobOps tools do not obviously solve end to end."
    whyDoubt: "If customers keep using internal scripts or delay external-model adoption, the company may never escape a narrow tooling niche."
    nextDiligence: "Verify with 8-12 target buyers that a paid replay audit can convert into a standalone 6-figure software budget line before broader platform build-out."
  firstCustomer:
    title: "Head of autonomy at a quadruped inspection startup preparing multi-site rollout"
    profile: "A 30-120 person robotics company with mixed simulator and ROS workflows, 5-20 enterprise pilots, and a planned expansion into 3-5 new facilities."
    trigger: "A new site launch, recurring field failures, or an upcoming test of an external world-model stack before customer rollout."
    buyer: "Head of Autonomy, CTO, or VP Engineering"
    initialContract: "Begin with a $30k-$60k replay audit and connector deployment, then convert to a $120k-$180k annual subscription if the team adopts replay suites as the release gate."
  mustBeTrue:
    - "At least half of target ICPs must be evaluating new model variants often enough that regression suites are a weekly workflow, not an occasional project."
    - "The first five customers must converge on a narrow connector set that can be supported productically."
    - "A replay compiler must reduce time from field log receipt to deployment-ready model candidate by at least 30%."
    - "Economic buyers must treat replay and regression as a distinct software budget above observability tooling."
    - "Expansion into adjacent mobile-robot programs must reuse most of the action schema and benchmark engine."
  diligenceQuestions:
    - "Which exact log, teleop, and simulator formats appear across the first ten target accounts?"
    - "Who owns the budget for replay and regression software when observability tooling is already in place?"
    - "How often will the ICP evaluate third-party model stacks versus internal policies over the next 12 months?"
    - "What proof would convince a safety-conscious buyer to trust replay-based gating before deployment?"
    - "Can the company win distribution through model or simulator partners without becoming implementation-heavy services?"
operatingAssumptions:
  - assumption: "The first five customers can be served with a narrow connector set centered on ROS bags, MCAP, simulator sessions, and teleop input."
    basis: idea.yaml
    validationTest: "Collect sample data from 10 target accounts and confirm at least 70% of required ingestion volume maps to three productized connectors."
    decisionImpact: "If false, narrow the ICP further or reposition as higher-priced implementation software instead of venture-style SaaS."
  - assumption: "Quadruped inspection teams will pay standalone budget for replay and regression because it shortens deployment loops."
    basis: research.yaml
    validationTest: "Run pricing discovery with 8-12 buyers already paying for robot software and secure at least 3 paid audits above $30k."
    decisionImpact: "If false, shift packaging toward partner-bundled modules or deprioritize the category."
  - assumption: "Read-only ingestion plus audit trails is enough to clear initial safety and IT objections."
    basis: research.yaml
    validationTest: "Complete security and safety review with two design partners without requiring on-robot control privileges."
    decisionImpact: "If false, implementation time and enterprise friction rise, requiring more capital and slower sales plans."
  - assumption: "External model evaluation will become common enough that cross-vendor replay packaging matters within 12-18 months."
    basis: operator judgment
    validationTest: "Track ten live opportunities and confirm at least four evaluate an outside model stack or benchmark against one."
    decisionImpact: "If false, emphasize internal-policy regression and postpone model-vendor-specific integrations."
experimentRoadmap:
  - horizon: 0–90 days
    experiment: "Run ten discovery interviews and collect raw replay artifacts from target quadruped teams."
    hypothesis: "Prospects share enough data-format overlap and the site-expansion trigger is urgent enough to support a common MVP."
    successMetric: "At least 7 of 10 accounts map to the same three connector priorities and report a model-refresh or site-expansion pain in the next 6 months."
    owner: CEO
  - horizon: 0–90 days
    experiment: "Deliver two paid replay audits using manual back-end workflows behind a productized front end."
    hypothesis: "Buyers will pay for a narrow replay-compilation deliverable before full automation exists."
    successMetric: "Two paid projects signed at $30k+ each and at least one converts into subscription scoping."
    owner: CEO
  - horizon: 90–180 days
    experiment: "Ship the first three connectors with selective upload and replay segmentation."
    hypothesis: "Connector automation can cut onboarding labor enough to support repeatable gross margins."
    successMetric: "Time to first usable corpus falls below 10 business days for both design partners."
    owner: Founding eng
  - horizon: 90–180 days
    experiment: "Run side-by-side replay regression on one internal model and one external stack for a design partner."
    hypothesis: "Cross-model replay comparison is a stronger buying wedge than dataset storage alone."
    successMetric: "Partner uses the regression output in a real deployment decision and reports at least one caught regression."
    owner: Product lead
  - horizon: 180–365 days
    experiment: "Package annual subscription pricing around active robot programs and replay-volume bands."
    hypothesis: "Program-based pricing is easier for buyers to approve than seat-based or pure storage pricing."
    successMetric: "At least 50% of pilots convert to annual contracts and no converted customer requests seat-based pricing."
    owner: CEO
  - horizon: 180–365 days
    experiment: "Launch one simulator or model-stack partnership with a co-sell or integration path."
    hypothesis: "Ecosystem partners can reduce customer-acquisition cost without forcing the company into white-label services."
    successMetric: "One sourced pilot from a partner channel and less than 20% of engineering work delivered as custom services."
    owner: CEO
operations:
  - "Maintain a canonical action ontology and import-validation workflow as the core product-control process."
  - "Use edge buffering, chunking, and selective upload so customer deployments do not depend on full continuous cloud sync."
  - "Keep deployment decisions auditable with versioned replay suites, benchmark outputs, and documented approval logs."
  - "Build partner motion around MCAP, simulator, and model ecosystems rather than OEM-exclusive integrations."
team:
  - role: Founding eng
    startTiming: Month 0
    rationale: "Own ingestion architecture, canonical schema, and first three connectors."
  - role: Product and solutions lead
    startTiming: Month 0-3
    rationale: "Translate messy customer replay workflows into repeatable product requirements and paid audits."
  - role: GTM founder or first seller
    startTiming: Month 0
    rationale: "Sell directly into time-bound site expansions and manage design-partner conversions."
  - role: Platform engineer
    startTiming: Month 6-9
    rationale: "Harden selective upload, storage controls, and benchmark history once connector demand is proven."
milestones:
  - horizon: 0–12 months
    items:
      - "Close 2-3 paid design partners in quadruped inspection"
      - "Productize three core connectors and read-only replay ingestion"
      - "Demonstrate at least 30% faster validation cycle time on one live deployment workflow"
      - "Convert at least 2 pilots into annual subscriptions"
  - horizon: 12–24 months
    items:
      - "Reach 5-7 subscription customers and expand at least 2 into additional sites"
      - "Add benchmark history and cross-model comparison as standard product modules"
      - "Prove the connector framework works for one adjacent mobile-robot category"
  - horizon: 24–36 months
    items:
      - "Reach roughly 15 customers and approximately $1.8M ARR in the initial SOM plan"
      - "Enter adjacent mobile-robot programs without rebuilding the core schema"
      - "Establish one or more partner-led channels that source qualified pilots"
risks:
  - risk: "External physical-AI and world-model adoption matures slower than expected."
    likelihood: Medium
    impact: High
    mitigation: "Lead with model-agnostic replay regression for in-house stacks and delay deeper vendor-specific integrations."
  - risk: "Connector heterogeneity turns onboarding into services-heavy implementation work."
    likelihood: High
    impact: High
    mitigation: "Constrain the ICP tightly, reject out-of-scope formats early, and validate a productized connector set before hiring ahead of demand."
  - risk: "Observability or RobOps incumbents add enough replay and curation features to blunt differentiation."
    likelihood: Medium
    impact: Medium
    mitigation: "Stay focused on action labeling, rollout gating, and field-outcome-linked benchmark history rather than dashboards."
  - risk: "Safety and IT reviews slow deployment even for a read-only data product."
    likelihood: Medium
    impact: Medium
    mitigation: "Provide clear risk boundaries, audit logs, selective upload, and no-control-plane permissions in the initial architecture."
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2-4M"
  runwayMonths: 18
  useOfFundsSummary: "Fund 18 months to prove the connector set, convert paid audits into subscription revenue, and establish replay regression as a repeatable deployment gate for quadruped inspection teams."
