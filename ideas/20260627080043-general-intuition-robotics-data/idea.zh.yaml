jobsToBeDone:
  - job: >-
      当我们把四足机器人试点扩展到新设施时，帮助自主化团队把旧的仿真运行和现场失败记录转化为可复用的训练和评测资产——这样我们无需花数周重新采集机器人数据就能完成行为适配。
    currentAlternative: "手工整理 ROS bag、仿真导出文件和工程师笔记"
    successMetric: "从收到新站点数据到验证通过的模型候选所需天数"
  - job: >-
      当我们测试外部世界模型 API 或新的微调版本时，帮助 ML 平台团队跨版本回放相同的边缘案例——这样我们能在不重新踩已知坑的情况下完成升级上线。
    currentAlternative: "临时的回归脚本和工程师对历史故障的记忆"
    successMetric: "部署前在现场特有回放套件上的回归通过率"
