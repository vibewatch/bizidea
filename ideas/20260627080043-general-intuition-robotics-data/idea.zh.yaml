problem: >-
  四足机器人初创公司现在能收集到的仿真镜头、遥操作记录和机器人日志已超出高效利用的上限，但这些数据通常以不兼容的格式散落各处，既没有可移植的动作标注，也缺少基准评测任务。结果是每进入一个新客户现场，都要重新做一遍昂贵的数据工程。随着世界模型 API 开始涌现，瓶颈已从"收集任何数据"转变为"编译高价值回放数据"——只有这样才能真正改善策略模型，并在现场扩张前捕获回归问题。
targetUser:
  primary: "A 轮至 B 轮四足巡检机器人初创公司的自主化负责人或 ML 平台负责人，在仓库、数据中心或工业设施运营 5 至 20 个企业级试点"
  secondary: "负责仿真回放、ROS 日志和评测工作流的数据工程或自主化负责人"
  buyer: "自主化负责人、CTO 或 VP Engineering"
startupThesis:
  nonObviousInsight: >-
    大多数机器人团队仍认为稀缺资源是机器人上机时间。General Intuition 的信号表明，真正稀缺的是可移植的、带动作标注的回放数据——它能桥接仿真、控制器输入和有限的现实适应。一旦第三方世界模型通过 API 开放，最高价值的层将是那个能把每次人工干预和仿真运行都变成可复用训练与评测资产的系统。
  beachhead: >-
    A 轮至 B 轮四足巡检机器人初创公司，服务仓库、数据中心或工业设施，混合使用仿真器和 ROS 技术栈，运营 5 至 20 个企业级试点，每次进入新室内场景都需要适应导航行为，却不愿为此重新收集数周的机器人数据
  wedge: >-
    一个回放编译器，导入 ROS bag、手柄输入、遥操作干预和仿真会话，再为指定的世界模型 API 输出带动作标注的片段、边缘案例切片和回归测试套件
  whyNowCatalyst: >-
    General Intuition 的融资和承诺的 API 开放让第三方具身 AI 模型触手可及，而其仿真到现实的成果让结构化回放数据成为尝试使用这些模型的团队迫切缺失的那一层。
  ventureScalePath: >-
    从四足巡检团队起步，再将同一套回放编译器和评测层扩展到仓库 AMR、人形机器人和操作机器人，直到成为机器人队列、仿真器和基础模型厂商之间厂商中立的数据层。
solution: >-
  产品起点是一个只读数据层，将机器人日志、仿真回放、控制器输入和现场干预接入统一的动作范式。它自动将会话切分成可复用片段，标出边缘案例（如路径被堵或恢复动作失败），并为指定的世界模型 API 生成开箱即用的数据包。团队还获得一套基于回放的回归测试工具——在向客户机器人推送新模型或微调版本之前，先用相同的现场场景回放来验证。由于系统厂商中立，初创公司无需每季度重建数据栈，就能对比自研策略和外部 API。随着时间推移，平台成为每台机器人的历史记忆：学到了什么、在哪里失败、哪些回放资产带来了更好的现场表现。
goToMarketSeed:
  firstCustomer: >-
    规模 30 至 120 人的四足巡检初创公司，在仓库或数据中心运营多个企业级试点，仿真数据和 ROS 日志散落在不同工具中，计划在扩张到 3 至 5 个新客户现场前完成一次模型刷新
  buyingTrigger: >-
    正在准备客户现场扩张、评估第三方世界模型 API，或因每次现场失败都需要手工整理回放和临时重训而错过交付节点
  currentAlternative: "自定义 ROS bag 解析器、笔记本、通用标注工具、内部评测脚本和手工遥操作审查"
  switchingReason: >-
    回放编译器将仿真和现场日志统一为一个带动作标注的数据集与回归工作流，比每次测试新模型或进入新站点都要维护定制管道更快、更稳定。
  pricingHypothesis: "按活跃机器人项目和月回放时长计费的年度软件订阅，附带数据源连接器的接入服务费"
