topRisks:
  - name: 世界模型普及迟缓
    description: "如果外部具身 AI API 成熟速度慢于预期，部分初创公司可能继续依赖自研策略，推迟购买回放层。"
    mitigation: "先将产品定位为与模型无关的回放与回归系统，改善当前自研技术栈，待 API 普及后再深化 API 专属打包。"
  - name: 数据格式异构
    description: "早期机器人团队使用不一致的机器人日志、控制器方案和仿真格式，可能使接入成本高昂。"
    mitigation: "从一套专注四足机器人的连接器和标准导入规范起步，待可复制的部署模式出现后再扩展格式支持。"
  - name: 初始市场过窄
    description: "四足巡检初创公司本身客户池较小，若扩张时间过长，滩头市场可能过于局促。"
    mitigation: "先用四足机器人验证回放编译器，再进入面临同样仿真到现实数据问题的相邻移动机器人和人形机器人市场。"
