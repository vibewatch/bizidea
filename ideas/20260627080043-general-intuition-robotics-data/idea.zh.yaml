differentiator: >-
  现有机器人数据厂商偏向遥操作劳力、标注服务或端到端模型所有权。这家初创公司的切入点不同：它拥有动作范式、回放编译器和回归测试工具——这三样东西坐落在客户机器人技术栈与其想测试的任意世界模型 API 之间。这意味着即便客户更换模型厂商或保留部分自研策略，产品依然有价值。护城河来自经过归一化的回放历史、故障分类体系，以及绑定真实部署环境（而非通用仿真场景）的基准测试套件，会随时间持续叠加。
