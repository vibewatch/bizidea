  - name: Foxglove
    stage: scale-up
    wedge: "围绕 MCAP 和 ROS 工作流的多模态机器人可观测性、记录、索引和可视化。"
    pricing: "免费层；Pro 从 $20/月加使用量起；企业版按需报价。"
    strength: "导入和可视化多模态机器人日志方面开发者体验业界最佳。"
    weaknessVsUs: "止步于拥有动作标注、数据集打包和部署门控回归测试套件。"
    sourceRefs: [15, 16, 17, 18]
  - name: Formant
    stage: scale-up
    wedge: "机器队列运营、遥测导入、遥操作和企业机器人运营。"
    pricing: "联系销售。"
    strength: "针对已部署机器人的远程运营和遥测导入层很强。"
    weaknessVsUs: "针对机器队列可观测性和控制优化，而非面向模型训练的回放编译。"
    sourceRefs: [20, 21]
  - name: InOrbit
    stage: scale-up
    wedge: "带机器人 API、故障管理、ROS 代理和机器队列可观测性的机器人运维平台。"
    pricing: "最多 8 台机器人的年度开发者计划；企业版询价。"
    strength: "良好的机器人云集成平台和故障管理工作流。"
    weaknessVsUs: "更偏向机器人运维而非回放评测；未被定位为带动作标注训练资产的唯一数据来源。"
    sourceRefs: [24, 25]
  - name: Nominal
    stage: scale-up
    wedge: "面向高级硬件和自主化项目的统一遥测与测试数据平台。"
    pricing: "联系销售/演示驱动。"
    strength: "测试数据分析和时间尺度感知遥测审查表现强劲。"
    weaknessVsUs: "更宽的硬件测试范围意味着对跨越仿真、遥操作和现场日志的 ROS 原生回放归一化关注较少。"
    sourceRefs: [26, 27, 28, 29]
  - name: Viam
    stage: scale-up
    wedge: "用于构建、部署和管理机器人应用的机器人应用平台。"
    pricing: "免费起步；基于使用量的平台定价；机器人解决方案从 $120K/年起。"
    strength: "宽泛的开发者平台和机器人云控制平台。"
    weaknessVsUs: "更广泛的应用平台，而非专门的回放编译器和回归层。"
    sourceRefs: [22, 23]
regulatoryTechnicalConstraints:
  - point: "工业移动机器人部署仍需在运营环境中进行正式风险评估和持续安全管理。"
    sourceRefs: [38, 39, 44, 45]
  - point: "回放系统必须在带宽受限和连接断续的情况下，不丢失关键遥测或视频数据。"
    sourceRefs: [18, 20, 24]
  - point: "日志必须在各模态间保持自包含和时间同步，才能支持可靠的后续分析和基准复用。"
    sourceRefs: [13, 14, 18]
validationSignals:
  - point: "General Intuition 新一轮融资强化了这一判断：结构化数据和模型训练杠杆正在成为具身 AI 公司建设的核心。"
    sourceRefs: [1, 2]
  - point: "NVIDIA 和 Google 生态正在开放模型、评测框架和开发者路径，催生了对配套数据准备层的需求。"
    sourceRefs: [4, 5, 6, 7, 8, 9]
  - point: "Spot 和 ANYmal 的案例研究证明，工厂和数据中心的重复性巡检工作流已在真实设施中产生循环运营数据，这正是本产品所需要的。"
    sourceRefs: [34, 35, 36, 37]
  - point: "现有可观测性和遥测平台证明买家愿意为机器人软件付费，同时也确认了如果切口过于通用则存在替代风险。"
    sourceRefs: [15, 16, 20, 24, 26]
