  fiveForces:
    supplierPower:
      score: 3
      rationale: "Model, simulation, and cloud vendors matter, but open logging standards and multiple downstream stacks keep supplier lock-in from being absolute."
      sourceRefs: [4, 7, 8, 9, 13, 14]
    buyerPower:
      score: 4
      rationale: "The ICP is small, technical, and capable of building partial substitutes in-house, so each buyer has leverage and will demand measurable deployment value."
      sourceRefs: [17, 18, 20, 24, 46]
    threatOfEntrants:
      score: 3
      rationale: "Open-source components and cloud infrastructure lower entry barriers, but high-quality robotics connectors, replay semantics, and customer trust still take time to build."
      sourceRefs: [13, 14, 15, 18, 50]
    threatOfSubstitutes:
      score: 4
      rationale: "Internal scripts, generic observability platforms, RobOps suites, and hardware-test tools can all solve part of the workflow even if none solves the whole problem."
      sourceRefs: [15, 17, 20, 24, 26, 28]
    competitiveRivalry:
      score: 3
      rationale: "Rivalry is meaningful in adjacent layers, but the exact wedge—action-labeled replay compilation plus deployment regression for physical-AI teams—still appears under-served."
      sourceRefs: [15, 20, 24, 26, 34, 37]
  pestle:
    - factor: political
      impact: neutral
      point: "Industrial and defense attention is pulling more capital and partnerships into physical AI, which helps ecosystem readiness but may bias some buyers toward preferred hardware or domestic suppliers."
      sourceRefs: [4, 5, 6]
    - factor: economic
      impact: positive
      point: "Inspection automation is justified by uptime, safety, and labor efficiency, but buyers still need software that shrinks the expensive engineering time between field data and deployment."
      sourceRefs: [34, 37, 48]
    - factor: social
      impact: positive
      point: "Reference deployments frame robots as complements to human teams by automating repetitive inspection work while people handle interpretation and intervention."
      sourceRefs: [34, 37]
    - factor: technological
      impact: positive
      point: "Open models, simulation frameworks, and robotics data standards are reducing the technical distance between raw logs and deployable learning workflows."
      sourceRefs: [4, 7, 8, 9, 10, 13, 14]
    - factor: legal
      impact: negative
      point: "Mobile-robot deployments still sit inside formal safety, risk-assessment, and change-management expectations that can slow rollouts and favor auditability."
      sourceRefs: [38, 39, 43, 44, 45]
  adoptionFrictionMatrix:
    - friction: "Heterogeneous robot, simulator, and controller data formats"
      severity: high
      affectedBuyer: "Autonomy lead"
      mitigation: "Start with a narrow connector set and enforce one canonical action schema with import validation."
      sourceRefs: [14, 18, 20, 24]
    - friction: "Bandwidth and storage constraints for multimodal replay uploads"
      severity: high
      affectedBuyer: "ML platform or data engineer"
      mitigation: "Use edge chunking, compression, selective upload, and deferred backfill instead of forcing full-cloud sync."
      sourceRefs: [18, 20, 24]
    - friction: "Safety and validation scrutiny before changing robot behavior"
      severity: medium
      affectedBuyer: "CTO or VP Engineering"
      mitigation: "Lead with read-only ingestion and replay-based predeployment regression tied to documented risk reviews."
      sourceRefs: [38, 39, 44, 45]
    - friction: "Unclear trust in simulation-only benchmark results"
      severity: medium
      affectedBuyer: "ML platform lead"
      mitigation: "Link simulation evaluation to historical field incidents and require side-by-side replay passes before deployment."
      sourceRefs: [8, 10, 34, 40]
