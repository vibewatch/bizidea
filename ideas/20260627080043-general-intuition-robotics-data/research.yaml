    strength: "Best-in-class developer experience for ingesting and visualizing multimodal robot logs."
    weaknessVsUs: "Stops short of owning action labeling, dataset packaging, and deployment-gating replay suites."
    sourceRefs: [15, 16, 17, 18]
  - name: Formant
    stage: scale-up
    wedge: "Fleet operations, telemetry ingestion, teleoperation, and enterprise robot operations."
    pricing: "Contact sales."
    strength: "Strong remote-ops and telemetry ingestion layer for deployed robots."
    weaknessVsUs: "Optimized for fleet observability and control rather than model-training replay compilation."
    sourceRefs: [20, 21]
  - name: InOrbit
    stage: scale-up
    wedge: "RobOps platform with robot APIs, incident management, ROS agents, and fleet observability."
    pricing: "Annual developer plan for up to 8 robots; enterprise by inquiry."
    strength: "Good robot-cloud integration surface and incident-management workflows."
    weaknessVsUs: "More RobOps than replay-eval; not positioned as the source of truth for action-labeled training assets."
    sourceRefs: [24, 25]
  - name: Nominal
    stage: scale-up
    wedge: "Unified telemetry and test-data platform for advanced hardware and autonomy programs."
    pricing: "Contact sales / demo-led."
    strength: "Strong test-data analysis and time-scale-aware telemetry review."
    weaknessVsUs: "Broader hardware-test scope means less focus on ROS-native replay normalization across sim, teleop, and field logs."
    sourceRefs: [26, 27, 28, 29]
  - name: Viam
    stage: scale-up
    wedge: "Robot application platform for building, deploying, and managing robotics applications."
    pricing: "Free to start; usage-based platform pricing; robotic solutions starting at $120K/year."
    strength: "Broad developer platform and robot-cloud control surface."
    weaknessVsUs: "Broader application platform, not a specialized replay compiler and regression layer."
    sourceRefs: [22, 23]
