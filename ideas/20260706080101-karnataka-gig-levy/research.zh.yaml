  sensitivityCases:
  - case: 卡纳塔克邦法院收窄或推迟了缴存的具体要求。
    impact: 汇缴的紧迫性会下降，但计提模拟和争议证据依然重要；销售可能会更偏向诊断服务，而非直接推行完整软件。
    sourceRefs:
    - 3
    - 5
    - 6
  - case: 另一个主要邦效仿卡纳塔克邦按交易计征的结构，或重启拉贾斯坦邦式的实施推动。
    impact: 产品价值会大幅扩大，因为一套可复用的规则库，会比一次性的电子表格自建更加重要。
    sourceRefs:
    - 9
    - 13
    - 14
  - case: 大型平台判断卡纳塔克邦仍是孤立个案，选择把这项工作继续留在内部处理几轮。
    impact: 初创公司可能需要先以审计材料包或托管服务的形式切入，再逐步转化为软件销售。
    sourceRefs:
    - 20
