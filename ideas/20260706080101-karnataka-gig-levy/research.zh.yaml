    - 13
    - 14
    - 15
    - 16
    - 17
    - 18
    - 19
  geographicConsiderations:
  - point: 卡纳塔克邦是眼下的滩头市场，因为它同时具备已生效的税费、点名的平台，以及活跃的法院审查。
    sourceRefs:
    - 3
    - 5
    - 6
  - point: 扩张故事取决于能否移植邦级模板；拉贾斯坦邦已经证明，另一个邦可以在中央规则之外，实施自己的零工工人制度。
    sourceRefs:
    - 13
