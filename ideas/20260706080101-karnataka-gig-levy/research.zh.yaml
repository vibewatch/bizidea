  - 揭示 Swiggy、Eternal/Zomato、Rapido、Zepto 等印度零工平台交易规模、工人基数或监管敞口的一手信源和可靠报道清单。
  - 与电商和劳工合规相关的印度税务与合规产品页面的直接官方或一手 URL 清单。
