    - 25
    - 26
    - 27
  - point: 一套横跨卡纳塔克邦、拉贾斯坦邦、中央法典和相邻税务叠加规则的可复用规则库，其积累速度能超过单邦的内部自建。
    sourceRefs:
    - 7
