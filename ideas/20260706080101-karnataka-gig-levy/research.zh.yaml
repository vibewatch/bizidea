openQuestions:
- 卡纳塔克邦会把取消、部分退款和促销调整视为立即的税费冲销，还是留到之后再对账处理？
- 在上诉尘埃落定之前，第一笔预算有多少会落在软件上，而不是外部律师或托管服务支持？
- '除食品配送和网约车之外，哪些相邻品类会接下来感受到这种痛：物流、电商平台，还是专业服务？'
- 其他印度邦会多快效仿按交易计征的零工工人税费，而不是沿用中央法典按营收计征的缴费模式？
