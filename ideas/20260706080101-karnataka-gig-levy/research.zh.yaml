  - 查找关于各平台在卡纳塔克邦高等法院挑战该邦零工工人法的近期可靠报道和一手信源直接 URL。
  - 查找卡纳塔克邦零工工人福利税费通知的直接 URL，包括显示 1% 税率、上限、汇缴时间表和覆盖品类的页面。
