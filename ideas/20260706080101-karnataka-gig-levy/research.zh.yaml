  - 关于 2025 年卡纳塔克邦平台零工工人法、福利税费通知、2025 年细则，以及 2026 年卡纳塔克邦高等法院聚合平台挑战案的权威一手及近期可靠信源清单。
  - 关于 2020 年《社会保障法》对零工和平台工人的处理方式，以及拉贾斯坦邦、卡纳塔克邦等印度邦级零工工人社会保障法的权威信源清单。
