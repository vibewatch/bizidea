  validationPlan:
  - priority: 高
    question: 在计算福利税费基数时，卡纳塔克邦究竟会如何处理取消、部分退款、促销和薪酬撤销？
    evidenceToGather: 通知原文、任何法院裁定的措辞，以及两家受影响平台的对账案例。
  - priority: 高
    question: '第一次部署的预算线实际上归谁掌管：CFO、合规负责人、支付负责人，还是数据平台负责人？'
    evidenceToGather: 覆盖食品配送、出行和物流平台的十次买家访谈，加一次付费的共创客户诊断。
  - priority: 中
    question: '除食品配送和网约车之外，哪些相邻品类会接下来感受到这种痛：物流、电商平台，还是专业服务？'
    evidenceToGather: 五次运营方访谈，以及一份基于卡纳塔克邦和拉贾斯坦邦覆盖定义的邦级品类矩阵。
  - priority: 低
    question: 通过劳动顾问和 ERP 或薪酬厂商的合作方渠道销售，是否比创始人主导的直销转化更快？
    evidenceToGather: 三次带有具体成功费用、实施角色和周期数据的转介试点。
