slug: "gig-welfare-remittance-ledger"
date: "2026-07-06"
currency: USD
modelStartMonth: "2026-08"
assumptions:
  - id: A1
    name: "模型起始月份"
    value: "2026-08"
    unit: "YYYY-MM"
    source: "[BP date 2026-07-06] 模型从有日期的商业计划书之后的第一个完整月份开始。"
  - id: A2
    name: "期初现金／pre-seed 融资额"
    value: "$1.5M"
    unit: "USD"
    source: "[BP fundingAsk targetFundingRangeUsd $2–4M + model cash curve] 由于公司保持印度市场优先、第 3 年末仅 8 名全职员工，且仍能带缓冲达成 6 家客户的 SOM 里程碑，自下而上的测算支持一轮比 BP 粗估区间更小的融资。"
  - id: A3
    name: "起始付费平台—邦组合数"
    value: "0"
    unit: "count"
    source: "[BP milestones 0–12 months + BP investorMemo.firstCustomer] 公司从零营收起步，必须先拿下付费诊断。"
  - id: A4
    name: "客户定义"
    value: "一个付费的平台—邦组合，无论仍处于诊断、试点，还是年度经常性结账模式。"
    unit: "definition"
    source: "[BP businessModel.unitOfValue + BP gtm.pricing] customersEop 统计的是已变现的平台—邦工作流，而不是单个法律实体或席位。"
  - id: A5
    name: "早期诊断收入确认"
    value: "首批付费诊断月份中，每个活跃付费组合每月 1.6 万美元"
    unit: "USD/customer/month"
    source: "[BP gtm.pricing 6-8 周诊断报价 4 万-7.5 万美元 + BP investorMemo.firstCustomer.initialContract] 模型对早期付费工作的收入确认偏保守，而非提前按项目费用高端计入。"
  - id: A6
    name: "退出期混合年化每组合收入"
    value: "第 3 年第 4 季度年化 25 万美元"
    unit: "USD/customer/year"
    source: "[Research market.som 6 家可拿下客户 x 25 万美元 ACV = 约 150 万美元 + BP pricing 15 万-25 万美元年度订阅] 一旦按月结账和第二邦模块上线，退出期 ARPU 就落在经常性收入区间的高端。"
  - id: A7
    name: "客户增长节奏"
    value: "第 6 月 1 家，第 10 月 2 家，第 2 年第 4 季度 4 家，第 3 年第 4 季度 6 家"
    unit: "customersEop"
    source: "[BP milestones 0–12、12–24 和 24–36 个月 + Research market.som] 增长节奏对应第 1 年 2 个付费诊断、第 2 年 3-4 家付费客户、第 3 年 6 家客户。"
  - id: A8
    name: "收入确认惯例"
    value: "期末付费平台—邦组合数，乘以该期每组合的混合已确认月收入"
    unit: "formula"
    source: "[BP gtm.pricing + BP businessModel.unitOfValue] 这样可让报告收入直接对应 customersEop 乘以混合 ARPU。"
  - id: A9
    name: "毛利率爬升"
    value: "第 1 年 50%-60%，第 2 年 61%-68%，第 3 年 69%-72%"
    unit: "gross margin percent"
    source: "[BP businessModel.targetGrossMarginPct 70 + BP strategicChoices.sequencingRationale + Research reportMemo executiveTakeaways] 在经常性结账工作流实现标准化之前，早期诊断更偏服务密集型。"
  - id: A10
    name: "招聘时间表"
    value: "第 1 月创始人与创始工程师已到位；第 1 月产品/合规负责人；第 4 月解决方案工程师；第 9 月合作伙伴负责人；第 15 月第二名工程师；第 19 月财务运营/行政；第 25 月第二名解决方案工程师"
    unit: "timeline"
    source: "[BP team + BP strategicChoices.sequencingRationale + startup-finance heuristic] 招聘以产品和交付为先，因为客户名单集中、实施质量是主要瓶颈风险。"
  - id: A11
    name: "创始人全成本现金薪酬"
    value: "$72K"
    unit: "USD/FTE/year"
    source: "[startup-finance heuristic: India-based pre-seed enterprise software founder cash pay] 精简的创始人薪酬，与 BP team 及 GTM 中创始人主导销售的定位一致。"
  - id: A12
    name: "工程全成本现金薪酬"
    value: "$100K"
    unit: "USD/FTE/year"
    source: "[startup-finance heuristic: India-based senior enterprise data / rules-engine engineer] 薪酬水平反映高集成强度的产品工作，未假设按美国水平定薪。"
  - id: A13
    name: "产品/合规全成本现金薪酬"
    value: "$85K"
    unit: "USD/FTE/year"
    source: "[BP team product/compliance lead + startup-finance heuristic] 该岗位兼顾领域转译、规则编写和客户异常设计。"
  - id: A14
    name: "解决方案工程全成本现金薪酬"
    value: "$72K"
    unit: "USD/FTE/year"
    source: "[BP team solutions engineer + startup-finance heuristic] 反映台账映射和导出等部署密集型技术工作的定薪水平。"
  - id: A15
    name: "销售/合作伙伴全成本现金薪酬"
    value: "$90K"
    unit: "USD/FTE/year"
    source: "[BP team partnerships lead + BP gtm.channels + startup-finance heuristic] 包含面向集中企业客户名单的浮动薪酬和差旅费用。"
  - id: A16
    name: "行政/财务运营全成本现金薪酬"
    value: "$54K"
    unit: "USD/FTE/year"
    source: "[BP operations + startup-finance heuristic] 覆盖精简财务、供应商管理，以及经常性结账启动后的客户账单支持。"
  - id: A17
    name: "薪酬在损益表科目间的分摊"
    value: "创始人 70% 销售与市场 / 30% 行政；工程 100% 研发；产品/合规 85% 研发 / 15% 行政；解决方案 50% 销售与市场 / 50% 研发；销售 100% 销售与市场；财务运营 100% 行政"
    unit: "allocation"
    source: "[BP team rationales + BP operations] 薪酬按模型中使用的运营职能分摊。"
  - id: A18
    name: "非薪酬运营支出爬升"
    value: "第 1 年初约每月 1.2 万美元，升至第 3 年末约每月 3 万美元"
    unit: "USD/month"
    source: "[BP operations + startup-finance heuristic] 覆盖云服务、法务、差旅、合规工具和实施支持，不假设有大规模付费营销投入。"
  - id: A19
    name: "现金换算惯例"
    value: "现金变动等于 EBITDA"
    unit: "formula"
    source: "[startup-finance heuristic] 在此阶段，资本开支、税费、债务偿还和营运资金时点差异，相对经营性烧钱假设为不重大。"
  - id: A20
    name: "单位经济模型月流失率"
    value: "2.0%"
    unit: "percent per month"
    source: "[Research openQuestions + BP investorMemo.mustBeTrue] 一旦嵌入月度结账，这项工作流理应有很强粘性，但由于上诉悬而未决期间买家可能仍偏好托管式审计材料包，模型保持保守。"
  - id: A21
    name: "CAC 换算惯例"
    value: "以第 2-3 年销售与市场支出除以 4 个净新增付费组合计算，得 14.56 万美元"
    unit: "USD/customer"
    source: "[Model calc + BP gtm.funnelTargets] CAC 从第 1 年之后开始计算，因为第 1 年的支出主要是创始人教育和共创客户投入，而非可复制的获客活动。"
  - id: A22
    name: "融资轮规模的达成里程碑"
    value: "第 3 年第 4 季度前拿下 6 个付费平台—邦组合、约 150 万美元退出期 ARR、一套已上线的拉贾斯坦邦式模板，以及至少 30% 合作方来源的合格销售管道"
    unit: "milestone"
    source: "[BP milestones 24–36 months + Research market.som + model cash curve] 这一轮融资的规模，是为了在不假设提前完成种子轮融资的情况下，跑通完整的第 3 年切口验证。"
