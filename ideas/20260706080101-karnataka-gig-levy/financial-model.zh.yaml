scenarios:
  downside:
    description: "上诉持续拖延，一个诊断只停留在托管服务阶段，第二邦推广延后两个季度。"
    y3RevenueK: 915.0
    y3EbitdaK: -392.0
    cashLowPointK: 85.0
    keyAssumptionChanges:
      - "第 3 年第 4 季度末为 5 个付费平台—邦组合，而非 6 个。"
      - "由于第二邦和高级工作流较晚接入，退出期混合年化每组合收入停留在约 22.5 万美元，而非 25 万美元。"
      - "由于审计材料包支持仍偏人工，毛利率退出时约为 68%，而非 72%。"
  base:
    description: "第 1 年的两个诊断转化为经常性结账工作流，公司在第 2 年第 4 季度拿到 4 个付费组合，第 3 年第 4 季度拿到 6 个，一套第二邦模板上线。"
    y3RevenueK: 1174.0
    y3EbitdaK: -148.8
    cashLowPointK: 559.7
    keyAssumptionChanges:
      - "付费平台—邦组合数从第 1 年退出时的 2 个，增长到第 2 年第 4 季度的 4 个，再到第 3 年第 4 季度的 6 个。"
      - "混合年化每组合收入从第 1 年诊断密集期水平，随着经常性结账和一个第二邦模块的接入，升至第 3 年第 4 季度的约 25 万美元。"
      - "毛利率从第 1 年的 50%-60%，随着规则引擎和导出流程标准化，爬升至第 3 年第 4 季度的约 72%。"
  upside:
    description: "法院紧迫性保持高位，第二个邦提前落地，合作方转介比计划更早开始贡献业绩。"
    y3RevenueK: 1398.0
    y3EbitdaK: 42.0
    cashLowPointK: 640.0
    keyAssumptionChanges:
      - "第 3 年第 4 季度末为 7 个付费平台—邦组合，而非 6 个。"
      - "随着第二邦模块和高级情景规划更快接入，退出期混合年化每组合收入升向约 27 万美元。"
      - "随着异常处理变得可复制、无需额外交付投入，毛利率退出时接近 74%。"
sensitivity:
  - variable: "ARPU"
    downsideCase: "退出期混合年化每组合收入停滞在约 22.5 万美元。"
    baseCase: "退出期混合年化每组合收入达到约 25 万美元。"
    upsideCase: "随着模块接入更快，退出期混合年化每组合收入达到约 27 万美元。"
    y3RevenueImpactK: -120.0
    cashImpactK: -95.0
  - variable: "CAC"
    downsideCase: "若诊断需要更多高层教育、合作方转介仍然疲弱，CAC 升向 18 万美元。"
    baseCase: "以第 2-3 年销售与市场支出除以 4 个净新增付费组合计算，CAC 为 14.56 万美元。"
    upsideCase: "若律师和 ERP 转介能带动大部分销售管道，CAC 降向 12 万美元。"
    y3RevenueImpactK: -35.0
    cashImpactK: -140.0
  - variable: "流失率"
    downsideCase: "若买家继续把产品当作项目模式使用，月流失率升至 3.0%。"
    baseCase: "一旦工作流嵌入月度结账，月流失率维持在 2.0%。"
    upsideCase: "随着多邦依赖加深，月流失率降向 1.5%。"
    y3RevenueImpactK: -60.0
    cashImpactK: -50.0
  - variable: "销售周期"
    downsideCase: "在上诉仍悬而未决期间，诊断转年度合同的周期拉长约一个季度。"
    baseCase: "一轮申报周期足以把最优质的诊断转化为经常性结账合同。"
    upsideCase: "参考客户案例把转化周期压缩约一个季度。"
    y3RevenueImpactK: -160.0
    cashImpactK: -145.0
  - variable: "毛利率"
    downsideCase: "由于审计材料包支持仍偏人工，退出期毛利率停滞在约 68%。"
    baseCase: "随着规则和导出标准化，退出期毛利率达到约 72%。"
    upsideCase: "随着异常处理更加自动化，退出期毛利率达到约 74%。"
    y3RevenueImpactK: 0.0
    cashImpactK: -85.0
  - variable: "招聘节奏"
    downsideCase: "在拿到 4 个付费客户之前，就提前招聘第二名交付人员和一名额外的市场进入人员。"
    baseCase: "招聘上限保持在第 3 年第 4 季度前 8 名全职员工，并遵循 BP 的先后顺序逻辑。"
    upsideCase: "第 3 年末的一次延迟交付招聘，可以等到第 6 家客户签下之后再进行，也不影响服务水平。"
    y3RevenueImpactK: 20.0
    cashImpactK: -110.0
modelDiagram:
  title: "单位经济模型流程"
  mermaid: |
    flowchart LR
      TargetAccounts[Target accounts] --> PaidDiagnostics[Paid diagnostics]
      PaidDiagnostics --> RecurringClose[Recurring close contracts]
      RecurringClose --> MultiState[Second-state and premium modules]
      MultiState --> Revenue[Revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash and runway]
modelSanity:
  - checkName: "收入引擎"
    finding: "基准情形收入来自把付费平台—邦组合数，从第 1 年退出时的 2 个，增长到第 3 年第 4 季度的 6 个，同时随着诊断转化为经常性结账和第二邦工作，每组合已确认年化收入升向约 25 万美元。"
  - checkName: "必须做对的事"
    finding: "诊断项目必须在一轮申报周期内转化为经常性月度结账合同，否则这个切口就会变成一个服务型小生意，而不是软件业务。"
  - checkName: "模型崩溃的条件"
    finding: "如果上诉拖延紧迫性太久，导致第 3 年第 4 季度末只剩 5 个付费组合、毛利率低于 68%，下行情形会几乎耗尽现金并被迫暂停招聘。"
  - checkName: "下一轮融资的证明"
    finding: "最有力的种子轮叙事是：6 个付费平台—邦组合、约 150 万美元退出期 ARR、一套已上线的拉贾斯坦邦模板，以及至少 30% 合作方来源的合格销售管道。"
sanityChecks:
  ruleOf40: "第 3 年增速 75.5% + EBITDA 利润率 -12.7% = 62.8%。"
  burnMultiple: "净烧钱倍数从第 2 年约 0.8 倍改善到第 3 年约 0.2 倍（按退出期 ARR 增速计算）；这个指标看起来健康，但也得益于起始收入基数非常小。"
  revenuePerFte: "按第 3 年第 4 季度 8 名全职员工计算，第 3 年人均收入为 14.68 万美元（对标 SaaS 行业约 20 万-40 万美元的常见区间）。"
  flags:
    - "自下而上测算的融资需求低于 BP 中较粗略的 200 万-400 万美元区间；在多邦验证跑通之前就按更高区间花钱，稀释速度会快过学习速度。"
    - "由于公司在一个仍然集中的 6 家客户市场里提前配置了监管和交付产能，人均收入低于典型 SaaS 基准。"
    - "customersEop 统计的是付费平台—邦组合，因此第 3 年相当一部分价值仍依赖把现有客户扩展到第二邦或高级模块，而不仅仅是新增客户数。"
    - "现金是按 EBITDA 建模的，未考虑回款时点、预付的安全或合规工作，以及任何资本化的产品开发投入。"
