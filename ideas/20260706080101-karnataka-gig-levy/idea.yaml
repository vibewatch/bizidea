topRisks:
  - name: Regulatory whiplash
    description: "Appeals, rule amendments, or ambiguous definitions could change the contribution base or remittance path after customers implement."
    mitigation: "Keep the product policy-configurable, version every rule set, and start with accrual and audit workflows that remain useful even if remittance mechanics change."
  - name: In-house build pressure
    description: "Large platforms may try to solve the first Karnataka workflow with internal data and finance teams instead of buying software."
    mitigation: "Win on speed by shipping connectors, remittance templates, and multi-state scenario tools that internal teams would take quarters to assemble."
  - name: Narrow early market
    description: "Only a limited set of Indian platforms feel immediate pain today, which can constrain early logo count and concentrate revenue."
    mitigation: "Land the biggest Karnataka-exposed operators first, then broaden into home services, logistics, staffing, and payment-partner channels as similar rules spread."
