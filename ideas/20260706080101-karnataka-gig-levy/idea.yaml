jobsToBeDone:
  - job: >-
      When Karnataka welfare deposits come due, help our finance and compliance team calculate liability across
      completed, cancelled, and refunded transactions, so we can deposit on time and defend every figure in court or to
      regulators.
    currentAlternative: "Custom SQL pulls, spreadsheet tie-outs, and legal review over emailed CSVs"
    successMetric: "Hours to produce a deposit-ready file and number of unresolved transaction exceptions"
