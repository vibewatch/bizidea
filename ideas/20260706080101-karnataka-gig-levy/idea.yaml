problem: >-
  Indian food-delivery and ride-hailing platforms already reconcile GST, commissions, incentives, refunds, and worker
  payouts, but they rarely keep a filing-grade ledger that maps each trip or order to a state-specific worker-welfare
  contribution. Karnataka's 1% transaction levy creates immediate exposure because liability changes with cancellations,
  promo adjustments, and service mix while legal, finance, and engineering teams read from different systems. If more
  states copy the model, every launch or pricing change becomes a remittance and audit problem, not just a policy
  update.
targetUser:
  primary: "Head of finance operations or compliance at an Indian food-delivery or ride-hailing platform with Karnataka transaction volume"
  secondary: "Payments or platform-engineering lead responsible for the order ledger, refund logic, and worker payout data"
  buyer: "CFO, VP Finance, or chief legal/compliance officer"
startupThesis:
  nonObviousInsight: >-
    The hard problem is not paying one more fee; it is proving which transactions created the fee, which ones were
    reversed, and how the money moved under each state's rule. Once worker welfare is assessed at the transaction layer
    and can be court-deposited on deadline, the missing system is a labor-contribution ledger that sits between
    marketplace order flow and finance close, not a generic HR or payroll tool.
  beachhead: >-
    Indian food-delivery and ride-hailing platforms processing more than 100,000 monthly Karnataka transactions, with
    separate order, refund, and payout ledgers and active plans to expand or defend operations across multiple Indian
    states
  wedge: >-
    A read-only welfare levy ledger that ingests orders, rides, refunds, and payouts, computes state-specific gig-worker
    contributions per transaction, and generates remittance-ready audit packs for court deposits and state remittance
    accounts
  whyNowCatalyst: >-
    Karnataka's court-backed three-week deposit deadline and its 1% transaction-based levy force platforms to ship
    auditable remittance workflows now, before similar rules appear in other states.
  ventureScalePath: >-
    Start with Karnataka-exposed gig platforms, then expand into a broader labor-contribution operating system for
    marketplaces, logistics networks, staffing apps, and payment partners as Indian states and other markets add
    portable-benefits, insurance, or worker-welfare remittance rules.
solution: >-
  The product plugs into order management, payment, and payout systems to create a single liability ledger for every
  Karnataka transaction that may trigger a welfare contribution. It tracks gross amount, category, worker assignment,
  promo adjustments, cancellations, and refunds, then applies the state's rule set to calculate what is accrued,
  disputed, deposited, and still outstanding. Finance teams get remittance files, deposit schedules, and an auditable
  trail that explains every figure back to the source transaction instead of stitching SQL pulls into legal memos.
  Product and strategy teams can model how a fee pass-through, pricing change, or state launch would change contribution
  expense before rollout. Over time, the same control plane becomes the rule engine for multi-state worker-welfare,
  insurance, and portable-benefits obligations.
goToMarketSeed:
  firstCustomer: >-
    A Bengaluru- or Mumbai-based food-delivery platform processing at least 500,000 Karnataka orders per month and
    preparing its first court-directed welfare-contribution deposit while finance and legal teams still reconcile
    liability in spreadsheets
  buyingTrigger: >-
    A court or regulator deposit deadline, a new Karnataka launch or category expansion, or another Indian state
    proposing a transaction-based gig-worker contribution
  currentAlternative: "Internal SQL and BI reports, spreadsheet accruals, outside counsel, and manual bank or court remittance workflows"
  switchingReason: >-
    The ledger reaches filing-grade answers faster than an internal build because it handles refunds, category
    exceptions, and rules changes in one auditable workflow that finance, legal, and engineering can all trust.
  pricingHypothesis: "Annual subscription priced by active states and liable transaction volume, plus implementation for order-ledger mapping and remittance workflow setup"
