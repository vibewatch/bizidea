  searchedQueries:
  - List authoritative primary and reputable recent sources on the Karnataka Platform Based Gig Workers Act 2025, the welfare fee notification, the 2025 Rules, and the 2026 Karnataka High Court challenge by aggregators.
  - List authoritative sources on the Code on Social Security 2020 treatment of gig and platform workers, plus Indian state-level gig worker social security laws such as Rajasthan and Karnataka.
  - List authoritative and recent sources on the size and growth of India’s gig economy, food delivery, ride-hailing, quick commerce, and platform work.
  - List primary sources and reputable reporting on Swiggy, Eternal/Zomato, Rapido, Zepto, and other Indian gig platforms that reveal transaction scale, worker base, or regulatory exposure.
  - List direct official or primary URLs for Indian tax and compliance product pages relevant to e-commerce and labor compliance.
  - List authoritative sources on Indian e-commerce or platform tax and payout compliance workflows including GST, TCS, TDS, refunds, and remittance obligations.
  - Find direct URLs for recent reputable coverage and primary sources on platforms challenging the Karnataka gig workers law in the Karnataka High Court.
  - Find direct URLs for the Karnataka gig workers welfare fee notification, including pages that show the 1% rate, caps, remittance schedule, and covered categories.
  - Find direct official or high-quality URLs for the Rajasthan Platform Based Gig Workers Registration and Welfare Act 2023 and implementation sources.
  - Find accessible official Indian government URLs on GST for e-commerce operators, section 194-O guidance, e-Shram registration, and e-invoicing.
