  validationPlan:
  - priority: high
    question: What exact treatment will Karnataka require for cancellations, partial refunds, promos, and payout reversals when computing the welfare fee base?
    evidenceToGather: Primary notification text, any court order language, and reconciliation examples from two affected platforms.
  - priority: high
    question: 'Who actually owns the budget line for a first deployment: CFO, compliance head, payments leader, or data platform owner?'
    evidenceToGather: Ten buyer interviews across food delivery, mobility, and logistics platforms plus one paid design-partner diagnostic.
  - priority: medium
    question: 'Which adjacent categories beyond food delivery and ride-hailing feel the pain next: logistics, e-marketplaces, or professional services?'
    evidenceToGather: Five operator calls and one state-by-state category matrix using Karnataka and Rajasthan coverage definitions.
  - priority: low
    question: Do partner-led sales via labour advisors and ERP or payroll vendors close faster than direct founder-led sales?
    evidenceToGather: Three referral pilots with concrete success fees, implementation roles, and cycle-time data.
