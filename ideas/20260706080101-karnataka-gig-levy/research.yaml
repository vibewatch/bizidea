openQuestions:
- Will Karnataka treat cancellations, partial refunds, and promotional adjustments as immediate fee reversals or as later reconciliation items?
- How much of the first budget will sit in software versus external counsel or managed-service support before appeals settle?
- 'Which adjacent categories beyond food delivery and ride-hailing feel the pain next: logistics, e-marketplaces, or professional services?'
- How quickly will other Indian states copy transaction-level gig-worker levies instead of relying on the central code’s turnover-linked contribution model?
