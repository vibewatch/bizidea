slug: "gig-welfare-remittance-ledger"
date: "2026-07-06"
currency: USD
modelStartMonth: "2026-08"
assumptions:
  - id: A1
    name: "Model start month"
    value: "2026-08"
    unit: "YYYY-MM"
    source: "[BP date 2026-07-06] the financial model starts in the first full month after the dated business plan."
  - id: A2
    name: "Opening cash / pre-seed ask"
    value: "$1.5M"
    unit: "USD"
    source: "[BP fundingAsk targetFundingRangeUsd $2–4M + model cash curve] the bottom-up plan supports a smaller round than the rough BP range because the company stays India-first, ends Y3 at 8 FTE, and still reaches the 6-logo SOM milestone with buffer."
  - id: A3
    name: "Starting paying platform-state combinations"
    value: "0"
    unit: "count"
    source: "[BP milestones 0–12 months + BP investorMemo.firstCustomer] the company starts pre-revenue and must first win paid diagnostics."
  - id: A4
    name: "Customer definition"
    value: "One paying platform-state combination, whether still in diagnostic, pilot, or annual recurring close mode."
    unit: "definition"
    source: "[BP businessModel.unitOfValue + BP gtm.pricing] customersEop counts the monetized platform-state workflow rather than an individual legal entity or seat."
  - id: A5
    name: "Early diagnostic revenue realization"
    value: "$16K per active paying combo per month in first paid diagnostic months"
    unit: "USD/customer/month"
    source: "[BP gtm.pricing $40k-$75k diagnostic over 6–8 weeks + BP investorMemo.firstCustomer.initialContract] the model spreads early paid work conservatively rather than recognizing the high end of project fees upfront."
  - id: A6
    name: "Exit blended annual revenue per paying combo"
    value: "$250K annualized in Q4Y3"
    unit: "USD/customer/year"
    source: "[Research market.som 6 reachable logos x $250k ACV = ~$1.5M + BP pricing $150k-$250k annual subscription] the exit ARPU sits at the top of the recurring range once monthly close and one second-state module are live."
  - id: A7
    name: "Customer ramp"
    value: "1 by M6, 2 by M10, 4 by Q4Y2, and 6 by Q4Y3"
    unit: "customersEop"
    source: "[BP milestones 0–12, 12–24, and 24–36 months + Research market.som] the ramp follows 2 paid diagnostics in Y1, 3–4 paying logos by Y2, and 6 by year 3."
  - id: A8
    name: "Revenue recognition convention"
    value: "Period-end paying platform-state combinations multiplied by the blended realized monthly revenue per combo in that period"
    unit: "formula"
    source: "[BP gtm.pricing + BP businessModel.unitOfValue] this keeps reported revenue directly reconcilable to customersEop times blended ARPU."
  - id: A9
    name: "Gross margin ramp"
    value: "50-60% in Y1, 61-68% in Y2, and 69-72% in Y3"
    unit: "gross margin percent"
    source: "[BP businessModel.targetGrossMarginPct 70 + BP strategicChoices.sequencingRationale + Research reportMemo executiveTakeaways] early diagnostics are service-heavy before the recurring close workflow becomes more standardized."
  - id: A10
    name: "Hiring timeline"
    value: "M1 founder and founding engineer already active; M1 product/compliance lead; M4 solutions engineer; M9 partnerships lead; M15 second engineer; M19 finance ops / G&A; M25 second solutions engineer"
    unit: "timeline"
    source: "[BP team + BP strategicChoices.sequencingRationale + startup-finance heuristic] hiring stays product and delivery first because the logo universe is concentrated and implementation quality is the gating risk."
  - id: A11
    name: "Founder loaded cash compensation"
    value: "$72K"
    unit: "USD/FTE/year"
    source: "[startup-finance heuristic: India-based pre-seed enterprise software founder cash pay] lean founder compensation is consistent with founder-led selling in BP team and GTM."
  - id: A12
    name: "Engineering loaded cash compensation"
    value: "$100K"
    unit: "USD/FTE/year"
    source: "[startup-finance heuristic: India-based senior enterprise data / rules-engine engineer] compensation reflects integration-heavy product work without assuming U.S.-level pay."
  - id: A13
    name: "Product / compliance loaded cash compensation"
    value: "$85K"
    unit: "USD/FTE/year"
    source: "[BP team product/compliance lead + startup-finance heuristic] the role combines domain translation, rule authoring, and customer exception design."
  - id: A14
    name: "Solutions engineering loaded cash compensation"
    value: "$72K"
    unit: "USD/FTE/year"
    source: "[BP team solutions engineer + startup-finance heuristic] reflects deployment-heavy technical talent for ledger mapping and exports."
  - id: A15
    name: "Sales / partnerships loaded cash compensation"
    value: "$90K"
    unit: "USD/FTE/year"
    source: "[BP team partnerships lead + BP gtm.channels + startup-finance heuristic] includes variable compensation and travel for a concentrated enterprise account list."
  - id: A16
    name: "G&A / finance ops loaded cash compensation"
    value: "$54K"
    unit: "USD/FTE/year"
    source: "[BP operations + startup-finance heuristic] covers lean finance, vendor management, and customer billing support once recurring close begins."
  - id: A17
    name: "Payroll allocation to P&L lines"
    value: "Founder 70% S&M / 30% G&A; engineering 100% R&D; product/compliance 85% R&D / 15% G&A; solutions 50% S&M / 50% R&D; sales 100% S&M; finance ops 100% G&A"
    unit: "allocation"
    source: "[BP team rationales + BP operations] payroll is mapped into the operating functions used in the model."
  - id: A18
    name: "Non-payroll opex ramp"
    value: "About $12K per month in early Y1 rising to about $30K per month in late Y3"
    unit: "USD/month"
    source: "[BP operations + startup-finance heuristic] covers cloud, legal, travel, compliance tooling, and implementation support without assuming a broad paid-marketing engine."
  - id: A19
    name: "Cash conversion convention"
    value: "Cash movement equals EBITDA"
    unit: "formula"
    source: "[startup-finance heuristic] capex, taxes, debt service, and working-capital timing are assumed immaterial relative to the operating burn at this stage."
  - id: A20
    name: "Monthly churn for unit economics"
    value: "2.0%"
    unit: "percent per month"
    source: "[Research openQuestions + BP investorMemo.mustBeTrue] once embedded in monthly close, the workflow should be sticky, but the model stays conservative because buyers may still prefer managed audit packs while appeals remain live."
  - id: A21
    name: "CAC convention"
    value: "$145.6K using Y2-Y3 sales and marketing spend divided by 4 net new paying combos"
    unit: "USD/customer"
    source: "[Model calc + BP gtm.funnelTargets] CAC is measured after Y1 because Y1 spend is mostly founder education and design-partner work rather than repeatable acquisition."
  - id: A22
    name: "Funding milestone for round sizing"
    value: "Reach 6 paying platform-state combinations, roughly $1.5M exit ARR, one live Rajasthan-style template, and at least 30% partner-sourced qualified pipeline by Q4Y3"
    unit: "milestone"
    source: "[BP milestones 24–36 months + Research market.som + model cash curve] the round is sized to reach the full year-3 wedge proof without assuming an earlier seed close."
