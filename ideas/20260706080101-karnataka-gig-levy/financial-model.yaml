scenarios:
  downside:
    description: "Appeals drag out, one diagnostic stays managed-service only, and the second-state rollout slips by two quarters."
    y3RevenueK: 915.0
    y3EbitdaK: -392.0
    cashLowPointK: 85.0
    keyAssumptionChanges:
      - "Q4Y3 ends with 5 paying platform-state combinations instead of 6."
      - "Exit blended annual revenue per combo stays near $225K instead of $250K because second-state and premium workflow attach later."
      - "Gross margin exits near 68% instead of 72% as audit-pack support remains more manual."
  base:
    description: "Two Y1 diagnostics convert into recurring close workflows, the company reaches 4 paying combos by Q4Y2 and 6 by Q4Y3, and one second-state template goes live."
    y3RevenueK: 1174.0
    y3EbitdaK: -148.8
    cashLowPointK: 559.7
    keyAssumptionChanges:
      - "Paying platform-state combinations grow from 2 at Y1 exit to 4 at Q4Y2 and 6 at Q4Y3."
      - "Blended annual revenue per combo rises from diagnostic-heavy Y1 levels to about $250K at Q4Y3 as recurring close and one second-state module attach."
      - "Gross margin ramps from 50-60% in Y1 to about 72% by Q4Y3 as the rules engine and export workflow standardize."
  upside:
    description: "Court urgency stays high, a second state lands earlier, and partner referrals contribute sooner than planned."
    y3RevenueK: 1398.0
    y3EbitdaK: 42.0
    cashLowPointK: 640.0
    keyAssumptionChanges:
      - "Q4Y3 ends with 7 paying platform-state combinations instead of 6."
      - "Exit blended annual revenue per combo rises toward $270K as second-state modules and premium scenario planning attach faster."
      - "Gross margin exits near 74% as exception handling becomes repeatable with little extra delivery spend."
sensitivity:
  - variable: "ARPU"
    downsideCase: "Exit blended annual revenue per combo stalls near $225K."
    baseCase: "Exit blended annual revenue per combo reaches about $250K."
    upsideCase: "Exit blended annual revenue per combo reaches about $270K with faster module attach."
    y3RevenueImpactK: -120.0
    cashImpactK: -95.0
  - variable: "CAC"
    downsideCase: "CAC rises toward $180K if diagnostics take more executive education and partner referrals stay weak."
    baseCase: "CAC is $145.6K using Y2-Y3 S&M spend per 4 net new paying combos."
    upsideCase: "CAC falls toward $120K if counsel and ERP referrals warm most of the pipeline."
    y3RevenueImpactK: -35.0
    cashImpactK: -140.0
  - variable: "churn"
    downsideCase: "Monthly churn rises to 3.0% if buyers keep the product in project mode."
    baseCase: "Monthly churn holds at 2.0% once the workflow sits inside monthly close."
    upsideCase: "Monthly churn falls toward 1.5% as multi-state dependence deepens."
    y3RevenueImpactK: -60.0
    cashImpactK: -50.0
  - variable: "sales cycle"
    downsideCase: "Diagnostic-to-annual conversion stretches by roughly one quarter while appeals remain live."
    baseCase: "One filing cycle is enough to convert the best diagnostics into recurring close contracts."
    upsideCase: "Reference customers compress conversion by about one quarter."
    y3RevenueImpactK: -160.0
    cashImpactK: -145.0
  - variable: "gross margin"
    downsideCase: "Exit gross margin stalls near 68% because audit-pack support stays manual."
    baseCase: "Exit gross margin reaches about 72% with standardized rules and exports."
    upsideCase: "Exit gross margin reaches about 74% as exception handling gets more automated."
    y3RevenueImpactK: 0.0
    cashImpactK: -85.0
  - variable: "hiring pace"
    downsideCase: "A second delivery hire and an extra GTM hire are pulled forward before 4 paying logos are live."
    baseCase: "Hiring stays capped at 8 FTE through Q4Y3 and follows the BP sequencing logic."
    upsideCase: "One late-Y3 delivery hire can wait until after the sixth logo without hurting service levels."
    y3RevenueImpactK: 20.0
    cashImpactK: -110.0
modelDiagram:
  title: "unit economics flow"
  mermaid: |
    flowchart LR
      TargetAccounts[Target accounts] --> PaidDiagnostics[Paid diagnostics]
      PaidDiagnostics --> RecurringClose[Recurring close contracts]
      RecurringClose --> MultiState[Second-state and premium modules]
      MultiState --> Revenue[Revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash and runway]
modelSanity:
  - checkName: "Revenue engine"
    finding: "Base-case revenue comes from growing paid platform-state combinations from 2 at Y1 exit to 6 by Q4Y3 while realized annual revenue per combo climbs toward about $250K as diagnostics convert into recurring close and second-state work."
  - checkName: "Must go right"
    finding: "Diagnostic projects must convert into recurring monthly-close contracts within one filing cycle or the wedge behaves like a services niche instead of software."
  - checkName: "Model breaks if"
    finding: "If appeals delay urgency long enough that Q4Y3 ends at 5 paying combos with gross margin below 68%, the downside case nearly exhausts cash and forces a hiring pause."
  - checkName: "Next-round proof"
    finding: "The strongest seed narrative is 6 paying platform-state combinations, roughly $1.5M exit ARR, one live Rajasthan template, and at least 30% partner-sourced qualified pipeline."
sanityChecks:
  ruleOf40: "Y3 growth 75.5% + EBITDA margin -12.7% = 62.8%."
  burnMultiple: "Net burn multiple improves from about 0.8x in Y2 to about 0.2x in Y3 using exit-ARR growth; the metric looks healthy, but it also benefits from a very small starting revenue base."
  revenuePerFte: "$146.8K Y3 using Q4Y3 headcount of 8 FTE (benchmark roughly $200–400K SaaS)."
  flags:
    - "The bottom-up ask lands below the BP’s rough $2–4M range; spending to that higher range before multistate proof would add dilution faster than it adds learning."
    - "Revenue per FTE stays below typical SaaS benchmarks because the company carries regulatory and delivery capacity ahead of a still-concentrated 6-logo market."
    - "customersEop counts paying platform-state combinations, so a meaningful share of Y3 value still depends on expanding existing logos into second-state or premium modules rather than just pure logo adds."
    - "Cash is modeled from EBITDA and ignores collection timing, prepaid security or compliance work, and any capitalized product development."
