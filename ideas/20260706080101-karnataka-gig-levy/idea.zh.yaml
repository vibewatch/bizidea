topRisks:
  - name: 监管反复
    description: "上诉、规则修订或定义模糊，可能在客户完成实施之后改变计税基数或汇缴路径。"
    mitigation: "让产品保持策略可配置，为每套规则集打版本号，并优先做计提和审计流程——即便汇缴机制发生变化，这些也仍然有用。"
  - name: 自建压力
    description: "大型平台可能试图用内部数据和财务团队解决第一轮卡纳塔克邦工作流，而不是采购软件。"
    mitigation: "靠速度取胜——提供连接器、汇缴模板和多邦情景工具，这些是内部团队要花上好几个季度才能拼凑出来的。"
  - name: 早期市场狭窄
    description: "目前只有有限数量的印度平台感受到迫切痛点，这会限制早期客户数量并让收入集中。"
    mitigation: "先拿下卡纳塔克邦敞口最大的运营商，再随着类似规则扩散，向家政服务、物流、灵活用工和支付合作渠道拓展。"
