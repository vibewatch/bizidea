problem: >-
  印度的食品配送和网约车平台早已在对账 GST、佣金、激励、退款和工人薪酬，但很少有一套达到申报级别的台账，能把每一单交易映射到某个邦的具体劳工福利缴费上。卡纳塔克邦按交易额 1% 计征的税费立刻带来风险敞口，因为取消订单、促销调整和服务品类变化都会改变应缴金额，而法务、财务和工程团队却各自读取着不同的系统。一旦更多邦效仿这套模式，每一次上线新城市或调整定价都会变成一场汇缴与审计难题，而不只是政策更新。
targetUser:
  primary: "在卡纳塔克邦有交易量的印度食品配送或网约车平台的财务运营或合规负责人"
  secondary: "负责订单台账、退款逻辑和工人薪酬数据的支付或平台工程负责人"
  buyer: "CFO、财务副总裁，或首席法务/合规官"
startupThesis:
  nonObviousInsight: >-
    真正难的不是多缴一笔费用，而是要证明究竟是哪些交易产生了这笔费用、哪些又被撤销了，以及资金在各邦规则下究竟是怎么流动的。一旦劳工福利在交易层面被计征、并且可以按期限向法院缴存，缺失的那块拼图就是一套介于市场订单流和财务结账之间的劳工缴费台账，而不是一个通用的人力资源或薪酬工具。
  beachhead: >-
    卡纳塔克邦月交易量超过 10 万单的印度食品配送和网约车平台——它们的订单、退款和薪酬各自独立成账，并且有明确计划要在印度多个邦扩张或维持业务
  wedge: >-
    一套只读的福利税费台账，摄入订单、行程、退款和薪酬数据，按交易计算各邦特定的零工工人缴费，并生成可直接用于法院缴存和邦级汇缴账户的汇缴就绪审计材料包
  whyNowCatalyst: >-
    卡纳塔克邦法院支持的三周缴存期限，加上按交易计征 1% 的税费，逼着各平台现在就要拿出经得起审计的汇缴流程——赶在其他邦出台类似规则之前。
  ventureScalePath: >-
    先从有卡纳塔克邦敞口的零工平台切入，再扩展成一套更广泛的劳工缴费操作系统，覆盖市场平台、物流网络、灵活用工应用和支付合作方——只要印度各邦及其他市场持续新增可携带福利、保险或劳工福利汇缴规则。
solution: >-
  该产品接入订单管理、支付和薪酬系统，为每一笔可能触发福利缴费的卡纳塔克邦交易建立单一的负债台账。它追踪交易总额、品类、工人归属、促销调整、取消和退款，然后套用该邦的规则集，算出已计提、有争议、已缴存和仍未结清的金额。财务团队得到的是汇缴文件、缴存计划，以及一条能把每个数字追溯回原始交易的可审计路径，而不必再把 SQL 查询拼凑成法律备忘录。产品和战略团队可以在正式推行前，先模拟费用转嫁、定价调整或新邦上线会如何改变缴费支出。随着时间推移，同一套控制平面还会演变成多邦劳工福利、保险和可携带福利义务的规则引擎。
goToMarketSeed:
  firstCustomer: >-
    一家总部位于班加罗尔或孟买、月订单量至少 50 万单的食品配送平台——它正准备完成第一笔法院责令的福利缴费，而财务和法务团队仍在用电子表格对账负债
  buyingTrigger: >-
    法院或监管机构的缴存期限、卡纳塔克邦的新上线或品类扩张，或另一个印度邦提出按交易计征的零工工人缴费
  currentAlternative: "内部 SQL 与 BI 报表、电子表格计提、外部律师，以及手工银行或法院汇缴流程"
  switchingReason: >-
    这套台账比内部自建更快达到申报级别的准确度，因为它把退款、品类例外和规则变化都收进同一个可审计流程里，财务、法务和工程都能信任。
  pricingHypothesis: "按已开通邦数和应税交易量定价的年度订阅，另加订单台账映射和汇缴流程搭建的实施费"
