jobsToBeDone:
  - job: >-
      每当卡纳塔克邦的福利缴存到期，帮助我们的财务和合规团队核算已完成、已取消和已退款交易的负债，从而能按时缴存，并在法院或监管机构面前站得住每一个数字。
    currentAlternative: "定制 SQL 查询、电子表格对账，以及对邮件 CSV 的法律审阅"
    successMetric: "生成一份可用于缴存的文件所需的时间，以及未解决的交易异常数量"
  - job: >-
      每当我们上线一座新城市、新品类或新邦，帮助产品和财务负责人预测缴费成本并配置正确的规则集，从而能正确定价而不拖延上线。
    currentAlternative: "一次性政策备忘录、电子表格里的影子模型，以及上线后的工程紧急修复"
    successMetric: "新监管市场的上线用时，以及毛利率相对上线前计划的偏差"
ideaScorecard:
  signalStrength:
    score: 4
    rationale: "该集群提供了具体的法院行动、期限和 1% 交易计征机制，但证据依赖一篇同日信源。"
  painIntensity:
    score: 4
