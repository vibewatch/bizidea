slug: radioligand-developability-os
date: '2026-07-05'
executiveSummary: 放射配体可开发性 OS 卖的是一层以中国为先的决策与工作流控制层，服务 20-80 人规模的放射药团队，帮助他们把第一款肽类或抗体诊疗一体化项目从命中分子筛选推进到 pre-IND 的 CMC 规划。研究支撑的痛点可信：发现、同位素选择、螯合剂设计、GMP 和中心就绪度分散在不同供应商和团队手里，所以项目往往太晚才发现可制造性或物流会出事。第一版产品应该是“解释优先”的软件：吃进靶向分子数据、同位素选项、供应商约束和中心要求后，对可行分支打分，并生成一份跨供应商的转化计划。首个滩头市场刻意做窄：只盯中国团队里计划做 Ga-68 或 Zr-89 影像、再接 Cu-64 或 Re-186 治疗分支的项目，因为这里最容易先把购买触发点、领域模板和合作网络跑通。GTM 必须卖“少返工、时间线前压”，由创始人主导销售，直打 CMC 或转化开发负责人，再靠 CDMO、同位素供应商和监管顾问转介绍。研究支持一个约 $4.6M 的中国首发 SAM 和第 3 年 $2.2M 的 SOM，但除非公司能证明部署可复制、并且能走出这一条首发工作流，否则还撑不起一个够宽的可投故事。核心运营风险在于：如果产品不能明显缩短决策周期、减少已重开的工作包，买方很可能更愿意让 CDMO 或顾问直接接管这套流程。预算归属和单个客户账户深度的证据仍缺，因此这家公司更适合按 pre-seed 验证项目来投，而不是按可扩张平台来押。
problem:
- 第一款放射药项目的团队，必须在数据没打通、供应商没对齐之前，就先决定靶向分子、同位素、螯合剂、GMP 路径和中心工作流，所以很多致命的可开发性问题，都是在湿实验和 CDMO 预算烧出去之后才浮上来。
- 当前替代方案——表格、顾问备忘录和按供应商拆开的项目计划——只能各自优化单个环节，管理层拿不到一份中立视角，看清不同分支之间的取舍，也看不清 pre-IND 就绪度。
solution:
- 提供一个供应商中立的工作台，吃进靶向分子、同位素、螯合剂、剂量学、GMP 和站点输入，给最可行的诊断-治疗分支打分，并标出在真正砸项目钱前必须补做的实验。
- 生成一份受治理的跨供应商转化计划，写清任务归属、关键路径里程碑和审计留痕，让发现、CMC、同位素供应商、CDMO 和首批中心都围着同一份项目模型干活。
whyWeWin:
- 通用 R&D 云平台在数字化实验数据，CDMO 在执行工作，但两边都不会替客户承担那个核心判断：这条放射配体路线在签执行合同前，到底能不能真正转化出来。
- 先盯一个分子类别、一个地域和一小组同位素，比一上来就做成大而全的 ELN、LIMS 或全球服务平台，更容易把规则和合作模板打磨到值得信。
- 每跑完一个真实项目，都会往专有数据集中再加一层：靶向分子-螯合剂-同位素结果、供应商约束和中心阻塞点，这些数据既能抬高赢单率，也能压缩部署时间。
strategicChoices:
  beachhead: 中国放射药初创公司和肿瘤生物技术公司，正把第一款肽类或抗体诊疗一体化资产从命中分子筛选推进到 pre-IND 的 CMC 规划；起步只围绕 Ga-68 或 Zr-89 影像分支，以及 Cu-64 或 Re-186 治疗延伸。
  wedgeRationale: 这块切片的购买触发点最清楚，内部放射药运营深度最弱，走错分支的代价也最高。比起直接卖给大药企管线、多区域项目，或需要更广本体覆盖和更长采购流程的 alpha 发射体工作流，这里更容易先做出证明。
  sequencingRationale: 第一步先做“解释优先”的评分、表格与报告接入，以及人工审核过的工作计划，因为历史结果数据太稀、又牵涉受监管信任，黑盒自动化在早期很难卖。等付费试点证明周期确实缩短后，再补合作模板和一两个高价值集成；只有当控制层真正被信任，才往更广的同位素覆盖和全球管线工作流扩。
  notYet:
  - 需要更宽同位素和监管本体覆盖的 alpha 发射体或多区域项目
  - 替换 ELN、LIMS 或 CDMO 执行系统
  - 把产品做成受监管生产的权威底账，例如自动放行、QA 签字等工作流
market:
  tam: $56.3M：估算基于约 300 家全球放射配体开发商、每家公司约 1.25 个符合条件的项目，以及每项目约 $150k 的年度工作流支出。
  sam: $4.6M：中国首发 SAM，估算基于约 100 家中国放射药公司，其中约 35% 符合小团队、首个项目、强依赖外部供应商的滩头画像，每家约 1.1 个符合条件的项目，年支出约 $120k。
  som: $2.2M：示意性的第 3 年 SOM，假设 8-10 家客户共跑 12 个活跃项目，每个活跃项目的混合年收入约 $180k。
  segments:
  - 主要：正在推进第一款肽类或抗体诊疗一体化项目的中国放射药初创公司和肿瘤生物技术公司
  - 次要：没有完整内部转化基础设施、但正新增放射诊断和放射治疗资产的项目经理及中型生物制药团队
  buyingProcess: 使用者冠军通常是 CMC 或转化开发负责人，而预算批准更可能落在首席开发官或放射药业务负责人手里，因为这笔钱要和 CDMO、同位素以及 pre-IND 里程碑预算竞争。交易最该在主力靶向分子敲定或 CDMO 与中心范围界定启动时切入，因为碎片化归属正是在那个节点最贵、也最容易被看见。
product:
  mvp: MVP 应该能为一条肽类或抗体项目接入表格、实验、CRO、CDMO 以及中心规划数据，对起始同位素和螯合剂分支做比较，最后吐出可开发性评分、必做实验清单和跨供应商转化计划，并且把任务归属写清楚。它必须保留人工在环、坚持解释优先，而不是一上来就承诺黑盒预测引擎，或替换受监管源系统。
  sixMonth: 交付付费试点：完成表格和报告接入、面向 Ga-68、Zr-89、Cu-64 与 Re-186 工作流的规则式分支评分、共享任务归属，以及可导出的 pre-IND 转化计划包。
  twelveMonth: 新增 2-3 家 CDMO 或同位素供应商的可复用模板、1 个高价值实验室平台集成、供应商基准比较，以及肽类与抗体格式的情景规划。
  twentyFourMonth: 扩成更广的放射药控制层：加入跨项目基准、中国以外模板、更宽的同位素覆盖，以及多条放射配体资产的组合规划。
  keyBets:
  - 客户会比黑盒预测模型更早信任“解释优先”的规则加专家复核。
  - 首批项目的数据结构足够相似，表格和报告接入能在深度 ELN 或 LIMS 集成前就被产品化。
  - Ga-68、Zr-89、Cu-64 和 Re-186 的覆盖，足以拿下滩头市场的第一年。
  - 在结果数据护城河完全建起来前，跨供应商转化规划就能先做出可量化 ROI。
gtm:
  wedge: 把首个付费产品卖成“第一款项目的可开发性 + 转化计划包”，面向刚敲定主力靶向分子、又需要在 CDMO、同位素和中心工作全面铺开前先抓住同一套决策系统的中国放射药团队。
  channels:
  - 创始人主导外呼，直打中国初创公司和肿瘤生物技术公司里的 CMC、转化开发和放射药项目负责人
  - 通过放射药投资人、孵化器、KOL 网络和监管顾问拿共创客户及转介绍交易
  - 和 CDMO、同位素供应商、核医学中心做顺带拉单型合作，因为它们最早能看到客户在下游签单前的规划碎片化
  funnelTargets: 目标账户→合格共创客户发现 20-30%；发现→付费试点 25-35%；付费试点→年度正式生产 50%+；正式生产→第 2 个项目或新地域扩展 30%+（12 个月内）。
  pricing: 先卖一个 8-12 周、价格约 $40k-$60k 的可开发性与转化计划试点；之后按每个活跃项目收取 $90k-$120k 年度订阅，再叠加上线费和里程碑评审费，把首年单项目混合收入抬到研究测算的 $120k-$180k 区间。按活跃项目而不是按 seat 定价，因为客户买的是更早的 no-go 决策、更少重开的工作包，以及更快拼出 pre-IND 包。
businessModel:
  revenueStreams:
  - 按活跃放射诊疗一体化项目收取年度订阅费
  - 上线与数据标准化费用
  - 按里程碑收费的可开发性评审和 IND 就绪工作计划费用
  unitOfValue: 纳入可开发性管理的活跃放射诊疗一体化项目
  targetGrossMarginPct: 70
  expansionLevers:
  - 在同一客户组合里加第 2、第 3 个资产
  - 从中国优先模板扩到中国以外的监管与中心就绪工作流
  - 随着结果数据集成熟，把合作方基准、供应商比较和更大的同位素库单独变现
strategyMap:
  northStarMetric: 在供应商范围界定之后，仍能不重开关键可开发性决策、并顺利拿到批准 pre-IND 转化计划的活跃客户项目数。
  inputMetrics:
  - 从敲定主力靶向分子到批准跨供应商转化计划的周数中位数
  - 所需的靶向分子、同位素和供应商输入里，有多少比例无需人工重录即可接入
  - 付费试点转正式年度生产的转化率
  - 每个活跃项目在 CDMO 或中心评审后被重开的关键工作包数量
  - 每次新部署可复用的合作模板数量
  moatsToBuild:
  - 和推进、重配方或砍项目决策绑定的靶向分子-螯合剂-同位素结果语料
  - 关于批次约束、物流失败模式和中心启动阻塞点的跨供应商基准数据
  - 先从中国做起、后续可外扩的监管与中心就绪模板库
  killCriteria:
  - 前 15 次 ICP 访谈里，若确认首个项目转化规划存在单独预算或里程碑预算的不足 5 家，就砍。
  - 前 2 个付费试点如果不能把批准 pre-IND 工作计划的时间至少缩短 30%，或至少少重开 1 个关键工作包，就砍。
  - 到第 18 个月，如果转成年度正式生产的客户不足 2 家，且首年单项目收入达不到至少 $120k，就说明这更像服务小生意，而不是软件公司。
  mermaid: |
    flowchart LR
      Wedge[China first-program wedge] --> MVP[Explanation-first developability MVP]
      MVP --> Proof[Faster pre-IND plans and fewer resets]
      Proof --> Expansion[Global radiopharma control layer]
investorMemo:
  verdict:
    call: Watch
    conviction: 痛点真实、时点也对，但在公司证明预算归属和高于服务项目的可复制软件部署前，信心仍该保持克制。
    whyBelieve: 研究显示一体化放射药全栈正在成形，买方痛点卡在真实的 pre-IND 瓶颈上，而直接做中立控制层的竞争还不拥挤。
    whyDoubt: 首发市场太小、替代方案不弱，而且还没有证据证明中国买方愿意单独为一层控制软件付费，而不是把工作一起塞进 CDMO 或顾问。
    nextDiligence: 拿下 2 个付费首发项目试点，证明转化计划批准速度至少提升 30%，再拿到 1-2 条会转介绍而不是抢活儿的合作渠道。
  firstCustomer:
    title: 一家中国放射药初创公司里，负责首个诊疗一体化项目的 CMC 负责人
    profile: 公司规模 20-80 人，手里有一款肽类或抗体肿瘤主力资产，内部没有完整的端到端放射药运营能力，董事会要求它在 12-18 个月内做到 pre-IND 就绪。
    trigger: 团队敲定主力靶向分子后才意识到，同位素选择、螯合剂设计、CDMO 排期和首个中心要求分散在不同人手里，而 IND 或 BD 里程碑近在眼前。
    buyer: 首席开发官或放射药业务负责人
    initialContract: 先签一个 8-12 周、约 $40k-$60k 的付费可开发性与转化计划试点；若顺利转正，再升级为每项目每年 $90k-$120k 的订阅，叠加上线和里程碑评审费用，把首年项目收入抬向 $120k-$180k。
  mustBeTrue:
  - 前 15 个合格的中国滩头账户里，至少 5 家要确认：首个项目的转化规划已经有明确预算负责人，不能继续留在临时表格里。
  - 前 2 个付费试点必须把从敲定主力靶向分子到批准 pre-IND 工作计划的时间至少压缩 30%。
  - 滩头市场所需决策输入里，至少 70% 能直接从现有表格、实验输出和供应商报告里接进来，而不必替换 ELN 或 LIMS。
  - 至少 2 家 CDMO 或同位素供应商愿意作为转介绍或模板合作伙伴加入，而不是逼公司去做白标服务。
  - 付费试点转年度正式生产的转化率至少要到 50%，且首年单项目收入不低于研究区间 $120k-$180k 的下沿。
  diligenceQuestions:
  - 中国到底有多少放射药公司真符合“首个项目、强依赖供应商”的画像，并且自己掌控 pre-IND 预算？
  - 真正最容易打开预算的 KPI 是什么：少返工、更快 no-go，还是少出制造与站点意外？
  - 在 CDMO 范围界定前，哪些最少决策输入一定拿得到，又是谁在掌握它们？
  - CDMO 和同位素供应商会愿意转介绍，还是会把相似的规划逻辑打包进自己的服务里？
  - 为了避免市场过早见顶，产品需要多快支持 alpha 发射体或中国以外工作流？
operatingAssumptions:
- assumption: 滩头买家可以直接从 pre-IND 项目预算里买这套产品，而不是走企业 IT 预算。
  basis: research.yaml
  validationTest: 跑 10 次从发现到提案的销售循环，确认至少 3 笔交易有明确的项目预算负责人，且销售周期低于 90 天。
  decisionImpact: 如果不成立，GTM 就得转向合作伙伴打包服务或更大的企业买家，软件优先的故事会明显变慢。
- assumption: 表格、CRO/CDMO 报告和实验结果接入，已经覆盖第一版产品所需的大部分数据。
  basis: research.yaml
  validationTest: 加载 4 个共创客户项目的真实材料，证明不替换源系统也能抓到至少 70% 的必填字段。
  decisionImpact: 如果不成立，路线图就得收窄到更小的工作流，或更早投入昂贵集成。
- assumption: Ga-68、Zr-89、Cu-64 和 Re-186 的覆盖，足够支撑前 12 个月的滩头市场销售。
  basis: idea.yaml
  validationTest: 拉一张 15 个账户的机会地图，确认至少 70% 的近期开工 ICP 项目都落在这组初始同位素范围内。
  decisionImpact: 如果不成立，公司必须更早补科学宽度，产品复杂度和招聘需求都会上升。
- assumption: CDMO 和同位素供应商更可能是渠道或互补方，而不是直接卡脖子的对手。
  basis: research.yaml
  validationTest: 拿到至少 3 次合作方沟通、2 份签好的转介绍或模板试点协议，以及 1 笔由合作方带来的合格商机。
  decisionImpact: 如果不成立，CAC 会更高，公司必须更依赖重直销。
- assumption: 每个活跃项目的首年收入能超过 $120k，同时仍保住软件型毛利结构。
  basis: operator judgment
  validationTest: 签下前 3 个付费部署，确认到第 3 位客户时，至少一半实施工作已经可复用，且毛利率正往 70% 逼近。
  decisionImpact: 如果不成立，公司要么收紧 ICP、要么提价，否则就只能接受更重服务的模式。
experimentRoadmap:
- horizon: 0-90 天
  experiment: 访谈 15 位中国目标账户里的 CMC、转化开发、项目管理和放射药负责人。
  hypothesis: 只要和活跃的 pre-IND 里程碑绑定，首个项目团队就愿意为一层中立的可开发性系统掏钱，而不是把它当成泛数字化支出。
  successMetric: 至少 6 次访谈确认预算负责人，且至少 2 个账户愿意把试点按付费项目来设计。
  owner: 创始人/CEO
- horizon: 0-90 天
  experiment: 从 2 条肽类项目和 2 条抗体项目里，收集并标准化真实表格、实验输出和供应商报告。
  hypothesis: 滩头市场存在一套可复用的数据模型，不需要先替换 ELN 或 LIMS。
  successMetric: 1 套 MVP 数据模式能覆盖 4 个样本项目里至少 70% 的必填字段。
  owner: 创始工程师
- horizon: 90-180 天
  experiment: 跑 2 个付费试点，为支持的同位素组合产出分支评分、必做实验和跨供应商 pre-IND 工作计划。
  hypothesis: 解释优先的评分加一份共享转化计划，能缩短审批周期，也能减少方案被重开。
  successMetric: 两个试点都交付出可引用的工作计划，且至少 1 个项目实现 30% 更快的方案批准，或少重开 1 个关键工作包。
  owner: 科学产品负责人
- horizon: 90-180 天
  experiment: 在 6 份活跃提案里测试定价，对比“按项目订阅”与“顾问式固定费用”两种包装。
  hypothesis: 只要试点绑定里程碑预算，买方就能接受按项目收取经常性软件订阅。
  successMetric: 至少 3 个合格潜在客户在试点后，把年度按项目定价作为首选商业模式。
  owner: 创始人/CEO
- horizon: 90-180 天
  experiment: 和 2 家 CDMO、1 家同位素供应商做模板或转介绍试点。
  hypothesis: 执行伙伴愿意合作，因为产品能减掉协调摩擦，又不抢它们后续收入。
  successMetric: 签下 3 份合作试点协议，并拿到 1 个由合作方带来的合格客户机会。
  owner: 创始人/CEO
- horizon: 180-360 天
  experiment: 上线 2 个正式部署，配套 1 个高价值实验室平台集成和一批可复用的合作模板。
  hypothesis: 少量连接器加合作模板，足以把部署周期压到 30 天以内，并保住软件型毛利。
  successMetric: 2 个正式部署都在 30 天内启动，并复用至少 50% 的既有工作流模板。
  owner: 方案与实施负责人
operations:
- 给每个评分、假设、源输入和人工批准留下一条受治理的审计链，让平台始终定位在决策支持，而不是黑盒自动化。
- 每次试点结束都做结构化复盘，把被砍分支、重配方、供应商阻塞点和中心就绪问题沉淀进规则库和基准库。
- 围绕每条已支持的同位素分支，维护一套合作模板库，覆盖 CDMO 交接、同位素供给约束和中心启动清单。
- 把系统边界说清楚：公司负责建议与协同，客户、CDMO、QA 负责人和站点仍对 GMP 执行、放行和监管申报负责。
team:
- role: 创始人/CEO
  startTiming: 第 0 个月
  rationale: 亲自抓 ICP 发现、创始人主导销售和合作谈判，因为预算归属和渠道行为仍是最大未知数。
- role: 创始工程师
  startTiming: 第 0 个月
  rationale: 搭核心数据模型、评分引擎、接入流水线和审计链，好支撑前几个付费试点。
- role: 科学产品负责人
  startTiming: 第 0-2 个月
  rationale: 把同位素、螯合剂、剂量学、GMP 和中心逻辑编码成值得信的解释优先规则，并牵头客户可开发性评审。
- role: 方案与实施负责人
  startTiming: 第 4-6 个月
  rationale: 把试点输出和合作模板沉淀成可复用部署，别让上线工作把工程团队拖垮。
- role: 合作拓展或客户经理
  startTiming: 第 9-12 个月
  rationale: 只有在公司拿到 2 个付费试点、1 个可引用正式客户，以及真的能带来商机的合作动作后，再放大商机池。
milestones:
- horizon: 0-12 个月
  items:
  - 完成 15-20 次 ICP 访谈，并拿下至少 2 个付费共创客户试点。
  - 交付 MVP：表格与报告接入、解释优先的分支评分，以及可导出的 pre-IND 转化计划包。
  - 签下至少 2 个 CDMO 或同位素模板合作伙伴，并把至少 1 个试点转成年度正式生产。
  - 做出第一个可引用案例，证明方案批准更快或返工被提前拦住。
- horizon: 12-24 个月
  items:
  - 在中国滩头市场做到 6-8 家付费客户或 8 个活跃项目，部署启动时间压到 30 天以内。
  - 上线 1 个高价值实验室平台集成、供应商基准比较，以及更完整的肽类与抗体情景规划。
  - 从第 2 个项目扩展里做出有意义的 ARR，并证明合作方带来的商机能进入合格商机池。
- horizon: 24-36 个月
  items:
  - 做到 8-10 家客户和 12 个活跃项目，与研究给出的第 3 年 SOM 情景保持一致。
  - 用中国优先的数据集做第一层护城河，再扩到中国以外模板和更宽的同位素覆盖。
  - 把自己坐实为中立的放射药控制层，而不是一家服务味太重的评审工作室。
risks:
- risk: 标准化结果数据太稀，早期的可开发性评分更像启发式，而不是决策级工具。
  likelihood: High
  impact: High
  mitigation: 先卖解释优先的规则、专家复核和结构化结果采集，不要过度承诺预测确定性。
- risk: 在软件证明独立 ROI 前，CDMO、顾问或内部项目经理就把这套流程吸收掉了。
  likelihood: High
  impact: High
  mitigation: 只卖给正在跑的首个项目里程碑，要求付费试点，并从第一批部署开始衡量方案批准更快、工作包重开更少。
- risk: 中国滩头市场可能比公司数量标题看起来更小、买得更慢。
  likelihood: Medium
  impact: High
  mitigation: 尽早画出实名账户地图，让现金消耗和共创客户证明同步，再只在中国转化数据可复制后才谈中国以外扩张。
- risk: 不同项目之间的监管、同位素和站点差异，会拖慢模板复用和产品毛利。
  likelihood: Medium
  impact: High
  mitigation: 首发只盯一个地域和一小组同位素，保留明确的人审步骤，等使用数据看清需求集中在哪，再扩本体。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: 用这笔钱撑 18 个月的产品研发、放射药领域招聘、4-6 个共创客户与正式部署、和 CDMO 及同位素供应商共建模板，再加创始人主导 GTM；目标是在扩张到更大地域前，先证明每项目软件收入可以复制。
