scenarios:
  downside:
    description: "Pilot-to-production conversion slips, partner referrals stay exploratory, and the company exits Y3 with only 10 active programs at lower ARPU and lower margin."
    y3RevenueK: 1554.0
    y3EbitdaK: -563.9
    cashLowPointK: 7.8
    keyAssumptionChanges:
      - "Blended annual ARPU falls to roughly $168K because onboarding and milestone-review fees attach less consistently."
      - "The active-program path exits Y3 at 10 instead of 12 because the sales cycle stretches toward 9 months and pilot conversion weakens."
      - "Steady-state gross margin tops out around 68-69% because more scientific review and implementation work remains services-like."
  base:
    description: "The narrow China-first wedge repeats, founder-led sales converts two pilots into production logos, and reusable partner templates push margin toward the 70% target by late Y2."
    y3RevenueK: 1890.0
    y3EbitdaK: -297.0
    cashLowPointK: 441.2
    keyAssumptionChanges:
      - "Blended annual ARPU holds at $180K, in line with the researched program-level spending range and SOM case."
      - "The model grows from 3 active programs at Y1 exit to 8 at Q4Y2 and 12 at Q4Y3, matching the business-plan milestone path."
      - "Gross margin rises from 60-65% in Y1 pilots to about 70-71% in Y3 as partner templates and workflow reuse reduce custom work."
  upside:
    description: "One CDMO or isotope partnership becomes a real channel, additions pull forward, and the business reaches 14 active programs while crossing into positive Y3 EBITDA."
    y3RevenueK: 2389.6
    y3EbitdaK: 104.3
    cashLowPointK: 1072.6
    keyAssumptionChanges:
      - "Blended annual ARPU rises to roughly $185K as production accounts buy more milestone reviews and second-program support."
      - "The active-program path exits Y3 at 14 because partner-sourced opportunities convert earlier than planned."
      - "Steady-state gross margin reaches roughly 72-73% because most onboarding work is template-driven by late Y2."
