modelDiagram:
  title: "unit economics flow"
  mermaid: |
    flowchart LR
      Accounts[ICP accounts] --> Pilots[Paid pilots]
      Pilots --> Programs[Active paid programs]
      Programs --> Revenue[Subscription and review-fee revenue]
      Revenue --> GrossProfit[Gross profit after scientific review and onboarding]
      GrossProfit --> Cash[Cash for product and GTM]
modelSanity:
  - checkName: "Revenue engine"
    finding: "Base-case revenue comes from growing from 3 to 12 active paid programs at roughly $180K blended ARPU, not from assuming broad ex-China platform revenue too early."
  - checkName: "Must go right"
    finding: "The first 6-8 active programs must share enough isotope, CDMO, and site-template structure that gross margin can rise from 60-65% in Y1 pilots to about 70% by late Y2."
  - checkName: "Model breaks if"
    finding: "If the sales cycle stretches toward 9 months or ARPU falls toward $165K, downside cash falls to roughly break-even on the current $2.2M pre-seed."
  - checkName: "Next-round proof"
    finding: "The next financing story is 8 active programs by Q4Y2, sub-30-day deployments, and at least one partner-sourced production path that validates the channel thesis."
sanityChecks:
  ruleOf40: "Y3 growth 85% + EBITDA margin -16% = 70%."
  burnMultiple: "Y2 burn multiple is roughly 0.9x on $735K of net new revenue, improving to about 0.3x in Y3 as template reuse and production conversions compound."
  revenuePerFte: "$236K Y3 on 8 ending FTE (benchmark roughly $200-400K vertical SaaS)."
  flags:
    - "The model exits Y3 at $1.89M of recognized revenue, still below the researched $2.2M SOM, because it does not assume broad ex-China expansion before proof."
    - "The business is still EBITDA-negative in Y3, so the next round depends on milestone proof and partner-led repeatability rather than near-term profitability."
    - "One lost production program would move revenue and cash materially because the beachhead remains concentrated at only 12 active programs by Y3."
    - "Gross margin only reaches the target range if scientific review and implementation work become template-driven by the third or fourth deployment."
