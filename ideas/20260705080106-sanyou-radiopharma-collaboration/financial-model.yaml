slug: "radioligand-developability-os"
date: "2026-07-05"
currency: USD
modelStartMonth: "2026-08"
assumptions:
  - id: "A1"
    name: "Model start month"
    value: "2026-08"
    unit: "YYYY-MM"
    source: "[business-plan.yaml date] first full operating month after the 2026-07-05 plan date."
  - id: "A2"
    name: "Opening cash after round close"
    value: "2200"
    unit: "USDK"
    source: "[business-plan.yaml fundingAsk.targetFundingRangeUsd; fundingAsk.runwayMonths] assumes a $2.2M pre-seed at the low end of the stated $2-4M range to fund roughly 18 months to proof plus a 6-month buffer."
  - id: "A3"
    name: "Revenue unit"
    value: "Active paid radiotheranostic program"
    unit: "definition"
    source: "[business-plan.yaml businessModel.unitOfValue; market.som] customersEop counts active paid programs because the plan prices and sizes value on a per-program basis."
  - id: "A4"
    name: "Blended annual ARPU per active program"
    value: "180"
    unit: "USDK/program-year"
    source: "[business-plan.yaml gtm.pricing; business-plan.yaml market.som; research.yaml bottomUpSizingDrivers] combines a $40K-$60K pilot, a $90K-$120K recurring program subscription, and milestone-review fees into the researched $120K-$180K per-program band, with $180K used as the steady-state blend."
  - id: "A5"
    name: "Y1 month-end active program path"
    value: "0, 0, 0, 1, 1, 2, 2, 2, 2, 3, 3, 3"
    unit: "active paid programs"
    source: "[business-plan.yaml milestones 0-12 months; experimentRoadmap] aligns to two paid pilots in the first 6 months and one additional production program by year-end."
  - id: "A6"
    name: "Y2 quarter-end active program path"
    value: "Q1Y2 4; Q2Y2 5; Q3Y2 6; Q4Y2 8"
    unit: "active paid programs"
    source: "[business-plan.yaml milestones 12-24 months; experimentRoadmap] matches the goal of 6-8 paying customers or 8 active programs once deployments fall below 30 days."
  - id: "A7"
    name: "Y3 quarter-end active program path"
    value: "Q1Y3 9; Q2Y3 10; Q3Y3 11; Q4Y3 12"
    unit: "active paid programs"
    source: "[business-plan.yaml milestones 24-36 months; research.yaml market.som] reaches the researched 12 active program year-3 SOM case without assuming earlier ex-China expansion."
  - id: "A8"
    name: "Gross margin ramp"
    value: "60% in pilot-heavy H1 Y1, 65% in H2 Y1, 67-70% through Y2, and 70-71% through Y3"
    unit: "gross margin percent"
    source: "[business-plan.yaml businessModel.targetGrossMarginPct; operatingAssumptions] margin improves as scientific reviews, partner templates, and onboarding work become reusable instead of custom each time."
  - id: "A9"
    name: "Monthly churn for unit economics"
    value: "2.0"
    unit: "percent"
    source: "[startup-finance heuristic] enterprise workflow software is sticky after adoption, but the beachhead is small enough that concentrated-program risk still warrants a 2% monthly churn assumption."
  - id: "A10"
    name: "Founder / CEO loaded cash compensation"
    value: "132"
    unit: "USDK/year"
    source: "[business-plan.yaml team Founder/CEO] startup-finance heuristic for a China-first venture-backed founder salary plus employer taxes and benefits."
  - id: "A11"
    name: "Founding eng loaded cash compensation"
    value: "168"
    unit: "USDK/year"
    source: "[business-plan.yaml team Founding eng] startup-finance heuristic for a senior full-stack and data-ingestion engineer building the first scoring and audit-trail stack."
  - id: "A12"
    name: "Scientific product lead loaded cash compensation"
    value: "180"
    unit: "USDK/year"
    source: "[business-plan.yaml team Scientific product lead] startup-finance heuristic for a scarce radiopharma-domain operator who encodes isotope, GMP, and site logic into the rules engine."
  - id: "A13"
    name: "Solutions & implementation lead loaded cash compensation"
    value: "144"
    unit: "USDK/year"
    source: "[business-plan.yaml team Solutions and implementation lead] startup-finance heuristic for the deployment owner who turns pilots into repeatable production rollouts."
  - id: "A14"
    name: "Partnerships / account executive loaded cash compensation"
    value: "156"
    unit: "USDK/year"
    source: "[business-plan.yaml team Partnerships or account executive] startup-finance heuristic for the first GTM hire added only after paid-pilot proof and one referenceable production customer."
  - id: "A15"
    name: "Product engineer / workflow integrator loaded cash compensation"
    value: "162"
    unit: "USDK/year"
    source: "[business-plan.yaml product twelveMonth; twentyFourMonth] startup-finance heuristic for the engineer who productizes the first lab-platform integration and partner templates."
  - id: "A16"
    name: "Customer success / implementation manager loaded cash compensation"
    value: "120"
    unit: "USDK/year"
    source: "[business-plan.yaml milestones 12-24 months] startup-finance heuristic for the first deployment and renewal owner once the account base reaches 6-8 active programs."
  - id: "A17"
    name: "Partnerships seller loaded cash compensation"
    value: "150"
    unit: "USDK/year"
    source: "[business-plan.yaml product twentyFourMonth; milestones 24-36 months] startup-finance heuristic for the second GTM hire added after the partner motion begins to source real production opportunities."
  - id: "A18"
    name: "Hiring cadence"
    value: "Founder and founding eng in M1; scientific product lead in M2; solutions and implementation lead in M5; first AE in M10; product engineer in M15; customer success in M19; partnerships seller in M31"
    unit: "timing"
    source: "[business-plan.yaml team; strategicChoices.sequencingRationale; milestones] keeps headcount lean until repeatable deployments, partner templates, and paid conversion are proven."
  - id: "A19"
    name: "Functional payroll allocation"
    value: "Founder 70% S&M and 30% G&A; founding eng 100% R&D; scientific product lead 85% R&D and 15% G&A; solutions lead 15% S&M, 45% R&D, and 40% G&A; first AE 100% S&M; product engineer 100% R&D; customer success 20% S&M, 20% R&D, and 60% G&A; partnerships seller 100% S&M"
    unit: "allocation policy"
    source: "[business-plan.yaml team rationales; operations] payroll follows who sells the wedge, who codifies reusable workflows, and who carries implementation and administrative overhead."
  - id: "A20"
    name: "Non-payroll operating spend"
    value: "Y1 monthly S&M/R&D/G&A = 7K/10K/12K; Y2 = 9K/12K/14K; Y3 = 11K/14K/16K"
    unit: "USDK/month"
    source: "[startup-finance heuristic] covers travel, cloud tooling, compliance documentation, insurance, and legal/accounting for a regulated biotech workflow company."
  - id: "A21"
    name: "Cash conversion policy"
    value: "EBITDA approximates operating cash movement"
    unit: "policy"
    source: "[startup-finance heuristic] no debt, capex, taxes, or material working-capital swings are modeled at this stage."
  - id: "A22"
    name: "Blended CAC per new active program"
    value: "99.0"
    unit: "USDK/new active program"
    source: "Calculated from modeled Y2-Y3 sales and marketing spend of 891.0K divided by 9 net new active programs."
  - id: "A23"
    name: "Base discovery-to-production sales cycle"
    value: "6"
    unit: "months"
    source: "[business-plan.yaml operatingAssumptions; gtm.funnelTargets; market.buyingProcess] assumes a paid pilot can close in roughly 90 days and convert to a production annual contract within another ~90 days."
  - id: "A24"
    name: "Funding milestone"
    value: "8 active programs, one high-value lab-platform integration, sub-30-day deployments, and one partner-sourced production opportunity with 6 months of cash buffer"
    unit: "milestone"
    source: "[business-plan.yaml milestones 12-24 months; fundingAsk.useOfFundsSummary] this is the proof point used to size the current pre-seed."
