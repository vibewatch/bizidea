differentiator: 发现侧的 AI 厂商负责生成候选分子，CRO 和 CDMO 负责执行工作包，项目经理负责追时间线，但在实验大笔开烧前，没人真正对“这条放射配体路线到底能不能开发出来”这个跨职能判断负责。这家公司的赢法，是把自己做成靶向分子-同位素-站点就绪度的权威底账系统，把化学、可制造性和首个临床中心运营之间的取舍摊在一张桌上。护城河会来自专有结果数据：哪些可开发性模式会预示延期、重配方，或在多条放射诊疗一体化项目里更容易顺利转化。
