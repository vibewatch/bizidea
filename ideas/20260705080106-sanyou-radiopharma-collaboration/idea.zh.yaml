jobsToBeDone:
- job: 当团队为诊疗一体化项目敲定主力靶向分子时，帮 CMC 或转化团队决定该追哪条同位素配对和工作计划，好让他们在不经历后期大重置的前提下，把项目推进到 pre-IND 就绪。
  currentAlternative: 分散的 CRO 与 CDMO 需求梳理电话、表格和顾问备忘录。
  successMetric: 从敲定主力靶向分子到批准 pre-IND 工作计划的时间，以及重大方案重开次数。
- job: 当管理层准备 IND 或 BD 方案时，帮项目负责人拿出一份在化学、GMP 和临床站点依赖上站得住脚的就绪包，好去拿预算和合作方信心。
  currentAlternative: 靠供应商报价和实验室更新，人工拼出来的汇报材料。
  successMetric: 拼出这份决策包所需时间，以及评审时仍未解决的 CMC 或站点阻塞项比例。
ideaScorecard:
  signalStrength:
    score: 4
    rationale: 这个集群虽然只有一个信源，但它把 AI 发现、同位素生产、GMP 制造和临床转化明确串成了一条具体工作流。
  painIntensity:
    score: 4
    rationale: 放射药后段转化一旦判断失误，就会炸掉几个月湿实验时间、合作方信用和团队稀缺现金——尤其对只有一两次出手机会的团队。
  wedgeClarity:
    score: 5
    rationale: 首个用例很聚焦：一个买方、一个资产阶段工作流、一个清晰产出——第一款诊疗一体化项目的可开发性计划。
  defensibility:
    score: 4
    rationale: 只要先把工作流抓在手里，再持续积累靶向分子-同位素-螯合剂结果和供应商约束，复制难度就会越来越高。
  ventureScale:
    score: 4
    rationale: 滩头市场很窄，但同一平台能继续扩到全球放射药开发、供应商协同和伴随诊断工作流层。
topRisks:
- name: 结果数据太稀
  description: 早期放射药项目能产出的标准化数据很有限，前期的可开发性评分很可能更像启发式判断，而不是让人放心的决策工具。
  mitigation: 先把产品做成“解释优先”的工作流软件，用专家规则和结构化模板起步，再从每位客户的真实靶向分子-同位素和 CMC 结果里持续学习。
- name: 买方更爱买服务
  description: 很多团队可能更愿意把转化规划整个甩给 CDMO 或顾问，而不是单独买软件。
  mitigation: 把产品定位成供应商之上的中立控制层，卖点就盯住少返工、少拖期、少出协同事故。
- name: 监管与同位素差异太大
  description: 同位素可得性、标记协议和站点要求会随着项目和地区变化，很容易把一个“一把梭”的产品打回原形。
  mitigation: 先在一个地域和一小组同位素里起步，再按市场逐步扩规则库和合作网络。
