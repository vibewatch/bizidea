problem: 放射药初创团队现在更快就能找到有希望的靶向分子，但仍很难在早期看清：一个候选分子能不能扛过螯合剂选择、同位素配对、稳定性测试、GMP 批次设计以及核医学中心的物流要求。发现、CMC、同位素供给和临床转化往往分散在不同表格、供应商材料和邮件线程里，等团队意识到工艺可制造性或站点就绪度有致命问题时，往往已经烧掉了几个月稀缺的湿实验预算。对第一次做放射诊疗一体化项目的团队来说，这尤其致命——一个弱的靶点-同位素配对，影像和治疗两条线都可能一起废掉。
targetUser:
  primary: 中国放射药初创公司里负责 CMC 或转化开发的负责人，正把第一款肽类或抗体靶向的诊疗一体化项目推向 pre-IND 就绪
  secondary: 负责早期放射诊疗一体化研究的项目经理，需要统筹发现、同位素供给和核医学中心启动
  buyer: 首席开发官或放射药业务负责人
startupThesis:
  nonObviousInsight: 这波里真正值钱的，不会是又一家 AI 靶向分子生成器，也不会是又一家同位素供应商，而是那套可开发性系统：在昂贵实验和供应商工作开跑前，就先告诉团队某个候选分子能不能和合适的同位素、螯合剂、GMP 路径及首个临床中心工作流搭起来，又不把整个诊疗一体化项目带偏。
  beachhead: 中国放射药初创公司和肿瘤生物技术公司，正把第一款肽类或抗体靶向的诊疗一体化资产从命中分子筛选推进到 pre-IND 的 CMC 规划，计划先做 Gallium-68 或 Zirconium-89 影像分支，再接 Copper-64 或 Rhenium-186 治疗分支。
  wedge: 一套放射配体可开发性工作台，按同位素配对、螯合剂化学、稳定性、剂量学假设、GMP 批次约束和中心启动要求给候选靶向分子打分，再吐出第一款项目的转化计划。
  whyNowCatalyst: Sanyou Bio 和 Baiyunshan Xihe 正在把 AI 发现、核素生产、GMP 制造和临床转化硬拼到一个合作里，于是这几个步骤之间那层缺失的决策层，突然变成了能单独立项、能单独花钱的紧急工作流。
  ventureScalePath: 先从中国 pre-IND 放射诊疗一体化项目切入，再扩到全球放射药管线，最后做成生物制药在同位素供给、CDMO 选择、试验中心启动、伴随诊断和全生命周期扩线上的协同与情报层。
solution: 这家公司卖的是软件，加上一套专家工作流模板，服务对象是把放射配体从候选靶向分子清单推到首个人体研究包的团队。客户上传靶向分子数据、计划适应症、备选同位素，以及供应商或中心约束后，产品返回一份可开发性评分、最可行的诊断-治疗配对、关键实验清单和分阶段的 CMC 工作计划。它还会把任务拆给内部科学家、同位素供应商、CDMO 和核医学中心，让团队在签合同前就看清项目会卡死在货架期、标记收率还是中心物流，而不是等钱烧出去之后才发现。第一版产品不是湿实验替代品，也不是完整 ELN；它是一个项目级决策驾驶舱，让发现、CMC 和临床转化围着同一个资产对齐。时间一长，公司会沉淀出一份专有结果库：哪些靶向分子-同位素-螯合剂组合真的往前推进了，哪些卡住了，哪些最后不得不重配方。
goToMarketSeed:
  firstCustomer: 一家 20-80 人规模、位于中国的放射药初创公司，手里有一个肿瘤主力靶向分子，没有完整的端到端放射药运营团队，董事会要求它在 12-18 个月内做到 pre-IND 就绪。
  buyingTrigger: 团队敲定主力靶向分子后才发现，同位素选择、螯合剂设计、CDMO 排期和首个中心要求分别握在不同合作方手里，而在 IND 或 BD 里程碑前根本没有一套统一方案。
  currentAlternative: 发现科学家维护的表格、临时找来的核医学顾问、CRO 或 CDMO 项目经理，以及内部项目负责人靠邮件来回协调的材料。
  switchingReason: 这个切口能给团队更快的去留判断、一套跨供应商共享的转化计划，以及一条更清晰的路——在稳定性、可制造性或中心就绪度问题吞掉项目现金前先把坑填上。
  pricingHypothesis: 按活跃放射诊疗一体化项目计费的年度订阅，再叠加上线费和按里程碑收费的供应商映射、可开发性审查及 IND 就绪工作计划费用。
