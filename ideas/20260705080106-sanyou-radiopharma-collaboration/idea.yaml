jobsToBeDone:
  - job: >-
      When a lead targeting molecule is nominated for a theranostic program, help the CMC or translational team decide which
      isotope pairing and workplan to pursue, so they can reach pre-IND readiness without late program resets.
    currentAlternative: Separate CRO and CDMO scoping calls, spreadsheets, and consultant memos
    successMetric: Time from lead nomination to approved pre-IND workplan and number of major plan resets
  - job: >-
      When management prepares an IND or partnering plan, help program leaders produce a defendable readiness package across
      chemistry, GMP, and clinical-site dependencies, so they can secure budget and partner confidence.
    currentAlternative: Slide decks assembled manually from vendor quotes and lab updates
