problem: >-
  Radiopharma startups can now generate promising binders faster, but they still struggle to learn early whether a candidate can
  survive chelator selection, isotope pairing, stability testing, GMP batch design, and nuclear medicine-site logistics. Discovery,
  CMC, isotope sourcing, and clinical translation usually live in separate spreadsheets, vendor decks, and email threads, so teams
  discover fatal manufacturability or site-readiness issues only after burning months of scarce wet-lab budget. That is especially
  painful for first-time theranostic programs, where one weak target-isotope pairing can kill both the imaging and therapy path.
targetUser:
  primary: Head of CMC or Translational Development at a China-based radiopharma startup taking its first peptide or antibody-targeted theranostic program toward pre-IND readiness
  secondary: Program managers coordinating discovery, isotope supply, and nuclear medicine-site activation for early radiotheranostic studies
  buyer: Chief Development Officer or Head of Radiopharmaceuticals
startupThesis:
  nonObviousInsight: >-
    The newly valuable company is not another AI binder generator or isotope supplier. It is the developability system that tells a
    team, before expensive lab and vendor work begins, whether a candidate binder can be paired with the right isotope, chelator,
    GMP path, and first-clinic workflow without breaking the theranostic program.
  beachhead: >-
    China-based radiopharma startups and oncology biotechs advancing their first peptide or antibody-targeted theranostic asset
    from hit selection into pre-IND CMC planning, with planned Gallium-68 or Zirconium-89 imaging plus Copper-64 or
    Rhenium-186 therapy follow-ons
  wedge: >-
    A radioligand developability workspace that scores binder candidates against isotope pairing, chelator chemistry, stability,
    dosimetry assumptions, GMP batch constraints, and site-activation requirements, then generates a first-program translation plan
  whyNowCatalyst: >-
    Sanyou Bio and Baiyunshan Xihe are explicitly stitching AI discovery, radionuclide production, GMP manufacturing, and
    clinical translation into one partnership, which turns the missing decision layer between those steps into an urgent budgetable
    workflow.
  ventureScalePath: >-
    Start with pre-IND radiotheranostic programs in China, expand into global radiopharma portfolios, then become the
    coordination and intelligence layer for isotope sourcing, CDMO selection, trial-site activation, companion diagnostics, and
    lifecycle expansion across biopharma.
solution: >-
  The startup would sell software plus expert workflow templates for teams moving a radioligand from binder shortlist to
  first-in-human package. Customers would upload target-molecule data, planned indications, intended isotope options, and vendor
  or site constraints; the product would return a developability score, the most viable diagnostic-therapy pairing, critical
  experiments, and a sequenced CMC workplan. It would also track which tasks belong with internal scientists, isotope suppliers,
  CDMOs, and nuclear medicine sites, so teams see early where a program will fail on shelf life, labeling yield, or site
  logistics instead of learning after contracts are signed. The initial product is not a wet-lab replacement or a full ELN; it is
  the program-level decision cockpit that keeps discovery, CMC, and clinical translation aligned around one asset. Over time, the
  company builds a proprietary dataset on which binder-isotope-chelator combinations actually advanced, stalled, or had to be
  reformulated.
