topRisks:
  - name: Sparse outcome data
    description: Early radiopharma programs generate limited standardized data, which could make developability scores feel too heuristic at first.
    mitigation: Start as explanation-first workflow software with expert rules and structured templates, then learn from each customer's actual binder-isotope and CMC outcomes.
  - name: Services-heavy buying behavior
    description: Many teams may prefer to hand translation planning to CDMOs or consultants instead of buying software.
    mitigation: Position the product as the neutral control layer above suppliers and sell against avoided rework, timeline slips, and partner coordination failures.
  - name: Regulatory and isotope variability
    description: Isotope availability, labeling protocols, and site requirements vary by program and region, which can limit a one-size-fits-all product.
    mitigation: Launch in one geography and a narrow isotope set, then expand the rules and partner network market by market.
