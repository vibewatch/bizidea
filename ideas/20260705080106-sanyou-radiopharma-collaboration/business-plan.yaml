slug: radioligand-developability-os
date: '2026-07-05'
executiveSummary: >-
  Radioligand Developability OS sells a China-first decision and workflow layer
  for 20-80 person radiopharma teams taking their first peptide or antibody
  theranostic program from hit selection into pre-IND CMC planning. The
  researched pain is credible: discovery, isotope selection, chelator design,
  GMP, and site-readiness sit across separate vendors and teams, so programs
  often learn manufacturability or logistics failure too late. The first
  product should be explanation-first software that ingests binder data,
  isotope options, vendor constraints, and site requirements, then scores
  viable branches and generates a cross-vendor translation plan. The first
  beachhead is narrow by design: China teams planning Ga-68 or Zr-89 imaging
  with Cu-64 or Re-186 therapy follow-ons, because that is where the buying
  trigger, domain templates, and partner network can be validated fastest.
  Go-to-market must sell against avoided rework and pre-IND timeline
  compression, with founder-led sales to heads of CMC or translational
  development and referrals from CDMOs, isotope suppliers, and regulatory
  advisors. Research supports an estimated $4.6M China-first SAM and a $2.2M
  year-3 SOM, but not a broad venture case unless the company proves repeatable
  deployments and expansion beyond this first workflow. The central operating
  risk is that buyers may prefer CDMOs or consultants to own the workflow
  unless the product demonstrably shortens decision cycles and reduces reopened
  work packages. Evidence is still missing on exact budget owners and active
  account depth, so the company should be funded as a pre-seed validation build
  rather than a scale-ready platform bet.
problem:
  - "First-program radiopharma teams must choose binder, isotope, chelator, GMP path, and site workflow before they have integrated data or aligned vendors, so fatal developability issues surface only after wet-lab and CDMO spend."
  - "Current alternatives—spreadsheets, consultant memos, and vendor-specific project plans—optimize one function at a time and give management no neutral view of cross-branch tradeoffs or pre-IND readiness."
solution:
  - "Provide a vendor-neutral workspace that ingests binder, isotope, chelator, dosimetry, GMP, and site inputs, scores the most viable diagnostic-therapy branches, and highlights the experiments required before committing program capital."
  - "Generate a governed cross-vendor translation plan with task ownership, critical-path milestones, and audit trails so discovery, CMC, isotope suppliers, CDMOs, and first sites work from one program model."
whyWeWin:
  - "Horizontal R&D clouds digitize lab data and CDMOs execute work, but neither owns the decision of whether a radioligand path is translatable before execution contracts are signed."
  - "Starting with one molecule class, one geography, and a narrow isotope set lets the company build trustworthy rules and partner templates faster than a broad ELN, LIMS, or global-services platform."
  - "Each live program compounds a proprietary dataset of binder-chelator-isotope outcomes, vendor constraints, and site blockers that can improve win rate and reduce deployment time."
strategicChoices:
  beachhead: "China-based radiopharma startups and oncology biotechs advancing their first peptide or antibody theranostic asset from hit selection into pre-IND CMC planning, initially centered on Ga-68 or Zr-89 imaging branches with Cu-64 or Re-186 therapy follow-ons."
  wedgeRationale: "This slice has the clearest buying trigger, the weakest internal radiopharma operating depth, and the highest cost of a wrong branch decision. It creates faster proof than selling to large pharma portfolios, multi-region programs, or alpha-emitter workflows that require broader ontology coverage and longer procurement."
  sequencingRationale: "Start with explanation-first scoring, spreadsheet and report ingestion, and human-reviewed workplans because sparse historical data and regulated trust requirements make black-box automation hard to sell early. Add partner templates and one or two high-value integrations after paid pilots prove cycle-time reduction, then expand into broader isotope coverage and global portfolio workflows once the control layer is trusted."
  notYet:
    - "Alpha-emitter or multi-region programs that require a much broader isotope and regulatory ontology"
    - "Replacing ELN, LIMS, or CDMO execution systems"
    - "Autonomous release, QA sign-off, or other workflows that make the product system-of-record for regulated manufacturing"
market:
  tam: "$56.3M estimated TAM based on roughly 300 global radioligand developers, about 1.25 qualifying programs per company, and roughly $150k annual workflow spend per program."
  sam: "$4.6M estimated China-first SAM based on about 100 China radiopharma companies, roughly 35% beachhead fit, about 1.1 qualifying programs per fit company, and roughly $120k annual spend per program."
  som: "$2.2M illustrative year-3 SOM based on 12 active programs across 8-10 customers at roughly $180k blended annual revenue per active program."
  segments:
    - "Primary: China-based radiopharma startups and oncology biotechs advancing a first peptide or antibody theranostic program"
    - "Secondary: Program managers and mid-size biopharma teams adding radiodiagnostic and radiotherapeutic assets without full internal translational infrastructure"
  buyingProcess: >-
    The user champion is usually the Head of CMC or Translational Development,
    while budget approval typically sits with the Chief Development Officer or
    Head of Radiopharmaceuticals because the spend competes with CDMO, isotope,
    and pre-IND milestone budgets. Deals should start when a lead binder is
    nominated or when CDMO and site scoping begins, because that is when
    fragmented ownership becomes expensive and visible.
product:
  mvp: >-
    The MVP should ingest spreadsheet, assay, CRO, CDMO, and site-planning data
    for one peptide or antibody program, compare the initial isotope and
    chelator branches, and output a developability score, required experiments,
    and a cross-vendor translation plan with clear ownership. It should stay
    human-in-the-loop and explanation-first rather than promise a black-box
    prediction engine or replace regulated source systems.
  sixMonth: "Ship paid pilots for spreadsheet and report ingestion, rule-based branch scoring for Ga-68, Zr-89, Cu-64, and Re-186 workflows, shared task ownership, and exportable pre-IND translation-plan packages."
  twelveMonth: "Add repeatable templates for two to three CDMOs or isotope suppliers, one high-value lab-platform integration, vendor benchmarking, and scenario planning across peptide versus antibody formats."
  twentyFourMonth: "Expand into a broader radiopharma control layer with cross-program benchmarks, ex-China templates, broader isotope coverage, and portfolio planning across multiple radioligand assets."
  keyBets:
    - "Customers will trust explanation-first rules plus expert review sooner than a black-box predictive model."
    - "The first programs share enough data structure that spreadsheet and report ingestion can be productized before deep ELN or LIMS integration."
    - "Ga-68, Zr-89, Cu-64, and Re-186 coverage is sufficient to win the first year of beachhead deals."
    - "Cross-vendor translation planning creates measurable ROI before the outcome-data moat is fully built."
gtm:
  wedge: "Sell a paid first-program developability and translation-plan package for China radiopharma teams that have just nominated a lead binder and need one decision system before CDMO, isotope, and site work fan out."
  channels:
    - "Founder-led outbound to heads of CMC, translational development, and radiopharma program leadership at China-based startups and oncology biotechs"
    - "Design-partner and referral deals through radiopharma investors, incubators, KOL networks, and regulatory advisors already close to first-program teams"
    - "Pull-through partnerships with CDMOs, isotope suppliers, and nuclear medicine centers that see fragmented planning before the customer signs downstream work"
  funnelTargets: "Target account→qualified design-partner discovery 20-30%, discovery→paid pilot 25-35%, paid pilot→annual production 50%+, production→second-program or geography expansion 30%+ within 12 months."
  pricing: "Charge a paid 8-12 week developability and translation-plan pilot at roughly $40k-$60k, then a $90k-$120k annual subscription per active program plus onboarding and milestone review fees that lift blended year-one program revenue toward the researched $120k-$180k range. Price per active program rather than seats because value comes from earlier no-go decisions, fewer reopened work packages, and faster pre-IND package assembly."
businessModel:
  revenueStreams:
    - "Annual subscription per active radiotheranostic program"
    - "Onboarding and data-normalization fees"
    - "Milestone-based developability review and IND-readiness workplan fees"
  unitOfValue: "Active radiotheranostic program under developability management"
  targetGrossMarginPct: 70
  expansionLevers:
    - "Add second and third assets inside the same customer portfolio"
    - "Expand from China-first templates into ex-China regulatory and site-readiness workflows"
    - "Monetize partner benchmarks, vendor comparisons, and broader isotope libraries as the outcome dataset matures"
strategyMap:
  northStarMetric: "Active customer programs that reach an approved pre-IND translation plan without a reopened critical developability decision after vendor scoping."
  inputMetrics:
    - "Median weeks from lead-binder nomination to approved cross-vendor translation plan"
    - "Percent of required binder, isotope, and vendor inputs ingested without manual re-entry"
    - "Paid pilot-to-annual production conversion rate"
    - "Critical work packages reopened after CDMO or site review per active program"
    - "Referenceable partner templates reused per new deployment"
  moatsToBuild:
    - "Binder-chelator-isotope outcome corpus tied to advancement, reformulation, or kill decisions"
    - "Cross-vendor benchmarks on batch constraints, logistics failure modes, and site-activation blockers"
    - "China-first regulatory and site-readiness template library that can later extend ex-China"
  killCriteria:
    - "Fewer than 5 of the first 15 ICP interviews confirm a separately owned or milestone-funded budget for first-program translation planning."
    - "The first 2 paid pilots fail to cut time to approved pre-IND workplan by at least 30% or fail to prevent at least 1 reopened critical work package."
    - "By month 18, fewer than 2 customers convert to annual production at year-one program revenue of at least $120k, indicating a services-only niche rather than a software company."
  mermaid: |
    flowchart LR
      Wedge[China first-program wedge] --> MVP[Explanation-first developability MVP]
      MVP --> Proof[Faster pre-IND plans and fewer resets]
      Proof --> Expansion[Global radiopharma control layer]
investorMemo:
  verdict:
    call: "Watch"
    conviction: "Real workflow pain and credible timing, but conviction stays limited until the company proves budget ownership and repeatable software deployments above services work."
    whyBelieve: "Research shows integrated radiopharma stacks are forming, buyer pain sits at a real pre-IND bottleneck, and direct vendor-neutral competition is still limited."
    whyDoubt: "The launch market is small, substitutes are credible, and there is no proof yet that China buyers will fund a separate control layer instead of folding the work into CDMOs or consultants."
    nextDiligence: "Win 2 paid first-program pilots, show at least 30% faster translation-plan approval, and secure 1-2 partner channels that refer rather than compete."
  firstCustomer:
    title: "Head of CMC at a China radiopharma startup running its first theranostic program"
    profile: "A 20-80 person company with one lead peptide or antibody oncology asset, limited internal end-to-end radiopharma operations, and a board target to reach pre-IND readiness within 12-18 months."
    trigger: "The team nominates a lead binder and realizes isotope choice, chelator design, CDMO timelines, and first-site requirements sit with different parties before an IND or partnering milestone."
    buyer: "Chief Development Officer or Head of Radiopharmaceuticals"
    initialContract: "An 8-12 week paid developability and translation-plan pilot at roughly $40k-$60k, credited toward a $90k-$120k annual per-program subscription plus onboarding and milestone review fees that can bring year-one revenue toward $120k-$180k."
  mustBeTrue:
    - "At least 5 of the first 15 qualified China beachhead accounts must confirm that first-program translation planning already has a named budget owner and cannot stay inside ad hoc spreadsheets."
    - "The first 2 paid pilots must reduce time from lead-binder nomination to approved pre-IND workplan by at least 30%."
    - "At least 70% of required decision inputs for the beachhead must be ingestible from existing spreadsheets, assay outputs, and vendor reports without an ELN or LIMS replacement."
    - "At least 2 CDMOs or isotope suppliers must agree to participate as referral or template partners without forcing the company into white-label services."
    - "Paid pilot-to-annual-production conversion must reach at least 50% with year-one program revenue at or above the low end of the researched $120k-$180k range."
  diligenceQuestions:
    - "How many China radiopharma companies actually fit the first-program, vendor-dependent ICP and control their own pre-IND budget?"
    - "Which KPI unlocks budget fastest in practice: avoided rework, faster no-go decisions, or fewer manufacturing and site surprises?"
    - "What minimum data inputs are reliably available before CDMO scoping, and who controls them?"
    - "Will CDMOs and isotope suppliers refer opportunities or bundle competing planning logic into their own services?"
    - "How quickly must the product support alpha emitters or ex-China workflows to avoid market exhaustion?"
operatingAssumptions:
  - assumption: "Beachhead buyers can purchase the product from pre-IND program budgets rather than enterprise IT budgets."
    basis: research.yaml
    validationTest: "Run 10 discovery-to-proposal cycles and confirm that at least 3 deals have a named program-budget sponsor and a sales cycle under 90 days."
    decisionImpact: "If false, GTM must shift toward partner-led services bundles or larger enterprise buyers, slowing the software-first thesis."
  - assumption: "Spreadsheet, CRO or CDMO report, and assay ingestion covers enough data for the first product."
    basis: research.yaml
    validationTest: "Load real artifacts from 4 design-partner programs and show that at least 70% of required fields are captured without custom system replacement."
    decisionImpact: "If false, the roadmap must narrow to a smaller workflow or budget must move earlier into costly integrations."
  - assumption: "Ga-68, Zr-89, Cu-64, and Re-186 coverage is sufficient for the first 12 months of beachhead selling."
    basis: idea.yaml
    validationTest: "Build a 15-account opportunity map and confirm that at least 70% of active near-term ICP programs fall inside the initial isotope scope."
    decisionImpact: "If false, the company needs more scientific breadth earlier, increasing product complexity and hiring needs."
  - assumption: "CDMOs and isotope suppliers are more likely to be channels or complements than direct blockers."
    basis: research.yaml
    validationTest: "Secure at least 3 partner conversations, 2 signed referral or template pilots, and 1 qualified deal sourced through a partner."
    decisionImpact: "If false, CAC stays higher and the company must rely more heavily on direct enterprise selling."
  - assumption: "Year-one revenue per active program can exceed $120k while keeping the business software-margin attractive."
    basis: operator judgment
    validationTest: "Close the first 3 paid deployments and confirm that at least half of implementation work is reusable by the third customer while gross margin trends toward 70%."
    decisionImpact: "If false, the company must either tighten the ICP, raise pricing, or accept a services-heavier model."
experimentRoadmap:
  - horizon: "0-90 days"
    experiment: "Interview 15 heads of CMC, translational development, program management, and radiopharma leadership across China target accounts."
    hypothesis: "First-program teams will fund a neutral developability layer when it is tied to a live pre-IND milestone rather than generic digital-transformation spend."
    successMetric: "At least 6 interviews confirm a named budget owner and at least 2 accounts agree to structure a paid pilot."
    owner: "Founder/CEO"
  - horizon: "0-90 days"
    experiment: "Collect and normalize real spreadsheets, assay outputs, and vendor reports from 2 peptide programs and 2 antibody programs."
    hypothesis: "A repeatable data model exists for the beachhead without requiring an ELN or LIMS replacement."
    successMetric: "One MVP schema covers at least 70% of required fields across all 4 sample programs."
    owner: "Founding eng"
  - horizon: "90-180 days"
    experiment: "Run 2 paid pilots that produce branch scoring, required experiments, and cross-vendor pre-IND workplans for supported isotope sets."
    hypothesis: "Explanation-first scoring plus a shared translation plan can shorten approval cycles and reduce reopened work."
    successMetric: "Both pilots deliver a referenceable workplan, and at least 1 shows either 30% faster plan approval or 1 avoided reopened critical work package."
    owner: "Scientific product lead"
  - horizon: "90-180 days"
    experiment: "Test pricing with 6 live proposals across per-program subscription packaging versus consultant-style fixed-fee projects."
    hypothesis: "Buyers will accept recurring per-program software pricing if the pilot is attached to a milestone budget."
    successMetric: "At least 3 qualified prospects accept annual per-program pricing as the preferred commercial model after the pilot."
    owner: "Founder/CEO"
  - horizon: "90-180 days"
    experiment: "Build template or referral pilots with 2 CDMOs and 1 isotope supplier."
    hypothesis: "Execution partners will collaborate because the product reduces coordination overhead without taking their downstream revenue."
    successMetric: "3 partner pilot agreements signed and 1 qualified customer opportunity sourced through a partner."
    owner: "Founder/CEO"
  - horizon: "180-360 days"
    experiment: "Launch 2 production deployments with one high-value lab-platform integration and reusable partner templates."
    hypothesis: "A small connector library plus partner templates can keep deployments below 30 days and preserve software margins."
    successMetric: "2 production deployments start within 30 days and reuse at least 50% of prior workflow templates."
    owner: "Solutions and implementation lead"
operations:
  - "Maintain governed audit trails for every score, assumption, source input, and human approval so the platform remains decision support rather than opaque automation."
  - "Run structured postmortems after every pilot to capture killed branches, reformulations, vendor blockers, and site-readiness issues into the rules and benchmark library."
  - "Operate a partner template library covering CDMO handoffs, isotope supply constraints, and site-activation checklists for each supported isotope branch."
  - "Keep system boundaries explicit: the company recommends and coordinates, while customers, CDMOs, QA owners, and sites remain accountable for GMP execution, release, and regulatory submissions."
team:
  - role: "Founder/CEO"
    startTiming: "Month 0"
    rationale: "Own ICP discovery, founder-led sales, and partner negotiations because budget ownership and channel behavior are still the biggest unknowns."
  - role: "Founding eng"
    startTiming: "Month 0"
    rationale: "Build the core data model, scoring engine, ingestion pipeline, and audit trail needed for the first paid pilots."
  - role: "Scientific product lead"
    startTiming: "Month 0-2"
    rationale: "Encode isotope, chelator, dosimetry, GMP, and site logic into trustworthy explanation-first rules and lead customer-facing developability reviews."
  - role: "Solutions and implementation lead"
    startTiming: "Month 4-6"
    rationale: "Turn pilot outputs and partner templates into repeatable deployments while keeping onboarding from overwhelming engineering."
  - role: "Partnerships or account executive"
    startTiming: "Month 9-12"
    rationale: "Scale pipeline only after the company has 2 paid pilots, 1 referenceable production customer, and a partner motion that actually sources deals."
milestones:
  - horizon: "0-12 months"
    items:
      - "Complete 15-20 ICP interviews and secure at least 2 paid design-partner pilots."
      - "Ship the MVP for spreadsheet and report ingestion, explanation-first branch scoring, and exportable pre-IND translation-plan packages."
      - "Sign at least 2 CDMO or isotope-template partners and convert at least 1 pilot into annual production."
      - "Produce the first referenceable case showing faster plan approval or avoided rework."
  - horizon: "12-24 months"
    items:
      - "Reach 6-8 paying customers or 8 active programs in the China beachhead with deployments starting in under 30 days."
      - "Launch one high-value lab-platform integration, vendor benchmarking, and broader peptide versus antibody scenario planning."
      - "Generate meaningful ARR from second-program expansion and prove that partner-sourced opportunities contribute qualified pipeline."
  - horizon: "24-36 months"
    items:
      - "Reach 8-10 customers and 12 active programs, consistent with the researched year-3 SOM case."
      - "Expand into ex-China templates and broader isotope coverage using the China-first dataset as the initial moat."
      - "Establish a defensible position as the vendor-neutral radiopharma control layer rather than a services-heavy review shop."
risks:
  - risk: "Sparse standardized outcome data makes early developability scores feel heuristic rather than decision-grade."
    likelihood: "High"
    impact: "High"
    mitigation: "Lead with explanation-first rules, expert review, and structured outcome capture instead of overselling predictive certainty."
  - risk: "CDMOs, consultants, or internal program managers absorb the workflow before the software proves standalone ROI."
    likelihood: "High"
    impact: "High"
    mitigation: "Sell only into live first-program milestones, require paid pilots, and measure faster plan approval and fewer reopened work packages from the first deployments."
  - risk: "The China beachhead is smaller or slower to buy than company-count headlines imply."
    likelihood: "Medium"
    impact: "High"
    mitigation: "Build a named-account map early, keep burn aligned to design-partner proof, and sequence ex-China expansion only after repeatable China conversion data."
  - risk: "Regulatory, isotope, and site variance across programs slows template reuse and product margins."
    likelihood: "Medium"
    impact: "High"
    mitigation: "Limit initial scope to one geography and a narrow isotope set, maintain explicit human approval steps, and expand ontology only after usage data shows where demand is concentrated."
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2-4M"
  runwayMonths: 18
  useOfFundsSummary: "Fund 18 months of product build, radiopharma domain hiring, 4-6 design-partner and production deployments, partner-template development with CDMOs and isotope suppliers, and founder-led GTM to prove repeatable per-program software revenue before broader geography expansion."
