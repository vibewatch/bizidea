openQuestions:
- How many China radiopharma teams in the target size band actually control their own pre-IND workflow budget instead of deferring to CDMOs or parent companies?
- 'Which measurable KPI closes budget fastest in practice: avoided rework, faster no-go decisions, or fewer manufacturing and site surprises?'
- Can the product integrate into current discovery/CMC workflows without triggering a broader data-platform replacement project?
- How quickly must the rules engine expand beyond Ga-68, Zr-89, Cu-64, and Re-186 to stay relevant as alpha-emitter programs mature?
