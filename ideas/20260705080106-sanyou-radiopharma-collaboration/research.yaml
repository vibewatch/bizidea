  validationPlan:
  - priority: high
    question: How many China radiopharma companies truly fit the 20-80 person, first-program, vendor-dependent beachhead profile today?
    evidenceToGather: Named-account map of China radiopharma startups, program stage, team size, internal CMC depth, and current external partners.
  - priority: high
    question: 'Which KPI unlocks budget fastest: avoided rework, faster pre-IND package assembly, or fewer manufacturing/site surprises?'
    evidenceToGather: One live design-partner pilot with baseline and post-implementation measures for decision-cycle time, reopened work packages, and cross-vendor alignment.
  - priority: high
    question: Can the product integrate with current customer workflows without demanding a full ELN/LIMS migration?
    evidenceToGather: Data-ingestion test using spreadsheet, CRO/CDMO reports, assay outputs, and one existing digital lab platform.
  - priority: medium
    question: How much isotope and site logic must be localized by geography, indication, and molecule class before the software feels trustworthy?
    evidenceToGather: Expert review of initial rule sets across at least two peptide programs and two antibody programs, with China and ex-China site assumptions compared side by side.
  - priority: medium
    question: Will CDMOs be repeatable channels or future competitors?
    evidenceToGather: Partner interviews with at least two radiopharma CDMOs and one consultant group on referral incentives, integration boundaries, and white-label appetite.
