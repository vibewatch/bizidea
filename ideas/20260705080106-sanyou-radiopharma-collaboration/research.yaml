competitors:
- name: Benchling
  stage: incumbent
  wedge: Horizontal biotech system of record for unified lab data and process orchestration.
  pricing: Custom enterprise contracts; no public list pricing.
  strength: Strongest general-purpose R&D data platform for teams that want one place for experimental context and governed workflows.
  weaknessVsUs: It is not built around isotope-pair decisions, radiopharma-specific developability rules, or nuclear-medicine site readiness.
  sourceRefs:
  - 12
  - 13
- name: Dotmatics
  stage: incumbent
  wedge: Composable scientific R&D platform with adaptive lab workflows and biologics-discovery support.
  pricing: Custom enterprise contracts; no public list pricing.
  strength: Flexible workflow tooling and integration layer make it a plausible incumbent extension point inside biotech labs.
  weaknessVsUs: Its default abstractions are still broad scientific workflows rather than radioligand-specific manufacturability and site-logistics tradeoffs.
  sourceRefs:
  - 14
  - 15
- name: Sapio Sciences
  stage: scale-up
  wedge: AI-ready lab informatics and CMC digitalization with systems-integration support.
  pricing: Custom enterprise contracts; no public list pricing.
  strength: Well aligned with regulated R&D and CMC traceability needs.
  weaknessVsUs: It digitizes laboratories, but it does not appear to own the radiopharma-specific binder-to-isotope decision model across external partners.
  sourceRefs:
  - 17
- name: Nucleus RadioPharma
  stage: scale-up
  wedge: End-to-end radiopharma CDMO spanning development, manufacturing, and supply-chain services.
  pricing: Custom program pricing; no public list pricing.
  strength: Very close to the real execution bottlenecks and attractive to buyers who prefer to outsource complexity instead of adopting software.
  weaknessVsUs: It is an execution vendor, not a neutral cross-vendor control layer or reusable software dataset spanning many CDMOs and site choices.
  sourceRefs:
  - 18
- name: Eckert & Ziegler Radiopharma
  stage: incumbent
  wedge: Global radiopharma development, GMP manufacturing, regulatory support, and logistics.
  pricing: Custom project pricing; no public list pricing.
  strength: Deep operational credibility, global footprint, and concrete support for GMP and logistics problems.
  weaknessVsUs: Like other CDMOs, it monetizes project execution rather than a software-first, vendor-neutral decision cockpit that customers can retain internally.
  sourceRefs:
  - 21
