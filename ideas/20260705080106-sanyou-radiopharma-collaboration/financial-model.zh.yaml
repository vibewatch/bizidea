slug: radioligand-developability-os
date: '2026-07-05'
currency: USD
modelStartMonth: 2026-08
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-08
  unit: YYYY-MM
  source: '[business-plan.yaml date] 以 2026-07-05 计划日之后的首个完整运营月作为模型起点。'
- id: A2
  name: 融资后期初现金
  value: '2200'
  unit: USDK
  source: '[business-plan.yaml fundingAsk.targetFundingRangeUsd; fundingAsk.runwayMonths] 这里按 pre-seed 区间低端 $2.2M 建模，用来支撑约 18 个月跑出证明，再额外留 6 个月缓冲。'
- id: A3
  name: 收入单位
  value: 活跃付费放射诊疗一体化项目
  unit: definition
  source: '[business-plan.yaml businessModel.unitOfValue; market.som] customersEop 追踪的是活跃付费项目数，因为计划里的定价和市场测算都按“每项目”展开。'
- id: A4
  name: 每个活跃项目的混合年 ARPU
  value: '180'
  unit: USDK/program-year
  source: '[business-plan.yaml gtm.pricing; business-plan.yaml market.som; research.yaml bottomUpSizingDrivers] 把 $40K-$60K 的试点、$90K-$120K 的经常性订阅，以及里程碑评审费用合并后，落在研究给出的每项目 $120K-$180K 区间；稳态取 $180K。'
- id: A5
  name: 第 1 年月末活跃项目路径
  value: 0, 0, 0, 1, 1, 2, 2, 2, 2, 3, 3, 3
  unit: active paid programs
  source: '[business-plan.yaml milestones 0-12 months; experimentRoadmap] 对齐前 6 个月拿下 2 个付费试点、年末再新增 1 个正式项目的节奏。'
- id: A6
  name: 第 2 年季度末活跃项目路径
  value: Q1Y2 4; Q2Y2 5; Q3Y2 6; Q4Y2 8
  unit: active paid programs
  source: '[business-plan.yaml milestones 12-24 months; experimentRoadmap] 对齐“6-8 家付费客户或 8 个活跃项目”的目标，前提是部署周期能压到 30 天以内。'
- id: A7
  name: 第 3 年季度末活跃项目路径
  value: Q1Y3 9; Q2Y3 10; Q3Y3 11; Q4Y3 12
  unit: active paid programs
  source: '[business-plan.yaml milestones 24-36 months; research.yaml market.som] 在不提前假设中国以外扩张的前提下，走到研究里的第 3 年 12 个活跃项目情景。'
- id: A8
  name: 毛利率爬坡
  value: Y1 上半年试点密集期 60%，Y1 下半年 65%，Y2 约 67-70%，Y3 约 70-71%
  unit: gross margin percent
  source: '[business-plan.yaml businessModel.targetGrossMarginPct; operatingAssumptions] 随着科学评审、合作模板和上线工作从定制变成可复用，毛利逐步抬升。'
- id: A9
  name: 单位经济模型月流失率
  value: '2.0'
  unit: percent
  source: '[startup-finance heuristic] 企业工作流软件上线后一般较黏，但滩头市场太窄、项目集中度又高，因此仍按月流失 2% 处理。'
- id: A10
  name: 创始人 / CEO 全包现金薪酬
  value: '132'
  unit: USDK/year
  source: '[business-plan.yaml team Founder/CEO] 面向中国优先、VC 支持型创始人的工资、税费和福利经验值。'
- id: A11
  name: 创始工程师全包现金薪酬
  value: '168'
  unit: USDK/year
  source: '[business-plan.yaml team Founding eng] 面向资深全栈与数据接入工程师的经验值，他要搭起第一版评分和审计链。'
- id: A12
  name: 科学产品负责人全包现金薪酬
  value: '180'
  unit: USDK/year
  source: '[business-plan.yaml team Scientific product lead] 对稀缺放射药领域操盘手的经验值，他要把同位素、GMP 和中心逻辑写进规则引擎。'
- id: A13
  name: 方案与实施负责人全包现金薪酬
  value: '144'
  unit: USDK/year
  source: '[business-plan.yaml team Solutions and implementation lead] 面向部署负责人的经验值，他负责把试点变成可复制的正式上线。'
- id: A14
  name: 合作拓展 / 客户经理全包现金薪酬
  value: '156'
  unit: USDK/year
  source: '[business-plan.yaml team Partnerships or account executive] 只有拿到付费试点证明和一个可引用正式客户后，才新增第一位 GTM 招聘。'
- id: A15
  name: 产品工程师 / 工作流集成人员全包现金薪酬
  value: '162'
  unit: USDK/year
  source: '[business-plan.yaml product twelveMonth; twentyFourMonth] 对负责首个实验室平台集成和合作模板产品化的工程师给出的经验值。'
- id: A16
  name: 客户成功 / 实施经理全包现金薪酬
  value: '120'
  unit: USDK/year
  source: '[business-plan.yaml milestones 12-24 months] 当账户基数到 6-8 个活跃项目时，再配第一位续费和部署负责人。'
- id: A17
  name: 合作渠道销售全包现金薪酬
  value: '150'
  unit: USDK/year
  source: '[business-plan.yaml product twentyFourMonth; milestones 24-36 months] 只有合作路径开始带来真实正式商机后，才加第二位 GTM。'
- id: A18
  name: 招聘节奏
  value: M1 创始人和创始工程师；M2 科学产品负责人；M5 方案与实施负责人；M10 首位客户经理；M15 产品工程师；M19 客户成功；M31 合作渠道销售
  unit: timing
  source: '[business-plan.yaml team; strategicChoices.sequencingRationale; milestones] 在可复制部署、合作模板和付费转化跑通前，团队始终保持精简。'
- id: A19
  name: 职能薪酬分摊
  value: 创始人 70% 销售与市场 / 30% G&A；创始工程师 100% 研发；科学产品负责人 85% 研发 / 15% G&A；方案负责人 15% 销售与市场 / 45% 研发 / 40% G&A；首位客户经理 100% 销售与市场；产品工程师 100% 研发；客户成功 20% 销售与市场 / 20% 研发 / 60% G&A；合作渠道销售 100% 销售与市场
  unit: allocation policy
  source: '[business-plan.yaml team rationales; operations] 薪酬分配遵循：谁在卖切口、谁在沉淀可复用工作流、谁在承担实施与行政开销。'
- id: A20
  name: 非薪酬运营开支
  value: Y1 每月销售与市场 / 研发 / G&A = 7K/10K/12K；Y2 = 9K/12K/14K；Y3 = 11K/14K/16K
  unit: USDK/month
  source: '[startup-finance heuristic] 覆盖差旅、云工具、合规文档、保险，以及受监管生物技术工作流公司的法务和财务支出。'
- id: A21
  name: 现金转换政策
  value: EBITDA 近似代表经营现金变动
  unit: policy
  source: '[startup-finance heuristic] 在这个阶段，不对债务、capex、税费或显著营运资金波动单独建模。'
- id: A22
  name: 每个新增活跃项目的混合 CAC
  value: '99.0'
  unit: USDK/new active program
  source: 由模型推导：Y2-Y3 销售与市场支出共 891.0K，除以 9 个净新增活跃项目。
- id: A23
  name: 基础情景下从发现到正式生产的销售周期
  value: '6'
  unit: months
  source: '[business-plan.yaml operatingAssumptions; gtm.funnelTargets; market.buyingProcess] 假设付费试点约 90 天能签下，再用约 90 天转成年付正式合同。'
- id: A24
  name: 本轮融资要打到的里程碑
  value: 8 个活跃项目、1 个高价值实验室平台集成、部署周期低于 30 天，以及 1 个合作渠道带来的正式机会，同时保留 6 个月现金缓冲
  unit: milestone
  source: '[business-plan.yaml milestones 12-24 months; fundingAsk.useOfFundsSummary] 这就是本轮 pre-seed 的证明包，也是本轮融资规模的依据。'
