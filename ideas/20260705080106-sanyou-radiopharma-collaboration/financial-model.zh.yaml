  round: pre-seed
  amountM: 2.2
  runwayMonths: 24
  milestone: 做到约 6-8 家付费客户对应的 8 个活跃项目、交付 1 个高价值集成、把部署周期压到 30 天以内，并证明至少 1 条由合作方带来的正式生产路径，同时手里仍留约 6 个月现金。
