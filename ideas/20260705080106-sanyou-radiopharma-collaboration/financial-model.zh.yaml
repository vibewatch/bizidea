scenarios:
  downside:
    description: 试点转正式生产的转化掉速、合作转介绍仍停留在探索阶段，公司到第 3 年末只做到 10 个活跃项目，同时 ARPU 和毛利都更低。
    y3RevenueK: 1554.0
    y3EbitdaK: -563.9
    cashLowPointK: 7.8
    keyAssumptionChanges:
    - 混合年 ARPU 降到约 $168K，因为上线费和里程碑评审费挂接得没那么稳定。
    - 活跃项目路径在第 3 年末只到 10 个而不是 12 个，因为销售周期拉长到约 9 个月，试点转化也走弱。
    - 稳态毛利率最高只到约 68-69%，因为更多科学评审和实施工作仍像服务项目。
  base:
    description: 聚焦的中国首发切口跑通，创始人主导销售把 2 个试点转成正式客户，可复用合作模板在 Y2 后段把毛利推向 70% 目标。
    y3RevenueK: 1890.0
    y3EbitdaK: -297.0
    cashLowPointK: 441.2
    keyAssumptionChanges:
    - 混合年 ARPU 稳在 $180K，与研究里的项目级支出区间和 SOM 情景一致。
    - 模型从 Y1 末 3 个活跃项目增长到 Q4Y2 的 8 个，再到 Q4Y3 的 12 个，对齐商业计划里的里程碑。
    - 毛利率从 Y1 试点期的 60-65% 抬到 Y3 的约 70-71%，靠的是合作模板和工作流复用，而不是更重人工。
  upside:
    description: 某家 CDMO 或同位素合作方真的变成渠道，新增项目提前落地，业务做到 14 个活跃项目，并在第 3 年跨进 EBITDA 转正。
    y3RevenueK: 2389.6
    y3EbitdaK: 104.3
    cashLowPointK: 1072.6
    keyAssumptionChanges:
    - 混合年 ARPU 升到约 $185K，因为正式客户购买了更多里程碑评审和第二项目支持。
    - 活跃项目路径在第 3 年末到 14 个，因为合作渠道带来的商机比计划更早转化。
    - 稳态毛利率到约 72-73%，因为大部分上线工作到 Y2 后段都已模板化。
