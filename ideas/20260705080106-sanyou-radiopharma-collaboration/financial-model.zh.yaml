modelDiagram:
  title: 单位经济模型流转
  mermaid: |
    flowchart LR
      Accounts[ICP accounts] --> Pilots[Paid pilots]
      Pilots --> Programs[Active paid programs]
      Programs --> Revenue[Subscription and review-fee revenue]
      Revenue --> GrossProfit[Gross profit after scientific review and onboarding]
      GrossProfit --> Cash[Cash for product and GTM]
modelSanity:
- checkName: 收入引擎
  finding: 基础情景的收入来自活跃付费项目从 3 个长到 12 个、每个项目混合 ARPU 约 $180K，而不是过早假设中国以外平台收入大爆发。
- checkName: 必须跑对的事
  finding: 前 6-8 个活跃项目必须共享足够多的同位素、CDMO 和中心模板结构，这样毛利率才有机会从 Y1 试点期的 60-65% 抬到 Y2 后段约 70%。
- checkName: 模型会在哪些点断掉
  finding: 如果销售周期拖到 9 个月，或 ARPU 掉到约 $165K，当前 $2.2M pre-seed 在 downside 情景下的现金几乎会被吃干。
- checkName: 下一轮融资证明
  finding: 下一轮融资要讲的故事是：到 Q4Y2 做到 8 个活跃项目、部署周期低于 30 天，并跑出至少 1 条合作方带来的正式生产路径，证明确有渠道复利。
sanityChecks:
  ruleOf40: Y3 增速 85% + EBITDA 利润率 -16% = 70%。
  burnMultiple: Y2 的烧钱倍数约为 0.9x，对应 $735K 净新增收入；到 Y3 随着模板复用和正式转化累积，改善到约 0.3x。
  revenuePerFte: Y3 年末 8 名 FTE 对应每人约 $236K 收入（垂直 SaaS 常见参考区间约 $200-400K）。
  flags:
  - 模型到 Y3 末只做到 $1.89M 已确认收入，仍低于研究里的 $2.2M SOM，因为没有提前假设中国以外扩张。
  - 业务到 Y3 仍是 EBITDA 负值，因此下一轮融资更依赖里程碑证明和合作路径可复制性，而不是短期盈利。
  - 只要丢掉 1 个正式生产项目，收入和现金都会明显被拉低，因为 Y3 的滩头市场也只有 12 个活跃项目。
  - 毛利率只有在科学评审和实施工作到第 3 或第 4 次部署时真正模板化，才有机会打到目标区间。
