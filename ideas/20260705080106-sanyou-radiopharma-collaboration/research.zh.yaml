openQuestions:
- 在目标规模带内，中国到底有多少放射药团队真正掌控自己的 pre-IND 工作流预算，而不是交给 CDMO 或母公司？
- 真正最容易关单的可量化 KPI 是什么：少返工、更快 no-go，还是更少制造与站点意外？
- 产品能否接进现有发现 / CMC 工作流，而不触发更大的数据平台替换项目？
- 随着 alpha 发射体项目成熟，规则引擎需要多快从 Ga-68、Zr-89、Cu-64 和 Re-186 扩出去？
