  validationPlan:
  - priority: high
    question: 今天到底有多少中国放射药公司，真符合 20-80 人、首个项目、强依赖外部供应商的滩头画像？
    evidenceToGather: 拉一张实名账户地图：列出中国放射药初创公司的项目阶段、团队规模、内部 CMC 深度和当前外部合作方。
  - priority: high
    question: 哪一个 KPI 最容易真正打开预算：少返工、更快拼出 pre-IND 包，还是更少的制造 / 站点意外？
    evidenceToGather: 跑 1 个活跃共创客户试点，拿到实施前后的基线数据：决策周期、重开的工作包数量，以及跨供应商对齐程度。
  - priority: high
    question: 产品能否接进客户现有工作流，而不逼客户做整套 ELN / LIMS 迁移？
    evidenceToGather: 用表格、CRO / CDMO 报告、实验输出和 1 个现有数字实验室平台，做一次真实数据接入测试。
  - priority: medium
    question: 在不同地域、适应症和分子类别下，同位素和站点逻辑到底要本地化到什么程度，软件才会让人放心？
    evidenceToGather: 请专家对至少 2 条肽类项目和 2 条抗体项目的初始规则集做评审，并把中国和中国以外的站点假设并排比较。
  - priority: medium
    question: CDMO 会是可复制渠道，还是未来竞争对手？
    evidenceToGather: 访谈至少 2 家放射药 CDMO 和 1 家顾问机构，问清转介绍激励、集成边界，以及是否有白标意愿。
