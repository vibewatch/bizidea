competitors:
- name: Benchling
  stage: incumbent
  wedge: 通用生物技术底账系统，卖点是统一实验数据和流程编排。
  pricing: 定制企业合同；无公开标价。
  strength: 如果团队只想把实验上下文和受治理流程放到一处，Benchling 仍是最强的通用型 R&D 数据平台。
  weaknessVsUs: 但它不是围绕同位素配对决策、放射药专属可开发性规则或核医学中心就绪度构建的。
  sourceRefs:
  - 12
  - 13
- name: Dotmatics
  stage: incumbent
  wedge: 可组合的科学 R&D 平台，支持自适应实验室工作流和生物药发现。
  pricing: 定制企业合同；无公开标价。
  strength: 灵活的工作流工具和集成层，让它在生物技术实验室里很像一个现有厂商延伸点。
  weaknessVsUs: 可它的默认抽象仍是通用科学工作流，而不是放射配体专属的可制造性和站点物流取舍。
  sourceRefs:
  - 14
  - 15
- name: Sapio Sciences
  stage: scale-up
  wedge: 面向 AI-ready 实验室信息化和 CMC 数字化的平台，也强调系统集成。
  pricing: 定制企业合同；无公开标价。
  strength: 它和受监管 R&D、CMC 的留痕需求高度贴合。
  weaknessVsUs: 但它更擅长把实验室数字化，还没真正接管跨外部合作方的放射药靶向分子-同位素决策模型。
  sourceRefs:
  - 17
- name: Nucleus RadioPharma
  stage: scale-up
  wedge: 端到端放射药 CDMO，覆盖开发、制造和供应链服务。
  pricing: 定制项目报价；无公开标价。
  strength: 离真实执行瓶颈最近，也很吸引那些更愿意把复杂度整包外包的买家。
  weaknessVsUs: 但它是执行供应商，不是跨多个 CDMO 和中心选择都保持中立的控制层，更不是可复用的软件数据集。
  sourceRefs:
  - 18
- name: Eckert & Ziegler Radiopharma
  stage: incumbent
  wedge: 全球放射药开发、GMP 制造、监管支持和物流服务商。
  pricing: 定制项目报价；无公开标价。
  strength: 它在运营可信度、全球覆盖和 GMP / 物流问题上都很硬。
  weaknessVsUs: 但和其他 CDMO 一样，它赚的是项目执行的钱，不是客户可以自己留在手里的软件优先、中立决策驾驶舱。
  sourceRefs:
  - 21
