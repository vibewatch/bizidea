slug: nigeria-prize-capital-navigator
date: '2026-06-28'
currency: USD
modelStartMonth: '2026-07'
assumptions:
  - id: A1
    name: Model start month
    value: '2026-07'
    unit: YYYY-MM
    source: '[BP date 2026-06-28] model starts the month after the business-plan date, aligning with the live NPI 4.0 window opening in June 2026.'
  - id: A2
    name: Opening cash and pre-seed raise
    value: $2.0M
    unit: USD
    source: '[BP fundingAsk targetFundingRangeUsd $1.5-2.5M] base case uses the midpoint of the stated pre-seed range; lean Nigeria-first team keeps burn well within this envelope.'
  - id: A3
    name: Customer definition
    value: One founder team with an active paid NSIA or adjacent-program workspace subscription
    unit: definition
    source: '[BP businessModel.unitOfValue] customersEop tracks active paying teams, not individual users within a team.'
  - id: A4
    name: ARPU
    value: $30/month per team ($360/year)
    unit: USD/team/month
    source: '[BP gtm.pricing $30-60/month; BP market.som $0.18M / 500 teams = $360/year] base-case uses the low end of the stated range to be conservative; 3-month minimum cycles produce $90-180 per NSIA application window.'
  - id: A5
    name: Y1 customer ramp (end-of-period)
    value: 0,2,5,10,16,24,30,36,43,48,53,58 by month M1-M12
    unit: teams
    source: '[BP milestones 0-12 months: 10 paid founders target; BP experimentRoadmap concierge sprint M1-M3 then MVP launch M6] ramp is front-loaded by NSIA 4.0 deadline pressure; 58 Y1 EOP gives a ~20% buffer above the 10-paid milestone.'
  - id: A6
    name: Y2 customer ramp (end-of-quarter)
    value: 95, 135, 175, 220 (Q1-Q4 Y2)
    unit: teams
    source: '[BP milestones 12-24 months: 100-200 paying teams; Research market.sam 3,000 serious teams] 220 by Y2 end sits at ~7% of SAM, consistent with early distribution through 2 hub partners.'
  - id: A7
    name: Y3 customer ramp (end-of-quarter)
    value: 285, 355, 430, 500 (Q1-Q4 Y3)
    unit: teams
    source: '[BP milestones 24-36 months: ~500 paying teams; Research market.som 500 teams × $360 = $180K year-3 SOM] 500 EOP aligns exactly with the researched SOM ceiling.'
  - id: A8
    name: Monthly churn rate
    value: 5.0%
    unit: percent/month
    source: '[startup-finance heuristic for seasonal SMB SaaS + BP operatingAssumptions dossier-reuse target >40%] 5% monthly churn implies ~20-month average customer life; if fewer than 40% reuse the dossier for a second program the effective rate rises closer to 8%, which is the downside case.'
  - id: A9
    name: COGS model
    value: $0.80K/month fixed (Y1), $0.90K (Q3-Q4 Y1 MVP launch), $1.00K (Y2), $1.20K (Y3) fixed plus $5 variable per active customer per month
    unit: USD
    source: '[BP operations Nigeria-first document security, audit logs, secure vault; startup-finance heuristic for compliant cloud storage] fixed covers hosting, security tooling, and mandatory audit-log infrastructure; variable covers AI-API calls, per-customer storage, and support ticket load.'
  - id: A10
    name: Target gross margin
    value: 70%
    unit: percent
    source: '[BP businessModel.targetGrossMarginPct 70] model reaches ~67% GM by Q4 Y2 and ~72% by Q4 Y3 as fixed COGS amortize over a larger customer base.'
  - id: A11
    name: Hiring timeline — founding team
    value: CEO and Founding Eng at M1; Program Ops Lead at M2; Product Lead at M6; Partnerships Lead at M9
    unit: months
    source: '[BP team.startTiming for each role] exactly matches business plan sequencing rationale: product and compliance capacity first, partnerships second.'
  - id: A12
    name: Hiring timeline — scale team
    value: Eng2 at Q1Y2; Eng3 at Q2Y2; Customer Success Lead at Q3Y2; Eng4 at Q1Y3; Sales Lead at Q3Y3
    unit: quarters
    source: '[BP milestones 12-24 months: repeatable onboarding + partner channels; BP strategicChoices.sequencingRationale] scale hiring is gated on partner channel proof (end of Y1) and founder-economics validation (mid Y2).'
  - id: A13
    name: Monthly salaries — founding team
    value: CEO $8K; Founding Eng $8K; Program Ops Lead $4K; Product Lead $5.5K; Partnerships Lead $4K
    unit: USD/month
    source: '[startup-finance heuristic: Lagos-based hybrid team with international funding; Nigerian senior-tech market rates 2025-2026] includes employer costs and statutory deductions; set below US/EU rates to preserve runway while remaining competitive in the Lagos tech market.'
  - id: A14
    name: Monthly salaries — scale team
    value: Eng2/Eng3/Eng4 $6K each; Customer Success Lead $3.5K; Sales Lead $5K
    unit: USD/month
    source: '[startup-finance heuristic: mid-level Nigerian tech roles 2025-2026] mid-level engineers are priced below the founding engineer to reflect seniority difference and preserve GM headroom.'
  - id: A15
    name: Non-payroll operating costs
    value: 'Y1: S&M $3K/mo, G&A $3K/mo, Infra $2K/mo; Y2: S&M $5K/mo, G&A $4K/mo, Infra $2.5K/mo; Y3: S&M $6K/mo, G&A $4K/mo, Infra $3K/mo'
    unit: USD/month
    source: '[BP gtm.channels events, hub referrals, community presence; BP operations compliance and audit architecture; startup-finance heuristic] S&M covers Lagos ecosystem events, digital outreach, and partner-enablement materials; G&A covers legal, accounting, and local corporate administration.'
  - id: A16
    name: Functional payroll allocation
    value: CEO to G&A; Founding Eng, Program Ops, Product Lead, Eng2/3/4 to R&D; Partnerships Lead, Customer Success, Sales Lead to S&M
    unit: allocation
    source: '[BP team rationales] rolls headcount cost into P&L operating lines by primary function.'
  - id: A17
    name: Cash conversion assumption
    value: EBITDA approximates operating cash movement; no material capex, taxes, or working-capital swings
    unit: modeling convention
    source: '[startup-finance heuristic] pre-seed SaaS with monthly subscriptions and no hardware or inventory; any deferred revenue is immaterial at this stage.'
  - id: A18
    name: CAC — blended
    value: $100 per acquired team
    unit: USD/team
    source: '[BP gtm.funnelTargets partner-referred conversion 25%+; BP mustBeTrue partner CAC beats direct] 70% of customers acquired through hub and partner referrals at ~$60 cash CAC, 30% through direct founder outreach at ~$190 cash CAC; blended ~$100. CEO time is already captured in G&A salary and is not double-counted.'
  - id: A19
    name: LTV calculation
    value: ($30 ARPU × 70% GM) / 5% monthly churn = $420 per team
    unit: USD/team
    source: '[derived from A4, A8, A10] standard subscription LTV formula; 20-month average life (1 / 0.05).'
  - id: A20
    name: Funding milestone for this round
    value: Complete NSIA MVP, one live NSIA season, two hub-partner pilots, 50+ paid teams Y1, 200+ teams Y2, and >40% second-program dossier reuse rate
    unit: milestone
    source: '[BP milestones 0-24 months + BP investorMemo.mustBeTrue] this proof package is required before a Seed round becomes credible.'
