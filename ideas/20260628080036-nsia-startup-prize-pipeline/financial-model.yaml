    baseCase: $30/month — low end of stated $30-60 range with 3-month minimum cycles
    upsideCase: $40/month — 15% of teams adopt premium review tier at $50-60/month
    y3RevenueImpactK: -33.7
    cashImpactK: -23.6
  - variable: churn
    downsideCase: 8%/month — strongly seasonal demand; fewer than 25% of teams reuse dossier for a second program
    baseCase: 5%/month — 40% second-program dossier reuse per BP mustBeTrue target
    upsideCase: 3%/month — robust multi-program reuse drives extended subscription tenure
    y3RevenueImpactK: -27.9
    cashImpactK: -19.5
  - variable: CAC
    downsideCase: $200/team — partner channels fail to convert; company falls back to expensive direct outbound
    baseCase: $100/team — 70% partner-referred at $60, 30% direct at $190
    upsideCase: $50/team — hub referral relationships dominate acquisition with low marginal cost
    y3RevenueImpactK: 0.0
    cashImpactK: -28.0
  - variable: sales cycle
    downsideCase: 30% slower ramp than modeled — NSIA window is too narrow; off-season demand is near zero
    baseCase: As modeled — 0 to 58 (Y1), 220 (Y2), 500 (Y3) teams
    upsideCase: 25% faster ramp — adjacent programs and TEF/Hackaholics windows extend the buying season
    y3RevenueImpactK: -26.1
    cashImpactK: -18.3
  - variable: gross margin
    downsideCase: 55% GM — Nigeria-first compliance costs (domestic hosting, audit logs, security certifications) rise faster than modeled
    baseCase: 70% GM — BP target; achieved by Q2-Q3 Y3 at scale
    upsideCase: 75% GM — automation reduces per-customer support burden and AI-generation cost per call
    y3RevenueImpactK: 0.0
    cashImpactK: -19.3
  - variable: hiring pace
    downsideCase: Over-hire 2 engineers in Y2 ahead of validated demand — adds $144K to Y2 opex
    baseCase: As modeled — milestone-gated hiring tied to partner-pilot and revenue proof
    upsideCase: Defer Sales Lead and one engineer to Y4 — saves $66K in Y3 cash
    y3RevenueImpactK: 0.0
    cashImpactK: -144.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Leads[Hub and partner leads] --> Qualify[Qualified founders]
      Qualify --> Customers[Paid founder teams]
      Customers --> Revenue[MRR at 30 USD per team]
      Revenue --> GrossProfit[Gross profit at 70 pct GM]
      GrossProfit --> Cash[Operating cash]
      Customers --> Reuse[Dossier reuse 40 pct plus]
      Reuse --> Customers
modelSanity:
  - checkName: Revenue engine
    finding: Revenue scales linearly with paid founder teams at $30/month ARPU, driven by NSIA and adjacent-program application deadlines that compress buying decisions into short, high-urgency windows rather than requiring sustained demand generation.
  - checkName: Must go right
    finding: Partner-channel conversion through hubs and official ecosystem portals must outperform direct founder-led CAC by Month 12, because organic growth alone cannot reach the 220-team Y2 milestone within the $2M pre-seed envelope.
  - checkName: Model breaks if
    finding: Monthly churn exceeds 7% (highly seasonal, few multi-program returners) or ARPU cannot hold above $25/month, because both conditions simultaneously collapse LTV/CAC below 3x and eliminate the gross-profit contribution needed to sustain even a lean operating budget.
  - checkName: Next-round proof
    finding: A Seed round becomes credible when the company can show 100+ paying teams, at least one partner-channel CAC below $75, and a verified 40%-plus second-program dossier reuse rate—the three signals targeted by the end of Year 2 in the business plan milestones.
sanityChecks:
  ruleOf40: Y3 revenue growth 163% + Y3 EBITDA margin -548% = -385; rule of 40 is not meaningful below $1M ARR and is flagged as inapplicable at this stage.
  burnMultiple: 7.0x in Y3 (net burn $705K / net new ARR $101K); high but expected pre-scale; must improve to below 3x before a Seed raise is credible.
  revenuePerFte: $12.9K Y3 (10 FTE); far below the $150-400K SaaS benchmark — reflects the small Nigeria-first market ceiling; adjacent West African expansion is required to lift this metric to investable levels.
  flags:
    - TAM of $5.4M and SAM of $1.1M are genuinely small; revenue per FTE cannot reach SaaS benchmark without West African program expansion beyond the modeled period.
    - The $2M pre-seed provides ~33 months of modeled runway, materially longer than the business plan's stated 18-month target; the 18 months likely reflects the milestone-proof horizon, not cash exhaustion.
    - Monthly churn of 5% is a critical assumption; if the NSIA application window is the only annual trigger and fewer than 40% of teams reuse the dossier, effective churn could rise to 8-10% and LTV/CAC drops below 3x.
    - Year 3 cash of $296K represents approximately 5 months of Q4Y3 burn; the company must either raise a Seed round in Y3 or demonstrate meaningful revenue acceleration to extend its own runway.
    - Gross margin is negative in Y1 (fixed infrastructure costs exceed early revenue) and does not reach the 70% target until Q2-Q3 Y3; investors should model the path to GM breakeven as a gating condition rather than assuming it from Day 1.
    - Partner-channel CAC of $100 is a modeled estimate with no empirical validation; the kill criterion in the business plan (partner CAC must beat direct after 2 referral pilots) must be measured in the first live NSIA season.
