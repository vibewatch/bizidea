scenarios:
  downside:
    description: Founders continue to rely on free hubs and mentors; partner channels deliver only 40% of modeled qualified leads; monthly churn rises to 8% as dossier reuse stays below 25%.
    y3RevenueK: 72.0
    y3EbitdaK: -725.0
    cashLowPointK: 160.0
    keyAssumptionChanges:
      - Customer ramp reaches only 300 teams by Y3 end instead of 500
      - Monthly churn rises from 5% to 8% due to weak multi-program retention
      - Partner-channel CAC doubles to $200 per team acquired
  base:
    description: Partner channels reach 15-25% qualified-founder conversion; 40% dossier reuse; 5% monthly churn; customer ramp follows modeled trajectory to 500 teams by Y3 end.
    y3RevenueK: 128.7
    y3EbitdaK: -705.151
    cashLowPointK: 295.973
    keyAssumptionChanges:
      - Customer ramp 0 to 58 (Y1), 220 (Y2), 500 (Y3)
      - Monthly churn 5%, blended CAC $100
      - 70% gross margin achieved in Y3
  upside:
    description: Partner channels outperform; adjacent programs drive faster dossier reuse; 15% of teams migrate to $45/month premium tier; Y3 ramp hits 500 teams by Q3 rather than Q4.
    y3RevenueK: 192.0
    y3EbitdaK: -660.0
    cashLowPointK: 390.0
    keyAssumptionChanges:
      - Customer ramp 30% faster than base; 500 teams reached in Q3Y3
      - 15% of teams pay $45/month premium tier, lifting blended ARPU to $34
      - Monthly churn falls to 3% as multi-program reuse exceeds 50%
