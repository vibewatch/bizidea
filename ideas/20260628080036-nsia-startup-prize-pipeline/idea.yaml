differentiator: >-
  Unlike generic grant-writing services or offline accelerator prep programs,
  this platform is built specifically around the NSIA-Pula-Wema capital ladder
  with machine-readable rubrics for each stage. Submission history from each
  application cohort creates a proprietary feedback loop that generic
  consultants and WhatsApp mentor networks cannot replicate. The platform's
  sector specificity for manufacturing, climate, and healthcare means every
  template, impact metric, and financial summary is calibrated to the kinds of
  businesses Nigeria's sovereign fund actually funds — not generic startup
  frameworks imported from Silicon Valley accelerator programs.
