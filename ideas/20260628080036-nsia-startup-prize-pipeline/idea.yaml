    - Proprietary win-rate analytics that improve with each cohort
  channels:
    - >-
      Direct outreach during NSIA application windows via WhatsApp founder
      groups and Lagos tech community channels
    - Partnership with EDC Lagos and Pula Xcelerator as referral sources
    - Lagos tech hubs as in-person distribution points (CcHub, Founders Factory Africa)
  customerRelationships:
    - Self-serve subscription with in-app guided workflows
    - Expert review add-on for finalist-stage document polishing
  revenueStreams:
    - Monthly SaaS subscription ($30-60 per month per startup)
    - Success-based fee (1-2% of prize winnings on premium tier)
    - Program analytics licensing to NSIA and Pula Fund
  keyResources:
    - Proprietary rubric database for NSIA, Pula Xcelerator, and Wema Bank programs
    - Application outcome dataset from successive prize cohorts
    - Relationships with EDC Lagos and Pula Fund program teams
  keyActivities:
    - Maintaining up-to-date program requirement databases
    - Building application-generation workflows for each prize program
    - Acquiring outcome data to improve eligibility scoring models
  keyPartners:
    - EDC Lagos (enterprise development referral pipeline)
    - Pula Fund (Xcelerator intake intelligence)
    - Wema Bank (Hackaholics program integration)
    - Lagos tech hubs as distribution partners
  costStructure:
    - Engineering and product for document generation and rubric maintenance
    - Partnerships and ecosystem development team in Lagos
    - Customer success for cohort onboarding during prize windows
jobsToBeDone:
  - job: >-
      When preparing for the NSIA prize application, help the early-stage
      Nigerian founder build a submission-ready dossier in under two weeks so
      they can qualify without hiring a consultant or needing ecosystem
      connections.
    currentAlternative: Independent grant consultants or accelerator mentor networks
    successMetric: Complete application submitted before deadline with all required sections
  - job: >-
      When a startup wins an NSIA prize, help the founding team understand
      exactly what they need to qualify for the Pula Xcelerator so they can
      maximize follow-on access without losing momentum after the announcement.
    currentAlternative: Ad hoc advice from NSIA mentors or EDC Lagos program staff
    successMetric: >-
      Pula Xcelerator application initiated within 30 days of NSIA prize
      announcement
ideaScorecard:
  signalStrength:
    score: 3
    rationale: >-
      Single government-news source with concrete prize economics ($275K pool,
      $1.5M follow-on) but no independent confirmation of application volume or
      historical rejection rates.
  painIntensity:
    score: 4
    rationale: >-
      Application fragmentation and opaque eligibility across multi-program
      capital ladders is a documented pain in emerging-market startup
      ecosystems; NSIA's own EDC Lagos bundling confirms the sovereign fund
      treats readiness as a bottleneck.
  wedgeClarity:
    score: 5
    rationale: >-
      The NSIA prize application window is a hard, time-bound event that creates
      immediate urgency and a specific first product with no existing software
      alternative in the Nigerian market.
  defensibility:
    score: 3
    rationale: >-
      First-mover data advantage from successive cohorts is real but slow to
      accumulate; a well-funded competitor could copy the rubric database in 6-
      12 months — partnerships with EDC Lagos and Pula Fund are the faster moat.
  ventureScale:
    score: 3
    rationale: >-
      Nigeria's active startup ecosystem expanded across all West African and
      pan-African prize programs supports a $30M-$80M ARR ceiling; not a
      billion-dollar TAM today but expandable with regional and DFI rollout.
topRisks:
  - name: Small annual prize cohort
    description: >-
      The NSIA prize selects a limited number of startups per year, capping
      initial revenue if the product stays anchored to a single prize window.
    mitigation: >-
      Launch with NSIA as the acquisition hook but immediately expand to cover
      at least five other active Nigerian and West African prize and grant
      programs within the first six months.
  - name: Program discontinuity risk
    description: >-
      Sovereign prize programs can be restructured, defunded, or delayed due to
      budget cycles, political changes, or NSIA board decisions outside the
      startup's control.
    mitigation: >-
      Diversify the program database to include non-sovereign programs (UN, IFC,
      AfDB, private foundation grants) so platform value is not dependent on any
      single prize sponsor.
  - name: Low-digitization distribution challenge
    description: >-
      Many target founders in Nigerian manufacturing and climate-tech are not
      active on SaaS purchasing channels, making inbound acquisition slow
      without community-based distribution.
    mitigation: >-
      Partner with EDC Lagos, CcHub, and Pula Xcelerator as referral channels
      and build a free eligibility checker that generates organic word-of-mouth
      inside WhatsApp founder groups.
