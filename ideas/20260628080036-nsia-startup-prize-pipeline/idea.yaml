problem: >-
  Nigerian founders applying for the NSIA prize and its downstream programs
  (Pula Xcelerator, Wema Bank Hackaholics) face a fragmented capital
  application process with no central view of what is needed to qualify at each
  stage. Most manufacturing, climate-tech, and healthcare startups waste weeks
  rebuilding pitch decks, financial models, and impact evidence for each
  program separately, or hire expensive consultants who lack real-time knowledge
  of current eligibility criteria. The NSIA prize's three-stage capital ladder
  ($275K prize to $1.5M Xcelerator to Wema Bank grants) is only legible to
  founders with existing ecosystem networks, systematically excluding the very
  early-stage companies the prize was designed to serve.
targetUser:
  primary: >-
    Pre-seed or seed-stage Nigerian manufacturing, climate-tech, or healthcare
    founder with a working prototype and 2-10 employees preparing for the NSIA
    prize or a comparable sovereign grant program
  secondary: >-
    Program managers at NSIA, Pula Fund, and Wema Bank who review prize
    applications and need better pipeline visibility across cohorts
  buyer: >-
    Founding CEO or co-founder responsible for fundraising and grant
    applications
startupThesis:
  nonObviousInsight: >-
    The NSIA prize is not a one-time grant — it is the published entry gate to
    a coordinated $1.5M+ sovereign capital ladder across three institutions
    (NSIA, Pula Xcelerator, Wema Bank) plus enterprise development at EDC
    Lagos. Most founders treat each program as independent, missing that success
    in one unlocks eligibility requirements at the next. The startup that maps
    and manages this ladder first accumulates proprietary data on what actually
    wins at each stage — a flywheel that independent grant consultants and
    generalist accelerators cannot replicate.
  beachhead: >-
    Nigerian manufacturing-tech and climate-tech founders preparing 2026 NSIA
    Prize applications, an estimated 50-200 active applicants per annual cohort
    within a hard submission window
  wedge: >-
    NSIA-specific prize application workbench that auto-generates a submission-
    ready pitch summary, financial profile, and impact scorecard aligned to
    NSIA's published criteria, reducing prep time from weeks to days
  whyNowCatalyst: >-
    The 2026 NSIA Prize announcement explicitly links prize selection to Pula
    Xcelerator and Wema Bank access for the first time, creating a published
    multi-step capital ladder that founders need software to navigate and that
    did not exist as a single coordinated signal before this cycle.
  ventureScalePath: >-
    Starting with the NSIA prize window, expand to all West African sovereign,
    DFI, and international grant programs (AfDB, IFC, UN agencies, national
    innovation funds); the application dossier built for one program becomes a
    reusable asset library for all others, compounding network value as each
    cohort's outcome data improves eligibility scoring.
solution: >-
  A founder-facing SaaS that aggregates Nigerian prize and grant program
  requirements into a single guided workflow. Founders input their startup
  profile once; the platform generates program-specific pitch summaries,
  financial profiles, and impact scorecards calibrated to each prize's published
  rubric. An integrated milestone tracker shows founders exactly which
  documents, traction milestones, and impact metrics they need to unlock the
  next stage of the NSIA-Pula-Wema capital ladder. Built-in progress checks
  against historical winner patterns surface gaps before submission, acting as
  an asynchronous readiness coach that is always current with the latest program
  requirements.
goToMarketSeed:
  firstCustomer: >-
    A manufacturing-tech or climate-tech startup in Lagos with 2-8 employees, a
    working prototype, and no existing investor relationships, currently
    preparing the 2026 NSIA Prize application without structured guidance or a
    grant consultant
  buyingTrigger: >-
    Opening of the annual NSIA Prize application window, which creates a hard
    submission deadline that forces founders to act within weeks
  currentAlternative: >-
    Hiring an independent grant consultant at $200-$500 per engagement, relying
    on ad hoc accelerator mentor advice, or piecing together templates from
    WhatsApp founder groups and online forums
  switchingReason: >-
    The platform costs less than one consultant engagement, is always current
    with live NSIA and Pula Xcelerator requirements, and produces
    submission-ready documents rather than advice-only outputs that still leave
    the founder to do the writing work
  pricingHypothesis: >-
    Subscription at $30-60 per month per startup, with a free eligibility
    checker tier to drive top-of-funnel; optional success-based fee of 1-2% of
    prize amount won for premium review tier
