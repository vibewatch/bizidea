      score: 3
      rationale: 相邻工具和项目数量众多，但没有任何一家看起来与 NSIA→Pula→Hackaholics 执行工作流紧密对应。
      sourceRefs:
      - 17
      - 19
      - 20
      - 21
      - 28
  pestle:
  - factor: 政治
    impact: negative
    point: 政策支持存在，但《创业法》的红利仍依赖缓慢的联邦和州级执行。
    sourceRefs:
    - 8
    - 9
  - factor: 经济
    impact: positive
    point: 挑战基金、主权创新资金池和耐心资本项目，在创始人面临更严峻融资环境时仍具吸引力。
    sourceRefs:
    - 15
    - 16
    - 32
    - 33
  - factor: 社会
    impact: positive
    point: 尼日利亚的数字技能和零工经济项目正在扩大有能力尝试正式申请的创始人和运营者群体。
    sourceRefs:
    - 13
    - 37
  - factor: 技术
    impact: positive
    point: AI 能消除重复性申请工作——前提是嵌入安全工作流，而非以原始文本生成的形式提供。
    sourceRefs:
    - 20
  - factor: 法律
    impact: negative
    point: 敏感创始人文件和不断演变的本地化规则，为任何工作流产品提高了合规门槛。
    sourceRefs:
    - 10
    - 34
  - factor: 环境
    impact: positive
    point: 气候、粮食安全和能源转型主题正在获得明确资助，扩大了行业专属创始人的机会集合。
    sourceRefs:
    - 1
    - 3
    - 16
    - 33
  adoptionFrictionMatrix:
  - friction: 创始人可能不愿上传注册证明、身份和财务等敏感文件
    severity: high
    affectedBuyer: 创始人 CEO
    mitigation: 采用尼日利亚优先合规姿态、明确授权、精细访问控制和审计跟踪。
    sourceRefs:
    - 10
    - 11
    - 34
  - friction: 需求具有季节性，在截止日期窗口前后集中爆发
    severity: medium
    affectedBuyer: 创始人 CEO
    mitigation: 迅速扩展到相邻项目，并在周期之间保留可复用的材料库。
    sourceRefs:
    - 1
    - 14
    - 17
  - friction: 部分目标用户缺乏稳定的电脑使用条件或优质网络
    severity: high
    affectedBuyer: 非拉各斯或资源不足的创始人
    mitigation: 设计移动优先、低带宽的使用体验，并借助孵化中心基础设施。
    sourceRefs:
    - 13
    - 27
    - 37
  - friction: 免费替代品使付费转化困难
    severity: medium
    affectedBuyer: 自力更生的创始人
    mitigation: 通过合作伙伴转介和基准差距分析，证明结果提升和时间节省。
    sourceRefs:
    - 17
    - 19
    - 22
    - 29
  - friction: 用户可能对缺乏明确溯源的 AI 生成材料持怀疑态度
    severity: medium
    affectedBuyer: 创始人和项目经理
    mitigation: 将输出与公开标准挂钩，展示数据来源，并在流程中保留可选的人工审核环节。
    sourceRefs:
    - 14
    - 20
    - 29
market:
  tam:
    value: $5.4M
    rationale: '地区 TAM 模型估算：尼日利亚加相邻西非资本项目的认真创始人团队每年 15,000 支 × 每队年均消费约 $360。团队数量相对于 NPI 前三届超过 20,000 份申请、TEF 每年数十万份泛非申请以及 CcHUB 2025 年支持的 3,312 家企业，已属保守估算。'
    isEstimate: true
    sourceRefs:
    - 2
    - 12
    - 14
  sam:
    value: $1.1M
    rationale: '尼日利亚优先 SAM 模型估算：每年 3,000 支认真付费团队 × $360。假设 NPI 原始申请者中只有少数在目标范围内，并加入来自 TEF-、VC4A-、Antler- 和孵化中心关联工作流的相邻申请者。'
    isEstimate: true
    sourceRefs:
    - 2
    - 12
    - 14
    - 17
    - 22
  som:
    value: $0.18M
    rationale: '第 3 年 SOM 模型估算：500 支付费团队 × $360，通过拉各斯优先启动加合作伙伴主导分发，触达 NPI 相邻申请者群体。'
    isEstimate: true
    sourceRefs:
    - 12
    - 13
    - 17
    - 22
    - 25
