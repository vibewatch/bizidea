    - 在前几轮奖项落选后重新申请的 seed 阶段初创企业
    - NSIA 和 Pula Fund 需要批次管线分析的项目经理
  valuePropositions:
    - 将 NSIA 奖项申请备战时间从数周压缩到数天
    - 一份材料包可跨 NSIA、Pula Xcelerator 和 Wema Bank 复用
    - 随每批次数据积累不断提升的专有胜率分析
  channels:
    - >-
      在 NSIA 申请窗口期间，通过 WhatsApp 创始人群和拉各斯科技社区渠道直接触达
    - 与 EDC Lagos 和 Pula Xcelerator 合作建立转介来源渠道
    - 拉各斯科技孵化中心作为线下分发节点（CcHub、Founders Factory Africa）
  customerRelationships:
    - 内置引导式工作流的自助订阅
    - 决赛阶段文件精修的专家审核增值服务
  revenueStreams:
    - 月度 SaaS 订阅（每个初创企业 $30—60/月）
    - 绩效费（高级档位的获奖金额 1—2%）
    - 向 NSIA 和 Pula Fund 授权项目分析报告
  keyResources:
    - NSIA、Pula Xcelerator 和 Wema Bank 项目的专属评分细则数据库
    - 历届奖项批次的申请结果数据集
    - 与 EDC Lagos 和 Pula Fund 项目团队的合作关系
  keyActivities:
    - 持续维护各项目的最新要求数据库
    - 为每个奖项构建申请材料生成工作流
    - 收集结果数据以优化资格评分模型
  keyPartners:
    - EDC Lagos（企业发展转介管线）
    - Pula Fund（Xcelerator 筛选情报）
    - Wema Bank（Hackaholics 项目整合）
    - 拉各斯科技孵化中心（分发合作伙伴）
  costStructure:
    - 文件生成与评分细则维护的工程与产品投入
    - 拉各斯本地的合作与生态系统发展团队
    - 奖项窗口期间批次入驻的客户成功支持
jobsToBeDone:
  - job: >-
      在备战 NSIA 奖项申请时，帮助早期阶段的尼日利亚创始人在两周内完成提交就绪的材料包，让他们无需雇用顾问或依靠生态人脉即可满足资格要求。
    currentAlternative: 独立资助顾问或加速器导师网络
    successMetric: 在截止日期前完成包含所有必要章节的完整申请提交
  - job: >-
      初创企业赢得 NSIA 奖项后，帮助创始团队清楚了解申请 Pula Xcelerator 所需满足的具体条件，让他们能在公告发布后不失动力地争取后续资金。
    currentAlternative: NSIA 导师或 EDC Lagos 项目工作人员的临时建议
    successMetric: >-
      在 NSIA 奖项公告发布后 30 天内启动 Pula Xcelerator 申请
ideaScorecard:
  signalStrength:
    score: 3
    rationale: >-
      单一政府新闻来源，但对奖项经济数据（$275K 奖金池、$1.5M 后续资金）有具体描述，缺乏申请量或历史拒绝率的独立核实。
  painIntensity:
    score: 4
    rationale: >-
      多项目资本阶梯中申请碎片化、资格标准不透明，是新兴市场初创生态中有据可查的痛点；NSIA 将 EDC Lagos 捆绑其中，表明主权基金本身已将就绪视为瓶颈。
  wedgeClarity:
    score: 5
    rationale: >-
      NSIA 奖项申请窗口是一个硬性、有时间边界的事件，创造即时紧迫感，且在尼日利亚市场没有任何现有软件替代方案——第一款产品指向明确。
  defensibility:
    score: 3
    rationale: >-
      历届批次积累的先发数据优势真实存在，但积累速度慢；资金充足的竞争者可能在 6—12 个月内复制评分细则数据库——与 EDC Lagos 和 Pula Fund 的合作关系才是更快形成的护城河。
  ventureScale:
    score: 3
    rationale: >-
      尼日利亚活跃初创生态延伸至西非及泛非奖项项目，支撑 ARR 上限约 $30M—$80M；当前并非十亿美元级 TAM，但可随地区和 DFI 扩张而增长。
topRisks:
  - name: 年度奖项批次规模有限
    description: >-
      NSIA 奖项每年入选数量有限，若产品仅锚定单一奖项窗口，初期营收存在上限。
    mitigation: >-
      以 NSIA 作为获客钩子启动，但在前六个月内迅速扩展，至少覆盖五个其他活跃的尼日利亚和西非奖项与资助项目。
  - name: 项目中断风险
    description: >-
      主权奖项项目可能因预算周期、政治变动或 NSIA 董事会决策而重组、撤资或延期，这些因素完全不在初创企业的掌控之中。
    mitigation: >-
      扩大项目数据库，纳入非主权项目（联合国、IFC、AfDB、私人基金会资助），使平台价值不依赖于任何单一奖项主办方。
  - name: 低数字化分发挑战
    description: >-
      尼日利亚制造业和气候科技领域的许多目标创始人并不活跃于 SaaS 购买渠道，缺乏社区化分发的情况下，入站获客速度缓慢。
    mitigation: >-
      与 EDC Lagos、CcHub 和 Pula Xcelerator 合作建立转介渠道，同时推出免费资格审查工具，在 WhatsApp 创始人群内催生口碑传播。
