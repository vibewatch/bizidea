problem: >-
  申请 NSIA 奖项及其后续项目（Pula Xcelerator、Wema Bank Hackaholics）的尼日利亚创始人，面对一套碎片化的资本申请流程——没有任何中心视图告诉他们在每个阶段需要满足什么条件。大多数制造业、气候科技和医疗健康初创企业只能在截止日期压力下，为每个项目分别重建路演材料、财务模型和影响力证明，或者花高价雇用对当前资格标准缺乏实时了解的顾问。NSIA 奖项的三阶资本阶梯（$275K 奖项→$1.5M 加速器→Wema Bank 资助）只有具备现有生态系统人脉的创始人才能读懂，那些奖项本该服务的早期创业者反而被系统性排除在外。
targetUser:
  primary: >-
    处于 pre-seed 或 seed 阶段、有可运行原型、员工 2—10 人、正在备战 NSIA 奖项或同类主权资助项目的尼日利亚制造业、气候科技或医疗健康创始人
  secondary: >-
    NSIA、Pula Fund 和 Wema Bank 的项目经理，负责审核奖项申请并需要更清晰地了解各批次的项目管线
  buyer: >-
    负责融资与资助申请的创始人 CEO 或联合创始人
startupThesis:
  nonObviousInsight: >-
    NSIA 奖项不是一次性资助——它是进入三方协调主权资本阶梯（NSIA、Pula Xcelerator、Wema Bank，外加 EDC Lagos 企业发展项目）的公开入口。大多数创始人把每个项目当独立机会处理，错过了"在一个项目中成功即可解锁下一个项目资格"的关键逻辑。率先梳理并管理这条阶梯的初创企业，将在每个阶段积累关于"究竟什么能赢"的专有数据——这是一个独立资助顾问和泛化加速器无法复制的飞轮。
  beachhead: >-
    正在备战 2026 年 NSIA 奖项申请的尼日利亚制造科技与气候科技创始人——估计每年活跃申请者约 50—200 人，集中在一个硬性提交窗口内
  wedge: >-
    专属于 NSIA 奖项的申请工作台：依据 NSIA 公布标准自动生成提交就绪的路演摘要、财务档案和影响力评分卡，将备战时间从数周压缩到数天
  whyNowCatalyst: >-
    2026 年 NSIA 奖项公告首次将奖项评选与 Pula Xcelerator 和 Wema Bank 的资金获取明确挂钩，形成一条需要软件来导航的公开多步骤资本阶梯——而这条链路在本届之前从未作为单一协调信号存在过。
  ventureScalePath: >-
    从 NSIA 奖项窗口起步，扩展至全西非主权、DFI 及国际资助项目（AfDB、IFC、联合国机构、各国创新基金）；为一个项目构建的申报材料包，将成为所有其他项目可复用的资产库，随着每批次结果数据不断积累，网络价值也随之复利增长。
solution: >-
  一个面向创始人的 SaaS，将尼日利亚奖项和资助项目的要求汇聚为单一引导式工作流。创始人一次性输入初创企业档案，平台即根据各奖项的公开评分细则，生成对应的路演摘要、财务档案和影响力评分卡。集成的里程碑追踪器清晰呈现创始人在 NSIA-Pula-Wema 资本阶梯上进入下一阶段所需的材料、牵引力指标和影响数据。内置的历史获奖模式比对，在提交前就能发现差距，充当一个始终同步最新项目要求的异步就绪教练。
goToMarketSeed:
  firstCustomer: >-
    拉各斯的制造科技或气候科技初创企业，员工 2—8 人，有可运行原型，无现有投资人关系，正在缺乏结构性指导或资助顾问的情况下备战 2026 年 NSIA 奖项申请
  buyingTrigger: >-
    年度 NSIA 奖项申请窗口开放，形成硬性提交截止日期，迫使创始人在数周内采取行动
  currentAlternative: >-
    以每次 $200—$500 的价格雇用独立资助顾问、依赖加速器导师的临时建议，或从 WhatsApp 创始人群和在线论坛拼凑模板
  switchingReason: >-
    平台费用低于单次顾问合同，始终与 NSIA 和 Pula Xcelerator 的实时要求同步，且直接产出提交就绪的文件——而不是把写作工作留给创始人自己的"纯建议"输出
  pricingHypothesis: >-
    按月订阅，每个初创企业 $30—60/月，设免费资格审查入口以驱动漏斗顶部流量；高级审核档位可收取所获奖金 1—2% 的可选绩效费
