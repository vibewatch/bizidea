  validationPlan:
  - priority: high
    question: What exact rubric and common rejection reasons does NSIA use by sector?
    evidenceToGather: Interview former finalists and program staff; obtain anonymized reviewer scorecards or application checklists.
  - priority: high
    question: How many serious NPI applicants would pay for deadline-driven software instead of using free mentor or hub support?
    evidenceToGather: Run structured interviews with current applicants and test a concierge MVP during the next application window.
  - priority: medium
    question: What share of NPI winners or finalists actually qualify for Pula’s revenue threshold?
    evidenceToGather: Profile past winners by revenue band and sector; confirm with Pula and founders.
  - priority: medium
    question: 'Which partner channel converts best: hubs, official portals, or founder-investor networks?'
    evidenceToGather: Run referral pilots with CcHUB, VC4A, and one official ecosystem partner and compare lead quality and CAC.
