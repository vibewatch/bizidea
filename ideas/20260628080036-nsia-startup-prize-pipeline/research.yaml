market:
  tam:
    value: $5.4M
    rationale: 'Modeled regional TAM: 15,000 serious founder teams per year across Nigeria plus adjacent West African capital programs × $360 annual spend per team. The team count is intentionally conservative relative to NPI’s 20,000+ applications across three editions, TEF’s hundreds of thousands of Africa-wide annual applications, and CcHUB’s 3,312 ventures supported in 2025.'
    isEstimate: true
    sourceRefs:
    - 2
    - 12
    - 14
  sam:
    value: $1.1M
    rationale: 'Modeled Nigeria-first SAM: 3,000 serious paying teams per year × $360. This assumes only a minority of NPI’s raw applicant base is in-scope and adds adjacent applicants from TEF-, VC4A-, Antler-, and hub-linked workflows.'
    isEstimate: true
    sourceRefs:
    - 2
