openQuestions:
- What exact rubric and rejection reasons does NSIA use by sector, and which sections of the application most often fail?
- What share of NPI applicants or winners actually meet Pula’s $500K+ revenue threshold?
- Will founders pay standalone software for a short annual application window instead of relying on free hub, mentor, or investor support?
- Can NSIA, EDC, Pula, or Wema share structured reviewer feedback or integrate into a reusable founder data model?
- How important are blocked incumbents such as F6S in the real Nigerian founder workflow, given that their pages could not be fetched in this run?
