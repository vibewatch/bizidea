competitors:
- name: VC4A
  stage: incumbent
  wedge: Africa-wide program, mentor, and venture discovery marketplace
  pricing: No public founder fee disclosed on fetched pages
  strength: Deep Africa-specific program supply and ecosystem visibility
  weaknessVsUs: Discovery-first rather than a Nigeria-specific sovereign-capital dossier engine
  sourceRefs:
  - 17
  - 18
- name: Gust
  stage: incumbent
  wedge: Reusable founder profile for accelerator and investor applications
  pricing: No public founder fee disclosed on fetched pages
  strength: Lets founders reuse company information across many application workflows
  weaknessVsUs: Global and general-purpose, with weak coverage of local grants, policy, and sector-specific rubrics
  sourceRefs:
  - 19
- name: OpenGrants
  stage: scale-up
  wedge: Grant discovery plus strategist matching
  pricing: Single subscription plan; price not shown in fetched page
  strength: Purpose-built around grant navigation rather than generic startup support
  weaknessVsUs: US-centric positioning and no evidence of Nigeria-specific sovereign-program logic
  sourceRefs:
  - 28
- name: Antler Nigeria
  stage: scale-up
  wedge: Cohort-based founder formation, mentoring, and pre-seed capital
  pricing: $100k for 10% equity; optional $100k match
  strength: High-trust hands-on support with a local Lagos footprint
  weaknessVsUs: Selective, cohort-bound, and equity-based rather than always-on software for every applicant
  sourceRefs:
  - 22
- name: Submittable
  stage: incumbent
  wedge: Grant and application management software for program operators
  pricing: Custom quote / enterprise pricing
  strength: Mature workflow and AI tooling around application intake and administration
  weaknessVsUs: Built for grantmakers, not for founder-side cross-program readiness and dossier reuse
  sourceRefs:
  - 20
  - 21
regulatoryTechnicalConstraints:
- point: Collecting incorporation records, IDs, business plans, and related documents creates immediate security and data-governance obligations.
  sourceRefs:
  - 11
  - 34
- point: Nigeria’s localisation direction means any payments or sensitive-data architecture should prefer domestic storage and explicit residency controls.
  sourceRefs:
  - 10
  - 34
- point: Startup-act benefits depend on portal labelling and uneven state domestication, so institutional claims must stay aligned to official implementation realities.
  sourceRefs:
  - 6
  - 8
  - 9
- point: Pula follow-on is only relevant for ventures with specific sector fit and at least $500K in revenue.
  sourceRefs:
  - 3
  - 4
