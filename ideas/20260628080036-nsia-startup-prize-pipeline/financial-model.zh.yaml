scenarios:
  downside:
    description: 创始人继续依赖免费孵化中心和导师；合作伙伴渠道仅带来模型合格线索的 40%；材料复用率低于 25%，月度流失率升至 8%。
    y3RevenueK: 72.0
    y3EbitdaK: -725.0
    cashLowPointK: 160.0
    keyAssumptionChanges:
      - Y3 末客户增长仅达 300 支团队，而非 500 支
      - 月度流失率因多项目留存疲软从 5% 升至 8%
      - 合作伙伴渠道 CAC 翻倍至每获客团队 $200
  base:
    description: 合作伙伴渠道实现 15—25% 合格创始人转化；材料复用率 40%；月度流失率 5%；客户增长按模型轨迹至 Y3 末达 500 支。
    y3RevenueK: 128.7
    y3EbitdaK: -705.151
    cashLowPointK: 295.973
    keyAssumptionChanges:
      - 客户增长：0 → 58（Y1）、220（Y2）、500（Y3）
      - 月度流失率 5%，混合 CAC $100
      - Y3 实现 70% 毛利率
  upside:
    description: 合作伙伴渠道超预期；相邻项目加速材料复用；15% 的团队迁移至 $45/月高级档位；Y3 客户增长在 Q3 而非 Q4 达到 500 支。
    y3RevenueK: 192.0
    y3EbitdaK: -660.0
    cashLowPointK: 390.0
    keyAssumptionChanges:
      - 客户增长比基准快 30%；500 支团队在 Q3Y3 即达到
      - 15% 团队付费 $45/月高级档位，混合 ARPU 提升至 $34
      - 多项目复用率超过 50%，月度流失率降至 3%
sensitivity:
  - variable: ARPU
    downsideCase: $22/月——免费孵化中心替代方案的竞争压力迫使更深幅度的价格折让
    baseCase: $30/月——$30-60 区间低端，含 3 个月最短周期
    upsideCase: $40/月——15% 团队采用 $50-60/月 的高级审核档位
    y3RevenueImpactK: -33.7
    cashImpactK: -23.6
  - variable: churn
    downsideCase: 8%/月——季节性需求强烈；少于 25% 的团队将材料包复用于第二个项目
    baseCase: 5%/月——按 BP mustBeTrue 目标，40% 第二项目材料复用
    upsideCase: 3%/月——多项目复用稳健，带动订阅周期延长
    y3RevenueImpactK: -27.9
    cashImpactK: -19.5
  - variable: CAC
    downsideCase: $200/团队——合作伙伴渠道转化失败，公司退回到高成本直接外呼
    baseCase: $100/团队——70% 合作伙伴转介 $60，30% 直接 $190
    upsideCase: $50/团队——孵化中心转介关系主导获客，边际成本极低
    y3RevenueImpactK: 0.0
    cashImpactK: -28.0
  - variable: sales cycle
    downsideCase: 增长节奏比模型慢 30%——NSIA 窗口过窄；淡季需求接近零
    baseCase: 按模型——0 → 58（Y1）、220（Y2）、500（Y3）支团队
    upsideCase: 增长节奏快 25%——相邻项目及 TEF/Hackaholics 窗口延长购买季
    y3RevenueImpactK: -26.1
    cashImpactK: -18.3
  - variable: gross margin
    downsideCase: 55% 毛利率——尼日利亚优先合规成本（国内托管、审计日志、安全认证）增速超预期
    baseCase: 70% 毛利率——BP 目标；Y3 Q2-Q3 规模化后达到
    upsideCase: 75% 毛利率——自动化降低每客户支持负担和 AI 生成单次调用成本
    y3RevenueImpactK: 0.0
    cashImpactK: -19.3
  - variable: hiring pace
    downsideCase: Y2 在需求验证前超前招募 2 名工程师——Y2 运营费增加 $144K
    baseCase: 按模型——以合作伙伴试点和营收验证为门控的里程碑式招聘
    upsideCase: 将销售负责人和一名工程师推迟至 Y4——Y3 节省现金 $66K
    y3RevenueImpactK: 0.0
    cashImpactK: -144.0
modelDiagram:
  title: 单位经济模型流转
  mermaid: |
    flowchart LR
      Leads[Hub and partner leads] --> Qualify[Qualified founders]
      Qualify --> Customers[Paid founder teams]
      Customers --> Revenue[MRR at 30 USD per team]
      Revenue --> GrossProfit[Gross profit at 70 pct GM]
      GrossProfit --> Cash[Operating cash]
      Customers --> Reuse[Dossier reuse 40 pct plus]
      Reuse --> Customers
modelSanity:
  - checkName: 营收引擎
    finding: 营收随付费创始人团队数量线性增长，ARPU $30/月，需求由 NSIA 及相邻项目申请截止日期驱动——这些截止日期将购买决策压缩到短暂的高紧迫窗口，无需持续的需求生成。
  - checkName: 必须成立的条件
    finding: 通过孵化中心和官方生态门户的合作伙伴渠道转化，必须在第 12 个月前跑赢创始人主导的直接 CAC——因为仅靠自然增长无法在 $2M pre-seed 范围内触达 Y2 220 支团队的里程碑。
  - checkName: 模型崩溃的条件
    finding: 月度流失率超过 7%（季节性极强、多项目回头客极少）或 ARPU 无法维持在 $25/月 以上——两个条件同时成立会将 LTV/CAC 压缩至 3 倍以下，并消除维持精简运营预算所需的毛利贡献。
  - checkName: 下一轮融资的证明条件
    finding: 当公司能展示 100+ 支付费团队、至少一个合作伙伴渠道 CAC 低于 $75、以及经验证的 40% 以上第二项目材料复用率时，Seed 轮才具备可信度——这三个信号正是业务计划里程碑在 Y2 末的目标。
sanityChecks:
  ruleOf40: Y3 营收增长 163% + Y3 EBITDA 利润率 -548% = -385；ARR 低于 $1M 时 Rule of 40 无实际意义，在此阶段标记为不适用。
  burnMultiple: Y3 7.0 倍（净消耗 $705K / 新增年化净营收 $101K）；高但在规模化前属预期；须在 Seed 轮具备可信度前降至 3 倍以下。
  revenuePerFte: Y3 $12.9K（10 名全职）；远低于 SaaS 基准 $150-400K——反映尼日利亚优先市场规模上限；须扩展至西非项目才能将这一指标提升至可投资水平。
  flags:
    - TAM $5.4M 和 SAM $1.1M 确实体量较小；若不将西非项目纳入模型周期，每人均营收无法达到 SaaS 基准。
    - $2M pre-seed 提供约 33 个月的模型资金跑道，明显长于业务计划声明的 18 个月目标；18 个月更可能反映里程碑验证所需时间，而非现金耗尽时间点。
    - 5% 月度流失率是关键假设；若 NSIA 申请窗口是唯一年度触发点且少于 40% 的团队复用材料包，实际流失率可能升至 8—10%，LTV/CAC 将跌破 3 倍。
    - Y3 末现金 $296K 约为 Q4Y3 月消耗的 5 个月；公司必须在 Y3 内完成 Seed 轮融资，或证明营收加速以自主延长跑道。
    - 毛利率在 Y1 为负（固定基础设施成本超过早期营收），要到 Y3 Q2-Q3 才能达到 70% 目标；投资人应将毛利率盈亏平衡路径视为门控条件，而非从第一天起就假设成立。
    - 合作伙伴渠道 CAC $100 是模型估算，尚无实证验证；业务计划中的止损标准（合作伙伴 CAC 须在 2 次转介试点后跑赢直接渠道）必须在首个实时 NSIA 季内完成衡量。
