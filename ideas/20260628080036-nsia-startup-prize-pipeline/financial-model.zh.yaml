slug: nigeria-prize-capital-navigator
date: '2026-06-28'
currency: USD
modelStartMonth: '2026-07'
assumptions:
  - id: A1
    name: 模型起始月
    value: '2026-07'
    unit: YYYY-MM
    source: '[BP date 2026-06-28] 模型从业务计划日期次月开始，与 2026 年 6 月 NPI 4.0 申请窗口开放时间对齐。'
  - id: A2
    name: 期初现金与 pre-seed 融资
    value: $2.0M
    unit: USD
    source: '[BP fundingAsk targetFundingRangeUsd $1.5-2.5M] 基准情形取区间中值；精简的尼日利亚优先团队使实际消耗远低于上限。'
  - id: A3
    name: 客户定义
    value: 一支持有活跃付费 NSIA 或相邻项目工作台订阅的创始人团队
    unit: 定义
    source: '[BP businessModel.unitOfValue] customersEop 追踪活跃付费团队数，而非团队内的个人用户数。'
  - id: A4
    name: ARPU
    value: $30/月·团队（$360/年）
    unit: USD/team/month
    source: '[BP gtm.pricing $30-60/月；BP market.som $0.18M / 500 teams = $360/year] 基准情形取区间低端以保守估算；3 个月最短周期每个 NSIA 申请窗口产生 $90-180 收入。'
  - id: A5
    name: 第 1 年客户增长节奏（期末）
    value: M1-M12 各月：0, 2, 5, 10, 16, 24, 30, 36, 43, 48, 53, 58
    unit: 团队
    source: '[BP milestones 0-12 个月：10 位付费创始人目标；BP experimentRoadmap 精细化冲刺 M1-M3 后 M6 上线 MVP] 节奏因 NSIA 4.0 截止日期压力而前期加速；58 团队第 1 年末在 10 付费里程碑基础上留有约 20% 缓冲。'
  - id: A6
    name: 第 2 年客户增长节奏（季末）
    value: 95, 135, 175, 220（Q1-Q4 Y2）
    unit: 团队
    source: '[BP milestones 12-24 个月：100-200 支付费团队；Research market.sam 3,000 支认真团队] Y2 末 220 约占 SAM 的 7%，与通过 2 家孵化中心合作伙伴进行早期分发的预期一致。'
  - id: A7
    name: 第 3 年客户增长节奏（季末）
    value: 285, 355, 430, 500（Q1-Q4 Y3）
    unit: 团队
    source: '[BP milestones 24-36 个月：约 500 支付费团队；Research market.som 500 teams × $360 = $180K year-3 SOM] 500 团队期末与研究数据 SOM 上限精确对齐。'
  - id: A8
    name: 月度流失率
    value: 5.0%
    unit: 百分比/月
    source: '[季节性 SMB SaaS 行业基准 + BP operatingAssumptions 材料复用目标 >40%] 5% 月流失对应约 20 个月的平均客户生命周期；若少于 40% 的团队将材料包复用于第二个项目，实际流失率将升至约 8%（下行情形）。'
  - id: A9
    name: COGS 模型
    value: 固定 $0.80K/月（Y1），$0.90K（Q3-Q4 Y1 MVP 上线），$1.00K（Y2），$1.20K（Y3）；加可变成本 $5/活跃客户/月
    unit: USD
    source: '[BP operations 尼日利亚优先文件安全、审计日志、安全库；SaaS 行业基准] 固定部分覆盖托管、安全工具和强制审计日志基础设施；可变部分覆盖 AI API 调用、按客户存储和支持工单量。'
  - id: A10
    name: 目标毛利率
    value: 70%
    unit: 百分比
    source: '[BP businessModel.targetGrossMarginPct 70] 模型在 Y2 Q4 约达 67% GM，Y3 Q4 约达 72%，随固定 COGS 在更大客户基础上摊薄。'
  - id: A11
    name: 招聘节奏——创始团队
    value: CEO 和联合创始工程师于 M1；项目运营负责人于 M2；产品负责人于 M6；合作负责人于 M9
    unit: 月
    source: '[BP team.startTiming 各角色] 与业务计划排序逻辑严格对应：产品和合规能力优先，合作关系其次。'
  - id: A12
    name: 招聘节奏——规模化团队
    value: Eng2 于 Q1Y2；Eng3 于 Q2Y2；客户成功负责人于 Q3Y2；Eng4 于 Q1Y3；销售负责人于 Q3Y3
    unit: 季度
    source: '[BP milestones 12-24 个月：可重复入驻 + 合作伙伴渠道；BP strategicChoices.sequencingRationale] 规模化招聘以合作伙伴渠道验证（Y1 末）和创始人经济数据（Y2 中）为门控条件。'
  - id: A13
    name: 月薪——创始团队
    value: CEO $8K；联合创始工程师 $8K；项目运营负责人 $4K；产品负责人 $5.5K；合作负责人 $4K
    unit: USD/月
    source: '[行业基准：拉各斯本地混合团队，获国际融资；2025-2026 尼日利亚高级技术岗市场薪资] 含雇主成本和法定扣缴；低于美欧水平以保留资金跑道，同时在拉各斯科技市场保持竞争力。'
  - id: A14
    name: 月薪——规模化团队
    value: Eng2/Eng3/Eng4 各 $6K；客户成功负责人 $3.5K；销售负责人 $5K
    unit: USD/月
    source: '[行业基准：2025-2026 尼日利亚中级技术岗] 中级工程师低于联合创始工程师以体现资历差异，并为毛利率预留空间。'
  - id: A15
    name: 非薪资运营成本
    value: 'Y1：S&M $3K/月，G&A $3K/月，基础设施 $2K/月；Y2：S&M $5K/月，G&A $4K/月，基础设施 $2.5K/月；Y3：S&M $6K/月，G&A $4K/月，基础设施 $3K/月'
    unit: USD/月
    source: '[BP gtm.channels 活动、孵化中心转介、社区；BP operations 合规与审计架构；SaaS 行业基准] S&M 覆盖拉各斯生态活动、数字触达和合作伙伴赋能材料；G&A 覆盖法律、财务和本地公司行政。'
  - id: A16
    name: 薪资职能分摊
    value: CEO 归 G&A；联合创始工程师、项目运营、产品负责人、Eng2/3/4 归 R&D；合作负责人、客户成功、销售负责人归 S&M
    unit: 分摊口径
    source: '[BP team rationales] 按主要职能将人员成本归入 P&L 运营科目。'
  - id: A17
    name: 现金转换假设
    value: EBITDA 近似反映运营现金变动；无重大资本支出、税负或营运资金波动
    unit: 建模惯例
    source: '[SaaS 行业基准] pre-seed SaaS 按月订阅，无硬件或库存；此阶段递延收入影响可忽略不计。'
  - id: A18
    name: CAC——混合口径
    value: $100/获客团队
    unit: USD/团队
    source: '[BP gtm.funnelTargets 合作伙伴转介转化 25%+；BP mustBeTrue 合作伙伴 CAC 须优于直接] 70% 客户通过孵化中心和合作伙伴转介获取，现金 CAC 约 $60；30% 通过创始人主导直接外呼，现金 CAC 约 $190；混合约 $100。CEO 时间已计入 G&A 薪资，不重复计算。'
  - id: A19
    name: LTV 计算
    value: ($30 ARPU × 70% GM) / 5% 月流失率 = $420/团队
    unit: USD/团队
    source: '[由 A4、A8、A10 推导] 标准订阅 LTV 公式；平均客户生命周期 20 个月（1 / 0.05）。'
  - id: A20
    name: 本轮融资里程碑
    value: 完成 NSIA MVP、跑完一个完整 NSIA 季、完成两次孵化中心合作伙伴试点、Y1 付费团队达 50+、Y2 达 200+，以及第二项目材料复用率 >40%
    unit: 里程碑
    source: '[BP milestones 0-24 个月 + BP investorMemo.mustBeTrue] 上述证明材料是 Seed 轮具备可信度的前提条件。'
