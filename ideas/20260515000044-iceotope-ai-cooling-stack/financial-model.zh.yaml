scenarios:
  downside:
    description: 如果 OEM 打包方案已经“够用”、试点转化更慢、交付工作又始终太重，这家公司就很难走到计划中的毛利曲线。
    y3RevenueK: 2835.0
    y3EbitdaK: -1268.1
    cashLowPointK: -431.33
    keyAssumptionChanges:
    - 每个活跃客户的年收入降到约 $270K。
    - Y2 的净新增客户放缓到 1,1,1,1，Y3 放缓到 1,1,2,2。
    - 由于实施仍高度依赖人工，到 Y3 后期毛利率也只能爬到高 60% 区间。
  base:
    description: 基准情形下，公司能把付费机房试点转成年付监控，再加上一条适度可用的伙伴渠道，同时把交付工作尽量模板化。
    y3RevenueK: 3900.0
    y3EbitdaK: -436.08
    cashLowPointK: 608.58
    keyAssumptionChanges:
    - 每个活跃客户的年收入维持在 $300K。
    - Y2 的净新增客户按 1,1,1,2 走，Y3 按 2,2,2,2 走。
    - 毛利率从 Y1 早期的 42% 提升到 Q4Y3 的 71%。
  upside:
    description: 如果标杆客户和 OEM 或集成商转介绍明显提速，新项目会更快落地；同时，报送升级包和更顺滑的实施流程，也会把毛利率继续抬高。
    y3RevenueK: 4882.5
    y3EbitdaK: 340.82
    cashLowPointK: 1506.58
    keyAssumptionChanges:
    - 通过报送模块和第二机房厅扩张，每个活跃客户的年收入提升到约 $315K。
    - Y2 的净新增客户加速到 1,1,2,2，Y3 加速到 2,2,3,3。
    - 随着 onboarding 和遥测标准化更可复制，毛利率进入低 70% 区间。
