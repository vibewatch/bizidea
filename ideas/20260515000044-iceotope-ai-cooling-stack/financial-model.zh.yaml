  downsideCase: 把第三名实施工程师和第二名客户成功提前两个季度招进来
  baseCase: 把支持类岗位继续后置，等到多机房厅扩张出现再补
  upsideCase: 把其中一名 AE 的招聘延后到活跃客户超过 12 个之后
  y3RevenueImpactK: -90.0
  cashImpactK: -250.0
modelDiagram:
  title: 单位经济模型流转
  mermaid: "flowchart LR\n  RetrofitTriggers[改造触发器] --> PaidPilots[付费试点]\n  PaidPilots --> ProductionPrograms[生产项目]\n  ProductionPrograms --> Revenue[收入]\n  Revenue --> GrossProfit[毛利润]\n  GrossProfit --> Cash[现金]\n"
modelSanity:
- checkName: 收入引擎
  finding: 基准情形下，Q4Y3 会跑到 17 个活跃运营商项目，按每个项目约 $300K 的混合年收入测算；大部分增长来自试点转监控，以及第二机房厅扩张。
- checkName: 必须做对的事
  finding: 辅助式审计和调试验收流程必须足够模板化，这样伙伴转介绍和 60%+ 的试点转化率，才足以把 CAC 压在大约 $190K 以下。
- checkName: 模型会失效的情况
  finding: 如果销售周期拖到接近 9 个月，同时毛利率卡在高 60% 区间，那么在公司证明出 seed-ready 扩张动作之前，下行情形的现金就会先转负。
- checkName: 下一轮融资证明点
  finding: 只有当 Y2 结束时做到 9 个活跃客户、1 个付费报送升级包，以及至少 1 个多机房厅扩张案例，才能证明这不只是项目服务，下一轮融资才更站得住。
sanityChecks:
  ruleOf40: Y3 增长率 112.24% + EBITDA 利润率 -11.18% = 101.06%
  burnMultiple: Y2 burn multiple 为 0.74x，Y3 随着净新增 ARR 提升到 0.18x。
  revenuePerFte: Y3 退出时 14 名 FTE 对应 $279K 人均收入（SaaS 基准约 $200-400K）。
  flags:
  - Q4Y3 只是刚好盈亏平衡，所以转化节奏只要晚一个季度，融资时间点大概率就得前移。
  - 模型依赖少数几笔六位数大单，因此即便人均收入看起来健康，客户集中度依然偏高。
  - 毛利率直到 Y3 后期才真正越过 70% 目标，因为实施和遥测清洗仍是交付里不可忽略的部分。
  - 如果到 Y2 仍然拿不到 OEM 或集成商转介绍，模型里的 CAC 和拉新节奏就会对现金计划过于乐观。
