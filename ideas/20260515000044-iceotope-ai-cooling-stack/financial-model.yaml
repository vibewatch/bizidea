  source: Startup-finance heuristic for enterprise infrastructure software with sticky recurring monitoring but real project and budget risk.
- id: A23
  name: Blended CAC
  value: '189.18'
  unit: USDK per net new customer
  source: Calculated from modeled Y2-Y3 sales and marketing spend of $2459.34K divided by 13 net new customers; consistent with a concentrated founder-led and partner-assisted enterprise motion.
- id: A24
  name: Cash conversion simplification
  value: EBITDA approximates cash movement
  unit: policy
  source: Startup-finance heuristic for a pre-seed software business with immaterial capex and working-capital swings relative to payroll and operating spend.
- id: A25
  name: Funding sizing rule
  value: reach end-of-Y2 milestone plus 6 months of buffer
  unit: policy
  source: Developer instruction applied to [BP fundingAsk]; the pre-seed round is sized to clear the Y2 proof point before the next institutional financing.
