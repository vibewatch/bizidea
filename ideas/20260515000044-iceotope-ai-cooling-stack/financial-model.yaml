modelDiagram:
  title: unit economics flow
  mermaid: |-
    flowchart LR
      RetrofitTriggers --> PaidPilots
      PaidPilots --> ProductionPrograms
      ProductionPrograms --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
- checkName: Revenue engine
  finding: The base case reaches 17 active operator programs by Q4Y3 at roughly $300K blended annual revenue per program, with most growth driven by pilot-to-monitoring conversion and second-hall expansion.
- checkName: Must go right
  finding: Assisted audits and commissioning workflows must stay template driven enough that partner referrals and 60%+ pilot conversion keep CAC below roughly $190K.
- checkName: Model breaks if
  finding: If sales cycles stretch toward nine months while gross margin stalls in the high-60s, downside cash turns negative before the company proves a seed-ready expansion motion.
- checkName: Next-round proof
  finding: The next financing is justified once Y2 ends with 9 active customers, one paid reporting upsell, and at least one multi-hall expansion showing the product is more than project services.
sanityChecks:
  ruleOf40: Y3 growth 112.24% + EBITDA margin -11.18% = 101.06%
  burnMultiple: Y2 burn multiple 0.74x, improving to 0.18x in Y3 on net new ARR.
  revenuePerFte: $279K Y3 on 14 exit FTE (benchmark $200-400K SaaS)
  flags:
  - Q4Y3 is only breakeven, so a one-quarter slip in conversion timing would likely pull fundraising forward.
  - The model depends on a small number of six-figure deals, so logo concentration remains high even when revenue per FTE looks healthy.
  - Gross margin does not fully clear the 70% target until late Y3 because implementation and telemetry cleanup stay meaningful parts of delivery.
  - If OEM or integrator referrals do not materialize by Y2, the modeled CAC and customer-add ramp will be too optimistic for the cash plan.
