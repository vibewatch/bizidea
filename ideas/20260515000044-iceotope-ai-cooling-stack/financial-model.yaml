  unit: count
  source: '[BP milestones 0-12 months] starts before paid pilots are signed.'
- id: A5
  name: Blended annual revenue per active customer
  value: '300.0'
  unit: USDK
  source: '[BP gtm pricing $60k-120k pilot and $180k-300k ARR plus modules]; base case assumes a blended $300K annualized revenue stream once pilot fees, recurring monitoring, implementation, and reporting are mixed together.'
- id: A6
  name: Revenue recognition for adds
  value: average active customers per period
  unit: formula
  source: 'Startup-finance heuristic anchored to BP pilot and production timing: revenue each month or quarter is ((beginning customers + ending customers) / 2) × annual ARPU.'
