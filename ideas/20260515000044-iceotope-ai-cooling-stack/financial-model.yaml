scenarios:
  downside:
    description: OEM bundles get good enough, pilots convert more slowly, and deployment work stays too manual to hit the planned margin curve.
    y3RevenueK: 2835.0
    y3EbitdaK: -1268.1
    cashLowPointK: -431.33
    keyAssumptionChanges:
    - Annual revenue per active customer falls to about $270K.
    - Net new customers slow to 1,1,1,1 in Y2 and 1,1,2,2 in Y3.
    - Gross margin only reaches the high-60s by late Y3 because implementation remains labor-heavy.
  base:
    description: The company converts paid hall pilots into recurring monitoring, adds a modest partner channel, and keeps deployment work template driven.
    y3RevenueK: 3900.0
    y3EbitdaK: -436.08
    cashLowPointK: 608.58
    keyAssumptionChanges:
    - Annual revenue per active customer stays at $300K.
    - Net new customers follow 1,1,1,2 in Y2 and 2,2,2,2 in Y3.
    - Gross margin rises from 42% early in Y1 to 71% by Q4Y3.
  upside:
    description: Reference customers and OEM or integrator referrals accelerate new programs while reporting upsells and cleaner implementations lift gross margin.
    y3RevenueK: 4882.5
    y3EbitdaK: 340.82
    cashLowPointK: 1506.58
    keyAssumptionChanges:
    - Annual revenue per active customer reaches about $315K through reporting and second-hall expansion.
    - Net new customers accelerate to 1,1,2,2 in Y2 and 2,2,3,3 in Y3.
    - Gross margin reaches the low-70s as onboarding and telemetry normalization become more repeatable.
