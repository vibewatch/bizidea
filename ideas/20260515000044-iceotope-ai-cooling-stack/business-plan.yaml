slug: rack-cooling-retrofit-os
date: '2026-05-15'
executiveSummary: >-
  This company should start as a vendor-neutral retrofit OS for North American regional colocation operators trying to turn
  legacy 10-30 kW halls into 80-150 kW AI cages without waiting for new builds. The immediate pain is not lack of cooling
  hardware; it is deciding which hall can be upgraded, coordinating multi-vendor retrofit work, and proving the upgraded cage
  is safe and efficient enough to carry revenue traffic. Today that workflow still runs through consultants, OEM calculators,
  spreadsheets, and generic DCIM or BMS tools, so a wrong hall choice or missed commissioning dependency can delay AI revenue
  by months. The best first product is a hall-readiness and commissioning control plane that ranks retrofit candidates,
  generates contractor-ready scopes, and then compares live thermal, leak, water, and efficiency data against the design
  basis after go-live. Go-to-market should stay tightly coupled to one trigger: a signed AI tenant deployment or internal GPU
  rollout that exceeds current rack-density limits, with the COO or VP Infrastructure funding a paid hall-planning engagement
  that converts into recurring monitoring software. The reason to stay narrow is speed of proof: brownfield colo retrofits
  have a clearer buyer, shorter budget logic, and more repeatable constraints than greenfield hyperscale design or small edge
  deployments. The moat is the cross-project dataset linking hall characteristics, retrofit choices, and live outcomes across
  mixed-vendor sites. The main disconfirming risks are that data quality is too messy for a lightweight overlay and that OEM
  or integrator-led tools become good enough to absorb the budget before this product becomes the neutral system of record.
  Exact budget ownership on the first deal and the real willingness to pay for insurer or lender reporting remain open gaps
  from the research, so the first year has to validate both.
problem:
  - Legacy colocation and enterprise facilities teams must decide which existing halls can safely support dense AI racks, but the required inputs span power, cooling, water, structural limits, rack layout, and vendor-specific design assumptions that are still managed in disconnected spreadsheets and consultant studies.
  - Once a retrofit goes live, operators often lack a single system that ties commissioning evidence and live thermal, leak, and water performance back to the original design basis, making repeat retrofits hard to finance, insure, and standardize.
solution:
  - Provide a hall-readiness platform that ingests floor plans, BMS or DCIM exports, rack-density targets, and cooling-topology constraints to rank candidate halls, score readiness, and generate a phased retrofit workpack for OEMs, contractors, and facility teams.
  - Add post-commissioning monitoring that tracks temperatures, leaks, water use, and efficiency variance against modeled assumptions, producing auditable evidence for operators and third parties while creating reusable benchmarks for the next retrofit.
whyWeWin:
  - The product is useful before a buyer commits to any one cooling OEM, so it can own the vendor-neutral decision layer that hardware vendors and services firms are poorly aligned to own.
  - Incumbent DCIM tools and thermal analytics suites monitor steady-state operations well, but they do not naturally control pre-retrofit hall ranking, phased brownfield execution, and modeled-to-actual commissioning proof in one workflow.
  - Each deployment compounds proprietary data on hall constraints, retrofit paths, commissioning outcomes, and runtime variance, which should improve scoring accuracy and make the product more valuable with every additional site.
strategicChoices:
  beachhead: North American regional colocation operators with 2-10 legacy halls and near-term demand to launch one or more 80-150 kW AI cages before a new AI-ready hall is available
  wedgeRationale: This beachhead creates faster proof than hyperscale greenfield design or broad enterprise retrofits because the trigger is concrete, the buyer already faces a revenue deadline, and a wrong decision on one hall can destroy enough value to justify a paid planning and monitoring layer.
  sequencingRationale: Start with assisted hall audits, readiness scoring, and contractor-ready retrofit workpacks that can be delivered from existing exports and manual surveys, then add post-commissioning monitoring, insurer or lender reporting, and deeper integrations only after the first pilots prove a repeatable data model and conversion path.
  notYet:
    - Hyperscale greenfield thermal design and full-site digital-twin planning
    - Small edge or enterprise deployments without an immediate dense-AI capacity trigger
    - Autonomous closed-loop cooling control or broad DCIM replacement
    - Exclusive OEM white-label deployments that weaken vendor-neutral positioning
market:
  tam: $117.0M modeled TAM from roughly 5% of North American installed capacity entering annual AI retrofit cycles, a midpoint retrofit capex assumption of $4.5M per MW, a 5% software share, and an uplift for secondary-market and enterprise brownfield demand
  sam: $35.0M modeled SAM focused on North American regional colocation operators upgrading legacy halls for near-term AI cages
  som: $4.8M year-3 SOM assuming about 15 customers buying a blended planning plus monitoring package at roughly $320k annualized per retrofit program
  segments:
    - Regional colocation operators upgrading existing halls for dense enterprise AI tenants
    - Enterprise data-center operators retrofitting internal GPU rooms once the colo motion is proven
  buyingProcess: >-
    The sale starts when a signed AI tenant deployment or internal GPU rollout forces an operator to choose between retrofitting
    an existing hall and waiting for scarce new supply. Facilities and operations teams usually sponsor evaluation, but the
    economic decision is most likely made by the COO, CTO, or VP Infrastructure through a paid hall-planning engagement that
    can convert into annual monitoring after the first cage is commissioned.
product:
  mvp: >-
    The MVP is an assisted hall-readiness and retrofit workpack platform for one operator, with intake from floor plans, OEM
    specs, and BMS or DCIM exports; hall scoring and ranked retrofit options; dependency tracking across power, cooling,
    manifolds, and commissioning; and a modeled-versus-actual dashboard for one upgraded cage after go-live. It should focus
    on explainable scoring and human-reviewed recommendations rather than autonomous thermal control.
  sixMonth: Sign 2-3 paid pilots, ship standardized hall-audit templates, support export-based readiness scoring plus manual surveys, and deliver weekly retrofit dependency reviews and post-commissioning variance dashboards for the first live cages.
  twelveMonth: Add reusable connectors for common BMS, DCIM, leak-sensing, and OEM telemetry sources; launch insurer or lender evidence packs; and convert at least 2 pilots into annual production deployments spanning multiple halls or sites.
  twentyFourMonth: Expand from single-hall retrofit programs into portfolio thermal capacity planning, multi-site benchmarking, and adjacent enterprise retrofits while preserving a vendor-neutral position across mixed cooling fleets.
  keyBets:
    - Export-based data intake plus guided surveys is sufficient to produce a trusted hall ranking before deep integrations are required.
    - Buyers will pay six-figure ACVs because the software protects time to AI revenue and avoids choosing the wrong retrofit path, not because it replaces generic monitoring dashboards.
    - OEMs and retrofit integrators will act as referral channels without forcing exclusivity or collapsing the product into implementation services.
    - Post-commissioning proof and reporting will expand ACV after the initial hall-planning wedge is adopted.
gtm:
  wedge: Sell a paid hall-readiness and retrofit workpack pilot the moment a regional colo operator must launch a dense AI cage inside a legacy hall, positioning the product as the neutral system that decides where to retrofit, coordinates the work, and proves the cage performs to plan after go-live.
  channels:
    - Founder-led direct sales to COO, CTO, and VP Infrastructure buyers at regional colocation operators
    - Referral and implementation partnerships with liquid-cooling OEMs, MEP firms, and retrofit integrators that need neutral pre-sales hall qualification
    - Targeted introductions from insurer brokers, infrastructure lenders, and thermal engineering firms involved in AI retrofit diligence
  funnelTargets: "Target account→qualified discovery 20-30%, qualified discovery→paid hall pilot 30-40%, paid pilot→production subscription 60%+, production account→second hall, second site, or reporting-module expansion within 12 months 50%+."
  pricing: "$60k-$120k initial hall-readiness and retrofit workpack engagement, converting to roughly $180k-$300k annual software priced by upgraded hall and liquid-cooled MW, plus implementation and optional insurer or lender reporting modules; this matches how buyers budget against time-to-revenue and retrofit-risk rather than seat count."
businessModel:
  revenueStreams:
    - Annual subscription for each operator running hall-readiness, retrofit workflow, and post-commissioning monitoring through the platform
    - One-time implementation and integration fees for new halls, telemetry connectors, and commissioning setup
    - Premium insurer, lender, and customer evidence-reporting modules
  unitOfValue: Legacy halls and liquid-cooled megawatts under managed retrofit planning and production monitoring
  targetGrossMarginPct: 70
  expansionLevers:
    - Additional halls, cages, and sites within the same colocation operator account
    - Expansion from planning into monitoring, insurer or lender reporting, and portfolio benchmarking
    - Later entry into enterprise internal GPU-room retrofits and greenfield planning only after the brownfield colo playbook is repeatable
strategyMap:
  northStarMetric: Liquid-cooled AI megawatts under production monitoring where live thermal and water performance stays inside agreed variance from the design basis
  inputMetrics:
    - Number of paid hall-readiness pilots signed
    - Median days from hall assessment kickoff to approved retrofit workpack
    - Paid pilot to production conversion rate
    - Percentage of commissioned cages with complete modeled-versus-actual evidence capture within 30 days of go-live
    - Production accounts expanding to a second hall, second site, or reporting module
  moatsToBuild:
    - Cross-project dataset linking hall constraints, retrofit choices, and live thermal outcomes across mixed-vendor sites
    - Normalized telemetry layer across BMS, DCIM, leak, water, and cooling data in brownfield environments
    - Commissioning and third-party evidence templates trusted by operators, insurers, lenders, and large tenants
  killCriteria:
    - Fewer than 3 paid hall pilots or fewer than 2 production conversions within 12 months of focused selling into the beachhead
    - No pilot shows at least a 20% reduction in time from hall assessment kickoff to approved retrofit scope or a clearly avoided wrong-hall decision
    - More than half of qualified pilots require bespoke data engineering or consulting work that cannot be reduced to a standard hall-audit template
  mermaid: |
    flowchart LR
      Wedge[Brownfield colo wedge] --> MVP[Hall readiness plus retrofit workpack]
      MVP --> Proof[Commissioning proof and runtime evidence]
      Proof --> Expansion[Portfolio planning and reporting expansion]
investorMemo:
  verdict:
    call: "Meet / investigate further"
    conviction: Strong urgency and a credible workflow gap, but conviction depends on proving the product stays software-like rather than becoming a consultant-managed retrofit service.
    whyBelieve: AI-ready capacity scarcity, higher rack densities, and fragmented brownfield execution create a real timing problem that hardware vendors and generic DCIM suites do not fully solve today.
    whyDoubt: The buyer universe is concentrated, data quality is uncertain, and large OEM or integrator ecosystems may absorb enough of the workflow if the startup cannot standardize quickly.
    nextDiligence: Confirm with 2-3 live retrofit programs that operators will pay for a vendor-neutral hall pilot, convert to annual monitoring, and share enough outcome data to build a compounding moat.
  firstCustomer:
    title: VP Infrastructure at a regional North American colocation operator
    profile: An operator with 2-10 legacy halls, signed enterprise AI demand, and at least one 80-150 kW GPU cage that must go live before a new AI-ready hall is delivered.
    trigger: A signed AI tenant deployment or internal GPU rollout exceeds current rack-density limits and forces a hall-selection and retrofit decision inside an operating facility.
    buyer: COO or VP Infrastructure
    initialContract: "$60k-$120k paid hall-readiness pilot for one live retrofit program over 6-10 weeks, converting to about $180k-$300k ARR plus implementation once the first upgraded cage is commissioned and monitored in production."
  mustBeTrue:
    - At least 15-20 beachhead operators per year face a near-term brownfield AI retrofit decision severe enough to fund a standalone planning and monitoring layer.
    - A standard hall-audit and readiness-scoring workflow can cover most early pilots without on-site custom engineering becoming the dominant delivery cost.
    - Economic buyers will prefer a vendor-neutral control plane before hardware selection rather than relying only on OEM design tools, consultant studies, or generic DCIM workflows.
    - At least half of paid pilots convert to annual production monitoring after the first cage goes live.
    - Customers will allow retention of anonymized hall, retrofit, and outcome data so the product can compound a defensible benchmark dataset.
  diligenceQuestions:
    - Which executive actually signs the first software budget in a live retrofit: COO, VP Infrastructure, CTO, or a tenant-facing commercial leader?
    - How many halls per target operator are likely to enter an AI retrofit cycle over the next 24 months?
    - What telemetry, floor-plan, and commissioning data is reliably available from older BMS and DCIM environments without custom field engineering?
    - Why will Schneider, Vertiv, EkkoSense, Sunbird, or an MEP integrator not satisfy the first customer well enough?
    - Which third-party reporting requirement most increases willingness to pay after go-live: insurer, lender, customer SLA, or internal board reporting?
operatingAssumptions:
  - assumption: Export-based data intake plus a guided manual hall survey can produce a credible readiness score before deep integrations are built.
    basis: research.yaml
    validationTest: Deliver 3 pilot hall assessments using exports and surveys only, and have at least 2 buyers rate the resulting hall ranking and workpack as decision-ready.
    decisionImpact: If false, the roadmap must move integrations and field-engineering capability earlier, increasing burn and reducing confidence in pre-seed software margins.
  - assumption: The first budget owner is the COO, CTO, or VP Infrastructure rather than a facilities manager with limited discretionary spend.
    basis: research.yaml
    validationTest: Map budget ownership and approval paths in 10-15 buyer interviews and close 2 paid pilots where an executive sponsor signs the contract.
    decisionImpact: If false, pricing, sales cycle expectations, and channel strategy must shift toward consultant-led resale or smaller departmental deployments.
  - assumption: Buyers will accept hall-based and MW-based pricing instead of paying only for one-time studies or time-and-materials services.
    basis: idea.yaml
    validationTest: Test 3 pricing packages in at least 8 buyer conversations and close 2 pilots with a written pilot-to-ARR conversion path tied to halls or MW.
    decisionImpact: If false, the business becomes more services-heavy and the year-3 SOM and gross-margin assumptions should be revised downward.
  - assumption: OEM and integrator partners will refer deals while tolerating a neutral control layer above their own tools.
    basis: operator judgment
    validationTest: Sign 2 referral or implementation partners and source at least 1 qualified pilot from a partner without granting exclusivity or removing mixed-vendor support.
    decisionImpact: If false, customer acquisition will rely more heavily on founder-led direct sales and the partnership sequence should be deprioritized.
  - assumption: Post-commissioning evidence and third-party reporting will expand ACV after the initial hall-planning wedge is proven.
    basis: research.yaml
    validationTest: In the first 3 pilots, secure at least 1 explicit request for insurer, lender, or customer reporting and convert at least 1 account to a paid monitoring module.
    decisionImpact: If false, expansion should focus on additional halls and sites rather than reporting products, and the roadmap should keep reporting lightweight.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Interview 15 regional colo operators, facilities leads, and retrofit integrators with active or recent dense-AI hall upgrades.
    hypothesis: A signed AI tenant deal or internal GPU rollout creates a budgeted, near-term trigger for a vendor-neutral hall-readiness pilot.
    successMetric: At least 10 interviews confirm an active retrofit workflow and 5 agree to share current-state process maps or sample artifacts.
    owner: CEO
  - horizon: 0–90 days
    experiment: Run a concierge hall audit for one design partner using floor plans, rack targets, utility constraints, and BMS or DCIM exports.
    hypothesis: A standard hall-audit template can generate a trusted hall ranking and retrofit workpack without bespoke engineering.
    successMetric: One design partner accepts the recommended hall ranking and workpack with at least 80% of required fields covered by the standard template.
    owner: Product lead
  - horizon: 0–90 days
    experiment: Prototype export-based readiness scoring and dependency tracking for power, cooling, manifolds, and commissioning milestones.
    hypothesis: Useful decision support can be delivered from exports and guided surveys before live system integrations exist.
    successMetric: One pilot dashboard is updated weekly with less than 4 hours of manual operations work per week.
    owner: Founding eng
  - horizon: 90–180 days
    experiment: Convert 2 design partners into paid hall-readiness pilots tied to live retrofit decisions.
    hypothesis: Buyers will pay for a neutral planning layer before hardware selection if the trigger is a live revenue deadline.
    successMetric: Two paid pilots signed and at least one materially changes hall selection, retrofit phasing, or scope approval.
    owner: CEO
  - horizon: 90–180 days
    experiment: Launch post-commissioning monitoring on the first upgraded cage with modeled-versus-actual variance and leak or water alerts.
    hypothesis: Runtime proof after go-live is the feature that converts a planning pilot into recurring software.
    successMetric: At least one pilot account uses the dashboard in weekly operations reviews for 8 consecutive weeks after commissioning.
    owner: Founding eng
  - horizon: 180–360 days
    experiment: Package one insurer or lender evidence workflow and test it with an operator plus one outside stakeholder.
    hypothesis: Third-party reporting can raise ACV without requiring a separate primary buyer motion.
    successMetric: One production customer or partner requests the report in a live project and accepts a paid upsell path.
    owner: Solutions lead
operations:
  - Run weekly retrofit readiness reviews that reconcile facility, OEM, contractor, and commissioning milestones against one target go-live date.
  - Maintain a normalized evidence model for hall surveys, design assumptions, telemetry, leak events, and commissioning signoff artifacts.
  - Productize repeatable hall-audit templates, retrofit workpacks, and variance-reporting packs before supporting wider site types.
  - Integrate with incumbent BMS and DCIM systems as systems of record for telemetry, not as workflows to replace outright in the first release.
team:
  - role: Founding eng
    startTiming: Month 0
    rationale: Build the ingestion, scoring, workflow, and variance-monitoring core before hiring specialized functions.
  - role: Domain product / solutions lead
    startTiming: Month 0
    rationale: Translate retrofit nuance into standard hall-audit templates, commissioning workflows, and buyer-facing product packaging.
  - role: Implementation engineer
    startTiming: Month 3
    rationale: Make export-based onboarding and first integrations repeatable without turning every pilot into founder services.
  - role: Enterprise account executive
    startTiming: Month 6
    rationale: Scale paid pilot selling once the ICP, trigger, and pricing motion are validated by the founders.
  - role: Data and integrations engineer
    startTiming: Month 9
    rationale: Deepen BMS, DCIM, leak-sensing, and OEM telemetry coverage after the first pilots prove which connectors matter.
milestones:
  - horizon: 0–12 months
    items:
      - Sign 2-3 paid hall-readiness pilots in the defined colo beachhead
      - Convert at least 2 pilots into annual production monitoring deployments
      - Ship standard hall-audit templates, dependency workflows, and modeled-versus-actual dashboards
      - Establish 2 repeatable referral or implementation relationships with OEMs, MEP firms, or retrofit integrators
  - horizon: 12–24 months
    items:
      - Reach 8-10 production halls under management across multiple operators
      - Launch insurer or lender evidence packs and prove at least one paid reporting expansion
      - Add reusable integrations for the most common telemetry and workflow inputs in production accounts
      - Expand from one-hall pilots to multi-hall and multi-site planning within existing customers
  - horizon: 24–36 months
    items:
      - Reach the modeled 15-customer path or revise the thesis based on observed conversion and implementation economics
      - Establish portfolio benchmarking as a clear expansion reason for multi-site operators
      - Enter enterprise internal GPU-room retrofits only after the colo playbook and data model are repeatable
      - Decide whether greenfield planning is a product extension or a distraction from the brownfield moat
risks:
  - risk: OEMs or large infrastructure vendors bundle enough planning and monitoring software to narrow the standalone wedge.
    likelihood: Medium
    impact: High
    mitigation: Stay vendor-neutral, win the hall-selection workflow before hardware choice, and prove value across mixed fleets and third-party reporting.
  - risk: Early customers lack clean floor-plan, telemetry, or commissioning data, forcing heavy manual work.
    likelihood: High
    impact: High
    mitigation: Start with guided audits, export-based imports, and human-reviewed scoring, then narrow supported site types until integration patterns are repeatable.
  - risk: Brownfield retrofit programs are too bespoke to support software-like deployment margins.
    likelihood: Medium
    impact: High
    mitigation: Constrain the initial ICP to regional colo operators with similar hall types and density targets, and use kill criteria tied to template reuse and pilot delivery effort.
  - risk: Sales cycles stretch because operators treat retrofit software as part of a broader capital project rather than an urgent operating purchase.
    likelihood: Medium
    impact: Medium
    mitigation: Anchor the first sale to a live AI revenue deadline, use a paid planning engagement instead of a large enterprise rollout, and leverage channel partners already inside the retrofit process.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2.5-4.0M"
  runwayMonths: 18
  useOfFundsSummary: 18 months funds the founding product team, 3-5 paid hall pilots, core BMS and DCIM integrations, post-commissioning monitoring and evidence features, and the first repeatable OEM or integrator channel relationships needed to prove the company can convert from planning pilots into recurring software.
