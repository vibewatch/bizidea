problem: 区域型托管运营商和企业数据中心团队，眼下都想在原本只为低密机架设计的机房厅里吃到 AI 需求红利，但他们并不知道哪些房间能在不靠昂贵试错的前提下，安全承接高密 GPU 笼位。现在的散热改造已经同时牵动设施用水、配电、机架布局、部件级热设计，以及持续的漏液和性能监控，可大多数团队还是靠顾问、OEM 表格和通用 DCIM 工具来推进。结果就是，每次 AI 升级都像一场定制化工程豪赌，而不是一套可复制的基础设施动作。
targetUser:
  primary: 北美托管数据中心运营商的数据中心运营负责人，正把现有 10-30 kW 机房厅升级到可承载 80-150 kW AI 机架
  secondary: 在传统企业机房或托管站点里，负责改造范围、调试验收和可用性的设施工程负责人或热管理项目经理
  buyer: 区域型托管运营商的 COO、CTO 或基础设施 VP
startupThesis:
  nonObviousInsight: 新的瓶颈不是再造一个液冷箱体，而是把闲置的风冷白空间改造成可融资、可投保、可运营的 AI 容量。变化在于：机架功率正逼近 1MW，散热必须覆盖整条机架栈，液冷也开始进入不能把整栋楼推倒重来的 colocation、企业和边缘场景。
  beachhead: 北美托管运营商，现有批发机房厅原本只按 10-30 kW 机架设计，但未来 6-12 个月内必须为企业 AI 租户撑起第一波 80-150 kW GPU 笼位
  wedge: 一套机架散热改造 OS：逐厅评估热就绪度，自动生成 OEM 和施工方需要的改造范围，并在 AI 笼位升级完成后持续监控漏液、热表现和效率。
  whyNowCatalyst: Iceotope 的融资，以及来源中对 1MW 机架和整机液冷转向的描述，都说明高密 AI 需求来的速度，已经快过现有托管机房靠临时工程流程完成升级的速度。
  ventureScalePath: 先从传统托管机房厅的改造资格评估和监控切入，再扩到新建热设计、融资与保险报送、混合散热机群的运行优化，最后做成 hyperscale、企业和边缘站点统一的 AI 热容量规划底账。
solution: 做一层热管理控制平面，给那些要把现有设施升级到高密 AI 机架的运营商用。产品先吃进机房厅布局、目标机架密度、散热拓扑和设施约束，再为每个房间和笼位产出改造就绪度评分、分阶段升级方案，以及施工方可直接执行的工作清单。部署过程中，它把散热硬件、管路、控制系统和调试验收节点之间的依赖关系盯住，让运营商一眼看出到底是什么卡住了可计费容量上线。正式投运后，它持续对照设计假设监控温度、漏液、用水和效率，把运营商、保险方和融资伙伴真正需要的性能数据沉淀下来，好让下一次改造更容易被信任。
goToMarketSeed:
  firstCustomer: 首个客户应该是北美区域型托管运营商：手里有 2-10 个传统机房厅，已经签下企业 AI 需求，而且至少有一个 80-150 kW 的 GPU 笼位必须在新建 AI 专用机房落地前先上线。
  buyingTrigger: 一旦签下 AI 租户部署，或内部 GPU 集群扩容超过现有机架密度上限，就会逼着团队在现有机房厅里做出改造决策。
  currentAlternative: 现在的替代方案是热管理顾问、OEM 设计服务、电子表格、BMS 或 DCIM 看板，以及每次改造都临时拼出来的施工协调。
  switchingReason: 这个切口能直接告诉运营商：哪些机房厅真能升级、哪条改造路径最不打扰现网，以及升级后的笼位到底有没有按计划运行。和顾问主导的一次性点状研究相比，它能减少失败改造，也更快把收入拉起来。
  pricingHypothesis: 按机房厅收一次性改造规划费，再叠加年度监控订阅；订阅价格按已升级机架数或液冷容量的 MW 数计。
