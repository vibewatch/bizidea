- point: 大幅节能和节水的说法意味着，改造决策现在掌握在那些要平衡可用性、公用事业约束和运营成本的运营团队手里，而不再只是实验性质的工程团队。
  signalRefs:
  - 效率提升让热设计变成经济杠杆
  sourceRefs:
