jobsToBeDone:
- job: 当 AI 租户要求在传统机房厅里上高密 GPU 笼位时，帮托管运营团队判断该升级哪些房间、先后顺序怎么排，好在不伤可用性的前提下把可计费容量加出来。
  currentAlternative: 顾问研究、OEM 计算器和人工设施审查
  successMetric: 从立项到批复改造方案的周数，以及每个机房厅解锁出的 AI 容量 MW 数
- job: 当改造已经开工时，帮设施工程负责人盯住散热依赖和实时热表现，好让新笼位在没有漏液、热点和意外水罚款的情况下完成调试验收。
  currentAlternative: 施工方检查表、通用 BMS 看板和临时组建的调试战情室
  successMetric: 完成调试验收所需时间、每个升级笼位的热事故数，以及实际效率偏离模型的幅度
