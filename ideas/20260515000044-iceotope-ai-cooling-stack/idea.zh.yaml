- point: 现在的散热问题已经同时覆盖 GPU、内存、网络和电源部件，因此市场需要的是整机架改造协调软件，而不是零散的部件设计。
  signalRefs:
  - 散热瓶颈已经扩展到整个机架，不只是 GPU
  sourceRefs:
  - 4
- point: 买家不再只是 hyperscaler，因为来源已经明确点到 colocation、企业和边缘部署，这些场景普遍缺专用散热基础设施。
  signalRefs:
  - 液冷正进入可改造的企业和边缘场景
  sourceRefs:
  - 1
  - 3
  - 4
- point: 新融资投向产品、专利和生态合作，说明热基础设施正走向更大的市场，硬件厂商旁边已经能长出一层使能软件。
  signalRefs:
  - 资本与生态成形，散热开始长出软件品类
  sourceRefs:
