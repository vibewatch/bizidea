topRisks:
- name: OEM 打包
  description: 散热硬件厂商可能把设计和监控软件补到“够用”，从而削弱买家对独立控制层的购买意愿。
  mitigation: 坚持硬件中立，覆盖混合机群集成，并占住运营商在选定单一厂商之前就要做的改造就绪度流程。
- name: 改造数据稀缺
  description: 早期客户可能没有干净的设施遥测，也没有足够历史改造成果来信任自动化建议。
  mitigation: 先把产品做成流程和证据系统，用人工审核的就绪度评分起步，等更多项目上线后再把基准做硬。
- name: 企业销售偏慢
  description: 托管运营商和企业客户可能把高密 AI 改造当成战略级基础设施决策，审批周期会很长。
  mitigation: 先打那些已经签下 AI 租户、时点紧迫的项目，首单按机房厅规划包卖，等一个笼位跑通后再扩。
