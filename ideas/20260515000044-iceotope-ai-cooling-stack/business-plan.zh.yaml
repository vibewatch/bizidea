slug: rack-cooling-retrofit-os
date: '2026-05-15'
executiveSummary: 这家公司最该从一套厂商中立的改造 OS 起步，卖给那些要把传统 10-30 kW 机房厅改成 80-150 kW AI 笼位、又来不及等新建机房落地的北美区域型托管运营商。眼前真正痛的不是缺散热硬件，而是不知道该改哪一个厅、怎么把多厂商改造工程排起来，以及怎么证明改好的笼位足够安全、足够高效，可以正式承载收入流量。现在这套流程仍靠顾问、OEM 计算器、电子表格和通用 DCIM 或 BMS 工具在撑，因此选错机房厅，或漏掉一个调试验收依赖，就可能让 AI 收入晚几个月兑现。第一款产品最该做成一层机房就绪度与调试验收控制平面：先给候选改造厅排序、生成施工方可执行的范围包，再在上线后把真实热表现、漏液、用水和效率数据同设计基线逐项对比。GTM 要死死绑住一个触发器：一旦签下 AI 租户部署或内部 GPU 扩容，超过现有机架密度上限，就由 COO 或基础设施 VP 出钱买一个付费机房规划项目，再把它转成持续监控软件。之所以要先收窄范围，是因为这样最容易最快证伪或证成：存量托管机房改造的买家更清楚、预算逻辑更短、约束也比 hyperscale 新建设计或小型边缘部署更可复制。护城河是跨项目数据集，把机房厅条件、改造选择和真实结果连到同一张表上，覆盖多厂商站点。最关键的反证风险有两个：一是数据质量太乱，轻量覆盖层跑不起来；二是 OEM 或集成商主导的工具在产品长成中立底账系统之前，就先把预算吃掉。研究里还没回答清楚首单预算究竟归谁，以及保险方、贷款方报送到底值多少钱，所以第一年必须把这两件事都验证掉。
problem:
- 传统托管机房和企业设施团队，必须先判断哪些现有机房厅能安全承接高密 AI 机架；但所需输入同时横跨电力、散热、用水、结构上限、机架布局和各家厂商的设计假设，而这些信息今天仍散落在彼此断开的表格和顾问研究里。
- 一旦改造上线，运营商往往没有一套系统能把调试验收证据、实时热表现、漏液和用水情况重新对回原始设计基线，因此后续改造很难标准化，也更难拿去做融资和投保。
solution:
- 提供一套机房就绪度平台，先吃进平面图、BMS 或 DCIM 导出、目标机架密度和散热拓扑约束，再给候选机房厅做排序、打就绪度分数，并生成 OEM、施工方和设施团队可执行的分阶段改造工作包。
- 再加上一层验收后监控，持续跟踪温度、漏液、用水和效率偏离模型的程度，为运营商和第三方产出可审计证据，同时把下一次改造会用到的基准沉淀下来。
whyWeWin:
- 买家还没选定任何一家散热 OEM 之前，这个产品就已经有用，因此它有机会占住硬件厂商和服务商都不擅长占的厂商中立决策层。
- 在位的 DCIM 和热分析套件很擅长看稳态运行，但很难把改造前机房厅排序、分阶段存量执行，以及模型到实绩的验收证明放进同一条流程里。
- 每落一个项目，平台都会累积更多私有数据：机房厅约束、改造路径、验收结果和运行偏差。站点越多，评分越准，产品价值也越强。
strategicChoices:
  beachhead: 北美区域型托管运营商：手里有 2-10 个传统机房厅，而且在新 AI 专用机房可用之前，就得尽快上线一个或多个 80-150 kW AI 笼位。
  wedgeRationale: 这个滩头市场比 hyperscale 新建设计或大而全的企业改造更容易更快拿到证明，因为触发器非常具体，买家已经面对收入上线的硬截止，而只要一个机房厅选错，就足以毁掉大额价值，足以支撑买家为规划和监控层付费。
  sequencingRationale: 先从辅助式机房审计、就绪度评分和施工方可执行的改造工作包做起，靠现有导出数据和人工勘查就能交付；等第一批试点证明数据模型能复用、也能从规划转成订阅后，再补验收后监控、保险方或贷款方报送，以及更深的集成。
  notYet:
  - hyperscale 新建热设计与全站点数字孪生规划
  - 没有即时高密 AI 容量触发器的小型边缘或企业部署
  - 自动化闭环散热控制，或直接替换通用 DCIM
  - 会削弱厂商中立定位的 OEM 独家白标部署
market:
  tam: TAM 约 $117.0M：假设北美已装容量中约 5% 每年进入 AI 改造周期，按每 MW 改造 capex 中位数 $4.5M、软件分成 5%，再对二级市场和企业存量需求做上调。
  sam: SAM 约 $35.0M，聚焦未来几年内要把传统机房厅升级给 AI 笼位用的北美区域型托管运营商。
  som: 第 3 年 SOM 约 $4.8M，假设约 15 个客户，每个改造项目购买一套规划加监控的混合包，年化价值约 $320k。
  segments:
  - 把现有机房厅升级给高密企业 AI 租户用的区域型托管运营商
  - 在托管模式跑通后，开始改造内部 GPU 机房的企业数据中心运营商
  buyingProcess: 销售通常从一个硬触发器开始：签下 AI 租户部署或内部 GPU 扩容后，运营商必须在“改造现有机房厅”和“等稀缺新供给”之间二选一。设施和运营团队一般会先发起评估，但最终的经济决策，多半还是由 COO、CTO 或基础设施 VP 通过一个付费机房规划项目拍板；等首个笼位完成调试验收后，再把它转成年度监控合同。
product:
  mvp: MVP 应该是一套面向单一运营商的辅助式机房就绪度与改造工作包平台：输入平面图、OEM 规格和 BMS 或 DCIM 导出；输出机房厅评分和按优先级排序的改造选项；同时跟踪电力、散热、歧管和调试验收的依赖关系；在首个升级笼位上线后，再给出模型对比实绩的看板。重点要放在可解释评分和人工复核建议，而不是自动化热控制。
  sixMonth: 6 个月内签下 2-3 个付费试点，发出标准化机房审计模板，先支持基于导出数据的就绪度评分和人工勘查，再为首批上线笼位提供每周改造依赖复盘和验收后偏差看板。
  twelveMonth: 12 个月内补上常见 BMS、DCIM、漏液传感和 OEM 遥测的可复用连接器，推出保险方或贷款方证据包，并把至少 2 个试点转成年付生产部署，覆盖多个机房厅或站点。
  twentyFourMonth: 24 个月内从单厅改造项目扩到组合级热容量规划、多站点基准，以及相邻的企业改造场景，同时继续守住跨混合散热机群的厂商中立定位。
  keyBets:
  - 在没有深度系统集成之前，只靠导出数据和引导式勘查，就足以做出买家愿意信任的机房厅排序。
  - 买家愿意付六位数 ACV，不是因为这套软件替代了通用监控看板，而是因为它能保住 AI 收入上线时间，避免选错改造路径。
  - OEM 和改造集成商会愿意做转介绍渠道，而不是强迫独家、把产品压成实施服务。
  - 一旦前面的机房规划切口跑通，验收后证明和报送能力会把 ACV 继续抬上去。
gtm:
  wedge: 一旦区域型托管运营商必须在传统机房厅里落一个高密 AI 笼位，就卖给他一个付费机房就绪度和改造工作包试点；把产品定位成那套厂商中立系统——它负责决定先改哪里、怎么把活排起来，以及上线后怎么证明笼位按计划运行。
  channels:
  - 创始人主导销售，直接打区域型托管运营商的 COO、CTO 和基础设施 VP
  - 与需要厂商中立售前机房评估的液冷 OEM、MEP 公司和改造集成商做转介绍与实施合作
  - 通过参与 AI 改造尽调的保险经纪人、基础设施贷款方和热工程公司做定向引荐
  funnelTargets: 目标客户→有效发现 20-30%，有效发现→付费机房试点 30-40%，付费试点→生产订阅 60%+，生产客户→12 个月内扩到第二个机房厅、第二个站点或报送模块 50%+。
  pricing: 首个机房就绪度和改造工作包项目收费 $60k-$120k；转正后，按已升级机房厅和液冷 MW 计费，年软件收入约 $180k-$300k；另收实施费，并提供可选的保险方或贷款方报送模块。这样定价更贴合买家对“收入上线时间”和“改造风险”的预算逻辑，而不是按 seat 数收费。
businessModel:
  revenueStreams:
  - 每家运营商只要把机房就绪度、改造流程和验收后监控放在平台上跑，就收年度订阅费
  - 新机房厅、遥测连接器和验收配置的单次实施与集成费用
  - 面向保险方、贷款方和客户的高级证据报送模块
  unitOfValue: 纳入改造规划和生产监控管理的传统机房厅，以及对应的液冷 MW 数
  targetGrossMarginPct: 70
  expansionLevers:
  - 在同一托管运营商账户内，扩到更多机房厅、更多笼位和更多站点
  - 从规划扩到监控、保险方或贷款方报送，以及组合级基准
  - 只有在存量托管剧本能复制后，才进一步切进企业内部 GPU 机房改造和新建规划
strategyMap:
  northStarMetric: 进入生产监控的液冷 AI MW 数，且真实热表现与用水表现始终落在和设计基线约定的偏差范围内。
  inputMetrics:
  - 签下的付费机房就绪度试点数量
  - 从机房评估启动到改造工作包获批的中位天数
  - 付费试点转生产的转化率
  - 上线后 30 天内，能完整采集模型对比实绩证据的已验收笼位占比
  - 扩到第二个机房厅、第二个站点或报送模块的生产账户数量
  moatsToBuild:
  - 跨多厂商站点的项目数据集，把机房厅约束、改造选择和实时热结果连起来
  - 在存量环境里，把 BMS、DCIM、漏液、用水和散热数据做成统一遥测层
  - 让运营商、保险方、贷款方和大租户都信任的调试验收与第三方证据模板
  killCriteria:
  - 聚焦滩头市场 12 个月后，付费机房试点少于 3 个，或转成生产的客户少于 2 个
  - 没有任何一个试点能把“从机房评估启动到改造范围获批”的时间缩短至少 20%，或明确避免一次选错机房厅的决策
  - 超过一半的合格试点都需要定制化数据工程或顾问工作，而且无法收敛成标准机房审计模板
  mermaid: "flowchart LR\n  Wedge[存量托管切口] --> MVP[机房就绪度 + 改造工作包]\n  MVP --> Proof[调试验收证明与运行证据]\n  Proof --> Expansion[组合规划与报送扩张]\n"
investorMemo:
  verdict:
    call: 值得见面 / 继续深挖
    conviction: 紧迫性很强，流程缺口也真实存在，但前提是这款产品最终还能像软件，而不是沦为顾问托管的改造服务。
    whyBelieve: AI 就绪容量稀缺、机架密度持续上升、存量改造执行又高度碎片化，这共同造出了一个真实的时点问题，而硬件厂商和通用 DCIM 套件今天都还没把它完整接住。
    whyDoubt: 买家群体本来就集中，数据质量也不确定；如果创业公司不能足够快地把产品标准化，大型 OEM 或集成商生态就可能把大部分流程吞掉。
    nextDiligence: 要和 2-3 个正在进行的改造项目确认三件事：运营商愿不愿意为厂商中立的机房试点付费、能不能转成年付监控，以及是否愿意共享足够结果数据来积累护城河。
  firstCustomer:
    title: 北美区域型托管运营商的基础设施 VP
    profile: 这类运营商通常有 2-10 个传统机房厅，已经签下企业 AI 需求，而且至少有一个 80-150 kW 的 GPU 笼位必须在新 AI 机房交付前先上线。
    trigger: 一旦签下 AI 租户部署或内部 GPU 扩容，超过当前机架密度上限，就会逼着团队在运行中的设施里做出机房厅选择和改造决策。
    buyer: COO 或基础设施 VP
    initialContract: 首单是一个 $60k-$120k 的付费机房就绪度试点，周期 6-10 周，服务一个正在发生的改造项目；等首个升级笼位完成验收并进入生产监控后，再转成约 $180k-$300k ARR 外加实施费。
  mustBeTrue:
  - 每年至少有 15-20 家滩头市场运营商，会遇到足够紧迫的存量 AI 改造决策，愿意为独立的规划与监控层付费。
  - 标准化机房审计和就绪度评分流程，能覆盖大多数早期试点，不会让现场定制工程反客为主，变成最大交付成本。
  - 经济买家会在选定硬件之前，优先采用厂商中立控制平面，而不是只依赖 OEM 工具、顾问研究或通用 DCIM 流程。
  - 至少一半的付费试点，会在首个笼位上线后转成年付生产监控。
  - 客户愿意允许平台保留匿名化的机房厅、改造和结果数据，让产品能滚出一套有防守力的基准数据集。
  diligenceQuestions:
  - 在真实改造项目里，第一笔软件预算到底由谁签字：COO、基础设施 VP、CTO，还是面向租户的商业负责人？
  - 未来 24 个月里，每个目标运营商大概会有多少个机房厅进入 AI 改造周期？
  - 在不做定制现场工程的前提下，旧 BMS 和 DCIM 环境里，哪些遥测、平面图和调试验收数据是稳定可拿的？
  - 为什么 Schneider、Vertiv、EkkoSense、Sunbird 或 MEP 集成商，没法把首个客户服务到“足够好”？
  - 上线之后，最能拉高付费意愿的第三方报送到底是哪种：保险方、贷款方、客户 SLA，还是内部董事会报表？
operatingAssumptions:
- assumption: 在还没做深度集成之前，只靠导出数据和引导式人工机房勘查，也能做出有说服力的就绪度评分。
  basis: research.yaml
  validationTest: 用纯导出数据加勘查的方式完成 3 个试点机房评估，并让至少 2 个买家认定最终的机房排序和工作包已经足够支持决策。
  decisionImpact: 如果这条不成立，路线图就必须更早拉前集成和现场工程能力，烧钱会更快，pre-seed 阶段的软件毛利假设也会下降。
- assumption: 第一笔预算的拥有者会是 COO、CTO 或基础设施 VP，而不是自由裁量空间很小的设施经理。
  basis: research.yaml
  validationTest: 在 10-15 个买家访谈里画清预算归属和审批链路，并签下 2 个由高管 sponsor 直接签约的付费试点。
  decisionImpact: 如果不成立，定价、销售周期预期和渠道策略都得往顾问转售或更小的部门级部署上改。
- assumption: 买家能接受按机房厅和 MW 定价，而不是只愿意为一次性研究或工时服务买单。
  basis: idea.yaml
  validationTest: 在至少 8 次买家交流中测试 3 套定价包，并签下 2 个带有明确 pilot-to-ARR 路径、且与机房厅或 MW 挂钩的试点。
  decisionImpact: 如果不成立，生意就会更偏服务，第三年的 SOM 和毛利假设都应该往下修。
- assumption: OEM 和集成商伙伴会愿意转介绍，同时容忍自己的工具之上再叠一层中立控制平面。
  basis: 主观判断
  validationTest: 签下 2 个转介绍或实施伙伴，并且至少从伙伴处拿到 1 个合格试点，前提是不授予独家、也不砍掉混合多厂商支持。
  decisionImpact: 如果不成立，获客就得更依赖创始人直销，伙伴节奏也应往后放。
- assumption: 当前面的机房规划切口跑通后，验收后证据和第三方报送会把 ACV 再拉高。
  basis: research.yaml
  validationTest: 在前 3 个试点里，至少拿到 1 个保险方、贷款方或客户报送的明确需求，并至少把 1 个账户转成付费监控模块。
  decisionImpact: 如果不成立，扩张重点就该回到更多机房厅和站点，而不是报送产品，路线图里也该把报送继续做轻。
experimentRoadmap:
- horizon: 0–90 天
  experiment: 访谈 15 家区域型托管运营商、设施负责人和改造集成商，要求他们都经历过或正在经历高密 AI 机房升级。
  hypothesis: 只要签下 AI 租户合同或内部 GPU 扩容，市场上就会出现一笔有预算、且时点很近的厂商中立机房就绪度试点。
  successMetric: 至少 10 次访谈确认存在活跃改造流程，且有 5 家愿意分享现状流程图或样本材料。
  owner: CEO
- horizon: 0–90 天
  experiment: 为一个共创客户做一次 concierge 式机房审计，输入平面图、机架目标、公共事业约束，以及 BMS 或 DCIM 导出。
  hypothesis: 标准化机房审计模板无需定制工程，也能产出买家信得过的机房排序和改造工作包。
  successMetric: 一个共创客户接受推荐的机房排序与工作包，且标准模板已覆盖至少 80% 所需字段。
  owner: 产品负责人
- horizon: 0–90 天
  experiment: 原型化基于导出数据的就绪度评分，以及对电力、散热、歧管和调试验收节点的依赖跟踪。
  hypothesis: 在还没接入实时系统集成前，只靠导出数据和引导式勘查，也能交付有用的决策支持。
  successMetric: 一个试点看板每周更新一次，且每周人工运营工作少于 4 小时。
  owner: 创始工程师
- horizon: 90–180 天
  experiment: 把 2 个共创客户转成与真实改造决策绑定的付费机房就绪度试点。
  hypothesis: 只要触发器真是收入上线的硬 deadline，买家就会愿意在选硬件前为中立规划层付费。
  successMetric: 签下 2 个付费试点，且至少有 1 个项目实质性改变了机房选择、改造节奏或范围审批。
  owner: CEO
- horizon: 90–180 天
  experiment: 在首个升级笼位上线后推出验收后监控，覆盖模型对比实绩偏差，以及漏液和用水告警。
  hypothesis: 正式上线后的运行证明，才是把规划试点转成持续软件的关键功能。
  successMetric: 至少有 1 个试点账户在验收后连续 8 周，把这套看板放进每周运营复盘。
  owner: 创始工程师
- horizon: 180–360 天
  experiment: 打包一条保险方或贷款方证据流程，并与一个运营商和一个外部利益相关方一起测试。
  hypothesis: 第三方报送能在不额外开辟主买家动线的前提下，继续抬高 ACV。
  successMetric: 至少 1 个生产客户或合作伙伴在真实项目里索要这份报告，并接受付费升级路径。
  owner: 解决方案负责人
operations:
- 每周做一次改造就绪度复盘，把设施、OEM、施工方和调试验收节点都对到同一个上线日期。
- 维护一套统一证据模型，覆盖机房勘查、设计假设、遥测、漏液事件和调试验收签字材料。
- 先把可复用的机房审计模板、改造工作包和偏差报送包产品化，再去支持更广的站点类型。
- 第一版把在位 BMS 和 DCIM 当作遥测底账系统接入，而不是一上来就替换它们的工作流。
team:
- role: 创始工程师
  startTiming: 第 0 个月
  rationale: 在招更专门的岗位之前，先把数据摄取、评分、流程和偏差监控的核心搭起来。
- role: 领域产品 / 解决方案负责人
  startTiming: 第 0 个月
  rationale: 把改造现场的复杂细节翻成标准化机房审计模板、调试验收流程和面向买家的产品包装。
- role: 实施工程师
  startTiming: 第 3 个月
  rationale: 让基于导出数据的 onboarding 和首批集成可以复用，而不是把每个试点都做成创始人服务项目。
- role: 企业客户 AE
  startTiming: 第 6 个月
  rationale: 等创始人把 ICP、触发器和定价动作跑通后，再放大付费试点销售。
- role: 数据与集成工程师
  startTiming: 第 9 个月
  rationale: 首批试点证明哪些连接器最重要之后，再把 BMS、DCIM、漏液传感和 OEM 遥测覆盖做深。
milestones:
- horizon: 0–12 个月
  items:
  - 在定义好的托管滩头市场签下 2-3 个付费机房就绪度试点
  - 把至少 2 个试点转成年度生产监控部署
  - 交付标准机房审计模板、依赖工作流和模型对比实绩看板
  - 与 OEM、MEP 公司或改造集成商建立 2 个可复用的转介绍或实施关系
- horizon: 12–24 个月
  items:
  - 在多家运营商中管理 8-10 个生产机房厅
  - 上线保险方或贷款方证据包，并验证至少一个付费报送扩张
  - 为生产账户最常见的遥测和工作流输入补上可复用集成
  - 在现有客户里从单厅试点扩到多厅、多站点规划
- horizon: 24–36 个月
  items:
  - 跑到模型里的 15 客户路径，或根据真实转化和实施经济性修正 thesis
  - 让组合级基准成为多站点运营商明确的扩张理由
  - 只有在托管剧本和数据模型可复制后，才进入企业内部 GPU 机房改造
risks:
- risk: OEM 或大型基础设施厂商把规划和监控软件补到“够用”，独立切口会被压窄。
  likelihood: Medium
  impact: High
  mitigation: 坚持厂商中立，在买家选硬件之前先占住机房厅选择流程，并用混合机群和第三方报送证明价值。
- risk: 早期客户拿不出干净的平面图、遥测或调试验收数据，结果被迫投入大量人工。
  likelihood: High
  impact: High
  mitigation: 先从引导式审计、导出导入和人工复核评分开始，等集成模式稳定后再逐步扩支持的站点类型。
- risk: 存量改造项目太定制，撑不起软件应有的部署毛利。
  likelihood: Medium
  impact: High
  mitigation: 把初始 ICP 收窄到机房厅类型和密度目标相似的区域型托管运营商，并把 kill criteria 绑在模板复用率和试点交付成本上。
- risk: 销售周期被拉长，因为运营商把改造软件视为更大资本项目的一部分，而不是一笔紧急运营采购。
  likelihood: Medium
  impact: Medium
  mitigation: 把第一单死死锚在 AI 收入上线的 deadline 上，用付费规划项目而不是大规模企业 rollout 切入，再借已经进入改造流程的渠道伙伴放大。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2.5-4.0M
  runwayMonths: 18
  useOfFundsSummary: 这 18 个月的资金将覆盖创始产品团队、3-5 个付费机房试点、核心 BMS 与 DCIM 集成、验收后监控与证据功能，以及首批可复用的 OEM 或集成商渠道关系，核心目标是证明公司能从规划试点转成持续软件。
