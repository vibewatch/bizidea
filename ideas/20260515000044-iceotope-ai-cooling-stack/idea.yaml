problem: >-
  Regional colocation and enterprise data-center teams want to monetize AI demand inside halls that were built for much
  lower rack densities, but they do not know which rooms can safely support dense GPU pods without expensive trial and
  error. Cooling retrofit work now spans facility water, power distribution, rack layout, component-level thermals, and
  ongoing leak and performance monitoring, yet most teams still manage the process through consultants, OEM spreadsheets,
  and generic DCIM tools. That makes every AI upgrade feel like a bespoke engineering gamble instead of a repeatable
  infrastructure motion.
targetUser:
  primary: Head of data center operations at a North American colocation operator upgrading existing 10-30 kW halls for 80-150 kW AI racks
  secondary: Facility engineering lead or thermal program manager responsible for retrofit scope, commissioning, and uptime in a legacy enterprise or colo site
  buyer: COO, CTO, or VP Infrastructure at a regional colocation operator
startupThesis:
  nonObviousInsight: >-
    The new bottleneck is not inventing another liquid-cooling box; it is converting stranded air-cooled whitespace into
    financeable, insurable, and operable AI capacity. What changed is that rack power is approaching 1MW, cooling must now
    cover the entire rack stack, and liquid cooling is expanding into colocation, enterprise, and edge environments that
    cannot rip and replace whole buildings.
  beachhead: >-
    North American colocation operators with existing wholesale halls designed for 10-30 kW racks that must support a
    first wave of 80-150 kW GPU cages for enterprise AI tenants within the next 6-12 months
  wedge: >-
    A rack-cooling retrofit OS that models thermal readiness hall by hall, generates OEM and contractor retrofit scopes,
    and runs post-commissioning leak, thermal, and efficiency monitoring for upgraded AI cages
  whyNowCatalyst: >-
    Iceotope's funding and the cited shift toward 1MW racks and full-system liquid cooling show that dense AI demand is
    arriving faster than existing colocation halls can be upgraded with ad hoc engineering workflows.
  ventureScalePath: >-
    Start with retrofit qualification and monitoring for legacy colo halls, then expand into greenfield thermal design,
    financing and insurer reporting, runtime optimization across mixed cooling fleets, and the system of record for AI
    thermal capacity planning across hyperscale, enterprise, and edge sites.
solution: >-
  Build a thermal control plane for operators upgrading existing facilities to dense AI racks. The product ingests hall
  layout, rack density targets, cooling topology, and facility constraints, then produces a retrofit readiness score,
  phased upgrade plan, and contractor-ready bill of work for each room and cage. During deployment, it tracks
  dependencies across cooling hardware, plumbing, controls, and commissioning milestones so operators know exactly what is
  blocking revenue-ready capacity. After go-live, it monitors temperatures, leaks, water usage, and efficiency against
  the design assumptions, creating the performance dataset operators, insurers, and financing partners need to trust
  repeat retrofits.
goToMarketSeed:
  firstCustomer: >-
    A North American regional colocation provider with 2-10 legacy halls, signed enterprise AI demand, and at least one
    planned 80-150 kW GPU cage that must go live before a new purpose-built AI hall is available
  buyingTrigger: >-
    A signed AI tenant deployment or internal GPU cluster rollout that exceeds current rack-density limits and forces a
    retrofit decision inside an existing hall
  currentAlternative: >-
    Thermal consultants, OEM design services, spreadsheets, BMS or DCIM dashboards, and one-off contractor coordination
    during each retrofit
  switchingReason: >-
    This wedge tells operators which halls can actually be upgraded, what retrofit path is least disruptive, and whether
    the upgraded cage is performing to plan, which cuts failed retrofits and speeds time to revenue versus consultant-led
    point studies
  pricingHypothesis: >-
    Upfront retrofit-planning fee per hall plus annual monitoring subscription priced by upgraded rack or megawatt of
    liquid-cooled capacity
