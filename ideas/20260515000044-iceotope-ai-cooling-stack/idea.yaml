topRisks:
  - name: OEM bundling
    description: Cooling hardware vendors may add enough design and monitoring software to reduce willingness to buy a standalone control layer.
    mitigation: Stay hardware-neutral, integrate across mixed fleets, and own the retrofit readiness workflow that starts before an operator commits to any one vendor.
  - name: Retrofit data scarcity
    description: Early customers may not have clean facility telemetry or enough historical retrofit outcomes to trust automated recommendations.
    mitigation: Launch first as a workflow and evidence system with human-reviewed readiness scoring, then harden benchmarks as more projects go live.
  - name: Slow enterprise sales
    description: Colocation and enterprise operators may treat dense AI retrofits as strategic infrastructure decisions with long approval cycles.
    mitigation: Sell into urgent live deals with signed AI tenant demand, price the first engagement as a hall-level planning package, and expand after one successful cage launch.
