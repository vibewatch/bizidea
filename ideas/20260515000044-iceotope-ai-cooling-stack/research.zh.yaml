    sourceRefs:
    - 8
    - 13
    - 23
    - 24
  adoptionFrictionMatrix:
  - friction: 设施数据不完整，遥测也不一致
    severity: 高
    affectedBuyer: 设施工程负责人
    mitigation: 先从辅助式机房审计、导入模板和 DCIM/BMS 连接器做起，再去承诺自动化评分。
    sourceRefs:
    - 9
    - 17
    - 18
    - 19
  - friction: 担心在线升级带来停机、漏液或调试失误
    severity: 高
    affectedBuyer: COO 或基础设施 VP
    mitigation: 把定位放在分阶段执行、漏液感知工作流和调试验收证据上，而不是自动控制。
    sourceRefs:
    - 7
    - 8
    - 20
    - 21
  - friction: 电力、散热和控制系统横跨多厂商，改造协调复杂
    severity: 高
    affectedBuyer: 热管理项目经理
    mitigation: 提供厂商中立的工作包、依赖跟踪和参考设计映射。
    sourceRefs:
    - 6
    - 16
    - 17
  - friction: 相比再请一个顾问，ROI 容易被质疑
    severity: 中
    affectedBuyer: CFO 或 COO
    mitigation: 把避免返工、缩短收入上线时间，以及降低模型偏差这些收益量化出来。
    sourceRefs:
    - 5
    - 8
    - 18
market:
  tam:
    value: $117.0M
    rationale: 测算方式是：CBRE 给出的核心市场装机容量 6,922.6 MW × 每年进入 AI 改造周期的 5% × Flexential 提供的 $2M-$7M/MW 改造 capex 区间中位数 $4.5M/MW × 5% 的控制平面软件占比；再额外上调 1.5x，以覆盖 CBRE 核心市场之外的二级市场和企业存量需求。
    isEstimate: true
    sourceRefs:
    - 1
    - 5
  sam:
    value: $35.0M
    rationale: 把 TAM 收窄到最初的滩头市场：未来几年要把传统机房厅升级给 AI 笼位用的北美区域型托管运营商，假设它们约占更广存量改造支出的 30%。
    isEstimate: true
    sourceRefs:
    - 1
    - 2
    - 7
  som:
    value: $4.8M
    rationale: 第 3 年可触达情形：约 15 个客户，每个改造项目购买一套规划加监控的混合包，年化价值约 $320k。
    isEstimate: true
    sourceRefs:
    - 2
    - 5
    - 7
