  sourceRefs:
  - 18
- name: Sunbird
  stage: 成长期
  wedge: 基于 DCIM 的容量规划和 readiness 分析，面向 GB200 级高密部署
  pricing: 定制报价的 DCIM 软件
  strength: 对现有设施里的资产、电力、环境和 what-if 容量规划很有帮助
  weaknessVsUs: 定位依旧偏通用 DCIM，还没有把存量改造操作模型端到端吃下来
  sourceRefs:
  - 19
- name: Schneider Electric plus Motivair
  stage: 在位厂商
  wedge: 把 DCIM、参考设计和机架级液冷硬件整合进一个广泛的企业生态
  pricing: 企业软件加按项目收费的硬件与服务
  strength: 渠道深、多厂商视野强，而且在分阶段存量升级里有可信的液冷硬件
  weaknessVsUs: 它的激励更偏向卖硬件和生态，而不是在多种混合改造方案之间保持厂商中立
  sourceRefs:
  - 7
  - 17
  - 20
  - 21
- name: Vertiv
  stage: 在位厂商
  wedge: 提供端到端的 AI 电力与散热参考架构，并配套改造与生命周期服务
  pricing: 按项目收费的基础设施和服务合同
  strength: 和 NVIDIA 绑定紧，整包部署可信度高，服务覆盖也广
  weaknessVsUs: 优化目标还是基础设施销售和交付，而不是跨站点的改造组合管理
  sourceRefs:
  - 16
- name: Iceotope
  stage: 成长期
  wedge: 为 AI、HPC、企业和边缘部署提供全机箱级精密液冷
  pricing: 硬件加合作伙伴整体方案报价
  strength: 相较只做 direct-to-chip，它覆盖了更多机架部件，也能跑在受限的企业或边缘场景里
  weaknessVsUs: 硬件专属方案解决不了机房厅选择、多厂商依赖跟踪或全机群存量证据管理
  sourceRefs:
  - 22
  - 23
regulatoryTechnicalConstraints:
- point: AI 改造项目仍要锚定 ASHRAE 的能效和热管理指引，例如 Standard 90.4 和 Standard 127。
  sourceRefs:
  - 10
  - 11
- point: 取水许可、排放路径和回用要求因州和地方公用事业而异，尤其在涉及直接或间接排放时更复杂。
  sourceRefs:
  - 13
- point: 各州正开始考虑更明确的数据中心用水报送、缓解义务和成本回收规则。
  sourceRefs:
  - 14
- point: 存量机房厅常常受限于楼板承重、架空地板拥堵、歧管布置和旧配电系统。
  sourceRefs:
  - 8
  - 9
- point: 如果设施本身没有楼宇水路，就可能只能采用液到气的中间方案，这会同时改写经济性和可达到的密度。
  sourceRefs:
  - 21
validationSignals:
- point: JLL 和 CBRE 都显示空置率历史新低、预租比例很高，证明运营商确实有很强的经济动力去释放现有容量。
  sourceRefs:
  - 1
  - 2
  - 3
- point: AFCOM 数据表明，液冷已经被一部分运营商正式部署，更多人也在计划上马。
  sourceRefs:
  - 4
- point: Flexential 的改造案例说明，企业客户愿意投入可观 capex 来改造传统空间，而不是等上几年新供给。
  sourceRefs:
  - 5
- point: 厂商已经开始用数字孪生、热优化和 DCIM 工作流来营销 AI 就绪能力，说明预算品类正在成形。
  sourceRefs:
  - 6
  - 17
  - 18
  - 19
openQuestions:
- 在区域型托管运营商里，第一笔改造流程软件预算到底由哪个职能先签字：运营、基础设施、财务，还是面向租户的 GM？
- 今天到底有多少保险方或贷款方，会对存量 AI 改造的验收后热和用水证据提出明确要求？
- 在多厂商改造项目里，OEM 自带软件相较厂商中立协调层，究竟多频繁会掉链子？
- 有多少老机房厅的遥测质量足以支持自动化就绪度评分，而不必依赖人工勘查？
