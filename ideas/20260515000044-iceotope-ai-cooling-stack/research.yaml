        Cooling OEMs, CDU providers, and reference-architecture partners matter, but buyers can still assemble mixed stacks
        and several large vendors are expanding supply.
      sourceRefs: [16, 20, 24, 25]
    buyerPower:
      score: 4
      rationale: >-
        Projects are large and lumpy, and a relatively small set of sophisticated operators control buying decisions, which
        keeps procurement disciplined and proof-heavy.
      sourceRefs: [1, 2, 3]
    threatOfEntrants:
      score: 3
      rationale: >-
        The software surface is buildable, but domain knowledge, integration breadth, and a cross-site retrofit dataset raise
        the bar for new entrants.
      sourceRefs: [6, 8, 18, 19]
    threatOfSubstitutes:
      score: 4
      rationale: >-
        Consultants, OEM design services, general DCIM suites, and in-house spreadsheet workflows are all credible
        substitutes for an early product.
      sourceRefs: [7, 8, 9, 17, 18]
    competitiveRivalry:
      score: 4
      rationale: >-
        Hardware vendors, software vendors, and service-led incumbents are all converging on AI retrofit budgets, even if no
        category yet owns the full workflow.
      sourceRefs: [16, 17, 18, 22, 25]
  pestle:
    - factor: political
      impact: negative
      point: Power interconnection and local siting scrutiny increasingly shape whether brownfield and greenfield projects can proceed on schedule.
      sourceRefs: [1, 2, 3]
    - factor: economic
      impact: positive
      point: Scarce AI-ready capacity and rising rents increase the payoff from unlocking existing halls faster.
      sourceRefs: [1, 2]
    - factor: social
      impact: neutral
      point: Operators must balance AI growth expectations against community sensitivity around infrastructure externalities such as water demand.
      sourceRefs: [13, 14]
    - factor: technological
      impact: positive
      point: Rack densities and liquid cooling requirements are rising quickly enough to create a new software orchestration layer.
      sourceRefs: [4, 5, 6, 16]
    - factor: legal
      impact: negative
      point: Water permits, discharge rules, reuse standards, and emerging state disclosure rules add operational compliance burden.
      sourceRefs: [12, 13, 14]
    - factor: environmental
      impact: positive
      point: Water and carbon pressure increases the value of solutions that document efficient cooling choices and runtime outcomes.
      sourceRefs: [8, 13, 23, 24]
  adoptionFrictionMatrix:
    - friction: Incomplete facility data and inconsistent telemetry
      severity: high
      affectedBuyer: Facility engineering lead
      mitigation: Start with assisted hall audits, import templates, and DCIM/BMS connectors before promising automated scoring.
      sourceRefs: [9, 17, 18, 19]
    - friction: Fear of outage, leaks, or commissioning mistakes in live upgrades
      severity: high
      affectedBuyer: COO or VP Infrastructure
      mitigation: Position around phased execution, leak-aware workflows, and commissioning evidence rather than autonomous control.
      sourceRefs: [7, 8, 20, 21]
    - friction: Multi-vendor retrofit coordination across power, cooling, and controls
      severity: high
      affectedBuyer: Thermal program manager
      mitigation: Provide vendor-neutral workpacks, dependency tracking, and reference-design mapping.
      sourceRefs: [6, 16, 17]
    - friction: ROI skepticism versus hiring another consultant
      severity: medium
      affectedBuyer: CFO or COO
      mitigation: Benchmark avoided redesigns, shorter time to revenue, and lower variance from modeled performance.
      sourceRefs: [5, 8, 18]
market:
  tam:
    value: $117.0M
    rationale: >-
      Modeled as CBRE's 6,922.6 MW of primary-market inventory × 5% of MW entering AI retrofit cycles annually × $4.5M/MW
      midpoint retrofit capex from Flexential's $2M-$7M/MW range × 5% control-plane software share, then uplifted 1.5x to
      reflect secondary-market and enterprise brownfield demand not captured in CBRE's primary-market base.
    isEstimate: true
    sourceRefs: [1, 5]
  sam:
    value: $35.0M
    rationale: >-
      Constrains TAM to the initial beachhead of North American regional colocation operators upgrading legacy halls for
      near-term AI cages, assumed at roughly 30% of the broader brownfield retrofit spend pool.
    isEstimate: true
    sourceRefs: [1, 2, 7]
  som:
    value: $4.8M
    rationale: >-
      Reachable Year-3 outcome assuming about 15 customers each buying a blended planning plus monitoring package worth
      roughly $320k annualized per retrofit program.
    isEstimate: true
    sourceRefs: [2, 5, 7]
