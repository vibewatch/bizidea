reportMemo:
  executiveTakeaways:
    - Brownfield AI capacity is now a timing problem more than a science-project problem.
    - The strongest wedge is vendor-neutral retrofit orchestration plus post-commissioning proof.
    - Buyer urgency is real because dense AI demand is arriving faster than new supply.
    - Incumbents cover hardware delivery or steady-state monitoring, but the hall-selection workflow remains open.
  marketDefinition: >-
    Software layer for brownfield AI cooling retrofits in colocation and enterprise data centers: hall-readiness modeling,
    vendor-neutral retrofit scoping, dependency orchestration, and post-commissioning thermal, leak, water, and efficiency
    monitoring for dense AI cages.
  customerAndBuyer: >-
    Primary user is the head of data center operations or facilities engineering lead at a regional colo or enterprise
    site; the buyer is usually the COO, CTO, or VP Infrastructure when near-term AI demand forces capacity unlock decisions
    inside existing halls.
  buyingTriggers:
    - point: >-
        A signed AI tenant deployment or internal GPU rollout exceeds current rack-density limits, forcing a decision
        between retrofitting legacy space and waiting for scarce new capacity.
      sourceRefs: [1, 2, 3, 5]
    - point: >-
        A hall shows a widening price or performance gap versus AI-ready new inventory, so operators need to know which
        rooms can be upgraded before spending millions on the wrong room.
      sourceRefs: [1, 4, 6, 9]
    - point: >-
        Live-upgrade risk becomes unacceptable once liquid cooling, manifolds, and power upgrades must be phased into an
        operating facility.
      sourceRefs: [7, 8, 20, 21]
  willingnessToPay:
    summary: >-
      Buyers already face multi-million-dollar-per-megawatt retrofit budgets and months of lead time, so a software layer
      is economically credible if it shortens design cycles, avoids a failed hall choice, or increases usable AI capacity.
    sourceRefs: [1, 2, 5, 8]
  competitiveLandscape: >-
    Competition is fragmented across DCIM and thermal software, cooling OEMs, integrators, and hardware-led liquid-cooling
    vendors. Most alternatives either start after infrastructure is already installed or are economically motivated to sell
    hardware and services, leaving a gap for vendor-neutral qualification, workflow coordination, and runtime evidence.
  incumbentThesis:
    - incumbentClass: Cooling OEMs
      point: >-
        OEMs can supply reference designs and equipment, but they do not naturally rank mixed-vendor halls or optimize for
        the buyer before a hardware choice is made.
      sourceRefs: [7, 16, 20, 21]
    - incumbentClass: DCIM suites
      point: >-
        DCIM incumbents monitor assets, power, and environment well, but they are weaker at pre-retrofit readiness
        scoring, contractor workflow control, and post-commissioning variance tracking against the original design basis.
      sourceRefs: [17, 18, 19]
    - incumbentClass: Engineering firms
      point: >-
        Consultants are strong for bespoke studies, yet their economics reward one-off engagements instead of building a
        reusable operating dataset across many halls and sites.
      sourceRefs: [7, 8, 9]
    - incumbentClass: In-house operator teams
      point: >-
        Internal teams own the facility context, but fragmented telemetry, vendor coordination, and power scarcity make
        spreadsheet-led retrofit programs slow and risky.
      sourceRefs: [2, 5, 9]
  regulatoryLandscape: >-
    The regulatory burden is less about one AI-cooling statute than about satisfying data-center energy standards, water
    permitting and reuse expectations, and growing local scrutiny on utility and community impacts. That favors a product
    that can produce auditable design assumptions and runtime evidence.
  technologyLandscape: >-
    The technical stack is converging on hybrid liquid-and-air environments, higher rack weights and densities, CDU and
    manifold orchestration, and digital-twin-style planning. The wedge is not inventing colder hardware; it is coordinating
    mixed-fleet retrofits and proving they stay inside the thermal envelope.
  distributionChannels:
    - point: >-
        Direct, high-touch sales into regional colo operators with imminent AI preleases is the fastest path because urgency
        is tied to specific halls and delivery dates rather than broad digital-transformation budgets.
      sourceRefs: [2, 3, 27]
    - point: >-
        Liquid-cooling OEMs and rack vendors are natural channel partners because they need vendor-neutral pre-sales hall
        qualification and post-go-live proof to accelerate close rates.
      sourceRefs: [7, 16, 20, 22]
    - point: >-
        MEP firms, retrofit integrators, and lifecycle service teams can refer deals where multi-vendor coordination is the
        bottleneck rather than hardware availability alone.
      sourceRefs: [5, 16, 21]
  partnershipEcosystem:
    - point: >-
        Buyers increasingly assemble ecosystems around cooling OEMs, CDUs, reference designs, and services rather than
        single-vendor stacks, which creates room for a neutral control plane.
      sourceRefs: [7, 16, 20, 21, 22]
    - point: >-
        BMS and DCIM integration is table stakes because monitoring, alarms, and asset context already sit in those systems.
      sourceRefs: [17, 18, 19]
    - point: >-
        Reference designs and prefabricated modules create a packaging opportunity for software that standardizes retrofit
        documentation and commissioning evidence across partners.
      sourceRefs: [6, 16]
  dataMoats:
    - point: >-
        A cross-project dataset linking hall constraints, chosen retrofit paths, and live outcomes can outperform one-off
        consultant studies over time.
      sourceRefs: [6, 8, 9, 18]
    - point: >-
        Telemetry normalization across power, cooling, leak, and environmental signals is especially valuable in mixed-vendor
        brownfield sites.
      sourceRefs: [7, 16, 17, 18, 19]
    - point: >-
        Commissioning and insurer or lender-ready evidence becomes more valuable as water and power scrutiny rises.
      sourceRefs: [12, 13, 14]
  geographicConsiderations:
    - point: >-
        Primary markets remain supply constrained, but frontier markets with power are growing quickly; the product should
        support both retrofit-heavy core markets and operators expanding into new geographies.
      sourceRefs: [1, 2, 3]
    - point: >-
        Water-stressed jurisdictions and local permit scrutiny increase the appeal of closed-loop and dry-cooler-compatible
        retrofit paths.
      sourceRefs: [13, 14, 23]
    - point: >-
        Regional operators near enterprise demand centers may prefer retrofits because grid access and land in core markets
        remain scarce.
      sourceRefs: [2, 3, 7]
  sensitivityCases:
    - case: Faster-than-expected utility relief and greenfield delivery
      impact: Brownfield urgency softens and buyers may defer retrofit workflow tooling in favor of new halls.
      sourceRefs: [1, 2, 3]
    - case: OEM bundling gets good enough
      impact: Standalone pricing compresses unless the startup wins on vendor-neutral coverage and mixed-fleet evidence.
      sourceRefs: [16, 17, 20, 25]
    - case: Water disclosure and permit scrutiny tighten
      impact: Products that prove water efficiency, reuse readiness, and operational compliance become more valuable.
      sourceRefs: [12, 13, 14, 23]
  validationPlan:
    - priority: high
      question: >-
        Who actually controls budget for the first retrofit program: facilities, colo operations, or the executive sponsor
        for the AI deal?
      evidenceToGather: 10-15 buyer interviews and two recent retrofit deal postmortems with budget line-item detail.
    - priority: high
      question: How much of the current workflow still lives in consultant studies, spreadsheets, and email?
      evidenceToGather: Implementation discovery with one integrator, one colo operator, and one enterprise site using current-state process maps.
    - priority: medium
      question: Which insurer, lender, or customer reports create the highest willingness to pay for ongoing monitoring?
      evidenceToGather: Sample policy riders, lender technical due-diligence checklists, and customer SLA annexes.
    - priority: medium
      question: What telemetry is realistically available from older BMS and DCIM stacks without custom field engineering?
      evidenceToGather: API docs, sensor inventories, and pilot integration scoping from three candidate design partners.
