categoryDynamics:
  growthRate: 18.4% CAGR
  growthRateSourceRefs: [24]
  tailwinds:
    - point: Rack density and liquid cooling adoption are rising fast enough to create new planning and monitoring complexity.
      sourceRefs: [4, 5, 6]
    - point: Record-low vacancy and high precommitment make existing halls strategically valuable again.
      sourceRefs: [1, 2, 3]
    - point: Reference designs and prefabricated AI infrastructure reduce hardware uncertainty and make software standardization more practical.
      sourceRefs: [6, 16]
    - point: Water and energy efficiency pressure increases demand for auditable cooling decisions.
      sourceRefs: [12, 13, 23, 24]
  headwinds:
    - point: Power interconnection delays still cap what a retrofit can unlock.
      sourceRefs: [1, 2, 3]
    - point: Many legacy halls simply cannot support target densities without major structural or plant changes.
      sourceRefs: [7, 8, 9]
    - point: System-level OEM bundling can absorb part of the budget that a standalone startup wants to claim.
      sourceRefs: [16, 17, 20, 25]
competitors:
  - name: EkkoSense
    stage: scale-up
    wedge: AI-driven 3DCIM for thermal optimization, ASHRAE compliance, and cooling-capacity visibility
    pricing: Quote-based SaaS; vendor claims ROI in under 12 months
    strength: Strong real-time thermal analytics and digital-twin-style visibility into cooling risk and savings
    weaknessVsUs: Better at monitoring and optimization than at pre-retrofit hall ranking, contractor orchestration, and commissioning workflow control
    sourceRefs: [18]
  - name: Sunbird
    stage: scale-up
    wedge: DCIM-driven capacity planning and readiness analysis for GB200-class high-density deployments
    pricing: Custom-quote DCIM software
    strength: Useful for asset, power, environmental, and what-if capacity planning in existing facilities
    weaknessVsUs: Positioning is still general DCIM; it does not own the brownfield retrofit operating model end to end
    sourceRefs: [19]
  - name: Schneider Electric plus Motivair
    stage: incumbent
    wedge: Integrated DCIM, reference designs, and rack-level liquid-cooling hardware inside a broad enterprise ecosystem
    pricing: Enterprise software plus project-based hardware and services
    strength: Deep channel reach, multi-vendor visibility, and credible liquid-cooling hardware for phased brownfield upgrades
    weaknessVsUs: Incentives are hardware- and ecosystem-led rather than vendor-neutral across mixed retrofit options
    sourceRefs: [7, 17, 20, 21]
  - name: Vertiv
    stage: incumbent
    wedge: End-to-end AI power and cooling reference architectures with retrofit and lifecycle services
    pricing: Project-based infrastructure and services contracts
    strength: Strong NVIDIA alignment, turnkey deployment credibility, and broad service coverage
    weaknessVsUs: Optimizes around infrastructure sales and delivery blocks rather than cross-site retrofit portfolio management
    sourceRefs: [16]
  - name: Iceotope
    stage: scale-up
    wedge: Full-chassis precision liquid cooling for AI, HPC, enterprise, and edge deployments
    pricing: Hardware-and-partner solution quote
    strength: Solves more of the rack than direct-to-chip alone and works in constrained enterprise or edge environments
    weaknessVsUs: Hardware-specific approach does not solve hall selection, multi-vendor dependency tracking, or fleetwide brownfield evidence management
    sourceRefs: [22, 23]
regulatoryTechnicalConstraints:
  - point: AI retrofit programs must still anchor to ASHRAE energy and thermal guidance such as Standard 90.4 and Standard 127.
    sourceRefs: [10, 11]
  - point: Water permits, discharge routes, and reuse expectations vary by state and local utility, especially where direct or indirect discharge is involved.
    sourceRefs: [13]
  - point: States are beginning to consider explicit data-center water reporting, mitigation, and cost-recovery rules.
    sourceRefs: [14]
  - point: Brownfield halls may be limited by ceiling loading, raised-floor congestion, manifold placement, and legacy power distribution.
    sourceRefs: [8, 9]
  - point: Facilities without building water may need liquid-to-air intermediate approaches, which changes both economics and achievable density.
    sourceRefs: [21]
validationSignals:
  - point: JLL and CBRE both show record-low vacancy and high precommitment, confirming that operators have real economic pressure to unlock existing capacity.
    sourceRefs: [1, 2, 3]
  - point: AFCOM shows liquid cooling is already deployed by a meaningful minority and planned by many more operators.
    sourceRefs: [4]
  - point: Flexential's retrofit example shows enterprises are willing to pay meaningful capex to adapt legacy space rather than wait years for new supply.
    sourceRefs: [5]
  - point: Vendors already market AI readiness through digital twins, thermal optimization, and DCIM workflows, which suggests an existing budget category is forming.
    sourceRefs: [6, 17, 18, 19]
openQuestions:
  - Which executive function signs off first on retrofit workflow software in regional colos: operations, infrastructure, finance, or a tenant-facing GM?
  - How much insurer or lender reporting demand exists today for post-commissioning thermal and water evidence on brownfield AI retrofits?
  - In mixed-vendor retrofit projects, how often do OEM-native software tools break down compared with vendor-neutral coordination?
  - What share of older halls have enough telemetry quality to support automated readiness scoring without manual surveys?
