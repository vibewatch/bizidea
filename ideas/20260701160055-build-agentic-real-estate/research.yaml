competitors:
- name: Build
  stage: scale-up
  wedge: AI-native operating partner that automates site selection, diligence, underwriting, and IC memo generation for institutional real estate and infrastructure.
  pricing: Fixed deliverable-based pricing; outcomes priced up front rather than hourly.
  strength: Primary traction, broad workflow coverage, auditable outputs, and real data-center customer proof.
  weaknessVsUs: Still oriented to sponsor and developer velocity rather than lender independence, covenant gating, or portfolio-level credit memory.
  sourceRefs:
  - 1
  - 2
  - 3
  - 8
- name: Paces
  stage: scale-up
  wedge: Power-first site search, grid analysis, modular diligence reports, and interconnection support for data-center and energy developers.
  pricing: Custom enterprise pricing; modular reports and power-flow studies rather than a public rate card.
  strength: Strong path-to-power messaging and faster expert-validated grid/permitting workflows.
  weaknessVsUs: Geared to advancing developer pipelines, not to producing lender-grade credit memos or post-close surveillance logic.
  sourceRefs:
  - 17
  - 18
  - 19
- name: LandGate
  stage: scale-up
  wedge: "Of\uFEFFftake, fiber, water, environmental, and parcel intelligence with due-diligence reports and capital-markets positioning for lenders."
  pricing: Custom demo-led pricing; data subscriptions and due-diligence reports with no public enterprise price.
  strength: Rich infrastructure datasets and explicit lender/insurance positioning around underwriting and risk assessment.
  weaknessVsUs: Closer to a data-and-report layer than a full committee-ready opinion and ongoing loan-monitoring system.
  sourceRefs:
  - 20
  - 21
  - 23
- name: Acres
  stage: scale-up
  wedge: Horizontal parcel, sales, mortgage, and collateral intelligence with a lending workflow and public self-serve pricing tiers.
  pricing: Acres Pro at $94.99/month annually; Enterprise custom.
  strength: Accessible pricing, strong land-lending workflow, and broad parcel/transaction context.
  weaknessVsUs: Weak on power, utility, and data-center-specific underwriting logic compared with a powered-land credit product.
  sourceRefs:
  - 24
  - 25
- name: Colliers Data Centers
  stage: incumbent
  wedge: Advisory, capital-markets, debt, and valuation services around data-center real estate and finance.
  pricing: Project-based advisory and financing fees; no public pricing.
  strength: Brand trust, financing relationships, and broad advisory surface across the transaction lifecycle.
  weaknessVsUs: Services-heavy delivery does not naturally become a reusable, lender-owned evidence graph or monitoring engine.
  sourceRefs:
  - 26
  - 15
