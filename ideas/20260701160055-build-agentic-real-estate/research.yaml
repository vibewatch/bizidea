  validationPlan:
  - priority: high
    question: How many sub-$100M powered-land or preconstruction credit decisions does one target team make per year, and what fraction already requires third-party diligence?
    evidenceToGather: Interview 10 underwriting teams and collect the last 12 months of site, bridge, and preconstruction reviews including cycle times, consultant spend, and approval outcomes.
  - priority: high
    question: What minimum citation depth and human review policy is required before an IC chair will sign off on an AI-assisted memo?
    evidenceToGather: Run an assist-only pilot on 5-10 live opportunities and log which red flags, sources, and confidence levels trigger manual escalation.
  - priority: medium
    question: Can utility, zoning, and environmental evidence be normalized reliably enough across Northern Virginia and Texas to avoid service-heavy custom work?
    evidenceToGather: Backtest 20 recent sites across both regions and compare source coverage, false positives, and missing-data rates by workstream.
  - priority: medium
    question: "Which commercial model lands fastest: annual credit-team subscription, per-deal memo fee, or hybrid monitoring contract?"
    evidenceToGather: Price-test three packaging models in design-partner discussions and compare willingness to sign before a full portfolio rollout.
