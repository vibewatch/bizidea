slug: powered-land-credit-os
date: "2026-07-01"
executiveSummary: >-
  Data-center financing is becoming a power- and permitting-risk underwriting
  problem, and private-credit teams are now the bottleneck when sponsors need
  term sheets inside short exclusivity windows. The proposed company sells a
  lender-side underwriting OS that ingests sponsor data rooms plus power,
  zoning, water, environmental, and parcel data to produce IC-ready memos,
  fatal-flaw flags, and post-close monitoring triggers. The initial beachhead
  is intentionally narrow: North American infrastructure private-credit teams
  underwriting sub-$100M powered-land and preconstruction loans for
  secondary-market developers, starting with Northern Virginia deals where
  investor activity is dense and utility and zoning processes are explicit.
  This wedge is attractive because budgets already exist in consultant-led
  diligence, but the current workflow is fragmented across sponsors, lawyers,
  engineers, utility calls, and spreadsheet memos. Build, Paces, and LandGate
  validate that machine-assisted site diligence is real, yet none is positioned
  as the neutral lender approval layer with committee-grade evidence trails and
  drawdown controls. The first sale should be an assist-only pilot tied to one
  active loan pipeline, with pricing that mixes a team license and deal-tied
  fees so the buyer can reallocate existing diligence spend rather than approve
  a new software budget. The central risk is not model capability but trust and
  data coverage: if IC chairs will not sign off on AI-assisted memos or if
  Northern Virginia and Texas data normalization stays too bespoke, the
  business becomes services-heavy. The research also leaves two material gaps
  unresolved—the annual deal volume per beachhead team and the citation plus
  human-review threshold required for committee acceptance—so the first 90 days
  must validate both before the company scales hiring or geography.
problem:
  - >-
    Powered-land and preconstruction loans require independent validation of
    power, water, zoning, environmental, and permitting assumptions, but
    lenders still assemble that judgment from sponsor materials, consultant
    PDFs, and manual utility or legal outreach.
  - >-
    Short exclusivity windows force a bad tradeoff between speed and rigor:
    teams either lose the site by moving too slowly or approve a loan with
    hidden fatal flaws that surface after closing.
  - >-
    Sponsor-side diligence tools, raw land-intelligence platforms, and advisory
    firms each solve part of the workflow, but none gives the lender a
    reusable, neutral, committee-ready opinion plus post-close drift
    monitoring.
solution:
  - >-
    An assist-only underwriting engine ingests sponsor data rooms and
    structured infrastructure data to generate IC-ready memo drafts, red-flag
    lists, and missing-evidence checklists with direct source citations.
  - >-
    Market-specific diligence modules cover utility and interconnection,
    zoning and grandfathering, water, flood and wetlands, and sponsor-support
    assumptions, starting with Northern Virginia and then Texas.
  - >-
    Post-term-sheet monitoring tracks permitting, power, and design drift so
    lenders can gate drawdowns, waivers, and covenant changes before losses
    compound.
whyWeWin:
  - >-
    The product is built for lender trust rather than sponsor velocity, so its
    core output is a reviewable credit opinion with evidence trails, not just a
    faster site-search workflow.
  - >-
    A Northern Virginia-first wedge creates faster proof than a broad
    infrastructure platform because deal density is high, power and zoning are
    acute, and buyers already feel the cost of waiting on fragmented diligence.
  - >-
    Hybrid pricing fits how funds already buy work—consultants, counsel, and
    project-finance diligence—so the company can land inside an existing budget
    before asking for full platform standardization.
  - >-
    Repeated use creates a proprietary dataset linking early diligence signals
    to committee decisions, waivers, delays, and post-close surprises that
    sponsor-side tools and services firms do not naturally capture.
strategicChoices:
  beachhead: >-
    North American infrastructure private-credit and digital-infrastructure
    debt teams underwriting sub-$100M powered-land and preconstruction loans
    for secondary-market data-center developers, starting with Northern
    Virginia sites.
  wedgeRationale: >-
    This slice is narrow enough to productize one live-deal workflow but painful
    enough to win budget quickly: investor activity is dense, power and zoning
    complexity are high, and lenders already pay for third-party diligence.
    Broader "AI for real estate" categories would add more workflows, more data
    heterogeneity, and less urgent buying triggers before the company has any
    proof that committees trust the output.
  sequencingRationale: >-
    Build data-room ingestion, the citation engine, and the IC memo workflow
    first because committee acceptance is the gating proof point. Add
    drawdown-control monitoring second because it expands ACV only after the
    lender trusts the pre-close output. Hire engineering and underwriting
    implementation before a scaled sales team, and use advisory or data partners
    for credibility only after direct pilots show repeatable committee
    acceptance. Expand from Northern Virginia to Texas before entering EMEA, and
    stay inside data-center credit until the lender workflow is repeatable.
  notYet:
    - Sponsor-side site sourcing and early design tooling
    - Broad CRE underwriting outside powered-land and preconstruction data-center loans
    - Full multi-region coverage before Northern Virginia and Texas modules are repeatable
    - Autonomous credit approvals without explicit human review
    - Non-data-center asset classes such as logistics parks, battery storage, or semiconductors
market:
  tam: "$375.0M estimated TAM: 600 global complex-site underwriting teams plus 3,000 high-stakes financings or developments buying platform and per-deal workflows"
  sam: "$98.8M estimated SAM: 140 North American and European data-center credit or development-capital teams plus 850 annual beachhead financings or monitored sites"
  som: "$7.5M estimated year-3 SOM: 15 paying credit teams plus 50 financed or monitored sites"
  segments:
    - "Primary: North American infrastructure private-credit and digital-infrastructure debt teams underwriting sub-$100M powered-land and preconstruction loans"
    - "Secondary: Regional data-center developers needing lender-ready diligence and later portfolio-surveillance buyers inside the same lender accounts"
  buyingProcess: >-
    A head of underwriting or investment director usually sponsors the
    evaluation when an active deal is approaching term sheet or investment
    committee, while the partner, head of credit, legal team, and outside
    technical advisers validate whether the evidence trail is decision-grade.
    The first contract is most credible as a live-deal pilot for one credit
    team, then converts to an annual team license plus monitoring once the
    product supports multiple deals and drawdown reviews.
product:
  mvp: >-
    An assist-only Northern Virginia underwriting workflow that ingests sponsor
    rooms and core external datasets, then produces an IC memo draft,
    fatal-flaw flags, a missing-data checklist, and a cited evidence pack
    within a few business days. The MVP is deliberately not an autonomous
    approval engine; every conclusion is reviewable and overrideable by the
    credit team.
  sixMonth: >-
    Northern Virginia module live with email and data-room ingestion,
    power-zoning-environmental evidence packs, human-review controls, and pilot
    usage on 3-5 live deals across one to two design partners.
  twelveMonth: >-
    Texas and ERCOT workflow live with reusable memo templates, role-based
    exception handling, and post-term-sheet monitoring for drawdown triggers and
    permitting or power drift across closed or warehoused assets.
  twentyFourMonth: >-
    Portfolio benchmark layer showing which early diligence signals predict
    delay, waiver, or deal abandonment across data-center loans, plus first
    second-region or EMEA deployment within the same lender-centric workflow.
  keyBets:
    - Investment committees will accept assist-only memos if every red flag is cited and human approval remains explicit.
    - Northern Virginia and Texas provide enough repeatable data coverage to keep custom analyst work below services-heavy levels.
    - Hybrid pricing lands faster than pure SaaS because buyers already budget for consultant-led diligence.
    - Post-close monitoring increases retention and ACV once a fund uses the product on multiple financed sites.
gtm:
  wedge: >-
    Sell one underwriting team a live-deal pilot for Northern Virginia
    powered-land or preconstruction loans, with success defined as IC-ready
    memo turnaround in days and earlier fatal-flaw detection—not generic
    real-estate AI.
  channels:
    - Founder-led outbound to heads of underwriting, heads of credit, and investment directors at infrastructure private-credit and digital-infrastructure debt teams
    - Co-delivery and referral partnerships with engineering consultants, land-use counsel, and debt advisers already inside the approval process
    - Partner-led integrations with land, utility, and diligence data providers for funds that want workflow lift without replacing existing systems
  funnelTargets: "Target account -> qualified live-deal pilot 20-30%; pilot -> annual team contract 50%+; annual contract -> multi-deal monitoring or second-region expansion 60%+"
  pricing: >-
    Hybrid annual credit-team subscription plus per-deal underwriting and
    monitoring fees. Initial pilots should attach to one active team and one to
    three live deals so buyers can reallocate existing diligence budget; once
    the workflow is trusted, the account can expand toward a modeled ~$250k
    team ACV plus per-site fees rather than a pure seat-based SaaS model.
businessModel:
  revenueStreams:
    - Annual platform subscription per underwriting team
    - Per-deal IC memo and fatal-flaw underwriting fees
    - Post-close monitoring fees for financed or warehoused sites
    - Onboarding and data-integration fees for new regions or lender workflows
  unitOfValue: One underwriting team plus each active site underwritten or monitored
  targetGrossMarginPct: 70
  expansionLevers:
    - Expand from one active deal team to the full credit organization within a fund
    - Add monitoring and drawdown-control workflows after the first closed deals
    - Extend the same data-center underwriting stack from Northern Virginia to Texas and EMEA
    - After the data-center risk benchmark is credible, enter adjacent powered-infrastructure asset classes
strategyMap:
  northStarMetric: Live data-center financings underwritten or monitored with committee-accepted memos delivered in five business days or less
  inputMetrics:
    - Days from sponsor data room access to IC-ready memo
    - Share of memo conclusions backed by direct citations
    - Committee acceptance rate without a full consultant rebuild
    - Unsupported-assumption rate by market and workstream
    - Pilot-to-annual-contract conversion rate
    - Number of monitored sites with drawdown or waiver alerts issued before the next lender decision
  moatsToBuild:
    - Cross-source citation graph linking every memo conclusion to underlying data and human overrides
    - Outcome dataset connecting early diligence signals to approvals, waivers, delays, and post-close surprises
    - Region-specific playbooks for power, zoning, environmental, and permitting workflows in core markets
    - Workflow memory around exception handling and drawdown gating that sponsor-side tools do not capture
  killCriteria:
    - Fewer than 3 paid fund pilots by month 12 after at least 25 qualified buyer conversations
    - Assist-only pilots fail to achieve either committee acceptance on 60% or more of live memos or memo turnaround under five business days
    - Northern Virginia and Texas backtests show more than 20% of required diligence fields still need bespoke manual sourcing
  mermaid: |
    flowchart LR
      Wedge[NoVA lender underwriting wedge] --> MVP[Cited IC memo and red-flag MVP]
      MVP --> Proof[Faster committee-ready decisions and fewer missed fatal flaws]
      Proof --> Expansion[Monitoring plus second-region and adjacent-infrastructure expansion]
investorMemo:
  verdict:
    call: "Meet / investigate further"
    conviction: >-
      Worth a first meeting because the lender-side gap is real, but conviction
      should stay moderate until live pilots prove committee trust and enough
      deal volume per fund.
    whyBelieve: >-
      Private credit is scaling into the data-center buildout just as
      sponsor-side tools compress diligence speed, creating a clear budgeted
      bottleneck on the lender side.
    whyDoubt: >-
      The buyer universe is concentrated and sophisticated, and the product can
      collapse into consultant-like delivery if citation standards or data
      coverage stay too bespoke.
    nextDiligence: >-
      Backtest 20 recent Northern Virginia and Texas deals and secure three paid
      live-deal pilots that show cited memos accepted by committee in days, not
      weeks.
  firstCustomer:
    title: Head of underwriting at an infrastructure private-credit fund
    profile: >-
      North American fund or digital-infrastructure debt team evaluating
      $15M-$100M powered-land or preconstruction loans for secondary-market
      data-center developers, with lean internal associates and heavy outside
      diligence dependence.
    trigger: >-
      A sponsor requests a term sheet inside a two-week exclusivity window and
      the fund cannot independently validate power, water, zoning, or
      permitting assumptions before investment committee.
    buyer: Partner or head of credit
    initialContract: >-
      A $100k-$150k paid pilot for one credit team plus $25k-$50k per live
      deal, converting toward a modeled ~$250k annual team contract plus
      monitoring once the fund uses the workflow across multiple financings.
  mustBeTrue:
    - At least 10 target funds evaluate 5 or more relevant powered-land or preconstruction financings per year and already buy third-party diligence.
    - At least 60% of pilot memos can reach committee circulation without a full consultant rebuild.
    - Northern Virginia and Texas data coverage can populate at least 80% of required diligence fields from repeatable sources.
    - A hybrid contract converts more than half of successful pilots into annual team agreements funded from existing diligence budgets.
    - Build, Paces, LandGate, or major advisory firms do not close the lender-native approval gap before the startup builds an outcome and monitoring moat.
  diligenceQuestions:
    - Which named funds in North America currently underwrite 5 or more relevant sub-$100M data-center financings per year?
    - What citation depth, review workflow, and liability boundary does an IC chair require before using an AI-assisted memo?
    - On 20 recent Northern Virginia and Texas deals, what percentage of power, zoning, environmental, and permitting evidence can be sourced repeatably without bespoke analyst work?
    - Who owns the budget for monitoring and drawdown-control workflows after closing: underwriting, asset management, or outside advisers?
    - How quickly could Build, Paces, LandGate, or Colliers move from adjacent workflows into lender-facing credit memos and surveillance?
operatingAssumptions:
  - assumption: >-
      Target funds see enough relevant deal flow to support recurring product
      usage rather than occasional project-based work.
    basis: research.yaml
    validationTest: >-
      Interview 10 underwriting teams and collect the last 12 months of site,
      bridge, and preconstruction decisions; target at least 5 teams with 5 or
      more relevant financings and existing third-party diligence spend.
    decisionImpact: >-
      If false, the company should price mainly per deal, keep headcount lean,
      and treat the venture-scale case as weakened.
  - assumption: >-
      IC chairs will accept assist-only cited memos as long as human approval
      remains explicit.
    basis: research.yaml
    validationTest: >-
      Run one pilot across 5-10 live opportunities and measure the share of
      memos that reach committee circulation without a full manual rebuild;
      target 60% or better.
    decisionImpact: >-
      If false, the product must shift toward research tooling or services,
      which delays recurring ACVs and weakens the core wedge.
  - assumption: >-
      Northern Virginia first and Texas second provide enough repeatable data
      coverage to keep custom analyst work below 20% of delivery effort.
    basis: research.yaml
    validationTest: >-
      Backtest 20 recent sites across both markets and measure unsupported
      fields, false positives, and manual research hours by workstream.
    decisionImpact: >-
      If false, geography must narrow further or the company must accept
      services-heavy economics and slower expansion.
  - assumption: >-
      Hybrid pricing lands faster than pure subscription pricing because buyers
      can map spend to active deals and existing diligence budgets.
    basis: idea.yaml
    validationTest: >-
      Price-test annual, per-deal, and hybrid packages with at least 8 design
      partners; target the highest conversion on hybrid and at least 3 signed
      LOIs.
    decisionImpact: >-
      If false, commercial packaging and the year-3 SOM assumptions both need
      to change before scaling sales.
  - assumption: >-
      Post-close monitoring and drawdown gating are valuable enough to expand
      ACV after the first financed sites close.
    basis: operator judgment
    validationTest: >-
      In the first two pilot accounts, measure whether asset-management or
      credit teams request monitoring on at least half of closed pilot deals.
    decisionImpact: >-
      If false, retention and ACV stay lower, so the company must prioritize
      same-buyer geographic expansion earlier.
experimentRoadmap:
  - horizon: 0-90 days
    experiment: Underwriting workflow and pricing discovery sprint
    hypothesis: >-
      Heads of underwriting will prioritize this purchase when it is attached to
      an active term-sheet window and packaged as hybrid diligence spend rather
      than generic AI software.
    successMetric: 10 buyer interviews completed, 3 design-partner LOIs signed, and hybrid pricing chosen over pure annual or pure per-deal packaging
    owner: Founding CEO
  - horizon: 0-90 days
    experiment: Northern Virginia backtest set
    hypothesis: >-
      Repeatable sources can cover most required power, zoning, environmental,
      and parcel fields in the first market without excessive bespoke research.
    successMetric: At least 80% repeatable field coverage across 10 recent deals with unsupported assumptions explicitly flagged
    owner: Founding engineering and underwriting lead
  - horizon: 90-180 days
    experiment: First assist-only live-deal pilot
    hypothesis: >-
      The product can deliver a cited memo in under five business days and
      reach committee circulation without a full consultant rebuild.
    successMetric: Five live opportunities processed with at least 60% reaching committee circulation and median memo turnaround under five business days
    owner: Underwriting product lead
  - horizon: 90-180 days
    experiment: Texas workflow benchmark
    hypothesis: >-
      Texas and ERCOT-specific diligence can be added with limited incremental
      custom work once the Northern Virginia workflow is stable.
    successMetric: Less than 20% manual field gap across 10 Texas sites and one committed second-region design partner
    owner: Data integrations engineer
  - horizon: 180-365 days
    experiment: Post-close monitoring pilot
    hypothesis: >-
      Lenders will pay to monitor power, permitting, and design drift after
      closing if alerts can be tied to drawdown or waiver decisions.
    successMetric: One lender adopts monitoring on at least 2 closed or warehoused sites from an existing pilot account
    owner: Customer implementation lead
  - horizon: 180-365 days
    experiment: Advisory channel co-sell test
    hypothesis: >-
      Engineering, legal, or debt-advisory partners will introduce qualified
      buyers and validate outputs without disintermediating the lender-owned
      workflow.
    successMetric: Two qualified buyer introductions and one paid pilot sourced by a channel partner
    owner: Founding CEO
  - horizon: 365-540 days
    experiment: Monitoring expansion inside an existing lender account
    hypothesis: >-
      A buyer that starts with pre-close memos will expand into portfolio
      monitoring once the first financed sites are live.
    successMetric: One account adds a monitoring contract by month 18
    owner: Founding CEO and customer implementation lead
operations:
  - >-
    Ingestion: sponsor data rooms, email, parcel, utility, zoning,
    environmental, and water sources normalized into a cited deal graph.
  - >-
    Review controls: every memo conclusion confidence-scored, traceable, and
    explicitly approved or overridden by the credit team.
  - >-
    Region playbooks: Northern Virginia first and Texas second, with unsupported
    assumptions flagged rather than inferred.
  - >-
    Monitoring: permitting, power, design, and covenant triggers refreshed
    between approval and drawdown.
  - >-
    Key partners: utility-process specialists, engineering and environmental
    firms, land-use counsel, and data providers that co-deliver or validate
    edge cases.
team:
  - role: Founding CEO and underwriting seller
    startTiming: Month 0
    rationale: >-
      Owns design-partner sales into heads of underwriting and partners,
      translates live-deal pain into product priorities, and manages the first
      advisory and data relationships.
  - role: Founding eng
    startTiming: Month 0
    rationale: >-
      Builds ingestion, the citation graph, memo-generation workflow, and core
      product controls needed for a decision-grade audit trail.
  - role: Geospatial and data integrations engineer
    startTiming: Month 1
    rationale: >-
      Owns utility, parcel, zoning, environmental, and water data
      normalization in Northern Virginia and Texas.
  - role: Infrastructure underwriting product lead
    startTiming: Month 3
    rationale: >-
      Encodes lender memo templates, red-flag logic, and human-review rules so
      outputs match committee expectations rather than generic AI summaries.
  - role: Customer implementation and monitoring lead
    startTiming: Month 6
    rationale: >-
      Runs live pilots, coordinates with consultants and counsel, and turns
      post-close monitoring into a repeatable workflow instead of bespoke
      services.
  - role: Partnerships and data operations manager
    startTiming: Month 9
    rationale: >-
      Formalizes channel partners and data-vendor operations once the first
      markets and live-deal pilots show repeatable coverage.
milestones:
  - horizon: 0-12 months
    items:
      - "Month 3: complete 10 underwriting interviews, price-test three packages, and sign the first design-partner LOI"
      - "Month 6: Northern Virginia MVP live and backtest 10 recent deals with at least 80% repeatable field coverage"
      - "Month 9: first paid live-deal pilot delivers cited memo turnaround in five business days or less across 3-5 opportunities"
      - "Month 12: three paid fund pilots, first monitoring workflow live, and one case study showing earlier fatal-flaw detection or materially faster memo prep versus manual baseline"
  - horizon: 12-24 months
    items:
      - "Month 18: Texas workflow live, five paying credit teams, and monitoring adopted on at least 10 financed or warehoused sites"
      - "Month 21: committee-accepted memo template and exception workflow reusable across repeat deals without a full bespoke rebuild"
      - "Month 24: first portfolio-surveillance or second-region expansion contract signed at an existing lender account"
  - horizon: 24-36 months
    items:
      - "Month 30: outcome dataset links early signals to approvals, waivers, and post-close surprises across 25 or more sites"
      - "Month 36: 15 paying credit teams and 50 underwritten or monitored sites, with enough evidence to decide whether adjacent asset classes support a Series A story"
risks:
  - risk: Investment committees may not trust AI-assisted memos on multimillion-dollar loans
    likelihood: High
    impact: High
    mitigation: >-
      Stay assist-only at launch, require explicit human approval, attach every
      conclusion to citations, and use advisers to validate edge cases before
      claiming autonomous coverage.
  - risk: Data coverage holes outside core markets force bespoke analyst work
    likelihood: High
    impact: High
    mitigation: >-
      Launch in Northern Virginia, add Texas only after backtests clear the
      coverage threshold, and flag unsupported assumptions instead of smoothing
      them over.
  - risk: Delivery drifts into services-heavy custom diligence
    likelihood: Medium
    impact: High
    mitigation: >-
      Restrict the first release to one lender workflow and two markets, price
      custom work separately, and refuse adjacent requests that do not improve
      the reusable core.
  - risk: Sponsor-side platforms or advisory incumbents add lender-facing memo features
    likelihood: Medium
    impact: High
    mitigation: >-
      Build the neutral lender outcome dataset and monitoring workflow that
      competitors cannot easily replicate from sponsor-side or project-based
      positions.
  - risk: The buyer universe is narrower or slower-moving than the model assumes
    likelihood: Medium
    impact: Medium
    mitigation: >-
      Keep burn aligned to a small number of high-value funds, tie sales to live
      deal triggers, and prioritize account expansion over broad outbound.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$3-4M"
  runwayMonths: 18
  useOfFundsSummary: >-
    18 months of runway to build the Northern Virginia and Texas underwriting
    workflow, hire founding engineering plus underwriting and implementation
    talent, secure 3-5 paid lender pilots, validate committee acceptance and
    pricing, and prove that monitoring expands ACV before the next financing
    decision.
