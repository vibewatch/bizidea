slug: powered-land-credit-os
date: '2026-07-01'
currency: USD
modelStartMonth: 2026-08
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-08
  unit: YYYY-MM
  source: '[BP date 2026-07-01] 财务模型从商业计划书标注日期之后的第一个完整月份开始。'
- id: A2
  name: 期初现金 / 种子前轮融资
  value: $3.0M
  unit: USD
  source: '[BP fundingAsk targetFundingRangeUsd $3-4M + BP milestones 12-24 months + model cash curve] 基础情形取所述区间的下限，因为混合收入会在全员到岗之前就已经开始产生。'
- id: A3
  name: 起始付费信贷团队数
  value: '0'
  unit: count
  source: '[BP milestones 0-12 months + BP investorMemo.firstCustomer] 公司从零收入起步，必须先把共创客户转化为付费试点。'
- id: A4
  name: 客户定义
  value: 一个按付费试点或年度合同签约的付费放贷方承销团队
  unit: definition
  source: '[BP businessModel.unitOfValue + BP gtm.pricing] customersEop 统计的是付费信贷团队数量，不是单个地块数量。'
- id: A5
  name: 早期试点收入确认
  value: 第 9 个月每活跃团队 $18K，到第 12 个月升至 $22K
  unit: USD/team/month
  source: '[BP investorMemo.firstCustomer.initialContract $100k-$150k pilot plus $25k-$50k per live deal] 首批付费试点在第 1 年末落地，在工作流仍处于仅辅助阶段时按混合月收入确认。'
- id: A6
  name: 退出期混合年收入（每团队）
  value: 第 3 年第 4 季度年化 $504K
  unit: USD/team/year
  source: '[BP gtm.pricing modeled ~$250k team ACV + Research market.som 15 teams plus 50 sites = $7.5M] 一旦监控费和单地块费用叠加上去，第 3 年第 4 季度每团队月收入将达到约 $42K。'
- id: A7
  name: 净付费团队爬坡节奏
  value: 第 9 个月 1 个团队，第 12 个月 4 个，第 18 个月 5 个，第 24 个月 9 个，第 36 个月 15 个
  unit: customersEop
  source: '[BP milestones month 9 first paid pilot, month 18 five paying credit teams, and month 36 fifteen paying teams] 客户爬坡节奏锚定在既定的里程碑验证点上。'
- id: A8
  name: 每付费团队的地块挂载爬坡
  value: 首批试点约每团队 0.6 个地块，第 2 年第 4 季度升至 1.5 个，第 3 年第 4 季度升至 3.4 个
  unit: sites/team
  source: '[Research market.som 50 financed or monitored sites with 15 teams + BP businessModel.revenueStreams] 随着每个放贷方团队挂载更多已承销和受监控的地块，混合 ARPU 随之上升。'
- id: A9
  name: 收入确认惯例
  value: 期末付费团队数乘以该期每团队已实现的混合月收入
  unit: formula
  source: '[BP gtm.pricing + BP businessModel.unitOfValue] 这样收入就能和 customersEop 乘以 ARPU 直接对得上。'
- id: A10
  name: 毛利率爬坡
  value: 第 1 年 40%-50%，第 2 年 55%-64%，第 3 年 66%-71%
  unit: gross margin percent
  source: '[BP businessModel.targetGrossMarginPct 70 + BP operatingAssumptions custom analyst work below 20%] 在数据覆盖搭建期，毛利率会低于目标，直到第 3 年末才勉强摸到 70% 出头。'
- id: A11
  name: 招聘时间线
  value: 第 1 个月招创始 CEO 和创始工程师；第 2 个月招第二名数据/集成工程师；第 4 个月招承销产品负责人；第 7 个月招落地负责人；第 10 个月招合作伙伴负责人；第 14 个月招数据运营分析师；第 16 个月招第二名 GTM 人员；第 18 个月招 得州 工程师；第 20 个月招第二名承销负责人；第 22 个月招第二名落地人员；第 24 个月招第四名工程师；第 28 个月招第二名数据运营/行政人员；第 30 个月招第三名落地人员；第 33 个月招第五名工程师
  unit: timeline
  source: '[BP team + BP strategicChoices.sequencingRationale + startup-finance heuristic] 模型把工程、承销和落地人力配置在规模化销售团队之前，因为投委会信任和覆盖可复用性才是真正的卡点。'
- id: A12
  name: 创始人满载薪酬
  value: $165K
  unit: USD/year
  source: '[BP team Founding CEO and underwriting seller + startup-finance heuristic] 创始人现金薪酬保持精简，含工资税和福利。'
- id: A13
  name: 工程满载薪酬
  value: $210K
  unit: USD/FTE/year
  source: '[BP team Founding eng and geospatial/data integrations engineer + startup-finance heuristic] 对应 北弗吉尼亚 和 得州 所需的资深工作流、地理空间和数据集成人才水平。'
- id: A14
  name: 承销/产品满载薪酬
  value: $200K
  unit: USD/FTE/year
  source: '[BP team infrastructure underwriting product lead + startup-finance heuristic] 假设是能把放贷方备忘录模板和例外规则编码进产品的资深操盘手。'
- id: A15
  name: 落地/监控满载薪酬
  value: $165K
  unit: USD/FTE/year
  source: '[BP team customer implementation and monitoring lead + startup-finance heuristic] 对应客户交付人才水平，但不组建庞大的服务团队。'
- id: A16
  name: 销售/合作伙伴满载薪酬
  value: $180K
  unit: USD/FTE/year
  source: '[BP gtm.channels + BP team partnerships and data operations manager + startup-finance heuristic] 涵盖企业销售、合作伙伴管理和高强度差旅的一线工作。'
- id: A17
  name: 行政/数据运营满载薪酬
  value: $130K
  unit: USD/FTE/year
  source: '[BP operations + startup-finance heuristic] 覆盖精简的种子前轮组织里的财务、供应商管理和数据运营支持。'
- id: A18
  name: 薪酬在损益表科目间的分摊
  value: 创始人 65% 归销售与市场 / 35% 归行政；落地人员 50% 归销售与市场 / 50% 归研发；工程与承销 100% 归研发；销售 100% 归销售与市场；行政/数据运营 40% 归研发 / 60% 归行政
  unit: allocation
  source: '[BP team role rationales + BP operations] 薪酬按角色定位映射到运营模型使用的各功能科目上。'
- id: A19
  name: 非薪酬运营支出爬坡
  value: 非薪酬支出从第 1 年初期每月 $32K，涨到第 3 年第 4 季度每月 $95K
  unit: USD/month
  source: '[BP operations + startup-finance heuristic] 覆盖公司从 北弗吉尼亚 扩展到 得州 过程中的数据授权、云服务、差旅、保险、法务和工作流工具支出。'
- id: A20
  name: 现金换算惯例
  value: 现金变动等于 EBITDA
  unit: formula
  source: '[startup-finance heuristic] 假设资本开支、税费、债务偿还和营运资金时点在当前阶段相对经营烧钱而言影响不大。'
- id: A21
  name: 月流失率
  value: 2.0%
  unit: percent per month
  source: '[startup-finance heuristic for early enterprise workflow software] 放贷方审批工作流一旦被采用应该会相当粘性，但模型比成熟的垂直 SaaS 更保守。'
- id: A22
  name: CAC 换算惯例
  value: 第 2-3 年销售与市场支出除以 11 个净新增付费团队
  unit: formula
  source: '[model calc using Y2-Y3 S&M spend + BP gtm.funnelTargets] CAC 在第一个试点年之后才开始衡量，此时业务开始持续新增付费团队。'
- id: A23
  name: 下一轮融资定级里程碑
  value: 第 24 个月前拿下 9 个付费团队、得州 上线、10 个受监控地块，并签下第一份扩展合同，同时进入第 3 年上半年时仍保留约六个月缓冲
  unit: milestone
  source: '[BP milestones 12-24 months + BP fundingAsk.runwayMonths 18 + model cash curve] 本轮融资规模按能到达第一个扩展验证点、且基础情形转为接近盈亏平衡前仍留有缓冲来设定。'
