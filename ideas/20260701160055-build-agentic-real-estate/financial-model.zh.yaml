scenarios:
  downside:
    description: 试点转化滞后，受监控地块的挂载数偏轻，得州 数据覆盖仍比计划更依赖人工。
    y3RevenueK: 4536.0
    y3EbitdaK: -519.3
    cashLowPointK: -335.5
    keyAssumptionChanges:
    - 第 3 年第 4 季度付费团队数只到 13 个，未达 15 个。
    - 退出期混合月收入（每团队）止步于约 $38K，未达 $42K，因为挂载的地块和监控费更少。
    - 毛利率退出期约 68%，未达 71%，因为定制化覆盖工作持续存在。
  base:
    description: 混合定价把试点转成年度团队合同，随着现有放贷方账户里陆续开启监控，单地块费用同步扩大。
    y3RevenueK: 5618.0
    y3EbitdaK: 348.5
    cashLowPointK: 371.9
    keyAssumptionChanges:
    - 净付费团队数从第 12 个月的 4 个，涨到第 24 个月的 9 个，再到第 36 个月的 15 个。
    - 混合月收入（每团队）从第 1 年退出期的 $22K，涨到第 3 年第 4 季度的 $42K，团队 ACV 和地块费用共同叠加。
    - 毛利率从第 2 年初期的 50% 出头，随着 北弗吉尼亚 和 得州 工作流标准化，提升到第 3 年第 4 季度的 70% 出头。
  upside:
    description: 投委会信任建立得更快，每个放贷方团队挂载更多地块，可复用模板让毛利率比计划更早抬升。
    y3RevenueK: 6945.0
    y3EbitdaK: 1360.5
    cashLowPointK: 839.1
    keyAssumptionChanges:
    - 第 3 年第 4 季度付费团队数达到 17 个，超过 15 个。
    - 退出期混合月收入（每团队）达到约 $44K，因为监控和第二区域扩展更早挂载。
    - 毛利率在第 3 年达到约 72%，因为数据覆盖和备忘录模板变得更可复用。
sensitivity:
- variable: ARPU
  downsideCase: 退出期混合月收入（每团队）停滞在约 $38K。
  baseCase: 退出期混合月收入（每团队）达到 $42K。
  upsideCase: 退出期混合月收入（每团队）在更强的监控挂载下达到约 $44K。
  y3RevenueImpactK: -560.0
  cashImpactK: -430.0
- variable: CAC
  downsideCase: 若创始人主导的外呼和合作伙伴转化的在跑交易试点更少，CAC 会升向 $220K。
  baseCase: 按第 2-3 年新增 11 个团队计算，CAC 保持在约 $164K。
  upsideCase: 若顾问和数据合作伙伴带来更多管线，CAC 会降到约 $140K。
  y3RevenueImpactK: -180.0
  cashImpactK: -360.0
- variable: 流失率
  downsideCase: 若买方仍按项目制使用产品，月流失率会升到 3.0%。
  baseCase: 一旦团队采用监控服务和重复备忘录模板，月流失率维持在 2.0%。
  upsideCase: 随着工作流嵌入放贷方审批环节，月流失率会降向 1.0%。
  y3RevenueImpactK: -210.0
  cashImpactK: -170.0
- variable: 销售周期
  downsideCase: 试点转年度合同的周期拉长到约 180 天。
  baseCase: 试点转年度合同的周期保持在约 120 天。
  upsideCase: 可引用的试点案例把转化周期压缩到约 90 天。
  y3RevenueImpactK: -690.0
  cashImpactK: -520.0
- variable: 毛利率
  downsideCase: 因为 得州 覆盖仍然高度依赖分析师，毛利率退出期约 68%。
  baseCase: 第 3 年平均毛利率达到 69.2%，退出期约 71%。
  upsideCase: 随着数据规范化和复核模板更快标准化，毛利率退出期超过 72%。
  y3RevenueImpactK: 0.0
  cashImpactK: -300.0
- variable: 招聘节奏
  downsideCase: 在客户验证完全可复用之前，就提前招了两个支持岗位。
  baseCase: 招聘按商业计划书的节奏推进，第 2 年的搭建先于更广泛的 GTM 扩张。
  upsideCase: 一个第 3 年的支持岗位可以推迟到第 2 季度证明达成之后，也不影响交付。
  y3RevenueImpactK: 60.0
  cashImpactK: -220.0
modelDiagram:
  title: 单位经济模型流程
  mermaid: |
    flowchart LR
      TargetFunds[目标基金] --> PaidTeams[付费信贷团队]
      PaidTeams --> SiteAttach[每团队已承销与受监控地块]
      SiteAttach --> Revenue[混合订阅与单地块收入]
      Revenue --> GrossProfit[毛利]
      GrossProfit --> Cash[现金与现金跑道]
modelSanity:
- checkName: 收入引擎
  finding: 基础情形的收入来自付费信贷团队数从第 1 年退出期的 4 个，增长到第 3 年第 4 季度的 15 个，随着地块费和监控费叠加，每团队已实现年收入攀升到约 $459K。
- checkName: 必须做对的事
  finding: 北弗吉尼亚 和 得州 的覆盖加上投委会信任必须变得足够可复用，才能让 15 名全职员工支撑 15 个团队和约 50 个地块，同时不把毛利率拖回 60% 出头以下。
- checkName: 模型崩溃的条件
  finding: 如果试点转化放缓，退出期混合月收入（每团队）停在约 $38K 附近，下行情形会在第 3 年下半年之前转为现金为负，需要一轮过桥融资。
- checkName: 下一轮融资的验证点
  finding: 种子轮就绪的验证点是第 24 个月前拿下 9 个付费团队、10 个受监控地块，以及一套投委会认可、可复用的备忘录工作流，能把公司带到第 3 年上半年接近盈亏平衡。
sanityChecks:
  ruleOf40: 第 3 年增长率 177.6% + EBITDA 利润率 6.2% = 183.8%
  burnMultiple: 第 2 年的烧钱倍数约为 0.5 倍，用约 $1.2M 的 EBITDA 烧钱对比约 $2.4M 的净新增 ARR；这个数字之所以好看，是因为一旦试点转化，混合的团队加地块合同能很快按年化计算。
  revenuePerFte: 第 3 年末以 15 名全职员工计算，人均收入 $374.5K（对标 SaaS 基准 $200-400K）
  flags:
  - customersEop 统计的是付费放贷方团队数，所以第 3 年收入里有相当一部分仍取决于单地块费用和每团队的受监控地块数量。
  - 第 2 年的招聘提速是刻意为之，前提是 得州 覆盖和监控要先于大规模销售扩张搭建完成；如果定制分析师工作量持续高于商业计划书的目标，即便这份计划也会显得太紧。
  - 如果投委会接受度或混合试点转年度合同的进度滞后约一到两个季度，下行情形就需要在第 3 年下半年之前追加融资。
  - 现金是按 EBITDA 建模的，没有考虑回款时点、预付数据授权费，或任何资本化的软件支出。
