jobsToBeDone:
  - job: >-
      When a powered-land bridge loan reaches investment committee, help the underwriting lead validate fatal site risks quickly, so the fund can issue a term sheet before exclusivity expires.
    currentAlternative: Consultant reports, sponsor diligence binders, and analyst-built spreadsheet memos
    successMetric: Days from data room access to investment committee-ready memo
  - job: >-
      When a preconstruction facility is approved, help the portfolio team detect drift in power, zoning, or design assumptions, so drawdowns can be gated before losses compound.
    currentAlternative: Periodic consultant updates and manual covenant tracking
    successMetric: Time to identify assumption drift before the next draw or covenant waiver
