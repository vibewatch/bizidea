topRisks:
  - name: Trust barrier
    description: >-
      Credit committees may resist relying on AI-generated conclusions for multimillion-dollar infrastructure loans.
    mitigation: >-
      Start as an analyst co-pilot with every conclusion linked to source evidence and optional human review, then expand autonomy only after proving faster approvals without surprise misses.
  - name: Data coverage holes
    description: >-
      Utility, municipal, and environmental data can be fragmented in secondary markets, leaving blind spots in the underwriting graph.
    mitigation: >-
      Launch in a narrow geography and asset profile with repeatable data coverage, and explicitly flag unsupported assumptions instead of pretending to have full certainty.
  - name: Incumbent bundling
    description: >-
      Engineering consultants, appraisal firms, or sponsor-side diligence tools could add basic memo automation once the wedge becomes visible.
    mitigation: >-
      Own the lender-side benchmark dataset and continuous post-approval monitoring workflow that incumbents do not capture in one auditable system.
