jobsToBeDone:
- job: >-
    当一笔已通电土地过桥贷款进入投委会审议时，帮承销负责人快速核实地块的致命风险，好让基金能在排他期到期前发出投资条款清单。
  currentAlternative: 顾问报告、赞助方尽调材料夹，以及分析师手搭的 Excel 备忘录
  successMetric: 从拿到数据室到产出投委会可用备忘录所需的天数
- job: >-
    当一笔施工前设施获批后，帮组合团队发现电力、分区规划或设计假设的偏移，让放款能在损失累积前被卡住。
  currentAlternative: 顾问定期更新和人工契约条款跟踪
  successMetric: 在下一次放款或契约豁免前发现假设偏移所需的时间
ideaScorecard:
  signalStrength:
    score: 4
    rationale: >-
      这一簇包含三个已核实来源、具体的工作流细节、跨 100 个项目的牵引力，以及一个具名的超大规模云服务商客户，不过信号仍集中在一家公司和一次融资事件上。
  painIntensity:
    score: 5
    rationale: >-
      一次缓慢或错误的尽调判断，可能让放贷方彻底丢掉一个地块机会，或让数千万美元困在错误的电力、审批或用水假设背后。
  wedgeClarity:
    score: 5
    rationale: >-
      第一款产品定位窄且具体：为数据中心贷款自动生成放贷方级信贷备忘录，并标红已通电土地风险。
  defensibility:
    score: 4
    rationale: >-
      重复的交易工作流能沉淀出一套专属基准，把早期尽调信号和基础设施金融领域的审批、延误、交割后意外绑定起来。
  ventureScale:
    score: 5
    rationale: >-
      数据中心承销只是一个聚焦的切入点，背后是横跨基础设施信贷、保险和全生命周期风险监控、覆盖多个资产类别的更大机会。
topRisks:
- name: 信任门槛
  description: >-
    信贷委员会可能不愿意在数百万美元级的基础设施贷款上，依赖 AI 生成的结论。
  mitigation: >-
    先以分析师副驾驶的角色切入，每个结论都挂上来源证据并可选人工复核，等证明能在不漏判的前提下加快审批后，再逐步扩大自主权。
- name: 数据覆盖缺口
  description: >-
    公用事业、市政和环境数据在二级市场可能非常分散，给承销图谱留下盲区。
  mitigation: >-
    先在数据覆盖可重复的窄地域和资产画像上线，对无支撑的假设明确标红，而不是假装已经完全掌握确定性。
- name: 现有厂商捆绑
  description: >-
    一旦这个切口被看到，工程顾问、评估公司或赞助方侧尽调工具都可能加上基础的备忘录自动化功能。
  mitigation: >-
    把放贷方侧的基准数据集和持续的批复后监控工作流做成一套可审计系统，这是现有厂商难以复制的东西。
