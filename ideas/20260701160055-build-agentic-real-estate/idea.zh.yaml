problem: >-
  私募信贷基金和基础设施投资者要在很短的排他期内，为数据中心项目批复已通电土地贷款、过桥贷款和施工前贷款，但他们的承销判断仍然依赖赞助方数据室、顾问、公用事业公司回访以及分析师手写的备忘录。团队要么动作太慢丢掉地块，要么抢快批复却背上事后才暴露的电力、用水、分区规划或审批风险。当赞助方把尽调时间从几个月压到几天，资本这一侧就变成了新的瓶颈——错误假设能在这里直接摧毁回报。
targetUser:
  primary: >-
    基础设施私募信贷基金的承销负责人或投资总监，负责审批 10-80MW 数据中心园区的 $15M-$100M 土地、过桥或施工前贷款
  secondary: >-
    区域数据中心开发商的资本市场和开发业务负责人，需要为已通电土地收购准备放贷方级尽调材料
  buyer: >-
    基础设施私募信贷基金的合伙人或承销负责人
startupThesis:
  nonObviousInsight: >-
    稀缺的已经不是原始的选址数据，而是放贷方对机器压缩后的尽调结论的信任。一旦赞助方能大幅加速筛选地块，真正占优势的创业公司，就是那个能把混乱的基础设施事实转成一份投委会真的敢签字的可审计承销意见的公司。
  beachhead: >-
    北美和欧洲为二级市场数据中心开发商承销 1 亿美元以下已通电土地和施工前贷款的私募信贷基金，这些开发商正在争抢有公用事业接入的地块
  wedge: >-
    一套已通电土地承销引擎：接入赞助方数据室加基础设施数据集，标红致命问题，自动生成带证据链的 IC 备忘录
  whyNowCatalyst: >-
    Build 把尽调时间压缩 95%、拿下第一个超大规模云服务商客户，并已在跨国 100 个项目上落地，说明项目推进速度正在跑赢放贷方承销工作流的消化能力。
  ventureScalePath: >-
    先在放贷方侧的数据中心承销上赢下来，再把同一套尽调和监控层扩展到物流园区、储能、变电站、半导体地块，以及面向基础设施放贷方和保险公司的组合监控业务。
solution: >-
  这个产品是放贷方侧的实体基础设施承销控制层。它把赞助方材料、公用事业和地块数据、环境与分区规划记录、输电和用水约束，以及早期设计假设，全部拉进一张统一的交易图谱，再为信贷委员会和投委会生成一份风险标红视图。信贷分析师不用再等好几周才拿到顾问拼凑的材料包，而是直接拿到 IC 备忘录草稿、缺失数据清单，以及一份显示哪些假设会拖垮放贷案的情景分析。投资条款清单发出后，系统会持续监控审批、电力和设计的偏移情况，让放贷方能在问题累积之前就卡住放款和契约条款更新。随着时间推移，平台会学会哪些早期尽调信号能预测延误、超支或交易流产，从而在被融资的地块之间建起一套专属的基础设施风险基准。
goToMarketSeed:
  firstCustomer: >-
    北美基础设施私募信贷基金的承销负责人，专门为二级市场数据中心开发商的 1 亿美元以下已通电土地和施工前贷款做融资
  buyingTrigger: >-
    赞助方要求在两周排他期内拿到投资条款清单，但信贷团队在投委会开会前，无法独立核实电力、用水、分区规划和审批假设。
  currentAlternative: >-
    赞助方准备的数据室、第三方工程顾问、土地用途律师、公用事业公司对接，以及用 Excel 拼出来的信贷备忘录
  switchingReason: >-
    相比等分散的顾问或直接相信赞助方说辞，这个产品能在几天内给放贷方一份独立、可重复的尽调意见，同时保留一条经得起投委会审批的可审计证据链。
  pricingHypothesis: >-
    按信贷团队收取年度平台费，外加按地块数量或承诺放款金额定价的单笔承销和监控费。
whyNow:
- point: >-
    尽调时间压缩 95%，让速度成了任何想抢下稀缺已通电土地机会的人的硬性竞争门槛。
  signalRefs: ["尽调速度已经是抢单武器"]
  sourceRefs: [1]
- point: >-
    跨 15 个国家的 100 多个项目加上第一个超大规模云服务商客户，说明关键基础设施选址的规模和紧迫性，正在超出定制化放贷方审查流程的承载能力。
  signalRefs: ["超大规模云服务商的需求正把基础设施工作流往前拉"]
  sourceRefs: [1]
- point: >-
    一旦选址、电力评估和早期设计都变成结构化的机器活，放贷方就可以直接买一套专用承销层，而不是只靠顾问拼出来的材料包。
  signalRefs: ["选址尽调正变成结构化的机器活"]
  sourceRefs: [2]
- point: >-
    品类投资人已经在释放信号：能交付真实基础设施工作成果的 AI 是可投、可信的，这会降低买家对一款以产出为导向的承销工具的抵触。
  signalRefs: ["资本正在为能交付基础设施实际成果的 AI 买单"]
  sourceRefs: [1, 2, 3]
differentiator: >-
  开发者工具优化的是赞助方速度，顾问公司卖的是定制化研究报告，通用 AI 文档工具只是把数据室内容摘要一下。这家公司是为资本这一侧的桌子而生：它把地块事实转成承销意见、证据链，以及持续的契约条款监控。它的护城河来自把早期尽调信号和大量基础设施交易的真实融资结果绑定起来——这是赞助方软件和单点顾问天然抓不住的东西。
