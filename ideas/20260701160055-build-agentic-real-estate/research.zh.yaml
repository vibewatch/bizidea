competitors:
- name: Build
  stage: 成长期公司
  wedge: 以 AI 为原生的运营伙伴，面向机构地产和基础设施，把选址、尽调、承销和 IC 备忘录生成自动化。
  pricing: 固定结果交付定价；提前按产出报价，不按小时计费。
  strength: 已有一手牵引力、流程覆盖广、输出可审计，而且拿出了真实的数据中心客户验证。
  weaknessVsUs: 仍然更偏赞助方和开发商提速，而不是放贷方独立性、契约条款闸门或组合层面的信用记忆。
  sourceRefs:
  - 1
  - 2
  - 3
  - 8
- name: Paces
  stage: 成长期公司
  wedge: 以电力为先的选址搜索、电网分析、模块化尽调报告和并网支持，服务数据中心与能源开发商。
  pricing: 定制企业定价；主卖模块化报告和潮流分析报告，没有公开价目表。
  strength: “先拿电力路径”的话术很强，且电网/审批工作流更快，有专家复核。
  weaknessVsUs: 目标仍是推进开发商的项目管线，不是产出放贷方级别的信用备忘录或投后巡检逻辑。
  sourceRefs:
  - 17
  - 18
  - 19
- name: LandGate
  stage: 成长期公司
  wedge: 提供购电、光纤、水、环境和地块情报，并配套尽调报告及面向资本市场的定位，服务放贷方。
  pricing: 按项目演示商定的定制价格；卖数据订阅和尽调报告，没有公开企业定价。
  strength: 基础设施数据集很丰富，且明确面向放贷方/保险方讲承销与风险评估。
  weaknessVsUs: 更像数据加报告层，而不是完整的投委会级意见和持续性的贷后监控系统。
  sourceRefs:
  - 20
  - 21
  - 23
- name: Acres
  stage: 成长期公司
  wedge: 横向覆盖地块、成交、抵押和抵押物情报，内置放贷工作流，并提供公开自助定价。
  pricing: Acres Pro 年付 $94.99/月；Enterprise 定制。
  strength: 价格门槛低、土地放贷 workflow 强，地块/成交上下文也够宽。
  weaknessVsUs: 和专门做已通电土地信用产品相比，它在电力、公用事业和数据中心专属承销逻辑上偏弱。
  sourceRefs:
  - 24
  - 25
- name: Colliers Data Centers
  stage: 现有厂商
  wedge: 围绕数据中心地产与融资，提供顾问、资本市场、债务和估值服务。
  pricing: 按项目收顾问费和融资费；无公开定价。
  strength: 品牌信任强、融资关系深，交易全生命周期都有服务面。
  weaknessVsUs: 重服务交付天然不容易沉淀成放贷方自己拥有的证据图谱或监控引擎。
  sourceRefs:
  - 26
  - 15
regulatoryTechnicalConstraints:
- point: 核心电力市场的大负荷申请和并网流程正在正式化，公用事业流程合规已经成为承销的一部分，不再是事后补课。
  sourceRefs:
  - 29
  - 30
- point: 县级分区规划调整和既有权利豁免规则，可能改写一个站点是否还能继续推进，或者是否必须重新走一遍自由裁量审批。
  sourceRefs:
  - 28
- point: 洪水、湿地、污染和用水的环境筛查，如今已经是可融资数据中心站点的核心前期尽调流。
  sourceRefs:
  - 9
  - 35
  - 32
- point: 项目融资结构仍然要求赞助方支持、契约条款包、里程碑测试和放款控制，而这些都依赖高置信度的尽调输入。
  sourceRefs:
  - 10
  - 11
  - 31
