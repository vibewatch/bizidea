reportMemo:
  executiveTakeaways:
  - 这不是泛地产科技。数据中心开发已经变成一个被电力、政策和资本同时卡住的承销问题；截至 2025 年 H2，电力可得性仍是行业头号难题，一级市场空置率只有 1.4% [14][15][16]。
  - 资本侧仍有空白。Build 和 Paces 已经把赞助方尽调大幅提速，但它们的产品更偏向找地和推项目，而不是给放贷方一份独立的信用判断和放款控制层 [1][3][17][18][19][21]。
  - 付费意愿站得住脚，因为买方今天就为这类工作掏钱。Index 提到，一份数据中心桌面尽调 PDF 要花 6 周、收费 $25,000；Build 和 Paces 则主打 10x 提速或 5 天交付 [1][3][8][18]。
  - 私募信贷正变成这一轮建设的核心推手，这只会抬高“更快、可审计的承销”价值，不会把它压低 [10][11][12][13]。
  - 真正难的不是模型够不够多，而是信任和上游系统太碎。公用事业流程、县级分区规划调整、环境筛查，最后都得被拼进一条站得住脚的决策证据链 [7][9][28][29][30][35]。
  marketDefinition: 明确市场定义：面向放贷方的工作流软件与结果交付服务，把赞助方材料、地块/电力/光纤/水数据，以及监管记录，转成可直接进 IC 的数据中心与已通电土地融资承销证据；它夹在原始选址情报工具和完整项目融资执行之间 [1][4][5][9][10][21][23][24]。
  customerAndBuyer: 日常用户是基础设施私募信贷、项目融资或数字基础设施债务团队里的承销负责人、投资总监和信贷分析师。真正拍板的经济买方通常是合伙人、CIO 或信贷负责人，因为赞助方支持、放款机制、公用事业风险和权益审批假设，都会直接影响下行保护和投委会签字 [10][11][12][31]。
  buyingTriggers:
  - point: 赞助方要在很短的排他期里先拿到投资条款清单，但电力交付、分区规划或致命缺陷尽调还来不及由放贷方独立核实。
    sourceRefs:
    - 15
    - 16
    - 17
    - 21
  - point: 进入建设贷、过桥贷或项目融资流程后，放贷方必须在交割前把赞助方支持、放款条件以及公用事业/审批风险正式写实。
    sourceRefs:
    - 10
    - 11
    - 31
  - point: 一旦基金进入新区域或新电网市场，可复用的公用事业、分区规划和环境证据包，价值会立刻高过临时拼顾问。
    sourceRefs:
    - 22
    - 28
    - 29
    - 30
  willingnessToPay:
    summary: 预算本来就存在于顾问主导的尽调、赞助方材料包装和项目融资流程里。Index 提到，一份数据中心桌面尽调 PDF 单价就有 $25,000，周期 6 周；Build 用固定前置定价卖结果，Paces 则主打 5 天交付、且有专家复核的报告和潮流分析报告。真正的门槛，是先证明自己能提供独立承销价值，而不是发明一条新预算科目。
    sourceRefs:
    - 1
    - 8
    - 18
    - 21
    - 25
  competitiveLandscape: 竞争最激烈的，其实在相邻流程，不在放贷方原生的已通电土地承销。Build 和 Paces 优化的是赞助方提速与项目推进，LandGate 和 Acres 卖的是数据/报告层，Colliers 一类顾问靠重服务尽调赚钱。市场真正缺的，仍是一套以信用备忘录为起点、且能让放贷方不继承赞助方偏见或顾问排期的中立系统 [1][17][20][21][24][26]。
  incumbentThesis:
  - incumbentClass: 赞助方开发操作系统厂商
    point: Build 和 Paces 离工作流最近，但它们的优化目标是帮开发商找地、验地、推项目，不是给放贷方一套独立风险判断和投后监控纪律。
    sourceRefs:
    - 1
    - 3
    - 17
    - 18
    - 19
  - incumbentClass: 电力与地块情报平台
    point: LandGate 和 Acres 能把地块、电力、光纤和放贷数据摆出来，但还没把这些数据进一步合成为放贷方可直接拿去投委会的承销叙事与风险缓释方案。
    sourceRefs:
    - 20
    - 21
    - 23
    - 24
    - 25
  - incumbentClass: 咨询、法律与工程机构
    point: Colliers、BDO 和专项律师本来就能拿到高信任度委托，但这类工作仍然一单一做、重人力，也很难沉淀成可复用的风险图谱。
    sourceRefs:
    - 26
    - 9
    - 27
    - 10
    - 31
  - incumbentClass: 内部分析师加专项顾问
    point: 默认替代方案仍是赞助方数据室、Excel 和串行展开的专项报告；人判断保住了，但速度慢、成本高，也很难在不同项目之间保持一致的可审计性。
    sourceRefs:
    - 8
    - 34
    - 36
    - 32
  regulatoryLandscape: 已通电土地贷款没有一套全国统一的许可包。真正的风险落在本地分区规划和既有权利豁免相关的裁定、公用事业大负荷接入流程、环境筛查，以及把建设风险桥接到稳定运营阶段的项目融资契约条款上。到了欧洲，这一套流程还要额外背上更强的 ESG、能效和电价对冲要求 [9][10][27][28][29][30][35]。
  technologyLandscape: 使能栈其实已经齐了：Build 自动化承销、IC 备忘录和尽调；Paces 卖潮流分析和关键问题报告；LandGate 做购电、光纤和水资源图谱；Acres 提供地块、成交和抵押上下文。缺的不是搜索更快或赞助方执行更顺，而是一套中立的放贷方工作流：把这些输入变成可批复的意见和投后巡检 [1][4][5][7][17][18][19][20][21][23][24]。
  distributionChannels:
  - point: 创始人亲自卖给数字基础设施债务、项目融资和私募信贷团队，是最清晰的切口，因为这些买方已经同时感受到融资缺口和抢电速度的压力。
    sourceRefs:
    - 11
    - 12
    - 13
    - 16
  - point: 律所、工程顾问和专项尽调服务商，都是天然渠道伙伴，因为它们本来就坐在审批流程里，既能联合交付，也能帮忙背书。
    sourceRefs:
    - 9
