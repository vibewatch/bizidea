    rationale: 估算方法：到第 3 年拿下 15 个付费信贷团队 × $250k（$3.75M），再加上 50 个已融资或受监控站点 × $75k（$3.75M）；只要公司能成为少数活跃放贷方的重复供应商，这个目标可达。
    isEstimate: true
    sourceRefs:
    - 1
    - 3
    - 17
bottomUpSizingDrivers:
- driver: 外部融资需求代理指标
  value: 到 2028 年融资缺口 $1.5T；私募信贷机会约 $800B
  source: "[12][13]"
- driver: 滩头市场买方团队
  value: 140 个北美/欧洲数据中心信贷或开发资本团队
  source: 估算
- driver: 平均年度平台费
  value: 每团队 $250k
  source: 计算
- driver: 平均年度单项目费用
  value: 每个承销或监控站点 $75k
  source: 计算
categoryDynamics:
  growthRate: 2025 年一级市场供应同比增长 36%，年末空置率只有 1.4%，且 2025 年 H1 容量里已有 74.3% 被预租。
