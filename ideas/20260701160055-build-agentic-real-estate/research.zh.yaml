  validationPlan:
  - priority: 高
    question: 一个目标团队一年到底会做多少单低于 $100M 的已通电土地或施工前信贷决策？其中又有多大比例已经要求第三方尽调？
    evidenceToGather: 访谈 10 个承销团队，收集过去 12 个月的选址、过桥贷和施工前审查案例，拉齐周期、顾问支出和审批结果。
  - priority: 高
    question: IC 主席愿意给 AI 辅助备忘录签字前，最低需要多深的引用密度和怎样的人审政策？
    evidenceToGather: 在 5–10 个真实项目上跑仅辅助型试点，记录哪些红旗、来源和置信度会触发人工升级。
  - priority: 中
    question: 在 北弗吉尼亚 和 得州，公用事业、分区规划和环境证据，能否被稳定标准化到足以避免重服务定制？
    evidenceToGather: 回测两个地区最近 20 个站点，按工作流对比来源覆盖率、误报率和缺失数据率。
  - priority: 中
    question: 哪种商业模式最容易先落地：年度信贷团队订阅、按项目备忘录收费，还是混合式监控合同？
    evidenceToGather: 在共创客户讨论里测试 3 种打包方式，对比在全组合推广前，客户愿不愿先签。
