slug: powered-land-credit-os
date: '2026-07-01'
currency: USD
modelStartMonth: 2026-08
assumptions:
- id: A1
  name: Model start month
  value: 2026-08
  unit: YYYY-MM
  source: '[BP date 2026-07-01] the financial model starts in the first full month after the dated business plan.'
- id: A2
  name: Opening cash / pre-seed raise
  value: $3.0M
  unit: USD
  source: '[BP fundingAsk targetFundingRangeUsd $3-4M + BP milestones 12-24 months + model cash curve] the base case uses the low end of the stated range because hybrid revenue starts before the full team is hired.'
- id: A3
  name: Starting paying credit teams
  value: '0'
  unit: count
  source: '[BP milestones 0-12 months + BP investorMemo.firstCustomer] the company begins pre-revenue and must first convert design partners into paid pilots.'
- id: A4
  name: Customer definition
  value: One paying lender underwriting team under either a paid pilot or annual contract
  unit: definition
  source: '[BP businessModel.unitOfValue + BP gtm.pricing] customersEop counts paying credit teams, not individual sites.'
- id: A5
  name: Early pilot revenue realization
  value: $18K per active team in M9 rising to $22K in M12
  unit: USD/team/month
  source: '[BP investorMemo.firstCustomer.initialContract $100k-$150k pilot plus $25k-$50k per live deal] first paid pilots land late in Y1 and are recognized as blended monthly revenue while the workflow is still assist-only.'
- id: A6
  name: Exit blended annual revenue per team
  value: $504K annualized in Q4Y3
  unit: USD/team/year
  source: '[BP gtm.pricing modeled ~$250k team ACV + Research market.som 15 teams plus 50 sites = $7.5M] Q4Y3 monthly revenue per team reaches about $42K once monitoring and per-site fees attach.'
- id: A7
  name: Net paying-team ramp
  value: 1 team by M9, 4 by M12, 5 by M18, 9 by M24, and 15 by M36
  unit: customersEop
  source: '[BP milestones month 9 first paid pilot, month 18 five paying credit teams, and month 36 fifteen paying teams] the customer ramp is anchored to the stated milestone proof points.'
- id: A8
  name: Site attachment ramp per paying team
  value: About 0.6 sites per team in first pilots, 1.5 by Q4Y2, and 3.4 by Q4Y3
  unit: sites/team
  source: '[Research market.som 50 financed or monitored sites with 15 teams + BP businessModel.revenueStreams] blended ARPU increases as more underwritten and monitored sites attach to each lender team.'
- id: A9
  name: Revenue recognition convention
  value: Period-end paying teams multiplied by the blended realized monthly revenue per team for that period
  unit: formula
  source: '[BP gtm.pricing + BP businessModel.unitOfValue] this keeps revenue directly reconcilable to customersEop times ARPU.'
- id: A10
  name: Gross margin ramp
  value: 40-50% in Y1, 55-64% in Y2, and 66-71% in Y3
  unit: gross margin percent
  source: '[BP businessModel.targetGrossMarginPct 70 + BP operatingAssumptions custom analyst work below 20%] gross margin stays below target during data coverage build-out and only reaches the low 70s late in Y3.'
- id: A11
  name: Hiring timeline
  value: M1 founder CEO and founding engineer; M2 second data/integrations engineer; M4 underwriting product lead; M7 implementation lead; M10 partnerships lead; M14 data ops analyst; M16 second GTM hire; M18 Texas engineer; M20 second underwriting lead; M22 second implementation hire; M24 fourth engineer; M28 second data ops / G&A hire; M30 third implementation hire; M33 fifth engineer
  unit: timeline
  source: '[BP team + BP strategicChoices.sequencingRationale + startup-finance heuristic] the model adds engineering, underwriting, and implementation capacity ahead of a broad sales bench because committee trust and coverage repeatability are the gating constraints.'
- id: A12
  name: Founder loaded compensation
  value: $165K
  unit: USD/year
  source: '[BP team Founding CEO and underwriting seller + startup-finance heuristic] lean founder cash pay with payroll taxes and benefits.'
- id: A13
  name: Engineering loaded compensation
  value: $210K
  unit: USD/FTE/year
  source: '[BP team Founding eng and geospatial/data integrations engineer + startup-finance heuristic] reflects senior workflow, geospatial, and data-integrations talent for Northern Virginia and Texas.'
- id: A14
  name: Underwriting / product loaded compensation
  value: $200K
  unit: USD/FTE/year
  source: '[BP team infrastructure underwriting product lead + startup-finance heuristic] assumes a senior operator who can encode lender memo templates and exception rules.'
- id: A15
  name: Implementation / monitoring loaded compensation
  value: $165K
  unit: USD/FTE/year
  source: '[BP team customer implementation and monitoring lead + startup-finance heuristic] reflects customer delivery talent without building a large services bench.'
- id: A16
  name: Sales / partnerships loaded compensation
  value: $180K
  unit: USD/FTE/year
  source: '[BP gtm.channels + BP team partnerships and data operations manager + startup-finance heuristic] includes enterprise selling, partner management, and travel-heavy field work.'
- id: A17
  name: G&A / data ops loaded compensation
  value: $130K
  unit: USD/FTE/year
  source: '[BP operations + startup-finance heuristic] covers finance, vendor management, and data-operations support in a lean pre-seed organization.'
- id: A18
  name: Payroll allocation to P&L lines
  value: Founder 65% S&M / 35% G&A; implementation 50% S&M / 50% R&D; engineering and underwriting 100% R&D; sales 100% S&M; G&A/data ops 40% R&D / 60% G&A
  unit: allocation
  source: '[BP team role rationales + BP operations] payroll is mapped into the functional lines used in the operating model.'
- id: A19
  name: Non-payroll opex ramp
  value: Non-payroll spend rises from $32K per month in early Y1 to $95K per month by Q4Y3
  unit: USD/month
  source: '[BP operations + startup-finance heuristic] covers data licenses, cloud, travel, insurance, legal, and workflow tooling as the company expands from Northern Virginia into Texas.'
- id: A20
  name: Cash conversion convention
  value: Cash movement equals EBITDA
  unit: formula
  source: '[startup-finance heuristic] capex, taxes, debt service, and working-capital timing are assumed immaterial relative to the operating burn at this stage.'
- id: A21
  name: Monthly churn
  value: 2.0%
  unit: percent per month
  source: '[startup-finance heuristic for early enterprise workflow software] lender approval workflows should be sticky after adoption, but the model stays more conservative than mature vertical SaaS.'
- id: A22
  name: CAC convention
  value: Y2-Y3 S&M spend divided by 11 net new paying teams
  unit: formula
  source: '[model calc using Y2-Y3 S&M spend + BP gtm.funnelTargets] CAC is measured after the first pilot year when the business begins adding repeatable paying teams.'
- id: A23
  name: Next-round milestone for funding sizing
  value: 9 paying teams by M24, Texas live, 10 monitored sites, and first expansion contract while still carrying six months of buffer into H1Y3
  unit: milestone
  source: '[BP milestones 12-24 months + BP fundingAsk.runwayMonths 18 + model cash curve] the round is sized to reach the first expansion proof point and still retain buffer before the base case turns near breakeven.'
