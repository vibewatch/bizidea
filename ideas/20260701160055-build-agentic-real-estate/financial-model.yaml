scenarios:
  downside:
    description: Pilot conversion lags, monitored-site attachment stays lighter, and Texas data coverage remains more manual than planned.
    y3RevenueK: 4536.0
    y3EbitdaK: -519.3
    cashLowPointK: -335.5
    keyAssumptionChanges:
    - Q4Y3 paying teams reach 13 instead of 15.
    - Exit blended monthly revenue per team stops near $38K instead of $42K because fewer site and monitoring fees attach.
    - Gross margin exits near 68% instead of 71% as custom coverage work persists.
  base:
    description: Hybrid pricing converts pilots into annual team contracts and per-site fees expand as monitoring is turned on inside existing lender accounts.
    y3RevenueK: 5618.0
    y3EbitdaK: 348.5
    cashLowPointK: 371.9
    keyAssumptionChanges:
    - Net paying teams move from 4 at M12 to 9 at M24 and 15 at M36.
    - Blended monthly revenue per team rises from $22K at Y1 exit to $42K by Q4Y3 as team ACV and site fees stack together.
    - Gross margin improves from mid-50s in early Y2 to low-70s by Q4Y3 as Northern Virginia and Texas workflows standardize.
  upside:
    description: Committee trust forms faster, more sites attach per lender team, and repeatable templates pull margin up sooner than planned.
    y3RevenueK: 6945.0
    y3EbitdaK: 1360.5
    cashLowPointK: 839.1
    keyAssumptionChanges:
    - Q4Y3 paying teams reach 17 instead of 15.
    - Exit blended monthly revenue per team reaches about $44K because monitoring and second-region expansion attach earlier.
    - Gross margin reaches roughly 72% in Y3 as data coverage and memo templates become more repeatable.
sensitivity:
- variable: ARPU
  downsideCase: Exit blended monthly revenue per team stalls around $38K.
  baseCase: Exit blended monthly revenue per team reaches $42K.
  upsideCase: Exit blended monthly revenue per team reaches about $44K with stronger monitoring attach.
  y3RevenueImpactK: -560.0
  cashImpactK: -430.0
- variable: CAC
  downsideCase: CAC rises toward $220K if founder-led outbound and partners convert fewer live-deal pilots.
  baseCase: CAC stays near $164K on 11 net new teams in Y2-Y3.
  upsideCase: CAC falls toward $140K if consultants and data partners source more of the pipeline.
  y3RevenueImpactK: -180.0
  cashImpactK: -360.0
- variable: churn
  downsideCase: Monthly churn rises to 3.0% if buyers keep the product on a project basis.
  baseCase: Monthly churn holds at 2.0% once teams adopt monitoring and repeat memo templates.
  upsideCase: Monthly churn falls toward 1.0% as the workflow becomes embedded in lender approvals.
  y3RevenueImpactK: -210.0
  cashImpactK: -170.0
- variable: sales cycle
  downsideCase: Pilot-to-annual conversion stretches toward 180 days.
  baseCase: Pilot-to-annual conversion stays near 120 days.
  upsideCase: Referenceable pilots compress conversion toward 90 days.
  y3RevenueImpactK: -690.0
  cashImpactK: -520.0
- variable: gross margin
  downsideCase: Gross margin exits near 68% because Texas coverage stays analyst-heavy.
  baseCase: Y3 average gross margin reaches 69.2% and exits near 71%.
  upsideCase: Gross margin exits above 72% as data normalization and review templates standardize faster.
  y3RevenueImpactK: 0.0
  cashImpactK: -300.0
- variable: hiring pace
  downsideCase: Two support hires are pulled forward before customer proof is fully repeatable.
  baseCase: Hiring follows the BP sequencing and the Y2 build-out happens before broader GTM scale.
  upsideCase: One Y3 support hire can wait until after Q2Y3 proof without hurting delivery.
  y3RevenueImpactK: 60.0
  cashImpactK: -220.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      TargetFunds[Target funds] --> PaidTeams[Paying credit teams]
      PaidTeams --> SiteAttach[Underwritten and monitored sites per team]
      SiteAttach --> Revenue[Hybrid subscription and per-site revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash and runway]
modelSanity:
- checkName: Revenue engine
  finding: Base revenue comes from growing paying credit teams from 4 at Y1 exit to 15 by Q4Y3 while realized annual revenue per team climbs toward roughly $459K as site and monitoring fees attach.
- checkName: Must go right
  finding: Northern Virginia and Texas coverage plus committee trust must become repeatable enough that 15 FTE can support 15 teams and about 50 sites without dragging gross margin back below the high 60s.
- checkName: Model breaks if
  finding: If pilot conversion slips and exit blended revenue per team stays closer to $38K per month, the downside case goes cash-negative before H2Y3 and needs a bridge round.
- checkName: Next-round proof
  finding: The seed-ready proof point is 9 paying teams by Month 24, 10 monitored sites, and a reusable committee-accepted memo workflow that carries the company to near-breakeven in H1Y3.
sanityChecks:
  ruleOf40: Y3 growth 177.6% + EBITDA margin 6.2% = 183.8%
  burnMultiple: Y2 burn multiple is about 0.5x using roughly $1.2M of EBITDA burn against about $2.4M of net new ARR; the figure looks good because hybrid team-plus-site contracts annualize quickly once pilots convert.
  revenuePerFte: $374.5K Y3 on 15 ending FTE (benchmark $200-400K SaaS)
  flags:
  - customersEop counts paying lender teams, so a meaningful share of Y3 revenue still depends on per-site fees and monitored-site volume per team.
  - The Y2 hiring step-up is deliberate and assumes Texas coverage plus monitoring are built before broad sales scale; if custom analyst work stays above the BP target, even this plan will look too lean.
  - The downside case requires additional capital before H2Y3 if committee acceptance or hybrid pilot-to-annual conversion slips by roughly one to two quarters.
  - Cash is modeled from EBITDA and ignores collection timing, prepaid data licenses, and any capitalized software spend.
