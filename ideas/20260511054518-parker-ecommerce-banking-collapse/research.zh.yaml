  validationPlan:
  - priority: high
    question: CFO 会在下一次倒闭前就付费，还是只有被迫迁移时才买？
    evidenceToGather: 访谈 10 位 Shopify Plus 财务负责人，并围绕应急演练拿下 2 个付费共创客户试点。
  - priority: high
    question: 产品能否真的把收款方、审批、卡和账户元数据从常见替代栈里导入并归一化？
    evidenceToGather: 针对 Mercury、Ramp、Brex、Rho 和至少一条贷款方工作流做技术 PoC。
  - priority: medium
    question: 替代提供方会转介绍线索，还是坚持自己把上线从头做到尾？
    evidenceToGather: 与当前正在追迁移生意的合作银行、金融栈和电商贷款方开展合作讨论。
