topRisks:
  - name: Backup-supply bottleneck
    description: The product is weaker if partner banks, issuers, or lenders are unwilling to pre-approve standby relationships for volatile ecommerce brands.
    mitigation: Start software-first with migration readiness and document packaging, then add a curated network of replacement providers where data quality improves approval odds.
  - name: Event-driven demand
    description: If customers only buy after a collapse, revenue could be too spiky to support efficient growth.
    mitigation: Package the same product as annual continuity planning, peak-season risk review, and multi-provider treasury readiness before an outage happens.
  - name: Regulatory-perimeter creep
    description: Handling payments or brokering credit directly could drag the company into a harder compliance posture than a young software startup can absorb.
    mitigation: Stay on the software and orchestration layer at launch, with regulated partners providing accounts and credit until there is enough scale to justify licenses.
