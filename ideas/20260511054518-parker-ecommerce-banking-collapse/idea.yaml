differentiator: >-
  This is not a new neobank, card issuer, or inventory lender competing head-on for balance sheet. The product sits
  above providers and owns the merchant-specific migration graph: payees, spend rules, cash-routing logic, settlement
  history, and underwriting artifacts that make replacement painfully manual today. That abstraction layer becomes more
  valuable every time a partner changes underwriting appetite, loses a bank sponsor, or exits a merchant segment.
