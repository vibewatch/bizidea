jobsToBeDone:
  - job: When a commerce-focused finance provider fails or pulls credit, help the CFO preserve payment operations and inventory buying power, so the brand can keep selling without a cash-flow shock.
    currentAlternative: Emergency spreadsheet-led migration across banks, card issuers, and lenders
    successMetric: Days to restore cards, vendor payments, and replacement credit lines
  - job: When the board asks for contingency planning after a fintech collapse, help the finance team prove it can switch providers quickly, so the company is not hostage to a single embedded-finance partner.
    currentAlternative: Static contingency docs and fragmented backup relationships that have never been tested
    successMetric: Time to execute a tested failover drill and percentage of finance workflows covered by a standby provider
