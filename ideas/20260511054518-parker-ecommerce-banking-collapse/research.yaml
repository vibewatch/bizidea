  growthRate: "Shopify GMV +29.5% YoY in 2025; Shopify Capital originations +40% YoY from 2024 to 2025."
  growthRateSourceRefs: [11, 12, 31]
  tailwinds:
    - point: Platform-native working capital is still expanding, which keeps finance-stack change and lender switching economically important.
      sourceRefs: [10, 11, 31]
    - point: SMBs continue to report rising costs, uneven cash flow, and demand for financing to cover operations.
      sourceRefs: [8, 9]
    - point: Embedded-finance and API-first tooling continue to spread across software products, making orchestration more feasible.
