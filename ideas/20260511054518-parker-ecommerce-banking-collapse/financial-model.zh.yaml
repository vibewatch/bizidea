scenarios:
  downside:
    description: 事件后的紧迫感减弱，合作方转介绍爬坡缓慢，公司在 Y3 结束时只有 70 个 logo，客户年均综合收入为 $20K。
    y3RevenueK: 951.0
    y3EbitdaK: -331.5
    cashLowPointK: 332.0
    keyAssumptionChanges:
    - Y3 季末客户数从 30、50、75、100 下修到 24、38、54、70。
    - 活跃客户年均综合收入从 $24K 降到 $20K，因为买家不愿为演练和迁移附加项付费。
    - 毛利率从 70% 滑到 67%，因为上线流程仍然更依赖人工。
  base:
    description: 创始人主导销售先拿下前 15 个 logo，随后提供方和 CFO 转介绍加速，到 Y3 结束时公司达到 100 个 logo，客户年均综合收入为 $24K。
    y3RevenueK: 1275.0
    y3EbitdaK: -104.7
    cashLowPointK: 515.0
    keyAssumptionChanges:
    - 季末客户数按 A8 和 A9 执行。
    - 毛利率保持在 BP 设定的 70%。
    - 招聘按 A17 推进，在复制性被证明前不再额外增加销售或服务人员。
  upside:
    description: 提供方模板和转介绍更早跑顺，公司在 Y3 结束时达到 130 个 logo，客户年均综合收入为 $26K，且无需明显前置招人。
    y3RevenueK: 1738.8
    y3EbitdaK: 254.7
    cashLowPointK: 620.0
    keyAssumptionChanges:
    - Y3 季末客户数提升到 35、65、95、130。
    - 活跃客户年均综合收入从 $24K 提升到 $26K，靠更多多实体和演练附件拉动。
    - 随着提供方模板减少人工工作，毛利率从 70% 提高到 72%。
sensitivity:
- variable: ARPU
  downsideCase: 产品被当成狭义应急工具购买，客户年均综合价值最终只有 $20K。
  baseCase: 客户年均综合价值维持在模型里的 $24K。
  upsideCase: 当多实体演练和合作方专属模板挂上后，客户年均综合价值提升到 $26K。
  y3RevenueImpactK: -212.5
  cashImpactK: -148.8
- variable: CAC
  downsideCase: CAC 升到 $16K，因为创始人主导的线索管道没能转成可复制的转介绍转化。
  baseCase: 来自兼职 CFO 和替代提供方的转介绍把 CAC 稳在 $12K。
  upsideCase: 当两条提供方渠道能持续贡献高意向线索后，CAC 降到 $9K。
  y3RevenueImpactK: -127.5
  cashImpactK: -180.0
- variable: 流失率
  downsideCase: 月流失率升到 2.5%，因为买家把产品视作一次性事件软件。
  baseCase: 月流失率保持在模型里的 1.5%。
  upsideCase: 当季度演练和合作方监控成为常规动作后，月流失率降到 1.0%。
  y3RevenueImpactK: -96.0
  cashImpactK: -67.0
- variable: 销售周期
  downsideCase: 试点转生产拉长到约 6 个月，因为买家和合作方都需要更久的安全与上线审查。
  baseCase: 试点转生产约为 4-5 个月，与 BP 里 6-8 周付费就绪包加后续转化的节奏一致。
  upsideCase: 高信任转介绍把周期缩到约 3 个月。
  y3RevenueImpactK: -180.0
  cashImpactK: -126.0
- variable: 毛利率
  downsideCase: 毛利率只能维持在 65%，因为部署和支持仍偏服务密集。
  baseCase: 毛利率维持在 BP 目标的 70%。
  upsideCase: 随着模板和合作方接受度提升，毛利率达到 72%。
  y3RevenueImpactK: 0.0
  cashImpactK: -63.8
- variable: 招聘节奏
  downsideCase: 在复制性还没被证明前，平台工程师和合作伙伴运营岗位都提前两个季度入职。
  baseCase: 招聘按 A17 推进，整个 Y3 都保持精简。
  upsideCase: 非关键岗位延后招聘，且不影响收入，因为合作方渠道承担了更多上线工作。
  y3RevenueImpactK: 0.0
  cashImpactK: -90.0
modelDiagram:
  title: 单位经济模型流程
  mermaid: "flowchart LR\n  Leads[线索] --> PaidPilots[付费试点]\n  PaidPilots --> ActiveCustomers[活跃客户]\n  ActiveCustomers --> Revenue[收入]\n  Revenue --> GrossProfit[毛利]\n  GrossProfit --> Cash[现金]\n"
modelSanity:
- checkName: 收入引擎
  finding: Y3 收入主要来自活跃 logo 基数从 15 增长到 100：先靠创始人主导销售起步，再靠转介绍分发放大，每个客户年均综合价值为 $24K。
- checkName: 必须成立的事
  finding: 提供方模板和迁移资料包必须把上线做得足够可复制，才能让 1 位实施负责人支撑增长，而不把毛利率压到 70% 目标以下。
- checkName: 模型会在何时失效
  finding: 如果 ARPU 掉向 $20K，或销售周期拉长到 6 个月，模型会损失约 $180K-$210K 的 Y3 收入，现金缓冲也会逼近 downside 情景。
- checkName: 下一轮融资证明
  finding: 只要公司做到大约 50 个付费 logo、两家可复制合作方、以及 30 天以内部署，同时缓冲仍在，seed 轮故事就能讲顺。
sanityChecks:
  ruleOf40: Y3 增长率 596.7% + EBITDA 利润率 -8.2% = 588.5%（方向上很强，但被很小的 Y2 基数放大了）。
  burnMultiple: Y2 的 burn multiple 约为 2.3x；到 Y3，随着客户基数扩张快于亏损，改善到约 0.1x。
  revenuePerFte: 按年末 FTE 计算，Y3 人均收入约为 $182K（对比成熟 SaaS 大约 $200K-$400K 的基准）。
  flags:
  - 基准情景仍然依赖转介绍和合作方渠道，才能在 Y3 把客户数从 15 拉到 100；仅靠创始人主导销售做不到这条斜率。
  - 每客户综合收入包含实施和演练收益，因此纯经常性 ARR 低于表面收入，尽调时需要单独跟踪。
  - 人均收入仍低于成熟 SaaS 水平，这更像一个带服务辅助的切口，而不是彻底产品驱动的模型。
  - Rule of 40 看起来过强，主要是因为 Y2 收入基数太小；投资人更该盯 logo 增长、毛利率和复制性。
