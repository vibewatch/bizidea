slug: merchant-finance-failover
date: '2026-05-11'
currency: USD
modelStartMonth: 2026-06
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-06
  unit: 月
  source: '[BP date] 基准情景假设 pre-seed 在计划日期次月完成交割，支出也从该月开始。'
- id: A2
  name: pre-seed 交割后起始现金
  value: '2.0'
  unit: USDM
  source: '[BP fundingAsk targetFundingRangeUsd $2-4M] 基准情景取区间下限，因为团队保持精简。'
- id: A3
  name: 活跃客户年均综合收入
  value: '24.0'
  unit: 千美元/客户年
  source: '[BP gtm.pricing] 采用综合客户年价值：大致由 $12K 年订阅，加上约 $12K 的实施、演练和迁移费用构成；在增长早期，公司仍以上线交付为主。'
- id: A4
  name: 毛利率
  value: '70'
  unit: 百分比
  source: '[BP businessModel targetGrossMarginPct]'
- id: A5
  name: 月流失率
  value: '1.5'
  unit: 百分比
  source: '[BP gtm.funnelTargets renewal 80%+] 参考早期工作流软件的创业财务经验：按年续费、实施锁定适中。'
- id: A6
  name: 首个付费客户时间点
  value: M5 签下首个付费连续性合同；M10 签下第二个合同
  unit: 时间点
  source: '[BP milestones 0-12 months] 用首年 2 个付费共创试点、以及 2 个年订阅转化目标来锚定 Y1。'
- id: A7
  name: Y1 客户获取节奏
  value: 月末客户数：0,0,0,0,1,1,1,1,1,2,2,2
  unit: 数量
  source: '[BP milestones 0-12 months] 对前两个付费试点转成活跃 logo 采取保守假设。'
- id: A8
  name: Y2 季末客户数
  value: Y2 Q1 4；Y2 Q2 7；Y2 Q3 11；Y2 Q4 15
  unit: 数量
  source: '[BP milestones 12-24 months] 以第 24 个月达到 10-15 个付费客户目标的中位数建模。'
- id: A9
  name: Y3 季末客户数
  value: Y3 Q1 30；Y3 Q2 50；Y3 Q3 75；Y3 Q4 100
  unit: 数量
  source: '[BP market.som 250 merchants by year 3; BP sequencingRationale; Research distributionChannels] 基准情景假设：当提供方模板和转介绍渠道开始可复制后，公司拿下示意性 SOM 的 40%。'
- id: A10
  name: 创始人/CEO 全成本现金薪酬
  value: '84.0'
  unit: 千美元/年
  source: '[BP team Founder/CEO] 参考 pre-seed 阶段低于市场价的创始人工资。'
- id: A11
  name: 创始工程师全成本现金薪酬
  value: '144.0'
  unit: 千美元/年
  source: '[BP team Founding eng] 参考资深创始工程师现金薪酬加用工负担。'
- id: A12
  name: 产品与集成工程师全成本现金薪酬
  value: '132.0'
  unit: 千美元/年
  source: '[BP team Product and integration engineer] 参考 pre-seed 阶段全栈集成岗位薪酬。'
- id: A13
  name: 实施负责人全成本现金薪酬
  value: '102.0'
  unit: 千美元/年
  source: '[BP team Implementation lead] 参考上线与服务运营岗位薪酬。'
- id: A14
  name: 合作伙伴负责人或客户经理全成本现金薪酬
  value: '114.0'
  unit: 千美元/年
  source: '[BP team Partnerships or account executive] 参考由创始人辅助成交的中端市场客户经理薪酬。'
- id: A15
  name: 平台工程师全成本现金薪酬
  value: '138.0'
  unit: 千美元/年
  source: '[BP product twelveMonth and twentyFourMonth] 参考在有预算做引导式切换自动化后新增工程师的薪酬。'
- id: A16
  name: 合作伙伴运营全成本现金薪酬
  value: '90.0'
  unit: 千美元/年
  source: '[BP operations and milestones] 参考只有在 Y2 复制性出现后才增加的客户成功/合作伙伴运营岗位薪酬。'
- id: A17
  name: 招聘节奏
  value: M1 配齐创始人和创始工程师；M3 招产品与集成工程师；M5 招实施负责人；M10 招合作伙伴负责人或客户经理；M16 招平台工程师；M25 招合作伙伴运营
  unit: 时间点
  source: '[BP team startTiming; BP sequencingRationale] 除已命名团队外，计划期内只新增 2 个岗位，使模型保持与精简切口一致。'
- id: A18
  name: 职能薪酬分摊
  value: 创始人 75% 计入 S&M / 25% 计入 G&A；工程师 100% 计入 R&D；实施负责人 50% 计入 R&D / 50% 计入 G&A；客户经理 100% 计入 S&M；合作伙伴运营 60% 计入 S&M / 40% 计入 G&A
  unit: 分配
  source: '[BP team rationales] 分摊方式按角色在销售、产品化、上线和行政中的职责确定。'
- id: A19
  name: 非薪酬运营支出
  value: S&M 工具：客户经理入职前每月 2K，入职后 5K，加入合作伙伴运营后 7K；R&D 工具：起步 3K，实施负责人到岗后 4K，平台工程师加入后 5K；G&A：Y1 每月 3K，此后每月 4K
  unit: 千美元/月
  source: '[Startup-finance heuristic] 采用精简软件创业公司的工具、差旅、合规和法务预算。'
- id: A20
  name: 现金转换政策
  value: EBITDA 近似现金变动
  unit: 政策
  source: '[Startup-finance heuristic] 该 pre-seed 软件公司模型不考虑债务、资本开支、税项或显著营运资金波动。'
- id: A21
  name: 融资里程碑
  value: 融资规模要足以支撑公司做到大约 50 个付费 logo、两条可复制的提供方合作路径、以及 30 天以内的部署启动，并保留 6 个月缓冲
  unit: 里程碑
  source: '[BP milestones 12-24 months; BP fundingAsk runwayMonths] 用来反推 pre-seed 融资需求规模。'
