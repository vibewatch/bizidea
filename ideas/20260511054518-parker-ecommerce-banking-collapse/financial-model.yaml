scenarios:
  downside:
    description: "Pre-incident urgency fades, partner referrals ramp slowly, and the company exits Y3 with 70 logos at a $20K blended customer-year value."
    y3RevenueK: 951.0
    y3EbitdaK: -331.5
    cashLowPointK: 332.0
    keyAssumptionChanges:
      - "Quarter-end Y3 customers fall from 30, 50, 75, 100 to 24, 38, 54, 70."
      - "Blended annual revenue per active customer drops from $24K to $20K as buyers resist drill and migration add-ons."
      - "Gross margin slips from 70% to 67% because onboarding stays more manual."
  base:
    description: "Founder-led selling lands the first 15 logos, then provider and CFO referrals accelerate the company to 100 logos by Y3 exit at a $24K blended customer-year value."
    y3RevenueK: 1275.0
    y3EbitdaK: -104.7
    cashLowPointK: 515.0
    keyAssumptionChanges:
      - "Quarter-end customer counts follow A8 and A9."
      - "Gross margin stays at the 70% BP target."
      - "Hiring follows A17 with no additional sales or services headcount before repeatability is proven."
  upside:
    description: "Provider templates and referrals click early, pushing the company to 130 logos by Y3 exit at a $26K blended customer-year value without a major hiring pull-forward."
    y3RevenueK: 1738.8
    y3EbitdaK: 254.7
    cashLowPointK: 620.0
    keyAssumptionChanges:
      - "Quarter-end Y3 customers rise to 35, 65, 95, 130."
      - "Blended annual revenue per active customer expands from $24K to $26K through more multi-entity and drill attachments."
      - "Gross margin improves from 70% to 72% as provider templates reduce manual work."
sensitivity:
  - variable: ARPU
    downsideCase: "Blended customer-year value settles at $20K because the product is bought as a narrow contingency tool."
    baseCase: "Blended customer-year value stays at $24K as modeled."
    upsideCase: "Blended customer-year value reaches $26K once multi-entity drills and partner-specific templates attach."
    y3RevenueImpactK: -212.5
    cashImpactK: -148.8
  - variable: CAC
    downsideCase: "CAC rises to $16K because founder-led pipeline does not translate into repeatable referral conversion."
    baseCase: "CAC stays at $12K with referrals from fractional CFOs and replacement providers."
    upsideCase: "CAC falls to $9K once two provider channels supply warmer leads."
    y3RevenueImpactK: -127.5
    cashImpactK: -180.0
  - variable: churn
    downsideCase: "Monthly churn rises to 2.5% because buyers treat the product as one-time incident software."
    baseCase: "Monthly churn stays at 1.5% as modeled."
    upsideCase: "Monthly churn falls to 1.0% when quarterly drills and partner monitoring become routine."
    y3RevenueImpactK: -96.0
    cashImpactK: -67.0
  - variable: sales cycle
    downsideCase: "Pilot-to-production stretches to about 6 months because buyers and providers need longer security and onboarding review."
    baseCase: "Pilot-to-production runs about 4-5 months, consistent with the BP's 6-8 week paid readiness package plus conversion."
    upsideCase: "Trusted referrals shorten the cycle to roughly 3 months."
    y3RevenueImpactK: -180.0
    cashImpactK: -126.0
  - variable: gross margin
    downsideCase: "Gross margin holds at 65% because deployment and support remain more services-heavy."
    baseCase: "Gross margin stays at the BP target of 70%."
    upsideCase: "Gross margin reaches 72% as templates and partner acceptance improve."
    y3RevenueImpactK: 0.0
    cashImpactK: -63.8
  - variable: hiring pace
    downsideCase: "The platform engineer and partner-ops hire are both pulled forward by two quarters before repeatability is proven."
    baseCase: "Hiring follows A17 and stays lean through Y3."
    upsideCase: "Noncritical hiring slips later with no revenue penalty because partner channels absorb more onboarding work."
    y3RevenueImpactK: 0.0
    cashImpactK: -90.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Leads --> PaidPilots
      PaidPilots --> ActiveCustomers
      ActiveCustomers --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: Revenue engine
    finding: Y3 revenue is driven mainly by growing the active logo base from 15 to 100 through founder-led sales first and referral-led distribution second at a $24K blended customer-year value.
  - checkName: Must go right
    finding: Provider templates and migration packets must make onboarding repeatable enough that one implementation lead can support growth without pushing gross margin below the 70% target.
  - checkName: Model breaks if
    finding: If ARPU slips toward $20K or sales cycles stretch toward six months, the model loses roughly $180K-$210K of Y3 revenue and the cash cushion compresses toward the downside case.
  - checkName: Next-round proof
    finding: The seed story works once the company reaches about 50 paying logos, two repeatable provider partners, and sub-30-day deployments with the buffer still intact.
sanityChecks:
  ruleOf40: "Y3 growth 596.7% + EBITDA margin -8.2% = 588.5% (directionally strong but inflated by the tiny Y2 base)."
  burnMultiple: "About 2.3x in Y2 on net new ARR, improving to about 0.1x in Y3 as the customer base scales faster than burn."
  revenuePerFte: "$182K Y3 revenue per end-of-year FTE (vs. roughly $200K-$400K mature SaaS benchmark)."
  flags:
    - "The base case still depends on referral and partner channels to move from 15 to 100 logos by Y3; founder-led selling alone will not support that ramp."
    - "Blended revenue per customer includes implementation and drill economics, so recurring-only ARR is lower than headline revenue and should be tracked separately in diligence."
    - "Revenue per FTE remains below mature SaaS levels, which is consistent with a services-assisted wedge rather than a fully product-led model."
    - "Rule-of-40 looks artificially strong because the Y2 revenue base is still tiny; investors should focus more on logo growth, gross margin, and repeatability."
