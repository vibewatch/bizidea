assumptions:
  - id: A1
    name: Model start month
    value: '2026-06'
    unit: month
    source: "[BP date] Base case assumes the pre-seed closes and spend starts the month after the plan date."
  - id: A2
    name: Starting cash after pre-seed close
    value: '2.0'
    unit: USDM
    source: "[BP fundingAsk targetFundingRangeUsd $2-4M] Base case uses the low end because the team stays lean."
  - id: A3
    name: Blended annual revenue per active customer
    value: '24.0'
    unit: USDK per customer-year
    source: "[BP gtm.pricing] Uses a blended customer-year value from a roughly $12K annual subscription plus about $12K of implementation, drill, and migration-fee mix while growth remains onboarding-heavy."
  - id: A4
    name: Gross margin
    value: '70'
    unit: percent
    source: "[BP businessModel targetGrossMarginPct]"
  - id: A5
    name: Monthly churn
    value: '1.5'
    unit: percent
    source: "[BP gtm.funnelTargets renewal 80%+] Startup-finance heuristic for early workflow software with annual renewals and moderate implementation lock-in."
  - id: A6
    name: First paid customer timing
    value: "M5 first paid continuity contract; M10 second contract"
    unit: timing
    source: "[BP milestones 0-12 months] Anchors Y1 to two paid design-partner pilots and two annual-subscription conversions."
  - id: A7
    name: Y1 customer landing pattern
    value: "Month-end customers: 0,0,0,0,1,1,1,1,1,2,2,2"
    unit: count
    source: "[BP milestones 0-12 months] Conservative conversion of the first two paid pilots into active logos."
  - id: A8
    name: Y2 quarter-end customers
    value: "Q1Y2 4; Q2Y2 7; Q3Y2 11; Q4Y2 15"
    unit: count
    source: "[BP milestones 12-24 months] Uses the midpoint of the stated 10-15 paying-customer goal by month 24."
  - id: A9
    name: Y3 quarter-end customers
    value: "Q1Y3 30; Q2Y3 50; Q3Y3 75; Q4Y3 100"
    unit: count
    source: "[BP market.som 250 merchants by year 3; BP sequencingRationale; Research distributionChannels] Base case assumes the company captures 40% of the illustrative SOM after provider templates and referral channels become repeatable."
  - id: A10
    name: Founder/CEO loaded cash compensation
    value: '84.0'
    unit: USDK per year
    source: "[BP team Founder/CEO] Startup-finance heuristic for below-market founder salary at pre-seed stage."
  - id: A11
    name: Founding engineer loaded cash compensation
    value: '144.0'
    unit: USDK per year
    source: "[BP team Founding eng] Startup-finance heuristic for senior founding engineer cash comp plus payroll burden."
  - id: A12
    name: Product and integration engineer loaded cash compensation
    value: '132.0'
    unit: USDK per year
    source: "[BP team Product and integration engineer] Startup-finance heuristic for pre-seed full-stack integration hire."
  - id: A13
    name: Implementation lead loaded cash compensation
    value: '102.0'
    unit: USDK per year
    source: "[BP team Implementation lead] Startup-finance heuristic for onboarding and services operator."
  - id: A14
    name: Partnerships or account executive loaded cash compensation
    value: '114.0'
    unit: USDK per year
    source: "[BP team Partnerships or account executive] Startup-finance heuristic for founder-assisted mid-market AE."
  - id: A15
    name: Platform engineer loaded cash compensation
    value: '138.0'
    unit: USDK per year
    source: "[BP product twelveMonth and twentyFourMonth] Startup-finance heuristic for an added engineer once guided cutover automation is funded."
  - id: A16
    name: Partner operations loaded cash compensation
    value: '90.0'
    unit: USDK per year
    source: "[BP operations and milestones] Startup-finance heuristic for a customer-success or partner-ops hire added only after Y2 repeatability."
  - id: A17
    name: Hiring cadence
    value: "Founder and founding engineer in M1; product and integration engineer in M3; implementation lead in M5; partnerships or AE in M10; platform engineer in M16; partner operations in M25"
    unit: timing
    source: "[BP team startTiming; BP sequencingRationale] Adds only two post-plan hires beyond the named team so the model stays consistent with a lean watch-grade wedge."
  - id: A18
    name: Functional payroll allocation
    value: "Founder 75% S&M / 25% G&A; engineers 100% R&D; implementation lead 50% R&D / 50% G&A; AE 100% S&M; partner ops 60% S&M / 40% G&A"
    unit: allocation
    source: "[BP team rationales] Allocation follows role ownership across sales, productization, onboarding, and admin work."
  - id: A19
    name: Non-payroll operating spend
    value: "S&M tools 2K monthly pre-AE, 5K after AE, 7K with partner ops; R&D tools 3K initially, 4K after implementation lead, 5K after platform engineer; G&A 3K monthly in Y1 and 4K monthly thereafter"
    unit: USDK per month
    source: "[Startup-finance heuristic] Lean software startup tooling, travel, compliance, and legal budgets."
  - id: A20
    name: Cash conversion policy
    value: "EBITDA approximates cash movement"
    unit: policy
    source: "[Startup-finance heuristic] No debt, capex, taxes, or material working-capital swings are modeled for this pre-seed software business."
  - id: A21
    name: Funding milestone
    value: "Raise enough cash to reach roughly 50 paying logos, two repeatable provider partnerships, and sub-30-day deployments with six months of buffer"
    unit: milestone
    source: "[BP milestones 12-24 months; BP fundingAsk runwayMonths] Used to size the pre-seed ask."
