differentiator: 这不是一家新的 neobank、发卡方或库存贷款方，也不是去正面抢资产负债表。产品站在提供方之上，掌握的是商户特有的迁移图谱：收款方、支出规则、现金路由逻辑、结算历史，以及今天替换起来极其手工的承保材料。每当合作方改变承保偏好、失去合作银行，或退出某个商户细分市场，这层抽象就更值钱。
