problem: 很多采用垂直电商 fintech 的 Shopify 原生消费品牌，会把卡、供应商付款和营运资金入口都押在同一家专业提供方上。一旦这家机构出事，财务团队会同时失去支出控制、回款可见性和信贷可得性，只能临时手工在银行、发卡项目和贷款方之间来回救火。Parker 的倒闭说明，真正的痛点不只是拿不到钱，而是在提供方出问题之前，没有一层能让商户金融能力可迁移的连续性层。
targetUser:
  primary: Shopify 原生消费品牌的财务负责人和财务控制负责人
  secondary: 为这类品牌管理供应商付款、广告投放和库存现金周期的兼职 CFO 与财务运营人员
  buyer: CFO 或财务副总裁
startupThesis:
  nonObviousInsight: 下一个会赢的电商金融创业公司，不会是一个承保稍微更好的 Parker 复制品；它会是一套控制平面，让垂直商户金融在单一贷款方、发卡方或合作银行出事之前就能被替换。
  beachhead: 把供应商付款、广告投放卡和库存提额都跑在单一垂直 fintech 上的 Shopify 原生消费品牌财务团队
  wedge: 一套金融故障切换驾驶舱，把收款方配置、支出控制、资金路由规则和信贷数据同步到备用提供方，让商户几天内就能切换，而不是从零重建
  whyNowCatalyst: Parker 进入清算、竞争对手抢占流失账户，再加上 BaaS 监管审视升温，让“韧性”在商户被迫迁移的当下变成了有预算的硬需求。
  ventureScalePath: 先从电商品牌因倒闭触发的迁移切入，再扩成覆盖 SMB 银行、发卡、资金管理流程和嵌入式营运资金市场的常开型韧性与编排层，服务一整批垂直 fintech。
solution: 打造一个商户金融故障切换平台，连接品牌的银行账户、ERP、电商店铺、广告渠道、AP 工具和现有 fintech 提供方。产品先快照收款方、审批策略、支出分类、还款计划和现金流数据，再把这张运营图谱预先映射到一个或多个备用银行、卡和信贷合作方上。当某家提供方失效或失去合作银行时，团队可以发起一套引导式切换流程，重新下发支出控制、改道供应商付款，并把商户的承保资料打包给替代贷款方。时间拉长后，平台会从紧急迁移工具升级为常开型双提供方控制平面，持续测试就绪度、监控合作方风险，并建议何时该做分散。
goToMarketSeed:
  firstCustomer: 美国服饰、美妆或家居品牌，跑在 Shopify Plus 上，年 GMV 为 $15M-$60M，财务团队 2-4 人，目前正用一家电商垂直 fintech 同时解决卡和库存信贷提额。
  buyingTrigger: 现有财务提供方倒闭、失去合作银行、在库存旺季前砍掉额度，或 Parker 停摆后董事会要求准备应急预案。
  currentAlternative: 由 CFO 主导，手工在 Mercury、Brex、Ramp、传统银行、电子表格以及临时顾问或经纪人之间完成迁移。
  switchingReason: 这个产品把原本脆弱且耗时数周的重新开户压缩成一套引导式切换流程，同时保住收款方、支出策略和可直接给贷款方使用的承保数据；通用银行和顾问做不到这一点。
  pricingHypothesis: 收实施费加年订阅费，按活跃财务实体数和备用提供方席位计价；完成信贷迁移时再收成功费。
whyNow:
- point: Chapter 7 清算把 Parker 从“问题供应商”变成了永久不可用的提供方，连续性和迁移软件因此立刻拿到了预算。
