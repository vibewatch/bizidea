topRisks:
- name: 备用供给瓶颈
  description: 如果合作银行、发卡方或贷款方不愿意为波动较大的电商品牌提前预批备用关系，产品吸引力就会打折。
  mitigation: 先从软件层切入，提供迁移就绪度和文档打包；等数据质量足以提高通过率后，再补上一层精选替代提供方网络。
- name: 需求过度事件驱动
  description: 如果客户只在倒闭后才买，收入就会太尖峰化，撑不起高效增长。
  mitigation: 把同一套产品包装成年连续性规划、旺季风险复盘和多提供方资金管理就绪度服务，在事故发生前就卖出去。
- name: 监管边界外溢
  description: 如果公司直接碰支付或撮合信贷，就可能被拉进一个年轻软件公司难以承受的更重合规姿态。
  mitigation: 上线初期坚守软件与编排层，账户和信贷交给持牌合作方，等规模起来再决定是否值得申请牌照。
