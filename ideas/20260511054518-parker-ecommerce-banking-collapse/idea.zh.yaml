jobsToBeDone:
- job: 当电商垂直金融提供方倒闭或抽走额度时，帮 CFO 保住支付运转和库存采购能力，让品牌在没有现金流冲击的情况下继续卖货。
  currentAlternative: 靠电子表格紧急协调银行、发卡方和贷款方完成迁移
  successMetric: 恢复卡、供应商付款和替代信贷额度所需的天数
- job: 当董事会在 fintech 倒闭后要求做应急规划时，帮财务团队证明自己能快速切换提供方，让公司不再被单一嵌入式金融合作方绑死。
  currentAlternative: 静态应急文档和从未演练过的碎片化备用关系
  successMetric: 完成一套已验证故障切换演练所需时间，以及有备用提供方覆盖的财务流程占比
