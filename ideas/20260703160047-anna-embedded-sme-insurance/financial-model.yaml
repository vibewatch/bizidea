slug: "ledger-aware-insurance-rail"
date: "2026-07-03"
currency: "USD"
modelStartMonth: "2026-08"
assumptions:
  - id: "A1"
    name: "Model start month"
    value: "2026-08"
    unit: "YYYY-MM"
    source: "[BP date 2026-07-03] The base case starts in the first full month after the business-plan date."
  - id: "A2"
    name: "Opening cash after pre-seed close"
    value: "2400.0"
    unit: "USDK"
    source: "[BP fundingAsk targetFundingRangeUsd $2-4M; BP fundingAsk runwayMonths 18] Base case uses a $2.4M close so the company can reach the month-24 proof point plus roughly six months of buffer."
  - id: "A3"
    name: "Modeled customer unit"
    value: "active paying partner platform"
    unit: "definition"
    source: "[BP gtm wedge; BP investorMemo firstCustomer] customersEop counts monetized partner surfaces, not end SMEs."
  - id: "A4"
    name: "Starting paying partners (M1)"
    value: "0"
    unit: "count"
    source: "[BP milestones 0-12 months] The plan starts pre-revenue and wins its first paid partner only after compliance design and MVP launch work."
  - id: "A5"
    name: "Blended annual revenue per active paying partner"
    value: "225.0"
    unit: "USDK per partner-year"
    source: "[BP investorMemo firstCustomer initialContract roughly GBP40k-80k pilot then GBP150k-300k annual platform economics; Research market.som $3.2M on about 25k activated firms] Base case uses a midpoint partner value that also implies roughly 1.8k activated firms per mature partner at the researched rail-revenue level."
  - id: "A6"
    name: "Revenue recognition method"
    value: "average active paying partners per period"
    unit: "formula"
    source: "Startup-finance heuristic anchored to BP pilot motion: a new partner contributes half-period revenue in the landing month or quarter, then full run-rate thereafter."
  - id: "A7"
    name: "Year 1 partner ramp"
    value: "M6 first paid pilot; M9 second paid pilot; exits Y1 with 2 active paying partners"
    unit: "timing"
    source: "[BP product sixMonth; BP milestones 0-12 months] This is a conservative read of 2-3 design partners with only two monetized by year-end."
  - id: "A8"
    name: "Year 2 quarter-end partners"
    value: "Q1Y2 3; Q2Y2 4; Q3Y2 5; Q4Y2 6"
    unit: "count"
    source: "[BP milestones 12-24 months] Base case exits Y2 at the top of the stated 4-6 production-partner milestone."
  - id: "A9"
    name: "Year 3 quarter-end partners"
    value: "Q1Y3 8; Q2Y3 10; Q3Y3 12; Q4Y3 14"
    unit: "count"
    source: "[BP milestones 24-36 months; BP product twentyFourMonth; Research distributionChannels] Expansion into accounting and payroll surfaces drives Y3, but exit ARR still stays just below the researched $3.2M SOM."
  - id: "A10"
    name: "Gross margin ramp"
    value: "Y1 live months 60-67%; Y2 quarters 70-75%; Y3 quarters 75-76%"
    unit: "percent"
    source: "[BP businessModel targetGrossMarginPct 75; BP operations human review queue first 12 months] Margin starts below target while compliance review and broker hand-holding are manual, then converges on target as trigger rules and certificate servicing standardize."
  - id: "A11"
    name: "Founder / CEO loaded cash compensation"
    value: "120.0"
    unit: "USDK annual per FTE"
    source: "[BP team Founder / CEO] Startup-finance heuristic for a below-market founder salary at pre-seed stage."
  - id: "A12"
    name: "Founding eng loaded cash compensation"
    value: "180.0"
    unit: "USDK annual per FTE"
    source: "[BP team Founding eng] Startup-finance heuristic for a senior technical founder building integrations, prefill, and certificate workflows."
  - id: "A13"
    name: "Insurance compliance and partnerships lead loaded cash compensation"
    value: "150.0"
    unit: "USDK annual per FTE"
    source: "[BP team Insurance compliance and partnerships lead] Startup-finance heuristic for a senior operator who owns conduct boundaries and carrier or broker relationships."
  - id: "A14"
    name: "Product and data engineer loaded cash compensation"
    value: "165.0"
    unit: "USDK annual per FTE"
    source: "[BP team Product and data engineer] Startup-finance heuristic for an early hire focused on trigger precision, analytics, and experimentation."
  - id: "A15"
    name: "Partner implementation and success lead loaded cash compensation"
    value: "125.0"
    unit: "USDK annual per FTE"
    source: "[BP team Partner implementation and success lead] Startup-finance heuristic for the first operator who shortens onboarding and instruments partner metrics."
  - id: "A16"
    name: "Account executive loaded cash compensation"
    value: "140.0"
    unit: "USDK annual per FTE"
    source: "[BP gtm founder-led direct sales and co-sell motion] Startup-finance heuristic for the first quota-carrying seller added only after pilot proof is visible."
  - id: "A17"
    name: "Solutions / platform engineer loaded cash compensation"
    value: "170.0"
    unit: "USDK annual per FTE"
    source: "[BP product twelveMonth and twentyFourMonth] Startup-finance heuristic for an engineer who turns bespoke partner integrations into reusable launch templates."
  - id: "A18"
    name: "Renewals and operations lead loaded cash compensation"
    value: "115.0"
    unit: "USDK annual per FTE"
    source: "[BP businessModel expansionLevers renewals; BP operations] Startup-finance heuristic for an operator who owns renewal workflows and certificate support at scale."
  - id: "A19"
    name: "GTM / partner success manager loaded cash compensation"
    value: "130.0"
    unit: "USDK annual per FTE"
    source: "[BP milestones 24-36 months] Startup-finance heuristic for the first post-seed style hire supporting channel expansion without adding a full sales team."
  - id: "A20"
    name: "Hiring cadence"
    value: "Founder and founding engineer in M1; compliance lead in M3; product/data engineer in M6; implementation lead in M9; AE in M15; solutions engineer in M18; renewals ops in M28; GTM/partner-success manager in M31"
    unit: "timing"
    source: "[BP team startTiming; BP sequencingRationale] The named five-person core team is fully built by Y1, and later hires arrive only after deployment repeatability and production-partner proof."
  - id: "A21"
    name: "Functional payroll allocation"
    value: "Founder 70% S&M / 30% G&A; founding and solutions engineers 100% R&D; compliance lead 50% S&M / 50% G&A; product/data engineer 100% R&D; implementation lead 35% S&M / 35% R&D / 30% G&A; AE 100% S&M; renewals ops 60% S&M / 40% G&A; GTM/partner-success manager 70% S&M / 30% G&A"
    unit: "policy"
    source: "[BP team rationales; BP operations] Allocation follows who sells, who builds product and integrations, and who handles regulated operations."
  - id: "A22"
    name: "Non-payroll operating-spend ramp"
    value: "S&M non-payroll runs about $4K monthly pre-live, $6K with the first pilot, $8K with two pilots, $11K through Y2 scale-up, $12K in early Y3, and $14K after the second GTM hire; R&D tooling runs about $8K early, $10K after the product/data hire, $12K with live pilots, $14K through Y2, $15K in early Y3, and $16K after broader expansion; G&A runs about $6K before the compliance hire, $7K through pre-launch diligence, $8K with the first pilot, $9K through late Y1, $11K through Y2, $12K in early Y3, and $13K after Y3 scale-up"
    unit: "USDK per month"
    source: "Startup-finance heuristic for a lean but compliance-heavy B2B insurance software company covering cloud, travel, legal, and partner-audit costs without assuming a services bench."
  - id: "A23"
    name: "Base partner sales cycle"
    value: "roughly 90-120 days from qualified platform to paid pilot, then about one quarter from pilot to annual production contract"
    unit: "days"
    source: "[BP market buyingProcess; BP gtm funnelTargets] Compliance review and regulated-partner design keep the cycle enterprise-like even though the wedge is narrow."
  - id: "A24"
    name: "Blended CAC per new paying partner"
    value: "115.0"
    unit: "USDK per new partner"
    source: "[BP gtm channels and funnelTargets] Derived from the planned Y2 sales-and-marketing spend profile and a 4-net-new-partner year, with founder-led selling and broker or MGA referrals holding CAC below heavy-enterprise benchmarks."
  - id: "A25"
    name: "Monthly logo churn for unit economics"
    value: "1.5"
    unit: "percent"
    source: "[BP businessModel expansionLevers renewals; BP risks partner concentration and single-carrier substitutes; Startup-finance heuristic] Contracts should be sticky once certificate workflows are embedded, but early concentration still justifies non-trivial churn."
  - id: "A26"
    name: "Cash conversion policy"
    value: "ending cash equals opening cash plus cumulative EBITDA"
    unit: "formula"
    source: "Startup-finance heuristic: no debt, taxes, capex, or material working-capital swings are modeled for this early software business."
  - id: "A27"
    name: "Funding-sizing rule"
    value: "raise enough to reach 6 production partners, a second broker or MGA route, and repeatable sub-90-day implementations with about 6 months of buffer"
    unit: "policy"
    source: "[BP fundingAsk runwayMonths 18; BP milestones 12-24 months] The pre-seed is sized to get through the next proof point before a seed raise."
  - id: "A28"
    name: "Use-of-funds mix"
    value: "Engineering 42%; GTM 27%; G&A 13%; Buffer 18%"
    unit: "percent of pre-seed"
    source: "[BP useOfFundsSummary; base-case cost mix] Mirrors the modelled spend needed to finish integrations, win production partners, and preserve a six-month buffer."
