scenarios:
  downside:
    description: "Compliance approvals and production conversions slip by about one quarter, partner scope stays narrower, and manual review remains heavier for longer."
    y3RevenueK: 1627.5
    y3EbitdaK: -503.7
    cashLowPointK: 193.3
    keyAssumptionChanges:
      - "The first paid pilot slips to M7 and Q4Y3 exits at 11 active paying partners instead of 14."
      - "Blended annual partner value settles near $210K instead of the $225K base midpoint."
      - "Gross margin exits near 74% because manual compliance review and broker support stay elevated."
  base:
    description: "Two paid pilots convert into 6 production partners by Q4Y2, partner value stays near the midpoint of the BP annual-economics range, and gross margin reaches target by Y3."
    y3RevenueK: 2250.0
    y3EbitdaK: 6.9
    cashLowPointK: 835.0
    keyAssumptionChanges:
      - "M6 and M9 pilots exit Y1 with 2 active paying partners, then the model ramps to 6 by Q4Y2 and 14 by Q4Y3."
      - "Blended annual value per active partner stays around $225K, consistent with the BP midpoint and roughly 1.8k activated firms per mature partner."
      - "Gross margin improves from 60-67% in Y1 live months to roughly 75-76% in Y3 as trigger rules and certificate workflows standardize."
  upside:
    description: "A third paid partner lands before year-end, accounting and payroll channels open earlier, and renewals plus extra cover lines lift both ACV and margin."
    y3RevenueK: 2937.5
    y3EbitdaK: 562.5
    cashLowPointK: 1229.7
    keyAssumptionChanges:
      - "The company exits Y1 with 3 active paying partners and Q4Y3 with 18 instead of 14."
      - "Blended annual value rises to about $235K as renewal automation and extra cover-line attach arrive earlier."
      - "Gross margin reaches about 77% because implementation reuse and routing automation reduce servicing load faster than planned."
sensitivity:
  - variable: "ARPU"
    downsideCase: "Blended annual partner value lands near $210K because deployments stay narrower and renewal modules arrive later."
    baseCase: "Exit blended annual value is about $225K per active paying partner."
    upsideCase: "Additional cover-line and renewal attach lift blended annual value to about $240K."
    y3RevenueImpactK: -150.0
    cashImpactK: -165.6
  - variable: "CAC"
    downsideCase: "Fully loaded CAC rises toward $145K and one fewer partner closes by Q4Y3."
    baseCase: "CAC stays near $115K using founder-led selling plus regulated-partner referrals."
    upsideCase: "Stronger insurer and broker introductions hold CAC near $95K."
    y3RevenueImpactK: -168.8
    cashImpactK: -210.0
  - variable: "churn"
    downsideCase: "Monthly logo churn rises to 2.5% if certificate-wallet usage and renewal recapture stay weak."
    baseCase: "Monthly logo churn holds at 1.5% once the workflow is embedded in partner operations."
    upsideCase: "Monthly logo churn improves to 1.0% as renewals and proof-of-cover workflows become sticky."
    y3RevenueImpactK: -180.0
    cashImpactK: -150.0
  - variable: "sales cycle"
    downsideCase: "The first paid pilot slips to M7 and production conversions lag about one quarter."
    baseCase: "First paid pilots land in M6 and M9 and pilot-to-production conversion stays near one quarter."
    upsideCase: "One extra design partner converts by Y1 end and later quarters close roughly one quarter faster."
    y3RevenueImpactK: -506.2
    cashImpactK: -455.1
  - variable: "gross margin"
    downsideCase: "Gross margin exits near 74% because manual review and broker support stay elevated."
    baseCase: "Gross margin reaches roughly 75-76% as prefill and certificate servicing standardize."
    upsideCase: "Gross margin reaches about 77% with faster routing reuse and less manual exception handling."
    y3RevenueImpactK: 0.0
    cashImpactK: -61.8
  - variable: "hiring pace"
    downsideCase: "The AE and solutions engineer are hired two quarters early, before partner demand is repeatable."
    baseCase: "Post-Y1 hires start only after pilots convert and implementation reuse is visible."
    upsideCase: "One post-Y2 scale hire can slip without slowing partner launches."
    y3RevenueImpactK: 0.0
    cashImpactK: -155.4
modelDiagram:
  title: "unit economics flow"
  mermaid: |
    flowchart LR
      QualifiedPlatforms --> PaidPilots
      PaidPilots --> ProductionPartners
      ProductionPartners --> ActivatedFirms
      ActivatedFirms --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: "Revenue engine"
