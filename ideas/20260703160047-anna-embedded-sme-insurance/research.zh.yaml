competitors:
- name: Simply Business
  stage: 现有厂商
  wedge: 面向英国 SME 的大型数字经纪与比价层，可接入最多 15 家保险公司，品牌心智很强。
  pricing: 公众责任险每月 £5.76 起
  strength: 对显性投保需求的抓取能力极强，在多保险公司比价上经验很深。
  weaknessVsUs: 它是在用户明确开始找保险之后才介入，既不掌握前意图触发器，也不在金融工作流里持续托管保险凭证。
  sourceRefs:
  - 30
  - 31
- name: Superscript
  stage: 成长期
  wedge: 面向 SME 和初创企业的数字原生保险经纪，能为多种企业类型快速给出在线报价。
  pricing: 在线定制报价 / 月付保障
  strength: 数字化体验顺滑，对有限公司、个体经营和工种服务的覆盖面很广。
  weaknessVsUs: 它本质上仍是一个报价目的地，而不是一层中立的“触发器 + 凭证”层，去嵌进各家合作方金融 app。
  sourceRefs:
  - 32
- name: Admiral Business
  stage: 现有厂商
  wedge: 已经嵌进 ANNA 和 Tide 的单一保险公司 SME 保险提供方。
  pricing: 公众责任险每月 £6.07 起；专业责任险每月 £7.08 起
  strength: 现成的 fintech 合作、保险公司经济性，以及对核保的直接掌控。
  weaknessVsUs: 单一保险公司的选择，限制了平台的中立性和跨保险公司的优化空间。
  sourceRefs:
  - 1
  - 4
  - 33
  - 34
- name: Qover
  stage: 成长期
  wedge: 一家覆盖欧洲的通用嵌入式保险编排平台。
  pricing: 企业定制定价
  strength: 合规、API 和跨国项目管理能力都很强。
  weaknessVsUs: 公开案例更偏银行卡、旅行和银行保障，而不是英国 SME 的责任险、工具险和凭证工作流。
  sourceRefs:
  - 35
  - 36
  - 37
- name: Hiscox
  stage: 现有厂商
  wedge: 一家擅长 SME 的专业保险公司，数字化报价快，而且在英国客户基数大。
  pricing: 每月 £7.20 起
  strength: 品牌可信、SME 险种库深，而且已有 460,000 家英国企业客户。
  weaknessVsUs: 它依然是单一保险公司的终点，处在需求之后，而不是跨平台掌握中立触发逻辑。
  sourceRefs:
  - 11
  - 38
