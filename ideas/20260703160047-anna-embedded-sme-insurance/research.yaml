competitors:
- name: Simply Business
  stage: incumbent
  wedge: Large digital broker and comparison layer for UK SMEs, with quotes from up to 15 insurers and strong category brand recognition.
  pricing: Public liability from £5.76 per month
  strength: Massive demand capture and multi-insurer comparison experience across over a million customers.
  weaknessVsUs: Engages after explicit shopping intent rather than detecting pre-intent triggers or persisting certificates inside finance workflows.
  sourceRefs:
  - 30
  - 31
- name: Superscript
  stage: scale-up
  wedge: Digital-first SME and startup insurance broker with fast online quotes across many business types.
  pricing: Custom online quote / monthly cover
  strength: Strong digital UX and broad coverage for limited companies, self-employed firms, and trades.
  weaknessVsUs: Primarily a quote destination rather than a neutral trigger-and-certificate layer embedded across partner finance apps.
  sourceRefs:
  - 32
- name: Admiral Business
  stage: incumbent
  wedge: Single-carrier SME insurance provider already embedded into ANNA and Tide.
  pricing: Public liability from £6.07 per month; professional indemnity from £7.08 per month
  strength: Live fintech partnerships plus carrier economics and underwriting control.
  weaknessVsUs: Single-carrier choice limits platform neutrality and cross-carrier optimization.
  sourceRefs:
  - 1
  - 4
  - 33
  - 34
- name: Qover
  stage: scale-up
  wedge: Generic embedded insurance orchestration platform operating across Europe.
  pricing: Custom enterprise pricing
  strength: Strong compliance, API, and multi-country program-management capability.
  weaknessVsUs: Public examples focus more on card, travel, and banking protections than UK SME liability, tools, and certificate workflows.
  sourceRefs:
  - 35
  - 36
  - 37
- name: Hiscox
  stage: incumbent
  wedge: Specialist SME insurer with fast digital quote flow and large UK customer base.
  pricing: From £7.20 per month
  strength: Trusted brand, deep SME cover library, and 460,000 UK business customers.
  weaknessVsUs: Still a single-insurer endpoint that sits downstream of intent instead of owning neutral trigger logic across platforms.
  sourceRefs:
  - 11
  - 38
