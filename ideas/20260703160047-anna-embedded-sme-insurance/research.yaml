  validationPlan:
  - priority: high
    question: Will finance and admin platforms allow transaction-data-driven nudges under their consent and brand rules?
    evidenceToGather: Design-partner workshops with product and compliance leads, plus decision logs on consent copy and live prompt-acceptance tests.
  - priority: high
    question: Can formation, payroll, contract, and tool-spend events map to the right cover with acceptable false-positive rates?
    evidenceToGather: Back-test six months of anonymised event data against quote and bind outcomes with one broker or carrier partner.
  - priority: medium
    question: Do customers value certificate retrieval enough to change attach economics?
    evidenceToGather: Support-ticket review plus prototype testing on proof-of-cover download, sharing, and renewal reminder usage.
