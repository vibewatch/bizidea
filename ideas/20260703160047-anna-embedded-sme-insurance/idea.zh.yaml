jobsToBeDone:
- job: 当微型企业拿下第一份客户合同、第一次招人或购买工具时，帮平台拉起正确、已预填的投保流程并签发保险凭证，好让客户继续完成 入驻 或开工。
  currentAlternative: 平台外比价网站、和经纪人的邮件来回，以及手工追保险凭证。
  successMetric: 从触发到签发凭证的时间、报价到成保转化率，以及每 100 个被触发客户对应的支持工单数。
- job: 当客户已经在别处买保险时，帮平台从账本和增长数据里找出替换或加保机会，好把保费拉回平台、提升 ARPU，而不是把自己做成一个电话销售型保险经纪中心。
  currentAlternative: 一年一度的邮件交叉销售、静态导流链接，以及人工找保险合作方。
  successMetric: 已在记账中出现保险支出的客户里，成保保费拉回率，以及附加投保率提升。
ideaScorecard:
  signalStrength:
    score: 4
    rationale: 两篇同日验证报道都给出了具名合作、100,000+ 目标客户，以及平台内保费支出数据，不是泛泛而谈的趋势稿。
  painIntensity:
    score: 4
    rationale: 缺保险或买晚了，会直接卡住合同、设备使用和早期增长，但这种紧迫性对每家 SME 都不是全天候存在。
  wedgeClarity:
    score: 5
    rationale: 围绕三类具体小企业险种做触发引擎、预填和凭证钱包，切口窄、可测试，也很容易让共创客户判断值不值得上。
  defensibility:
    score: 4
    rationale: 护城河来自事件映射、附加率基准、保险公司集成和可复用的保障资产，不过大型平台或保险公司长期看也可能自己补齐部分能力。
  ventureScale:
    score: 4
    rationale: 滩头市场很窄，但往续保、理赔、更多险种、更多合作平台和新地理市场扩张后，有机会长成一家大的嵌入式保险基础设施公司。
topRisks:
- name: 监管分发负担
  description: 一旦产品处理推荐或成保流程，就可能触发牌照、销售行为和保险公司合规要求，拖慢扩张。
  mitigation: 先在英国与持牌保险经纪或 MGA 合作，把产品定位成基础设施和编排层，在进入新市场前先把合规边界写清楚。
- name: 触发精度不够
  description: 账本和增长事件未必能干净映射到保障需求，结果可能是提醒不相关，或者报价质量很差。
  mitigation: 先用明确触发器加三类险种上线，早期保留人工复核规则层，再用报价和成保反馈把模型收紧。
- name: 平台或保险公司绕过你
  description: 一旦附加经济性被看清，大型 SME fintech 或保险公司可能会想用一个单一保险公司组件取代这套产品。
  mitigation: 靠多保险公司预填、保险凭证钱包、续保与缺口检测工作流，以及更难在单点集成里重建的跨平台基准数据来拉开差距。
