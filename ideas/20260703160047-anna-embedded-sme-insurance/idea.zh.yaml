problem: 英国微型企业一旦完成注册、拿下第一份客户合同、第一次招人，或买工作设备，往往立刻就要拿出保障证明。但触发点明明发生在银行、记账和管理工具里，真正购买保险却还得跳到割裂的外部流程。创始人要在经纪网站之间来回跳、反复重填公司资料、自己猜该买哪种险，很多人会一直拖，直到客户、房东或采购团队把流程卡死。SME 金融平台明明已经能在账本里看见这些意图，甚至看见现有保费支出，却没有基础设施把这些时刻直接转成成保保单和可复用的保险凭证。
targetUser:
  primary: 服务已注册 1-10 人企业的英国 SME 金融 app 与公司注册 app 里的产品和变现负责人。
  secondary: 对投保附加率、凭证交付和续保收入负责的保险运营与合作负责人。
  buyer: 嵌入式服务总经理或产品副总裁
startupThesis:
  nonObviousInsight: 真正能赢的切口不是再做一个 SME 保险比价前台，而是一台触发引擎：把金融平台里的公司注册、账本、工资、开票和设备支出事件，转成一张实时保障图谱，在创始人真正开始比价之前，就知道他该补什么保障。ANNA 已经显示近五分之一客户在记录保险保费，首要机会不是只吃新注册公司，而是先把现有保费支出拉回平台、顺手补齐保障缺口。
  beachhead: 服务英国已注册 1-10 人咨询公司、代理机构、电工、水管工和安装承包商的商业银行 app 与公司注册 app；这些客户通常在注册后 90 天内就需要公众责任险、专业责任险或工具险。
  wedge: 一套账本感知的保险触发引擎加保险凭证钱包：读取公司注册、发票、工资和费用事件，预填核保数据，拉起正确的 app 内报价流程，并把可分享的保障凭证收起来。
  whyNowCatalyst: ANNA 与 Admiral 的上线，再加上已披露的 £12.5M 平台内保费支出，说明 SME 管理平台现在既有分发入口，也看得到真实支出，终于能在创始人离开工作流前把保险嵌进去。
  ventureScalePath: 先做英国 SME 金融 app 的触发层和凭证层，再往续保优化、持续保障缺口检测、多保险公司核保 API、理赔首报，以及其他市场的会计、工资和垂直 SaaS 平台上的嵌入式保险基础设施扩展。
solution: 产品以事件驱动的保险层接入 SME 金融 app 与公司注册 app。它盯住公司注册数据、银行流水、记账分类、工资事件、发票模式和设备支出，判断客户大概率需要公众责任险、专业责任险还是工具险。触发器一响，系统就把核保资料预填好，在 app 内拉起对应报价，并把签发后的保险凭证放进绑定企业档案的可分享保障钱包里。买完之后，它还会继续盯增长变化和续保日期，在客服工单冒出来之前先提示保障缺口、加保需求或凭证请求。对平台来说，这让保险不再只是一条静态导流链接，而成了持续变现和留存的一块入口。
goToMarketSeed:
  firstCustomer: 一家英国 SME 数字银行或公司注册 app，拥有 50,000-150,000 家已注册客户，在代理机构和工种服务行业渗透深，并且已经能看到客户在平台外支付保险保费。
  buyingTrigger: 客户需要第一份合同、第一次招聘或工具采购的保障证明时，支持工单或转化流失开始冒出来；同时账本数据又显示已有保险保费正在平台外流出。
  currentAlternative: 静态导流链接、比价网站、单一保险公司的报价组件、打电话给经纪人，以及躺在邮箱或共享盘里的保险凭证。
  switchingReason: 这条轨道能把已知的生命周期与账本事件，直接变成预填好的 app 内成保流程和可复用凭证，理论上既能抬高附加投保率、把保费拉回平台，又不用给保险运营额外堆人。
  pricingHypothesis: 平台费，加成保保费分成或按激活保单收费；保险凭证钱包席位和续保自动化另收费。
