differentiator: >-
  Comparison sites optimize lead generation and incumbents optimize quoting once a founder shows up. This company wins
  one layer earlier by using operational triggers inside finance platforms to know who needs which cover and when, then
  carrying proof of cover forward as a reusable artifact. The event mappings, attach-rate benchmarks, and
  multi-platform integrations create a compounding distribution and underwriting moat that a single-carrier widget does
  not.
