problem: >-
  When a UK microbusiness incorporates, lands its first client contract, hires staff, or buys work equipment, it
  suddenly needs proof of cover, but the trigger lives in banking, bookkeeping, and admin tools while the purchase still
  happens in disconnected insurance flows. Founders bounce to broker sites, retype company data, guess the right cover,
  and often postpone the task until a client, landlord, or procurement team blocks the workflow. SME finance platforms
  already see the intent and even the existing premiums in their ledgers, but they lack the infrastructure to turn those
  moments into bound cover and reusable certificates.
targetUser:
  primary: >-
    Product and monetization leaders at UK SME finance and company-formation apps serving incorporated 1-10 person
    businesses.
  secondary: Insurance operations and partnership managers responsible for attach rate, certificate delivery, and renewal revenue.
  buyer: GM of embedded services or VP Product
startupThesis:
  nonObviousInsight: >-
    The winning wedge is not another SME insurance comparison front end. It is a trigger engine that turns
    incorporation, ledger, payroll, invoicing, and equipment-spend events inside finance platforms into a live coverage
    graph that knows when a founder needs protection before the founder starts shopping. Because one in five ANNA
    customers already records insurance premiums, the first opportunity is to recapture existing spend and close coverage
    gaps, not just to monetize new formations.
  beachhead: >-
    UK business-banking and company-formation apps serving incorporated 1-10 person consultancies, agencies,
    electricians, plumbers, and installers that need public liability, professional indemnity, or tools cover within 90
    days of formation.
  wedge: >-
    A ledger-aware insurance trigger engine and certificate wallet that reads incorporation, invoice, payroll, and
    expense events, pre-fills underwriting data, launches the right in-app quote, and stores shareable proof of cover.
  whyNowCatalyst: >-
    ANNA's Admiral launch plus the disclosed 12.5 million pounds of already-expensed premiums show SME admin platforms
    now have both the distribution surface and the spend visibility to embed insurance before founders leave the
    workflow.
  ventureScalePath: >-
    Start as the trigger and certificate layer for UK SME finance apps, then expand into renewal optimization,
    continuous coverage-gap detection, multi-carrier underwriting APIs, claims first-notice-of-loss, and embedded
    insurance infrastructure across accounting, payroll, and vertical SaaS platforms in other markets.
solution: >-
  The product plugs into SME finance and company-formation apps as an event-driven insurance layer. It watches
  incorporation data, bank feeds, bookkeeping categories, payroll events, invoice patterns, and equipment expenses to
  infer when a customer likely needs public liability, professional indemnity, or tools cover. When a trigger fires, it
  pre-populates the underwriting packet, launches the right in-app quote, and stores the issued certificate in a
  shareable coverage wallet tied to the business profile. After purchase, it monitors growth changes and renewal dates
  to flag gaps, top-up needs, or proof-of-cover requests before support tickets start. For the platform, it turns
  insurance from a static referral link into a recurring monetization and retention surface.
goToMarketSeed:
  firstCustomer: >-
    A UK SME neobank or company-formation app with 50,000-150,000 incorporated customers, strong usage among agencies
    and trades, and evidence that customers already expense insurance off-platform.
  buyingTrigger: >-
    Support tickets or drop-off when customers need proof of cover for a first client contract, first hire, or
    equipment purchase, plus ledger data showing existing insurance premiums leaving the platform.
  currentAlternative: Static referral links, comparison sites, single-carrier quote widgets, broker phone calls, and certificates stored in email or shared drives.
  switchingReason: >-
    The rail turns known lifecycle and ledger events into prefilled in-app bind flows and reusable certificates, which
    should lift attach and recapture premium spend without adding insurance-ops headcount.
  pricingHypothesis: Platform fee plus percentage of bound premium or per activated policy, with add-ons for certificate wallet seats and renewal automation.
