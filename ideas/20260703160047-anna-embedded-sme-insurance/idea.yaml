jobsToBeDone:
  - job: >-
      When a microbusiness hits a first client contract, first hire, or tool purchase, help a platform launch the right
      prefilled cover flow and issue proof of cover, so the customer can keep onboarding or work activation moving.
    currentAlternative: Off-platform comparison sites, broker email threads, and manual certificate chasing.
    successMetric: Time from trigger to issued certificate, quote-to-bind conversion, and support tickets per 100 triggered customers.
  - job: >-
      When customers already pay insurance elsewhere, help a platform identify replacement or top-up opportunities from
      ledger and growth data, so it can recapture premium spend and grow ARPU without becoming a broker call center.
    currentAlternative: Annual email cross-sell campaigns, static referral links, and manual insurance-partner outreach.
    successMetric: Bound-premium recapture rate and attach-rate lift among customers already expensing insurance.
ideaScorecard:
  signalStrength:
    score: 4
    rationale: Two verified same-day reports include a named partnership, 100,000 plus target customers, and disclosed in-app premium-spend data rather than vague trend language.
  painIntensity:
    score: 4
    rationale: Missing or delayed cover blocks contracts, equipment use, and early growth, but urgency is episodic rather than constant for every SME.
  wedgeClarity:
    score: 5
    rationale: A trigger engine plus prefill and certificate wallet for three concrete SMB cover types is narrow, testable, and easy for a design partner to evaluate.
  defensibility:
    score: 4
    rationale: Defensibility comes from event mappings, attach benchmarks, carrier integrations, and reusable coverage artifacts, though large platforms or carriers could build pieces over time.
  ventureScale:
    score: 4
    rationale: The beachhead is narrow, but expansion into renewals, claims, additional cover lines, more partner platforms, and new geographies supports a large embedded-insurance infrastructure company.
topRisks:
  - name: Regulatory distribution burden
    description: Handling recommendations or bind flows can trigger licensing, conduct, and carrier-compliance requirements that slow expansion.
    mitigation: Start in the UK with licensed broker or MGA partners, position the product as infrastructure and orchestration, and codify compliance boundaries before new geographies.
  - name: Weak trigger precision
    description: Ledger and growth events may not map cleanly to coverage need, creating irrelevant nudges or poor quote quality.
    mitigation: Launch with explicit triggers and three cover types, keep a human-reviewed rules layer at first, and tighten models using quote and bind feedback loops.
  - name: Platform or carrier disintermediation
    description: Large SME fintechs or insurers may try to replace the product with a single-carrier widget once attach economics become visible.
    mitigation: Differentiate with multi-carrier prefill, certificate wallet, renewal and gap-detection workflows, and cross-platform benchmark data that are harder to recreate in a point integration.
