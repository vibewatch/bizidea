slug: ledger-aware-insurance-rail
date: '2026-07-03'
currency: USD
modelStartMonth: 2026-08
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-08
  unit: YYYY-MM
  source: '[BP date 2026-07-03] 基准情景从 business-plan 日期后的第一个完整月份开始。'
- id: A2
  name: pre-seed 交割后起始现金
  value: '2400.0'
  unit: USDK
  source: '[BP fundingAsk targetFundingRangeUsd $2-4M; BP fundingAsk runwayMonths 18] 基准情景采用 $2.4M 交割额，这样公司既能跑到第 24 个月的验证点，也还能留出大约 6 个月缓冲。'
- id: A3
  name: 模型中的客户单位
  value: 活跃付费合作平台
  unit: definition
  source: '[BP gtm wedge; BP investorMemo firstCustomer] customersEop 统计的是已变现的合作平台入口，不是终端 SME 数量。'
- id: A4
  name: 起始付费合作平台数（M1）
  value: '0'
  unit: count
  source: '[BP milestones 0-12 months] 计划从零收入起步；在合规设计和 MVP 上线完成前，不会拿到首个付费合作平台。'
- id: A5
  name: 每个活跃付费合作平台的综合年收入
  value: '225.0'
  unit: USDK per partner-year
  source: '[BP investorMemo firstCustomer initialContract roughly GBP40k-80k pilot then GBP150k-300k annual platform economics; Research market.som $3.2M on about 25k activated firms] 基准情景采用中位合作平台价值，对应每个成熟合作平台大约激活 1.8k 家企业，且符合研究里的轨道收入水平。'
- id: A6
  name: 收入确认方法
  value: 按期内平均活跃付费合作平台数确认
  unit: formula
  source: 以 BP 试点打法为锚的创业财务经验：新合作平台在落地当月或当季按半期确认收入，随后再按完整稳态收入确认。
- id: A7
  name: 第 1 年合作平台爬坡
  value: M6 落地首个付费试点；M9 落地第二个付费试点；Y1 结束时有 2 个活跃付费合作平台
  unit: timing
  source: '[BP product sixMonth; BP milestones 0-12 months] 这是对 2-3 家共创客户的保守读取：到年末真正变现的只有 2 家。'
- id: A8
  name: 第 2 年季末合作平台数
  value: Q1Y2 3; Q2Y2 4; Q3Y2 5; Q4Y2 6
  unit: count
  source: '[BP milestones 12-24 months] 基准情景让 Y2 以 6 家合作平台收官，落在既定 4-6 家生产环境里程碑的上沿。'
- id: A9
  name: 第 3 年季末合作平台数
  value: Q1Y3 8; Q2Y3 10; Q3Y3 12; Q4Y3 14
  unit: count
  source: '[BP milestones 24-36 months; BP product twentyFourMonth; Research distributionChannels] 第 3 年增长来自切进会计和工资入口，但收官 ARR 仍略低于研究里的 $3.2M SOM。'
- id: A10
  name: 毛利率爬坡
  value: Y1 上线月份 60-67%；Y2 各季度 70-75%；Y3 各季度 75-76%
  unit: percent
  source: '[BP businessModel targetGrossMarginPct 75; BP operations human review queue first 12 months] 毛利率起步低于目标，因为合规复核和经纪协同还要靠人工；随着触发规则和凭证服务标准化，才会逐步收敛到目标水平。'
- id: A11
  name: 创始人/CEO 全成本现金薪酬
  value: '120.0'
  unit: USDK annual per FTE
  source: '[BP team Founder / CEO] 参考 pre-seed 阶段低于市场价的创始人工资。'
- id: A12
  name: 创始工程师全成本现金薪酬
  value: '180.0'
  unit: USDK annual per FTE
  source: '[BP team Founding eng] 参考要亲手搭集成、预填和凭证工作流的资深技术创始人薪酬。'
- id: A13
  name: 保险合规与合作负责人全成本现金薪酬
  value: '150.0'
  unit: USDK annual per FTE
  source: '[BP team Insurance compliance and partnerships lead] 参考负责销售行为边界和保险公司或经纪关系的资深运营岗位薪酬。'
- id: A14
  name: 产品与数据工程师全成本现金薪酬
  value: '165.0'
  unit: USDK annual per FTE
  source: '[BP team Product and data engineer] 参考早期专注于触发精度、分析和实验的工程岗位薪酬。'
- id: A15
  name: 合作伙伴实施与成功负责人全成本现金薪酬
  value: '125.0'
  unit: USDK annual per FTE
  source: '[BP team Partner implementation and success lead] 参考第一个能缩短上线周期、并把合作指标埋起来的运营岗位薪酬。'
- id: A16
  name: 客户经理全成本现金薪酬
  value: '140.0'
  unit: USDK annual per FTE
  source: '[BP gtm founder-led direct sales and co-sell motion] 参考在试点验证清楚之后才会加入的首个带明确业绩指标的销售岗位薪酬。'
- id: A17
  name: 解决方案/平台工程师全成本现金薪酬
  value: '170.0'
  unit: USDK annual per FTE
  source: '[BP product twelveMonth and twentyFourMonth] 参考把定制化合作方集成沉淀成可复用模板的工程岗位薪酬。'
- id: A18
  name: 续保与运营负责人全成本现金薪酬
  value: '115.0'
  unit: USDK annual per FTE
  source: '[BP businessModel expansionLevers renewals; BP operations] 参考在规模化阶段负责续保工作流和凭证支持的运营岗位薪酬。'
- id: A19
  name: GTM / 合作伙伴成功经理全成本现金薪酬
  value: '130.0'
  unit: USDK annual per FTE
  source: '[BP milestones 24-36 months] 参考第一位 post-seed 风格的拓展岗位薪酬；它支持渠道扩张，但还不意味着要堆一整支销售团队。'
- id: A20
  name: 招聘节奏
  value: M1 配齐创始人和创始工程师；M3 招合规负责人；M6 招产品/数据工程师；M9 招实施负责人；M15 招客户经理；M18 招解决方案工程师；M28 招续保运营；M31 招 GTM / 合作伙伴成功经理
  unit: timing
  source: '[BP team startTiming; BP sequencingRationale] 已命名的五人核心团队会在 Y1 内配齐，之后的岗位只有在部署可复制、生产环境合作平台被证明之后才陆续加入。'
- id: A21
  name: 职能薪酬分摊
  value: 创始人 70% 计入 S&M / 30% 计入 G&A；创始工程师和解决方案工程师 100% 计入 R&D；合规负责人 50% 计入 S&M / 50% 计入 G&A；产品/数据工程师 100% 计入 R&D；实施负责人 35% 计入 S&M / 35% 计入 R&D / 30% 计入 G&A；客户经理 100% 计入 S&M；续保运营 60% 计入 S&M / 40% 计入 G&A；GTM / 合作伙伴成功经理 70% 计入 S&M / 30% 计入 G&A
  unit: policy
  source: '[BP team rationales; BP operations] 分摊方式按谁在卖、谁在做产品和集成、谁在处理受监管运营来划分。'
- id: A22
  name: 非薪酬运营支出爬坡
  value: S&M 非薪酬支出：上线前每月约 $4K；首个试点阶段约 $6K；双试点阶段约 $8K；Y2 放大阶段约 $11K；Y3 前段约 $12K；第二位 GTM 招聘后约 $14K。R&D 工具：早期约 $8K；产品/数据工程师到岗后约 $10K；真实试点上线后约 $12K；Y2 期间约 $14K；Y3 前段约 $15K；更大范围扩张后约 $16K。G&A：合规负责人入职前约 $6K；上线前尽调阶段约 $7K；首个试点阶段约 $8K；Y1 后段约 $9K；Y2 期间约 $11K；Y3 前段约 $12K；Y3 放大后约 $13K。
  unit: USDK per month
  source: 这是对一家精简但合规负担较重的 B2B 保险软件公司的创业财务经验判断，覆盖云资源、差旅、法务和合作审计成本，但不假设需要一支服务交付团队。
- id: A23
  name: 合作平台销售周期基线
  value: 从合格平台到付费试点大约 90-120 天，再用约一个季度从试点转成年化生产合同
  unit: days
  source: '[BP market buyingProcess; BP gtm funnelTargets] 合规评审和受监管合作方设计，让这套销售周期虽然切口很窄，却依然带着企业级的味道。'
- id: A24
  name: 每新增一个付费合作平台的综合 CAC
  value: '115.0'
  unit: USDK per new partner
  source: '[BP gtm channels and funnelTargets] 该值从 Y2 的销售与市场投入结构推导而来，对应一年净增 4 家合作平台；创始人主导销售加经纪或 MGA 转介绍，把 CAC 压在重企业软件基准之下。'
- id: A25
  name: 用于单位经济的月度 logo 流失率
  value: '1.5'
  unit: percent
  source: '[BP businessModel expansionLevers renewals; BP risks partner concentration and single-carrier substitutes; Startup-finance heuristic] 一旦保险凭证工作流嵌进合作方运营，合同应该比较黏；但早期集中度高，仍需要给出不低的流失假设。'
- id: A26
  name: 现金转换政策
  value: 期末现金 = 期初现金 + 累计 EBITDA
  unit: formula
  source: 创业财务经验判断：这个早期软件公司模型不考虑债务、税项、资本开支或显著的营运资金波动。
- id: A27
  name: 融资规模规则
  value: 融资规模要足以做到 6 家生产环境合作平台、第二条保险经纪或 MGA 通路、以及可重复的 90 天内实施交付，并额外保留大约 6 个月缓冲
  unit: policy
  source: '[BP fundingAsk runwayMonths 18; BP milestones 12-24 months] 这轮 pre-seed 的规模，就是按下一轮验证点前需要跑到哪里来反推的。'
- id: A28
  name: 资金用途结构
  value: 工程 42%；GTM 27%；G&A 13%；缓冲 18%
  unit: percent of pre-seed
  source: '[BP useOfFundsSummary; base-case cost mix] 这与模型里为完成集成、拿下生产环境合作平台，并保住 6 个月缓冲所需的支出结构一致。'
