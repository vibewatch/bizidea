scenarios:
  downside:
    description: 合规批准和转生产各自慢了大约一个季度，合作范围更窄，人工复核也更久地压不下去。
    y3RevenueK: 1627.5
    y3EbitdaK: -503.7
    cashLowPointK: 193.3
    keyAssumptionChanges:
    - 首个付费试点推迟到 M7，Q4Y3 收官时活跃付费合作平台只有 11 家，而不是 14 家。
    - 每家合作平台的综合年价值最终落在约 $210K，而不是基准情景的 $225K 中位数。
    - 因为人工合规复核和经纪支持长期偏高，毛利率收官只到约 74%。
  base:
    description: 两个付费试点在 Q4Y2 前转成 6 家生产环境合作平台；单个平台价值维持在 BP 年化经济区间中位附近；毛利率到 Y3 达到目标。
    y3RevenueK: 2250.0
    y3EbitdaK: 6.9
    cashLowPointK: 835.0
    keyAssumptionChanges:
    - M6 和 M9 的试点让 Y1 以 2 家活跃付费合作平台收官，随后模型在 Q4Y2 走到 6 家，Q4Y3 走到 14 家。
    - 每家活跃合作平台的综合年价值维持在约 $225K，与 BP 中位值以及每家成熟合作平台大约激活 1.8k 家企业的假设一致。
    - 随着触发规则和保险凭证工作流标准化，毛利率会从 Y1 上线月份的 60-67% 提升到 Y3 的约 75-76%。
  upside:
    description: 第 3 家付费合作平台在年内更早落地，会计和工资渠道更早打开，续保与新增险种同时抬高 ACV 和毛利率。
    y3RevenueK: 2937.5
    y3EbitdaK: 562.5
    cashLowPointK: 1229.7
    keyAssumptionChanges:
    - 公司在 Y1 结束时已有 3 家活跃付费合作平台，Q4Y3 则达到 18 家，而不是 14 家。
    - 由于续保自动化和新增险种附加更早发生，综合年价值提升到约 $235K。
    - 因为实施复用和路由自动化更快压低服务负担，毛利率能升到约 77%。
sensitivity:
- variable: ARPU
  downsideCase: 部署范围一直偏窄，续保模块又来得更晚，于是综合年合作平台价值只落在约 $210K。
  baseCase: 收官时每个活跃付费合作平台的综合年价值约为 $225K。
  upsideCase: 新增险种和续保附加把综合年合作平台价值抬到约 $240K。
  y3RevenueImpactK: -150.0
  cashImpactK: -165.6
- variable: CAC
  downsideCase: 全成本 CAC 升到约 $145K，且到 Q4Y3 少关一单合作平台。
  baseCase: 依靠创始人主导销售加受监管合作方转介绍，CAC 稳在约 $115K。
  upsideCase: 更强的保险公司和经纪导入，把 CAC 压到约 $95K。
  y3RevenueImpactK: -168.8
  cashImpactK: -210.0
- variable: 流失率
  downsideCase: 如果保险凭证钱包使用率和续保回收都偏弱，月度 logo 流失率会上升到 2.5%。
  baseCase: 一旦工作流嵌进合作方运营，月度 logo 流失率维持在 1.5%。
  upsideCase: 续保和保障证明工作流越做越黏后，月度 logo 流失率会改善到 1.0%。
  y3RevenueImpactK: -180.0
  cashImpactK: -150.0
- variable: 销售周期
  downsideCase: 首个付费试点推迟到 M7，转生产也整体慢了约一个季度。
  baseCase: 首批付费试点在 M6 和 M9 落地，且从试点到生产的转化周期大约维持在一个季度。
  upsideCase: Y1 收官前会多转化一家共创客户，后续季度的签约速度也能大约快一个季度。
  y3RevenueImpactK: -506.2
  cashImpactK: -455.1
- variable: 毛利率
  downsideCase: 因为人工复核和经纪支持一直居高不下，收官毛利率只有约 74%。
  baseCase: 随着预填和保险凭证服务标准化，毛利率达到约 75-76%。
  upsideCase: 因为路由复用更快、手工例外处理更少，毛利率能到约 77%。
  y3RevenueImpactK: 0.0
  cashImpactK: -61.8
- variable: 招聘节奏
  downsideCase: 在合作方需求还没验证可复制之前，客户经理和解决方案工程师就各自提前两个季度入职。
  baseCase: 所有 Y1 之后的招聘都建立在试点完成转生产、实施复用已经显现的前提上。
  upsideCase: 有一个 Y2 之后的扩张岗位可以推迟招聘，而不会拖慢合作方上线。
  y3RevenueImpactK: 0.0
  cashImpactK: -155.4
modelDiagram:
  title: 单位经济流转图
  mermaid: |
    flowchart LR
      QualifiedPlatforms --> PaidPilots
      PaidPilots --> ProductionPartners
      ProductionPartners --> ActivatedFirms
      ActivatedFirms --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
- checkName: 收入引擎
  finding: 基准情景收入来自活跃付费合作平台从 Y1 结束时的 2 家，增长到 Q4Y2 的 6 家、Q4Y3 的 14 家；每家合作平台的综合年价值约为 $225K。
- checkName: 必须跑对的事
  finding: 公司必须把“试点到生产”的转化压在约一个季度附近，因为一旦销售周期滑向 downside，现金低点会少出大约 $455K。
- checkName: 模型会在哪儿断
  finding: 如果合作平台爬坡放慢、ACV 落到约 $210K、毛利率又卡在目标之下，downside 情景会把现金压到约 $193K 的低点。
- checkName: 下一轮前要证明什么
  finding: 这轮 pre-seed 应该把公司送到 6 家生产环境合作平台、第二条保险经纪或 MGA 通路，以及到第 24 个月时可重复的 90 天内实施交付，再去融资下一轮。
sanityChecks:
  ruleOf40: Y3 增长 150.0% + EBITDA 利润率 0.3% = 150.3%。
  burnMultiple: Y2 为 1.02x（在比 Y1 多出的 $712.4K 净新增收入上，EBITDA 亏损为 -$729.2K）；Y3 略微转正。
  revenuePerFte: 按 Q4 的 9 名 FTE 计算，Y3 人均收入约 $250.0K（SaaS 基准为 $200-400K）。
  flags:
  - 基准情景仍假设前两个已变现试点能在 M9 前落地，尽管 FCA、隐私和合作方审批摩擦都真实存在；光是销售周期 downside，就会把现金低点再压掉约 $455K。
  - 约 $3.15M 的收官 ARR 已经接近研究里的三年 SOM，因此 Y3 之后的增长不能只靠继续深耕同一批数字银行切口，还必须切进会计、工资和续保。
  - ARPU 假设每家成熟合作平台都能跑到大约 1.8k 家激活企业，并达到研究里的轨道收入水平；如果合作平台采用深度不够，ACV 和回本期都会承压。
  - 模型把 EBITDA 当成现金，且没有计入税项、经纪应收款时序、理赔处理准备金，或任何直接的监管资本要求。
