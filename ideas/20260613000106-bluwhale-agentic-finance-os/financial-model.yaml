modelDiagram:
  title: unit economics flow
  mermaid: |-
    flowchart LR
      Leads[Community and advisor leads] --> PaidSetup[Paid setup and simulation]
      PaidSetup --> LivePolicies[Live policy households]
      LivePolicies --> Revenue[Subscription and setup revenue]
      LivePolicies --> Referrals[Household and advisor referrals]
      Referrals --> Leads
      Revenue --> GrossProfit[Gross profit after support and connector costs]
      GrossProfit --> Cash[Cash runway]
modelSanity:
- checkName: Revenue engine
  finding: Base-case revenue comes from scaling active paid households from 24 at M12 to 700 by Q4Y2 and 4,000 by Q4Y3 at roughly $420 of blended annual household revenue.
- checkName: Must go right
  finding: Simulation users must authorize one live policy quickly enough that advisor and community referrals compound before support and compliance costs overwhelm the subscription envelope.
- checkName: Model breaks if
  finding: If pricing compresses toward $360 and active households reach only about 2,500 by Q4Y3, the downside case runs roughly $168K below zero before the next round.
- checkName: Next-round proof
  finding: A seed raise is justified once Q4Y2 shows about 700 active households, sub-10% manual-correction rates, and repeatable referral CAC below broad paid-direct channels.
sanityChecks:
  ruleOf40: Y3 growth 678.5% + EBITDA margin -64.3% = 614.2% (directionally inflated by a tiny Y2 revenue base).
  burnMultiple: Y2 burn multiple 2.84x on $283.9K net new ARR, improving to 0.39x in Y3 on $1386.0K net new ARR.
  revenuePerFte: $120.8K Y3 on 7 exit FTE (benchmark $200-400K SaaS)
  flags:
  - The base case requires advisor and community acquisition to scale from 24 active households at M12 to 700 by Q4Y2; if referral velocity lags, the $2.0M round is too small.
  - Even with 4,000 active households and near-target gross margin, Y3 EBITDA remains negative because price points stay anchored near premium personal-finance software levels while compliance and support still matter.
  - Revenue per FTE remains below typical SaaS benchmarks, so the next round depends on proving that onboarding and exception handling are becoming genuinely self-serve rather than concierge-heavy.
  - The model assumes the company can delay the third engineering hire until late Q4Y3; any earlier hiring without faster conversion would tighten runway materially.
