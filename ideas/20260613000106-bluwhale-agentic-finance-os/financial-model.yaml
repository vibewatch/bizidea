scenarios:
  downside:
    description: Trust converts more slowly, pricing compresses toward premium-dashboard levels, and the product exits Y3 as a smaller paid household base with more support drag.
    y3RevenueK: 459.0
    y3EbitdaK: -826.9
    cashLowPointK: -168.2
    keyAssumptionChanges:
    - Blended annual revenue per active household falls from $420 to $360.
    - Q4Y3 ends at about 2,500 active paid households instead of 4,000.
    - Gross margin stalls near 67% because live-policy support and exception handling remain manual longer.
  base:
    description: The company converts the first paid setup cohorts, scales advisor and community referrals, and exits Y3 with 4,000 active households on a still-lean team.
    y3RevenueK: 845.25
    y3EbitdaK: -543.79
    cashLowPointK: 143.2
    keyAssumptionChanges:
    - Matches A1-A20 with 24 active paid households at M12, 700 by Q4Y2, and 4,000 by Q4Y3.
    - Uses $420 blended annual revenue per active household under A5 and average-active-household recognition under A6.
    - Gross margin improves toward the 70% BP target while the team grows from 2 to 7 FTE over the modeled period.
  upside:
    description: Referral channels outperform, template-driven onboarding scales faster, and premium-tier adoption nudges both household count and blended revenue above the base plan.
    y3RevenueK: 1147.5
    y3EbitdaK: -310.1
    cashLowPointK: 355.8
    keyAssumptionChanges:
    - Blended annual revenue per active household rises from $420 to $450.
    - Q4Y3 ends near 5,200 active paid households instead of 4,000.
    - Gross margin reaches about 72% as policy templates and connector support become more repeatable.
