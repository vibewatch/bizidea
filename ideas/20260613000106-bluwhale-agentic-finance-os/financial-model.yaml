slug: hybrid-comp-payday-autopilot
date: '2026-06-13'
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: Model start month
  value: 2026-07
  unit: YYYY-MM
  source: '[BP date 2026-06-13] Base case starts in the first full month after the business-plan date.'
- id: A2
  name: Opening cash from pre-seed round
  value: '2000.0'
  unit: USDK
  source: '[BP fundingAsk targetFundingRangeUsd $2-4M] Base case uses the low end of the stated range because the hiring plan stays lean through Y3.'
- id: A3
  name: Customer unit in the model
  value: active paid household with at least one live policy
  unit: definition
  source: '[BP businessModel.unitOfValue] customersEop tracks active paying households; first-year onboarding revenue is blended into annualized household revenue instead of modeled as a separate services line.'
- id: A4
  name: Starting paid households (M1)
  value: '0'
  unit: count
  source: '[BP milestones 0-12 months] The company begins pre-revenue and converts paid households only after simulation-first onboarding starts.'
- id: A5
  name: Blended annual revenue per active paid household
  value: '0.42'
  unit: USDK per year
  source: '[BP investorMemo.firstCustomer.initialContract $149-$299 setup + $180-$300 annual subscription; BP gtm.funnelTargets 20% premium tier within 12 months] Uses roughly $199 of onboarding value plus about $240 of recurring value, rounded down for conservatism.'
- id: A6
  name: Revenue recognition method
  value: average active households per period
  unit: formula
  source: 'Startup-finance heuristic: new households go live throughout the month or quarter, so revenue is modeled on average active customers rather than end-of-period counts.'
- id: A7
  name: Year 1 net new paid households by month
  value: '[0,0,0,1,1,2,2,2,3,4,4,5]'
  unit: count
  source: '[BP milestones 0-12 months] Ends Y1 at 24 active paid households, which sits inside the plan to convert 20-50 households into paid setup users and early live users.'
- id: A8
  name: Year 2 net new paid households by quarter
  value: '[60,120,180,316]'
  unit: count
  source: '[BP milestones 12-24 months; BP experimentRoadmap advisor and community channel tests] Base case reaches 700 active households by Q4Y2 as templates, paid setup, and three referral partners begin compounding.'
- id: A9
  name: Year 3 net new paid households by quarter
  value: '[400,700,1000,1200]'
  unit: count
  source: '[BP milestones 24-36 months; research.market.som 25,000 paying households at year-3 reach] Base case exits Y3 at 4,000 active households, well below the researched 25,000-household SOM but high enough to show self-serve scale.'
- id: A10
  name: Gross margin ramp
  value: 55-62% in Y1, 64-68% in Y2, and 69-70% in Y3
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct 70; BP operations; research.regulatoryTechnicalConstraints] Gross margin starts below target because support, approvals, and connector exceptions are manual early on, then approaches the BP target by Y3.'
- id: A11
  name: Monthly churn for unit economics
  value: '2.5'
  unit: percent
  source: Startup-finance heuristic for a trust-sensitive paid consumer finance subscription where retention can be strong after live activation but is still early-stage and behavior-dependent.
- id: A12
  name: Fully loaded CAC
  value: '0.22'
  unit: USDK per active paid household
  source: '[BP gtm.channels; BP funnelTargets; BP operatingAssumptions on advisor referrals] Assumes advisor and community channels outperform broad paid acquisition and that paid setup fees partially offset onboarding spend.'
- id: A13
  name: Loaded salary bands
  value: Founder $120K; engineering $150K; operations/customer success $85K; growth/partnerships $115K; compliance/support $95K
  unit: USDK annual per FTE
  source: Startup-finance heuristic for a lean U.S.-based pre-seed fintech team with meaningful but not top-of-market cash salaries.
- id: A14
  name: Hiring sequence
  value: Founder and engineer in M1; operations/customer success in M7; growth/partnerships in M10; second engineer in M16; compliance/support in M22; third engineer in M35
  unit: timing
  source: '[BP team startTiming Month 0/6/9; BP strategicChoices.sequencingRationale] The model follows the plan to add operations before aggressive growth and uses smooth post-Y1 hires consistent with a trust-first rollout.'
- id: A15
  name: Payroll cost allocation
  value: Founder 55% S&M / 15% R&D / 30% G&A; engineers 100% R&D; ops/CS 25% S&M / 25% R&D / 50% G&A; growth 80% S&M / 20% G&A; compliance/support 10% S&M / 20% R&D / 70% G&A
  unit: policy
  source: '[BP team role descriptions; BP operations] Reflects founder-led selling, engineering-led product work, and a support/compliance load that sits mostly in G&A.'
- id: A16
  name: Non-payroll opex ladder
  value: Y1 monthly S&M $2.5K-$5.0K, R&D $4.5K-$7.0K, G&A $3.5K-$6.0K; Y2 quarterly S&M $18K-$27K, R&D $21K-$30K, G&A $18K-$22.5K; Y3 quarterly S&M $30K-$39K, R&D $33K-$42K, G&A $24K-$28.5K
  unit: USDK
  source: '[BP operations; BP risks; research.regulatoryTechnicalConstraints] Covers cloud, legal, compliance tooling, community sponsorships, and support systems without assuming a large services bench.'
- id: A17
  name: Funding sizing rule
  value: raise to Q4Y2 milestone plus roughly 6 months of buffer
  unit: policy
  source: '[BP fundingAsk runwayMonths 18; financial-modeler requirement] The pre-seed is sized to hit Y2 proof milestones and still leave buffer for a seed process.'
- id: A18
  name: Cash flow simplification
  value: ending cash equals opening cash plus cumulative EBITDA
  unit: formula
  source: 'Startup-finance heuristic: assumes no debt, capex, or material working-capital swings for this asset-light software business.'
- id: A19
  name: Downside case deltas
  value: ARPU $0.36K, Y3 exit 2,500 households, and gross margin stalls at 67%
  unit: scenario inputs
  source: '[Research sensitivityCases on price ceiling, trust, and write-access limits] Downside reflects the researched risk that the product remains closer to a premium dashboard than a trusted autopilot.'
- id: A20
  name: Upside case deltas
  value: ARPU $0.45K, Y3 exit 5,200 households, and gross margin reaches 72%
  unit: scenario inputs
  source: '[BP milestones 24-36 months; BP gtm channels; research distributionChannels] Upside assumes advisor/community referrals compound faster and template-fit onboarding reduces support drag.'
