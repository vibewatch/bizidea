competitors:
- name: Monarch
  stage: 成长期
  wedge: 统一个人财务跟踪、预算编制和账户规划。
  pricing: $99/年榜价，常以入门优惠晋级。
  strength: 强汇总 UX 以及主流富裕家庭的广泛“一个地方的所有账户”定位。
  weaknessVsUs: 优化能见度和规划，不限定跨银行/经纪人/Wallet 处决与支付日或背包事件挂钩。
  sourceRefs:
  - 23
  - 24
- name: Copilot Money
  stage: 成长期
  wedge: 设计前进 AI 货币助理 支出，投资和净值。
  pricing: $95 每年开具账单。
  strength: 高端消费者 UX 和干净的付费订阅模式，不依赖广告或铅生成。
  weaknessVsUs: 公共定位的中心是跟踪和建议，而不是跨越外部铁路的行动协调。
  sourceRefs:
  - 27
- name: Origin Financial
  stage: 成长期
  wedge: 一刀切地编制预算、投资、税收 AI 以雇主健康的角度进行规划。
  pricing: $1 在主页上介绍一年的促销消费者报价; 更广泛的经济学可能包括雇主赞助。
  strength: 包罗万象的消费者规划工作 和一个可信的雇主渠道。
  weaknessVsUs: Breadth 可以稀释狭义的"国库自定义"楔形文字，公众信息在规划上比跨铁路行刑时要强。
  sourceRefs:
  - 28
- name: Betterment
  stage: 成熟厂商
  wedge: 自动投资 税收工具和现金管理 在一个信任的 Robo 堆。
  pricing: $5 较小余额/月或 0.25% 每年一次，最低限量为钚。
  strength: 一旦资金成品，就具有强大的信任，自动化的血统，并规范货币流动。
  weaknessVsUs: 内部工作最好 Betterment 而不是跨越外部经纪、工资单现金和钱包。
  sourceRefs:
  - 29
- name: Kubera
  stage: 成长期
  wedge: 自导自演的财富追踪跨越股票，密码，地产等复杂资产。
  pricing: $250 核心消费计划的年份。
  strength: 最适合具有复杂多资产资产负债表和密码曝光度的用户采用目前的替代品。
  weaknessVsUs: 仍然主要是跟踪和组织产品;它不拥有工资日/税/自动驾驶执行工作流程。
  sourceRefs:
  - 30
  - 31
