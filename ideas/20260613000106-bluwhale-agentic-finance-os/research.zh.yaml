    - 3
    - 20
  - point: 如果启动者知道哪些规则行之有效，按补偿和资产概况分列的模板性能可能会复杂化。RSU- 重， 象征重， 或多家用户。
    sourceRefs:
    - 1
    - 3
    - 28
    - 30
    - 31
  geographicConsiderations:
  - point: 美国是最佳发射市场 因为论文依赖于 CFPB1033/银行业进展，IRS 税收的复杂程度，以及美国唯一的货币流动基础设施，例如 Plaid 转会
    sourceRefs:
    - 4
    - 5
    - 13
    - 20
  - point: 国际扩张是非三角性的，因为税收、数据权利和钱包/经纪人连接规则在各法域之间差别很大，因此产品的自动化逻辑不会干净地移植。
    sourceRefs:
    - 6
    - 15
    - 37
  sensitivityCases:
  - case: 1033 项执行工作被推迟或缩小
    impact: 连接器质量和授权第三方信任的改善较慢，将产品推回只读聚合和手动跟踪。
    sourceRefs:
    - 4
    - 5
    - 6
  - case: 价格上限接近溢价 PFM 规范
    impact: 如果用户比较产品 Copilot 或者说 Monarch 而不是减税，ARPU 压缩到 $95-$120/年份和慢回报 支持-重上船。
    sourceRefs:
    - 23
    - 25
    - 27
    - 29
  - case: 加密信心仍然薄弱
    impact: 如果主流用户继续不信任秘密安全，那么最热心的早期收养者仍然集中在刚起步和秘密本地工人的一席之地，而不是广泛的富裕家庭。
    sourceRefs:
    - 10
    - 34
    - 35
    - 36
  - case: 书写权限仍按地点隔离
    impact: 如果经纪公司、交易所或钱包没有暴露足够的安全执行表面，产品有可能成为推荐引擎加清单，而不是真正的自动驾驶。
    sourceRefs:
    - 16
    - 17
    - 20
    - 24
  validationPlan:
  - priority: 高
    question: 高收入创业工人是否会批准在模拟试验后跨越外部账户的限定货币流动?
    evidenceToGather: 10-15 设计合作伙伴访谈，加上至少一个发薪日的沙盒到活生生的转换数据和一个任务工作流程。
  - priority: 高
    question: 启动能否持续减少税收和流动性错误，以证明在溢价看板应用软件上定价的合理性?
    evidenceToGather: 比较人工对自动路由结果、节省时间和保税准确性的试验数据。
  - priority: 中
    question: 哪些连接器和会场组合提供生产级的书写访问，相对于只读的能见度?
    evidenceToGather: 按银行、经纪、交换和钱包分类的连接器矩阵，有故障率和批准步骤记录。
  - priority: 中
    question: 做顾问 CPAs，或启动社区产生较低的-CAC 收购比应用商店/直接广告?
    evidenceToGather: 通过转诊、试运行和 90 天保留组别进行频道测试。
