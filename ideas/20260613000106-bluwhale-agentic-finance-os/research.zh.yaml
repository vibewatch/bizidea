    - 22
    - 23
  - point: 中间商交易、交换和钱包整合至关重要，因为用户需要能见度，并在可能情况下需要跨越应纳税投资和加密位置的行动。
    sourceRefs:
    - 17
    - 21
    - 24
    - 30
  - point: 税收和赔偿专家之所以重要，是因为第一个高价值的工作流程集中在扣款、估计付款，RSUs、选项和数字资产报告。
    sourceRefs:
    - 11
    - 12
    - 13
    - 31
    - 32
  dataMoats:
  - point: '最强的专有资产将是家庭一级的规则历史：用户批准、推翻或保持整个工资周期和托付事件的自动驾驶。'
    sourceRefs:
    - 3
    - 20
    - 22
  - point: 第二道护城河是模拟和例外数据——干燥、转帐失败、批准门槛和事件后更正——通用看板无法捕捉这些数据。
    sourceRefs:
    - 1
