    - 31
    - 32
  dataMoats:
  - point: 'The strongest proprietary asset would be household-level policy history: what users approve, override, or keep on autopilot across pay cycles and vesting events.'
    sourceRefs:
    - 3
    - 20
    - 22
  - point: A second moat is simulation and exception data—dry runs, failed transfers, approval thresholds, and post-event corrections—which generic dashboards do not capture.
    sourceRefs:
    - 1
    - 2
    - 3
    - 20
  - point: Template performance by compensation and asset profile could compound if the startup learns which policies work for RSU-heavy, token-heavy, or multi-household users.
    sourceRefs:
    - 1
    - 3
    - 28
    - 30
    - 31
  geographicConsiderations:
  - point: The United States is the best launch market because the thesis depends on CFPB 1033/open-banking progress, IRS tax complexity, and U.S.-only money-movement infrastructure such as Plaid Transfer.
    sourceRefs:
    - 4
    - 5
    - 13
    - 20
  - point: International expansion is non-trivial because tax, data-rights, and wallet/broker connectivity rules vary significantly across jurisdictions, so the product’s automation logic will not port cleanly.
    sourceRefs:
    - 6
    - 15
    - 37
  sensitivityCases:
  - case: 1033 implementation stays delayed or narrowed
    impact: Connector quality and authorized-third-party trust improve more slowly, pushing the product back toward read-only aggregation and manual follow-through.
    sourceRefs:
    - 4
    - 5
    - 6
  - case: Price ceiling remains near premium PFM norms
    impact: If users compare the product to Copilot or Monarch rather than to tax savings, ARPU compresses toward $95-$120/year and slows payback on support-heavy onboarding.
    sourceRefs:
    - 23
    - 25
    - 27
    - 29
  - case: Crypto confidence remains weak
    impact: If mainstream users continue to distrust crypto safety, the most enthusiastic early adopters remain concentrated in a niche of startup and crypto-native workers rather than broad affluent households.
    sourceRefs:
    - 10
    - 34
    - 35
    - 36
  - case: Write access remains siloed by venue
    impact: The product risks becoming a recommendation engine plus checklist instead of a true autopilot if brokerages, exchanges, or wallets do not expose enough safe execution surfaces.
    sourceRefs:
    - 16
    - 17
    - 20
    - 24
  validationPlan:
  - priority: high
    question: Will high-income startup workers authorize bounded money movement across external accounts after a simulation-only trial?
    evidenceToGather: 10-15 design-partner interviews plus sandbox-to-live conversion data on at least one payday and one vesting workflow.
  - priority: high
    question: Can the startup consistently reduce tax and liquidity mistakes enough to justify pricing above premium dashboard apps?
    evidenceToGather: Pilot data comparing manual vs. automated routing outcomes, time saved, and tax-reserve accuracy.
  - priority: medium
    question: Which connector and venue combinations provide production-grade write access versus read-only visibility?
    evidenceToGather: Connector matrix by bank, brokerage, exchange, and wallet with failure-rate and approval-step logging.
  - priority: medium
    question: Do advisors, CPAs, or startup communities produce lower-CAC acquisition than app-store/direct ads?
    evidenceToGather: Channel tests with referral conversion, trial activation, and 90-day retention cohorts.
