openQuestions:
- What percentage of the target beachhead will authorize live money movement after using only a simulation or read-only trial?
- Which external brokerages and exchanges will support reliable write actions versus only read access in a production consumer product?
- Can the product prove enough tax and liquidity benefit to support pricing materially above premium dashboard apps?
- Will advisor- or CPA-led distribution outperform direct consumer acquisition for this high-trust workflow?
