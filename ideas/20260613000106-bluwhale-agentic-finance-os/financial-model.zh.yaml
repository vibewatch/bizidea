scenarios:
  downside:
    description: 信任转换速度较慢，定价压缩到溢价-面板水平，产品退出 Y3 作为较小的付薪家庭基础， 并拖住更多的支持。
    y3RevenueK: 459.0
    y3EbitdaK: -826.9
    cashLowPointK: -168.2
    keyAssumptionChanges:
    - 每个活跃家庭的混合年收入从 $420 改为 $360。
    - Q4Y3 在大约 2 500 个活跃的有薪家庭中结束，而不是 4 000 个。
    - 差幅毛额接近 67% 因为在现场规则支持和例外处理方面，手动操作时间更长。
  base:
    description: 公司转换第一批付费设置组群、规模顾问和社区转介以及退出 Y3 有 4000 户家庭 在一个仍然没有。
    y3RevenueK: 845.25
    y3EbitdaK: -543.79
    cashLowPointK: 143.2
    keyAssumptionChanges:
    - 将 A1-A20 与 24 个在业有薪家庭匹配 M12,700 乘以 Q4Y2 和 4 000 人 Q4Y3。
    - 用途 $420 将 A5 之下的每个活跃家庭的年收入与 A6 之下的平均活跃家庭确认相结合。
    - 毛比值对 70% BP 目标，而团队从 2 到 7FTE 在建模时期。
  upside:
    description: 转诊渠道的业绩优于标准，模板驱动的入职比例更快，保费级的采用使家庭计数和收入混合在基准计划之上。
    y3RevenueK: 1147.5
    y3EbitdaK: -310.1
    cashLowPointK: 355.8
    keyAssumptionChanges:
    - 每个活跃家庭的混合年收入增加 $420 改为 $450。
    - Q4Y3 大约 5,200 户有收入的家庭，而不是 4,000 户。
    - 毛比值达到约 72% 由于规则模板和连接器支持变得更加可重复。
