slug: hybrid-comp-payday-autopilot
date: '2026-06-13'
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: 模拟开始月份
  value: 2026-07
  unit: YYYY-MM
  source: '[BP date 2026-06-13]基本情况始于业务计划日期后的第一个整月。'
- id: A2
  name: 从种子前回合开始的现金
  value: '2000.0'
  unit: USDK
  source: '[BP fundingAsk targetFundingRangeUsd $2-4M]基案采用所述范围的低端，因为雇用计划保持倾斜 Y3。'
- id: A3
  name: 型号中的客户单位
  value: 拥有至少一项生活保险的有收入家庭
  unit: 定义
  source: '[BP businessModel.unitOfValue]客户 Eop 跟踪活跃的支付家庭;第一年的入职收入被混入了年化家庭收入，而不是作为单独的服务项目模式。'
- id: A4
  name: 开始有酬家庭(M1)
  value: '0'
  unit: 计数
  source: '[BP milestones 0-12 months]公司开始预收收入，只在模拟-首次入职开始后才能转换付费家庭。'
- id: A5
  name: 每个在业有薪家庭的年收入
  value: '0.42'
  unit: USDK 每年
  source: '[BP investorMemo.firstCustomer.initialContract $149-$299 setup + $180-$300 annual subscription; BP gtm.funnelTargets 20% premium tier within 12 months]大致用途 $199 上载值加大约 $240 为保守主义而四舍五入。'
- id: A6
  name: 收入确认方法
  value: 每期平均在业家庭
  unit: 公式
  source: '创业-融资 heuristic：新家庭全月或季度生活，因此收入是以平均活跃客户而不是期末计数为模型的。'
- id: A7
  name: 第 1 年 按月分列的新付费家庭净额
  value: '[0,0,0,1,1,2,2,2,3,4,4,5]'
  unit: 计数
  source: '[BP milestones 0-12 months]结束 Y1 在 24 个活跃的付费住户中，这些住户将 20-50 个住户转变为付费用户和早期现场用户。'
- id: A8
  name: 第 2 年 按季度分列的新付费家庭净额
  value: '[60,120,180,316]'
  unit: 计数
  source: '[BP milestones 12-24 months; BP experimentRoadmap advisor and community channel tests]基本案例涉及 700 个在业家庭，Q4Y2 作为模板，付费设置，三个转介伙伴开始复合。'
- id: A9
  name: 第 3 年 按季度分列的新付薪家庭净额
  value: '[400,700,1000,1200]'
  unit: 计数
  source: '[BP milestones 24-36 months; research.market.som 25,000 paying households at year-3 reach]基本个案出口 Y34 000 个在业家庭，远远低于研究的 25 000 个家庭 SOM 但是高到足以显示自我服务的规模。'
- id: A10
  name: 差值斜坡毛额
  value: 55-62% 内 Y1, 64-68% 内 Y2，和 69 - (中文(简体) ).70% 内 Y3
  unit: 百分比
  source: '[BP businessModel.targetGrossMarginPct 70; BP operations; research.regulatoryTechnicalConstraints]毛比值开始于目标以下，因为支持、批准和连接器例外是手动的，然后接近目标 BP 目标 Y3。'
- id: A11
  name: 单位经济学月分
  value: '2.5'
  unit: 百分比
  source: 启动融资 heuristic，用于对信任敏感的支付消费融资订阅，在现场激活后，留存能力可以强大，但仍是早期和行为依赖的。
- id: A12
  name: 满载 CAC
  value: '0.22'
  unit: USDK 每户在职有薪家庭
  source: '[BP gtm.channels; BP funnelTargets; BP operatingAssumptions on advisor referrals]假设顾问和社区渠道的绩效超过广泛的有偿购置，而所支付的设立费部分抵销了入职开支。'
- id: A13
  name: 已装入薪带
  value: 创建者 $120K; 工程学 $150K; 操作/客户成功 $85K;增长/伙伴关系 $115K; 合规/支助 $95K
  unit: USDK 每年 FTE
  source: 启动金融 heuristic 对于一个精干的美国 种子前金融技术团队 有有意义的，但不是上市现金工资。
- id: A14
  name: 聘用顺序
  value: 创始人和工程师 M1; 操作/客户成功 M7;增长/伙伴关系 M10; 第二名工程师 M16; 遵约/支持 M22; 第三名工程师 M35
  unit: 时间
  source: '[BP team startTiming Month 0/6/9; BP strategicChoices.sequencingRationale]该模型遵循的是在侵略性增长之前增加操作并使用平滑后-Y1 雇佣与信托首次推出一致'
- id: A15
  name: 薪金费用分配
  value: 创建者 55% 标准与管理 /15% 研发/30%G&A; 工程师 100% 研发;行动/CS 25% 标准与管理 /25% 研发/50%G&A; 增长 80% 标准与管理 /20%G&A; 合规/支持 10% 标准与管理 /20% 研发/70%G&A 组合
  unit: 规则
  source: '[BP team role descriptions; BP operations]反映创始人主导的销售，工程主导的产品工作，以及主要位于 G&A 的支持/合规负荷。'
- id: A16
  name: 不付费操作阶梯
  value: Y1 每月标准和管理 $2.5K-$5.0K，研发 $4.5K-$7.0K, G&A 组合键 $3.5K-$6.0K; Y2 季度 & M$18K-$27K，研发 $21K-$30K, G&A 组合键 $18K-$22.5K; Y3 季度 & M$30K-$39K，研发 $33K-$42K, G&A 组合键 $24K-$28.5K
  unit: USDK
  source: '[BP operations; BP risks; research.regulatoryTechnicalConstraints]覆盖云，法律，合规工具，社区赞助，以及支持系统而不承担大型服务席。'
- id: A17
  name: B。 扩大筹资规模的规则
  value: 提高至 Q4Y2 加上大约 6 个月的缓冲
  unit: 规则
  source: '[BP fundingAsk runwayMonths 18; financial-modeler requirement]种子前的大小可以击出 Y2 证明里程碑，并仍然为种子进程留下缓冲。'
- id: A18
  name: 简化现金流动
  value: 期末现金等于期初现金加累计现金 EBITDA
  unit: 公式
  source: '启动-融资 heuristic：为这种资产灯光软件业务承担不负债，capex，或重大周转资金。'
- id: A19
  name: 下行情况三角洲
  value: ARPU $0.36K, Y32,500 个住户和毛差额摊位 67%
  unit: 设想投入
  source: '[Research sensitivityCases on price ceiling, trust, and write-access limits]下行反映了所研究的风险，即产品仍然比信任的自动驾驶更接近于溢价看板。'
- id: A20
  name: 外壳三角洲
  value: ARPU $0.45K, Y35 200 个家庭退出，总比值达到 72%
  unit: 设想投入
  source: '[BP milestones 24-36 months; BP gtm channels; research distributionChannels]外加假设顾问/社区转诊复合速度更快，而且符合模板的入职可减少支持拖曳。'
