slug: hybrid-comp-payday-autopilot
date: '2026-06-13'
executiveSummary: >-
  Hybrid Comp Payday Autopilot targets U.S.-based startup employees and solo
  founders who earn high incomes, hold RSUs or token compensation, and already
  manage money across checking, brokerage, exchange, and self-custody wallet
  accounts. The acute pain is not budgeting; it is repeatedly deciding, on
  payday and vesting events, how much cash to reserve for taxes, keep liquid,
  pay down, or invest across systems that do not act together. The MVP is a
  household treasury policy engine that starts in simulation mode, then executes
  low-risk cash-routing policies inside user-set limits with approvals and an
  audit trail. The plan deliberately starts with tax-reserve sweeps, cash-buffer
  maintenance, and brokerage top-ups rather than autonomous trading or full tax
  optimization, because trust and connector reliability matter more than feature
  breadth in the first 12 months. Go-to-market is a coherent first-customer
  system: acquire users through startup-worker communities and CPA or equity-comp
  advisors, onboard them around a vesting, unlock, or tax-surprise trigger, and
  sell a paid setup plus annual subscription tied to one household's active
  autopilot policies. Research supports a plausible niche market with an
  estimated $196.1M SAM and $4.5M year-3 SOM, but pricing remains constrained by
  premium personal-finance software anchors unless the product proves measurable
  tax, liquidity, or time-saved ROI. The strongest reason to believe is that
  infrastructure and policy changes now make cross-rail automation feasible
  while incumbents still mostly stop at visibility. The biggest disconfirming
  risk is that users may like simulation and tracking but still refuse live
  money movement, leaving the product as a premium dashboard instead of a
  trusted autopilot.
problem:
  - >-
    Crypto- and equity-comped tech workers face recurring, high-stakes routing
    decisions whenever salary, RSU vesting, bonuses, or token unlocks hit, but
    today they still coordinate taxes, liquidity, and investing through
    spreadsheets, recurring transfers, and ad hoc CPA advice.
  - >-
    Existing consumer-finance apps aggregate balances well, but they usually do
    not execute bounded actions across bank, brokerage, and wallet rails with
    simulation, approvals, and auditability.
solution:
  - >-
    Connect bank, brokerage, exchange, and wallet accounts, then let users set
    plain-language policies for payday, vesting, and balance-drift events that
    first run in simulation before any live action is allowed.
  - >-
    Execute only low-risk actions inside user-defined limits, escalate unusual
    moves for approval, and keep a clear action log so the first value is fewer
    tax and liquidity mistakes rather than autonomous portfolio management.
whyWeWin:
  - >-
    The wedge is narrower than general PFM: it focuses on the first moments when
    mixed-compensation households feel pain sharply enough to pay, and where
    incumbent dashboards and venue-specific automations break across silos.
  - >-
    If the company captures policy history, simulation outcomes, exceptions, and
    template performance by compensation profile, it can build a more defensible
    household-execution layer than tools that only categorize transactions.
strategicChoices:
  beachhead: >-
    U.S.-based startup employees and solo founders earning roughly
    $150,000-$500,000 with RSUs or token compensation, a taxable brokerage, and
    at least one exchange or self-custody wallet, but no full-service wealth
    manager.
  wedgeRationale: >-
    Payday and vesting autopilot is the fastest proof point because it is a
    repeated workflow with visible mistakes, a clear buying trigger, and a
    narrow action set that can start with cash routing before broader
    multi-asset automation.
  sequencingRationale: >-
    The product sequence is trust-first: ship simulation, approvals, and
    low-risk cash sweeps before live brokerage or wallet actions; sell through
    direct communities and advisor referrals before trying employer or embedded
    distribution; and hire product engineering plus compliance-heavy operations
    before scaling growth. This order minimizes regulatory and trust risk while
    producing the earliest falsifiable proof of conversion from simulation to
    live usage.
  notYet:
    - Autonomous trading or rebalancing across volatile assets
    - Full tax filing or tax-optimization promises
    - Broad employer-benefits distribution before consumer retention is proven
    - Mass-market budgeting for households without multi-asset complexity
market:
  tam: >-
    $1.29B estimated annual U.S. TAM based on roughly 13.6M multi-asset
    households derived from stock-ownership and crypto-usage incidence, priced
    against a conservative $95 annual software benchmark.
  sam: >-
    $196.1M estimated beachhead SAM based on about 1.36M U.S. households with
    the six-figure income, equity-comp, and account-sprawl profile that makes
    cross-rail treasury automation urgent, at roughly $144 ARR.
  som: >-
    $4.5M estimated year-3 SOM based on roughly 25,000 paying households at
    about $180 ARR reached through niche startup-worker and advisor-led
    distribution.
  segments:
    - High-income startup employees and founders with equity or token compensation plus brokerage and crypto exposure
    - Affluent self-directed couples or households co-managing shared cash, taxes, and multi-account allocations
  buyingProcess: >-
    The user is usually the buyer, and urgency appears when a vesting event,
    token unlock, bonus, or tax surprise makes manual routing feel risky and
    expensive. Conversion likely requires a guided setup, simulation-based trust
    building, and either a direct community touchpoint or an advisor referral
    rather than impulse app-store adoption.
product:
  mvp: >-
    The MVP links a narrow set of U.S. bank, brokerage, exchange, and wallet
    accounts, lets users define one or two payday or vesting policies, simulates
    the outcome, and then executes only low-risk cash-routing actions with
    approval thresholds and audit logs. It should avoid promising autonomous
    trading, full tax optimization, or universal connector coverage in v1.
  sixMonth: >-
    Ship a simulation-first consumer product for tax-reserve sweeps, emergency
    fund maintenance, spending-account top-ups, and brokerage cash routing for a
    tightly controlled connector matrix.
  twelveMonth: >-
    Add shared-household access, better exception handling, policy templates for
    RSU-heavy versus token-heavy users, and referral-ready workflows for CPAs,
    equity-comp coaches, and startup communities.
  twentyFourMonth: >-
    Expand into broader household treasury automation with more compensation
    profiles, advisor-authored policy packs, and selective embedded distribution
    through payroll, brokerage, or tax platforms once retention and unit
    economics are proven.
  keyBets:
    - Simulation plus approvals can convert a meaningful share of target users to live money movement
    - Low-risk cash-routing workflows deliver ROI before users demand broader trade automation
    - A narrow connector matrix can still serve the first 1,000 high-value households
    - Compensation-profile templates will reduce onboarding friction enough to support paid acquisition and referrals
gtm:
  wedge: >-
    Land the first users through a paid, concierge-style setup around a real
    payday, vesting, or tax-reserve event, where the product simulates the
    policy, runs one successful live cycle, and proves that it can route cash
    more reliably than spreadsheets plus reminders.
  channels:
    - Direct acquisition through startup-worker, fintech, and crypto-professional communities
    - Referral partnerships with CPAs, equity-comp advisors, and financial coaches serving tech workers
    - Targeted creator, newsletter, and community sponsorships where mixed-comp households already seek tax and money guidance
  funnelTargets: "Community or advisor lead→paid setup trial 20%+, paid setup trial→first live linked policy 50%+, first live policy→annual paid subscription 70%+, annual subscriber→premium shared-household or tax tier within 12 months 20%+"
  pricing: >-
    Charge a one-time setup fee for high-complexity onboarding, then an annual
    household subscription priced above mainstream dashboards but within premium
    PFM anchors, with a higher tier for shared-household access and tax-heavy
    workflows. This pricing is coherent with the first customer only if the
    product measurably reduces tax leakage, liquidity mistakes, or time spent
    per pay cycle.
businessModel:
  revenueStreams:
    - Annual subscription for one active household with live autopilot policies
    - Premium household tier for shared access, more active policies, and tax-heavy workflows
    - One-time concierge onboarding or migration fee for complex account setups
    - Compliant referral or revenue-share income on selected partner products over time
  unitOfValue: active household with at least one live policy
  targetGrossMarginPct: 70
  expansionLevers:
    - Add more active policies per household across payday, vesting, and balance-drift events
    - Upgrade from solo-user to shared-household plans
    - Sell advisor-authored or tax-season policy packs to existing households
    - Expand distribution through advisor networks, then embedded fintech partners
strategyMap:
  northStarMetric: Percentage of scheduled payday or vesting cycles executed correctly without manual correction
  inputMetrics:
    - Simulation-to-live conversion rate
    - Live policy retention after three pay or vest cycles
    - Median minutes saved per household per pay cycle
    - Percentage of tax-reserve transfers completed within user-set threshold bands
    - Referral share of new paid households
  moatsToBuild:
    - Household policy history showing what users approve, reject, or keep on autopilot
    - Simulation and exception data across connectors, compensation profiles, and thresholds
    - Template-performance data by RSU-heavy, token-heavy, and shared-household archetype
    - Trusted referral channels with CPAs and equity-comp specialists
  killCriteria:
    - Fewer than 30% of paid simulation users activate one live policy within 60 days
    - Fewer than 50% of the first 20 live households keep one policy active after three cycles
    - More than 10% of live policy runs require manual correction because of connector or rule failures
    - Customers consistently refuse pricing above mainstream dashboard levels after seeing simulated ROI
  mermaid: |
    flowchart LR
      Wedge[Payday and vesting autopilot] --> MVP[Simulation plus low-risk live policies]
      MVP --> Proof[Trusted live execution and fewer tax or liquidity mistakes]
      Proof --> Expansion[More households, more policies, and advisor or embedded distribution]
investorMemo:
  verdict:
    call: Watch
    conviction: Attractive wedge and credible why-now, but conviction stays limited until simulation users prove they will authorize and retain live money movement.
    whyBelieve: Research supports a real gap between premium tracking tools and a trustable household policy-and-execution layer for mixed-compensation users.
    whyDoubt: Trust, connector reliability, and category price ceilings could trap the company in a premium-dashboard niche instead of a scalable autopilot business.
    nextDiligence: Verify with 10-15 design partners and early cohort data that one simulated payday or vesting workflow converts into retained live usage at premium-PFM pricing.
  firstCustomer:
    title: Hybrid-comp startup employee managing personal treasury without a wealth manager
    profile: >-
      A U.S.-based engineering manager, product lead, or founder at a crypto or
      fintech company who earns six figures, holds RSUs or token grants, and
      already uses separate banking, brokerage, exchange, and wallet accounts.
    trigger: A first major RSU vest, token unlock, bonus, or painful tax surprise that makes manual routing feel unsafe and time-consuming.
    buyer: Primary household earner
    initialContract: >-
      $149-$299 paid setup and simulation period leading to $180-$300 annual
      subscription once one live policy completes successfully; complex shared
      households can add a higher onboarding fee or premium tier.
  mustBeTrue:
    - At least a third of target users who complete simulation will authorize one live money-movement policy within 60 days.
    - The product can reduce missed or mistimed tax-reserve and liquidity actions enough to justify pricing above $95-$99 annual dashboard alternatives.
    - A narrow connector matrix can cover the bank, brokerage, exchange, and wallet combinations that dominate the first 100 target households.
    - CPA, equity-comp, or startup-community referrals can acquire users at lower CAC than broad consumer channels.
    - Users who activate one live policy will retain at least one active policy through three consecutive pay or vest cycles.
  diligenceQuestions:
    - Which exact account combinations appear most often in the first 50 target households?
    - How often do vesting, unlock, or tax events occur per user each year, and how painful are mistakes today?
    - What live actions can be executed safely across target connectors without turning the product into a regulated advisor or custodian?
    - How much incremental willingness to pay appears after one successful live cycle versus after simulation alone?
    - Do CPA and equity-comp referral partners trust the product enough to send clients before full tax integrations exist?
operatingAssumptions:
  - assumption: Target users will trust simulation and bounded approvals enough to activate live cash-routing policies without first demanding full-service human advice.
    basis: research.yaml
    validationTest: Enroll 30 paid setup users and confirm at least 10 activate one live policy within 60 days of simulation.
    decisionImpact: If false, the company must add a higher-touch advisor-assisted model or retreat to planning software rather than autopilot.
  - assumption: Premium pricing above mainstream dashboards is acceptable if the product can prove tax-reserve accuracy, time savings, and fewer liquidity errors.
    basis: research.yaml
    validationTest: Run 15 pricing conversations after simulated ROI reviews and close at least 5 annual subscriptions at $180 ARR or higher.
    decisionImpact: If false, the company must lower pricing, shrink onboarding cost, or move upmarket to more complex households with higher willingness to pay.
  - assumption: A narrow U.S.-first connector matrix can cover the most common bank, brokerage, exchange, and wallet combinations in the beachhead.
    basis: idea.yaml
    validationTest: Build a connector matrix from the first 50 design-partner households and verify that at least 70% can complete the core workflow without manual workaround.
    decisionImpact: If false, launch scope must narrow further or the company must spend more on infrastructure and support before scaling acquisition.
  - assumption: CPA and equity-comp advisor referrals will convert better than cold direct-to-consumer acquisition for this trust-sensitive workflow.
    basis: operator judgment
    validationTest: Compare 90-day conversion and CAC across 3 advisor partners versus 2 direct community campaigns using the same paid setup offer.
    decisionImpact: If false, the company must invest earlier in a direct brand and product-led growth motion, raising CAC and funding needs.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Recruit 10-15 design partners from startup-fintech and crypto-worker communities for workflow mapping and pricing interviews.
    hypothesis: The target user experiences enough payday, vesting, and tax-routing pain to pay for a guided setup before full automation exists.
    successMetric: 10 qualified design partners and at least 5 users willing to prepay for a simulation-first pilot.
    owner: Founder
  - horizon: 0–90 days
    experiment: Build a simulation prototype for one payday or vesting policy across a narrow connector set.
    hypothesis: Seeing a dry run with clear thresholds and audit logs materially increases trust relative to a static dashboard demo.
    successMetric: At least 60% of pilot users say they would link real accounts after simulation review.
    owner: Founding eng
  - horizon: 3–6 months
    experiment: Launch paid setup plus one live cash-routing policy for the first 20 households.
    hypothesis: Low-risk tax-reserve and liquidity workflows can convert into live recurring usage before trade automation is available.
    successMetric: 50% of paid setup users activate one live policy and fewer than 10% of live runs need manual correction.
    owner: Founding eng
  - horizon: 3–6 months
    experiment: Run channel tests with 3 CPA or equity-comp partners and 2 direct community campaigns.
    hypothesis: Referral-based acquisition yields higher trust and better activation than purely direct consumer channels.
    successMetric: Referral CAC at least 30% lower than direct channels with equal or better live-policy activation.
    owner: Founder
  - horizon: 6–12 months
    experiment: Introduce shared-household workflows and measure whether couples convert at higher ARPU and retention.
    hypothesis: Shared-cash and shared-tax complexity creates a stronger retention and upsell path than solo users alone.
    successMetric: Premium-tier households show 20% higher retention and at least 1.5x ARR versus solo households.
    owner: Product lead
  - horizon: 6–12 months
    experiment: Publish and test compensation-profile templates for RSU-heavy and token-heavy users.
    hypothesis: Templates reduce onboarding time and support load enough to improve payback.
    successMetric: Median onboarding time falls below 45 minutes and support tickets per new household drop by 25%.
    owner: Product lead
operations:
  - Maintain a strict connector certification matrix by bank, brokerage, exchange, and wallet before enabling live actions.
  - Log every simulated and live policy action with approval state, exception reason, and reversal path for support and audit review.
  - Use a human escalation queue for unusual actions, high-value transfers, and tax-sensitive edge cases until rule confidence is proven.
  - Build referral workflows and client-safe disclosures for CPAs and equity-comp advisors rather than expecting informal word-of-mouth.
team:
  - role: Founding eng
    startTiming: Month 0
    rationale: Needed immediately to build the policy engine, simulation layer, connector orchestration, and audit logging for the first live workflows.
  - role: Founder with product and compliance ownership
    startTiming: Month 0
    rationale: The first 18 months require one owner to integrate customer discovery, trust UX, partner selection, and regulatory boundary decisions.
  - role: Operations and customer success lead
    startTiming: Month 6
    rationale: Live money movement needs exception handling, support playbooks, and repeatable onboarding before growth can scale safely.
  - role: Growth and partnerships lead
    startTiming: Month 9
    rationale: Add only after early retention exists, so advisor referrals, communities, and paid channels can scale against a proven onboarding and pricing motion.
milestones:
  - horizon: 0–12 months
    items:
      - Close 10-15 design partners and convert at least 20 households into paid setup users
      - Launch simulation-first onboarding and one live payday or vesting policy on a narrow connector matrix
      - Prove at least 50% paid-setup-to-live activation and at least 50% three-cycle retention in the first live cohort
      - Establish 3 advisor or community referral partners that generate repeatable qualified demand
  - horizon: 12–24 months
    items:
      - Add shared-household plans, compensation-profile templates, and stronger exception handling
      - Reach repeatable premium-PFM pricing with clear ROI evidence on tax-reserve and liquidity accuracy
      - Expand to more account combinations while keeping manual-correction rates below target thresholds
      - Build enough policy-history data to improve onboarding, approvals, and template performance by archetype
  - horizon: 24–36 months
    items:
      - Broaden from single-event autopilot into a fuller household treasury layer for affluent self-directed users
      - Launch advisor-authored policy packs and selective embedded distribution with payroll, tax, or brokerage partners
      - Grow from niche startup-worker adoption into a broader affluent multi-asset household segment without losing trust or gross-margin discipline
risks:
  - risk: Users may trust simulation and tracking but still refuse to authorize live money movement.
    likelihood: High
    impact: High
    mitigation: Start with low-risk cash-routing policies, explicit approval thresholds, and measured proof of one successful live cycle before asking for broader permissions.
  - risk: Connector gaps or venue-specific limits may prevent reliable execution across the account combinations that matter most.
    likelihood: High
    impact: High
    mitigation: Launch with a narrow certification matrix, keep unsupported venues read-only, and prioritize households whose account stack matches stable connectors.
  - risk: Category pricing may remain anchored near premium dashboard levels despite the extra product complexity.
    likelihood: Medium
    impact: High
    mitigation: Tie pricing conversations to quantified time, tax, and liquidity outcomes; use onboarding fees for complex setups; and avoid scaling paid acquisition until payback is visible.
  - risk: Regulatory and tax complexity around crypto, RSUs, and consumer data rights may increase support and compliance burden.
    likelihood: Medium
    impact: High
    mitigation: Stay U.S.-first, avoid full tax-optimization claims, partner where regulated movement or tax guidance is required, and keep humans in the loop for edge cases.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: >-
    Eighteen months of runway should fund the simulation-first product, narrow
    U.S. connector coverage, compliance and support operations, 20-50 paid setup
    households, and enough live-usage plus referral data to prove whether this
    is a trusted autopilot business rather than a premium dashboard.
