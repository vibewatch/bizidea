startupThesis:
  nonObviousInsight: >-
    个人财务的突破并不更好 AI 咨询;是允许执行的外加跨银行、经纪和钱包栏的模拟。 一旦用户能够用虚拟资金测试动作，授予受限权限，并从代理店安装专门自动化，获胜的产品就不再是一个看板并成为家庭国库规则引擎。
  beachhead: >-
    以美国为基地的密码和股权公司创办员工的收入大致 $150,000-$500,000 他们管理 W2 收入，RSUs 或代币解锁，应税经纪， 和一个或多个自我保管钱包，没有人类财富管理者
  wedge: >-
    一个发薪日和自动驾驶，将用户定义的货币规则转化为交叉账户行动，如刻出税收储备、补充支出现金、支付信贷余额，以及将其余资金引入具有核准门槛的经纪和钱包目标。
  whyNowCatalyst: >-
    Bluwhale 由用户授权的行刑层现在可以触及银行账户、经纪和钱包，
  ventureScalePath: >-
    从混合共通技术家庭开始，为最有可能首先要求多资产控制的消费者创建一个可信赖的自动化层。 从那里，公司可以扩展到富裕的家庭现金管理、夫妇和家庭财务工作流程、顾问或 CPA- 授权规则包，并通过银行、经纪公司、工资提供者和税务平台进行嵌入式分配。
solution: >-
  产品连接了用户的银行，经纪，交换，以及钱包账户，然后帮助他们为发薪日，背负日，以及大额余额变动设定平话规则。 它开始于模拟模式，因此用户可以在允许真正的转账或交易指令之前对虚拟资金或只读余额进行干测试。 一旦活下来，代理机构只执行用户定义的限制，要求批准异常行动，并留下每个动作和规则决定的干净的审计线索。 第一本剧本侧重于税收储备的扫荡、紧急基金维护、订阅清理以及投资组合的上架，其最终市场将面向特定收入或资产概况的专家自动化。
