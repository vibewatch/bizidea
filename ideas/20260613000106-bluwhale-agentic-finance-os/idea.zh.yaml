problem: >-
  高收入科技工作者通过支票、经纪、股票交易和自负盈亏的方式分钱， 每个发薪日， 背负事件或象征性的解锁， 迫使他们决定储备多少税金， 冲入花出现金， 编制预算的应用程序可以显示混乱，但是它们很少在银行和钱包的栏杆上执行允许的动作，所以用户又回到了经常性的转账、电子表格和被动反应。CPA 建议。
