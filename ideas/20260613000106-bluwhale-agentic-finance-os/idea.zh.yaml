jobsToBeDone:
- job: >-
    当发薪日或一个象征性的解锁点击时， 帮助我将钱自动地转入税收，支出，储蓄和投资， 这样他们就可以留在计划上而不碰五个应用程序和一个电子表格。
  currentAlternative: 由提醒、电子表格和银行和密码应用程序之间的特别检查驱动的人工转账
  successMetric: 每个工资周期节省的时间和在第一次通过时正确确定的收入百分比
- job: >-
    当我的余额流过经纪、交换和现金账户时， 帮助我在我信任的限度内重新平衡， 这样他们就可以保持缓冲和靶向的暴露， 而无需不断的人工监控。
  currentAlternative: 被动跟踪预算编制或经纪应用程序，偶尔进行大量人工转账
  successMetric: 在目标范围内完成的再平衡活动的份额以及漏税或流动资金减少的情况
