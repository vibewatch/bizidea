    score: 3
    rationale: 与企业软件相比，消费者-fintech 的可拆解性更难，但跨铁路执行数据，规则历史，和可信赖的自动化模板可以随着时间的推移而复合。
  ventureScale:
    score: 4
    rationale: 海滩头是设计上的特长，但可以扩展为通过主要金融平台分布的广泛的家庭-金融自动化层。
topRisks:
- name: 资金划转信任失效
  description: 单一的不良转移，错误的交易，或税收储备错误，可能破坏用户的信任并产生支持或法律曝光。
  mitigation: 从模拟模式入手，保守的默认权限，对高风险动作的明确批准，以及能避免不可逆交易的狭义的首发剧本。
- name: 消费端获客成本
  description: 如果获得富裕的自我指导用户需要昂贵的广泛的消费者营销，那么即使是强产品也可能失败。
  mitigation: 将第一项动议的重点放在加密和金融技术雇员的专长上，与 CPAs 和启动社区，并通过嵌入式分配，只在证明保留后才能扩大。
- name: 连接与合规脆弱性
  description: 经纪人、银行、钱包和监管机构可能限制外部代理人在铁路上阅读或执行的内容。
  mitigation: 首先在最稳定的接通器上启动，在直接执行不力的地方保持人行即进的审批，并设计出产品，这样即使某些行动需要人工完成，规则价值仍能活下来。
