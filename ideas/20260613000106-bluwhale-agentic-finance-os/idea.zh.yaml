differentiator: >-
  这不是另一个净值看板 或 robo 顾问。 楔形体是一个家庭规则引擎，可以真正跨越传统和数字铁路移动资金，从最频繁的时刻开始，富裕的自导用户最强烈地感受到痛苦。 它的护城河来自跨铁路连接，信任脚手架，如沙箱干跑和批准规则，以及越来越多的自动化模板和结果库，以适应具体的补偿和资产概况。
