problem: >-
  High-earning tech workers who split their money across checking, brokerage, stock comp, and self-custodied crypto
  still run household finance manually. Every payday, vesting event, or token unlock forces them to decide how much to
  reserve for taxes, sweep into spending cash, pay down cards, and allocate into long-term positions across apps that
  cannot act on each other. Budgeting apps can show the mess, but they rarely execute permissioned actions across both
  bank and wallet rails, so users fall back to recurring transfers, spreadsheets, and reactive CPA advice.
targetUser:
  primary: U.S.-based startup employees and solo founders with six-figure income, brokerage accounts, and meaningful self-directed crypto holdings
  secondary: Household partners who co-manage shared cash, tax reserves, and large transfers across the same account sprawl
  buyer: null
startupThesis:
  nonObviousInsight: >-
    The breakthrough in personal finance is not better AI advice; it is permissioned execution plus simulation across
    bank, brokerage, and wallet rails. Once users can test actions with virtual funds, grant bounded permissions, and
    install specialized automation from an agent store, the winning product stops being a dashboard and becomes a
    household treasury policy engine.
  beachhead: >-
    U.S.-based crypto- and equity-comped startup employees earning roughly $150,000-$500,000 who manage W-2 income,
    RSUs or token unlocks, a taxable brokerage, and one or more self-custody wallets without a human wealth manager
  wedge: >-
    A payday and vesting autopilot that turns user-defined money policies into cross-account actions such as carving out
    tax reserves, topping up spending cash, paying down credit balances, and routing the remainder into brokerage and
    wallet targets with approval thresholds
  whyNowCatalyst: >-
    Bluwhale's launch shows one user-permissioned execution layer can now touch bank accounts, brokerages, and wallets,
    making cross-rail household automation newly possible and newly urgent.
  ventureScalePath: >-
    Starting with hybrid-comp tech households creates a trusted automation layer for the consumers most likely to demand
    multi-asset control first. From there, the company can expand into affluent household cash management, couple and
    family treasury workflows, advisor- or CPA-authored policy packs, and embedded distribution through banks,
    brokerages, payroll providers, and tax platforms.
solution: >-
  The product connects a user's bank, brokerage, exchange, and wallet accounts, then helps them set plain-language
  policies for what should happen on payday, vesting day, and large balance changes. It starts in simulation mode, so
  the user can run a dry test against virtual funds or read-only balances before allowing real transfers or trade
  instructions. Once live, the agent executes only inside user-defined limits, asks for approval on unusual actions, and
  leaves a clean audit trail of every move and policy decision. The first playbooks focus on tax-reserve sweeps,
  emergency-fund maintenance, subscription cleanup, and portfolio top-ups, with an eventual marketplace for expert-built
  automations targeted at specific income or asset profiles.
goToMarketSeed:
  firstCustomer: >-
    A U.S.-based engineering manager or product lead at a Series B crypto or fintech company who earns a six-figure
    salary, holds RSUs or token grants, and keeps money across Chase, Robinhood, Coinbase, and a self-custody wallet
  buyingTrigger: A first major token unlock, RSU vest, bonus windfall, or painful tax surprise that exposes how manual their cross-account money workflow has become
  currentAlternative: Personal-finance dashboards plus manual recurring transfers, spreadsheets, exchange apps, and occasional CPA or financial-coach advice
  switchingReason: >-
    This wedge does not just track balances; it executes cross-rail policies with sandboxed dry runs, permission limits,
    and human approvals, which the current patchwork of apps and manual reminders cannot do.
  pricingHypothesis: Monthly subscription priced by household and active automation policies, starting around $39 per month for one primary user with premium tiers for shared households and tax integrations
