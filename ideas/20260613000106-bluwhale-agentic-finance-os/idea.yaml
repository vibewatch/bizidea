jobsToBeDone:
  - job: >-
      When payday or a token unlock hits, help me move money into taxes, spending, savings, and investments automatically,
      so they can stay on plan without touching five apps and a spreadsheet.
    currentAlternative: Manual transfers driven by reminders, spreadsheets, and ad hoc checks across banking and crypto apps
    successMetric: Time saved per pay cycle and percentage of income routed correctly on the first pass
  - job: >-
      When my balances drift across brokerage, exchange, and cash accounts, help me rebalance inside the limits I trust,
      so they can keep a buffer and target exposure without constant manual monitoring.
    currentAlternative: Passive tracking in budgeting or brokerage apps plus occasional large manual transfers
    successMetric: Share of rebalancing events completed within target bands and reduction in missed tax or liquidity moves
