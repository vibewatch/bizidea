topRisks:
  - name: Trust failure on money moves
    description: A single bad transfer, mistimed trade, or tax-reserve mistake could destroy user trust and create support or legal exposure.
    mitigation: Start with simulation mode, conservative default permissions, explicit approvals for high-risk actions, and narrow first playbooks that avoid irreversible trades.
  - name: Consumer distribution cost
    description: Even a strong product can fail if acquiring affluent self-directed users requires expensive broad consumer marketing.
    mitigation: Focus the first motion on crypto and fintech employee niches, partner with CPAs and startup communities, and expand via embedded distribution only after proving retention.
  - name: Connectivity and compliance fragility
    description: Brokerages, banks, wallets, and regulators may limit what an external agent can read or execute across rails.
    mitigation: Launch on the most stable connectors first, keep human-in-the-loop approvals where direct execution is weak, and design the product so policy value survives even when some actions require manual completion.
