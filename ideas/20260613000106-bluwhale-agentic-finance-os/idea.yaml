differentiator: >-
  This is not another net-worth dashboard or robo-advisor. The wedge is a household policy engine that can actually move
  money across traditional and digital rails, beginning with the highest-frequency moments when affluent self-directed
  users feel pain most sharply. Its moat comes from cross-rail connectivity, trust scaffolding such as sandboxed dry
  runs and approval rules, and a growing library of automation templates and outcomes tuned to specific compensation and
  asset profiles.
