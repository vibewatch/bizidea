openQuestions:
- Will external auditors accept AI-call transcripts and recordings as equal or better evidence than human callback notes for SOX-style control testing?
- What percentage of bank-change requests in the target segment can actually be resolved through known-contact callbacks without a human fallback?
- How clean are approved supplier-contact records in typical mid-market SAP and Dynamics estates, especially across acquired plants?
- Will ERP and payment-control partners refer deals, or will they view callback automation as a roadmap feature to build themselves?
