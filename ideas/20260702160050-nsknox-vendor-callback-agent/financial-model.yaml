slug: "supplier-bank-change-rail"
date: "2026-07-02"
currency: USD
modelStartMonth: "2026-08"
assumptions:
  - id: A1
    name: "Model start month"
    value: "2026-08"
    unit: "YYYY-MM"
    source: "[BP date 2026-07-02] the model starts in the first full month after the dated business plan."
  - id: A2
    name: "Opening cash / pre-seed ask"
    value: "$2.6M"
    unit: "USD"
    source: "[BP fundingAsk targetFundingRangeUsd $2-4M + BP fundingAsk runwayMonths 18 + model cash curve] the ask stays near the low end of the stated range because the plan remains D365-first and founder-led through early proof."
  - id: A3
    name: "Starting paying customers"
    value: "0"
    unit: "count"
    source: "[BP milestones 0-12 months + BP experimentRoadmap] the company starts pre-revenue and must first convert design partners into paid pilots."
  - id: A4
    name: "Customer definition"
    value: "One paying manufacturing logo, whether in paid pilot or production; more legal entities inside the same logo lift ARPU."
    unit: "definition"
    source: "[BP businessModel.unitOfValue + BP pricing by legal entity and workflow + BP milestones] the land motion is logo-based but revenue expands by legal entity and workflow volume."
  - id: A5
    name: "Paid pilot pricing"
    value: "$25K over roughly 4 months (~$6.3K/month)."
    unit: "USD/logo"
    source: "[BP investorMemo.firstCustomer.initialContract $20k-$35k paid pilot + BP gtm.pricing] the model uses a low-midpoint pilot price to avoid overstating Year 1 revenue."
  - id: A6
    name: "Production pricing anchor"
    value: "~$66K ARR for one legal entity before extra workflow fees and multi-entity expansion."
    unit: "USD/logo/year"
    source: "[BP investorMemo.firstCustomer.initialContract $60k-$90k ARR plus workflow fees + Research bottomUpSizingDrivers $60k SOM spend] production pricing starts near the lower half of the stated range."
  - id: A7
    name: "Legal-entity expansion per production customer"
    value: "~1.0 entity in pilot, ~2.2 live entities per customer by Q4Y2, and ~2.7 by Q4Y3."
    unit: "entities per logo"
    source: "[BP gtm.pricing by legal entity + BP milestones 25+ live legal entities at 8-12 production customers] the model assumes expansion inside each logo is what lifts ARPU, not aggressive logo count alone."
  - id: A8
    name: "Customer ramp"
    value: "3 paying logos by M12, 12 by Q4Y2, and 32 by Q4Y3."
    unit: "customersEop"
    source: "[BP milestones 0-12, 12-24, and 24-36 months + BP gtm.funnelTargets] the ramp lands inside the stated 25-40 production-customer Year 3 milestone while keeping Year 1 founder-led."
  - id: A9
    name: "Blended annual revenue per active customer"
    value: "~$98K across Y3, with Q4Y3 exit mix near ~$101K annualized."
    unit: "USD/customer/year"
    source: "[Model calc from BP pricing, BP milestones, and Research SOM] blended ARPU rises as customers add more legal entities, workflow volume, and premium reporting."
  - id: A10
    name: "Gross margin ramp"
    value: "45%-52% in Y1, 58%-68% in Y2, and 70%-73% in Y3."
    unit: "gross margin percent"
    source: "[BP businessModel.targetGrossMarginPct 72 + BP operations + Research sensitivityCases] early telephony, contact cleanup, and human review drag margin until implementations standardize."
  - id: A11
    name: "Monthly churn"
    value: "2.0%"
    unit: "percent per month"
    source: "[BP risks + Research openQuestions and sensitivityCases] workflows should be sticky once embedded, but incumbent bundling and evidence-risk justify a conservative early-stage churn assumption."
  - id: A12
    name: "Hiring timeline"
    value: "M0 founder and founding engineer; M2 AP controls lead; M6 second engineer for voice/integrations; M10 partnerships lead; M15 SAP/integrations engineer; M18 second controls/implementation hire; M24 second GTM hire; M25 G&A/ops hire; M31 analytics engineer."
    unit: "timeline"
    source: "[BP team + BP strategicChoices.sequencingRationale + BP milestones + startup-finance heuristic] hiring stays narrow until pilot proof, then adds SAP, partner enablement, and analytics in sequence."
  - id: A13
    name: "Founder loaded cash compensation"
    value: "$150K"
    unit: "USD/FTE/year"
    source: "Startup-finance heuristic for a lean pre-seed founder salary, consistent with BP team keeping sales and product founder-led."
  - id: A14
    name: "Engineering loaded cash compensation"
    value: "$195K"
    unit: "USD/FTE/year"
    source: "Startup-finance heuristic for U.S.-based integration and applied-AI engineers building D365, SAP, voice, and analytics capabilities described in BP product and team."
  - id: A15
    name: "AP controls / implementation loaded cash compensation"
    value: "$145K"
    unit: "USD/FTE/year"
    source: "Startup-finance heuristic for finance-controls implementation talent, consistent with BP team and operations emphasizing audit-packet design and rollout discipline."
  - id: A16
    name: "Sales / partnerships loaded cash compensation"
    value: "$175K"
    unit: "USD/FTE/year"
    source: "[BP gtm.channels + BP team] startup-finance heuristic includes base pay, variable compensation, and travel for direct enterprise and partner selling."
  - id: A17
    name: "G&A / ops loaded cash compensation"
    value: "$110K"
    unit: "USD/FTE/year"
    source: "Startup-finance heuristic for lean finance, vendor management, compliance coordination, and insurance support once customer count scales."
  - id: A18
    name: "Payroll allocation to P&L lines"
    value: "Founder 60% S&M / 20% R&D / 20% G&A; engineering 100% R&D; AP controls 40% S&M / 30% R&D / 30% G&A; sales 100% S&M; G&A 100% G&A."
    unit: "allocation"
    source: "[BP team rationales + BP operations] the split follows who owns selling, deployment, productization, and back-office support in the plan."
  - id: A19
    name: "Non-payroll operating budget ramp"
    value: "Total non-payroll spend rises from about $13K/month in early Y1 to about $39K/month by Q4Y3."
    unit: "USD/month"
    source: "[BP operations + BP fundingAsk.useOfFundsSummary + startup-finance heuristic] this covers cloud, telephony overhead outside COGS, legal, insurance, travel, and partner enablement without a large paid-demand engine."
  - id: A20
    name: "Revenue recognition convention"
    value: "A logo counts as active for the full modeled month or quarter once live in that period; quarterly revenue uses the average active-logo base implied by the start and end customer ramp."
    unit: "formula"
    source: "Modeling convention used so revenue reconciles to customer count and blended ARPU in a compact quarterly layout."
  - id: A21
    name: "Cash conversion convention"
    value: "Cash movement equals EBITDA."
    unit: "formula"
    source: "Startup-finance heuristic for an asset-light software company where capex, taxes, debt service, and working-capital timing are not modeled separately at pre-seed scale."
  - id: A22
    name: "CAC convention"
    value: "$47.3K using total Y1-Y3 sales and marketing spend divided by 32 landed paying customers."
    unit: "USD/customer"
    source: "[Model calc + BP gtm.funnelTargets + BP gtm.channels] this is intentionally conservative because it includes founder-led outbound and early pilot-selling costs."
  - id: A23
    name: "Funding milestone for next round sizing"
    value: "Reach 10-12 production customers, 25+ live legal entities, and at least one repeatable partner-led deployment by Q4Y2 while preserving about 6 months of cash into Q2Y3."
    unit: "milestone"
    source: "[BP milestones 12-24 months + BP fundingAsk.useOfFundsSummary + model cash curve] the pre-seed is sized to reach repeatable deployment proof before a seed round."
