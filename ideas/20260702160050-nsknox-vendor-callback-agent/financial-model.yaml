scenarios:
  downside:
    description: "Pilot conversion stalls near 40%, partner referrals slip by roughly a year, and blended ARR per active customer stays closer to the low-$80Ks."
    y3RevenueK: 1480.0
    y3EbitdaK: -1080.0
    cashLowPointK: -180.0
    keyAssumptionChanges:
      - "Q4Y2 ends closer to 9 production customers and Q4Y3 closer to 22 rather than 32."
      - "Average annual revenue per active customer lands near $82K instead of roughly $98K because fewer accounts expand to second and third entities."
      - "Y3 blended gross margin stalls near 68% because contact cleanup and human review remain heavier than planned."
  base:
    description: "Three Y1 paying pilots convert into 12 production customers by Q4Y2 and 32 by Q4Y3 while ARPU rises through multi-entity rollout and workflow fees."
    y3RevenueK: 2032.5
    y3EbitdaK: -547.1
    cashLowPointK: 258.3
    keyAssumptionChanges:
      - "Year 1 lands three paying logos, then partner-assisted selling helps the company reach 12 production customers by Q4Y2."
      - "Average revenue per active customer rises to about $98K annualized across Y3 because legal-entity expansion, not seat count, drives ARPU."
      - "Gross margin reaches the low-70s by Y3 as D365 deployments standardize before the company broadens SAP coverage."
  upside:
    description: "Known-contact reach clears 70%, partner referrals begin on schedule in Y2, and more customers roll out to second and third legal entities within a year."
    y3RevenueK: 2570.0
    y3EbitdaK: -120.0
    cashLowPointK: 420.0
    keyAssumptionChanges:
      - "Q4Y2 reaches about 14 production customers and Q4Y3 about 38 as partner-sourced deals convert faster."
      - "Blended annual revenue per active customer climbs above $105K because more customers add multiple entities and analytics reporting."
      - "Y3 gross margin reaches roughly 75% as callback orchestration and implementation work become more repeatable."
sensitivity:
  - variable: ARPU
    downsideCase: "Expansion stays closer to one entity per customer and blended annual ARPU settles near $88K."
    baseCase: "Blended annual ARPU reaches about $98K across Y3."
    upsideCase: "More accounts add second and third entities, lifting blended annual ARPU above $105K."
    y3RevenueImpactK: -210.0
    cashImpactK: -160.0
  - variable: CAC
    downsideCase: "CAC rises above $60K because founder-led outbound converts worse and partners refer fewer qualified deals."
    baseCase: "CAC is about $47.3K using total Y1-Y3 S&M spend per landed customer."
    upsideCase: "CAC falls toward $38K once partner-led pilots represent a bigger share of new logos."
    y3RevenueImpactK: -90.0
    cashImpactK: -260.0
  - variable: churn
    downsideCase: "Monthly churn reaches 4.0% if buyers treat callback verification as a feature rather than a control system."
    baseCase: "Monthly churn stays at 2.0% once the workflow is embedded."
    upsideCase: "Monthly churn improves to 1.5% after audit evidence and partner rollouts become sticky."
    y3RevenueImpactK: -120.0
    cashImpactK: -95.0
  - variable: "sales cycle"
    downsideCase: "Pilot-to-production conversion stretches by one quarter and partner deals close later than plan."
    baseCase: "The first production conversions occur inside Year 1 and partner-assisted selling contributes in Year 2."
    upsideCase: "Controllers sign pilots faster after recent audit findings and partners shorten implementation timing."
    y3RevenueImpactK: -320.0
    cashImpactK: -340.0
  - variable: "gross margin"
    downsideCase: "Y3 blended gross margin stalls near 68% because voice, analyst review, and contact cleanup remain service-heavy."
    baseCase: "Y3 blended gross margin is roughly 72% with steady-state unit economics at the plan target."
    upsideCase: "Y3 blended gross margin reaches 75% once callback orchestration and approval packets are largely standardized."
    y3RevenueImpactK: 0.0
    cashImpactK: -140.0
  - variable: "hiring pace"
    downsideCase: "A second GTM hire and later engineering hires are pulled forward before pilot proof is repeatable."
    baseCase: "The base hire plan waits for Year 1 proof, then adds SAP, GTM, and analytics in sequence."
    upsideCase: "Later hires are delayed until partner conversion metrics and deployment cycle-time gates are met."
    y3RevenueImpactK: 0.0
    cashImpactK: -220.0
modelDiagram:
  title: "supplier bank-change revenue loop"
  mermaid: |
    flowchart LR
      Leads --> PaidPilots
      PaidPilots --> ProductionCustomers
      ProductionCustomers --> LegalEntities
      LegalEntities --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: "Revenue engine"
    finding: "Base-case revenue comes from turning 3 Y1 paid pilots into 12 production customers by Q4Y2 and 32 by Q4Y3 while each logo adds more legal entities over time."
  - checkName: "Must go right"
    finding: "Audit acceptance and known-contact reach have to be strong enough that paid pilots convert without turning implementation into a services-heavy project."
  - checkName: "Model breaks if"
    finding: "If sales cycles slip a quarter or margin stays below 70% because of heavy human review, the downside case runs out of cash before the modeled period ends."
  - checkName: "Next-round proof"
    finding: "The seed story is strongest once the company shows 10-12 production customers, 25+ live legal entities, and at least one repeatable partner-led deployment by Q4Y2."
sanityChecks:
  ruleOf40: "Y3 growth 227% + EBITDA margin -27% = 200% (inflated by a still-small revenue base)."
  burnMultiple: "Net burn multiple improves from about 1.2x in Y2 to about 0.3x in Y3 on exit-ARR growth."
  revenuePerFte: "$203K Y3 using Q4Y3 headcount of 10 FTE (benchmark roughly $200–400K vertical SaaS)."
  flags:
    - "The base case asks a two-person GTM team to help scale from 12 to 32 production customers in Y3, so partner referrals and referenceability must arrive on schedule."
    - "Blended ARPU reaches roughly $98K across Y3 only if customers expand beyond the initial single-entity deployment, which is not yet proven publicly."
    - "Gross margin remains below the 72% target through most of Y2 because telephony, contact cleanup, and human review still carry real cost."
    - "The model exits near quarterly breakeven but not sustained annual profitability, so a false-approval incident or failed audit review would likely force a larger seed than planned."
