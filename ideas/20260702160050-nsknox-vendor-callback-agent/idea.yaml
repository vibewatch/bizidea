problem: >-
  Accounts payable teams still have to call suppliers when banking instructions change because auditors and internal
  controls do not trust email-only requests. In multi-plant industrial companies with overseas suppliers, those calls
  happen across time zones and languages, so lean teams batch them, leave voicemails, or keep inconsistent notes. That
  creates caller fatigue, weak evidence, and a perfect opening for business-email-compromise attacks at the moment money
  movement is being approved.
targetUser:
  primary: Head of AP shared services at a PE-backed North American industrial manufacturer with 5-20 plants and overseas suppliers
  secondary: Vendor master data manager or payment-risk analyst responsible for supplier banking changes
  buyer: Corporate controller or VP Finance
startupThesis:
  nonObviousInsight: >-
    The breakthrough is not AI phone calls alone; once callbacks can verify partial bank details in the supplier's
    language and emit structured evidence, the old manual callback becomes a programmable control point inside the
    vendor-master workflow.
  beachhead: >-
    Supplier bank-detail change approvals inside SAP or Microsoft Dynamics AP shared-services teams at PE-backed North
    American industrial manufacturers with overseas raw-material and component suppliers and 25-plus monthly change
    requests
  wedge: >-
    An ERP-triggered callback agent that calls only previously approved supplier contacts, confirms partial bank details
    and legal-entity identity, and returns an auditor-ready approval packet before the vendor master record is updated
  whyNowCatalyst: >-
    nsKnox's launch shows that multilingual, time-zone-aware callback automation with partial-data verification is ready
    just as payment-fraud pressure keeps the control mandatory.
  ventureScalePath: >-
    Start with supplier bank-detail changes, then expand into supplier onboarding, payment release approvals, treasury
    beneficiary changes, and a cross-enterprise external-payee trust graph.
solution: >-
  The product sits between the shared inbox or vendor portal and the ERP vendor-master workflow. When a supplier asks
  to change banking instructions, it pulls the existing approved contact, launches a time-zone-aware multilingual
  callback, verifies limited account digits and legal-entity details against the requested change, and records the
  conversation and outcome. High-confidence matches auto-generate an approval packet for the AP lead, while mismatches,
  unreachable contacts, or social-engineering cues escalate to a payment-risk analyst and freeze the change. Over time,
  the system builds a verified supplier-contact graph that cuts repeat verification time and flags suspicious contact or
  routing-pattern drift across plants and business units.
goToMarketSeed:
  firstCustomer: >-
    A PE-backed North American specialty chemicals manufacturer on SAP or Dynamics 365 Business Central with a
    centralized AP team, 500-plus active suppliers, and repeated bank-detail changes from China, Turkey, and Eastern
    Europe
  buyingTrigger: A recent vendor-banking near miss or internal-audit finding before quarter-end close or SOX control testing
  currentAlternative: Manual callbacks by AP clerks plus ERP vendor blocks and spreadsheet call notes
  switchingReason: >-
    The rail closes requests during supplier local hours, standardizes audit evidence, and improves control quality
    without adding more payment-risk headcount.
  pricingHypothesis: Annual platform fee by legal entity and ERP connector, plus per verified supplier-change workflow
