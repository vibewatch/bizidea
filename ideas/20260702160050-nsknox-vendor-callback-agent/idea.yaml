jobsToBeDone:
  - job: >-
      When a supplier sends new banking instructions before a scheduled payment, help AP shared-services leaders verify
      the request without delaying the payment run, so they can prevent fraud and keep auditors satisfied.
    currentAlternative: Manual callbacks, shared inbox triage, and spreadsheet call logs
    successMetric: Share of bank-change requests resolved within 24 hours with zero fraudulent vendor-master updates
  - job: >-
      When internal audit or SOX testing asks for proof of payee verification, help controllers retrieve structured
      evidence from each callback, so they can pass control testing without reworking AP files.
    currentAlternative: ERP comments, ticket attachments, and employee memory
    successMetric: Audit sample pass rate and hours saved per control-testing cycle
