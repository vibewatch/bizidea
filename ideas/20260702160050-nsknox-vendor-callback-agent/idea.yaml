topRisks:
  - name: Incumbent overlap
    description: Payment-control suites and ERP vendors could add callback automation once the category proves demand.
    mitigation: Focus first on underserved mid-market industrial ERP stacks and build differentiated supplier-contact data and implementation playbooks.
  - name: False approvals
    description: One mistaken approval on a spoofed callback could destroy trust and slow sales.
    mitigation: Require known-contact routing, partial-data verification, conservative escalation rules, and incident-response coverage from day one.
  - name: Supplier reachability
    description: Suppliers may ignore unexpected verification calls or lack the right contact routing, reducing automation rates.
    mitigation: Support multilingual voice, SMS scheduling, portal self-booking, and trusted-contact enrollment during supplier onboarding.
