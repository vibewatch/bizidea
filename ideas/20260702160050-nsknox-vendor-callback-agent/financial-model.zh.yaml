scenarios:
  downside:
    description: "试点转化率停滞在 40% 左右，合作伙伴转介大约推迟一年，活跃客户混合 ARR 停在 8 万美元出头的低位。"
    y3RevenueK: 1480.0
    y3EbitdaK: -1080.0
    cashLowPointK: -180.0
    keyAssumptionChanges:
      - "Q4Y2 收官在约 9 个生产客户，Q4Y3 约 22 个，而不是 32 个。"
      - "由于更少客户扩展到第二、第三个实体，活跃客户年均收入落在约 8.2 万美元，而不是约 9.8 万美元。"
      - "由于联系人清理和人工复核比计划更重，第 3 年混合毛利率停滞在 68% 左右。"
  base:
    description: "第 1 年的三个付费试点，到 Q4Y2 转化为 12 个生产客户，到 Q4Y3 转化为 32 个，同时 ARPU 通过多实体上线和工作流费用不断提升。"
    y3RevenueK: 2032.5
    y3EbitdaK: -547.1
    cashLowPointK: 258.3
    keyAssumptionChanges:
      - "第 1 年拿下三个付费客户，随后合作伙伴协助销售帮助公司在 Q4Y2 达到 12 个生产客户。"
      - "由于拉高 ARPU 的是法律实体扩展而非坐席数，活跃客户年化收入在第 3 年升至约 9.8 万美元。"
      - "随着 D365 部署标准化、公司再拓展 SAP 覆盖，第 3 年毛利率进入 70% 出头区间。"
  upside:
    description: "已知联系人接通率突破 70%，合作伙伴转介在第 2 年按计划启动，更多客户在一年内扩展到第二、第三个法律实体。"
    y3RevenueK: 2570.0
    y3EbitdaK: -120.0
    cashLowPointK: 420.0
    keyAssumptionChanges:
      - "由于合作伙伴来源的交易转化更快，Q4Y2 达到约 14 个生产客户，Q4Y3 约 38 个。"
      - "由于更多客户增加多个实体并采用分析报告功能，活跃客户混合年化收入攀升到 10.5 万美元以上。"
      - "随着回访编排和实施工作变得更加可重复，第 3 年毛利率达到约 75%。"
sensitivity:
  - variable: ARPU
    downsideCase: "扩展停留在每客户约一个实体，混合年化 ARPU 落在约 8.8 万美元。"
    baseCase: "第 3 年混合年化 ARPU 达到约 9.8 万美元。"
    upsideCase: "更多客户增加第二、第三个实体，把混合年化 ARPU 推高到 10.5 万美元以上。"
    y3RevenueImpactK: -210.0
    cashImpactK: -160.0
  - variable: CAC
    downsideCase: "由于创始人主导外呼转化变差、合作伙伴转介的合格交易变少，CAC 升至 6 万美元以上。"
    baseCase: "按第 1-3 年 S&M 总支出除以落地客户数计算，CAC 约为 4.73 万美元。"
    upsideCase: "一旦合作伙伴主导试点在新客户中占比更高，CAC 会降到 3.8 万美元左右。"
    y3RevenueImpactK: -90.0
    cashImpactK: -260.0
  - variable: churn
    downsideCase: "如果买方把回访核验当成一项功能而非一套控制系统，月度流失率会升至 4.0%。"
    baseCase: "工作流一旦嵌入，月度流失率维持在 2.0%。"
    upsideCase: "随着审计证据和合作伙伴上线变得有粘性，月度流失率改善到 1.5%。"
    y3RevenueImpactK: -120.0
    cashImpactK: -95.0
  - variable: "sales cycle"
    downsideCase: "试点转生产环境的转化会延后一个季度，合作伙伴交易的成交时间也晚于计划。"
    baseCase: "首批生产环境转化发生在第 1 年内，合作伙伴协助销售在第 2 年开始贡献。"
    upsideCase: "财务主管在近期审计发现后更快签下试点，合作伙伴也缩短了实施时间。"
    y3RevenueImpactK: -320.0
    cashImpactK: -340.0
  - variable: "gross margin"
    downsideCase: "由于语音、分析师复核和联系人清理仍然偏重服务，第 3 年混合毛利率停滞在 68% 左右。"
    baseCase: "第 3 年混合毛利率约为 72%，单位经济模型达到计划目标的稳态水平。"
    upsideCase: "一旦回访编排和批准材料包基本实现标准化，第 3 年毛利率达到 75%。"
    y3RevenueImpactK: 0.0
    cashImpactK: -140.0
  - variable: "hiring pace"
    downsideCase: "第二个 GTM 岗位和后续工程岗位的招聘，会在试点证明可重复之前就提前启动。"
    baseCase: "基础招聘计划要等第 1 年验证完成后，再依次加入 SAP、GTM 和分析岗位。"
    upsideCase: "后续招聘会推迟到合作伙伴转化指标和部署周期时间达标之后。"
    y3RevenueImpactK: 0.0
    cashImpactK: -220.0
modelDiagram:
  title: "供应商银行变更收入闭环"
  mermaid: |
    flowchart LR
      Leads --> PaidPilots
      PaidPilots --> ProductionCustomers
      ProductionCustomers --> LegalEntities
      LegalEntities --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: "收入引擎"
    finding: "基准情景的收入来自把第 1 年的 3 个付费试点，转化为 Q4Y2 的 12 个生产客户和 Q4Y3 的 32 个，同时每个客户随时间增加更多法律实体。"
  - checkName: "必须做对的事"
    finding: "审计接受度和已知联系人接通率必须足够强，才能让付费试点顺利转化，而不是让实施变成一个重服务项目。"
  - checkName: "模型失效的条件"
    finding: "如果销售周期推迟一个季度，或者因人工复核过重导致毛利率低于 70%，下行情景会在建模期结束前耗尽现金。"
  - checkName: "支撑下一轮的证据"
    finding: "一旦公司能在 Q4Y2 前展示 10-12 个生产客户、25 个以上正式上线的法律实体，并至少跑通一次可重复的合作伙伴主导部署，种子轮故事就最有说服力。"
sanityChecks:
  ruleOf40: "第 3 年增长率 227% + EBITDA 利润率 -27% = 200%（收入基数仍小，数字被放大）。"
  burnMultiple: "净烧钱倍数从第 2 年的约 1.2 倍，随退出 ARR 增长改善到第 3 年的约 0.3 倍。"
  revenuePerFte: "按 Q4Y3 的 10 名全职员工计算，第 3 年人均收入为 20.3 万美元（对标垂直 SaaS 基准约 20-40 万美元）。"
  flags:
    - "基准情景需要一个两人 GTM 团队，协助公司在第 3 年从 12 个生产客户扩大到 32 个，因此合作伙伴转介和可参考案例必须按计划到位。"
    - "只有当客户在初始单实体部署之外持续扩展时，第 3 年混合 ARPU 才能达到约 9.8 万美元，而这一点目前还没有公开验证。"
    - "由于电信、联系人清理和人工复核仍有实打实的成本，毛利率在第 2 年大部分时间里都低于 72% 的目标。"
    - "模型在季度层面接近盈亏平衡，但没有实现持续的年度盈利，因此一次误批准事件或审计失败很可能迫使公司融一轮比计划更大的种子轮。"
