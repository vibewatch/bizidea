slug: "supplier-bank-change-rail"
date: "2026-07-02"
currency: USD
modelStartMonth: "2026-08"
assumptions:
  - id: A1
    name: "模型起始月份"
    value: "2026-08"
    unit: "YYYY-MM"
    source: "[BP date 2026-07-02]；模型从商业计划书标注日期后的第一个完整月份开始。"
  - id: A2
    name: "起始现金 / 种子前轮融资额"
    value: "$2.6M"
    unit: "USD"
    source: "[BP fundingAsk targetFundingRangeUsd $2-4M + BP fundingAsk runwayMonths 18 + model cash curve]；融资额取所述区间偏低端，因为计划在早期验证阶段仍以 D365 优先、创始人主导为主。"
  - id: A3
    name: "起始付费客户数"
    value: "0"
    unit: "count"
    source: "[BP milestones 0-12 months + BP experimentRoadmap]；公司从零收入起步，必须先把共创客户转化为付费试点。"
  - id: A4
    name: "客户定义"
    value: "一个付费制造业客户（logo），无论处于付费试点还是生产阶段；同一客户内部的法律实体越多，ARPU 越高。"
    unit: "definition"
    source: "[BP businessModel.unitOfValue + BP pricing by legal entity and workflow + BP milestones]；获客动作以客户（logo）为单位，但收入会随法律实体数量和工作流量扩大。"
  - id: A5
    name: "付费试点定价"
    value: "约 4 个月内收取 $25K（约每月 $6.3K）。"
    unit: "USD/logo"
    source: "[BP investorMemo.firstCustomer.initialContract $20k-$35k paid pilot + BP gtm.pricing]；模型采用试点价格区间偏低中位数，避免高估第 1 年收入。"
  - id: A6
    name: "生产环境定价锚点"
    value: "单个法律实体、不含额外工作流费用和多实体扩展前，约 $66K ARR。"
    unit: "USD/logo/year"
    source: "[BP investorMemo.firstCustomer.initialContract $60k-$90k ARR plus workflow fees + Research bottomUpSizingDrivers $60k SOM spend]；生产环境定价从所述区间偏下半段起步。"
  - id: A7
    name: "每个生产客户的法律实体扩展数"
    value: "试点阶段约 1.0 个实体，到 Q4Y2 每客户约 2.2 个在用实体，到 Q4Y3 约 2.7 个。"
    unit: "entities per logo"
    source: "[BP gtm.pricing by legal entity + BP milestones 25+ live legal entities at 8-12 production customers]；模型假设 ARPU 的提升来自每个客户内部的实体扩展，而非单纯拼客户数量。"
  - id: A8
    name: "客户爬坡节奏"
    value: "到 M12 有 3 个付费客户，到 Q4Y2 达到 12 个，到 Q4Y3 达到 32 个。"
    unit: "customersEop"
    source: "[BP milestones 0-12, 12-24, and 24-36 months + BP gtm.funnelTargets]；爬坡节奏落在所述第 3 年 25-40 个生产客户的里程碑区间内，同时第 1 年保持创始人主导。"
  - id: A9
    name: "活跃客户混合年化收入"
    value: "第 3 年约 $98K，Q4Y3 期末客户结构年化后约 $101K。"
    unit: "USD/customer/year"
    source: "[Model calc from BP pricing, BP milestones, and Research SOM]；随着客户增加法律实体、工作流量和高级报告功能，混合 ARPU 会随之上升。"
  - id: A10
    name: "毛利率爬坡"
    value: "第 1 年 45%-52%，第 2 年 58%-68%，第 3 年 70%-73%。"
    unit: "gross margin percent"
    source: "[BP businessModel.targetGrossMarginPct 72 + BP operations + Research sensitivityCases]；早期电信、联系人清理和人工复核成本会拖累毛利率，直到实施流程标准化。"
  - id: A11
    name: "月度流失率"
    value: "2.0%"
    unit: "percent per month"
    source: "[BP risks + Research openQuestions and sensitivityCases]；工作流一旦嵌入客户体系应具备粘性，但现有厂商打包和证据接受度风险，让早期采用保守流失率假设更合理。"
  - id: A12
    name: "招聘时间线"
    value: "M0：创始人和创始工程师；M2：AP 控制负责人；M6：第二名负责语音/集成的工程师；M10：合作伙伴负责人；M15：SAP/集成工程师；M18：第二名控制/实施人员；M24：第二名 GTM 人员；M25：G&A/运营人员；M31：分析工程师。"
    unit: "timeline"
    source: "[BP team + BP strategicChoices.sequencingRationale + BP milestones + startup-finance heuristic]；招聘在试点验证前保持精简，之后依次补上 SAP、合作伙伴赋能和分析能力。"
  - id: A13
    name: "创始人全负担现金薪酬"
    value: "$150K"
    unit: "USD/FTE/year"
    source: "创业财务经验值：种子前轮阶段精简的创始人薪酬水平，与商业计划书中销售和产品仍由创始人主导保持一致。"
  - id: A14
    name: "工程全负担现金薪酬"
    value: "$195K"
    unit: "USD/FTE/year"
    source: "创业财务经验值：面向美国本地集成与应用型 AI 工程师，负责商业计划书产品和团队部分所述的 D365、SAP、语音和分析能力建设。"
  - id: A15
    name: "AP 控制/实施全负担现金薪酬"
    value: "$145K"
    unit: "USD/FTE/year"
    source: "创业财务经验值：财务控制实施类人才，与商业计划书团队及运营部分强调的审计材料包设计和上线纪律保持一致。"
  - id: A16
    name: "销售/合作伙伴全负担现金薪酬"
    value: "$175K"
    unit: "USD/FTE/year"
    source: "[BP gtm.channels + BP team]；创业财务经验值包含底薪、绩效薪酬和差旅，覆盖直接企业销售和合作伙伴销售。"
  - id: A17
    name: "行政/运营全负担现金薪酬"
    value: "$110K"
    unit: "USD/FTE/year"
    source: "创业财务经验值：面向精简的财务、供应商管理、合规协调和保险支持，随客户数扩大而配置。"
  - id: A18
    name: "薪酬在损益表科目间的分配"
    value: "创始人：60% 销售营销（S&M）/ 20% 研发（R&D）/ 20% 行政管理（G&A）；工程：100% 研发；AP 控制：40% 销售营销 / 30% 研发 / 30% 行政管理；销售：100% 销售营销；行政管理：100% 行政管理。"
    unit: "allocation"
    source: "[BP team rationales + BP operations]；分配比例依据计划中各角色分别承担销售、部署、产品化和后台支持的职责划分。"
  - id: A19
    name: "非薪酬运营预算爬坡"
    value: "非薪酬支出总额从第 1 年初期的约每月 $13K，升至第 3 年第 4 季度的约每月 $39K。"
    unit: "USD/month"
    source: "[BP operations + BP fundingAsk.useOfFundsSummary + startup-finance heuristic]；涵盖云服务、COGS 之外的电信开销、法务、保险、差旅和合作伙伴赋能，不含大规模付费获客投入。"
  - id: A20
    name: "收入确认惯例"
    value: "客户（logo）一旦在某个建模月份或季度内上线，当期即全额计为活跃；季度收入采用期初、期末客户爬坡所隐含的平均活跃客户数计算。"
    unit: "formula"
    source: "采用这一建模惯例，让收入能与客户数和混合 ARPU 在紧凑的季度布局中相互对应。"
  - id: A21
    name: "现金折算惯例"
    value: "现金变动等同于 EBITDA。"
    unit: "formula"
    source: "创业财务经验值：对一家轻资产软件公司而言，在种子前轮规模下不单独建模资本支出、税费、债务偿付和营运资金时点。"
  - id: A22
    name: "CAC 计算惯例"
    value: "以第 1-3 年销售与营销总支出除以 32 个成交付费客户计算，为 $47.3K。"
    unit: "USD/customer"
    source: "[Model calc + BP gtm.funnelTargets + BP gtm.channels]；这个数字刻意偏保守，因为它计入了创始人主导外呼和早期试点销售的成本。"
  - id: A23
    name: "支撑下一轮融资规模的里程碑"
    value: "到 Q4Y2 达到 10-12 个生产客户、25 个以上在用法律实体，并至少完成一次可复制的合作伙伴主导部署，同时把现金留存到 Q2Y3 前维持约 6 个月的现金跑道。"
    unit: "milestone"
    source: "[BP milestones 12-24 months + BP fundingAsk.useOfFundsSummary + model cash curve]；种子前轮的融资规模是按能在种子轮之前证明可重复部署来设计的。"
