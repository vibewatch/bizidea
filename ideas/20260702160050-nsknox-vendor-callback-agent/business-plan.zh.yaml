operations:
  - "在回访自动化启动前完成已获批准联系人的登记与定期复核"
  - "带品牌来电显示、当地工作时间排期、录音留存和语言路由的通话编排"
  - "针对不匹配、供应商无法触达和高风险地区的人工分析师处理队列"
  - "ERP 事件 ID 绑定，让每份决策材料包都挂接到对应的供应商主数据变更"
  - "一套可复制的 D365 优先实施打法，供合作伙伴在 SAP 扩展前先跑起来"
team:
  - role: "创始产品/GTM 负责人"
    startTiming: "第 0 个月"
    rationale: "负责共创客户销售、定价，以及把 AP 痛点翻译成买方语言和产品范围。"
  - role: "创始工程负责人"
    startTiming: "第 0 个月"
    rationale: "搭建工作流引擎、ERP 触发层、回访编排和证据流水线。"
  - role: "AP 控制实施负责人"
    startTiming: "第 2 个月"
    rationale: "梳理真实客户工作流，验证审计材料包的措辞，防止部署演变成定制咨询项目。"
  - role: "语音 / 集成工程师"
    startTiming: "第 6 个月"
    rationale: "提升多语言接通率，加固电话系统可靠性，并在试点需求得到验证后加入第二个 ERP 连接器。"
milestones:
  - horizon: 0–12 个月
    items:
      - "与使用 D365 的制造企业签下两个付费试点，并至少转化一个进入生产环境。"
      - "在前 100 个以上工作流中，证明已知联系人接通率超过 60%、处理速度提升超过 30%、零误批准。"
      - "在一个正式客户处赢得内部审计对批准材料包的认可。"
      - "签下两个转介或实施合作伙伴，并配有成文的试点打法。"
  - horizon: 12–24 个月
    items:
      - "上线 SAP 连接器和跨实体分析，用于识别反复的联系失败、不匹配模式和批准瓶颈。"
      - "达到 8-12 个生产环境客户和 25 个以上正式上线的法律实体。"
      - "通过合作伙伴主导的实施，把部署时间标准化到六周以内。"
      - "把供应商联系人登记和预约回访兜底功能打包成正式模块推出。"
  - horizon: 24–36 个月
    items:
      - "利用同一张供应商信任图谱，扩展到供应商入驻联系人核实和付款放行审批。"
      - "达到 25-40 个生产环境客户，或规模相当的合作伙伴主导多实体覆盖。"
      - "推出跨实体风险基准和欺诈异动监测，作为高级分析层级。"
risks:
  - risk: "一次被伪装回访电话骗过的误批准，会在公司发展早期就摧毁信任。"
    likelihood: "Medium"
    impact: "High"
    mitigation: "只走已知联系人路由，要求部分数据核验，在每次变更时都保留人工批准环节，一旦联系人、语言或账户信号出现冲突就立即升级处理。"
  - risk: "供应商无视或不信任自动化回访电话，导致接通率太低，撑不起有力的投资回报叙事。"
    likelihood: "Medium"
    impact: "High"
    mitigation: "使用品牌来电显示、贴合当地工作时间的排期、短信兜底，并在入驻阶段就完成联系人登记，而不是盲目外呼。"
  - risk: "即便 AP 用户喜欢这套工作流，财务主管或审计方仍可能拒绝这份证据材料包。"
    likelihood: "Medium"
    impact: "High"
    mitigation: "尽早开展材料包评审，保留录音和转写记录，把每份材料包都绑定到 ERP 事件 ID，从第一天起就保留人工签核路径。"
  - risk: "在这家创业公司赢得足够多的参考客户之前，现有厂商就把回访自动化打包进更广的支付控制或供应商数据套件。"
    likelihood: "High"
    impact: "Medium"
    mitigation: "在 D365 密集的中端市场快速推进，强调更快的部署速度和更紧凑的控制材料包，并在早期客户中积累差异化的供应商联系人结果数据。"
  - risk: "由于各工厂客户联系人数据和 ERP 工作流参差不齐，实施会变得越来越依赖人工服务。"
    likelihood: "Medium"
    impact: "Medium"
    mitigation: "把首版产品范围收窄，把联系人清理步骤打包成模块，在扩大 ERP 覆盖之前先把 D365 实施做成模板。"
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2-4M"
  runwayMonths: 18
  useOfFundsSummary: "打造首款 ERP 触发的回访产品，招募创始工程和控制团队，用审计接受度和接通率数据验证 2-3 个付费试点，并建立首个合作伙伴主导的部署打法。"
