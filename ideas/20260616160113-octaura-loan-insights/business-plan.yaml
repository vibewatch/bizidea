slug: clo-trade-memo-engine
date: '2026-06-16'
executiveSummary: >-
  Octaura's June 2026 launch and record LSTA secondary-loan volumes indicate that
  U.S. leveraged-loan desks are already buying workflow-native intelligence, but
  the researched gap is still the last mile from noisy market color to an
  auditable bid memo. The first customer is an independent U.S. CLO manager with
  roughly $3B-$15B AUM, 5-15 CLOs, and fewer than five dedicated traders; these
  desks feel the pain most acutely during BWIC-heavy sessions, quarter-end marks,
  and new issuance when manual spreadsheets delay bids. The product should not
  try to replace Bloomberg, S&P, Allvue, or Octaura on day one; it should sit on
  top of those systems and turn customer-owned runs, positions, and market
  exports into explainable bid ranges plus investment-committee-ready trade
  memos. That wedge ties the first user, first budget trigger, first distribution
  motion, and first proof point into one system: faster bid submission with a
  retained rationale. The company can plausibly win early if pilots show more
  than 50% lower memo-prep time and repeated PM acceptance of generated bid
  ranges, but recommendation trust and input-data quality are the main
  disconfirming risks. The beachhead is narrow enough for founder-led sales, yet
  too small for a venture outcome unless the same decision layer expands into
  adjacent loan funds, private-credit secondaries, and other structured-credit
  desks after product-market proof. Competitive pressure is real because
  incumbents already own data, OMS, compliance, and execution budgets, so
  defensibility must come from portfolio-specific decision memory and approval
  workflows rather than generic AI summarization. Independent proof on exact
  budget ownership and live pilot access is still limited in the research, so
  the first 12 months should prioritize design-partner conversion before
  aggressive hiring.
problem:
  - Lean CLO trading desks still stitch together dealer runs, end-of-day marks, terminal screens, and analyst spreadsheets before they can place a bid or defend a mark.
  - When BWIC volume spikes or quarter-end marks arrive, desks lose speed, consistency, and auditability because the trading rationale lives in scattered files and inboxes.
solution:
  - Ingest customer-owned dealer runs, watchlists, positions, and market-data exports into a live queue of loan opportunities ranked by actionability.
  - Generate explainable bid ranges, liquidity context, comparable names, and IC-ready trade memos that traders and PMs can edit, approve, and retain as decision history.
whyWeWin:
  - The product wedges into the last-mile decision workflow without asking customers to rip out Bloomberg, S&P, Allvue, Siepe, or Octaura.
  - Every bid recommendation is explainable and editable, which directly addresses the trust barrier highlighted by researched PM and compliance constraints.
  - Customer-specific bid history, policy edits, and approval logs can compound into a portfolio-aware decision memory that generic terminals and research tools do not capture.
strategicChoices:
  beachhead: Independent U.S. CLO managers running 5-15 broadly syndicated loan vehicles with small internal trading teams and regular secondary-loan BWIC participation.
  wedgeRationale: >-
    This slice is concentrated enough for targeted outbound, already pays for
    specialist workflow software, and experiences the same repeatable job every
    week: convert fragmented loan color into a bid and memo before liquidity
    disappears. A broader launch across all credit funds would slow proof
    because each workflow, data shape, and compliance path differs.
  sequencingRationale: >-
    The company should first prove shadow-mode bid accuracy and memo time
    savings using file-based ingestion, then add deeper OMS and compliance
    integrations only after a few paid pilots convert. Hiring, partnerships, and
    pricing all follow that order because trust and deployment speed matter more
    than feature breadth at this stage.
  notYet:
    - European CLO desks before U.S. reference cases exist.
    - Private-credit secondaries before the broadly syndicated loan workflow is repeatable.
    - Autonomous order routing or execution-venue functionality.
    - Full terminal-style market-data replacement.
market:
  tam: "Estimated $29.5M TAM: 118 active CLO managers x roughly $250k annual workflow-overlay ACV."
  sam: "Estimated $10.0M SAM: about 40 U.S. independent managers in the 5-15 CLO band x roughly $250k annual ACV."
  som: "Estimated $2.5M SOM by year three: 10 production manager logos x roughly $250k blended annual ACV."
  segments:
    - Independent U.S. CLO managers with lean trading teams.
    - Adjacent structured-credit investors such as loan mutual funds and private-credit secondaries.
  buyingProcess: >-
    A head trader or PM should sponsor a shadow-mode pilot after a volatile
    trading window or new issuance cycle exposes manual bottlenecks. The CIO or
    head of structured credit is the economic buyer, while operations and
    compliance review ingestion, entitlements, and audit-trail controls before
    production rollout.
product:
  mvp: >-
    A desktop workflow that accepts dealer runs, watchlists, positions, and
    market-data exports; normalizes them; and produces explainable bid ranges,
    comparable names, liquidity context, and an editable IC-ready memo for each
    opportunity. The MVP should run in shadow mode first, with explicit user
    edits and retained rationale rather than automated order routing.
  sixMonth: >-
    Ship file and email ingestion, comparable-name logic, editable bid
    rationale, searchable decision history, and PDF/exportable memo output for
    2-3 design partners.
  twelveMonth: >-
    Add portfolio-rule checks, role-based approvals, entitlement controls, core
    Allvue/Siepe export compatibility, and production conversions for the first
    3-5 paying manager logos.
  twentyFourMonth: >-
    Expand from single-desk memo generation into cross-desk workflow analytics,
    compliance-grade audit exports, and adjacent loan-fund or private-credit
    workflows using the same decision-memory layer.
  keyBets:
    - Customers will share dealer-run, watchlist, and position-file inputs for a limited pilot if deployment starts with CSV and email ingestion.
    - PMs will trust recommended bid ranges if the system exposes comps, liquidity observations, and the effect of portfolio rules on each recommendation.
    - Existing Allvue, Siepe, and Octaura footprints can shorten deployment instead of blocking it.
    - Auditability and approval logging are valuable enough to expand budget beyond a narrow productivity-tool purchase.
gtm:
  wedge: Shadow-mode BWIC bid-memo pilot for independent U.S. CLO managers.
  channels:
    - Founder-led outbound to ranked U.S. CLO managers with 5-15 CLOs and lean trading teams.
    - Integration-led referrals through Allvue, Siepe, and credit-market consultants already embedded in CLO operations.
    - Targeted thought leadership around quarter-end marks, BWIC compression, and defensible trade rationale for structured-credit desks.
  funnelTargets: "Target 25%+ of outbound accounts to discovery, 20%+ of discoveries to paid pilots, 50%+ of paid pilots to annual production, and 70%+ weekly user activity by day 60 of each pilot."
  pricing: >-
    Start with a paid 90-day pilot priced to the workflow rather than to market
    data, then convert to an annual desk subscription plus usage-based fees for
    active loan opportunities analyzed each month. This matches the researched
    budget logic: the buyer pays for faster best-execution decisions and lower
    analyst overhead without replacing incumbent data vendors.
businessModel:
  revenueStreams:
    - Paid pilot deployments tied to live desk workflows.
    - Annual desk subscription for production use.
    - Usage-based fees for high-volume opportunity analysis.
    - Premium approval, audit-export, and policy-control modules.
  unitOfValue: One active CLO trading desk using the system on recurring loan opportunities.
  targetGrossMarginPct: 70
  expansionLevers:
    - Add more desks and PM teams within the same manager.
    - Upsell compliance-grade approval and audit modules once trade-memo usage is established.
    - Expand the same workflow into loan funds, financing desks, and private-credit secondaries.
    - Increase integration depth with OMS and data providers to raise retention.
strategyMap:
  northStarMetric: Production loan opportunities processed through the platform per live manager per month.
  inputMetrics:
    - Time from run receipt to first draft memo.
    - Percentage of opportunities with complete data ingestion.
    - PM acceptance rate of recommended bid range before manual override.
    - Pilot-to-production conversion rate.
    - Weekly active users per pilot desk.
  moatsToBuild:
    - Portfolio-specific decision history linking bids, edits, passes, and outcomes.
    - Rule engine encoding manager-specific constraints and approval logic.
    - Audit and compliance logs that double as proprietary training labels.
    - Deployment playbooks for the dominant CLO operating stacks.
  killCriteria:
    - "Fewer than 2 of the first 10 qualified target managers allow a live data-ingestion pilot."
    - "Median PM acceptance of recommended bid ranges stays below 30% after two pilot iterations."
    - "The product fails to cut memo-prep time by at least 40% in live shadow-mode use."
    - "Paid pilot to production conversion stays below 25% across the first four pilots."
  mermaid: |
    flowchart LR
      Wedge[Independent U.S. CLO manager pilot] --> MVP[Explainable bid range plus memo MVP]
      MVP --> Proof[Time saved, PM acceptance, audit trail]
      Proof --> Expansion[More desks, deeper integrations, adjacent credit workflows]
investorMemo:
  verdict:
    call: Watch
    conviction: Strong workflow pain and a credible wedge, but concentrated buyers and trust-heavy deployment keep conviction below partner-meeting level until pilots convert.
    whyBelieve: "The company targets a specific artifact that incumbents still do not fully own: a portfolio-aware, IC-ready bid memo built from existing loan workflows."
    whyDoubt: The same buyers already pay data, OMS, and execution vendors that could bundle adjacent memo features before a new vendor proves differentiated outcomes.
    nextDiligence: Obtain three live shadow-mode pilot readouts showing memo-prep time saved, PM edit rate, and willingness to convert to annual production contracts.
  firstCustomer:
    title: Head of CLO Trading at an independent U.S. CLO manager
    profile: A U.S. manager with 5-15 broadly syndicated loan CLOs, regular BWIC participation, fewer than five dedicated traders, and existing Allvue, Siepe, Bloomberg, or Octaura workflows.
    trigger: A volatile spread environment, quarter-end marks, or a new CLO launch that increases bid volume and exposes how slow the current spreadsheet-and-email process is.
    buyer: Chief Investment Officer or Head of Structured Credit
    initialContract: Paid 90-day pilot in the $25k-$50k range, converting to roughly $150k-$250k annual desk software if the desk sees faster bid turnaround, acceptable PM trust, and clean compliance review.
  mustBeTrue:
    - At least half of qualified pilot desks will share dealer-run and position data without requiring a multi-quarter integration project.
    - Heads of trading and PMs will accept system-generated bid ranges on a meaningful minority of live opportunities within 90 days.
    - Buyers will fund the product from trading, operations, or compliance budgets without demanding terminal replacement economics.
    - Incumbents will not neutralize the wedge with an adequate bundled memo product before the startup builds customer-specific decision memory.
    - The company can expand from CLO desks into adjacent structured-credit workflows without rebuilding the core product from scratch.
  diligenceQuestions:
    - Which budget owner actually signs the first contract: CIO, head trader, COO, or compliance lead?
    - How many weeks of live BWIC and quarter-end data are needed before PMs trust the bid recommendations?
    - What minimum integration path works across both Allvue-heavy and non-Allvue managers?
    - How sticky is the workflow if Bloomberg, S&P, or Octaura ship basic memo generation?
    - Which adjacent segment reuses the same data model and approval logic with the least product rewrite?
operatingAssumptions:
  - assumption: Design partners will allow CSV, email, and OMS-export ingestion before API-level integration is available.
    basis: research.yaml
    validationTest: Secure two pilots, one Allvue-based and one non-Allvue, that each deliver live run and position files inside the first 45 days.
    decisionImpact: If false, the company must narrow the beachhead to a single operating stack and delay broad outbound GTM.
  - assumption: PMs care enough about explainability and audit trail to prefer an editable memo workflow over a faster but opaque recommendation engine.
    basis: idea.yaml
    validationTest: In pilot reviews, measure whether PMs cite comps, liquidity context, and retained rationale as reasons to keep using the system.
    decisionImpact: If false, the roadmap should prioritize valuation support or pure workflow logging instead of recommendation features.
  - assumption: Roughly $150k-$250k annual desk pricing is acceptable if the product saves analyst time and improves bid responsiveness.
    basis: operator judgment
    validationTest: Present pilot-to-production pricing to at least five qualified buyers and confirm that two or more treat it as within discretionary workflow-software range.
    decisionImpact: If false, the company must simplify the product, lower ACV expectations, or pursue a broader buyer set earlier.
  - assumption: Integration partnerships with Allvue, Siepe, or Octaura-adjacent vendors will reduce deployment friction rather than block access to the decision layer.
    basis: research.yaml
    validationTest: Complete one partner-assisted deployment or documented data-export workflow by the second production logo.
    decisionImpact: If false, the company must invest earlier in direct connectors and a more self-serve ingestion stack.
  - assumption: The same core decision-memory architecture will extend into adjacent loan-fund and private-credit workflows after CLO proof.
    basis: idea.yaml
    validationTest: Run ten adjacency interviews and one prototype demo in a non-CLO credit desk before committing roadmap capacity.
    decisionImpact: If false, the company remains a narrow workflow business and funding needs should stay conservative.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Recruit three design partners from the target 5-15 CLO manager segment.
    hypothesis: The researched beachhead feels acute enough pain to grant workflow access for a paid or near-paid pilot.
    successMetric: Three signed pilot LOIs or paid pilots with named executive sponsors.
    owner: Founder CEO
  - horizon: 0–90 days
    experiment: Run shadow-mode bid memo generation on recent BWIC lists using file-based ingestion.
    hypothesis: The MVP can cut memo-prep time by at least 40% without lowering perceived recommendation quality.
    successMetric: Median desk-reported memo-prep time falls by 40%+ across at least 30 opportunities.
    owner: Founding eng
  - horizon: 0–90 days
    experiment: Test recommendation explainability with PM review sessions.
    hypothesis: PMs will accept or lightly edit a meaningful share of bid ranges when comps and liquidity context are visible.
    successMetric: PMs accept or make only minor edits on 30%+ of reviewed recommendations by the end of pilot month three.
    owner: Product lead
  - horizon: 0–90 days
    experiment: Map the buying center across discovery calls.
    hypothesis: A repeatable budget path exists through CIO, trading, operations, or compliance leadership.
    successMetric: Ten discovery calls produce a consistent primary budget owner in at least six accounts.
    owner: Founder CEO
  - horizon: 0–90 days
    experiment: Validate an Allvue or Siepe-compatible export and approval workflow.
    hypothesis: Existing CLO operating stacks can be used as deployment leverage instead of becoming blockers.
    successMetric: One pilot completes a documented export or approval loop with no custom engineering longer than two weeks.
    owner: Solutions engineer
  - horizon: 0–90 days
    experiment: Test pilot-to-production pricing and conversion criteria.
    hypothesis: Buyers will convert if the commercial proposal is tied to desk workflow outcomes rather than seat replacement.
    successMetric: Two pilots accept production pricing terms or a defined conversion framework before pilot end.
    owner: Founder CEO
operations:
  - Standardize borrower, facility, and position identifiers across dealer runs, watchlists, and OMS exports.
  - Maintain entitlement controls, information barriers, and approval logging as core product operations rather than post-sale add-ons.
  - Run monthly calibration reviews with traders and PMs to compare recommended versus submitted bids and capture policy edits.
  - Package memo exports and retained workpapers so customers can reuse them for IC, risk, valuation, and audit workflows.
  - Manage partner relationships with Allvue, Siepe, and upstream data providers to keep deployment cycles short.
team:
  - role: Founding eng
    startTiming: Month 0
    rationale: Owns ingestion, recommendation logic, and the first design-partner deployments.
  - role: Founder CEO
    startTiming: Month 0
    rationale: Runs founder-led sales, pilot design, and partner development in a concentrated buyer market.
  - role: Product and solutions lead
    startTiming: Month 1
    rationale: Converts desk-specific workflows into repeatable onboarding and keeps PM trust requirements aligned with roadmap choices.
  - role: Full-stack data engineer
    startTiming: Month 3
    rationale: Accelerates normalization, search, audit logging, and manager-specific configuration after the first pilots start.
  - role: Compliance domain advisor
    startTiming: Month 3
    rationale: Shapes MNPI controls, approval workflows, and audit exports that materially affect adoption.
  - role: Account executive
    startTiming: Month 9
    rationale: Only add dedicated sales capacity after the company proves a repeatable pilot motion and a clear budget owner.
milestones:
  - horizon: 0–12 months
    items:
      - Sign 3 design partners in the target U.S. CLO manager segment.
      - Launch shadow-mode pilots that ingest live dealer runs and position files.
      - Prove 40%+ memo-prep time reduction and 30%+ PM acceptance or light-edit rate.
      - Convert 3-5 managers to paid production with audit-ready memo and approval workflows.
      - Complete one partner-assisted deployment path with an incumbent CLO operating stack.
  - horizon: 12–24 months
    items:
      - Reach 8-10 production manager logos in the core beachhead.
      - Expand from memo generation into portfolio-rule checks, approvals, and compliance exports.
      - Add multi-desk rollouts within existing manager accounts.
      - Validate one adjacent structured-credit segment with the same decision-memory core.
  - horizon: 24–36 months
    items:
      - Launch a second workflow line for an adjacent loan-fund or private-credit segment.
      - Build benchmarking and outcome analytics from accumulated decision history.
      - Establish the platform as the system of record for bid rationale across multiple credit workflows.
risks:
  - risk: Customer data arrives too late or too inconsistently for credible bid recommendations.
    likelihood: High
    impact: High
    mitigation: Start with the file formats desks already use, measure ingestion coverage early, and narrow the beachhead if only one operating stack is workable.
  - risk: PMs view generated bid ranges as black-box outputs and refuse to use them in live decisions.
    likelihood: High
    impact: High
    mitigation: Keep the product in shadow mode first, expose every comp and liquidity input, and optimize for editable rationale rather than automation.
  - risk: Incumbents bundle basic memo features into existing data or OMS products before the startup becomes embedded.
    likelihood: Medium
    impact: High
    mitigation: Differentiate on portfolio-specific rules, decision history, and approval workflow depth rather than on memo text generation alone.
  - risk: The core CLO manager segment is too concentrated to support efficient growth if expansion proves harder than expected.
    likelihood: Medium
    impact: High
    mitigation: Treat adjacency validation as a parallel diligence track and avoid scaling sales headcount before the second segment is credible.
  - risk: MNPI and compliance-control gaps delay procurement or create product liability.
    likelihood: Medium
    impact: High
    mitigation: Build entitlements, information barriers, approval logs, and retained workpapers into the MVP and review them with customer compliance stakeholders.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $3-4M
  runwayMonths: 18
  useOfFundsSummary: Fund 18 months of product build, design-partner onboarding, integration playbooks, compliance-grade workflow controls, and founder-led sales to reach 3-5 production CLO manager logos and validate one adjacent expansion path.
