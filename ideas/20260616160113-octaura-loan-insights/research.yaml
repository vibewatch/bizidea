    How many U.S. independent CLO managers in the 5-15 CLO band will permit dealer-run and position-file ingestion for a live pilot?
  - >-
    What proof threshold is required before PMs will trust system-generated bid ranges in live BWICs?
  - >-
    Will partners such as Allvue, Siepe, or Octaura support deep workflow integrations or try to own the decision layer themselves?
  - >-
    Which budget owner ultimately pays: trading, data, operations, or compliance?
