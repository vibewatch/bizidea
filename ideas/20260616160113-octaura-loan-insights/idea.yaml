jobsToBeDone:
  - job: When a CLO desk receives a fresh set of secondary-loan opportunities, help traders decide which names deserve a bid and at what level, so they can move before liquidity disappears.
    currentAlternative: Dealer runs plus analyst spreadsheets and ad hoc PM review
    successMetric: More bids submitted within the trading window with less analyst prep time
  - job: When portfolio managers need to defend marks or recent trade decisions, help them produce a clean explanation of price, liquidity, and rationale, so they can satisfy IC, risk, and audit stakeholders quickly.
    currentAlternative: Rebuilding the case from email threads, terminal screenshots, and scattered notes
    successMetric: Faster memo turnaround and fewer challenged trade rationales
