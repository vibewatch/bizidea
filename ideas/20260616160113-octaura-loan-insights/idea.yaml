differentiator: >-
  Most market-data products stop at showing prices, runs, and headlines. This product produces the actual trading artifact a desk needs next: an explainable bid view with liquidity context, comparable names, and a reusable decision record. That makes it useful even when a customer keeps existing data vendors, and it creates a feedback moat from bid outcomes and portfolio-specific policy decisions that a generic terminal does not capture.
