topRisks:
  - name: Data access risk
    description: If the product cannot ingest timely, credible desk inputs and compatible market-data exports, recommendations will not be trusted.
    mitigation: Start with customer-owned dealer runs, watchlists, and export files, then add deeper integrations only after proving workflow value.
  - name: Recommendation trust gap
    description: PMs may reject generated bid levels if they feel like black-box outputs in a high-stakes market.
    mitigation: Make every recommendation fully explainable with comparable names, liquidity observations, and editable rationale before any automation is introduced.
  - name: Incumbent bundling
    description: Existing credit-data platforms could add basic memo generation and compress the category before the startup earns distribution.
    mitigation: Focus on the full decision workflow, approval trail, and portfolio-specific learning loop rather than on raw data display alone.
