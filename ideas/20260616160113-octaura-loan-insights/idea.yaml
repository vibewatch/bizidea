problem: >-
  Mid-sized CLO managers still make secondary-loan trading decisions with fragmented dealer runs, end-of-day marks, and analyst spreadsheets that arrive too late for fast relative-value decisions. That slows bidding, weakens auditability, and leaves lean desks unable to explain why a level moved or whether liquidity is real. In an opaque market, the bottleneck is no longer access to another screen; it is converting noisy market data into a decision-ready memo before the opportunity disappears.
targetUser:
  primary: Head of CLO Trading or portfolio manager at an independent U.S. CLO manager
  secondary: Loan analysts and trading assistants supporting broadly syndicated loan portfolios
  buyer: Chief Investment Officer or Head of Structured Credit
startupThesis:
  nonObviousInsight: >-
    The market shift is not that leveraged-loan desks suddenly need more data; it is that real-time pricing, liquidity, and news feeds are finally being packaged as workflow inputs. Once that happens, the winning product is not another terminal but a system that converts fragmented loan signals into comparable bid levels, trade rationale, and post-trade memory for lean credit teams.
  beachhead: U.S. CLO managers running 5 to 15 broadly syndicated loan vehicles with small internal trading teams and weekly participation in secondary-loan BWICs
  wedge: A trade-intelligence workbench that ingests customer-owned loan runs and market feeds, then auto-generates comparable pricing, liquidity-adjusted bid levels, and investment-committee-ready trade memos for each loan opportunity
  whyNowCatalyst: Octaura's launch shows leveraged-loan desks are actively buying real-time, workflow-native intelligence because fragmented end-of-day data is no longer good enough for relative-value and liquidity decisions.
  ventureScalePath: Start with CLO trading desks, then expand into loan mutual funds, private-credit secondaries, financing desks, and eventually a cross-asset credit decision layer for opaque fixed-income markets.
solution: >-
  The product is a desktop workflow that pulls in a manager's dealer runs, watchlists, internal positions, and available market-data exports to create a live queue of tradeable loan opportunities. For each name, it builds an explainable bid recommendation using recent pricing, observed liquidity, news, and manager-specific portfolio constraints, then outputs a clean memo that a PM can review, edit, and send to the investment committee or risk team. The same system keeps a searchable memory of prior bids, wins, passes, and rationale so future decisions improve instead of restarting from scratch. Rather than compete as a broad data terminal, it owns the last mile between noisy loan data and an auditable trading decision.
goToMarketSeed:
  firstCustomer: Independent U.S. CLO managers with $3B to $15B AUM, 5 to 15 CLOs, fewer than five dedicated traders, and regular secondary-loan bid activity
  buyingTrigger: A new CLO launch, spread volatility, or quarter-end marks that expose how slow and manual the desk's current price-discovery workflow has become
  currentAlternative: Bloomberg and incumbent loan-mark data combined with dealer messages, analyst-built Excel models, and internal trade memos
  switchingReason: It does not ask teams to replace their data providers on day one; it turns existing feeds and desk inputs into faster, more consistent bid decisions with a full audit trail
  pricingHypothesis: Annual SaaS license priced per desk plus usage-based fees tied to active loan opportunities analyzed each month
