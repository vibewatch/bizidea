scenarios:
  downside:
    description: Production conversion slips, pricing lands closer to the low end of the stated range, and implementation
      stays more services-heavy than planned.
    y3RevenueK: 2799.1
    y3EbitdaK: -940.3
    cashLowPointK: -242.4
    keyAssumptionChanges:
    - Y1-Y3 blended desk value drops to about $162K / $198K / $216K annualized instead of $174K / $210K / $234K.
    - Desk starts slow from 28 in the base case to 20 over 36 months because partner referrals and repeatability arrive later.
    - Monthly churn rises from 1.5% to 2.0% and gross margin only reaches 68% by Y3.
  base:
    description: Base case follows the business-plan sequence from 5 Y1 paying starts to 8 Y2 starts and 15 Y3 starts, with
      Y3 growth driven by multi-desk expansion inside existing managers plus one adjacent-credit wedge.
    y3RevenueK: 4144.6
    y3EbitdaK: 57.6
    cashLowPointK: 984.3
    keyAssumptionChanges:
    - Blended desk value steps from $174K in Y1 to $234K in Y3 as pilots convert to annual subscriptions and usage/modules
      attach.
    - Gross starts follow 5 in Y1, 8 in Y2, and 15 in Y3 while churn stays at 1.5% monthly.
    - Hiring reaches 9 FTE by Q4Y2 and 12 FTE by Q4Y3, keeping the company cash-positive throughout the modeled 36 months.
  upside:
    description: Reference customers make the partner motion repeatable, a few managers add second desks earlier, and the
      product reaches target margin faster.
    y3RevenueK: 5049.9
    y3EbitdaK: 792.4
    cashLowPointK: 1456.5
    keyAssumptionChanges:
    - Blended desk value increases to about $180K / $222K / $252K annualized as approval and analytics modules attach faster.
    - Desk starts rise from 28 in the base case to 31 over 36 months because design partners expand to additional desks sooner.
    - Monthly churn improves from 1.5% to 1.2% and gross margin reaches 72% by Y3.
sensitivity:
- variable: ARPU
  downsideCase: $216K mature annual value per active desk
  baseCase: $234K mature annual value per active desk
  upsideCase: $252K mature annual value per active desk
  y3RevenueImpactK: -318.7
  cashImpactK: -302.9
- variable: CAC
  downsideCase: Channel efficiency weakens, so Y2-Y3 desk starts fall from 23 to 15 and effective CAC rises above $200K.
  baseCase: Base case uses about $160K CAC on production-equivalent conversions.
  upsideCase: Warm partner referrals keep starts near the base plan while lowering effective CAC into the low-$140Ks.
  y3RevenueImpactK: -951.3
  cashImpactK: -953.9
- variable: churn
  downsideCase: 2.0% monthly active-desk churn
  baseCase: 1.5% monthly active-desk churn
  upsideCase: 1.2% monthly active-desk churn
  y3RevenueImpactK: -207.2
  cashImpactK: -187.0
- variable: sales cycle
  downsideCase: Most post-pilot starts slip by roughly one month because security and data mapping take longer.
  baseCase: Starts land on the planned cadence.
  upsideCase: Reference deployments and standard data packs pull starts forward by about one month.
  y3RevenueImpactK: -233.8
  cashImpactK: -280.9
- variable: gross margin
  downsideCase: Y3 gross margin tops out at 68% because onboarding remains services-heavy.
  baseCase: Gross margin reaches 70% in Y3.
  upsideCase: Gross margin reaches 72% once integrations and audit exports standardize.
  y3RevenueImpactK: 0.0
  cashImpactK: -83.1
- variable: hiring pace
  downsideCase: Later hires are pulled forward by one quarter before revenue proof is fully in hand.
  baseCase: Hiring follows the plan sequence tied to product proof and then GTM scale.
  upsideCase: A late Y3 product hire can wait until after adjacent-workflow proof arrives.
  y3RevenueImpactK: 0.0
  cashImpactK: -447.2
modelDiagram:
  title: unit economics flow
  mermaid: |-
    flowchart LR
      Desks[Paying pilot desks] --> Production[Annual production desks]
      Production --> Expansion[Multi-desk / module expansion]
      Expansion --> Revenue[Recognized revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash after opex]
modelSanity:
- checkName: Revenue engine
  finding: Base-case revenue comes from turning 28 cumulative paying desk starts into 23.3 active desk equivalents by Q4Y3
    at a mature $234K annual value per desk.
- checkName: Must go right
  finding: Design partners must convert into repeatable manager rollouts so Y2 adds eight starts without forcing a disproportionate
    GTM spend increase.
- checkName: Model breaks if
  finding: If conversion efficiency weakens and desk starts fall toward the CAC downside case, Y3 revenue drops by about $951.5K
    and the cash cushion shrinks by about $953.7K.
- checkName: Next-round proof
  finding: The seed story is strongest once the company shows 8-10 production manager logos, one partner-assisted deployment
    path, and evidence that the same workflow expands into adjacent credit desks.
sanityChecks:
  ruleOf40: Y3 growth 134.8% + EBITDA margin 1.4% = 136.2% (inflated by the small Y2 base).
  burnMultiple: Y2 burn multiple ~0.7x (($986.8K burn) / $1445.0K net new revenue); Y3 turns slightly EBITDA-positive.
  revenuePerFte: About $345.4K Y3 using Q4Y3 headcount of 12 (inside the typical $200-400K vertical SaaS/workflow range).
  flags:
  - The base case requires 15 Y3 desk starts, so growth must come from both new manager logos and second-desk expansion inside
    existing accounts.
  - The model depends on reaching 70% gross margin by Y3; if integrations stay bespoke, the delivery-heavy motion pushes EBITDA
    back below zero.
  - Active-desk revenue assumes buyers accept pricing near the upper half of the stated $150K-$250K annual range once pilots
    convert.
  - The downside case goes cash-negative, so a stalled partner channel or slower production conversion would likely force
    a bridge round before the planned seed process.
