modelStartMonth: 2026-07
assumptions:
- id: A1
  name: Model start month
  value: 2026-07
  unit: YYYY-MM
  source: '[BP date 2026-06-16] model starts the month after the business plan date.'
- id: A2
  name: Opening cash at M1
  value: $3.2M
  unit: USD
  source: '[BP fundingAsk targetFundingRangeUsd $3-4M + model sizing] uses a mid-range pre-seed check sized to reach the 12-24
    month milestone plus six months of buffer.'
- id: A3
  name: Starting active paying desks
  value: '0'
  unit: count
  source: '[BP executiveSummary + milestones] the company begins pre-revenue and must first sign design partners.'
- id: A4
  name: Active desk definition
  value: One paying CLO or adjacent credit desk in pilot, production, or expanded multi-desk rollout
  unit: definition
  source: '[BP businessModel.unitOfValue + BP milestones] customersEop tracks active paying desk equivalents rather than total
    manager logos.'
- id: A5
  name: Blended recognized revenue per active desk
  value: Y1 $174K/year, Y2 $210K/year, Y3 $234K/year
  unit: USD/desk/year
  source: '[BP gtm.pricing + BP operatingAssumptions $150k-$250k annual desk pricing + BP investorMemo.firstCustomer.initialContract
    + Research market SOM] effective value starts below full production ACV because Y1 is pilot-heavy, then moves toward the
    upper half of the stated annual pricing range as usage and modules attach.'
- id: A6
  name: New active desk start cadence
  value: Y1 adds 5 starts (M4, M6, M9, M11, M12); Y2 adds 8 starts (2 per quarter); Y3 adds 15 starts (3, 3, 4, 5 by quarter)
  unit: start pattern
  source: '[BP milestones + BP strategicChoices.sequencingRationale + BP businessModel.expansionLevers] matches 3-5 production
    managers in Y1, 8-10 production managers in Y2, then multi-desk and adjacency expansion in Y3.'
- id: A7
  name: Monthly active-desk churn
  value: 1.5%
  unit: pct/month
  source: '[startup-finance heuristic + BP risks] conservative relative to annual enterprise contracts because the buyer set
    is concentrated and trust-heavy.'
- id: A8
  name: Gross margin ramp
  value: 60% in Y1, 66% in Y2, 70% in Y3
  unit: pct of revenue
  source: '[BP businessModel.targetGrossMarginPct 70 + BP operations + Research compliance burden] launch starts services-
    and onboarding-heavy, then reaches the stated software-like target after repeatable integrations and audit exports.'
- id: A9
  name: Founder / CEO loaded compensation
  value: $180K
  unit: USD/year
  source: '[BP team Founder CEO] modest founder cash pay plus payroll taxes and benefits.'
- id: A10
  name: Engineering / data loaded compensation
  value: $205K
  unit: USD/year
  source: '[BP team Founding eng + Full-stack data engineer] senior engineering talent with payroll load.'
- id: A11
  name: Product / solutions / compliance loaded compensation
  value: $175K
  unit: USD/year
  source: '[BP team Product and solutions lead + Compliance domain advisor] customer workflow, implementation, and domain
    expertise with payroll load.'
- id: A12
  name: Sales / partnerships loaded compensation
  value: $220K
  unit: USD/year
  source: '[BP team Account executive + BP gtm.channels] enterprise seller OTE and partner-development carrying cost.'
- id: A13
  name: G&A / ops loaded compensation
  value: $150K
  unit: USD/year
  source: '[BP operations] lean back-office and customer-operations support.'
- id: A14
  name: Hiring timeline
  value: M1 founder + founding engineer; M2 product/solutions; M4 data engineer + compliance; M10 first AE; M13 solutions
    hire; M16 engineer; M18 ops; M27 second seller; M30 engineer; M33 product/analytics
  unit: timeline
  source: '[BP team + BP strategicChoices.sequencingRationale] first six hires follow the plan directly and later hires extend
    the same product-first then GTM-scale sequence.'
- id: A15
  name: Non-payroll sales & marketing spend
  value: $10K/mo M1-6, $14K/mo M7-12, $18K/mo M13-18, $22K/mo M19-24, $28K/mo M25-30, $34K/mo M31-36
  unit: USD/month
  source: '[BP gtm.channels] heuristic for founder outbound, events, partner enablement, and focused enterprise marketing
    rather than broad paid demand gen.'
- id: A16
  name: Non-payroll R&D spend
  value: $12K/mo Y1, $16K/mo Y2, $20K/mo Y3
  unit: USD/month
  source: '[BP product + BP operations] heuristic for cloud, model evaluation, data normalization, and security tooling.'
- id: A17
  name: Non-payroll G&A spend
  value: $10K/mo Y1, $12K/mo Y2, $15K/mo Y3
  unit: USD/month
  source: '[BP operations + Research compliance requirement] heuristic for legal, audit, insurance, and policy controls.'
- id: A18
  name: Payroll allocation to P&L lines
  value: Founder 60% S&M / 40% G&A; product/solutions/compliance 35% S&M / 65% R&D; engineering 100% R&D; sales 100% S&M;
    ops 100% G&A
  unit: allocation
  source: '[BP team rationales + BP operations] maps each role into the operating lines used in the P&L.'
- id: A19
  name: Pilot-to-production conversion used for CAC
  value: 50% of paid starts
  unit: pct
  source: '[BP gtm.funnelTargets 50%+ paid pilots to annual production] used to translate desk starts into production-equivalent
    CAC.'
- id: A20
  name: CAC calculation convention
  value: $160.0K = Y2-Y3 S&M / 11.5 production-equivalent conversions
  unit: USD/new production customer
  source: '[BP gtm.funnelTargets + model calc] uses 23 Y2-Y3 desk starts multiplied by the 50% pilot-to-production target.'
- id: A21
  name: Cash conversion convention
  value: Cash movement equals EBITDA
  unit: modeling convention
  source: '[startup-finance heuristic] assumes capex, debt service, taxes, and working-capital swings are immaterial at pre-seed
    scale.'
- id: A22
  name: Funding ask sizing
  value: $3.2M pre-seed
  unit: USD
  source: '[BP fundingAsk targetFundingRangeUsd + BP milestones + model cash trough] funds the 8-10 manager-logo proof point,
    one adjacent expansion proof, and roughly six months of buffer after the month-24 milestone window.'
