  customerRelationships:
    - 围绕交易台工作流的高触达入职支持
    - 与投资组合经理和交易员持续开展校准评审
  revenueStreams:
    - 年度交易台订阅费
    - 高量机会分析用量费
    - 审批和审计导出高级工作流模块费
  keyResources:
    - 贷款数据标准化引擎
    - 报价建议模型与规则库
    - 工作流集成和决策历史图谱
  keyActivities:
    - 摄入和清洗贷款市场输入数据
    - 生成可解释的交易建议
    - 维护审计和协作工作流
  keyPartners:
    - 贷款数据提供商和 OMS 供应商
    - 与 CLO 交易台有关系的信贷顾问
    - 合规和基金管理集成合作伙伴
  costStructure:
    - 工程和数据基础设施
    - 交易台入职客户成功
    - 数据授权和集成维护
jobsToBeDone:
  - job: >-
      当 CLO 交易台收到一批最新二级贷款机会时，帮助交易员判断哪些标的值得报价、报价水平应在哪里，以便在流动性消失之前出手。
    currentAlternative: 交易商报价列表加分析师电子表格和临时性投资组合经理审阅
    successMetric: 在交易窗口内提交更多报价，同时减少分析师准备时间
  - job: >-
      当投资组合经理需要为估值或近期交易决策作出解释时，帮助他们快速呈现一份清晰的价格、流动性和理由说明，以便向投委会、风控和审计相关方高效交差。
    currentAlternative: 从邮件链、终端截图和散落笔记中重新拼凑依据
    successMetric: 备忘录周转更快，受质疑的交易理由更少
