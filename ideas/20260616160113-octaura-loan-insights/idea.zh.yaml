    - 交易团队规模精简的美国独立 CLO 管理人
  valuePropositions:
    - 将碎片化贷款数据转化为可解释的报价决策
    - 减少分析师花在一次性交易备忘录上的时间
    - 提升相对价值和流动性评估的一致性
  channels:
    - 直接向结构化信贷管理人发起主动销售
    - 通过信贷市场顾问和数据集成合作伙伴获得转介
