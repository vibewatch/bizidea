fundingAsk:
  round: pre-seed
  amountM: 3.2
  runwayMonths: 30
  milestone: >-
    达到 8–10 家生产管理人标杆、验证一条合作伙伴辅助部署路径、验证一个邻近结构化信贷工作流，同时在 seed 融资前保持至少六个月缓冲。
  useOfFunds:
  - bucket: 工程
    amountUsd: 1350000
    percentage: 42.2
  - bucket: GTM
    amountUsd: 850000
    percentage: 26.6
  - bucket: 行政/运营
    amountUsd: 350000
    percentage: 10.9
  - bucket: 缓冲储备（6 个月）
    amountUsd: 650000
    percentage: 20.3
scenarios:
  downside:
    description: 生产转化放缓，定价落至所述区间低端，实施仍比计划更重服务。
    y3RevenueK: 2799.1
    y3EbitdaK: -940.3
    cashLowPointK: -242.4
    keyAssumptionChanges:
    - Y1–Y3 混合交易台价值降至约 $162K / $198K / $216K 年化，而非 $174K / $210K / $234K。
    - 交易台启动数从基准情形的 28 个放缓至 36 个月内 20 个，因为合作伙伴转介和可复制性到得更晚。
    - 月度流失率从 1.5% 升至 2.0%，Y3 毛利率仅达 68%。
  base:
    description: >-
      基准情形按商业计划顺序推进，Y1 5 个付费启动→Y2 8 个→Y3 15 个，Y3 增长来自现有管理人内部多交易台扩展叠加一个邻近信贷切口。
    y3RevenueK: 4144.6
    y3EbitdaK: 57.6
    cashLowPointK: 984.3
    keyAssumptionChanges:
    - 混合交易台价值从 Y1 $174K 步进至 Y3 $234K，随着试点转为年度订阅以及用量/模块附加。
    - 毛启动数 Y1 5、Y2 8、Y3 15，流失率维持 1.5%/月。
    - 招聘在 Q4Y2 达到 9 人、Q4Y3 达到 12 人，公司在 36 个月建模期内全程保持现金正流。
  upside:
    description: 参考客户让合作伙伴运营可复制，部分管理人提前增加第二个交易台，产品更快达到目标利润率。
    y3RevenueK: 5049.9
    y3EbitdaK: 792.4
    cashLowPointK: 1456.5
    keyAssumptionChanges:
    - 混合交易台价值提升至约 $180K / $222K / $252K 年化，因审批和分析模块更快附加。
    - 交易台启动数从基准情形的 28 个增至 36 个月 31 个，因为共创客户更早扩展至多个交易台。
    - 月度流失率从 1.5% 改善至 1.2%，Y3 毛利率达 72%。
sensitivity:
- variable: ARPU
  downsideCase: 每活跃交易台成熟期年价值 $216K
  baseCase: 每活跃交易台成熟期年价值 $234K
  upsideCase: 每活跃交易台成熟期年价值 $252K
  y3RevenueImpactK: -318.7
  cashImpactK: -302.9
- variable: CAC
  downsideCase: 渠道效率下滑，Y2–Y3 交易台启动数从 23 降至 15，有效 CAC 升至 $200K 以上。
  baseCase: 基准情形以约 $160K CAC 计算生产当量转化。
  upsideCase: 来自合作伙伴的温热推荐维持启动数接近基准，同时将有效 CAC 压至 $140K 区间低端。
  y3RevenueImpactK: -951.3
  cashImpactK: -953.9
- variable: 流失率
  downsideCase: 月度活跃交易台流失率 2.0%
  baseCase: 月度活跃交易台流失率 1.5%
  upsideCase: 月度活跃交易台流失率 1.2%
  y3RevenueImpactK: -207.2
  cashImpactK: -187.0
- variable: 销售周期
  downsideCase: 大多数试点后启动因安全审查和数据映射耗时更长而推迟约一个月。
  baseCase: 启动按计划节奏落地。
  upsideCase: 参考部署和标准数据包将启动提前约一个月。
  y3RevenueImpactK: -233.8
  cashImpactK: -280.9
- variable: 毛利率
  downsideCase: Y3 毛利率止步于 68%，因入职仍以服务为主。
  baseCase: Y3 毛利率达 70%。
  upsideCase: 集成和审计导出标准化后 Y3 毛利率达 72%。
  y3RevenueImpactK: 0.0
  cashImpactK: -83.1
- variable: 招聘节奏
  downsideCase: 后期招聘在收入验证完整到位前提前一个季度执行。
  baseCase: 招聘按计划节奏推进，与产品验证和 GTM 扩展挂钩。
  upsideCase: Y3 末的产品岗位可等到邻近工作流验证完成后再招。
  y3RevenueImpactK: 0.0
  cashImpactK: -447.2
modelDiagram:
  title: 单位经济模型流程
  mermaid: |-
    flowchart LR
      Desks[Paying pilot desks] --> Production[Annual production desks]
      Production --> Expansion[Multi-desk / module expansion]
      Expansion --> Revenue[Recognized revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash after opex]
modelSanity:
- checkName: 收入引擎
  finding: >-
    基准情形收入来自将 28 个累计付费交易台启动数转化为 Q4Y3 时 23.3 个活跃交易台当量，成熟期年价值 $234K/台。
- checkName: 必须做对的事
  finding: >-
    共创客户必须转化为可复制的管理人扩展，使 Y2 在不大幅提升 GTM 支出的情况下新增 8 个启动。
- checkName: 模型失效条件
  finding: >-
    若转化效率下滑、交易台启动数跌向 CAC 下行情形，Y3 收入将减少约 $951.5K，现金缓冲相应收窄约 $953.7K。
- checkName: 下轮融资验证点
  finding: >-
    Seed 融资故事最强劲时应展示 8–10 家生产管理人、一条合作伙伴辅助部署路径，以及工作流向邻近信贷交易台扩展的证据。
sanityChecks:
  ruleOf40: Y3 增速 134.8% + EBITDA 利润率 1.4% = 136.2%（因 Y2 基数较小而数值偏高）。
  burnMultiple: Y2 燃烧乘数约 0.7×（$986.8K 燃烧 / $1,445.0K 净新增收入）；Y3 小幅实现 EBITDA 盈亏平衡。
  revenuePerFte: 以 Q4Y3 12 人计，Y3 人均收入约 $345.4K（处于垂直 SaaS/工作流软件典型 $200K–$400K 区间内）。
  flags:
  - 基准情形需要 Y3 新增 15 个交易台启动，增长必须同时来自新管理人客户和现有客户内部的第二个交易台扩展。
  - 模型依赖 Y3 毛利率达到 70%；若集成工作仍保持定制化，交付密集型模式将把 EBITDA 重新推回负值。
  - 活跃交易台收入假设买家在试点转生产后接受接近所述 $150K–$250K 年度区间上半段的定价。
  - 下行情形现金变负，因此若合作伙伴渠道停滞或生产转化放缓，可能需要在计划融资流程前进行桥接融资。
