slug: clo-trade-memo-engine
date: '2026-06-16'
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-07
  unit: YYYY-MM
  source: '[BP date 2026-06-16] 模型从商业计划日期的下一个月启动。'
- id: A2
  name: M1 期初现金
  value: $3.2M
  unit: USD
  source: >-
    [BP fundingAsk targetFundingRangeUsd $3-4M + model sizing]
    采用中间值 pre-seed 融资额，足以覆盖 12–24 个月里程碑加六个月缓冲期。
- id: A3
  name: 初始活跃付费交易台数
  value: '0'
  unit: 数量
  source: '[BP executiveSummary + milestones] 公司从零营收状态起步，须先签下共创客户。'
- id: A4
  name: 活跃交易台定义
  value: 一个处于试点、生产或多交易台扩展中的付费 CLO 或邻近信贷交易台
  unit: 定义
  source: >-
    [BP businessModel.unitOfValue + BP milestones]
    customersEop 追踪活跃付费交易台当量，而非管理人总数。
- id: A5
  name: 每活跃交易台混合确认收入
  value: Y1 $174K/year, Y2 $210K/year, Y3 $234K/year
  unit: 美元/交易台/年
  source: >-
    [BP gtm.pricing + BP operatingAssumptions $150k-$250k annual desk pricing +
    BP investorMemo.firstCustomer.initialContract + Research market SOM]
    初始有效价值低于完整生产 ACV（第一年以试点为主），随后随用量增加和模块附加逐步向所述年度定价区间上半段靠拢。
- id: A6
  name: 新活跃交易台启动节奏
  value: Y1 新增 5 个启动（M4、M6、M9、M11、M12）；Y2 新增 8 个（每季度 2 个）；Y3 新增 15 个（每季度分别 3、3、4、5 个）
  unit: 启动模式
  source: >-
    [BP milestones + BP strategicChoices.sequencingRationale + BP businessModel.expansionLevers]
    对应 Y1 3–5 家生产管理人、Y2 8–10 家生产管理人，以及 Y3 多交易台和邻近市场扩展。
- id: A7
  name: 月度活跃交易台流失率
  value: 1.5%
  unit: 百分比/月
  source: >-
    [startup-finance heuristic + BP risks]
    相对于年度企业合同较保守，因为买家群体集中且依赖信任。
- id: A8
  name: 毛利率爬升路径
  value: 60% in Y1, 66% in Y2, 70% in Y3
  unit: 占营收比例
  source: >-
    [BP businessModel.targetGrossMarginPct 70 + BP operations + Research compliance burden]
    早期以服务和入职为主，随着集成和审计导出标准化后逐步达到所述软件化目标。
- id: A9
  name: 创始人/CEO 含附加成本薪酬
  value: $180K
  unit: 美元/年
  source: '[BP team Founder CEO] 较低的创始人现金薪酬加薪资税和福利。'
- id: A10
  name: 工程/数据含附加成本薪酬
  value: $205K
  unit: 美元/年
  source: '[BP team Founding eng + Full-stack data engineer] 高级工程人才含薪资负担。'
- id: A11
  name: 产品/解决方案/合规含附加成本薪酬
  value: $175K
  unit: 美元/年
  source: >-
    [BP team Product and solutions lead + Compliance domain advisor]
    客户工作流、实施和领域专业知识含薪资负担。
- id: A12
  name: 销售/合作含附加成本薪酬
  value: $220K
  unit: 美元/年
  source: '[BP team Account executive + BP gtm.channels] 企业销售 OTE 和合作伙伴开发费用。'
- id: A13
  name: 行政/运营含附加成本薪酬
  value: $150K
  unit: 美元/年
  source: '[BP operations] 精简的后台和客户运营支持。'
- id: A14
  name: 招聘时间线
  value: >-
    M1 创始人 + 创始工程师；M2 产品/解决方案；M4 数据工程师 + 合规；M10 首位客户经理；
    M13 解决方案招聘；M16 工程师；M18 运营；M27 第二位销售；M30 工程师；M33 产品/分析
  unit: 时间线
  source: >-
    [BP team + BP strategicChoices.sequencingRationale]
    前六次招聘直接按计划推进，后续招聘延续同一"产品优先再扩 GTM"的节奏。
- id: A15
  name: 非薪资销售与营销支出
  value: $10K/mo M1-6, $14K/mo M7-12, $18K/mo M13-18, $22K/mo M19-24, $28K/mo M25-30, $34K/mo M31-36
  unit: 美元/月
  source: >-
    [BP gtm.channels]
    创始人主动拓客、活动、合作伙伴赋能和聚焦式企业营销的经验估算，而非宽泛的付费获客。
- id: A16
  name: 非薪资研发支出
  value: $12K/mo Y1, $16K/mo Y2, $20K/mo Y3
  unit: 美元/月
  source: '[BP product + BP operations] 云服务、模型评估、数据标准化和安全工具的经验估算。'
- id: A17
  name: 非薪资行政/运营支出
  value: $10K/mo Y1, $12K/mo Y2, $15K/mo Y3
  unit: 美元/月
  source: '[BP operations + Research compliance requirement] 法律、审计、保险和合规管控的经验估算。'
- id: A18
  name: 薪资分配至损益表各项
  value: >-
    创始人 60% S&M / 40% G&A；产品/解决方案/合规 35% S&M / 65% R&D；工程 100% R&D；销售 100% S&M；运营 100% G&A
  unit: 分配比例
  source: '[BP team rationales + BP operations] 将每个角色映射至损益表使用的运营项目。'
- id: A19
  name: 用于 CAC 计算的试点转生产转化率
  value: 50% of paid starts
  unit: 百分比
  source: >-
    [BP gtm.funnelTargets 50%+ paid pilots to annual production]
    用于将交易台启动数转化为生产当量 CAC。
- id: A20
  name: CAC 计算方式
  value: $160.0K = Y2-Y3 S&M / 11.5 production-equivalent conversions
  unit: 美元/新增生产客户
  source: '[BP gtm.funnelTargets + model calc] 以 23 个 Y2–Y3 交易台启动数乘以 50% 试点转生产目标。'
- id: A21
  name: 现金转换惯例
  value: 现金变动等于 EBITDA
  unit: 建模惯例
  source: >-
    [startup-finance heuristic]
    假设在 pre-seed 规模下，资本支出、偿债、税项和营运资金波动均可忽略。
- id: A22
  name: 融资额规模
  value: $3.2M pre-seed
  unit: USD
  source: >-
    [BP fundingAsk targetFundingRangeUsd + BP milestones + model cash trough]
    用于支撑 8–10 家管理人标杆验证、一个邻近市场扩展验证，以及第 24 个月里程碑后约六个月的缓冲期。
