topRisks:
  - name: 申办方预算可能优先投向生物学而非工具
    description: "早期生物科技公司可能不愿新增软件开支，除非它能直接改善入组或终点质量。"
    mitigation: "围绕活跃研究节点销售，并把 ROI 直接绑定到更快入组、更少筛选失败，以及每位入组患者更干净的数据。"
  - name: 终点可信度风险
    description: "远程功能性视力评估在申办方或监管方眼中，可能只被视为补充信息，而非可直接决策的证据。"
    mitigation: "先把它定位成运营层和探索性终点层，再与中心采集指标做对照验证，初期重点放在提升试验决策，而不是替代主要终点。"
  - name: 初始市场过窄
    description: "遗传性视网膜疾病试验高度专业化，因此首批客户池有限。"
    mitigation: "从第一天起就按相邻眼科项目来设计平台，让同一套工作流能扩展到 geographic atrophy、其他视网膜干预和上市后监测。"
