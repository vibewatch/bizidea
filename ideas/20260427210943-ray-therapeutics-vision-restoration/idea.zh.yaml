problem: 视网膜基因治疗申办方不仅需要突破性生物学，还需要快速找到数量少且分散的失明患者群体，并以能在不同研究中心之间保持一致的方式捕捉功能性视觉变化。如今，资格审查分散在转诊网络、协调员表格和手工病历追踪中，而许多有意义的日常视觉变化只会在低频的研究中心回访时被采样。这种组合在试验成本不断上升之际拖慢入组、增加筛选失败，并让疗效信号更嘈杂。
targetUser:
  primary: 在开展遗传性视网膜疾病试验的视网膜基因治疗公司中担任临床运营副总裁或临床开发负责人的人员
  secondary: 在学术型视网膜中心负责光遗传学和基因治疗研究入组的主要研究者与研究协调员
  buyer: 临床运营副总裁或首席医疗官
startupThesis:
  nonObviousInsight: 随着视网膜疗法越来越不依赖特定基因、并进入活跃研究阶段，瓶颈将从寻找某个特定突变资产，转向在运营上找到表型匹配的患者，并在随访之间测量真实世界中的功能性视觉改善。
  beachhead: 在美国 5-15 个研究中心开展视网膜色素变性干预试验的视网膜基因治疗初创公司的临床运营团队
  wedge: 一层面向视网膜的试验就绪层，用于预筛转诊患者、标准化方案适配审查，并为申办方和研究中心团队采集居家的长期功能性视觉评估。
  whyNowCatalyst: Ray 的 $125M 融资，以及 ENVISION 和 RTx-021 的活跃入组，意味着视网膜光遗传学如今已有足够资本支持，入组速度和终点质量已经能够决定项目价值。
  ventureScalePath: 先从遗传性视网膜疾病试验的入组与终点采集切入，再扩展到更广泛的眼科试验、治疗后监测、转诊网络基础设施，以及商业化视觉恢复疗法的真实世界证据。
solution: 该产品为申办方与视网膜研究中心提供共享的招募与终点采集运营层。研究中心可以接收转诊、上传既往诊断与视觉功能记录，并获得结构化的方案适配清单，从而减少与申办方之间的手工往返沟通。初步符合条件的患者随后进入标准化的远程评估流程，在两次到访之间追踪低视力功能任务，并将结果打包成适合申办方使用的纵向报告。随着时间推移，公司将构建一个面向视网膜的专有数据集，覆盖转诊转化、筛选失败原因、研究中心表现以及疾病特异性的功能结局，用于优化后续项目的试验设计与研究中心选择。
goToMarketSeed:
  firstCustomer: 一家 Series B 视网膜基因治疗公司的临床运营负责人，该公司正通过少量美国学术型视网膜中心网络为一项视网膜色素变性研究开展入组
  buyingTrigger: 申办方开始入组或新增研究中心时，发现合格患者稀缺、筛选失败率高，或两次到访之间的功能性终点数据过于稀疏。
  currentAlternative: 协调员表格、手工病历审查、患者倡导组织触达、通用 EDC 或 ePRO 工具，以及 CRO 管理的研究中心跟进
  switchingReason: 这一楔子为罕见视网膜招募和功能性视觉证据而专门打造，因此比通用试验软件更有机会缩短首个合格患者出现时间，并产出更丰富的纵向数据。
  pricingHypothesis: 按每个活跃研究收取年度 SaaS 费用，并针对远程评估与转诊工作流使用按入组患者收费。
