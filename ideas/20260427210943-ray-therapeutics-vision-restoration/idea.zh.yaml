differentiator: 通用试验技术供应商擅长表单、随机化或广义 ePRO 工作流，但并不掌握视网膜疾病特有的方案适配审查和功能性视觉追踪工作。这家公司从申办方真正丢失时间的地方切入：识别罕见低视力患者、解释筛选失败原因，并在研究中心到访之间产出可用的纵向证据。其防御性来自一个专有的视网膜试验图谱，连接转诊来源、资格模式、研究中心表现和疾病特异性功能结局。
