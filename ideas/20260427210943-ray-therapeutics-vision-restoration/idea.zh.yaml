jobsToBeDone:
- job: 在开启一项视网膜基因治疗研究时，帮助临床运营团队更快识别方案匹配的患者，以便在不浪费研究中心容量的情况下达成入组时间表。
  currentAlternative: 通过研究中心、CRO 和表格进行人工转诊审查
  successMetric: 首个合格患者出现所需天数及筛选失败率
