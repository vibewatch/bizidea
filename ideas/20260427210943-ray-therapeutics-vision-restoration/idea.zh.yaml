differentiator: "通用试验科技供应商擅长表单、随机化或宽泛的 ePRO 工作流，但并不真正掌握视网膜疾病特有的方案匹配审核和功能性视力追踪。这家公司从申办方最耗时间的环节切入：识别罕见低视力患者、解释筛选失败原因，并在中心访视之间产出可用的纵向证据。它的防御力来自一张专有的视网膜试验图谱，连接转诊来源、资格模式、中心表现和疾病特异性功能结局。"
