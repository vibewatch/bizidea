problem: "视网膜基因治疗申办方需要的不只是突破性的生物学机制；他们还得迅速找到规模小且分散的失明患者群体，并以跨中心也站得住脚的方式捕捉功能性视力变化。如今，资格审查分散在转诊网络、协调员表格和人工追病历之间，而许多真正有意义的日常视力变化，只会在间隔很长的中心访视中被零星采样。这种组合既拖慢入组，也抬高筛选失败率，还会在试验成本不断上升时让疗效信号更嘈杂。"
targetUser:
  primary: "在视网膜基因治疗公司负责遗传性视网膜疾病试验的临床运营副总裁或临床开发负责人"
  secondary: "在学术型视网膜中心负责光遗传学和基因治疗研究入组的主要研究者与研究协调员"
  buyer: "临床运营副总裁或首席医学官"
startupThesis:
  nonObviousInsight: "随着视网膜疗法越来越不依赖单一基因型、并进入真实临床研究，瓶颈不再是找到某个突变对应的资产，而是运营上如何找到表型匹配的患者，并在访视之间衡量现实世界中的功能性视力改善。"
  beachhead: "在美国运行 5-15 家中心、开展视网膜色素变性干预试验的视网膜基因治疗初创公司临床运营团队"
  wedge: "一个面向视网膜试验的就绪度层：先预筛转诊患者，标准化方案匹配审核，再为申办方与中心团队持续采集居家功能性视力评估。"
  whyNowCatalyst: "Ray 的 $125M 融资，以及 ENVISION 与 RTx-021 的在研入组，说明视网膜光遗传学如今已具备足够资本支持，入组速度和终点质量将直接决定项目价值。"
  ventureScalePath: "先从遗传性视网膜疾病试验的入组与终点采集切入，再扩展到更广泛的眼科试验、治疗后监测、转诊网络基础设施，以及商业化视力恢复疗法的真实世界证据。"
solution: "这款产品为申办方和视网膜中心提供一层共享运营系统，用于招募与终点采集。中心可以接收转诊、上传既往诊断和视功能记录，并拿到结构化的方案匹配清单，减少与申办方之间反复人工沟通。看起来符合条件的患者随后会进入标准化的远程评估流程，在访视之间持续追踪低视力功能任务，并把结果整理成可直接提交给申办方的纵向报告。长期来看，公司会积累一套视网膜专属数据资产，覆盖转诊转化、筛选失败原因、中心表现和疾病特异性的功能结局，从而持续优化后续项目的试验设计和中心选择。"
goToMarketSeed:
  firstCustomer: "一家完成 Series B 的视网膜基因治疗公司中的临床运营负责人，正在美国少量学术型视网膜中心网络中为视网膜色素变性研究招募患者"
  buyingTrigger: "申办方启动入组或新增中心后，发现合格患者稀缺、筛选失败率高，或访视之间的功能终点数据过于稀疏。"
  currentAlternative: "协调员表格、人工病历审核、患者倡导组织外联、通用型 EDC 或 ePRO 工具，以及 CRO 主导的中心跟进"
  switchingReason: "这个切口是专为罕见视网膜疾病招募和功能性视力证据打造的，因此比通用试验软件更有机会缩短首位合格患者出现时间，并产出更丰富的纵向数据。"
  pricingHypothesis: "按活跃研究收取年度 SaaS 费用，并按已入组患者收取远程评估与转诊工作流使用费。"
