topRisks:
- name: 申办方预算可能优先投向生物学而非工具
  description: 早期生物科技公司可能不愿增加新的软件支出，除非它能直接改善入组或终点质量。
  mitigation: 围绕活跃研究里程碑销售，并把 ROI 绑定到更快入组、更少筛选失败以及每位入组患者更干净的数据。
- name: 终点可信度风险
  description: 远程功能性视觉评估在申办方或监管方眼中，可能只是补充信息，而非可用于决策的证据。
  mitigation: 先将其定位为运营层和探索性终点层，与研究中心采集指标做验证，重点放在改善试验决策，而不是替代主要终点。
- name: 初始市场过窄
  description: 遗传性视网膜疾病试验非常专业化，因此首批客户池有限。
  mitigation: 从第一天起就按相邻眼科项目设计平台，使同一工作流可以扩展到地理萎缩、其他视网膜干预项目和上市后监测。
