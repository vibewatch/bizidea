slug: retina-trial-readiness-os
date: '2026-04-27'
executiveSummary: >-
  Retina Trial Readiness OS is a workflow and evidence layer for retinal gene-therapy sponsors running small, multi-site studies in inherited retinal disease. The initial customer is the VP Clinical Operations or CMO at a U.S.-based retinal therapy company opening or expanding a retinitis pigmentosa trial and struggling to find protocol-fit patients fast enough. The product combines retina-specific referral triage, structured protocol-fit review, and at-home functional vision tracking so sponsors can reduce screen failures and collect denser longitudinal evidence between visits. The market is real but narrow: the researched beachhead supports only a small standalone software business unless the company expands quickly into adjacent ophthalmology workflows such as Stargardt disease, geographic atrophy, and post-treatment monitoring. The best go-to-market motion is founder-led sales into active studies, priced as a study subscription plus per-enrolled-patient workflow fees and attached to existing recruitment, eCOA, or decentralized-trial budgets rather than a new software line item. The core strategic advantage is disease-specific workflow depth and a compounding dataset on referral quality, exclusion reasons, site performance, and functional vision change that horizontal vendors do not appear to own publicly today. The hardest product risk is endpoint credibility, so the first release should position remote assessments as operational and exploratory evidence rather than primary endpoint replacement. Public evidence supports urgency and buyer pain, but exact budget ownership, acceptable remote tasks, and the pace of adjacent-market expansion remain operating assumptions that must be tested early.
problem:
  - Rare-retina trials rely on fragmented referral networks, manual chart review, and coordinator spreadsheets, which slows time to first qualified patient and drives avoidable screen failures.
  - Functional vision change in low-vision populations is hard to observe between site visits, so efficacy signals are sparse and noisy when sponsors need early operational and program decisions.
solution:
  - Sponsor and site teams share a retina-specific intake and protocol-fit workflow that standardizes referral review, documents exclusion reasons, and surfaces likely eligible patients faster.
  - Patients who pass triage enter a structured remote assessment flow that captures repeatable functional vision tasks between visits and packages longitudinal outputs into sponsor-ready reports.
whyWeWin:
  - The wedge starts at a high-cost bottleneck that generic CTMS, eCOA, recruitment, and CRO workflows do not address with retinal phenotype and low-vision specificity.
  - Each deployment creates proprietary data on referral conversion, site performance, and functional outcome patterns that can improve later protocol design, site selection, and expansion into adjacent ophthalmology studies.
strategicChoices:
  beachhead: U.S. retinitis pigmentosa interventional studies run by Series B or later retinal gene-therapy sponsors with 5-15 academic retina sites.
  wedgeRationale: This buyer has active enrollment pressure, clear economic pain, and enough study budget to fund a narrow operational tool if it shortens enrollment and reduces screen failures; broader ophthalmology or provider workflows would lengthen proof cycles and dilute product specificity.
  sequencingRationale: Start with referral triage and protocol-fit review because that is the most immediate budgetable pain, layer remote functional-vision tracking only as exploratory evidence once investigators accept the workflow, then use resulting study data and references to expand into Stargardt, geographic atrophy, and selected ophthalmology partnerships.
  notYet:
    - Commercial patient-monitoring for approved therapies
    - Broad ophthalmology EDC or CTMS replacement
    - Consumer-facing blindness marketplace or direct patient acquisition business
    - EU expansion before two U.S. study deployments prove workflow and data-quality fit
market:
  tam: "$24.0M estimated annual software opportunity across roughly 60 public inherited-retina and GA programs at about $400k ACV per program, based on the researched market model."
  sam: "$6.0M estimated annual near-term market across roughly 20 retinal-restoration and IRD studies where referral triage and low-vision evidence matter most."
  som: "$2.1M year-3 reachable case assuming 7 active study contracts at about $300k blended ACV."
  segments:
    - Retinal gene-therapy sponsors running inherited retinal disease trials
    - Academic retina centers and ophthalmology CRO teams participating in those studies
  buyingProcess: >-
    Buying is likely led by the VP Clinical Operations or CMO, with influence from retina investigators, site coordinators, and existing trial-tech vendors. The most credible path is a pilot attached to an active study budget for recruitment, eCOA, or decentralized operations, then expansion after the first sites show faster qualification and cleaner longitudinal data.
product:
  mvp: >-
    Version 1 is a study-configurable referral triage and protocol-fit workspace for sponsor and site teams, plus a limited remote functional-vision module positioned as exploratory evidence. It should integrate with existing trial systems through exports and light workflows rather than attempt full system-of-record replacement.
  sixMonth: Launch one production-ready RP study workflow with referral intake, exclusion-reason taxonomy, sponsor-site dashboarding, and 1-2 validated at-home task flows reviewed by retina investigators.
  twelveMonth: Add multi-study analytics, site benchmarking, role-based audit trails, and indication templates for Stargardt disease and geographic atrophy to support adjacent expansion.
  twentyFourMonth: Become the retina-specific orchestration layer across referral matching, exploratory endpoint operations, and study-design analytics for multiple ophthalmology sponsors and selected channel partners.
  keyBets:
    - Buyers will fund a separate retina-specific layer if it reduces time to first qualified patient within one active study.
    - Retina investigators will accept a small set of repeatable at-home tasks as operationally useful even if not primary-endpoint grade.
    - Horizontal vendors will partner or coexist before they can credibly bundle equivalent retinal depth.
    - A cross-study dataset on screen failures and site performance will improve win rates and expansion economics over time.
gtm:
  wedge: Founder-led sale into one active retinitis pigmentosa study where site activation has begun and sponsor pain is immediate; land on referral triage, then expand to remote functional-vision tracking and analytics after pilot proof.
  channels:
    - Direct outreach to VP Clinical Operations and CMOs at retinal therapy sponsors
    - Investigator-led introductions from academic retina centers
    - Partnerships with ophthalmology CROs, registries, and incumbent trial-tech vendors
  funnelTargets: "Lead to qualified pilot 20-30%, pilot to production 50%+, first-site launch within 60 days, and first qualified patient identified within 45 days of go-live."
  pricing: Annual SaaS fee per active study plus per-enrolled-patient workflow and remote-assessment fees, positioned against existing recruitment, eCOA, and DCT spend because buyers are unlikely to create a new standalone category budget.
businessModel:
  revenueStreams:
    - Annual study subscription
    - Per-enrolled-patient referral and remote assessment fees
    - Premium analytics for site benchmarking, protocol design input, and screen-failure analysis
  unitOfValue: Active study contract with usage-based expansion per enrolled patient
  targetGrossMarginPct: 75
  expansionLevers:
    - Add indications from RP into Stargardt disease and geographic atrophy
    - Increase share of wallet from triage into exploratory endpoint operations and analytics
    - Sell through CRO and horizontal platform partners as a retina-specific module
strategyMap:
  northStarMetric: Number of enrolled patients progressing through sponsor-approved triage and longitudinal evidence workflows per active study
  inputMetrics:
    - Days from referral to protocol-fit decision
    - Screen-failure rate by site and reason
    - Percentage of referred patients with complete records for sponsor review
    - Remote task completion rate between visits
    - Pilot-to-production conversion rate
  moatsToBuild:
    - Retina-specific referral and exclusion-reason graph across sponsors and sites
    - Benchmark dataset linking site performance to protocol characteristics
    - Investigator-trusted task library for low-vision longitudinal monitoring
    - Workflow integrations that fit incumbent trial-tech stacks without replacement
  killCriteria:
    - Fewer than 2 paid pilots after 30 targeted sponsor conversations
    - No pilot demonstrates at least 20% faster protocol-fit turnaround than baseline manual workflow
    - Fewer than 60% of pilot patients complete remote tasks across two consecutive study months
    - No credible adjacent indication expansion path beyond RP is validated by month 12
  mermaid: |
    flowchart LR
      Wedge[RP sponsor enrollment wedge] --> MVP[Referral triage plus protocol-fit MVP]
      MVP --> Proof[Faster qualification and denser longitudinal evidence]
      Proof --> Expansion[Stargardt and GA study expansion]
      Expansion --> Moat[Retina workflow data and benchmark moat]
investorMemo:
  verdict:
    call: Watch
    conviction: Strong workflow pain and timing, but the buyer universe is small and endpoint credibility must be proven before this is a durable venture-scale company.
    whyBelieve: Active retinal programs, fresh financing, and lack of obvious retina-native incumbents create a plausible narrow wedge with measurable ROI.
    whyDoubt: The same narrowness that sharpens the wedge may cap the business unless the company wins budget quickly and expands beyond RP before incumbents bundle adjacent features.
    nextDiligence: Secure buyer interviews and one design-partner LOI showing where budget comes from and what operational metrics would justify a paid pilot.
  firstCustomer:
    title: VP Clinical Operations at a retinal gene-therapy sponsor running an active U.S. retinitis pigmentosa study
    profile: Series B or later ocular biotech with 5-15 academic retina sites, scarce eligible patients, and pressure to improve study throughput.
    trigger: Enrollment opens or new sites come online and manual referral review produces slow qualification, high screen-failure rates, or insufficient between-visit functional data.
    buyer: VP Clinical Operations or CMO
    initialContract: "$100k-$200k pilot tied to one active study, converting to roughly $250k-$350k annual study subscription plus per-patient fees after site and enrollment milestones are met."
  mustBeTrue:
    - At least 3 of the first 10 sponsor buyers confirm they can reallocate existing recruitment, eCOA, or DCT budget to a retina-specific workflow layer.
    - A pilot study shows at least 20% improvement in referral-to-decision speed versus spreadsheet-based baseline.
    - Retina investigators endorse at least 2 at-home tasks as operationally useful and acceptable for repeated deployment.
    - The first paid RP deployment yields a credible path into at least 2 adjacent ophthalmology indications within 12 months.
    - Horizontal vendors and CROs do not block deployment and can coexist through exports, APIs, or channel partnership.
  diligenceQuestions:
    - Which budget line actually pays for this product in an active retinal study?
    - What screen-failure causes are common enough across programs to support reusable workflow logic?
    - Which remote low-vision tasks are acceptable to investigators and not operationally burdensome for patients?
    - How many near-term U.S. studies are truly available to a startup in the next 24 months?
    - How hard would it be for Veeva, Medable, Signant, or a CRO to add a comparable retina template?
  riskHeatmap:
    - risk: Buyer universe is too small for standalone venture scale
      likelihood: High
      impact: High
      leadingIndicator: Fewer than 15 credible U.S. sponsor targets with active studies and budgetable pain remain after founder discovery.
      mitigation: Expand into Stargardt, GA, and ophthalmology partner channels immediately after the first RP proof point.
    - risk: Remote functional-vision workflows are not viewed as decision-useful
      likelihood: High
      impact: High
      leadingIndicator: Retina PIs refuse to include the remote task package in pilot workflows or completion rates stay below 60%.
      mitigation: Position the module as exploratory and operational first, validate against in-clinic measures, and keep core ROI anchored in enrollment workflow.
    - risk: Sponsors prefer incumbent platforms or CRO services
      likelihood: Medium
      impact: High
      leadingIndicator: Buyers insist the feature must be embedded in an existing vendor contract before they will run a pilot.
      mitigation: Integrate into current workflows, sell as a module that lifts existing vendor ROI, and pursue channel partnerships early.
    - risk: Data-sharing limits prevent moat formation
      likelihood: Medium
      impact: Medium
      leadingIndicator: Paid pilots allow workflow use but not access to de-identified referral and outcome metadata needed for cross-study learning.
      mitigation: Contract for de-identified analytics rights up front and prioritize customers willing to share structured funnel data.
    - risk: Site workflow burden reduces adoption
      likelihood: Medium
      impact: Medium
      leadingIndicator: Coordinators revert to spreadsheets or fail to complete protocol-fit steps within the product.
      mitigation: Keep MVP narrow, minimize clicks, and staff implementation with strong site-operations support.
operatingAssumptions:
  - assumption: Sponsors will fund the product from existing study operations budgets instead of requiring a new procurement category.
    basis: research.yaml
    validationTest: Run 10 buyer interviews and obtain at least 2 design-partner LOIs that identify a specific current budget line and replacement criterion.
    decisionImpact: If false, the company must sell through CRO or incumbent partners rather than direct standalone SaaS.
  - assumption: A narrow RP wedge can expand into Stargardt disease and geographic atrophy with mostly reusable workflow components.
    basis: idea.yaml
    validationTest: Complete a protocol crosswalk across at least 6 active programs and confirm more than half of triage fields and workflow steps are reusable.
    decisionImpact: If false, the company remains a niche RP tool and venture-scale expectations should be reduced.
  - assumption: Remote low-vision tasks can achieve patient adherence high enough to produce useful longitudinal operational data.
    basis: operator judgment
    validationTest: Pilot 1-2 task flows with 20 patients and achieve at least 70% monthly completion over 8 weeks.
    decisionImpact: If false, the roadmap should center on referral triage and site analytics, not remote evidence capture.
  - assumption: Retina investigators will act as both validation partners and a practical distribution channel into sponsors.
    basis: research.yaml
    validationTest: Secure 5 PI interviews, 2 advisory relationships, and at least 1 sponsor introduction sourced through a retina center.
    decisionImpact: If false, direct sponsor sales must carry all demand generation and sales cycles may lengthen materially.
  - assumption: Incumbent vendors will coexist long enough for the startup to build a differentiated dataset.
    basis: operator judgment
    validationTest: In the first 3 pilots, confirm deployment succeeds via exports or lightweight integrations without procurement blocking from current vendors.
    decisionImpact: If false, product strategy should shift toward partnership or acquisition positioning earlier.
experimentRoadmap:
  - horizon: 0-90 days
    experiment: Conduct structured discovery with retinal sponsor buyers on budget source, ROI threshold, and pilot decision criteria.
    hypothesis: The first buyer will fund a paid pilot from an existing recruitment, eCOA, or DCT budget if ROI is tied to enrollment speed and screen-failure reduction.
    successMetric: 10 buyer calls completed, 3 qualified design partners, and 2 LOIs that name budget owner and pilot scope.
    owner: CEO
  - horizon: 0-90 days
    experiment: Map RP, Stargardt, and GA protocols into a reusable exclusion-reason and triage taxonomy.
    hypothesis: A core retinal workflow can cover multiple indications with limited configuration rather than bespoke rebuilds.
    successMetric: More than 50% of key triage fields and exclusion categories are shared across 6 protocols.
    owner: Product lead
  - horizon: 0-180 days
    experiment: Pilot sponsor-site referral workflow with one RP design partner across 2-3 sites.
    hypothesis: Structured protocol-fit review will reduce referral-to-decision time and make exclusion reasons auditable.
    successMetric: At least 20% faster referral review and complete exclusion coding for more than 80% of screened patients.
    owner: Head of implementation
  - horizon: 0-180 days
    experiment: Run a low-vision remote task feasibility study with retina PI oversight.
    hypothesis: Patients can complete a limited at-home task battery consistently enough for operational longitudinal use.
    successMetric: At least 70% patient completion over 8 weeks and PI approval to keep the workflow in the next pilot.
    owner: Clinical product lead
  - horizon: 6-12 months
    experiment: Package the product as a module for one CRO or horizontal trial-tech partner.
    hypothesis: Channel partners will prefer disease-specific logic they can resell rather than build immediately.
    successMetric: 1 signed channel agreement or joint pilot with a partner serving ophthalmology studies.
    owner: CEO
  - horizon: 6-12 months
    experiment: Test adjacency expansion into one Stargardt or GA program.
    hypothesis: The first RP proof point will transfer into a second indication with limited implementation changes.
    successMetric: 1 paid adjacent-indication pilot within 12 months of first RP go-live.
    owner: CEO
operations:
  - SOP for protocol configuration, exclusion-reason coding, and sponsor signoff before each study launch
  - Lightweight integrations and CSV/API exports into incumbent CTMS, eCOA, and sponsor reporting workflows
  - Clinical advisory process with retina investigators to review task design, patient burden, and data-quality thresholds
  - Data governance and contracting template that secures de-identified analytics rights while fitting sponsor privacy requirements
  - High-touch site onboarding and support motion optimized for small academic retina-center teams
team:
  - role: Founding eng
    startTiming: Month 0
    rationale: Build the configurable workflow engine, data model, and integration layer required for the first pilot without overbuilding full trial-tech infrastructure.
  - role: Clinical product lead
    startTiming: Month 0-3
    rationale: Translate protocol logic into usable site workflows and ensure remote task design is credible with investigators and sponsors.
  - role: Founder-led sales / CEO
    startTiming: Month 0
    rationale: Early deals depend on consultative selling, buyer discovery, and partner development that cannot be delegated before product-market fit.
  - role: Head of implementation / customer success
    startTiming: Month 6
    rationale: The first production studies will fail without tight site onboarding, workflow training, and KPI reporting.
  - role: Data / analytics engineer
    startTiming: Month 9-12
    rationale: Cross-study benchmarking and moat formation require normalized funnel analytics once multiple studies are live.
milestones:
  - horizon: 0-12 months
    items:
      - Secure 2 design-partner LOIs from retinal gene-therapy sponsors
      - Launch first RP pilot across 2-3 sites
      - Prove at least 20% faster referral-to-decision workflow in one live study
      - Validate one remote functional-vision package as operationally acceptable with retina PI support
      - Close first paid annual study contract
  - horizon: 12-24 months
    items:
      - Expand to 3-5 active study contracts across RP and at least one adjacent indication
      - Publish or privately circulate benchmark data on screen-failure causes and site-performance variation
      - Sign first CRO or horizontal platform channel partnership
      - Add audit trails, site benchmarking, and multi-study analytics to support repeatable deployments
  - horizon: 24-36 months
    items:
      - Reach 7 active study contracts consistent with the researched SOM case
      - Establish retina-specific benchmark dataset as a sales and renewal asset
      - Expand into selected EU workflows after U.S. product and governance maturity
      - Evaluate strategic options including broader ophthalmology scale-up or partnership-led distribution
risks:
  - risk: Buyer universe is too small for standalone venture scale
    likelihood: High
    impact: High
    mitigation: Expand rapidly into adjacent ophthalmology indications and channel partnerships after first RP proof.
  - risk: Remote functional-vision workflows are not viewed as decision-useful
    likelihood: High
    impact: High
    mitigation: Keep the module exploratory at first and anchor ROI in enrollment and site-readiness gains.
  - risk: Sponsors prefer incumbent platforms or CRO services
    likelihood: Medium
    impact: High
    mitigation: Position as a retina-specific layer that improves existing vendor ROI instead of replacing the stack.
  - risk: Data-sharing limits prevent moat formation
    likelihood: Medium
    impact: Medium
    mitigation: Contract for de-identified analytics rights early and prioritize customers willing to share structured data.
  - risk: Site workflow burden slows adoption
    likelihood: Medium
    impact: Medium
    mitigation: Keep implementation narrow, reduce coordinator clicks, and support onboarding directly.
fundingAsk:
  stage: pre-seed
  targetFundingRangeUsd: $2-3M
  runwayMonths: 18
  useOfFundsSummary: "Fund 18 months to win 2 design partners, ship the RP production MVP, run the first live study deployments, validate remote-task feasibility, and earn the evidence needed for adjacent-indication expansion or channel partnerships."
