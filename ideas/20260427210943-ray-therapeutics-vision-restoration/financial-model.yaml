modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      SponsorBudget --> ActiveStudies
      ActiveStudies --> QualifiedPatients
      QualifiedPatients --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: Revenue engine
    finding: Base-case revenue is driven by reaching 7 active study contracts by Q4Y3 at about $336K blended annual revenue per study after pilot-to-production conversion and adjacent-indication upsell.
  - checkName: Must go right
    finding: The first RP deployment has to prove at least a 20% faster referral-to-decision workflow so buyers fund production contracts from existing recruitment or eCOA budgets.
  - checkName: Model breaks if
    finding: If the company stalls at 5 active studies and remote-assessment attach stays weak, the downside case pushes cash below zero before the next round.
  - checkName: Next-round proof
    finding: The next financing is justified once the company reaches 5 active studies, one adjacent-indication launch, and one channel partner with benchmark data that shows repeatable enrollment ROI.
sanityChecks:
  ruleOf40: 'Y3 growth 76.5% + EBITDA margin -34.1% = 42.4%'
  burnMultiple: 'Net burn multiple improves from 1.0x in Y2 to 0.8x in Y3 as revenue scales faster than opex.'
  revenuePerFte: '$191K Y3 using Q4Y3 11 FTE (directionally in range for early vertical SaaS with services-heavy onboarding).'
  flags:
    - The initial retinal beachhead is small, so the model requires adjacent indication expansion by Year 2 to reach 7 active studies.
    - Blended ACV assumes remote-assessment and analytics remain sellable as exploratory workflow add-ons; if investigators reject that module, pricing compresses toward the downside case.
    - Cash ends Y3 at only $236K, so the company still needs a follow-on round before full breakeven.
