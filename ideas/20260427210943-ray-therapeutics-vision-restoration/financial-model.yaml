scenarios:
  downside:
    description: Sales cycles stretch and remote-assessment attach remains low, leaving the company with only 5 active studies by Q4Y3.
    y3RevenueK: 1500.0
    y3EbitdaK: -1020.0
    cashLowPointK: -480.0
    keyAssumptionChanges:
      - 5 active studies by Q4Y3 instead of 7
      - Blended annual ACV falls to $300K as analytics and remote-assessment fees lag
      - Gross margin softens to 72% because services stay high-touch for longer
  base:
    description: Founder-led sales converts two pilots in Y1, expands into adjacent retina studies in Y2, and reaches 7 active studies by Q4Y3.
    y3RevenueK: 2100.0
    y3EbitdaK: -717.0
    cashLowPointK: 235.5
    keyAssumptionChanges:
      - 2 active studies by M12, 5 by Q4Y2, and 7 by Q4Y3
      - Blended annual ACV reaches $336K as subscription plus per-patient fees mature
      - Hiring follows the BP sequence without pulling major GTM hires forward
  upside:
    description: The first RP proof point converts faster, one CRO or platform partnership lands in Y2, and the company reaches 8 active studies with better attach by Q4Y3.
    y3RevenueK: 2700.0
    y3EbitdaK: -350.0
    cashLowPointK: 488.0
    keyAssumptionChanges:
      - 8 active studies by Q4Y3 with quicker adjacent-indication expansion
      - Blended annual ACV rises to $360K through analytics and remote-assessment upsell
      - Gross margin improves to 78% as implementations become more repeatable
