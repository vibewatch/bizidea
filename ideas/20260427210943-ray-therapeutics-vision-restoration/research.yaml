openQuestions:
- Can the startup win budget as a separate product rather than as a feature inside an existing platform or CRO contract?
- Which at-home functional-vision tasks will retina investigators view as decision-useful?
- How much de-identified screening data can sponsors and sites realistically share to build a moat?
- Is the beachhead too small unless the company expands rapidly into broader ophthalmology workflows?
