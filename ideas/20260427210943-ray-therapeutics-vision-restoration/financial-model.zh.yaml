scenarios:
  downside:
    description: 销售周期拉长，远程评估附加销售维持低位，导致公司到 Q4Y3 仅有 5 个活跃研究。
    y3RevenueK: 1500.0
    y3EbitdaK: -1020.0
    cashLowPointK: -480.0
    keyAssumptionChanges:
    - Q4Y3 时为 5 个活跃研究，而不是 7 个
    - 随着分析与远程评估收费滞后，混合年度 ACV 降至 $300K
    - 由于服务在更长时间内维持高接触式，毛利率降至 72%
  base:
    description: 创始人主导销售在 Y1 转化两个试点，Y2 扩展到相邻视网膜研究，并在 Q4Y3 达到 7 个活跃研究。
    y3RevenueK: 2100.0
    y3EbitdaK: -717.0
    cashLowPointK: 235.5
    keyAssumptionChanges:
    - M12 时 2 个活跃研究，Q4Y2 时 5 个，Q4Y3 时 7 个
    - 随着订阅费和按患者收费成熟，混合年度 ACV 达到 $336K
    - 招聘按照 BP 序列推进，不提前拉动主要 GTM 招聘
  upside:
    description: 首个 RP 证明点转化更快，Y2 拿下一家 CRO 或平台合作伙伴，公司到 Q4Y3 以更高附加率达到 8 个活跃研究。
    y3RevenueK: 2700.0
    y3EbitdaK: -350.0
    cashLowPointK: 488.0
    keyAssumptionChanges:
    - Q4Y3 时达到 8 个活跃研究，并更快扩展到相邻适应症
    - 通过分析和远程评估增购，混合年度 ACV 升至 $360K
    - 随着实施越来越可复制，毛利率提升至 78%
