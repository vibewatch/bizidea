scenarios:
  downside:
    description: 销售周期被拉长，远程评估的附加销售也偏弱，结果到 Y3 第 4 季度公司仍只有 5 项活跃研究。
    y3RevenueK: 1500.0
    y3EbitdaK: -1020.0
    cashLowPointK: -480.0
    keyAssumptionChanges:
      - Y3 第 4 季度只有 5 项活跃研究，而不是 7 项
      - 由于分析和远程评估收费跟不上，混合年度 ACV 降到 $300K
      - 因为服务长期保持高触达，毛利率降到 72%
  base:
    description: 创始人主导销售在第 1 年转化两次试点，第 2 年扩展到相邻视网膜研究，并在 Y3 第 4 季度达到 7 项活跃研究。
    y3RevenueK: 2100.0
    y3EbitdaK: -717.0
    cashLowPointK: 235.5
    keyAssumptionChanges:
      - M12 达到 2 项活跃研究，Y2 第 4 季度达到 5 项，Y3 第 4 季度达到 7 项
      - 随着订阅和按患者收费成熟，混合年度 ACV 达到 $336K
      - 招聘按照 BP 节奏推进，不会提前大幅拉前 GTM 招聘
  upside:
    description: 第一个 RP 证明点转化更快，第 2 年拿下一家 CRO 或平台合作伙伴，并在 Y3 第 4 季度以更高附加销售达到 8 项活跃研究。
    y3RevenueK: 2700.0
    y3EbitdaK: -350.0
    cashLowPointK: 488.0
    keyAssumptionChanges:
      - Y3 第 4 季度达到 8 项活跃研究，且相邻适应症扩张更快
      - 通过分析和远程评估增购，混合年度 ACV 提升到 $360K
      - 随着实施变得更可复制，毛利率改善到 78%
