modelDiagram:
  title: 单位经济流转图
  mermaid: |
    flowchart LR
      SponsorBudget --> ActiveStudies
      ActiveStudies --> QualifiedPatients
      QualifiedPatients --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: 收入引擎
    finding: 基准情景的收入建立在这样一个前提上——到 Y3 第 4 季度达到 7 项活跃研究合同，并在试点转正式及相邻适应症增购之后，把每项研究的混合年度收入做到约 $336K。
  - checkName: 必须跑通的关键点
    finding: 第一个 RP 部署必须证明，转诊到决策工作流至少比人工流程快 20%，买方才会愿意用现有的招募或 eCOA 预算来支付正式合同。
  - checkName: 模型会失灵的情况
    finding: 如果公司长期停在 5 项活跃研究、远程评估增购也做不起来，下行情景会在下一轮融资前把现金打到负值。
  - checkName: 下一轮融资证明点
    finding: 当公司达到 5 项活跃研究、1 个相邻适应症上线、1 个渠道伙伴落地，并拿出可重复的入组 ROI 基准数据时，就足以为下一轮融资提供支撑。
sanityChecks:
  ruleOf40: 'Y3 growth 76.5% + EBITDA margin -34.1% = 42.4%'
  burnMultiple: '随着收入增速快于 opex，净烧钱倍数从 Y2 的 1.0x 改善到 Y3 的 0.8x。'
  revenuePerFte: '按 Y3 第 4 季度 11 名 FTE 计算，Y3 人均收入约为 $191K（对早期、实施较重的垂直 SaaS 来说，大体在合理区间）。'
  flags:
    - 初始视网膜滩头市场很小，因此模型要求公司在第 2 年就完成相邻适应症扩张，才有机会做到 7 项活跃研究。
    - 混合 ACV 的前提是，远程评估和分析模块仍能作为探索性工作流增购项卖出去；如果研究者不接受该模块，定价会向下行情景压缩。
    - Y3 期末现金只剩约 $236K，因此公司在完全盈亏平衡前仍需要再融一轮。
