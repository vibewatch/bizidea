slug: retina-trial-readiness-os
date: '2026-04-27'
currency: USD
modelStartMonth: 2026-05
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-05
  unit: month
  source: '[BP date; 模型从计划日期后的下一个月开始]'
- id: A2
  name: 模型起始时现金
  value: '2700.0'
  unit: USDK
  source: '[BP fundingAsk.targetFundingRangeUsd $2-3M；按 $2.7M pre-seed 成交建模，用于覆盖 24 个月里程碑并留出缓冲]'
- id: A3
  name: 期初活跃研究合同数
  value: '0'
  unit: count
  source: '[BP executiveSummary 和 experimentRoadmap；公司处于产品推出前阶段，以发现和设计伙伴工作为起点]'
- id: A4
  name: 单个活跃研究的稳态年度混合收入
  value: '336.0'
  unit: USDK
  source: '[BP firstCustomer.initialContract $250k-$350k 年度订阅加按患者收费；research market.bottomUpSizingDrivers $300k-$400k ACV；建模取中高位并计入使用附加]'
- id: A5
  name: 试点收入曲线
  value: 新研究部署前 3 个月每月 $12k
  unit: pricing
  source: '[BP firstCustomer.initialContract $100k-$200k 试点；建模为范围有限的付费试点，之后再转为全面生产部署]'
- id: A6
  name: 毛利率
  value: '75.0'
  unit: pct
  source: '[BP businessModel.targetGrossMarginPct]'
- id: A7
  name: 基础客户爬坡
  value: M12 时 2 个活跃研究，Q4Y2 时 5 个，Q4Y3 时 7 个
  unit: active study contracts
  source: '[BP 0-12、12-24 和 24-36 个月里程碑；research market.som 为第 3 年可触达 7 个合同]'
- id: A8
  name: Y1 合同时间安排
  value: 首个付费试点在 M4 启动，第二个研究在 M9 启动
  unit: timing
  source: '[BP milestones 和 gtm.wedge；针对小而集中的视网膜申办方买家群，采用保守的创始人主导销售节奏]'
- id: A9
  name: 单位经济模型月流失率
  value: '3.0'
  unit: pct
  source: '[针对小众企业级临床工作流软件且买方集中的 startup-finance 经验值；研究关系通常跨多年，但买家较集中]'
- id: A10
  name: 完全摊销 CAC
  value: '110.0'
  unit: USDK
  source: '[结合 research buying process、buyer power 与 startup-finance 经验值；假设在小型受监管买方宇宙中进行高接触式创始人主导企业销售]'
- id: A11
  name: CEO 现金薪酬
  value: '150.0'
  unit: annual USDK
  source: '[美国 healthtech pre-seed 创始人薪资的 startup-finance 经验值]'
- id: A12
  name: 创始工程师现金薪酬
  value: '160.0'
  unit: annual USDK
  source: '[结合 BP team 与美国 seed 阶段 healthtech 工程薪酬经验值]'
- id: A13
  name: 临床产品负责人现金薪酬
  value: '155.0'
  unit: annual USDK
  source: '[BP team；该角色需要临床工作流可信度，并能面向研究者进行产品转译]'
- id: A14
  name: 实施负责人现金薪酬
  value: '130.0'
  unit: annual USDK
  source: '[BP team；高接触式研究启动和研究中心上手角色]'
- id: A15
  name: 数据与分析工程师现金薪酬
  value: '150.0'
  unit: annual USDK
  source: '[BP team；支撑基准分析和跨研究数据护城河]'
- id: A16
  name: 增长岗位薪酬组合
  value: 工程师 145.0、销售 140.0、运营/法规 120.0、CS 115.0、合作伙伴 145.0
  unit: annual USDK
  source: '[与 BP 向相邻适应症扩张、渠道合作和分析能力一致的 startup-finance 经验值]'
- id: A17
  name: 薪资税费与福利负担
  value: '20.0'
  unit: pct of salary
  source: '[美国 seed 阶段雇主负担的 startup-finance 经验值]'
- id: A18
  name: 招聘顺序
  value: CEO、创始工程师和临床产品负责人在起始时到岗；实施负责人在 Q3Y1；数据岗位在 Q4Y1；销售和第二名工程师在 Q2Y2；运营/法规岗位在 Q3Y2；第二名 CS 在 Q1Y3；第三名工程师在 Q2Y3；合作伙伴岗位在 Q3Y3
  unit: timing
  source: '[BP team 和 milestones]'
- id: A19
  name: 非薪资销售与市场费用
  value: $10k-$15k/mo in Y1, $15k-$21k/mo in Y2, $22k-$28k/mo in Y3
  unit: USDK per month
  source: '[BP gtm.channels 和创始人主导销售动作；包括差旅、会议、申办方触达和伙伴拓展]'
- id: A20
  name: 非薪资研发费用
  value: $7.5k-$9.5k/mo in Y1, about $12k/mo in Y2, $12.5k-$15k/mo in Y3
  unit: USDK per month
  source: '[BP operations 和 product roadmap；包括云资源、工具、验证工作和数据基础设施]'
- id: A21
  name: 非薪资管理与行政费用
  value: $11k-$12k/mo in Y1, about $15k/mo in Y2, $16.5k-$21k/mo in Y3
  unit: USDK per month
  source: '[BP operations；包括面向受监管研究工作流的法务、合规、会计、保险和安全开销]'
- id: A22
  name: 现金转化假设
  value: EBITDA 近似等于经营现金流
  unit: policy
  source: '[startup-finance 经验值；由于 BP 和 research 中未给出债务、资本开支、税项或营运资金安排，因此现金滚动以前 EBITDA 为锚]'
