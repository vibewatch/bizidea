modelDiagram:
  title: 单位经济模型流
  mermaid: "flowchart LR\n  SponsorBudget[申办方预算] --> ActiveStudies[活跃研究]\n  ActiveStudies --> QualifiedPatients[合格患者]\n  QualifiedPatients --> Revenue[收入]\n  Revenue --> GrossProfit[毛利]\n  GrossProfit --> Cash[现金]\n"
modelSanity:
- checkName: 收入引擎
  finding: 基准情形收入由 Q4Y3 前达到 7 个活跃研究合同驱动，每个研究在试点转正并完成相邻适应症增购后，混合年度收入约为 $336K。
- checkName: 必须做对的事
  finding: 首个 RP 部署必须证明转诊到决策工作流至少加快 20%，这样买方才会用现有招募或 eCOA 预算为正式合同买单。
- checkName: 模型失效条件
  finding: 如果公司停滞在 5 个活跃研究，且远程评估附加销售仍然疲弱，悲观情形会在下一轮融资前把现金压到零以下。
- checkName: 下一轮融资证明点
  finding: 当公司达到 5 个活跃研究、完成 1 个相邻适应症上线，并拥有 1 个能展示可重复入组 ROI 基准数据的渠道伙伴时，就具备了下一轮融资依据。
sanityChecks:
  ruleOf40: Y3 增长 76.5% + EBITDA 利润率 -34.1% = 42.4%
  burnMultiple: 随着收入增速快于 opex，净烧钱倍数从 Y2 的 1.0x 改善到 Y3 的 0.8x。
  revenuePerFte: 按 Q4Y3 的 11 名 FTE 计算，Y3 每名 FTE 收入为 $191K（方向上处于早期垂直 SaaS 且上手服务占比较高的合理区间）。
  flags:
  - 初始的视网膜滩头阵地较小，因此模型要求公司在第 2 年扩展到相邻适应症，才能达到 7 个活跃研究。
  - 混合 ACV 假设远程评估和分析模块仍能作为探索性工作流附加项出售；如果研究者拒绝该模块，定价会向悲观情形收缩。
  - Y3 期末现金仅为 $236K，因此公司在实现完全盈亏平衡前仍需要后续融资。
