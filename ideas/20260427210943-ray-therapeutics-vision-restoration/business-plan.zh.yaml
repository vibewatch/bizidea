slug: retina-trial-readiness-os
date: '2026-04-27'
executiveSummary: Retina Trial Readiness OS 是一层面向视网膜基因治疗申办方的工作流与证据层，服务于遗传性视网膜疾病中的小规模、多研究中心试验。初始客户是在美国开展或扩展视网膜色素变性试验、且难以及时找到方案匹配患者的临床运营副总裁或首席医疗官。产品把视网膜特异性的转诊分诊、结构化方案适配审查和居家功能性视觉追踪结合起来，帮助申办方降低筛选失败，并在两次到访之间收集更密集的纵向证据。市场真实存在，但较窄：基于研究得到的滩头阵地，如果公司不能迅速扩展到 Stargardt 病、地理萎缩和治疗后监测等相邻眼科工作流，它只能支撑一个规模有限的独立软件业务。最佳 GTM 路径是由创始人主导，切入活跃研究，定价为研究订阅费加按入组患者计费的工作流费用，并挂靠在现有的招募、eCOA 或去中心化试验预算上，而不是新设软件科目。核心战略优势在于疾病特异性的工作流深度，以及围绕转诊质量、排除原因、研究中心表现和功能性视觉变化不断复利的数据集；这些能力在当前公开材料中并未被横向供应商明显掌握。最难的产品风险是终点可信度，因此首发版本应将远程评估定位为运营与探索性证据，而不是替代主要终点。公开证据支持紧迫性和买方痛点，但具体预算归属、可接受的远程任务，以及向相邻市场扩展的速度，仍是需要尽早验证的运营假设。
problem:
- 罕见视网膜试验依赖碎片化的转诊网络、手工病历审查和协调员表格，这会拖慢首个合格患者出现时间，并带来本可避免的筛选失败。
- 低视力人群的功能性视觉变化难以在研究中心到访之间被观察到，因此当申办方需要尽早做出运营和项目决策时，疗效信号既稀疏又嘈杂。
solution:
- 申办方和研究中心团队共享一套面向视网膜的接收与方案适配工作流，用于标准化转诊审查、记录排除原因，并更快识别可能合格的患者。
- 通过分诊的患者进入结构化远程评估流程，在两次到访之间采集可重复的功能性视觉任务，并将纵向输出打包为适合申办方使用的报告。
whyWeWin:
- 这一楔子从高成本瓶颈切入，而通用 CTMS、eCOA、招募和 CRO 工作流都无法以视网膜表型和低视力的特异性解决这一问题。
- 每次部署都会生成关于转诊转化、研究中心表现和功能结局模式的专有数据，可用于优化后续方案设计、研究中心选择，以及向相邻眼科研究扩展。
strategicChoices:
  beachhead: 由 Series B 或更后期视网膜基因治疗申办方运营、拥有 5-15 家学术型视网膜研究中心的美国视网膜色素变性干预研究。
  wedgeRationale: 这一买方拥有活跃入组压力、明确的经济痛点，以及足够的研究预算，愿意为一个能缩短入组时间并降低筛选失败的狭窄运营工具买单；更广泛的眼科或提供方工作流则会拉长验证周期并稀释产品特异性。
  sequencingRationale: 先从转诊分诊和方案适配审查入手，因为这是最容易预算化的即时痛点；仅在研究者接受该工作流后，再把远程功能性视觉追踪作为探索性证据层叠加；随后利用产生的研究数据和客户背书，扩展到 Stargardt 病、地理萎缩及精选眼科合作伙伴。
  notYet:
  - 面向已获批疗法的商业化患者监测
  - 广义眼科 EDC 或 CTMS 替代
  - 面向消费者的失明市场平台或直接患者获客业务
  - 在美国完成两次研究部署、验证工作流和数据质量适配之前，不进入欧盟扩张
market:
  tam: 基于研究市场模型，按约 60 个公开的遗传性视网膜和 GA 项目、每个项目约 $400k ACV 估算，对应约 $24.0M 的年度软件机会。
  sam: 在近期市场中，约有 20 个视网膜恢复和 IRD 研究最需要转诊分诊和低视力证据，对应约 $6.0M 年度市场。
  som: 第 3 年可触达情形假设为 7 个活跃研究合同、混合 ACV 约 $300k，对应 $2.1M。
  segments:
  - 开展遗传性视网膜疾病试验的视网膜基因治疗申办方
  - 参与这些研究的学术型视网膜中心和眼科 CRO 团队
  buyingProcess: 采购很可能由临床运营副总裁或首席医疗官主导，同时受到视网膜研究者、研究中心协调员和现有试验技术供应商影响。最可信的路径，是先作为试点挂靠在活跃研究的招募、eCOA 或去中心化运营预算上，等首批研究中心证明患者资格判定更快、纵向数据更干净之后，再扩大部署。
product:
  mvp: Version 1 是一套可按研究配置的转诊分诊与方案适配工作区，供申办方和研究中心团队共同使用，并附带一个定位为探索性证据的轻量远程功能性视觉模块。它应通过导出和轻量工作流接入现有试验系统，而不是试图替代完整的记录系统。
  sixMonth: 上线一个可用于生产的 RP 研究工作流，包含转诊接收、排除原因分类体系、申办方—研究中心看板，以及 1-2 条经视网膜研究者审阅的居家任务流程。
  twelveMonth: 增加多研究分析、研究中心基准、基于角色的审计追踪，以及 Stargardt 病和地理萎缩的适应症模板，以支持相邻扩张。
  twentyFourMonth: 成为多个眼科申办方和精选渠道伙伴在转诊匹配、探索性终点运营和研究设计分析上的视网膜特异性编排层。
  keyBets:
  - 如果能在一项活跃研究中缩短首个合格患者出现时间，买方会愿意为独立的视网膜专用层付费。
  - 即使达不到主要终点级别，只要在运营上有用，视网膜研究者也会接受少量可重复的居家任务。
  - 在横向供应商能够可信地打包同等深度之前，它们更可能选择合作或共存。
  - 围绕筛选失败和研究中心表现的跨研究数据集，会随着时间推移提升中标率和扩张经济性。
gtm:
  wedge: 由创始人主导，切入一项已开始研究中心启动、且申办方痛点迫切的活跃视网膜色素变性研究；先落地转诊分诊，再在试点验证后扩展到远程功能性视觉追踪和分析。
  channels:
  - 直接触达视网膜治疗申办方的临床运营副总裁和首席医疗官
  - 由学术型视网膜中心推动的研究者引荐
  - 与眼科 CRO、注册库及 incumbents 试验技术供应商建立合作
  funnelTargets: 线索到合格试点 20-30%，试点到正式部署 50%+，首个研究中心在 60 天内上线，首个合格患者在上线后 45 天内被识别。
  pricing: 按每个活跃研究收取年度 SaaS 费用，并针对工作流和远程评估按入组患者收费；由于买方不太可能新建独立类别预算，因此应对标现有招募、eCOA 和 DCT 支出。
businessModel:
  revenueStreams:
  - 年度研究订阅
  - 按入组患者收取的转诊与远程评估费用
  - 用于研究中心基准、方案设计输入和筛选失败分析的高级分析服务
  unitOfValue: 活跃研究合同，并按每位入组患者进行基于使用量的扩展
  targetGrossMarginPct: 75
  expansionLevers:
  - 从 RP 扩展到 Stargardt 病和地理萎缩
  - 将钱包份额从分诊提升到探索性终点运营和分析
  - 通过 CRO 和横向平台伙伴，作为视网膜专用模块销售
strategyMap:
  northStarMetric: 每个活跃研究中，通过申办方批准的分诊和纵向证据工作流推进的入组患者数量
  inputMetrics:
  - 从转诊到方案适配决策的天数
  - 按研究中心和原因划分的筛选失败率
  - 转诊患者中可供申办方审查的完整记录占比
  - 两次到访之间的远程任务完成率
  - 试点转正式部署的转化率
  moatsToBuild:
  - 跨申办方和研究中心的视网膜特异性转诊与排除原因图谱
  - 将研究中心表现与方案特征关联的基准数据集
  - 获得研究者信任的低视力纵向监测任务库
  - 无需替换即可嵌入 incumbents 试验技术栈的工作流集成
  killCriteria:
  - 在 30 次定向申办方沟通后，付费试点少于 2 个
  - 没有任何试点能证明方案适配周转时间比手工基线快至少 20%
  - 连续两个研究月份中，完成远程任务的试点患者占比低于 60%
  - 到第 12 个月仍未验证出 RP 之外可信的相邻适应症扩张路径
  mermaid: "flowchart LR\n  Wedge[RP 申办方入组楔子] --> MVP[转诊分诊加方案适配 MVP]\n  MVP --> Proof[更快资格判定与更密集的纵向证据]\n  Proof --> Expansion[Stargardt 和 GA 研究扩张]\n  Expansion --> Moat[视网膜工作流数据与基准护城河]\n"
investorMemo:
  verdict:
    call: 观察
    conviction: 工作流痛点和时机都很强，但买方群体较小，而且必须先证明终点可信度，这家公司才可能成为具有持久风投规模的企业。
    whyBelieve: 活跃的视网膜项目、新近融资，以及缺少明显的原生视网膜 incumbents，共同构成了一个可行且可量化 ROI 的狭窄楔子。
    whyDoubt: 正是这种狭窄性让楔子更锋利，但如果公司不能迅速拿下预算并在 incumbents 打包相邻功能之前扩展出 RP 之外的场景，业务天花板会很低。
    nextDiligence: 落实买方访谈和 1 份设计伙伴 LOI，明确预算来源，以及哪些运营指标足以支撑付费试点。
  firstCustomer:
    title: 运营一项美国活跃视网膜色素变性研究的视网膜基因治疗申办方临床运营副总裁
    profile: Series B 或更后期的眼科生物科技公司，拥有 5-15 家学术型视网膜研究中心，合格患者稀缺，并承受提升研究吞吐的压力。
    trigger: 研究开始入组或新增研究中心后，手工转诊审查导致资格判定缓慢、筛选失败率高，或两次到访之间的功能数据不足。
    buyer: 临床运营副总裁或首席医疗官
    initialContract: 与 1 项活跃研究绑定的 $100k-$200k 试点；在达到研究中心与入组里程碑后，转为约 $250k-$350k 的年度研究订阅，并叠加入患者收费。
  mustBeTrue:
  - 前 10 位申办方买家中，至少 3 位确认可以把现有的招募、eCOA 或 DCT 预算重新分配给视网膜专用工作流层。
  - 某项试点研究显示，相比基于表格的基线，转诊到决策速度至少提升 20%。
  - 视网膜研究者认可至少 2 项居家任务在运营上有用，且适合反复部署。
  - 首个付费 RP 部署在 12 个月内，为至少 2 个相邻眼科适应症提供可信扩张路径。
  - 横向供应商和 CRO 不会阻止部署，并可通过导出、API 或渠道合作实现共存。
  diligenceQuestions:
  - 在一项活跃的视网膜研究中，究竟由哪条预算科目为该产品买单？
  - 哪些筛选失败原因在不同项目间足够常见，从而支持可复用的工作流逻辑？
  - 哪些远程低视力任务既能被研究者接受，又不会给患者带来过重的运营负担？
  - 未来 24 个月内，真正可供一家初创公司切入的美国近期研究有多少？
  - Veeva、Medable、Signant 或 CRO 要增加一个可比的视网膜模板，难度到底有多大？
  riskHeatmap:
  - risk: 买方群体过小，无法支撑独立风投规模
    likelihood: 高
    impact: 高
    leadingIndicator: 在创始人调研后，拥有活跃研究且具备可预算化痛点的可信美国申办方目标少于 15 个。
    mitigation: 在首个 RP 证明点之后，立即扩展到 Stargardt、GA 和眼科伙伴渠道。
  - risk: 远程功能性视觉工作流不被视为对决策有用
    likelihood: 高
    impact: 高
    leadingIndicator: 视网膜 PI 拒绝在试点工作流中加入远程任务包，或任务完成率持续低于 60%。
    mitigation: 先将模块定位为探索性和运营用途，与院内指标做验证，并把核心 ROI 锚定在入组工作流上。
  - risk: 申办方偏好 incumbents 平台或 CRO 服务
    likelihood: 中
    impact: 高
    leadingIndicator: 买方坚持认为，只有在嵌入现有供应商合同后才愿意试点。
    mitigation: 接入当前工作流，作为提升现有供应商 ROI 的模块出售，并尽早推进渠道合作。
  - risk: 数据共享限制阻碍护城河形成
    likelihood: 中
    impact: 中
    leadingIndicator: 付费试点允许使用工作流，但不允许访问跨研究学习所需的匿名转诊和结局元数据。
    mitigation: 在合同中预先约定匿名分析权利，并优先选择愿意共享结构化漏斗数据的客户。
  - risk: 研究中心工作流负担抑制采用
    likelihood: 中
    impact: 中
    leadingIndicator: 协调员重新退回表格，或无法在产品内完成方案适配步骤。
    mitigation: 保持 MVP 聚焦、减少点击，并为实施配置强研究中心运营支持。
operatingAssumptions:
- assumption: 申办方会从现有研究运营预算中为产品买单，而不是要求新建采购类别。
  basis: research.yaml
  validationTest: 完成 10 次买方访谈，并拿到至少 2 份设计伙伴 LOI，明确当前预算科目和替代标准。
  decisionImpact: 若不成立，公司必须通过 CRO 或 incumbents 伙伴销售，而不是直接做独立 SaaS。
- assumption: 一个狭窄的 RP 楔子可以借助大部分可复用的工作流组件，扩展到 Stargardt 病和地理萎缩。
  basis: idea.yaml
  validationTest: 至少对 6 个活跃项目完成方案交叉梳理，并确认超过一半的分诊字段和工作流步骤可复用。
  decisionImpact: 若不成立，公司将沦为小众 RP 工具，应下调风投规模预期。
- assumption: 远程低视力任务可以实现足够高的患者依从性，从而产出有用的纵向运营数据。
  basis: 运营判断
  validationTest: 用 20 名患者试跑 1-2 条任务流程，并在 8 周内实现至少 70% 的月度完成率。
  decisionImpact: 若不成立，路线图应聚焦转诊分诊和研究中心分析，而不是远程证据采集。
- assumption: 视网膜研究者既会充当验证伙伴，也会成为面向申办方的实际分销渠道。
  basis: research.yaml
  validationTest: 完成 5 次 PI 访谈、建立 2 个顾问关系，并通过视网膜中心获得至少 1 次申办方引荐。
  decisionImpact: 若不成立，需求生成将完全依赖直接面向申办方销售，销售周期也可能显著拉长。
- assumption: incumbents 供应商会在足够长时间内与之共存，让创业公司建立差异化数据集。
  basis: 运营判断
  validationTest: 在前 3 个试点中，确认通过导出或轻量集成即可成功部署，且不会被现有供应商阻断采购。
  decisionImpact: 若不成立，产品策略应更早转向合作或被并购定位。
experimentRoadmap:
- horizon: 0-90 days
  experiment: 围绕预算来源、ROI 门槛和试点决策标准，与视网膜申办方买家开展结构化调研。
  hypothesis: 如果 ROI 与入组速度和筛选失败率下降绑定，首位买家会愿意从现有招募、eCOA 或 DCT 预算中为付费试点买单。
  successMetric: 完成 10 次买方电话，获得 3 个合格设计伙伴，以及 2 份注明预算责任人和试点范围的 LOI。
  owner: CEO
- horizon: 0-90 days
  experiment: 将 RP、Stargardt 和 GA 方案映射为可复用的排除原因和分诊分类体系。
  hypothesis: 核心的视网膜工作流可以覆盖多个适应症，只需有限配置，而不是每次定制重建。
  successMetric: 在 6 个方案中，超过 50% 的关键分诊字段和排除类别相同。
  owner: 产品负责人
- horizon: 0-180 days
  experiment: 与 1 个 RP 设计伙伴在 2-3 个研究中心试运行申办方—研究中心转诊工作流。
  hypothesis: 结构化方案适配审查将减少转诊到决策时间，并让排除原因具备可审计性。
  successMetric: 转诊审查速度至少提高 20%，且超过 80% 的筛选患者具备完整排除编码。
  owner: 实施负责人
- horizon: 0-180 days
  experiment: 在视网膜 PI 监督下开展低视力远程任务可行性研究。
  hypothesis: 患者能够以足够的一致性完成有限的居家任务组合，从而支持纵向运营用途。
  successMetric: 8 周内患者完成率至少 70%，且 PI 同意在下一个试点中继续保留该工作流。
  owner: 临床产品负责人
- horizon: 6-12 months
  experiment: 将产品打包为面向 1 家 CRO 或横向试验技术伙伴的模块。
  hypothesis: 渠道伙伴会更愿意转售自己尚未具备的疾病特异性逻辑，而不是立即自行开发。
  successMetric: 与服务眼科研究的伙伴签下 1 份渠道协议或联合试点。
  owner: CEO
- horizon: 6-12 months
  experiment: 测试向 1 个 Stargardt 或 GA 项目进行相邻扩张。
  hypothesis: 第一个 RP 证明点能够以有限实施变更迁移到第二个适应症。
  successMetric: 首个 RP 上线后的 12 个月内，拿下 1 个付费相邻适应症试点。
  owner: CEO
operations:
- 为每次研究启动前的方案配置、排除原因编码和申办方签核建立 SOP
- 通过轻量集成和 CSV/API 导出接入 incumbents CTMS、eCOA 和申办方报告工作流
- 建立由视网膜研究者参与的临床顾问流程，审查任务设计、患者负担和数据质量阈值
- 建立兼顾申办方隐私要求的治理与合同模板，以获取匿名分析权利
- 为小型学术型视网膜中心团队提供高接触式上手和支持机制
team:
- role: 创始工程师
  startTiming: Month 0
  rationale: 构建首个试点所需的可配置工作流引擎、数据模型和集成层，避免过早过度建设完整试验技术基础设施。
- role: 临床产品负责人
  startTiming: Month 0-3
  rationale: 把方案逻辑转化为研究中心可用的工作流，并确保远程任务设计在研究者和申办方面前具备可信度。
- role: 创始人主导销售 / CEO
  startTiming: Month 0
  rationale: 早期成交依赖顾问式销售、买方探索和伙伴拓展，在产品市场契合前无法下放。
- role: 实施负责人 / 客户成功
  startTiming: Month 6
  rationale: 如果没有严密的研究中心上手、工作流培训和 KPI 报告，首批正式研究将很难成功。
- role: 数据 / 分析工程师
  startTiming: Month 9-12
  rationale: 一旦多个研究上线，形成跨研究基准和护城河就需要标准化的漏斗分析能力。
milestones:
- horizon: 0-12 months
  items:
  - 拿下 2 份来自视网膜基因治疗申办方的设计伙伴 LOI
  - 在 2-3 个研究中心上线首个 RP 试点
  - 在 1 项真实研究中证明转诊到决策工作流至少快 20%
  - 在视网膜 PI 支持下，验证 1 套远程功能性视觉方案在运营上可接受
  - 拿下首个付费年度研究合同
- horizon: 12-24 months
  items:
  - 扩展到 3-5 个活跃研究合同，覆盖 RP 和至少 1 个相邻适应症
  - 发布或私下分发关于筛选失败原因和研究中心表现差异的基准数据
  - 签下首个 CRO 或横向平台渠道合作
  - 增加审计追踪、研究中心基准和多研究分析，以支撑可重复部署
- horizon: 24-36 months
  items:
  - 达到与研究 SOM 情形一致的 7 个活跃研究合同
  - 将视网膜特异性基准数据集打造为销售和续约资产
  - 在美国产品和治理成熟后，扩展到精选欧盟工作流
  - 评估更广眼科规模化或伙伴驱动分销等战略选项
risks:
- risk: 买方群体过小，难以支撑独立风投规模
  likelihood: 高
  impact: 高
  mitigation: 在首个 RP 证明之后，迅速扩展到相邻眼科适应症和渠道合作。
- risk: 远程功能性视觉工作流不被视为对决策有用
  likelihood: 高
  impact: 高
  mitigation: 先将该模块保持为探索性定位，并把 ROI 锚定在入组和研究中心就绪度提升上。
- risk: 申办方偏好 incumbents 平台或 CRO 服务
  likelihood: 中
  impact: 高
  mitigation: 将其定位为提升现有供应商 ROI 的视网膜专用层，而不是替换整个技术栈。
- risk: 数据共享限制阻碍护城河形成
  likelihood: 中
  impact: 中
  mitigation: 尽早约定匿名分析权利，并优先选择愿意共享结构化数据的客户。
- risk: 研究中心工作流负担拖慢采用
  likelihood: 中
  impact: 中
  mitigation: 保持实施范围聚焦、减少协调员点击，并直接提供上手支持。
fundingAsk:
  stage: pre-seed
  targetFundingRangeUsd: $2-3M
  runwayMonths: 18
  useOfFundsSummary: 融资覆盖 18 个月，用于拿下 2 个设计伙伴、交付 RP 生产级 MVP、运行首批真实研究部署、验证远程任务可行性，并取得向相邻适应症扩张或建立渠道合作所需的证据。
