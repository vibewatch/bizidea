slug: retina-trial-readiness-os
date: '2026-04-27'
executiveSummary: >-
  Retina Trial Readiness OS 是一层面向视网膜基因治疗申办方的工作流与证据系统，服务对象是在遗传性视网膜疾病中开展小规模、多中心研究的团队。初始客户是美国视网膜治疗公司里的临床运营副总裁或首席医学官：他们正在启动或扩展一项视网膜色素变性试验，却迟迟找不到足够多符合方案的患者。产品把视网膜专属转诊分诊、结构化方案匹配审核和居家功能性视力追踪整合在一起，让申办方既能减少筛选失败，也能在访视之间拿到更密集的纵向证据。这个市场真实存在，但很窄：按现有研究，单靠这个滩头市场很难撑起一家独立的软件公司，除非团队能很快把工作流扩展到 Stargardt disease、geographic atrophy 和治疗后监测等相邻眼科场景。最合理的 GTM 路线，是由创始人直接卖给活跃研究团队，定价采用按研究订阅加按入组患者收费，并挂靠在现有的招募、eCOA 或去中心化试验预算之下，而不是新开一条软件预算科目。核心战略优势在于疾病专属的工作流深度，以及一套会不断复利的数据资产：它覆盖转诊质量、排除原因、中心表现和功能性视力变化，而这些能力今天在横向供应商的公开材料里还看不到。最难的产品风险是终点可信度，因此第一版必须把远程评估定位成运营层和探索性证据层，而不是主要终点替代品。公开证据足以说明紧迫性和买方痛点，但预算归属、可接受的远程任务，以及相邻市场扩张速度，仍是必须尽早验证的经营假设。
problem:
  - 罕见视网膜试验依赖分散的转诊网络、人工病历审核和协调员表格，因此首位合格患者出现得慢，很多本可避免的筛选失败也随之发生。
  - 低视力人群的功能性视力变化很难在中心访视之间被持续观察，因此当申办方需要尽早做运营和项目判断时，疗效信号仍然稀疏且噪声大。
solution:
  - 申办方和中心团队共用一套视网膜专属接收与方案匹配工作流，标准化转诊审核、记录排除原因，并更快找出高概率符合条件的患者。
  - 通过分诊的患者会进入结构化远程评估流程，在访视之间持续采集可重复的功能性视力任务，并把纵向结果打包成申办方可直接使用的报告。
whyWeWin:
  - 这个切口卡在高成本瓶颈上，而通用 CTMS、eCOA、招募和 CRO 工作流都没有用视网膜表型和低视力场景去解决它。
  - 每次部署都会沉淀转诊转化、中心表现和功能结局模式数据，从而反过来优化后续方案设计、中心选择，以及向相邻眼科研究的扩张。
strategicChoices:
  beachhead: 由 Series B 或更后期视网膜基因治疗申办方发起、在美国 5-15 家学术型视网膜中心开展的视网膜色素变性干预研究。
  wedgeRationale: 这类买方已经面临真实的入组压力、经济痛点明确，而且研究预算足以为一个窄而深的运营工具买单，只要它能缩短入组并减少筛选失败；如果一开始就做更广的眼科或服务提供方工作流，证明周期会更长，产品也会失去聚焦。
  sequencingRationale: 先从转诊分诊和方案匹配审核切入，因为这是最容易预算化、也最痛的需求；只有当研究者接受整套工作流后，再叠加远程功能性视力追踪作为探索性证据层；然后借助由此得到的研究数据和客户背书，扩展到 Stargardt、geographic atrophy 以及精选的眼科合作渠道。
  notYet:
    - 已获批疗法的商业化患者监测
    - 通用眼科 EDC 或 CTMS 替换
    - 面向消费者的失明患者市场或直接获客业务
    - 在两个美国研究部署证明工作流和数据质量适配之前，不进入欧盟
market:
  tam: "按研究模型估算，约 60 个公开的遗传性视网膜和 GA 项目，对应约 $24.0M 的年度软件机会，假设每个项目约 $400k ACV。"
  sam: "近期可服务市场约为 $6.0M，对应约 20 个视网膜恢复和 IRD 研究，这些研究最需要转诊分诊和低视力证据能力。"
  som: "第 3 年可触达市场约为 $2.1M，前提是拿下 7 份活跃研究合同，混合 ACV 约为 $300k。"
  segments:
    - 开展遗传性视网膜疾病试验的视网膜基因治疗申办方
    - 参与这些研究的学术型视网膜中心和眼科 CRO 团队
  buyingProcess: >-
    采购大概率由临床运营副总裁或首席医学官主导，视网膜研究者、中心协调员以及现有试验科技供应商会共同施加影响。最可信的路径，是先把试点挂靠在活跃研究的招募、eCOA 或去中心化运营预算上；等首批中心证明资格判定更快、纵向数据更干净后，再扩大部署。
product:
  mvp: >-
    1.0 版本是一套可按研究配置的转诊分诊与方案匹配工作区，面向申办方和中心团队，同时配备一个受限的远程功能性视力模块，并明确定位为探索性证据。它应通过导出和轻量工作流接入现有试验系统，而不是一开始就试图替换整个记录系统。
  sixMonth: 上线一套可正式投入使用的 RP 研究工作流，覆盖转诊接收、排除原因分类、申办方-中心看板，以及 1-2 套经过视网膜研究者审阅的居家任务流程。
  twelveMonth: 增加多研究分析、中心基准、基于角色的审计追踪，以及 Stargardt disease 和 geographic atrophy 模板，支撑相邻扩张。
  twentyFourMonth: 成为多家眼科申办方和精选渠道伙伴在转诊匹配、探索性终点运营和试验设计分析上的视网膜专属编排层。
  keyBets:
    - 如果它能在一个活跃研究里缩短首位合格患者出现时间，买方就愿意为独立的视网膜专用层买单。
    - 即便达不到主要终点级别，视网膜研究者也会接受一小组可重复的居家任务，前提是它们对运营有用。
    - 在横向厂商能可信地打包出同等视网膜深度之前，它们更可能先合作或共存。
    - 随时间积累的跨研究筛选失败和中心表现数据，会提升赢单率和扩张效率。
gtm:
  wedge: 由创始人主导，卖进一项已经启动中心激活、痛点紧迫的视网膜色素变性研究；先落在转诊分诊，再在试点验证后扩展到远程功能性视力追踪和分析。
  channels:
    - 直接触达视网膜治疗申办方的临床运营副总裁和首席医学官
    - 通过学术型视网膜中心的研究者引荐切入
    - 与眼科 CRO、注册库和现有试验科技厂商合作
  funnelTargets: "从线索到合格试点 20-30%，从试点到正式部署 50%+，首个中心在 60 天内上线，Go-live 后 45 天内找到第一位合格患者。"
  pricing: 按活跃研究收取年度 SaaS 费用，并按入组患者收取工作流和远程评估费用；对买方的呈现方式，应对照现有的招募、eCOA 和 DCT 开支，因为他们大概率不会单独新建一个预算品类。
businessModel:
  revenueStreams:
    - 年度研究订阅费
    - 按入组患者计费的转诊与远程评估费用
    - 面向中心基准、方案设计输入和筛选失败分析的高级分析服务
  unitOfValue: 以活跃研究合同为价值单元，并按入组患者用量做扩展
  targetGrossMarginPct: 75
  expansionLevers:
    - 从 RP 扩展到 Stargardt disease 和 geographic atrophy
    - 从分诊扩展到探索性终点运营与分析，提升钱包份额
    - 通过 CRO 和横向平台伙伴，以视网膜专用模块形式销售
strategyMap:
  northStarMetric: 每项活跃研究中，经过申办方批准的分诊和纵向证据工作流推进的入组患者数量
  inputMetrics:
    - 从转诊到方案匹配决策的天数
    - 按中心和原因拆分的筛选失败率
    - 转诊患者中，供申办方审核的完整资料比例
    - 访视之间远程任务完成率
    - 从试点到正式部署的转化率
  moatsToBuild:
    - 跨申办方和中心的视网膜专属转诊与排除原因图谱
    - 将中心表现与方案特征关联起来的基准数据集
    - 被研究者信任、用于低视力纵向监测的任务库
    - 能嵌入现有试验科技栈而无需替换的工作流集成能力
  killCriteria:
    - 在 30 次针对性申办方访谈后，付费试点少于 2 个
    - 没有任何一个试点能把方案匹配周转时间较人工基线缩短至少 20%
    - 连续两个月中，完成远程任务的试点患者比例低于 60%
    - 到第 12 个月仍未验证出 RP 之外可信的相邻适应症扩张路径
  mermaid: |
    flowchart LR
      Wedge[RP 申办方入组切口] --> MVP[转诊分诊加方案匹配 MVP]
      MVP --> Proof[资格判定更快且纵向证据更密集]
      Proof --> Expansion[扩展到 Stargardt 和 GA 研究]
      Expansion --> Moat[视网膜工作流数据与基准护城河]
investorMemo:
  verdict:
    call: 观察
    conviction: 工作流痛点和时机都很强，但买方群体太小，而且终点可信度必须先被证明，这家公司才有机会变成耐打的风险投资级企业。
    whyBelieve: 活跃的视网膜项目、新近融资，以及公开层面缺少明显的视网膜原生现有厂商，共同构成了一个可验证 ROI 的窄切口。
    whyDoubt: 同样是这个切口的狭窄性，既让定位清晰，也可能给业务设上天花板；如果公司不能很快拿到预算，并在现有厂商打包相邻功能前走出 RP，它就会受限。
    nextDiligence: 拿到买方访谈和至少一份设计合作伙伴 LOI，明确预算从哪里出，以及哪些运营指标足以支撑一次付费试点。
  firstCustomer:
    title: 运行美国活跃视网膜色素变性研究的视网膜基因治疗申办方临床运营副总裁
    profile: Series B 或更后期的眼科生物科技公司，运营 5-15 家学术型视网膜中心，合格患者稀缺，且面临提升研究吞吐的压力。
    trigger: 入组启动或新增中心上线后，人工转诊审核导致资格判定缓慢、筛选失败率高，或访视间功能性数据不足。
    buyer: 临床运营副总裁或首席医学官
    initialContract: "$100k-$200k 的单研究试点，达到中心和入组里程碑后，转为约 $250k-$350k 的年度研究订阅费，外加按患者收费。"
  mustBeTrue:
    - 前 10 位申办方买家里，至少有 3 位确认可以从现有的招募、eCOA 或 DCT 预算中挪钱给视网膜专用工作流层。
    - 试点研究相比表格基线，转诊到决策速度至少提升 20%。
    - 视网膜研究者认可至少 2 项居家任务，认为它们对运营有用且适合重复部署。
    - 第一个付费 RP 部署，能在 12 个月内走出至少 2 个相邻眼科适应症的可信扩张路径。
    - 横向厂商和 CRO 不会阻断部署，并且能通过导出、API 或渠道合作与之共存。
  diligenceQuestions:
    - 在一项活跃视网膜研究里，究竟是哪条预算线为这个产品买单？
    - 哪些筛选失败原因在不同项目中足够常见，能支撑可复用的工作流逻辑？
    - 哪些远程低视力任务既被研究者接受，又不会给患者带来过重执行负担？
    - 接下来 24 个月内，美国真正可供一家创业公司切入的研究有多少？
    - Veeva、Medable、Signant 或某家 CRO 补上一套相似的视网膜模板，到底有多难？
  riskHeatmap:
    - risk: 买方群体太小，撑不起独立的风险投资级体量
      likelihood: High
      impact: High
      leadingIndicator: 创始人调研后，仍保留预算痛点且有活跃研究的美国可信申办方目标少于 15 家。
      mitigation: 一旦第一个 RP 证明点成立，就立刻向 Stargardt、GA 和眼科合作渠道扩张。
    - risk: 远程功能性视力工作流不被认为具有决策价值
      likelihood: High
      impact: High
      leadingIndicator: 视网膜 PI 拒绝把远程任务包纳入试点工作流，或完成率始终低于 60%。
      mitigation: 先把模块定位成探索性和运营层，和院内测量做对照验证，同时把核心 ROI 继续锚定在入组工作流上。
    - risk: 申办方更偏好现有平台或 CRO 服务
      likelihood: Medium
      impact: High
      leadingIndicator: 买方坚持只有把该功能嵌进现有供应商合同里，才愿意做试点。
      mitigation: 接入现有工作流，以提升现有供应商 ROI 的模块形式出售，并尽早推进渠道合作。
    - risk: 数据共享限制阻碍护城河形成
      likelihood: Medium
      impact: Medium
      leadingIndicator: 付费试点允许使用工作流，却不给跨研究学习所需的去标识化转诊和结局元数据。
      mitigation: 在合同里预先锁定去标识化分析权，并优先选择愿意共享结构化漏斗数据的客户。
    - risk: 中心工作流负担拖慢采用
      likelihood: Medium
      impact: Medium
      leadingIndicator: 协调员重新退回表格，或无法在产品内完成方案匹配步骤。
      mitigation: 让 MVP 尽量窄，尽量少点几下，并配足中心运营支持。
operatingAssumptions:
  - assumption: 申办方会从现有研究运营预算中为产品买单，而不是要求新建一个采购品类。
    basis: research.yaml
    validationTest: 完成 10 次买方访谈，并拿到至少 2 份设计合作伙伴 LOI，明确当前预算线和替代标准。
    decisionImpact: 如果这条不成立，公司就必须通过 CRO 或现有厂商伙伴销售，而不是直接做独立 SaaS。
  - assumption: 狭窄的 RP 切口可以主要依靠可复用工作流组件，扩展到 Stargardt disease 和 geographic atrophy。
    basis: idea.yaml
    validationTest: 至少对 6 个活跃项目完成方案交叉比对，并确认超过一半的分诊字段和工作流步骤可以复用。
    decisionImpact: 如果这条不成立，公司就会停留在小众 RP 工具，风险投资级预期应下调。
  - assumption: 远程低视力任务能获得足够高的患者依从性，从而产出有用的纵向运营数据。
    basis: 运营判断
    validationTest: 用 20 位患者试跑 1-2 套任务流程，在 8 周内实现至少 70% 的月度完成率。
    decisionImpact: 如果这条不成立，路线图就应回到转诊分诊和中心分析，而不是远程证据采集。
  - assumption: 视网膜研究者既能作为验证伙伴，也能成为把产品带进申办方的现实分发渠道。
    basis: research.yaml
    validationTest: 拿下 5 次 PI 访谈、2 个顾问关系，以及至少 1 次由视网膜中心牵出的申办方引荐。
    decisionImpact: 如果这条不成立，需求生成只能靠直销，销售周期也会显著拉长。
  - assumption: 现有厂商会在足够长的一段时间内选择共存，让创业公司有机会沉淀差异化数据集。
    basis: 运营判断
    validationTest: 在前 3 个试点里，确认能通过导出或轻量集成顺利部署，且不会被当前供应商在采购层面卡死。
    decisionImpact: 如果这条不成立，产品策略就应更早转向合作或并购定位。
experimentRoadmap:
  - horizon: 0-90 天
    experiment: 对视网膜申办方买家做结构化调研，确认预算来源、ROI 门槛和试点决策标准。
    hypothesis: 如果 ROI 绑定在入组速度和筛选失败下降上，首个买家会愿意从现有的招募、eCOA 或 DCT 预算中支付试点费用。
    successMetric: 完成 10 次买方访谈、筛出 3 个合格设计伙伴，并拿到 2 份明确预算归属和试点范围的 LOI。
    owner: CEO
  - horizon: 0-90 天
    experiment: 把 RP、Stargardt 和 GA 的方案映射成一套可复用的排除原因与分诊分类体系。
    hypothesis: 一套核心视网膜工作流可以覆盖多个适应症，只需要有限配置，而不必每次重做。
    successMetric: 在 6 份方案中，超过 50% 的关键分诊字段和排除类别可以共享。
    owner: 产品负责人
  - horizon: 0-180 天
    experiment: 与一家 RP 设计伙伴在 2-3 个中心试跑申办方-中心转诊工作流。
    hypothesis: 结构化的方案匹配审核会缩短转诊到决策时间，并让排除原因具备可审计性。
    successMetric: 转诊审核速度至少提升 20%，且超过 80% 的筛查患者都有完整排除编码。
    owner: 实施负责人
  - horizon: 0-180 天
    experiment: 在视网膜 PI 监督下，跑一项低视力远程任务可行性研究。
    hypothesis: 患者能稳定完成一组有限的居家任务，使其足以用于纵向运营跟踪。
    successMetric: 8 周内患者完成率至少 70%，且 PI 同意在下一轮试点中保留该工作流。
    owner: 临床产品负责人
  - horizon: 6-12 个月
    experiment: 把产品封装成一个模块，交给一家 CRO 或横向试验科技伙伴销售。
    hypothesis: 渠道伙伴更愿意转售他们缺失的疾病专属逻辑，而不是立刻自己重建。
    successMetric: 与服务眼科研究的伙伴签下 1 份渠道协议，或完成 1 个联合试点。
    owner: CEO
  - horizon: 6-12 个月
    experiment: 测试向一个 Stargardt 或 GA 项目扩张的可行性。
    hypothesis: 第一个 RP 证明点可以以有限的实施改动，迁移到第二个适应症。
    successMetric: 第一个 RP 项目上线后 12 个月内，拿下 1 个付费的相邻适应症试点。
    owner: CEO
operations:
  - 每项研究上线前，都要有关于方案配置、排除原因编码和申办方签字确认的 SOP
  - 通过轻量集成和 CSV/API 导出，接入现有 CTMS、eCOA 和申办方汇报工作流
  - 建立由视网膜研究者参与的临床顾问流程，审阅任务设计、患者负担和数据质量阈值
  - 准备既能锁定去标识化分析权、又符合申办方隐私要求的数据治理与合同模板
  - 为小型学术视网膜中心团队提供高触达的上线与支持动作
team:
  - role: 创始工程师
    startTiming: Month 0
    rationale: 在不过度构建整套试验科技基础设施的前提下，做出首个试点所需的可配置工作流引擎、数据模型和集成层。
  - role: 临床产品负责人
    startTiming: Month 0-3
    rationale: 把方案逻辑翻成中心能用的工作流，并确保远程任务设计能被研究者和申办方认可。
  - role: 创始人主导销售 / CEO
    startTiming: Month 0
    rationale: 早期成交依赖咨询式销售、买方发现和伙伴拓展，在找到 PMF 前无法外包。
  - role: 实施 / 客户成功负责人
    startTiming: Month 6
    rationale: 如果没有紧密的中心上手、流程培训和 KPI 汇报，首批正式研究很容易失手。
  - role: 数据 / 分析工程师
    startTiming: Month 9-12
    rationale: 一旦有多个研究上线，想形成跨研究基准和数据护城河，就需要标准化的漏斗分析能力。
milestones:
  - horizon: 0-12 个月
    items:
      - 从视网膜基因治疗申办方拿下 2 份设计合作伙伴 LOI
      - 在 2-3 个中心上线首个 RP 试点
      - 在一个真实研究里证明转诊到决策工作流至少快 20%
      - 在视网膜 PI 支持下，验证一套远程功能性视力任务在运营上可接受
      - 拿下第一份付费年度研究合同
  - horizon: 12-24 个月
    items:
      - 扩展到 3-5 份活跃研究合同，覆盖 RP 和至少一个相邻适应症
      - 发布或私下流通关于筛选失败原因和中心表现差异的基准数据
      - 签下第一个 CRO 或横向平台渠道合作
      - 增加审计追踪、中心基准和多研究分析，支撑可复制部署
  - horizon: 24-36 个月
    items:
      - 达到与研究 SOM 情景一致的 7 份活跃研究合同
      - 把视网膜专属基准数据集打造成销售和续约资产
      - 在美国产品和治理成熟后，扩展到精选欧盟工作流
      - 评估更广泛眼科扩张或以合作为主的分发等战略选项
risks:
  - risk: 买方群体太小，撑不起独立的风险投资级体量
    likelihood: High
    impact: High
    mitigation: 在第一个 RP 证明点后，迅速扩展到相邻眼科适应症和渠道合作。
  - risk: 远程功能性视力工作流不被认为具有决策价值
    likelihood: High
    impact: High
    mitigation: 先把模块定位为探索性能力，并把 ROI 锚定在入组和中心就绪度提升上。
  - risk: 申办方更偏好现有平台或 CRO 服务
    likelihood: Medium
    impact: High
    mitigation: 把自己定位成能提升现有供应商 ROI 的视网膜专用层，而不是替换整套栈。
  - risk: 数据共享限制阻碍护城河形成
    likelihood: Medium
    impact: Medium
    mitigation: 尽早在合同中锁定去标识化分析权，并优先选择愿意共享结构化数据的客户。
  - risk: 中心工作流负担拖慢采用
    likelihood: Medium
    impact: Medium
    mitigation: 保持实施范围窄、减少协调员点击，并直接提供上线支持。
fundingAsk:
  stage: pre-seed
  targetFundingRangeUsd: $2-3M
  runwayMonths: 18
  useOfFundsSummary: "这笔钱将支持 18 个月运营，用来拿下 2 个设计伙伴、交付 RP 正式版 MVP、跑通首批真实研究部署、验证远程任务可行性，并攒够向相邻适应症扩张或走渠道合作所需的证据。"
