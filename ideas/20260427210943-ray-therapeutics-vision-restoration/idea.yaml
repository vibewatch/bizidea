topRisks:
  - name: Sponsor budgets may prioritize biology over tooling
    description: "Early-stage biotechs may resist adding new software spend unless it directly improves enrollment or endpoint quality."
    mitigation: "Sell against active study milestones and tie ROI to faster enrollment, fewer screen failures, and cleaner data for each enrolled patient."
  - name: Endpoint credibility risk
    description: "Remote functional vision assessments may be viewed as supplementary rather than decision-grade by sponsors or regulators."
    mitigation: "Start as an operational and exploratory endpoint layer, validate against site-collected measures, and focus first on improving trial decisions rather than replacing primary endpoints."
  - name: Narrow initial market
    description: "Inherited retinal disease trials are specialized, so the first customer pool is limited."
    mitigation: "Design the platform for adjacent ophthalmology programs from day one so the same workflow can expand into geographic atrophy, other retinal interventions, and post-market monitoring."
