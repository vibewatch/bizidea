problem: "Retinal gene-therapy sponsors do not just need breakthrough biology; they need to find small, fragmented blindness populations quickly and capture functional vision change in a way that holds up across sites. Today, eligibility review is spread across referral networks, coordinator spreadsheets, and manual chart chasing, while many meaningful daily-vision changes are only sampled during infrequent site visits. That combination slows enrollment, increases screen failures, and makes efficacy signals noisier just as trials get more expensive."
targetUser:
  primary: "VP Clinical Operations or clinical development lead at retinal gene-therapy companies running inherited retinal disease trials"
  secondary: "Principal investigators and study coordinators at academic retina centers enrolling optogenetic and gene-therapy studies"
  buyer: "VP Clinical Operations or Chief Medical Officer"
startupThesis:
  nonObviousInsight: "As retinal therapies become more gene-agnostic and move into active studies, the bottleneck shifts away from discovering one mutation-specific asset and toward operationally finding phenotype-matched patients and measuring real-world functional vision improvement between visits."
  beachhead: "Clinical-operations teams at retinal gene-therapy startups running 5-15 U.S. sites for retinitis pigmentosa interventional trials"
  wedge: "A retina-specific trial-readiness layer that pre-qualifies referred patients, standardizes protocol-fit review, and captures longitudinal at-home functional vision assessments for sponsor and site teams."
  whyNowCatalyst: "Ray's $125M financing and active ENVISION plus RTx-021 enrollment mean retinal optogenetics is now capitalized enough that enrollment speed and endpoint quality can determine program value."
  ventureScalePath: "Start with inherited retinal disease trial enrollment and endpoint capture, then expand into broader ophthalmology trials, post-treatment monitoring, referral-network infrastructure, and real-world evidence for commercial vision-restoration therapies."
solution: "The product gives sponsors and retina sites a shared operating layer for recruitment and endpoint collection. Sites can intake referrals, upload prior diagnosis and visual-function records, and receive a structured protocol-fit checklist that reduces manual back-and-forth with sponsors. Patients who appear eligible are then enrolled into a standardized remote assessment flow that tracks low-vision functional tasks between visits and packages the results into sponsor-ready longitudinal reports. Over time, the company builds a retina-specific dataset on referral conversion, screen-failure causes, site performance, and disease-specific functional outcomes that improves study design and site selection for later programs."
goToMarketSeed:
  firstCustomer: "Clinical-ops leader at a Series B retinal gene-therapy company enrolling a retinitis pigmentosa study across a small network of U.S. academic retina centers"
  buyingTrigger: "The sponsor opens enrollment or adds sites and realizes qualified patients are scarce, screen-failure rates are high, or functional endpoint data is too sparse between visits."
  currentAlternative: "coordinator spreadsheets, manual chart review, patient advocacy outreach, generic EDC or ePRO tools, and CRO-managed site follow-up"
  switchingReason: "This wedge is purpose-built for rare-retina recruiting and functional vision evidence, so it can shorten time to first qualified patient and produce richer longitudinal data than generic trial software."
  pricingHypothesis: "Annual SaaS fee per active study plus per-enrolled-patient pricing for remote assessment and referral workflow usage."
