differentiator: "Generic trial-tech vendors handle forms, randomization, or broad ePRO workflows, but they do not own the retinal-disease-specific work of protocol-fit review and functional vision tracking. This company starts where sponsor teams actually lose time: identifying rare low-vision patients, explaining screen failures, and producing usable longitudinal evidence between site visits. Its defensibility comes from a proprietary retina trial graph spanning referral sources, eligibility patterns, site performance, and disease-specific functional outcomes."
