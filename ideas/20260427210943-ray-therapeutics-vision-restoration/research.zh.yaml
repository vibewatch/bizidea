  validationPlan:
  - priority: high
    question: 买方是否愿意为一个独立的视网膜专用层付费？
    evidenceToGather: 与临床运营副总裁 / 首席医疗官买方进行 10 次探索访谈，确认预算来源和替代标准。
  - priority: high
    question: 哪些居家低视力任务能被视网膜研究者接受？
    evidenceToGather: 与 5 位视网膜 PI 进行方案审查和试点反馈。
  - priority: high
    question: 如今筛选失败究竟发生在哪些环节？
    evidenceToGather: 获取 2-3 个活跃视网膜研究的匿名转诊漏斗数据。
  - priority: medium
    question: 一个 RP 部署能否自然扩展到 Stargardt 和 GA？
    evidenceToGather: 对 6 个活跃方案的纳入/排除逻辑和终点工作流做对照梳理。
