  strength: 漏斗顶端指标清晰，中心网络规模大。
  weaknessVsUs: 做不到视网膜专属终点采集和申办方-中心编排的后半段。
  sourceRefs:
  - 10
regulatoryTechnicalConstraints:
- point: 远程功能性视力测量在影响关键试验决策之前，必须先完成适配用途的验证。
  sourceRefs:
  - 22
  - 23
- point: 罕见病试验采用 DHT 的趋势在上升，但实施和数据集成负担依然真实存在。
  sourceRefs:
  - 24
- point: 欧盟工作流必须适配 CTIS 和 Clinical Trials Regulation。
  sourceRefs:
  - 20
- point: 患者发现优势取决于能否接入专业注册库和转诊网络，而不只是做广泛的消费者营销。
  sourceRefs:
  - 21
- point: 任何接触受监管试验数据的产品，都必须与现有 eCOA、中心系统和申办方系统共存。
  sourceRefs:
  - 11
  - 12
  - 13
validationSignals:
- point: Ray 完成了 $125M Series B 融资。
  sourceRefs:
  - 1
- point: Ray 的 RTx-015 获得 RMAT 认定。
  sourceRefs:
  - 2
- point: Nanoscope 正公开讨论商业化准备和 BLA 申报。
  sourceRefs:
  - 4
  - 26
- point: Beacon 同时拥有在招募中的 XLRP 研究和关键性研究。
  sourceRefs:
  - 5
- point: Ocugen 正在推进 Phase 3 RP 和 Phase 2/3 Stargardt 研究。
  sourceRefs:
  - 6
  - 7
- point: FFB 管线显示多种技术路径下都有活跃的视网膜治疗项目。
  sourceRefs:
  - 3
openQuestions:
- 这家公司能否以独立产品身份拿到预算，而不是只作为现有平台或 CRO 合同里的一个功能？
- 哪些居家功能性视力任务会被视网膜研究者认为对决策有用？
- 申办方和中心现实中愿意共享多少去标识化筛查数据，来帮助建立护城河？
- 如果不能快速扩展到更广泛的眼科工作流，这个滩头市场会不会太小？
