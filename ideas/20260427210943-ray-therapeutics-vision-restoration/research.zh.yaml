  wedge: 患者招募与预筛分析。
  pricing: 定制定价；未公开。
  strength: 拥有清晰的漏斗顶端指标和大规模研究中心网络。
  weaknessVsUs: 止步于视网膜特异性终点采集和申办方—研究中心编排之前。
  sourceRefs:
  - 10
regulatoryTechnicalConstraints:
- point: 远程功能性视觉指标在影响关键试验决策之前，需要完成适用性验证。
  sourceRefs:
  - 22
  - 23
- point: 罕见病中的 DHT 采用正在上升，但实施和数据集成负担依然真实存在。
  sourceRefs:
  - 24
- point: 欧盟工作流需要适配 CTIS 和《临床试验条例》。
  sourceRefs:
  - 20
- point: 患者发现优势依赖于接入专业化注册库和转诊网络，而不只是广泛的消费者营销。
  sourceRefs:
  - 21
- point: 任何接触受监管试验数据的产品，都必须与现有 eCOA、研究中心和申办方系统共存。
  sourceRefs:
  - 11
  - 12
  - 13
validationSignals:
- point: Ray 完成了 $125M Series B 融资。
  sourceRefs:
  - 1
- point: Ray 为 RTx-015 获得了 RMAT 资格。
  sourceRefs:
  - 2
- point: Nanoscope 正在公开讨论商业化就绪和 BLA 准备工作。
  sourceRefs:
  - 4
  - 26
- point: Beacon 同时拥有正在入组和关键性阶段的 XLRP 研究。
  sourceRefs:
  - 5
- point: Ocugen 正在开展 Phase 3 RP 和 Phase 2/3 Stargardt 研究。
  sourceRefs:
  - 6
  - 7
- point: FFB 管线显示，跨多种技术路径存在多个活跃的视网膜治疗项目。
  sourceRefs:
  - 3
openQuestions:
- 创业公司能否以独立产品形态拿到预算，而不是作为现有平台或 CRO 合同中的一个功能？
- 哪些居家功能性视觉任务会被视网膜研究者视为对决策有用？
- 申办方和研究中心现实中能共享多少匿名筛选数据，以建立数据护城河？
- 如果公司不能快速扩展到更广的眼科工作流，这个滩头阵地是否过小？
