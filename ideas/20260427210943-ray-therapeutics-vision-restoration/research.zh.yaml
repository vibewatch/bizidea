  validationPlan:
  - priority: high
    question: 买方是否愿意为独立的视网膜专用层单独付费？
    evidenceToGather: 与临床运营副总裁 / 首席医学官进行 10 次调研访谈，确认预算来源和替代标准。
  - priority: high
    question: 哪些居家低视力任务能被视网膜研究者接受？
    evidenceToGather: 与 5 位视网膜 PI 一起做方案审阅，并收集试点反馈。
  - priority: high
    question: 今天的筛选失败究竟卡在哪一步？
    evidenceToGather: 从 2-3 个活跃视网膜研究中获取去标识化的转诊漏斗数据。
  - priority: medium
    question: 一个 RP 部署能否自然扩展到 Stargardt 和 GA？
    evidenceToGather: 对 6 个活跃方案的纳入/排除逻辑与终点工作流做交叉比对。
