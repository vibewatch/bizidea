scenarios:
  downside:
    description: 部分买家接受临时上线豁免，现有厂商的捆绑方案在更多评审里胜出，部署也比计划更偏服务化。
    y3RevenueK: 2494.63
    y3EbitdaK: -1419.63
    cashLowPointK: -48.87
    keyAssumptionChanges:
      - Y2 净增付费客户放慢到 5 个，Y3 为 7 个，到 Q4Y3 结束时合计 17 个客户。
      - 混合年化 ARPU 到期末仅接近 $195K，因为多数客户仍停留在单一工作流，并推迟重新认证或凭证签发增购。
      - 毛利率到期末仅接近 68%，因为每次部署仍需要更多定制化审批和回滚工作。
  base:
    description: 创始人主导的切换跑成可复制、由伙伴协助的打法，第二工作流扩展抬升 ACV，同时不必过早堆一个过大的前线团队。
    y3RevenueK: 3439.38
    y3EbitdaK: -637.21
    cashLowPointK: 929.17
    keyAssumptionChanges:
      - Y2 净增付费客户共 7 个，Y3 共 10 个，到 Q4Y3 结束时共有 22 个付费客户。
      - 混合年化 ARPU 从 Q1Y2 的 $180K 逐步抬升到 Q4Y3 的 $215K，因为更多切换转成长期订阅，且大约一半生产环境客户会增加第二工作流或重新认证模块。
      - 随着 30 天切换手册和安全审查工具包压低定制化服务占比，毛利率会从 Y1 的 47%-57% 提升到 Q4Y3 的 73%。
  upside:
    description: Microsoft 和身份生态伙伴带来更接近上线的机会，多工作流扩展也比预期更早出现在首批受监管客户里。
    y3RevenueK: 3960.0
    y3EbitdaK: -229.61
    cashLowPointK: 1355.42
    keyAssumptionChanges:
      - Y2 净增付费客户达到 8 个，Y3 为 9 个，到 Q4Y3 结束时共有 24 个客户。
      - 随着第二工作流扩展和持续性重新认证更早加挂，混合年化 ARPU 到 Q4Y3 大约能到 $225K。
      - 如果 Entra/SailPoint/Copilot 切换进一步模板化、并由伙伴支持，毛利率可提升到 74%。
sensitivity:
  - variable: ARPU
    downsideCase: 因买家停留在首个工作流，Q4Y3 退出 ARPU 仅 $200K
    baseCase: 基础情景下 Q4Y3 退出 ARPU 为 $215K
    upsideCase: 若重新认证和第二工作流更早挂载，Q4Y3 退出 ARPU 可到 $225K
    y3RevenueImpactK: -247.5
    cashImpactK: -226.29
  - variable: CAC
    downsideCase: 如果更多交易需要创始人和解决方案团队直接投入，CAC 升至 $145K
    baseCase: 按模型中的伙伴协同企业级打法，CAC 为 $121K
    upsideCase: 如果实施伙伴带来更成熟、更接近上线的机会，CAC 可降至 $100K
    y3RevenueImpactK: -287.5
    cashImpactK: -420.63
  - variable: churn
    downsideCase: 首个年度合同结束后，月流失率为 3.5%
    baseCase: 月流失率 2.0%
    upsideCase: 当这一切入点进入持续性身份运营后，月流失率降到 1.5%
    y3RevenueImpactK: -238.75
    cashImpactK: -171.65
  - variable: sales cycle
    downsideCase: 从项目启动到生产上线的周期拉长到 7-8 个月
    baseCase: 基础情景下低于 150 天 / 约 5 个月
    upsideCase: 一旦伙伴主导的上线项目接受安全审查工具包，周期缩短到 4 个月
    y3RevenueImpactK: -287.5
    cashImpactK: -341.78
  - variable: gross margin
    downsideCase: 部署持续偏服务化，期末毛利率只有 69%
    baseCase: 期末毛利率 73%
    upsideCase: 更多切换由模板驱动时，期末毛利率可到 74%
    y3RevenueImpactK: 0.0
    cashImpactK: -198.94
  - variable: hiring pace
    downsideCase: AE、伙伴和解决方案岗位晚两个季度到位，转化产能被封顶
    baseCase: 商业化招聘跟着 Y2-Y3 的验证点推进
    upsideCase: 如果伙伴渠道承担更多工作量，一个前线岗位可以推迟到 Y3 后段再招
    y3RevenueImpactK: -314.38
    cashImpactK: -180.71
modelDiagram:
  title: 单位经济模型流程
  mermaid: |
    flowchart LR
      TargetAccounts --> PaidCutovers
      Partners --> PaidCutovers
      PaidCutovers --> ProductionLogos
      ProductionLogos --> WorkflowExpansion
      WorkflowExpansion --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: 收入引擎
    finding: 基础情景收入来自 Q4Y3 时 22 个付费客户，以及 $215K 的退出 ARPU——上线切换逐步转成经常性订阅，再叠加第二工作流扩展。
  - checkName: 必须跑通的事
    finding: Y1 必须拿下前 5 个付费切换，并在大约 150 天内完成转化，这样 GTM 负责人才能在招聘更大前线团队前，把已验证的安全审查工具包规模化。
  - checkName: 模型失效点
    finding: 如果销售周期拖向 7-8 个月，或 ACV 卡在 $200K 左右，下行情景会在伙伴协同效率显现前把现金打到 0 以下。
  - checkName: 下一轮融资证明
    finding: 下一轮融资论证最扎实的时点，是公司在 Y2 结束时做到 10-12 个生产环境客户、完成 ServiceNow 支持上线、25% 的商机管道由伙伴带来，以及至少一半客户完成第二工作流扩展。
sanityChecks:
  ruleOf40: Y3 增长率 124% + EBITDA 利润率 -19% = 106%
  burnMultiple: Y2 烧钱倍数约 1.04x（-$1.29M EBITDA，对应 +$1.24M 收入），到 Y3 改善为约 0.33x（-$0.64M EBITDA，对应 +$1.90M 收入）。
  revenuePerFte: $286.62K 的 Y3 年末人均收入（SaaS 基准为 $200-400K）。
  flags:
    - 模型假设 Y1 能拿下 5 个付费切换，且至少有 2 个能足够快地完成转化，跑出创始人主导销售的验证点；若早期成交变慢，后续所有招聘和现金假设都会被连带打乱。
    - Q4Y3 时 ARPU 能到 $215K，前提是现有客户里能加挂多工作流扩展和持续性重新认证；如果客户长期停留在单一工作流，Y3 收入会明显下滑。
    - 毛利率只有在 30 天切换手册真的把部署保持在产品化轨道上时，才可能爬到 70% 出头；若出现私有化部署或客户自持密钥要求，业务会重新变成重服务模式。
    - 模型把现金近似为 EBITDA，没有纳入采购付款滞后、递延收入时点或融资延迟，因此现实中的回款节奏可能会比模型现金余额更早压缩现金跑道。
