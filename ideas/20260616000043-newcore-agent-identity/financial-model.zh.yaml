  round: seed
  amountM: 4.0
  runwayMonths: 24
  milestone: 在下一轮 Series A 之前，于 Y2 结束时做到 10-12 个生产环境客户、完成 ServiceNow 支持上线、至少 25% 的合格商机管道由伙伴带来，并让至少一半生产环境客户完成多工作流扩展。
