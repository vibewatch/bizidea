jobsToBeDone:
  - job: >-
      When a Copilot Studio or ServiceNow agent is about to move into
      production, help IAM leaders replace shared service accounts with named
      agent identities, so they can approve launch without blind credential
      risk.
    currentAlternative: Reusing bot accounts and filing manual access tickets
    successMetric: Days from security review start to production approval
  - job: >-
      When security needs to shut down or recertify an AI agent, help identity
      engineers see who owns the credential and revoke it cleanly, so they can
      contain risk without breaking unrelated automations.
    currentAlternative: Spreadsheet ownership tracking and ad hoc secret rotation
    successMetric: Mean time to revoke or recertify an agent identity
ideaScorecard:
  signalStrength:
    score: 5
    rationale: Three same-day reports, a $66 million seed round, and a live GA launch make the category signal unusually strong.
  painIntensity:
    score: 4
    rationale: Regulated enterprises can still delay launches, but once agents near production the shared-credential problem becomes acute for identity teams.
  wedgeClarity:
    score: 5
    rationale: Service-account cutover for Copilot Studio and ServiceNow launches is a narrow, investigable first product with a clear owner.
  defensibility:
    score: 4
    rationale: Cross-system dependency mapping, migration workflows, and revoke playbooks can compound into a hard-to-replace system of record.
  ventureScale:
    score: 5
    rationale: The beachhead naturally expands into full non-human identity lifecycle, federated trust, and runtime credential infrastructure for enterprise agents.
topRisks:
  - name: Incumbent absorption
    description: Microsoft, Okta, SailPoint, or NewCore could ship basic agent-identity cutover features and compress the wedge.
    mitigation: Win on cross-vendor migration depth, service-account dependency mapping, and rollout playbooks that native vendors do not coordinate.
  - name: Integration drag
    description: Identity environments are messy, so long implementations could kill early momentum.
    mitigation: Start with one opinionated stack—Entra or Okta plus SailPoint plus Copilot Studio or ServiceNow—and package a 30-day first cutover.
  - name: Premature market timing
    description: Buyers with only a handful of experimental agents may not feel enough pain to fund a new product yet.
    mitigation: Target regulated enterprises at the production-readiness or audit gate where launch delays already have an executive owner and visible cost.
