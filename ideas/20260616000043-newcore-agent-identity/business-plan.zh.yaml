slug: agent-identity-cutover-layer
date: "2026-06-16"
executiveSummary: >-
  Agent Identity Cutover Layer 应当从受监管内部 AI agents 的上线就绪管控层起步，而不是从替换身份提供商
  或通用 agent 安全平台入手。首批目标客户是北美的保险公司和区域性银行——这些机构正用 Entra ID、SailPoint
  和 Copilot Studio 部署内部 IT 或 HR 支持 agent，同时仍有数百个遗留服务账号握着长期高权限。购买触发点
  是生产就绪评审或审计例外项：在每个 agent 完成实名归属、权限收缩并拿到一条可回滚的凭证路径之前，上线申请
  就卡在那里。这个切口的吸引力在于：Microsoft 和 ServiceNow 正在快速扩大企业 agent 的落地表面积，而金融
  行业的访问控制要求让没有文档记录的共享账号越来越难辩护。产品应当从发现、负责人映射、按 agent 创建独立
  身份、分拆密钥或短期凭证包装、回滚演练和一键撤销起步，聚焦在一套经过取舍的技术栈上。建模市场真实存在，但
  空间有限——TAM 约 $45.5M、SAM 约 $21.6M、第 3 年可触达 SOM 约 $5.0M——VC 级别的回报取决于从首次
  上线的切换，延伸到持续性的非人身份生命周期管理和运行时凭证管控。最大的否定性风险在于：买家可能仍接受临时
  例外项，早期部署可能变成咨询服务型重活，以及 Microsoft、Okta 或 SailPoint 推出足够的迁移工作流来压缩
  切口空间。公开信息尚未量化共享服务账号究竟多频繁地成为上线拦截点，也没有量化私有化部署强制要求的普遍程度，
  因此前 6–9 个月必须验证预算紧迫性、30 天部署可行性和付费切换转化率。
problem:
  - 受监管企业把 Copilot Studio 或 ServiceNow agents 推向生产时，仍在用共享服务账号跑大量工作流——长期持权、负责人不清、认证路径也无从收拾。
  - 身份团队能分别审批人类访问评审和机器凭证，但缺少一套快速工作流，能把一次待上线的 agent 与其继承的凭证挂上钩、换成实名 agent 身份，并在不破坏旁边自动化流程的情况下证明撤销有效。
solution:
  - 发现一条内部 agent 工作流背后共享或长期存在的服务账号，把每个凭证映射到负责人和系统依赖上，再在现有 Entra、Okta 或 SailPoint 栈内生成一份切换计划，替换为按 agent 单独命名的一等身份主体。
  - 用分拆密钥或短期访问、回滚演练和一键撤销把迁移后的凭证路径包起来，让 IAM 团队能批准上线——不需要换掉现有的身份系统。
whyWeWin:
  - 这家公司卖的是棕地切换流程——现有厂商和发现工具今天都没有把它串起来：跨多个身份系统的负责人映射、回滚和针对本次上线的撤销。
  - 首次部署绑在一个实名生产关口和有预算的负责人上，比一开始就卖整套非人身份管控平台更快跑出验证。
  - 每完成一次切换，跨系统的服务账号、负责人、工作流和回滚结果图谱就更厚一层，单一平台厂商想在混合环境里复制这张图越来越难。
strategicChoices:
  beachhead: >-
    使用 Entra ID 加 SailPoint 的北美保险公司和区域性银行，正在为内部 IT 服务台或 HR 自助服务
    工作流上线 Copilot Studio agents，这些工作流需要接入工单、协作或员工系统。
  wedgeRationale: >-
    这个切入点比广泛的非人身份治理更快出验证：有一个真实的上线日期、一个具名的 IAM 审批人、有限的
    工作流边界，以及一套以 Microsoft 为核心的通用技术栈——共享服务账号在这里清晰可见，量化和修复都不难。
  sequencingRationale: >-
    先啃下一套经过取舍的 Entra 加 SailPoint 加 Copilot Studio 切换，靠创始人主导销售拿下付费上线，
    把安全评审加回滚运行手册打包好，再加入 ServiceNow 或 Okta 路径、合作伙伴渠道和周期性生命周期模块。
  notYet:
    - 完整的身份提供商或 IGA 替换
    - 面向客户或收入强依赖的 agent 工作流
    - 超出上线绑定 agent 项目范围的广泛非人身份发现
    - 在首套技术栈切换稳定之前，就做第三方 agent 联合信任和运行时凭证发放
market:
  tam: "$45.5M 估算 TAM，基于 207 家在范围内的美国保险公司和银行，按每年约 $220k 管控层 ACV 测算。"
  sam: "$21.6M 估算 SAM，基于约 120 家正在积极上线内部 agents 的滩头市场机构，按约 $180k ACV 测算。"
  som: "$5.0M 第 3 年建模 SOM，基于约 25 个生产客户，按约 $200k ACV，通过直销和合作伙伴主导上线实现。"
  segments:
    - 使用 Entra ID、SailPoint 和 Copilot Studio 部署内部支持 agent 的北美保险公司
    - 在 Entra 或 Okta 上部署内部 AI agents 的区域性和大型区域性银行，受同等审计和访问控制约束
  buyingProcess: >-
    运营负责人通常是 VP IAM 或身份工程总监，AI 平台或 ServiceNow 负责人是技术赞助方。预算和审批
    一般需要 CISO 或安全基础设施 VP 拍板，最顺畅的推进方式是把一次付费的上线就绪切换，绑在一个正在
    走生产评审的 agent 上。
product:
  mvp: >-
    MVP 应支持 Entra ID、SailPoint、Copilot Studio、一个企业密钥库，以及内部 IT 或 HR agents
    常用的一条工单或协作路径。必须能发现继承的服务账号、映射负责人和工作流依赖、创建按 agent 单独命名
    的身份、用分拆密钥或短期访问包装凭证，并提供回滚演练和一键撤销。
  sixMonth: >-
    在 Entra 加 SailPoint 加 Copilot Studio 技术栈上完成 2–3 次付费切换，交付负责人映射图谱、
    撤销演练报告，以及一份能在不做定制架构的情况下通过标准安全评审的管控包。
  twelveMonth: >-
    增加 ServiceNow 支持，把 30 天部署手册产品化，并为已完成切换的 agents 上线周期性认证和例外追踪功能。
  twentyFourMonth: >-
    从上线时的切换延伸到持续的 agent 认证、运行时凭证发放，以及在同一受监管客户账户内的第三方 agent
    联合信任。
  keyBets:
    - IAM 负责人会先为针对某次上线的切换项目付款，再考虑更宏观的非人身份转型。
    - 大多数首次内部 agent 上线，在技术栈和工作流结构上有足够共性，让部署可以产品化。
    - 对早期买家来说，回滚演练和撤销遥测数据比通用策略仪表板更重要。
    - 跨厂商中立性在足够多的竞争中能胜过原生厂商捆绑，支撑起独立管控层的价值。
gtm:
  wedge: >-
    以付费上线就绪切换切入：针对一次内部 IT 或 HR agent 上线，把工作流背后的共享服务账号替换为实名
    agent 身份，并建立经过测试的撤销路径，让 IAM 团队能批准上线。
  channels:
    - 创始人主导，向目标滩头客户的 VP IAM、身份工程总监和 CISO 团队主动触达
    - 已承接 agent 部署项目的 Microsoft 和 ServiceNow 实施合作伙伴
    - 帮助受监管买家通过上线审批的身份治理、安全与审计顾问
  funnelTargets: "目标账户接触→合格试点 15–25%，合格试点→付费切换 40%+，付费切换→生产订阅 60%+，中位启动→生产决策不超过 150 天。"
  pricing: >-
    以固定价格的付费切换包切入首次上线，再叠加按受管控的生产 agent 身份数量和接入身份域定价的年订阅——
    买家花的是打通一个具名上线关口的钱，之后再持续维持撤销、负责人归属和认证管控能力。初始定价假设为
    切换包 $50k–$75k，首个生产环境 ARR $150k–$220k。
businessModel:
  revenueStreams:
    - 受治理 agent 身份管控层的年订阅
    - 付费上线切换和迁移包
    - 周期性认证、撤销演练和运行时凭证发放的增值模块
  unitOfValue: 受治理管控的生产 agent 身份
  targetGrossMarginPct: 70
  expansionLevers:
    - 在同一客户内拓展更多内部 agent 工作流和业务单元
    - 支持 ServiceNow、Okta 等额外技术栈及第三方 agent 路径
    - 追加销售周期性认证、运行时凭证发放和联合信任管控
strategyMap:
  northStarMetric: 生产 agent 上线零共享凭证，且有记录的撤销在 15 分钟内完成
  inputMetrics:
    - 上线前已映射到具名负责人的继承服务账号比例
    - 从安全评审启动到生产批准的中位天数
    - 付费切换到生产订阅的转化率
    - 成功执行撤销或回滚演练的中位时长
    - 每位客户下受管控的生产 agent 身份数量
  moatsToBuild:
    - 跨系统的服务账号、负责人、工作流、权限和回滚依赖图谱
    - 按技术栈和工作流分类的可复用切换与撤销运行手册
    - 压缩采购周期的安全评审证据包和合作伙伴生态
    - 历史认证和回滚遥测数据——原生平台不会跨厂商汇聚这些数据
  killCriteria:
    - 前 25 个目标账户中，反映与共享服务账号相关的上线延迟或正式例外项的不足 5 家
    - 前 5 个共创客户中有 2 个以上初始切换超过 45 天
    - 前 6 个客户的付费切换到生产转化率跌破 50%
    - 超过 60% 的深度评估输给捆绑销售的 Microsoft、Okta 或 SailPoint 方案
  mermaid: |
    flowchart LR
      Wedge[Launch-time service-account cutover] --> MVP[Owner mapping plus per-agent identity MVP]
      MVP --> Proof[Faster approval and safer revoke for first production agents]
      Proof --> Expansion[Recurring agent lifecycle and broader NHI control plane]
investorMemo:
  verdict:
    call: 观望
    conviction: 切口清晰度高，但信心受限——需要上线评审证明预算紧迫性、30 天部署方案可复制，才能提升定论。
    whyBelieve: 这家创业公司切入的是真实存在的生产前管控空白——恰好在受监管买家需要审批的关键节点上，补的是现有身份系统，而不是取而代之。
    whyDoubt: 滩头市场偏窄，在位厂商挤压是大概率事件，公开信息也尚未揭示共享服务账号究竟多频繁地成为上线拦截点。
    nextDiligence: 在选定技术栈中确认 3 次付费切换，每次都能在约 120–150 天内把一个卡住的或带例外项的上线推进到生产。
  firstCustomer:
    title: 受监管金融企业的身份与访问管理副总裁
    profile: 北美保险公司或区域性银行，使用 Entra ID、SailPoint 和 Copilot Studio 部署内部 IT 或 HR agent，该 agent 需要接入工单、协作和员工系统。
    trigger: 生产就绪评审或审计例外项揭示，该 agent 仍继承着共享服务账号，既没有具名负责人，也没有干净的撤销路径。
    buyer: CISO 或安全基础设施副总裁
    initialContract: "一次上线的付费切换 $50k–$75k，首个生产环境纳入受管控状态后，转化为约 $150k–$220k ARR。"
  mustBeTrue:
    - 至少半数合格的滩头账户必须把共享服务账号清理视为上线拦截项，而不是上线后再做的项目。
    - 首套技术栈部署必须能在 30 天内为大多数早期客户完成初始工作流的清单、映射和切换。
    - 前 5 次付费切换中至少 3 次须转化为超过 $150k ARR 的年订阅。
    - 跨厂商切换方案必须在至少 40% 的竞标中正面胜过 Microsoft、Okta 或 SailPoint 的原生工作流。
    - 每个生产客户内的拓展，必须在 12 个月内延伸至第二条工作流或 3 个以上受管控的 agent 身份。
  diligenceQuestions:
    - 受监管买家实际上多频繁地因共享服务账号而停止或推迟内部 agent 上线？
    - 在接下来 25 个目标账户中，哪种首套技术栈组合最为普遍？
    - 在安全评审中，哪些部署架构异议反复出现——比如私有化部署、客户自持密钥或数据驻留管控？
    - 在正面竞标中，Microsoft、Okta 或 SailPoint 究竟缺少哪些具体功能，让这个切口能保持独立？
    - 第一年的价值分别有多少来自更快的审批、更低的审计风险和更强的撤销能力？
operatingAssumptions:
  - assumption: Entra 加 SailPoint 加 Copilot Studio 技术栈在滩头市场足够普遍，支撑单一首套技术栈产品的开发。
    basis: research.yaml
    validationTest: 梳理前 25 个目标账户，要求至少 10 家符合选定技术栈或高度相似的变体。
    decisionImpact: 若结论为否，产品路线图须在启动合作伙伴主导动作之前，先调整集成优先级。
  - assumption: 买家会先为付费的上线就绪切换出钱，再考虑购买更广泛的非人身份项目。
    basis: research.yaml
    validationTest: 签下 3 份付费切换或试点意向书，均须有明确的预算负责人和生产评审用例。
    decisionImpact: 若结论为否，公司应转向合作伙伴主导的评估，或在在位平台内嵌入分发。
  - assumption: 服务账号发现、负责人映射和回滚演练能在 30 天内对初始工作流完成。
    basis: idea.yaml
    validationTest: 前 5 次部署中有 4 次在 30 天内完成，且每次所需的客户定制连接器规则不超过 2 条。
    decisionImpact: 若结论为否，切口会变得过度依赖服务交付，须在扩大烧钱之前收窄 ICP 或范围。
  - assumption: 跨厂商中立性足够重要，能在相当比例的竞标中胜过 Microsoft、Okta 或 SailPoint 的原生捆绑。
    basis: research.yaml
    validationTest: 追踪前 10 次竞争性评估，要求至少 4 次胜出在位厂商主导的方案。
    decisionImpact: 若结论为否，公司应转向更深度的合作、嵌入转售或面向被收购的定位，而非独立扩张。
  - assumption: 大多数早期买家不会要求私有化部署或客户自持密钥管控才愿意启动试点。
    basis: research.yaml
    validationTest: 前 5 份安全调查问卷中，把私有化部署或客户自持密钥列为试点前提的潜客不超过 1 家。
    decisionImpact: 若结论为否，资本需求、实施周期和销售周期都会增加到足以改变融资计划和路线图的程度。
experimentRoadmap:
  - horizon: "0–90 天"
    experiment: 目标账户技术栈与触发点访谈
    hypothesis: 滩头市场中的 VP IAM 和身份工程团队，能说出一个真实的上线关口、一套通用技术栈，以及首次内部 agent 上线的预算负责人。
    successMetric: 完成 15 次有效访谈，其中 10 次符合 ICP，8 次有 12 个月内正在进行的上线或评审周期。
    owner: 创始人/CEO
  - horizon: "0–90 天"
    experiment: 管家式服务账号清单梳理
    hypothesis: 首次内部 agent 上线通常会继承 10 个以上有风险的服务账号，以及至少一个值得在上线前修复的未记录依赖。
    successMetric: 3 个共创客户各自在目标工作流中暴露出 10 个以上继承凭证和至少 1 个此前未知的依赖。
    owner: 创始工程师
  - horizon: "90–180 天"
    experiment: 付费切换方案验证
    hypothesis: 买家会在签年度平台合同之前，为固定范围的上线切换付款。
    successMetric: 3 份已签署的付费切换范围协议，价格在目标区间内，且有明确转化条款。
    owner: 创始人/CEO
  - horizon: "90–180 天"
    experiment: 安全评审工具包验证
    hypothesis: 打包好的管控叙事加上实时回滚和撤销演示，能显著提升审批通过率。
    successMetric: 3 个潜客在不要求定制控制架构的情况下通过安全评审。
    owner: 解决方案架构师
  - horizon: "6–12 个月"
    experiment: 30 天切换产品化
    hypothesis: 首套技术栈工作流能充分标准化，实现可复制的上线交付，不陷入定制项目蔓延。
    successMetric: 前 5 次部署中有 4 次在 30 天内上线，且每次客户定制规则不超过 2 条。
    owner: 身份集成工程师
  - horizon: "12–18 个月"
    experiment: 合作伙伴引流上线模式
    hypothesis: Microsoft 或身份实施合作伙伴能主动引入合格付费切换机会，转化率不低于创始人主导的单子。
    successMetric: 25% 的合格商机来自 2 个活跃合作伙伴，合作伙伴引流的付费切换转化至生产的比例在 50% 以上。
    owner: GTM 负责人
operations:
  - 维护一张带版本的依赖图谱，串联每个 agent、服务账号、负责人、权限、密钥库密钥和下游系统。
  - 保存发现、审批、切换、回滚和撤销事件的不可篡改日志，支持审计和检查人员查阅。
  - 在新增集成之前，先为首套支持的技术栈标准化管控包、最小权限连接器模板和回滚运行手册。
  - 每季度为客户执行撤销演练和切换后认证评审，保持管控证据的时效性。
team:
  - role: 创始人/CEO
    startTiming: 第 0 个月
    rationale: 主导买方发现、创始人主导销售、定价和上线评审叙事，直到打法稳定地持续转化。
  - role: 创始工程师
    startTiming: 第 0 个月
    rationale: 搭建依赖图谱、切换编排、撤销流程和首批安全评审演示。
  - role: 身份集成工程师
    startTiming: 第 1 个月
    rationale: 把 Entra、SailPoint、Copilot Studio、密钥库和下游系统连接器产品化，让部署不再依赖一次性脚本。
  - role: 解决方案架构师
    startTiming: 第 3 个月
    rationale: 把早期部署转化为可复用的管控包、回滚运行手册和客户上线规范，压缩安全评审时间。
  - role: 第二位平台工程师
    startTiming: 第 6 个月
    rationale: 通过强化切换工作流、遥测和周期性认证功能，减少实施瓶颈。
  - role: GTM 负责人
    startTiming: 第 10 个月
    rationale: 只有在付费切换、定价和部署节奏显示出可复制的打法之后，再扩充商机开拓能力。
milestones:
  - horizon: "0–12 个月"
    items:
      - 在 Entra 加 SailPoint 加 Copilot Studio 滩头市场签下 3–5 次付费切换。
      - 完成首次 30 天切换，含经过测试的回滚和一键撤销。
      - 将至少 2 次付费切换转化为超过 $150k ARR 的生产订阅。
      - 交付安全评审工具包和合作伙伴就绪部署检查清单。
  - horizon: "12–24 个月"
    items:
      - 在保险公司和区域性银行中拿下 10–12 个生产客户。
      - 增加 ServiceNow 支持，上线周期性 agent 认证。
      - 至少 25% 的合格商机来自 Microsoft 或身份实施合作伙伴。
      - 在至少半数生产客户内证明多工作流拓展。
  - horizon: "24–36 个月"
    items:
      - 达到约 25 个生产客户或与建模 SOM 相符的等效 ARR。
      - 面向现有客户延伸至运行时凭证发放和第三方 agent 联合信任。
      - 根据留存率和胜率，决定是深耕受监管市场管控平台，还是拓宽为更广泛的非人身份平台。
risks:
  - risk: Microsoft、Okta、SailPoint 或 NewCore 补入足够的迁移工作流，抹掉独立切口的空间。
    likelihood: Medium
    impact: High
    mitigation: 聚焦跨厂商服务账号依赖映射、更快的 30 天切换和回滚证据——这些是原生厂商在混合技术栈中难以协调完成的。
  - risk: 早期部署因身份环境混乱、下游依赖记录不全而沦为服务型重活。
    likelihood: High
    impact: High
    mitigation: 把首个产品限定在一套经过取舍的技术栈上，执行固定范围的付费切换，并把上线时长和定制规则数量设为硬性门槛。
  - risk: 买家仍接受临时上线例外项，推迟了为新管控层买单的紧迫性。
    likelihood: Medium
    impact: High
    mitigation: 只瞄准有正在进行的生产评审、审计发现或具名访问控制例外项的账户，并尽早淘汰探索性试点。
  - risk: 顶级保险公司和银行比路线图预期更早要求私有化部署或客户自持密钥。
    likelihood: Medium
    impact: Medium
    mitigation: 从前五个潜客的安全调查问卷中提炼模式，在大规模 GTM 招聘之前，预先定义客户自管密钥或隔离部署路线图。
fundingAsk:
  round: seed
  targetFundingRangeUsd: "$4–6M"
  runwayMonths: 18
  useOfFundsSummary: >-
    资助一支 5–6 人团队，产品化首套技术栈的切换工作流，拿下 3–5 次付费上线，增加第二条工作流路径，
    构建安全评审工具包，并在扩大销售规模之前建立合作伙伴引流商机。
