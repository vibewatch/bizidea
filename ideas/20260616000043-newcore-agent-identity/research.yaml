competitors:
- name: NewCore
  stage: seed
  wedge: Security-first workforce identity platform treating AI agents as first-class identities with split-key-style controls and lifecycle governance.
  pricing: No public pricing disclosed
  strength: Category-native architecture and strong launch narrative around agent identity.
  weaknessVsUs: Broader identity-platform story can feel like a new system of record, whereas the proposed startup is a thinner brownfield cutover layer.
  sourceRefs:
  - 1
  - 2
  - 3
- name: Astrix Security
  stage: scale-up
  wedge: Discovery, inventory, and governance for AI agents, MCP servers, and non-human identities.
  pricing: No public pricing disclosed
  strength: Strong visibility into shadow agents and risky permissions across SaaS and AI surfaces.
  weaknessVsUs: Discovery-first posture is adjacent, but not the same as orchestrating service-account migration, owner mapping, and rollback before launch.
  sourceRefs:
  - 25
- name: Aembit
  stage: scale-up
  wedge: Secretless workload and agentic-AI access broker using policy-based authorization and federated identity.
  pricing: Starter free; Teams from $20/workload/mo and $20/agent/mo; enterprise custom
  strength: Concrete short-lived access model and public usage-based pricing.
  weaknessVsUs: Access brokering is valuable, but it does not by itself create the business-owner, recertification, and launch-approval workflow the beachhead buyer needs.
  sourceRefs:
  - 23
  - 24
- name: SailPoint
  stage: incumbent
  wedge: Unified governance for human, non-human, and agent identities with certifications, ownership, and policy controls.
  pricing: No public pricing disclosed
  strength: Trusted IGA buyer relationship and natural fit for access reviews and accountability workflows.
  weaknessVsUs: Strong governance layer, but likely heavier to deploy for one agent launch than a focused cutover product.
  sourceRefs:
  - 20
  - 21
  - 22
- name: CyberArk
  stage: incumbent
  wedge: Machine identity security across secrets, certificates, workload identities, and SSH keys.
  pricing: No public pricing disclosed
  strength: Deep credibility in machine identity and privileged access.
  weaknessVsUs: Better at protecting credentials broadly than at orchestrating a cross-vendor service-account-to-agent cutover tied to one internal launch.
  sourceRefs:
  - 27
  - 28
