reportMemo:
  executiveTakeaways:
  - The sharpest wedge is not a replacement identity provider but a brownfield cutover workflow that lets IAM teams approve one risky agent launch without ripping out Entra, Okta, or SailPoint.
  - 'Buyer urgency is tied to production-readiness reviews: once an agent needs access to HR, ticketing, or collaboration systems, shared service accounts become much harder to defend.'
  - Competition is already crowded across agent-identity startups, NHI vendors, and incumbents, so the startup must own rollback, owner mapping, and service-account dependency context.
  - The beachhead appears real but constrained, which makes expansion into broader non-human identity lifecycle and runtime credential issuance important for long-term scale.
  - Microsoft and ServiceNow are creating more enterprise agent surface area faster than regulated buyers can retrofit access controls, making a pre-production cutover layer strategically timely.
  marketDefinition: Software that discovers shared or standing service accounts behind enterprise AI agents, maps them to owners and workflows, and orchestrates conversion to per-agent identities with fast revoke and rollback inside the existing identity stack.
  customerAndBuyer: Primary users are VP IAM or director-level identity engineering teams at insurers and regional banks preparing Copilot Studio or ServiceNow agents for production. The economic buyer is usually the CISO or VP of security infrastructure, with AI platform leads and ServiceNow owners as technical sponsors.
  buyingTriggers:
  - point: A Copilot Studio or ServiceNow production-readiness review forces decisions on authentication, DLP, auditability, and connector scope before an agent can touch real systems.
    sourceRefs:
    - 4
    - 5
    - 6
    - 7
    - 10
    - 11
    - 12
  - point: An identity-sprawl or AI-governance review exposes that non-human identities and new agents are still being managed like generic service accounts with weak ownership and lifecycle controls.
    sourceRefs:
    - 22
    - 28
    - 29
  - point: Financial-sector access and AI-risk programs demand named accountability, MFA-equivalent controls, and documented oversight before a privileged internal agent goes live.
    sourceRefs:
    - 32
    - 33
    - 37
    - 38
  willingnessToPay:
    summary: Willingness to pay is credible because buyers already pay separately for identity, agent runtime, and workload access. Copilot Studio uses credit-based licensing, Okta imposes workforce identity minimums, and Aembit prices workloads and agents directly, so a cutover layer can anchor on launch-readiness and audit-risk reduction rather than on speculative innovation spend.
    sourceRefs:
    - 9
    - 16
    - 17
    - 24
  competitiveLandscape: The field splits into ground-up agent-identity platforms, NHI discovery and governance vendors, workload identity brokers, and incumbent IGA/PAM suites. The whitespace is a brownfield cutover workflow that translates a risky shared service account into a named, revocable agent identity without turning the project into an identity-stack replacement.
  incumbentThesis:
  - incumbentClass: Cloud and agent platforms
    point: Microsoft and ServiceNow can add strong controls inside their own surfaces, but they do not automatically become the cross-stack brownfield cutover workflow for service-account cleanup, owner mapping, and rollback.
    sourceRefs:
    - 4
    - 10
    - 11
    - 14
  - incumbentClass: Workforce and NHI IAM suites
    point: Okta can protect and govern non-human identities, but the startup still has room if it becomes the launch-specific workflow that converts shared credentials into named agent identities before production.
    sourceRefs:
    - 18
    - 19
  - incumbentClass: IGA platforms
    point: SailPoint is naturally strong in certifications, ownership, and policy enforcement, but a one-project cutover and rollback motion is more operationally focused than classic IGA programs.
    sourceRefs:
    - 20
    - 21
    - 22
  - incumbentClass: Machine and workload identity vendors
    point: Aembit, Astrix, Oasis, and CyberArk secure credentials, discovery, or secretless access, yet the wedge remains the migration workflow that turns a shared service account into an owner-mapped per-agent identity across multiple systems.
    sourceRefs:
    - 23
    - 24
    - 25
    - 26
    - 27
  regulatoryLandscape: Regulators are not yet writing agent-identity-specific rules, but financial-sector buyers already inherit authentication, least-privilege, MFA, and AI-risk-management obligations that make undocumented shared accounts difficult to defend.
  technologyLandscape: The primitives already exist—Copilot Studio governance controls, ServiceNow AI agents, Entra workload identities, Defender non-human identity inventory, and open standards guidance—but the workflow that ties them together around launch-time cutover and rollback is still missing.
  distributionChannels:
