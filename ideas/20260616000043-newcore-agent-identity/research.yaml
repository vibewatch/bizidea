openQuestions:
- How often do target buyers actually stop a launch because of shared service accounts, versus accepting a temporary exception and remediating later?
- Will Microsoft, Okta, or SailPoint ship enough migration and rollback workflow to compress the standalone wedge within the next 12-18 months?
- How many inherited service accounts typically sit behind the first Copilot Studio or ServiceNow launch in insurers versus regional banks?
- Is private deployment or customer-held key control a hard requirement for the highest-value insurers and banks, or only for a smaller subset?
