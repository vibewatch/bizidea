scenarios:
  downside:
    description: Some buyers accept temporary launch exceptions, incumbent bundles win more reviews, and deployments stay more services-heavy than planned.
    y3RevenueK: 2494.63
    y3EbitdaK: -1419.63
    cashLowPointK: -48.87
    keyAssumptionChanges:
      - Net new paid logos slow to 5 in Y2 and 7 in Y3, ending at 17 logos by Q4Y3.
      - Blended annual ARPU exits near $195K because most customers stay single-workflow and delay recertification or credential-issuance add-ons.
      - Gross margin exits near 68% because the cutover still requires more bespoke approval and rollback work per deployment.
  base:
    description: Founder-led cutovers turn into a repeatable partner-assisted motion, and second-workflow expansion lifts ACV without forcing an oversized field team.
    y3RevenueK: 3439.38
    y3EbitdaK: -637.21
    cashLowPointK: 929.17
    keyAssumptionChanges:
      - Net new paid logos total 7 in Y2 and 10 in Y3, ending at 22 paying logos by Q4Y3.
      - Blended annual ARPU steps from $180K in Q1Y2 to $215K in Q4Y3 as more cutovers convert and about half of production customers add a second workflow or recertification module.
      - Gross margin climbs from 47%-57% in Y1 to 73% by Q4Y3 as the 30-day cutover playbook and security-review kit reduce bespoke services.
  upside:
    description: Microsoft and identity partners source warmer launch opportunities, and multi-workflow expansion shows up inside the first regulated accounts earlier than expected.
    y3RevenueK: 3960.0
    y3EbitdaK: -229.61
    cashLowPointK: 1355.42
    keyAssumptionChanges:
      - Net new paid logos reach 8 in Y2 and 9 in Y3, ending at 24 logos by Q4Y3.
      - Blended annual ARPU reaches roughly $225K by Q4Y3 because second-workflow expansion and recurring recertification attach sooner.
      - Gross margin reaches 74% as the Entra/SailPoint/Copilot cutover becomes template-led and partner-supported.
