modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      TargetAccounts --> PaidCutovers
      Partners --> PaidCutovers
      PaidCutovers --> ProductionLogos
      ProductionLogos --> WorkflowExpansion
      WorkflowExpansion --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: Revenue engine
    finding: Base-case revenue comes from 22 paying logos by Q4Y3 and an exit ARPU of $215K as launch cutovers convert into recurring subscriptions plus second-workflow expansion.
  - checkName: Must go right
    finding: The first five paid cutovers must land in Y1 and convert in roughly 150 days so the GTM lead can scale a proven security-review kit before a larger field team is hired.
  - checkName: Model breaks if
    finding: If sales cycles drift toward 7-8 months or ACV stalls near $200K, the downside case pushes cash below zero before partner-assisted efficiency shows up.
  - checkName: Next-round proof
    finding: The next financing case is strongest once the company exits Y2 with 10-12 production logos, ServiceNow support, 25% partner-sourced pipeline, and second-workflow expansion in at least half of customers.
sanityChecks:
  ruleOf40: Y3 growth 124% + EBITDA margin -19% = 106%
  burnMultiple: Y2 burn multiple ~1.04x (-$1.29M EBITDA on +$1.24M revenue), improving to ~0.33x in Y3 (-$0.64M EBITDA on +$1.90M revenue).
  revenuePerFte: $286.62K Y3 revenue per year-end FTE (benchmark $200-400K SaaS).
  flags:
    - The model assumes five paid cutovers land in Y1 and that at least two convert quickly enough to establish the founder-led proof point; slower early closes would ripple through every later hiring and cash assumption.
    - ARPU reaching $215K by Q4Y3 depends on multi-workflow expansion and recurring recertification attaching inside existing accounts; if customers remain single-workflow, Y3 revenue falls materially.
    - Gross margin only reaches the low-70s if the 30-day cutover playbook really keeps deployments productized; private-deployment or customer-held-key demands would make the business more services-heavy.
    - Cash is modeled as EBITDA with no procurement-payment lag, deferred revenue timing, or financing delay, so real-world collections could tighten runway versus the modeled cash balance.
