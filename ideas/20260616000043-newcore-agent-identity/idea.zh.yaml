jobsToBeDone:
  - job: >-
      当 Copilot Studio 或 ServiceNow 智能体准备进生产环境时，帮助 IAM 负责人把共享服务账号换成具名的智能体身份，这样他们就能在看不见的凭证风险之外，也敢批准上线。
    currentAlternative: 继续复用机器人账号，再人工提访问工单
    successMetric: 从安全评审启动到生产批准的天数
  - job: >-
      当安全团队需要关停或重新认证一个 AI 智能体时，帮助身份工程师看清凭证归谁、并把它干净地撤掉，这样他们就能把风险压住，又不至于误伤无关自动化。
    currentAlternative: 用表格追责任人，再临时轮换密钥
    successMetric: 撤销或重新认证一个智能体身份的平均耗时
ideaScorecard:
  signalStrength:
    score: 5
    rationale: 三篇同日报道、$66M 种子轮，以及已经 GA 的正式发布，让这个品类的信号强得不太像早期市场。
  painIntensity:
    score: 4
    rationale: 受监管企业仍然可以推迟上线；但一旦智能体逼近生产环境，共享凭证问题就会立刻卡住身份团队。
  wedgeClarity:
    score: 5
    rationale: 围绕 Copilot Studio 和 ServiceNow 上线做服务账号切换，是个够窄、也够能被验证的首个产品，而且责任人很清楚。
  defensibility:
    score: 4
    rationale: 跨系统依赖映射、迁移工作流和撤销运行手册能慢慢滚成一套很难替换的系统级底账。
  ventureScale:
    score: 5
    rationale: 这个滩头市场很自然就能往更完整的非人身份生命周期、联合信任和企业智能体运行时凭证基础设施扩。
topRisks:
  - name: 现有厂商吃掉切口
    description: Microsoft、Okta、SailPoint 或 NewCore 只要补齐基础的智能体身份切换功能，这个切口就会被迅速压扁。
    mitigation: 靠跨厂商迁移深度、服务账号依赖映射和上线运行手册取胜——原生厂商很难把这些能力协调到一起。
  - name: 集成拖慢落地
    description: 身份环境本来就乱，实施一旦拖太久，早期势能就会被磨没。
    mitigation: 先死磕一套有明确边界的技术栈——Entra 或 Okta，加 SailPoint，再加 Copilot Studio 或 ServiceNow——把首个 30 天切换包打出来。
  - name: 市场时点偏早
    description: 只跑了少量实验性智能体的买家，可能还感受不到足够疼，自然也不愿意现在就为新产品掏钱。
    mitigation: 只盯那些已经走到生产就绪评审或审计关口的受监管企业——在那里，上线延迟已经有明确负责人，也有看得见的成本。
