problem: >-
  大多数企业把 AI 智能体引进来后，给它们配的仍然是“升级版服务账号”：共享凭证、长期权限、没有稳定归属人。等智能体数量奔向人类身份的
  100x–200x，身份团队根本不可能再靠手工梳理——到底哪个工作流在用哪些权限、什么时候该重新认证、出了问题又怎么在不打断自动化的前提下撤掉。
  现有 IAM、IGA 和 PAM 栈理解的是员工和泛化的非人账号，不是那些能被快速复制、又需要独立生命周期和紧急熔断开关的 AI 智能体。
targetUser:
  primary: 正在把 Copilot Studio 或 ServiceNow 智能体推向生产环境的北美保险公司或区域性银行中的身份与访问管理 VP，或身份工程总监
  secondary: 负责员工支持自动化的 AI 平台负责人或 ServiceNow 平台负责人
  buyer: CISO 或安全基础设施 VP
startupThesis:
  nonObviousInsight: >-
    企业不会为了上 AI 智能体，就把 Entra、Okta 或 SailPoint 整套拆掉。真正能赢的切口，是在买家已经信任的身份栈里，把脆弱的共享服务账号翻译成具名、可撤销、责任人清晰的智能体身份。
  beachhead: >-
    使用 Entra ID 或 Okta、SailPoint，手里有 200+ 个常驻服务账号，并已在积极上线 Copilot Studio 或 ServiceNow 员工支持智能体的北美保险公司和区域性银行
  wedge: >-
    一条切换工作流：先盘点新智能体背后的常驻服务账号，再把每个账号映射到负责人和工作流，创建按智能体独立分配的身份，给凭证套上分拆密钥审批，并交付一键撤销和回滚
  whyNowCatalyst: >-
    NewCore 正式 GA 上线，并警告企业未来可能需要管理比人类身份多 100x–200x 的智能体身份，这让共享凭证清理现在就成了生产前的拦路虎。
  ventureScalePath: >-
    先从受监管的员工支持智能体切入，再扩到持续性的智能体再认证、第三方智能体联合信任、运行时凭证发放，以及覆盖所有企业自动化的更广义非人身份控制平面。
solution: >-
  产品接入 Entra ID、Okta、SailPoint、ServiceNow、Copilot Studio 和企业密钥库，先找出新智能体即将继承哪些共享或常驻凭证。系统会给出一份切换方案：创建唯一的智能体身份、落实业务责任人、把权限收缩到单一工作流，并用分拆密钥或短期凭证路径替换长期密钥。身份团队会看到一个迁移看板：哪些智能体还骑在遗留服务账号上，哪些切换被卡住了，哪些身份可以安全撤销而不会带崩别的自动化。第一笔部署要赢，就得把一个原本要拖几个月的身份清理项目，压缩成一次可审批、可上线的具体智能体发布。
goToMarketSeed:
  firstCustomer: >-
    一家北美前 50 大保险公司或区域性银行，正准备把 Copilot Studio 或 ServiceNow 智能体用于内部 IT 或 HR 请求，而数百个遗留服务账号仍握着常驻权限
  buyingTrigger: >-
    在 AI 智能体拿到工单、HR 或协作系统访问权之前，企业先触发一次生产就绪评审、内部审计，或安全例外处理流程
  currentAlternative: 手工提 Entra 或 Okta 服务账号工单、在 SailPoint 里拉表、复用机器人凭证，再配一堆紧急停用脚本
  switchingReason: >-
    这个切口会把每条高风险工作流改造成具名的智能体身份，补上责任人、TTL、分拆密钥凭证路径和一键撤销能力，让 IAM 团队不必重建整套身份栈，也能批准上线。
  pricingHypothesis: >-
    年订阅按已迁移的智能体身份数量和接入的身份域收费，首轮上线另收付费切换包。
