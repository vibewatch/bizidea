slug: agent-identity-cutover-layer
date: "2026-06-16"
executiveSummary: >-
  Agent Identity Cutover Layer should start as a launch-readiness control layer
  for regulated internal AI agents, not as a replacement identity provider or
  general agent-security platform. The first customer is a North American
  insurer or regional bank using Entra ID, SailPoint, and Copilot Studio for an
  internal IT or HR support agent while hundreds of legacy service accounts
  still hold standing privileges. The buying trigger is a
  production-readiness review or audit exception that blocks go-live until each
  agent has named ownership, scoped permissions, and a reversible credential
  path. The wedge is attractive because Microsoft and ServiceNow are expanding
  enterprise agent deployment surfaces while financial-sector access controls
  make undocumented shared accounts hard to defend. The product should begin
  with discovery, owner mapping, per-agent identity creation, split-key or
  short-lived credential wrappers, rollback simulation, and one-click revoke on
  a single opinionated stack. The modeled market is meaningful but narrow at
  about $45.5M TAM, $21.6M SAM, and $5.0M reachable year-3 SOM, so venture
  upside depends on expanding from first-launch cutover into recurring
  non-human identity lifecycle and runtime credential controls. The biggest
  disconfirming risks are that buyers may still tolerate temporary exceptions,
  that first deployments become services-heavy, and that Microsoft, Okta, or
  SailPoint ship enough migration workflow to compress the wedge. Public inputs
  do not quantify how often shared service accounts truly stop launch decisions
  or how often private deployment is mandatory, so the first 6-9 months must
  prove budget urgency, 30-day deployment feasibility, and paid-cutover
  conversion.
problem:
  - Regulated enterprises moving Copilot Studio or ServiceNow agents toward production still provision many workflows through shared service accounts with standing privileges, weak ownership, and no clean recertification path.
  - Identity teams can approve human access reviews and machine credentials separately, but they lack a fast workflow to map one pending agent launch to its inherited credentials, replace them with named agent identities, and prove revoke without breaking adjacent automations.
solution:
  - Discover the shared or standing service accounts behind one internal agent workflow, map each credential to an owner and system dependency, and generate a cutover plan to a named per-agent identity inside the existing Entra, Okta, or SailPoint stack.
  - Wrap the migrated credential path with split-key or short-lived access, rollback simulation, and one-click revoke so IAM can approve launch without replacing its incumbent identity systems.
whyWeWin:
  - The company sells the brownfield cutover motion that incumbents and discovery tools do not coordinate today—owner mapping, rollback, and launch-specific revoke across multiple identity systems.
  - The first deployment is tied to a named production gate with a budget owner, which is a faster proof point than trying to sell a full non-human identity control plane upfront.
  - Each cutover compounds a cross-system graph of service accounts, owners, workflows, and rollback outcomes that becomes harder for a single platform vendor to replicate across mixed environments.
strategicChoices:
  beachhead: >-
    North American insurers and regional banks using Entra ID plus SailPoint
    and launching Copilot Studio agents for internal IT help desk or HR
    self-service workflows that need access to ticketing, collaboration, or
    employee systems.
  wedgeRationale: >-
    This entry point creates faster proof than broad non-human identity
    governance because it has a live launch date, a named IAM reviewer, a
    limited workflow surface, and a common Microsoft-centric stack where shared
    service accounts are visible enough to quantify and fix.
  sequencingRationale: >-
    Start with one opinionated Entra plus SailPoint plus Copilot Studio cutover,
    win founder-led paid launches, and package the security review plus
    rollback runbook before adding ServiceNow or Okta paths, partner channels,
    and recurring lifecycle modules.
  notYet:
    - Full identity provider or IGA replacement
    - Customer-facing or revenue-critical agent workflows
    - Broad non-human identity discovery outside launch-bound agent projects
    - Third-party agent federation and runtime credential issuance before the first-stack cutover is repeatable
market:
  tam: "$45.5M estimated TAM based on 207 U.S. insurers and banks in scope at roughly $220k annual control-layer ACV."
  sam: "$21.6M estimated SAM based on about 120 beachhead institutions actively launching internal agents at roughly $180k ACV."
  som: "$5.0M modeled year-3 SOM based on about 25 production logos at roughly $200k ACV through direct and partner-led launches."
  segments:
    - North American insurers using Entra ID, SailPoint, and Copilot Studio for internal support agents
    - Regional banks and super-regional banks launching internal AI agents over Entra or Okta with similar audit and access controls
  buyingProcess: >-
    The operational champion is usually the VP IAM or director of identity
    engineering, with an AI platform or ServiceNow owner as the technical
    sponsor. Budget and approval normally require the CISO or VP of security
    infrastructure, and the cleanest motion is a paid launch-readiness cutover
    attached to one agent going through production review.
product:
  mvp: >-
    MVP should support Entra ID, SailPoint, Copilot Studio, one enterprise
    vault, and one ticketing or collaboration path used by internal IT or HR
    agents. It must discover inherited service accounts, map owner and workflow
    dependencies, create a named per-agent identity, wrap credentials with
    split-key or short-lived access, and provide rollback simulation plus
    one-click revoke.
  sixMonth: >-
    Complete 2-3 paid cutovers on the Entra plus SailPoint plus Copilot Studio
    stack, ship the owner-mapping graph, revoke-drill reporting, and a control
    packet that clears standard security review without bespoke architecture.
  twelveMonth: >-
    Add ServiceNow support, productize a 30-day deployment playbook, and launch
    recurring recertification plus exception tracking for agents that have
    already been cut over.
  twentyFourMonth: >-
    Expand from launch-time cutover into ongoing agent recertification,
    runtime credential issuance, and third-party agent federation inside the
    same regulated accounts.
  keyBets:
    - IAM leaders will fund a launch-specific cutover before they fund a broader non-human identity transformation.
    - Most first internal agent launches share enough stack and workflow structure to keep deployment productizable.
    - Rollback drills and revoke telemetry matter more to early buyers than generic policy dashboards.
    - Cross-vendor neutrality will beat native vendor bundles often enough to justify a standalone control layer.
gtm:
  wedge: >-
    Sell a paid launch-readiness cutover for one internal IT or HR agent
    rollout, replacing the shared service accounts behind that workflow with
    named agent identities and a tested revoke path so the IAM team can approve
    go-live.
  channels:
    - Founder-led outbound to VP IAM, director identity engineering, and CISO staff in the top beachhead accounts
    - Microsoft and ServiceNow implementation partners already responsible for agent deployment projects
    - Identity-governance, security, and audit advisors who help regulated buyers clear launch approval
  funnelTargets: "Target-account intro→qualified pilot 15-25%, qualified pilot→paid cutover 40%+, paid cutover→production subscription 60%+, and median kickoff→production decision under 150 days."
  pricing: >-
    Start with a fixed paid cutover package for the first launch plus an annual
    subscription priced by production agent identities under control and
    connected identity domains, because the buyer is paying to clear a named
    launch gate and then keep revoke, ownership, and recertification controls
    live. Initial assumption is $50k-$75k for the cutover and $150k-$220k ARR
    for the first production environment.
businessModel:
  revenueStreams:
    - Annual subscription for the governed agent identity control layer
    - Paid launch cutover and migration packages
    - Premium modules for recurring recertification, revoke drills, and runtime credential issuance
  unitOfValue: Production agent identity under governed control
  targetGrossMarginPct: 70
  expansionLevers:
    - Add more internal agent workflows and business units within the same customer
    - Support additional stacks such as ServiceNow, Okta, and third-party agent paths
    - Upsell recurring recertification, runtime credential issuance, and federated trust controls
strategyMap:
  northStarMetric: Production agent launches approved with zero shared credentials and a documented revoke completed in under 15 minutes
  inputMetrics:
    - Percentage of inherited service accounts mapped to named owners before launch
    - Median days from security review start to production approval
    - Paid cutover to production conversion rate
    - Median time to execute a successful revoke or rollback drill
    - Number of production agent identities under management per customer
  moatsToBuild:
    - Cross-system graph of service accounts, owners, workflows, entitlements, and rollback dependencies
    - Repeatable cutover and revoke playbooks by stack and workflow
    - Security-review evidence pack and partner ecosystem that shorten procurement
    - Historical recertification and rollback telemetry that native platforms do not aggregate across vendors
  killCriteria:
    - Fewer than 5 of the first 25 target accounts report launch delays or formal exceptions tied to shared service accounts
    - More than 2 of the first 5 design partners require over 45 days to complete the initial cutover
    - Paid cutover to production conversion falls below 50% across the first 6 customers
    - More than 60% of late-stage evaluations are lost to bundled Microsoft, Okta, or SailPoint alternatives
  mermaid: |
    flowchart LR
      Wedge[Launch-time service-account cutover] --> MVP[Owner mapping plus per-agent identity MVP]
      MVP --> Proof[Faster approval and safer revoke for first production agents]
      Proof --> Expansion[Recurring agent lifecycle and broader NHI control plane]
investorMemo:
  verdict:
    call: Watch
    conviction: High wedge clarity, but conviction stays limited until launch reviews prove budget urgency and 30-day deployments are repeatable.
    whyBelieve: The startup addresses a real pre-production control gap at the moment regulated buyers need approval and complements rather than replaces the identity systems they already trust.
    whyDoubt: The beachhead is narrow, incumbent compression is likely, and public input does not yet show how often shared service accounts truly stop launches.
    nextDiligence: Confirm 3 paid cutovers in the chosen stack, each converting a blocked or exception-laden launch into production within roughly 120-150 days.
  firstCustomer:
    title: VP Identity and Access Management at a regulated financial enterprise
    profile: A North American insurer or regional bank using Entra ID, SailPoint, and Copilot Studio for an internal IT or HR agent that needs access to ticketing, collaboration, and employee systems.
    trigger: A production-readiness review or audit exception reveals that the agent still inherits shared service accounts with no named owner or clean revoke path.
    buyer: CISO or VP of Security Infrastructure
    initialContract: "$50k-$75k paid cutover for one launch, converting to roughly $150k-$220k ARR once the first production environment stays under managed control."
  mustBeTrue:
    - At least half of qualified beachhead accounts must treat shared service-account cleanup as a launch blocker, not a post-launch project.
    - The first-stack deployment must inventory, map, and cut over the initial workflow in 30 days or less for most early customers.
    - At least 3 of the first 5 paid cutovers must convert to annual subscriptions above $150k ARR.
    - Cross-vendor cutover must win head-to-head against native Microsoft, Okta, or SailPoint workflow in at least 40% of evaluated deals.
    - Expansion inside each production logo must reach a second workflow or 3 or more managed agent identities within 12 months.
  diligenceQuestions:
    - How often do regulated buyers actually stop or delay an internal agent launch because of shared service accounts?
    - Which exact first-stack combination appears most often in the next 25 target accounts?
    - What deployment architecture objections recur in security review, such as private deployment, customer-held keys, or data-residency controls?
    - In head-to-head evaluations, what precise functionality is missing from Microsoft, Okta, or SailPoint that keeps the wedge independent?
    - What share of first-year value comes from faster approval, lower audit risk, and better revoke capability respectively?
operatingAssumptions:
  - assumption: The Entra plus SailPoint plus Copilot Studio stack is common enough in the beachhead to justify a single first-stack product.
    basis: research.yaml
    validationTest: Map the first 25 target accounts and require at least 10 to fit the chosen stack or a very close variant.
    decisionImpact: If false, the roadmap must reprioritize integrations before building a partner-led motion.
  - assumption: Buyers will fund a paid launch-readiness cutover before they buy a broader non-human identity program.
    basis: research.yaml
    validationTest: Close 3 paid cutovers or pilot LOIs with an explicit budget owner and a production-review use case.
    decisionImpact: If false, the company should shift toward partner-led assessments or embedded distribution inside incumbent platforms.
  - assumption: Service-account discovery, owner mapping, and rollback simulation can be completed in 30 days for the initial workflow.
    basis: idea.yaml
    validationTest: Complete 4 of the first 5 deployments within 30 days while requiring no more than 2 customer-specific connector rules each.
    decisionImpact: If false, the wedge becomes too services-heavy and the ICP or scope must narrow before scaling burn.
  - assumption: Cross-vendor neutrality matters enough to beat native Microsoft, Okta, or SailPoint bundles in a meaningful share of deals.
    basis: research.yaml
    validationTest: Track the first 10 competitive evaluations and require at least 4 wins against incumbent-led alternatives.
    decisionImpact: If false, the company should pursue deeper partnership, embedded resale, or acquisition-oriented positioning instead of standalone expansion.
  - assumption: Most early buyers will not require private deployment or customer-held key control to start a pilot.
    basis: research.yaml
    validationTest: In the first 5 security questionnaires, no more than 1 prospect makes private deployment or customer-held keys a pilot prerequisite.
    decisionImpact: If false, capital needs, implementation time, and sales cycles increase enough to change the funding plan and roadmap.
experimentRoadmap:
  - horizon: "0–90 days"
    experiment: Target-account stack and trigger interviews
    hypothesis: VP IAM and identity-engineering teams in the beachhead can name a live launch gate, a common stack, and a budget owner for the first internal agent rollout.
    successMetric: 15 qualified interviews completed, 10 matching the ICP, and 8 with an active launch or review cycle inside 12 months.
    owner: Founder CEO
  - horizon: "0–90 days"
    experiment: Concierge service-account inventory
    hypothesis: The first internal agent launches typically inherit 10 or more risky service accounts and at least one undocumented dependency worth fixing before go-live.
    successMetric: 3 design partners each reveal 10 or more inherited credentials and at least 1 previously unknown dependency in the target workflow.
    owner: Founding eng
  - horizon: "90–180 days"
    experiment: Paid cutover offer test
    hypothesis: Buyers will pay for a fixed-scope launch cutover before committing to an annual platform contract.
    successMetric: 3 signed paid cutover scopes at the target price range with explicit conversion terms.
    owner: Founder CEO
  - horizon: "90–180 days"
    experiment: Security-review kit validation
    hypothesis: A packaged control narrative plus live rollback and revoke demos materially improves approval rates.
    successMetric: 3 prospects complete security review without demanding a bespoke control architecture.
    owner: Solutions architect
  - horizon: "6–12 months"
    experiment: 30-day cutover productization
    hypothesis: The first-stack workflow can be standardized enough to deliver repeatable go-lives without custom project sprawl.
    successMetric: 4 of the first 5 deployments go live within 30 days and require at most 2 customer-specific rules each.
    owner: Identity integrations engineer
  - horizon: "12–18 months"
    experiment: Partner-sourced launch motion
    hypothesis: Microsoft or identity implementation partners can originate qualified paid cutovers without lower conversion than founder-led deals.
    successMetric: 25% of qualified pipeline comes from 2 active partners and partner-sourced paid cutovers convert to production at 50% or better.
    owner: GTM lead
operations:
  - Maintain a versioned dependency graph linking each agent, service account, owner, entitlement, vault secret, and downstream system.
  - Preserve immutable logs for discovery, approval, cutover, rollback, and revoke events to support audit and examiner review.
  - Standardize control packets, least-privilege connector templates, and rollback runbooks for the first supported stack before adding new integrations.
  - Run customer revoke drills and post-cutover recertification reviews each quarter so the control evidence stays current.
team:
  - role: Founder CEO
    startTiming: Month 0
    rationale: Own buyer discovery, founder-led sales, pricing, and the launch-review narrative until the motion consistently converts.
  - role: Founding eng
    startTiming: Month 0
    rationale: Build the dependency graph, cutover orchestration, revoke flow, and first security-review demos.
  - role: Identity integrations engineer
    startTiming: Month 1
    rationale: Productize Entra, SailPoint, Copilot Studio, vault, and downstream system connectors so deployments stop depending on one-off scripts.
  - role: Solutions architect
    startTiming: Month 3
    rationale: Turn early deployments into repeatable control packets, rollback runbooks, and customer onboarding practices that shorten security review.
  - role: Second platform engineer
    startTiming: Month 6
    rationale: Reduce implementation bottlenecks by hardening cutover workflows, telemetry, and recurring recertification features.
  - role: GTM lead
    startTiming: Month 10
    rationale: Add pipeline capacity only after paid cutovers, pricing, and deployment timing show a repeatable motion.
milestones:
  - horizon: "0–12 months"
    items:
      - Sign 3-5 paid cutovers in the Entra plus SailPoint plus Copilot Studio beachhead.
      - Complete the first 30-day cutover with tested rollback and one-click revoke.
      - Convert at least 2 paid cutovers into production subscriptions above $150k ARR.
      - Ship a security-review kit and partner-ready deployment checklist.
  - horizon: "12–24 months"
    items:
      - Reach 10-12 production logos across insurers and regional banks.
      - Add ServiceNow support and launch recurring agent recertification.
      - Generate at least 25% of qualified pipeline from Microsoft or identity implementation partners.
      - Prove multi-workflow expansion inside at least half of production customers.
  - horizon: "24–36 months"
    items:
      - Reach roughly 25 production logos or equivalent ARR consistent with the modeled SOM.
      - Expand into runtime credential issuance and third-party agent federation for existing customers.
      - Decide whether to deepen as a regulated-market control plane or broaden into a wider non-human identity platform based on retention and win rates.
risks:
  - risk: Microsoft, Okta, SailPoint, or NewCore add enough migration workflow to erase the standalone wedge.
    likelihood: Medium
    impact: High
    mitigation: Focus on cross-vendor service-account dependency mapping, faster 30-day cutovers, and rollback evidence that native vendors are less likely to coordinate across mixed stacks.
  - risk: Early deployments become too services-heavy because identity environments are messy and downstream dependencies are poorly documented.
    likelihood: High
    impact: High
    mitigation: Keep the first product limited to one opinionated stack, enforce fixed-scope paid cutovers, and instrument onboarding time and custom-rule count as hard gates.
  - risk: Buyers still accept temporary launch exceptions, which delays budget urgency for a new control layer.
    likelihood: Medium
    impact: High
    mitigation: Target only accounts with live production reviews, audit findings, or named access-control exceptions and disqualify exploratory pilots early.
  - risk: Top-tier insurers and banks require private deployment or customer-held keys sooner than the roadmap assumes.
    likelihood: Medium
    impact: Medium
    mitigation: Capture security-questionnaire patterns from the first five prospects and predefine a customer-managed key or isolated deployment roadmap before broad GTM hiring.
fundingAsk:
  round: seed
  targetFundingRangeUsd: "$4–6M"
  runwayMonths: 18
  useOfFundsSummary: >-
    Fund a five- to six-person team to productize the first-stack cutover
    workflow, win 3-5 paid launches, add a second workflow path, build the
    security-review kit, and establish partner-sourced pipeline before scaling
    sales.
