slug: protective-style-salon-os
date: '2026-06-24'
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-07
  unit: YYYY-MM
  source: '[BP date 2026-06-24] 模型从商业计划日期的次月开始。'
- id: A2
  name: 融资轮开盘现金
  value: $2.1M
  unit: USD
  source: '[BP fundingAsk round pre-seed, targetFundingRangeUsd $2-4M, runwayMonths 18] 采用声明范围内的精简 pre-seed 关账金额。'
- id: A3
  name: 起始付费沙龙数
  value: '0'
  unit: count
  source: '[BP executiveSummary + milestones] 公司从零营收起步，须先将共创客户转化为付费入驻。'
- id: A4
  name: 第 1 年每家在营付费沙龙月均混合收入
  value: $0.9K
  unit: USD/salon/month
  source: '[BP investorMemo.firstCustomer initialContract $2k-$5k onboarding plus $4k-$7k annual software] 将入驻权重偏高的第一年收入标准化为月均数值。'
- id: A5
  name: 第 2 年每家在营付费沙龙月均混合收入
  value: $1.0K
  unit: USD/salon/month
  source: '[BP gtm.pricing + BP businessModel revenueStreams] 假设持续订阅加早期培训/融资附加在产能提升验证后逐步提升。'
- id: A6
  name: 第 3 年每家在营付费沙龙月均混合收入
  value: $1.2K
  unit: USD/salon/month
  source: '[BP businessModel expansionLevers + Research reportMemo.partnershipEcosystem/dataMoats] 假设更多账户到第 3 年附加融资、认证或第二台设备工作流。'
- id: A7
  name: 净在营沙龙增长节奏
  value: M1-M12 EOP salons 0,0,1,1,2,2,3,3,4,4,5,6; Q1Y2 10; Q2Y2 16; Q3Y2 23; Q4Y2 30; Q1Y3 42; Q2Y3 56; Q3Y3 70; Q4Y3 90
  unit: paying salons
  source: '[BP milestones 3 paid onboardings and 2 recurring salons in 12 months; 20-30 live salons in 12-24 months; Research distributionChannels and partnershipEcosystem] 以合作伙伴驱动的第 3 年加速斜率延伸里程碑目标，仍低于研究所得的 200 家年 3 SOM。'
- id: A8
  name: 计费惯例
  value: 新付费沙龙在入驻开始后的月初附近开始计费
  unit: 建模惯例
  source: '[startup-finance heuristic] 营收等于付费沙龙数乘以当期 ARPU，不额外建立同期群表格。'
- id: A9
  name: 毛利率爬坡
  value: 45% Y1, 60% Y2, 69% Y3 average; 70% steady-state unit economics
  unit: pct of revenue
  source: '[BP businessModel.targetGrossMarginPct 70 + BP strategicChoices sequencingRationale + Research technologyLandscape] 毛利率从服务密集型起步，随入驻流程复用而趋近计划目标。'
- id: A10
  name: 月度客户流失率
  value: 1.5%
  unit: pct/month
  source: '[startup-finance heuristic + BP risks] 保守的 SMB 垂直软件流失率，直到工作流层证明持久价值。'
- id: A11
  name: 创始人 / CEO 含载成本薪酬
  value: $96K
  unit: USD/year
  source: '[startup-finance heuristic + BP team Founder CEO] 适合 pre-seed 亚特兰大/休斯顿/DMV 运营计划的精简创始人现金薪酬。'
- id: A12
  name: 工程师含载成本薪酬
  value: $144K
  unit: USD/year
  source: '[BP team Founding eng + startup-finance heuristic] 假设一位强综合型工程师，薪资低于顶级沿海城市水准。'
- id: A13
  name: 工作流落地负责人含载成本薪酬
  value: $84K
  unit: USD/year
  source: '[BP team Workflow implementation lead] 专注配方梳理和入驻可复制性的现场落地岗位。'
- id: A14
  name: 培训/客户成功负责人含载成本薪酬
  value: $78K
  unit: USD/year
  source: '[BP team Training and customer success lead] 沙龙工作流培训的精简客户赋能薪酬。'
- id: A15
  name: 合作伙伴/销售负责人含载成本薪酬
  value: $108K
  unit: USD/year
  source: '[BP team Partnerships lead + BP gtm.channels] 假设本地合作伙伴拓展/创始人协助销售角色，而非企业级客户经理。'
- id: A16
  name: 运营/合规负责人含载成本薪酬
  value: $72K
  unit: USD/year
  source: '[BP operations + Research regulatoryLandscape] 覆盖入驻清单、合规和后台的精简运营支持薪酬。'
- id: A17
  name: 招聘时间线
  value: M1 founder and founding engineer; M3 workflow implementation; M6 training/customer success; M9 partnerships; M16 second engineer; M19 second training/CS; M22 ops/compliance
  unit: timeline
  source: '[BP team + BP strategicChoices sequencingRationale] 遵循既定的落地优先、验证后再扩渠道的招聘顺序。'
- id: A18
  name: 非薪酬销售与营销支出
  value: $3K/mo in early Y1, $5K/mo in late Y1 and Y2, $6K/mo in Y3
  unit: USD/month
  source: '[BP gtm.channels + startup-finance heuristic] 假设创始人主导的本地销售、沙龙拜访、合作伙伴赋能和少量活动支出，而非付费全国需求获取。'
- id: A19
  name: 非薪酬研发支出
  value: $4K/mo in Y1, $5K/mo in Y2-Y3
  unit: USD/month
  source: '[BP product + BP operations] 覆盖云服务、设备工作流工具、日志和集成维护。'
- id: A20
  name: 非薪酬行政管理支出
  value: $3K/mo in Y1, $4K/mo in Y2-Y3
  unit: USD/month
  source: '[BP operations + Research regulatoryLandscape] 覆盖法务、会计、保险和合规管理费用。'
- id: A21
  name: 薪酬分配至损益各行
  value: Founder 70% S&M / 30% G&A; workflow implementation 60% S&M / 40% R&D; training/CS 70% S&M / 30% R&D; engineering 100% R&D; partnerships 100% S&M; ops 100% G&A
  unit: allocation
  source: '[BP team role rationales + BP operations] 将团队计划映射至损益表所用的运营科目。'
- id: A22
  name: 现金换算惯例
  value: Cash movement equals EBITDA
  unit: 建模惯例
  source: '[startup-finance heuristic] 假设此阶段无重大资本支出、债务偿还、税款或营运资金波动。'
- id: A23
  name: CAC 惯例
  value: $9.2K = Y2-Y3 sales and marketing spend divided by 84 net new live salons
  unit: USD/new salon
  source: '[BP gtm founder-led + partner-led motion + model calc] 以第一年验证期后的销售与营销全载入支出除以净新增在营沙龙数计算 CAC。'
- id: A24
  name: 融资申请规模
  value: $2.1M pre-seed
  unit: USD
  source: '[BP fundingAsk targetFundingRangeUsd + BP milestones + model cash trough] 规模设定为在年 3 中期实现约 50 家在营沙龙和合作伙伴来源验证，同时在声明范围内保留缓冲。'
