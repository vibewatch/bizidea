  downsideCase: 试点转正转化延迟一个额外季度
  baseCase: 当前 12–24 个月里程碑节奏
  upsideCase: 合作伙伴来源成交提前一个季度
  y3RevenueImpactK: -180.0
  cashImpactK: -150.0
