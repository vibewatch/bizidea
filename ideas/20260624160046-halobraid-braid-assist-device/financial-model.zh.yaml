  y3RevenueImpactK: -30.0
  cashImpactK: -140.0
modelDiagram:
  title: 单位经济模型流转图
  mermaid: |
    flowchart LR
      DeviceTrigger[First device evaluation] --> PaidPilot[Paid onboarding]
      PaidPilot --> LiveSalon[Live salon workflow]
      LiveSalon --> Attach[Training / financing attach]
      Attach --> Revenue[Revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash runway]
modelSanity:
- checkName: 营收引擎
  finding: 基准情景的营收来自净在营沙龙从第 1 年末 6 家增长至第 3 年末 90 家，同时通过附加产品将每家沙龙月均混合收入提升至约 $1.2K。
- checkName: 必须跑通的假设
  finding: 合作伙伴和创始人主导的获客须将 CAC 维持在约 $9K 附近，同时将足够多的设备触发试点转化，以在第 2 年末达到 20–30 家在营沙龙。
- checkName: 模型失效条件
  finding: 若附加收入停留在大众沙龙软件预算区间，或渠道转介绍滞后，悲观情景将在第 3 年结束前现金告负——除非放慢招聘节奏。
- checkName: 下一轮融资证明条件
  finding: 下一轮融资的依据是约 50 家在营沙龙加上可重复的接单量基准，证明工作流层能够突破定制化入驻工作实现规模化。
sanityChecks:
  ruleOf40: 第 3 年增速 304% + EBITDA 利润率 -46% = 258%（因第 2 年营收基数较小而虚高）。
  burnMultiple: 第 3 年烧钱倍数约 0.6x，用 |EBITDA| 除以第 3 年相对第 2 年的净新增营收计算。
  revenuePerFte: $107.0K 第 3 年末每名全职员工营收（明显低于典型的 SaaS $200–$400K 基准）。
  flags:
  - 模型仍需要在核心 $300–$600 月度工作流订阅之外实现有意义的融资/培训附加收入，才能接近 $0.8M 的第 3 年营收年化运行率。
  - 第 3 年人均营收仍低于典型风险 SaaS 效率基准，印证了商业计划中关于纯软件切口是有限滩头市场的警示。
  - 悲观假设会在模型时间范围结束前将现金推至零以下，若合作伙伴转化未达计划，管理团队需要放慢招聘或收窄地域覆盖。
  - 年 3 基准情景中 90 家沙龙依赖早期本地密度以及 OEM 或贷款方转介绍在大型现有沙龙平台做出反应前生效。
