scenarios:
  downside:
    description: OEM 渠道转介绍滑坡，月均混合收入趋近大众沙龙软件预算下限，毛利率改善比预期更慢。
    y3RevenueK: 558.0
    y3EbitdaK: -620.0
    cashLowPointK: -120.0
    keyAssumptionChanges:
    - 第 4 季度第 3 年在营沙龙数约为 60 家，而非 90 家。
    - 第 3 年每家沙龙月均混合收入维持在约 $1.0K，而非提升至 $1.2K。
    - 第 3 年平均毛利率因入驻持续高触达而维持在约 63%。
  base:
    description: 创始人主导的试点转化为稳定的本地合作伙伴动作，附加收入随设备普及提升，招聘保持精简。
    y3RevenueK: 855.6
    y3EbitdaK: -393.6
    cashLowPointK: 483.5
    keyAssumptionChanges:
    - 第 4 季度第 3 年在营沙龙达到 90 家，仍低于研究所得的发布地区 200 家 SOM。
    - 通过融资、培训和多设备附加，第 3 年每家在营沙龙月均混合收入升至约 $1.2K。
    - 毛利率到第 3 年趋近但未完全超越 70% 目标。
  upside:
    description: 合作伙伴转介绍提前生效，更多沙龙新增第二台设备或认证消费，服务流程比计划更快实现可复制。
    y3RevenueK: 1086.0
    y3EbitdaK: -290.0
    cashLowPointK: 520.0
    keyAssumptionChanges:
    - 第 4 季度第 3 年在营沙龙达到约 120 家。
    - 通过更强的附加收入和多门店成交，第 3 年每家沙龙月均混合收入达到约 $1.3K。
    - 随着入驻打法标准化，第 3 年平均毛利率改善至约 72%。
