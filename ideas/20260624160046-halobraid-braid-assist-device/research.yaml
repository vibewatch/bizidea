  "regulatoryLandscape": "The category sits inside a patchwork of state braiding rules and facility oversight. Texas explicitly does not regulate natural braiding as cosmetology, Maryland statute distinguishes braiding from chemical or cutting services, DC emphasizes personal-grooming facility rules and inspections, and Virginia shows historical rule churn through repealed hair-braiding regulations [27], [28], [30], [31], [33]."
  "technologyLandscape": "The technology stack is still early-stage: HaloBraid positions itself as a salon-assist device that starts by hand and finishes with the machine, while Harvard coverage points to 450 prototype iterations rather than mass deployment. That creates room for a neutral workflow layer before device norms harden [1], [3], [4]."
