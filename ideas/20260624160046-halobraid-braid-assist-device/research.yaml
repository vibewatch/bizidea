  "competitiveLandscape": "The practical competition is the incumbent stack: affordable all-in-one tools such as Vagaro and Square, marketplace-led systems such as Fresha and Booksy, and premium team operators such as Boulevard, Mangomint, and Zenoti. None markets around braid recipe capture or device handoffs today, but they already own booking, payments, reports, marketplace demand, or capital budgets [51], [60], [71], [77], [84], [99]."
