scenarios:
  downside:
    description: OEM referrals slip, blended monthly revenue stalls nearer commodity software budgets, and gross margin improves more slowly.
    y3RevenueK: 558.0
    y3EbitdaK: -620.0
    cashLowPointK: -120.0
    keyAssumptionChanges:
    - Q4Y3 live salons finish near 60 instead of 90.
    - Y3 blended monthly revenue per salon stays at about $1.0K instead of $1.2K.
    - Average Y3 gross margin stays near 63% because implementation remains high-touch.
  base:
    description: Founder-led pilots convert into a steady local partner motion, attach revenue rises with device adoption, and hiring stays lean.
    y3RevenueK: 855.6
    y3EbitdaK: -393.6
    cashLowPointK: 483.5
    keyAssumptionChanges:
    - Q4Y3 live salons reach 90 while staying below the researched 200-salon SOM in launch regions.
    - Blended revenue per live salon rises to about $1.2K per month by Y3 through financing, training, and multi-device attach.
    - Gross margin approaches but does not fully exceed the 70% target by year 3.
  upside:
    description: Partner referrals work early, more salons add second-device or certification spend, and services become repeatable faster than planned.
    y3RevenueK: 1086.0
    y3EbitdaK: -290.0
    cashLowPointK: 520.0
    keyAssumptionChanges:
    - Q4Y3 live salons reach roughly 120.
    - Y3 blended monthly revenue per salon reaches about $1.3K through stronger attach and multi-location wins.
    - Average Y3 gross margin improves to roughly 72% as onboarding playbooks standardize.
