modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      DeviceTrigger[First device evaluation] --> PaidPilot[Paid onboarding]
      PaidPilot --> LiveSalon[Live salon workflow]
      LiveSalon --> Attach[Training / financing attach]
      Attach --> Revenue[Revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash runway]
modelSanity:
- checkName: Revenue engine
  finding: Base-case revenue comes from growing net live salons from 6 at Y1 end to 90 at Y3 end while lifting blended monthly revenue per salon to about $1.2K through attach products.
- checkName: Must go right
  finding: Partner and founder-led acquisition must keep CAC near $9K while converting enough device-triggered pilots to hit 20-30 live salons by the end of Y2.
- checkName: Model breaks if
  finding: If attach revenue stays closer to commodity salon-software budgets or referrals lag, the downside case turns cash negative before Y3 ends unless hiring slows.
- checkName: Next-round proof
  finding: The next round is justified once roughly 50 live salons and repeatable throughput benchmarks show the workflow layer can scale beyond bespoke onboarding work.
sanityChecks:
  ruleOf40: Y3 growth 304% + EBITDA margin -46% = 258% (inflated by a small Y2 revenue base).
  burnMultiple: Y3 burn multiple about 0.6x using |EBITDA| divided by Y3 net new revenue versus Y2.
  revenuePerFte: $107.0K Y3 revenue per end-of-year FTE (well below a typical $200-400K SaaS benchmark).
  flags:
  - The model still needs meaningful financing / training attach beyond the core $300-600 monthly workflow subscription to approach a $0.8M Y3 revenue run rate.
  - Y3 revenue per FTE remains below typical venture SaaS efficiency, which reinforces the business-plan warning that the software-only wedge is a modest beachhead.
  - Downside assumptions push cash below zero before the model horizon ends, so management would need to slow hiring or narrow geography if partner conversion misses plan.
  - A 90-salon Y3 base case depends on early local density and OEM or lender referrals working before larger incumbent salon platforms react.
