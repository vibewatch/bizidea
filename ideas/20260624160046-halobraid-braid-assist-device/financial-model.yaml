assumptions:
- id: A1
  name: Model start month
  value: 2026-07
  unit: YYYY-MM
  source: '[BP date 2026-06-24] model starts the month after the business-plan date.'
- id: A2
  name: Opening cash from round
  value: $2.1M
  unit: USD
  source: '[BP fundingAsk round pre-seed, targetFundingRangeUsd $2-4M, runwayMonths 18] uses a lean pre-seed close inside the stated range.'
- id: A3
  name: Starting paying salons
  value: '0'
  unit: count
  source: '[BP executiveSummary + milestones] the company begins pre-revenue and must first convert design partners into paid onboardings.'
- id: A4
  name: Y1 blended monthly revenue per active paying salon
  value: $0.9K
  unit: USD/salon/month
  source: '[BP investorMemo.firstCustomer initialContract $2k-$5k onboarding plus $4k-$7k annual software] normalizes onboarding-heavy first-year revenue into a blended monthly figure.'
- id: A5
  name: Y2 blended monthly revenue per active paying salon
  value: $1.0K
  unit: USD/salon/month
  source: '[BP gtm.pricing + BP businessModel revenueStreams] assumes recurring software plus early training/financing attach after proof of capacity lift.'
- id: A6
  name: Y3 blended monthly revenue per active paying salon
  value: $1.2K
  unit: USD/salon/month
  source: '[BP businessModel expansionLevers + Research reportMemo.partnershipEcosystem/dataMoats] assumes more accounts attach financing, certification, or second-device workflows by year 3.'
- id: A7
  name: Net live-salon ramp
  value: M1-M12 EOP salons 0,0,1,1,2,2,3,3,4,4,5,6; Q1Y2 10; Q2Y2 16; Q3Y2 23; Q4Y2 30; Q1Y3 42; Q2Y3 56; Q3Y3 70; Q4Y3 90
  unit: paying salons
  source: '[BP milestones 3 paid onboardings and 2 recurring salons in 12 months; 20-30 live salons in 12-24 months; Research distributionChannels and partnershipEcosystem] extends the stated milestones with a partner-led Y3 ramp that still stays below the researched 200-salon year-3 SOM.'
- id: A8
  name: Billing convention
  value: New paying salons are modeled as billing near month start once onboarding begins
  unit: modeling convention
  source: '[startup-finance heuristic] keeps revenue equal to paying-salon count times the period ARPU without adding cohort tables.'
- id: A9
  name: Gross margin ramp
  value: 45% Y1, 60% Y2, 69% Y3 average; 70% steady-state unit economics
  unit: pct of revenue
  source: '[BP businessModel.targetGrossMarginPct 70 + BP strategicChoices sequencingRationale + Research technologyLandscape] margin starts services-heavy and approaches the plan target as onboarding repeats.'
- id: A10
  name: Monthly logo churn
  value: 1.5%
  unit: pct/month
  source: '[startup-finance heuristic + BP risks] conservative SMB vertical-software churn until the workflow layer proves durable value.'
- id: A11
  name: Founder / CEO loaded compensation
  value: $96K
  unit: USD/year
  source: '[startup-finance heuristic + BP team Founder CEO] lean founder cash comp appropriate for a pre-seed Atlanta/Houston/DMV operating plan.'
- id: A12
  name: Engineering loaded compensation
  value: $144K
  unit: USD/year
  source: '[BP team Founding eng + startup-finance heuristic] assumes a strong generalist engineer outside top-tier coastal salary bands.'
- id: A13
  name: Workflow implementation loaded compensation
  value: $84K
  unit: USD/year
  source: '[BP team Workflow implementation lead] field-implementation hire focused on recipe mapping and onboarding repeatability.'
- id: A14
  name: Training / customer success loaded compensation
  value: $78K
  unit: USD/year
  source: '[BP team Training and customer success lead] lean customer enablement salary for salon workflow training.'
- id: A15
  name: Partnerships / sales loaded compensation
  value: $108K
  unit: USD/year
  source: '[BP team Partnerships lead + BP gtm.channels] assumes a local partner-development / founder-assist seller rather than an enterprise AE.'
- id: A16
  name: Operations / compliance loaded compensation
  value: $72K
  unit: USD/year
  source: '[BP operations + Research regulatoryLandscape] lean ops support for onboarding checklists, compliance, and back office.'
- id: A17
  name: Hiring timeline
  value: M1 founder and founding engineer; M3 workflow implementation; M6 training/customer success; M9 partnerships; M16 second engineer; M19 second training/CS; M22 ops/compliance
  unit: timeline
  source: '[BP team + BP strategicChoices sequencingRationale] follows the stated implementation-first, proof-then-channel sequence.'
- id: A18
  name: Non-payroll sales and marketing spend
  value: $3K/mo in early Y1, $5K/mo in late Y1 and Y2, $6K/mo in Y3
  unit: USD/month
  source: '[BP gtm.channels + startup-finance heuristic] assumes local founder-led selling, salon visits, partner enablement, and light event spend rather than paid national demand gen.'
- id: A19
  name: Non-payroll R&D spend
  value: $4K/mo in Y1, $5K/mo in Y2-Y3
  unit: USD/month
  source: '[BP product + BP operations] covers cloud, device-workflow tooling, logging, and integration maintenance.'
- id: A20
  name: Non-payroll G&A spend
  value: $3K/mo in Y1, $4K/mo in Y2-Y3
  unit: USD/month
  source: '[BP operations + Research regulatoryLandscape] covers legal, accounting, insurance, and compliance overhead.'
- id: A21
  name: Payroll allocation to P&L lines
  value: Founder 70% S&M / 30% G&A; workflow implementation 60% S&M / 40% R&D; training/CS 70% S&M / 30% R&D; engineering 100% R&D; partnerships 100% S&M; ops 100% G&A
  unit: allocation
  source: '[BP team role rationales + BP operations] maps the team plan into the operating lines used in the P&L.'
- id: A22
  name: Cash conversion convention
  value: Cash movement equals EBITDA
  unit: modeling convention
  source: '[startup-finance heuristic] assumes no material capex, debt service, taxes, or working-capital swings at this stage.'
- id: A23
  name: CAC convention
  value: $9.2K = Y2-Y3 sales and marketing spend divided by 84 net new live salons
  unit: USD/new salon
  source: '[BP gtm founder-led + partner-led motion + model calc] treats CAC as fully loaded sales-and-marketing spend after the first year of proof.'
- id: A24
  name: Funding ask sizing
  value: $2.1M pre-seed
  unit: USD
  source: '[BP fundingAsk targetFundingRangeUsd + BP milestones + model cash trough] sized to reach roughly 50 live salons and partner-sourced proof by mid-Y3 while retaining buffer inside the stated range.'
