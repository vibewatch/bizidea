topRisks:
  - name: Hardware adoption stalls
    description: "If braid-assist devices prove too expensive, unreliable, or culturally resisted by stylists, the software layer may arrive before the market is ready."
    mitigation: "Start with pilot salons and financing-light software modules, partner closely with early device distributors, and price the product around measurable throughput rather than speculative automation."
  - name: Workflow variability is higher than expected
    description: "Protective styles vary by hair type, stylist technique, and client preference, so a standardized operating layer could fail if service recipes cannot capture enough nuance."
    mitigation: "Focus first on knotless and box-braid workflows already named in the sources, let salons author their own style recipes, and treat the product as configurable ops software instead of rigid protocol enforcement."
  - name: Incumbent salon platforms bundle the feature
    description: "Generic salon software vendors or device makers could add scheduling and analytics once the category proves attractive."
    mitigation: "Move faster into financing, training certification, and cross-salon throughput benchmarking — assets that require category-specific operational data and trust, not just another scheduling module."
