differentiator: >-
  Generic salon software helps take bookings; it does not tell an owner how to
  turn braid automation into margin. This startup sits at the new operational
  choke point created by assistive devices: service decomposition, training,
  staffing, quality preservation, and equipment payback. If it becomes the
  system that stores braid recipes, throughput benchmarks, and financing history
  across braid-heavy salons, it can own the most valuable dataset in the
  category before device makers or generic salon platforms understand the
  workflow deeply enough to react.
