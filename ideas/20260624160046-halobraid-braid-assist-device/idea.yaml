problem: >-
  High-volume braid salons still run their most profitable service like bespoke
  craft labor: one senior stylist spends four to six hours on a single knotless
  or box-braid appointment, trains apprentices by shadowing, and absorbs the
  ergonomic damage personally. That limits daily chair utilization, makes it hard
  to standardize quality across staff, and turns growth into a hiring bottleneck
  because a salon owner cannot simply add another expert braider on demand. Once
  braid-assist devices enter salons, the new pain becomes operational: owners
  need a way to finance the equipment, redesign the service flow, and preserve a
  signature braid style across multiple chairs.
targetUser:
  primary: "Owner-operators of U.S. protective-style salons specializing in knotless and box braids, with 4-15 braiders and 20 or more long-form braid appointments per week"
  secondary: "Lead educators and floor managers inside multi-chair braid salons or braiding academies"
  buyer: "Salon owner or lead master braider who controls staffing, pricing, and equipment purchases"
startupThesis:
  nonObviousInsight: >-
    The breakout company around braid automation may not be the device maker. It
    may be the workflow layer that turns a master braider's technique into a
    repeatable multi-chair operating system, so salons can expand capacity
    without flattening style quality or burning out the few experts they already
    have.
  beachhead: >-
    U.S. protective-style salons in Atlanta, Houston, and the DMV with 4-15
    braiders, heavy knotless and box-braid mix, recurring 4-6 hour appointments,
    and a waitlist or turned-away demand during peak weekends
  wedge: >-
    A salon ops platform that captures each salon's braid service recipes,
    schedules hand-start plus device-finish handoffs, trains junior braiders on
    guided workflows, and underwrites device financing against added appointment
    capacity
  whyNowCatalyst: >-
    Halo's launch makes braid automation concrete for salons in late 2026, so
    the first budget is likely to go to products that help owners actually turn
    5x-faster finishing into more bookable appointments, safer staffing, and
    consistent quality.
  ventureScalePath: >-
    Start as the operating layer for braid-heavy salons, then expand into
    protective-style salon chains, beauty-school certification, equipment
    financing, supply procurement, and eventually the default software and data
    network for textured-hair service businesses adopting assistive tools.
solution: >-
  Protective Style Salon OS gives braid-focused salons the playbook to adopt
  assistive braiding devices without losing control of service quality. Owners
  create digital style recipes for knotless and box-braid services, mapping part
  prep, hand-start requirements, device finishing steps, target duration, and
  stylist skill level needed at each stage. The software turns those recipes
  into schedules, client pricing templates, apprentice training checklists, and
  capacity forecasts that show whether one device adds two appointments per day
  or five. A built-in financing module lets the startup place devices with
  salons using a revenue-share or monthly lease tied to verified appointment
  throughput. Over time, the platform becomes the system of record for device
  utilization, stylist productivity, quality incidents, repeat-client retention,
  and expansion readiness across multi-location braid businesses.
goToMarketSeed:
  firstCustomer: >-
    A 6-chair braid salon in Atlanta specializing in knotless and box braids,
    with 6-10 braiders, 3-7 day booking lead times, and at least one owner who
    is still personally covering peak appointments because junior staff cannot
    finish styles fast enough
  buyingTrigger: >-
    The owner is evaluating a first braid-assist device, opening an extra chair,
    or replacing an injured or burned-out senior braider before back-to-school
    or holiday demand spikes
  currentAlternative: >-
    Manual scheduling, apprentice shadow training, generic booking software,
    paper or spreadsheet service timing, and informal trial-and-error around
    pricing and staff handoffs
  switchingReason: >-
    The startup is the fastest path from "interesting device demo" to measurable
    ROI: more completed braid appointments per week, less dependence on one
    master stylist, and a consistent service flow junior braiders can execute
  pricingHypothesis: >-
    Monthly salon subscription plus per-device financing spread, with premium
    tiers for multi-location analytics and training certification seats
