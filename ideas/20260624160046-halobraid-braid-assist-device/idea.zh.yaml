topRisks:
  - name: 硬件普及停滞
    description: "若辅助编发设备因定价过高、可靠性不足或遭发型师文化排斥，软件层可能在市场准备好之前就已到来。"
    mitigation: "先从试点沙龙和轻融资的软件模块入手，与早期设备经销商深度合作，并围绕可量化的接单量提升而非投机性自动化愿景来定价。"
  - name: 工作流变量超出预期
    description: "保护性发型因发质、编发师技法和客户偏好不同而差异显著，若服务配方无法捕捉足够细节，标准化运营层可能失效。"
    mitigation: "优先聚焦来源中已明确提及的无结辫和方块辫工作流，让沙龙自主撰写发型配方，将产品定位为可灵活配置的运营软件，而非刚性的流程执行工具。"
  - name: 现有沙龙平台捆绑同类功能
    description: "一旦品类价值得到验证，通用沙龙软件厂商或设备制造商可能跟进添加排班和分析功能。"
    mitigation: "加速切入融资、培训认证和跨沙龙接单量基准对比——这些资产需要品类专属的运营数据和信任积累，不是再堆一个排班模块就能复制的。"
