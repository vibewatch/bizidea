problem: >-
  Precision machine shops can now generate initial CNC programs faster, but the knowledge that actually makes a part run
  cleanly still lives in senior programmers’ heads, setup sheets, and one-off prove-out notes. When first articles fail
  or a job moves to another machine, teams re-learn feeds, fixtures, tool substitutions, and inspection tricks by hand.
  As veteran machinists retire into a severe labor shortage, shops lose throughput, stretch launch cycles, and struggle
  to scale recurring programs across shifts or sister cells.
targetUser:
  primary: >-
    Heads of CNC programming and manufacturing engineering at precision contract machine shops whose senior programmers
    still own the prove-out know-how for recurring part families
  secondary: Quality managers and plant managers responsible for first-article release, repeatability, and second-shift throughput
  buyer: VP Manufacturing Engineering, head of CNC programming, or plant GM at a precision machine shop
startupThesis:
  nonObviousInsight: >-
    As AI makes first-pass toolpath generation credible, the scarce asset in machining shifts upstream to the last-mile
    edits that turn a simulated program into a proven process on a specific machine, fixture, tool stack, and material.
    The real moat is not another CAM copilot; it is the system that captures which human overrides worked, why they
    worked, and when they are safe to reuse.
  beachhead: >-
    Process release and knowledge reuse for 25-60-machine U.S. precision job shops with 5-axis capacity that machine
    recurring titanium, Inconel, and aluminum brackets, housings, and fixtures for spaceflight and motorsport programs
  wedge: >-
    A cross-stack memory layer that turns CAM revisions, setup sheets, prove-out notes, tool changes, and CMM outcomes
    into versioned machining recipes that programming, setup, and quality teams can reuse on similar parts
  whyNowCatalyst: >-
    Named production deployments and up-to-50% programming-time gains show AI can handle more of the initial coding just
    as retirements, labor shortages, and secure cloud deployment make captured prove-out knowledge newly urgent and
    operationally feasible.
  ventureScalePath: >-
    Start with recurring-part knowledge reuse in precision machining, expand into quoting and DFM intelligence, then
    become the process-memory system for multi-site industrial manufacturers moving work across machines, plants, and
    eventually adjacent fabrication and assembly workflows.
solution: >-
  The product sits above existing CAD/CAM, CMM, and MES systems rather than replacing them. It ingests programs,
  revisions, setup sheets, tooling choices, operator notes, and first-article measurement results, then converts the
  accepted deltas into a versioned recipe tied to machine family, material, fixture, and quality outcome. When a similar
  job arrives or a part has to move to another cell, the software recommends what can be reused, what must be
  re-qualified, and what instructions should ship to setup and inspection. The first deployment can start with exported
  files and structured prove-out checklists, so a shop can preserve expert knowledge without ripping out its current CAM
  stack.
goToMarketSeed:
  firstCustomer: >-
    A 30-50-machine U.S. precision machine shop supplying recurring titanium or aluminum brackets and housings into a
    launch-vehicle or Formula One supply chain, with one lead CNC programmer nearing retirement and junior programmers
    covering second-shift prove-outs
  buyingTrigger: >-
    A lead programmer retirement, a new 5-axis cell coming online, or a repeat OEM program moving to more volume forces
    the shop to transfer expert-only know-how into a repeatable multi-shift process
  currentAlternative: >-
    CAM-native notes, setup sheets, spreadsheet runbooks, paper travelers, ERP or MES comments, and pulling senior
    programmers onto every prove-out by hand
  switchingReason: >-
    This wedge preserves the exact edits that got a part through first article and makes them reusable without replacing
    the CAM stack, reducing dependence on one expert while shortening prove-out and transfer cycles
  pricingHypothesis: >-
    Annual subscription priced by active CNC machine count and recipe-workflow modules, with paid onboarding for CAM,
    CMM, and MES connectors plus prove-out template design
