differentiator: >-
  CAM vendors store programs, CMM systems store measurements, and MES records execution after release, but none of them
  becomes the institutional memory of why a specific machining process passed first article and how it should be reused.
  This company would own that missing causal layer across programming, setup, prove-out, and quality approval. Its moat
  grows as every accepted override, measurement outcome, and transfer event compounds into a cross-machine recipe graph
  that generic copilots and single-system incumbents cannot easily reconstruct.
