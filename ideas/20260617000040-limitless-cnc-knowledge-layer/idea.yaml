jobsToBeDone:
  - job: >-
      When a new recurring part reaches first article, help our programming and quality teams capture exactly which edits
      made it pass, so the next lot can run without re-learning the process from scratch.
    currentAlternative: CAM comments, setup binders, tribal memory, and ad hoc email or spreadsheet handoffs
    successMetric: Days from first program to repeatable released recipe and percentage of repeat lots launched without lead-programmer intervention
  - job: >-
      When a job must move to another machine, shift, or programmer, help manufacturing engineering transfer the proven
      process safely, so output scales without scrap spikes or missed delivery dates.
    currentAlternative: Shadowing senior programmers, rerunning prove-outs manually, and rebuilding setup instructions by hand
    successMetric: Time to qualify a transferred program and first-pass yield after machine or shift transfer
ideaScorecard:
  signalStrength:
    score: 5
    rationale: The cluster combines fresh funding, named production customers, quantified time savings, and a documented labor shortage in one tightly aligned signal set.
  painIntensity:
    score: 5
    rationale: Shops risk scrap, late deliveries, and knowledge loss when expert programmers remain the only bridge between generated code and a shippable process.
  wedgeClarity:
    score: 5
    rationale: First-article knowledge capture and recipe reuse is a narrow workflow with a visible buyer, clear trigger, and measurable ROI.
  defensibility:
    score: 4
    rationale: A cross-system graph of approved overrides, machine context, and quality outcomes can become sticky, though CAM incumbents may try to extend into adjacent workflow capture.
  ventureScale:
    score: 5
    rationale: The beachhead expands naturally into quoting, multi-site transfer, supplier collaboration, and broader discrete-manufacturing process memory.
topRisks:
  - name: Programmer trust gap
    description: Senior programmers may resist a system that appears to commoditize or monitor the know-how that gives them leverage inside the shop.
    mitigation: Make experts the authors and approvers of reusable recipes, preserve attribution, and position the product as a force multiplier for training and transfer rather than replacement.
  - name: Fragmented data trail
    description: The exact reasons a first article passed are often spread across CAM files, paper notes, tooling changes, and CMM outputs that are hard to normalize.
    mitigation: Start with structured prove-out capture on one part family and one machine family, then add connectors and OCR-assisted imports only after the workflow is proving value.
  - name: Incumbent bundle pressure
    description: CAD/CAM or MES vendors could ship lightweight note-capture features that make buyers question whether a separate layer is necessary.
    mitigation: Win on cross-vendor workflow depth, quality-linked recipe reuse, and measurable transfer analytics that no single incumbent system can provide alone.
