problem: >-
  精密加工车间如今可以更快生成初始 CNC 程序，但真正让零件稳定生产的知识——进给量、夹具方案、刀具替换、检验技巧——仍锁在资深编程工程师的脑子里、设置清单上和一次性验证笔记里。首件失败或工件转移到其他机床时，团队不得不重新手工摸索这些参数。随着资深机工持续退休、劳动力短缺加剧，车间吞吐量下降、交付周期拉长，将现有程序复制到其他班次或姊妹单元也愈发困难。
targetUser:
  primary: >-
    精密合同加工车间的 CNC 编程部门负责人和制造工程负责人，其资深编程工程师仍掌握着批量零件族的验证加工专有知识
  secondary: 负责首件放行、重复精度和第二班次产能的质量经理和工厂经理
  buyer: 精密加工车间的制造工程副总裁、CNC 编程负责人或工厂总经理
startupThesis:
  nonObviousInsight: >-
    随着 AI 让首遍刀具路径生成变得可信，加工领域的稀缺资产已向上游转移——那些将仿真程序变成特定机床、夹具、刀具组合和材料上可靠工艺的最后一步修改，才是真正的价值所在。真正的护城河不是又一个 CAM 副驾驶，而是那个能记录"哪些人工修改起作用了、为什么起作用、何时可以安全复用"的系统。
  beachhead: >-
    专为拥有 25—60 台机床、具备五轴加工能力的美国精密加工车间服务，这类车间批量生产钛合金、铟科耐尔合金和铝合金支架、壳体及夹具，供应航天飞行和赛车运动项目
  wedge: >-
    一个跨系统的工艺记忆层，将 CAM 修改记录、设置清单、验证笔记、刀具变更和 CMM 检验结果转化为版本化的加工工艺配方，供编程、设置和质量团队在类似零件上复用
  whyNowCatalyst: >-
    命名客户落地及最多 50% 的编程时间节省表明，AI 已能处理更多初始编码任务；与此同时，人员退休、劳动力短缺以及合规云部署的可行性，让沉淀验证知识变得既紧迫又切实可行。
  ventureScalePath: >-
    从精密加工的批量零件工艺复用起步，扩展到报价和 DFM 智能，最终成为多工厂工业制造商跨机床、跨工厂乃至相邻制造和装配工作流的工艺记忆系统。
solution: >-
  该产品位于现有 CAD/CAM、CMM 和 MES 系统之上，而非取而代之。它接入程序文件、修改记录、设置清单、刀具选择、操作员笔记和首件测量结果，将已验收的修改量转化为版本化的工艺配方，并与机床型号、材料、夹具和质量结果绑定。当类似工件到来，或需要将零件转移到其他单元时，软件给出建议：哪些内容可复用、哪些需要重新验证、哪些指令需同步给设置和检验团队。首次部署可从导出文件和结构化验证清单起步，让车间在不更换现有 CAM 系统的前提下完成专家知识的保存。
goToMarketSeed:
  firstCustomer: >-
    一家拥有 30—50 台机床、为运载火箭或 Formula One 供应链批量供货钛合金或铝合金支架和壳体的美国精密加工车间，首席 CNC 编程工程师即将退休，初级工程师负责第二班次验证工作
  buyingTrigger: >-
    首席编程工程师退休、新五轴单元上线，或 OEM 批量项目转移至更大产能，迫使车间将只有专家才懂的知识固化为可复用的多班次流程
  currentAlternative: >-
    CAM 内置注释、设置清单、电子表格操作手册、纸质流程单、ERP 或 MES 备注，以及把资深编程工程师拉回来手工参与每次验证
  switchingReason: >-
    这个切口能精确保存让零件通过首件检验的具体修改并使其可复用——无需替换 CAM 系统，同时降低对单一专家的依赖，缩短验证和交接周期
  pricingHypothesis: >-
    按活跃 CNC 机床数量和工艺工作流模块收取年度订阅费，CAM、CMM 和 MES 连接器及验证模板设计的落地服务另行收费
