jobsToBeDone:
  - job: >-
      当新的批量零件到达首件阶段时，帮助编程和质量团队精确记录哪些修改让零件通过了验证，从而让下一批次无需重新摸索工艺就能直接投产。
    currentAlternative: CAM 注释、设置活页夹、隐性经验，以及通过邮件或电子表格进行的临时交接
    successMetric: 从首次编程到可复用工艺配方放行的天数，以及不需要首席编程工程师介入就能启动的批量零件比例
  - job: >-
      当工件需要转移到其他机床、班次或编程工程师时，帮助制造工程团队安全传递已验证的工艺，让产能扩张不会引发废料率上升或错过交货期。
    currentAlternative: 跟随资深编程工程师学习、手动重跑验证加工、手工重建设置说明
    successMetric: 转移程序的验证时间，以及机床或班次转移后的一次合格率
ideaScorecard:
  signalStrength:
    score: 5
    rationale: 这组信号集中且一致：新鲜融资、命名量产客户、量化时间节省和有文献支撑的劳动力短缺，形成高度对齐的信号群。
  painIntensity:
    score: 5
    rationale: 当专家编程工程师仍是生成代码与可交付零件之间唯一桥梁时，车间同时承担废料、延误和知识流失的三重风险。
  wedgeClarity:
    score: 5
    rationale: 首件知识沉淀和配方复用是一个范围清晰的垂直工作流，买家明确、触发事件可识别、ROI 可量化。
  defensibility:
    score: 4
    rationale: 跨系统的修改记录、机床上下文和质量结果图谱具有较强粘性，但 CAM 现有厂商可能尝试向相邻工作流沉淀延伸。
  ventureScale:
    score: 5
    rationale: 滩头市场可自然扩展至报价、多厂转移、供应商协作，以及更广泛的离散制造工艺记忆。
topRisks:
  - name: 编程工程师信任障碍
    description: 资深编程工程师可能抵制一个看似将其专有知识商品化或对其进行监控的系统——这些知识正是他们在车间内话语权的来源。
    mitigation: 让专家成为可复用配方的作者和审批人，保留署名权，并将产品定位为培训和知识转移的放大器，而非替代方案。
  - name: 数据链路碎片化
    description: 首件通过的确切原因往往分散在 CAM 文件、纸质笔记、刀具变更记录和 CMM 输出中，难以标准化整合。
    mitigation: 先从单一零件族和单一机床型号的结构化验证沉淀入手，只在工作流证明价值后再逐步添加连接器和 OCR 辅助导入。
  - name: 在位厂商捆绑销售压力
    description: CAD/CAM 或 MES 厂商可能推出轻量级笔记沉淀功能，让买家质疑是否有必要单独购买一个独立层。
    mitigation: 凭借跨厂商工作流深度、质量关联的配方复用，以及任何单一系统都难以单独提供的可量化转移分析赢得市场。
