scenarios:
  downside:
    description: 安全审查和较慢的量产推进延迟了后续批次，将模型拉至第 3 年末略低于零现金。
    y3RevenueK: 1425.5
    y3EbitdaK: -1050.6
    cashLowPointK: -72.1
    keyAssumptionChanges:
      - 第 1 年 Q1 之后，后续批次的启动时间约晚 2 个月。
      - 量产 ARR 比基础案例低约 8—10%，因为上线的机床和模块更少。
      - 毛利率滑至 68%，因为安全审查和落地服务仍然依赖大量人力。
  base:
    description: 两个月试点按精简招聘计划转化为机床数量订阅，第 3 年末达到 14 个量产客户。
    y3RevenueK: 1719.0
    y3EbitdaK: -804.5
    cashLowPointK: 310.9
    keyAssumptionChanges:
      - 付费试点时长 2 个月，每个约 $30K。
      - 量产账户从约 $140K ARR 起步，通过扩展成熟至约 $153K。
      - 毛利率在标准化导出优先或私有 VPC 交付下维持 70%。
  upside:
    description: 合作伙伴引入使批次提前，且第二工作流扩展提升了成熟站点收入，无需大幅扩充人员。
    y3RevenueK: 1911.5
    y3EbitdaK: -631.8
    cashLowPointK: 580.5
    keyAssumptionChanges:
      - 从第四个客户起，试点开始时间比基础案例约提前 1 个月。
      - 更多账户在 6 个月内增加第二工作流，量产 ARR 升至 $160K 以上。
      - 落地和安全审查流程标准化后，毛利率提升至 72%。
