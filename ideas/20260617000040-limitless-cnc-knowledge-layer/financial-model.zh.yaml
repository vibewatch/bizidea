modelDiagram:
  title: 单位经济模型流程
  mermaid: |
    flowchart LR
      Trigger[Retirement / machine launch] --> Pilot[Paid pilot]
      Pilot --> Production[Production rollout]
      Production --> Expansion[Second machine family / shift]
      Production --> Machines[Active machines]
      Expansion --> Revenue[Higher machine-count ARR]
      Machines --> Revenue
      Revenue --> GrossProfit[70% gross profit]
      GrossProfit --> Cash[Cash runway]
modelSanity:
  - checkName: 收入引擎
    finding: 基础案例收入主要来自将单零件族试点转化为全站点机床数量订阅，再在同一车间内扩展。
  - checkName: 必须走通的路径
    finding: 模型依赖标准化的导出优先或私有 VPC 部署，才能让付费试点持续维持在业务计划中 50% 的转化率下限之上。
  - checkName: 模型失效条件
    finding: 若 ARPU 下滑约 10% 或安全审查强制要求定制化部署，期末现金将过于紧张，悲观案例在第 3 年结束前将变为负数。
  - checkName: 下一轮融资证明点
    finding: 下一轮融资的叙事是：第 2 年末 6 个量产账户、第 3 年末 14 个账户，加上 3 次可引用的第二工作流扩展和超过 400 台活跃机床。
sanityChecks:
  ruleOf40: 第 3 年增长率 127% + EBITDA 利润率 -47% = 80%。
  burnMultiple: 从第 2 年的 1.8 倍改善至第 3 年的 0.8 倍，因为站点内扩展开始超越精简招聘计划的速度。
  revenuePerFte: 第 3 年 10 名年末 FTE 对应 $172K（低于 SaaS 典型基准 $200K—$400K，因此模型仍依赖更高 ACV 和合作伙伴杠杆，而非大规模销售招聘）。
  flags:
    - 基础案例第 3 年末仅剩约 $311K 现金，因此即使里程碑如期达成，下一轮融资也必须在第 3 年末之前就开始推进。
    - 只有私有 VPC 部署保持标准化，毛利率才能维持；定制化本地部署要求会将模型推向悲观案例。
    - 由于公司在赛道充分验证之前就需要配备领域密集型实施人才，收入效率相对于软件公司标准仍然偏低。
    - 第 3 年 EBITDA 尚未转正，因此投资逻辑依赖可引用的扩展案例和机床密度，而非近期盈利。
