slug: cnc-process-memory-os
date: '2026-06-17'
currency: USD
modelStartMonth: 2026-07
assumptions:
  - id: A1
    name: 模型起始月份
    value: 2026-07
    unit: YYYY-MM
    source: "[business-plan.yaml date] 2026-06-17 计划日期后的第一个完整运营月。"
  - id: A2
    name: Pre-seed 轮到账现金
    value: '3200'
    unit: USDK
    source: "[business-plan.yaml fundingAsk.targetFundingRangeUsd] 取 $2—4M 区间中位数，规模设定为足够覆盖 12—24 个月里程碑加 6 个月缓冲。"
  - id: A3
    name: 付费试点单价
    value: '30'
    unit: USDK/客户
    source: "[business-plan.yaml investorMemo.firstCustomer.initialContract] 基础案例取单一批量零件族 $25K—$50K 试点区间的中位数。"
  - id: A4
    name: 付费试点时长
    value: '2'
    unit: 个月
    source: "[research.yaml reportMemo.validationPlan + business-plan.yaml experimentRoadmap 90—180 天] 价值预计在约 6 周内得到验证，因此 2 个月付费试点是最精简的可信商业动作。"
  - id: A5
    name: 每车间基础量产 ARR
    value: '140'
    unit: USDK/年
    source: "[research.yaml bottomUpSizingDrivers 每台活跃机床年度支出 + business-plan.yaml market.som] 35 台活跃机床 × 每台机床每年 $4K。"
  - id: A6
    name: 成熟期混合量产 ARPU
    value: '153'
    unit: USDK/年
    source: "[business-plan.yaml businessModel.expansionLevers + gtm.funnelTargets] 从 $140K 基础 ARR 起步，加上约 9% 的混合模块/第二工作流提升——60% 的量产账户在 6 个月内扩展。"
  - id: A7
    name: 客户增长节奏
    value: 第 1 年末 3 个付费客户，第 2 年末 6 个量产加 1 个试点，第 3 年末 14 个量产
    unit: 客户数
    source: "[business-plan.yaml milestones + investorMemo.mustBeTrue] 与第 1 年 2—3 个付费试点加至少 1 次量产转化、12—24 个月内 5—8 个量产账户、24—36 个月内 12—15 个量产客户的里程碑一致。"
  - id: A8
    name: 毛利率目标
    value: '70'
    unit: percent
    source: "[business-plan.yaml businessModel.targetGrossMarginPct] 建模为确认收入的 30% COGS。"
  - id: A9
    name: 创始人 CEO 全成本年度现金支出
    value: '180.0'
    unit: USDK/年
    source: "初创财务经验值：$150K 薪资加 20% 工资税和福利，适用于 pre-seed 工业 SaaS 创始人。"
  - id: A10
    name: 创始工程师全成本年度现金支出
    value: '200.4'
    unit: USDK/年
    source: "初创财务经验值：$167K 薪资加 20% 工资税和福利，适用于资深产品/集成工程师。"
  - id: A11
    name: CNC 方案负责人全成本年度现金支出
    value: '150.0'
    unit: USDK/年
    source: "[business-plan.yaml team] 初创财务经验值，适用于连接验证工作流和产品的资深领域专家。"
  - id: A12
    name: 产品工程师全成本年度现金支出
    value: '180.0'
    unit: USDK/年
    source: "初创财务经验值：$150K 薪资加 20% 工资税和福利，适用于早期产品工程师。"
  - id: A13
    name: 解决方案工程师全成本年度现金支出
    value: '140.4'
    unit: USDK/年
    source: "[business-plan.yaml team] 初创财务经验值，适用于落地、连接器支持和安全部署工作。"
  - id: A14
    name: 客户负责人全成本年度现金支出
    value: '159.6'
    unit: USDK/年
    source: "[business-plan.yaml team] 初创财务经验值，适用于首位含浮动薪酬的工业 SaaS 客户负责人。"
  - id: A15
    name: 软件工程师全成本年度现金支出
    value: '180.0'
    unit: USDK/年
    source: "初创财务经验值：与产品工程师相同的全成本，适用于可重复的连接器和工作流开发。"
  - id: A16
    name: AE/渠道合作全成本年度现金支出
    value: '159.6'
    unit: USDK/年
    source: "[business-plan.yaml gtm.channels] 初创财务经验值，适用于试点验证后的首位合作伙伴辅助销售人员。"
  - id: A17
    name: CNC 工作流专家全成本年度现金支出
    value: '150.0'
    unit: USDK/年
    source: 初创财务经验值，仅在多个量产参考案例存在后才添加的第二位领域专家。
  - id: A18
    name: 集成工程师全成本年度现金支出
    value: '180.0'
    unit: USDK/年
    source: 初创财务经验值，支持更广泛连接器深度的第 3 年末工程招聘。
  - id: A19
    name: 非薪酬运营支出
    value: 按阶段，研发每月 10—16K，销售营销每月 6—14K，行政管理每月 7—9K
    unit: USDK/月
    source: 工业软件公司的云工具、差旅、法务、保险和精简后台支持的初创财务经验值。
  - id: A20
    name: 招聘节奏
    value: 产品工程师第 3 月，解决方案工程师第 6 月，客户负责人第 12 月，软件工程师第 15 月，AE/渠道合作第 19 月，CNC 专家第 29 月，集成工程师第 31 月
    unit: 计划
    source: "[business-plan.yaml team + strategicChoices.sequencingRationale] 前六个职位与计划一致，后续招聘推迟至试点到量产转化有可引用案例后。"
  - id: A21
    name: 单位经济模型月流失率
    value: '1.5'
    unit: percent
    source: 初创财务经验值，适用于粘性尚可但仍处于早期、落地工作量较大的企业工业工作流软件。
  - id: A22
    name: 每新量产客户混合 CAC
    value: '71.6'
    unit: USDK/客户
    source: 由第 2—3 年销售营销支出 $858.6K 除以 12 个新量产账户计算得出。
  - id: A23
    name: 销售漏斗防护值
    value: 目标账户到合格试点 25%，合格试点到付费试点 35%，付费试点到量产 55%
    unit: 转化率
    source: "[business-plan.yaml gtm.funnelTargets] 基础案例取漏斗目标中位值，略高于 50% 的试点到量产门槛。"
  - id: A24
    name: 现金转化时机
    value: EBITDA 近似运营现金流
    unit: 政策
    source: "初创财务经验值：本阶段不建模债务、资本支出或重大营运资金波动；现金回收风险已在 sanityChecks.flags 中披露。"
  - id: A25
    name: 融资里程碑
    value: 6 个量产账户、3 次第二工作流扩展、标准私有 VPC 包和一个合作伙伴来源管道渠道
    unit: 里程碑
    source: "[business-plan.yaml milestones 12—24 个月 + fundingAsk.useOfFundsSummary] 用于测算 pre-seed 融资需求和下一轮融资的验证节点。"
