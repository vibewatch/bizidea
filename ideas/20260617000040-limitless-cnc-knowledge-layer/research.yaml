  "regulatoryLandscape": "The beachhead sits inside regulated manufacturing. ITAR governs defense items, services, and technical data tied to the U.S. Munitions List [11], while CMMC raises the bar for suppliers handling controlled unclassified information in DoD programs [12]. NIST's digital-thread work also highlights the need for authorization, authentication, traceability, and trustworthy product data throughout the lifecycle [10]."
  "technologyLandscape": "The enabling plumbing is finally credible: MTConnect standardizes machine data across builders [8][9], NIST is explicitly pushing digital-thread standards, conformance, and data security across design-manufacturing-quality flows [10], and adjacent software already spans CAM, machine monitoring, digital travelers, and quality data management [22][26][28][32][35][36][37]. The unsolved problem is stitching those layers into a reusable, explainable process-memory graph."
