slug: cnc-process-memory-os
date: '2026-06-17'
executiveSummary: >-
  这家公司真正值得投资的版本，不是又一个 AI CAM 副驾驶，而是一个厂商中立的工艺记忆层，专为拥有 25—60 台机床、批量加工航空航天和赛车运动零件的美国精密加工车间而设计。理想的首个客户是一家拥有 30—50 台机床的车间：有一名资深编程工程师即将退休、有批量钛合金或铝合金零件族，且正在扩充五轴单元或推进第二班次——隐性知识已成为交付风险。MVP 应以导出优先工作流起步，将 CAM 修改记录、设置清单、结构化验证清单、刀具替换和 FAI 或 CMM 结果沉淀为版本化的可复用工艺配方。研究支持当前时机：AI CAM 已在生产中获得信任，机工车间产量增长而人力持续受限，可追溯性要求让非正式流程单愈发难以为继。GTM 应保持事件驱动：创始人在退休、新机上线或项目放量后主导销售，随后在单一批量零件族上完成付费试点，按活跃机床数量加模块进行年度定价。建模市场规模有吸引力，但仍依赖假设——TAM 约 $0.8B、SAM 约 $272.6M、第 3 年 SOM 约 $6.3M，因为没有任何来源能直接统计出符合高重复量滩头定义的车间数量。公司若能保持叠加层定位、比 CAM 或 ERP 或 QMS 现有厂商更好地打通编程与质量审批，并证明配方复用确实减少了对首席编程工程师的依赖和机床转移时间，就有望胜出。最大的否定性风险是文档规范性差、安全要求强制要求定制化部署，以及 CAM 或质量厂商在初创公司建立足够数据壁垒之前向上游延伸。
problem:
  - AI CAM 正在让首遍代码生成更快，但车间仍依赖资深编程工程师、设置活页夹和临时笔记来让首件通过验证，并在后续批次中重复这一过程。
  - 当批量零件转移到另一台机床、另一个班次或初级编程工程师时，团队不得不手工重新摸索进给量、刀具替换、夹具选择和检验步骤，既带来进度风险又打断专家工作。
  - 退休潮、劳动力短缺和航空航天可追溯性要求，将工艺记忆缺失从效率问题升级为连续性和合规问题。
solution:
  - 构建一个叠加工作流，接入 CAM 修改记录、设置清单、结构化验证清单、刀具变更和 FAI 或 CMM 结果，将已验收的修改量转化为版本化工艺配方，并与机床型号、材料、夹具和质量结果绑定。
  - 先从导出文件和单一批量零件族的结构化沉淀起步，让客户在公司添加更深层 CAM、MES 或 CMM 集成之前，就能验证更快的批次放行和更安全的机床转移。
  - 生成放行就绪的设置和检验指令，明确哪些内容可复用、哪些需要重新验证，以及谁审批了每次工艺配方变更。
whyWeWin:
  - 公司占据 CAM 自动化与系统记录之间的空白地带，拥有在位厂商很少跨编程、设置和质量串联的验证后学习成果。
  - 买家触发事件驱动销售——退休、新五轴单元或批量项目放量，让手工知识转移的风险和成本变得一目了然。
  - 每一条被接受的修改记录、每一次检验结果和每一次转移事件，都会在相似零件、机床和班次之间积累成更有价值的工艺配方图谱。
strategicChoices:
  beachhead: >-
    拥有 25—60 台 CNC 机床和五轴加工能力的美国精密合同加工车间，批量生产钛合金、铟科耐尔合金和铝合金支架、壳体或夹具，供应航天飞行、国防相邻和赛车运动项目。
  wedgeRationale: >-
    这个切入点比更广泛的制造业 AI 方向验证更快，因为单一零件族工作流有明确的买家、具体的触发事件，以及可量化的输出——批次放行时间、机床转移验证时间和减少的首席编程工程师打扰次数。优先销售所有加工文档或所有 AI CAM 工作流，会在公司赢得单一痛点任务的信任之前就陷入分散的功能需求。
  sequencingRationale: >-
    产品应从导出优先的沉淀、工艺配方版本管理和单一零件族的质量关联审批起步，因为这是在不需要存量系统集成项目的前提下证明价值的最小范围。GTM 应保持创始人主导、事件驱动，直到公司了解哪些触发事件、部署模式和连接器转化最快。招聘遵循相同的顺序：先是核心工程和 CNC 工作流专业知识，其次是落地和合作伙伴支持，只有在试点到量产的转化率可被引用之后，才扩大销售规模。
  notYet:
    - 自主 CAM 或刀具路径生成
    - 完整的 MES 或 ERP 替代
    - 重复量少的纯原型车间
    - 在拥有 3—5 个航空航天或赛车运动量产参考案例之前，不向医疗和泛工业领域扩张
market:
  tam: "$0.8B——基于 12,981 家美国机工车间、每家广义可触达车间约 15 台活跃机床、每台机床约 $4,000 年度支出的自下而上估算。"
  sam: "$272.6M——应用滩头约束：假设 15% 的美国机工车间符合 25—60 台机床、受管制、批量零件的特征，每站点约 35 台机床，相同的每机床年度支出。"
  som: "$6.3M——可实现的第 3 年 SOM，建模为 45 家滩头车间 × 每站点 35 台机床 × 每台机床 $4,000 年度支出，假设公司在每个站点落地一个紧迫零件族并在站点内扩展。"
  segments:
    - 服务于航天飞行、国防相邻、赛车运动和高规格工业项目的美国精密合同加工车间
    - 跨单元或跨工厂转移批量零件族的自建加工单元和多站点 OEM 供应商
  buyingProcess: >-
    销售动作始于退休、新机上线或项目放量暴露出多少验证知识仍集中在一个人身上或散落在各处流程单里。发起人通常是 CNC 编程负责人或制造工程负责人，预算由工厂总经理或制造工程副总裁审批；受管制客户通常还需要 IT 或合规审查，付费试点才能上线。
product:
  mvp: >-
    MVP 是针对单一批量零件族的导出优先工艺工作区。应沉淀 CAM 差异文件、验证清单条目、刀具替换、设置说明以及 FAI 或 CMM 结果，然后推荐可复用的工艺配方要素，并生成审批就绪的设置和检验包。
  sixMonth: >-
    签下 2—3 家共创客户，发布工艺配方版本管理加结构化验证沉淀和 FAI 关联审批工作流，并证明一个试点无需深度系统集成就能创建可复用的工艺配方。
  twelveMonth: >-
    将 2—3 个付费试点转化为 1—2 个量产账户，添加一个 CAM 系统和一个质量数据源的优先连接器，并为受管制客户推出私有 VPC 部署选项。
  twentyFourMonth: >-
    成为滩头内批量零件和机床转移配方复用的系统记录，然后扩展到多站点转移工作流和相邻报价或 DFM 智能模块。
  keyBets:
    - 导出文件加结构化清单足以在完整集成之前证明价值。
    - 若系统保留署名权、审批控制和配方溯源，资深编程工程师会主动贡献。
    - FAI 和 CMM 结果是足够强的证明信号，可让复用推荐具备可审计性。
    - 单一零件族试点可在不需要扩大新客户销售规模之前，先在同一车间扩展到更多机床和批量项目。
gtm:
  wedge: >-
    退休风险、新五轴单元上线或批量项目产量提升——任何让车间需要在不止一台机床或班次上验证同一零件的事件，都是销售切入时机。
  channels:
    - 创始人主导外呼，目标是 25—60 台机床车间中的 CNC 编程负责人、制造工程负责人和工厂总经理
    - 与 CAM 经销商、计量集成商和 MTConnect 或机床数据合作伙伴的转介绍和联合销售
    - 与单一批量零件族挂钩的付费试点，面向航空航天、赛车运动或高规格工业项目
  funnelTargets: "目标账户→合格试点 20—30%，合格试点→付费试点 30—40%，付费试点→量产 50%+，量产→6 个月内扩展至第二机床族或第二班次 60%+"
  pricing: >-
    对单一批量零件族收取付费试点费用，之后按活跃 CNC 机床数量和工艺工作流模块收取年度订阅费，另加连接器设置和验证模板设计的落地费用。这与每次在一台机床、一个班次或一次转移中复用已验证配方时都能感受到价值的买家心理高度契合。
businessModel:
  revenueStreams:
    - 按活跃机床数量和模块计价的工艺记忆工作流年度订阅费
    - CAM、CMM 或 MES 导出映射和验证模板设计的付费落地费
    - 多站点转移分析、基准报告和供应商协作的扩展模块
  unitOfValue: 通过工艺记忆工作流管理的活跃 CNC 机床数量
  targetGrossMarginPct: 70
  expansionLevers:
    - 在第一家车间内增加更多机床、班次和批量零件族
    - 从单站点复用扩展到跨站点和姊妹单元转移治理
    - 在工艺配方图谱获得信任后，添加报价、DFM 和工艺基准智能
strategyMap:
  northStarMetric: 在无需首席编程工程师介入的情况下，从已审批可复用配方启动的批量零件族数量
  inputMetrics:
    - 从首件通过到审批可复用配方的天数
    - 无需资深编程工程师升级即可启动的批量零件比例
    - 机床或班次转移验证的中位时间
    - 付费试点到量产的转化率
    - 每个量产账户的活跃机床数量和零件族数量
  moatsToBuild:
    - 串联 CAM 修改记录、刀具选择、设置上下文和 FAI 或 CMM 结果的跨系统工艺配方图谱
    - 按机床型号、材料、夹具和编程工程师层级，记录哪些修改确实反复出现的基准数据集
    - 受管制加工项目所需的合规就绪溯源、署名和审批历史
  killCriteria:
    - 前 8 个付费试点中，12 个月内转化为量产的不足 3 个
    - 前 3 个量产部署后，批量零件或转移验证时间的中位改善幅度不足 20%
    - 超过 50% 的合格受管制潜在客户需要定制化本地部署或连接器工作，打破 70% 毛利率路径
    - 量产账户在 6 个月内扩展至第二机床族或班次的比例不足 40%
  mermaid: |
    flowchart LR
      Wedge[Recipe reuse wedge] --> MVP[Export-first memory layer]
      MVP --> Proof[Faster repeat lots and transfers]
      Proof --> Expansion[More machines sites and quoting intelligence]
investorMemo:
  verdict:
    call: "进一步观察/调查"
    conviction: 若早期客户以约 $120K+ ARR 为叠加层买单，且部署保持导出优先或私有 VPC 而非定制化本地部署，则中等信心。
    whyBelieve: 公司瞄准的是一个由退休驱动、对可追溯性敏感的瓶颈——一条沉淀的工艺配方可跨多个批量零件降低验证延迟、专家打扰和转移风险。
    whyDoubt: 滩头市场可能比建模结果更窄，CAM、ERP 或 QMS 或质量厂商可能打包足够多的相邻功能，压制独立预算空间。
    nextDiligence: 在目标规模区间拿到 2 个付费试点，并证明至少有 1 个转化为量产，批量零件或转移验证时间缩短 20% 以上。
  firstCustomer:
    title: 30—50 台机床航空航天供应商的 CNC 编程负责人
    profile: 一家美国精密加工车间，批量生产钛合金或铝合金支架和壳体，一名资深编程工程师即将退休，初级员工负责第二班次验证。
    trigger: 首席编程工程师退休、新五轴单元上线或 OEM 产量放量，迫使车间将已验证工艺跨更多机床或班次复用。
    buyer: 制造工程副总裁或工厂总经理
    initialContract: "$25K—$50K 单一批量零件族付费试点，随着 30—50 台机床和额外工艺模块上线，转化为约 $120K—$180K ARR 加落地费。"
  mustBeTrue:
    - 至少半数合格的 25—60 台机床车间运行了足够多的批量零件族和转移任务，足以为工艺记忆支付约 $120K—$180K ARR。
    - 导出的 CAM 文件、结构化验证清单和 FAI 或 CMM 结果可在 6 周内创建可复用配方，无需深度集成。
    - 资深编程工程师接受作者兼审批人的工作流，并在实际任务中持续使用产品，而非退回到随手笔记。
    - 至少 50% 的付费试点转化为量产，60% 以上的量产账户在 6 个月内扩展至另一机床族、班次或零件族。
    - CAM、ERP 或 QMS 及质量厂商在 24 个月内不会推出等效的跨系统配方复用和溯源能力，从而消除切口。
  diligenceQuestions:
    - 有多少目标车间的重复零件产量和转移频率足以支撑独立叠加层预算？
    - 哪个输入来源带来最快的首次价值：CAM 修改差异、结构化验证清单，还是 FAI 或 CMM 导入？
    - 前 10 个合格航空航天和国防相邻潜在客户实际需要什么部署方式？
    - 触发事件发生时，车间内谁掌握预算？
    - 哪个 KPI 门槛能将付费试点转化为全厂量产预算？
operatingAssumptions:
  - assumption: 足够多的 25—60 台机床受管制加工车间拥有批量零件产量和转移频率，足以支撑聚焦的滩头市场。
    basis: research.yaml
    validationTest: 访谈 20 家目标车间，确认至少 10 家近期有依赖资深编程工程师介入的转移或批次启动，且能支撑约 $120K ARR。
    decisionImpact: 若不成立，将细分到数量更少但重复量更密集的航空航天和赛车运动车间，并下调初始 ACV 目标。
  - assumption: 导出的 CAM 文件、结构化验证沉淀和 FAI 或 CMM 附件可在深度集成完成之前交付首次价值。
    basis: idea.yaml
    validationTest: 使用导出文件加一个窄连接器交付前 3 个试点，并在 6 周内实现首个可用工艺配方输出。
    decisionImpact: 若不成立，工程必须提前优先完成更深度的集成，增加消耗并推迟 GTM 招聘。
  - assumption: 大多数早期受管制账户将接受安全云或私有 VPC 部署，而非从第一天就要求定制化本地部署。
    basis: research.yaml
    validationTest: 在 10 个合格销售周期中记录所需部署方式，并确保至少 3 个买家愿意在支持的架构上试点。
    decisionImpact: 若不成立，路线图和融资必须向更重的基础设施倾斜，并缩小初始账户规模。
  - assumption: 若系统保留署名权、审批控制和复用署名，资深编程工程师会主动贡献工艺配方。
    basis: idea.yaml
    validationTest: 在前 3 个试点中，保持指定专家的工艺配方审批参与率超过 80%，并在前 60 天内衡量随手笔记使用是否减少。
    decisionImpact: 若不成立，需将产品重新定位为文档沉淀和分析工具，然后再推出以推荐为主的工作流。
  - assumption: 买家愿意在一个零件族试点证明 ROI 之后，以每台活跃机床约 $4,000/年的价格购买工艺记忆服务。
    basis: research.yaml
    validationTest: 在至少 8 次采购对话中测试定价，并将 2 个付费试点转化为暗示 30—50 台机床车间年化 ARR 至少 $120K 的定价。
    decisionImpact: 若不成立，定价和打包需转向更窄的零件族订阅或更重服务的实施方案，降低毛利率潜力。
experimentRoadmap:
  - horizon: 0–90 天
    experiment: 访谈目标规模区间内 15 位编程负责人、制造工程负责人和工厂总经理。
    hypothesis: 退休风险和机床转移痛点紧迫到足以支撑事件驱动的付费试点销售动作。
    successMetric: 至少 10 个访谈记录了近期批次延迟或转移延误，且 5 个愿意分享基准周期时间或打扰频率数据。
    owner: CEO
  - horizon: 0–90 天
    experiment: 使用导出的 CAM 文件、笔记和 FAI 记录手工重建 3 个历史首件任务。
    hypothesis: 在构建深度集成之前，可以从现有导出文件中创建有价值的工艺配方。
    successMetric: 三个潜在客户收到可复用配方包，且至少 1 个签署付费试点工作说明书或意向书。
    owner: 创始工程师
  - horizon: 90–180 天
    experiment: 使用结构化验证清单和一个质量数据输入，在单一批量零件族上部署第一个付费试点。
    hypothesis: 单一窄工作流可以在不替换 CAM 系统的前提下缩短批量零件或转移验证时间。
    successMetric: 试点在 6 周内创建可复用的已审批配方，且批量零件或转移准备时间比之前流程快至少 20%。
    owner: CNC 方案负责人
  - horizon: 90–180 天
    experiment: 跨 20 个历史任务比较 CAM 差异、操作员笔记和 FAI 或 CMM 结果，对预测安全复用的信号进行排名。
    hypothesis: 质量结果加结构化验证沉淀比单纯的笔记沉淀更具防御性。
    successMetric: 一种信号组合能解释大多数成功批次，并成为 v1 的默认数据模型。
    owner: 产品工程师
  - horizon: 6–12 个月
    experiment: 使用标准私有 VPC 和审计追踪包，与 3 个受管制潜在客户进行安全和部署审查。
    hypothesis: 公司无需定制化本地部署产品就能清除大多数滩头异议。
    successMetric: 三个潜在客户在没有实质性架构变更的情况下批准标准部署包。
    owner: 解决方案工程师
  - horizon: 6–12 个月
    experiment: 与一家 CAM 经销商或计量集成商联合启动一个合作伙伴辅助试点。
    hypothesis: 一旦公司有可引用的试点结果，受信任的工作流合作伙伴可以缩短销售和落地周期。
    successMetric: 一个合作伙伴来源的试点成交速度快于创始人直接来源的基准，并达到量产范围。
    owner: CEO
  - horizon: 12–18 个月
    experiment: 将第一个量产账户扩展到第二机床族或第二班次。
    hypothesis: 在单一车间内扩展比在第一个配方验证后赢取新客户更便宜、更快。
    successMetric: 第一个量产账户在 6 个月内增加第二个工作流，并将减少专家打扰作为扩展原因。
    owner: 客户负责人
operations:
  - 维护安全的导出文件摄入、基于角色的权限控制，以及 CAM、流程单和质量档案的审计日志。
  - 对工艺配方版本管理、机床和材料匹配、审批状态和复用决策执行受控分类法。
  - 在每个试点中对验证、批量启动和转移 KPI 进行埋点，让续约与可量化的运营收益挂钩。
  - 维护符合 ITAR 和 CMMC 意识的部署审查手册，包括标准私有 VPC 选项。
  - 在不出让工艺配方数据和客户工作流所有权的前提下，培训 CAM 和计量合作伙伴进行试点打包。
team:
  - role: CEO（首席执行官）
    startTiming: 第 0 个月
    rationale: 在集中度高的工业市场中，主导共创客户销售、买家发现和合作伙伴招募。
  - role: 创始工程师
    startTiming: 第 0 个月
    rationale: 在公司扩大范围之前，构建导出文件摄入、工艺配方图谱、版本管理和可审计性。
  - role: CNC 方案负责人
    startTiming: 第 1 个月
    rationale: 将验证加工行为、设置工作流和质量审批步骤转化为买家信任的工作流程。
  - role: 产品工程师
    startTiming: 第 3 个月
    rationale: 将人工工艺配方沉淀转化为可重复的产品界面和窄集成，避免定制化软件漂移。
  - role: 解决方案工程师
    startTiming: 第 6 个月
    rationale: 缩短跨 CAM、质量和机床数据环境的落地时间，并支持安全部署。
  - role: 客户负责人
    startTiming: 第 12 个月
    rationale: 只有在试点到量产转化率和参考客户经过验证后，才添加可重复的管道和扩展管理。
milestones:
  - horizon: 0–12 个月
    items:
      - 在 25—60 台机床的滩头内签下 2—3 家共创客户
      - 在批量零件族上启动 2 个付费试点，并将至少 1 个转化为量产
      - 发布导出优先工艺配方版本管理、结构化验证沉淀、FAI 或 CMM 附件及审批工作流
      - 在实际账户上证明批量零件或转移验证时间至少缩短 20%
      - 为受管制潜在客户标准化私有 VPC 和安全审查包
  - horizon: 12–24 个月
    items:
      - 达到 5—8 个量产账户，并将至少 3 个扩展至第二机床族或班次
      - 为一个 CAM 平台、一个质量系统和 MTConnect 风格的机床上下文添加优先连接器
      - 为第一批较大账户推出基准报告和多站点转移工作流
      - 与 CAM 或计量集成商建立 2 个合作伙伴来源的管道渠道
  - horizon: 24–36 个月
    items:
      - 达到 12—15 个量产客户，管理超过 400 台活跃机床的工艺配方工作流
      - 赢得第一个自建加工单元或多站点 OEM 账户
      - 试点基于积累工艺配方图谱的报价或 DFM 智能
risks:
  - risk: 资深编程工程师可能抵制一个看似将其专有知识规范化或监控的产品。
    likelihood: Medium
    impact: High
    mitigation: 让专家成为工艺配方的作者和审批人，保留署名权，并将成功指标与减少打扰和培训负担挂钩，而非与减少人头挂钩。
  - risk: 来源数据分散在 CAM 文件、流程单、照片、笔记和质量系统中，将落地变成一个缓慢的集成项目。
    likelihood: High
    impact: High
    mitigation: 从单一零件族、导出优先沉淀和一个窄质量数据输入起步，只有在证明哪些信号最重要之后再添加集成。
  - risk: ITAR、CMMC 或客户安全审查可能强制要求私有部署，并在最优质的滩头账户中拉长销售周期。
    likelihood: Medium
    impact: High
    mitigation: 构建标准私有 VPC 选项，最小化技术数据暴露，并提前打包审计控制，让安全审查不再成为定制化工作。
  - risk: CAM、ERP 或 QMS 及质量厂商可能在初创公司积累足够数据优势之前，打包轻量级验证后沉淀能力。
    likelihood: Medium
    impact: High
    mitigation: 凭借跨厂商工作流深度、质量关联的复用推荐，以及在位厂商天然不能单独拥有的可量化转移分析赢得市场。
  - risk: 建模的滩头可能高估了有足够批量产量支撑独立软件预算的车间数量。
    likelihood: Medium
    impact: High
    mitigation: 在扩大外呼或扩充 GTM 团队之前，严格按批量零件组合、转移频率和买家触发事件进行资格审查。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2-4M"
  runwayMonths: 18
  useOfFundsSummary: >-
    18 个月的现金跑道应覆盖：导出优先产品、首批工程和 CNC 工作流人员、安全部署能力、2—3 个付费试点、1—2 次量产转化，以及在公司扩大销售规模之前建立一个合作伙伴辅助渠道。
