slug: cnc-process-memory-os
date: '2026-06-17'
executiveSummary: >-
  The investable version of this company is not another AI CAM copilot; it is a
  vendor-neutral process-memory layer for 25-60-machine U.S. precision job shops
  machining recurring aerospace and motorsport parts. The first customer is a
  30-50-machine shop with one senior programmer nearing retirement, recurring
  titanium or aluminum part families, and a new 5-axis cell or second-shift
  expansion that makes tribal know-how a delivery risk. The MVP should start as
  an export-first workflow that captures CAM revisions, setup sheets,
  structured prove-out checklists, tooling substitutions, and FAI or CMM
  outcomes into versioned reusable recipes. Research supports the timing:
  AI CAM is already trusted in production, machine-shop output is growing while
  labor remains constrained, and traceability requirements make informal
  travelers harder to defend. The go-to-market system should stay event-driven:
  founder-led sales after a retirement, machine launch, or program ramp,
  followed by a paid pilot on one recurring part family and annual pricing by
  active machine count plus modules. Modeled market size is promising but still
  assumption-heavy at about $0.8B TAM, $272.6M SAM, and $6.3M year-3 SOM
  because no source directly counts how many shops match the repeat-volume
  beachhead. The company can win if it remains an overlay, connects programming
  to quality approval better than CAM or ERP or QMS incumbents, and proves that
  recipe reuse reduces lead-programmer interruptions and machine-transfer time.
  The biggest disconfirming risks are weak documentation discipline, security
  requirements that force bespoke deployment, and incumbent CAM or quality
  vendors extending upstream before the startup builds a sticky recipe graph.
problem:
  - AI CAM is making first-pass code faster, but shops still rely on senior programmers, setup binders, and ad hoc notes to get a first article through prove-out and to repeat it later.
  - When a recurring part moves to another machine, another shift, or a junior programmer, teams re-learn feeds, tooling substitutions, fixture choices, and inspection steps by hand, creating schedule risk and expert interruption.
  - Retirements, labor shortages, and aerospace traceability requirements turn missing process memory from an efficiency problem into a continuity and compliance problem.
solution:
  - Build an overlay workflow that ingests CAM revisions, setup sheets, structured prove-out checklists, tooling changes, and FAI or CMM outcomes, then turns approved deltas into versioned recipes tied to machine family, material, fixture, and quality result.
  - Start with exported files and structured capture on one recurring part family so customers can prove faster repeat lots and safer machine transfers before the company adds deeper CAM, MES, or CMM integrations.
  - Generate release-ready setup and inspection instructions that show what is reusable, what must be requalified, and who approved each recipe change.
whyWeWin:
  - The company sits in the gap between CAM automation and systems of record, owning the approved post-prove-out learning that incumbents rarely link across programming, setup, and quality.
  - The buyer trigger is event-driven because a retirement, new 5-axis cell, or recurring-program ramp makes manual knowledge transfer visibly risky and expensive.
  - Every accepted override, inspection outcome, and transfer event compounds into a recipe graph that gets more useful across similar parts, machines, and shifts.
strategicChoices:
  beachhead: >-
    U.S. precision contract machine shops with 25-60 CNC machines and 5-axis
    capacity machining recurring titanium, Inconel, and aluminum brackets,
    housings, or fixtures for spaceflight, defense-adjacent, and motorsport
    programs.
  wedgeRationale: >-
    This entry point creates faster proof than broader manufacturing AI because
    one part-family workflow has a visible buyer, a concrete trigger, and
    measurable outputs in repeat-lot release time, machine-transfer
    qualification time, and lead-programmer interruptions avoided. Selling all
    machining documentation or all AI CAM workflows first would force the
    company into diffuse feature requests before it earns trust on one painful
    job.
  sequencingRationale: >-
    Product should start with export-first capture, recipe versioning, and
    quality-linked approval on one part family because that is the minimum scope
    required to prove value without a brownfield integration project. GTM should
    stay founder-led and event-driven until the company knows which triggers,
    deployment model, and connectors convert fastest. Hiring follows that same
    order: core engineering and CNC workflow expertise first, onboarding and
    partner support next, and scaled sales only after pilot-to-production
    conversion is referenceable.
  notYet:
    - Autonomous CAM or toolpath generation
    - Full MES or ERP replacement
    - Low-mix prototype-only shops with little repeat volume
    - Medical and general industrial expansion before 3-5 aerospace or motorsport production references
market:
  tam: "$0.8B modeled TAM based on 12,981 U.S. machine shops, about 15 active machines per broadly addressable shop, and roughly $4,000 annual spend per machine."
  sam: "$272.6M modeled SAM based on about 15% of U.S. shops fitting the 25-60-machine regulated recurring-part profile, at roughly 35 machines per site."
  som: "$6.3M modeled year-3 SOM based on 45 beachhead shops at roughly 35 machines per site and about $4,000 annual spend per machine."
  segments:
    - U.S. precision contract machine shops serving spaceflight, defense-adjacent, motorsport, and high-spec industrial programs
    - Captive machining groups and multi-site OEM suppliers moving recurring part families across cells or plants
  buyingProcess: >-
    The motion starts when a retirement, new machine launch, or program ramp
    exposes how much prove-out knowledge still lives in one person or in
    scattered travelers. The sponsor is usually the head of CNC programming or
    manufacturing engineering, budget is approved by a plant GM or VP
    Manufacturing Engineering, and regulated accounts often add IT or
    compliance review before a paid pilot can go live.
product:
  mvp: >-
    MVP is an export-first recipe workspace for one recurring part family. It
    should capture CAM diffs, prove-out checklist entries, tooling
    substitutions, setup instructions, and FAI or CMM outcomes, then recommend
    reusable recipe elements and produce approval-ready setup and inspection
    packets.
  sixMonth: >-
    Sign 2-3 design partners, ship recipe versioning plus structured prove-out
    capture and FAI-linked approval workflow, and prove one pilot can create a
    reusable recipe without deep system integrations.
  twelveMonth: >-
    Convert 2-3 paid pilots into 1-2 production accounts, add priority
    connectors for one CAM system and one quality data source, and launch a
    private VPC deployment option for regulated customers.
  twentyFourMonth: >-
    Become the system of record for repeat-lot and machine-transfer recipe
    reuse inside the beachhead, then expand into multi-site transfer workflows
    and adjacent quoting or DFM intelligence modules.
  keyBets:
    - Exported files plus structured checklists are enough to prove value before full integrations.
    - Senior programmers will contribute if the product preserves authorship, approval control, and recipe lineage.
    - FAI and CMM outcomes are strong enough proof signals to make reuse recommendations auditable.
    - One part-family pilot can expand to more machines and recurring programs inside the same shop before new-logo sales need to scale.
gtm:
  wedge: >-
    Sell immediately after a retirement risk, new 5-axis cell, or recurring
    program volume increase makes one shop prove the same part on more than one
    machine or shift.
  channels:
    - Founder-led outbound to heads of CNC programming, manufacturing engineering leaders, and plant GMs at 25-60-machine shops
    - Referral and co-sell motions with CAM resellers, metrology integrators, and MTConnect or machine-data partners
    - Paid pilots tied to one recurring part family inside an aerospace, motorsport, or high-spec industrial program
  funnelTargets: "Target account→qualified pilot 20-30%, qualified pilot→paid pilot 30-40%, paid pilot→production 50%+, production→second machine family or second-shift rollout within 6 months 60%+"
  pricing: >-
    Charge a paid pilot on one recurring part family, then annual subscription
    priced by active CNC machine count and recipe-workflow modules plus
    onboarding for connector setup and prove-out template design. This matches a
    buyer who feels value each time a proven recipe is reused on one more
    machine, shift, or transfer.
businessModel:
  revenueStreams:
    - Annual subscription for recipe-memory workflow priced by active machine count and modules
    - Paid onboarding for CAM, CMM, or MES export mapping and prove-out template design
    - Expansion modules for multi-site transfer analytics, benchmark reporting, and supplier collaboration
  unitOfValue: Active CNC machine managed through the recipe-memory workflow
  targetGrossMarginPct: 70
  expansionLevers:
    - Add more machines, shifts, and recurring part families within the first shop
    - Expand from single-site reuse into cross-site and sister-cell transfer governance
    - Add quoting, DFM, and process-benchmark intelligence once the recipe graph is trusted
strategyMap:
  northStarMetric: Recurring part families launched from approved reusable recipes without lead-programmer intervention
  inputMetrics:
    - Days from first-article pass to approved reusable recipe
    - Percentage of repeat lots launched without senior-programmer escalation
    - Median time to qualify a machine or shift transfer
    - Paid pilot to production conversion rate
    - Active machines and part families per production account
  moatsToBuild:
    - Cross-system recipe graph linking CAM edits, tooling choices, setup context, and FAI or CMM outcomes
    - Benchmark dataset on which overrides recur by machine family, material, fixture, and programmer level
    - Compliance-ready lineage, authorship, and approval history for regulated machining programs
  killCriteria:
    - Fewer than 3 of the first 8 paid pilots convert to production within 12 months
    - Median repeat-lot or transfer qualification time improves by less than 20% after the first 3 production deployments
    - More than 50% of qualified regulated prospects require bespoke on-prem or connector work that breaks the 70% gross-margin path
    - Production accounts expand to a second machine family or shift in fewer than 40% of cases within 6 months
  mermaid: |
    flowchart LR
      Wedge[Recipe reuse wedge] --> MVP[Export-first memory layer]
      MVP --> Proof[Faster repeat lots and transfers]
      Proof --> Expansion[More machines sites and quoting intelligence]
investorMemo:
  verdict:
    call: "Meet / investigate further"
    conviction: Moderate conviction if early customers fund the overlay at roughly $120k-plus ARR and deployment stays export-first or private-VPC rather than bespoke on-prem.
    whyBelieve: The company targets a retirement-driven and traceability-sensitive bottleneck where one captured recipe can reduce prove-out delay, expert interruption, and transfer risk across multiple recurring lots.
    whyDoubt: The beachhead may be narrower than modeled and CAM, ERP or QMS, or quality vendors could bundle enough adjacent functionality to cap standalone budget.
    nextDiligence: Secure 2 paid pilots in the target size band and prove at least one converts to production with a 20%-plus reduction in repeat-lot or transfer qualification time.
  firstCustomer:
    title: Head of CNC programming at a 30-50-machine aerospace supplier
    profile: A U.S. precision job shop machining recurring titanium or aluminum brackets and housings, with one senior programmer nearing retirement and junior staff covering second-shift prove-outs.
    trigger: A lead programmer retirement, a new 5-axis cell, or an OEM volume ramp forces the shop to reuse a proven process across more machines or shifts.
    buyer: VP Manufacturing Engineering or Plant GM
    initialContract: "$25k-$50k paid pilot on one recurring part family, converting to roughly $120k-$180k ARR plus onboarding as 30-50 machines and additional recipe modules go live."
  mustBeTrue:
    - At least half of qualified 25-60-machine shops run enough recurring part families and transfers to justify roughly $120k-$180k ARR for process memory.
    - Exported CAM files, structured prove-out checklists, and FAI or CMM outcomes can create a reusable recipe within 6 weeks without deep integrations.
    - Senior programmers accept an author-and-approver workflow and keep using the product on live jobs rather than reverting to side notes.
    - At least 50% of paid pilots convert to production and 60%-plus of production accounts expand to another machine family, shift, or part family within 6 months.
    - CAM, ERP or QMS, and quality vendors do not ship equivalent cross-stack recipe reuse and lineage fast enough to erase the wedge in 24 months.
  diligenceQuestions:
    - How many target shops have repeat-part volume and transfer frequency high enough for a standalone overlay budget?
    - Which input creates the fastest first proof: CAM revision diffs, structured prove-out checklists, or FAI or CMM import?
    - What deployment posture will the first 10 qualified aerospace and defense-adjacent prospects actually require?
    - Who owns budget when the trigger happens inside the shop?
    - What KPI threshold turns a paid pilot into plant-wide production budget?
operatingAssumptions:
  - assumption: Enough 25-60-machine regulated job shops have recurring part volume and transfer frequency to support a focused beachhead.
    basis: research.yaml
    validationTest: Interview 20 target shops and confirm at least 10 have a recent transfer or repeat-lot launch that depended on senior-programmer intervention and could support roughly $120k ARR.
    decisionImpact: If false, narrow the segment to a smaller number of aerospace and motorsport shops with denser repeat volume and lower the initial ACV target.
  - assumption: Exported CAM files, structured prove-out capture, and FAI or CMM attachments can deliver first value before deep integrations are complete.
    basis: idea.yaml
    validationTest: Deliver the first 3 pilots using exports plus one narrow connector and achieve first usable recipe output in 6 weeks or less.
    decisionImpact: If false, engineering must prioritize deeper integrations earlier, increasing burn and delaying GTM hiring.
  - assumption: Most early regulated accounts will accept secure cloud or private VPC deployment rather than bespoke on-prem from day one.
    basis: research.yaml
    validationTest: During 10 qualified sales cycles, document required deployment posture and secure at least 3 buyers willing to pilot on the supported architecture.
    decisionImpact: If false, roadmap and funding must shift toward heavier infrastructure and a smaller initial account set.
  - assumption: Senior programmers will contribute recipes if the system preserves authorship, approval control, and reuse credit.
    basis: idea.yaml
    validationTest: In the first 3 pilots, keep recipe-approval participation above 80% for designated experts and measure whether side-note usage declines over the first 60 days.
    decisionImpact: If false, reposition the product toward documentation capture and analytics before recommendation-heavy workflows.
  - assumption: Buyers will budget process memory at roughly $4,000 per active machine per year once one part-family pilot proves ROI.
    basis: research.yaml
    validationTest: Test pricing in at least 8 procurement conversations and convert 2 paid pilots at pricing that implies at least $120k ARR for a 30-50-machine shop.
    decisionImpact: If false, pricing and packaging must shift toward narrower part-family subscriptions or more services-heavy implementations, reducing margin potential.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Interview 15 heads of programming, manufacturing engineering leaders, and plant GMs in the target size band.
    hypothesis: Retirement risk and machine-transfer pain are urgent enough to support an event-driven paid pilot motion.
    successMetric: At least 10 interviews document a recent repeat-lot or transfer delay and 5 share baseline cycle-time or interruption data.
    owner: CEO
  - horizon: 0–90 days
    experiment: Reconstruct 3 historical first-article jobs manually using exported CAM files, notes, and FAI records.
    hypothesis: A useful recipe artifact can be created from existing exports before deep integrations are built.
    successMetric: Three prospects receive a reusable recipe package and at least 1 signs a paid pilot SOW or LOI.
    owner: Founding eng
  - horizon: 90–180 days
    experiment: Deploy the first paid pilot on one recurring part family using structured prove-out checklists and one quality-data input.
    hypothesis: One narrow workflow can cut repeat-lot or transfer qualification time without replacing the CAM stack.
    successMetric: Pilot creates a reusable approved recipe within 6 weeks and shows at least 20% faster repeat-lot or transfer readiness than the prior process.
    owner: CNC solutions lead
  - horizon: 90–180 days
    experiment: Compare CAM diffs, operator notes, and FAI or CMM outcomes across 20 historical jobs to rank which signals best predict safe reuse.
    hypothesis: Quality outcomes plus structured prove-out capture are more defensible than note capture alone.
    successMetric: One signal combination explains most successful repeat runs and becomes the default data model for v1.
    owner: Product engineer
  - horizon: 6–12 months
    experiment: Run security and deployment reviews with 3 regulated prospects using a standard private VPC and audit-trail package.
    hypothesis: The company can clear most beachhead objections without a bespoke on-prem product.
    successMetric: Three prospects approve the standard deployment package with no material architecture changes.
    owner: Solutions engineer
  - horizon: 6–12 months
    experiment: Launch one partner-assisted pilot with a CAM reseller or metrology integrator.
    hypothesis: A trusted workflow partner can shorten sales and onboarding once the company has one referenceable pilot outcome.
    successMetric: One partner-sourced pilot closes faster than founder-sourced baseline and reaches production scope.
    owner: CEO
  - horizon: 12–18 months
    experiment: Expand the first production account to a second machine family or second shift.
    hypothesis: Land-and-expand within one shop is cheaper and faster than winning a new logo after the first recipe proves out.
    successMetric: First production account adds a second workflow within 6 months and cites reduced expert interruption as the reason to expand.
    owner: Account lead
operations:
  - Maintain secure export ingestion, role-based access, and audit logging for CAM, traveler, and quality artifacts.
  - Run a controlled taxonomy for recipe versioning, machine and material matching, approval states, and reuse decisions.
  - Instrument prove-out, repeat-lot launch, and transfer KPIs on every pilot so renewal is tied to measured operational gain.
  - Maintain ITAR and CMMC-aware deployment review playbooks, including a standard private VPC option.
  - Train CAM and metrology partners on pilot packaging without giving away ownership of recipe data and customer workflow.
team:
  - role: CEO
    startTiming: Month 0
    rationale: Own design-partner selling, buyer discovery, and partner recruiting in a concentrated industrial market.
  - role: Founding eng
    startTiming: Month 0
    rationale: Build export ingestion, recipe graph, versioning, and auditability before the company broadens scope.
  - role: CNC solutions lead
    startTiming: Month 1
    rationale: Translate prove-out behavior, setup workflows, and quality approval steps into a workflow buyers trust.
  - role: Product engineer
    startTiming: Month 3
    rationale: Turn concierge recipe capture into repeatable product surfaces and narrow integrations without custom software drift.
  - role: Solutions engineer
    startTiming: Month 6
    rationale: Reduce onboarding time across CAM, quality, and machine-data environments and support secure deployments.
  - role: Account lead
    startTiming: Month 12
    rationale: Add repeatable pipeline and expansion management only after pilot-to-production conversion and reference accounts are proven.
milestones:
  - horizon: 0–12 months
    items:
      - Sign 2-3 design partners in the 25-60-machine beachhead
      - Launch 2 paid pilots on recurring part families and convert at least 1 to production
      - Ship export-first recipe versioning, structured prove-out capture, FAI or CMM attachment, and approval workflow
      - Prove at least 20% reduction in repeat-lot or transfer qualification time on a live account
      - Standardize a private VPC and security review package for regulated prospects
  - horizon: 12–24 months
    items:
      - Reach 5-8 production accounts and expand at least 3 into a second machine family or shift
      - Add priority connectors for one CAM platform, one quality system, and MTConnect-style machine context
      - Launch benchmark reporting and multi-site transfer workflow for the first larger accounts
      - Establish 2 partner-sourced pipeline channels with CAM or metrology integrators
  - horizon: 24–36 months
    items:
      - Reach 12-15 production customers and manage recipe workflows across more than 400 active machines
      - Win the first captive machining group or multi-site OEM account
      - Pilot quoting or DFM intelligence powered by the accumulated recipe graph
risks:
  - risk: Senior programmers may resist a product that appears to codify or monitor the know-how that gives them leverage.
    likelihood: Medium
    impact: High
    mitigation: Make experts the authors and approvers of recipes, preserve attribution, and tie success metrics to reduced interruption and training burden rather than headcount replacement.
  - risk: Source data is fragmented across CAM files, travelers, photos, notes, and quality systems, turning onboarding into a slow integration project.
    likelihood: High
    impact: High
    mitigation: Start with one part family, export-first capture, and a narrow quality-data input, then add integrations only after proving which signals matter most.
  - risk: ITAR, CMMC, or customer security reviews may force private deployment and lengthen sales cycles in the best-funded beachhead accounts.
    likelihood: Medium
    impact: High
    mitigation: Build a standard private VPC option, minimize technical-data exposure, and package audit controls early so security review does not become bespoke work.
  - risk: CAM, ERP or QMS, and quality vendors may bundle lightweight post-prove-out capture before the startup earns enough data advantage.
    likelihood: Medium
    impact: High
    mitigation: Win on cross-vendor workflow depth, quality-linked reuse recommendations, and measurable transfer analytics that incumbents do not naturally own together.
  - risk: The modeled beachhead may overstate how many shops have enough repeat volume to justify standalone software budget.
    likelihood: Medium
    impact: High
    mitigation: Qualify rigorously on recurring part mix, transfer frequency, and buyer trigger before scaling outbound or hiring a larger GTM team.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2-4M"
  runwayMonths: 18
  useOfFundsSummary: >-
    Eighteen months of runway should fund the export-first product, the first
    engineering and CNC workflow hires, secure deployment capability, 2-3 paid
    pilots, 1-2 production conversions, and one partner-assisted channel before
    the company scales sales.
