slug: cnc-process-memory-os
date: '2026-06-17'
currency: USD
modelStartMonth: 2026-07
assumptions:
  - id: A1
    name: Model start month
    value: 2026-07
    unit: YYYY-MM
    source: "[business-plan.yaml date] first full operating month after the 2026-06-17 plan date."
  - id: A2
    name: Opening cash from pre-seed round
    value: '3200'
    unit: USDK
    source: "[business-plan.yaml fundingAsk.targetFundingRangeUsd] modeled near the middle of the stated $2-4M range and sized to reach the 12-24 month milestone plus a 6-month buffer."
  - id: A3
    name: Paid pilot price
    value: '30'
    unit: USDK/logo
    source: "[business-plan.yaml investorMemo.firstCustomer.initialContract] base case uses the middle of the stated $25k-$50k pilot range for one recurring part family."
  - id: A4
    name: Paid pilot duration
    value: '2'
    unit: months
    source: "[research.yaml reportMemo.validationPlan + business-plan.yaml experimentRoadmap 90-180 days] value is assumed to be proven within ~6 weeks, so a 2-month paid pilot is the leanest credible commercial motion."
  - id: A5
    name: Base production ARR per shop
    value: '140'
    unit: USDK/year
    source: "[research.yaml bottomUpSizingDrivers annual spend per active machine + business-plan.yaml market.som] 35 active machines x $4K per machine per year."
  - id: A6
    name: Mature blended production ARPU
    value: '153'
    unit: USDK/year
    source: "[business-plan.yaml businessModel.expansionLevers + gtm.funnelTargets] starts from $140K base ARR and adds ~9% blended module / second-workflow uplift as 60% of production accounts expand within 6 months."
  - id: A7
    name: Customer ramp
    value: 3 paying logos at Y1 exit, 6 production + 1 pilot at Y2 exit, 14 production at Y3 exit
    unit: customers
    source: "[business-plan.yaml milestones + investorMemo.mustBeTrue] matches 2-3 paid pilots and 1+ production conversion in Y1, 5-8 production accounts by 12-24 months, and 12-15 production customers by 24-36 months."
  - id: A8
    name: Gross margin target
    value: '70'
    unit: percent
    source: "[business-plan.yaml businessModel.targetGrossMarginPct] modeled as 30% COGS on recognized revenue."
  - id: A9
    name: Founder CEO loaded annual cash cost
    value: '180.0'
    unit: USDK/year
    source: "startup-finance heuristic: $150K salary plus 20% payroll tax and benefits for a pre-seed industrial SaaS founder."
  - id: A10
    name: Founding engineer loaded annual cash cost
    value: '200.4'
    unit: USDK/year
    source: "startup-finance heuristic: $167K salary plus 20% payroll tax and benefits for a senior product / integration engineer."
  - id: A11
    name: CNC solutions lead loaded annual cash cost
    value: '150.0'
    unit: USDK/year
    source: "[business-plan.yaml team] startup-finance heuristic for a senior domain expert bridging prove-out workflow and product."
  - id: A12
    name: Product engineer loaded annual cash cost
    value: '180.0'
    unit: USDK/year
    source: "startup-finance heuristic: $150K salary plus 20% payroll tax and benefits for an early product engineer."
  - id: A13
    name: Solutions engineer loaded annual cash cost
    value: '140.4'
    unit: USDK/year
    source: "[business-plan.yaml team] startup-finance heuristic for onboarding, connector support, and secure deployment work."
  - id: A14
    name: Account lead loaded annual cash cost
    value: '159.6'
    unit: USDK/year
    source: "[business-plan.yaml team] startup-finance heuristic for a first industrial SaaS account lead with variable comp."
  - id: A15
    name: Software engineer loaded annual cash cost
    value: '180.0'
    unit: USDK/year
    source: "startup-finance heuristic: same fully loaded cost as the product engineer for repeatable connector and workflow work."
  - id: A16
    name: AE / partnerships loaded annual cash cost
    value: '159.6'
    unit: USDK/year
    source: "[business-plan.yaml gtm.channels] startup-finance heuristic for the first partner-assisted seller after pilot proof."
  - id: A17
    name: CNC workflow specialist loaded annual cash cost
    value: '150.0'
    unit: USDK/year
    source: startup-finance heuristic for a second domain specialist added only after multiple production references exist.
  - id: A18
    name: Integration engineer loaded annual cash cost
    value: '180.0'
    unit: USDK/year
    source: startup-finance heuristic for a late Y3 engineering hire supporting broader connector depth.
  - id: A19
    name: Non-payroll operating spend
    value: R&D 10-16K, S&M 6-14K, G&A 7-9K per month by stage
    unit: USDK/month
    source: startup-finance heuristic for cloud tooling, travel, legal, insurance, and lean back-office support in an industrial software company.
  - id: A20
    name: Hiring timing
    value: Product eng M3, solutions eng M6, account lead M12, software eng M15, AE/partnerships M19, CNC specialist M29, integration eng M31
    unit: plan
    source: "[business-plan.yaml team + strategicChoices.sequencingRationale] first six roles match the plan, with later hires delayed until referenceable pilot-to-production conversion exists."
  - id: A21
    name: Monthly churn for unit economics
    value: '1.5'
    unit: percent
    source: startup-finance heuristic for sticky but still-early enterprise industrial workflow software with meaningful onboarding effort.
  - id: A22
    name: Blended CAC per new production customer
    value: '71.6'
    unit: USDK/customer
    source: calculated from model Y2-Y3 sales and marketing spend of $858.6K divided by 12 new production accounts.
  - id: A23
    name: Sales funnel guardrails
    value: 25% target-account to qualified-pilot, 35% qualified-pilot to paid-pilot, 55% paid-pilot to production
    unit: conversion
    source: "[business-plan.yaml gtm.funnelTargets] base case uses the midpoint of the stated funnel targets and stays just above the 50% pilot-to-production threshold."
  - id: A24
    name: Cash conversion timing
    value: EBITDA approximates operating cash flow
    unit: policy
    source: "startup-finance heuristic: no debt, capex, or material working-capital swings are modeled at this stage; cash collection risk is surfaced in sanityChecks.flags."
  - id: A25
    name: Funding milestone
    value: 6 production accounts, 3 second-workflow expansions, standard private-VPC package, and one partner-sourced pipeline channel
    unit: milestone
    source: "[business-plan.yaml milestones 12-24 months + fundingAsk.useOfFundsSummary] used to size the pre-seed ask and next-round proof point."
