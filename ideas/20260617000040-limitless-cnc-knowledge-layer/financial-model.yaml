modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Trigger[Retirement / machine launch] --> Pilot[Paid pilot]
      Pilot --> Production[Production rollout]
      Production --> Expansion[Second machine family / shift]
      Production --> Machines[Active machines]
      Expansion --> Revenue[Higher machine-count ARR]
      Machines --> Revenue
      Revenue --> GrossProfit[70% gross profit]
      GrossProfit --> Cash[Cash runway]
modelSanity:
  - checkName: Revenue engine
    finding: Base-case revenue comes mainly from turning one-part-family pilots into full-site machine-count subscriptions and then expanding within the same shop.
  - checkName: Must go right
    finding: The model needs standardized export-first or private-VPC deployment so paid pilots can keep converting above the 50% floor in the business plan.
  - checkName: Model breaks if
    finding: If ARPU slips about 10% or security reviews force bespoke deployments, ending cash gets too tight and the downside case goes negative before Y3 closes.
  - checkName: Next-round proof
    finding: The next financing story is 6 production accounts by Y2 exit and 14 by Y3 exit with 3 referenceable second-workflow expansions and more than 400 active machines.
sanityChecks:
  ruleOf40: Y3 growth 127% + EBITDA margin -47% = 80%.
  burnMultiple: Improves from 1.8x in Y2 to 0.8x in Y3 as within-shop expansion starts to outgrow the lean hiring plan.
  revenuePerFte: $172K Y3 on 10 year-end FTE (below the typical $200-400K SaaS benchmark, so the model still depends on higher ACV and partner leverage rather than broad sales hiring).
  flags:
    - The base case still exits Y3 with only about $311K of cash, so the next round must be in market before late Y3 even if milestones are on track.
    - Gross margin only holds if private-VPC deployment stays standardized; bespoke on-prem requirements would push the model toward the downside case.
    - Revenue efficiency is improving but still light for software because the company is carrying domain-heavy implementation talent before the category is fully proven.
    - EBITDA is not positive by Y3, so the investment case relies on referenceable expansion and machine-count density rather than near-term profitability.
