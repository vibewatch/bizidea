  - 38
- name: Pocket
  stage: scale-up
  wedge: 具备自定义工作流、Webhook 集成和企业管控的专用 AI 笔记硬件
  pricing: $129 device plus $199/year Pro plan; custom enterprise pricing
  strength: 设备需求已验证，现场用例清晰，工作流自动化超越简单转录
  weaknessVsUs: 设计上为横向通用，未进行坚固化，未映射建筑对象，且非 Procore 原生
  sourceRefs:
