market:
  tam:
    value: $2.2B
    rationale: >-
      自下而上估算：Data USA 的 901k 名美国建筑经理席位 × $2,388 年度 ARPU（$199/月）≈ $2.15B，取整为 $2.2B。
    isEstimate: true
    sourceRefs:
    - 10
    - 11
  sam:
    value: $322.0M
    rationale: >-
      对 901k 席位估算应用 15% 的滩头过滤器，对应已足够数字化、可运行结构化云端工作流的中端商业总承包商：
      约 135k 席位 × $2,388 ≈ $322M。
    isEstimate: true
    sourceRefs:
    - 10
    - 19
  som:
    value: $6.0M
    rationale: >-
      第 3 年可实现情景：125 家总承包商客户 × 每家 20 个付费席位 × $2,388 年度 ARPU = $5.97M，取整为 $6.0M。
    isEstimate: true
    sourceRefs:
    - 1
    - 19
    - 31
bottomUpSizingDrivers:
- driver: 总可寻址单元
  value: 901k 名美国建筑经理岗位，作为现场文档席位买家的估算代理
