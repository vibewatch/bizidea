  adoptionFrictionMatrix:
  - friction: 录音同意和工作场所政策审查
    severity: high
    affectedBuyer: 运营副总裁、IT、法务和人力资源
    mitigation: 明确将录音设置为用户触发，提供告知通知和基于角色的控制，并提供政策模板，其中保留受保护活动的豁免条款。
    sourceRefs:
    - 4
    - 16
    - 36
  - friction: 新硬件采购和设备队列管理
    severity: medium
    affectedBuyer: 建筑 IT 和运营
    mitigation: 从小规模试点、集中计费和简单替换物流开始，再要求买家进行大范围多项目铺开。
    sourceRefs:
    - 4
    - 6
    - 34
  - friction: 将输出映射到买家期望的精确 Procore 对象和字段结构
    severity: high
    affectedBuyer: 建筑 IT 和项目管控
    mitigation: 早期范围限定为日志、RFI 和缺陷条目；保持人工审批队列；及早追求 Marketplace 级别的集成质量。
    sourceRefs:
    - 13
    - 14
    - 18
    - 19
  - friction: 嘈杂、双手忙碌环境下的现场音频质量
    severity: high
    affectedBuyer: 总监和工长
    mitigation: 使用受约束的模板、位置/分项提示，以及巡查结束后的短暂复核流程，而不是尝试对每条语音自动提交。
    sourceRefs:
    - 1
    - 3
    - 6
