  - 40
- name: Raken
  stage: scale-up
  wedge: 现场优先的日报、RFI、照片和文档管理
  pricing: Custom quote
  strength: 清晰的现场 UX，在日报和文档规范化上定位鲜明
  weaknessVsUs: 仍依赖手动表单、照片和移动录入行为，而非专用 AI 采集硬件
  sourceRefs:
