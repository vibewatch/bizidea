  stage: scale-up
  wedge: 与 Procore 集成的自动化 360° 视觉工地文档
  pricing: Custom quote
  strength: 有力证明自动化采集能节省现场时间并适配现有 Procore 工作流
  weaknessVsUs: 采集视觉上下文，而非转化为 RFI、日志或缺陷条目的结构化口头观察
  sourceRefs:
  - 30
  - 31
regulatoryTechnicalConstraints:
- point: 企业买家仍需要结构化日志和报告用于审计和合规；仅有原始音频无法满足待完成的任务。
  sourceRefs:
  - 13
  - 25
  - 35
- point: 部署政策必须明确工作场所录音权利和豁免条款，而非依赖全面禁止录音的规定。
  sourceRefs:
  - 4
  - 16
  - 36
- point: 工地采集必须在嘈杂、移动、双手忙碌的条件下正常工作，并在审批后将输出映射到精确的项目对象。
  sourceRefs:
  - 1
  - 3
  - 6
  - 30
