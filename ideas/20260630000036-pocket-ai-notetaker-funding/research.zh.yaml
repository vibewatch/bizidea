  searchedQueries:
  - 查找关于美国商业建筑现场文档痛点、日志、RFI、缺陷清单、返工和变更令的权威近期来源，优先参考 AGC、Procore、Dodge、Autodesk、政府及行业媒体。
  - 查找 Procore 规模、App Marketplace、集成能力及与日志、RFI、观察记录、缺陷条目相关 API 能力的权威来源。
  - 查找建筑工地音频录音同意、工作场所录音政策、OSHA/NLRB 指引及现场语音采集部署风险的权威来源。
  - 查找企业级 AI 笔记硬件以及手动触发录音与全天候录音工作流的权威来源，包括 Pocket 和 Plaud。
  - 查找 Raken、Fieldwire、OpenSpace、Buildots、Procore 等建筑现场文档和工地采集软件替代方案的权威来源。
  - 查找美国建筑市场规模、建筑经理或现场主管人数及与软件相关的企业数量的权威来源。
  - 抓取 Raken、Fieldwire、OpenSpace、Buildots、Procore、Otter、Fireflies、Plaud 和 Pocket 的主站点地图和产品页面，构建经验证的审计语料库。
  - 获取通用笔记工具和现场报告套件的公开定价、安全及集成页面，以锁定付费意愿基准和替代品映射。
  - 获取量化工时损失、进度滑点、文档缺口或报告负担的基准数据、案例研究和工作流页面。
