slug: construction-field-ai-scribe
date: '2026-06-30'
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: Model start month
  value: 2026-07
  unit: YYYY-MM
  source: '[BP date 2026-06-30] the model starts in the first full month after the dated business plan.'
- id: A2
  name: Opening cash / seed raise
  value: $3.0M
  unit: USD
  source: '[BP fundingAsk targetFundingRangeUsd $2–4M + BP fundingAsk runwayMonths 18] the base case uses a midpoint seed sized to reach the 25-customer proof point and still carry six months of buffer.'
- id: A3
  name: Starting paying customers
  value: '0'
  unit: count
  source: '[BP milestones 0–12 months] the company begins pre-revenue and must win its first paid pilots before production revenue appears.'
- id: A4
  name: Paying customer definition
  value: A paid pilot or production GC account
  unit: definition
  source: '[BP gtm.pricing + BP businessModel.revenueStreams] customersEop includes any GC already paying for pilots, subscriptions, or bundled deployment scope.'
- id: A5
  name: Seat price
  value: $199 per device per month
  unit: USD/device/month
  source: '[BP gtm.pricing + BP businessModel.revenueStreams] this is the list price for the bundled hardware, software, and Procore sync offer.'
- id: A6
  name: Average account deployment ramp
  value: Pilot accounts start near 5–8 devices and mature toward ~25 devices by Q4Y2 and ~26 devices by Q4Y3
  unit: devices/account
  source: '[BP market.segments 50–250 field crew + BP milestones $1.5M ARR on 25 customers and $6M ARR on 100 customers + Research market.som] the ARR milestones imply roughly mid-20s billed field-supervisor seats per paying GC.'
- id: A7
  name: Customer ramp
  value: 3 paying accounts by M12, 25 by Q4Y2, 100 by Q4Y3
  unit: customersEop
  source: '[BP milestones 0–12, 12–24, and 24–36 months + Research market.som] the model matches the stated 25-customer year-2 proof point and the 100-customer year-3 ambition.'
- id: A8
  name: Revenue recognition convention
  value: Period-end customers multiplied by blended realized revenue per active account in that period
  unit: formula
  source: '[BP gtm.pricing + BP businessModel.unitOfValue] landing months carry a higher blended per-account figure because onboarding/setup fees and pilot pricing are included in realized account revenue.'
- id: A9
  name: Gross margin ramp
  value: 45–55% in Y1, 60–68% in Y2, and 70–72% in Y3
  unit: gross margin percent
  source: '[BP businessModel.targetGrossMarginPct 70 + Research reportMemo.willingnessToPay + startup-finance heuristic] early hardware, support, and model-inference costs compress margin until deployments standardize.'
- id: A10
  name: Sales cycle / conversion
  value: Outbound qualified-to-pilot 25–35%, pilot-to-production 50%+, with post-dispute cycles near 4–6 weeks
  unit: funnel
  source: '[BP gtm.funnelTargets + BP operatingAssumptions] the customer ramp assumes the dispute-triggered wedge really shortens the enterprise timeline.'
- id: A11
  name: Hiring timeline
  value: Founder CEO + CTO + software engineer in M1; first AE in M4; first CS/solutions hire in M7; ops/compliance and third engineer in M13; second AE in M16; second CS in M19; fourth engineer in M25; third AE in M28; third CS in M31
  unit: timeline
  source: '[BP team + BP fundingAsk.useOfFundsSummary + BP milestones] hiring stays product-first in Y1, then adds deployment and sales capacity once pilots convert.'
- id: A12
  name: Founder loaded compensation
  value: $140K
  unit: USD/year
  source: '[startup-finance heuristic] lean founder cash compensation with payroll taxes and benefits for an early seed-stage company.'
- id: A13
  name: Engineering loaded compensation
  value: CTO $200K; additional engineers $180K
  unit: USD/year
  source: '[BP team critical-path hardware + Procore integration scope + startup-finance heuristic] senior embedded, ML, and integration talent is required from day one.'
- id: A14
  name: Sales loaded compensation
  value: $180K
  unit: USD/year
  source: '[BP team Head of Sales / Founding AE + startup-finance heuristic] includes base pay, variable comp, and construction travel for early enterprise selling.'
- id: A15
  name: Customer success / solutions loaded compensation
  value: $145K
  unit: USD/year
  source: '[BP team Customer Success / Solutions Engineer + startup-finance heuristic] assumes technical onboarding and deployment ownership, not a large services bench.'
- id: A16
  name: Operations / G&A loaded compensation
  value: $125K
  unit: USD/year
  source: '[BP fundingAsk.useOfFundsSummary first production run + SOC 2 + startup-finance heuristic] covers lean hardware ops, vendor management, and compliance coordination.'
- id: A17
  name: Payroll allocation to P&L
  value: Founder 60% S&M and 40% G&A; engineering 100% R&D; sales 100% S&M; customer success 60% S&M and 40% R&D; ops 100% G&A
  unit: allocation
  source: '[BP team role rationales + BP operations] this maps headcount cost into the functional P&L lines.'
- id: A18
  name: Non-payroll opex ramp
  value: Monthly non-payroll spend rises from roughly S&M/R&D/G&A $4K/$12K/$6K in early Y1 to $25K/$31K/$15K by Q4Y3
  unit: USD/month
  source: '[BP operations + BP fundingAsk.useOfFundsSummary + startup-finance heuristic] covers travel, cloud/model inference, insurance, legal, certification, and marketplace support.'
- id: A19
  name: Cash conversion convention
  value: Cash movement equals EBITDA
  unit: formula
  source: '[startup-finance heuristic] taxes, debt, depreciation, and working-capital timing are assumed immaterial in the stage model, though hardware inventory could move actual cash modestly earlier.'
- id: A20
  name: Steady-state monthly churn
  value: 1.8%
  unit: percent per month
  source: '[startup-finance heuristic for early vertical workflow SaaS] construction workflow stickiness supports low churn, but the model stays more conservative than mature enterprise SaaS.'
- id: A21
  name: CAC convention
  value: Y2 sales and marketing spend divided by 22 net new paying customers
  unit: formula
  source: '[model calc using base-case S&M spend + BP milestones 25 customers by 12–24 months] CAC is based on the year when the company proves repeatable GTM, not the founder-led pre-pilot period.'
- id: A22
  name: Funding sizing milestone
  value: Reach 25 paying GC customers, about 625 active devices, Procore Marketplace certification, and ~$1.5M exit ARR with six months of cash buffer
  unit: milestone
  source: '[BP milestones 12–24 months + BP fundingAsk.useOfFundsSummary + model cash curve] this is the seed-round proof point used to size the raise.'
