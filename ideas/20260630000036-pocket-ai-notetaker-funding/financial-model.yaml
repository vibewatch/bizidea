scenarios:
  downside:
    description: Sales cycles revert closer to normal construction software timing, average deployed seats stall below plan, and support-heavy hardware rollouts delay margin improvement.
    y3RevenueK: 3080.0
    y3EbitdaK: -240.0
    cashLowPointK: 220.0
    keyAssumptionChanges:
    - Q4Y3 customersEop lands near 70 instead of 100.
    - Average account deployment settles closer to 20 devices than the base-case mid-20s.
    - Gross margin only reaches the high-60s because field support and replacement hardware stay elevated.
  base:
    description: The post-dispute wedge keeps sales cycles short enough to reach 25 paying GCs by Y2 exit, while average deployments scale to the mid-20s devices per account and gross margin clears 70% in Y3.
    y3RevenueK: 4284.0
    y3EbitdaK: 414.2
    cashLowPointK: 503.9
    keyAssumptionChanges:
    - 3 paying accounts by M12, 25 by Q4Y2, and 100 by Q4Y3.
    - Average deployments reach about 25 devices per GC by Q4Y2 and about 26 by Q4Y3.
    - Gross margin ramps from the mid-40s in pilot year to roughly 72% by Q4Y3.
  upside:
    description: Marketplace credibility and referenceable pilots accelerate logo adds, device counts per GC expand faster, and standardized installs let gross margin beat plan.
    y3RevenueK: 5250.0
    y3EbitdaK: 930.0
    cashLowPointK: 650.0
    keyAssumptionChanges:
    - Q4Y3 customersEop reaches roughly 115 instead of 100.
    - Average deployment expands toward 28 devices per GC as multi-project rollouts happen earlier.
    - Gross margin reaches the mid-70s because support and replacement costs fall faster than expected.
sensitivity:
- variable: ARPU
  downsideCase: Average deployed seats per GC settle near 20 and realized account ARPU ends about 12% below plan.
  baseCase: Exit account ARPU reaches about $62.4K annualized as deployments reach the mid-20s devices per GC.
  upsideCase: Expansion and multi-project rollouts lift realized account ARPU about 10% above plan.
  y3RevenueImpactK: -514.0
  cashImpactK: -360.0
- variable: CAC
  downsideCase: Referenceability arrives late and CAC rises into the low-$40Ks per paying GC.
  baseCase: CAC stays near $31.7K using Y2 sales and marketing spend over 22 net new accounts.
  upsideCase: Procore referrals and post-dispute targeting push CAC into the mid-$20Ks.
  y3RevenueImpactK: -120.0
  cashImpactK: -250.0
- variable: churn
  downsideCase: Monthly churn drifts toward 3.0% if buyers trial the device but do not standardize it across projects.
  baseCase: Monthly churn holds near 1.8% once the workflow becomes part of daily logs and RFI creation.
  upsideCase: Monthly churn stays near 1.0% when approved-record data and integration workflows become sticky.
  y3RevenueImpactK: -230.0
  cashImpactK: -170.0
- variable: sales cycle
  downsideCase: The buying cycle stretches toward 10-12 weeks and pushes pilot starts across quarter boundaries.
  baseCase: Post-dispute urgency keeps median cycles around the BP 4-6 week wedge.
  upsideCase: Reference pilots and Marketplace trust compress the cycle toward 3-4 weeks.
  y3RevenueImpactK: -620.0
  cashImpactK: -430.0
- variable: gross margin
  downsideCase: Gross margin stalls near 68% because support, inference, and hardware replacement remain heavy.
  baseCase: Gross margin reaches roughly 72% by Q4Y3.
  upsideCase: Gross margin reaches 75%+ as installs and support tooling standardize.
  y3RevenueImpactK: 0.0
  cashImpactK: -260.0
- variable: hiring pace
  downsideCase: The second AE, second CS, and fourth engineer are all pulled forward by one to two quarters before proof is visible.
  baseCase: Hiring follows the product-first then scale-capacity sequence in BP team and funding-ask notes.
  upsideCase: The last two scale hires wait until after Q2Y3 without hurting execution.
  y3RevenueImpactK: 90.0
  cashImpactK: -310.0
modelDiagram:
  title: unit economics flow
  mermaid: |-
    flowchart LR
      Trigger[Post-dispute trigger] --> Pilot[Paid pilot]
      Pilot --> Account[Production GC account]
      Account --> Seats[Active devices per GC]
      Seats --> Revenue[Subscription + onboarding revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash and runway]
modelSanity:
- checkName: Revenue engine
  finding: Base revenue comes from scaling from 3 paid accounts in Y1 to 25 by Y2 exit and 100 by Y3 exit while each GC standardizes roughly 25 to 26 billed field-supervisor devices.
- checkName: Must go right
  finding: The Procore-native workflow and solutions onboarding must stay repeatable enough that gross margin can cross 70% as deployments move from pilots to fleet rollouts.
- checkName: Model breaks if
  finding: If sales cycles drift back toward normal 6-12 month construction software timing or average deployments stall below about 20 devices per GC, downside cash falls toward the low-$200Ks.
- checkName: Next-round proof
  finding: The next financing story is 25 paying GCs, about 625 active devices, Marketplace credibility, and a visible path from the Q4Y2 $1.5M ARR proof point into positive H2Y3 EBITDA.
sanityChecks:
  ruleOf40: Y3 growth 368.5% + EBITDA margin 9.7% = 378.2%
  burnMultiple: Y2 burn multiple is about 1.0x using roughly $1.3M of EBITDA burn against about $1.34M of net new ARR; H2Y3 turns cash generative.
  revenuePerFte: $357K Y3 on 12 ending FTE (benchmark $200–400K SaaS)
  flags:
  - The BP 24–36 month milestone combines $6M ARR with 1,000+ active devices, but at $199 per device per month that ARR level actually requires roughly 2,500 billed devices unless account expansion or add-on pricing is materially higher.
  - customersEop includes paid pilots as well as production subscriptions through Y1, so early logo count is ahead of true production-logo count.
  - Cash is proxied by EBITDA, which likely understates working-capital needs for the planned first production run of hardware and replacement inventory.
  - The base case assumes the post-dispute trigger really compresses enterprise buying cycles; if it does not, the seed ask likely needs to move toward the top of the stated BP range.
