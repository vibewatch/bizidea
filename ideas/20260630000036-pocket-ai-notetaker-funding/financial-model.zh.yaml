scenarios:
  downside:
    description: 销售周期回归接近正常建筑软件时长，平均部署席位低于计划，繁重支持的硬件上线延缓毛利率改善。
    y3RevenueK: 3080.0
    y3EbitdaK: -240.0
    cashLowPointK: 220.0
    keyAssumptionChanges:
    - Q4Y3 期末客户数约 70 家，而非 100 家。
    - 平均账户部署稳定在约 20 台设备，而非基础情景的 20 多台。
    - 毛利率因现场支持和替换硬件居高不下，仅达到 60% 高区间。
  base:
    description: 争议后切口让销售周期足够短，在第 2 年末达到 25 家付费总承包商，平均部署扩展到每账户 20 多台设备，毛利率在第 3 年超过 70%。
    y3RevenueK: 4284.0
    y3EbitdaK: 414.2
    cashLowPointK: 503.9
    keyAssumptionChanges:
    - M12 时 3 家付费账户，Q4Y2 时 25 家，Q4Y3 时 100 家。
    - 平均部署到 Q4Y2 达到约每家总承包商 25 台，到 Q4Y3 约 26 台。
    - 毛利率从试点年中 40% 中段爬升至 Q4Y3 约 72%。
  upside:
    description: Marketplace 可信度和可参考试点加速新客户增长，每家总承包商设备数更快扩展，标准化安装让毛利率超出计划。
    y3RevenueK: 5250.0
    y3EbitdaK: 930.0
    cashLowPointK: 650.0
    keyAssumptionChanges:
    - Q4Y3 期末客户数约 115 家，而非 100 家。
    - 平均部署随多项目铺开提前，扩展至每家总承包商约 28 台设备。
    - 毛利率达到 70% 中段，因支持和替换成本下降快于预期。
sensitivity:
- variable: ARPU
  downsideCase: 每家总承包商平均部署席位稳定在约 20 台，已实现账户 ARPU 低于计划约 12%。
  baseCase: 退出账户 ARPU 随部署达到每家总承包商 20 多台，年化约 $62.4K。
  upsideCase: 扩展和多项目部署将已实现账户 ARPU 提升至计划以上约 10%。
  y3RevenueImpactK: -514.0
  cashImpactK: -360.0
- variable: CAC
  downsideCase: 可参考性来得较晚，每家付费总承包商 CAC 上升至 $40K 低区间。
  baseCase: 使用第 2 年销售与营销支出除以 22 个净新增账户，CAC 维持约 $31.7K。
  upsideCase: Procore 推荐和争议后锁定将 CAC 压至 $20K 中段。
  y3RevenueImpactK: -120.0
  cashImpactK: -250.0
- variable: churn
  downsideCase: 若买家试用设备但未在项目间标准化，月度流失率漂移至 3.0%。
  baseCase: 一旦工作流成为日志和 RFI 创建的日常习惯，月度流失率维持约 1.8%。
  upsideCase: 经审批记录数据和集成工作流形成粘性后，月度流失率维持约 1.0%。
  y3RevenueImpactK: -230.0
  cashImpactK: -170.0
- variable: sales cycle
  downsideCase: 采购周期延长至 10–12 周，将试点启动推过季度边界。
  baseCase: 争议后紧迫感将中位周期维持在商业计划书 4–6 周切口附近。
  upsideCase: 参考试点和 Marketplace 信任将周期压缩至 3–4 周。
  y3RevenueImpactK: -620.0
  cashImpactK: -430.0
- variable: gross margin
  downsideCase: 毛利率因支持、推理和硬件替换居高不下，停滞在约 68%。
  baseCase: 毛利率到 Q4Y3 达到约 72%。
  upsideCase: 随安装和支持工具标准化，毛利率达到 75% 以上。
  y3RevenueImpactK: 0.0
  cashImpactK: -260.0
- variable: hiring pace
  downsideCase: 第二位 AE、第二位 CS 和第四名工程师均提前一到两个季度入职，早于验证可见之前。
  baseCase: 招聘遵循商业计划书团队和融资备注中的产品优先再扩展产能顺序。
  upsideCase: 最后两个扩展招聘等到 Q2Y3 之后，不影响执行。
  y3RevenueImpactK: 90.0
  cashImpactK: -310.0
modelDiagram:
  title: unit economics flow
  mermaid: |-
    flowchart LR
      Trigger[Post-dispute trigger] --> Pilot[Paid pilot]
      Pilot --> Account[Production GC account]
      Account --> Seats[Active devices per GC]
      Seats --> Revenue[Subscription + onboarding revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash and runway]
modelSanity:
- checkName: 营收引擎
  finding: 基础营收来自第 1 年 3 家付费账户扩展到第 2 年末 25 家、第 3 年末 100 家，同时每家总承包商将约 25–26 台计费现场主管设备标准化。
- checkName: 必须走对的事
  finding: Procore 原生工作流和解决方案上线必须保持足够可复制性，才能让毛利率随部署从试点转向批量部署后突破 70%。
- checkName: 模型失效条件
  finding: 若销售周期回归正常 6–12 个月的建筑软件时长，或每家总承包商平均部署停滞在约 20 台以下，悲观情景现金将跌至 $20K 低区间。
- checkName: 下一轮融资故事
  finding: 下一轮融资的叙事是 25 家付费总承包商、约 625 台活跃设备、Marketplace 可信度，以及从 Q4Y2 $1.5M ARR 验证点到 H2Y3 EBITDA 转正的清晰路径。
sanityChecks:
  ruleOf40: 第 3 年增长率 368.5% + EBITDA 利润率 9.7% = 378.2%
  burnMultiple: 第 2 年消耗倍数约 1.0x（约 $1.3M EBITDA 消耗对应约 $1.34M 净新增 ARR）；H2Y3 转为现金正流。
  revenuePerFte: 第 3 年 12 名期末 FTE 对应 $357K（基准 SaaS $200–400K）
  flags:
  - 商业计划书 24–36 个月里程碑将 $6M ARR 与 1,000+ 台活跃设备结合，但以每台设备每月 $199 计算，该 ARR 水平实际上需要约 2,500 台计费设备，除非账户扩展或附加项定价显著更高。
  - customersEop 在整个第 1 年包含付费试点和生产订阅，因此早期客户数领先于真实生产客户数。
  - 现金以 EBITDA 代理，可能低估了计划中首次生产批量硬件和替换库存所需的营运资本。
  - 基础情景假设争议后触发机制确实能压缩企业采购周期；若不然，种子融资需求可能需要向商业计划书所述范围上限移动。
