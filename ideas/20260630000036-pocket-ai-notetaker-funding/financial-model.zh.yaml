slug: construction-field-ai-scribe
date: '2026-06-30'
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-07
  unit: YYYY-MM
  source: '[BP date 2026-06-30] 模型从商业计划书日期之后的第一个完整月份开始。'
- id: A2
  name: 期初现金/种子融资
  value: $3.0M
  unit: USD
  source: '[BP fundingAsk targetFundingRangeUsd $2–4M + BP fundingAsk runwayMonths 18] 基础情景使用中位种子额度，规模设计为达到 25 家客户验证点，同时保留六个月缓冲。'
- id: A3
  name: 初始付费客户数
  value: '0'
  unit: count
  source: '[BP milestones 0–12 months] 公司从零营收起步，必须赢得首批付费试点后才会有生产营收。'
- id: A4
  name: 付费客户定义
  value: 付费试点或生产总承包商账户
  unit: definition
  source: '[BP gtm.pricing + BP businessModel.revenueStreams] customersEop 包括已为试点、订阅或打包部署付费的所有总承包商。'
- id: A5
  name: 席位价格
  value: $199 per device per month
  unit: USD/device/month
  source: '[BP gtm.pricing + BP businessModel.revenueStreams] 这是打包硬件、软件和 Procore 同步的标价。'
- id: A6
  name: 平均账户部署爬坡
  value: 试点账户起始约 5–8 台设备，到 Q4Y2 成熟至约 25 台，到 Q4Y3 约 26 台
  unit: devices/account
  source: '[BP market.segments 50–250 名现场人员 + BP milestones 25 家客户 $1.5M ARR 和 100 家客户 $6M ARR + Research market.som] ARR 里程碑意味着每家付费总承包商的计费现场主管席位约为 20 多台。'
- id: A7
  name: 客户爬坡
  value: M12 时 3 家付费账户，Q4Y2 时 25 家，Q4Y3 时 100 家
  unit: customersEop
  source: '[BP milestones 0–12、12–24 和 24–36 个月 + Research market.som] 模型与 25 家客户的第 2 年验证点和 100 家客户的第 3 年目标相匹配。'
- id: A8
  name: 营收确认惯例
  value: 期末客户数乘以该期内每个活跃账户的混合已实现营收
  unit: formula
  source: '[BP gtm.pricing + BP businessModel.unitOfValue] 着陆月因包含上线/配置费和试点定价而每账户混合数字较高。'
- id: A9
  name: 毛利率爬坡
  value: 第 1 年 45–55%，第 2 年 60–68%，第 3 年 70–72%
  unit: gross margin percent
  source: '[BP businessModel.targetGrossMarginPct 70 + Research reportMemo.willingnessToPay + startup-finance heuristic] 早期硬件、支持和模型推理成本压缩毛利率，直到部署标准化。'
- id: A10
  name: 销售周期/转化
  value: 外呼合格到试点转化率 25–35%，试点到生产转化率 50%+，争议后周期约 4–6 周
  unit: funnel
  source: '[BP gtm.funnelTargets + BP operatingAssumptions] 客户爬坡假设争议触发切口确实能缩短企业时间线。'
- id: A11
  name: 招聘时间线
  value: 创始人 CEO + CTO + 软件工程师在 M1；首位 AE 在 M4；首位 CS/解决方案工程师在 M7；运营/合规和第三名工程师在 M13；第二位 AE 在 M16；第二位 CS 在 M19；第四名工程师在 M25；第三位 AE 在 M28；第三位 CS 在 M31
  unit: timeline
  source: '[BP team + BP fundingAsk.useOfFundsSummary + BP milestones] 第 1 年以产品优先，试点转化后再增加部署和销售产能。'
- id: A12
  name: 创始人总薪酬（含税）
  value: $140K
  unit: USD/year
  source: '[startup-finance heuristic] 早期种子期公司创始人精简现金薪酬，含工资税和福利。'
- id: A13
  name: 工程人员总薪酬（含税）
  value: CTO $200K；其他工程师 $180K
  unit: USD/year
  source: '[BP team 关键路径硬件 + Procore 集成范围 + startup-finance heuristic] 从第一天起就需要高级嵌入式、ML 和集成人才。'
- id: A14
  name: 销售人员总薪酬（含税）
  value: $180K
  unit: USD/year
  source: '[BP team 销售负责人/创始 AE + startup-finance heuristic] 含底薪、浮动薪酬和早期企业销售的建筑出差费用。'
- id: A15
  name: 客户成功/解决方案工程师总薪酬（含税）
  value: $145K
  unit: USD/year
  source: '[BP team 客户成功/解决方案工程师 + startup-finance heuristic] 假设技术上线和部署所有权，而非大规模服务团队。'
- id: A16
  name: 运营/管理总薪酬（含税）
  value: $125K
  unit: USD/year
  source: '[BP fundingAsk.useOfFundsSummary 首次生产运行 + SOC 2 + startup-finance heuristic] 涵盖精简硬件运营、供应商管理和合规协调。'
- id: A17
  name: 薪资 P&L 分摊
  value: 创始人 60% S&M 和 40% G&A；工程 100% R&D；销售 100% S&M；客户成功 60% S&M 和 40% R&D；运营 100% G&A
  unit: allocation
  source: '[BP team 角色理由 + BP operations] 将人员成本映射到功能性 P&L 科目。'
- id: A18
  name: 非薪资运营支出爬坡
  value: 月度非薪资支出从早期第 1 年 S&M/R&D/G&A 约 $4K/$12K/$6K 爬升至 Q4Y3 的 $25K/$31K/$15K
  unit: USD/month
  source: '[BP operations + BP fundingAsk.useOfFundsSummary + startup-finance heuristic] 涵盖出差、云/模型推理、保险、法务、认证和 Marketplace 支持费用。'
- id: A19
  name: 现金转换惯例
  value: 现金变动等于 EBITDA
  unit: formula
  source: '[startup-finance heuristic] 阶段模型中税项、债务、折旧和营运资本时序均视为不重要，但硬件库存可能使实际现金略微提前移动。'
- id: A20
  name: 稳态月度流失率
  value: 1.8%
  unit: percent per month
  source: '[startup-finance heuristic for early vertical workflow SaaS] 建筑工作流的粘性支持低流失率，但模型比成熟企业 SaaS 更为保守。'
- id: A21
  name: CAC 计算惯例
  value: 第 2 年销售与营销支出除以 22 个净新增付费客户
  unit: formula
  source: '[model calc 基于基础情景 S&M 支出 + BP milestones 12–24 个月 25 家客户] CAC 基于公司证明可复制 GTM 的年份，而非创始人主导的试点前期。'
- id: A22
  name: 融资规模里程碑
  value: 达到 25 家付费总承包商客户、约 625 台活跃设备、Procore Marketplace 认证，以及约 $1.5M 退出 ARR，同时保留六个月现金缓冲
  unit: milestone
  source: '[BP milestones 12–24 months + BP fundingAsk.useOfFundsSummary + model cash curve] 这是用于确定融资规模的种子轮验证点。'
