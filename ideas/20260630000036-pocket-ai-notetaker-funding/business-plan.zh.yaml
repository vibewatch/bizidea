slug: construction-field-ai-scribe
date: '2026-06-30'
executiveSummary: >-
  Construction Field AI Scribe 是一款坚固 AI 采集器，搭配 Procore 认证集成，
  将口头现场观察转化为预填的 RFI 草稿、日志条目和缺陷清单记录——消除总承包商总监每天
  花两到四小时手动二次录入的负担。目标买家是拥有 50–250 名现场人员、已在使用 Procore
  且经历过因文档滞后引发变更令争议的商业总承包商运营副总裁。Pocket $27M ARR 和逾 13
  万台的出货量证明企业现场工人为专用 AI 采集硬件付费；Accel 在任何建筑垂直产品面世之前
  就明确将建筑工人列为付费客户群，打开了先发者窗口。没有任何现有厂商填补了从现场音频
  到 Procore 记录的精确缺口——Raken 和 Fieldwire 仍需手动表单录入，Procore 本身
  期待数据录入而非捕获——因此公司的胜出路径是比任何拼凑方案都更快地将口头观察路由到
  经审批的结构化记录。防御性来自 Procore Marketplace 分发、按客户定制词汇微调，
  以及随每条经审批现场记录积累迁移成本的建筑领域分类模型。滩头市场是向运营副总裁做
  争议后销售——他们近期的变更令风险敞口已形成预算事件；一张避免的 $50,000 争议超过
  两年订阅成本。近期执行有三个待解问题：嘈杂工地上可实现的词错误率、Procore API
  写回在批量部署规模上的可行性，以及现场试点后首选硬件形态。

problem:
  - >-
    总承包商总监每天要花两到四小时将现场观察二次录入 Procore——巡查中用语音备忘录和
    纸质笔记记录的内容，由办公室管理员在交班时转录，产生 24 小时文档滞后，
    导致 RFI 遗漏、日志不完整以及昂贵的变更令。
  - >-
    一条遗漏的 RFI 或未记录的现场事件，可触发 $10,000 至 $500,000 的变更令；
    在活跃作业现场无法使用手机的环境中，没有任何专用免提采集方案。
  - >-
    工会和政府项目工地在结构上要求保护隐私的录音方式；全天候环境采集工具无法在
    这些环境中部署，使建筑业缺乏能生成可审计记录的合规免提文档选项。

solution:
  - >-
    一款夹在腰带或安全帽上的坚固 AI 采集器，单键按压即可录制现场口头观察，
    在设备端完成转录，并通过 Procore 原生分类层将每条语音路由到正确表单类型——
    日志条目、RFI 草稿、缺陷清单条目或安全观察——预填建议的分项、位置和优先级字段。
  - >-
    Procore 表单草稿队列由总监在巡查结束后用手机花 90 秒审批——无手动转录、
    无办公室二次录入、不改变总承包商现有系统记录。
  - >-
    用户触发的按键录音、SOC 2 级数据处理、端到端加密以及不以客户数据训练模型，
    开箱满足企业总承包商的安全要求和工会工地的同意规定，无需额外配置。

whyWeWin:
  - >-
    Procore 认证集成和 App Marketplace 上架既是分发护城河，也是总承包商 IT 采购
    所需的信任信号；没有任何横向硬件或纯软件竞争对手持有建筑现场音频路由的认证。
  - >-
    物理按键同意在工会和政府工地上是结构性要求；全天候竞品在这些客户处已被默认排除，
    其可寻址建筑市场只剩非工会商业项目。
  - >-
    按客户定制词汇微调和审批环路反馈，构建出一份将建筑语音映射到 Procore 对象的
    标注语料库，通用笔记工具无法积累这份数据，路由准确率和迁移成本随每条经审批
    记录持续复利增长。
  - >-
    ROI 可按每张避免的变更令量化且可辩护——$199/设备/月以成本回避语言锚定，
    而非抽象的生产力提升，这是通过总承包商采购审查和 CFO 评审的必要条件。

strategicChoices:
  beachhead: >-
    拥有 50–250 名现场人员、有效 Procore 订阅，且在过去 12 个月内因文档缺失或
    延迟触发了有据可查的变更令争议或业主审计的商业总承包商。
  wedgeRationale: >-
    这个窄切入点比宽泛发布更快产生验证，因为痛点急迫且偶发（争议后紧迫感将销售周期
    压缩到 4–6 周，而非未触发评估的 6–12 个月），ROI 可按事件量化而非抽象化，
    Procore Marketplace 在认证后提供无需付费 CAC 的分发，日志和 RFI 写回到单一
    系统记录是 90 天内可交付的有界集成范围——在增加分包商或多平台范围之前。
  sequencingRationale: >-
    硬件先于 GTM 出货，因为企业试点需要真实设备来验证现场音频质量和形态偏好；
    Procore 集成和认证必须在 Marketplace 分发可用之前完成；领域分类模型只有在
    实际试点的经审批记录反馈后才能改进；Series A 只有在三到五家总承包商客户展示
    试点到生产转化后才能启动。分包商扩展和 Autodesk Build 集成有意放在 Series A
    之后，以避免在核心总承包商工作流验证可复制性之前分散集成和销售精力。
  notYet:
    - 分包商和专业承包商定价层（Series A 后，在总承包商验证点确立之后）
    - Autodesk Build 和 Fieldwire 集成（Series A 前的风险降低里程碑，非主要 GTM）
    - OSHA 合规自动标注和业主报告模块（24 个月地平线）
    - 消费者或大众消费定价层（稀释企业采购定位）
    - 全天候环境采集模式（劳动法和工会工地同意风险使这些客户无法触达）

market:
  tam: "$2.2B — 901k 名美国建筑经理席位（Data USA 代理数据）× $2,388 年度 ARPU"
  sam: "$322M — 对已进入云端项目管理工作流的中端商业总承包商应用 15% 滩头过滤器：约 135k 席位 × $2,388"
  som: "$6.0M 第 3 年情景 — 125 家总承包商客户 × 20 台活跃设备 × $2,388 年度 ARPU"
  segments:
    - 拥有 50–250 名现场人员且持有有效 Procore 订阅的商业总承包商
    - 在总承包商管理项目中产生大量 RFI 和缺陷清单条目的分包商
  buyingProcess: >-
    运营副总裁或建筑 IT 负责人拥有决策权；采购由近期文档失败或变更令争议触发，
    在项目交接期间评估——通常是 6–12 周的正式周期，但当触发事件已造成买家明确
    归因于文档失败的可见利润损失时，可压缩至 4–6 周。

product:
  mvp: >-
    带单键录制的坚固腰带夹采集器，在设备端转录并通过 Procore API 写回日志条目
    和 RFI 草稿；90 秒 iOS 移动审批队列；SOC 2 级数据处理和端到端加密。
  sixMonth: >-
    缺陷清单和安全观察路由上线；基于试点审批记录微调的建筑领域分类模型；
    首个 Procore App Marketplace 开发者上架；跨多项目部署的设备激活和电量监控
    队列管理控制台。
  twelveMonth: >-
    拥有 25+ 家活跃总承包商客户的 Procore Marketplace 认证上架；利用审批环路
    反馈的按客户词汇适配；第二种硬件形态（安全帽夹）在现场试点中验证；
    Android 审批应用上线。
  twentyFourMonth: >-
    100+ 家付费总承包商客户，ARR 接近 $6M；Autodesk Build 集成进入测试版以
    降低平台风险；通过总承包商推荐和 Marketplace 联合销售上线分包商层；
    OSHA 观察自动标注模块以高级附加项形式进入早期访问。
  keyBets:
    - 现场音频分类在活跃工地上利用受约束模板和来自试点审批记录的分项/位置提示，达到 90%+ 路由准确率
    - Procore 写回 API 支持在每家总承包商客户 20+ 台设备的批量部署规模下，以可接受的速率限制创建日志、RFI 和缺陷清单
    - 总承包商运营副总裁在 30 天工地试点后，比起手机配件更倾向于专用坚固设备
    - 争议后触发销售运动，在第一次合格外呼对话后 6 周内将合格外呼转化为签约试点，无需采购委员会审查

gtm:
  wedge: >-
    在商业总承包商运营副总裁刚经历变更令争议或业主审计后，直接外呼，
    此时痛点急迫、预算已在心理上分配给解决文档失败，下一个项目启动为部署
    解决方案创造了自然截止日期。
  channels:
    - 通过建筑业 LinkedIn 和 AGC 会员名单向建筑运营副总裁直接外呼，锁定争议后或审计后的时机信号
    - 认证上架后的 Procore App Marketplace 被动入站发现
    - Procore 实施顾问和 VDC 负责人作为推荐合作伙伴，他们掌控现场工作流标准化决策
    - 建筑行业协会和区域总承包商活动，用于客户验证、背书获取和会议渠道
  funnelTargets: "外呼合格到试点转化率 25–35%；试点到生产合同转化率 50% 以上"
  pricing: >-
    每位现场主管每台设备每月 $199，涵盖硬件、软件和 Procore 同步；10 台及以上享有
    批量套餐；企业多项目部署收取一次性上线和集成配置费。定价以避免变更令成本为锚点——
    一张避免的 $50,000 争议超过两年订阅——而非软件品类基准（Fieldwire 上限 $89，
    Otter 月费低两位数）。

businessModel:
  revenueStreams:
    - 每台设备每月 $199 的月度订阅（硬件、软件和 Procore 同步打包）
    - 企业多项目部署的一次性上线和集成配置费
    - 10 台及以上设备的批量层级折扣，以加速每个客户账户的平均席位数
  unitOfValue: 每周在至少一个 Procore 连接项目上使用设备的活跃现场主管
  targetGrossMarginPct: 70
  expansionLevers:
    - 随项目规模扩大和其他主管按推荐采用，在现有总承包商账户内扩展席位
    - 通过总承包商推荐和 Procore Marketplace 联合销售解锁分包商层
    - 邻近平台集成（Autodesk Build）在不增加硬件成本的情况下扩大分发渠道
    - 领域 AI 模块（OSHA 标注、业主报告）作为高级附加项，以更高每席位定价销售

strategyMap:
  northStarMetric: 每周至少创建一条经审批 Procore 记录的活跃设备数
  inputMetrics:
    - 每台设备每周现场音频会话数
    - RFI 和日志路由准确率（无需人工编辑直接审批的草稿占比）
    - 从口头观察到经审批 Procore 记录的时间（目标 2 小时以内）
    - 试点到生产转化率
    - 12 个月净设备留存率
  moatsToBuild:
    - Procore App Marketplace 认证上架和直接写回集成（分发护城河）
    - 将建筑语音映射到 Procore 对象的按客户标注语料库（数据护城河）
    - 硬件坚固化和按键同意设计（监管和形态护城河）
    - 来自审批环路反馈的客户专属词汇、分项和位置先验（迁移成本护城河）
  killCriteria:
    - 在真实工地 3 个月试点反馈后，现场音频路由准确率仍低于 80%
    - 直接外呼 GTM 9 个月后，签约付费试点客户不足 3 家
    - Procore API 速率限制或认证要求使批量规模直接写回不可行，且绕过代价高昂
    - 5 次完整试点对话后，平均试点到生产转化率仍低于 30%
  mermaid: |
    flowchart LR
      Wedge[Post-dispute GC outbound] --> Pilot[First paid pilots - 3 GCs]
      Pilot --> Validation[Field accuracy validated]
      Validation --> Marketplace[Procore Marketplace listing]
      Marketplace --> Growth[25 customers and Series A]
      Growth --> Platform[Subcontractors and adjacent platforms]

investorMemo:
  verdict:
    call: "推进/深入调查"
    conviction: >-
      对痛点严峻程度和来自 Pocket $27M ARR 的硬件 PMF 类比高度确信；
      对执行层面中度确信——种子预算要同时推进硬件、Procore 认证和领域 AI 三条线。
    whyBelieve: >-
      Pocket $27M ARR 且建筑工人被 Accel 明确列为付费客户群，
      在单行建筑垂直产品代码面世之前就已证明了以设备为核心的企业现场文档 PMF。
    whyDoubt: >-
      硬件生产制造、Procore 认证和 85%+ 现场音频准确率三条线必须同时在种子资金上
      取得成功，且没有现有营收来支撑在前三个试点关闭之前任何一条线停滞时的迭代。
    nextDiligence: >-
      Procore 开发者 API 沙盒测试，确认在 20 台设备试点批量规模下，日志、RFI 和
      缺陷清单对象的写回速率限制和字段约束的可行性。
  firstCustomer:
    title: 拥有 50–250 名现场人员的商业总承包商运营副总裁（Procore 订阅用户）
    profile: >-
      同时运营 3–10 个商业项目、已在使用 Procore，且在过去 12 个月内发生了一起
      因文档缺失或延迟引发有据可查成本的变更令争议或业主审计。
    trigger: >-
      因文档缺失或延迟引发的变更令争议或业主审计，促使运营副总裁在下一个项目启动
      前寻求解决方案——预算已在心理上分配给文档问题。
    buyer: 运营副总裁或建筑 IT 负责人
    initialContract: >-
      仅收设备成本的 5–10 台设备、60 天试点；目标转化为每台设备每月 $199 的
      生产合同；转化后按 25–50 台设备年化计算，试点 ACV 约 $60,000–$120,000。
  mustBeTrue:
    - 现场音频分类在 6 个月试点数据后，在有 PPE、风噪和机械噪声的活跃工地上达到 85%+ 准确率。
    - 前 10 家总承包商试点客户中至少 5 家，以每台设备每月 $199 转化为生产合同，且无需实质性价格让步。
    - Procore API 支持在批量规模下直接写入日志、RFI 和缺陷清单对象，不存在阻止 Marketplace 上架的速率限制或认证障碍。
    - 争议后购买触发机制具有足够可复制性，仅靠直接外呼每季度产生 20+ 个合格总承包商对话。
    - 至少 60% 的现场主管在 30 天工地试点后偏好专用坚固设备而非手机配件。
  diligenceQuestions:
    - 日志、RFI 和缺陷清单写回适用哪些 Procore API 端点和速率限制，App Marketplace 认证的实际时间表和成本是多少？
    - 总承包商运营副总裁已就哪些具体文档失败场景编入预算解决方案，目前在用的是哪种替代方案（语音备忘录加管理员录入、Raken、Fieldwire）？
    - 目标市场前 20 家商业总承包商客户的可穿戴录音设备劳动法和工会同意要求是什么，哪些州或项目类型限制最多？
    - 具有工业可穿戴经验的合约电子制造商中，哪些能在种子阶段 1,000–5,000 台的出货量下接单，最小订购量和交货期分别是多少？
    - 是否有总承包商运营副总裁已观看现场演示或原型并原则上承诺付费试点，如有，提出了哪些异议？
    - Pocket 现有的 Webhook 和企业工作流架构如何映射到 Procore 专用写回需求，有多少工程工作需要重建而非适配？

operatingAssumptions:
  - assumption: "$199/设备/月以避免成本 ROI 而非软件品类定价可以维持"
    basis: idea.yaml
    validationTest: >-
      10 次买家访谈，以其上一次变更令争议成本为锚点；若买家不经提示就能独立说出
      $50,000+ 的事件，并认同一张避免的争议覆盖两年订阅，则价格成立。
    decisionImpact: >-
      若不成立，ACV 被压缩至 Fieldwire 可比区间，单位经济模型需要每个客户 3 倍
      以上席位才能达到同等 ARR 目标，Series A 时间延后 6–9 个月。
  - assumption: 在 6 个月试点反馈内，活跃工地上的现场音频分类准确率可达 85%+
    basis: 运营判断
    validationTest: >-
      跨 3 种噪声环境（框架、混凝土、外钢）和 3 种分项词汇的 20 次现场转录和分类测试；
      通过门槛为实际试点条件下日志条目无编辑直接审批率达 85%。
    decisionImpact: >-
      若未达到，需对所有 AI 创建的 RFI 草稿强制人工审核步骤，降低节省时间的主张，
      削弱核心 ROI 对话。
  - assumption: Procore API 允许在批量规模下直接写回日志、RFI 和缺陷清单对象，无禁止性速率限制或认证前提条件
    basis: idea.yaml（Pocket 验证的 Webhook 和集成层）
    validationTest: >-
      覆盖日志、RFI 和缺陷清单端点的 Procore 开发者 API 沙盒测试；
      测量速率限制、字段约束和认证时间表与成本，再将集成路线图锁定于直接写回。
    decisionImpact: >-
      若受阻，核心价值主张需要排队或人工转录交接，增加延迟并打破 90 秒巡查结束承诺，
      可能需要以 Autodesk Build 或 Fieldwire 作为主要集成目标进行转型。
  - assumption: 争议后购买触发机制将企业销售周期缩短至 4–6 周（相比正常的 6–12 个月）
    basis: idea.yaml
    validationTest: >-
      追踪前 10 次对话中从第一次合格外呼到签约试点的时间；若自我识别为近期争议或
      审计买家的中位周期在 8 周以内，则假设成立。
    decisionImpact: >-
      若不成立，将资金跑道假设从 18 个月延长至 24 个月，并增加创始 AE 人数，
      以应对在 ARR 爬升到 Series A 证明点之前更长的平均销售管道周期。
  - assumption: 在真实工地条件下，总承包商现场主管偏好专用坚固设备而非手机配件
    basis: research.yaml
    validationTest: >-
      10 名总监参与 30 天并行现场试点，测试两种形态原型；测量日活使用率和定性偏好；
      通过门槛为 60%+ 偏好独立设备。
    decisionImpact: >-
      若不成立，将硬件路线图调整为手机附件，降低生产制造复杂度和资本需求，
      但收窄基于监管和同意的防御护城河。

experimentRoadmap:
  - horizon: 0–30 天
    experiment: Procore API 写回概念验证
    hypothesis: >-
      Procore API 支持从外部结构化数据直接创建日志条目、RFI 草稿和缺陷清单条目，
      不存在阻断试点集成的禁止性速率限制或认证前提条件。
    successMetric: 在沙盒中成功写回全部 3 种 Procore 对象类型，延迟 2 秒以内，无硬性 API 阻断
    owner: "CTO / 创始工程师"
  - horizon: 0–60 天
    experiment: 现场音频准确率基线测量
    hypothesis: >-
      商品化语音转文字加领域调优建筑分类，在任何实际试点反馈可用之前，
      即可在模拟工地音频上达到 85%+ 对象路由准确率。
    successMetric: "跨 3 种噪声环境的 50 个暂存音频样本上，85%+ 正确对象类型分类率"
    owner: "CTO / 创始工程师"
  - horizon: 30–90 天
    experiment: 购买触发资格访谈
    hypothesis: >-
      变更令争议和业主审计是产生运营副总裁紧迫感的主要预算事件；
      单纯文档滞后不足以在没有近期触发事件的情况下触发未预算支出。
    successMetric: 10 次买家访谈中有 8 次引用特定近期争议或审计作为立即行动而非等待的理由
    owner: 销售负责人
  - horizon: 60–120 天
    experiment: 形态偏好试点
    hypothesis: >-
      总监在活跃工地条件下更倾向于独立腰带夹采集器而非手机附件，
      因为双手忙碌的任务使手机操作不切实际或被工地规定禁止。
    successMetric: "10 名现场主管 30 天并行使用后，60%+ 选择专用设备而非手机配件"
    owner: 销售负责人
  - horizon: 60–180 天
    experiment: 前 3 个付费试点
    hypothesis: >-
      争议后触发的总承包商运营副总裁，在现场演示和以最近变更令金额为锚点的单页
      ROI 测算后，会以设备成本价签约付费试点。
    successMetric: 第一次合格外呼对话后 6 个月内签约 3 个付费试点
    owner: 销售负责人
  - horizon: 90–180 天
    experiment: 录音政策模板部署
    hypothesis: >-
      涵盖用户触发录音、NLRA 受保护活动豁免和基于角色访问控制的定制政策模板，
      在交付后 3 周内通过总承包商内部或外部法律顾问审查，无需产品变更。
    successMetric: 3 家试点总承包商中有 2 家的法律顾问在交付后 3 周内批准政策模板
    owner: CEO

operations:
  - 通过具有 IP65 或更高防护等级、1,000 台试点最小订购量的工业可穿戴代工合作伙伴进行坚固硬件合约生产
  - Procore 开发者账户、API 沙盒环境和 Marketplace 认证流程在第 1 个月启动
  - 在设备端和云端的转录管道，搭配基于试点审批记录微调的建筑领域分类模型
  - 90 秒移动审批应用（iOS 优先，第 12 个月上线 Android），用于巡查结束后的草稿审批和 Procore 提交
  - SOC 2 Type II 认证流程于第 6 个月启动，目标第 12 个月完成
  - 涵盖 NLRA 豁免、用户触发激活和基于角色控制的录音同意政策模板，在试点启动时就绪
  - 跨多项目账户的设备激活、电量状态和使用报告队列管理控制台

team:
  - role: "CTO / 创始工程师（硬件与嵌入式固件）"
    startTiming: 第 0 个月
    rationale: >-
      硬件固件、设备端转录和 Procore API 集成是前 90 天必须交付的关键路径；
      该角色拥有这三条线，且无法外包——否则将失去达到首个试点里程碑所需的技术速度。
  - role: 软件工程师（Procore 集成与分类 API）
    startTiming: 第 0 个月
    rationale: >-
      Procore 写回、领域分类模型和移动审批应用是并行工作流，
      需要第二名工程师从第一天起参与，才能在外呼试点开始之前达到 90 天概念验证里程碑。
  - role: "销售负责人 / 创始 AE"
    startTiming: 第 3 个月
    rationale: >-
      前 10 个外呼试点需要一名具备现有总承包商运营关系的建筑企业销售人员；
      时间节点跟随硬件概念验证，让销售人员演示的是真实设备而非 PPT。
  - role: "客户成功 / 解决方案工程师"
    startTiming: 第 6 个月
    rationale: >-
      Procore 上线、录音政策部署和试点到生产交接，在 3 个试点上线且经审批记录量开始
      积累后，需要专职的技术客户成功职能。

milestones:
  - horizon: 0–12 个月
    items:
      - 硬件原型在 3 种工地噪声环境中验证 85%+ 分类准确率
      - Procore API 概念验证确认日志、RFI 和缺陷清单写回可行
      - 3 个由争议后触发的总承包商运营副总裁签约付费试点
      - Procore App Marketplace 开发者上架上线
      - 种子轮关闭
      - 2 家试点账户的法律顾问批准录音政策模板
  - horizon: 12–24 个月
    items:
      - 25 家付费总承包商客户，250+ 台活跃设备
      - "$1.5M ARR"
      - Procore Marketplace 认证上架驱动入站管道
      - 第二种硬件形态（安全帽夹）在现场试点中验证
      - 经审批记录语料库上，领域分类准确率达 90%+
      - Android 审批应用上线
  - horizon: 24–36 个月
    items:
      - 100 家付费总承包商客户，1,000+ 台活跃设备
      - "$6M ARR 接近 SOM"
      - Autodesk Build 集成进入测试版以降低平台风险
      - 通过总承包商推荐和 Marketplace 联合销售上线分包商层
      - Series A 融资，用于分包商 GTM 和国际扩张规划

risks:
  - risk: Procore 平台依赖和单一渠道集中
    likelihood: High
    impact: High
    mitigation: >-
      在第 18 个月前构建 Autodesk Build 集成，确保单一平台在活跃客户中占比
      不超过 60%；在将 Marketplace 作为主要入站分发依赖之前先取得认证状态。
  - risk: 硬件生产制造复杂度和种子资金阶段的毛利率压缩
    likelihood: Medium
    impact: High
    mitigation: >-
      与具有工业可穿戴经验的合约电子制造商合作；以订阅方式定价而非硬件销售，
      目标综合毛利率 70%+；将首次生产批量限定在 500 台以控制库存风险，
      同时验证形态偏好。
  - risk: 企业采购周期漫长，在找到可复制性之前耗尽种子资金跑道
    likelihood: High
    impact: Medium
    mitigation: >-
      只锁定争议后的运营副总裁，在那里预算紧迫感能压缩周期；
      首批试点仅收设备成本以绕过采购委员会审查；跟踪中位周期，
      若 5 次完整试点对话后中位数超过 8 周，则延长资金跑道假设。
  - risk: 现场音频质量不足以在嘈杂工地上生成可信的 AI-RFI 草稿
    likelihood: Medium
    impact: High
    mitigation: >-
      对所有 RFI 草稿使用受约束模板、位置和分项提示，以及强制人工审批队列；
      在尝试任何自动提交功能之前，将 90 秒审批流程作为主要用户体验交付。
  - risk: 工作场所录音政策审查阻断总承包商和工会工地部署
    likelihood: Medium
    impact: High
    mitigation: >-
      在试点启动第一天就提供涵盖 NLRA 豁免、用户触发激活和基于角色控制的
      定制政策模板；为前三家企业客户聘用劳工法律顾问作为实施合作伙伴。

fundingAsk:
  round: seed
  targetFundingRangeUsd: "$2–4M"
  runwayMonths: 18
  useOfFundsSummary: >-
    18 个月资金跑道用于：硬件原型和首批 500 台生产、Procore 集成开发和 Marketplace
    认证、建筑领域分类模型、通过两名企业 AE 招募前 10 个试点客户，以及 SOC 2 Type II
    认证——目标为 $1.5M ARR 和 25 家付费总承包商客户，作为 Series A 的验证点。
