problem: >-
  General contractors and site superintendents spend two to four hours daily on
  documentation—field reports, RFIs, punch lists, and safety observations—all
  captured during physical walkthroughs where typing is impractical. Most resort
  to voice memos and paper notes that must be manually rekeyed into Procore or
  similar systems hours later, causing documentation lag, missed items, and costly
  change orders when field observations fail to reach the system of record on the
  same day they occur.

targetUser:
  primary: General contractors and site superintendents on commercial construction projects
  secondary: Project engineers and subcontractor foremen generating RFI and punch-list items during site walks
  buyer: Operations VP or construction IT director at GC firms with 50 or more field crew members

startupThesis:
  nonObviousInsight: >-
    Pocket's $27M ARR proves that field workers will carry and pay for a dedicated
    AI capture puck—not because they want another meeting recorder, but because
    a physical button creates consent-clear, hands-free documentation in environments
    where phones are impractical. Construction is the most underserved segment
    because the failure mode is uniquely severe: a missed RFI becomes a $50,000
    change order, and no desktop or mobile software closes that gap when both
    hands are on the work.
  beachhead: >-
    Commercial GC firms with 50 to 250 field crew members that already pay for
    Procore and struggle with same-day field-report and RFI turnaround time
  wedge: >-
    A ruggedized AI capture puck paired with a Procore-certified integration that
    auto-routes spoken site observations into the correct RFI draft, daily log
    entry, or punch-list record without any office rekeying
  whyNowCatalyst: >-
    Pocket's $11M raise and $27M ARR validate that dedicated AI capture hardware
    has crossed the enterprise adoption threshold; construction workers are already
    a named paying segment, making this the first moment a construction-vertical
    product can be built on proven hardware PMF rather than a speculative device bet.
  ventureScalePath: >-
    Starts with Procore-connected GC firms, expands into subcontractor networks
    through Procore's App Marketplace, then adds construction-domain AI models
    for OSHA compliance tagging, quality inspection, and owner reporting—ultimately
    becoming the documentation operating system for all field-based construction work.

solution: >-
  A ruggedized AI capture puck worn on the belt or clipped to a hard hat records
  spoken observations during site walkthroughs with a single button press. Audio
  is transcribed and routed through a Procore-native integration layer that
  classifies each observation as a daily log entry, RFI draft, punch-list item,
  or safety observation, then pre-populates the correct Procore form with
  suggested trade, location, and priority fields. The superintendent reviews and
  approves queued items in a 90-second end-of-walk session on their phone, with
  no manual transcription or rekeying. SOC 2-class data handling and end-to-end
  encryption meet enterprise GC security requirements out of the box.

