topRisks:
  - name: Procore platform dependency
    description: >-
      Deep integration with Procore creates single-channel concentration risk—a
      change in API terms, competitive product roadmap, or Marketplace policies
      could foreclose the primary distribution channel overnight.
    mitigation: >-
      Build parallel integrations with Autodesk Build and Fieldwire before Series A
      so no single platform accounts for more than 60% of active customers.
  - name: Hardware manufacturing complexity
    description: >-
      Building a ruggedized device to job-site durability standards requires
      supply chain and manufacturing expertise that software-only founding teams
      typically underestimate, risking delayed launch and margin compression.
    mitigation: >-
      Partner with a contract electronics manufacturer experienced in industrial
      wearables and price devices on subscription to target 60%+ gross margin
      from month one rather than selling hardware at cost.
  - name: Long enterprise procurement cycle
    description: >-
      Enterprise GC procurement decisions are driven by IT and operations VPs
      who evaluate tools during project transitions, creating 6 to 12 month
      sales cycles that can strand a seed-stage company before it finds repeatability.
    mitigation: >-
      Seed the first ten customers through a pilot priced at device cost only,
      targeting superintendents who have experienced a recent change order dispute
      since that triggering event typically shortens the sales cycle to four to
      six weeks.
