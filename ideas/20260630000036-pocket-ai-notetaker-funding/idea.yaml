differentiator: >-
  Unlike software-only note-takers such as Otter.ai and Fireflies, this product
  is built as a wearable job-site device from the ground up—no phone in hand,
  no ambient microphone, and no failure in loud or hands-busy field environments.
  Unlike generic AI hardware that routes to generic calendars and task apps,
  the wedge is deep Procore certification that writes directly to the GC's
  existing system of record, eliminating rekey cost and making the ROI calculable
  per avoided change order. The physical form factor also solves the
  construction-specific consent problem: crews can see the device activate,
  removing the union and OSHA-related objections that foreclose always-on tools.

