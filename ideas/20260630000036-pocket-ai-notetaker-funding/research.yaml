  - 38
- name: Pocket
  stage: scale-up
  wedge: Dedicated AI note-taking hardware with custom workflows, webhook integrations, and enterprise controls
  pricing: $129 device plus $199/year Pro plan; custom enterprise pricing
  strength: Proven device demand, field use cases, and workflow automation beyond simple transcription
  weaknessVsUs: Horizontal by design, not ruggedized or mapped to construction objects, and not Procore-native
  sourceRefs:
  - 1
