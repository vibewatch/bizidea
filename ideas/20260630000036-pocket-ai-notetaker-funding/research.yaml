- name: OpenSpace
  stage: scale-up
  wedge: Automated 360° visual jobsite documentation integrated with Procore
  pricing: Custom quote
  strength: Strong proof that automated capture can save field time and fit into existing Procore workflows
  weaknessVsUs: Captures visual context, not structured spoken observations that become RFIs, logs, or punch items
