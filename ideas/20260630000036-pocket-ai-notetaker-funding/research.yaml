  searchedQueries:
  - Find authoritative recent sources on commercial construction field documentation pain, daily logs, RFIs, punch lists, rework, and change orders in the US, prioritizing AGC, Procore, Dodge, Autodesk, government, and trade press.
  - Find authoritative sources on Procore scale, App Marketplace, integrations, and API capabilities relevant to daily logs, RFIs, observations, and punch items.
  - Find authoritative sources on construction site audio recording consent, workplace recording policy, OSHA/NLRB guidance, and deployment risks for jobsite voice capture.
  - Find authoritative sources on enterprise AI note-taking hardware and manual-trigger versus always-on recording workflows, including Pocket and Plaud.
  - Find authoritative sources on construction software alternatives for field documentation and jobsite capture, including Raken, Fieldwire, OpenSpace, Buildots, and Procore.
  - Find authoritative sources on US construction market size, number of construction managers or field supervisors, and software-relevant business counts.
  - Crawl primary sitemaps and product pages for Raken, Fieldwire, OpenSpace, Buildots, Procore, Otter, Fireflies, Plaud, and Pocket to build a verified audit corpus.
  - Fetch public pricing, security, and integration pages for horizontal note-taking tools and field-reporting suites to anchor willingness-to-pay and substitute mapping.
  - Fetch benchmarks, case studies, and workflow pages that quantify time loss, schedule slippage, documentation gaps, or reporting burden.
