  stage: incumbent
  wedge: Mobile field management for RFIs, punch lists, reports, inspections, and change orders
  pricing: $39/$64/$89 per user per month on public annual tiers
  strength: Public pricing, broad field workflow coverage, and strong mobile execution habits
  weaknessVsUs: Optimized for manual task and form workflows, not construction-specific voice capture feeding Procore-native records
  sourceRefs:
  - 21
