  adoptionFrictionMatrix:
  - friction: Recording consent and workplace policy review
    severity: high
    affectedBuyer: Operations VP, IT, legal, and HR
    mitigation: Make recording explicitly user-triggered, provide notices and role-based controls, and ship policy templates that preserve protected-activity carve-outs.
    sourceRefs:
    - 4
    - 16
    - 36
  - friction: New hardware procurement and fleet management
    severity: medium
    affectedBuyer: Construction IT and operations
    mitigation: Start with small pilots, centralized billing, and simple replacement logistics before asking buyers for broad multi-project rollouts.
    sourceRefs:
    - 4
    - 6
    - 34
  - friction: Mapping outputs into the exact Procore object and field structure buyers expect
    severity: high
    affectedBuyer: Construction IT and project controls
    mitigation: Constrain early scope to daily logs, RFIs, and punch items; keep a human approval queue; and pursue Marketplace-grade integration quality early.
    sourceRefs:
    - 13
    - 14
    - 18
    - 19
  - friction: Field-audio quality in noisy, hands-busy conditions
    severity: high
    affectedBuyer: Superintendents and foremen
    mitigation: Use constrained templates, location/trade hints, and a short end-of-walk review flow rather than trying to auto-post every utterance.
    sourceRefs:
    - 1
    - 3
    - 6
    - 30
