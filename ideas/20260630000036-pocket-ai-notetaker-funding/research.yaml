openQuestions:
- What accuracy floor do superintendents require before they trust AI-created drafts for RFIs and daily logs on noisy jobsites?
- How demanding is Procore certification for direct write-back into the exact objects and fields buyers care about first?
- What recording-policy language will large GCs, unions, and public-project counsel actually approve for wearable or phone-adjacent capture devices?
- Does the preferred form factor look like a standalone puck, a hard-hat clip, or a phone accessory once pilots move beyond early adopters?
