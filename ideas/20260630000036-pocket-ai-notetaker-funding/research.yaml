- name: Procore
  stage: incumbent
  wedge: System of record for project management, daily logs, RFIs, and change management
  pricing: Custom/demo pricing with an estimate-only public page
  strength: Already embedded in target accounts with broad workflow coverage and trusted security posture
  weaknessVsUs: Not built around hands-free field audio capture or instant speech-to-object routing during site walks
