  validationPlan:
  - priority: high
    question: What word-error rate and object-classification accuracy are acceptable on active jobsites with PPE, wind, and machinery noise?
    evidenceToGather: Pilot transcripts and final approved records from 20 real site walks across at least three trades and two noise profiles.
  - priority: high
    question: 'Which precise event creates budget release: missed daily logs, slow RFIs, change-order disputes, or closeout delays?'
    evidenceToGather: Ten buyer interviews with operations VPs and project executives plus one post-mortem dataset from a recent dispute.
  - priority: medium
    question: How much Marketplace and API work is needed to write directly into the exact Procore objects buyers care about?
    evidenceToGather: Certification scoping, rate-limit review, and a proof-of-concept integration against one sandbox and one customer environment.
  - priority: medium
    question: Will buyers accept a dedicated device, or do they require a phone-adjacent or wearable attachment model first?
    evidenceToGather: Two prototype form factors, one 30-day pilot, and measured daily active use versus phone-only alternatives.
