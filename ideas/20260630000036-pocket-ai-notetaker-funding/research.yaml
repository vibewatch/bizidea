  stage: scale-up
  wedge: Field-first daily reporting, RFIs, photos, and document management
  pricing: Custom quote
  strength: Clear field UX and strong positioning around daily reports and documentation discipline
  weaknessVsUs: Still depends on manual form, photo, and mobile-entry behavior rather than dedicated AI capture hardware
