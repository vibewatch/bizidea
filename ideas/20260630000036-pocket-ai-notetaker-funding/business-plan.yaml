slug: construction-field-ai-scribe
date: '2026-06-30'
executiveSummary: >-
  Construction Field AI Scribe is a ruggedized AI capture puck paired with a
  Procore-certified integration that converts spoken site observations into
  pre-filled RFI drafts, daily log entries, and punch-list records—eliminating
  the two-to-four hours GC superintendents spend daily on manual rekeying.
  The target buyer is the operations VP at commercial GC firms with 50–250 field
  crew that already pay for Procore and have experienced change order disputes
  caused by documentation lag. Pocket's $27M ARR and 130,000+ units proves that
  enterprise field workers pay for dedicated AI capture hardware; Accel explicitly
  named construction workers as a paying segment before any construction-vertical
  product exists, creating a first-mover window. No incumbent closes the exact
  field-audio-to-Procore-record gap—Raken and Fieldwire require manual form entry,
  Procore expects data entry rather than capturing it—so the company wins by
  routing spoken observations to approved structured records faster than any
  assembled substitute. Defensibility rests on Procore Marketplace distribution,
  per-customer vocabulary fine-tuning, and a construction-domain classification
  model that accumulates switching costs with every approved field record.
  The beachhead is post-dispute selling to operations VPs whose recent change order
  exposure has already created a budget event; a single avoided $50,000 dispute
  exceeds two years of subscription cost. Three open questions govern near-term
  execution: achievable word-error rate on noisy job sites, Procore API write-back
  feasibility at fleet scale, and preferred hardware form factor after field pilots.

problem:
  - >-
    GC superintendents spend two to four hours daily rekeying site observations
    into Procore—voice memos and paper notes captured during walkthroughs are
    transcribed by office admins at end of shift, creating a 24-hour documentation
    lag that causes missed RFIs, incomplete daily logs, and costly change orders.
  - >-
    A single missed RFI or undocumented field event can trigger a change order
    costing $10,000 to $500,000; no purpose-built hands-free capture solution
    exists for field environments where handling a phone during active site work
    is impractical or prohibited.
  - >-
    Privacy-aware recording is structurally required on union and government job
    sites; always-on ambient capture tools cannot be deployed in these environments,
    leaving construction without a compliant hands-free documentation option that
    creates an auditable paper trail.

solution:
  - >-
    A ruggedized AI capture puck worn on the belt or clipped to a hard hat records
    spoken site observations with a single button press, transcribes on-device, and
    routes each utterance through a Procore-native classification layer that maps it
    to the correct form type: daily log, RFI draft, punch-list item, or safety
    observation—with suggested trade, location, and priority fields pre-filled.
  - >-
    Queued Procore form drafts are reviewed and approved by the superintendent in
    a 90-second end-of-walk mobile session—no manual transcription, no office
    rekeying, no change to the GC's existing system of record.
  - >-
    User-triggered button-press recording, SOC 2-class data handling, end-to-end
    encryption, and no model training on customer data meet enterprise GC security
    requirements and union-site consent rules without additional configuration.

whyWeWin:
  - >-
    Procore-certified integration and App Marketplace listing are both the
    distribution moat and the trust signal GC IT procurement requires; no
    horizontal hardware or software-only competitor has this certification
    for construction field audio routing.
  - >-
    Physical button-press consent is structurally required on union and government
    job sites; always-on competitors are foreclosed from these accounts by default,
    shrinking their addressable construction market to non-union commercial work only.
  - >-
    Per-customer vocabulary fine-tuning and the approval-loop feedback create a
    labeled corpus of construction speech mapped to Procore objects that generic
    note-takers cannot accumulate, compounding routing accuracy and switching costs
    with every approved field record.
  - >-
    ROI is calculable and defensible per avoided change order—$199 per device per
    month anchors in cost-avoidance language, not abstract productivity, which is
    required to clear GC procurement and survive a CFO review.

strategicChoices:
  beachhead: >-
    Commercial GC firms with 50–250 field crew, an active Procore subscription,
    and a documented change order dispute or owner audit triggered by missing
    or late field records within the last 12 months.
  wedgeRationale: >-
    This narrow entry creates proof faster than a broader launch because the pain
    is acute and episodic (post-dispute urgency compresses sales cycles to 4–6
    weeks vs. 6–12 months for unprompted evaluation), the ROI is calculable per
    incident rather than abstract, Procore Marketplace provides distribution without
    paid CAC once certified, and daily log and RFI write-back to one system of
    record is a bounded integration scope shippable in 90 days before any
    subcontractor or multi-platform scope is added.
  sequencingRationale: >-
    Hardware ships before GTM because enterprise pilots require a real device to
    validate field audio quality and form factor preference; Procore integration
    and certification must close before Marketplace distribution is available;
    the domain classification model improves only with approved-record feedback
    from live pilots; and Series A can only be raised once three to five GC customers
    demonstrate pilot-to-production conversion. Subcontractor expansion and Autodesk
    Build integration are deliberately post-Series A to avoid splitting integration
    and sales bandwidth before the core GC workflow is proven repeatable.
  notYet:
    - Subcontractor and specialty contractor pricing tier (post-Series A, after GC proof points)
    - Autodesk Build and Fieldwire integrations (risk-reduction milestone before Series A, not primary GTM)
    - OSHA compliance auto-tagging and owner reporting modules (24-month horizon)
    - Consumer or prosumer pricing tiers (dilutes enterprise procurement positioning)
    - Always-on ambient capture mode (labor-law and union-site consent risk forecloses these accounts)

market:
  tam: "$2.2B — 901k U.S. construction-manager seats (Data USA proxy) × $2,388 annual ARPU"
  sam: "$322M — 15% beachhead filter for mid-market commercial GCs already in cloud PM workflows: ~135k seats × $2,388"
  som: "$6.0M year-3 case — 125 GC customers × 20 active devices × $2,388 annual ARPU"
  segments:
    - Commercial GC firms with 50–250 field crew and an active Procore subscription
    - Subcontractors generating high-volume RFI and punch-list items on GC-managed projects
  buyingProcess: >-
    Operations VP or construction IT director owns the decision; procurement is
    triggered by a recent documentation failure or change order dispute and is
    evaluated during a project transition—typically a 6–12 week formal cycle
    compressed to 4–6 weeks when the triggering event has created visible
    margin loss that the buyer has already attributed to documentation failure.

product:
  mvp: >-
    Ruggedized belt-clip puck with single-button record, on-device transcription,
    and Procore API write-back for daily log entries and RFI drafts; 90-second
    iOS mobile review queue; SOC 2-class data handling and end-to-end encryption.
  sixMonth: >-
    Punch-list and safety observation routing added; construction-domain
    classification model fine-tuned on pilot-approved records; first Procore
    App Marketplace developer listing; fleet management dashboard for
    device activation and battery monitoring across multi-project deployments.
  twelveMonth: >-
    Procore Marketplace certified listing with 25+ active GC customers; per-customer
    vocabulary adaptation using approval-loop feedback; second hardware form factor
    (hard-hat clip) validated in field pilots; Android review app shipped.
  twentyFourMonth: >-
    100+ paying GC customers approaching $6M ARR; Autodesk Build integration
    in beta for platform risk reduction; subcontractor tier launched via GC
    referral and Marketplace co-sell; OSHA observation auto-tagging module
    in early access as a premium add-on.
  keyBets:
    - Field audio classification reaches 90%+ routing accuracy on active job sites using constrained templates and trade/location hints fed from pilot-approved records
    - Procore write-back API supports daily log, RFI, and punch-list creation at acceptable rate limits for fleet deployments of 20+ devices per GC customer
    - GC operations VPs prefer a dedicated ruggedized device over a phone-based accessory after a 30-day job-site pilot
    - Post-dispute trigger motion converts qualified outbound conversations to signed pilots within 6 weeks without requiring a procurement committee review

gtm:
  wedge: >-
    Direct outbound to operations VPs at commercial GC firms immediately after
    a documented change order dispute or owner audit, where pain is acute, budget
    has been mentally allocated to fix the documentation failure, and the next
    project start creates a natural deadline for deploying a solution.
  channels:
    - Direct outbound to construction operations VPs via construction LinkedIn and AGC member lists, targeting post-dispute or post-audit timing signals
    - Procore App Marketplace inbound discovery once certified listing is live
    - Procore implementation consultants and VDC leads as referral partners who own field workflow standardization decisions
    - Construction industry associations and regional GC events for customer validation, reference access, and conference-sourced pipeline
  funnelTargets: "Outbound qualified to pilot 25–35%; pilot to production contract 50%+"
  pricing: >-
    $199 per device per month per field supervisor, covering hardware, software,
    and Procore sync bundled; fleet tiers at 10+ devices; one-time onboarding and
    integration setup fee for enterprise multi-project rollouts. Price is anchored
    in avoided change order cost—a single avoided $50,000 dispute exceeds two years
    of subscription—not software category benchmarks where Fieldwire tops at $89 and
    Otter at low double-digits per month.

businessModel:
  revenueStreams:
    - Monthly device subscription at $199 per device per month (hardware, software, and Procore sync bundled)
    - One-time onboarding and integration setup fee for enterprise multi-project rollouts
    - Fleet tier discounts at 10+ devices to accelerate average seat count per customer account
  unitOfValue: Active field supervisor using the device on at least one Procore-connected project per week
  targetGrossMarginPct: 70
  expansionLevers:
    - Seat expansion within existing GC accounts as projects scale and additional supervisors adopt per recommendation
    - Subcontractor tier unlocked through GC referral and Procore Marketplace co-sell
    - Adjacent platform integrations (Autodesk Build) adding distribution without incremental hardware cost
    - Domain AI modules (OSHA tagging, owner reporting) as premium add-ons at higher per-seat pricing

strategyMap:
  northStarMetric: Weekly active devices with at least one approved Procore record created
  inputMetrics:
    - Field audio sessions per device per week
    - RFI and daily log routing accuracy as percent of drafts approved without manual edit
    - Time from spoken observation to approved Procore record (target under 2 hours)
    - Pilot-to-production conversion rate
    - Net device retention at 12 months
  moatsToBuild:
    - Procore App Marketplace certified listing and direct write-back integration (distribution moat)
    - Per-customer labeled corpus of construction speech mapped to Procore objects (data moat)
    - Hardware ruggedization and button-press consent design (regulatory and form-factor moat)
    - Customer-specific vocabulary, trade, and location priors built from approval-loop feedback (switching cost moat)
  killCriteria:
    - Field audio routing accuracy remains below 80% after 3 months of pilot feedback across real job sites
    - Fewer than 3 paying pilot customers signed after 9 months of direct outbound GTM
    - Procore API rate limits or certification requirements make direct write-back infeasible at fleet scale without a prohibitive workaround
    - Average pilot-to-production conversion rate stays below 30% after 5 completed pilots
  mermaid: |
    flowchart LR
      Wedge[Post-dispute GC outbound] --> Pilot[First paid pilots - 3 GCs]
      Pilot --> Validation[Field accuracy validated]
      Validation --> Marketplace[Procore Marketplace listing]
      Marketplace --> Growth[25 customers and Series A]
      Growth --> Platform[Subcontractors and adjacent platforms]

investorMemo:
  verdict:
    call: "Meet / investigate further"
    conviction: >-
      High conviction on pain severity and hardware PMF analog from Pocket's
      $27M ARR; medium conviction on execution given simultaneous hardware,
      Procore certification, and domain AI tracks on a seed budget.
    whyBelieve: >-
      Pocket's $27M ARR with construction workers as an explicitly named paying
      segment by Accel proves device-led enterprise field documentation PMF before
      a single line of construction-vertical product exists.
    whyDoubt: >-
      Hardware manufacturing, Procore certification, and 85%+ field audio accuracy
      must all succeed simultaneously on seed capital, with no existing revenue to
      fund iteration if any one track stalls before the first three pilots close.
    nextDiligence: >-
      A Procore developer API sandbox test confirming feasible write-back rate
      limits and field count constraints for daily log, RFI, and punch-list objects
      at a 20-device pilot fleet scale.
  firstCustomer:
    title: Commercial GC operations VP at a 50–250-field-crew Procore subscriber
    profile: >-
      Mid-market GC running 3–10 simultaneous commercial projects, already paying
      for Procore, with a change order dispute or owner audit in the last 12 months
      that created a documented cost attributable to missing or late field records.
    trigger: >-
      A change order dispute or project owner audit caused by missing or late field
      documentation prompts the operations VP to find a fix before the next project
      start—budget is already mentally allocated to the documentation problem.
    buyer: Operations VP or construction IT director
    initialContract: >-
      5–10 device pilot at device cost only for 60 days; target conversion to
      $199 per device per month production contract; pilot ACV $60,000–$120,000
      annualized at 25–50 devices upon conversion.
  mustBeTrue:
    - Field audio classification reaches 85%+ accuracy on active job sites with PPE, wind, and machinery noise within 6 months of pilot data.
    - At least 5 of the first 10 GC pilot customers convert to production contracts at $199 per device per month without requiring a meaningful price concession.
    - Procore API supports direct write-back into daily log, RFI, and punch-list objects at fleet scale without rate-limit or certification blockers that prevent Marketplace listing.
    - The post-dispute buying trigger is repeatable enough to generate a qualified pipeline of 20+ GC conversations per quarter through direct outbound alone.
    - A dedicated ruggedized device is preferred over a phone-based accessory by at least 60% of field supervisors after a 30-day job-site pilot.
  diligenceQuestions:
    - What Procore API endpoints and rate limits apply to daily log, RFI, and punch-list write-back, and what is the actual timeline and cost of App Marketplace certification?
    - Which specific documentation failure scenarios have GC operations VPs already budgeted to solve, and what is the incumbent solution (voice memo plus admin rekey, Raken, Fieldwire) currently in place?
    - What are the labor-law and union-consent requirements for wearable recording devices at the top 20 commercial GC accounts in target markets, and which states or project types are most restrictive?
    - Which contract electronics manufacturers with industrial wearable experience are available at seed-stage volumes of 1,000–5,000 units, and what are minimum order quantities and lead times?
    - Has any GC operations VP seen a live demo or prototype and committed in principle to a paid pilot, and if so, what objections surfaced?
    - How does Pocket's existing webhook and enterprise workflow architecture map to Procore-specific write-back requirements, and what engineering effort must be rebuilt versus adapted?

operatingAssumptions:
  - assumption: "$199 per device per month is defensible as avoided-cost ROI rather than software category pricing"
    basis: idea.yaml
    validationTest: >-
      10 buyer interviews anchoring on the cost of their last change order
      dispute; the price holds if buyers independently cite $50,000+ events
      without prompting and agree a single avoided dispute covers two years
      of subscription.
    decisionImpact: >-
      If false, ACV compresses to Fieldwire-comparable bands and unit economics
      require 3x more seats per customer to reach the same ARR target, extending
      time to Series A by 6–9 months.
  - assumption: Field audio classification accuracy of 85%+ is achievable on active job sites within 6 months of pilot feedback
    basis: operator judgment
    validationTest: >-
      20 field transcription and classification tests across at least 3 noise
      profiles (framing, concrete, exterior steel) and 3 trade vocabularies;
      pass threshold is 85% approved-without-edit rate on daily log entries
      in live pilot conditions.
    decisionImpact: >-
      If false, require a mandatory human-review step for all AI-created RFI drafts,
      reducing the time-saving claim and weakening the core ROI conversation.
  - assumption: Procore API permits direct write-back into daily log, RFI, and punch-list objects at fleet scale without prohibitive rate limits or certification prerequisites
    basis: idea.yaml (webhook and integration layer proven by Pocket)
    validationTest: >-
      Procore developer API sandbox test covering daily log, RFI, and punch-list
      endpoints; measure rate limits, field constraints, and certification timeline
      and cost before committing the integration roadmap to direct write-back.
    decisionImpact: >-
      If blocked, the core value proposition requires a staging queue or human
      transcription handoff that adds latency and breaks the 90-second end-of-walk
      promise, potentially requiring a pivot to Autodesk Build or Fieldwire as the
      primary integration target.
  - assumption: Post-dispute buying trigger shortens the enterprise sales cycle to 4–6 weeks vs. the 6–12 month norm
    basis: idea.yaml
    validationTest: >-
      Track time from first qualified outbound contact to signed pilot across the
      first 10 conversations; the assumption holds if median cycle is under
      8 weeks for buyers who self-identify a recent dispute or audit.
    decisionImpact: >-
      If false, extend runway assumptions from 18 to 24 months and increase the
      founding AE headcount to compensate for a longer average pipeline cycle
      before ARR ramps to a Series A proof point.
  - assumption: A dedicated ruggedized device is preferred over a phone-based accessory by GC field supervisors in real site conditions
    basis: research.yaml
    validationTest: >-
      Two form factor prototypes in a 30-day parallel field pilot with 10
      superintendents; measure daily active use rate and qualitative preference;
      pass threshold is 60%+ preference for the standalone device.
    decisionImpact: >-
      If false, pivot hardware roadmap to a phone attachment accessory, reducing
      manufacturing complexity and capital requirements but narrowing the
      regulatory and consent-based defensibility moat.

experimentRoadmap:
  - horizon: 0–30 days
    experiment: Procore API write-back proof-of-concept
    hypothesis: >-
      Procore API supports direct creation of daily log entries, RFI drafts, and
      punch-list items from external structured data without prohibitive rate
      limits or certification prerequisites that would block a pilot integration.
    successMetric: Successful write-back to all 3 Procore object types in sandbox with under 2-second latency and no hard API blockers
    owner: "CTO / Founding Engineer"
  - horizon: 0–60 days
    experiment: Field audio accuracy baseline measurement
    hypothesis: >-
      Commodity speech-to-text with domain-tuned construction classification can
      achieve 85%+ object-routing accuracy on simulated job-site audio before
      any live pilot feedback is available.
    successMetric: "85%+ correct object-type classification on 50 staged audio samples across 3 noise profiles"
    owner: "CTO / Founding Engineer"
  - horizon: 30–90 days
    experiment: Buying trigger qualification interviews
    hypothesis: >-
      Change order disputes and owner audits are the primary budget events that
      create operations VP urgency; documentation lag alone is insufficient to
      trigger unbudgeted spend without a recent triggering incident.
    successMetric: 8 of 10 buyer interviews cite a specific recent dispute or audit as the reason they would act now rather than wait
    owner: Head of Sales
  - horizon: 60–120 days
    experiment: Form factor preference pilot
    hypothesis: >-
      Superintendents prefer a standalone belt-clip puck over a phone-attached
      accessory in active job-site conditions because hands-busy tasks make
      phone handling impractical or site-rule-prohibited.
    successMetric: "60%+ of 10 field supervisors choose dedicated device over phone accessory after 30-day parallel use"
    owner: Head of Sales
  - horizon: 60–180 days
    experiment: First 3 paid pilots
    hypothesis: >-
      A post-dispute-triggered GC operations VP will sign a paid pilot at device
      cost after a live demo and a one-page ROI calculation anchored on their
      most recent change order amount.
    successMetric: 3 signed paid pilots within 6 months of first qualified outbound conversation
    owner: Head of Sales
  - horizon: 90–180 days
    experiment: Recording policy template deployment
    hypothesis: >-
      A tailored policy template covering user-triggered recording, NLRA
      protected-activity carve-outs, and role-based access controls clears GC
      in-house or outside counsel review without requiring product changes.
    successMetric: Policy template approved by legal counsel at 2 of 3 pilot GC firms within 3 weeks of delivery
    owner: CEO

operations:
  - Ruggedized hardware contract manufacturing via industrial wearable CM partner with IP65 or better rating and 1,000-unit pilot MOQ
  - Procore developer account, API sandbox environment, and Marketplace certification pipeline initiated in month 1
  - On-device and cloud transcription pipeline with construction-domain classification model fine-tuned on pilot-approved records
  - 90-second mobile review app (iOS first, Android in month 12) for end-of-walk draft approval and Procore submission
  - SOC 2 Type II certification process initiated at month 6 targeting completion by month 12
  - Recording consent policy templates covering NLRA carve-outs, user-triggered activation, and role-based controls ready at pilot launch
  - Fleet management dashboard for device activation, battery status, and usage reporting across multi-project accounts

team:
  - role: "CTO / Founding Engineer (hardware and embedded firmware)"
    startTiming: Month 0
    rationale: >-
      Hardware firmware, on-device transcription, and Procore API integration are
      all critical-path items that must ship in the first 90 days; this role owns
      all three and cannot be contracted out without losing the technical speed
      required to reach the first pilot milestone.
  - role: Software Engineer (Procore integration and classification API)
    startTiming: Month 0
    rationale: >-
      Procore write-back, domain classification model, and the mobile review app
      are parallel workstreams requiring a second engineer from day one to hit
      the 90-day proof-of-concept milestone before outbound pilots begin.
  - role: "Head of Sales / Founding AE"
    startTiming: Month 3
    rationale: >-
      First 10 outbound pilots require a construction enterprise sales hire with
      existing GC operations relationships; timing follows the hardware proof-of-
      concept so the rep demos a real device rather than a slide deck.
  - role: "Customer Success / Solutions Engineer"
    startTiming: Month 6
    rationale: >-
      Procore onboarding, recording policy deployment, and pilot-to-production
      handoffs require a dedicated technical CS function once 3 pilots are live
      and approved-record volume begins accumulating.

milestones:
