    items:
      - Hardware prototype validated at 85%+ classification accuracy across 3 job-site noise profiles
      - Procore API proof-of-concept confirmed for daily log, RFI, and punch-list write-back
      - 3 signed paid pilots with post-dispute-triggered GC operations VPs
      - Procore App Marketplace developer listing live
      - Seed round closed
      - Recording policy templates approved by counsel at 2 pilot accounts
  - horizon: 12–24 months
    items:
      - 25 paying GC customers with 250+ active devices
      - "$1.5M ARR"
      - Procore Marketplace certified listing driving inbound pipeline
      - Second hardware form factor (hard-hat clip) validated in field pilots
      - 90%+ domain classification accuracy on approved-record corpus
      - Android review app shipped
  - horizon: 24–36 months
    items:
      - 100 paying GC customers with 1,000+ active devices
      - "$6M ARR approaching SOM"
      - Autodesk Build integration in beta for platform risk reduction
      - Subcontractor tier launched via GC referral and Marketplace co-sell
      - Series A raise to fund subcontractor GTM and international expansion scoping

risks:
  - risk: Procore platform dependency and single-channel concentration
    likelihood: High
    impact: High
    mitigation: >-
      Build Autodesk Build integration by month 18 so no single platform accounts
      for more than 60% of active customers before Series A; secure Marketplace-
      certified status before relying on it as primary inbound distribution.
  - risk: Hardware manufacturing complexity and margin compression on seed capital
    likelihood: Medium
    impact: High
    mitigation: >-
      Partner with a contract electronics manufacturer experienced in industrial
      wearables; price on subscription rather than hardware sale to target 70%+
      blended gross margin; limit first production run to 500 units to control
      inventory risk while validating form factor preference.
  - risk: Long enterprise procurement cycle stranding seed runway before repeatability
    likelihood: High
    impact: Medium
    mitigation: >-
      Target exclusively post-dispute operations VPs where budget urgency compresses
      the cycle; price first pilots at device cost only to bypass procurement committee
      review; track median cycle and extend runway assumptions if median exceeds
      8 weeks after 5 completed pilot conversations.
  - risk: Field audio quality insufficient for trusted AI-created RFI drafts on noisy job sites
    likelihood: Medium
    impact: High
    mitigation: >-
      Use constrained templates, location and trade hints, and a mandatory human
      approval queue for all RFI drafts; ship the 90-second review flow as the
      primary UX before attempting any auto-post capability.
  - risk: Workplace recording policy review blocking GC and union-site deployment
    likelihood: Medium
    impact: High
    mitigation: >-
      Ship tailored policy templates covering NLRA carve-outs, user-triggered
      activation, and role-based controls on day one of pilot launch; engage
      employment counsel as an implementation partner for the first three
      enterprise accounts.

fundingAsk:
  round: seed
  targetFundingRangeUsd: "$2–4M"
  runwayMonths: 18
  useOfFundsSummary: >-
    18 months of runway funds hardware prototype and first production run of
    500 units, Procore integration development and Marketplace certification,
    construction-domain classification model, first 10 pilot customer acquisition
    via two enterprise AE hires, and SOC 2 Type II certification—targeting
    $1.5M ARR and 25 paying GC customers as the Series A proof point.
