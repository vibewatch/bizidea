      只要滩头市场能扩展至分包商和专业承包商。

topRisks:
  - name: Procore 平台依赖
    description: >-
      与 Procore 的深度集成形成单一渠道集中风险——API 条款、竞争产品路线图或
      Marketplace 政策的任何变化都可能在一夜之间封死主要分发渠道。
    mitigation: >-
      在 Series A 之前同步构建 Autodesk Build 和 Fieldwire 集成，
      确保单一平台在活跃客户中的占比不超过 60%。
  - name: 硬件生产制造复杂度
    description: >-
      将设备做到符合工地耐久性标准，需要供应链和制造经验——
      纯软件背景的创始团队往往低估这一难度，存在延迟发布和毛利率压缩的风险。
    mitigation: >-
      与具有工业可穿戴经验的合约电子制造商合作，以订阅方式定价而非硬件销售，
      从第一个月起就将综合毛利率目标设为 60% 以上，而不是以成本价出售设备。
  - name: 企业采购周期漫长
    description: >-
      企业总承包商的采购决策由 IT 和运营副总裁主导，通常在项目交接期间评估工具，
      形成 6 至 12 个月的销售周期，可能让种子期公司在找到可复制路径之前资金耗尽。
    mitigation: >-
      以仅收取设备成本的价格向前十家客户提供试点，
      重点锁定近期经历过变更令争议的总监——这一触发事件通常能将销售周期压缩到四到六周。
