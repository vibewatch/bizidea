problem: >-
  总承包商和现场总监每天要花两到四小时处理文档——现场报告、RFI、缺陷清单和安全观察——
  这些记录全在实地巡查时采集，而巡查时打字根本不现实。绝大多数人只能录语音备忘录或写纸质笔记，
  再在数小时后手动录入 Procore 或类似系统，导致文档滞后、遗漏事项，
  以及当天现场观察未能及时进入系统记录时引发的昂贵变更令。

targetUser:
  primary: 商业建筑项目的总承包商和现场总监
  secondary: 在现场巡查中生成 RFI 和缺陷清单条目的项目工程师及分包商工长
  buyer: 拥有 50 名及以上现场人员的总承包商企业中的运营副总裁或建筑 IT 负责人

startupThesis:
  nonObviousInsight: >-
    Pocket $27M ARR 证明了现场工人愿意随身携带并付费使用专用 AI 采集器——
    并非因为想要又一款会议录音仪，而是因为物理按键能在双手忙碌、手机无用武之地的环境中
    生成合规清晰、免提的文档记录。建筑业是最被忽视的垂直赛道，
    因为这里的失败代价极为惨烈：一条遗漏的 RFI 可引发一张 $50,000 变更令，
    而当双手都在作业时，没有任何台式机或移动软件能弥补这个缺口。
  beachhead: >-
    已在使用 Procore 并为同日现场报告和 RFI 周转时效苦恼的、拥有 50 至 250 名现场人员的商业总承包商
  wedge: >-
    一款坚固耐用的 AI 采集器，搭配 Procore 认证集成，将口头现场观察自动路由到正确的
    RFI 草稿、日志条目或缺陷清单记录，无需任何办公室二次录入
  whyNowCatalyst: >-
    Pocket $11M 融资和 $27M ARR 验证了专用 AI 采集硬件已跨越企业采用门槛；
    建筑工人已是明确的付费客户群，这是第一个能在经过验证的硬件 PMF 基础上
    而非靠设备赌注来构建建筑垂直产品的窗口期。
  ventureScalePath: >-
    从接入 Procore 的总承包商起步，经由 Procore App Marketplace 扩展至分包商网络，
    再叠加建筑领域 AI 模型实现 OSHA 合规标注、质量检查和业主报告，
    最终成为所有现场建筑作业的文档操作系统。

solution: >-
  一款夹在腰带或安全帽上的坚固 AI 采集器，单键按压即可在现场巡查时录制口头观察。
  音频经过转录后，通过 Procore 原生集成层路由分类——将每条观察归类为日志条目、
  RFI 草稿、缺陷清单条目或安全观察，并预填建议的分项、位置和优先级字段。
  总监在巡查结束后用手机花 90 秒审批队列中的条目，无需手动转录或二次录入。
  SOC 2 级数据处理和端到端加密开箱即满足企业总承包商的安全要求。

goToMarketSeed:
  firstCustomer: >-
    拥有 50 至 250 名现场人员、有效 Procore 订阅，且近期因现场文档失败引发实际项目成本的商业总承包商
  buyingTrigger: >-
    因文档缺失或延迟引发的变更令争议或业主审计，促使运营副总裁在下个项目启动前寻求解决方案
  currentAlternative: >-
    语音备忘录由办公室管理员在交班时录入 Procore，或纸质表格扫描上传，滞后一到两天
  switchingReason: >-
    消除每日文档滞后，将现场观察直接路由到现有 Procore 工作流，
    无需采用新的系统记录；一张避免的变更令通常就能覆盖六个月的订阅费用
  pricingHypothesis: >-
    每台设备每月 $199（按现场主管计费），10 台及以上提供批量套餐；
    一张避免的 $50,000 变更令超过两年订阅成本，形成清晰且可辩护的 ROI 话术

