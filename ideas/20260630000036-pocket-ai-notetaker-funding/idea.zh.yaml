      深度 Procore 集成和 Marketplace 上架构建了分发护城河；
      按客户定制词汇微调随时间积累了迁移成本；
      硬件坚固化和建筑专用模型形成了纯软件竞争者无法在没有资本投入下复制的壁垒。
  ventureScale:
    score: 4
    rationale: >-
      商业建筑年产值逾 $6,000 亿美元；Procore 拥有逾 80 万用户，
