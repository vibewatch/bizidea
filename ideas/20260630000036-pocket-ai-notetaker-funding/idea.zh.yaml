    successMetric: 日志和 RFI 周转时间从 24 小时缩短至 2 小时以内
  - job: >-
      当变更令争议出现时，帮助运营副总裁调出加盖时间戳的现场文档，
      让总承包商无需依赖事后回忆就能为自身立场提供佐证
    currentAlternative: 散乱的纸质日志和语音备忘录，无清晰的保管链
    successMetric: 现场事件在发生后 60 秒内完成带时间戳和音频索引的记录

