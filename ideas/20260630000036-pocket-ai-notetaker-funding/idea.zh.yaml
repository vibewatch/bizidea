      Pocket $27M ARR 及四条同日获取的来源——其中明确将建筑工人列为用例——提供了强有力的实时信号；
      由于 Pocket 并非建筑垂直产品，信号属于间接信号，故上限为 4 分。
  painIntensity:
    score: 5
    rationale: >-
      建筑文档滞后是价值数十亿美元的痛点——一条遗漏的 RFI 可触发 $10,000 至 $500,000 的变更令，
      而现场工人目前没有任何专用免提采集方案。
  wedgeClarity:
    score: 5
    rationale: >-
      切口定义精准：一款坚固采集器加 Procore 认证集成，将口头观察路由到正确表单类型，
      ROI 可按每张避免的变更令量化——清晰到市场研究员可立即验证的程度。
  defensibility:
