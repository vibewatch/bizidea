topRisks:
- name: 监管责任风险
  description: 一旦建议出错或规则过时，客户可能带着不合规产品上市，信任会在早期被直接打穿。
  mitigation: 强制人工签字、所有输出都带来源引用，并先做决策支持和可审计的市场覆盖，再逐步自动化申报。
- name: 源数据太乱
  description: 很多品牌和代工厂把配方、宣称和供应商文件散落在格式不一的表格和 PDF 里。
  mitigation: 先用 concierge 式上线把一个 SKU-市场工作流跑通，再围绕客户已有系统补轻量 ingestion。
- name: 现有厂商挤压
  description: 一旦 ROI 讲清楚，广义合规平台和顾问公司都可能很快复制这条赛道。
  mitigation: 先把伙伴交接工作流抓在手里，再用可复用审批对象和集成把门槛做得比规则数据库更难抄。
