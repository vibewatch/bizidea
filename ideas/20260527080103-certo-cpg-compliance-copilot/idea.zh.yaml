problem: 中型美妆和口服保健品牌在做跨境上市时，今天仍靠顾问、表格和邮件线程来处理合规；只要配方、原料供应商或包装宣称一改，这套流程就得整包重做。每多进一个国家、每多上一家零售商，团队都可能被迫从头拼同一份证据包，结果就是上市延误、标签被打回、宣称被撤下，甚至库存卡死。
targetUser:
  primary: 每年都要进入多个非本土市场的美妆和口服保健品牌里的法规事务负责人。
  secondary: 负责支持这些上市项目的代工厂质量与合规经理。
  buyer: 品牌侧的 VP Regulatory、COO 或质量负责人。
startupThesis:
  nonObviousInsight: 最好的切口不是泛泛的合规自动化，而是一套可复用、以 SKU 为单位的宣称护照，让品牌、代工厂、分销商和零售商能共同信任同一份带引用的审批资料包。变化在于：带来源引用的 AI 和监管数据，如今已经能把审查时间压到上市节奏之内；而跨境扩张又让人工返工贵到再也塞不进人头和顾问费用里。
  beachhead: 拥有 20-200 个活跃 SKU、外包生产，并持续向 GCC 加至少一个 EU 或东南亚市场扩张的欧洲护肤和口服保健品牌。
  wedge: 每当配方或包装文案变化时，按 SKU-市场组合生成并维护各市场所需的宣称、标签和进口文件审批包。
  whyNowCatalyst: Certo 的融资和已披露进展说明，跨境美妆与 CPG 合规已经从后台痛点，变成直接卡住上市时间表的瓶颈。
  ventureScalePath: 先从美妆和健康品上市切入，再扩到更广的 CPG 类目、零售商提交流程、供应商文件，以及嵌进 PLM、ERP 和代工系统里的 API。
solution: 产品先吃进配方、成分文件、包装文案、保质期假设和目标市场，再为每个 SKU-市场组合生成一份宣称护照。它会指出哪些宣称站不住、哪些标签元素要改、哪些进口或市场准入文件还缺，而且每一步都带引用依据。品牌一旦改配方或换供应商，系统只重跑受影响的检查，并更新下游审批包，而不是整轮审查从头来过。代工厂、顾问和分销商等外部伙伴也能围着同一条证据链协作，不必继续在过期附件里来回找版本。
goToMarketSeed:
  firstCustomer: 一家年收入 €30 million 到 €200 million 的欧洲护肤或口服保健品牌，借助代工厂和分销商，每季度在 GCC 与 EU 市场推出或改配 5-20 个 SKU。
  buyingTrigger: 新的国家上市、改配，或零售商上架 deadline，让团队不得不在多个市场反复审查宣称和标签。
  currentAlternative: 靠邮件驱动的法规顾问、表格矩阵、共享盘，以及品牌和代工厂 QA 的人工复核。
  switchingReason: 首个客户愿意切换，是因为一份可复用、带引用的审批包，能替掉反复付费的顾问工作，并把“配方冻结”到“可销售库存”的路径明显缩短。
  pricingHypothesis: 按活跃 SKU-市场组合收年度平台费，再对协作席位和对外导出的 dossier 包单独收费。
