jobsToBeDone:
- job: 当产品准备进入新市场时，帮法规负责人把一套配方和一组宣称，变成一份已获批、能直接交给合作方的合规资料包，好让团队赶上零售商或分销商 deadline。
  currentAlternative: 每个市场都和顾问重建表格和邮件线程。
  successMetric: 从配方冻结到市场准入资料包获批的时间。
- job: 当供应商、成分或宣称变化时，帮品牌合规团队只找出受影响的国家和文件，这样就能更新审批，而不是把整轮审查重来。
  currentAlternative: 在表格、共享盘和顾问电话里手工做影响分析。
  successMetric: 每轮改配节省的天数。
