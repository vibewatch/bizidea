  amountM: 3.3
  runwayMonths: 24
  milestone: 到 Y2 结束时做到 6-8 个生产环境账户、2 个轻量级 PLM 或规格连接器、接近 70% 的毛利率，以及一套由顾问辅助的 pilot 转生产环境打法，再去融下一轮。
