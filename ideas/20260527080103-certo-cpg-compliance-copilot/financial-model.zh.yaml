scenarios:
  downside:
    description: pilot 转化放缓，GCC 例外处理更长时间依赖顾问兜底，而且向更多市场扩张的落地时间晚于计划。
    y3RevenueK: 2697.25
    y3EbitdaK: -853.99
    cashLowPointK: 150.11
    keyAssumptionChanges:
      - 第 3 年期末更接近 60 个活跃付费项目，而不是 84 个，因为付费 pilot 转生产环境的转化率始终低于 business-plan 目标。
      - 混合年度 ARPU 的上限更接近 $92K，而不是 $102K，因为购买 premium market-coverage 与 collaborator add-on 的账户更少。
      - 毛利率期末只能到约 71%，而不是 74%，因为伙伴协助处理例外的占比在更长时间里维持高位。
  base:
    description: 公司拿下前两个 pilot，把足够多的上市项目转成年费生产环境，再靠伙伴转介绍和可复用连接器放大。
    y3RevenueK: 4055.25
    y3EbitdaK: 220.51
    cashLowPointK: 665.01
    keyAssumptionChanges:
      - 季度末活跃付费项目从 Q4Y2 的 13 个爬坡到 Q4Y3 的 84 个，靠的是 pilot 拿单与扩展项目一起复利增长。
      - 随着 collaborator、export 和 market-coverage upsell 挂上去，混合年度 ARPU 从 Y2 的 $62K-$78K 抬升到 Y3 的 $85K-$102K。
      - 随着资料包模板和连接器复用减少人工工作，毛利率从 Y2 早期的 62% 提升到 Q4Y3 的 74%。
  upside:
    description: 伙伴渠道更早成熟，转化率持续高于目标，额外市场覆盖模块也能抬升变现，而无需线性扩张服务团队。
    y3RevenueK: 5005.63
    y3EbitdaK: 1001.08
    cashLowPointK: 967.91
    keyAssumptionChanges:
      - 第 3 年期末更接近完整的 90+ 付费项目 SOM 路径，因为顾问转介绍和创始人主导销售都更快转化。
      - 到 Q4Y3，混合年度 ARPU 可达到约 $108K，因为更多客户更早加购额外市场和 collaborator 模块。
      - 随着例外处理越来越模板化、实施人力下降速度快于收入增速，毛利率可提升到 76%。
sensitivity:
  - variable: ARPU
    downsideCase: $75K annual ARPU
    baseCase: $85K annual ARPU
    upsideCase: $95K annual ARPU
    y3RevenueImpactK: -480.0
    cashImpactK: -360.0
  - variable: CAC
    downsideCase: 销售仍然高度定制化，对应 $38K CAC
    baseCase: $30K CAC
    upsideCase: 伙伴渠道带来交易，对应 $24K CAC
    y3RevenueImpactK: -120.0
    cashImpactK: -260.0
  - variable: 流失率
    downsideCase: 3.0% monthly churn
    baseCase: 1.8% monthly churn
    upsideCase: 1.2% monthly churn
    y3RevenueImpactK: -300.0
    cashImpactK: -190.0
  - variable: 销售周期
    downsideCase: 9 个月的 pilot 转生产环境周期
    baseCase: 6 个月的混合周期
    upsideCase: 4-5 个月周期，且转介绍很强
    y3RevenueImpactK: -720.0
    cashImpactK: -480.0
  - variable: 毛利率
    downsideCase: 69% steady-state gross margin
    baseCase: 74% steady-state gross margin
    upsideCase: 76% steady-state gross margin
    y3RevenueImpactK: 0.0
    cashImpactK: -300.0
  - variable: 招聘节奏
    downsideCase: 后台与渠道岗位提前 2 个季度招聘
    baseCase: 支持岗位在转化被证明后再补
    upsideCase: 1 个非核心岗位推迟到 60 个活跃项目之后再招
    y3RevenueImpactK: -90.0
    cashImpactK: -220.0
modelDiagram:
  title: 单位经济模型流转
  mermaid: |
    flowchart LR
      FounderOutbound --> PaidPilots
      PartnerReferrals --> PaidPilots
      PaidPilots --> ProductionPrograms
      ProductionPrograms --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: 收入引擎
    finding: 基准情景的收入来自活跃付费上市项目和生产环境项目的增长——从 Q4Y2 的 13 个涨到 Q4Y3 的 84 个，同时继续卖额外市场覆盖和 collaborator 模块。
  - checkName: 必须做对的事
    finding: 公司必须把 pilot 转生产环境的转化率守在计划附近，并用伙伴辅助的 onboarding 控住人效，避免每来一个新项目就线性扩编。
  - checkName: 模型失效条件
    finding: 如果销售周期拉长到接近 9 个月，且毛利率迟迟过不了 69%，那么在拿到下一轮融资证明前，downside 情景下的现金最低点会逼近约 $150K。
  - checkName: 下一轮证明点
    finding: 只要公司在 Y2 结束时做到 6-8 个生产环境账户、2 个已上线连接器、接近 70% 的毛利率，以及一套可复用的顾问辅助扩张动作，下一轮融资就讲得通。
sanityChecks:
  ruleOf40: Y3 增长 588.79% + EBITDA 利润率 5.44% = 594.23%
  burnMultiple: Y2 burn multiple 为 1.94x，对应净新增 ARR；到 Y3 转为正现金流。
  revenuePerFte: Y3 退出时 14 名 FTE 对应每人 $289.66K 收入（SaaS 基准为 $200-400K）
  flags:
    - customersEop 统计的是付费项目，不是单纯去重后的客户 logo，因为 pilot 和扩展项目在账户转成年费生产客户前就已经开始变现。
    - 基准情景仍依赖额外市场覆盖和 collaborator upsell，把混合 ARPU 在 Y3 推到初始核心订阅区间之上。
    - Y2 的 burn 相对收入故意压得偏重，因此哪怕留了缓冲，只要伙伴渠道放缓或 pilot 转化变弱，公司大概率也得更早融资。
    - 模型已经做到与 business-plan 接近的 Y3 生产环境收入，但客户数仍略低于“约 90 个付费客户”的 headline，因此执行必须足够强，才能补齐这段差距。
