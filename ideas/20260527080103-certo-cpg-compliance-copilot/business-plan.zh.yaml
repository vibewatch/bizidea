slug: cross-border-claims-passport
date: '2026-05-27'
executiveSummary: Cross-border Claims Passport 应该先做成一款人机协同的合规工作流产品，服务从欧洲向沙特、阿联酋和新加坡扩张的护肤与个护品牌；口服保健要等信任模型跑通后再上。第一个客户应是一家年收入 €30 million 到 €200 million、拥有 20-200 个活跃 SKU、外包生产、且每季度有 5-20 个新品或改配上市项目的品牌。今天这类客户的法规和质量团队还在用表格、顾问邮件和过期 PDF 反复拼各国资料包。真正的购买触发点，是临近的市场上市、改配或零售商 deadline：合规审查会直接卡住发货。产品要做的，是生成带引用的 SKU-市场审批包；一旦配方或宣称变化，只重跑受影响的检查；并让品牌、代工厂、分销商和进口商都围着同一条证据链协作。GTM 应先从创始人主导、绑定单个上市项目的付费 pilot 起步，再扩成按活跃 SKU-市场组合和协作方使用量计费的年约。只有站在现有 PLM 系统之上、顾问之下，证明自己既能缩短审查周期、又不要求客户去信任黑箱自动化，这家公司才有机会赢。研究支持这是一条有意义的切口：滩头 SAM 约 $95.2M，3 年 SOM 约 $6.0M；但公开定价锚点仍不透明，真实 ACV 必须靠付费 pilot 验证后才能加人扩张。最大反证风险在于，各国例外规则和凌乱源数据会不会把这门生意长期压成“软件 + 服务”，做不出软件毛利。
problem:
- 跨境美妆上市今天仍要求团队在每个 SKU-市场组合上，反复重建配方、宣称、标签、备案和进口商材料；只要配方、供应商或包装设计有变，这套工作就要再来一遍。
- 品牌、代工厂、分销商和本地市场代理今天还在表格、邮件线程和 PDF 之间协作，结果就是上市 deadline 一再后移，标签或宣称被打回后，库存被卡住，甚至还得重贴标。
solution:
- 为每个 SKU-市场组合生成一份带引用的审批包，明确写清哪些宣称可用、哪些标签要改、哪些市场准入文件还缺，以及审核人最终签字。
- 把这份审批包当作品牌团队和外部伙伴共用的工作流对象；一旦改配、换供应商或改包装，只重跑受影响的检查，不把整轮审查推倒重来。
whyWeWin:
- 产品抓住的是面向伙伴的审批对象：法规情报工具在旁边监测，PLM 系统在底下存数据，而这里的切口更窄、见效更快，也不要求替掉前两者。
- 带来源引用的输出，再叠加强制人工签字，天然符合买方对宣称与标签工作流的责任要求。
- 先从美妆切进 GCC 和新加坡，能遇到高频且高摩擦的工作流；一旦已通过宣称历史、例外模式和供应商数据标准化滚起来，就有机会沉成真正的护城河。
strategicChoices:
  beachhead: 拥有 20-200 个活跃 SKU、外包生产，并从 EU 持续向沙特、阿联酋和新加坡上市的欧洲护肤与个护品牌。
  wedgeRationale: 这批客户的上市时间痛点最显性，买方也更集中，而且 SKU-市场层面的重复工作足够多，撑得起持续性软件支出。相比一上来服务所有 CPG，这条切口更容易更快跑出证明，因为同一个客户会在一小组首发市场里反复遇到宣称、标签和进口文件更新。
  sequencingRationale: 产品一开始应该先做美妆场景的决策支持、带引用的审批包和协作工作流，再往更深的自动化走；现阶段比“覆盖更广”更重要的，是信任、可审计和伙伴协同。GTM 也应先靠创始人主导 pilot 和顾问兜底起步；只有当公司在前 3 个市场证明审批包可复用、pilot 能转产、例外率也可接受之后，才去补轻量集成和规模化销售。
  notYet:
  - 先不做美妆和外用个护之外的大食品/泛 CPG 覆盖
  - 先不做没有人工签字的全自动宣称审批或申报提交
  - 先不做整套替换式 PLM 更换
  - 在核心进口商和分销商资料包尚未跑顺之前，先不做按平台渠道拆分的文件模块
market:
  tam: 预计 TAM 为 $390.0M：全球大约有 6,000 家多市场运营的美妆与健康品牌或代工厂，复杂度足以支撑每年约 $65k 的宣称护照和协作支出。
  sam: 预计 SAM 为 $95.2M：大约 1,400 家欧洲起家的美妆与健康品牌和制造商，符合首阶段“从 EU 扩到 GCC 或新加坡”的画像。
  som: 预计第 3 年 SOM 为 $6.0M：聚焦 Europe-to-GCC 与新加坡滩头市场，拿下约 90 个付费客户、每家约 $67k ACV。
  segments:
  - 向 GCC 和新加坡扩张的欧洲护肤与个护品牌
  - 反复做多市场宣称与标签审查的口服保健品牌和代工厂
  buyingProcess: 购买流程通常从上市日历、改配，或分销商 deadline 暴露出“合规已经卡住发货”开始。法规事务负责人往往会先推动试点；真正拍板的经济买方一般是 VP Regulatory、COO 或质量负责人；本地市场专家和系统 owner 则会在 pilot 转年约前，对签字机制和集成范围提出要求。
product:
  mvp: MVP 应该先做美妆场景的宣称护照，覆盖从 EU 进入沙特、阿联酋和新加坡的上市工作流。它要能从现有表格或 PDF 吃进配方、成分、供应商和包装文案输入，为一个 SKU-市场组合生成带引用的资料包，标出站不住的宣称和缺失文件，并记录审核人签字、改动历史和伙伴评论。
  sixMonth: 前 6 个月要在同一条工作流主干上拿下 2 个付费 pilot，支持沙特、阿联酋和新加坡的带引用审批包生成，并证明改配后无需整轮审查重来。
  twelveMonth: 12 个月内把 2-3 个 pilot 转成年度合同，为代工厂和分销商上线协作门户，并从现有规格系统或 PLM 做轻量导入，让产品站在这些系统之上，而不是替掉它们。
  twentyFourMonth: 24 个月后，只有在例外率、审批包复用和毛利趋势都过关时，才从美妆扩到精选口服保健工作流和更多 GCC/ASEAN 市场。
  keyBets:
  - 首发只做 3 个市场，已经足以覆盖滩头客户的大部分痛点，撑起付费 pilot。
  - 客户会更快为“带可审计引用的决策支持”买单，而不是一步到位买全自动申报。
  - 在需要深度 PLM 集成之前，先靠表格和 PDF 的轻量 ingestion，就能赢下前几单。
  - 面向伙伴的协作层，正是现有厂商即便握有相邻产品数据，也没有真正解决好的空白。
gtm:
  wedge: 先卖一个围绕沙特、阿联酋和新加坡的付费上市准备试点，覆盖一组即将上市的 SKU；随后随着新品和改配复用同一资料包，扩成年度跨境工作流。
  channels:
  - 针对欧洲美妆出口商里的法规、质量和上市运营负责人，做创始人主导直销
  - 与法规顾问、检测实验室和本地市场专家建立转介绍与交付合作
  - 工作流价值跑通后，再通过 PLM 和规格系统集成带动扩张
  funnelTargets: 目标漏斗为：discovery→合格 pilot 25-35%，合格 pilot→付费 pilot 30-40%，pilot→生产环境 60%+，生产环境→第 2 条工作流或市场扩张在 12 个月内达到 50%+。
  pricing: 第一阶段对首个上市项目收付费 pilot 费用；随后按活跃 SKU-市场组合收年费，并对协作席位、资料包导出和更广市场覆盖另收费。这个计费方式贴合买方预算——他们的钱本来就和上市量、伙伴协同以及省下的顾问返工直接挂钩。
businessModel:
  revenueStreams:
  - 面向宣称护照生成、规则更新、审计历史和工作流编排的年度订阅
  - 按在管 SKU-市场组合收取的用量费用
  - 用于伙伴工作区、导出和更深集成的实施费与高级协作模块
  unitOfValue: 通过带引用审批包管理的活跃 SKU-市场组合
  targetGrossMarginPct: 70
  expansionLevers:
  - 从单一上市项目扩到同一品牌内的所有新品和改配项目
  - 一旦代工厂、分销商和进口商开始依赖审批包，就增加更多伙伴席位和外部工作区
  - 等前 3 个市场跑稳后，再叠加相邻市场和产品类别
  - 当审批包历史足够多后，再把工作流基准和例外分析单独变现
strategyMap:
  northStarMetric: 配方、供应商或宣称变化后仍被继续复用的活跃 SKU-市场审批包
  inputMetrics:
  - 签下的合格 pilot 数
  - 从配方冻结到审批包通过的中位天数
  - pilot 转生产环境的转化率
  - 变更事件后的审批包复用率
  - 带完整引用和审核人签字的输出占比
  - 每个生产环境账户的每周活跃外部协作者数量
  moatsToBuild:
  - 按市场、品类和证据模式沉淀的已通过/被拒宣称历史
  - 横跨品牌与代工厂源系统的配方、供应商和包装元数据标准化层
  - 按国家记录例外、驳回原因和文件依赖的工作流图谱
  - 连接规格、包装设计和 PLM 系统的可复用连接器，持续压低部署时间
  killCriteria:
  - 聚焦滩头市场销售 9 个月后，付费 pilot 仍少于 2 个
  - 前 3 个 pilot 里，审查周期中位数缩短仍低于客户人工基线的 50%
  - 聚焦做满 12 个月后，仍有超过 30% 的资料包需要本地专家整包重写
  mermaid: "flowchart LR\n  Wedge[EU 美妆上市切口] --> MVP[带引用的宣称护照 MVP]\n  MVP --> Proof[周期缩短与信任验证]\n  Proof --> Expansion[更多市场与产品类别]\n"
investorMemo:
  verdict:
    call: 约见 / 继续深入研究
    conviction: 工作流痛点很强，切口也足够克制，值得见；但真正的信心，要等公司先证明 ACV 和自动化深度，再谈加人扩张。
    whyBelieve: 研究表明，买方痛点集中、顾问和现有软件预算已存在，而监管情报厂商和 PLM 厂商之间那层面向伙伴的工作流空档，至今没人真正拿下。
    whyDoubt: 责任风险、凌乱源数据和现有厂商打包能力，都可能把产品长期压成“软件 + 服务”，而不是风投级工作流平台。
    nextDiligence: 下一步最关键的证明，是拿下 2 个付费 pilot，把审查周期至少砍半、把 1 个客户转成年约，并证明顾问兜底不会把毛利打穿。
  firstCustomer:
    title: 欧洲护肤出口品牌里的法规事务负责人
    profile: 一家年收入 €30 million 到 €200 million、外包生产、拥有 20-200 个活跃 SKU，并持续向沙特、阿联酋和新加坡上市的美妆品牌。
    trigger: 临近的国家上市、改配，或分销商 deadline，迫使团队不得不在多个市场反复审查宣称、标签和资料包。
    buyer: VP Regulatory 或质量负责人
    initialContract: 先签一笔约 €15k-30k、覆盖单个上市项目 8-12 周的付费 pilot；若效果成立，再转成约 €50k-90k 的年费订阅，按活跃 SKU-市场组合和协作方使用量计价。
  mustBeTrue:
  - 至少一半合格的滩头品牌，每年都有足够多的 SKU-市场组合，能支撑 €50k+ 的持续性软件支出。
  - 前 3 个 pilot 要在保证完整引用覆盖和人工签字的前提下，把审查周期中位数至少压缩 50%。
  - 即便还没做完整 PLM 集成，单独一层宣称护照 + 表格/PDF ingestion 也能被客户采纳。
  - 顾问和本地市场伙伴愿意在共享审批包里协作，而不是继续退回邮件附件和场外文件。
  - 沙特、阿联酋和新加坡的国家级例外规则要足够有限，毛利才能往 70% 靠，而不是一直停留在服务业水平。
  diligenceQuestions:
  - 目标客户每季度到底会处理多少次上市、改配和 SKU-市场组合？
  - 在沙特、阿联酋和新加坡，即便源数据干净，工作流里还有哪些步骤必须交给本地人工判断？
  - 今天到底是哪套系统在管理配方、规格和包装设计？第一个买家会要求多少集成工作？
  - 采购和法务在批准部署前，会要求什么样的责任条款、审核控制和审计证据？
  - 客户为什么会买这层产品，而不是多加顾问工时，或者把现有 PLM / 监管情报工具继续往前延？
operatingAssumptions:
- assumption: 滩头客户的上市与改配量，足以支撑 €50k-90k 的年约。
  basis: research.yaml
  validationTest: 从 5-10 家目标品牌收集上市日历，确认至少一半客户每年管理 40 个以上 SKU-市场组合。
  decisionImpact: 如果不成立，就把 ICP 收窄到更大的企业品牌，或者把定价改成管理式项目，而不是持续性 SaaS。
- assumption: 在客户接受全自动申报或审批前，他们会先接受“带引用的决策支持 + 强制审核人签字”。
  basis: research.yaml
  validationTest: 与 5 个目标买家做 pilot 方案评审，并在不承诺完全自动化的前提下签下 2 个付费 pilot。
  decisionImpact: 如果不成立，公司就得加更多服务人力，或者暂缓产品范围，等信任门槛下降。
- assumption: 前 6-12 个月里，靠表格和 PDF ingestion 就足够部署。
  basis: 运营判断
  validationTest: 前 3 个 pilot 中，每个账户都能在不做定制 PLM 集成的前提下，于 30 天内上线一个上市项目。
  decisionImpact: 如果不成立，工程团队必须更早优先做集成，销售也应只盯系统兼容的客户。
- assumption: 顾问和本地市场伙伴能兜住国家级例外，但不会把毛利压到目标模型以下。
  basis: research.yaml
  validationTest: 跟踪前 50 个资料包里的伙伴辅助例外处理，把伙伴 + 内部人工成本控制在 pilot 收入的 30% 以下。
  decisionImpact: 如果不成立，就缩减市场覆盖、提价，或在自动化深度提升前暂缓扩张。
- assumption: 先做美妆，能积累足够证明和数据，支撑后续扩到口服保健。
  basis: idea.yaml
  validationTest: 至少拿到 3 个美妆生产环境客户并沉淀可复用审批包历史，再投入保健品专属宣称逻辑。
  decisionImpact: 如果不成立，就继续把焦点压在美妆上，并从 24 个月路线图里去掉口服保健扩张。
experimentRoadmap:
- horizon: 0–90 天
  experiment: 量化上市量与 ACV 匹配度
  hypothesis: 滩头品牌有足够持续性的 SKU-市场工作量，撑得起付费 pilot 和 €50k+ 年约。
  successMetric: 完成 10 次买家访谈，拿到 5 份匿名上市日历，并证明合格线索里至少一半每年有 40 个以上 SKU-市场组合。
  owner: 创始人/CEO
- horizon: 0–90 天
  experiment: concierge 式宣称护照原型
  hypothesis: 即便还没全自动化，覆盖沙特、阿联酋和新加坡的带引用资料包，也能显著缩短审查时间。
  successMetric: 拿下 2 个付费 pilot 承诺，并在一条真实上市项目上，把基线到 pilot 的审查周期压缩 50% 以上。
  owner: 法规产品负责人
- horizon: 90–180 天
  experiment: 和本地伙伴共建例外地图
  hypothesis: 国家级例外规则可以被编码到足够可控的程度，不至于让人工升级失控。
  successMetric: 把前 3 个市场的直通路径与专家复核路径画清楚，并把整包人工重写比例压到试点资料包的 30% 以下。
  owner: 合规运营负责人
- horizon: 90–180 天
  experiment: 轻量 ingestion 与协作工作流
  hypothesis: 即便没有深度 PLM 集成，客户和外部伙伴也愿意直接在共享审批包里工作。
  successMetric: 拿到 1 个生产环境 pilot，靠表格或 PDF 导入跑通流程，并让至少 1 个代工厂或分销商工作区持续活跃。
  owner: 创始工程师
- horizon: 6–12 个月
  experiment: pilot 转产与定价验证
  hypothesis: 上市准备 pilot 能转成年费版 SKU-市场定价模型，而且毛利可接受。
  successMetric: 至少 1 个 pilot 在结果复盘后 60 天内转成 12 个月合同，隐含 ACV 高于 €50k。
  owner: 创始人/CEO
- horizon: 12–18 个月
  experiment: 由集成带动扩张
  hypothesis: 当工作流价值已经跑通后，接一个规格系统或 PLM 的轻量连接器，能加速扩张，而不会把公司拖成定制实施团队。
  successMetric: 连接器上线后，2 个生产环境客户扩到第 2 个团队或第 2 个市场，同时实施工作仍低于收入的 20%。
  owner: 解决方案工程师
operations:
- 为沙特、阿联酋和新加坡维护一套受控的规则与引用资料库，每次更新都要有明确责任人复核。
- 建起一条合规运营队列，统一处理例外、审核人签字和伙伴升级，让每份资料包都留有可见的审计轨迹。
- 把每条工作流都打上周期、资料包复用、引用完整度、例外率和协作采用度等指标。
- 只在边角案例里选择性调用顾问、实验室和本地市场伙伴，同时牢牢把共享审批包和工作流数据抓在自己手里。
team:
- role: 创始人/CEO
  startTiming: Month 0
  rationale: 前期买家少而集中，且非常看重可信度，所以创始人必须亲自抓销售、pilot 设计和伙伴谈判。
- role: 创始工程师
  startTiming: Month 0
  rationale: 把工作流引擎、引用层、审计日志和协作界面做出来，支撑前几个付费 pilot。
- role: 法规产品负责人
  startTiming: Month 1
  rationale: 把各市场的宣称、标签和文件要求翻成可复用的审批逻辑和审核手册。
- role: 合规运营负责人
  startTiming: Month 3
  rationale: 负责上线、例外处理和伙伴协同，避免创始人长期陷进服务瓶颈。
- role: 解决方案工程师
  startTiming: Month 6
  rationale: 降低客户集成摩擦，把定制上线经验沉淀成可复用连接器和模板。
- role: 客户经理
  startTiming: Month 12
  rationale: 只有当 pilot 转生产打法和可引用客户都成型后，才开始加规模化销售。
milestones:
- horizon: 0–12 个月
  items:
  - 拿下 2 个欧洲护肤或个护品牌的付费 pilot。
  - 为美妆切口上线沙特、阿联酋和新加坡的生产级工作流覆盖。
  - 在第一个生产环境客户里，把审查周期中位数至少压缩 50%。
  - 至少把 1 个 pilot 转成 12 个月年约。
- horizon: 12–24 个月
  items:
  - 做到 6-8 个生产环境客户，且上线流程可复用，代工厂/分销商侧协作持续活跃。
  - 至少接入 2 套现有规格系统或 PLM 的轻量连接器。
  - 在大多数生产环境客户里，改配和换供应商都能复用审批包。
  - 判断口服保健扩张是否达到了 kill criteria 里设定的信任和毛利门槛。
- horizon: 24–36 个月
  items:
  - 扩到约 90 个付费客户，或做到与 $6.0M SOM 对齐的等价生产环境收入。
  - 如果例外率仍在目标线内，就扩到更多 GCC/ASEAN 市场和精选口服保健工作流。
  - 把工作流基准数据和驳回分析做成高级扩张模块。
risks:
- risk: 错误或过时的建议导致宣称或标签出错，过早打穿客户信任。
  likelihood: Medium
  impact: High
  mitigation: 所有输出都带来源引用，强制审核人签字，先以决策支持形态上线，并对每次规则更新留痕审计。
- risk: 客户源数据过乱，无法快速上线和生成审批包。
  likelihood: High
  impact: High
  mitigation: 先把表格和 PDF ingestion 范围压窄，只围绕一条上市工作流要求最少字段，并在规模化销售前先招合规运营。
- risk: 现有 PLM 或监管情报厂商把类似的审批层打包进来。
  likelihood: Medium
  impact: High
  mitigation: 继续把重心压在伙伴侧资料包维护、更快部署和可复用协作工作流上，而不是去拼大而全的数据系统。
- risk: GCC 或新加坡的国家级例外太多，把业务长期压成服务型。
  likelihood: Medium
  impact: High
  mitigation: 用顾问伙伴做有边界的兜底，紧盯重写率，并在前 3 个市场经济性稳定前推迟新市场扩张。
- risk: 销售周期被拉长，因为法务、质量和系统团队都要一起批准部署。
  likelihood: Medium
  impact: Medium
  mitigation: 把 pilot 锚定在一个正在发生的上市 deadline 上，保持初期集成足够轻，并卖“周期缩短”的量化结果，而不是大规模转型故事。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: 2.5-3.5M (百万美元)
  runwayMonths: 18
  useOfFundsSummary: 这笔钱要覆盖 18 个月的产品和工作流工程建设、沙特/阿联酋/新加坡的监管内容与合规运营覆盖、2-3 个生产级共创客户，以及第一套可复用、由顾问辅助的 GTM 动作。
