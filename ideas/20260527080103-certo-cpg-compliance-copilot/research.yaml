openQuestions:
  - >-
    How many beachhead customers launch enough SKU-market pairs each quarter to justify a dedicated
    annual software budget rather than ad hoc consulting spend?
  - >-
    Which GCC and ASEAN approval steps can be automated reliably from source data, and which still
    need local expert judgment every time?
  - >-
    Will buyers prefer a standalone passport application, or will they only adopt if it plugs
    directly into incumbent PLM or specification systems?
  - >-
    What minimum evidence trail is required for buyers to trust AI-generated claim and labeling
    recommendations without slowing review cycles?
