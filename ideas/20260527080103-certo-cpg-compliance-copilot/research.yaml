competitors:
  - name: RegASK
    stage: scale-up
    wedge: >-
      AI regulatory intelligence, alerting, and expert-backed monitoring for regulatory affairs
      teams.
    pricing: Custom quote via demo.
    strength: >-
      Strong monitoring narrative, multilingual update coverage, and AI operating-system positioning
      for regulatory teams.
    weaknessVsUs: >-
      Centers on knowing and tracking regulatory change rather than maintaining a reusable
      SKU-market approval packet across external partners.
    sourceRefs:
      - 39
      - 40
  - name: Compliance & Risks
    stage: incumbent
    wedge: Global regulatory intelligence coverage from formulation through labeling and distribution.
    pricing: Custom quote via enterprise sales.
    strength: Broad cosmetics coverage and trusted intelligence posture for complex multinational teams.
    weaknessVsUs: >-
      More of an intelligence and content layer than a workflow-native claims passport shared with
      CMOs, importers, and distributors.
    sourceRefs:
      - 59
  - name: Trace One
    stage: incumbent
    wedge: End-to-end PLM and compliance software for food, beverage, cosmetics, and chemical brands.
    pricing: Custom quote.
    strength: >-
      Large installed base, global coverage, and strong fit as a system of record for product and
      supplier data.
    weaknessVsUs: >-
      Heavier PLM transformation motion that does not automatically solve partner-facing approval
      packet maintenance.
    sourceRefs:
      - 47
      - 61
  - name: Aptean Lascom Edition PLM
    stage: incumbent
    wedge: >-
      Cosmetics-specific PLM focused on centralizing fragmented data and accelerating compliant
      product launches.
    pricing: Custom quote or request pricing.
    strength: Purpose-built language for cosmetics manufacturers and strong internal data-management story.
    weaknessVsUs: >-
      More internal PLM than cross-company collaboration layer, so external dossier handoffs remain
      a gap.
    sourceRefs:
      - 45
  - name: Centric Software
    stage: incumbent
    wedge: >-
      PLM for cosmetics and personal care linking product development and compliance at enterprise
      scale.
    pricing: Custom quote.
    strength: Recognized enterprise PLM brand with broad product-development scope.
    weaknessVsUs: >-
      Generic PLM breadth can make a narrow, fast-to-value claims-passport wedge look lighter and
      easier to deploy.
    sourceRefs:
      - 46
