modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      FounderOutbound --> PaidPilots
      PartnerReferrals --> PaidPilots
      PaidPilots --> ProductionPrograms
      ProductionPrograms --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
- checkName: Revenue engine
  finding: Base-case revenue comes from growing active paid launch and production programs from 13 at Q4Y2 to 84 at Q4Y3 while upselling extra markets and collaborator modules.
- checkName: Must go right
  finding: The company must hold pilot-to-production conversion near the plan and use partner-assisted onboarding so headcount does not scale one-for-one with every new program.
- checkName: Model breaks if
  finding: If sales cycles stretch toward nine months and gross margin stalls below 69%, downside cash falls toward roughly $150K before the next round proof is established.
- checkName: Next-round proof
  finding: The next financing is justified by exiting Y2 with 6-8 production accounts, two live connectors, gross margin near 70%, and a repeatable consultant-assisted expansion motion.
sanityChecks:
  ruleOf40: Y3 growth 588.79% + EBITDA margin 5.44% = 594.23%
  burnMultiple: Y2 burn multiple 1.94x on net new ARR, improving to cash-generative in Y3.
  revenuePerFte: $289.66K Y3 on 14 exit FTE (benchmark $200-400K SaaS)
  flags:
  - customersEop models paid programs, not purely distinct logos, because pilots and expansion programs are monetized before every account becomes a full annual production customer.
  - The base case still depends on add-on market coverage and collaborator upsells pushing blended ARPU above the initial core subscription range by Y3.
  - Y2 burn is intentionally heavy relative to revenue, so a slower partner channel or weaker pilot conversion would likely force an earlier raise even with the modeled buffer.
  - The model reaches equivalent Y3 production revenue but still lands slightly below the business-plan headline of about 90 paying customers, so execution must stay strong to close that gap.
