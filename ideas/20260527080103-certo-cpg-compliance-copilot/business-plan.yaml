slug: cross-border-claims-passport
date: '2026-05-27'
executiveSummary: >-
  Cross-border Claims Passport should launch as a human-in-the-loop compliance workflow product for European skincare and personal-care brands
  expanding into Saudi Arabia, the UAE, and Singapore, with ingestible wellness added only after the trust model is proven. The first customer is
  a €30 million to €200 million brand with 20-200 active SKUs, outsourced manufacturing, and 5-20 new or reformulated launches per quarter, where
  regulatory and quality teams repeatedly rebuild country-specific packets from spreadsheets, consultant emails, and stale PDFs. The acute buying
  trigger is an upcoming market launch, reformulation, or retailer deadline that makes compliance review the critical path to shipping inventory.
  The product should create a cited SKU-market approval packet, rerun only affected checks when formulas or claims change, and keep brand, CMO,
  distributor, and importer stakeholders on the same evidence trail. The go-to-market motion should start with founder-led paid pilots tied to
  one launch program, then expand into annual contracts priced by active SKU-market pairs and collaborator usage. The company wins only if it sits
  above incumbent PLM systems and below consultants, proving it can reduce review cycle time without asking customers to trust black-box
  automation. Research supports a meaningful wedge with an estimated $95.2M beachhead SAM and $6.0M year-3 SOM, but public pricing benchmarks
  remain opaque and the true ACV must be validated in paid pilots before scale hiring. The biggest disconfirming risk is that country-specific
  exceptions and messy source data keep the business too services-heavy to reach software margins.
problem:
  - "Cross-border beauty launches still require teams to rebuild formula, claims, label, notification, and importer evidence for each SKU-market pair whenever formulas, suppliers, or artwork change."
  - "Because brands, CMOs, distributors, and local-market agents work from spreadsheets, email threads, and PDFs, launch deadlines slip and rejected labels or claims can strand inventory and force relabeling."
solution:
  - "Generate a cited approval packet for each SKU-market pair that shows allowed claims, required label changes, missing market-entry documents, and explicit reviewer sign-off."
  - "Maintain that packet as a shared workflow object across brand teams and outside partners, rerunning only the impacted checks after reformulations, supplier changes, or packaging edits."
whyWeWin:
  - "The product owns the partner-facing approval object that regulatory-intelligence tools monitor around and PLM systems store data beneath, which is a narrower and faster-to-value wedge than replacing either system."
  - "Source-cited outputs plus mandatory human sign-off fit the liability posture buyers already expect in claims and labeling workflows."
  - "A cosmetics-first launch into GCC and Singapore creates repeated, high-friction workflows where accepted-claim history, exception patterns, and normalized supplier data can compound into a real moat."
strategicChoices:
  beachhead: "European skincare and personal-care brands with 20-200 active SKUs, outsourced manufacturing, and active launches from the EU into Saudi Arabia, the UAE, and Singapore."
  wedgeRationale: >-
    This slice has visible launch-timeline pain, concentrated buyers, and repeated SKU-market work that can support recurring software spend.
    It creates faster proof than serving all CPG because the same account will face recurring claims, labeling, and importer-document updates
    across a manageable first market set.
  sequencingRationale: >-
    Product should start with cosmetics decision support, cited packets, and collaborator workflows before deeper automation, because trust,
    auditability, and partner coordination matter more than breadth at this stage. GTM should begin with founder-led pilots and consultant
    backstops, then add lightweight data integrations and scaled sales only after the company proves packet reuse, production conversion, and
    acceptable exception rates in the first three markets.
  notYet:
    - "Broad food and general CPG coverage beyond beauty and topical personal care"
    - "Fully autonomous claim approval or filing submission without human reviewer sign-off"
    - "Rip-and-replace PLM deployments"
    - "Marketplace-specific documentation modules before the core importer and distributor packet is repeatable"
market:
  tam: "$390.0M estimated TAM based on roughly 6,000 multi-market beauty and wellness brands or CMOs that could support about $65k in annual passport and collaboration spend."
  sam: "$95.2M estimated SAM for about 1,400 Europe-origin beauty and wellness brands and manufacturers that fit the initial EU-to-GCC or Singapore expansion profile."
  som: "$6.0M estimated year-3 SOM based on roughly 90 paying customers at about $67k ACV through a focused Europe-to-GCC and Singapore beachhead."
  segments:
    - "European skincare and personal-care brands expanding into GCC and Singapore"
    - "Ingestible-wellness brands and contract manufacturers with repeated multi-market claims and labeling reviews"
  buyingProcess: >-
    The process starts when a launch calendar, reformulation, or distributor deadline exposes compliance as the bottleneck to shipping. A
    regulatory affairs lead usually champions the workflow, while the economic buyer is the VP Regulatory, COO, or Head of Quality and local
    market experts or systems owners weigh in on sign-off and integration scope before a pilot converts to an annual contract.
product:
  mvp: >-
    MVP is a cosmetics-first claims passport for launches from the EU into Saudi Arabia, the UAE, and Singapore. It should ingest formula,
    ingredient, supplier, and packaging-copy inputs from existing spreadsheets or PDFs, generate a cited packet for one SKU-market pair, flag
    unsupported claims or missing documents, and record reviewer sign-off, change history, and partner comments.
  sixMonth: "Launch 2 paid pilots on the same workflow spine, support cited packet generation for Saudi Arabia, the UAE, and Singapore, and prove that reformulations can be updated without restarting the full review."
  twelveMonth: "Convert 2-3 pilots into annual contracts, add collaborator portals for CMOs and distributors, and ship lightweight imports from incumbent spec or PLM systems so the product sits above rather than replaces them."
  twentyFourMonth: "Expand from cosmetics into selected ingestible-wellness workflows and additional GCC or ASEAN markets only after exception rates, packet reuse, and gross-margin trends support broader coverage."
  keyBets:
    - "A constrained three-market launch set captures enough of the beachhead's pain to justify paid pilots."
    - "Customers will buy decision support with auditable citations faster than they will buy full filing automation."
    - "Lightweight ingestion from spreadsheets and PDFs is good enough to win the first pilots before deeper PLM integrations are required."
    - "Partner-facing collaboration is the missing layer incumbents do not solve well, even when they own adjacent product or regulatory data."
gtm:
  wedge: "Sell a paid launch-readiness pilot for one upcoming SKU set across Saudi Arabia, the UAE, and Singapore, then expand to an annual cross-border workflow as new launches and reformulations reuse the same packet."
  channels:
    - "Founder-led direct sales to regulatory, quality, and launch-operations leaders at European beauty exporters"
    - "Referral and delivery partnerships with regulatory consultants, testing labs, and local-market specialists"
    - "Integration-led expansion through PLM and specification systems after the workflow proves value"
  funnelTargets: "Target discovery→qualified pilot 25-35%, qualified pilot→paid pilot 30-40%, pilot→production 60%+, and production→second workflow or market expansion 50%+ within 12 months."
  pricing: "Charge a paid pilot for the first launch program, then an annual subscription priced by active SKU-market pairs with add-on fees for collaborator seats, dossier exports, and higher market coverage; this matches a buyer whose budget is tied to launch volume, partner coordination, and avoided consultant rework."
businessModel:
  revenueStreams:
    - "Annual subscription for passport generation, rule updates, audit history, and workflow orchestration"
    - "Usage fees tied to active SKU-market pairs under management"
    - "Implementation and premium collaboration modules for partner workspaces, exports, and deeper integrations"
  unitOfValue: "Active SKU-market pair managed through a cited approval packet"
  targetGrossMarginPct: 70
  expansionLevers:
    - "Expand from one launch program into all new launches and reformulations within the same brand"
    - "Add more partner seats and external workspaces once CMOs, distributors, and importers rely on the packet"
    - "Layer in adjacent markets and product classes after the first three markets are operationally stable"
    - "Monetize workflow benchmarking and exception analytics once enough packet history exists"
strategyMap:
  northStarMetric: "Active SKU-market approval packets reused after a formula, supplier, or claims change"
  inputMetrics:
    - "Qualified pilots signed"
    - "Median days from formula freeze to approved packet"
    - "Pilot-to-production conversion rate"
    - "Packet reuse rate after change events"
    - "Percentage of outputs with complete citations and reviewer sign-off"
    - "Weekly active external collaborators per production account"
  moatsToBuild:
    - "Accepted and rejected claims history by market, category, and evidence pattern"
    - "Normalized formula, supplier, and packaging metadata across brand and CMO source systems"
    - "Workflow graph of country-specific exceptions, rejection reasons, and document dependencies"
    - "Reusable connectors into spec, artwork, and PLM systems that reduce deployment time"
  killCriteria:
    - "Fewer than 2 paid pilots signed after 9 months of focused selling into the beachhead"
    - "Median review-cycle reduction stays below 50% versus the customer's manual baseline in the first 3 pilots"
    - "More than 30% of packets still require full manual local-expert rewrite after 12 months of focused market coverage"
  mermaid: |
    flowchart LR
      Wedge[EU beauty launch wedge] --> MVP[Cited claims passport MVP]
      MVP --> Proof[Cycle-time and trust proof]
      Proof --> Expansion[More markets and product classes]
investorMemo:
  verdict:
    call: "Meet / investigate further"
    conviction: "Strong workflow pain and a disciplined wedge justify a meeting, but conviction depends on proving ACV and automation depth before the company scales headcount."
    whyBelieve: "The research shows concentrated buyer pain, existing spend on consultants and incumbent software, and a partner-facing workflow gap that is not well owned by regulatory-intelligence or PLM vendors."
    whyDoubt: "Liability concerns, messy source data, and incumbent bundling could keep the product stuck as software-plus-services instead of a venture-scale workflow platform."
    nextDiligence: "The next proof point is two paid pilots that cut review cycle time by at least half, convert one account to annual production, and show consultant backstops do not destroy margin."
  firstCustomer:
    title: "Regulatory affairs lead at a European skincare exporter"
    profile: "A €30 million to €200 million beauty brand with outsourced manufacturing, 20-200 active SKUs, and repeated launches into Saudi Arabia, the UAE, and Singapore."
    trigger: "An upcoming country launch, reformulation, or distributor deadline that forces repeated claims, label, and dossier review across multiple markets."
    buyer: "VP Regulatory or Head of Quality"
    initialContract: "Paid pilot at roughly €15k-30k for one launch program over 8-12 weeks, converting to about €50k-90k annual subscription priced on active SKU-market pairs and collaborator usage."
  mustBeTrue:
    - "At least half of qualified beachhead brands launch enough SKU-market pairs each year to support €50k+ recurring software spend."
    - "The first 3 pilots reduce median review cycle time by at least 50% while maintaining complete citation coverage and human sign-off."
    - "A standalone passport layer with spreadsheet and PDF ingestion is adoptable before full PLM integration."
    - "Consultant or local-market partners will work inside the shared packet instead of reverting to email attachments and side documents."
    - "Country-specific exceptions in Saudi Arabia, the UAE, and Singapore are limited enough that gross margin can trend toward 70% rather than staying services-like."
  diligenceQuestions:
    - "How many launches, reformulations, and SKU-market pairs does the target customer actually process each quarter?"
    - "Which Saudi, UAE, and Singapore workflow steps still require local human judgment even when source data is clean?"
    - "What systems own formulas, specifications, and artwork today, and how much integration work will the first buyer require?"
    - "What liability language, reviewer controls, and audit evidence does procurement or legal require before approving deployment?"
    - "Why will the customer buy this layer instead of adding more consultant hours or extending an existing PLM or regulatory-intelligence tool?"
operatingAssumptions:
  - assumption: "The beachhead customer processes enough launches and reformulations to justify a €50k-90k annual contract."
    basis: research.yaml
    validationTest: "Collect launch calendars from 5-10 target brands and confirm that at least half manage 40 or more SKU-market pairs annually."
    decisionImpact: "If false, narrow the ICP to larger enterprise brands or shift pricing toward managed-service projects instead of recurring SaaS."
  - assumption: "Buyers will accept source-cited decision support with mandatory reviewer sign-off before they accept autonomous filing or approval."
    basis: research.yaml
    validationTest: "Run pilot design reviews with 5 target buyers and secure 2 paid pilots without promising full autonomy."
    decisionImpact: "If false, the company must add more services labor or slow product scope until trust barriers are lower."
  - assumption: "Spreadsheet and PDF ingestion is sufficient for the first 6-12 months of deployment."
    basis: operator judgment
    validationTest: "In the first 3 pilots, onboard one launch program per account in under 30 days without a custom PLM integration."
    decisionImpact: "If false, engineering must prioritize integrations earlier and sales should focus only on customers with compatible systems."
  - assumption: "Consultant and local-market partners can cover country-specific exceptions without compressing gross margin below the target model."
    basis: research.yaml
    validationTest: "Track partner-assisted exception handling in the first 50 packets and keep partner plus internal manual cost below 30% of pilot revenue."
    decisionImpact: "If false, reduce market coverage, raise price, or delay expansion until automation depth improves."
  - assumption: "A cosmetics-first launch will create enough proof and data to support later expansion into ingestible wellness."
    basis: idea.yaml
    validationTest: "Reach at least 3 production cosmetics accounts with reusable packet history before investing in supplement-specific claim logic."
    decisionImpact: "If false, stay focused on cosmetics longer and remove ingestible wellness from the 24-month roadmap."
experimentRoadmap:
  - horizon: "0-90 days"
    experiment: "Quantify launch-volume and ACV fit"
    hypothesis: "Beachhead brands have enough recurring SKU-market work to support a paid pilot and €50k+ annual contract."
    successMetric: "10 buyer interviews and 5 anonymized launch calendars showing at least 40 annual SKU-market pairs for half of qualified prospects."
    owner: "Founder/CEO"
  - horizon: "0-90 days"
    experiment: "Concierge passport prototype"
    hypothesis: "A cited packet for Saudi Arabia, the UAE, and Singapore materially reduces review time even before full automation."
    successMetric: "2 paid pilot commitments and baseline-to-pilot cycle-time reduction above 50% on one real launch program."
    owner: "Regulatory product lead"
  - horizon: "90-180 days"
    experiment: "Exception map with local partners"
    hypothesis: "Country-specific exceptions can be codified well enough to keep manual escalation bounded."
    successMetric: "Document straight-through versus expert-review paths for the first 3 markets and keep full manual rewrite below 30% of pilot packets."
    owner: "Compliance operations lead"
  - horizon: "90-180 days"
    experiment: "Lightweight ingestion and collaborator workflow"
    hypothesis: "Customers and outside partners will work inside the shared packet without waiting for deep PLM integration."
    successMetric: "1 production pilot using spreadsheet or PDF imports plus active participation from at least 1 CMO or distributor workspace."
    owner: "Founding eng"
  - horizon: "6-12 months"
    experiment: "Pilot-to-production conversion and pricing test"
    hypothesis: "A launch-readiness pilot can convert into an annual SKU-market pricing model with acceptable gross margin."
    successMetric: "At least 1 pilot converts to a 12-month contract within 60 days of results review at implied ACV above €50k."
    owner: "Founder/CEO"
  - horizon: "12-18 months"
    experiment: "Integration-led expansion"
    hypothesis: "Once workflow value is proven, a lightweight connector into a spec or PLM system accelerates expansion without turning the company into a custom implementation shop."
    successMetric: "2 production accounts expand to second teams or markets after connector launch while implementation work stays below 20% of revenue."
    owner: "Solutions engineer"
operations:
  - "Maintain a controlled rules and citation library for Saudi Arabia, the UAE, and Singapore with explicit owner review for every update."
  - "Run a compliance-ops queue for exception handling, reviewer sign-off, and partner escalations so every packet has a visible audit trail."
  - "Instrument each workflow for cycle time, packet reuse, citation completeness, exception rate, and collaborator adoption."
  - "Use consultant, lab, and local-market partners selectively for edge cases while retaining ownership of the shared packet and workflow data."
team:
  - role: "Founder/CEO"
    startTiming: "Month 0"
    rationale: "Own founder-led selling, pilot design, and partner negotiations because the early buyer set is concentrated and credibility-sensitive."
  - role: "Founding eng"
    startTiming: "Month 0"
    rationale: "Build the workflow engine, citation layer, audit logs, and collaborator surfaces required for the first paid pilots."
  - role: "Regulatory product lead"
    startTiming: "Month 1"
    rationale: "Translate market-specific claims, label, and document requirements into reusable packet logic and reviewer playbooks."
  - role: "Compliance operations lead"
    startTiming: "Month 3"
    rationale: "Run onboarding, exception handling, and partner coordination so founders do not become the permanent services bottleneck."
  - role: "Solutions engineer"
    startTiming: "Month 6"
    rationale: "Reduce customer integration friction and convert bespoke onboarding lessons into repeatable connectors and templates."
  - role: "Account executive"
    startTiming: "Month 12"
    rationale: "Add scaled selling only after the company has a repeatable pilot-to-production playbook and referenceable customers."
milestones:
  - horizon: "0-12 months"
    items:
      - "Close 2 paid pilots with European skincare or personal-care brands."
      - "Ship production workflow coverage for Saudi Arabia, the UAE, and Singapore for the cosmetics-first wedge."
      - "Cut median review cycle time by at least 50% in the first production account."
      - "Convert at least 1 pilot into a 12-month annual contract."
  - horizon: "12-24 months"
    items:
      - "Reach 6-8 production customers with repeatable onboarding and collaborator adoption across CMOs or distributors."
      - "Launch lightweight connectors into at least 2 incumbent spec or PLM systems."
      - "Demonstrate packet reuse on reformulations and supplier changes across the majority of production accounts."
      - "Decide whether ingestible-wellness expansion meets the trust and margin thresholds set in the kill criteria."
  - horizon: "24-36 months"
    items:
      - "Scale to about 90 paying customers or equivalent production revenue aligned with the $6.0M SOM case."
      - "Expand into additional GCC or ASEAN markets and selected ingestible-wellness workflows if exception rates stay within target."
      - "Use workflow benchmark data and rejection analytics to launch premium expansion modules."
risks:
  - risk: "A wrong or stale recommendation causes a claims or labeling miss that damages trust early."
    likelihood: Medium
    impact: High
    mitigation: "Keep outputs source-cited, require reviewer sign-off, launch as decision support first, and audit every rules update."
  - risk: "Customer source data is too messy for fast onboarding and packet generation."
    likelihood: High
    impact: High
    mitigation: "Start with constrained spreadsheet and PDF ingestion, narrow required fields for one launch workflow, and hire compliance operations before scaled sales."
  - risk: "Incumbent PLM or regulatory-intelligence vendors bundle a similar approval layer."
    likelihood: Medium
    impact: High
    mitigation: "Stay focused on partner-facing packet maintenance, faster deployment, and reusable collaborator workflows rather than competing on broad data-system scope."
  - risk: "Country-specific exceptions in GCC or Singapore keep the business services-heavy."
    likelihood: Medium
    impact: High
    mitigation: "Use consultant partners as bounded backstops, measure rewrite rates closely, and delay new-market expansion until the first three markets are economically stable."
  - risk: "Sales cycles stretch because legal, quality, and systems teams all need to approve deployment."
    likelihood: Medium
    impact: Medium
    mitigation: "Anchor pilots to one live launch deadline, keep initial integration light, and sell measurable cycle-time reduction instead of a broad transformation program."
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2.5-3.5M"
  runwayMonths: 18
  useOfFundsSummary: "Fund 18 months of product and workflow-engineering buildout, regulatory content and compliance-ops coverage for Saudi Arabia, the UAE, and Singapore, 2-3 production design partners, and the first repeatable consultant-assisted go-to-market motion."
