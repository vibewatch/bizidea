categoryDynamics:
  growthRate: 2024 年全球美妆销售增长 7%（现价）
  growthRateSourceRefs:
  - 10
  tailwinds:
  - point: 欧洲美妆本身就是体量大且出口导向强的市场，品牌一扩市场，就天然会长出跨境合规工作量。
    sourceRefs:
    - 8
    - 9
  - point: CPG 运营团队正被迫数字化流程、重构 AI 驱动的经营模型，因此更容易为合规自动化拨预算。
    sourceRefs:
    - 4
    - 7
  - point: 美妆和保健品监管规则仍在持续变化，静态表格会很快过时。
    sourceRefs:
    - 6
    - 18
    - 19
    - 23
  headwinds:
  - point: 宣称与标签本身法律敏感度高，所以人工复核和证明材料的要求会拖慢采用。
    sourceRefs:
    - 14
    - 18
    - 20
    - 25
  - point: 很多买家已经有顾问或现有 PLM 系统，这会抬高切换摩擦，也拉长销售周期。
    sourceRefs:
    - 34
    - 43
    - 45
    - 47
    - 59
competitors:
- name: 瑞加斯克语 Name
  stage: 成长期
  wedge: 面向法规团队的 AI 监管情报、预警和专家辅助监测。
  pricing: 通过 demo 定制报价。
  strength: 规则监测叙事强、多语言更新覆盖广，也很会把自己讲成法规团队的 AI operating system。
  weaknessVsUs: 它的中心是“知道法规变了什么”，不是在外部伙伴之间维护一份可复用的 SKU-市场审批包。
  sourceRefs:
  - 39
  - 40
- name: 合规风险
  stage: 现有厂商
  wedge: 覆盖从配方、标签到分销义务的全球监管情报。
  pricing: 企业销售定制报价。
  strength: 美妆覆盖广，对复杂跨国团队也具备可信的情报品牌。
  weaknessVsUs: 它更像情报和内容层，而不是面向代工厂、进口商和分销商共享的工作流原生宣称护照。
  sourceRefs:
  - 59
- name: 追踪一
  stage: 现有厂商
  wedge: 面向食品、饮料、美妆和化工品牌的端到端 PLM 与合规软件。
  pricing: 定制报价。
  strength: 装机基础大、全球覆盖广，也很适合作为产品与供应商数据的 system of record。
  weaknessVsUs: 这是一条更重的 PLM 改造路径，天然不解决面向伙伴的审批包维护问题。
  sourceRefs:
  - 47
  - 61
- name: Aptean Lascom 版本 PLM
  stage: 现有厂商
  wedge: 聚焦美妆行业的 PLM，把碎片化数据拉到一起，帮助更快做出合规上市。
  pricing: 定制报价或按需询价。
  strength: 语言和场景都更贴美妆制造商，内部数据管理故事也很强。
  weaknessVsUs: 它更像内部 PLM，而不是跨公司协同层，所以外部资料包交接仍是空白。
  sourceRefs:
  - 45
- name: 百度软件
  stage: 现有厂商
  wedge: 面向美妆与个护行业的企业级 PLM，把产品开发与合规连接起来。
  pricing: 定制报价。
  strength: 企业级 PLM 品牌认知强，产品开发范围也更宽。
  weaknessVsUs: PLM 的大而全反而让“窄、轻、见效快”的宣称护照切口更显得容易部署。
  sourceRefs:
  - 46
regulatoryTechnicalConstraints:
- point: EU 美妆进入市场前必须有 responsible-person 监管责任，并先完成 CPNP 备案。
  sourceRefs:
  - 13
  - 14
- point: EU 保健品营销只能使用获授权的营养与健康宣称，误导性宣称被禁止。
  sourceRefs:
  - 18
  - 19
  - 20
- point: GCC 的保健品和化妆品准入，会在区域标准之外再叠各国 SFDA 等本地要求，通常还包括标签和合规文件。
  sourceRefs:
  - 23
  - 24
  - 30
  - 33
  - 34
- point: 新加坡及与 ASEAN 对齐的市场仍要求备案和包装细节合规，因此“一套全球标签或宣称”远远不够。
  sourceRefs:
  - 25
  - 26
  - 37
validationSignals:
- point: Certo 拿到种子融资，本身就是一个直接市场信号：美妆和 CPG 合规自动化已经可以被风投支持。
