openQuestions:
- 滩头客户里，究竟有多少家每季度会处理足够多的 SKU-市场组合，值得配一笔专门的软件年预算，而不是零散顾问费用？
- GCC 和 ASEAN 里，哪些审批步骤可以基于源数据稳定自动化，哪些仍然每次都需要本地专家判断？
- 买家会更喜欢独立的宣称护照应用，还是必须先接入现有 PLM / 规格系统才肯采用？
- 买家究竟需要怎样的最小证据链，才会信任 AI 生成的宣称和标签建议，同时又不把审查速度拖慢？
