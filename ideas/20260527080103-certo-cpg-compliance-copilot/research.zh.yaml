  - 1
- point: 欧洲美妆市场在 2024 年达到 €104bn，且出口导向明显，说明跨境上市活动的底盘足够大。
  sourceRefs:
  - 8
  - 9
- point: Bain 和 Coresight 都指出，CPG 运营团队正被迫数字化工作流，并用 AI/技术去消化经营复杂度。
  sourceRefs:
  - 4
  - 7
- point: 大量现有监管情报和 PLM 厂商已经在卖同一预算带，说明买方预算真实存在，即便具体切口仍是空白。
  sourceRefs:
  - 39
  - 43
  - 45
  - 46
  - 47
  - 59
