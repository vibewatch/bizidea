jobsToBeDone:
  - job: When a product is about to launch in a new market, help the regulatory lead turn one formula and one claims set into an approved, partner-ready compliance packet so they can hit the retailer or distributor deadline.
    currentAlternative: Rebuilding spreadsheets and email threads with consultants for each market.
    successMetric: Time from formula freeze to approved market-entry packet.
  - job: When a supplier, ingredient, or claim changes, help the brand compliance team identify only the affected countries and documents so they can update approvals without restarting the whole review.
    currentAlternative: Manual impact analysis across spreadsheets, shared drives, and consultant calls.
    successMetric: Number of days saved per reformulation cycle.
