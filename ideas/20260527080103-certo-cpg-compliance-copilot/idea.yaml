topRisks:
  - name: Regulatory liability
    description: A wrong recommendation or stale rule could cause a non-compliant launch and destroy trust early.
    mitigation: Require human sign-off, keep every output source-cited, and start with decision support plus audited market coverage before automating filings.
  - name: Messy source data
    description: Many brands and contract manufacturers store formulas, claims, and supplier documents in inconsistent spreadsheets and PDFs.
    mitigation: Start with concierge onboarding for one SKU-market workflow and build lightweight ingestion around the systems customers already use.
  - name: Incumbent squeeze
    description: Broad compliance platforms or consulting firms could copy the category once the ROI story is obvious.
    mitigation: Own the partner handoff workflow and build reusable approval objects plus integrations that are harder to replicate than a rules database alone.
