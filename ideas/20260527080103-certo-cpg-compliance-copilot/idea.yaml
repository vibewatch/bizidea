problem: >-
  Mid-market beauty and ingestible-wellness brands still manage cross-border launch compliance through consultants, spreadsheets,
  and email threads that break every time a formula, ingredient supplier, or packaging claim changes. Each new country or
  retailer listing can force the team to rebuild the same evidence packet from scratch, delaying launches and increasing the
  risk of rejected labels, withdrawn claims, or stranded inventory.
targetUser:
  primary: Regulatory affairs leads at beauty and ingestible-wellness brands expanding into multiple non-home markets each year.
  secondary: Contract manufacturer quality and compliance managers supporting those launches.
  buyer: VP Regulatory, COO, or Head of Quality at the brand.
startupThesis:
  nonObviousInsight: >-
    The best entry point is not generic compliance automation; it is a reusable SKU-level claims passport that lets brands,
    contract manufacturers, distributors, and retailers trust the same cited approval packet. What changed is that source-cited
    AI and regulatory data can now compress review time enough to fit launch calendars, while cross-border expansion has made
    manual rework too expensive to hide inside headcount or consultant spend.
  beachhead: >-
    European skincare and ingestible-wellness brands with 20-200 active SKUs, outsourced manufacturing, and active expansion
    into GCC plus at least one EU or Southeast Asian market.
  wedge: >-
    Generate and maintain market-specific claims, label, and import-document approval packets for each SKU-market pair whenever
    formulas or packaging copy change.
  whyNowCatalyst: Certo's funding and reported traction show cross-border beauty and CPG compliance has moved from back-office pain to an urgent launch-timeline bottleneck.
  ventureScalePath: >-
    Start with beauty and wellness launches, then expand into broader CPG categories, retailer submission workflows, supplier
    documentation, and embedded APIs inside PLM, ERP, and contract-manufacturing systems.
solution: >-
  The product ingests formulas, ingredient documentation, packaging copy, shelf-life assumptions, and target markets, then
  creates a claims passport for every SKU-market combination. It flags which claims are unsupported, which label elements must
  change, and which importer or market-entry documents are still missing, all with cited reasoning. When a brand reformulates a
  product or changes a supplier, the system reruns only the affected checks and updates downstream approval packets instead of
  restarting the whole review. External partners such as contract manufacturers, consultants, and distributors can review the
  same evidence trail rather than working from stale attachments.
goToMarketSeed:
  firstCustomer: >-
    A €30 million to €200 million European skincare or ingestible-wellness brand launching 5-20 new or reformulated SKUs per
    quarter across GCC and EU markets through contract manufacturers and distributors.
  buyingTrigger: A new country launch, reformulation, or retailer listing deadline that forces repeated claims and labeling reviews across markets.
  currentAlternative: Email-driven regulatory consultants, spreadsheet matrices, shared drives, and manual brand plus CMO QA review.
  switchingReason: >-
    The first customer switches because one reusable, cited approval packet can replace repeated consultant work and shorten the
    path from formula freeze to sellable inventory.
  pricingHypothesis: Annual platform fee priced by active SKU-market pairs, with paid collaborator seats and export fees for external dossier packets.
