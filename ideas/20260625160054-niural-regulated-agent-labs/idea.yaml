topRisks:
  - name: "Internal build temptation"
    description: "Large payroll platforms may believe replay and certification can be assembled in-house from existing QA and rules infrastructure."
    mitigation: "Win on faster time-to-value with prebuilt country packs, evidence workflows, and a cross-customer failure corpus that internal teams cannot cheaply recreate."
  - name: "Data-access friction"
    description: "Customers may hesitate to expose historical payroll and compliance data to a new vendor, slowing onboarding and weakening replay quality."
    mitigation: "Start with masked historical datasets, region-specific deployment options, and read-only pilots that certify one workflow before deeper integration."
  - name: "Liability concentration"
    description: "If customers treat certification as a guarantee rather than a risk-reduction tool, one escaped payroll failure could damage trust in the category."
    mitigation: "Position the product as supervised release infrastructure with explicit confidence thresholds, required human approvals for sensitive actions, and continuous post-launch monitoring."
