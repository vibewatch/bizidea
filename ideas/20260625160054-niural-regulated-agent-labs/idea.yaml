    classification exceptions.
  buyingTrigger: >-
    A planned launch of agent-driven payroll operations, a major enterprise
    customer's audit request, or a costly payroll/compliance incident that makes
    leadership demand proof before the next automation release.
  currentAlternative: "Manual QA on sample payroll runs, internal sandbox testing, spreadsheet sign-offs, rule-based validation scripts, and keeping complex exceptions in human queues."
  switchingReason: >-
    The first customer switches because this wedge lets them ship regulated
    agents faster without betting the brand on blind autonomy, and it produces
    workflow-specific evidence that generic AI eval stacks and homegrown tests do
    not deliver.
  pricingHypothesis: >-
    Annual platform fee priced by active countries and certified agent
    workflows, with usage-based charges for shadow-run volume and premium
    modules for runtime approvals on sensitive money-moving actions.
