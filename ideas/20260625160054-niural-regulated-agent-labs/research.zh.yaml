  weaknessVsUs: 仍是通用工具；不编码薪资策略逻辑或工作流专项审批门控。
  sourceRefs:
  - 29
  - 30
- name: Humanloop
  stage: 扩张期
  wedge: 面向企业 LLM 应用的提示管理、评测器和生产监控工作流。
  pricing: 企业导向；提供托管和自托管评测模式。
  strength: 在敏感应用的离线测试和在线监控之间具备良好平衡。
  weaknessVsUs: 以提示和日志为中心，而非薪资操作的领域专项验证框架。
  sourceRefs:
  - 31
  - 32
- name: Langfuse
  stage: 扩张期
  wedge: 具备强大 CI/CD 和自托管能力的开源可观测性和评测平台。
  pricing: 开源/自托管，提供云定价。
  strength: 对希望开放基础设施和回归门控的工程主导团队极具吸引力。
  weaknessVsUs: 提供通用基础设施，而非薪资专项正确性模型和审查员策略。
  sourceRefs:
  - 39
  - 40
- name: Galileo
  stage: 扩张期
  wedge: 面向 AI 应用的企业级可观测性和追踪评测平台。
  pricing: 企业导向；获取文档中未公开定价。
  strength: 强大的追踪评测工作流和企业定位。
  weaknessVsUs: 指标保持通用，不认证敏感薪资工作流正确性。
  sourceRefs:
  - 42
  - 43
