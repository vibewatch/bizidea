modelSanity:
- checkName: 营收引擎
  finding: 基准情景 Y3 营收的驱动力更多来自向约 $228K 退出 ARR 的扩张（覆盖 15 个薪资平台客户），而非客户数量的超高速增长。
- checkName: 必须成立的条件
  finding: 付费试点必须按商业计划书所述的 50%+ 路径转化为生产，同时至少 40% 的生产账户附加第二工作流或高级模块。
- checkName: 模型崩溃条件
  finding: 若数据访问或安全审查拉长销售周期，且毛利率停滞，下行情景现金将在公司达到证明节点前降至约 $27K。
- checkName: 下轮融资证明
  finding: 当公司达到 13 个生产规模客户、主流薪资系统的打包集成以及 Q4Y2 接近盈亏平衡时，种子轮故事才具备可信度。
sanityChecks:
  ruleOf40: Y3 增长率 85.9% + EBITDA 利润率 2.2% = 88.1%
  burnMultiple: Y2 消耗倍数 0.3x（净消耗 $0.53M / 净新增 ARR $1.97M）；Y3 转为 EBITDA 正。
  revenuePerFte: $324.6K（Y3，基准 $200-400K SaaS）
  flags:
  - 到第三年，滩头 SOM 仅约 $3.3M，风险投资论题仍依赖薪资证明成立后向毗邻受监管工作流扩张。
  - 基准情景 ARPU 从约 $150K 初始生产 ACV 扩张至约 $228K 退出 ARR，假设运行时审批、额外国家和工作流扩展按计划附加。
  - 下行情景几乎耗尽现金，因此数据共享阻力和试点转生产时间是下轮融资前最重要的两项模型风险。
