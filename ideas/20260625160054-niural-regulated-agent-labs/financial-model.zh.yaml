slug: payroll-agent-proof-harness
date: '2026-06-25'
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-07
  unit: YYYY-MM
  source: '[BP date 2026-06-25] 运营模型从商业计划书日期后的第一个完整月开始。'
- id: A2
  name: 期初现金/融资额
  value: $2.2M
  unit: USD
  source: '[BP fundingAsk targetFundingRangeUsd $2-4M + BP fundingAsk runwayMonths 18] 基准情景采用接近下中位的 pre-seed 融资额，在 18 个月运营计划基础上延伸至下一里程碑并保留六个月缓冲。'
- id: A3
  name: 期初付费客户数
  value: '0'
  unit: count
  source: '[BP milestones 0–12 months + BP experimentRoadmap] 公司从零营收起步，须先将共创客户转化为付费试点。'
- id: A4
  name: 活跃付费客户定义
  value: 在一个受监管薪资工作流上正处于付费试点或生产订阅状态的客户
  unit: definition
  source: '[BP gtm.wedge + BP businessModel.revenueStreams] customersEop 计入所有已在试点或生产范围内付费的客户。'
- id: A5
  name: 付费试点定价
  value: $30K，约 3 个月（约 $10K/月）
  unit: USD/logo
  source: '[BP gtm.pricing $25k-$50k pilot + BP investorMemo.firstCustomer.initialContract] 模型采用首批影子模式认证的中位试点价格。'
- id: A6
  name: 初始生产 ACV
  value: $150K ARR
  unit: USD/logo/year
  source: '[BP gtm.pricing $120k-$220k production ACV + BP milestones] 首批生产合同在试点转化后落在所述区间的中下位。'
- id: A7
  name: 扩张 ARPU 爬坡
  value: 退出时混合 ARPU 到 Y3 第四季度末达到约 $228K ARR
  unit: USD/logo/year
  source: '[Research market.som $220k blended ARR + BP businessModel.expansionLevers + BP gtm funnelTargets 40%+ workflow
    expansion] 运行时审批、额外国家和工作流扩展，使成熟账户到 Y3 末略高于 SOM 锚定值。'
- id: A8
  name: 客户爬坡
  value: M12 达到 4 个付费客户，Q4Y2 达到 13 个，Q4Y3 达到 15 个
  unit: customersEop
  source: '[BP milestones 0–12 and 12–24 months + Research market.som 15 reachable customers by year 3] 爬坡节奏与第一年 2 个生产客户以及第三年末等于研究滩头
    SOM 的目标端点一致。'
- id: A9
  name: 收入确认惯例
  value: 收入等于期末付费客户数乘以该期每个活跃客户的混合已实现月收入
  unit: formula
  source: '[BP gtm.pricing + BP businessModel.unitOfValue] 这使收入可直接追溯至 customersEop 和混合 ARPU 假设。'
- id: A10
  name: 毛利率爬坡
  value: Y1 42%-58%，Y2 60%-67%，Y3 68%-70.5%
  unit: gross margin percent
  source: '[BP businessModel.targetGrossMarginPct 70 + BP operatingAssumptions on template reuse] 早期试点服务密集度高，随后随着连接器和政策包标准化，利润率向
    70% 目标爬升。'
- id: A11
  name: 创始人全包薪酬
  value: $150K
  unit: USD/year
  source: '[BP team Founder CEO + startup-finance heuristic] 精简的创始人现金薪酬加薪资税和福利。'
- id: A12
  name: 工程师全包薪酬
  value: $200K
  unit: USD/year
  source: '[BP team Founding eng + startup-finance heuristic] 受监管工作流回溯需要高级集成和控制平面工程人才。'
- id: A13
  name: 薪资政策负责人全包薪酬
  value: $170K
  unit: USD/year
  source: '[BP team Payroll policy lead + startup-finance heuristic] 反映一位将国家规则转化为可复用包的高级领域政策招聘。'
- id: A14
  name: 解决方案工程师全包薪酬
  value: $145K
  unit: USD/year
  source: '[BP team Solutions engineer + startup-finance heuristic] 涵盖技术部署责任，不假设有大型服务团队。'
- id: A15
  name: 销售/合作生态负责人全包薪酬
  value: $180K
  unit: USD/year
  source: '[BP team Head of partnerships + BP gtm.channels + startup-finance heuristic] 含早期企业和渠道销售的差旅费和浮动薪酬。'
- id: A16
  name: G&A 全包薪酬
  value: $120K
  unit: USD/year
  source: '[BP operations + startup-finance heuristic] 涵盖精简的财务、供应商管理和合规支持。'
- id: A17
  name: 招聘时间线
  value: M1 创始人/CEO 和联合创始工程师；M2 薪资政策负责人；M4 解决方案工程师；M9 合作生态负责人；M13 第二工程师；M18 第二解决方案岗；M21 G&A；M28 第三工程师；M32 第二销售岗
  unit: timeline
  source: '[BP team + BP strategicChoices.sequencingRationale] 招聘保持实施优先，仅在出现可复制部署证据后才增加 GTM 产能。'
- id: A18
  name: 薪资分摊至 P&L 科目
  value: 创始人 70% S&M 和 30% G&A；工程和薪资政策 100% R&D；解决方案 50% S&M 和 50% R&D；销售 100% S&M；G&A 100% G&A
  unit: allocation
  source: '[BP team role rationales + BP operations] 将人员薪资映射至模型所用的职能运营科目。'
- id: A19
  name: 非薪资运营支出爬坡
  value: 月度非薪资支出从 Y1 初的 S&M/R&D/G&A $4K/$8K/$7K，增长至 Q4Y3 的 $21K/$21K/$17K
  unit: USD/month
  source: '[BP operations + startup-finance heuristic] 涵盖云服务、安全审查、差旅、法务、保险和伙伴支持，不假设有重度付费需求机器。'
- id: A20
  name: 现金转换惯例
  value: 现金变动等于 EBITDA
  unit: formula
  source: '[startup-finance heuristic] 在 pre-seed 规模下，资本支出、债务偿还、税款和营运资金时序差异均视为不重要。'
- id: A21
  name: 稳态月度流失率
  value: 1.5%
  unit: percent per month
  source: '[startup-finance heuristic for early enterprise workflow SaaS] 年度合同和合规粘性支撑低流失率，但模型仍允许在窄买家群体中发生客户流失。'
- id: A22
  name: CAC 惯例
  value: Y2-Y3 销售和营销支出除以 11 个净新增付费客户
  unit: formula
  source: '[model calc using base-case S&M spend + BP gtm funnelTargets] Y1 之后公司新增 11 个付费客户，仍依赖创始人主导和伙伴主导的获客。'
- id: A23
  name: 融资里程碑和资金跑道目标
  value: 在 Q4Y2 前达到 13 个生产规模薪资平台客户、40%+ 扩展附加率，以及接近盈亏平衡，同时保留 6 个月现金缓冲
  unit: milestone
  source: '[BP milestones 12–24 months + BP fundingAsk.useOfFundsSummary] 融资规模的确定，是为了在下轮融资前证明可复制的薪资切口。'
