scenarios:
  downside:
    description: 试点转化滑期，账户扩展附加延迟，服务拖累使利润率低于计划。
    y3RevenueK: 2293.5
    y3EbitdaK: -499.2
    cashLowPointK: 26.6
    keyAssumptionChanges:
    - Q4Y3 付费客户数结束于 12 个而非 15 个。
    - 退出时混合 ARPU 上限约为 $204K ARR，而非 $228K。
    - Y3 毛利率上限约 68%，而非 70.5%。
  base:
    description: 薪资切口将付费试点转化为 Q4Y3 前的 15 个付费客户，并通过国家和工作流扩展提升 ARPU。
    y3RevenueK: 3246.0
    y3EbitdaK: 69.9
    cashLowPointK: 815.5
    keyAssumptionChanges:
    - 客户爬坡按 A8 执行，Q4Y2 达到 13 个，Q4Y3 达到 15 个。
    - 退出时混合 ARPU 按 A7 达到约 $228K ARR。
    - 毛利率沿 A10 改善，Y3 达到约 70%。
  upside:
    description: 更快的试点转化和更早的模块附加，将打包薪资证明转化为强劲的扩张动作。
    y3RevenueK: 4020.0
    y3EbitdaK: 424.0
    cashLowPointK: 913.1
    keyAssumptionChanges:
    - Q4Y3 付费客户通过更快的试点转生产转化和伙伴来源赢单达到 18 个。
    - 运行时审批和第二工作流更早附加，退出时混合 ARPU 达到约 $246K ARR。
    - 安装标准化加速，Y3 毛利率达到约 72%。
sensitivity:
- variable: ARPU
  downsideCase: 生产定价和扩张低于计划约 10%。
  baseCase: 退出时混合 ARPU 达到约 $228K ARR。
  upsideCase: 运行时审批和第二工作流将退出 ARPU 拉高约 10%。
  y3RevenueImpactK: -324.6
  cashImpactK: -337.5
- variable: CAC
  downsideCase: 安全审查和伙伴爬坡不及预期，CAC 上升，Y3 少获得一个客户。
  baseCase: 创始人主导和伙伴主导动作共同分担负荷，CAC 维持在约 $117.7K。
  upsideCase: 更好的伙伴来源降低 CAC，为更多客户成功产能保留预算。
  y3RevenueImpactK: -219.9
  cashImpactK: -216.0
- variable: 流失率
  downsideCase: 在位企业捆绑更多原生控制，月度流失率上升至约 2.5%。
  baseCase: 生产启动后月度流失率维持在约 1.5%。
  upsideCase: 薪资证明成为粘性控制点，月度流失率保持在约 1.0%。
  y3RevenueImpactK: -167.4
  cashImpactK: -117.0
- variable: 销售周期
  downsideCase: 数据访问和安全审查导致试点转生产时间延长约一个季度。
  baseCase: 试点转生产时间维持在商业计划书目标的 90 天以内。
  upsideCase: 打包集成将转化周期压缩一到两个月。
  y3RevenueImpactK: -106.5
  cashImpactK: -261.3
- variable: 毛利率
  downsideCase: 部署持续服务密集，毛利率比计划低约 4 个百分点。
  baseCase: Y3 毛利率达到约 69.4%。
  upsideCase: 策略包和连接器复用加速，毛利率突破 72%。
  y3RevenueImpactK: 0.0
  cashImpactK: -208.5
- variable: 招聘节奏
  downsideCase: 两个规模化招聘提前两个季度，早于需求充分验证。
  baseCase: 招聘按 A17 的实施优先排序进行。
  upsideCase: 最后的 GTM 和工程招聘等到证明成立后再启动，不拖慢交付。
