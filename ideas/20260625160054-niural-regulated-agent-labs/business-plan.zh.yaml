slug: payroll-agent-proof-harness
date: '2026-06-25'
executiveSummary: 薪资智能体验证框架是一套发布基础设施，面向希望在例外密集的受监管工作流中部署自主 智能体、同时又不愿让未经验证的自动化触及实际薪资、福利或合规操作的薪资平台、EOR 和 PEO 服务商。滩头市场是管理 2 万至
  25 万名员工、至少覆盖 10 个国家、并已制定 计划在周期外薪资纠错、福利资格变更或工人分类审查中部署一个智能体的多国薪资平台。 首款产品刻意保持聚焦：对一个工作流在历史薪资和工单数据上进行影子运行，评分国家级 风险，要求对敏感操作进行审批，并在生产发布前生成审计就绪的证据包。该切口与研究
  所揭示的采购触发点完全吻合——预算通常在发布计划、审计要求或近期薪资事故迫使管理层 立即证明安全性时出现。研究将滩头软件市场规模估算为约 $63.0M TAM、$25.2M SAM 和第三年 $3.3M SOM；这足以支撑一个聚焦切口，但除非在薪资证明成立后向毗邻受监管
  后台工作流扩张，否则无法支撑风险投资级别的回报。公司应通过创始人主导的直销和一小 批薪资实施与合规伙伴开展销售，因为第一单既是软件采购，更是工作流设计与信任移交。 最大的未解问题是：共创客户是否愿意共享足够的脱敏历史数据以支撑可信回溯，以及采购
  方是否会将此视为独立预算项而非内部自建项目。早期验证的正确依据不是顶线需求声明， 而是付费试点、6 周以内的首次回溯运行，以及六位数 ACV 的试点转生产转化率。
problem:
- 薪资平台希望自动化例外处理、福利变更和合规审查，但一次错误的智能体操作可能跨多个司法管辖区引发薪资错误、税务曝险、客户流失或监管审查。
- 通用 AI 评测工具、人工质检和静态规则无法在资金流动之前，在国家级历史案例上证明薪资智能体是否会做出正确的工作流决策。
solution:
- 接入薪资引擎、工单系统和政策来源，将拟议智能体操作在历史薪资和合规案例上回溯回放，评分偏漂、下游资金风险和国家级边缘案例。
- 通过审批阈值、不可篡改的追踪记录和审计就绪证据，对敏感操作的发布和运行时进行门控，供产品、运营、企业采购方和内部风险团队审查。
whyWeWin:
- 我们从买家痛点最高、替代方案最弱的地方切入：在生产发布前认证一个敏感薪资工作流，而非销售一个归属不清的宽泛 AI 治理套件。
- 跨客户的回溯数据、司法管辖区包、审查员结果和敏感操作策略模板，可以积累成通用评测厂商和内部质检团队所不具备的领域专有工作流资产。
strategicChoices:
  beachhead: 管理 2 万至 25 万名员工、至少覆盖 10 个国家、并正在准备为周期外薪资纠错、福利资格变更或工人分类例外部署一个智能体的全球薪资平台、EOR 和 PEO 服务商。
  wedgeRationale: 薪资例外处理制造了近期采购触发点、集中的买家群体和明确的失败代价；在这里先证明一个工作流，比同时治理所有 HR 或财务智能体更快、更有说服力。
  sequencingRationale: 先从离线的回溯和证据起步，因为买家必须先信任认证，才会信任内联执行；通过创始人主导和伙伴协助的部署销售一个工作流，因为集成速度比水平扩展更重要；在规模化销售之前先招募产品策略和解决方案深度人才，因为可复制的实施路径是第一个瓶颈。
  notYet:
  - 直接向终端雇主薪资团队销售——这会分散 ICP 并过早引入服务密集型定制。
  - 宽泛的 HR 或 AI 治理套件——在薪资切口得到证明之前，与水平可观测性厂商正面竞争。
  - 毗邻的受监管工作流（如支付运营、采购和保险理赔）——在薪资认证能反复转化为生产之前不予涉足。
market:
  tam: 估算 $63.0M TAM，基于约 350 家可能采购验证框架的全球薪资、EOR、薪资技术及 毗邻受监管运营软件厂商，按约 $180k 年度支出建模。
  sam: 估算 $25.2M SAM，基于约 140 家位于北美、欧洲和亚太、以英语销售、API 友好 的全球薪资/EOR 平台，按 $180k 年度支出计算。
  som: 估算第三年 $3.3M SOM，基于 15 个可触达客户，在上线一个工作流并按国家和 模块扩张后实现约 $220k 混合 ARR。
  segments:
  - 正在推出智能体化例外处理工作流的全球薪资平台、PEO 和 EOR 服务商。
  - 正在向薪资计算之外的受监管自动化扩张的 AI 原生薪资和福利软件厂商。
  buyingProcess: 交易通常从产品或薪资运营部门希望获批发布一个智能体工作流时启动，随后因涉及历史 薪资数据和可审计性而扩展至安全、合规和数据审查。经济买家在平台能够证明更快的 安全发布和更低的事故风险——相对于内部质检或自建框架——时签约。
product:
  mvp: MVP 涵盖一个已认证工作流，配备接入客户薪资系统和例外队列的连接器、脱敏历史回溯 回放、国家风险评分、敏感操作审批阈值和证据导出。刻意排除宽泛的可观测性仪表盘、 多工作流自定义支持和毗邻非薪资领域。
  sixMonth: 为一个工作流打包只读影子试点，配备可复用的国家政策模板、审查员 UI 和审计导出，使首批客户无需内联执行即可认证发布。
  twelveMonth: 为最高风险操作增加运行时审批门控，提供按工作流和国家的基准报告，以及针对两到三个常见薪资和工单系统的打包集成。
  twentyFourMonth: 在现有客户内部将同一套回溯和审批引擎从薪资扩展到福利、支付和税务合规工作流，再进入新垂直领域。
  keyBets:
  - 买家会在公开薪资事故迫使他们之前，为工作流专项证明和发布管控付费。
  - 配备司法管辖区包的历史回溯将比通用评测工具或对抽样运行的人工质检展示出明显更好的覆盖率。
  - 首次部署能在 6 周内生成决策就绪证据，而不会演变为定制服务项目。
gtm:
  wedge: 以影子模式下的一个敏感薪资工作流付费认证试点为切入，客户对回溯证据满意后将其转化为年度生产发布门控，并附加可选的运行时审批。
  channels:
  - 创始人主导直销，目标是已公开讨论智能体上线的大型薪资和 EOR 平台的首席产品官、首席运营官和薪资运营副总裁。
  - 与需要在扩展自动化广度前取得证明的 AI 原生薪资厂商开展共创客户试点。
  - 薪资实施、基准评测和合规咨询伙伴——他们已在应对薪资事故和国家规则变更项目。
  funnelTargets: 线索→合格试点 20-30%；合格试点→付费试点 40-50%；付费试点→生产 50%+；首个工作流→12 个月内第二工作流扩展（40%+ 生产账户）。
  pricing: 收取认证一个工作流的付费试点费，再转化为按在用国家数和已认证工作流数计费的年度 订阅，叠加回溯量用量费和高级运行时审批模块。合理的起步定价为 "$25k-$50k" 试点 转化为 "$120k-$220k" 生产 ACV，与研究所示的大规模多国平台六位数年度支出空间
    相符。
businessModel:
  revenueStreams:
  - 按已认证工作流和在用国家覆盖计费的年度 SaaS 订阅。
  - 历史回溯和影子运行量的用量费。
  - 运行时审批门控、证据留存和审计导出高级模块。
  unitOfValue: 已认证的受监管工作流，以在用国家数和受策略覆盖的敏感操作面衡量。
  targetGrossMarginPct: 70
  expansionLevers:
  - 在同一薪资平台内增加更多国家和更高风险工作流。
  - 从预发布认证升级为运行时审批和证据留存模块。
  - 在薪资证明成立后，将同一套回溯引擎复用到毗邻受监管后台工作流。
strategyMap:
  northStarMetric: 在用国家中已认证并受治理的生产受监管工作流数量。
  inputMetrics:
  - 从启动到首次回溯证据审查的时间。
  - 合格试点到付费试点的转化率。
  - 付费试点到生产的转化率。
  - 12 个月后每客户已认证工作流数。
  - 受明确审批策略覆盖的敏感操作比例。
  moatsToBuild:
  - 按工作流标注失败模式的国家级薪资和合规回溯语料库。
  - 与审查员结果和审计证据挂钩的敏感操作策略模板库。
  - 展示客户按国家认证新工作流速度的集成手册和基准数据。
  killCriteria:
  - 首批 10 个合格共创客户中，少于 3 个愿意共享足够的脱敏历史数据以运行可信试点。
  - 12 个月内，少于 2 个客户以 '$100k+' 年化价值从付费试点转化为生产。
  - 首次部署无法在 6 周内通过基本标准化实施路径生成决策就绪回溯证据。
  mermaid: "flowchart LR\n  Wedge[Payroll workflow certification] --> MVP[Shadow replay plus approval thresholds]\n  MVP -->\
    \ Proof[Paid pilots convert to production release gates]\n  Proof --> Expansion[More countries, more workflows, adjacent\
    \ regulated ops]\n"
investorMemo:
  verdict:
    call: 观望
    conviction: 强有力的控制点，痛点清晰，但在买家证明会采购独立验证框架而非延伸内部质检或通用评测工具之前，投资确信度保持有限。
    whyBelieve: 薪资是最典型的企业零容错工作流之一，拟议产品直接嵌入发布决策节点——紧迫性、预算和证据要求在此汇聚。
    whyDoubt: 滩头市场规模集中且适中，数据访问阻力和自建冲动可能阻碍可复制的软件经济。
    nextDiligence: 在为更大市场扩张故事背书之前，验证 8-10 个目标平台在一个已命名工作流上的数据共享意愿、预算归属和试点转生产标准。
  firstCustomer:
    title: 全球 EOR 平台薪资运营副总裁
    profile: 一家在 15-50 个国家管理 2 万至 10 万名员工、即将为周期外纠错或工人分类例外发布首个智能体的薪资或 EOR 平台。
    trigger: 计划中的智能体上线、企业审计要求或近期薪资/合规事故，迫使管理层要求在生产发布前取得证明。
    buyer: 首席运营官或薪资运营副总裁
    initialContract: '"$25k-$50k" 付费试点认证一个工作流，该工作流获认证后转化为 "$120k-$220k" 年度订阅，再按额外国家、工作流和运行时审批模块扩展。'
  mustBeTrue:
  - 至少有一个薪资工作流足够紧迫，使平台愿意在重大公开失败之前为预生产认证付费。
  - 客户愿意共享足够的脱敏历史薪资和例外数据，使回溯质量明显优于通用评测工具。
  - 标准部署可在 6 周内呈现首次回溯证据，并保持软件化而非服务化。
  - 超过半数付费试点可在首个工作流上以六位数生产订阅转化。
  - 薪资证明为在水平厂商或客户内化功能集之前，进入更大的毗邻受监管工作流类别创造了可信路径。
  diligenceQuestions:
  - 实践中哪个工作流最先成交：周期外纠错、福利资格变更，还是工人分类审查？
  - 当产品同时涉及产品、运营、安全和合规时，预算和采购归属究竟在谁手中？
  - 目标客户拒绝第三方访问的频率有多高，即便数据已脱敏或可自托管？
  - 潜在客户需要什么证据，才会选择本产品而非 LangSmith 级工具加内部脚本？
  - 公司能以多快的速度从同一账户的一个已认证工作流扩展到第二个工作流？
operatingAssumptions:
- assumption: 买家会在外部监管机构或企业客户迫使整改项目之前，为专项验证框架预算。
  basis: research.yaml
  validationTest: 在有活跃智能体上线计划但无近期公开薪资失败记录的潜在客户中，签下至少 4 个付费试点。
  decisionImpact: 若为假，公司应重新定位为事故后控制补救方案，或推迟销售规模化，等待市场成熟。
- assumption: 脱敏历史薪资数据加只读集成，足以支撑可信的早期试点。
  basis: idea.yaml
  validationTest: 获得 3 个共创客户提供脱敏薪资和例外数据，产生可被其风险审查员接受的工作流级回溯结果。
  decisionImpact: 若为假，入职摩擦和产品效力双双削弱，迫使采用自托管优先架构或更窄的 ICP。
- assumption: 产品和运营买家更倾向于中立的跨平台验证框架，而非内部扩展通用评测工具。
  basis: research.yaml
  validationTest: 在 10 个合格探索周期中，确认至少 7 个潜在客户在现有工具中识别出缺失的薪资专项回溯、策略或证据能力。
  decisionImpact: 若为假，独立类别弱化，公司可能需要成为伙伴构建层或放弃该论题。
- assumption: 司法管辖区包和策略模板有足够高的复用率，能随时间降低部署时间、提升利润率。
  basis: 运营判断
  validationTest: 证明第五个试点比第一个提前至少 30% 到达首次回溯证据，得益于共享模板和集成手册。
  decisionImpact: 若为假，服务负担持续偏高，公司必须进一步收窄工作流范围或接受更低的实施收入利润率。
- assumption: 薪资是切口而非终局市场，毗邻受监管工作流在证明成立后将采购同样的控制原语。
  basis: idea.yaml
  validationTest: 到第 18 个月，确保至少 3 个现有客户使用同一核心平台提出福利、支付或税务合规扩展请求。
  decisionImpact: 若为假，风险投资论题压缩为一个战略上行空间有限的利基保障工具。
experimentRoadmap:
- horizon: 0–90 天
  experiment: 访谈 25 位正在评估智能体上线的薪资、EOR 和 PEO 平台领导者。
  hypothesis: 至少 10 位潜在客户有一个已命名工作流、目标上线窗口和创造真实近期采购触发点的高管审查流程。
  successMetric: 10+ 个合格潜在客户，有一个已命名工作流且上线时间在 12 个月以内。
  owner: 创始人/CEO
- horizon: 0–90 天
  experiment: 使用脱敏样本架构和部署选项，与 6 个共创候选客户进行数据访问和安全范围确认。
  hypothesis: 买家将允许足够的历史数据访问，以便在不需要完全自建基础设施的情况下进行只读回溯试点。
  successMetric: 3+ 个潜在客户批准试点数据范围和安全路径。
  owner: 联合创始产品
- horizon: 0–90 天
  experiment: 在一个薪资系统和一个例外队列上，为一个工作流构建首个回溯与证据原型。
  hypothesis: 产品能在试点启动后 30 天内产出可操作的回溯证据和国家风险标记。
  successMetric: 一个潜在客户审查回溯输出，识别出至少 3 个实质性工作流风险或审批规则。
  owner: 联合创始工程师
- horizon: 3–6 个月
  experiment: 将 3 个共创客户转化为有明确生产上线标准的付费试点。
  hypothesis: 若回溯证据可信，潜在客户将在运行时审批完全上线之前为发布认证付费。
  successMetric: 签下 3 个付费试点，每个 '$25k+' 且有商定的生产标准。
  owner: 创始人/CEO
- horizon: 6–12 个月
  experiment: 在首个生产账户上为最高风险操作集上线运行时审批门控。
  hypothesis: 影子模式认证将赢得足够的信任，使至少半数付费试点进入受控生产。
  successMetric: 2+ 个付费试点转化为有实时审批策略的生产订阅。
  owner: 工程负责人
- horizon: 6–12 个月
  experiment: 招募薪资实施或合规伙伴，并在标准工作流包上测试伙伴主导的部署。
  hypothesis: 伙伴能缩短信任周期、创造管线，而不会将产品变成定制咨询项目。
  successMetric: 签约 2 个伙伴，1 个伙伴来源的试点在 6 周内完成部署。
  owner: 合作生态负责人
operations:
- 维护脱敏数据入库、工作流范围确认、国家包选择、审查员分配和证据导出的标准入职清单。
- 为薪资数据策略阻碍共享 SaaS 访问的客户支持自托管或区域专项部署选项。
- 将策略包维护和审计追踪留存视为核心产品运营，而非临时客户成功工作。
- 与薪资实施和合规顾问建立正式工作关系，用于验证司法管辖区包、缩短采购审查周期。
team:
- role: 创始人/CEO
  startTiming: 第 0 月
  rationale: 主导共创客户销售、工作流打包和投资叙事，因为首单需要问题教育和跨职能信任建立。
- role: 联合创始工程师
  startTiming: 第 0 月
  rationale: 构建回溯引擎、集成和审查员工作流，使首个试点具备可信度。
- role: 薪资政策负责人
  startTiming: 第 2 月
  rationale: 将国家规则、敏感操作阈值和审查员标准转化为可复用的包，降低部署风险并提升防御性。
- role: 解决方案工程师
  startTiming: 第 4 月
  rationale: 减少入职摩擦，固化标准试点路径，保护核心工程免受客户专项配置工作的干扰。
- role: 合作生态负责人
  startTiming: 第 9 月
  rationale: 仅在首个打包部署路径和试点经济模型得到验证后，才激活薪资实施和合规渠道。
milestones:
- horizon: 0–12 个月
  items:
  - 签约 6-8 个合格共创客户，至少 3 个转化为付费认证试点。
  - 打包一个标准薪资工作流部署，30 天内完成回溯证据审查，90 天内达到生产就绪。
  - 将 2 个客户推进至启用发布认证、审批阈值和审计证据的生产阶段。
  - 证明至少一个六位数生产 ACV 动作，以国家数加工作流数为计费锚点，而非定制服务。
- horizon: 12–24 个月
  items:
  - 扩展为两到三个常见薪资和例外管理系统的打包支持。
  - 增长至 12-15 个生产客户，并在至少 40% 的装机客户中实现第二工作流扩展。
  - 上线运行时审批模块和按工作流与司法管辖区的基准报告。
  - 在现有账户内赢得首批福利、支付或税务合规的毗邻工作流扩展。
- horizon: 24–36 个月
  items:
  - 将薪资智能体认证确立为大规模多国薪资平台的默认信任层。
  - 在不放弃工作流优先销售动作的前提下，将回溯和审批引擎扩展为更广泛的受监管后台保障平台。
  - 通过可复用司法管辖区包、审查员基准和新进入者无法快速复制的跨客户失败语料库，形成数据优势。
risks:
- risk: 大型薪资平台决定扩展内部质检或通用评测工具，而非采购独立验证框架。
  likelihood: High
  impact: High
  mitigation: 凭借最快认证时间、预构建司法管辖区包和内部团队无法在发布时间线内快速组装的证据 UX 赢得竞争。
- risk: 客户拒绝提供足够的历史薪资数据，使回溯无实质价值。
  likelihood: Medium
  impact: High
  mitigation: 从脱敏数据、只读试点和自托管或区域专项部署路径起步，再将 ICP 收窄至数据策略可行的买家。
- risk: 公司在薪资包可复制之前过早扩展到通用治理或毗邻工作流。
  likelihood: Medium
  impact: High
  mitigation: 在试点转生产经济模型和模板复用得到证明之前，将产品范围锁定在一个工作流、一个部署路径。
- risk: 买家将认证视为保证，一次逃逸的薪资失败损害赛道信任。
  likelihood: Medium
  impact: High
  mitigation: 将产品定位为有监督的发布基础设施，配备明确置信阈值、敏感操作强制审批和不可篡改审计追踪。
- risk: 若毗邻扩展未能实现，滩头市场始终过窄，无法支撑风险投资级增长。
  likelihood: Medium
  impact: High
  mitigation: 在薪资账户内尽早衡量毗邻扩展拉力，将跨工作流需求缺失视为董事会级战略决策，而非后期意外。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: 18 个月资金用于构建核心回溯和策略引擎、6-8 个共创客户、3 个付费试点、首批生产部署，以及在向毗邻扩展之前证明可复制薪资切口所需的策略、解决方案和合作生态人才招募。
