topRisks:
  - name: "自建冲动"
    description: "大型薪资平台可能认为，可以利用现有质检和规则基础设施在内部自行搭建回溯和认证能力。"
    mitigation: "凭借预构建国家包、证据工作流和跨客户失败语料库赢得更快的价值交付速度——这些资产内部团队无法低成本复制。"
  - name: "数据访问阻力"
    description: "客户可能不愿将历史薪资和合规数据开放给新厂商，从而拖慢入职进程、降低回溯质量。"
    mitigation: "从脱敏历史数据集、区域专项部署选项和只读试点起步，先认证一个工作流，再推进深度集成。"
  - name: "责任集中风险"
    description: "若客户将认证视为保证而非风险降低工具，一次逃逸的薪资失败事件就可能损害整个赛道的信任。"
    mitigation: "将产品定位为有监督的发布基础设施，配备明确的置信阈值、敏感操作强制人工审批和持续上线后监控。"
