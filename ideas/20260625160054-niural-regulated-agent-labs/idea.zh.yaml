jobsToBeDone:
  - job: "每当我们想上线新的薪资或合规智能体，帮助产品和风险团队在历史案例上证明它会做出正确决策，这样我们就能更快发布，而不必担心引发实际薪资错误。"
    currentAlternative: "在抽样薪资运行上人工质检，加上有限的沙盒测试和电子表格审查。"
    successMetric: "认证一个新的受监管智能体工作流所需时间，从多个发布周期缩短至两周以内。"
  - job: "每当企业客户或审计方询问我们为何信任某个自主工作流，帮助我们为每项敏感操作生成证据包，让我们能够为部署决策辩护，守住客户账户。"
    currentAlternative: "事后拼凑截图、政策文件和人工复原记录。"
    successMetric: "新智能体工作流的审计响应时间从数天缩短至一小时以内。"
