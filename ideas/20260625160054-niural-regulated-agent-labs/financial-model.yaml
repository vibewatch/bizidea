scenarios:
  downside:
    description: Pilot conversion slips, account expansion attaches later, and services drag keeps margins below plan.
    y3RevenueK: 2293.5
    y3EbitdaK: -499.2
    cashLowPointK: 26.6
    keyAssumptionChanges:
      - Q4Y3 paying logos end at 12 instead of 15.
      - Exit blended ARPU caps near $204K ARR instead of $228K.
      - Y3 gross margin tops out near 68 percent instead of 70.5 percent.
  base:
    description: The payroll wedge converts paid pilots into 15 paying logos by Q4Y3 and lifts ARPU through country and workflow expansion.
    y3RevenueK: 3246.0
    y3EbitdaK: 69.9
    cashLowPointK: 815.5
    keyAssumptionChanges:
      - Customer ramp follows A8 to 13 logos by Q4Y2 and 15 by Q4Y3.
      - Exit blended ARPU reaches about $228K ARR per logo under A7.
      - Gross margin improves along A10 and reaches about 70 percent in Y3.
  upside:
    description: Faster pilot conversion and earlier module attach turn packaged payroll proof into a strong expansion motion.
    y3RevenueK: 4020.0
    y3EbitdaK: 424.0
    cashLowPointK: 913.1
    keyAssumptionChanges:
      - Q4Y3 paying logos reach 18 through faster pilot-to-production conversion and partner-sourced wins.
      - Exit blended ARPU reaches about $246K ARR as runtime approvals and second workflows attach sooner.
      - Y3 gross margin reaches about 72 percent as installations standardize faster.
sensitivity:
  - variable: ARPU
    downsideCase: Production pricing and expansion settle about 10 percent below plan.
    baseCase: Exit blended ARPU reaches about $228K ARR per logo.
    upsideCase: Runtime approvals and second workflows lift exit ARPU about 10 percent above plan.
    y3RevenueImpactK: -324.6
    cashImpactK: -337.5
  - variable: CAC
    downsideCase: Security reviews and partner ramp underperform, so CAC rises and one fewer logo is landed by Y3.
    baseCase: CAC stays near $117.7K as founder-led and partner-led motions share load.
    upsideCase: Better partner sourcing lowers CAC and preserves budget for more customer success capacity.
    y3RevenueImpactK: -219.9
    cashImpactK: -216.0
  - variable: churn
    downsideCase: Monthly churn rises toward 2.5 percent as incumbents bundle more native controls.
    baseCase: Monthly churn holds near 1.5 percent once production starts.
    upsideCase: Monthly churn stays near 1.0 percent because payroll proof becomes a sticky control point.
    y3RevenueImpactK: -167.4
    cashImpactK: -117.0
  - variable: sales cycle
    downsideCase: Pilot-to-production timing stretches by roughly one quarter because data access and security review take longer.
    baseCase: Pilot-to-production timing stays near the business-plan target of under 90 days.
    upsideCase: Packaged integrations compress conversion by one to two months.
    y3RevenueImpactK: -106.5
    cashImpactK: -261.3
  - variable: gross margin
    downsideCase: Gross margin stalls about 4 points below plan because deployments remain services-heavy.
    baseCase: Gross margin reaches about 69.4 percent in Y3.
    upsideCase: Gross margin clears 72 percent as policy packs and connectors become reusable faster.
    y3RevenueImpactK: 0.0
    cashImpactK: -208.5
  - variable: hiring pace
    downsideCase: Two scale hires are pulled forward by two quarters before demand is fully proven.
    baseCase: Hiring follows the implementation-first sequencing in A17.
    upsideCase: The final GTM and engineering hires wait until after proof without slowing delivery.
    y3RevenueImpactK: 0.0
    cashImpactK: -204.2
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Leads[Qualified payroll-platform prospects] --> Pilots[Paid certification pilots]
      Pilots --> Production[Production release-gate logos]
      Production --> Expansion[More countries plus runtime-approval modules]
      Expansion --> Revenue[Recurring revenue]
      Revenue --> GrossProfit[Gross profit after implementation and support COGS]
      GrossProfit --> Cash[Cash runway and next-round proof]
modelSanity:
  - checkName: Revenue engine
    finding: Base-case Y3 revenue is driven more by expansion to roughly $228K exit ARR across 15 payroll-platform logos than by hyper-growth in logo count.
  - checkName: Must go right
    finding: Paid pilots must convert to production on the 50 percent-plus path in the business plan while at least 40 percent of production accounts add a second workflow or premium module.
  - checkName: Model breaks if
    finding: If data access or security review stretches the sales cycle and gross margin stalls, downside cash falls to about $27K before the company reaches proof.
  - checkName: Next-round proof
    finding: A seed story becomes credible once the company reaches 13 production-scale customers, packaged integrations across common payroll stacks, and near-breakeven by Q4Y2.
sanityChecks:
  ruleOf40: Y3 growth 85.9% + EBITDA margin 2.2% = 88.1%
  burnMultiple: Y2 burn multiple 0.3x (net burn $0.53M / net new ARR $1.97M); Y3 turns EBITDA positive.
  revenuePerFte: $324.6K Y3 (benchmark $200–400K SaaS)
  flags:
    - The beachhead SOM is only about $3.3M by year 3, so the venture case still depends on adjacent regulated-workflow expansion after payroll proof is established.
    - Base-case ARPU expansion from roughly $150K initial production ACV to about $228K exit ARR assumes runtime approvals, extra countries, and workflow expansion attach on schedule.
    - The downside case nearly exhausts cash, so data-sharing friction and pilot-to-production timing are the two model risks that matter most before the next raise.
