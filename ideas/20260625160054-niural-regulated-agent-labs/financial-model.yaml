slug: payroll-agent-proof-harness
date: '2026-06-25'
currency: USD
modelStartMonth: 2026-07
assumptions:
  - id: A1
    name: Model start month
    value: 2026-07
    unit: YYYY-MM
    source: '[BP date 2026-06-25] the operating model starts in the first full month after the dated business plan.'
  - id: A2
    name: Opening cash / funding ask
    value: $2.2M
    unit: USD
    source: '[BP fundingAsk targetFundingRangeUsd $2-4M + BP fundingAsk runwayMonths 18] base case uses a lower-midpoint pre-seed raise that extends the 18-month operating plan to the next milestone plus a six-month buffer.'
  - id: A3
    name: Starting paying customers
    value: '0'
    unit: count
    source: '[BP milestones 0–12 months + BP experimentRoadmap] the company begins pre-revenue and must first convert design partners into paid pilots.'
  - id: A4
    name: Active paying customer definition
    value: A logo under a paid pilot or production subscription for one regulated payroll workflow
    unit: definition
    source: '[BP gtm.wedge + BP businessModel.revenueStreams] customersEop counts any logo already paying for pilot or production scope.'
  - id: A5
    name: Paid pilot price point
    value: $30K over about 3 months (~$10K per month)
    unit: USD/logo
    source: '[BP gtm.pricing $25k-$50k pilot + BP investorMemo.firstCustomer.initialContract] the model uses a midpoint pilot price for the first shadow-mode certifications.'
  - id: A6
    name: Initial production ACV
    value: $150K ARR
    unit: USD/logo/year
    source: '[BP gtm.pricing $120k-$220k production ACV + BP milestones] first production contracts land in the lower-middle of the stated range after pilot conversion.'
  - id: A7
    name: Expansion ARPU ramp
    value: Exit blended ARPU reaches about $228K ARR by Q4Y3
    unit: USD/logo/year
    source: '[Research market.som $220k blended ARR + BP businessModel.expansionLevers + BP gtm funnelTargets 40%+ workflow expansion] runtime approvals, extra countries, and usage fees lift mature accounts slightly above the SOM anchor by the end of Y3.'
  - id: A8
    name: Customer ramp
    value: 4 paying logos by M12, 13 by Q4Y2, 15 by Q4Y3
    unit: customersEop
    source: '[BP milestones 0–12 and 12–24 months + Research market.som 15 reachable customers by year 3] the ramp matches 2 production customers in year 1 and a year-3 endpoint equal to the researched beachhead SOM.'
  - id: A9
    name: Revenue recognition convention
    value: Revenue equals period-end paying logos multiplied by the blended realized monthly revenue per active logo for that period
    unit: formula
    source: '[BP gtm.pricing + BP businessModel.unitOfValue] this keeps revenue directly traceable to customersEop and blended ARPU assumptions.'
  - id: A10
    name: Gross margin ramp
    value: 42%-58% in Y1, 60%-67% in Y2, and 68%-70.5% in Y3
    unit: gross margin percent
    source: '[BP businessModel.targetGrossMarginPct 70 + BP operatingAssumptions on template reuse] early pilots are services-heavy, then margins rise toward the stated 70% target as connectors and policy packs standardize.'
  - id: A11
    name: Founder loaded compensation
    value: $150K
    unit: USD/year
    source: '[BP team Founder CEO + startup-finance heuristic] lean founder cash pay plus payroll taxes and benefits.'
  - id: A12
    name: Engineering loaded compensation
    value: $200K
    unit: USD/year
    source: '[BP team Founding eng + startup-finance heuristic] senior integration and control-plane engineering talent is required for regulated workflow replay.'
  - id: A13
    name: Payroll policy loaded compensation
    value: $170K
    unit: USD/year
    source: '[BP team Payroll policy lead + startup-finance heuristic] reflects a senior domain-policy hire who turns country rules into reusable packs.'
  - id: A14
    name: Solutions loaded compensation
    value: $145K
    unit: USD/year
    source: '[BP team Solutions engineer + startup-finance heuristic] covers technical deployment ownership without assuming a large services bench.'
  - id: A15
    name: Sales / partnerships loaded compensation
    value: $180K
    unit: USD/year
    source: '[BP team Head of partnerships + BP gtm.channels + startup-finance heuristic] includes travel and variable compensation for early enterprise and channel selling.'
  - id: A16
    name: G&A loaded compensation
    value: $120K
    unit: USD/year
    source: '[BP operations + startup-finance heuristic] covers lean finance, vendor management, and compliance support.'
  - id: A17
    name: Hiring timeline
    value: M1 founder CEO and founding engineer; M2 payroll policy lead; M4 solutions engineer; M9 partnerships lead; M13 second engineer; M18 second solutions hire; M21 G&A; M28 third engineer; M32 second sales hire
    unit: timeline
    source: '[BP team + BP strategicChoices.sequencingRationale] hiring stays implementation-first and adds GTM capacity only after repeatable deployment evidence appears.'
  - id: A18
    name: Payroll allocation to P&L lines
    value: Founder 70% S&M and 30% G&A; engineering and payroll policy 100% R&D; solutions 50% S&M and 50% R&D; sales 100% S&M; G&A 100% G&A
    unit: allocation
    source: '[BP team role rationales + BP operations] maps headcount payroll into the functional operating lines used in the model.'
  - id: A19
    name: Non-payroll opex ramp
    value: Monthly non-payroll spend rises from S&M/R&D/G&A of $4K/$8K/$7K in early Y1 to $21K/$21K/$17K by Q4Y3
    unit: USD/month
    source: '[BP operations + startup-finance heuristic] covers cloud, security review, travel, legal, insurance, and partner support without assuming a heavy paid-demand machine.'
  - id: A20
    name: Cash conversion convention
    value: Cash movement equals EBITDA
    unit: formula
    source: '[startup-finance heuristic] capex, debt service, taxes, and working-capital timing are assumed immaterial at pre-seed scale.'
  - id: A21
    name: Steady-state monthly churn
    value: 1.5%
    unit: percent per month
    source: '[startup-finance heuristic for early enterprise workflow SaaS] annual contracts and compliance stickiness support low churn, but the model still allows for logo loss in a narrow buyer set.'
  - id: A22
    name: CAC convention
    value: Y2-Y3 sales and marketing spend divided by 11 net new paying logos
    unit: formula
    source: '[model calc using base-case S&M spend + BP gtm funnelTargets] the company adds 11 paying logos after Y1 while still relying on founder-led and partner-led acquisition.'
  - id: A23
    name: Funding milestone and runway target
    value: Reach 13 production-scale payroll-platform customers, 40%+ expansion attach, and near-breakeven by Q4Y2 with a 6-month cash buffer
    unit: milestone
    source: '[BP milestones 12–24 months + BP fundingAsk.useOfFundsSummary] the raise is sized to prove a repeatable payroll wedge before the next financing.'
