slug: payroll-agent-proof-harness
date: "2026-06-25"
executiveSummary: >-
  Payroll-agent proof harness is release infrastructure for payroll, EOR, and
  PEO platforms that want autonomous agents in exception-heavy regulated
  workflows without letting unproven automation touch live wages, benefits, or
  compliance actions. The beachhead is multi-country payroll platforms with
  20,000-250,000 workers under administration and an active plan to launch one
  agent in off-cycle pay corrections, benefits eligibility changes, or
  worker-classification review. The first product is deliberately narrow:
  shadow-run one workflow on historical payroll and ticket data, score
  country-specific risk, require approvals for sensitive actions, and produce an
  audit-ready evidence packet before production release. That wedge matches the
  researched buying trigger, because budget appears when a launch, audit
  request, or recent payroll incident forces executives to prove safety now
  rather than after a failure. Research sizes the beachhead software market at
  roughly $63.0M TAM, $25.2M SAM, and $3.3M year-3 SOM; that is enough for a
  focused wedge but not enough for a venture outcome unless the company expands
  into adjacent regulated back-office workflows after proving payroll first. The
  company should sell through founder-led direct deals and a small set of
  payroll implementation and compliance partners, because the first sale is as
  much workflow design and trust transfer as software procurement. The biggest
  open questions are whether design partners will share enough masked historical
  data for credible replay and whether buyers treat this as a separate budget
  line instead of an internal build project. The right early proof is not
  top-line demand claims; it is paid pilots, sub-6-week time to first replay,
  and pilot-to-production conversion at six-figure ACV.
problem:
  - Payroll platforms want to automate exception handling, benefits changes, and compliance reviews, but one wrong agent action can create wage errors, tax exposure, customer churn, or regulator scrutiny across multiple jurisdictions.
  - Generic AI eval tools, manual QA, and static rules do not prove whether a payroll agent would make the right workflow decision on historical country-specific cases before money moves in production.
solution:
  - Connect to payroll engines, ticketing systems, and policy sources to replay proposed agent actions on historical payroll and compliance cases, then score drift, downstream money risk, and country-level edge cases.
  - Gate release and runtime for sensitive actions with approval thresholds, immutable traces, and audit-ready evidence that product, operations, enterprise buyers, and internal risk teams can review.
whyWeWin:
  - We start where buyer pain is highest and substitutes are weakest: certifying one sensitive payroll workflow before production, not selling a broad AI governance suite with unclear ownership.
  - Cross-customer replay data, jurisdiction packs, reviewer outcomes, and sensitive-action policy templates can compound into domain-specific workflow IP that generic eval vendors and internal QA teams do not have.
strategicChoices:
  beachhead: Global payroll, EOR, and PEO platforms with 20,000-250,000 workers under administration across at least 10 countries that are preparing to launch one agent for off-cycle pay corrections, benefits eligibility changes, or worker-classification exceptions.
  wedgeRationale: Payroll exception handling creates a near-term budget trigger, concentrated buyer set, and direct downside from failure; proving one workflow here is faster and more credible than trying to govern every HR or finance agent at once.
  sequencingRationale: Start offline with replay and evidence because buyers must trust certification before they trust inline enforcement; sell one workflow through founder-led and partner-assisted deployments because integration speed matters more than horizontal breadth; hire product-policy and solutions depth before scaling sales because repeatable implementation is the first bottleneck.
  notYet:
    - Direct sales to end-employer payroll teams, which fragment the ICP and add services-heavy customization too early.
    - Broad HR or AI governance suites that compete head-on with horizontal observability vendors before the payroll wedge is proven.
    - Adjacent regulated workflows such as payments operations, procurement, and insurance claims until payroll certification converts repeatedly into production.
market:
  tam: >-
    Estimated $63.0M TAM based on about 350 plausible payroll, EOR, payroll-tech,
    and adjacent regulated-ops software vendors at roughly $180k modeled annual
    spend.
  sam: >-
    Estimated $25.2M SAM based on about 140 API-forward global payroll and EOR
    platforms in North America, Europe, and APAC that can buy an English-sold
    proof harness now.
  som: >-
    Estimated $3.3M year-3 SOM based on 15 reachable customers at about $220k
    blended ARR after landing one workflow and expanding countries and modules.
  segments:
    - Global payroll, PEO, and EOR platforms launching agentic exception-handling workflows.
    - AI-native payroll and benefits software vendors expanding into regulated automation beyond payroll calculations.
  buyingProcess: >-
    The deal usually starts when product or payroll operations wants approval to
    release one agent workflow, then expands to security, compliance, and data
    review because historical payroll data and auditability are involved. The
    economic buyer signs when the platform can justify faster safe launch and
    lower incident risk versus internal QA or a homegrown harness.
product:
  mvp: >-
    MVP covers one certified workflow with connectors into the customer's payroll
    system and exception queue, masked historical replay, country-risk scoring,
    approval thresholds for sensitive actions, and evidence exports. It
    deliberately excludes broad observability dashboards, custom support for many
    workflows, and adjacent non-payroll domains.
  sixMonth: Package a read-only shadow pilot for one workflow with reusable country-policy templates, reviewer UI, and audit export so the first customers can certify releases without inline execution.
  twelveMonth: Add runtime approval gates for the highest-risk actions, benchmark reporting by workflow and country, and packaged integrations for two to three common payroll and ticketing stacks.
  twentyFourMonth: Expand the same replay and approval engine from payroll into benefits, payments, and tax-compliance workflows inside existing logos before entering new verticals.
  keyBets:
    - Buyers will pay for workflow-specific proof and release control before a public payroll incident forces them to.
    - Historical replay with jurisdiction packs will show materially better coverage than generic eval tooling or manual QA on sample runs.
    - The first deployment can reach decision-ready evidence in under 6 weeks without becoming a custom services project.
gtm:
  wedge: Sell a paid certification pilot for one sensitive payroll workflow in shadow mode, then convert it into an annual production release gate with optional runtime approvals once the customer is satisfied with replay evidence.
  channels:
    - Founder-led direct sales into CPO, COO, and VP Payroll Operations buyers at scaled payroll and EOR platforms already discussing agent launches.
    - Design-partner pilots with AI-native payroll vendors that need proof before expanding automation breadth.
    - Payroll implementation, benchmarking, and compliance advisory partners that already respond to payroll incidents and country-rule change programs.
  funnelTargets: "Lead→qualified pilot 20-30%, qualified pilot→paid pilot 40-50%, paid pilot→production 50%+, first workflow→second workflow expansion within 12 months in 40%+ of production accounts."
  pricing: >-
    Charge a paid pilot to certify one workflow, then convert to an annual
    subscription priced by active countries and certified workflows, with usage
    fees for replay volume and premium runtime-approval modules. A credible
    starting motion is "$25k-$50k" for the pilot converting into "$120k-$220k"
    production ACV, which matches the research that six-figure annual spend is
    plausible for scaled multi-country platforms.
businessModel:
  revenueStreams:
    - Annual SaaS subscription for certified workflows and active country coverage.
    - Usage fees for historical replay and shadow-run volume.
    - Premium modules for runtime approval gates, evidence retention, and audit exports.
  unitOfValue: Certified regulated workflow, measured by active countries and sensitive action surfaces under policy.
  targetGrossMarginPct: 70
  expansionLevers:
    - Add more countries and higher-risk workflows within the same payroll platform.
    - Upgrade from pre-release certification to runtime approvals and evidence-retention modules.
    - Reuse the same replay engine in adjacent regulated back-office workflows after payroll proof is established.
strategyMap:
  northStarMetric: Number of production regulated workflows certified and governed across active countries.
  inputMetrics:
    - Time from kickoff to first replay evidence review.
    - Qualified pilot to paid pilot conversion rate.
    - Paid pilot to production conversion rate.
    - Number of certified workflows per customer after 12 months.
    - Percentage of sensitive actions covered by explicit approval policies.
  moatsToBuild:
    - Jurisdiction-specific payroll and compliance replay corpus with labeled failure modes by workflow.
    - Sensitive-action policy template library tied to reviewer outcomes and audit evidence.
    - Integration playbooks and benchmark data showing how quickly customers can certify new workflows by country.
  killCriteria:
    - Fewer than 3 of the first 10 qualified design partners will share enough masked historical data to run a credible pilot.
    - Fewer than 2 customers convert from paid pilot to production at "$100k+" annualized value within 12 months.
    - First deployment cannot reach decision-ready replay evidence in under 6 weeks with a mostly standard implementation path.
  mermaid: |
    flowchart LR
      Wedge[Payroll workflow certification] --> MVP[Shadow replay plus approval thresholds]
      MVP --> Proof[Paid pilots convert to production release gates]
      Proof --> Expansion[More countries, more workflows, adjacent regulated ops]
investorMemo:
  verdict:
    call: Watch
    conviction: Attractive control point with strong pain, but conviction stays limited until buyers prove they will buy a neutral harness instead of extending internal QA or generic eval stacks.
    whyBelieve: Payroll is one of the clearest zero-error enterprise workflows, and the proposed product sits directly on the release decision where urgency, budget, and evidence requirements converge.
    whyDoubt: The beachhead market is concentrated and modest on its own, while data access friction and internal-build temptation could block repeatable software economics.
    nextDiligence: Validate 8-10 target platforms for data-sharing willingness, budget owner, and pilot-to-production criteria on one named workflow before underwriting a larger market expansion story.
  firstCustomer:
    title: VP Payroll Operations at a global EOR platform
    profile: A payroll or EOR platform with 20,000-100,000 workers under administration in 15-50 countries that is about to release its first agent for off-cycle corrections or worker-classification exceptions.
    trigger: A planned agent launch, enterprise audit request, or recent payroll/compliance incident forces leadership to require proof before production rollout.
    buyer: COO or VP Payroll Operations
    initialContract: >-
      "$25k-$50k" paid pilot for one workflow converting to a "$120k-$220k"
      annual subscription when that workflow is certified for production, then
      expanding by additional countries, workflows, and runtime-approval
      modules.
  mustBeTrue:
    - At least one payroll workflow is urgent enough that platforms will fund pre-production certification before a major public failure.
    - Customers will share masked historical payroll and exception data sufficient to make replay materially better than generic eval tooling.
    - A standard deployment can show first replay evidence within 6 weeks and stay software-like rather than services-heavy.
    - More than half of paid pilots can convert to six-figure production subscriptions on the first workflow.
    - Payroll proof creates a credible path into larger adjacent regulated-workflow categories before horizontal vendors or customers internalize the feature set.
  diligenceQuestions:
    - Which workflow closes first in practice: off-cycle corrections, benefits eligibility changes, or worker-classification review?
    - Who actually owns budget and procurement when the product touches product, operations, security, and compliance simultaneously?
    - How often do target customers reject third-party access even when the data is masked or self-hosted?
    - What proof does a prospect need to choose this product over LangSmith-class tooling plus internal scripts?
    - How quickly can the company expand from one certified workflow to a second workflow in the same account?
operatingAssumptions:
  - assumption: Buyers will budget for a dedicated proof harness before an external regulator or enterprise customer forces a remediation project.
    basis: research.yaml
    validationTest: Close at least 4 paid pilots with prospects that have an active agent launch but no recent public payroll failure.
    decisionImpact: If false, the company should reposition toward post-incident control retrofits or delay scaling sales until the market matures.
  - assumption: Masked historical payroll data plus read-only integrations are sufficient for credible early pilots.
    basis: idea.yaml
    validationTest: Get 3 design partners to provide masked payroll and exception data that produces workflow-level replay results accepted by their risk reviewers.
    decisionImpact: If false, onboarding friction and product efficacy both weaken, forcing a self-hosted-first architecture or a narrower ICP.
  - assumption: Product and operations buyers will prefer a neutral cross-platform harness over extending generic eval tooling in-house.
    basis: research.yaml
    validationTest: In 10 qualified discovery cycles, confirm at least 7 prospects identify missing payroll-specific replay, policy, or evidence capabilities in current tooling.
    decisionImpact: If false, the standalone category is weak and the company may need to become a partner-built layer or abandon the thesis.
  - assumption: Jurisdiction packs and policy templates can be reused enough to reduce deployment time and expand margins over time.
    basis: operator judgment
    validationTest: Show that the fifth pilot reaches first replay evidence at least 30% faster than the first using shared templates and integration playbooks.
    decisionImpact: If false, services load stays high and the company must further narrow workflow scope or accept lower-margin implementation revenue.
  - assumption: Payroll is a wedge, not the final market, and adjacent regulated workflows will buy the same control primitives after proof.
    basis: idea.yaml
    validationTest: By month 18, secure at least 3 existing customers requesting benefits, payments, or tax-compliance expansion using the same core platform.
    decisionImpact: If false, the venture case compresses to a niche assurance tool with limited strategic upside.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Interview 25 payroll, EOR, and PEO platform leaders currently evaluating agent launches.
    hypothesis: At least 10 prospects have a named workflow, target launch window, and executive review process that create a real near-term buying trigger.
    successMetric: 10+ qualified prospects with one named workflow and launch timing inside 12 months.
    owner: Founder CEO
  - horizon: 0–90 days
    experiment: Run data-access and security scoping with 6 design-partner prospects using masked sample schemas and deployment options.
    hypothesis: Buyers will allow enough historical data access for a read-only replay pilot without requiring full custom infrastructure.
    successMetric: 3+ prospects approve pilot data scope and security path.
    owner: Founder product
  - horizon: 0–90 days
    experiment: Build the first replay-and-evidence prototype for one workflow on one payroll stack plus one exception queue.
    hypothesis: The product can produce actionable replay evidence and country-risk flags within 30 days of pilot kickoff.
    successMetric: One prospect reviews replay output and identifies at least 3 material workflow risks or approval rules.
    owner: Founding eng
  - horizon: 3–6 months
    experiment: Convert 3 design partners into paid pilots with explicit production go-live criteria.
    hypothesis: Prospects will pay for release certification before runtime approvals are fully live if the replay evidence is credible.
    successMetric: 3 paid pilots signed at "$25k+" each with agreed production criteria.
    owner: Founder CEO
  - horizon: 6–12 months
    experiment: Launch runtime approval gates for the highest-risk action set in the first production account.
    hypothesis: Shadow-mode certification will earn enough trust that at least half of paid pilots move into controlled production.
    successMetric: 2+ paid pilots convert to production subscriptions with live approval policies.
    owner: Engineering lead
  - horizon: 6–12 months
    experiment: Recruit payroll implementation or compliance partners and test partner-led deployment on the standard workflow package.
    hypothesis: Partners can shorten trust cycles and create pipeline without turning the product into a custom advisory engagement.
    successMetric: 2 signed partners and 1 partner-sourced pilot deployed in under 6 weeks.
    owner: Head of partnerships
operations:
  - Maintain a standard onboarding checklist for masked data ingestion, workflow scoping, country-pack selection, reviewer assignment, and evidence export.
  - Support self-hosted or region-specific deployment options for customers whose payroll data policies block shared SaaS access.
  - Treat policy-pack maintenance and audit-trace retention as core product operations, not ad hoc customer-success work.
  - Build formal working relationships with payroll implementation and compliance advisors that can validate jurisdiction packs and shorten procurement reviews.
team:
  - role: Founder CEO
    startTiming: Month 0
    rationale: Own design-partner sales, workflow packaging, and investor narrative because the first deals require problem education and cross-functional trust building.
  - role: Founding eng
    startTiming: Month 0
    rationale: Build the replay engine, integrations, and reviewer workflow required to make the first pilot credible.
  - role: Payroll policy lead
    startTiming: Month 2
    rationale: Turn country rules, sensitive-action thresholds, and reviewer criteria into reusable packs that lower deployment risk and increase defensibility.
  - role: Solutions engineer
    startTiming: Month 4
    rationale: Reduce onboarding friction, codify the standard pilot path, and protect core engineering from customer-specific setup work.
  - role: Head of partnerships
    startTiming: Month 9
    rationale: Activate payroll implementation and compliance channels only after the first packaged deployment path and pilot economics are proven.
milestones:
  - horizon: 0–12 months
    items:
      - Sign 6-8 qualified design partners and convert at least 3 into paid certification pilots.
      - Package one standard payroll workflow deployment that reaches replay evidence review in under 30 days and production readiness in under 90 days.
      - Put 2 customers into production with release certification, approval thresholds, and audit evidence enabled.
      - Prove at least one six-figure production ACV motion anchored in countries plus workflows rather than custom services.
  - horizon: 12–24 months
    items:
      - Expand into packaged support for two to three common payroll and exception-management stacks.
      - Grow to 12-15 production customers and show second-workflow expansion in at least 40% of the installed base.
      - Launch runtime approval modules and benchmark reporting by workflow and jurisdiction.
      - Win the first adjacent workflow expansions in benefits, payments, or tax-compliance inside existing accounts.
  - horizon: 24–36 months
    items:
      - Establish payroll-agent certification as the default trust layer for scaled multi-country payroll platforms.
      - Extend the replay and approval engine into a broader regulated back-office assurance platform without abandoning the workflow-first sales motion.
      - Reach a data advantage measured by reusable jurisdiction packs, reviewer benchmarks, and cross-customer failure corpora that new entrants cannot replicate quickly.
risks:
  - risk: Large payroll platforms decide to extend internal QA or generic eval tooling instead of buying a separate harness.
    likelihood: High
    impact: High
    mitigation: Win on fastest time to certification, prebuilt jurisdiction packs, and evidence UX that internal teams cannot assemble quickly enough for launch timelines.
  - risk: Customers refuse enough historical payroll data access to make replay materially useful.
    likelihood: Medium
    impact: High
    mitigation: Start with masked data, read-only pilots, and self-hosted or region-specific deployment paths, then narrow the ICP to buyers with workable data policies.
  - risk: The company broadens too early into generic governance or adjacent workflows before the payroll package is repeatable.
    likelihood: Medium
    impact: High
    mitigation: Hold product scope to one workflow and one deployment path until pilot-to-production economics and template reuse are proven.
  - risk: Buyers treat certification as a guarantee, and one escaped payroll failure damages category trust.
    likelihood: Medium
    impact: High
    mitigation: Position the product as supervised release infrastructure with explicit confidence thresholds, required approvals for sensitive actions, and immutable audit trails.
  - risk: The beachhead market remains too narrow to support venture-scale growth if adjacent expansions do not materialize.
    likelihood: Medium
    impact: High
    mitigation: Measure adjacent expansion pull early inside payroll accounts and treat lack of cross-workflow demand as a board-level strategy decision, not a later surprise.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2-4M"
  runwayMonths: 18
  useOfFundsSummary: 18 months buys the core replay and policy engine, 6-8 design partners, 3 paid pilots, first production deployments, and the policy, solutions, and partnership hires needed to prove a repeatable payroll wedge before adjacent expansion.
