  coverageGap: This is a fresh, narrow category centered on a single June 2026 approval event. Credible public material was concentrated in Apple documentation, infrastructure docs, healthcare workflow evidence, and a small number of independent reports; several potentially relevant HHS, FTC, NIH, and publisher pages were blocked by 403/CAPTCHA or duplicated the same event. I retained 32 fetch-verified sources rather than padding toward 100 with mirrors, SEO listicles, or repetitive vendor pages.
