openQuestions:
- What exact per-user fee schedule does Apple apply to different Messages for Business deployments, and does it vary by vertical or volume?
- How strict will Apple be about telehealth-specific review criteria such as licensed escalation, disclosures, and record retention in future approvals?
- Which first telehealth workflow produces the best mix of automation, response rate, and safe human fallback inside iMessage?
- How often will buyers accept Apple-native threads as a primary support surface versus keeping iMessage limited to premium or high-LTV cohorts?
