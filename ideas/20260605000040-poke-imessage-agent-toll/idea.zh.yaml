topRisks:
- name: Apple 政策反转
  description: Apple 可能很快调整审批规则、定价或平台准入，足以直接打断这条分发渠道。
  mitigation: 把编排层设计成支持 SMS、RCS 和 WhatsApp 等兜底渠道，同时把真正关键的差异化继续压在 Apple 专属能力上。
- name: 现有厂商打包进入
  description: Twilio、Braze、Zendesk 或靠近 Apple 生态的集成商，一旦看到这个品类值钱，就可能补上类似的审核和接管能力。
  mitigation: 先赢下一个高监管、高触达的滩头市场，在横向厂商反应过来之前，把护理升级、费用优化和上线手册相关的工作流 IP 挖深。
- name: 品类成熟可能偏慢
  description: 如果在 Poke 之后真正能获批的消费 app 很少，市场早期可能窄到撑不起快速增长。
  mitigation: 优先瞄准那些靠消息支持自动化能立刻拿到 ROI 的客户，并把价格设计成服务辅助上线模式，让早期量不大时也能成立。
