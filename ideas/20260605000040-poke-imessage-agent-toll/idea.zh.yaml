jobsToBeDone:
- job: 当我们想在 iMessage 里上线 AI 护理礼宾时，帮运营团队通过 Apple 审批，并把安全的人类升级流程搭起来，这样我们能更快上线，而不用把品牌压在一个脆弱 bot 身上。
  currentAlternative: 叠在 SMS、app 内聊天和人工 Zendesk 升级之上的自研 bot 流程
  successMetric: 从概念到获批上线所需周数，以及升级是否被正确路由的比例
- job: 当补药和预约问题把支持毛利压得很难看时，帮我们把 iMessage 里的重复线程自动化，让持证人员只在真正能带来临床或留存价值的地方介入。
  currentAlternative: 大型护理协调团队跨 SMS 和支持队列回复重复消息
  successMetric: 每个会员线程的支持成本，以及高频工作流的升级率
