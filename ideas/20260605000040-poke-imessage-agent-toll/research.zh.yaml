  coverageGap: 这是一个围绕 2026 年 6 月单次获批事件展开的全新品类，而且非常窄。可信公开材料主要集中在 Apple 文档、基础设施文档、医疗工作流证据和少数独立报道；一些可能相关的 HHS、FTC、NIH 及媒体页面要么被 403/CAPTCHA 挡住，要么只是重复同一事件。因此我保留了 32 个经抓取验证的来源，而没有为了凑到 100 个去塞镜像站、SEO 文章或重复厂商页面。
