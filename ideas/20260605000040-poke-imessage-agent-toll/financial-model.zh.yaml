scenarios:
  downside:
    description: Apple 审核和临床接管的复杂度让上线速度变慢，也让活跃会员覆盖率跑不到研究中的 SOM 情形。
    y3RevenueK: 5520
    y3EbitdaK: 1280
    cashLowPointK: 780
    keyAssumptionChanges:
    - 由于试点转生产的转化更接近 50%，而不是计划目标，因此 Y2 末客户数从 6 降到 5，Y3 末从 10 降到 8。
    - Y3 单客户已实现年收入从 $960K 降到约 $780K，因为达到 20k 活跃 iMessage 会员的客户更少，而且第二工作流扩展延后。
    - 如果 Apple 收费和持证临床兜底比计划更重，毛利率会从 70% 掉到 66%。
  base:
    description: 创始人主导销售、1 个 MSP 关系和一个狭窄工作流切口，形成了从付费试点稳步转向远程医疗生产项目的路径。
    y3RevenueK: 7680
    y3EbitdaK: 2688
    cashLowPointK: 1226.1
    keyAssumptionChanges:
    - 客户数从 Y1 末的 3 家增长到 Y2 末的 6 家，再到 Y3 末的 10 家，对齐计划里程碑和研究中的 SOM 路径。
    - 单客户已实现年收入从 Y1 的 $360K 提高到 Y2 的 $600K、Y3 的 $960K，因为试点转正且活跃会员覆盖扩大。
    - 在拿到生产验证前，团队保持精简；即便支撑 10 个大型远程医疗客户，到 Q4Y3 也只到 13 名 FTE。
  upside:
    description: MSP 和护理运营转介绍把客户新增提前，而可复用的审批手册又进一步抬高活跃会员覆盖率和毛利。
    y3RevenueK: 9180
    y3EbitdaK: 3420
    cashLowPointK: 1350
    keyAssumptionChanges:
    - 在转介绍带动下，试点签约更快，因此 Y2 末客户数从 6 升到 7，Y3 末从 10 升到 12。
    - 由于更多客户追加高级审计报表和更广的线程覆盖，Y3 单客户已实现年收入从 $960K 提高到约 $1020K。
    - 随着上线模板减少人工实施和异常处理，毛利率从 70% 提高到 72%。
sensitivity:
- variable: 销售周期
  downsideCase: 如果 Apple 审批和集成工作始终高度定制，上线会被拉长到 7-8 个月。
  baseCase: 从合格试点到生产上线大致需要 4-6 个月。
  upsideCase: 当审批手册和 MSP 路径标准化后，可缩短到约 3-4 个月。
  y3RevenueImpactK: 960
  cashImpactK: 620
- variable: ARPU
  downsideCase: Y3 单客户已实现年收入为 $780K。
  baseCase: Y3 单客户已实现年收入为 $960K。
  upsideCase: Y3 单客户已实现年收入为 $1020K。
  y3RevenueImpactK: 1440
  cashImpactK: 1000
- variable: CAC
  downsideCase: 如果每笔单子都由创始人亲自打且高度定制，CAC 会升到 $300K。
  baseCase: 在有 MSP 转介绍和可复制试点方案的前提下，CAC 为 $220K。
  upsideCase: 如果伙伴来源的机会占漏斗更大，CAC 可降到 $170K。
  y3RevenueImpactK: 360
  cashImpactK: 320
- variable: 流失率
  downsideCase: 如果工作流始终很窄、平台政策变化又扰动买方，月流失率会到 2.0%。
  baseCase: 月流失率为 1.5%。
  upsideCase: 当客户增加第二工作流和对标报表后，月流失率可降到 1.0%。
  y3RevenueImpactK: 480
  cashImpactK: 360
- variable: 毛利率
  downsideCase: 如果 Apple 收费和临床升级始终昂贵，毛利率会降到 66%。
  baseCase: 毛利率为 70%。
  upsideCase: 如果工作流容纳更好、路由更干净，毛利率可升到 72%。
  y3RevenueImpactK: 0
  cashImpactK: 310
- variable: 招聘节奏
  downsideCase: 把第二名临床、产品和客户成功招聘都提前 2 个季度。
  baseCase: 在拿到生产验证前保持精简，Y3 末收在 13 名 FTE。
  upsideCase: 把第二名产品和第一名 G&A 招聘推迟到模型期之后。
  y3RevenueImpactK: 0
  cashImpactK: 280
modelDiagram:
  title: 单位经济模型流转
  mermaid: |-
    flowchart LR
      Leads[Qualified telehealth leads] --> Pilots[Paid pilots]
      Pilots --> Customers[Production customers]
      Customers --> Threads[Active iMessage member threads]
      Threads --> Revenue[Base subscription plus usage revenue]
      Revenue --> GrossProfit[70 percent gross profit]
      GrossProfit --> Cash[Runway and seed-round proof]
modelSanity:
- checkName: 收入引擎
  finding: 基础情形的收入来自这样一条路径：Y1 有 3 个付费试点，到 Q4Y3 变成 10 个已上线客户；同时单客户已实现年收入会随着工作流从试点走向规模化生产，从 $360K 提高到 $960K。
- checkName: 必须成立的前提
  finding: Apple 审批工作、1 条获批 MSP 路径，以及费用感知的临床升级，都必须足够可复制，公司才能在扩大 GTM 团队前，先把至少 3 个试点转成生产。
- checkName: 模型失效条件
  finding: 如果活跃会员覆盖始终跑不到研究中的每客户 20k 路径，或者毛利率跌到 60% 中段，下行情形会把 Y3 收入压到约 $5.5M，并明显削弱缓冲现金。
- checkName: 下一轮融资证明
  finding: 种子轮故事应是：Y2 末做到 6 家付费客户、至少 3 个生产部署、1 次第二工作流扩展，并证明 Apple 上线手册可以在不同远程医疗客户间复用。
sanityChecks:
  ruleOf40: Y3 增长率 210.3% + EBITDA 利润率 35.0% = 245.3%
  burnMultiple: Y1 burn multiple 约为 0.7x：以 $0.73M 的 EBITDA burn 对应约 $1.08M 的期末 ARR；模型在 Q4Y2 接近 EBITDA 盈亏平衡。
  revenuePerFte: Q4Y3 为 13 名 FTE 时，Y3 每名 FTE 对应收入为 $590.8K（传统 SaaS 基准为 $200-400K）。
  flags:
  - 每名 FTE 对应收入明显高于经典 SaaS 基准，因此基础情形依赖的是大型远程医疗 ACV、集中式企业客户，以及伙伴辅助实施，而不是重人力服务模式。
  - 模型假设 Apple 审批材料和 1 条 MSP 关系在前几次上线后就能复用；如果每次部署都继续高度定制，招聘和 CAC 都会显著上升。
  - 毛利率把握仍受限于研究文件里明确标注为未验证的两件事：Apple 收费机制，以及临床接管成本。
  - 现金是从 EBITDA 直接滚动推算，几乎不考虑营运资本噪音，因此年度预付款、试点定金和伙伴代收代付都会改变真实的月度现金节奏。
