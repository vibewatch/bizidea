slug: imessage-agent-approval-ops
date: '2026-06-05'
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-07
  unit: YYYY-MM
  source: '[BP date] 模型从带日期的商业计划次月启动，因此 M1 从融资后的运营期开始。'
- id: A2
  name: pre-seed 交割后的期初现金
  value: '2000'
  unit: USDK
  source: '[BP fundingAsk.targetFundingRangeUsd] 使用所述 $2-4M 区间的低端，因为团队保持精简，招聘由里程碑触发。'
- id: A3
  name: 收入确认节奏
  value: 新客户在签约当月或当季只计入半个期间的收入
  unit: policy
  source: '[Startup-finance heuristic] 早期企业级上线很少在一个周期的第一天开始，因此签约当期只确认半月或半季收入。'
- id: A4
  name: 单个已上线客户的成熟年收入
  value: '960'
  unit: USDK annual per customer
  source: '[BP market.som; Research market.som; Research bottomUpSizingDrivers] 采用研究中的路径：每个客户有 20k 名活跃 iMessage 会员，每名活跃会员每年约贡献 $48 平台收入。'
- id: A5
  name: Y1 单客户综合已实现收入
  value: '360'
  unit: USDK annualized
  source: '[BP gtm.pricing; BP milestones] 反映付费上线试点加有限生产使用；首批 3 个客户仍停留在单一工作流。'
- id: A6
  name: Y2 单客户综合已实现收入
  value: '600'
  unit: USDK annualized
  source: '[BP product.twelveMonth; BP businessModel.revenueStreams] 假设试点转正、签下年度平台合同、收取实施收入，并在首批生产部署后扩大活跃会员覆盖。'
- id: A7
  name: 客户爬坡
  value: 3 EOY1 / 6 EOY2 / 10 EOY3
  unit: customers
  source: '[BP milestones; BP market.som; Research market.som] 对齐计划：第 1 年签下 2-3 个付费试点，第 2 年至少转正 3 个，第 3 年走到研究中的 10 客户 SOM 路径。'
- id: A8
  name: 目标毛利率
  value: '70'
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct] 直接使用商业计划中的毛利率目标。'
- id: A9
  name: 月流失率
  value: '1.5'
  unit: percent
  source: '[Startup-finance heuristic; BP whyWeWin; Research sensitivityCases] 垂直医疗工作流软件一旦部署通常粘性较强，但平台集中和工作流匹配风险意味着仍要给一些流失折扣。'
- id: A10
  name: 完全摊销 CAC
  value: '220'
  unit: USDK per customer
  source: '[BP gtm.channels; BP gtm.funnelTargets; Research reportMemo.distributionChannels] 创始人主导的医疗企业销售、MSP 转介绍和较长的审批式试点周期，支撑一个偏高但合理的六位数 CAC。'
- id: A11
  name: 从销售到生产上线的周期
  value: 4-6
  unit: months
  source: '[BP gtm.funnelTargets; BP product.sixMonth; Research validationPlan] 审批工作、集成和临床升级设计，让首个工作流更像多月销售，而不是自助式转化。'
- id: A12
  name: 全包薪资带宽
  value: 创始人 180 / 工程 195 / 产品-实施 170 / 临床-合规 165 / 合作-销售 190 / 客户成功 140 / G&A 120
  unit: USDK annual per FTE
  source: '[Startup-finance heuristic] 精简版美国医疗软件薪资带宽，已包含工资税和福利负担。'
- id: A13
  name: 招聘顺序
  value: M2 临床负责人，M9 合作负责人，Y2 Q2 客户成功，Y2 Q3 第二名工程师，Y2 Q4 第二名销售/合作，Y3 Q2 第三名工程师，Y3 Q3 第二名临床加第二名客户成功，Y3 Q4 第二名产品/实施加第一名 G&A
  unit: timing
  source: '[BP team; BP strategicChoices.sequencingRationale; BP milestones] 公司第 1 年保持聚焦，只在首个生产打法被证明后，才增加交付和 GTM 产能。'
- id: A14
  name: 非薪资运营费用爬坡
  value: Y1 月度 20-34；Y2 季度 114-165；Y3 季度 195-252
  unit: USDK
  source: '[BP operations; BP risks; Research regulatoryLandscape; Startup-finance heuristic] 覆盖云成本、安全、差旅、法务、合规，以及 Apple/MSP 接入和医疗安全运营所需的伙伴赋能支出。'
- id: A15
  name: 现金转换政策
  value: EBITDA 近似等于现金变动
  unit: policy
  source: '[Startup-finance heuristic] 模型假设这是一家轻资产 B2B 软件公司，因此资本开支、债务、税和营运资本扰动都很小。'
- id: A16
  name: 融资目标
  value: 在种子轮前做到 6 家付费客户、至少 3 个生产部署、1 次第二工作流扩展，并保留 6 个月现金缓冲
  unit: milestone
  source: '[BP milestones; BP fundingAsk; BP product.twelveMonth] pre-seed 融资规模按“在更广垂直扩张前，先拿到可复制的 Apple 上线证明”来倒推。'
