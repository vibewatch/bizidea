scenarios:
  downside:
    description: >-
      Apple review and clinical-handoff complexity keep launches slower and cap active-member coverage below
      the researched SOM case.
    y3RevenueK: 5520
    y3EbitdaK: 1280
    cashLowPointK: 780
    keyAssumptionChanges:
      - >-
        End-Y2 customers fall from 6 to 5 and end-Y3 customers from 10 to 8 because pilot-to-production
        conversion lands closer to 50% than the plan target.
      - >-
        Y3 realized annual revenue per customer drops from $960K to about $780K as fewer customers reach 20k
        active iMessage members and second-workflow expansion slips.
      - >-
        Gross margin falls from 70% to 66% if Apple tolls and licensed-clinician fallback remain heavier than
        planned.
  base:
    description: >-
      Founder-led selling, one MSP relationship, and a narrow workflow wedge create a steady conversion path
      from paid pilots to production telehealth programs.
    y3RevenueK: 7680
    y3EbitdaK: 2688
    cashLowPointK: 1226.1
    keyAssumptionChanges:
      - >-
        Customers grow from 3 at end-Y1 to 6 at end-Y2 and 10 at end-Y3, matching the plan milestones and
        researched SOM path.
      - >-
        Realized annual revenue per customer rises from $360K in Y1 to $600K in Y2 and $960K in Y3 as pilots
        convert and active-member coverage expands.
      - >-
        Headcount stays lean until production proof exists, reaching 13 FTE by Q4Y3 even while supporting 10
        large telehealth accounts.
  upside:
    description: >-
      MSP and care-ops referrals pull customer adds forward while reusable approval playbooks improve
      active-member coverage and margins.
    y3RevenueK: 9180
    y3EbitdaK: 3420
    cashLowPointK: 1350
    keyAssumptionChanges:
      - >-
        End-Y2 customers rise from 6 to 7 and end-Y3 customers from 10 to 12 as referral-driven pilots close
        faster.
      - >-
        Y3 realized annual revenue per customer improves from $960K to about $1020K as more accounts add
        premium audit reporting and broader thread coverage.
      - >-
        Gross margin improves from 70% to 72% as launch templates reduce manual implementation and exception
        handling.
sensitivity:
  - variable: sales cycle
    downsideCase: Launches stretch toward 7-8 months because Apple approval and integration work stay bespoke.
    baseCase: Roughly 4-6 months from qualified pilot to production go-live.
    upsideCase: About 3-4 months once the approval playbook and MSP path are standardized.
    y3RevenueImpactK: 960
    cashImpactK: 620
  - variable: ARPU
    downsideCase: $780K realized annual revenue per customer in Y3.
    baseCase: $960K realized annual revenue per customer in Y3.
    upsideCase: $1020K realized annual revenue per customer in Y3.
    y3RevenueImpactK: 1440
    cashImpactK: 1000
  - variable: CAC
    downsideCase: $300K CAC if every deal is founder-led and highly bespoke.
    baseCase: $220K CAC with MSP referrals and a repeatable pilot offer.
    upsideCase: $170K CAC if partner-sourced opportunities become a larger share of the funnel.
    y3RevenueImpactK: 360
    cashImpactK: 320
  - variable: churn
    downsideCase: 2.0% monthly churn if workflows stay narrow and platform policy changes unsettle buyers.
    baseCase: 1.5% monthly churn.
    upsideCase: 1.0% monthly churn after customers add second workflows and reporting benchmarks.
    y3RevenueImpactK: 480
    cashImpactK: 360
  - variable: gross margin
    downsideCase: 66% gross margin if Apple tolls and clinician escalation remain expensive.
    baseCase: 70% gross margin.
    upsideCase: 72% gross margin with better workflow containment and cleaner routing.
    y3RevenueImpactK: 0
    cashImpactK: 310
  - variable: hiring pace
    downsideCase: Pull the second clinical, product, and customer-success hires forward by two quarters.
    baseCase: Stay lean until production proof and finish Y3 at 13 FTE.
    upsideCase: Delay the second product and first G&A hire until after the modeled period.
    y3RevenueImpactK: 0
    cashImpactK: 280
modelDiagram:
  title: unit economics flow
  mermaid: |-
    flowchart LR
      Leads[Qualified telehealth leads] --> Pilots[Paid pilots]
      Pilots --> Customers[Production customers]
      Customers --> Threads[Active iMessage member threads]
      Threads --> Revenue[Base subscription plus usage revenue]
      Revenue --> GrossProfit[70 percent gross profit]
      GrossProfit --> Cash[Runway and seed-round proof]
modelSanity:
  - checkName: Revenue engine
    finding: >-
      Base-case revenue is driven by growing from 3 paying pilots in Y1 to 10 launched customers by Q4Y3 while
      realized annual revenue per customer rises from $360K to $960K as workflows move from pilot to scaled
      production.
  - checkName: Must go right
    finding: >-
      Apple approval work, one approved MSP path, and fee-aware clinical escalation all need to become
      repeatable enough for the company to convert at least 3 pilots into production before scaling GTM
      headcount.
  - checkName: Model breaks if
    finding: >-
      If active-member coverage tops out below the researched 20k-per-customer path or gross margin falls into
      the mid-60s, the downside case cuts Y3 revenue to about $5.5M and materially weakens buffer cash.
  - checkName: Next-round proof
    finding: >-
      The seed story is 6 paying customers by end-Y2, at least 3 production deployments, one second-workflow
      expansion, and evidence that Apple-launch playbooks are reusable across telehealth accounts.
sanityChecks:
  ruleOf40: Y3 growth 210.3% + EBITDA margin 35.0% = 245.3%
  burnMultiple: >-
    Y1 burn multiple is about 0.7x using $0.73M EBITDA burn against roughly $1.08M of exit ARR; the model is
    near EBITDA breakeven by Q4Y2.
  revenuePerFte: $590.8K Y3 with 13 FTE at Q4Y3 (benchmark $200-400K SaaS)
  flags:
    - >-
      Revenue per FTE is well above classic SaaS benchmarks, so the base case depends on large telehealth
      ACVs, concentrated enterprise logos, and partner-assisted implementations rather than a labor-heavy
      services model.
    - >-
      The model assumes Apple approval artifacts and one MSP relationship become reusable after the first few
      launches; if each deployment stays bespoke, hiring and CAC will need to rise materially.
    - >-
      Gross-margin confidence is still limited by open questions on Apple toll mechanics and clinician-handoff
      costs that the research file explicitly flags as unverified.
    - >-
      Cash is rolled forward from EBITDA with minimal working-capital noise, so annual prepayments, pilot
      deposits, and partner pass-through billing could shift actual month-to-month cash timing.
