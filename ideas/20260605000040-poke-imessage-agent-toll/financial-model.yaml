slug: imessage-agent-approval-ops
date: "2026-06-05"
currency: USD
modelStartMonth: 2026-07
assumptions:
  - id: A1
    name: Model start month
    value: 2026-07
    unit: YYYY-MM
    source: >-
      [BP date] Model starts the month after the dated business plan so M1 begins with the post-fundraise
      operating period.
  - id: A2
    name: Opening cash from pre-seed close
    value: "2000"
    unit: USDK
    source: >-
      [BP fundingAsk.targetFundingRangeUsd] Uses the low end of the stated $2-4M range because the team stays
      lean and hiring is milestone-triggered.
  - id: A3
    name: Revenue recognition cadence
    value: New customers contribute half-period revenue in the month or quarter they land
    unit: policy
    source: >-
      [Startup-finance heuristic] Early enterprise launches rarely start on day one of a period, so the
      landing period carries half-month or half-quarter revenue.
  - id: A4
    name: Mature annual revenue per launched customer
    value: "960"
    unit: USDK annual per customer
    source: >-
      [BP market.som; Research market.som; Research bottomUpSizingDrivers] Uses the researched path of 20k
      active iMessage members per customer at about $48 annual platform revenue per active member.
  - id: A5
    name: Y1 blended realized revenue per customer
    value: "360"
    unit: USDK annualized
    source: >-
      [BP gtm.pricing; BP milestones] Reflects paid launch pilots plus limited production usage while the
      first three customers are still on a single workflow.
  - id: A6
    name: Y2 blended realized revenue per customer
    value: "600"
    unit: USDK annualized
    source: >-
      [BP product.twelveMonth; BP businessModel.revenueStreams] Assumes pilot conversions, annual platform
      contracts, implementation revenue, and wider active-member coverage after the first production
      deployments.
  - id: A7
    name: Customer ramp
    value: 3 EOY1 / 6 EOY2 / 10 EOY3
    unit: customers
    source: >-
      [BP milestones; BP market.som; Research market.som] Matches the plan to sign 2-3 paid pilots in Year 1,
      convert at least 3 to production by Year 2, and reach the researched 10-customer SOM path by Year 3.
  - id: A8
    name: Target gross margin
    value: "70"
    unit: percent
    source: "[BP businessModel.targetGrossMarginPct] Uses the business-plan gross-margin target directly."
  - id: A9
    name: Monthly churn
    value: "1.5"
    unit: percent
    source: >-
      [Startup-finance heuristic; BP whyWeWin; Research sensitivityCases] Early vertical healthcare workflow
      software should be sticky once deployed, but platform concentration and workflow fit risk argue for a
      modest churn haircut.
  - id: A10
    name: Fully loaded CAC
    value: "220"
    unit: USDK per customer
    source: >-
      [BP gtm.channels; BP gtm.funnelTargets; Research reportMemo.distributionChannels] Founder-led enterprise
      healthcare sales, MSP referrals, and long approval-led pilots support a high but plausible six-figure
      CAC.
  - id: A11
    name: Sales cycle to production
    value: 4-6
    unit: months
    source: >-
      [BP gtm.funnelTargets; BP product.sixMonth; Research validationPlan] Approval work, integrations, and
      clinical-escalation design make the first workflow a multi-month sale rather than a self-serve motion.
  - id: A12
    name: Loaded salary bands
    value: >-
      Founder 180 / Engineering 195 / Product-Implementation 170 / Clinical-Compliance 165 /
      Partnerships-Sales 190 / Customer Success 140 / G&A 120
    unit: USDK annual per FTE
    source: >-
      [Startup-finance heuristic] Lean U.S. healthcare-software salary bands including payroll tax and
      benefits load.
  - id: A13
    name: Hiring sequence
    value: >-
      M2 clinical lead, M9 partnerships lead, Y2 Q2 customer success, Y2 Q3 second engineer, Y2 Q4 second
      sales-partnerships hire, Y3 Q2 third engineer, Y3 Q3 second clinical plus second customer success, Y3 Q4
      second product-implementation plus first G&A
    unit: timing
    source: >-
      [BP team; BP strategicChoices.sequencingRationale; BP milestones] Keeps the company narrow through Year
      1, then adds delivery and GTM capacity only after the first production playbook is proven.
  - id: A14
    name: Non-payroll operating-expense ramp
    value: Y1 monthly 20-34; Y2 quarterly 114-165; Y3 quarterly 195-252
    unit: USDK
    source: >-
      [BP operations; BP risks; Research regulatoryLandscape; Startup-finance heuristic] Covers cloud,
      security, travel, legal, compliance, and partner-enablement spend for Apple/MSP onboarding and
      healthcare-safe operations.
  - id: A15
    name: Cash conversion policy
    value: EBITDA approximates cash movement
    unit: policy
    source: >-
      [Startup-finance heuristic] The model assumes minimal capex, debt, taxes, and working-capital distortion
      for an asset-light B2B software company.
  - id: A16
    name: Financing objective
    value: >-
      Reach 6 paying customers, at least 3 production deployments, one second-workflow expansion, and six
      months of cash buffer before a seed round
    unit: milestone
    source: >-
      [BP milestones; BP fundingAsk; BP product.twelveMonth] Sizes the pre-seed to reach repeatable
      Apple-launch proof before broader vertical expansion.
