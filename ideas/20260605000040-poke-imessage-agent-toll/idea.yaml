problem: >-
  Consumer subscription apps want to meet users inside iMessage, where response rates and habit frequency are far better than
  email or in-app inboxes, but Apple has effectively turned that channel into an approval-gated operating system for AI agents.
  Teams now have to satisfy live-support, disclosure, and interface rules while also absorbing a new per-user platform fee.
  Most digital health apps stitch together Braze, Twilio, Zendesk, and internal bots, which is good enough for notifications
  but not for an Apple-approved, stateful AI care agent that can safely escalate to a human.
targetUser:
  primary: "GM or VP of member experience at a U.S. cash-pay telehealth app that wants an AI care concierge inside iMessage"
  secondary: "Head of clinical operations or care-coordination lead responsible for human escalation, quality, and member response times"
  buyer: "VP of member experience, COO, or GM who owns retention and support margin"
startupThesis:
  nonObviousInsight: >-
    The scarce asset in consumer AI is no longer model quality alone; it is Apple-approved agent distribution with the human
    support and compliance machinery required to keep that channel open. As soon as Apple let one stand-alone agent into
    Messages for Business and attached a per-user toll, the winning wedge shifted toward the control plane that gets vertical
    agents approved, routed, and monetized safely.
  beachhead: >-
    Series A-C U.S. cash-pay telehealth and women’s-health subscription apps with 20,000 or more iPhone members, high refill
    or scheduling message volume, and licensed care teams that can take live escalations
  wedge: >-
    A managed iMessage agent control plane that bundles Apple approval playbooks, thread orchestration, live nurse or support
    handoff, disclosure templates, and per-user fee optimization for care workflows
  whyNowCatalyst: >-
    Poke’s first-of-its-kind approval proves the channel is real, while Apple’s reported fee and support requirements make it
    immediately clear that deploying an iMessage agent is now an operations and economics problem that telehealth apps will pay
    to outsource.
  ventureScalePath: >-
    Win digital health first, then expand the same approval, handoff, and fee-governance stack into fintech, travel, home
    services, education, and commerce brands that want Apple-native agents without building a bespoke operator and compliance
    layer in-house.
solution: >-
  iMessage Agent Approval Ops gives vertical consumer apps a pre-built stack for launching Apple-ready agents without having to
  invent the support operations layer themselves. The product manages Apple-facing review artifacts, thread templates,
  transparency disclosures, and interface constraints, then routes conversations between the AI agent and the right human team
  when Apple’s support requirements or internal policy demand escalation. For telehealth customers, the first workflow would be
  refill guidance, appointment rescheduling, adherence nudges, and non-emergency care questions inside a persistent iMessage
  thread. Over time, the platform learns which flows can remain fully automated, which require licensed staff, and how to keep
  Apple fees within target gross margin by throttling low-value threads and prioritizing high-LTV members.
goToMarketSeed:
  firstCustomer: >-
    A U.S. GLP-1, women’s-health, or virtual-primary-care subscription app with 20,000-200,000 iPhone members, an existing
    care-coordinator team, and heavy inbound scheduling or refill messaging that wants to launch an Apple-approved AI care
    concierge before larger incumbents do
  buyingTrigger: >-
    The company decides to launch an AI member concierge in iMessage, or support margins worsen because too many refill,
    scheduling, and adherence questions still require humans across SMS and in-app chat
  currentAlternative: >-
    Braze or Twilio messaging campaigns, in-app chat, Zendesk queues, and homegrown LLM assistants with manual handoff rules
  switchingReason: >-
    The first customer switches because this product compresses months of Apple approval, workflow design, and escalation setup
    into one vendor, while also giving finance and ops teams control over per-user channel cost and support-quality risk
  pricingHypothesis: >-
    Platform fee plus per active iMessage member thread, with premium pricing for licensed-clinician escalation workflows and
    audit-grade conversation logs
