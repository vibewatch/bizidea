topRisks:
  - name: "Apple policy reversal"
    description: "Apple could change approval rules, pricing, or platform access quickly enough to break the distribution channel."
    mitigation: "Build the orchestration layer to support fallback channels like SMS, RCS, and WhatsApp, while staying focused on Apple-specific differentiation where it matters."
  - name: "Incumbent bundling"
    description: "Twilio, Braze, Zendesk, or Apple-adjacent integrators could add similar review and handoff features once the category proves valuable."
    mitigation: "Win a regulated, high-touch beachhead first and deepen workflow IP around care escalation, fee optimization, and launch playbooks before horizontal vendors react."
  - name: "Category may mature slowly"
    description: "If few consumer apps can actually win approval after Poke, the market may stay too narrow for fast initial growth."
    mitigation: "Target customers with immediate ROI from messaging support automation and price for services-assisted launches that can work even at modest early volume."
