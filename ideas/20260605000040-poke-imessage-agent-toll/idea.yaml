differentiator: >-
  Twilio, Braze, and support-desk vendors move messages, but they do not solve Apple-specific approval, thread design, live
  support obligations, or the per-user economics of running an always-on agent inside Messages. Horizontal agent builders can
  demo a consumer concierge, yet still leave the buyer to handle escalation design, Apple review, and margin control. This
  startup is differentiated by owning the operational choke points the sources surfaced first: approval readiness, human
  fallback, interface compliance, and fee-aware routing for a channel that has suddenly become scarce.
