jobsToBeDone:
- job: 当一笔新的消费类应用收购交割后，帮中央平台团队把计费、paywall 和分析迁到统一栈上，这样他们既能兑现协同效应，又不至于伤到订阅收入。
  currentAlternative: 内部特战队，加上各家厂商控制台、Excel 和手工 QA 清单。
  successMetric: 从交割到统一栈上线花了多少天，以及收入相对切换前基线守住了多少。
- job: 当收购方想把一款应用里跑通的变现打法复制到另一款应用时，帮变现负责人安全克隆实验，这样他们不必从头重搭埋点也能把转化抬上去。
  currentAlternative: 手工重映射事件、复制粘贴 paywall 配置，再跑一轮单独 QA。
  successMetric: 组合级实验上线所需时间，以及上线后的新增付费转化。
