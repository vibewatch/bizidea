problem: 被收购的消费类应用，往往各自挂着不同的计费服务商、自写 paywall、分析口径、CRM 触发器和发版节奏。交割后，团队得花几个月手工对事件、对权益、把变现实验一遍遍回放，之后才谈得上比较 LTV，或把组合级打法铺开。每一次迁移都可能带来订阅流失、App Store 问题、仪表盘失真和学习沉没——偏偏这正是收购方最需要把协同效应尽快兑现的时候。
targetUser:
  primary: 拥有多款已收购订阅应用的消费类应用控股公司里，负责平台或变现整合的平台副总裁/负责人。
  secondary: 被收购应用的总经理，以及负责事件质量、计费切换和 paywall 表现的数据平台与生命周期工程负责人。
  buyer: CTO、首席产品官或平台副总裁
startupThesis:
  nonObviousInsight: 大多数人把消费软件收购整合看成买卖机器，或者单纯的成本削减故事。Bending Spoons 的规模反过来说明，更稀缺的其实是一座迁移工厂：能把每个新买来的应用足够快地迁到统一的变现和数据栈上，再把经验在组合里越滚越厚。
  beachhead: 欧洲或北美的消费类应用控股公司，手上有 4–12 款已收购的 iOS/Android 订阅应用，计费和分析栈并不统一，并且由一个中央变现团队要求在 120 天内把每笔新收购迁上标准平台。
  wedge: 一个并购后迁移控制平面——盘点 SDK 和计费流程、映射权益、复用高转化 paywall、双跑分析，并用 cohort 级收入异常告警卡住切换节奏。
  whyNowCatalyst: Bending Spoons 的 IPO 叙事把产品、工程、数据、变现和 AI 的集中式运营栈直接摆了出来，让外界第一次清楚看到：真正驱动消费软件整合并购经济性的，是把栈迅速拧到一起。
  ventureScalePath: 先从已收购订阅应用的迁移 OS 切入，再往组合基准对比、实验分发、CRM 编排、共享身份、跨应用捆绑，以及消费软件、游戏、媒体里的数字 M&A 集成系统记录扩。
solution: 做一套服务并购后前 120 天的操作系统。它先扫目标应用的计费逻辑、paywall 配置、分析口径、生命周期旅程和发版流水线，再拉出一张迁移图：哪些能立刻标准化，哪些得分阶段处理。平台预置常见移动订阅、归因、消息和数仓工具的连接器，支持 dual-write / dual-read 切换，并按国家和订阅 cohort 盯收入、流失、退款和崩溃异常。它还附带价格测试、首单优惠迁移和 交叉销售位的打法，让收购方把最佳做法搬过去，而不用整套代码全盘照抄。时间一长，产品会变成一层基准网络：看清哪些集成路径真的能把组合里的转化率和 LTV 抬起来。
goToMarketSeed:
  firstCustomer: 欧洲一家消费类应用收购方，手上有 5–10 款已收购的移动订阅应用，中央平台工程师不到 25 人，而且未来 90 天内就有一笔已签约收购要交割；目标买家是平台副总裁或变现整合负责人。
  buyingTrigger: 一笔新收购交割后，100 天整合计划要求这款应用在下一个预算周期前切到收购方自己的分析、paywall 或订阅栈。
  currentAlternative: 内部整合小队，外加 RevenueCat 或自研计费逻辑、App Store 和 Google Play 控制台、Amplitude 或 Firebase、Braze 或 CRM 导出表，再配上 Excel 和临时 QA。
  switchingReason: 这套产品把最危险的 120 天工作压短，在切换时尽量守住变现，并给平台团队留下可复用的迁移模板，而不是每次交易都靠救火。
  pricingHypothesis: 按纳管应用数量收平台年费，再按每次迁移收实施费，并向变现负责人卖更贵的组合基准分析席位。
