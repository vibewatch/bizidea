topRisks:
- name: 内部自建偏好
  description: 成熟的收购方可能会认为，集成能力本来就是自己的护城河，迁移工具理应由中央平台团队内部自建。
  mitigation: 先把自己卖成迁移加速器和控制平面，补位现有工程师；在第一笔交易里先证明更快兑现协同，再往栈里深挖。
- name: 迁移爆炸半径
  description: 只要碰到在线计费、paywall 和分析，一次切换失手就可能带来收入损失、退款飙升或商店政策事故。
  mitigation: 先从只读栈审计和分阶段双跑切换起步，配自动回滚护栏，再逐步接更高风险的写路径。
- name: 初始买家池太小
  description: 连续收购消费类应用的买家，数量本来就远少于普通订阅应用运营方。
  mitigation: 迁移引擎跑通后，再从收购整合场景扩到所有多品牌订阅组合，包括游戏、数字媒体和电信应用套件。
