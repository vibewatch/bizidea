topRisks:
  - name: In-house build bias
    description: >-
      Sophisticated acquirers may believe their central platform team should
      build migration tooling internally because integration is core to their
      moat.
    mitigation: >-
      Land as a migration accelerator and control plane that complements
      existing engineers, proving faster time-to-synergy on the first deal
      before expanding deeper into the stack.
  - name: Migration blast radius
    description: >-
      Touching live billing, paywalls, and analytics can create revenue loss,
      refund spikes, or store-policy incidents if a cutover fails.
    mitigation: >-
      Start with read-only stack audits and staged dual-run cutovers with
      automated rollback guardrails before owning higher-risk write paths.
  - name: Limited initial buyer pool
    description: >-
      The number of serial consumer app acquirers is smaller than the number of
      ordinary subscription-app operators.
    mitigation: >-
      Expand from rollups into any multi-brand subscription portfolio,
      including gaming, digital media, and telecom app suites, once the
      migration engine is proven.
