jobsToBeDone:
  - job: >-
      When a new consumer app acquisition closes, help the central platform
      team move billing, paywalls, and analytics onto the shared stack, so they
      can capture synergies without hurting subscription revenue.
    currentAlternative: >-
      Internal tiger team plus vendor consoles, spreadsheets, and manual QA
      checklists
    successMetric: >-
      Days from close to unified stack and revenue retention versus the
      pre-cutover baseline
  - job: >-
      When the acquirer wants to export a winning monetization playbook from one
      app to another, help monetization leaders clone the experiment safely, so
      they can lift conversion without rebuilding instrumentation from scratch.
    currentAlternative: >-
      Manual event remapping, copy-paste paywall configs, and separate QA
      sprints
    successMetric: >-
      Time to launch a portfolio-level experiment and incremental payer
      conversion after rollout
