      - 26
      - 29
  pestle:
  - factor: political
    impact: positive
    point: 平台和监管层对订阅的压力越大，可审计的迁移治理就越值钱，临时拼凑的人肉流程反而站不住。
    sourceRefs:
    - 12
    - 13
    - 14
    - 35
    - 36
  - factor: economic
    impact: positive
    point: 非游戏应用支出在涨，资本市场又开始奖励整合型收购的运营杠杆，两头都在替“守收入的集成工作”抬预算。
    sourceRefs:
    - 1
    - 4
    - 5
    - 6
  - factor: social
    impact: negative
    point: 用户对价格、取消和 paywall 摩擦本来就敏感，迁移一出错，体感几乎立刻暴露。
    sourceRefs:
    - 4
    - 12
    - 13
    - 35
    - 36
  - factor: technological
    impact: positive
    point: 权益、paywall、事件规范、事件转换和导入 API 已经成熟到足够拼出更高一层的控制平面。
    sourceRefs:
    - 15
    - 18
    - 20
    - 22
    - 23
    - 25
    - 26
    - 28
    - 31
  - factor: legal
    impact: negative
    point: 应用商店转移规则和消费者权利义务抬高了实施负担，也让上线前的审批点更多。
    sourceRefs:
    - 8
    - 10
    - 12
    - 13
    - 14
    - 35
    - 36
  adoptionFrictionMatrix:
  - friction: 转移凭证、shared secret 和服务端校验必须在账户之间干净迁走
    severity: high
    affectedBuyer: 平台副总裁
    mitigation: 先从只读审计和凭证清单入手，再在正式转移窗口前把切换步骤彩排一遍。
    sourceRefs:
    - 8
    - 9
    - 10
    - 11
  - friction: SDK 或后端切换时的权益不匹配，可能直接把付费用户晾在外面
    severity: high
    affectedBuyer: 变现整合负责人
    mitigation: 替换旧的订阅真相源前，强制做双重校验、离线兜底和分阶段切换。
    sourceRefs:
    - 17
    - 18
    - 20
    - 21
    - 22
  - friction: 各品牌事件口径漂移，会让组合基准对比失去可信度
    severity: high
    affectedBuyer: 数据平台主管
    mitigation: 先用事件规范、事件转换和明确的标准映射，把跨品牌仪表盘做到能被决策使用，再谈推广。
    sourceRefs:
    - 23
    - 25
    - 26
    - 28
    - 40
  - friction: 生命周期身份和用户模型差异，会把 CRM 迁移复杂度迅速拉高
    severity: medium
    affectedBuyer: 生命周期工程负责人
    mitigation: 统一到一个外部用户 ID 模型，并支持批量导入和新旧消息栈并行校验。
    sourceRefs:
    - 29
    - 30
    - 31
    - 37
