      - 7
      - 33
      - 34
    threatOfEntrants:
      score: 3
      rationale: 搭积木所需的公开原语越来越成熟，但要把它们拧成可信的切换自动化，再沉淀可复用的迁移 intelligence，仍然是实打实的产品活。
