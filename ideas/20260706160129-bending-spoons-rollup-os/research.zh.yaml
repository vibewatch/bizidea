competitors:
- name: RevenueCat
  stage: scale-up
  wedge: 移动应用的订阅基础设施、权益、paywall 和 web billing。
  pricing: 公开定价 + 付费增长工具，外加企业计划。
  strength: 在订阅状态、权益和相邻变现工作流上，生态最完整。
  weaknessVsUs: 不负责跨工具的并购切换，也不负责组合级分析和 CRM 对齐。
  sourceRefs:
  - 15
  - 16
  - 17
- name: Adapty
  stage: scale-up
  wedge: 移动 paywall、A/B 测试、分析和 访问层级管理。
  pricing: 公开价格页，以免费 SDK 为入口，后面走销售驱动套餐。
  strength: 离变现实验和更换厂商工作流很近。
  weaknessVsUs: 核心还是自己的变现栈，不是横跨第三方系统的中立并购后编排层。
  sourceRefs:
  - 18
  - 19
  - 38
- name: Qonversion
  stage: scale-up
  wedge: 订阅分析、权益和无代码变现界面。
  pricing: 销售驱动；公开文档更强调 analytics mode 和权益，而不是卡价。
  strength: 迁移内容做得强，还有一个适合部分接栈的混合 analytics mode。
  weaknessVsUs: 本质仍是订阅平台，不是组合级迁移操作系统。
  sourceRefs:
  - 20
  - 21
  - 39
- name: RudderStack
  stage: scale-up
  wedge: 事件规范、事件转换、事件路由和同意治理。
  pricing: 有 Free、Growth、Enterprise 三档，并公开披露事件规范限额。
  strength: 最适合在现有栈内做事件口径标准化和双跑路由。
  weaknessVsUs: 不碰计费、paywall、权益或应用商店转移编排。
  sourceRefs:
  - 25
  - 26
  - 27
  - 40
- name: Braze
  stage: incumbent
  wedge: 跨渠道生命周期消息和用户运营基础设施。
  pricing: 按 credits 计费，走企业打包。
  strength: 当身份和订阅状态稳定下来后，它会成为关键的生命周期系统记录。
  weaknessVsUs: 消息迁移只是并购后标准化的一小块，解决不了收入切换风险。
  sourceRefs:
  - 29
  - 30
  - 37
regulatoryTechnicalConstraints:
- point: Apple 对订阅应用的转移要求 shared secret 交接，以及服务端收据校验同步更新。
  sourceRefs:
  - 8
  - 9
  - 12
  - 35
- point: Google Play 转移会保留用户和评价，但不是所有报表资产都会一起迁走，后端计费和账户配置也仍然要自己盯。
  sourceRefs:
  - 10
  - 11
  - 36
- point: 调价、用户同意和取消行为会随平台与地区变化；没有区域感知控制，复制打法本身就很危险。
  sourceRefs:
  - 12
