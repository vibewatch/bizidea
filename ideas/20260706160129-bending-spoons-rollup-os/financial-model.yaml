scenarios:
  downside:
    description: ACV compresses to about $270K, pilot-to-production wins slip by roughly one quarter, and gross margin stalls near 66%, forcing a bridge raise before the end of Y3.
    y3RevenueK: 3262.5
    y3EbitdaK: -819.7
    cashLowPointK: -711.0
    keyAssumptionChanges:
      - Annual ARPU falls from $300K to $270K.
      - The business exits Q4Y2 with 10 customers instead of 12 and Q4Y3 with 14 instead of 16.
      - Gross margin reaches only about 66% because connector and cutover work stays more bespoke.
  base:
    description: Base case converts a small pilot set into a measured 12-customer Y2 footprint and finishes Y3 at 16 paying customers with exit ARR near the modeled SOM.
    y3RevenueK: 4375.0
    y3EbitdaK: 101.1
    cashLowPointK: 650.3
    keyAssumptionChanges:
      - Uses assumptions A1-A22 as modeled.
      - Ends Y3 with 16 paying customers and about $4.8M of exit ARR.
      - Hiring remains milestone-gated through Y3 rather than pulling the Y3 plan forward.
  upside:
    description: A partner channel matures in H2Y2, ACV expands toward $330K, and reusable templates let the company finish Y3 with 18 customers and clear profitability.
    y3RevenueK: 5335.0
    y3EbitdaK: 891.0
    cashLowPointK: 892.1
    keyAssumptionChanges:
      - Annual ARPU rises from $300K to $330K.
      - Two extra partner-sourced wins land by the end of Y2 and the company exits Y3 with 18 customers.
      - Gross margin improves by about two points as migration templates and anomaly baselines reuse faster.
