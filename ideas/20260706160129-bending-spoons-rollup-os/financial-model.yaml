    cashImpactK: -190.2
modelDiagram:
  title: migration control-plane revenue model
  mermaid: |
    flowchart LR
      TriggeredDeals[Signed acquisitions or forced standardization] --> Pilots[Paid migration pilots]
      Pilots --> Annuals[Annual governance contracts]
      Annuals --> Expansion[More apps and next-deal expansion]
      Expansion --> Revenue[~$300K ACV per customer]
      Revenue --> GrossProfit[70%+ gross profit after template reuse]
      GrossProfit --> Cash[Runway to Q4Y2 proof milestone]
modelSanity:
  - checkName: Revenue engine
    finding: Base-case revenue depends on turning 2-3 paid pilots into 12 paying customers by Q4Y2 and 16 by Q4Y3 at roughly $300K annualized revenue per account.
  - checkName: Must go right
    finding: Pilot-to-annual conversion and next-deal expansion inside the same acquirer have to work before the Y3 hiring plan is pulled forward.
  - checkName: Model breaks if
    finding: If close cycles slip by a quarter and ACV compresses toward the downside case, cash falls to about negative $711K before Y3 ends.
  - checkName: Next-round proof
    finding: Hitting 12 production customers, two reference cutovers, and partner-sourced pipeline by Q4Y2 is the milestone that supports the next financing.
sanityChecks:
  ruleOf40: Y3 growth 96.6% + EBITDA margin 2.3% = 98.9%
  burnMultiple: Y2 burn multiple 0.2x on about $2.7M of net new ARR; Y3 is slightly cash-generative, so burn multiple is no longer the limiting metric.
  revenuePerFte: $291.7K Y3 using Q4Y3 15 FTE (benchmark $200-400K enterprise SaaS)
  flags:
    - The model asks a concentrated SAM to support a jump from 3 paying customers at Y1 exit to 12 by Q4Y2, so deal timing is the biggest execution risk.
    - Cash efficiency looks unusually strong because the base case assumes $300K ACV and better than 60% pilot-to-annual conversion; validate that before treating the burn multiple as durable.
    - Gross margin clears the 70% target only after delivery becomes template-driven, so custom connector work must stay bounded or the next round timing slips.
    - A $2.0M pre-seed works only if later hires stay milestone-gated; pulling even two hires forward cuts ending cash by roughly $190K in the sensitivity analysis.
