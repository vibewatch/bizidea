modelDiagram:
  title: 迁移控制平面收入模型
  mermaid: |
    flowchart LR
      TriggeredDeals[Signed acquisitions or forced standardization] --> Pilots[Paid migration pilots]
      Pilots --> Annuals[Annual governance contracts]
      Annuals --> Expansion[More apps and next-deal expansion]
      Expansion --> Revenue[~$300K ACV per customer]
      Revenue --> GrossProfit[70%+ gross profit after template reuse]
      GrossProfit --> Cash[Runway to Q4Y2 proof milestone]
modelSanity:
- checkName: 收入引擎
  finding: 基础情形的收入成立，前提是公司能把 2–3 个付费试点滚成 Q4Y2 的 12 个付费客户，并在 Q4Y3 做到 16 个；每个账户年化收入约 $300K。
- checkName: 必须做对的事
  finding: 试点转年度合同，以及在同一家收购方里拿下下一笔交易带来的扩张，必须在提前拉满 Y3 招聘计划前先跑顺。
- checkName: 模型失效条件
  finding: 如果成交周期晚 1 个季度，且 ACV 又往悲观情形压，Y3 结束前现金会掉到约 -$711K。
- checkName: 下一轮融资验证点
  finding: Q4Y2 前做到 12 个生产客户、2 次可参考切换和合作伙伴来源管道，是支撑下一轮融资的关键证明。
sanityChecks:
  ruleOf40: Y3 增长率 96.6% + EBITDA 利润率 2.3% = 98.9%
  burnMultiple: Y2 烧钱倍数约 0.2x，对应净新增 ARR 约 $2.7M；Y3 已经略微转正现金，因此烧钱倍数不再是限制性指标。
  revenuePerFte: Y3 为 $291.7K，基于 Q4Y3 的 15 名全职员工（企业 SaaS 基准 $200k–$400k）
  flags:
  - 模型要求一个高度集中的 SAM，去支撑公司从 Y1 期末的 3 个付费客户跳到 Q4Y2 的 12 个，因此交易时点是最大的执行风险。
  - 现金效率看上去异常漂亮，因为基础情形假设 ACV 能做到 $300K，且试点转年度合同高于 60%；在把烧钱倍数当成稳定优势前，必须先验证这两点。
  - 只有当交付开始模板化之后，毛利率才会越过 70% 目标，所以定制连接器工作必须被压住，否则下一轮融资时间点会被推迟。
  - 只有在后续招聘继续按里程碑放量的前提下，$2.0M 的 pre-seed 才成立；敏感性分析里哪怕只把 2 个招聘提前，期末现金也会少约 $190K。
