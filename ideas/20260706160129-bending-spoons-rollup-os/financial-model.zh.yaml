slug: app-portfolio-migration-os
date: '2026-07-06'
currency: USD
modelStartMonth: 2026-08
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-08
  unit: month
  source: '[BP date 2026-07-06; 模型从下一完整月份开始]'
- id: A2
  name: 付费客户单元
  value: 一个处于付费试点或年度治理合同中的收购方应用组合账户
  unit: definition
  source: '[BP businessModel.unitOfValue + BP gtm.pricing；模型跟踪的是付费账户，而不是单个应用]'
- id: A3
  name: pre-seed 交割后起始现金
  value: '2000.0'
  unit: usdK
  source: '[BP fundingAsk targetFundingRangeUsd $2-4M；由于招聘按里程碑放量，模型采用区间低端]'
- id: A4
  name: 每付费客户的混合年 ARPU
  value: '300.0'
  unit: usdK/year
  source: '[BP gtm.pricing 年度订阅 $150k–$300k，另加每次迁移收费；Research market.som 按约 16 个客户、每个约 $300k ACV 建模]'
- id: A5
  name: 第 1 年付费客户启动节奏
  value: M6, M9, M12
  unit: month index
  source: '[BP milestones 要求 12 个月内拿下 2–3 个付费试点，并完成首个年度转化]'
- id: A6
  name: 第 2 年客户爬坡
  value: Q1Y2 期末 5，Q2Y2 7，Q3Y2 9，Q4Y2 12
  unit: customers
  source: '[BP milestones 12–24 个月目标是 12–15 个生产客户；模型取区间下沿]'
- id: A7
  name: 第 3 年客户爬坡
  value: Q1Y3 期末 13，Q2Y3 15，Q3Y3 16，Q4Y3 16
  unit: customers
  source: '[Research market.som 和 BP market.som 都指向第 3 年约 16 个可触达客户、每个约 $300k ACV]'
- id: A8
  name: 试点偏重交付的 COGS 比率
  value: '55'
  unit: percent of revenue in M1-M6 revenue months
  source: '[BP sequencing 先从只读映射和双跑监控起步，所以早期交付仍然偏实施密集]'
- id: A9
  name: 第 2 年交付 COGS 比率
  value: 35 then 32
  unit: percent of revenue in H1Y2 then H2Y2
  source: '[BP product.twelveMonth 的可复用模板和有限写路径自动化会提升重复性]'
- id: A10
  name: 第 3 年交付 COGS 比率
  value: 30 then 28
  unit: percent of revenue in H1Y3 then H2Y3
  source: '[BP businessModel.targetGrossMarginPct 70；随着连接器复用成熟，模型期末略高于目标值]'
- id: A11
  name: 月度客户流失率
  value: '1.5'
  unit: percent
  source: '[经验值：年度合同的企业控制平面软件黏性强，但早期客户集中度会把风险往回拉]'
- id: A12
  name: 每个新增付费客户的混合 CAC
  value: '95.0'
  unit: usdK
  source: '[BP gtm.funnelTargets、创始人主导外呼、安全评审和合作伙伴联合销售打法；创业公司财务经验值]'
- id: A13
  name: 创始人/CEO 含税现金薪酬
  value: '165.0'
  unit: usdK/year
  source: '[BP team Founder CEO at Month 0；精简 pre-seed 创始人薪资的财务经验值]'
- id: A14
  name: 工程含税现金薪酬
  value: '200.0'
  unit: usdK/year
  source: '[BP team founding eng 和集成密集路线图；高级产品工程师的财务经验值]'
- id: A15
  name: 解决方案含税现金薪酬
  value: '170.0'
  unit: usdK/year
  source: '[BP team solutions architect at Month 3；技术实施人才的财务经验值]'
- id: A16
  name: GTM 含税现金薪酬
  value: '180.0'
  unit: usdK/year
  source: '[BP team partnerships lead at Month 9；技术型销售/合作运营岗位的财务经验值]'
- id: A17
  name: G&A 含税现金薪酬
  value: '140.0'
  unit: usdK/year
  source: '[BP 的运营约束意味着 Y2 后段要补财务、安全和审计支持；创业公司财务经验值]'
- id: A18
  name: 招聘节奏
  value: M1 创始人 +1 工程；M4 +1 解决方案；M7 +1 工程；M10 +1 GTM；M13 +1 工程；M16 +1 解决方案；M18 +1 GTM；M19 +1 工程；M22 +1 G&A；M25 +1 工程；M27 +1 GTM；M28 +1 解决方案；M31 +1 工程；M34 +1 G&A
  unit: schedule
  source: '[BP team.startTiming 和 BP milestones、strategicChoices.sequencingRationale；招聘跟着证明节点走，再放量]'
- id: A19
  name: 非薪酬运营支出爬坡
  value: S&M 8/12/15/18，R&D 8/10/12/15，G&A 14/16/18/20
  unit: usdK per month across M1-M9 / M10-M18 / M19-M27 / M28-M36
  source: '[经验值：安全敏感型企业 SaaS 所需的差旅、合作伙伴认证、云工具、法务、保险和审计准备]'
- id: A20
  name: 基础企业销售周期
  value: '5'
  unit: months to paid pilot
  source: '[BP gtm.wedge 由真实收购触发，且 BP gtm.funnelTargets 说明流程虽然被压缩，但依然是技术型采购]'
- id: A21
  name: 收入确认口径
  value: '25.0'
  unit: usdK monthly revenue per active paying customer
  source: '[由 A4 推导，保证利润表收入在基础情形下可直接对齐为客户数 × ARPU]'
- id: A22
  name: 资金分配结构
  value: 45 / 23 / 12 / 20
  unit: percent Engineering/GTM/G&A/Buffer
  source: '[根据 Q4Y2 里程碑前的建模支出结构，加上 6 个月现金缓冲推导]'
