scenarios:
  downside:
    description: ACV 压到约 $270K，试点转生产大致晚一个季度，毛利率卡在 66% 左右，公司会在 Y3 结束前被迫去做一轮过桥融资。
    y3RevenueK: 3262.5
    y3EbitdaK: -819.7
    cashLowPointK: -711.0
    keyAssumptionChanges:
    - 年 ARPU 从 $300K 降到 $270K。
    - Q4Y2 期末只有 10 个客户，而不是 12 个；Q4Y3 期末只有 14 个，而不是 16 个。
    - 毛利率只能到约 66%，因为连接器和切换工作始终更偏定制化。
  base:
    description: 基础情形里，小规模试点顺利滚成一个有节奏的 12 客户 Y2 盘子，Y3 末做到 16 个付费客户，退出 ARR 接近模型里的 SOM 上限。
    y3RevenueK: 4375.0
    y3EbitdaK: 101.1
    cashLowPointK: 650.3
    keyAssumptionChanges:
    - 按假设 A1–A22 原样建模。
    - Y3 期末做到 16 个付费客户，退出 ARR 约 $4.8M。
    - 整个 Y3 仍按里程碑分阶段招聘，而不是提前把 Y3 计划整体拉前。
  upside:
    description: 如果合作伙伴渠道在 H2Y2 跑起来，ACV 抬到 $330K 左右，再加上模板复用更顺，公司 Y3 末可做到 18 个客户，并明确跨过盈利线。
    y3RevenueK: 5335.0
    y3EbitdaK: 891.0
    cashLowPointK: 892.1
    keyAssumptionChanges:
    - 年 ARPU 从 $300K 提到 $330K。
    - 到 Y2 末多拿下 2 个合作伙伴来源的胜单，Y3 期末做到 18 个客户。
    - 随着迁移模板和异常基线复用更快，毛利率再提升约 2 个点。
