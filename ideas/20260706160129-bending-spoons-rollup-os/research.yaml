"reportMemo":
  "executiveTakeaways":
  - "The category is real because app-transfer rules, vendor migration guides, and portfolio standardization are already explicit; the open gap is a neutral control plane across billing, analytics, and lifecycle systems."
  - "Beachhead demand is narrow and episodic: buyers are technically strong, so budget appears only when a deal closes or leadership mandates portfolio standardization."
  - "The startup cannot win as another point tool; it has to own migration intelligence—entitlement mapping, schema dual-runs, and cohort anomaly guardrails—across the existing stack."
  "marketDefinition": "Control-plane software for the first 120 days after a consumer app acquisition: inventorying SDKs, mapping entitlements, dual-running analytics, and cutting over paywalls, subscriptions, and lifecycle triggers onto a common operating stack."
  "customerAndBuyer": "Primary users are VP Platform or monetization-integration leaders at consumer app portfolios with multiple acquired subscription apps. Secondary users are data-platform and lifecycle-engineering leads. The economic buyer is usually the CTO, CPO, or VP Platform because the risk shows up in renewal revenue, board-level synergy timing, and reporting continuity."
  "buyingTriggers":
  - "point": "A deal closes and the receiving team must transfer store ownership, secrets, subscription validation, and reporting continuity without breaking paying-user access."
    "sourceRefs":
