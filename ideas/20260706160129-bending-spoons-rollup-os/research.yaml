  "willingnessToPay":
    "summary": "Adjacent stack tools already monetize this workflow with paid plans or enterprise contracts, and Bending Spoons reports millions of paying customers across its portfolio. That makes a roughly $150k-$300k ACV plausible when the product protects renewal revenue during live migrations and removes repeated integration labor."
    "sourceRefs":
