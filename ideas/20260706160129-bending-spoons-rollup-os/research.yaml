  "competitiveLandscape": "The buyer already buys subscriptions infrastructure, paywalls, analytics governance, CDP or event routing, and lifecycle messaging. What is still missing is a single cutover system that coordinates them during app transfers and post-close standardization."
  "incumbentThesis":
