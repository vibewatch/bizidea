  "regulatoryLandscape": "The core compliance burden sits at the platform and consumer-protection layer: Apple and Google define transfer, price-change, and subscription-management rules, while U.S. and EU regulators keep cancellation, renewal, and disclosure behavior under scrutiny."
  "technologyLandscape": "Mature primitives already exist for entitlements, paywalls, tracking plans, transformations, user imports, and notification plumbing. That lowers build risk, but it shifts defensibility toward cross-stack migration logic, rollback thresholds, and portfolio benchmarks rather than raw infrastructure alone."
