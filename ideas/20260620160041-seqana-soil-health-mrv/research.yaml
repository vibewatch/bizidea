openQuestions:
- Will first-wave CSRD auditors require field-level soil metrics, or will process and policy disclosures be sufficient in early reporting cycles?
- How many Tier-1 European food companies already have mapped supplier fields that can be used without a multi-quarter data-acquisition project?
- What uncertainty threshold will buyers and auditors accept when satellite inference is combined with limited physical sampling?
- Can the startup sell as a lightweight reporting layer if buyers already use Regrow, eAgronom, Klim, or similar broader programs?
- Does the beachhead remain venture-attractive if compliance urgency softens and the product must win mainly on supplier-risk ROI?
