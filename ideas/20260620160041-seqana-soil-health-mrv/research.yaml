  validationPlan:
  - priority: high
    question: Will first-wave CSRD auditors actually require field-level soil metrics, or will process and policy disclosures be enough in year one?
    evidenceToGather: Interviews with Big 4 / specialist sustainability assurance teams plus anonymized audit requests from two food companies.
  - priority: high
    question: Can target customers provide mapped supplier field boundaries for 2,000+ farms inside 60 days?
    evidenceToGather: Pilot data-room exercises with one dairy brand, one grain processor, and one existing platform partner.
  - priority: medium
    question: How much do current buyers already spend on soil sampling, FSA workflows, consultants, and regenerative program reporting?
    evidenceToGather: Budget ranges from active programs and procurement/RFP documents from food-sector buyers.
  - priority: medium
    question: Can a partner-led motion materially shorten sales cycles?
    evidenceToGather: Compare pipeline speed from one auditor channel and one agrifood platform channel against direct outbound.
