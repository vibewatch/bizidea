topRisks:
  - name: CSRD scope reduced or delayed
    description: "EU regulatory timelines have slipped before; if CSRD Scope 3 land-use reporting obligations are delayed, phased out, or narrowed, the compliance urgency driving near-term enterprise sales collapses."
    mitigation: "Diversify use cases from day one by positioning the product equally for supply-chain resilience and procurement risk reduction, so business value survives regulatory schedule changes independently."
  - name: Farmer data access barriers
    description: "Accurate field-level soil health monitoring requires farm boundary data and periodic ground-truth validation that Tier-1 food companies may struggle to obtain from independent supplier farms without farmer consent."
    mitigation: "Partner with agrifood platforms such as eAgronom and Klim that already hold farmer relationships and farm boundary data, reducing direct farmer acquisition costs and accelerating coverage on first contracts."
  - name: Satellite data commoditization by incumbents
    description: "Declining satellite imagery costs and open Copernicus data access could enable well-funded incumbents such as Trimble, Planet, or agri-fintech platforms to bolt soil health layers onto existing products and undercut on price."
    mitigation: "Build differentiation in the CSRD compliance workflow layer and proprietary ML model accuracy rather than raw satellite access; pursue exclusive ground-truth data partnerships with EU agricultural research institutes to widen the training-data moat."
