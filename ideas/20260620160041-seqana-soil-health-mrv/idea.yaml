problem: >-
  Large food and beverage companies face mandatory CSRD Scope 3 reporting
  obligations requiring them to quantify land-use and soil health impacts across
  thousands of supplier farms—data they currently cannot produce at scale.
  Existing approaches rely on once-a-year self-reported surveys, expensive
  physical soil sampling campaigns, or fragmented voluntary carbon project
  records, none of which deliver the continuous, auditable, field-level data
  that regulators and third-party auditors demand. Meanwhile, soil-health
  degradation in supplier regions poses a growing yield-volatility risk that
  procurement teams have no systematic way to detect before a crop failure
  disrupts supply. The gap between regulatory expectation and available data
  infrastructure is urgent, funded, and entirely unsolved by incumbent software.
targetUser:
  primary: "Sustainability reporting leads and procurement teams at Tier-1 European food and beverage companies (revenue >€1B) with 1,000–5,000 supplier farms in scope for CSRD Scope 3 reporting."
  secondary: "Agrifood platform companies such as eAgronom and Klim that want to embed soil health MRV as a white-label data layer inside their farm management offerings."
  buyer: "VP Sustainability or Chief Procurement Officer at a Tier-1 food company filing their first mandatory CSRD annual report in 2026–2027."
startupThesis:
  nonObviousInsight: >-
    Voluntary carbon markets forced soil MRV to compete on credit price—an
    inherently fragile model that collapsed when credit demand softened. CSRD and
    EUDR have now created a mandatory, hard-deadline compliance obligation for
    every large EU food company, converting soil health data from a nice-to-have
    in voluntary programs into a legal requirement with audit exposure. This
    regulatory shift decouples soil MRV revenue from carbon credit volatility
    and creates a recurring SaaS model anchored to annual reporting cycles that
    does not exist as a purpose-built product category yet.
  beachhead: "CSRD Scope 3 reporting teams at European Tier-1 food and beverage companies with 1,000–5,000 European supplier farms entering their first mandatory reporting cycle in 2026–2027."
  wedge: "A pre-built CSRD soil health data package delivering satellite-derived soil carbon and health indicators for a company's mapped supplier fields as an audit-ready report and API feed."
  whyNowCatalyst: "CSRD Phase 2 reporting obligations take effect for large EU companies in reporting year 2025, creating an unfilled hard-deadline demand for third-party-verified Scope 3 land-use and soil health data that most companies cannot currently produce."
  ventureScalePath: >-
    Starting with CSRD reporting, expand into real-time supplier crop-risk
    dashboards, commodity sourcing analytics, and eventually a network-effects
    data platform as more food companies contribute supplier farm boundaries—
    creating a proprietary global soil health dataset no competitor can
    replicate from scratch.
solution: >-
  A SaaS platform that ingests satellite imagery, ground-truth sensor data, and
  farm boundary records to produce continuous, field-level soil health scores
  for a food company's entire supplier farm network. Customers map their
  supplier farms once, then receive quarterly automated soil carbon, organic
  matter, and compaction reports pre-formatted to CSRD Scope 3 disclosure
  templates. An API feed connects to existing sustainability reporting tools
  such as SAP or Salesforce Net Zero Cloud. Unlike manual sampling programs,
  the platform covers all farms continuously at roughly 5–10% of physical
  sampling cost. A self-serve dashboard surfaces flagged high-risk suppliers
  showing accelerating soil degradation, allowing procurement teams to act on
  resilience risks before crop failures materialize.
goToMarketSeed:
  firstCustomer: "A CSRD-filing sustainability manager at a European Tier-1 dairy or grain-based food brand with 2,000+ European supplier farms who must submit their first CSRD annual report in 2026 and has no defensible Scope 3 soil health data to show auditors."
  buyingTrigger: "CSRD reporting deadline 12 months out, with an external auditor flagging the absence of verifiable third-party soil data for Scope 3 land-use disclosures."
  currentAlternative: "Manual soil sampling campaigns costing €50–€150 per field per year covering fewer than 10% of supplier farms, or unverifiable self-reported farm questionnaires."
  switchingReason: >-
    Satellite-based MRV covers 100% of supplier fields at a fraction of
    physical sampling cost, produces machine-readable CSRD-aligned outputs
    that auditors can verify, and provides real-time degradation alerts that
    manual sampling—conducted once every few years—misses entirely.
  pricingHypothesis: "Annual SaaS subscription priced per farm unit monitored, e.g. €30–€80 per farm per year; a food company with 2,000 supplier farms pays €60,000–€160,000 annually with a 500-farm minimum contract."
