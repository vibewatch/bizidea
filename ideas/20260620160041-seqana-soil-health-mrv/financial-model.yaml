modelDiagram:
  title: Unit economics flow
  mermaid: |
    flowchart LR
      Leads[Enterprise Leads] --> QualPilot[Qualified Pilot\n15-25% conversion]
      QualPilot --> PaidPilot[Paid Pilot\n$55K / 2 months]
      PaidPilot --> Annual[Annual Contract\n$150K initial ARR]
      Annual --> Expansion[Farm and Module Expansion\nto $210K ACV by Y3]
      Expansion --> Revenue[Subscription Revenue\n$3.3M Y3]
      Revenue --> GrossProfit[Gross Profit\n72% GM Y3]
      GrossProfit --> EBITDA[EBITDA\n+$636K Y3]
      GrossProfit --> Reinvest[Reinvest in Headcount\nand Channel]

modelSanity:
  - checkName: Revenue engine
    finding: >-
      Annual per-farm subscriptions (500-farm minimum, $60/farm-year) compounding
      from 2 customers in Y1 to 18 by Y3-end drive 97% of Y3 revenue; pilot fees
      bridge the pre-ARR period but are not the sustained growth lever.
  - checkName: Must go right
    finding: >-
      At least 3 paid pilots must convert to six-figure annual contracts before
      month 18, validating that auditors accept satellite-derived evidence packs and
      that customers can deliver mapped supplier boundaries within 60 days — the
      two kill criteria most likely to stop the company in its tracks.
  - checkName: Model breaks if
    finding: >-
      If ACV stays flat at $150K rather than expanding to $210K through farm-count
      growth and risk-module add-ons, Y3 EBITDA turns negative at approximately
      -$200K and the company requires a bridge or smaller seed round, as shown in
      the ARPU sensitivity row.
  - checkName: Next-round proof
    finding: >-
      Reaching 8–10 annual production customers with auditor-accepted evidence packs,
      one channel partnership generating referrals, and gross margin above 70%
      provides the repeatable-wedge proof needed to raise a $5–8M seed round focused
      on commercial scale and platform expansion.

sanityChecks:
  ruleOf40: >-
    Y3 revenue growth (3304-1327)/1327 = 149% + Y3 EBITDA margin 636/3304 = 19% =
    168 — well above the 40 threshold; caveat is that growth rate is high partly
    because Y1 revenue base is very small ($320K) rather than because the absolute
    Y3 ARR run-rate is large.
  burnMultiple: >-
    Y2 net burn $298K / Y2 net new ARR $1,860K = 0.16x — unusually efficient;
    reflects founder-led sales and no paid-media spend, which is credible pre-seed
    but may understate true CAC once direct outbound replaces warm-channel deals.
  revenuePerFte: >-
    Y3 avg ~9 FTE / $3,304K revenue = $367K per FTE — within the $200–400K SaaS
    benchmark and consistent with a high-ACV, low-volume enterprise motion.
  flags:
    - >-
      Y1 gross margin is 68.1%, dragged below the 70% target by $6.5K/month fixed
      infrastructure in four pre-revenue months and calibration-field costs ($10.5K)
      in pilot-active months; margin reaches 72% by Y3 as subscriptions scale.
    - >-
      CAC payback of 4.4 months appears fast for a 6–9 month enterprise sales cycle;
      this is mathematically correct given high ACV ($210K) but assumes the founder
      closes the first deals through warm auditor or platform referrals — cold
      outbound would raise effective CAC to $80–100K and extend payback to 7–9 months.
    - >-
      The $3M pre-seed provides roughly 5.5 years of Y1 burn rate, far exceeding the
      18-month runway stated in the BP; model projects total 30-month burn of only
      ~$840K before sustained cash-flow positivity, suggesting the raise could be
      sized at $1.5–2M unless the team plans aggressive upside-scenario hiring.
    - >-
      All Y2 and Y3 growth assumes first-wave EU auditors require field-level soil
      metrics under CSRD/ESRS; if omnibus simplifications allow process disclosures
      instead, demand onset shifts 12–18 months right and Y3 revenue falls toward
      the downside scenario of $1.6M.
    - >-
      Boundary-access risk (customers cannot provide mapped supplier fields within 60
      days) is rated High likelihood in the BP; a one-quarter slip in pilot timing
      reduces Y1 revenue by up to $82K and delays the first two annual conversions,
      compressing Y2 revenue by ~$200K.
    - >-
      LTV/CAC of 22.9x is very high and driven by a long assumed customer life (100
      months); if annual logo churn is 20% (2.0% monthly) rather than 12%, LTV falls
      to $756K and LTV/CAC drops to 13.7x — still strong but sensitive to regulatory
      continuity.
