assumptions:
  - id: A1
    name: Starting production customers (M1)
    value: "0"
    unit: count
    source: "[BP exec summary] Beachhead requires pilot qualification; no paying accounts before first pilot closes."
  - id: A2
    name: Pilot fee per engagement
    value: "55"
    unit: USD thousands
    source: "[BP investorMemo.firstCustomer] €40–75k pilot covering one sourcing region; midpoint ~$55K at 1.05 EUR/USD."
  - id: A3
    name: Initial annual contract value
    value: "150"
    unit: USD thousands per customer per year
    source: "[BP pricing + research bottomUpSizingDrivers] 2,500 monitored farms × $60/farm-year = $150K minimum viable contract; $60/farm from research TAM calc (3,000 × $60 = $180K blended)."
  - id: A4
    name: ACV growth to $210K by Y3
    value: "210"
    unit: USD thousands per customer per year
    source: "[BP expansionLevers + research willingness-to-pay] Farm-count expansion within account + $25K risk-alerting add-on module; blends to $210K average by Y3 EOP across 18 customers."
  - id: A5
    name: Per-farm price
    value: "60"
    unit: USD per farm per year
    source: "[research bottomUpSizingDrivers] Blended annual contract value $180K ÷ 3,000 farms = $60/farm-year; matches enterprise satellite-MRV heuristic of $40–80/field/year."
  - id: A6
    name: First pilot signs M5
    value: "5"
    unit: months from model start
    source: "[BP experimentRoadmap 90-180 days] 3–5 pilots in first 6 months requires ~4 months of pre-pilot outreach, product readiness, and auditor-channel development."
  - id: A7
    name: Pilot-to-annual conversion rate
    value: "50"
    unit: percent
    source: "[BP funnelTargets] Paid pilot→annual production 50%+; model assumes each converted pilot yields a 2-month conversion lag before annual MRR begins."
  - id: A8
    name: Monthly logo churn
    value: "1.0"
    unit: percent per month
    source: "Industry heuristic: enterprise compliance-driven SaaS typically 10–15% annual logo churn; 1.0%/month (≈11.4% annual) reflects regulatory stickiness but allows for omnibus-simplification downside."
  - id: A9
    name: Target gross margin at scale
    value: "70"
    unit: percent
    source: "[BP businessModel.targetGrossMarginPct] 70% stated target; model reaches 72% by Y3 as fixed infrastructure amortizes over larger ARR base."
  - id: A10
    name: Y1 effective gross margin
    value: "68"
    unit: percent
    source: "Operator judgment: Y1 COGS includes fixed satellite/compute infrastructure ($6.5K/month) and per-pilot calibration/field-validation costs ($10.5K in pilot-active months) before revenue fully scales; drag resolves by Y2."
  - id: A11
    name: CEO salary (below-market pre-seed)
    value: "150"
    unit: USD thousands per year loaded
    source: "Startup-finance heuristic: founding CEO takes 70–80% of market rate at pre-seed, compensated with equity; market rate ~$200K for enterprise-SaaS CEO in US/EU."
  - id: A12
    name: Solutions Engineer joins M7
    value: "7"
    unit: months from model start
    source: "[BP team] startTiming Month 6; model rounds to M7 (Q3Y1) to allow for hiring lag."
  - id: A13
    name: Commercial Channel Lead joins M13 (Q1Y2)
    value: "13"
    unit: months from model start
    source: "[BP team] startTiming Month 12; model places hire at M13 once pilot packaging and evidence standards are repeatable per BP sequencingRationale."
  - id: A14
    name: Pre-seed raise
    value: "3000"
    unit: USD thousands
    source: "[BP fundingAsk.targetFundingRangeUsd] $2–4M range; $3M midpoint assumed; funds arriving before M1 operations begin."
  - id: A15
    name: Non-salary S&M monthly (Y1)
    value: "5"
    unit: USD thousands per month
    source: "Startup-finance heuristic: pre-seed B2B enterprise startup spends $3–7K/month on events, travel, and tools before a commercial hire; grows to $10K/month by Y2 and $28K/month by Y3 as channel motions scale."
  - id: A16
    name: Non-salary G&A monthly (Y1)
    value: "8"
    unit: USD thousands per month
    source: "Startup-finance heuristic: EU-exposed company with GDPR data-privacy exposure, legal setup, accountant, insurance, and co-working space; $8–10K/month is typical for a 3–4 person deep-tech pre-seed."
  - id: A17
    name: Blended CAC
    value: "55"
    unit: USD thousands
    source: "Model-derived: Y2 S&M budget ~$399K ÷ 10 new production customers = $40K direct Y2 CAC; +$15K for Y1 pipeline investment and channel partner development costs; blended $55K."
  - id: A18
    name: Y3 production customer count (EOP)
    value: "18"
    unit: count
    source: "[BP market.som] SOM ~$4M ÷ $215K avg ACV = ~18 contracts; matches BP milestone 24–36 months."
  - id: A19
    name: Pilot revenue recognition
    value: "2"
    unit: months per pilot
    source: "[BP investorMemo.firstCustomer] 4–8 week pilot window; model uses 2 months, $27.5K/month per pilot ($55K total)."
  - id: A20
    name: COGS variable rate (infrastructure + calibration)
    value: "8–28"
    unit: percent of revenue (Y3 at 28%)
    source: "A9/A10 derived: fixed infra $6.5K/month + calibration field costs ~$10.5K in pilot-active months gives 68% blended Y1 GM; COGS ratio drops to 28% of revenue in Y3 as subscriptions dominate and sampling is standardized."

