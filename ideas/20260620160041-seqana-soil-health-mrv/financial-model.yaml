scenarios:
  downside:
    description: >-
      Regulatory urgency weakens after omnibus simplifications; only 8 production
      customers by end Y2 and 12 by end Y3 at flat $150K ACV, with sales cycles
      extending to 12–15 months.
    y3RevenueK: 1600.0
    y3EbitdaK: -623.0
    cashLowPointK: 1540.0
    keyAssumptionChanges:
      - "Customer count reduced to 12 by Y3 EOP (vs 18 base)"
      - "ACV held flat at $150K (no risk-module expansion)"
      - "Y3 opex held constant (no additional hiring offset)"
  base:
    description: >-
      18 production customers by Y3 EOP at $210K blended ACV; 50%+ pilot
      conversion; auditor and one platform channel generating referrals from Y2;
      EBITDA positive in Q4Y2.
    y3RevenueK: 3304.0
    y3EbitdaK: 636.2
    cashLowPointK: 2154.4
    keyAssumptionChanges:
      - "Base assumptions as modeled"
  upside:
    description: >-
      Regulatory urgency strong and channel acceleration pulls 22 customers by Y3
      EOP at $240K blended ACV; risk-alerting module adopted by 70% of customers
      by Y3; additional commercial hire in Q3Y2.
    y3RevenueK: 4900.0
    y3EbitdaK: 1480.0
    cashLowPointK: 2154.4
    keyAssumptionChanges:
      - "Customer count raised to 22 by Y3 EOP"
      - "Blended ACV rises to $240K through broader risk-module adoption"
      - "One additional sales hire in Q3Y2 (opex +$165K vs base)"

