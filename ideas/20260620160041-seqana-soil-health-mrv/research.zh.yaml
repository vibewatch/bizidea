competitors:
- name: Regrow
  stage: 扩张期
  wedge: 面向 CPG 和农企业买家的企业级再生农业与 Scope 3 报告平台。
  pricing: 定制定价 / 联系销售。
  strength: 已经证明能在企业侧落地，并且明确提供审计就绪的 CSRD 与 Scope 3 工作流。
  weaknessVsUs: 产品更宽更重，不如面向欧洲土壤健康报告层的轻量切口聚焦。
  sourceRefs:
  - 17
  - 18
  - 19
  - 33
- name: Seqana
  stage: 扩张期
  wedge: 基于卫星影像和机器学习的欧洲土壤健康与 SOC MRV 专家。
  pricing: 定制定价 / 联系销售。
  strength: 科学测量定位强，也已有具名农食客户。
  weaknessVsUs: 更偏测量能力，对 CSRD/采购工作流层的占位还不够明确。
  sourceRefs:
  - 20
  - 21
  - 34
- name: eAgronom
  stage: 扩张期
  wedge: 把农户网络、碳项目和 Scope 3 执行连在一起，为食品行业公司服务。
  pricing: 定制化、顾问主导的项目定价。
  strength: 在农户运营、地块数据采集和欧洲企业项目交付上很强。
  weaknessVsUs: 服务属性更重，也比轻量报告层更依赖种植者采纳。
  sourceRefs:
  - 22
  - 23
  - 24
- name: Klim
  stage: 成长期
  wedge: 服务企业客户的再生采购与 Scope 3 项目平台。
  pricing: 定制定价 / 联系专家。
  strength: 农业商业可信度强，对企业 Scope 3 也有直接叙事。
  weaknessVsUs: 更像转型项目伙伴，而不是一款窄而审计就绪的土壤报告产品。
  sourceRefs:
  - 25
  - 35
regulatoryTechnicalConstraints:
- point: ESRS 对土地、生物多样性和土壤的披露仍以重大性为前提，所以并不是每一家食品公司都需要立刻上深度地块级土壤指标。
  sourceRefs:
  - 1
  - 2
- point: 企业土地与价值链披露正在越来越正式化，因此即便部分土壤指标仍需估算，证据质量要求也会继续抬高。
  sourceRefs:
  - 8
  - 9
  - 13
- point: 如果想让 SOC 输出站得住，代表性校准数据集和不确定性管理仍是硬要求；单靠卫星推断远远不够。
  sourceRefs:
  - 28
  - 29
  - 30
  - 31
  - 32
- point: LUCAS 这类欧盟公共基线很有价值，但其更新周期和覆盖方式都不足以替代客户自己的地块数据。
  sourceRefs:
  - 30
  - 32
- point: 供应商地块边界接入和农户配合仍然是主要运营瓶颈，尤其对那些还没有平台伙伴的品牌更是如此。
  sourceRefs:
  - 7
  - 22
  - 23
  - 25
validationSignals:
- point: Seqana 把 Danone、eAgronom、Klim 和 Bayer 都点名为客户，这已经证明企业端和平台端都存在对土壤健康 MRV 的真实需求。
  sourceRefs:
  - 20
- point: General Mills 已经借 Regrow 监测 1.75 亿英亩土地，用来改善气候盘查和供应链韧性。
  sourceRefs:
  - 17
- point: SAI Platform 现在直接表示，可信的电子化 MRV 是受监管披露的底层能力，说明买家工作流正在数字化，也越来越在意审计。
  sourceRefs:
  - 6
- point: eAgronom 明确在卖对齐 SBTi FLAG 的食品公司解决方案，说明这个品类已经不只停留在碳项目，而是进入企业项目。
  sourceRefs:
  - 22
  - 24
- point: Copernicus、ESA、SoilGrids 和 LUCAS 放在一起，已经构成覆盖欧洲尺度、可重复测量的可信技术底座。
  sourceRefs:
  - 29
  - 30
  - 31
  - 32
openQuestions:
- 第一波 CSRD 审计师到底会不会要求地块级土壤指标，还是在早期报告周期里流程与政策披露就足够？
- 有多少欧洲 Tier-1 食品公司已经拥有可直接使用、无需跨季度数据采集工程的供应商地块映射？
- 当卫星推断只配少量实地采样时，买家和审计师到底能接受多高的不确定性阈值？
- 如果买家已经在用 Regrow、eAgronom、Klim 或类似的更宽项目，这家创业公司还能不能以一层轻量报告软件卖进去？
- 如果合规紧迫性放缓，产品主要靠供应商风险 ROI 取胜，这个滩头市场还够不够 venture 级别？
