differentiator: 大多数农业数据供应商卖的是原始卫星数据流，客户还得自己养数据科学团队去解释；而碳市场 MRV 平台优化的是信用签发流程，不是合规披露。这个产品从第一天就是给食品公司的可持续发展报告团队做的：直接对齐 CSRD 披露标准，不要求农民安装新 App，就能覆盖全部供应农场；收费也按农场订阅，而不是按项目做咨询。再加上模型是基于欧洲土壤类型和具名农食客户的地面实测数据训练并验证出来，精度和切换成本都会比通用卫星平台更强。
