jobsToBeDone:
- job: 当我们准备第一份 CSRD 年报时，帮 Tier-1 食品公司的可持续发展经理量化全部供应农场的 Scope 3 土壤健康影响，好让他们能按时把可核验的第三方数据交给监管机构和审计师。
  currentAlternative: 人工土壤采样覆盖不到 10% 的供应农场，或者依赖未经核验的农场自报问卷。
  successMetric: 在审计窗口开始前 30 天，交付覆盖 100% 供应农场、对齐 CSRD 的土壤健康评分。
- job: 当关键采购区的产量预测开始变得不稳时，帮采购负责人识别哪些供应农场已经出现土壤退化信号，好让他们能在断供发生前启动供应商改进计划。
  currentAlternative: 只能在作物减产之后看事后报告，或者听零散的供应商口头反馈，没有任何提前预警。
  successMetric: 在减产影响真正出现在收成数据前 6–12 个月发出退化预警。
ideaScorecard:
  signalStrength:
    score: 4
    rationale: 具名 Tier-1 客户和一轮 320 万欧元的机构融资已经给出市场验证，但因为证据只有单一来源，对产品深度和竞争位置的把握仍有限。
  painIntensity:
    score: 5
    rationale: CSRD 带来带审计风险的法律死线，披露负责人还可能承担个人责任；食品公司同时面对监管压力和供应链韧性风险，但市面上还没有能规模化交付数据的方案。
  wedgeClarity:
    score: 5
    rationale: CSRD Scope 3 土壤披露是一个边界很清楚的第一用例：买家画像明确、申报时点清晰、数据缺口可量化，而且分诊来源里已经点出了潜在首批客户。
  defensibility:
    score: 4
    rationale: 自有 ML 模型会随着标注地块数据增加而变强；不断扩大的供应农场边界数据库会抬高切换成本；围绕欧盟土壤类型做验证也会形成通用卫星平台难以迅速复制的区域精度护城河。
  ventureScale:
    score: 4
    rationale: 光欧盟食品供应链就对应数以千万计的供应农场面积；再加上全球扩张、API 网络效应，以及向商品交易风险和农业信贷延伸的可能，这个市场有机会长成数亿美元量级。
topRisks:
- name: CSRD 范围收缩或延期
  description: 欧盟监管时间表此前就滑过；如果 CSRD Scope 3 的土地利用披露被延后、弱化或缩窄，眼下推动企业销售的合规紧迫性会迅速塌掉。
  mitigation: 从第一天就把产品同时定位成供应链韧性和采购风险管理工具，让商业价值不只绑在监管节奏上。
- name: 农户数据接入门槛高
  description: 想做好地块级土壤健康监测，必须拿到农场边界数据并定期做地面校验；Tier-1 食品公司未必能在没有农户同意的前提下，从独立供应农场顺利拿到这些数据。
  mitigation: 与 eAgronom、Klim 这类已经掌握农户关系和农场边界数据的平台合作，降低直接获客成本，也让首批合同更快铺开覆盖。
- name: 现有厂商把卫星数据快速做成商品
  description: 卫星影像价格下行，加上 Copernicus 开放数据，可能让 Trimble、Planet 或农业金融科技平台这类资金更充足的现有厂商，很快把土壤健康模块叠到现有产品里并压价竞争。
  mitigation: 把差异化建在 CSRD 合规工作流和自有 ML 精度上，而不是原始卫星接入；同时争取和欧盟农业研究机构达成排他性的地面实测合作，继续拉大训练数据护城河。
