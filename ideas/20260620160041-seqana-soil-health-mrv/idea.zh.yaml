problem: 大型食品饮料公司正面临强制性的 CSRD Scope 3 报告义务，必须量化成千上万家供应农场的土地利用和土壤健康影响——但它们今天根本拿不出可规模化的数据。现有办法不是一年一次的自报问卷，就是昂贵的实地采样，或者零散的自愿碳项目记录；这些办法都给不了监管机构和第三方审计真正要的、可连续追踪、可审计、细到地块的数据。与此同时，供应区土壤健康下滑还会推高产量波动风险，但采购团队往往要等减产和断供已经发生，才看见问题。监管要求和数据基础设施之间的缺口已经很急，也有预算，却还没有被现有软件真正填上。
targetUser:
  primary: 主要用户是欧洲 Tier-1 食品饮料公司里负责可持续发展报告和采购的团队（营收 >€1B），其 CSRD Scope 3 报告范围内通常有 1,000–5,000 家供应农场。
  secondary: 次级用户是 eAgronom、Klim 这类农食平台公司，它们希望把土壤健康 MRV 作为白标数据层嵌进自家的农场管理产品。
  buyer: 核心买家是 2026–2027 年首次提交强制 CSRD 年报的 Tier-1 食品公司的可持续发展副总裁或首席采购官。
startupThesis:
  nonObviousInsight: 自愿碳市场曾让土壤 MRV 的商业模式被迫跟着信用价格走，这条路天生脆弱，信用需求一降就塌。现在 CSRD 和 EUDR 给每一家大型欧盟食品公司都加上了有截止日的合规义务，土壤健康数据不再是自愿项目里的加分项，而成了带审计风险的法定要求。这个监管转向把土壤 MRV 的收入逻辑从碳信用波动里解耦出来，转成围绕年度披露周期收费的经常性 SaaS 模式，而这个产品品类现在还没人真正做成。
  beachhead: 滩头市场是 2026–2027 年进入首次强制披露周期、拥有 1,000–5,000 家欧洲供应农场的欧洲 Tier-1 食品饮料公司里的 CSRD Scope 3 报告团队。
  wedge: 切口是一套预制的 CSRD 土壤健康数据包：针对企业已映射的供应地块，输出基于卫星推导的土壤碳和土壤健康指标，并同时提供审计就绪报告和 API 数据流。
  whyNowCatalyst: CSRD 第二阶段义务已对大型欧盟公司在 2025 报告年度生效，第三方验证的 Scope 3 土地利用和土壤健康数据突然变成硬需求，但多数公司今天还给不出来。
  ventureScalePath: 先从 CSRD 报告切进去，再往实时供应商作物风险看板、商品采购分析，最终扩成有网络效应的数据平台：接入的食品公司越多，贡献的供应农场边界越多，自有全球土壤健康数据集就越难被后来者从零复制。
solution: 这是一套 SaaS 平台：接入卫星影像、地面校准传感器数据和农场边界记录，为食品公司整张供应农场网络持续生成地块级土壤健康评分。客户只要把供应农场映射一次，之后每个季度都会收到自动生成的土壤碳、有机质和压实度报告，而且直接按 CSRD Scope 3 披露模板排好。API 数据流还能接进 SAP、Salesforce Net Zero Cloud 之类现有可持续发展报告工具。和人工采样相比，这个平台能持续覆盖全部农场，成本大约只要实地采样的 5–10%。自助看板会把土壤退化加速的高风险供应商直接标出来，让采购团队在减产变成现实前先动手。
goToMarketSeed:
  firstCustomer: 第一个客户应当是欧洲 Tier-1 乳制品或谷物食品品牌里负责 CSRD 申报的可持续发展经理：其欧洲供应农场超过 2,000 家，必须在 2026 年提交第一份 CSRD 年报，但手里没有能向审计师交代的 Scope 3 土壤健康数据。
  buyingTrigger: 离 CSRD 报告截止只剩 12 个月，外部审计师明确指出 Scope 3 土地利用披露缺少可核验的第三方土壤数据。
  currentAlternative: 替代方案要么是每块地每年花 €50–€150 做人工土壤采样，但覆盖不到 10% 的供应农场；要么就是根本无法核验的农场自报问卷。
  switchingReason: 卫星 MRV 能以实地采样一小部分的成本覆盖 100% 的供应地块，输出机器可读、对齐 CSRD 的结果，审计师也能核验；与此同时，它还能给出实时退化预警，而几年才做一次的人工采样完全抓不到这些变化。
  pricingHypothesis: 定价假设是按监测农场数量收年费，例如每个农场每年 €30–€80；如果一家食品公司监测 2,000 个供应农场，年费大约是 €60,000–€160,000，最低起签 500 个农场。
