scenarios:
  downside:
    description: omnibus 简化削弱监管紧迫性；到 Y2 期末只有 8 个生产客户，到 Y3 期末 12 个，ACV 持平在 $150K，销售周期拉长到 12–15 个月。
    y3RevenueK: 1600.0
    y3EbitdaK: -623.0
    cashLowPointK: 1540.0
    keyAssumptionChanges:
    - Y3 期末客户数降到 12（基准为 18）
    - ACV 维持在 $150K（没有风险模块扩张）
    - Y3 opex 保持不降（没有额外招聘对冲）
  base:
    description: Y3 期末 18 个生产客户，混合 ACV 为 $210K；试点转化率 50%+；从 Y2 开始，审计师和 1 条平台渠道持续带来转介绍；Q4Y2 实现 EBITDA 转正。
    y3RevenueK: 3304.0
    y3EbitdaK: 636.2
    cashLowPointK: 2154.4
    keyAssumptionChanges:
    - 按模型基准假设执行
  upside:
    description: 监管紧迫性更强，渠道加速把 Y3 期末客户拉到 22 个，混合 ACV 提到 $240K；到 Y3，70% 的客户采纳风险预警模块；Q3Y2 额外再招 1 名商务。
    y3RevenueK: 4900.0
    y3EbitdaK: 1480.0
    cashLowPointK: 2154.4
    keyAssumptionChanges:
    - Y3 期末客户数提高到 22
    - 通过风险模块更广泛采用把混合 ACV 提到 $240K
    - Q3Y2 额外增加 1 名销售（相对基准 opex +$165K）
sensitivity:
- variable: ARPU
  downsideCase: ACV 持平在 $150K（没有农场扩张，也没有风险模块）
  baseCase: ACV 到 Y3 增长至 $210K
  upsideCase: 通过跨买家基准溢价把 ACV 拉到 $250K
  y3RevenueImpactK: -1410.0
  cashImpactK: -1016.0
- variable: 流失率
  downsideCase: 每月 2.0%（年化 24%；omnibus 削弱监管紧迫性）
  baseCase: 每月 1.0%（年化 12%）
  upsideCase: 每月 0.5%（年化 6%；合规锁定更强）
  y3RevenueImpactK: -420.0
  cashImpactK: -302.0
- variable: 销售周期
  downsideCase: 端到端 12–15 个月；首个试点从 M1 推迟到 M8
  baseCase: 6–9 个月；首个试点 M5
  upsideCase: 通过审计师转介绍缩到 4–6 个月；首个试点 M3
  y3RevenueImpactK: -580.0
  cashImpactK: -418.0
- variable: 毛利率
  downsideCase: Y3 为 60%（校准/采样成本维持高位，模式偏服务）
  baseCase: Y3 为 72%
  upsideCase: Y3 为 78%（流水线完全标准化，田间工作最小化）
  y3RevenueImpactK: 0.0
  cashImpactK: -396.5
- variable: 招聘节奏
  downsideCase: Y2 比基准多招 2 名 FTE（激进押增长）
  baseCase: 按模型，Q4Y2 达到 7 名 FTE
  upsideCase: 如果试点延后，整体招聘顺延 1 个季度以保现金
  y3RevenueImpactK: 0.0
  cashImpactK: -330.0
- variable: CAC
  downsideCase: $100K CAC（只靠直销外呼，没有渠道杠杆）
  baseCase: $55K CAC（创始人主导销售 + 1 条渠道转介绍）
  upsideCase: $25K CAC（大部分合格试点来自审计师渠道）
  y3RevenueImpactK: 0.0
  cashImpactK: -450.0
modelDiagram:
  title: 单位经济模型
  mermaid: |
    flowchart LR
      Leads[企业线索] --> QualPilot[合格试点\n15-25% 转化]
      QualPilot --> PaidPilot[付费试点\n$55K / 2 个月]
      PaidPilot --> Annual[年度合同\n初始 ARR $150K]
      Annual --> Expansion[农场数与模块扩张\n到 Y3 ACV $210K]
      Expansion --> Revenue[订阅收入\nY3 为 $3.3M]
      Revenue --> GrossProfit[毛利润\nY3 毛利率 72%]
      GrossProfit --> EBITDA[EBITDA\nY3 为 +$636K]
      GrossProfit --> Reinvest[继续投入招聘\n和渠道建设]
modelSanity:
- checkName: 收入引擎
  finding: 按农场收的年度订阅（500 个农场起签、$60/农场年）把客户数从 Y1 的 2 个推到 Y3 期末的 18 个，贡献了 Y3 收入的 97%；试点费只是跨过 pre-ARR 阶段的桥，不是长期增长杠杆。
- checkName: 必须做对的事
  finding: 至少要在第 18 个月前把 3 个付费试点转成年额六位数的年合同，证明审计师接受卫星证据包，且客户能在 60 天内交出已映射的供应商边界——这两条最可能直接卡死公司。
- checkName: 模型会在哪些地方断掉
  finding: 如果 ACV 不能靠农场数扩张和风险模块附加，从 $150K 提到 $210K，而是一直停在 $150K，那么 Y3 EBITDA 会转成约 -$200K，公司就需要过桥融资或更小一轮 seed；这点在 ARPU 敏感性里已经体现。
- checkName: 下一轮融资所需证明
  finding: 只要做到 8–10 个年度生产客户、证据包获得审计师接受、至少 1 条渠道开始稳定转介绍、毛利率守住 70% 以上，就基本证明切口可复制，足以支撑一轮 $5–8M 的 seed 去放大商业化和平台扩张。
sanityChecks:
  ruleOf40: Y3 收入增速 (3304-1327)/1327 = 149%，加上 Y3 EBITDA 利润率 636/3304 = 19%，合计 168，远高于 40 线；但要注意，增速高有一部分是因为 Y1 收入基数只有 $320K，而不是 Y3 的绝对 ARR 已经很大。
  burnMultiple: Y2 净 burn 为 $298K，除以 Y2 净新增 ARR $1,860K，得到 0.16x——这个效率异常高；它成立的前提是创始人主导销售、没有付费投放，这在 pre-seed 阶段说得通，但等冷启动外呼替代暖渠道后，真实 CAC 很可能更高。
  revenuePerFte: Y3 平均约 9 名 FTE，对应 $3,304K 收入，即每名 FTE 约 $367K——落在 SaaS 常见的 $200–400K 区间内，也符合高 ACV、低成交量的企业销售模式。
  flags:
  - Y1 毛利率只有 68.1%，低于 70% 目标，主要被 4 个零收入月份里每月 $6.5K 的固定基础设施成本，以及试点活跃月份的 $10.5K 校准田间成本拖累；随着订阅收入爬坡，到 Y3 毛利率回到 72%。
  - 4.4 个月的 CAC 回收期对 6–9 个月的企业销售周期来说偏快；数学上它成立，是因为 ACV 很高 ($210K)，但前提是创始人能借审计师或平台的暖转介绍拿下首批订单——如果改成冷启动外呼，CAC 会升到 $80–100K，回收期也会拉长到 7–9 个月。
  - $3M 的 pre-seed 按 Y1 的 burn 速度大约能撑 5.5 年，远超 BP 写的 18 个月跑道；模型测算前 30 个月的累计 burn 只有约 $840K，且在此之前就能持续转正，所以除非团队打算按上行情景激进招聘，否则融资额其实可以缩到 $1.5–2M。
  - Y2 和 Y3 的所有增长都默认第一波欧盟审计师会在 CSRD/ESRS 下要求地块级土壤指标；如果 omnibus 简化让流程性披露就足够，那么需求爆发会整体右移 12–18 个月，Y3 收入会掉向下行情景的 $1.6M。
  - 边界接入风险在 BP 里被标成 High likelihood：如果客户无法在 60 天内交出已映射供应商地块，试点时间每推迟 1 个季度，Y1 收入最多会少 $82K，还会拖慢前两个年付转化，压缩 Y2 收入约 $200K。
  - 22.9x 的 LTV/CAC 很高，核心来自假设的超长客户寿命（100 个月）；如果年化 logo 流失率不是 12%，而是 20%（每月 2.0%），LTV 会降到 $756K，LTV/CAC 也会降到 13.7x——仍然不错，但对监管连续性很敏感。
