slug: food-supply-soil-mrv
date: '2026-06-20'
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: 起始生产客户数 (M1)
  value: '0'
  unit: count
  source: '[BP exec summary] 滩头市场要先过试点筛选；第一个付费试点签下前，不会有生产客户。'
- id: A2
  name: 单次试点费用
  value: '55'
  unit: USD thousands
  source: '[BP investorMemo.firstCustomer] 试点价格 €40–75k，覆盖一个采购区域；按 1.05 EUR/USD 折中约 $55K。'
- id: A3
  name: 初始年度合同额
  value: '150'
  unit: USD thousands per customer per year
  source: '[BP pricing + research bottomUpSizingDrivers] 2,500 个监测农场 × $60/农场年 = $150K 的最低可行合同；$60/农场来自 research 的 TAM 测算 (3,000 × $60 = $180K 混合值)。'
- id: A4
  name: 到 Y3 增长至 $210K ACV
  value: '210'
  unit: USD thousands per customer per year
  source: '[BP expansionLevers + research willingness-to-pay] 同一账户内农场数扩张 + $25K 风险预警附加模块；到 Y3 期末，18 个客户的平均 ACV 混合到 $210K。'
- id: A5
  name: 单农场价格
  value: '60'
  unit: USD per farm per year
  source: '[research bottomUpSizingDrivers] 混合年合同额 $180K ÷ 3,000 个农场 = $60/农场年；与企业级卫星 MRV 的 $40–80/地块/年经验带一致。'
- id: A6
  name: 首个试点在 M5 签约
  value: '5'
  unit: months from model start
  source: '[BP experimentRoadmap 90-180 days] 如果前 6 个月要签下 3–5 个试点，就意味着前面约 4 个月必须先完成外联、产品准备和审计师渠道铺设。'
- id: A7
  name: 试点转年付转化率
  value: '50'
  unit: percent
  source: '[BP funnelTargets] 付费试点→年度生产合同 50%+；模型假设每个转化试点要再过 2 个月，年度 MRR 才开始。'
- id: A8
  name: 月度 logo 流失率
  value: '1.0'
  unit: percent per month
  source: 行业经验值：合规驱动型企业 SaaS 的年 logo 流失率通常在 10–15%；这里按每月 1.0%（约年化 11.4%）处理，既体现监管粘性，也留出 omnibus 简化带来的下行风险。
- id: A9
  name: 规模化目标毛利率
  value: '70'
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct] 目标值写明为 70%；随着固定基础设施被更大 ARR 摊薄，模型到 Y3 提升至 72%。'
- id: A10
  name: Y1 有效毛利率
  value: '68'
  unit: percent
  source: 运营判断：Y1 的 COGS 里既有固定卫星/算力基础设施 ($6.5K/月)，又有试点活跃月份的校准与田间验证成本 ($10.5K/月)；在收入爬坡前先把毛利拖下来，到 Y2 才缓解。
- id: A11
  name: CEO 薪酬（低于市场价的 pre-seed 水平）
  value: '150'
  unit: USD thousands per year loaded
  source: 创业财务经验：pre-seed 阶段创始 CEO 通常只拿 70–80% 的市场工资，其余由股权补偿；US/EU 企业 SaaS CEO 的市场价约 $200K。
- id: A12
  name: 解决方案工程师在 M7 入职
  value: '7'
  unit: months from model start
  source: '[BP team] 计划是 Month 6；模型四舍五入到 M7 (Y1 Q3)，给招聘留一个月缓冲。'
- id: A13
  name: 渠道商务负责人在 M13 (Q1Y2) 入职
  value: '13'
  unit: months from model start
  source: '[BP team] 计划是 Month 12；模型放到 M13，前提是试点包装和证据标准已按 BP sequencingRationale 变得可复制。'
- id: A14
  name: Pre-seed 融资
  value: '3000'
  unit: USD thousands
  source: '[BP fundingAsk.targetFundingRangeUsd] 范围是 $2–4M；模型按中位数 $3M 假设，且资金在 M1 运营开始前到账。'
- id: A15
  name: Y1 非薪酬 S&M 月开支
  value: '5'
  unit: USD thousands per month
  source: 创业财务经验：pre-seed B2B 企业软件公司在商业负责人入职前，每月通常花 $3–7K 做活动、差旅和工具；模型设定 Y2 升到 $10K/月，Y3 随渠道动作放大至 $28K/月。
- id: A16
  name: Y1 非薪酬 G&A 月开支
  value: '8'
  unit: USD thousands per month
  source: 创业财务经验：面向欧盟的公司会有 GDPR 数据隐私、法务设立、会计、保险和联合办公成本；对 3–4 人的深科技 pre-seed 团队，$8–10K/月很常见。
- id: A17
  name: 混合 CAC
  value: '55'
  unit: USD thousands
  source: 模型推导：Y2 S&M 预算约 $399K ÷ 10 个新增生产客户 = $40K 的 Y2 直销 CAC；再加上 Y1 管道投入和渠道伙伴建设约 $15K，混合 CAC 约 $55K。
- id: A18
  name: Y3 期末生产客户数
  value: '18'
  unit: count
  source: '[BP market.som] SOM 约 $4M ÷ $215K 平均 ACV ≈ 18 份合同；与 BP 的 24–36 个月里程碑一致。'
- id: A19
  name: 试点收入确认
  value: '2'
  unit: months per pilot
  source: '[BP investorMemo.firstCustomer] 试点窗口为 4–8 周；模型按 2 个月确认，每月 $27.5K，共 $55K。'
- id: A20
  name: COGS 可变比例（基础设施 + 校准）
  value: 8–28
  unit: percent of revenue (Y3 at 28%)
  source: A9/A10 推导：固定基础设施 $6.5K/月 + 试点活跃月份约 $10.5K 的校准田间成本，使 Y1 综合毛利为 68%；随着订阅占比提升，到 Y3 COGS 比例降到 28%。
