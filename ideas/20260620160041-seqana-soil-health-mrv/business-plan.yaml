slug: food-supply-soil-mrv
date: '2026-06-20'
executiveSummary: >-
  This company should start as an audit-ready soil evidence layer for very large
  European food companies whose agricultural sourcing is already material and
  whose reporting teams cannot defend soil and land disclosures with surveys,
  consultant spreadsheets, or sparse physical sampling alone. The first buyer is
  not the whole food sector; it is the VP Sustainability, regenerative sourcing
  lead, or procurement owner at a Tier-1 dairy, grain, or ingredient buyer that
  already funds supplier programs and now needs field-level evidence that can
  survive limited assurance and support sourcing decisions. The wedge is narrow
  on purpose: map supplier fields once, run quarterly satellite-and-calibration
  workflows, and deliver a CSRD-ready evidence pack plus flat-file or API export
  before the audit window. This is a better entry point than a broad
  regenerative-agriculture platform because incumbents already sell program
  execution, farmer engagement, and carbon workflows, while the open gap is a
  lighter reporting-control layer that can coexist with those systems. Go to
  market should therefore begin through auditors, CSRD advisers, and existing
  agrifood platforms that already control the evidence and field-boundary
  conversation, not through direct farmer acquisition. The venture case is
  credible only if the company uses the reporting wedge to expand into
  procurement-risk alerts, cross-buyer benchmarking, and embedded data products,
  because the initial European reporting beachhead is a tens-of-millions market,
  not a standalone category winner. The biggest disconfirming risks are that
  first-wave auditors accept process disclosures without requiring field-level
  metrics, that customers cannot provide mapped supplier boundaries inside 60
  days, or that bundled offerings from Regrow, eAgronom, Klim, or consultants
  make a standalone layer hard to fund. Based on current evidence, this is a
  plausible company worth watching closely, but it has not yet cleared the bar
  for strong conviction until buyer urgency, deployment speed, and channel
  leverage are demonstrated in paid pilots.
problem:
  - Large European food companies must increasingly defend land and soil claims in value-chain reporting and assurance workflows, but today they rely on farm questionnaires, consultant sampling, and fragmented program records that do not cover all supplier fields.
  - Procurement teams also lack an early-warning system for soil degradation across sourcing regions, so resilience problems show up after yield or supply disruption rather than in time to intervene.
solution:
  - Provide a lightweight enterprise layer that ingests supplier field boundaries plus satellite and calibration inputs, then generates quarterly soil-health scores, uncertainty-aware evidence packs, and CSRD-aligned exports for every covered farm.
  - Sell as an overlay to existing FSA, regenerative-agriculture, and ESG-reporting workflows so customers do not need a new farmer app or a full platform replacement to get audit-ready outputs.
whyWeWin:
  - The product is purpose-built for the reporting and procurement workflow, where buyers need auditable outputs and fast deployment more than another broad regenerative-agriculture platform.
  - A Europe-specific calibration dataset, repeatable assurance logs, and trusted auditor or platform channels can compound into a workflow moat that raw satellite-data vendors and service-heavy program operators do not own by default.
strategicChoices:
  beachhead: Tier-1 European dairy, grain, and ingredient buyers with 2,000-5,000 supplier farms, an active regenerative or sustainable-sourcing program, and first-wave reporting or assurance pressure.
  wedgeRationale: Start where field boundaries, program budgets, and internal ownership already exist, because that produces faster proof than selling to mid-market brands, farmer networks directly, or companies with no sourcing-program infrastructure.
  sequencingRationale: Begin with an evidence-pack and export workflow that can ride on top of existing audits, FSA programs, and platform data, then add supplier-risk dashboards and benchmarking only after the company proves measurement credibility, data access, and paid pilot conversion.
  notYet:
    - Carbon-credit issuance and project-developer workflows as the primary product
    - Direct farmer acquisition or a standalone grower app
    - Mid-market food brands without mapped supplier data or active regenerative programs
    - Full regenerative-program management, agronomy services, or a broad ESG system of record
    - Expansion outside Europe before a repeatable auditor-ready deployment is proven
market:
  tam: Estimated TAM $55.0M based on about 250 European enterprise accounts and roughly $180k blended annual contract value per account.
  sam: Estimated SAM $22.0M for around 120 very large agriculture-exposed European food companies likely to feel first-wave reporting or assurance pressure.
  som: Estimated year-three SOM $4.0M if the company reaches about 18 direct or channel-equivalent production contracts at roughly $180k-$225k ARR each.
  segments:
    - Sustainability reporting, regenerative sourcing, and procurement teams at very large European food and beverage companies
    - Agrifood platforms and program operators that already hold grower relationships and want a soil-evidence layer
  buyingProcess: >-
    The likely champion is a VP Sustainability, regenerative sourcing lead, or
    procurement owner who already funds farm-program reporting and needs better
    evidence before an audit or disclosure cycle. Approval will usually also
    require assurance, systems, and legal review, so the most credible first
    sale is a paid pilot tied to one reporting cycle or sourcing region that
    converts to an annual contract once the buyer trusts the evidence pack and
    data-delivery workflow.
product:
  mvp: >-
    MVP is an auditor-facing soil evidence pack for one customer and one sourcing
    portfolio that combines supplier field boundaries, satellite-derived soil
    indicators, calibration logic, uncertainty notes, and a flat-file or API
    export aligned to the customer's reporting workflow. It must work as a
    read-over-write overlay, support 500-1,500 farms in the first deployment,
    and include a defensible escalation path for where physical sampling or
    additional validation is still required.
  sixMonth: Close 3-5 paid pilots, ship repeatable boundary ingestion plus evidence-pack generation, and support simple exports or APIs into audit data rooms and sustainability reporting tools.
  twelveMonth: Add multi-region customer rollouts, supplier-risk alerting, reusable assurance logs, and partner-led deployments through one auditor channel and one agrifood platform channel.
  twentyFourMonth: Expand from reporting control layer into procurement-risk workflows, cross-buyer soil benchmarking, and embedded data products for platforms that want continuous land-data infrastructure.
  keyBets:
    - First-wave buyers will fund a narrow evidence layer before they fund a broader platform replacement.
    - Auditor-trusted outputs plus fast deployment will beat broader but heavier incumbent workflows in the first sale.
    - Boundary access and calibration effort can be standardized enough that deployment remains software-like rather than turning into a custom services business.
gtm:
  wedge: Sell a paid pilot for one reporting cycle or sourcing region that produces an audit-ready soil evidence pack for 500-1,500 farms, then convert to an annual monitoring contract as the customer adds more supplier fields and starts using the data for procurement-risk review.
  channels:
    - Founder-led enterprise sales into food brands already running regenerative or sustainable-sourcing programs
    - Referral and implementation partnerships with auditors, CSRD advisers, and standards-aligned consultants
    - Embedded or co-sell motions with agrifood platforms such as eAgronom- or Klim-like operators that already manage grower data and programs
  funnelTargets: lead→qualified pilot 15-25%, qualified pilot→paid pilot 40-50%, paid pilot→annual production 50%+, production→second-region or second-workflow expansion 30%+ within 12 months
  pricing: Annual subscription priced per supplier farm monitored with a 500-farm minimum, plus onboarding or boundary-mapping fees and a paid pilot credit toward annual deployment; this matches buyer ROI because the current alternative is partial physical sampling and manual reporting rather than seat-based software.
businessModel:
  revenueStreams:
    - Annual monitoring subscriptions tied to supplier farms or sourcing regions under coverage
    - One-time onboarding, boundary-mapping, and evidence-pack setup fees
    - Premium modules for supplier-risk alerting, APIs, and partner-embedded reporting workflows
  unitOfValue: Supplier farm under quarterly soil monitoring and audit-ready evidence coverage
  targetGrossMarginPct: 70
  expansionLevers:
    - Add more sourcing regions and supplier farms within the same enterprise account
    - Expand from reporting evidence into procurement-risk alerts and supplier benchmarking
    - Sell the evidence layer through agrifood platforms and consultants that already own grower workflows
strategyMap:
  northStarMetric: Percent of covered supplier farms delivered with auditor-accepted soil evidence before the customer's reporting deadline
  inputMetrics:
    - Time from signed pilot to first evidence pack delivery
    - Percent of requested supplier fields mapped inside 60 days
    - Pilot to annual production conversion rate
    - Percent of evidence-pack metrics accepted without rework by the customer or auditor
    - Net expansion in farms or sourcing regions per production customer
  moatsToBuild:
    - Europe-specific calibration and validation dataset built from customer deployments plus public baselines
    - Repeatable assurance logs, uncertainty handling, and evidence-pack templates trusted by auditors
    - Cross-customer benchmark data linking soil signals to sourcing-risk patterns over time
  killCriteria:
    - Fewer than 3 paid pilots signed within 12 months
    - Less than 70% of requested supplier fields mapped inside 60 days in the first 5 deployments
    - Pilot to annual conversion below 30% after the first 6 pilots
    - Auditors or customers require extensive rework on more than 25% of core evidence-pack outputs after two product iterations
  mermaid: |
    flowchart LR
      Wedge[Audit-ready soil reporting wedge] --> MVP[Evidence-pack MVP]
      MVP --> Proof[Trusted reporting and deployment proof]
      Proof --> Expansion[Procurement-risk and platform expansion]
investorMemo:
  verdict:
    call: Watch
    conviction: Real buyer pain and credible technical substrate, but conviction is capped by uncertain auditor requirements, serious incumbents, and a modest initial beachhead.
    whyBelieve: Large food buyers, standards bodies, and existing category vendors already prove budget, urgency, and technical feasibility for digital soil evidence workflows.
    whyDoubt: The company may be too narrow if field-level soil metrics are not required early, or too easy to bundle if incumbents can add similar reporting outputs faster than this startup can build trust.
    nextDiligence: Verify with auditors and two design-partner buyers that a paid pilot can reach accepted evidence quality and boundary coverage fast enough to convert into a six-figure annual contract.
  firstCustomer:
    title: Tier-1 European food sustainability reporting lead
    profile: A >€1B dairy, grain, or ingredient buyer with 2,000+ supplier farms, an existing regenerative or sustainable-sourcing program, and manual soil evidence stitched together from FSA workflows, consultants, and spreadsheets.
    trigger: An upcoming reporting or assurance cycle exposes that current supplier-soil evidence is incomplete, unauditable, or too sparse to defend material land and soil claims.
    buyer: VP Sustainability or Chief Procurement Officer
    initialContract: €40k-€75k paid pilot covering one sourcing region or 500-1,500 farms, converting to roughly €100k-€225k annual deployment as additional farms, regions, and risk workflows go live.
  mustBeTrue:
    - Auditors and first-wave buyers confirm that field-level or field-linked soil evidence is required often enough to support a paid reporting workflow.
    - Target customers can provide usable supplier field boundaries for most in-scope farms inside 60 days without a multi-quarter farmer-acquisition project.
    - The company can deliver evidence packs that buyers and auditors accept with limited rework in a 4-8 week pilot window.
    - A lightweight overlay wins budget despite existing Regrow, eAgronom, Klim, consultant, and FSA-based workflows.
    - The product expands beyond compliance into procurement-risk and platform revenue so the business outgrows the initial reporting wedge.
  diligenceQuestions:
    - What exact evidence requests are auditors making today for soil, land, and supplier-farm disclosures at large food companies?
    - Which target accounts already have mapped supplier fields and active regenerative programs versus needing a data-acquisition project first?
    - How much budget is currently spent on soil sampling, reporting consultants, and program reporting in comparable accounts?
    - In competitive evaluations, why would a buyer add this layer instead of extending Regrow, eAgronom, Klim, or an adviser-led workflow?
    - What uncertainty thresholds are acceptable before buyers demand more physical sampling and erode software margins?
operatingAssumptions:
  - assumption: The first repeatable customer is a very large European food company with an existing regenerative or sustainable-sourcing program, not a smaller brand starting from zero.
    basis: research.yaml
    validationTest: Close at least 5 discovery processes and 2 paid pilots where the customer already has a funded sourcing program and named internal owner.
    decisionImpact: If false, sales cycles lengthen and the company must either move upmarket to platform partners or build a higher-touch services motion.
  - assumption: Auditor, adviser, and standards-aligned channels will shorten time to trust more than pure cold outbound.
    basis: research.yaml
    validationTest: Compare conversion speed and pilot quality across one auditor channel, one platform channel, and direct outbound in the first 12 months.
    decisionImpact: If false, GTM spend shifts toward direct enterprise sales and the company delays channel-heavy hiring.
  - assumption: Per-farm annual pricing with a minimum contract is easier for buyers to justify than seat-based pricing.
    basis: idea.yaml
    validationTest: Test per-farm versus seat-based proposals in at least 3 pilot negotiations and compare acceptance rates plus annualized contract value.
    decisionImpact: If false, TAM logic and expansion math change and the company may need a lower-ACV software-plus-services pricing model.
  - assumption: Boundary ingestion, calibration, and assurance packaging can be standardized enough to keep target gross margin above 70% at scale.
    basis: operator judgment
    validationTest: Track delivery effort, third-party costs, and rework rate across the first 5 pilots and require gross-margin-equivalent unit economics to improve with each deployment.
    decisionImpact: If false, the business behaves more like a scientific services firm and likely needs different hiring, pricing, and fundraising plans.
  - assumption: A reporting wedge can expand into supplier-risk and benchmarking workflows even if CSRD urgency softens.
    basis: idea.yaml
    validationTest: In pilot reviews, require at least half of customers to request resilience, sourcing-risk, or benchmarking use cases beyond the first evidence pack.
    decisionImpact: If false, the company remains constrained by a narrow compliance budget and becomes less venture-attractive.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Interview 20 sustainability, procurement, and regenerative-sourcing leaders at very large European food companies.
    hypothesis: The highest-urgency first use case is an evidence gap in an upcoming reporting or assurance cycle, not a generic interest in soil analytics.
    successMetric: At least 10 target buyers describe a live reporting or assurance pain point and 5 agree to workflow-mapping sessions.
    owner: Founder CEO
  - horizon: 0–90 days
    experiment: Interview 8 auditors or CSRD advisers serving agriculture-exposed enterprise accounts.
    hypothesis: Trusted intermediaries will confirm the minimum evidence standard and can become a distribution wedge.
    successMetric: At least 3 advisers agree to introduce qualified pilot prospects or co-design an evidence-pack template.
    owner: Founder CEO
  - horizon: 0–90 days
    experiment: Run two boundary-data readiness exercises with target accounts or platform partners.
    hypothesis: The first customers can provide usable supplier field boundaries for most in-scope farms within 60 days.
    successMetric: Two prospects deliver at least 70% of requested field data inside the test window.
    owner: Founding eng
  - horizon: 90–180 days
    experiment: Deliver 3 paid pilots for one sourcing region each with evidence packs and flat-file exports.
    hypothesis: A narrow reporting-control workflow can be deployed in 4-8 weeks and convert into annual contracts faster than a broad platform sale.
    successMetric: 3 paid pilots launched, 2 completed inside 8 weeks, and at least 1 converted to annual production.
    owner: Founder CEO
  - horizon: 90–180 days
    experiment: Test pilot-plus-annual pricing versus annual-only proposals.
    hypothesis: Paid pilots de-risk the science and audit workflow enough to improve close rates without collapsing long-term ACV.
    successMetric: At least 2 of the first 3 paying customers accept a pilot path that converts into annual pricing above €100k.
    owner: Founder CEO
  - horizon: 180–365 days
    experiment: Add supplier-risk alerts and benchmark views for converted customers.
    hypothesis: Procurement and sourcing teams will use the same soil dataset for resilience decisions, creating expansion revenue beyond compliance.
    successMetric: At least 50% of production customers adopt a non-reporting workflow within 6 months of go-live.
    owner: Founding eng
operations:
  - Boundary-ingestion workflow with clear data-quality checks before model runs begin
  - Evidence-pack QA process covering uncertainty notes, audit traceability, and escalation to additional sampling where needed
  - Partner operating cadence with one auditor channel and one agrifood platform channel
  - Customer success playbook for reporting deadlines, sourcing-region rollout, and annual renewal conversion
  - Scientific validation log that tracks calibration inputs, rework requests, and deployment-level accuracy issues
team:
  - role: Founder CEO
    startTiming: Month 0
    rationale: The category still needs founder-led selling across auditors, enterprise buyers, and platform partners.
  - role: Founding eng
    startTiming: Month 0
    rationale: The first risk is not feature breadth but reliable boundary ingestion, data delivery, and audit traceability.
  - role: Soil or remote-sensing ML lead
    startTiming: Month 0
    rationale: Measurement credibility, calibration design, and uncertainty handling are core product risks from day one.
  - role: Solutions engineer
    startTiming: Month 6
    rationale: Early deployments will require partner coordination, customer onboarding, and integration support to stay inside an 8-week pilot window.
  - role: Commercial channel lead
    startTiming: Month 12
    rationale: Add channel and account scale only after pilot packaging, evidence standards, and annual conversion are repeatable.
milestones:
  - horizon: 0–12 months
    items:
      - Sign 3-5 paid pilots in the European food-company beachhead
      - Deliver first production-quality evidence pack inside 8 weeks for at least 2 customers
      - Establish 1 auditor channel and 1 agrifood platform partnership
      - Convert at least 2 pilots into annual contracts above €100k
  - horizon: 12–24 months
    items:
      - Reach repeatable multi-region deployments across 8-12 production customers
      - Launch supplier-risk alerting and benchmark views as paid expansions
      - Standardize assurance logs and reduce rework on core outputs below 25%
  - horizon: 24–36 months
    items:
      - Build a cross-customer European soil benchmark dataset with recurring renewal value
      - Expand through partner channels into additional enterprise accounts without founder-only selling
      - Prove that procurement-risk and embedded platform revenue meaningfully exceed the original compliance-only wedge
risks:
  - risk: Compliance urgency weakens if omnibus changes or materiality decisions reduce the number of buyers that need deep soil evidence quickly.
    likelihood: Medium
    impact: High
    mitigation: Sell into very large agriculture-exposed accounts first and build a parallel ROI case around procurement resilience, not only reporting.
  - risk: Customers cannot provide mapped supplier field boundaries or consented data fast enough for deployment.
    likelihood: High
    impact: High
    mitigation: Start with accounts and platform partners that already run grower programs and treat boundary-readiness as a pilot qualification gate.
  - risk: Satellite-derived outputs are challenged by auditors or require too much additional sampling to remain software-like.
    likelihood: Medium
    impact: High
    mitigation: Design the product around uncertainty handling, evidence logs, and explicit escalation to targeted sampling instead of claiming satellite-only certainty.
  - risk: Broader incumbents or consultants bundle similar evidence outputs into existing contracts.
    likelihood: High
    impact: Medium
    mitigation: Compete on deployment speed, lighter workflow fit, and repeatable reporting-control templates that sit on top of incumbent systems.
  - risk: The company becomes a custom scientific-services business instead of a scalable software product.
    likelihood: Medium
    impact: High
    mitigation: Enforce standard onboarding scope, minimum farm counts, partner-led data access, and productized evidence-pack delivery from the first pilots.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2–4M
  runwayMonths: 18
  useOfFundsSummary: 18 months of runway should fund the audit-ready MVP, calibration and assurance workflows, the first 3-5 paid pilots, and the channel relationships needed to convert the reporting wedge into repeatable six-figure enterprise contracts.
