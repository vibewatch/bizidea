topRisks:
  - name: Limited initial market
    description: The first beachhead has only a small number of robotaxi operators with active California deployments.
    mitigation: Expand quickly into AV delivery, industrial autonomy, and multi-jurisdiction compliance once the California workflow is proven.
  - name: Incumbent internal builds
    description: Large AV operators may try to extend in-house safety tooling instead of buying a vendor.
    mitigation: Win on faster regulator-specific templates, auditability, and cross-functional workflow that internal tools do not prioritize.
  - name: Regulatory ambiguity
    description: The exact operational details of the new rules may evolve, which could shift product requirements early.
    mitigation: Start with a configurable workflow engine and keep close design partnerships with first customers and counsel.
