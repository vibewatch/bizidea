differentiator: >-
  Most AV software companies focus on perception, simulation, teleoperations, or
  fleet operations. This company would own the regulated edge case after the car
  makes a mistake: assembling the evidence, mapping it to rule language, and
  turning it into a defensible operator response. That creates sticky data
  gravity across logs, video, policy, and legal workflows that is hard for a
  point solution or services firm to replicate once embedded.
