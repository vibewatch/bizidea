problem: >-
  Robotaxi operators already run dense safety, teleoperations, and legal
  workflows, but most compliance evidence still lives across logs, video,
  HD-map events, and spreadsheet-based incident trackers. California's new AV
  rules turn that fragmentation into an immediate operational risk because a
  traffic violation can now trigger a formal Notice of Autonomous Vehicle
  Noncompliance against the operator. If a company cannot assemble a defensible
  response fast, it risks permit friction, slower market expansion, and higher
  regulatory scrutiny.
targetUser:
  primary: Permit and compliance managers at robotaxi operators running driverless fleets in California
  secondary: Safety operations and legal operations leads supporting AV incident response
  buyer: Head of Safety and Compliance at a robotaxi operator
startupThesis:
  nonObviousInsight: >-
    The biggest near-term software gap in AV is not better autonomy models; it
    is the system of record that converts vehicle behavior into regulator-ready
    evidence when liability shifts from a human driver to the operator.
  beachhead: >-
    California robotaxi compliance teams handling traffic-violation response,
    disclosure packets, and permit reporting for driverless fleets already on
    public roads
  wedge: >-
    A compliance control plane that ingests trip logs, video, and incident data
    and auto-generates Notice of Autonomous Vehicle Noncompliance response
    packets plus recurring DMV-ready reporting
  whyNowCatalyst: >-
    California's new AV testing and deployment rules, including operator-facing
    citation workflows, create an immediate budget line for tooling that did
    not exist when enforcement was more ambiguous.
  ventureScalePath: >-
    Start with California robotaxi compliance, then expand into multi-state AV
    permitting, insurer reporting, municipal disclosure, supplier audit trails,
    and eventually the system-of-record layer for autonomous fleet governance
    across passenger, delivery, and industrial vehicles.
solution: >-
  Build a compliance ops platform for autonomous fleet operators. The product
  ingests vehicle logs, teleoperator interventions, camera snippets, map events,
  and incident notes into a timeline tied to each trip and vehicle. It then
  maps those records to California rule requirements, flags missing evidence,
  and drafts regulator and law-enforcement response packets with immutable audit
  trails. Over time, the platform becomes the shared workspace for compliance,
  safety, legal, and operations teams, reducing days of manual evidence hunting
  to hours.
goToMarketSeed:
  firstCustomer: >-
    The compliance lead at a robotaxi operator with an active California
    deployment permit and a small but growing driverless fleet
  buyingTrigger: >-
    A new California filing obligation, traffic-violation notice, permit
    renewal, or launch into a second California service zone
  currentAlternative: Manual workflow across spreadsheets, internal tools, shared drives, and outside counsel
  switchingReason: >-
    The wedge replaces scramble-driven evidence collection with a faster,
    regulator-specific workflow that lowers permit risk and reduces expensive
    legal and ops time per incident.
  pricingHypothesis: Annual platform fee priced per active permitted metro plus usage-based fees for incident response packets
