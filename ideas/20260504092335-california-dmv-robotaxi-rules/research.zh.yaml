  growthRate: 这里以 Waymo 周付费订单从 2024 年 5 月的 50,000 单增长到 2026 年 3 月的 500,000 单为商业化代理指标，折算年化增长约 250%。
  growthRateSourceRefs:
  - 15
  tailwinds:
  - point: 加州不是在放松监管，而是在继续增加报送、应急响应和不合规流程要求。
    sourceRefs:
    - 2
    - 3
    - 7
    - 10
  - point: 商业化 robotaxi 运营正快速放量，持续申报和事故工作流的数量只会更多。
    sourceRefs:
    - 11
    - 12
    - 14
    - 15
    - 17
  - point: 新进入者和许可申请方持续增加，哪怕当前 logo 数量不多，未来买方池也在扩大。
    sourceRefs:
    - 28
    - 29
    - 30
  headwinds:
