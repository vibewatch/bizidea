    - 4
    - 8
  - point: 监管暴露是把双刃剑；一旦出现高曝光失败，市场可能被冻结、推迟，或被迫做纠偏措施。
    sourceRefs:
    - 31
  - point: AV 初创公司更强调资本纪律，使新增工作流软件必须跨过更高门槛。
    sourceRefs:
    - 18
competitors:
- name: Applied Intuition
  stage: scale-up
  wedge: 面向各类移动机器的广义自动驾驶开发、验证与车队软件平台。
  pricing: 定制企业定价
  strength: 深度嵌入 AV 软件与车队项目，平台广度很强。
  weaknessVsUs: 公开定位并未把面向运营商的 DMV/CPUC 事故响应或申报自动化作为产品切口。
  sourceRefs:
  - 20
  - 21
  - 37
- name: Foretellix
  stage: scale-up
  wedge: 以安全为导向的验证与确认，覆盖场景生成和安全案例支持。
  pricing: 定制企业定价
  strength: 在安全案例、标准和场景覆盖上，对 AV 与 ADAS 团队有很强公信力。
  weaknessVsUs: 更适合做验证和安全证据生成，而不是连接法务与合规团队、向下游监管机构交付材料的工作流。
  sourceRefs:
  - 22
  - 23
  - 38
- name: Samsara
  stage: incumbent
  wedge: 面向商用车队的车联网与合规操作系统。
  pricing: Public pricing workflow / quote-assisted
  strength: 买方认知高、遥测覆盖深，而且已经验证过合规自动化的销售打法。
  weaknessVsUs: 围绕传统车队运营和司机规则打造，并不覆盖无人驾驶 AV 证据、ODD 变化或多机构 AV 申报。
  sourceRefs:
  - 24
  - 25
- name: Vanta
  stage: scale-up
  wedge: 面向安全与隐私合规的横向证据采集与审计自动化。
  pricing: Custom / demo-led pricing
  strength: 在“自动收集证据、缩短审计准备时间”上有清晰 ROI 叙事。
  weaknessVsUs: 横向控制监测缺少 AV 专用数据模型，也没有事故与许可响应所需的监管工作流。
  sourceRefs:
  - 26
  - 27
regulatoryTechnicalConstraints:
- point: AB 1777 引入了专门的应急热线、远程操作员和不合规通知义务，提高了响应时效与可审计性的要求。
  sourceRefs:
  - 3
- point: CPUC 要求经核验、可拆分的季度报表，而且对更大规模 AV 运营商新增了事故级与停车事件级报送。
  sourceRefs:
  - 7
  - 10
- point: 运营商必须维护 first responder 与执法部门互动协议，因此任何处理事故的软件，都必须保留清晰的保管链与响应步骤。
  sourceRefs:
  - 13
  - 19
- point: 创业公司必须在尊重保密、脱敏和运营商安全边界的前提下，整合异构日志、视频和指标。
  sourceRefs:
  - 7
  - 12
  - 35
- point: 加州客运服务合规被拆分在 DMV 运营许可与 CPUC 商业授权之间，这本身就抬高了工作流复杂度。
  sourceRefs:
  - 6
  - 8
  - 9
  - 29
validationSignals:
- point: AB 1777 要求制造商自 2026 年 7 月 1 日起遵守新的应急响应与不合规条款。
  sourceRefs:
  - 3
- point: 加州 DMV 正在持续更新 AV 监管规则，包括更完整的数据报送和交通不合规处理流程。
  sourceRefs:
  - 2
- point: CPUC 已把停车事件与细分事故报送纳入 AV 报告要求。
  sourceRefs:
  - 7
  - 10
- point: DMV 已收到 978 份 AV 碰撞报告，说明公开事故报送量级已经足够大，值得做成系统化流程。
  sourceRefs:
  - 5
- point: Waymo 目前报告 rider-only miles 达 170.7M，且每周付费订单约 500,000 单，足以说明背后的合规负担不是纸上谈兵。
  sourceRefs:
  - 11
  - 12
  - 15
- point: Nuro、Lucid 与 Uber 计划推进 20,000 辆 robotaxi 项目，而 Nuro 也在 $203M Series E 扩展轮基础上再拿到 $97M，说明赛道投入仍在继续。
  sourceRefs:
  - 17
  - 18
- point: Tesla 与 WeRide 的许可动作表明，更多进入者仍在认真穿越加州 AV 审批栈，而不是完全绕开它。
  sourceRefs:
  - 28
  - 29
  - 30
openQuestions:
- 一旦 AB 1777 真正进入执行阶段，加州各机构会以多高频率发出自动驾驶车辆不合规通知？
- 头部 robotaxi 运营商会把这件事视为必须内部掌控的核心工具，还是会接受一家具备监管专长、上线够快的专业厂商？
- 做出一款 minimum lovable product，最低限度必须接哪些证据系统：行程日志、视频、远程接管、case management，还是全部都要？
- 这款产品能否在不削弱切口的前提下，从加州 robotaxi 扩到配送、卡车运输或工业自动驾驶？
