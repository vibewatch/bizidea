    supplierPower:
      score: 3
      rationale: 数据供给方主要是运营商自己的日志、视频和事故系统，因此不存在单一外部垄断者；但集成依赖与安全审查，仍会让内部平台团队握有中等程度的话语权。
      sourceRefs:
      - 6
      - 13
      - 19
      - 35
    buyerPower:
      score: 5
      rationale: 加州滩头市场真正严肃的买方很少，而且每家大运营商都完全可以选择内部自建，或干脆延后采购。
      sourceRefs:
      - 4
      - 8
      - 20
      - 22
    threatOfEntrants:
      score: 3
      rationale: 工作流软件本身不难写，但要让监管机构信任、建立 AV 领域本体并接深证据系统集成，门槛并不低。
