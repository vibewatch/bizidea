      sourceRefs:
      - 6
      - 7
      - 20
      - 24
      - 26
    competitiveRivalry:
      score: 3
      rationale: 直接对手今天还不多，但相邻的 AV 与合规厂商都在争夺预算，运营商自己也习惯把多个半成品方案拼起来用。
      sourceRefs:
      - 20
      - 22
      - 24
      - 26
      - 31
  pestle:
  - factor: 政治
    impact: positive
    point: 加州正通过立法和机构报送持续收紧 AV 责任边界，这会直接创造软件需求。
    sourceRefs:
    - 2
    - 3
    - 10
  - factor: 经济
    impact: negative
    point: AV 领域的资本仍偏审慎，估值回调也意味着运营商会更仔细地审视新增软件开支。
    sourceRefs:
    - 18
  - factor: 社会
    impact: positive
    point: Cruise 事件之后的公众审视，以及对 first responder 协调的重视，都提升了可审计性与透明度的价值。
    sourceRefs:
    - 13
    - 19
    - 31
  - factor: 技术
    impact: positive
    point: 商业化 AV 车队已经产生了足够多的真实运营数据，使一套专门的合规系统记录真正有用。
    sourceRefs:
    - 11
    - 12
    - 15
    - 16
    - 35
  - factor: 法律
    impact: positive
    point: 多机构报送、应急热线要求以及潜在的不合规通知，都在持续扩大合规表面积。
    sourceRefs:
    - 3
    - 6
    - 7
    - 10
  adoptionFrictionMatrix:
  - friction: 目标 logo 太少
    severity: high
    affectedBuyer: 创始人与营收负责人
    mitigation: 虽然从加州起步，但要尽快把相邻 AV 细分市场的扩展模块产品化。
    sourceRefs:
    - 4
    - 8
    - 14
    - 17
  - friction: 安全与数据访问审查
    severity: high
    affectedBuyer: 依赖平台团队配合的安全/合规买方
    mitigation: 从只读接入、严格审计日志和极窄的首批集成切入。
    sourceRefs:
    - 12
    - 13
    - 35
  - friction: 内部工具偏好
    severity: high
    affectedBuyer: 大型在位运营商
    mitigation: 用贴监管要求的模板、更快部署和跨机构工作流覆盖来取胜。
    sourceRefs:
    - 6
    - 7
    - 20
    - 22
  - friction: 执法量级不确定
    severity: medium
    affectedBuyer: 需要 ROI 证明的合规负责人
    mitigation: 把 ROI 锚定在周期性季度报送和许可就绪，而不只是通知量。
    sourceRefs:
    - 1
    - 7
    - 10
