  validationPlan:
  - priority: high
    question: How many operator-hours and outside-counsel hours does a real California incident or quarterly filing consume today?
    evidenceToGather: Interview 5-8 safety/compliance leads and compare current packet-assembly steps, team count, and elapsed time.
  - priority: high
    question: Will top operators buy a control plane or insist on extending internal tooling?
    evidenceToGather: Customer discovery with Waymo/Zoox/Nuro/Tesla-adjacent teams, plus architecture review of existing internal incident systems.
  - priority: medium
    question: Which integrations are truly mandatory for version-one defensible filings?
    evidenceToGather: Map required evidence fields against vehicle logs, camera systems, teleoperations tools, and case-management systems across 3 operators.
  - priority: medium
    question: Can the same workflow sell into AV delivery, trucking, or industrial autonomy without heavy product rewrite?
    evidenceToGather: Compare California passenger-service obligations with trucking, delivery, and industrial safety-case/reporting workflows.
