openQuestions:
- How frequently will California agencies issue notices of autonomous vehicle noncompliance once AB 1777 becomes operative in practice?
- Will leading robotaxi operators treat this as core internal tooling or accept a specialist vendor if deployment is fast and regulator-specific?
- 'Which evidence systems are mandatory for a minimum lovable product: trip logs, video, teleoperations, case management, or all of the above?'
- Can the product expand beyond California robotaxis into delivery, trucking, or industrial autonomy without diluting the wedge?
