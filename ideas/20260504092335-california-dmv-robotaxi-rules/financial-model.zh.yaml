  - id: A16
    name: 招聘节奏
    value: "从创始人、创始工程师和合规产品负责人起步；M4 增加安全工程师，M9 增加首位 AE，第 2 年新增 4 人，第 3 年新增 3 人"
    unit: text
    source: "[BP team startTiming for first 5 hires; later hires are lean-ramp heuristic to support 4-6 customers]"
  - id: A17
    name: 稳态 CAC
    value: "180"
    unit: USDK per new production customer
    source: "[Startup-finance heuristic: high-touch enterprise infrastructure/compliance sale with founder involvement and security review]"
  - id: A18
    name: 月流失率
    value: "1.5"
    unit: percent
    source: "[Startup-finance heuristic: conservative enterprise churn for concentrated, high-risk early market]"
  - id: A19
    name: 现金转换简化假设
    value: "模型把现金变动近似为 EBITDA，因为这里假设是轻资产软件业务、无债务、无 capex，且实施回款与营运资金时差大致互相抵消"
    unit: text
    source: "[Startup-finance heuristic]"
