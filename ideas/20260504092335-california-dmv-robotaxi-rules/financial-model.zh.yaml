  unit: text
  source: '[Startup-finance heuristic: pre-seed enterprise software with legal, security, and cloud needs]'
- id: A16
  name: 招聘节奏
  value: 起步配置为创始人、创始工程师和合规产品负责人；在 M4 增加安全工程师，在 M9 增加首位 AE，Y2 前累计新增 4 人，Y3 前再新增 3 人
  unit: text
