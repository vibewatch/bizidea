scenarios:
  downside:
    description: "安全审查和转化整体延后大约两个季度，成熟账户也始终停留在单一工作流定价。"
    y3RevenueK: 1120.0
    y3EbitdaK: -982.0
    cashLowPointK: 476.0
    keyAssumptionChanges:
      - "第 4 个客户从 M22 推迟到 M27，第 5 个客户从 M29 推迟到 M34。"
      - "扩展账户价格维持在每月 $25K，而不是 $30K。"
      - "随着支持和脱敏工作继续依赖人工，毛利率降到 65%。"
  base:
    description: "第 1 年赢下 2 个付费 pilot，第 2 年底有 4 个生产 logo 在运行，第 3 年活跃的付费项目达到 6 个。"
    y3RevenueK: 1545.0
    y3EbitdaK: -628.5
    cashLowPointK: 829.6
    keyAssumptionChanges:
      - "Pilot 在 M6 和 M9 启动，之后新客户分别在 M16、M22、M29 和 M33 启动。"
      - "生产环境定价为每月 $25K，成熟账户扩展到每月 $30K。"
      - "毛利率维持在 70% 目标，且招聘保持精简。"
  upside:
    description: "安全审查被压缩，CPUC 报送模块更早扩展出去，相邻需求也更快带来一批新增客户。"
    y3RevenueK: 1800.0
    y3EbitdaK: -430.0
    cashLowPointK: 1040.0
    keyAssumptionChanges:
      - "第 3 到第 5 个客户都比 base 提前约一个季度成单。"
      - "更多账户在年中前就进入每月 $30K 的扩展状态。"
      - "随着连接器和模板标准化，毛利率提升到 72%。"
sensitivity:
  - variable: ARPU
    downsideCase: "生产环境定价接近 $250K ARR，第二条工作流也无法顺利扩展。"
    baseCase: "$300K 的稳态 ARR，成熟账户可有限扩展到 $360K。"
    upsideCase: "一旦 CPUC 和许可就绪工作流跑顺，$330K-$360K ARR 会成为常态。"
    y3RevenueImpactK: -230.0
    cashImpactK: -161.0
  - variable: CAC
    downsideCase: "$240K CAC，因为创始人投入和安全审查仍然很重。"
    baseCase: "在创始人主导、精准筛选的企业销售模式下，CAC 为 $180K。"
    upsideCase: "通过律师和合作伙伴转介绍改善转化后，CAC 可降到 $140K。"
    y3RevenueImpactK: -60.0
    cashImpactK: -180.0
  - variable: churn
    downsideCase: "月流失率 3.0%，因为 pilot 之后内部自建倾向开始占上风。"
    baseCase: "月流失率 1.5%，说明工作流有黏性，但仍处于早期。"
    upsideCase: "一旦平台成为多类申报的系统记录，月流失率可降到 0.8%。"
    y3RevenueImpactK: -140.0
    cashImpactK: -98.0
  - variable: sales cycle
    downsideCase: "平均成单和转化时间整体后移约两个季度。"
    baseCase: "Pilot 在 3-6 个月内成单，生产环境在 4-5 个月内完成转化。"
    upsideCase: "安全审查被压缩后，整体周期大致可缩短一个季度。"
    y3RevenueImpactK: -425.0
    cashImpactK: -298.0
  - variable: gross margin
    downsideCase: "如果脱敏、发布和支持仍然高度依赖人工，毛利率会降到 65%。"
    baseCase: "毛利率 70%，与 business plan 目标一致。"
    upsideCase: "一旦连接器和模板变得可复制，毛利率有望达到 72%-75%。"
    y3RevenueImpactK: 0.0
    cashImpactK: -77.3
  - variable: hiring pace
    downsideCase: "在还没证明 4 个生产 logo 前，就提前拉前了 2 个招聘。"
    baseCase: "按精简节奏扩张：Q4Y2 到 9 名 FTE，Q4Y3 到 12 名 FTE。"
    upsideCase: "等扩张验证更清楚后，再推迟 1 个 GTM 和 1 个工程岗位。"
    y3RevenueImpactK: 0.0
    cashImpactK: -180.0
modelDiagram:
  title: 单位经济模型流转
  mermaid: |
    flowchart LR
      Accounts[Target California AV accounts] --> Pilots[Paid pilots]
      Pilots --> Production[Production subscriptions]
      Production --> Expansion[Second workflow and usage expansion]
      Expansion --> Revenue[Recurring revenue]
      Revenue --> GrossProfit[70% gross profit]
      GrossProfit --> Cash[Cash to milestone]
modelSanity:
  - checkName: 收入引擎
    finding: "Base 情况下的收入来自 6 个高 ACV 项目：它们从付费 pilot 转成每年 $300K 以上的生产合同，而不是依赖大规模铺 logo。"
  - checkName: 必须成立的前提
    finding: "只读集成与安全审查必须尽量接近模型假设的 90 天区间，pilot 才能在 4-5 个月内转成生产环境。"
  - checkName: 模型会失效的情况
    finding: "如果成熟 ARPU 一直停留在单工作流定价，且第 4、第 5 个客户都延后两个季度，那么 downside 下第 3 年收入会跌向 $1.1M，现金缓冲也会被明显压缩。"
  - checkName: 下一轮融资要证明什么
    finding: "最干净的 seed 故事是：拿到 4 个生产 logo、真实跑起 CPUC 报送，并证明 1 条能复用加州数据模型的相邻付费工作流。"
sanityChecks:
  ruleOf40: "第 3 年增长 89.6% + EBITDA 利润率 -40.7% = 48.9%"
  burnMultiple: "第 2 年 burn multiple 为 1.1x，第 3 年为 0.9x；两年净新增 ARR 都约为 $720K。"
  revenuePerFte: "按年末 12 名 FTE 计算，第 3 年人均收入为 $129K，低于典型 SaaS 的 $200K-$400K 基准。"
  flags:
    - "Base 情况下到第 3 年也只有 6 个活跃付费项目，因此丢掉任意 1 个大客户都会明显改变结果。"
    - "由于集成、安全审查和合规支持仍带有部分服务属性，人均收入持续低于 benchmark。"
    - "模型假设前 2 个早期 pilot 能按时转化；如果安全审查超过 90 天，融资需求大概率要前移。"
