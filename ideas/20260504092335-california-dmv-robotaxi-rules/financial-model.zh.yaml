scenarios:
  downside:
    description: 安全审查与转化进度大致延后两个季度，且成熟客户始终停留在单一工作流定价。
    y3RevenueK: 1120.0
    y3EbitdaK: -982.0
    cashLowPointK: 476.0
    keyAssumptionChanges:
    - 第 4 个客户的启动时间从 M22 推迟到 M27，第 5 个客户从 M29 推迟到 M34。
    - 扩展客户价格维持在每月 $25K，而不是 $30K。
    - 由于支持和脱敏工作仍以人工为主，毛利率降至 65%。
  base:
    description: 第 1 年拿下两个付费试点，到第 2 年末有 4 个正式生产客户处于活跃状态，到第 3 年有 6 个付费项目处于活跃状态。
    y3RevenueK: 1545.0
    y3EbitdaK: -628.5
    cashLowPointK: 829.6
    keyAssumptionChanges:
    - 试点分别在 M6 和 M9 启动，之后新客户在 M16、M22、M29 和 M33 启动。
    - 正式生产定价为每月 $25K，成熟客户扩展后升至每月 $30K。
    - 毛利率维持在 70% 目标，招聘保持精简。
  upside:
    description: 安全审查周期缩短，CPUC 报告模块更早扩展，相邻需求也带来一批更快的扩张客户。
    y3RevenueK: 1800.0
    y3EbitdaK: -430.0
    cashLowPointK: 1040.0
    keyAssumptionChanges:
    - 第 3 至第 5 个客户的成交时间都比基准情形提前约一个季度。
    - 更多客户在年中前进入每月 $30K 的扩展状态。
    - 随着连接器和模板标准化，毛利率提升到 72%。
sensitivity:
- variable: ARPU
  downsideCase: 正式生产定价落在接近 $250K ARR，且第二个工作流的扩展未能站稳。
  baseCase: 稳态 ARR 为 $300K，成熟客户仅有有限的“先切入后扩张”，升至 $360K。
  upsideCase: 一旦 CPUC 和许可就绪工作流上线，$330K-$360K ARR 将成为标准水平。
  y3RevenueImpactK: -230.0
  cashImpactK: -161.0
- variable: CAC
  downsideCase: 由于创始人投入时间和安全审查负担仍然很重，CAC 上升到 $240K。
  baseCase: 在创始人主导、精准聚焦的企业销售模式下，CAC 为 $180K。
  upsideCase: 在律师和合作伙伴转介绍提升转化的情况下，CAC 降至 $140K。
  y3RevenueImpactK: -60.0
  cashImpactK: -180.0
- variable: churn
  downsideCase: 由于试点后内部工具偏好占上风，月流失率升至 3.0%。
  baseCase: 对于一个具有黏性但仍处于早期的合规工作流，月流失率为 1.5%。
  upsideCase: 当平台成为多个申报场景的核心记录系统后，月流失率降至 0.8%。
  y3RevenueImpactK: -140.0
  cashImpactK: -98.0
- variable: 销售周期
  downsideCase: 平均成交与转化时间大约延后两个季度。
  baseCase: 试点在 3-6 个月内成交，正式生产转化在 4-5 个月内完成。
  upsideCase: 安全审查足够压缩，从而将销售周期缩短约一个季度。
  y3RevenueImpactK: -425.0
  cashImpactK: -298.0
- variable: 毛利率
  downsideCase: 如果脱敏、上线和支持仍高度依赖人力，毛利率将为 65%。
  baseCase: 毛利率为 70%，与商业计划目标一致。
  upsideCase: 一旦连接器和模板实现可复制，毛利率可达到 72%-75%。
  y3RevenueImpactK: 0.0
  cashImpactK: -77.3
- variable: 招聘节奏
  downsideCase: 在 4 个正式生产客户尚未验证前，就提前招聘 2 人。
  baseCase: 按精简节奏扩张，到 Q4Y2 达到 9 FTE，到 Q4Y3 达到 12 FTE。
  upsideCase: 将 1 个 GTM 岗位和 1 个工程岗位的招聘推迟到扩张验证更明确之后。
  y3RevenueImpactK: 0.0
  cashImpactK: -180.0
modelDiagram:
  title: 单位经济性流转图
  mermaid: "flowchart LR\n  Accounts[目标加州自动驾驶账户] --> Pilots[付费试点]\n  Pilots --> Production[正式生产订阅]\n  Production --> Expansion[第二工作流与使用扩展]\n  Expansion --> Revenue[经常性收入]\n  Revenue --> GrossProfit[70% 毛利润]\n  GrossProfit --> Cash[达成里程碑所需现金]\n"
modelSanity:
- checkName: 收入引擎
  finding: 基准情形下的收入来自 6 个高 ACV 项目，它们从付费试点转化为年合同金额超过 $300K 的正式生产合同，而不是依靠大量客户数。
- checkName: 必须成立的条件
  finding: 只读集成和安全审查必须接近模型设定的 90 天范围，试点才能在 4-5 个月内转化。
- checkName: 模型失效条件
  finding: 如果成熟客户 ARPU 仍停留在单一工作流定价，且第 4、5 个客户都延后两个季度，那么下行情形下的 Y3 收入会降至接近 $1.1M，现金缓冲也会显著收缩。
- checkName: 下一轮融资证明点
  finding: 最清晰的 seed 融资故事是：4 个正式生产客户、CPUC 报告的真实使用，以及 1 个复用加州数据模型的付费相邻工作流。
sanityChecks:
  ruleOf40: Y3 growth 89.6% + EBITDA margin -40.7% = 48.9%
  burnMultiple: 在每年约 $720K 的净新增 ARR 水平下，Y2 的 burn multiple 为 1.1x，Y3 为 0.9x。
  revenuePerFte: Y3 的人均收入为 $129K，基于年末 12 名 FTE 计算（低于典型 SaaS 的 $200K-$400K 基准）。
  flags:
  - 基准情形到 Y3 仅达到 6 个活跃付费项目，因此失去一个大客户就会显著改变结果。
  - 由于集成、安全审查和合规支持仍部分呈现服务化特征，人均收入仍低于基准。
  - 模型假设两个早期试点都能按期转化；如果安全审查超过 90 天，融资需求大概率需要上调。
