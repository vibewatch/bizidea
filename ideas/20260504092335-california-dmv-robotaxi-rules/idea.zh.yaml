problem: >-
  Robotaxi 运营商本来就要同时跑安全、远程接管和法务流程，但大多数合规证据仍散落在日志、视频、
  HD-map 事件和基于表格的事故追踪器里。加州新的 AV 规则把这种碎片化直接变成了运营风险，因为一次交通违规现在就可能触发针对运营商的正式《自动驾驶车辆不合规通知》。如果公司无法迅速拼出一份经得起质询的回应，就会面临许可受阻、市场扩张变慢，以及更高的监管审查压力。
targetUser:
  primary: 在加州运营无人车队的 robotaxi 运营商中的许可与合规经理
  secondary: 支持 AV 事故响应的安全运营和法务运营负责人
  buyer: Robotaxi 运营商的安全与合规负责人
startupThesis:
  nonObviousInsight: >-
    AV 领域眼下最大的缺口，不是把自动驾驶模型做得更强，而是在责任从人类司机转向运营商之后，谁来把车辆行为整理成监管机构可直接采信的证据底座。
  beachhead: >-
    已在公共道路运行无人车队、正在处理加州 robotaxi 交通违规响应、披露材料和许可报送的合规团队
  wedge: >-
    一个合规控制平面，接入行程日志、视频和事故数据，自动生成《自动驾驶车辆不合规通知》响应材料，以及周期性的 DMV 就绪报表
  whyNowCatalyst: >-
    加州新的 AV 测试与部署规则——包括面向运营商的处罚流程——第一次让这类工具成为必须单独立项的预算项。
  ventureScalePath: >-
    先从加州 robotaxi 合规切入，再扩展到多州 AV 许可、保险报送、市政披露、供应商审计链路，最终成为乘用、配送和工业车辆自动驾驶治理的系统记录层。
solution: >-
  为自动驾驶车队运营商打造一套合规运营平台。产品把车辆日志、远程接管记录、摄像头片段、地图事件和事故备注接入到与每次行程、每辆车绑定的时间线里；再把这些记录映射到加州规则要求，标出缺失证据，并起草发给监管机构和执法部门的响应材料，同时保留不可篡改的审计轨迹。随着使用加深，这个平台会变成合规、安全、法务和运营团队共享的工作台，把原本要花几天的人肉找证据压缩到几小时。
goToMarketSeed:
  firstCustomer: >-
    已持有加州部署许可、且无人车队规模虽小但在持续增长的 robotaxi 运营商中的合规负责人
  buyingTrigger: >-
    新的加州申报义务、交通违规通知、许可续期，或进入第二个加州服务区域
  currentAlternative: Manual workflow across spreadsheets, internal tools, shared drives, and outside counsel
  switchingReason: >-
    这个切口把原本临时抱佛脚式的证据搜集，换成更快、更贴合监管口径的流程，既降低许可风险，也减少每次事故所消耗的法务和运营工时。
  pricingHypothesis: 按已获许可的活跃 metro 收取年度平台费，并按事故响应材料数量收取用量费用
