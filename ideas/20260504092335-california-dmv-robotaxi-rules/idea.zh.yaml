problem: 机器人出租车运营商本就要处理复杂的安全、远程运营和法务流程，但大多数合规证据仍分散在日志、视频、高清地图事件以及基于表格的事故追踪器中。加州新的自动驾驶规则把这种碎片化直接变成了现实的运营风险，因为一次交通违规如今就可能触发针对运营方的正式“自动驾驶车辆不合规通知”。如果企业无法迅速整理出可辩护的响应材料，就会面临许可受阻、市场扩张放缓和更高的监管审查。
targetUser:
  primary: 在加州运营无人驾驶车队的机器人出租车公司中的许可与合规经理
  secondary: 负责支持自动驾驶事件响应的安全运营与法务运营负责人
  buyer: 机器人出租车运营商的安全与合规负责人
startupThesis:
  nonObviousInsight: 自动驾驶领域近期最大的软件缺口并不在于更好的自动驾驶模型，而在于当责任从人类驾驶员转移到运营方时，能够把车辆行为转化为监管就绪证据的核心记录系统。
  beachhead: 为已在公共道路运行的无人驾驶车队处理交通违规响应、披露材料和许可报告的加州机器人出租车合规团队
  wedge: 一个摄取行程日志、视频与事件数据，并自动生成“自动驾驶车辆不合规通知”响应材料及周期性 DMV 就绪报告的合规控制平面
  whyNowCatalyst: 加州新的自动驾驶测试与部署规则（包括直接面向运营方的处罚工作流）为相关工具带来了立刻可见的预算项，而在执法边界更模糊时这类预算并不存在。
  ventureScalePath: 先从加州机器人出租车合规切入，再扩展到多州自动驾驶许可、保险公司报告、市政披露、供应商审计轨迹，最终成为覆盖载客、配送和工业车辆自动驾驶车队治理的核心记录层。
solution: 为自动驾驶车队运营商打造一套合规运营平台。产品将车辆日志、远程操作介入、摄像片段、地图事件和事故记录汇集成与每次行程及车辆绑定的时间线。随后，它把这些记录映射到加州规则要求上，标记缺失证据，并生成带有不可篡改审计轨迹的监管与执法响应材料。随着时间推移，该平台会成为合规、安全、法务和运营团队共享的工作空间，把原本需要数天的人工证据搜集缩短到数小时。
goToMarketSeed:
  firstCustomer: 一家持有加州有效部署许可、拥有小规模但持续增长无人驾驶车队的机器人出租车公司的合规负责人
  buyingTrigger: 新的加州报送义务、交通违规通知、许可续期，或进入第二个加州服务区域
  currentAlternative: 依赖电子表格、内部工具、共享硬盘和外部律师的手工工作流
  switchingReason: 这一切入口用更快、面向监管机构的专用工作流，取代临时抱佛脚式的证据收集，从而降低许可风险，并减少每起事件中高成本的法务与运营时间投入。
  pricingHypothesis: 按活跃获批都市区收取年度平台费，并对事件响应材料按使用量收费
whyNow:
- point: 加州刚刚把自动驾驶合规从政策监测任务转变为直接面向运营方的执法工作流。
