topRisks:
- name: 初始市场有限
  description: 首个切入市场中，拥有加州活跃部署的机器人出租车运营商数量很少。
  mitigation: 一旦加州工作流得到验证，就迅速扩展到自动驾驶配送、工业自动化和多辖区合规。
- name: 既有玩家内部自建
  description: 大型自动驾驶运营商可能会尝试扩展内部安全工具，而不是购买外部供应商产品。
  mitigation: 通过更快交付监管专用模板、更强可审计性以及内部工具不优先支持的跨职能工作流来取胜。
- name: 监管不确定性
  description: 新规则的具体执行细节可能继续演变，从而在早期改变产品需求。
  mitigation: 从可配置的工作流引擎起步，并与首批客户及律师保持紧密的共创合作关系。
