  signalRefs:
  - Compliance has become startup tooling surface area
  sourceRefs:
  - 1
- point: 加州仍是决定自动驾驶落地成败的关键市场，因此任何新增的报告和披露负担，都会立刻拖慢那些缺乏专用系统的运营商的扩张速度。
  signalRefs:
  - California can block AV expansion at the permit layer
  sourceRefs:
