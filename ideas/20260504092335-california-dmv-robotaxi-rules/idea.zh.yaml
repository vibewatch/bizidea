topRisks:
  - name: 初始市场有限
    description: 当前加州真正已部署的 robotaxi 运营商数量很少，首个滩头市场规模偏小。
    mitigation: 一旦加州流程被验证，就尽快扩展到 AV 配送、工业自动化以及多司法辖区合规。
  - name: 现有厂商选择内部自建
    description: 大型 AV 运营商可能会延伸内部安全工具，而不是采购外部厂商。
    mitigation: 以更快落地、更贴监管要求的模板、可审计性，以及内部工具通常不会优先做的跨团队流程取胜。
  - name: 监管口径仍有不确定性
    description: 新规则的具体执行细节还可能继续变化，早期产品需求也会随之调整。
    mitigation: 从可配置工作流引擎起步，并与首批客户和法律顾问保持紧密共创。
