differentiator: 大多数自动驾驶软件公司聚焦于感知、仿真、远程运营或车队运营。而这家公司要占据的是车辆犯错之后的受监管边缘场景：汇总证据、映射到规则语言，并将其转化为可辩护的运营方响应。这会在日志、视频、政策与法务工作流之间形成强黏性的“数据引力”，一旦嵌入，点状工具或服务公司都很难复制。
