jobsToBeDone:
  - job: >-
      当加州 AV 违规或许可申报出现时，帮助 robotaxi 合规负责人快速整理并提交一份经得起质询的回应，这样他们才能保住运营许可，并让扩张按计划推进。
    currentAlternative: Manual cross-functional evidence gathering plus outside counsel
    successMetric: 产出完整、可提交给监管机构的材料所需时间，以及无需返工即可完成的申报数量
