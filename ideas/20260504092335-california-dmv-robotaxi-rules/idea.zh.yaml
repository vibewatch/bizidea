jobsToBeDone:
- job: 当加州自动驾驶违规事件或许可报送事项出现时，帮助机器人出租车合规负责人快速整理并提交可辩护的响应材料，从而保护运营许可并确保扩张按计划推进。
  currentAlternative: 跨职能手工收集证据，再加上外部律师协助
  successMetric: 产出完整监管就绪材料所需时间，以及无需返工即可完成的申报数量
