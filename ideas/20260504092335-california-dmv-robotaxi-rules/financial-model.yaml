scenarios:
  downside:
    description: "Security review and conversion slip by roughly two quarters, and mature accounts stay at one-workflow pricing."
    y3RevenueK: 1120.0
    y3EbitdaK: -982.0
    cashLowPointK: 476.0
    keyAssumptionChanges:
      - "Customer 4 start moves from M22 to M27 and Customer 5 from M29 to M34."
      - "Expanded account price stays at $25K per month instead of $30K."
      - "Gross margin falls to 65% as support and redaction work stays manual."
  base:
    description: "Two paid pilots land in year 1, four production logos are active by the end of year 2, and six paid programs are active by year 3."
    y3RevenueK: 1545.0
    y3EbitdaK: -628.5
    cashLowPointK: 829.6
    keyAssumptionChanges:
      - "Pilot starts in M6 and M9, then new customers start in M16, M22, M29, and M33."
      - "Production pricing is $25K per month and mature accounts expand to $30K per month."
      - "Gross margin stays at the 70% target and hiring remains lean."
  upside:
    description: "Security review compresses, CPUC reporting module expands earlier, and adjacent demand adds one faster expansion cohort."
    y3RevenueK: 1800.0
    y3EbitdaK: -430.0
    cashLowPointK: 1040.0
    keyAssumptionChanges:
      - "Customers 3 through 5 each close about one quarter earlier than base."
      - "More accounts reach the $30K per month expanded state by mid-year."
      - "Gross margin improves to 72% as connectors and templates standardize."
sensitivity:
  - variable: ARPU
    downsideCase: "Production pricing lands near $250K ARR and second-workflow expansion does not stick."
    baseCase: "$300K steady-state ARR with limited land-and-expand to $360K for mature accounts."
    upsideCase: "$330K-$360K ARR becomes standard once CPUC and permit-readiness workflows are live."
    y3RevenueImpactK: -230.0
    cashImpactK: -161.0
  - variable: CAC
    downsideCase: "$240K CAC because founder time and security review remain very heavy."
    baseCase: "$180K CAC in a founder-led, targeted enterprise motion."
    upsideCase: "$140K CAC with counsel and partner referrals improving conversion."
    y3RevenueImpactK: -60.0
    cashImpactK: -180.0
  - variable: churn
    downsideCase: "3.0% monthly churn as internal-tooling bias wins after pilots."
    baseCase: "1.5% monthly churn for a sticky but still young compliance workflow."
    upsideCase: "0.8% monthly churn after the platform becomes system-of-record for multiple filings."
    y3RevenueImpactK: -140.0
    cashImpactK: -98.0
  - variable: sales cycle
    downsideCase: "Average close and conversion slip by about two quarters."
    baseCase: "Pilot close in 3-6 months and production conversion in 4-5 months."
    upsideCase: "Security review compresses enough to cut the cycle by roughly one quarter."
    y3RevenueImpactK: -425.0
    cashImpactK: -298.0
  - variable: gross margin
    downsideCase: "65% gross margin if redaction, onboarding, and support stay people-heavy."
    baseCase: "70% gross margin in line with the business-plan target."
    upsideCase: "72%-75% gross margin once connectors and templates are repeatable."
    y3RevenueImpactK: 0.0
    cashImpactK: -77.3
  - variable: hiring pace
    downsideCase: "Two hires are pulled forward before 4 production logos are proven."
    baseCase: "Lean ramp to 9 FTE by Q4Y2 and 12 FTE by Q4Y3."
    upsideCase: "One GTM and one engineering hire are delayed until expansion proof is clearer."
    y3RevenueImpactK: 0.0
    cashImpactK: -180.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Accounts[Target California AV accounts] --> Pilots[Paid pilots]
      Pilots --> Production[Production subscriptions]
      Production --> Expansion[Second workflow and usage expansion]
      Expansion --> Revenue[Recurring revenue]
      Revenue --> GrossProfit[70% gross profit]
      GrossProfit --> Cash[Cash to milestone]
modelSanity:
  - checkName: Revenue engine
    finding: "Base-case revenue comes from six high-ACV programs converting from paid pilots into $300K-plus annual production contracts, not from broad logo volume."
  - checkName: Must go right
    finding: "Read-only integrations and security review must stay near the modeled 90-day range so pilots convert inside 4-5 months."
  - checkName: Model breaks if
    finding: "If mature ARPU stays at one-workflow pricing and the fourth and fifth customers slip by two quarters, downside Y3 revenue falls toward $1.1M and the cash cushion compresses sharply."
  - checkName: Next-round proof
    finding: "The clean seed story is four production logos, live CPUC reporting usage, and one paid adjacent workflow that reuses the California data model."
sanityChecks:
  ruleOf40: "Y3 growth 89.6% + EBITDA margin -40.7% = 48.9%"
  burnMultiple: "Y2 burn multiple 1.1x and Y3 burn multiple 0.9x on roughly $720K of net new ARR each year."
  revenuePerFte: "$129K Y3 using 12 end-of-year FTE (below a typical $200K-$400K SaaS benchmark)."
  flags:
    - "Base case reaches only six active paying programs by Y3, so losing one large logo would materially change the outcome."
    - "Revenue per FTE remains below benchmark because integrations, security review, and compliance support still look partly services-like."
    - "The model assumes two early pilots convert on schedule; if security review exceeds 90 days, the funding ask likely needs to move up."
