    value: "30"
    unit: USDK per month
    source: "[BP businessModel expansionLevers; BP product twelveMonth CPUC reporting and permit-readiness modules; heuristic for modest land-and-expand above $300k base]"
  - id: A7
    name: Gross margin
    value: "70"
    unit: percent
    source: "[BP businessModel targetGrossMarginPct]"
  - id: A8
    name: Pilot-to-production conversion lag
    value: "4-5"
    unit: months
    source: "[BP milestones: 1 pilot converts by month 12; BP gtm funnelTargets pilot→production 50%+; BP experimentRoadmap security review in 90 days or less]"
  - id: A9
    name: Customer starts after the first two
    value: "M16, M22, M29, M33"
    unit: month
    source: "[BP milestones: 3-4 production logos by months 12–24 and adjacent expansion by months 24–36; conservative hiring and sales ramp heuristic]"
  - id: A10
    name: Fully loaded founder or exec compensation
    value: "150"
    unit: USDK per year
    source: "[Startup-finance heuristic: pre-seed B2B founder cash comp kept below market]"
  - id: A11
    name: Fully loaded engineering compensation
    value: "180"
    unit: USDK per year
    source: "[Startup-finance heuristic: Bay Area enterprise software engineer fully loaded cost]"
  - id: A12
    name: Fully loaded product or compliance compensation
    value: "160"
    unit: USDK per year
    source: "[Startup-finance heuristic: domain product/compliance lead at seed stage]"
  - id: A13
    name: Fully loaded sales compensation
    value: "170"
    unit: USDK per year
    source: "[Startup-finance heuristic: early enterprise AE base plus burden, before heavy commission scaling]"
  - id: A14
    name: Fully loaded G&A or customer success compensation
    value: "120"
    unit: USDK per year
    source: "[Startup-finance heuristic: lean operations or customer-success hire]"
  - id: A15
    name: Y1 non-payroll operating spend
    value: "R&D tooling/cloud $5k-$7k per month, G&A/legal/security $6k-$8k per month, GTM programs $2k-$5k per month"
    unit: text
    source: "[Startup-finance heuristic: pre-seed enterprise software with legal, security, and cloud needs]"
  - id: A16
    name: Hiring ramp
    value: "Start with founder, founding engineer, and compliance product lead; add security engineer in M4, first AE in M9, 4 hires through Y2, and 3 hires through Y3"
    unit: text
    source: "[BP team startTiming for first 5 hires; later hires are lean-ramp heuristic to support 4-6 customers]"
  - id: A17
    name: Steady-state CAC
    value: "180"
    unit: USDK per new production customer
    source: "[Startup-finance heuristic: high-touch enterprise infrastructure/compliance sale with founder involvement and security review]"
  - id: A18
    name: Monthly churn
    value: "1.5"
    unit: percent
    source: "[Startup-finance heuristic: conservative enterprise churn for concentrated, high-risk early market]"
  - id: A19
    name: Cash conversion simplification
    value: "Cash movement approximates EBITDA because the model assumes asset-light software, no debt, no capex, and implementation cash roughly offsets working-capital timing"
    unit: text
    source: "[Startup-finance heuristic]"
