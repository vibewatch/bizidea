topRisks:
  - name: "Implementation sprawl"
    description: "Every carrier program has its own appetite quirks, which can turn the business into custom services."
    mitigation: "Start with one high-volume class and ship reusable authoring tools plus templates for the first 10-20 common rule patterns."
  - name: "Incumbent workflow capture"
    description: "Underwriting-workbench or policy-admin vendors could add basic AI triage features and bundle them."
    mitigation: "Stay system-neutral and go deeper on rule compilation, exception feedback, and cross-program audit trails than incumbent point features can."
  - name: "Rule drift blind spots"
    description: "If carrier guidelines change faster than the workflow graph is updated, the product could create false confidence."
    mitigation: "Require human approval on referral decisions, add change-management alerts, and treat every override as a monitored rule-update event."
