problem: >-
  Excess-and-surplus MGAs win on quote speed, yet underwriters still triage
  broker emails, PDFs, and carrier appetite guides by hand. Generic copilots
  can summarize a submission, but they hallucinate risk facts, miss referral
  rules, and cannot prove why a risk was accepted, declined, or escalated. That
  leaves underwriting leaders stuck between hiring more staff and tolerating
  slower turnaround plus inconsistent appetite enforcement.
targetUser:
  primary: "Line underwriters and underwriting-operations managers at U.S. excess-and-surplus MGAs"
  secondary: "Program managers responsible for carrier guidelines and referral queues"
  buyer: "Chief Underwriting Officer or COO at the MGA"
startupThesis:
  nonObviousInsight: "The hard part of underwriting automation is not generating prose; it is converting tacit appetite rules and exception handling into deterministic software that every underwriter trusts."
  beachhead: >-
    Small-commercial excess-and-surplus MGAs writing contractors and
    habitational risks across 5-20 carrier programs, where 10-50 underwriters
    still triage broker submissions from email and PDFs
  wedge: "A playbook compiler that turns appetite guides, referral thresholds, and carrier guidelines into deterministic submission triage plus prefilled referral memos"
  whyNowCatalyst: "Poetic's proof that deterministic workflow software can reach 99% accuracy and 100% process adherence in financial and insurance operations makes insurer back offices newly ready to buy execution-first automation."
  ventureScalePath: >-
    Start with MGA submission triage, then expand into renewals, endorsements,
    claims coverage investigations, delegated-authority QA, and eventually a
    broader workflow layer for carriers, brokers, and regulated financial
    operations.
solution: >-
  Build an underwriting workbench that sits on top of submission inboxes,
  broker portals, and core policy systems. The product ingests broker packets,
  loss runs, prior referrals, and carrier guidelines, then compiles each
  program's rules into a deterministic decision graph that classifies
  submissions, requests missing evidence, and drafts referral memos with cited
  facts. Human underwriters approve or override the recommendation, while every
  exception becomes structured rule feedback instead of another hidden
  tribal-memory note. Teams start with one program where quote backlog is
  painful, prove faster turnaround and cleaner appetite enforcement, then roll
  the compiler across additional carrier programs and renewal workflows.
goToMarketSeed:
  firstCustomer: "A U.S. E&S MGA with 15-40 underwriters, 1,000+ monthly small-commercial submissions, and at least one carrier program suffering quote-backlog spikes"
  buyingTrigger: "A hard-market submission surge, new delegated-authority program launch, or mandate to improve quote turnaround without adding underwriter headcount"
  currentAlternative: "Manual inbox triage across underwriting workbenches, spreadsheets, policy-admin systems, and brittle rules or RPA"
  switchingReason: "The compiler enforces appetite and referral logic deterministically while still producing reviewer-ready memos, which generic copilots and static rules engines rarely do together."
  pricingHypothesis: "Annual platform fee per active carrier program plus usage tiers for processed submissions or underwriting seats"
