differentiator: >-
  This is not another underwriting copilot, BPO, or rules-only workbench. The
  product's advantage is a compiler layer that turns messy carrier guidelines
  and referral practices into executable, auditable workflows with human
  approvals and exception capture built in. That creates a growing moat in
  program-specific decision graphs, override history, and integrations across
  the systems MGAs already use.
