    - 38
market:
  tam:
    value: $250.0M
    rationale: 自下而上：按 >1,000 家美国 MGA × 每家 5 个可先自动化的保险公司或项目工作流 × 每个工作流每年约 $50k 软件支出建模；交叉校验看，$250M 只占 2024 年美国 MGA 保费估算 $114.1B 的约 0.22%，也落在 $56.8B 代理承保渠道之内。
    isEstimate: true
    sourceRefs:
    - 4
    - 5
  sam:
    value: $75.0M
    rationale: 滩头筛选：假设 >1,000 家 MGA 里，大约 30% 符合论点里的小型商业险 E&S 运营画像（约 300 家 MGA），并沿用同样的 5 个工作流 × $50k 支出。
    isEstimate: true
    sourceRefs:
    - 3
    - 4
  som:
    value: $2.5M
    rationale: 第 3 年可触达情形：25 家 MGA × 每家 2 个已上线项目 × 每个项目每年约 $50k；前提是先在一个启动项目里证明周转和承保口径控制的 ROI。
    isEstimate: true
    sourceRefs:
    - 21
    - 23
    - 25
    - 30
