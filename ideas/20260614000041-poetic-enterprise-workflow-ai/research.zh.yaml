competitors:
- name: Cytora
  stage: scale-up
  wedge: 面向保险公司、经纪商和 MGA 的风险数字化与承保工作流自动化。
  pricing: Custom enterprise pricing; not publicly disclosed.
  strength: 在生产率提升和广泛保险公司采用上，有很强的公开背书。
  weaknessVsUs: 它更像宽工作流平台；现有证据里并没有看到一个专门为项目级转审逻辑和备忘录生成打造的窄型确定性编译器。
  sourceRefs:
  - 21
  - 22
  - 35
- name: Federato
  stage: scale-up
  wedge: 以 AI 原生方式做承保优先级、可赢性和“投保资料到报价”工作流。
  pricing: Custom enterprise pricing; not publicly disclosed.
  strength: 在特种险环境里，承保口径对齐和报价提速的公开证明很强。
  weaknessVsUs: 优先级和组合引导，和把每一条保险公司阈值与转审资料包都确定性编码进去，仍不是一回事。
  sourceRefs:
  - 23
  - 24
  - 37
- name: Send
  stage: scale-up
  wedge: 覆盖代理承保和特种险工作流的平台型产品，强在合规和流程广度。
  pricing: Custom enterprise pricing; not publicly disclosed.
  strength: 在代理承保场景里，运营广度和行业可信度都很深。
  weaknessVsUs: 宽平台往往更重，也不够鲜明地站在“把承保人的隐性手册翻成可执行规则图”这一侧。
  sourceRefs:
  - 25
  - 26
  - 38
- name: Convr
  stage: scale-up
  wedge: 面向保险公司和 MGA 的投保资料收件、风险上下文与 AI 承保工作台。
  pricing: Custom enterprise pricing; not publicly disclosed.
  strength: 在抽取、收件和薄资料场景的上下文补全上很强。
  weaknessVsUs: 它更像“把资料收上来、上下文补齐”，而不是把保险公司承保口径和转审逻辑编译成可审计的备忘录。
  sourceRefs:
  - 27
  - 34
  - 40
- name: Kalepa
  stage: scale-up
  wedge: 聚焦初筛、风险分析和盈利性报价加速的 AI 承保智能。
  pricing: Custom enterprise pricing; not publicly disclosed.
  strength: 在 MGA 端的优先级、收件箱覆盖和报价转绑定率提升上，有很强的公开案例。
  weaknessVsUs: 它强调的是承保智能和优先级，而不是对转审阈值和备忘录输出做显式的编译器式治理。
  sourceRefs:
  - 30
  - 36
regulatoryTechnicalConstraints:
- point: 任何 AI 辅助的承保判断，都必须符合适用保险法，并让治理、文档和反歧视控制随时可供审查。
  sourceRefs:
  - 10
  - 12
  - 13
  - 14
- point: 保险数据安全义务要求企业建立信息安全计划、第三方监督机制，以及成熟的网络事件上报纪律。
  sourceRefs:
  - 11
- point: 超额及剩余险和代理承保工作流，需要清楚的原因代码、例外处理和保险公司监管，而不是一团黑盒模型输出。
  sourceRefs:
  - 7
  - 8
  - 9
