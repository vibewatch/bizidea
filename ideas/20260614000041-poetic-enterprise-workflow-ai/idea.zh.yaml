jobsToBeDone:
- job: 当经纪人投保资料激增时，帮一线承保人判断某个风险是否符合承保口径、还缺哪些证据，好让他们在不踩保险公司规则的前提下更快报价。
  currentAlternative: 手工翻经纪人邮件、PDF、承保口径指引和历史转审样例
  successMetric: 报价周转时间，以及无需不必要转审就能完成处理的投保资料占比
- job: 当保险公司更新承保指引时，帮承保运营团队一次性把规则变更推到每个承保人工作流里，好让他们减少不一致的判断。
  currentAlternative: 在 Word 里改手册、重新培训团队，再配合临时电子表格核对
  successMetric: 一次规则变更从发布到上线的时间，以及超出口径触点的下降幅度
