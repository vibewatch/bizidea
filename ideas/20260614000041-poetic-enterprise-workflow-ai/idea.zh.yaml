differentiator: 这不是又一个承保 AI 副驾、BPO 或纯规则工作台。优势在于它有一层编译器，能把凌乱的保险公司指引和转审习惯改写成可执行、可审计的工作流，且内置人工审批和例外捕获。随着项目级决策图、覆写历史，以及对 MGA 现有系统的集成越积越多，护城河会越来越深。
