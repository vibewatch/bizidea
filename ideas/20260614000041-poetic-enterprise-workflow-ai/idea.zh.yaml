topRisks:
- name: 实施面摊太开
  description: 每个保险公司项目都有自己的承保怪癖，很容易把这门生意拖成定制化服务。
  mitigation: 先从一个高量级险种切入，把前 10–20 个常见规则模式做成可复用的作者工具和模板。
- name: 现有工作流入口被老厂商卡住
  description: 承保工作台或保单管理系统厂商，完全可能补一层基础 AI 初筛，再顺手打包卖掉。
  mitigation: 保持系统中立；在规则编译、例外反馈和跨项目审计轨迹上做得比老厂商的点状功能更深。
- name: 规则漂移盲区
  description: 如果保险公司指引更新速度快过工作流图更新速度，产品就会制造一种虚假的确定感。
  mitigation: 对转审决策强制人工批准，加上变更管理告警，并把每次覆写都当成需要监控的规则更新事件。
