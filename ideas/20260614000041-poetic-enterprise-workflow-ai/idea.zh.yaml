problem: E&S MGA 要拼的核心就是报价速度，但一线承保人至今还得手工翻经纪人邮件、PDF 和保险公司承保指引。泛化 AI 副驾可以帮你总结投保资料，却会幻觉出风险事实、漏掉转审规则，也讲不清一单为什么该接、该拒或该上报。结果承保负责人只能在两件坏事里二选一：要么继续招人，要么接受更慢的周转和更松散的口径执行。
targetUser:
  primary: 美国超额及剩余险 MGA 的一线承保人和承保运营经理
  secondary: 负责保险公司指引和转审队列的项目经理
  buyer: MGA 的 Chief Underwriting Officer 或 COO
startupThesis:
  nonObviousInsight: 承保自动化最难的，不是生成一段话，而是把隐性的承保口径和例外处理写成每个承保人都信得过的确定性软件。
  beachhead: 聚焦美国小型商业险 E&S MGA，承保承包商险和住宅类风险，横跨 5–20 个保险公司项目；这些团队仍有 10–50 名承保人靠邮件和 PDF 初筛经纪人投保资料。
  wedge: 把承保口径指引、转审阈值和保险公司规则编译成确定性投保资料初筛与预填转审备忘录的承保手册编译器
  whyNowCatalyst: Poetic 已证明，确定性工作流软件在金融和保险运营里可以跑到 99% 准确率和 100% 流程一致性；这让保险后台今天更愿意为“先把流程跑对”的自动化买单。
  ventureScalePath: 先吃 MGA 投保资料初筛，再扩到续保、批单、理赔责任调查、代理承保 QA，最终长成覆盖保险公司、经纪商和受监管金融运营的更广工作流层。
solution: 做一套盖在投保收件箱、经纪人门户和核心保单系统之上的承保工作台。产品读入经纪人资料包、历史出险记录、历史转审记录和保险公司指引，再把每个项目的规则编译成确定性决策图：判断该接、该拒、该补资料，还是该转审，并自动起草带引用事实的转审备忘录。人工承保人负责批准或覆写建议；每次例外都会回流成结构化规则反馈，不再继续躺在某个人的隐性经验里。团队先从一个积压最痛的项目切入，先证明报价更快、口径执行更干净，再把编译器铺到更多保险公司项目和续保流程。
goToMarketSeed:
  firstCustomer: 一家美国 E&S MGA：15–40 名承保人、每月 1,000+ 份小商险投保资料，且至少有一个保险公司项目经常出现报价积压高峰
  buyingTrigger: 硬市场下投保激增、新代理承保项目上线，或管理层要求在不增加承保人编制的情况下提升报价时效
  currentAlternative: 在承保工作台、电子表格、保单管理系统，以及脆弱的规则或 RPA 之间手工分流收件箱
  switchingReason: 这套编译器能以确定性方式执行承保口径和转审逻辑，同时产出审核可直接使用的备忘录；泛化 AI 副驾和静态规则引擎很少能两件事一起做好。
  pricingHypothesis: 按活跃保险公司项目收取年度平台费，再叠加按处理投保资料量或承保席位计费的用量档位。
