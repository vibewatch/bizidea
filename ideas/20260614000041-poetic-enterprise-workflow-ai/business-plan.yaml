slug: mga-underwriting-compiler
date: '2026-06-14'
executiveSummary: >-
  This company should start with a deterministic submission compiler for U.S.
  small-commercial E&S MGAs, where 10-50 underwriters still triage broker
  emails, PDFs, and carrier guides by hand. The urgent pain is not
  summarization; it is deciding faster without violating carrier appetite,
  creating off-appetite touches, or asking senior underwriters to write the same
  referral memo repeatedly. The first product should ingest email, PDFs, ACORD
  forms, and loss runs for one carrier program, classify each submission against
  explicit rules, request missing evidence, and draft cited referral memos for
  human approval. The first sale should be a paid historical replay plus a
  60-day live pilot at an MGA with 1,000-plus monthly submissions, triggered by
  backlog spikes, a new delegated-authority program, or a mandate to improve
  turnaround without hiring. Research supports a roughly $75.0M beachhead SAM
  and a $2.5M year-3 SOM, but the venture case depends on proving one-program
  deployments can expand into additional programs, renewals,
  delegated-authority QA, and selected carrier workflows. The company can win
  because adjacent vendors mostly improve ingestion, prioritization, or workflow
  breadth, while this wedge centers on deterministic rule compilation, cited
  outputs, and auditable override capture. The biggest disconfirming risk is
  that each carrier program requires too much bespoke rule mapping or deep PAS
  integration, which would collapse software margins into services work. The
  first 6 months therefore need to prove replay accuracy, export-only
  deployment viability, and pricing acceptance before the company adds a broad
  sales team or adjacent workflow modules.
problem:
  - High-volume E&S MGAs still work broker submissions from shared inboxes, PDFs, spreadsheets, and prior examples, so quote turnaround slows and off-appetite risks consume scarce underwriter time.
  - Generic AI copilots can draft text, but they do not reliably encode carrier appetite, referral thresholds, change control, and audit-ready reasoning in a way CUOs will trust.
solution:
  - Compile carrier guidelines, referral rules, and missing-document logic into a deterministic decision graph that turns each submission into accept, decline, request-more-info, or refer recommendations with cited facts.
  - Give underwriters a workbench that surfaces missing evidence, drafts referral memos, logs every override, and converts exceptions into reusable rule updates instead of hidden tribal knowledge.
whyWeWin:
  - The product sells into a narrow, budget-worthy workflow where backlog, quote speed, and carrier oversight are already measured program by program.
  - Deterministic rule compilation plus cited memo output is a clearer differentiation than generic intake or prioritization features bundled into broader underwriting platforms.
  - Program-specific decision graphs, override history, and rule-change logs can compound into an operational moat that is hard for services firms or incumbent point features to recreate.
strategicChoices:
  beachhead: >-
    U.S. small-commercial E&S MGAs writing contractors and habitational risks
    across 5-20 carrier programs, with 15-40 underwriters and 1,000-plus
    monthly submissions.
  wedgeRationale: >-
    One carrier-program triage workflow creates faster proof than a full
    underwriting platform because the buyer can compare backlog, referral
    quality, and turnaround on a known queue without replacing PAS or
    workbench systems.
  sequencingRationale: >-
    Start with export-only, human-approved submission triage for one pain-point
    program, then add reusable rule templates, second-program rollouts, and only
    later renewals, delegated-authority QA, and deeper integrations. This
    ordering protects speed to first value and tests whether the company is
    building software rather than bespoke implementation work.
  notYet:
    - Broad carrier or admitted-market deployments
    - Full underwriting workbench replacement
    - Autonomous bind or decline decisions without human approval
    - Claims, renewals, or policy servicing before first-program repeatability
market:
  tam: "$250.0M estimated TAM from >1,000 U.S. MGAs × 5 automatable carrier or program workflows × roughly $50k annual software spend per workflow."
  sam: "$75.0M estimated beachhead SAM from roughly 300 small-commercial E&S MGAs that fit the initial profile at the same 5-workflow × $50k spend assumption."
  som: "$2.5M year-3 SOM from 25 MGAs with 2 live programs each at roughly $50k annual spend per program after first-program ROI proof."
  segments:
    - U.S. small-commercial E&S MGAs with 5-20 carrier programs and 1,000-plus monthly submissions
    - Regional P&C carriers or fronting carriers overseeing delegated-authority programs that need cleaner referral governance
  buyingProcess: >-
    Line underwriters and underwriting-ops managers feel the pain first, but
    budget typically sits with the CUO or COO and often needs sign-off from
    operations, IT, and carrier-program stakeholders. The fastest motion is a
    paid replay and one-program pilot tied to backlog, a new program launch, or
    turnaround KPI pressure, then production approval when referral quality and
    auditability are proven.
product:
  mvp: >-
    MVP covers one small-commercial carrier program and starts with
    email/PDF/ACORD ingestion, deterministic appetite checks,
    missing-information requests, cited referral memo drafts, and a human
    approval queue. It should export decisions back into existing inbox or
    workbench flows before any deep PAS write-back.
  sixMonth: >-
    Ship one live program with historical replay tooling, versioned rule
    authoring, guideline-diff alerts, and referral memo citations, while
    keeping first-program deployment under 45 days.
  twelveMonth: >-
    Add templates for the first 10-20 common rule patterns, limited PAS or
    workbench integrations, second-program rollout tooling, and renewal intake
    for customers that already trust the core triage flow.
  twentyFourMonth: >-
    Expand into multi-program MGAs, delegated-authority QA, and selected
    carrier deployments using the same compiler, audit trail, and
    change-management layer.
  keyBets:
    - One-program deployment using email, PDF, and ACORD intake plus memo export is enough to win the first pilots before PAS write-back.
    - The first 10-20 rule patterns cover enough contractors and habitational logic to make later programs faster to launch.
    - Underwriters will trust cited deterministic outputs with human approval more than generic copilot suggestions.
    - Guideline-diff tooling and override capture can keep rule drift manageable without a large service team.
gtm:
  wedge: >-
    Sell a paid historical replay and 60-day live pilot on one backlog-heavy
    carrier program, then convert to an annual production contract when the MGA
    sees faster turnaround, fewer unnecessary referrals, and cleaner appetite
    enforcement.
  channels:
    - Founder-led outbound to CUOs, COOs, and underwriting-operations leaders at target MGAs
    - PAS, underwriting-workbench, and submission-management integrators that already influence workflow-change projects
    - Insurance-operations consultancies or carrier-program partners that want better oversight and faster onboarding
  funnelTargets: "Qualified account→historical replay 30-40%, replay→paid live pilot 50%+, pilot→production 60%+, and first additional program sold within 9 months at 50% of production accounts."
  pricing: >-
    Charge a setup fee for initial playbook mapping plus an annual platform fee
    per active carrier program with submission-volume bands. This matches how
    MGAs experience the pain, supports roughly $40k-$60k ACV on the first live
    program, and expands cleanly as more programs go live.
businessModel:
  revenueStreams:
    - Annual platform subscription per active carrier program
    - Implementation and playbook-configuration fees
    - Volume or add-on fees for additional processed submissions, programs, and audit modules
  unitOfValue: Active carrier program processed through the underwriting compiler
  targetGrossMarginPct: 70
  expansionLevers:
    - Roll out additional carrier programs within the same MGA after first-program proof
    - Add renewals, endorsements, and delegated-authority QA once submission triage is trusted
    - Sell audit, benchmark, and carrier-oversight modules to carriers or fronting partners connected to existing MGA accounts
strategyMap:
  northStarMetric: Submissions moved to quote-ready or referral-ready status per underwriter day without uncited off-appetite decisions
  inputMetrics:
    - Median hours from submission receipt to first triage decision
    - Percentage of submissions auto-routed or prefilled without material rework
    - Underwriter override rate on compiler recommendations
    - Days to launch a new carrier program
    - Programs live per production customer
    - Time to publish a guideline change to production
  moatsToBuild:
    - Program-specific decision graphs and override history across carrier programs
    - Rule-change diff and certification logs tied to carrier guideline updates
    - Normalized submission-to-decision data across email, PDF, ACORD, and PAS contexts
    - Library of accepted referral memo patterns and missing-information workflows by class
  killCriteria:
    - Fewer than 3 of the first 20 target MGAs share historical submission data and sponsor a paid replay
    - Two replay datasets fail to reach at least 90% agreement on scoped accept, refer, or decline logic or at least 30% reduction in manual triage time
    - Median time to launch a second program stays above 45 days after the first 3 production deployments
    - Pilot-to-production conversion falls below 50% after the first 4 paid pilots
    - More than 70% of qualified opportunities insist on full PAS write-back before a pilot
  mermaid: |
    flowchart LR
      Wedge[One carrier-program submission triage wedge] --> MVP[Deterministic compiler MVP]
      MVP --> Proof[Faster quote turnaround plus cited referral memos]
      Proof --> Expansion[More programs then renewals and carrier oversight]
investorMemo:
  verdict:
    call: "Meet / investigate further"
    conviction: >-
      Interesting regulated-workflow wedge with credible urgency, but conviction
      depends on proving that first-program deployments reuse enough rule
      objects to stay software-like.
    whyBelieve: >-
      The plan ties product, pricing, and distribution to a specific backlog
      event inside a growing MGA channel where auditability is part of the core
      job.
    whyDoubt: >-
      If incumbent workbenches, delegated-underwriting platforms, or services
      teams can encode the same program logic with similar speed, the standalone
      margin and venture-scale case weakens materially.
    nextDiligence: >-
      Review two historical replay results and one live pilot proposal to
      verify 90%+ scoped rule agreement, export-only deployment viability, and
      willingness to pay per active program.
  firstCustomer:
    title: Backlog-heavy small-commercial E&S MGA
    profile: >-
      A U.S. MGA with 15-40 underwriters, 1,000-plus monthly submissions, and
      one contractors or habitational carrier program where quote turnaround and
      referral queues are visibly deteriorating.
    trigger: >-
      Submission surge, new delegated-authority program launch, or executive
      mandate to improve turnaround without adding underwriter headcount.
    buyer: Chief Underwriting Officer or COO
    initialContract: >-
      $15k-$25k paid replay plus 60-day live pilot for one carrier program,
      converting to roughly $40k-$60k annual ACV for the first live program and
      expanding as additional programs go live.
  mustBeTrue:
    - At least 25 beachhead MGAs must have one program with enough submission density and backlog pain to justify roughly $50k annual spend.
    - Historical replays must show at least 90% agreement on scoped triage logic and at least 30% manual triage time reduction before live deployment.
    - Email, PDF, and ACORD ingestion plus memo export must be enough to start at least half of early pilots without PAS write-back.
    - At least half of production customers must expand from one live program to a second within 9-12 months.
    - Buyers must prefer a deterministic compiler overlay to bundled workbench or intake features in multiple competitive evaluations.
  diligenceQuestions:
    - Which classes and carrier programs create the highest recurring referral and missing-information volume?
    - "Which budget line funds the purchase in practice: underwriting technology, operations productivity, or carrier-program support?"
    - How frequently do carrier guidelines change, and who owns rule updates and certification inside the MGA?
    - Can design partners start with export-only deployment, or does PAS or workbench write-back block adoption?
    - Why will MGAs buy this overlay instead of extending Cytora, Federato, Send, Convr, Kalepa, or internal ops tooling?
operatingAssumptions:
  - assumption: Phase-one deployment can start with email, PDF, and ACORD ingestion plus memo export, without PAS write-back.
    basis: research.yaml
    validationTest: Close 2 paid pilots that run export-only and measure whether turnaround improvement is visible before any write-back integration work starts.
    decisionImpact: If false, hire integration talent earlier, narrow the ICP to simpler stacks, and increase funding needs.
  - assumption: The first 10-20 rule patterns cover enough contractors and habitational logic to templatize new programs.
    basis: idea.yaml
    validationTest: Map the first 3 design-partner programs and confirm at least 70% of decision objects reuse the shared rule library.
    decisionImpact: If false, narrow to a single class of business or accept a services-heavy model with lower gross margins.
  - assumption: Buyers will accept per-active-program pricing plus submission-volume bands after ROI proof.
    basis: idea.yaml
    validationTest: Run 8 pricing conversations with CUOs or COOs and secure 2 pilot scopes anchored to per-program pricing.
    decisionImpact: If false, redesign packaging around seats or enterprise minimums and revisit SAM assumptions.
  - assumption: Historical replay accuracy is predictive enough to sell a paid live pilot.
    basis: research.yaml
    validationTest: Run 2 replays of 300-500 submissions each and require at least 90% agreement on scoped triage outcomes before offering live deployment.
    decisionImpact: If false, sales will require longer assessments or services-led audits, slowing go-to-market.
  - assumption: Second-program expansion can happen before a full field-sales team is hired.
    basis: operator judgment
    validationTest: Win second-program expansions in 2 of the first 4 production accounts before month 12 using founder-led sales.
    decisionImpact: If false, hire account management earlier and raise more capital for a heavier direct-sales motion.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Collect submission and referral baselines from target MGAs
    hypothesis: A narrow set of programs and classes drives most backlog and can anchor the first template library.
    successMetric: 12 buyer interviews completed, 5 anonymized weekly metrics packs collected, and the top 10 rule patterns explain at least 60% of manual referral volume in the shared data.
    owner: Founder CEO
  - horizon: 0–90 days
    experiment: Replay historical submissions on two launch programs
    hypothesis: Scoped deterministic rules can match underwriter triage and shrink memo-prep time before any live deployment.
    successMetric: Two datasets of 300-500 submissions each show at least 90% agreement on scoped outcomes and at least 30% reduction in analyst prep time.
    owner: Founding eng
  - horizon: 90–180 days
    experiment: Launch export-only live pilot
    hypothesis: Email, PDF, and ACORD ingestion plus memo export is sufficient to produce live ROI before PAS write-back.
    successMetric: 2 paid pilots go live without PAS write-back and each delivers first triage output within 30 days of kickoff.
    owner: Founding eng
  - horizon: 90–180 days
    experiment: Test pricing and pilot packaging
    hypothesis: Per-program pricing converts better than seat pricing for CUO and COO buyers.
    successMetric: 6 of 10 pricing conversations favor the per-program package and 2 signed pilot scopes use it.
    owner: Founder CEO
  - horizon: 6–12 months
    experiment: Templatize second-program rollout
    hypothesis: Shared rule objects and guideline-diff tooling can cut deployment time for the next program materially.
    successMetric: Second program goes live in under 45 days at 2 customers with at least 70% rule-object reuse.
    owner: Product and rules lead
  - horizon: 12–18 months
    experiment: Activate partner channel
    hypothesis: PAS or workbench integrators and insurance-operations consultancies can source lower-CAC opportunities once a case study exists.
    successMetric: 20% of qualified pipeline comes from 2 active partners with pilot conversion within 10 points of founder-led outbound.
    owner: GTM lead
operations:
  - Maintain a versioned carrier-guideline library with diff review and quarterly recertification of live rule graphs.
  - Run weekly override reviews with customers so exceptions become reusable rule updates instead of ticket queues.
  - Standardize ACORD, email, and PDF ingestion plus memo export before supporting deep PAS write-back.
  - Ship human approval gates, citation trails, model inventory, and security documentation as default controls.
  - Use PAS, workbench, and insurance-operations partners for implementation leverage once the reference playbook is stable.
team:
  - role: Founder CEO
    startTiming: Month 0
    rationale: Owns CUO and COO discovery, pricing, and design-partner conversion in a finite market that buys on domain trust.
  - role: Founding eng
    startTiming: Month 0
    rationale: Builds the compiler, ingestion pipeline, audit trail, and replay tooling needed for the first proof point.
  - role: Product and rules lead
    startTiming: Month 3
    rationale: Turns carrier guidelines and override patterns into reusable rule objects so deployments do not become bespoke services.
  - role: Solutions engineer
    startTiming: Month 6
    rationale: Shortens pilot onboarding, handles PAS or workbench integration edges, and answers security and implementation questions.
  - role: GTM lead
    startTiming: Month 9
    rationale: Adds repeatable pipeline and partner management only after pilot-to-production and second-program expansion are visible.
milestones:
  - horizon: 0–12 months
    items:
      - Sign 5 design partners across contractors and habitational programs.
      - Launch 2 paid live pilots and convert at least 1 to production ARR.
      - Prove at least 30% faster first-touch or quote turnaround and at least 20% fewer unnecessary referrals in the first live program.
      - Keep first-program deployment under 45 days.
      - Ship versioned rule authoring, cited referral memos, and guideline-diff alerts.
  - horizon: 12–24 months
    items:
      - Reach 8-10 production MGAs and 15-20 live carrier programs.
      - Add renewals and limited PAS or workbench write-back for customers that already trust export-only workflows.
      - Win second-program expansion in at least half of production accounts.
      - Stand up 2 active distribution partners.
  - horizon: 24–36 months
    items:
      - Expand into delegated-authority QA and selected carrier-oversight workflows.
      - Reach the first carrier or fronting-partner sponsored deployment.
      - Build benchmark data products on rule drift, referral rates, and turnaround by program archetype.
      - Show expansion revenue and partner-sourced deals as the majority of new ARR.
risks:
  - risk: Carrier-program mapping stays bespoke and turns deployments into services work.
    likelihood: High
    impact: High
    mitigation: Constrain the beachhead to contractors and habitational programs, version shared rule objects, and require reuse thresholds before hiring broad sales.
  - risk: Incumbent workbenches or delegated-underwriting platforms bundle good-enough triage.
    likelihood: High
    impact: High
    mitigation: Integrate with incumbent stacks and sell on deterministic referral logic, rule-change control, and audit-ready memo output rather than generic intake.
  - risk: Early buyers require deep PAS or workbench write-back before they will start.
    likelihood: Medium
    impact: High
    mitigation: Target MGAs that can start with export-only workflows and build only the 2-3 most requested integrations after pilots prove value.
  - risk: Carrier guideline drift causes false confidence in live programs.
    likelihood: Medium
    impact: High
    mitigation: Version every rule set, require guideline-diff review before release, and treat overrides as monitored recertification events.
  - risk: Regulatory or carrier-oversight reviews extend sales cycles.
    likelihood: Medium
    impact: High
    mitigation: Ship human approval gates, model inventory, citation trails, and security documentation as standard deployment artifacts.
  - risk: Soft-market conditions reduce urgency around quote speed.
    likelihood: Medium
    impact: Medium
    mitigation: Anchor sales to new program launches, headcount freezes, carrier-oversight demands, and classes where submission volatility remains high.
fundingAsk:
  round: seed
  targetFundingRangeUsd: "$3-5M"
  runwayMonths: 18
  useOfFundsSummary: >-
    18 months of runway should fund the founding product team, 3-5 design-partner
    deployments, reusable rule-authoring and audit controls, the first PAS or
    workbench connectors, and proof that one-program pilots convert into
    repeatable multi-program subscriptions before scaling sales.
