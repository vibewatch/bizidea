  validationPlan:
  - priority: high
    question: How many submissions per month, off-appetite touches, and referral memos does the beachhead MGA actually process by program?
    evidenceToGather: Interview 8-10 CUOs and underwriting-ops leaders and request anonymized weekly workflow metrics by program.
  - priority: high
    question: Can one launch program show faster turnaround plus fewer unnecessary referrals on historical submissions?
    evidenceToGather: Replay 300-500 historical submissions from two design-partner programs and compare compiler output against human outcomes.
  - priority: medium
    question: What minimum integration footprint is acceptable for the first deployment?
    evidenceToGather: Validate whether email ingestion plus memo export is enough before PAS write-back, with one PAS/workbench partner in the loop.
