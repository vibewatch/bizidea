  searchedQueries:
  - Find recent authoritative sources on the U.S. excess and surplus insurance market size, delegated authority or MGA market growth, and small commercial underwriting volumes relevant to MGAs.
  - Find recent authoritative sources about underwriting workflow pain in commercial insurance MGAs, including submission intake bottlenecks, manual triage, quote turnaround pressure, and underwriter staffing constraints.
  - Find authoritative sources on insurance AI governance and regulation in the United States, especially NAIC guidance, model bulletins, unfair discrimination, documentation, auditability, and data security relevant to underwriting automation.
  - Identify leading workflow, underwriting intake, or underwriting workbench software vendors serving commercial insurance or MGAs, with company pages, case studies, or funding coverage for Cytora, Federato, Send Technology, Indico Data, and related players.
  - Find technical and standards sources relevant to insurance submission ingestion and underwriting automation, such as ACORD forms standards, document AI or OCR guidance, and insurer workflow digitization case studies.
  - Find authoritative insurer and trade-association sources about MGAs, delegated authority, and program business in the U.S., including TMPAA, WSIA, AM Best, Insurance Journal, and Business Insurance.
  - Find authoritative sources from McKinsey, Deloitte, Accenture, WTW, BCG, or Capgemini on commercial insurance underwriting productivity, underwriter admin burden, submission triage, and AI or workflow transformation.
  - Find direct fetchable URLs on the TMPAA or WSIA websites that explain program business, surplus lines, or MGA market structure and are publicly accessible.
  - Find public company or customer pages with measurable case studies for Cytora, Federato, Send Technology, Convr, Indico Data, or Kalepa in underwriting automation.
  - Find direct fetchable URLs for the actual NAIC model bulletin on the use of artificial intelligence systems by insurers or official NAIC AI governance pages.
