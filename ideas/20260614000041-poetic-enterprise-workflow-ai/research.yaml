competitors:
- name: Cytora
  stage: scale-up
  wedge: Risk digitization and underwriting workflow automation for carriers, brokers, and MGAs.
  pricing: Custom enterprise pricing; not publicly disclosed.
  strength: Strong proof around productivity uplift and broad insurer adoption.
  weaknessVsUs: Broader workflow scope is credible, but the reviewed evidence does not show a narrow deterministic compiler for program-specific referral logic and memo generation.
  sourceRefs:
  - 21
  - 22
  - 35
- name: Federato
  stage: scale-up
  wedge: AI-native underwriting prioritization, winnability, and submission-to-quote workflow.
  pricing: Custom enterprise pricing; not publicly disclosed.
  strength: Strong at appetite alignment and time-to-quote reduction in specialty environments.
  weaknessVsUs: Prioritization and portfolio steering are adjacent to, but not the same as, deterministic codification of every carrier threshold and referral packet.
  sourceRefs:
  - 23
  - 24
  - 37
- name: Send
  stage: scale-up
  wedge: Delegated-underwriting and specialty-insurance workflow platform with compliance and workflow breadth.
  pricing: Custom enterprise pricing; not publicly disclosed.
  strength: Deep operational breadth and credibility in delegated underwriting.
  weaknessVsUs: A broad platform can be heavier to implement and less opinionated about translating tacit underwriter playbooks into executable rule graphs.
  sourceRefs:
  - 25
  - 26
  - 38
- name: Convr
  stage: scale-up
  wedge: Submission intake, risk context, and AI underwriting workbench for carriers and MGAs.
  pricing: Custom enterprise pricing; not publicly disclosed.
  strength: Strong on extraction, intake, and contextual data for thin-file submissions.
  weaknessVsUs: It centers more on intake and context assembly than on deterministic compilation of carrier appetite and referral logic into auditable memos.
  sourceRefs:
  - 27
  - 34
  - 40
- name: Kalepa
  stage: scale-up
  wedge: AI underwriting intelligence focused on triage, risk analysis, and profitable quote acceleration.
  pricing: Custom enterprise pricing; not publicly disclosed.
  strength: Strong MGA proof points around prioritization, inbox coverage, and quote-to-bind improvement.
  weaknessVsUs: The emphasis is underwriting intelligence and prioritization rather than explicit compiler-style governance of referral thresholds and memo output.
  sourceRefs:
  - 30
  - 36
