market:
  tam:
    value: $250.0M
    rationale: 'Bottom-up: model >1,000 U.S. MGAs × 5 initially automatable carrier or program workflows × ~$50k annual software spend per workflow; cross-check: $250M is ~0.22% of the $114.1B 2024 U.S. MGA premium estimate and sits inside a $56.8B delegated-underwriting channel.'
    isEstimate: true
    sourceRefs:
    - 4
    - 5
  sam:
    value: $75.0M
    rationale: 'Beachhead filter: assume ~30% of the >1,000 MGA universe matches the small-commercial E&S operating profile in the thesis (≈300 MGAs), with the same 5 workflows × $50k spend.'
    isEstimate: true
    sourceRefs:
    - 3
    - 4
  som:
    value: $2.5M
    rationale: 'Year-3 reachable case: 25 MGAs × 2 live programs × ~$50k annual spend after proving turnaround and appetite-control ROI in one launch program.'
