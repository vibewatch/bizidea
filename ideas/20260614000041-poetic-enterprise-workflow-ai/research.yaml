openQuestions:
- 'What annual budget line item will beachhead MGAs actually use for a workflow compiler: underwriting tech, operations productivity, or carrier-program support?'
- How frequently do carrier guidelines change by class and program, and who truly owns those updates inside the MGA?
- Can phase-one deployment succeed with email and attachment ingestion plus memo export, or is PAS write-back mandatory on day one?
- Will fronting carriers or delegated-authority partners actively sponsor adoption if auditability improves, or will the sale remain purely MGA-led?
