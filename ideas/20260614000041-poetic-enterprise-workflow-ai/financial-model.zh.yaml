slug: mga-underwriting-compiler
date: '2026-06-14'
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-07
  unit: month
  source: '[BP date] 支出从 2026-06-14 这份 business-plan 之后的下一个月份开始。'
- id: A2
  name: seed 交割后的起始现金
  value: '3.0'
  unit: USDM
  source: '[BP fundingAsk targetFundingRangeUsd $3-5M] 基准情形取区间下限，因为在第二个项目的扩张逻辑被证明之前，招聘计划都保持克制。'
- id: A3
  name: 模型里的客户单位
  value: 1 个客户 = 1 个已上线的活跃保险公司项目
  unit: definition
  source: '[BP businessModel unitOfValue] 收入和客户数按已上线项目层面建模，而不是按 MGA 账户层面。'
- id: A4
  name: 每个活跃项目的混合年收入
  value: '55.0'
  unit: USDK per active program-year
  source: '[BP gtm.pricing; BP market.som; Research reportMemo.willingnessToPay] 基准情形假设，其中大约 $48k-$52K 是经常性价值，另有少量配置费或用量档位收入，在首年里摊开。'
- id: A5
  name: 毛利率
  value: '70'
  unit: percent
  source: '[BP businessModel targetGrossMarginPct]'
- id: A6
  name: 月流失率
  value: '1.3'
  unit: percent
  source: '[BP businessModel expansionLevers; Research reportMemo.customerAndBuyer] 这类工作流软件一旦嵌进运营里，黏性通常不低；但项目式预算仍会带来早期续约风险，所以保留一个不为零的流失假设。'
- id: A7
  name: Y1 月末活跃项目数
  value: 'M1-M12: 0, 0, 0, 0, 1, 1, 1, 2, 2, 2, 3, 3'
  unit: count
  source: '[BP milestones 0-12 months] 按这个节奏，前两笔付费实盘试点会转成真实生产项目，再加上一个新增生产项目，形成保守的一年级付费爬坡。'
- id: A8
  name: Y2 季末活跃项目数
  value: Q1Y2 5; Q2Y2 8; Q3Y2 12; Q4Y2 16
  unit: count
  source: '[BP milestones 12-24 months] 这个节奏落在第 24 个月“15–20 个已上线保险公司项目”的目标区间之内。'
- id: A9
  name: Y3 季末活跃项目数
  value: Q1Y3 22; Q2Y3 29; Q3Y3 37; Q4Y3 45
  unit: count
  source: '[BP market.som; BP milestones 24-36 months; Research reportMemo.distributionChannels] 基准情形在第 3 年结束时，仍低于 50 个项目的 SOM 天花板，同时假设新增 ARR 大头来自第二项目扩张和合作伙伴。'
- id: A10
  name: 创始人 / CEO 的全成本现金薪酬
  value: '120.0'
  unit: USDK per year
  source: 创业公司财务常用假设：这是 seed 阶段创始人低于市场价的薪酬。
- id: A11
  name: 创始工程师的全成本现金薪酬
  value: '210.0'
  unit: USDK per year
  source: 创业公司财务常用假设：按保险工作流软件里的资深创始工程师测算。
- id: A12
  name: 产品与规则负责人的全成本现金薪酬
  value: '180.0'
  unit: USDK per year
  source: 创业公司财务常用假设：这是兼具产品和保险规则密度的关键岗位。
- id: A13
  name: 解决方案工程师的全成本现金薪酬
  value: '170.0'
  unit: USDK per year
  source: 创业公司财务常用假设：覆盖实施、安全和集成支持。
- id: A14
  name: GTM 负责人的全成本现金薪酬
  value: '180.0'
  unit: USDK per year
  source: 创业公司财务常用假设：这是一个需要行业信任背书的早期销售与合作岗位。
- id: A15
  name: 平台工程师的全成本现金薪酬
  value: '185.0'
  unit: USDK per year
  source: 创业公司财务常用假设：对应第一批 PAS / 工作台连接器和可复用平台能力。
- id: A16
  name: 合作伙伴成功与渠道经理的全成本现金薪酬
  value: '145.0'
  unit: USDK per year
  source: 创业公司财务常用假设：这是首个专门负责伙伴赋能和扩张支持的岗位。
- id: A17
  name: 招聘节奏
  value: M1 创始人 / CEO 和创始工程师；M3 产品与规则负责人；M6 解决方案工程师；M9 GTM 负责人；M16 平台工程师；M30 合作伙伴成功与渠道经理
  unit: timing
  source: '[BP team startTiming; BP product twelveMonth; BP milestones 24-36 months] 这样到 Y3 结束时团队仍控制在 8 名以内，同时也给第一批连接器和伙伴动作留出预算。'
- id: A18
  name: 职能薪酬分摊
  value: 创始人 70% S&M / 30% G&A；创始工程师 100% R&D；产品与规则负责人 100% R&D；解决方案工程师 20% S&M / 70% R&D / 10% G&A；GTM 负责人 100% S&M；平台工程师 100% R&D；合作伙伴成功与渠道经理 60% S&M / 40% G&A
  unit: allocation
  source: '[BP team rationales] 这套分摊对应的是销售、实施、连接器研发和伙伴管理的实际归属。'
- id: A19
  name: 非薪酬经营支出
  value: S&M 在 GTM 负责人入场前每月 6K，之后 10K，合作伙伴岗位到位后 13K；R&D 工具与云支出起步 10K，解决方案岗位到位后 12K，平台工程师加入后 15K；G&A 在 Y1 每月 8K，之后每月 10K
  unit: USDK per month
  source: 创业公司财务常用假设：即便在更大现场销售团队到位前，保险工作流软件也要背上差旅、安全、合规和云支出。
- id: A20
  name: 现金转换规则
  value: 用 EBITDA 近似现金变动
  unit: policy
  source: 创业公司财务常用假设：这是一家 seed 阶段软件公司，模型里不单独拆债务、capex、税项或明显的营运资本波动。
- id: A21
  name: 首期收入确认规则
  value: Y1 的新已上线项目按半个月计收入；Y2-Y3 按半个季度计收入
  unit: policy
  source: 创业公司财务常用假设：把每个期间内的上线时间做平滑处理，让收入能和活跃项目爬坡对上。
- id: A22
  name: 每个活跃项目的混合 CAC
  value: '30.0'
  unit: USDK
  source: '[BP gtm.funnelTargets; BP gtm.channels; Research reportMemo.distributionChannels] 混合 CAC 假设里，既有创始人主导的新客户销售，也有成本更低的第二项目扩张和伙伴转介绍。'
- id: A23
  name: seed 轮目标
  value: 做到 8–10 家生产级 MGA、15–20 个已上线项目、1 个可复用的 PAS / 工作台连接器，以及 2 个活跃分发合作伙伴，并保留约 6 个月缓冲
  unit: milestone
  source: '[BP milestones 12-24 months; BP fundingAsk runwayMonths 18] 这里按 18 个月执行 + 6 个月融资缓冲建模。'
