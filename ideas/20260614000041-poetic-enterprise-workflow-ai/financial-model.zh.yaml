scenarios:
  downside:
    description: 试点转化变慢、第二项目扩张更晚到来，公司在 Y3 结束时只有 36 个已上线项目，且每个项目年的混合价值降到 $50K。
    y3RevenueK: 1206.3
    y3EbitdaK: -762.2
    cashLowPointK: 158.5
    keyAssumptionChanges:
    - 季末活跃项目数从 5、8、12、16 和 22、29、37、45，下修到 4、7、10、13 和 18、24、30、36。
    - 每个项目年的混合价值从 $55K 降到 $50K。
    - 由于更多客户导入和规则维护仍靠人工，毛利率从 70% 滑到 67%。
  base:
    description: 基准情形里，前几批试点会在 Y2 结束前转成 16 个已上线项目，到 Y3 结束时做到 45 个，同时把团队规模控制在 8 人以内，每个项目年的混合价值维持在 $55K。
    y3RevenueK: 1629.5
    y3EbitdaK: -429.7
    cashLowPointK: 580.1
    keyAssumptionChanges:
    - 季末活跃项目数按 A8 和 A9 走。
    - 毛利率维持在 BP 设定的 70% 目标。
    - 招聘按 A17 执行，也就是在伙伴杠杆跑出来之前，团队始终保持克制。
  upside:
    description: 如果模板复用和伙伴转介绍更早起飞，到 Y3 结束时就能做到 50 个已上线项目，每个项目年的混合价值也能拉到 $58K。
    y3RevenueK: 1928.6
    y3EbitdaK: -181.9
    cashLowPointK: 850.1
    keyAssumptionChanges:
    - 季末活跃项目数抬到 6、10、14、18 和 24、33、42、50。
    - 随着用量档位和审计模块挂上去，每个项目年的混合价值从 $55K 拉高到 $58K。
    - 由于上线手册和连接器复用得更好，毛利率从 70% 提升到 72%。
sensitivity:
- variable: ARPU
  downsideCase: 由于买家始终把产品限定在首个项目初筛里，每个项目年的混合价值最后落在 $50K。
  baseCase: 每个项目年的混合价值按模型维持在 $55K。
  upsideCase: 随着审计模块和更高用量档位挂上去，每个项目年的混合价值提升到 $58K。
  y3RevenueImpactK: -148.2
  cashImpactK: -134.0
- variable: CAC
  downsideCase: 如果创始人主导的试点没能顺利转成可复制的伙伴来源机会，CAC 会抬到 $38K。
  baseCase: 按混合口径看，CAC 维持在接近 $30K。
  upsideCase: 等第二项目扩张和转介绍开始贡献更多新增项目后，CAC 会降到 $24K。
  y3RevenueImpactK: -192.5
  cashImpactK: -182.8
- variable: churn
  downsideCase: 如果部分买家只把它当成“单项目止痛贴”，月流失率会抬到 2.0%。
  baseCase: 月流失率按模型维持在 1.3%。
  upsideCase: 当续保、代理承保 QA 和伙伴工作流一起把足迹做深后，月流失率会降到 1.0%。
  y3RevenueImpactK: -96.3
  cashImpactK: -67.5
- variable: 销售周期
  downsideCase: 如果合规和变更控制审查拖慢上线，试点转生产会拉长到 6–7 个月。
  baseCase: 试点转生产大约需要 4–5 个月，和“付费回放 + 60 天实盘试点”的打法一致。
  upsideCase: 如果有值得信任的伙伴帮忙背书，部署批准时间可以缩到约 3–4 个月。
  y3RevenueImpactK: -247.6
  cashImpactK: -226.3
- variable: 毛利率
  downsideCase: 如果规则维护和客户导入仍更像服务活，毛利率只能守在 67%。
  baseCase: 毛利率按 BP 目标维持在 70%。
  upsideCase: 随着上线手册和连接器复用变强，毛利率能做到 72%。
  y3RevenueImpactK: 0.0
  cashImpactK: -63.2
- variable: 招聘节奏
  downsideCase: 如果在扩张逻辑还没坐实前，就把平台工程师和伙伴成功岗位各提前一个季度招进来，现金会被更快消耗。
  baseCase: 招聘按 A17 走，Y3 结束前团队始终低于 8 个 FTE。
  upsideCase: 如果伙伴杠杆如期到位，一些非关键岗位可以晚一个季度再补，且不伤收入。
  y3RevenueImpactK: 0.0
  cashImpactK: -82.8
modelDiagram:
  title: 单位经济流转图
  mermaid: |
    flowchart LR
      ReplayDemand --> PaidPilots
      PaidPilots --> LivePrograms
      LivePrograms --> SecondPrograms
      SecondPrograms --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
- checkName: 收入引擎
  finding: 基准情形的收入引擎，是把已上线项目数从 Y1 结束时的 3 个，拉到 Y3 结束时的 45 个；每个项目年按 $55K 混合价值计算，而 Y2 之后的大头增长来自第二项目扩张和合作伙伴。
- checkName: 必须跑通的前提
  finding: 模型最依赖的是：先用仅导出部署拿下客户，再用可复用规则模板把首个项目上线时间压在 45 天内；只有这样，一名解决方案工程师撑早期规模、毛利率守在 70%，才说得通。
- checkName: 模型会在哪些情况下失效
  finding: 如果 ARPU 掉到接近 $50K，或试点转生产被拉到 6–7 个月，现金很快就会压向下行情形里约 $157K 的低点，seed 轮大概率还要补桥接资金。
- checkName: 下一轮融资证明
  finding: 想把 Series A 讲扎实，至少要在现金缓冲掉到约 6 个月前，做到 8–10 家生产级 MGA、15–20 个已上线项目、1 个可复用的 PAS / 工作台连接器，以及 2 个活跃分发合作伙伴。
sanityChecks:
  ruleOf40: Y3 增长 243.5% + EBITDA 利润率 -26.4% = 217.1%（这个数字被仍然很小的 Y2 收入基数抬高了）。
  burnMultiple: Y2 的烧钱倍数大约为 1.5x；随着第二项目扩张贡献更多毛利，到 Y3 会改善到约 0.3x。
  revenuePerFte: Y3 年末 FTE 对应的人均收入约为 $233K（对比垂直 SaaS 常见的约 $200K-$400K 区间）。
  flags:
  - 基准情形仍要求公司在 Y3 把已上线项目数从 16 个拉到 45 个，所以第二项目扩张和合作伙伴渠道必须接棒，不能一直只靠创始人卖。
  - $55K 的混合项目年价值里，已经含有一部分配置费和用量档位收入，因此真正的订阅 ARR 会略低于总收入。
  - 基准情形下现金最低点接近 $0.6M；如果合规审查或连接器研发把销售周期往下行情形方向拖，缓冲会明显不够。
  - 到 Y3，人均收入约 $233K；对于一个带一定服务辅助的切口，这还算可接受，但离最优 SaaS 效率仍有距离。
