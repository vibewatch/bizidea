slug: mga-underwriting-compiler
date: '2026-06-14'
executiveSummary: 这家公司应该先从面向美国小型商业险 E&S MGA 的确定性投保资料编译器做起，因为这些团队里仍有 10–50 名承保人靠手工翻经纪人邮件、PDF 和保险公司指引来做初筛。最痛的不是“会不会总结”，而是如何在不踩保险公司承保口径、不制造超口径触点、也不让资深承保人反复重写同一份转审备忘录的前提下，把判断做得更快。首个产品要先吃掉单一保险公司项目里的邮件、PDF、ACORD 表单和历史出险记录，按明确规则给每份投保资料分类，补抓缺失证据，再起草带引用的转审备忘录，交给人工审批。第一单最好卖成一笔付费历史回放 + 60 天实盘试点，客户是每月 1,000+ 份投保资料的 MGA；触发点可以是积压暴涨、新代理承保项目上线，或管理层要求在不招人的情况下提升周转。研究支撑的滩头 SAM 约为 $75.0M，第 3 年 SOM 约为 $2.5M；但风投逻辑能不能成立，关键看单项目部署是否真能顺着更多项目、续保、代理承保 QA 和精选保险公司流程一路扩出去。公司有机会赢，是因为相邻厂商大多只优化摄取、优先级或平台广度，而这个切口盯的是确定性规则编译、带出处的输出，以及可审计的覆写捕获。最大的反证风险在于：每个保险公司项目都要大量定制化规则映射或深度 PAS 集成，那软件毛利就会被服务活干塌。所以前 6 个月必须先证明历史回放准确率、仅导出部署的可行性，以及市场愿意按这个价格买单，然后再去扩销售团队或加相邻模块。
problem:
- 高量级 E&S MGA 仍靠共享收件箱、PDF、电子表格和历史样例处理经纪人投保资料，因此报价周转变慢，超口径风险还会吞掉稀缺的承保人时间。
- 泛化 AI 副驾能写文案，却没法以 CUO 愿意信的方式，把保险公司承保口径、转审阈值、变更控制和可审计的判断理由稳定编码进去。
solution:
- 把保险公司指引、转审规则和缺失文件逻辑编译成确定性决策图——把每份投保资料转成“接受 / 拒绝 / 补资料 / 转审”的建议，并附上带出处的事实。
- 给承保人一套工作台：缺什么证据一眼看清、转审备忘录自动起草、每次覆写都被记录，所有例外都变成可复用的规则更新，而不是继续藏在人的经验里。
whyWeWin:
- 产品切进的是一个窄但值得花预算的工作流：积压、报价速度和保险公司监管，本来就是按项目逐个量化的。
- “确定性规则编译 + 带出处的备忘录输出”比更大平台里顺手打包的收件或优先级功能，差异要清楚得多。
- 项目级决策图、覆写历史和规则变更日志，会慢慢滚成一条运营护城河，服务公司和老厂商的点状功能都很难复刻。
strategicChoices:
  beachhead: 美国小型商业险 E&S MGA，承保承包商险和住宅类风险，横跨 5–20 个保险公司项目，配 15–40 名承保人，每月处理 1,000+ 份投保资料。
  wedgeRationale: 先拿一个保险公司项目的初筛流程开刀，比一上来替掉整套承保平台更容易证明价值；因为买方不用替换 PAS 或工作台系统，就能直接对比既有队列里的积压、转审质量和周转速度。
  sequencingRationale: 先做一个痛点最强项目的“仅导出 + 人工审批”初筛，再补可复用规则模板和第二个项目的铺开工具；更往后，才是续保、代理承保 QA 和更深的集成。这种顺序既能更快出首个价值，也能尽早验证公司做出来的是软件，而不是定制化实施。
  notYet:
  - 大范围的保险公司端或标准承保市场部署
  - 整套承保工作台替换
  - 没有人工批准就自动绑定或自动拒保
  - 在第一个项目跑出可复制性之前，不碰理赔、续保或保单服务
market:
  tam: $250.0M 估算 TAM：>1,000 家美国 MGA × 每家 5 个可自动化的保险公司或项目工作流 × 每个工作流每年约 $50k 的软件支出。
  sam: $75.0M 估算滩头 SAM：按约 300 家符合初始画像的小型商业险 E&S MGA 计算，假设仍是 5 个工作流 × 每个 $50k 支出。
  som: $2.5M 第 3 年 SOM：25 家 MGA × 每家 2 个已上线项目 × 每个项目每年约 $50k；前提是先在首个项目里把 ROI 跑出来。
  segments:
  - 拥有 5–20 个保险公司项目、每月 1,000+ 份投保资料的美国小型商业险 E&S MGA
  - 需要更干净转审治理的区域性 P&C 保险公司或 fronting 保险公司，它们在管理代理承保项目
  buyingProcess: 一线承保人和承保运营经理最先感到疼，但预算通常握在 CUO 或 COO 手里，很多时候还要拉上运营、IT 和保险公司项目相关方一起签字。最快的推进方式，是围绕积压、新项目上线或周转 KPI 压力，卖一笔付费回放和单项目试点；等转审质量和可审计性跑出来，再批生产。
product:
  mvp: MVP 先覆盖一个小型商业险保险公司项目：从邮件 / PDF / ACORD 摄取开始，做确定性承保口径校验、缺失信息请求、带出处的转审备忘录草稿和人工审批队列。在任何深度 PAS 回写之前，先能把决策导回既有收件箱或工作台流程。
  sixMonth: 前 6 个月要跑通一个真实项目，并交付历史回放工具、版本化规则编写、指引变更告警和转审备忘录引用，同时把首个项目的部署时间压在 45 天以内。
  twelveMonth: 12 个月内，补齐前 10–20 个常见规则模式的模板、有限的 PAS 或工作台集成、第二个项目的铺开工具，以及让老客户开始信任的续保收件能力。
  twentyFourMonth: 24 个月后，再把同一套编译器、审计轨迹和变更管理层扩到多项目 MGA、代理承保 QA，以及精选保险公司部署。
  keyBets:
  - 只靠邮件、PDF、ACORD 收件加上备忘录导出，就足以在 PAS 回写之前拿下第一批试点。
  - 前 10–20 个规则模式，已经足够覆盖承包商险和住宅类风险的大头逻辑，让后续项目更快上线。
  - 带出处的确定性输出加人工批准，会比泛化 AI 副驾建议更容易得到承保人信任。
  - 指引变更工具和覆写捕获，足以在不堆大服务团队的前提下，把规则漂移控制在可管范围内。
gtm:
  wedge: 先在一个积压严重的保险公司项目上卖付费历史回放和 60 天实盘试点；等 MGA 看到周转变快、不必要的转审减少、承保口径执行更干净后，再转成年生产合同。
  channels:
  - 由创始人主导外呼，直打目标 MGA 的 CUO、COO 和承保运营负责人
  - 已经参与工作流变更项目的 PAS、承保工作台和投保资料管理集成商
  - 希望提升监管能力和导入速度的保险运营咨询公司或保险公司项目合作方
  funnelTargets: 合格账户→历史回放 30-40%；回放→付费实盘试点 50%+；试点→生产 60%+；首个新增项目在 9 个月内售出，并覆盖 50% 的生产账户。
  pricing: 先收一笔初始承保手册映射费，再按活跃保险公司项目和投保资料量档位收年度平台费。这既贴合买家真实的痛感，也支撑首个已上线项目约 $40k-$60k ACV；随着更多项目上线，扩张也很顺。
businessModel:
  revenueStreams:
  - 按活跃保险公司项目收取的年度平台订阅
  - 实施费和承保手册配置费
  - 面向更多已处理投保资料、更多项目和审计模块的用量或增购收费
  unitOfValue: 通过承保编译器处理的活跃保险公司项目
  targetGrossMarginPct: 70
  expansionLevers:
  - 在首个项目跑通后，向同一家 MGA 铺开更多保险公司项目
  - 当投保资料初筛被信任后，再加续保、批单和代理承保 QA
  - 向已连接到 MGA 账户的保险公司或 fronting 合作方，销售审计、对标和监管模块
strategyMap:
  northStarMetric: 在没有无引用超口径决策的前提下，每位承保人每天被推进到“可报价”或“可转审”状态的投保资料数。
  inputMetrics:
  - 从收到投保资料到做出首次初筛判断的中位小时数
  - 无需大幅返工就能自动分流或预填的投保资料占比
  - 编译器建议被承保人覆写的比例
  - 一个新保险公司项目从启动到上线所需天数
  - 每个生产客户已上线的项目数
  - 一条指引变更从发布到生产可用所需时间
  moatsToBuild:
  - 横跨多个保险公司项目的项目级决策图和覆写历史
  - 跟保险公司指引更新绑定的规则变更差异与认证日志
  - 横跨邮件、PDF、ACORD 和 PAS 场景的标准化“投保资料到决策”数据
  - 按险种沉淀的已接受转审备忘录模式库和缺失信息工作流
  killCriteria:
  - 前 20 家目标 MGA 里，愿意共享历史投保资料并赞助付费回放的，不到 3 家。
  - 两套回放数据都无法同时做到：在限定范围内的接受 / 转审 / 拒绝逻辑上至少 90% 一致，或把人工初筛时间至少压缩 30%。
  - 前 3 个生产部署之后，第二个项目的中位上线时间仍高于 45 天。
  - 前 4 个付费试点后，试点转生产转化率低于 50%。
  - 超过 70% 的合格机会在试点前就坚持必须做完整 PAS 回写。
  mermaid: |
    flowchart LR
      Wedge[One carrier-program submission triage wedge] --> MVP[Deterministic compiler MVP]
      MVP --> Proof[Faster quote turnaround plus cited referral memos]
      Proof --> Expansion[More programs then renewals and carrier oversight]
investorMemo:
  verdict:
    call: 见面 / 继续尽调
    conviction: 这是个有意思的受监管工作流切口，紧迫性也可信；但能否真正建立信念，取决于首个项目部署能不能复用足够多的规则对象，让模式保持像软件而不是像服务。
    whyBelieve: 这套计划把产品、定价和分发，都绑在一个增长中的 MGA 渠道里真实存在的积压事件上，而审计性本来就是这份工作的核心组成。
    whyDoubt: 如果现有工作台、代理承保平台或服务团队，也能以差不多的速度把同样的项目逻辑编码进去，这家独立公司的利润空间和风投规模逻辑都会明显变弱。
    nextDiligence: 先看两份历史回放结果和一份实盘试点方案，核验限定范围内的规则一致率是否超过 90%，仅导出部署是否可行，以及买方是否愿意按活跃项目付费。
  firstCustomer:
    title: 积压严重的小型商业险 E&S MGA
    profile: 一家美国 MGA：15–40 名承保人、每月 1,000+ 份投保资料，并且在承包商险或住宅类险种里，至少有一个保险公司项目的报价周转和转审队列已经明显恶化。
    trigger: 投保激增、新代理承保项目上线，或管理层要求在不增加承保人编制的情况下提升周转。
    buyer: CUO 或 COO
    initialContract: $15k-$25k 的付费回放 + 60 天实盘试点，先覆盖一个保险公司项目；转生产后，首个已上线项目的年度 ACV 约为 $40k-$60k，后续随更多项目上线继续扩张。
  mustBeTrue:
  - 至少 25 家滩头 MGA，必须各自拥有一个投保资料密度和积压痛感都足以支撑约 $50k 年支出的项目。
  - 在真实上线前，历史回放必须在限定范围内的初筛逻辑上做到至少 90% 一致，并把人工初筛时间至少压缩 30%。
  - 邮件、PDF、ACORD 摄取加备忘录导出，必须足以让至少一半早期试点在没有 PAS 回写的情况下起步。
  - 至少一半生产客户，必须能在 9–12 个月内从一个已上线项目扩到第二个。
  - 在多场竞争性评估里，买方必须更愿意选择确定性编译器叠层，而不是被打包进工作台或收件工具里的功能。
  diligenceQuestions:
  - 哪些险种和保险公司项目，会反复制造最高的转审量和缺失信息量？
  - 这笔采购在实务里到底记在哪条预算线上：承保科技、运营效率，还是保险公司项目支持？
  - 保险公司指引多久变一次，MGA 内部又是谁真正负责规则更新和认证？
  - 共创客户能否从仅导出部署起步，还是 PAS 或工作台回写会直接卡死采用？
  - 为什么 MGA 不会直接延展 Cytora、Federato、Send、Convr、Kalepa，或内部运营工具，而要买这层叠加产品？
operatingAssumptions:
- assumption: 第一阶段部署可以只靠邮件、PDF、ACORD 摄取加备忘录导出起步，不需要 PAS 回写。
  basis: research.yaml
  validationTest: 签下 2 个只跑导出模式的付费试点，验证在任何回写集成开工之前，周转改善是否已经肉眼可见。
  decisionImpact: 如果不成立，就要更早招集成人才，把 ICP 收窄到更简单的系统栈，同时上调融资需求。
- assumption: 前 10–20 个规则模式足以覆盖承包商险和住宅类风险里的大部分逻辑，并让新项目模板化。
  basis: idea.yaml
  validationTest: 把前 3 个共创客户项目都映射出来，确认至少 70% 的决策对象复用了共享规则库。
  decisionImpact: 如果不成立，就要收窄到单一业务险种，或接受一个更重服务、毛利更低的模式。
- assumption: 在 ROI 被证明之后，买方会接受“按活跃项目计费 + 按投保资料量分档”的定价方式。
  basis: idea.yaml
  validationTest: 和 CUO 或 COO 做 8 场定价访谈，并拿下 2 份明确锚定到“按项目计费”的试点范围。
  decisionImpact: 如果不成立，就要把包装改成按席位或企业最低消费，并重算 SAM 假设。
- assumption: 历史回放的准确率足够有预测性，足以卖出付费实盘试点。
  basis: research.yaml
  validationTest: 对 2 套各含 300–500 份投保资料的数据做回放；若限定范围内的初筛结果一致率低于 90%，就不进入真实部署。
  decisionImpact: 如果不成立，销售就得靠更长的评估期或偏服务化的审计项目推进，GTM 会明显变慢。
- assumption: 在完整外勤销售团队到位前，第二个项目的扩张就能发生。
  basis: operator judgment
  validationTest: 在前 12 个月内，靠创始人主导销售，在前 4 个生产账户里至少拿下 2 个第二项目扩张。
  decisionImpact: 如果不成立，就要更早补账户管理岗位，并为更重直销动作多准备一些资本。
experimentRoadmap:
- horizon: 0–90 天
  experiment: 从目标 MGA 收集投保资料与转审基线
  hypothesis: 少数几个项目和险种，已经贡献了大部分积压，足以锚定第一套模板库。
  successMetric: 完成 12 场买方访谈，收集到 5 份匿名周度指标包，并确认前 10 个规则模式已解释至少 60% 的人工转审量。
  owner: 创始人 / CEO
- horizon: 0–90 天
  experiment: 在两个启动项目上回放历史投保资料
  hypothesis: 在任何真实部署之前，限定范围内的确定性规则就能贴近承保人的初筛判断，并显著缩短备忘录准备时间。
  successMetric: 两套各含 300–500 份投保资料的数据都做到：限定范围内的结果一致率至少 90%，分析师准备时间至少下降 30%。
  owner: 创始工程师
- horizon: 90–180 天
  experiment: 上线仅导出模式的实盘试点
  hypothesis: 只靠邮件、PDF、ACORD 摄取加备忘录导出，就足以在 PAS 回写前跑出真实 ROI。
  successMetric: 2 个付费试点在没有 PAS 回写的情况下上线，并且各自在启动后 30 天内产出第一批初筛结果。
  owner: 创始工程师
- horizon: 90–180 天
  experiment: 测试定价和试点包装
  hypothesis: 对 CUO 和 COO 来说，按项目计费比按席位计费更容易成交。
  successMetric: 10 场定价对话里有 6 场偏向按项目方案，且有 2 份已签试点范围采用这一方案。
  owner: 创始人 / CEO
- horizon: 6–12 个月
  experiment: 把第二个项目的铺开流程模板化
  hypothesis: 共享规则对象和指引变更工具，能把下一项目的部署时间明显压下来。
  successMetric: 2 个客户的第二个项目都能在 45 天内上线，且规则对象复用率至少达到 70%。
  owner: 产品与规则负责人
- horizon: 12–18 个月
  experiment: 激活合作伙伴渠道
  hypothesis: 一旦有案例，PAS / 工作台集成商和保险运营咨询公司就能带来更低 CAC 的机会。
  successMetric: 20% 的合格管道来自 2 个活跃合作伙伴，且试点转化率与创始人外呼相比，差距不超过 10 个点。
  owner: GTM 负责人
operations:
- 维护一套版本化的保险公司指引库，所有已上线规则图都要做差异复核和季度再认证。
- 每周和客户一起复盘覆写记录，让例外沉淀成可复用的规则更新，而不是继续变成工单队列。
- 在支持深度 PAS 回写前，先把 ACORD、邮件、PDF 摄取和备忘录导出标准化。
- 把人工批准闸门、引用轨迹、模型清单和安全文档做成默认控制项。
- 等参考承保手册稳定后，再借 PAS、工作台和保险运营伙伴放大实施效率。
team:
- role: 创始人 / CEO
  startTiming: Month 0
  rationale: 在这个靠行业信任成交的有限市场里，负责 CUO / COO 访谈、定价和共创客户转化。
- role: 创始工程师
  startTiming: Month 0
  rationale: 搭出编译器、摄取管线、审计轨迹和回放工具，跑出第一个硬证明。
- role: 产品与规则负责人
  startTiming: Month 3
  rationale: 把保险公司指引和覆写模式沉淀成可复用规则对象，避免部署滑向定制化服务。
- role: 解决方案工程师
  startTiming: Month 6
  rationale: 缩短试点导入，处理 PAS / 工作台集成边角，并回答安全与实施问题。
- role: GTM 负责人
  startTiming: Month 9
  rationale: 只有当试点转生产和第二项目扩张都变得可见后，才开始放大可复制的管道和伙伴管理。
milestones:
- horizon: 0–12 个月
  items:
  - 在承包商险和住宅类项目里签下 5 个共创客户。
  - 上线 2 个付费实盘试点，并至少把其中 1 个转成生产 ARR。
  - 在首个已上线项目里，证明首次触达或报价周转至少提速 30%，不必要转审至少减少 20%。
  - 把首个项目部署时间稳定压在 45 天以内。
  - 交付版本化规则编写、带出处的转审备忘录和指引变更告警。
- horizon: 12–24 个月
  items:
  - 做到 8–10 家生产级 MGA，以及 15–20 个已上线保险公司项目。
  - 对已经信任仅导出流程的客户，补上续保和有限的 PAS / 工作台回写。
  - 至少一半生产账户拿下第二个项目扩张。
  - 跑起 2 个活跃分发合作伙伴。
- horizon: 24–36 个月
  items:
  - 扩到代理承保 QA 和精选保险公司监管工作流。
  - 拿下第一个由保险公司或 fronting 合作方赞助的部署。
  - 围绕规则漂移、转审率和不同项目原型的周转速度，做出对标数据产品。
  - 让扩张收入和合作伙伴来源的交易，成为新增 ARR 的大头。
risks:
- risk: 保险公司项目映射始终过于定制化，部署最后会变成服务活。
  likelihood: High
  impact: High
  mitigation: 把滩头市场收窄到承包商险和住宅类项目，给共享规则对象做版本，并在扩销售前先卡住复用阈值。
- risk: 现有工作台或代理承保平台把“够用”的初筛功能打包卖掉。
  likelihood: High
  impact: High
  mitigation: 接入现有系统栈，主打确定性转审逻辑、规则变更控制和可审计备忘录输出，而不是泛化收件。
- risk: 早期买家在起步前就要求深度 PAS 或工作台回写。
  likelihood: Medium
  impact: High
  mitigation: 先瞄准那些能从仅导出工作流起步的 MGA；等试点证明价值后，再只补最常被点名的 2–3 个集成。
- risk: 保险公司指引漂移，会让已上线项目里出现虚假的确定感。
  likelihood: Medium
  impact: High
  mitigation: 每套规则都做版本化；上线前必须做指引差异复核；每次覆写都当成需要被监控的再认证事件。
- risk: 监管或保险公司监管复核，把销售周期拖长。
  likelihood: Medium
  impact: High
  mitigation: 把人工批准闸门、模型清单、引用轨迹和安全文档，做成标准部署件。
- risk: 软市场环境削弱了“必须更快报价”的紧迫感。
  likelihood: Medium
  impact: Medium
  mitigation: 把销售锚在新项目上线、编制冻结、保险公司监管要求，以及投保波动仍然剧烈的险种上。
fundingAsk:
  round: seed
  targetFundingRangeUsd: $3-5M
  runwayMonths: 18
  useOfFundsSummary: 这 18 个月的跑道，应该足够覆盖创始产品团队、3–5 个共创客户部署、可复用的规则编写与审计控制、第一批 PAS 或工作台连接器，以及证明“单项目试点能否转成可复制的多项目订阅”这件事，再决定要不要放大销售。
