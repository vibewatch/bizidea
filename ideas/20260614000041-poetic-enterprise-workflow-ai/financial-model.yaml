assumptions:
- id: A1
  name: Model start month
  value: 2026-07
  unit: month
  source: '[BP date] Spend starts the month after the 2026-06-14 business-plan date.'
- id: A2
  name: Starting cash after seed close
  value: '3.0'
  unit: USDM
  source: '[BP fundingAsk targetFundingRangeUsd $3-5M] Base case uses the low end because the hiring plan stays lean until second-program expansion is proven.'
- id: A3
  name: Customer unit in the model
  value: 1 customer = 1 active live carrier program
  unit: definition
  source: '[BP businessModel unitOfValue] Revenue and customer counts are modeled at the live-program level rather than the MGA-logo level.'
- id: A4
  name: Blended annual revenue per active program
  value: '55.0'
  unit: USDK per active program-year
  source: '[BP gtm.pricing; BP market.som; Research reportMemo.willingnessToPay] Base case assumes about $48-52K of recurring value plus modest setup or volume-band revenue spread across the first year.'
- id: A5
  name: Gross margin
  value: '70'
  unit: percent
  source: '[BP businessModel targetGrossMarginPct]'
- id: A6
  name: Monthly churn
  value: '1.3'
  unit: percent
  source: '[BP businessModel expansionLevers; Research reportMemo.customerAndBuyer] Startup-finance heuristic for a sticky operational workflow that still carries early-stage renewal risk.'
- id: A7
  name: Year-1 month-end active programs
  value: 'M1-M12: 0, 0, 0, 0, 1, 1, 1, 2, 2, 2, 3, 3'
  unit: count
  source: '[BP milestones 0-12 months] Converts two paid live pilots and one additional production program into a conservative first-year paid ramp.'
- id: A8
  name: Year-2 quarter-end active programs
  value: Q1Y2 5; Q2Y2 8; Q3Y2 12; Q4Y2 16
  unit: count
  source: '[BP milestones 12-24 months] Sits inside the stated 15-20 live carrier program target by month 24.'
- id: A9
  name: Year-3 quarter-end active programs
  value: Q1Y3 22; Q2Y3 29; Q3Y3 37; Q4Y3 45
  unit: count
  source: '[BP market.som; BP milestones 24-36 months; Research reportMemo.distributionChannels] Base case exits below the 50-program SOM ceiling while assuming most new ARR comes from second-program expansions and partners.'
- id: A10
  name: Founder CEO loaded cash compensation
  value: '120.0'
  unit: USDK per year
  source: '[BP team Founder CEO] Startup-finance heuristic for a below-market founder salary at seed stage.'
- id: A11
  name: Founding engineer loaded cash compensation
  value: '210.0'
  unit: USDK per year
  source: '[BP team Founding eng] Startup-finance heuristic for a senior founding engineer in insurance workflow software.'
- id: A12
  name: Product and rules lead loaded cash compensation
  value: '180.0'
  unit: USDK per year
  source: '[BP team Product and rules lead] Startup-finance heuristic for a domain-heavy product and rules hire.'
- id: A13
  name: Solutions engineer loaded cash compensation
  value: '170.0'
  unit: USDK per year
  source: '[BP team Solutions engineer] Startup-finance heuristic for implementation, security, and integration support.'
- id: A14
  name: GTM lead loaded cash compensation
  value: '180.0'
  unit: USDK per year
  source: '[BP team GTM lead] Startup-finance heuristic for a domain-trusted early sales and partner hire.'
- id: A15
  name: Platform engineer loaded cash compensation
  value: '185.0'
  unit: USDK per year
  source: '[BP product twelveMonth; BP fundingAsk useOfFundsSummary] Startup-finance heuristic for the first PAS/workbench connector and reusable platform work.'
- id: A16
  name: Partner success and distribution manager loaded cash compensation
  value: '145.0'
  unit: USDK per year
  source: '[BP milestones 24-36 months] Startup-finance heuristic for the first hire dedicated to partner enablement and expansion support.'
- id: A17
  name: Hiring cadence
  value: M1 founder CEO and founding engineer; M3 product and rules lead; M6 solutions engineer; M9 GTM lead; M16 platform engineer; M30 partner success and distribution manager
  unit: timing
  source: '[BP team startTiming; BP product twelveMonth; BP milestones 24-36 months] Keeps the team under 8 FTE through Y3 while still funding the first connector and partner motion.'
- id: A18
  name: Functional payroll allocation
  value: Founder 70% S&M / 30% G&A; founding engineer 100% R&D; product and rules lead 100% R&D; solutions engineer 20% S&M / 70% R&D / 10% G&A; GTM lead 100% S&M; platform engineer 100% R&D; partner success and distribution 60% S&M / 40% G&A
  unit: allocation
  source: '[BP team rationales] Functional split follows selling, implementation, connector work, and partner management ownership.'
- id: A19
  name: Non-payroll operating spend
  value: S&M 6K monthly pre-GTM, 10K after GTM, 13K after partner success; R&D tools and cloud 10K initially, 12K after solutions hire, 15K after platform hire; G&A 8K monthly in Y1 and 10K thereafter
  unit: USDK per month
  source: '[Startup-finance heuristic] Insurance workflow software needs travel, security, compliance, and cloud spend even before a larger field team is hired.'
- id: A20
  name: Cash conversion policy
  value: EBITDA approximates cash movement
  unit: policy
  source: '[Startup-finance heuristic] No debt, capex, taxes, or material working-capital swings are modeled for this seed-stage software business.'
- id: A21
  name: First-period revenue recognition
  value: New live programs contribute half-month revenue in Y1 and half-quarter revenue in Y2-Y3
  unit: policy
  source: '[Startup-finance heuristic] Smooths activations inside each period so revenue reconciles to the active-program ramp.'
- id: A22
  name: Blended CAC per active program
  value: '30.0'
  unit: USDK
  source: '[BP gtm.funnelTargets; BP gtm.channels; Research reportMemo.distributionChannels] Blended CAC assumes founder-led new-logo sales plus lower-cost second-program expansions and partner referrals.'
- id: A23
  name: Seed round objective
  value: Reach 8-10 production MGAs, 15-20 live programs, one reusable PAS/workbench connector, and two active distribution partners with about 6 months of buffer
  unit: milestone
  source: '[BP milestones 12-24 months; BP fundingAsk runwayMonths 18] Modeled as 18 months of execution plus a 6-month financing buffer.'
