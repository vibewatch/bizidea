scenarios:
  downside:
    description: Pilot conversions slip, second-program expansion arrives later, and the company exits Y3 with 36 live programs at a $50K blended program-year value.
    y3RevenueK: 1206.3
    y3EbitdaK: -762.2
    cashLowPointK: 158.5
    keyAssumptionChanges:
    - Quarter-end active programs shift from 5, 8, 12, 16 and 22, 29, 37, 45 to 4, 7, 10, 13 and 18, 24, 30, 36.
    - Blended annual program value falls from $55K to $50K.
    - Gross margin slips from 70% to 67% because more onboarding and rule maintenance stay manual.
  base:
    description: Base case converts the first pilots into 16 live programs by Y2 exit and 45 by Y3 exit at a $55K blended program-year value while keeping headcount under 8 FTE.
    y3RevenueK: 1629.5
    y3EbitdaK: -429.7
    cashLowPointK: 580.1
    keyAssumptionChanges:
    - Quarter-end active program counts follow A8 and A9.
    - Gross margin stays at the 70% BP target.
    - Hiring follows A17, so the team stays lean until partner leverage is visible.
  upside:
    description: Template reuse and partner referrals hit early, producing 50 live programs by Y3 exit at a $58K blended program-year value.
    y3RevenueK: 1928.6
    y3EbitdaK: -181.9
    cashLowPointK: 850.1
    keyAssumptionChanges:
    - Quarter-end active programs rise to 6, 10, 14, 18 and 24, 33, 42, 50.
    - Blended annual program value expands from $55K to $58K through volume bands and audit-module attachments.
    - Gross margin improves from 70% to 72% as launch playbooks and connectors reuse better.
sensitivity:
- variable: ARPU
  downsideCase: Blended annual program value settles at $50K because buyers keep the product scoped to first-program triage.
  baseCase: Blended annual program value stays at $55K as modeled.
  upsideCase: Blended annual program value reaches $58K once audit modules and higher-volume bands attach.
  y3RevenueImpactK: -148.2
  cashImpactK: -134.0
- variable: CAC
  downsideCase: CAC rises to $38K because founder-led pilots do not translate cleanly into repeatable partner-sourced deals.
  baseCase: CAC stays near $30K on a blended per-program basis.
  upsideCase: CAC falls to $24K once second-program expansions and referrals supply a bigger share of new programs.
  y3RevenueImpactK: -192.5
  cashImpactK: -182.8
- variable: churn
  downsideCase: Monthly churn rises to 2.0% because some buyers treat the product as a one-program point fix.
  baseCase: Monthly churn stays at 1.3% as modeled.
  upsideCase: Monthly churn falls to 1.0% when renewal, delegated-authority QA, and partner workflows deepen the footprint.
  y3RevenueImpactK: -96.3
  cashImpactK: -67.5
- variable: sales cycle
  downsideCase: Pilot-to-production stretches to 6-7 months because compliance and change-control review slow launches.
  baseCase: Pilot-to-production runs about 4-5 months, consistent with the paid replay plus 60-day live-pilot motion.
  upsideCase: Trusted partners shorten deployment approval to roughly 3-4 months.
  y3RevenueImpactK: -247.6
  cashImpactK: -226.3
- variable: gross margin
  downsideCase: Gross margin holds at 67% because rule maintenance and onboarding remain more services-heavy.
  baseCase: Gross margin stays at the BP target of 70%.
  upsideCase: Gross margin reaches 72% as the launch playbook and connectors reuse better.
  y3RevenueImpactK: 0.0
  cashImpactK: -63.2
- variable: hiring pace
  downsideCase: The platform engineer and partner-success hire are each pulled forward by one quarter before expansion proof is firm.
  baseCase: Hiring follows A17 and stays under 8 FTE through Y3.
  upsideCase: Noncritical hiring slips one quarter later with no revenue penalty because partner leverage arrives on time.
  y3RevenueImpactK: 0.0
  cashImpactK: -82.8
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      ReplayDemand --> PaidPilots
      PaidPilots --> LivePrograms
      LivePrograms --> SecondPrograms
      SecondPrograms --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
- checkName: Revenue engine
  finding: Base-case revenue comes from growing active live programs from 3 at Y1 exit to 45 at Y3 exit at a $55K blended program-year value, with second-program expansion and partners doing most of the work after Y2.
- checkName: Must go right
  finding: The model needs export-first deployments and reusable rule templates to keep first-program launches under 45 days and hold gross margin at 70% while one solutions engineer supports early scale.
- checkName: Model breaks if
  finding: If ARPU falls toward $50K or pilot-to-production stretches toward 6-7 months, cash compresses toward the downside case low point of roughly $157K and the seed round likely needs extension capital.
- checkName: Next-round proof
  finding: A credible Series A setup is 8-10 production MGAs, 15-20 live programs, one reusable PAS/workbench connector, and two active distribution partners before the cash buffer drops below about six months.
sanityChecks:
  ruleOf40: Y3 growth 243.5% + EBITDA margin -26.4% = 217.1% (inflated by the still-small Y2 revenue base).
  burnMultiple: About 1.5x in Y2 on net-new ARR, improving to about 0.3x in Y3 as second-program expansion carries more gross profit.
  revenuePerFte: $233K Y3 revenue per end-of-year FTE (vs. roughly $200K-$400K vertical SaaS benchmark).
  flags:
  - The base case still requires the company to scale from 16 to 45 live programs in Y3, so second-program expansion and partner channels must replace pure founder-led selling.
  - The $55K blended program-year assumes some setup and volume-band revenue, so recurring subscription ARR is modestly lower than total reported revenue.
  - Cash bottoms near $0.6M in the base case, leaving limited room if compliance review or connector work pushes sales cycles toward the downside case.
  - Revenue per FTE reaches only about $233K by Y3, which is acceptable for a services-assisted wedge but below best-in-class SaaS efficiency.
