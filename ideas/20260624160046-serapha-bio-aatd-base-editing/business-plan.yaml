slug: aatd-referral-readiness-os
date: '2026-06-24'
executiveSummary: >-
  AATD Referral Readiness OS sells sponsor-facing workflow software and services
  to gene-editing companies and expert centers that need genotype-confirmed PiZZ
  patients, complete dual-organ baseline packets, and trial-ready referrals.
  The first customer is a VP Clinical Operations or CMO at an AATD precision
  therapy sponsor activating 3-8 U.S. sites and discovering that generic rare
  disease recruitment does not reliably produce protocol-ready PiZZ candidates.
  The wedge is narrow by design: identify likely AATD patients in pulmonology
  and hepatology workflows, route confirmatory testing, and assemble sponsor
  screening packets before site capacity is wasted. This beachhead is attractive
  because value can be measured quickly through days to genotype confirmation,
  packet completeness, and time to first qualified patient rather than long-tail
  brand or awareness metrics. Research supports a plausible year-three SOM of
  about $2.0M, but the immediate buyer universe is small and the venture case
  depends on expansion into adjacent genotype-defined liver and lung diseases.
  The main evidence-backed advantage over horizontal vendors is tighter AATD
  workflow fit around genotype confirmation, family cascade routing, and
  dual-organ baseline assembly. The biggest open questions are whether target
  centers hold enough structured genotype and lab data for implementation-light
  onboarding, and whether first-wave sponsors prefer program fees, site fees, or
  throughput-based pricing. This should be viewed as a credible pre-seed
  infrastructure play with a real operational bottleneck, but not yet a
  high-conviction platform unless one anchor sponsor proves repeatable time to
  qualified-patient improvement.
problem:
  - Likely PiZZ patients remain buried across COPD, emphysema, liver disease, and family-screening workflows, so sponsors and sites do not control a reliable pipeline of genotype-confirmed candidates.
  - Confirmatory testing, counseling, packet assembly, and baseline evidence collection are still manual across pulmonology, hepatology, and genetics teams, which slows enrollment and raises screen-failure risk.
  - One-time editing programs make each missed patient and each underperforming site disproportionately expensive because first-wave studies have small footprints and concentrated timelines.
solution:
  - Flag likely AATD cases inside specialty-center workflows, trigger confirmatory genotype and AAT testing, and track each case from suspicion to sponsor-ready referral.
  - Assemble protocol-specific lung and liver baseline packets, family history, and consent state into an auditable screening dossier for sponsor and site teams.
  - Benchmark which referral sources, family cascade paths, and centers produce true PiZZ patients and faster enrollment so sponsors can focus capacity where conversion is highest.
whyWeWin:
  - Horizontal cohorting and recruitment vendors do not appear to own the specific workflow where AATD suspicion, genotype confirmation, family routing, and sponsor packet assembly intersect.
  - The company compounds a proprietary graph of referral-source yield, baseline-data gaps, and site conversion performance that gets stronger with each sponsor program and center onboarded.
  - Launching as an overlay on existing site and lab workflows is more realistic than asking centers to adopt a broad new trial stack before the first AATD program is proven.
strategicChoices:
  beachhead: Sponsor clinical-operations teams launching U.S. AATD precision-therapy studies across 3-8 academic pulmonary and hepatology sites that need genotype-confirmed PiZZ referrals and complete dual-organ screening packets.
  wedgeRationale: This entry point creates faster proof than a broader rare-disease recruitment platform because the protocol is mutation specific, the buyer already feels time pressure at site activation, and success can be measured with a small number of sites and a few concrete operational metrics.
  sequencingRationale: Start with lightweight data ingestion, testing workflow coordination, and packet assembly before deeper EHR integration because the first proof point is operational throughput, not software breadth; sell sponsor pilots before center-only contracts because sponsor urgency and budget crystallize earlier; hire implementation and clinical-ops talent before scaled sales because compliance-safe onboarding and referenceability are the real early bottlenecks.
  notYet:
    - Broad COPD or liver-disease population health screening outside sponsor-linked workflows
    - Full CRO replacement or generic decentralized-trial software
    - International expansion before the U.S. sponsor and site motion converts repeatably
    - Commercial post-approval treatment-center operations before at least one clinical-stage workflow is proven
market:
  tam: $18.4M estimated TAM based on about 8 active or near-term disease-modifying AATD programs and their site workflows
  sam: $7.4M estimated near-term SAM for the U.S./English-speaking sponsor launch wedge over roughly 4 plausible programs
  som: $2.0M estimated year-three SOM from 2 sponsor programs plus about 8 active sites, assuming one anchor win and one follow-on logo
  segments:
    - Gene-editing, RNA-editing, and other precision-therapy sponsors running AATD studies
    - Expert pulmonary and hepatology centers seeking to become high-performing AATD trial and treatment sites
  buyingProcess: The fastest sale is a paid sponsor pilot tied to study startup, where the VP Clinical Operations or CMO owns urgency and site leaders act as champions because they feel the packet-completeness and referral-quality pain directly. Conversion to an annual contract should depend on measured improvement in time to genotype confirmation, time to first qualified patient, and site-level referral-to-screen conversion.
product:
  mvp: >-
    MVP covers 3-5 anchor sites with lightweight file and lab-result ingestion,
    genotype workflow tracking, family referral state, and sponsor-ready packet
    assembly for one protocol. It should avoid deep EHR integration at launch
    and instead prove faster qualification with auditable handoffs and clear
    dropout visibility.
  sixMonth: Stand up 2 paid sponsor pilots, add Labcorp or Quest result-ingestion paths, and ship site dashboards for suspicion-to-confirmation funnel tracking and packet completeness.
  twelveMonth: Add reusable protocol configuration, site benchmark views, audit-ready record controls, and a referral-yield graph that compares pulmonology, hepatology, and family-cascade sources across programs.
  twentyFourMonth: Expand the operating model into adjacent genotype-defined liver and lung diseases and add post-approval treatment-center workflow modules only where the same data graph and compliance controls still apply.
  keyBets:
    - Target centers can surface enough suspected cases and historical test data to make implementation-light onboarding credible.
    - Sponsors will pay for a workflow layer that improves true-PiZZ yield and packet quality even before the company proves broad patient-network scale.
    - Family cascade screening can add meaningful qualified-patient volume rather than remain a low-yield counseling service.
    - The AATD-specific workflow can generalize into adjacent genotype-defined diseases without turning the company into a custom-services shop.
gtm:
  wedge: Sell a 90-120 day sponsor pilot around one active AATD study, 3-5 launch sites, and one explicit metric package covering genotype turnaround, packet completeness, and time to first qualified patient.
  channels:
    - Founder-led direct sales to VP Clinical Operations, CMOs, and study-startup leaders at AATD precision-therapy sponsors
    - KOL and expert-center referrals from pulmonary and hepatology centers already active in AATD studies
    - Partner-led introductions through genetic-counseling groups, major testing labs, and investor or board networks around gene-editing sponsors
  funnelTargets: lead→qualified pilot 20-30%, qualified pilot→paid pilot 35-50%, paid pilot→annual production 50%+, production sponsor→second program or adjacent-disease expansion 25%+ within 18 months
  pricing: Annual sponsor program fee plus per-site onboarding and optional throughput-linked workflow fees per confirmed-patient pathway; this matches the buyer's economic reality better than per-seat pricing because the value is tied to activated sites, qualified referrals, and avoided enrollment delay.
businessModel:
  revenueStreams:
    - Paid sponsor pilots for one protocol and 3-5 launch sites
    - Annual sponsor platform subscriptions by active program
    - Site onboarding and integration fees
    - Optional throughput or expansion fees for family cascade workflows, added sites, and adjacent-disease modules
  unitOfValue: Active sponsor program with enabled sites and tracked confirmed-patient workflows
  targetGrossMarginPct: 70
  expansionLevers:
    - Add more sites and family-screening workflows inside the first sponsor program
    - Win follow-on programs from the same sponsor or adjacent precision-therapy sponsors
    - Extend the same compliance and packeting layer into adjacent genotype-defined liver and lung diseases
strategyMap:
  northStarMetric: Qualified PiZZ patients delivered with complete sponsor-ready baseline packets per active program quarter
  inputMetrics:
    - Days from suspected case to genotype-confirmed status
    - Percent of referred patients with complete lung and liver baseline packets
    - Referral-source to qualified-screen conversion rate by site
    - Paid pilot to annual production conversion rate
    - Median site onboarding time
  moatsToBuild:
    - Referral-source yield graph linking pulmonology, hepatology, and family-cascade pathways to true PiZZ conversion
    - Site benchmark dataset on missing baseline elements, dropout reasons, and time-to-screen performance
    - Compliance-safe workflow templates for sponsor-visible packet assembly and audit trails
  killCriteria:
    - Fewer than 1 paid anchor sponsor pilot signed within 9 months of focused selling
    - First 2 pilots fail to improve time to first qualified patient by at least 30% versus coordinator-led baseline
    - Less than 80% of referred candidates reach sponsor-ready packet completeness in the first 2 pilots
    - Median onboarding for a 3-5 site deployment remains above 8 weeks after the first 3 customers
  mermaid: |
    flowchart LR
      Wedge[AATD sponsor wedge] --> MVP[Referral-readiness MVP]
      MVP --> Proof[Faster PiZZ qualification and packet completeness]
      Proof --> Expansion[Adjacent genotype-defined disease expansion]
investorMemo:
  verdict:
    call: Watch
    conviction: Real operational pain and a coherent wedge, but conviction remains moderate because the first buyer universe is small and implementation assumptions are not yet proven.
    whyBelieve: Mutation-specific AATD therapies create an immediate need for genotype-confirmed patient flow and dual-organ packet assembly that horizontal recruitment tools do not obviously solve well.
    whyDoubt: The company can become a services-heavy niche unless one sponsor pilot proves software-led onboarding, strong conversion gains, and a clean path into adjacent diseases.
    nextDiligence: Verify one paid sponsor pilot with 3-5 sites that measurably shortens time to first qualified patient and converts into a $350k+ annual program contract.
  firstCustomer:
    title: VP Clinical Operations at an AATD precision-therapy sponsor
    profile: A venture-backed gene-editing or RNA-editing company activating a first U.S. multicenter PiZZ study with limited in-house rare-disease recruitment infrastructure and 3-8 expert sites.
    trigger: Site activation reveals that likely AATD patients are scattered across specialty clinics, genotype confirmation is inconsistent, and screening packets are incomplete.
    buyer: VP Clinical Operations or Chief Medical Officer
    initialContract: $125k-$200k paid pilot across 3-5 sites, converting to roughly $350k-$500k annual program fees plus site onboarding when qualification speed and packet completeness improve.
  mustBeTrue:
    - Sponsors will pay low-to-mid six figures annually for an AATD-specific workflow rather than rely on coordinators, CRO services, or horizontal recruitment vendors.
    - At least 40% of target-center suspected cases can be routed through a lightweight data-ingestion model without requiring deep EHR integration first.
    - Family cascade screening contributes enough incremental qualified referrals to matter commercially within the first 12 months.
    - One anchor sponsor can show at least 30% faster time to first qualified patient and materially lower packet defects versus prior process.
    - The same data and workflow model can expand into adjacent genotype-defined liver or lung diseases within 24 months.
  diligenceQuestions:
    - How many first-wave sponsors are realistic buyers in the next 24 months, and how concentrated is that revenue base?
    - What percentage of PiZZ case finding at anchor centers depends on structured data versus manual chart review and PDFs?
    - Which metric matters most to the economic buyer: days to first qualified patient, lower screen-failure rate, or site activation efficiency?
    - Why would a sponsor buy this overlay instead of extending IQVIA, TriNetX, InformedDNA, or internal clinical-ops workflows?
    - What evidence shows family cascade workflows create meaningful referral volume rather than operational complexity?
operatingAssumptions:
  - assumption: Enough suspected AATD cases and prior test data exist at anchor centers to justify a software-led referral workflow.
    basis: research.yaml
    validationTest: Audit 2 pulmonary and 2 hepatology centers and require evidence that at least 40% of sampled suspected cases have retrievable AAT or genotype data and a trackable next-step workflow.
    decisionImpact: If false, the launch product becomes a higher-touch services model and the company should narrow the ICP or delay fundraising.
  - assumption: The repeatable first budget owner is the sponsor clinical-operations leader rather than a slower cross-functional procurement committee.
    basis: idea.yaml
    validationTest: Close the first 2 paid pilots where the same sponsor function defines success metrics, signs the contract, and runs the weekly operating review.
    decisionImpact: If false, sales cycles lengthen and the company may need a CRO or channel-led motion instead of founder-led direct sales.
  - assumption: Lightweight lab and document ingestion can keep 3-5 site onboarding below 8 weeks without deep EHR integrations.
    basis: research.yaml
    validationTest: Time the first 3 deployments from signature to first usable site dashboard and require median go-live below 8 weeks.
    decisionImpact: If false, gross margin and pilot velocity deteriorate, forcing either higher pricing or a narrower site profile.
  - assumption: Family cascade screening adds measurable qualified-patient volume in addition to clinic-based case finding.
    basis: research.yaml
    validationTest: Track first 100 confirmed-patient workflows and require at least 15% of qualified referrals to come from family-cascade paths.
    decisionImpact: If false, the roadmap should de-emphasize counseling and focus on pulmonology and hepatology center conversion.
  - assumption: AATD proof can extend into adjacent genotype-defined liver and lung diseases without rebuilding the product from scratch.
    basis: operator judgment
    validationTest: Before month 18, win one design partnership in an adjacent disease using the same packeting, audit, and testing workflow primitives.
    decisionImpact: If false, the market ceiling stays too small and the business should optimize for a niche cash-flow profile rather than venture scale.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Interview 12-15 sponsor clinical-ops leaders, site directors, and genetic-counseling partners involved in AATD precision-therapy workflows.
    hypothesis: The highest-urgency pain is not generic awareness but incomplete genotype-confirmed referral flow and packet assembly at site activation.
    successMetric: At least 8 interviews describe a recent PiZZ qualification or packeting bottleneck and 4 agree to scope pilot metrics.
    owner: Founder CEO
  - horizon: 0–90 days
    experiment: Run a retrospective workflow audit across 4 anchor sites covering suspected cases, existing tests, missing baseline fields, and referral dropout points.
    hypothesis: Enough usable data exists to launch with lightweight ingestion rather than full EHR integration.
    successMetric: At least 40% of sampled cases can be reconstructed into a tracked workflow and packet template.
    owner: Founding eng
  - horizon: 90–180 days
    experiment: Launch the first paid sponsor pilot across 3-5 sites with weekly funnel reviews and sponsor-ready packet handoffs.
    hypothesis: A sponsor-linked pilot tied to live study startup converts faster than selling centers a standalone workflow.
    successMetric: Pilot signed and first qualified-patient packet delivered within 120 days of kickoff.
    owner: Founder CEO
  - horizon: 90–180 days
    experiment: Integrate one national lab and one counseling workflow into the pilot operating model.
    hypothesis: Lab and counselor integration will reduce manual follow-up and improve genotype-confirmation throughput.
    successMetric: Median time from suspected case to confirmed genotype falls by at least 20% within the pilot cohort.
    owner: Clinical ops lead
  - horizon: 180–365 days
    experiment: Productize site benchmark reporting and referral-source yield analytics from the first 2 pilots.
    hypothesis: Benchmark visibility is the feature most likely to convert pilots into annual contracts and create a moat.
    successMetric: At least 1 pilot converts to annual production and uses benchmark reports in monthly operating reviews.
    owner: Product engineer
  - horizon: 180–365 days
    experiment: Test one adjacent-disease design partnership using the same workflow primitives.
    hypothesis: The core packeting and testing workflow generalizes beyond AATD without major custom rebuild.
    successMetric: One adjacent program enters paid design or contracted discovery by month 18.
    owner: Founder CEO
operations:
  - Compliance and QA process for sponsor-visible electronic records, packet provenance, and audit-trail controls
  - Lab and counselor integration workflows for confirmatory testing, result ingestion, and family-cascade routing
  - Site onboarding playbook covering data mapping, protocol configuration, and weekly funnel review cadence
  - Customer-success process for sponsor operating reviews tied to qualification speed, packet completeness, and site conversion benchmarks
team:
  - role: Founder CEO
    startTiming: Month 0
    rationale: Early success depends on winning a narrow sponsor wedge, setting pilot metrics, and resisting the temptation to position the company as a broad recruitment platform.
  - role: Founding eng
    startTiming: Month 0
    rationale: The first technical risk is building a reliable case-tracking and packeting layer across messy documents, lab results, and site workflows with auditable handoffs.
  - role: Clinical ops implementation lead
    startTiming: Month 3
    rationale: Pilot value will fail without someone who can configure protocol workflows, train sites, and run sponsor funnel reviews with operational credibility.
  - role: Product engineer
    startTiming: Month 6
    rationale: After the first pilot, the company needs faster iteration on dashboards, benchmark reporting, and integration templates than one technical founder can sustain.
  - role: Business development lead
    startTiming: Month 9
    rationale: Once one sponsor pilot is referenceable, the company needs focused channel and sponsor pipeline development before adding a broader sales team.
milestones:
  - horizon: 0–12 months
    items:
      - Close 2 paid sponsor pilots in AATD across 3-5 sites each
      - Prove at least one pilot delivers a 30% faster time to first qualified patient versus prior process
      - Reduce 3-5 site onboarding to a repeatable 6-8 week range using lightweight ingestion and one lab integration
      - Convert at least one pilot into an annual production contract
  - horizon: 12–24 months
    items:
      - Reach 2-3 production sponsor programs and roughly 8 active sites consistent with the researched year-three SOM path
      - Standardize referral-yield and site-benchmark reporting into a repeatable monthly operating-review product
      - Add one adjacent genotype-defined disease design partner without breaking implementation economics
      - Show that family-cascade workflows can contribute measurable qualified-referral volume where consent and counseling infrastructure exist
  - horizon: 24–36 months
    items:
      - Expand into 2-3 adjacent genotype-defined disease programs beyond AATD
      - Build a referenceable partner network across expert centers, counseling groups, and testing labs
      - Demonstrate that the company owns a durable referral and site-performance graph, not just a services-heavy launch workflow
      - Reach enough multi-program revenue diversity that no single sponsor dominates the business
risks:
  - risk: The near-term sponsor market is narrow and can contract quickly if AATD editing programs pause or fail.
    likelihood: High
    impact: High
    mitigation: Treat AATD as a proof wedge, not the full company, and force an adjacent-disease expansion decision by month 18.
  - risk: Target centers may lack structured genotype and baseline data, pushing onboarding into manual services work.
    likelihood: High
    impact: High
    mitigation: Launch with lightweight ingestion, strict ICP selection, and explicit proof thresholds before promising scalable software margins.
  - risk: Sponsors may decide horizontal CRO, recruitment, or counseling vendors are sufficient for first-wave studies.
    likelihood: Medium
    impact: High
    mitigation: "Sell against a narrow metric package that generic vendors rarely own well: genotype turnaround, packet completeness, and referral-to-qualified-screen conversion."
  - risk: Sponsor-visible workflows may face regulatory and QA scrutiny around Part 11, EHR provenance, and source-data controls.
    likelihood: Medium
    impact: High
    mitigation: Keep the initial product audit ready, configurable, and explicit about source provenance rather than acting as an opaque decision engine.
  - risk: Family cascade workflows may create more coordination burden than qualified-patient volume in the first year.
    likelihood: Medium
    impact: Medium
    mitigation: Measure cascade contribution explicitly and deprioritize it if pulmonology and hepatology case finding proves more efficient.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: Build the compliance-safe referral and packeting platform, fund 2 sponsor pilots and the first production conversion, hire implementation and product talent, and determine whether AATD proof extends into at least one adjacent genotype-defined disease before the next round.
