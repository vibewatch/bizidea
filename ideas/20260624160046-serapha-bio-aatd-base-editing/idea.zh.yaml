problem: 做 AATD 的基因编辑申办方，不只是需要一把更强的编辑工具；在稀缺的试验中心容量被浪费之前，他们还得先穿透碎片化的肺科和肝病路径，把已经完成基因分型确认的 PiZZ 患者找出来。现在，很多疑似 AATD 患者还埋在 COPD、肺气肿和不明原因肝病流程里；确证性基因分型、转诊资料包整理、基线数据采集，仍然主要靠手工推进。结果就是入组慢、筛选失败风险高，而且自然病史背景也不扎实——偏偏一次性疗法时代，每漏掉一个患者，代价都会被放大。
targetUser:
  primary: 正在为重度 PiZZ 型 AATD 干预性研究做准备、由风投支持的基因编辑生物科技公司里的临床运营副总裁或临床开发负责人
  secondary: 希望成为高绩效 AATD 试验与治疗中心的肺科、肝病专病项目负责人
  buyer: 临床运营副总裁或首席医疗官
startupThesis:
  nonObviousInsight: 一旦一次性编辑工具已经能打到 PiZZ 根突变，最稀缺的资产就不再只是编辑化学本身，而是一张“可直接进试验”的运营图谱：谁是疑似患者、谁完成了基因分型确认、哪些家庭成员能继续转出、哪些中心能采到完整的肺肝双器官基线证据。谁先拿下这张运营图谱，谁就有机会在 AATD 编辑赛道变拥挤之前，先占住长期平台位。
  beachhead: 正在为重度 PiZZ 型 AATD 试验开启 6-20 个美国肺科和肝病中心的基因编辑生物科技公司临床运营团队；这些中心都需要已做基因分型确认的患者和标准化的基线资料包
  wedge: 一套 AATD 转诊就绪 OS：在专科门诊里标记疑似 PiZZ 患者，自动推进确证性基因分型流程，并为基因编辑中心整理好可供申办方直接使用的筛选与基线资料包
  whyNowCatalyst: Serapha 围绕根因型 PiZZ 编辑器拿下 $230M，让 AATD 不再只是“未来科学故事”，而是立刻变成一场诊断、资格确认和患者路由的争夺战。
  ventureScalePath: 先把 AATD 的患者发现和中心就绪跑通，再扩到其他由特定基因型定义的肺肝疾病、获批后一次性编辑疗法的治疗中心运营，以及覆盖诊断、转诊、长期结局和家系级联筛查的更广义罕见病基础设施层。
solution: 公司卖的是一层面向申办方和专科中心的疾病专用运营系统，服务于要启动 AATD 基因编辑项目的团队。它把肺科和肝病转诊来源接起来，识别符合 AATD 高概率特征的病历，触发基因分型确认流程，并把既往影像、肺功能、肝脏指标和家族史整理成申办方可直接使用的筛选档案。对已激活的中心，产品会把基线采集标准化，并跟踪患者是卡在怀疑、检测、确认还是入组环节。时间一长，这家公司会攒下全品类里最值钱的数据集：哪些转诊路径最能产出真正的 PiZZ 患者、哪些基线证据最能预测试验匹配度、以及哪些中心把已筛患者转成正式入组的速度最快。
goToMarketSeed:
  firstCustomer: 像 Serapha 这样的 AATD 基因编辑公司里的临床运营负责人：公司正首次在美国多个学术肺科和肝病中心启动研究，但此前几乎没有成熟的罕见病招募基础设施
  buyingTrigger: 申办方完成中心筛选或启动入组后，才发现疑似 AATD 患者分散在各个专科门诊，基因分型不一致，基线记录也残缺不全
  currentAlternative: 协调员手工翻病历、通用型试验招募供应商、患者倡导组织外展，以及临时拼凑的确证性检测送检流程
  switchingReason: 围绕 AATD 定制的工作流软件，比通用招募工具更能在每个中心产出真正的 PiZZ 转诊，并整理出更干净的筛选资料包，因为它从一开始就围绕基因分型确认、肺肝双器官基线和家系级联逻辑来设计。
  pricingHypothesis: 按活跃申办方项目收取年度平台费，外加每个中心的上线费，以及按已确认患者工作流收取的费用；定价与筛选吞吐量和中心激活价值挂钩。
whyNow:
- point: 资金已经到位，申办方既有能力也必须为 AATD 单独搭建入组基础设施，不能再只靠临时协调员工作硬扛。
  signalRefs:
