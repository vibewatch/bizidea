  signalRefs:
  - 大规模未治疗的 PiZZ 队列终于能被商业化撬动
  sourceRefs:
  - 2
- point: 根因编辑抬高了精确基因分型确认的价值，也让面向疾病的转诊软件，比泛呼吸科外展更有必要。
  signalRefs:
  - 突变特异疗法让基因分型确认成了瓶颈
  sourceRefs:
  - 2
- point: 跨境资产授权把“拿到科学资产”和“推进临床执行”之间的时间差压得更短，申办方不能等以后再补患者发现流程。
  signalRefs:
  - 跨境授权正在压缩临床落地时间
  sourceRefs:
  - 1
differentiator: 通用型试验科技供应商，通常是在患者已经找到之后才开始帮忙管表单；罕见病招募机构，则往往缺少深度的基因分型和中心就绪工作流。这家公司把切口前移：把疑似模式、确证性检测、基线证据和申办方-中心交接放进同一条 AATD 专用流程里。它的护城河来自一张专有图谱：哪些转诊来源最出真 PiZZ、哪些家系级联路径最能转化、哪些中心筛过的人最容易变成正式入组。随着更多一次性编辑项目进入相邻疾病，这张图谱会越来越值钱。
