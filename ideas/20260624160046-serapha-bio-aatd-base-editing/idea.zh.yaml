topRisks:
- name: 首批申办方市场过窄
  description: 第一波真正活跃的 AATD 基因编辑项目，数量可能很少。
  mitigation: 先用 AATD 聚焦打样，但数据模型和工作流一开始就要为相邻的基因型定义肺肝疾病预留快速扩展能力。
- name: 专科中心集成阻力
  description: 肺科和肝病中心未必愿意再接一套新流程，除非接入很轻，且价值立刻可见。
  mitigation: 先用最轻的数据接入路径、实验室伙伴集成和高触达上线服务，在一个研究周期内证明转诊转化更快。
- name: 筛选工作流面临监管审慎
  description: 申办方可能担心，软件驱动的资格判断逻辑会让方案合规或中心监管更复杂。
  mitigation: 把产品定位成运营决策支持层：规则由申办方配置、交接全程可审计，并与现有筛选 SOP 做验证对齐。
