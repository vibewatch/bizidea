    - 40
    - 41
  validationPlan:
  - priority: high
    question: Can one anchor sponsor prove the product reduces time to first qualified PiZZ patient versus coordinator-led baseline?
    evidenceToGather: Run a retrospective or prospective pilot across 3-5 sites measuring days to genotype confirmation, packet completeness, and screen-failure rate.
  - priority: high
    question: What share of suspected AATD cases at target centers already have structured genotype or serum AAT results available?
    evidenceToGather: Audit EHR field availability and lab-ingestion formats at two pulmonary and two hepatology centers before building deep integrations.
  - priority: medium
    question: Will genetic-counseling and lab partners co-sell or just serve as integrations?
    evidenceToGather: Interview counseling organizations, national labs, and sponsor study-startup teams on referral economics and compliance ownership.
