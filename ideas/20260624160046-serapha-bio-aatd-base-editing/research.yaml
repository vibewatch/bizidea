- point: If provider EHR data is used for screening or baseline packets, provenance and source-data-originator controls must be explicit.
  sourceRefs:
  - 37
  - 38
- point: Remote pre-screening, telehealth, or decentralized steps still sit inside FDA guidance on decentralized clinical-trial elements.
  sourceRefs:
  - 39
- point: Integration quality depends on whether target sites can expose USCDI/FHIR-aligned data rather than only unstructured documents.
  sourceRefs:
