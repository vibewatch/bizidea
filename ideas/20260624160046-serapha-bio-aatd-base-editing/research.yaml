competitors:
- name: TriNetX LIVE
  stage: incumbent
  wedge: No-code cohort discovery, site identification, and real-world evidence over a very large patient network.
  pricing: Custom / enterprise contract
  strength: Massive de-identified patient graph and existing sponsor relationships.
  weaknessVsUs: Not purpose-built for AATD genotype confirmation, family cascade workflows, or sponsor-ready dual-organ packet assembly.
  sourceRefs:
  - 32
  - 40
  - 41
- name: IQVIA Patient Recruitment Solutions
  stage: incumbent
  wedge: Scaled global patient recruitment and site support for sponsors.
  pricing: Custom / service-led contract
  strength: Execution scale, omni-channel outreach, and site-support infrastructure.
  weaknessVsUs: Broad recruitment engine rather than a disease-specific AATD operating system that compounds site-yield intelligence.
  sourceRefs:
  - 27
  - 33
- name: InformedDNA Clinical Trials
  stage: scale-up
  wedge: Genetic counseling plus consent-ready referral support for genetically defined studies.
  pricing: Custom / service-led contract
  strength: Deep genetics workflow credibility and counseling capability.
  weaknessVsUs: Appears stronger on counseling than on sponsor-site operational analytics, baseline packet assembly, or site benchmark data.
  sourceRefs:
  - 29
  - 23
- name: Datavant + Indegene NEXT
  stage: incumbent
  wedge: Data enrichment and digital recruitment to reduce screen failures in rare and complex studies.
  pricing: Custom / enterprise partnership
  strength: Large health-data retrieval network and strong data-matching narrative.
  weaknessVsUs: Horizontal data plumbing does not by itself solve AATD-specific testing rules, family routing, and center-readiness workflows.
  sourceRefs:
  - 31
  - 25
- name: Rare Patient Voice
  stage: specialist
  wedge: Rare-disease patient and caregiver community for study recruitment.
  pricing: Custom / recruitment project pricing
  strength: Trusted patient network across many rare conditions.
  weaknessVsUs: Starts later in the funnel after patients are already identified; not a clinic-embedded case-finding or regulated packeting system.
  sourceRefs:
  - 30
  - 35
