reportMemo:
  executiveTakeaways:
  - The wedge is real because the operational bottleneck is genotype-confirmed patient flow and baseline-packet completeness, not generic respiratory awareness.
  - The first beachhead is commercially meaningful but narrow, so the venture case depends on proving AATD and then expanding into adjacent genotype-defined liver and lung diseases.
  - Horizontal recruitment vendors exist, but none obviously own the combination of AATD-specific testing rules, family cascade logic, and sponsor-ready dual-organ packet assembly.
  marketDefinition: The beachhead is sponsor- and site-facing workflow software plus services that move suspected AATD patients to genotype-confirmed, protocol-ready screening packets for disease-modifying studies and early treatment-center networks. The need exists because AATD remains underdiagnosed, diagnosis is delayed, family testing is still underused, and the therapeutic pipeline has shifted from augmentation toward genotype-directed RNA and base-editing programs [4][6][9][11][13][16][17][18][19][21][22].
  customerAndBuyer: Primary buyer is a VP Clinical Operations or CMO at a sponsor running an AATD study; day-to-day champions also include site directors, genetic counselors, and study-startup leads that must identify PiZZ patients, collect liver-plus-lung baselines, and refer consent-ready patients into protocol screening [13][14][25][29].
  buyingTriggers:
  - point: A sponsor moves into site activation and realizes a genotype-specific protocol needs fewer but far better qualified referrals than a generic respiratory funnel can deliver.
    sourceRefs:
    - 18
    - 19
    - 21
    - 22
    - 25
  - point: Guideline-driven testing and family-cascade expectations create extra work at centers that already have fragmented pulmonology, hepatology, and genetics workflows.
    sourceRefs:
    - 4
    - 9
    - 14
  - point: Patient interest in curative or durable gene/RNA therapies rises faster than site capacity to educate, test, and route them compliantly.
    sourceRefs:
    - 17
    - 23
    - 46
  willingnessToPay:
    summary: Sponsors already buy expensive horizontal recruitment, data-enrichment, and trial-ops support for low-prevalence studies; if an AATD-specific layer materially improves genotype yield, reduces site-level screen failure, and shortens time to first qualified patient, six-figure annual program spend is easy to justify even in a small market.
    sourceRefs:
    - 25
    - 26
    - 27
    - 31
    - 33
    - 35
  competitiveLandscape: Competition comes from horizontal cohort-discovery and recruitment vendors rather than AATD-native software. TriNetX, IQVIA, Antidote, and data-enrichment networks can all sell “find patients faster,” but their default unit of work is a broad study funnel. The proposed startup narrows to mutation-aware AATD identification, family cascade routing, and sponsor-ready packet assembly, which is more specific than current horizontal offerings but also much narrower at launch [25][27][29][31][32][33][35].
  incumbentThesis:
  - incumbentClass: Horizontal real-world-data platforms
    point: Platforms like TriNetX help with cohorting and site discovery, but they do not win by default because AATD enrollment still needs disease-specific genotype confirmation, family outreach logic, and packet assembly outside a generic no-code cohort builder.
    sourceRefs:
    - 32
    - 40
    - 41
  - incumbentClass: Full-service CRO recruitment engines
    point: IQVIA-style recruitment can scale globally, but it is optimized for breadth and execution capacity, not for owning an enduring AATD referral graph that improves true-PiZZ yield over time.
    sourceRefs:
    - 27
    - 31
    - 33
  - incumbentClass: Genetic counseling specialists
    point: InformedDNA-like services are strong at consent-ready referrals and counseling, yet they do not appear to offer a full sponsor-site operating system for dual-organ baseline capture and site performance benchmarking.
    sourceRefs:
    - 29
    - 37
    - 38
  - incumbentClass: Patient community networks
    point: Rare Patient Voice and similar networks can surface motivated patients, but they start later in the funnel and do not replace clinic-side case finding, genotyping workup, or structured handoff into regulated site workflows.
    sourceRefs:
    - 30
    - 35
  regulatoryLandscape: Any sponsor-visible workflow needs Part 11-grade electronic records controls, traceable source-data provenance, and explicit handling of how provider EHR data enters regulated investigations. If the product supports remote or decentralized steps, it also inherits FDA expectations around decentralized elements. On the technical side, data exchange quality will depend on structured USCDI/FHIR availability across sites rather than on PDFs and faxed records alone [36][37][38][39][40][41].
  technologyLandscape: 'The therapeutic field is now broad enough to matter operationally: base editing (BEAM-302), RNA editing (AIR-001, KRRO-110, WVE-006), RNAi (fazirsiran and historical ALN/DCR programs), protein replacement, and small-molecule approaches all compete for variants of the same patients. That makes the most valuable infrastructure mutation-aware, dual-organ, and longitudinal rather than trial-agnostic [16][17][18][19][20][21][22][24][45][46].'
  distributionChannels:
  - point: Founder-led sales into sponsor clinical-ops teams should ride financing and study-launch moments such as Serapha’s launch, because budget and urgency crystallize there.
    sourceRefs:
    - 1
    - 2
    - 3
  - point: KOL and expert-center distribution matters because rare-disease trials still rely on registries, natural-history work, and expert centers rather than commodity site networks.
    sourceRefs:
    - 13
    - 14
    - 26
  - point: Genetic-counseling and testing partners can function as channel partners by turning suspicious cases into consent-ready, genotype-confirmed referrals.
    sourceRefs:
    - 4
    - 29
    - 42
    - 43
  partnershipEcosystem:
  - point: InformedDNA-style counseling partners can reduce the handoff gap between suspected disease, family testing, and site-ready referral packets.
    sourceRefs:
    - 29
    - 23
  - point: Commercial labs such as Labcorp and Quest sit inside the confirmatory-testing workflow, so lightweight ordering/result-ingestion integrations are strategically useful.
    sourceRefs:
    - 42
    - 43
  - point: Data-network partners such as Datavant or TriNetX can extend reach beyond the anchor centers once the startup proves disease-specific conversion logic.
    sourceRefs:
    - 31
    - 32
  dataMoats:
  - point: Referral-source to true-PiZZ conversion rates become proprietary once the startup tracks which pulmonology, hepatology, and family-screening pathways actually produce qualified patients.
    sourceRefs:
    - 4
    - 6
    - 25
  - point: Site-level evidence on missing baseline elements and screen-failure reasons compounds into a benchmark dataset that horizontal recruiters do not naturally own.
    sourceRefs:
    - 13
    - 24
    - 26
  - point: A family-cascade and mutation-aware patient graph is defensible because each diagnosed case can reveal additional at-risk relatives and historically missed subpopulations.
    sourceRefs:
    - 4
    - 9
    - 53
  geographicConsiderations:
  - point: Initial product design should assume international studies, because active AATD programs are already spread across the U.S., Europe, Australia, and other jurisdictions.
    sourceRefs:
    - 17
    - 18
    - 19
    - 21
    - 22
  - point: 'Case-finding logic should be tested for equity: screening literature shows AATD is under-tested in Black populations, which creates both mission risk and hidden-yield opportunity.'
    sourceRefs:
    - 53
    - 4
  sensitivityCases:
  - case: Editing race accelerates
    impact: If BEAM-302, AIR-001, and WVE-006 all keep advancing, sponsors will pay earlier for patient-identification and site-readiness infrastructure to avoid missing scarce PiZZ candidates.
    sourceRefs:
