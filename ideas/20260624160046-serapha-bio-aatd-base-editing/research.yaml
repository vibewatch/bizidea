openQuestions:
- How many target U.S. pulmonary and hepatology centers already store genotype results in structured, queryable fields rather than PDFs?
- What percentage of likely AATD referrals at anchor centers require fresh genotyping versus retrieval of existing results from prior testing?
- Will first-wave sponsors prefer a program fee, a site fee, or a throughput-linked fee for this workflow in their clinical-ops budget?
- How much referral volume can be unlocked through family cascade screening relative to case-finding inside COPD and liver clinics?
