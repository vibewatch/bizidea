scenarios:
  downside:
    description: >-
      Sponsor decisions stretch, one production conversion slips out of Y2, and
      onboarding stays more services-heavy because structured genotype data is
      worse than expected.
    y3RevenueK: 1710.0
    y3EbitdaK: -611.0
    cashLowPointK: -72.0
    keyAssumptionChanges:
      - End-Y2 production sponsor programs fall from 3 to 2.
      - End-Y3 active sponsor programs fall from 5 to 4.
      - Core annual program value stays near $430K instead of $500K.
      - Steady-state gross margin tops out near 68% rather than 72%.
  base:
    description: >-
      Two Y1 paid pilots become 3 production sponsor programs by late Y2, then
      expand to 5 active programs by Q4Y3 as benchmark reporting and one
      adjacent-disease use case start to attach.
    y3RevenueK: 2340.0
    y3EbitdaK: -199.4
    cashLowPointK: 548.0
    keyAssumptionChanges:
      - No change from A1-A22 base assumptions.
  upside:
    description: >-
      A sponsor reference accelerates follow-on wins, one adjacent-disease
      program lands earlier, and implementation reuse lifts revenue and margin
      faster than planned.
    y3RevenueK: 3010.0
    y3EbitdaK: 273.0
    cashLowPointK: 901.0
    keyAssumptionChanges:
      - End-Y2 production sponsor programs rise from 3 to 4.
      - End-Y3 active sponsor programs rise from 5 to 6.
      - Core annual program value reaches about $560K with more site and throughput expansion.
      - Steady-state gross margin reaches 74% as onboarding templates become reusable earlier.
