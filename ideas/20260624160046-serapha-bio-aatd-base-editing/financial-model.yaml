slug: aatd-referral-readiness-os
date: 2026-06-24
currency: USD
modelStartMonth: 2026-07
assumptions:
  - id: A1
    name: Model start month
    value: "2026-07"
    unit: month
    source: "[BP date 2026-06-24] The model starts in the first full month after the business-plan date."
  - id: A2
    name: Starting cash after pre-seed close
    value: "2200"
    unit: USDK
    source: "[BP fundingAsk targetFundingRangeUsd $2-4M; BP fundingAsk.runwayMonths 18] The base case uses a $2.2M pre-seed so the company can reach the late-Y2 proof point plus a 6-month buffer without assuming a top-of-range close."
  - id: A3
    name: Customer definition
    value: "One active sponsor program is treated as one customer."
    unit: policy
    source: "[BP businessModel.unitOfValue active sponsor program with enabled sites and tracked confirmed-patient workflows]"
  - id: A4
    name: Customer acquisition ramp
    value: "First paid pilot in M6, second paid pilot in M10, third active sponsor program by Q2Y2, fourth by Q1Y3, and fifth by Q3Y3."
    unit: customers
    source: "[BP milestones], [BP gtm.funnelTargets], and [BP investorMemo.firstCustomer] translated into a conservative founder-led sales ramp."
  - id: A5
    name: Blended revenue per active sponsor program
    value: "$50K per pilot month in first 90 days, then roughly $35-40K monthly in Y2 production mode and $42-50K monthly in Y3 as site, throughput, and adjacent-disease expansion attach."
    unit: USDK per customer month
    source: "[BP investorMemo.firstCustomer.initialContract $125k-$200k pilot and $350k-$500k annual program fee], [BP gtm.pricing], and [Research market.som rationale]."
  - id: A6
    name: Gross margin ramp
    value: "55% gross margin in early pilot months, about 66% by late Y1, 65-70% across Y2, and 71-72% across Y3."
    unit: percent
    source: "[BP businessModel.targetGrossMarginPct 70] plus [BP operatingAssumptions] that onboarding stays under 8 weeks without deep EHR integrations."
  - id: A7
    name: Founder loaded cash compensation
    value: "180"
    unit: USDK per FTE year
    source: "Startup-finance heuristic for a pre-seed biotech-infrastructure founder taking below-market cash pay."
  - id: A8
    name: Engineering loaded cash compensation
    value: "190"
    unit: USDK per FTE year
    source: "Startup-finance heuristic for early product and integration engineers supporting regulated healthcare workflows."
  - id: A9
    name: Clinical ops implementation loaded cash compensation
    value: "165"
    unit: USDK per FTE year
    source: "[BP team clinical ops implementation lead] plus startup-finance heuristic for a domain implementation operator."
  - id: A10
    name: Product and regulatory loaded cash compensation
    value: "175"
    unit: USDK per FTE year
    source: "[BP product twelveMonth audit-ready record controls] plus startup-finance heuristic for a product lead carrying compliance scope."
  - id: A11
    name: Business development loaded cash compensation
    value: "170"
    unit: USDK per FTE year
    source: "[BP team business development lead] plus startup-finance heuristic for founder-adjacent biotech enterprise selling."
  - id: A12
    name: G&A and operations loaded cash compensation
    value: "130"
    unit: USDK per FTE year
    source: "Startup-finance heuristic for lean finance, legal, and operations support."
  - id: A13
    name: Headcount ramp snapshots
    value: "Founder 1/1/1/1/1/1; engineering 1/1/2/2/2/3; clinical ops implementation 0/1/1/1/1/2; product-regulatory 0/0/1/1/1/1; BD-GTM 0/0/0/1/1/1; G&A-ops 0/0/0/0/1/1 across q1y1/q2y1/q3y1/q4y1/q4y2/q4y3."
    unit: FTE
    source: "[BP team startTiming], [BP strategicChoices.sequencingRationale], and a conservative scale-up path that delays back-office hiring until after first production conversion."
  - id: A14
    name: Quarterly payroll smoothing
    value: "Y2 and Y3 salary lines smooth monthly hires between the required snapshot columns rather than stepping only at year-end."
    unit: method
    source: "[Financial Modeler contract headcount column convention]"
  - id: A15
    name: Non-payroll GTM spend ramp
    value: "$17-25K per month in Y1, $27-35K per quarter per function in Y2, and $38-45K per quarter in Y3 across travel, events, sponsor diligence, and channel development."
    unit: USDK
    source: "[BP gtm.channels] plus startup-finance heuristic for travel-heavy founder-led biotech enterprise sales."
  - id: A16
    name: Non-payroll R&D and compliance spend ramp
    value: "$8-10K per month in Y1, $33-39K per quarter in Y2, and $42-45K per quarter in Y3."
    unit: USDK
    source: "[BP operations], [Research regulatoryTechnicalConstraints], and startup-finance heuristic for cloud, QA, security, and audit-trail tooling."
  - id: A17
    name: Non-payroll G&A spend ramp
    value: "$4-6K per month in Y1, $18-24K per quarter in Y2, and $27-30K per quarter in Y3."
    unit: USDK
    source: "Startup-finance heuristic for legal, accounting, privacy, and insurance overhead in a regulated workflow company."
  - id: A18
    name: Fully loaded CAC
    value: "180"
    unit: USDK per new sponsor program
    source: "[BP gtm.funnelTargets], [BP gtm.channels], and [Research reportMemo.willingnessToPay]; narrow sponsor concentration keeps CAC above normal SaaS levels even with founder-led selling."
  - id: A19
    name: Base sales cycle
    value: "9"
    unit: months
    source: "[BP experimentRoadmap] and startup-finance heuristic for closing regulated sponsor pilots after validation, diligence, and scope definition."
  - id: A20
    name: Monthly churn
    value: "2.0"
    unit: percent
    source: "Startup-finance heuristic; sponsor programs are sticky once embedded, but the beachhead is still concentrated and some revenue is tied to program continuity rather than pure SaaS renewal."
  - id: A21
    name: Cash conversion simplification
    value: "EBITDA approximates cash movement after the financing close."
    unit: method
    source: "Startup-finance heuristic for an asset-light software and workflow business with no debt or capex line modeled separately."
  - id: A22
    name: Next-round proof point
    value: "By late Y2 the company needs 3 production sponsor programs, roughly 8 active sites, benchmark reporting in monthly operating reviews, and one adjacent-disease paid design partner."
    unit: milestone
    source: "[BP milestones 12-24 months], [BP investorMemo.nextDiligence], and [Research reportMemo.validationPlan]."
