modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      SponsorLeads --> PaidPilots
      PaidPilots --> ProductionPrograms
      ProductionPrograms --> ProgramFees
      ProductionPrograms --> SiteExpansion
      ProductionPrograms --> ThroughputFees
      ProgramFees --> Revenue
      SiteExpansion --> Revenue
      ThroughputFees --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Hiring
      GrossProfit --> Opex
      GrossProfit --> Cash
modelSanity:
  - checkName: Revenue engine
    finding: Base revenue comes from turning 2 Y1 paid pilots into 5 active sponsor programs by Q4Y3 while program value rises from pilot pricing to roughly $500K annualized production value plus expansion fees.
  - checkName: Must go right
    finding: Onboarding has to stay within the BP's 6-8 week target so gross margin can climb toward 72% without adding too much implementation headcount.
  - checkName: Model breaks if
    finding: A 12-month sales cycle or sub-68% gross margin pushes the downside case through zero cash before the adjacent-disease expansion starts to help.
  - checkName: Next-round proof
    finding: A seed-ready story is 3 production sponsor programs, about 8 active sites, benchmark reporting, and one adjacent-disease paid partner by late Y2.
sanityChecks:
  ruleOf40: "Y3 growth 88.0% + EBITDA margin -8.5% = 79.4%."
  burnMultiple: "Y2 burn multiple 0.9x and Y3 burn multiple 0.2x using net burn divided by net new revenue."
  revenuePerFte: "$260K Y3 using the Q4Y3 9-FTE snapshot (benchmark $200-400K workflow SaaS)."
  flags:
    - The company is still not fully EBITDA positive in Y3, so the seed case depends on convincing investors that adjacent-disease expansion is repeatable before absolute profitability.
    - Revenue concentration remains high because 5 active programs still sit inside a small AATD buyer universe and one delayed sponsor can move the model materially.
    - The model assumes lightweight ingestion really works; if target centers require deep EHR integration, gross margin and pilot velocity both deteriorate quickly.
    - Cash stays positive in the base case, but the downside shows that a slower sales cycle plus lower structured-data availability likely forces a bridge before the seed milestone is fully proven.
