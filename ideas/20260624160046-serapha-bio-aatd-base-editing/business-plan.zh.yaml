slug: aatd-referral-readiness-os
date: '2026-06-24'
executiveSummary: AATD 转诊就绪 OS 向基因编辑公司和专家中心出售面向申办方的工作流软件与服务，解决的问题是：他们既需要已做基因分型确认的 PiZZ 患者，也需要完整的肺肝双器官基线资料包和能直接进入试验的转诊。第一个客户会是 AATD 精准治疗申办方里的临床运营副总裁或 CMO：公司正在激活 3-8 个美国中心，却发现通用罕见病招募并不能稳定产出符合方案要求的 PiZZ 候选者。这个切口刻意做窄：在肺科和肝病工作流里识别疑似 AATD 患者、推进确证性检测、在中心容量被浪费前把申办方筛选资料包整理好。这个滩头市场有吸引力，是因为价值能用“基因分型确认天数、资料包完整度、拿到首个合格患者的时间”快速量化，而不用靠长尾品牌或认知指标。研究支持的第 3 年 SOM 约为 $2.0M，但眼前买家池确实很小，项目能不能撑起风投回报，取决于能否扩到相邻的基因型定义肺肝疾病。相对横向供应商，最有证据支撑的优势是它在基因分型确认、家系级联路由和肺肝双器官基线整理上的 AATD 贴合度更高。最大的不确定性在两点：目标中心是否存着足够多可结构化调用的基因分型和实验室数据，从而支撑轻实施上线；以及第一波申办方更偏好项目费、中心费，还是按吞吐量定价。眼下更适合把它看作一个可信的 pre-seed 基础设施机会：痛点真实，但在拿到一个锚点申办方证明“合格患者到达速度可重复改善”之前，还谈不上高确信度平台。
problem:
- 疑似 PiZZ 患者仍然散落在 COPD、肺气肿、肝病和家系筛查流程里，因此申办方和中心手里并没有一条稳定产出已做基因分型确认候选者的管道。
- 确证性检测、咨询、资料包整理和基线证据采集，仍然要靠肺科、肝病和遗传团队手工协同推进，这会拖慢入组，也会抬高筛选失败风险。
- 一次性编辑项目让每漏掉一个患者、每低效一个中心，成本都会被放大，因为第一波研究中心覆盖面小、时间线又非常集中。
solution:
- 在专科中心工作流里标记疑似 AATD 病例，触发确证性基因分型和 AAT 检测，并把每个病例从“怀疑”一路跟到“申办方可接收的转诊”。
- 把方案要求下的肺肝基线资料包、家族史和同意状态整理成一份可审计的筛选档案，交给申办方和中心团队。
- 持续对比哪些转诊来源、哪些家系级联路径、哪些中心更能产出真正的 PiZZ 患者和更快的入组，让申办方把容量集中投到转化最高的地方。
whyWeWin:
- 横向队列筛选和招募供应商，并没有真正占住 AATD 怀疑、基因分型确认、家系路由和申办方资料包整理交汇的这条工作流。
- 公司会不断积累一张专有图谱：转诊来源产出、基线数据缺口和中心转化表现；每多上一个申办方项目、每多导入一个中心，这张图谱都会更强。
- 先作为现有中心和实验室工作流上的叠加层推出，比在第一个 AATD 项目都还没证明前，就要求中心整体换一套临床试验系统现实得多。
strategicChoices:
  beachhead: 正在美国 3-8 家学术肺科和肝病中心启动 AATD 精准治疗研究的申办方临床运营团队；他们需要已做基因分型确认的 PiZZ 转诊和完整的肺肝双器官筛选资料包。
  wedgeRationale: 相较于更泛的罕见病招募平台，这个入口能更快证明价值，因为方案是突变特异性的，买方在中心激活时已经感到时间压力，而且只靠少数中心和几项明确运营指标就能衡量成效。
  sequencingRationale: 先做轻量数据导入、检测流程协调和资料包整理，再去碰更深的 EHR 集成，因为第一阶段要证明的是运营吞吐，不是软件功能广度；先卖申办方试点，再考虑只对中心收费的合同，因为申办方的紧迫感和预算更早成形；在扩张销售之前，先补实施和临床运营人才，因为早期真正卡住的是合规安全的上线与可复制的客户背书。
  notYet:
  - 脱离申办方场景、面向广泛 COPD 或肝病人群的健康管理筛查
  - 完整替代 CRO，或泛化的去中心化试验软件
  - 在美国申办方与中心打法尚未形成可重复转化前就做国际扩张
  - 在至少跑通一条临床阶段工作流之前，就去做获批后的商业化治疗中心运营
market:
  tam: 估算 TAM 为 $18.4M，基于约 8 个活跃或临近启动的 AATD 疾病修饰项目及其中心工作流
  sam: 估算短期 SAM 为 $7.4M，对应美国/英语市场中约 4 个可信项目构成的申办方启动切口
  som: 估算第 3 年 SOM 为 $2.0M：2 个申办方项目加约 8 个活跃中心，前提是拿下 1 个锚点客户和 1 个跟进 logo
  segments:
  - 开展 AATD 研究的基因编辑、RNA 编辑及其他精准治疗申办方
  - 希望成为高绩效 AATD 试验和治疗中心的肺科与肝病专家中心
  buyingProcess: 最快的成交路径，是把付费申办方试点绑在研究启动节点上：临床运营副总裁或 CMO 掌握紧迫性，中心负责人则会成为推动者，因为他们最直接感受到资料包不完整和转诊质量差的痛。能不能转成年合同，要看三项指标有没有实打实改善：基因分型确认时间、拿到首个合格患者的时间，以及中心层面的转诊到筛选转化率。
product:
  mvp: MVP 先覆盖 3-5 个锚点中心，具备轻量的文件与实验室结果导入、基因分型流程跟踪、家系转诊状态管理，以及单一方案下的申办方资料包整理能力。上线时不要碰深度 EHR 集成，先靠可审计的交接和清晰的流失可视化，证明资格确认速度确实更快。
  sixMonth: 6 个月内落下 2 个付费申办方试点，接上 Labcorp 或 Quest 的结果导入路径，并上线中心仪表盘，跟踪从“怀疑”到“确认”的漏斗和资料包完整度。
  twelveMonth: 12 个月内补上可复用的方案配置、中心基准视图、审计就绪的记录控制，以及一张对比肺科、肝病和家系级联来源的转诊产出图谱。
  twentyFourMonth: 24 个月内把这套运营模型扩到相邻的基因型定义肺肝疾病；只有在同一张数据图谱和合规控制仍然适用的前提下，才增加获批后的治疗中心工作流模块。
  keyBets:
  - 目标中心能浮出足够多的疑似病例和历史检测数据，让“轻实施上线”这件事站得住。
  - 哪怕公司还没证明自己拥有广泛患者网络，申办方也愿意为能抬高真 PiZZ 命中率和资料包质量的工作流层付钱。
  - 家系级联筛查能贡献出有意义的合格患者增量，而不是停留在低产出的咨询服务。
  - AATD 专用工作流能扩到相邻的基因型定义疾病，而不会把公司拖成一家重度定制服务商。
gtm:
  wedge: 围绕 1 个正在进行的 AATD 研究、3-5 个启动中心和一组明确指标包，卖一个 90-120 天的申办方试点；指标只盯基因分型周转、资料包完整度和拿到首个合格患者的时间。
  channels:
  - 创始人主导，直销 AATD 精准治疗申办方里的临床运营副总裁、CMO 和研究启动负责人
  - 来自已经在做 AATD 研究的肺科和肝病中心的 KOL 与专家中心转介
  - 通过遗传咨询机构、大型检测实验室，以及基因编辑申办方周边的投资人或董事网络来介绍线索
  funnelTargets: 线索→合格试点 20-30%，合格试点→付费试点 35-50%，付费试点→年度正式生产 50%+，正式申办方→第二项目或相邻疾病扩展 25%+（18 个月内）
  pricing: 按申办方项目收年度费用，外加每个中心的上线费，以及按已确认患者路径收取的可选吞吐量费用；这比按席位计费更贴合买方的经济现实，因为价值真正绑定的是已激活中心、合格转诊和被避免的入组延迟。
businessModel:
  revenueStreams:
  - 面向单一方案和 3-5 个启动中心的付费申办方试点
  - 按活跃项目收取的申办方年度平台订阅费
  - 中心上线与集成费用
  - 面向家系级联工作流、增量中心和相邻疾病模块的可选吞吐或扩展费用
  unitOfValue: 已启用中心、并持续跟踪已确认患者工作流的活跃申办方项目
  targetGrossMarginPct: 70
  expansionLevers:
  - 在第一个申办方项目里增加更多中心和家系筛查工作流
  - 从同一申办方赢下后续项目，或切入相邻的精准治疗申办方
  - 把同一套合规和资料包整理层延伸到相邻的基因型定义肺肝疾病
strategyMap:
  northStarMetric: 每个活跃项目每季度交付、且带完整申办方基线资料包的合格 PiZZ 患者数
  inputMetrics:
  - 从疑似病例到基因分型确认的天数
  - 转诊患者中肺肝基线资料包完整的比例
  - 按中心统计的转诊来源到合格筛选转化率
  - 付费试点转成年正式生产的转化率
  - 中心上线中位时长
  moatsToBuild:
  - 把肺科、肝病和家系级联路径与真 PiZZ 转化连起来的转诊来源产出图谱
  - 关于基线缺项、流失原因和到筛速度的中心基准数据集
  - 面向申办方可见资料包整理和审计轨迹的合规安全工作流模板
  killCriteria:
  - 聚焦销售 9 个月后，仍签不下 1 个付费锚点申办方试点
  - 前 2 个试点相较于协调员主导的旧流程，没能把拿到首个合格患者的时间至少缩短 30%
  - 前 2 个试点里，转入候选者中达到申办方就绪资料包完整度的比例低于 80%
  - 服务 3-5 个中心的部署，在拿下前 3 个客户后，上线中位时间仍高于 8 周
  mermaid: "flowchart LR\n  Wedge[AATD sponsor wedge] --> MVP[Referral-readiness MVP]\n  MVP --> Proof[Faster PiZZ qualification and packet completeness]\n  Proof --> Expansion[Adjacent genotype-defined disease expansion]\n"
investorMemo:
  verdict:
    call: 观察
    conviction: 运营痛点真实，切口也说得通；但因为首批买家池太小，实施假设又还没被证明，当前确信度只能算中等。
    whyBelieve: 突变特异性的 AATD 疗法，立刻制造出“已做基因分型确认的患者流”和“肺肝双器官资料包整理”的需求，而横向招募工具看不出能把这件事做好。
    whyDoubt: 如果拿不出一个申办方试点，证明可以靠软件主导上线、显著提高转化，并顺畅扩进相邻疾病，公司很容易滑成一家服务很重的小众生意。
    nextDiligence: 验证一个覆盖 3-5 个中心的付费申办方试点，确认它能实打实缩短拿到首个合格患者的时间，并最终转成一份 $350k+ 的年度项目合同。
  firstCustomer:
    title: AATD 精准治疗申办方里的临床运营副总裁
    profile: 一家由风投支持的基因编辑或 RNA 编辑公司，正在美国启动首个多中心 PiZZ 研究，内部罕见病招募基础设施有限，合作中心为 3-8 家专家中心。
    trigger: 中心激活后暴露出问题：疑似 AATD 患者散落在各个专科门诊、基因分型确认不一致、筛选资料包也补不齐。
    buyer: 临床运营副总裁或首席医疗官
    initialContract: 先签一份覆盖 3-5 个中心、金额 $125k-$200k 的付费试点；如果资格确认速度和资料包完整度改善，再转成约 $350k-$500k 的年度项目费，外加中心上线费用。
  mustBeTrue:
  - 申办方愿意每年为 AATD 专用工作流支付低到中六位数美元，而不是继续依赖协调员、CRO 服务或横向招募供应商。
  - 目标中心里至少 40% 的疑似病例，能在不先做深度 EHR 集成的前提下，通过轻量数据导入模型推进。
  - 家系级联筛查在前 12 个月内，能贡献出足以形成商业意义的合格转诊增量。
  - 一个锚点申办方能证明：相较旧流程，拿到首个合格患者的时间至少快 30%，资料包缺陷也显著下降。
  - 同一套数据和工作流模型，可以在 24 个月内扩到相邻的基因型定义肝病或肺病。
  diligenceQuestions:
  - 未来 24 个月里，第一波现实买家到底有多少家？收入会集中到什么程度？
  - 锚点中心里的 PiZZ 病例发现，有多大比例依赖结构化数据，又有多大比例仍得靠手工翻病历和 PDF？
  - 对经济买方来说，最重要的指标到底是哪一个：拿到首个合格患者的天数、筛选失败率更低，还是中心激活效率？
  - 申办方为什么不直接扩展 IQVIA、TriNetX、InformedDNA，或者内部临床运营流程，而要额外买这层叠加系统？
  - 有什么证据能证明家系级联工作流带来的是有意义的转诊量，而不只是额外运营复杂度？
operatingAssumptions:
- assumption: 锚点中心里存在足够多的疑似 AATD 病例和既往检测数据，足以支撑一套软件主导的转诊工作流。
  basis: research.yaml
  validationTest: 审计 2 家肺科中心和 2 家肝病中心，要求至少 40% 的抽样疑似病例都能找回 AAT 或基因分型数据，并且存在可跟踪的下一步流程。
  decisionImpact: 如果不成立，首发产品就会滑向高触达服务模式，公司应缩窄 ICP，或者推迟融资。
- assumption: 第一个可重复的预算负责人，是申办方临床运营负责人，而不是更慢的跨职能采购委员会。
  basis: idea.yaml
  validationTest: 拿下前 2 个付费试点，且都由同一申办方职能定义成功指标、签合同并主持每周运营复盘。
  decisionImpact: 如果不成立，销售周期会拉长，公司可能需要改成 CRO 或渠道主导打法，而不是创始人直销。
- assumption: 只靠轻量实验室和文档导入，不做深度 EHR 集成，也能把 3-5 个中心的上线控制在 8 周以内。
  basis: research.yaml
  validationTest: 给前 3 次部署计时，从签约到首个可用中心仪表盘上线，要求中位 go-live 时间低于 8 周。
  decisionImpact: 如果不成立，毛利和试点推进速度都会恶化，要么提价，要么进一步收窄中心画像。
- assumption: 除了门诊内病例发现外，家系级联筛查还能带来可量化的合格患者增量。
  basis: research.yaml
  validationTest: 跟踪前 100 条已确认患者工作流，要求至少 15% 的合格转诊来自家系级联路径。
  decisionImpact: 如果不成立，路线图就该弱化咨询侧，把重心拉回肺科和肝病中心转化。
- assumption: AATD 的验证结果可以扩到相邻的基因型定义肺肝疾病，而不用把产品从头重做。
  basis: 运营者判断
  validationTest: 在第 18 个月前，用同一套资料包、审计和检测工作流原语，拿下 1 个相邻疾病的共创合作。
  decisionImpact: 如果不成立，市场天花板就太低，业务更适合优化成细分现金流生意，而不是风投级规模。
experimentRoadmap:
- horizon: 0–90 天
  experiment: 访谈 12-15 位参与 AATD 精准治疗工作流的申办方临床运营负责人、中心主任和遗传咨询伙伴。
  hypothesis: 最紧迫的痛点不是泛化认知，而是在中心激活时拿不到完整的“已做基因分型确认的转诊流”和资料包。
  successMetric: 至少 8 次访谈明确提到最近出现过 PiZZ 资格确认或资料包整理瓶颈，且其中 4 家愿意一起定义试点指标。
  owner: 创始人/CEO
- horizon: 0–90 天
  experiment: 在 4 个锚点中心做一次回顾性工作流审计，覆盖疑似病例、已有检测、缺失的基线字段和转诊流失点。
  hypothesis: 现有可用数据足以支持轻量导入上线，而不用一开始就做完整 EHR 集成。
  successMetric: 至少 40% 的抽样病例能被还原进一条可跟踪工作流和资料包模板。
  owner: 创始工程师
- horizon: 90–180 天
  experiment: 在 3-5 个中心启动首个付费申办方试点，每周复盘漏斗，并把申办方资料包正式交接出去。
  hypothesis: 把试点绑在活跃研究启动上的申办方项目，会比单独向中心卖工作流转得更快。
  successMetric: 试点签下，并在项目启动后 120 天内交付首份合格患者资料包。
  owner: 创始人/CEO
- horizon: 90–180 天
  experiment: 把 1 家全国性实验室和 1 条咨询工作流接进试点运营模型。
  hypothesis: 接上实验室和咨询师流程，会减少手工跟进，并提高基因分型确认吞吐。
  successMetric: 试点队列里，从疑似病例到基因型确认的中位时间至少下降 20%。
  owner: 临床运营负责人
- horizon: 180–365 天
  experiment: 把前 2 个试点里的中心基准报表和转诊来源产出分析产品化。
  hypothesis: 中心基准可视化，是最有机会把试点转成年合同、并形成护城河的功能。
  successMetric: 至少有 1 个试点转成年正式生产合同，并在月度运营复盘里使用基准报告。
  owner: 产品工程师
- horizon: 180–365 天
  experiment: 用同一套工作流原语测试 1 个相邻疾病的共创合作。
  hypothesis: 核心的资料包和检测工作流，不用大规模重构也能扩到 AATD 之外。
  successMetric: 到第 18 个月，1 个相邻项目进入付费共创或签约发现阶段。
  owner: 创始人/CEO
operations:
- 面向申办方可见电子记录、资料包来源和审计轨迹控制的合规与 QA 流程
- 围绕确证性检测、结果导入和家系级联路由的实验室与咨询师集成流程
- 覆盖数据映射、方案配置和每周漏斗复盘节奏的中心上线手册
- 围绕资格确认速度、资料包完整度和中心转化基准的申办方客户成功复盘机制
team:
- role: 创始人/CEO
  startTiming: Month 0
  rationale: 早期能不能成，取决于能否拿下一个很窄的申办方切口、把试点指标钉清楚，并抵住把公司包装成“广谱招募平台”的诱惑。
- role: 创始工程师
  startTiming: Month 0
  rationale: 第一个技术风险，是能否在杂乱的文档、实验室结果和中心流程之间，搭出可靠的病例跟踪和资料包整理层，而且交接过程还得经得起审计。
- role: 临床运营实施负责人
  startTiming: Month 3
  rationale: 如果没人能把方案工作流配好、把中心带起来、并以足够专业的姿态主持申办方漏斗复盘，试点价值就跑不出来。
- role: 产品工程师
  startTiming: Month 6
  rationale: 第一个试点之后，公司需要更快迭代仪表盘、基准报表和集成模板，这不是一个技术创始人长期单枪匹马能扛住的。
- role: 商务拓展负责人
  startTiming: Month 9
  rationale: 一旦有了可背书的申办方试点，公司就得在扩销售团队前，先把渠道和申办方管线扎实推进。
milestones:
- horizon: 0–12 个月
  items:
  - 拿下 2 个 AATD 付费申办方试点，每个覆盖 3-5 个中心
  - 至少证明 1 个试点相较旧流程把拿到首个合格患者的时间缩短 30%
  - 借助轻量导入和 1 个实验室集成，把 3-5 个中心的上线压到可重复的 6-8 周区间
  - 至少把 1 个试点转成年正式生产合同
- horizon: 12–24 个月
  items:
  - 做到 2-3 个正式运行的申办方项目和约 8 个活跃中心，对齐研究里的第 3 年 SOM 路径
  - 把转诊产出和中心基准报表沉淀成一个可重复的月度运营复盘产品
  - 在不破坏实施经济性的前提下，引入 1 个相邻的基因型定义疾病共创客户
  - 证明在有同意和咨询基础设施的地方，家系级联工作流确实能贡献可量化的合格转诊量
- horizon: 24–36 个月
  items:
  - 扩到 2-3 个 AATD 之外的相邻基因型定义疾病项目
  - 搭起一个可复用的伙伴网络，覆盖专家中心、咨询机构和检测实验室
  - 证明公司手里的是一张耐久的转诊和中心绩效图谱，而不只是一个服务很重的启动流程
  - 把收入分散到足够多项目上，不让任何单一申办方主导整个业务
risks:
- risk: 短期申办方市场过窄，且 AATD 编辑项目一旦暂停或失败，市场会迅速收缩。
  likelihood: High
  impact: High
  mitigation: 把 AATD 当成验证切口，而不是完整公司；到第 18 个月必须做出是否扩向相邻疾病的决定。
- risk: 目标中心可能缺少结构化的基因分型和基线数据，迫使上线工作滑向手工服务。
  likelihood: High
  impact: High
  mitigation: 先用轻量导入、严格 ICP 选择和明确证明门槛起步，在证明可规模化软件毛利前，不提前承诺。
- risk: 申办方可能认为横向 CRO、招募或咨询供应商已经足够支撑第一波研究。
  likelihood: Medium
  impact: High
  mitigation: 围绕一组极窄的指标卖：基因分型周转、资料包完整度和转诊到合格筛选转化——这些通常不是通用供应商真正擅长的。
- risk: 面向申办方可见的工作流，可能在 Part 11、EHR 来源和源数据控制上遭遇更严格的监管与 QA 审视。
  likelihood: Medium
  impact: High
  mitigation: 让首版产品从一开始就审计就绪、规则可配置、来源边界清楚，而不是做成一个黑箱决策引擎。
- risk: 家系级联工作流在第一年带来的，可能是更多协同负担，而不是足够多的合格患者增量。
  likelihood: Medium
  impact: Medium
  mitigation: 把级联贡献单独量化；如果肺科和肝病病例发现更高效，就降低这条路线的优先级。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: 把合规安全的转诊与资料包平台搭出来，支撑 2 个申办方试点和第一次正式生产转化，补齐实施与产品人才，并在下一轮融资前判断 AATD 的验证能否延伸到至少 1 个相邻的基因型定义疾病。
