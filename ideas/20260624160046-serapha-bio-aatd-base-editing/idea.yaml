problem: >-
  Gene-editing sponsors pursuing AATD do not just need a powerful editor; they need to find
  genetically confirmed PiZZ patients across fragmented pulmonology and hepatology pathways before
  scarce trial-site capacity is wasted. Today, likely AATD patients are buried inside COPD,
  emphysema, and unexplained liver-disease workflows, while confirmatory genotyping, referral
  packet assembly, and baseline data collection are still manual. That creates slow enrollment,
  high screen-failure risk, and weak natural-history context exactly when one-time therapies make
  every missed patient disproportionately costly.
targetUser:
  primary: >-
    VP Clinical Operations or clinical development lead at a venture-backed gene-editing biotech
    preparing an interventional study for severe PiZZ AATD
  secondary: >-
    Rare-disease program directors at pulmonary and hepatology centers that want to become
    high-performing AATD trial and treatment sites
  buyer: VP Clinical Operations or Chief Medical Officer
startupThesis:
  nonObviousInsight: >-
    Once a one-time editor can target the root PiZZ mutation, the scarce asset is no longer only
    the editing chemistry; it is a trial-ready graph of suspected patients, confirmed genotypes,
    family referrals, and centers that can collect dual lung-liver baseline evidence. The first
    enduring platform winner can own that operational graph before AATD editing becomes a crowded
    therapeutic race.
  beachhead: >-
    Clinical-operations teams at gene-editing biotechs opening 6-20 U.S. pulmonary and hepatology
    sites for severe PiZZ AATD trials, where each site needs genetically confirmed patients and
    standardized baseline data packages
  wedge: >-
    An AATD referral-readiness OS that flags likely PiZZ patients in specialty clinics, automates
    confirmatory genotype workflows, and assembles sponsor-ready screening and baseline packets for
    gene-editing sites
  whyNowCatalyst: >-
    Serapha's $230M launch around a root-cause PiZZ editor turns AATD from a future science story
    into an immediate race to diagnose, qualify, and route patients into trials and early center
    networks.
  ventureScalePath: >-
    Start with AATD patient-finding and site-readiness, then expand into other genotype-defined
    lung and liver diseases, post-approval treatment-center operations for one-time editors, and a
    broader rare-disease infrastructure layer spanning diagnosis, referral, longitudinal outcomes,
    and family cascade screening.
solution: >-
  The company sells a disease-specific operating layer to sponsors and specialist centers launching
  AATD gene-editing programs. It connects pulmonary and hepatology referral sources, identifies
  charts that match likely AATD patterns, triggers genotype-confirmation workflows, and packages
  prior imaging, lung function, liver markers, and family history into a sponsor-ready screening
  dossier. For active sites, the product standardizes baseline collection and tracks where patients
  stall between suspicion, testing, confirmation, and enrollment. Over time, the startup builds
  the highest-value dataset in the category: which referral patterns yield true PiZZ patients, what
  baseline evidence predicts trial fit, and which centers convert screened patients into enrolled
  participants fastest.
goToMarketSeed:
  firstCustomer: >-
    Clinical-ops leader at a Serapha-like AATD gene-editing company launching its first U.S.
    multicenter study across academic pulmonary and hepatology sites with limited prior rare-disease
    recruiting infrastructure
  buyingTrigger: >-
    The sponsor finalizes site selection or activates enrollment and realizes likely AATD patients
    are scattered across specialty clinics with inconsistent genotyping and incomplete baseline
    records
  currentAlternative: >-
    Manual chart review by coordinators, generic trial-recruitment vendors, patient-advocacy
    outreach, and ad hoc lab send-outs for confirmatory testing
  switchingReason: >-
    AATD-specific workflow software can produce more true PiZZ referrals per site and cleaner
    screening packets than generic recruitment tools because it is built around genotype
    confirmation, dual-organ baseline data, and family cascade logic.
  pricingHypothesis: >-
    Annual platform fee per active sponsor program plus per-site onboarding and per-confirmed-patient
    workflow fees tied to screening throughput and site activation value.
