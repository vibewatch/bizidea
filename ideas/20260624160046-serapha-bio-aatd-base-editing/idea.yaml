ideaScorecard:
  signalStrength:
    score: 4
    rationale: The cluster combines major financing, a public-market transaction, and a clearly identified untreated patient cohort.
  painIntensity:
    score: 5
    rationale: Missing or delayed PiZZ diagnosis can directly slow trials for a one-time therapy where each patient and site slot matters.
  wedgeClarity:
    score: 5
    rationale: Genotype confirmation and referral-readiness for AATD editing trials is a narrow workflow with an obvious first buyer and trigger.
  defensibility:
    score: 4
    rationale: Referral-yield data, site conversion benchmarks, and family cascade patterns should compound into a differentiated rare-disease graph.
  ventureScale:
    score: 4
    rationale: The first market is narrow, but the same operating layer can extend into adjacent genotype-defined diseases and commercial treatment-center ops.
topRisks:
  - name: Narrow first sponsor market
    description: Only a small number of AATD gene-editing programs may be active in the first wave.
    mitigation: Start with AATD for focus, but design data models and workflows to expand quickly into adjacent genotype-defined liver and lung diseases.
  - name: Integration friction at specialty sites
    description: Pulmonary and hepatology centers may resist another workflow unless setup is light and immediate value is obvious.
    mitigation: Launch with minimal data-ingestion paths, lab-partner integrations, and white-glove onboarding that proves faster referral conversion within one study cycle.
  - name: Regulatory caution around screening workflows
    description: Sponsors may worry that software-driven qualification logic could complicate protocol compliance or site oversight.
    mitigation: Position the product as an operational decision-support layer with sponsor-configurable rules, auditable handoffs, and validation against existing screening SOPs.
