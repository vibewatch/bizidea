differentiator: >-
  Generic trial-tech vendors help manage forms after a patient is already found, while rare-disease
  recruiters usually lack deep genotype and site-readiness workflows. This company starts earlier
  in the funnel by linking suspicion patterns, confirmatory testing, baseline evidence, and
  sponsor-site handoff inside one AATD-specific workflow. Its defensibility comes from a proprietary
  graph of referral sources, genotype-yield patterns, family cascade conversions, and site
  performance that becomes more valuable as more one-time editing programs enter adjacent diseases.
