slug: aatd-referral-readiness-os
date: 2026-06-24
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-07
  unit: 月
  source: '[BP date 2026-06-24] 模型从 business-plan 日期后的第一个完整月份开始。'
- id: A2
  name: pre-seed 融资到账后的起始现金
  value: '2200'
  unit: USDK
  source: '[BP fundingAsk targetFundingRangeUsd $2-4M; BP fundingAsk.runwayMonths 18] 基准情形用 $2.2M 的 pre-seed，保证公司能跑到 Y2 后段的证明点，并额外留出 6 个月缓冲，而不假设一定拿到区间上沿。'
- id: A3
  name: 客户定义
  value: 1 个活跃申办方项目记作 1 个客户。
  unit: 口径
  source: '[BP businessModel.unitOfValue active sponsor program with enabled sites and tracked confirmed-patient workflows]'
- id: A4
  name: 客户获取爬坡
  value: 第一个付费试点在 M6，第二个在 M10，第 3 个活跃申办方项目在 Y2 第 2 季度，第 4 个在 Y3 第 1 季度，第 5 个在 Y3 第 3 季度。
  unit: 客户
  source: '[BP milestones]、[BP gtm.funnelTargets] 和 [BP investorMemo.firstCustomer] 转译成一个保守的、由创始人主导销售的爬坡节奏。'
- id: A5
  name: 每个活跃申办方项目的综合收入
  value: 前 90 天试点期每个项目每月 $50K；到 Y2 正式生产阶段，每月约 $35-40K；到 Y3，随着中心、吞吐和相邻疾病扩展叠加，每月约 $42-50K。
  unit: USDK / 客户月
  source: '[BP investorMemo.firstCustomer.initialContract $125k-$200k pilot and $350k-$500k annual program fee]、[BP gtm.pricing] 和 [Research market.som rationale]。'
- id: A6
  name: 毛利率爬坡
  value: 早期试点月份毛利率约 55%，到 Y1 后段约 66%，Y2 维持在 65-70%，Y3 提升到 71-72%。
  unit: 百分比
  source: '[BP businessModel.targetGrossMarginPct 70]，以及 [BP operatingAssumptions] 中“无需深度 EHR 集成也能把上线控制在 8 周内”的假设。'
- id: A7
  name: 创始人综合现金薪酬
  value: '180'
  unit: USDK / FTE 年
  source: 针对 pre-seed 生物医药基础设施创始人的创业财务经验假设：现金薪酬低于市场价。
- id: A8
  name: 工程综合现金薪酬
  value: '190'
  unit: USDK / FTE 年
  source: 针对支持受监管医疗工作流的早期产品与集成工程师的创业财务经验假设。
- id: A9
  name: 临床运营实施综合现金薪酬
  value: '165'
  unit: USDK / FTE 年
  source: '[BP team clinical ops implementation lead]，加上面向领域实施负责人的创业财务经验假设。'
- id: A10
  name: 产品与监管综合现金薪酬
  value: '175'
  unit: USDK / FTE 年
  source: '[BP product twelveMonth audit-ready record controls]，加上承担合规范围产品负责人的创业财务经验假设。'
- id: A11
  name: 商务拓展综合现金薪酬
  value: '170'
  unit: USDK / FTE 年
  source: '[BP team business development lead]，加上贴近创始人打法的生物医药企业销售创业财务经验假设。'
- id: A12
  name: G&A 与运营综合现金薪酬
  value: '130'
  unit: USDK / FTE 年
  source: 精简财务、法务和运营支持的创业财务经验假设。
- id: A13
  name: 人员爬坡快照
  value: 创始人 1/1/1/1/1/1；工程 1/1/2/2/2/3；临床运营实施 0/1/1/1/1/2；产品-监管 0/0/1/1/1/1；BD-GTM 0/0/0/1/1/1；G&A-运营 0/0/0/0/1/1，对应 q1y1/q2y1/q3y1/q4y1/q4y2/q4y3。
  unit: FTE
  source: '[BP team startTiming]、[BP strategicChoices.sequencingRationale]，以及一种保守扩张路径：在第一次正式生产转化之后，才补后台岗位。'
- id: A14
  name: 季度薪酬平滑处理
  value: Y2 和 Y3 的工资线会在要求的快照列之间，按月平滑新增招聘，而不是只在年末跳变。
  unit: 方法
  source: '[Financial Modeler 的人员列约定]'
- id: A15
  name: 非薪酬 GTM 开支爬坡
  value: $17-25K/月（Y1），Y2 每季度每项功能 $27-35K，Y3 每季度 $38-45K，覆盖差旅、会议、申办方尽调和渠道拓展。
  unit: USDK
  source: '[BP gtm.channels]，加上高差旅、创始人主导的生物医药企业销售创业财务经验假设。'
- id: A16
  name: 非薪酬研发与合规开支爬坡
  value: $8-10K/月（Y1），Y2 每季度 $33-39K，Y3 每季度 $42-45K。
  unit: USDK
  source: '[BP operations]、[Research regulatoryTechnicalConstraints]，以及云、QA、安全和审计轨迹工具的创业财务经验假设。'
- id: A17
  name: 非薪酬 G&A 开支爬坡
  value: $4-6K/月（Y1），Y2 每季度 $18-24K，Y3 每季度 $27-30K。
  unit: USDK
  source: 受监管工作流公司的法务、会计、隐私和保险等基础开销的创业财务经验假设。
- id: A18
  name: 完全计入口径 CAC
  value: '180'
  unit: USDK / 新申办方项目
  source: '[BP gtm.funnelTargets]、[BP gtm.channels] 和 [Research reportMemo.willingnessToPay]；由于申办方高度集中，即便由创始人销售，CAC 仍高于常规 SaaS。'
- id: A19
  name: 基准销售周期
  value: '9'
  unit: 月
  source: '[BP experimentRoadmap]，以及在验证、尽调和范围定义后拿下受监管申办方试点的创业财务经验假设。'
- id: A20
  name: 月流失率
  value: '2.0'
  unit: 百分比
  source: 创业财务经验假设；一旦嵌入申办方流程，粘性会很高，但滩头市场本身集中，且部分收入仍绑定项目连续性，而不是纯 SaaS 续费。
- id: A21
  name: 现金转化简化假设
  value: EBITDA 近似等于融资到账后的现金变动。
  unit: 方法
  source: 针对轻资产软件与工作流业务的创业财务经验假设：模型里不单列债务或 capex，因此用 EBITDA 近似现金变动。
- id: A22
  name: 下一轮融资证明点
  value: 到 Y2 后段，公司需要做到 3 个正式运行的申办方项目、约 8 个活跃中心、在月度运营复盘里使用基准报表，并拿下 1 个相邻疾病的付费共创伙伴。
  unit: 里程碑
  source: '[BP milestones 12-24 months]、[BP investorMemo.nextDiligence] 和 [Research reportMemo.validationPlan]。'
