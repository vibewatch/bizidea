scenarios:
  downside:
    description: 申办方决策继续拉长，1 个正式生产转化滑出 Y2，且由于结构化基因分型数据比预期更差，上线模式也更偏重服务。
    y3RevenueK: 1710.0
    y3EbitdaK: -611.0
    cashLowPointK: -72.0
    keyAssumptionChanges:
    - Y2 年末正式生产的申办方项目，从 3 个降到 2 个。
    - Y3 年末活跃申办方项目，从 5 个降到 4 个。
    - 核心年度项目价值停在约 $430K，而不是 $500K。
    - 稳态毛利率上限只有约 68%，而不是 72%。
  base:
    description: Y1 的 2 个付费试点，到 Y2 后段转成 3 个正式运行的申办方项目；到 Q4Y3，随着基准报表和 1 个相邻疾病用例开始挂上，扩到 5 个活跃项目。
    y3RevenueK: 2340.0
    y3EbitdaK: -199.4
    cashLowPointK: 548.0
    keyAssumptionChanges:
    - A1-A22 基准假设不变。
  upside:
    description: 一个申办方背书加快后续赢单，相邻疾病项目更早落地，且实施复用让收入和毛利都比计划提升得更快。
    y3RevenueK: 3010.0
    y3EbitdaK: 273.0
    cashLowPointK: 901.0
    keyAssumptionChanges:
    - Y2 年末正式生产的申办方项目，从 3 个升到 4 个。
    - Y3 年末活跃申办方项目，从 5 个升到 6 个。
    - 核心年度项目价值随着更多中心和吞吐扩展，提高到约 $560K。
    - 由于上线模板更早实现复用，稳态毛利率提升到 74%。
sensitivity:
- variable: ARPU
  downsideCase: $430K 的核心年度项目价值
  baseCase: $500K 的核心年度项目价值
  upsideCase: $560K 的核心年度项目价值
  y3RevenueImpactK: -330.0
  cashImpactK: -248.0
- variable: CAC
  downsideCase: 由于每拿下 1 个申办方都要投入更重的创始人和实施精力，CAC 达到 $230K
  baseCase: $180K CAC
  upsideCase: 通过更强的 KOL 和实验室伙伴转介，把 CAC 压到 $140K
  y3RevenueImpactK: 0.0
  cashImpactK: -150.0
- variable: 流失率
  downsideCase: 如果申办方把这套工作流当成单一研究工具，月流失率为 3.0%
  baseCase: 月流失率 2.0%
  upsideCase: 借助基准锁定和后续项目扩张，把月流失率降到 1.0%
  y3RevenueImpactK: -210.0
  cashImpactK: -138.0
- variable: 销售周期
  downsideCase: 从首次接触到签下试点，平均销售周期 12 个月
  baseCase: 平均销售周期 9 个月
  upsideCase: 围绕研究启动窗口，把平均销售周期缩到 6 个月
  y3RevenueImpactK: -345.0
  cashImpactK: -312.0
- variable: 毛利率
  downsideCase: 由于上线持续偏服务化，稳态毛利率只有 68%
  baseCase: 稳态毛利率 72%
  upsideCase: 凭更好的导入复用把稳态毛利率抬到 74%
  y3RevenueImpactK: 0.0
  cashImpactK: -94.0
- variable: 招聘节奏
  downsideCase: 在可重复性尚未被证明前，就提前招第 3 位工程师和第 2 位实施人员
  baseCase: 当前这种和正式生产转化绑定的精简爬坡
  upsideCase: 把 1 个规模化岗位延后到相邻疾病伙伴签约之后再招
  y3RevenueImpactK: -40.0
  cashImpactK: -170.0
modelDiagram:
  title: 单位经济流转图
  mermaid: "flowchart LR\n  SponsorLeads --> PaidPilots\n  PaidPilots --> ProductionPrograms\n  ProductionPrograms --> ProgramFees\n  ProductionPrograms --> SiteExpansion\n  ProductionPrograms --> ThroughputFees\n  ProgramFees --> Revenue\n  SiteExpansion --> Revenue\n  ThroughputFees --> Revenue\n  Revenue --> GrossProfit\n  GrossProfit --> Hiring\n  GrossProfit --> Opex\n  GrossProfit --> Cash\n"
modelSanity:
- checkName: 收入引擎
  finding: 基准收入靠的是：把 Y1 的 2 个付费试点，转成 Q4Y3 时的 5 个活跃申办方项目；同时项目价值从试点定价抬升到约 $500K 的年化正式生产价值，再叠加扩展费用。
- checkName: 必须跑对的事
  finding: 上线必须守住 BP 里 6-8 周的目标，毛利率才能在不追加过多实施人头的前提下，爬向 72%。
- checkName: 模型会在哪儿断
  finding: 如果销售周期拉到 12 个月，或者毛利率掉到 68% 以下，下行情景会在相邻疾病扩张开始帮忙前就先烧穿现金。
- checkName: 下一轮融资证明点
  finding: 到 Y2 后段，一个够 seed 的故事应该是：3 个正式运行的申办方项目、约 8 个活跃中心、稳定使用的基准报表，以及 1 个相邻疾病付费伙伴。
sanityChecks:
  ruleOf40: Y3 增长 88.0% + EBITDA 利润率 -8.5% = 79.4%。
  burnMultiple: Y2 的 burn multiple 为 0.9x，Y3 为 0.2x，按净烧钱除以净新增收入计算。
  revenuePerFte: 按 Q4Y3 的 9 FTE 快照计算，Y3 人均收入为 $260K（工作流 SaaS 的参考区间约 $200-400K）。
  flags:
  - 公司到 Y3 仍未完全实现 EBITDA 转正，因此这个 seed 故事成立的前提，是投资人相信相邻疾病扩张能在绝对盈利之前先被重复验证。
  - 收入集中度依旧很高，因为 5 个活跃项目仍然落在很小的 AATD 买家池里，任何 1 个申办方延迟，都会显著撬动模型。
  - 模型假设轻量导入确实可行；如果目标中心需要深度 EHR 集成，毛利和试点推进速度都会迅速恶化。
  - 基准情形下现金仍为正，但下行情景表明：销售周期变慢叠加结构化数据可得性变差时，公司大概率会在 seed 里程碑完全证明前先需要过桥资金。
