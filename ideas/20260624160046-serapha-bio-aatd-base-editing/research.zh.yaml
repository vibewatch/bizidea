  pestle:
  - factor: 政治
    impact: positive
    point: 孤儿药和罕见病政策支持还在持续，仍然会鼓励申办方继续投向细分遗传病。
    sourceRefs:
    - 17
    - 45
  - factor: 经济
    impact: negative
    point: 买家基数太小、项目波动又大，所以公司只有尽快跳出 AATD，首发市场才足以支撑一家企业。
    sourceRefs:
    - 1
    - 2
    - 3
    - 20
  - factor: 社会
    impact: positive
    point: 患者对基因治疗感兴趣，但需要教育；这反而让值得信任的工作流和咨询伙伴更有价值。
    sourceRefs:
    - 23
    - 29
  - factor: 技术
    impact: positive
    point: 面向突变的疗法加上可互操作的健康数据标准，让“先按基因型识别、再推进转诊”的流程越来越能真正跑起来。
    sourceRefs:
    - 16
    - 18
    - 19
    - 40
    - 41
  - factor: 法律
    impact: negative
    point: Part 11、EHR 数据和 eSource 指南，把任何面向申办方的工作流在可审计性、来源追踪和系统验证上都抬到了高门槛。
    sourceRefs:
    - 36
    - 37
    - 38
  - factor: 环境
    impact: neutral
    point: 去中心化试验元素能减轻患者出行负担，但并不能消掉对高质量中心控制和源数据控制的要求。
    sourceRefs:
    - 39
  adoptionFrictionMatrix:
  - friction: 中心缺少结构化的基因分型和基线数据字段
    severity: high
    affectedBuyer: 申办方临床运营与中心协调员
    mitigation: 先用文件导入加高价值结构化字段起步，只有在数据质量撑得住时，再往更深的 EHR/FHIR 集成叠。
    sourceRefs:
    - 37
    - 38
    - 40
    - 41
  - friction: 家系级联流程会抬高同意与协同复杂度
    severity: medium
    affectedBuyer: 遗传咨询师和转诊协调员
    mitigation: 依赖咨询伙伴，并把同意状态显式建模，而不是默认家系外展这件事很好做。
    sourceRefs:
    - 4
    - 9
    - 29
  - friction: 买家池太小，采购风险高
    severity: high
    affectedBuyer: 创始团队 / 收入负责人
    mitigation: 围绕清晰的试验里程碑来卖，并在 AATD 证明成立后尽快扩到相邻疾病。
    sourceRefs:
    - 1
    - 2
    - 3
    - 20
  - friction: 患者和社区医生可能看不懂编辑类试验选项
    severity: medium
    affectedBuyer: 中心和患者互动团队
    mitigation: 把工作流软件和教育内容、咨询师支持交接一起打包。
    sourceRefs:
    - 23
    - 30
