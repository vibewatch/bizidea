competitors:
- name: TriNetX LIVE
  stage: 在位企业
  wedge: 依托超大患者网络，提供无代码队列发现、中心识别和真实世界证据。
  pricing: 定制 / 企业合同
  strength: 去标识化患者图谱极大，且已经和申办方建立关系。
  weaknessVsUs: 并不是围绕 AATD 的基因分型确认、家系级联工作流或申办方所需的肺肝双器官资料包来设计。
  sourceRefs:
  - 32
  - 40
  - 41
- name: IQVIA Patient Recruitment Solutions
  stage: 在位企业
  wedge: 面向申办方提供规模化的全球患者招募和中心支持。
  pricing: 定制 / 服务型合同
  strength: 执行规模大、全渠道外展强、中心支持基础设施成熟。
  weaknessVsUs: 本质上是宽漏斗招募引擎，不是一套会持续沉淀中心产出情报的 AATD 专用操作系统。
  sourceRefs:
  - 27
  - 33
- name: InformedDNA Clinical Trials
  stage: 成长阶段
  wedge: 把遗传咨询和“已准备好同意”的转诊支持打包给基因定义研究。
  pricing: 定制 / 服务型合同
  strength: 在遗传学工作流和咨询能力上很有可信度。
  weaknessVsUs: 看起来更强在咨询，而不是申办方-中心运营分析、基线资料包整理或中心基准数据。
  sourceRefs:
  - 29
  - 23
- name: Datavant + Indegene NEXT
  stage: 在位企业
  wedge: 用数据补强和数字化招募降低罕见病与复杂研究的筛选失败。
  pricing: 定制 / 企业合作
  strength: 拥有大规模健康数据检索网络，数据匹配叙事也很强。
  weaknessVsUs: 横向的数据管道，本身解决不了 AATD 特有的检测规则、家系路由和中心就绪流程。
  sourceRefs:
  - 31
  - 25
- name: Rare Patient Voice
  stage: 专科玩家
  wedge: 围绕罕见病患者与照护者社区做研究招募。
  pricing: 定制 / 招募项目定价
  strength: 在多个罕见病领域都沉淀了可信的患者网络。
  weaknessVsUs: 进入漏斗时点太靠后——患者往往已经被识别；它不是嵌在门诊里的病例发现系统，也不是受监管的资料包系统。
  sourceRefs:
  - 30
  - 35
regulatoryTechnicalConstraints:
- point: 只要电子工作流能被申办方看到，就必须满足 FDA 对 Part 11 下电子记录和电子签名可信性的要求。
  sourceRefs:
  - 36
- point: 如果筛选或基线资料包用到了提供者 EHR 数据，就必须把来源和源数据责任边界说清楚。
  sourceRefs:
  - 37
  - 38
- point: 远程预筛、远程医疗或去中心化步骤，仍然都落在 FDA 对去中心化临床试验要素的指导框架里。
  sourceRefs:
  - 39
- point: 集成质量最终取决于目标中心能否提供符合 USCDI/FHIR 的数据，而不只是非结构化文档。
  sourceRefs:
  - 40
  - 41
validationSignals:
- point: 新的申办方资金和公开市场启动活动，让 AATD 运营基础设施从“理论需求”变成了“当下需求”。
  sourceRefs:
  - 1
  - 2
  - 3
- point: 多项仍在招募或处于活跃但暂不招募状态的精准治疗研究，证明申办方对 PiZZ 患者识别的需求是持续的。
  sourceRefs:
  - 18
  - 19
  - 21
  - 22
  - 47
  - 51
- point: 指南明确要求更广泛的检测和家系级联工作，这正好就是产品要接住的工作流负担。
  sourceRefs:
  - 4
  - 9
  - 14
- point: 只要教育缺口被补上，患者对基因治疗和临床试验的接受意愿并不低。
  sourceRefs:
  - 23
openQuestions:
- 目标中的美国肺科和肝病中心里，有多少已经把基因分型结果存成结构化、可查询字段，而不是 PDF？
- 锚点中心里，疑似 AATD 转诊中有多大比例需要重新做基因分型，而不是把既往检测结果调出来？
- 第一波申办方会更偏好项目费、中心费，还是与吞吐量挂钩的费用口径？
- 相较于在 COPD 和肝病门诊里做病例发现，家系级联筛查究竟能额外撬出多少转诊量？
