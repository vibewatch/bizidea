  searchedQueries:
  - 最近有哪些权威资料系统描述了 α1-抗胰蛋白酶缺乏症在美国和全球的患病规模、漏诊情况以及 PiZZ 患者数量？优先 NIH、Alpha-1 Foundation、COPD Foundation、同行评审综述和指南页面。
  - 最近有哪些权威资料描述了以基因型为导向或具疾病修饰作用的 α1-抗胰蛋白酶缺乏症疗法临床管线？尤其关注碱基编辑、RNA 编辑、RNAi、基因治疗，以及重点公司的项目页面。
  - 哪些权威资料讨论了罕见病和 AATD 试验招募、基因分型确认、中心就绪和家系级联筛查中的运营瓶颈？优先临床试验运营研究、倡导组织材料和指南。
  - 哪些权威资料覆盖了与协调 AATD 患者识别、转诊和试验筛选相关的软件在美国需要满足的监管与合规要求，例如 HIPAA、21 CFR Part 11、FDA 电子记录和临床试验招募指南？
  - 找出 FDA《Use of Electronic Health Record Data in Clinical Investigations》和《Electronic Source Data in Clinical Investigations》两份指南的官方页面 URL。
  - 找出关于 AATD 家系检测或级联筛查建议的权威页面，优先 COPD Foundation 指南或 GeneReviews。
  - 找出 Antidote、TriNetX、Medable、IQVIA 等类似的、面向申办方的患者招募或试验匹配平台官方产品页。
  - 找出临床试验申办方使用的、面向罕见病或基于基因型患者招募的平台官方产品页。
  - 找出 Beam Therapeutics 关于 BEAM-302 α1-抗胰蛋白酶缺乏症项目的官方页面或新闻稿。
  - 找出 Wave Life Sciences 关于 WVE-006 α1-抗胰蛋白酶缺乏症项目的官方页面或新闻稿。
  - 找出 Korro Bio 关于 KRRO-110 α1-抗胰蛋白酶缺乏症项目的官方页面或新闻稿。
