reportMemo:
  executiveTakeaways:
  - 这个切口是真问题，因为真正卡住的是“已做基因分型确认的患者流”和“基线资料包是否完整”，不是泛化的呼吸科认知教育。
  - 第一个滩头市场有商业意义，但确实很窄；这个项目能不能撑起风投回报，取决于先把 AATD 跑通，再扩到相邻的基因型定义肺肝疾病。
  - 横向招募供应商并不少，但还看不到谁同时吃下了 AATD 专属检测规则、家系级联逻辑和面向申办方的肺肝双器官资料包整理。
  marketDefinition: 滩头市场是面向申办方和中心的工作流软件加服务，把疑似 AATD 患者推进到“已做基因分型确认、且符合方案要求的筛选资料包”这一步，用于疾病修饰型研究和早期治疗中心网络。之所以有这个需求，是因为 AATD 仍然漏诊严重、诊断普遍拖延、家系检测利用率偏低，而治疗管线也已从增补疗法转向基因型导向的 RNA 和碱基编辑项目 [4][6][9][11][13][16][17][18][19][21][22]。
  customerAndBuyer: 核心买方是开展 AATD 研究的申办方临床运营副总裁或 CMO；日常推动者还包括中心负责人、遗传咨询师和研究启动负责人，他们都得把 PiZZ 患者找出来、补齐肺加肝的基线资料，并把已准备好同意的患者转进方案筛选 [13][14][25][29]。
  buyingTriggers:
  - point: 申办方进入中心激活阶段后会发现，基因型特异性的方案需要的不是更多泛呼吸科线索，而是更少、但质量高得多的转诊。
    sourceRefs:
    - 18
    - 19
    - 21
    - 22
    - 25
  - point: 指南驱动的检测和家系级联要求，会给本来就分散在肺科、肝病和遗传团队之间的流程再加一层工作量。
    sourceRefs:
    - 4
    - 9
    - 14
  - point: 患者对治愈性或长效基因/RNA 疗法的兴趣上升得比中心教育、检测和合规分流能力更快。
    sourceRefs:
    - 17
    - 23
    - 46
  willingnessToPay:
    summary: 申办方本来就会为低患病率研究购买昂贵的横向招募、数据补强和试验运营支持；如果一层 AATD 专用系统真能显著提高基因型命中率、降低中心层面的筛选失败，并缩短拿到首个合格患者的时间，那么哪怕市场不大，每年花到六位数美元也很容易说得过去。
    sourceRefs:
    - 25
    - 26
    - 27
    - 31
    - 33
    - 35
  competitiveLandscape: 竞争主要来自横向的队列发现和招募供应商，而不是原生的 AATD 软件。TriNetX、IQVIA、Antidote 和各种数据补强网络都能卖“更快找到患者”，但它们默认处理的是宽漏斗研究。这个创业方案则把范围收窄到“面向突变的 AATD 患者识别、家系级联路由和申办方资料包整理”，比现有横向产品更具体，但上线时也更窄 [25][27][29][31][32][33][35]。
  incumbentThesis:
  - incumbentClass: 横向真实世界数据平台
    point: TriNetX 这类平台擅长做队列筛选和中心发现，但并不会天然赢下 AATD，因为真正入组还需要疾病专属的基因分型确认、家系外展逻辑，以及通用无代码队列工具之外的资料包整理。
    sourceRefs:
    - 32
    - 40
    - 41
  - incumbentClass: 全服务 CRO 招募引擎
    point: IQVIA 这类招募引擎可以全球放大执行，但它优化的是覆盖面和执行产能，不是去沉淀一张会持续提升真 PiZZ 命中率的 AATD 转诊图谱。
    sourceRefs:
    - 27
    - 31
    - 33
  - incumbentClass: 遗传咨询服务商
    point: InformedDNA 这类服务在遗传咨询和把患者推进到可同意转诊状态上很强，但看起来并不提供完整的申办方-中心操作系统，来处理肺肝双器官基线采集和中心绩效基准。
    sourceRefs:
    - 29
    - 37
    - 38
  - incumbentClass: 患者社区网络
    point: Rare Patient Voice 这类网络能把高意愿患者浮出来，但它们进入漏斗太靠后，替代不了门诊侧病例发现、基因分型检查以及向受监管中心工作流的结构化交接。
    sourceRefs:
    - 30
    - 35
  regulatoryLandscape: 任何能被申办方直接看到的工作流，都得满足 Part 11 等级的电子记录控制、可追溯的源数据来源管理，并明确说明提供者的 EHR 数据如何进入受监管研究。如果产品支持远程或去中心化步骤，也会同时继承 FDA 对去中心化要素的要求。技术层面上，数据交换质量将取决于各中心能否提供结构化的 USCDI/FHIR 数据，而不只是 PDF 和传真病历 [36][37][38][39][40][41]。
  technologyLandscape: 治疗赛道现在已经足够宽，足以直接影响运营：碱基编辑（BEAM-302）、RNA 编辑（AIR-001、KRRO-110、WVE-006）、RNAi（fazirsiran 以及更早的 ALN/DCR 项目）、蛋白替代和小分子方案，都在争夺同一批患者的不同子集。这也意味着，真正值钱的基础设施必须同时“识别突变”“覆盖肺肝双器官”“能追长期轨迹”，而不能只是试验无关的通用工具 [16][17][18][19][20][21][22][24][45][46]。
  distributionChannels:
  - point: 创始人主导销售应该卡在融资和研究启动窗口切进申办方临床运营团队，例如 Serapha 这类启动事件，因为预算和紧迫感会在这些节点一起落地。
    sourceRefs:
    - 1
    - 2
    - 3
  - point: KOL 和卓越中心分发很关键，因为罕见病试验仍然高度依赖登记、自然病史研究和专家中心，而不是商品化站点网络。
    sourceRefs:
    - 13
    - 14
    - 26
  - point: 遗传咨询和检测合作方也能充当渠道伙伴，把可疑病例推进成“已完成同意、已做基因分型确认”的转诊。
    sourceRefs:
    - 4
    - 29
    - 42
    - 43
  partnershipEcosystem:
  - point: InformedDNA 这类咨询伙伴可以缩短从疑似疾病、家系检测到中心可接收转诊资料包之间的断点。
    sourceRefs:
    - 29
    - 23
  - point: Labcorp、Quest 这类商业实验室本来就卡在确证性检测流程里，因此做轻量的开单和结果回传集成，有很强的战略价值。
    sourceRefs:
    - 42
    - 43
  - point: Datavant、TriNetX 这类数据网络伙伴，能在公司证明疾病专属转化逻辑之后，把触达范围扩到锚点中心之外。
    sourceRefs:
    - 31
    - 32
  dataMoats:
  - point: 一旦公司持续跟踪“哪些肺科、肝病和家系筛查路径，真的能产出合格患者”，转诊来源到真 PiZZ 转化率就会变成专有资产。
    sourceRefs:
    - 4
    - 6
    - 25
  - point: 中心层面对“基线缺哪一项”“为什么筛选失败”的证据，会不断沉淀成一套基准数据集，而横向招募商天然拿不到这层数据。
    sourceRefs:
    - 13
    - 24
    - 26
  - point: 带有家系级联和突变识别能力的患者图谱有防御性，因为每确诊一个病例，就可能继续揭出新的高风险亲属和历史上被漏掉的亚群。
    sourceRefs:
    - 4
    - 9
    - 53
  geographicConsiderations:
  - point: 产品一开始就该按国际研究来设计，因为活跃的 AATD 项目已经分散在美国、欧洲、澳大利亚等多个司法辖区。
    sourceRefs:
    - 17
    - 18
    - 19
    - 21
    - 22
  - point: 病例发现逻辑还得做公平性验证：筛查文献显示，黑人群体里的 AATD 检测不足，这既是使命风险，也藏着被忽略的产出机会。
    sourceRefs:
    - 53
    - 4
  sensitivityCases:
  - case: 编辑竞赛加速
    impact: 如果 BEAM-302、AIR-001 和 WVE-006 都继续推进，申办方会更早为患者识别和中心就绪基础设施买单，以免错过稀缺的 PiZZ 候选者。
    sourceRefs:
    - 17
    - 18
    - 19
    - 22
    - 46
  - case: 管线受挫压缩短期买家
    impact: 如果更多项目像 KRRO-110 一样暂停，滩头市场会立刻收缩，公司就得更早去向中心收费，或者尽快扩到相邻疾病。
    sourceRefs:
    - 20
    - 45
  - case: 结构化数据可得性不及预期
    impact: 如果中心拿不出可查询的基因分型或实验室数据，实施模式就会更偏高触达服务，软件毛利也会更弱。
    sourceRefs:
    - 37
    - 38
    - 40
    - 41
  validationPlan:
  - priority: 高
    question: 能不能靠一个锚点申办方，证明这套产品比协调员主导的旧流程更快拿到首个合格 PiZZ 患者？
    evidenceToGather: 在 3-5 个中心做回顾性或前瞻性试点，量化基因分型确认天数、资料包完整度和筛选失败率。
  - priority: 高
    question: 目标中心里，有多少疑似 AATD 病例已经拥有结构化的基因分型结果或血清 AAT 结果？
    evidenceToGather: 在深入做集成前，先审计 2 家肺科中心和 2 家肝病中心的 EHR 字段可用性与实验室结果接入格式。
  - priority: 中
    question: 遗传咨询和实验室伙伴会愿意联合销售，还是只愿意做集成层？
    evidenceToGather: 访谈咨询机构、全国性实验室和申办方研究启动团队，确认转诊经济账和合规责任归属。
