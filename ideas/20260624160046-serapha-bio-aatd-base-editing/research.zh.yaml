    rationale: 把范围收窄到未来 3 年美国/英语市场里由申办方主导的启动切口：4 个较可信项目 ×（$0.35M 申办方费用 + 8 个中心 × $0.15M）≈ $7.4M。
    isEstimate: true
    sourceRefs:
    - 18
    - 19
    - 21
    - 22
  som:
    value: $2.0M
    rationale: 第 3 年可触达情形：2 个申办方项目，每个 $0.4M，加上 8 个活跃中心，每个 $0.15M，总计 $2.0M；前提是拿下 1 个锚点客户，再跟进 1 个新 logo。
    isEstimate: true
    sourceRefs:
    - 1
