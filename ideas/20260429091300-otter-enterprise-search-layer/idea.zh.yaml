  - point: 面向工作流规模的笔记、跟进和行动项，说明企业已经准备好把会议输出当成运营输入，而不只是归档材料。
    signalRefs: [行动型工作流正成为核心产品能力]
    sourceRefs: [3, 4]
differentiator: >-
  大多数会议工具做到搜索、摘要或通用行动项就停下来了。这个产品从一开始就围绕“识别会带来收入风险的外部承诺、把它挂到记录系统里，并衡量组织是否真的完成了跟进”来设计。它的防御力来自一张持续增长的跨系统图谱：承诺模式、兑现结果和 account 影响会在每次部署后继续累积，而通用企业搜索厂商不会把这一层建得足够深。
conceptDiagram:
  title: 从口头承诺到被跟踪的执行
  mermaid: |
    flowchart LR
      Buyer[RevOps 或 Product Ops] --> Pain[客户承诺散落在通话和各类工具之间]
      Pain --> Product[Meeting Commitment Graph]
      Product --> Outcome[漏掉的承诺更少，续约风险更低]
