topRisks:
  - name: 平台依赖
    description: 如果 Otter 或相邻的会议厂商把这套工作流自己吃进去，分发空间可能会迅速变窄。
    mitigation: 从第一天起就保持厂商无关，覆盖 Otter、Gong、Zoom 和 Teams 录音，并把下游承诺图谱掌握在自己手里。
  - name: 抽取准确率
    description: 如果把随口建议错标成硬承诺，收入团队会很快失去信任。
    mitigation: 采用置信度阈值、为高风险 account 设置人工复核队列，并利用 Jira 和 CRM 的闭环结果来持续反馈。
  - name: 跨职能归属
    description: RevOps 也许最先感到痛，但真正要执行的可能是产品或客户成功团队，这会拖慢采用。
    mitigation: 先卖给那些本来就以续约和升级事件为考核目标的运营负责人，并把任务分配进现有 Jira 与 CRM 流程。