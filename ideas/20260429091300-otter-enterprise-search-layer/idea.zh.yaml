    signalRefs: [连接器覆盖面正从 Google 优先栈扩向更广企业环境]
    sourceRefs: [1]
  - point: Otter 自己的表述也在从“做会议记录”转向“沉淀机构知识”，这说明买方已经愿意为把会议数据运营化的软件买单。
    signalRefs: [Otter 正把会议定位成机构知识基础设施]
