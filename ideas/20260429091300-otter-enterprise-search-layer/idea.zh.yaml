problem: >-
  在 B2B SaaS 公司里，最危险的客户承诺常常是在通话里说出口，随后散进会议笔记、CRM 字段、Slack 线程和 Jira 工单。营收团队会答应集成、时间线或升级处理，但产品和成功团队往往看不全，也追不住。通用企业搜索能帮人找上下文，却不会把口头承诺变成有人负责、可审计的执行工作。
targetUser:
  primary: >-
    一家 200-1,500 人 B2B SaaS 公司里的营收运营负责人或产品运营负责人；
    这家公司在销售和客户成功团队里同时使用 Salesforce、Jira、Notion 和 AI 会议记录工具
  secondary: 同一家公司里的首席营收官、客户成功副总裁或产品副总裁
  buyer: 营收运营负责人或产品运营副总裁
startupThesis:
  nonObviousInsight: >-
    一旦会议工具变成跨工具搜索层，转录稿就不再是死笔记，而是唯一能在客户意图被 CRM、工单系统和文档转写失真前先捕捉它的数据层。新的切口不是再做一个搜索框，而是搭一张承诺图谱——识别到底答应了什么，映射到系统记录层，再把执行偏差揪出来。
  beachhead: >-
    Series B 到上市阶段的 B2B SaaS 公司里的产品运营和营收运营团队；
    这些公司销售周期长，客户通话里经常出现路线图或集成承诺，而且已经同时在用 Salesforce、Jira、Notion 和 Otter 或同类会议记录工具
  wedge: >-
    一层 AI 工作流，把客户通话中的承诺转成结构化承诺对象，包含责任人、截止日期、关联 Jira epic、关联 Salesforce 账户和风险状态
  whyNowCatalyst: >-
    Otter 推出跨工具企业搜索和偏工作流的会议代理后，第一次让“从通话里抽出承诺，再去执行系统里核验它有没有落地”这件事变得现实可做。
  ventureScalePath: >-
    先抓营收和产品团队面向客户的承诺，再把同一张承诺图谱扩到支持升级处理、实施项目、合作伙伴承诺、采购审批，乃至整个企业的董事会级决策跟踪。
solution: >-
  会议承诺图谱连接 Otter、Salesforce、Jira、Notion 和邮件，为客户通话里的承诺建立一层系统记录。它抽取产品承诺、商业让步和后续义务，再把每条承诺连到账户、商机、路线图条目或内部责任人。产品持续盯执行偏差：续约已有风险却没有工单，答应过的集成没有 epic，或客户反复提同一个需求却始终进不了规划。它还会起草客户可见的跟进内容和内部升级材料，让团队在 QBR 和续约前先处理风险。时间拉长后，这份数据会沉淀成专有图谱，说明哪些口头承诺最容易带来流失、扩张，或拖慢路线图。
goToMarketSeed:
  firstCustomer: >-
    一家 Series B+ 的垂直 SaaS 公司，拥有 50-300 名一线销售、100+ 个活跃企业客户账户，且销售或客户成功团队会在持续的客户通话中频繁承诺路线图事项或集成时间表
  buyingTrigger: >-
    一次续约失手、一次高层升级事件，或一次在 GTM 团队内部铺开 Otter 式 AI 会议笔记，突然让公司看清有多少承诺被困在转录稿里
  currentAlternative: 手工翻笔记、强推 CRM 纪律、靠 Slack 补跟进、在 Gong 或通话关键词搜索里翻找，再临时补 Jira 工单
  switchingReason: >-
    第一批客户愿意切过来，是因为这个切口不要求销售改行为；它直接挖现有通话，立刻告诉团队哪些承诺没人接、已经逾期，或者商业风险正在变大。
  pricingHypothesis: >-
    按年订阅的 SaaS，定价基于面向客户的会议主持人数，以及被监控的活跃承诺量；前 100 个受监控账户收一档平台费
whyNow:
  - point: 现在已经能把口头承诺和 CRM、文档、工程系统对照核验，而不是让它只躺在会议笔记里。
    signalRefs: ["会议内容已经能和系统记录层联查"]
    sourceRefs: [1]
  - point: 对 Outlook、Teams、SharePoint 和 Slack 的扩展计划说明，这层集成织网很快就会覆盖标准企业技术栈。
    signalRefs: ["连接器覆盖面正越过 Google 系栈"]
    sourceRefs: [1]
  - point: Otter 自己的对外叙事正在从记笔记转向机构知识，这验证了买方确实想要能把会议数据变成运营动作的软件。
    signalRefs: ["Otter 正把会议定位成机构知识底座"]
    sourceRefs: [2]
  - point: 当企业已经开始把工作流规模的会议笔记、跟进和行动项当成运营输入，就说明会议产出不再只是档案。
    signalRefs: ["自动推动后续动作已经成了核心产品行为"]
    sourceRefs: [3, 4]
differentiator: >-
  大多数会议工具做到搜索、摘要或通用行动项就停了。这个产品是按“外部客户承诺会带来营收风险”来设计的：先识别承诺，再挂到系统记录层上，最后量化组织是否真的跟了下去。真正的防守力来自一张会越用越厚的跨系统图谱——承诺模式、履约结果和账户影响——而通用企业搜索厂商不会在这层建得这么深。
conceptDiagram:
  title: 从口头承诺到可跟踪执行
  mermaid: |
    flowchart LR
      Buyer[RevOps 或 Product Ops 团队] --> Pain[客户承诺散落在通话和工具之间]
      Pain --> Product[会议承诺图谱]
      Product --> Outcome[漏掉的承诺更少，续约风险更低]
businessModelCanvas:
  customerSegments:
    - 具备企业销售动作的 Series B 到上市 B2B SaaS 公司
    - 负责跨部门跟进落地的 RevOps 和 Product Operations 团队
  valuePropositions:
    - 把口头客户承诺变成可跟踪的工作对象
    - 降低路线图或集成承诺漏跟带来的续约风险
    - 给管理层一份可审计的承诺履约记录
  channels:
    - 创始人主导，直接卖给 RevOps 和 Product Ops
    - 与 Otter、Gong、Salesforce 生态做合作
    - 借 customer success 和 RevOps 社群获客
  customerRelationships:
    - 围绕连接器和分类体系配置的高触达上线服务
    - 围绕流失与扩张结果做季度业务复盘
  revenueStreams:
    - 年度 SaaS 订阅
    - 面向管理层汇报和续约风险预测的高级模块
  keyResources:
    - 连接器基础设施
    - 承诺抽取与实体解析模型
    - 把承诺和营收影响连起来的结果数据集
  keyActivities:
    - 接入会议和系统记录层数据
    - 把承诺解析到 owner 和工作项
    - 交付告警、仪表盘和后续跟进工作流
  keyPartners:
    - Otter 及其他会议录制平台
    - Salesforce 和 Jira 实施伙伴
    - RevOps 顾问
  costStructure:
    - LLM 和转录处理成本
    - 连接器维护
    - 企业上线与支持
jobsToBeDone:
  - job: >-
      当企业客户通话里出现路线图或集成承诺时，帮 RevOps 和 Product Ops 自动抓取并分派这些承诺，这样他们就能在续约前避免漏掉关键承诺。
    currentAlternative: 手工翻笔记，再临时用 Slack 或 Jira 补跟进
    successMetric: 48 小时内完成 owner 指派并挂上关联工作项的客户承诺占比
  - job: >-
      当管理层排查流失或升级风险时，帮他们看清到底说过哪些口头承诺、后来有没有兑现，这样他们就能在营收流失前介入。
    currentAlternative: CRM 字段、人的记忆和零散的会议录音
    successMetric: 因承诺未跟踪或逾期而触发的升级事件下降幅度
ideaScorecard:
  signalStrength:
    score: 4
    rationale: 这组信号里有一篇带日期的发布报道，再加上 3 个 Otter 页面交叉印证，说明这次产品扩张是真实存在的。
  painIntensity:
    score: 5
    rationale: 客户承诺漏掉，直接会带来流失、升级事件和产品路线图摩擦。
  wedgeClarity:
    score: 5
    rationale: 追踪客户通话承诺是一个很窄、很清晰的第一工作流，数据源和买方责任人都很明确。
  defensibility:
    score: 4
    rationale: 一张把承诺、履约和账户结果连起来的专有图谱，会随着每次部署持续变厚。
  ventureScale:
    score: 4
    rationale: 起步虽然只盯营收承诺，但后面能扩到更广的企业决策和义务跟踪。
topRisks:
  - name: 平台依赖
    description: 如果 Otter 或周边会议厂商把这条工作流直接吃掉，分发空间会立刻变窄。
    mitigation: 从第一天就保持厂商无关，覆盖 Otter、Gong、Zoom 和 Teams 录制，并把下游承诺图谱握在自己手里。
  - name: 抽取准确率
    description: 如果把随口建议误判成刚性承诺，营收团队很快就会失去信任。
    mitigation: 设置信心阈值；对高风险账户走人工复核队列；再用 Jira 和 CRM 的闭环结果回灌模型。
  - name: 跨部门责任不清
    description: 营收运营最先感到痛，但真正要执行的往往是产品或客户成功团队，采用会因此拖慢。
    mitigation: 先卖给本来就背续约和升级指标的运营团队，并把任务分派直接塞进现有 Jira 和 CRM 流程。