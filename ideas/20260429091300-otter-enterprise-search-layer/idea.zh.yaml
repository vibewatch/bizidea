problem: >-
  在 B2B SaaS 公司里，最危险的客户承诺往往是在通话中做出的，随后却散落在会议笔记、CRM 字段、Slack 线程和 Jira 工单里。收入团队会承诺集成、交付时间或升级处理，但产品和客户成功团队往往看不见，更谈不上稳定跟踪。通用企业搜索也许能帮人找回上下文，却无法把口头承诺变成有归属、可审计的工作。
targetUser:
  primary: >-
    一家拥有 200-1,500 名员工的 B2B SaaS 公司的 RevOps 负责人或 Product Operations 负责人；公司在销售和客户成功团队中使用 Salesforce、Jira、Notion，以及 AI 会议记录工具
  secondary: 同一公司的 CRO、VP Customer Success 或 VP Product
  buyer: Head of RevOps 或 VP Product Operations
startupThesis:
  nonObviousInsight: >-
    当会议工具开始演变成跨工具搜索层，转录稿就不再是“死笔记”，而会变成唯一能在客户意图被不完美地写进 CRM、工单系统和文档之前，先把它完整保留下来的数据集。新的切口不是再做一个搜索框，而是建立一张“承诺图谱”：识别承诺内容，把它映射到记录系统，并标出执行是否跑偏。
  beachhead: >-
    面向从 Series B 到上市阶段的 B2B SaaS 公司中的 product-ops 与 rev-ops 团队；这些公司拥有企业级销售周期，客户通话里经常出现路线图或集成承诺，并且团队共同使用 Salesforce、Jira、Notion，以及 Otter 或类似会议记录工具
  wedge: >-
    一层 AI 系统，把客户通话中的承诺转成结构化的 commitment object，包含 owner、due date、关联 Jira epic、关联 Salesforce account 和风险状态
  whyNowCatalyst: >-
    Otter 推出跨工具企业搜索以及面向工作流的会议 agents，让“从通话里抽取承诺，再去执行真正发生的应用里核验它们”这件事第一次变得切实可行。
  ventureScalePath: >-
    先从收入与产品团队面向客户的承诺切入，再把同一张承诺图谱扩展到支持升级、实施项目、合作伙伴承诺、采购审批以及企业内部的董事会级决策跟踪。
solution: >-
  Meeting Commitment Graph 连接 Otter、Salesforce、Jira、Notion 和邮箱，给客户通话中的承诺建立一套记录系统。它会抽取产品承诺、商务让步和后续跟进义务，并把每一项都挂到应当承接它的 account、opportunity、roadmap item 或内部 owner 上。产品会持续监测执行漂移，例如续约已经有风险却没有 ticket、承诺过的集成没有对应 epic，或者客户反复提出的需求始终进不了规划。它还会起草对客户安全的后续回复和内部升级材料，让团队能在 QBR 和续约之前先把风险处理掉。时间一长，这套数据会沉淀成一张专有地图，告诉你哪些口头承诺最终会带来 churn、expansion 或 roadmap 拖累。
goToMarketSeed:
  firstCustomer: >-
    一家 Series B 以上的垂直 SaaS 公司，拥有 50-300 名 quota carriers、100+ 个活跃企业客户，并且销售或客户成功团队会在持续的客户通话中承诺路线图事项或集成时间表
  buyingTrigger: >-
    一次续约失手、一次高层升级事件，或一次在市场团队内部推广类似 Otter 的 AI 会议笔记产品，让公司第一次看见有多少承诺被困在转录稿里
  currentAlternative: >-
    人工翻会议笔记、强推 CRM hygiene、在 Slack 里补跟进、用 Gong 或通话关键词搜索，以及临时建 Jira ticket
  switchingReason: >-
    第一批客户之所以会切换，是因为这个切口不要求销售改行为；它直接挖掘已有通话，并立刻告诉团队哪些承诺没人认领、已经逾期，或存在商业风险。
  pricingHypothesis: >-
    年度 SaaS 收费，按面向客户的会议主持人数和被监控的活跃承诺量计价，起步为前 100 个被监控 account 收取平台费
