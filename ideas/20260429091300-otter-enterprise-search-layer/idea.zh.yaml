problem: >-
  在 B2B SaaS 公司里，最危险的客户承诺往往是在通话中做出的，随后却散落在笔记、CRM 字段、
  Slack 线程和 Jira 工单之间。营收团队会承诺集成、时间表或升级处理，但产品与客户成功团队却无法可靠地看到或跟踪这些内容。
  通用型企业搜索可以帮助人们找到上下文，但它无法把口头承诺转化为有归属、可审计的工作。
targetUser:
  primary: >-
    一家拥有 200-1,500 名员工的 B2B SaaS 公司的营收运营负责人（Head of RevOps）或产品运营负责人（Product Operations），
    该公司在销售与客户成功团队中使用 Salesforce、Jira、Notion 以及 AI 会议记录工具
  secondary: 同一公司的 CRO、VP Customer Success 或 VP Product
  buyer: 营收运营负责人或产品运营 VP
startupThesis:
  nonObviousInsight: >-
    随着会议工具变成跨工具搜索层，转录内容不再是“死笔记”，而成为唯一能在客户意图被不完美地翻译进 CRM、工单系统和文档之前就捕捉到它的数据集。
    新的切入点不是另一个搜索框，而是一张“承诺图谱”：它能识别承诺内容、将其映射到记录系统，并标记执行偏差。
  beachhead: >-
    面向 Series B 到上市阶段的 B2B SaaS 公司中的产品运营与营收运营团队；这些公司拥有企业级销售周期，
    在通话中经常做出路线图或集成承诺，并共同使用 Salesforce、Jira、Notion，以及 Otter 或类似会议记录工具
  wedge: >-
    一层 AI，能够把客户通话中的承诺转化为结构化的承诺对象，包含负责人、截止日期、关联的 Jira epic、关联的 Salesforce 账户，以及风险状态
  whyNowCatalyst: >-
    Otter 推出跨工具企业搜索与以工作流为导向的会议智能体，使得从通话中提取承诺并在实际执行发生的应用中验证这些承诺，首次变得切实可行。
  ventureScalePath: >-
    先从面向客户的承诺切入，服务营收与产品团队，随后将同一张承诺图谱扩展到支持升级、实施项目、合作伙伴承诺、采购审批以及企业层面的董事会决策追踪。
solution: >-
  会议承诺图谱连接 Otter、Salesforce、Jira、Notion 和电子邮件，为客户通话中做出的承诺建立一套记录系统。它提取产品承诺、商务让步和后续义务，
  然后把每一项承诺链接到应当承接它的账户、商机、路线图条目或内部负责人。产品会监测执行偏差，例如：续约面临风险却没有对应工单、承诺的集成却没有 epic、
  或者反复出现的需求从未进入规划流程。它还会起草对客户安全的跟进文案以及内部升级材料，使团队能在 QBR 和续约之前化解风险。随着时间推移，这份数据集将成为一张专有地图，
  显示哪些口头承诺会导致流失、扩容或路线图拖累。
goToMarketSeed:
  firstCustomer: >-
    一家 Series B+ 的垂直 SaaS 公司，拥有 50-300 名配额销售、100+ 个活跃企业账户，并且在日常客户通话中，销售或客户成功团队会承诺路线图事项或集成时间表
  buyingTrigger: >-
    一次错失的续约、一场高层升级事件，或一次在市场团队中推广类似 Otter 的 AI 会议笔记，暴露出有多少承诺被困在转录文本中
  currentAlternative: >-
    人工复查笔记、强制 CRM 录入卫生、在 Slack 中手工跟进、使用 Gong 或通话关键词搜索，以及临时创建 Jira 工单
  switchingReason: >-
    首个客户愿意切换，是因为这个切入点不要求销售代表改变行为；它直接挖掘现有通话，并立刻展示哪些承诺无人负责、已逾期或存在商业风险。
  pricingHypothesis: >-
    采用年度 SaaS 定价，按面向客户的会议主持人数量以及被监控的活跃承诺量收费，并以覆盖前 100 个监控账户的平台费起步
whyNow:
  - point: 现在可以将口头承诺与 CRM、文档和工程系统交叉核验，而不必让它们只存在于会议笔记中。
    signalRefs: ['会议现在可以与记录系统一并查询']
    sourceRefs: [1]
  - point: 计划扩展到 Outlook、Teams、SharePoint 和 Slack，意味着这种集成底座很快就会覆盖标准企业技术栈。
    signalRefs: ['连接器覆盖面正在超越以 Google 为中心的技术栈']
    sourceRefs: [1]
  - point: Otter 自身的产品叙事正在从记笔记转向机构知识，验证了买方对把会议数据运营化的软件的需求。
    signalRefs: ['Otter 正把会议定位为机构知识基础设施']
    sourceRefs: [2]
  - point: 面向工作流规模的笔记、跟进和行动项说明，企业已经准备好把会议产出视作运营输入，而不仅仅是归档记录。
    signalRefs: ['采取行动的工作流已成为核心产品行为']
    sourceRefs: [3, 4]
differentiator: >-
  大多数会议工具停留在搜索、摘要或通用行动项层面。这个产品从一开始就为识别会带来营收风险的外部承诺而设计，
  它会把这些承诺挂接到记录系统上，并衡量组织是否真正完成了跟进。其防御性来自一张不断增长的跨系统图谱：它记录承诺模式、履约结果以及账户影响，
  而通用企业搜索厂商不会对这些内容进行深度建模。
conceptDiagram:
  title: 从口头承诺到可追踪执行
  mermaid: |
    flowchart LR
      Buyer[营收运营或产品运营] --> Pain[客户承诺散落在通话与工具之间]
      Pain --> Product[会议承诺图谱]
      Product --> Outcome[更少遗漏承诺，更低续约风险]
businessModelCanvas:
  customerSegments:
    - 面向企业销售的 Series B 到上市阶段 B2B SaaS 公司
    - 管理跨职能跟进执行的营收运营与产品运营团队
  valuePropositions:
    - 把客户口头承诺转化为可追踪的工作对象
    - 降低因遗漏路线图或集成承诺带来的续约风险
    - 为高管提供一份可审计的承诺履约记录
  channels:
    - 创始人主导销售，切入营收运营与产品运营团队
    - 与 Otter、Gong 和 Salesforce 生态合作
    - 客户成功与营收运营社群
  customerRelationships:
    - 围绕连接器和分类体系配置的高接触式导入
    - 与流失和扩容结果挂钩的季度业务回顾
  revenueStreams:
    - 年度 SaaS 订阅
    - 面向高管报告和续约风险预测的高级模块
  keyResources:
    - 连接器基础设施
    - 承诺提取与实体解析模型
    - 将承诺与营收影响相连接的结果数据集
  keyActivities:
    - 接入会议数据与记录系统数据
    - 将承诺解析并映射到负责人和工作项
    - 提供告警、仪表盘和跟进工作流
  keyPartners:
    - Otter 及其他会议录制平台
    - Salesforce 和 Jira 实施合作伙伴
    - 营收运营顾问
  costStructure:
    - LLM 与转录处理成本
    - 连接器维护
    - 企业导入与支持
jobsToBeDone:
  - job: >-
      当企业客户通话中产生路线图或集成承诺时，帮助营收运营与产品运营团队自动捕捉并分配这些承诺，
      以便他们在续约时避免遗漏兑现。
    currentAlternative: 人工查看笔记，并通过 Slack 或 Jira 临时跟进
    successMetric: 48 小时内具备负责人和关联工作项的客户承诺占比
  - job: >-
      当高管调查流失或升级风险时，帮助他们看清楚曾经做出过哪些口头承诺、这些承诺是否已被履行，
      以便在营收损失发生前进行干预。
    currentAlternative: CRM 字段、个人记忆和分散的会议录音
    successMetric: 因未被跟踪或逾期承诺而导致的升级事件减少幅度
ideaScorecard:
  signalStrength:
    score: 4
    rationale: 该信号簇包含一篇带日期的发布报道和三个来自 Otter 的佐证页面，证明这次产品扩张真实存在。
  painIntensity:
    score: 5
    rationale: 客户承诺缺失会直接造成流失、升级以及产品路线图摩擦。
  wedgeClarity:
    score: 5
    rationale: 客户通话承诺追踪是一个狭窄但清晰的首个工作流，数据源和买方归属都很明确。
  defensibility:
    score: 4
    rationale: 一张连接承诺、履约和账户结果的专有图谱，可随着每次部署持续复利。
  ventureScale:
    score: 4
    rationale: 初始切入点可以从营收承诺扩展到更广泛的企业决策与义务追踪。
topRisks:
  - name: 平台依赖
    description: 如果 Otter 或相邻的会议厂商吸收了这条工作流，分发空间可能会被压缩。
    mitigation: 从第一天起就保持对 Otter、Gong、Zoom 和 Teams 录音的厂商中立，并牢牢掌握下游的承诺图谱。
  - name: 提取准确率
    description: 如果把软性建议错误标记为硬承诺，将迅速摧毁营收团队的信任。
    mitigation: 对高风险账户使用置信度阈值、高价值人工复核队列，以及来自 Jira 和 CRM 结果的闭环反馈。
  - name: 跨职能责任归属
    description: RevOps 可能感受到痛点，但真正需要执行的往往是产品或客户成功团队，从而拖慢采用。
    mitigation: 先卖给已经以续约和升级为考核指标的运营者，并把工作流打包进现有 Jira 与 CRM 过程中的任务分配机制。
