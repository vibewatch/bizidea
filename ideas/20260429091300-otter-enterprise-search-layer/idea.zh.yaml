  customerSegments:
    - 具有企业级销售动作、处于 Series B 至上市阶段的 B2B SaaS 公司
    - 负责跨团队跟进执行的 RevOps 和 Product Operations 团队
  valuePropositions:
    - 把客户口头承诺变成可追踪的工作对象
    - 降低因错过路线图或集成承诺导致的续约风险
    - 给高管一份可审计的承诺兑现记录
  channels:
    - 面向 RevOps 和 Product Ops 的创始人主导销售
    - 与 Otter、Gong 和 Salesforce 生态建立合作
    - 客户成功与 RevOps 社群
  customerRelationships:
    - 围绕连接器与分类体系搭建的高触达 onboarding
    - 与 churn 和 expansion 结果挂钩的季度业务回顾
  revenueStreams:
    - 年度 SaaS 订阅
    - 面向高管报告和续约风险预测的高级模块
  keyResources:
    - 连接器基础设施
    - 承诺抽取与实体解析模型
    - 将承诺与收入影响关联起来的结果数据集
  keyActivities:
    - 接入会议数据和记录系统数据
    - 将承诺解析到 owner 和工作项
    - 交付预警、仪表盘和后续跟进工作流
  keyPartners:
    - Otter 及其他会议录制平台
    - Salesforce 和 Jira 实施合作伙伴
    - RevOps 顾问
  costStructure:
    - LLM 与转写处理成本
    - 连接器维护
    - 企业 onboarding 与支持
jobsToBeDone:
  - job: >-
      当企业客户通话中出现路线图或集成承诺时，帮助 RevOps 和 Product Ops 自动捕获并分配这些承诺，这样他们就能在续约时避免漏单。
    currentAlternative: 人工翻会议笔记，再临时通过 Slack 或 Jira 跟进
    successMetric: 48 小时内拥有 owner 且挂到对应工作项上的客户承诺占比
  - job: >-
      当高管调查 churn 或升级风险时，帮助他们看清到底做过哪些口头承诺，以及这些承诺是否被兑现，这样他们就能在收入流失前及时介入。
    currentAlternative: CRM 字段、人的记忆以及零散的会议录音
    successMetric: 因承诺无人跟踪或逾期而引发的升级事件减少
