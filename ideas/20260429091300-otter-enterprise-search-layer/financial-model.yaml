modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Leads --> PaidPilots
      PaidPilots --> ProductionCustomers
      ProductionCustomers --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> OperatingCash
      ProductionCustomers --> Expansion
      Expansion --> Revenue
modelSanity:
  - checkName: Revenue engine
    finding: "Base-case revenue comes from a narrow logo ramp from 6 paying customers at Y1 exit to 47 at Y3 exit on $55K ACV, not from aggressive seat-volume assumptions."
  - checkName: Must go right
    finding: "Paid pilots have to convert near the plan's 50%+ target so founder-led discovery and one AE create 25 paying customers by Q4Y2 without adding a large sales team."
  - checkName: Model breaks if
    finding: "If pricing compresses toward $48K and sales cycles lengthen, downside cash bottoms at about -$341K before the model reaches Y3."
  - checkName: Next-round proof
    finding: "The next financing is justified if the company exits the plan near $2.6M ARR with Q4Y3 positive EBITDA and evidence that adjacent commitment workflows expand beyond renewals."
sanityChecks:
  ruleOf40: "Y3 growth 146% + EBITDA margin -13% = 133%."
  burnMultiple: "Y2 burn multiple is about 0.8x on net new ARR and improves to about 0.2x in Y3 as Q4 turns EBITDA-positive."
  revenuePerFte: "$218K Y3 using 9 exit FTE (benchmark roughly $200-400K SaaS)."
  flags:
    - "The model starts post-close with a $2.2M pre-seed round because the schema has no explicit financing line."
    - "Base-case Y3 remains full-year EBITDA-negative, so the seed story depends on efficient ARR growth and better Q4 operating leverage rather than profitability."
    - "The customer ramp reaches 47 logos by Y3 exit, slightly above the research SOM of about 45 reachable customers, so the plan assumes some adjacent-workflow expansion begins before year three ends."
    - "Gross margin is held at the 75% business-plan target from the first paying deployments; early implementation or support intensity could push real margin lower."
