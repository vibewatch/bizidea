slug: meeting-commitment-graph
date: "2026-04-29"
currency: USD
modelStartMonth: "2026-05"
assumptions:
  - id: A1
    name: Starting cash after pre-seed close
    value: "2200"
    unit: "$K"
    source: "[BP fundingAsk.targetFundingRangeUsd $2-3M]; base case uses a $2.2M close at model start."
  - id: A2
    name: Core production ARPU
    value: "55"
    unit: "$K per customer per year"
    source: "[BP firstCustomer.initialContract annual deployment $45k-$75k; Research bottomUpSizingDrivers initial ACV $45k-$75k]; base case uses the low-middle of the range."
  - id: A3
    name: Revenue recognition cadence
    value: "1/12 of annual contract per active month"
    unit: policy
    source: "[Startup-finance heuristic: annual SaaS contracts recognized ratably monthly]."
  - id: A4
    name: Gross margin
    value: "75"
    unit: percent
    source: "[BP businessModel.targetGrossMarginPct]."
  - id: A5
    name: Year-1 customer exit
    value: "6"
    unit: customers
    source: "[BP milestones 0-12 months 3-5 paid design partners and 2 annual production conversions]; base case translates that into 6 paying logos by M12."
  - id: A6
    name: Year-2 customer exit
    value: "25"
    unit: customers
    source: "[BP team AE at Month 12; BP milestones 12-24 months partner-sourced pipeline]; base case assumes founder-led sales plus one AE compounds to 25 paying logos by Q4Y2."
  - id: A7
    name: Year-3 customer exit
    value: "47"
    unit: customers
    source: "[BP milestones 24-36 months adjacent workflow expansion; Research SOM 45 reachable customers at about $45k ACV]; base case assumes slight outperformance from expansion into adjacent commitment domains."
  - id: A8
    name: Monthly logo churn
    value: "1.5"
    unit: percent
    source: "[Startup-finance heuristic: early enterprise workflow SaaS with sticky operations use case but still-proving product-market fit]."
  - id: A9
    name: CAC per new customer
    value: "22"
    unit: "$K"
    source: "[Startup-finance heuristic anchored to founder-led outbound, paid pilot motion, and multi-stakeholder enterprise sale in BP/research]."
  - id: A10
    name: Average sales cycle
    value: "4.5"
    unit: months
    source: "[BP buyingProcess includes security, IT, and legal; Research adoptionFrictionMatrix highlights security review and connector permissioning]."
  - id: A11
    name: Hiring timeline
    value: "Founder CEO and founding engineer at M1; applied AI engineer M4; solutions engineer M7; security engineer M10; AE M12; second engineer M16; second AE M21; second solutions/CS hire M28"
    unit: plan
    source: "[BP team startTiming]; later hires are a lean startup-finance extension of the same plan."
  - id: A12
    name: Cash salary bands
    value: "Founder $120K; founding engineer $160K; applied AI $180K; solutions engineer $150K; security engineer $170K; AE $130K; solutions/CS $140K"
    unit: annual salary
    source: "[Startup-finance heuristic for U.S. venture-backed software startups]; payroll taxes and benefits are absorbed in non-payroll opex."
  - id: A13
    name: Non-payroll opex ramp
    value: "R&D tools/cloud $5K-$12K monthly; S&M program spend $3K-$14K monthly; G&A/legal/security $6K-$10K monthly"
    unit: "$K per month"
    source: "[Startup-finance heuristic anchored to BP connector, security, and partner-motion needs]."
  - id: A14
    name: Pilot-to-production conversion support
    value: "50%+ target"
    unit: percent
    source: "[BP gtm.funnelTargets paid pilot to annual production 50%+]."
  - id: A15
    name: Cash flow simplification
    value: "EBITDA approximates operating cash movement"
    unit: policy
    source: "[Startup-finance heuristic: no debt, capex, taxes, or working-capital timing modeled at pre-seed stage]."
  - id: A16
    name: Funding ask runway
    value: "24"
    unit: months
    source: "[BP fundingAsk.runwayMonths 18] plus the required 6-month buffer."
