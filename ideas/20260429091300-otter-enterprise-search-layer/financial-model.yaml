scenarios:
  downside:
    description: "Budget stays closer to note-taking spend, security review lengthens sales cycles, and customer count exits Y3 below the research SOM."
    y3RevenueK: 1282.0
    y3EbitdaK: -772.5
    cashLowPointK: -340.7
    keyAssumptionChanges:
      - "ARPU falls to $48K."
      - "Customer adds slow materially and Y3 exits below 40 customers."
      - "Same core hiring plan is maintained, so operating leverage does not arrive in time."
  base:
    description: "Founder-led pilots convert, one AE plus partners scale carefully in Y2, and adjacent workflow expansion begins in Y3."
    y3RevenueK: 1966.3
    y3EbitdaK: -259.3
    cashLowPointK: 418.1
    keyAssumptionChanges:
      - "ARPU holds at $55K."
      - "Customer count rises from 6 at Y1 exit to 25 at Y2 exit and 47 at Y3 exit."
      - "Gross margin stays at the 75% target while hiring remains lean."
  upside:
    description: "The platform wins budget as a renewal-risk system of record and partner referrals accelerate production deployments without a heavy hiring step-up."
    y3RevenueK: 2402.5
    y3EbitdaK: 67.9
    cashLowPointK: 759.8
    keyAssumptionChanges:
      - "ARPU rises to $60K from better packaging and expansion modules."
      - "Customer adds accelerate and Y3 exits above 55 customers."
      - "Existing team absorbs the extra volume, so Q4Y3 remains EBITDA-positive."
