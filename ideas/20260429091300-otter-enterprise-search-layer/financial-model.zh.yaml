fundingAsk:
  round: pre-seed
  amountM: 2.2
  runwayMonths: 24
  milestone: "在 Q4Y2 之前拿到 25 个付费客户，续约风险工作流精度达到 85%+，至少完成 2 个 production 转化，并建立起可复制的 partner-sourced pipeline，以此证明已具备进入 seed 的条件。"
  useOfFunds:
    - bucket: 工程
      amountUsd: 990000
      percentage: 45
    - bucket: GTM
      amountUsd: 462000
      percentage: 21
    - bucket: "G&A"
      amountUsd: 264000
      percentage: 12
    - bucket: "缓冲（6 个月）"
      amountUsd: 484000
      percentage: 22
scenarios:
  downside:
    description: "预算仍被锚定在会议笔记类支出附近，安全审查拉长销售周期，且第 3 年客户数低于 research 中的 SOM。"
    y3RevenueK: 1282.0
    y3EbitdaK: -772.5
    cashLowPointK: -340.7
    keyAssumptionChanges:
      - "ARPU 降到 $48K。"
      - "客户新增明显放缓，第 3 年期末客户数低于 40。"
      - "核心招聘计划保持不变，因此经营杠杆来得太晚。"
  base:
    description: "创始人主导的 pilots 顺利转化，1 名 AE 加伙伴体系在 Y2 谨慎放大，而相邻工作流扩张从 Y3 开始启动。"
    y3RevenueK: 1966.3
    y3EbitdaK: -259.3
    cashLowPointK: 418.1
    keyAssumptionChanges:
      - "ARPU 维持在 $55K。"
      - "客户数从 Y1 期末的 6 个，增长到 Y2 期末的 25 个，再到 Y3 期末的 47 个。"
      - "毛利率维持在 75% 目标，同时招聘保持精简。"
  upside:
    description: "平台成功拿下“续约风险记录系统”预算，且伙伴转介绍在不大幅扩招的情况下加速 production 部署。"
    y3RevenueK: 2402.5
    y3EbitdaK: 67.9
    cashLowPointK: 759.8
    keyAssumptionChanges:
      - "由于打包更优和扩展模块贡献，ARPU 升至 $60K。"
      - "客户新增提速，第 3 年期末客户数超过 55。"
      - "现有团队就能消化额外体量，因此 Q4Y3 仍能保持 EBITDA 为正。"
