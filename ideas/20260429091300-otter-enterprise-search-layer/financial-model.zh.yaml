scenarios:
  downside:
    description: 预算更接近记笔记工具支出，安全审查拉长销售周期，且第三年期末客户数低于 research SOM。
    y3RevenueK: 1282.0
    y3EbitdaK: -772.5
    cashLowPointK: -340.7
    keyAssumptionChanges:
      - ARPU 降至 $48K。
      - 客户增长显著放缓，Y3 期末低于 40 个客户。
      - 仍维持同样的核心招聘计划，因此运营杠杆无法及时显现。
  base:
    description: 创始人主导的试点顺利转化，1 位 AE 加合作伙伴在 Y2 谨慎放大，且相邻工作流扩张从 Y3 开始启动。
    y3RevenueK: 1966.3
    y3EbitdaK: -259.3
    cashLowPointK: 418.1
    keyAssumptionChanges:
      - ARPU 稳定在 $55K。
      - 客户数从 Y1 期末的 6 个增长到 Y2 期末的 25 个，再到 Y3 期末的 47 个。
      - 毛利率维持在 75% 目标，同时团队保持精益。
  upside:
    description: 平台成功以“续约风险记录系统”赢得预算，且合作伙伴转介绍加速了生产部署，而无需大幅追加招聘。
    y3RevenueK: 2402.5
    y3EbitdaK: 67.9
    cashLowPointK: 759.8
    keyAssumptionChanges:
      - 由于打包与扩展模块改善，ARPU 提升到 $60K。
      - 新增客户加速，Y3 期末超过 55 个客户。
      - 现有团队即可吸收额外规模，因此 Q4Y3 仍保持 EBITDA 为正。
