assumptions:
  - id: A1
    name: pre-seed 交割后的初始现金
    value: "2200"
    unit: "$K"
    source: "[BP fundingAsk.targetFundingRangeUsd $2-3M]；基准情景按模型起点完成 $2.2M 交割。"
  - id: A2
    name: 核心生产客户 ARPU
    value: "55"
    unit: "$K per customer per year"
    source: "[BP firstCustomer.initialContract annual deployment $45k-$75k；Research bottomUpSizingDrivers initial ACV $45k-$75k]；基准情景取区间低位到中位。"
  - id: A3
    name: 收入确认节奏
    value: "活跃月份按年合同的 1/12 确认"
    unit: policy
    source: "[Startup-finance heuristic：年度 SaaS 合同按月线性确认。]"
  - id: A4
    name: 毛利率
    value: "75"
    unit: percent
    source: "[BP businessModel.targetGrossMarginPct]"
  - id: A5
    name: 第 1 年期末客户 logo 数
    value: "6"
    unit: customers
    source: "[BP 0-12 个月里程碑：3-5 个付费共创客户，外加 2 个年度生产转化]；基准情景折算为 M12 时 6 个付费客户 logo。"
  - id: A6
    name: 第 2 年期末客户数
    value: "25"
    unit: customers
    source: "[BP team AE at Month 12；BP milestones 12-24 months partner-sourced pipeline]；基准情形假设创始人销售加 1 名 AE，到 Y2 Q4 能累计到 25 个付费 logo。"
  - id: A7
    name: 第 3 年期末客户数
    value: "47"
    unit: customers
    source: "[BP milestones 24-36 months adjacent workflow expansion；Research SOM 45 reachable customers at about $45k ACV]；基准情形假设相邻承诺域扩张带来轻微超额完成。"
  - id: A8
    name: 月度 logo 流失率
    value: "1.5"
    unit: percent
    source: "[Startup-finance heuristic：早期企业工作流 SaaS，场景有黏性，但产品市场契合仍在验证中。]"
  - id: A9
    name: 单个新客户 CAC
    value: "22"
    unit: "$K"
    source: "[Startup-finance heuristic，结合 BP / research 中的创始人主导外呼、付费试点和多利益相关方企业销售动作。]"
  - id: A10
    name: 平均销售周期
    value: "4.5"
    unit: months
    source: "[BP buyingProcess 涉及 security、IT 和 legal；Research adoptionFrictionMatrix 强调安全审查与连接器权限]。"
  - id: A11
    name: 招聘时间表
    value: "M1 配齐创始人 CEO 与创始工程师；M4 补应用 AI 工程师；M7 补解决方案工程师；M10 补安全工程师；M12 补客户经理；M16 补第二位工程师；M21 补第二位客户经理；M28 补第二位解决方案 / 客户成功成员"
    unit: plan
    source: "[BP team startTiming]；后续岗位是在同一路线图上做的精简版创业财务延展。"
  - id: A12
    name: 现金薪酬带
    value: "创始人 $120K；创始工程师 $160K；应用 AI 工程师 $180K；解决方案工程师 $150K；安全工程师 $170K；客户经理 $130K；解决方案 / 客户成功岗位 $140K"
    unit: annual salary
    source: "[Startup-finance heuristic for U.S. venture-backed software startups]；工资税和福利含在非薪酬运营支出中。"
  - id: A13
    name: 非薪酬运营支出爬坡
    value: "研发工具与云资源每月 $5K-$12K；销售与市场项目支出每月 $3K-$14K；管理、法务与安全支出每月 $6K-$10K"
    unit: "$K per month"
    source: "[Startup-finance heuristic，锚定 BP 中的连接器、安全与伙伴推进需求。]"
  - id: A14
    name: 试点转正式上线支持假设
    value: "目标 50%+"
    unit: percent
    source: "[BP gtm.funnelTargets：付费试点到年度正式上线 50%+]"
  - id: A15
    name: 现金流简化假设
    value: "EBITDA 近似等于经营现金变动"
    unit: policy
    source: "[Startup-finance heuristic：pre-seed 阶段不单独建 debt、capex、taxes 和营运资金时点模型。]"
  - id: A16
    name: 融资对应 runway
    value: "24"
    unit: months
    source: "[BP fundingAsk.runwayMonths 18] 再加上要求的 6 个月缓冲。"
