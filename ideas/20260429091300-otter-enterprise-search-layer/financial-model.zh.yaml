slug: meeting-commitment-graph
date: "2026-04-29"
currency: USD
modelStartMonth: "2026-05"
assumptions:
  - id: A1
    name: pre-seed 关闭后的期初现金
    value: "2200"
    unit: "$K"
    source: "[BP fundingAsk.targetFundingRangeUsd $2-3M]；基准情景按模型起始时完成 $2.2M 融资计算。"
  - id: A2
    name: 核心 production ARPU
    value: "55"
    unit: "$K per customer per year"
    source: "[BP firstCustomer.initialContract annual deployment $45k-$75k；Research bottomUpSizingDrivers initial ACV $45k-$75k]；基准情景取区间偏低到中位的位置。"
  - id: A3
    name: 收入确认节奏
    value: "1/12 of annual contract per active month"
    unit: policy
    source: "[创业财务经验：年度 SaaS 合同按月平均确认收入]。"
  - id: A4
    name: 毛利率
    value: "75"
    unit: percent
    source: "[BP businessModel.targetGrossMarginPct]。"
  - id: A5
    name: 第 1 年期末客户数
    value: "6"
    unit: customers
    source: "[BP milestones 0-12 months 中写明 3-5 个付费 design partners 和 2 个年度 production 转化]；基准情景将其换算为 M12 时 6 个付费 logo。"
  - id: A6
    name: 第 2 年期末客户数
    value: "25"
    unit: customers
    source: "[BP team 中 AE 于 Month 12 入职；BP milestones 12-24 months 提到 partner-sourced pipeline]；基准情景假设创始人销售叠加 1 名 AE，可在 Y2 Q4 累积到 25 个付费 logo。"
  - id: A7
    name: 第 3 年期末客户数
    value: "47"
    unit: customers
    source: "[BP milestones 24-36 months 中提到相邻工作流扩张；Research SOM 为约 45 个、每个约 $45k ACV 的可触达客户]；基准情景假设相邻承诺域扩张带来略高于 SOM 的表现。"
  - id: A8
    name: 月度 logo churn
    value: "1.5"
    unit: percent
    source: "[创业财务经验：早期企业工作流 SaaS 用例黏性较强，但产品市场匹配仍在验证中]。"
  - id: A9
    name: 每新增客户 CAC
    value: "22"
    unit: "$K"
    source: "[创业财务经验，锚定于 BP/research 中描述的创始人外呼、付费 pilot 动作和多 stakeholder 企业销售]。"
  - id: A10
    name: 平均销售周期
    value: "4.5"
    unit: months
    source: "[BP buyingProcess 包含 security、IT 和 legal；Research adoptionFrictionMatrix 强调安全审查和连接器授权]。"
  - id: A11
    name: 招聘时间线
    value: "Founder CEO 和 founding engineer 于 M1；applied AI engineer 于 M4；solutions engineer 于 M7；security engineer 于 M10；AE 于 M12；第二名 engineer 于 M16；第二名 AE 于 M21；第二名 solutions/CS 于 M28"
    unit: plan
    source: "[BP team startTiming]；后续岗位是在同一路线上的精简创业财务延展。"
  - id: A12
    name: 现金薪资区间
    value: "Founder $120K；founding engineer $160K；applied AI $180K；solutions engineer $150K；security engineer $170K；AE $130K；solutions/CS $140K"
    unit: annual salary
    source: "[美国风险投资支持的软件创业公司常见创业财务经验]；工资税与福利已计入非薪酬 opex。"
  - id: A13
    name: 非薪酬 opex 爬坡
    value: "R&D 工具/云成本每月 $5K-$12K；S&M 项目支出每月 $3K-$14K；G&A/legal/security 每月 $6K-$10K"
    unit: "$K per month"
    source: "[创业财务经验，锚定于 BP 中的连接器、安全与伙伴动作需求]。"
  - id: A14
    name: 支撑 pilot 转 production 的转化假设
    value: "50%+ target"
    unit: percent
    source: "[BP gtm.funnelTargets paid pilot to annual production 50%+]。"
  - id: A15
    name: 现金流简化假设
    value: "EBITDA approximates operating cash movement"
    unit: policy
    source: "[创业财务经验：pre-seed 阶段模型不显式模拟债务、capex、税和营运资金时点]。"
  - id: A16
    name: 融资对应跑道
    value: "24"
    unit: months
    source: "[BP fundingAsk.runwayMonths 18]，并额外加入 6 个月缓冲。"
