    downsideCase: "AE2 and second solutions/CS hire pulled forward by 2 quarters"
    baseCase: "Current lean plan"
    upsideCase: "Second wave delayed until proof points are hit"
    y3RevenueImpactK: -90.0
    cashImpactK: -220.0
modelDiagram:
  title: 单位经济流转
  mermaid: |
    flowchart LR
      Leads --> PaidPilots
      PaidPilots --> ProductionCustomers
      ProductionCustomers --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> OperatingCash
      ProductionCustomers --> Expansion
      Expansion --> Revenue
modelSanity:
  - checkName: 收入引擎
    finding: "基准情景收入来自一条很窄的客户爬坡曲线：Y1 期末 6 个付费客户，到 Y3 期末 47 个，ACV 为 $55K；并不是靠激进的 seat 量假设堆出来的。"
  - checkName: 必须发生的关键条件
    finding: "付费 pilot 必须接近计划中的 50%+ 转化目标，才能让创始人销售加 1 名 AE 在不组建大销售团队的情况下，于 Q4Y2 拿到 25 个付费客户。"
  - checkName: 模型会失效的情况
    finding: "如果定价被压到 $48K，且销售周期继续拉长，那么 downside 情景下现金会在进入 Y3 前跌到约 -$341K。"
  - checkName: 下一轮融资证明点
    finding: "如果公司能按计划接近 $2.6M ARR、在 Q4Y3 实现正 EBITDA，并证明相邻承诺工作流已从续约场景外扩，那么下一轮融资就有了扎实依据。"
sanityChecks:
  ruleOf40: "Y3 增长率 146% + EBITDA 利润率 -13% = 133%。"
  burnMultiple: "Y2 的 burn multiple 约为 0.8x，按净新增 ARR 计算；到 Y3 随着 Q4 转为 EBITDA 为正，改善到约 0.2x。"
  revenuePerFte: "以期末 9 名 FTE 计算，Y3 人均收入约 $218K（SaaS 常见基准约为 $200-400K）。"
  flags:
    - "由于 schema 没有显式融资流水线，模型假设在起始点已经完成一轮 $2.2M pre-seed。"
    - "基准情景下 Y3 全年 EBITDA 仍为负，因此 seed 故事更依赖高效率 ARR 增长和 Q4 更好的经营杠杆，而不是全年盈利。"
    - "第 3 年期末客户数达到 47 个，略高于 research 中约 45 个可触达客户的 SOM，因此计划隐含假设：相邻工作流扩张会在第 3 年结束前就开始贡献。"
    - "毛利率从第一批付费部署起就按商业计划中的 75% 目标计算；如果早期实施或支持强度更高，真实毛利可能更低。"