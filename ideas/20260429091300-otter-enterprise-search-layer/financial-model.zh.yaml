  round: pre-seed
  amountM: 2.2
  runwayMonths: 24
  milestone: "到 Q4Y2 做到 25 个付费客户、在续约风险工作流里实现 85%+ 精度、拿到至少 2 个正式转化，并跑出可复制的伙伴带单管道。"
  useOfFunds:
    - bucket: 工程
      amountUsd: 990000
      percentage: 45
    - bucket: 市场拓展
      amountUsd: 462000
      percentage: 21
    - bucket: 管理行政
      amountUsd: 264000
      percentage: 12
    - bucket: 缓冲（6 个月）
      amountUsd: 484000
      percentage: 22
scenarios:
  downside:
    description: "预算仍被锚定在记笔记工具支出附近，安全审查又拉长销售周期，结果是 Y3 期末客户数低于 research 里的 SOM。"
    y3RevenueK: 1282.0
    y3EbitdaK: -772.5
    cashLowPointK: -340.7
    keyAssumptionChanges:
      - "ARPU 降到 $48K。"
      - "新增客户明显放慢，Y3 期末客户数低于 40 家。"
      - "核心招聘计划不缩，所以经营杠杆迟迟出不来。"
  base:
    description: "创始人主导的试点顺利转正，Y2 借 1 名 AE 和伙伴生态谨慎放量，Y3 开始切入相邻承诺工作流。"
    y3RevenueK: 1966.3
    y3EbitdaK: -259.3
    cashLowPointK: 418.1
    keyAssumptionChanges:
      - "ARPU 稳在 $55K。"
      - "客户数从 Y1 期末 6 家增长到 Y2 期末 25 家，再到 Y3 期末 47 家。"
      - "毛利率维持在 75% 目标，团队继续保持精干。"
  upside:
    description: "平台成功拿到“续约风险系统记录层”的预算，伙伴转介绍又加速正式部署，而团队规模没有明显提前膨胀。"
    y3RevenueK: 2402.5
    y3EbitdaK: 67.9
    cashLowPointK: 759.8
    keyAssumptionChanges:
      - "ARPU 因包装与扩展模块提升到 $60K。"
      - "新增客户加速，Y3 期末超过 55 家。"
      - "现有团队吸收了更多业务量，因此 Q4Y3 仍保持 EBITDA 转正。"
