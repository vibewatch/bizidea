  - variable: 招聘节奏
    downsideCase: "AE2 和第二位 solutions/CS 提前 2 个季度入职"
    baseCase: "当前精简计划"
    upsideCase: "第二波招聘推迟到关键验证点达成后"
    y3RevenueImpactK: -90.0
    cashImpactK: -220.0
modelDiagram:
  title: 单位经济流转
  mermaid: |
    flowchart LR
      Leads[线索] --> PaidPilots[付费试点]
      PaidPilots --> ProductionCustomers[正式客户]
      ProductionCustomers --> Revenue[收入]
      Revenue --> GrossProfit[毛利]
      GrossProfit --> OperatingCash[经营现金]
      ProductionCustomers --> Expansion[扩容]
      Expansion --> Revenue
modelSanity:
  - checkName: 收入引擎
    finding: "基准情形的收入来自一条很窄的客户爬坡曲线——Y1 期末 6 个付费客户、Y3 期末 47 个，每家 ACV 约 $55K；并不是靠激进的 seat 数假设硬堆出来。"
  - checkName: 必须做对的事
    finding: "付费试点必须接近计划里的 50%+ 转正目标，这样创始人销售加 1 名 AE 才能在不大幅扩编销售团队的情况下，于 Q4Y2 做到 25 个付费客户。"
  - checkName: 模型失效条件
    finding: "如果定价被压到 $48K，且销售周期继续拉长，下行情形下现金会在 Y3 前探到约 -$341K。"
  - checkName: 下一轮融资验证点
    finding: "如果公司接近以约 $2.6M ARR 收在计划末端，且 Q4Y3 EBITDA 转正，同时能证明承诺图谱已从续约扩到相邻工作流，那么下一轮融资叙事才真正站得住。"
sanityChecks:
  ruleOf40: "Y3 增长 146% + EBITDA 利润率 -13% = 133%。"
  burnMultiple: "Y2 burn multiple 约 0.8x；随着 Q4 转正，Y3 改善到约 0.2x。"
  revenuePerFte: "按 9 名期末 FTE 计算，Y3 人均收入约 $218K（对 SaaS 来说大致落在 $200-400K 基准带内）。"
  flags:
    - "由于 schema 里没有单独融资流水线，模型默认在起始时点就拿到 $2.2M pre-seed。"
    - "基准情形下，Y3 全年 EBITDA 仍为负，因此 seed 叙事更依赖高效率 ARR 增长和 Q4 的经营杠杆，而不是全年盈利。"
    - "Y3 期末做到 47 个 logo，略高于 research 里约 45 家可触达客户的 SOM，因此模型隐含假设：相邻工作流扩张会在第 3 年末前开始兑现。"
    - "模型从第一批付费部署起就把毛利率固定在 business plan 的 75% 目标；如果早期实施和支持更重，真实毛利可能会更低。"