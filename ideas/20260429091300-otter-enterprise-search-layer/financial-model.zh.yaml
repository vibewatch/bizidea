  - variable: hiring pace
    downsideCase: 'AE2 and second solutions/CS hire pulled forward by 2 quarters'
    baseCase: Current lean plan
    upsideCase: Second wave delayed until proof points are hit
    y3RevenueImpactK: -90.0
    cashImpactK: -220.0
modelDiagram:
  title: 单位经济流转
  mermaid: |
    flowchart LR
      Leads[线索] --> PaidPilots[付费试点]
      PaidPilots --> ProductionCustomers[生产客户]
      ProductionCustomers --> Revenue[收入]
      Revenue --> GrossProfit[毛利润]
      GrossProfit --> OperatingCash[经营现金]
      ProductionCustomers --> Expansion[扩张]
      Expansion --> Revenue
modelSanity:
  - checkName: Revenue engine
    finding: 基础情景收入来自一条较窄的客户爬坡路径：Y1 期末 6 个付费客户，在 $55K ACV 下增长到 Y3 期末 47 个，而非依赖激进的席位数量假设。
  - checkName: Must go right
    finding: 付费试点必须接近计划中的 50%+ 转化目标，才能让创始人主导获客加 1 位 AE 在不扩建大型销售团队的前提下，于 Q4Y2 拿到 25 个付费客户。
  - checkName: Model breaks if
    finding: 如果定价被压缩到 $48K 且销售周期拉长，那么在模型进入 Y3 之前， downside 情景的现金低点将降至约 -$341K。
  - checkName: Next-round proof
    finding: 只有当公司接近以 $2.6M ARR、Q4Y3 EBITDA 转正，并证明相邻承诺工作流能扩展到续约之外时，下一轮融资叙事才成立。
sanityChecks:
  ruleOf40: 'Y3 增长 146% + EBITDA 利润率 -13% = 133%。'
  burnMultiple: 'Y2 的 burn multiple 约为 0.8x，基于净新增 ARR 计算；随着 Q4 转为 EBITDA 为正，Y3 改善到约 0.2x。'
  revenuePerFte: '$218K Y3，按期末 9 个 FTE 计算（对标 SaaS 大致为 $200-400K）。'
  flags:
    - 由于该 schema 没有显式融资行，模型以完成 $2.2M pre-seed 融资后的状态作为起点。
    - 基础情景下 Y3 全年仍为 EBITDA 负值，因此 seed 叙事依赖高效 ARR 增长和更好的 Q4 经营杠杆，而非全年盈利。
    - 客户爬坡在 Y3 期末达到 47 个 logo，略高于 research SOM 约 45 个可触达客户，因此计划假设在第三年结束前已开始拓展到相邻工作流。
    - 毛利率从首批付费部署起就按业务计划中的 75% 目标持平；若早期实施或支持强度更高，实际毛利可能会更低。
