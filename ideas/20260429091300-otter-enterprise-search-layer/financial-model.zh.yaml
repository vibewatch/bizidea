    cashImpactK: -188.0
  - variable: CAC
    downsideCase: "$30K CAC from longer enterprise pursuit"
    baseCase: "$22K CAC"
    upsideCase: "$18K CAC with partner assists"
    y3RevenueImpactK: -120.0
    cashImpactK: -180.0
  - variable: churn
    downsideCase: "2.0% monthly logo churn"
    baseCase: "1.5% monthly logo churn"
    upsideCase: "1.0% monthly logo churn"
    y3RevenueImpactK: -140.0
    cashImpactK: -105.0
  - variable: sales cycle
    downsideCase: "6.0 months because security and legal drag"
    baseCase: "4.5 months"
