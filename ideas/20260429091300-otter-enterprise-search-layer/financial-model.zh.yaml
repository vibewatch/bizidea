assumptions:
  - id: A1
    name: pre-seed 完成后的起始现金
    value: '2200'
    unit: '$K'
    source: '[BP fundingAsk.targetFundingRangeUsd $2-3M]; 基础情景采用模型起始时完成 $2.2M 融资。'
  - id: A2
    name: 核心生产部署 ARPU
    value: '55'
    unit: '$K per customer per year'
    source: '[BP firstCustomer.initialContract annual deployment $45k-$75k; Research bottomUpSizingDrivers initial ACV $45k-$75k]; 基础情景采用区间偏低到中位的数值。'
  - id: A3
    name: 收入确认节奏
    value: '1/12 of annual contract per active month'
    unit: policy
    source: '[Startup-finance heuristic: 年度 SaaS 合同按活跃月份平均逐月确认收入].'
  - id: A4
    name: 毛利率
    value: '75'
    unit: percent
    source: '[BP businessModel.targetGrossMarginPct].'
  - id: A5
    name: 第一年期末客户数
    value: '6'
    unit: customers
    source: '[BP milestones 0-12 months 3-5 paid design partners and 2 annual production conversions]; 基础情景将其转化为 M12 时 6 个付费 logo。'
  - id: A6
    name: 第二年期末客户数
    value: '25'
    unit: customers
    source: '[BP team AE at Month 12; BP milestones 12-24 months partner-sourced pipeline]; 基础情景假设创始人主导销售加 1 位 AE 在 Y2 Q4 末复合增长到 25 个付费 logo。'
  - id: A7
    name: 第三年期末客户数
    value: '47'
    unit: customers
    source: '[BP milestones 24-36 months adjacent workflow expansion; Research SOM 45 reachable customers at about $45k ACV]; 基础情景假设由于扩展到相邻承诺域而略微超预期。'
  - id: A8
    name: 月度 logo 流失率
    value: '1.5'
    unit: percent
    source: '[Startup-finance heuristic: 适用于运营用例黏性较强、但仍在验证 PMF 的早期企业工作流 SaaS].'
  - id: A9
    name: 每新增客户 CAC
    value: '22'
    unit: '$K'
    source: '[Startup-finance heuristic anchored to founder-led outbound, paid pilot motion, and multi-stakeholder enterprise sale in BP/research].'
  - id: A10
    name: 平均销售周期
    value: '4.5'
    unit: months
    source: '[BP buyingProcess includes security, IT, and legal; Research adoptionFrictionMatrix highlights security review and connector permissioning].'
  - id: A11
    name: 招聘时间线
    value: 'Founder CEO and founding engineer at M1; applied AI engineer M4; solutions engineer M7; security engineer M10; AE M12; second engineer M16; second AE M21; second solutions/CS hire M28'
    unit: plan
    source: '[BP team startTiming]; 后续招聘是在同一计划基础上的精益 startup-finance 延展。'
  - id: A12
    name: 现金薪资区间
    value: 'Founder $120K; founding engineer $160K; applied AI $180K; solutions engineer $150K; security engineer $170K; AE $130K; solutions/CS $140K'
    unit: annual salary
    source: '[Startup-finance heuristic for U.S. venture-backed software startups]; 薪资税与福利计入非薪资运营费用。'
  - id: A13
    name: 非薪资运营费用爬坡
    value: 'R&D tools/cloud $5K-$12K monthly; S&M program spend $3K-$14K monthly; G&A/legal/security $6K-$10K monthly'
    unit: '$K per month'
    source: '[Startup-finance heuristic anchored to BP connector, security, and partner-motion needs].'
  - id: A14
    name: 试点转正式部署支持度
    value: '50%+ target'
    unit: percent
    source: '[BP gtm.funnelTargets paid pilot to annual production 50%+].'
  - id: A15
    name: 现金流简化假设
    value: EBITDA approximates operating cash movement
    unit: policy
    source: '[Startup-finance heuristic: 在 pre-seed 阶段不建模债务、资本开支、税收或营运资本时点差异].'
  - id: A16
    name: 融资对应跑道
    value: '24'
    unit: months
    source: '[BP fundingAsk.runwayMonths 18] 加上所需的 6 个月缓冲。'
