competitors:
  - name: Otter.ai
    stage: scale-up
    wedge: 以会议捕捉为基础，向跨工具搜索与工作流扩展。
    pricing: Business 计划公开价格约为 $19.99/user/month 起；enterprise 定制定价。
    strength: 拥有转录上下文，并已将其连接到 Gmail、Drive、Notion、Jira 和 Salesforce。
    weaknessVsUs: 定位仍以可搜索上下文与跟进为主，而不是可审计的承诺图谱。
    sourceRefs:
      - 1
      - 2
      - 3
      - 4
      - 5
  - name: Gong
    stage: incumbent
    wedge: 面向预测、辅导、pipeline 和客户成功的 Revenue AI OS。
    pricing: 定制企业报价。
    strength: 在营收团队中拥有深度分发，并且结果导向定位清晰。
    weaknessVsUs: 公开叙事更偏广义营收执行，而非将承诺对账到 Jira/Salesforce 对象中。
    sourceRefs:
      - 6
      - 7
      - 8
      - 9
  - name: Avoma
    stage: scale-up
    wedge: AI 会议助手，加上会话智能与营收智能。
    pricing: 公开价格从 $19 per recorder/month 起，并有更高层级和附加模块。
    strength: 中端市场友好的定价，以及对 GTM 工作流的聚焦。
    weaknessVsUs: 仍更偏记笔记、预测与辅导，而非跨团队承诺追踪。
    sourceRefs:
      - 10
      - 11
      - 12
  - name: Glean
    stage: scale-up
    wedge: 基于 enterprise graph 的企业搜索加 AI 智能体。
    pricing: 定制企业定价。
    strength: 强大的跨应用检索能力，并证明买方确实感受到信息碎片化痛点。
    weaknessVsUs: 通用工作 AI 并不是为客户承诺与续约风险修复而专门设计。
    sourceRefs:
      - 13
      - 14
      - 15
      - 16
  - name: Atlassian Rovo
    stage: incumbent
    wedge: 嵌入 Jira/Confluence 工作流中的搜索、聊天和智能体。
    pricing: 接入与 Atlassian cloud 计划绑定；Rovo Dev 另行按 $20/developer/month 定价。
    strength: 能自然分发到以 Jira 为中心的产品组织。
    weaknessVsUs: 一旦工作已进入 Atlassian，它的能力很强；但对于从会议中捕捉工单前的客户承诺则相对较弱。
    sourceRefs:
      - 18
      - 19
      - 20
      - 21
