- point: Glean 的客户案例已经把痛点和 ROI 量化出来：Webflow 提到 20+ 个工具，Confluent 提到每月节省 15,000+ 小时。
  sourceRefs:
  - 36
  - 15
- point: Atlassian 正把 Rovo 继续扩到 MCP 连通性和 Jira 工作流里。
  sourceRefs:
