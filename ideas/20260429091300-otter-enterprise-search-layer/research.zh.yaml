openQuestions:
- 漏承诺这件事，是否真的痛到足以支撑一个独立平台，而不是被并进现有记笔记或营收工具里？
- 承诺被识别出来之后，到底哪个职能真的负责修复——RevOps、CS Ops、Product Ops，还是 account 负责人？
- 团队能接受的误报率上限是多少，超过就会不再信任抽取结果？
- 如果上游平台推出原生承诺跟踪，厂商无关的 transcript access 还能有多稳？
