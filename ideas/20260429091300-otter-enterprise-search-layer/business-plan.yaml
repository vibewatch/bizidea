slug: meeting-commitment-graph
date: '2026-04-29'
executiveSummary: >-
  Meeting Commitment Graph is an enterprise workflow layer that turns customer-call promises into tracked execution objects across Salesforce, Jira, Notion, and email. The initial customer is a U.S.-based B2B SaaS company with 200-1,500 employees, enterprise sales cycles, 50-300 customer-facing reps, and a recent rollout of Otter- or Gong-style meeting capture. The acute pain is not search; it is churn, escalations, and roadmap drift caused by promises made in calls that never become owned work in downstream systems. The beachhead is narrow by design: renewal- and escalation-sensitive product-ops, rev-ops, and CS-ops teams at software companies that already record calls and already run Salesforce plus Jira. The product wins only if it can attach a spoken commitment to the right account, owner, and work item with enough precision for teams to trust actioning it within existing workflows. Public pricing from adjacent tools supports budget availability, but the company still must prove that buyers will fund a separate platform fee tied to reduced missed commitments rather than treat this as bundled note-taking. The researched U.S. SAM is modest at about $37.0M, so the venture case depends on expanding the same commitment graph beyond SaaS renewals into support escalations, implementation obligations, and other enterprise commitments after the first wedge is proven. The biggest disconfirming risks are extraction accuracy, incumbent bundling from meeting and workflow vendors, and unclear ownership of remediation across RevOps, CS, and Product. The near-term company-building goal is to win 3-5 design partners, prove pilot-to-production conversion above 50%, and show that high-risk commitments get assigned within 48 hours at materially higher rates than manual workflows.
problem:
  - Customer promises on sales, onboarding, and QBR calls are often missing from Salesforce, Jira, and planning systems until an escalation or renewal review forces manual reconstruction.
  - Generic enterprise search and meeting notes surface context, but they do not create auditable commitment objects with owners, due dates, linked work items, and execution-drift alerts.
solution:
  - Ingest recorded customer calls plus Salesforce, Jira, Notion, and email metadata to extract product, commercial, and follow-up commitments with source evidence.
  - Create a commitment object tied to the account, owner, due date, and linked Jira epic or CRM record, then flag unowned, overdue, or repeatedly missed commitments before renewals and escalations.
whyWeWin:
  - The wedge is narrower than search or conversation intelligence: external customer commitments tied to revenue risk, which gives a sharper buyer, trigger, and ROI story.
  - Defensibility compounds from a closed-loop graph of promise wording, ownership patterns, fulfillment outcomes, and account impact rather than from transcripts alone.
strategicChoices:
  beachhead: U.S. English-first B2B SaaS companies with 200-1,500 employees, Salesforce plus Jira, enterprise renewals, and frequent roadmap or integration promises in recorded customer calls.
  wedgeRationale: This slice already has the raw data, clear financial pain at renewal time, and operators measured on follow-through, so the product can prove value without changing rep behavior or asking for broad enterprise search adoption.
  sequencingRationale: Start read-only on Otter/Gong plus Salesforce/Jira to prove extraction and assignment accuracy on a narrow renewal-risk workflow; then add write-back automation, executive reporting, and additional connectors only after pilot trust and security objections are cleared; hire GTM after repeatable pilot conversion, not before.
  notYet:
    - Internal-only meeting commitments such as staff meetings or board prep
    - Horizontal enterprise search or chat across all departments
    - EU and UK expansion before retention, review, and profiling controls are mature
    - Fully autonomous task creation for high-stakes accounts without human review
market:
  tam: $0.6B estimated U.S.-anchored TAM based on researched software-publisher fit, adjacency expansion, and $75k blended ACV
  sam: $37.0M estimated SAM in U.S. software publishers with 100-999 employees and an initial $45k ACV profile
  som: $2.0M estimated year-three SOM based on roughly 45 reachable customers at about $45k ACV
  segments:
    - RevOps, Product Ops, and CS Ops teams at mid-market and enterprise B2B SaaS companies
    - CRO, VP Customer Success, VP Product, and account leadership handling escalations and renewals
  buyingProcess: The initial champion is likely Head of RevOps, Product Ops, or CS Ops, but approval will also involve security, IT, and legal because the product touches recorded meetings and system-of-record connectors. A credible first sale is a scoped pilot on a renewal-risk account set, converting to annual deployment once the team trusts extraction precision and sees fewer unowned commitments.
product:
  mvp: >-
    MVP is a read-only commitment-detection layer for Otter or Gong recordings plus Salesforce and Jira. It must extract commitments with evidence snippets, resolve them to account and owner, show confidence tiers, and surface a queue of unowned or overdue items for human confirmation.
  sixMonth: Launch production pilots with Salesforce and Jira write-back, account-level risk dashboards, and workflow rules for renewal-risk and escalation reviews.
  twelveMonth: Add Notion and email context, repeated-ask clustering, executive audit trails, and benchmark reporting on commitment fulfillment by segment, team, and account tier.
  twentyFourMonth: Expand the same graph into implementation, support escalation, partner, and procurement commitments and support vendor-agnostic ingestion across Otter, Gong, Zoom, Teams, and Slack call sources.
  keyBets:
    - Buyers will trust a human-in-the-loop review queue if precision is high enough on the top-risk commitments.
    - Salesforce and Jira are the minimum downstream systems required to prove value in the first wedge.
    - Renewal-risk and escalation workflows provide faster ROI proof than broader search or coaching use cases.
gtm:
  wedge: Sell a renewal-risk commitment audit for recorded customer calls, then convert that audit into an always-on monitored commitment graph for the accounts that matter most.
  channels:
    - Founder-led outbound to Heads of RevOps, Product Ops, and CS Ops at B2B SaaS companies already using call recording
    - Referral and implementation partners in Salesforce, Jira, and RevOps consulting ecosystems
    - Co-selling and ecosystem visibility through meeting-recorder and revenue-ops communities
  funnelTargets: lead→qualified pilot 20-30%, qualified pilot→paid pilot 40-50%, paid pilot→annual production 50%+, production→multi-team expansion 30%+ in year one
  pricing: Annual SaaS priced as a platform fee for the first 100 monitored accounts plus included seats for customer-facing meeting hosts, with expansion tied to additional monitored accounts and higher commitment volume; this aligns spend to renewal-risk surface rather than all employees and matches the buyer's ROI model.
businessModel:
  revenueStreams:
    - Annual platform subscriptions
    - Expanded monitored-account packages for additional business units or account tiers
    - Premium reporting and forecasting modules for executive renewal-risk and escalation analysis
  unitOfValue: Monitored customer account with included commitment volume and customer-facing host seats
  targetGrossMarginPct: 75
  expansionLevers:
    - Add more account cohorts after proving ROI on renewal-risk accounts
    - Expand from RevOps into CS Ops, Product Ops, and executive escalation workflows
    - Add adjacent commitment domains such as implementation, support, and partner obligations
strategyMap:
  northStarMetric: Percent of high-value customer commitments assigned to an owner and linked work item within 48 hours
  inputMetrics:
    - Pilot extraction precision on high-confidence commitments
    - Percent of detected commitments accepted by human reviewers
    - Time from meeting end to reviewed commitment object
    - Percent of monitored accounts with at least one risk alert resolved before renewal or escalation
    - Pilot-to-production conversion rate
  moatsToBuild:
    - Commitment taxonomy tuned for SaaS roadmap, integration, commercial, and escalation promises
    - Cross-system entity resolution linking transcript language to account, owner, and Jira work
    - Closed-loop outcome dataset connecting fulfillment behavior to churn, expansion, and escalation outcomes
  killCriteria:
    - Fewer than 3 paid design partners in 9 months
    - High-confidence commitment precision below 85% after two model iterations
    - Paid pilot to annual conversion below 30%
    - Buyers refuse platform pricing above bundled note-taking spend even when missed-commitment ROI is documented
  mermaid: |
    flowchart LR
      Wedge[Renewal-risk commitment audit] --> MVP[Read-only commitment graph MVP]
      MVP --> Proof[Assigned within 48h and fewer unowned promises]
      Proof --> Expansion[Write-back automation and adjacent commitment workflows]
investorMemo:
  verdict:
    call: Meet / investigate further
    conviction: Promising narrow wedge with credible buyer pain, but conviction depends on proving standalone budget and extraction trust quickly.
    whyBelieve: Cross-tool meeting search validates the raw data layer, and incumbents still appear broader than an auditable promise-to-execution system for revenue-risk commitments.
    whyDoubt: The initial market is not large enough on its own, and upstream meeting or workflow vendors could bundle adjacent features before this startup earns distribution.
    nextDiligence: Verify with 5-10 target operators that missed commitments create budget-level pain and that a $45k-$75k annual deployment is credible if assignment rates improve materially.
  firstCustomer:
    title: Head of RevOps or Product Ops at a Series B+ B2B SaaS company
    profile: 200-1,500 employees, 50-300 customer-facing reps, Salesforce plus Jira, active enterprise renewals, and recorded customer calls across sales and success.
    trigger: A churn review, executive escalation, or meeting-AI rollout exposes promised integrations or roadmap items that never became owned work.
    buyer: Head of RevOps or VP Product Operations
    initialContract: $25k-$40k paid pilot on 25-50 strategic accounts with conversion to $45k-$75k annual deployment for the first 100 monitored accounts if pilot-to-production metrics are met.
  mustBeTrue:
    - Design partners confirm that missed customer commitments cause measurable churn, escalation, or roadmap-drift costs today.
    - High-confidence commitment extraction can reach at least 85% precision on the first workflow without requiring rep behavior change.
    - Salesforce plus Jira integration covers the majority of remediation workflows for the beachhead customer.
    - A RevOps, Product Ops, or CS Ops sponsor can own budget and deployment despite cross-functional users.
    - Production buyers will pay a platform fee beyond existing note-taking or conversation-intelligence spend when ROI is shown.
  diligenceQuestions:
    - Which exact postmortem events made operators realize promises are being lost today?
    - What false-positive rate is acceptable before CS and Product teams stop trusting detected commitments?
    - Does the first budget come from revenue tooling, productivity AI, or customer-success operations?
    - How often do Salesforce and Jira already contain enough structure to validate fulfillment automatically?
    - What happens if Otter, Gong, Salesforce, or Atlassian launch native commitment objects in the next 12 months?
  riskHeatmap:
    - risk: Extraction accuracy does not reach operator trust thresholds
      likelihood: High
      impact: High
      leadingIndicator: Human reviewers reject more than 20% of high-confidence commitments in the first three pilots
      mitigation: Start with narrow commitment taxonomy, evidence-backed confidence tiers, and human review on high-stakes accounts
    - risk: Upstream vendors bundle the wedge or restrict data access
      likelihood: Medium
      impact: High
      leadingIndicator: Design partners insist on single-vendor recorder support or roadmap news shows native commitment tracking before pilots convert
      mitigation: Stay recorder-agnostic, own downstream write-back and outcome graph, and prioritize systems-of-record integrations over recorder-specific UX
    - risk: Buyer ownership is too diffuse to support a repeatable sale
      likelihood: Medium
      impact: High
      leadingIndicator: Pilots stall because RevOps finds the pain but Product or CS refuses to own remediation workflow
      mitigation: Sell first around renewal-risk accounts with visible SLAs and require an executive sponsor plus one operations owner in every pilot
    - risk: Security and privacy review materially extend sales cycles
      likelihood: Medium
      impact: Medium
      leadingIndicator: Security review exceeds 90 days or pilots are blocked on retention and connector-scope objections
      mitigation: Offer least-privilege read-only start, configurable retention, evidence trails, and defer EU/UK expansion
operatingAssumptions:
  - assumption: The first repeatable buyer is Head of RevOps, Product Ops, or CS Ops rather than Sales or Product leadership directly.
    basis: research.yaml
    validationTest: Close 5 discovery calls and 2 paid pilots where the same function owns problem definition, deployment, and budget path.
    decisionImpact: If false, GTM messaging, pricing authority, and required stakeholders all change and sales cycles will lengthen.
  - assumption: High-confidence commitment extraction can reach at least 85% precision on renewal-risk workflows with human review.
    basis: operator judgment
    validationTest: Run a blinded annotation study on 100-200 call segments and compare accepted versus rejected commitments by persona.
    decisionImpact: If false, the product must narrow scope further or shift from automation software toward audit and analytics tooling.
  - assumption: Salesforce and Jira are sufficient for the first proof of value, without needing Slack, Microsoft, or full enterprise search breadth.
    basis: idea.yaml
    validationTest: Map remediation workflows in 3-5 design partners and confirm that over 70% of required owner and work-item resolution happens in those two systems.
    decisionImpact: If false, MVP scope expands, connector burden rises, and pre-seed funding may be insufficient.
  - assumption: Buyers will fund a platform fee tied to monitored accounts rather than only seat-based pricing.
    basis: research.yaml
    validationTest: Test two pilot proposals and measure whether customers accept monitored-account pricing above existing note-taking spend when tied to quantified renewal-risk ROI.
    decisionImpact: If false, ACV, TAM, and hiring pace must be reduced and the company may need a services-assisted model.
  - assumption: U.S. English-first deployments can close before building EU/UK-specific profiling and retention controls.
    basis: research.yaml
    validationTest: Win the first 3 production customers in U.S.-only environments without losing deals primarily on regional compliance gaps.
    decisionImpact: If false, compliance engineering moves ahead of roadmap expansion and go-to-market narrows further.
experimentRoadmap:
  - horizon: 0-90 days
    experiment: Run 20 buyer interviews with RevOps, Product Ops, and CS Ops leaders from U.S. B2B SaaS companies using Salesforce, Jira, and meeting recording.
    hypothesis: The strongest buying trigger is a recent churn, escalation, or meeting-AI rollout that surfaced untracked promises.
    successMetric: At least 10 interviewees describe a recent high-cost missed-commitment incident and 5 agree to workflow mapping.
    owner: Founder CEO
  - horizon: 0-90 days
    experiment: Build a manual commitment-audit service on exported call recordings for 2-3 design partners.
    hypothesis: Teams will pay for a renewal-risk audit before full product automation if the output is account-specific and actionable.
    successMetric: 2 paid audits and at least 1 pilot scope converting from audit deliverable to software trial.
    owner: Founder CEO
  - horizon: 0-90 days
    experiment: Benchmark extraction precision on 100-200 call segments using a narrow taxonomy of roadmap, integration, and follow-up commitments.
    hypothesis: Narrowing the ontology will materially improve trust versus generic action-item extraction.
    successMetric: 85%+ precision on high-confidence commitments and fewer than 10% critical false positives.
    owner: Founding eng
  - horizon: 90-180 days
    experiment: Launch read-only pilots integrating Otter or Gong with Salesforce and Jira for 25-50 monitored accounts each.
    hypothesis: A monitored-account workflow can raise assigned-within-48-hours rates without requiring rep behavior change.
    successMetric: At least 50% improvement over baseline assignment rate in each pilot and 3 active weekly users per customer function.
    owner: Founding eng
  - horizon: 90-180 days
    experiment: "Test two pricing offers: account-based platform fee versus host-seat plus overage pricing."
    hypothesis: Monitored-account pricing better matches buyer ROI and supports higher ACV.
    successMetric: At least 2 of 3 paid pilots choose monitored-account pricing at equal or higher annualized contract value.
    owner: Founder CEO
  - horizon: 180-365 days
    experiment: Add Jira and Salesforce write-back with human approval and measure pilot-to-production conversion.
    hypothesis: Workflow insertion into existing systems is the key step from interesting analytics to production software.
    successMetric: 50%+ conversion from paid pilot to annual production and weekly workflow usage by at least two teams.
    owner: Founding eng
  - horizon: 180-365 days
    experiment: Establish 3 channel-adjacent partnerships with RevOps consultants or Salesforce/Jira implementation firms.
    hypothesis: Services partners can shorten trust-building and integration discovery in complex accounts.
    successMetric: 3 signed referral or implementation partners and 2 sourced pilot opportunities.
    owner: Founder CEO
operations:
  - Least-privilege connector architecture with read-only default, scoped write-back, and customer-configurable retention
  - Human review queue and audit log for every extracted commitment before high-stakes automation
  - Shared taxonomy management for commitment types, ownership rules, and account tiers per customer
  - Security review playbook covering DPA, transcript retention, connector scopes, and evidence trails
  - Customer success cadence anchored on weekly pilot reviews and quarterly proof-of-ROI readouts
team:
  - role: Founding eng
    startTiming: Month 0
    rationale: Build the ingestion, entity resolution, review queue, and write-back foundations before scaling GTM.
  - role: Founder CEO
    startTiming: Month 0
    rationale: Founder-led sales is required because the problem is cross-functional, ROI-driven, and still needs category education.
  - role: Applied AI engineer
    startTiming: Month 3
    rationale: Extraction precision and taxonomy tuning are first-order product risks and need dedicated ownership early.
  - role: Product-minded solutions engineer
    startTiming: Month 6
    rationale: Early deployments will live or die on connector setup, workflow mapping, and trust-building with design partners.
  - role: Security and platform engineer
    startTiming: Month 9
    rationale: Procurement friction and connector reliability become the main bottlenecks once the first pilots convert.
  - role: Account executive or operator-seller
    startTiming: Month 12
    rationale: Add quota-carrying GTM only after repeatable pilot packaging, pricing, and conversion evidence exist.
milestones:
  - horizon: 0-12 months
    items:
      - Sign 3-5 paid design partners in the U.S. SaaS beachhead
      - Reach 85%+ high-confidence commitment precision on the initial taxonomy
      - Ship read-only Otter or Gong plus Salesforce and Jira MVP with evidence trails
      - Convert at least 2 paid pilots to annual production deployments
  - horizon: 12-24 months
    items:
      - Expand deployments from renewal-risk accounts to broader CS and Product workflows
      - Add Notion, email, and additional recorder support with approval-based write-back
      - Publish benchmark reporting on fulfillment rates and missed-commitment patterns across customers
      - Reach a repeatable partner-sourced pipeline motion with RevOps and implementation firms
  - horizon: 24-36 months
    items:
      - Expand the graph into implementation, support escalation, and partner commitments
      - Support larger multi-business-unit deployments with policy controls and audit reporting
      - Demonstrate expansion revenue from at least two adjacent commitment domains beyond renewals
risks:
  - risk: Extraction accuracy is too low for teams to trust automatic commitment creation
    likelihood: High
    impact: High
    mitigation: Constrain the taxonomy, keep humans in the loop, and measure acceptance rates by commitment type before expanding automation.
  - risk: Meeting vendors, CRM suites, or workflow incumbents bundle the wedge
    likelihood: Medium
    impact: High
    mitigation: Stay vendor-agnostic, differentiate on closed-loop outcome data and auditability, and integrate deeply into downstream remediation workflows.
  - risk: Cross-functional ownership ambiguity slows deals and adoption
    likelihood: Medium
    impact: High
    mitigation: Sell around renewal-risk accounts with named sponsor, named ops owner, and clear SLA for commitment review and assignment.
  - risk: Security, privacy, and profiling concerns lengthen implementation
    likelihood: Medium
    impact: Medium
    mitigation: Start U.S.-only, default to read-only access, offer configurable retention, and build evidence trails before pursuing broader geographies.
fundingAsk:
  stage: pre-seed
  targetFundingRangeUsd: $2-3M
  runwayMonths: 18
  useOfFundsSummary: 18 months funds two founders plus early applied AI, solutions, and security hires; ships the core connector and commitment-graph product; proves 3-5 paid design partners and 2+ production conversions; and builds the security, compliance, and partner motion needed for a repeatable seed round.
