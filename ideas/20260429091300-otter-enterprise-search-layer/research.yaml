competitors:
- name: Otter.ai
  stage: scale-up
  wedge: Meeting capture expanding into cross-tool search and workflow.
  pricing: Business plan public from about $19.99/user/month; enterprise custom.
  strength: Owns transcript context and now connects it to Gmail, Drive, Notion, Jira, and Salesforce.
  weaknessVsUs: Still positioned around searchable context and follow-ups rather than an auditable commitment graph.
  sourceRefs:
  - 1
  - 2
  - 3
  - 4
  - 5
- name: Gong
  stage: incumbent
  wedge: Revenue AI OS for forecasting, coaching, pipeline, and customer success.
  pricing: Custom enterprise proposal.
  strength: Deep revenue-team distribution and clear outcome positioning.
  weaknessVsUs: Public messaging is broader revenue execution, not promise reconciliation into Jira/Salesforce objects.
  sourceRefs:
  - 6
  - 7
  - 8
  - 9
- name: Avoma
  stage: scale-up
  wedge: AI meeting assistant plus conversation and revenue intelligence.
  pricing: Public from $19 per recorder/month with higher tiers and add-ons.
  strength: Mid-market-friendly pricing and GTM workflow focus.
  weaknessVsUs: Still more note-taking, forecasting, and coaching than cross-team commitment tracking.
  sourceRefs:
  - 10
  - 11
  - 12
- name: Glean
  stage: scale-up
  wedge: Enterprise search plus AI agents on top of an enterprise graph.
  pricing: Custom enterprise pricing.
  strength: Strong cross-app retrieval and proof that buyers feel information-sprawl pain.
  weaknessVsUs: General work AI is not purpose-built for customer commitments and renewal-risk remediation.
  sourceRefs:
  - 13
  - 14
  - 15
  - 16
- name: Atlassian Rovo
  stage: incumbent
  wedge: Search, chat, and agents embedded in Jira/Confluence workflows.
  pricing: Access tied to Atlassian cloud plans; Rovo Dev priced separately at $20/developer/month.
  strength: Natural distribution into Jira-centered product organizations.
  weaknessVsUs: Best after work enters Atlassian, weaker on capturing pre-ticket customer promises from meetings.
  sourceRefs:
  - 18
  - 19
  - 20
  - 21
