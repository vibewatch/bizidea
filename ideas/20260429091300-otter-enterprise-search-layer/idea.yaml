topRisks:
  - name: "Platform dependence"
    description: "If Otter or adjacent meeting vendors absorb this workflow, distribution could tighten."
    mitigation: "Stay vendor-agnostic from day one across Otter, Gong, Zoom, and Teams recordings, and own the downstream commitment graph."
  - name: "Extraction accuracy"
    description: "Incorrectly labeling soft suggestions as hard promises could destroy trust with revenue teams."
    mitigation: "Use confidence thresholds, human review queues for high-stakes accounts, and closed-loop feedback from Jira and CRM outcomes."
  - name: "Cross-functional ownership"
    description: "RevOps may feel the pain, but product or customer success may need to act, slowing adoption."
    mitigation: "Sell first to operators already measured on renewals and escalations, and package workflows that assign tasks into existing Jira and CRM processes."
