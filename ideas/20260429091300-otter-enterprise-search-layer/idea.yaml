problem: >-
  In B2B SaaS companies, the most dangerous customer commitments are often made
  in calls, then lost across notes, CRM fields, Slack threads, and Jira
  tickets. Revenue teams promise integrations, timelines, or escalations that
  product and success teams cannot reliably see or track. Generic enterprise
  search helps people find context, but it does not turn spoken commitments
  into owned, auditable work.
targetUser:
  primary: >-
    Head of RevOps or Product Operations at a 200-1,500 employee B2B SaaS
    company using Salesforce, Jira, Notion, and an AI meeting recorder across
    sales and customer success
  secondary: "CRO, VP Customer Success, or VP Product at the same company"
  buyer: "Head of RevOps or VP Product Operations"
startupThesis:
  nonObviousInsight: >-
    As meeting tools become cross-tool search layers, transcripts stop being
    dead notes and become the only dataset that captures customer intent before
    it is translated imperfectly into CRM, ticketing, and docs. The new wedge
    is not another search box; it is a commitment graph that detects what was
    promised, maps it to systems of record, and flags execution drift.
  beachhead: >-
    Product-ops and rev-ops teams at Series B to public B2B SaaS companies with
    enterprise sales cycles, frequent roadmap or integration promises in calls,
    and shared use of Salesforce, Jira, Notion, and Otter or a similar meeting
    recorder
  wedge: >-
    An AI layer that converts customer-call promises into structured commitment
    objects with owner, due date, linked Jira epic, linked Salesforce account,
    and risk status
  whyNowCatalyst: >-
    Otter’s launch of cross-tool enterprise search and workflow-oriented meeting
    agents makes it newly practical to extract promises from calls and verify
    them against the apps where execution actually happens.
  ventureScalePath: >-
    Start with customer-facing commitments for revenue and product teams, then
    expand the same commitment graph into support escalations, implementation
    projects, partner commitments, procurement approvals, and board-level
    decision tracking across the enterprise.
solution: >-
  Meeting Commitment Graph connects Otter, Salesforce, Jira, Notion, and email
  to create a system of record for promises made in customer calls. It extracts
  product commitments, commercial concessions, and follow-up obligations, then
  links each one to the account, opportunity, roadmap item, or internal owner
  that should absorb it. The product watches for drift such as a renewal at
  risk with no ticket, a promised integration with no epic, or repeated asks
  that never make it into planning. It also drafts customer-safe follow-ups and
  internal escalation packets so teams can resolve risk before QBRs and
  renewals. Over time, the dataset becomes a proprietary map of which spoken
  commitments create churn, expansion, or roadmap drag.
goToMarketSeed:
  firstCustomer: >-
    A Series B+ vertical SaaS company with 50-300 quota carriers, 100+ active
    enterprise accounts, and recurring customer calls where sales or success
    teams promise roadmap items or integration timelines
  buyingTrigger: >-
    A missed renewal, executive escalation, or rollout of Otter-style AI
    meeting notes across go-to-market teams that exposes how many promises are
    trapped in transcripts
  currentAlternative: >-
    Manual note review, CRM hygiene enforcement, Slack follow-up, Gong or call
    keyword search, and ad hoc Jira tickets
  switchingReason: >-
    The first customer switches because this wedge does not ask reps to change
    behavior; it mines existing calls and instantly shows which commitments are
    unowned, overdue, or commercially risky.
  pricingHypothesis: >-
    Annual SaaS priced on the number of customer-facing meeting hosts plus the
    volume of active commitments monitored, starting with a platform fee for the
    first 100 monitored accounts
