jobsToBeDone:
  - job: >-
      When enterprise customer calls create roadmap or integration promises,
      help RevOps and Product Ops capture and assign them automatically, so they
      can avoid missed commitments at renewal time.
    currentAlternative: "Manual note review and ad hoc Slack or Jira follow-up"
    successMetric: "Percent of customer commitments with an owner and linked work item within 48 hours"
  - job: >-
      When executives investigate churn or escalation risk, help them see which
      spoken commitments were made and whether they were fulfilled, so they can
      intervene before revenue is lost.
    currentAlternative: "CRM fields, memory, and scattered meeting recordings"
    successMetric: "Reduction in escalations caused by untracked or overdue commitments"
