differentiator: >-
  Most meeting tools stop at search, summaries, or generic action items. This
  product is purpose-built to identify external commitments that create revenue
  risk, attach them to systems of record, and measure whether the organization
  actually followed through. The defensibility comes from a growing
  cross-system graph of promise patterns, fulfillment outcomes, and account
  impact that generic enterprise search vendors will not model deeply.
