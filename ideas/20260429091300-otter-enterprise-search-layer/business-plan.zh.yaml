slug: meeting-commitment-graph
date: '2026-04-29'
executiveSummary: >-
  会议承诺图谱是一层企业工作流软件：把客户通话里说出口的承诺，变成能在 Salesforce、Jira、Notion 和邮件之间持续跟进的执行对象。第一批客户会是美国的 B2B SaaS 公司，规模约 200-1,500 人，有企业销售周期、50-300 名面向客户的销售或客户成功人员，且最近刚铺开 Otter 或 Gong 这类会议记录工具。真正疼的不是搜不到信息，而是通话里答应过的事没有变成下游系统里有人负责的工作，最后拖出流失、升级事件和路线图偏移。滩头市场刻意做窄：盯续约和升级风险的产品运营、营收运营、客户成功运营团队，这些软件公司已经在录通话，也已经在跑 Salesforce 加 Jira。产品只有一条活路：必须足够准确地把口头承诺挂到正确的账户、责任人和工作项上，团队才敢把它塞进现有流程。相邻工具的公开定价说明预算并非不存在，但公司仍得证明，买方会为“减少漏承诺”单独掏平台费，而不会把它当成记笔记软件的附赠功能。研究得出的美国 SAM 约为 $37.0M，并不算大，因此真正的风投级故事必须在第一切口跑通后，把同一张承诺图谱扩到支持升级处理、实施义务，以及更广义的企业承诺跟踪。最可能推翻故事的风险有三类：抽取准确率不够、会议/工作流厂商把能力打包吃掉，以及营收运营、客户成功和产品之间没人愿意真正背修复责任。近期建公司的目标很明确：拿下 3-5 家共创客户，把试点到正式上线的转化率做到 50% 以上，并证明高风险承诺在 48 小时内被指派的比例，能比人工流程明显更高。
problem:
  - 销售、上线和 QBR 通话里答应客户的事情，往往要等到升级事件或续约复盘时，团队才发现它根本没进 Salesforce、Jira 和规划系统。
  - 通用企业搜索和会议笔记能把语境翻出来，但它们不会生成带责任人、截止日期、关联工作项和执行偏差告警的可审计承诺对象。
solution:
  - 接入录制的客户通话，以及 Salesforce、Jira、Notion 和邮件元数据，从中抽取产品、商业和后续跟进承诺，并保留源证据。
  - 把每条承诺做成一个对象，连到账户、owner、due date 和对应 Jira epic 或 CRM 记录上；在续约和升级前，把无人认领、已经逾期或反复失手的承诺先揪出来。
whyWeWin:
  - 这个切口比搜索或会话智能更窄——它只盯和营收风险绑定的外部客户承诺，因此买方、触发点和 ROI 叙事都更锋利。
  - 真正的防守力不会来自转录稿本身，而会来自一张闭环图谱：承诺措辞、owner 模式、履约结果和账户影响会越积越厚。
strategicChoices:
  beachhead: 美国、英语优先的 B2B SaaS 公司，规模 200-1,500 人，技术栈里有 Salesforce 和 Jira，靠企业续约吃饭，而且在录制的客户通话里经常答应路线图或集成事项。
  wedgeRationale: 这一层客户已经具备原始数据、续约节点上的明确财务痛感，以及对跟进负责的运营团队，因此产品可以在不改销售行为、也不用推全公司企业搜索的情况下证明价值。
  sequencingRationale: 先以只读方式接入 Otter / Gong 和 Salesforce / Jira，在一条很窄的续约风险工作流上证明抽取和分派准确率；等试点信任建立、安全顾虑过关后，再补写回自动化、管理层报表和更多连接器；市场进入团队也要等试点转化跑顺之后再扩，而不是提前砸人。
  notYet:
    - 只发生在内部会议里的承诺，例如员工例会或董事会准备
    - 覆盖所有部门的横向企业搜索或聊天工具
    - 在留存、审核和 profiling 控制成熟前，就贸然推进 EU / UK 扩张
    - 在高风险账户里跳过人工复核，直接全自动创建任务
market:
  tam: 基于软件出版商适配度、相邻扩展空间和 $75k 混合 ACV 估算出的美国锚定 TAM，约为 $0.6B
  sam: 在美国 100-999 人软件出版商中的估算 SAM，约为 $37.0M，对应初始 ACV 约 $45k
  som: 按第 3 年大约 45 家可触达客户、每家约 $45k ACV 估算，SOM 约为 $2.0M
  segments:
    - 中型到大型 B2B SaaS 公司里的 RevOps、Product Ops 和 CS Ops 团队
    - 负责升级事件与续约的 CRO、VP Customer Success、VP Product 和 account leadership
  buyingProcess: 首个内部发起人，大概率会是营收运营、产品运营或客户成功运营负责人，但审批一定还会拉上安全、IT 和法务，因为产品会碰录音会议和系统记录层连接器。最可信的首单形态，是先在一批续约高风险账户上跑一个范围明确的试点；等团队信任抽取精度、也看到无人认领承诺明显下降后，再转成年付部署。
product:
  mvp: >-
    MVP 是一层只读的承诺识别系统，接 Otter 或 Gong 录音，再接 Salesforce 和 Jira。它必须能带着证据片段抽取承诺、把承诺解析到账户和责任人、给出置信度分层，并把无人认领或逾期事项推成一个待人工确认的队列。
  sixMonth: 上线正式试点，支持 Salesforce 和 Jira 写回、账户级风险仪表盘，以及用于续约风险和升级复盘的工作流规则。
  twelveMonth: 加上 Notion 和邮件上下文、反复请求聚类、管理层审计轨迹，以及按客户分层、团队和账户等级出具承诺履约基准报告。
  twentyFourMonth: 把同一张图谱扩到实施、支持升级、合作伙伴和采购承诺，并支持从 Otter、Gong、Zoom、Teams 和 Slack 通话源做厂商无关接入。
  keyBets:
    - 只要高风险承诺上的精度够高，买方会接受“人工在环”的复核队列。
    - 在第一切口里，要证明价值，最少只需要 Salesforce 和 Jira 两个下游系统。
    - 相比更宽泛的搜索或辅导场景，续约风险和升级流程能更快跑出 ROI 证据。
gtm:
  wedge: 先卖一套“续约风险承诺审计”，专门扫录制的客户通话；再把这次审计转成一张常开监控的承诺图谱，只盯最关键的账户。
  channels:
    - 创始人主导外呼，直接找已经在用通话录制的 B2B SaaS 公司里的营收运营、产品运营和客户成功运营负责人
    - 借 Salesforce、Jira 和 RevOps 顾问生态里的转介绍与实施伙伴拿线索
    - 通过会议记录工具和营收运营社群做联合销售与生态曝光
  funnelTargets: 线索→合格试点 20-30%；合格试点→付费试点 40-50%；付费试点→年度正式上线 50%+；正式上线→多团队扩张在首年达到 30%+
  pricing: 年度 SaaS 采用平台费模式：先覆盖前 100 个被监控账户，并附带面向客户的会议主持席位；后续按更多被监控账户和更高承诺量扩容。这样把花钱逻辑绑在续约风险面，而不是绑在全员席位上，也更贴合买方的 ROI 算法。
businessModel:
  revenueStreams:
    - 年度平台订阅
    - 面向更多业务单元或账户层级的被监控账户扩容包
    - 面向管理层续约风险和升级分析的高级报表与预测模块
  unitOfValue: 被监控客户账户，附带一定承诺量额度和面向客户的主持席位
  targetGrossMarginPct: 75
  expansionLevers:
    - 先在续约高风险账户上证明 ROI，再加更多账户群组
    - 从 RevOps 扩到 CS Ops、Product Ops 和管理层升级工作流
    - 扩到实施、支持和合作伙伴义务等相邻承诺域
strategyMap:
  northStarMetric: 48 小时内完成 owner 指派并挂上关联工作项的高价值客户承诺占比
  inputMetrics:
    - 高置信度承诺上的试点抽取精度
    - 被人工复核接受的检测承诺占比
    - 从会议结束到承诺对象完成复核的时间
    - 在续约或升级前，至少解决一条风险告警的被监控账户占比
    - 试点转正式上线的转化率
  moatsToBuild:
    - 专为 SaaS 路线图、集成、商业让步和升级承诺调过的承诺分类体系
    - 把转录文本映射到账户、责任人和 Jira 工作项的跨系统实体解析能力
    - 把履约行为和流失、扩张、升级结果连起来的闭环结果数据集
  killCriteria:
    - 9 个月内拿不到 3 家付费共创客户
    - 两轮模型迭代后，高置信度承诺精度仍低于 85%
    - 付费试点转年付正式上线低于 30%
    - 即便已经证明漏承诺带来的 ROI，买方仍拒绝接受高于记笔记工具打包价格的平台费
  mermaid: |
    flowchart LR
      Wedge[续约风险承诺审计] --> MVP[只读承诺图谱 MVP]
      MVP --> Proof[48 小时内完成指派，且无人认领承诺更少]
      Proof --> Expansion[写回自动化与相邻承诺工作流扩张]
investorMemo:
  verdict:
    call: 约见 / 继续深挖
    conviction: 切口很窄、买方痛点也真实，值得继续看；但前提是要尽快证明它真能拿到独立预算，而且抽取结果足够让人信服。
    whyBelieve: 跨工具会议搜索已经把原始数据层验证出来了，而现有厂商看起来还没有把“可审计的承诺到执行系统”这条链打透到营收风险场景。
    whyDoubt: 初始市场单独看不够大，而且会议或工作流上游厂商可能在这家公司真正做出分发之前，就把相邻能力一起打包。
    nextDiligence: 先找 5-10 位目标运营负责人核验，漏掉客户承诺是否真的痛到能动预算；如果 48 小时指派率能明显提高，$45k-$75k 的年付部署是否站得住。
  firstCustomer:
    title: Series B+ B2B SaaS 公司里的 Head of RevOps 或 Product Ops
    profile: 200-1,500 人、50-300 名面向客户的一线销售、技术栈里有 Salesforce 和 Jira、存在企业续约压力，而且销售与客户成功都在持续录制客户通话。
    trigger: 一次流失复盘、一次高层升级，或者一次会议 AI 工具铺开，让团队看到答应过的集成和路线图事项根本没变成有人负责的工作。
    buyer: 营收运营负责人或产品运营副总裁
    initialContract: 如果试点到正式上线指标达标，先在 25-50 个战略账户上做一单 $25k-$40k 的付费试点，再转成覆盖首批 100 个被监控账户的 $45k-$75k 年付部署。
  mustBeTrue:
    - 共创客户必须确认，漏掉客户承诺今天就会带来可量化的流失、升级或路线图偏移成本。
    - 在不要求销售改行为的前提下，高置信度承诺抽取在第一工作流里至少能做到 85% 精度。
    - 对滩头客户来说，Salesforce 加 Jira 已经覆盖了大部分修复工作流。
    - 即便使用者跨部门，RevOps、Product Ops 或 CS Ops 里仍有人能真正背预算和部署。
    - 当 ROI 证据摆出来后，正式客户愿意为平台费额外买单，而不是把它算进现有记笔记或会话智能预算里。
  diligenceQuestions:
    - 到底是哪类复盘事件，让运营团队第一次意识到公司现在真的在漏承诺？
    - CS 和 Product 团队能接受的误报率上限是多少，超过就会不再信？
    - 第一笔预算更可能来自营收工具、生产力 AI，还是客户成功运营预算？
    - 现在的 Salesforce 和 Jira 里，已经有多少结构化字段足以自动验证履约？
    - 如果未来 12 个月内，Otter、Gong、Salesforce 或 Atlassian 自带 commitment object，会发生什么？
  riskHeatmap:
    - risk: 抽取准确率达不到运营团队的信任阈值
      likelihood: High
      impact: High
      leadingIndicator: 前 3 个试点里，高置信度承诺仍有超过 20% 被人工复核拒绝
      mitigation: 先把承诺分类体系收窄，用带证据的置信度分层，再在高风险账户里强制人工复核
    - risk: 上游厂商把这条切口打包带走，或限制数据接入
      likelihood: Medium
      impact: High
      leadingIndicator: 共创客户强烈要求单一录制厂商支持，或路线图新闻已经出现原生承诺跟踪，早于试点转化
      mitigation: 保持录制厂商无关，防守重点放在下游写回和结果图谱，而不是某个录制器自己的体验层
    - risk: 买方 owner 太分散，导致销售难以复制
      likelihood: Medium
      impact: High
      leadingIndicator: 试点卡住，是因为 RevOps 感到痛，但 Product 或 CS 不愿意接修复流程
      mitigation: 第一阶段只围绕续约风险账户卖，并要求每个试点都要有一个高层 sponsor 加一个运营 owner
    - risk: 安全和隐私审查明显拉长销售周期
      likelihood: Medium
      impact: Medium
      leadingIndicator: 安全审查超过 90 天，或试点被 retention 和 connector scope 争议卡住
      mitigation: 先提供最小权限的只读接入、可配置 retention、证据轨迹，并推迟 EU / UK 扩张
operatingAssumptions:
  - assumption: 第一类可复制买方，会是 Head of RevOps、Product Ops 或 CS Ops，而不是直接由 Sales 或 Product 负责人下单。
    basis: research.yaml
    validationTest: 完成 5 次需求发现访谈和 2 个付费试点，且同一职能同时主导问题定义、部署和预算路径。
    decisionImpact: 如果这个判断错了，GTM 话术、定价话语权和必拉入的利益相关方都会变，销售周期也会更长。
  - assumption: 在人工复核配合下，高置信度承诺抽取能在续约风险工作流里做到至少 85% 精度。
    basis: operator judgment
    validationTest: 在 100-200 段通话片段上做盲标研究，比较不同 persona 对接受 / 拒绝承诺的判断。
    decisionImpact: 如果做不到，产品就得把范围再收窄，甚至从自动化软件退回到审计 / 分析工具。
  - assumption: 第一阶段只靠 Salesforce 和 Jira，就足够做出价值证明，不需要一开始就补 Slack、Microsoft 或完整企业搜索广度。
    basis: idea.yaml
    validationTest: 在 3-5 家共创客户里映射修复工作流，确认超过 70% 的责任人识别与工作项解析都发生在这两个系统里。
    decisionImpact: 如果不成立，MVP 范围会膨胀、连接器负担会上升，pre-seed 资金可能撑不住。
  - assumption: 买方愿意接受按被监控账户计费的平台费，而不只是 seat-based pricing。
    basis: research.yaml
    validationTest: 测两套试点报价，若把定价与续约风险 ROI 绑定，客户是否愿意接受高于现有记笔记支出的“按受监控账户计费”模式。
    decisionImpact: 如果不成立，ACV、TAM 和招聘节奏都要下修，公司可能还得转成更重服务的模式。
  - assumption: 在补齐 EU / UK 专用的 profiling 与 retention 控制之前，美国英语环境仍能先顺利成交。
    basis: research.yaml
    validationTest: 在美国本土环境里拿下前 3 家正式客户，而且输单原因不能主要是区域合规缺口。
    decisionImpact: 如果不成立，合规工程就得前置，路线图扩张和 go-to-market 都要再收窄。
experimentRoadmap:
  - horizon: 0-90 天
    experiment: 面向使用 Salesforce、Jira 和会议录制的美国 B2B SaaS 公司，访谈 20 位营收运营、产品运营和客户成功运营负责人。
    hypothesis: 最强的购买触发点，是最近发生过流失、升级事件，或一次会议 AI 工具铺开把漏承诺问题暴露出来。
    successMetric: 至少 10 位受访者能讲出最近一次高成本漏承诺事件，且其中 5 位愿意继续做工作流映射。
    owner: 创始人/CEO
  - horizon: 0-90 天
    experiment: 先给 2-3 家共创客户做一套人工承诺审计服务，直接处理导出的通话录音。
    hypothesis: 只要输出足够账户级、足够可执行，团队会先为续约风险审计买单，再逐步接受全产品自动化。
    successMetric: 拿到 2 单付费审计，且至少 1 单从审计交付转成软件试点。
    owner: 创始人/CEO
  - horizon: 0-90 天
    experiment: 用一套很窄的分类体系，在 100-200 段通话片段上基准测试路线图、集成和后续跟进承诺的抽取精度。
    hypothesis: 把识别范围收窄后，团队对结果的信任会明显高于通用行动项抽取。
    successMetric: 高置信度承诺精度达到 85%+，且关键误报低于 10%。
    owner: 创始工程师
  - horizon: 90-180 天
    experiment: 面向每家 25-50 个被监控账户，启动只读试点，把 Otter 或 Gong 接到 Salesforce 和 Jira。
    hypothesis: 在不要求销售改行为的前提下，被监控账户工作流能显著提高 48 小时内完成指派的比例。
    successMetric: 每个试点的指派率都至少比基线提升 50%，且每类客户职能都有 3 位活跃周使用者。
    owner: 创始工程师
  - horizon: 90-180 天
    experiment: 测两套价格——按账户的平台费 vs. 主持席位加超额计费。
    hypothesis: 按受监控账户计价更贴合买方 ROI，也能支撑更高 ACV。
    successMetric: 3 个付费试点里至少有 2 个在年化合同价值不低的前提下，选择按账户定价。
    owner: 创始人/CEO
  - horizon: 180-365 天
    experiment: 加上 Jira 和 Salesforce 写回，并测付费试点转正式上线的转化率。
    hypothesis: 只有把工作流真正插回现有系统，产品才会从“有意思的分析”变成“生产环境软件”。
    successMetric: 付费试点转年付正式上线达到 50%+，且至少有两个团队每周都在用这套工作流。
    owner: 创始工程师
  - horizon: 180-365 天
    experiment: 与 RevOps 顾问或 Salesforce / Jira 实施公司建立 3 个渠道相邻合作。
    hypothesis: 服务伙伴能帮助复杂账户更快建立信任，也能更快搞清集成边界。
    successMetric: 签下 3 家转介绍或实施伙伴，并从中拿到 2 个试点机会。
    owner: 创始人/CEO
operations:
  - 最小权限的连接器架构：默认只读，写回有范围控制，保留期限由客户可配置
  - 所有高风险自动化前，先进入人工复核队列，并保留审计日志
  - 每个客户都能共管承诺类型、责任人规则和账户分层的分类体系
  - 一套覆盖 DPA、转录保留、连接器范围和证据轨迹的安全审查手册
  - 以每周试点复盘和季度 ROI 复盘为核心的客户成功节奏
team:
  - role: 创始工程师
    startTiming: 第 0 个月
    rationale: 在扩大 GTM 之前，先把数据接入、实体解析、复核队列和写回底座做出来。
  - role: 创始人/CEO
    startTiming: 第 0 个月
    rationale: 这个问题跨部门、强 ROI、还需要做品类教育，所以前期必须由创始人亲自打单。
  - role: 应用 AI 工程师
    startTiming: 第 3 个月
    rationale: 抽取精度和分类体系调优是头号产品风险，必须尽早有专人盯。
  - role: 偏产品的解决方案工程师
    startTiming: 第 6 个月
    rationale: 早期部署成败取决于连接器配置、工作流映射，以及和共创客户一起把信任建起来。
  - role: 安全与平台工程师
    startTiming: 第 9 个月
    rationale: 一旦前几个试点转正，真正的瓶颈就会变成采购摩擦和连接器稳定性。
  - role: 客户经理 / 运营型销售
    startTiming: 第 12 个月
    rationale: 只有当试点包装、定价和转化证据都跑顺以后，才值得补专职销售。
milestones:
  - horizon: 0-12 个月
    items:
      - 在美国 SaaS 滩头市场签下 3-5 家付费共创客户
      - 在初始分类体系上把高置信度承诺精度做到 85%+
      - 发布只读版 MVP：Otter 或 Gong + Salesforce + Jira，并带证据轨迹
      - 至少把 2 个付费试点转成年付正式部署
  - horizon: 12-24 个月
    items:
      - 从续约风险账户扩到更广的 CS 和 Product 工作流
      - 加入 Notion、邮件和更多录制器支持，并支持审批后写回
      - 发布跨客户的履约率与漏承诺模式基准报告
      - 形成可复制的伙伴带单管道，覆盖营收运营顾问与实施伙伴
  - horizon: 24-36 个月
    items:
      - 把图谱扩到实施、支持升级和合作伙伴承诺
      - 支持多业务单元的大型部署，并补上策略控制与审计汇报
      - 在续约之外至少两个相邻承诺域里，证明扩张收入成立
risks:
  - risk: 抽取准确率太低，团队不敢信任自动创建承诺
    likelihood: High
    impact: High
    mitigation: 先把 taxonomy 做窄、让人工在环，并按承诺类型持续衡量接受率，再决定是否扩大自动化。
  - risk: 会议厂商、CRM 套件或工作流巨头把这条切口一并打包
    likelihood: Medium
    impact: High
    mitigation: 保持厂商无关，把差异化押在闭环结果数据和可审计性上，并深度接入下游修复工作流。
  - risk: 跨部门责任不清，导致成交和采用都变慢
    likelihood: Medium
    impact: High
    mitigation: 第一阶段围绕续约风险账户卖，要求高层赞助人、运营责任人和承诺复核 SLA 都写清楚。
  - risk: 安全、隐私和 profiling 顾虑拉长实施周期
    likelihood: Medium
    impact: Medium
    mitigation: 先只做美国市场，默认只读，提供可配置 retention，并在更广区域扩张前补齐证据轨迹。
fundingAsk:
  stage: pre-seed
  targetFundingRangeUsd: $2-3M
  runwayMonths: 18
  useOfFundsSummary: 这 18 个月的资金将覆盖两位创始人和早期应用 AI、解决方案、安全岗位；交付核心连接器与承诺图谱产品；跑出 3-5 家付费共创客户和 2+ 个正式转化；并把安全、合规和伙伴动作搭到足以支撑下一轮 seed。