slug: home-services-safety-rail
date: "2026-04-26"
currency: USD
modelStartMonth: "2026-05"
assumptions:
  - id: A1
    name: "模型起始月份"
    value: "2026-05"
    unit: "月份"
    source: "[BP 日期] 模型从商业计划日期后的第一个完整月份开始。"
  - id: A2
    name: "拿到首个付费试点的时间"
    value: "4 个月拿到付费试点，首笔收入记在 M5"
    unit: "时点"
    source: "[BP operatingAssumptions + milestones] 商业计划目标是首个正式部署在 8 周内完成，但模型更保守，按 4 个月完成成交加实施。"
  - id: A3
    name: "每个试点客户的月收入"
    value: "4.0"
    unit: "USDK / 月"
    source: "[BP investorMemo.initialContract + pricing] 按低五位数美元年化试点费加按单收费测算，折合每月约 $4K。"
  - id: A4
    name: "每个正式生产客户的初始月收入"
    value: "9.0"
    unit: "USDK / 月"
    source: "[BP pricing + businessModel] 正式生产定价由固定平台费和按完单收费共同构成。"
  - id: A5
    name: "客户扩到多集群后的月收入"
    value: "15.0"
    unit: "USDK / 月"
    source: "[BP gtm + research SOM heuristic] 成熟客户会扩到多个集群，受保护访问量也会提高，从而抬升综合月收入。"
  - id: A6
    name: "客户数爬坡"
    value: "Y1 期末 1 家，Y2 期末 3 家，Y3 期末 8 家"
    unit: "客户数"
    source: "[BP milestones + Research SOM] 这一节奏与第 1 年 1 个设计伙伴、12–24 个月 2–3 个客户，以及第 3 年可信但未打满 SOM 的爬坡一致。"
  - id: A7
    name: "毛利率爬坡"
    value: "Y1 为 67%，到 Q4Y3 升至 73%"
    unit: "百分比"
    source: "[BP businessModel.targetGrossMarginPct] 围绕 70% 目标建模，前期受实施拖累，后期靠规模改善。"
  - id: A8
    name: "月度客户流失率"
    value: "2.5%"
    unit: "百分比"
    source: "[创业财务经验值：早期企业 SaaS 且客户集中] 这一保守假设反映了买家集中和工作流替换风险。"
  - id: A9
    name: "转化与扩张门槛"
    value: "试点转正式生产 60%，90 天内扩到第二集群 70%"
    unit: "漏斗"
    source: "[BP gtm.funnelTargets]"
  - id: A10
    name: "创始人/CEO 年度全包薪酬"
    value: "55.2"
    unit: "USDK / 年"
    source: "[创业财务经验值：印度种子期 SaaS 全包薪酬] 假设创始人现金工资较克制，并叠加 15% 的用工负担。"
  - id: A11
    name: "工程师或数据工程师年度全包薪酬"
    value: "82.8"
    unit: "USDK / 年"
    source: "[创业财务经验值：印度种子期 SaaS 全包薪酬] 用于创始工程、数据/风控工程师，以及后续工程招聘。"
  - id: A12
    name: "产品负责人或 AE 年度全包薪酬"
    value: "69.0"
    unit: "USDK / 年"
    source: "[创业财务经验值：印度种子期 SaaS 全包薪酬] 用于创始产品/信任岗位、后续 PM，以及带销售指标的 AE。"
  - id: A13
    name: "客户成功或后台运营年度全包薪酬"
    value: "41.4"
    unit: "USDK / 年"
    source: "[创业财务经验值：印度种子期 SaaS 全包薪酬] 用于信任分析师/客户成功和后台运营。"
  - id: A14
    name: "非薪酬运营开支爬坡"
    value: "Y1 Q1 每月 16K，到 Q4Y3 约 35K / 月"
    unit: "USDK / 月"
    source: "[创业财务经验值：企业基础设施 + 隐私 + 差旅] 覆盖云成本、安全、合规、法务、保险和创始人主导销售。"
  - id: A15
    name: "现金转换假设"
    value: "EBITDA 近似等于经营现金流"
    unit: "政策"
    source: "[建模经验] 这一阶段假设资本开支、债务和营运资金波动都不重要，且模型不引入债务融资。"
  - id: A16
    name: "融资轮规模逻辑"
    value: "24 个月跑道"
    unit: "跑道月数"
    source: "[BP fundingAsk.runwayMonths + model requirement] 商业计划目标是 18 个月，模型再额外加上要求的 6 个月缓冲。"
  - id: A17
    name: "下一轮里程碑"
    value: "3 个正式生产客户、部署周期低于 8 周、以及 1 个相邻品类试点"
    unit: "里程碑"
    source: "[BP milestones 12-24 months + investorMemo.nextDiligence]"
  - id: A18
    name: "稳态 CAC"
    value: "44.0"
    unit: "USDK / 客户"
    source: "[模型输出：Y3 销售与市场费用 ÷ 5 个净新增客户] 用于单位经济模型，比试点前那段更不失真。"
  - id: A19
    name: "成熟期综合年 ARPU"
    value: "154.0"
    unit: "USDK / 客户 / 年"
    source: "[模型输出：Q4Y3 年化收入 ÷ 8 个期末客户] 反映固定平台费和按单扩张收入的叠加。"
