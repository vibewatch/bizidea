slug: home-services-safety-rail
date: "2026-04-26"
currency: USD
modelStartMonth: "2026-05"
assumptions:
  - id: A1
    name: 模型起始月份
    value: "2026-05"
    unit: month
    source: "[BP date] 模型从计划日期后第一个完整月份开始。"
  - id: A2
    name: 首个付费试点时间
    value: "4 months to paid pilot, with first bill in M5"
    unit: timing
    source: "[BP operatingAssumptions + milestones] 首次生产部署目标 8 周内完成，但付费试点签约加实施保守建模为四个月。"
  - id: A3
    name: 付费试点每客户月收入
    value: "4.0"
    unit: USDK per month
    source: "[BP investorMemo.initialContract + pricing] 折合低五位数美元年度等值试点费加按单计费，建模约为每月 $4K。"
  - id: A4
    name: 初始生产每客户月收入
    value: "9.0"
    unit: USDK per month
    source: "[BP pricing + businessModel] 生产定价结合固定平台费和按完成单计费，试点转化后生效。"
  - id: A5
    name: 多片区扩展每客户月收入
    value: "15.0"
    unit: USDK per month
    source: "[BP gtm + research SOM heuristic] 成熟客户扩展至多片区、受保护上门量提升，拉高混合月收入。"
  - id: A6
    name: 客户数量增长节奏
    value: "Y1 exit 1, Y2 exit 3, Y3 exit 8"
    unit: customers
    source: "[BP milestones + Research SOM] 与第 1 年一个共创客户、12–24 个月 2–3 家客户、第 3 年可信但非满 SOM 的爬坡一致。"
  - id: A7
    name: 毛利率增长节奏
    value: "Y1 为 67%，到 Q4Y3 提升至 73%"
    unit: percent
    source: "[BP businessModel.targetGrossMarginPct] 围绕 70% 目标建模，早期有集成拖累，后期随规模释放。"
  - id: A8
    name: 月度客户流失率
    value: "2.5%"
    unit: percent
    source: "[Startup finance heuristic: early enterprise SaaS with customer concentration] 保守留存假设，反映买家集中度和工作流风险。"
  - id: A9
    name: 转化与扩展门槛
    value: "试点转正式客户 60%，90 天内完成第二个片区扩展 70%"
    unit: funnel
    source: "[BP gtm.funnelTargets]"
  - id: A10
    name: 创始人/CEO 含税年薪
    value: "55.2"
    unit: USDK per year
    source: "[Startup finance heuristic: India seed SaaS loaded comp] 假设适度的创始人现金薪资加 15% 社保负担。"
  - id: A11
    name: 工程师或数据工程师含税年薪
    value: "82.8"
    unit: USDK per year
    source: "[Startup finance heuristic: India seed SaaS loaded comp] 用于创始工程师、数据/风险工程师及后续工程招聘。"
  - id: A12
    name: 产品负责人或 AE 含税年薪
    value: "69.0"
    unit: USDK per year
    source: "[Startup finance heuristic: India seed SaaS loaded comp] 用于创始产品/信任岗、新增 PM 和带指标 AE。"
  - id: A13
    name: 客户成功或综合运营含税年薪
    value: "41.4"
    unit: USDK per year
    source: "[Startup finance heuristic: India seed SaaS loaded comp] 用于信任分析师/客户成功和后台运营。"
  - id: A14
    name: 非人力运营支出增长节奏
    value: "Q1Y1 每月 16K，到 Q4Y3 约为每月 35K"
    unit: USDK per month
    source: "[Startup finance heuristic: enterprise infrastructure + privacy + travel] 覆盖云服务、安全、合规、法务、保险和创始人主导销售。"
  - id: A15
    name: 现金转化假设
    value: "EBITDA 近似等于经营现金流"
    unit: policy
    source: "[Modeling heuristic] 资本支出、债务和营运资金波动在此阶段假设可忽略，模型不涉及债务融资。"
  - id: A16
    name: 融资规模逻辑
    value: "24 个月现金跑道"
    unit: runway months
    source: "[BP fundingAsk.runwayMonths + model requirement] BP 目标 18 个月，模型额外加入 6 个月缓冲。"
  - id: A17
    name: 下轮融资里程碑
    value: "3 家正式客户、少于 8 周的部署周期，以及 1 个相邻品类试点"
    unit: milestone
    source: "[BP milestones 12-24 months + investorMemo.nextDiligence]"
  - id: A18
    name: 稳态 CAC
    value: "44.0"
    unit: USDK per customer
    source: "[Model output from Y3 S&M spend divided by five net new logos] 用于单位经济模型，而非噪音较大的试点前期。"
  - id: A19
    name: 成熟混合年度 ARPU
    value: "154.0"
    unit: USDK per customer per year
    source: "[Model output from Q4Y3 annualized revenue divided by eight EOP customers] 反映固定平台费加按单扩展收入。"
