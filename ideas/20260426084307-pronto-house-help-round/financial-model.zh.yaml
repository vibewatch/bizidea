slug: home-services-safety-rail
date: "2026-04-26"
currency: USD
modelStartMonth: "2026-05"
assumptions:
  - id: A1
    name: 模型起始月份
    value: "2026-05"
    unit: month
    source: "[BP date] 模型从计划日期后的第一个完整月份开始。"
  - id: A2
    name: 到首个付费试点的时间
    value: "4 months to paid pilot, with first bill in M5"
    unit: timing
    source: "[BP operatingAssumptions + milestones] 首次生产部署目标是在 8 周内完成，但模型保守地把付费试点成交加实施周期设为 4 个月。"
  - id: A3
    name: 每位客户在付费试点期的月收入
    value: "4.0"
    unit: USDK per month
    source: "[BP investorMemo.initialContract + pricing] 低五位数美元等值的年化试点合同，加按单收费，折算为约每月 $4K。"
  - id: A4
    name: 初始生产阶段每位客户的月收入
    value: "9.0"
    unit: USDK per month
    source: "[BP pricing + businessModel] 生产阶段定价由固定平台费与按完单收费共同组成。"
  - id: A5
    name: 多集群扩张后每位客户的月收入
    value: "15.0"
    unit: USDK per month
    source: "[BP gtm + research SOM heuristic] 成熟客户会扩到多个集群，受保护访问量也随之上升，拉高综合月收入。"
  - id: A6
    name: 客户数量爬坡
    value: "Y1 exit 1, Y2 exit 3, Y3 exit 8"
    unit: customers
    source: "[BP milestones + Research SOM] 这一路径与第 1 年 1 个 design partner、第 2 年 2–3 个客户，以及第 3 年 8 个付费客户的可信爬坡相符。"
  - id: A7
    name: 毛利率爬坡
    value: "67% in Y1 to 73% by Q4Y3"
    unit: percent
    source: "[BP businessModel.targetGrossMarginPct] 以 70% 目标毛利率为锚，前期考虑实施拖累，后期体现规模效应。"
  - id: A8
    name: 月度 logo 流失率
    value: "2.5%"
    unit: percent
    source: "[Startup finance heuristic: early enterprise SaaS with customer concentration] 考虑到买方集中和工作流替换风险，采用较保守的留存假设。"
  - id: A9
    name: 转化与扩张门槛
    value: "Pilot to production 60%, second cluster expansion within 90 days 70%"
    unit: funnel
    source: "[BP gtm.funnelTargets]"
  - id: A10
    name: Founder CEO 全负担年薪
    value: "55.2"
    unit: USDK per year
    source: "[Startup finance heuristic: India seed SaaS loaded comp] 假设创始人现金薪酬较克制，并加上 15% 的薪酬负担。"
  - id: A11
    name: 工程师或数据工程师全负担年薪
    value: "82.8"
    unit: USDK per year
    source: "[Startup finance heuristic: India seed SaaS loaded comp] 适用于创始工程师、数据/风险工程师以及后续工程岗位。"
  - id: A12
    name: 产品负责人或 AE 全负担年薪
    value: "69.0"
    unit: USDK per year
    source: "[Startup finance heuristic: India seed SaaS loaded comp] 适用于创始产品/信任岗位、后续 PM 与带销售指标的 AE。"
  - id: A13
    name: 客户成功或 G&A 运营全负担年薪
    value: "41.4"
    unit: USDK per year
    source: "[Startup finance heuristic: India seed SaaS loaded comp] 适用于信任分析师 / 客户成功和后台运营岗位。"
  - id: A14
    name: 非薪酬运营支出爬坡
    value: "16K per month in Q1Y1 to roughly 35K per month by Q4Y3"
    unit: USDK per month
    source: "[Startup finance heuristic: enterprise infrastructure + privacy + travel] 覆盖云、信息安全、合规、法务、保险和创始人主导销售的差旅成本。"
  - id: A15
    name: 现金转换假设
    value: "EBITDA approximates operating cash flow"
    unit: policy
    source: "[Modeling heuristic] 假设这一阶段资本开支、负债和营运资金波动都不显著，且不考虑债务融资。"
  - id: A16
    name: 融资规模逻辑
    value: "24 months of runway"
    unit: runway months
    source: "[BP fundingAsk.runwayMonths + model requirement] 商业计划目标是 18 个月，模型再加上 6 个月缓冲。"
  - id: A17
    name: 下一轮融资里程碑
    value: "3 production customers, sub-8-week deployment, and 1 adjacent-category pilot"
    unit: milestone
    source: "[BP milestones 12-24 months + investorMemo.nextDiligence]"
  - id: A18
    name: 稳态 CAC
    value: "44.0"
    unit: USDK per customer
    source: "[Model output from Y3 S&M spend divided by five net new logos] 这里用第 3 年销售与营销开支除以净新增客户数，避免前试点阶段噪音过大。"
  - id: A19
    name: 成熟阶段综合年 ARPU
    value: "154.0"
    unit: USDK per customer per year
    source: "[Model output from Q4Y3 annualized revenue divided by eight EOP customers] 反映固定平台费与按单扩张共同作用后的成熟收入。"
