scenarios:
  downside:
    description: "前两个试点中有一个未能转为正式商用，销售周期延后两个季度，且客户扩张速度更慢。"
    y3RevenueK: 620.0
    y3EbitdaK: -770.0
    cashLowPointK: 140.0
    keyAssumptionChanges:
      - "试点转正式商用的转化率从 60% 降至 45%。"
      - "综合 ARPU 比基准低 15%。"
      - "月度流失率从 2.5% 升至 3.5%。"
  base:
    description: "主情景为第 1 年转化 1 个设计合作伙伴，第 2 年底达到 3 个正式商用客户，并在第 3 年末拥有 8 个付费客户。"
    y3RevenueK: 938.0
    y3EbitdaK: -494.0
    cashLowPointK: 593.5
    keyAssumptionChanges:
      - "首个付费试点在 M5 开始，并于 M9 转为正式商用。"
      - "客户增长路径为 Y1 末 1 个 logo、Y2 末 3 个 logo、Y3 末 8 个 logo。"
      - "毛利率从 Y1 的 67% 提升至 Q4Y3 的 73%。"
  upside:
    description: "首个客户扩张更快，第二个渠道合作伙伴奏效，且部署始终保持标准化。"
    y3RevenueK: 1290.0
    y3EbitdaK: -180.0
    cashLowPointK: 820.0
    keyAssumptionChanges:
      - "第二和第三个客户比基准提前一个季度落地。"
      - "扩张客户的月收入从 15K 提升至 18K。"
      - "毛利率在 Q4Y3 达到 75%，月度流失率降至 1.5%。"
sensitivity:
  - variable: ARPU
    downsideCase: "由于单次作业量更低，每客户综合收入下降 10%"
    baseCase: "Q4Y3 年化 ARPU 为 $154K"
    upsideCase: "由于集群扩张更快，每客户综合收入上升 10%"
    y3RevenueImpactK: -141.0
    cashImpactK: -102.0
  - variable: CAC
    downsideCase: "由于试点需要更多创始人和 AE 时间，CAC 升至 $60K"
    baseCase: "稳态 CAC 为 $44K"
    upsideCase: "通过转介绍和可复制案例研究，CAC 降至 $35K"
    y3RevenueImpactK: 0.0
    cashImpactK: -120.0
  - variable: churn
    downsideCase: "月度 logo 流失率升至 3.5%"
    baseCase: "月度 logo 流失率为 2.5%"
    upsideCase: "月度 logo 流失率降至 1.5%"
    y3RevenueImpactK: -96.0
    cashImpactK: -128.0
  - variable: 销售周期
    downsideCase: "新 logo 的签约时间比计划晚两个季度"
    baseCase: "由创始人主导的企业销售周期为 4-6 个月"
    upsideCase: "可引用案例将成交时间缩短一个季度"
    y3RevenueImpactK: -118.0
    cashImpactK: -147.0
  - variable: 毛利率
    downsideCase: "由于支持仍以人工为主，毛利率停留在 68%"
    baseCase: "稳态毛利率为 72%"
    upsideCase: "通过更干净的集成，毛利率达到 75%"
    y3RevenueImpactK: 0.0
    cashImpactK: -75.0
  - variable: 招聘节奏
    downsideCase: "1 名工程和 1 名 GTM 招聘延后两个季度"
    baseCase: "团队在 Q4Y3 扩展到 12 FTE"
    upsideCase: "招聘按计划推进，产能得到充分利用"
    y3RevenueImpactK: -85.0
    cashImpactK: 62.0
modelDiagram:
  title: 单元经济性流程
  mermaid: |
    flowchart LR
      Leads --> PaidPilots
      PaidPilots --> ProductionCustomers
      ProductionCustomers --> PlatformFees
      ProductionCustomers --> PerJobFees
      PlatformFees --> Revenue
      PerJobFees --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> EBITDA
      EBITDA --> Cash
modelSanity:
  - checkName: 收入引擎
    finding: "基准情景收入来自 1 个设计合作伙伴在 Y1 完成转化、现有客户跨集群扩张，以及在 Y3 末拥有 8 个付费客户，综合 ARR 约为 $154K。"
  - checkName: 必须顺利发生的事
    finding: "首个部署必须在 8 周内上线，并以接近 BP 所设 60% 的试点转正式商用目标完成转化，这样 GTM 投入才能形成复利，而不是被迫重置。"
  - checkName: 模型失效条件
    finding: "如果销售周期延后两个季度，或流失率升至 3.5%，下行情景现金会降至约 $140K，公司很可能需要更早进行 bridge 轮融资。"
  - checkName: 下一轮融资证明
    finding: "当公司拥有 3 个正式商用客户、可复制的 8 周内部署能力，以及 1 个使用相同核心工作流的相邻品类试点时，seed 轮故事才具备可信度。"
sanityChecks:
  ruleOf40: "Y3 growth 158.4% + EBITDA margin -52.7% = 105.7%"
  burnMultiple: "从 Y2 的 1.3x（$605K burn / $468K net new ARR）改善到 Y3 的 0.8x（$494K burn / $656K net new ARR）。"
  revenuePerFte: "$83K Y3 using 11.25 average FTE（低于 $200-400K 的 SaaS 基准，因为模型假设规模化前部署仍偏集成密集）。"
  flags:
    - "Y3 收入仅略低于 research 中的 SOM，这意味着若没有相邻品类扩张，模型几乎不给执行失误留空间。"
    - "到 Y3 为止，人均收入仍显著低于典型 SaaS 基准，只有在前三个客户之后实施工作大幅标准化时才合理。"
    - "客户集中度仍然很高；前三个 logo 很可能仍占 Y3 收入的大部分。"
    - "毛利率取决于能否将信任运营产品化，而不是演变为高接触的事件服务团队。"
