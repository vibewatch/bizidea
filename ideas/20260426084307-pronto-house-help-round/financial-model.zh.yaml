slug: home-services-safety-rail
date: "2026-04-26"
currency: USD
modelStartMonth: "2026-05"
assumptions:
  - id: A1
    name: 模型起始月份
    value: "2026-05"
    unit: month
    source: "[BP date] 模型从计划日期之后的第一个完整月份开始。"
  - id: A2
    name: 首个付费试点所需时间
    value: "4 months to paid pilot, with first bill in M5"
    unit: timing
    source: "[BP operatingAssumptions + milestones] 虽然首个生产部署目标是在 8 周内完成，但模型保守地将付费试点签约加实施设为四个月。"
  - id: A3
    name: 每位客户的付费试点月收入
    value: "4.0"
    unit: USDK per month
    source: "[BP investorMemo.initialContract + pricing] 低五位数美元的年化试点合同加按单收费，在模型中折算为每月约 $4K。"
  - id: A4
    name: 每位客户的初始正式商用月收入
    value: "9.0"
    unit: USDK per month
    source: "[BP pricing + businessModel] 正式商用定价由固定平台费和按已完成订单收取的费用构成。"
  - id: A5
    name: 多集群扩张后的每位客户月收入
    value: "15.0"
    unit: USDK per month
    source: "[BP gtm + research SOM heuristic] 成熟客户会扩展到多个集群，并带来更高的受保护拜访量，从而提升综合月收入。"
  - id: A6
    name: 客户 logo 增长节奏
    value: "Y1 exit 1, Y2 exit 3, Y3 exit 8"
    unit: customers
    source: "[BP milestones + Research SOM] 这与第 1 年 1 个设计合作伙伴、第 12-24 个月 2-3 个客户，以及第 3 年可信但未吃满 SOM 的增长路径一致。"
  - id: A7
    name: 毛利率爬坡
    value: "67% in Y1 to 73% by Q4Y3"
    unit: percent
    source: "[BP businessModel.targetGrossMarginPct] 模型围绕 70% 的目标毛利率构建，早期考虑实施拖累，后期体现规模效应。"
  - id: A8
    name: 月度 logo 流失率
    value: "2.5%"
    unit: percent
    source: "[Startup finance heuristic: early enterprise SaaS with customer concentration] 保守的留存假设反映了买方集中和工作流风险。"
  - id: A9
    name: 转化与扩张门槛
    value: "Pilot to production 60%, second cluster expansion within 90 days 70%"
    unit: funnel
    source: "[BP gtm.funnelTargets]"
  - id: A10
    name: 创始 CEO 的年总成本薪酬
    value: "55.2"
    unit: USDK per year
    source: "[Startup finance heuristic: India seed SaaS loaded comp] 假设创始人现金薪酬较克制，并叠加 15% 的雇佣附加成本。"
  - id: A11
    name: 工程师或数据工程师的年总成本薪酬
    value: "82.8"
    unit: USDK per year
    source: "[Startup finance heuristic: India seed SaaS loaded comp] 用于创始工程、数据/风险工程以及后续工程招聘。"
  - id: A12
    name: 产品负责人或 AE 的年总成本薪酬
    value: "69.0"
    unit: USDK per year
    source: "[Startup finance heuristic: India seed SaaS loaded comp] 用于创始产品/信任岗位、后续 PM 和承担配额的 AE。"
  - id: A13
    name: 客户成功或 G&A 运营的年总成本薪酬
    value: "41.4"
    unit: USDK per year
    source: "[Startup finance heuristic: India seed SaaS loaded comp] 用于信任分析师/客户成功和后台运营。"
  - id: A14
    name: 非薪酬运营支出爬坡
    value: "16K per month in Q1Y1 to roughly 35K per month by Q4Y3"
    unit: USDK per month
    source: "[Startup finance heuristic: enterprise infrastructure + privacy + travel] 覆盖云成本、安全、合规、法务、保险以及创始人主导销售。"
  - id: A15
    name: 现金转换假设
    value: "EBITDA approximates operating cash flow"
    unit: policy
    source: "[Modeling heuristic] 假设此阶段资本开支、债务和营运资金波动影响不大，且未建模债务融资。"
  - id: A16
    name: 融资轮规模逻辑
    value: "24 months of runway"
    unit: runway months
    source: "[BP fundingAsk.runwayMonths + model requirement] BP 目标为 18 个月，而模型额外加入所要求的 6 个月缓冲。"
  - id: A17
    name: 下一轮融资里程碑
    value: "3 production customers, sub-8-week deployment, and 1 adjacent-category pilot"
    unit: milestone
    source: "[BP milestones 12-24 months + investorMemo.nextDiligence]"
  - id: A18
    name: 稳态 CAC
    value: "44.0"
    unit: USDK per customer
    source: "[Model output from Y3 S&M spend divided by five net new logos] 作为单元经济性口径使用，而不是噪音更大的试点前阶段。"
  - id: A19
    name: 成熟期综合年度 ARPU
    value: "154.0"
    unit: USDK per customer per year
    source: "[Model output from Q4Y3 annualized revenue divided by eight EOP customers] 反映固定平台费与按单扩张收入的组合。"
