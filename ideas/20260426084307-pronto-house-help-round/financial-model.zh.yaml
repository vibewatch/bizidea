scenarios:
  downside:
    description: "前两个试点里有一个没能转正，销售周期又拖了两个季度，客户扩张速度也更慢。"
    y3RevenueK: 620.0
    y3EbitdaK: -770.0
    cashLowPointK: 140.0
    keyAssumptionChanges:
      - "试点转生产转化率从 60% 降到 45%。"
      - "综合 ARPU 比基线低 15%。"
      - "月度 churn 从 2.5% 升到 3.5%。"
  base:
    description: "主场景下，第 1 年 1 个 design partner 成功转正，第 2 年底达到 3 个生产客户，第 3 年末达到 8 个付费客户。"
    y3RevenueK: 938.0
    y3EbitdaK: -494.0
    cashLowPointK: 593.5
    keyAssumptionChanges:
      - "首个付费试点在 M5 开始，并于 M9 转为生产。"
      - "客户爬坡路径是 Y1 末 1 个、Y2 末 3 个、Y3 末 8 个。"
      - "毛利率从 Y1 的 67% 提升到 Q4Y3 的 73%。"
  upside:
    description: "首个客户扩张更快，第二个渠道合作也跑通，而且部署保持标准化。"
    y3RevenueK: 1290.0
    y3EbitdaK: -180.0
    cashLowPointK: 820.0
    keyAssumptionChanges:
      - "第 2 和第 3 个客户比基线提前一个季度成交。"
      - "扩张后客户月收入从 15K 升到 18K。"
      - "毛利率在 Q4Y3 达到 75%，月度 churn 降到 1.5%。"
sensitivity:
  - variable: ARPU
    downsideCase: "综合单客户收入下降 10%，原因是按单量偏低"
    baseCase: "Q4Y3 年化 ARPU 为 $154K"
    upsideCase: "综合单客户收入提升 10%，原因是集群扩张更快"
    y3RevenueImpactK: -141.0
    cashImpactK: -102.0
  - variable: CAC
    downsideCase: "CAC 升到 $60K，因为试点需要更多创始人与 AE 时间"
    baseCase: "稳态 CAC 为 $44K"
    upsideCase: "依靠转介绍和可复用案例，CAC 降到 $35K"
    y3RevenueImpactK: 0.0
    cashImpactK: -120.0
  - variable: churn
    downsideCase: "月度 logo 流失率升到 3.5%"
    baseCase: "月度 logo 流失率为 2.5%"
    upsideCase: "月度 logo 流失率降到 1.5%"
    y3RevenueImpactK: -96.0
    cashImpactK: -128.0
  - variable: sales cycle
    downsideCase: "新客户成交时间比计划晚两个季度"
    baseCase: "4-6 个月的创始人主导式企业销售周期"
    upsideCase: "参考案例缩短一个季度成交"
    y3RevenueImpactK: -118.0
    cashImpactK: -147.0
  - variable: gross margin
    downsideCase: "由于支持仍较人工化，毛利率停在 68%"
    baseCase: "稳态毛利率 72%"
    upsideCase: "借助更干净的集成，毛利率达到 75%"
    y3RevenueImpactK: 0.0
    cashImpactK: -75.0
  - variable: hiring pace
    downsideCase: "一名工程和一名 GTM 招聘都比计划晚两个季度"
    baseCase: "团队按计划扩到 Q4Y3 的 12 名 FTE"
    upsideCase: "招聘按计划进行且产能被充分利用"
    y3RevenueImpactK: -85.0
    cashImpactK: 62.0
modelDiagram:
  title: 单位经济流转
  mermaid: |
    flowchart LR
      Leads --> PaidPilots
      PaidPilots --> ProductionCustomers
      ProductionCustomers --> PlatformFees
      ProductionCustomers --> PerJobFees
      PlatformFees --> Revenue
      PerJobFees --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> EBITDA
      EBITDA --> Cash
modelSanity:
  - checkName: 收入引擎
    finding: "基线收入来自第 1 年一个 design partner 成功转正、老客户跨集群扩张，以及到第 3 年末达到 8 个付费客户，综合 ARR 约为每客户 $154K。"
  - checkName: 必须跑对的环节
    finding: "首个部署必须在 8 周内上线，并大致达到商业计划里 60% 的试点转生产目标，否则 GTM 投入就无法复利，只会不断重置。"
  - checkName: 模型会在哪些情况下失效
    finding: "如果销售周期延长两个季度，或 churn 升到 3.5%，下行情景的现金最低点会逼近 $140K，公司大概率需要更早桥接融资。"
  - checkName: 下一轮融资证明点
    finding: "当公司拥有 3 个生产客户、可重复的 8 周内部署能力，以及 1 个相邻品类试点时，seed 轮故事才算站得住。"
sanityChecks:
  ruleOf40: "Y3 growth 158.4% + EBITDA margin -52.7% = 105.7%"
  burnMultiple: "Improves from 1.3x in Y2 ($605K burn / $468K net new ARR) to 0.8x in Y3 ($494K burn / $656K net new ARR)."
  revenuePerFte: "$83K Y3 using 11.25 average FTE (below the $200-400K SaaS benchmark because the model assumes integration-heavy pre-scale deployments)."
  flags:
    - "Y3 收入只比 research 中的 SOM 略低，因此若没有相邻品类扩张，模型几乎不给执行失误留下余地。"
    - "到 Y3 为止，Revenue per FTE 仍明显低于典型 SaaS 水平；只有当前三个客户后的实施工作被明显标准化，这一点才说得过去。"
    - "客户集中度依然偏高；前三大客户很可能仍占据 Y3 的大部分收入。"
    - "毛利率能否成立，取决于信任运营是否能产品化，而不是演变成高触达事故处理服务。"