scenarios:
  downside:
    description: "前两个试点中有一个未能转化，销售周期推迟两个季度，客户扩展速度偏慢。"
    y3RevenueK: 620.0
    y3EbitdaK: -770.0
    cashLowPointK: 140.0
    keyAssumptionChanges:
      - "试点转生产转化率从 60% 降至 45%。"
      - "混合 ARPU 低于基准 15%。"
      - "月度流失率从 2.5% 升至 3.5%。"
  base:
    description: "基准情景：第 1 年转化一个共创客户，第 2 年末达到 3 家生产客户，第 3 年末以 8 家付费客户收尾。"
    y3RevenueK: 938.0
    y3EbitdaK: -494.0
    cashLowPointK: 593.5
    keyAssumptionChanges:
      - "首个付费试点在 M5 启动，M9 转为生产。"
      - "客户增长：Y1 末 1 家，Y2 末 3 家，Y3 末 8 家。"
      - "毛利率从 Y1 的 67% 提升至 Q4Y3 的 73%。"
  upside:
    description: "首个客户扩展更快、第二个渠道合作有效运转、部署保持标准化。"
    y3RevenueK: 1290.0
    y3EbitdaK: -180.0
    cashLowPointK: 820.0
    keyAssumptionChanges:
      - "第二、三家客户比基准提前一个季度落地。"
      - "扩展客户月收入从 $15K 提升至 $18K。"
      - "毛利率 Q4Y3 达到 75%，月度流失率降至 1.5%。"
sensitivity:
  - variable: ARPU
    downsideCase: "每客户混合收入因按单量减少下降 10%"
    baseCase: "Q4Y3 年化 ARPU $154K"
    upsideCase: "片区扩展加速使每客户混合收入提升 10%"
    y3RevenueImpactK: -141.0
    cashImpactK: -102.0
  - variable: CAC
    downsideCase: "试点需要更多创始人和 AE 时间，CAC 升至 $60K"
    baseCase: "稳态 CAC $44K"
    upsideCase: "转介和可复制案例研究使 CAC 降至 $35K"
    y3RevenueImpactK: 0.0
    cashImpactK: -120.0
  - variable: churn
    downsideCase: "月度客户流失率升至 3.5%"
    baseCase: "月度客户流失率 2.5%"
    upsideCase: "月度客户流失率降至 1.5%"
    y3RevenueImpactK: -96.0
    cashImpactK: -128.0
  - variable: sales cycle
    downsideCase: "新客户关单比计划晚两个季度"
    baseCase: "4–6 个月创始人主导企业销售周期"
    upsideCase: "可引用案例将关单时间缩短一个季度"
    y3RevenueImpactK: -118.0
    cashImpactK: -147.0
  - variable: gross margin
    downsideCase: "支持环节仍依赖人工，毛利率停滞在 68%"
    baseCase: "稳态毛利率 72%"
    upsideCase: "集成更简洁，毛利率达到 75%"
    y3RevenueImpactK: 0.0
    cashImpactK: -75.0
  - variable: hiring pace
    downsideCase: "一名工程和一名 GTM 招聘推迟两个季度"
    baseCase: "团队 Q4Y3 扩展至 12 FTE"
    upsideCase: "招聘如期，产能充分利用"
    y3RevenueImpactK: -85.0
    cashImpactK: 62.0
modelDiagram:
  title: 单位经济模型流程
  mermaid: |
    flowchart LR
      Xiansuo[线索] --> FufeiShidian[付费试点]
      FufeiShidian --> ZhengshiKehu[正式客户]
      ZhengshiKehu --> PingtaiDingyuefei[平台订阅费]
      ZhengshiKehu --> MeidanFuwufei[每单服务费]
      PingtaiDingyuefei --> Shouru[收入]
      MeidanFuwufei --> Shouru
      Shouru --> Maoli[毛利]
      Maoli --> XishuiQianlirun[息税折旧摊销前利润]
      XishuiQianlirun --> Xianjin[现金]
modelSanity:
  - checkName: 收入引擎
    finding: "基准情景收入来自第 1 年一个共创客户转化、现有客户跨片区扩展，以及第 3 年末 8 家付费客户贡献约 $154K 混合 ARR。"
  - checkName: 必须成立的前提
    finding: "首个部署须在 8 周内上线，并达到 BP 约 60% 的试点转生产目标，这样 GTM 支出才能复利叠加而非每次重置。"
  - checkName: 模型崩溃条件
    finding: "若销售周期推迟两个季度或流失率升至 3.5%，下行情景现金跌至约 $140K，公司可能需要提前进行过桥融资。"
  - checkName: 下轮融资证明材料
    finding: "公司有 3 家生产客户、可复制的 8 周内部署，以及一个复用同一核心工作流的相邻品类试点后，种子轮故事才有说服力。"
sanityChecks:
  ruleOf40: "Y3 增长率 158.4% + EBITDA 利润率 -52.7% = 105.7%"
  burnMultiple: "从 Y2 的 1.3x（$605K 亏损 / $468K 净新增 ARR）改善至 Y3 的 0.8x（$494K 亏损 / $656K 净新增 ARR）。"
  revenuePerFte: "Y3 每 FTE 收入 $83K（平均 11.25 FTE），低于 SaaS 基准 $200–400K——因模型假设前三家客户的集成工作量重，属于预扩展阶段，尚可接受。"
  flags:
    - "第 3 年收入略低于研究 SOM，模型几乎没有容错空间，若缺乏相邻品类扩展，执行偏差将直接触底。"
    - "每 FTE 收入在第 3 年前持续低于 SaaS 基准，仅在前三家客户之后集成工作实质性标准化时才成立。"
    - "客户集中度仍高；前三家客户可能占第 3 年收入的大部分。"
    - "毛利率依赖把信任运营产品化，而非配置高触达事故服务层。"
