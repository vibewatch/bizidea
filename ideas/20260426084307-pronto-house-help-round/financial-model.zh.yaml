      amountUsd: 1000000
      percentage: 45.5
    - bucket: GTM
      amountUsd: 550000
      percentage: 25.0
    - bucket: "行政与管理"
      amountUsd: 350000
      percentage: 15.9
    - bucket: "缓冲（6 个月）"
      amountUsd: 300000
      percentage: 13.6
scenarios:
  downside:
    description: "前两个试点里有一个没能转正，销售周期再延后两个季度，客户扩张也更慢。"
    y3RevenueK: 620.0
    y3EbitdaK: -770.0
    cashLowPointK: 140.0
    keyAssumptionChanges:
      - "试点转正式生产的转化率从 60% 掉到 45%。"
      - "综合 ARPU 比基准低 15%。"
      - "月度流失率从 2.5% 升到 3.5%。"
  base:
    description: "主情景是在 Y1 把 1 个设计伙伴转正，到 Y2 末达到 3 个正式生产客户，并在 Y3 期末做到 8 个付费客户。"
    y3RevenueK: 938.0
    y3EbitdaK: -494.0
    cashLowPointK: 593.5
    keyAssumptionChanges:
      - "首个付费试点在 M5 开始，并在 M9 转为正式生产。"
      - "客户数在 Y1 期末为 1 家、Y2 期末为 3 家、Y3 期末为 8 家。"
      - "毛利率从 Y1 的 67% 提升到 Q4Y3 的 73%。"
  upside:
    description: "首个客户扩张更快，第二个渠道合作跑通，且部署始终保持标准化。"
    y3RevenueK: 1290.0
    y3EbitdaK: -180.0
    cashLowPointK: 820.0
    keyAssumptionChanges:
      - "第 2 和第 3 个客户比基准情景提前 1 个季度落地。"
      - "扩张后客户的月收入从 15K 升到 18K。"
      - "毛利率到 Q4Y3 达到 75%，月度流失率降到 1.5%。"
sensitivity:
  - variable: ARPU
    downsideCase: "由于按单量不足，每客户综合收入下降 10%"
    baseCase: "Q4Y3 年化 ARPU 为 $154K"
    upsideCase: "由于集群扩张更快，每客户综合收入上升 10%"
    y3RevenueImpactK: -141.0
    cashImpactK: -102.0
  - variable: CAC
    downsideCase: "由于试点需要更多创始人和 AE 时间，CAC 升到 $60K"
    baseCase: "稳态 CAC 为 $44K"
    upsideCase: "靠转介绍和可复用案例，CAC 降到 $35K"
    y3RevenueImpactK: 0.0
    cashImpactK: -120.0
  - variable: churn
    downsideCase: "月度流失率升到 3.5%"
    baseCase: "月度流失率为 2.5%"
    upsideCase: "月度流失率降到 1.5%"
    y3RevenueImpactK: -96.0
    cashImpactK: -128.0
  - variable: sales cycle
    downsideCase: "新客户比计划晚 2 个季度成交"
    baseCase: "创始人主导的企业销售周期为 4–6 个月"
    upsideCase: "因案例可复制，成交时间缩短 1 个季度"
    y3RevenueImpactK: -118.0
    cashImpactK: -147.0
  - variable: gross margin
    downsideCase: "由于支持仍以人工为主，毛利率停在 68%"
    baseCase: "稳态毛利率为 72%"
    upsideCase: "因集成更干净，毛利率升至 75%"
    y3RevenueImpactK: 0.0
    cashImpactK: -75.0
  - variable: hiring pace
    downsideCase: "1 名工程和 1 名 GTM 招聘晚了 2 个季度"
    baseCase: "团队在 Q4Y3 扩到 12 名 FTE"
    upsideCase: "招聘按计划完成，产能也被充分利用"
    y3RevenueImpactK: -85.0
    cashImpactK: 62.0
modelDiagram:
  title: 单位经济模型流转图
  mermaid: |
    flowchart LR
      Leads --> PaidPilots
      PaidPilots --> ProductionCustomers
      ProductionCustomers --> PlatformFees
      ProductionCustomers --> PerJobFees
      PlatformFees --> Revenue
      PerJobFees --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> EBITDA
      EBITDA --> Cash
modelSanity:
  - checkName: 收入引擎
    finding: "基准情景的收入来自 1 个设计伙伴在 Y1 转正、现有客户在多个集群扩张，以及 Y3 期末做到 8 个付费客户，综合 ARR 约 $154K。"
  - checkName: 必须跑顺的部分
    finding: "首个部署必须在 8 周内上线，并以接近商业计划里 60% 的试点转正式生产率转化，否则 GTM 投入无法形成复利，只会反复重置。"
  - checkName: 模型会失灵的情况
    finding: "如果销售周期晚 2 个季度，或流失率升到 3.5%，下行情景的最低现金会掉到约 $140K，公司大概率需要更早桥接融资。"
  - checkName: 下一轮证明点
    finding: "一旦公司做到 3 个正式生产客户、可复制的 8 周内部署，以及 1 个复用同一核心工作流的相邻品类试点，种子轮故事就更站得住。"
sanityChecks:
  ruleOf40: "Y3 增长 158.4% + EBITDA 利润率 -52.7% = 105.7%"
  burnMultiple: "从 Y2 的 1.3x（$605K burn / $468K 净新增 ARR）改善到 Y3 的 0.8x（$494K burn / $656K 净新增 ARR）。"
  revenuePerFte: "按 11.25 名平均 FTE 计算，Y3 为 $83K；低于常见 SaaS 的 $200–400K 基准，因为模型假设的是集成很重、尚未规模化的部署阶段。"
  flags:
    - "Y3 收入只比研究中的 SOM 略低，因此在没有相邻品类扩张前，执行失误空间并不大。"
