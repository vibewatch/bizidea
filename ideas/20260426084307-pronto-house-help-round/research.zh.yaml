  fiveForces:
    supplierPower:
      score: 4
      rationale: '供给端承压且敏感：Pronto 和 Snabbit 都表示需求超过入职速度，更广泛的薪资抗议说明低工资劳动力市场正处于压力之下。这提升了从业者友好型安全工具的价值，但也意味着设计不当会损害采用率。'
      sourceRefs:
      - 2
      - 6
      - 25
      - 26
      - 27
    buyerPower:
      score: 4
      rationale: 滩头市场中规模化平台买家寥寥，而 InstaHelp 等模式在扩张期仍亏损，这些平台对单位经济模型盯得很紧。
      sourceRefs:
      - 5
      - 22
      - 23
    threatOfEntrants:
      score: 3
      rationale: 身份 API 和工作流工具可得性高，进入门槛尚可；真正的壁垒在于工作流集成深度和积累的事故与复访数据。
      sourceRefs:
      - 28
      - 29
      - 30
      - 31
      - 32
      - 33
    threatOfSubstitutes:
      score: 4
      rationale: 人工 SOP、内部信任团队、警察核验、CRM 和通用 BGV 供应商都是真实的替代方案，尤其是在信任支出还未形成独立预算线之前。
      sourceRefs:
      - 14
      - 24
      - 28
      - 29
      - 30
      - 34
    competitiveRivalry:
      score: 4
      rationale: KYC、BGV 和入职领域的供应商已相当拥挤，而底层平台品类资本密集、战略重要，相邻厂商会持续向信任工作流扩张。
      sourceRefs:
      - 1
      - 2
      - 23
      - 28
      - 29
      - 30
      - 31
      - 32
  pestle:
  - factor: political
    impact: neutral
    point: 家政工人获得政策关注，但国家层面的监管仍不完整、支离破碎，带来的是模糊性而非即时的政策驱动需求。
    sourceRefs:
    - 34
  - factor: economic
    impact: positive
    point: 城市收入上升和双收入家庭增多，推动更多日常家务转向付费服务，支撑品类增长。
    sourceRefs:
    - 3
    - 12
  - factor: social
    impact: negative
    point: 家政工作的尊严敏感性依然存在，平台显现出将从业者商品化的苗头时，公众反弹会迅速涌现。
    sourceRefs:
    - 4
    - 24
  - factor: technological
    impact: positive
    point: 印度已有成熟的身份和入职基础设施，降低了构建技术栈核验层的成本。
    sourceRefs:
    - 28
    - 29
    - 30
    - 31
    - 32
    - 33
  - factor: legal
    impact: negative
    point: 在私人住宅内处理身份数据和事故记录，带来同意、隐私和责任方面的合规负担。
    sourceRefs:
    - 33
    - 34
  - factor: environmental
    impact: neutral
    point: 环境因素不是核心，但高密度城市地理和楼栋布局对服务设计和从业者动线有实质影响。
    sourceRefs:
    - 6
    - 17
    - 18
  adoptionFrictionMatrix:
  - friction: 从业者对监控或惩罚性监测的抵触
    severity: high
    affectedBuyer: 信任与运营负责人
    mitigation: 以 SOS、证据保护和透明政策设计为切入点；v1 避免用数据触发自动罚款。
    sourceRefs:
    - 4
    - 14
  - friction: 接入派单、支持和从业者应用的集成难度
    severity: high
    affectedBuyer: COO/产品/工程
    mitigation: 把产品封装为轻量工作流层，最小化 SDK 依赖，提供清晰的落地模块。
    sourceRefs:
    - 14
    - 28
    - 29
  - friction: 住户侧核验可能增加预约摩擦
    severity: medium
    affectedBuyer: 增长和品类负责人
    mitigation: 采用分级核查和楼栋感知规程，而非全量硬性门槛。
    sourceRefs:
    - 3
    - 17
    - 18
  - friction: 相比现有信任人头成本，ROI 模糊
    severity: medium
    affectedBuyer: 财务和运营
    mitigation: '以可量化 KPI 销售：复购率、事故响应时长和从业者留存率。'
    sourceRefs:
    - 6
    - 23
  - friction: 身份和入户事故记录的数据治理
    severity: high
    affectedBuyer: 法务与合规
    mitigation: 采用同意导向流程、严格留存控制和最小化住户数据采集。
    sourceRefs:
    - 33
    - 34
market:
  tam:
    value: $14.5M
    rationale: '自下而上估算：FY2025 线上家政 NTV 约 ₹41–43B [12]，除以估算的混合客单价约 ₹350（以即时帮工起步价约 ₹99/小时 [17][19] 和 Urban Company 更高客单服务 [20][21] 为锚点），得出约 1.2 亿年度线上上门订单。按每单 ₹8 信任费，加上约 100 家企业/社区合同各 ₹250 万/年，合计约 ₹12.1 亿收入机会，约合 $14.5M。'
    isEstimate: true
    sourceRefs:
    - 12
    - 17
    - 19
    - 20
    - 21
  sam:
    value: $3.4M
    rationale: 滩头 SAM 收窄至即时家政平台加印度主要城市的大型公寓外包运营商。头部即时帮工平台已处理约 200–300 万月单 [5]，Redseer 估计前 8 大城市占线上需求 85–90% [12]。约 3,000 万相关年单 ×₹8，加 20 家合同 ×₹200 万，约合 ₹2.8 亿，约 $3.4M。
    isEstimate: true
    sourceRefs:
    - 5
