reportMemo:
  executiveTakeaways:
    - "这的确是个真实品类，但仍非常早期：Urban Company 的 InstaHelp 在 3 月突破月单量 100 万；Pronto 和 Snabbit 也分别做到约 50–100 万月单，或 2.4–2.5 万日单。这种体量已经足以让信任工具具备经济意义，但单靠它本身还撑不起一个巨大的软件市场 [1][2][5]。"
    - "瓶颈正在从需求发现转向可信复购。Reuters、BBC 和关于家政工人的报道都指向同一组问题：女性工人长时间待在私人住宅里，住户担心失窃和误用，而现有保护措施很薄，且往往只保护单边 [3][4][24]。"
    - "通用 KYC / BGV 供应商已经在印度卖身份核验、Aadhaar 和零工核验产品，因此创业公司不能只靠“核验”本身取胜；它必须切进实时到访工作流，比如楼宇感知的签到签退、SOS、证据采集和住户侧核验 [28][29][30][31][32][33]。"
    - "买家紧迫感是成立的，因为头部平台正在为密集微市场重金烧钱。Urban Company 披露，InstaHelp 某一季度调整后 EBITDA 亏损达到 Rs 61 crore；Pronto 也表示自己第一年烧掉了约 $8M，但供给仍然紧张 [6][8][23]。"
    - "这个滩头市场之所以有吸引力，恰恰因为它够窄：班加罗尔和古尔冈的封闭社区集群，让同一批工人、住户、门卫和楼宇不断重复互动，正是在这种环境里，信任图谱的复利最快 [6][17][18]。"
    - "下行面在于市场规模必须保持清醒。按当前渗透率估算，这很可能只是一个低于 $20M 的印度软件品类，除非产品能扩到邻近入户品类，或者演化成覆盖上门美容、维修、育儿/养老照护和公寓用工的更广义运营风险层 [12][20][22]。"
  marketDefinition: "定义中的市场，是服务印度入户服务平台的双边信任、核验和事故响应软件与工作流基础设施。它覆盖即时家政帮工平台、App 化保洁服务，以及任何工人需要在私人住宅里停留较长时间的相邻入户品类。它不包括卖给任意雇主的通用招聘/背调软件、线下保姆中介，也不包括整个到家服务的 GMV 本身 [12][20][28][29][30][35]。"
  customerAndBuyer: "ICP 是即时家政帮工平台和大型公寓社区用工运营方中的运营、信任与安全，或品类负责人。经济买家通常是 COO、信任与安全负责人，或品类 GM；预算一般挂在运营/风控/质量，而不是核心 IT。日常使用者会是信任运营主管、城市经理和工人支持团队。购买触发点包括事故、新微市场上线，以及董事会要求在补贴消耗受审视时提升复购。采购摩擦不小，因为产品必须接进派单系统、工人 App、用户档案和事故 SOP，同时还要让本来就对评分压力和罚款敏感的工人接受 [4][6][8][14][23][28][33]。"
  buyingTriggers:
    - point: "一旦发生醒目的失窃、虐待或纠纷事故，平台就会立刻面临加严核验和证据留存的压力。"
      sourceRefs: [3, 24]
    - point: "新开一个高密度微市场，会同时抬高供给上岗和楼宇通行的复杂度，因而把信任工作流推到更紧急的位置。"
      sourceRefs: [6, 11]
    - point: "当投资人开始盯补贴消耗和复购时，平台需要的是既能降事故成本、又不拖慢履约的工具。"
      sourceRefs: [5, 23]
  willingnessToPay:
    summary: "直接定价证据仍然有限，但市场愿意为信任环节付费这一点很清楚：头部供应商已经在印度售卖零工核验、Aadhaar 和即时 BGV [28][29][30][31][32]；而品类头部平台也在大举投入上岗、供给质量和安全相关运营，并没有把信任视为可有可无的后台开销 [8][14][23]。真正要尽调的，不是预算是否存在，而是这家创业公司能不能把投入和复购提升、事故处理提速、以及更安全的工人留存绑定起来。"
    sourceRefs: [8, 14, 23, 28, 29, 30]
  competitiveLandscape: "优先竞争对手其实不是别的家政平台，而是身份、KYC 和 BGV 供应商。AuthBridge、OnGrid、IDfy、HyperVerge 和 Signzy 都覆盖了核验、上岗、反欺诈或现场证明的一部分，但它们主要解决的是上门前的身份或合规步骤。这里提议的创业公司切口不同：它做的是实时入户风险编排——双边核验、楼宇规则、定时签到、SOS 升级，以及可复用的信任通行证。最强的替代方案其实是三类：（1）平台内部信任运营团队；（2）人工 SOP 加 WhatsApp 升级；（3）没有证据链主导权的通用工作流工具 [14][22][28][29][30][31][32]。"
  incumbentThesis:
    - incumbentClass: "身份与背景核验供应商"
      point: "这些公司擅长拿下上岗清单，却拿不下实时上门工作流。创业公司如果能成为签到签退、住户核验、事故证据和重复风险评分的运行层，而不是再卖一个 KYC API，就有机会赢。"
      sourceRefs: [28, 29, 30, 33]
    - incumbentClass: "大型平台的内部自建团队"
      point: "Urban Company，可能还有 Pronto，确实能拼出内部信任栈，但内部团队首先会优先做供需增长。创业公司要赢，就得更快上线、给出跨平台风险基准，并提供在规模未到前很难在内部正当化的专业事故运营。"
      sourceRefs: [1, 5, 22, 23]
    - incumbentClass: "通用工作流与 CRM 工具"
      point: "CRM 可以给事故打工单，但它天生不会把身份核验、地理围栏到场、楼宇规则、工人 SOS 和证据日志串成一条能守住的链。"
      sourceRefs: [14, 22, 28]
    - incumbentClass: "人工报警核验与非正规 SOP"
      point: "线下核查前期看起来更便宜，但它通常只做一次、往往只保护一边，而且一旦工人已经进屋就基本失效。创业公司的切口，是持续风险管理，而不是静态文件。"
      sourceRefs: [24, 33, 34]
  regulatoryLandscape: "印度关于家政工作的制度框架仍然高度碎片化。中央政府目前仍引用较旧 NSS 数据，只承认全国约有 39 lakh 家政工人，并表示全国性家政工政策仍处于草案阶段，这意味着法定义务并不完整，且各邦执行也很不均一 [34]。与此同时，基于同意的 Aadhaar 和离线 eKYC 机制正让身份工作流日益正规化，因此任何处在核验链条里的产品，都必须非常谨慎地处理同意、安全和数据最小化 [33]。"
  technologyLandscape: "身份基础能力正在商品化。Aadhaar 离线 eKYC、视频 KYC、人脸比对、现场证明和即时 BGV，都已经可以从多个印度供应商处拿到 [28][29][30][31][32][33]。这会把可防守性从“原始核验”本身，推向工作流：谁在什么时间进了哪栋楼、在什么住户风险画像下完成服务、曾有过什么事故、升级后结果如何。换句话说，真正能赢的产品更像“安全复购入户访问的操作系统”，而不是一个 API。"
  distributionChannels:
    - point: "最清晰的路径，是直接把企业销售打到高增长家政帮工平台的 COO、信任负责人和城市运营负责人身上，因为这个产品碰的是运营 KPI，而不是开发者主导的采购。"
      sourceRefs: [6, 8, 23]
    - point: "和 KYC / BGV 供应商做渠道合作是有可能的，因为买家本来就认识这些公司；但如果创业公司不掌握上门中工作流层，合作经济性会明显更弱。"
      sourceRefs: [28, 29, 30]
  partnershipEcosystem:
    - point: "像基于同意的 Aadhaar 离线 eKYC 这样的身份底座，对工人和住户核验都重要，但它单独并不够。"
      sourceRefs: [33]
    - point: "公寓门禁系统、保险方和紧急响应服务商，都是合理的合作对象，因为信任事故发生在物理世界，而不是纯数字欺诈场景。"
      sourceRefs: [14, 22, 28]
  dataMoats:
    - point: "同一栋楼和同一住户里的重复上门，可以逐步沉淀一张跨会话的信任图谱，把工人、住宅、时段、任务类型和结果质量连起来。"
      sourceRefs: [6, 14, 17, 18]
    - point: "只要公司坐在运营闭环里，而不是站在外面，结构化事故证据和升级日志就有机会变成真正可防守的数据集。"
      sourceRefs: [14, 28, 29]
  geographicConsiderations:
    - point: "印度前 8 大城市占了线上到家服务需求的 85–90%，因此早期 PMF 几乎必然是先从大都市做起。"
      sourceRefs: [12]
    - point: "班加罗尔和古尔冈尤其有吸引力，因为封闭社区密度高、门岗延误常见、集群需求重复，楼宇感知工作流的价值会更高。"
      sourceRefs: [4, 17, 18]
  sensitivityCases:
    - case: "即时家政帮工始终只是应急备胎，而不是日常习惯"
      impact: "信任投入可能一直被包在运营人力里，而无法独立长成一个软件预算科目。"
      sourceRefs: [3, 4, 12]
    - case: "一场重大公共事故迫使市场收紧核验规范"
      impact: "预算紧迫度会迅速抬升，平台也更愿意把住户侧核验真正运营起来。"
      sourceRefs: [3, 24, 34]
    - case: "Urban Company 或其他头部平台比预期更快整合市场份额"
      impact: "买家集中度会上升，企业销售周期变长，但少数赢家的单笔合同也会变大。"
      sourceRefs: [5, 22, 23]
  validationPlan:
    - priority: 高
      question: "平台买家究竟愿不愿意按完单量为信任工作流付费，还是只接受固定席位 / 固定平台的软件模式？"
      evidenceToGather: "访谈 10 位运营/信任负责人，覆盖即时到家、上门美容和维修平台；要求对方明确当前供应商预算项和审批门槛。"
    - priority: 高
      question: "到底是哪种上门中工作流真的能改变结果：住户核验、门岗签到、定时工人签到，还是结构化证据采集？"
      evidenceToGather: "在 1 家平台里旁听 1–2 周的事故处理和工人支持流程，拆出时间花在哪里、哪里最容易失败、哪些事件最常重复。"
    - priority: 中
      question: "工人会把这套产品视为安全基础设施，还是视为监控？"
      evidenceToGather: "做 15–20 场工人访谈和原型测试，重点围绕 SOS、签到、罚款和隐私披露话术。"
    - priority: 中
      question: "在更广泛的品类扩张前，公寓社区运营方能不能先成为第二个切口？"
      evidenceToGather: "和用工运营方及大型住宅社区试聊，围绕报警核验、门岗规则和承包商日志看是否能跑试点。"
