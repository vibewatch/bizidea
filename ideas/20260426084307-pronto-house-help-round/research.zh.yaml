categoryDynamics:
  growthRate: 18-22% CAGR for online home services through FY2030
  growthRateSourceRefs:
    - 12
  tailwinds:
    - point: 城市消费者越来越重视便利、可靠和结构化定价，而不再满足于非正式、临时拼凑的安排。
      sourceRefs:
        - 3
        - 12
    - point: 赛道头部正在快速融资，这会给信任运营的专业化带来预算和紧迫性。
      sourceRefs:
        - 1
        - 2
        - 8
        - 9
    - point: 印度的身份与入驻生态已经较成熟，使得信任工具里的核验底层能力更容易被装配。
      sourceRefs:
        - 28
        - 29
        - 30
        - 31
        - 32
        - 33
  headwinds:
    - point: 赛道当前的单位经济仍严重依赖补贴和激励，因此若没有可证明 ROI，买方对点状解决方案的容忍度有限。
      sourceRefs:
        - 5
        - 23
    - point: 如果设计不当，工人的反弹和尊严争议会很快把信任工具变成劳动关系问题。
      sourceRefs:
        - 4
        - 24
    - point: 家政劳动仍然高度碎片化且大体处于非正式状态，因此监管和标准化数据都偏弱。
      sourceRefs:
        - 25
        - 34
        - 35
        - 36
competitors:
  - name: AuthBridge
    stage: 现有厂商
    wedge: 广泛覆盖印度身份核验、背景调查和零工劳动者验证。
    pricing: 定制定价 / 未公开
    strength: 核验能力广、企业可信度高，并具备相邻的外勤验证能力。
    weaknessVsUs: 更适合入驻与合规核验，而不是实时双边入户安全工作流或事故运营。
    sourceRefs:
      - 28
      - 33
  - name: OnGrid
    stage: 成长期
    wedge: 面向 HR 和合规团队的快速自助式背景核验。
    pricing: 定制定价 / 未公开
    strength: 即时 BGV、较强的初筛时效主张，以及对蓝领招聘的聚焦。
    weaknessVsUs: 主要面向候选人筛选和 HR 工作流，不适合住户核验、楼宇协议或服务中的升级处理。
    sourceRefs:
      - 29
  - name: IDfy
    stage: 成长期
    wedge: 一体化身份平台，覆盖员工背景调查、入驻流程、视频 KYC 与 DPDP 相邻能力。
    pricing: 定制定价 / 未公开
    strength: 能力面广、编排强，入驻产品矩阵完整。
    weaknessVsUs: 核心仍在入驻和欺诈环节，看起来并不是为重复入户风险图谱或工人安全运营而设计。
    sourceRefs:
      - 30
  - name: HyperVerge
    stage: 成长期
    wedge: 以 AI 驱动的 KYC 与入驻流程，强调低带宽和高转化体验。
    pricing: 定制定价 / 未公开
    strength: KYC 经济性强、全球部署经验丰富，且身份工具接入简单。
    weaknessVsUs: 重点仍是客户入驻，而不是私人住宅中的平台信任与安全问题。
    sourceRefs:
      - 31
  - name: Signzy
    stage: 成长期
    wedge: 为受监管入驻场景设计的视频 KYC 与欺诈工具。
    pricing: 定制定价 / 未公开
    strength: 上线快、合规叙事强，且反欺诈定位明确。
    weaknessVsUs: 本质上更像金融合规入驻产品，不适合处理上门服务过程中的运营安全。
    sourceRefs:
      - 32
regulatoryTechnicalConstraints:
  - point: 基于 Aadhaar 的身份流程必须基于同意，也高度涉及隐私，因此产品不能把身份数据视作免费原材料。
    sourceRefs:
      - 33
  - point: 家政劳动监管仍不完整且零散，这让责任边界和标准操作预期更难被清晰写死。
    sourceRefs:
      - 34
      - 35
  - point: 只核验工人并不够；主流报道明确指出，住户/客户一侧的身份凭证同样需要被核验。
    sourceRefs:
      - 3
      - 4
  - point: 真正的价值需要接进调度系统、支持系统和工人 App，这会拉长部署周期，也会提高切换成本。
    sourceRefs:
      - 14
      - 28
      - 29
      - 30
