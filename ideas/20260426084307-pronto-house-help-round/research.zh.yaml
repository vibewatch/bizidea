  - 33
openQuestions:
- 能否在不伤害转化、也不对某些地址或楼宇造成歧视感知的前提下，引入住户侧核验？
- 到底哪个 KPI 最能最快解锁预算：事件率下降、复购提升、服务者留存，还是支持处理时间下降？
- 服务者会足够信任签到和 SOS 工具并主动采纳，还是会把它看作另一层评分与罚款控制？
- 所需的楼宇和门禁数据，有多少能系统化集成，又有多少只能通过人工 SOP 处理？
