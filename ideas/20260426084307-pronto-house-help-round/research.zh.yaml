openQuestions:
  - 住户侧核验能否在不伤害转化、也不让某些地址或楼宇感到被歧视的前提下引入？
  - 最快能打开预算的到底是哪一个 KPI：事故率下降、复购提升、工人留存，还是支持处理时间缩短？
  - 工人会不会真正相信签到和 SOS 工具是在保护自己，而不是把它看成另一套评分与罚款控制层？
  - 所需的楼宇与门禁数据，有多少能系统化集成，又有多少最终仍得靠人工 SOP 处理？
