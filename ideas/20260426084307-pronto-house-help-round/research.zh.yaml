  - 33
openQuestions:
- 在不损害转化率或对特定地址/楼栋造成感知歧视的前提下，如何引入住户侧核验？
- '哪个 KPI 最快打开预算：事故率下降、复购率提升、从业者留存还是支持处理时长缩短？'
- 从业者是否足够信任签到和 SOS 工具而主动采用，还是会把它视为另一层评分和罚款控制？
- 楼栋和门禁数据中，有多少能系统性集成，有多少只能靠人工 SOP 处理？
