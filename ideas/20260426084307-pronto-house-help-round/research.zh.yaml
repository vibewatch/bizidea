  fiveForces:
    supplierPower:
      score: 4
      rationale: "工人供给既紧张又脆弱：Pronto 和 Snabbit 都说需求增速快于上岗速度，而更广义的工资抗议也说明低工资劳动力市场正在承压。这会抬高对工人友好型安全工具的价值，但也意味着产品一旦设计不好，就会直接伤采纳。"
      sourceRefs: [2, 6, 25, 26, 27]
    buyerPower:
      score: 4
      rationale: "这个滩头市场里真正有规模的平台买家只有少数几家，而且它们会紧盯单位经济模型，因为 InstaHelp 等模式在扩张期仍在亏损。"
      sourceRefs: [5, 22, 23]
    threatOfEntrants:
      score: 3
      rationale: "身份 API 和工作流工具都现成可用，因此入场并不难；真正更难的是工作流集成，以及日积月累的事故和重复访问数据。"
      sourceRefs: [28, 29, 30, 31, 32, 33]
    threatOfSubstitutes:
      score: 4
      rationale: "人工 SOP、内部信任团队、报警核验、CRM 和通用 BGV 供应商，都是可信替代方案，尤其是在信任投入还没独立成预算项之前。"
      sourceRefs: [14, 24, 28, 29, 30, 34]
    competitiveRivalry:
      score: 4
      rationale: "围绕 KYC、BGV 和上岗的供应商已经很拥挤，而底层平台品类本身既烧钱又重要，因此相邻玩家会继续向信任工作流外扩。"
      sourceRefs: [1, 2, 23, 28, 29, 30, 31, 32]
  pestle:
    - factor: 政治
      impact: neutral
      point: "政策层面对家政工确实有关注，但全国性监管仍不完整也不统一，因此带来的更多是模糊性，而不是立刻由监管驱动的刚性需求。"
      sourceRefs: [34]
    - factor: 经济
      impact: positive
      point: "城市收入提高、双职工家庭变多，正在把更多日常家务推向付费服务，支撑品类增长。"
      sourceRefs: [3, 12]
    - factor: 社会
      impact: negative
      point: "家政工作天然牵涉尊严感；一旦平台看起来像是在把工人彻底商品化，舆论反弹会很快。"
      sourceRefs: [4, 24]
    - factor: 技术
      impact: positive
      point: "印度已经有很成熟的身份和上岗底座，因此搭出信任栈里的核验层，成本并不高。"
      sourceRefs: [28, 29, 30, 31, 32, 33]
    - factor: 法律
      impact: negative
      point: "一旦在私人住宅场景里处理身份数据和事故日志，就会立刻背上同意、隐私和责任的负担。"
      sourceRefs: [33, 34]
    - factor: 环境
      impact: neutral
      point: "环境因素不是核心变量，但高密度城市地理和楼宇布局会实质影响服务设计和工人移动方式。"
      sourceRefs: [6, 17, 18]
  adoptionFrictionMatrix:
    - friction: "工人把产品理解为监控或惩罚工具"
      severity: 高
      affectedBuyer: "信任与运营负责人"
      mitigation: "先强调 SOS、证据保护和透明政策设计；v1 不要把数据直接拿去做自动罚款。"
      sourceRefs: [4, 14]
    - friction: "接入派单系统、支持系统和工人 App 的工程复杂度"
      severity: 高
      affectedBuyer: "COO / 产品 / 工程"
      mitigation: "把产品包装成轻量工作流层，尽量少要求 SDK，并把上线模块拆清楚。"
      sourceRefs: [14, 28, 29]
    - friction: "住户侧核验可能给下单转化带来额外摩擦"
      severity: 中
      affectedBuyer: "增长与品类负责人"
      mitigation: "用分层风控检查和楼宇感知规则，而不是对所有订单一刀切设硬门槛。"
      sourceRefs: [3, 17, 18]
    - friction: "相对现有信任人力，ROI 仍显得模糊"
      severity: 中
      affectedBuyer: "财务与运营"
      mitigation: "围绕可量化 KPI 来卖：复购率、事故响应时间和工人留存。"
      sourceRefs: [6, 23]
    - friction: "围绕身份和入户事故日志的数据治理压力"
      severity: 高
      affectedBuyer: "法务与合规"
      mitigation: "采用基于同意的流程、严格留存控制，以及对住户数据的最小化采集。"
      sourceRefs: [33, 34]
market:
  tam:
    value: $14.5M
    rationale: "自下而上的估算：FY2025 在线到家服务 NTV 约为 ₹41-43B [12]；若按综合客单价约 ₹350 计算——锚定于即时家政约 ₹99/小时起 [17][19] 和更高客单价的 Urban 服务 [20][21]——意味着每年约 1.2 亿笔线上入户订单。若每笔收取约 ₹8 的信任工作流费用，再叠加约 100 份每年 ₹2.5M 的企业/社区合同，对应收入机会约 ₹1.21B，约合 $14.5M。"
    isEstimate: true
    sourceRefs: [12, 17, 19, 20, 21]
  sam:
    value: $3.4M
    rationale: "滩头市场 SAM 收窄到印度头部都市里的即时家政帮工平台和大型公寓用工运营方。头部即时帮工平台当前已处理约 2–3M 月单 [5]，而 Redseer 说前 8 大城市占线上需求的 85–90% [12]。若按约 30M 年化相关订单 × ₹8，再加约 20 份每年 ₹2M 的合同，得到约 ₹280M，约合 $3.4M。"
    isEstimate: true
    sourceRefs: [5, 12]
  som:
    value: $1.0M
    rationale: "示意性的第 3 年 SOM 假设为：3 个平台客户加 8 个大型公寓/社区运营方，共覆盖约 8M 年化订单，按每单 ₹8 收费，再加 11 份每年约 ₹2M 的合同，总计约 ₹86M，约合 $1.0M。这个数字只有在工作流集成做深、且事故/复购 ROI 能被看见时才站得住。"
    isEstimate: true
    sourceRefs: [5, 6, 12, 14]
