- point: Redseer 预计在线家政服务到 FY2030 的年增速为 18-22%，且在线渗透率仍低于 NTV 的 1%。
  sourceRefs:
  - 12
- point: 主流报道如今把服务者安全、评分压力和身份核验视为核心产品问题，而非边缘案例。
  sourceRefs:
  - 3
