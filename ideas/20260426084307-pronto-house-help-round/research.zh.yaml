competitors:
- name: AuthBridge
  stage: incumbent
  wedge: 覆盖印度身份、背景调查和零工服务者核验的广泛产品套件。
  pricing: Custom / not publicly disclosed
  strength: 核验覆盖面深、企业可信度强，并具备相邻的现场核验能力。
  weaknessVsUs: 针对的是入驻和合规检查，而不是实时的双边上门安全工作流或事件运营。
  sourceRefs:
  - 28
  - 33
- name: OnGrid
  stage: scale-up
  wedge: 面向 HR 与合规团队的快速、自助式背景核验。
  pricing: Custom / not publicly disclosed
  strength: 即时 BGV、很强的初始周转时效主张，以及面向蓝领招聘的聚焦。
  weaknessVsUs: 更偏候选人筛选和 HR 工作流，而不是住户核验、楼宇协议或在访升级。
  sourceRefs:
  - 29
- name: IDfy
  stage: scale-up
  wedge: 覆盖员工 BGV、入驻旅程、video KYC 和 DPDP 相邻场景的一体化身份平台。
  pricing: Custom / not publicly disclosed
  strength: 产品面广、编排能力强、入驻产品界面完整。
  weaknessVsUs: 仍以入驻/反欺诈工作流为中心；看起来并未针对重复上门风险图谱或服务者安全运营。
  sourceRefs:
  - 30
- name: HyperVerge
  stage: scale-up
  wedge: AI 驱动的 KYC 和入驻工具，强调低带宽和高转化体验。
  pricing: Custom / not publicly disclosed
  strength: KYC 经济性强、全球部署广、身份工具即插即用。
  weaknessVsUs: 更聚焦客户入驻，而不是私人住宅中的市场平台信任与安全。
  sourceRefs:
  - 31
- name: Signzy
  stage: scale-up
  wedge: 面向受监管入驻流程设计的 video KYC 与反欺诈工具。
  pricing: Custom / not publicly disclosed
  strength: 上线快、合规导向明确、反欺诈定位强。
  weaknessVsUs: 本质上仍是受监管金融入驻产品，对上门服务过程中的运营安全适配较弱。
  sourceRefs:
  - 32
regulatoryTechnicalConstraints:
- point: 基于 Aadhaar 的身份工作流是基于同意且高度关注隐私的，因此产品不能把身份数据当作可自由获取的原始材料。
  sourceRefs:
  - 33
- point: 家政劳动监管并不完整且高度碎片化，因此责任边界和标准操作预期更难编码。
  sourceRefs:
  - 34
  - 35
- point: 只核验服务者的单边流程是不够的；主流报道明确指出，也需要核验住户/客户侧的身份。
  sourceRefs:
  - 3
  - 4
- point: 真正的价值需要与派单、支持和服务者 App 做运营级集成，这会拉长部署时间并提高切换成本。
  sourceRefs:
  - 14
  - 28
  - 29
  - 30
