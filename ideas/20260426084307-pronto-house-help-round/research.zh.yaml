categoryDynamics:
  growthRate: FY2030 前线上到家服务 CAGR 为 18–22%
  growthRateSourceRefs: [12]
  tailwinds:
    - point: "城市消费者越来越重视便利、可靠和标准化价格，而不是临时、非正式的安排。"
      sourceRefs: [3, 12]
    - point: "头部平台融资节奏很快，因此既有预算，也有把信任运营专业化的紧迫感。"
      sourceRefs: [1, 2, 8, 9]
    - point: "印度现成的身份与上岗生态，让核验能力更容易拿到，从而降低信任工具的搭建成本。"
      sourceRefs: [28, 29, 30, 31, 32, 33]
  headwinds:
    - point: "当前品类经济仍高度依赖补贴和激励，没有可证明 ROI 的情况下，对点状工具的容忍度有限。"
      sourceRefs: [5, 23]
    - point: "如果产品设计失当，工人反弹和尊严议题会很快把信任工具变成劳资关系问题。"
      sourceRefs: [4, 24]
    - point: "家政工作仍然高度分散且大多非正规，因此监管和标准化数据都偏弱。"
      sourceRefs: [25, 34, 35, 36]
competitors:
  - name: AuthBridge
    stage: 在位企业
    wedge: "覆盖印度身份、背调和零工核验的宽产品套件。"
    pricing: "定制价 / 未公开披露"
    strength: "核验覆盖广、企业信誉强，并具备相邻的现场核验能力。"
    weaknessVsUs: "更适合上岗和合规核验，不适合做实时双边入户安全工作流或事故运营。"
    sourceRefs: [28, 33]
  - name: OnGrid
    stage: 成长阶段
    wedge: "面向 HR 和合规团队的快速、自助式背景核验。"
    pricing: "定制价 / 未公开披露"
    strength: "即时 BGV 强、前置 TAT 诉求明确，也更聚焦蓝领招聘。"
    weaknessVsUs: "更像候选人筛查和 HR 工作流工具，不擅长住户核验、楼宇规则或上门中的升级处理。"
    sourceRefs: [29]
  - name: IDfy
    stage: 成长阶段
    wedge: "覆盖员工 BGV、上岗流程、视频 KYC 和 DPDP 相邻工具的一体化身份平台。"
    pricing: "定制价 / 未公开披露"
    strength: "产品面宽、编排能力强、上岗产品界面成熟。"
    weaknessVsUs: "仍以上岗/反欺诈工作流为中心，没有明显为重复入户风险图谱或工人安全运营做专门设计。"
    sourceRefs: [30]
  - name: HyperVerge
    stage: 成长阶段
    wedge: "以 AI 驱动的 KYC 与上岗产品，强调低带宽和高转化体验。"
    pricing: "定制价 / 未公开披露"
    strength: "KYC 经济性强、全球部署广，身份工具开箱即用。"
    weaknessVsUs: "更偏用户上岗，而不是私人住宅场景里的平台信任与安全。"
    sourceRefs: [31]
  - name: Signzy
    stage: 成长阶段
    wedge: "为强监管上岗流程设计的视频 KYC 与反欺诈工具。"
    pricing: "定制价 / 未公开披露"
    strength: "上线快、合规叙事清楚，反欺诈定位强。"
    weaknessVsUs: "核心仍是受监管金融上岗产品，与入户服务过程中的运营安全适配度较弱。"
    sourceRefs: [32]
regulatoryTechnicalConstraints:
  - point: "基于 Aadhaar 的身份工作流以同意为前提，而且高度敏感，因此产品不能把身份数据当成可无限索取的原材料。"
    sourceRefs: [33]
  - point: "家政工作监管仍不完整且高度碎片化，这让责任边界和标准操作预期更难被清晰编码。"
    sourceRefs: [34, 35]
  - point: "只核验工人一边远远不够；主流报道已经明确指出，住户/客户一侧也需要被核验。"
    sourceRefs: [3, 4]
  - point: "真正的价值必须和派单系统、支持系统、工人 App 做运营级集成，因此上线周期更长，切换成本也更高。"
    sourceRefs: [14, 28, 29, 30]
validationSignals:
  - point: "Pronto 表示其当前日单量约为 24,000–25,000，前一个月则完成了约 500,000 笔订单。"
    sourceRefs: [1]
  - point: "Snabbit 表示 3 月完成了超过 100 万笔订单，并与约 5,000 名女性服务者合作。"
    sourceRefs: [2]
  - point: "Urban Company 的 InstaHelp 在 3 月月单量突破 100 万，此前其日单量已超过 50,000。"
    sourceRefs: [5, 23]
  - point: "Redseer 预计线上到家服务到 FY2030 前将以 18–22% 年增速增长，而线上渗透率仍低于 NTV 的 1%。"
    sourceRefs: [12]
  - point: "主流报道现在已把工人安全、评分压力和核验写成产品核心问题，而不再当成边角案例。"
    sourceRefs: [3, 4, 24]
  - point: "多家企业供应商已经在印度售卖零工核验、Aadhaar 核验和即时 BGV，说明买家对信任支出并不陌生。"
    sourceRefs: [28, 29, 30, 33]
