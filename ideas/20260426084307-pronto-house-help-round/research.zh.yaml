competitors:
- name: AuthBridge
  stage: incumbent
  wedge: 印度宽泛的身份核查、背景调查和零工从业者核验套件。
  pricing: 定制/未公开披露
  strength: 核验覆盖广、企业可信度强、相邻现场核验能力成熟。
  weaknessVsUs: 专为入职和合规核查优化，不做动态双边入户安全工作流或事故运营。
  sourceRefs:
  - 28
  - 33
- name: OnGrid
  stage: scale-up
  wedge: 面向 HR 和合规团队的快速自助背景核查。
  pricing: 定制/未公开披露
  strength: 即时 BGV、强调快速 TAT、聚焦蓝领招聘。
  weaknessVsUs: 面向候选人筛选和 HR 工作流，不做住户核验、楼栋规程或入访升级。
  sourceRefs:
  - 29
- name: IDfy
  stage: scale-up
  wedge: 涵盖员工 BGV、入职旅程、视频 KYC 和 DPDP 相邻工具的一体化身份平台。
  pricing: 定制/未公开披露
  strength: 覆盖广、编排能力强、入职产品面完善。
  weaknessVsUs: 仍以入职/欺诈工作流为核心，未见针对重复入户风险图谱或从业者安全运营的定制。
  sourceRefs:
  - 30
- name: HyperVerge
  stage: scale-up
  wedge: AI 主导的 KYC 和入职，低带宽、转化率导向的 UX。
  pricing: 定制/未公开披露
  strength: KYC 经济性强、全球部署、即插即用身份工具。
  weaknessVsUs: 聚焦客户入职，而非私人住宅内的平台信任与安全。
  sourceRefs:
  - 31
- name: Signzy
  stage: scale-up
  wedge: 面向受监管入职流程的视频 KYC 和欺诈工具。
  pricing: 定制/未公开披露
  strength: 快速上线、合规定位、欺诈检测能力强。
  weaknessVsUs: 主要面向受监管金融入职，对上门服务访问过程中的运营安全适配性弱。
  sourceRefs:
  - 32
regulatoryTechnicalConstraints:
- point: 基于 Aadhaar 的身份工作流遵循同意原则且隐私敏感，产品不能把身份数据当作免费原材料使用。
  sourceRefs:
  - 33
- point: 家政工作监管不完整且分散，使责任边界和标准运营预期难以成文化。
  sourceRefs:
  - 34
  - 35
- point: 仅核验从业者侧不够；主流报道明确指出也需核验住户/客户身份。
  sourceRefs:
  - 3
  - 4
- point: 真正的价值需要与派单、支持和从业者应用深度集成，这延长了部署周期并提高了切换成本。
  sourceRefs:
  - 14
  - 28
  - 29
  - 30
