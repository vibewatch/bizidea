slug: home-services-safety-rail
date: "2026-04-26"
currency: USD
modelStartMonth: "2026-05"
assumptions:
  - id: A1
    name: Model start month
    value: "2026-05"
    unit: month
    source: "[BP date] Model starts in the first full month after the plan date."
  - id: A2
    name: Time to first paid pilot
    value: "4 months to paid pilot, with first bill in M5"
    unit: timing
    source: "[BP operatingAssumptions + milestones] First production deployment is targeted in under 8 weeks, but paid pilot close plus implementation is modeled conservatively at four months."
  - id: A3
    name: Paid pilot monthly revenue per customer
    value: "4.0"
    unit: USDK per month
    source: "[BP investorMemo.initialContract + pricing] Low-five-figure annual-equivalent pilot plus per-job billing modeled as about $4K monthly."
  - id: A4
    name: Initial production monthly revenue per customer
    value: "9.0"
    unit: USDK per month
    source: "[BP pricing + businessModel] Production pricing combines a fixed platform fee with per-completed-job fees after pilot conversion."
  - id: A5
    name: Expanded multi-cluster monthly revenue per customer
    value: "15.0"
    unit: USDK per month
    source: "[BP gtm + research SOM heuristic] Mature logos expand to multiple clusters and higher protected-visit volume, lifting blended monthly revenue."
  - id: A6
    name: Customer logo ramp
    value: "Y1 exit 1, Y2 exit 3, Y3 exit 8"
    unit: customers
    source: "[BP milestones + Research SOM] This is consistent with one design partner in year 1, 2-3 customers in 12-24 months, and a credible but not full-SOM year-3 ramp."
  - id: A7
    name: Gross margin ramp
    value: "67% in Y1 to 73% by Q4Y3"
    unit: percent
    source: "[BP businessModel.targetGrossMarginPct] Modeled around the stated 70% target, with early implementation drag and later scale benefits."
  - id: A8
    name: Monthly logo churn
    value: "2.5%"
    unit: percent
    source: "[Startup finance heuristic: early enterprise SaaS with customer concentration] Conservative retention assumption reflects buyer concentration and workflow risk."
  - id: A9
    name: Conversion and expansion gates
    value: "Pilot to production 60%, second cluster expansion within 90 days 70%"
    unit: funnel
    source: "[BP gtm.funnelTargets]"
  - id: A10
    name: Loaded annual compensation for founder CEO
    value: "55.2"
    unit: USDK per year
    source: "[Startup finance heuristic: India seed SaaS loaded comp] Assumes modest founder cash salary plus 15% payroll burden."
  - id: A11
    name: Loaded annual compensation for engineer or data engineer
    value: "82.8"
    unit: USDK per year
    source: "[Startup finance heuristic: India seed SaaS loaded comp] Used for founding eng, data/risk engineer, and later engineering hires."
  - id: A12
    name: Loaded annual compensation for product leader or AE
    value: "69.0"
    unit: USDK per year
    source: "[Startup finance heuristic: India seed SaaS loaded comp] Used for founding product/trust role, added PM, and quota-carrying AEs."
  - id: A13
    name: Loaded annual compensation for customer success or G&A ops
    value: "41.4"
    unit: USDK per year
    source: "[Startup finance heuristic: India seed SaaS loaded comp] Used for trust analyst / customer success and back-office ops."
  - id: A14
    name: Non-payroll operating spend ramp
    value: "16K per month in Q1Y1 to roughly 35K per month by Q4Y3"
    unit: USDK per month
    source: "[Startup finance heuristic: enterprise infrastructure + privacy + travel] Covers cloud, security, compliance, legal, insurance, and founder-led selling."
  - id: A15
    name: Cash conversion assumption
    value: "EBITDA approximates operating cash flow"
    unit: policy
    source: "[Modeling heuristic] Capex, debt, and working-capital swings are assumed immaterial at this stage, and no debt financing is modeled."
  - id: A16
    name: Round sizing logic
    value: "24 months of runway"
    unit: runway months
    source: "[BP fundingAsk.runwayMonths + model requirement] The BP targets 18 months, and the model adds the required 6-month buffer."
  - id: A17
    name: Next-round milestone
    value: "3 production customers, sub-8-week deployment, and 1 adjacent-category pilot"
    unit: milestone
    source: "[BP milestones 12-24 months + investorMemo.nextDiligence]"
  - id: A18
    name: Steady-state CAC
    value: "44.0"
    unit: USDK per customer
    source: "[Model output from Y3 S&M spend divided by five net new logos] Used for unit economics instead of the noisier pre-pilot period."
  - id: A19
    name: Blended mature annual ARPU
    value: "154.0"
    unit: USDK per customer per year
    source: "[Model output from Q4Y3 annualized revenue divided by eight EOP customers] Reflects fixed platform fees plus per-job expansion."
