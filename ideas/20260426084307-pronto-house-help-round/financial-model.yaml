scenarios:
  downside:
    description: "One of the first two pilots fails to convert, sales cycles slip by two quarters, and customer expansion is slower."
    y3RevenueK: 620.0
    y3EbitdaK: -770.0
    cashLowPointK: 140.0
    keyAssumptionChanges:
      - "Pilot-to-production conversion falls from 60% to 45%."
      - "Blended ARPU is 15% below base."
      - "Monthly churn rises from 2.5% to 3.5%."
  base:
    description: "Main case converts one design partner in Y1, reaches three production logos by the end of Y2, and exits Y3 with eight paying customers."
    y3RevenueK: 938.0
    y3EbitdaK: -494.0
    cashLowPointK: 593.5
    keyAssumptionChanges:
      - "First paid pilot begins in M5 and converts to production in M9."
      - "Customer ramp exits Y1 at 1 logo, Y2 at 3 logos, and Y3 at 8 logos."
      - "Gross margin improves from 67% in Y1 to 73% by Q4Y3."
  upside:
    description: "The first customer expands faster, a second channel partner works, and deployments stay standardized."
    y3RevenueK: 1290.0
    y3EbitdaK: -180.0
    cashLowPointK: 820.0
    keyAssumptionChanges:
      - "Second and third customers land one quarter earlier than base."
      - "Expanded customer monthly revenue rises from 15K to 18K."
      - "Gross margin reaches 75% by Q4Y3 and monthly churn falls to 1.5%."
