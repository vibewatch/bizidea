    y3RevenueImpactK: -141.0
    cashImpactK: -102.0
  - variable: CAC
    downsideCase: "CAC rises to $60K because pilots require more founder and AE time"
    baseCase: "Steady-state CAC of $44K"
    upsideCase: "CAC falls to $35K through referrals and repeatable case studies"
    y3RevenueImpactK: 0.0
    cashImpactK: -120.0
  - variable: churn
    downsideCase: "Monthly logo churn rises to 3.5%"
    baseCase: "Monthly logo churn of 2.5%"
    upsideCase: "Monthly logo churn falls to 1.5%"
    y3RevenueImpactK: -96.0
    cashImpactK: -128.0
  - variable: sales cycle
    downsideCase: "New logos close two quarters later than planned"
    baseCase: "4-6 month founder-led enterprise cycle"
    upsideCase: "Referenceability shortens closing time by one quarter"
    y3RevenueImpactK: -118.0
    cashImpactK: -147.0
  - variable: gross margin
    downsideCase: "Gross margin stalls at 68% because support remains manual"
    baseCase: "72% steady-state gross margin"
    upsideCase: "Gross margin reaches 75% with cleaner integrations"
    y3RevenueImpactK: 0.0
    cashImpactK: -75.0
  - variable: hiring pace
    downsideCase: "One engineering and one GTM hire slip by two quarters"
    baseCase: "Team scales to 12 FTE by Q4Y3"
    upsideCase: "Hiring stays on plan and capacity is fully utilized"
    y3RevenueImpactK: -85.0
    cashImpactK: 62.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Leads --> PaidPilots
      PaidPilots --> ProductionCustomers
      ProductionCustomers --> PlatformFees
      ProductionCustomers --> PerJobFees
      PlatformFees --> Revenue
      PerJobFees --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> EBITDA
      EBITDA --> Cash
modelSanity:
  - checkName: Revenue engine
    finding: "Base-case revenue comes from one design partner converting in Y1, expanding existing logos across clusters, and exiting Y3 with 8 paying customers at about $154K blended ARR."
  - checkName: Must go right
    finding: "The first deployment has to go live within 8 weeks and convert at roughly the BP's 60% pilot-to-production target so GTM spend compounds instead of resetting."
  - checkName: Model breaks if
    finding: "If sales cycles slip by two quarters or churn rises to 3.5%, downside cash falls toward $140K and the company likely needs an earlier bridge round."
  - checkName: Next-round proof
    finding: "The seed story is credible once the company has 3 production customers, repeatable sub-8-week deployments, and one adjacent-category pilot using the same core workflow."
sanityChecks:
  ruleOf40: "Y3 growth 158.4% + EBITDA margin -52.7% = 105.7%"
  burnMultiple: "Improves from 1.3x in Y2 ($605K burn / $468K net new ARR) to 0.8x in Y3 ($494K burn / $656K net new ARR)."
  revenuePerFte: "$83K Y3 using 11.25 average FTE (below the $200-400K SaaS benchmark because the model assumes integration-heavy pre-scale deployments)."
  flags:
    - "Y3 revenue is only slightly below the research SOM, so the model leaves limited room for execution misses without adjacent-category expansion."
    - "Revenue per FTE remains well below typical SaaS benchmarks through Y3, which is acceptable only if implementation work standardizes materially after the first three customers."
    - "Customer concentration remains high; the top three logos likely still represent a majority of Y3 revenue."
    - "Gross margin depends on keeping trust operations productized rather than staffing a high-touch incident-services layer."
