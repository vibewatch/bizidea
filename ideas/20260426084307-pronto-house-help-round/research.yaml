  validationPlan:
  - priority: high
    question: Will platform buyers pay per completed job for trust workflow, or only for fixed-seat / fixed-platform software?
    evidenceToGather: 10 buyer interviews with heads of ops/trust across instant home services, beauty-at-home, and repair marketplaces; ask for current vendor line items and approval thresholds.
  - priority: high
    question: 'Which in-visit workflow actually changes outcomes: household verification, guard-gate check-in, timed worker check-ins, or structured evidence capture?'
    evidenceToGather: Shadow incident-resolution and worker-support processes at one marketplace for 1-2 weeks; map time spent, failure points, and which events recur.
  - priority: medium
    question: Will workers perceive the product as safety infrastructure or as surveillance?
    evidenceToGather: 15-20 worker interviews and prototype tests focused on SOS, check-ins, fines, and privacy disclosure language.
  - priority: medium
    question: Can apartment-community operators become a second wedge before broader category expansion?
    evidenceToGather: Pilot conversations with staffing operators and large residential communities about police verification, gate protocols, and contractor logs.
