openQuestions:
- Can household-side verification be introduced without hurting conversion or creating perceived discrimination against certain addresses or buildings?
- 'What specific KPI unlocks budget fastest: incident-rate reduction, repeat-booking uplift, worker retention, or lower support handling time?'
- Will workers trust check-ins and SOS tooling enough to adopt it, or will they see it as another ratings-and-fines control layer?
- How much of the required building and access-control data can be integrated systematically versus handled through manual SOPs?
