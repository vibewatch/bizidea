market:
  tam:
    value: $14.5M
    rationale: 'Bottom-up estimate: FY2025 online home-services NTV of about ₹41-43B [12], divided by an estimated blended order value of ~₹350 (anchored by instant-help tickets starting near ₹99/hour [17][19] and broader higher-ticket Urban services [20][21]) implies roughly 120M annual online in-home jobs. Applying an estimated ₹8/job trust fee plus ~100 enterprise/community contracts at ₹2.5M/year yields ~₹1.21B revenue opportunity, or about $14.5M.'
    isEstimate: true
    sourceRefs:
    - 12
    - 17
    - 19
    - 20
    - 21
  sam:
    value: $3.4M
    rationale: Beachhead SAM narrows to instant domestic-help platforms plus large apartment staffing operators in top Indian metros. Leading instant-help platforms already process roughly 2-3M jobs monthly [5], and Redseer says top-8 cities account for 85-90% of online demand [12]. Using ~30M relevant annual jobs x ₹8 plus ~20 contracts x ₹2M gives ~₹280M, or about $3.4M.
    isEstimate: true
    sourceRefs:
    - 5
    - 12
  som:
    value: $1.0M
    rationale: Illustrative year-3 SOM assumes 3 platform customers and 8 large apartment/community operators, together covering ~8M annual jobs at ₹8 each plus 11 contracts at ~₹2M/year. That totals ~₹86M, or about $1.0M, which is plausible only with strong workflow integration and visible incident/repeat-booking ROI.
    isEstimate: true
    sourceRefs:
    - 5
    - 6
    - 12
    - 14
