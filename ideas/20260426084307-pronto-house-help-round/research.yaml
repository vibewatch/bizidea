competitors:
- name: AuthBridge
  stage: incumbent
  wedge: Broad Indian identity, background-check, and gig-worker verification suite.
  pricing: Custom / not publicly disclosed
  strength: Deep verification breadth, strong enterprise credibility, and adjacent field-verification capabilities.
  weaknessVsUs: Optimized for onboarding and compliance checks, not live two-sided in-home safety workflow or incident operations.
  sourceRefs:
  - 28
  - 33
- name: OnGrid
  stage: scale-up
  wedge: Fast, self-serve background verification for HR and compliance teams.
  pricing: Custom / not publicly disclosed
  strength: Instant BGV, strong preliminary TAT claims, and blue-collar hiring focus.
  weaknessVsUs: Geared to candidate screening and HR workflows rather than household verification, building protocols, or in-visit escalation.
  sourceRefs:
  - 29
- name: IDfy
  stage: scale-up
  wedge: Integrated identity platform spanning employee BGV, onboarding journeys, video KYC, and DPDP-adjacent tooling.
  pricing: Custom / not publicly disclosed
  strength: Breadth, orchestration, and strong onboarding product surface.
  weaknessVsUs: Still centered on onboarding/fraud workflows; does not appear tailored to recurring home-visit risk graphs or worker-safety operations.
  sourceRefs:
  - 30
- name: HyperVerge
  stage: scale-up
  wedge: AI-led KYC and onboarding with low-bandwidth and conversion-oriented UX.
  pricing: Custom / not publicly disclosed
  strength: Strong KYC economics, global deployment, and plug-and-play identity tooling.
  weaknessVsUs: Customer-onboarding focused rather than marketplace trust-and-safety inside private homes.
  sourceRefs:
  - 31
- name: Signzy
  stage: scale-up
  wedge: Video KYC and fraud tooling designed for regulated onboarding flows.
  pricing: Custom / not publicly disclosed
  strength: Fast go-live, compliance framing, and strong fraud detection positioning.
  weaknessVsUs: Primarily a regulated-finance onboarding product; weak fit for operational safety during an in-home service visit.
  sourceRefs:
  - 32
