signals:
  - title: "Capital is flooding instant home services"
    summary: "Pronto and Snabbit are both raising big rounds within days of each other, suggesting investors now treat instant house help as a real category rather than a one-off experiment."
    sourceRefs: [1, 2, 5]
  - title: "Dense micro-markets matter more than city coverage"
    summary: "The reporting repeatedly stresses neighborhood density, utilization, and micro-market execution as the main drivers of economics."
    sourceRefs: [1, 2, 3]
  - title: "Trust and safety are core product requirements"
    summary: "Across Reuters, BBC, and newspaper coverage, worker safety, verification, ratings, and grievance handling appear as the main adoption constraints."
    sourceRefs: [3, 4, 8, 9]
  - title: "Informal domestic work is under pressure"
    summary: "Coverage of protests, wages, and legal disputes shows the underlying labor pool is low-paid, fragile, and increasingly organized around grievances."
    sourceRefs: [5, 6, 7, 10, 11, 12]
  - title: "Workers are being sold formalization"
    summary: "Companies pitch bank salary payments, insurance, training, and fixed schedules as the reason workers should switch from informal arrangements."
    sourceRefs: [4, 7, 9, 10, 11, 12]
  - title: "Customers still use it as a backup, not a default"
    summary: "The articles show many households using instant help when regular staff are absent, which suggests repeat habit is still emerging."
    sourceRefs: [4, 7, 8, 10, 12]
  - title: "Low ticket sizes force subsidy-heavy growth"
    summary: "The market coverage says providers are discounting heavily and burning cash to make a $1-or-so service feel reliable enough to use."
    sourceRefs: [1, 3, 4, 12]
  - title: "Incumbents are forced to react"
    summary: "Urban Company's instant-helper push shows the largest home-services platform is also moving deeper into the same category."
    sourceRefs: [3, 12]
