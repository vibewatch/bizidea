jobsToBeDone:
- job: 当平台扩张到新的高密度社区时，帮助运营团队让上门服务变得安全且可审计，以便在不发生重大事故的情况下赢得住户复购。
  currentAlternative: 人工 SOP 加碎片化核验供应商
  successMetric: 复购率和每 10,000 单的事件率
- job: 当服务人员进入陌生人家中时，帮助信任团队实时监控并升级风险，从而保护服务人员并以证据解决纠纷。
  currentAlternative: 电话支持和事后投诉处理
  successMetric: 事件响应时间中位数和服务人员留存
ideaScorecard:
  signalStrength:
    score: 5
    rationale: 多个已核实来源指向同一趋势：赛道资本、安全痛点和劳务脆弱性正在同时上升。
  painIntensity:
    score: 5
    rationale: 一次严重的信任或安全事故，就可能阻断微市场扩张、伤害服务人员供给，并永久损害住户采纳。
  wedgeClarity:
    score: 4
    rationale: 首个产品切口具体且紧迫，但需要与平台运营工作流深度集成。
  defensibility:
    score: 4
    rationale: 一张跨平台的上门信任图谱与事件数据集，可以累积成强数据与集成护城河。
  ventureScale:
    score: 4
    rationale: 初始滩头市场较窄，但同一安全基础设施可延展到所有上门服务品类和地区。
topRisks:
- name: 平台选择内部自建
  description: 大型市场平台一旦达到足够规模，可能尝试自行拼装信任栈。
  mitigation: 通过更快实施、跨平台基准数据，以及内部难以复刻的专业化事件工作流抢先获胜。
- name: 服务人员采纳摩擦
  description: 额外签到或监控可能被视为惩罚性机制，进一步恶化服务人员情绪。
  mitigation: 将产品设计为服务人员保护工具，提供 SOS、证据留存、保险挂钩与透明使用政策。
- name: 责任集中
  description: 承接安全工作流后，即使事故仍然发生，公司也可能被归责。
  mitigation: 将产品定位为决策支持与工作流基础设施，保持清晰的合同边界，并与保险和响应供应商合作覆盖受监管环节。
