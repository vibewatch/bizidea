businessModelCanvas:
  customerSegments: ["即时家政帮工平台", "到家服务平台", "公寓社区用工运营方"]
  valuePropositions: ["降低入户事故", "提升复购信任", "把工人安全工作流规范化", "沉淀可复用的信任通行证"]
  channels: ["直销给平台高层", "在新微市场启动试点", "通过风控与运营关系引荐"]
  customerRelationships: ["高触达实施", "共享安全看板", "季度风险复盘"]
  revenueStreams: ["平台订阅费", "每单安全服务费", "高级事故响应模块"]
  keyResources: ["风险图谱数据", "工作流集成能力", "信任与安全操作手册", "事故运营团队"]
  keyActivities: ["核验编排", "风险评分", "事故记录与升级", "平台集成"]
  keyPartners: ["KYC 供应商", "保险公司", "公寓门禁系统", "紧急响应服务商"]
  costStructure: ["产品研发", "集成实施", "信任运营", "客户成功", "合规"]
jobsToBeDone:
  - job: "当平台向一个新的高密度社区扩张时，帮助运营团队把入户服务做得既安全又可审计，从而在不出大事故的前提下拿下家庭用户的重复需求。"
    currentAlternative: "人工 SOP 加零散的核验供应商"
    successMetric: "复购率，以及每 10,000 单事故率"
  - job: "当工人走进陌生人的家里时，帮助信任团队实时监控并升级风险，从而保护工人，并在出现纠纷时拿得出证据。"
    currentAlternative: "电话支持和事后投诉处理"
    successMetric: "事故响应时间中位数，以及工人留存"
ideaScorecard:
  signalStrength:
    score: 5
    rationale: "多家经过验证的来源都指向同一个趋势：赛道资本、安全痛点和劳动力脆弱性正在同时上升。"
  painIntensity:
    score: 5
    rationale: "一次严重的信任或安全事故，就可能让微市场扩张停摆、伤到工人供给，并永久打击住户采纳。"
  wedgeClarity:
    score: 4
    rationale: "首个产品切口足够具体、也足够紧迫，只是需要和平台运营工作流做深度集成。"
  defensibility:
    score: 4
    rationale: "一张跨平台的入户信任图谱，加上事故数据集，能逐步累积成很强的数据与集成护城河。"
  ventureScale:
    score: 4
    rationale: "滩头市场很窄，但同一套安全护栏可以延伸到所有入户服务品类和更多地域。"
topRisks:
  - name: "平台内部自建"
    description: "大型交易平台一旦做到一定规模，可能会尝试把自己的信任栈拼出来。"
    mitigation: "尽早拿下客户，靠更快实施、跨平台基准数据和难以在内部重建的专业事故工作流取胜。"
  - name: "工人采纳摩擦"
    description: "额外签到或监控可能被工人感知为惩罚，进一步恶化他们的情绪。"
    mitigation: "把产品设计成保护工人的工具，突出 SOS、证据采集、保险挂钩和透明使用政策。"
  - name: "责任集中"
    description: "一旦公司承接安全工作流，即便事故仍然发生，也可能被归咎。"
    mitigation: "把自身定位成决策支持与工作流基础设施，明确合同边界，并与保险和响应服务商合作承接受监管的保障部分。"
