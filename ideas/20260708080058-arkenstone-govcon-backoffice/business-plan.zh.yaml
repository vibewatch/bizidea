slug: contract-triggered-govcon-os
date: '2026-07-08'
executiveSummary: 合同触发式 GovCon OS 瞄准的是一个具体而且有时间硬约束的失效点：一家 30-150 人的 dual-use 国防创业公司刚拿到，或即将拿到，第一笔带 CUI 的分包合同，才发现 CMMC、合规薪资与工时、保险、人员安全和买方 onboarding 都得在开工前就位。眼前的买家是 COO 或总裁，他们要对合同启动风险负责，现在只能在截止日期前，拉着顾问、broker、薪资供应商和表格硬协调。最初产品不该去替换 ERP、薪资系统或评估机构，而应从一份真实合同入手，把条款和范围假设拆成一张依赖图，再输出一份可复用的供应商 passport 材料包。研究说明，这个问题确实有付费意愿：官方测算的 Level 2 首个周期准备成本就超过 $100k，而更广泛的实施工作往往会变成一个六位数、跨多个季度的项目。最好的 GTM 是围绕一个真实 readiness 项目做付费试点，通过国防 VC 组合、C3PAO/MSP 伙伴和主承包商供应商团队切入——这些渠道最早就能看到紧迫性。公司只有在自己表现得像一层压在碎片化供应商之上的编排软件，而不是另一家重服务的 GovCon 顾问公司时，才有机会赢。滩头市场看起来能赚钱，但还没明显到 venture-scale：研究测算的 SAM 约 $27.0M，若第 3 年做到大约 30 个活跃客户，SOM 约 $1.4M，所以后续扩张要靠证明多项目复用和面向买方的 onboarding 可以规模化。最关键的反证风险有三点：主承包商可能不接受可复用的供应商 passport；太多客户仍然想要定制化代办服务；以及每年真正流入带 CUI 的 dual-use 新进入者，可能比公开资料显示的更少。
problem:
- 当一家 dual-use 创业公司从原型项目或 OTA 工作走向第一笔主承包分包或后续项目时，CMMC、薪资/工时、保险、人员安全和供应商 onboarding 会在同一时间线上一起变成收入阻塞项。
- 今天的替代方案——创始人自己拉着表格，在顾问、broker、PEO 和合规工具之间协调——会带来盲目的前置投入、重复的证据劳动，以及在评估员或伙伴产能紧张时直接错过 kickoff 窗口。
solution:
- 导入一份真实合同或分包合同，把条款和客户范围假设映射成按里程碑推进的 readiness 图谱，明确在 kickoff、涉密作业、开票或招聘前，网络安全、薪资、保险、人员安全和云任务分别该按什么顺序做。
- 把产出的材料沉淀进一份可复用的供应商 passport 材料包，供客户发给主承包商和合作方；执行层仍交给筛过的第三方伙伴，而不是逼创业公司一上来就把整套 GovCon 栈全买齐。
whyWeWin:
- 现有 GovCon ERP、横向合规工具和各类专业服务各自只占工作流的一段，但没有谁是从那份真正让跨部门问题同时爆发的实时合同开始。
- 每完成一个项目，系统都能把 clause-to-task 图谱、伙伴 SLA 基准和买方接受的证据模板再磨一遍；这些切换成本，是人工顾问和点工具积不出来的。
strategicChoices:
  beachhead: 美国 30-150 人的 dual-use 自主系统、机器人和 defense-AI 创业公司；它们正进入第一笔带 CUI 的主承包分包或后续国防项目，而且只有 180 天窗口把 readiness 搭起来。
  wedgeRationale: 创业公司一侧的滩头市场比“所有 GovCon 软件”窄得多，但最容易先证真：一笔真实授标会同时带来明确买家、硬 deadline 和可量化结果——项目能否按时开工。要是一开始卖给主承包商或广义上的成熟 GovCon，公司会被拉进沉重的 ERP 或采购流程，销售周期也会先拉长，反而在合同导入这个切口被证实之前就偏航。
  sequencingRationale: 产品第一阶段先做合同导入、依赖排程、证据存储和伙伴路由，因为只有这几块拼起来，才能真正降低单个真实项目的 kickoff 风险。GTM 继续由创始人主导、配合渠道切入创业公司；C3PAO、云伙伴、保险商和主承包商先做伙伴，不做 record customer。只有在试点转正、供应商 passport 也被外部接受之后，才该加主承包商侧的网络产品、更深的 ERP 集成或更宽的承包商细分。招聘也按同样顺序：先工程和合规，再实施和客户运营，最后才是规模化销售。
  notYet:
  - 已有成熟 ERP 足迹、且跨部门采购要求复杂的老牌 GovCon 企业
  - 完整替换 ERP、总账或薪资系统
  - 以 facility clearance 和重度 DD254/NISPOM 执行为核心的涉密项目工作流
  - 用公司自己的资产负债表直接承接薪资、保险或认证服务交付
market:
  tam: $376.0M 的估算 TAM：按预计需要做 CMMC Level 2 C3PAO assessment 的 8,350 家实体，乘以建模后的 $45k 年度编排 ACV。
  sam: $27.0M 的估算 SAM：按初始滩头市场里约 600 家商业/dual-use 新进入者和小型扩张供应商，乘以约 $45k ACV。
  som: 第 3 年 SOM 约 $1.4M：对应大约 30 个活跃客户、每个 $45k 的混合年度合同价值。
  segments:
  - 主要：正进入第一笔带 CUI 的实质性国防项目的美国 dual-use 自主系统、机器人和 defense-AI 创业公司
  - 次要：需要更快看清风投支持型创业供应商 readiness 状态的主承包商供应商发展与 onboarding 团队
  buyingProcess: 一旦后续授标或主承包商 down-select 触发了合同启动 deadline，最先感到痛的通常是 COO、运营负责人或财务/合规负责人。交易最好从一个真实项目的付费试点开始，经济审批来自 COO 或总裁，安全、人力运营、财务以及外部 GovCon 顾问都会给意见。
product:
  mvp: MVP 应该能导入一份真实合同或分包合同，记录与 CUI、云环境和项目类型相关的范围假设，然后跨 CMMC、薪资/工时、保险、人员安全和面向买方的证据要求，自动生成里程碑计划。它需要有证据库、伙伴路由和供应商 passport 导出，但不该去做完整 ERP 替换、薪资执行或自动化合规建议。
  sixMonth: 交付 2-3 个共创客户试点，具备合同导入、readiness 图谱生成、任务归属、伙伴路由、材料存储和基础供应商 passport 导出。
  twelveMonth: 把首批试点转为正式上线，补齐到期/续期跟踪、主承包商可读的 readiness 材料模板、伙伴 SLA 分析，以及 1 个薪资/工时或 GovCon ERP 集成。
  twentyFourMonth: 只有在试点证明能明显加快 kickoff、且外部接受供应商 passport 之后，才从单项目编排扩到多项目复用，并加一个有限的主承包商视图。
  keyBets:
  - 创业公司会在承诺做更大范围 GovCon ERP 替换之前，先为合同启动编排买单。
  - 第一个真正可用的产品，是合同到任务的图谱加证据层，而不是单独一套服务包或控制项清单库。
  - 可复用的供应商 passport 材料，对主承包商和合作方足够有价值，能支撑后续项目重复使用。
  - 只要公司拒绝自己端到端接手人工交付，伙伴主导的执行模式就能把毛利率守在 70% 以上。
gtm:
  wedge: 卖给一家必须在 kickoff 前清掉 CMMC、薪资/工时、保险和安全阻塞项的 dual-use 创业公司 COO，围绕一个真实国防项目做付费试点。
  channels:
  - 创始人主导外呼，以及通过国防 VC、加速器和商业化项目组合转介绍
  - C3PAO、CMMC MSP 和政府云伙伴——它们往往会在 assessment 或迁移 deadline 前几个月就先看到问题
  - 已经在筛查创业公司网络安全 readiness 和 onboarding 完整度的主承包商供应商发展团队
  funnelTargets: Intro→合格 readiness review 30-40%；合格 review→付费试点 25-35%；试点→年度订阅 60%+；首个项目→第二个项目或伙伴附加销售 35%+（12 个月内）。
  pricing: 先围绕一个真实 readiness 项目收范围明确的付费试点费，再转成按活跃 readiness 项目收的年度订阅费；通过工作流启用的合规、薪资、保险和安全伙伴，额外抽 marketplace take rate。这样定价既低于六位数的一揽子服务成本，又能把价值直接绑在避免 kickoff 延误和复用证据上。
businessModel:
  revenueStreams:
  - 按活跃 readiness 项目收年度软件订阅费
  - 首份合同映射、模板搭建和第一套系统集成收实施费
  - 平台里被启用的第三方合规、薪资、保险和安全服务收 marketplace 抽成
  unitOfValue: 从合同导入到具备开工条件的活跃 readiness 项目
  targetGrossMarginPct: 70
  expansionLevers:
  - 从单个项目扩到同一家创业公司里的重复授标和更多业务单元
  - 在外部接受被证实后，再加主承包商侧的供应商 passport 席位或工作流访问
  - 提高 C3PAO、云、薪资/工时、保险和人员安全供应商的伙伴附加率
  - 等创业公司打法和集成组合验证稳定后，再向更晚期的供应商上移
strategyMap:
  northStarMetric: 在 deadline 当天或之前达到 contract-ready kickoff，且带上可复用供应商 passport 材料包的活跃 readiness 项目数
  inputMetrics:
  - 从合同导入到产出第一版完整 readiness 计划的中位天数
  - 试点转年度订阅的转化率
  - 供应商 passport 材料被主承包商、C3PAO 或买方接受为可用起始包的项目占比
  - 每个活跃项目里由伙伴导致的延误天数中位数
  - 第二个项目里复用既有材料而不是从零重建证据的占比
  moatsToBuild:
  - 按项目原型把 FAR、DFARS、CMMC、云、薪资、保险和安全依赖映射成 clause-to-readiness 图谱
  - 按公司画像沉淀伙伴延迟、整改模式和到 kickoff 时间的基准数据
  - 会随更多后续项目一起滚厚的买方接受型供应商 passport 模板和续期历史
  - 通过主承包商、C3PAO、MSP 和 defense-tech 投资组合拿到的渠道入口——它们会比 ERP 厂商更早看到 readiness 断崖
  killCriteria:
  - 前 20 个 ICP 访谈里，如果不到 10 个展示出 180 天内带预算、跨职能阻塞的真实 readiness 事件，就该停。
  - 前 4 个付费试点里，如果不到 2 个能在 6 个月内转成年订阅，就该停。
  - 前 3 次共创客户评审里，如果没有任何主承包商、C3PAO 或供应商 onboarding 干系人愿意把供应商 passport 导出件当作起始材料包，就该停。
  - 第一套模板上线后，如果每个新项目的内部人工仍高于 20 小时，说明这更像服务经济，不像软件复用。
  mermaid: "flowchart LR\n  Wedge[合同触发的创业公司 readiness 切口] --> MVP[合同导入与 readiness 图谱 MVP]\n  MVP --> Proof[按时开工与可复用供应商 passport]\n  Proof --> Expansion[多项目复用与主承包商侧工作流]\n"
investorMemo:
  verdict:
    call: Watch
    conviction: 痛点强、时点也清晰，但在公司证明滩头市场密度够高、且产品能守住软件属性而不是滑成托管服务层之前，venture conviction 仍只能算中等。
    whyBelieve: CMMC 的逐步落地、主承包商的供应商要求，以及六位数 readiness 开支，共同造出了一个真实的合同启动问题，而现有 ERP 和合规工具并没有把它从头到尾解决掉。
    whyDoubt: 公开证据还没说明：每年到底有多少 dual-use 创业公司会撞上这个 readiness 悬崖，主承包商也是否愿意接受可复用的供应商 passport 输出。
    nextDiligence: 验证 2-3 个付费试点，再做 2 次外部材料包评审，证明供应商 passport 既能加快 kickoff 规划，也能被买方真正接受。
  firstCustomer:
    title: 一家 30-150 人的 dual-use 自主系统或机器人创业公司 COO，正进入第一笔带 CUI 的主承包分包合同
    profile: 一家有真实项目需求、却还没有成熟 GovCon 栈的美国风投支持型 defense-tech 创业公司；现在它面对的合同启动 deadline，已经要求自己拿出 CMMC、合规薪资/工时、保险和安全 onboarding。
    trigger: 后续授标、主承包商 down-select，或分包 kickoff，逼着公司在开工或开票前先证明 readiness。
    buyer: COO 或总裁
    initialContract: 围绕一个真实项目做 8-12 周、约 $25k-$50k 的付费试点；之后转成每个活跃 readiness 项目约 $45k-$75k 的年度订阅，再叠加客户把工作流复用到后续授标时带来的伙伴附加收入。
  mustBeTrue:
  - 至少一半被访的 ICP，必须在 180 天内面临真实的合同启动 deadline，而且阻塞项要同时跨网络安全、薪资/工时、保险和安全，而不只是网络安全。
  - 前 4 个付费试点里，至少 2 个要在 6 个月内以 $45k+ ACV 转成年订阅。
  - 至少 2 位来自主承包商或 C3PAO/MSP 伙伴的外部干系人，要愿意在只做模板级修改的前提下接受供应商 passport 导出件。
  - 第一版模板搭好后，每个新项目的内部交付中位时间，必须在伙伴 pass-through 工作之外压到 20 小时以下。
  - 可触达的滩头市场里，合格 logo 和渠道流量必须足以支撑第 3 年做到约 30 个活跃客户。
  diligenceQuestions:
  - 每年到底有多少 30-150 人的 dual-use 创业公司，会真正跨进带 CUI 的主承包或后续项目？
  - readiness 时钟开始转时，预算最先由谁拍板：COO、总裁、财务，还是安全负责人？
  - 主承包商和供应商团队到底接受哪些材料，哪些环节仍然要求定制 portal 重填？
  - 客户总支出里，持续性软件收入和一次性伙伴 pass-through / 实施费分别占多少？
  - 公司能不能接入现有薪资/工时或 GovCon ERP 系统，而不是把每次部署都做成定制服务？
operatingAssumptions:
- assumption: 每年有足够多 30-150 人的 dual-use 创业公司进入第一笔带 CUI 的项目，能撑起一个聚焦但高紧迫性的滩头市场。
  basis: research.yaml
  validationTest: 回看 10-15 个最近的投资组合、加速器 cohort 和主承包商供应商管线，确认全国每年至少有 75 个候选，且前 3 年里有 30 个可触达 logo。
  decisionImpact: 如果不成立，公司就得往更广的 GovCon 供应商上移，或者转向主承包商侧的 onboarding 工作流。
- assumption: COO 和总裁会在承诺做完整 ERP 或自建 GovCon 栈之前，先为一层合同启动编排软件买单。
  basis: idea.yaml
  validationTest: 跑 6 轮从发现到提案的流程，拿下至少 2 个有明确高管 sponsor 和专项预算的付费试点。
  decisionImpact: 如果不成立，产品就得通过伙伴销售，或重定位成现有 GovCon 工具里的附加模块，而不是独立平台。
- assumption: 供应商 passport 材料可以变成一件可复用的外部工件，而不只是内部项目管理视图。
  basis: research.yaml
  validationTest: 和主承包商、C3PAO 或供应商 onboarding 团队完成 3 次 mock packet review，至少拿到 2 次“可以拿这份材料当起始文档”的认可。
  decisionImpact: 如果不成立，网络和扩张叙事就会变弱，产品应聚焦内部 readiness 执行 ROI。
- assumption: 大部分交付工作都能由伙伴主导、靠模板驱动，这样公司才能守住软件毛利。
  basis: idea.yaml
  validationTest: 前 5 个真实项目里，至少 70% 的执行支出走伙伴，且 kickoff 后的内部人工中位数压到 20 小时以下。
  decisionImpact: 如果不成立，招聘和资金需求都会明显上升，公司要么接受重服务模式，要么收窄范围。
- assumption: 一套通用的合同到任务模型，可以覆盖多数早期自主系统、机器人和 defense-AI 项目，而不必每个客户都写定制代码。
  basis: operator judgment
  validationTest: 映射 10 份滩头市场合同，证明一套可配置模板系统能覆盖至少 80% 的必需任务和字段。
  decisionImpact: 如果不成立，在模板覆盖率上来前，滩头市场就得先缩到一种项目原型。
experimentRoadmap:
- horizon: 0-90 天
  experiment: 和正逼近第一笔带 CUI 项目的 dual-use 创业公司，做 20 次 ICP 访谈和 10 次合同材料评审。
  hypothesis: 这个滩头市场里，合同触发的 readiness 事件是可重复出现的，而且紧迫性和预算都足以支撑付费试点。
  successMetric: 至少 10 次访谈揭示出 180 天 deadline 下的跨职能阻塞项，且至少 4 个潜在客户愿意进入试点界定。
  owner: 创始人/CEO
- horizon: 0-90 天
  experiment: 拿一份 mock 供应商 passport 材料包，去测 2 个主承包商供应商团队和 2 个 C3PAO/MSP 伙伴。
  hypothesis: 如果材料能贴近他们今天的评审字段，外部审阅方会接受一份标准化的材料包作为可用起点。
  successMetric: 至少 2 位审阅方愿意在只做模板级 redline 的前提下批准试点使用，而不是要求彻底重做。
  owner: 创始人/CEO
- horizon: 0-90 天
  experiment: 通过国防 VC、加速器和伙伴转介绍渠道，正式报价付费试点。
  hypothesis: 按项目收费的试点会比卖整个平台更快成交，因为触发器就是一笔真实授标。
  successMetric: 前 6 份合格提案里至少 2 份转成付费试点，且至少 2 个渠道能产出合格会面。
  owner: 创始人/CEO
- horizon: 90-180 天
  experiment: 上线第一批真实试点，交付合同导入、readiness 图谱、材料库和伙伴路由。
  hypothesis: MVP 能比表格和供应商邮件更早暴露阻塞依赖，也能明显缩短规划时间。
  successMetric: 前 3 个试点都能在收到合同后 72 小时内生成完整 readiness 计划，且 kickoff 规划时间比基线至少下降 25%。
  owner: 创始工程师
- horizon: 90-180 天
  experiment: 把 1 家 C3PAO/MSP、1 家薪资/工时伙伴和 1 家保险 broker 嵌进工作流。
  hypothesis: 伙伴编排可以被标准化，足以降低创始人协调负担，而不用把服务交付收回公司内部。
  successMetric: 伙伴激活任务在至少 80% 的里程碑上按 SLA 完成，且 kickoff 后每个项目的内部人工协调压在 20 小时以下。
  owner: GovCon 合规产品负责人
- horizon: 180-360 天
  experiment: 在客户第二个项目上证明材料复用，同时上线 1 个薪资/工时或 ERP 集成。
  hypothesis: 可复用证据和系统集成会显著提升续费与留存，足以支撑年度订阅。
  successMetric: 第二个项目的搭建时间至少下降 30%，且至少 2 个正式客户完成续费或扩到另一条活跃项目线。
  owner: 客户运营负责人
- horizon: 12-18 个月
  experiment: 为 1 个共创客户或 onboarding 团队推出有限的主承包商视图。
  hypothesis: 只有在创业公司侧 ROI 和材料质量都被证明后，面向买方的工作流才是对的扩张路径。
  successMetric: 至少 1 家主承包商伙伴会在真实创业供应商上主动使用这个视图，并把自己的评审周期拉短。
  owner: 创始人/CEO
operations:
- 维护一套按版本管理的 clause-to-task 库，覆盖 FAR、DFARS、CMMC、DD254、NISPOM 以及和滩头市场相关的云范围变体。
- 每周和 C3PAO/MSP、薪资/工时供应商、保险 broker 及人员安全专家一起复盘伙伴产能和 SLA。
- 把每一份材料、到期日、审阅 redline 和范围假设都收进同一个证据库，让后续项目能复用已被接受的工作，而不是从头再做。
- 在模板覆盖率足够高之前，合同范围界定和买方材料质量都保留人工审查，避免边缘案例里产生虚假的确定感。
team:
- role: 创始人/CEO
  startTiming: Month 0
  rationale: 亲自抓共创客户销售、定价、渠道伙伴和产品范围界定，因为最先要验证的是：合同启动的紧迫性到底能不能转成付费试点。
- role: 创始工程师
  startTiming: Month 0
  rationale: 搭出合同导入、readiness 图谱生成、材料存储，以及付费试点必需的第一批工作流集成。
- role: GovCon 合规产品负责人
  startTiming: Month 2-4
  rationale: 把 FAR/DFARS/CMMC 和供应商 onboarding 逻辑写进可复用模板里，避免产品滑成定制顾问服务。
- role: 解决方案与伙伴运营负责人
  startTiming: Month 6-9
  rationale: 把和 C3PAO、云伙伴、保险商及薪资/工时供应商的集成和运营打法跑顺。
- role: 客户运营负责人
  startTiming: Month 9-12
  rationale: 对试点交付质量、续费准备，以及把重复例外沉淀进更好模板和证据输出负责。
milestones:
- horizon: 0-12 个月
  items:
  - 拿下 2-3 个来自创业公司、伙伴或投资组合渠道的付费试点。
  - 证明合同到计划的生成可以在 72 小时内完成，且 kickoff 规划时间比客户之前的表格流程至少低 25%。
  - 至少拿下 2 次外部评审，让供应商 passport 材料被当作可用的起始文档。
  - 上线 1 条真实的伙伴路由工作流，以及 1 个薪资/工时或 ERP 集成。
- horizon: 12-24 个月
  items:
  - 把至少 5-8 个客户转成年度订阅，并在至少 2 个账户里证明第二个项目可以复用。
  - 通过以下至少 2 类渠道跑出可重复动作：国防 VC 组合、C3PAO/MSP 伙伴、主承包商供应商团队。
  - 把交付模式推进到：多数常见 readiness 项目都能用可配置模板，而不是写定制代码。
- horizon: 24-36 个月
  items:
  - 做到约 30 个活跃客户，对应研究里的第 3 年 SOM 情景。
  - 只有在供应商 passport 的接受度和复用数据都很强时，才上线有限的主承包商 onboarding 或监控产品。
  - 沉淀关于到 kickoff 时间、伙伴延迟和证据复用的基准数据，让切换成本高过点工具和顾问。
risks:
- risk: 客户期待公司直接代做薪资、保险、安全和认证工作，而不是编排伙伴。
  likelihood: High
  impact: High
  mitigation: 把工作流产品化，限制定制实施，把执行明确分发给带 SLA 的合作伙伴，并拒绝任何会把公司变成通用 GovCon 服务商的 scope。
- risk: 即便软件有效，C3PAO、云迁移伙伴或人员安全服务商的外部产能瓶颈仍会拖慢客户。
  likelihood: Medium
  impact: High
  mitigation: 通过优选伙伴汇总需求，尽早在计划里暴露 backlog 风险，并把客户引导到正式合同启动前更早的阶段性 readiness 里程碑。
- risk: 主承包商或 onboarding 团队不接受供应商 passport 材料，仍要求客户去现有 portal 里重新录入。
  likelihood: Medium
  impact: High
  mitigation: 按当前供应商审查字段来设计输出，尽早测试材料接受度，在真实审阅方接受格式之前，不急着扩网络产品。
- risk: 滩头市场公司的实际年度流量，比建模时假设的 SAM 更小或更慢。
  likelihood: Medium
  impact: High
  mitigation: 只筛选有明确 deadline 的合同触发型创业公司，用伙伴和投资组合数据验证密度，并准备在量不够时往更晚期供应商上移。
- risk: 现有 ERP、合规平台或服务商把足够多的编排能力打包进去，压缩独立定价空间。
  likelihood: Medium
  impact: Medium
  mitigation: 把差异化守在合同导入、跨职能依赖排程、可复用证据和可量化 kickoff 结果上，而不是泛泛的合规自动化。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: 这笔钱要覆盖 18 个月：把合同导入、readiness 图谱和证据复用的产品搭出来；跑 2-3 个付费创业公司试点；招到最初的合规和伙伴运营岗位；并证明供应商 passport 工作流能在不滑向重服务交付的前提下，转成年订阅。
