  sourceTarget: 100
  sourcesFound: 181
  sourcesFetched: 120
  sourcesRetained: 118
  duplicatesRemoved: 2
  memoSourcesUsed: 40
  reputablePublisherCount: 23
  searchedQueries:
  - 查找关于 CMMC 最终规则、DFARS 7012/7020、FAR 52.204-21、NIST 800-171、DD254 和 NISPOM 的权威资料，聚焦第一次进入 DoD 体系的承包商。
  - 查找 DoD 对商业技术的需求、DIU、供应商基础集中度，以及商业公司为何回避国防市场的资料。
  - 查找近期关于 CMMC 对中小企业负担、评估员产能，以及 grants 或 pulse surveys 等政府回应的资料。
  - 查找 Lockheed Martin、RTX、Northrop Grumman 和 L3Harris 官方的供应商 onboarding 与网络安全要求页面。
  - 查找 Arkenstone Defense 及其 GovCon 后台切口的发布报道与一手表述。
  - 查找 Unanet GovCon ERP、Deltek Costpoint、Vanta CMMC 和 Summit 7 CMMC/GCC High 的产品页面。
  - 查找 AWS CMMC、Microsoft GCC High、Azure Government、Azure DoD IL5 和 Google Assured Workloads 的技术文档。
  - 查找国防工业基础里共享的网络安全资源中心，以及主承包商和小型承包商在用的 supplier assistance 材料。
  - 查找关于 CMMC 预算、内部实施成本和预期认证周期的资料。
  - 查找 GovCon 工时、合规、分包商管理，以及今天国防供应商常用的 ERP 替代方案相关资料。
