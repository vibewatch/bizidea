  - point: 政府和行业已经公开承认中小企业负担，这给工作流工具和伙伴生态提供了预算上的正当性。
    sourceRefs:
    - 14
    - 15
    - 16
    - 116
  headwinds:
  - point: 中小企业对成本的担忧和 assessment 瓶颈，可能把买家推向 shared enclave 或延后采购，而不是直接买完整运营平台。
    sourceRefs:
    - 15
    - 16
    - 115
    - 117
  - point: ERP、云和专业服务已经各自解决了一段问题，所以新平台必须证明的是编排 ROI，而不是控制项 checklist 的齐全程度。
    sourceRefs:
    - 47
    - 64
    - 81
    - 117
competitors:
- name: Arkenstone Defense
  stage: seed
  wedge: 给进入联邦市场的商业和 dual-use 公司做托管式 GovCon 后台。
  pricing: 托管平台；抓取到的公开材料里没有 self-serve 定价。
  strength: 在创业公司痛点和跨职能打包这件事上，定位最直接。
  weaknessVsUs: 看起来更偏重服务，叙事也围绕托管栈展开；这给了更明确的合同导入图谱和可复用供应商 passport 工作流留下空间。
  sourceRefs:
  - 46
  - 114
- name: Unanet
  stage: incumbent
  wedge: 面向 GovCon 的 ERP，覆盖会计、合规、工时和分包商运营。
  pricing: 按报价成交的 ERP；抓取到的页面里没有 self-serve 定价。
  strength: 很适合已经在扩张、需要 DCAA 合规会计和工时控制的 GovCon 企业。
  weaknessVsUs: 它是从 ERP 标准化出发，而不是从一份真实合同触发的安全、保险、薪资和面向买方 readiness 排程出发。
  sourceRefs:
  - 47
  - 49
- name: Deltek Costpoint
  stage: incumbent
  wedge: 完整的 GovCon ERP 与合规底座，覆盖工时、人力、采购和合同控制。
  pricing: 按报价成交的 ERP；抓取到的页面里没有 self-serve 定价。
  strength: 一旦承包商已经开始规模化，它在 GovCon 品牌、审计轨迹和运营覆盖上都很深。
  weaknessVsUs: 这是更重的 system of record，并不天然聚焦创业公司第一次中标后的 readiness 和跨供应商编排。
  sourceRefs:
  - 64
  - 69
  - 70
- name: Vanta
  stage: scale-up
  wedge: 映射到 CMMC 和 NIST 800-171 的横向合规自动化平台。
  pricing: 按报价成交的合规 SaaS；公开内容更强调 demo、指南和自动化，而不是价格表。
  strength: 在证据自动化、持续监控和相邻安全框架复用上很强。
  weaknessVsUs: 它天然不管 GovCon 特有的薪资、供应商 onboarding，或按合同排顺序的运营依赖。
  sourceRefs:
  - 81
  - 83
  - 85
  - 88
  - 90
- name: Summit 7
  stage: scale-up
  wedge: 为国防承包商提供 CMMC、GCC High 和托管式实施服务。
  pricing: 更偏服务交付，预算导向；公开内容强调项目预算，而不是固定软件定价。
  strength: 在认证准备、政府云迁移和实际实施节奏上公信力很强。
  weaknessVsUs: 它更像围绕网络安全和基础设施执行，而不是一套能跨薪资、保险和多项目复用供应商 passport 的操作系统。
  sourceRefs:
  - 115
  - 116
  - 117
  - 118
regulatoryTechnicalConstraints:
- point: FCI 和 CUI 的处理范围，必须对照 FAR 52.204-21、DFARS 7012、CMMC 和 NIST SP 800-171 去界定，不能拿一套泛化的安全姿态直接套。
  sourceRefs:
  - 5
  - 6
  - 7
  - 9
  - 113
- point: 涉及涉密信息的合同，仍然要走 DD254 驱动的处理和 NISPOM 流程，这超出了普通 SaaS onboarding 的范围。
  sourceRefs:
  - 3
  - 8
- point: 国防业务里的云架构往往要认真处理 GCC High、Azure Government、IL 等级或其他主权型控制，而不能默认放在普通商用 SaaS 区域。
  sourceRefs:
  - 18
  - 20
  - 21
  - 22
  - 23
  - 118
- point: 主承包商仍然要对分包商的网络安全状态和 flowdown 负责，所以创业公司的输出必须能进供应商 onboarding 和授标档案。
  sourceRefs:
  - 6
  - 7
  - 27
  - 29
  - 33
validationSignals:
- point: Arkenstone 带着 $35M 出场，并称已有两打以上的国防科技公司跑在其平台上。
  sourceRefs:
  - 46
  - 114
- point: 美国参议院军事委员会推进了一项 grant 方案，优先支持中小企业和首次承包商做 CMMC assessment。
  sourceRefs:
  - 14
- point: 到 2025 年末，Cyber AB 表示已有近 500 家机构拿到 Level 2 认证、567 名 assessors 完成培训，说明市场不只是纸面概念。
  sourceRefs:
  - 16
- point: 大型主承包商已经公开要求供应商提升网络安全成熟度，并保持注册和认证信息最新。
  sourceRefs:
  - 27
  - 29
  - 33
openQuestions:
- 每年到底有多少 30-150 人的 dual-use 创业公司，会真正跨进带 CUI 的国防项目，而不是一直停留在原型或 OT-only 阶段？
- 主承包商会不会接受一份可复用的供应商 passport 材料，还是大多数场景仍会坚持要定制 onboarding 材料和 portal 重填？
- 第一次认证周期之后，客户总支出里到底有多少会变成持续性软件收入，而不是伙伴 pass-through 或实施服务？
- 一套产品能不能同时服务自评型新进入者和完整做 Level 2 assessment 的客户，而不滑进重咨询运营模式？
