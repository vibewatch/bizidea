problem: 商业化国防创业公司可能在拿到 Pentagon 真兴趣时，还没有一套能像政府承包商那样运转的公司机器。一旦项目要求 CMMC、合规薪资、保险、人员安全和资质认证，创始人就会被推进顾问、broker、PEO 和一堆表格里，在收入还没确定前先烧掉几十万美元。评估员产能又紧，就算技术进展不错，团队也可能因为准备工作排得太晚、又没人系统跟踪，直接错过 kickoff 窗口。
targetUser:
  primary: 美国 30-150 人的 dual-use 自主系统、机器人或 defense-AI 创业公司里，正为第一笔有收入的国防项目做准备的 COO 或运营负责人
  secondary: 一旦机会真正落地，就被迫接手薪资、保险和合规搭建的人力运营、财务或项目安全负责人
  buyer: COO 或总裁
startupThesis:
  nonObviousInsight: 真正的瓶颈不是某一张合规清单，而是缺少一张可复用的 readiness 图谱，能把一份合同的义务拆成分阶段的公司基础设施。这样创始人就不用一上来把整套 GovCon 栈全买齐，而是只在真实项目需要时逐项点亮。
  beachhead: 美国 30-150 人的 dual-use 自主系统、机器人和 defense-AI 创业公司；它们正进入第一笔主承包分包或后续国防项目，且必须在 180 天内把 CMMC Level 2、薪资、保险和人员安全流程搭起来。
  wedge: 一套合同导入工作流，把真实的国防机会映射成薪资、保险、人员安全、合规和资质认证的精确任务顺序，再把已完成工作沉淀成下一个买家也能复用的供应商 passport。
  whyNowCatalyst: Pentagon 对商业供应商的需求在升温；与此同时，CMMC 评估员短缺、项目前六位数准备成本高企，让无结构的 GovCon 搭建对创业公司来说又慢又贵。
  ventureScalePath: 先从创业公司端的 readiness 编排切入，再扩成一套共享系统记录层，让主承包商、保险商、薪资伙伴、安全服务商和投资人都用它来接入并监控新一代国防供应商。
solution: 产品从客户上传一份真实的国防机会或分包合同开始。系统把合同要求翻成按里程碑推进的工作流，明确哪些任务必须在 kickoff、涉密作业、开票或扩编前完成。一张 readiness 图谱会跟踪 CMMC 准备、保险覆盖、薪资搭建、人员安全步骤和资质任务里的全部材料，再把当前状态打包成可复用的供应商 passport，供团队发给主承包商和合作方。客户不用第一天就买整套托管服务，而是按每个里程碑真正需要的模块和伙伴逐项启用。时间一长，平台会学出不同 defense-tech 类别里，哪些任务顺序、供应商和证据包最能加快项目过关。
goToMarketSeed:
  firstCustomer: 一家 60 人的美国自主系统或机器人创业公司，正从原型合同走向第一笔主承包分包；在 kickoff 前，它必须搞定 CMMC Level 2、带保险的薪资体系和人员安全 onboarding。
  buyingTrigger: 后续授标、主承包商 down-select，或项目 kickoff，逼着公司在开工前证明自己已具备 CMMC、保险、薪资和安全 onboarding 的准备度。
  currentAlternative: 创始人自己管的表格和邮件，再叠上兼职 GovCon 顾问、PEO 或薪资供应商、保险 broker 和安全顾问。
  switchingReason: 产品把单个机会拆成有先后顺序的计划和可复用证据包，既能压低盲目的前置投入，也能减少因为供应商各自为战而拖慢合同启动的风险。
  pricingHypothesis: 按每个活跃 readiness 项目收年度平台订阅费；通过工作流启用的合规、薪资、保险和安全伙伴，再抽 marketplace take rate。
