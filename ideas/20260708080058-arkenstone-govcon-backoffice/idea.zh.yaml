topRisks:
- name: 服务膨胀
  description: 如果客户期待公司亲自把每一项保险、薪资和安全任务都做掉，毛利率和产品聚焦都会塌。
  mitigation: 把核心产品守在编排软件上，把实施模板化，并通过有明确 SLA 的筛选伙伴来承接执行。
- name: 外部产能瓶颈
  description: 即便工作流软件做得很好，评估员和人员安全资源短缺仍可能拖慢客户。
  mitigation: 汇总需求、提前锁定伙伴产能，并引导客户在正式项目 deadline 前很久就分阶段完成 readiness。
- name: 供应商 passport 接受风险
  description: 如果主承包商和项目伙伴不接受共享的 readiness 材料，产品就可能退化成内部项目管理工具。
  mitigation: 输出围绕现有审阅材料包来设计，先在主承包商分包 onboarding 工作流里拿下试点，再用单个项目更快 kickoff 的结果去证明网络层扩张。
