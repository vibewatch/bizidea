jobsToBeDone:
- job: 当一家创业公司发现原型项目要变成真正的国防项目时，帮运营负责人把 CMMC、薪资、保险和安全搭建分阶段排开，好让团队能开工，而不是在割裂的供应商和盲目的固定成本里空耗几个月。
  currentAlternative: 创始人自己管的项目计划，加上外部顾问和 broker
  successMetric: 从授标通知到具备开工条件的天数
- job: 当主承包商或项目伙伴追问公司是否已经具备运营交付能力时，帮创业公司快速共享当前证据和剩余缺口，好更快完成 onboarding、向第一张发票推进。
  currentAlternative: 每来一个买家就手工重做一套静态文档
  successMetric: 为买家或合作方产出被接受 readiness 材料包所需的时间
