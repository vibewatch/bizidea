scenarios:
  downside:
    description: 项目扩张更慢，价值获取更接近纯订阅定价，而且交付在更长时间里仍然更偏服务。
    y3RevenueK: 849.0
    y3EbitdaK: -682.3
    cashLowPointK: 163.6
    keyAssumptionChanges:
    - Q4Y3 只做到 15 个活跃项目，而不是 20 个，因为第二项目复用和伙伴转化都慢了。
    - 每个活跃项目的混合年化收入更接近 $69K-$72K，而不是基准情景里最终做到 $78K。
    - 由于内部协调和例外处理仍占更多比重，毛利率最终停在约 66%，而不是 70%。
  base:
    description: 第 1 年的 3 个付费试点，逐步转成可衡量的重复项目增长；到 Q4Y3 做到 20 个活跃计费项目，退出毛利率 70%。
    y3RevenueK: 1182.0
    y3EbitdaK: -429.3
    cashLowPointK: 465.1
    keyAssumptionChanges:
    - 基准情景直接采用建模里的 A2-A26 假设。
    - Y3 的增长主要来自早期账户里的重复项目和 1 名后置加入的 GTM，而不是大规模冲新 logo。
    - 只有当伙伴路由和可复用模板把人工搭建工作压下去之后，毛利率才会爬到 BP 目标。
  upside:
    description: 伙伴渠道在 Y2 更早跑顺，第二项目复用提前兑现，附加收入和交付杠杆都快于计划。
    y3RevenueK: 1446.0
    y3EbitdaK: -221.1
    cashLowPointK: 707.5
    keyAssumptionChanges:
    - Q4Y3 做到 24 个活跃项目，而不是 20 个，因为更多早期客户更快加开第二、第三个项目。
    - 每个活跃项目的混合年化收入更快逼近 $84K，因为伙伴附加收入和实施变现提早出现。
    - 由于模板覆盖率和伙伴 SLA 更早把内部例外工作压下去，退出毛利率接近 72%。
sensitivity:
- variable: ARPU
  downsideCase: 稳态下每个活跃项目的年度收入只落在约 $69K。
  baseCase: 基准情景在退出时约为每个活跃项目 $78K 年度收入。
  upsideCase: 伙伴附加收入和第二项目复用，把退出水平推近 $84K。
  y3RevenueImpactK: -95.0
  cashImpactK: -70.0
- variable: CAC
  downsideCase: 如果伙伴转介绍不及预期，CAC 会升向每个活跃项目新增约 $45K。
  baseCase: 由于创始人主导和伙伴主导获客占主流，CAC 约为 $33K。
  upsideCase: 如果渠道杠杆跑顺，CAC 有机会守在约 $28K。
  y3RevenueImpactK: -60.0
  cashImpactK: -160.0
- variable: churn
  downsideCase: 如果部分创业公司没有进入第二项目复用，月度流失率会升到 3.0%。
  baseCase: 一旦工作流嵌进合同启动运营，月度流失率维持在 2.0%。
  upsideCase: 如果供应商 passport 在多项目账户里变得黏住人，月度流失率有机会守在 1.5%。
  y3RevenueImpactK: -70.0
  cashImpactK: -55.0
- variable: 销售周期
  downsideCase: 如果试点转年订阅和伙伴来源成交都晚了约 1 个季度，模型会明显承压。
  baseCase: 付费试点大约在 6 个月内转正，扩张从第二个项目开始。
  upsideCase: 合同触发的紧迫性叠加伙伴渠道，会压缩走到年度订阅的路径。
  y3RevenueImpactK: -180.0
  cashImpactK: -140.0
- variable: 毛利率
  downsideCase: 如果交付继续偏手工，退出毛利率只会在约 66%。
  baseCase: 随着伙伴路由和模板规模化，毛利率在 Q4Y3 达到 70%。
  upsideCase: 如果例外处理下降得更快，毛利率有机会到 72%。
  y3RevenueImpactK: 0.0
  cashImpactK: -50.0
- variable: 招聘节奏
  downsideCase: 如果在重复项目复用还没被证明前，就把第二名工程师或 GTM 提前 2 个季度招进来，现金压力会明显上升。
  baseCase: 招聘继续按里程碑卡点推进，GTM 延后到第 30 个月。
  upsideCase: 如果先把扩张锁在现有账户内，可在伙伴转化被证明后再延后 GTM 招聘。
  y3RevenueImpactK: 0.0
  cashImpactK: -130.0
modelDiagram:
  title: 合同触发式 GovCon OS 收入模型
  mermaid: "flowchart LR\n  Trigger[真实合同 / 分包合同触发器] --> Pilot[付费试点]\n  Pilot --> Program[活跃计费的 readiness 项目]\n  Program --> Expansion[重复项目与伙伴附加收入]\n  Expansion --> Revenue[订阅费加附加收入]\n  Revenue --> GrossProfit[毛利]\n  GrossProfit --> Cash[跑到种子轮证明点的现金跑道]\n"
modelSanity:
- checkName: 收入引擎
  finding: 基准情景的收入引擎，是从 Y1 的 3 个付费试点长到 Q4Y3 的 20 个活跃计费项目；而 Y3 的大部分新增，不是来自疯狂打新 logo，而是来自早期账户里的重复项目。
- checkName: 必须跑对的环节
  finding: 公司必须把早期试点转成可复用的第二项目动作，同时把交付继续压在伙伴侧，让毛利率从试点期的 45% 爬到 Q4Y3 的 70%。
- checkName: 模型会在哪坏掉
  finding: 如果扩张卡在 15 个活跃项目附近，价值获取也更接近纯订阅定价，那么下行情景的期末现金会掉到约 $164K，bridge round 的概率就会上来。
- checkName: 下一轮融资前的证明点
  finding: 如果到第 18 个月能做到 5 个活跃付费项目、2 个试点转年订阅、外部材料接受，以及 1 条可复用的伙伴来源试点路径，下一轮融资故事就成立。
sanityChecks:
  ruleOf40: Y3 增长 118.9% + EBITDA 利润率 -36.3% = 82.6%
  burnMultiple: Y2 burn multiple 1.6x，改善到 Y3 burn multiple 0.5x；对应净新增 ARR 约 $0.4M 和 $0.8M。
  revenuePerFte: 按 Q4Y3 的 7 FTE 计算，Y3 人均收入 $168.9K（SaaS 基准 $200-400K）
  flags:
  - Y3 人均收入约 $169K，仍低于典型企业 SaaS 的 $200K-$400K 基准，所以下一轮得靠更强的复用或附加收入经济，而不只是继续招人。
  - 基准情景只做到 20 个活跃项目，低于研究里的 30 客户 SOM；这刻意保守，但也说明 venture case 很依赖滩头市场之外的后续扩张。
  - 现金保持为正，主要因为规模化 GTM 招聘被推迟到第 30 个月；如果在重复项目证据出来前就提前招销售，融资需求会明显抬升。
