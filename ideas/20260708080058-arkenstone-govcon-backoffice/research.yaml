competitors:
- name: Arkenstone Defense
  stage: seed
  wedge: Managed GovCon back office for commercial and dual-use companies entering federal work.
  pricing: Managed platform; no public self-serve pricing surfaced in fetched coverage.
  strength: Most direct positioning around startup pain and cross-functional bundling.
  weaknessVsUs: Appears services-heavy and pitch-led around a managed stack, leaving room for a more explicit contract-ingestion graph and reusable supplier-passport workflow.
  sourceRefs:
  - 46
  - 114
- name: Unanet
  stage: incumbent
  wedge: GovCon ERP for accounting, compliance, timekeeping, and subcontractor operations.
  pricing: Quote-based ERP; no self-serve pricing on fetched pages.
  strength: Strong fit for growing GovCons that need DCAA-compliant accounting and labor controls.
  weaknessVsUs: Starts from ERP standardization, not from a live contract that sequences security, insurance, payroll, and buyer-facing readiness work.
  sourceRefs:
  - 47
  - 49
- name: Deltek Costpoint
  stage: incumbent
  wedge: Full GovCon ERP and compliance backbone with time, labor, procurement, and contract controls.
  pricing: Quote-based ERP; no self-serve pricing on fetched pages.
  strength: Deep GovCon brand, audit trails, and broad operational coverage once a contractor is already scaling.
  weaknessVsUs: Heavier-weight system of record that is less naturally focused on first-award readiness and cross-vendor orchestration for startups.
  sourceRefs:
  - 64
  - 69
  - 70
- name: Vanta
  stage: scale-up
  wedge: Horizontal compliance automation mapped to CMMC and NIST 800-171.
  pricing: Quote-based compliance SaaS; public content emphasizes demos, guides, and automation rather than list pricing.
  strength: Strong evidence automation, continuous monitoring, and overlap across adjacent security frameworks.
  weaknessVsUs: Does not natively own GovCon-specific payroll, supplier onboarding, or contract-sequenced operational dependencies.
  sourceRefs:
  - 81
  - 83
  - 85
  - 88
  - 90
- name: Summit 7
  stage: scale-up
  wedge: CMMC, GCC High, and managed implementation services for defense contractors.
  pricing: Services-led and budget-guided; public content emphasizes project budgeting rather than fixed software pricing.
  strength: High credibility in certification prep, government-cloud migration, and practical implementation timelines.
  weaknessVsUs: Centered on cyber and infrastructure execution rather than a reusable operating system that spans payroll, insurance, and supplier-passport reuse across programs.
  sourceRefs:
  - 115
  - 116
  - 117
  - 118
regulatoryTechnicalConstraints:
- point: FCI and CUI handling must be scoped against FAR 52.204-21, DFARS 7012, CMMC, and NIST SP 800-171 rather than assumed from a generic security posture.
  sourceRefs:
  - 5
  - 6
  - 7
  - 9
  - 113
- point: Contracts involving classified information still require DD254-driven handling and NISPOM processes beyond ordinary SaaS onboarding.
  sourceRefs:
  - 3
  - 8
- point: Cloud architecture for defense work often requires deliberate choices about GCC High, Azure Government, IL levels, or other sovereign-style controls instead of default commercial SaaS regions.
  sourceRefs:
  - 18
  - 20
  - 21
  - 22
  - 23
  - 118
- point: Prime contractors remain responsible for subcontractor cybersecurity status and flowdowns, so startup outputs must be useful in supplier onboarding and award files.
  sourceRefs:
  - 6
  - 7
  - 27
  - 29
  - 33
validationSignals:
- point: Arkenstone launched with $35M and says more than two dozen defense technology companies already operate on its platform.
  sourceRefs:
  - 46
  - 114
- point: The Senate Armed Services Committee advanced a grant concept that would prioritize small businesses and first-time contractors for CMMC assessment support.
  sourceRefs:
  - 14
- point: By late 2025 the Cyber AB said nearly 500 organizations had received Level 2 certifications and 567 assessors had been trained, showing real market movement beyond theory.
  sourceRefs:
  - 16
- point: Major primes publicly tell suppliers to raise cyber maturity and keep supplier registration and certification data current.
  sourceRefs:
  - 27
  - 29
  - 33
openQuestions:
- How many 30-150 person dual-use startups actually cross into CUI-bearing defense work each year versus staying in prototype or OT-only programs?
- Will primes accept a reusable supplier-passport artifact, or will most still insist on bespoke onboarding packets and portal re-entry?
- What share of total customer spend is recurring software versus partner pass-through or implementation services after the first certification cycle?
- Can one product credibly serve both self-assessed entrants and fully assessed Level 2 customers without sliding into a consulting-heavy operating model?
