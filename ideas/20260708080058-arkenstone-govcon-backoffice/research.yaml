  sourcesRetained: 118
  duplicatesRemoved: 2
  memoSourcesUsed: 40
  reputablePublisherCount: 23
  searchedQueries:
  - Find authoritative sources on CMMC final rule, DFARS 7012/7020, FAR 52.204-21, NIST 800-171, DD254, and NISPOM for first-time DoD contractors.
  - Find sources on DoD demand for commercial technology, DIU, supplier-base concentration, and why commercial firms avoid defense work.
  - Find recent sources on CMMC small-business burden, assessor capacity, and government responses such as grants or pulse surveys.
  - Find official supplier onboarding and cybersecurity requirement pages from Lockheed Martin, RTX, Northrop Grumman, and L3Harris.
  - Find launch coverage and primary statements for Arkenstone Defense and its GovCon back-office wedge.
  - Find product pages for Unanet GovCon ERP, Deltek Costpoint, Vanta CMMC, and Summit 7 CMMC/GCC High offerings.
  - Find technical documentation for AWS CMMC, Microsoft GCC High, Azure Government, Azure DoD IL5, and Google Assured Workloads.
  - Find shared DIB cybersecurity resource hubs and supplier assistance materials used by primes and smaller contractors.
  - Find sources on CMMC budgeting, in-house implementation costs, and expected certification timelines.
  - Find sources on GovCon timekeeping, compliance, subcontractor management, and ERP substitutes used today by defense suppliers.
