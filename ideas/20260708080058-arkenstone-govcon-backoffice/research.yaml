  adoptionFrictionMatrix:
  - friction: CUI scoping and subcontract flowdown ambiguity
    severity: high
    affectedBuyer: COO or security lead
    mitigation: Start from the contract artifact, make scope assumptions explicit, and let customers override them before downstream tasks are generated.
    sourceRefs:
    - 6
    - 7
    - 9
    - 90
  - friction: Limited assessor and implementation capacity
    severity: high
    affectedBuyer: Operations lead
    mitigation: Pre-book C3PAO/MSP capacity through partners and surface backlog risk early in the plan.
