scenarios:
  downside:
    description: Program expansion is slower, value capture stays closer to bare subscription pricing, and delivery remains more services-heavy for longer.
    y3RevenueK: 849.0
    y3EbitdaK: -682.3
    cashLowPointK: 163.6
    keyAssumptionChanges:
      - Q4Y3 ends at 15 active programs instead of 20 because repeat-program reuse and partner-fed conversions slip.
      - Blended annualized revenue per active program stays closer to $69K-$72K instead of reaching the base-case $78K exit level.
      - Gross margin exits near 66% rather than 70% because more internal coordination and exception handling remain in the loop.
  base:
    description: Three paid pilots in year 1 convert into measured repeat-program growth, reaching 20 active billed programs and a 70% exit gross margin by Q4Y3.
    y3RevenueK: 1182.0
    y3EbitdaK: -429.3
    cashLowPointK: 465.1
    keyAssumptionChanges:
      - Base case uses assumptions A2-A26 as modeled.
      - Y3 growth comes mostly from repeat programs inside early accounts plus one late GTM hire, not from a broad logo blitz.
      - Gross margin only reaches the BP target after partner routing and reusable templates reduce manual setup work.
  upside:
    description: Partner channels start producing more repeatable referrals in Y2, repeat-program reuse lands earlier, and attach revenue plus delivery leverage improve ahead of plan.
    y3RevenueK: 1446.0
    y3EbitdaK: -221.1
    cashLowPointK: 707.5
    keyAssumptionChanges:
      - Q4Y3 reaches 24 active programs instead of 20 because more early customers add second and third programs sooner.
      - Blended annualized revenue per active program rises toward $84K as partner attach and implementation monetization show up earlier.
      - Gross margin exits near 72% because template coverage and partner SLAs reduce internal exception work faster than planned.
sensitivity:
  - variable: ARPU
    downsideCase: Steady-state annual revenue per active program lands near $69K.
    baseCase: The base case exits near $78K annual revenue per active program.
    upsideCase: Attach revenue and repeat-program reuse push the exit level toward $84K.
    y3RevenueImpactK: -95.0
    cashImpactK: -70.0
  - variable: CAC
    downsideCase: Partner referrals underperform and CAC rises toward $45K per active-program add.
    baseCase: CAC is about $33K because founder-led and partner-led sourcing dominate.
    upsideCase: Channel leverage holds CAC closer to $28K.
    y3RevenueImpactK: -60.0
    cashImpactK: -160.0
  - variable: churn
    downsideCase: Monthly churn rises to 3.0% as some startups do not reach repeat-program usage.
    baseCase: Monthly churn holds at 2.0% once the workflow is embedded in contract-start operations.
    upsideCase: Monthly churn stays near 1.5% because supplier-passport reuse becomes sticky inside multi-program accounts.
    y3RevenueImpactK: -70.0
    cashImpactK: -55.0
  - variable: sales cycle
    downsideCase: Pilot-to-annual conversion and partner-originated closes slip by roughly one quarter.
    baseCase: Paid pilots convert inside about 6 months and expansion starts in the second program.
    upsideCase: Contract-trigger urgency plus partner channels compress the path to annual conversion.
    y3RevenueImpactK: -180.0
    cashImpactK: -140.0
  - variable: gross margin
    downsideCase: Gross margin exits near 66% because delivery remains more manual.
    baseCase: Gross margin reaches 70% by Q4Y3 as partner routing and templates scale.
    upsideCase: Gross margin reaches 72% if exception handling drops faster than planned.
    y3RevenueImpactK: 0.0
    cashImpactK: -50.0
  - variable: hiring pace
    downsideCase: Pull the second engineer or GTM hire forward by two quarters before reuse proof is visible.
    baseCase: Hiring stays milestone-gated and GTM is delayed until month 30.
    upsideCase: Delay the GTM hire until after partner conversion proof while keeping expansion inside existing accounts.
    y3RevenueImpactK: 0.0
    cashImpactK: -130.0
modelDiagram:
  title: contract-triggered govcon os revenue model
  mermaid: |
    flowchart LR
      Trigger[Live contract / subcontract trigger] --> Pilot[Paid pilot]
      Pilot --> Program[Active billed readiness programs]
      Program --> Expansion[Repeat programs and partner attach]
      Expansion --> Revenue[Subscription plus attach revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash runway to seed proof]
modelSanity:
  - checkName: Revenue engine
    finding: Base-case revenue is driven by growing from 3 paid pilots in Y1 to 20 active billed programs by Q4Y3, with most Y3 adds coming from repeat programs inside early accounts rather than a broad new-logo push.
  - checkName: Must go right
    finding: The company must convert early pilots into reusable second-program motion while keeping delivery partner-led enough for gross margin to climb from 45% in pilots to 70% by Q4Y3.
  - checkName: Model breaks if
    finding: If expansion stalls near 15 active programs and value capture stays closer to bare subscription pricing, ending cash falls toward roughly $164K in the downside case and a bridge round becomes likely.
  - checkName: Next-round proof
    finding: The next financing is justified if month 18 shows 5 active paid programs, 2 pilot-to-annual conversions, external packet acceptance, and one repeatable partner-originated pilot path.
sanityChecks:
  ruleOf40: Y3 growth 118.9% + EBITDA margin -36.3% = 82.6%
  burnMultiple: Y2 burn multiple 1.6x improving to Y3 burn multiple 0.5x on roughly $0.4M and $0.8M of net new ARR.
  revenuePerFte: $168.9K Y3 using Q4Y3 7 FTE (benchmark $200-400K SaaS)
  flags:
    - Y3 revenue per FTE is about $169K, still below a typical $200K-$400K enterprise-SaaS benchmark, so the next round needs stronger reuse or attach economics rather than just more hiring.
    - The base case only reaches 20 active programs versus the researched 30-customer SOM, which is intentionally conservative but also shows how dependent the venture case is on later expansion beyond the initial beachhead.
    - Cash stays positive because scaled GTM hiring is delayed until month 30; pulling sales hiring forward before repeat-program proof would materially raise the funding ask.
