jobsToBeDone:
  - job: >-
      When a startup learns that a prototype effort is becoming a real defense program, help the operations lead stage
      CMMC, payroll, insurance, and security setup, so they can start work without wasting months on disconnected
      vendors and blind fixed costs.
    currentAlternative: Founder-managed project plans plus outside consultants and brokers
    successMetric: Days from award notice to contract-ready kickoff
  - job: >-
      When a prime or program partner asks whether the company is operationally ready to perform, help the startup
      share current evidence and remaining gaps, so they can clear onboarding and move toward first invoice faster.
    currentAlternative: Static documents rebuilt manually for each buyer
    successMetric: Time to produce an accepted readiness packet for a buyer or partner
ideaScorecard:
  signalStrength:
    score: 5
    rationale: Two detailed same-day sources plus explicit platform traction make the bottleneck concrete, urgent, and current.
  painIntensity:
    score: 5
    rationale: The combination of six-figure pre-award costs and scarce assessor capacity can block revenue even after a startup has real product demand.
  wedgeClarity:
    score: 5
    rationale: Starting from one live defense opportunity and sequencing the exact readiness stack is a crisp, measurable first workflow.
  defensibility:
    score: 4
    rationale: The software surface is copyable, but accepted readiness sequences, partner-performance data, and reusable supplier passports can compound into a durable network moat.
  ventureScale:
    score: 4
    rationale: The beachhead is narrow, but the same system can expand into the default onboarding and monitoring layer for a growing defense supplier ecosystem.
topRisks:
  - name: Services creep
    description: If customers expect the company to personally execute every insurance, payroll, and security task, gross margins and product focus could collapse.
    mitigation: Keep the core product as orchestration software, templatize implementation, and route execution through vetted partners with clear SLAs.
  - name: External capacity bottlenecks
    description: Assessor and personnel-security shortages may still delay customers even if the workflow software is excellent.
    mitigation: Aggregate demand, pre-negotiate partner capacity, and steer customers into staged readiness well before formal program deadlines.
  - name: Passport acceptance risk
    description: If primes and program partners do not accept shared readiness artifacts, the product could be reduced to internal project management.
    mitigation: Design outputs around existing review packages, win initial pilots on prime-sub onboarding workflows, and prove faster kickoff on one program before expanding the network layer.
