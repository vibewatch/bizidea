problem: 云原生 B2B SaaS 公司的精简安全运营团队，正被身份、终端和云告警淹没。真正卡住的，不只是检测量太大，而是分析师在决定要不要升级处理前，仍要花好几个小时把证据拼齐。攻击者越来越快，值班覆盖却没有同步补上，夜间队列越积越长，真正的事件埋在噪音里，疲惫的分析师只能做浅层分诊。现有的 SIEM、SOAR 和 MDR 组合，依旧要靠人手把 Okta、Microsoft 365、AWS 和 EDR 的上下文一点点串起来。
targetUser:
  primary: 云原生 B2B SaaS 公司里，负责精简自建 SOC 的安全运营经理和资深检测工程师。
  secondary: 接手升级事件并负责调优检测的平台安全工程师和事件响应人员。
  buyer: Series C-E SaaS 公司的安全运营总监或 CISO。
startupThesis:
  nonObviousInsight: AI-SOC 真正能打穿的切口，不是在告警之上再叠一个通用 copilot，而是把少数高频、重复的事件类型先做成案件组装层：自动拉齐跨工具证据，几分钟内把一个站得住脚的结论交到分析师手里。
  beachhead: 首个滩头市场是 Series C-E 的云原生 B2B SaaS 公司：300–2,000 名员工、5–20 人安全团队、使用 Microsoft 365 或 Google Workspace、Okta、AWS，且 24/7 的 SOC 队列覆盖不足，身份和 SaaS 管理员告警长期堆积。
  wedge: 切口是一台 AI 调查引擎：围绕 Okta、Microsoft 365、Google Workspace、AWS 和 CrowdStrike，自动为身份入侵、可疑 OAuth 授权、不可能旅行和高权限 SaaS 管理员变更生成可直接给分析师处理的案件包。
  whyNowCatalyst: Exaforce 的融资和客户指标说明，买家已经不再只是试验 AI 用在 SOC 里——他们开始真金白银买调查压缩，因为攻击速度和告警体量已经把人工取证逼到不可忍受。
  ventureScalePath: 一旦产品先拿下身份与 SaaS 事件的案件组装层，后面就能往终端、云、内部威胁和自动化处置扩，把自己做成检测工具和所有下游安全决策之间的操作层。
solution: 产品接到客户现有的 SIEM、身份系统、EDR、云审计日志和关键 SaaS 管理系统后，只要命中预设事件类型，就自动拼出一张统一案件图。它不是再给分析师一个聊天窗口，而是直接产出一份可交付的调查包：实体时间线、佐证证据、置信分数、建议下一步，以及原始日志链接。分析师来决定升级、处置还是关闭，这样既能把反馈喂回模型评估，又不会在第一天就把自主控制权交出去。首版部署只盯身份和 SaaS 管理员事件——这里取证重复、痛感强，也最容易对照历史人工调查做基准。
goToMarketSeed:
  firstCustomer: 首个客户画像是 Series C-D SaaS 公司里的安全运营总监：500–1,500 名员工，Okta、Microsoft 365、AWS、CrowdStrike 栈齐全，8–12 名分析师长期在下班后追身份和 SaaS 管理员告警，常常赶不在第二个工作日开始前清空队列。
  buyingTrigger: 典型购买触发点是凭证滥用事件、网络保险续保、董事会审查，或人员冻结——团队必须在不再加一个班次的前提下，把平均调查时间压下来。
  currentAlternative: 当前替代方案通常是在 Splunk、Sentinel 或 Chronicle 里手工分诊，再配上 MDR 升级和脆弱的 SOAR playbook；真正跨多个控制台收集证据，还是得分析师自己来。
  switchingReason: 这款产品能直接插进现有栈里，先抓最高频、最重复的告警类型，给团队的不是另一个聊天界面，也不是要替换 SIEM，而是已经拼好的完整案件。
  pricingHypothesis: 年费平台订阅按接入的调查域和月案件量收费，后续扩容则跟新增事件类型和自动化动作绑定。
