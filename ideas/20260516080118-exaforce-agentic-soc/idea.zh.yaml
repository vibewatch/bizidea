differentiator: 大多数 AI-SOC 产品都想做大而全的 copilot、自主分析师，或者叠在 SIEM 之上的另一层自动化。这个方案赢面更大，是因为它先拿下一个更窄、却更难做的步骤——针对特定事件类型，把跨系统案件组装做好。这样一来，输出更容易和现有调查结果做基准对比，也更容易建立信任；同时还能嵌进现有安全栈，不必走 rip-and-replace 的替换路径。
