jobsToBeDone:
- job: 当"小时后"身份或"SaaS"管理员警报堆积而来时,帮助安全行动管理员用可防御的案卷对队列进行分解,这样他们只能将真正需要人类响应的事件升级后才能开启业务.
  currentAlternative: 跨越 SIEM、IdP、SaaS 日志和 MDR 门票的人工调查
  successMetric: 在下一个工作日前调查的平均时间和关闭警报的百分比
- job: 当可疑的 OAuth 给予或特权的管理员更换起火时,帮助高级分析师快速地收集跨工具证据,这样他们可以决定是否控制,升级,或者关闭而不打开 6 个控制台.
  currentAlternative: 分析员牵头收集证据,加罐装 SOAR 浓缩剂
  successMetric: 分析师判断的分钟和假阳性接近率
