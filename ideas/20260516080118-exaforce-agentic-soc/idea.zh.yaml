topRisks:
- name: 分析师信任缺口
  description: 安全小组可能会拒绝他们无法审计的建议,特别是在重大调查中。
  mitigation: 从证据组装和人类批准开始,揭露每一项建议背后的全部文物线索,并以历史案例为基准。
- name: 集成拖慢部署
  description: 连接足够的身份,云,和 SaaS 系统使产品有用,可以减缓部署和扩展.
  mitigation: 以狭义的只读连接器为 5 个最高值系统进行发射,并使用 Concierge 为首批设计合作伙伴上机.
- name: AI-SOC 市场拥挤
  description: 广泛的 AI-SOC 供应商可以在公司获得强大品牌之前定位出类似的能力.
  mitigation: 拥有一个更窄的海滩头 围绕身份 和 SaaS 管理案例组装 精益求精的 SaaS SOCs, 然后在证明 MTTI 收益后才能扩展。
