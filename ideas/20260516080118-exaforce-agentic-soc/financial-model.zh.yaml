modelDiagram:
  title: 单位经济流量
  mermaid: "flowchart LR\n  Pipeline[Qualified pipeline] --> Pilots[Paid pilots]\n  Pilots --> Production[Production customers]\n  Production --> Expansion[More domains and case volume]\n  Expansion --> Revenue[Subscription and usage revenue]\n  Revenue --> GrossProfit[Gross profit]\n  GrossProfit --> Cash[Cash and runway]"
modelSanity:
- checkName: 收入引擎
  finding: 基案收入由 M12 的 4 个付费客户,Q4Y2 的 11 个付费客户,以及由 Q4Y3 以 150K-180KACV 阶梯向 40 个客户提供合伙人协助的攀登.
- checkName: 一定要向右转
  finding: 5 个核心连接器的部署必须在 30 天内显示至少 50% 的 MTTI 改进率,因此有报酬的飞行员转换 50% 以上而不变成服务项目。
- checkName: 模式中断,如果
  finding: 如果销售周期超过 120 天,或连接器需求超出核心 5,则该模式失效,因为现金底值接近 489K 美元,即使是基数。
- checkName: 下一轮证明
  finding: 下一次融资是有理由的,它涉及到 8-12 个生产客户,可重复的分-30 天部署,以及 Q4Y2 的可见伙伴源管道,同时保留了 6 个月的缓冲.
sanityChecks:
  ruleOf40: Y3 增长 261.0%+EBITDA 比值 3.0%=264.0%;方向性强但被小 Y2 基被膨胀.
  burnMultiple: Y2 多发烧约 0.9x(1.3M EBITDA 烧约 1.4M 净新 ARR 从~0.4M 到~1.8M 跑速率);Y3 在 H2 中变为 EBITDA 正.
  revenuePerFte: 278K Y3 收入每 Q4Y3 FTE(基准为 200–400K 企业 SaaS).
  flags:
  - 从 Q4Y2 的 11 个客户跳到 Q4Y3 的 40,是模式中最大的执行跳跃,并取决于合作伙伴渠道实际上变得富有成效.
