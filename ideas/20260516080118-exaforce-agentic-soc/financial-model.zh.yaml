slug: soc-case-assembly-engine
date: '2026-05-16'
currency: USD
modelStartMonth: 2026-06
assumptions:
- id: A1
  name: 模式在种子前关闭后启动
  value: 2026-06
  unit: YYYY-MM
  source: '[BP 日期+供资 Ask] 模型开始于预定计划之后的月份,因此在业务开支开始之前,种子前的现金是可用的。'
- id: A2
  name: 开口现金
  value: '3200.0'
  unit: USDK
  source: '[BP 筹资 Ask 目标供资范围 2-4M] 基案使用 320 万美元的前种子,接近中点,为 24 个月的里程碑加缓冲规则提供资金.'
- id: A3
  name: 开始客户( M1)
  value: '0'
  unit: count
  source: '[BP 产品 MVP+里程碑] 公司开始预收收入,并仅在五核联通 MVP 直播后签下首个付费飞行员.'
- id: A4
  name: Y1 客户坡道
  value: 4 paying customers by M12 with additions in M6, M8, M10, and M12
  unit: count
  source: '[BP 里程碑 0-12 个月] 选取 3 名付费飞行员,第一年内至少 2 名试产转换;逐月计时为起步融资插值.'
- id: A5
  name: Y2 客户坡道
  value: Q1Y2 6, Q2Y2 7, Q3Y2 9, Q4Y2 11 customers
  unit: count
  source: '[BP 里程碑 12 至 24 个月] 使用平滑的季度坡道,在 24 个月前直接锁定 8-12 个生产-客户目标。'
- id: A6
  name: Y3 客户坡道
  value: Q1Y3 16, Q2Y3 23, Q3Y3 31, Q4Y3 40 customers
  unit: count
  source: '[BP 里程碑 24–36 个月+研究市场.som]. 达到了明显的约-40-客户 Y3 端点;季度步骤假设伙伴频道开始贡献 Y3.'
- id: A7
  name: 定价梯子
  value: Paid pilot $60K annualized; first production deployment $150K ACV; Y3 exit ACV $180K
  unit: annualK per customer
  source: '[BP gtm.pricening + BP 投资者 Memo.初始合同+研究市场.som]. 使用付费驾驶范围上端,120K-180K 美元首个生产范围的中点,并使用研究 SOM 端点~180K 美元混合 ACV 到 Y3.'
- id: A8
  name: 收入确认方法
  value: Average active customers in period × blended realized price for pilot/production mix
  unit: formula
  source: '[BP 克特姆定价] 因此,收入与客户的计数核对时没有单独的组别账单表。'
- id: A9
  name: Y1 毛额差值
  value: '62.0'
  unit: percent
  source: '[BP business Model.goalGross MarginPct 70] + 启动-融资 heuristic:早期飞行员在部署游戏本标准化前会携带额外的登机和云成本拖放.'
- id: A10
  name: Y2 毛额差值
  value: '68.0'
  unit: percent
  source: '[BP business Model.goalGross MarginPct 70] 在只读部署和导出工作流程变得可重复后,边际改善.'
- id: A11
  name: Y3 毛额差值
  value: '70.0'
  unit: percent
  source: '[BP 业务模式.目标 Gross MarginPct 70] 一旦部署完成,基本情况就达到了计划目标,而且使用规模大多是软件成本。'
- id: A12
  name: 单位经济学的每月标志
  value: '2.0'
  unit: percent
  source: '[启动-金融 heuristic] 具有年度合同的种子阶段企业安全工具,但通常只有很窄的初始楔口,每月为 1.5%-2.5%,直到扩张证明为止。'
- id: A13
  name: 稳定状态 CAC
  value: '55.0'
  unit: USDK per customer
  source: '[BP gtm.funnelTalgets + BP 操作假设由创始人主导的直接销售] 假设创始人牵头的外出加一名 GTM 领队尽管安全审查和采购拖累,但仍可以将采购保持在 5 个中位数范围内。'
- id: A14
  name: 已装入薪带
  value: Founder 180; Eng 210; Detection Eng 210; Product/Deployment 200; Sales 240; Solutions 180; G&A 150
  unit: annualK per FTE
  source: '[BP 团队+起步融资 heuristic]. 使用美国企业安全现金折合金,加上大约 20% 的工资/福利。'
- id: A15
  name: 征聘时间表
  value: Detection lead M1; Product/Deployment lead M4; GTM lead M9; Solutions M13; Eng M15; AE M18; Eng M21; Detection M27; Eng M30; Product/Deployment M32; Sales M34; Eng and G&A M36
  unit: timing
  source: '[BP 团队+BP 战略选择. sequenkingRationale]. 联系人、案件质量和部署雇用人员在扩大销售量之前就会出现;以后雇用人员在重复性出现后会平稳地进行培养。'
- id: A16
  name: 点数终点
  value: 5 FTE by Q4Y1, 9 FTE by Q4Y2, 15 FTE by Q4Y3
  unit: FTE
  source: '[BP 团队+BP 里程碑] 通过可重复性证明来保持 Org 的倾斜,再在第一个生产模式建立后再增加工程和 GTM 容量.'
- id: A17
  name: 业务费用法
  value: Department lines include payroll plus modest cloud, travel, legal, and compliance overhead
  unit: policy
  source: '[BP 业务+启动融资 heuristic]. 反映了一个依赖出品部署而不是大型服务席的软件启动.'
- id: A18
  name: B. 扩大筹资规模的规则
  value: Raise enough to reach the Q4Y2 milestone and still carry 6 months of buffer into Y3
  unit: policy
  source: '[BP 供资 Ask 跑道 Months 18+型号要求] 明确的示范政策将计划扩大到一个里程碑式的加增,而不是一个短短 18 个月的桥梁。'
- id: A19
  name: 简化现金流动
  value: Ending cash = opening cash + cumulative EBITDA
  unit: formula
  source: '[启动-金融 heuristic] 假设一个资产灯光安全软件公司的最低上限、债务和工作资本扭曲。'
