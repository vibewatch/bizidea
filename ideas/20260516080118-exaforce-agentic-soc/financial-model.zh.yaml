scenarios:
  downside:
    description: 飞行员仍然接近,但生产转换滑行,ACV 保持更接近 150K,合作伙伴渠道贡献比计划晚.
    y3RevenueK: 2890.0
    y3EbitdaK: -610.0
    cashLowPointK: -220.0
    keyAssumptionChanges:
    - Q4Y3 客户达到 28 个而不是 40 个.
    - Y3 混合的 ARPU 停留在 150K 左右,而不是 165K.
    - 总差值为 66%,因为部署工作仍然有些繁重。
  base:
    description: Y1 的 3 名付费飞行员成为可重复的由创始人主导的动议,再由伙伴频道帮助由 Q4Y3 扩展至 40 个客户.
    y3RevenueK: 4172.6
    y3EbitdaK: 125.9
    cashLowPointK: 489.2
    keyAssumptionChanges:
    - 将 A4-A19 与 4 个客户相匹配由 M12,11 个由 Q4Y2,40 个由 Q4Y3.
    - 使用 60K 型试验车/150K 出厂/180K Y3 出厂定价梯级.
    - 部署可重复时,总差幅从 62% 到 68% 到 70%。
  upside:
    description: 更快的基准证明缩短了销售周期,提升了合作伙伴来源的胜出率,并支持对每个账户更多的领域进行适度扩展定价.
    y3RevenueK: 5230.0
    y3EbitdaK: 640.0
    cashLowPointK: 620.0
    keyAssumptionChanges:
    - Q4Y3 客户达到 48 比 40.
    - Y3 混合的 ARPU 在更快的域扩张上上升至 175K.
    - 由于上岗人员仍在生产,总比值达到 72%。
