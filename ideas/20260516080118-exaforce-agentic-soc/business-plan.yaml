slug: soc-case-assembly-engine
date: '2026-05-16'
executiveSummary: >-
  This company should start as a vendor-neutral case-assembly engine for a small
  set of identity and SaaS-admin investigations inside lean in-house SOCs, not
  as a full autonomous SOC platform. The first customer is a Series C-D
  cloud-native B2B SaaS company with 500-1,500 employees, an 8-12 person
  security team, and a recurring after-hours queue of Okta, Microsoft 365, AWS,
  and SaaS-admin alerts that still require manual evidence gathering. The buying
  trigger is usually a recent credential-abuse incident, a cyber-insurance or
  board review, or a headcount freeze that makes another analyst shift harder to
  justify. Research supports a focused market with an estimated $2.1B TAM,
  $450.0M SAM, and a reachable $7.2M year-3 SOM if the company can land roughly
  40 customers at enterprise security ACVs. The product should deploy read-only
  first, assemble analyst-ready case files for a few repetitive incident types,
  and prove lower mean time to investigate before adding broader response
  automation. The deliberate tradeoff is to win one painful queue faster than
  broader AI-SOC vendors, even if that means deferring endpoint, insider-risk,
  and full-platform ambitions. The biggest disconfirming risks are that five
  connectors are not enough to deliver value in the first month or that bundled
  Microsoft, Google, CrowdStrike, and AI-SOC platforms are already good enough.
  Exact private-company pricing benchmarks and standalone budget behavior are
  not provided in the inputs, so pricing and pilot conversion assumptions below
  must be tested early.
problem:
  - Lean SaaS SOC teams still spend hours assembling identity, cloud, endpoint, and SaaS evidence before they can decide whether to escalate or close an alert.
  - Existing SIEM, SOAR, MDR, and copilot workflows enrich alerts but still leave analysts stitching together Okta, Microsoft 365, Google Workspace, AWS, and EDR context by hand.
solution:
  - Ingest read-only signals from the customer's existing stack and auto-build an analyst-ready case packet for a narrow set of high-volume incident classes such as suspicious OAuth grants, impossible travel, identity compromise, and privileged SaaS-admin changes.
  - Show the full evidence trail, entity timeline, confidence score, and recommended next step inside an exportable case record so analysts can approve escalation or closure without giving the product autonomous control on day one.
whyWeWin:
  - The wedge is narrower than broad AI-SOC platforms and maps directly to the repetitive evidence-assembly step where buyer pain, trust requirements, and measurable ROI are clearest.
  - A vendor-neutral case graph across identity, cloud, SaaS, and endpoint systems is harder to copy than another SOC chat interface because it depends on normalized connectors, cross-tool reasoning, and feedback on analyst overrides.
  - Read-only deployment plus audit-ready reasoning fits current incident-response and governance expectations better than an autonomy-first pitch for the first purchase.
strategicChoices:
  beachhead: >-
    Series C-E cloud-native B2B SaaS companies with 300-2,000 employees, a
    5-20 person in-house security team, and an under-covered 24/7 queue
    dominated by identity and SaaS-admin investigations across Okta, Microsoft
    365 or Google Workspace, AWS, and CrowdStrike.
  wedgeRationale: >-
    Identity and SaaS-admin cases are frequent, painful, and easy to benchmark
    against historical analyst work, so they create faster proof than trying to
    replace the full SOC or automate broad response across every alert type.
  sequencingRationale: >-
    Start with five read-only connectors and one-to-two incident classes because
    deployment speed, analyst trust, and pilot-to-production conversion matter
    before autonomy breadth. Only after the company proves time-to-value and
    case accuracy should it add more incident classes, response hooks, partner
    channels, and broader sales hiring.
  notYet:
    - Full autonomous containment without analyst approval
    - Broad endpoint, insider-risk, and cloud-runtime investigations beyond the initial identity and SaaS-admin wedge
    - MSSP-first packaging that requires a different workflow and buying motion
    - Regulated-region private deployment variants before the North America plus UK/EU beachhead is repeatable
market:
  tam: "$2.1B estimated TAM based on roughly 7,000 global cloud-native SaaS accounts in the target maturity band at about $300k blended annual spend for investigation automation or adjacent SOAR budget."
  sam: "$450.0M estimated SAM based on about 1,500 North America plus UK/EU accounts with the target stack fit and willingness to add a focused SecOps point solution."
  som: "$7.2M modeled year-3 SOM based on roughly 40 customers at about $180k blended ACV for one-to-two investigation domains."
  segments:
    - "Primary segment: cloud-native B2B SaaS companies with lean in-house SOC teams and recurring identity or SaaS-admin alert backlog"
    - "Secondary segment: larger mixed-tool security teams modernizing from manual triage and MDR-heavy workflows"
  buyingProcess: >-
    The day-to-day champion is typically the SOC manager, detection engineering
    lead, or senior analyst, while the economic buyer is usually the Director of
    Security Operations or CISO. The deal should begin around an incident,
    insurance or board review, or headcount constraint, run as a narrow paid
    pilot on one queue, and convert when the buyer sees faster case closure
    inside the existing SIEM and response process.
product:
  mvp: >-
    The MVP should connect Okta, Microsoft 365, Google Workspace, AWS, and
    CrowdStrike in read-only mode and assemble analyst-ready packets for two
    high-frequency incident classes. It must include entity timelines, raw-log
    links, confidence scoring, analyst feedback capture, and export into the
    customer's existing case or ticket workflow.
  sixMonth: >-
    Prove deployment in under 30 days for the five-core-connector stack, ship
    benchmark reporting against historical MTTI, and support the initial
    identity compromise plus suspicious OAuth or privileged-admin workflows.
  twelveMonth: >-
    Add more repeatable identity and SaaS-admin cases, customer-specific tuning,
    packaged SIEM or SOAR export paths, and analyst-approved response hooks for
    contained low-risk actions.
  twentyFourMonth: >-
    Expand into adjacent endpoint and cloud-account investigations, ship a
    reusable cross-customer case graph and evaluation layer, and move from one
    queue wedge to a broader SOC operating layer with selective containment
    automation.
  keyBets:
    - Five read-only connectors are enough to create a compelling first-month MTTI improvement.
    - Buyers prefer analyst-ready case packets over another SOC chat interface for the first purchase.
    - Historical and live analyst feedback can create a better investigation dataset than broad autonomy claims alone.
    - The initial identity and SaaS-admin wedge can convert before customers demand full endpoint and cloud-runtime breadth.
gtm:
  wedge: >-
    Sell a paid pilot that clears one after-hours identity or SaaS-admin queue
    by auto-assembling cases for one-to-two incident classes, then convert to an
    annual production contract once analysts rely on the output in their normal
    escalation workflow.
  channels:
    - Direct founder-led outbound into Directors of Security Operations, CISOs, and detection leaders at target SaaS companies
    - Co-selling through identity, cloud, and SIEM ecosystem partners where the product depends on existing telemetry
    - Incident-response, vCISO, and cyber-insurance-adjacent advisors who surface weak investigation workflows after a real incident or renewal
  funnelTargets: "Discovery call to qualified pilot 20-30%, pilot to production 50%+, and time from pilot kickoff to production contract under 90 days."
  pricing: >-
    Annual platform subscription priced by connected investigation domains and
    monthly case volume, because buyers already budget around protected
    workflows and expected queue reduction rather than seats. Initial pricing
    assumption is a $30k-$60k paid pilot that converts to roughly $120k-$180k
    annual ACV for the first production deployment, with expansion from
    additional incident classes and approved actions.
businessModel:
  revenueStreams:
    - Annual subscription for the case-assembly platform
    - Usage-based expansion tied to monthly case volume and additional investigation domains
    - Premium modules for response hooks, audit reporting, and higher-assurance deployment controls
  unitOfValue: Investigation domain and monthly analyst-ready case volume
  targetGrossMarginPct: 70
  expansionLevers:
    - Add more incident classes inside the same customer after the first queue is proven
    - Expand connector coverage and response actions once read-only trust is established
    - Move from one SOC queue into broader identity, cloud, and endpoint investigation workflows
strategyMap:
  northStarMetric: Qualified target alerts that reach an analyst verdict in under 15 minutes using an assembled case packet
  inputMetrics:
    - Pilot to production conversion rate
    - Median mean time to investigate on covered incident classes
    - Percentage of cases accepted without analysts reopening multiple external consoles
    - Time to deploy the first five connectors
    - Number of production investigation domains per customer
  moatsToBuild:
    - Cross-tool case graph and normalized evidence model for identity, SaaS, cloud, and endpoint workflows
    - Ground-truth dataset of analyst-approved, overridden, and escalated case verdicts by incident class
    - Deep coexistence integrations with incumbent SIEM, SOAR, and response tooling
    - Audit-ready reasoning and deployment controls that shorten security review and procurement
  killCriteria:
    - Fewer than 3 paid pilots after 30 target-account conversations focused on identity and SaaS-admin queue relief
    - Pilot to production conversion below 50% after the first 6 pilots
    - Median covered-case investigation time does not improve by at least 50% in the first 30 days of pilot use
    - More than 70% of late-stage prospects choose bundled incumbent tooling without running or expanding a pilot
  mermaid: |
    flowchart LR
      Wedge[Identity and SaaS-admin queue wedge] --> MVP[Read-only case assembly MVP]
      MVP --> Proof[Faster analyst verdicts and auditable case records]
      Proof --> Expansion[More domains, response hooks, and broader SOC coverage]
investorMemo:
  verdict:
    call: "Meet / investigate further"
    conviction: Strong pain and a disciplined wedge, but conviction depends on proving faster time-to-value and better trust than crowded AI-SOC alternatives.
    whyBelieve: The plan targets a narrow evidence-assembly bottleneck with an identified buyer, clear trigger, and measurable ROI inside existing SecOps spend.
    whyDoubt: Platform incumbents and well-funded AI-SOC startups can compress the standalone window if the product does not deploy fast and show clearly better mixed-stack case quality.
    nextDiligence: Confirm three paid pilots that use only the five-core-connector stack and show at least a 50% improvement in covered-case investigation time.
  firstCustomer:
    title: Director of Security Operations at a lean SaaS SOC
    profile: A Series C-D cloud-native B2B SaaS company with 500-1,500 employees, 8-12 analysts, and recurring identity or SaaS-admin backlog across Okta, Microsoft 365, AWS, and CrowdStrike.
    trigger: A recent credential-abuse incident, cyber-insurance renewal, board review, or hiring freeze makes faster investigation a board-visible requirement.
    buyer: Director of Security Operations or CISO
    initialContract: "$30k-$60k paid pilot on one queue and one-to-two incident classes, converting to roughly $120k-$180k annual ACV once the team adopts the workflow in production."
  mustBeTrue:
    - At least half of qualified buyers must treat identity and SaaS-admin investigation compression as a funded problem inside existing SecOps budget.
    - A five-connector read-only deployment must produce a measurable MTTI improvement within 30 days on covered incident classes.
    - Analysts must accept the case packet without reopening multiple consoles on most covered investigations.
    - At least several target buyers must prefer a neutral cross-stack case layer over Microsoft, Google, CrowdStrike, or AI-SOC platform bundles in live evaluations.
    - One-to-two investigation domains must support initial annual ACV above $120k without custom-services-heavy deployment.
  diligenceQuestions:
    - Which incident class closes fastest in practice: impossible travel, suspicious OAuth grants, privileged SaaS-admin changes, or identity compromise?
    - How often is the first budget unlocked by incident pain versus insurance or board pressure versus hiring constraints?
    - What exact evidence and audit controls are required for buyers to trust read-only AI case recommendations?
    - How many connectors beyond the core five are required in the first ten real deals?
    - In mixed Microsoft, Google, and CrowdStrike environments, where do bundled incumbent workflows still fail the analyst?
operatingAssumptions:
  - assumption: Buyers prefer a read-only case-assembly layer over autonomous response in the first purchase.
    basis: research.yaml
    validationTest: Run 10 buyer interviews and 3 pilot design reviews comparing appetite for read-only case assembly, analyst recommendations, and automated containment.
    decisionImpact: If false, the roadmap must move earlier into response automation, trust controls, and likely longer security reviews.
  - assumption: Okta, Microsoft 365, Google Workspace, AWS, and CrowdStrike cover enough early prospects to land the first three paid pilots.
    basis: idea.yaml
    validationTest: Track connector objections across the first 15 qualified opportunities and confirm at least 3 prospects will start with only the five-core stack.
    decisionImpact: If false, onboarding slows and hiring must shift earlier toward additional integrations or solutions engineering.
  - assumption: Buyers will pay $120k-$180k annual ACV for the first production deployment if the product compresses investigation time on one painful queue.
    basis: idea.yaml
    validationTest: Test three package structures in at least 8 budget-owner conversations and secure 2 signed pilots with written conversion expectations in the target range.
    decisionImpact: If false, the company must lower initial ACV, narrow scope, or rely more heavily on channel partners and lower-CAC segments.
  - assumption: Analyst feedback on assembled cases will produce a differentiated dataset that improves accuracy and trust on specific incident classes.
    basis: research.yaml
    validationTest: Capture at least 500 reviewed cases across the first pilots and measure whether analyst approvals and overrides materially improve case acceptance on the next release.
    decisionImpact: If false, the moat shifts from data advantage toward services, connectors, or workflow embedding, weakening long-term differentiation.
  - assumption: Founder-led direct sales can produce the first 5 paid pilots before a full enterprise sales team is hired.
    basis: operator judgment
    validationTest: Build a 30-account pipeline and require at least 5 paid pilots or signed pilot LOIs by month 9.
    decisionImpact: If false, the company should revisit wedge clarity, channel mix, and burn plan before scaling headcount.
experimentRoadmap:
  - horizon: "0–90 days"
    experiment: ICP and trigger discovery
    hypothesis: Target buyers will describe a named after-hours queue problem and a concrete budget trigger tied to incident pain, insurance renewal, board review, or headcount pressure.
    successMetric: 12 discovery interviews completed with at least 8 matching the target stack and 6 confirming an active buying trigger in the next 12 months.
    owner: Founder CEO
  - horizon: "0–90 days"
    experiment: Concierge benchmark on historical cases
    hypothesis: The initial identity and SaaS-admin workflows can reduce covered-case investigation time by at least 50% versus historical analyst process.
    successMetric: 2 design partners benchmark at least 25 historical cases each and show a median covered-case time reduction above 50%.
    owner: Founding eng
  - horizon: "90–180 days"
    experiment: Five-connector pilot deployment
    hypothesis: The product can deploy the core stack and generate useful case packets in under 30 days without services-heavy custom work.
    successMetric: 3 paid pilots launched with median time to first usable case under 30 days.
    owner: Product lead
  - horizon: "90–180 days"
    experiment: Pricing and packaging test
    hypothesis: Domain-plus-case-volume pricing converts better than seat-based or pure consumption pricing.
    successMetric: Preferred package wins in at least 5 of 8 pricing conversations and appears in 2 signed pilot scopes.
    owner: Founder CEO
  - horizon: "6–12 months"
    experiment: Coexistence export validation
    hypothesis: Export into the customer's SIEM, ticketing, and response workflow materially improves pilot-to-production conversion.
    successMetric: At least 2 customers use the product's case record inside their production escalation workflow and convert to annual contracts.
    owner: Security product lead
  - horizon: "12–18 months"
    experiment: Partner-sourced pipeline
    hypothesis: IR, vCISO, and ecosystem partners can source qualified pilots with conversion comparable to founder-led outbound.
    successMetric: 25% of qualified pipeline comes from 2 active partners with pilot conversion no worse than founder-led sales.
    owner: GTM lead
operations:
  - Maintain a standard deployment playbook for the five-core-connector stack with least-privilege read-only access and documented data boundaries.
  - Run case-quality reviews against historical and live investigations before expanding to new incident classes.
  - Preserve audit-ready evidence exports and analyst decision logs so the product fits existing incident-response and reporting processes.
  - Use design partners and selected ecosystem partners for onboarding leverage instead of building a services-heavy deployment team.
team:
  - role: Founder CEO
    startTiming: Month 0
    rationale: Own founder-led sales, design-partner discovery, pricing, and early partner development before the motion is repeatable.
  - role: Founding eng
    startTiming: Month 0
    rationale: Build the core case graph, connector framework, and analyst feedback loop needed for the first benchmark proof point.
  - role: Detection engineering lead
    startTiming: Month 1
    rationale: Encode the first incident classes, benchmark quality against historical cases, and keep the product grounded in real SOC workflows.
  - role: Security product lead
    startTiming: Month 4
    rationale: Own pilot deployment, coexistence with SIEM or SOAR workflows, and packaging that reduces custom work.
  - role: GTM lead
    startTiming: Month 9
    rationale: Add pipeline capacity only after the first pilot-to-production pattern and pricing model are validated.
milestones:
  - horizon: "0–12 months"
    items:
      - Launch 3 paid pilots on the five-core-connector stack.
      - Show at least 50% MTTI improvement on covered incident classes for 2 design partners.
      - Convert at least 2 pilots into annual production contracts.
      - Standardize read-only deployment and export into existing SIEM or ticket workflows.
  - horizon: "12–24 months"
    items:
      - Reach 8-12 production customers using one-to-two investigation domains.
      - Add additional identity and SaaS-admin incident classes plus analyst-approved response hooks.
      - Establish 2 partner channels that source qualified pipeline.
      - Demonstrate repeatable deployment in under 30 days without heavy custom services.
  - horizon: "24–36 months"
    items:
      - Reach roughly 40 customers at blended ACV consistent with the modeled SOM.
      - Expand into adjacent endpoint and cloud-account investigations while keeping identity and SaaS-admin as the proof anchor.
      - Build a reusable evaluation and case-quality dataset that improves win rate against bundled incumbents.
risks:
  - risk: Bundled Microsoft, Google, CrowdStrike, or AI-SOC platform capabilities become good enough for mixed-stack investigations.
    likelihood: High
    impact: High
    mitigation: Stay vendor-neutral, win on faster five-connector deployment, and focus sales on cases where buyers still open multiple consoles.
  - risk: Five connectors do not produce enough first-month value for pilots.
    likelihood: Medium
    impact: High
    mitigation: Start with design partners that match the target stack exactly and prove one-to-two incident classes before broadening ICP.
  - risk: Analysts do not trust the assembled verdict without reopening raw tools.
    likelihood: Medium
    impact: High
    mitigation: Expose full evidence trails, benchmark against historical cases, and require human approval for escalation and containment.
  - risk: Security review, residency, and procurement requirements lengthen enterprise sales cycles.
    likelihood: Medium
    impact: Medium
    mitigation: Lead with read-only deployment, least-privilege access, clear model-data boundaries, and documented tenant isolation early in the process.
  - risk: Deployment becomes services-heavy as customers demand broader connector coverage too early.
    likelihood: Medium
    impact: Medium
    mitigation: Hold the beachhead to the core stack, productize onboarding, and defer adjacent markets until deployments are repeatable.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2–4M
  runwayMonths: 18
  useOfFundsSummary: Fund 18 months of runway to build the five-core-connector MVP, secure 3-5 paid pilots, prove pilot-to-production conversion on one SecOps queue, and establish a repeatable read-only deployment motion before scaling sales.
