competitors:
- name: 手榴弹
  stage: 扩大规模
  wedge: 代理的 SOC 平台 跨越分解,调查和反应。
  pricing: 定制企业定价.
  strength: 强烈的自主性叙事 反应的管弦和广义的超代理定位。
  weaknessVsUs: 更宽的平台姿势可以使其感觉比有重点的,只读的身份/SaaS case-assembly wedge 更重,以取而代之的 SaaS SOCs.
  sourceRefs:
  - 18
  - 84
- name: 猎人
  stage: 扩大规模
  wedge: 自动调查的 SOC 平台为较小的队伍发出警报.
  pricing: 定制企业定价.
  strength: 明确小队定位和量化警戒减速.
  weaknessVsUs: 更多平台外形,在身份和 SaaS-admin 案例包方面不够明确。
  sourceRefs:
  - 20
  - 19
- name: 空投区 AI
  stage: 扩大规模
  wedge: 自主 AI SOC 分析师,具有可审计的调查工作流程.
  pricing: 定制企业定价.
  strength: 强烈的自动化主张,审计-拖车通讯,以及明显的客户部署证明点.
  weaknessVsUs: 仍然销售一般 AI 分析员类别;更窄的事件级楔形可更快速地部署,基准更干净.
  sourceRefs:
  - 88
  - 89
- name: 放射性安全
  stage: 扩大规模
  wedge: 具有响应计划和日志管理角度的透明 AI SOC 平台.
  pricing: 定制企业定价.
  strength: 强调可解释性和业务透明度,这在怀疑的 SOC 小组中很重要。
  weaknessVsUs: 较宽的平台和日志管理故事可能比狭义的案件组叠加具有更大的迁移运动.
  sourceRefs:
  - 90
  - 94
- name: 微软安全副驾驶
  stage: 任职者
  wedge: 嵌入 AI 助手横跨卫士,哨兵,和恩特拉.
  pricing: 由微软证券内部的消费或企业捆绑驱动。
  strength: 巨大的安装基座和深层本土访问微软遥测.
  weaknessVsUs: 最适合于以微软为中心的地产;中性产品可以在混合 SaaS 和云工具之间收集证据而无需引导购买者进入一个控制平面.
  sourceRefs:
  - 26
  - 27
regulatoryTechnicalConstraints:
- point: 该产品必须保存可审计的事件记录和分析师的决定线索,以适应现代事件应对做法。
  sourceRefs:
