openQuestions:
- How low can deployment scope stay while still producing a compelling MTTI improvement in the first month?
- Will buyers pay a standalone budget line, or will the product need to land as an overlay inside existing SIEM/SOAR spend?
- 'Which incident class closes fastest in practice: impossible travel, suspicious OAuth grants, or privileged SaaS-admin changes?'
- How often do regulated SaaS buyers require private deployment, region controls, or strict model-isolation commitments before pilot approval?
