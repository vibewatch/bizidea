competitors:
- name: Torq
  stage: scale-up
  wedge: Agentic SOC platform spanning triage, investigation, and response.
  pricing: Custom enterprise pricing.
  strength: Strong autonomy narrative with response orchestration and broad HyperAgent positioning.
  weaknessVsUs: Broader platform posture can make it feel heavier than a focused, read-only identity/SaaS case-assembly wedge for lean SaaS SOCs.
  sourceRefs:
  - 18
  - 84
- name: Hunters
  stage: scale-up
  wedge: SOC platform that auto-investigates alerts for smaller teams.
  pricing: Custom enterprise pricing.
  strength: Clear small-team positioning and quantified alert-triage reduction.
  weaknessVsUs: More platform-shaped and less explicitly specialized around identity and SaaS-admin case packets.
  sourceRefs:
  - 20
  - 19
- name: Dropzone AI
  stage: scale-up
  wedge: Autonomous AI SOC analyst with auditable investigation workflow.
  pricing: Custom enterprise pricing.
  strength: Strong automation claims, audit-trail messaging, and visible customer deployment proof points.
  weaknessVsUs: Still sells a general AI analyst category; a narrower incident-class wedge could deploy faster and benchmark more cleanly.
  sourceRefs:
  - 88
  - 89
- name: Radiant Security
  stage: scale-up
  wedge: Transparent AI SOC platform with response plans and log-management angle.
  pricing: Custom enterprise pricing.
  strength: Emphasizes explainability and operational transparency, which matters in skeptical SOC teams.
  weaknessVsUs: Broader platform and log-management story risks a bigger migration motion than a narrow case-assembly overlay.
  sourceRefs:
  - 90
  - 94
- name: Microsoft Security Copilot
  stage: incumbent
  wedge: Embedded AI assistant across Defender, Sentinel, and Entra.
  pricing: Consumption or enterprise-bundle driven within Microsoft security spend.
  strength: Huge installed base and deep native access to Microsoft telemetry.
  weaknessVsUs: Best fit in Microsoft-centric estates; a neutral product can assemble evidence across mixed SaaS and cloud tools without steering buyers into one control plane.
  sourceRefs:
  - 26
  - 27
