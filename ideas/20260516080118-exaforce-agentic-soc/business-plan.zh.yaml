slug: soc-case-assembly-engine
date: '2026-05-16'
executiveSummary: 这家公司应该开始作为一个供应商中立的个案组装引擎,用于一套小的身份和 SaaS-admin 内部精干内部的 SOC 调查,而不是一个完全自主的 SOC 平台. 第一个客户是拥有 500-1500 名员工的 C-D 云族 B2B SaaS 系列公司,一个 8-12 人的安全团队,以及反复出现的 Okta,Microsoft 365,AWS,SaaS-admin 等需要人工收集证据的后排. 购买触发器通常是最近发生的证明-滥用事件,网络保险或董事会审查,或使另一个分析师更难证明理由的冻结人头数. 研究支持一个有重点的市场,估计有 2.1B TAM,450.0M SAM,如果公司能够将大约 40 个客户降落在企业安全 ACV,则可以达到 7.2M 年-3 SOM。 该产品应首先部署只读,为少数重复事件类型组装分析师准备的案卷,并证明在增加更广泛的响应自动化之前调查的平分时间更短. 尽管这意味着推迟终点、内幕风险和全平台野心, 最大的不确定风险是五个连接器不足以在第一个月交付价值,或者捆绑了微软,Google,CrowdStrike,以及 AI-SOC 平台已经足够好. 投入中未提供精确的私有公司定价基准和独立的预算行为,因此以下的定价和试点转换假设必须及早测试.
problem:
- 精益 SaaS SOC 团队仍花费数小时收集身份,云,端点和 SaaS 证据,然后才能决定是升级还是关闭警报.
- 现有的 SIEM,SOAR,MDR,以及副驾驶工作流程丰富了告警,但仍让分析师们将奥克塔,微软 365,Google 工作空间,AWS,以及 EDR 上下文一手缝合.
solution:
- 客户现有堆栈中最难读的信号, 并自动制作一个分析师准备的病例包, 用于一系列数量有限的事件类, 如可疑的 OAuth 赠款, 无法旅行, 身份妥协,
- 显示全部证据线索、实体时间表、信心分数,并建议在可出口案件记录内采取下一步措施,以便分析人员能够批准升级或关闭,而不在第一天对产品进行自主控制。
whyWeWin:
- 楔形体比广义的 AI-SOC 平台更窄并直接被映射到重复的证据组装步骤,其中买方疼痛、信任要求和可衡量的 ROI 是最清楚的。
- 与另一个 SOC 聊天界面相比,整个身份、云、SaaS 和端点系统的供应商中性大小写图更难复制,因为它依赖于正常的连接器、跨工具推理和关于分析器的反馈。
- 仅读部署加上审计准备的推理比首次采购的自主第一投出更符合当前的事件应对和治理预期。
strategicChoices:
  beachhead: 系列 C-E 云母 B2B SaaS 公司拥有 300-2,000 名员工,一个 5-20 人的内部安保团队,以及一个以身份和 SaaS-admin 调查为主的 24/7 分队,横跨奥克塔,Microsoft 365 或 Google Workspace,AWS,和 CrowdStrike.
  wedgeRationale: 身份和 SaaS-admin 病例是频繁的,痛苦的,并且很容易以历史分析工作为基准,因此它们创造的证明比试图替换完整的 SOC 或者将各种警戒类型的广泛反应自动化要快.
  sequencingRationale: 起先为 5 个只读连接器和一至两起事件类,因为部署速度,分析员信任,以及试制到生产转换在自主宽度前都很重要. 只有公司证明时间对价值和案例准确性之后,它才能增加更多的事件类别,响应钩,伙伴渠道,以及更广泛的销售雇用.
  notYet:
  - 未经分析师批准,完全自主封闭
  - 广端点 内幕风险 云跑时调查 超越初始身份和 SaaS-admin wedge
  - 需要不同工作流程和购买动作的 MSSP 第一包装
  - 在北美加上联合王国/欧盟海滩头之前的受管制区域私人部署变体可重复使用
market:
  tam: 2.1B 估计 TAM 基于目标成熟度波段内大约 7 000 个全球云-内生 SaaS 账户,每年用于调查自动化或相邻 SOAR 预算的混合支出约为 300 克。
  sam: 估计 450.0M SAM 基于约 1500 个北美加上英国/欧盟的账户,目标堆栈合适并愿意添加有重点的 SecOps 点溶液.
  som: 720 万美元模拟年-3SOM 基于大约 40 名客户,约 180 克混合 ACV 用于一至二个调查领域.
  segments:
  - 主要部分:云生 B2B SaaS 公司,拥有精干的内部 SOC 团队并经常出现身份或 SaaS-admin 警报积压
  - 二级部分:规模较大的混合工具安保小组从人工分门别类和 MDR-重型工作流程现代化
  buyingProcess: 日常冠军一般是 SOC 经理,检测工程领导,或高级分析师,而经济买家通常是安全业务主管或 CISO. 交易应围绕事故、保险或董事会审查或人头计算限制开始,作为狭义的付费飞行员在一个队列上运行,当买方看到在现有 SIEM 和响应程序内更快地结案时进行转换。
product:
  mvp: MVP 应该以只读模式连接 Okta,Microsoft 365,Google Workspace,AWS,和 CrowdStrike,并为两个高频事件类组装分析器准备包. 它必须包括实体时间表,原始日志链接,信心评分,分析师反馈捕捉,并导出到客户现有的案例或票务工作流程.
  sixMonth: 证明在 30 天内部署 5 个核心连接堆,对照历史 MTTI 报告船舶基准,并支持初步身份妥协,加上可疑的 OAuth 或特权管理工作流程。
  twelveMonth: 添加更多可重复身份和 SaaS-admin 案例,针对客户的调试,包装的 SIEM 或 SOAR 导出路径,以及对包含的低风险动作的分析批准响应钩.
  twentyFourMonth: 扩展为相邻端点和云账户调查,运送可重复使用的跨客户案件图表和评价层,从一个队列楔形移到范围更广的 SOC 操作层,并带有选择性的封装自动化.
  keyBets:
  - 五个只读的连接器足以产生令人信服的第一个月 MTTI 改进.
  - 购买者更喜欢分析师准备的病例包,而不是第一次购买的另一个 SOC 聊天界面.
  - 历史和现场分析师的反馈可以创造出一个更好的调查数据集,而不只是广泛的自主主张。
  - 初始身份和 SaaS-admin wedge 可以在客户要求全端点和云跑时间宽度之前进行转换.
gtm:
  wedge: 出售一个付费飞行员,通过自动装配案例为 1 至 2 个事件类别清除 1 个小时后身份或 SaaS-admin 队列,然后在分析员依赖其正常升级工作流程中的产出后转换成年度生产合同.
  channels:
  - 直接由创始人领导外出担任安保行动主任、国际情报和安全组织主任以及目标 SaaS 公司的侦查负责人
  - 通过身份、云和 SIEM 生态系统伙伴共同销售,产品依赖现有的遥测
  - 事件应对、VCISO 和网络保险顾问,在实际事件或更新后,发现调查工作流程薄弱
  funnelTargets: 发现呼唤合格试点 20-30%,试点 50-Q 生产 50-Q,90 天内从试点起跑到生产合同的时间.
  pricing: 年度平台订阅价格按相连的调查领域和每月案件数量计算,因为买方已经围绕受保护的工作流程和预期排队次数减少而不是座位编列预算。 初步定价假设是 30 克至 60 克的付费试点,在第一次生产部署中,每年将大约 120 克至 180 克的 ACV 转换为大约 120 克至 180 克的付费试点,从额外的事件类别和经批准的行动扩展.
businessModel:
  revenueStreams:
  - 案件组合平台年度订阅
  - 基于使用量的扩展与月度案件数量和其他调查领域挂钩
  - 用于响应钩、审计报告和更高保障部署控制的多米模块
  unitOfValue: 调查领域和每月分析准备案件数量
  targetGrossMarginPct: 70
  expansionLevers:
  - 在第一个队列证明后, 在同一客户端内增加更多事件类
  - 一旦建立只读信任, 扩展连接器覆盖和响应行动
  - 从一个 SOC 队列转到更广泛的身份、 云和端点调查工作流程
strategyMap:
  northStarMetric: 使用组装案件包,在 15 分钟内作出分析师判断的合格目标警报
  inputMetrics:
  - 生产换算率试点.
  - 调查所报道事件的平均时间
  - 未经分析员重新开放多个外部控制台而接受的案件百分比
  - 是时候部署前五个连接器了
  - 每个客户的生产调查领域数目
  moatsToBuild:
  - 跨工具案件图表和身份、SaaS、云和端点工作流程的规范化证据模型
  - 由分析师核准、推翻和按事件类别升级案件判决的地面真实数据集
  - 与在任 SIEM、SOAR 和应对工具的深度共存整合
  - 缩短安全审查和采购时间的随时审计的推理和部署控制
  killCriteria:
  - 在 30 次目标账户谈话后,不到 3 名付费飞行员侧重于身份和 SaaS-admin 排队减免
  - 在前 6 个试点之后进行低于 50% 的生产转换试点
  - 在试点使用头 30 天内,覆盖案件调查的中间时间没有增加至少 50%
  - 70% 以上的后期前景选择捆绑式现有工具而不运行或扩大试点
  mermaid: "flowchart LR\n  Wedge[Identity and SaaS-admin queue wedge] --> MVP[Read-only case assembly MVP]\n  MVP --> Proof[Faster analyst verdicts and auditable case records]\n  Proof --> Expansion[More domains, response hooks, and broader SOC coverage]\n"
investorMemo:
  verdict:
    call: 会见/进一步调查
    conviction: 强烈的疼痛和有纪律的楔子,但信念取决于证明比拥挤的 AI-SOC 替代品更快的时间到价值和更好的信任.
    whyBelieve: 该计划的目标是在 SecOps 现有支出范围内,用一个明确的买家、明确的触发器和可衡量的 ROI 来装配一个狭窄的证据组合瓶颈。
    whyDoubt: 平台任职者和资金充足的 AI-SOC 起动企业,如果产品不快速部署,并明显显示更好的混合堆积箱质量,可以压缩独立窗口.
    nextDiligence: 确认 3 名付费飞行员只使用 5 个核心连接堆栈,并显示覆盖案件调查时间至少提高 50%.
  firstCustomer:
    title: SaaS SOC 安保业务主任
    profile: 拥有 500-1500 名员工,8-12 名分析师,以及反复出现的身份或 SaaS-admin 积压的系列 C-D 云族 B2B SaaS 公司横跨奥克塔,Microsoft 365,AWS,和 CrowdStrike.
    trigger: 最近发生的一次证书滥用事件、网络保险续约、董事会审查或招聘冻结,使得更快的调查成为董事会的可见要求。
    buyer: 安保业务主任或 CISO
    initialContract: 30 克-60 克的付费飞行员在一个排队和一对两个事件班次上,一旦团队在生产中采用工作流程,则转换为大约 120 克-180 克的年度 ACV.
  mustBeTrue:
  - 至少有一半合格的买家必须将身份和 SaaS-admin 调查压缩视为现有 SecOps 预算内的一个资金问题。
  - 五连通只读部署必须在 30 天内对涵盖的事件类别作出可衡量的 MTTI 改进。
  - 分析员必须接受案件包,而不打开大多数调查的多台控制台。
  - 至少有几个目标买家在现场评价中必须更喜欢中性跨上层的相片,而不是微软,Google,CrowdStrike,或者 AI-SOC 平台捆绑.
  - 一至二个调查领域必须支持每年 120 克以上的初次奥地利中心调查,而无需进行定制服务重型部署。
  diligenceQuestions:
  - 哪类事件实际上关闭得最快:不可能的旅行,可疑的 OAuth 赠款,特权 SaaS-admin 变更,或者身份妥协?
  - 第一笔预算多少时候会因事故痛苦与保险或董事会压力与雇用限制而解锁?
  - 买方需要哪些确切证据和审计控制才能相信只读的 AI 案例建议?
  - 在前十个真正的交易中,需要多少核心五以外的连接器?
  - 在混合微软,谷歌,和 CrowdStrike 环境中,捆绑的现任工作流程仍然让分析师失望?
operatingAssumptions:
- assumption: 购买者在第一次购买中更倾向于只读大小写组装层,而不是自主响应.
  basis: research.yaml
  validationTest: 进行 10 次买方面谈和 3 次试点设计审查,比较只读案件组装、分析建议和自动封装的胃口。
  decisionImpact: 如果错误,路线图必须更早地进入响应自动化、信任控制以及可能更长的安全审查。
- assumption: Okta, Microsoft 365, Google Workspace, AWS, 和 CrowdStrike 覆盖了足够的早期前景,可以登陆前三名付费飞行员.
  basis: idea.yaml
  validationTest: 在前 15 个限定机会中跟踪连接器的反对意见,并证实至少 3 个前景将只从五核堆开始.
  decisionImpact: 如果错误的话,上岗缓慢和雇用必须提前转向额外的整合或解决方案工程。
- assumption: 购买者将支付 120 克-180 克年度 ACV,用于首次生产部署,如果产品压缩调查时间在一个痛苦的队列上.
  basis: idea.yaml
  validationTest: 在至少 8 个预算所有者对话中测试 3 个套件结构,并获得 2 个在目标范围内具有书面转换预期的签名飞行员.
  decisionImpact: 如果虚假,公司必须降低初始 ACV,缩小范围,或更严重地依赖频道合作伙伴和下 CAC 部分.
- assumption: 分析员对所收集案件的反馈将产生一个有区别的数据集,以提高具体事件类别的准确性和信任度。
  basis: research.yaml
  validationTest: 在第一批试点中,至少抓取 500 起经审查的案件,并衡量分析员的核准和推翻是否大大改善了下次发布时的案件接受率。
  decisionImpact: 如果错误,护城河从数据优势转向服务、连接器或工作流程嵌入,削弱了长期差异。
- assumption: 创始人主导的直接销售可以在雇用完整的企业销售团队之前产生前 5 名付费飞行员.
  basis: 运营商判决
  validationTest: 建设 30 个账户的管道,要求至少 5 个付费的飞行员或签署试点最低可见度指数到 9 月.
  decisionImpact: 弄虚作假的,公司应当重新审视楔形清晰度,通道混合度,并进行点火计划后再进行规模化人头统计.
experimentRoadmap:
- horizon: 0–90 天
  experiment: 比较方案和触发发现
  hypothesis: 目标买家将描述一个指名的小时后排队问题和与事件疼痛、保险更新、董事会审查或人头统计压力挂钩的具体预算触发因素。
  successMetric: 完成 12 次发现访谈,至少 8 次匹配了目标堆,6 次证实未来 12 个月内有主动购买触发.
  owner: 创始人 CEO
- horizon: 0–90 天
  experiment: 历史案例简明基准
  hypothesis: 初始身份和 SaaS-admin 工作流程可以将覆盖案件调查时间比历史分析程序减少至少 50%.
  successMetric: 2 个设计伙伴将每个案例至少 25 个历史案例作为基准,并显示覆盖案例时间中位数减少 50% 以上。
  owner: 铸币局
- horizon: 90–180 天
  experiment: 五连通试点部署.
  hypothesis: 产品可以在不到 30 天的时间里部署核心堆放并生成有用的案例包,而无需服务繁重的自定义工作.
  successMetric: 3 名付费飞行员在 30 天以内以中位数时间首次使用病例。
  owner: 产品铅
- horizon: 90–180 天
  experiment: 定价和包装试验
  hypothesis: 域-加-例-量的定价比以座位为基础的或纯消费定价更能转换.
  successMetric: 首选套件在 8 个定价对话中至少 5 个中获胜,并出现在 2 个签名的试点范围中.
  owner: 创始人 CEO
- horizon: 6–12 个月
  experiment: 共存出口验证
  hypothesis: 出口到客户的 SIEM,售票,以及响应工作流程在实质上改进了试制到生产转换.
  successMetric: 至少有 2 个客户在其生产升级工作流程中使用产品的案例记录并转换为年度合同.
  owner: 安全产品领先
- horizon: 12–18 个月
  experiment: 伙伴来源管道
  hypothesis: IR,vCISO,和生态系统伙伴可以提供合格的飞行员,其转换与创始人主导的出行相当.
  successMetric: 25% 的合格管道来自 2 个试点转换的活跃伙伴,不低于创始人主导的销售。
  owner: GTM 铅
operations:
- 维护五核连接堆栈的标准部署游戏本,并有最小的只读访问和有文件记载的数据边界.
- 对历史和现场调查进行案件质量审查,然后扩大到新的事件类别。
- 保存可供审计的证据出口和分析员的决定记录,使产品符合现有的事件应对和报告程序。
- 利用设计伙伴和选定的生态系统伙伴来利用杠杆,而不是建立一个服务重型部署小组。
team:
- role: 创始人/CEO
  startTiming: 0 个月
  rationale: 拥有创始人主导的销售,设计伙伴发现,定价,以及动作可重复之前的早期伙伴开发.
- role: 创始工程师
  startTiming: 0 个月
  rationale: 构建第一个基准证明点所需的核心案例图表,连接器框架,和分析师反馈回路.
- role: 检测工程负责人
  startTiming: 第 1 个月
  rationale: 编码第一批事件类,参照历史案例衡量质量,并保持产品以真实的 SOC 工作流程为底.
- role: 安全产品负责人
  startTiming: 第 4 个月
  rationale: 拥有飞行员部署,与 SIEM 或 SOAR 工作流程并存,以及减少自定义工作的包装.
- role: GTM 负责人
  startTiming: 第 9 个月
  rationale: 只有在验证了第一个试制到生产模式和定价模式后,才增加管道容量.
milestones:
- horizon: 0–12 个月
  items:
  - 发射 3 名付费飞行员 在五核连接堆。
  - 显示两个设计伙伴在覆盖事件类别上至少 50% 的 MTTI 改进.
  - 将至少 2 名飞行员转为年度生产合同。
  - 将只读部署标准化,并导出到现有的 SIEM 或票务工作流程.
- horizon: 12–24 个月
  items:
  - 利用一至二个调查领域,联系 8-12 个生产客户。
  - 新增身份和 SaaS-admin 事件分类+分析师批准的反应钩.
  - 建立 2 个伙伴渠道,提供合格的管道。
  - 在 30 天内展示可重复部署,不提供重型定制服务。
- horizon: 24–36 个月
  items:
  - 与型号 SOM 一致的混合式自动售货中心约有 40 名客户。
  - 扩展到相邻的端点和云账户调查,同时保留身份和 SaaS-admin 作为证明锚.
  - 建立可重复使用的评价和案件质量数据集,以提高对捆绑在职者的胜率。
risks:
- risk: Bundled Microsoft, Google, CrowdStrike, 或 AI-SOC 平台能力变得足以进行混合堆放调查.
  likelihood: High
  impact: High
  mitigation: 保持供应商中立,以更快的五连通部署取胜,将销售重点放在买家仍然打开多台控制台的情况下.
- risk: 5 个接通器无法为飞行员产生足够的第一个月值.
  likelihood: Medium
  impact: High
  mitigation: 从设计伙伴开始,这些伙伴与目标堆栈完全吻合,并在扩大比较方案之前证明 1 至 2 个事件类别。
- risk: 分析员不重开原始工具,就不相信集合的判决。
  likelihood: Medium
  impact: High
  mitigation: 暴露出全部证据线索,参照历史案例,并需要人类批准才能升级和遏制.
- risk: 安全审查、居住和采购要求延长企业销售周期。
  likelihood: Medium
  impact: Medium
  mitigation: 率先以只读部署为主,最少优先接入,清晰的模型数据界限,以及早期记录的租户隔离.
- risk: 部署工作变得繁重,因为客户需要更广阔的连接器覆盖范围太早。
  likelihood: Medium
  impact: Medium
  mitigation: 将海滩头拉到核心堆上,使上船成品,并推迟相邻市场,直到部署可重复。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: 2 -- 4M 美元
  runwayMonths: 18
  useOfFundsSummary: 出资 18 个月跑道建设 5 个核心接通机 MVP,保障 3-5 名付费飞行员安全,在 1 个 SecOps 队列上证明试制到生产转换,并确立可重复的只读部署动作后再进行规模化销售.
