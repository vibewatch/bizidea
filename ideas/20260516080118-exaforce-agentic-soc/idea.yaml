problem: >-
  Lean security operations teams at cloud-native B2B SaaS companies are drowning in identity, endpoint, and cloud alerts, but the true bottleneck is not detection volume alone—it is the hours analysts spend assembling evidence before they can decide whether to escalate. As attackers move faster and on-call coverage stays thin, after-hours queues grow, real incidents hide inside noisy alert streams, and burned-out analysts fall back to shallow triage. Existing SIEM, SOAR, and MDR setups still leave humans stitching together Okta, Microsoft 365, AWS, and EDR context by hand.
targetUser:
  primary: Security operations managers and senior detection engineers at cloud-native B2B SaaS companies running a lean in-house SOC.
  secondary: Incident responders and platform security engineers who inherit escalations and tune detections.
  buyer: Director of Security Operations or CISO at a Series C-E SaaS company.
startupThesis:
  nonObviousInsight: >-
    The winning AI-SOC wedge is not another generic copilot on top of alerts; it is the case-assembly layer that gathers cross-tool evidence for a few repetitive, high-volume incident classes and hands analysts a defendable verdict in minutes.
  beachhead: >-
    Series C-E cloud-native B2B SaaS companies with 300-2,000 employees, a 5-20 person security team, Microsoft 365 or Google Workspace, Okta, AWS, and an under-covered 24/7 SOC queue dominated by identity and SaaS admin alerts.
  wedge: >-
    An AI investigation engine that auto-builds analyst-ready case files for identity compromise, suspicious OAuth grants, impossible travel, and privileged SaaS admin changes across Okta, Microsoft 365, Google Workspace, AWS, and CrowdStrike.
  whyNowCatalyst: >-
    Exaforce's funding and customer metrics show buyers are no longer just experimenting with AI in the SOC—they are paying to compress investigation time because attacker speed and alert volume have made manual evidence gathering intolerable.
  ventureScalePath: >-
    Once the product owns case assembly for identity and SaaS incidents, it can expand into endpoint, cloud, insider-risk, and automated containment workflows, becoming the operating layer between detection tools and every downstream security decision.
solution: >-
  The product plugs into the customer's existing SIEM, identity provider, EDR, cloud audit logs, and key SaaS admin systems, then assembles a unified case graph every time one of a defined set of incident types fires. Instead of giving analysts another chat window, it produces an analyst-ready investigation packet with entity timeline, corroborating evidence, confidence score, recommended next step, and links to the raw logs. Analysts approve escalation, containment, or closure, which creates a feedback loop for model evaluation without handing over autonomous control on day one. The initial deployment focuses on identity and SaaS admin incidents where evidence gathering is repetitive, painful, and easy to benchmark against historical analyst work.
goToMarketSeed:
  firstCustomer: >-
    Director of Security Operations at a Series C-D SaaS company with 500-1,500 employees, Okta, Microsoft 365, AWS, CrowdStrike, and 8-12 analysts struggling to clear after-hours identity and SaaS admin alerts before the next workday.
  buyingTrigger: >-
    A credential-abuse incident, cyber-insurance renewal, board review, or headcount freeze that forces the SOC to cut mean time to investigate without hiring another shift.
  currentAlternative: >-
    Manual triage inside Splunk, Sentinel, or Chronicle, plus MDR escalation and brittle SOAR playbooks that still require analysts to collect evidence across multiple consoles.
  switchingReason: >-
    The product drops into the existing stack, targets the highest-volume repetitive alert classes first, and gives analysts fully assembled cases instead of another chat interface or rip-and-replace SIEM.
  pricingHypothesis: >-
    Annual platform subscription priced by connected investigation domains and monthly case volume, with expansion tied to additional incident classes and automated actions.
