jobsToBeDone:
  - job: >-
      When after-hours identity or SaaS admin alerts pile up, help a security operations manager triage the queue with defendable case files, so they can escalate only the incidents that truly need human response before business opens.
    currentAlternative: Manual investigation across SIEM, IdP, SaaS logs, and MDR tickets
    successMetric: Mean time to investigate and percentage of alerts closed before next business day
  - job: >-
      When a suspicious OAuth grant or privileged admin change fires, help a senior analyst gather cross-tool evidence fast, so they can decide whether to contain, escalate, or close without opening six consoles.
    currentAlternative: Analyst-led evidence gathering plus canned SOAR enrichments
    successMetric: Minutes to analyst verdict and false-positive close rate
