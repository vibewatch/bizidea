topRisks:
  - name: Analyst trust gap
    description: Security teams may reject recommendations they cannot audit, especially in high-stakes investigations.
    mitigation: Start with evidence assembly and human approval, expose the full artifact trail behind every recommendation, and benchmark against historical cases.
  - name: Integration drag
    description: Connecting enough identity, cloud, and SaaS systems to make the product useful can slow deployment and expansion.
    mitigation: Launch with a narrow read-only connector set for the five highest-value systems and use concierge onboarding for the first design partners.
  - name: Crowded AI-SOC market
    description: Broad AI-SOC vendors could position similar capabilities before the company earns a strong brand.
    mitigation: Own a narrower beachhead around identity and SaaS admin case assembly for lean SaaS SOCs, then expand only after proving MTTI gains.
