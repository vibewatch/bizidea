scenarios:
  downside:
    description: Pilots still close, but production conversion slips, ACV stays closer to $150K, and partner channels contribute later than planned.
    y3RevenueK: 2890.0
    y3EbitdaK: -610.0
    cashLowPointK: -220.0
    keyAssumptionChanges:
    - Q4Y3 customers reach 28 instead of 40.
    - Y3 blended ARPU stays near $150K instead of $165K.
    - Gross margin stalls at 66% because deployment remains somewhat services-heavy.
  base:
    description: Three paid pilots in Y1 become a repeatable founder-led motion, then partner channels help expand to 40 customers by Q4Y3.
    y3RevenueK: 4172.6
    y3EbitdaK: 125.9
    cashLowPointK: 489.2
    keyAssumptionChanges:
    - Matches A4-A19 with 4 customers by M12, 11 by Q4Y2, and 40 by Q4Y3.
    - Uses the $60K pilot / $150K production / $180K Y3 exit pricing ladder.
    - Gross margin ramps from 62% to 68% to 70% as deployment becomes repeatable.
  upside:
    description: Faster benchmark proof shortens the sales cycle, lifts partner-sourced wins, and supports modest expansion pricing on more domains per account.
    y3RevenueK: 5230.0
    y3EbitdaK: 640.0
    cashLowPointK: 620.0
    keyAssumptionChanges:
    - Q4Y3 customers reach 48 instead of 40.
    - Y3 blended ARPU rises toward $175K on faster domain expansion.
    - Gross margin reaches 72% as onboarding stays productized.
