slug: soc-case-assembly-engine
date: '2026-05-16'
currency: USD
modelStartMonth: 2026-06
assumptions:
- id: A1
  name: Model start after pre-seed close
  value: 2026-06
  unit: YYYY-MM
  source: '[BP date + fundingAsk] Model starts the month after the dated plan so the pre-seed cash is available before operating spend begins.'
- id: A2
  name: Opening cash
  value: '3200.0'
  unit: USDK
  source: '[BP fundingAsk targetFundingRangeUsd $2–4M] Base case uses a $3.2M pre-seed, near the midpoint, to fund the 24-month milestone-plus-buffer rule.'
- id: A3
  name: Starting customers (M1)
  value: '0'
  unit: count
  source: '[BP product MVP + milestones] The company starts pre-revenue and signs its first paid pilot only after the five-core-connector MVP is live.'
- id: A4
  name: Y1 customer ramp
  value: 4 paying customers by M12 with additions in M6, M8, M10, and M12
  unit: count
  source: '[BP milestones 0–12 months] Anchored to 3 paid pilots and at least 2 pilot-to-production conversions inside the first year; month-by-month timing is a startup-finance interpolation.'
- id: A5
  name: Y2 customer ramp
  value: Q1Y2 6, Q2Y2 7, Q3Y2 9, Q4Y2 11 customers
  unit: count
  source: '[BP milestones 12–24 months] Directly anchored to the 8–12 production-customer goal by month 24, using a smooth quarterly ramp.'
- id: A6
  name: Y3 customer ramp
  value: Q1Y3 16, Q2Y3 23, Q3Y3 31, Q4Y3 40 customers
  unit: count
  source: '[BP milestones 24–36 months + Research market.som] Reaches the explicit roughly-40-customer Y3 endpoint; quarterly steps assume partner channels start contributing in Y3.'
- id: A7
  name: Pricing ladder
  value: Paid pilot $60K annualized; first production deployment $150K ACV; Y3 exit ACV $180K
  unit: annualK per customer
  source: '[BP gtm.pricing + BP investorMemo.initialContract + Research market.som] Uses the top end of the paid-pilot range, the midpoint of the $120K-$180K first production range, and the research SOM endpoint of ~$180K blended ACV by Y3.'
- id: A8
  name: Revenue recognition method
  value: Average active customers in period × blended realized price for pilot/production mix
  unit: formula
  source: '[BP gtm pricing] Used so revenue reconciles to customer counts without a separate cohort billing table.'
- id: A9
  name: Y1 gross margin
  value: '62.0'
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct 70] + startup-finance heuristic: early pilots carry extra onboarding and cloud-cost drag before the deployment playbook is standardized.'
- id: A10
  name: Y2 gross margin
  value: '68.0'
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct 70] Margin improves once read-only deployment and export workflows become repeatable.'
- id: A11
  name: Y3 gross margin
  value: '70.0'
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct 70] Base case reaches the plan target once deployments are productized and usage scales over a mostly software cost base.'
- id: A12
  name: Monthly logo churn for unit economics
  value: '2.0'
  unit: percent
  source: '[Startup-finance heuristic] Seed-stage enterprise security tools with annual contracts but a narrow initial wedge commonly underwrite 1.5%-2.5% monthly churn until expansion is proven.'
- id: A13
  name: Steady-state CAC
  value: '55.0'
  unit: USDK per customer
  source: '[BP gtm.funnelTargets + BP operatingAssumptions founder-led direct sales] Assumes founder-led outbound plus one GTM leader can keep acquisition in the mid-five-figure range despite security review and procurement drag.'
- id: A14
  name: Loaded salary bands
  value: Founder 180; Eng 210; Detection Eng 210; Product/Deployment 200; Sales 240; Solutions 180; G&A 150
  unit: annualK per FTE
  source: '[BP team + startup-finance heuristic] Uses lean US enterprise-security cash comp plus roughly 20% payroll/benefits load.'
- id: A15
  name: Hiring schedule
  value: Detection lead M1; Product/Deployment lead M4; GTM lead M9; Solutions M13; Eng M15; AE M18; Eng M21; Detection M27; Eng M30; Product/Deployment M32; Sales M34; Eng and G&A M36
  unit: timing
  source: '[BP team + BP strategicChoices.sequencingRationale] Connectors, case quality, and deployment hires come before scaling the sales org; later hires are smoothing heuristics after repeatability appears.'
- id: A16
  name: Headcount endpoint
  value: 5 FTE by Q4Y1, 9 FTE by Q4Y2, 15 FTE by Q4Y3
  unit: FTE
  source: '[BP team + BP milestones] Keeps the org lean through proof-of-repeatability, then adds engineering and GTM capacity only after the first production pattern is established.'
- id: A17
  name: Operating expense method
  value: Department lines include payroll plus modest cloud, travel, legal, and compliance overhead
  unit: policy
  source: '[BP operations + startup-finance heuristic] Reflects a software startup that relies on productized deployment rather than a large services bench.'
- id: A18
  name: Funding sizing rule
  value: Raise enough to reach the Q4Y2 milestone and still carry 6 months of buffer into Y3
  unit: policy
  source: '[BP fundingAsk runwayMonths 18 + model requirement] The explicit model policy extends the plan to a milestone-plus-buffer raise rather than a bare-minimum 18-month bridge.'
- id: A19
  name: Cash flow simplification
  value: Ending cash = opening cash + cumulative EBITDA
  unit: formula
  source: '[Startup-finance heuristic] Assumes minimal capex, debt, and working-capital distortion for an asset-light security software company.'
