modelDiagram:
  title: unit economics flow
  mermaid: |-
    flowchart LR
      Pipeline[Qualified pipeline] --> Pilots[Paid pilots]
      Pilots --> Production[Production customers]
      Production --> Expansion[More domains and case volume]
      Expansion --> Revenue[Subscription and usage revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash and runway]
modelSanity:
- checkName: Revenue engine
  finding: Base-case revenue comes from four paying customers by M12, 11 by Q4Y2, and a partner-assisted climb to 40 customers by Q4Y3 at a $150K-$180K ACV ladder.
- checkName: Must go right
  finding: The five-core-connector deployment has to show at least a 50% MTTI improvement inside 30 days so paid pilots convert above 50% without turning into services projects.
- checkName: Model breaks if
  finding: The model fails if sales cycles stretch past 120 days or connector demands expand beyond the core five, because cash bottoms near $489K even in the base case.
- checkName: Next-round proof
  finding: The next financing is justified by reaching 8-12 production customers, repeatable sub-30-day deployments, and visible partner-sourced pipeline by Q4Y2 while preserving six months of buffer.
sanityChecks:
  ruleOf40: Y3 growth 261.0% + EBITDA margin 3.0% = 264.0%; directionally strong but inflated by the small Y2 base.
  burnMultiple: Y2 burn multiple is about 0.9x ($1.3M EBITDA burn / roughly $1.4M net new ARR from ~$0.4M to ~$1.8M run-rate); Y3 turns EBITDA-positive in H2.
  revenuePerFte: $278K Y3 revenue per Q4Y3 FTE (benchmark $200–400K enterprise SaaS).
  flags:
  - The jump from 11 customers at Q4Y2 to 40 at Q4Y3 is the biggest execution leap in the model and depends on partner channels actually becoming productive.
  - Gross margin only reaches the 70% target if onboarding remains productized; extra connector or residency requests would push the company back into services-like delivery.
  - Cash bottoms at roughly $489K in Q2Y3, so a slower pilot-to-production cycle would likely force an earlier raise or a hiring slowdown.
