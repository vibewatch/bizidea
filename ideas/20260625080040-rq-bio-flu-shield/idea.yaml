jobsToBeDone:
  - job: >-
      When flu season approaches, help the specialty-pharmacy lead at a transplant center identify every immunocompromised patient who should receive prophylaxis, so the center can complete administrations before community spread accelerates.
    currentAlternative: Manual registry pulls and nurse-led outreach tracked in spreadsheets
    successMetric: Percentage of eligible patients administered prophylaxis before the seasonal cutoff date
  - job: >-
      When launching a new respiratory prophylaxis antibody, help the manufacturer market-access team see which sites can operationalize the therapy fastest, so launch dollars go to centers that will convert eligible patients into completed administrations.
    currentAlternative: Manufacturer hub reports and fragmented field feedback
    successMetric: Time from site onboarding to first completed administration
