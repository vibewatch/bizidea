problem: >-
  Transplant centers and hematologic oncology clinics care for patients who remain highly vulnerable to influenza even when routine vaccination underperforms, yet they do not have a dedicated operating system for season-long biologic prophylaxis. Eligibility lists are buried in EHR registries, payer authorization packets are assembled manually, and nursing, pharmacy, and infectious-disease teams often coordinate through spreadsheets and inboxes. As long-acting flu antibodies arrive, that fragmented process will leave the sickest patients untreated until after the season has already started.
targetUser:
  primary: >-
    Director of specialty pharmacy or ambulatory infusion operations at a U.S. academic transplant center or hematologic oncology network preparing to deploy seasonal flu prophylaxis for immunocompromised outpatients
  secondary: >-
    Market-access and launch operations leaders at respiratory prophylaxis biotechs introducing long-acting flu antibodies into hospital and specialty-clinic channels
  buyer: Chief Pharmacy Officer or VP Ambulatory Operations
startupThesis:
  nonObviousInsight: >-
    The hard part of season-long flu antibodies will not be inventing one more respiratory biologic; it will be turning a narrow, high-risk population into an executable annual care pathway with the right patients, authorizations, inventory, and appointments lined up before flu season peaks. Whoever owns that workflow for immunocompromised patients can become the default distribution and data layer for every future respiratory prophylaxis product.
  beachhead: >-
    U.S. kidney, lung, heart, and stem-cell transplant programs plus hematologic oncology clinics that manage large cohorts of immunocompromised outpatients and need a repeatable pre-season workflow for seasonal influenza biologic prophylaxis
  wedge: >-
    A prophylaxis access OS that finds eligible patients inside transplant and oncology registries, automates benefits verification and prior-authorization packets, orchestrates outreach and injection scheduling, and tracks completion before the influenza season
  whyNowCatalyst: >-
    RQ Bio's financing and product profile turn long-acting flu antibodies into an imminent launch category for immunocompromised patients, forcing specialty clinics to operationalize prevention beyond the annual vaccine playbook.
  ventureScalePath: >-
    Start with flu prophylaxis deployment for immunocompromised patients, then expand the same workflow engine into RSV, COVID, and multi-pathogen respiratory antibodies, payer contracting, manufacturer hub services, and longitudinal outcomes benchmarking across specialty-care networks.
solution: >-
  The company sells software to specialty clinics and launch teams that operationalizes annual respiratory prophylaxis for high-risk patients. It builds eligibility cohorts from transplant, oncology, and immunosuppression registries; generates protocol-specific authorization packets; and coordinates outreach, scheduling, inventory reservation, and missed-dose recovery before the season starts. For biotech launch teams, it provides a live view of which sites can find patients, clear coverage, and complete administrations on time. Over time, the startup becomes the system of record for prophylaxis readiness: who qualified, who was delayed by payer or staffing friction, which sites converted outreach into administration, and how seasonal programs perform across patient subgroups.
goToMarketSeed:
  firstCustomer: >-
    A top-50 U.S. academic medical center with active solid-organ transplant and hematologic malignancy programs that wants to stand up a pre-season flu-antibody workflow for several thousand immunocompromised outpatients
  buyingTrigger: >-
    A new long-acting flu antibody becomes available through expanded access, launch planning, or formulary review and the center realizes it lacks a clean way to identify eligible patients, clear coverage, and schedule injections before the season
  currentAlternative: >-
    Vaccine reminder workflows, manual EHR registry pulls, spreadsheet-based patient lists, specialty-pharmacy prior-authorization teams, and ad hoc outreach by nurses or clinic coordinators
  switchingReason: >-
    The wedge beats status quo because it turns a scattered, once-a-year scramble into a measurable operating program with higher patient capture, faster authorization, and fewer missed administrations for the exact cohort the therapy is built for.
  pricingHypothesis: >-
    Annual subscription priced per specialty site or covered immunocompromised patient cohort, with additional implementation fees from manufacturers or health systems for launch configuration and outcomes reporting.
