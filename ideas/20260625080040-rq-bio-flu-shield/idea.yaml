topRisks:
  - name: Launch timing dependence
    description: If long-acting flu antibodies are delayed clinically or commercially, the beachhead market may take longer to materialize than expected.
    mitigation: Start with design partners that also manage RSV and other respiratory prophylaxis programs so the workflow engine can support adjacent launches before RQB01-scale products are widespread.
  - name: Workflow integration fatigue
    description: Transplant and oncology clinics may resist another seasonal tool unless it reduces workload immediately.
    mitigation: Launch with lightweight registry imports, prebuilt authorization templates, and a services-assisted first season that proves time savings before deeper integrations.
  - name: Payer-policy fragmentation
    description: Coverage rules for new prophylactic antibodies may vary widely across payers and patient cohorts, slowing consistent adoption.
    mitigation: Make payer rule logic configurable by site and use the first season to build a reusable knowledge base of authorization paths and denial reasons.
