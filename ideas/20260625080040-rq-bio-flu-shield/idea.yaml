differentiator: >-
  Existing manufacturer hub vendors and prior-authorization tools are built for broad specialty-drug fulfillment after a clinician has already decided to treat. This company starts earlier, at cohort construction and seasonal readiness, for a very specific immunocompromised population where eligibility timing matters as much as reimbursement. Its moat comes from prophylaxis-specific workflow data: which transplant and oncology subcohorts qualify, which payer paths clear fastest, which sites lose patients before administration, and how those patterns shift across respiratory biologics and seasons.
