differentiator: 现有药企 hub 供应商和预授权工具，大多服务于医生已经决定治疗之后的广谱专科药履约。这家公司切得更早——从特定免疫功能低下人群的队列构建和季节准备度开始，在这里，资格判定的时点和报销本身同样重要。它的护城河来自预防场景特有的工作流数据：哪些移植和肿瘤子人群符合条件、哪条支付路径清得最快、哪些站点会在给药前流失患者，以及这些模式如何随不同呼吸道生物制剂和不同季节变化。
