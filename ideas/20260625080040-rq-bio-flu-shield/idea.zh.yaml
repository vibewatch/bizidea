topRisks:
- name: 上市节奏依赖
  description: 如果长效流感抗体在临床或商业化上延后，滩头市场成形的时间可能会比预期更长。
  mitigation: 优先从同时管理 RSV 和其他呼吸道预防项目的共创客户切入，这样在 RQB01 量级产品尚未普及前，工作流引擎也能先支撑相邻品类的上市。
- name: 工作流集成疲劳
  description: 移植和肿瘤门诊未必愿意再接一套季节性工具，除非它能立刻减轻工作量。
  mitigation: 先用轻量级注册表导入、预制授权模板和服务辅助的首个季节上线，先把省时效果打出来，再谈更深集成。
- name: 支付方政策碎片化
  description: 新型预防抗体的覆盖规则，可能会在不同支付方和患者队列之间高度分化，从而拖慢一致性 adoption。
  mitigation: 把支付方规则逻辑做成按站点可配置，并利用第一个季节沉淀一套可复用的授权路径与拒赔原因知识库。
