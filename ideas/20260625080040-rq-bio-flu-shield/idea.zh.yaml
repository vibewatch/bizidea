jobsToBeDone:
- job: 当流感季临近时，帮助移植中心的专科药房负责人找出每一位该接受预防的免疫功能低下患者，让中心能在社区传播加速前把给药做完。
  currentAlternative: 人工拉注册表，再由护士主导触达并用表格跟踪
  successMetric: 在季节截止日前完成预防给药的合格患者占比
- job: 当一款新的呼吸道预防抗体上市时，帮助药企市场准入团队看清哪些站点最能快速把疗法跑起来，让上市预算投向那些能把合格患者真正转成完成给药的中心。
  currentAlternative: 药企 hub 报告，加上零散的前线反馈
  successMetric: 站点上线到首例完成给药的时间
