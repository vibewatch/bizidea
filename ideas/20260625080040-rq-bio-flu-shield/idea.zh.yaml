problem: 移植中心和血液肿瘤诊所照护的一批患者，即便常规疫苗效果不佳，依然对流感高度脆弱；但这些机构并没有一套专门跑全季生物制剂预防的操作系统。合格患者名单埋在 EHR 注册表里，支付方授权材料靠人工拼，护理、药房和感染科团队往往还在用表格和邮箱协同。等长效流感抗体真正上市，这套碎片化流程会让最重症的患者拖到流感季开始后还没打上药。
targetUser:
  primary: 美国学术型移植中心或血液肿瘤网络里，负责专科药房或门诊输注运营的负责人，正准备为免疫功能低下门诊患者部署季节性流感预防。
  secondary: 在呼吸道预防生物科技公司里，负责市场准入与上市运营的负责人，正把长效流感抗体打入医院和专科门诊渠道。
  buyer: 首席药学官或门诊运营副总裁
startupThesis:
  nonObviousInsight: 全季流感抗体最难的地方，不是再发明一款呼吸道生物制剂，而是把一小批高风险人群真正跑成一条年度照护路径——在流感高峰来临前，把对的患者、授权、库存和预约都排到位。谁先吃下免疫功能低下患者这条工作流，谁就有机会变成未来所有呼吸道预防产品默认的分发层和数据层。
  beachhead: 美国肾、肺、心脏和干细胞移植项目，以及管理大量免疫功能低下门诊患者、需要一套可重复季前流程来部署季节性流感生物制剂预防的血液肿瘤诊所。
  wedge: 一套预防性用药 Access OS：能在移植和肿瘤注册表里找出合格患者，自动完成福利核验和预授权材料，编排触达与注射排期，并在流感季到来前把完成情况盯住。
  whyNowCatalyst: RQ Bio 的融资和产品形态，让长效流感抗体变成免疫功能低下患者即将落地的新品类，逼着专科门诊把预防流程从年度疫苗手册升级成真正可运营的体系。
  ventureScalePath: 先从免疫功能低下患者的流感预防落地切入，再把同一套工作流引擎扩到 RSV、COVID 和多病原体呼吸道抗体，进一步延伸到支付方签约、药企 hub 服务，以及跨专科护理网络的长期疗效基准。
solution: 公司向专科门诊和上市团队销售软件，把高风险患者的年度呼吸道预防真正跑起来。它从移植、肿瘤和免疫抑制注册表里建合格人群队列，生成按协议定制的授权材料，并在季节开始前协调触达、排期、库存预留和漏打补救。对生物科技上市团队来说，它能实时看到哪些站点找得到患者、清得过支付、能按时完成给药。时间一长，这家公司会变成预防准备度的系统记录层：谁符合条件、谁被支付方或人手摩擦拖住、哪些站点能把触达转成实际给药，以及各类患者亚群的季节性项目表现如何。
goToMarketSeed:
  firstCustomer: 一家美国 Top 50 学术医疗中心，拥有活跃的实体器官移植和血液恶性肿瘤项目，希望为数千名免疫功能低下门诊患者搭起一套季前流感抗体流程。
  buyingTrigger: 当新的长效流感抗体进入拓展可及、上市筹备或药事目录评审阶段时，中心会意识到：自己并没有一套干净的方法，在流感季到来前识别合格患者、完成支付清障并排好注射。
  currentAlternative: 疫苗提醒流程、人工拉取 EHR 注册表、基于表格的患者名单、专科药房预授权团队，以及护士或门诊协调员的临时性触达。
  switchingReason: 这个切口强于现状，因为它把一年一次、到处救火的混乱局面，变成了一套可量化的运营项目——患者覆盖更高、授权更快、漏打更少，而且刚好对准这款疗法真正服务的人群。
  pricingHypothesis: 按专科站点或覆盖的免疫功能低下患者人群收取年度订阅费；若涉及上市配置和结果报告，再向药企或医疗系统收实施费用。
