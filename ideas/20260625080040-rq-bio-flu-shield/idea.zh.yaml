- point: 第一块商业滩头市场就是高度集中的免疫功能低下患者，这让一家专做专科门诊工作流的窄切口创业公司从第一天起就有成立空间。
  signalRefs:
  - 首个落地对象是免疫功能低下患者，而不是大众市场
  sourceRefs:
  - 1
- point: 一年一次、能扛毒株漂移的注射方案，会形成一条不同于季节性疫苗的新照护路径，也会暴露通用提醒系统和 standing order 体系的上限。
  signalRefs:
  - 毒株漂移让生物制剂预防在运营上区别于年度疫苗接种
  sourceRefs:
