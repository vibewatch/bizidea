- point: Beyfortus 和 Enflonsia 这些对标产品说明，呼吸道预防生物制剂正在变成可重复出现的品类，因此一个配套的 Access 层可以长期支撑多款产品。
  signalRefs:
  - 呼吸道预防正成为更广泛的品类，并已出现商业先例
  sourceRefs:
