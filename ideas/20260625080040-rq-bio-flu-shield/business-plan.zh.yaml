slug: flu-prophylaxis-access-os
date: '2026-06-25'
executiveSummary: 这家公司最该从一层预防用药 Access 操作层起步，服务美国大型学术型移植与血液肿瘤项目。它们很快就会被要求在每个流感季前，为免疫功能低下门诊患者交付覆盖整季的流感抗体。客户真正的痛点不是科学不确定性，而是明知这批患者风险高，却没法按时把识别、授权、排期和给药真正跑通。最合适的首个客户，是一家美国 Top 50 学术医疗中心：实体器官移植、干细胞移植和血液肿瘤体量足够大，能让药房和门诊运营管理层清楚看见“每季一次”的项目价值。产品在第一年必须收得很窄：基于注册表建队列、按协议生成授权材料、管理触达工单、做 site-of-care 路由、盯完成率。这个切口比通用预授权工具或人群健康工具更强，因为它不是在处方后优化某一步，而是替一个高危人群把整季闭环收住。GTM 也要把首个客户、采购触发点、定价和分发渠道看成一套系统：当新的流感或相邻呼吸道 mAb 进入药事目录或上市筹备时，先卖一个付费季前试点；等季节准备度跑通，再转成按站点收的年度订阅。中期上行，不在于横向吃掉所有专科药，而在于把同一套工作流、支付方模板和基准数据复用到 RSV、COVID 和未来更多呼吸道预防项目。最大的反证风险，是首波流感抗体的上市时点和覆盖规则仍不确定；如果品类落地变慢或市场始终太窄，公司就必须尽快在相邻的呼吸道预防流程里证明产品价值。输入里仍缺少首批流感产品的精确支付规则和给药场景要求，所以本计划默认会由共创客户先把这些约束验证清楚，再投入重集成。
problem:
- 移植中心和血液肿瘤中心都知道自己在担心哪些高风险人群，但它们没有一套可重复的年度流程，能在社区传播抬头前，把注册表里的队列真正转成完成预防给药。
- 人工预授权、专科药房协调、患者触达和 site-of-care 排期，会吃掉本就稀缺的人手；而最容易因此漏掉的，恰恰是常规疫苗保护最弱的免疫功能低下人群。
solution:
- 部署一套由门诊自有的预防用药 Access OS：导入移植和血液肿瘤注册表，套用按协议定义的资格规则，生成授权材料，并在季节开始前把患者送进触达与排期队列。
- 给药房、输注团队和药企上市团队一张统一作战图：谁符合条件、谁卡在支付或物流、哪些给药已完成、延迟或漏掉。
whyWeWin:
- 这家公司切得比 hub 供应商和 ePA 工具更早：它吃的是队列构建和季节准备度，而不只是医生开单后的报销执行。
- 每过一个季节，关于免疫功能低下患者资格规则、支付方周转路径、拒赔原因和站点完成率的数据都会越积越厚，而这些碎片化的现有玩家天然攒不起来。
strategicChoices:
  beachhead: 首个滩头市场是美国学术医疗系统：它们有实体器官移植、干细胞移植和血液肿瘤项目，管理着大批免疫功能低下门诊患者，并预计会启动季前呼吸道预防项目。
  wedgeRationale: 这个入口比卖给通用专科药运营团队更快出结果，因为患者队列有明确临床定义，季节 deadline 很清楚，而且流程本来就断在药房、报销和输注团队之间。一个收得很窄的季前项目，不用替换 EHR，也不用接手更广义的长期照护，就能在一个季节里用识别产出、授权速度和完成给药量证明价值。
  sequencingRationale: 产品、GTM 和招聘都该从轻量注册表导入、规则配置、预授权模板、触达工单和服务辅助实施起步，因为这是最快拿下一个旗舰试点所需的最小资产集合。只有等 3–5 个正式生产站点证明预算可以直接归口，公司才该补更深的 EHR 回写、药企看板和跨协议 benchmark；否则团队会在还没证明单一季节切口能转成稳定 ARR 之前，就先把平台铺太大。
  notYet:
  - 不要替换核心 EHR、专科药房平台或输注管理系统
  - 不要在第一年就卖面向所有适应症的通用专科药 Access 平台
  - 在学术中心样板跑出来之前，不要进入社区肿瘤、支付方或药企主导流程
  - 在 Access 和完成率指标还不可靠前，不要先做消费者依从性或给药后监测产品
market:
  tam: $96.0M 的 TAM 估算基于约 274 个美国核心学术型移植与肿瘤账户，以及约 $350K 的年合同价值。
  sam: $28.1M 的 SAM 估算基于约 85 个大型学术医疗系统；它们的移植和血液肿瘤密度足以支撑首批呼吸道预防项目。
  som: $5.4M 的第 3 年 SOM 估算基于 18 个企业客户，按试点转正式部署后约 $300K ARR 计算。
  segments:
  - 学术型移植与血液肿瘤系统是首个滩头市场
  - 在 provider 侧跑出证明后，再把呼吸道预防药企和相邻专科药房伙伴作为第二增长路径
  buyingProcess: 项目 champion 往往是专科药房负责人、门诊输注运营负责人或移植运营负责人；真正的经济买家更可能是首席药学官或门诊运营副总裁。当呼吸道预防 mAb 的药事评审、拓展可及筹备或上市准备暴露出中心现有流程无法找人、清支付、排给药时，交易就该启动。
product:
  mvp: MVP 应是一层由服务辅助的季节性工作流：吃进注册表导出，套用按协议定义的资格逻辑，拼好预授权材料，生成触达与排期队列，并用审计日志跟踪给药完成情况。它要先证明：就算没有深度 EHR 集成，一个中心也能把按时完成预防给药的比例拉起来。
  sixMonth: 6 个月内上线 2–3 个付费试点：包括注册表导入、面向移植和 B 细胞耗竭人群的资格规则、支付方模板自动化、触达队列、site-of-care 路由，以及识别患者、授权状态和完成给药的看板。
  twelveMonth: 12 个月内至少把 3 个试点转成正式生产，补出可复用的支付方拒赔知识库，并把同一工作流扩到一条相邻的呼吸道预防协议，比如为同一批医疗系统做 RSV 或 COVID 准备度。
  twentyFourMonth: 24 个月内，在公司拿到足够生产数据、能够可信地标准化队列和授权打法后，搭起一个多协议呼吸道预防指挥中心：含跨站点基准、药企上市准备度报告和更深的系统集成。
  keyBets:
  - 只要产品能显著提升季节截止日前的完成给药率，买家就愿意为一层门诊自有的季节准备度系统买单。
  - 轻量注册表导入加人工 QA，比等全双向 EHR 集成更快证明价值。
  - 相邻的 RSV 和 COVID 预防流程，会复用足够多的规则、支付方模板和站点路由，因此值得扩张。
  - 支付方路径和完成率数据，最终会沉淀成可防守的 benchmark 资产，而不是一次性实施残留物。
gtm:
  wedge: 卖给移植和血液肿瘤中心的，是一套季前预防准备度项目，不是通用 AI 预授权助手，也不是人群健康平台替代品。
  channels:
  - 由创始人直接销售给顶级学术系统里的首席药学官、专科药房负责人和门诊运营高管
  - 在已有一家 provider 样板之后，再和呼吸道预防药企上市团队建立共创与联合销售关系
  - 和驻场专科药房团队、ePA 通道、输注网络运营方合作，以缩短部署周期，但不把客户关系交出去
  funnelTargets: 线索→合格试点 25–35%；合格试点→付费试点 30–40%；付费试点→正式生产 60%+；正式客户→12 个月内扩第二协议或第二业务线 50%+。
  pricing: 先卖一个 $40K–$75K 的季前付费试点，覆盖单个中心或单条业务线；随后按覆盖项目强度和协议数转成约 $250K–$350K ARR 的年度站点订阅。这个定价贴合买家经济账，因为客户买的是“特定队列的季节准备度是否真正完成”，而药企报告和实施服务仍作为独立付费模块，不是核心收入底盘。
businessModel:
  revenueStreams:
  - 面向 provider 自有呼吸道预防流程的年度站点订阅费
  - 一次性实施与协议配置费用
  - 药企赞助的上市准备度看板与结果报告
  - 在生产数据足够后提供基准对比与跨站点准备度分析
  unitOfValue: 把一位合格的免疫功能低下患者从识别推进到完成预防给药，并以年度站点项目的方式变现
  targetGrossMarginPct: 70
  expansionLevers:
  - 在同一医疗系统内，从一条业务线扩到移植、血液肿瘤和相邻免疫功能低下项目
  - 给现有客户叠加 RSV、COVID 和未来更多呼吸道预防协议
  - 等 provider 侧 benchmark 足够可信后，把上市准备度和站点表现报告卖给药企
  - 推出支付方模板库和拒赔分析，跨季节缩短授权时间
strategyMap:
  northStarMetric: 在站点自定义的季节截止日前，完成预防给药的合格免疫功能低下患者占比
  inputMetrics:
  - 相对人工基线的合格患者识别率
  - 预授权周转时间中位数
  - 资格确认后 14 天内完成排期的目标患者占比
  - 季节截止日前的完成给药率
  - 付费试点转年度正式生产的转化率
  moatsToBuild:
  - 覆盖移植时点、免疫抑制方案和 B 细胞耗竭疗法的资格规则库
  - 医疗福利场景下，围绕呼吸道预防的支付方路径与拒赔原因数据集
  - 按队列和协议拆分的跨站点 benchmark：患者捕获、授权速度与完成率
  - 能与 EHR、专科药房和输注网络伙伴共存的可复制实施打法
  killCriteria:
  - 如果前 3 家共创中心在 60 天内都拿不出足够的队列和流程数据，去建立已识别患者、授权步骤和完成状态的基线，这个切口就过于黑箱化。
  - 如果付费试点不能把季节截止日前的完成给药率至少提升 20%，或把授权周转时间相对基线至少缩短 30%，那这套工作流的价值还不足以支撑高价企业级定价。
  - 如果不到一半的付费试点，能在量化 ROI 后一个季节内转成年度正式生产或扩到相邻呼吸道协议，那预算归口太弱，不足以撑起风投级增长。
  mermaid: "flowchart LR\n  Wedge[Academic prophylaxis wedge] --> MVP[Seasonal access MVP]\n  MVP --> Proof[Completion and authorization proof]\n  Proof --> Expansion[Multi-protocol respiratory expansion]\n"
investorMemo:
  verdict:
    call: 约见 / 继续深挖
    conviction: 中等确信。因为切口和买家痛点都很具体，但这个品类仍取决于至少有一家中心先证明：在上市节奏拖延前，预算能稳定、持续归口。
    whyBelieve: 公司瞄准的是一个可量化的季前运营瓶颈：药房、报销和输注环节的摩擦，已经在给高风险患者制造本可避免的延误。
    whyDoubt: 如果相邻的 RSV 和 COVID 流程没法足够快地扩预算，这个滩头市场可能会显得太窄、也太依赖新品上市节奏。
    nextDiligence: 先拿下一家学术型共创客户：它要有基线流程数据，并愿意围绕一场明确的呼吸道预防上市或药事事件，签一个付费试点。
  firstCustomer:
    title: Top 50 学术型移植中心的首席药学官
    profile: 负责实体器官移植和血液肿瘤门诊的专科药房、输注和门诊运营，服务数千名免疫功能低下门诊患者。
    trigger: 当新的呼吸道预防 mAb 进入药事评审、拓展可及筹备或药企上市准备阶段时，中心会发现自己并不能稳定地在流感季前找出、授权并排好合格患者。
    buyer: 首席药学官
    initialContract: 单个中心或单条业务线的 $40K–$75K 季前付费试点；当流程扩到移植、血液肿瘤和相邻呼吸道协议后，转成约 $250K–$350K ARR。
  mustBeTrue:
  - 首批 5 家目标中心里，至少有 3 家要能证明：漏掉预防给药，主要是因为资格捕获和 Access 摩擦，而不是临床需求不足。
  - 基于注册表导入和人工 QA 的轻量覆盖层，必须能在 10 周内上线，而且不要求完整 EHR 回写。
  - 付费试点必须把季节截止日前的完成给药率至少提升 20%，或把授权周转时间至少缩短 30%。
  - 当首个季节的 ROI 可见后，买家必须接受走向 $250K+ 年度预算，而不是永远靠创新经费或药企补贴。
  - 相邻的 RSV 或 COVID 流程，必须足够可复用，能在 18 个月内拉出第二条扩张线；否则只做流感的切口还是太窄。
  diligenceQuestions:
  - 在不做完整数据工程项目的前提下，共创客户究竟能从现有注册表导出里，稳定识别出哪些移植和血液肿瘤队列？
  - 首批呼吸道预防 mAb 在医疗福利场景下需要什么支付方材料包？不同主流保险计划之间会有多大差异？
  - 驻场专科药房团队到底多常能把问题解决到“没必要再买一层独立 Access 工具”的程度？
  - 要拿到什么级别的证明，这笔采购才会从创新预算或上市筹备预算，转进持续性的药房或门诊运营预算？
  - 一旦把 site-of-care 路由和监测要求算进去，RSV、COVID 和流感预防流程在实操上到底有多像？
operatingAssumptions:
- assumption: provider 侧买家会愿意为一套门诊自有的季节性工作流签约，而不是等药企 hub 服务来兜底。
  basis: research.yaml
  validationTest: 在 10 通合格调研电话和 2 份试点方案里，至少拿到 4 个愿意为付费试点买单、且不要求药企赞助的 provider 侧买家。
  decisionImpact: 如果这个假设不成立，GTM 就必须转向药企赞助的上市模块，并下调对 provider 直销 ARR 的预期。
- assumption: 轻量注册表导入加人工 QA，足以在第一个季节识别出初始预防队列。
  basis: research.yaml
  validationTest: 在前 2 个共创实施中，4 周内用现有导出生成可用的合格患者名单，并把人工例外复核控制在 25% 记录以内。
  decisionImpact: 如果这个假设不成立，部署成本会上升，路线图必须收窄到更少的 EHR 环境，或转向更重服务模式。
- assumption: 相邻的 RSV 和 COVID 预防流程，能复用至少 60% 的规则、支付方模板和流转逻辑。
  basis: idea.yaml
  validationTest: 和共创客户一起拆 3 条相邻呼吸道协议，确认至少 60% 的工作流对象能在少量配置下复用。
  decisionImpact: 如果这个假设不成立，公司就仍是一个更窄的流感专用产品，TAM、招聘和融资假设都要重算。
- assumption: 只要产品能明显提升完成率并减轻人手负担，学术中心会在试点后接受 $250K–$350K ARR。
  basis: research.yaml
  validationTest: 在试点转化阶段测试 3 套包装，并要求至少 2 个买家在 KPI 达标的前提下，预先认可这一价位的年度预算。
  decisionImpact: 如果这个假设不成立，ACV 会被压缩，公司可能需要更多客户、更多服务收入，或更低成本的销售动作。
- assumption: 支付方路径、拒赔原因和完成率 benchmark 会逐步沉淀成可防守的数据护城河，而不是只留下客户特定的工作流尾气。
  basis: operator judgment
  validationTest: 跑完首个完整季节后，要能证明聚合模板和 benchmark 能在下一个客户部署中，把实施时间或授权周转至少再降 20%。
  decisionImpact: 如果这个假设不成立，差异化会削弱，产品就有掉回低估值工作流自动化品类的风险。
experimentRoadmap:
- horizon: 0–90 天
  experiment: 访谈 15 位目标学术系统中的首席药学官、专科药房总监、移植运营负责人和血液肿瘤 Access 负责人。
  hypothesis: 买家会反复提到同一种紧迫失效模式：在流感季前，季节性队列识别、预授权和排期都跑不顺。
  successMetric: 至少 10 次访谈确认存在共同采购触发点，且有 5 家愿意提供当前识别或授权流程的基线数据。
  owner: 创始人/CEO
- horizon: 0–90 天
  experiment: 用历史移植或血液肿瘤注册表导出，加人工拼授权材料，做 2 次 concierge readiness assessment。
  hypothesis: 即便产品还没完全自动化，公司也能找出漏掉的合格患者，并把运营漏损量化到足够有说服力。
  successMetric: 两家中心拿到基线报告，且至少一家围绕下一轮预防规划周期签下付费试点范围。
  owner: 创始工程师
- horizon: 90–180 天
  experiment: 给 2–3 个试点交付第一版 MVP：含注册表导入、资格规则、支付方模板生成、触达队列和完成情况看板。
  hypothesis: 产品能在 10 周内上线，并在不做深度 EHR 集成的前提下产出客户自有指标。
  successMetric: 首个付费试点在 10 周内上线，并能按周汇报识别患者数、授权状态、排期和完成给药情况。
  owner: 产品与实施负责人
- horizon: 90–180 天
  experiment: 至少对 3 个合格买家测试“付费试点 + 年度站点订阅”的定价包装。
  hypothesis: 如果把 ROI 框定在完成给药和节省人手上，买家会接受季前试点，并认为 $250K–$350K ARR 有可信路径。
  successMetric: 至少签下 2 个付费试点，且有 1 个买家在试点 KPI 达标前提下预先认可年度定价。
  owner: 创始人/CEO
- horizon: 180–360 天
  experiment: 给现有客户增加一条相邻的 RSV 或 COVID 预防流程，并和首条流感流程比较实施工作量。
  hypothesis: 相邻呼吸道协议会复用足够多的产品和实施资产，从而形成高效扩张。
  successMetric: 第二条协议能在 6 周内上线，资产复用率至少 60%，并从一位正式客户拿到已签署的扩容订单。
  owner: 产品负责人
- horizon: 180–540 天
  experiment: 在首个 provider 正式生产样板跑出来后，启动一条药企报告或联合销售动作。
  hypothesis: 一旦 provider 侧证明成立，药企上市团队就会愿意为站点准备度报告买单，或把新中心机会导进来。
  successMetric: 合作方带来的机会占到合格 pipeline 至少 20%，并产出 1 份已签商业协议。
  owner: 合作负责人
operations:
- 先把 onboarding 标准化在少数几套协议模板、清晰的拒赔原因分类法和每周季节准备度复盘上，再去承诺大规模定制。
- 产品虽然在协调临床与报销动作，但不扮演临床决策者，因此必须保留审计日志、对高风险资格判定做人审，并符合 HIPAA 级别的工作流控制。
- 把专科药房团队、ePA 通道和输注网络伙伴当成实施加速器，而不是把核心客户关系外包给它们。
team:
- role: 创始人/CEO
  startTiming: Month 0
  rationale: 在动作仍高度依赖发现与摸索的阶段，创始人/CEO 负责亲自打单、拉共创客户、定价，以及和药企做早期对话。
- role: 创始工程师
  startTiming: Month 0
  rationale: 负责搭建注册表导入、规则引擎、审计日志和工作流界面——这些能力直接决定部署速度和产品可信度。
- role: 产品与实施负责人
  startTiming: Month 2
  rationale: 把协议流程编码进产品、缩短试点 onboarding，并把首批重服务实施沉淀成可复制打法。
- role: 报销与临床运营负责人
  startTiming: Month 4
  rationale: 负责支付方模板质量、拒赔分析和 site-of-care 流程设计，确保产品真正贴合药房和输注团队的现实约束。
- role: 战略客户销售/合作负责人
  startTiming: Month 9
  rationale: 只有在公司跑出一个正式生产样板、且试点转正式生产路径被记录清楚后，才补销售与联合销售能力。
milestones:
- horizon: 0–12 个月
  items:
  - 签下 2–3 家学术共创客户，并至少启动 2 个付费试点
  - 证明只靠注册表导入、而不是深度 EHR 集成，也能在 10 周内完成部署
  - 展示从基线到试点在识别患者、授权周转和完成给药上的改善
  - 至少把 3 个试点转成年度正式合同，或拿到有记录的扩容承诺
- horizon: 12–24 个月
  items:
  - 把首批正式客户从单条业务线扩到医疗系统内的移植和血液肿瘤覆盖
  - 上线 1 条相邻的 RSV 或 COVID 预防协议，并能量化模板和工作流逻辑的复用程度
  - 在正式客户之间搭出第一版支付方拒赔知识库和 benchmark 报告层
  - 拿下 1 份与站点准备度可视化挂钩的药企报告或联合销售协议
- horizon: 24–36 个月
  items:
  - 做到约 18 家企业客户，并验证研究给出的第 3 年 SOM 路径
  - 在学术中心之间标准化多协议呼吸道预防打法
  - 把 benchmark 分析和药企模块作为扩张产品推出，并配套客户背书
  - 基于预算归口是否被验证，决定继续坚持 provider-first，还是加大药企主导渠道
risks:
- risk: 流感抗体的上市或标签节奏若继续后移，滩头市场在前 18 个月会小到难以支撑可复制销售。
  likelihood: Medium
  impact: High
  mitigation: 优先选择已经在管理 RSV 或 COVID 预防流程的客户，让同一套产品在广泛流感上市前也能先证明价值。
- risk: 驻场专科药房团队和现有工作流工具，可能已经解决了足够多的问题，以至于买家不愿再加一层独立系统。
  likelihood: Medium
  impact: High
  mitigation: 必须在完整季节闭环上证明价值，并量化现有玩家今天仍补不上的环节，尤其是合格患者捕获率和完成给药率。
- risk: 如果支付方规则过于异质，实施就会持续偏重服务，进而拖慢毛利扩张。
  likelihood: High
  impact: Medium
  mitigation: 从第一个季节开始就沉淀可复用的授权模板和拒赔分类，并把早期客户收窄到支付环境有足够重叠的群体。
- risk: 如果 site-of-care 和监测给药要求比预期更复杂，排期和转诊路由可能会超出首版 MVP 的承载能力。
  likelihood: Medium
  impact: Medium
  mitigation: 在 MVP 里就把 site-of-care 路由和伙伴交接纳入，而不是把给药物流当成以后再补的功能。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: 这轮资金将用于搭出第一版可投入生产的工作流栈、完成 3–5 个付费试点、把 2–3 个学术医疗系统转成正式生产、证明 1 条相邻呼吸道协议，并建立做种子轮扩张所需的合规、实施和支付方知识基础。
