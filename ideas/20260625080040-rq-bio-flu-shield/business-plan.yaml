slug: flu-prophylaxis-access-os
date: '2026-06-25'
executiveSummary: >-
  This company should start as a prophylaxis access operating layer for large U.S. academic transplant and hematologic oncology
  programs that will be asked to deliver season-long flu antibodies to immunocompromised outpatients before each season. The
  customer pain is not scientific uncertainty; it is the operational gap between knowing these patients are high risk and actually
  identifying, authorizing, scheduling, and completing prophylaxis on time. The best first customer is a top-50 academic medical
  center with solid-organ transplant, stem-cell transplant, and heme-onc volume large enough to make a once-per-season program
  visible to pharmacy and ambulatory-operations leadership. The product should stay narrow in year one: registry-based cohort
  building, protocol-specific authorization packets, outreach work queues, site-of-care routing, and completion tracking. This
  wedge is stronger than a generic prior-authorization or population-health tool because it closes the full seasonal loop for one
  high-acuity cohort rather than optimizing one step after prescribing. Go-to-market should treat the first customer, buying
  trigger, pricing, and distribution channel as one system: sell a paid pre-season pilot when a new flu or adjacent respiratory
  mAb reaches formulary or launch planning, then convert to an annual site subscription tied to completed seasonal readiness. The
  medium-term upside comes from reusing the same workflow, payer templates, and benchmark data across RSV, COVID, and future
  respiratory prophylaxis programs, not from expanding broadly across all specialty drugs. The biggest disconfirming risk is launch
  timing and coverage uncertainty for first-wave flu antibodies; if the category slips or remains too narrow, the company must
  prove the product on adjacent respiratory prophylaxis workflows fast. Exact payer policy and administration-setting requirements
  for the first flu products are still missing from the inputs, so the plan assumes design partners will validate those constraints
  before heavy integration spend.
problem:
  - Transplant and hematologic oncology centers can name the high-risk populations they worry about, but they do not have a repeatable annual workflow to turn registry cohorts into completed prophylaxis before community spread rises.
  - Manual prior authorization, specialty-pharmacy coordination, outreach, and site-of-care scheduling consume scarce staff time and create missed-patient risk precisely in the immunocompromised cohorts least protected by routine vaccination.
solution:
  - Deploy a clinic-owned prophylaxis access OS that imports transplant and heme-onc registries, applies protocol-specific eligibility rules, generates authorization packets, and routes patients into outreach and scheduling queues before the season.
  - Give pharmacy, infusion, and manufacturer launch teams one operating view of who is eligible, who is blocked by payer or logistics friction, and which administrations are complete, delayed, or missed.
whyWeWin:
  - The company starts earlier than hub vendors and ePA tools by owning cohort construction and seasonal readiness, not just reimbursement work after a clinician already writes an order.
  - Each season compounds proprietary data on immunocompromised eligibility rules, payer turnaround paths, denial reasons, and site-level completion rates that fragmented incumbents do not naturally aggregate.
strategicChoices:
  beachhead: U.S. academic health systems with solid-organ transplant, stem-cell transplant, and hematologic oncology programs that manage large immunocompromised outpatient cohorts and expect a pre-season respiratory prophylaxis program.
  wedgeRationale: >-
    This entry point creates faster proof than selling to general specialty-drug operations because the patient cohort is clinically
    defined, the seasonal deadline is visible, and the workflow already breaks across pharmacy, reimbursement, and infusion teams.
    A narrow pre-season program can show value in one season on identified-patient yield, authorization speed, and completed
    administrations without replacing the EHR or taking responsibility for broader longitudinal care.
  sequencingRationale: >-
    Product, GTM, and hiring should begin with lightweight registry imports, rules configuration, prior-authorization templates,
    outreach work queues, and services-assisted implementation because those are the minimum assets needed to win one flagship pilot
    quickly. Only after 3-5 production sites prove direct budget ownership should the company add deeper EHR write-back,
    manufacturer dashboards, and cross-protocol benchmarks; otherwise the team risks building a broad respiratory platform before it
    has shown that a single seasonal wedge converts to durable ARR.
  notYet:
    - Replace the core EHR, specialty-pharmacy platform, or infusion management system
    - Sell a generalized specialty-drug access platform across all indications in year one
    - Enter community oncology, payer, or manufacturer-primary workflows before academic-center proof exists
    - Build consumer adherence or post-administration monitoring products before access and completion metrics are reliable
market:
  tam: "$96.0M estimated TAM based on roughly 274 core U.S. academic transplant and oncology accounts at about $350K annual contract value."
  sam: "$28.1M estimated SAM for about 85 large academic systems with the transplant and heme-onc intensity to support an initial respiratory-prophylaxis program."
  som: "$5.4M estimated year-3 SOM based on 18 enterprise customers at roughly $300K ARR after pilot-to-production expansion."
  segments:
    - Academic transplant and hematologic oncology systems as the primary beachhead
    - Respiratory prophylaxis manufacturers and adjacent specialty-pharmacy partners as secondary expansion paths after provider-side proof
  buyingProcess: >-
    The champion is usually the specialty-pharmacy leader, ambulatory infusion operator, or transplant operations lead, while the
    economic buyer is most likely the chief pharmacy officer or VP of ambulatory operations. Deals should start when formulary
    review, expanded-access planning, or launch preparation for a respiratory prophylaxis mAb exposes that the center cannot find,
    authorize, and schedule the eligible cohort with its current workflow.
product:
  mvp: >-
    MVP is a services-assisted seasonal workflow layer that ingests registry exports, applies protocol-specific eligibility logic,
    assembles prior-authorization packets, creates outreach and scheduling queues, and tracks administration completion with audit
    logs. It should prove that one center can raise on-time prophylaxis completion without waiting for deep EHR integration.
  sixMonth: >-
    Launch 2-3 paid pilots with registry imports, eligibility rules for transplant and B-cell-depleted cohorts, payer-template
    automation, outreach queues, site-of-care routing, and dashboards for identified patients, authorization status, and completed
    administrations.
  twelveMonth: >-
    Convert at least 3 pilots to production, add a reusable payer-denial knowledge base, and expand the workflow to one adjacent
    respiratory prophylaxis protocol such as RSV or COVID readiness for the same health systems.
  twentyFourMonth: >-
    Build a multi-protocol respiratory prophylaxis command center with cross-site benchmarks, manufacturer launch-readiness
    reporting, and deeper integrations once the company has enough production data to standardize cohort and authorization playbooks
    credibly.
  keyBets:
    - Buyers will fund a clinic-owned seasonal readiness layer if it measurably improves completed prophylaxis before the seasonal cutoff date.
    - Lightweight registry imports and manual QA can prove value faster than waiting for full bidirectional EHR integration.
    - Adjacent RSV and COVID prophylaxis workflows will reuse enough of the same rules, payer templates, and site routing to justify expansion.
    - Payer-path and completion data will become a defensible benchmark asset rather than staying a one-off implementation artifact.
gtm:
  wedge: Sell a pre-season prophylaxis readiness program for transplant and heme-onc centers, not a generic AI prior-authorization assistant or a replacement population-health platform.
  channels:
    - Founder-led direct sales to chief pharmacy officers, specialty-pharmacy leaders, and ambulatory-operations executives at top academic systems
    - Design-partner and co-sell relationships with respiratory prophylaxis manufacturer launch teams after one provider case study exists
    - Implementation partnerships with embedded specialty-pharmacy teams, ePA rails, and infusion-network operators that shorten deployment without owning the customer
  funnelTargets: "Lead→qualified pilot 25-35%, qualified pilot→paid pilot 30-40%, paid pilot→production 60%+, production account→second protocol or second service-line expansion within 12 months in 50%+ of converted customers."
  pricing: >-
    Start with a $40K-$75K paid pre-season pilot for one center or service line, then convert to an annual site subscription priced
    by covered program intensity and protocol count at roughly $250K-$350K ARR. This matches buyer economics because the customer is
    paying for completed seasonal readiness across a defined cohort, while manufacturer reporting and implementation remain separate
    paid modules rather than the core revenue base.
businessModel:
  revenueStreams:
    - Annual site subscription for provider-owned respiratory prophylaxis workflows
    - One-time implementation and protocol-configuration fees
    - Manufacturer-sponsored launch-readiness dashboards and outcomes reporting
    - Benchmarking and cross-site preparedness analytics after enough production data accumulates
  unitOfValue: Eligible immunocompromised patient progressed from identification to completed prophylaxis, monetized as an annual site program
  targetGrossMarginPct: 70
  expansionLevers:
    - Expand from one service line into transplant, heme-onc, and adjacent immunocompromised programs within the same health system
    - Add RSV, COVID, and future respiratory prophylaxis protocols to existing customers
    - Sell launch-readiness and site-performance reporting to manufacturers once provider benchmarks are credible
    - Introduce payer-template libraries and denial analytics that reduce time to authorization across seasons
strategyMap:
  northStarMetric: Percent of eligible immunocompromised patients completed on prophylaxis before the site-defined seasonal cutoff
  inputMetrics:
    - Eligible-patient identification rate versus manual baseline
    - Median prior-authorization turnaround time
    - Percent of targeted patients scheduled within 14 days of eligibility confirmation
    - Completed-administration rate before seasonal cutoff
    - Paid pilot to annual production conversion rate
  moatsToBuild:
    - Eligibility-rule library spanning transplant timing, immunosuppressive regimens, and B-cell-depleting therapies
    - Payer-path and denial-reason dataset for respiratory prophylaxis under medical-benefit workflows
    - Cross-site benchmark data on patient capture, authorization speed, and completion by cohort and protocol
    - Repeatable implementation playbooks that coexist with EHR, specialty-pharmacy, and infusion-network partners
  killCriteria:
    - If the first 3 design-partner centers cannot provide enough cohort and workflow data to baseline identified patients, authorization steps, and completion status within 60 days, the wedge is too operationally opaque.
    - If paid pilots do not improve completed prophylaxis before the seasonal cutoff by at least 20% or reduce authorization turnaround by at least 30% versus baseline, the workflow value is not strong enough for premium enterprise pricing.
    - If fewer than half of paid pilots convert to annual production or adjacent respiratory-protocol expansion within one season of measured ROI, direct budget ownership is too weak for venture-scale growth.
  mermaid: |
    flowchart LR
      Wedge[Academic prophylaxis wedge] --> MVP[Seasonal access MVP]
      MVP --> Proof[Completion and authorization proof]
      Proof --> Expansion[Multi-protocol respiratory expansion]
investorMemo:
  verdict:
    call: "Meet / investigate further"
    conviction: Moderate conviction because the wedge and buyer pain are concrete, but the category still depends on one center proving recurring budget ownership before launch timing slips.
    whyBelieve: The company targets a measurable pre-season operational bottleneck where pharmacy, reimbursement, and infusion friction already create avoidable delays for high-risk patients.
    whyDoubt: The beachhead may be too narrow or too launch-dependent if adjacent RSV and COVID workflows do not expand the budget fast enough.
    nextDiligence: Secure one academic design partner with baseline workflow data and a paid pilot tied to a named respiratory-prophylaxis launch or formulary event.
  firstCustomer:
    title: Chief Pharmacy Officer at a top-50 academic transplant center
    profile: Oversees specialty pharmacy, infusion, and ambulatory operations across solid-organ transplant and heme-onc clinics serving several thousand immunocompromised outpatients.
    trigger: Formulary review, expanded-access planning, or manufacturer launch preparation for a new respiratory prophylaxis mAb exposes that the center cannot reliably find, authorize, and schedule eligible patients before flu season.
    buyer: Chief Pharmacy Officer
    initialContract: "$40K-$75K paid pre-season pilot for one center or service line, converting to roughly $250K-$350K ARR when the workflow rolls across transplant, heme-onc, and adjacent respiratory protocols."
  mustBeTrue:
    - At least 3 of the first 5 target centers must show that missed prophylaxis is driven materially by eligibility-capture and access friction rather than lack of clinical demand.
    - A lightweight overlay using registry imports and manual QA must go live in under 10 weeks without requiring full EHR write-back.
    - Paid pilots must improve completed prophylaxis before the seasonal cutoff by at least 20% or cut authorization turnaround by at least 30% versus baseline.
    - Buyers must accept a path to $250K+ annual budget once first-season ROI is visible, rather than relying indefinitely on innovation funds or manufacturer subsidy.
    - Adjacent RSV or COVID workflows must be reusable enough to create a second expansion line within 18 months, or the flu-only wedge remains too narrow.
  diligenceQuestions:
    - Which exact transplant and heme-onc cohorts can design partners identify reliably from current registry exports without a full data-engineering project?
    - What payer documentation package will the first respiratory prophylaxis mAbs require under the medical benefit, and how variable will that be across major plans?
    - How often do embedded specialty-pharmacy teams already solve enough of the workflow to reduce willingness to buy a standalone access layer?
    - What proof threshold moves this purchase from innovation or launch planning budget into recurring pharmacy or ambulatory-operations budget?
    - How similar are RSV, COVID, and flu prophylaxis workflows in practice once site-of-care routing and monitoring requirements are included?
operatingAssumptions:
  - assumption: Direct provider buyers will contract for a clinic-owned seasonal workflow instead of waiting for manufacturer hub services to absorb the problem.
    basis: research.yaml
    validationTest: In 10 qualified discovery calls and 2 pilot proposals, secure at least 4 provider-side buyers willing to fund a paid pilot without requiring manufacturer sponsorship.
    decisionImpact: If false, the GTM must pivot toward manufacturer-sponsored launch modules and lower expectations for direct provider ARR.
  - assumption: Lightweight registry imports plus manual QA are sufficient to identify the initial prophylaxis cohort for a first season.
    basis: research.yaml
    validationTest: In the first 2 design-partner implementations, generate a usable eligible-patient list from existing exports within 4 weeks and keep manual exception review below 25% of records.
    decisionImpact: If false, deployment cost rises and the roadmap must narrow to fewer EHR environments or a services-heavier model.
  - assumption: Adjacent RSV and COVID prophylaxis workflows share enough operational steps to reuse at least 60% of the rules, payer templates, and routing logic built for flu.
    basis: idea.yaml
    validationTest: Map 3 adjacent respiratory protocols with design partners and confirm that at least 60% of required workflow objects can be reused with limited configuration.
    decisionImpact: If false, the company remains a narrower flu-specific product and should reset TAM, hiring, and fundraising assumptions.
  - assumption: Academic centers will support $250K-$350K ARR after a pilot if the product improves completion and reduces staff burden measurably.
    basis: research.yaml
    validationTest: Test 3 packaging options during pilot conversion and require at least 2 buyers to pre-approve annual spend in that band contingent on KPI attainment.
    decisionImpact: If false, ACV compresses and the company may need more customers, more services revenue, or a lower-cost sales motion than this plan assumes.
  - assumption: Payer-path, denial-reason, and completion benchmarks will compound into a defensible data moat rather than remaining customer-specific workflow exhaust.
    basis: operator judgment
    validationTest: After the first full season, show that aggregated templates and benchmarks reduce implementation time or authorization turnaround by at least 20% in the next customer deployment.
    decisionImpact: If false, differentiation weakens and the product risks collapsing into a lower-multiple workflow automation category.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Interview 15 chief pharmacy officers, specialty-pharmacy directors, transplant operators, and heme-onc access leads at target academic systems.
    hypothesis: Buyers will describe the same urgent failure mode around seasonal cohort identification, prior authorization, and scheduling before flu season.
    successMetric: At least 10 interviews confirm a shared buying trigger and 5 provide baseline data on current identification or authorization workflows.
    owner: CEO founder
  - horizon: 0–90 days
    experiment: Run 2 concierge readiness assessments using historical transplant or heme-onc registry exports and manual authorization packet assembly.
    hypothesis: Even before full product automation, the company can surface missed eligible patients and quantify operational leakage convincingly.
    successMetric: Two centers receive baseline reports and at least one signs a paid pilot scope tied to the next prophylaxis planning cycle.
    owner: Founding eng
  - horizon: 90–180 days
    experiment: Ship the first MVP with registry import, eligibility rules, payer-template generation, outreach queues, and completion dashboards for 2-3 pilots.
    hypothesis: The product can go live in under 10 weeks and produce customer-owned metrics without requiring deep EHR integration.
    successMetric: First paid pilot live within 10 weeks and reporting weekly on identified patients, authorization status, scheduling, and completed administrations.
    owner: Product and implementation lead
  - horizon: 90–180 days
    experiment: Test paid-pilot packaging against annual site subscription pricing with at least 3 qualified buyers.
    hypothesis: Buyers will accept a pre-season pilot and see a credible path to $250K-$350K ARR if ROI is framed around completed prophylaxis and staff time saved.
    successMetric: At least 2 paid pilots signed and one buyer pre-approves annual pricing contingent on hitting pilot KPIs.
    owner: CEO founder
  - horizon: 180–360 days
    experiment: Add one adjacent RSV or COVID prophylaxis workflow for an existing customer and compare implementation effort with the initial flu workflow.
    hypothesis: Adjacent respiratory protocols reuse enough of the same product and implementation assets to create efficient expansion.
    successMetric: Second protocol deployed in under 6 weeks with at least 60% asset reuse and a signed expansion order from one production customer.
    owner: Product lead
  - horizon: 180–540 days
    experiment: Launch one manufacturer reporting or co-sell motion after the first provider production case study.
    hypothesis: Provider-side proof will make manufacturer launch teams willing to fund site-readiness reporting or referrals into new centers.
    successMetric: Partner-sourced opportunities reach at least 20% of qualified pipeline and produce one signed commercial agreement.
    owner: Partnerships lead
operations:
  - Standardize onboarding around a small number of protocol templates, explicit denial-reason taxonomy, and weekly seasonal-readiness reviews before promising broad customization.
  - Maintain audit logs, human review for high-risk eligibility decisions, and HIPAA-appropriate workflow controls because the product coordinates clinical and reimbursement actions without becoming the clinical decision-maker.
  - Treat specialty-pharmacy teams, ePA rails, and infusion-network partners as implementation accelerators, not outsourced ownership of the core customer relationship.
team:
  - role: CEO founder
    startTiming: Month 0
    rationale: Owns founder-led sales, design-partner recruitment, pricing, and early manufacturer conversations while the motion is still discovery-heavy.
  - role: Founding eng
    startTiming: Month 0
    rationale: Builds the registry ingestion, rules engine, audit logging, and workflow interfaces that determine deployment speed and product credibility.
  - role: Product and implementation lead
    startTiming: Month 2
    rationale: Encodes protocol workflows, shortens pilot onboarding, and turns services-heavy first deployments into a repeatable playbook.
  - role: Reimbursement and clinical operations lead
    startTiming: Month 4
    rationale: Owns payer-template quality, denial analysis, and site-of-care workflow design so the product reflects real pharmacy and infusion constraints.
  - role: Strategic account executive or partnerships lead
    startTiming: Month 9
    rationale: Adds sales and co-sell capacity only after the company has one production case study and a documented pilot-to-production motion.
milestones:
  - horizon: 0–12 months
    items:
      - Sign 2-3 academic design partners and launch at least 2 paid pilots
      - Prove under-10-week deployment using registry imports rather than deep EHR integration
      - Show baseline-to-pilot improvement in identified patients, authorization turnaround, and completed administrations
      - Convert at least 3 pilots into annual production contracts or documented expansion commitments
  - horizon: 12–24 months
    items:
      - Expand the first production accounts from one service line into transplant and heme-onc coverage across the health system
      - Launch one adjacent RSV or COVID prophylaxis protocol with measurable reuse of templates and workflow logic
      - Build the first payer-denial knowledge base and benchmark reporting layer across production customers
      - Add one manufacturer reporting or co-sell agreement tied to site-readiness visibility
  - horizon: 24–36 months
    items:
      - Reach roughly 18 enterprise customers and validate the researched year-3 SOM path
      - Standardize multi-protocol respiratory prophylaxis playbooks across academic centers
      - Introduce benchmark analytics and manufacturer modules as expansion products with customer references
      - Decide whether to stay provider-first or add a larger manufacturer-led channel based on proven budget ownership
risks:
  - risk: Flu-antibody launch or label timing slips enough that the beachhead remains too small for repeatable sales in the first 18 months.
    likelihood: Medium
    impact: High
    mitigation: Prioritize customers that already manage RSV or COVID prophylaxis workflows so the same product can prove value before a broad flu launch.
  - risk: Embedded specialty-pharmacy teams and incumbent workflow tools solve enough of the problem that buyers resist a new standalone layer.
    likelihood: Medium
    impact: High
    mitigation: Prove value on the full seasonal loop and quantify what incumbents do not close today, especially eligible-patient capture and completed-administration rates.
  - risk: Payer rules remain heterogeneous enough that implementation becomes services-heavy and slows gross-margin expansion.
    likelihood: High
    impact: Medium
    mitigation: Build reusable authorization templates and denial taxonomy from the first season, and narrow early customers to payer environments with enough overlap to compound learning.
  - risk: Site-of-care and monitored-administration requirements make scheduling and referral routing more complex than the initial MVP can support.
    likelihood: Medium
    impact: Medium
    mitigation: Include site-of-care routing and partner handoffs in the MVP instead of treating administration logistics as a later add-on.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2-4M"
  runwayMonths: 18
  useOfFundsSummary: Build the first production-ready workflow stack, complete 3-5 paid pilots, convert 2-3 academic systems to production, prove one adjacent respiratory protocol, and establish the compliance, implementation, and payer-knowledge foundation required for a seed-ready expansion story.
