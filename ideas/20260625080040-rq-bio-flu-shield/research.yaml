reportMemo:
  executiveTakeaways:
  - The real wedge is not inventing another biologic; it is operationalizing a once-per-season immunocompromised prophylaxis program before the season arrives.
  - Customer pain is concrete and budgetable because the workflow sits where prior authorization, specialty pharmacy, outreach, and site-of-care scheduling already break down.
  - Adjacent incumbents are strong in their own lanes, but no single player clearly owns the full loop from cohort construction to completed administration for seasonal prophylaxis.
  - The beachhead is commercially real but narrow, so long-term upside likely depends on extending the same operating layer into RSV, COVID, and future respiratory prophylaxis launches.
  marketDefinition: U.S. workflow software and services for seasonal respiratory prophylaxis in immunocompromised outpatients, starting with transplant and hematologic oncology programs. The job is to turn a clinically defined high-risk cohort into completed administrations before seasonal risk peaks.
  customerAndBuyer: Primary users are specialty-pharmacy, ambulatory infusion, and transplant or oncology operations teams that must translate high-risk patient lists into completed prophylaxis. The economic buyer is most likely the chief pharmacy officer, specialty pharmacy leader, or VP of ambulatory operations at an academic health system; manufacturers are a secondary buyer for launch-readiness modules.
  buyingTriggers:
  - point: A new prophylactic monoclonal antibody or adjacent respiratory mAb enters launch planning, and the center realizes a vaccine-reminder workflow is not enough.
    sourceRefs:
    - 1
    - 2
    - 25
    - 26
    - 39
  - point: High-risk guidance and weak immune-response evidence make missed eligible patients clinically hard to defend, especially in transplant and B-cell-depleted populations.
    sourceRefs:
    - 3
    - 5
    - 6
    - 7
    - 20
    - 22
    - 23
    - 24
  - point: Manual prior authorization, specialty-pharmacy, and referral steps threaten on-time starts for vulnerable patients and consume scarce staff time.
    sourceRefs:
    - 13
    - 14
    - 15
    - 16
    - 17
    - 35
  - point: Oncology and specialty-pharmacy leaders already buy digital coordination tools when they reduce burden or improve outcomes, so there is a precedent budget line.
    sourceRefs:
    - 29
    - 31
    - 32
  willingnessToPay:
    summary: Budget justification is strongest when sold against coordinator labor, care delays, and missed patient capture rather than as generic AI automation. The AMA still finds roughly 40 prior authorizations per physician per week and 95% of physicians reporting care delays, while oncology studies show a 17-step PA workflow and 71% PA rates for oral anticancer drugs.
    sourceRefs:
    - 13
    - 16
    - 17
  competitiveLandscape: "Competition is fragmented across manufacturer hub services, prior-authorization automation, embedded specialty pharmacy, infusion execution networks, and EHR or oncology population-health platforms. That fragmentation is the opportunity: incumbents own steps, not the full seasonal prophylaxis loop."
  incumbentThesis:
  - incumbentClass: Manufacturer hub services
    point: They handle benefit verification and patient support well, but are typically pharma-funded and reactive to prescriptions rather than clinic-owned annual cohort readiness.
    sourceRefs:
    - 27
    - 33
  - incumbentClass: Prior authorization automation
    point: These tools speed payer interactions but usually begin after staff already know which patient and drug to submit.
    sourceRefs:
    - 14
    - 28
    - 33
  - incumbentClass: Health-system specialty pharmacy and infusion networks
    point: Embedded pharmacists and infusion providers can execute access and administration, but they do not automatically build seasonal eligibility cohorts across transplant and heme-onc registries.
    sourceRefs:
    - 17
    - 29
    - 34
    - 35
    - 39
  - incumbentClass: EHR and oncology engagement platforms
    point: Population-health and oncology engagement suites can stratify or message patients, but they do not natively close benefits verification, site-of-care routing, and prophylaxis completion for specialty biologics.
    sourceRefs:
    - 30
    - 31
    - 32
  regulatoryLandscape: "The software sits inside existing clinical, reimbursement, privacy, and site-of-care rules rather than creating a new regulated category. Success depends on fitting cleanly into those rules: packaging evidence, routing work, and tracking completion while coverage decisions and clinical accountability remain external to the product."
  technologyLandscape: "The enabling stack already exists in pieces: registry extraction, claims-linked population health, prior-authorization rails, specialty-pharmacy coordination, and infusion-site networks. The product opportunity is orchestration and timing discipline around a once-per-season workflow, not basic infrastructure invention."
  distributionChannels:
  - point: Founder-led enterprise sales into transplant hospitals and NCI or academic oncology systems are the clearest first channel because the pain is concentrated in a small number of complex centers.
    sourceRefs:
    - 9
    - 10
    - 11
  - point: Manufacturer launch partnerships are a credible second channel because adjacent respiratory-prophylaxis programs already need site-readiness and access visibility before broad rollout.
    sourceRefs:
