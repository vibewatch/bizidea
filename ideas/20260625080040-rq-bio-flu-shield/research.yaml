  validationPlan:
  - priority: high
    question: Can one academic transplant or heme-onc pilot increase the share of eligible patients completed before season start versus the current workflow?
    evidenceToGather: Pre/post pilot data on identified patients, authorization turnaround, completed administrations, and missed-season exceptions.
  - priority: high
    question: What do the top national and regional payers require for prophylactic respiratory mAbs under the medical benefit?
    evidenceToGather: Policy documents, denial templates, and live benefit-verification outcomes for the first adjacent products used in immunocompromised populations.
  - priority: medium
    question: Will clinic buyers pay directly, or does the initial budget need manufacturer co-sponsorship?
    evidenceToGather: Procurement interviews with chief pharmacy officers, specialty-pharmacy directors, and manufacturer market-access teams at design-partner sites.
  - priority: medium
    question: How much does adding RSV or COVID readiness expand the first three years of pipeline value?
    evidenceToGather: Design-partner demand for adjacent protocols, site-of-care overlap, and willingness to standardize one respiratory-prophylaxis playbook across products.
