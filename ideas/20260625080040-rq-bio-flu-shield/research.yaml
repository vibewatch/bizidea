competitors:
- name: ConnectiveRx
  stage: incumbent
  wedge: Manufacturer-funded hub services for benefit verification, prior authorization, and patient support.
  pricing: Custom enterprise / quote-based; no public pricing posted.
  strength: Strong patient-access operations and provider workflow touchpoints for specialty therapies.
  weaknessVsUs: Reactive to a prescription journey rather than proactive seasonal cohort construction owned by the clinic.
  sourceRefs:
  - 27
- name: Infinitus
  stage: scale-up
  wedge: AI automation for prior-authorization follow-up and payer calls.
  pricing: Custom enterprise / quote-based; no public pricing posted.
  strength: Directly attacks labor-heavy payer communication with therapy-aware automation.
  weaknessVsUs: Starts after someone already knows which patient and request to submit.
  sourceRefs:
  - 28
- name: Shields Health Solutions
  stage: incumbent
  wedge: Embedded specialty-pharmacy and pharmacist-liaison model inside health systems.
  pricing: Custom partnership economics; no public pricing posted.
  strength: Deep EHR access and human coordination with clinical credibility.
  weaknessVsUs: Services-heavy model that does not inherently create a prophylaxis-specific, pre-season operating layer.
  sourceRefs:
  - 29
- name: Epic Healthy Planet
  stage: incumbent
  wedge: Claims-plus-EHR population health and outreach inside the core record.
  pricing: Enterprise module / quote-based; no public pricing posted.
  strength: Native workflow placement and strong data access inside Epic customers.
  weaknessVsUs: Does not natively close specialty-biologic authorization, site-of-care routing, and completion tracking for seasonal prophylaxis.
  sourceRefs:
  - 30
- name: Navigating Care
  stage: scale-up
  wedge: Oncology patient management, remote symptom monitoring, and proactive care delivery.
  pricing: Custom enterprise / request-demo model; no public pricing posted.
  strength: Existing oncology footprint and proof that operators buy workflow products tied to reduced staff burden and better outcomes.
  weaknessVsUs: Focuses on engagement and care management rather than benefits work and prophylaxis-readiness execution.
  sourceRefs:
  - 31
