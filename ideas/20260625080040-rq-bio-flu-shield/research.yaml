openQuestions:
- Will the first commercial flu antibodies launch as buy-and-bill infusions, specialty-pharmacy dispenses, or office-administered injections?
- How many of the 233 transplant facilities already have embedded specialty-pharmacy capacity that reduces appetite for a standalone workflow layer?
- What payer evidence package will be required to justify prophylactic antibodies for immunocompromised adults before broad formulary adoption?
- Does a flu-only seasonal workflow win budget cleanly, or does enterprise adoption require bundled RSV and COVID preparedness from the start?
