    - 由于支付方和 site-of-care 流程仍偏重服务，毛利率只能做到 67%。
  base:
    description: Y1 转正的 3 个站点逐步复利，到 Y3 结束时达到 18 个活跃账户；核心站点订阅之上，再叠加有限但真实存在的实施和药企模块收入。
    y3RevenueK: 4920.0
    y3EbitdaK: -8.8
    cashLowPointK: 508.1
    keyAssumptionChanges:
    - 正式生产定价维持在研究给出的 $300K ARR 水平。
    - 团队到 Y2 结束时做到 12 个活跃账户，Y3 结束时做到 18 个。
    - 随着 onboarding 模板化，毛利率维持在计划的 70%。
  upside:
    description: 参考账户缩短销售周期，第二协议扩容更早落地，公司在 Y3 明显转盈。
    y3RevenueK: 6001.3
    y3EbitdaK: 719.2
    cashLowPointK: 1245.8
    keyAssumptionChanges:
    - 正式生产定价更接近 $320K，且增值模块挂载更强。
    - 因为参考客户带动交易前移约 1 个季度，Y3 结束时活跃账户达到 20 个。
    - 随着协议模板和拒赔知识库缩短交付工作，毛利率提升到 72%。
sensitivity:
- variable: ARPU
  downsideCase: 实际经济性更接近 $280K 的正式生产合同，且增值模块挂载更轻。
  baseCase: 基准情形里，核心正式生产 ARR 保持在 $300K，模块收入较温和。
  upsideCase: 实际经济性更接近 $320K 的正式生产合同，且增值模块挂载更强。
  y3RevenueImpactK: -338.0
  cashImpactK: -313.0
- variable: CAC
  downsideCase: 安全评审、采购和差旅，把实际 S&M 强度推高到比计划高约 15%。
  baseCase: 基准情形里，CAC 维持在每个净新增活跃账户约 $149.3K。
  upsideCase: 合作伙伴转介绍和重复样板，让实际 S&M 强度比计划低约 10%。
  y3RevenueImpactK: 0.0
  cashImpactK: -199.5
- variable: churn
  downsideCase: 预算归口弱于预期，Y3 结束时大约会比基准路径少 1 个账户。
  baseCase: 基准情形假设月度流失率为 1.2%，并在客户路径里内嵌了温和流失。
  upsideCase: 一旦工作流深度嵌入，Y3 结束时大约会比基准路径多 1 个账户。
  y3RevenueImpactK: -275.0
  cashImpactK: -220.0
- variable: sales cycle
  downsideCase: 学术机构的安全、药事和预算流程，会把试点转正周期大约再拉长 1 个季度。
  baseCase: 基准情形假设试点会在同一季节内，或 ROI 被看见后立刻转正。
  upsideCase: 参考站点会把转正和新客户签约时点大约提前 1 个季度。
  y3RevenueImpactK: -560.0
  cashImpactK: -419.7
- variable: gross margin
  downsideCase: 交付端仍然偏重服务，毛利率最终落在约 65%。
  baseCase: 基准情形沿用商业计划里的 70% 毛利目标。
  upsideCase: 可复用模板和拒赔知识会把毛利率抬向 72%。
  y3RevenueImpactK: 0.0
  cashImpactK: -378.6
- variable: hiring pace
  downsideCase: 客户成功和运营支持岗位不得不提前约 1 个季度招聘，但还没带来匹配收入。
  baseCase: 基准情形会等活跃账户规模足以支撑后，再补支持岗位。
  upsideCase: 模板化 onboarding 让后续支持岗位可以维持当前节奏。
  y3RevenueImpactK: 0.0
  cashImpactK: -147.3
modelDiagram:
  title: 单位经济模型流转
  mermaid: "flowchart LR\n  Leads[Qualified academic centers] --> PaidPilots[Paid pre-season pilots]\n  PaidPilots --> ProductionSites[Annual production subscriptions]\n  ProductionSites --> Expansion[RSV or COVID protocol expansion]\n  ProductionSites --> Revenue[Core subscription revenue]\n  Expansion --> Revenue\n  Revenue --> GrossProfit[70% gross profit]\n  GrossProfit --> Cash[Cash and runway]\n"
modelSanity:
- checkName: 收入引擎
  finding: 基准情形收入来自这样一条路径：Y1 结束时 4 个活跃付费账户，到 Y3 结束时增至 18 个；大部分价值来自把试点转成 $300K 的正式生产站点，再挂上一层较小的报告模块收入。
- checkName: 必须做对的事
  finding: 公司必须把试点转正维持在接近“同季转正”的节奏，同时证明至少有 1 条相邻的 RSV 或 COVID 工作流，能复用流感打法。
- checkName: 模型会在哪种情况下失效
  finding: 如果持续性预算审批或转正时点大约再拖 1 个季度， downside 情形会在 Y3 结束前把现金打成负数。
- checkName: 下一轮融资证明点
  finding: 只要到 Y2 结束前 12 个正式生产站点、1 条相邻协议和 1 份药企报告协议都已上线，且现金仍高于 6 个月缓冲，下一轮融资故事就站得住。
sanityChecks:
  ruleOf40: Y3 增长 124.1% + EBITDA 利润率 -0.2% = 123.9%（远高于 40% 经验线，但也受到 Y2 基数较小的帮助）。
  burnMultiple: Y2 的 burn multiple 约为 0.4x：即 $959.2K 净 burn，对应从 4 个活跃账户增到 12 个账户所带来的约 $2400.0K 净新增 ARR。
  revenuePerFte: $410K 的 Y3 年末人均收入/FTE（略高于早期企业 SaaS 粗略 $200K–$400K 基准，因为账户 ACV 高，且交付模式正越来越模板化）。
  flags:
  - 基准情形默认流感切口会扩展到相邻的 RSV 或 COVID 流程；如果这层复用失败，18 个账户的 Y3 路径对单协议切口来说就太激进了。
  - 只有当支付方模板复用和实施打法，能在每个新站点都挡住服务膨胀，70% 毛利目标才站得住。
  - 基准情形下现金之所以还能保持健康，只是因为招聘足够克制、且 pre-seed 在 M1 前完成；如果销售再慢 1 个季度，大概率就得做过桥融资。
