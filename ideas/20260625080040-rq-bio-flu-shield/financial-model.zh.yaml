slug: flu-prophylaxis-access-os
date: '2026-06-25'
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-07
  unit: YYYY-MM
  source: '[business-plan.yaml date] 以 2026-06-25 计划日期之后的首个完整运营月份为起点。'
- id: A2
  name: pre-seed 交割后的期初现金
  value: '2600'
  unit: USDK
  source: '[business-plan.yaml fundingAsk.targetFundingRangeUsd; fundingAsk.runwayMonths] 模型按 $2.6M 计算，位于已说明的 $2–4M pre-seed 区间内，用来跑到 Y2 里程碑并预留 6 个月缓冲。'
- id: A3
  name: 收入单位
  value: Active paid health-system account
  unit: definition
  source: '[business-plan.yaml businessModel.unitOfValue] 一个付费的学术医疗中心账户，不论是季前试点还是年度正式生产站点。'
- id: A4
  name: 付费试点价格
  value: '60'
  unit: USDK/account-season
  source: '[business-plan.yaml gtm.pricing; investorMemo.firstCustomer.initialContract] 取已说明 $40K–$75K 季前付费试点区间的中位数。'
- id: A5
  name: 年度正式生产订阅价格
  value: '300'
  unit: USDK/account-year
  source: '[business-plan.yaml gtm.pricing; research.yaml market.som] 对齐研究里“第 3 年 18 个客户、约 $300K ARR”的 SOM 测算。'
- id: A6
  name: 首个正式生产年度实施费
  value: '20'
  unit: USDK/new production account
  source: '[business-plan.yaml businessModel.revenueStreams] 创业财务经验值：协议配置与 onboarding 费用低于核心订阅价值。'
- id: A7
  name: 药企/基准模块价格
  value: '60'
  unit: USDK/account-year
  source: '[business-plan.yaml businessModel.revenueStreams] 创业财务经验值：作为小规模增值报告模块，而不是第二条核心产品线。'
- id: A8
  name: Y1 月末付费试点账户路径
  value: 0,1,1,2,2,2,2,2,2,1,1,1
  unit: accounts
  source: '[business-plan.yaml product.sixMonth; gtm.pricing; milestones 0-12 months] 支撑第一年 2–3 个付费试点，同时正式生产转化在季节后段才开始。'
- id: A9
  name: Y1 月末正式生产账户路径
  value: 0,0,0,0,0,1,1,1,2,3,3,3
  unit: accounts
  source: '[business-plan.yaml product.twelveMonth; milestones 0-12 months] 到 Y1 结束时达到 3 个已转正站点，同时还有 1 个活跃试点仍在推进。'
- id: A10
  name: Y2 季末活跃账户路径
  value: Q1Y2 5; Q2Y2 7; Q3Y2 10; Q4Y2 12
  unit: accounts
  source: '[business-plan.yaml milestones 12-24 months] 假设公司在纪律化的创始人主导销售下，一边扩已有生产账户，一边新增学术中心。'
- id: A11
  name: Y3 季末活跃账户路径
  value: Q1Y3 13; Q2Y3 15; Q3Y3 17; Q4Y3 18
  unit: accounts
  source: '[business-plan.yaml milestones 24-36 months; research.yaml market.som] 精确落在研究给出的第 3 年 18 客户 SOM 路径上。'
- id: A12
  name: Y3 药企模块挂载路径
  value: Q1Y3 1 account; Q2Y3 2; Q3Y3 3; Q4Y3 4
  unit: accounts with add-on
  source: '[business-plan.yaml businessModel.revenueStreams; milestones 12-24 months] 让增值模块收入保持克制并后置，直到 provider 侧证明成立。'
- id: A13
  name: 目标毛利率
  value: '70'
  unit: percent
  source: '[business-plan.yaml businessModel.targetGrossMarginPct] 按确认收入的 30% 作为 COGS 建模。'
- id: A14
  name: 单位经济模型月度客户流失率
  value: '1.2'
  unit: percent
  source: '[startup-finance heuristic: sticky healthcare enterprise workflow software] 早期客户会深度嵌入流程，但产品仍处于 pre-scale 阶段。'
- id: A15
  name: 创始人/CEO 全成本现金薪酬
  value: '144'
  unit: USDK/year
  source: '[business-plan.yaml team CEO founder] 创业财务经验值：$120K 创始人工资，加上 payroll tax 和福利。'
- id: A16
  name: 创始工程师全成本现金薪酬
  value: '192'
  unit: USDK/year
  source: '[business-plan.yaml team Founding eng] 创业财务经验值：资深技术创始人的现金薪酬包，加上 payroll 负担。'
- id: A17
  name: 产品与实施负责人全成本现金薪酬
  value: '156'
  unit: USDK/year
  source: '[business-plan.yaml team Product and implementation lead] 创业财务经验值：医疗工作流软件早期产品+交付负责人的现金薪酬。'
- id: A18
  name: 报销与临床运营负责人全成本现金薪酬
  value: '168'
  unit: USDK/year
  source: '[business-plan.yaml team Reimbursement and clinical operations lead] 创业财务经验值：偏领域专家型的 Access 与支付运营岗位。'
- id: A19
  name: 战略客户销售/合作负责人全成本现金薪酬
  value: '180'
  unit: USDK/year
  source: '[business-plan.yaml team Strategic account executive or partnerships lead] 创业财务经验值：在有参考部署样板后补入的第一位企业销售。'
- id: A20
  name: 产品工程师全成本现金薪酬
  value: '180'
  unit: USDK/year
  source: '[business-plan.yaml strategicChoices.sequencingRationale] 创业财务经验值：试点开始转正后，产品深度需要补上的额外工程力量。'
- id: A21
  name: 数据/集成工程师全成本现金薪酬
  value: '180'
  unit: USDK/year
  source: '[business-plan.yaml product.twentyFourMonth; operations] 创业财务经验值：更深的注册表集成和 benchmark 数据管道需要的岗位。'
- id: A22
  name: 实施专员全成本现金薪酬
  value: '120'
  unit: USDK/year
  source: '[business-plan.yaml operations] 创业财务经验值：用较低成本的执行岗位，把重服务 onboarding 变成可复制打法。'
- id: A23
  name: 客户经理全成本现金薪酬
  value: '180'
  unit: USDK/year
  source: '[business-plan.yaml milestones 12-24 months] 创业财务经验值：当创始人主导销售证明可重复后，补入专职销售。'
- id: A24
  name: 客户成功经理全成本现金薪酬
  value: '132'
  unit: USDK/year
  source: '[business-plan.yaml milestones 12-24 months] 创业财务经验值：当账户数过 8–10 家后，需要有人专门盯续费和跨协议扩容。'
- id: A25
  name: 临床工作流分析师全成本现金薪酬
  value: '132'
  unit: USDK/year
  source: '[business-plan.yaml whyWeWin; operations] 创业财务经验值：随着账户基数扩大，需要有人维护可复用协议和拒赔库。'
- id: A26
  name: 营收运营与综合管理经理全成本现金薪酬
  value: '144'
  unit: USDK/year
  source: '[startup-finance heuristic: healthcare enterprise SaaS] 到 Y3 年末规模点之前，财务、合同和合规负担足以支撑一个专职运营岗位。'
- id: A27
  name: 招聘节奏
  value: CEO founder M1; Founding eng M1; Product and implementation lead M1; Reimbursement and clinical operations lead M4; Product engineer M6; Strategic account executive or partnerships lead M9; Data/integration engineer M10; Implementation associate M10; Account executive M15; Customer success manager M18; Clinical workflow analyst M28; RevOps and G&A manager M32
  unit: timing
  source: '[business-plan.yaml team; strategicChoices.sequencingRationale] 实施和产品招聘先于规模化 GTM 与行政招聘落地。'
- id: A28
  name: 职能薪酬分摊
  value: CEO 60% S&M / 40% G&A; Founding eng 100% R&D; Product and implementation lead 65% R&D / 35% G&A; Reimbursement and clinical operations lead 55% R&D / 45% G&A; Strategic account executive or partnerships lead 100% S&M; Product engineer 100% R&D; Data/integration engineer 100% R&D; Implementation associate 40% R&D / 60% G&A; Account executive 100% S&M; Customer success manager 30% S&M / 70% G&A; Clinical workflow analyst 70% R&D / 30% G&A; RevOps and G&A manager 100% G&A
  unit: allocation
  source: '[business-plan.yaml team rationales; operations] 把每个岗位映射到其在前 36 个月里主要服务的职能。'
- id: A29
  name: 非薪酬运营支出
  value: Y1 monthly S&M = 8 + 8% of revenue + 1.0 per active account; Y1 monthly R&D = 10 + 1.5 per active account; Y1 monthly G&A = 12 + 0.8 per active account; Y2 monthly S&M = 10 + 8% of revenue + 1.1 per active account; Y2 monthly R&D = 12 + 1.7 per active account; Y2 monthly G&A = 13 + 0.9 per active account; Y3 monthly S&M = 12 + 8% of revenue + 1.2 per active account; Y3 monthly R&D = 14 + 1.9 per active account; Y3 monthly G&A = 15 + 1.0 per active account
  unit: USDK/month
  source: '[startup-finance heuristic: HIPAA enterprise workflow software] 覆盖云、合规、差旅、合同和法务/行政开销，同时避免把 burn 做得过度好看。'
- id: A30
  name: 现金转换政策
  value: EBITDA approximates operating cash movement
  unit: policy
  source: '[startup-finance heuristic] 当前阶段不建模债务、资本开支、税项或实质性营运资本波动。'
- id: A31
  name: 下一轮融资里程碑
  value: 12 production sites, one adjacent RSV or COVID protocol live, and one manufacturer reporting agreement by Y2 exit
  unit: milestone
  source: '[business-plan.yaml milestones 12-24 months; fundingAsk.useOfFundsSummary] 以此来确定本轮融资规模，并额外留出 6 个月缓冲。'
