competitors:
- name: ConnectiveRx
  stage: 现有厂商
  wedge: 由药企出资的 hub 服务，覆盖福利核验、预授权和患者支持。
  pricing: 企业级定制 / 按报价；无公开定价。
  strength: 在专科疗法场景里，患者 Access 运营和 provider 工作流触点很强。
  weaknessVsUs: 响应的是处方旅程，而不是由门诊主导、面向季节性队列的主动构建。
  sourceRefs:
  - 27
- name: Infinitus
  stage: 成长中
  wedge: 用 AI 自动跟进预授权和支付方电话。
  pricing: 企业级定制 / 按报价；无公开定价。
  strength: 直接打掉最吃人力的支付方沟通环节，而且能理解疗法语境。
  weaknessVsUs: 前提仍是团队已经知道该给哪个患者、提交哪种申请。
  sourceRefs:
  - 28
- name: Shields Health Solutions
  stage: 现有厂商
  wedge: 嵌入医疗系统内部的专科药房与药师联络模式。
  pricing: 定制化合作分成；无公开定价。
  strength: 有深 EHR 访问权限，也有强人力协同和临床可信度。
  weaknessVsUs: 模式偏重服务，本身不会自然长出一层“预防专用、季前启动”的操作系统。
  sourceRefs:
  - 29
- name: Epic Healthy Planet
  stage: 现有厂商
  wedge: 在核心病历系统内做 claims + EHR 的人群健康与患者触达。
  pricing: 企业模块 / 按报价；无公开定价。
  strength: 工作流原生嵌在系统里，且对 Epic 客户有很强的数据访问优势。
  weaknessVsUs: 无法原生闭合季节性预防场景下专科生物制剂的授权、site-of-care 路由和完成追踪。
  sourceRefs:
  - 30
- name: Navigating Care
  stage: 成长中
  wedge: 肿瘤患者管理、远程症状监测和主动式照护交付。
  pricing: 企业级定制 / 申请演示；无公开定价。
  strength: 在肿瘤场景已有落地基础，也证明运营团队愿意为减轻人手负担、改善结果的工作流产品买单。
  weaknessVsUs: 更偏向患者运营和照护管理，而不是福利处理和预防准备度执行。
  sourceRefs:
  - 31
  - 32
regulatoryTechnicalConstraints:
- point: 即便互操作性标准在进步，药物特定的预授权和医疗必要性规则仍然是按保险计划拆开的。
  sourceRefs:
  - 14
  - 15
  - 33
- point: 面向免疫功能低下人群的预防性抗体，可能要求在医疗机构给药或做监测随访，因此很难只靠门诊注射工作流解决。
  sourceRefs:
  - 26
  - 39
- point: 疫苗和抗病毒药仍是流感防治标准的一部分，所以软件应做增强，而不是替代既有方案。
  sourceRefs:
  - 5
  - 6
  - 7
  - 36
- point: 移植和 HCT 项目需要的是长期感染与免疫状态数据，而不只是一次性排期。
  sourceRefs:
  - 12
  - 20
  - 21
validationSignals:
- point: RQ Bio 的融资和产品定位说明，投资人和运营方都预期全季流感预防会带来真实的 Access 问题。
  sourceRefs:
  - 1
  - 2
- point: 基于注册表的识别和院内肿瘤疫苗流程，已经能显著拉高覆盖率，这说明运营本身就是瓶颈。
  sourceRefs:
  - 18
  - 19
- point: Pemgarda 和全国性输注网络，已经要求明确的 provider 定位和转诊工作流，说明免疫功能低下人群的预防路径并不轻。
  sourceRefs:
  - 26
  - 34
  - 35
  - 39
openQuestions:
- 第一批商业化流感抗体，会按 buy-and-bill 输注、专科药房发药，还是门诊注射来落地？
- 这 233 家移植机构里，有多少已经具备驻场专科药房能力，从而降低对独立工作流层的兴趣？
- 在广泛进入药事目录之前，要为免疫功能低下成人争取预防性抗体，支付方究竟需要什么证据包？
- 只做流感的季节性工作流，能不能顺利拿到预算，还是说企业级 adoption 从一开始就必须捆绑 RSV 和 COVID 准备度？
