scenarios:
  downside:
    description: "One-quarter slower pilot conversion, lower realized pricing, and weaker module attach keep the company below the SOM path and force a bridge before Y3 ends."
    y3RevenueK: 4002.6
    y3EbitdaK: -618.3
    cashLowPointK: -276.8
    keyAssumptionChanges:
    - "Production subscription realized at roughly $280K instead of $300K."
    - "Y3 exits at 16 active accounts instead of 18 because pilot-to-production conversion slips by about one quarter."
    - "Gross margin reaches only 67% because payer and site-of-care workflows stay more services-heavy."
  base:
    description: "Three converted Y1 sites compound into 18 active accounts by Y3 exit, with limited but real implementation and manufacturer-module revenue on top of the core site subscription."
    y3RevenueK: 4920.0
    y3EbitdaK: -8.8
    cashLowPointK: 508.1
    keyAssumptionChanges:
    - "Production pricing holds at the researched $300K ARR level."
    - "The team reaches 12 active accounts by Y2 exit and 18 by Y3 exit."
    - "Gross margin stays at the 70% plan target as onboarding becomes templated."
  upside:
    description: "Reference accounts compress sales cycles, second-protocol expansion lands earlier, and the company becomes clearly profitable in Y3."
    y3RevenueK: 6001.3
    y3EbitdaK: 719.2
    cashLowPointK: 1245.8
    keyAssumptionChanges:
    - "Production pricing realizes closer to $320K with stronger add-on attach."
    - "Y3 exits at 20 active accounts because references pull deals forward by about one quarter."
    - "Gross margin improves to 72% as protocol templates and denial libraries shorten delivery work."
sensitivity:
- variable: "ARPU"
  downsideCase: "Realized economics land closer to a $280K production contract and lighter add-on attach."
  baseCase: "Base case keeps core production ARR at $300K with modest module revenue."
  upsideCase: "Realized economics land closer to a $320K production contract with stronger add-on attach."
  y3RevenueImpactK: -338.0
  cashImpactK: -313.0
- variable: "CAC"
  downsideCase: "Security reviews, procurement, and travel push effective S&M intensity about 15% above plan."
  baseCase: "Base case CAC stays near $149.3K per net new active account."
  upsideCase: "Partner referrals and repeat references pull effective S&M intensity about 10% below plan."
  y3RevenueImpactK: 0.0
  cashImpactK: -199.5
- variable: "churn"
  downsideCase: "Budget ownership proves weaker and Y3 exits about one account lower than the base path."
  baseCase: "Base case assumes 1.2% monthly churn and embeds modest attrition in the customer path."
  upsideCase: "The workflow becomes embedded and Y3 exits about one account higher than the base path."
  y3RevenueImpactK: -275.0
  cashImpactK: -220.0
- variable: "sales cycle"
  downsideCase: "Academic security, formulary, and budgeting add roughly one quarter to the pilot-to-production cycle."
  baseCase: "Base case assumes pilots convert within the same season or immediately after ROI is shown."
  upsideCase: "Reference sites pull conversion and new-logo timing forward by roughly one quarter."
  y3RevenueImpactK: -560.0
  cashImpactK: -419.7
- variable: "gross margin"
  downsideCase: "Delivery stays more services-heavy and gross margin settles near 65%."
  baseCase: "Base case holds the 70% margin target from the business plan."
  upsideCase: "Reusable templates and denial knowledge lift gross margin toward 72%."
  y3RevenueImpactK: 0.0
  cashImpactK: -378.6
- variable: "hiring pace"
  downsideCase: "Customer success and operational support hires must be pulled about one quarter earlier without creating matching revenue yet."
  baseCase: "Base case waits to add support roles until the active-account base justifies them."
  upsideCase: "Templated onboarding lets later support hires stay on the current schedule."
  y3RevenueImpactK: 0.0
  cashImpactK: -147.3
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Leads[Qualified academic centers] --> PaidPilots[Paid pre-season pilots]
      PaidPilots --> ProductionSites[Annual production subscriptions]
      ProductionSites --> Expansion[RSV or COVID protocol expansion]
      ProductionSites --> Revenue[Core subscription revenue]
      Expansion --> Revenue
      Revenue --> GrossProfit[70% gross profit]
      GrossProfit --> Cash[Cash and runway]
modelSanity:
- checkName: "Revenue engine"
  finding: "Base-case revenue comes from moving from 4 active paid accounts at Y1 exit to 18 by Y3 exit, with most value created by converting pilots into $300K production sites and then attaching a small reporting module layer."
- checkName: "Must go right"
  finding: "The company has to keep pilot-to-production conversion on roughly a same-season cadence while proving at least one adjacent RSV or COVID workflow reuses the flu playbook."
- checkName: "Model breaks if"
  finding: "If recurring budget approval or conversion timing slips by about one quarter, the downside case turns cash negative before Y3 finishes."
- checkName: "Next-round proof"
  finding: "A credible next-round story appears once 12 production sites, one adjacent protocol, and one manufacturer reporting agreement are live by Y2 exit with cash still above a six-month buffer."
sanityChecks:
  ruleOf40: "Y3 growth 124.1% + EBITDA margin -0.2% = 123.9% (well above the 40% heuristic, though still helped by a small Y2 base)."
  burnMultiple: "About 0.4x in Y2, using $959.2K of net burn against roughly $2400.0K of net new ARR from 4 to 12 active accounts."
  revenuePerFte: "$410K Y3 revenue per end-of-year FTE (slightly above the rough $200K-$400K early enterprise SaaS benchmark because account ACV is high and the delivery model is increasingly templated)."
  flags:
  - "The base case assumes the flu beachhead does expand into adjacent RSV or COVID workflows; if that reuse fails, the 18-account Y3 path is too aggressive for a single-protocol wedge."
  - "The 70% gross-margin target is only believable if payer-template reuse and implementation playbooks prevent services creep at each new site."
  - "Cash stays healthy in the base case only because hiring remains disciplined and the pre-seed round closes before M1; a one-quarter sales slip likely forces a bridge."
