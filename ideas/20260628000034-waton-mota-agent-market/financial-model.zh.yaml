scenarios:
  downside:
    description: 外部智能体的采用推进更慢，监控加购偏弱，销售周期再滑一个季度，导致原定 Y3 签下的一部分客户顺延出去。
    y3RevenueK: 2793.6
    y3EbitdaK: -418.0
    cashLowPointK: 459.0
    keyAssumptionChanges:
      - Q4Y3 的客户数降到 15，而不是 18
      - 每只基金的混合 ARR 只能做到约 $230K，而不是 $250K
      - 由于实施复用性仍然不足，期末毛利率只能到 69%，而不是 72.5%
  base:
    description: 付费试点稳步转化，到第 2 年有一个伙伴渠道开始贡献，实时监控在认证之后成为默认的第二笔销售。
    y3RevenueK: 3494.4
    y3EbitdaK: 164.9
    cashLowPointK: 850.6
    keyAssumptionChanges:
      - Q4Y3 的客户数做到 18，与研究给出的 SOM 路径一致
      - 随着监控加购发生，每只基金的混合 ARR 达到约 $250K
      - 可复用的只读集成压低实施拖累后，期末毛利率到 72.5%
  upside:
    description: 伙伴转介绍来得更早，监控加购更强，公司在人员规模不明显增加的情况下多签客户。
    y3RevenueK: 4040.0
    y3EbitdaK: 540.0
    cashLowPointK: 935.0
    keyAssumptionChanges:
      - Q4Y3 的客户数做到 21，而不是 18
      - 靠更强的监控加购和多策略小组扩容，每只基金的混合 ARR 达到约 $265K
      - 由于部署时间比计划更早降到 30 天以下，期末毛利率到 75%
sensitivity:
  - variable: ARPU
    downsideCase: 到 Y3，每只基金的混合 ARR 为 $230K
    baseCase: 到 Y3，每只基金的混合 ARR 为 $250K
    upsideCase: 到 Y3，每只基金的混合 ARR 为 $270K
    y3RevenueImpactK: -280.0
    cashImpactK: -210.0
  - variable: CAC
    downsideCase: 由于伙伴渠道放量更慢、更多依赖创始人外呼，CAC 高 25%
    baseCase: 混合 CAC 约 $113.2K
    upsideCase: 由于出现一个高产的 OMS 或经纪商伙伴渠道，CAC 低 15%
    y3RevenueImpactK: -220.0
    cashImpactK: -220.0
  - variable: 流失率
    downsideCase: 月流失率 1.8%
    baseCase: 月流失率 1.5%
    upsideCase: 月流失率 1.0%
    y3RevenueImpactK: -190.0
    cashImpactK: -150.0
  - variable: 销售周期
    downsideCase: 从试点到付费的转化晚一个季度
    baseCase: 6-10 周的试点与转化节奏
    upsideCase: 伙伴筛选后的机会大约快 1 个月成交
    y3RevenueImpactK: -520.0
    cashImpactK: -400.0
  - variable: 毛利率
    downsideCase: 期末毛利率 68%
    baseCase: 期末毛利率 72.5%
    upsideCase: 期末毛利率 75%
    y3RevenueImpactK: 0.0
    cashImpactK: -165.0
  - variable: 招聘节奏
    downsideCase: 第二名销售和实施岗位提前两个季度入职
    baseCase: 付费试点验证节点出现后再扩招
    upsideCase: 非关键岗位延后到伙伴渠道验证跑通之后
    y3RevenueImpactK: 0.0
    cashImpactK: -320.0
modelDiagram:
  title: 单位经济模型流程
  mermaid: |-
    flowchart LR
      TargetAccounts --> PaidPilots
      PaidPilots --> CertifiedFunds
      CertifiedFunds --> MonitoringAttach
      CertifiedFunds --> Revenue
      MonitoringAttach --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: 收入引擎
    finding: 基准情形下，Y3 收入来自付费基金数从 4 家增到 18 家，同时每只基金的混合 ARR 也从 Y1 以试点为主的水平，抬升到监控加购后约 $250K。
  - checkName: 必须跑对的环节
    finding: 公司必须把从认证到监控的转化率守在计划里 50%+ 的目标附近，同时让只读集成足够可复用，持续把部署时间压下来。
  - checkName: 模型失效条件
    finding: 只要买方时点晚一个季度，或监控加购率更接近下行情形，Y3 收入就会少掉超过 $0.5M，现金位置也会明显下探。
  - checkName: 下一轮验证点
    finding: 到 Q4Y2 做到约 10 家付费基金，并至少跑出一个可信的伙伴渠道，就是支撑下一轮融资的经营验证。
sanityChecks:
  ruleOf40: Y3 增长 121.2% + EBITDA 利润率 4.7% = 125.9%
  burnMultiple: Y2 的烧钱倍数为 0.5x（-$662.2K EBITDA 对应 $1261.6K 净新增收入），到 Y3 改善为 EBITDA 转正。
  revenuePerFte: Y3 年末每名 FTE 对应收入 $291.2K（垂直 SaaS 基准为 $200-400K）。
  flags:
    - 启动市场本来就刻意收得很窄，所以哪怕到 Y3 的客户数还不到研究 SAM 的 10%，只要一两家对冲基金延期决策，模型也会被明显拉动。
    - 毛利率要等可复用集成把实施拖累压下去，才能真正越过 70% 目标；如果只读数据不够用、客户还需要更深的 OMS 改造，这个模型对现金消耗的判断就偏乐观。
    - 收入计划假设监控扩展会把每只基金的混合 ARR 从 Y2 约 $234K 拉到 Y3 约 $250K；如果客户只买认证，基准情形就高估了收入密度。
    - 模型没有计入债务、资本开支或异常的监管合规项目支出；如果客户要求路线图之外的定制控制开发，融资需求就得上调。
