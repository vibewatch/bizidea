slug: shadow-agent-approval-rail
date: '2026-06-28'
currency: USD
modelStartMonth: 2026-07
assumptions:
  - id: A1
    name: 模型起始月份
    value: 2026-07
    unit: YYYY-MM
    source: "[BP date 2026-06-28] 这是带日期的商业计划之后第一个完整运营月份。"
  - id: A2
    name: 期初现金 / 种子前轮融资
    value: $2.4M
    unit: USD
    source: "[BP fundingAsk targetFundingRangeUsd $2-4M + BP runwayMonths 18 + model cash curve] 取披露区间偏低的中位，仍足以让公司跑到 Q4Y2 的验证节点，并再留出 6 个月缓冲。"
  - id: A3
    name: 起始付费基金数
    value: '0'
    unit: count
    source: "[BP milestones 0-12 months + BP experimentRoadmap] 公司起步时还没有收入，先要把共创客户转成付费认证试点。"
  - id: A4
    name: 付费认证试点价格
    value: $54K，周期约 3 个月（~$18K/月）
    unit: USD/fund
    source: "[BP investorMemo.firstCustomer.initialContract $40k-$75k + BP gtm.pricing] 模型按首批共创客户打法，取付费试点价格区间的中值。"
  - id: A5
    name: 正式生产平台订阅
    value: $200K ARR
    unit: USD/fund/year
    source: "[BP gtm.pricing centered near $200k launch ACV + research market.sam] 基础生产定价与研究里的上线 ACV 锚点一致。"
  - id: A6
    name: 实时监控扩展模块
    value: $50K ARR
    unit: USD/fund/year
    source: "[BP businessModel.revenueStreams + BP milestones 0-12 and 12-24 months] 实时监控按认证之后的第二笔销售建模，把稳态 ARR 拉到每只基金约 $250K。"
  - id: A7
    name: 客户爬坡节奏
    value: M12 时 4 家付费基金；Q4Y2 时 10 家；Q4Y3 时 18 家
    unit: customersEop
    source: "[BP milestones 0-12, 12-24, 24-36 + research market.som] 与计划里第 2 年做到 8-12 家付费基金、以及研究给出的第 3 年 18 家客户 SOM 一致。"
  - id: A8
    name: 收入确认口径
    value: "按期间内平均活跃付费基金数，乘以每只基金的混合已实现月收入：Y1 前期试点为 $18K，Y1 后期为 $19K，Y2 为 $19.5K，Y3 为 $20.8K"
    unit: formula
    source: "[BP investorMemo.firstCustomer.initialContract + BP gtm.pricing + BP businessModel.expansionLevers] 这个口径把试点收入顺着接到正式订阅，再叠加监控加购。"
  - id: A9
    name: 毛利率爬坡
    value: Y1 55%-65%; Y2 67%-70%; Y3 71%-72.5%
    unit: gross margin percent
    source: "[BP businessModel.targetGrossMarginPct 70 + BP strategicChoices.sequencingRationale + startup-finance heuristic] 前期集成和实施会先拖累毛利，等可复用连接器跑起来后才会改善。"
  - id: A10
    name: 用于单位经济模型的月度客户流失率
    value: '1.5'
    unit: percent/month
    source: "[startup-finance heuristic for high-ACV workflow SaaS] 年约加上高粘性的控制流程支撑低流失，但客户集中度风险意味着早期不能把流失假设设成 0。"
  - id: A11
    name: 招聘节奏
    value: "M1 配齐创始人 / CEO、创始工程师和产品 / 风控负责人；M4 招集成工程师；M7 招实施负责人；M10 招首位 AE / 合作伙伴负责人；M14 招第二名工程师；M18 招客户成功；M22 招第二名销售；M28 招财务 / 行政；M31 招第三名工程师；M34 招第二名实施人员"
    unit: timeline
    source: "[BP team + BP strategicChoices.sequencingRationale] Y1 招聘先围绕验证展开；等付费试点跑通、且至少有一个伙伴打法成形后，才补交付和 GTM 产能。"
  - id: A12
    name: 创始人全成本薪酬
    value: $150K
    unit: USD/year
    source: "[BP team Founder/CEO + startup-finance heuristic] 按低于市场的创始人现金薪酬计入，并包含工资税费和福利。"
  - id: A13
    name: 工程全成本薪酬
    value: $190K
    unit: USD/year
    source: "[BP team Founding eng + startup-finance heuristic] 假设在美国金融软件招聘市场招到资深控制平面和数据集成人才。"
  - id: A14
    name: 产品 / 风控流程全成本薪酬
    value: $170K
    unit: USD/year
    source: "[BP team Product and risk workflow lead + startup-finance heuristic] 对应一位能把投资约束检查和投委会材料要求编码进流程的资深操盘手。"
  - id: A15
    name: 集成 / 实施全成本薪酬
    value: $160K
    unit: USD/year
    source: "[BP team Integration engineer and Implementation lead + startup-finance heuristic] 假设招聘的是能亲自下场部署的人，但不搭大规模服务团队。"
  - id: A16
    name: 销售 / 合作伙伴全成本薪酬
    value: $180K
    unit: USD/year
    source: "[BP team Account executive or partnerships lead + BP gtm.channels + startup-finance heuristic] 包含企业销售和伙伴销售所需的差旅与浮动薪酬。"
  - id: A17
    name: 客户成功 / 运营全成本薪酬
    value: $135K
    unit: USD/year
    source: "[BP milestones 12-24 months + startup-finance heuristic] 等经常性监控和多团队接入需要固定负责人时，再补这岗。"
  - id: A18
    name: G&A / 财务全成本薪酬
    value: $120K
    unit: USD/year
    source: "[BP operations + startup-finance heuristic] 覆盖精简财务、供应商管理和合规行政，补到公司拿下最早几家客户之后。"
  - id: A19
    name: 薪酬在 P&L 科目间的分摊
    value: 创始人 70% S&M / 30% G&A；工程 100% R&D；产品 / 风控 80% R&D / 20% G&A；集成和实施 60% R&D / 40% S&M；销售 100% S&M；客户成功 50% S&M / 50% G&A；财务 100% G&A
    unit: allocation
    source: "[BP team role rationales + BP operations] 这样分摊人员成本，和谁在做产品、谁在拿单、谁在支撑交付基本一致。"
  - id: A20
    name: 非薪酬经营支出爬坡
    value: 月度非薪酬 S&M/R&D/G&A 从 Y1 前期的 $7K/$8K/$6K 升到 Q4Y3 的 $22K/$22K/$13K
    unit: USD/month
    source: "[BP operations + BP risks + startup-finance heuristic] 覆盖云资源、安全审查、保险、法务、差旅和伙伴支持等开销，且不假设大额付费获客支出。"
  - id: A21
    name: 现金转换口径
    value: 用 EBITDA 近似经营现金变动
    unit: policy
    source: "[startup-finance heuristic] 在这个 pre-seed 阶段，模型不计债务偿付、税项、资本开支或明显的营运资本波动。"
  - id: A22
    name: CAC 口径
    value: Y2-Y3 的销售与营销支出 ÷ 从 Y1 期末到 Y3 期末新增的 14 家付费基金
    unit: formula
    source: "[model calculation using base-case S&M spend + BP gtm.funnelTargets] 这个口径抓的是扩张期里，创始人主导和伙伴带动的企业级获客成本。"
  - id: A23
    name: 本轮融资规模对应的下一轮里程碑
    value: 到 Q4Y2 达到约 10 家付费基金，证明从认证到实时监控的扩展可重复，并让部署时间继续朝第 2 年低于 30 天的目标收敛
    unit: milestone
    source: "[BP milestones 12-24 months + BP fundingAsk.useOfFundsSummary + model cash curve] 这就是当前融资额外加 6 个月缓冲所对应的验证点。"
