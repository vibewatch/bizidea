  round: pre-seed
  amountM: 2.4
  runwayMonths: 24
  milestone: 到 Q4Y2 达到约 10 家付费基金，足够频繁地把认证扩展成实时监控，支撑约 ~$2.3M 的期末 ARR，并带着足够现金进入 Y3 去验证 18 家客户的 SOM 路径。
