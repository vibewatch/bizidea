slug: shadow-agent-approval-rail
date: '2026-06-28'
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: Model start month
  value: 2026-07
  unit: YYYY-MM
  source: '[BP date 2026-06-28] first full operating month after the dated business plan.'
- id: A2
  name: Opening cash / pre-seed raise
  value: $2.4M
  unit: USD
  source: '[BP fundingAsk targetFundingRangeUsd $2-4M + BP runwayMonths 18 + model cash curve] uses the low-middle of the stated range and still carries the company through the Q4Y2 proof point plus a 6-month buffer.'
- id: A3
  name: Starting paying funds
  value: '0'
  unit: count
  source: '[BP milestones 0-12 months + BP experimentRoadmap] the company starts pre-revenue and must first convert design partners into paid certification pilots.'
- id: A4
  name: Paid certification pilot price
  value: $54K over about 3 months (~$18K/month)
  unit: USD/fund
  source: '[BP investorMemo.firstCustomer.initialContract $40k-$75k + BP gtm.pricing] the model uses the midpoint of the paid-pilot range for the first design-partner motion.'
- id: A5
  name: Production platform subscription
  value: $200K ARR
  unit: USD/fund/year
  source: '[BP gtm.pricing centered near $200k launch ACV + research market.sam] base production pricing matches the researched launch ACV anchor.'
- id: A6
  name: Monitoring expansion module
  value: $50K ARR
  unit: USD/fund/year
  source: '[BP businessModel.revenueStreams + BP milestones 0-12 and 12-24 months] live monitoring is modeled as the second sale after certification and lifts steady-state ARR to about $250K per fund.'
- id: A7
  name: Customer ramp
  value: 4 paying funds by M12; 10 by Q4Y2; 18 by Q4Y3
  unit: customersEop
  source: '[BP milestones 0-12, 12-24, 24-36 + research market.som] matches the plan to reach 8-12 paying funds by year 2 and the researched 18-customer year-3 SOM.'
- id: A8
  name: Revenue recognition convention
  value: 'Average active paying funds in period multiplied by blended realized monthly revenue per fund: $18K in early Y1 pilots, $19K in late Y1, $19.5K in Y2, and $20.8K in Y3'
  unit: formula
  source: '[BP investorMemo.firstCustomer.initialContract + BP gtm.pricing + BP businessModel.expansionLevers] this bridges pilot revenue into production subscriptions plus monitoring attach.'
- id: A9
  name: Gross margin ramp
  value: Y1 55%-65%; Y2 67%-70%; Y3 71%-72.5%
  unit: gross margin percent
  source: '[BP businessModel.targetGrossMarginPct 70 + BP strategicChoices.sequencingRationale + startup-finance heuristic] early integrations and implementation drag margins before reusable connectors take hold.'
- id: A10
  name: Monthly logo churn for unit economics
  value: '1.5'
  unit: percent/month
  source: '[startup-finance heuristic for high-ACV workflow SaaS] annual contracts and sticky control workflows support low churn, but concentration risk warrants a non-zero early-stage assumption.'
- id: A11
  name: Hiring cadence
  value: Founder/CEO, founding engineer, and product/risk lead in M1; integration engineer M4; implementation lead M7; first AE/partnerships hire M10; second engineer M14; customer success M18; second seller M22; finance/admin M28; third engineer M31; second implementation hire M34
  unit: timeline
  source: '[BP team + BP strategicChoices.sequencingRationale] hiring stays proof-oriented through Y1, then adds delivery and GTM capacity only after paid pilots and one partner motion exist.'
- id: A12
  name: Founder loaded compensation
  value: $150K
  unit: USD/year
  source: '[BP team Founder/CEO + startup-finance heuristic] below-market founder cash pay plus payroll taxes and benefits.'
- id: A13
  name: Engineering loaded compensation
  value: $190K
  unit: USD/year
  source: '[BP team Founding eng + startup-finance heuristic] assumes senior control-plane and data-integration talent in a U.S. financial-software hiring market.'
- id: A14
  name: Product / risk workflow loaded compensation
  value: $170K
  unit: USD/year
  source: '[BP team Product and risk workflow lead + startup-finance heuristic] reflects a senior operator who can encode mandate checks and committee packet requirements.'
- id: A15
  name: Integration / implementation loaded compensation
  value: $160K
  unit: USD/year
  source: '[BP team Integration engineer and Implementation lead + startup-finance heuristic] assumes hands-on deployment talent without building a large services bench.'
- id: A16
  name: Sales / partnerships loaded compensation
  value: $180K
  unit: USD/year
  source: '[BP team Account executive or partnerships lead + BP gtm.channels + startup-finance heuristic] includes travel and variable comp for enterprise and partner-led selling.'
- id: A17
  name: Customer success / ops loaded compensation
  value: $135K
  unit: USD/year
  source: '[BP milestones 12-24 months + startup-finance heuristic] added once recurring monitoring and multi-pod onboarding need a repeatable owner.'
- id: A18
  name: G&A / finance loaded compensation
  value: $120K
  unit: USD/year
  source: '[BP operations + startup-finance heuristic] covers lean finance, vendor management, and compliance administration after the company passes the first handful of customers.'
- id: A19
  name: Payroll allocation to P&L lines
  value: Founder 70% S&M / 30% G&A; engineering 100% R&D; product/risk 80% R&D / 20% G&A; integration and implementation 60% R&D / 40% S&M; sales 100% S&M; customer success 50% S&M / 50% G&A; finance 100% G&A
  unit: allocation
  source: '[BP team role rationales + BP operations] maps headcount cost into functional opex in a way that matches who builds product, wins accounts, and supports delivery.'
- id: A20
  name: Non-payroll operating spend ramp
  value: Monthly non-payroll S&M/R&D/G&A rises from $7K/$8K/$6K in early Y1 to $22K/$22K/$13K by Q4Y3
  unit: USD/month
  source: '[BP operations + BP risks + startup-finance heuristic] covers cloud, security review, insurance, legal, travel, and partner-support overhead without assuming heavy paid-demand spend.'
- id: A21
  name: Cash conversion convention
  value: EBITDA approximates operating cash movement
  unit: policy
  source: '[startup-finance heuristic] no debt service, taxes, capex, or material working-capital swings are modeled at this pre-seed stage.'
- id: A22
  name: CAC methodology
  value: Y2-Y3 sales and marketing spend divided by 14 net new paying funds from Y1 exit to Y3 exit
  unit: formula
  source: '[model calculation using base-case S&M spend + BP gtm.funnelTargets] captures founder-led and partner-led enterprise acquisition cost during the scale-up period.'
- id: A23
  name: Next-round milestone for funding sizing
  value: Reach about 10 paying funds by Q4Y2, show repeatable certification-to-monitoring expansion, and keep deployment time moving toward the sub-30-day year-2 goal
  unit: milestone
  source: '[BP milestones 12-24 months + BP fundingAsk.useOfFundsSummary + model cash curve] this is the proof point used to size the current raise plus 6 months of buffer.'
