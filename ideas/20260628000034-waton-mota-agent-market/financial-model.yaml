scenarios:
  downside:
    description: External-agent adoption moves slower, monitoring attach stays low, and a quarter of sales-cycle slippage pushes part of the Y3 logo plan out.
    y3RevenueK: 2793.6
    y3EbitdaK: -418.0
    cashLowPointK: 459.0
    keyAssumptionChanges:
    - Q4Y3 customers end at 15 instead of 18
    - Blended ARR per fund reaches only about $230K instead of $250K
    - Exit gross margin reaches 69% instead of 72.5% because implementations remain less reusable
  base:
    description: Paid pilots convert steadily, one partner channel contributes by year 2, and live monitoring becomes the default second sale after certification.
    y3RevenueK: 3494.4
    y3EbitdaK: 164.9
    cashLowPointK: 850.6
    keyAssumptionChanges:
    - Q4Y3 customers reach 18 in line with the researched SOM path
    - Blended ARR per fund reaches about $250K as monitoring attaches
    - Gross margin exits at 72.5% after reusable read-only integrations cut implementation drag
  upside:
    description: Partner referrals arrive earlier, monitoring attach is stronger, and the company adds logos without materially increasing headcount.
    y3RevenueK: 4040.0
    y3EbitdaK: 540.0
    cashLowPointK: 935.0
    keyAssumptionChanges:
    - Q4Y3 customers reach 21 instead of 18
    - Blended ARR per fund reaches about $265K through higher monitoring and multi-pod attach
    - Gross margin exits at 75% because deployment time falls below 30 days earlier than planned
