modelDiagram:
  title: unit economics flow
  mermaid: |-
    flowchart LR
      TargetAccounts --> PaidPilots
      PaidPilots --> CertifiedFunds
      CertifiedFunds --> MonitoringAttach
      CertifiedFunds --> Revenue
      MonitoringAttach --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
- checkName: Revenue engine
  finding: Base-case Y3 revenue comes from growing from 4 to 18 paying funds while lifting blended ARR from pilot-heavy Y1 levels to about $250K once monitoring attaches.
- checkName: Must go right
  finding: The company must keep certification-to-monitoring conversion near the plan's 50%+ target and make read-only integrations repeatable enough that deployment time keeps shrinking.
- checkName: Model breaks if
  finding: A one-quarter slip in buyer timing or a monitoring attach rate closer to the downside case removes more than $0.5M of Y3 revenue and pushes cash meaningfully lower.
- checkName: Next-round proof
  finding: Reaching roughly 10 paying funds by Q4Y2 with at least one credible partner channel is the operating proof that justifies the next financing.
sanityChecks:
  ruleOf40: Y3 growth 121.2% + EBITDA margin 4.7% = 125.9%
  burnMultiple: Y2 burn multiple 0.5x (-$662.2K EBITDA on $1261.6K net new revenue), improving to positive EBITDA in Y3.
  revenuePerFte: $291.2K Y3 revenue per end-of-year FTE (benchmark $200-400K vertical SaaS).
  flags:
  - The launch market is intentionally narrow, so one or two delayed hedge-fund decisions can move the model materially even though Y3 logo count is still below 10% of the researched SAM.
  - Gross margin only clears the 70% target after reusable integrations reduce implementation drag; if read-only data proves insufficient and deeper OMS work is needed, this model is too optimistic on burn.
  - The revenue plan assumes monitoring expansion lifts blended ARR from roughly $234K in Y2 to about $250K in Y3; if customers buy certification only, the base case overstates revenue density.
  - No debt, capex, or unusual regulatory-compliance project spend is modeled, so the funding ask would need to rise if a customer requires bespoke control development outside the roadmap.
