slug: shadow-agent-approval-rail
date: "2026-06-28"
executiveSummary: >-
  Shadow Agent Approval Rail sells a pre-live certification and live-supervision
  control plane to U.S. hedge funds and institutional family offices evaluating
  third-party AI equities agents. The first product runs one external agent in
  read-only shadow mode, maps each recommendation, order, and override to the
  fund's mandate and risk rules, and produces an investment-committee-ready
  approval packet for a single PM pod. The first customer is a $500M-$5B AUM
  multi-manager hedge fund or institutional family office where a PM has found a
  promising outside agent but the COO or Head of Risk will not approve live
  deployment without repeatable evidence. This wedge is attractive because the
  same operating buyer already owns vendor diligence, paper-trading evidence, and
  ongoing monitoring, letting the company land with certification and expand into
  live drift monitoring instead of trying to replace the OMS or become a
  strategy marketplace. Research supports a narrow but real launch market of
  about $51M SAM and a modeled first-year ACV centered around $200k, but both
  figures depend on proving that enough target funds are actively evaluating
  external agents now. The company should start with U.S. long-short equities,
  read-only integrations, and one-pod pilots, then add deeper OMS hooks and
  broader monitoring only after approval-to-production conversion is repeatable.
  The moat is accumulated approval history linking recommendations, fills,
  overrides, mandate exceptions, committee outcomes, and post-approval drift
  envelopes across many agent evaluations. The key disconfirming risk is
  category timing: if most target funds still prefer internal agents or are not
  yet testing external supply, the business stays niche and should not scale
  hiring ahead of proof.
problem:
  - "Funds can now discover third-party AI trading agents, but risk and operations teams still lack a defensible way to decide whether an external agent deserves live capital."
  - "Current approval work is manual paper trading, OMS notes, spreadsheets, and screenshots, which are slow to review, hard to compare across agents, and weak under vendor or regulatory scrutiny."
  - "Paper trading alone misses slippage, market impact, queue position, and drift risk, so buyers can approve the wrong agent or block deployment indefinitely."
solution:
  - "Ingest agent recommendations, fills, and human overrides in read-only shadow mode for one U.S. equities pod, then map every proposed action to mandate rules, position limits, approved instruments, and reviewer comments."
  - "Generate a committee-ready approval packet with replay, attribution, exceptions, conservative paper-to-live stress assumptions, and an explicit approve or reject decision trail."
  - "After approval, keep the same rail in place for live drift monitoring, threshold alerts, and kill-switch workflows so certification and supervision stay in one system."
whyWeWin:
  - "The product sits at the exact approval decision before live capital, where neither agent marketplaces nor surveillance vendors are neutral or optimized today."
  - "By starting read-only and above funds flow, the company can deliver value before deep OMS or broker changes, reducing integration and regulatory friction in the first sale."
  - "Each certification compounds a proprietary dataset of shadow behavior, mandate exceptions, reviewer decisions, and approved drift envelopes that becomes harder for in-house scripts to match across many agents."
strategicChoices:
  beachhead: "U.S. $500M-$5B AUM multi-manager hedge funds and institutional family offices evaluating one external AI equities agent for one PM pod."
  wedgeRationale: "This slice has the clearest trigger because a PM can create demand immediately while the COO or Head of Risk still controls budget and go-live approval, and one-pod scope keeps implementation small enough to prove ROI before broader workflow re-platforming."
  sequencingRationale: >-
    Start with read-only certification because buyers need evidence faster than
    they need automation, and because deep OMS writes or multi-asset support
    would lengthen security, legal, and implementation cycles. Add live drift
    monitoring only after the first approved agents reach production, then hire
    implementation and sales capacity once the playbook works across multiple
    funds and at least one data-integration partner.
  notYet:
    - "Replacing the OMS, OEMS, or broker execution stack"
    - "UK/EU rollout and multi-asset support before U.S. equities proof exists"
    - "Broad internal-agent governance for every AI workflow inside the fund"
    - "Becoming an agent marketplace or revenue-sharing venue"
market:
  tam: "$204M estimated TAM based on roughly 850 hedge-fund and institutional-family-office buyers globally at about $240k ACV."
  sam: "$51M estimated SAM based on roughly 255 reachable U.S. and UK buyers in long-short equities and one-pod pilot workflows at about $200k launch ACV."
  som: "$4.5M illustrative year-3 SOM based on 18 customers at roughly $250k blended ARR after landing certification and a first monitoring module."
  segments:
    - "Primary: U.S. multi-manager hedge funds in the $500M-$5B AUM band evaluating external AI equities agents"
    - "Secondary: Institutional family offices and desk-platform teams running concentrated discretionary or hybrid quant pods"
  buyingProcess: >-
    A PM or quant lead usually creates demand by identifying an external agent,
    but budget and final approval sit with the COO or Head of Risk because the
    purchase touches vendor diligence, paper-trading evidence, and live
    supervision. Quant ops, trading technology, and sometimes compliance
    influence the deal because the buyer must trust both the replay data and the
    control workflow before any live capital is allocated.
product:
  mvp: >-
    The MVP should ingest one external agent's recommendations, fills, and
    overrides for a single U.S. equities pod, apply mandate and risk-rule
    checks, and produce a replayable approval packet with exception summaries
    and human sign-off. It should stay read-only, support conservative slippage
    stress assumptions, and export audit-ready records before attempting live
    order routing or broad multi-asset coverage.
  sixMonth: "Ship paid pilots for read-only shadow runs, rule mapping, approval packet exports, and baseline drift thresholds for one U.S. equities workflow."
  twelveMonth: "Add two reusable OMS or broker-data integrations, live monitoring for approved agents, kill-switch alerting, and a standard vendor-diligence package that shortens security review."
  twentyFourMonth: "Expand from one-pod certification into multi-pod supervision, benchmark libraries by agent type, and selective coverage for adjacent strategies such as broker algos or another liquid asset class."
  keyBets:
    - "Read-only data exports from agent outputs, fills, and overrides are sufficient to make an investment committee comfortable without immediate write access into the OMS."
    - "The first customers share enough U.S. equities workflow overlap that implementation time drops materially by the third deployment."
    - "Certification converts into live-monitoring expansion because buyers want one system to own both approval evidence and drift response."
    - "Neutral cross-platform approval remains more credible to allocators than marketplace-native approval features."
gtm:
  wedge: "Sell a one-agent, one-pod certification program for external AI equities agents that turns manual paper-trading diligence into a committee-ready approval decision inside the buyer's existing control stack."
  channels:
    - "Founder-led sales to COOs, Heads of Risk, and quant-ops leaders at target hedge funds and institutional family offices"
    - "Design-partner referrals through OMS or OEMS teams already modernizing exception and workflow controls"
    - "Marketplace, broker, and quant-platform partnerships that need neutral trust conversion for third-party agent supply"
  funnelTargets: "Target account→qualified pilot 20-30%, qualified pilot→paid certification 60%+, and paid certification→production monitoring 50%+ within 12 months."
  pricing: "Price first-year deals at roughly $150k-$250k ACV, centered near the researched $200k launch anchor, with an annual platform subscription per fund entity plus per-agent certification fees and an optional live-monitoring module."
businessModel:
  revenueStreams:
    - "Annual platform subscription per fund entity"
    - "Per-agent certification fees for shadow runs and approval packets"
    - "Live monitoring and exception-response module fees for approved agents"
  unitOfValue: "Certified external agent within a fund entity."
  targetGrossMarginPct: 70
  expansionLevers:
    - "Add more external agents, PM pods, and strategies within the same fund"
    - "Upsell live monitoring, drift analytics, and kill-switch workflows after certification"
    - "Expand through broker, OMS, or marketplace channels that embed the approval rail into recurring onboarding"
strategyMap:
  northStarMetric: "External agents approved into production with active monitoring still retained after 90 days."
  inputMetrics:
    - "Median days from agent discovery to approve or reject decision"
    - "Read-only integration time to first shadow run"
    - "Approval packet acceptance rate without major rework"
    - "Paid certification-to-production monitoring conversion rate"
    - "Percentage of approved agents remaining within drift thresholds after 30 days"
  moatsToBuild:
    - "Approval-history dataset linking recommendations, fills, overrides, mandate exceptions, committee decisions, and live drift outcomes"
    - "Reusable rule templates for common hedge-fund mandate and risk checks in the beachhead"
    - "Cross-platform benchmark data on approval duration, exception patterns, and post-approval drift by agent type"
  killCriteria:
    - "Fewer than 5 of the first 15 ICP interviews confirm active evaluation of third-party agents within the next 12 months."
    - "The first 3 paid pilots fail to cut time to approval decision below 10 business days from a multi-week manual baseline."
    - "Fewer than 2 of the first 5 certified agents convert to paid live monitoring within 6 months of approval."
  mermaid: |
    flowchart LR
      Wedge[One-agent approval wedge] --> MVP[Read-only certification MVP]
      MVP --> Proof[Approved agents and referenceable packets]
      Proof --> Expansion[Live monitoring and multi-pod expansion]
investorMemo:
  verdict:
    call: Watch
    conviction: "Compelling control-point insight, but conviction remains limited until paid pilots prove category timing and standalone willingness to pay."
    whyBelieve: "If external agent marketplaces grow, institutional allocators will need approval evidence before capital allocation, and no neutral vendor owns that control point today."
    whyDoubt: "The buyer universe is concentrated, timing is uncertain, and OMS or marketplace vendors may bundle enough approval workflow to compress standalone ACV."
    nextDiligence: "Confirm three paid design partners already paper-trading external agents and show that one certification converts into paid production monitoring."
  firstCustomer:
    title: "COO or Head of Risk at a $500M-$5B AUM hedge fund evaluating one external AI equities agent"
    profile: "A U.S. multi-manager hedge fund or institutional family office running a long-short equities pod and using manual paper-trading evidence to evaluate an external agent sourced from a marketplace or broker channel."
    trigger: "A PM or quant lead identifies a promising external agent, but risk refuses live deployment without a repeatable shadow record and sign-off trail."
    buyer: "COO or Head of Risk"
    initialContract: "A 6-10 week paid certification pilot priced around $40k-$75k that converts into a $150k-$250k first-year contract for one fund entity, one approved agent, and optional production monitoring."
  mustBeTrue:
    - "At least 5 of the first 15 target funds are actively evaluating third-party agents today rather than only internal models."
    - "The MVP can produce an approval packet from read-only exports without requiring order-routing changes in the first deployment."
    - "Target buyers accept at least $150k of first-year ACV when the workflow replaces weeks of manual due diligence and supports one-pod go-live."
    - "At least 50% of paid certifications convert into live-monitoring subscriptions because the same buyer owns post-approval supervision."
    - "Neutral cross-platform certification wins head-to-head against marketplace-native or in-house workflows in at least 3 early competitive evaluations."
  diligenceQuestions:
    - "How many U.S. hedge funds in the target AUM band are already evaluating external agents versus only internal models?"
    - "What minimum dataset does an investment committee require to approve an external agent without deep OMS integration?"
    - "Who actually controls budget and vendor approval in practice: COO, Head of Risk, CTO, or desk-platform lead?"
    - "How often do marketplaces, brokers, or OMS vendors prefer to partner rather than bundle their own approval workflow?"
    - "What evidence convinces buyers that paper-to-live slippage and drift are handled conservatively enough to trust the certification result?"
operatingAssumptions:
  - assumption: "A meaningful share of beachhead funds are already paper-trading or evaluating external agents."
    basis: research.yaml
    validationTest: "Interview 15 target funds and collect current approval artifacts from at least 5 active evaluations."
    decisionImpact: "If false, narrow the product to internal-agent approval or pause standalone fundraising because the timing thesis is early."
  - assumption: "Read-only exports plus fill and override data are enough to support initial approval decisions."
    basis: research.yaml
    validationTest: "Run 3 technical pilots and have at least 2 committees accept the resulting packet without requesting deeper write access."
    decisionImpact: "If false, the roadmap must prioritize deeper OMS integrations sooner and burn will rise."
  - assumption: "Buyers will fund a $150k-$250k first-year deployment under the COO or risk budget."
    basis: idea.yaml
    validationTest: "Close 2 paid pilots at or above $100k and collect structured pricing feedback from 10 buyer calls."
    decisionImpact: "If false, pricing or packaging must shift toward partner channels or a narrower monitoring module."
  - assumption: "Neutral certification stays strategically distinct from marketplace-native or OMS-native approval features for at least the next 24 months."
    basis: operator judgment
    validationTest: "Track 10 competitive deals and quarterly product releases; the assumption holds only if most prospects still describe neutrality and cross-platform evidence as missing."
    decisionImpact: "If false, reposition toward white-label partner software or a deeper monitoring niche."
  - assumption: "Live monitoring is the natural second sale after certification."
    basis: idea.yaml
    validationTest: "Secure advance expansion intent from at least 3 pilot customers and convert 2 approved agents into monitoring contracts."
    decisionImpact: "If false, the business stays services-like and the venture-scale thesis weakens."
experimentRoadmap:
  - horizon: "0-90 days"
    experiment: "Interview 15 COOs, Heads of Risk, and quant-ops leaders at target funds and collect real approval artifacts from active external-agent evaluations."
    hypothesis: "Category timing is strong enough that a meaningful share of the beachhead already has a funded or pending approval workflow for third-party agents."
    successMetric: "At least 5 funds share evidence of an active evaluation and at least 3 agree to paid pilot scoping."
    owner: "Founder/CEO"
  - horizon: "0-90 days"
    experiment: "Build a read-only prototype that ingests one agent recommendation feed, one fill feed, and one manual-override log for a U.S. equities pod."
    hypothesis: "The MVP can reconstruct enough replay and control evidence without changing order-routing systems."
    successMetric: "The prototype produces a complete approval packet for 2 sample workflows using only exported data."
    owner: "Founding eng"
  - horizon: "90-180 days"
    experiment: "Run the first 2 paid certification pilots and deliver committee-ready approval packets with explicit approve or reject outcomes."
    hypothesis: "Buyers will pay for a standardized certification workflow before asking for full live-monitoring automation."
    successMetric: "At least 2 pilots are paid and each reaches a decision within 10 business days after data handoff."
    owner: "Product and risk workflow lead"
  - horizon: "90-180 days"
    experiment: "Package the vendor-diligence, audit-log, and human-approval controls needed to pass one real enterprise security review."
    hypothesis: "Security and third-party risk review can be standardized early enough that sales cycles stay manageable."
    successMetric: "One pilot clears customer security review without bespoke control development outside the product roadmap."
    owner: "Founder/CEO"
  - horizon: "180-365 days"
    experiment: "Launch live-monitoring beta for the first approved agent with drift thresholds, alerts, and a documented kill-switch workflow."
    hypothesis: "Certification customers want the same system to own post-approval supervision once an agent reaches production."
    successMetric: "At least 1 approved agent goes live on the monitoring module and remains a referenceable customer after 90 days."
    owner: "Implementation lead"
  - horizon: "180-365 days"
    experiment: "Run one partnership pilot with an OMS, broker, or agent-marketplace channel that refers a customer into certification."
    hypothesis: "Channel partners will treat neutral approval as a trust-conversion layer rather than workflow encroachment."
    successMetric: "One partner-sourced deal reaches paid pilot stage with less CAC than founder-led outbound."
    owner: "Founder/CEO"
operations:
  - "Maintain an immutable event log of recommendations, fills, overrides, reviewer actions, and approval decisions for every pilot and production agent."
  - "Run a standard customer implementation sequence of data mapping, rule templating, shadow run, committee packet, and post-approval drift threshold setup."
  - "Prepare a reusable vendor-diligence pack covering security, auditability, role-based access, and human-approval controls before every enterprise pilot."
  - "Use partner playbooks with OMS, OEMS, brokers, and marketplaces that define read-only data access first and deeper integrations only after ROI is proven."
  - "Reject workflows that require the company to become the execution venue, broker, or fiduciary decision maker."
team:
  - role: "Founder/CEO"
    startTiming: "Month 0"
    rationale: "Own founder-led sales, design-partner discovery, and early partner development because buyer truth and category timing are still the main unknowns."
  - role: "Founding eng"
    startTiming: "Month 0"
    rationale: "Build the replay engine, rules model, audit log, and first shadow-run workflow required for paid pilots."
  - role: "Product and risk workflow lead"
    startTiming: "Month 0-2"
    rationale: "Translate hedge-fund mandate checks, reviewer states, and approval packets into a repeatable product rather than a custom consulting workflow."
  - role: "Integration engineer"
    startTiming: "Month 3-5"
    rationale: "Turn the first read-only feeds and OMS exports into reusable connectors that shorten deployment time and protect gross margin."
  - role: "Implementation lead"
    startTiming: "Month 6-9"
    rationale: "Own onboarding, packet delivery, and post-approval monitoring setup once the first two pilots reveal the repeatable playbook."
  - role: "Account executive or partnerships lead"
    startTiming: "Month 9-12"
    rationale: "Add dedicated selling capacity only after the company has referenceable pilots and one working partner channel."
milestones:
  - horizon: "0-12 months"
    items:
      - "Complete 15 ICP interviews and secure at least 3 paid design-partner pilots."
      - "Ship the MVP for read-only shadow runs, rule mapping, and committee-ready approval packets for one U.S. equities workflow."
      - "Convert at least 1 certified agent into paid production monitoring and sign 1 OMS, broker, or marketplace integration partner."
      - "Reduce approval-packet turnaround to 10 business days or less on the third deployment."
  - horizon: "12-24 months"
    items:
      - "Reach 8-12 paying funds in the beachhead with reusable read-only integrations and standardized rule templates."
      - "Launch live monitoring, drift alerts, and kill-switch workflows as the default expansion module after certification."
      - "Add selective coverage for a second strategy type or adjacent liquid asset class only after U.S. equities deployments start in under 30 days."
  - horizon: "24-36 months"
    items:
      - "Expand from one-pod approvals to multi-pod supervision inside top customers."
      - "Establish the company as the neutral approval layer for broker, marketplace, and OMS channels rather than direct sales only."
      - "Prove that approval-history data improves deployment speed, exception detection, and retention enough to support software-like margins."
risks:
  - risk: "External-agent adoption is slower than expected, leaving too few funds in active evaluation mode."
    likelihood: High
    impact: High
    mitigation: "Sell only into funds already paper-trading external agents, require evidence of an active evaluation before bespoke work, and pivot the same control rail toward internal-agent approval if external demand stays thin."
  - risk: "Read-only data does not satisfy investment committees, forcing deeper OMS work earlier than planned."
    likelihood: Medium
    impact: High
    mitigation: "Use pilots to define the minimum viable evidence set and only build the two most reusable deep integrations if read-only packets fail to clear reviews."
  - risk: "Sophisticated funds choose in-house scripts instead of a new vendor."
    likelihood: Medium
    impact: High
    mitigation: "Compete on faster committee approval, reusable audit trails, and cross-agent drift envelopes that internal tools rarely standardize well."
  - risk: "Marketplaces, brokers, or OMS vendors bundle enough approval workflow to squeeze standalone pricing."
    likelihood: Medium
    impact: High
    mitigation: "Position the company as the neutral certifier across channels, pursue white-label or co-sell options where advantageous, and deepen monitoring and reporting beyond simple embedded approvals."
  - risk: "Paper-to-live mismatch creates false confidence in approved agents."
    likelihood: High
    impact: High
    mitigation: "Use conservative slippage and queue-position assumptions, require explicit human sign-off thresholds, and treat certification as a bounded approval envelope rather than a performance guarantee."
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2-4M"
  runwayMonths: 18
  useOfFundsSummary: "Fund 18 months of runway to build the read-only certification MVP, close 3 paid design partners, package vendor-diligence and audit controls, hire integration and implementation capacity, and prove certification-to-monitoring expansion in the U.S. equities beachhead."
