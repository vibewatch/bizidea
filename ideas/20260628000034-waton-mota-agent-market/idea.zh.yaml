jobsToBeDone:
  - job: "当某个 PM 想试一个外部 AI 股票智能体时，帮我们的基金按既有授权去跑模拟交易并完成审阅，好让我们判断它到底配不配碰真实资金。"
    currentAlternative: "手工模拟交易，加上表格复核和邮件签字"
    successMetric: "从发现智能体到投资委员会批准或否决的天数"
  - job: "当一个已获批智能体的行为开始偏离它认证过的影子画像时，帮风控团队尽快抓到漂移，好在它伤到业绩或控制体系前先按下暂停。"
    currentAlternative: "事后再手工盯订单、备注和 PnL 异常"
    successMetric: "发现并干预超出批准边界智能体行为所需的时间"
