problem: >-
  当第三方 AI 交易智能体开始能以市场商品的形式发布，对冲基金会撞上一个新瓶颈：到底哪些外部智能体可以碰真实资金。哪怕某个智能体看上去很有潜力，运营和风控团队在批准部署前，还是得看清它会研究什么、会提什么交易、又会在哪些授权范围或仓位规则上越线。现在这套尽调还得靠模拟交易、截图和临时脚本东拼西凑；一旦外部智能体多到几十个，这套办法就撑不住了。
targetUser:
  primary: "正在评估第三方 AI 交易智能体的对冲基金或机构型家族办公室里的 COO、风控负责人和交易台主管"
  secondary: "负责模拟交易、审批日志和交易后监督的量化平台与运营团队"
  buyer: "COO 或风控负责人"
startupThesis:
  nonObviousInsight: >-
    稀缺的不会是智能体本身；市场会让智能体供给变得充沛。真正稀缺的是审批证据：在任何人配置资金前，它要能说明一个外部智能体在基金的授权、风控限额和人工复核流程下到底会怎么表现。
  beachhead: "切入 $500M-$5B AUM 的多经理对冲基金和机构型家族办公室——它们正想在一个分析师-PM 小组里评估外部 AI 股票智能体的影子交易审批。"
  wedge: "一条影子交易加签字放行轨道：重放第三方智能体的决策，把每个拟议动作映射到授权和风控规则，并生成可直接提交投资委员会的审批材料"
  whyNowCatalyst: >-
    第三方交易智能体的排名型市场开始出现，再叠加上线产品本身就要求强制人工复核，这说明采用瓶颈已经从“找不到智能体”转向“怎么安全监管智能体”。
  ventureScalePath: >-
    先做外部交易智能体的实盘前认证，再扩到实时监控、资金分配控制、智能体收入分成，最终做成基金和券商接入任何自治投资工作流都要用的操作系统。
solution: >-
  做一条影子智能体审批轨道，接入智能体输出、市场数据，以及基金现有的 OMS 或模拟交易栈。外部智能体上实盘前，系统先让它跑影子模式，记下每个想法、订单和人工覆盖操作，再把每个动作逐条对照授权规则、集中度限制、批准交易品种和审阅人评论打标签。产品会把这些运行结果整理成标准化审批备忘录，里面有归因、异常摘要，以及和交易台当前流程的并排对比。智能体一旦获批，同一条轨道就继续充当监控层：持续承接人工签字放行、发出漂移预警，并在行为偏离已批准边界时触发熔断开关。
goToMarketSeed:
  firstCustomer: "一家 $500M-$5B AUM 的多经理对冲基金或机构型家族办公室；它想先让一个外部 AI 股票智能体在单个 PM 小组上跑模拟交易，再决定要不要配真实资金。"
  buyingTrigger: "某个 PM 或量化负责人在市场或券商渠道发现了一个有潜力的外部交易智能体，但风控和运营如果看不到可重复的审批记录，就不肯让它上实盘。"
  currentAlternative: "手工模拟交易、内部脚本、OMS 备注、表格复核，以及干脆不用第三方智能体"
  switchingReason: >-
    这个切口把原本要花几周、每次都要重做的尽调，压成一套标准化的影子交易记录和签字放行工作流；基金不用改执行栈，就能决定放行还是拒掉一个外部智能体。
  pricingHypothesis: "按基金实体收年度平台费，外加按智能体收认证费和实时监控席位费"
whyNow:
