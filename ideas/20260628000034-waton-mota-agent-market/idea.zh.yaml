topRisks:
  - name: "品类时机风险"
    description: "如果第三方交易智能体市场的增长慢于预期，最初那批买方可能会在很长一段时间里都太小众。"
    mitigation: "先从已经在用外部智能体跑模拟交易的基金切入，同时支持内部智能体审批流程，让产品不至于只押注单一市场。"
  - name: "集成阻力"
    description: "如果要先大改执行栈才能看到价值，基金可能会抗拒接入新系统。"
    mitigation: "先用智能体输出和模拟交易数据流以只读影子模式切入，等审批工作流证明 ROI 之后，再补更深的 OMS 和实时监控挂钩。"
  - name: "自建诱惑"
    description: "更成熟的基金可能会觉得，内部量化团队自己就能把模拟交易、规则校验和审阅日志拼起来。"
    mitigation: "靠更快的审批速度、更干净的审阅证据，以及一层可复用的跨智能体控制系统取胜——随着智能体数量上升，这套东西会越来越难靠内部团队长期维护。"
