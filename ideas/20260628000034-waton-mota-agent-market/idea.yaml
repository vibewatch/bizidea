problem: >-
  As third-party AI trading agents become publishable marketplace products, hedge funds face a new bottleneck: deciding which external agents can be trusted with live capital. Even when an agent looks promising, operations and risk teams still need to see what it would have researched, what trades it would have proposed, and where it would have breached mandate or sizing rules before approving deployment. Today that diligence is stitched together with paper trading, screenshots, and ad hoc scripts, which does not scale once dozens of outside agents become available.
targetUser:
  primary: "COOs, heads of risk, and desk leads at hedge funds or institutional family offices evaluating third-party AI trading agents"
  secondary: "Quant platform and operations teams responsible for paper trading, approval logs, and post-trade oversight"
  buyer: "COO or Head of Risk"
startupThesis:
  nonObviousInsight: >-
    The scarce asset will not be the agent itself; marketplaces will make agent supply abundant. The scarce asset is the approval evidence that shows how an external agent behaves under a fund's mandate, risk limits, and human-review process before anyone allocates capital.
  beachhead: "Shadow-trading approval for $500M-$5B AUM multi-manager hedge funds and institutional family offices evaluating external AI equities agents for one analyst-PM pod"
  wedge: "A shadow-trade and sign-off rail that replays third-party agent decisions, maps every proposed action to mandate and risk rules, and produces an investment-committee-ready approval packet"
  whyNowCatalyst: >-
    The emergence of a ranked marketplace for third-party trading agents, combined with mandatory human review in the launch product itself, means the adoption bottleneck has shifted from finding agents to supervising them safely.
  ventureScalePath: >-
    Start with pre-live certification for external trading agents, then expand into live monitoring, capital-allocation controls, agent revenue sharing, and eventually the operating system that funds and brokers use to onboard any autonomous investment workflow.
solution: >-
  Build a shadow-agent approval rail that plugs into agent outputs, market data, and a fund's existing OMS or paper-trading stack. Before an external agent can trade live, the system runs it in shadow mode, records every idea, order, and override, and tags each action against mandate rules, concentration limits, approved instruments, and reviewer comments. The product packages those runs into a standardized approval memo with attribution, exception summaries, and side-by-side comparisons against the desk's current process. Once an agent is approved, the same rail becomes the monitoring layer for ongoing human sign-off, drift alerts, and kill switches when behavior deviates from the approved envelope.
goToMarketSeed:
  firstCustomer: "A $500M-$5B AUM multi-manager hedge fund or institutional family office that wants to paper-trade one external AI equities agent before allocating real capital to a single PM pod"
  buyingTrigger: "A PM or quant lead finds a promising outside trading agent in a marketplace or broker channel, but risk and operations refuse live deployment without a repeatable approval record"
  currentAlternative: "Manual paper trading, internal scripts, OMS notes, spreadsheet reviews, and simply avoiding third-party agents"
  switchingReason: >-
    The wedge turns weeks of bespoke due diligence into a standardized shadow-trade record and sign-off workflow that lets funds approve or reject an external agent without changing their execution stack.
  pricingHypothesis: "Annual platform fee per fund entity plus per-agent certification and live-monitoring seats"
