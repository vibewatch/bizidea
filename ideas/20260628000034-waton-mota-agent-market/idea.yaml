differentiator: >-
  This is not another AI stock picker and not a generic compliance wrapper. The product is opinionated around one painful moment: deciding whether an outside trading agent deserves live capital. By owning shadow runs, mandate mapping, reviewer evidence, and post-approval drift monitoring in one rail, it becomes the neutral approval system between agent marketplaces and professional investors.
