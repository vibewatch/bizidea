topRisks:
  - name: "Category timing risk"
    description: "If third-party trading-agent marketplaces grow slower than expected, the initial buyer pool may stay niche for too long."
    mitigation: "Start with funds already paper-trading external agents and support internal agent approval flows so the product does not depend on one marketplace alone."
  - name: "Integration friction"
    description: "Funds may resist a new system if it requires deep execution-stack changes before value is visible."
    mitigation: "Begin in read-only shadow mode using agent outputs and paper-trading feeds, then add deeper OMS and live-monitoring hooks after approval workflows prove ROI."
  - name: "In-house build temptation"
    description: "Sophisticated funds may believe internal quants can stitch together paper trading, rule checks, and review logs themselves."
    mitigation: "Win with faster time to approval, cleaner reviewer evidence, and a reusable cross-agent control layer that is hard to maintain as agent volume grows."
