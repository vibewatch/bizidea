  headwinds:
  - point: 买方总体数量集中，而且这类工具同时碰交易、风控和供应商治理，企业采购天然就重。
    sourceRefs:
    - 4
    - 6
    - 7
    - 8
  - point: 模拟到实盘的错配，以及历史上的过拟合问题，会让“认证不到位却放错智能体”这件事变得很容易发生。
    sourceRefs:
    - 28
    - 33
  - point: 即便产品本身很有吸引力，网络安全、外包和留痕要求也会拖慢部署节奏。
    sourceRefs:
    - 12
    - 16
    - 21
    - 22
competitors:
- name: Waton MoTA Alpha
  stage: 上市公司平台
  wedge: AI 投资工作台 + 第三方 Agent Talents Market
  pricing: 未公开披露；可推断为市场订阅模式
  strength: 在自有基础设施上同时掌握智能体分发和可审计的多智能体工作流。
  weaknessVsUs: 它不是给配置方做中立认证的；创作者逻辑仍由开发者控制，审批也嵌在卖方平台内部。
  sourceRefs:
  - 1
- name: QuantConnect / LEAN
  stage: 成长期公司
  wedge: 研究、回测、实盘部署和机构量化基础设施
  pricing: 公开阶梯定价，设有 Trading Firm 和 Institution 套餐
  strength: 开发者生态很深，也真正在外部 alpha 市场的运营上踩过坑、积过经验。
  weaknessVsUs: Alpha Streams 1.0 的关闭恰好说明过拟合和样本外选择失灵的问题；它并不是面向配置方的审批材料产品。
  sourceRefs:
  - 28
  - 37
- name: Darwinex Zero
  stage: 成长期公司
  wedge: 按能力排序、把交易员业绩轨迹接到投资人资金分配
  pricing: 核心参与未披露订阅费；资金分配靠业绩赢得
  strength: 围绕资金配置和业绩轨迹形成了很强的激励闭环。
  weaknessVsUs: 它优化的是交易员筛选，不是对冲基金的投资授权映射、供应商尽调或客户控制栈里的人工签字。
  sourceRefs:
  - 36
- name: Eventus
  stage: 既有专业厂商
  wedge: 多资产交易监控 + 算法监控
  pricing: 企业级定制定价
  strength: 在监控实盘算法和合规事件上拥有机构级公信力。
  weaknessVsUs: 它从上线后或上线周边才开始介入，不掌握上线前的第三方智能体认证，也不生成委员会可直接审阅的审批证据。
  sourceRefs:
  - 29
- name: FlexTrade
  stage: 既有厂商
  wedge: 覆盖交易员、PM、运营、合规和 IT 的多角色 OEMS / OMS 工作流
  pricing: 企业级定制定价
  strength: 深度嵌在订单、执行工作流和例外处理里。
  weaknessVsUs: 它管的是订单流，不负责在资金配置前做“要不要相信外部智能体”的决策。
  sourceRefs:
  - 30
  - 39
regulatoryTechnicalConstraints:
- point: 这条控制轨道必须保留可重放的订单与建议日志，而且留痕粒度要足以应对主管机关审查。
  sourceRefs:
  - 17
  - 18
  - 19
- point: 基金及其券商会期待预设的交易和授信阈值、受限访问控制，而不是事后看一套仪表板。
  sourceRefs:
  - 15
  - 19
- point: 即便创业公司只做控制层，外部智能体依然会触发供应商尽调、签约和持续监控义务。
  sourceRefs:
  - 16
  - 21
  - 22
- point: 单靠模拟交易会漏掉市场冲击、信息泄露、滑点、排队位置以及部分费用，所以认证必须加上保守的压力假设。
  sourceRefs:
  - 25
  - 33
- point: 如果产品想可信地支撑实盘监督，获批后的监控既要盯运行时行为，也要盯数据或输出漂移。
  sourceRefs:
  - 29
  - 34
  - 35
validationSignals:
- point: Waton 已上线 Agent Talents Market，并要求强制人工复核和最终签字。
  sourceRefs:
  - 1
- point: 受访 APAC 买方机构里，72% 已中度使用 AI，66% 把工作流自动化列为优先项。
  sourceRefs:
  - 11
- point: 对冲基金表示，在高波动市场里使用算法 的首要原因就是降低市场冲击。
  sourceRefs:
  - 23
- point: QuantConnect 曾公开叫停 Alpha Streams 1.0，因为样本外表现太差，市场本身难以自圆其说。
  sourceRefs:
  - 28
- point: 机构客户已经在为 算法周边的盘后透明度和监管分析买单，这能支撑他们为更好的上线前控制层付费。
  sourceRefs:
  - 26
  - 29
openQuestions:
- 在 $500M-$5B 这一档的 long-short 或多管理人基金里，到底有多少家正在认真评估外部智能体，而不是只考虑内部自建？
- 主经纪商、OMS 厂商和智能体市场，会把中立审批轨道当成分销伙伴，还是会视为对自身工作流的侵入？
- 如果不直接接订单录入，最小只读数据集要到什么程度，才足够给一个智能体做认证？
- 机构型家族办公室会直接采购这层控制产品，还是继续依赖外包交易、OCIO 或对冲基金伙伴？
