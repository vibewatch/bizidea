  - case: 'Base: only one-pod pilots make it to production in the first wave'
    impact: Initial ACV stays centered on approval rails and shadow mode, delaying broader live-monitoring upsell until a second or third strategy pod is approved.
    sourceRefs:
    - 12
    - 24
    - 27
  - case: 'Bear: marketplaces or incumbents bundle their own approval features'
    impact: The startup must win on neutrality, cross-platform evidence, and stronger live drift monitoring rather than on workflow presence alone.
    sourceRefs:
    - 1
    - 29
    - 30
    - 38
  validationPlan:
  - priority: high
    question: How many target funds are already paper-trading external agents or broker algos today?
    evidenceToGather: Collect one current paper-trading artifact, one risk-review checklist, and one approval memo from each of five design-partner funds.
  - priority: high
    question: 'Who actually controls budget and sign-off: COO, Head of Risk, CTO, or desk-platform lead?'
    evidenceToGather: Run ten buyer interviews and shadow one live vendor-diligence cycle at a target hedge fund or family office.
  - priority: medium
    question: Can read-only integration capture enough data before deep OMS work?
    evidenceToGather: Validate one exported order-feed sample, one recommendation feed, and one manual override log from a pilot customer.
  - priority: low
    question: Will institutional family offices buy directly or rely on outsourced trading and OCIO-style partners?
    evidenceToGather: Compare procurement speed, data access, and governance requirements across three family offices and three hedge funds.
