openQuestions:
- How many $500M-$5B long-short or multi-manager funds are actively evaluating external agents instead of building in-house only?
- Will prime brokers, OMS vendors, and agent marketplaces treat a neutral approval rail as a distribution partner or as workflow encroachment?
- What minimum read-only dataset is sufficient to certify an agent without direct order-entry integration?
- Do institutional family offices buy this control layer directly, or will they rely on outsourced trading, OCIO, or hedge-fund partners?
