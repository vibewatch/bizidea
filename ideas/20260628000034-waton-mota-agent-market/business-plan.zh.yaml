slug: shadow-agent-approval-rail
date: "2026-06-28"
executiveSummary: >-
  Shadow Agent Approval Rail 向正在评估第三方 AI 权益智能体的美国对冲基金和机构家族办公室，
  出售上线前认证与实时监控管控平台。首款产品以只读影子模式运行一个外部智能体，
  将每条建议、订单及人工干预映射到基金的投资授权和风控规则，并为单一 PM 团队生成一份
  可直接提交投委会的审批材料包。首批目标客户是规模在 $500M-$5B AUM 的多策略对冲基金
  或机构家族办公室——PM 已发现颇具潜力的外部智能体，但 COO 或 Head of Risk 拒绝在
  获得可重复验证证据之前批准实盘部署。这一切入点极具吸引力，原因在于同一运营买家
  已掌控供应商尽调、模拟交易证据及持续监控三个环节，使公司得以从认证业务起步，
  再向实时漂移监控延伸，而非尝试替换 OMS 或成为策略交易市场。研究数据支撑一个
  窄而真实的启动市场：约 $51M SAM，首年 ACV 建模中枢约 $200k；但两项数字均取决于
  能否证明足够多的目标基金正在积极评估外部智能体。公司应以美国多空权益、只读集成和
  单团队试点为起点，仅在审批到生产转化可重复后，才扩展更深层的 OMS 接口与更广泛的
  监控覆盖。护城河来自贯穿大量智能体评估、将建议、成交、干预、授权例外、委员会结论
  及审批后漂移窗口相互关联的累积审批历史数据集。关键的否证风险在于品类时机：若
  大多数目标基金仍偏好内部智能体，或尚未测试外部供给，则该业务将保持利基属性，
  不宜超前于验证结果扩招人手。
problem:
  - "基金现在可以发现第三方 AI 交易智能体，但风控与运营团队仍缺乏一种可辩护的方式来判断外部智能体是否值得动用实盘资本。"
  - "现有的审批工作依赖人工模拟交易、OMS 备注、电子表格和截图，审查缓慢、跨智能体难以比较，在面对供应商或监管审查时说服力薄弱。"
  - "单纯的模拟交易无法捕捉滑点、市场冲击、队列排位及漂移风险，导致买方可能批错智能体，或将部署无限期搁置。"
solution:
  - "以只读影子模式采集一个美国权益团队的智能体建议、成交及人工干预，并将每项拟议操作映射到授权规则、仓位限额、已批准标的和审核意见。"
  - "生成一份含重放、归因、例外情况、保守的模拟到实盘压力假设及明确批准或拒绝决策轨迹的投委会级审批材料包。"
  - "审批通过后，保留同一轨道用于实时漂移监控、阈值告警和熔断工作流，使认证与监控在同一系统内闭环。"
whyWeWin:
  - "产品恰好定位于实盘资本上线前的审批决策节点——当前既无智能体市场平台、也无监控供应商在此节点保持中立并进行针对性优化。"
  - "从只读和资金流上游起步，公司无需深层 OMS 改造或经纪商变更即可交付价值，显著降低首单的集成与合规摩擦。"
  - "每次认证都在沉淀影子行为、授权例外、审核决策及已批准漂移窗口的专有数据集，随着智能体数量增加，内部脚本越来越难以复制。"
strategicChoices:
  beachhead: "正在为单一 PM 团队评估一个外部 AI 权益智能体的美国 $500M-$5B AUM 多策略对冲基金和机构家族办公室。"
  wedgeRationale: "这一细分市场触发信号最为明确：PM 可立即创造需求，而 COO 或 Head of Risk 仍掌控预算和上线审批；单团队范围小到足以在工作流全面重构之前证明 ROI。"
  sequencingRationale: >-
    优先从只读认证起步，因为买方对证据的需求快于对自动化的需求，且深层 OMS 写入
    或多资产支持会拉长安全、法务和实施周期。仅在首批已批准智能体进入生产后，才增加
    实时漂移监控；待操作手册在多家基金中验证可行、并拥有至少一个数据集成合作伙伴后，
    再扩充实施和销售人员。
  notYet:
    - "替换 OMS、OEMS 或经纪商执行堆栈"
    - "在美国权益验证完成前推进英国/欧盟部署和多资产支持"
    - "为基金内每个 AI 工作流建立全面的内部智能体治理"
    - "成为智能体市场或收入共享场所"
market:
  tam: "估算 TAM 为 $204M，基于全球约 850 个对冲基金和机构家族办公室买家、ACV 约 $240k。"
  sam: "估算 SAM 为 $51M，基于美国和英国约 255 个可触达的多空权益及单团队试点工作流买家、启动 ACV 约 $200k。"
  som: "第 3 年示意性 SOM 为 $4.5M，基于 18 个客户、认证加首个监控模块后混合 ARR 约 $250k。"
  segments:
    - "主要：正在评估外部 AI 权益智能体的美国 $500M-$5B AUM 多策略对冲基金"
    - "次要：运行集中型自主或混合量化团队的机构家族办公室及平台化交易台团队"
  buyingProcess: >-
    通常由 PM 或量化负责人通过识别外部智能体来创造需求，但预算和最终审批权归属于
    COO 或 Head of Risk，因为采购涉及供应商尽调、模拟交易证据和实时监控。量化运营、
    交易技术、有时还有合规部门均会影响交易结果，原因是买方在分配任何实盘资本前
    必须同时信任重放数据和管控工作流。
product:
  mvp: >-
    MVP 应采集单一外部智能体针对一个美国权益团队的建议、成交和干预，执行授权与
    风控规则检查，并生成附有例外情况摘要和人工签批的可重放审批材料包。初期应
    保持只读、支持保守的滑点压力假设，并在尝试实盘订单路由或广泛多资产覆盖之前
    导出审计就绪记录。
  sixMonth: "推出只读影子运行、规则映射、审批材料包导出及一个美国权益工作流基准漂移阈值的付费试点。"
  twelveMonth: "增加两个可复用的 OMS 或经纪商数据集成、已批准智能体的实时监控、熔断告警，以及可缩短安全审查周期的标准供应商尽调包。"
  twentyFourMonth: "从单团队认证扩展至多团队监控，按智能体类型建立基准库，并对经纪商算法或其他流动资产类别等相邻策略进行选择性覆盖。"
  keyBets:
    - "来自智能体输出、成交和干预的只读数据导出，足以让投委会信服，无需在首次部署时即取得 OMS 写入权限。"
    - "首批客户之间的美国权益工作流重叠度足够高，到第三次部署时实施耗时将大幅缩短。"
    - "认证会带来实时监控扩展，因为买方希望同一系统同时管理审批证据和漂移响应。"
    - "对于资产配置方而言，中立的跨平台认证比市场原生审批功能更具可信度。"
gtm:
  wedge: "面向外部 AI 权益智能体销售单智能体、单团队认证方案，将繁琐的人工模拟交易尽调转化为可在买方现有管控体系内完成的投委会级审批决策。"
  channels:
    - "由创始人主导面向目标对冲基金和机构家族办公室的 COO、Head of Risk 及量化运营负责人开展直销"
    - "通过正在升级例外处理与工作流管控的 OMS 或 OEMS 团队获取设计合作伙伴转介绍"
    - "与需要对第三方智能体供给进行中立信任转化的市场平台、经纪商和量化平台建立合作伙伴关系"
  funnelTargets: "目标漏斗转化率：目标账户→合格试点 20-30%，合格试点→付费认证 60%+，付费认证→12 个月内进入生产监控 50%+。"
  pricing: "首年合同定价约 $150k-$250k ACV，以研究锚定的 $200k 为中枢，采用按基金实体收取的年度平台订阅费，加上按智能体认证收费及可选实时监控模块费用。"
businessModel:
  revenueStreams:
    - "按基金实体收取的年度平台订阅费"
    - "影子运行和审批材料包的按智能体认证费用"
    - "已批准智能体的实时监控和例外响应模块费用"
  unitOfValue: "在一个基金实体内通过认证的外部智能体。"
  targetGrossMarginPct: 70
  expansionLevers:
    - "在同一基金内增加更多外部智能体、PM 团队和策略"
    - "认证完成后追加销售实时监控、漂移分析和熔断工作流"
    - "通过将审批轨道嵌入周期性入驻流程的经纪商、OMS 或市场平台渠道进行扩展"
strategyMap:
  northStarMetric: "进入生产并保持主动监控满 90 天的已批准外部智能体数量。"
  inputMetrics:
    - "从发现智能体到批准或拒绝决策的中位天数"
    - "只读集成到首次影子运行的耗时"
    - "审批材料包无需重大返工的接受率"
    - "付费认证到生产监控的转化率"
    - "已批准智能体在 30 天后仍处于漂移阈值内的比例"
  moatsToBuild:
    - "连接建议、成交、干预、授权例外、委员会决策及实时漂移结果的审批历史数据集"
    - "针对滩头阵地常见对冲基金授权和风控检查的可复用规则模板"
    - "按智能体类型划分的跨平台审批时长、例外模式及审批后漂移基准数据"
  killCriteria:
    - "首批 15 次 ICP 访谈中，少于 5 家确认将在未来 12 个月内积极评估第三方智能体。"
    - "首批 3 个付费试点未能将审批决策时间从多周人工基准压缩至 10 个工作日以内。"
    - "首批 5 个已认证智能体中，少于 2 个在审批后 6 个月内转化为付费实时监控。"
  mermaid: |
    flowchart LR
      Wedge[One-agent approval wedge] --> MVP[Read-only certification MVP]
      MVP --> Proof[Approved agents and referenceable packets]
      Proof --> Expansion[Live monitoring and multi-pod expansion]
investorMemo:
  verdict:
    call: Watch
    conviction: "管控节点洞察极具说服力，但在付费试点验证品类时机和独立付费意愿之前，投资信念仍然有限。"
    whyBelieve: "若外部智能体市场规模扩大，机构配置方在分配资本前将需要审批证据，而目前尚无中立供应商占据这一管控节点。"
    whyDoubt: "买家群体高度集中，时机存在不确定性，OMS 或市场平台供应商可能捆绑足够多的审批工作流，压缩独立厂商的 ACV 空间。"
    nextDiligence: "确认三个付费设计合作伙伴已在对外部智能体进行模拟交易，并证明至少一个认证案例已转化为付费生产监控。"
  firstCustomer:
    title: "正在评估一个外部 AI 权益智能体的 $500M-$5B AUM 对冲基金的 COO 或 Head of Risk"
    profile: "一家运营多空权益团队、采用人工模拟交易证据评估来自市场平台或经纪商渠道外部智能体的美国多策略对冲基金或机构家族办公室。"
    trigger: "PM 或量化负责人发现了一个颇具潜力的外部智能体，但风控部门拒绝在无可重复影子记录和签批轨迹的情况下批准实盘部署。"
    buyer: "COO 或 Head of Risk"
    initialContract: "6-10 周的付费认证试点，定价约 $40k-$75k，转化后签订 $150k-$250k 首年合同，覆盖一个基金实体、一个已批准智能体及可选生产监控。"
  mustBeTrue:
    - "首批 15 个目标基金中，至少 5 个目前正在积极评估第三方智能体，而非仅使用内部模型。"
    - "MVP 可在首次部署中通过只读导出生成审批材料包，无需更改订单路由系统。"
    - "当工作流可替代数周人工尽调并支持单团队上线时，目标买家愿意接受至少 $150k 的首年 ACV。"
    - "至少 50% 的付费认证转化为实时监控订阅，因为同一买家同时负责审批后的监控。"
    - "中立跨平台认证在至少 3 次早期竞争评估中胜过市场原生或内部工作流方案。"
  diligenceQuestions:
    - "目标 AUM 区间内，已在评估外部智能体（而非仅内部模型）的美国对冲基金有多少？"
    - "投委会在没有深层 OMS 集成的情况下批准外部智能体所需的最低数据集是什么？"
    - "实际控制预算和供应商审批权的是谁：COO、Head of Risk、CTO 还是平台化交易台负责人？"
    - "市场平台、经纪商或 OMS 供应商多大程度上倾向于合作而非捆绑自有审批工作流？"
    - "哪些证据能让买方相信，模拟到实盘的滑点和漂移已得到足够保守的处理，可以信任认证结果？"
operatingAssumptions:
  - assumption: "滩头阵地中有相当比例的基金已在进行模拟交易或评估外部智能体。"
    basis: research.yaml
    validationTest: "访谈 15 个目标基金，并从至少 5 个活跃评估案例中收集现有审批材料。"
    decisionImpact: "若不成立，则将产品范围收窄至内部智能体审批，或暂停独立融资，因为时机论点尚早。"
  - assumption: "只读导出加成交和干预数据已足以支撑初始审批决策。"
    basis: research.yaml
    validationTest: "运行 3 个技术试点，并让至少 2 个委员会在不要求更深层写入权限的情况下接受生成的材料包。"
    decisionImpact: "若不成立，路线图必须更早优先推进深层 OMS 集成，资金消耗将相应增加。"
  - assumption: "买家愿意在 COO 或风控预算下为 $150k-$250k 的首年部署付费。"
    basis: idea.yaml
    validationTest: "以不低于 $100k 的价格签下 2 个付费试点，并从 10 次买家通话中收集结构化定价反馈。"
    decisionImpact: "若不成立，则需将定价或产品包装转向合作伙伴渠道或更窄的监控模块。"
  - assumption: "中立认证在未来 24 个月内在战略上仍有别于市场原生或 OMS 原生审批功能。"
    basis: 运营判断
    validationTest: "追踪 10 个竞争交易和季度产品发布；仅当大多数潜在客户仍将中立性和跨平台证据描述为缺失时，该假设才成立。"
    decisionImpact: "若不成立，则转向白标合作伙伴软件或更深层的监控细分市场。"
  - assumption: "实时监控是认证后自然的第二次销售。"
    basis: idea.yaml
    validationTest: "从至少 3 个试点客户处获取提前扩展意向，并将 2 个已批准智能体转化为监控合同。"
    decisionImpact: "若不成立，则业务将偏向服务型模式，风投规模化论点将相应弱化。"
experimentRoadmap:
  - horizon: "0-90 天"
    experiment: "访谈 15 位目标基金的 COO、Head of Risk 和量化运营负责人，并从活跃的外部智能体评估案例中收集真实审批材料。"
    hypothesis: "品类时机足够成熟，使得相当比例的滩头阵地已拥有针对第三方智能体的已获资金或待批审批工作流。"
    successMetric: "至少 5 家基金提供活跃评估证据，至少 3 家同意进入付费试点范围讨论。"
    owner: "创始人/CEO"
  - horizon: "0-90 天"
    experiment: "构建一个只读原型，采集一个美国权益团队的一条智能体建议流、一条成交流和一条人工干预日志。"
    hypothesis: "MVP 可在不改变订单路由系统的情况下，重建足够的重放和管控证据。"
    successMetric: "原型仅凭导出数据为 2 个样本工作流生成完整的审批材料包。"
    owner: "联合创始工程师"
  - horizon: "90-180 天"
    experiment: "运行前 2 个付费认证试点，并交付含明确批准或拒绝结论的投委会级审批材料包。"
    hypothesis: "在要求完整实时监控自动化之前，买家愿意为标准化认证工作流付费。"
    successMetric: "至少 2 个试点为付费性质，且每个在数据交接后 10 个工作日内达成决策。"
    owner: "产品与风控流程负责人"
  - horizon: "90-180 天"
    experiment: "打包通过一次真实企业安全审查所需的供应商尽调、审计日志和人工审批管控文档。"
    hypothesis: "安全和第三方风险审查可在早期实现标准化，使销售周期保持可控。"
    successMetric: "一个试点在无需超出产品路线图范围的定制化管控开发的情况下通过客户安全审查。"
    owner: "创始人/CEO"
  - horizon: "180-365 天"
    experiment: "为首个已批准智能体推出实时监控测试版，含漂移阈值、告警和有文档记录的熔断工作流。"
    hypothesis: "认证客户希望同一系统在智能体进入生产后负责审批后监控。"
    successMetric: "至少 1 个已批准智能体在监控模块上线运行，且 90 天后仍为可引用客户。"
    owner: "实施负责人"
  - horizon: "180-365 天"
    experiment: "与一个 OMS、经纪商或智能体市场平台渠道开展合作试点，使其将客户转介绍至认证流程。"
    hypothesis: "渠道合作伙伴将把中立审批视为信任转化层，而非工作流侵占。"
    successMetric: "一个合作伙伴来源的交易以低于创始人主导的外向拓展 CAC 进入付费试点阶段。"
    owner: "创始人/CEO"
operations:
  - "为每个试点和生产智能体维护一份关于建议、成交、干预、审核操作和审批决策的不可篡改事件日志。"
  - "执行标准客户实施序列：数据映射、规则模板化、影子运行、委员会材料包及审批后漂移阈值配置。"
  - "在每次企业试点前准备涵盖安全性、可审计性、基于角色的访问控制和人工审批管控的可复用供应商尽调包。"
  - "与 OMS、OEMS、经纪商和市场平台建立合作手册，优先定义只读数据访问权限，仅在 ROI 得到验证后才推进更深层集成。"
  - "拒绝需要公司成为执行场所、经纪商或受托决策方的工作流。"
team:
  - role: "创始人/CEO"
    startTiming: "第 0 个月"
    rationale: "主导创始人驱动的销售、设计合作伙伴发现和早期合作伙伴开发，因为买方真相和品类时机仍是主要未知变量。"
  - role: "联合创始工程师"
    startTiming: "第 0 个月"
    rationale: "构建付费试点所需的重放引擎、规则模型、审计日志和首个影子运行工作流。"
  - role: "产品与风控流程负责人"
    startTiming: "第 0-2 个月"
    rationale: "将对冲基金授权检查、审核状态和审批材料包转化为可重复的产品，而非定制咨询工作流。"
  - role: "集成工程师"
    startTiming: "第 3-5 个月"
    rationale: "将首批只读数据流和 OMS 导出转化为可复用连接器，以缩短部署时间并保护毛利率。"
  - role: "实施负责人"
    startTiming: "第 6-9 个月"
    rationale: "在前两个试点揭示可重复操作手册后，负责入驻、材料包交付和审批后监控配置。"
  - role: "客户主管或合作伙伴负责人"
    startTiming: "第 9-12 个月"
    rationale: "仅在公司拥有可引用试点和一个可运作合作伙伴渠道后，才增加专职销售人员。"
milestones:
  - horizon: "0-12 个月"
    items:
      - "完成 15 次 ICP 访谈，并签约至少 3 个付费设计合作伙伴试点。"
      - "推出只读影子运行、规则映射和一个美国权益工作流投委会级审批材料包的 MVP。"
      - "将至少 1 个已认证智能体转化为付费生产监控，并签约 1 个 OMS、经纪商或市场平台集成合作伙伴。"
      - "在第三次部署时将审批材料包交付周期压缩至 10 个工作日或以内。"
  - horizon: "12-24 个月"
    items:
      - "在滩头阵地中拓展至 8-12 家付费基金，使用可复用只读集成和标准化规则模板。"
      - "将实时监控、漂移告警和熔断工作流作为认证后的默认扩展模块上线。"
      - "仅在美国权益部署启动时间降至 30 天以内后，才增加对第二类策略或相邻流动资产类别的选择性覆盖。"
  - horizon: "24-36 个月"
    items:
      - "在顶级客户内从单团队审批扩展至多团队监控。"
      - "将公司确立为经纪商、市场平台和 OMS 渠道的中立审批层，而非仅依赖直销。"
      - "证明审批历史数据能充分提升部署速度、例外检测率和客户留存，以支撑软件级利润率。"
risks:
  - risk: "外部智能体采用速度低于预期，导致处于积极评估模式的基金数量过少。"
    likelihood: High
    impact: High
    mitigation: "仅向已在对外部智能体进行模拟交易的基金销售，在开展定制化工作前要求提供活跃评估证据，若外部需求持续低迷，则将同一管控轨道转向内部智能体审批。"
  - risk: "只读数据无法满足投委会要求，被迫提前推进深层 OMS 集成。"
    likelihood: Medium
    impact: High
    mitigation: "通过试点明确最小可行证据集，仅在只读材料包无法通过审查时才构建最常复用的两个深层集成。"
  - risk: "老练的基金选择内部脚本而非引入新供应商。"
    likelihood: Medium
    impact: High
    mitigation: "以更快的委员会审批速度、可复用的审计轨迹和内部工具鲜少能标准化的跨智能体漂移窗口进行差异化竞争。"
  - risk: "市场平台、经纪商或 OMS 供应商捆绑足够多的审批工作流，压缩独立定价空间。"
    likelihood: Medium
    impact: High
    mitigation: "将公司定位为跨渠道的中立认证方，在有利时寻求白标或联合销售机会，并深化监控与报告功能，使其超越简单的嵌入式审批。"
  - risk: "模拟到实盘的差异对已批准智能体产生虚假信心。"
    likelihood: High
    impact: High
    mitigation: "采用保守的滑点和队列排位假设，要求明确的人工签批阈值，并将认证定义为有边界的审批窗口，而非业绩保证。"
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2-4M"
  runwayMonths: 18
  useOfFundsSummary: "筹集 18 个月的运营资金，用于构建只读认证 MVP、签约 3 个付费设计合作伙伴、打包供应商尽调和审计管控体系、招募集成和实施人员，并在美国权益滩头阵地内验证认证到监控的扩展路径。"
