    sourceRefs:
    - 2
    - 89
    - 94
competitors:
- name: Capsa AI
  stage: 成长期
  wedge: AI 私募资本操作系统，覆盖项目 项目发掘、IC 材料、企业搜索、法务审查和投后跟踪。
  pricing: 企业定制定价，未公开费率。
  strength: 目前最接近这个品类，审计能力、私募资本集成和真实案例都很强，也证明搜索与 IC 工作流确实能省时间。
  weaknessVsUs: 但平台叙事太宽，反而可能稀释对“季度重估资料包 + 投后决策账本”这一窄切口的专注。
  sourceRefs:
  - 3
  - 1
  - 2
  - 7
- name: Intapp DealCloud
  stage: 现有厂商
  wedge: 私募资本及相邻专业服务场景里的 CRM 与 项目情报 系统底座。
  pricing: 企业定价，通常和配置、管理开销一起打包，而不是公开自助价格。
  strength: 装机基础深、自动活动抓取能力强，有 AI 附加模块，并已获得 1,700 多家机构信任。
  weaknessVsUs: 它擅长流程配置和关系记录，不擅长基于非结构化投后证据、带来源引用的“投资假设 vs. 结果”复盘资料包。
  sourceRefs:
  - 105
  - 57
  - 41
- name: Meridian AI
  stage: 成长期
  wedge: 面向私募股权的 CRM，叠加 AI、主题式 项目发掘、市场地图和 CRM 原生工作流自动化。
  pricing: 通过销售驱动部署的定制定价。
  strength: 产品从一开始就围绕 PE 场景设计，工程能力扎实，也明确把 CRM + AI 作为私募市场产品来做。
  weaknessVsUs: 但它本质上还是在竞争“谁来做 CRM / 系统底座”，迁移难度天然高于直接插在现有栈上的叠加层。
  sourceRefs:
  - 20
  - 23
  - 28
  - 25
- name: Affinity
  stage: 成长期
  wedge: 面向私募资本的关系智能 CRM，主打零录入活动抓取和基于 MCP 的 AI 访问。
  pricing: 定制定价；API/MCP 需要 Scale、Advanced 或 Enterprise 档。
  strength: 在私募资本机构里覆盖广，活动自动化强，上线速度也比更重的 CRM 现有厂商更快。
  weaknessVsUs: 它的重点仍是关系图谱和会前准备，不是投后假设漂移、董事会资料对账或带引用重估。
  sourceRefs:
  - 50
  - 53
  - 60
  - 57
- name: Hebbia
  stage: 成长期
  wedge: 面向金融、法务和企业文档密集型流程的通用 AI 推理工作台。
  pricing: 只做企业定制定价。
  strength: 跨文档推理口碑强，也已经被头部金融机构广泛采用。
  weaknessVsUs: 但它是通用产品，没有原生的 PE CRM 叠加层、投后复盘工作流封装，也没有内建的投资假设账本持久层。
  sourceRefs:
  - 80
regulatoryTechnicalConstraints:
- point: 注册投顾类客户需要围绕客户信息、事件响应和未授权访问拿出书面防护措施。
  sourceRefs:
  - 94
  - 95
- point: 金融服务里的 AI 使用，越来越会被放到网络韧性、可解释性和厂商透明度框架下评估。
  sourceRefs:
  - 89
  - 90
- point: 叠加层产品必须尊重 Microsoft 与文件系统里现有的权限和数据边界，不能把一切都摊平成一个无限制语料库。
  sourceRefs:
  - 98
  - 99
  - 100
  - 102
- point: 会议录音和转录接入，会在部署时额外带来同意、存储和信息治理步骤。
  sourceRefs:
  - 104
  - 2
validationSignals:
- point: Capsa 披露，一家 $23bn 基金在接通 Salesforce、SharePoint、FactSet 和 Outlook 后，评估 项目 的数量提升了 38%，LOI 提交时间缩短了 3 天。
  sourceRefs:
  - 7
- point: Visible 把投后监控描述为从碎片化汇报和电子表格转向实时洞察，这说明工作流痛点依然存在。
  sourceRefs:
  - 19
- point: Dynamo 的 2025 AI 调查基于近 100 家全球 GP 和 LP 回答，说明私募投资买方已经在认真关注 AI 运营模型。
  sourceRefs:
  - 72
- point: Affinity 的 2025 私募股权基准报告以 200+ 家机构做对标，说明流程已经有足够标准化程度，能让工作流型产品引起共鸣。
  sourceRefs:
  - 63
openQuestions:
- 北美中端偏下 PE 机构里，到底有多少家已经形成了正式的季度重估或持有/出售资料包，能在第一天就被替换？
- 买方更偏好按在管被投公司定价、按交易团队席位定价，还是按完成一轮复盘工作流定价？
- 第一条最该接的集成到底是哪条：SharePoint + CRM，还是 CRM + 会议转录？
- 相比通用 AI 备忘录助手，“引用优先”的输出究竟能多带来多少合伙人信任？
