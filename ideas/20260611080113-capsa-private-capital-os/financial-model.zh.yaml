scenarios:
  downside:
    description: 安全审查和合伙人信任问题把年费转化拖慢约两个季度，也让部署更偏服务化。
    y3RevenueK: 1650.0
    y3EbitdaK: -520.0
    cashLowPointK: 180.0
    keyAssumptionChanges:
    - Q4Y3 的 customersEop 只能到 18，而不是 26。
    - 由于 onboarding 仍然劳动密集，毛利率停在 65%。
    - 部分试点无法转成稳定年费工作流，月流失率升到 2.8%。
  base:
    description: 试点转化稳步改善，但公司依旧谨慎招聘，而且核心 P&L 里不计入付费试点或服务收入。
    y3RevenueK: 2270.0
    y3EbitdaK: -199.0
    cashLowPointK: 678.6
    keyAssumptionChanges:
    - Q4Y3 的 customersEop 达到 26，综合 ACV 为 $120K。
    - 毛利率维持在商业计划目标的 70%。
    - 到 Q4Y3 团队仍精简在 10 FTE。
  upside:
    description: 顾问与 CRM 生态转介绍加速客户新增，高级模块更早挂载，onboarding 也更可复制。
    y3RevenueK: 2820.0
    y3EbitdaK: 140.0
    cashLowPointK: 760.0
    keyAssumptionChanges:
    - Q4Y3 的 customersEop 达到 30，而不是 26。
    - 随着连接器和模板标准化，毛利率提升到 72%。
    - 在不改变买方细分的前提下，高级模块挂载让综合 ACV 温和抬升。
