modelDiagram:
  title: 单位经济模型流程
  mermaid: "flowchart LR\n  Leads[Target PE firms] --> PaidPilots[Paid review pilots]\n  PaidPilots --> Customers[Annual production customers]\n  CACSpend[CAC spend] --> PaidPilots\n  Customers --> Revenue[Subscription revenue]\n  Revenue --> GrossProfit[Gross profit]\n  GrossProfit --> EBITDA[EBITDA]\n  EBITDA --> Cash[Ending cash]\n  Churn[Churn and trust] --> Customers\n"
modelSanity:
- checkName: 收入引擎
  finding: 基础情景的驱动是：第 1 年有 2 家正式客户，到 Q4Y3 增长到 26 家；每家机构平均覆盖约 12 家在管被投公司，对应约 $120K ACV。
- checkName: 必须成立的前提
  finding: 安全边界内的试点必须能在一个复盘周期内转正，这样创始人主导销售新增年费客户的速度才会快过实施工作膨胀。
- checkName: 模型会失效的情况
  finding: 如果部署始终偏服务化、毛利率接近 65%，同时转化又走慢，公司会在证明 seed 里程碑前就需要额外融资。
- checkName: 下一轮证明点
  finding: 一旦公司拿到大约 8-12 家年费客户，并证明账本能从资料包准备扩到回写 CRM 和跨季度跟踪，seed-ready 的故事才算成形。
sanityChecks:
  ruleOf40: 第 3 年增长 173% + EBITDA 利润率 -9% = 164%。
  burnMultiple: 第 2 年 burn multiple 为 1.0x，对应约 $0.75M burn / $0.73M 净新增收入；第 3 年 burn multiple 为 0.1x，因为增长速度已经明显跑赢剩余 burn。
  revenuePerFte: 按 Q4Y3 的 10 FTE 计算，第 3 年人均收入约 $227K（可对标规模化 B2B SaaS 常见的约 $200K-$400K）。
  flags:
  - 模型假设每家正式客户平均覆盖约 12 家在管被投公司，并据研究给出每家公司每年约 $10K 的价值；但直接定价验证目前仍主要停留在付费试点假设。
  - 毛利率被固定在 70% 目标位，但在连接器和模板真正标准化之前，早期部署很可能更像解决方案工程。
  - 在 $2.4M 融资下，现金仍能保持为正；但如果安全审查或试点转化连续慢两个季度，缓冲会很快被压缩。
