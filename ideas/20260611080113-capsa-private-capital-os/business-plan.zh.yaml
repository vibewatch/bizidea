slug: private-equity-decision-ledger
date: '2026-06-11'
executiveSummary: Private Equity Decision Ledger 是一层面向北美中端偏下私募股权机构的 AI 工作流产品：它能在季度投后复盘、持有/出售讨论和经营计划重设前，把最初的投资逻辑重新拼出来。第一位用户是投后运营负责人或幕僚长，所在机构通常管理 8-25 家在管被投公司，底层栈分散在 DealCloud 或 Salesforce、SharePoint、邮件、董事会材料和分析师手工做的 PowerPoint 简报上。最急的痛点不是泛知识搜索，而是每次被投公司偏离计划、接近退出或进入再融资时，团队都得手工重建“当初怎么想、管理层承诺了什么、哪些证据变了”这一整套上下文。产品的切口是一份带引用的重估资料包，输入来自 IC 备忘录、CRM 备注、董事会材料和会议转录；它以叠加层形式售卖，而不是替换 CRM。这个滩头市场之所以成立，是因为买入触发点清晰、工作流 负责人 集中，而且分析师工时节省和合伙人决策提速都能量化。研究显示，相邻私募市场软件已经教育了预算，但客户愿意按什么价买、谁会真正拍板、以及是否愿意为独立决策账本单独立项，仍需要靠付费试点验证。这个 投资回报逻辑 只有在公司先拿下季度复盘工作流，再把同一张“假设到结果”图谱扩到 IC 准备、交割后价值创造跟踪，以及贷款方或 LP 汇报时才成立。最关键的反证风险有三项：买方把它当作现有 CRM 的一个小功能、安全尽调把试点拖出可操作窗口，或合伙人即使看到带引用输出也始终不给正式生产环境信任。
problem:
- 私募股权机构仍在 PDF、邮件、电子表格、CRM 记录和合伙人记忆之间手工重建季度复盘和重估所需的上下文。
- 现有 CRM、投后监控和文档工具，没法把最初投资假设和后续证据、决策、结果放进同一条带引用的工作流里。
solution:
- 吃进 IC 备忘录、CRM 备注、董事会材料、KPI 包和会议转录，为每家被投公司搭出一套“假设到结果”的账本。
- 在每轮复盘前，自动生成一份合伙人可直接使用的重估简报：最初假设是什么、哪些证据变了、还有哪些问题没解，以及每条结论对应的源文件引用。
whyWeWin:
- 产品围绕一条高风险、强时限的工作流来打包，比卖一层很宽的 AI 知识层或推动 CRM 迁移更容易成交。
- 护城河会随着机构私有判断图谱和反馈闭环一起变厚：时间越久，产品越知道哪些假设更新、风险提示和建议会被合伙人接受或否决。
strategicChoices:
  beachhead: 北美中端偏下 PE 机构的季度重估与投后复盘准备工作；这类机构通常管理 8-25 家在管被投公司，运营栈以 Microsoft + CRM 为主。
  wedgeRationale: 这条工作流会把痛点压缩成一个反复出现的事件，经济买方也清晰——通常是 COO 或投后运营负责人。而且它可以先做成“可读可回写”的叠加层，不要求客户替换 DealCloud、Salesforce、SharePoint 或 Box。
  sequencingRationale: 先从 CRM、SharePoint 或 Box、IC 备忘录、董事会材料和转录输入生成带引用的资料包，因为这些来源最容易先跑出价值，也最不容易引发组织改造；等产品证明了信任、安全和试点转化，再加回写自动化、更广的汇报场景和合作伙伴生态。
  notYet:
  - 项目发掘和宽泛的关系智能工作流
  - 完整替换 CRM 或一上来就做新的系统底座
  - 在复盘资料包切口可复制之前，不先做 LP 汇报和贷款方汇报
  - 在安全尽调和数据治理控制达到生产级之前，不做跨境扩张
market:
  tam: $146.3M 估算 TAM，基于全球 32,500 家 PE 支持公司、其中 45% 位于北美，以及每家在管被投公司每年约 $10k 的价值。
  sam: $51.2M 估算 SAM，对应北美中端偏下、管理 8-25 家在管被投公司的 PE 机构和精简平台团队。
  som: $9.6M 估算第 3 年 SOM，假设拿下 80 家机构、每家约 12 家在管被投公司、每家公司每年约 $10k 价值。
  segments:
  - 北美中端偏下 PE 机构里的投后运营负责人、幕僚长和运营合伙人
  - 负责准备持有/出售、再融资和季度复盘材料的交易团队副总裁与投后复盘 负责人
  buyingProcess: 最可能的 内部推动人 是掌管复盘质量和分析师效率的投后运营负责人或 COO，但最终拍板还需要管理合伙人支持，以及安全与法务审核，因为产品会接触机密 项目 文件、投后数据和会议转录。第一笔可信交易，应该是一轮绑定真实季度复盘的付费试点；一旦客户看到资料包准备更快、输出带引用且安全控制可接受，再转成年费部署。
product:
  mvp: MVP 是一套只读的单轮复盘决策账本：吃进 IC 备忘录、CRM 导出、董事会材料、KPI 包和会议转录，为每家选中的被投公司生成一份带引用的“假设 vs. 现实”资料包和问题跟踪表。它必须保留源权限、展示置信度与引用，并要求任何给合伙人的建议都先经过人工审批。
  sixMonth: 6 个月目标是把复盘资料包工作流做成生产可用版本：接好 SharePoint 或 Box 与 CRM 连接器，搭出被投公司工作区、可复用模板和审计日志，并把 3-5 个付费试点转成年费部署。
  twelveMonth: 12 个月内加上回写 CRM 备注、跨季度假设漂移跟踪、董事会资料对比，以及围绕复盘准备时长、未解决问题和合伙人采用率的基准报告。
  twentyFourMonth: 24 个月后，再把同一张“假设到结果”图谱扩到 IC 复盘、交割后价值创造跟踪，以及贷款方或 LP 更新工作流，同时继续以现有 CRM 和文档系统之上的叠加层存在。
  keyBets:
  - 只要输出逐条带引用，合伙人信任就有机会从“能看草稿”提升到“愿意周期性生产使用”。
  - 先靠 CRM + 文档库 + 转录输入就足以跑出 ROI，不必一开始就接完整邮件流。
  - 从季度复盘切入，比从 项目发掘、CRM 效率或宽泛企业搜索起步，更容易拿到清晰 负责人 和更快验证。
gtm:
  wedge: 先卖一轮付费的季度复盘提速试点：把 3-10 家被投公司的上一轮投资假设重新拼出来；等客户在真实合伙人会议前信任这份资料包，再转成年费决策账本订阅。
  channels:
  - 创始人直接外呼北美中端偏下 PE 机构的 COO、管理合伙人和投后运营负责人
  - 通过已经服务目标账户的运营合伙人、私募资本顾问和 CRM 实施商做暖介绍
  - 以单一真实季度复盘为锚点，用客户专属资料包模板卖共创客户
  funnelTargets: 线索→合格试点 15-25%；合格试点→付费试点 40-50%；付费试点→年费正式部署 50%+；正式部署→12 个月内扩到第二条工作流 30%+。
  pricing: 按在管被投公司数量收年费订阅，首条复盘工作流收最低平台费；转录接入和董事会资料包自动化收高级模块费。这样定价更贴合买方 ROI，因为痛点随投后复杂度上升，而不是随全员席位数线性增长。
businessModel:
  revenueStreams:
  - 按在管被投公司数量收取的平台年费订阅
  - 转录接入、董事会资料包自动化和高级汇报模块收费
  - 一次性的实施与工作流模板配置费
  unitOfValue: 进入持续重估覆盖范围的在管被投公司
  targetGrossMarginPct: 70
  expansionLevers:
  - 首条复盘工作流验证 ROI 后，在同一家机构里覆盖更多被投公司和业务单元
  - 从季度复盘扩到 IC 准备、持有/出售流程和价值创造跟踪
  - 内部决策账本站稳后，再加合作伙伴生态和市场数据增强工作流
strategyMap:
  northStarMetric: 已覆盖被投公司中，在合伙人复盘前收到带引用重估资料包且被接受用于真实决策的比例
  inputMetrics:
  - 从客户源系统生成第一份带引用复盘资料包所需时间
  - 每轮季度复盘为分析师节省的工时
  - 资料包中被接受来源引用支撑的结论占比
  - 付费试点转年费正式部署的转化率
  - 首轮上线后每位客户新增覆盖的被投公司数量
  moatsToBuild:
  - 连接承做假设、管理层承诺、证据变化和最终结果的私有“假设到结果”图谱
  - 针对季度复盘、持有/出售讨论和经营计划重设的专用模板与审批模式
  - 跨季度沉淀的合伙人修改、建议采纳和假设漂移反馈数据集
  killCriteria:
  - 9 个月内拿不到 3 家以上付费共创客户
  - 前 6 个付费试点的转年费率低于 30%
  - 多数试点里，首份资料包部署时间超过 6 周
  - 经历两轮迭代后，仍有超过 20% 的资料包内容被合伙人认为引用质量或事实锚定不合格
  mermaid: "flowchart LR\n  Wedge[Quarterly review wedge] --> MVP[Cited decision-ledger MVP]\n  MVP --> Proof[Faster trusted re-underwriting packets]\n  Proof --> Expansion[IC prep and value-creation expansion]\n"
investorMemo:
  verdict:
    call: 观察
    conviction: 工作流切口可信、买方痛点真实，但在公司证明自己能拿到独立预算，并在强势相邻现有厂商面前建立信任之前，判断仍应克制。
    whyBelieve: 市场已经在为 CRM、投后监控和 AI 工作流工具买单，而带引用的“投资假设 vs. 结果”季度重估资料包，仍没有现有厂商真正拿下。
    whyDoubt: 初始 SAM 不算大；如果创业公司拿不出明显更好的工作流契合度、信任和部署速度，相邻厂商很容易把这个场景吞进去。
    nextDiligence: 接下来要在 5-10 家目标机构里验证三件事：付费试点价格、部署周期，以及带引用资料包是否足以改变真实投后复盘决策，从而拿到年费预算。
  firstCustomer:
    title: 中端偏下 PE 机构的投后运营负责人
    profile: 一家 AUM 在 $1B-$10B 的北美 PE 机构，管理 10-20 家在管被投公司，平台团队精简，使用 DealCloud 或 Salesforce，但季度复盘准备仍靠分析师手工做 简报、文档也很分散。
    trigger: 季度复盘、退出流程、再融资，或合伙人交接，会逼着机构在短时间内把多项资产的投资上下文重新拼出来。
    buyer: COO 或管理合伙人
    initialContract: 首笔合同应是 $25k-$60k 的付费试点，覆盖一轮季度复盘和 3-10 家被投公司；一旦更多公司和模块上线，再转成约 $60k-$150k 的年费部署。
  mustBeTrue:
  - 买方得明确承认：季度复盘准备足够痛，值得在任何 CRM 替换项目之前，先为一个独立叠加层买单。
  - 基于 CRM、文档库和转录输入的带引用资料包，首个客户必须能在 4-6 周内交付。
  - 即便所有输出都先经过人工审核，合伙人也得愿意在真实的持有/出售或经营计划决策里使用它。
  - 按在管被投公司定价，必须能撑起明显高于纯服务型“分析师增强”的年费合同。
  - 同一套决策账本必须足够顺滑地扩到相邻工作流，否则初始滩头市场太小，撑不起 风险投资级回报。
  diligenceQuestions:
  - 最近哪些投后复盘或退出事件，真正暴露了机构记忆缺失或碎片化的代价？
  - 对接转录、SharePoint 和 CRM 记录时，哪些具体的安全与数据处理异议会卡住试点？
  - 第一笔预算在实践中到底归 COO、投后运营，还是管理合伙人？
  - 相比分析师手工做 简报，资料包质量到底要高出多少，合伙人才会改行为？
  - 如果 DealCloud、Affinity 或 Capsa 做出相似的资料包流程，这家创业公司还剩下什么专有资产能赢？
operatingAssumptions:
- assumption: 第一批可复制的买方应该是 COO 或投后运营负责人，交易团队 VP 是用户，但不是主要预算 负责人。
  basis: idea.yaml
  validationTest: 至少跑通 5 个发现流程和 2 个付费试点，并且由同一类职能发起部署、主导预算路径。
  decisionImpact: 如果这条假设不成立，GTM 动作、证明点和定价权都会变化，销售周期大概率也会拉长。
- assumption: 只靠 SharePoint 或 Box + CRM + 复盘资料，就足以在不接完整邮件流前先证明价值。
  basis: research.yaml
  validationTest: 在前 3 个试点里，确认这些来源能覆盖合伙人期望在复盘资料包里看到的至少 70% 结论。
  decisionImpact: 如果不成立，MVP 范围和连接器复杂度都会明显膨胀，实施周期可能长到 pre-seed 公司吃不消。
- assumption: 就算默认不开放自动建议，仅靠“引用优先”的资料包生成，也能拿到生产级信任。
  basis: 团队判断
  validationTest: 让合伙人和 VP 用户盲测资料包，要求至少 80% 的章节被认为足够可信，可以带进真实会议。
  decisionImpact: 如果不成立，公司就得从“持续性决策工作流”退回到研究支持或服务型产品定位。
- assumption: 对这条工作流来说，按在管被投公司定价会比按席位定价更贴合买方预算。
  basis: idea.yaml
  validationTest: 在至少 3 份付费试点报价里，同时测试按被投公司与按席位定价，并比较接受率与 ACV。
  decisionImpact: 如果不成立，TAM 和扩张逻辑都会收缩，公司可能得接受 ACV 更低的席位模型。
- assumption: 即便权限碎片化、安全审核繁琐，叠加层部署也能控制在 4-6 周内完成。
  basis: research.yaml
  validationTest: 记录前 3 个试点从安全 启动 到首份资料包出炉的时间，至少 2 个要在 6 周内完成。
  decisionImpact: 如果不成立，试点转化会下降、服务负担会上升，公司在证明可复制之前就得筹更多钱。
experimentRoadmap:
- horizon: 0–90 天
  experiment: 访谈 20 位北美中端偏下 PE 机构的 COO、投后运营负责人和运营合伙人，专门聊季度复盘准备。
  hypothesis: 和更宽泛的 项目发掘 或 CRM 效率场景相比，季度复盘与持有/出售准备才是最紧迫的入口工作流。
  successMetric: 至少 10 位受访者能讲出最近一次因为重建上下文而耗掉分析师时间、或拖慢合伙人决策的复盘；其中 5 位愿意继续做工作流 流程梳理。
  owner: 创始人/CEO
- horizon: 0–90 天
  experiment: 用导出的 备忘录、简报 和 CRM 备注，手工交付 2 份但逐条带引用的历史投后复盘样例资料包。
  hypothesis: 只要输出足够具体、能进真实复盘，买方会在全自动化之前就愿意为资料包重建付钱。
  successMetric: 2 家共创客户在看完样例资料包后接受付费试点范围。
  owner: 创始人/CEO
- horizon: 0–90 天
  experiment: 先只用 CRM + 文档库输入做资料包质量基准，再对比加入转录后的差别。
  hypothesis: CRM、文档和董事会资料本身就足以让第一份资料包跑出价值，转录可以作为 加价模块，而不是上线前置条件。
  successMetric: 在 3 个测试样本里，至少有 2 个能在不接转录的情况下覆盖 70% 以上的必要结论。
  owner: 创始工程负责人
- horizon: 90–180 天
  experiment: 围绕各自的一轮真实季度复盘，启动 3 个付费试点。
  hypothesis: 带人工审批和来源引用的“单轮复盘试点”，会比大而全的 AI 知识部署更快转成年费正式使用。
  successMetric: 启动 3 个付费试点，其中至少 2 个在 6 周内完成，且至少 1 个转成年费正式部署。
  owner: 创始人/CEO
- horizon: 90–180 天
  experiment: 测试两套定价结构：按在管被投公司定价 vs. 按席位定价。
  hypothesis: 按被投公司定价更贴合买方 ROI，也更容易把 ACV 拉高，而不会让买方困惑。
  successMetric: 在 3 家试点客户里，至少有 2 家在等价或更高年化价值下选择按被投公司定价。
  owner: 创始人/CEO
- horizon: 180–365 天
  experiment: 为已转正客户加入回写 CRM 和跨季度假设漂移跟踪。
  hypothesis: 只有把工作流真正插回现有系统，产品才会从“好用的资料包生成器”变成“可行动的系统”。
  successMetric: 转正客户里有 50%+ 在月度复盘准备中使用回写或漂移跟踪功能。
  owner: 创始工程负责人
- horizon: 180–365 天
  experiment: 与私募资本 CRM 顾问或运营合伙人网络签下 3 个转介绍或实施合作关系。
  hypothesis: 可信中间方能缩短早期企业销售里的安全、工作流和部署摩擦。
  successMetric: 拿下 3 份合作协议，并通过伙伴渠道拿到 2 个合格试点介绍。
  owner: 创始人/CEO
operations:
- 最小权限连接器架构，在 CRM、SharePoint、Box 和转录系统之间保留现有源权限
- 任何高风险合伙人使用前，每个资料包章节都要经过人工审批并留下审计日志
- 面向季度复盘、持有/出售会议和经营计划重设的客户专属资料包模板
- 覆盖数据处理、保留、日志和事件响应的安全审查 操作手册，专门适配投顾工作流
- 每周推进试点运营节奏：资料包 QA、来源覆盖复盘和 ROI 读数回顾
team:
- role: 创始工程负责人
  startTiming: 第 0 个月
  rationale: 在商业规模起来前，先把数据摄入、权限、引用完整性和第一条决策账本工作流做扎实。
- role: 创始人/CEO
  startTiming: 第 0 个月
  rationale: 这个问题既战略、又涉及安全，还需要市场教育，所以销售必须由创始人亲自打。
- role: 应用 AI 工程师
  startTiming: 第 3 个月
  rationale: 资料包质量、投资假设提取和来源锚定，是最核心的产品风险，必须尽早有专人迭代。
- role: 解决方案工程师
  startTiming: 第 6 个月
  rationale: 早期客户若想在一轮复盘周期内上线，必须有人负责工作流 流程梳理、连接器配置和资料包模板设置。
- role: 安全与平台工程师
  startTiming: 第 9 个月
  rationale: 一旦试点开始转正、接的数据更敏感，采购速度和连接器稳定性就会变成关键瓶颈。
- role: 销售型运营负责人
  startTiming: 第 12 个月
  rationale: 只有等试点打包方式、定价和买方 负责人 都跑顺后，才值得加真正扛 销售指标 的 GTM 人。
milestones:
- horizon: 0–12 个月
  items:
  - 在北美中端偏下 PE 滩头市场拿下 3-5 家付费共创客户
  - 至少 2 家试点客户在 6 周内交付首份带引用资料包
  - 至少 2 个付费试点转成年费订阅
  - 把核心季度复盘工作流的资料包质量做到“可被信任”
- horizon: 12–24 个月
  items:
  - 让正式客户从资料包生成扩到回写 CRM 和跨季度假设漂移跟踪
  - 在同一张账本上推出 IC 复盘和价值创造复盘支持等相邻工作流
  - 通过顾问和 CRM 生态关系建立可复制的伙伴驱动 管道
  - 证明部署仍以叠加层为主，而不是越来越像重服务项目
- horizon: 24–36 个月
  items:
  - 在季度复盘、IC 准备和交割后价值创造跟踪之间实现多工作流采用
  - 证明按在管被投公司定价能在更大基金和更广资产覆盖里扩张
  - 只有在治理和安全控制能稳定通过企业尽调之后，才走出北美
  - 把决策账本定位成私募资本决策的运营记忆层，而不只是单一资料包工具
risks:
- risk: 合伙人可能并不信任 AI 生成的资料包，不愿在真实投资决策里使用。
  likelihood: High
  impact: High
  mitigation: 先从带引用的草稿资料包、人工审批和显式置信度标记做起，再尝试自动建议。
- risk: 权限碎片化和源系统接入，可能让首轮部署慢到无法复制成试点模型。
  likelihood: High
  impact: High
  mitigation: 首期范围只做 CRM、SharePoint 或 Box、IC 备忘录、董事会材料和可选转录；在叠加层跑顺前，不接宽泛邮件流。
- risk: CRM 现有厂商或相邻 AI 厂商，可能在创业公司建立分发前就打包出更轻量的同类工作流。
  likelihood: Medium
  impact: High
  mitigation: 把重点放在带来源引用的“假设到结果”图谱、更快的复盘资料包部署，以及跨季度工作流记忆，而不是通用 AI 助手 功能。
- risk: 安全和投顾治理审查，可能实质性拉长销售周期。
  likelihood: Medium
  impact: High
  mitigation: 一开始就拿最小权限架构、书面防护、日志和专门面向私募资本数据处理的安全审查包去卖。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: 这笔 18 个月跑道会用在核心产品与安全工程、创始人主导的 GTM、3-5 个共创客户部署，以及证明“季度复盘”这个切口能转成可复制年费订阅，再谈更广工作流扩张。
