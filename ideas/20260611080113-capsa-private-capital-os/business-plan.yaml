slug: private-equity-decision-ledger
date: '2026-06-11'
executiveSummary: >-
  Private Equity Decision Ledger is an AI workflow layer for North American
  lower-mid-market private-equity firms that rebuilds underwriting logic before
  quarterly portfolio reviews, hold-sell debates, and operating-plan resets.
  The first user is the head of portfolio operations or chief of staff at a
  firm with 8-25 active portfolio companies and a fragmented stack spanning
  DealCloud or Salesforce, SharePoint, email, board decks, and analyst-built
  PowerPoint briefs. The urgent pain is not generic knowledge search; it is the
  recurring cost of manually reconstructing what the firm believed at entry,
  what management committed to, and what evidence has changed when a portfolio
  company misses plan, approaches an exit, or enters a refinancing process.
  The wedge is a cited re-underwriting packet generated from IC memos, CRM
  notes, board materials, and meeting transcripts, sold as an overlay rather
  than a CRM replacement. This beachhead is narrow because it has a visible
  buying trigger, concentrated workflow owners, and measurable ROI in analyst
  time saved and faster partner decisions. Research supports budget availability
  in adjacent private-markets software, but customer pricing, named buyers, and
  willingness to fund a standalone decision-ledger product remain assumptions
  that must be validated in paid pilots. The venture case works only if the
  company first wins the quarterly review workflow, then expands into IC prep,
  post-close value creation tracking, and lender or LP reporting on the same
  thesis-to-outcome graph. The biggest disconfirming risks are that buyers treat
  this as a feature of incumbent CRMs, that security diligence drags beyond a
  practical pilot window, or that partner trust never clears the threshold for
  production use even with citation-linked outputs.
problem:
  - Private-equity firms still reconstruct quarterly review and re-underwriting context by hand across PDFs, emails, spreadsheets, CRM records, and partner memory.
  - Existing CRM, portfolio monitoring, and document tools do not connect original underwriting thesis to later evidence, decisions, and outcomes in one cited workflow.
solution:
  - Ingest IC memos, CRM notes, board decks, KPI packs, and meeting transcripts to build a thesis-to-outcome ledger for each portfolio company.
  - Generate a partner-ready re-underwriting brief that shows original assumptions, changed evidence, unresolved issues, and citations back to source files before each review cycle.
whyWeWin:
  - The product is packaged around one high-stakes workflow with a visible deadline, which is easier to buy than a broad AI knowledge layer or CRM migration.
  - Defensibility compounds from a firm-specific judgment graph and feedback loop on which thesis updates, risks, and recommendations partners accept or reject over time.
strategicChoices:
  beachhead: Quarterly re-underwriting and portfolio review preparation for North American lower-mid-market PE firms with 8-25 active portfolio companies and a Microsoft-plus-CRM operating stack.
  wedgeRationale: This workflow already concentrates pain into a recurring event, has a clear economic buyer in COO or portfolio-operations leadership, and can be deployed as a read-over-write overlay without asking firms to replace DealCloud, Salesforce, SharePoint, or Box.
  sequencingRationale: Start with cited draft packets built from CRM, SharePoint or Box, IC memos, board decks, and transcript inputs because those sources create the fastest proof of value and lowest change-management burden; add write-back automation, broader reporting, and partner ecosystems only after the product proves trust, security, and pilot conversion.
  notYet:
    - Deal sourcing and broad relationship-intelligence workflows
    - Full CRM replacement or new system-of-record ambitions
    - LP reporting and lender reporting before the review-packet wedge is repeatable
    - Cross-border expansion before security diligence and data-governance controls are production-ready
market:
  tam: $146.3M estimated TAM based on 32,500 global PE-backed companies, 45% North America share, and about $10k annual value per active portfolio company
  sam: $51.2M estimated SAM for lower-mid-market North American PE firms with 8-25 active portfolio companies and lean platform teams
  som: $9.6M estimated year-three SOM based on 80 firms with roughly 12 active portfolio companies each at about $10k annual value per company
  segments:
    - Heads of portfolio operations, chiefs of staff, and operating partners at North American lower-mid-market PE firms
    - Deal-team vice presidents and portfolio-review owners preparing hold-sell, refinancing, and quarterly review materials
  buyingProcess: The likely champion is the head of portfolio operations or COO who owns review quality and analyst efficiency, but approval will also require managing-partner support plus security and legal review because the product touches confidential deal files, portfolio data, and transcripts. A credible first sale is a paid pilot tied to one live quarterly review cycle, converting to annual deployment once the buyer sees faster packet preparation, cited outputs, and acceptable security controls.
product:
  mvp: >-
    MVP is a read-only decision ledger for one review cycle that ingests IC
    memos, CRM exports, board decks, KPI packs, and meeting transcripts to
    produce a cited thesis-versus-reality packet and issue tracker for each
    selected portfolio company. It must preserve source permissions, expose
    confidence and citations, and require human approval before any partner
    recommendation is shared.
  sixMonth: Productionize the review-packet workflow with SharePoint or Box plus CRM connectors, portfolio-company workspaces, reusable templates, and audit logs that support 3-5 paid pilots converting to annual deployments.
  twelveMonth: Add write-back into CRM notes, cross-quarter thesis drift tracking, board-pack comparison, and benchmark reporting on review prep time, unresolved issues, and partner adoption across the installed base.
  twentyFourMonth: Expand the same thesis-to-outcome graph into IC lookbacks, post-close value-creation tracking, and lender or LP update workflows while remaining an overlay on top of incumbent CRM and document systems.
  keyBets:
    - Citation-linked outputs will increase partner trust enough to let the product move from draft packet generation into recurring production use.
    - CRM plus document-store plus transcript inputs are sufficient to prove ROI before full email ingestion is required.
    - Quarterly review preparation creates faster proof and cleaner ownership than starting with sourcing, CRM productivity, or broad enterprise search.
gtm:
  wedge: Sell a paid quarterly review acceleration pilot that reconstructs the last underwriting thesis for 3-10 portfolio companies and converts into an annual decision-ledger subscription once the firm trusts the packet before live partner meetings.
  channels:
    - Founder-led outbound to COO, managing partner, and head of portfolio operations at lower-mid-market PE firms
    - Warm introductions from operating partners, private-capital consultants, and CRM implementation firms already serving the target accounts
    - Design-partner sales anchored on one live quarterly review cycle with customer-specific packet templates
  funnelTargets: lead→qualified pilot 15-25%, qualified pilot→paid pilot 40-50%, paid pilot→annual production 50%+, production→second workflow expansion 30%+ within 12 months
  pricing: Annual subscription priced by active portfolio companies with a minimum platform fee for the first review workflow, plus premium modules for transcript ingestion and board-pack automation; this matches buyer ROI because the pain scales with portfolio complexity rather than firmwide seat count.
businessModel:
  revenueStreams:
    - Annual platform subscriptions tied to active portfolio-company count
    - Premium modules for transcript ingestion, board-pack automation, and advanced reporting
    - One-time implementation and workflow-template setup fees
  unitOfValue: Active portfolio company under continuous re-underwriting coverage
  targetGrossMarginPct: 70
  expansionLevers:
    - Add more portfolio companies and business units within the same firm after the first review workflow proves ROI
    - Expand from quarterly reviews into IC prep, hold-sell workflows, and value-creation tracking
    - Add partner ecosystems and market-data-enriched workflows once the internal decision ledger is established
strategyMap:
  northStarMetric: Percent of covered portfolio companies with a cited re-underwriting packet delivered before partner review and accepted for live decision use
  inputMetrics:
    - Time to generate first cited review packet from customer source systems
    - Analyst hours saved per quarterly review cycle
    - Percent of packet claims with accepted source citations
    - Paid pilot to annual production conversion rate
    - Number of additional portfolio companies added per customer after first deployment
  moatsToBuild:
    - Proprietary thesis-to-outcome graph linking underwriting assumptions, management commitments, evidence changes, and realized outcomes
    - Workflow-specific templates and approval patterns for quarterly reviews, hold-sell debates, and operating-plan resets
    - Feedback dataset on partner edits, accepted recommendations, and thesis-drift patterns across quarters
  killCriteria:
    - Fewer than 3 paid design partners within 9 months
    - Paid pilot to annual conversion below 30% after the first 6 pilots
    - First-packet deployment taking more than 6 weeks in most pilots
    - Partner reviewers rejecting citation quality or factual grounding on more than 20% of packet content after two iterations
  mermaid: |
    flowchart LR
      Wedge[Quarterly review wedge] --> MVP[Cited decision-ledger MVP]
      MVP --> Proof[Faster trusted re-underwriting packets]
      Proof --> Expansion[IC prep and value-creation expansion]
investorMemo:
  verdict:
    call: Watch
    conviction: Credible workflow wedge with real buyer pain, but conviction stays limited until the company proves standalone budget and trust against strong adjacent incumbents.
    whyBelieve: The market already buys CRM, portfolio monitoring, and AI workflow tools, and no incumbent clearly owns a cited thesis-versus-outcome packet for quarterly re-underwriting.
    whyDoubt: The initial SAM is modest and adjacent vendors could absorb the use case unless the startup shows materially better workflow fit, trust, and deployment speed.
    nextDiligence: Validate 5-10 target firms on paid pilot pricing, deployment timeline, and whether a cited packet changes live portfolio-review decisions enough to earn annual budget.
  firstCustomer:
    title: Head of portfolio operations at a lower-mid-market PE firm
    profile: A $1B-$10B AUM North American PE firm with 10-20 active portfolio companies, lean platform staff, DealCloud or Salesforce, and quarterly review prep still run through analyst-built decks and document sprawl.
    trigger: A quarterly review, exit process, refinancing, or partner transition forces the firm to rebuild investment context quickly across multiple assets.
    buyer: COO or managing partner
    initialContract: $25k-$60k paid pilot for one quarterly review cycle covering 3-10 portfolio companies, converting to roughly $60k-$150k annual deployment as additional companies and modules go live.
  mustBeTrue:
    - Buyers confirm that quarterly review preparation is painful enough to fund a standalone overlay before any CRM replacement project.
    - A cited packet built from CRM, document-store, and transcript sources can be delivered inside 4-6 weeks for the first customer.
    - Human-reviewed outputs achieve trust high enough that partners use them in live hold-sell or operating-plan decisions.
    - Pricing by active portfolio company supports annual contracts that are meaningfully above services-only analyst augmentation.
    - The same decision ledger expands into adjacent workflows strongly enough to overcome the limited size of the initial beachhead.
  diligenceQuestions:
    - Which recent portfolio-review or exit events exposed the cost of missing or fragmented institutional memory?
    - What exact security and data-handling objections block pilots that touch transcripts, SharePoint, and CRM records?
    - Does the first budget owner sit with COO, portfolio operations, or managing partner in practice?
    - How much better must packet quality be than analyst-built decks for partners to change behavior?
    - If DealCloud, Affinity, or Capsa adds a similar packet workflow, what proprietary asset still makes this startup win?
operatingAssumptions:
  - assumption: The first repeatable buyer is the COO or head of portfolio operations, with deal-team VPs as users but not primary budget owners.
    basis: idea.yaml
    validationTest: Close at least 5 discovery processes and 2 paid pilots where the same function sponsors deployment and owns the budget path.
    decisionImpact: If false, the GTM motion, proof points, and pricing authority all change and sales cycles likely lengthen.
  - assumption: SharePoint or Box plus CRM plus review artifacts are enough to prove value before full email ingestion is necessary.
    basis: research.yaml
    validationTest: In the first 3 pilots, confirm that these sources cover at least 70% of the claims partners expect in a review packet.
    decisionImpact: If false, MVP scope and connector complexity expand materially and implementation timelines may become too long for a pre-seed company.
  - assumption: Citation-first packet generation can earn production trust even if autonomous recommendations remain off by default.
    basis: operator judgment
    validationTest: Run blinded packet reviews with partner and VP users and require at least 80% of sections to be judged trustworthy enough for live meeting use.
    decisionImpact: If false, the company must reposition toward research support or services rather than a recurring decision workflow.
  - assumption: Pricing by active portfolio company produces better budget fit than seat-based pricing for this workflow.
    basis: idea.yaml
    validationTest: Test portfolio-company pricing against seat-based alternatives in at least 3 paid pilot proposals and compare acceptance rates and ACV.
    decisionImpact: If false, TAM and expansion logic compress and the company may need a lower-ACV seat model.
  - assumption: Overlay deployment can be completed in 4-6 weeks despite fragmented permissions and security review.
    basis: research.yaml
    validationTest: Measure time from security kickoff to first packet in the first 3 pilots and confirm at least 2 complete inside 6 weeks.
    decisionImpact: If false, pilot conversion falls, services burden rises, and fundraising needs increase before repeatability is proven.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Interview 20 COOs, heads of portfolio operations, and operating partners at North American lower-mid-market PE firms about quarterly review preparation.
    hypothesis: Quarterly review and hold-sell prep is the highest-urgency entry workflow versus broader sourcing or CRM productivity use cases.
    successMetric: At least 10 interviewees describe a recent review cycle where context rebuild consumed analyst time or delayed partner decisions, and 5 agree to workflow mapping.
    owner: Founder CEO
  - horizon: 0–90 days
    experiment: Deliver 2 manual but citation-linked sample packets on historical portfolio reviews using exported memos, decks, and CRM notes.
    hypothesis: Buyers will pay for packet reconstruction before full automation if the output is specific enough to be used in a live review.
    successMetric: 2 design partners accept paid pilot scopes after reviewing sample packets.
    owner: Founder CEO
  - horizon: 0–90 days
    experiment: Benchmark packet quality using CRM plus document-store inputs first, then compare with added transcript ingestion.
    hypothesis: CRM plus document and board-pack inputs create enough first-packet value that transcripts can be an upsell rather than a blocker.
    successMetric: Base packet covers at least 70% of required claims without transcripts in 2 of 3 test cases.
    owner: Founding eng
  - horizon: 90–180 days
    experiment: Launch 3 paid pilots tied to one live quarterly review cycle each.
    hypothesis: A review-cycle pilot with human approval and citations can convert into annual production faster than a broad AI knowledge deployment.
    successMetric: 3 paid pilots launched, at least 2 completed inside 6 weeks, and at least 1 converted to annual production.
    owner: Founder CEO
  - horizon: 90–180 days
    experiment: "Test two pricing structures: active portfolio-company pricing versus seat-based pricing."
    hypothesis: Portfolio-company pricing aligns better with ROI and supports higher ACV without confusing the buyer.
    successMetric: At least 2 of 3 pilot customers choose portfolio-company pricing at equal or higher annualized value.
    owner: Founder CEO
  - horizon: 180–365 days
    experiment: Add CRM write-back and cross-quarter thesis-drift tracking for converted customers.
    hypothesis: Workflow insertion into existing systems is the step that moves the product from useful packet generator to system-of-action.
    successMetric: 50%+ of converted customers use write-back or drift-tracking features in monthly review prep.
    owner: Founding eng
  - horizon: 180–365 days
    experiment: Sign 3 referral or implementation relationships with private-capital CRM consultants or operating-partner networks.
    hypothesis: Trusted intermediaries shorten security, workflow, and deployment friction in early enterprise sales.
    successMetric: 3 partner agreements and 2 qualified pilot introductions sourced through partners.
    owner: Founder CEO
operations:
  - Least-privilege connector architecture that preserves existing source permissions across CRM, SharePoint, Box, and transcript systems
  - Human approval workflow and audit log for every packet section before high-stakes partner use
  - Customer-specific packet templates for quarterly reviews, hold-sell meetings, and operating-plan resets
  - Security review playbook covering data handling, retention, logging, and incident response for adviser workflows
  - Weekly pilot operating cadence with packet QA, source coverage review, and proof-of-ROI readouts
team:
  - role: Founding eng
    startTiming: Month 0
    rationale: Own ingestion, permissions, citation integrity, and the first decision-ledger workflow before adding commercial scale.
  - role: Founder CEO
    startTiming: Month 0
    rationale: Founder-led sales is required because the problem is strategic, security-sensitive, and still needs category framing.
  - role: Applied AI engineer
    startTiming: Month 3
    rationale: Packet quality, thesis extraction, and source-grounding are the core product risks and need dedicated iteration early.
  - role: Solutions engineer
    startTiming: Month 6
    rationale: Early customers will need workflow mapping, connector setup, and packet-template configuration to deploy inside one review cycle.
  - role: Security and platform engineer
    startTiming: Month 9
    rationale: Procurement speed and connector reliability become critical once pilots convert and more sensitive data sources are added.
  - role: Operator-seller
    startTiming: Month 12
    rationale: Add a quota-carrying GTM hire only after pilot packaging, pricing, and buyer ownership are repeatable.
milestones:
  - horizon: 0–12 months
    items:
      - Win 3-5 paid design partners in the North American lower-mid-market PE beachhead
      - Deliver first cited packet inside 6 weeks for at least 2 pilot customers
      - Convert at least 2 paid pilots into annual subscriptions
      - Reach trusted packet quality on the core quarterly review workflow
  - horizon: 12–24 months
    items:
      - Expand production customers from packet generation into CRM write-back and cross-quarter thesis-drift tracking
      - Launch adjacent workflows for IC lookbacks and value-creation review support on the same ledger
      - Establish repeatable partner-led pipeline through consultants and CRM ecosystem relationships
      - Build customer evidence that deployment remains overlay-first rather than services-heavy
  - horizon: 24–36 months
    items:
      - Reach multi-workflow adoption across quarterly reviews, IC prep, and post-close value-creation tracking
      - Prove that portfolio-company-based pricing scales across larger funds and broader asset coverage
      - Expand beyond North America only after governance and security controls consistently clear enterprise diligence
      - Position the ledger as the operating memory layer for private-capital decisions rather than a one-workflow packet tool
risks:
  - risk: Partners may not trust AI-generated packets enough to use them in live investment decisions.
    likelihood: High
    impact: High
    mitigation: Start with cited draft packets, human approval, and explicit confidence markers before attempting autonomous recommendations.
  - risk: Fragmented permissions and source integrations may make first deployment too slow for a repeatable pilot model.
    likelihood: High
    impact: High
    mitigation: Limit initial scope to CRM, SharePoint or Box, IC memos, board decks, and optional transcripts, and refuse broad email ingestion until the overlay is working.
  - risk: CRM incumbents or adjacent AI vendors may bundle a lighter version of the workflow before the startup establishes distribution.
    likelihood: Medium
    impact: High
    mitigation: Focus on the source-cited thesis-to-outcome graph, faster review-packet deployment, and cross-quarter workflow memory rather than generic copilot features.
  - risk: Security and adviser-governance review could materially extend sales cycles.
    likelihood: Medium
    impact: High
    mitigation: Lead with least-privilege architecture, written safeguards, logging, and a security review package tailored to private-capital data handling.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: 18 months of runway funds core product and security engineering, founder-led GTM, 3-5 design-partner deployments, and proof that the quarterly review wedge converts into repeatable annual subscriptions before broader workflow expansion.
