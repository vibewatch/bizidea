openQuestions:
- How many North American lower-mid-market PE firms already run a formal quarterly re-underwriting or hold-sell packet that could be replaced on day one?
- Will buyers prefer pricing by active portfolio company, by deal-team seat, or by review workflow completed?
- 'Which first integration wins more pilots: SharePoint plus CRM, or CRM plus meeting transcripts?'
- How much partner trust does citation-first output add relative to a generic AI memo assistant?
