competitors:
- name: Capsa AI
  stage: scale-up
  wedge: AI operating system for private capital spanning sourcing, IC materials, enterprise search, legal review, and portfolio tracking.
  pricing: Custom enterprise pricing; no public rates disclosed.
  strength: Closest category fit today, with strong auditability, private-capital integrations, and live case-study proof that search and IC workflows save time.
  weaknessVsUs: Broad platform positioning can dilute focus on the narrower quarterly re-underwriting packet and portfolio decision-ledger wedge.
  sourceRefs:
  - 3
  - 1
  - 2
  - 7
- name: Intapp DealCloud
  stage: incumbent
  wedge: System of record for CRM and deal intelligence inside private capital and adjacent professional-services workflows.
  pricing: Enterprise pricing; typically bundled with configuration and admin overhead rather than public self-serve rates.
  strength: Entrenched installed base, automatic activity capture, AI add-ons, and trust with more than 1,700 firms.
  weaknessVsUs: Optimized for workflow configuration and relationship records, not a source-cited thesis-versus-outcome review packet built on unstructured portfolio evidence.
  sourceRefs:
  - 105
  - 57
  - 41
- name: Meridian AI
  stage: scale-up
  wedge: Private-equity CRM with AI, thematic sourcing, market mapping, and CRM-native workflow automation.
  pricing: Custom pricing via sales-led deployment.
  strength: Purpose-built PE orientation, in-house engineering depth, and explicit CRM+AI product design for private markets.
  weaknessVsUs: Still competes to become the CRM/system of record, which makes migration harder than an overlay that plugs into the buyer’s current stack.
  sourceRefs:
  - 20
  - 23
  - 28
  - 25
- name: Affinity
  stage: scale-up
  wedge: Relationship-intelligence CRM for private capital with zero-entry activity capture and MCP-based AI access.
  pricing: Custom pricing and enterprise plans; API/MCP requires Scale, Advanced, or Enterprise tiers.
  strength: Large private-capital footprint, strong activity automation, and fast implementation relative to heavier CRM incumbents.
  weaknessVsUs: Centers relationship graph and meeting prep more than portfolio thesis drift, board-pack reconciliation, or cited re-underwriting.
  sourceRefs:
  - 50
  - 53
  - 60
  - 57
- name: Hebbia
  stage: scale-up
  wedge: Horizontal AI reasoning workbench for finance, legal, and enterprise document-heavy workflows.
  pricing: Custom enterprise pricing only.
  strength: Strong cross-document reasoning reputation and broad adoption by leading financial firms.
  weaknessVsUs: Horizontal product without native PE CRM overlay, portfolio review workflow packaging, or built-in thesis ledger persistence.
  sourceRefs:
  - 80
