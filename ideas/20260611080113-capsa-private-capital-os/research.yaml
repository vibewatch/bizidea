    - 7
  validationPlan:
  - priority: high
    question: Will lower-mid-market PE buyers pay for a review-packet overlay before they replace their CRM?
    evidenceToGather: Five live design-partner interviews with COOs or portfolio-ops leads plus one paid pilot quote anchored to current quarterly review workload.
  - priority: high
    question: Which data source creates the biggest time-to-value jump in the first 30 days?
    evidenceToGather: Time-and-motion test comparing SharePoint plus CRM only vs. adding email and transcript ingestion on one active portfolio review cycle.
  - priority: medium
    question: Do firms trust AI summaries more when every line is citation-linked to original files?
    evidenceToGather: Blind comparison of cited vs. non-cited draft review packets with partner and VP users.
  - priority: medium
    question: Can implementation stay inside a six-week overlay window?
    evidenceToGather: Pilot deployment logs across CRM, SharePoint, Outlook, and Teams/Box connectors.
