market:
  tam:
    value: $146.3M
    rationale: '32,500 global PE-backed companies at end-2025 [PwC]; assume 45% sit in North America and carry workflows similar to the target stack, then apply ~$10k annual decision-ledger value per active portfolio company derived from adjacent private-markets CRM and add-on spend benchmarks. Calc: 32,500 × 45% × $10k.'
    isEstimate: true
    sourceRefs:
    - 14
    - 17
    - 42
    - 84
  sam:
    value: $51.2M
    rationale: 'Constrain TAM to lower-mid-market PE firms with 8-25 active assets and lean platform teams. Assume 35% of North American PE-backed company inventory fits this beachhead. Calc: 32,500 × 45% × 35% × $10k.'
    isEstimate: true
    sourceRefs:
    - 14
    - 17
    - 42
  som:
    value: $9.6M
    rationale: Year-3 reachable share modeled as 80 firms × 12 active portfolio companies per firm × $10k annual value per company on an overlay product sold into one review workflow first.
    isEstimate: true
    sourceRefs:
    - 42
    - 84
    - 87
