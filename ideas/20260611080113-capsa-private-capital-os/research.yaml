  sensitivityCases:
  - case: Incumbent MCP layers become good enough for lightweight meeting prep
    impact: The startup must differentiate on portfolio-specific citation depth, review packet format, and memory across quarters rather than generic chat on top of CRM.
    sourceRefs:
    - 38
