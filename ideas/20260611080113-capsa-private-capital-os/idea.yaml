topRisks:
  - name: Partner trust gap
    description: Partners may resist using AI-generated re-underwriting briefs for high-stakes investment decisions.
    mitigation: Start with cited draft packets and approval workflows so every output is traceable to source memos, calls, and decks before any recommendation is trusted.
  - name: Messy source integration
    description: Private-equity data is fragmented across CRM, email, file shares, and inconsistent board materials, which can slow deployment.
    mitigation: Begin with the highest-yield inputs for one workflow, typically CRM exports, IC memos, board decks, and meeting transcripts, then expand integrations after proving ROI.
  - name: Incumbent feature response
    description: Deal CRM vendors could ship lightweight copilots that blur the category once demand is proven.
    mitigation: Own the thesis-to-outcome graph and workflow-specific review packet with deep citations and partner feedback, not generic chat on top of CRM records.
