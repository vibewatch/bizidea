differentiator: >-
  Most private-equity software is either a system of record for pipeline and
  contacts or a repository for documents. This company owns the harder layer in
  between: the chain of reasoning from underwriting thesis to operating decision
  to realized outcome. The defensible asset is a firm-specific judgment graph
  built from memos, partner conversations, CRM changes, and portfolio updates,
  which becomes more valuable every time a team re-underwrites an asset and
  records the result.
