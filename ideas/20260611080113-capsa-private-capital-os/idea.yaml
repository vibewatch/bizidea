problem: >-
  Mid-market private-equity firms still store the reasoning behind investment
  decisions across memos, partner calls, board decks, CRM notes, and scattered
  spreadsheets. When a portfolio company misses plan, an exit window opens, or a
  new deal resembles an old one, teams cannot quickly recover what they believed
  at entry, what changed, and which decisions already worked or failed. Analysts
  rebuild that context by hand, partners rely on memory, and firms make slower
  re-underwriting decisions with less conviction and weak institutional memory.
targetUser:
  primary: Head of portfolio operations or chief of staff at a mid-market private-equity firm managing 8-25 active portfolio companies
  secondary: Deal team vice presidents and operating partners preparing quarterly portfolio reviews and hold-sell discussions
  buyer: COO or managing partner at the firm
startupThesis:
  nonObviousInsight: >-
    The missing system in private capital is not another database of company
    facts; it is a decision ledger that links what the firm said in memos and
    partner conversations to what later happened in portfolio outcomes. Once AI
    can reconcile unstructured memos, calls, CRM notes, and board materials into
    one reusable intelligence layer, a startup can own the re-underwriting
    workflow that generic CRMs and data rooms never captured.
  beachhead: >-
    Quarterly re-underwriting and value-creation review prep for North American
    lower-mid-market PE firms with 8-25 active portfolio companies and
    fragmented DealCloud or Salesforce, SharePoint, and email workflows
  wedge: >-
    A portfolio decision ledger that ingests IC memos, partner calls, CRM
    notes, board decks, and KPI packs, then produces thesis-versus-reality
    briefs before portfolio reviews, hold-sell debates, and operating-plan
    resets
  whyNowCatalyst: >-
    Capsa's funding and explicit push toward agentic capabilities around memos,
    conversations, decisions, and outcomes show firms are now willing to buy
    AI-native infrastructure that turns fragmented firm memory into action.
  ventureScalePath: >-
    Start with quarterly portfolio reviews, then expand into deal-screening
    lookbacks, IC prep, post-close value-creation tracking, lender and LP
    reporting, and the firmwide private-capital system of record for judgment
    and outcomes.
solution: >-
  The product sits above the firm's CRM, document store, board materials, and
  meeting transcripts to build a living graph of investment theses, decisions,
  owners, milestones, and realized outcomes. Before each quarterly review it
  generates a re-underwriting brief that shows original underwriting
  assumptions, what evidence has changed, what management committed to, and
  which open issues need partner attention. The first workflow is not generic
  search; it is an approval-ready portfolio review packet with citations back to
  source memos, decks, and calls. Because it does not ask the firm to rip out
  DealCloud, Salesforce, or its document systems, deployment can start as an
  overlay product. Over time the moat becomes the proprietary thesis-to-outcome
  graph and feedback data on which recommendations partners accept or reject.
goToMarketSeed:
  firstCustomer: >-
    A $1B-$10B AUM North American lower-mid-market PE firm with 10-20 active
    portfolio companies, a lean portfolio-operations team, DealCloud or
    Salesforce, and a painful quarterly review process driven by analyst prep
    across inboxes and board decks
  buyingTrigger: >-
    A quarterly portfolio review cycle, partner transition, or looming exit or
    refinancing that forces the firm to re-underwrite multiple assets quickly
  currentAlternative: >-
    Deal CRM plus SharePoint or Box folders, analyst-built PowerPoint briefs,
    ad hoc search across email, and partner recollection
  switchingReason: >-
    The wedge reconstructs prior assumptions and decisions across unstructured
    sources in days rather than weeks without requiring a rip-and-replace of the
    firm's existing CRM or data room stack
  pricingHypothesis: >-
    Annual software subscription priced by active portfolio companies and seats,
    with premium modules for transcript ingestion, memo extraction, and board
    pack automation
