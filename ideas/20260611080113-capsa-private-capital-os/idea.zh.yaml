problem: 中端私募股权机构仍把投资决策背后的推理过程分散在 备忘录、合伙人通话、董事会材料、CRM 备注和零散表格里。等到被投公司偏离计划、退出窗口打开，或者新项目和旧项目高度相似时，团队很难迅速找回当初为什么投、后来哪些事实变了、以及哪些判断已经被证明有效或失效。分析师只能手工重建上下文，合伙人继续靠记忆决策，结果就是重估更慢、把握更弱，机构记忆也越来越薄。
targetUser:
  primary: 管理 8-25 家在管被投公司的中端 PE 机构里，负责投后运营的负责人或幕僚长
  secondary: 为季度投后复盘和持有/出售讨论做准备的交易团队副总裁与运营合伙人
  buyer: 机构 COO 或管理合伙人
startupThesis:
  nonObviousInsight: 私募资本真正缺的不是又一个公司事实数据库，而是一套决策账本：它能把机构在 备忘录 和合伙人讨论里说过的话，和后来真实发生的投后结果连起来。只要 AI 能把非结构化 备忘录、电话、CRM 备注和董事会材料对齐成一层可复用的智能层，创业公司就有机会拿下通用 CRM 和数据室一直没抓住的重估工作流。
  beachhead: 北美中端偏下 PE 机构的季度重估与价值创造复盘准备工作——这些机构通常有 8-25 家在管被投公司，DealCloud 或 Salesforce、SharePoint 和邮件流程都很碎。
  wedge: 先做投后决策账本：吃进 IC 备忘录、合伙人通话、CRM 备注、董事会材料和 KPI 包，在季度复盘、持有/出售讨论和经营计划重设之前，自动生成“原始假设 vs. 当前现实”的重估简报。
  whyNowCatalyst: Capsa 刚拿到融资，又明确把备忘录、对话、决策和结果上的智能代理式能力往前推，这说明机构现在愿意买能把碎片化机构记忆变成行动的 AI 原生基础设施。
  ventureScalePath: 先吃下季度投后复盘，再扩到 项目筛选复盘、IC 准备、投后价值创造跟踪、贷款方和 LP 汇报，最后把自己做成私募资本机构里记录判断与结果的系统底座。
solution: 产品叠在机构现有 CRM、文档库、董事会材料和会议转录之上，先搭出一张持续更新的图谱，把投资假设、关键决策、责任人、里程碑和最终结果都串起来。每次季度复盘前，它会自动生成一份重估简报：最初承做假设是什么、哪些证据变了、管理层承诺了什么、哪些开放问题需要合伙人拍板。第一条工作流不是泛搜索，而是一份可以直接拿去审批的投后复盘资料包，并且每条判断都能回溯到源 备忘录、材料 和电话。因为它不要求客户替换 DealCloud、Salesforce 或文档系统，所以可以先作为叠加层上线。时间一长，真正的护城河会变成那张私有的“假设到结果”图谱，以及合伙人到底采纳还是否决了哪些建议的反馈数据。
goToMarketSeed:
  firstCustomer: 首个客户画像是一家北美中端偏下 PE 机构，AUM 在 $1B-$10B，手上有 10-20 家在管被投公司，投后运营团队很精简，已经用了 DealCloud 或 Salesforce，但每次季度复盘仍得靠分析师在收件箱和董事会材料里手工拼上下文。
  buyingTrigger: 季度投后复盘、合伙人交接，或临近退出/再融资，都会逼着机构在很短时间里重估多项资产。
  currentAlternative: 现在的替代方案通常是 Deal CRM 加 SharePoint 或 Box 文件夹，再配上分析师手工做的 PowerPoint 简报、零散的邮件搜索和合伙人自己的记忆。
  switchingReason: 这个切口能在几天内而不是几周内，把非结构化来源里的旧假设和旧决策重新拼出来，而且不需要把现有 CRM 或数据室整套推倒重来。
  pricingHypothesis: 按在管被投公司数量和席位收年费订阅；转录接入、备忘录提取和董事会资料包自动化做高价模块。
