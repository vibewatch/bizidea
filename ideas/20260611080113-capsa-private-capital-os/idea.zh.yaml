topRisks:
- name: 合伙人信任缺口
  description: 合伙人可能不愿把 AI 生成的重估简报直接用于高风险投资决策。
  mitigation: 先从带引用的草稿资料包和审批工作流做起，让每条输出都能回溯到源 备忘录、通话和材料，再谈让客户信任建议本身。
- name: 数据源接入混乱
  description: 私募股权数据散落在 CRM、邮件、文件共享和格式不一的董事会材料里，部署速度可能因此被拖慢。
  mitigation: 先抓单一工作流里产出最高的输入，通常是 CRM 导出、IC 备忘录、董事会材料和会议转录；等 ROI 跑通后再扩更多集成。
- name: 现有厂商功能跟进
  description: 一旦需求被验证，Deal CRM 厂商可能很快推出轻量级 AI 助手，把赛道边界做模糊。
  mitigation: 把护城河建在“假设到结果”图谱、深度引用和合伙人反馈驱动的专用复盘资料包上，而不是做 CRM 之上的通用聊天层。
