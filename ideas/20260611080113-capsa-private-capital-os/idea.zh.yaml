differentiator: 大多数私募股权软件，要么是管项目和联系人的系统底座，要么只是文档仓库。这家公司吃的是中间更难的一层：从投资假设，到经营决策，再到最终结果的完整推理链。真正可防守的资产，是一张按机构私有数据长出来的判断图谱——它来自 备忘录、合伙人对话、CRM 变更和投后更新。每当团队重估一项资产并记录结果，这张图都会更值钱。
