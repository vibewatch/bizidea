jobsToBeDone:
- job: 当一家被投公司进入季度复盘或持有/出售讨论时，帮投后运营负责人快速把最初投资假设、关键决策和新证据重新拼出来，这样团队才能把重估做得更快、更准。
  currentAlternative: 分析师从 CRM 备注、收件箱、董事会材料和合伙人记忆里手工拼 简报。
  successMetric: 每轮季度复盘节省的工时，以及合伙人会议开始前仍未解决的投资假设问题减少了多少。
