modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Leads[Target PE firms] --> PaidPilots[Paid review pilots]
      PaidPilots --> Customers[Annual production customers]
      CACSpend[CAC spend] --> PaidPilots
      Customers --> Revenue[Subscription revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> EBITDA[EBITDA]
      EBITDA --> Cash[Ending cash]
      Churn[Churn and trust] --> Customers
modelSanity:
- checkName: Revenue engine
  finding: The base case is driven by growing from 2 production firms in Y1 to 26 by Q4Y3 at roughly $120K ACV from about 12 covered portfolio companies per firm.
- checkName: Must go right
  finding: Security-scoped pilots have to convert within one review cycle so founder-led sales can add annual customers faster than implementation work expands.
- checkName: Model breaks if
  finding: If deployment stays services-heavy and gross margin sits near 65% while conversions slip, the company would need extra capital before proving the seed milestone.
- checkName: Next-round proof
  finding: A seed-ready story appears once the company reaches roughly 8-12 annual customers and shows the ledger expands from packet prep into CRM write-back and cross-quarter tracking.
sanityChecks:
  ruleOf40: Y3 growth 173% + EBITDA margin -9% = 164%.
  burnMultiple: Y2 burn multiple 1.0x based on $0.75M burn over $0.73M net new revenue; Y3 burn multiple 0.1x as growth outpaces remaining burn.
  revenuePerFte: $227K Y3 using Q4Y3 headcount of 10 FTE (benchmark roughly $200K-$400K for scaled B2B SaaS).
  flags:
  - The model assumes each production customer covers about 12 active portfolio companies at the research-derived $10K annual value per company, but direct pricing validation is still limited to paid-pilot assumptions.
  - Gross margin is held at the 70% target even though early deployments may behave more like solution engineering until connectors and templates are standardized.
  - Cash stays positive on a $2.4M raise, but a two-quarter slip in security reviews or pilot conversion would compress the buffer quickly.
