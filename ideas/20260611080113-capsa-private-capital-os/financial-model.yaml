scenarios:
  downside:
    description: Security reviews and partner-trust issues slow annual conversions by roughly two quarters and keep deployments more services-heavy.
    y3RevenueK: 1650.0
    y3EbitdaK: -520.0
    cashLowPointK: 180.0
    keyAssumptionChanges:
    - Q4Y3 customersEop reaches 18 instead of 26.
    - Gross margin stays at 65% because onboarding remains labor-intensive.
    - Monthly churn rises to 2.8% as some pilots fail to become sticky annual workflows.
  base:
    description: Pilot conversion improves steadily, but the company still hires carefully and does not assume paid-pilot or services revenue in the core P&L.
    y3RevenueK: 2270.0
    y3EbitdaK: -199.0
    cashLowPointK: 678.6
    keyAssumptionChanges:
    - Q4Y3 customersEop reaches 26 with $120K blended ACV.
    - Gross margin holds at the 70% business-plan target.
    - Hiring stays lean at 10 FTE by Q4Y3.
  upside:
    description: Consultant and CRM-ecosystem referrals accelerate customer adds, premium modules attach earlier, and onboarding becomes more repeatable.
    y3RevenueK: 2820.0
    y3EbitdaK: 140.0
    cashLowPointK: 760.0
    keyAssumptionChanges:
    - Q4Y3 customersEop reaches 30 instead of 26.
    - Gross margin improves to 72% as connectors and templates standardize.
    - Blended ACV rises modestly through module attach without changing buyer segment.
