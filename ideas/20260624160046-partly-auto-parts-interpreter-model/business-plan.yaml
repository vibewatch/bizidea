slug: collision-supplement-fitment-copilot
date: "2026-06-24"
executiveSummary: >-
  Collision supplement fitment copilot is a pre-order decision layer for
  regional U.S. collision-repair MSOs that centralize parts buying and suffer
  recurring supplement and wrong-part delays. The first product ingests VIN and
  estimate lines, ranks order-ready parts for bumper, lighting, and
  ADAS-adjacent repairs, and routes ambiguous lines into a human exception
  queue before a purchase order is sent. The company should not start as a full
  procurement marketplace or shop-management suite; the fastest proof comes
  from showing measurable reduction in supplementaries, returns, and key-to-key
  cycle time inside the systems shops already use. The first customer is a
  15–30 shop MSO whose centralized parts desk is overloaded by newer vehicle
  complexity and weekly supplement loops. Pricing should combine a location-
  based platform fee with a per-reviewed-order fee so ROI tracks the workflow
  being improved rather than user seats. If the product can achieve shadow-mode
  proof and then production gating without heavy custom integration, it can
  build a durable dataset of accept, reject, return, and supplement outcomes
  that incumbents do not capture cleanly today. Research supports the workflow
  pain and the incumbent gap, but it does not yet show the minimum confidence
  threshold buyers will trust or which estimator and BMS stacks are easiest to
  standardize first. The main strategic risk is whether this narrow beachhead is
  large and defensible enough before incumbents or a model supplier absorb the
  feature, so expansion beyond regional collision MSOs must be validated early
  rather than assumed.
problem:
  - Centralized collision parts teams still translate VIN, trim, and estimate lines into exact OEM, aftermarket, or recycled parts through fragmented catalogs, phone calls, and senior staff judgment.
  - Wrong-part decisions create supplementaries, return freight, and longer key-to-key cycle time, and the penalty is rising as ADAS-sensitive and disclosure-sensitive repairs become a larger share of the mix.
solution:
  - Insert a pre-order fitment gate between estimating and ordering that proposes exact-fit candidates, scores confidence, and routes ambiguous lines into a human exception queue before a PO is sent.
  - Capture accept, reject, return, and supplement outcomes at the line-item level so each MSO builds an auditable rule and feedback layer without replacing its estimator or supplier network.
whyWeWin:
  - The wedge is the estimate-to-order control point with the clearest ROI, so the startup can prove value faster than a broader procurement or shop-management product.
  - Closed-loop outcome data, insurer and supplier rule libraries, and auditable handling of ADAS and OEM disclosure edge cases can compound into a moat that static catalog tools do not have.
strategicChoices:
  beachhead: U.S. regional collision-repair MSOs with 10–50 shops, centralized parts buying, and recurring supplement issues on bumper, lighting, and ADAS-adjacent repairs.
  wedgeRationale: This entry point has a specific buyer, a clear trigger, and measurable pain in weeks, while avoiding the slower sale and heavier build required to replace estimating suites or become a full procurement marketplace.
  sequencingRationale: Start in shadow mode on the highest-error categories, then add production gating only after KPI proof; build repeatable connectors into the dominant estimator and BMS paths before pursuing insurer or supplier channels; hire integration and implementation depth before scaling outbound sales.
  notYet:
    - Single-location body shops that lack centralized workflow pain and budget.
    - National consolidators that require deeper integration, procurement politics, and enterprise security work before the product is proven.
    - Full procurement marketplace, claims platform, or inventory suite.
    - Mechanical repair, salvage, and distributor workflows before collision proof is repeatable.
market:
  tam: Estimated $64.8M annual beachhead TAM for independent U.S. MSOs buying a pre-order decision layer at roughly $9 per reviewed order; this excludes distributors, insurers, national consolidators, and adjacent repair categories.
  sam: Estimated $27.0M near-term SAM for roughly 200 regional MSOs in the 10–50 shop band with centralized buying and enough order volume to justify workflow software.
  som: Estimated $2.5M year-3 SOM assuming about 20 MSOs adopt and roll out groupwide; the venture case therefore depends on later expansion beyond the initial collision MSO wedge.
  segments:
    - Regional U.S. collision-repair MSOs with centralized parts procurement.
    - Multi-shop independent repair groups that want estimator-adjacent decision support before broader insurer or distributor channels.
  buyingProcess: >-
    A VP of Operations or Director of Parts Procurement usually sponsors the
    pilot after a supplement or return problem becomes visible across multiple
    shops. The deal closes when shadow-mode evidence shows the product can cut
    wrong-part loops without forcing estimator replacement or slowing ordering.
product:
  mvp: >-
    MVP covers VIN plus estimate ingestion, fitment ranking for bumper,
    lighting, and ADAS-adjacent lines, confidence scoring, a human exception
    queue, and an audit trail that feeds the current ordering workflow. It
    deliberately excludes full procurement, claims adjudication, and broad
    national part-category coverage.
  sixMonth: Add repeatable connectors for the first one or two estimator or BMS stacks, configurable insurer and supplier business rules, and KPI reporting on supplements, returns, and review throughput.
  twelveMonth: Expand vehicle and part coverage, enable low-confidence blocking and rerouting in production, and package shop-group learning loops that improve recommendations from local outcome history.
  twentyFourMonth: Extend the same decision layer into adjacent workflows such as mechanical repair chains, insurer DRP procurement oversight, and distributor-assisted substitutions once the collision MSO wedge shows repeatable rollout economics.
  keyBets:
    - Shadow-mode evidence on narrow part categories is enough to earn production trust before the model is fully autonomous.
    - Overlay integration into existing estimators and ordering flows is faster and cheaper than asking MSOs to adopt a new system of record.
    - Outcome data from each deployed MSO materially improves confidence thresholds and exception routing quality.
gtm:
  wedge: Sell a paid shadow-mode estimate-review pilot for centralized parts teams, then convert to production gating on the highest-risk line items once the supplement and return KPIs improve.
  channels:
    - Founder-led direct sales to VP Operations, Director of Parts Procurement, and MSO owners.
    - Collision-repair consultants and shop-management groups that already advise on procurement standardization.
    - Estimating, BMS, supplier-network, and insurer partners that can embed or refer the workflow once ROI is proven.
  funnelTargets: "Lead→qualified pilot 20-30%, qualified pilot→paid pilot 50%+, paid pilot→group rollout 60%+, group rollout→second workflow or region expansion within 12 months in 40%+ of production accounts."
  pricing: >-
    Charge a paid pilot in the $15k-$25k range for 6-8 weeks of shadow-mode
    deployment, then convert to a hybrid annual contract with a per-location
    platform fee and a per-reviewed-order fee that lands most 15-30 shop MSOs
    around $70k-$120k ACV. This fits how buyers measure value better than
    per-user pricing because avoided supplements, returns, and cycle-time delay
    scale with repair volume rather than seat count.
businessModel:
  revenueStreams:
    - Annual software subscription for each live MSO deployment.
    - Usage-based fees tied to reviewed repair orders or estimate lines.
    - Implementation, integration, and premium rule-configuration packages for larger groups.
  unitOfValue: Reviewed repair order in a centralized MSO workflow, with a location-based platform floor.
  targetGrossMarginPct: 70
  expansionLevers:
    - Roll out from one centralized parts team to all shops and regions inside the same MSO.
    - Add more categories and business rules so a higher share of lines can be auto-routed or blocked with confidence.
    - Expand the decision layer into insurer, supplier, distributor, and adjacent repair workflows once collision ROI is proven.
strategyMap:
  northStarMetric: Production-reviewed repair orders routed through the fitment gate with measured reduction in supplements and returns.
  inputMetrics:
    - Shadow-mode accuracy versus final human part choice on targeted categories.
    - Low-confidence exception rate per reviewed order.
    - Supplement and return reduction versus pre-pilot baseline.
    - Paid pilot to production rollout conversion rate.
    - Median deployment time and custom engineering hours per account.
  moatsToBuild:
    - Line-item outcome dataset linking estimate context to accept, reject, return, supplement, and cycle-time results.
    - Configurable insurer, supplier, and OEM rule libraries by region and workflow.
    - Integration and decision graph connecting VIN decode, ACES or VCdb data, repair procedures, and ordering outcomes.
  killCriteria:
    - Fewer than 2 of the first 5 pilots show at least 15% reduction in targeted supplement or return events within 8 weeks.
    - Median time to first value stays above 45 days or requires more than 2 engineer-weeks of custom work per deployment.
    - Buyers refuse to enable blocking or rerouting on at least 30% of targeted high-risk lines after a successful shadow pilot.
  mermaid: |
    flowchart LR
      Wedge[Shadow-mode fitment gate] --> MVP[MVP on bumper, lighting, and ADAS lines]
      MVP --> Proof[Lower supplements, returns, and cycle time]
      Proof --> Expansion[Group rollout plus adjacent repair and network workflows]
investorMemo:
  verdict:
    call: Watch
    conviction: Strong wedge and credible workflow pain, but conviction stays limited until integration economics and expansion beyond a modest beachhead are proven.
    whyBelieve: The company attacks a narrow decision point where wrong-part errors are expensive, model specialization now matters, and buyers can test ROI without replacing core systems.
    whyDoubt: The independent MSO beachhead alone is not large enough for a standout venture outcome, and incumbents or model suppliers may absorb the feature before the startup expands.
    nextDiligence: Run two shadow pilots to measure supplement and return reduction on targeted categories and test whether one MSO will sign a $70k+ annual rollout after pilot proof.
  firstCustomer:
    title: Director of Parts Procurement at a regional collision MSO
    profile: A 15-30 shop U.S. collision group with centralized parts buying, existing estimator software, and a newer-vehicle mix that creates recurring fitment ambiguity on bumper, lighting, and ADAS-adjacent lines.
    trigger: Supplement or return volume rises after procurement centralization, vehicle-mix change, or more ADAS-heavy repairs.
    buyer: VP of Operations
    initialContract: >-
      $15k-$25k shadow-mode pilot on a narrow part set across 2-5 shops,
      converting to a $70k-$120k annual contract when the MSO rolls the fitment
      gate across the centralized team and proves measurable supplement and
      return reduction.
  mustBeTrue:
    - Regional 10-50 shop MSOs will fund a pre-order decision layer now instead of waiting for CCC, Mitchell, OEC, or supplier networks to add enough similar functionality.
    - A shadow-mode pilot can reduce targeted supplement or return events by at least 15% within one quarter on bumper, lighting, or ADAS-adjacent categories.
    - The first estimator and BMS connector path can be deployed without replacing the system of record or turning the company into a services-heavy integrator.
    - Buyers will trust confidence thresholds and human exception routing enough to let the product block or reroute some line items before order submission.
    - Adjacent expansion into insurers, distributors, or other repair workflows is real enough to grow beyond a small collision-only software market.
  diligenceQuestions:
    - Which estimator and BMS stacks dominate 10-50 shop regional MSOs, and how different are their integration paths?
    - What KPI threshold convinces an MSO to convert from a pilot to a multi-shop annual rollout?
    - How much licensed OEM or supplier data is required to reach production-grade coverage on the first part categories?
    - How defensible is the workflow if Partly, CCC, Mitchell, or OEC launches a similar confidence-scored gate?
    - Do state disclosure and OEM procedure rules create purchase urgency or mainly raise adoption liability concerns?
operatingAssumptions:
  - assumption: Buyers will pay for shadow-mode proof before the product can safely automate most lines.
    basis: research.yaml
    validationTest: Close at least 3 paid pilots at $15k+ each before the first fully automated production account goes live.
    decisionImpact: If false, reposition toward analytics or consulting support instead of workflow software.
  - assumption: The first deployment can run through estimate exports or lightweight connectors rather than deep estimator replacement.
    basis: operator judgment
    validationTest: Deliver first value in under 30 days for 3 pilot accounts with the same core integration playbook.
    decisionImpact: If false, narrow the wedge further or accept a services-led model with lower gross-margin expectations.
  - assumption: Outcome data from one MSO improves routing quality enough to matter for subsequent orders in that same account.
    basis: idea.yaml
    validationTest: Show a measurable drop in low-confidence exception rate or manual overrides between the first and third month of a live pilot.
    decisionImpact: If false, the moat weakens and the product becomes easier for incumbents to copy as a feature.
  - assumption: Expansion beyond regional collision MSOs is achievable once the pre-order decision layer is proven.
    basis: idea.yaml
    validationTest: By month 12, secure at least 10 validated discovery conversations and 2 design-partner candidates in adjacent insurer, distributor, or mechanical workflows.
    decisionImpact: If false, treat the company as a smaller vertical software business and reduce funding ambition.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Interview 25 regional MSOs with centralized parts teams and score the frequency of supplement, return, and ADAS-related ordering pain.
    hypothesis: At least 10 target accounts have a current buying trigger and will engage in a workflow pilot this year.
    successMetric: 10+ qualified prospects with named buyer, current workflow, and recent supplement or return pain.
    owner: Founder CEO
  - horizon: 0–90 days
    experiment: Build the first shadow-mode workflow on exported estimates for bumper, lighting, and ADAS-adjacent parts in one design-partner MSO.
    hypothesis: Shadow mode can identify enough ambiguous or wrong-part lines to justify a paid pilot before full integration is complete.
    successMetric: One design partner sees at least 15 flagged lines with credible reasoning and agrees to paid pilot terms.
    owner: Founding eng
  - horizon: 0–90 days
    experiment: Test pricing with 6 prospects using a pilot-to-annual conversion offer tied to supplement and return KPIs.
    hypothesis: Buyers prefer hybrid location-plus-volume pricing over per-seat pricing.
    successMetric: 4+ prospects accept the proposed pricing frame as credible for procurement budget review.
    owner: Founder CEO
  - horizon: 3–6 months
    experiment: Run 3 paid pilots across two estimator or BMS environments and benchmark deployment effort.
    hypothesis: A repeatable connector playbook can keep deployment under 45 days and below 2 engineer-weeks of custom work.
    successMetric: 3 paid pilots live with median time to first value under 45 days.
    owner: Solutions engineer
  - horizon: 6–12 months
    experiment: Turn the best pilot into a production gating deployment with low-confidence routing and audit logs.
    hypothesis: Shadow-mode proof is enough for at least one MSO to allow the tool to block or reroute high-risk lines before order submission.
    successMetric: 1 production account and 30%+ of targeted risky lines governed by the fitment gate.
    owner: Product lead
  - horizon: 6–12 months
    experiment: Validate one partner route with an estimator, consultant, supplier network, or insurer channel.
    hypothesis: At least one channel partner can shorten sales cycles or lower integration friction after direct ROI proof exists.
    successMetric: 2 partner-sourced opportunities and 1 signed channel or integration agreement.
    owner: Partnerships lead
operations:
  - Maintain a model-agnostic evaluation set using accepted, rejected, returned, and supplemented line items so model vendors can be benchmarked and swapped.
  - Run every deployment with auditable part provenance, confidence thresholds, exception logs, and explicit handling for ADAS- or disclosure-sensitive recommendations.
  - Standardize onboarding around estimate ingestion, VIN decode, rule mapping, ordering handoff, and weekly KPI reviews rather than custom project work.
  - Prioritize repeatable connectors to the dominant estimator and BMS paths before adding broader procurement or claims integrations.
team:
  - role: Founding eng
    startTiming: Month 0
    rationale: Build the first shadow-mode product, connector framework, and evaluation tooling needed for credible pilots.
  - role: Founder CEO
    startTiming: Month 0
    rationale: Own design-partner sales, workflow discovery, and pricing because early deals require founder-level trust and rapid iteration.
  - role: Solutions engineer
    startTiming: Month 3
    rationale: Reduce deployment friction, codify integration playbooks, and keep pilots from consuming core engineering bandwidth.
  - role: Product and data lead
    startTiming: Month 6
    rationale: Turn pilot learnings into rule libraries, feedback loops, and roadmap discipline across model quality and workflow UX.
  - role: Partnerships lead
    startTiming: Month 9
    rationale: Build estimator, consultant, supplier, and insurer channels only after direct deployments prove repeatable value.
milestones:
  - horizon: 0–12 months
    items:
      - Sign 3 paid pilots with regional MSOs in the 10-50 shop band.
      - Ship one repeatable shadow-mode workflow and at least one production gating deployment.
      - Standardize the first estimator or BMS connector path and prove deployment under 45 days.
  - horizon: 12–24 months
    items:
      - Reach 8-10 production MSOs with measurable supplement and return reduction in the core categories.
      - Launch rule configuration for insurer, supplier, and regional workflow variance.
      - Validate one adjacent expansion motion in distributor, insurer, or mechanical repair workflows.
  - horizon: 24–36 months
    items:
      - Reach roughly 20 MSO accounts, consistent with the researched year-3 SOM case.
      - Expand beyond shadow-mode into a broader decision-control layer across more part categories and adjacent repair workflows.
      - Show that expansion revenue from existing accounts and adjacent channels can support a venture-scale path beyond the initial beachhead.
risks:
  - risk: Incumbent estimating or procurement platforms add a similar fitment gate before the startup wins enough workflow ownership.
    likelihood: Medium
    impact: High
    mitigation: Differentiate on closed-loop outcome data, model-agnostic evaluation, and faster shadow-to-production deployment rather than generic AI features.
  - risk: Integration effort into existing estimator, BMS, or ordering stacks stays too custom for efficient sales.
    likelihood: High
    impact: High
    mitigation: Start with export-based overlays, narrow supported systems aggressively, and treat connector repeatability as a board-level milestone.
  - risk: Model quality on edge cases stays too low for buyers to trust blocking or rerouting decisions.
    likelihood: High
    impact: High
    mitigation: Constrain the first category set, keep a human exception queue, and use live outcome data to tune thresholds before expanding autonomy.
  - risk: ADAS, OEM disclosure, or provenance requirements make buyers fear liability from automated recommendations.
    likelihood: Medium
    impact: High
    mitigation: Keep audit logs, expose the reasoning inputs, and never auto-send low-confidence or policy-sensitive recommendations.
  - risk: The collision MSO beachhead remains a good product business but too small for strong venture returns.
    likelihood: Medium
    impact: High
    mitigation: Validate adjacent insurer, distributor, and mechanical workflows within the first 12 months and adjust funding pace if expansion evidence is weak.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: >-
    Fund 18 months of product build, connector development, pilot deployment,
    evaluation infrastructure, and founder-led sales to prove a repeatable
    shadow-mode-to-production motion with 3-5 paid pilots, at least one
    production MSO rollout, and early evidence for adjacent market expansion.
