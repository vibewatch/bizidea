openQuestions:
- What minimum confidence threshold will buyers accept before the tool can block or reroute a line item instead of only recommending one?
- How much licensed OEM and supplier data is required to hit production-grade coverage on bumper, lighting, and ADAS-adjacent parts across the target vehicle mix?
- Will insurers or supplier networks co-fund deployment if the product improves DRP compliance and cycle-time transparency?
- Which estimating and BMS stacks dominate 10-50 location regional MSOs, and where are integrations easiest to standardize first?
