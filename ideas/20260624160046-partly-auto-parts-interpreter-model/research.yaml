    sourceRefs:
    - 93
    - 96
  validationPlan:
  - priority: high
    question: Can a shadow-mode copilot catch enough wrong parts and supplements to pay back within one quarter?
    evidenceToGather: Run a 6-week shadow pilot on bumper, lighting, and ADAS-adjacent lines in two regional MSOs and compare supplement, return, and cycle-time outcomes.
  - priority: high
    question: 'Which data ingredients most improve fitment confidence: OEM procedures, ACES/VCdb, supplier catalogs, or shop outcome history?'
    evidenceToGather: Re-score 500 historical estimates using stepwise ablation and log which source removed each ambiguity.
  - priority: medium
    question: Will carriers or supplier networks co-sponsor deployment if compliant ordering becomes more auditable?
    evidenceToGather: Interview one DRP insurer, two supplier networks, and three regional MSOs around shared KPI ownership and rollout economics.
