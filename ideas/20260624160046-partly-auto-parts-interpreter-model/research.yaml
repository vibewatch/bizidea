competitors:
- name: Partly
  stage: scale-up
  wedge: Domain-specific fitment model and procurement infrastructure for collision parts
  pricing: Custom / enterprise
  strength: Specialist model, manufacturer agreements, workflow integrations, and early MSO ROI claims around returns and supplementaries.
  weaknessVsUs: Broader platform ambition can feel heavy for buyers who only need pre-order gating inside existing North American estimating workflows.
  sourceRefs:
  - 2
  - 5
  - 7
  - 8
  - 9
  - 110
  - 111
- name: Orderly / PartsTrader
  stage: incumbent
  wedge: DRP-ready end-to-end procurement marketplace and workflow automation
  pricing: Custom / demo-led
  strength: Supplier and carrier network scale, live quoting, and 650+ location deployment proof with Crash Champions.
  weaknessVsUs: Optimizes sourcing and compliance after parts selection; it is not marketed as a fitment-first reasoning layer for ambiguous estimate lines.
  sourceRefs:
  - 12
  - 15
  - 21
- name: CCC ONE
  stage: incumbent
  wedge: System-of-record estimating, ordering, workflow, and supplier connectivity for collision shops
  pricing: Custom / quote-based
  strength: Embedded estimator workflow, 5,000+ suppliers, OEM data, and tight carrier adjacency.
  weaknessVsUs: Broad platform orientation means fitment reasoning is one feature among many, not the product's core closed-loop learning loop.
  sourceRefs:
  - 26
  - 32
  - 37
  - 40
- name: Mitchell
  stage: incumbent
  wedge: Estimating plus parts sourcing and diagnostics/calibration automation
  pricing: Custom / quote-based
  strength: Deep estimating footprint, recommended ADAS operations, and integrations into OEC and calibration workflows.
  weaknessVsUs: Focuses on estimate authoring and diagnostic line population more than supplier-agnostic fitment exception routing across procurement outcomes.
  sourceRefs:
  - 49
  - 52
  - 57
- name: CollisionLink / OEC
  stage: incumbent
  wedge: OEM-direct parts procurement and dealer routing
  pricing: Subscription / dealer-network based; not public
  strength: OEM-direct data, discounted OEM parts, and direct ordering from estimating workflows.
  weaknessVsUs: Best when the part path is already known; weaker on interpreting assemblies, supersessions, and mixed OEM/aftermarket/recycled ambiguity.
  sourceRefs:
  - 57
  - 58
