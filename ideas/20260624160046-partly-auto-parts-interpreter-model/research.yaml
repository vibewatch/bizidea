    - 84
  - factor: political
    impact: neutral
    point: Government VIN-data infrastructure lowers the friction of building interoperable repair-data products, but policy itself does not remove OEM- and insurer-specific workflow complexity.
    sourceRefs:
    - 69
  adoptionFrictionMatrix:
  - friction: Estimators may distrust an AI recommendation that overrides local shop habits.
    severity: high
    affectedBuyer: Repair planner or centralized parts manager
    mitigation: Start in shadow mode with confidence thresholds and a human exception queue before introducing any ordering gate.
    sourceRefs:
    - 8
    - 37
    - 99
  - friction: Integrating into existing estimating and ordering stacks can stall pilots.
    severity: high
    affectedBuyer: VP operations or IT lead
    mitigation: Start with file/API connectors into the dominant estimator and BMS workflows, then deepen automation after KPI proof.
    sourceRefs:
    - 9
    - 26
    - 57
  - friction: Supplier and insurer rule variance across regions can make one-size-fits-all automation brittle.
    severity: medium
    affectedBuyer: Director of parts procurement
    mitigation: Support configurable business rules, preferred-routing logic, and regional overrides by insurer and supplier network.
    sourceRefs:
    - 13
    - 14
    - 15
    - 38
  - friction: ADAS-sensitive or OEM-restricted parts create liability anxiety.
    severity: high
    affectedBuyer: Quality or compliance leader
    mitigation: Automatically surface OEM procedure and state disclosure context and prevent low-confidence recommendations from auto-send.
    sourceRefs:
    - 73
    - 78
    - 82
    - 84
