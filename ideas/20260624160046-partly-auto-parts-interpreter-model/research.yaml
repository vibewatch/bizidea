reportMemo:
  executiveTakeaways:
  - 'This is a pre-order decision-control problem, not just an e-commerce problem: Partly''s benchmark and MSO proof point tie better parts interpretation to fewer supplementaries, fewer returns, and shorter key-to-key time.[5][8]'
  - 'Vertical AI is now credible in this niche: Partly''s reported 60% F1 on complex fitment tasks versus 1%-5% for general AI implies a usable quality gap between domain-trained and horizontal models.[7][111]'
  - 'ADAS is compounding urgency: CCC says calibration incidence climbed from 0.9% of repairable appraisals in 2017 to more than 23% in 2025, and Caliber projects up to 60% of collision repairs will require mandated calibrations in 2025.[40][92]'
  - 'Regional MSOs are the right beachhead because the market is consolidating but still fragmented: Focus counts 800+ independent MSOs even as the Big Five continue to take share.[95][96]'
  - 'Incumbents validate spend but leave whitespace: Orderly, CCC, Mitchell, and CollisionLink all help transact or document parts workflows, yet the clearest gap remains confidence-scored fitment gating before an order is placed.[15][21][26][49][58]'
  marketDefinition: 'The relevant market is pre-order collision-parts decision software: tools that ingest VIN and estimate data, resolve the correct part path across OEM, aftermarket, and recycled options, and route uncertain lines to a human before a PO is sent. It sits between estimating systems, supplier networks, OEM repair data, and downstream procurement platforms, and excludes generic shop management or pure post-order AP tools.[2][7][26][49][60][63][69]'
  customerAndBuyer: 'Daily users are repair planners, estimators, and centralized parts coordinators who must translate a VIN and estimate lines into orderable parts under time pressure. The economic buyer is usually the VP of operations, director of parts procurement, or regional MSO leader centralizing process across 10-50 shops. External market structure points to the middle market rather than tiny independents or national consolidators: Focus tracks 800+ independent MSOs, while FenderBender''s survey shows the average shop profile is already operationally substantive.[42][95][96][99]'
  buyingTriggers:
  - point: Supplement volume rises after centralizing buying or taking on newer, ADAS-heavier vehicle mix.
    sourceRefs:
    - 37
    - 40
    - 92
  - point: Supplier scarcity and backorders make estimate cleanliness and electronic ordering more important to get the right part quickly.
    sourceRefs:
    - 38
    - 45
    - 103
  - point: An MSO wants to standardize procurement across locations without replacing the estimating system its shops already use.
    sourceRefs:
    - 9
    - 21
    - 95
  willingnessToPay:
    summary: Willingness to pay is credible because this workflow sits next to large existing costs. CCC says parts are the largest portion of repair cost, HLDI reports collision claim severity of $8,739, FenderBender reports $5,000+ average repair orders and 11-day key-to-key cycle time, and AAA shows ADAS components alone can add $1,540 to a minor front collision repair. A product that prevents even a small share of wrong-part returns or supplement delays can pay for itself quickly.
    sourceRefs:
    - 45
    - 90
    - 91
    - 99
    - 103
  competitiveLandscape: 'The competitive set splits into four buckets: AI-first fitment infrastructure (Partly), open procurement platforms (Orderly/PartsTrader), OEM-direct procurement networks (CollisionLink), and broad estimating/workflow suites (CCC and Mitchell). All validate demand for better parts workflow, but most start after the part choice is already mostly known. The whitespace is a confidence-scored decision layer that resolves ambiguous lines earlier, documents why a part was chosen, and learns from accept/reject/return outcomes across shops.[2][12][15][21][26][49][58][110]'
  incumbentThesis:
  - incumbentClass: Estimating and workflow suites
    point: CCC and Mitchell are embedded systems of record, but they do not win by default because fitment reasoning is one module inside a broad platform rather than a dedicated decision-control layer with closed-loop learning from returns, supplements, and exceptions.
    sourceRefs:
    - 26
    - 49
    - 52
  - incumbentClass: Procurement marketplaces and networks
    point: Orderly and CollisionLink are strong at live quoting, supplier routing, DRP compliance, and OEM-direct ordering, but they assume the shop can already identify the right line-item path more often than this startup does.
    sourceRefs:
    - 12
    - 15
    - 21
    - 57
    - 58
  - incumbentClass: Domain-specific AI platforms
    point: Partly validates that a specialist model can outperform generic AI, yet its platform scope spans estimation through procurement and broader network infrastructure, leaving room for a lighter-weight pre-order gating product inside existing North American workflows.
    sourceRefs:
    - 5
    - 7
    - 8
    - 9
    - 110
    - 111
  - incumbentClass: Manual expert workflows
    point: The default substitute remains senior estimator or parts-manager judgment layered over supplier portals, spreadsheets, and phone calls; it is trusted, but it does not scale well across regional MSOs facing staffing pressure and rising vehicle complexity.
    sourceRefs:
    - 37
    - 42
    - 99
    - 103
  regulatoryLandscape: Regulation is indirect but operationally material. State crash-parts disclosure and consent rules require repairers to distinguish OEM and non-OEM parts accurately, California BAR explicitly restricts fuzzy labels such as “opt-OEM” and “LKQ” in consumer-facing paperwork, and OEM ADAS repair position statements raise the bar for when aftermarket or salvaged components can be used safely. The startup therefore needs auditable part provenance, confidence thresholds, and exception logging rather than a black-box recommender.[73][78][82][84]
  technologyLandscape: 'The stack is now mature enough to build on: Auto Care''s ACES/PIES/VCdb standards normalize aftermarket fitment data, NHTSA''s vPIC provides VIN decoding, I-CAR and OEM documents encode calibration and procedure rules, and incumbent suites already expose integration points for ordering and diagnostics. The hard problem has shifted from basic data access to reasoning across assemblies, supersessions, trim/package variance, and supplier-specific purchasability in live workflows.[8][52][60][63][69][73][77]'
  distributionChannels:
  - point: Direct sales into regional MSOs centralizing parts procurement is the clearest first motion because supplement, return, and cycle-time pain compounds across locations.
    sourceRefs:
    - 95
    - 96
    - 99
  - point: Embedded or channel distribution through estimating and BMS partners can shorten adoption because repairers prefer workflow-native tools over another standalone screen.
    sourceRefs:
    - 9
    - 26
    - 57
  - point: Supplier-network and insurer/DRP partnerships are credible channels where compliance, transparency, and preferred-routing rules already matter.
    sourceRefs:
    - 13
    - 14
    - 21
    - 38
  partnershipEcosystem:
  - point: Estimating and BMS integration partners matter because repairers already live inside those systems and resist duplicate entry.
    sourceRefs:
    - 9
    - 26
    - 57
  - point: Fitment-data and VIN infrastructure partners matter because accuracy depends on normalized VCdb/ACES data and reliable decode services.
    sourceRefs:
    - 60
    - 63
    - 69
  - point: Supplier and insurer ecosystem partners matter because business rules, DRP requirements, and preferred routing differ by network.
    sourceRefs:
    - 13
    - 14
    - 15
    - 21
  dataMoats:
  - point: Accepted, rejected, returned, and supplemented line-item history across MSOs can outperform static catalog data over time.
    sourceRefs:
    - 5
    - 8
    - 37
  - point: Mapping VIN, ACES/VCdb, OEM procedure, and calibration triggers into one decision graph is harder to copy than another procurement UI.
    sourceRefs:
    - 60
    - 63
    - 69
    - 73
    - 77
  - point: Supplier- and insurer-specific rule libraries become proprietary once tied to which decisions actually reduced cycle time or avoided rework.
    sourceRefs:
    - 13
    - 14
    - 21
    - 38
  geographicConsiderations:
  - point: The U.S. is the right first market because it is the largest collision market and the most mature for MSO consolidation and procurement standardization.
    sourceRefs:
    - 93
    - 95
    - 110
  - point: California-like disclosure regimes and OEM-sensitive ADAS repairs make rule-heavy states strong beachheads for an auditable product.
    sourceRefs:
    - 78
    - 82
    - 84
  - point: Regional rollout matters more than national coverage at launch because supplier relationships, vehicle mix, and centralization maturity vary sharply by MSO footprint.
    sourceRefs:
    - 95
    - 96
    - 99
  sensitivityCases:
  - case: OEM suites and procurement incumbents ship fitment copilots faster than expected
    impact: Sales cycles lengthen and the startup must differentiate on confidence-scored exception routing, feedback loops, and auditability rather than baseline ordering UX.
    sourceRefs:
