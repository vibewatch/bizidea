slug: collision-supplement-fitment-copilot
date: "2026-06-24"
currency: USD
modelStartMonth: "2026-07"
assumptions:
  - id: A1
    name: 模型起始月份
    value: "2026-07"
    unit: YYYY-MM
    source: "[BP date 2026-06-24] 运营模型从商业计划日期后的第一个完整月份开始。"
  - id: A2
    name: 期初现金 / 种子前融资
    value: "$2.4M"
    unit: USD
    source: "[BP fundingAsk targetFundingRangeUsd $2-4M + BP fundingAsk.runwayMonths 18] 基础情景使用融资区间下限，因为计划保持轻量集成，并在六个月缓冲期内到达下一个验证节点。"
  - id: A3
    name: 期初付费客户数
    value: "0"
    unit: count
    source: "[BP milestones 0-12 months + BP gtm.wedge] 公司以零营收起步，需先将共创客户工作转化为付费 pilot。"
  - id: A4
    name: 付费客户定义
    value: 付费 pilot 或已铺开的生产 MSO 客户
    unit: definition
    source: "[BP investorMemo.firstCustomer.initialContract + BP businessModel.revenueStreams] customersEop 计入所有已为 pilot、订阅、使用量或实施范围付费的客户。"
  - id: A5
    name: 付费 pilot 经济模型
    value: "约 2 个月收费 $20K（约 $10K/月）"
    unit: USD/account
    source: "[BP gtm.pricing $15k-$25k for 6-8 weeks + BP investorMemo.firstCustomer.initialContract] 模型使用 pilot 价格和周期的中间值。"
  - id: A6
    name: 成熟铺开 MSO 收入水平
    value: "按核心 $9/审核订单年化约 $126K，加上位置底价和高级规则包后约 $134K"
    unit: USD/account/year
    source: "[Research market.som 20 MSOs × 20 shops × 700 orders × $9 + BP gtm.pricing $70k-$120k ACV hybrid contract] 基础情景以研究自下而上的订单量测算锚定成熟收入，再允许来自平台费和配置附加包的适度上行。"
  - id: A7
    name: 客户增长节奏
    value: "第 12 个月 4 个付费客户，第 2 年第 4 季度 10 个，第 3 年第 4 季度 20 个"
    unit: customersEop
    source: "[BP milestones 0-12, 12-24, and 24-36 months + BP market.som + Research market.som] 基础情景与里程碑路径一致，并在第 3 年铺开到研究支持的 20 家门店情景。"
  - id: A8
    name: 收入确认惯例
    value: 期末活跃付费客户数乘以该期间每客户的混合已实现月度或季度收入
    unit: formula
    source: "[BP gtm.pricing + BP businessModel.unitOfValue] 让收入可直接追溯至客户数和定价假设。"
  - id: A9
    name: 毛利率爬坡
    value: "第 1 年 45%–55%，第 2 年 60%–68%，第 3 年 69%–72%"
    unit: gross margin percent
    source: "[BP businessModel.targetGrossMarginPct 70 + BP strategicChoices.sequencingRationale + BP operatingAssumptions] 早期 pilot 带有人工审核和连接器拖累，直到打包部署路径接近目标毛利率。"
  - id: A10
    name: 招聘时间线
    value: "第 1 个月创始人/CEO 和创始工程师；第 4 个月解决方案工程师；第 7 个月产品与数据负责人；第 10 个月合作负责人；第 16 个月第二工程师；第 19 个月第二解决方案岗；第 28 个月财务与运营支持；第 34 个月第三工程师"
    unit: timeline
    source: "[BP team + BP strategicChoices.sequencingRationale + startup-finance heuristic] 计划在增加 GTM 人手之前先补充实施能力，与商业计划的集成优先排序一致。"
  - id: A11
    name: 创始人税后全成本薪酬
    value: "$150K"
    unit: USD/year
    source: "[BP team Founder CEO + startup-finance heuristic] 精简的创始人现金薪酬加薪资税和福利。"
  - id: A12
    name: 工程师税后全成本薪酬
    value: "$190K"
    unit: USD/year
    source: "[BP team Founding eng + startup-finance heuristic] 反映种子前阶段高级数据、适配和连接器工程人才的薪资水平。"
  - id: A13
    name: 解决方案岗税后全成本薪酬
    value: "$155K"
    unit: USD/year
    source: "[BP team Solutions engineer + startup-finance heuristic] 假设实施自主性强，不建立大型服务团队。"
  - id: A14
    name: 产品与数据负责人税后全成本薪酬
    value: "$180K"
    unit: USD/year
    source: "[BP team Product and data lead + startup-finance heuristic] 涵盖工作流 UX、规则库和模型质量运营。"
  - id: A15
    name: 销售与合作岗税后全成本薪酬
    value: "$175K"
    unit: USD/year
    source: "[BP team Partnerships lead + BP gtm.channels + startup-finance heuristic] 包含差旅费和创始人辅助企业销售的浮动薪酬。"
  - id: A16
    name: 管理与运营岗税后全成本薪酬
    value: "$120K"
    unit: USD/year
    source: "[startup-finance heuristic] 精简的财务、供应商和合规支持，仅在铺开路径确立后才新增。"
  - id: A17
    name: 薪酬分配至损益各科目
    value: 创始人 75% 销售与市场 + 25% 一般行政；工程及产品/数据 100% 研发；解决方案 50% 销售与市场 + 50% 研发；合作 100% 销售与市场；财务与运营 100% 一般行政
    unit: allocation
    source: "[BP team role rationales + BP operations] 职能薪酬归属遵循收入创造、部署和内部支持的责任归属。"
  - id: A18
    name: 非薪酬运营支出爬坡
    value: "月度非薪酬支出从第 1 年初期销售市场/研发/一般行政约 $3.5K/$5K/$5K，爬坡至第 3 年第 4 季度约 $17K/$16K/$8.5K"
    unit: USD/month
    source: "[BP operations + startup-finance heuristic] 涵盖差旅、云服务、数据访问、保险和法务，同时对付费获客保持精简。"
  - id: A19
    name: 现金转化惯例
    value: 现金变动等于 EBITDA
    unit: formula
    source: "[startup-finance heuristic] 在此阶段，资本支出、税款、融资费用和营运资金时间差均视为不重要。"
  - id: A20
    name: 稳态月度流失率
    value: "1.5%"
    unit: percent per month
    source: "[startup-finance heuristic for early enterprise workflow SaaS] 年度采购工作流应具有较强粘性，但模型仍假设真实的流失风险。"
  - id: A21
    name: CAC 计算惯例
    value: 第 2–3 年销售与市场支出除以 16 个净新付费客户
    unit: formula
    source: "[model calc using base-case S&M spend + BP gtm.funnelTargets] 捕捉从 4 家到 20 家客户规模扩张期间，创始人主导加合作伙伴主导的客户获取成本。"
  - id: A22
    name: 下轮融资里程碑
    value: "第 3 年第 2 季度铺开 15 家 MSO，一个相邻流程共创客户，季度烧钱低于 $100K"
    unit: milestone
    source: "[BP milestones 12-24 months + BP fundingAsk.runwayMonths 18 + model cash curve] 融资规模覆盖到种子轮就绪验证节点，并保留约六个月现金缓冲。"
