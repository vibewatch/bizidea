scenarios:
  downside:
    description: 销售周期拖延，pilot 转化更慢，生产定价更接近 ACV 区间下限。
    y3RevenueK: 1600.0
    y3EbitdaK: -640.0
    cashLowPointK: 180.0
    keyAssumptionChanges:
      - 第 3 年第 4 季度客户数约 15 家，而非 20 家。
      - 成熟客户 ARPU 维持在约 $115K–$120K，而非研究支持的 $126K+ 铺开情景。
      - 毛利率卡在 60% 出头，因为连接器工作仍偏定制。
  base:
    description: 公司把早期 pilot 转化为可重复的区域铺开，到年底达到研究支持的 20 家 SOM，并在第 3 年末接近目标毛利率。
    y3RevenueK: 2149.8
    y3EbitdaK: -260.2
    cashLowPointK: 682.2
    keyAssumptionChanges:
      - 第 12 个月 4 个付费客户，第 2 年第 4 季度 10 个，第 3 年第 4 季度 20 个。
      - 成熟铺开客户的变现水平接近每审核订单 $9 的研究锚点，加上适度的位置底价上行。
      - 随着部署和规则映射更加标准化，毛利率在第 3 年第 4 季度爬升至 72%。
  upside:
    description: Pilot 验证强于预期，合作渠道在第 2 年开始贡献收入，且有更多客户更早加购高级规则包。
    y3RevenueK: 2800.0
    y3EbitdaK: 140.0
    cashLowPointK: 760.0
    keyAssumptionChanges:
      - 第 3 年第 4 季度客户数约 24 家，而非 20 家。
      - 成熟客户混合年化收入通过更快铺开和附加规则包达到约 $140K。
      - 随着人工异常工作量下降快于预期，毛利率达到 70% 中段。
sensitivity:
  - variable: ARPU
    downsideCase: 铺开 MSO 平均年化收入约 $120K，低于基础情景的 $132K。
    baseCase: 成熟客户到第 3 年年化收入约 $132K。
    upsideCase: 成熟客户通过更高订单量和高级规则达到年化约 $140K。
    y3RevenueImpactK: -195.0
    cashImpactK: -150.0
  - variable: CAC
    downsideCase: 合作伙伴转介不及预期，CAC 升至约 $95K。
    baseCase: 创始人主导销售加一名合作负责人，CAC 维持在约 $73.9K。
    upsideCase: 直接转介和顾问渠道把 CAC 压至约 $60K。
    y3RevenueImpactK: -80.0
    cashImpactK: -220.0
  - variable: churn
    downsideCase: 如果 ROI 在不同 MSO 间可重复性较差，月度流失率升至 2.5%。
    baseCase: 生产工作流上线后月度流失率维持在 1.5%。
    upsideCase: 适配拦截门嵌入采购流程后月度流失率保持在约 1.0%。
    y3RevenueImpactK: -140.0
    cashImpactK: -110.0
  - variable: sales cycle
    downsideCase: Pilot 到铺开的周期从约一个季度拉长至两个季度。
    baseCase: 最佳 pilot 在验证后约一个季度内转为更大范围铺开。
    upsideCase: 强劲的 KPI 验证让铺开审批缩短至不足一个季度。
    y3RevenueImpactK: -310.0
    cashImpactK: -250.0
  - variable: gross margin
    downsideCase: 实施工作仍半定制化，毛利率上限约 66%。
    baseCase: 第 3 年毛利率约 71%，第 3 年第 4 季度约 72%。
    upsideCase: 连接器和异常规则标准化快于预期，毛利率达到约 75%。
    y3RevenueImpactK: 0.0
    cashImpactK: -170.0
  - variable: hiring pace
    downsideCase: 两个规模扩张招聘提前两个季度，在铺开经济性验证前执行。
    baseCase: 招聘遵循商业计划中实施优先的排序。
    upsideCase: 最后一个工程岗推迟到第 3 年验证后，不影响交付能力。
    y3RevenueImpactK: 40.0
    cashImpactK: -190.0
modelDiagram:
  title: 单位经济模型流
  mermaid: |
    flowchart LR
      Pipeline[Qualified MSO pipeline] --> Pilots[Paid pilots]
      Pilots --> Rollouts[Rolled-out MSOs]
      Rollouts --> ReviewedOrders[Reviewed repair orders]
      ReviewedOrders --> Revenue[Subscription + usage revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash and runway]
modelSanity:
  - checkName: 收入引擎
    finding: 基础收入由第 1 年末 4 个付费客户增长到第 3 年第 4 季度 20 家铺开 MSO 驱动，成熟客户收入向研究支持的每订单消费水平收敛。
  - checkName: 必须做对的事
    finding: 实施打法必须保持足够可复用，让一个创始人主导的 GTM 动作和两个解决方案岗在不压垮毛利率的前提下支撑第 2 年第 4 季度 10 个客户。
  - checkName: 模型失效条件
    finding: 如果 pilot 到铺开的周期翻倍，或成熟客户 ARPU 卡在定价区间下限，下行情景的现金会在种子轮故事成熟之前烧向 $200K 以下。
  - checkName: 下轮融资验证
    finding: 下一轮融资的条件是第 3 年第 2 季度铺开 15 家 MSO，有一个相邻流程共创客户，且季度烧钱已低于 $100K。
sanityChecks:
  ruleOf40: 第 3 年增长率 108.3% + EBITDA 利润率 -12.1% = 96.2%
  burnMultiple: 第 2 年烧钱倍数约 0.9x（约 $76 万 EBITDA 烧钱对应约 $84 万净新 ARR）；第 3 年下半年接近盈亏平衡。
  revenuePerFte: 第 3 年 9 人末尾人数对应 $239K（垂直 SaaS 基准 $200–400K）
  flags:
    - 基础情景实际上在第 3 年末达到研究支持的 20 家 SOM 铺开，因此风险投资上行空间仍依赖商业计划中描述的相邻扩张路径。
    - 毛利率到第 3 年才达到目标 70%，因此可复用连接器和严格的范围管控是硬性要求。
    - customersEop 在第 1 年同时包含付费 pilot 和铺开客户，因此早期模型中真实生产客户数低于标题客户数。
    - 现金按 EBITDA 建模，不含营运资金时间差、递延收入收益或资本支出拖累，在此阶段合理但不精确。
