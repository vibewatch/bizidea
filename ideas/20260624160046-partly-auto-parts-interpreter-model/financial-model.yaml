slug: collision-supplement-fitment-copilot
date: "2026-06-24"
currency: USD
modelStartMonth: "2026-07"
assumptions:
  - id: A1
    name: Model start month
    value: "2026-07"
    unit: YYYY-MM
    source: "[BP date 2026-06-24] the operating model starts in the first full month after the dated business plan."
  - id: A2
    name: Opening cash / pre-seed raise
    value: "$2.4M"
    unit: USD
    source: "[BP fundingAsk targetFundingRangeUsd $2-4M + BP fundingAsk.runwayMonths 18] the base case uses the low end of the stated raise range because the plan stays integration-light and reaches the next proof point with a six-month buffer."
  - id: A3
    name: Starting paying customers
    value: "0"
    unit: count
    source: "[BP milestones 0-12 months + BP gtm.wedge] the company begins pre-revenue and must first convert design-partner work into paid pilots."
  - id: A4
    name: Paying customer definition
    value: A paid pilot or a rolled-out production MSO account
    unit: definition
    source: "[BP investorMemo.firstCustomer.initialContract + BP businessModel.revenueStreams] customersEop counts any account already paying for pilot, subscription, usage, or implementation scope."
  - id: A5
    name: Paid pilot economics
    value: "$20K over about 2 months (~$10K per month)"
    unit: USD/account
    source: "[BP gtm.pricing $15k-$25k for 6-8 weeks + BP investorMemo.firstCustomer.initialContract] the model uses the midpoint pilot price and duration."
  - id: A6
    name: Mature rolled-out MSO revenue level
    value: "~$126K annualized at the core $9 per reviewed order, rising to ~$134K with location floor and premium rule packages"
    unit: USD/account/year
    source: "[Research market.som 20 MSOs × 20 shops × 700 orders × $9 + BP gtm.pricing $70k-$120k ACV hybrid contract] the base case anchors mature revenue to the research bottom-up order-volume math, then allows modest upside from the platform fee and configuration add-ons."
  - id: A7
    name: Customer ramp
    value: "4 paying accounts by M12, 10 by Q4Y2, and 20 by Q4Y3"
    unit: customersEop
    source: "[BP milestones 0-12, 12-24, and 24-36 months + BP market.som + Research market.som] the base case matches the milestone path and reaches the researched 20-account year-3 rollout case."
  - id: A8
    name: Revenue recognition convention
    value: Period-end active paying accounts multiplied by the blended realized monthly or quarterly revenue per account for that period
    unit: formula
    source: "[BP gtm.pricing + BP businessModel.unitOfValue] this keeps revenue directly traceable to customer count and pricing assumptions."
  - id: A9
    name: Gross margin ramp
    value: "45%-55% in Y1, 60%-68% in Y2, and 69%-72% in Y3"
    unit: gross margin percent
    source: "[BP businessModel.targetGrossMarginPct 70 + BP strategicChoices.sequencingRationale + BP operatingAssumptions] early pilots carry manual review and connector drag before the packaged deployment path approaches the target gross margin."
  - id: A10
    name: Hiring timeline
    value: "M1 founder CEO and founding engineer; M4 solutions engineer; M7 product and data lead; M10 partnerships lead; M16 second engineer; M19 second solutions hire; M28 finance and ops support; M34 third engineer"
    unit: timeline
    source: "[BP team + BP strategicChoices.sequencingRationale + startup-finance heuristic] the plan adds implementation capacity before extra GTM headcount, consistent with the business plan's integration-first sequencing."
  - id: A11
    name: Founder loaded compensation
    value: "$150K"
    unit: USD/year
    source: "[BP team Founder CEO + startup-finance heuristic] lean founder cash pay plus payroll taxes and benefits."
  - id: A12
    name: Engineering loaded compensation
    value: "$190K"
    unit: USD/year
    source: "[BP team Founding eng + startup-finance heuristic] reflects senior data, fitment, and connector engineering talent at pre-seed scale."
  - id: A13
    name: Solutions loaded compensation
    value: "$155K"
    unit: USD/year
    source: "[BP team Solutions engineer + startup-finance heuristic] assumes implementation ownership without building a large services bench."
  - id: A14
    name: Product and data lead loaded compensation
    value: "$180K"
    unit: USD/year
    source: "[BP team Product and data lead + startup-finance heuristic] covers workflow UX, rule libraries, and model-quality operations."
  - id: A15
    name: Sales and partnerships loaded compensation
    value: "$175K"
    unit: USD/year
    source: "[BP team Partnerships lead + BP gtm.channels + startup-finance heuristic] includes travel and variable pay for founder-assisted enterprise selling."
  - id: A16
    name: G&A loaded compensation
    value: "$120K"
    unit: USD/year
    source: "[startup-finance heuristic] lean finance, vendor, and compliance support is added only after the rollout motion is established."
  - id: A17
    name: Payroll allocation to P&L lines
    value: Founder 75% S&M and 25% G&A; engineering and product/data 100% R&D; solutions 50% S&M and 50% R&D; partnerships 100% S&M; finance and ops 100% G&A
    unit: allocation
    source: "[BP team role rationales + BP operations] functional payroll follows who owns revenue generation, deployment, and internal support."
  - id: A18
    name: Non-payroll opex ramp
    value: "Monthly non-payroll spend rises from roughly $3.5K/$5K/$5K in early Y1 S&M/R&D/G&A to roughly $17K/$16K/$8.5K by Q4Y3"
    unit: USD/month
    source: "[BP operations + startup-finance heuristic] covers travel, cloud tooling, data access, insurance, and legal while staying lean on paid demand generation."
  - id: A19
    name: Cash conversion convention
    value: Cash movement equals EBITDA
    unit: formula
    source: "[startup-finance heuristic] capex, taxes, financing fees, and working-capital timing are assumed immaterial at this stage."
  - id: A20
    name: Steady-state monthly churn
    value: "1.5%"
    unit: percent per month
    source: "[startup-finance heuristic for early enterprise workflow SaaS] annual procurement workflows should be sticky, but the model still assumes real churn risk."
  - id: A21
    name: CAC convention
    value: Y2-Y3 sales and marketing spend divided by 16 net new paying accounts
    unit: formula
    source: "[model calc using base-case S&M spend + BP gtm.funnelTargets] this captures founder-led plus partner-led customer acquisition during scale-up from 4 to 20 accounts."
  - id: A22
    name: Next-round milestone for funding sizing
    value: "15 rolled-out MSOs by Q2Y3, one adjacent-workflow design partner, and quarterly burn below $100K"
    unit: milestone
    source: "[BP milestones 12-24 months + BP fundingAsk.runwayMonths 18 + model cash curve] the raise is sized to reach a seed-ready proof point and still leave about six months of cash buffer."
