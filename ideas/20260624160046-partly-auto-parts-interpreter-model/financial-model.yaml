scenarios:
  downside:
    description: Sales cycles slip, pilots convert more slowly, and production pricing stays closer to the low end of the stated ACV range.
    y3RevenueK: 1600.0
    y3EbitdaK: -640.0
    cashLowPointK: 180.0
    keyAssumptionChanges:
      - Q4Y3 customersEop lands near 15 instead of 20.
      - Mature account ARPU stays closer to $115K-$120K instead of the research-backed $126K+ rollout case.
      - Gross margin stalls in the mid-60s because connector work stays more custom.
  base:
    description: The company converts early pilots into repeatable regional rollouts, reaches the researched 20-account SOM case by year-end, and approaches target gross margin by late Y3.
    y3RevenueK: 2149.8
    y3EbitdaK: -260.2
    cashLowPointK: 682.2
    keyAssumptionChanges:
      - 4 paying accounts by M12, 10 by Q4Y2, and 20 by Q4Y3.
      - Mature rolled-out accounts monetize near the $9 per reviewed order research anchor plus a modest location-floor uplift.
      - Gross margin climbs to 72% by Q4Y3 as deployment and rule mapping become more repeatable.
  upside:
    description: Pilot proof is stronger than planned, partner channels start contributing in Y2, and more accounts add premium rule packages earlier.
    y3RevenueK: 2800.0
    y3EbitdaK: 140.0
    cashLowPointK: 760.0
    keyAssumptionChanges:
      - Q4Y3 customersEop reaches about 24 instead of 20.
      - Blended annualized revenue per mature account reaches about $140K through faster rollout and add-on rule packs.
      - Gross margin reaches the mid-70s as manual exception work falls faster than planned.
sensitivity:
  - variable: ARPU
    downsideCase: Rolled-out MSOs average about $120K annualized revenue instead of the base-case $132K.
    baseCase: Mature accounts reach about $132K annualized revenue by Y3.
    upsideCase: Mature accounts reach about $140K annualized revenue through higher order volume and premium rules.
    y3RevenueImpactK: -195.0
    cashImpactK: -150.0
  - variable: CAC
    downsideCase: Partner referrals underperform and CAC rises toward $95K.
    baseCase: CAC stays near $73.9K with founder-led selling and one partnerships lead.
    upsideCase: Direct references and consultant channels lower CAC toward $60K.
    y3RevenueImpactK: -80.0
    cashImpactK: -220.0
  - variable: churn
    downsideCase: Monthly churn rises to 2.5% if ROI is less repeatable across MSOs.
    baseCase: Monthly churn holds at 1.5% once production workflows are live.
    upsideCase: Monthly churn stays near 1.0% because the fitment gate becomes embedded in procurement process.
    y3RevenueImpactK: -140.0
    cashImpactK: -110.0
  - variable: sales cycle
    downsideCase: Pilot-to-rollout cycles stretch from roughly one quarter to two quarters.
    baseCase: The best pilots convert to wider rollout within about one quarter of proof.
    upsideCase: Strong KPI proof shortens rollout approvals to less than one quarter.
    y3RevenueImpactK: -310.0
    cashImpactK: -250.0
  - variable: gross margin
    downsideCase: Gross margin tops out around 66% because implementation work remains semi-custom.
    baseCase: Gross margin reaches about 71% for Y3 and 72% in Q4Y3.
    upsideCase: Gross margin reaches about 75% as connectors and exception rules standardize faster.
    y3RevenueImpactK: 0.0
    cashImpactK: -170.0
  - variable: hiring pace
    downsideCase: Two scale hires are pulled forward by two quarters before rollout economics are proven.
    baseCase: Hiring follows the implementation-first sequence in the business plan.
    upsideCase: The final engineering hire is delayed until after Y3 proof without harming delivery.
    y3RevenueImpactK: 40.0
    cashImpactK: -190.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Pipeline[Qualified MSO pipeline] --> Pilots[Paid pilots]
      Pilots --> Rollouts[Rolled-out MSOs]
      Rollouts --> ReviewedOrders[Reviewed repair orders]
      ReviewedOrders --> Revenue[Subscription + usage revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash and runway]
modelSanity:
  - checkName: Revenue engine
    finding: Base revenue is driven by turning 4 paying accounts at the end of Y1 into 20 rolled-out MSOs by Q4Y3 while mature account revenue rises toward the research-backed per-order spend level.
  - checkName: Must go right
    finding: The implementation playbook has to stay repeatable enough that one founder-led GTM motion and two solutions-oriented hires can support 10 accounts by Q4Y2 without crushing gross margin.
  - checkName: Model breaks if
    finding: If pilot-to-rollout timing doubles or mature account ARPU stalls near the low end of the pricing range, the downside case burns toward a sub-$200K cash floor before the seed story is ready.
  - checkName: Next-round proof
    finding: The next financing case is 15 rolled-out MSOs by Q2Y3 with one adjacent-workflow design partner and quarterly burn already below $100K.
sanityChecks:
  ruleOf40: Y3 growth 108.3% + EBITDA margin -12.1% = 96.2%
  burnMultiple: Y2 burn multiple is about 0.9x using roughly $0.76M of EBITDA burn against about $0.84M of net new ARR; H2Y3 is near breakeven.
  revenuePerFte: $239K Y3 on 9 ending FTE (benchmark $200-400K vertical SaaS)
  flags:
    - The base case effectively reaches the researched 20-account SOM rollout by the end of Y3, so venture upside still depends on the adjacent expansion path described in the business plan.
    - Gross margin does not hit the stated 70% target until Y3, so repeatable connectors and disciplined scope control are mandatory.
    - customersEop includes both paid pilots and rolled-out accounts in Y1, so true production-logo count trails the headline customer number early in the model.
    - Cash is modeled as EBITDA with no working-capital timing, deferred revenue benefit, or capex drag, which is reasonable at this stage but not exact.
