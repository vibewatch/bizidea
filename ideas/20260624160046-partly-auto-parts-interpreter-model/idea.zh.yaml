problem: >-
  碰撞修复连锁机构的利润和周转时间持续流失——估价师和配件经理必须把 VIN 码、车型配置和
  保险估单，在分散的目录中逐一转化为精准的原厂、副厂或再制造件。通用 AI 在这个流程里
  根本不够准确，一个错误推荐就会引发追加工单、退件运费和交货延误，最终影响客户和保险公司
  对修复周期的满意度。大多数区域性 MSO 仍依赖估价软件、经销商门户，以及资深配件人员的
  经验来在下单前发现适配边界案例。
targetUser:
  primary: >-
    美国区域性碰撞修复 MSO（10–50 家门店）的集中配件采购经理
  secondary: >-
    多店独立修复集团的碰撞估价师和配件协调员
  buyer: 区域性 MSO 的运营副总裁或配件采购总监
startupThesis:
  nonObviousInsight: >-
    真正的机会不是再造一个通用的门店助手，而是在配件适配推理终于足够自动化前 80%
    案例的今天，拿下估单到订单的决策控制点。一旦垂直模型能解读适配关系，真正稀缺的
    资产就变成了关于报价、替换、退件、追加工单和最终修复结果的闭环工作流数据——而这
    正是现有目录工具和估价软件至今仍未能结构化的东西。
  beachhead: >-
    拥有 10–50 家门店、集中配件采购、且在保险杠、灯具和 ADAS 相关件上因车型配置
    和选装包适配失误频发追加工单的美国区域性碰撞修复 MSO。
  wedge: >-
    一个在创建采购订单前接收 VIN 和估单明细行的估单审核助手——推荐带置信度评分的
    可下单配件，并把低置信度匹配项路由到人工异常队列，而不是让错误订单流向经销商。
  whyNowCatalyst: >-
    Partly 报告的跃升——从通用模型的 1–5% 精度到适配任务的 60% F1 值，背后有五年
    人工反馈数据和 50 家以上厂商数据集支撑——说明这个工作流刚刚从"风险太高不敢自动化"
    跨入"窄域已可跑通生产级 pilot"。
  ventureScalePath: >-
    从碰撞修复 MSO 起步，依次扩展至机械维修连锁、保险直修网络、废旧件和副厂经销商，
    最终成为订单、报价、库存和理赔流程中都内嵌的适配决策层。
solution: >-
  产品是一个插在估价软件和配件订单之间的工作流层。它从维修估单中提取 VIN、车辆配置和
  明细行，跨原厂、副厂和再制造件三条路径提出精准候选配件，并在下单前标记不确定项。
  高置信度推荐直接进入采购员的现有下单流程，边界案例则附上模型推理和支撑属性后转给
  配件专家处理。每一个被接受、拒绝、退回或追加工单的配件都会成为反馈，在门店集团层面
  持续改善未来推荐，并随时间积累形成可防守的运营数据集。
goToMarketSeed:
  firstCustomer: >-
    美国一家拥有 15–30 家门店的碰撞修复 MSO——配备集中配件团队、现有估价软件，
    且每周都因错误或不完整配件订单产生追加工单事件。
  buyingTrigger: >-
    集中配件采购后追加工单周期时间飙升，或退件量激增，或切入更新车型、承接更多
    ADAS 相关维修之后。
  currentAlternative: >-
    在估价系统和供应商目录中手动查找适配信息，辅以电话、邮件和资深配件经理的判断，
    再下单。
  switchingReason: >-
    这个切入工具能在不替换估价系统的前提下减少追加工单延误，同时把今天随最有经验的
    配件协调员离职而流失的机构适配知识沉淀进软件。
  pricingHypothesis: >-
    SaaS 订阅按门店位置收费，加上按审核估单数收取的使用量费用；ROI 锚定在减少追加
    工单、降低退件运费和缩短修复周期时间上。
whyNow:
  - point: >-
      横向 copilot 在这个工作流中根本站不住脚——通用 AI 在汽车配件适配上仍只有 1–5%
      的准确率，这为围绕领域专用模型构建软件留出了清晰空间。
    signalRefs: ["通用大模型无法胜任配件适配决策"]
    sourceRefs: [1]
  - point: >-
      跃升至 60% F1 值，加上来自 50 家以上厂商的五年人工反馈训练数据，说明适配解读
      已跨过生产级异常路由软件所需的最低质量门槛。
    signalRefs: ["配件适配精度已跨越工作流软件的可用门槛"]
    sourceRefs: [1, 2]
  - point: >-
      1000 亿美元的碰撞修复市场分散在 25 万家以上独立修复店——即便不扩展到经销商、
      保险公司或相邻维修流程，规模也足以支撑一家风险级公司。
    signalRefs: ["碰撞修复是规模大但高度分散的软件切入口"]
    sourceRefs: [1]
  - point: >-
      DST Global 罕见地投资工业垂直 AI 公司，说明资本和客户注意力都在向横向软件
      长期忽视的行业中的专有工作流 AI 聚拢。
    signalRefs: ["机构资本正在验证工业垂直 AI"]
    sourceRefs: [1, 2]
differentiator: >-
  这不是又一个配件目录数据库，也不是宽泛的"汽车维修 AI 助手"。切口是估单变成订单
  那一刻的交易控制层：置信度评分、异常路由，以及对退件或追加工单配件的反馈捕获。这个
  闭环数据集的复利速度快过静态目录内容，产品随每个门店集团的接入而变得更有价值——同时
  门店保留原有的估价和供应商系统不变。
