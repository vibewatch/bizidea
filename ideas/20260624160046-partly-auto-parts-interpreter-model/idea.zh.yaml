jobsToBeDone:
  - job: >-
      维修估单准备好下单时，帮助集中配件团队快速选出精准匹配的零件，从而避免
      追加工单并让修复周期时间保持在计划内。
    currentAlternative: 手动目录查询，加上与供应商的电话和邮件确认
    successMetric: 每 100 个维修订单中追加工单率和退件数降低
  - job: >-
      当有经验的配件协调员超负荷或暂时不在时，帮助门店集团只把模糊的适配案例
      路由给人工处理，从而在不卡在少数专家身上的前提下扩展集中采购能力。
    currentAlternative: 把大部分边界案例升级给最资深的采购员或门店估价师处理
    successMetric: 每位配件协调员的估单处理量提高，且准确率不下降
ideaScorecard:
  signalStrength:
    score: 5
    rationale: >-
      这个集群提供了罕见的硬指标——60% F1 对比通用模型的 1–5%——加上具名投资方
      和清晰识别出的买方市场，信号的具体程度异乎寻常。
  painIntensity:
    score: 4
    rationale: >-
      错误配件决策直接导致延误、返工和利润流失，但这是运营层面的痛点，而非生死
      存亡级别，因此得分低于欺诈、安全或合规紧急场景。
  wedgeClarity:
    score: 5
    rationale: >-
      在提交订单前审核适配关系，是一个频率高、ROI 直观、有清晰的人工兜底路径的
      窄域工作流。
  defensibility:
    score: 4
    rationale: >-
      护城河来自在门店工作流中积累专有的订单结果和追加工单反馈数据，但模型供应商
      或估价系统现有厂商最终也可能入场竞争。
  ventureScale:
    score: 4
    rationale: >-
      滩头市场横跨规模庞大的全国维修市场，并可自然扩展至经销商、保险公司和相邻
      维修品类；但通向规模化的路径取决于能否成为默认工作流层，而不是停留在小众
      点工具。
topRisks:
  - name: 工作流采用阻力
    description: >-
      如果早期推荐噪音较多，或异常队列比现有习惯更慢，配件团队可能会抵制任何
      打断下单速度的工具。
    mitigation: >-
      以影子审核模式启动，先测量漏掉的错误和置信度质量，再打开下单拦截开关；
      初期仅对高风险明细行启用干预。
  - name: 依赖外部适配智能
    description: >-
      如果初创公司过度依赖第三方模型或目录数据源，利润空间和产品路线图的自主权
      都可能受到约束。
    mitigation: >-
      把产品设计成模型无关的编排层，保留所有客户反馈数据，并建立内部评测集，
      以便随着精度和经济性演变随时更换供应商。
  - name: 集成瓶颈
    description: >-
      估价和供应商订单系统可能不提供清晰的接口，拖慢部署速度并让 pilot 的支持
      成本居高不下。
    mitigation: >-
      从愿意通过估单导出和轻量工作流叠加层试点的 MSO 起步，验证 ROI，再优先为
      滩头市场中最常见的两三个系统打造可复用的连接器。
