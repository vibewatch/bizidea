problem: >-
  Collision-repair groups lose margin and cycle time when estimators and parts
  managers must turn a VIN, trim level, and insurer estimate into the exact
  OEM, aftermarket, or recycled part across fragmented catalogs. Generic AI is
  too inaccurate to trust in this workflow, and a wrong recommendation creates
  supplements, return freight, and delays that push delivery dates out to the
  customer and insurer. Most regional MSOs still rely on a mix of estimator
  software, distributor portals, and the memory of senior parts staff to catch
  fitment edge cases before an order is sent.
targetUser:
  primary: >-
    Centralized parts-procurement managers at regional US collision-repair MSOs
    operating 10-50 shops
  secondary: >-
    Collision estimators and parts coordinators at multi-shop independent
    repair groups
  buyer: VP of Operations or Director of Parts Procurement at a regional MSO
startupThesis:
  nonObviousInsight: >-
    The big opportunity is not to build yet another generic shop copilot; it is
    to own the estimate-to-order decision point now that fitment reasoning has
    finally become good enough to automate the first 80% of cases. Once a
    vertical model can interpret fitment, the scarce asset becomes closed-loop
    workflow data on quotes, substitutions, returns, supplements, and final
    repair outcomes—data that incumbent catalog and estimating tools do not
    structure well today.
  beachhead: >-
    Regional US collision-repair MSOs with 10-50 locations, centralized parts
    buying, and recurring supplement delays on bumper, lighting, and ADAS-adjacent
    parts where trim-level and option-package fitment mistakes are common.
  wedge: >-
    An estimate-review copilot that ingests VIN plus estimate lines before
    purchase order creation, recommends order-ready parts with confidence
    scores, and routes low-confidence matches into a human exception queue
    instead of letting bad orders reach the distributor.
  whyNowCatalyst: >-
    Partly's reported jump from 1-5% generic-model accuracy to 60% F1 on
    fitment, backed by five years of human feedback and 50+ manufacturer
    datasets, suggests this workflow just crossed from "too risky to automate"
    into "narrow enough for production pilots."
  ventureScalePath: >-
    Start with collision-repair MSOs, then expand into mechanical repair chains,
    insurer direct-repair networks, salvage and aftermarket distributors, and
    eventually the embedded fitment-decision layer used across ordering,
    quoting, inventory, and claims workflows.
solution: >-
  The product is a workflow layer that sits between estimating software and
  parts ordering. It pulls the VIN, build context, and line items from a repair
  estimate, proposes exact-fit part candidates across OEM, aftermarket, and
  recycled options, and flags ambiguity before the order is sent. High-confidence
  recommendations flow directly into the buyer's existing ordering process,
  while edge cases go to a parts specialist with the model's reasoning and
  supporting attributes attached. Every accepted, rejected, returned, or
  supplemented part becomes feedback that improves future recommendations at the
  shop-group level and creates a defensible operational dataset over time.
goToMarketSeed:
  firstCustomer: >-
    A 15-30 location collision-repair MSO in the US with a centralized parts
    team, existing estimating software, and weekly supplement incidents driven
    by wrong or incomplete parts orders.
  buyingTrigger: >-
    A spike in supplement cycle time or return volume after centralizing parts
    buying, expanding into newer vehicle mixes, or taking on more ADAS-heavy
    repairs.
  currentAlternative: >-
    Manual fitment lookup inside estimating systems and supplier catalogs,
    backed by phone calls, email, and senior parts-manager judgment before
    placing orders.
  switchingReason: >-
    The wedge reduces supplement delays without forcing the shop to replace its
    estimator, and it captures institutional fitment knowledge that today walks
    out the door with the most experienced parts coordinators.
  pricingHypothesis: >-
    SaaS subscription priced per shop location plus usage-based fees per
    estimate reviewed, with ROI anchored to avoided supplements, lower return
    freight, and faster repair cycle time.
