jobsToBeDone:
  - job: >-
      When a collision estimate is ready to order, help the centralized parts
      team choose the exact fit component quickly, so they can avoid
      supplements and keep repair cycle time on plan.
    currentAlternative: Manual catalog lookup plus phone-and-email confirmation with suppliers
    successMetric: Lower supplement rate and fewer parts returns per 100 repair orders
  - job: >-
      When experienced parts coordinators are overloaded or unavailable, help
      shop groups route only ambiguous fitment cases to humans, so they can
      scale centralized procurement without bottlenecking on a few experts.
    currentAlternative: Escalating most edge cases to the most tenured buyer or shop estimator
    successMetric: Higher estimate throughput per parts coordinator without worse accuracy
ideaScorecard:
  signalStrength:
    score: 5
    rationale: >-
      The cluster provides a rare hard benchmark—60% F1 versus 1-5% for
      general models—plus a named investor and a clearly identified buyer
      market, making the signal unusually concrete.
  painIntensity:
    score: 4
    rationale: >-
      Wrong-part decisions directly create delays, rework, and margin leakage,
      but the pain is operational rather than existential, so it scores below
      fraud, security, or regulatory emergencies.
  wedgeClarity:
    score: 5
    rationale: >-
      Reviewing fitment before order submission is a narrow, high-frequency
      workflow with obvious ROI and a clear human-in-the-loop fallback path.
  defensibility:
    score: 4
    rationale: >-
      The moat comes from accumulating proprietary order-outcome and
      supplement-feedback data inside shop workflows, though model providers or
      estimating incumbents could eventually compete.
  ventureScale:
    score: 4
    rationale: >-
      The beachhead spans a large national repair market and expands naturally
      into distributors, insurers, and adjacent repair categories, but the path
      to massive scale depends on becoming the default workflow layer rather
      than a niche point tool.
topRisks:
  - name: Workflow adoption friction
    description: >-
      Parts teams may resist any tool that interrupts ordering speed if early
      recommendations are noisy or exception queues are slower than current
      habits.
    mitigation: >-
      Launch as a shadow-review mode that measures missed errors and confidence
      quality before turning on ordering gates, then enable intervention only
      for high-risk line items.
  - name: Dependency on external fitment intelligence
    description: >-
      If the startup depends too heavily on a third-party model or catalog
      source, margin and roadmap control could be constrained.
    mitigation: >-
      Design the product as a model-agnostic orchestration layer, retain all
      customer feedback data, and build internal evaluation sets so providers
      can be swapped as accuracy and economics evolve.
  - name: Integration bottlenecks
    description: >-
      Estimating and supplier-ordering systems may not expose clean interfaces,
      slowing deployment and making pilots expensive to support.
    mitigation: >-
      Start with MSOs willing to pilot via estimate exports and lightweight
      workflow overlays, prove ROI, then prioritize repeatable connectors for
      the two or three systems most common in the beachhead.
