differentiator: >-
  This is not another catalog database or a broad "AI for auto repair"
  assistant. The wedge is the transaction-control layer at the moment an
  estimate becomes an order: confidence scoring, exception routing, and
  feedback capture on returned or supplemented parts. That closed-loop dataset
  compounds faster than static catalog content and makes the product more useful
  with every shop group deployed, while shops keep their existing estimating and
  supplier systems.
