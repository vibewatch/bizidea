  pestle:
  - factor: 经济
    impact: negative
    point: 碰撞市场底层增速平缓，理赔量可能走软，因此预算合理化必须来自利润和周期时间 ROI，而非纯粹的客户数扩张。
    sourceRefs:
    - 93
    - 96
  - factor: 社会
    impact: negative
    point: 有经验的估价师和配件人员仍难以招聘，提升了能把隐性适配知识沉淀进软件的工具的价值。
    sourceRefs:
    - 42
    - 99
  - factor: 技术
    impact: positive
    point: ADAS 普及和校准增长正在提高需要精准下单前决策的维修占比。
