    impact: negative
    point: OEM/非 OEM 信息披露规则和 OEM ADAS 立场声明，在选错配件路径或记录不全时会引发责任风险。
    sourceRefs:
    - 78
    - 82
    - 84
  - factor: 政治
    impact: neutral
    point: 政府 VIN 数据基础设施降低了构建互操作性维修数据产品的摩擦，但政策本身无法消除 OEM 和保险公司特定的工作流复杂度。
    sourceRefs:
    - 69
  adoptionFrictionMatrix:
  - friction: 估价师可能不信任会覆盖本地门店习惯的 AI 推荐。
    severity: high
    affectedBuyer: 维修规划师或集中配件经理
    mitigation: 先以影子模式启动，设置置信度阈值和人工异常队列，在引入任何下单拦截前完成验证。
    sourceRefs:
    - 8
    - 37
    - 99
  - friction: 与现有估价和订单系统的集成可能拖延 pilot 进度。
    severity: high
    affectedBuyer: 运营副总裁或 IT 负责人
    mitigation: 先用文件/API 连接器接入主流估价和 BMS 工作流，在 KPI 验证后再加深自动化程度。
    sourceRefs:
    - 9
    - 26
    - 57
  - friction: 跨区域的供应商和保险规则差异，可能让一刀切的自动化变得脆弱。
    severity: medium
    affectedBuyer: 配件采购总监
    mitigation: 支持可配置的业务规则、优先路由逻辑，以及按保险公司和供应商网络的区域覆盖设置。
    sourceRefs:
    - 13
    - 14
    - 15
    - 38
  - friction: ADAS 敏感或 OEM 受限配件引发责任焦虑。
    severity: high
    affectedBuyer: 质量或合规负责人
    mitigation: 自动呈现 OEM 程序和州级信息披露上下文，禁止低置信度推荐自动发送。
    sourceRefs:
