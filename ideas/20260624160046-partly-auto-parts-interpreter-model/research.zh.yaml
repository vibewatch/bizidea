  value: ~200 operators
  source: est. from [95]
- driver: 每店平均维修订单数
  value: ~750/year
  source: '[99] calc'
- driver: 每审核订单的决策层消费
  value: $9
  source: est., sanity-checked against [91]
categoryDynamics:
  growthRate: 美国碰撞修复市场至 2030 年 CAGR 约 0.8%（自上而下交叉验证）
  growthRateSourceRefs:
  - 93
  tailwinds:
  - point: 校准发生率和 ADAS 程序内容持续扩展，需要精准下单前决策的安全敏感明细行不断增加。
    sourceRefs:
    - 40
    - 92
  - point: MSO 整合带动了跨门店标准化采购和异常处理的需求。
    sourceRefs:
    - 95
    - 96
  - point: 适配数据管道通过 ACES/PIES/VCdb 和 VIN API 日趋标准化，集成难度已比五年前低得多。
    sourceRefs:
    - 60
    - 63
    - 69
  headwinds:
  - point: 理赔走软和全损比例上升，可能压制订单量增长，即便单次维修复杂度在上升。
    sourceRefs:
    - 93
    - 96
  - point: OEM/非 OEM 信息披露和校准责任让买方对全自动推荐保持谨慎。
    sourceRefs:
    - 78
    - 82
    - 84
  - point: 现有估价和采购网络套件已占据相邻工作流触点，增加了集成和政治摩擦。
    sourceRefs:
    - 26
    - 49
    - 58
competitors:
- name: Partly
  stage: scale-up
  wedge: 面向碰撞配件的领域专用适配模型和采购基础设施
  pricing: Custom / enterprise
  strength: 专用模型、厂商协议、工作流集成，以及早期关于退件和追加工单减少的 MSO ROI 案例。
  weaknessVsUs: 宽泛的平台野心对只需要现有北美估价工作流内下单前拦截的买方来说可能显得过重。
  sourceRefs:
  - 2
  - 5
  - 7
  - 8
  - 9
  - 110
  - 111
- name: Orderly / PartsTrader
  stage: incumbent
  wedge: DRP 就绪的端到端采购市场和工作流自动化
  pricing: Custom / demo-led
  strength: 供应商和承运商网络规模、实时报价，以及在 Crash Champions 650 家以上门店的部署验证。
  weaknessVsUs: 在配件选择后优化采购和合规；不以模糊估单明细行的适配优先推理层来定位。
  sourceRefs:
  - 12
  - 15
  - 21
- name: CCC ONE
  stage: incumbent
  wedge: 碰撞门店的系统记录估价、下单、工作流和供应商连接
  pricing: Custom / quote-based
  strength: 嵌入式估价工作流、5,000 家以上供应商、OEM 数据和紧密的保险毗邻性。
  weaknessVsUs: 宽泛平台取向意味着适配推理只是众多功能之一，不是产品核心的闭环学习引擎。
  sourceRefs:
  - 26
  - 32
  - 37
  - 40
- name: Mitchell
  stage: incumbent
  wedge: 估价加配件来源和诊断/校准自动化
  pricing: Custom / quote-based
  strength: 深厚的估价覆盖、推荐 ADAS 操作，以及与 OEC 和校准工作流的集成。
  weaknessVsUs: 更侧重估单撰写和诊断明细行填充，而非跨采购结果的供应商无关适配异常路由。
  sourceRefs:
  - 49
  - 52
  - 57
- name: CollisionLink / OEC
  stage: incumbent
  wedge: OEM 直供配件采购和经销商路由
  pricing: Subscription / dealer-network based; not public
  strength: OEM 直供数据、折扣原厂件，以及从估价工作流直接下单的能力。
  weaknessVsUs: 在配件路径已基本明确时效果最好；对于总成解读、替换品和 OEM/副厂/再制造件混合模糊性较弱。
  sourceRefs:
  - 57
  - 58
regulatoryTechnicalConstraints:
- point: 适配逻辑必须在 vPIC、ACES 和 VCdb 之间规范化 VIN 数据和副厂适配分类，而不只依赖自由文本描述。
  sourceRefs:
  - 60
  - 63
  - 69
- point: 州级信息披露和知情同意规则要求在估单和发票中准确标注 OEM 与非 OEM。
  sourceRefs:
  - 78
  - 82
- point: ADAS 敏感组件在推荐被视为可下单之前，必须遵守 OEM 维修和校准指南。
  sourceRefs:
  - 73
  - 84
- point: 产品必须与现有估价和订单系统共存，包括配件代码表和 OEC 链路的下单流程。
  sourceRefs:
  - 9
  - 26
  - 57
validationSignals:
- point: Partly 的 MSO 应用案例声称标准化采购后追加工单减少 2.7 倍、退件减少 2.4 倍、整车周转时间缩短 20%。
  sourceRefs:
  - 5
- point: Crash Champions 在 650 家以上维修中心铺开 Orderly，证明大型 MSO 在工作流价值明确时愿意标准化采购软件。
  sourceRefs:
  - 21
- point: CCC 数据显示，门店现在开出的追加工单比六年前多出近 20%。
  sourceRefs:
  - 37
- point: CCC 报告 2025 年可修复评估中校准发生率超过 23%，DRP 理赔中接近三分之一。
  sourceRefs:
  - 40
- point: FenderBender 调查显示平均门店整车周转时间约 11 天、维修订单超 $5,000，印证了减少错件循环的运营价值。
  sourceRefs:
  - 99
openQuestions:
- 在工具能拦截或重路由明细行而不只是推荐之前，买方能接受的最低置信度门槛是多少？
- 在目标车型组合的保险杠、灯具和 ADAS 相关件上达到生产级覆盖，需要多少授权的 OEM 和供应商数据？
- 如果产品改善 DRP 合规性和周期时间透明度，保险公司或供应商网络会联合资助部署吗？
- 哪些估价和 BMS 系统主导了 10–50 家门店的区域性 MSO，集成最容易率先标准化的在哪里？

