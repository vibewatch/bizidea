scenarios:
  downside:
    description: 预算归属不清且试点转化率下滑，公司在第 3 年末仅有 12 个活跃付费险企项目，混合 ACV 偏低，交付工作更依赖人工。
    y3RevenueK: 2295.0
    y3EbitdaK: -529.5
    cashLowPointK: 30.2
    keyAssumptionChanges:
    - 第 1 年末 2 个付费账户，第 2 年末 6 个，第 3 年末 12 个（非 15 个）。
    - 混合年 ARPU 从 $290K 降至 $270K，因为客户将价格压在试点定价水平且生产范围有限。
    - 毛利率从 70% 降至 68%，因为数据映射和经纪人材料包准备仍更多依赖人工。
  base:
    description: 创始人主导销售加一名客户主管将首批试点转化为可重复的生产部署，并在第 3 年末将业务增长至 15 个活跃付费险企项目。
    y3RevenueK: 3226.3
    y3EbitdaK: 83.7
    cashLowPointK: 865.9
    keyAssumptionChanges:
    - 客户数按 A6、A7、A8 路径推进，第 2 年末 8 家付费险企，第 3 年末 15 家。
    - 混合年 ARPU 维持在 $290K，毛利率维持在商业计划目标的 70%。
    - 团队在第 3 年末达到 9 名全职员工，领域和实施人才在规模化 GTM 扩张前到位。
  upside:
    description: 参考客户和合作伙伴引荐加速转化，第 3 年末达到 18 个活跃付费险企项目，ACV 略高，毛利率更优。
    y3RevenueK: 4340.0
    y3EbitdaK: 853.2
    cashLowPointK: 1437.2
    keyAssumptionChanges:
    - 第 1 年末 4 个付费账户，第 2 年末 10 个，第 3 年末 18 个——续保规划参考客户将交易提前。
    - 混合年 ARPU 从 $290K 升至 $310K，因为更多客户更快转至完整生产范围。
    - 毛利率从 70% 提升至 72%，因为分类体系建立和集成的可复用性减少了人工交付工作。
sensitivity:
- variable: ARPU
  downsideCase: 混合年 ARPU 稳定在 $270K，因为客户购买范围更窄的分析套餐，扩展需要更长时间。
  baseCase: 混合年 ARPU 按建模保持在 $290K。
  upsideCase: 经纪人评审材料包和第二险种线范围附加更快后，混合年 ARPU 达到 $310K。
  y3RevenueImpactK: -222.5
  cashImpactK: -232.0
- variable: CAC
  downsideCase: 有效 CAC 上升，因为更多差旅、安全审查和试点辅导将 S&M 强度从 5% 推至 6% 收入。
  baseCase: 建模 CAC 接近每新付费险企项目 $84.9K。
  upsideCase: 合作伙伴引荐使 S&M 强度降至 4% 收入，有效 CAC 下降。
  y3RevenueImpactK: 0.0
  cashImpactK: -51.5
- variable: 客户流失率
  downsideCase: 毛客户流失表现如同公司以比预期少一到两个客户退出第 3 年，因为工作流更偏分析性而非操作性。
  baseCase: 基准路径假设单位经济模型月流失率 1.7%，同时建模客户路径已内含适度流失。
  upsideCase: 留存表现如同公司以比预期多一到两个客户退出第 3 年，因为经纪人评审材料包已嵌入规划节奏。
  y3RevenueImpactK: -290.0
  cashImpactK: -269.2
- variable: 销售周期
  downsideCase: 安全和采购环节使试点到生产周期延长约一个季度，每次扩展推迟一个季度。
  baseCase: 基准情景假设 90–120 天付费试点，规划周期活跃时相对迅速完成生产转化。
  upsideCase: 参考客户将周期缩短约一个季度，新项目提前落地。
  y3RevenueImpactK: -290.0
  cashImpactK: -284.0
- variable: 毛利率
  downsideCase: 毛利率维持在接近 68%，因为实施和建议质检仍更多依赖人工。
  baseCase: 毛利率维持在 70% 的计划目标。
  upsideCase: 毛利率达到 72%，因为可复用的接入模板和分类工作流减少了人工交付工作。
  y3RevenueImpactK: 0.0
  cashImpactK: -103.3
- variable: 招聘节奏
  downsideCase: 客户成功和分析人才必须提前 6 个月招募以处理定制化工作，在相同收入基础到来前烧钱加速。
  baseCase: 基准情景等到客户数量足够后再招募售后和分类支持人员。
  upsideCase: 团队维持基准招聘计划，因为集成和基准材料包保持足够标准化，无需提前招募。
  y3RevenueImpactK: 0.0
  cashImpactK: -131.7
modelDiagram:
  title: 单位经济模型流程
  mermaid: |-
    flowchart LR
      Leads[Founder-led and partner-sourced pipeline] --> PaidPilots
      PaidPilots --> ProductionAccounts
      ProductionAccounts --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
- checkName: 收入引擎
  finding: 基准情景收入来自活跃付费险企项目从第 1 年末 3 个增长至第 3 年末 15 个，每个约 $290K 混合年价值。
- checkName: 必须做对的事
  finding: 公司必须在第 2 年末将试点转化为 8 家生产险企，同时不让实施时间超出计划的 8 周以内目标。
- checkName: 模型失效条件
  finding: 若预算归属或转化速度滑向悲观情景，现金将在第 3 年结束前压缩至约 $30K。
- checkName: 下一轮融资证明
  finding: 种子轮叙事在公司达到 8 家生产险企、一次第二险种线扩展、并在证明可重复入职后保持可见现金缓冲时趋于可信。
sanityChecks:
  ruleOf40: 第 3 年增长率 107.0% + EBITDA 利润率 2.6% = 109.6%（方向性强劲，但仍受益于较小的第 2 年基数）。
  burnMultiple: 第 2 年约 0.4x——净新增 ARR 约 $1450.0K；第 3 年 EBITDA 转正，同时新增约 $2030.0K 净新增 ARR。
  revenuePerFte: 第 3 年末每名全职员工收入 $358K（处于早期企业 SaaS 大致 $200K–$400K 基准区间内）。
  flags:
  - 模型仍假设买家按可预测时间线将付费试点转为年度生产合同，尽管该品类的公开验证点仍然薄弱。
  - ARPU 锚定于商业计划和研究中点值而非观察到的定价数据，折扣压力可能将实际价值拉低于计划。
  - 毛利率只有在实施保持可重复、业务避免漂移为服务密集型定制集成时才能维持。
  - 创始人主导销售加一名客户主管承载了第 2–3 年的大部分商业攀升；若采购放缓，下一轮融资可能提前。
