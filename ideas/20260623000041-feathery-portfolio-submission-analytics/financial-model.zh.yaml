slug: carrier-appetite-feedback-loop
date: '2026-06-23'
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: 模型起始月
  value: 2026-07
  unit: YYYY-MM
  source: '[business-plan.yaml date] 2026-06-23 计划日期后的第一个完整运营月。'
- id: A2
  name: Pre-seed 关闭后初始现金
  value: '2200'
  unit: USDK
  source: '[business-plan.yaml fundingAsk.targetFundingRangeUsd] 取 $2–4M 区间的中低端建模，因为基准情景保持在 10 名全职员工以下，并在第 3 年接近盈亏平衡。'
- id: A3
  name: 收入单位
  value: 活跃付费险企项目
  unit: definition
  source: '[business-plan.yaml businessModel.unitOfValue; investorMemo.firstCustomer.initialContract] 一个活跃付费试点或生产部署即为计数的客户单位。'
- id: A4
  name: 每活跃付费险企项目混合年 ARPU
  value: '290'
  unit: USDK/account-year
  source: '[business-plan.yaml investorMemo.firstCustomer.initialContract; research.yaml market.som; research.yaml bottomUpSizingDrivers] 略低于研究中的 $300K 中点值，以反映早期试点组合和首年折扣。'
- id: A5
  name: 收入确认节奏
  value: 每月或每季度的期中客户数
  unit: policy
  source: '[startup-finance heuristic] 基准情景假设新付费项目平均在期中落地。'
- id: A6
  name: 第 1 年月末客户路径
  value: 0,0,0,1,1,1,2,2,2,3,3,3
  unit: active paid carrier programs
  source: '[business-plan.yaml milestones 0-12 months; experimentRoadmap] 对应 2 个付费试点、1 个以上生产部署和第 1 年末 3 个付费账户的目标。'
- id: A7
  name: 第 2 年季末客户数
  value: Q1Y2 4; Q2Y2 5; Q3Y2 7; Q4Y2 8
  unit: active paid carrier programs
  source: '[business-plan.yaml milestones 12-24 months] 与第 24 个月 5–8 个生产账户的目标一致。'
- id: A8
  name: 第 3 年季末客户数
  value: Q1Y3 9; Q2Y3 11; Q3Y3 13; Q4Y3 15
  unit: active paid carrier programs
  source: '[business-plan.yaml milestones 24-36 months; research.yaml market.som] 达到 15–20 客户里程碑的低端，同时保持在 20 客户 SOM 上限以内。'
- id: A9
  name: 毛利率目标
  value: '70'
  unit: percent
  source: '[business-plan.yaml businessModel.targetGrossMarginPct] 按已确认收入的 30% COGS 建模。'
- id: A10
  name: 单位经济模型月流失率
  value: '1.7'
  unit: percent
  source: '[startup-finance heuristic] 黏性较强但仍处于早期的企业分析产品，实施工作量可观且买家群体集中。'
- id: A11
  name: 创始人/CEO 税后现金薪酬
  value: '144'
  unit: USDK/year
  source: '[business-plan.yaml team Founder CEO] 按 $120K 创始人底薪加 20% 工资税和福利的初创财务惯例估算。'
- id: A12
  name: 联合创始人工程师税后现金薪酬
  value: '192'
  unit: USDK/year
  source: '[business-plan.yaml team Founding eng] 按高级技术创始人现金薪酬包加工资负担的初创财务惯例估算。'
- id: A13
  name: 保险实施负责人税后现金薪酬
  value: '156'
  unit: USDK/year
  source: '[business-plan.yaml team Insurance implementation lead] 按领域密集型实施招聘的初创财务惯例估算。'
- id: A14
  name: 产品工程师税后现金薪酬
  value: '180'
  unit: USDK/year
  source: '[business-plan.yaml team Product engineer] 按早期企业工作流产品工程师的初创财务惯例估算。'
- id: A15
  name: 方案交付负责人税后现金薪酬
  value: '168'
  unit: USDK/year
  source: '[business-plan.yaml team Solutions lead] 按面向客户的部署负责人的初创财务惯例估算。'
- id: A16
  name: 数据/平台工程师税后现金薪酬
  value: '180'
  unit: USDK/year
  source: '[business-plan.yaml product twentyFourMonth; operations] 按多险种线扩展前所需额外集成和数据平台深度的初创财务惯例估算。'
- id: A17
  name: 客户主管税后现金薪酬
  value: '180'
  unit: USDK/year
  source: '[business-plan.yaml strategicChoices.sequencingRationale] 按实施验证开始重复后才招募的首位企业销售人员的初创财务惯例估算。'
- id: A18
  name: 客户成功经理税后现金薪酬
  value: '132'
  unit: USDK/year
  source: '[business-plan.yaml milestones 12-24 months] 按账户基础达到 8 家险企后售后入职和续约支持的初创财务惯例估算。'
- id: A19
  name: 保险数据分析师税后现金薪酬
  value: '132'
  unit: USDK/year
  source: '[business-plan.yaml whyWeWin; operations] 按客户基础扩大后分类体系质检和基准材料包支持的初创财务惯例估算。'
- id: A20
  name: 招聘节奏
  value: 创始人/CEO 和联合创始人工程师第 1 个月；实施负责人第 3 个月；产品工程师第 6 个月；方案交付负责人第 9 个月；数据/平台工程师第 15 个月；客户主管第 18 个月；客户成功经理第 24 个月；保险数据分析师第 30 个月
  unit: timing
  source: '[business-plan.yaml team; strategicChoices.sequencingRationale] 实施和领域招聘在规模化 GTM 招聘之前落地。'
- id: A21
  name: 职能薪酬分配
  value: 创始人/CEO 65% S&M / 35% G&A；联合创始人工程师和数据/平台工程师 100% R&D；实施负责人 50% R&D / 50% G&A；产品工程师 100% R&D；方案交付负责人 40% R&D / 60% G&A；客户主管 100% S&M；客户成功经理 30% S&M / 70% G&A；保险数据分析师 80% R&D / 20% G&A
  unit: allocation
  source: '[business-plan.yaml team rationales; operations] 分配遵循谁销售切口、谁产品化图谱、谁承担部署/行政工作的逻辑。'
- id: A22
  name: 非薪酬运营支出
  value: 第 1 年 S&M 每月 8K + 5% 收入，R&D 每月 10K + 每平均客户 0.7K，G&A 每月 9K + 每平均客户 0.25K；第 2 年 S&M 每月 10K + 5% 收入，R&D 每月 11K + 每平均客户 0.8K，G&A 每月 10K + 每平均客户 0.25K；第 3 年 S&M 每月 12K + 5% 收入，R&D 每月 13K + 每平均客户 0.9K，G&A 每月 12K + 每平均客户 0.3K
  unit: USDK/month
  source: '[startup-finance heuristic] 覆盖企业保险软件运营所需的云、差旅、法务、审计和安全开销。'
- id: A23
  name: 现金转换政策
  value: EBITDA 近似运营现金变动
  unit: policy
  source: '[startup-finance heuristic] 本阶段不建模债务、资本支出、税项或重大营运资金波动。'
- id: A24
  name: 每新付费险企项目混合 CAC
  value: '84.9'
  unit: USDK/new paid account
  source: 由第 2–3 年建模销售与营销支出 $1018.5K 除以 12 个净新增付费险企项目计算得出。
- id: A25
  name: 融资里程碑
  value: 8 家生产险企、至少 1 次第二险种线扩展，且可重复的单险种线实施时间在 8 周以内
  unit: milestone
  source: '[business-plan.yaml milestones 12-24 months; fundingAsk.useOfFundsSummary] 用于确定本轮规模加 6 个月缓冲。'
