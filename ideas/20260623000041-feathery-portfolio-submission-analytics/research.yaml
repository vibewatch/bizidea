        Soft-market competition makes speed-to-quote, appetite precision, and
        broker experience more economically important.
      sourceRefs: [5, 6, 7]
    - point: >-
        Submission-intake automation is becoming a standard modernization agenda
        item across carriers and ecosystem platforms.
      sourceRefs: [9, 16, 21]
    - point: >-
        Document AI and underwriting workbench tooling are mature enough that a
        portfolio-learning layer is now feasible.
      sourceRefs: [29, 36, 37, 38]
  headwinds:
