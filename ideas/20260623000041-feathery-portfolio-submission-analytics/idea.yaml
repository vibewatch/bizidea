problem: >-
  Regional commercial carriers still learn why they lost business through
  underwriter anecdotes, broker complaints, and spreadsheet win-loss reviews run
  weeks after the fact. Because submission packets arrive as messy emails, PDFs,
  applications, and attachments, carriers rarely connect document-level signals
  to bind outcomes, broker fit, or appetite drift across the book. In a soft
  market that lag means good risks leak away, underwriters overwork off-appetite
  submissions, and leadership cannot tune distribution or appetite with
  confidence before renewal plans are set.
targetUser:
  primary: >-
    Chief underwriting officers and underwriting-operations leaders at regional
    U.S. commercial P&C carriers writing small-business package and workers'
    compensation through independent agents
  secondary: >-
    Distribution analytics teams and line-of-business managers responsible for
    broker strategy, submission triage rules, and renewal-growth targets
  buyer: Chief underwriting officer or head of small commercial
startupThesis:
  nonObviousInsight: >-
    The valuable system is no longer the extractor that pulls fields from a
    submission; it is the feedback loop that explains how submission attributes,
    broker behavior, and appetite choices translate into binds or losses. Once
    AI can normalize historical broker packets across messy document sets, a
    startup can own portfolio steering above policy-admin, rating, and intake
    systems that were never designed to learn from the business they did not win.
  beachhead: >-
    Regional U.S. commercial P&C carriers with $250M-$2B in direct written
    premium, 25-150 small-commercial underwriters, and 50,000+ annual broker
    submissions across BOP and workers' compensation, entering renewal planning
    in a soft market
  wedge: >-
    A submission feedback loop that ingests historical broker packets and
    outcomes, tags recurring loss and decline reasons, scores broker-appetite
    fit, and recommends appetite, routing, and follow-up changes before renewal
    planning and broker meetings
  whyNowCatalyst: >-
    Feathery's launch shows carriers now see historical submission data as a
    strategic dataset for soft-market win-loss diagnosis, making portfolio
    steering software newly urgent and newly feasible.
  ventureScalePath: >-
    Start with win-loss and appetite analytics for small-commercial lines, then
    expand into broker scorecards, live submission routing, underwriting
    workflow orchestration, renewal strategy, capacity allocation, and eventually
    a carrier-wide intelligence layer for distribution and portfolio management.
solution: >-
  The product connects to submission inboxes, document stores, underwriting
  workbenches, and bind or decline outcomes to build a historical graph of what
  entered the funnel, how it was handled, and what happened next. It normalizes
  recurring facts from messy applications and attachments, then groups lost or
  declined deals by broker, class code, geography, missing information, response
  time, appetite mismatch, and competitive pattern. The first workflow is an
  executive and branch-level win-loss cockpit that highlights where good
  business is leaking and where underwriters are wasting time on off-appetite
  flow. A second workflow generates broker-review packs and appetite-tuning
  recommendations before renewal-planning meetings, so distribution and
  underwriting leaders act on evidence rather than anecdotes. Over time the moat
  becomes the carrier-specific taxonomy of loss reasons, broker quality, and
  appetite-response patterns that generic BI tools and point extractors do not
  capture.
