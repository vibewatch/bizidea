differentiator: >-
  Most insurance workflow vendors stop at extraction, quoting, or rules-based
  appetite checks on the way in. This company owns the harder layer after the
  intake moment: learning from the entire historical funnel to tell a carrier
  which brokers, classes, response patterns, and appetite assumptions are
  creating avoidable losses. The defensible asset is a carrier-specific feedback
  graph linking submission evidence, workflow behavior, and outcomes, which gets
  better every time underwriters accept or reject a recommendation.
