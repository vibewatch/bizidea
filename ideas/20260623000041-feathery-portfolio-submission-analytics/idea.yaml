topRisks:
  - name: Sparse source base
    description: Only one source confirms the signal, so customer urgency or budget timing may be overstated.
    mitigation: Start with founder-led discovery in one narrow carrier segment and require paid pilots tied to a live renewal-planning cycle before broad expansion.
  - name: Data integration drag
    description: Submission evidence and outcome data may live across email, shared drives, workbenches, and policy systems with inconsistent identifiers.
    mitigation: Launch with one line of business and a limited ingest surface, then use human-reviewed entity matching before promising full-funnel automation.
  - name: Analytics without action
    description: Carriers may like dashboards but fail to change appetite, routing, or broker behavior, limiting ROI and retention.
    mitigation: Package the first release around broker-review packs and renewal-planning recommendations with tracked action adoption and bind-rate outcomes.
