assumptions:
- id: A1
  name: Model start month
  value: 2026-07
  unit: YYYY-MM
  source: '[business-plan.yaml date] first full operating month after the 2026-06-23 plan date.'
- id: A2
  name: Opening cash after pre-seed close
  value: '2200'
  unit: USDK
  source: '[business-plan.yaml fundingAsk.targetFundingRangeUsd] modeled at the low-middle of the stated $2-4M range because the base case stays below 10 FTE and reaches near break-even by Y3.'
- id: A3
  name: Revenue unit
  value: Active paid carrier program
  unit: definition
  source: '[business-plan.yaml businessModel.unitOfValue; investorMemo.firstCustomer.initialContract] one active paid pilot or production deployment is the counted customer unit.'
- id: A4
  name: Blended annual ARPU per active paid carrier program
  value: '290'
  unit: USDK/account-year
  source: '[business-plan.yaml investorMemo.firstCustomer.initialContract; research.yaml market.som; research.yaml bottomUpSizingDrivers] set slightly below the researched $300K midpoint to reflect early pilot mix and first-year discounts.'
- id: A5
  name: Revenue recognition timing
  value: Midpoint customer count within each month or quarter
  unit: policy
  source: '[startup-finance heuristic] base case assumes new paid programs land halfway through the period on average.'
- id: A6
  name: Y1 month-end customer path
  value: 0,0,0,1,1,1,2,2,2,3,3,3
  unit: active paid carrier programs
  source: '[business-plan.yaml milestones 0-12 months; experimentRoadmap] aligns to 2 paid pilots, 1+ production deployment, and 3 paid accounts by Y1 exit.'
- id: A7
  name: Y2 quarter-end customers
  value: Q1Y2 4; Q2Y2 5; Q3Y2 7; Q4Y2 8
  unit: active paid carrier programs
  source: '[business-plan.yaml milestones 12-24 months] matches the stated goal of 5-8 production accounts by month 24.'
