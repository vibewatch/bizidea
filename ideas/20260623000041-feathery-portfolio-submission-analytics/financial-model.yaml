  value: '168'
  unit: USDK/year
  source: '[business-plan.yaml team Solutions lead] startup-finance heuristic for a customer-facing deployment owner.'
- id: A16
  name: Data/platform engineer loaded cash compensation
  value: '180'
  unit: USDK/year
  source: '[business-plan.yaml product twentyFourMonth; operations] startup-finance heuristic for the additional integration and data-platform depth needed before multi-line expansion.'
- id: A17
  name: Account executive loaded cash compensation
  value: '180'
  unit: USDK/year
  source: '[business-plan.yaml strategicChoices.sequencingRationale] startup-finance heuristic for the first enterprise seller added only after implementation proof starts to repeat.'
- id: A18
  name: Customer success manager loaded cash compensation
  value: '132'
  unit: USDK/year
  source: '[business-plan.yaml milestones 12-24 months] startup-finance heuristic for post-sale onboarding and renewal support once the account base reaches 8 carriers.'
- id: A19
  name: Insurance data analyst loaded cash compensation
  value: '132'
  unit: USDK/year
  source: '[business-plan.yaml whyWeWin; operations] startup-finance heuristic for taxonomy QA and benchmark-pack support once the customer base expands.'
- id: A20
  name: Hiring cadence
  value: Founder CEO and founding eng in M1; implementation lead M3; product engineer M6; solutions lead M9; data/platform engineer M15; account executive M18; customer success manager M24; insurance data analyst M30
  unit: timing
  source: '[business-plan.yaml team; strategicChoices.sequencingRationale] implementation and domain hires land before scaled GTM hires.'
- id: A21
  name: Functional payroll allocation
  value: Founder CEO 65% S&M / 35% G&A; founding eng and data/platform engineer 100% R&D; implementation lead 50% R&D / 50% G&A; product engineer 100% R&D; solutions lead 40% R&D / 60% G&A; account executive 100% S&M; customer success manager 30% S&M / 70% G&A; insurance data analyst 80% R&D / 20% G&A
  unit: allocation
  source: '[business-plan.yaml team rationales; operations] allocation follows who sells the wedge, who productizes the graph, and who carries deployment/admin work.'
- id: A22
  name: Non-payroll operating spend
  value: Y1 S&M 8K + 5% of revenue monthly, R&D 10K + 0.7K per average customer monthly, G&A 9K + 0.25K per average customer monthly; Y2 S&M 10K + 5% of revenue, R&D 11K + 0.8K per average customer, G&A 10K + 0.25K per average customer; Y3 S&M 12K + 5% of revenue, R&D 13K + 0.9K per average customer, G&A 12K + 0.3K per average customer
  unit: USDK/month
  source: '[startup-finance heuristic] covers cloud, travel, legal, audit, and security overhead for an enterprise insurance software motion.'
- id: A23
  name: Cash conversion policy
  value: EBITDA approximates operating cash movement
  unit: policy
  source: '[startup-finance heuristic] no debt, capex, taxes, or material working-capital swings are modeled at this stage.'
- id: A24
  name: Blended CAC per new paid carrier program
  value: '84.9'
  unit: USDK/new paid account
  source: Calculated from modeled Y2-Y3 sales and marketing spend of 1018.5K divided by 12 net new paid carrier programs.
- id: A25
  name: Funding milestone
  value: 8 production carriers, at least 1 second-line expansion, and repeatable one-line implementations below 8 weeks
  unit: milestone
  source: '[business-plan.yaml milestones 12-24 months; fundingAsk.useOfFundsSummary] used to size the current round plus a 6-month buffer.'
