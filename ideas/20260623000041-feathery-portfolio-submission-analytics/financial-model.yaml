scenarios:
  downside:
    description: Budget ownership stays muddy and pilot conversion slips, leaving the company at 12 active paid carrier programs by Y3 exit with lower blended ACV and more manual delivery work.
    y3RevenueK: 2295.0
    y3EbitdaK: -529.5
    cashLowPointK: 30.2
    keyAssumptionChanges:
    - Y1 ends with 2 paid accounts, Y2 ends with 6, and Y3 exits with 12 instead of 15.
    - Blended annual ARPU falls from $290K to $270K as customers hold the company closer to pilot pricing and limited-scope production.
    - Gross margin slips from 70% to 68% because data mapping and broker-pack preparation stay more manual.
  base:
    description: Founder-led selling plus one AE converts the first pilots into repeatable production deployments and grows the business to 15 active paid carrier programs by Y3 exit.
    y3RevenueK: 3226.3
    y3EbitdaK: 83.7
    cashLowPointK: 865.9
    keyAssumptionChanges:
    - Customer counts follow A6, A7, and A8, reaching 8 paid carriers by Y2 exit and 15 by Y3 exit.
    - Blended annual ARPU stays at $290K while gross margin stays at the 70% business-plan target.
    - The team reaches 9 end-of-Y3 FTE, with domain and implementation hires landing before scaled GTM expansion.
  upside:
    description: Reference accounts and partner referrals speed conversion enough to reach 18 active paid carrier programs by Y3 exit at slightly higher ACV and cleaner gross margins.
    y3RevenueK: 4340.0
    y3EbitdaK: 853.2
    cashLowPointK: 1437.2
    keyAssumptionChanges:
    - Y1 exits with 4 paid accounts, Y2 with 10, and Y3 with 18 as renewal-planning references pull deals forward.
    - Blended annual ARPU rises from $290K to $310K as more customers convert to full production scope faster.
    - Gross margin improves from 70% to 72% because reuse in taxonomy setup and integrations reduces manual effort.
sensitivity:
- variable: ARPU
  downsideCase: Blended annual ARPU settles at $270K because customers buy a narrower analytics package and take longer to expand.
  baseCase: Blended annual ARPU stays at $290K as modeled.
  upsideCase: Blended annual ARPU reaches $310K once broker-review packs and second-line scope attach faster.
  y3RevenueImpactK: -222.5
  cashImpactK: -232.0
- variable: CAC
  downsideCase: Effective CAC rises because more travel, security review, and pilot hand-holding push S&M intensity from 5% to 6% of revenue.
  baseCase: Modeled CAC stays near $84.9K per new paid carrier program.
  upsideCase: Effective CAC falls as partner referrals let S&M intensity decline toward 4% of revenue.
  y3RevenueImpactK: 0.0
  cashImpactK: -51.5
- variable: churn
  downsideCase: Gross logo churn behaves like the company exits Y3 one to two customers lower because the workflow stays more analytical than operational.
  baseCase: The base path assumes 1.7% monthly churn for unit economics while the modeled customer path already bakes in modest attrition.
  upsideCase: Retention behaves like the company exits Y3 one to two customers higher because broker-review packs become embedded in planning cadence.
  y3RevenueImpactK: -290.0
  cashImpactK: -269.2
- variable: sales cycle
  downsideCase: Security and procurement add about a quarter to the pilot-to-production cycle, pushing each expansion one quarter later.
  baseCase: The base case assumes a 90-120 day paid pilot and then a relatively prompt production conversion when the planning cycle is live.
  upsideCase: Reference accounts compress cycle time by about a quarter and pull new programs forward.
  y3RevenueImpactK: -290.0
  cashImpactK: -284.0
- variable: gross margin
  downsideCase: Gross margin stays closer to 68% because implementations and recommendation QA remain more manual.
  baseCase: Gross margin stays at the 70% plan target.
  upsideCase: Gross margin reaches 72% as reusable ingestion templates and taxonomy workflows reduce manual delivery effort.
  y3RevenueImpactK: 0.0
  cashImpactK: -103.3
- variable: hiring pace
  downsideCase: Customer success and analyst hires must be pulled 6 months earlier to handle bespoke work, increasing burn before the same revenue base arrives.
  baseCase: The base case waits until customer count justifies the post-sale and taxonomy-support hires.
  upsideCase: The team keeps the base hiring plan because integrations and benchmark packs stay templated enough to avoid pulling hires forward.
  y3RevenueImpactK: 0.0
  cashImpactK: -131.7
modelDiagram:
  title: unit economics flow
  mermaid: |-
    flowchart LR
      Leads[Founder-led and partner-sourced pipeline] --> PaidPilots
      PaidPilots --> ProductionAccounts
      ProductionAccounts --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
- checkName: Revenue engine
  finding: Base-case revenue comes from growing active paid carrier programs from 3 at Y1 exit to 15 at Y3 exit at roughly $290K of blended annual value each.
- checkName: Must go right
  finding: The company has to convert pilots into 8 production carriers by Y2 exit without letting implementations sprawl past the plan’s sub-8-week target.
- checkName: Model breaks if
  finding: If budget ownership or conversion speed slips toward the downside case, cash compresses toward roughly $30K even before Y3 finishes.
- checkName: Next-round proof
  finding: The seed narrative is credible once the company reaches 8 production carriers, one second-line expansion, and keeps a visible cash buffer after proving repeatable onboarding.
sanityChecks:
  ruleOf40: Y3 growth 107.0% + EBITDA margin 2.6% = 109.6% (strong directionally, though still helped by a small Y2 base).
  burnMultiple: About 0.4x in Y2 on roughly $1450.0K of net new ARR, then EBITDA turns positive in Y3 while adding about $2030.0K of net new ARR.
  revenuePerFte: $358K Y3 revenue per end-of-year FTE (inside the rough $200K-$400K early enterprise SaaS benchmark).
  flags:
  - The model still assumes buyers convert paid pilots into annual production contracts on a predictable timeline even though public proof points in this category are thin.
  - ARPU is anchored to the business-plan and research midpoint rather than observed pricing data, so discounting pressure could pull realized value below plan.
  - Gross margin only holds if implementations stay repeatable and the business avoids drifting into a services-heavy custom integration posture.
  - A single AE plus founder-led selling carries most of the Y2-Y3 commercial ramp; if procurement slows, the next round likely pulls forward.
