problem: >-
  区域性商业险企至今仍靠核保员口述、经纪人投诉以及事后数周才完成的 Excel 赢单失单复盘来了解失单原因。提交件以杂乱邮件、PDF、申请表及附件形式涌入，险企几乎无法将文档层面的信号与出单结果、经纪人匹配度或保单组合内的核保偏好漂移相关联。软市场中，这种滞后同时带来两重代价：优质风险悄悄流失给竞争对手，核保员又把时间耗在反复审阅偏好外提交件上——管理层无法在制定续保方案前放心地调整分销策略或核保偏好。
targetUser:
  primary: >-
    美国区域性商业财产意外险（P&C）险企的核保总监（CUO）及核保运营负责人，主要通过独立代理人开展小型企业商业综合险（BOP）和工伤险业务
  secondary: >-
    负责经纪人策略、提交件分拣规则及续保增长目标的分销分析团队和险种线业务经理
  buyer: 核保总监（CUO）或小型商业险负责人
startupThesis:
  nonObviousInsight: >-
    真正有价值的系统不再是从提交件中提取字段的工具，而是一个能解释提交件属性、经纪人行为与核保偏好选择如何转化为出单或失单的反馈闭环。一旦 AI 能跨杂乱文档集规范化历史经纪人提交包，初创公司就能在保单管理、定价和接收系统之上掌控组合管理层——而那些系统从未被设计成从未赢得的业务中学习。
  beachhead: >-
    直接承保保费 $250M–$2B、拥有 25–150 名小型商业险核保员、每年逾 50,000 份 BOP 和工伤险经纪人提交件、正处于软市场续保规划阶段的美国区域性商业 P&C 险企
  wedge: >-
    一个提交件反馈闭环——接入历史经纪人提交包和出单结果，标注反复出现的失单与拒保原因，对经纪人与核保偏好匹配度评分，并在续保规划和经纪人会议前提出核保偏好、路由分配和跟进调整建议
  whyNowCatalyst: >-
    Feathery 的发布表明险企已将历史提交件数据视为软市场赢单失单诊断的战略数据集，让保单组合管理软件既更加紧迫，也变得切实可行。
  ventureScalePath: >-
    从小型商业险的赢单失单与核保偏好分析起步，逐步扩展至经纪人评分卡、实时提交件路由、核保工作流编排、续保策略、容量分配，最终成为险企覆盖分销和组合管理的全局情报层。
solution: >-
  产品接入提交件收件箱、文档存储、核保工作台以及出单或拒保结果，构建一张历史图谱——记录什么进了漏斗、如何处理、结果如何。系统规范化杂乱申请表和附件中反复出现的关键事实，然后按经纪人、险种代码、地域、信息缺失、响应时间、核保偏好不匹配和竞争模式对失单或拒保业务分组。第一个工作流是面向管理层和分支机构的赢单失单驾驶舱，清晰呈现优质业务在哪流失、核保员在哪些偏好外流量上空耗时间。第二个工作流在续保规划会议前生成经纪人评审材料包和核保偏好调整建议，让分销和核保负责人凭证据而非口述做决策。随时间积累，护城河将是险企专属的失单原因、经纪人质量和核保偏好响应模式分类体系——通用 BI 工具和单点提取工具永远无法沉淀这些资产。
goToMarketSeed:
  firstCustomer: >-
    一家直接承保保费 $500M–$1.5B、拥有多州独立代理人渠道、且小型商业险部门 BOP 和工伤险出单率未达目标的美国区域性商业险企
  buyingTrigger: >-
    季度出单率复盘、即将到来的代理人大会或年度续保规划——这些时刻会暴露无法解释的提交件失单，以及在不增加核保员的情况下完成增长目标的压力
  currentAlternative: >-
    保单管理系统和数据仓库导出、Excel 赢单失单分析、临时搭建的 BI 看板、经纪人口述，以及对抽样提交件的人工复盘
  switchingReason: >-
    这个切口将实际提交文档特征和工作流行为与出单结果挂钩，产出有出处可循的核保偏好与经纪人覆盖调整建议——这是现有 Excel 和数仓报告无法还原的
  pricingHypothesis: >-
    按提交量和覆盖核保团队规模计费的年度订阅，并提供经纪人评审材料包、实时路由建议和额外险种线的溢价模块
