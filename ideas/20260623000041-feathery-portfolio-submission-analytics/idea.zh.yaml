jobsToBeDone:
  - job: >-
      当续保规划期间出单率下滑时，帮助核保总监厘清哪些提交件、经纪人和核保偏好选择造成了失单，从而在下一个周期前重置策略。
    currentAlternative: Excel 赢单失单复盘加核保员和经纪人口述
    successMetric: 出单率提升，并缩短产出有证据支撑的续保方案所需时间
  - job: >-
      当代理人大会临近时，帮助分销和核保负责人向每位经纪人展示匹配度断层所在，从而提升提交件质量、聚焦于有利可图的核保偏好。
    currentAlternative: 基于保单管理系统导出和分支机构记忆手工拼装的经纪人评分卡
    successMetric: 目标经纪人提交件中符合核保偏好的比例在两个季度内提升
