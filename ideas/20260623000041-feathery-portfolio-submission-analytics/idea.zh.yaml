topRisks:
  - name: 来源基础稀薄
    description: 仅一个来源印证该信号，客户紧迫程度或预算节奏可能被高估。
    mitigation: 在单一细分险企群体中以创始人主导的探索性拜访起步，并要求在大规模扩张前完成与真实续保规划周期绑定的付费试点。
  - name: 数据集成阻力
    description: 提交件证据与出单数据可能分散在邮件、共享盘、工作台和保单系统中，标识符不一致。
    mitigation: 从单一险种线和有限接入范围起步，在承诺全漏斗自动化之前先进行人工审核的实体匹配。
  - name: 分析止步于行动
    description: 险企可能喜欢看板但不愿真正调整核保偏好、路由或经纪人行为，导致 ROI 和续约率受限。
    mitigation: 首发版本围绕经纪人评审材料包和续保规划建议打包，追踪行动采纳情况和出单率结果。
