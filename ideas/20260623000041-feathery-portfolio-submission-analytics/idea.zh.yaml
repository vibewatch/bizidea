    signalRefs:
      - 组合管理可打通核保偏好、经纪人与出单结果
    sourceRefs: [1]
differentiator: >-
  大多数保险工作流供应商止步于提取、报价或基于规则的核保偏好检查。本公司掌控的是接收环节之后更难的那一层：从整个历史漏斗中学习，告诉险企哪些经纪人、险种、响应模式和核保偏好假设正在制造可避免的失单。可防守的资产是一张险企专属的反馈图谱，将提交件证据、工作流行为和出单结果连接起来——每当核保员接受或拒绝一条建议，它就变得更强。
