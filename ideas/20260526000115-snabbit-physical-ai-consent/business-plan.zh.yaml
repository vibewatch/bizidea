slug: household-data-consent-rail
date: '2026-05-25'
executiveSummary: Household Data Consent Rail 是一款很窄但很硬的工作流产品，面向那些已经开始收到厂商请求——想拿入户视频、服务人员视频、远程操控数据或下游 AI 训练权——的印度家政服务平台。真正的痛点不是泛化的隐私合规，而是在任何录制发生之前，先决定什么能采、谁必须同意、允许哪些标注与模型使用权，以及平台之后怎么把这些边界证明清楚。研究里的触发信号是真实的：Pronto 和 Snabbit 都说明，哪怕只是探索性的 Physical AI 数据讨论，也足以把有一定订单体量的消费品牌推成公开信任事件。公司应该先拿下一个单点滩头：那些品牌显眼、正和合作方谈真实项目、且运营规模足够大到“一次不透明试点就会惊动法务、公关和董事会”的印度即时家政平台。第一版产品应该是一套从录入到决策的控制平面，带政策模板、住户与服务人员双重同意材料、权利台账和高管签字，而不是大而全的隐私套件，也不是采集后数据目录。GTM 要由创始人亲自带，按事件触发：平台一收到真实请求，就卖一个付费试点；等所有高风险合作请求都开始走系统，再转成年约；然后按城市、试点类型和相邻私密场景行业往外扩。市场证据支持一个可信但偏窄的软件切口：研究给出的 SAM 约 $6.0M，第 3 年 SOM 约 $1.8M，所以要有真正的风险投资上行，就必须证明这套工作流能复用到养老、住宅安防、酒店或现场服务。当前最缺的证据，是头部平台每季度到底会收到多少这类请求，以及买方究竟会为软件买单，还是仍然只愿意付律师费；因此这些点现在仍应被当作明确的运营假设，而不是既成事实。
problem:
- 家政服务平台正在收到 Physical AI 与数据采集请求，但它们还没有一套产品化机制，去批准、限制或拒绝入户录制、标注、传输与商业化权利。
- 现在的替代方案——NDA、外部律师、邮件线程、表格，或者一刀切禁录——既慢、难审计，又会在家庭录制变成公众信任议题时暴露出脆弱性。
solution:
- 提供一套合作方接入与同意治理工作流，让每一条高风险数据请求都必须经过结构化界定：采集场景、必须同意的角色、地点限制、标注权、留存窗口、下游模型用途和传输限制。
- 为住户、服务人员、厂商与高管生成可审计的批准或拒绝材料，并维护一份权利台账，清楚记录哪些被批准、哪些受限、哪些被撤回、哪些被拒绝。
whyWeWin:
- 现有隐私套件已经证明，买方愿意为同意、评估和审计轨迹买单；但它们是为网站、SaaS 系统和企业数据资产优化的，不是为家庭录制试点的采集前审批优化的。
- 如果公司能成为“哪些试点被批、哪些被拒”的记录系统，就能逐步长出一张围绕双重同意、标注和下游用途边界的专有政策图谱，而律师、表格和通用工具都很难把这些数据沉下来。
strategicChoices:
  beachhead: 月度订单超过 10,000 单、品牌足够显眼、并且已经在接入户视频、服务人员视频、远程操控或模型训练试点请求的印度即时家政平台。
  wedgeRationale: 这个切片足够窄，创始人主导销售就能覆盖可信买方集合；同时它又足够急，一条真实请求就能引发预算、法务审查和高管关注。要是从更宽的隐私或横向 AI 治理切进去，只会把销售周期拉长，也会让公司看起来像大厂替代品。
  sequencingRationale: 先用“软件 + 政策模板实施”去跑通一条由真实请求驱动的工作流，因为第一性证明是“决策更快、风险更低”，不是替换整套合规平台。只有当两到三个正式生产客户证明请求量可重复后，公司才该补更深的集成、基准数据产品、更广的合作渠道和相邻行业扩张。招聘顺序也一样：先补产品与实施能力，再补可复制销售能力。
  notYet:
  - 不做与本题无关的通用隐私项目管理。
  - 不做机器人远程操控工具或数据标注运营。
  - 不做面向消费者的 同意管理器品牌或平台应用。
  - 在印度工作流匹配度没被证明前，不做国际扩张。
market:
  tam: $150.0M 估算 TAM：全球约 1,000 家运营方，覆盖私密空间服务、居家照护、物业/安防、酒店与机器人数据项目，按约 $150k ACV 计算。
  sam: $6.0M 估算滩头 SAM：印度及邻近市场约 40 家运营方，短期内有现实概率碰到入户录制或 Physical AI 数据请求，按约 $150k ACV 计算。
  som: $1.8M 估算第 3 年 SOM：按 12 个正式生产客户、每个约 $150k ACV 计算。
  segments:
  - 正在评估 AI 数据或远程操控试点的印度即时家政与家政服务平台。
  - 养老、住宅安防、酒店和现场服务等相邻私密场景平台。
  buyingProcess: 购买流程通常始于厂商要求采集或复用入户视频、服务人员视频或远程操控数据，而平台现有的法务与运营流程给不出明确答案。经济买方通常是运营负责人、首席法务官或信任负责人；在付费试点转成年治理合同前，产品、合作、隐私律师和高管赞助人都会被拉进来。
product:
  mvp: MVP 应该能吃进一条高风险厂商请求，按带有 DPDP 意识的政策模板流转，必要时分别生成住户和服务人员的同意材料，并把批准、拒绝、留存和下游用途决策记进权利台账。它应明确排除广义隐私项目管理、采集后的数据发现，以及厂商侧数据运营。
  sixMonth: 给一位共创客户上线一套正式生产部署，覆盖录入表、审批流、拒绝流程、同意材料生成，以及可导出的审计包，先只支持一个城市和一种试点类型。
  twelveMonth: 把家庭录制、服务人员视频和远程操控请求的第一套政策模板库标准化；把 2–3 个客户品牌 转成年约；并补上对现有法务、工单和文档系统的轻量集成。
  twentyFourMonth: 先在现有客户内部按城市和试点类型扩张，再上线审批模式与周期的 基准报告，并证明在一个相邻行业里，大部分政策图谱和权利台账都能直接复用。
  keyBets:
  - 目标平台每季度收到的高风险请求，足够支撑持续性软件，而不是一次性律师项目。
  - 住户与服务人员双重同意能够真正跑通，不会把试点参与率和法务成本打穿。
  - 一层很窄的录入与决策工作流，比买方自己内部开发更快接上。
  - 至少有一个相邻私密场景行业，可以复用超过 60% 的核心工作流。
gtm:
  wedge: 当家政服务平台收到关于家庭录制、服务人员视频、远程操控或模型训练权的真实请求，而且试点必须先得到一份受治理的 是/否决策时，立刻卖出一个付费共创试点。
  channels:
  - 创始人主导直销，面向印度头部家政服务平台的运营、信任、法务和合作负责人。
  - 与聚焦 DPDP 的隐私律师和合规顾问建立推荐与实施合作。
  - 与需要中立买方审批层的 Physical AI 实验室、远程操控厂商和数据采集合作方做联合销售或推荐。
  funnelTargets: 线索→合格试点 20-30%，合格试点→付费试点 40-50%，付费试点→年度正式生产 60%+，正式生产→12 个月内扩到第二个城市或新试点类型 50%+。
  pricing: 第一条真实工作流先收付费试点费或实施费；之后转成年平台订阅，按活跃城市和已审查高风险请求量收费。这贴合买方的真实触发点：一次偶发但足以上董事会的请求，最终会变成平台反复要处理的治理工作。
businessModel:
  revenueStreams:
  - 围绕录入工作流、审批流、权利台账与审计导出的年度 SaaS 订阅。
  - 首个部署的实施费与政策模板配置费。
  - 按已审查请求收费，或出售 基准报告、合作方工作流模板等高级模块。
  unitOfValue: 在一个已付费城市部署下，被处理的一条高风险数据采集请求。
  targetGrossMarginPct: 70
  expansionLevers:
  - 从同一平台里的一个城市或一种试点类型，扩到多城市、多请求类别。
  - 向上卖 基准报告、高管看板和更深的政策模板库。
  - 把同一套权利工作流扩到养老、住宅安防、酒店和现场服务。
  - 在不自己承接外部律师工作的前提下，货币化推荐与实施合作。
strategyMap:
  northStarMetric: 每月被处理到有文档决策、且附带完整同意与下游用途材料的高风险合作方请求数。
  inputMetrics:
  - 每季度拿到的合格厂商请求机会数。
  - 从请求录入到批准或拒绝的中位天数。
  - 付费试点转成年约的转化率。
  - 获批试点里，拥有完整住户与服务人员权利记录的占比。
  - 跨客户复用的政策模板数量。
  moatsToBuild:
  - 按任务、地点、角色和下游用途沉淀的试点政策图谱，覆盖批准、拒绝和限制三类结果。
  - 把住户同意、服务人员同意、留存、撤回和模型使用限制串起来的权利台账。
  - 跨客户沉淀的审批周期、红线条款和常见限制模式 基准数据集。
  - 和隐私律师及 Physical AI 厂商之间嵌入式的运营关系。
  killCriteria:
  - 12 个月内，在前 5 个目标平台里，付费试点少于 2 个，或真实厂商请求处理量少于 10 条。
  - 试点转正式生产的转化长期低于 50%，因为买方更愿意全面禁录、只用外部律师，或改做内部工具。
  - 到第 18 个月，仍没有任何相邻行业能复用超过 60% 的工作流、且买方紧迫度相近。
  mermaid: "flowchart LR\n  Wedge[家政服务同意切口] --> MVP[录入与权利台账 MVP]\n  MVP --> Proof[更快、更受治理的试点决策]\n  Proof --> Expansion[多城市与相邻行业扩张]\n"
investorMemo:
  verdict:
    call: 观察
    conviction: 触发事件真实、切口也清楚，但买方过于集中、请求频次未明、且还没证明能向相邻市场复用，所以判断上限被压住。
    whyBelieve: 研究已经表明，点名的平台确实在为入户录制承受公开摩擦，而且市场也愿意为审计、同意和评估工作流付费。
    whyDoubt: 滩头市场小而集中，只要请求频率还没被证实，买方就可能继续偏向外部律师、一刀切禁录或现有隐私套件。
    nextDiligence: 下一个关键证明点，是围绕一条真实厂商请求拿下付费试点，把决策周期显著缩短，并且能在接近研究 ACV 的水平上转成年约。
  firstCustomer:
    title: 印度即时家政平台的运营负责人或信任负责人
    profile: 一家拿过风投、面向消费者品牌曝光强、运营于一到两个大城市、且正和厂商讨论把家庭或服务人员数据用于 AI 的平台。
    trigger: 新的合作方提出要在住户家录制、复用服务人员视频或获取下游训练权，而平台必须迅速做决定，又不能引发信任事故。
    buyer: 运营负责人、首席法务官或信任与安全负责人
    initialContract: 先卖 $25k-50k 的付费试点，覆盖一个城市和一种请求类型；等平台把所有高风险数据请求都导进系统后，再转成约 $100k-150k 的年度软件合同。
  mustBeTrue:
  - 前 10 个目标平台里，至少有 5 家每季度会收到 2 条以上相关厂商请求。
  - 买方愿意在一次真实请求周期里为付费试点拨款，而不只是去找外部律师。
  - 产品能把“请求到决策”的时间至少砍掉 50%，同时保住可审计的同意与权利记录。
  - 至少有 1 个试点能转成位于研究 $100k-150k 区间内的年度合同。
  - 至少有 1 个相邻行业无需大改产品，就能复用大部分核心工作流。
  diligenceQuestions:
  - 今天每家头部平台每季度到底会审多少第三方 AI 数据或录制请求？
  - 触发出现时，预算究竟归运营、法务、信任，还是合作团队？
  - 在不把试点参与率打掉的前提下，住户与服务人员同意能复杂到什么程度？
  - 首个部署必须打通哪些现有系统，才能避免掉进重定制服务陷阱？
  - TrustArc、OneTrust 或“外部律师工作流”要多快就能把早期切口中和掉？
operatingAssumptions:
- assumption: 头部家政服务平台收到的高风险厂商请求，足以支撑持续性软件。
  basis: research.yaml
  validationTest: 至少访谈 5 家目标平台，并收集前 2 个季度的匿名请求日志，确认请求数量、类型和结果。
  decisionImpact: 如果不成立，业务就会滑向偶发型服务，或必须改去找更高频的工作流。
- assumption: 买方愿意为“软件 + 轻实施”买单，而不是继续停留在律师主导的手工流程。
  basis: research.yaml
  validationTest: 拿下 2 个带软件范围的付费试点，并对比买方手工基线下的法务工时和周期。
  decisionImpact: 如果不成立，定价能力会下滑，公司应改定位成服务增强型合规工作，或者直接放弃这个切口。
- assumption: 住户与服务人员双重同意能够落地，而不会让试点在商业上失去吸引力。
  basis: research.yaml
  validationTest: 在一个共创客户工作流里测试同意脚本，确认住户和服务人员两端的 opt-in 与完成率都能接受。
  decisionImpact: 如果不成立，产品就必须收缩到拒绝工作流、培训中心场景，或非家庭用例。
- assumption: 一层轻量工作流能在 8 周内接入现有法务、工单和文档系统。
  basis: 团队判断
  validationTest: 界定首个部署范围，并追踪从签试点到上线的时间，目标是在不重做平台底层的前提下 8 周内 live。
  decisionImpact: 如果不成立，实施会过度服务化，ICP 还得继续收窄。
- assumption: 相邻私密场景行业共享的政策逻辑足够多，能支撑风险投资级扩张。
  basis: idea.yaml
  validationTest: 访谈至少 6 位来自养老、住宅安防、酒店和现场服务的买方，确认其中一个细分能复用超过 60% 的工作流。
  decisionImpact: 如果不成立，业务就会被狭窄的印度家政市场卡死，投资匹配度也会变差。
experimentRoadmap:
- horizon: 0–90 天
  experiment: 买方与请求量发现
  hypothesis: 印度头部家政服务平台已经收到足够多的 Physical AI 与录制请求，值得单独做审批工作流。
  successMetric: 完成 5 次买方访谈、拿到 3 个合格的真实机会，并从至少 2 家平台拿到匿名请求量数据。
  owner: 创始人/CEO
- horizon: 0–90 天
  experiment: 同意与政策模板原型
  hypothesis: 住户与服务人员分角色的同意文案，加上下游用途限制，可以先为第一批请求类型标准化。
  successMetric: 1 家共创客户验证 3 套模板，并确认付费试点前不存在卡死的法务缺口。
  owner: 创始产品/合规负责人
- horizon: 90–180 天
  experiment: 录入到决策的 MVP 部署
  hypothesis: 一层轻量工作流能比买方手工流程更快，把一条真实请求推进到批准或拒绝。
  successMetric: 首个试点在 8 周内上线，且决策周期较基线至少缩短 50%。
  owner: 创始工程师
- horizon: 90–180 天
  experiment: 付费试点到年约的转化测试
  hypothesis: 只要一条高风险请求被顺利处理，买方就会把后续同类请求标准化到平台里。
  successMetric: 至少 1 个付费试点在完成后 60 天内转成 12 个月合同。
  owner: 创始人/CEO
- horizon: 6–12 个月
  experiment: 律师与厂商渠道启动
  hypothesis: 隐私律师和 Physical AI 厂商能够带来合格机会，同时不会把核心产品做成纯代工。
  successMetric: 建立 2 个活跃推荐伙伴，且至少 25% 的合格 pipeline 来自合作渠道。
  owner: 创始人/CEO
- horizon: 12–18 个月
  experiment: 相邻行业复用测试
  hypothesis: 同一套政策图谱和权利台账，可以在有限产品改动下支持一个相邻私密场景行业。
  successMetric: 1 个相邻行业试点复用超过 60% 的现有工作流组件，且买方紧迫度可比。
  owner: 创始产品/合规负责人
operations:
- 维护一套受控的政策模板、同意脚本、拒绝理由和下游用途条款库，按已批准请求类型拆分。
- 面对高风险请求，v1 保留人工审批和高管签字，不自动化最终 go/no-go 决策。
- 把审计包导入买方现有的法务、工单和文档系统，而不是逼它替换整个平台。
- 对同意材料和权利台账记录执行严格的留存、撤回和访问控制流程。
- 法条解释交给外部隐私律师，产品自己只聚焦工作流执行和证据沉淀。
team:
- role: 创始人/CEO
  startTiming: 第 0 个月
  rationale: 负责创始人主导销售、共创客户界定，以及律师和厂商合作，因为买方少而且极度看重可信度。
- role: 创始工程师
  startTiming: 第 0 个月
  rationale: 搭建第一条真实请求所需的录入工作流、审批流、权利台账和导出集成。
- role: 创始产品/合规负责人
  startTiming: 第 0 个月
  rationale: 把 DPDP 与买方工作流要求翻成模板、同意材料和边界很紧的 MVP。
- role: 实施/合规分析师
  startTiming: 第 4 个月
  rationale: 支持客户上线、基线与上线后效果对比，以及模板维护，避免创始人永久沦为服务团队。
- role: 企业销售
  startTiming: 第 12 个月
  rationale: 只有在试点转化和 ACV 已经可复制之后才补进来，让 GTM 花费跟着证明走，而不是抢跑。
milestones:
- horizon: 0–12 个月
  items:
  - 在印度家政滩头市场拿下 2 个付费共创试点。
  - 至少处理 10 条真实高风险请求，并留下有文档的结果。
  - 至少把 1 个试点转成 12 个月合同，达到目标 ACV 区间。
  - 把家庭录制、服务人员视频和远程操控请求的第一套政策模板库标准化。
- horizon: 12–24 个月
  items:
  - 做到 4–6 个正式生产客户品牌，并让至少 2 家客户扩到更多城市或请求类型。
  - 上线审批周期、限制模式和拒绝原因的 基准报告。
  - 在隐私律师与 AI 数据厂商两侧，各自建立 2–3 个活跃推荐或实施合作伙伴。
  - 用同一套权利与审批主干，完成 1 个相邻行业试点。
- horizon: 24–36 个月
  items:
  - 做到 10–12 个正式生产客户品牌，与研究中的 $1.8M SOM 情景一致。
  - 从印度家政服务扩到 1–2 个相邻私密场景行业，且大部分产品逻辑共用。
  - 证明公司已经沉淀出有防守力的政策图谱和 基准数据集，足以削弱表格、纯律师和通用套件替代方案。
risks:
- risk: 真实请求量太低，撑不起持续性软件，买方只把这条工作流当成偶发事件处理。
  likelihood: High
  impact: High
  mitigation: 尽早验证请求日志，初期围绕真实事件定价试点；如果请求量撑不起年约，就尽快放弃这个切口。
- risk: 买方继续默认外部律师、一刀切禁录，或者改用内部工作流工具。
  likelihood: High
  impact: High
  mitigation: 把产品定位成给律师补证据自动化；从第一天就支持拒绝工作流，并在真实请求上证明决策更快。
- risk: 同意复杂度或公众反弹让入户审批在商业上根本不划算。
  likelihood: Medium
  impact: High
  mitigation: 先支持受控拒绝、仅培训中心政策、高管签字和范围很窄的请求类型，再考虑更广泛的入户放行。
- risk: 一旦类别被证明有需求，隐私套件巨头会迅速补上物理空间模板。
  likelihood: Medium
  impact: Medium
  mitigation: 靠最快的运营工作流、最深的行业模板，以及 基准数据取胜，而不是去拼通用功能宽度。
- risk: 业务无法高效扩到印度家政服务之外。
  likelihood: High
  impact: High
  mitigation: 在前 18 个月内就测试相邻行业，并把核心架构做成能跨同意、权利与审批工作流复用。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: 用 18 个月资金完成产品搭建、政策模板开发、共创客户部署和相邻行业验证，让公司能证明请求量具备可复制性、拿下 2–3 个正式生产客户，并跑出一条可信的印度家政之外扩张路径。
