scenarios:
  downside:
    description: Request volume remains episodic, more accounts stay pilot-sized,
      and implementation work stays more manual through Y3.
    y3RevenueK: 1185.0
    y3EbitdaK: -286.0
    cashLowPointK: 520.0
    keyAssumptionChanges:
    - Q4Y3 paid deployments end at 9 instead of 12 because live requests convert more
      slowly.
    - Blended monthly ARPU exits near $13K instead of $14.5K as fewer accounts expand
      by city or request type.
    - Gross margin exits near 68% because analyst-led implementation remains a larger
      share of delivery.
  base:
    description: Founder-led sales converts live request events into annual deployments,
      then expands by city and request type inside a concentrated customer set.
    y3RevenueK: 1533.0
    y3EbitdaK: -32.65
    cashLowPointK: 892.58
    keyAssumptionChanges:
    - Paid deployments grow from 3 at Y1 exit to 7 at Y2 exit and 12 at Y3 exit.
    - Blended monthly ARPU rises from pilot levels around $4K-$8K to $14.5K by Q4Y3
      as annual subscriptions and usage expand.
    - Gross margin improves from 45%-60% in Y1 to 73% by Q4Y3 as templates and integrations
      reduce implementation drag.
  upside:
    description: Two customers expand into second cities faster and one adjacent-sector
      win reuses the same rights workflow with limited extra hiring.
    y3RevenueK: 1845.0
    y3EbitdaK: 165.0
    cashLowPointK: 960.0
    keyAssumptionChanges:
    - Q4Y3 paid deployments end at 14 instead of 12 because expansion and adjacency
      land earlier.
    - Blended monthly ARPU exits near $15.5K as benchmark reporting and request-volume
      upsells arrive sooner.
    - Gross margin exits near 75% because implementation becomes mostly template-led
      by late Y3.
sensitivity:
- variable: ARPU
  downsideCase: $160K annualized mature ARPU
  baseCase: $174K annualized mature ARPU
  upsideCase: $186K annualized mature ARPU
  y3RevenueImpactK: -145.0
  cashImpactK: -110.0
- variable: CAC
  downsideCase: $70K CAC as cycles stay bespoke and partner sourcing lags
  baseCase: $61K CAC
  upsideCase: $50K CAC via warmer counsel and vendor referrals
  y3RevenueImpactK: -60.0
  cashImpactK: -105.0
- variable: churn
  downsideCase: 3.0% monthly churn once first annual contracts renew
  baseCase: 2.0% monthly churn
  upsideCase: 1.5% monthly churn with stronger workflow embedding
  y3RevenueImpactK: -120.0
  cashImpactK: -85.0
- variable: sales cycle
  downsideCase: 9-month pilot-to-production cycle
  baseCase: 6-month blended cycle
  upsideCase: 4-5 month cycle on live-request urgency
  y3RevenueImpactK: -290.0
  cashImpactK: -210.0
- variable: gross margin
  downsideCase: 68% steady-state gross margin
  baseCase: 73% steady-state gross margin
  upsideCase: 75% steady-state gross margin
  y3RevenueImpactK: 0.0
  cashImpactK: -105.0
- variable: hiring pace
  downsideCase: Add integrations and customer success hires two quarters earlier than
    modeled
  baseCase: Delay support and extra engineering until deployment reuse is visible
  upsideCase: Hold one late hire until after 12 paid deployments are proven
  y3RevenueImpactK: -40.0
  cashImpactK: -135.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      LiveRequests --> PaidDeployments
      PaidDeployments --> AnnualSubscriptions
      AnnualSubscriptions --> GrossProfit
      GrossProfit --> OperatingCash
modelSanity:
- checkName: Revenue engine
  finding: Base-case revenue comes from growing paid deployments from 3 at Y1 exit
    to 12 at Q4Y3 while lifting ARPU as pilots convert into annual city-level subscriptions
    and usage-based pricing.
- checkName: Must go right
  finding: The company must turn live-request urgency into roughly six-month pilot-to-production
    cycles so the first seller adds new deployments instead of just supporting bespoke
    implementations.
- checkName: Model breaks if
  finding: If deployments stall near 9 and gross margin stays below 70%, downside
    cash falls toward roughly $520K before the next financing proof is achieved.
- checkName: Next-round proof
  finding: A credible seed case is exiting Y2 with 7 paid deployments across about
    4-6 logos, an adjacent-sector pilot, and a clear path to 70%+ gross margin.
sanityChecks:
  ruleOf40: Y3 growth 162.05% + EBITDA margin -2.13% = 159.92%
  burnMultiple: Y2 burn multiple 0.73x, improving to 0.03x in Y3 on net new ARR.
  revenuePerFte: $191.63K Y3 on 8 exit FTE (benchmark $200-400K SaaS)
  flags:
  - Revenue per exit FTE is still slightly below a top-tier SaaS benchmark, so the
    model needs city expansion inside existing customers to keep hiring efficient.
  - The business remains exposed to a small number of event-triggered buyers; if request
    volume stays sporadic, the model overstates recurring software demand.
  - Gross margin only clears the 70% target once implementation shifts from analyst-heavy
    rollout toward reusable templates and integrations.
  - The funding ask assumes the company can raise the low end of the stated pre-seed
    range even before adjacent-sector evidence is fully proven.
