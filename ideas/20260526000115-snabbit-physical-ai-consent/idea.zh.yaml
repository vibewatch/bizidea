problem: 家政服务平台已经开始接到来自 Physical AI 与数据采集合作方的请求，但它们还没有一套产品化机制，去决定哪些内容能录、谁能同意、数据该怎么标注，以及能不能商业化。现在这些决定往往被埋在 NDA、法务邮件往来和运营例外处理里，合作团队推进太慢，放在客户家这种场景里风险又太高。只要家庭录制被摆上台面，哪怕最终根本没有真的上线，平台也可能触发信任、监管和公关层面的损害。
targetUser:
  primary: 印度即时家政平台里，正在评估 AI 数据、远程操控或服务人员视频试点的运营、信任与法务负责人
  secondary: 家政服务平台中的产品与合作经理，负责撮合机器人、培训或保险数据接入
  buyer: 印度家政服务平台的运营负责人、首席法务官或信任与安全负责人
startupThesis:
  nonObviousInsight: 家庭场景里的 Physical AI，最先卡住的不是机器人硬件，而是消费者服务平台如何在信任边界内，把采集、标注、传输和变现私密家庭数据的权利先批清楚。
  beachhead: 月度订单超过 10,000 单、且已经在接第三方关于服务人员视频、随身摄像头、远程操控或家庭录制试点请求的印度即时家政平台
  wedge: 一套合作方接入与同意治理工作流：只要平台还没定义采集范围、同意文案、地点限制、标注权、留存规则和获批下游用途，任何入户数据试点都不能往前走。
  whyNowCatalyst: Snabbit-Human Archive 这次事件说明，具身 AI 的数据请求已经真的到了，和 DPDP 相关的同意问题也足以把一场合作讨论迅速推成平台级风险。
  ventureScalePath: 先拿下家政服务后，同一套同意与权利基础设施还能扩到养老、安防、酒店、配送和现场服务——凡是现实劳动与客户空间会被采集来训练 AI 的地方，都能复用。
solution: 做一套面向家政服务中 Physical AI 数据合作的同意控制平面。产品先从工作流切入：把每一条外部数据请求都收进来，按预设政策模板流转，为服务人员和住户生成角色化的同意材料，并把哪些获批、哪些被拒、哪些受限完整记账。系统维护一份可审计的权利台账，覆盖采集场景、标注权限、允许的模型用途、留存窗口和跨境传输限制。第一版产品不做通用隐私套件，它只解决高风险入户录制提案里的快速决策和留证。
goToMarketSeed:
  firstCustomer: 一家在一到两个大城市运营、正和厂商讨论服务人员培训视频或具身 AI 数据采集、同时又有品牌要守的印度即时家政平台。
  buyingTrigger: 出现新的试点请求，涉及家庭视频、服务人员视频、远程操控或第三方模型训练
  currentAlternative: 临时 NDA、外部律师、表格审批日志，以及一刀切的不录制政策
  switchingReason: 平台既想更快推进有希望的 AI 合作，又不想在同意范围还没搞清前拍脑袋，更不想因为厂商索要更宽的录制权而酿成公开事件。
  pricingHypothesis: 按活跃城市数加已审查数据采集请求量收取年度平台费
