jobsToBeDone:
- job: 当机器人或 AI 数据合作方希望采集服务人员或住户画面时，帮平台判断哪些行为可被允许，让它既能快，也不越过信任和监管红线。
  currentAlternative: 通过邮件做法务审查，再配合一刀切拒绝或临时开口子
  successMetric: 带完整审计链路的数据请求批准或拒绝时长
- job: 当平台允许一个受限试点时，帮运营和法务准确证明到底同意了什么、放开了哪些下游用途，让它能扛住客户、合作方和监管方的追问。
  currentAlternative: NDA、共享文档，以及分散保存的同意书
  successMetric: 拥有完整权利、留存与用途许可记录的试点占比
