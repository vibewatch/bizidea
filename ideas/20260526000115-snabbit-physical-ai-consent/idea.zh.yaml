topRisks:
- name: 初始市场过窄
  description: 短期内，真正会评估 Physical AI 数据试点的家政服务平台可能仍是个很小的人群。
  mitigation: 先盯住最活跃的印度即时服务玩家，再把同一套工作流扩到养老、安防和现场服务等相邻行业。
- name: 合规买方对新软件持怀疑态度
  description: 法务团队可能更愿意找外部律师、继续手工审，而不是为一个新类别采购软件。
  mitigation: 把产品定位成给律师做证据自动化的补位工具，靠更快的试点评审流程和清晰的审计输出打动买方。
- name: 平台可能直接全面禁录
  description: 部分市场平台可能会因为风险而一刀切禁止所有入户录制，从而压缩产品需求。
  mitigation: 同时支持强硬拒绝政策和受控审批，让软件依然成为合作决策的记录系统。
