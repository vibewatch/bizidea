differentiator: 现有隐私工具是围着网站、App 和企业内部数据治理设计的，它们不处理“谁可以在家庭空间里录”“按什么脚本录”“对应哪些下游模型权利”这类运营决策。这个产品是围着平台与合作方的审批流程做的，不是通用 Cookie 同意，也不是企业 GRC。真正能守住的资产，是在敏感消费者场景里关于现实世界 AI 数据权利的政策图谱和审计证据。
