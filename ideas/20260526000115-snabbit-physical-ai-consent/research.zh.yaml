  adoptionFrictionMatrix:
  - friction: 如何证明同意足够具体，能覆盖 AI 训练和下游模型使用权
    severity: high
    affectedBuyer: 首席法务官
    mitigation: 生成按用途拆分的同意材料、下游用途条款，以及和留存、标注权绑定的审批关卡。
    sourceRefs:
    - 1
    - 2
    - 3
    - 5
  - friction: 如何在同一条工作流里同时协调住户同意与服务人员同意
    severity: high
    affectedBuyer: 运营负责人
    mitigation: 把不同角色分别建模，必要时要求双重批准，并把例外情况和理由完整记账。
    sourceRefs:
    - 1
    - 2
    - 6
    - 7
  - friction: 一旦录制做法在护栏立住前先曝光，会不会引发公关反噬
    severity: high
    affectedBuyer: 信任与安全负责人
    mitigation: 先把拒绝流程、获批脚本和高管签字做出来，让买方能明确证明哪些行为发生了、哪些没有。
    sourceRefs:
    - 1
    - 14
    - 15
  - friction: 已经被拉满的隐私与产品团队，是否还有精力再接一条工作流
    severity: medium
    affectedBuyer: 产品与合作负责人
    mitigation: 先从轻量级的录入与决策层做起，把证据导出到现有法务或隐私系统。
    sourceRefs:
    - 23
    - 26
    - 38
