competitors:
- name: OneTrust
  stage: 现有厂商
  wedge: 面向大型企业的广义隐私运营、同意、评估与 AI 治理平台。
  pricing: 定制企业定价；以演示驱动、模块化售卖。
  strength: 在隐私运营、评估、同意与 AI 治理上平台宽度很深。
  weaknessVsUs: 它不是围着“住户与服务人员双重同意、厂商接入、家庭录制审批”来设计的。
  sourceRefs:
  - 19
  - 20
  - 21
  - 22
- name: TrustArc
  stage: 现有厂商
  wedge: 以隐私为中心的评估与同意平台，覆盖 DPIA、AI 审查和偏好管理。
  pricing: 定制企业定价；以演示驱动。
  strength: 评估模板强，AI 风险定位清楚，也明确打“别再用表格”这张牌。
  weaknessVsUs: 重心仍在隐私项目管理和数字渠道同意，而不是家庭场景里的运营合作审批。
  sourceRefs:
  - 23
  - 24
  - 25
- name: DataGrail
  stage: 成长阶段
  wedge: 集成式隐私运营平台，强调系统连接、审计日志与风险监控。
  pricing: 定制企业定价；平台式销售。
  strength: 对管理复杂系统环境的隐私团队来说，集成叙事和可审计性很强。
  weaknessVsUs: 它更偏 SaaS 和 DSR，离为 Physical AI 厂商工作流与家庭使用权量身定做还很远。
  sourceRefs:
  - 26
- name: Transcend
  stage: 成长阶段
  wedge: 把数据使用权限直接编码进客户数据系统，用来释放 AI 与个性化能力。
  pricing: 定制企业定价；需联系销售。
  strength: 其核心论点非常清晰：权限必须写回源头系统，合规数据才能产生业务价值。
  weaknessVsUs: 它从数据系统已经存在之后才开始发挥作用；而这里的新公司是在“能不能录”这一步就先做决定。
  sourceRefs:
  - 27
- name: BigID
  stage: 现有厂商
  wedge: 覆盖云、SaaS 与本地环境的数据安全、隐私和 AI 治理平台。
  pricing: 定制企业定价；企业平台销售。
  strength: 在大型数据资产上的发现、修复、跨境与 AI 风险能力很强。
  weaknessVsUs: 它优化的是“已采集数据和 AI 系统怎么治理”，不是“家庭试点在采集前要不要放行、边界怎么设”。
  sourceRefs:
  - 28
