slug: "household-data-consent-rail"
date: "2026-05-25"
executiveSummary: >-
  Household Data Consent Rail is a narrow workflow product for Indian home-service
  platforms that are starting to receive vendor requests for in-home footage,
  worker video, teleoperation data, or downstream AI-training rights. The core
  pain is not generic privacy compliance; it is deciding, before any recording
  happens, what can be captured, who must consent, what annotation and model-use
  rights are allowed, and how the platform will prove those boundaries later.
  The researched trigger is real: Pronto and Snabbit show that even exploratory
  physical-AI data conversations can become public trust events for consumer
  brands operating at meaningful booking volume. The company should start with a
  single beachhead: Indian instant domestic-help platforms with visible brands,
  live partner discussions, and enough operational scale that one opaque pilot
  can create legal, PR, and board-level urgency. The first product should be an
  intake-to-decision control plane with policy templates, dual household-worker
  consent artifacts, rights ledgering, and executive sign-off, not a broad
  privacy suite or post-collection data catalog. GTM should be founder-led and
  event-triggered: sell a paid pilot when a platform receives a live request,
  convert to an annual contract once all high-risk partner requests route
  through the system, and expand by city, pilot type, and adjacent intimate-space
  sectors. Market evidence supports a credible but narrow initial software
  wedge, with researched SAM of about $6.0M and year-3 SOM of about $1.8M, so
  venture upside depends on proving reuse in eldercare, residential security,
  hospitality, or field service. The main missing evidence is how many such
  requests top platforms actually see per quarter and whether buyers will fund
  software versus counsel-only workflows, so those points remain explicit
  operating assumptions rather than claims.
problem:
  - "Home-service platforms are receiving physical-AI and data-collection requests before they have a productized way to approve, limit, or deny in-home recording, annotation, transfer, and commercialization rights."
  - "Current alternatives—NDAs, outside counsel, email threads, spreadsheets, or blanket bans—are slow, hard to audit, and fragile when household recording becomes a public trust issue."
solution:
  - "Provide a partner-intake and consent-governance workflow that forces every high-risk data request through structured scoping: collection context, roles that must consent, location restrictions, annotation rights, retention windows, downstream model uses, and transfer limits."
  - "Generate auditable approval or denial artifacts for households, workers, vendors, and executives, then maintain a rights ledger that proves what was approved, restricted, withdrawn, or rejected."
whyWeWin:
  - "Incumbent privacy suites validate budget for consent, assessments, and audit trails, but they are optimized for websites, SaaS systems, and enterprise data estates rather than pre-collection approval of household recording pilots."
  - "If the company becomes the system of record for approved and denied pilot types, it can compound a proprietary policy graph around dual-consent, annotation, and downstream-use boundaries that counsel, spreadsheets, and generic tools do not capture well."
strategicChoices:
  beachhead: "Indian instant domestic-help marketplaces with 10,000+ monthly jobs, visible consumer brands, and active vendor requests for in-home footage, worker video, teleoperation, or model-training pilots."
  wedgeRationale: "This slice is narrow enough that one founder-led sales motion can cover the credible buyer set, but urgent enough that a single live request can trigger budget, legal review, and executive scrutiny. Broader privacy or horizontal AI-governance entry points would lengthen the sales cycle and make the company look interchangeable with larger incumbents."
  sequencingRationale: "Start with software plus policy-template implementation for one request-driven workflow, because the first proof point is faster and safer pilot decisions, not a full compliance-platform replacement. Only after two to three production logos validate repeat request volume should the company add deeper integrations, benchmark data products, broader partner channels, and adjacent-sector expansion. Hiring follows the same order: product and implementation capability first, repeatable sales capacity later."
  notYet:
    - "General-purpose privacy program management for unrelated digital use cases."
    - "Robotics teleoperation tooling or data-labeling operations."
    - "Consumer-facing consent-manager brand or marketplace app."
    - "International expansion before India workflow fit is proven."
market:
  tam: "$150.0M estimated TAM based on roughly 1,000 global operators across intimate-space service, residential care, property/security, hospitality, and robotics-data programs at about $150k ACV."
  sam: "$6.0M estimated beachhead SAM based on roughly 40 India and near-India operators with plausible near-term exposure to in-home recording or physical-AI data requests at about $150k ACV."
  som: "$1.8M estimated year-3 SOM based on 12 production logos at about $150k ACV."
  segments:
    - "Indian instant domestic-help and home-service platforms evaluating AI-data or teleoperation pilots."
    - "Adjacent intimate-space platforms in eldercare, residential security, hospitality, and field service."
  buyingProcess: "The buying process starts when a vendor asks to capture or reuse in-home footage, worker video, or teleoperation data and the platform cannot answer with its existing legal and ops workflow. The economic buyer is usually the head of operations, chief legal officer, or trust leader, with product, partnerships, privacy counsel, and executive sponsors involved before a paid pilot converts into an annual governance contract."
product:
  mvp: "The MVP should ingest one high-risk vendor request, route it through DPDP-aware policy templates, generate separate household and worker consent artifacts where needed, and log approval, denial, retention, and downstream-use decisions in a rights ledger. It should explicitly exclude broad privacy-program administration, post-collection data discovery, and vendor-side data operations."
  sixMonth: "Ship one production deployment for a design partner covering intake forms, approval routing, denial workflows, consent artifact generation, and exportable audit packets for one city and one pilot type."
  twelveMonth: "Standardize the first policy-template library for household recording, worker video, and teleoperation requests; convert two to three logos to annual contracts; and add lightweight integrations into existing legal, ticketing, and document systems."
  twentyFourMonth: "Expand within existing customers by city and pilot type, launch benchmark reporting on approval patterns and cycle time, and prove one adjacent-sector workflow that reuses most of the policy graph and rights ledger."
  keyBets:
    - "Target platforms receive enough high-risk requests each quarter to justify recurring software rather than one-off counsel work."
    - "Dual household-worker consent can be operationalized without collapsing pilot participation or creating unmanageable legal friction."
    - "A narrow intake-and-decision layer can integrate faster than buyers can justify building internally."
    - "At least one adjacent intimate-space sector can reuse more than 60% of the core workflow."
gtm:
  wedge: "Sell a paid design-partner pilot when a home-service platform receives a live request for household recording, worker video, teleoperation, or model-training rights and needs a governed yes/no decision before the pilot can proceed."
  channels:
    - "Founder-led direct sales to heads of operations, trust, legal, and partnerships at top Indian home-service platforms."
    - "Referral and implementation partnerships with DPDP-focused privacy counsel and compliance advisors."
    - "Co-sell or referral motions with physical-AI labs, teleoperation vendors, and data-collection partners that need a neutral buyer-side approval layer."
  funnelTargets: "Lead→qualified pilot 20-30%, qualified pilot→paid pilot 40-50%, paid pilot→annual production 60%+, production→second city or pilot-type expansion within 12 months 50%+."
  pricing: "Charge a paid pilot or implementation fee for the first live workflow, then convert to an annual platform subscription priced by active city and volume of reviewed high-risk requests. This fits the actual buying trigger: a sporadic but board-visible request that becomes recurring governance work once the platform starts evaluating more pilots."
businessModel:
  revenueStreams:
    - "Annual SaaS subscription for intake workflow, approval routing, rights ledger, and audit exports."
    - "Implementation and policy-template setup fees for the first deployment."
    - "Usage-based fees for reviewed requests or premium modules such as benchmark reporting and partner workflow templates."
  unitOfValue: "Each high-risk data-collection request processed under an active city deployment."
  targetGrossMarginPct: 70
  expansionLevers:
    - "Expand from one city or pilot type to multiple cities and request categories within the same platform."
    - "Upsell benchmark reporting, executive dashboards, and deeper policy-template libraries."
    - "Extend the same rights workflow into eldercare, residential security, hospitality, and field service."
    - "Monetize referral and implementation partnerships without owning outside counsel work."
strategyMap:
  northStarMetric: "Monthly high-risk partner requests processed to a documented decision with complete consent and downstream-use artifacts."
  inputMetrics:
    - "Qualified vendor-request opportunities sourced per quarter."
    - "Median days from request intake to approved or denied decision."
    - "Paid pilot to annual-contract conversion rate."
    - "Percent of approved pilots with complete household and worker rights records."
    - "Number of reusable policy templates deployed across customers."
  moatsToBuild:
    - "Policy graph of approved, denied, and restricted pilot types by task, location, role, and downstream use."
    - "Rights ledger linking household consent, worker consent, retention, withdrawal, and model-use constraints."
    - "Benchmark dataset on approval cycle time, red-line clauses, and common restriction patterns across customers."
    - "Embedded operational relationships with privacy counsel and physical-AI vendors."
  killCriteria:
    - "Fewer than 2 paid pilots or fewer than 10 real vendor requests processed across the first 5 target platforms within 12 months."
    - "Pilot-to-production conversion stays below 50% because buyers choose blanket bans, outside counsel only, or internal tooling."
    - "No adjacent sector shows more than 60% workflow reuse and comparable buyer urgency by month 18."
  mermaid: |
    flowchart LR
      Wedge[Home-service consent wedge] --> MVP[Intake and rights-ledger MVP]
      MVP --> Proof[Faster governed pilot decisions]
      Proof --> Expansion[Multi-city and adjacent-sector expansion]
investorMemo:
  verdict:
    call: "Watch"
    conviction: "Real trigger and clear wedge, but conviction is capped by buyer concentration, uncertain request volume, and the need to prove adjacent-market reuse."
    whyBelieve: "The research shows named platforms already facing public friction around in-home recording and validates budget for audit, consent, and assessment workflows."
    whyDoubt: "The beachhead market is small and concentrated, and buyers may still prefer counsel, blanket bans, or incumbent privacy suites until request frequency is proven."
    nextDiligence: "The next proof point is a paid pilot on a live vendor request that cuts decision cycle time materially and converts into an annual contract near the researched ACV."
  firstCustomer:
    title: "Head of operations or trust at an Indian instant domestic-help marketplace"
    profile: "A venture-backed platform with strong consumer brand exposure, operations in one or two major cities, and active discussions with vendors requesting household or worker data for AI use."
    trigger: "A new partner asks to record in homes, reuse worker video, or obtain downstream training rights and the platform must decide quickly without creating a trust incident."
    buyer: "Head of operations, chief legal officer, or trust-and-safety leader"
    initialContract: "$25k-50k paid pilot for one city and one request type, converting to roughly $100k-150k annual software once the platform routes all high-risk data requests through the system."
  mustBeTrue:
    - "At least 5 of the top 10 target platforms receive 2 or more relevant vendor requests per quarter."
    - "A buyer will fund a paid pilot inside one live request cycle rather than relying only on outside counsel."
    - "The product can reduce request-to-decision time by at least 50% while preserving auditable consent and rights records."
    - "At least one pilot converts to an annual contract in the researched $100k-150k range."
    - "One adjacent sector can reuse most of the core workflow without a full product rewrite."
  diligenceQuestions:
    - "How many third-party AI-data or recording requests does each top platform actually review per quarter today?"
    - "Who owns budget when the trigger appears: operations, legal, trust, or partnership teams?"
    - "What level of household and worker consent complexity is commercially acceptable before pilot participation drops?"
    - "Which existing systems must integrate in the first deployment to avoid a custom-services trap?"
    - "How quickly could TrustArc, OneTrust, or an outside-counsel workflow neutralize the wedge for early buyers?"
operatingAssumptions:
  - assumption: "Top home-service platforms receive enough high-risk vendor requests to justify recurring software."
    basis: "research.yaml"
    validationTest: "Interview at least 5 target platforms and collect anonymized request logs showing request count, type, and outcome for the prior 2 quarters."
    decisionImpact: "If false, the business shifts toward episodic services or a different higher-frequency workflow."
  - assumption: "Buyers will pay for software plus lightweight implementation rather than counsel-only manual processes."
    basis: "research.yaml"
    validationTest: "Close 2 paid pilots with software scope and compare legal-review hours and cycle time against the buyer's manual baseline."
    decisionImpact: "If false, pricing power falls and the company should reposition as services-enabled compliance work or abandon the wedge."
  - assumption: "Dual household-worker consent can be operationalized without making pilots commercially unattractive."
    basis: "research.yaml"
    validationTest: "Run consent-script tests in one design-partner workflow and confirm acceptable opt-in and completion rates for both households and workers."
    decisionImpact: "If false, the product must narrow to denial workflows, training-center environments, or non-home use cases."
  - assumption: "A lightweight workflow layer can integrate into existing legal, ticketing, and document systems in under 8 weeks."
    basis: "operator judgment"
    validationTest: "Scope the first deployment and track signed-pilot-to-live time, targeting go-live within 8 weeks without bespoke platform rebuilds."
    decisionImpact: "If false, implementation becomes too services-heavy and the ICP must narrow further."
  - assumption: "Adjacent intimate-space sectors share enough policy logic to support venture-scale expansion."
    basis: "idea.yaml"
    validationTest: "Interview at least 6 buyers across eldercare, residential security, hospitality, and field service and confirm that one segment can reuse more than 60% of the workflow."
    decisionImpact: "If false, the business remains constrained by the narrow India home-services market and investor fit worsens."
experimentRoadmap:
  - horizon: "0-90 days"
    experiment: "Buyer and request-volume discovery"
    hypothesis: "The top Indian home-service platforms already see enough physical-AI and recording requests to justify a dedicated approval workflow."
    successMetric: "5 buyer interviews completed, 3 qualified live opportunities, and anonymized request-volume data from at least 2 platforms."
    owner: "Founder CEO"
  - horizon: "0-90 days"
    experiment: "Consent and policy-template prototyping"
    hypothesis: "Role-specific household and worker consent language plus downstream-use restrictions can be standardized for the first request types."
    successMetric: "One design partner validates 3 template sets and flags no blocking legal gaps for a paid pilot."
    owner: "Founding product / compliance lead"
  - horizon: "90-180 days"
    experiment: "Intake-to-decision MVP deployment"
    hypothesis: "A lightweight workflow layer can move one live request from intake to approved or denied decision faster than the buyer's manual process."
    successMetric: "First pilot goes live within 8 weeks and cuts decision cycle time by at least 50% versus baseline."
    owner: "Founding eng"
  - horizon: "90-180 days"
    experiment: "Paid pilot to annual-conversion test"
    hypothesis: "Once one high-risk request is handled successfully, the buyer will standardize future requests on the platform."
    successMetric: "At least 1 paid pilot converts to a 12-month contract within 60 days of pilot completion."
    owner: "Founder CEO"
  - horizon: "6-12 months"
    experiment: "Counsel and vendor channel launch"
    hypothesis: "Privacy counsel and physical-AI vendors can source qualified opportunities without commoditizing the core product."
    successMetric: "2 active referral partners and at least 25% of qualified pipeline sourced through partners."
    owner: "Founder CEO"
  - horizon: "12-18 months"
    experiment: "Adjacent-sector reuse test"
    hypothesis: "The same policy graph and rights ledger can support one adjacent intimate-space sector with limited product rework."
    successMetric: "1 adjacent-sector pilot reuses more than 60% of existing workflow components and shows comparable buyer urgency."
    owner: "Founding product / compliance lead"
operations:
  - "Maintain a controlled library of policy templates, consent scripts, denial reasons, and downstream-use clauses for each approved request type."
  - "Keep human approval and executive sign-off in the workflow for high-risk requests; do not automate final go/no-go decisions in v1."
  - "Export audit packets into the buyer's existing legal, ticketing, and document systems rather than forcing platform replacement."
  - "Run strict retention, withdrawal, and access-control processes for consent artifacts and rights-ledger records."
  - "Use external privacy counsel for statutory interpretation while keeping the product focused on workflow execution and evidence."
team:
  - role: "Founder CEO"
    startTiming: "Month 0"
    rationale: "Owns founder-led sales, design-partner scoping, and counsel or vendor partnerships because the buyer set is small and credibility-sensitive."
  - role: "Founding eng"
    startTiming: "Month 0"
    rationale: "Builds the intake workflow, approval routing, rights ledger, and export integrations needed for the first live request."
  - role: "Founding product / compliance lead"
    startTiming: "Month 0"
    rationale: "Translates DPDP and buyer workflow requirements into templates, consent artifacts, and a tightly scoped MVP."
  - role: "Implementation / compliance analyst"
    startTiming: "Month 4"
    rationale: "Supports customer rollout, baseline-versus-postlaunch measurement, and template maintenance without turning founders into permanent services labor."
  - role: "Enterprise seller"
    startTiming: "Month 12"
    rationale: "Added only after pilot conversion and ACV are repeatable, so GTM spend follows proof rather than front-running it."
milestones:
  - horizon: "0-12 months"
    items:
      - "Close 2 paid design-partner pilots in the India home-service beachhead."
      - "Process at least 10 live high-risk requests through the product with documented outcomes."
      - "Convert at least 1 pilot into a 12-month contract at the target ACV range."
      - "Standardize the first policy-template library for household recording, worker video, and teleoperation requests."
  - horizon: "12-24 months"
    items:
      - "Reach 4-6 production logos and expand at least 2 customers to additional cities or request types."
      - "Launch benchmark reporting on approval cycle time, restriction patterns, and denial reasons."
      - "Establish 2-3 active referral or implementation partners across privacy counsel and AI-data vendors."
      - "Complete 1 adjacent-sector pilot using the same rights and approval spine."
  - horizon: "24-36 months"
    items:
      - "Reach 10-12 production logos, consistent with the researched $1.8M SOM scenario."
      - "Expand beyond India home services into one or two adjacent intimate-space sectors with mostly shared product logic."
      - "Demonstrate a defensible policy graph and benchmark dataset that weakens spreadsheet, counsel-only, and generic-suite substitutes."
risks:
  - risk: "Actual request volume is too low for recurring software and buyers treat the workflow as episodic."
    likelihood: "High"
    impact: "High"
    mitigation: "Validate request logs early, price initial pilots around live events, and abandon the wedge quickly if the volume does not support annual contracts."
  - risk: "Buyers default to outside counsel, blanket no-recording rules, or internal workflow tools."
    likelihood: "High"
    impact: "High"
    mitigation: "Position the product as evidence automation that complements counsel, support denial workflows from day one, and prove faster decision cycles on a live request."
  - risk: "Consent complexity or public backlash makes in-home approvals commercially unattractive."
    likelihood: "Medium"
    impact: "High"
    mitigation: "Support controlled denials, training-center-only policies, executive sign-off, and narrowly scoped request types before any broader in-home rollout."
  - risk: "Incumbent privacy suites add physical-space templates once the category shows demand."
    likelihood: "Medium"
    impact: "Medium"
    mitigation: "Win on fastest operational workflow, domain-specific template depth, and benchmark data rather than generic feature breadth."
  - risk: "The business cannot expand efficiently beyond India home services."
    likelihood: "High"
    impact: "High"
    mitigation: "Test adjacent sectors within the first 18 months and keep core architecture reusable across consent, rights, and approval workflows."
fundingAsk:
  round: "pre-seed"
  targetFundingRangeUsd: "$2-4M"
  runwayMonths: 18
  useOfFundsSummary: "Fund 18 months of product build, policy-template development, design-partner deployment, and adjacent-sector validation so the company can prove repeat request volume, close 2-3 production logos, and show one credible expansion path beyond India home services."
