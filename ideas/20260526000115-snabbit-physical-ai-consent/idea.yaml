topRisks:
  - name: Narrow initial market
    description: Home-service platforms evaluating physical-AI data pilots may still be a small cohort in the near term.
    mitigation: Start with the most active Indian instant-service players, then expand the same workflow to adjacent sectors such as eldercare, security, and field service.
  - name: Compliance buyer skepticism
    description: Legal teams may prefer outside counsel and manual review over buying new software for an emerging category.
    mitigation: Position the product as evidence automation that complements counsel, with fast pilot-review workflows and clear audit outputs.
  - name: Platforms may ban recording outright
    description: Some marketplaces could respond to risk by refusing all in-home recording, shrinking demand for the product.
    mitigation: Support both hard-deny policies and controlled approvals so the software still becomes the system of record for partnership decisions.
