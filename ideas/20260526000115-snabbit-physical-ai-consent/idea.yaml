problem: >-
  Home-service marketplaces are starting to receive requests from physical-AI and data-collection partners before they have a
  productized way to decide what can be recorded, who can consent, how data can be labeled, or whether it can be commercialized.
  Today those decisions get buried in NDAs, legal email threads, and ops exceptions, which is too slow for partnership teams and
  too risky for customer-home environments. Once household recordings enter the conversation, a platform can trigger trust,
  regulatory, and PR damage even if no rollout actually happened.
targetUser:
  primary: Operations, trust, and legal leads at Indian instant domestic-help marketplaces evaluating AI-data, teleoperation, or worker-video pilots
  secondary: Product and partnership managers at home-service platforms brokering robotics, training, or insurance data integrations
  buyer: Head of operations, chief legal officer, or trust-and-safety leader at an Indian home-service marketplace
startupThesis:
  nonObviousInsight: >-
    The first bottleneck in physical AI for the home is not robot hardware; it is permissioning the rights to capture, annotate,
    transfer, and monetize intimate household data inside a consumer-services trust boundary.
  beachhead: >-
    Indian instant domestic-help platforms with 10,000+ monthly jobs that are actively fielding third-party requests for worker
    video, bodycam, teleoperation, or household-recording pilots
  wedge: >-
    A partner-intake and consent-governance workflow that blocks any in-home data pilot until the platform defines collection
    scope, consent language, location restrictions, annotation rights, retention rules, and approved downstream uses
  whyNowCatalyst: >-
    The Snabbit-Human Archive episode shows that embodied-AI data requests are already arriving and DPDP-linked consent questions
    can turn a partnership discussion into an urgent platform-risk issue.
  ventureScalePath: >-
    After winning home services, the same consent and rights infrastructure can expand to eldercare, security, hospitality,
    delivery, and field-service platforms anywhere real-world labor and customer spaces are being captured for AI training.
solution: >-
  Build a consent control plane for physical-AI data partnerships in home services. The product starts as a workflow that ingests
  every external data request, routes it through pre-set policy templates, generates role-specific consent artifacts for workers
  and households, and logs what was approved, denied, or restricted. It maintains an auditable rights ledger covering collection
  context, annotation permissions, allowed model uses, retention windows, and cross-border transfer constraints. The first product
  does not try to be a general privacy suite; it is a fast decision-and-evidence layer for high-risk in-home recording proposals.
goToMarketSeed:
  firstCustomer: >-
    An Indian instant domestic-help marketplace operating in one or two major cities, with active vendor conversations around
    worker training video or embodied-AI data collection and a visible consumer brand to protect
  buyingTrigger: A new pilot request involving home footage, worker video, teleoperation, or third-party model training
  currentAlternative: Ad hoc NDAs, external counsel, spreadsheet approval logs, and blanket no-recording policies
  switchingReason: >-
    The platform can move faster on promising AI partnerships without guessing on consent scope or exposing itself to a public
    incident when a vendor asks for broader recording rights
  pricingHypothesis: Annual platform fee priced by active city plus volume of reviewed data-collection requests
