jobsToBeDone:
  - job: When a robotics or AI-data partner asks to collect worker or household footage, help the platform decide what is permissible, so they can move fast without crossing trust or regulatory lines.
    currentAlternative: Legal review over email plus blanket rejection or ad hoc exceptions
    successMetric: Time to approve or reject a data request with a complete audit trail
  - job: When a platform allows a limited pilot, help ops and legal prove exactly what was consented to and what downstream uses were authorized, so they can survive customer, partner, and regulator scrutiny.
    currentAlternative: NDAs, shared docs, and disconnected storage of consent forms
    successMetric: Percentage of pilots with complete rights, retention, and use-permission records
ideaScorecard:
