differentiator: >-
  Incumbent privacy tools are built for websites, apps, and internal data governance; they do not model the operational decisions
  around who may record inside a home, under what script, for which downstream model rights. This product is designed around the
  platform-partner approval workflow, not generic cookie consent or enterprise GRC. The defensible asset is the policy graph and
  audit evidence for real-world AI data rights in sensitive consumer environments.
