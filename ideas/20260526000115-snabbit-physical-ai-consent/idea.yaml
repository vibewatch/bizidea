    score: 5
    rationale: The trigger is concrete, current, and directly tied to a revealed workflow gap in a named platform interaction.
  painIntensity:
    score: 4
    rationale: One mishandled pilot can create consumer trust damage, slowed partnerships, and compliance exposure for a visible marketplace.
  wedgeClarity:
    score: 5
    rationale: The initial product is a narrow approval-and-audit workflow for in-home data requests, not a broad privacy suite.
  defensibility:
    score: 4
