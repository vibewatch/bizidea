scenarios:
  downside:
    description: 请求量仍然是零散事件，更多客户停留在试点规模，且到 Y3 交付仍然偏手工。
    y3RevenueK: 1185.0
    y3EbitdaK: -286.0
    cashLowPointK: 520.0
    keyAssumptionChanges:
    - Q4Y3 付费部署只做到 9 个，而不是 12 个，因为 真实请求 转化更慢。
    - 综合月度 ARPU 只接近 $13K，而不是 $14.5K，因为按城市或请求类型扩张的客户更少。
    - 稳定毛利率只到约 68%，因为分析师主导实施仍然占交付的大头。
  base:
    description: 创始人主导销售把 真实请求 事件转成年度部署，再在高度集中的客户集合里按城市和请求类型扩张。
    y3RevenueK: 1533.0
    y3EbitdaK: -32.65
    cashLowPointK: 892.58
    keyAssumptionChanges:
    - 付费部署从 Y1 末的 3 个，增长到 Y2 末的 7 个，再到 Y3 末的 12 个。
    - 综合月度 ARPU 从试点期约 $4K-$8K，提升到 Q4Y3 的 $14.5K，因为年约和按量收费一起放大。
    - 毛利率从 Y1 的 45%-60%，提升到 Q4Y3 的 73%，因为模板和集成逐步吃掉实施拖累。
  upside:
    description: 两家客户更快扩到第二个城市，另有一个相邻行业客户在几乎不额外加人的情况下复用同一套权利工作流。
    y3RevenueK: 1845.0
    y3EbitdaK: 165.0
    cashLowPointK: 960.0
    keyAssumptionChanges:
    - Q4Y3 付费部署做到 14 个，而不是 12 个，因为扩张和相邻行业拿单更早发生。
    - 综合月度 ARPU 接近 $15.5K，因为 基准报告和请求量 upsell 提前到来。
    - 稳定毛利率接近 75%，因为到 Y3 后期实施已主要由模板驱动。
