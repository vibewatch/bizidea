  y3RevenueImpactK: -290.0
  cashImpactK: -210.0
- variable: 毛利率
  downsideCase: 稳定毛利率 68%
  baseCase: 稳定毛利率 73%
  upsideCase: 稳定毛利率 75%
  y3RevenueImpactK: 0.0
  cashImpactK: -105.0
- variable: 招聘节奏
  downsideCase: 比模型早两个季度招聘集成与客户成功岗位
