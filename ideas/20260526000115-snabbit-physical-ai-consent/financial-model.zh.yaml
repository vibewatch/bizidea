  upsideCase: 等 12 个付费部署被证明后，再补最后一个岗位
  y3RevenueImpactK: -40.0
  cashImpactK: -135.0
modelDiagram:
  title: 单位经济模型流转
  mermaid: "flowchart LR\n  LiveRequests[Live Requests] --> PaidDeployments[付费部署]\n  PaidDeployments --> AnnualSubscriptions[年度订阅]\n  AnnualSubscriptions --> GrossProfit[毛利润]\n  GrossProfit --> OperatingCash[经营现金]\n"
modelSanity:
- checkName: 收入引擎
  finding: 基准情景收入来自付费部署从 Y1 末的 3 个增至 Q4Y3 的 12 个，同时随着试点转成年化、按城市计费的订阅，ARPU 也持续上升。
- checkName: 必须跑对的事
  finding: 公司必须把 真实请求 的紧迫性转成约 6 个月的“试点到正式生产”周期，否则第一位销售只会被定制化实施拖住，带不来新增部署。
- checkName: 模型会失效的情况
  finding: 如果部署停在约 9 个，且毛利率始终上不去 70%，在证明下一轮融资所需指标前，悲观情景下现金可能掉到约 $520K。
- checkName: 下一轮证明点
  finding: 一个可信的种子轮故事，是在 Y2 末做到 7 个付费部署、覆盖约 4-6 个客户品牌、再加一个相邻行业试点，并看清毛利率冲到 70%+ 的路径。
sanityChecks:
  ruleOf40: Y3 增长率 162.05% + EBITDA 利润率 -2.13% = 159.92%
  burnMultiple: Y2 burn multiple 为 0.73x，按净新增 ARR 看，Y3 改善到 0.03x
  revenuePerFte: Y3 每个退出时点 FTE 产出 $191.63K；退出时 FTE 为 8（SaaS 基准为 $200-400K）
  flags:
  - 按退出时点 FTE 算的人均收入仍略低于顶级 SaaS 基准，因此模型必须依赖在现有客户内部按城市扩张，才能把招聘效率守住。
  - 业务仍暴露在少数事件触发型买方之下；如果请求量长期零散，模型就高估了持续性软件需求。
  - 只有当交付从分析师重投入转向可复用模板和集成后，毛利率才真正越过 70% 目标。
  - 这次融资假设公司能在相邻行业证据尚未完全跑出来前，就拿到 pre-seed 区间下限。
