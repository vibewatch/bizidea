modelDiagram:
  title: 单位经济模型流程
  mermaid: |-
    flowchart LR
      Leads --> Pilots
      Pilots --> ProductionCustomers
      ProductionCustomers --> SubscriptionAndUsageRevenue
      SubscriptionAndUsageRevenue --> GrossProfit
      GrossProfit --> OperatingCash
modelSanity:
- checkName: 收入引擎
  finding: 基础情景通过将付费账户从 6 家增长至 45 家、混合 ACV $27K，实现第 3 年收入 $865.13K，渠道主导新增在 Y1 后贡献主要增量。
- checkName: 必须成立的条件
  finding: 试点到生产转化率须维持在 BP 目标 50% 附近，第 2 年才能以约 20 个客户收尾，为第 3 年更大规模扩张奠基。
- checkName: 模型失效条件
  finding: 若数据脆弱性或销售周期过长使毛利率持续低于 68% 且客户新增延迟，悲观情景现金低点将跌至 $153.88K。
- checkName: 下轮融资证明
  finding: 若公司以超过 10 个生产客户、毛利率超 70%，以及伙伴可靠带来部署机会的证据退出 Y2，则下轮融资的理由成立。
sanityChecks:
  ruleOf40: "第 3 年增速 159.76% + EBITDA 利润率 -51.48% = 108.28%"
  burnMultiple: "第 2 年烧钱倍数 1.53x，以退出 ARR 为基础，第 3 年改善至 0.66x。"
  revenuePerFte: "第 3 年约 $79K（11 人退出 FTE），基准为 SaaS $200–400K；偏低因为模型仍处于实施密集阶段，渠道建设先于规模化。"
  flags:
  - 人均收入仍远低于成熟 SaaS 基准，业务需要有力证据表明实施工作量不会随客户数线性增长。
  - 模型假设渠道伙伴在 Y2 带来 14 个新客户；若前两家渠道伙伴未能落地，整个爬坡将全面延迟。
  - 毛利率仅在 Y1 后人工降级假设显著下降的前提下才能达到 BP 目标；政府或税号端点若持续脆弱，毛利率将被压缩。
  - 40 法则在视觉上表现强劲，因为 Y2 收入基数很小；不应将其解读为后期效率指标。
