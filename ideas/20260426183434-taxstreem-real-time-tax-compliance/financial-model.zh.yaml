  y3RevenueImpactK: -75.0
  cashImpactK: 110.0
modelDiagram:
  title: 单位经济模型流转
  mermaid: "flowchart LR\n  Leads[线索] --> Pilots[试点]\n  Pilots --> ProductionCustomers[正式生产客户]\n  ProductionCustomers --> SubscriptionAndUsageRevenue[订阅与按量收入]\n  SubscriptionAndUsageRevenue --> GrossProfit[毛利润]\n  GrossProfit --> OperatingCash[经营现金]\n"
modelSanity:
- checkName: 收入引擎
  finding: 基础情景下，公司依靠 $27K 的综合 ACV 和 Y1 之后以渠道主导的客户新增，从 6 个付费账户增长到 45 个付费账户，在 Y3 实现 $865.13K 收入。
- checkName: 必须成立的前提
  finding: 试点到正式部署转化需要接近 BP 中 50% 的目标，这样 Y2 结束时才能达到约 20 个客户，并为更大规模的 Y3 扩张打下基础。
- checkName: 模型失效条件
  finding: 如果数据脆弱性或销售周期过慢使毛利率长期低于 68%，并拖慢客户新增， downside 情景下现金低点将降至 $153.88K。
- checkName: 下一轮融资证明点
  finding: 若公司在 Y2 结束时拥有 10+ 个正式生产客户、>70% 毛利率，并证明伙伴可以稳定带来部署机会，则下一轮融资具备充分依据。
sanityChecks:
  ruleOf40: Y3 增长率 159.76% + EBITDA 利润率 -51.48% = 108.28%
  burnMultiple: Y2 burn multiple 为 1.53x，并在按退出 ARR 口径计算时于 Y3 改善至 0.66x。
  revenuePerFte: 按期末 11 名 FTE 计算，Y3 每名员工对应收入约 $79K（SaaS 基准为 $200–400K；偏低是因为模型仍较重实施，且渠道建设先于规模化）。
  flags:
  - 按期末 FTE 计算的收入仍明显低于成熟 SaaS 基准，因此业务需要清楚证明实施工作不会随客户数线性增长。
  - 模型假设伙伴渠道在 Y2 带来 14 个新客户；若首批两个渠道伙伴未能达成，将拖慢整个增长曲线。
  - 毛利率之所以能超过 BP 目标，只因假设 Y1 之后人工回退显著下降；若政府或 TIN 接口脆弱，毛利率将被压缩。
  - Rule of 40 看起来较强，主要是因为 Y2 收入基数很小，不应被解读为后期阶段的效率水平。
