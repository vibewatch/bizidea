scenarios:
  downside:
    description: 渠道转化不及预期，综合 ACV 更接近直接企业定价，且人工复核使毛利率始终低于目标。
    y3RevenueK: 510.94
    y3EbitdaK: -710.63
    cashLowPointK: 153.88
    keyAssumptionChanges:
    - 综合 ACV 降至 $22.5K
    - 第 2-3 年客户新增明显低于基础情景
    - 由于人工回退持续存在，Y2 COGS 保持在 32%，Y3 保持在 30%
  base:
    description: 创始人主导销售把早期试点转化为渠道辅助扩张，同时毛利率逐步逼近 70% 目标。
    y3RevenueK: 865.13
    y3EbitdaK: -445.41
    cashLowPointK: 518.42
    keyAssumptionChanges:
    - 基础情景采用 $27K 综合 ACV
    - Y2 客户新增按 [3,3,4,4]，Y3 按 [6,6,6,7]
    - 毛利率从早期 60% 提升到稳定阶段 72%
  upside:
    description: 平台伙伴爬坡更快，客户结构更偏向高 ACV 账户，且自动化降低实施拖累。
    y3RevenueK: 1333.78
    y3EbitdaK: -67.98
    cashLowPointK: 1023.24
    keyAssumptionChanges:
    - 综合 ACV 升至 $33K
    - 更多平台主导成交使客户新增提前实现
    - COGS 在 Y2 改善至 28%，Y3 改善至 25%
