scenarios:
  downside:
    description: 渠道转化变慢，混合 ACV 更接近企业直客定价，人工复核把毛利率压在目标以下。
    y3RevenueK: 510.94
    y3EbitdaK: -710.63
    cashLowPointK: 153.88
    keyAssumptionChanges:
    - 混合 ACV 降到 $22.5K
    - 与基准相比，Y2-Y3 新增客户明显放缓
    - 因人工兜底持续存在，Y2 COGS 维持在 32%，Y3 维持在 30%
  base:
    description: 创始人主导销售把早期试点转成伙伴辅助扩张动作，同时毛利率逐步靠近 70% 目标。
    y3RevenueK: 865.13
    y3EbitdaK: -445.41
    cashLowPointK: 518.42
    keyAssumptionChanges:
    - 基准情景采用 $27K 混合 ACV
    - 新增客户按 Y2 [3,3,4,4] 与 Y3 [6,6,6,7] 推进
    - 毛利率从早期 60% 改善到稳态 72%
  upside:
    description: 平台伙伴起量更快，客户结构更偏高 ACV 账户，而自动化降低了实施拖累。
    y3RevenueK: 1333.78
    y3EbitdaK: -67.98
    cashLowPointK: 1023.24
    keyAssumptionChanges:
    - 混合 ACV 提高到 $33K
    - 更多平台导向订单把新增客户节奏提前
    - Y2 COGS 改善到 28%，Y3 改善到 25%
