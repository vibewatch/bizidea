  cashImpactK: -116.0
- variable: CAC
  downsideCase: $22K CAC，因为试点更消耗创始人时间
  baseCase: $17.2K CAC
  upsideCase: $13K CAC，通过伙伴转介绍降低获客成本
  y3RevenueImpactK: -55.0
  cashImpactK: -190.0
- variable: churn
  downsideCase: 3.0% 月度 logo churn
  baseCase: 2.0% 月度 logo churn
  upsideCase: 1.0% 月度 logo churn
  y3RevenueImpactK: -95.0
  cashImpactK: -85.0
- variable: sales cycle
  downsideCase: 9 个月平均企业销售周期
  baseCase: ~6 个月混合销售周期
  upsideCase: 借伙伴成交把周期缩短到 4 个月
  y3RevenueImpactK: -180.0
  cashImpactK: -150.0
- variable: gross margin
  downsideCase: 68% 稳态毛利率
  baseCase: 72% 稳态毛利率
  upsideCase: 75% 稳态毛利率
  y3RevenueImpactK: 0.0
  cashImpactK: -120.0
- variable: hiring pace
  downsideCase: 两个计划岗位延后到 Q2Y3 之后再招聘
  baseCase: 按模型节奏招聘
  upsideCase: 需求支撑按计划完成招聘
  y3RevenueImpactK: -75.0
  cashImpactK: 110.0
modelDiagram:
  title: 单位经济流转
  mermaid: |-
    flowchart LR
      Leads --> Pilots
      Pilots --> ProductionCustomers
      ProductionCustomers --> SubscriptionAndUsageRevenue
      SubscriptionAndUsageRevenue --> GrossProfit
      GrossProfit --> OperatingCash
modelSanity:
- checkName: 收入引擎
  finding: 基准情景在 $27K 混合 ACV 下，把付费账户从 6 个增长到 45 个，因此 Y3 收入可达到 $865.13K；Y1 之后的增长主要来自渠道驱动新增。
- checkName: 必须做对的事
  finding: 试点到生产的转化需要接近 BP 里的 50% 目标，这样 Y2 才有机会在年末达到约 20 个客户，并接住更大的 Y3 扩张。
- checkName: 模型会在哪些情况下失效
  finding: 如果数据依赖脆弱或销售周期变慢，把毛利率压到 68% 以下并拖慢新增客户， downside 情景下的现金低点会跌到 $153.88K。
- checkName: 下一轮融资需要的证明
  finding: 如果公司能在 Y2 结束时拿到 10+ 个生产客户、70%+ 毛利率，并证明伙伴能稳定带来部署机会，就足以支撑下一轮融资逻辑。
sanityChecks:
  ruleOf40: Y3 growth 159.76% + EBITDA margin -51.48% = 108.28%
  burnMultiple: Y2 burn multiple 1.53x, improving to 0.66x in Y3 on exit ARR basis.
  revenuePerFte: Approximately $79K Y3 on 11 exit FTE (benchmark $200–400K SaaS; low because the model stays implementation-heavy and channel build-out precedes scale).
  flags:
  - 按退出时 11 名 FTE 计算，Y3 人均收入仍明显低于成熟 SaaS 基准，因此必须证明实施工作不会随着客户数线性增长。
  - 模型假设渠道在 Y2 能带来 14 个新增客户；如果前两个渠道伙伴没跑起来，整条爬坡曲线都会被拖后。
  - 毛利率能越过 BP 目标，建立在人工兜底会在 Y1 后明显下降的前提上；如果政府或 TIN 接口持续脆弱，毛利率就会被压缩。
  - Rule of 40 看起来很漂亮，主要是因为 Y2 收入基数很小；别把它误读成后期阶段的效率表现。
