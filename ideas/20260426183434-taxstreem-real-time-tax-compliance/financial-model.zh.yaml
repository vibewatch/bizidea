scenarios:
  downside:
    description: 渠道转化滑坡，混合 ACV 趋近直销企业定价，人工审核使毛利率未达目标。
    y3RevenueK: 510.94
    y3EbitdaK: -710.63
    cashLowPointK: 153.88
    keyAssumptionChanges:
    - 混合 ACV 降至 $22.5K
    - 第 2–3 年新增客户数较基准大幅放缓
    - 第 2 年 COGS 保持 32%、第 3 年 30%，因为人工降级持续存在
  base:
    description: 创始人主导销售将早期试点转化为伙伴辅助扩张，同时毛利率向 70% 目标爬坡。
    y3RevenueK: 865.13
    y3EbitdaK: -445.41
    cashLowPointK: 518.42
    keyAssumptionChanges:
    - 基础情景使用 $27K 混合 ACV
    - 新增客户数第 2 年按 [3,3,4,4]、第 3 年按 [6,6,6,7] 推进
    - 毛利率从早期 60% 提升至稳态 72%
  upside:
    description: 平台伙伴加速爬坡，客户结构偏向高 ACV 账户，自动化削减实施拖累。
    y3RevenueK: 1333.78
    y3EbitdaK: -67.98
    cashLowPointK: 1023.24
    keyAssumptionChanges:
    - 混合 ACV 升至 $33K
    - 更多平台主导的赢单拉动客户新增提前
    - 第 2 年 COGS 改善至 28%，第 3 年 25%
