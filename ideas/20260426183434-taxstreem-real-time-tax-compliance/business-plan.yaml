slug: supplier-tax-risk-api
date: "2026-04-26"
executiveSummary: >-
  TaxStreem should launch as a Nigeria-first supplier tax compliance middleware company, not as a broad filing suite. The immediate wedge is pre-payment validation for supplier invoices inside B2B payments and AP workflows, where buyers now face real loss of VAT or WHT deductions, filing exceptions, and audit exposure if invoices are wrong before money moves. Research shows real urgency in the current large-taxpayer cohort, with 5,000+ companies in the first mandatory e-invoicing phase and more than 1,000 already integrated, which supports near-term budget availability for compliance projects. The fastest path to proof is selling first to Nigerian AP and B2B payment platforms that already own invoice approval flows and can distribute the product across many end customers. The MVP should therefore focus on TIN and supplier identity checks, IRN or stamp validation, VAT and WHT rules, exception routing, and an audit log rather than full filing orchestration. The core moat is not a portal connector alone; it is the cross-customer supplier compliance graph built from mismatches, exception outcomes, and remediation histories. The biggest disconfirming risk is that buyers treat this as a feature they expect bundled into existing AP or filing products rather than a separately budgeted control layer. If the company cannot convert pilots into production contracts through channel partners or cannot keep manual override rates low enough for finance teams to trust blocking decisions, the plan should be narrowed or stopped.
problem:
  - Finance teams often discover supplier tax defects after invoice payment, when lost VAT recovery, WHT errors, and filing cleanup are already expensive.
  - Nigeria's move to real-time e-invoicing and tax-ID validation shifts compliance from month-end reporting into approval-time workflow decisions.
  - Manual review, consultants, and generic AP tools do not scale when invoice validity must be checked transaction by transaction.
solution:
  - Provide an API and reviewer dashboard that score each supplier invoice before approval or payment using TIN status, identity match, IRN or stamp checks, and VAT or WHT rules.
  - Route failed invoices into a remediation workflow with reason codes, override controls, and audit-ready evidence instead of allowing silent downstream tax exceptions.
  - Start with validation and exception handling, then add filing exports and partner-led submission only after approval-time adoption is proven.
whyWeWin:
  - The wedge sits upstream of filing tools at the moment buyer risk is created, which is harder for generic filing products to own by default.
  - Platform distribution through AP and B2B payments vendors can spread integration cost across many end customers faster than direct CFO-only selling.
  - A supplier compliance graph built from cross-customer validation outcomes can compound into a defensible Nigeria-specific risk dataset.
strategicChoices:
  beachhead: Nigerian B2B payment and AP automation platforms with 50+ business customers and invoice approval workflows for local suppliers.
  wedgeRationale: >-
    This beachhead reaches many invoice-heavy businesses through one integration, matches the researched first-customer profile, and lets the startup sell compliance as a revenue-enabling feature instead of a net-new standalone tax tool. It should create faster proof than broad direct enterprise selling because platform buyers already control workflow insertion points and have product budgets tied to regulated customer retention.
  sequencingRationale: >-
    Product should start with API validation, exception routing, and audit evidence because trust in approval-time decisions is the gating requirement for any later filing or analytics module. GTM should begin with design-partner platforms and a small number of mandate-driven enterprises, then add advisor and APP partners once the rule engine is stable. Hiring should mirror that sequence with engineering and tax rules first, solutions and partner implementation second, and scaled sales only after pilot-to-production conversion is repeatable.
  notYet:
    - Standalone SMB self-serve tax filing
    - Cross-border supplier tax workflows outside Nigeria
    - Full ERP replacement or generic AP automation
    - Payroll, consumer tax, or lending products
market:
  tam: "$60.0M estimated Nigeria-first TAM based on roughly 25,000 invoice-heavy businesses or platform-served entities at about $2,400 annual spend."
  sam: "$12.5M near-term SAM centered on the current 5,000+ large-taxpayer mandate cohort plus a small number of high-value platform accounts."
  som: "$1.2M year-3 SOM based on about 12 platform customers at roughly $60k ACV and 60 direct enterprise accounts at roughly $8k ACV."
  segments:
    - Nigerian AP and B2B payment platforms serving distributors, hospitality groups, and multi-entity businesses
    - Nigerian mid-market and enterprise finance teams with high local supplier invoice volume
  buyingProcess: >-
    Initial evaluation should usually start with a product, finance operations, or tax lead after an e-invoicing deadline, audit issue, or onboarding requirement exposes workflow risk. Production approval is likely to require CFO sponsorship, IT or ERP review, and proof that exception rates, manual overrides, and deployment effort are acceptable.
product:
  mvp: >-
    MVP should include supplier TIN and identity matching, invoice IRN or stamp validation, baseline VAT and WHT rule checks, exception routing, manual override with reason capture, and an audit-ready event log exposed through API and a lightweight reviewer dashboard. It should not attempt end-to-end filing submission in the first release.
  sixMonth: Ship production pilots with one to two AP or payment platforms, prebuilt ERP or accounting connectors, supplier remediation portal flows, and partner-based APP integration for validation evidence where needed.
  twelveMonth: Add configurable rules by sector, production analytics on exception drivers, filing-export connectors, reusable supplier profiles, and benchmarking that reduces false positives across customers.
  twentyFourMonth: Expand into a supplier risk network with state and federal filing orchestration, onboarding checks for banks or fintechs, and selective cross-border service-flow support.
  keyBets:
    - Approval-time validation is a budgeted control point rather than a nice-to-have feature.
    - Government, TIN, and APP data sources are reliable enough to support near-real-time decisions with manageable fallback logic.
    - Finance teams will trust a rules-first product if overrides are auditable and false positives fall quickly during pilots.
    - Platform partners will distribute the product faster than direct enterprise sales alone.
gtm:
  wedge: Sell a pre-payment supplier invoice validation API to Nigerian AP and B2B payment platforms, then use those production references to win large mandate-driven enterprises directly.
  channels:
    - Direct founder-led outbound to AP, procurement, and B2B payment platform executives
    - Targeted enterprise selling into mandate-driven large taxpayers with visible e-invoicing projects
    - Partner referrals from tax advisors, ERP implementers, and accredited APP or SI providers
  funnelTargets: "Design partner to paid pilot 25%+, pilot to production 50%+, production account to second workflow or multi-entity expansion 60%+ within 9 months."
  pricing: Annual platform fee plus usage pricing per validated invoice or supplier check, with early low-five-figure pilots converting into annual contracts because buyer value scales with invoice volume, integration effort, and protected deductions rather than seats.
businessModel:
  revenueStreams:
    - Annual platform subscription for rules engine, connectors, and regulatory updates
    - Usage fees per validated invoice, supplier remediation event, or counterparty check
    - Premium modules for filing export, benchmark analytics, and supplier network monitoring
    - Implementation and partner-enabled onboarding services during early deployments
  unitOfValue: Validated supplier invoice or supplier compliance check embedded in an approval workflow
  targetGrossMarginPct: 70
  expansionLevers:
    - Increase invoice volume within existing platform customers
    - Add more entities, business units, and workflows for direct enterprise accounts
    - Upsell filing-export, analytics, and supplier remediation modules
    - Extend the rules engine into onboarding and transaction monitoring for fintech partners
strategyMap:
  northStarMetric: Monthly production supplier invoices validated before payment with audit-ready outcomes
  inputMetrics:
    - Number of design partners integrated
    - Invoice validation latency
    - Manual override rate on flagged invoices
    - Pilot to production conversion rate
    - Percentage of flagged invoices remediated within five business days
    - Net revenue retention from platform accounts
  moatsToBuild:
    - Nigeria-specific tax rules library tied to approval-time decisions
    - Cross-customer supplier compliance graph and exception corpus
    - Embedded connectors and partner relationships with AP, ERP, and APP ecosystems
    - Trusted audit trail and override workflow that regulators, CFOs, and auditors accept
  killCriteria:
    - Fewer than 3 of the first 20 target customers confirm supplier invoice defects cause material deduction loss or audit pain.
    - Pilot to production conversion stays below 30% after 6 paid pilots.
    - Manual override rate remains above 40% after the first 50,000 validated invoices in production.
    - Channel partners fail to produce at least 2 qualified pilot opportunities per quarter by month 12.
  mermaid: |
    flowchart LR
      Wedge[Beachhead platform wedge] --> MVP[Validation API and exception workflow MVP]
      MVP --> Proof[Production pilots and deduction protection proof]
      Proof --> Expansion[Filing export, analytics, and supplier network expansion]
investorMemo:
  verdict:
    call: "Meet / investigate further"
    conviction: Strong wedge and timing for a Nigeria-first compliance middleware company, but willingness to pay and channel conversion still need proof.
    whyBelieve: Nigeria's e-invoicing rollout creates a real approval-time compliance problem that existing manual and filing-led tools do not solve cleanly.
    whyDoubt: The product could be absorbed into broader AP, filing, or access-point offerings before the startup proves enough differentiated data and distribution.
    nextDiligence: Validate with live customer logs that supplier-side defects cause enough financial pain to support low-five-figure pilots and at least 50% pilot-to-production conversion.
  firstCustomer:
    title: AP or B2B payments platform serving Nigerian mid-market finance teams
    profile: A platform with 50+ business customers, invoice approval workflows, and pressure to add Nigeria-compliant e-invoicing or tax controls without building them in-house.
    trigger: A FIRS e-invoicing deadline, customer audit escalation, or enterprise deal that requires proof of supplier tax validation before payment.
    buyer: VP Product
    initialContract: "$15k-30k paid pilot over 8-12 weeks converting to roughly $40k-80k annual platform contract plus usage if deployed across customer workflows."
  mustBeTrue:
    - Platform buyers must confirm that supplier invoice defects are a top-three blocker to shipping compliant approval workflows.
    - At least half of paid pilots must convert to production within six months of launch.
    - Manual overrides on flagged invoices must fall below 20% after initial rules tuning.
    - One or more APP, SI, or ERP partners must support distribution without forcing the company into services-heavy custom work.
    - Supplier remediation and audit evidence must produce measurable reduction in month-end tax exceptions for early customers.
  diligenceQuestions:
    - Which invoice defects most often destroy input VAT or create WHT disputes for current buyers?
    - Who owns budget for approval-time tax controls inside a platform account, product, finance, or compliance?
    - How reliable are TIN, APP, and government interfaces at production latency and uptime?
    - How hard would it be for Duplo, TaxStreem, or an APP partner to bundle similar validation into their core products?
    - What implementation work is required inside SAP, Oracle, or local accounting stacks before a pilot can go live?
  riskHeatmap:
    - risk: Regulatory and integration volatility breaks approval-time reliability.
      likelihood: High
      impact: High
      leadingIndicator: Validation uptime drops below 99% or rule changes require emergency fixes more than once per quarter.
      mitigation: Keep connectors modular, use cached rules and fallback workflows, and maintain close APP or advisor partner loops for regulatory updates.
    - risk: Buyers expect the product to be bundled into AP or filing software instead of paying separately.
      likelihood: Medium
      impact: High
      leadingIndicator: Discovery calls end without a budget owner or pilots stall unless validation is included free inside another product.
      mitigation: Lead with platform distribution, quantify protected deductions and cleanup savings, and package the product as a revenue-enabling compliance layer.
    - risk: False positives or noisy exceptions erode trust in blocking decisions.
      likelihood: Medium
      impact: High
      leadingIndicator: Manual override rate stays above 20% after the first two pilot customers complete rules tuning.
      mitigation: Start rules-first, keep human review in the loop, expose confidence and reason codes, and tune using real exception logs.
    - risk: Incumbents or partners replicate basic validation before the startup builds a data moat.
      likelihood: Medium
      impact: Medium
      leadingIndicator: Multiple deals are lost specifically because an AP platform or APP partner launches equivalent bundled checks.
      mitigation: Focus roadmap on supplier risk intelligence, remediation workflows, and cross-customer benchmarking rather than generic portal connectivity.
operatingAssumptions:
  - assumption: Platform partners are a faster and cheaper acquisition path than direct enterprise sales for the first 18 months.
    basis: research.yaml
    validationTest: Win at least 2 design partners and 4 paid channel-sourced pilots before hiring a full enterprise sales team.
    decisionImpact: If false, reallocate resources toward direct enterprise selling and reduce connector breadth.
  - assumption: Approval-time validation can be delivered with low enough false positives to support blocking or mandatory review.
    basis: operator judgment
    validationTest: Keep manual override rate below 20% and validation latency below 3 seconds in the first 50,000 production decisions.
    decisionImpact: If false, reposition as advisory scoring or filing-prep support rather than hard approval control.
  - assumption: Buyers will pay for deduction protection and audit reduction even if filing remains in another system.
    basis: idea.yaml
    validationTest: In discovery, at least 8 of 15 qualified buyers quantify financial pain from supplier-side defects and accept a paid pilot proposal.
    decisionImpact: If false, bundle more filing functionality earlier or partner white-label into existing platforms.
  - assumption: Government, TIN, and APP data dependencies are stable enough for a software-led business with target gross margin above 70%.
    basis: research.yaml
    validationTest: Pilot with at least two data sources and one APP partner while keeping manual fallback work under 15% of validations.
    decisionImpact: If false, narrow the ICP to workflows with higher tolerance for asynchronous review or delay margin expansion plans.
  - assumption: Cross-customer supplier exception data improves decision quality quickly enough to create differentiation.
    basis: operator judgment
    validationTest: Demonstrate measurable reduction in false positives or remediation time between pilot one and pilot four using accumulated exception history.
    decisionImpact: If false, moat shifts toward distribution and workflow fit rather than proprietary risk intelligence.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Run 15 structured discovery calls across platform product leaders, CFOs, and heads of tax.
    hypothesis: Supplier-side invoice defects are painful enough and frequent enough to justify a dedicated approval-time control layer.
    successMetric: At least 8 buyers report material deduction loss, audit pain, or month-end cleanup from supplier invoice defects and agree to further solution design.
    owner: Founder CEO
  - horizon: 0–90 days
    experiment: Collect anonymized exception logs or sample invoices from 3 to 5 prospective customers.
    hypothesis: A small set of repeatable defects drives most remediation effort and can anchor the MVP rules engine.
    successMetric: Top 5 defect types explain more than 60% of observed exceptions and can be mapped into deterministic rules.
    owner: Founding tax lead
  - horizon: 0–90 days
    experiment: Prototype validation API with mocked TIN, IRN, and VAT or WHT reason codes for one design partner.
    hypothesis: Platform teams prefer API-first integration with a lightweight reviewer console rather than a standalone portal.
    successMetric: One design partner commits technical resources and completes integration design within 30 days.
    owner: Founding eng
  - horizon: 3–6 months
    experiment: Pilot live validation with one AP or payment platform and one direct enterprise account.
    hypothesis: A channel-led platform pilot and a direct enterprise pilot will reveal whether distribution or direct selling creates faster production proof.
    successMetric: At least 2 paid pilots launched, validation latency below 3 seconds, and more than 70% of flagged invoices resolved through the workflow.
    owner: Founder CEO
  - horizon: 6–12 months
    experiment: Test partner-led distribution with one APP or SI and one tax advisory firm.
    hypothesis: Partners can reduce implementation friction and add qualified pipeline without overwhelming the company with custom services.
    successMetric: At least 4 qualified opportunities sourced by partners and implementation services remain under 20% of pilot revenue.
    owner: Partnerships lead
  - horizon: 6–12 months
    experiment: Launch cross-customer benchmarking and supplier profile reuse for pilot customers.
    hypothesis: Shared exception history reduces false positives and increases remediation speed enough to create measurable product differentiation.
    successMetric: False positive rate drops by at least 25% or remediation cycle time drops by at least 30% between early and later pilots.
    owner: Product lead
operations:
  - Weekly tax rule review process combining regulatory monitoring, customer exception data, and partner escalation paths.
  - Audit-log architecture that records every validation decision, override, reason code, and data source used.
  - Partner onboarding playbook for AP platforms, ERP implementers, and APP or SI providers with defined certification steps.
  - SLA monitoring for external validation dependencies with fallback queues and manual review thresholds.
  - Secure handling of invoice, supplier, and payment-adjacent data with role-based access and customer-specific data boundaries.
team:
  - role: Founding eng
    startTiming: Month 0
    rationale: Build the API, rules engine, and integration surface that determine product credibility in the first pilots.
  - role: Founding tax and compliance lead
    startTiming: Month 0
    rationale: Translate Nigeria-specific VAT, WHT, e-invoicing, and exception logic into auditable decision rules and partner updates.
  - role: Solutions engineer
    startTiming: Month 3
    rationale: Shorten partner and enterprise deployment cycles while keeping founders focused on product and customer learning.
  - role: Product and operations lead
    startTiming: Month 6
    rationale: Own exception workflows, remediation UX, and the operating cadence between customers, partners, and rules updates.
  - role: Partnerships and GTM lead
    startTiming: Month 6
    rationale: Build repeatable channel motion with AP platforms, advisors, and APP or SI partners after the first reference pilot is live.
milestones:
  - horizon: 0–12 months
    items:
      - Close 2 design partners and launch at least 2 paid pilots.
      - Ship MVP API, reviewer dashboard, audit log, and core supplier remediation workflow.
      - Achieve pilot to production conversion of at least 50% on early customers.
      - Prove validation latency below 3 seconds and manual override rate below 20% after tuning.
      - Establish at least 2 distribution or implementation partners.
  - horizon: 12–24 months
    items:
      - Reach 10 production customers across platform and direct enterprise accounts.
      - Launch filing-export connectors, reusable supplier profiles, and cross-customer benchmarking.
      - Show production expansion into additional entities or workflows in at least 60% of customers.
      - Maintain target gross margin above 70% despite external data and integration costs.
  - horizon: 24–36 months
    items:
      - Become the default supplier tax validation layer for a meaningful share of Nigeria-focused AP and payment platforms.
      - Expand into onboarding and transaction-monitoring checks for fintech or banking partners.
      - Add selective state-level and cross-border workflow support only after domestic supplier validation is repeatable.
      - Demonstrate a measurable supplier risk data advantage through lower exception rates or faster remediation than early competitors.
risks:
  - risk: Regulatory integration volatility changes rules or breaks external dependencies faster than the product can adapt.
    likelihood: High
    impact: High
    mitigation: Keep connectors modular, maintain fallback logic, and use partner channels for early warning on regulatory changes.
  - risk: Buyers treat validation as a bundled feature and resist standalone pricing.
    likelihood: Medium
    impact: High
    mitigation: Sell through platforms first, anchor value in protected deductions and enterprise win rates, and defer broad direct sales until ROI proof exists.
  - risk: False positives create too much manual work for finance teams to trust blocking decisions.
    likelihood: Medium
    impact: High
    mitigation: Start with human review, tune rules from live exception data, and expose transparent reason codes and override controls.
  - risk: Incumbents or workflow owners launch similar validation before the company establishes a data or distribution moat.
    likelihood: Medium
    impact: Medium
    mitigation: Prioritize supplier intelligence, remediation UX, and partner distribution instead of competing on commodity connectivity alone.
fundingAsk:
  stage: pre-seed
  targetFundingRangeUsd: "$2-4M"
  runwayMonths: 18
  useOfFundsSummary: Build the core rules engine and integrations, fund first pilots and partner onboarding, hire the initial engineering, tax, and solutions team, and reach repeatable pilot-to-production conversion before scaling sales.
