problem: 尼日利亚税务合规正从月末记账转向交易时点校验，但大多数财务团队仍在发票付款后或报税到期时，才发现供应商税务问题。随着电子发票、税号核验和门户申报逐步成为强制要求，一张错误发票或缺失注册信息，就可能破坏买方的 VAT、WHT 处理和审计链路。当前流程仍依赖人工复核、零散的门户查询，或由财务运营团队在事后清理错误。
targetUser:
  primary: 处理大量供应商发票的尼日利亚中型企业财务负责人或税务运营负责人
  secondary: 尼日利亚 B2B 支付、AP 自动化和采购平台的产品与合规负责人
  buyer: CFO 或财务副总裁
startupThesis:
  nonObviousInsight: 真正的变化不只是自动报税；电子发票和税号匹配正在把供应商合规变成付款前的风险决策，因此最佳切入口是在 AP 和支付工作流中进行实时发票与交易对手校验。
  beachhead: 服务于分销商、酒店集团和多实体企业、每月处理数百张本地供应商发票的尼日利亚 B2B 支付与 AP 软件平台
  wedge: 一个 API 和仪表板，在发票获批或付款前校验供应商 TIN 状态、发票 IRN 与印章状态、可能适用的 VAT/WHT 处理方式，以及申报准备度
  whyNowCatalyst: 尼日利亚 2026 年税务基础设施正围绕实时申报、已校验电子发票和具备税务感知的准入流程收敛，使供应商层面的税务卫生问题成为紧迫的软件问题。
  ventureScalePath: 先成为尼日利亚 AP 和 B2B 支付的合规决策引擎，再扩展到申报编排、供应商整改工作流、金融机构嵌入式准入核验，以及面向非洲企业支付的跨境税务风险网络。
solution: 产品接入 ERP、会计、采购和支付系统，在资金流转前对每张供应商发票进行评分。它会检查供应商身份与税务档案是否匹配、发票是否符合 FIRS 电子发票要求，以及结合交易上下文后 VAT 或 WHT 处理是否一致。一旦发现异常，系统会把发票送入整改工作流，明确给出原因和所需修复项，而不是让财务团队在申报阶段才发现问题。随着时间推移，平台会构建实时的供应商合规图谱，让买方、金融科技公司和审计方看到哪些交易对手反复制造税务风险。后续再通过申报连接器，将已批准交易转化为可提交至联邦和州级门户的记录。
goToMarketSeed:
  firstCustomer: 拥有 50+ 企业客户、且在本地供应商场景中具备深度发票审批流程的尼日利亚 B2B 支付或 AP 自动化平台
  buyingTrigger: FIRS 电子发票推广，或一次内部审计暴露出抵扣被拒、发票校验失败、或月末反复进行税务清理
  currentAlternative: 人工财务复核，加上临时门户查询、会计软件导出以及外包税务顾问
  switchingReason: 这一切入口能在付款前拦截坏发票、降低审计风险，并为平台提供通用会计工具或服务公司无法交付的合规能力
  pricingHypothesis: 平台年费加按量计费，按已校验的供应商发票或交易对手检查次数收费
