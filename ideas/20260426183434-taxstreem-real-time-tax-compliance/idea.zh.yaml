jobsToBeDone:
  - job: 在审批供应商发票时，帮助财务团队在付款前确认其税务有效性，从而避免后续抵扣被拒和申报错误。
    currentAlternative: 内部税务人员或顾问做人工发票复核并事后补救
    successMetric: 无需后续税务异常即可自动放行的供应商发票占比
  - job: 在上线发票或 AP 工作流时，帮助 B2B 支付平台嵌入尼日利亚税务校验，让它们无需自建合规基础设施也能拿下受监管客户。
    currentAlternative: 内部自研，或在缺少深度税务校验的情况下直接上线
    successMetric: 面向企业客户上线合规发票审批流程所需时间
ideaScorecard:
  signalStrength:
    score: 4
    rationale: 多个来源同时指向实时申报、电子发票和税务感知型开户，只是最新的同日信号仍主要集中在一则发布新闻上。
  painIntensity:
    score: 5
    rationale: 买方面对的是无效发票、抵扣损失和审计失败带来的直接财务暴露，而不只是流程不顺。
  wedgeClarity:
    score: 5
    rationale: 付款前的供应商发票校验是一个狭窄但紧迫的工作流，API 的插入点清晰，首批客户也容易识别。
  defensibility:
    score: 4
    rationale: 护城河来自持续积累的供应商合规数据、异常工作流和集成能力；但仅靠早期门户连通性还不够。
  ventureScale:
    score: 4
    rationale: 这个滩头市场可以从发票校验，扩展到申报、开户、放贷风险，以及覆盖非洲多司法辖区的合规基础设施。
topRisks:
  - name: 监管集成波动
    description: FIRS 和州级门户要求可能快速变化，导致校验逻辑失效，或让直连集成变得脆弱。
    mitigation: 先从可接入多种数据源的规则加工作流层起步，保持连接器模块化，并借助合规伙伴缩短更新周期。
  - name: 初期付费意愿有限
    description: 中型市场企业可能把税务校验看成既有财务运营的一部分，而不是一条新的预算项。
    mitigation: 先通过 AP 和 B2B 支付平台销售，把成本摊薄到更多客户身上，并把合规包装成能够带来收入的功能。
  - name: 与现有厂商能力重叠
    description: 以申报为中心的创业公司和接入点提供商，一旦看到品类开始起量，可能会向上游扩展到发票校验。
    mitigation: 围绕供应商风险情报、嵌入式审批工作流，以及现有厂商天然不易积累的跨客户合规图谱来拉开差异。
