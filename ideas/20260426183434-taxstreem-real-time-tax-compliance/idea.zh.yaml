problem: 尼日利亚税务合规正从月末记账转向交易时校验，但大多数财务团队仍在发票付款或申报截止后才发现供应商的税务问题。随着电子发票、税号核查和门户申报日趋强制化，任何一张问题发票或未登记的供应商，都可能破坏买方的 VAT、WHT 和审计追踪链。现有工作流依赖人工审核、碎片化的门户查验，或由财务运营团队在事后清理错误。
targetUser:
  primary: 处理大量供应商发票的尼日利亚中型企业财务或税务运营负责人
  secondary: 尼日利亚 B2B 支付、应付账款自动化和采购平台的产品及合规负责人
  buyer: CFO 或财务副总裁
startupThesis:
  nonObviousInsight: 真正的转变不仅是自动化税务申报——电子发票和税号匹配让供应商合规成为付款前的风险决策，因此制胜切口是在 AP 和支付工作流中嵌入实时发票与交易对手方校验。
  beachhead: 尼日利亚 B2B 支付和 AP 软件平台，服务每月处理数百张本地供应商发票的分销商、酒店集团和多主体企业。
  wedge: 一套 API 与仪表板，在发票审批或付款前校验供应商税号（TIN）状态、发票参考号（IRN）和印章状态、可能的 VAT/WHT 处理方式及申报就绪情况。
  whyNowCatalyst: 尼日利亚 2026 年税务体系正围绕实时申报、经校验的电子发票和税务感知型开户融合演进，供应商税务合规已成为紧迫的软件问题。
  ventureScalePath: 从尼日利亚 AP 和 B2B 支付的合规决策引擎起步，逐步扩展至申报编排、供应商整改工作流、金融机构嵌入式开户核查，以及非洲企业支付的跨境税务风险网络。
solution: 产品接入 ERP、会计、采购和支付系统，在资金流转前对每张供应商发票评分。检查供应商身份与税务档案是否匹配、发票是否符合 FIRS 电子发票要求、VAT 或 WHT 处理方式是否与交易背景一致。一旦发现问题，系统将发票路由至整改工作流，附上清晰的原因说明和所需修正项，而非让财务团队在申报时才发现问题。随着时间推移，平台构建出实时供应商合规图谱，让买方、金融科技平台和审计师看清哪些交易对手方反复制造税务敞口。申报连接器在后期可将已审批交易转化为可提交至联邦和州级门户的记录。
goToMarketSeed:
  firstCustomer: 拥有 50 家以上企业客户、深度本地供应商发票审批工作流的尼日利亚 B2B 支付或 AP 自动化平台
  buyingTrigger: FIRS 电子发票落地或内部审计暴露出被拒绝的抵扣、发票校验失败或反复出现的月末税务清理问题
  currentAlternative: 人工财务审核加临时门户查验、会计软件导出和外包税务顾问
  switchingReason: 该切口在付款前阻断问题发票，降低审计敞口，并为平台提供无需自建合规基础设施即可落地的尼日利亚税务合规功能
  pricingHypothesis: 平台费加按验证发票数量或交易对手方查验次数计费的用量定价
whyNow:
  - point: 实时税务分类在尼日利亚已具备可信度——交易实时解读和自动申报已从概念落地为已上线的产品。
    signalRefs:
      - 交易时税务分类
    sourceRefs: [1, 2]
  - point: 电子发票规则带来技术集成负担，买方和软件平台需要中间件在发票流入 VAT 和支付工作流前完成校验。
    signalRefs:
      - 电子发票中间件是切入点
    sourceRefs: [4]
  - point: 税号核查正成为开户和账户活动的一部分，合规核查不能再仅停留在税务团队的月末流程中。
    signalRefs:
      - 税务感知型开户合规
    sourceRefs: [4]
  - point: 供应商的失误如今直接损害买方的抵扣和申报准确性，使交易对手方税务风险成为董事会级别的财务运营问题。
    signalRefs: []
    sourceRefs: [4]
differentiator: 该领域大多数税务工具专注于事后计算和申报企业自身的税款。这家公司提前一步介入工作流——判断供应商发票的税务合规性是否达到审批和付款的标准。可防御资产是一张不断增长的供应商税务行为图谱，涵盖跨平台的异常模式和校验结果，其复制难度远超一次性的门户集成。
conceptDiagram:
  title: 付款前供应商税务校验
  mermaid: |
    flowchart LR
      Buyer[CFO or AP platform] --> Pain[Bad supplier invoices create VAT WHT and audit risk]
      Pain --> Product[Supplier tax risk API]
      Product --> Outcome[Invoices cleared or remediated before payment]
