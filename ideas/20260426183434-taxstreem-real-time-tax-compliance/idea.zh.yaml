jobsToBeDone:
- job: 在审批供应商发票时，帮助财务团队在付款前确认其税务有效性，从而避免后续抵扣被拒和申报错误。
  currentAlternative: 由内部税务人员或顾问进行人工发票复核和事后清理
  successMetric: 无需产生下游税务异常即可自动放行的供应商发票占比
- job: 在上线发票或 AP 工作流时，帮助 B2B 支付平台嵌入尼日利亚税务校验，从而无需自建合规基础设施也能赢得受监管客户。
  currentAlternative: 内部自建，或在缺乏深度税务校验的情况下直接上线
  successMetric: 面向企业客户上线合规发票审批流程的时间
ideaScorecard:
  signalStrength:
    score: 4
    rationale: 多项来源共同指向实时申报、电子发票和具备税务感知的准入流程，但最新的当日信号仍主要集中在一篇发布报道。
  painIntensity:
    score: 5
    rationale: 买方面临的是无效发票、抵扣损失和审计失败带来的直接财务风险，而不仅是流程不便。
  wedgeClarity:
    score: 5
    rationale: 付款前供应商发票校验是一个狭窄且紧迫的工作流，具备清晰的 API 插入点和明确的首批客户。
  defensibility:
    score: 4
    rationale: 护城河来自累积的供应商合规数据、异常处理工作流和集成网络，但早期仅靠门户连接远远不够。
  ventureScale:
    score: 4
    rationale: 可从发票校验扩展到申报、准入、贷方风险以及覆盖非洲多司法辖区的合规基础设施。
topRisks:
- name: 监管集成波动
  description: FIRS 与州级门户要求可能快速变化，导致校验逻辑失效或直连接口脆弱。
  mitigation: 先构建可接入多数据源的规则与工作流层，保持连接器模块化，并借助合规伙伴快速更新。
- name: 初始付费意愿有限
  description: 中型企业可能认为税务校验属于既有财务运营的一部分，而不是新的预算项目。
  mitigation: 优先通过 AP 和 B2B 支付平台销售，将成本分摊到更多客户，并把合规定位为促成收入的功能。
- name: 与 incumbents 功能重叠
  description: 一旦赛道被证明有吸引力，以申报为主的创业公司和接入点提供商可能向上游扩展至发票校验。
  mitigation: 围绕供应商风险情报、嵌入式审批工作流和跨客户合规图谱建立差异化，这是 incumbents 不会自然积累的资产。
