  costStructure:
    - 集成与规则更新工程投入
    - 合规和税务专业人才
    - 企业销售和客户引导
    - API 和单据处理基础设施
jobsToBeDone:
  - job: 审批供应商发票时，帮助财务团队在付款前核验发票税务合规性，从而避免后续抵扣被拒和申报错误。
    currentAlternative: 内部税务人员或顾问的人工发票审核与事后清理
    successMetric: 无下游税务异常的供应商发票自动放行比例
  - job: 上线发票或 AP 工作流时，帮助 B2B 支付平台嵌入尼日利亚税务核查，无需自建合规基础设施即可赢得受监管客户。
    currentAlternative: 内部自建或未经深度税务校验直接上线
    successMetric: 为企业客户上线合规发票审批流程的时间
ideaScorecard:
  signalStrength:
    score: 4
    rationale: 多个来源汇聚于实时申报、电子发票和税务感知型开户，但当日最新信号仍集中在一篇发布报道上。
  painIntensity:
    score: 5
    rationale: 买方面临无效发票带来的直接财务损失——抵扣被拒和审计失败——而非单纯的流程不便。
  wedgeClarity:
    score: 5
    rationale: 付款前供应商发票校验是一个范围明确、需求紧迫的工作流，有清晰的 API 嵌入点和可识别的首批客户。
  defensibility:
    score: 4
    rationale: 护城河来自积累的供应商合规数据、异常工作流和系统集成，但早期仅靠门户连通性远远不够。
  ventureScale:
    score: 4
    rationale: 滩头市场可从发票校验扩展至申报、开户、贷款风控及非洲多辖区合规基础设施。
topRisks:
  - name: 监管整合稳定性风险
    description: FIRS 和州级门户要求可能快速变化，破坏校验逻辑或使直接集成变脆。
    mitigation: 从可摄取多种数据源的规则与工作流层切入，保持连接器模块化，并借助合规合作伙伴快速响应更新。
  - name: 初期付费意愿不足
    description: 中型企业可能将税务校验视为现有财务运营的一部分，而非新增预算项。
    mitigation: 优先通过 AP 和 B2B 支付平台销售，将成本分摊至众多客户，并将合规定位为助力营收的功能。
  - name: 现有厂商跟进风险
    description: 申报类初创企业和接入点提供商一旦看到品类成立，可能向上游延伸至发票校验。
    mitigation: 围绕供应商风险情报、嵌入式审批工作流和现有厂商不会自然积累的跨客户合规图谱建立差异化。
