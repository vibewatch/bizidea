problem: >-
  尼日利亚的税务合规正在从月末记账，转向交易时点校验，但大多数财务团队仍要等到发票已付款或申报临近时，才发现供应商的税务问题。随着电子发票、Tax ID 校验和门户申报逐步变成强制要求，只要有一个供应商发票有问题，或注册信息缺失，就会拖垮买方的 VAT、WHT 和审计链路。现有流程仍依赖人工复核、零散的门户查询，或让财务运营团队在事后替这些错误擦屁股。
targetUser:
  primary: 在尼日利亚中型市场企业中，负责处理大量供应商发票的财务负责人或税务运营负责人
  secondary: 尼日利亚 B2B 支付、AP 自动化和采购平台的产品与合规负责人
  buyer: CFO 或财务副总裁
startupThesis:
  nonObviousInsight: 真正的大变化不只是自动化报税；电子发票和税号匹配正在把供应商合规变成付款前的风险决策，因此最有机会的切口，是把实时发票和交易对手校验嵌进 AP 与支付工作流。
  beachhead: 服务分销商、酒店集团和多主体企业的尼日利亚 B2B 支付与 AP 软件平台；这些客户每月要处理数百张本地供应商发票
  wedge: 一套 API 加仪表盘，在发票获批或付款前，校验供应商 TIN 状态、发票 IRN 与盖章状态、可能适用的 VAT/WHT 处理方式，以及是否具备可申报条件
  whyNowCatalyst: 尼日利亚 2026 年的税务栈正围绕实时申报、已校验电子发票和税务感知型开户快速收敛，把供应商层面的税务卫生直接变成一个紧迫的软件问题。
  ventureScalePath: 先成为尼日利亚 AP 和 B2B 支付里的合规决策引擎，再扩展到申报编排、供应商整改工作流、面向金融机构的嵌入式开户校验，以及覆盖非洲企业支付的跨境税务风险网络。
solution: >-
  这款产品会接入 ERP、会计、采购和支付系统，在资金流出之前为每张供应商发票打分。它会检查供应商身份与税务档案是否匹配、发票是否满足 FIRS 电子发票要求，以及 VAT 或 WHT 处理是否与交易背景一致。一旦发现异常，系统不会让发票直接流进付款流程，而是把它送入整改工作流，明确指出原因和所需修复项，让财务团队不必等到申报阶段才发现问题。随着时间推移，平台会沉淀出一张实时的供应商合规图谱，让买方、金融科技平台和审计方能看清哪些交易对手在持续制造税务风险。后续还可以通过申报连接器，把已通过校验的交易转成联邦和州级门户可直接提交的记录。
goToMarketSeed:
  firstCustomer: 拥有 50+ 企业客户、并在本地供应商发票审批环节扎得很深的尼日利亚 B2B 支付或 AP 自动化平台
  buyingTrigger: FIRS 电子发票落地，或一次内部审计暴露出抵扣被拒、发票校验失败，或月末反复补税清账
  currentAlternative: 人工财务复核，加上零散的门户查询、会计软件导出，以及外包税务顾问
  switchingReason: 这个切口能在付款前拦住坏发票、降低审计暴露，并给平台补上一项通用会计工具和服务公司都做不好的合规能力
  pricingHypothesis: 平台年费，加上按已校验供应商发票或交易对手查询次数计费
whyNow:
  - point: 尼日利亚如今已经具备实时税务分类的可信条件，因为对实时交易的解读和自动申报，已经从概念走到了正式上线的产品。
    signalRefs: [交易时点税务分类, 电子发票中间件就是切口]
    sourceRefs: [1, 2, 6]
  - point: 电子发票规则带来了真实的技术集成负担，因此买方和软件平台需要一层中间件，在发票流入 VAT 和付款工作流之前先做校验。
    signalRefs: [电子发票中间件就是切口]
    sourceRefs: [5, 6, 7]
  - point: 税号校验正在变成开户和账户活动的一部分，这意味着合规检查再也不能只停留在税务团队的月末流程里。
    signalRefs: [税务感知型开户]
    sourceRefs: [4]
  - point: 供应商的错误如今会直接伤害买方的抵扣和申报准确性，让交易对手税务风险升级成董事会层面的财务运营问题。
    signalRefs: [电子发票中间件就是切口]
    sourceRefs: [4, 5, 6]
differentiator: >-
  现有资料里的多数税务工具，关注的都是在交易发生之后，如何计算并申报一家公司的自有税务。本公司把切口往前挪了一步：它决定一张供应商发票在税务上是否安全到可以批准并付款。真正能守住的资产，是一张持续扩大的供应商税务行为、异常模式和校验结果图谱；和一次性的门户对接相比，这东西更难被复制。
