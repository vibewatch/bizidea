sources:
- id: 1
  title: TaxStreem wants to automate Nigeria’s tax compliance with AI
  url: https://techcabal.com/2026/04/25/taxstreem-wants-to-file-your-taxes-as-transactions-happen
  publisher: TechCabal
  publishedDate: '2026-04-25'
  author: Opeyemi Kareem
  fetchVerified: true
  keyPoints:
  - TaxStreem says it launched in March 2026 and uses AI to interpret transactions in real time.
  - The product reads bank and fintech transaction narrations, then assigns tax treatment and explains the decision.
  - It automates filing on government portals and says the hard part is manual transaction-by-transaction classification.
  - The company says it sells subscriptions plus APIs for banks, payments tools, and larger businesses.
  - It plans to add state-level filing on the Lagos Internal Revenue Service portal next.
- id: 2
  title: TaxStreem
  url: https://www.taxstreem.com/
  publisher: TaxStreem
  publishedDate: '2026-04-25'
  author: null
  fetchVerified: true
  keyPoints:
  - The landing page says TaxStreem calculates and files business taxes by AI.
  - It claims connections to bank accounts, accounting software, and POS systems.
  - The page lists VAT, WHT, CIT, e-invoicing, and an AI assistant as core features.
  - It presents the product as a Nigeria-focused compliance layer for business finances.
  - The page itself is timestamped Apr 25, 2026.
- id: 3
  title: NGSIRS moves to curb illegal tax collection, spearhead automation in Niger - Daily Post Nigeria
  url: https://dailypost.ng/2026/04/25/ngsirs-moves-to-curb-illegal-tax-collection-spearhead-automation-in-niger/
  publisher: Daily Post Nigeria
  publishedDate: '2026-04-25'
  author: Priscilla Dennis
  fetchVerified: true
  keyPoints:
  - The Niger State IRS says it will accelerate automation across ministries, departments, agencies, and all 25 local government areas.
  - It pairs automation with monitoring to curb illegal collection, extortion, and multiple taxation.
  - The story says the meeting included the Nigeria Revenue Service and state revenue chiefs.
  - It signals demand for taxpayer-facing and enforcement tooling beyond the federal level.
  - The article is dated Apr 25, 2026.
- id: 4
  title: What Are the Nigeria Tax Laws for Banks and Fintechs in 2026?
  url: https://youverify.co/blog/nta-laws-for-banks-and-fintechs-in-2026
  publisher: Youverify
  publishedDate: null
  author: null
  fetchVerified: true
  keyPoints:
  - The guide says banks and fintechs must validate Tax IDs during onboarding and account activity.
  - It says the Nigeria Tax Administration Act introduces centralized digital tax reporting via an Electronic Fiscal System.
  - It frames real-time verification and automated reporting as part of normal compliance workflows.
  - It ties the new rules to KYC, KYB, fraud prevention, and audit readiness.
  - It treats tax data matching as an operating requirement for financial platforms.
- id: 5
  title: 'FIRS e-Invoicing in Nigeria: Who It Affects and How to Comply in 2026'
  url: https://tryduplo.com/blog/firs-e-invoicing-in-nigeria-how-to-comply-2026/
  publisher: Duplo
  publishedDate: null
  author: null
  fetchVerified: true
  keyPoints:
  - The guide says FIRS e-invoicing requires digital generation, validation, and transmission of invoices through the FIRSMBS platform.
  - It says each approved invoice carries an IRN, cryptographic stamp, and QR code.
  - It argues most businesses should not build direct FIRS integrations themselves because the technical bar is high.
  - It positions access point providers as the compliance shortcut.
  - It notes the buyer review window and the need for validated invoices in VAT workflows.
- id: 6
  title: FIRS - AUTOMATED TAX REMITTANCE SYSTEM
  url: https://atrs.firs.gov.ng/
  publisher: Federal Inland Revenue Service
  publishedDate: null
  author: null
  fetchVerified: true
  keyPoints:
  - The official FIRS page says it automates taxes end-to-end from transaction to payment.
  - It says taxpayers can report taxable transactions in real time to the fiscal authority.
  - It says the system supports validating taxable electronic invoices and receipts.
  - It points businesses to compliant software and technical support for integration.
  - It is a direct signal that real-time reporting and e-invoice validation are official primitives.
- id: 7
  title: Pronalytics - E-Invoicing Platform & Tax Compliance Software for Nigerian Businesses
  url: https://pronalytics.ng/insights/nrs-e-invoicing-regulations-2026-compliance
  publisher: Pronalytics
  publishedDate: null
  author: null
  fetchVerified: true
  keyPoints:
  - The company positions itself around continuous e-invoicing and transaction validation in Nigeria.
  - Its product language emphasizes reconciliation, audit-ready workflows, and regulator-aligned submission.
  - The page shows a startup-style wedge around tax compliance infrastructure.
  - It reinforces that e-invoicing is creating a vendor ecosystem, not just a policy memo.
  - The page is an evergreen product source rather than a dated news item.
