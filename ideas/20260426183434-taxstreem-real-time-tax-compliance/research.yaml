  "competitiveLandscape": "The market splits into four classes. Local filing-led and finance-ops startups (TaxStreem, Duplo, Pronalytics) are closest to the problem but mostly sell filing automation, payments, or general e-invoicing rather than supplier-risk scoring [1][10][11][12][30]. Global compliance incumbents (Sovos, Vertex, Avalara, SAP) own multinational e-invoicing, VAT, and ERP integration credibility, but are overbuilt and likely expensive for Nigeria-first mid-market deployments [26][27][28][33][39]. AP automation suites (Medius, Tipalti, Symtrax) prove the operational pain but are not Nigeria tax specialists [40][53][67]. The default substitute remains manual review plus consultants, which is cheap to start but breaks under real-time reporting and high invoice volumes [1][3][58][67]."
  "incumbentThesis":
  - "incumbentClass": "ERP and cloud workflow vendors"
    "point": "ERP suites can store invoices and handle generic reporting, but they do not win Nigeria-specific supplier tax validation by default because local TIN checks, IRN/stamp logic, and fast-changing tax rules move faster than ERP release cycles and usually still require specialist middleware."
