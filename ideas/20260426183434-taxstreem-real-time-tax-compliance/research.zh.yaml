  "willingnessToPay":
    "summary": "公开的税务合规定价从 Stripe Tax 月费 $90 起步，而 Sovos、Vertex、Avalara 和 Duplo 等企业级电子发票套件采用定制报价或打包定价 [23][26][27][33]。这一格局支持混合模式：集成/合规更新的年度平台费加按发票校验或交易对手方核查次数的用量定价。付费意愿在以下场景最强：合规保护可抵扣 VAT、发票量大，或平台收入依赖受监管客户留存 [11][17][23]。"
    "sourceRefs":
