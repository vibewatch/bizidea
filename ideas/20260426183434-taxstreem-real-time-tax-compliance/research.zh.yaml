  validationPlan:
  - priority: high
    question: CFO 是否足够看重付款前发票阻断，愿意购买一层全新的校验工具，还是他们只接受它作为 AP/支付软件的打包功能？
    evidenceToGather: 与大型纳税人和平台产品负责人各进行 10-15 场访谈；询问当前异常率、抵扣损失以及预算归属。
  - priority: high
    question: 实践中，究竟哪些发票缺陷最常导致 VAT/WHT 抵扣损失？
    evidenceToGather: 从 3-5 个财务团队或渠道伙伴收集匿名发票异常日志，并映射到整改工作量与财务影响。
  - priority: medium
    question: 在真实生产量级下，TIN 查询、APP 和门户集成的可靠性如何？
    evidenceToGather: 至少对接 2 个数据提供方和 1 个获认证 APP 进行试点，测量延迟、可用性、误报率和人工覆盖率。
  - priority: medium
    question: 平台更偏好纯 API、复核仪表板，还是在导入阶段需要托管式服务？
    evidenceToGather: 与一个设计合作伙伴原型化 3 种集成模式，并比较实施工作量、异常处理效果和销售摩擦。
