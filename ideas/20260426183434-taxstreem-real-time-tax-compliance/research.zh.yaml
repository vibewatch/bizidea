  "willingnessToPay":
    "summary": "公开的税务合规定价低至 Stripe Tax 每月 $90 起，而 Sovos、Vertex、Avalara 和 Duplo 这类企业级电子发票套件大多采用定制报价或打包定价 [23][26][27][33]。这支持一种混合模型：按年收平台费，覆盖集成和合规更新，再按已校验发票或交易对手查询量计费。付费意愿最强的场景，会集中在合规能保住可抵扣 VAT、发票量很大，或平台必须靠合规能力拿下受监管客户的时候 [11][17][23]。"
    "sourceRefs":
