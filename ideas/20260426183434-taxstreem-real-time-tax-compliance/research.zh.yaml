openQuestions:
- 在尼日利亚，被拒抵扣、审计警示或申报延迟中，有多大比例真正源于供应商侧发票缺陷，而不是买方自身记账错误？
- CFO 会购买独立校验层，还是这类产品必须主要通过已掌握审批流的 AP/支付平台来销售？
- TIN 查询、APP 和政府门户接口在生产负载下、以及跨不同纳税人群体时，到底有多稳定和完整？
