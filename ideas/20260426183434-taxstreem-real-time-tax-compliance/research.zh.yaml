competitors:
- name: TaxStreem
  stage: seed
  wedge: 以 AI 驱动的尼日利亚税额计算、门户申报，以及与实时财务活动绑定的 AP/AR 发票检查。
  pricing: 定制 / 未公开定价
  strength: 在尼日利亚本地税务逻辑和“交易时点合规”叙事上非常强。
  weaknessVsUs: 定位更宽且更偏申报导向；尚未清晰体现为面向第三方平台的 API 优先供应商风险决策引擎。
  sourceRefs:
  - 1
  - 2
- name: Duplo
  stage: scale-up
  wedge: 把 NRS 电子发票、税务管理、支付与审批打包在一起的 B2B 财务操作系统。
  pricing: 定制 / 未公开定价
  strength: 已具备工作流分发、SI/APP 认证以及财务团队认知。
  weaknessVsUs: 合规只是其更大平台中的一个模块；供应商级税务风险情报未必是产品重心。
  sourceRefs:
  - 10
  - 11
  - 12
  - 31
- name: Pronalytics / TaxAnchor360
  stage: early-stage
  wedge: 聚焦尼日利亚的电子发票、对账和审计就绪合规工作流。
  pricing: 定制 / 未公开定价
  strength: 围绕持续电子发票和符合监管要求的提交流程进行本地化定位。
  weaknessVsUs: 看起来更偏向通用电子发票/对账，而不是付款前交易对手风险评分。
  sourceRefs:
  - 30
- name: Sovos
  stage: incumbent
  wedge: 覆盖 65+ 国家、带 ERP 集成的全球电子发票和实时 VAT 合规。
  pricing: 按公司情况和需求定制定价
  strength: 监管覆盖深、品牌可信、且兼容跨国 ERP。
  weaknessVsUs: 对尼日利亚优先的中型市场买方而言过重且可能过贵；本地分发和整改工作流适配较弱。
  sourceRefs:
  - 24
  - 25
  - 26
- name: Vertex
  stage: incumbent
  wedge: 在单一间接税平台中整合全球电子发票、CTC、VAT 申报与清分。
  pricing: 定制 / 预约演示
  strength: 全球合规叙事强，并直接聚焦发票校验、清分和申报。
  weaknessVsUs: 为全球间接税团队而建，并非专门面向尼日利亚供应商准入和 AP 异常处理。
  sourceRefs:
  - 27
  - 28
  - 29
