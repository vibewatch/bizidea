scenarios:
  downside:
    description: Channel conversion slips, blended ACV lands closer to direct-enterprise pricing, and manual review keeps gross margin below target.
    y3RevenueK: 510.94
    y3EbitdaK: -710.63
    cashLowPointK: 153.88
    keyAssumptionChanges:
    - Blended ACV falls to $22.5K
    - Y2-Y3 customer adds slow materially vs. base
    - COGS stays at 32% in Y2 and 30% in Y3 because manual fallback persists
  base:
    description: Founder-led sales converts early pilots into a partner-assisted expansion motion while gross margin ramps toward the 70% target.
    y3RevenueK: 865.13
    y3EbitdaK: -445.41
    cashLowPointK: 518.42
    keyAssumptionChanges:
    - Base case uses $27K blended ACV
    - Customer adds follow [3,3,4,4] in Y2 and [6,6,6,7] in Y3
    - Gross margin improves from 60% early to 72% steady-state
  upside:
    description: Platform partners ramp faster, the mix skews toward higher-ACV accounts, and automation trims implementation drag.
    y3RevenueK: 1333.78
    y3EbitdaK: -67.98
    cashLowPointK: 1023.24
    keyAssumptionChanges:
    - Blended ACV rises to $33K
    - More platform-led wins pull forward customer adds
    - COGS improves to 28% in Y2 and 25% in Y3
