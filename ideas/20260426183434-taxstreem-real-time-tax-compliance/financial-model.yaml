- id: A13
  name: Fully-loaded product/operations salary
  value: '57.6'
  unit: USDK annual per FTE
  source: 'Startup finance heuristic: seed-stage product/ops generalist with payroll load.'
- id: A14
  name: Fully-loaded partnerships/GTM salary
  value: '66.0'
  unit: USDK annual per FTE
  source: 'Startup finance heuristic: early enterprise/channel seller in Nigeria fintech/regtech.'
- id: A15
  name: Fully-loaded customer success salary
  value: '42.0'
  unit: USDK annual per FTE
  source: 'Startup finance heuristic: post-sale support analyst with payroll overhead.'
- id: A16
  name: Non-payroll opex ramp
  value: R&D/S&M/G&A = 17K, 22K, 28K, 34K monthly across phases M1-M6, M7-M12, Y2, Y3
  unit: USDK per month
  source: Startup finance heuristic anchored to enterprise middleware needs for cloud, data access, travel, legal, and partner onboarding.
- id: A17
  name: Steady-state monthly logo churn
  value: 2.0%
  unit: percent
  source: 'Startup finance heuristic: early B2B infrastructure SaaS can be sticky but should not underwrite sub-1% churn pre-scale.'
- id: A18
  name: Blended CAC
  value: '17.2'
  unit: USDK per customer
  source: Calculated from modeled Y2-Y3 sales & marketing spend divided by 39 new customers; consistent with founder-led + channel-assisted enterprise motion.
- id: A19
  name: Funding ask sizing rule
  value: 24-month milestone plus 6-month buffer
  unit: policy
  source: Developer instruction; [BP fundingAsk] reach repeatable pilot-to-production conversion before scaling sales.
