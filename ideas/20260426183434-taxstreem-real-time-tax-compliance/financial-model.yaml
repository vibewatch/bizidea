modelDiagram:
  title: unit economics flow
  mermaid: |-
    flowchart LR
      Leads --> Pilots
      Pilots --> ProductionCustomers
      ProductionCustomers --> SubscriptionAndUsageRevenue
      SubscriptionAndUsageRevenue --> GrossProfit
      GrossProfit --> OperatingCash
modelSanity:
- checkName: Revenue engine
  finding: The base case reaches $865.13K of Y3 revenue by growing from 6 to 45 paying accounts on a $27K blended ACV, with channel-led adds doing most of the work after Y1.
- checkName: Must go right
  finding: Pilot-to-production conversion needs to stay near the BP 50% target so Y2 can end with about 20 customers before the larger Y3 expansion.
- checkName: Model breaks if
  finding: If data brittleness or slow sales cycles keep gross margin below 68% and delay customer adds, the downside case falls to a $153.88K cash low point.
- checkName: Next-round proof
  finding: The next financing is justified if the company exits Y2 with 10+ production customers, >70% gross margin, and evidence that partners reliably source deployments.
sanityChecks:
  ruleOf40: Y3 growth 159.76% + EBITDA margin -51.48% = 108.28%
  burnMultiple: Y2 burn multiple 1.53x, improving to 0.66x in Y3 on exit ARR basis.
  revenuePerFte: Approximately $79K Y3 on 11 exit FTE (benchmark $200–400K SaaS; low because the model stays implementation-heavy and channel build-out precedes scale).
  flags:
  - Revenue per exit FTE is still well below mature SaaS benchmarks, so the business needs clear evidence that implementation work will not scale linearly with customers.
  - The model assumes partner channels deliver 14 new customers in Y2; missing the first two channel partners would delay the entire ramp.
  - Gross margin only clears the BP target because manual fallback is assumed to decline meaningfully after Y1; brittle government or TIN endpoints would compress margins.
  - Rule-of-40 looks optically strong because Y2 revenue starts from a small base; it should not be read as late-stage efficiency.
