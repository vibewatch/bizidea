slug: change-blast-radius-graph
date: '2026-05-20'
executiveSummary: >-
  This company should start as a blast-radius decision layer for internet-facing
  remediation at cloud-native B2B SaaS companies, not as a broad ASPM, CNAPP, or
  autonomous SOC platform. The first customer is a Series B-D SaaS company with
  75-300 engineers, weekly releases, GitHub, AWS, Kubernetes, and Okta, plus a
  small product-security team that still spends hours proving which finding can
  reach production data and who can safely fix it. The immediate buying trigger
  is usually a recent incident, audit, enterprise security review, or board push
  toward autonomous security operations that exposes slow and manual blast-radius
  analysis. Research supports a focused but credible market with a modeled
  $700.0M TAM, $156.0M SAM, and $2.7M year-3 SOM if the company can land a narrow
  set of design-partner accounts at six-figure ACVs. The product should begin by
  converting one scanner finding into an owner-ready fix packet with service
  ownership, privilege path, runtime reachability, customer-data exposure, and
  approval-gated remediation guidance, then add low-risk automation only after
  graph confidence is proven. The deliberate tradeoff is to win the
  detection-to-action handoff for one service portfolio faster than broader
  platform vendors, even if that means deferring SOC, compliance, and identity
  governance expansion. The biggest disconfirming risks are that buyers may view
  Wiz, Snyk, Prisma Cloud, or JupiterOne as good enough, or that graph
  completeness is too weak to support trusted recommendations inside 30 days.
  Exact standalone budget behavior and the minimum graph-confidence threshold for
  auto-approval remain assumptions that must be validated early.
problem:
  - AppSec teams receive findings from code, cloud, identity, and runtime tools, but still reconstruct blast radius manually before they can assign a credible remediation owner.
  - Weekly release cadence and AI-assisted development increase change volume faster than security headcount, so backlog triage becomes a production-risk bottleneck.
  - Broad scanners and exposure platforms highlight risk, but they do not reliably produce a fix-ready decision object that says what can safely be changed before the next release.
solution:
  - Build a continuously refreshed code-to-cloud graph across GitHub, CI, IaC, AWS, Kubernetes, Okta, and ticketing metadata for one internet-facing service portfolio first.
  - Convert each new high-priority finding into a fix packet that shows owner, privilege path, runtime reachability, production-data exposure, release dependency, confidence score, and recommended action.
  - Add approval-gated automation only for low-risk fixes after the product proves graph accuracy, rollback awareness, and audit-ready reasoning on advisory workflows.
whyWeWin:
  - The wedge targets the exact moment between detection and action, where buyer pain, budget urgency, and measurable ROI are sharper than in another broad security dashboard.
  - Cross-domain entity resolution across repos, cloud assets, identities, and runtime context is technically harder to copy than adding another prioritization view inside a scanner.
  - Approval history and remediation outcomes can compound into a proprietary policy layer for which fixes are safe to auto-execute and which must stay human-approved.
strategicChoices:
  beachhead: >-
    English-speaking North America and UK Series B-D cloud-native B2B SaaS
    companies with 75-300 engineers, weekly releases, and a three-to-eight-person
    product-security or platform-security team triaging internet-facing service
    findings.
  wedgeRationale: >-
    Internet-facing remediation before release is narrower and faster to prove
    than generic ASPM because the workflow, trigger, success metric, and buyer
    are explicit: determine whether this finding can reach production data, who
    owns the service, and whether a safe fix can ship this week. That produces a
    measurable time-to-owner and time-to-disposition gain before the company tries
    to expand into broader security operations.
  sequencingRationale: >-
    Start with one service portfolio, a read-mostly graph, and advisory fix
    packets because graph trust and deployment speed must be proven before buyers
    will allow low-risk automation. Only after the company shows repeatable
    30-day deployment, pilot conversion, and reliable confidence scoring should it
    add more connectors, auto-remediation policies, partner channels, and sales
    headcount.
  notYet:
    - Broad SOC investigation workflows outside the initial AppSec remediation wedge
    - Full autonomous remediation without explicit policy gates and human approval tiers
    - Compliance evidence, identity-governance, and CTEM modules sold as separate products
    - Continental Europe expansion before auditability and data-handling requirements are productized
market:
  tam: "$700.0M modeled TAM based on roughly 5,000 cloud-native B2B software companies in North America and Europe at about $140k blended annual spend for a remediation-decision layer or adjacent AppSec platform budget."
  sam: "$156.0M modeled SAM based on roughly 1,200 English-speaking Series B-D or mid-market SaaS companies with the target GitHub plus cloud-native stack and enough complexity to buy a narrow blast-radius workflow at about $130k ACV."
  som: "$2.7M modeled year-3 SOM based on about 18 customers at roughly $150k ARR each through founder-led sales and one-service-portfolio deployments."
  segments:
    - "Primary segment: cloud-native B2B SaaS companies with internet-facing services and lean product-security teams"
    - "Secondary segment: platform engineering leaders who inherit remediation work from overloaded AppSec teams"
  buyingProcess: >-
    The day-to-day champion is typically the Head of Product Security, senior
    AppSec engineer, or platform-security lead, while the economic buyer is the
    VP Engineering or CISO. Deals should begin around an incident, audit, or
    automation initiative, run as a paid pilot on one internet-facing service
    portfolio, and convert when the buyer sees materially faster owner assignment
    and disposition inside existing Jira or Slack workflows.
product:
  mvp: >-
    The MVP should connect GitHub, AWS, Kubernetes, Okta, and ticket metadata for
    one service portfolio and generate a blast-radius-aware fix packet for each
    covered finding. It must expose confidence scoring, explainable graph edges,
    release constraints, and approval-gated workflow export into Jira or Slack.
  sixMonth: >-
    Prove sub-30-day deployment on the core GitHub, AWS, Kubernetes, and Okta
    stack, ship owner-ready fix packets for internet-facing findings, and measure
    time-to-owner and time-to-disposition improvement against the customer's
    manual baseline.
  twelveMonth: >-
    Add broader service-portfolio coverage, confidence-threshold controls,
    packaged policy templates for low-risk fixes, and reusable integrations that
    reduce deployment work across the first 5-8 production customers.
  twentyFourMonth: >-
    Expand from advisory fix packets into selective low-risk auto-remediation,
    then into adjacent identity-risk review, compliance evidence, and
    security-agent authorization workflows built on the same graph and policy
    history.
  keyBets:
    - A single service-portfolio deployment can produce enough blast-radius accuracy to justify a paid pilot inside 30 days.
    - Buyers prefer owner-ready fix packets in existing workflows over another daily-use security console.
    - GitHub, AWS, Kubernetes, and Okta cover enough early prospects to land the first 3-5 production accounts without heavy custom integrations.
    - Approval logs and remediation outcomes will become a durable policy moat before incumbents package equivalent change-safety workflows.
gtm:
  wedge: >-
    Sell a paid pilot that turns weekly internet-facing findings into
    blast-radius-aware fix packets for one service portfolio, then convert to an
    annual contract once the customer uses the workflow across multiple release
    cycles and approves a first class of low-risk actions.
  channels:
    - Direct founder-led outbound to Heads of Product Security, VP Engineering, and platform-security leads at target SaaS accounts
    - Co-sell and technical-partner motion through GitHub, AWS, and identity ecosystems where first-party context is required
    - Security consultancies and vCISO or AppSec advisors who surface triage bottlenecks after incidents, audits, or enterprise reviews
  funnelTargets: "Discovery call to qualified pilot 20-30%, qualified pilot to production 50%+, and pilot kickoff to production contract under 90 days."
  pricing: >-
    Annual subscription priced by covered internet-facing production services and
    connected identity domains, because the buyer values reduction in triage labor
    and safer remediation decisions at the workflow level rather than by seat.
    Initial pricing assumption is a $25k-$50k paid pilot that converts to roughly
    $120k-$160k annual ACV for the first production deployment, with expansion
    from more service portfolios, approval policies, and low-risk automation.
businessModel:
  revenueStreams:
    - Annual subscription for the blast-radius graph and fix-packet workflow
    - Premium policy and approval module for low-risk auto-remediation
    - Expansion revenue from additional service portfolios, connectors, and audit reporting
  unitOfValue: Internet-facing production service portfolio under blast-radius coverage
  targetGrossMarginPct: 75
  expansionLevers:
    - Add more service portfolios after proving value on the first internet-facing estate
    - Expand from advisory fix packets into approved low-risk remediation workflows
    - Layer compliance evidence, identity-risk review, and agent-authorization controls onto the same graph
strategyMap:
  northStarMetric: Covered critical findings converted into owner-ready remediation decisions within 15 minutes
  inputMetrics:
    - Time from finding creation to owner-assigned ticket
    - Pilot to production conversion rate
    - Percentage of fix packets accepted without manual cross-tool rework
    - Median time to first graph coverage on the initial service portfolio
    - Percentage of low-risk fixes approved under policy with no rollback incident
  moatsToBuild:
    - Cross-domain entity-resolution graph linking repos, services, identities, privileges, and runtime exposure
    - Remediation outcome and approval-history dataset tied to specific graph states and change classes
    - Deep coexistence integrations with scanners, ticketing systems, and cloud or identity control planes
    - Confidence scoring and audit-ready reasoning that shorten security review and procurement
  killCriteria:
    - Fewer than 3 paid pilots after 30 target-account conversations focused on internet-facing remediation
    - Pilot to production conversion below 50% after the first 6 pilots
    - Median time-to-owner does not improve by at least 60% in the first 30 days of pilot use
    - More than 70% of late-stage prospects say existing Wiz, Snyk, Prisma Cloud, or JupiterOne workflows are already good enough
  mermaid: |
    flowchart LR
      Wedge[Internet-facing remediation wedge] --> MVP[Blast-radius graph MVP]
      MVP --> Proof[Owner-ready fix packets and trust signals]
      Proof --> Expansion[Policy-gated automation and adjacent control workflows]
investorMemo:
  verdict:
    call: "Meet / investigate further"
    conviction: Strong wedge and credible buyer pain, but conviction depends on proving standalone budget and graph trust against crowded adjacent platforms.
    whyBelieve: The company targets a narrow, measurable workflow where existing security spend, an identifiable buyer, and a clear trigger already exist.
    whyDoubt: The standalone window may close quickly if incumbents package acceptable blast-radius context before this startup proves faster deployment and safer actionability.
    nextDiligence: Verify three paid pilots that deploy the core stack in under 30 days and show a material reduction in time-to-owner on real internet-facing findings.
  firstCustomer:
    title: Head of Product Security at a cloud-native SaaS company
    profile: A Series C B2B SaaS company with 100-250 engineers, GitHub Enterprise, Terraform, AWS, EKS, Okta, and a three-to-eight-person product-security team struggling with weekly release-bound findings.
    trigger: A recent incident, audit, enterprise customer review, or board push toward security automation exposes slow blast-radius proof and unclear remediation ownership.
    buyer: VP Engineering, Head of Product Security, or CISO
    initialContract: "$25k-$50k paid pilot on one internet-facing service portfolio, converting to roughly $120k-$160k annual ACV after two release cycles and trusted workflow adoption."
  mustBeTrue:
    - At least half of qualified buyers must treat blast-radius proof and owner assignment for internet-facing findings as a funded problem inside existing AppSec or platform-security budget.
    - The core GitHub, AWS, Kubernetes, and Okta stack must produce useful fix packets in under 30 days for at least 3 early pilots.
    - Customers must accept owner-ready fix packets inside Jira or Slack without requiring analysts to reopen multiple external tools on most covered findings.
    - At least several target buyers must say Wiz, Snyk, Prisma Cloud, and JupiterOne do not already solve the final remediation-decision workflow well enough.
    - Low-risk fixes must be definable with approval rules that avoid rollback incidents before autonomous remediation becomes a meaningful expansion driver.
  diligenceQuestions:
    - Which context source improves buyer trust fastest: service ownership, runtime exposure, IAM entitlements, or customer-data sensitivity?
    - How often does budget unlock because of an incident or audit versus a broader autonomous-security initiative?
    - What graph-confidence threshold is required before a VP Engineering or CISO allows low-risk auto-remediation?
    - In live evaluations, where do Wiz, Snyk, Prisma Cloud, and JupiterOne still fail the owner-ready remediation workflow?
    - How much deployment work is required when a prospect deviates from the core GitHub, AWS, Kubernetes, and Okta stack?
operatingAssumptions:
  - assumption: Buyers will fund a standalone remediation-decision layer even if they already own Wiz, Snyk, Prisma Cloud, or JupiterOne.
    basis: research.yaml
    validationTest: Run 10 budget-owner interviews and secure at least 3 paid pilots that explicitly compare the startup against an existing adjacent platform.
    decisionImpact: If false, the company must reposition as a coexistence module or partner-driven layer instead of a standalone control point.
  - assumption: GitHub, AWS, Kubernetes, and Okta cover enough early design partners to support the first 3-5 production customers.
    basis: idea.yaml
    validationTest: Track stack fit across the first 15 qualified opportunities and confirm that at least 5 can start without custom connector work.
    decisionImpact: If false, onboarding slows and hiring must shift earlier toward integrations or solutions engineering.
  - assumption: One service-portfolio deployment can reduce median time-to-owner by at least 60% within the first month.
    basis: operator judgment
    validationTest: Benchmark 25 or more covered findings in each of 2 design-partner pilots against the customer's historical baseline.
    decisionImpact: If false, the ROI case weakens and the product may need a narrower wedge or more analyst workflow depth before scaling sales.
  - assumption: Buyers will accept $120k-$160k annual ACV for the first production deployment if the product materially reduces triage labor and improves control over remediation.
    basis: research.yaml
    validationTest: Test 3 package structures in at least 8 pricing conversations and secure 2 signed pilot scopes with written conversion expectations in the target range.
    decisionImpact: If false, the company must lower entry price, narrow scope, or rely more heavily on channels and lower-CAC segments.
  - assumption: Approval history and remediation outcomes will create a differentiated policy moat rather than remain customer-specific workflow data.
    basis: research.yaml
    validationTest: Capture approval and outcome data across the first 500 covered findings and measure whether policy suggestions improve acceptance or safe-action rates in later releases.
    decisionImpact: If false, long-term defensibility shifts toward connector depth and workflow embedding instead of a compounding data advantage.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Buyer and trigger discovery
    hypothesis: Target buyers describe a named internet-facing remediation bottleneck tied to incidents, audits, enterprise reviews, or automation pressure.
    successMetric: 12 discovery interviews completed with at least 8 accounts matching the target stack and 6 confirming an active buying trigger inside 12 months.
    owner: Founder CEO
  - horizon: 0–90 days
    experiment: Concierge fix-packet benchmark
    hypothesis: A manual-plus-software prototype can reduce time-to-owner and time-to-disposition by at least 60% on historical findings for one service portfolio.
    successMetric: 2 design partners benchmark at least 25 findings each and show median time-to-owner improvement above 60%.
    owner: Founding eng
  - horizon: 90–180 days
    experiment: Core-stack pilot deployment
    hypothesis: GitHub, AWS, Kubernetes, and Okta integrations are enough to deploy useful graph coverage in under 30 days without services-heavy onboarding.
    successMetric: 3 paid pilots launch with median time to first trusted fix packet under 30 days.
    owner: Security graph engineer
  - horizon: 90–180 days
    experiment: Pricing and packaging test
    hypothesis: A paid pilot plus annual service-portfolio subscription converts better than seat-based or pure usage pricing.
    successMetric: Preferred package wins in at least 5 of 8 pricing conversations and appears in 2 signed pilot scopes.
    owner: Founder CEO
  - horizon: 6–12 months
    experiment: Workflow-embed conversion test
    hypothesis: Jira and Slack delivery materially increase pilot-to-production conversion versus a separate analyst console.
    successMetric: At least 2 pilot customers convert after using fix packets inside existing Jira or Slack workflows across 2 release cycles.
    owner: Product lead
  - horizon: 12–18 months
    experiment: Policy-gated low-risk automation
    hypothesis: Buyers will approve a narrow class of low-risk fixes after advisory trust is established and graph confidence thresholds are transparent.
    successMetric: 2 production customers enable one approved low-risk remediation class with zero rollback incidents over one quarter.
    owner: Security product lead
operations:
  - Maintain a least-privilege deployment playbook for GitHub, AWS, Kubernetes, and Okta with documented data boundaries and approval controls.
  - Run graph-quality reviews on missing edges, stale ownership data, and false-confidence cases before expanding automation scope.
  - Deliver fix packets into Jira or Slack first so the product fits existing AppSec and engineering workflows instead of demanding a new console habit.
  - Use design partners and selected ecosystem partners for onboarding leverage rather than building a services-heavy deployment team.
team:
  - role: Founder CEO
    startTiming: Month 0
    rationale: Own design-partner sales, pricing, buyer discovery, and early partner development before the motion is repeatable.
  - role: Founding eng
    startTiming: Month 0
    rationale: Build the graph engine, connector framework, and first fix-packet workflow needed for the initial proof point.
  - role: Security graph engineer
    startTiming: Month 1
    rationale: Improve entity resolution, confidence scoring, and graph freshness on the core GitHub, AWS, Kubernetes, and Okta stack.
  - role: Product lead
    startTiming: Month 4
    rationale: Own workflow design, Jira and Slack delivery, and pilot-to-production packaging that reduces custom work.
  - role: Security product lead
    startTiming: Month 8
    rationale: Define approval policies, audit trails, and low-risk automation controls once advisory usage is trusted.
  - role: GTM lead
    startTiming: Month 10
    rationale: Add pipeline capacity only after pilot conversion and packaging are validated by founder-led sales.
milestones:
  - horizon: 0–12 months
    items:
      - Launch 3 paid pilots on the core GitHub, AWS, Kubernetes, and Okta stack.
      - Show at least 60% median time-to-owner improvement for 2 design partners.
      - Convert at least 2 pilots into annual production contracts at target entry ACV.
      - Standardize Jira or Slack workflow delivery for the initial service-portfolio wedge.
  - horizon: 12–24 months
    items:
      - Reach 8-12 production customers using the blast-radius workflow across more than one service portfolio.
      - Ship policy templates and approval controls for at least one class of low-risk automated remediation.
      - Reduce deployment time to under 21 days for the standard target stack.
      - Establish 2 ecosystem or advisor channels that source qualified pipeline.
  - horizon: 24–36 months
    items:
      - Reach roughly 18 production customers consistent with the modeled SOM.
      - Expand the graph into adjacent identity-risk, compliance-evidence, and agent-authorization workflows.
      - Demonstrate that approval history improves safe-action coverage without increasing rollback incidents.
risks:
  - risk: Adjacent platform vendors bundle enough blast-radius context to make a standalone tool look optional.
    likelihood: High
    impact: High
    mitigation: Own the owner-ready fix packet, approval logic, and workflow embedding layer that broad suites do not package cleanly.
  - risk: Graph incompleteness or stale ownership data creates false confidence on remediation decisions.
    likelihood: High
    impact: High
    mitigation: Start with one tightly supported stack, expose confidence scores, and gate automation until verified coverage thresholds are met.
  - risk: Deployment becomes too integration-heavy for a 30-day pilot and erodes time-to-value.
    likelihood: Medium
    impact: High
    mitigation: Limit the initial motion to GitHub, AWS, Kubernetes, and Okta and package a standard least-privilege onboarding playbook.
  - risk: Buyers resist approving any autonomous remediation even after advisory trust is established.
    likelihood: Medium
    impact: Medium
    mitigation: Make advisory ROI sufficient for the first contract and treat low-risk automation as expansion only after policy controls are proven.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: >-
    Fund 18 months to prove the core graph on the standard target stack, win
    3 paid pilots and 2 production conversions, harden workflow delivery plus
    confidence scoring, and reach the first approval-gated low-risk remediation
    milestone without building a large enterprise sales team too early.
