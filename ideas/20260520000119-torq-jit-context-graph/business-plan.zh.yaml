slug: change-blast-radius-graph
date: '2026-05-20'
executiveSummary: 这家公司一开始应该做成一层“爆炸半径决策层”，专门服务云原生 B2B SaaS 公司里、面向互联网服务的安全修复，而不是一上来就做宽泛的 ASPM、CNAPP，或自主 SOC 平台。第一个客户，是一家 Series B–D 的 SaaS 公司：75–300 名工程师、每周发版、用 GitHub、AWS、Kubernetes、Okta，只有一个小型产品安全团队，却仍要花几个小时证明一个发现能不能打到生产数据、到底该谁修。最直接的购买触发点，通常是最近的事故、审计、企业安全评审，或董事会推动自主安全运营，把缓慢而手工的爆炸半径分析彻底暴露出来。研究支持这是一个聚焦但可信的市场：如果公司能以六位数 ACV 拿下一小批共创客户，模型里可以对应 $700.0M 的 TAM、$156.0M 的 SAM，以及第 3 年 $2.7M 的 SOM。产品应该先把一条扫描器发现转成 可直接派给负责人的修复包，里面带上服务 owner、权限路径、运行时可达性、客户数据暴露面，以及带审批闸的修复建议；等图谱置信度被证明后，再加低风险自动化。这里的刻意取舍是：先比宽平台厂商更快地赢下单一服务组合里“发现交接到动作”的那一段，即便代价是把 SOC、合规和身份治理的扩张先往后放。最大的反证风险有两个：一是买方会觉得 Wiz、Snyk、Prisma Cloud 或 JupiterOne 已经够用；二是图谱完整度太弱，导致 30 天内还撑不起可信建议。独立预算到底能不能单独批出来、自动批准最低需要多高的图谱置信度，这两件事都还是必须尽早验证的假设。
problem:
- AppSec 团队会从代码、云、身份和运行时工具里收到发现，但在把修复票派给一个靠谱 owner 之前，仍得手工重建爆炸半径。
- 每周发版节奏加上 AI 辅助开发，把变更量抬得比安全人头增长还快，结果积压分诊成了生产风险瓶颈。
- 宽泛的扫描器和暴露面平台会把风险标出来，却很难稳定产出一个 可直接执行的决策对象，明确告诉团队：下次发版前到底能安全改什么。
solution:
- 先围绕一个面向互联网的服务组合，在 GitHub、CI、IaC、AWS、Kubernetes、Okta 和工单元数据之间，搭起一张持续刷新的 code-to-cloud 图谱。
- 把每一条新的高优先级发现，转成一个 修复包：owner、权限路径、运行时可达性、生产数据暴露面、发版依赖、置信度分数和建议动作，一次说清。
- 只有当产品已经证明图谱准确、知道怎么回滚、并且能在建议型工作流里留下可审计推理时，才对低风险修复开放带审批闸的自动化。
whyWeWin:
- 这个切口卡的正是“发现”和“动作”之间那一刻。比起再做一个宽泛安全仪表盘，这里的买方痛点更尖、预算更急、ROI 也更好量。
- 跨 repo、云资产、身份和运行时上下文做实体对齐，技术上比在扫描器里再加一个优先级视图更难复制。
- 审批历史和修复结果会慢慢滚成一层专有策略库：哪些修复可以自动跑，哪些必须保留人工审批。
strategicChoices:
  beachhead: 滩头市场先放在北美和英国、英语环境下的 Series B–D 云原生 B2B SaaS 公司：75–300 名工程师、每周发版、3–8 人的产品安全或平台安全团队，专门分诊面向互联网服务的发现。
  wedgeRationale: 发版前、面向互联网的安全修复，比泛 ASPM 更窄、也更快证明价值：工作流、触发点、成功指标和买方都非常明确——这个发现会不会打到生产数据、谁是 owner、这周能不能安全发出修复。只要把派单时间和处置时间实打实拉下来，公司在扩到更宽的安全运营前，就已经能交出可量化结果。
  sequencingRationale: 先从一个服务组合、以读为主的图谱和建议型 修复包 起步，因为在买方愿意放开低风险自动化之前，必须先把图谱信任和部署速度跑通。只有当公司证明了可重复的 30 天部署、试点转正和稳定的置信度评分，才该继续加连接器、自动修复策略、渠道伙伴和销售编制。
  notYet:
  - 先不碰超出初始 AppSec 修复切口之外的宽泛 SOC 调查工作流
  - 先不做没有明确策略闸和人工审批层级的全自动修复
  - 先不把合规证据、身份治理和 CTEM 模块拆成独立产品卖
  - 在审计能力和数据处理要求没产品化前，先不扩到欧洲大陆
market:
  tam: $700.0M 的模型化 TAM：按北美和欧洲约 5,000 家云原生 B2B 软件公司估算，每家每年为修复决策层或相邻 AppSec 平台预算约 $140k 的混合年支出。
  sam: $156.0M 的模型化 SAM：按约 1,200 家英语环境的 Series B–D 或中端 SaaS 公司估算；它们采用目标中的 GitHub + 云原生栈，复杂度足以买下一套狭窄的爆炸半径工作流，ACV 约 $130k。
  som: $2.7M 的模型化第 3 年 SOM：按约 18 个客户、每个客户约 $150k ARR 估算，靠创始人主导销售和“单一服务组合先落地”的部署模式拿下。
  segments:
  - 主要细分：拥有面向互联网服务、且产品安全团队精简的云原生 B2B SaaS 公司
  - 次级细分：从超载的 AppSec 团队手里接过修复工作的平合工程负责人
  buyingProcess: 日常 推动人 通常是产品安全负责人、资深 AppSec 工程师或平台安全负责人；真正拍预算的多半是 VP Engineering 或 CISO。交易最好从事故、审计或自动化项目切入，先在一个面向互联网的服务组合上做付费试点；等买方在现有 Jira 或 Slack 流程里看见 owner 分配和处置速度明显变快，再转成年约。
product:
  mvp: MVP 应该先把 GitHub、AWS、Kubernetes、Okta 和工单元数据接起来，覆盖一个服务组合，并为每一条已覆盖发现生成一份带爆炸半径判断的 修复包。产品必须露出置信度评分、可解释的图谱边、发版约束，以及能导出到 Jira 或 Slack 的带审批闸工作流。
  sixMonth: 先在 GitHub、AWS、Kubernetes、Okta 这套核心栈上证明 30 天内可部署；把面向互联网的发现稳定转成 可直接派给负责人的修复包；再相对客户现有的人工基线，量化派单时间和处置时间的改善。
  twelveMonth: 扩到更大的服务组合覆盖面，加入置信度阈值控制、低风险修复的打包策略模板，以及可复用集成，把前 5–8 个正式客户的部署工作量压下去。
  twentyFourMonth: 从建议型 修复包 扩到有选择的低风险自动修复，再顺着同一张图谱和策略历史，长到相邻的身份风险审查、合规证据和安全代理授权工作流。
  keyBets:
  - 只部署一个服务组合，也能在 30 天内打出足够准确的爆炸半径判断，撑起付费试点。
  - 比起再看一个日常安全控制台，买方更愿意在现有工作流里收到可直接派给负责人的修复包。
  - GitHub、AWS、Kubernetes 和 Okta 这套组合，足以覆盖足够多的早期客户，让公司不用重度定制集成也能拿下前 3–5 个正式客户。
  - 在现有厂商把同类“变更安全”工作流打包出来前，审批日志和修复结果会先长成一条持久的策略护城河。
gtm:
  wedge: 先卖一个付费试点：把一个服务组合里、每周面向互联网的发现，转成带爆炸半径判断的 修复包。等客户跨多个发版周期都在用这套工作流、并批准第一类低风险动作后，再转成年约。
  channels:
  - 创始人亲自外呼，面向目标 SaaS 客户里的产品安全负责人、VP Engineering 和平台安全负责人
  - 通过 GitHub、AWS 和身份生态做联合销售与技术合作，因为产品必须吃到一手上下文数据
  - 安全咨询公司、vCISO 或 AppSec 顾问；事故、审计和企业评审后，往往正是他们最先看见分诊瓶颈
  funnelTargets: 从 首次沟通 到合格试点 20–30%，合格试点到正式生产 50%+，从试点启动到生产合同控制在 90 天内。
  pricing: 定价按受覆盖的面向互联网生产服务数量和接入的身份域数收费，因为买方买的是分诊人力下降和修复决策更安全，而不是按 席位 计费。初始假设是，付费试点价格在 $25k–$50k，转正式部署后首张生产合同约为 $120k–$160k ACV；后续扩张来自更多服务组合、审批策略和低风险自动化。
businessModel:
  revenueStreams:
  - 爆炸半径图谱和修复包工作流的年费订阅
  - 低风险自动修复的高级策略与审批模块
  - 来自额外服务组合、连接器和审计报表的扩张收入
  unitOfValue: 纳入爆炸半径覆盖的一组面向互联网的生产服务组合
  targetGrossMarginPct: 75
  expansionLevers:
  - 先在第一批面向互联网资产上证明价值，再扩更多服务组合
  - 从建议型 修复包 扩到已批准的低风险修复工作流
  - 在同一张图谱上叠加合规证据、身份风险审查和代理授权控制
strategyMap:
  northStarMetric: 15 分钟内，把受覆盖的关键发现转成 可直接派给负责人 的修复决策
  inputMetrics:
  - 从发现生成到 owner 被分配工单的时间
  - 试点转正式生产的转化率
  - 无需人工跨工具返工就被接受的 修复包 占比
  - 首个服务组合生成图谱覆盖的中位时间
  - 在策略约束下获批且未触发回滚事故的低风险修复占比
  moatsToBuild:
  - 跨域实体对齐图谱，把 repo、服务、身份、权限和运行时暴露面连起来
  - 绑定具体图谱状态和变更类别的修复结果与审批历史数据集
  - 与扫描器、工单系统及云/身份控制面的深度共存集成
  - 缩短安全评审和采购周期的置信度评分与可审计推理
  killCriteria:
  - 围绕面向互联网修复这个场景，聊完 30 个目标账户后，付费试点仍少于 3 个
  - 前 6 个试点之后，试点转正式生产低于 50%
  - 试点前 30 天里，owner 派单的中位时间没有至少改善 60%
  - 超过 70% 的后期客户都说 Wiz、Snyk、Prisma Cloud 或 JupiterOne 已经够用
  mermaid: "flowchart LR\n  Wedge[Internet-facing remediation wedge] --> MVP[Blast-radius graph MVP]\n  MVP --> Proof[Owner-ready fix packets and trust signals]\n  Proof --> Expansion[Policy-gated automation and adjacent control workflows]\n"
investorMemo:
  verdict:
    call: Meet / investigate further
    conviction: 切口很强、买方痛点也真实，但要形成更高把握，前提是证明这个产品能独立拿到预算，而且图谱信任能在拥挤的平台夹层里站住。
    whyBelieve: 公司切的是一个窄而可量化的工作流：已有安全预算、买方角色明确、触发点也已经存在。
    whyDoubt: 如果现有厂商先把“够用的”爆炸半径上下文打包出来，而这家创业公司还没证明自己部署更快、动作更安全，那么独立窗口会很快收窄。
    nextDiligence: 重点尽调要看三件事：至少 3 个付费试点；核心标准栈在 30 天内上线；以及真实的面向互联网发现里，owner 派单时间明显下降。
  firstCustomer:
    title: 一家云原生 SaaS 公司的产品安全负责人
    profile: 目标画像，是一家 Series C 的 B2B SaaS 公司：100–250 名工程师，使用 GitHub Enterprise、Terraform、AWS、EKS、Okta，只有 3–8 人的产品安全团队，却要顶住每周与发版绑定的发现。
    trigger: 最近的事故、审计、企业客户评审，或董事会推动安全自动化，把爆炸半径证明太慢、修复 owner 不清楚的问题直接撕开。
    buyer: VP Engineering、产品安全负责人或 CISO
    initialContract: 先在一个面向互联网的服务组合上签 $25k–$50k 的付费试点；跑完两个发版周期、并建立起工作流信任后，再转成约 $120k–$160k 的年 ACV。
  mustBeTrue:
  - 至少一半合格买方，必须把“证明面向互联网发现的爆炸半径并分配 owner”看成一个已有预算的痛点，且预算来自现有 AppSec 或平台安全盘子。
  - GitHub、AWS、Kubernetes 和 Okta 这套核心栈，必须在至少 3 个早期试点里都能在 30 天内产出有用的 修复包。
  - 客户必须愿意直接在 Jira 或 Slack 里接收 可直接派给负责人的修复包，而不是大多数发现都逼着分析师重新打开多个外部工具。
  - 至少有一批目标买方要明确说，Wiz、Snyk、Prisma Cloud 和 JupiterOne 还没有把最后一步修复决策工作流做够。
  - 在自主修复成为重要扩张驱动力之前，低风险修复必须能被审批规则清楚定义，而且不会引发回滚事故。
  diligenceQuestions:
  - 哪一种上下文来源最能最快拉高买方信任：服务 owner、运行时暴露面、IAM 权限，还是客户数据敏感度？
  - 预算被打开，更常见是因为事故或审计，还是更宽的自主安全项目？
  - VP Engineering 或 CISO 愿意放开低风险自动修复前，最低会要求多高的图谱置信度？
  - 在真实评估里，Wiz、Snyk、Prisma Cloud 和 JupiterOne 还卡在哪一步，导致它们做不好 可直接派给负责人的修复工作流？
  - 如果客户偏离标准的 GitHub、AWS、Kubernetes、Okta 栈，部署工作量会增加多少？
operatingAssumptions:
- assumption: 即便已经买了 Wiz、Snyk、Prisma Cloud 或 JupiterOne，买方仍愿意为一层独立的修复决策层批预算。
  basis: research.yaml
  validationTest: 做 10 场预算 owner 访谈，并至少拿下 3 个付费试点；这些试点必须明确把公司与现有相邻平台拿来比较。
  decisionImpact: 如果不成立，公司就得把自己重定位成共存模块或伙伴驱动的一层，而不是独立控制点。
- assumption: GitHub、AWS、Kubernetes 和 Okta 足以覆盖足够多的早期共创客户，支撑前 3–5 个正式客户。
  basis: idea.yaml
  validationTest: 跟踪前 15 个合格机会的技术栈匹配度，确认至少有 5 个可以不做定制连接器就开跑。
  decisionImpact: 如果不成立，导入就会变慢，公司也得更早把招聘重心转向集成或解决方案工程。
- assumption: 只部署一个服务组合，也能在第一个月里把 owner 派单的中位时间至少压缩 60%。
  basis: 操作判断
  validationTest: 在 2 个共创客户试点里，各拿 25 条以上已覆盖发现，对照客户历史基线做基准。
  decisionImpact: 如果不成立，ROI 论证会变弱，产品可能得把切口收得更窄，或在扩大销售前先加深分析师工作流能力。
- assumption: 如果产品能明显减少分诊人力、并把修复控制权收紧，买方愿意为第一套正式部署支付 $120k–$160k 年 ACV。
  basis: research.yaml
  validationTest: 在至少 8 场定价对话里测试 3 套打包结构，并拿到 2 份已签字的试点范围文件，写明目标区间内的转正预期。
  decisionImpact: 如果不成立，公司就得下调入门价、收窄范围，或更多依赖渠道与更低 CAC 的客户段。
- assumption: 审批历史和修复结果会长成差异化的策略护城河，而不只是留在客户侧的工作流数据。
  basis: research.yaml
  validationTest: 在前 500 条已覆盖发现上，抓取审批和结果数据，并衡量后续发版里策略建议是否提高接受率或安全动作覆盖率。
  decisionImpact: 如果不成立，长期防守力就会更多落在连接器深度和工作流嵌入，而不是滚雪球式的数据优势。
experimentRoadmap:
- horizon: 0–90 天
  experiment: 买方与触发点发现
  hypothesis: 目标买方能清楚说出一个具名的、面向互联网修复瓶颈，而且这个瓶颈与事故、审计、企业评审或自动化压力直接相关。
  successMetric: 完成 12 场 discovery 访谈，其中至少 8 个账户符合目标技术栈，6 个确认未来 12 个月内存在明确购买触发点。
  owner: 创始人/CEO
- horizon: 0–90 天
  experiment: 礼宾式 修复包 基准测试
  hypothesis: “人工 + 软件”的原型，能在一个服务组合的历史发现上，把 owner 派单时间和处置时间至少压缩 60%。
  successMetric: 2 个共创客户各自对至少 25 条发现做基准，owner 派单时间中位改善都高于 60%。
  owner: 创始工程师
- horizon: 90–180 天
  experiment: 核心栈试点部署
  hypothesis: 只靠 GitHub、AWS、Kubernetes 和 Okta 集成，就能在不走重服务导入的前提下，在 30 天内上线有用的图谱覆盖。
  successMetric: 3 个付费试点上线，产出第一份可信 修复包 的中位时间低于 30 天。
  owner: 安全图谱工程师
- horizon: 90–180 天
  experiment: 定价与打包测试
  hypothesis: “付费试点 + 按服务组合订阅年费”的方案，转化会优于按 席位 或纯 用量 定价。
  successMetric: 优选打包方案在 8 场定价对话里至少赢下 5 场，并写进 2 份已签字试点范围文件。
  owner: 创始人/CEO
- horizon: 6–12 个月
  experiment: 工作流嵌入转化测试
  hypothesis: 把 修复包 直接送进 Jira 和 Slack，会比单独拉一个分析师控制台更能提升试点转正式的转化。
  successMetric: 至少 2 个试点客户，在现有 Jira 或 Slack 工作流里连续跑完 2 个发版周期后完成转正。
  owner: 产品负责人
- horizon: 12–18 个月
  experiment: 带策略闸的低风险自动化
  hypothesis: 当建议型阶段已经建立起信任、且图谱置信度阈值透明时，买方会批准一小类低风险修复自动执行。
  successMetric: 2 个正式客户开启一类已批准的低风险自动修复，并在一个季度内保持零回滚事故。
  owner: 安全产品负责人
operations:
- 围绕 GitHub、AWS、Kubernetes 和 Okta，维护一套最小权限部署 操作手册，明确数据边界和审批控制。
- 在扩大自动化范围前，先做图谱质量复盘，重点盯缺失边、owner 数据过期和错误置信度案例。
- 先把 修复包 送进 Jira 或 Slack，让产品贴进现有 AppSec 和工程工作流，而不是逼客户养成新的控制台习惯。
- 优先借共创客户和少数生态伙伴放大导入效率，而不是一开始就堆一个重服务团队。
team:
- role: 创始人/CEO
  startTiming: 第 0 月
  rationale: 在这套打法可重复之前，先由创始人亲自拿下共创客户销售、定价、买方发现和早期伙伴拓展。
- role: 创始工程师
  startTiming: 第 0 月
  rationale: 搭起图谱引擎、连接器框架和第一版 修复包 工作流，把最初的产品证明打出来。
- role: 安全图谱工程师
  startTiming: 第 1 月
  rationale: 把实体对齐、置信度评分和图谱新鲜度打磨好，先盯紧 GitHub、AWS、Kubernetes、Okta 这套核心栈。
- role: 产品负责人
  startTiming: 第 4 月
  rationale: 负责工作流设计、Jira/Slack 交付以及试点转正的标准化打包，减少每个客户的定制工作。
- role: 安全产品负责人
  startTiming: 第 8 月
  rationale: 等建议型用法建立起信任后，再来定义审批策略、审计轨迹和低风险自动化控制。
- role: GTM 负责人
  startTiming: 第 10 月
  rationale: 只有当试点转正和产品打包已经被创始人主导销售验证后，才增加 线索 产能。
milestones:
- horizon: 0–12 个月
  items:
  - 在核心的 GitHub、AWS、Kubernetes、Okta 栈上启动 3 个付费试点。
  - 在 2 个共创客户上，把 owner 派单时间中位数至少压缩 60%。
  - 至少把 2 个试点转成目标入门 ACV 的年度生产合同。
  - 把初始服务组合切口里的 Jira 或 Slack 工作流交付标准化。
- horizon: 12–24 个月
  items:
  - 拿下 8–12 个正式生产客户，并把爆炸半径工作流扩到不止一个服务组合。
  - 为至少一类低风险自动修复上线策略模板和审批控制。
  - 把标准目标栈的部署时间压到 21 天以内。
  - 建立 2 条能持续输送合格线索的生态或顾问渠道。
- horizon: 24–36 个月
  items:
  - 正式生产客户数做到约 18 个，与模型里的 SOM 匹配。
  - 把图谱扩到相邻的身份风险、合规证据和代理授权工作流。
  - 证明审批历史能提升安全动作覆盖率，而且不会抬高回滚事故。
risks:
- risk: 相邻平台厂商把足够多的爆炸半径上下文打包进去，让独立工具看起来像可选项。
  likelihood: High
  impact: High
  mitigation: 把 可直接派给负责人的修复包、审批逻辑和工作流嵌入层吃下来——这些恰恰是宽平台最难打包干净的部分。
- risk: 图谱不完整，或 owner 数据过期，导致修复决策里出现错误信心。
  likelihood: High
  impact: High
  mitigation: 先从一套收得很紧的标准栈起步，露出置信度分数，并在覆盖阈值被验证前卡住自动化。
- risk: 部署变得太依赖集成工程，30 天试点跑不出来，时间到价值被拖垮。
  likelihood: Medium
  impact: High
  mitigation: 初始打法只盯 GitHub、AWS、Kubernetes 和 Okta，并把一套标准化、最小权限的导入 操作手册 打包出来。
- risk: 即便建议型阶段已经建立信任，买方仍然不愿批准任何自主修复。
  likelihood: Medium
  impact: Medium
  mitigation: 先让建议型 ROI 本身就足够支撑第一张合同；等策略控制被验证后，再把低风险自动化当扩张项卖。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: 募集 18 个月资金，把标准目标栈上的核心图谱跑通，赢下 3 个付费试点和 2 个正式转化，把工作流交付和置信度评分打磨扎实，并在不过早搭建大企业销售团队的前提下，跑到第一个带审批闸的低风险修复里程碑。
