    name: Monthly logo churn
    value: '1.8'
    unit: percent
    source: "[Heuristic: early enterprise security SaaS logo retention before deeper multi-product expansion]"
  - id: A16
    name: Blended CAC
    value: '60'
    unit: USDK per new production customer
    source: "[BP channels founder-led outbound; BP funnelTargets 20-30% discovery-to-pilot and 50%+ pilot-to-production; heuristic: high-touch early enterprise sales]"
