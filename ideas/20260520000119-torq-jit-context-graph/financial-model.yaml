    name: Cash conversion convention
    value: 'Cash burn approximates EBITDA; capex, debt, and working-capital swings are treated as immaterial'
    unit: policy
    source: "[Heuristic: simplify early-stage operating model when contracts are subscription-heavy and financing is modeled separately]"
