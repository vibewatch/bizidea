    cashImpactK: -180.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Leads[Founder-led outbound] --> Pilots[Paid pilots]
      Pilots --> Customers[Production customers]
      Customers --> Revenue[Subscription revenue]
      Revenue --> GrossProfit[75 percent gross profit]
      GrossProfit --> Cash[Runway and financing need]
modelSanity:
  - checkName: Revenue engine
    finding: Base-case revenue comes from reaching 12 production customers by Q4Y2 and 18 by Q4Y3 while expanding blended ARR per account to 180K.
  - checkName: Must go right
    finding: The model needs pilot-to-production conversion to stay at or above the plan and the standard GitHub plus AWS plus Kubernetes plus Okta deployment to stay under 30 days.
  - checkName: Model breaks if
    finding: A slower sales cycle or weaker ARPU expansion is the fastest path to cash pressure because cash turns negative in Y3 even before any major hiring miss.
  - checkName: Next-round proof
    finding: The next financing is justified once the company shows roughly 8-12 production customers, sub-21-day deployment, and one approved low-risk automation policy on the standard stack.
sanityChecks:
  ruleOf40: Y3 growth 122.2% + EBITDA margin -33.0% = 89.2%
  burnMultiple: Y3 burn multiple 0.6x = $0.891M burn / $1.485M net new revenue
  revenuePerFte: $208K Y3 on 13 year-end FTE (heuristic benchmark $180K-$300K security SaaS)
  flags:
    - The base case still requires a follow-on round before the end of Y3 because modeled cash reaches -$732.7K without new financing.
    - Revenue concentration is high because the model assumes 18 customers by Y3 and depends on six-figure contracts in a crowded security category.
    - Gross margin stays at the business-plan target despite graph-heavy workloads, so unexpected cloud or support costs would pressure runway quickly.
