differentiator: 现有扫描器、CNAPP 和 SIEM 厂商各自掌握了画面的一部分，但很少有人能拿出一个真正可执行的 可直接执行的图谱，把服务 owner、权限可达性、运行时暴露面和修复安全性塞进同一个决策对象。这家创业公司赢的，是“发现”和“动作”之间的那一刻：团队得决定是 压掉、建票，还是自动修。因为这张图谱从一开始就为安全执行而不是泛分析而建，它最后有机会长成整条技术栈上自主安全工具的授权层。
