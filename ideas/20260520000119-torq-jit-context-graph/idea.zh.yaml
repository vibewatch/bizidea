topRisks:
- name: 图谱不完整
  description: 如果边缺失、owner 数据过期，产品就可能给团队制造错误信心，把真实爆炸半径说小了。
  mitigation: 先只支持一套收得很紧的标准栈；每条建议都露出置信度分数；在图谱覆盖率过线前，自动化一律要过审批闸。
- name: 现有厂商打包
  description: CNAPP、SIEM 或 AppSec 厂商可能补上基础的上下文图谱视图，削弱客户为独立工具买单的意愿。
  mitigation: 把修复决策工作流和自主动作策略层吃下来——在这里，跨工具执行和可审计性比图谱可视化本身更重要。
- name: 集成疲劳
  description: 如果部署前得先做几个月连接器工程，安全团队可能根本不愿意再上一个新平台。
  mitigation: 先为常见的 GitHub、AWS、Kubernetes、Okta 栈打包 30 天部署方案，先在一个面向互联网的服务组合上把 ROI 跑出来。
