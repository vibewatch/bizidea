problem: 产品安全团队已经从 SAST、CSPM、身份和运行时工具里收到一堆处理不过来的发现，但每条告警都缺了判断真实爆炸半径所需的本地上下文。分析师和 AppSec 工程师得花几个小时，重新拼出哪个 repo 拥有这项服务、哪些身份能打到它、它会不会碰到生产数据，以及自动修复会不会打断关键工作流。等自主安全代理真正进生产后，缺的就不再是又一个检测器，而是一张可信图谱——把一家公司内部代码、权限和运行时资产怎么连在一起，讲清楚。
targetUser:
  primary: 主要用户，是 Series B–D 的云原生 B2B SaaS 公司里的资深产品安全和平台安全工程师：团队规模 75–300 名工程师，使用 GitHub、AWS、Kubernetes、Okta，并且每周都有面向互联网的发版节奏。
  secondary: 次级用户，是负责面向互联网服务的工程经理；当 AppSec 团队被工单压垮时，他们会接手修复票。
  buyer: 典型买方，是一家云原生 B2B SaaS 公司的 VP Engineering、产品安全负责人或 CISO；他们想把修复自动化跑起来，但又不想失去控制。
startupThesis:
  nonObviousInsight: 安全里的下一个控制点，不是把告警做得更花，而是那张组织专属图谱：它告诉代理，一个发现到底能打到哪、谁能安全修、哪些自动动作被允许。Torq 买下 Jit，说明这张图谱正在从 增强数据，变成行动系统。
  beachhead: 先拿 Series B–D 的 B2B SaaS 公司里、面向互联网服务的修复流程做滩头市场。这里的 AppSec 团队每周发版前，都得判断一条新发现的代码或云配置问题，会不会暴露客户数据、能不能在下次发版前自动修掉。
  wedge: 切口是一张“变更爆炸半径图谱”：把每个新漏洞或错误配置，直接变成一个 修复包，里面带上 owner、权限路径、生产数据可达性、回滚约束，以及安全修复建议。
  whyNowCatalyst: Torq 收购 Jit 说明，自主安全运营现在必须吃到横跨代码、身份、权限和运行时行为的图谱化上下文。
  ventureScalePath: 先从 AppSec 优先级和面向互联网服务的安全修复切进去，再把同一张图谱扩到 SOC 调查、身份风险审查、合规证据，最后变成整个企业里安全代理“能做什么”的授权层。
solution: 产品先从 GitHub、CI、IaC、云控制面、Kubernetes、身份提供商和工单元数据里，持续构建每个面向互联网服务的图谱。入口产品把每条新的扫描器发现，直接转成 修复包：受影响的服务、负责团队、可达的权限链、客户数据暴露面、部署依赖，以及安全修复 操作手册，一次给全。AppSec 不用再转发 5 条原始告警，只需推送一条排好优先级的 Jira 或 Slack 工作流。等信任建立起来，这个平台就能变成自主修复的护栏：低风险修复自动执行，模糊案例则连同完整推理链一起升级给人。
goToMarketSeed:
  firstCustomer: 第一个客户，应该是一家 Series C 的云原生 B2B SaaS 公司：100–250 名工程师，使用 GitHub Enterprise、Terraform、AWS、EKS、Okta，只有 3–8 人的产品安全团队，却要被每周面向互联网服务的发现淹没。
  buyingTrigger: 常见购买触发点，是董事会要求引入自主安全分诊，或最近发生过事故、审计、企业客户安全评审，把团队证明爆炸半径和分配 owner 的速度太慢这件事彻底暴露出来。
  currentAlternative: 现有替代方案，是 CSPM 和 SAST 仪表盘、内部服务目录、电子表格，以及 AppSec 和工程团队之间靠 Slack 人工分诊。
  switchingReason: 第一个客户愿意切过来，是因为这套产品把分诊时间从几小时压到几分钟，同时又给安全负责人一个可审计的办法去批准或限制自动修复，而不是把命运交给彼此割裂的工具。
  pricingHypothesis: 定价假设是平台年费，按面向互联网的生产服务数量和接入的身份域数收费；自主修复审批层再卖一个高阶版本。
