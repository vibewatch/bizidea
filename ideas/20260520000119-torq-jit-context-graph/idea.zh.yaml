jobsToBeDone:
- job: 当发版前冒出一个新的面向互联网的发现时，帮产品安全工程师判断真实爆炸半径、把票派给正确 owner，这样他们既能尽快修复，也不会拿一堆假高优先级工作去淹没工程团队。
  currentAlternative: 在扫描器仪表盘、云控制台、电子表格和 Slack 之间人工分诊
  successMetric: 从发现生成到 owner 被明确分配修复票的时间
- job: 当管理层想上自主修复时，帮安全负责人定义哪些修复能安全自动化，这样他们能部署代理，又不把生产风险放飞。
  currentAlternative: 一刀切的人工审批，或零散的内部脚本
  successMetric: 符合条件的修复里，自动修复且没有触发回滚事故的比例
