reportMemo:
  executiveTakeaways:
  - Torq 收购 Jit，验证了上下文图谱已经成了一层真实的控制面；但这个空间也早就被 ASPM、CNAPP 和资产图谱厂商挤满。
  - 真正没被满足的切口，比泛 ASPM 更窄：把一条面向互联网的发现，直接变成带 owner、权限路径、运行时可达性和安全动作建议的 修复包。
  - 第一款可信产品，赢点不在检测器有多全，而在信任和 见效速度；只有当图谱覆盖和审批逻辑经得起审计，买方才会放开自动化。
  marketDefinition: 这个市场，是给 AppSec 和平台团队用的工作流软件：把代码、云、身份和运行时上下文关联起来，优先级排序并安全修复面向互联网的软件风险。它贴着 ASPM、CNAPP 和 CTEM，但真正的切口是“发现”和“动作”之间那个决策对象。
  customerAndBuyer: 主要用户，是云原生 B2B SaaS 公司里的产品安全和平台安全工程师。真正拍板预算的，多半是产品安全负责人、VP Engineering 或 CISO；他们想把修复速度提上去，又不想让自主工具不受控制地碰到生产环境。
  buyingTriggers:
  - point: 最近的事故、审计或客户评审，暴露出一个软件或云发现的真实爆炸半径，至今还要靠多个工具手工拼好几个小时。
    sourceRefs:
    - 61
    - 62
  - point: AI 辅助开发和更快的部署节奏，把代码量和变更速度抬得比 AppSec 人头增长还快，积压分诊开始让人无法忍受。
    sourceRefs:
    - 59
    - 60
  - point: 管理层想上 agentic 或自主安全运营，但在允许自动修复前，他们需要组织专属上下文和审批护栏。
    sourceRefs:
    - 5
    - 64
    - 1
  willingnessToPay:
    summary: 相邻平台品类里已经存在预算。公开定价覆盖了按开发者收费的计划（Snyk）、分层 AppSec 套餐（Endor Labs）、按资产和集成收费的模式（JupiterOne），以及按工作负载模块报价的方式（Wiz）。这说明，只要产品真能把分诊工作收拢起来、并可量化地减少修复人力或 数据泄露风险，买方就会为独立产品买单。
    sourceRefs:
    - 16
    - 18
    - 31
    - 35
    - 62
  competitiveLandscape: 竞争从三个方向同时收拢：想把优先级做得更好的 开发者优先的 AppSec 平台、已经在建 exploitability 模型的 code-to-cloud CNAPP 厂商，以及能跨环境画关系图的 网络资产/CTEM 平台。新进入者必须站在宽平台之下、原始扫描器之上：不是再做一个 仪表盘，而是把单条发现变成安全、可交付修复决策的动作层。
  incumbentThesis:
  - incumbentClass: 云平台
    point: GitHub、AWS、Kubernetes 和 Okta 已经把 ownership、IAM、事件和策略这些原始信号露出来了，但每个平台只看得到问题的一片，没有谁会默认产出跨域的修复决策包。
    sourceRefs:
    - 70
    - 79
    - 85
    - 89
  - incumbentClass: CNAPP 与 code-to-cloud 平台
    point: Wiz 和 Prisma Cloud 证明了“按可利用性排序优先级”这件事有市场，但它们优化的是整栈的宽暴露面管理，而不是 AppSec 在下次发版前必须派出一个安全变更的那个窄时刻。
    sourceRefs:
    - 36
    - 37
    - 56
  - incumbentClass: 开发者优先的 AppSec 扫描器
    point: Snyk 和 Jit 证明买方要的是和业务上下文绑在一起的优先级判断，但扫描器中心的产品，仍得依赖外部的运行时、身份和 ownership 数据，才能证明一个发现到底重不重要。
    sourceRefs:
    - 15
    - 6
    - 70
  - incumbentClass: 资产图谱与 CTEM 平台
    point: JupiterOne 证明了关系图谱和攻击路径上下文确实有价值，但修复 owner、发版约束和安全动作策略，今天仍是客户下游自己扛的工作。
    sourceRefs:
    - 25
    - 104
    - 106
  - incumbentClass: SOAR 与 AI SOC 厂商
    point: Torq 证明执行层本身很值钱，但 AppSec 修复还需要 repo 级 owner 和发版上下文；一个 SOC-first 平台并不会天然拿下这件事。
    sourceRefs:
    - 1
    - 2
    - 58
  regulatoryLandscape: 即便不是传统强监管行业，软件公司面对的 secure-by-design 预期也在抬高。NIST SSDF 给了采购方一套友好的安全开发词汇；NIS2 扩大了欧洲对网络安全风险管理和事件报告的要求；Cyber Resilience Act 则把卖到欧盟的软件和数字产品拉进更严格的全生命周期安全要求。
  technologyLandscape: 这套产品需要的输入，在主流栈里本来就存在：GitHub 里有代码扫描和归属信号，AWS 里有策略分析和可达性，Kubernetes 里有授权和网络控制，Okta 里有身份遥测。真正难的不是拿数据，而是跨这些孤岛做实体对齐、保证新鲜度、打出置信度评分，再把执行卡在策略闸里。
  distributionChannels:
  - point: 先从 100–250 名工程师的云原生软件团队切入，由创始人亲自拿共创客户；这些团队本来就在 GitHub、Kubernetes 和云控制面里积累了足够的数据尾气，价值更快跑得出来。
    sourceRefs:
    - 6
    - 60
    - 63
  - point: 围绕 GitHub、AWS 和身份生态做联合销售与技术合作，因为产品要想有权威性，必须吃到一手 repo、IAM 和事件数据。
    sourceRefs:
    - 70
    - 79
    - 89
  - point: 优先打正在升级 ASPM 的项目；这些买方已经在看基于风险的优先级厂商，也更容易接受一个更窄、但更偏动作层的工作流产品。
    sourceRefs:
    - 15
    - 24
    - 37
  partnershipEcosystem:
  - point: GitHub、云、Kubernetes 和身份提供商，是基础合作伙伴，因为 ownership、权限、运行时态势和事件数据，靠图谱自己推不准。
    sourceRefs:
    - 70
    - 79
    - 85
    - 89
  - point: SOAR、案件管理和响应伙伴也重要，因为图谱只有在建议最终能落成工单、审批步骤或安全自动动作时，价值才真正闭环。
    sourceRefs:
    - 5
    - 1
    - 58
  dataMoats:
  - point: 真正能越滚越厚的护城河，来自跨域实体对齐：把代码、身份、角色、权限、暴露面和数据敏感度，收进一张客户专属图谱。
    sourceRefs:
    - 6
    - 2
    - 36
  - point: 修复结果历史和审批日志，会慢慢长成一层专有策略库，告诉系统哪一类修复可以安全自动执行。
    sourceRefs:
    - 5
    - 64
    - 66
  - point: 随着观察到更多 repo、环境和访问模式，连接器覆盖和资产关键度映射也会越来越强。
    sourceRefs:
    - 25
    - 70
    - 79
  geographicConsiderations:
  - point: 英语环境下的美国和英国 SaaS 团队，是最容易打进去的第一刀：它们通常已经标准化了 GitHub + 云栈，也更常愿意更快采买共创型安全工具。
    sourceRefs:
    - 59
    - 60
  - point: 欧盟扩张很有吸引力，因为 NIS2 和 Cyber Resilience Act 抬高了安全开发和报告压力；但那里的买方也会更在意数据处理、采购和可审计性。
    sourceRefs:
    - 68
    - 69
  sensitivityCases:
  - case: CNAPP 和 ASPM 厂商把足够多的爆炸半径上下文打包进现有套件。
    impact: 独立切口会变窄；公司必须把差异点收在 可直接派给负责人的修复包、审批逻辑和变更安全工作流，而不是原始图谱本身。
    sourceRefs:
    - 36
    - 56
    - 15
  - case: 图谱完整度比预期更慢，因为 ownership、IAM 和运行时数据不一致。
    impact: 产品会更久停留在建议模式，自主修复被拖慢，买方信任也得等置信度评分先跑出来。
    sourceRefs:
    - 6
    - 79
    - 89
    - 85
  - case: 安全负责人继续把工具收敛到少数几个平台。
    impact: 除非公司把自己卖成插在现有平台里的控制层，而不是替代平台，否则销售周期会被拉长。
    sourceRefs:
    - 60
    - 31
    - 35
  validationPlan:
  - priority: 高
    question: 如果客户已经买了 Wiz、Snyk 或 Prisma Cloud，他们还会不会为独立的修复决策层买单？
    evidenceToGather: 做 10 场产品安全负责人的 访谈，对比当前积压分诊流程、现有平台缺口，以及他们是否愿意先试一个窄工作流层。
  - priority: 高
    question: 低风险修复要想自动获批，图谱完整度最低得达到什么门槛？
    evidenceToGather: 在共创客户试点里，围绕一个面向互联网的服务组合，测 GitHub、云 IAM、Kubernetes 和身份遥测上的缺边率。
  - priority: 中
    question: 最先加入哪一类数据源，最能抬高优先级判断：ownership、运行时暴露面、身份权限，还是数据敏感度？
    evidenceToGather: 在试点里做 A/B 埋点，逐步加入不同上下文来源，对比 owner 派单时间和处置时间的改善幅度。
analysisModels:
  marketMapDiagram:
    title: 上下文到动作的安全地图
    mermaid: "quadrantChart\n  title Context-to-action security map\n  x-axis Low actionability --> High actionability\n  y-axis Low context depth --> High context depth\n  JupiterOne: [0.34, 0.62]\n  Snyk: [0.58, 0.68]\n  Wiz: [0.72, 0.84]\n  Jit/Torq: [0.82, 0.88]\n  Proposed startup: [0.94, 0.95]"
  fiveForces:
    supplierPower:
      score: 3
      rationale: 产品依赖 GitHub、云 IAM、Kubernetes 和身份系统的 API 与事件流，但没有任何一家供应商单独掌握足够多的工作流，能直接左右市场。
      sourceRefs:
      - 70
      - 79
      - 89
    buyerPower:
      score: 4
      rationale: 安全负责人能在多套相邻平台之间做比较，而且普遍背着供应商收敛压力，因此无论试点还是采购，都掌握不小议价权。
      sourceRefs:
      - 37
      - 16
      - 31
      - 60
    threatOfEntrants:
      score: 3
      rationale: AI 降低了造软件的成本，但企业级的图谱准确度、连接器深度和策略信任，仍然是实打实的进入壁垒。
      sourceRefs:
      - 59
      - 6
      - 79
    threatOfSubstitutes:
      score: 4
      rationale: 买方可以拿 CNAPP、ASPM、CAASM/CTEM，甚至 GitHub 和工单系统里的人肉分诊来替代，尤其当他们已经买了宽平台时。
      sourceRefs:
      - 36
      - 15
      - 25
      - 70
    competitiveRivalry:
      score: 5
      rationale: 在 AppSec、CNAPP、CTEM 和 AI SOC 之间，一批资金充足的厂商都在往“上下文优先级”靠拢，Torq 收购 Jit 又进一步把竞争加热。
      sourceRefs:
      - 1
      - 17
      - 15
      - 36
      - 25
  pestle:
  - factor: 政治
    impact: positive
    point: 欧洲政策正在推动更多组织把网络安全风险管理和事件报告制度化，这会抬高“能举证的修复工作流”的紧迫性。
    sourceRefs:
    - 68
  - factor: 经济
    impact: negative
    point: 工具链膨胀和预算审视，让买方更警惕再加一个 仪表盘；这反而有利于那些能明确收拢人力或压低事故成本的产品。
    sourceRefs:
    - 60
    - 62
  - factor: 社会
    impact: negative
    point: 开发者天然反感缺少上下文的安全打断，因此如果产品不能把工作变成清楚、可派发的 可直接派给负责人 任务，它只会被看成额外摩擦。
    sourceRefs:
    - 15
  - factor: 技术
    impact: positive
    point: AI 辅助开发和更深的云原生采用，会继续拉高代码量、依赖扩张和跨系统关系复杂度；静态严重度分数已经解释不动这些问题。
    sourceRefs:
    - 59
    - 60
    - 63
  - factor: 法律
    impact: positive
    point: 安全开发框架和产品安全监管，正在奖励可审计、策略驱动的修复流程，也让可追溯决策日志的价值更高。
    sourceRefs:
    - 65
    - 69
  adoptionFrictionMatrix:
  - friction: 图谱完整度与新鲜度
    severity: 高
    affectedBuyer: 产品安全负责人
    mitigation: 先盯住一个面向互联网的服务组合，露出置信度分数，并在覆盖阈值过线前卡住任何自主动作。
    sourceRefs:
    - 6
    - 79
    - 89
  - friction: 连接器部署与权限申请
    severity: 高
    affectedBuyer: 平台安全经理
    mitigation: 先把 GitHub、AWS、Kubernetes 和身份集成打包出来，先证明价值，再扩更多遥测。
    sourceRefs:
    - 70
    - 79
    - 85
    - 89
  - friction: 开发团队对新安全控制台的怀疑
    severity: 中
    affectedBuyer: 工程经理
    mitigation: 把 可直接派给负责人的工单和 PR 指引送进现有工作流，而不是逼分析师和开发者每天切进新控制台。
    sourceRefs:
    - 60
    - 15
  - friction: 自主修复的责任风险
    severity: 高
    affectedBuyer: VP Engineering 或 CISO
    mitigation: 在开放自动执行前，先把策略闸、可解释的推理链和清楚的审批层级立起来。
    sourceRefs:
    - 64
    - 66
    - 5
