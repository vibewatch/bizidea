competitors:
- name: Jit / Torq
  stage: 成长期
  wedge: AI 上下文图谱 + agentic 安全运营，把代码、云和运行时上下文串在一起。
  pricing: 定制报价 / 演示驱动的企业销售。
  strength: 围绕组织专属上下文和自主工作流的叙事很强，而且被 Torq 的收购逻辑背书。
  weaknessVsUs: 合并后的公司会被更宽的 SOC 和平台范围牵着走；一个专做 AppSec 修复决策的产品，能更专注地卡住发版期的 owner、回滚和动作安全上下文。
  sourceRefs:
  - 1
  - 2
  - 6
  - 5
- name: Snyk
  stage: 成长期
  wedge: 开发者优先的 AppSec，叠加基于风险的优先级和资产清单。
  pricing: 提供 Free、Team、Ignite 和 Enterprise 计划；公开定价从较低的每开发者门槛起步，再往定制报价走。
  strength: 开发者分发能力强，积压优先级的故事也讲得清楚。
  weaknessVsUs: 相比一张专门围绕“谁能在发版前安全修什么”的爆炸半径图谱，它仍然更偏扫描器中心。
  sourceRefs:
  - 15
  - 16
- name: Wiz
  stage: 成长期
  wedge: 把 code-to-cloud exploitability 和 ASPM 放进更宽的 CNAPP 平台。
  pricing: 按工作负载、开发者、日志或传感器模块做定制报价。
  strength: 云侧安装基数深，而且 code-to-cloud 上下文叙事很强。
  weaknessVsUs: 它更适合买方统一上宽泛云安全套件；一个窄 AppSec 修复层反而能动得更快，也更聚焦工作流。
  sourceRefs:
  - 35
  - 36
  - 37
- name: Endor Labs
  stage: 成长期
  wedge: AI 原生应用安全，强调上下文工程、repo 姿态和修复/升级。
  pricing: Free、Core、Pro 以及打包平台销售。
  strength: AI 时代的 AppSec 站位清楚，repo/package 深度叙事也很强。
  weaknessVsUs: 它更偏代码库和包管理，而不是一款能跨完整服务栈证明运行时爆炸半径、权限路径和发版安全的产品。
  sourceRefs:
  - 17
  - 18
  - 19
- name: JupiterOne
  stage: 成长期
  wedge: 网络资产图谱、攻击面管理和 CTEM 驱动的优先级。
  pricing: 按资产量、集成数和刷新频率定制报价。
  strength: 图谱和资产关系模型更成熟，很打安全团队对可见性缺口的痛点。
  weaknessVsUs: 它更接近可见性和暴露面管理，而不是 AppSec 和工程团队真正需要的、最后一步可执行 修复包。
  sourceRefs:
  - 25
  - 31
  - 104
regulatoryTechnicalConstraints:
- point: 自主修复决策必须带可解释控制和治理，因为 AI 风险框架已经明确要求关键工作流里的 AI 使用要可信、可管理。
  sourceRefs:
  - 64
- point: 安全软件开发的要求越来越偏向“可举证的修复实践”和采购时可共享的话语体系。
  sourceRefs:
  - 65
- point: 面向欧洲的软件供应商，在 NIS2 和 Cyber Resilience Act 下，会承受更强的风险管理、secure-by-design 和报告压力。
  sourceRefs:
  - 68
  - 69
- point: 从技术上看，权限和可达性事实分散在 IAM 策略、网络路径、Kubernetes 授权和身份日志里，因此图谱准确度本身就是核心产品风险。
  sourceRefs:
  - 79
  - 80
  - 85
  - 90
validationSignals:
- point: Torq 收购 Jit，明确就是为了把 AI 上下文图谱接进安全运营；这说明上下文已经从 增强元数据，变成一线控制层。
  sourceRefs:
  - 1
  - 2
- point: Jit 称其已在近 100 家企业客户里部署了数千个 AI 安全代理，说明建立在贴地上下文上的自主安全工作流确实有真实需求。
  sourceRefs:
  - 5
- point: 相邻厂商现在都把 exploitability 优先级和 code-to-cloud 上下文当成核心产品价值来卖，而不是可选的报表功能。
  sourceRefs:
  - 15
  - 36
  - 105
- point: Snyk、Endor Labs、JupiterOne 和 Wiz 的公开打包方式表明，企业预算已经存在于相邻的优先级和图谱型安全平台里。
  sourceRefs:
  - 16
  - 18
  - 31
  - 35
openQuestions:
- 到底有多少目标买方愿意买一层独立的修复决策层，而不是坚持要把这项能力包进 Wiz、Snyk、Prisma Cloud 或 JupiterOne？
- 对一项面向互联网的生产服务来说，安全负责人至少要看到多高的图谱置信度，才会放开自主修复？
- 在提升优先级准确度这件事上，哪类上下文最先产生最大抬升：服务 owner、IAM 权限、运行时暴露面，还是数据敏感度？
- 在产品长成更宽的服务 owner 和应用资产系统之前，它能不能先把 ROI 证明出来？
