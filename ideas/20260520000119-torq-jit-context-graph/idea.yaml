topRisks:
  - name: Graph incompleteness
    description: >-
      Missing edges or stale ownership data could create false confidence and cause the product to understate real blast
      radius.
    mitigation: >-
      Start with a tightly supported stack, expose confidence scores on every recommendation, and require approval gates
      until graph coverage reaches a verified threshold.
  - name: Incumbent bundling
    description: >-
      CNAPP, SIEM, or AppSec vendors may add basic context-graph views and reduce willingness to buy a standalone tool.
    mitigation: >-
      Own the remediation decision workflow and autonomous-action policy layer, where cross-tool execution and auditability
      matter more than graph visualization alone.
  - name: Integration fatigue
    description: >-
      Security teams may resist another platform if deployment requires months of connector work before value appears.
    mitigation: >-
      Launch with a 30-day packaged deployment for common GitHub, AWS, Kubernetes, and Okta stacks and prove ROI on one
      internet-facing service portfolio first.
