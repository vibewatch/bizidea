jobsToBeDone:
  - job: >-
      When a new internet-facing finding appears before a release, help the product security engineer determine real blast
      radius and assign the right owner, so they can remediate quickly without flooding engineering with false-priority work.
    currentAlternative: Manual triage across scanner dashboards, cloud consoles, spreadsheets, and Slack
    successMetric: Time from finding creation to owner-assigned remediation ticket
  - job: >-
      When leadership wants autonomous remediation, help the security lead define which fixes are safe to automate, so they
      can deploy agents without creating uncontrolled production risk.
    currentAlternative: Blanket manual approvals or ad hoc internal scripts
    successMetric: Percentage of eligible fixes auto-remediated with no rollback incident
