problem: >-
  Product security teams already receive more findings than they can action from SAST, CSPM, identity, and runtime tools,
  but each alert arrives without the local context needed to judge real blast radius. Analysts and AppSec engineers waste
  hours reconstructing which repo owns the service, which identities can reach it, whether it touches production data, and
  whether an automated fix would break a critical workflow. As autonomous security agents enter production, the missing layer
  is no longer another detector; it is a trusted graph of how code, privileges, and runtime assets actually connect inside
  one company.
targetUser:
  primary: >-
    Staff product security and platform security engineers at Series B-D B2B SaaS companies with 75-300 engineers, GitHub,
    AWS, Kubernetes, Okta, and weekly internet-facing release trains
  secondary: >-
    Engineering managers who own internet-facing services and inherit remediation tickets from overloaded AppSec teams
  buyer: >-
    VP Engineering, Head of Product Security, or CISO at a cloud-native B2B SaaS company trying to automate remediation
    without losing control
startupThesis:
  nonObviousInsight: >-
    The next control point in security is not better alerting; it is the organisation-specific graph that tells an agent
    what a finding can actually reach, who can safely fix it, and which automated action is allowed. Torq buying Jit
    suggests this graph is becoming a system of action, not just enrichment data.
  beachhead: >-
    Internet-facing service remediation for Series B-D B2B SaaS companies where AppSec must decide whether a newly detected
    code or cloud finding can expose customer data and can be auto-fixed before the next weekly release
  wedge: >-
    A change blast-radius graph that turns each new vulnerability or misconfiguration into a fix packet with owner,
    privilege path, production-data reachability, rollback constraints, and a safe remediation recommendation
  whyNowCatalyst: >-
    Torq's acquisition of Jit validates that autonomous security operations now require graph-grounded context spanning code,
    identities, privileges, and runtime behavior.
  ventureScalePath: >-
    Start with AppSec prioritization and safe remediation for internet-facing services, then expand the same graph into SOC
    investigation, identity risk review, compliance evidence, and eventually the policy layer that authorizes what security
    agents may do across the enterprise.
solution: >-
  Build a continuously updated graph from GitHub, CI, IaC, cloud control planes, Kubernetes, identity providers, and ticket
  metadata for each internet-facing service. The entry product converts every new scanner finding into a fix packet that
  shows affected service, owning team, reachable privilege chain, customer-data exposure, deployment dependency, and a safe
  remediation playbook. AppSec can push one prioritized Jira or Slack workflow instead of forwarding five raw tool alerts.
  As trust builds, the platform becomes the guardrail for autonomous remediation by auto-executing low-risk fixes and
  escalating ambiguous cases with a full reasoning trail.
goToMarketSeed:
  firstCustomer: >-
    A Series C cloud-native B2B SaaS company with 100-250 engineers, GitHub Enterprise, Terraform, AWS, EKS, Okta, and a
    three-to-eight-person product security team drowning in weekly findings on internet-facing services
  buyingTrigger: >-
    A board-level push to adopt autonomous security triage or a recent incident, audit, or enterprise customer review that
    exposed how slowly the team can prove blast radius and assign owners
  currentAlternative: >-
    CSPM and SAST dashboards, internal service catalogs, spreadsheets, and Slack-driven manual triage across AppSec and
    engineering
  switchingReason: >-
    The first customer switches because this product reduces triage time from hours to minutes while giving security leaders
    an auditable way to approve or constrain auto-remediation instead of trusting disconnected tools
  pricingHypothesis: >-
    Annual platform subscription priced by number of internet-facing production services and connected identities, with a
    premium tier for autonomous remediation approvals
