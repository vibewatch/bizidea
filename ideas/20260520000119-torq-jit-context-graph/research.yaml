openQuestions:
- How many target buyers will purchase a standalone remediation-decision layer versus demanding the capability inside Wiz, Snyk, Prisma Cloud, or JupiterOne?
- What graph-confidence threshold is required before a security leader allows autonomous remediation on an internet-facing production service?
- 'Which context source drives the biggest initial lift in prioritization accuracy: service ownership, IAM entitlements, runtime exposure, or data sensitivity?'
- Can the product show meaningful ROI before it becomes a broader system of record for service ownership and application inventory?
