competitors:
- name: Jit / Torq
  stage: scale-up
  wedge: AI context graph plus agentic security operations spanning code, cloud, and runtime context.
  pricing: Custom quote / demo-led enterprise sale.
  strength: Strong narrative around organization-specific context and autonomous workflows, validated by Torq’s acquisition thesis.
  weaknessVsUs: The combined company is pulled toward broad SOC and platform scope; a dedicated AppSec remediation-decision product can stay more focused on release-bound owner and rollback context.
  sourceRefs:
  - 1
  - 2
  - 6
  - 5
- name: Snyk
  stage: scale-up
  wedge: Developer-first AppSec with risk-based prioritization and asset inventory.
  pricing: Free, Team, Ignite, and Enterprise plans; public pricing motion starts from a low per-developer entry point and scales to custom quote.
  strength: Strong developer distribution and clear backlog-prioritization story.
  weaknessVsUs: Still scanner-centric relative to a purpose-built blast-radius graph that is optimized around who can safely fix what before release.
  sourceRefs:
  - 15
  - 16
- name: Wiz
  stage: scale-up
  wedge: Code-to-cloud exploitability and ASPM inside a broader CNAPP platform.
  pricing: Modular custom quote tied to workloads, developers, logs, or sensors.
  strength: Deep cloud install base and a strong code-to-cloud context narrative.
  weaknessVsUs: Best when the buyer standardizes on a broad cloud security suite; a narrow AppSec remediation layer can move faster and stay workflow-specific.
  sourceRefs:
  - 35
  - 36
  - 37
- name: Endor Labs
  stage: scale-up
  wedge: AI-native application security with context engineering, repository posture, and remediation/upgrades focus.
  pricing: Free, Core, Pro, and bundled platform motion.
  strength: Clear AI-era AppSec positioning and strong repository/package-depth narrative.
  weaknessVsUs: More codebase- and package-centric than a product designed to prove runtime blast radius, privilege paths, and release safety across the whole service stack.
  sourceRefs:
  - 17
  - 18
  - 19
- name: JupiterOne
  stage: scale-up
  wedge: Cyber-asset graph, attack-surface management, and CTEM-driven prioritization.
  pricing: Custom pricing based on assets, integrations, and refresh frequency.
  strength: Mature graph and asset-relationship model that resonates with security teams battling visibility gaps.
  weaknessVsUs: Closer to visibility and exposure management than to the final fix packet that AppSec and engineering need for fast, safe remediation.
  sourceRefs:
  - 25
  - 31
  - 104
