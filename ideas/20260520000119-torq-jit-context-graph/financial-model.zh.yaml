modelDiagram:
  title: 单位经济模型流转
  mermaid: "flowchart LR\n  Leads[Founder-led outbound] --> Pilots[Paid pilots]\n  Pilots --> Customers[Production customers]\n  Customers --> Revenue[Subscription revenue]\n  Revenue --> GrossProfit[75 percent gross profit]\n  GrossProfit --> Cash[Runway and financing need]\n"
modelSanity:
- checkName: 收入引擎
  finding: 基准情景的收入，来自 Q4Y2 做到 12 个正式客户、Q4Y3 做到 18 个，同时把单账户混合 ARR 扩到 180K。
- checkName: 必须跑通
  finding: 模型要成立，关键是试点转正式的转化率不能掉出计划区间，而且标准的 GitHub + AWS + Kubernetes + Okta 部署必须压在 30 天内。
- checkName: 模型失效条件
  finding: 如果销售周期拉长，或 ARPU 扩张偏弱，现金压力会最快冒头；因为哪怕没有严重招聘失误，Y3 现金也已经转负。
- checkName: 下一轮融资证明点
  finding: 公司拿下一轮融资的依据，应该是做到约 8–12 个正式客户、部署时间压到 21 天以下，并在标准栈上跑通一条获批的低风险自动化策略。
sanityChecks:
  ruleOf40: Y3 增长率 122.2% + EBITDA 利润率 -33.0% = 89.2%
  burnMultiple: Y3 burn multiple 0.6x = $0.891M 消耗 / $1.485M 净新增收入
  revenuePerFte: Y3 每名 FTE 收入 $208K，对应年末 13 名 FTE（经验基准 $180K–$300K 的安全 SaaS）
  flags:
  - 即便是基准情景，Y3 结束前仍然需要一轮后续融资，因为模型里的现金会降到 -$732.7K。
  - 收入集中度依然很高：模型假设 Y3 只有 18 个客户，却要靠六位数合同支撑一个竞争拥挤的安全品类。
  - 尽管图谱型工作负载很重，毛利率仍按商业计划的 75% 目标来算，因此只要云成本或支持成本超预期，现金跑道就会很快受压。
