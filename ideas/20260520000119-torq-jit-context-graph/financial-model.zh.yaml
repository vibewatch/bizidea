scenarios:
  downside:
    description: 试点转化更慢，主要 logo 客户的增加大约向后推了两个季度，同时扩张 ARPU 也被压住。
    y3RevenueK: 1800.0
    y3EbitdaK: -1270.0
    cashLowPointK: -1500.0
    keyAssumptionChanges:
    - 混合 ARPU 更接近 160K，而不是 180K。
    - 到 Q4Y3 正式客户大约只有 13 个，而不是 18 个。
    - 月度流失率升到约 2.5%，而招聘收缩又不够快。
  base:
    description: 创始人主导销售把早期试点转成正式客户：Q4Y2 做到 12 个、Q4Y3 做到 18 个，毛利率维持在 75%。
    y3RevenueK: 2700.0
    y3EbitdaK: -891.0
    cashLowPointK: -732.7
    keyAssumptionChanges:
    - 初始 ACV 从约 140K 起步，到 Y3 扩到 180K 的混合 ARPU。
    - 在产品打包和工作流嵌入被证明可复制前，团队维持精简招聘。
    - 毛利率维持在商业计划里的 75% 目标。
  upside:
    description: 产品打包和工作流嵌入转化更快，在不明显加快招聘的前提下，把客户数和扩张 ARR 都抬上去。
    y3RevenueK: 3450.0
    y3EbitdaK: -320.0
    cashLowPointK: -220.0
    keyAssumptionChanges:
    - 靠第二服务组合和策略模块 upsell，混合 ARPU 提升到约 195K。
    - 到 Q4Y3 客户数做到约 22 个，而核心团队形态不变。
    - 随着工作流嵌进 Jira 和 Slack，月度流失率改善到约 1.2%。
