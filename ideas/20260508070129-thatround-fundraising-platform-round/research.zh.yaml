  - 19
  tailwinds:
  - point: AI 原生创业公司在 Q1 拿走了欧洲 51% 的股权投资，这会推高小基金需要筛选的 AI 重度创始人申请量。
    sourceRefs:
    - 22
  - point: 即便募资环境艰难，新基金仍在持续成立，这会创造一批内部系统尚未深度固化的新买方。
    sourceRefs:
    - 23
  - point: 多家现有厂商已经在发布 AI 接入和工作流功能，这会让“投资运营里引入 AI 辅助”变得更正常。
    sourceRefs:
    - 8
    - 9
    - 32
    - 17
  headwinds:
  - point: 尽管交易额回升，英国交易数量依旧偏弱，因此小基金仍会非常谨慎地审视软件预算。
    sourceRefs:
    - 19
    - 20
  - point: 垂直现有厂商已经覆盖了相邻工作流，因此买方很容易追问：AI intake 到底该不该只是附加模块，而不是单独采购。
    sourceRefs:
    - 3
    - 6
    - 9
    - 11
  - point: 对创始人数据做自动评分，会引入画像、治理和可解释性义务，从而拖慢采用。
    sourceRefs:
    - 25
    - 26
    - 27
competitors:
- name: Affinity
  stage: incumbent
  wedge: 面向 VC 的 CRM 与 deal flow 管理软件，叠加关系情报能力。
  pricing: 定制定价，按方案 / 机构规模计费。
  strength: 关系图谱深、CRM 成熟、分析能力强，并覆盖更广的私募市场工作流。
  weaknessVsUs: 起点是 CRM 和 sourcing，对杂乱 inbound 的分流与合伙人可读备忘录生成没有那么聚焦。
  sourceRefs:
  - 3
  - 4
- name: 4Degrees
  stage: scale-up
  wedge: 面向风投和私募市场团队的关系情报 CRM。
  pricing: 定制定价。
  strength: 定位 VC 场景，强调基于网络的 sourcing，并用“替代表格、节省时间”的价值主张抓人。
  weaknessVsUs: 它更像关系管理 / pipeline 系统，而不是专门处理创始人 inbound 的 intake + memo 层。
  sourceRefs:
  - 5
  - 6
  - 7
- name: Visible
  stage: scale-up
  wedge: 以投资人运营和投后汇报为核心，并新增 AI 邮箱与文档接入能力。
  pricing: 定制定价。
  strength: 在 VC 基金中已有大装机量，且围绕解析创始人更新和投资文档推出了可信的 AI 产品。
  weaknessVsUs: 它的品牌心智和工作流重心仍在投后监控与投资人更新，而不是投前初筛。
  sourceRefs:
  - 8
  - 9
  - 10
- name: Harmonic
  stage: scale-up
  wedge: 面向投资人的 AI 创业公司数据库，以及 sourcing / 研究工作流。
  pricing: 定制定价。
  strength: 外部数据覆盖极广，特别适合在项目还没进基金 inbound 队列前做发现。
  weaknessVsUs: 它优化的是外部发现和市场情报，而不是邮箱 / 表单 / deck 接收与内部备忘录起草。
  sourceRefs:
  - 11
  - 12
- name: Submittable
  stage: incumbent
  wedge: 结构化申请 intake 与自动化审核工作流。
  pricing: 定制定价。
  strength: 表单、审核阶段、评分规则都很强，也能拿出高量申请流程节省管理时间的证据。
  weaknessVsUs: 通用审核工具并不天然理解基金投资主张，也不会原生把混合投资人 inbound 转成投资备忘录。
  sourceRefs:
  - 13
  - 14
regulatoryTechnicalConstraints:
- point: 对创始人做自动评分，可能触发画像和决策治理义务；买方会要求人工复核与可申诉性。
  sourceRefs:
  - 25
  - 26
- point: 邮箱访问要求明确的 OAuth 权限范围，并在 Gmail 与 Microsoft 365 环境里谨慎设计权限。
  sourceRefs:
  - 28
  - 29
- point: 可信 AI 控制不只是输出质量问题，还需要文档化、监控和风险管理。
  sourceRefs:
  - 27
- point: 在基金允许机密创始人材料进入 AI 工作流之前，模型和供应商的留存条款必须先写清楚。
  sourceRefs:
  - 30
- point: 安全姿态是入场券，因为系统会处理机密 deck、客户数据和合伙人笔记。
  sourceRefs:
  - 31
validationSignals:
- point: ThatRound 称其已服务 500 多位创始人、处理超过 1,500 份融资申请，说明这个品类已经有足够大的工作流体量。
  sourceRefs:
  - 1
- point: Visible 称其已被超过 950 家风投基金信任，并开始向投资人销售 AI Inbox 和 AI Docs。
  sourceRefs:
  - 8
  - 9
- point: 4Degrees 称其平台已被数百个私募市场团队使用，平均每周可节省 100 小时。
  sourceRefs:
  - 5
- point: Submittable 称，自动化审核可让客户平均每周节省 3.4 小时行政时间。
  sourceRefs:
  - 13
- point: Sifted 在 2026 年仍持续跟踪欧洲首支基金，这说明即使募资环境更难，新的买方仍在形成。
  sourceRefs:
  - 23
- point: Sifted 报道称 AI 原生创业公司在 Q1 拿走了欧洲 51% 的股权投资，这会抬高投资人处理 AI 重度项目的紧迫性。
  sourceRefs:
  - 22
openQuestions:
- 英国微型 VC 会为独立产品支付高于 Airtable / Notion / Typeform 现有栈成本的 ACV，还是坚持这项能力必须长在现有 CRM 里？
- 落到实操里，最尖锐的问题究竟是什么：邮箱解析、基金投资主张评分、备忘录起草，还是审阅者协作？
- 一个 1–5 位合伙人的基金，通常手里到底有多少历史决策数据，足以把评分质量明显拉高？
- 面对精干基金，产品能否足够快通过邮箱、留存和保密性审核，而不被拖进漫长的安全采购周期？
