slug: microvc-deal-intake
date: '2026-05-08'
executiveSummary: ThatRound 的进展和相邻厂商的采用情况都说明，投资人侧项目接收正在变成一个真实的软件品类；但第一门能成立的生意很窄：英国和爱尔兰那些 inbound 体量大到足以压垮 Gmail、Airtable 和 Notion 流程的微型 VC 与加速器。产品切口是一层 AI 接收层，在数据进入 Affinity、4Degrees 或 Airtable 之前，先吃进 deck、表单和邮件，按基金投资主张给提交项目打分，并生成可解释的初筛备忘录。这个滩头市场有吸引力，因为买方会在基金新募、加速器合作或 PR 带来流量峰值时明显感到疼，而且他们无需重做整套 CRM，就能先接入一层 intake。公司应先卖一个付费试点，把节省的合伙人小时数和更快的淘汰或复核决策做成可量化结果，再转成年费订阅，按 inbound 量和合伙人席位收费。真正的护城河不是通用 LLM 输出，而是基金专属决策数据、投资主张打分规则，以及对收件箱、表单和历史决策的工作流嵌入。公司早期不该试图替掉完整 VC CRM，因为真正卡住采购的，是买方信任、安全审查和预算怀疑，而不是功能不够多。最关键的反证风险是，小基金是否愿意为独立的 intake 软件支付 ACV，而不是要求这项能力内嵌进现有 CRM，或继续留在手工工具栈上。现有输入里没有直接的客户访谈记录，也没有可对标的销售周期数据，因此定价、转化节奏和扩张速度都仍是运营假设，必须通过付费试点验证。
problem:
- 小型 pre-seed 基金收到的创始人申请，已经多到精干合伙人团队无法稳定、持续地审完，因此优质项目会被漏掉，合伙人时间也会耗在低信号初筛上。
- 现在的流程把邮箱、表单、deck、表格和笔记拆散在 Gmail、Outlook、Typeform、Airtable 和 Notion 里，既拖慢决策，也削弱可审计性。
solution:
- 接入 inbound 邮件和表单来源，把 deck 与申请解析成结构化公司画像，并按可配置的基金投资主张为每份提交打分。
- 生成带引文的初筛备忘录，同时把项目送入淘汰、分析师复核或合伙人讨论队列，并保留人工审批和审计日志。
whyWeWin:
- 这个切口打的是一条现有厂商只覆盖了一半的紧急工作流，因为 CRM 更擅长关系管理和项目 sourcing，而不是处理杂乱 inbound 的初筛。
- 产品可以把结果同步进现有的 Airtable、Affinity、4Degrees 或类似系统落地，不必逼客户整体替换 CRM。
- 如果产品成为默认 intake 层，公司就能不断沉淀一套横向工具天然拿不到的专有数据：投资主张标准、原始材料、审阅者评论和决策结果。
strategicChoices:
  beachhead: 英国和爱尔兰的 pre-seed 微型 VC：2–5 位合伙人、每季度至少 150 份 inbound 申请；外加同样高量级审核创始人申请的加速器。
  wedgeRationale: 这个切入点有明确的经济买方、inbound 暴增时非常具体的触发点，以及一条可以在几天内证明 ROI 的狭窄工作流，而不是一上来就要求基金替换完整系统记录层。
  sequencingRationale: 先把接入、可解释评分和备忘录起草做好，因为这几件事最能立刻省时间；先靠付费试点成交，再补更广的工作流模块；在销售放量前先补实施和安全能力，因为信任与权限才是真正的采用瓶颈。
  notYet:
  - 完整 VC CRM 与关系图谱替代方案
  - 创始人侧募资市场或投资人发现产品
  - 投后汇报、LP 更新工作流和更广泛的基金管理
  - 不经人工复核就自动淘汰项目
market:
  tam: $64.8M
  sam: $5.4M
  som: $0.9M
  segments:
  - 英国和爱尔兰、inbound 持续较高的微型 VC 与天使联合投资体
  - 加速器和以申请驱动的创业项目计划
  buyingProcess: 当 inbound 峰值暴露出流程痛点后，平台负责人、运营负责人、分析师或项目经理最可能先站出来推动；但真正拍板花钱的仍是 GP 或平台负责人。最可信的成交路径，是一个接进现有邮箱和表单的 30–60 天付费试点；等基金能验证节省了多少工时、合伙人响应更快，再转成年合同。
product:
  mvp: MVP 先接 Gmail 或 Outlook，再接入一个主表单来源，把 deck 和申请数据解析进基金专属模板，产出带来源引文的可解释初筛备忘录，并把结果导出到客户现有的审核工具栈。产品一开始就明确保留人工在环，优化的是审核速度，而不是自动做投资决定。
  sixMonth: 上线 Gmail 和 Microsoft 365 连接器、Typeform 与 CSV intake、投资主张模板、带引文的备忘录草稿、审核队列，以及 Airtable 或 Affinity 同步和审计日志。
  twelveMonth: 增加历史决策回测、基金专属模型调优、加速器审核模板、基于角色的权限、留存控制，以及跟踪周转时效和合伙人一致性的基准仪表盘。
  twentyFourMonth: 等 intake 层证明可持续采用后，再扩展到尽调请求编排、投后更新接收、共同投资人匹配和多地区支持。
  keyBets:
  - 可解释的备忘录起草和投资主张评分，会比黑箱优先级分数更容易赢得信任。
  - 基金会更快购买位于 CRM 上游的 intake 层，而不是再买一套新 CRM。
  - 加速器工作流可以在不重做核心产品架构的前提下，扩大 SAM。
gtm:
  wedge: 卖一名面向高量级创始人投递的 intake copilot，在不改变创始人申请方式的前提下，把从收到申请到生成可给合伙人看的备忘录的时间压下来。
  channels:
  - 创始人主导外呼，触达英国和爱尔兰的微型 VC、天使联合投资体和加速器
  - VC 运营与平台社群
  - 与 Typeform、Gust、Submittable 以及 CRM 同步目标建立集成和转介合作
  funnelTargets: 外呼账户→有效发现 20%+，发现→付费试点 25%+，付费试点→年度合同 50%+，首年 logo 留存 85%+。
  pricing: 按 inbound 申请量和合伙人席位收取年度订阅费；先通过一个金额为低几千美元的 30–60 天付费试点切入，再转成约 $24k–$36k 的 ACV，服务那些持续高量级 intake 的基金。这样 ROI 仍然锚定在节省的合伙人工时，以及当前多工具栈的支出上。
businessModel:
  revenueStreams:
  - 按基金或项目收取年度软件订阅费
  - 付费试点与 onboarding 实施费
  - 按量超额收费，以及高级 CRM / 工作流集成收费
  unitOfValue: 每家机构每季度处理的 inbound 申请数
  targetGrossMarginPct: 75
  expansionLevers:
  - 在每家基金内部增加更多合伙人和分析师席位
  - 新增加速器和天使网络客户
  - 推出尽调、投后更新和共同投资人工作流模块
  - 验证滩头市场后向英国和爱尔兰以外扩张
strategyMap:
  northStarMetric: 48 小时内转成可给合伙人看的备忘录的 inbound 公司数量
  inputMetrics:
  - 每个客户接入的邮箱或表单来源数
  - 能自动标准化并带来源引文的提交占比
  - 每处理 100 份申请所节省的合伙人或分析师工时中位数
  - 试点转年度合同的转化率
  - 备忘录相对历史合伙人决策的接受率
  moatsToBuild:
  - 与投资主张标准和结果绑定的基金专属决策语料
  - 嵌入式 intake 集成，逐渐变成 inbound 提交的默认路径
  - 能通过安全审查的可解释性、审计与留存控制
  killCriteria:
  - 前 10 家目标基金里，少于 2 家在看完工作流演示后愿意进入付费试点
  - 按基金专属数据调优后，历史回测里对备忘录可用性的审阅一致率仍达不到 70%
  - 对不足 10 人的客户，安全与权限审核的中位通过时间超过 60 天
  mermaid: "flowchart LR\n  Wedge[高量级基金 intake 切口] --> MVP[接入加带引文备忘录的 MVP]\n  MVP --> Proof[付费试点证明能省工时并加快决策]\n  Proof --> Expansion[先做加速器、更多基金，再扩到相邻投资人工作流]\n"
investorMemo:
  verdict:
    call: Watch
    conviction: 痛点很强、切口也清晰，但付费意愿和独立产品定位还没有被证明。
    whyBelieve: 研究已经显示，这里有真实工作流体量、清晰的手工替代方案，以及已经流向 VC 原生软件的相邻预算。
    whyDoubt: 滩头市场本身不大，买方也可能更愿意把它当作现有 CRM 或运营工具里的一个附加模块，而不是新的独立预算项。
    nextDiligence: 确认 2 个付费试点已经拿下，且周转效率有可量化改善，并证明至少有 1 家基金无需启动 CRM 替换项目也会转化。
  firstCustomer:
    title: 英国 B2B SaaS 微型 VC 的运营主导型 inbound 团队
    profile: 一家 2–4 位合伙人的 pre-seed 基金，配 1 位运营或平台负责人，当前使用 Gmail 加 Airtable 或 Notion，每季度至少收到 150 份创始人申请。
    trigger: 新基金启动、加速器合作或曝光带来的流量峰值，使 inbound 量超过合伙人能稳定筛完的范围。
    buyer: GP 或平台负责人
    initialContract: 先围绕一条基金工作流做一个 30–60 天付费试点；如果备忘录周转时间和节省的合伙人工时达到约定阈值，再转成 $24k–$36k 的年度订阅。
  mustBeTrue:
  - 每季度申请量超过 150 份的基金，会在 CRM 迁移之前就为独立 intake 层支付低五位数年 ACV。
  - 带来源引文的可解释备忘录，相比泛化 AI 评分，能明显提高合伙人的信任度。
  - 先集成、后替换的部署方式，能把首个价值实现时间压得足够短，从而打赢手工工具栈的惯性。
  - 至少有一个加速器或 syndicate 细分，能在少量定制下用同一核心产品完成转化。
  - 现有厂商来不及迅速补齐这个切口，以至于公司还能在拿下共创客户前保住定价权。
  diligenceQuestions:
  - 今天到底有多少英国和爱尔兰基金，每季度会处理超过 150 份 inbound 申请？
  - 在试点评估里，真正驱动购买意愿的到底是哪种工件：解析、评分、备忘录起草，还是审阅者协作流程？
  - 对于 10 人以下的基金，邮箱访问和保留机密 deck 的真实安全审查负担到底有多重？
  - 买方能否接受同步进 CRM 的模式，还是坚持要把产品原生做进 Affinity、4Degrees 或 Visible？
  - 基金专属评分要明显优于模板基线，究竟需要多少历史决策数据？
  riskHeatmap:
  - risk: 独立产品的付费意愿弱于模型假设
    likelihood: High
    impact: High
    leadingIndicator: 发现电话里大家都认可流程价值，但按建议价格带进入付费试点的比例低于 25%。
    mitigation: 先从申请量最高的基金切入，把 ROI 明确锚定在节省工时上；如果微型 VC 转化偏弱，再把加速器作为第二细分。
  - risk: 合伙人不信任 AI 生成的优先级判断
    likelihood: Medium
    impact: High
    leadingIndicator: 超过一半试点案例里，审阅者直接弃用生成备忘录，或推翻系统分流结果。
    mitigation: 始终保留人工审批，展示投资主张标准和引文，并先把重点放在备忘录是否好用，而不是自动排序。
  - risk: 安全与邮箱权限审核拖慢销售周期
    likelihood: Medium
    impact: High
    leadingIndicator: 由于 OAuth 权限范围、留存策略或保密性异议，试点启动时间被推迟超过 30 天。
    mitigation: 从第一天就按最小权限原则设计集成、留存控制和审计日志；若邮箱权限被卡住，先提供只接表单的试点。
  - risk: 相邻现有厂商把类似功能打包进来
    likelihood: High
    impact: Medium
    leadingIndicator: 潜在客户反复问：为什么这不该只是 Affinity、Visible 或 4Degrees 的一个功能，而要单独买工具？
    mitigation: 靠更快落地、更深的狭窄 intake 工作流能力，以及基于同步的共存方式取胜，而不是一上来就替换整个平台。
operatingAssumptions:
- assumption: 只要产品能证明节省了可量化的合伙人工时，持续高量级 inbound 的基金就会接受约 $24k–$36k 的 ACV。
  basis: research.yaml
  validationTest: 做 10 次买方访谈，并按拟议价格拿下 2 个付费试点，提前把 ROI 标准谈清楚。
  decisionImpact: 如果不成立，就把定价往下调、提前转向加速器，或把方案打包成服务占比更高的 onboarding 交付。
- assumption: 带引文的可解释备忘录起草，会比独立数字评分更快获得信任。
  basis: research.yaml
  validationTest: 在 2 个共创客户处回测 100 个历史项目，并测量真实审核中的备忘录接受率和改写率。
  decisionImpact: 如果不成立，就把产品重定位成文档与工作流工具，而不是投资主张评分产品。
- assumption: 能同步进现有系统的 intake 层，会比 CRM 替换式销售更快成交。
  basis: research.yaml
  validationTest: 比较同步优先部署与要求更深系统替换的客户，在试点周期和 setup 成本上的差异。
  decisionImpact: 如果不成立，路线图就必须优先做更紧密的原生集成，或改选现有厂商锁定更弱的客户细分。
- assumption: 英国和爱尔兰这个滩头市场，足以在第 3 年撑出 30 家付费机构。
  basis: operator judgment
  validationTest: 列出命名账户清单，跟踪外呼和试点转化，并在第一个季度内确认至少 15 个可信的共创客户目标。
  decisionImpact: 如果不成立，就要比计划更早扩地理范围，或更早转向加速器和相邻投资人工作流。
- assumption: 只要产品保留人工在环、并按最小权限原则设计，邮箱和留存权限就能让精干团队在足够快的时间里过审。
  basis: research.yaml
  validationTest: 在前 3 个试点里跑安全问卷，测量从安全审查开始到数据访问获批的时间。
  decisionImpact: 如果不成立，就先打表单 intake、延后邮箱接入，并更早为合规工程预留预算。
experimentRoadmap:
- horizon: 0–90 天
  experiment: 用现有 intake 工具栈拆解的方式，访谈 10 家英国和爱尔兰的微型 VC 与加速器。
  hypothesis: 最尖锐的购买痛点是初筛速度和一致性，而不是对泛 CRM 的不满。
  successMetric: 10 位买方里至少有 7 位把 intake 分流和备忘录起草排进前 2 大工作流痛点。
  owner: 创始人 / CEO
- horizon: 0–90 天
  experiment: 用共创客户提供的样本 deck 和历史决策，做两次历史项目回测。
  hypothesis: 带引文的备忘录和投资主张模板，足以匹配审阅者预期，并支撑试点成立。
  successMetric: 被审阅的备忘录里，至少 70% 被评价为可直接用于合伙人讨论，且重大事实修正低于 30%。
  owner: 创始工程师
- horizon: 0–90 天
  experiment: 上线一个付费试点方案：接一个 Gmail 或 Outlook 连接器，再接一个表单来源连接器。
  hypothesis: 集成优先的部署方式，足以在不替换 CRM 的前提下拿到预算批准。
  successMetric: 拿下 2 个付费试点，并在 kickoff 后 14 天内跑出首个价值。
  owner: 创始人 / CEO
- horizon: 3–6 个月
  experiment: 为试点客户测试备忘录导出，并同步进 Airtable、Affinity 或 4Degrees。
  hypothesis: 基于同步的共存模式，能减少因与现有工作流重叠带来的异议。
  successMetric: 过半试点用户在同步上线后依旧保留原 CRM，并继续扩大使用。
  owner: 创始工程师
- horizon: 3–6 个月
  experiment: 跑一套安全审查包，包括 OAuth 权限范围文档、留存策略和审计日志演示。
  hypothesis: 基础的信任与合规工件，足以把精干基金的采购周期压到 30 天以内。
  successMetric: 前 3 个重视安全的账户里，安全审查时间中位数低于 30 天。
  owner: 产品与安全负责人
- horizon: 6–12 个月
  experiment: 用同一套核心接入和审核引擎，试点一个加速器模板。
  hypothesis: 由于申请更结构化，加速器会比基金更快转化，从而在不重做产品的前提下打开第二细分。
  successMetric: 拿下 1 个加速器试点，且相比基金工作流的功能偏离不超过 20%。
  owner: 创始人 / CEO
operations:
- 先做高触达 onboarding，把基金投资主张、审核标准和历史决策样例编码进去，再打开自动化。
- 提供基于 OAuth 的 Gmail 与 Microsoft 365 连接器，以及 Typeform 或 CSV intake，并同步进现有 CRM 或表格目标。
- 保留审计日志、prompt 与模型版本追踪、留存控制，以及每条建议都需要审阅者签字确认。
- 用试点评审节奏，对比试点前基线，衡量周转时间、备忘录可用性和节省的合伙人工时。
- 与加速器、syndicate 和基金运营负责人建立共创客户反馈回路，决定相邻工作流模块的优先级。
team:
- role: 创始人 / CEO
  startTiming: 第 0 个月
  rationale: 前期要亲自抓买方发现、付费试点销售、工作流设计和早期实施，因为最先卡住的不是漏斗顶部，而是真实客户需求。
- role: 创始工程师
  startTiming: 第 0 个月
  rationale: 尽快把安全接入、解析、备忘录生成和同步基础设施搭起来，支撑共创客户试点。
- role: 产品与安全负责人
  startTiming: 第 3 个月
  rationale: 信任、权限和可审计性都是采用阻力，因此产品决策很早就需要明确的安全 owner。
- role: 应用 AI 工程师
  startTiming: 第 6 个月
  rationale: 等线上试点数据出现后，再继续拉高抽取质量、评估能力和基金专属调优。
- role: 实施与客户成功负责人
  startTiming: 第 6 个月
  rationale: 付费试点和年度转化，取决于 onboarding 够不够快、ROI 追踪够不够硬，以及工作流是否真正嵌入。
milestones:
- horizon: 0–12 个月
  items:
  - 上线 intake MVP，覆盖 Gmail、Outlook、表单接入、带引文的备忘录草稿和 CRM 导出
  - 拿下 4–6 个共创客户，并至少把其中 3 个转成年度合同
  - 在生产账户里证明：从提交到首份备忘录的中位时间低于 48 小时
  - 完成审计日志、留存控制和人工审核流程的安全基线
- horizon: 12–24 个月
  items:
  - 在基金和加速器中做到 10–15 家付费机构
  - 上线基金专属回测、模型调优和基准仪表盘
  - 增加加速器工作流模板，以及一个相邻模块，例如尽调编排或投后更新接收
- horizon: 24–36 个月
  items:
  - 做到 30 家付费机构，并验证第 3 年的 SOM 假设
  - 扩到英国和爱尔兰之外，或证明第二细分能提供同等密度的 pipeline
  - 决定继续做 intake 层专家，还是扩成更大的投资人运营平台
risks:
- risk: 小基金继续沿用手工工具栈，或要求这项能力必须内嵌到现有平台里
  likelihood: High
  impact: High
  mitigation: 先只打高量级账户，把 ROI 算得足够硬，并优先打通与现有厂商系统的同步路径，而不是强推替换。
- risk: AI 输出还不足以支撑真实筛选工作流的信任要求
  likelihood: Medium
  impact: High
  mitigation: 让输出可解释、强制人工审批，并把优化目标放在备忘录是否好用，而不是自动排名。
- risk: 安全、留存和邮箱访问顾虑拉长部署周期
  likelihood: Medium
  impact: High
  mitigation: 尽早交付最小权限范围、审计日志和清晰的留存条款，并先提供低权限试点。
- risk: 在公司建立护城河之前，现有厂商就补上类似的 AI intake 功能
  likelihood: High
  impact: Medium
  mitigation: 专注最狭窄、最紧急的工作流，和共创客户快速迭代，同时沉淀差异化决策数据与可解释性控制。
fundingAsk:
  stage: pre-seed
  targetFundingRangeUsd: $2–3M
  runwayMonths: 18
  useOfFundsSummary: 这笔资金将覆盖 18 个月：做出安全的 intake MVP、完成 4–6 个共创客户试点、做到 10 家以上付费客户或明确证伪独立需求，并打下支撑相邻工作流扩张的信任与数据基础。
