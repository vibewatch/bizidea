  - case: 'UK-only case: expansion beyond UK/Ireland is slower than expected.'
    impact: The market still supports a focused software business, but the wedge needs to expand into accelerators, angel networks, diligence, or portfolio workflows to become large enough.
    sourceRefs:
    - 19
    - 24
    - 23
  - case: 'Fast-incumbent-response case: existing VC tools add AI intake and memo features quickly.'
    impact: Differentiation shifts from raw AI generation to workflow depth, explainability, and speed of integration into the smallest funds' existing stack.
    sourceRefs:
    - 8
    - 9
    - 32
    - 17
  validationPlan:
  - priority: high
    question: Will a 2-5 partner UK fund pay for this as a standalone wedge before replatforming its CRM?
    evidenceToGather: Ten buyer interviews plus two paid pilots with explicit ROI on hours saved and decision turnaround.
  - priority: high
    question: 'Which artifact matters most to buyers: inbox parsing, thesis scoring, or memo drafting?'
    evidenceToGather: Workflow shadowing with ops leads and time-on-task measurement across current screening steps.
  - priority: medium
    question: How much cold-start personalization is required before scores feel trustworthy?
    evidenceToGather: Backtest historical fund decisions and compare template-only scoring versus fund-specific tuning.
  - priority: medium
    question: Can mailbox and document permissions clear security review fast enough for small-fund procurement?
    evidenceToGather: Security questionnaire pilots covering OAuth scopes, retention, audit logging, and human-in-the-loop controls.
  - priority: low
    question: Do accelerators or angel syndicates convert faster than micro-VCs because their applications are more structured?
    evidenceToGather: Parallel discovery with three accelerator managers and two syndicate operators using the same intake demo.
