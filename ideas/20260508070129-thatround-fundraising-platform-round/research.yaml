competitors:
- name: Affinity
  stage: incumbent
  wedge: VC-native CRM and deal flow management with relationship intelligence and data enrichment.
  pricing: Custom pricing by plan / firm size.
  strength: Deep relationship graph, CRM maturity, analytics, and broad private-market workflow coverage.
  weaknessVsUs: Starts from CRM and sourcing; less opinionated around messy inbound triage and partner-ready memo generation for the smallest funds.
  sourceRefs:
  - 3
  - 4
- name: 4Degrees
  stage: scale-up
  wedge: Relationship-intelligence CRM for venture and private-market teams.
  pricing: Custom pricing.
  strength: VC-specific positioning, network-driven sourcing, and strong time-savings message for replacing spreadsheets.
  weaknessVsUs: More of a relationship / pipeline system than a dedicated intake-and-memo layer for inbound founder submissions.
  sourceRefs:
  - 5
  - 6
  - 7
- name: Visible
  stage: scale-up
  wedge: Investor operations and portfolio reporting with newer AI inbox and document ingestion features.
  pricing: Custom pricing.
  strength: Large installed base among VC funds and credible AI products for parsing founder updates and investment documents.
  weaknessVsUs: Core brand and workflow gravity remain portfolio monitoring and investor updates, not first-pass investment screening.
  sourceRefs:
  - 8
  - 9
  - 10
- name: Harmonic
  stage: scale-up
  wedge: AI-powered startup database and sourcing / research workflow for investors.
  pricing: Custom pricing.
  strength: Massive external data coverage and strong fit for discovery before companies are in the firm's inbound queue.
  weaknessVsUs: Optimizes external discovery and market intelligence more than email / form / deck intake and internal memo drafting.
  sourceRefs:
  - 11
  - 12
- name: Submittable
  stage: incumbent
  wedge: Structured application intake and automated review workflow.
  pricing: Custom pricing.
  strength: Strong forms, review stages, rubric scoring, and demonstrable admin-time savings for high-volume application processes.
  weaknessVsUs: Generic review tooling is not inherently fund-thesis-aware and does not natively convert mixed investor inbound into investment memos.
  sourceRefs:
  - 13
  - 14
