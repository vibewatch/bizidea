openQuestions:
- Will UK micro-VCs pay standalone ACV above the cost of their current Airtable / Notion / Typeform stack, or insist this capability lives inside an existing CRM?
- 'Which problem is sharpest in practice: inbox parsing, fund-thesis scoring, memo drafting, or reviewer coordination?'
- How much historical decision data does a 1-5 partner fund typically have available to personalize scoring before quality clearly improves?
- Can the product clear mailbox, retention, and confidentiality reviews quickly enough for lean funds without a long security procurement cycle?
