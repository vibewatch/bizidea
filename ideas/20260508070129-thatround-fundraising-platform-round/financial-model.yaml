    source: '[Startup-finance heuristic, UK early-stage salary benchmark] Modest founder cash salary plus payroll burden.'
  - id: A9
    name: Engineering loaded salary
    value: '127000'
    unit: USD per year per FTE
    source: '[Startup-finance heuristic, UK early-stage salary benchmark] Used for founding eng and applied AI eng.'
  - id: A10
    name: Product/Security loaded salary
    value: '138000'
    unit: USD per year per FTE
    source: '[Startup-finance heuristic, UK early-stage salary benchmark] Reflects security-heavy product scope.'
  - id: A11
    name: Customer success / implementation loaded salary
    value: '92000'
    unit: USD per year per FTE
    source: '[Startup-finance heuristic, UK early-stage salary benchmark] Supports white-glove onboarding and ROI tracking.'
  - id: A12
    name: Sales / GTM loaded salary
    value: '115000'
    unit: USD per year per FTE
    source: '[Startup-finance heuristic, UK early-stage salary benchmark] Assumes one founder-assisted seller and later a second GTM hire.'
  - id: A13
    name: G&A / ops loaded salary
    value: '80000'
    unit: USD per year per FTE
    source: '[Startup-finance heuristic, UK early-stage salary benchmark] Covers finance, vendor, and security-process support.'
  - id: A14
    name: Hiring timing
    value: 'CEO and founding eng at start; product/security in Q2Y1; AI eng and implementation in Q3Y1; first GTM in Q2Y2; ops in Q1Y3; second GTM in Q3Y3'
    unit: schedule
    source: '[BP team + startup-finance heuristic] Plan-specific early hires, with later hires added only as customer count grows.'
  - id: A15
    name: Non-payroll sales and marketing spend
    value: '$2k/month in Q1Y1 scaling to $8k/month by Q4Y3'
    unit: USD per month
    source: '[BP gtm + startup-finance heuristic] Founder-led outbound, events, travel, and sales tooling ramp gradually rather than front-loading paid demand gen.'
  - id: A16
    name: Non-payroll R&D and security tooling spend
    value: '$1.5k/month in Q1Y1 scaling to ~$3.5k/month by Q4Y3'
    unit: USD per month
    source: '[BP operations + startup-finance heuristic] Covers cloud, evaluation, connector, audit-log, and security tooling.'
  - id: A17
    name: Non-payroll G&A spend
    value: '$1.5k/month in Q1Y1 scaling to ~$3.7k/month by Q4Y3'
    unit: USD per month
    source: '[BP operations + startup-finance heuristic] Covers legal, accounting, insurance, and compliance review overhead.'
  - id: A18
    name: Blended CAC
    value: '18000'
    unit: USD per customer
    source: '[BP gtm funnelTargets + startup-finance heuristic] Founder-led outbound plus paid-pilot conversion produces a lean but still trust-heavy acquisition cost.'
  - id: A19
    name: Sales cycle
    value: '3-4 months'
    unit: duration
    source: '[BP buyingProcess + BP pricing] Includes discovery, a 30-60 day paid pilot, and conversion to annual contract.'
  - id: A20
    name: Starting cash
    value: '1600000'
    unit: USD
    source: '[Startup-finance heuristic] Model assumes the round closes at model start so cash can roll forward directly from EBITDA.'
  - id: A21
    name: Cash movement simplification
    value: 'Cash movement approximates EBITDA'
    unit: policy
    source: '[Startup-finance heuristic] Working capital, capex, debt service, and taxes are assumed immaterial at this stage.'
  - id: A22
    name: Financing milestone
    value: '32 paying institutions, accelerator template live, and ~$1.2M exit ARR by Q4Y3'
    unit: milestone
    source: '[BP milestones + startup-finance heuristic] Extends the year-3 target of 30 paying institutions into a next-round proof point.'
