scenarios:
  downside:
    description: Pilot conversion slips, pricing lands closer to the low end of the plan, and hiring is only partially slowed.
    y3RevenueK: 650.0
    y3EbitdaK: -470.0
    cashLowPointK: -110.0
    keyAssumptionChanges:
      - Blended annual revenue per customer falls to about $34K.
      - Customers reach only 12 by Q4Y2 and 24 by Q4Y3.
      - Sales cycle stretches to roughly 6 months because security and mailbox approvals drag.
  base:
    description: Founder-led pilots convert steadily, one GTM hire lifts throughput in Y2, and the accelerator segment adds modest Y3 expansion.
    y3RevenueK: 888.2
    y3EbitdaK: -329.7
    cashLowPointK: 198.2
    keyAssumptionChanges:
      - Blended annual revenue per customer stays at about $38K.
      - Customers reach 15 by Q4Y2 and 32 by Q4Y3.
      - Gross margin stays at the 75% target while hiring remains lean at 8 FTE by Q4Y3.
  upside:
    description: Security review becomes repeatable, accelerators convert faster than funds, and upsell revenue expands the blend.
    y3RevenueK: 1075.0
    y3EbitdaK: -230.0
    cashLowPointK: 360.0
    keyAssumptionChanges:
      - Blended annual revenue per customer rises to about $41K from overages and premium integrations.
      - Customers reach 18 by Q4Y2 and 38 by Q4Y3.
      - Monthly churn improves to about 1.0% as workflows become embedded.
sensitivity:
  - variable: ARPU
    downsideCase: Blended realized annual revenue per customer is $34K.
    baseCase: Blended realized annual revenue per customer is $38K.
    upsideCase: Blended realized annual revenue per customer is $41K.
    y3RevenueImpactK: -93.5
    cashImpactK: -70.0
  - variable: CAC
    downsideCase: CAC rises to $24K because pilots need more founder time and travel.
    baseCase: CAC is $18K with founder-led outbound and a narrow ICP.
    upsideCase: CAC falls to $14K after referenceable deployments improve conversion.
    y3RevenueImpactK: 0.0
    cashImpactK: -175.0
  - variable: churn
    downsideCase: Monthly churn is 1.8% because the tool is treated as a pilot utility.
    baseCase: Monthly churn is 1.3%.
    upsideCase: Monthly churn is 1.0% after the workflow embeds upstream of CRM.
    y3RevenueImpactK: -60.0
    cashImpactK: -50.0
  - variable: sales cycle
    downsideCase: Average cycle extends to about 6 months.
    baseCase: Average cycle is 3-4 months with a 30-60 day paid pilot.
    upsideCase: Average cycle compresses to 2-3 months for form-first deployments.
    y3RevenueImpactK: -160.0
    cashImpactK: -120.0
  - variable: gross margin
    downsideCase: Gross margin settles at 68% because LLM and parsing costs stay high.
    baseCase: Gross margin is 75%.
    upsideCase: Gross margin reaches 80% after model and workflow tuning.
    y3RevenueImpactK: 0.0
    cashImpactK: -62.0
  - variable: hiring pace
    downsideCase: The second GTM hire and ops costs arrive before repeatable conversion is proven.
    baseCase: Hiring follows the staged plan in headcount.
    upsideCase: The second GTM hire is delayed until more than 28 customers are active.
    y3RevenueImpactK: 0.0
    cashImpactK: -115.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Leads[Target funds and accelerators] --> Pilots[Paid pilots]
      Pilots --> Customers[Annual customers]
      Customers --> Revenue[Subscription + overage revenue]
      Revenue --> GrossProfit[75% gross profit]
      GrossProfit --> Cash[Funds hiring and extends runway]
modelSanity:
  - checkName: Revenue engine
    finding: Base-case revenue is driven by reaching 32 paying institutions by Q4Y3 at roughly $38K blended annual revenue each, not by large enterprise ACVs.
  - checkName: Must go right
    finding: The model needs 30-60 day pilots to convert on a 3-4 month total cycle so a lean 8-FTE team can reach the customer counts in the base scenario.
  - checkName: Model breaks if
    finding: Cash turns negative in the downside case if pricing slips toward $34K and security review stretches the sales cycle to roughly 6 months without delaying hires.
  - checkName: Next-round proof
    finding: The financing story strengthens materially once the company shows 30-plus paying institutions, an accelerator template, and about $1.2M exit ARR without forcing CRM replacement.
sanityChecks:
  ruleOf40: Y3 growth 183% + EBITDA margin -37% = 146%, which is directionally strong only because the company is still coming off a small base.
  burnMultiple: Y3 burn multiple 0.5x = $329.7K burn / $646.0K net new ARR (from $570.0K to $1216.0K exit ARR).
  revenuePerFte: $111K Y3 using 8 end-of-year FTE, below a typical $200K-$400K SaaS benchmark.
  flags:
    - Revenue per FTE is still low by Y3 because the model assumes trust-heavy onboarding and implementation remain part of the go-to-market motion.
    - The $38K blended annual revenue assumption depends on overages and premium integrations lifting realized spend slightly above the core $24K-$36K subscription band.
    - LTV/CAC looks attractive on paper, but churn is inferred from the plan's retention goal rather than measured cohort data.
    - The base case stays cash-positive only because hiring remains disciplined; pulling forward a third engineer or additional GTM capacity would likely increase the funding ask.
