  - id: A3
    name: Paying-customer ramp
    value: 'Y1 exit 3; Y2 quarter exits 5, 8, 11, 15; Y3 quarter exits 19, 23, 28, 32'
    unit: customers
    source: '[BP milestones + BP operatingAssumptions + startup-finance heuristic] Anchored to 3 annual contracts in year 1, 10-15 paying institutions by months 12-24, and 30 by year 3; model uses slight overperformance in Y3 from accelerator expansion.'
