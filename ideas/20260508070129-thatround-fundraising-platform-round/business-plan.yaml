slug: microvc-deal-intake
date: '2026-05-08'
executiveSummary: >-
  ThatRound's traction and adjacent vendor adoption suggest investor-side deal intake is becoming a real software category, but the first viable business is narrow: UK and Ireland micro-VCs and accelerators with inbound volume high enough to break Gmail, Airtable, and Notion workflows. The product wedge is an AI intake layer that ingests decks, forms, and emails, scores submissions against a fund thesis, and drafts explainable first-pass memos before data lands in Affinity, 4Degrees, or Airtable. This beachhead is attractive because buyers feel pain at moments of inbound spikes such as fund launches, accelerator partnerships, or PR-driven founder volume, and they can adopt an intake layer without a full CRM replatform. The company should sell a paid pilot tied to measurable partner-hours saved and faster pass or review decisions, then convert to annual subscriptions priced by inbound volume and partner seats. The main moat is not generic LLM output; it is fund-specific decision data, thesis rubrics, and workflow embedding across inboxes, forms, and historical decisions. The company should not try to replace the full VC CRM early because buyer trust, security review, and budget skepticism are the main blockers, not feature breadth. The critical disconfirming risk is whether small funds will pay standalone ACV for intake software instead of demanding this capability inside an existing CRM or staying on their manual stack. The inputs do not include direct customer interview transcripts or benchmark sales-cycle data, so pricing, conversion timing, and expansion pace remain operating assumptions that must be validated through paid pilots.
problem:
  - Small pre-seed funds receive more founder applications than lean partner teams can review consistently, so good deals are missed and partner time is wasted on low-signal screening.
  - Current workflows split inboxes, forms, decks, spreadsheets, and notes across Gmail, Outlook, Typeform, Airtable, and Notion, which slows decisions and weakens auditability.
solution:
  - Connect inbound email and form sources, parse decks and applications into a structured company profile, and score each submission against a configurable fund thesis.
  - Generate cited first-pass memos and route deals into pass, analyst review, or partner discussion queues while preserving human approval and audit logs.
whyWeWin:
  - The wedge targets an urgent workflow incumbents only partially cover, because CRMs optimize relationship management and sourcing more than messy inbound triage.
  - The product can land without forcing a CRM rip-and-replace by syncing outputs into existing Airtable, Affinity, 4Degrees, or similar systems.
  - If adopted as the default intake layer, the company compounds a proprietary dataset of thesis criteria, source artifacts, reviewer comments, and decision outcomes that horizontal tools do not naturally own.
strategicChoices:
  beachhead: UK and Ireland pre-seed micro-VCs with 2-5 partners and at least 150 inbound applications per quarter, plus accelerators running similarly high-volume founder review.
  wedgeRationale: This entry point has a clear economic buyer, a concrete trigger when inbound spikes, and a narrow workflow that can show ROI in days rather than asking a fund to replace its full system of record.
  sequencingRationale: Build ingestion, explainable scoring, and memo drafting first because those create immediate time savings; sell through paid pilots before adding broader workflow modules; hire implementation and security depth before sales scale because trust and permissions are the adoption bottlenecks.
  notYet:
    - Full VC CRM and relationship-graph replacement
    - Founder-side fundraising marketplace or investor-discovery product
    - Portfolio reporting, LP update workflows, and broader fund administration
    - Autonomous pass decisions without human review
market:
  tam: $64.8M
  sam: $5.4M
  som: $0.9M
  segments:
    - UK and Ireland micro-VCs and angel syndicates with persistent inbound
    - Accelerators and application-driven startup programs
  buyingProcess: A platform lead, ops lead, analyst, or program manager is the likely internal champion after an inbound spike exposes workflow pain, but the GP or head of platform approves spend. The most credible path is a 30-60 day paid pilot that plugs into existing inboxes and forms, then converts once the fund can verify hours saved and faster partner turnaround.
product:
  mvp: The MVP connects Gmail or Outlook plus one primary form source, parses deck and application data into a fund-specific template, produces explainable first-pass memos with source citations, and exports results into the customer's existing review stack. It is intentionally human-in-the-loop and optimized for review speed rather than autonomous decisioning.
  sixMonth: Ship Gmail and Microsoft 365 connectors, Typeform and CSV intake, thesis templates, cited memo drafts, review queues, and Airtable or Affinity sync with audit logging.
  twelveMonth: Add historical decision backtesting, fund-specific model tuning, accelerator review templates, role-based permissions, retention controls, and benchmark dashboards for turnaround and partner agreement.
  twentyFourMonth: Expand into diligence request orchestration, portfolio update ingestion, co-investor matching, and multi-geo support once the intake layer proves durable adoption.
  keyBets:
    - Explainable memo drafting and thesis scoring will earn more trust than opaque prioritization scores.
    - Funds will buy an intake layer that sits upstream of CRM faster than they will buy a new CRM.
    - Accelerator workflows can broaden SAM without forcing a different core product architecture.
gtm:
  wedge: Sell an intake copilot for high-volume founder submissions that reduces time from application receipt to partner-ready memo without changing how founders apply.
  channels:
    - Founder-led outbound to UK and Ireland micro-VCs, angel syndicates, and accelerators
    - VC ops and platform communities
    - Integration and referral partnerships with Typeform, Gust, Submittable, and CRM sync destinations
  funnelTargets: Outbound account to qualified discovery 20%+, discovery to paid pilot 25%+, paid pilot to annual contract 50%+, first-year logo retention 85%+.
  pricing: Annual subscription priced by inbound application volume and partner seats, sold through a 30-60 day paid pilot in the low-thousands range and converting to roughly $24k-$36k ACV for funds with recurring high-volume intake; this keeps the ROI anchored to partner-hours saved and current multi-tool spend.
businessModel:
  revenueStreams:
    - Annual software subscription by fund or program
    - Paid pilot and onboarding implementation fees
    - Volume-based overages and premium CRM or workflow integrations
  unitOfValue: Quarterly inbound applications processed per institution
  targetGrossMarginPct: 75
  expansionLevers:
    - More partner and analyst seats within each fund
    - Accelerator and angel-network customer additions
    - Diligence, portfolio-update, and co-investor workflow modules
    - Expansion beyond UK and Ireland after beachhead validation
strategyMap:
  northStarMetric: Number of inbound companies moved to partner-ready memo within 48 hours
  inputMetrics:
    - Connected inbox or form sources per customer
    - Percent of submissions auto-normalized with source citations
    - Median partner or analyst hours saved per 100 applications
    - Pilot to annual conversion rate
    - Memo acceptance rate against historical partner decisions
  moatsToBuild:
    - Fund-specific decision corpus linked to thesis criteria and outcomes
    - Embedded intake integrations that become the default path for inbound submissions
    - Explainability, audit, and retention controls that satisfy security reviews
  killCriteria:
    - Fewer than 2 of the first 10 target funds agree to a paid pilot after workflow demos
    - Historical backtests fail to reach 70% reviewer agreement on memo usefulness after fund-specific tuning
    - Median time to clear security and permission review exceeds 60 days for sub-10-person customers
  mermaid: |
    flowchart LR
      Wedge[High-volume fund intake wedge] --> MVP[Ingestion plus cited memo MVP]
      MVP --> Proof[Paid pilots showing hours saved and faster decisions]
      Proof --> Expansion[Accelerators, more funds, then adjacent investor workflows]
investorMemo:
  verdict:
    call: Watch
    conviction: Strong pain and a clear wedge, but willingness to pay and standalone positioning are not yet proven.
    whyBelieve: The research shows real workflow volume, clear manual substitutes, and adjacent budget already flowing to VC-native software.
    whyDoubt: The beachhead is small and buyers may prefer this as an add-on inside existing CRM or operations tools rather than a new standalone line item.
    nextDiligence: Confirm two paid pilots with measurable turnaround improvement and evidence that at least one fund converts without requiring a CRM replacement project.
  firstCustomer:
    title: UK B2B SaaS micro-VC ops-led inbound team
    profile: A 2-4 partner pre-seed fund with one ops or platform lead, an existing Gmail plus Airtable or Notion stack, and at least 150 founder applications per quarter.
    trigger: A new fund launch, accelerator partnership, or publicity spike causes inbound volume to exceed what partners can screen consistently.
    buyer: General partner or head of platform
    initialContract: A 30-60 day paid pilot for one fund workflow, converting to a $24k-$36k annual subscription if memo turnaround and partner-hours saved hit agreed thresholds.
  mustBeTrue:
    - Funds with 150 plus quarterly applications will pay low-five-figure annual ACV for a standalone intake layer before a CRM migration.
    - Explainable memos with source citations materially increase partner trust versus generic AI scoring.
    - Integration-first deployment cuts time to first value enough to beat manual-stack inertia.
    - At least one accelerator or syndicate segment converts using the same core product with limited customization.
    - Incumbents do not close the wedge quickly enough to erase pricing power before the company wins design partners.
  diligenceQuestions:
    - How many UK and Ireland funds actually process more than 150 inbound applications per quarter today?
    - In pilot evaluations, which artifact drives buying intent most: parsing, scoring, memo drafting, or reviewer workflow?
    - What is the real security review burden for mailbox access and confidential deck retention at funds under 10 employees?
    - Will buyers accept a sync-into-CRM model, or do they insist the product be native inside Affinity, 4Degrees, or Visible?
    - What level of historical decision data is needed before fund-specific scoring outperforms a template baseline?
  riskHeatmap:
    - risk: Standalone willingness to pay is weaker than modeled
      likelihood: High
      impact: High
      leadingIndicator: Discovery calls praise the workflow but fewer than 25% progress to a paid pilot at the proposed price band.
      mitigation: Start with highest-volume funds, sell explicit ROI on hours saved, and use accelerators as a second segment if micro-VC conversion is weak.
    - risk: Partners do not trust AI-generated prioritization
      likelihood: Medium
      impact: High
      leadingIndicator: Reviewers discard generated memos or override routing decisions in more than half of pilot cases.
      mitigation: Keep humans in the approval loop, expose thesis criteria and citations, and optimize for memo usefulness before automated ranking.
    - risk: Security and mailbox-permission review slows sales cycles
      likelihood: Medium
      impact: High
      leadingIndicator: Pilot start dates slip more than 30 days due to OAuth scope, retention, or confidentiality objections.
      mitigation: Design least-privilege integrations, retention controls, and audit logs from day one and offer form-only pilots where mailbox access is blocked.
    - risk: Adjacent incumbents bundle similar features
      likelihood: High
      impact: Medium
      leadingIndicator: Prospects repeatedly ask why this should not be an Affinity, Visible, or 4Degrees feature instead of a separate tool.
      mitigation: Win on speed to deploy, narrower intake workflow depth, and sync-based coexistence rather than broad platform replacement.
operatingAssumptions:
  - assumption: Funds with persistent inbound will buy at roughly $24k-$36k ACV if the product proves measurable partner-hours savings.
    basis: research.yaml
    validationTest: Run 10 buyer interviews and close 2 paid pilots at proposed pricing with ROI criteria agreed in advance.
    decisionImpact: If false, narrow pricing downmarket, target accelerators sooner, or bundle into a services-heavy onboarding offer.
  - assumption: Explainable memo drafting with citations will be trusted faster than standalone numeric scoring.
    basis: research.yaml
    validationTest: Backtest 100 historical deals across 2 design partners and measure memo acceptance and override rates in live review.
    decisionImpact: If false, reposition as a documentation and workflow tool rather than a thesis-scoring product.
  - assumption: An intake layer that syncs into existing systems will close faster than a CRM replacement sale.
    basis: research.yaml
    validationTest: Compare pilot cycle length and setup effort between sync-first deployments and any customer asking for deeper system replacement.
    decisionImpact: If false, the roadmap must prioritize tighter native integrations or choose a different customer segment with weaker incumbent lock-in.
  - assumption: The UK and Ireland beachhead can produce enough early customers to reach 30 paying institutions by year three.
    basis: operator judgment
    validationTest: Build a named-account list, track outreach and pilot conversion, and confirm at least 15 credible design-partner targets within the first quarter.
    decisionImpact: If false, expand geography or move into accelerators and adjacent investor workflows earlier than planned.
  - assumption: Mailbox and retention permissions can clear quickly enough for lean teams if the product is human-in-the-loop and least-privilege by design.
    basis: research.yaml
    validationTest: Use security questionnaires in the first 3 pilots and measure time from security review start to data access approval.
    decisionImpact: If false, lead with form-based intake, defer mailbox ingestion, and budget for stronger compliance engineering earlier.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Interview 10 UK and Ireland micro-VCs and accelerators using a workflow teardown of their current intake stack.
    hypothesis: The acute buying pain is first-pass review speed and consistency, not generic CRM dissatisfaction.
    successMetric: At least 7 of 10 buyers rank intake triage and memo drafting among their top 2 workflow pains.
    owner: Founder CEO
  - horizon: 0–90 days
    experiment: Run two historical-deal backtests using sample decks and prior decisions from design partners.
    hypothesis: A cited memo and thesis template can match reviewer expectations well enough to justify a pilot.
    successMetric: At least 70% of reviewed memos are rated usable for partner discussion with fewer than 30% major factual corrections.
    owner: Founding eng
  - horizon: 0–90 days
    experiment: Launch a paid pilot offer with one Gmail or Outlook connector and one form-source connector.
    hypothesis: Integration-first deployment is sufficient to get budget approval without CRM replacement.
    successMetric: Close 2 paid pilots and reach first value within 14 days of kickoff.
    owner: Founder CEO
  - horizon: 3–6 months
    experiment: Test memo export and sync into Airtable, Affinity, or 4Degrees for pilot customers.
    hypothesis: Sync-based coexistence reduces objections tied to incumbent workflow overlap.
    successMetric: More than half of pilot users keep their existing CRM and still expand usage after sync goes live.
    owner: Founding eng
  - horizon: 3–6 months
    experiment: Run a security-review package including OAuth scope documentation, retention policy, and audit-log demo.
    hypothesis: Basic trust and compliance artifacts can keep lean-fund procurement under 30 days.
    successMetric: Median security review time below 30 days across the first 3 security-conscious accounts.
    owner: Product and security lead
  - horizon: 6–12 months
    experiment: Pilot an accelerator template using the same core ingestion and review engine.
    hypothesis: Accelerators convert faster than funds because applications are more structured, providing a second segment without a product reset.
    successMetric: Land 1 accelerator pilot with less than 20% feature divergence from the fund workflow.
    owner: Founder CEO
operations:
  - White-glove onboarding to encode fund thesis, review rubric, and historical decision examples before automation is turned on.
  - OAuth-based Gmail and Microsoft 365 connectors plus Typeform or CSV intake, with sync into existing CRM or spreadsheet destinations.
  - Audit logging, prompt and model version tracking, retention controls, and reviewer sign-off on every recommendation.
  - Pilot review cadence that benchmarks turnaround time, memo usefulness, and partner-hours saved against the pre-pilot baseline.
  - Design-partner feedback loop with accelerators, syndicates, and fund ops leads to prioritize adjacent workflow modules.
team:
  - role: Founder CEO
    startTiming: Month 0
    rationale: Own buyer discovery, paid pilot sales, workflow design, and early implementation because the first bottleneck is customer truth, not top-of-funnel scale.
  - role: Founding eng
    startTiming: Month 0
    rationale: Build secure ingestion, parsing, memo generation, and sync infrastructure quickly enough to support design-partner pilots.
  - role: Product and security lead
    startTiming: Month 3
    rationale: Trust, permissions, and auditability are adoption blockers, so product decisions need explicit security ownership early.
  - role: Applied AI engineer
    startTiming: Month 6
    rationale: Improve extraction quality, evaluation, and fund-specific tuning once live pilot data exists.
  - role: Implementation and customer success lead
    startTiming: Month 6
    rationale: Paid pilots and annual conversions depend on fast onboarding, measurable ROI tracking, and workflow embedding.
milestones:
  - horizon: 0–12 months
    items:
      - Ship the intake MVP with Gmail, Outlook, form ingestion, cited memo drafts, and CRM export
      - Close 4-6 design partners and convert at least 3 into annual contracts
      - Prove median turnaround from submission to first memo under 48 hours in production accounts
      - Complete security baseline for audit logging, retention controls, and human-review workflow
  - horizon: 12–24 months
    items:
      - Reach 10-15 paying institutions across funds and accelerators
      - Launch fund-specific backtesting, model tuning, and benchmark dashboards
      - Add accelerator workflow templates and one adjacent module such as diligence orchestration or portfolio update ingestion
  - horizon: 24–36 months
    items:
      - Reach 30 paying institutions and validate the year-three SOM case
      - Expand beyond UK and Ireland or prove a second segment can supply equivalent pipeline density
      - Decide whether to remain an intake-layer specialist or broaden into a larger investor-operations platform
risks:
  - risk: Small funds keep using manual stacks or demand this capability inside incumbent platforms
    likelihood: High
    impact: High
    mitigation: Target only high-volume accounts first, quantify ROI tightly, and build sync paths into incumbent systems rather than forcing replacement.
  - risk: AI outputs are not trusted enough for real screening workflows
    likelihood: Medium
    impact: High
    mitigation: Make outputs explainable, require human approval, and optimize for memo usefulness instead of autonomous ranking.
  - risk: Security, retention, and mailbox access concerns lengthen deployment
    likelihood: Medium
    impact: High
    mitigation: Ship least-privilege scopes, audit logs, and clear retention terms early, and offer lower-permission pilots first.
  - risk: Incumbents add similar AI intake features before the startup establishes a moat
    likelihood: High
    impact: Medium
    mitigation: Focus on the narrowest urgent workflow, move fast with design partners, and build differentiated decision data plus explainability controls.
fundingAsk:
  stage: pre-seed
  targetFundingRangeUsd: $2–3M
  runwayMonths: 18
  useOfFundsSummary: Fund 18 months to build a secure intake MVP, complete 4-6 design-partner pilots, reach 10 or more paying customers or clearly falsify standalone demand, and establish the trust and data foundations for adjacent workflow expansion.
