scenarios:
  downside:
    description: 试点转化变慢，定价更接近计划低位，招聘节奏只做了部分放缓。
    y3RevenueK: 650.0
    y3EbitdaK: -470.0
    cashLowPointK: -110.0
    keyAssumptionChanges:
    - 每客户混合年收入降到约 $34K。
    - 客户数到 Q4Y2 只做到 12 家，到 Q4Y3 只做到 24 家。
    - 由于安全和邮箱审批拖慢流程，销售周期被拉长到约 6 个月。
  base:
    description: 创始人主导的试点稳定转化，Y2 增加 1 位 GTM 后提升吞吐，加速器细分在 Y3 带来温和扩张。
    y3RevenueK: 888.2
    y3EbitdaK: -329.7
    cashLowPointK: 198.2
    keyAssumptionChanges:
    - 每客户混合年收入维持在约 $38K。
    - 客户数到 Q4Y2 做到 15 家，到 Q4Y3 做到 32 家。
    - 毛利率维持 75% 目标，同时招聘保持克制，到 Q4Y3 团队规模为 8 FTE。
  upside:
    description: 安全审查逐渐流程化，加速器转化快于基金，增购收入继续抬升混合收入。
    y3RevenueK: 1075.0
    y3EbitdaK: -230.0
    cashLowPointK: 360.0
    keyAssumptionChanges:
    - 由于超额使用费和高级集成，每客户混合年收入升到约 $41K。
    - 客户数到 Q4Y2 做到 18 家，到 Q4Y3 做到 38 家。
    - 随着工作流逐步嵌入，月度流失率改善到约 1.0%。
sensitivity:
- variable: ARPU
  downsideCase: 每客户实现口径混合年收入为 $34K。
  baseCase: 每客户实现口径混合年收入为 $38K。
  upsideCase: 每客户实现口径混合年收入为 $41K。
  y3RevenueImpactK: -93.5
  cashImpactK: -70.0
- variable: CAC
  downsideCase: 由于试点需要更多创始人时间和差旅，CAC 升至 $24K。
  baseCase: 在创始人主导外呼和狭窄 ICP 下，CAC 为 $18K。
  upsideCase: 随着可引用部署案例提高转化，CAC 降至 $14K。
  y3RevenueImpactK: 0.0
  cashImpactK: -175.0
- variable: churn
  downsideCase: 如果工具被当成试点型工具，月度流失率将升至 1.8%。
  baseCase: 月度流失率为 1.3%。
  upsideCase: 当工作流在 CRM 上游嵌入后，月度流失率改善到 1.0%。
  y3RevenueImpactK: -60.0
  cashImpactK: -50.0
- variable: sales cycle
  downsideCase: 平均周期拉长到约 6 个月。
  baseCase: 在 30–60 天付费试点下，平均周期为 3–4 个月。
  upsideCase: 对以表单优先的部署，平均周期压缩到 2–3 个月。
  y3RevenueImpactK: -160.0
  cashImpactK: -120.0
- variable: gross margin
  downsideCase: 如果 LLM 和解析成本维持高位，毛利率会落在 68%。
  baseCase: 毛利率为 75%。
  upsideCase: 模型和工作流调优后，毛利率可升到 80%。
  y3RevenueImpactK: 0.0
  cashImpactK: -62.0
- variable: hiring pace
  downsideCase: 在验证出可复制转化前，第 2 位 GTM 和运营成本就提前到位。
  baseCase: 招聘按 headcount 里的分阶段计划推进。
  upsideCase: 第 2 位 GTM 延后到活跃客户超过 28 家后再招。
  y3RevenueImpactK: 0.0
  cashImpactK: -115.0
modelDiagram:
  title: 单位经济模型流程
  mermaid: |
    flowchart LR
      Leads[目标基金与加速器] --> Pilots[付费试点]
      Pilots --> Customers[年度客户]
      Customers --> Revenue[订阅费 + 超额收入]
      Revenue --> GrossProfit[75% 毛利润]
      GrossProfit --> Cash[支持招聘并延长现金跑道]
modelSanity:
- checkName: 收入引擎
  finding: 基准情形的收入，建立在 Q4Y3 做到 32 家付费机构、每家混合年收入约 $38K 之上，而不是靠大额企业 ACV 撑起来。
- checkName: 必须跑通的环节
  finding: 模型要求 30–60 天试点能在总计 3–4 个月周期内转化，这样一个精简的 8 FTE 团队才有机会触达基准情形里的客户数。
- checkName: 模型会失效的情况
  finding: 如果定价往 $34K 滑落，同时安全审查把销售周期拖到约 6 个月，且招聘又不延后，下行情形下现金会转负。
- checkName: 下一轮融资验证点
  finding: 一旦公司能证明自己做到了 30+ 家付费机构、上线加速器模板，并在不强推 CRM 替换的前提下拿到约 $1.2M 期末 ARR，融资故事就会明显更强。
sanityChecks:
  ruleOf40: Y3 增长 183% + EBITDA 利润率 -37% = 146%，方向上很强，但主要因为公司仍处在小基数阶段。
  burnMultiple: Y3 burn multiple 0.5x = $329.7K burn / $646.0K net new ARR（期末 ARR 从 $570.0K 增至 $1216.0K）。
  revenuePerFte: $111K Y3（按年末 8 名 FTE 计算），低于常见的 $200K–$400K SaaS 基准。
  flags:
  - 到 Y3 为止，每 FTE 收入仍偏低，因为模型假设高信任要求下的 onboarding 和实施仍是 GTM 动作的一部分。
  - $38K 的混合年收入假设，建立在超额使用费和高级集成把实际支出略微抬到核心 $24K–$36K 订阅带之上。
  - 纸面上 LTV/CAC 很漂亮，但流失率是从计划里的留存目标倒推出来的，而不是来自真实 cohort 数据。
  - 基准情形之所以还能保持现金为正，只是因为招聘节奏足够克制；若把第 3 位工程师或更多 GTM 能力提前拉进来，融资需求大概率会提高。
