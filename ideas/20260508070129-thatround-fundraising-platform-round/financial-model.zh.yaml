slug: microvc-deal-intake
date: '2026-05-08'
currency: USD
modelStartMonth: 2026-06
assumptions:
- id: A1
  name: 模型启动月份
  value: 2026-06
  unit: YYYY-MM
  source: '[BP date] 从 2026-05-08 计划发布日期之后的首个完整经营月份开始。'
- id: A2
  name: 起始付费客户数 (M1)
  value: '0'
  unit: count
  source: '[BP milestones] 计划要求在第 1 年拿下首批年度合同，因此模型从收入前阶段起步。'
- id: A3
  name: 付费客户爬坡
  value: Y1 期末 3；Y2 各季度期末 5、8、11、15；Y3 各季度期末 19、23、28、32
  unit: customers
  source: '[BP milestones + BP operatingAssumptions + startup-finance heuristic] 锚定第 1 年 3 份年度合同、12–24 个月做到 10–15 家付费机构，以及第 3 年做到 30 家；模型假设 Y3 因加速器扩张略微超预期。'
- id: A4
  name: 每家付费机构的实现口径混合年收入
  value: '38000'
  unit: USD per year
  source: '[BP pricing + BP businessModel] 核心订阅 ACV 为 $24k–$36k；考虑适度 onboarding、超额使用费和高级集成收入后，模型把实现口径混合收入设为 $38k。'
- id: A5
  name: 收入确认时点
  value: 新客户在赢单当期按半期收入确认
  unit: policy
  source: '[Startup-finance heuristic] 假设新合同在签下当月或当季的中部开始生效。'
- id: A6
  name: 毛利率
  value: '75'
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct]'
- id: A7
  name: 月度 logo 流失率
  value: '1.3'
  unit: percent
  source: '[BP gtm funnelTargets] 与早期阶段首年 logo 留存 85%+ 的目标一致。'
- id: A8
  name: 创始人 / 高管全包薪酬
  value: '104000'
  unit: USD per year
  source: '[Startup-finance heuristic, UK early-stage salary benchmark] 反映适度的创始人现金工资和 payroll 负担。'
- id: A9
  name: 工程全包薪酬
  value: '127000'
  unit: USD per year per FTE
  source: '[Startup-finance heuristic, UK early-stage salary benchmark] 用于创始工程师和应用 AI 工程师。'
- id: A10
  name: 产品 / 安全全包薪酬
  value: '138000'
  unit: USD per year per FTE
  source: '[Startup-finance heuristic, UK early-stage salary benchmark] 反映产品范围里较重的安全需求。'
- id: A11
  name: 客户成功 / 实施全包薪酬
  value: '92000'
  unit: USD per year per FTE
  source: '[Startup-finance heuristic, UK early-stage salary benchmark] 覆盖高触达 onboarding 和 ROI 跟踪。'
- id: A12
  name: 销售 / GTM 全包薪酬
  value: '115000'
  unit: USD per year per FTE
  source: '[Startup-finance heuristic, UK early-stage salary benchmark] 假设先由 1 位创始人协助销售，后续再补第 2 位 GTM 招聘。'
- id: A13
  name: G&A / 运营全包薪酬
  value: '80000'
  unit: USD per year per FTE
  source: '[Startup-finance heuristic, UK early-stage salary benchmark] 覆盖财务、供应商管理和安全流程支持。'
- id: A14
  name: 招聘节奏
  value: CEO 和创始工程师从一开始到位；产品 / 安全在 Y1 Q2 入职；AI 工程师和实施在 Y1 Q3 入职；首位 GTM 在 Y2 Q2 入职；运营在 Y3 Q1 入职；第 2 位 GTM 在 Y3 Q3 入职
  unit: schedule
  source: '[BP team + startup-finance heuristic] 早期招聘按计划推进，后续岗位只在客户数增长时补充。'
- id: A15
  name: 非薪酬销售与营销支出
  value: Y1 Q1 为 $2k/月，到 Y3 Q4 增长到 $8k/月
  unit: USD per month
  source: '[BP gtm + startup-finance heuristic] 创始人主导外呼、活动、差旅和销售工具支出逐步爬坡，而不是前置砸付费获客。'
- id: A16
  name: 非薪酬研发与安全工具支出
  value: Y1 Q1 为 $1.5k/月，到 Y3 Q4 增长到约 $3.5k/月
  unit: USD per month
  source: '[BP operations + startup-finance heuristic] 覆盖云资源、评估、连接器、审计日志和安全工具。'
- id: A17
  name: 非薪酬 G&A 支出
  value: Y1 Q1 为 $1.5k/月，到 Y3 Q4 增长到约 $3.7k/月
  unit: USD per month
  source: '[BP operations + startup-finance heuristic] 覆盖法务、会计、保险和合规审查的开销。'
- id: A18
  name: 混合 CAC
  value: '18000'
  unit: USD per customer
  source: '[BP gtm funnelTargets + startup-finance heuristic] 创始人主导外呼加付费试点转化，形成精简但仍然偏重信任建立的获客成本。'
- id: A19
  name: 销售周期
  value: 3–4 个月
  unit: duration
  source: '[BP buyingProcess + BP pricing] 包含需求发现、30–60 天付费试点，以及转成年度合同。'
- id: A20
  name: 起始现金
  value: '1600000'
  unit: USD
  source: '[Startup-finance heuristic] 模型假设融资在启动时点完成，因此现金可以直接按 EBITDA 滚动。'
- id: A21
  name: 现金变动简化假设
  value: 现金变动近似等于 EBITDA
  unit: policy
  source: '[Startup-finance heuristic] 假设营运资金、capex、债务偿付和税项在这个阶段影响不大。'
- id: A22
  name: 融资里程碑
  value: 到 Y3 Q4 做到 32 家付费机构、上线加速器模板，并实现约 $1.2M 期末 ARR
  unit: milestone
  source: '[BP milestones + startup-finance heuristic] 把第 3 年 30 家付费机构的目标延伸成下一轮融资的验证点。'
