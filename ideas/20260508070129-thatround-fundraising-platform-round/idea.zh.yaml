ideaScorecard:
  signalStrength:
    score: 4
    rationale: 多家已验证来源确认了融资、工作流痛点以及这个品类的真实申请量。
  painIntensity:
    score: 4
    rationale: 小基金团队的审核过载非常尖锐，因为错过项目和耗掉合伙人时间，成本都很高。
  wedgeClarity:
    score: 5
    rationale: inbound 分流和备忘录生成是一个狭窄但立刻有价值的工作流，采购方也很明确。
  defensibility:
    score: 3
    rationale: 初始产品容易被抄，但基金专属决策数据和工作流嵌入会逐步堆出护城河。
  ventureScale:
    score: 4
    rationale: 滩头市场虽窄，但项目来源、尽调和投后管理等相邻流程可以拼出一个足够大的私募市场软件平台。
topRisks:
- name: 付费意愿有限
  description: 极小型基金可能把筛选视为合伙人的手艺活，只有在真实流量压力出现后才愿意买软件。
  mitigation: 先从每季度已收到 150+ 份申请的基金切入，在 30 天试点内用节省的合伙人时间证明 ROI。
- name: 对 AI 建议缺乏信任
  description: 如果合伙人看不出项目为何被分流或降权，他们可能会直接否掉黑箱评分。
  mitigation: 让每个分数都能解释清楚，给出投资主张标准、deck 引文，并强制加入人工审批环节。
- name: 上线初期数据沉淀不够
  description: 新基金在第一天可能没有足够多的历史决策数据，无法训练出明显差异化的投资主张模型。
  mitigation: 先提供可配置的投资主张模板和常见 pre-seed 工作流基准，再逐步按每家基金自己的决策微调。
