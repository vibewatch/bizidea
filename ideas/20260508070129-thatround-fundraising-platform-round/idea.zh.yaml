differentiator: 大多数创始人与投资人工具都从关系发现或暖介绍切入。这家公司从基金今天已经在疼的地方下手：现有 inbound 的筛选质量不一致。真正可防守的资产，是每家基金的投资主张、合伙人决策与历史申请材料结构化语料之间的反馈回路；一旦工具成为默认接收层，这套资产会越用越强。
