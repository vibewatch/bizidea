problem: 现在 pre-seed 基金和天使联合投资体收到的结构化申请，已经远超精干团队能高质量审完的范围，但大多数项目仍散落在邮件、表单、表格和零散的合伙人笔记里。随着创始人端募资工具越来越好，投资人反而撞上了另一面的问题：量更大、同质化更强、与投资主张是否匹配的判断更慢。好基金不是错过优质公司，就是把大量合伙人时间耗在低信号初筛上。
targetUser:
  primary: 英国微型 VC 和天使联合投资体里，负责高量级 pre-seed inbound 的投资运营负责人
  secondary: 负责批量审核创业申请、筛选 cohort 的加速器项目经理
  buyer: 1–5 位合伙人的 pre-seed 基金中的 GP 或平台负责人
startupThesis:
  nonObviousInsight: 创业募资的新瓶颈正从创始人获客，转向投资人侧的项目接收。一旦 AI 工具让申请更容易生成、也更标准化，稀缺资产就变成基金能否比同行更快完成分流、比较并回复 inbound。
  beachhead: 英国 pre-seed 基金；它们每月通过网页表单、暖介绍和加速器转介，审核 100–500 份 inbound deck
  wedge: 一个 AI 项目接收工作台，吃进 deck、表单和邮件线程，按基金投资主张给每家公司打分，并生成可直接给合伙人看的初筛备忘录
  whyNowCatalyst: ThatRound 的融资、申请量，以及其明确投入 AI 匹配，都说明募资工作流正在变成结构化数据系统，迫使投资人侧尽快升级审核方式。
  ventureScalePath: 先从微型 VC 的 inbound 分流切入，再扩展到投后更新接收、共同投资人匹配、尽调编排，最终成为早期私募市场项目来源的系统记录层。
solution: 产品接入基金现有的 inbound 渠道，解析融资 deck 和申请表，把每家公司按该基金的投资主张标准化成结构化画像。系统会生成包含市场、团队、进展和匹配标记的初筛投资备忘录，再把项目分流到淘汰、分析师复核或合伙人讨论队列。随着使用积累，它会从合伙人决策中学习，改进评分，并找出基金长期低配的模式，例如某些垂类或地区。最初承诺不是帮基金找到更多项目，而是让已经进来的项目判断更快、更一致。对小基金来说，这能替掉分析师的表格工具栈，而且不需要内部数据团队。
goToMarketSeed:
  firstCustomer: 一家聚焦英国 B2B SaaS 的微型 VC：2–4 位合伙人、1 位平台或运营负责人，每季度收到 150+ 份创业项目申请
  buyingTrigger: 新基金启动、加速器合作或 PR 带来的流量峰值，导致 inbound 陡增，迫使合伙人把筛选流程标准化
  currentAlternative: 用 Typeform、Gmail、Airtable、Notion 和分析师手写筛选笔记拼起来的手工流程
  switchingReason: 这个切口能立刻节省合伙人时间：在不要求基金改变创始人申请方式的前提下，产出一致的初筛备忘录和投资主张匹配评分。
  pricingHypothesis: 按基金按月收费的平台费，分层依据是年度申请量和合伙人席位数。
whyNow:
- point: 投资人已经愿意为 AI 原生募资基础设施买单，这验证了围绕资本形成工作流的新软件预算类别。
