problem: >-
  Pre-seed funds and angel syndicates now receive far more structured applications
  than their lean teams can review well, yet most inbound still lands in email,
  forms, spreadsheets, and ad hoc partner notes. As founder-side fundraising
  tools improve, investors face the inverse problem: more volume, more sameness,
  and slower thesis-fit decisions. Good firms either miss strong companies or
  burn partner time on low-signal screening.
targetUser:
  primary: Investment ops leads at UK micro-VCs and angel syndicates running high-volume pre-seed inbound
  secondary: Accelerator program managers who review startup applications for cohort selection
  buyer: General partner or head of platform at a 1-5 partner pre-seed fund
startupThesis:
  nonObviousInsight: The new bottleneck in startup fundraising is shifting from founder outreach to investor-side intake. Once AI tools make applications easier to generate and standardize, the scarce asset becomes a fund's ability to triage, compare, and respond to inbound faster than rivals.
  beachhead: UK pre-seed funds reviewing 100-500 inbound decks per month across web forms, warm intros, and accelerator referrals
  wedge: An AI deal-intake workspace that ingests decks, forms, and email threads, scores each company against the fund's thesis, and drafts a partner-ready first-pass memo
  whyNowCatalyst: ThatRound's funding, application volume, and explicit investment in AI matching show fundraising workflows are becoming structured data systems, creating urgency on the investor side to modernize review.
  ventureScalePath: Start with inbound triage for micro-VCs, then expand into portfolio update ingestion, co-investor matching, diligence orchestration, and eventually the system of record for early-stage private-market origination.
solution: The product connects to a fund's inbound channels, parses pitch decks and application forms, and normalizes each company into a structured profile against that fund's thesis. It produces a first-pass investment memo with market, team, traction, and fit flags, then routes deals into pass, analyst review, or partner discussion queues. Over time, it learns from partner decisions to improve scoring and surface overlooked patterns, such as verticals or geographies the fund consistently underweights. The initial promise is not better sourcing; it is faster, more consistent judgment on the deals already arriving. For small funds, that can replace the analyst spreadsheet stack without requiring an internal data team.
goToMarketSeed:
  firstCustomer: A UK B2B SaaS-focused micro-VC with 2-4 partners, one platform or ops lead, and 150+ inbound startup applications per quarter
  buyingTrigger: A new fund launch, accelerator partnership, or PR spike that sharply increases inbound and forces partners to standardize screening
  currentAlternative: Manual workflow across Typeform, Gmail, Airtable, Notion, and analyst-written screening notes
  switchingReason: The wedge saves partner hours immediately by producing consistent first-pass memos and thesis-fit scoring without asking the fund to change how founders apply
  pricingHypothesis: Platform fee priced per fund per month, with tiers based on annual inbound application volume and number of partner seats
