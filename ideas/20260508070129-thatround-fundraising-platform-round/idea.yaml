differentiator: >-
  Most founder-investor tools start with network discovery or warm introductions.
  This company starts where funds already feel pain: inconsistent screening
  quality on existing inbound. The defensible asset is a feedback loop between
  each fund's thesis, partner decisions, and the structured corpus of historical
  application materials, which gets better as the tool becomes the default
  intake layer.
