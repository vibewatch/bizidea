topRisks:
  - name: Limited willingness to pay
    description: Very small funds may view screening as partner craft and resist buying software before they feel real volume pain.
    mitigation: Start with funds already receiving 150 plus quarterly applications and prove ROI in saved partner hours within a 30-day pilot.
  - name: Low trust in AI recommendations
    description: Partners may reject black-box scores if they cannot see why a company was routed or deprioritized.
    mitigation: Make every score explainable with thesis criteria, source citations from the deck, and a required human-in-the-loop approval step.
  - name: Weak data exhaust at launch
    description: New funds may not have enough historical decisions to train a differentiated thesis model on day one.
    mitigation: Use configurable thesis templates and benchmarking from common pre-seed workflows before fine-tuning on each fund's own decisions.
