problem: 混合物流平台每到月结，都得在自有车辆、签约承运商、车次记录和货主发票之间来回对账，而且很少能在单票层面严丝合缝地对上。一旦公司启动 IPO 准备、债务尽调或企业采购审查，真正痛的就不是调度怎么排，而是拿不出能上披露桌的证据，去说明利润率、承运商可靠性和现金流失点。结果是财务团队把看板和表格硬拼在一起，运营团队则事后四处解释异常。
targetUser:
  primary: 印度混合资产型物流平台里的 CFO 与财务控制团队——经营干线和短途网络，签约卡车规模在 1,000–10,000 辆。
  secondary: 负责车次执行数据和签约车队表现的网络运营与承运商管理负责人。
  buyer: 正在为 IPO、结构化债务或企业采购尽调做准备的 CFO 或财务副总裁。
startupThesis:
  nonObviousInsight: 已经做出规模的物流初创公司，真正的瓶颈正从调度优化转向“信任基础设施”：混合网络一旦赚钱到足以冲击上市，每一趟运输就不再只是运营事件，而会变成披露对象。
  beachhead: 那些用混合资产模式经营、单位经济模型已盈利或接近盈利、签约卡车在 1,000–10,000 辆之间，并预计在未来 12–24 个月进入 IPO、大额债务额度或《财富》 500 强货主尽调流程的印度物流科技运营商。
  wedge: 一套车次利润与承运商控制账本，把运营车次数据、承运商结算和货主计费对到一起，直接产出董事会可用 KPI、贷方可审阅的 covenant 材料，以及可审计的异常队列。
  whyNowCatalyst: GoBolt 改制为公众有限公司，说明中等规模物流初创公司正从“不惜代价做增长”跨进资本市场审视阶段；原本杂乱的承运商数据，会一下子变成融资障碍。
  ventureScalePath: 先从拟上市物流平台切入，再往 PE 支持的 3PL、车队贷款方和大型企业货主采购团队扩，因为这些角色都需要同一套经过验证的运营账本，来覆盖碎片化的承运商网络。
solution: 产品叠在运营商现有的 TMS、车队管理和财务流程之上，而不是整套替换。它先建一层标准车次账本，把每票运输的收入、承运商成本和服务异常归清楚；月结或尽调请求来之前，先把对不上的、站不住的车次挑出来。然后自动生成车道贡献、承运商集中度、异常账龄等董事会指标，并能逐层下钻到证据，不再靠满屏截图的汇报材料。再往后，这同一层账本还会变成贷方、审计方和大型企业货主的共用界面，用来判断这张网络值不值得拿更便宜的资金、或分到更多线路。
goToMarketSeed:
  firstCustomer: 一家印度公路物流平台的 CFO 与财务系统负责人：签约卡车 2,000–8,000 辆，业务已盈利或接近盈利，而且正被要求准备 IPO、债务再融资或大型企业货主 RFP。
  buyingTrigger: 董事会决定启动 IPO 就绪工作、开启贷方尽调，或要回复大型货主对经审计网络与盈利指标的要求。
  currentAlternative: 把 TMS 导出、财务报表、承运商对账单和人工月结核对硬拼成一套表格。
  switchingReason: 这个切口把几周临时拼凑的对账，换成一套车次级账本和证据链，让财务、运营、银行家和企业客户都能信。
  pricingHypothesis: 按月度完结车次或签约卡车数量收年度平台费；贷方和企业尽调工作区再卖高级模块。
