jobsToBeDone:
- job: 当一家物流平台开始做 IPO 就绪或贷方尽调时，帮 CFO 把车次收入和承运商成本对清楚，这样他们不用拉起人工战情室，也能扛住盈利质量审查。
  currentAlternative: 把 TMS 和财务系统的数据导出到表格，再让运营团队人工解释异常。
  successMetric: 交出董事会或贷方可用月度材料所需的天数，以及无需人工介入就完成核对的车次占比。
- job: 当大型企业货主要求证明网络稳定性和服务表现时，帮承运运营负责人把可审计的线路指标打包出来，这样他们能更快拿下更高价值合同。
  currentAlternative: 临时从车队看板、邮件串和人工服务报表里拼一份演示材料。
  successMetric: 回复尽调请求的时间，以及企业货主 RFP 的中标率。
ideaScorecard:
  signalStrength:
    score: 4
    rationale: 法律改制、披露的混合车队规模和盈利底盘，让时间窗口信号很具体；只是目前证据仍来自单一来源。
  painIntensity:
    score: 4
    rationale: 一旦进入融资或企业尽调，缺少车次级控制就可能拖慢交易、压低估值信心，甚至直接丢单。
  wedgeClarity:
    score: 5
    rationale: 车次利润与承运商控制账本，比整套替换 TMS 更窄、更快落地，也更容易守住差异化。
  defensibility:
    score: 4
    rationale: 历史对账模型，以及围绕车次、承运商和发票长出来的证据图谱，会形成工作流锁定和基准价值。
  ventureScale:
    score: 4
    rationale: 同一层信任账本可以从拟上市物流初创公司，往 3PL、贷方、审计方和大型货主采购团队扩。
topRisks:
- name: 证据覆盖不足
  description: 这个想法目前主要站在 7 月 4 日这一条具体来源上，真实市场可能比看上去更窄、或来得更晚。
  mitigation: 先找两家已经进入 IPO、债务或企业尽调阶段的共创客户，验证月结和尽调痛点是否尖到愿意付费。
- name: 集成拖慢落地
  description: 车次、承运商和计费数据可能散在多套运营与财务系统里，拉长起效时间。
  mitigation: 先从能用 CSV 和 API 导入启动的月结与尽调流程切入，再逐步往更深的实时集成扩。
- name: 预算依赖触发事件
  description: CFO 可能把这产品当成一次性的 IPO 项目，而不是持续的软件品类。
  mitigation: 首个模块围绕持续性的月结、贷方报告和货主尽调来定位，让 ROI 在融资里程碑过后仍然存在。
