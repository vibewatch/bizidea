slug: hybrid-fleet-margin-ledger
date: "2026-07-05"
currency: USD
modelStartMonth: "2026-08"
assumptions:
  - id: A1
    name: "Model start month"
    value: "2026-08"
    unit: "YYYY-MM"
    source: "[BP date 2026-07-05] the model begins with the first full operating month after the dated business plan."
  - id: A2
    name: "Opening cash / pre-seed raise"
    value: "$2.0M"
    unit: "USD"
    source: "[BP fundingAsk targetFundingRangeUsd $2-3M + BP fundingAsk runwayMonths 18 + model cash curve] the base case uses the low end of the planned pre-seed range because the team stays India-first and avoids building a large services bench before proof."
  - id: A3
    name: "Starting paying logos"
    value: "0"
    unit: "count"
    source: "[BP executiveSummary + BP milestones 0-12 months] the company starts pre-revenue and must first win paid pilots tied to a live close or diligence event."
  - id: A4
    name: "Paying logo definition"
    value: "Paid pilot or recurring annual close-ledger contract"
    unit: "definition"
    source: "[BP gtm.pricing + BP businessModel.revenueStreams] customersEop counts any operator already paying for pilot or production scope."
  - id: A5
    name: "Pilot economics"
    value: "$45K over about 90 days or about $15K per month"
    unit: "USD/logo"
    source: "[BP gtm.pricing $30k-$60k pilot + BP investorMemo.firstCustomer.initialContract] the model uses the midpoint pilot price for one legal entity and one close cycle."
  - id: A6
    name: "Production pricing and expansion"
    value: "Production contracts start near $180K ARR and exit Y3 near about $208K annualized per paying logo"
    unit: "USD/logo/year"
    source: "[BP gtm.pricing $120k-$300k annual SaaS + BP businessModel.expansionLevers + Research market.som] the base case assumes modest second-entity or workspace attach by year 3 while staying inside the BP pricing band."
  - id: A7
    name: "Customer ramp"
    value: "3 paying logos by M12, 6 by Q4Y2, and 12 by Q4Y3"
    unit: "customersEop"
    source: "[BP product.sixMonth + BP product.twelveMonth + BP milestones + Research market.som 12 logos] the model matches the plan to reach 4-6 production logos by month 24 and roughly 10-12 by month 36."
  - id: A8
    name: "Revenue recognition convention"
    value: "Revenue equals period-end paying logos times realized blended revenue per paying logo, rising from $15K per month in Y1 to about $47K-$52K per quarter in Y3"
    unit: "formula"
    source: "[A5-A7 + BP businessModel.unitOfValue] this keeps revenue directly traceable to customer count and planned same-account expansion."
  - id: A9
    name: "Gross margin ramp"
    value: "Y1 gross margin rises from about 42% to 53%, Y2 from 64% to 70%, and Y3 from 72% to 75%"
    unit: "gross margin percent"
    source: "[BP businessModel.targetGrossMarginPct 70 + BP operations + Research technologyLandscape and adoptionFrictionMatrix] early onboarding is services-heavy before reusable connector templates and tolerance rules lift margin."
  - id: A10
    name: "Hiring timeline"
    value: "M1 founder CEO and founding engineer, M4 finance-systems lead, M7 second engineer, M10 implementation lead, M18 third engineer, M28 partnerships hire, and M31 second implementation hire"
    unit: "timeline"
    source: "[BP team startTiming + BP strategicChoices.sequencingRationale] hiring follows the plan to solve messy data and delivery risk first, then add channel capacity after production proof exists."
  - id: A11
    name: "Founder CEO loaded compensation"
    value: "$150K"
    unit: "USD/year"
    source: "[startup-finance heuristic for India-first enterprise founders] lean cash compensation still has to support founder-led sales travel and executive ownership."
  - id: A12
    name: "Engineering loaded compensation"
    value: "$115K"
    unit: "USD/year"
    source: "[startup-finance heuristic for senior data and integration engineers in India-focused B2B SaaS] the company needs strong reconciliation and connector talent without assuming Bay Area cash levels."
  - id: A13
    name: "Finance systems / solutions loaded compensation"
    value: "$100K"
    unit: "USD/year"
    source: "[BP team finance systems / solutions lead + startup-finance heuristic] this role owns data mapping and close-workflow design rather than a broad consulting team."
  - id: A14
    name: "Customer success / implementation loaded compensation"
    value: "$80K"
    unit: "USD/year"
    source: "[BP team customer success / implementation lead + startup-finance heuristic] reflects hands-on onboarding and recurring close support in an India-first team."
  - id: A15
    name: "GTM / partnerships loaded compensation"
    value: "$125K"
    unit: "USD/year"
    source: "[BP gtm.channels + BP experimentRoadmap partner motion + startup-finance heuristic] the first dedicated channel hire is a later-stage partnerships and enterprise sales operator."
  - id: A16
    name: "Payroll allocation to P&L lines"
    value: "Founder 75% S&M / 10% R&D / 15% G&A; engineering 100% R&D; finance systems 45% S&M / 55% R&D; implementation 70% S&M / 30% G&A; GTM 100% S&M"
    unit: "allocation"
    source: "[BP team role rationales + BP operations] payroll is allocated by the function each role primarily serves during the first three years."
  - id: A17
    name: "Non-payroll opex ramp"
    value: "Monthly non-payroll spend rises from about $21K in M1-M3 to about $46K by Q4Y3"
    unit: "USD/month"
    source: "[BP operations + BP gtm.channels + startup-finance heuristic] covers cloud infrastructure, travel, implementation contractors, legal, audit, and partner enablement without assuming paid demand at scale."
  - id: A18
    name: "Cash conversion convention"
    value: "Cash movement equals EBITDA"
    unit: "formula"
    source: "[startup-finance heuristic] capex, taxes, FX, and working-capital timing are assumed immaterial relative to operating burn at this stage."
  - id: A19
    name: "Steady-state monthly churn"
    value: "2.0%"
    unit: "percent per month"
    source: "[BP risks recurring budget unproven + startup-finance heuristic for early enterprise workflow SaaS] the workflow should be sticky once embedded, but the model stays conservative because some budgets may still be event-triggered."
  - id: A20
    name: "CAC convention"
    value: "Total 36-month sales and marketing spend divided by 12 net new paying logos"
    unit: "formula"
    source: "[model calc using base-case S&M spend + BP gtm.funnelTargets] this captures founder-led, referral-led, and later partner-led acquisition across the build period."
  - id: A21
    name: "Next-round milestone"
    value: "Reach 6 production logos, one partner-sourced customer, one paid workspace or second-entity expansion, and standard deployment below 30 days"
    unit: "milestone"
    source: "[BP milestones 12-24 months + BP experimentRoadmap 9-18 months + BP fundingAsk useOfFundsSummary] the raise is sized to reach seed-ready proof on repeatability, not to finance a full TMS roadmap."
  - id: A22
    name: "Quarterly salary roll convention"
    value: "Y2-Y3 salary rows use actual monthly hires inside each quarter rather than just quarter-end snapshots"
    unit: "convention"
    source: "[headcount column convention + BP team startTiming] this keeps the salary line internally consistent with the monthly hiring ramp."
  - id: A23
    name: "Back-office staffing assumption"
    value: "No dedicated G&A FTE is added through Y3 and bookkeeping, compliance, and payroll administration remain outsourced"
    unit: "operating model"
    source: "[startup-finance heuristic + BP strategicChoices.sequencingRationale] the concentrated market does not justify a standalone internal back-office hire before seed scale."
