scenarios:
  downside:
    description: "Dated triggers slip, pilot-to-production conversion weakens, and implementations stay more bespoke for longer while the cost base is already committed."
    y3RevenueK: 1430.0
    y3EbitdaK: -302.6
    cashLowPointK: 636.3
    keyAssumptionChanges:
      - "A7 customer ramp ends Y3 at 9 paying logos instead of 12."
      - "A6 and A8 exit annualized revenue per paying logo lands near $196K instead of about $208K."
      - "A9 gross margin exits near 73% instead of 75% because implementations remain more manual."
  base:
    description: "Founder-led pilots convert into recurring close infrastructure, connector reuse improves delivery, and modest same-account expansion appears by year 3."
    y3RevenueK: 1871.0
    y3EbitdaK: 52.2
    cashLowPointK: 861.7
    keyAssumptionChanges:
      - "A7 reaches 3 paying logos by M12, 6 by Q4Y2, and 12 by Q4Y3."
      - "A6 and A8 lift exit annualized revenue per paying logo to about $208K with limited workspace or second-entity attach."
      - "A9 reaches 75% gross margin by Q4Y3 as connector templates and tolerance rules standardize onboarding."
  upside:
    description: "Advisor referrals and faster close-cycle proof expand the logo ramp while second-entity and workspace attach shows up earlier than planned."
    y3RevenueK: 2170.0
    y3EbitdaK: 295.0
    cashLowPointK: 938.9
    keyAssumptionChanges:
      - "A7 reaches about 14 paying logos by Q4Y3 instead of 12."
      - "A6 and A8 push exit annualized revenue per paying logo toward about $216K through stronger entity and workspace expansion."
      - "A9 exits near 76% gross margin because repeated connector patterns reduce bespoke implementation work faster than planned."
sensitivity:
  - variable: "ARPU"
    downsideCase: "Exit annualized revenue per paying logo stalls near $190K."
    baseCase: "Exit annualized revenue per paying logo reaches about $208K."
    upsideCase: "More accounts add a workspace or second entity and exit annualized revenue per logo moves toward $216K."
    y3RevenueImpactK: -165.0
    cashImpactK: -125.0
  - variable: "CAC"
    downsideCase: "Founder-led and advisor-led selling underperforms and CAC moves toward $125K."
    baseCase: "CAC stays near $102K because the market is concentrated and referrals matter."
    upsideCase: "Reference customers and advisors keep CAC near $90K."
    y3RevenueImpactK: -80.0
    cashImpactK: -190.0
  - variable: "churn"
    downsideCase: "Monthly churn rises to 3.0% if budgets remain event-triggered."
    baseCase: "Monthly churn holds at 2.0% once the ledger is embedded in close workflow."
    upsideCase: "Monthly churn stays near 1.5% if workspaces and audit trails become sticky."
    y3RevenueImpactK: -95.0
    cashImpactK: -105.0
  - variable: "sales cycle"
    downsideCase: "Pilot-to-production conversion stretches toward 150 days."
    baseCase: "A live pilot converts within about one close cycle plus procurement, or roughly 90-120 days."
    upsideCase: "Two reference wins compress conversion toward 75-90 days."
    y3RevenueImpactK: -300.0
    cashImpactK: -225.0
  - variable: "gross margin"
    downsideCase: "Exit gross margin stalls near 71%."
    baseCase: "Exit gross margin reaches 75% with repeatable connectors."
    upsideCase: "Exit gross margin reaches 77% with faster template reuse and less manual mapping."
    y3RevenueImpactK: 0.0
    cashImpactK: -180.0
  - variable: "hiring pace"
    downsideCase: "The partnerships hire and second implementation hire are pulled forward by two quarters before proof is complete."
    baseCase: "Scale hiring waits for connector and conversion proof and follows A10."
    upsideCase: "The partnerships hire slips into late Y3 because advisor referrals carry more of the pipeline."
    y3RevenueImpactK: -60.0
    cashImpactK: -145.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Trigger[IPO / refinancing / shipper diligence trigger] --> Pilots[Paid pilots]
      Pilots --> Contracts[Annual close-ledger contracts]
      Contracts --> Expansion[Entity and workspace expansion]
      Expansion --> Revenue[Revenue]
      Connectors[Reusable connector templates] --> GrossProfit[Gross profit]
      Revenue --> GrossProfit
      GrossProfit --> Cash[Cash and runway]
modelSanity:
  - checkName: "Revenue engine"
    finding: "Base revenue is driven by growing from 3 paying logos at Y1 exit to 12 by Q4Y3 while blended quarterly revenue per logo rises from pilot-equivalent pricing to about $52K with modest expansion."
  - checkName: "Must go right"
    finding: "Paid pilots must convert into recurring monthly-close infrastructure within one or two close cycles because the model does not fund a large outbound GTM bench before Y3."
  - checkName: "Model breaks if"
    finding: "If trigger-driven demand softens enough to cap the company near 9 logos or if gross margin stays below about 73%, the business stays meaningfully subscale even though the pre-seed still preserves cash."
  - checkName: "Next-round proof"
    finding: "The seed case is 6 production logos, one partner-sourced win, one paid workspace or second-entity expansion, and standard deployment below 30 days by the end of Y2."
sanityChecks:
  ruleOf40: "Y3 growth 114.6% + EBITDA margin 2.8% = 117.4%"
  burnMultiple: "Y2 burn multiple is about 0.8x using roughly $0.45M of EBITDA burn against about $0.59M of net new ARR from Y1 exit to Y2 exit."
  revenuePerFte: "$234K Y3 on 8 ending FTE (benchmark $200-400K SaaS)"
  flags:
    - "The market is concentrated, so missing even a few named accounts in live IPO, refinancing, or shipper-RFP cycles can derail the logo ramp quickly."
    - "Q4Y3 run-rate ARR is about $2.5M, slightly above the research SOM math of about $2.2M, so same-account expansion must appear by year 3 for the base case to hold."
    - "CustomersEop includes paid pilots and first-year production logos, so recurring-only mature contracts lag the headline count through Y1 and early Y2."
    - "Revenue per FTE lands near the low end of SaaS benchmarks because the product still carries implementation weight even after connectors standardize."
    - "Cash is modeled as EBITDA; collections timing, implementation prepayments, or any capitalized product work could move the actual cash trough."
