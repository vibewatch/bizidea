- "name": "Oracle Transportation Management"
  "stage": "incumbent"
  "wedge": "Transportation planning plus freight payment, billing, claims, and logistics intelligence [31][32]."
  "pricing": "Quote-based enterprise suite pricing [31]."
  "strength": "Deepest verified freight-payment and audit feature set in the comp set, with broad ERP connectivity and third-party audit support [31][32][37]."
  "weaknessVsUs": "Implementation scope and enterprise-complexity bias make it a heavy answer for mid-scale hybrid fleets that want a fast, narrow wedge [31][32]."
  "sourceRefs":
