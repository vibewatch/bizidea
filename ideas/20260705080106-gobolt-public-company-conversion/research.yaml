"openQuestions":
- "How many Indian hybrid logistics operators are actually inside a 12-24 month IPO, debt, or enterprise-RFP diligence cycle right now?"
- "Will CFOs buy this as recurring close infrastructure after the headline financing event passes?"
- "Can payout, billing, and trip data be unified quickly enough from current TMS and ERP stacks to avoid a services-heavy rollout?"
- "Do enterprise shippers and lenders want a shared workspace badly enough to expand contract value, or is that feature only defensive?"
