  "validationPlan":
  - "priority": "high"
    "question": "Will two target CFOs share six months of trip, payout, invoice, and close data for a paid design-partner pilot?"
    "evidenceToGather": "Signed pilot LOIs plus sample exports from TMS, ERP, payout, and billing systems."
  - "priority": "high"
    "question": "How many days per month are finance and ops teams currently spending reconciling trip margin and preparing diligence packs?"
    "evidenceToGather": "Time-in-motion interviews with controllers, finance-systems leads, and network-ops managers at 5-8 target operators."
  - "priority": "medium"
    "question": "Will enterprise shippers or lenders pay for shared read-only diligence workspaces, or should that be bundled into the operator contract?"
    "evidenceToGather": "Commercial feedback from three shippers, two lenders, and one advisory firm shown a mock workspace."
  - "priority": "medium"
    "question": "Can the first implementation start from monthly-close CSVs, or do buyers insist on deep API integration from day one?"
    "evidenceToGather": "Technical scoping calls with TMS, ERP, and telematics owners across at least three design partners."
