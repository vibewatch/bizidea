  "pricing": "Custom enterprise pricing and request-demo motion on verified pages [29]."
  "strength": "Strong proof that Indian industrial shippers buy end-to-end freight orchestration when cost and SLA gains are explicit [29][30]."
  "weaknessVsUs": "Centres on supply-chain efficiency and customer service rather than finance-control evidence for IPO or covenant workflows [29][30]."
  "sourceRefs":
