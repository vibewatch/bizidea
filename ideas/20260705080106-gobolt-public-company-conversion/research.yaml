    - 40
  "willingnessToPay":
    "summary": "Budget is strongest when the software replaces a manual war room and prevents financing or shipper-revenue risk; the market already supports paid freight automation from public-plan pricing at SuperProcure to quote-based enterprise TMS, ERP, and reconciliation stacks at Fleetx, Shipsy, and Oracle."
    "sourceRefs":
