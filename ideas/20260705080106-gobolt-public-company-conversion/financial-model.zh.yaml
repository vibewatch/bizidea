slug: hybrid-fleet-margin-ledger
date: '2026-07-05'
currency: USD
modelStartMonth: 2026-08
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-08
  unit: YYYY-MM
  source: '[BP date 2026-07-05] 模型从这份带日期 business plan 之后的第一个完整运营月起算。'
- id: A2
  name: 期初现金 / pre-seed 融资
  value: $2.0M
  unit: USD
  source: '[BP fundingAsk targetFundingRangeUsd $2-3M + BP fundingAsk runwayMonths 18 + model cash curve] 基准情景取计划 pre-seed 区间下沿，因为团队先深耕印度、在验证前不搭大规模服务团队。'
- id: A3
  name: 期初付费客户数
  value: '0'
  unit: count
  source: '[BP executiveSummary + BP milestones 0-12 months] 公司从零收入起步，得先拿下绑定真实月结或尽调事件的付费试点。'
- id: A4
  name: 付费客户定义
  value: 付费试点或持续性的年度月结账本合同
  unit: definition
  source: '[BP gtm.pricing + BP businessModel.revenueStreams] customersEop 统计的是已经为试点或生产范围付费的运营商。'
- id: A5
  name: 试点经济模型
  value: 90 天左右收 $45K，折合每月约 $15K
  unit: USD/logo
  source: '[BP gtm.pricing $30k-$60k pilot + BP investorMemo.firstCustomer.initialContract] 模型取一个法人、一个结账周期试点价格的中位数。'
- id: A6
  name: 正式合同定价与扩张
  value: 正式合同起步接近 $180K ARR，第 3 年末每个付费客户的年化收入升至约 $208K
  unit: USD/logo/year
  source: '[BP gtm.pricing $120k-$300k annual SaaS + BP businessModel.expansionLevers + Research market.som] 基准情景假设到第 3 年出现适度的第二法人或工作区增购，同时仍落在 business plan 的定价带里。'
- id: A7
  name: 客户爬坡
  value: M12 达到 3 个付费客户，Q4Y2 达到 6 个，Q4Y3 达到 12 个
  unit: customersEop
  source: '[BP product.sixMonth + BP product.twelveMonth + BP milestones + Research market.som 12 logos] 模型与计划保持一致：24 个月做到 4–6 个生产客户，36 个月做到约 10–12 个。'
- id: A8
  name: 收入确认约定
  value: 收入 = 期末付费客户数 × 每个付费客户的已实现混合收入；从第 1 年每月 $15K，抬升到第 3 年每季度约 $47K-$52K
  unit: formula
  source: '[A5-A7 + BP businessModel.unitOfValue] 这样做能让收入始终和客户数、同账户扩张计划直接挂钩。'
- id: A9
  name: 毛利率爬坡
  value: 第 1 年毛利率从约 42% 升到 53%，第 2 年从 64% 升到 70%，第 3 年从 72% 升到 75%
  unit: gross margin percent
  source: '[BP businessModel.targetGrossMarginPct 70 + BP operations + Research technologyLandscape and adoptionFrictionMatrix] 早期上线偏重服务，等连接器模板和容差规则复用起来，毛利率才抬得上去。'
- id: A10
  name: 招聘时间表
  value: M1 招创始人 / CEO 与创始工程师，M4 招财务系统负责人，M7 招第二名工程师，M10 招实施负责人，M18 招第三名工程师，M28 招渠道 / 合作负责人，M31 再招一名实施负责人
  unit: timeline
  source: '[BP team startTiming + BP strategicChoices.sequencingRationale] 招聘顺序遵循计划：先把脏数据和交付风险压住，再在生产证明出来后补渠道能力。'
- id: A11
  name: 创始人 / CEO 全成本薪酬
  value: $150K
  unit: USD/year
  source: '[startup-finance heuristic for India-first enterprise founders] 现金薪酬虽然克制，但仍要覆盖创始人主导销售的差旅和高管责任。'
- id: A12
  name: 工程师全成本薪酬
  value: $115K
  unit: USD/year
  source: '[startup-finance heuristic for senior data and integration engineers in India-focused B2B SaaS] 公司需要足够强的对账与连接器人才，但不按湾区薪资水平假设。'
- id: A13
  name: 财务系统 / 解决方案全成本薪酬
  value: $100K
  unit: USD/year
  source: '[BP team finance systems / solutions lead + startup-finance heuristic] 这个岗位负责数据映射和月结工作流设计，不是去搭一整支咨询团队。'
- id: A14
  name: 客户成功 / 实施全成本薪酬
  value: $80K
  unit: USD/year
  source: '[BP team customer success / implementation lead + startup-finance heuristic] 这反映的是以印度为先的团队里，亲手做上线和持续月结支持的成本。'
- id: A15
  name: GTM / 合作全成本薪酬
  value: $125K
  unit: USD/year
  source: '[BP gtm.channels + BP experimentRoadmap partner motion + startup-finance heuristic] 第一位专职渠道岗位，是偏后期的合作与企业销售负责人。'
- id: A16
  name: 薪资分摊到 P&L 科目
  value: 创始人：75% S&M / 10% R&D / 15% G&A；工程：100% R&D；财务系统：45% S&M / 55% R&D；实施：70% S&M / 30% G&A；GTM：100% S&M
  unit: allocation
  source: '[BP team role rationales + BP operations] 各岗位薪资按其在前三年里主要服务的职能来分摊。'
- id: A17
  name: 非薪资 OPEX 爬坡
  value: 每月非薪资支出从 M1-M3 的约 $21K，升到 Q4Y3 的约 $46K
  unit: USD/month
  source: '[BP operations + BP gtm.channels + startup-finance heuristic] 这部分覆盖云基础设施、差旅、实施外包、法务、审计和伙伴赋能，不假设提前砸大规模付费获客。'
- id: A18
  name: 现金转换约定
  value: 现金变动等于 EBITDA
  unit: formula
  source: '[startup-finance heuristic] 在这个阶段，相比经营 burn，capex、税、汇率和营运资金时点都假设不重要。'
- id: A19
  name: 稳态月流失率
  value: 2.0%
  unit: percent per month
  source: '[BP risks recurring budget unproven + startup-finance heuristic for early enterprise workflow SaaS] 这套工作流一旦嵌进月结会比较粘，但模型仍保守，因为有些预算可能还是事件驱动。'
- id: A20
  name: CAC 口径
  value: 36 个月总销售与营销支出 ÷ 12 个净新增付费客户
  unit: formula
  source: '[model calc using base-case S&M spend + BP gtm.funnelTargets] 这把创始人主导、转介绍驱动和后期伙伴获客都算进建造期。'
- id: A21
  name: 下一轮融资里程碑
  value: 做到 6 个生产客户、1 个合作方带来的客户、1 个付费工作区或第二法人扩张，并把标准部署压到 30 天以内
  unit: milestone
  source: '[BP milestones 12-24 months + BP experimentRoadmap 9-18 months + BP fundingAsk useOfFundsSummary] 这轮融资的目标，是把可复制性证明做到能接 seed，而不是去资助一张完整 TMS 路线图。'
- id: A22
  name: 季度薪资滚算约定
  value: 第 2–3 年的 salary 行按季度内真实月度招聘滚算，而不是只看季度末快照
  unit: convention
  source: '[headcount column convention + BP team startTiming] 这样 salary 行才和月度招聘爬坡保持一致。'
- id: A23
  name: 后台人员假设
  value: 到第 3 年都不新增专职 G&A FTE，记账、合规和薪资行政继续外包
  unit: operating model
  source: '[startup-finance heuristic + BP strategicChoices.sequencingRationale] 市场过于集中，还不值得在 seed 前专门养一名内部后台人员。'
