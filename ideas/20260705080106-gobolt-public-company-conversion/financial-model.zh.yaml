scenarios:
  downside:
    description: 带明确日期的触发点后移，试点转生产变弱，而成本基盘已经上来了；与此同时，实施在更长时间里仍然偏定制。
    y3RevenueK: 1430.0
    y3EbitdaK: -302.6
    cashLowPointK: 636.3
    keyAssumptionChanges:
    - A7 的客户爬坡在 Y3 末只到 9 个付费客户，而不是 12 个。
    - A6 和 A8 对应的期末每个付费客户年化收入只有约 $196K，而不是约 $208K。
    - A9 的毛利率期末只到约 73%，而不是 75%，因为实施仍更依赖人工。
  base:
    description: 创始人主导的试点顺利转成持续性的月结基础设施，连接器复用改善交付，第 3 年出现适度的同账户扩张。
    y3RevenueK: 1871.0
    y3EbitdaK: 52.2
    cashLowPointK: 861.7
    keyAssumptionChanges:
    - A7 在 M12 达到 3 个付费客户、Q4Y2 达到 6 个、Q4Y3 达到 12 个。
    - A6 和 A8 把期末每个付费客户的年化收入抬到约 $208K，只出现有限的工作区或第二法人增购。
    - A9 在 Q4Y3 达到 75% 毛利率，因为连接器模板和容差规则把上线标准化了。
  upside:
    description: 顾问转介和更快的月结证明把客户爬坡推高，第二法人和工作区增购也比计划更早出现。
    y3RevenueK: 2170.0
    y3EbitdaK: 295.0
    cashLowPointK: 938.9
    keyAssumptionChanges:
    - A7 在 Q4Y3 做到约 14 个付费客户，而不是 12 个。
    - A6 和 A8 借着更强的法人和工作区扩张，把期末每个付费客户的年化收入推到约 $216K。
    - A9 的期末毛利率接近 76%，因为重复连接器模式更快压缩了定制实施工作。
sensitivity:
- variable: ARPU
  downsideCase: 期末每个付费客户的年化收入卡在约 $190K。
  baseCase: 期末每个付费客户的年化收入达到约 $208K。
  upsideCase: 更多账户增购工作区或第二法人，期末每个客户的年化收入抬到约 $216K。
  y3RevenueImpactK: -165.0
  cashImpactK: -125.0
- variable: CAC
  downsideCase: 创始人主导销售和顾问转介绍都跑弱，CAC 往 $125K 靠。
  baseCase: 市场集中、转介绍又重要，所以 CAC 稳在约 $102K。
  upsideCase: 参考客户和顾问帮忙带单，让 CAC 维持在约 $90K。
  y3RevenueImpactK: -80.0
  cashImpactK: -190.0
- variable: 流失率
  downsideCase: 如果预算始终由事件触发，月流失率会上到 3.0%。
  baseCase: 账本嵌进月结工作流后，月流失率稳在 2.0%。
  upsideCase: 如果工作区和审计轨迹变得很粘，月流失率会靠近 1.5%。
  y3RevenueImpactK: -95.0
  cashImpactK: -105.0
- variable: 销售周期
  downsideCase: 试点转生产拖到接近 150 天。
  baseCase: 真实试点在一个月结周期外加采购流程内转正，大致是 90–120 天。
  upsideCase: 两个参考案例就能把转化压到 75–90 天。
  y3RevenueImpactK: -300.0
  cashImpactK: -225.0
- variable: 毛利率
  downsideCase: 期末毛利率卡在约 71%。
  baseCase: 凭可复用连接器把期末毛利率拉到 75%。
  upsideCase: 模板复用更快、人工映射更少，期末毛利率升到 77%。
  y3RevenueImpactK: 0.0
  cashImpactK: -180.0
- variable: 招聘节奏
  downsideCase: 在验证还没完成前，就把合作负责人和第二位实施负责人各提前两个季度招进来。
  baseCase: 招聘扩张等到连接器与转化证明出现后，再按 A10 的节奏走。
  upsideCase: 顾问转介绍扛起更多商机，因此合作负责人推迟到 Y3 后段才入职。
  y3RevenueImpactK: -60.0
  cashImpactK: -145.0
modelDiagram:
  title: 单位经济流转
  mermaid: "flowchart LR\n  Trigger[IPO / refinancing / shipper diligence trigger] --> Pilots[Paid pilots]\n  Pilots --> Contracts[Annual close-ledger contracts]\n  Contracts --> Expansion[Entity and workspace expansion]\n  Expansion --> Revenue[Revenue]\n  Connectors[Reusable connector templates] --> GrossProfit[Gross profit]\n  Revenue --> GrossProfit\n  GrossProfit --> Cash[Cash and runway]\n"
modelSanity:
- checkName: 收入引擎
  finding: 基准收入的核心，是把付费客户从 Y1 末的 3 个拉到 Q4Y3 的 12 个，同时每个客户的混合季度收入从试点等价价格，抬到有轻度扩张后的约 $52K。
- checkName: 必须跑通的事
  finding: 付费试点必须在 1–2 个结账周期里转成持续性的月结基础设施，因为模型直到 Y3 前都没有为大规模外呼 GTM 团队留预算。
- checkName: 模型失真条件
  finding: 如果触发型需求转弱，把公司天花板压在 9 个客户左右，或毛利率始终上不去 73%，这门生意就算 pre-seed 还能保住现金，也会明显跑不出规模。
- checkName: 下一轮证明点
  finding: 到 Y2 末，seed 故事必须拿出 6 个生产客户、1 个合作方带来的胜单、1 个付费工作区或第二法人扩张，以及 30 天以内的标准部署。
sanityChecks:
  ruleOf40: 第 3 年增长 114.6% + EBITDA 利润率 2.8% = 117.4%
  burnMultiple: 第 2 年 burn multiple 约 0.8x：以约 $0.45M 的 EBITDA burn，对应 Y1 末到 Y2 末约 $0.59M 的净新增 ARR。
  revenuePerFte: 第 3 年每名 FTE 对应收入约 $234K；期末 8 名 FTE（SaaS 基准 $200-400K）
  flags:
  - 市场高度集中，所以只要少掉几个正处在 IPO、再融资或货主 RFP 周期里的目标账户，客户爬坡就会很快脱轨。
  - Q4Y3 的 run-rate ARR 约 $2.5M，略高于研究里约 $2.2M 的 SOM 测算；因此第 3 年必须出现同账户扩张，基准情景才站得住。
  - customersEop 同时包含付费试点和首年生产客户，因此直到第 1 年和第 2 年前段，真正成熟的经常性合同数量都会落后于 headline count。
  - 每名 FTE 收入落在 SaaS 基准下沿附近，因为即便连接器标准化后，产品仍然带着不小的实施重量。
  - 现金按 EBITDA 建模；回款节奏、实施预付款或资本化产品开发，都会改变真实现金低点。
