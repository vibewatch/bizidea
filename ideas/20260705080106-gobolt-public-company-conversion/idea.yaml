topRisks:
  - name: Evidence breadth
    description: The idea is grounded in one concrete July 4 source, so the market may be narrower or later than it appears.
    mitigation: Start with two design partners already entering IPO, debt, or enterprise diligence and validate whether month-end close and diligence pain is acute enough to pay for.
  - name: Integration drag
    description: Trip, carrier, and billing data may be fragmented across multiple operational and finance systems, slowing time to value.
    mitigation: Launch with monthly-close and diligence workflows that can begin from CSV and API ingestion before expanding into deeper real-time integrations.
  - name: Trigger-dependent budget
    description: CFOs may view the product as a one-off IPO project instead of a recurring software category.
    mitigation: Position the first module around ongoing monthly close, lender reporting, and shipper diligence so ROI persists after the financing milestone.
