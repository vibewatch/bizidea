jobsToBeDone:
  - job: >-
      When a logistics platform begins IPO-readiness or lender diligence, help
      the CFO reconcile trip-level revenue and carrier costs, so they can
      defend quality of earnings without a manual war room.
    currentAlternative: >-
      Exporting data from TMS and finance systems into spreadsheets and asking
      operations teams to explain exceptions manually
    successMetric: >-
      Days to produce a board- or lender-ready monthly pack and percentage of
      trips reconciled without manual intervention
  - job: >-
