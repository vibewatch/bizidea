problem: >-
  Hybrid logistics platforms close the month across owned vehicles, contracted
  carriers, trip records, and shipper invoices that rarely reconcile cleanly at
  load level. Once a company starts IPO prep, debt diligence, or enterprise
  procurement reviews, the painful gap is not dispatch planning but
  disclosure-grade evidence for margin, carrier reliability, and cash leakage.
  Finance teams end up stitching dashboards and spreadsheets together while
  operations teams scramble to explain exceptions after the fact.
targetUser:
  primary: >-
    CFO and controllership teams at Indian hybrid-asset logistics platforms
    running line-haul and short-haul networks with 1,000-10,000 contracted
    trucks
  secondary: >-
    Heads of network operations and carrier management who own trip execution
    data and contracted-truck performance
  buyer: >-
    CFO or VP finance preparing the company for IPO, structured debt, or
    enterprise procurement diligence
startupThesis:
  nonObviousInsight: >-
    The real bottleneck for scaled logistics startups is shifting from dispatch
    optimization to trust infrastructure: once a hybrid network becomes
    profitable enough to list, every trip becomes a disclosure object, not just
    an ops event.
  beachhead: >-
    Indian logistics-tech operators with hybrid asset models, profitable or
    near-profitable unit economics, and 1,000-10,000 empanelled trucks that
    expect an IPO, large debt facility, or Fortune 500 shipper diligence
    process within 12-24 months
  wedge: >-
    A trip-margin and carrier-controls ledger that reconciles operational trip
    data, carrier payouts, and shipper billing into board-ready KPIs,
    lender-ready covenant packs, and auditable exception queues
  whyNowCatalyst: >-
    GoBolt's conversion to a public limited company shows that mid-scale
    logistics startups are crossing from growth-at-all-costs into capital-market
    scrutiny, where messy carrier data suddenly becomes a financing blocker.
  ventureScalePath: >-
    Start with pre-IPO logistics platforms, then expand into PE-backed 3PLs,
    fleet lenders, and enterprise shipper procurement teams that all need the
    same verified operating ledger across fragmented carrier networks.
solution: >-
  The product sits on top of the operator's existing TMS, fleet-management, and
  finance workflows rather than replacing them. It creates a canonical trip
  ledger that attributes revenue, carrier cost, and service exceptions to each
  load, then flags unreconciled or non-defensible trips before month-end closes
  or diligence requests. It auto-builds board metrics such as lane contribution,
  carrier concentration, and exception aging with drill-through evidence instead
  of screenshot-heavy decks. Over time, the same ledger becomes the interface
  used by lenders, auditors, and large enterprise shippers to evaluate whether
  the network deserves cheaper capital or larger lane awards.
