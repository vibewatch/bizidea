openQuestions:
- 现在真正处在 12–24 个月 IPO、债务或企业 RFP 尽调周期里的印度混合型物流运营商，到底有多少家？
- 头条融资事件过去后，CFO 还会不会把这东西当成持续性的月结基础设施来买？
- 现有 TMS 和 ERP 栈里的结算、计费和车次数据，能不能足够快地统一起来，而不滑向重服务实施？
- 企业货主和贷方到底有没有强烈到愿意付费的共享工作区需求，还是说这项功能更多只是防守？
