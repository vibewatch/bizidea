regulatoryTechnicalConstraints:
  - point: "当提示词不能离开特定区域或经审批的供应商集合时，欧盟区域内路由和供应商日志控制是必须考量的因素。"
    sourceRefs: [4, 31]
  - point: "提示词注入、敏感信息泄露和过度代理风险，需要推理前后的防护措施和审计追踪。"
    sourceRefs: [23, 32]
  - point: "各云的供应商、缓存和 token 语义存在差异，给统一策略执行带来复杂性。"
    sourceRefs: [24, 25, 29]
  - point: "企业部署通常需要 RBAC、SSO、VPC 或区域控制和持久审计日志，才能通过采购审核。"
    sourceRefs: [5, 10, 20]
validationSignals:
  - point: "OpenRouter 报告每月约 100 万亿 token 和超过 800 万用户，印证了真实的多模型流量管理需求。"
    sourceRefs: [1, 2]
  - point: "Portkey 突出一个客户每月运行 3,000 万次策略、跨越 25 个以上 GenAI 用例，表明治理活动已在规模化运转。"
    sourceRefs: [12]
  - point: "一位 Portkey 客户明确表示 OpenAI 和 Azure 的规模化报告能力不足，说明原生供应商工具的可见性仍然碎片化。"
    sourceRefs: [12]
  - point: "Humanloop 引用 Dixa 的说法：在通过平台评估新模型之前，不会做出新的 LLM 部署决策。"
    sourceRefs: [21]
  - point: "Humanloop 引用 Filevine 的案例：在引入专用工具前，法律专家通过电子表格驱动评估流程。"
    sourceRefs: [21]
