scenarios:
  downside:
    description: One-quarter slower enterprise close cycles, $228K ARR instead of $252K, and gross margin held at 68% keep the company in extended pilot mode.
    y3RevenueK: 3360.0
    y3EbitdaK: -1120.0
    cashLowPointK: 180.0
    keyAssumptionChanges:
    - ARPU annualized from $252K to $228K
    - Y2-Y3 customer adds slip back roughly one quarter
    - Gross margin held at 68% instead of 72%
  base:
    description: Founder-led pilots turn into a steady enterprise sales cadence, reaching 20 paid workflows and ~$5.0M exit ARR by Y3-end.
    y3RevenueK: 4410.0
    y3EbitdaK: -426.8
    cashLowPointK: 1123.8
    keyAssumptionChanges:
    - Uses assumptions A2-A21 as modeled
    - Hiring continues only after customer proof
    - Pricing stays near the research-backed $250K workflow-governance ACV anchor
  upside:
    description: A partner channel starts working in Y2, usage tiers lift ARR to $264K, and the company exits Y3 with 22 paid workflows.
    y3RevenueK: 5145.0
    y3EbitdaK: 120.0
    cashLowPointK: 1410.0
    keyAssumptionChanges:
    - ARPU annualized from $252K to $264K
    - Two additional Y3 workflow wins arrive via partner-sourced deals
    - Gross margin improves to 74% as onboarding becomes more repeatable
