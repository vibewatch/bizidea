modelDiagram:
  title: workflow governance revenue model
  mermaid: |-
    flowchart LR
      Trigger[Budget or renewal trigger] --> Pilot[Paid pilot workflow]
      Pilot --> Prod[Production-governed workflow]
      Prod --> Rev[Subscription and usage revenue]
      Rev --> GP[Gross profit at 72%]
      GP --> Cash[Cash runway for next milestones]
modelSanity:
- checkName: Revenue engine
  finding: Base-case revenue is driven by reaching 20 paid governed workflows at roughly $252K ARR each, not by broad SMB logo volume.
- checkName: Must go right
  finding: The company needs 2-3 paid pilots in Y1 and then a steady 2-workflow-per-quarter cadence through Y2 without pulling hiring materially ahead of proof.
- checkName: Model breaks if
  finding: If sales cycles slip by a quarter and gross margin stays below 68%, the downside case drives cash close to zero even on a $3.0M seed.
- checkName: Next-round proof
  finding: Hitting 12 paid workflows, at least 2 converted annual accounts, and a repeatable partner-sourced pipeline by Q4Y2 is the milestone that supports the next financing.
sanityChecks:
  ruleOf40: Y3 growth 116.5% + EBITDA margin -9.7% = 106.8%
  burnMultiple: Y2 burn multiple 0.41x improving to Y3 burn multiple 0.21x on ~$2.0M net new ARR each year.
  revenuePerFte: $276K Y3 using Q4Y3 16 FTE (benchmark $200-400K enterprise SaaS)
  flags:
  - The model assumes a narrow Fortune-1000 beachhead can still add 8 new paid workflows in both Y2 and Y3; this requires disciplined qualification and referenceable wins.
  - Gross margin stays above the 70% plan target only because services remain light; heavier custom integration work would pressure the model quickly.
  - Cash never turns negative in the base case, but that depends on keeping the Y2-Y3 hiring ramp milestone-gated rather than front-loading a larger sales team.
