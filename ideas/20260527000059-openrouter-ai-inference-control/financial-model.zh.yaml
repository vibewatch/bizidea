modelDiagram:
  title: 工作流治理收入模型
  mermaid: |-
    flowchart LR
      Trigger[Budget or renewal trigger] --> Pilot[Paid pilot workflow]
      Pilot --> Prod[Production-governed workflow]
      Prod --> Rev[Subscription and usage revenue]
      Rev --> GP[Gross profit at 72%]
      GP --> Cash[Cash runway for next milestones]
modelSanity:
- checkName: 收入引擎
  finding: "基础情景收入由达到 20 个付费受管控工作流（每个约 $252K ARR）驱动，而非靠大量中小企业客户数量。"
- checkName: 必须做对的事
  finding: "公司需要在 Y1 拿下 2–3 个付费试点，然后在 Y2 保持每季度 2 个工作流的稳定节奏，同时不将招聘显著提前于验证。"
- checkName: 模型崩溃的条件
  finding: "若销售周期推迟一个季度且毛利率持续低于 68%，即便在 $3.0M 种子轮情况下，悲观情景也会将现金逼近零。"
- checkName: 下轮融资验证条件
  finding: "在 Q4Y2 前达到 12 个付费工作流、至少 2 个已转化的年度账户以及可重复的合作伙伴来源销售管道，是支撑下次融资的里程碑。"
sanityChecks:
  ruleOf40: "Y3 增长率 116.5% + EBITDA 利润率 -9.7% = 106.8%"
  burnMultiple: "Y2 燃烧倍数 0.41x，Y3 在每年约 $2.0M 净新增 ARR 基础上改善至 0.21x。"
  revenuePerFte: "Y3 人均收入 $276K，基于 Q4Y3 16 名 FTE（企业 SaaS 基准 $200–$400K）"
  flags:
  - "模型假设窄幅 Fortune 1000 滩头市场在 Y2 和 Y3 均能新增 8 个付费工作流；这需要严格的资格审查和可参考的成功案例。"
  - "毛利率高于 70% 计划目标，仅因服务量保持轻量；一旦定制集成工作量加重，模型将迅速承压。"
  - "基础情景下现金从不转负，但这依赖于将 Y2–Y3 招聘节奏与里程碑挂钩，而非提前扩大销售团队。"
