    - "年化 ARPU 从 $252K 降至 $228K"
    - "Y2–Y3 客户新增约推迟一个季度"
    - "毛利率维持在 68%（而非 72%）"
  base:
    description: "创始人主导的试点转化为稳定的企业销售节奏，Y3 末达到 20 个付费工作流，退出 ARR 约 $5.0M。"
    y3RevenueK: 4410.0
    y3EbitdaK: -426.8
    cashLowPointK: 1123.8
    keyAssumptionChanges:
    - "使用假设 A2–A21 按模型推演"
    - "仅在客户验证后继续招聘"
    - "定价维持在研究支撑的 $250K 工作流治理 ACV 锚点附近"
  upside:
    description: "合作伙伴渠道在 Y2 开始奏效，用量档位将 ARR 提升至 $264K，公司以 22 个付费工作流退出 Y3。"
    y3RevenueK: 5145.0
    y3EbitdaK: 120.0
