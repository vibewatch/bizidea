    rationale: OpenRouter's growth, investor set, and enterprise usage metrics indicate a real category transition rather than a one-off funding event.
  painIntensity:
    score: 4
    rationale: High token volumes and multi-vendor sprawl create immediate spend and governance pain, though the problem is strongest in larger enterprises first.
  wedgeClarity:
    score: 4
