topRisks:
  - name: Platform squeeze
    description: OpenRouter, hyperscalers, or gateway vendors could add more governance features and narrow the product gap.
    mitigation: Own workflow-specific approvals, audit evidence, and finance workflows that horizontal gateways do not prioritize and that buyers embed into internal controls.
  - name: Slow enterprise adoption
    description: Buyers may tolerate manual processes longer than expected if AI programs are still centralized and small.
    mitigation: Sell into customers already above $500k monthly token spend and lead with a savings recovery pilot tied to a live vendor renewal or budget overrun.
  - name: Routing mistakes damage trust
    description: A bad recommendation or policy misconfiguration could degrade a production workflow and make the platform politically risky.
    mitigation: Start in read-only and shadow mode, restrict automated changes to low-risk workflows, and require explicit approvals before any production route switch.
