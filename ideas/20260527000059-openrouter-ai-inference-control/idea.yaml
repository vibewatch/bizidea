jobsToBeDone:
  - job: When model prices or quality shift, help a central AI platform team approve and roll out a safer route change, so they can cut spend without breaking production workflows.
    currentAlternative: Manual benchmarking, ad hoc replay scripts, and change tickets across security and finance teams
    successMetric: Route changes approved in days instead of weeks with measurable cost savings and no policy violations
  - job: When finance asks where token spend went, help an AI platform lead attribute usage by workflow and vendor, so they can defend budget and push accountability to business units.
    currentAlternative: Spreadsheet chargebacks built from vendor dashboards and inconsistent internal tagging
    successMetric: More than 95% of monthly spend mapped to owners, workflows, and approved policies before close
