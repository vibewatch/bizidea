topRisks:
  - name: 平台挤压
    description: "OpenRouter、超大规模云厂商或网关供应商可能增加更多治理功能，压缩产品差距。"
    mitigation: "牢牢把持工作流级审批、审计证据和财务工作流——横向网关不会优先处理这些，且买家已将其嵌入内部管控流程。"
  - name: 企业采用缓慢
    description: "如果 AI 项目仍然集中且规模较小，买家可能比预期更长时间容忍人工流程。"
    mitigation: "只面向每月 token 支出已超过 $500k 的客户销售，并以与活跃供应商续约或预算超支挂钩的节省回收试点作为切入点。"
  - name: 路由失误损害信任
    description: "错误的推荐或策略配置失当可能导致生产工作流降级，使平台在政治上变得危险。"
    mitigation: "从只读和影子模式起步，将自动化变更限制在低风险工作流，任何生产路由切换前均需明确审批。"
