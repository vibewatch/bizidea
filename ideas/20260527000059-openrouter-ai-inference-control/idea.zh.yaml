  buyingTrigger: "预算超支、供应商续约，或在不拖慢现有 AI 上线节奏的前提下须引入第二或第三家模型供应商的授权"
  currentAlternative: "内部 API 网关加电子表格、供应商仪表板和基于工单的安全审查"
  switchingReason: "产品无需团队重写应用或更换现有网关，即可立即交付节省成果和审计证据"
  pricingHypothesis: "年度平台费起价约 $150k，用量档位与受管控的月度 token 量和生产工作流数量挂钩"
