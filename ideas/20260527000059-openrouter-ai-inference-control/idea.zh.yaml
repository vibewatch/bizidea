problem: >-
  大型企业不再是选定一个基础模型后标准化使用一年。它们要同时驾驭数十个团队、多家供应商、不断变化的价格、新的开放权重端点，以及为年度 SaaS 采购而非每周推理变更所设计的安全审查流程。一旦 token 消耗量越过实质性支出门槛，人工路由规则、电子表格费用分摊和基于工单的审批就会成为瓶颈，拖慢节省成本的步伐，并放大策略违规风险。
targetUser:
  primary: "Fortune 1000 金融服务或软件公司的 AI 平台负责人，在至少三家模型供应商上运行 20 个以上生产 copilot"
  secondary: "FinOps 负责人或 ML 平台工程经理，负责 token 预算、供应商治理和模型上线安全"
  buyer: "基础设施副总裁、CIO 办公室或 AI 平台负责人"
startupThesis:
  nonObviousInsight: >-
    多模型 AI 的制胜层不是又一个网关，而是一套记录系统——清楚说明谁被允许在哪种数据策略下、以多少预算、使用哪个模型，并在答案每周都在变化时留下证据。
  beachhead: >-
    Fortune 1000 金融服务和软件公司的中央 AI 平台团队，每月 LLM 支出超过 $500k，运行 20 个以上内部或面向客户的 copilot，生产环境中已有三家或以上经审批的模型供应商。
  wedge: >-
    一个工作流级治理账本——对路由切换进行影子测试、按请求执行经审批的模型和数据处理策略，并为每个生产工作流自动生成审计和费用分摊记录。
  whyNowCatalyst: >-
    OpenRouter 每月 100 万亿 token 的激增以及向持续多模型路由的转变，意味着企业现在就需要变更管理基础设施——否则模型蔓延将演变为失控的支出和合规偏离。
  ventureScalePath: >-
    从高支出 copilot 的治理层起步，逐步扩展至企业 AI 采购、基准驱动的供应商优化、自动化策略认证，最终成为跨云、跨供应商、跨业务单元所有模型和代理流量的操作系统。
solution: >-
  Workflow Model Governor 接入现有 LLM 网关、应用日志和身份系统，为每个 AI 工作流建立策略账本。团队在工作流层面（而非逐个应用硬编码）定义经审批的模型、数据类别、延迟目标、回退规则和预算上限。产品将新模型以影子模式运行于生产 trace 之上，利用外部基准和定价信号推荐安全的路由切换，并生成审计包——记录变更内容、审批人及支出变化。财务团队获得费用分摊和预测视图，安全团队获得策略执行证据，产品团队无需每次市场变动时重写路由逻辑便可采用更便宜或更好的模型。
