scenarios:
  downside:
    description: Only three beachhead programs convert, pricing stays closer to feasibility-heavy work, and gross margin tops out in the mid-60s because transfer work remains bespoke.
    y3RevenueK: 3720.0
    y3EbitdaK: -620.0
    cashLowPointK: 180.0
    keyAssumptionChanges:
    - Q4Y3 customersEop ends at 3 instead of 4.
    - Blended realized revenue per active program is about 15 percent below base in Y3.
    - Gross margin exits near 66 percent instead of 73 percent because QA and transfer work do not standardize on time.
  base:
    description: Three paid studies convert into four active beachhead programs, transfer documentation becomes reusable by Y2, and late-Y3 revenue approaches the researched $1.5M per-program cadence.
    y3RevenueK: 5160.0
    y3EbitdaK: 50.0
    cashLowPointK: 878.9
    keyAssumptionChanges:
    - 3 active customer programs by M12 and 4 by Q3Y2.
    - Blended realized revenue per active program rises from about $100K per month in first paid studies to about $130K by Q4Y3.
    - Gross margin clears the 70 percent target only in Y3 after the QC and transfer layer becomes reusable.
  upside:
    description: A fifth program arrives late in Y3, transfer reuse is proven earlier, and QC subscriptions attach sooner than planned.
    y3RevenueK: 6480.0
    y3EbitdaK: 620.0
    cashLowPointK: 930.0
    keyAssumptionChanges:
    - Q4Y3 customersEop reaches 5 instead of 4.
    - A second program or QC subscription lands inside at least one existing customer by mid-Y3.
    - Gross margin exits near 76 percent because assay and documentation reuse outpaces the base case.
sensitivity:
- variable: ARPU
  downsideCase: Full-program milestone timing slips and realized Y3 revenue per active program lands about 10 percent below plan.
  baseCase: Y3 blended annualized revenue per active program is about $1.29M.
  upsideCase: Milestones and QC subscriptions lift realized Y3 program revenue about 10 percent above plan.
  y3RevenueImpactK: -516.0
  cashImpactK: -380.0
- variable: CAC
  downsideCase: Founder-led selling lasts longer and each won program effectively costs about $260K to acquire.
  baseCase: First four programs cost about $204K each to win.
  upsideCase: CDMO and foundation referrals pull effective CAC toward $160K.
  y3RevenueImpactK: -150.0
  cashImpactK: -420.0
- variable: churn
  downsideCase: Monthly churn rises to 8 percent because customers finish the first transfer but do not renew into the next scope.
  baseCase: Monthly churn holds at 6 percent across the small beachhead.
  upsideCase: Monthly churn falls to 4 percent as the documentation layer keeps customers engaged beyond the first transfer.
  y3RevenueImpactK: -260.0
  cashImpactK: -210.0
- variable: sales cycle
  downsideCase: Paid studies slip by one to two quarters because financing or IND windows move.
  baseCase: Milestone-driven selling closes the first study by M7 and fills the fourth program by Q3Y2.
  upsideCase: Referral channels compress diligence and bring the fourth program in by Q1Y2.
  y3RevenueImpactK: -780.0
  cashImpactK: -520.0
- variable: gross margin
  downsideCase: Margin exits at 66 percent because assay and QA work remain custom.
  baseCase: Margin exits at 73 percent in Q4Y3 after the transfer stack standardizes.
  upsideCase: Margin exits at 76 percent if reuse and partner handoff work faster than planned.
  y3RevenueImpactK: 0.0
  cashImpactK: -330.0
- variable: hiring pace
  downsideCase: The company hires adjacent-lineage and GTM roles one to two quarters earlier without matching revenue pull-through.
  baseCase: Hiring tracks the narrow sequencing plan in the business plan.
  upsideCase: Two later-stage hires move out by one quarter because transfer tooling proves more reusable than expected.
  y3RevenueImpactK: 0.0
  cashImpactK: -460.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      TargetAccounts --> PaidFeasibility
      PaidFeasibility --> FullProgram
      FullProgram --> TransferMilestones
      TransferMilestones --> QCSubscription
      QCSubscription --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
- checkName: Revenue engine
  finding: Base-case revenue comes from converting three early paid studies into four active beachhead programs that exit Y3 near the researched $1.5M per-program run rate.
- checkName: Must go right
  finding: The first transfer packets must be good enough that customers fund follow-on milestone work instead of treating each engagement as a one-off rescue project.
- checkName: Model breaks if
  finding: If the company stalls at three programs or gross margin stays in the mid-60s, the downside case pushes cash close to the floor before adjacent-lineage proof exists.
- checkName: Next-round proof
  finding: The next financing is justified once four active programs, two repeatable transfers, and one adjacent-lineage pilot show the foundry compounds data rather than custom lab work alone.
sanityChecks:
  ruleOf40: Y3 growth 73.7% + EBITDA margin 1.0% = 74.7%
  burnMultiple: Y2 burn multiple about 0.7x using EBITDA burn divided by year-over-year revenue growth; directional only because revenue is milestone-heavy rather than pure ARR.
  revenuePerFte: $430.0K Y3 revenue per end-of-year FTE (healthy for a specialized bio-services-plus-software model, though not directly comparable to SaaS).
  flags:
  - The visible beachhead is only about 10 teams, so the base case already assumes a high share of a narrow market.
  - CAC, churn, and average customer life are still heuristic because no cohort data yet exists for a neutral beta-cell recipe foundry.
  - Gross margin does not reach the 70 percent target until Y3, so another year of bespoke transfer work would likely force a larger next raise.
