slug: beta-cell-recipe-foundry
date: '2026-06-22'
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: Model start month
  value: 2026-07
  unit: YYYY-MM
  source: '[BP date 2026-06-22] the financial model starts in the first full month after the dated business plan.'
- id: A2
  name: Opening cash from the pre-seed round
  value: $4.0M
  unit: USD
  source: '[BP fundingAsk targetFundingRangeUsd $4–6M + BP fundingAsk runwayMonths 18] base case uses the bottom of the stated range because hiring stays narrow until transfer reuse is proven.'
- id: A3
  name: Starting active paying customers
  value: '0'
  unit: count
  source: '[BP product.sixMonth + BP milestones 0–12 months] the company starts pre-revenue and must first close design partners before any paid work is recognized.'
- id: A4
  name: Customer counting convention
  value: One therapeutic program under any paid feasibility, recipe-license, transfer, or QC-documentation scope
  unit: definition
  source: '[BP businessModel.unitOfValue + BP gtm.pricing] customersEop counts paid programs rather than all logos because the commercial unit is a customer program.'
- id: A5
  name: Paid feasibility economics
  value: $250K–$500K first study; base case uses about $300K recognized over ~3 months (~$100K per month)
  unit: USD/program
  source: '[BP investorMemo.firstCustomer.initialContract + BP market.buyingProcess 6–12 week paid feasibility] the model uses a lower-midpoint study value to stay conservative on first-customer pricing.'
- id: A6
  name: Full-program economics
  value: About $1.0M–$1.5M of recipe-license plus transfer milestones after feasibility; base case blends toward ~$1.2M per program
  unit: USD/program
  source: '[BP investorMemo.firstCustomer.initialContract + BP market.som + Research market.som] full-program value is anchored to the plan''s stated milestone pricing and the researched $1.5M beachhead engagement value.'
- id: A7
  name: Customer ramp
  value: 1 paid program by M7, 3 by M12, 4 by Q3Y2, and 4 active programs through Y3
  unit: customersEop
  source: '[BP milestones 0–12, 12–24, and 24–36 months + BP operatingAssumptions first 4 of 10 beachhead teams buy within 36 months] the model reaches the BP year-three four-program SOM path but does not assume more beachhead breadth than the research supports.'
- id: A8
  name: Revenue recognition convention
  value: Revenue equals period-end active programs multiplied by the blended realized revenue per active program for that period
  unit: formula
  source: '[BP gtm.pricing + BP businessModel.revenueStreams] this keeps every revenue line directly reconcilable to customersEop times blended ARPU.'
- id: A9
  name: Blended realized revenue per active program ramp
  value: About $100K per month in first paid studies, ~$80K per month by Q3Y2 during mixed pilot and transfer phases, and ~$130K per month by Q4Y3 as four programs reach full milestone cadence
  unit: USD/program/month
  source: '[A5 + A6 + BP businessModel.revenueStreams + Research market.som] the base case matches the plan''s paid-feasibility-to-full-program structure and ends slightly above the researched $1.5M annualized program value only in Q4Y3 when subscriptions and milestone timing layer in.'
- id: A10
  name: Gross margin ramp
  value: 0% pre-revenue, 40%–50% in Y1 paid-study months, 60%–70% in Y2, and 71%–73% in Y3
  unit: gross margin percent
  source: '[BP businessModel.targetGrossMarginPct 70 + BP strategicChoices.sequencingRationale + Research regulatoryTechnicalConstraints] early work is assay-heavy and bespoke, then margin approaches the target only after the QC and transfer stack becomes reusable.'
- id: A11
  name: Hiring timeline
  value: M1 founder CEO, scientific founder, and platform engineer; M4 translational biology lead; M7 CMC/QA lead; M10 lab scientist; Q1Y2 program/QA ops; Q2Y2 first partner-sales hire; Q3Y2 second engineer; Q2Y3 adjacent-lineage scientist; Q3Y3 second partner-sales hire; Q4Y3 ops/G&A
  unit: timeline
  source: '[BP team + BP strategicChoices.sequencingRationale + BP product.twentyFourMonth] headcount expands only after external transfer proof and adjacent-lineage work are in view.'
- id: A12
  name: Founder CEO loaded compensation
  value: $180K
  unit: USD/year
  source: '[BP team Founder CEO + startup-finance heuristic] lean founder cash pay plus taxes and benefits for a venture-backed technical services startup.'
- id: A13
  name: Scientific founder loaded compensation
  value: $220K
  unit: USD/year
  source: '[BP team Scientific founder + startup-finance heuristic] the technical founder carries the highest cash cost because scientific credibility drives both delivery and sales.'
- id: A14
  name: Platform engineering loaded compensation
  value: $180K
  unit: USD/year
  source: '[BP team Founding eng + startup-finance heuristic] reflects a senior software builder owning protocol versioning, data capture, and the recipe graph.'
- id: A15
  name: Translational biology lead loaded compensation
  value: $190K
  unit: USD/year
  source: '[BP team Translational biology lead + startup-finance heuristic] assumes a senior wet-lab operator capable of running external feasibility studies.'
- id: A16
  name: CMC and QA lead loaded compensation
  value: $200K
  unit: USD/year
  source: '[BP team CMC and QA lead + Research regulatoryTechnicalConstraints] the model pays for senior QA and transfer ownership because the deliverable must be auditable, not just experimental.'
- id: A17
  name: Lab and adjacent-lineage scientist loaded compensation
  value: $170K
  unit: USD/year
  source: '[BP product.twentyFourMonth + startup-finance heuristic] covers one beta-cell execution scientist and a later adjacent-lineage hire once reuse is proven.'
- id: A18
  name: Program and QA ops loaded compensation
  value: $160K
  unit: USD/year
  source: '[BP operations + startup-finance heuristic] a cross-functional program operator is added once multiple external programs and documentation packets run in parallel.'
- id: A19
  name: Partner-sales loaded compensation
  value: $170K
  unit: USD/year
  source: '[BP gtm.channels + startup-finance heuristic] includes travel and variable comp for a niche founder-assisted enterprise selling motion.'
- id: A20
  name: Ops and G&A loaded compensation
  value: $120K
  unit: USD/year
  source: '[BP operations + startup-finance heuristic] covers finance, vendor management, insurance, and basic administrative support.'
- id: A21
  name: Payroll allocation to P&L lines
  value: CEO 60% S&M and 40% G&A; scientific founder and engineers 100% R&D; translational biology 100% R&D; CMC/QA 70% R&D and 30% G&A; lab and adjacent-lineage scientists 100% R&D; program/QA ops 50% R&D and 50% G&A; partner-sales 100% S&M; ops/G&A 100% G&A
  unit: allocation
  source: '[BP team role rationales + BP operations] payroll is allocated to the functions each role actually drives in the plan.'
- id: A22
  name: Non-payroll opex ramp
  value: Y1 monthly functional spend rises from about $72K to $127K, Y2 quarterly functional spend from about $410K to $513K, and Y3 quarterly functional spend from about $423K to $478K
  unit: USD/non-payroll spend
  source: '[BP operations + BP product + BP fundingAsk.useOfFundsSummary + startup-finance heuristic] covers wet-lab consumables, assay work, software tooling, legal, travel, insurance, and clean-room data-sharing overhead.'
- id: A23
  name: Cash conversion convention
  value: Cash movement equals EBITDA
  unit: formula
  source: '[startup-finance heuristic] capex, financing fees, taxes, and working-capital timing are assumed immaterial relative to operating burn at this stage.'
- id: A24
  name: CAC convention
  value: Y1 plus Y2 sales-and-marketing spend divided by the first 4 active customer programs
  unit: formula
  source: '[model calc + BP gtm.funnelTargets] the market is too small for a volume CAC metric, so the model uses the cost to win the initial four beachhead programs.'
- id: A25
  name: Monthly churn
  value: 6.0%
  unit: percent per month
  source: '[startup-finance heuristic for milestone-driven biotech services] a higher churn than software is used because some programs complete after transfer and not every customer renews into a second scope.'
- id: A26
  name: Next-round milestone for sizing the ask
  value: End Y3 with four active beachhead programs, two repeatable external transfers, and one adjacent-lineage pilot ready to commercialize
  unit: milestone
  source: '[BP milestones 24–36 months + BP product.twentyFourMonth + BP strategicChoices.sequencingRationale] the next round should fund only after the company proves the foundry compounds beyond one-off beta-cell services.'
