problem: >-
  种子轮至 B 轮的细胞疗法初创公司往往能在实验室展示出令人信服的谱系生物学，却在尝试将分化
  方案转化为用于临床前及 IND 使能研究的可重复功能性细胞批次时屡屡碰壁。内部团队仍依赖人工
  细胞因子调整、零散的 CRISPR 实验，以及逐步优化单个环节而非完整细胞状态转变路径的工艺开发
  CRO。这种拖延消耗现金跑道、削弱下一轮融资故事，甚至可能在疗法进入临床之前就将整个项目扼杀。
targetUser:
  primary: >-
    开发针对 1 型糖尿病同种异体胰腺β细胞疗法的种子轮至 B 轮初创公司的首席科学官（CSO）
    和 CMC 副总裁
  secondary: >-
    学术衍生公司中负责商业化内分泌细胞替代项目的转化医学团队
  buyer: 首席科学官（CSO）或 CMC 副总裁
startupThesis:
  nonObviousInsight: >-
    下一波再生医学的稀缺资产不再只是疾病生物学本身，而是一套可编程、可复现的配方——能在
    规模化条件下推动细胞经历正确的内源性状态转变。融资动态和 Mayo Clinic 背书的转化验证
    表明，一旦细胞编程平台证明其能控制分化过程，最高价值层就变成了将脆弱实验室方案转化为
    可量产治疗性细胞配方的工厂。
  beachhead: >-
    正在为 1 型糖尿病项目准备 IND 使能制造批次、但批次间分化产量或功能不稳定的种子轮至
    B 轮同种异体β细胞疗法初创公司
  wedge: >-
    一个 CRISPR 引导的β细胞配方工厂——设计序贯基因激活程序、快速运行功能检测，并技术转让
    一套 GMP 就绪的分化工作流程及放行标准
  whyNowCatalyst: >-
    Syntax Bio 的融资和 Mayo Clinic 关联的验证表明，可编程细胞分化正从平台科学走向有资金
    支持的转化项目，这些项目迫切需要一条可量产的路径。
  ventureScalePath: >-
    先在β细胞项目上站稳脚跟，再将配方工厂拓展到其他难制造谱系——如肝细胞、多巴胺能神经元
    和免疫重置细胞类型——持续积累细胞状态转变的专有数据，逐步演化为再生医学的制造智能层。
solution: >-
  公司向无法在实用规模下稳定产生功能性β细胞的治疗开发商，出售针对具体项目的细胞编程配方
  工厂服务。客户带来细胞系、目标产品特征和检测约束；平台设计序贯内源激活程序，并行测试，
  找出满足功能、产量和可重复性阈值的最小配方。可交付成果不只是一份实验报告，而是包含分化
  方案、过程中质量检查点和与胰岛素分泌表现挂钩的放行检测在内的可转让制造包。随时间推移，
  公司将跨项目构建配方图谱，使每一个新谱系都比一次性 CRO 合作更快完成、更具可防御性。
goToMarketSeed:
  firstCustomer: >-
    正在开发针对 1 型糖尿病同种异体胰腺β细胞疗法的种子轮至 B 轮初创公司——有初步动物数据，
    但无法为 IND 使能研究产出可重复的功能性批次
  buyingTrigger: >-
    主力项目已显示临床前疗效，公司需要在下一轮融资或启动 IND 使能制造工作前，拿出一份可信的
    CMC 计划。
  currentAlternative: >-
    内部人工工艺优化，加上工艺开发 CRO 工作和定制化 CRISPR 筛选
  switchingReason: >-
    配方工厂能将数月的试错压缩为一个聚焦项目，最终交付可量产方案、客观放行检测，以及更清晰
    的面向投资人的规模化准备故事。
  pricingHypothesis: >-
    前期收取可行性研究费，后续按项目收取平台许可费和基于里程碑的技术转让付款，定价对标所
    避免的数月 CMC 延误成本和失败批次费用。
