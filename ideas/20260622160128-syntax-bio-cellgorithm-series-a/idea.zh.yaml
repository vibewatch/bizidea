topRisks:
  - name: 生物学可能无法泛化
    description: 在一个客户细胞系上有效的配方，可能无法在其他细胞系或产品特征上复现。
    mitigation: 从服务导向的可行性项目起步，设定严格的通过/不通过检测门槛，只有在多个数据集中均能复现的配方模块才产品化。
  - name: 知识产权顾虑可能阻碍客户采用
    description: 初创公司可能不愿将细胞系、工艺数据或项目细节分享给外部工厂。
    mitigation: 提供洁净室合作模式、客户保留下游产品 IP 的条款，并在平台发明与项目专用发明之间划定清晰的合同边界。
  - name: 监管路径可能拖慢部署
    description: 新型基因激活步骤和放行逻辑可能需要额外的 CMC 和可比性工作，才能获得监管机构认可。
    mitigation: 将初始切口聚焦在临床前及 IND 使能工作流程支持上，每份配方均附可审计的检测文件，并尽早聘用经验丰富的法规顾问。
