jobsToBeDone:
  - job: >-
      当 T1D 细胞疗法项目有初步动物数据但分化产量不稳定时，帮助 CMC 负责人锁定可重复的β细胞
      配方，从而有把握地启动 IND 使能研究。
    currentAlternative: 内部工艺开发实验加 CRO 支持
    successMetric: 满足预设产量和胰岛素分泌阈值的可重复功能性细胞批次
  - job: >-
      当投资人询问临床前β细胞疗法能否实现规模化时，帮助 CSO 拿出可信的制造包，使公司能在
      没有 CMC 公信力差距的情况下完成下一轮融资。
    currentAlternative: PPT 级制造计划和临时顾问工作
    successMetric: 在展示经验证的分化工作流程后完成融资或达成合作
