topRisks:
  - name: Biology may not generalize
    description: A recipe that works on one customer cell line may fail to reproduce across other lines or product profiles.
    mitigation: Start with service-led feasibility programs, define strict go or no-go assay gates, and only productize recipe modules that replicate across multiple datasets.
  - name: Adoption may stall on IP concerns
    description: Startups may hesitate to share cell lines, process data, or program details with an external foundry.
    mitigation: Offer clean-room collaboration, customer-owned downstream product IP, and clear contract boundaries around platform versus program-specific inventions.
  - name: Regulatory path could slow deployment
    description: Novel gene-activation steps and release logic may require extra CMC and comparability work before regulators are comfortable.
    mitigation: Build the initial wedge around preclinical and IND-enabling workflow support, pair each recipe with auditable assay documentation, and engage experienced regulatory advisors early.
