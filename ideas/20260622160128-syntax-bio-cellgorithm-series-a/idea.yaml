problem: >-
  Seed-to-Series B cell-therapy startups can often show compelling lineage biology in the lab
  but fail when they try to turn differentiation protocols into reproducible, functional cell
  lots for preclinical and IND-enabling work. Internal teams still rely on manual cytokine
  tuning, fragmented CRISPR experiments, and process-development CROs that optimize one step at
  a time instead of the full cell-state transition. That delay burns runway, weakens the next
  financing story, and can kill a program before the therapy ever reaches patients.
targetUser:
  primary: >-
    CSO and VP CMC leaders at seed-to-Series B startups developing allogeneic pancreatic
    beta-cell therapies for type 1 diabetes
  secondary: >-
    Translational medicine teams at academic spinouts commercializing endocrine cell-replacement
    programs
  buyer: Chief Scientific Officer or VP CMC
startupThesis:
  nonObviousInsight: >-
    The scarce asset in next-wave regenerative medicine is no longer just disease biology; it is
    a programmable, reproducible recipe for pushing cells through the right endogenous state
    transitions at scale. Funding and Mayo-backed translation signal that once cell-programming
    platforms prove they can control differentiation, the highest-value layer becomes the
    foundry that converts fragile lab protocols into manufacturable therapeutic cell recipes.
  beachhead: >-
    Seed-to-Series B allogeneic beta-cell therapy startups preparing IND-enabling manufacturing
    runs for type 1 diabetes programs with inconsistent differentiation yield or function across
    lots
  wedge: >-
    A CRISPR-guided beta-cell recipe foundry that designs sequential gene-activation programs,
    runs fast functional assays, and tech-transfers a GMP-ready differentiation workflow plus
    release signature
  whyNowCatalyst: >-
    Syntax Bio's financing and Mayo-linked validation show that programmable cell differentiation
    is moving from platform science into funded translational programs that urgently need a
    manufacturable path.
  ventureScalePath: >-
    Win beta-cell programs first, then expand the foundry into other difficult lineages such as
    hepatocytes, dopaminergic neurons, and immune-reset cell types, compounding proprietary data
    on cell-state transitions and evolving into the manufacturing intelligence layer for
    regenerative medicine.
solution: >-
  The company sells a program-specific cell-programming foundry for therapeutic developers that
  cannot reliably generate functional beta cells at useful scale. Customers bring their cell
  line, target product profile, and assay constraints; the platform designs sequential endogenous
  activation programs, tests them in parallel, and identifies the smallest recipe that clears
  function, yield, and reproducibility thresholds. The deliverable is not just an experiment
  report but a transferable manufacturing package that includes the differentiation protocol,
  in-process checkpoints, and release assays tied to insulin-secretion performance. Over time,
  the business builds a recipe graph across programs that makes each new lineage faster and more
  defensible than a one-off CRO engagement.
goToMarketSeed:
  firstCustomer: >-
    A seed-to-Series B startup developing allogeneic pancreatic beta-cell therapy for type 1
    diabetes that has promising animal data but cannot produce reproducible functional lots for
    IND-enabling studies
  buyingTrigger: >-
    The lead program shows preclinical efficacy and the company needs a credible CMC plan before
    raising the next round or starting IND-enabling manufacturing work.
  currentAlternative: >-
    Manual internal process optimization combined with process-development CRO work and bespoke
    CRISPR screening
  switchingReason: >-
    A recipe foundry can compress months of trial-and-error into a focused program that delivers
    a manufacturable protocol, objective release assays, and a clearer investor story around
    scale-up readiness.
  pricingHypothesis: >-
    Upfront feasibility study fee, followed by per-program platform license and milestone-based
    tech-transfer payments priced against months of avoided CMC delay and failed lot cost.
