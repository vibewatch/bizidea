openQuestions:
- How many seed-to-Series B beta-cell programs will be in true external-buy mode over the next 24 months versus keeping recipe work inside the founding science team?
- What exact clean-room, data-rights, and IP terms are sufficient for customers to share cell lines and process data without blocking the moat?
- Which minimal potency and release-assay package will FDA / EMA-experienced advisers accept as decision-quality before IND-enabling work?
- How well does a recipe discovered on one cell line or culture format transfer to another line, bioreactor, or delivery modality?
