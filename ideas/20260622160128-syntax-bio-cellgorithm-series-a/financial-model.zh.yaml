slug: beta-cell-recipe-foundry
date: '2026-06-22'
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-07
  unit: YYYY-MM
  source: '[BP date 2026-06-22] 财务模型从商业计划书标注日期后的第一个完整月份开始。'
- id: A2
  name: pre-seed 轮融资开局现金
  value: $4.0M
  unit: USD
  source: '[BP fundingAsk targetFundingRangeUsd $4–6M + BP fundingAsk runwayMonths 18] 基准情景取所述区间下限，因为在技术转让复用得到验证之前，招聘保持精简。'
- id: A3
  name: 起始活跃付费客户数
  value: '0'
  unit: count
  source: '[BP product.sixMonth + BP milestones 0–12 months] 公司以零营收起步，须先签约共创客户，才能确认任何付费工作。'
- id: A4
  name: 客户计算口径
  value: 处于任何付费可行性、配方许可、技术转让或 QC 文件范围下的一个治疗项目
  unit: definition
  source: '[BP businessModel.unitOfValue + BP gtm.pricing] customersEop 按付费项目计算而非按公司数，因为商业单元是客户项目。'
- id: A5
  name: 付费可行性研究经济模型
  value: 首项研究 $250K–$500K；基准情景约 $300K，分约 3 个月确认（约 $100K/月）
  unit: USD/program
  source: '[BP investorMemo.firstCustomer.initialContract + BP market.buyingProcess 6–12 week paid feasibility] 模型使用偏低的中间研究价值，对首客户定价保持保守。'
- id: A6
  name: 完整项目经济模型
  value: 可行性后约 $1.0M–$1.5M 的配方许可加转让里程碑；基准情景混合偏向每个项目约 $1.2M
  unit: USD/program
  source: '[BP investorMemo.firstCustomer.initialContract + BP market.som + Research market.som] 完整项目价值以计划书所述里程碑定价和研究支持的 $1.5M 滩头合作价值为锚点。'
- id: A7
  name: 客户增长节奏
  value: M7 前 1 个付费项目，M12 前 3 个，Y2 Q3 前 4 个，之后全程维持 4 个活跃项目
  unit: customersEop
  source: '[BP milestones 0–12, 12–24, and 24–36 months + BP operatingAssumptions first 4 of 10 beachhead teams buy within 36 months] 模型达到计划书第三年四个项目 SOM 路径，但不假设超出研究支持范围的滩头广度。'
- id: A8
  name: 营收确认口径
  value: 营收等于期末活跃项目数乘以该期每活跃项目的综合实现营收
  unit: formula
  source: '[BP gtm.pricing + BP businessModel.revenueStreams] 使每条营收线可直接通过 customersEop 乘以综合 ARPU 对账。'
- id: A9
  name: 每活跃项目综合实现营收爬坡
  value: 首批付费研究约 $100K/月，Y2 Q3 混合试点和转让阶段约 $80K/月，Y3 Q4 四个项目达到完整里程碑节奏时约 $130K/月
  unit: USD/program/month
  source: '[A5 + A6 + BP businessModel.revenueStreams + Research market.som] 基准情景与计划书付费可行性转完整项目结构吻合，仅在 Y3 Q4 订阅和里程碑时机叠加时略高于研究支持的 $1.5M 年化项目价值。'
- id: A10
  name: 毛利率爬坡
  value: 营收前 0%，Y1 付费研究月 40%–50%，Y2 60%–70%，Y3 71%–73%
  unit: gross margin percent
  source: '[BP businessModel.targetGrossMarginPct 70 + BP strategicChoices.sequencingRationale + Research regulatoryTechnicalConstraints] 早期工作以检测为主且定制化程度高，只有 QC 和转让栈可复用后才逐步接近目标毛利率。'
- id: A11
  name: 招聘时间表
  value: M1 创始人 CEO、科学联创、平台工程师；M4 转化生物学负责人；M7 CMC/QA 负责人；M10 实验室科学家；Y2 Q1 项目/QA 运营；Y2 Q2 首位合作销售；Y2 Q3 第二位工程师；Y3 Q2 邻近谱系科学家；Y3 Q3 第二位合作销售；Y3 Q4 运营/G&A
  unit: timeline
  source: '[BP team + BP strategicChoices.sequencingRationale + BP product.twentyFourMonth] 人员仅在外部转让验证和邻近谱系工作有望达成时才扩张。'
- id: A12
  name: 创始人 CEO 全成本薪酬
  value: $180K
  unit: USD/year
  source: '[BP team Founder CEO + startup-finance heuristic] 精简的创始人现金工资加税费和福利，适用于风险投资支持的技术服务初创公司。'
- id: A13
  name: 科学联创全成本薪酬
  value: $220K
  unit: USD/year
  source: '[BP team Scientific founder + startup-finance heuristic] 技术联创薪酬最高，因为科学公信力同时驱动交付和销售。'
- id: A14
  name: 平台工程全成本薪酬
  value: $180K
  unit: USD/year
  source: '[BP team Founding eng + startup-finance heuristic] 反映一位负责方案版本控制、数据采集和配方图谱的资深软件构建者。'
- id: A15
  name: 转化生物学负责人全成本薪酬
  value: $190K
  unit: USD/year
  source: '[BP team Translational biology lead + startup-finance heuristic] 假设为能独立运行外部可行性研究的资深湿实验室操作人员。'
- id: A16
  name: CMC 和 QA 负责人全成本薪酬
  value: $200K
  unit: USD/year
  source: '[BP team CMC and QA lead + Research regulatoryTechnicalConstraints] 模型为高级 QA 和转让责任人支付高薪，因为可交付成果须可审计，而非仅停留在实验层面。'
- id: A17
  name: 实验室和邻近谱系科学家全成本薪酬
  value: $170K
  unit: USD/year
  source: '[BP product.twentyFourMonth + startup-finance heuristic] 涵盖一位β细胞执行科学家和在复用验证后追加的邻近谱系招聘。'
- id: A18
  name: 项目和 QA 运营全成本薪酬
  value: $160K
  unit: USD/year
  source: '[BP operations + startup-finance heuristic] 在多个外部项目和文件包并行推进时追加跨职能项目运营人员。'
- id: A19
  name: 合作销售全成本薪酬
  value: $170K
  unit: USD/year
  source: '[BP gtm.channels + startup-finance heuristic] 含差旅和浮动薪酬，适用于创始人辅助的利基企业销售模式。'
- id: A20
  name: 运营和 G&A 全成本薪酬
  value: $120K
  unit: USD/year
  source: '[BP operations + startup-finance heuristic] 涵盖财务、供应商管理、保险和基础行政支持。'
- id: A21
  name: 薪酬分配至损益科目
  value: CEO 60% 销售&营销 + 40% G&A；科学联创和工程师 100% 研发；转化生物学 100% 研发；CMC/QA 70% 研发 + 30% G&A；实验室和邻近谱系科学家 100% 研发；项目/QA 运营 50% 研发 + 50% G&A；合作销售 100% 销售&营销；运营/G&A 100% G&A
  unit: allocation
  source: '[BP team role rationales + BP operations] 薪酬按每个角色在计划书中实际驱动的职能分配。'
- id: A22
  name: 非薪酬运营支出爬坡
  value: Y1 月度功能性支出从约 $72K 增至 $127K，Y2 季度功能性支出从约 $410K 增至 $513K，Y3 季度功能性支出从约 $423K 增至 $478K
  unit: USD/non-payroll spend
  source: '[BP operations + BP product + BP fundingAsk.useOfFundsSummary + startup-finance heuristic] 涵盖湿实验室耗材、检测工作、软件工具、法务、差旅、保险和洁净室数据共享开销。'
- id: A23
  name: 现金转换口径
  value: 现金变动等于 EBITDA
  unit: formula
  source: '[startup-finance heuristic] 在本阶段，资本支出、融资费用、税款和营运资本时序差异相对运营亏损可忽略不计。'
- id: A24
  name: CAC 口径
  value: Y1 加 Y2 销售与营销支出除以前 4 个活跃客户项目
  unit: formula
  source: '[model calc + BP gtm.funnelTargets] 市场规模太小，不适合用量销 CAC 指标；模型采用赢得初始四个滩头项目的成本。'
- id: A25
  name: 月度流失率
  value: 6.0%
  unit: percent per month
  source: '[startup-finance heuristic for milestone-driven biotech services] 采用高于软件的流失率，因为部分项目在转让后完成、并非每位客户都续签第二个合作范围。'
- id: A26
  name: 下一轮里程碑用于确定融资规模
  value: 以 4 个活跃滩头项目、2 次可重复外部转让和 1 个准备商业化的邻近谱系试点结束 Y3
  unit: milestone
  source: '[BP milestones 24–36 months + BP product.twentyFourMonth + BP strategicChoices.sequencingRationale] 下一轮融资应在公司证明工厂能在一次性β细胞服务之外形成积累后才进行。'
