    - M12 前 3 个活跃客户项目，Y2 Q3 前 4 个。
    - 每活跃项目综合实现营收从首批付费研究的约 $100K/月增至 Y3 Q4 的约 $130K/月。
    - 毛利率仅在 QC 和转让层可复用后的 Y3 才突破 70% 目标。
  upside:
    description: Y3 末到来第五个项目，转让复用提前验证，QC 订阅早于计划附加。
    y3RevenueK: 6480.0
    y3EbitdaK: 620.0
    cashLowPointK: 930.0
    keyAssumptionChanges:
    - Y3 Q4 期末客户数达到 5 而非 4。
    - Y3 中期至少一个现有客户追加第二个项目或 QC 订阅。
    - 毛利率以约 76% 退出，因为检测和文件复用超预期。
sensitivity:
- variable: ARPU
  downsideCase: 完整项目里程碑时机滑期，Y3 每活跃项目实现营收较计划低约 10%。
  baseCase: Y3 综合年化每活跃项目营收约 $1.29M。
  upsideCase: 里程碑和 QC 订阅将 Y3 项目实现营收较计划提升约 10%。
  y3RevenueImpactK: -516.0
  cashImpactK: -380.0
- variable: CAC
  downsideCase: 创始人主导销售周期延长，每个赢得项目的有效成本约为 $260K。
  baseCase: 前四个项目每个赢取成本约 $204K。
  upsideCase: CDMO 和基金会转介将有效 CAC 压缩至约 $160K。
  y3RevenueImpactK: -150.0
  cashImpactK: -420.0
- variable: churn
  downsideCase: 月度流失率升至 8%，因为客户完成首次转让后未续签下一个合作范围。
  baseCase: 月度流失率在小型滩头市场维持在 6%。
  upsideCase: 文件层让客户在首次转让后保持参与，月度流失率降至 4%。
  y3RevenueImpactK: -260.0
  cashImpactK: -210.0
- variable: sales cycle
  downsideCase: 融资或 IND 时间窗口移动，付费研究滑期一至两个季度。
  baseCase: 里程碑驱动销售在 M7 完成首项研究，Y2 Q3 前填满第四个项目。
  upsideCase: 转介渠道压缩尽调周期，第四个项目在 Y2 Q1 前到来。
  y3RevenueImpactK: -780.0
  cashImpactK: -520.0
- variable: gross margin
  downsideCase: 检测和 QA 工作仍属定制化，毛利率以 66% 退出。
  baseCase: 转让栈标准化后，毛利率在 Y3 Q4 以 73% 退出。
  upsideCase: 复用和合作方交付比计划更快，毛利率以 76% 退出。
  y3RevenueImpactK: 0.0
  cashImpactK: -330.0
- variable: hiring pace
  downsideCase: 公司在没有匹配营收拉动的情况下提前一至两个季度招聘邻近谱系和 GTM 岗位。
  baseCase: 招聘按商业计划书中的精简排序执行。
  upsideCase: 转让工具复用性超预期，两个后期岗位推迟一个季度。
  y3RevenueImpactK: 0.0
  cashImpactK: -460.0
modelDiagram:
  title: 单位经济模型流程
  mermaid: |
    flowchart LR
      TargetAccounts --> PaidFeasibility
      PaidFeasibility --> FullProgram
      FullProgram --> TransferMilestones
      TransferMilestones --> QCSubscription
      QCSubscription --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
- checkName: 营收引擎
  finding: 基准情景营收来自将三项早期付费研究转化为四个活跃滩头项目，Y3 末以接近研究支持的每项目 $1.5M 运行率退出。
- checkName: 必须走对的事
  finding: 首批转让包必须足够好，让客户用后续里程碑工作持续买单，而不是将每次合作视为一次性救援项目。
- checkName: 模型破裂点
  finding: 若公司在三个项目上停滞或毛利率维持在 60% 中段，悲观情景将在邻近谱系验证出现前把现金逼近底线。
- checkName: 下一轮证明
  finding: 下一次融资的依据是四个活跃项目、两次可重复转让和一个邻近谱系试点，共同显示工厂在积累数据而非仅靠定制实验室工作。
sanityChecks:
  ruleOf40: Y3 增速 73.7% + EBITDA 利润率 1.0% = 74.7%
  burnMultiple: Y2 亏损倍数约 0.7x（用 EBITDA 亏损除以同比营收增长）；因营收以里程碑为主而非纯 ARR，仅供方向性参考。
  revenuePerFte: Y3 年末每 FTE 营收 $430.0K（对专业化生物服务加软件模式属健康水平，但不可直接与 SaaS 对比）。
  flags:
    - 可见滩头仅约 10 个团队，基准情景已假设占据一个窄口市场的较高份额。
    - CAC、流失率和平均客户生命周期仍属启发式估计，因为中立β细胞配方工厂尚无队列数据。
    - 毛利率直到 Y3 才达到 70% 目标，若再多一年的定制化转让工作，可能迫使下一轮融资规模加大。
