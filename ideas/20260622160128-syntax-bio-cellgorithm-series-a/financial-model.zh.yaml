    - Y3 每活跃项目综合实现营收较基准低约 15%。
    - 毛利率以约 66% 而非 73% 退出，因为 QA 和转让工作未能按时标准化。
  base:
    description: 3 项付费研究转化为 4 个活跃滩头项目，转让文件在 Y2 形成复用，Y3 末营收接近研究支持的每项目 $1.5M 节奏。
