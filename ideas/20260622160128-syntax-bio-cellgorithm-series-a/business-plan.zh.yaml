slug: beta-cell-recipe-foundry
date: '2026-06-22'
executiveSummary: >-
  Beta-cell Recipe Foundry 应以中立、项目专用的可重复性和技术转让合作伙伴身份起步，服务对象
  是种子轮至 B 轮的同种异体β细胞疗法公司，而非定位为广泛的再生医学平台或完整 CDMO。首位买家
  是规模 20-80 人的 1 型糖尿病开发商的 CSO 或 VP CMC，其主力项目已有动物疗效数据，但无法产出
  可重复的功能性批次或向董事会提交完整的 CMC 包。购买触发点由里程碑驱动——公司临近下一轮融资、
  IND 使能工作或基金会支持的转化里程碑，现在就需要一个可制造性故事，而不是再等一个季度的内部
  方案调试。楔形切口是一项付费可行性研究：设计并测试序贯基因激活配方，再将成功的工作转化为
  按项目许可及技术转让包，附带过程中检查点和放行逻辑。研究支持了痛点、买家和时机，但也表明
  滩头市场较窄——估算 SAM 约 $18M，北美和欧洲可见的β细胞团队仅约 10 个。因此抉择已经清晰：
  先在一个β细胞模板上证明价值，将 GMP 执行交给合作伙伴，在配方数据真正形成积累之前，暂缓
  拓展邻近谱系、封装技术和自有制造产能。最大的反向风险不只是科学新颖性本身，更在于配方能否
  跨客户细胞系迁移，以及初创公司是否愿意付费给中立工厂而不是延续内部工作或 CDMO 合作范围。
  现有输入材料未提供签约外部购买预算、接受 IP 条款或跨细胞系迁移成功率的直接证据，因此前
  18 个月必须证明付费需求、洁净室数据访问以及一次成功的外部交付。
problem:
  - 种子轮至 B 轮的β细胞开发商能在实验室展示令人信服的谱系生物学，但仍无法产出用于 IND 使能工作的可重复功能性批次，制造成为下一轮融资的门控风险。
  - 内部方案调试、逐步推进的 CRO 项目和后期 CDMO 都无法让买家在董事会或监管截止日期前快速锁定配方逻辑、效能检测和放行检查点。
solution:
  - 提供 CRISPR 引导的配方工厂，设计序贯基因激活程序，运行功能性筛选，找出满足客户定义的产量、功能和可重复性阈值的最小β细胞配方。
  - 交付含方案版本控制、过程中检查点、效能与放行逻辑及合作方交付材料的可转让包，使客户能以更强的 CMC 故事进入 IND 使能制造阶段。
whyWeWin:
  - 公司提供内部团队、CRO 和 CDMO 默认都不拥有的最早期可制造性成果：GMP 锁定前可重复的β细胞批次加上可审计的检测与放行逻辑。
  - 中立工厂定位让公司能跨项目汇聚配方和 QC 数据，而不与客户的治疗资产竞争，使每一个后续β细胞或邻近谱系项目的界定和转让都更快完成。
strategicChoices:
  beachhead: 北美种子轮至 B 轮同种异体β细胞疗法初创公司，处于临床前疗效验证后、批次可重复性锁定前的 IND 使能准备阶段。
  wedgeRationale: 这一切片能比广泛的多能干细胞制造启动更快产生验证，因为买家群体集中、预算触发点与融资和 IND 时机挂钩，且一个失败批次就可能让项目延误数月。
  sequencingRationale: 在单一谱系上以服务先行起步，将检测和文件层嵌入每次合作，将后续 GMP 执行交给合作伙伴；只有在两次外部技术转让成功后，才应为邻近谱系或更广泛的平台产品招聘，因为护城河取决于经验证的数据复用而非单纯的实验室吞吐量。
  notYet:
    - 自有 GMP 制造产能
    - 封装、免疫保护或植入物设计产品
    - 两次外部β细胞技术转让成功前的非β细胞疗法项目
    - 构建会损害中立工厂定位的内部治疗管线
market:
  tam: "$240.0M 估算 TAM，基于全球约 80 个难制造谱系多能干细胞疗法项目、每年 1.5 次合作、每次 $2.0M 综合合作价值。"
  sam: "$18.0M 估算 SAM，针对初始滩头市场中约 10 个北美和欧洲β细胞或胰腺细胞替代团队。"
  som: "$6.0M 模型预测第三年 SOM，基于证明一个β细胞用例后 4 个滩头项目、每个约 $1.5M，后续 GMP 执行交给合作方。"
  segments:
    - 准备 IND 使能工作的种子轮至 B 轮同种异体β细胞疗法初创公司
    - 商业化内分泌细胞替代资产的学术衍生公司和转化糖尿病项目
  buyingProcess: >-
    技术负责人通常是转化或工艺开发主管，而经济买家是 CSO 或 VP CMC，因为融资公信力、
    外包制造策略和 IND 时机都汇集在同一工作流程中。典型的首次销售是针对一个主力项目的
    6-12 周付费可行性研究，若客户看到预设的功能、产量和可重复性提升，则转化为完整的
    配方转让合作。
product:
  mvp: >-
    MVP 应覆盖一个客户细胞系、一个β细胞目标产品特征和一套默认检测栈。必须对序贯基因激活
    配方进行排序，记录过程中检查点，并为一个 IND 目标项目交付含产量、功能、可重复性和
    放行逻辑的技术转让包。
  sixMonth: 完成 2 个共创客户签约，建立洁净室数据共享和方案版本控制机制，并证明一项付费可行性研究能产出缩窄的配方候选清单和β细胞检测模板，供 RoslinCT 级合作伙伴审阅。
  twelveMonth: 将首项可行性研究转化为完整项目，在 2 个外部客户批次或细胞系上验证可重复性提升，并交付涵盖方案版本控制、细胞库元数据、过程中控制及效能与放行依据的标准交付包。
  twentyFourMonth: 将配方图谱、转让历史和 QC 基准库产品化，使公司能并行运行多个β细胞项目，并在不成为完整 CDMO 的前提下启动一个邻近谱系试点。
  keyBets:
    - 外部客户将在洁净室条款下共享足够的数据和材料，从而积累可复用数据集。
    - 序贯基因激活配方在周期时间和可重复性上能优于内部加 CRO 迭代。
    - 默认的β细胞效能和放行包能在 IND 使能工作前满足 CSO 和 VP CMC 的决策需求。
    - 一个β细胞模板能推广到至少一个邻近难制造谱系。
gtm:
  wedge: 针对一个已有动物疗效、但尚无法展示可重复功能性批次或在下次融资/IND 使能批次前向董事会提交完整 CMC 包的 1 型糖尿病β细胞疗法，销售付费可重复性救援项目。
  channels:
    - 创始人主导直销，直接触达种子轮至 B 轮β细胞开发商的 CSO 和 VP CMC
    - 与在 GMP 锁定前就能发现上游配方问题的 iPSC 和工艺开发 CDMO 建立转介合作
    - 通过转化糖尿病网络和组合公司，借助基金会、KOL 和投资人引荐
  funnelTargets: 具名目标客户→合格技术评审 40-50%，合格技术评审→付费可行性 25-35%，付费可行性→完整项目许可 50%+，完整项目→18 个月内第二个项目或转介 25%+
  pricing: >-
    先收取付费可行性研究费，再将成功工作转化为按项目许可加技术转让里程碑；首次销售不要求
    下游版税，因为买家已对 IP 泄露有所顾虑，只有经济逻辑清晰时才会从现有工艺开发预算中
    拨款。
businessModel:
  revenueStreams:
    - 单项目配方救援的付费可行性研究
    - 按项目配方开发许可
    - 与客户定义门槛挂钩的技术转让和检测验证里程碑
    - 客户运行多个项目后的年度 QC 基准和文件订阅
  unitOfValue: 处于配方开发和转让中的治疗项目
  targetGrossMarginPct: 70
  expansionLevers:
    - 在首次转让成功后为同一客户追加第二个项目、第二条细胞系或第二个检测包
    - 向生物技术和 CDMO 合作伙伴销售可复用的 QC 基准和文件模块
    - 将配方图谱拓展至邻近难制造谱系，如肝细胞或多巴胺能神经元
strategyMap:
  northStarMetric: 达成约定功能、产量和批次可重复性门槛并接受 IND 使能工作技术转让包的外部客户项目数量
  inputMetrics:
    - 从启动到形成客户批准检测计划的配方候选清单所用天数
    - 付费可行性转化为完整项目许可的转化率
    - 试点项目达到预设产量和胰岛素分泌阈值的比例（相对基线）
    - 合作方接受转让而无需完整重新设计工艺的比例
    - 在多个项目中复用的基因激活模块和 QC 基准数量
  moatsToBuild:
    - 将基因激活序列、过程中标志物和放行结果关联起来的跨项目配方图谱
    - 与外部转让结果挂钩的β细胞 QC 和效能基准库
    - 能随每个项目缩短部署时间的洁净室合同、文件和合作方交付模板
  killCriteria:
    - 前 12 个月内来自滩头客户的付费可行性研究不足 3 项
    - 第 18 个月前无外部客户项目在至少 2 个独立批次上显示可重复性提升
    - 前 4 个试点后付费可行性转完整项目的转化率低于 50%
    - 第 24 个月前无可信的邻近谱系共创客户或数据复用路径
  mermaid: |
    flowchart LR
      Wedge[Beta-cell IND-readiness wedge] --> MVP[Recipe plus assay MVP]
      MVP --> Proof[Reproducible lots and accepted tech transfer]
      Proof --> Expansion[Adjacent lineage manufacturing intelligence]
investorMemo:
  verdict:
    call: 观察
    conviction: 真实瓶颈与可信买家时机已具备，但需外部付费需求和跨细胞系迁移性得到验证后，信心才能真正确立。
    whyBelieve: 痛点卡在融资和 IND 时机上，预算已存在于工艺开发工作中，现有替代方案均不拥有中立的β细胞配方加检测交付层。
    whyDoubt: 滩头市场可见团队仅约 10 个，若迁移性或 CDMO 交付无法证明，公司将被困于定制化服务。
    nextDiligence: 签约 2 个付费共创客户和一次 RoslinCT 级交付审阅，以证明买家愿意为结果付费且可交付成果能经受转让考验。
  firstCustomer:
    title: 种子轮至 B 轮同种异体β细胞疗法初创公司的 VP CMC
    profile: 一家规模 20-80 人的北美β细胞开发商，有一个针对 1 型糖尿病的主力项目、初步动物数据，以及内部工艺开发和 CDMO 预备工作中功能性批次不一致的问题。
    trigger: 董事会或下一轮融资流程要求在临床前疗效显示后、可重复批次数据出现前，提交一份可信的 IND 使能制造计划。
    buyer: VP CMC
    initialContract: "$250k-$500k 针对一条细胞系和检测包的付费可行性研究；若功能、产量和可重复性门槛均达成，则转化为约 $1.0-1.5M 的完整项目许可和技术转让里程碑。"
  mustBeTrue:
    - 至少 15 位目标 CSO 或 VP CMC 中的 5 位须确认当前或未来 12 个月内有与融资或 IND 里程碑挂钩的外部配方工作预算。
    - 前 2 个外部试点须在各客户预设的功能、产量和批次可重复性阈值上超越其基线。
    - 至少一个 RoslinCT 级合作伙伴须接受交付包，而无需从头重建完整的检测和检查点逻辑。
    - 洁净室 IP 条款须让初创公司保留匿名基准权，同时客户保留项目专用产品 IP。
    - 一个β细胞配方和检测模板须展示足够的复用性，以在第 24 个月前开启邻近谱系。
  diligenceQuestions:
    - 在下一次融资或 IND 里程碑前，有多少具名滩头公司实际处于外部购买模式？
    - 买家签约付费项目需要相对内部加 CRO 工作流程的哪些量化可重复性提升？
    - CSO 或 VP CMC 将哪些效能、特性和放行检测视为决策质量的必要条件？
    - 客户是否愿意在保留基准权的洁净室条款下共享细胞系和工艺数据？
    - 哪些 CDMO 希望有中立的上游合作方，哪些会自己向上游延伸？
operatingAssumptions:
  - assumption: 约 10 个可见滩头团队中至少 4 个将在 36 个月内购买外部配方工作。
    basis: research.yaml
    validationTest: 建立 15-20 个客户地图，在 12 个月内签约 3 项付费可行性研究，并找到 2 个已有预算负责人和时机的账户。
    decisionImpact: 若不成立，转向合作伙伴主导的分销，或提前推进邻近谱系扩展而非扩大直销规模。
  - assumption: 配方改进能在多个外部细胞系或批次格式上迁移，无需完整重新设计。
    basis: research.yaml
    validationTest: 在第二条外部细胞系或批次格式上复现首个成功项目，重大配方重新设计不超过一次。
    decisionImpact: 若不成立，公司将停留于定制化科学服务，数据护城河论点将大幅弱化。
  - assumption: 客户将接受保留客户对项目专用产品 IP 的所有权、初创公司获得匿名基准权的洁净室 IP 和数据权条款。
    basis: research.yaml
    validationTest: 与 2 个签约试点 MSA 谈判，条款中明确涵盖洁净室、基准和发明边界条款。
    decisionImpact: 若不成立，公司需要单租户合作或白标合作伙伴模式，跨项目杠杆随之丧失。
  - assumption: 默认β细胞检测包能在初创公司不自有 GMP 制造的情况下满足 IND 前决策需求。
    basis: research.yaml
    validationTest: 从 2 位前 CMC 或 ATMP 顾问和 1 个 CDMO 合作伙伴处获得书面评审，确认该包可用于 IND 使能规划。
    decisionImpact: 若不成立，路线图优先级在销售扩展前转向更深度的 QA 和法规基础设施。
  - assumption: 可行性加完整项目定价将契合现有工艺开发预算，无需大幅折扣。
    basis: 运营判断
    validationTest: 在 5 份提案中测试定价，以不超过 15% 折扣的目标价格完成 2 项付费研究。
    decisionImpact: 若不成立，在追加实验室人员前缩窄试点范围或转向成功导向的里程碑定价。
  - assumption: β细胞工作流程能复用足够的数据和 QC 框架，在第 24 个月前开启一个邻近谱系。
    basis: idea.yaml
    validationTest: 赢得 1 个邻近谱系共创客户 LOI，并证明在界定范围时超过一半的检查点架构和数据模型可复用。
    decisionImpact: 若不成立，保持公司轻资本运作，避免基于平台扩展假设的风险投资规模招聘。
experimentRoadmap:
  - horizon: 0–90 天
    experiment: 梳理 15-20 个具名北美和欧洲β细胞账户，对每个账户的 CSO、VP CMC 或转化负责人进行访谈。
    hypothesis: 融资和 IND 时机，而非泛泛的研发好奇心，才是买家愿意为外部配方工厂付费的决定因素。
    successMetric: 完成至少 10 次买家访谈，并在 12 个月内找到 5 个有外部购买时机的账户。
    owner: 创始人/CEO
  - horizon: 0–90 天
    experiment: 与 2 个共创客户和外部律师共同谈判洁净室 MSA 和基准权模板。
    hypothesis: 客户保留项目 IP 加匿名基准权能解除数据共享障碍，同时不破坏护城河。
    successMetric: 两方接受合同草案，在数据所有权和发明边界条款上的重大修改极少。
    owner: 创始人/CEO
  - horizon: 0–90 天
    experiment: 利用一个回顾性客户工作流程，构建首版项目工作区，用于方案版本控制、检测记录和检查点报告。
    hypothesis: 从第一天就将文件和数据采集产品化，比增加更多湿实验室吞吐量更能降低未来转让成本。
    successMetric: 一个回顾性项目端到端录入完毕，可在少于 1 天的人工准备时间内生成可共享的检查点报告。
    owner: 技术联创
  - horizon: 90–180 天
    experiment: 在一条外部细胞系上运行首项付费可行性研究，预先设定产量、功能和可重复性门槛。
    hypothesis: 窄口序贯基因激活程序能将数月内部迭代压缩为与董事会相关的结果。
    successMetric: 在 10 周内交付客户批准的配方候选清单，并在至少 2 项约定指标上超越客户基线。
    owner: 科学联创
  - horizon: 90–180 天
    experiment: 构建β细胞检测和 QC 交付包，并请 RoslinCT 级或同等合作伙伴评审其转让就绪度。
    hypothesis: 可审计的检查点和放行逻辑在赢得客户后续投入上与配方新颖性同等重要。
    successMetric: 一个合作伙伴接受该包为转让就绪，仅提出少量修订请求。
    owner: CMC 与 QA 负责人
  - horizon: 180–365 天
    experiment: 运行第二个外部项目，并衡量有多少配方、检测和检查点栈可以复用。
    hypothesis: 只有当一个项目能实质性缩短下一个项目周期而非归零重来时，业务才具备风险投资规模。
    successMetric: 第二个付费项目签约，至少一个模块在两个项目间复用，付费可行性转完整项目的转化率达到或超过 50%。
    owner: 转化生物学负责人
  - horizon: 180–365 天
    experiment: 通过 CDMO、疾病基金会或转化研究所，开拓 1 个邻近谱系共创客户和 2 个转介渠道。
    hypothesis: 扩展应来自同一买家网络和工作流程逻辑，而非独立的发现市场。
    successMetric: 获得一个邻近谱系 LOI，以及来自生态系统合作伙伴的 2 个合格转介。
    owner: 创始人/CEO
operations:
  - 洁净室合作流程，涵盖细胞系转让、客户保留下游 IP 和匿名基准权
  - 版本控制的配方和检测记录，含批次级检查点历史及客户专属访问控制
  - 标准β细胞检测栈，从第一天起追踪产量、胰岛素分泌、特性、效能、可追溯性和细胞库元数据
  - CDMO 交付包，包含方案版本、过程中控制、放行逻辑和可比性说明
  - 每周项目评审，将科学结果与客户融资、IND 和技术转让截止日期挂钩
team:
  - role: 创始人/CEO
    startTiming: 第 0 个月
    rationale: 由于市场规模小、买家层级高、早期交易属战略性而非交易性，创始人主导的客户筛选和里程碑驱动销售是必要条件。
  - role: 科学联创
    startTiming: 第 0 个月
    rationale: 公司的存亡取决于配方设计决策、检测结果解读，以及对 CSO、VP CMC 和转化合作伙伴的技术公信力。
  - role: 技术联创
    startTiming: 第 0 个月
    rationale: 如果服务要形成产品积累，项目数据采集、方案版本控制、洁净室访问以及可复用配方和 QC 模型从第一天起就需要软件专属负责人。
  - role: 转化生物学负责人
    startTiming: 第 3 个月
    rationale: 付费可行性研究在客户体量证明可以组建更大生物学团队之前，就需要专属的湿实验室执行和检测运营。
  - role: CMC 与 QA 负责人
    startTiming: 第 6 个月
    rationale: 价值主张包含可审计的检查点、放行逻辑和合作方转让就绪度，这些不是纯发现型科学家通常具备的能力。
milestones:
  - horizon: 0–12 个月
    items:
      - 将 15-20 个目标客户访谈转化为至少 3 项β细胞滩头市场付费可行性研究
      - 将至少 1 项可行性研究转化为含客户批准检测和检查点包的完整配方转让项目
      - 签约 1 个愿意审阅并接受工厂交付包的 CDMO 或工艺开发合作伙伴
      - 通过 2 份签约客户 MSA 证明洁净室 IP 和数据权模板的可行性
  - horizon: 12–24 个月
    items:
      - 运行 3-4 个活跃滩头项目，并将至少 2 个转化为多阶段配方转让合作
      - 证明配方或 QC 模块在至少 2 个外部客户项目间的复用
      - 通过项目工作区和标准检测模板，将从启动到配方候选清单的中位时间压缩到 8 周以内
      - 在不增加自有 GMP 制造产能的前提下，开拓首个邻近谱系共创客户
  - horizon: 24–36 个月
    items:
      - 在滩头市场达到模型预测的第三年 4 个项目 SOM 路径
      - 与 CDMO 和法规顾问为每个活跃项目建立可重复的合作转让路径
      - 利用同一配方图谱和 QC 框架启动首个邻近谱系项目
      - 证明公司能在不成为完整 CDMO 或垂直疗法开发商的前提下突破β细胞范畴
risks:
  - risk: 配方性能可能无法跨客户细胞系、培养格式或制造环境迁移。
    likelihood: High
    impact: High
    mitigation: 从一个窄口β细胞楔形切口起步，预先定义通过/不通过迁移标准，在多次外部复现前不声称广泛可移植性。
  - risk: 买家可能将上游配方工作留在创始科学团队内部，或扩展 CDMO 合作范围，而非聘用中立工厂。
    likelihood: High
    impact: High
    mitigation: 围绕融资和 IND 截止日期销售，证明比内部工作流程更快产出董事会可用成果，与 CDMO 合作而非在后期执行上竞争。
  - risk: IP 和数据共享顾虑可能阻碍获取构建可复用数据集所需的客户材料。
    likelihood: Medium
    impact: High
    mitigation: 采用洁净室合作、客户保留下游产品 IP、明确的基准条款，以及数据暴露有限的窄口首次试点。
  - risk: 监管和 QA 期望可能要求比早期客户预期更重的检测、可追溯性和文件栈。
    likelihood: Medium
    impact: High
    mitigation: 提前招聘 CMC 和 QA 人才，与前 FDA/EMA 及 CDMO 顾问压力测试交付包，并将默认效能和放行模板产品化。
  - risk: 若邻近谱系复用未能实现，滩头市场规模可能太小，难以支撑风险投资规模的结果。
    likelihood: High
    impact: High
    mitigation: 将邻近谱系扩展作为第 12 个月的尽调门槛，在复用得到验证前避免扩大人员或自有实验室产能。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$4–6M"
  runwayMonths: 18
  useOfFundsSummary: 资助 18 个月现金跑道——赢得 3 项付费可行性研究，将至少 1 项转化为完整项目许可，构建β细胞检测和 QC 栈及洁净室数据模型，招聘转化生物学和 CMC 领导层，并证明一次 CDMO 就绪转让和一次邻近谱系扩展测试。
