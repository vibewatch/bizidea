slug: beta-cell-recipe-foundry
date: '2026-06-22'
executiveSummary: >-
  Beta-cell Recipe Foundry should start as a neutral, program-specific
  reproducibility and tech-transfer partner for seed-to-Series B allogeneic
  beta-cell therapy companies, not as a broad regenerative-medicine platform or
  full CDMO. The first buyer is a CSO or VP CMC at a 20-80 person type 1
  diabetes developer whose lead program has animal-efficacy data but cannot yet
  produce repeatable functional lots or a board-ready CMC package. The buying
  trigger is milestone-driven because the company is approaching its next round,
  IND-enabling work, or a foundation-backed translational milestone and needs a
  manufacturability story now rather than another quarter of internal protocol
  tuning. The wedge is a paid feasibility study that designs and tests
  sequential gene-activation recipes, then converts successful work into a
  per-program license and tech-transfer package with in-process checkpoints and
  release logic. Research supports the pain, buyer, and timing, but it also
  shows the beachhead is narrow, with an estimated SAM of about $18M and only
  about 10 visible North American and European beta-cell teams. That makes the
  hard choice clear: prove one beta-cell template first, partner for GMP
  execution, and defer adjacent lineages, encapsulation, and owned manufacturing
  capacity until the recipe data actually compounds. The biggest disconfirming
  risk is not scientific novelty alone but whether recipes transfer across
  customer cell lines and whether startups will pay a neutral foundry instead of
  extending internal work or CDMO scope. The inputs do not provide direct
  evidence of signed external-buy budgets, accepted IP terms, or cross-line
  transfer rates, so the first 18 months must prove paid demand, clean-room
  data access, and one successful external handoff.
problem:
  - Seed-to-Series B beta-cell developers can show compelling lineage biology in the lab but still fail to produce reproducible functional lots for IND-enabling work, turning manufacturing into the gating risk for the next round.
  - Internal protocol tuning, one-step-at-a-time CRO projects, and later-stage CDMOs do not give buyers a fast way to lock recipe logic, potency assays, and release checkpoints before board or regulatory deadlines.
solution:
  - Provide a CRISPR-guided recipe foundry that designs sequential gene-activation programs, runs functional screens, and identifies the smallest beta-cell recipe that clears customer-defined yield, function, and reproducibility thresholds.
  - Deliver a transfer-ready package with protocol versioning, in-process checkpoints, potency and release logic, and partner handoff materials so the customer can move into IND-enabling manufacturing with a stronger CMC story.
whyWeWin:
  - The company sells the earliest manufacturability outcome that internal teams, CROs, and CDMOs do not own by default: reproducible beta-cell lots plus auditable assay and release logic before GMP lock.
  - A neutral foundry position lets it aggregate cross-program recipe and QC data without competing for the customer's therapeutic asset, making each later beta-cell or adjacent-lineage program faster to scope and transfer.
strategicChoices:
  beachhead: North American seed-to-Series B allogeneic beta-cell therapy startups preparing IND-enabling runs after preclinical efficacy but before lot reproducibility is locked.
  wedgeRationale: This slice creates faster proof than a broad pluripotent-manufacturing launch because the buyer set is concentrated, the budget trigger is tied to financing and IND timing, and one failed lot can delay a program by months.
  sequencingRationale: Start service-led on one lineage, build the assay and documentation layer into every engagement, and hand later GMP execution to partners; only after two external transfers should the company hire for adjacent lineages or broader platform products, because the moat depends on validated data reuse rather than lab throughput alone.
  notYet:
    - Owning GMP manufacturing capacity
    - Encapsulation, immune-protection, or implant design products
    - Non-beta-cell therapy programs before two external beta-cell transfers succeed
    - Building an internal therapeutic pipeline that would compromise neutral-foundry positioning
market:
  tam: "$240.0M estimated TAM based on roughly 80 global difficult-lineage pluripotent cell-therapy programs, 1.5 engagements per year, and $2.0M blended engagement value."
  sam: "$18.0M estimated SAM for roughly 10 North American and European beta-cell or pancreatic cell-replacement teams in the initial beachhead."
  som: "$6.0M modeled year-three SOM based on 4 beachhead programs at roughly $1.5M each after one beta-cell use case is proven and later GMP execution is handed to partners."
  segments:
    - Seed-to-Series B allogeneic beta-cell therapy startups preparing IND-enabling work
    - Academic spinouts and translational diabetes programs commercializing endocrine cell-replacement assets
  buyingProcess: >-
    The technical champion is usually the translational or process-development
    lead, while the economic buyer is the CSO or VP CMC because financing
    credibility, outsourced manufacturing strategy, and IND timing sit in the
    same workflow. A typical first sale is a 6-12 week paid feasibility study
    tied to one lead program, converting to a full recipe-transfer engagement if
    the customer sees predefined function, yield, and reproducibility gains.
product:
  mvp: >-
    MVP should cover one customer cell line, one beta-cell target product
    profile, and one default assay stack. It must rank sequential
    gene-activation recipes, capture in-process checkpoints, and deliver a
    tech-transfer packet with yield, function, reproducibility, and release
    logic for one IND-bound program.
  sixMonth: Close 2 design partners, stand up clean-room data-sharing and protocol versioning, and prove one paid feasibility study can produce a narrowed recipe shortlist plus a beta-cell assay template that a RoslinCT-class partner can review.
  twelveMonth: Convert the first feasibility into a full program, validate reproducibility improvement on 2 external customer lots or lines, and ship a standard handoff packet covering protocol versioning, cell-bank metadata, in-process controls, and potency and release rationale.
  twentyFourMonth: Productize the recipe graph, transfer history, and QC benchmark library so the company can run multiple beta-cell programs in parallel and start one adjacent-lineage pilot without becoming a full CDMO.
  keyBets:
    - External customers will share enough data and material under clean-room terms to compound a reusable dataset.
    - Sequential gene-activation recipes can outperform internal plus CRO iteration on cycle time and reproducibility.
    - A default beta-cell potency and release package can satisfy CSO and VP CMC decision needs before IND-enabling work.
    - One beta-cell template can generalize into at least one adjacent difficult lineage.
gtm:
  wedge: Sell a paid reproducibility-rescue program for one type 1 diabetes beta-cell therapy that has animal efficacy but cannot yet show repeatable functional lots or a board-ready CMC package ahead of the next financing or IND-enabling run.
  channels:
    - Founder-led direct sales to CSOs and VP CMCs at seed-to-Series B beta-cell developers
    - Referral partnerships with iPSC and process-development CDMOs that see upstream recipe failures before GMP lock
    - Foundation, KOL, and investor introductions around translational diabetes networks and portfolio companies
  funnelTargets: named target account→qualified technical review 40-50%, qualified technical review→paid feasibility 25-35%, paid feasibility→full program license 50%+, full program→second program or referral 25%+ within 18 months
  pricing: >-
    Charge a paid feasibility study first, then convert successful work into a
    per-program license plus tech-transfer milestones; do not ask for
    downstream royalties in the first sale, because buyers already worry about
    IP leakage and will fund from existing process-development budgets only if
    economics stay legible.
businessModel:
  revenueStreams:
    - Paid feasibility studies for single-program recipe rescue
    - Per-program recipe development licenses
    - Tech-transfer and assay-validation milestones tied to customer-defined gates
    - Annual QC benchmark and documentation subscriptions once customers run multiple programs
  unitOfValue: Therapeutic program under recipe development and transfer
  targetGrossMarginPct: 70
  expansionLevers:
    - Add a second program, second cell line, or second assay package within the same customer after the first transfer succeeds
    - Sell reusable QC benchmark and documentation modules to biotech and CDMO partners
    - Extend the recipe graph into adjacent difficult lineages such as hepatocytes or dopaminergic neurons
strategyMap:
  northStarMetric: Number of external customer programs that hit agreed function, yield, and lot-reproducibility gates and accept a tech-transfer package for IND-enabling work
  inputMetrics:
    - Days from kickoff to recipe shortlist with a customer-approved assay plan
    - Paid feasibility to full program-license conversion rate
    - Percent of pilot programs achieving predefined yield and insulin-secretion thresholds versus baseline
    - Percent of partner transfers accepted without full process redesign
    - Number of reusable gene-activation modules and QC benchmarks used across more than one program
  moatsToBuild:
    - Cross-program recipe graph linking gene-activation sequences, in-process markers, and release outcomes
    - Beta-cell QC and potency benchmark library tied to external transfer outcomes
    - Clean-room contract, documentation, and partner-handoff templates that reduce deployment time with each program
  killCriteria:
    - Fewer than 3 paid feasibility studies from beachhead accounts in the first 12 months
    - No external customer program showing reproducibility improvement on at least 2 separate lots by month 18
    - Paid feasibility to full-program conversion below 50% after the first 4 pilots
    - No credible adjacent-lineage design partner or data-reuse path by month 24
  mermaid: |
    flowchart LR
      Wedge[Beta-cell IND-readiness wedge] --> MVP[Recipe plus assay MVP]
      MVP --> Proof[Reproducible lots and accepted tech transfer]
      Proof --> Expansion[Adjacent lineage manufacturing intelligence]
investorMemo:
  verdict:
    call: Watch
    conviction: Real bottleneck and credible buyer timing, but conviction stays limited until external-buy demand and cross-line transferability are proven.
    whyBelieve: The pain sits on financing and IND timing, budgets already exist inside process-development work, and current substitutes do not own a neutral beta-cell recipe-plus-assay handoff layer.
    whyDoubt: The beachhead appears to contain only about 10 visible teams, and failure to prove transferability or CDMO handoff would trap the company in bespoke services.
    nextDiligence: Secure 2 paid design partners and one RoslinCT-class handoff review to prove buyers will pay for the outcome and that the deliverable survives transfer.
  firstCustomer:
    title: VP CMC at a seed-to-Series B allogeneic beta-cell therapy startup
    profile: A 20-80 person North American beta-cell developer with one lead type 1 diabetes program, promising animal data, and inconsistent functional lots across internal process-development runs and CDMO prep work.
    trigger: The board or next-round process requires a credible IND-enabling manufacturing plan after preclinical efficacy is shown but before reproducible lot data exists.
    buyer: VP CMC
    initialContract: "$250k-$500k paid feasibility study for one cell line and assay package, converting into roughly $1.0-1.5M of full-program license and tech-transfer milestones if function, yield, and reproducibility gates are met."
  mustBeTrue:
    - At least 5 of 15 target CSOs or VP CMCs must confirm a current or next-12-month budget for external recipe work tied to financing or IND milestones.
    - The first 2 external pilots must beat each customer's baseline on predefined function, yield, and lot-reproducibility thresholds.
    - At least one RoslinCT-class partner must accept the handoff packet without rebuilding the full assay and checkpoint logic from scratch.
    - Clean-room IP terms must let the startup retain anonymized benchmarking rights while customers keep program-specific product IP.
    - One beta-cell recipe and assay template must show enough reuse to open an adjacent lineage by month 24.
  diligenceQuestions:
    - How many named beachhead companies are actually in external-buy mode before their next financing or IND milestone?
    - What quantitative reproducibility improvement versus internal plus CRO workflows is required for a buyer to sign a paid program?
    - Which potency, identity, and release assays are non-negotiable for a CSO or VP CMC to call the package decision-quality?
    - Will customers share cell lines and process data under clean-room terms that preserve benchmarking rights?
    - Which CDMOs want a neutral upstream partner, and which will move upstream themselves?
operatingAssumptions:
  - assumption: At least 4 of the roughly 10 visible beachhead teams will buy external recipe work within 36 months.
    basis: research.yaml
    validationTest: Build a 15-20 account map, secure 3 paid feasibility studies, and identify 2 more accounts with budget owners and timing inside 12 months.
    decisionImpact: If false, move to partner-led distribution or pull adjacent-lineage expansion forward instead of scaling direct sales.
  - assumption: Recipe improvements can transfer across more than one external cell line or lot format without a full redesign.
    basis: research.yaml
    validationTest: Replicate the first successful program on a second external line or lot format with no more than one major recipe redesign.
    decisionImpact: If false, the company remains bespoke scientific services and the data moat thesis weakens materially.
  - assumption: Customers will accept clean-room IP and data-rights terms that preserve customer ownership of program-specific product IP and startup access to anonymized benchmarks.
    basis: research.yaml
    validationTest: Negotiate 2 signed pilot MSAs with explicit clean-room, benchmarking, and invention-boundary clauses.
    decisionImpact: If false, the company needs single-tenant engagements or white-label partner models and loses cross-program leverage.
  - assumption: A default beta-cell assay package can satisfy pre-IND decision needs without the startup owning GMP manufacturing.
    basis: research.yaml
    validationTest: Get written review from 2 former CMC or ATMP advisers and 1 CDMO partner that the packet is usable for IND-enabling planning.
    decisionImpact: If false, roadmap priority shifts toward deeper QA and regulatory infrastructure before sales expansion.
  - assumption: Feasibility plus full-program pricing will fit existing process-development budgets without heavy discounting.
    basis: operator judgment
    validationTest: Test pricing in 5 proposals and close 2 paid studies at target pricing with no more than 15% discount.
    decisionImpact: If false, narrow the pilot scope or move to success-based milestone pricing before hiring additional lab staff.
  - assumption: The beta-cell workflow can reuse enough of its data and QC framework to open one adjacent lineage by month 24.
    basis: idea.yaml
    validationTest: Win 1 adjacent-lineage design-partner LOI and show that more than half of the checkpoint schema and data model can be reused in scoping.
    decisionImpact: If false, keep the company capital-light and avoid venture-scale hiring assumptions built on platform expansion.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Map 15-20 named North American and European beta-cell accounts and interview the CSO, VP CMC, or translational lead at each.
    hypothesis: Financing and IND timing, not generic R&D curiosity, determine when buyers will pay for an external recipe foundry.
    successMetric: At least 10 buyer interviews completed and 5 accounts identified with active external-buy timing inside 12 months.
    owner: Founder CEO
  - horizon: 0–90 days
    experiment: Negotiate a clean-room MSA and benchmarking-rights template with 2 design partners and outside counsel.
    hypothesis: Customer-owned program IP plus anonymized benchmarking rights can unblock data sharing without killing the moat.
    successMetric: Two counterparties accept draft commercial terms with limited redlines on data ownership and invention boundaries.
    owner: Founder CEO
  - horizon: 0–90 days
    experiment: Build the first version of the program workspace for protocol versioning, assay capture, and checkpoint reporting using one retrospective customer workflow.
    hypothesis: Productizing documentation and data capture from day one lowers future transfer cost more than adding more wet-lab throughput.
    successMetric: One retrospective program is loaded end-to-end and can generate a shareable checkpoint report in less than 1 day of manual prep.
    owner: Founding eng
  - horizon: 90–180 days
    experiment: Run the first paid feasibility study on one external cell line with predefined yield, function, and reproducibility gates.
    hypothesis: A narrow sequential gene-activation program can compress months of internal iteration into a board-relevant result.
    successMetric: Deliver a customer-approved recipe shortlist within 10 weeks and beat the customer's baseline on at least 2 agreed metrics.
    owner: Scientific founder
  - horizon: 90–180 days
    experiment: Build the beta-cell assay and QC handoff packet and have a RoslinCT-class or equivalent partner review it for transfer readiness.
    hypothesis: Auditable checkpoints and release logic matter as much as recipe novelty in winning the next stage of customer spend.
    successMetric: One partner accepts the packet as transfer-ready with only minor revision requests.
    owner: CMC and QA lead
  - horizon: 180–365 days
    experiment: Run a second external program and measure how much of the recipe, assay, and checkpoint stack can be reused.
    hypothesis: The business becomes venture-scale only if one program materially shortens the next program rather than resetting to zero.
    successMetric: Second paid program signed, at least one module reused across both programs, and paid feasibility to full-program conversion at or above 50%.
    owner: Translational biology lead
  - horizon: 180–365 days
    experiment: Qualify 1 adjacent-lineage design partner and 2 referral channels through CDMOs, disease foundations, or translational institutes.
    hypothesis: Expansion should come from the same buyer network and workflow logic, not from a separate discovery market.
    successMetric: One adjacent-lineage LOI plus 2 qualified referrals generated from ecosystem partners.
    owner: Founder CEO
operations:
  - Clean-room collaboration process covering cell-line transfer, customer-owned downstream IP, and anonymized benchmarking rights
  - Version-controlled recipe and assay records with lot-level checkpoint history and customer-specific access controls
  - Standard beta-cell assay stack tracking yield, insulin secretion, identity, potency, traceability, and cell-bank metadata from day one
  - Partner CDMO handoff packet including protocol versions, in-process controls, release logic, and comparability notes
  - Weekly program review tying scientific results to customer financing, IND, and tech-transfer deadlines
team:
  - role: Founder CEO
    startTiming: Month 0
    rationale: Founder-led account selection and milestone-driven selling are required because the market is small, the buyers are senior, and early deals are strategic rather than transactional.
  - role: Scientific founder
    startTiming: Month 0
    rationale: The company lives or dies on recipe design choices, assay interpretation, and technical credibility with CSOs, VP CMCs, and translational partners.
  - role: Founding eng
    startTiming: Month 0
    rationale: Program data capture, protocol versioning, clean-room access, and reusable recipe and QC models need software ownership from day one if the service is to compound into a product.
  - role: Translational biology lead
    startTiming: Month 3
    rationale: Paid feasibility studies need dedicated wet-lab execution and assay operations before customer volume justifies a larger biology team.
  - role: CMC and QA lead
    startTiming: Month 6
    rationale: The value proposition includes auditable checkpoints, release logic, and partner transfer readiness, which discovery-only scientists do not usually own.
milestones:
  - horizon: 0–12 months
    items:
      - Convert 15-20 target-account interviews into at least 3 paid feasibility studies in the beta-cell beachhead
      - Convert at least 1 feasibility study into a full recipe-transfer program with a customer-approved assay and checkpoint package
      - Secure 1 CDMO or process-development partner willing to review and accept the foundry handoff packet
      - Prove a clean-room IP and data-rights template with 2 signed customer MSAs
  - horizon: 12–24 months
    items:
      - Run 3-4 active beachhead programs and convert at least 2 into multi-stage recipe-transfer engagements
      - Demonstrate recipe or QC module reuse across at least 2 external customer programs
      - Reduce median kickoff-to-recipe-shortlist time below 8 weeks through the program workspace and standard assay templates
      - Qualify the first adjacent-lineage design partner without adding owned GMP manufacturing capacity
  - horizon: 24–36 months
    items:
      - Reach the modeled 4-program year-three SOM path in the beachhead
      - Establish a repeatable partner-transfer path with CDMO and regulatory advisers for every active program
      - Launch the first adjacent-lineage program using the same recipe graph and QC framework
      - Show the company can expand beyond beta cells without becoming a full CDMO or vertical therapy developer
risks:
  - risk: Recipe performance may not transfer across customer cell lines, culture formats, or manufacturing environments.
    likelihood: High
    impact: High
    mitigation: Start with one narrow beta-cell wedge, predefine go and no-go transfer criteria, and do not claim portability before repeated external replication.
  - risk: Buyers may keep upstream recipe work inside the founding science team or extend CDMO scope instead of hiring a neutral foundry.
    likelihood: High
    impact: High
    mitigation: Sell against financing and IND deadlines, prove faster board-ready output than internal workflows, and partner with CDMOs instead of competing for later-stage execution.
  - risk: IP and data-sharing concerns may block access to the customer material needed to build a reusable dataset.
    likelihood: Medium
    impact: High
    mitigation: Use clean-room collaboration, customer-owned downstream product IP, explicit benchmarking clauses, and narrow first pilots with limited data exposure.
  - risk: Regulatory and QA expectations may require a heavier assay, traceability, and documentation stack than early customers expect.
    likelihood: Medium
    impact: High
    mitigation: Hire CMC and QA early, pressure-test the packet with former FDA or EMA and CDMO advisers, and productize default potency and release templates.
  - risk: The beachhead market may be too small to justify venture-scale outcomes if adjacent-lineage reuse does not materialize.
    likelihood: High
    impact: High
    mitigation: Treat adjacent-lineage expansion as a month-12 diligence gate and avoid scaling headcount or owned lab capacity before reuse is demonstrated.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$4–6M"
  runwayMonths: 18
  useOfFundsSummary: Fund 18 months of runway to win 3 paid feasibility studies, convert at least 1 into a full program license, build the beta-cell assay and QC stack plus clean-room data model, hire translational biology and CMC leadership, and prove one CDMO-ready transfer plus one adjacent-lineage expansion test.
