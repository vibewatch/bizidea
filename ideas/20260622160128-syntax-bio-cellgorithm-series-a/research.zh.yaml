  adoptionFrictionMatrix:
  - friction: 配方在客户细胞系、培养格式或后期制造环境间可能无法干净迁移。
    severity: high
    affectedBuyer: CSO/VP CMC
    mitigation: 从一个窄口β细胞楔形切口起步，预定义通过/不通过迁移标准，在多次外部复现前不声称广泛可移植性。
    sourceRefs:
    - 55
    - 69
    - 70
    - 84
    - 99
  - friction: 科学团队可能偏向内部优化加 CDMO，而非信任新的外部工厂。
    severity: high
    affectedBuyer: CSO
    mitigation: 将推介锚定在某个即将到来的融资或 IND 里程碑上，与 CDMO 合作而非在后期执行上竞争。
    sourceRefs:
