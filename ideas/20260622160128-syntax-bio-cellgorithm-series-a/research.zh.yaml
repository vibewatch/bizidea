- name: Syntax Bio
  stage: 扩张期
  wedge: 基于 CRISPR 的 Cellgorithm 平台，用于可编程干细胞分化和内部驱动的β细胞疗法开发。
  pricing: 未公开；平台和合作经济模型。
  strength: 围绕序贯基因激活的强力邻近验证点、融资势头，以及关于规模化可靠产生功能性细胞的直接叙事。
  weaknessVsUs: 似乎以自身平台所有权和疗法管线为导向，而非作为服务众多初创公司的中立外部配方工厂。
  sourceRefs:
  - 1
  - 2
  - 4
  - 5
- name: bit.bio
  stage: 扩张期
  wedge: 基于转录因子编码和合成生物学对细胞特性控制构建的直接细胞编程平台。
  pricing: 未公开；平台、产品和合作模式。
  strength: 相对细胞因子密集分化的清晰概念替代方案，以及围绕可编程细胞特性的强大市场叙事。
  weaknessVsUs: 广泛的编程平台，而非面向外部开发商的β细胞专项、可技术转让 GMP 配方包。
  sourceRefs:
  - 11
  - 12
- name: RoslinCT
  stage: 在位厂商
  wedge: cGMP iPSC 开发加临床和商业细胞疗法制造。
  pricing: 定制报价/CDMO 合作。
  strength: 在多能干细胞 QC、工艺开发和后期制造执行方面拥有深厚公信力。
  weaknessVsUs: 更多拥有执行产能，而非可复用的 CRISPR 引导配方设计和检测数据层。
  sourceRefs:
  - 13
  - 14
- name: Sernova
  stage: 扩张期
  wedge: 面向慢性病（含 T1D 项目）的垂直生物混合器官和细胞递送平台。
  pricing: 不作为外部平台销售；内部项目经济模型。
  strength: T1D 临床转化经验，以及对植入、安全性和长期功能的深入认识。
  weaknessVsUs: 专注于递送和项目所有权，而非为多个外部初创公司提供中立的上游配方优化层。
  sourceRefs:
  - 15
  - 16
  - 29
- name: Aspect Biosystems
  stage: 扩张期
  wedge: 结合 AI 驱动生物打印、生物材料和同种异体细胞疗法的全栈组织疗法平台。
  pricing: 未公开；战略合作模式。
  strength: 广泛的再生医学平台愿景，整合组织设计、生物材料和治疗性细胞。
  weaknessVsUs: 平台范围远比窄口专业β细胞配方工厂宽泛，这可能使其在上游分化转让上聚焦不足。
  sourceRefs:
