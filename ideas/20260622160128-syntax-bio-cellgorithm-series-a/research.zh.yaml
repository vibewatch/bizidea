    - 14
    - 29
  - friction: 效能、放行和细胞库质量包若不从一开始就内嵌设计，可能规格不足。
    severity: high
    affectedBuyer: VP CMC
    mitigation: 围绕特性、效能、可追溯性和安全性构建默认检测栈和文件模板，而非将 QC 视为事后的文件工作。
    sourceRefs:
    - 8
    - 9
    - 10
    - 60
    - 63
    - 64
  - friction: 下游植入和免疫保护问题可能掩盖更好的分化配方的价值。
    severity: medium
    affectedBuyer: 转化项目负责人
    mitigation: 与递送或封装专家联合销售，并将配方成功指标独立于植入物性能之外定义。
    sourceRefs:
    - 15
    - 16
    - 33
    - 38
