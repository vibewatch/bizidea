validationSignals:
- point: Syntax Bio 完成 $14.4M 扩展 A 轮，总融资超过 $25M，用于推进 Cellgorithm 和胰腺β细胞疗法。
  sourceRefs:
  - 1
- point: Breakthrough T1D 向 Syntax Bio 资助最高 $856,250，并明确将可靠、可规模化的胰腺β细胞生产定性为关键需求。
  sourceRefs:
  - 3
- point: Syntax 和 bit.bio 均推出直接编程叙事，以更确定性的控制层取代缓慢的人工分化。
  sourceRefs:
  - 2
  - 4
  - 11
- point: RoslinCT 公开销售 cGMP iPSC 开发和多能干细胞制造支持，确认了外部基础设施需求。
  sourceRefs:
  - 13
  - 14
- point: Sernova 正推动 T1D 细胞替代项目完成临床转化，证明了下游买家对功能性细胞疗法的迫切需求。
  sourceRefs:
  - 15
  - 16
- point: 文献现将多能干细胞衍生疗法描述为处于临床试验阶段，而非纯粹的临床前概念。
  sourceRefs:
  - 21
  - 54
  - 69
openQuestions:
- 未来 24 个月内有多少种子轮至 B 轮β细胞项目处于真正的外部购买模式，而非将配方工作留在创始科学团队内部？
- 哪些洁净室、数据权和 IP 条款足以让客户共享细胞系和工艺数据而不阻碍护城河建设？
- FDA/EMA 经验顾问在 IND 使能工作前会接受哪个最小效能和放行检测包作为决策质量标准？
- 在一条细胞系或培养格式上发现的配方，能否迁移至另一条细胞系、生物反应器或递送模式？
