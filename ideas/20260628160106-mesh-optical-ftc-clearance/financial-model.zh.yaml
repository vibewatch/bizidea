scenarios:
  downside:
    description: 混合厂商需求比预期更窄，一个早期试点未能转化，解决方案工作比计划更长时间保持定制化。
    y3RevenueK: 2980.0
    y3EbitdaK: -1460.0
    cashLowPointK: -320.0
    keyAssumptionChanges:
    - Q4Y3 活跃园区上限为 6 个而非 8 个，因为两次后期转化滑出模型期限。
    - 每园区确认收入年化运行率退至约 $510K，因为部署附加基准模块较少。
    - Y3 毛利率仅达到 66%，因为实施和异常处理仍以人工为主。
  base:
    description: 基准情景达到研究得出的 8 园区第三年赢单数，不假设完全实现每站 SOM 变现。
    y3RevenueK: 3870.0
    y3EbitdaK: -870.6
    cashLowPointK: 454.4
    keyAssumptionChanges:
    - 活跃付费园区/波次从 Q4Y1 的 2 个增至 Q4Y2 的 5 个，Q3Y3 起稳定在 8 个。
    - Q4Y3 每活跃园区确认收入年化运行率约 $570K，低于研究得出的 $750K/站 SOM 基准。
    - Q4Y3 员工人数增至 12 名 FTE，在任何更大规模销售拓展前保持团队技术和实施导向。
  upside:
    description: 标杆客户和合作伙伴转介绍提前拉入一个额外园区，并加速第二园区扩展。
    y3RevenueK: 4720.0
    y3EbitdaK: -280.0
    cashLowPointK: 880.0
    keyAssumptionChanges:
    - 第九个活跃园区通过合作伙伴来源动作在 Q3Y3 末落地，至少一家现有运营商比计划更快新增第二个机房。
    - 随着基准报告和部署费更稳定地附加，每园区确认收入年化运行率接近 $625K。
    - Y3 毛利率达到 72%，因为审批模板和遥测基准比计划更快产品化。
sensitivity:
- variable: ARPU
  downsideCase: Q4Y3 每园区年化收入退出值为 $500K。
  baseCase: Q4Y3 每园区年化收入退出值为 $570K。
  upsideCase: Q4Y3 每园区年化收入退出值为 $625K。
  y3RevenueImpactK: -470.0
  cashImpactK: -329.0
- variable: CAC
  downsideCase: 因转介绍表现不及预期，每活跃园区累计 S&M 升至约 $390K。
  baseCase: 基准情景每活跃园区累计 S&M 约 $334K。
  upsideCase: 合作伙伴转介绍将每活跃园区 CAC 压住在 $280K 附近。
  y3RevenueImpactK: 0.0
  cashImpactK: -445.0
- variable: churn
  downsideCase: 月流失率升至 2.0%，到 Y3 末实际流失一个成熟园区。
  baseCase: 月流失率为 1.4%。
  upsideCase: 随着审批数据嵌入续约，月流失率降至 1.0%。
  y3RevenueImpactK: -300.0
  cashImpactK: -215.0
- variable: sales cycle
  downsideCase: 因数据访问和采购耗时较长，最后两个园区赢单各延迟一个季度。
  baseCase: 新园区按模型节奏 M4、M7、Q1Y2、Q2Y2、Q3Y2、Q1Y3、Q2Y3 和 Q3Y3 落地。
  upsideCase: 一个合作伙伴来源园区提前一个季度成交。
  y3RevenueImpactK: -360.0
  cashImpactK: -250.0
- variable: gross margin
  downsideCase: Y3 毛利率停滞在 66%。
  baseCase: Y3 毛利率达到 70%。
  upsideCase: Y3 毛利率达到 72%。
  y3RevenueImpactK: 0.0
  cashImpactK: -155.0
- variable: hiring pace
  downsideCase: 客户成功和财务/运营招募提前两个季度，早于收入跟上。
  baseCase: 后台和售后招募保持靠后，Q4Y3 员工人数维持 12 名 FTE。
  upsideCase: 后期招募推迟到第八个园区完全可背书之后。
  y3RevenueImpactK: 0.0
  cashImpactK: -180.0
modelDiagram:
  title: 单位经济模型流程
  mermaid: |-
    flowchart LR
      Leads --> PaidPilots
      PaidPilots --> ProductionCampuses
      ProductionCampuses --> ExpansionModules
      ExpansionModules --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
- checkName: 收入引擎
  finding: 基准情景通过 Q4Y1 的 2 个活跃付费波次增至 Q3Y3 的 8 个活跃园区，Y3 年化运行率 $4.56M，全年收入达到 $3.87M。
- checkName: 必须做对的事
  finding: 首批两个付费试点中至少一个必须足够快转化，使公司在更重的合作伙伴和支持招募到来前，于 Q4Y2 达到 5 个活跃园区。
- checkName: 模型失效情景
  finding: 若公司停滞在 6 个园区且毛利率停在约 66%，悲观情景将在第三年证明包完成前耗尽现金。
- checkName: 下一轮证明包
  finding: 可信的下一轮由 5 个生产园区、2 个合作伙伴来源赢单、新园区上线时间低于 6 周，以及 800G 审批图谱延伸至 1.6T 工作流且保持 70% 毛利率目标的证据支撑。
sanityChecks:
  ruleOf40: Y3 增长率 89.7% + EBITDA 利润率 -22.5% = 67.2%
  burnMultiple: Y2 燃烧倍数约 0.8x（基于 $1.56M 净新增收入），Y3 随平台以精简 GTM 团队支持 8 个园区改善至约 0.5x。
  revenuePerFte: Y3 每 FTE $323K（大致在 $200–400K 垂直 SaaS 基准区间内）
  flags:
  - 模型 Y3 末仍 EBITDA 为负，因此公司必须展现极强的续约率和可背书性，才能在不大幅稀释的情况下完成下一轮融资。
  - 收入集中度较高——整个第三年情景由 8 个活跃园区支撑；失去一个大型运营商将实质性改变现金跑道。
  - 研究通过排期风险经济学确认了付费意愿，但竞争对手公开定价稀缺，因此生产园区定价仍需实际买家验证。
  - 毛利率达到商业计划目标的前提是审批模板和遥测基准在第 2 年变得明显更可复用；若服务仍高度定制，种子轮规模可能向商业计划区间上限移动。
