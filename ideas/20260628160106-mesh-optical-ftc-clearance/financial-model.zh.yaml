slug: optical-fabric-rollout-os
date: '2026-06-28'
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-07
  unit: YYYY-MM
  source: '[BP date 2026-06-28] 模型从商业计划日期的次月开始。'
- id: A2
  name: 期初现金与种子轮
  value: $3.8M
  unit: USD
  source: '[BP fundingAsk targetFundingRangeUsd $3–5M + BP fundingAsk runwayMonths 18] 基准情景采用 $3.8M 种子轮，以便团队资助工程优先爬坡，同时在第 3 年末保留约六个月现金缓冲。'
- id: A3
  name: 起始活跃付费园区/波次数
  value: '0'
  unit: count
  source: '[BP milestones + BP investorMemo.nextDiligence] 公司从零营收起步，必须先落地与实际改造波次挂钩的付费试点。'
- id: A4
  name: 客户定义
  value: 一个运营商内的一个活跃付费试点或生产园区上线覆盖
  unit: definition
  source: '[BP businessModel.unitOfValue + BP gtm.wedge] customersEop 追踪付费上线单元，而非席位或整个企业账户。'
- id: A5
  name: 活跃客户爬坡
  value: Q4Y1 达到 2 个活跃付费园区/波次，Q4Y2 达到 5 个，Q3Y3 起达到 8 个
  unit: count
  source: '[BP milestones + Research market.som 8 个第三年赢单] 基准情景匹配第一年 2 个付费试点，达到 12–24 个月园区目标中点，并落在研究得出的 8 园区第三年情景。'
- id: A6
  name: 每活跃园区/波次确认收入
  value: 'Y1 第 4–9 月每活跃单元每月 $30K，第 10–12 月 $35K；Y2 季度混合分别为 $100K、$110K、$120K 和 $140K；Y3 季度混合分别为 $130K、$130K、$130K 和 $142.5K'
  unit: USD per active unit per period
  source: '[BP investorMemo.firstCustomer.initialContract $150k–$250k 试点和 $500k–$800k 第一年园区价值 + BP businessModel.revenueStreams] 早期以试点为主，随后组合向订阅加部署和基准费转移，同时保持低于研究得出的 $750K/站 SOM 基准。'
- id: A7
  name: 毛利率爬坡
  value: Y1 45%，Y2 58%，Y3 70%
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct 70 + BP operatingAssumptions 可复用审批图谱] 上线初期以服务为主，待模板和遥测基准可复用后达到计划的稳态类软件毛利率。'
- id: A8
  name: 单位经济模型月流失率
  value: 1.4%
  unit: percent per month
  source: '[startup-finance heuristic + BP operatingAssumptions 早期客户续约为年度园区订阅] 企业基础设施工作流粘性应较高，但流失率保持非零，因为部分园区可能将产品视为项目软件。'
- id: A9
  name: 各职位含税薪酬
  value: '创始人/CEO $190K；创始工程师 $205K；光子学/网络领域负责人 $240K；产品工程师 $185K；解决方案负责人 $195K；客户经理 $235K；高级平台工程师 $195K；数据/平台工程师 $190K；实施工程师 $165K；客户成功/项目经理 $155K；合作伙伴负责人 $215K；财务/运营经理 $145K'
  unit: USD per year
  source: '[BP team + startup-finance heuristic] 面向北美的技术型企业团队全加载现金薪酬，含工资税和福利。'
- id: A10
  name: 招聘时间节点
  value: 'M1 创始人和创始工程师；M2 光子学/网络领域负责人；M5 产品工程师；M8 解决方案负责人；M14 客户经理；M18 高级平台工程师；M20 数据/平台工程师；M22 实施工程师；M26 客户成功/项目经理；M28 合作伙伴负责人；M34 财务/运营经理'
  unit: timeline
  source: '[BP team.startTiming + BP strategicChoices.sequencingRationale] 领域、实施和产品产能在规模化商业招聘前先行，后台支持延至第 3 年末。'
- id: A11
  name: 职能薪资分摊
  value: '创始人 55% S&M / 45% G&A；创始工程师 100% R&D；领域负责人 80% R&D / 20% G&A；产品工程师 100% R&D；解决方案负责人 25% S&M / 50% R&D / 25% G&A；客户经理 100% S&M；高级和数据工程师 100% R&D；实施工程师 25% S&M / 45% R&D / 30% G&A；客户成功 35% S&M / 65% G&A；合作伙伴负责人 100% S&M；财务/运营 100% G&A'
  unit: allocation
  source: '[BP team rationales + BP operations] 将每位招募人员计入 P&L 中消耗该成本的运营职能。'
- id: A12
  name: 非薪酬销售与市场支出
  value: 'M1–M6 每月 $20K，M7–M12 每月 $25K，M13–M18 每月 $35K，M19–M24 每月 $45K，M25–M30 每月 $60K，M31–M36 每月 $70K'
  unit: USD per month
  source: '[BP gtm.channels + startup-finance heuristic] 覆盖创始人差旅、解决方案工程支持、合作伙伴赋能、客户晚宴和窄范围企业外呼动作，而非付费 PLG 获客。'
- id: A13
  name: 非薪酬研发支出
  value: 'Y1 每月 $18K，Y2 每月 $25K，Y3 每月 $35K'
  unit: USD per month
  source: '[BP product + BP operations] 覆盖云、数据摄入、遥测存储、测试、安全和标准验证工具。'
- id: A14
  name: 非薪酬一般及行政支出
  value: 'Y1 每月 $12K，Y2 每月 $15K，Y3 每月 $20K'
  unit: USD per month
  source: '[BP operations + Research regulatoryLandscape] 覆盖面向大型运营商的基础设施软件供应商所需的法律、保险、审计、财务系统和公司行政。'
- id: A15
  name: 现金转换约定
  value: EBITDA 近似等于现金变动
  unit: modeling convention
  source: '[startup-finance heuristic] 在种子阶段，资本支出、税收、融资费用和营运资金波动相对于运营现金消耗被视为不重要。'
- id: A16
  name: CAC 约定
  value: 第 3 年末每活跃园区累计 S&M 支出 $334.3K
  unit: USD per campus
  source: '[BP gtm 创始人主导直销+合作伙伴转介绍+模型计算] CAC 等于 36 个月累计 S&M 支出除以基准情景 8 个活跃园区。'
- id: A17
  name: 下一轮里程碑
  value: 5 个生产园区、2 个合作伙伴来源赢单、上线时间低于六周，以及首个 1.6T 资质认证扩展，同时保留至少六个月现金缓冲
  unit: milestone
  source: '[BP milestones 12–24 个月和 24–36 个月 + BP fundingAsk.useOfFundsSummary] 这是种子轮在更大规模轮次可信前需要兑现的证明包。'
- id: A18
  name: 第 3 年收入天花板纪律
  value: Q4Y3 年化运行率约 $4.56M，低于研究得出的 $6.0M SOM 上限
  unit: USD per year
  source: '[Research market.som $6.0M = 8 个赢单 × $0.75M/站] 基准情景刻意保持低于 SOM 标题值，以免模型假设立即实现完整站点变现。'
