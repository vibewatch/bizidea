slug: optical-fabric-rollout-os
date: '2026-06-28'
executiveSummary: >-
  Optical Fabric Rollout OS sells a vendor-neutral qualification and cutover
  control plane to North American GPU cloud and AI colocation operators
  retrofitting 10-30 MW halls to optical-heavy AI fabrics. The first customer is
  a VP of network infrastructure or head of AI data-center engineering facing a
  hard tenant or internal cluster delivery date, a first move to 800G or 1.6T
  optics, and a mixed-vendor approval problem that spreadsheets and vendor
  services do not resolve cleanly. The wedge is intentionally narrow: validate
  approved transceiver, switch, fiber, and rack-distance combinations before
  procurement, then compare expected versus actual link behavior during the first
  30 days after cutover. That beachhead is attractive because one failed module
  choice or cutover mistake can strand six figures of daily GPU capacity, making
  schedule-risk ROI legible to an infrastructure buyer. Research supports an
  estimated $60.0M North American beachhead SAM and a plausible $6.0M year-three
  SOM, with revenue anchored in per-campus subscriptions plus rollout-linked
  fees. The company should not start as a broad network-operations platform or a
  generic digital twin because the fastest proof comes from one urgent workflow
  around design freeze and first production cutover. The main open question is
  how often target buyers truly need neutral multi-vendor approval instead of
  accepting a single OEM fabric bundle. Until the team proves repeated paid
  pilots, usable customer data access, and production conversion in retrofit
  environments, this is a promising but still diligence-heavy AI infrastructure
  software opportunity.
problem:
  - AI hall operators still approve optical BOMs with vendor datasheets, spreadsheet link budgets, and fragmented lab tests, which makes first-time 800G or 1.6T deployments slow and error prone.
  - A bad transceiver, reach, or connector assumption can delay cluster go-live, waste scarce power-constrained capacity, and erase the efficiency gains optics are supposed to deliver.
  - Existing alternatives split across OEM bundles, test instruments, consultants, and generic network tools, so operators lack a neutral system of record for approved combinations and cutover readiness.
solution:
  - Ingest switch SKUs, rack layouts, fiber maps, approved vendor lists, and rollout timing to generate a validated interoperability matrix and link-budget model before procurement is locked.
  - Turn the approved design into a cutover playbook with rack-by-rack certification steps, exception handling, and explicit pass-fail thresholds for first deployment waves.
  - Compare expected versus actual latency, error rates, and watts per Gbps during the first 30 days so teams can quarantine bad modules, update approval rules, and improve the next hall rollout.
whyWeWin:
  - The product owns the vendor-neutral approval layer that optics vendors, switch OEMs, and services firms are poorly positioned to provide credibly in mixed-vendor retrofits.
  - Every rollout can improve a proprietary graph of compatible module, switch, fiber, reach, and power outcomes that generic digital twins and test tools do not naturally accumulate.
  - The wedge ties directly to design-freeze and go-live events with visible schedule and capacity risk, which is a sharper budget trigger than selling broad observability or generic infrastructure planning software.
strategicChoices:
  beachhead: North American GPU cloud and AI colocation operators retrofitting existing 10-30 MW halls to 800G multi-vendor optical fabrics under precommitted tenant or internal cluster delivery dates.
  wedgeRationale: This entry point creates faster proof than a broader AI-network platform because the buyer already has a near-term procurement and cutover decision, the cost of delay is measurable in stranded GPU hours, and value can be shown on one hall without displacing the customer's broader network stack.
  sequencingRationale: Start with pre-procurement qualification and first-wave cutover control because those workflows need limited integrations and directly address the highest-cost failure mode; add first-30-day telemetry baselining next so the company can compound a proprietary approval dataset; postpone broader operations analytics until the team has referenceable deployments, a repeatable services playbook, and vendor or integrator channel support; hire domain and implementation talent before scaled sales because early wins depend more on model credibility and deployment speed than pipeline volume.
  notYet:
    - Single-vendor greenfield hyperscaler fabrics where the OEM already controls modules, switches, and rollout playbooks
    - General data-center observability, DCIM, or long-tail network operations analytics outside optics rollout approval
    - Autonomous live-network remediation beyond the first 30-day post-cutover window
    - Expansion outside North America before the team proves a repeatable retrofit motion in the densest AI-hall market
market:
  tam: $0.5B estimated TAM based on roughly 650 relevant global AI campuses or halls by 2028 at about $0.75M annualized revenue per site
  sam: $60.0M estimated North American beachhead SAM based on roughly 80 target halls at about $0.75M annualized revenue per site
  som: $6.0M estimated year-three SOM based on 8 production campuses at about $0.75M annualized revenue per site
  segments:
    - GPU cloud and AI colocation operators running retrofit programs for optical-heavy AI halls
    - Enterprise or hyperscale infrastructure teams managing mixed-vendor optical approvals for dense AI cluster launches
  buyingProcess: The economic buyer is most likely the VP of network infrastructure or head of AI data-center engineering, with network engineering and cluster deployment leaders as the day-to-day champions because they own BOM approval, rollout timing, and first-pass certification. The fastest first sale is a paid design and cutover pilot scoped to one hall and one upcoming deployment wave, then converted to a campus subscription with rollout fees if the buyer sees faster approval cycles and clean first-wave certification.
product:
  mvp: >-
    MVP covers one hall, one planned retrofit wave, and a narrow set of common
    switch and optics combinations. It ingests BOM and topology data, produces
    an approved compatibility graph plus cutover checklist, and captures the
    first 30 days of outcome data against the modeled envelope.
  sixMonth: Deliver 2-3 paid pilots with spreadsheet and API ingestion templates, approved-combination modeling for 800G optics, cutover playbooks, and post-install exception tracking for the first deployment wave.
  twelveMonth: Convert early pilots into production campus contracts, add first-30-day telemetry baselining, ship reusable approval templates for the most common switch and optics stacks, and support multi-wave hall rollouts with partner-assisted onboarding.
  twentyFourMonth: Expand from single-campus retrofit approval into multi-campus benchmarking, warranty and vendor-dispute evidence, and adjacent 1.6T or silicon-photonics qualification workflows while keeping implementation light enough to launch a new campus in under six weeks.
  keyBets:
    - Target customers will share enough BOM, fiber-map, and telemetry data to deliver useful approval outputs without a long custom integration project.
    - Mixed-vendor retrofits are common enough in the beachhead to support a vendor-neutral wedge instead of defaulting to OEM bundles.
    - Buyers value first-pass certification and days saved enough to sign six-figure pilots before a full production subscription is proven.
    - The same approval graph can extend from 800G retrofit projects to 1.6T, rack-scale optics, and multi-campus benchmarking without turning the company into a services firm.
gtm:
  wedge: Sell a 90-120 day paid qualification and cutover pilot tied to one hall's design-freeze and rollout window, using the customer's real BOM and topology to approve combinations and produce the first-wave cutover playbook.
  channels:
    - Founder-led direct sales to infrastructure VPs, heads of AI data-center engineering, and network deployment leaders at GPU clouds and AI colocation operators
    - Referral and co-delivery paths through cabling, optics, and test vendors that already advise on AI hall buildouts
    - Design-partner introductions through AI infrastructure integrators and open infrastructure ecosystems where operators compare architectures before standardizing
  funnelTargets: lead→qualified design partner 15-25%, qualified design partner→paid pilot 40-60%, paid pilot→production campus contract 50%+, production campus→second hall or second campus expansion 30%+ within 18 months
  pricing: Annual subscription per campus priced by covered halls and validated-link volume, plus a paid pilot and rollout fee tied to the deployment wave; this matches how value is created because the buyer pays to reduce schedule risk and failed certifications on discrete build events rather than to add seats.
businessModel:
  revenueStreams:
    - Paid design and qualification pilots for one hall retrofit or build wave
    - Annual campus subscription for approved-combination knowledge, playbooks, and first-30-day baselining
    - Deployment, expansion, and premium analytics fees for additional halls, second campuses, and vendor-benchmark reporting
  unitOfValue: One AI hall or campus rollout covered by an approved optical compatibility graph and first-30-day validation workflow
  targetGrossMarginPct: 70
  expansionLevers:
    - Expand from one hall to additional halls and campuses inside the same operator
    - Add benchmark and dispute-resolution modules using accumulated rollout and telemetry history
    - Move from retrofit approval into ongoing procurement, capacity-planning, and next-generation optics qualification workflows
strategyMap:
  northStarMetric: Percent of planned optical links certified on the first production cutover attempt for covered rollout waves
  inputMetrics:
    - Time from customer data receipt to approved optical BOM and compatibility matrix
    - Percent of planned links modeled before procurement lock
    - First-wave cutover certification rate
    - Number of production exceptions detected within the first 30 days and resolved without delaying tenant go-live
    - Paid pilot to production campus conversion rate
    - Production customers expanding to a second hall or campus
  moatsToBuild:
    - Cross-vendor approval graph linking module, switch, fiber, reach, port-power, and observed outcome data
    - Library of reusable rollout templates for the common AI hall architectures and vendor stacks in North America
    - First-30-day benchmark corpus for latency, BER, and watts per Gbps under real AI fabric load conditions
    - Referenceable integrator and vendor relationships that increase data access and distribution without surrendering neutrality
  killCriteria:
    - Fewer than 2 paid pilots signed within 9 months of focused founder-led selling
    - Less than 70% of sampled pilot BOM and topology data can be normalized within 2 weeks
    - Pilot to production conversion stays below 40% after the first 5 pilots
    - More than half of closed-lost opportunities choose a single OEM bundle specifically because neutral approval is unnecessary
  mermaid: |
    flowchart LR
      Wedge[Optical retrofit wedge] --> MVP[Qualification and cutover MVP]
      MVP --> Proof[First-wave certification proof]
      Proof --> Expansion[Multi-campus benchmarking and procurement expansion]
investorMemo:
  verdict:
    call: Meet / investigate further
    conviction: Strong pain and a coherent wedge, but conviction depends on proving mixed-vendor demand and lightweight customer data access within the first few pilots.
    whyBelieve: AI hall operators face expensive go-live risk at the exact moment optics complexity, power pressure, and rollout volume are rising fast enough to support a new control layer.
    whyDoubt: The standalone product can collapse if most priority customers accept single-vendor bundles or if required BOM and telemetry data remain too messy for a software-first deployment.
    nextDiligence: Verify 2 paid pilots tied to live hall retrofits and confirm at least 1 converts to a $500k+ first-year production contract with measurable first-pass certification or schedule gains.
  firstCustomer:
    title: VP network infrastructure at a North American GPU cloud or AI colocation operator
    profile: Operator running one or more 10-30 MW AI halls, moving to 800G optics under a hard tenant or internal launch date, and managing mixed vendors across modules, switches, and cabling.
    trigger: Design freeze for a new hall or retrofit wave exposes first-time multi-vendor optical approval risk under a fixed cluster delivery date.
    buyer: VP Network Infrastructure or Head of AI Data Center Engineering
    initialContract: $150k-$250k paid pilot for one hall's qualification and cutover plan, converting to roughly $500k-$800k first-year campus value including subscription and rollout fees if the first wave certifies on schedule.
  mustBeTrue:
    - At least a meaningful minority of beachhead AI hall retrofits use mixed-vendor optics combinations that require neutral approval rather than a full OEM bundle.
    - Target customers can export BOM, fiber-map, and early telemetry data fast enough to deliver useful approval outputs inside a 90-120 day pilot.
    - Infrastructure leaders will pay six-figure pilot budgets to reduce schedule risk before production proof exists.
    - A first-wave win can convert into a renewable campus subscription instead of remaining episodic services revenue.
    - Test vendors, OEMs, and digital-twin tools do not close the same approval and cutover gap quickly enough to commoditize pricing.
  diligenceQuestions:
    - How often do North American GPU cloud and AI colo operators truly mix optics vendors in 2026-2027 retrofit programs?
    - Which KPI opens budget fastest in practice: days saved, first-pass certification, or watts-per-Gbps regression detection?
    - What minimum BOM, topology, and telemetry exports can the first customer provide without a lengthy integration project?
    - Why would a buyer add this neutral layer instead of accepting OEM services or extending an existing test or network-validation stack?
    - What proportion of pilot value is software versus hands-on implementation, and can that mix improve after the first few customers?
operatingAssumptions:
  - assumption: Mixed-vendor optical retrofits are common enough in North American AI halls to support a neutral approval wedge.
    basis: research.yaml
    validationTest: Interview 10 target operators and collect 3 current or recent approved-vendor lists or rollout postmortems showing real multi-vendor approval decisions.
    decisionImpact: If false, narrow the ICP to multi-tenant retrofit operators only or pivot toward OEM-adjacent analytics rather than a standalone control plane.
  - assumption: Pilot customers can provide usable BOM, fiber-map, and topology data within 2 weeks of kickoff.
    basis: research.yaml
    validationTest: Run structured discovery with 2 design partners and require successful ingestion of sample exports before signing fixed-scope pilot SOWs.
    decisionImpact: If false, implementation cost rises and the product must either build heavier services capability or narrow to pre-cutover advisory workflows.
  - assumption: First-wave certification and schedule-risk reduction are stronger budget triggers than generic network observability.
    basis: idea.yaml
    validationTest: In 8-10 buyer interviews, test budget language and require that at least 5 prospects rank cutover approval or schedule risk above ongoing observability as the reason to buy.
    decisionImpact: If false, the GTM narrative and roadmap should shift toward broader operations tooling, which materially changes competition and hiring.
  - assumption: A reusable approval graph for common 800G stacks can keep pilot delivery mostly software-led after the first few deployments.
    basis: operator judgment
    validationTest: Track pilot effort and require median time to first approved BOM below 3 weeks by the fourth customer using templates rather than one-off engineering.
    decisionImpact: If false, the company becomes services-heavy, reducing gross margin and weakening venture scalability.
  - assumption: Early customers will renew into annual campus subscriptions after one successful rollout wave.
    basis: idea.yaml
    validationTest: In the first 3 pilots, require at least 2 renewal proposals that include a subscription component for future waves or ongoing approval coverage.
    decisionImpact: If false, the company should reprice as project software plus premium services or reconsider whether the market supports durable ARR.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Interview 15-20 infrastructure VPs, network engineering leaders, and deployment heads at GPU clouds and AI colocation operators.
    hypothesis: The highest-urgency first workflow is pre-procurement optical approval for retrofit halls, not general network planning.
    successMetric: At least 10 interviews describe a recent or upcoming rollout where optical approval risk affected schedule, budget, or vendor choice.
    owner: Founder CEO
  - horizon: 0–90 days
    experiment: Build a manual-plus-software pilot model from one design partner's real BOM, rack layout, and fiber map.
    hypothesis: The team can produce a decision-useful approval matrix and cutover checklist from existing customer artifacts without a deep integration project.
    successMetric: One design partner accepts the modeled output as sufficient to influence procurement or cutover planning within 3 weeks.
    owner: Founding eng
  - horizon: 90–180 days
    experiment: Run 2 paid pilots tied to live hall retrofit or build waves.
    hypothesis: A fixed design-freeze and go-live deadline converts faster than a broad platform sale and produces measurable first-wave proof.
    successMetric: 2 paid pilots launch with explicit success criteria and at least 1 customer uses the playbook in a production cutover.
    owner: Founder CEO
  - horizon: 90–180 days
    experiment: Productize first-30-day telemetry baselining for the top 3 metrics customers already watch.
    hypothesis: Post-cutover variance detection increases renewal odds because it turns one project into a continuing approval and benchmarking workflow.
    successMetric: At least 1 pilot customer reviews a first-30-day variance report and agrees to scope subscription coverage for the next rollout wave.
    owner: Product engineer
  - horizon: 180–365 days
    experiment: Launch one integrator or vendor-assisted referral motion with clearly bounded neutrality rules.
    hypothesis: Channel partners can accelerate pipeline and data access without forcing the startup into a white-labeled services role.
    successMetric: One partner-sourced pilot closes at comparable pricing to direct deals and preserves the startup as the system of record for approvals.
    owner: Solutions lead
  - horizon: 180–365 days
    experiment: Expand one production customer from a single hall into a second hall or campus.
    hypothesis: The approval graph and rollout templates are portable enough to create multi-site ARR expansion without a ground-up reimplementation.
    successMetric: One expansion closes at 30% or greater incremental ARR over the initial production contract.
    owner: Founder CEO
operations:
  - BOM, fiber-map, and topology ingestion process with standard templates for spreadsheet and common API exports
  - Approval-rule workflow for validating module, switch, reach, and power combinations before procurement sign-off
  - Cutover playbook generation and exception-tracking process for first deployment waves
  - First-30-day telemetry review cadence that feeds approved-combination updates and customer benchmark reports
team:
  - role: Founding eng
    startTiming: Month 0
    rationale: Build the approval graph, data-ingestion pipeline, and first pilot tooling around real customer BOM and topology artifacts.
  - role: Photonics and network domain lead
    startTiming: Month 0-3
    rationale: Credibility with buyers depends on standards fluency, link-budget logic, and practical understanding of optics qualification tradeoffs.
  - role: Product engineer
    startTiming: Month 3-6
    rationale: Convert manual pilot outputs into a repeatable application and ship first-30-day baselining without slowing customer delivery.
  - role: Solutions lead
    startTiming: Month 6-9
    rationale: Early growth will be constrained by implementation speed, partner coordination, and the ability to keep pilots from turning into bespoke consulting.
  - role: First account executive
    startTiming: Month 12-15
    rationale: Add scaled selling only after 2-3 referenceable deployments clarify the ICP, ROI story, and implementation boundaries.
milestones:
  - horizon: 0–12 months
    items:
      - Secure 2 design partners and complete 15 or more buyer interviews in the beachhead
      - Launch 2 paid pilots tied to live hall retrofit or build waves
      - Convert at least 1 pilot into a production campus contract
      - Ship reusable templates for BOM ingestion, approval rules, and cutover playbooks for common 800G stacks
  - horizon: 12–24 months
    items:
      - Reach 4-6 production campuses with at least 2 multi-hall or multi-wave expansions
      - Add first-30-day telemetry baselining and vendor-benchmark reporting as standard modules
      - Close 2 partner-sourced deals through integrators or ecosystem referrals without discounting the neutral control-plane position
      - Keep median time to first approved BOM under 3 weeks and new-campus launch time under 6 weeks
  - horizon: 24–36 months
    items:
      - Reach 8 or more production campuses, consistent with the researched year-three SOM case
      - Expand support into 1.6T or silicon-photonics qualification workflows for existing customers
      - Establish the approval graph and benchmark dataset as a renewal driver rather than a one-time project artifact
      - Maintain software-like delivery economics while entering adjacent procurement and capacity-planning workflows
risks:
  - risk: The real market may skew more heavily toward single-vendor OEM fabrics than the beachhead thesis assumes.
    likelihood: Medium
    impact: High
    mitigation: Target retrofit and multi-tenant operators first, and treat mixed-vendor prevalence as a top kill criterion rather than assuming it scales.
  - risk: Customers may lack clean BOM, fiber-map, or telemetry exports, forcing the company into custom implementation work.
    likelihood: High
    impact: High
    mitigation: Require sample artifacts before scoping pilots, standardize ingestion templates, and keep the first value point in pre-cutover modeling even when telemetry is incomplete.
  - risk: Test vendors, OEMs, or digital-twin platforms may bundle enough adjacent functionality to compress pricing.
    likelihood: Medium
    impact: High
    mitigation: Focus messaging on neutral approval, cutover control, and first-month benchmark data that bundled tools do not own well.
  - risk: Standards and product shifts from 800G to 1.6T, silicon photonics, or co-packaged optics can stale the approval graph quickly.
    likelihood: Medium
    impact: Medium
    mitigation: Hire domain expertise early, anchor models to open standards where possible, and refresh supported combinations aggressively with each deployment.
  - risk: Revenue may remain episodic if customers treat the product as a project tool instead of renewing into ongoing coverage.
    likelihood: Medium
    impact: High
    mitigation: Make first-30-day baselining and next-wave approval coverage part of every production proposal so renewals are tied to future rollout waves and benchmarking value.
fundingAsk:
  round: seed
  targetFundingRangeUsd: $3–5M
  runwayMonths: 18
  useOfFundsSummary: Fund 18 months to prove 2-3 paid pilots, 1-2 production conversions, a reusable approval graph for common 800G stacks, first-30-day telemetry baselining, and a small team spanning engineering, domain expertise, and solutions delivery before scaled sales.
