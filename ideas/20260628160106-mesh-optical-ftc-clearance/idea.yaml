topRisks:
  - name: Vendor pushback
    description: Optical and switch vendors may resist a neutral platform that exposes compatibility problems or weak performance claims.
    mitigation: Start with operators as the paying customer, offer vendors benchmark visibility as an opt-in distribution channel, and keep certification criteria transparent.
  - name: Slow enterprise cycles
    description: AI data-center buyers may only make this purchase around major buildouts or retrofits, limiting early sales velocity.
    mitigation: Package the wedge around imminent retrofit events, charge deployment-linked fees, and use flagship design partners to create repeatable ROI proof.
  - name: Data access gaps
    description: The platform may struggle if customers cannot provide clean topology, telemetry, or power data from mixed network environments.
    mitigation: Support lightweight CSV and API ingestion first, focus on pre-cutover modeling value even before full telemetry is available, and prioritize common switch stacks.
