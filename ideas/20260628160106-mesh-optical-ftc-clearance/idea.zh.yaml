topRisks:
- name: 供应商阻力
  description: 光学和交换机供应商可能抵制一个暴露兼容性问题或弱化性能主张的中立平台。
  mitigation: 以运营商为付费客户起步，以可选方式向供应商开放基准可见性作为分发渠道，并保持认证标准透明。
- name: 企业采购周期过长
  description: AI 数据中心买家可能仅在重大建设或改造时才做此类采购，限制早期销售速度。
  mitigation: 将切入点与迫在眉睫的改造事件挂钩，收取与部署挂钩的费用，并通过标杆共创客户建立可复制的 ROI 证明。
- name: 数据获取缺口
  description: 如果客户无法从混合网络环境中提供清晰的拓扑、遥测或功耗数据，平台可能面临障碍。
  mitigation: 优先支持轻量级 CSV 和 API 数据摄入，在完整遥测就位前先聚焦切换前建模价值，并优先覆盖常见交换机系列。
