scenarios:
  downside:
    description: Mixed-vendor demand proves narrower than expected, one early pilot does not convert, and solutions work stays bespoke longer than planned.
    y3RevenueK: 2980.0
    y3EbitdaK: -1460.0
    cashLowPointK: -320.0
    keyAssumptionChanges:
    - Active campuses top out at 6 by Q4Y3 instead of 8 because two later conversions slip out of the model horizon.
    - Recognized revenue per campus exits closer to a $510K annualized run-rate because rollouts attach fewer benchmark modules.
    - Gross margin reaches only 66% in Y3 because implementation and exception handling remain labor-heavy.
  base:
    description: Base case reaches the researched 8-campus year-3 win count without assuming full SOM monetization per site.
    y3RevenueK: 3870.0
    y3EbitdaK: -870.6
    cashLowPointK: 454.4
    keyAssumptionChanges:
    - Active paying campuses/waves move from 2 in Q4Y1 to 5 in Q4Y2 and 8 from Q3Y3 onward.
    - Recognized revenue per active campus exits at about a $570K annualized run-rate in Q4Y3, below the researched $750K/site SOM heuristic.
    - Headcount rises to 12 FTE by Q4Y3, keeping the team technical and implementation-heavy before any broader sales buildout.
  upside:
    description: Reference customers and partner referrals pull forward one additional campus and speed second-campus expansions.
    y3RevenueK: 4720.0
    y3EbitdaK: -280.0
    cashLowPointK: 880.0
    keyAssumptionChanges:
    - A ninth active campus lands by late Q3Y3 through a partner-sourced motion and at least one existing operator adds a second hall faster than planned.
    - Recognized revenue per campus exits near a $625K annualized run-rate as benchmark reporting and rollout fees attach more consistently.
    - Gross margin reaches 72% in Y3 because approval templates and telemetry baselines productize faster than planned.
