modelDiagram:
  title: unit economics flow
  mermaid: |-
    flowchart LR
      Leads --> PaidPilots
      PaidPilots --> ProductionCampuses
      ProductionCampuses --> ExpansionModules
      ExpansionModules --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
- checkName: Revenue engine
  finding: The base case reaches $3.87M of Y3 revenue by growing from 2 active paid waves in Q4Y1 to 8 active campuses by Q3Y3 and ending at a $4.56M annualized run-rate.
- checkName: Must go right
  finding: At least one of the first two paid pilots must convert quickly enough that the company reaches 5 active campuses by Q4Y2 before the heavier partner and support hires arrive.
- checkName: Model breaks if
  finding: If the company stalls at 6 campuses and gross margin stays near 66%, the downside case runs out of cash before the year-3 proof package is complete.
- checkName: Next-round proof
  finding: A credible next round is supported by 5 production campuses, 2 partner-sourced wins, sub-6-week launch times, and evidence that the 800G approval graph extends into 1.6T workflows without losing the 70% gross-margin target.
sanityChecks:
  ruleOf40: Y3 growth 89.7% + EBITDA margin -22.5% = 67.2%
  burnMultiple: Y2 burn multiple is about 0.8x on $1.56M of net-new revenue and improves to about 0.5x in Y3 as the platform supports eight campuses with a still-lean GTM team.
  revenuePerFte: $323K Y3 (roughly within the $200-400K vertical SaaS benchmark)
  flags:
  - The model still ends Y3 EBITDA-negative, so the company must show very strong retention and referenceability to raise the next round without heavy dilution.
  - Revenue concentration is high because 8 active campuses underpin the whole year-3 case; losing one large operator would materially change runway.
  - Research confirms willingness to pay via schedule-risk economics, but public competitor pricing is sparse, so production-campus pricing still needs live buyer validation.
  - Gross margin only reaches the BP target if approval templates and telemetry baselines become meaningfully more repeatable by year 2; if services stay bespoke, the seed round size likely moves toward the top of the BP range.
