date: '2026-06-28'
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: Model start month
  value: 2026-07
  unit: YYYY-MM
  source: '[BP date 2026-06-28] the model starts in the month after the business-plan date.'
- id: A2
  name: Opening cash and seed round
  value: $3.8M
  unit: USD
  source: '[BP fundingAsk targetFundingRangeUsd $3–5M + BP fundingAsk runwayMonths 18] base case uses a $3.8M seed so the team can fund the engineering-first ramp and still exit year 3 with roughly six months of cash buffer.'
- id: A3
  name: Starting active paying campuses/waves
  value: '0'
  unit: count
  source: '[BP milestones + BP investorMemo.nextDiligence] the company starts pre-revenue and must first land paid pilots tied to live retrofit waves.'
- id: A4
  name: Customer definition
  value: One active paid pilot or production campus rollout coverage inside one operator
  unit: definition
  source: '[BP businessModel.unitOfValue + BP gtm.wedge] customersEop tracks paid rollout units, not seats or whole corporate accounts.'
- id: A5
  name: Active customer ramp
  value: 2 active paying campuses/waves by Q4Y1, 5 by Q4Y2, and 8 by Q3Y3 onward
  unit: count
  source: '[BP milestones + Research market.som 8 year-3 wins] base case matches 2 paid pilots in year 1, reaches the midpoint of the 12–24 month campus target, and lands at the researched 8-campus year-3 case.'
- id: A6
  name: Recognized revenue per active campus/wave
  value: Y1 months 4-9 at $30K per month per active unit, months 10-12 at $35K; Y2 quarterly blend at $100K, $110K, $120K, and $140K per active unit; Y3 quarterly blend at $130K, $130K, $130K, and $142.5K per active unit
  unit: USD per active unit per period
  source: '[BP investorMemo.firstCustomer.initialContract $150k-$250k pilot and $500k-$800k first-year campus value + BP businessModel.revenueStreams] early periods are pilot-heavy, then mix shifts toward subscriptions plus rollout and benchmark fees while staying below the researched $750K/site SOM heuristic.'
- id: A7
  name: Gross margin ramp
  value: 45% in Y1, 58% in Y2, and 70% in Y3
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct 70 + BP operatingAssumptions reusable approval graph] launch starts services-heavy, then reaches the plan’s steady-state software-like margin once templates and telemetry baselines repeat.'
- id: A8
  name: Monthly churn for unit economics
  value: 1.4%
  unit: percent per month
  source: '[startup-finance heuristic + BP operatingAssumptions early customers renew into annual campus subscriptions] enterprise infrastructure workflows should be sticky, but churn is kept non-zero because some campuses may treat the product as project software.'
- id: A9
  name: Loaded compensation by role
  value: Founder/CEO $190K; founding engineer $205K; photonics/network domain lead $240K; product engineer $185K; solutions lead $195K; account executive $235K; senior platform engineer $195K; data/platform engineer $190K; implementation engineer $165K; customer success/program manager $155K; partnerships lead $215K; finance/ops manager $145K
  unit: USD per year
  source: '[BP team + startup-finance heuristic] uses fully loaded cash compensation for a North America-facing technical enterprise team, inclusive of payroll tax and benefits.'
- id: A10
  name: Hiring timeline
  value: M1 founder and founding engineer; M2 photonics/network domain lead; M5 product engineer; M8 solutions lead; M14 account executive; M18 senior platform engineer; M20 data/platform engineer; M22 implementation engineer; M26 customer success/program manager; M28 partnerships lead; M34 finance/ops manager
  unit: timeline
  source: '[BP team.startTiming + BP strategicChoices.sequencingRationale] domain, implementation, and product capacity are hired before scaled commercial hiring, with back-office support delayed until late year 3.'
- id: A11
  name: Functional payroll allocation
  value: Founder 55% S&M / 45% G&A; founding engineer 100% R&D; domain lead 80% R&D / 20% G&A; product engineer 100% R&D; solutions lead 25% S&M / 50% R&D / 25% G&A; account executive 100% S&M; senior and data engineers 100% R&D; implementation engineer 25% S&M / 45% R&D / 30% G&A; customer success 35% S&M / 65% G&A; partnerships 100% S&M; finance/ops 100% G&A
  unit: allocation
  source: '[BP team rationales + BP operations] rolls each hire into the operating function that consumes the cost in the P&L.'
- id: A12
  name: Non-payroll sales and marketing spend
  value: $20K/mo in M1-M6, $25K/mo in M7-M12, $35K/mo in M13-M18, $45K/mo in M19-M24, $60K/mo in M25-M30, and $70K/mo in M31-M36
  unit: USD per month
  source: '[BP gtm.channels + startup-finance heuristic] covers founder travel, solution-engineering support, partner enablement, customer dinners, and a narrow enterprise outbound motion rather than paid PLG acquisition.'
- id: A13
  name: Non-payroll R&D spend
  value: $18K/mo in Y1, $25K/mo in Y2, and $35K/mo in Y3
  unit: USD per month
  source: '[BP product + BP operations] covers cloud, data ingestion, telemetry storage, testing, security, and standards-validation tooling.'
- id: A14
  name: Non-payroll G&A spend
  value: $12K/mo in Y1, $15K/mo in Y2, and $20K/mo in Y3
  unit: USD per month
  source: '[BP operations + Research regulatoryLandscape] covers legal, insurance, audit, finance systems, and corporate administration for an infrastructure-software vendor selling into large operators.'
- id: A15
  name: Cash conversion policy
  value: EBITDA approximates cash movement
  unit: modeling convention
  source: '[startup-finance heuristic] capex, taxes, financing fees, and working-capital swings are assumed immaterial relative to operating burn at seed scale.'
- id: A16
  name: CAC convention
  value: $334.3K cumulative S&M per active campus by Y3 EOP
  unit: USD per campus
  source: '[BP gtm founder-led direct sales + partner referrals + model calc] CAC equals total modeled S&M spend over 36 months divided by 8 active campuses in the base case.'
- id: A17
  name: Next-round milestone
  value: Five production campuses, two partner-sourced wins, launch time under six weeks, and one 1.6T qualification extension while preserving at least six months of cash buffer
  unit: milestone
  source: '[BP milestones 12–24 months and 24–36 months + BP fundingAsk.useOfFundsSummary] this is the proof package the seed round needs to finance before a larger scale-up round is credible.'
- id: A18
  name: Year-3 revenue ceiling discipline
  value: Q4Y3 annualized run-rate is about $4.56M, below the researched $6.0M SOM ceiling
  unit: USD per year
  source: '[Research market.som $6.0M = 8 wins × $0.75M/site] the base case deliberately stays below the headline SOM so the model does not assume full site monetization immediately.'
