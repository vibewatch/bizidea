slug: optical-fabric-rollout-os
date: '2026-06-28'
executiveSummary: >-
  Optical Fabric Rollout OS 向北美 GPU 云和 AI 托管运营商出售厂商中立的资质认证与切换控制平面，服务对象是正在将 10–30 MW 机房改造为光学密集型 AI 网络的客户。第一位客户是网络基础设施副总裁或 AI 数据中心工程负责人：他们面临硬性租户或内部集群交付日期、首次使用 800G 或 1.6T 光学器件，以及电子表格和供应商服务无法干净解决的多厂商审批问题。切入点刻意收窄——在采购锁定前验证已批准的收发器、交换机、光纤和机架距离组合，再在切换后前 30 天对比预期与实际链路表现。这个滩头市场之所以有吸引力，是因为一次模块选型失误或切换操作错误就能闲置每日六位数的 GPU 算力，让排期风险 ROI 对基础设施买家一目了然。研究支持估算 $60.0M 北美滩头 SAM 和合理的 $6.0M 第三年 SOM，收入以按园区订阅费加部署挂钩费用为锚点。公司不应以宽泛的网络运营平台或通用数字孪生起步，因为最快的证明来自围绕方案冻结和首次生产切换的一个紧迫工作流。核心待解问题是：目标买家究竟多常真正需要中立的多厂商审批，而不是接受单一 OEM 整机方案。在团队证明反复付费试点、可用客户数据访问和改造环境生产转化之前，这是一个前景可期但尽调工作量仍重的 AI 基础设施软件机会。
problem:
  - AI 机房运营商仍在用供应商数据手册、电子表格链路预算和碎片化实验室测试来审批光学 BOM，导致首次 800G 或 1.6T 部署既慢又容易出错。
  - 一个收发器、传输距离或连接器假设失误，就能延误集群上线、浪费电力受限的稀缺容量，并抹去光学本应带来的效率收益。
  - 现有替代方案分散在 OEM 整机包、测试仪器、咨询公司和通用网络工具之间，运营商缺少一个中立的已批准组合与切换准备度系统。
solution:
  - 摄入交换机 SKU、机架布局、光纤图、已批准供应商列表和部署时间节点，在采购锁定前生成经过验证的互操作性矩阵和链路预算模型。
  - 将已批准设计转化为逐机架认证步骤、异常处理和明确通过/失败阈值的切换手册，用于首批部署波次。
  - 在切换后前 30 天对比预期与实际延迟、误码率和瓦特每 Gbps，以便隔离问题模块、更新审批规则、改进下一个机房上线。
whyWeWin:
  - 产品掌握了光学厂商、交换机 OEM 和服务公司在多厂商改造中都难以中立提供的厂商中立审批层。
  - 每次部署都能充实一张兼容模块、交换机、光纤、传输距离和功耗结果的专有图谱，这是通用数字孪生和测试工具天然积累不到的。
  - 切入点直接绑定方案冻结和上线事件，排期与容量风险可见——比销售宽泛可观测性或通用基础设施规划软件有更清晰的预算触发。
strategicChoices:
  beachhead: 正在以预提交的租户或内部集群交付期限为约束，将现有 10–30 MW 机房改造为 800G 多厂商光学网络的北美 GPU 云和 AI 托管运营商。
  wedgeRationale: 这个切入点比宽泛的 AI 网络平台产生更快的证明，因为买家已有近期采购和切换决策，延误成本可用闲置 GPU 小时衡量，且单个机房就能展示价值，无需替换客户现有网络栈。
  sequencingRationale: 先做采购前资质认证和首批切换控制，因为这些工作流所需集成最少、直接对准成本最高的失败模式；接着加入切换后前 30 天遥测基准，让公司积累专有审批数据集；待团队拥有可背书的部署案例、可复制的服务手册和供应商或集成商渠道支持后，再延伸至更宽泛的运营分析；在规模化销售前先招募领域和实施人才，因为早期赢单更多靠模型可信度和部署速度，而非管道体量。
  notYet:
    - 单厂商绿地超大规模网络——OEM 已控制模块、交换机和部署手册
    - 光学上线审批范围外的通用数据中心可观测性、DCIM 或长尾网络运营分析
    - 切换后前 30 天窗口之外的自主实时网络修复
    - 在北美最密集 AI 机房市场证明可复制改造打法之前向北美以外扩张
market:
  tam: 估算 TAM $0.5B，基于 2028 年前全球约 650 个相关 AI 园区或机房、每站年化收入约 $0.75M
  sam: 估算北美滩头 SAM $60.0M，基于约 80 个目标机房、每站年化收入约 $0.75M
  som: 估算第三年 SOM $6.0M，基于 8 个生产园区、每站年化收入约 $0.75M
  segments:
    - 运营光学密集型 AI 机房改造项目的 GPU 云和 AI 托管运营商
    - 管理密集 AI 集群上线多厂商光学审批的企业或超大规模基础设施团队
  buyingProcess: 经济买家最可能是网络基础设施副总裁或 AI 数据中心工程负责人，网络工程和集群部署负责人是日常推动者，因为他们掌管 BOM 审批、部署时间节点和首批认证。最快的第一单是以单个机房和一次即将到来的部署波次为范围的付费设计与切换试点，如果买家看到更快的审批周期和干净的首批认证，则转为含部署费的园区订阅。
product:
  mvp: >-
    MVP 覆盖一个机房、一次计划改造波次和一组常见交换机与光学组合。它摄入 BOM 和拓扑数据，生成已批准兼容性图谱加切换检查表，并采集模型包络对比下前 30 天的结果数据。
  sixMonth: 交付 2–3 个付费试点，配备电子表格和 API 摄入模板、800G 光学已批准组合建模、切换手册，以及首批部署波次的安装后异常跟踪。
  twelveMonth: 将早期试点转化为生产园区合同，加入切换后前 30 天遥测基准，发布最常见交换机和光学系列的可复用审批模板，并在合作伙伴辅助上线下支持多波次机房部署。
  twentyFourMonth: 从单园区改造审批扩展至多园区基准测试、保修和供应商争议证据，以及 1.6T 或硅光子资质认证工作流，同时保持实施轻量，新园区上线时间控制在六周以内。
  keyBets:
    - 目标客户愿意共享足够的 BOM、光纤图和遥测数据，无需漫长定制集成即可交付有用的审批输出。
    - 滩头市场中混合厂商改造足够普遍，能支撑厂商中立切入点，而不是默认 OEM 整机包。
    - 买家足够重视首批通过认证和节省天数，愿意在完整生产订阅证明前签下六位数试点。
    - 同一张审批图谱能从 800G 改造项目延伸至 1.6T、机架级光学和多园区基准测试，而不把公司变成服务公司。
gtm:
  wedge: 以一个机房的方案冻结和部署窗口为绑定，销售 90–120 天付费资质认证与切换试点，用客户真实 BOM 和拓扑批准组合并生成首批切换手册。
  channels:
    - 创始人主导直接销售——触达 GPU 云和 AI 托管运营商的基础设施副总裁、AI 数据中心工程负责人和网络部署负责人
    - 通过已在 AI 机房建设上提供咨询的布线、光学和测试厂商建立转介绍与联合交付路径
    - 通过 AI 基础设施系统集成商和开放基础设施生态引入共创客户——这些生态中运营商在标准化前相互比较架构
  funnelTargets: 线索→合格共创客户 15–25%，合格共创客户→付费试点 40–60%，付费试点→生产园区合同 50%+，生产园区→18 个月内扩展至第二个机房或园区 30%+
  pricing: 按园区和已验证链路量定价的年度订阅，加上与部署波次挂钩的付费试点和部署费；这与价值创造方式匹配——买家付费是为了降低离散建设事件上的排期风险和认证失败，而不是增加席位。
businessModel:
  revenueStreams:
    - 针对单机房改造或建设波次的付费设计与资质认证试点
    - 覆盖已批准组合知识、手册和切换后前 30 天基准的年度园区订阅
    - 针对额外机房、第二个园区和供应商基准报告的部署、扩展和高级分析费
  unitOfValue: 一个 AI 机房或园区的上线，覆盖已批准光学兼容性图谱和切换后前 30 天验证工作流
  targetGrossMarginPct: 70
  expansionLevers:
    - 从一个机房向同一运营商的更多机房和园区扩展
    - 利用积累的部署和遥测历史添加基准测试和争议解决模块
    - 从改造审批延伸至持续采购、容量规划和下一代光学资质认证工作流
strategyMap:
  northStarMetric: 覆盖部署波次中计划光学链路在首次生产切换尝试即完成认证的比例
  inputMetrics:
    - 从客户数据接收到已批准光学 BOM 和兼容性矩阵的时间
    - 在采购锁定前完成建模的计划链路占比
    - 首批切换认证通过率
    - 前 30 天内检测到并在不延误租户上线的情况下解决的生产异常数量
    - 付费试点转化为生产园区合同的转化率
    - 扩展至第二个机房或园区的生产客户数量
  moatsToBuild:
    - 跨厂商审批图谱——关联模块类型、连接器、传输距离、端口功耗和实测结果数据
    - 覆盖北美常见 AI 机房架构和供应商系列的可复用上线模板库
    - 切换后前 30 天的延迟、BER 和真实 AI 网络负载下瓦特每 Gbps 基准语料库
    - 可增加数据访问和分发渠道、同时不损害中立性的可背书集成商与供应商关系
  killCriteria:
    - 以创始人主导销售聚焦 9 个月内签署付费试点不足 2 个
    - 抽样试点 BOM 和拓扑数据中可在 2 周内规范化的比例低于 70%
    - 首 5 个试点后试点转生产转化率仍低于 40%
    - 超过半数的输单机会明确因不需要中立审批而选择单一 OEM 整机包
  mermaid: |
    flowchart LR
      Wedge[Optical retrofit wedge] --> MVP[Qualification and cutover MVP]
      MVP --> Proof[First-wave certification proof]
      Proof --> Expansion[Multi-campus benchmarking and procurement expansion]
investorMemo:
  verdict:
    call: 继续跟进 / 深入调研
    conviction: 痛点强烈、切入路径清晰，但说服力取决于能否在首批试点内证明混合厂商需求和轻量级客户数据访问。
    whyBelieve: AI 机房运营商在光学复杂性、功耗压力和部署量同步快速上升的确切时刻，面临昂贵的上线风险，新控制层有支撑逻辑。
    whyDoubt: 如果大多数优先客户接受单厂商整机包，或所需 BOM 和遥测数据对软件优先部署过于杂乱，独立产品可能站不住脚。
    nextDiligence: 验证 2 个与实际机房改造挂钩的付费试点，并确认至少 1 个转化为年化价值 $500k+ 的生产合同，且首批通过认证或排期收益可量化。
  firstCustomer:
    title: 北美 GPU 云或 AI 托管运营商的网络基础设施副总裁
    profile: 运营一个或多个 10–30 MW AI 机房，在硬性租户或内部上线日期下切换至 800G 光学，并跨模块、交换机和布线管理多家供应商。
    trigger: 新机房或改造波次的方案冻结暴露首次多厂商光学审批风险，且集群交付日期固定。
    buyer: 网络基础设施副总裁或 AI 数据中心工程负责人
    initialContract: $150k–$250k 单机房资质认证与切换方案付费试点；如首批波次按期认证，转化为约 $500k–$800k 含订阅和部署费的第一年园区价值。
  mustBeTrue:
    - 滩头 AI 机房改造中至少有相当比例使用混合厂商光学组合，需要中立审批而非完整 OEM 整机包。
    - 目标客户能在 90–120 天试点周期内足够快地导出 BOM、光纤图和早期遥测数据以交付有用的审批输出。
    - 基础设施负责人愿意在生产证明存在前为降低排期风险支付六位数试点预算。
    - 首批波次胜利能转化为可续约的年度园区订阅，而不是停留在一次性服务收入。
    - 测试厂商、OEM 和数字孪生工具不能足够快地弥合同样的审批和切换缺口，以至于压低定价。
  diligenceQuestions:
    - 2026–2027 年北美 GPU 云和 AI 托管运营商中，有多少真正在改造项目中混用多个光学供应商而非接受单一 OEM 整机包？
    - 哪个 KPI 在实践中最快打开预算：节省天数、首批通过认证，还是瓦特每 Gbps 回归检测？
    - 第一位客户在不经历漫长集成项目的前提下，最少能提供哪些 BOM、拓扑和遥测导出？
    - 买家为什么要加这个中立层，而不是接受 OEM 服务或扩展现有测试或网络验证工具栈？
    - 试点价值中软件与现场实施的比例是多少，这个比例在首批客户之后能否改善？
operatingAssumptions:
  - assumption: 北美 AI 机房中混合厂商光学改造足够普遍，能支撑中立审批切入点。
    basis: research.yaml
    validationTest: 访谈 10 家目标运营商，收集 3 份当前或近期的已批准供应商列表或部署复盘，证明存在真实的多厂商审批决策。
    decisionImpact: 若为否，则将 ICP 收窄至多租户改造运营商，或向 OEM 相邻分析而非独立控制平面转型。
  - assumption: 试点客户能在启动后 2 周内提供可用的 BOM、光纤图和拓扑数据。
    basis: research.yaml
    validationTest: 与 2 家共创客户进行结构化发现，在签署固定范围试点 SOW 前要求成功摄入样本导出数据。
    decisionImpact: 若为否，实施成本上升，产品需要建立更强的服务能力，或缩窄至切换前咨询工作流。
  - assumption: 首批通过认证和排期风险降低是比通用网络可观测性更强的预算触发。
    basis: idea.yaml
    validationTest: 在 8–10 次买家访谈中测试预算话术，要求至少 5 位潜客将切换审批或排期风险排在持续可观测性之前作为购买理由。
    decisionImpact: 若为否，GTM 话术和路线图应向更宽泛的运营工具倾斜，这会实质性地改变竞争格局和招聘方向。
  - assumption: 常见 800G 系列的可复用审批图谱能在首批部署后使试点交付基本以软件为主。
    basis: operator judgment
    validationTest: 追踪试点工作量，要求第四个客户起使用模板后首次批准 BOM 的中位时间低于 3 周。
    decisionImpact: 若为否，公司服务比重过高，毛利率下降，创业可扩展性减弱。
  - assumption: 早期客户在一次成功的部署波次后会续约为年度园区订阅。
    basis: idea.yaml
    validationTest: 在首 3 个试点中要求至少 2 份续约提案包含针对未来波次或持续审批覆盖的订阅部分。
    decisionImpact: 若为否，公司应重新定价为项目软件加高级服务，或重新评估市场是否支持持久 ARR。
experimentRoadmap:
  - horizon: 0–90 天
    experiment: 访谈 15–20 位 GPU 云和 AI 托管运营商的基础设施副总裁、网络工程负责人和部署负责人。
    hypothesis: 最紧迫的首要工作流是改造机房的采购前光学审批，而非通用网络规划。
    successMetric: 至少 10 次访谈描述了一次近期或即将到来的部署，其中光学审批风险影响了排期、预算或供应商选择。
    owner: 创始人/CEO
  - horizon: 0–90 天
    experiment: 基于一家共创客户的真实 BOM、机架布局和光纤图，构建手动加软件的试点模型。
    hypothesis: 团队能从现有客户资产中生成有助于决策的审批矩阵和切换检查表，无需深度集成项目。
    successMetric: 一家共创客户接受建模输出足以在 3 周内影响采购或切换规划。
    owner: 创始工程师
  - horizon: 90–180 天
    experiment: 运行 2 个与实际机房改造或建设波次挂钩的付费试点。
    hypothesis: 固定的方案冻结和上线截止日期比宽泛平台销售转化更快，并产生可量化的首批波次证明。
    successMetric: 2 个付费试点以明确成功标准启动，至少 1 个客户在生产切换中使用手册。
    owner: 创始人/CEO
  - horizon: 90–180 天
    experiment: 将前 3 个客户已关注的核心指标的切换后前 30 天遥测基准产品化。
    hypothesis: 切换后差异检测能提升续约可能性，因为它将单次项目转化为持续的审批与基准测试工作流。
    successMetric: 至少 1 个试点客户审阅前 30 天差异报告，并同意为下一个部署波次的订阅覆盖定义范围。
    owner: 产品工程师
  - horizon: 180–365 天
    experiment: 启动一个含明确中立性规则的集成商或供应商辅助转介绍动作。
    hypothesis: 渠道合作伙伴能在不把初创公司推向白牌服务角色的前提下加速管道和数据访问。
    successMetric: 一个合作伙伴来源的试点以与直销相当的定价成交，且初创公司仍是审批系统的主要记录系统。
    owner: 解决方案负责人
  - horizon: 180–365 天
    experiment: 将一个生产客户从单机房扩展至第二个机房或园区。
    hypothesis: 审批图谱和上线模板有足够的可移植性，能在无需从头重新实施的前提下产生多站点 ARR 扩展。
    successMetric: 一次扩展以不低于初始生产合同 30% 的增量 ARR 成交。
    owner: 创始人/CEO
operations:
  - 含电子表格和常见 API 导出标准模板的 BOM、光纤图和拓扑摄入流程
  - 采购签批前验证模块、交换机、传输距离和功耗组合的审批规则工作流
  - 首批部署波次的切换手册生成和异常跟踪流程
  - 切换后前 30 天遥测复盘节奏——驱动已批准组合更新和客户基准报告
team:
  - role: 创始工程师
    startTiming: Month 0
    rationale: 围绕客户真实 BOM 和拓扑资产构建审批图谱、数据摄入管道和首批试点工具。
  - role: 光子学与网络领域负责人
    startTiming: Month 0-3
    rationale: 获得买家信任依赖标准规范流利度、链路预算逻辑和对光学认证权衡的实践理解。
  - role: 产品工程师
    startTiming: Month 3-6
    rationale: 在不拖慢客户交付的前提下，将手动试点输出转化为可复制应用并交付切换后前 30 天基准。
  - role: 解决方案负责人
    startTiming: Month 6-9
    rationale: 早期增长受限于实施速度、合作伙伴协调，以及防止试点演变为定制咨询的能力。
  - role: 首位客户经理
    startTiming: Month 12-15
    rationale: 仅在 2–3 个可背书部署明确了 ICP、ROI 话术和实施边界后才加入规模化销售。
milestones:
  - horizon: 0–12 个月
    items:
      - 签下 2 家共创客户，在滩头市场完成 15 次以上买家访谈
      - 启动 2 个与实际机房改造或建设波次挂钩的付费试点
      - 将至少 1 个试点转化为生产园区合同
      - 发布常见 800G 系列的 BOM 摄入、审批规则和切换手册可复用模板
  - horizon: 12–24 个月
    items:
      - 达到 4–6 个生产园区，其中至少 2 个完成多机房或多波次扩展
      - 将切换后前 30 天遥测基准和供应商基准报告作为标准模块上线
      - 通过集成商或生态转介绍成交 2 单合作伙伴来源的合同，且不折让中立控制平面定位
      - 将首次批准 BOM 中位时间控制在 3 周以内，新园区上线时间控制在 6 周以内
  - horizon: 24–36 个月
    items:
      - 达到 8 个以上生产园区，与研究得出的第三年 SOM 情景一致
      - 为现有客户扩展 1.6T 或硅光子资质认证工作流支持
      - 将审批图谱和基准数据集确立为续约驱动因素，而非一次性项目产物
      - 在进入相邻采购和容量规划工作流的同时，保持类软件的交付经济性
risks:
  - risk: 真实市场可能比滩头假设更偏向单厂商 OEM 整机网络。
    likelihood: Medium
    impact: High
    mitigation: 优先锁定改造和多租户运营商，并将混合厂商普遍程度作为首要放弃标准，而非假设其可扩展。
  - risk: 客户可能缺乏干净的 BOM、光纤图或遥测导出，迫使公司承担定制实施工作。
    likelihood: High
    impact: High
    mitigation: 在定义试点范围前要求提供样本资产，标准化摄入模板，并将首个价值点锚定在切换前建模，即使遥测不完整亦然。
  - risk: 测试厂商、OEM 或数字孪生平台可能捆绑足够多的相邻功能以压缩定价。
    likelihood: Medium
    impact: High
    mitigation: 将信息聚焦于中立审批、切换控制和捆绑工具天然积累不到的首月基准数据。
  - risk: 标准和产品从 800G 向 1.6T、硅光子或协封装光学切换可能使审批图谱快速过时。
    likelihood: Medium
    impact: Medium
    mitigation: 早期招募领域专家，尽量将模型锚定于开放标准，并在每次部署后积极刷新支持的组合。
  - risk: 如果客户将产品视为项目工具而非持续覆盖服务，收入可能停留在一次性模式。
    likelihood: Medium
    impact: High
    mitigation: 在每份生产提案中将切换后前 30 天基准和下一波次审批覆盖打包，使续约与未来部署波次和基准测试价值挂钩。
fundingAsk:
  round: seed
  targetFundingRangeUsd: $3–5M
  runwayMonths: 18
  useOfFundsSummary: 资助 18 个月，目标是证明 2–3 个付费试点、1–2 个生产转化、常见 800G 系列可复用审批图谱、切换后前 30 天遥测基准，以及在规模化销售前覆盖工程、领域专业知识和解决方案交付的小团队。
