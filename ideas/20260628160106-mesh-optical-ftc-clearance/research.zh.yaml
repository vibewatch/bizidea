  validationPlan:
  - priority: high
    question: 2026–2027 年北美 GPU 云和托管建设项目中，有多少真正会混用多家光学供应商而非接受单一 OEM 整机包？
    evidenceToGather: 十家运营商访谈，加上当前已批准供应商列表、RFP 和近期 AI 机房部署复盘。
  - priority: high
