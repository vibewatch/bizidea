openQuestions:
- 2026–2027 年北美 GPU 云和托管建设中，有多少真正会混用多家光学供应商，而非采用单一 OEM 整机包？
- 客户在不让产品演变为服务密集型部署的前提下，最少能提供哪些遥测和 BOM 导出？
- 光学和交换机供应商是否会与中立审批层合作，还是初创公司需要逐运营商构建互操作性语料库？
- 哪个 ROI 指标在实践中最快打开预算：节省天数、首批通过认证，还是切换后功耗/回归检测？
