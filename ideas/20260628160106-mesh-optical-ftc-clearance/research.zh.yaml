competitors:
- name: Keysight
  stage: incumbent
  wedge: 芯片到集群 AI 数据中心仿真与验证，包括 1.6T 光互连和 800G Ethernet。
  pricing: 抓取材料中无公开定价；需企业询价。
  strength: 部署前完整全栈性能测试，实验室仿真逼真度高。
  weaknessVsUs: 重量级验证套件，不是一个拥有已批准 BOM 和切换后前 30 天遥测的中立上线控制平面。
  sourceRefs:
  - 26
  - 27
- name: VIAVI Solutions
  stage: incumbent
  wedge: Ethernet、光纤、光学制造和高速网络测试工具。
  pricing: 抓取材料中无公开定价；按仪器和平台询价。
  strength: 覆盖实验室、制造和现场环境的强大物理层诊断能力。
  weaknessVsUs: 工具链以测试为中心，不天然编排部署审批或厂商中立变更控制。
  sourceRefs:
  - 30
  - 31
- name: EXFO
  stage: incumbent
  wedge: 现场 Ethernet 和光纤检测加网络运营自动化。
  pricing: 抓取材料中无公开定价；按询价。
  strength: 强大的现场部署工具包和运营侧可见性。
  weaknessVsUs: 在硬件到位后最有效；在采购前 BOM 审批和切换排序上意见较少。
  sourceRefs:
  - 32
  - 33
- name: Forward Networks
  stage: scale-up
  wedge: 软件数字孪生、网络验证和预测变更分析。
  pricing: 模块化订阅，无使用量计费或意外成本。
  strength: 纯软件验证动作，复杂网络变更分析能力强。
  weaknessVsUs: 专注拓扑和意图，而非光学物理行为、连接器状态或收发器互操作性。
  sourceRefs:
  - 28
  - 29
