slug: customs-agent-sleep-runtime
date: '2026-06-26'
currency: USD
modelStartMonth: '2026-07'

assumptions:
  - id: A1
    name: "Model start month"
    value: "2026-07"
    unit: "YYYY-MM"
    source: >-
      [BP date 2026-06-26] Model starts the month after the business plan date.
  - id: A2
    name: "Opening cash at M1"
    value: "$2.4M"
    unit: "USD"
    source: >-
      [BP fundingAsk targetFundingRangeUsd $2-4M + model sizing] Uses a lower-midpoint
      pre-seed sized to reach the 12-24 month expansion milestone plus six months of buffer.
  - id: A3
    name: "Starting active paying hubs (M1)"
    value: "0"
    unit: "count"
    source: >-
      [BP executiveSummary + milestones] The company starts pre-revenue and must first convert
      design partners into paid pilots.
  - id: A4
    name: "Active paying hub definition"
    value: "One paid pilot, annual production hub, or second queue/branch deployment with its own budget"
    unit: "definition"
    source: >-
      [BP businessModel.unitOfValue + expansionLevers] customersEop tracks paid deployment
      units rather than total brokerage logos so branch and queue expansion can show up in the
      model.
  - id: A5
    name: "Paid pilot price"
    value: "$33K / 90 days"
    unit: "USD per pilot"
    source: >-
      [BP investorMemo.firstCustomer.initialContract + startup-finance heuristic] Prices the
      pilot at roughly 25% of the first-year production value so procurement can clear a real
      engagement before full annual conversion.
  - id: A6
    name: "Initial production annual value"
    value: "$132K"
    unit: "USD per hub per year"
    source: >-
      [BP investorMemo.firstCustomer.initialContract $120k-$150k plus usage] Uses a midpoint
      anchored slightly above the floor to include modest usage fees.
  - id: A7
    name: "Blended recognized annual revenue per active paying hub"
    value: "Y1 $132K, Y2 $147.6K, Y3 $181.2K"
    unit: "USD per active hub per year"
    source: >-
      [BP pricing + expansionLevers + research reportMemo.willingnessToPay] Assumes usage
      fees, audit analytics, and second-queue expansion lift revenue within successful
      accounts over time.
  - id: A8
    name: "New active paying hub start cadence"
    value: "Y1 starts in M5, M8, M10; Y2 adds 7 starts; Y3 adds 10 starts"
    unit: "start pattern"
    source: >-
      [BP milestones + strategicChoices.sequencingRationale + gtm.funnelTargets] Translates 3
      design partners, multi-branch expansion, and one partner channel into a measured
      deployment ramp.
  - id: A9
    name: "Monthly active-hub churn"
    value: "1.2%"
    unit: "percent per month"
    source: >-
      Startup-finance heuristic: sticky enterprise workflow software with concentrated buyers
      can hold annual churn near the low teens, but the early product still faces
      implementation and budget risk.
  - id: A10
    name: "Gross margin ramp"
    value: "52% Y1, 65% Y2, 70% Y3"
    unit: "percent of revenue"
    source: >-
      [BP businessModel.targetGrossMarginPct 70 + operations] Early pilots carry
      implementation and wake-reliability support costs before the company reaches the stated
      software-like margin target.
  - id: A11
    name: "Founder / CEO loaded compensation"
    value: "$145K"
    unit: "USD per year"
    source: >-
      Startup-finance heuristic: pre-seed founder cash pay is below market and partially
      offset by equity.
  - id: A12
    name: "Founding engineer loaded compensation"
    value: "$185K"
    unit: "USD per year"
    source: >-
      Startup-finance heuristic: senior workflow / infrastructure engineering talent with
      payroll load.
  - id: A13
    name: "Customs ops / solutions lead loaded compensation"
    value: "$150K"
    unit: "USD per year"
    source: >-
      [BP team Customs ops and solutions lead] Domain plus implementation hire priced below
      enterprise-consulting market to reflect early-stage equity mix.
  - id: A14
    name: "Product engineer loaded compensation"
    value: "$170K"
    unit: "USD per year"
    source: >-
      [BP team Full-stack product engineer] Mid-senior product engineering hire with startup
      payroll load; reused for the second product engineer in Y2.
  - id: A15
    name: "GTM lead loaded compensation"
    value: "$195K"
    unit: "USD per year"
    source: >-
      [BP team GTM lead] Founder-assisted enterprise seller and partner-development OTE at
      pre-seed scale.
  - id: A16
    name: "Solutions engineer / customer success loaded compensation"
    value: "$145K"
    unit: "USD per year"
    source: >-
      Startup-finance heuristic: implementation-heavy post-sale support is needed once the
      first branches go live.
  - id: A17
    name: "Account executive / partnerships loaded compensation"
    value: "$185K"
    unit: "USD per year"
    source: >-
      [BP channels + integrator motion] Later-stage seller added only after reference
      deployments exist.
  - id: A18
    name: "Ops / finance loaded compensation"
    value: "$115K"
    unit: "USD per year"
    source: >-
      Startup-finance heuristic: lean back-office support added only after commercial proof.
  - id: A19
    name: "Hiring timeline"
    value: "M1 founder + founding engineer; M2 customs ops lead; M5 product engineer; M10 GTM lead; M14 solutions engineer; M18 product engineer 2; M26 AE / partnerships; M33 ops / finance"
    unit: "timeline"
    source: >-
      [BP team + strategicChoices.sequencingRationale] Later hires extend the same
      product-first then partner-scaled motion described in the BP.
  - id: A20
    name: "Non-payroll sales & marketing spend"
    value: "$4K/mo M1-6, $6K/mo M7-12, $8K/mo Y2, $12K/mo Y3"
    unit: "USD per month"
    source: >-
      [BP gtm.channels] Founder-led outbound, pilot travel, and partner enablement with no
      paid-media engine.
  - id: A21
    name: "Non-payroll R&D spend"
    value: "$7K/mo Y1, $9K/mo Y2, $11K/mo Y3"
    unit: "USD per month"
    source: >-
      [BP operations + research reportMemo.technologyLandscape] Cloud, browser/session
      tooling, monitoring, and reliability spend on the runtime.
  - id: A22
    name: "Non-payroll G&A spend"
    value: "$6K/mo Y1, $7K/mo Y2, $9K/mo Y3"
    unit: "USD per month"
    source: >-
      [BP operations + risks] Legal, insurance, security review, and compliance overhead.
  - id: A23
    name: "Blended CAC"
    value: "$75K"
    unit: "USD per production-equivalent deployment"
    source: >-
      [BP gtm.funnelTargets + model calc] Assumes founder-led selling plus one integrator
      channel keep acquisition cost below pure cold-outbound enterprise-software norms.
  - id: A24
    name: "Cash conversion convention"
    value: "Cash movement equals EBITDA"
    unit: "modeling convention"
    source: >-
      Startup-finance heuristic: capex, debt service, working-capital swings, and taxes are
      immaterial at pre-seed scale.
  - id: A25
    name: "Next-financing milestone sizing"
    value: "24 months of runway to 6-8 production deployments plus 6 months of buffer"
    unit: "runway"
    source: >-
      [BP fundingAsk.runwayMonths 18 + model sizing] Extends the BP build window long enough
      to prove partner-led expansion and avoid raising immediately after first conversions.

