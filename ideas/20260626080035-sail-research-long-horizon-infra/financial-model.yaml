fundingAsk:
  round: pre-seed
  amountM: 2.4
  runwayMonths: 24
  milestone: >-
    Reach 6-8 production branch or queue deployments, prove one partner-led implementation
    path, keep wake reliability above 95 percent on the first connector set, and still hold
    roughly six months of cash before the seed raise.
  useOfFunds:
    - bucket: "Engineering and Product"
      amountUsd: 1000000
      percentage: 41.7
    - bucket: "GTM and Partner Enablement"
      amountUsd: 600000
      percentage: 25.0
    - bucket: "Customer Implementations"
      amountUsd: 250000
      percentage: 10.4
    - bucket: "Security, Compliance, and G&A"
      amountUsd: 250000
      percentage: 10.4
    - bucket: "Buffer (6 mo)"
      amountUsd: 300000
      percentage: 12.5

scenarios:
  downside:
    description: >-
      Security review, connector reliability work, and partner onboarding all slip, cutting
      Y2-Y3 starts from 17 to 12 while blended annual revenue per active hub tops out near
      $158K and gross margin only reaches 66 percent.
    y3RevenueK: 1501.4
    y3EbitdaK: -761.2
    cashLowPointK: -63.3
    keyAssumptionChanges:
      - "Y2-Y3 start cadence falls from 17 to 12 active deployments."
      - "Blended annual revenue per active hub tops out near $158K instead of $181K."
      - "Gross margin only reaches 66% because implementations stay services-heavy."
  base:
    description: >-
      Three Y1 design-partner starts, seven Y2 starts, and ten Y3 starts turn into 18.2 active
      paying hub equivalents by Q4Y3 while blended annual revenue per active hub rises from
      $132K to $181K as usage, analytics, and second-queue expansion attach.
    y3RevenueK: 2516.5
    y3EbitdaK: 9.2
    cashLowPointK: 741.7
    keyAssumptionChanges:
      - "Base assumptions as modeled."
      - "Active deployments rise from 2.8 at Y1 end to 10.1 at Y2 end and 18.2 at Y3 end."
      - "Gross margin reaches the 70% BP target in Y3 while headcount grows to 9 FTE."
  upside:
    description: >-
      Integrator referrals and faster second-branch rollouts increase Y2-Y3 starts materially,
      push blended annual revenue per active hub toward $196K, and support a late-Y3 second AE
      while still expanding gross margin to 72 percent.
    y3RevenueK: 3372.5
    y3EbitdaK: 563.3
    cashLowPointK: 1016.0
    keyAssumptionChanges:
      - "Y2-Y3 starts rise above base through partner referrals and faster in-account expansion."
      - "Blended annual revenue per active hub reaches roughly $196K through heavier usage and premium analytics attach."
      - "Gross margin reaches 72% and a second AE is added late in Y3 without stressing cash."

sensitivity:
  - variable: "ARPU"
    downsideCase: "Usage and analytics attach slowly, so Y3 blended annualized revenue per active hub lands near $166K."
    baseCase: "Base case reaches $181.2K blended annualized revenue per active hub in Y3."
    upsideCase: "Stronger module attach pushes Y3 blended annualized revenue per active hub toward $200K."
    y3RevenueImpactK: -216.7
    cashImpactK: -95.9
  - variable: "CAC"
    downsideCase: "Warm referrals do not compound, effective CAC moves above $100K, and Y2-Y3 starts fall meaningfully."
    baseCase: "Base case assumes roughly $75K blended CAC with founder-led selling and one integrator channel."
    upsideCase: "Reference customers and partner leads pull effective CAC into the mid-$50Ks while preserving the planned ramp."
    y3RevenueImpactK: -544.9
    cashImpactK: -361.9
  - variable: "churn"
    downsideCase: "Monthly active-hub churn rises to 2.0% as the product stays narrow and budgets reset annually."
    baseCase: "Base case holds churn at 1.2% monthly."
    upsideCase: "Workflow stickiness and multi-queue expansion reduce churn toward 0.8% monthly."
    y3RevenueImpactK: -193.2
    cashImpactK: -87.8
  - variable: "sales cycle"
    downsideCase: "Security review and data-mapping push most starts back by roughly one quarter."
    baseCase: "Starts land on the modeled cadence after the first pilot opens in M5."
    upsideCase: "A standard security pack and partner implementation playbook pull starts forward by one to two months."
    y3RevenueImpactK: -291.8
    cashImpactK: -192.8
  - variable: "gross margin"
    downsideCase: "Y3 gross margin stalls at 66% because implementation support and brittle connectors remain elevated."
    baseCase: "Gross margin reaches 70% in Y3."
    upsideCase: "More repeatable onboarding pushes Y3 gross margin to 72%."
    y3RevenueImpactK: 0.0
    cashImpactK: -72.0
  - variable: "hiring pace"
    downsideCase: "One extra engineer and one extra seller are pulled forward before reference deployments are repeatable."
    baseCase: "Hiring stays tied to product proof, partner motion, and customer expansion milestones."
    upsideCase: "Back-office and GTM hires can slip slightly if pilots take longer without hurting the near-term roadmap."
    y3RevenueImpactK: 0.0
    cashImpactK: -363.2

modelDiagram:
  title: "unit economics flow"
  mermaid: |
    flowchart LR
      Targets[Named brokerages] --> Pilot[Paid pilots]
      Pilot --> Deployment[Active hub or queue deployments]
      Deployment --> Expansion[Second queue or branch expansion]
      Expansion --> Revenue[Subscription plus usage revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash after payroll and operating spend]

modelSanity:
  - checkName: "Revenue engine"
    finding: >-
      Base-case revenue comes from turning 21 cumulative starts into 18.2 active paying hub
      equivalents by Q4Y3 while blended annual value per active hub rises to $181K.
  - checkName: "Must go right"
    finding: >-
      The first three design partners must become repeatable second-queue or second-branch
      deployments, because the model only works if Y2 and Y3 add 17 starts without a
      proportional headcount spike.
  - checkName: "Model breaks if"
    finding: >-
      If the partner motion stalls and effective CAC behaves like the downside sensitivity, Y3
      revenue falls about $545K and the cash cushion shrinks about $362K before margin scale
      shows up.
  - checkName: "Next-round proof"
    finding: >-
      The seed story is strongest once the company shows 6-8 production deployments, one
      partner-led implementation path, and stable 70% gross margin, which is the milestone the
      $2.4M pre-seed is sized to reach.

sanityChecks:
  ruleOf40: >-
    Y3 growth (2516.5-886.6)/886.6 = 184.0% + Y3 EBITDA margin 9.2/2516.5 = 0.4% = 184.4%;
    this easily clears the threshold but is flattered by the small Y2 base.
  burnMultiple: >-
    Y2 burn multiple is about 1.1x (($789.0K burn) / $716.0K net new revenue), which is
    reasonable for a vertical workflow SaaS still building reference deployments.
  revenuePerFte: >-
