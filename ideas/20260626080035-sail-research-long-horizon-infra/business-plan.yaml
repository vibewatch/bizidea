slug: customs-agent-sleep-runtime
date: "2026-06-26"
executiveSummary: >-
  Customs entry exceptions are a credible first wedge for a pause-resume agent runtime because the work naturally alternates between short bursts of reasoning and long waits for ACE updates, customer documents, carrier portals, and broker approvals. Sail Research and other long-horizon workflow tooling validate that suspend-on-idle infrastructure now exists, and the startup's differentiated claim is to package those primitives as a broker-grade operating layer rather than generic developer infrastructure. The first customer is a U.S. customs brokerage branch or operations hub processing 10,000 or more monthly entries and already spending money on RPA, browser automation, or offshore exception handling. The buying trigger is a backlog spike, missed release SLA, or failed automation pilot that exposes the cost of keeping humans or always-on bots attached to dormant cases. The MVP should be an overlay on one existing customs suite plus a shared inbox and one portal family, with approval envelopes and replayable audit logs so the product fits CBP supervision realities rather than challenging them. Initial pricing should combine an annual hub subscription with usage on active case-hours and resume events, which matches the customer's labor-savings budget and the product's active-compute thesis. The strongest early proof point is a design-partner pilot that cuts exception-case cost by roughly 30 percent and average release time by roughly 20 percent while maintaining reliable wake-ups and traceable decisions. The biggest unresolved diligence gap is how much of target brokerage volume actually falls into multi-day exceptions with enough idle time to support $120k-$150k annual contracts. Because the beachhead market is real but narrow, the company should earn expansion only after it wins one queue, then one branch, then adjacent trade-compliance workflows such as duty drawback, freight claims, and export-control reviews.
problem:
  - Exception cases sit 1-3 days across ACE, emails, carrier portals, and human approvals, so current automation pays for idle workers or falls back to manual queues.
  - Brokers lack a single replayable case record across bot, browser, email, and human actions, which weakens auditability and slows root-cause analysis when release SLAs slip.
solution:
  - A checkpointed case runtime that sleeps browser, model, and tool state when a customs case is waiting, then wakes the exact context on an inbox reply, portal change, ACE event, or broker approval.
  - An operator layer with active-versus-sleeping case visibility, per-case cost accounting, approval envelopes, and audit export on top of the existing customs system of record.
whyWeWin:
  - The product is built around wait-state economics and case memory, not generic bot reliability or model quality.
  - It can land as an overlay on existing customs suites and shared inbox workflows, which reduces rip-and-replace friction.
  - Every handled case improves exception routing, wake triggers, and audit history in a domain where supervision and replay matter.
strategicChoices:
  beachhead: >-
    U.S. customs brokerages with centralized exception desks, 10,000 or more monthly ocean and air entries, and one branch or operations hub where missing-document and carrier-status exceptions routinely dwell for 1-3 days.
  wedgeRationale: >-
    This queue has visible backlog pain, measurable labor cost, and repeated idle waits, so suspend-resume economics create proof faster here than in low-latency agent use cases or full declarations automation. It also lets the company sell an overlay on top of ACE-connected customs suites instead of asking the customer to replace its filing system.
  sequencingRationale: >-
    Build one narrow connector path first around one customs suite, one shared inbox flow, and one portal family so the team can prove wake reliability, auditability, and ROI inside a single branch. Only after pilot conversion should the company widen into more exception types, more branches, and adjacent trade workflows, because GTM credibility depends on implementation speed and compliance trust more than feature breadth.
  notYet:
    - Full customs filing or declarations system of record
    - Non-U.S. customs geographies before the ACE-based U.S. playbook is repeatable
    - Fully autonomous classification or compliance decisions without approval envelopes
market:
  tam: "$225.0M TAM using roughly 1,500 NCBFAA-member companies at an estimated $150k mature ACV per company."
  sam: "$43.5M SAM using about 290 U.S. high-volume hubs derived from 34.8M annualized entry summaries and a 10k-entry-per-month target hub."
  som: "$4.8M year-three SOM assuming 40 reachable hubs or logos at roughly $120k blended ACV."
  segments:
    - U.S. customs brokerages with centralized exception teams and automation budgets
    - Freight-tech platforms embedding customs operations or trade-compliance workflows
  buyingProcess: >-
    The sale starts with a CTO, COO, or GM sponsor and a branch operations champion who can expose one painful exception queue. Buyers will expect a high-touch pilot, security review around stored session state, and explicit licensed-broker supervision controls before converting to an annual hub contract.
product:
  mvp: >-
    Ship a case runtime that preserves browser state, documents, inbox context, and human approvals for one exception workflow on top of one existing customs suite. The MVP must include shared inbox ingest, one portal or ACE-adjacent wake signal, approval envelopes, replayable audit history, and per-case cost visibility.
  sixMonth: >-
    Convert the MVP into a production pilot for one branch, add fallback queues and replay tooling for connector failures, and support a second wake source so cases can resume from both inbox replies and external status changes.
  twelveMonth: >-
    Expand from one exception queue to two or three high-volume exception patterns, add analytics on exception reasons and aging, and roll the playbook to a second branch or operations hub.
  twentyFourMonth: >-
    Use the same runtime and approval model to enter adjacent trade workflows such as freight claims, duty drawback, and export-control reviews, while keeping U.S. customs as the reference deployment.
  keyBets:
    - A meaningful share of target brokerage volume sits in multi-day exceptions where idle-time savings matter more than latency.
    - One narrow connector set can cover enough case volume to prove ROI without rebuilding the customer's system of record.
    - Brokerages will trust approval envelopes and replayable audit logs enough to buy an overlay before full autonomy.
    - Case-level exception and wake-history data will compound into better routing and expansion economics.
gtm:
  wedge: >-
    Sell a design-partner pilot to a 10,000-plus-entry brokerage branch that already tried RPA or browser automation and is now missing release SLAs because humans or always-on bots babysit stalled cases.
  channels:
    - Direct outbound to large U.S. brokerages and freight-tech operators with visible exception desks
    - Design-partner sales into brokerages already running RPA, browser automation, or offshore exception queues
    - Customs software integrators, trade-tech consultancies, and automation partners as implementation channels after the first pilot wins
  funnelTargets: "Target 10-15% of named outbound accounts to enter pilot diligence, 50% or more of paid pilots to convert to annual production, and 40% or more of first production hubs to expand to a second queue or hub within 12 months."
  pricing: >-
    Charge an annual subscription by branch or operations hub plus usage on active case-hours and resumed cases. This matches the product's active-compute thesis and lets buyers fund the purchase from existing customs-compliance, automation, or exception-labor budgets.
businessModel:
  revenueStreams:
    - Annual platform subscription per brokerage branch or operations hub
    - Usage fees per active case-hour and resumed case
    - Premium audit export, compliance retention, and routing analytics modules
  unitOfValue: Active exception cases managed per branch or operations hub
  targetGrossMarginPct: 70
  expansionLevers:
    - Add more exception queues inside the first branch
    - Roll out the same runtime to additional branches or hubs
    - Sell premium audit and analytics modules to existing accounts
    - Extend the runtime into duty drawback, freight claims, and export-control workflows
strategyMap:
  northStarMetric: Production exception cases resolved with full audit trail per branch per month
  inputMetrics:
    - Share of eligible cases resumed successfully from external events
    - Cost per exception case versus manual or always-on bot baseline
    - Average release-time reduction on piloted exception queues
    - Pilot-to-production conversion rate
    - Time to add a new queue or branch
  moatsToBuild:
    - Customs-specific exception taxonomy and outcome dataset
    - Cross-system event maps across ACE, inboxes, portals, and human approvals
    - Broker-grade replay and audit history tied to every automated action
    - Connector reliability data for the exact portals and triggers that create stalls
  killCriteria:
    - Fewer than 10 percent of entries at three design partners qualify as multi-day exceptions with material idle time.
    - Wake reliability stays below 95 percent across the first suite, inbox, and portal connectors after two pilot iterations.
    - Fewer than 2 of the first 5 pilots convert to annual contracts at roughly $120k annualized pricing.
  mermaid: |
    flowchart LR
      Wedge[Customs exception wedge] --> MVP[Pause resume case runtime]
      MVP --> Proof[Audit complete ROI pilot]
      Proof --> Expansion[More branches and trade workflows]
investorMemo:
  verdict:
    call: Watch
    conviction: Strong workflow pain and credible technical wedge, but the exception-volume and expansion math still need design-partner proof.
    whyBelieve: The company targets a real wait-state-heavy workflow where suspend-resume economics, auditability, and overlay deployment solve a specific buyer pain that horizontal platforms do not package out of the box.
    whyDoubt: The beachhead is narrow, buyers are conservative, and the startup still has to prove that enough case volume and budget exist to outrun incumbent customs suites plus services.
    nextDiligence: Get branch-level case logs from at least three brokerages and verify both exception incidence and pilot ROI before treating this as venture-scale.
  firstCustomer:
    title: COO or CTO of a high-volume U.S. customs brokerage branch
    profile: A brokerage or freight-tech import hub handling 10,000 or more monthly ocean and air entries, already running a customs suite plus shared inboxes and some automation.
    trigger: Peak-season backlog, missed release SLA, or a failed RPA pilot that leaves humans babysitting dormant exception cases.
    buyer: CTO, COO, or GM of customs brokerage operations
    initialContract: 90-day paid pilot that converts into an approximately $120k-$150k annual hub subscription plus usage if the branch hits cost and release-time targets.
  mustBeTrue:
    - At least 10-15 percent of entry volume in the target branch falls into 1-3 day exception queues with repeated idle waits and multiple human touches.
    - An overlay on one existing customs suite, one shared inbox flow, and one portal family can cover enough cases to prove ROI without a rip-and-replace sale.
    - Pilot deployments can deliver roughly 30 percent lower cost per exception case and roughly 20 percent faster average release time.
    - Licensed-broker leadership accepts approval envelopes and replayable audit history as sufficient control for initial production use.
    - The same runtime can expand into adjacent trade-compliance workflows with materially less engineering than the initial customs wedge.
  diligenceQuestions:
    - What percentage of entries at target brokerages become multi-day exceptions with enough idle time to justify this runtime?
    - Which wake signals are reliable enough in production, including inbox replies, portal updates, ACE events, or document uploads?
    - Who actually owns the budget for this product: customs operations, enterprise automation, or IT platform?
    - How much implementation work is required to sit on top of CargoWise, Descartes, or similar systems without disrupting existing screens?
    - What would make a brokerage choose this overlay over extending UiPath, Temporal, or its incumbent customs suite with services?
operatingAssumptions:
  - assumption: Enough target entry volume becomes multi-day exceptions to support branch-level contracts.
    basis: research.yaml
    validationTest: Collect 90 days of case logs from three design partners and quantify exception dwell time, wait reason, and touch count.
    decisionImpact: If the exception share or dwell time is low, narrow the beachhead to a single exception subtype or abandon customs as the first market.
  - assumption: Buyers will purchase an overlay on top of the existing customs suite rather than demand a full system replacement.
    basis: research.yaml
    validationTest: Run five buyer interviews and two paid pilots that keep the incumbent system of record in place.
    decisionImpact: If buyers reject overlays, the company faces longer sales cycles and should reposition as a tooling layer sold through integrators or platforms.
  - assumption: Annualized pricing around $120k-$150k per hub plus usage is procurement-feasible against current automation and labor spend.
    basis: research.yaml
    validationTest: Test packaging and pricing in 8-10 pilot conversations and measure willingness to proceed to security review or pilot.
    decisionImpact: If pricing clears far below this band, the company must reduce implementation cost or pursue a smaller pre-seed plan with tighter scope.
  - assumption: Approval envelopes and audit logs are enough to satisfy supervision concerns before deeper autonomy.
    basis: idea.yaml
    validationTest: Review the control model with licensed-broker leaders and track whether pilots approve production use under human-in-the-loop rules.
    decisionImpact: If buyers still block production autonomy, monetize assisted exception handling and postpone autonomous actions.
  - assumption: Adjacent workflows such as duty drawback and freight claims can reuse the same runtime and connector foundation.
    basis: idea.yaml
    validationTest: Prototype one adjacent workflow after the first production deployment and compare net-new integration effort versus the initial customs queue.
    decisionImpact: If adjacency reuse is weak, the business remains a narrow customs product and may not justify aggressive venture financing.
experimentRoadmap:
  - horizon: 0-90 days
    experiment: Design-partner case-log study
    hypothesis: High-volume brokerages have enough 1-3 day exception volume to support a branch-level software contract.
    successMetric: Three target branches share historical logs and at least two show a large enough multi-day exception queue to justify pilot ROI modeling.
    owner: Founder and customs ops lead
  - horizon: 0-90 days
    experiment: Inbox and portal wake-up prototype
    hypothesis: The runtime can checkpoint and resume one exception case reliably from shared inbox replies and one external status source.
    successMetric: 95 percent or better successful resume rate across test cases with full case replay.
    owner: Founding eng
  - horizon: 90-180 days
    experiment: Human-in-the-loop production pilot
    hypothesis: Approval envelopes plus replayable audit logs are sufficient for first production use in one branch.
    successMetric: One paid pilot runs live on a real queue with zero compliance incidents and documented operator sign-off.
    owner: Solutions lead
  - horizon: 90-180 days
    experiment: ROI proof on one exception queue
    hypothesis: Pause-resume handling materially beats manual or always-on bot workflows on cost and release time.
    successMetric: 30 percent lower cost per exception case and 20 percent faster average release time versus branch baseline.
    owner: Founder and branch champion
  - horizon: 6-12 months
    experiment: Packaging and pricing test
    hypothesis: Buyers accept annual hub subscription plus usage pricing if the pilot is tied to backlog reduction and audit readiness.
    successMetric: Two pilot customers convert to annual contracts in the planned pricing band.
    owner: Founder
  - horizon: 6-12 months
    experiment: Second queue and second hub expansion
    hypothesis: The implementation playbook can expand faster than the first deployment because the core runtime and controls are reusable.
    successMetric: Second queue or hub goes live with materially less setup time than the first production pilot.
    owner: Product lead
operations:
  - Maintain a replay and fallback queue for every connector so stalled wake events do not silently drop cases.
  - Vault browser session state and credentials with explicit rotation, access control, and resume policies.
  - Run weekly ROI and aging reviews with pilot branches using case-level cost and audit data.
  - Build an implementation playbook with one customs-suite integrator and one automation partner before broad channel expansion.
team:
  - role: Founder and CEO
    startTiming: Month 0
    rationale: Own design-partner sales, workflow discovery, and pricing because the first contracts depend on customer truth more than brand marketing.
  - role: Founding eng
    startTiming: Month 0
    rationale: Build the checkpointed runtime, wake orchestration, session security, and first connector path.
  - role: Customs ops and solutions lead
    startTiming: Month 1-3
    rationale: Translate brokerage exception workflows into approval rules, pilot playbooks, and branch-level ROI proofs.
  - role: Full-stack product engineer
    startTiming: Month 4-6
    rationale: Ship the operator dashboard, audit export, analytics, and faster connector packaging once the first pilot path is proven.
  - role: GTM lead
    startTiming: Month 9-12
    rationale: Add repeatable outbound and partner enablement only after at least one pilot converts to annual production.
milestones:
  - horizon: 0-12 months
    items:
      - Land three design partners and complete one paid production pilot on a single exception queue.
      - Prove reliable resume behavior across one customs suite, one shared inbox flow, and one external status source.
      - Convert at least two branches or hubs to annual contracts with documented ROI and audit controls.
  - horizon: 12-24 months
    items:
      - Expand into two or three exception types and deploy to multiple branches inside the first customer set.
      - Launch premium audit and routing analytics modules powered by case-history data.
      - Secure partner-led implementations through at least one customs integrator or automation channel.
  - horizon: 24-36 months
    items:
      - Reuse the runtime in at least one adjacent workflow such as duty drawback, freight claims, or export-control review.
      - Establish a repeatable multi-branch expansion motion inside brokerages and freight-tech operators.
      - Decide whether the company is a narrow customs platform or a broader trade-compliance runtime based on adjacency uptake.
risks:
  - risk: The true volume of multi-day customs exceptions is too low to support branch-level software pricing.
    likelihood: Medium
    impact: High
    mitigation: Validate case incidence before product expansion and narrow to the highest-dwell exception subtype if necessary.
  - risk: Portal, inbox, and ACE-adjacent integrations are too brittle for reliable wake-ups.
    likelihood: High
    impact: High
    mitigation: Start with the most stable signals, ship replay and fallback queues, and include implementation support in early pilots.
  - risk: Licensed-broker supervision concerns slow autonomous production use.
    likelihood: High
    impact: Medium
    mitigation: Launch with human approval envelopes, clear escalation thresholds, and replayable audit history rather than hands-off autonomy.
  - risk: Incumbent customs suites or horizontal automation vendors bundle enough pause-resume capability to blunt differentiation.
    likelihood: Medium
    impact: High
    mitigation: Win on customs-specific case modeling, faster time to value, and proprietary reliability data across real exception queues.
  - risk: Stored browser session state creates a security review bottleneck.
    likelihood: Medium
    impact: Medium
    mitigation: Treat session vaulting, encryption, credential rotation, and access controls as core product features from day one.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2-4M"
  runwayMonths: 18
  useOfFundsSummary: >-
    Eighteen months should fund the founding product and solutions team, ship the core pause-resume runtime with one narrow connector set, complete three design-partner pilots, and convert the first production branches before broader channel expansion.
