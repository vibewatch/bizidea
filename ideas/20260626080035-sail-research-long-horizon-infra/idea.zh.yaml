topRisks:
  - name: 买家采用保守
    description: 传统报关行在将智能体接管客户级异常工作流方面可能行动迟缓。
    mitigation: 从一个分支内的人机协同异常辅助开始，证明积压和成本的降低，再按工作流逐步扩大自主程度。
  - name: 集成脆弱性
    description: 承运人门户、收件箱格式和报关相关系统变动频繁，可能破坏唤醒触发器或浏览器断点。
    mitigation: 优先使用信号稳定的事件源，在每个连接器中内置回放和兜底队列，并在早期试点定价中包含集成支持。
  - name: 在位平台捆绑
    description: 报关软件厂商或横向浏览器自动化平台一旦验证该品类有价值，可能添加基础的暂停-恢复功能。
    mitigation: 凭借深度案例状态建模、贸易专属审计工作流和跨系统可靠性数据胜出——横向平台很难在早期积累这些。
