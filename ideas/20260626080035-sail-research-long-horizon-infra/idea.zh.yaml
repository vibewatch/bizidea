problem: >-
  报关行和进口运营团队依然维持着庞大的异常处理台，因为单笔申报可能要跨越数小时乃至数天，
  等待客户文件、承运人更新、CBP 响应或门户重试。现有的自动化方案要么在无事可做时让浏览器和
  模型进程保持常驻，要么通过脆弱的 RPA 定时器和人工队列转交工作。结果是：偏偏在那些自主化最
  能节省人力的工作流里，智能体的经济账最不划算；而且当案例在人工、机器人和收件箱之间反复流转
  时，审计追踪也难以留存。
targetUser:
  primary: 美国报关行或货运科技平台负责进口申报异常处理现代化的 CTO 或自动化负责人
  secondary: 负责申报吞吐量、报关员效率和服务水平合规的运营副总裁或分支运营主管
  buyer: 报关行运营的 CTO、COO 或总经理
startupThesis:
  nonObviousInsight: >-
    长周期智能体的突破不在于模型变聪明了，而在于空闲暂停基础设施终于让等待状态密集的工作流
    变得经济可行。报关异常处理的本质是：短暂的推理爆发，夹杂着等待门户、邮件、EDI 消息和人工
    审批的漫长间歇——因此，胜出的运行时不是延迟最低的那个，而是能可靠地断点保存并恢复的那个。
  beachhead: >-
    每月处理 5,000 到 50,000 票海运和空运申报的美国报关行及货运科技进口团队——智能体需要
    在 ACE、承运人门户和托运人邮件线程之间，处理跨越 1 到 3 天案例生命周期的缺失文件、税则
    编码、承运人状态和海关扣押等异常
  wedge: >-
    一个事件驱动的运行时：当申报卡住时，自动检查点保存浏览器状态、工具上下文和案例记忆；
    一旦收到邮件、门户更新、EDI 事件或人工审批，立即唤醒智能体——按活跃计算计费而非按挂钟
    时间计费，并输出完整的案例级审计追踪
  whyNowCatalyst: >-
    Sail 经过验证的空闲暂停架构与 10 倍成本优势，让长周期智能体工作流对后台运营而言在商业上
    立即可行——此前这些工作流因等待状态过多而无法实现端到端自动化。
  ventureScalePath: >-
    从报关申报异常起步，扩展至货运理赔处理、退税申请、出口管制审查及其他贸易合规工作流，
    最终成为任何以小时或天为生命周期计量的企业级智能体工作流的默认暂停-恢复运营层。
solution: >-
  产品是一个断点检查智能体运行时加案例编排层，专为异步操作工作流打造。它把浏览器会话、
  文档解析、模型调用和收件箱操作封装进一个可恢复的案例记录，在事件间隙安全休眠而不丢失状态。
  当承运人门户状态变化、客户回复缺失的商业发票，或内部报关员批准分类决定时，运行时唤醒精确
  的案例上下文，并将下一个动作路由给正确的模型、浏览器进程或人工审核员。团队可通过仪表板
  查看活跃与休眠案例、每案例计算成本、异常老化情况，以及每个决策和交接的可回放审计日志。
goToMarketSeed:
  firstCustomer: >-
    负责每月处理 10,000 票以上海运和空运进口申报的美国报关行 COO 或 CTO，已在尝试浏览器
    自动化或离岸异常队列，并发现太多案例卡在邮件和门户等待状态中
  buyingTrigger: >-
    旺季积压、错过申报放行的服务水平协议，或一次失败的自动化试点——暴露出公司正在为
    监守休眠异常的人工或常驻机器人买单，而这些异常只是在等零散的外部更新
  currentAlternative: "人工录单员和离岸运营团队，辅以 UiPath 式 RPA、常驻 Playwright 进程、共享收件箱队列和电子表格"
  switchingReason: >-
    运行时在长周期案例上降低成本，因为它在事件间歇休眠，无需脆弱的定时器就能撑过门户和
    收件箱等待状态，并为运营主管提供逐案审计追踪——这是临时机器人脚本给不了的。
  pricingHypothesis: >-
    按报关行分支机构或运营中心收取年度平台费，加上按活跃案例小时和每次案例恢复收取的
    用量费，与人力节省和更快申报放行挂钩。
whyNow:
  - point: >-
      Sail 的最高 10 倍空闲暂停成本削减，把报关异常自动化的核心经济账从猜测变成了
      立即可测试的事实。
    signalRefs: ["空闲暂停经济性已获验证"]
    sourceRefs: [1]
  - point: >-
      支持跨越数小时乃至数周任务的能力，完全契合报关异常案例的真实形态——这些案例
      往往在行动爆发之间长时间静止，需要持久而非常驻的智能体基础设施。
    signalRefs: ["多日智能体工作流正进入生产环境"]
    sourceRefs: [2]
  - point: >-
      推理设计从延迟优先转向吞吐量优先，意味着基础设施厂商终于在为持续运营工作负载
      而非聊天演示优化——这正是后台报关行的实际需求。
    signalRefs: ["吞吐量价值已超越原始延迟"]
    sourceRefs: [2]
  - point: >-
      兼容 OpenAI 的 API 与跨供应商工作负载控制，让报关行能在现有模型和云选型基础上
      直接采用该运行时，无需等待单一端到端供应商方案。
    signalRefs: ["兼容性降低采用摩擦", "跨供应商资源利用正成为核心基础设施"]
    sourceRefs: [3, 4]
differentiator: >-
  浏览器自动化厂商专注点击可靠性，企业级智能体平台专注模型质量，但两者都没有围绕
  案例大部分时间处于等待状态的经济学与状态管理来构建产品。这家公司把可恢复执行、
  事件触发唤醒和案例级成本核算组合在一起，专攻通用智能体栈处理不好的工作流形态。
  随着时间推移，哪些触发器、门户和人工交接会导致停滞的可靠性数据，将成为改善路由、
  重试逻辑和定价的可防御数据集。
