jobsToBeDone:
  - job: >-
      当一笔进口申报因缺少文件、门户状态或海关响应而卡住时，帮助我的运营团队在不为
      空闲自动化付费的情况下保持案例存活，让他们用同样的人头清关更多申报。
    currentAlternative: 共享收件箱分拣加 RPA 机器人或常驻浏览器进程轮询系统，直到出现变化
    successMetric: 每异常案例成本降低 30%，平均放行时间加快 20%
  - job: >-
      当审计人员或客户询问货物为何延误时，帮我还原案例上的每一个自动化和人工操作，
      以便我能为决策辩护并改进工作流。
    currentAlternative: 人工截图采集、门户备注，以及分散在机器人、邮件和报关系统中的碎片化日志
    successMetric: 95% 的异常案例可在五分钟内获取完整可回放案例历史
