slug: customs-agent-sleep-runtime
date: "2026-06-26"
executiveSummary: >-
  报关申报异常是暂停-恢复智能体运行时的可信切口，因为这类工作天然在短暂推理爆发与
  等待 ACE 更新、客户文件、承运人门户和报关员审批之间交替。Sail Research 及其他长周期
  工作流工具验证了空闲暂停基础设施已经存在，这家初创公司的差异化主张是：把这些基础
  原语打包成报关行级运营层，而非通用开发者基础设施。首个客户是每月处理 10,000 票以上
  申报、已在 RPA、浏览器自动化或离岸异常处理上砸钱的美国报关行分支或运营中心。购买
  触发器是积压高峰、错过放行服务水平协议，或一次失败的自动化试点——暴露出公司正为人工
  或常驻机器人监守休眠案例买单。MVP 应作为叠加在一个现有报关套件上的覆盖层，加上共享
  收件箱和一个门户家族，配备审批信封和可回放审计日志，让产品契合 CBP 监管现实而非挑战
  它。初始定价应将年度中心订阅与活跃案例小时和恢复事件用量结合，与客户的人力节省预算
  及产品的活跃计算理念对齐。最强的早期证明点是：共创客户试点将异常案例成本削减约 30%、
  平均放行时间加快约 20%，同时维持可靠的唤醒和可追溯的决策。最大的未解尽调缺口是：目标
  报关行中有多大比例的申报量真正落入多日异常——且空闲时间足以支撑 $120k–$150k 年度合同。
  鉴于滩头市场真实但狭窄，公司应在拿下一个队列、再拿下一个分支后，才能赢得向退税申请、
  货运理赔和出口管制审查等毗邻贸易合规工作流的扩张。
problem:
  - 异常案例在 ACE、邮件、承运人门户和人工审批之间停滞 1 到 3 天，导致现有自动化要么为空闲进程付费，要么回退到人工队列。
  - 报关行缺乏跨机器人、浏览器、邮件和人工操作的单一可回放案例记录，削弱了可审计性，也让放行服务水平协议滑坡时的根因分析变慢。
solution:
  - 当报关案例处于等待状态时，断点检查案例运行时让浏览器、模型和工具状态休眠；收到收件箱回复、门户变化、ACE 事件或报关员审批时，精确唤醒对应上下文。
  - 在现有报关系统之上的运营层，提供活跃与休眠案例可见性、逐案成本核算、审批信封和审计导出。
whyWeWin:
  - 产品围绕等待状态经济学和案例记忆构建，而非通用机器人可靠性或模型质量。
  - 可作为现有报关套件和共享收件箱工作流的覆盖层落地，降低替换摩擦。
  - 每处理一个案例，都能改善异常路由、唤醒触发器和审计历史——在监管和回放至关重要的行业里，这是真实护城河。
strategicChoices:
  beachhead: >-
    拥有集中异常处理台、每月处理 10,000 票以上海运和空运申报、且缺失文件和承运人状态
    异常常规停滞 1 到 3 天的美国报关行——选择一个分支或运营中心起步。
  wedgeRationale: >-
    该队列有可见的积压痛点、可衡量的人力成本和反复出现的空闲等待，因此暂停-恢复经济性
    比低延迟智能体场景或全面申报自动化更快产生验证。同时，公司可作为叠加在 ACE 连接报关
    套件之上的覆盖层销售，无需要求客户替换申报系统。
  sequencingRationale: >-
    先围绕一个报关套件、一个共享收件箱流和一个门户家族，构建一条窄连接器路径，让团队能
    在单一分支内验证唤醒可靠性、可审计性和 ROI。只有在试点转化后，才应扩展到更多异常
    类型、更多分支和毗邻贸易工作流——因为 GTM 公信力依赖实施速度和合规信任，而非功能
    广度。
  notYet:
    - 完整的报关申报或申报系统记录
    - 在基于 ACE 的美国方案可复制之前进入非美国市场
    - 无审批信封的完全自主分类或合规决策
market:
  tam: "TAM $225.0M，以约 1,500 家 NCBFAA 成员公司为保守代理，按每家成熟多工作流合同价值约 $150k 估算。"
  sam: "SAM $43.5M，基于当前美国申报量——CBP 2025 年 1 月处理了超过 290 万条申报汇总，折年约 3,480 万条；按目标枢纽每月 10,000 票均值划分，约有 290 个高量枢纽；按每枢纽 $150k 初始 ACV 计算。"
  som: "SOM $4.8M，第三年以 40 个可触达枢纽或客户为基础，按 $120k 混合 ACV 估算，从一个异常工作流起步后逐账户扩张。"
  segments:
    - 拥有集中异常团队和自动化预算的美国报关行
    - 嵌入报关运营或贸易合规工作流的货运科技平台
  buyingProcess: >-
    销售从 CTO、COO 或总经理发起人加分支运营支持者开始，后者能暴露一个痛苦的异常队列。
    买家在转为年度枢纽合同之前，会要求高触达试点、围绕存储会话状态的安全审查，以及明确
    的持证报关员监督管控。
product:
  mvp: >-
    在一个现有报关套件之上，交付一个为单一异常工作流保存浏览器状态、文档、收件箱上下文
    和人工审批的案例运行时。MVP 必须包含共享收件箱接入、一个门户或 ACE 相邻的唤醒信号、
    审批信封、可回放审计历史和逐案成本可见性。
  sixMonth: >-
    将 MVP 转化为一个分支的生产试点，添加连接器故障的兜底队列和回放工具，并支持第二个
    唤醒源，让案例能同时从收件箱回复和外部状态变化中恢复。
  twelveMonth: >-
    从一个异常队列扩展到两到三个高量异常模式，添加异常原因和老化分析，并将方案手册推广
    至第二个分支或运营中心。
  twentyFourMonth: >-
    用同一运行时和审批模型进入毗邻贸易工作流，如货运理赔、退税申请和出口管制审查，同时
    保留美国报关作为参考部署。
  keyBets:
    - 目标报关行中有相当比例的申报量落入多日异常，空闲时间节省比延迟更重要。
    - 一套窄连接器能覆盖足够的案例量，在不要求客户替换系统记录的情况下证明 ROI。
    - 报关行愿意接受审批信封和可回放审计日志，作为初始生产使用的充分管控。
    - 案例级异常和唤醒历史数据将复利为更好的路由和扩张经济性。
gtm:
  wedge: >-
    向已尝试 RPA 或浏览器自动化、且正因人工或常驻机器人监守停滞案例而错过放行服务水平
    协议的 10,000 票以上报关分支，销售共创客户试点。
  channels:
    - 直接触达有可见异常处理台的大型美国报关行和货运科技运营商
    - 向已运行 RPA、浏览器自动化或离岸异常队列的报关行开展共创客户销售
    - 报关软件集成商、贸易科技顾问公司和自动化合作伙伴，在首批试点胜出后作为实施渠道
  funnelTargets: "目标：10%–15% 的命名外发账户进入试点尽调，50% 以上付费试点转为年度生产，40% 以上首批生产枢纽在 12 个月内扩展到第二个队列或枢纽。"
  pricing: >-
    按分支或运营中心收取年度订阅费，加上活跃案例小时和恢复案例的用量费。这与产品的
    活跃计算理念契合，也让买家能从现有报关合规、自动化或异常人力预算中划拨采购费用。
businessModel:
  revenueStreams:
    - 按报关行分支或运营中心收取年度平台订阅费
    - 按活跃案例小时和恢复案例收取用量费
    - 溢价审计导出、合规留存和路由分析模块
  unitOfValue: 每分支或运营中心管理的活跃异常案例数
  targetGrossMarginPct: 70
  expansionLevers:
    - 在首个分支内增加更多异常队列
    - 将同一运行时推广至更多分支或枢纽
    - 向现有客户销售溢价审计和分析模块
    - 将运行时扩展至退税申请、货运理赔和出口管制工作流
strategyMap:
  northStarMetric: 每分支每月通过完整审计追踪解决的生产异常案例数
  inputMetrics:
    - 从外部事件成功恢复的符合条件案例比例
    - 与人工或常驻机器人基线相比的每异常案例成本
    - 试点异常队列的平均放行时间缩短幅度
    - 试点转生产转化率
    - 新增队列或分支的上线时间
  moatsToBuild:
    - 报关专属异常分类法和结果数据集
    - 跨 ACE、收件箱、门户和人工审批的跨系统事件图谱
    - 绑定每个自动化操作的报关行级回放和审计历史
    - 导致停滞的具体门户和触发器的连接器可靠性数据
  killCriteria:
    - 三家共创客户中少于 10% 的申报被认定为有实质空闲时间的多日异常。
    - 经过两轮试点迭代后，唤醒可靠性在首套报关套件、收件箱和门户连接器上仍低于 95%。
    - 首批 5 个试点中少于 2 个以约 $120k 年化定价转为年度合同。
  mermaid: |
    flowchart LR
      Wedge[Customs exception wedge] --> MVP[Pause resume case runtime]
      MVP --> Proof[Audit complete ROI pilot]
      Proof --> Expansion[More branches and trade workflows]
investorMemo:
  verdict:
    call: Watch
    conviction: 工作流痛点强烈、技术切口可信，但异常量和扩张数学仍需共创客户验证。
    whyBelieve: 公司瞄准一个真实的等待状态密集工作流，在那里暂停-恢复经济性、可审计性和覆盖层部署解决了横向平台没有现成打包的具体买家痛点。
    whyDoubt: 滩头市场狭窄，买家保守，初创公司仍需证明有足够的案例量和预算，能跑赢现有报关套件加服务。
    nextDiligence: 从至少三家报关行获取分支级案例日志，在将其视为风险规模之前，验证异常发生率和试点 ROI。
  firstCustomer:
    title: 高量美国报关行分支的 COO 或 CTO
    profile: 处理每月 10,000 票以上海运和空运申报的报关行或货运科技进口枢纽，已在运行报关套件加共享收件箱和一定自动化。
    trigger: 旺季积压、错过放行服务水平协议，或让人工监守休眠异常案例的失败 RPA 试点。
    buyer: 报关行运营的 CTO、COO 或总经理
    initialContract: 90 天付费试点，若分支达成成本和放行时间目标则转为约 $120k–$150k 年度枢纽订阅加用量费。
  mustBeTrue:
    - 目标分支中至少 10%–15% 的申报量落入有反复空闲等待和多次人工接触的 1 到 3 天异常队列。
    - 叠加在一个现有报关套件、一个共享收件箱流和一个门户家族之上的覆盖层，能覆盖足够多的案例来证明 ROI，无需替换式销售。
    - 试点部署能实现每异常案例成本降低约 30%、平均放行时间加快约 20%。
    - 持证报关员领导层接受审批信封和可回放审计历史，作为初始生产使用的充分管控。
    - 同一运行时能以比初始报关切口少得多的工程量扩展至毗邻贸易合规工作流。
  diligenceQuestions:
    - 目标报关行中有多少比例的申报成为有足够空闲时间来验证该运行时的多日异常？
    - 哪些唤醒信号在生产中足够可靠——包括收件箱回复、门户更新、ACE 事件或文档上传？
    - 谁真正掌握该产品的预算：报关运营、企业自动化，还是 IT 平台？
    - 叠加在 CargoWise、Descartes 或同类系统之上而不干扰现有界面，需要多少实施工作？
    - 什么能让报关行选择这个覆盖层，而非用服务扩展 UiPath、Temporal 或现有报关套件？
operatingAssumptions:
  - assumption: 足够多的目标申报量成为多日异常，能够支撑分支级合同。
    basis: research.yaml
    validationTest: 从三家共创客户收集 90 天案例日志，量化异常停留时间、等待原因和接触次数。
    decisionImpact: 若异常比例或停留时间偏低，将滩头市场缩窄至单一异常子类型，或放弃报关作为首个市场。
  - assumption: 买家愿意在保留现有报关系统记录的情况下购买覆盖层，而非要求完全替换。
    basis: research.yaml
    validationTest: 进行五次买家访谈和两次保留现有系统记录的付费试点。
    decisionImpact: 若买家拒绝覆盖层，公司将面临更长的销售周期，应通过集成商或平台重新定位为工具层。
  - assumption: 每枢纽约 $120k–$150k 加用量的年化定价，相对于当前自动化和人力支出，在采购上可行。
    basis: research.yaml
    validationTest: 在 8 到 10 次试点对话中测试打包和定价，衡量进入安全审查或试点的意愿。
    decisionImpact: 若定价远低于此区间，公司必须降低实施成本或制定范围更窄的小规模 pre-seed 计划。
  - assumption: 审批信封和审计日志足以在深度自主化之前满足监督要求。
    basis: idea.yaml
    validationTest: 与持证报关员领导层审查管控模型，跟踪试点是否在人机协同规则下批准生产使用。
    decisionImpact: 若买家仍阻止生产自主化，将辅助异常处理货币化，推迟自主化操作。
  - assumption: 退税申请和货运理赔等毗邻工作流可复用同一运行时和连接器基础。
    basis: idea.yaml
    validationTest: 在首次生产部署后对一个毗邻工作流进行原型验证，比较新增集成工作量与初始报关队列的差异。
    decisionImpact: 若毗邻复用能力弱，业务将保持为一个窄报关产品，可能无法支撑激进的风险融资。
experimentRoadmap:
  - horizon: 0–90 天
    experiment: 共创客户案例日志研究
    hypothesis: 高量报关行有足够多的 1 到 3 天异常量，能支撑分支级软件合同。
    successMetric: 三个目标分支共享历史日志，至少两个显示出足够大的多日异常队列，以支撑试点 ROI 建模。
    owner: 创始人与报关运营负责人
  - horizon: 0–90 天
    experiment: 收件箱和门户唤醒原型
    hypothesis: 运行时能从共享收件箱回复和一个外部状态源可靠地断点恢复单一异常案例。
    successMetric: 测试案例的成功恢复率达到 95% 以上，并完成完整案例回放。
    owner: 创始工程师
  - horizon: 90–180 天
    experiment: 人机协同生产试点
    hypothesis: 审批信封加可回放审计日志足以满足一个分支的首次生产使用需求。
    successMetric: 一个付费试点在真实队列上运行，零合规事故，并有运营负责人签字。
    owner: 方案负责人
  - horizon: 90–180 天
    experiment: 单一异常队列 ROI 验证
    hypothesis: 暂停-恢复处理在成本和放行时间上，实质上优于人工或常驻机器人工作流。
    successMetric: 相较分支基线，每异常案例成本降低 30%，平均放行时间加快 20%。
    owner: 创始人与分支支持者
  - horizon: 6–12 个月
    experiment: 打包与定价测试
    hypothesis: 若试点与积压减少和审计准备挂钩，买家接受年度枢纽订阅加用量定价。
    successMetric: 两名试点客户在计划定价区间转为年度合同。
    owner: 创始人
  - horizon: 6–12 个月
    experiment: 第二队列和第二枢纽扩张
    hypothesis: 因核心运行时和管控可复用，实施方案手册的扩张速度快于首次部署。
    successMetric: 第二个队列或枢纽上线所需的配置时间，实质上少于首个生产试点。
    owner: 产品负责人
operations:
  - 为每个连接器维护回放和兜底队列，确保停滞的唤醒事件不会静默丢失案例。
  - 对浏览器会话状态和凭据进行加密存储，并设置明确的轮换、访问控制和恢复策略。
  - 每周与试点分支用案例级成本和审计数据进行 ROI 和老化复盘。
  - 在大规模渠道扩张之前，与一家报关套件集成商和一家自动化合作伙伴共同构建实施方案手册。
team:
  - role: 创始人兼 CEO
    startTiming: Month 0
    rationale: 主导共创客户销售、工作流探索和定价，因为首批合同依赖客户真相而非品牌营销。
  - role: 创始工程师
    startTiming: Month 0
    rationale: 构建断点检查运行时、唤醒编排、会话安全和首条连接器路径。
  - role: 报关运营与方案负责人
    startTiming: Month 1-3
    rationale: 将报关行异常工作流转化为审批规则、试点方案手册和分支级 ROI 证明。
  - role: 全栈产品工程师
    startTiming: Month 4-6
    rationale: 在首条试点路径验证后，交付运营仪表板、审计导出、分析和更快的连接器打包。
  - role: GTM 负责人
    startTiming: Month 9-12
    rationale: 仅在至少一个试点转为年度生产后，才添加可重复的外发和合作伙伴赋能。
milestones:
  - horizon: 0–12 个月
    items:
      - 签下三家共创客户，并在单一异常队列上完成一个付费生产试点。
      - 在一套报关套件、一个共享收件箱流和一个外部状态源上验证可靠的恢复行为。
      - 将至少两个分支或枢纽转为有文档化 ROI 和审计管控的年度合同。
  - horizon: 12–24 个月
    items:
      - 扩展至两到三种异常类型，并在首批客户中向多个分支部署。
      - 推出由案例历史数据驱动的溢价审计和路由分析模块。
      - 通过至少一家报关集成商或自动化渠道完成合作伙伴主导的实施。
  - horizon: 24–36 个月
    items:
      - 将运行时复用至少一个毗邻工作流，如退税申请、货运理赔或出口管制审查。
      - 在报关行和货运科技运营商内部建立可重复的多分支扩张动作。
      - 根据毗邻工作流的采用情况，决定公司定位为窄报关平台还是更广泛的贸易合规运行时。
risks:
  - risk: 多日报关异常的真实量太低，无法支撑分支级软件定价。
    likelihood: Medium
    impact: High
    mitigation: 在产品扩张前验证案例发生率，必要时缩窄至停留时间最长的异常子类型。
  - risk: 门户、收件箱和 ACE 相邻集成过于脆弱，无法可靠触发唤醒。
    likelihood: High
    impact: High
    mitigation: 从信号最稳定的事件源起步，在每个连接器中内置回放和兜底队列，并在早期试点中包含集成支持。
  - risk: 持证报关员监督要求拖慢自主化生产上线。
    likelihood: High
    impact: Medium
    mitigation: 以人工审批信封、清晰的升级阈值和可回放审计历史发布，而非无人监管的自主化。
  - risk: 现有报关套件或横向自动化厂商捆绑足够多的暂停-恢复功能，钝化差异化优势。
    likelihood: Medium
    impact: High
    mitigation: 凭借报关专属案例建模、更快的价值实现时间和真实异常队列的专有可靠性数据胜出。
  - risk: 存储浏览器会话状态引发安全审查瓶颈。
    likelihood: Medium
    impact: Medium
    mitigation: 从第一天起将会话加密存储、凭据轮换和访问控制作为核心产品功能。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2-4M"
  runwayMonths: 18
  useOfFundsSummary: >-
    18 个月应能支撑创始产品和方案团队、交付带一套窄连接器的核心暂停-恢复运行时、完成
    三个共创客户试点，并在更广泛的渠道扩张之前转化首批生产分支。
