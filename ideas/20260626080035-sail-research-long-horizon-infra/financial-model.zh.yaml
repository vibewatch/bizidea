    cashImpactK: -363.2

modelDiagram:
  title: "单位经济模型流程"
  mermaid: |
    flowchart LR
      Targets[Named brokerages] --> Pilot[Paid pilots]
      Pilot --> Deployment[Active hub or queue deployments]
      Deployment --> Expansion[Second queue or branch expansion]
      Expansion --> Revenue[Subscription plus usage revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash after payroll and operating spend]

modelSanity:
  - checkName: "收入引擎"
    finding: >-
      基准情景收入来自将 21 个累计起步转化为 Q4Y3 的 18.2 个活跃付费枢纽当量，
      同时混合年价值随用量、分析和第二队列扩张提升至 $181K。
  - checkName: "必须做对的事"
    finding: >-
      首批三家共创客户必须成为可重复的第二队列或第二分支部署，因为模型只有在
      Y2 和 Y3 新增 17 个起步而不产生同比例头部支出时才能跑通。
  - checkName: "模型失效条件"
    finding: >-
      若合作伙伴动作停滞且有效 CAC 表现如悲观敏感性，Y3 收入将减少约 $545K，
      利润率规模化显现之前现金缓冲将收缩约 $362K。
  - checkName: "下轮融资证明"
    finding: >-
      种子轮叙事在公司展示 6–8 个生产部署、一条合作伙伴主导的实施路径和稳定的
      70% 毛利率后最有力——这正是 $2.4M pre-seed 规模所对应的里程碑。

sanityChecks:
  ruleOf40: >-
    Y3 增速 (2516.5-886.6)/886.6 = 184.0% + Y3 EBITDA 利润率 9.2/2516.5 = 0.4% = 184.4%；
    轻松达标，但受 Y2 基数较小影响有所美化。
  burnMultiple: >-
    Y2 消耗倍数约 1.1x（$789.0K 消耗 / $716.0K 净新增收入），对仍在构建参考部署的垂直
    工作流 SaaS 而言合理。
  revenuePerFte: >-
    以 Q4Y3 的 9 人头计算，Y3 约为 $279.6K，处于垂直 SaaS 和工作流软件典型 $200K–$400K
    区间之内。
  flags:
    - >-
      模型需要 Y3 混合年化枢纽收入达到 $181K，高于 research 中保守 $120K SOM 数学，
      因此用量和分析附加必须是真实的而非愿景式的。
    - >-
      Q4Y3 的 18.2 个活跃枢纽当量很可能仍对应不足 10 家报关行客户，因此即便分支扩张
      奏效，客户集中度风险依然较高。
    - >-
      毛利率从 Y1 52% 提升至 Y3 70%，仅在连接器可靠性和实施方案手册标准化后才能实现；
      若实际以服务为主，EBITDA 将重返负值。
    - >-
      $2.4M 融资留下 $741.7K 基准情景现金低点，因此融资规模受漫长安全审查和集成周期
      驱动，与纯粹的消耗速度同等重要；更快的验证路径可支撑更小的融资轮次。
    - >-
      悲观情景略微现金为负，因此合作伙伴渠道停滞或起步节奏放缓，很可能在计划种子轮前
      迫使过桥融资。
    - >-
      7.1 个月 CAC 回本期对企业软件而言表现不错，但前提是创始人主导销售和温热合作伙伴
      转介保持获客效率，直至 Y3 末客户主管岗位到位并进入状态。
