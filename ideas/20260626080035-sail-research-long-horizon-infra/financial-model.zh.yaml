fundingAsk:
  round: pre-seed
  amountM: 2.4
  runwayMonths: 24
  milestone: >-
    达到 6–8 个生产分支或队列部署，验证一条合作伙伴主导的实施路径，在首套连接器上保持
    唤醒可靠性高于 95%，并在种子轮融资前仍持有约六个月现金。
  useOfFunds:
    - bucket: "工程与产品"
      amountUsd: 1000000
      percentage: 41.7
    - bucket: "GTM 与合作伙伴赋能"
      amountUsd: 600000
      percentage: 25.0
    - bucket: "客户实施"
      amountUsd: 250000
      percentage: 10.4
    - bucket: "安全、合规与行政管理"
      amountUsd: 250000
      percentage: 10.4
    - bucket: "缓冲（6 个月）"
      amountUsd: 300000
      percentage: 12.5

scenarios:
  downside:
    description: >-
      安全审查、连接器可靠性工作和合作伙伴引入均出现滑坡，Y2–Y3 新增起步从 17 个降至
      12 个，混合年收入上限接近 $158K，毛利率仅达 66%。
    y3RevenueK: 1501.4
    y3EbitdaK: -761.2
    cashLowPointK: -63.3
    keyAssumptionChanges:
      - "Y2–Y3 起步节奏从 17 个活跃部署降至 12 个。"
      - "混合年收入上限接近 $158K 而非 $181K。"
      - "毛利率仅达 66%，因为实施依然服务密集。"
  base:
    description: >-
      Y1 三个共创客户起步、Y2 七个、Y3 十个，Q4Y3 累计活跃付费枢纽当量达 18.2 个，
      混合年收入随用量、分析和第二队列扩张从 $132K 提升至 $181K。
    y3RevenueK: 2516.5
    y3EbitdaK: 9.2
    cashLowPointK: 741.7
    keyAssumptionChanges:
      - "按模型假设执行。"
      - "活跃部署从 Y1 末 2.8 个增至 Y2 末 10.1 个、Y3 末 18.2 个。"
      - "毛利率在 Y3 达到 BP 目标 70%，同时员工人数增至 9 人。"
  upside:
    description: >-
      集成商转介和更快的第二分支推广实质提升 Y2–Y3 起步，将混合年收入推向 $196K，并在
      Y3 末支持第二位客户主管，同时毛利率扩大至 72%。
    y3RevenueK: 3372.5
    y3EbitdaK: 563.3
    cashLowPointK: 1016.0
    keyAssumptionChanges:
      - "通过合作伙伴转介和账户内更快扩张，Y2–Y3 起步超过基准。"
      - "通过更多用量和溢价分析附加，混合年收入约达 $196K。"
      - "毛利率达 72%，Y3 末增加第二位客户主管而不承压现金。"

sensitivity:
  - variable: "ARPU"
    downsideCase: "用量和分析附加迟缓，Y3 混合年化枢纽收入约 $166K。"
    baseCase: "基准情景 Y3 混合年化枢纽收入 $181.2K。"
    upsideCase: "更强的模块附加将 Y3 混合年化枢纽收入推向 $200K。"
    y3RevenueImpactK: -216.7
    cashImpactK: -95.9
  - variable: "CAC"
