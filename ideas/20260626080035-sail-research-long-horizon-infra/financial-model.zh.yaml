slug: customs-agent-sleep-runtime
date: '2026-06-26'
currency: USD
modelStartMonth: '2026-07'

assumptions:
  - id: A1
    name: "模型起始月份"
    value: "2026-07"
    unit: "YYYY-MM"
    source: >-
      [BP date 2026-06-26] 模型从商业计划日期的下一个月开始。
  - id: A2
    name: "M1 期初现金"
    value: "$2.4M"
    unit: "USD"
    source: >-
      [BP fundingAsk targetFundingRangeUsd $2-4M + 模型规模] 取较低中值的 pre-seed，
      规模足以覆盖 12–24 个月扩张里程碑加六个月缓冲。
  - id: A3
    name: "起始活跃付费枢纽数（M1）"
    value: "0"
    unit: "count"
    source: >-
      [BP executiveSummary + milestones] 公司从预收入阶段起步，必须先将共创客户转化为
      付费试点。
  - id: A4
    name: "活跃付费枢纽定义"
    value: "一个付费试点、年度生产枢纽，或有独立预算的第二队列/分支部署"
    unit: "definition"
    source: >-
      [BP businessModel.unitOfValue + expansionLevers] customersEop 跟踪付费部署单元而非
      报关行客户总数，以便分支和队列扩张能在模型中体现。
  - id: A5
    name: "付费试点价格"
    value: "$33K / 90 天"
    unit: "USD per pilot"
    source: >-
      [BP investorMemo.firstCustomer.initialContract + 初创财务惯例] 试点定价约为第一年
      生产价值的 25%，使采购团队能在年度转化前完成真实意向评估。
  - id: A6
    name: "初始生产年度价值"
    value: "$132K"
    unit: "USD per hub per year"
    source: >-
      [BP investorMemo.firstCustomer.initialContract $120k-$150k 加用量] 取略高于下限
      的中间值，含少量用量费。
  - id: A7
    name: "每活跃付费枢纽混合确认年收入"
    value: "Y1 $132K，Y2 $147.6K，Y3 $181.2K"
    unit: "USD per active hub per year"
    source: >-
      [BP pricing + expansionLevers + research reportMemo.willingnessToPay] 假设用量费、
      审计分析和第二队列扩张随时间提升成功账户的收入。
  - id: A8
    name: "新活跃付费枢纽起始节奏"
    value: "Y1 在 M5、M8、M10 起步；Y2 新增 7 个；Y3 新增 10 个"
    unit: "start pattern"
    source: >-
      [BP milestones + strategicChoices.sequencingRationale + gtm.funnelTargets] 将 3 个
      共创客户、多分支扩张和一条合作伙伴渠道转化为有节制的部署斜坡。
  - id: A9
    name: "月活跃枢纽流失率"
    value: "1.2%"
    unit: "percent per month"
    source: >-
      初创财务惯例：买家集中的黏性企业级工作流软件年流失率可保持在低双位数，但早期
      产品仍面临实施和预算风险。
  - id: A10
    name: "毛利率斜坡"
    value: "Y1 52%，Y2 65%，Y3 70%"
    unit: "percent of revenue"
    source: >-
      [BP businessModel.targetGrossMarginPct 70 + 运营] 早期试点在达到软件级利润目标前
      承担实施和唤醒可靠性支持成本。
  - id: A11
    name: "创始人/CEO 含税全成本薪酬"
    value: "$145K"
    unit: "USD per year"
    source: >-
      初创财务惯例：pre-seed 创始人现金薪酬低于市场水平，部分由股权补偿。
  - id: A12
    name: "创始工程师含税全成本薪酬"
    value: "$185K"
    unit: "USD per year"
    source: >-
      初创财务惯例：含薪资附加费的高级工作流/基础设施工程人才。
  - id: A13
    name: "报关运营/方案负责人含税全成本薪酬"
    value: "$150K"
    unit: "USD per year"
    source: >-
      [BP team 报关运营与方案负责人] 行业领域加实施岗位，定价低于企业咨询市场，以反映
      早期股权组合。
  - id: A14
    name: "产品工程师含税全成本薪酬"
    value: "$170K"
    unit: "USD per year"
    source: >-
      [BP team 全栈产品工程师] 含初创薪资附加费的中高级产品工程岗位；Y2 第二产品工程师
      复用同一薪酬。
  - id: A15
    name: "GTM 负责人含税全成本薪酬"
    value: "$195K"
    unit: "USD per year"
    source: >-
      [BP team GTM 负责人] pre-seed 规模下创始人辅助型企业销售和合作伙伴拓展 OTE。
  - id: A16
    name: "方案工程师/客户成功含税全成本薪酬"
    value: "$145K"
    unit: "USD per year"
    source: >-
      初创财务惯例：首批分支上线后需要实施密集的售后支持。
  - id: A17
    name: "客户主管/合作伙伴含税全成本薪酬"
    value: "$185K"
    unit: "USD per year"
    source: >-
      [BP channels + 集成商动作] 仅在参考部署存在后才新增的后期阶段销售岗位。
  - id: A18
    name: "运营/财务含税全成本薪酬"
    value: "$115K"
    unit: "USD per year"
    source: >-
      初创财务惯例：仅在商业验证后才添加的精简后台支持。
  - id: A19
    name: "招聘时间线"
    value: "M1 创始人 + 创始工程师；M2 报关运营负责人；M5 产品工程师；M10 GTM 负责人；M14 方案工程师；M18 产品工程师 2；M26 客户主管/合作伙伴；M33 运营/财务"
    unit: "timeline"
    source: >-
      [BP team + strategicChoices.sequencingRationale] 后期招聘延续 BP 描述的产品优先
      再合作伙伴规模化的动作。
  - id: A20
    name: "非薪资销售与营销支出"
    value: "M1-6 $4K/月，M7-12 $6K/月，Y2 $8K/月，Y3 $12K/月"
    unit: "USD per month"
    source: >-
      [BP gtm.channels] 创始人主导外发、试点差旅和合作伙伴赋能，无付费媒体引擎。
  - id: A21
    name: "非薪资研发支出"
    value: "Y1 $7K/月，Y2 $9K/月，Y3 $11K/月"
    unit: "USD per month"
    source: >-
      [BP operations + research reportMemo.technologyLandscape] 运行时的云计算、浏览器/
      会话工具、监控和可靠性支出。
  - id: A22
    name: "非薪资行政管理支出"
    value: "Y1 $6K/月，Y2 $7K/月，Y3 $9K/月"
    unit: "USD per month"
    source: >-
      [BP operations + risks] 法律、保险、安全审查和合规开销。
  - id: A23
    name: "混合客户获取成本"
    value: "$75K"
    unit: "USD per production-equivalent deployment"
    source: >-
      [BP gtm.funnelTargets + 模型计算] 假设创始人主导销售加一条集成商渠道，将获客成本
      控制在纯冷外发企业软件规范以下。
  - id: A24
    name: "现金转换惯例"
    value: "现金变动等于 EBITDA"
    unit: "modeling convention"
    source: >-
      初创财务惯例：pre-seed 规模下资本支出、债务服务、营运资本波动和税项均不重要。
  - id: A25
    name: "下轮融资里程碑规模"
    value: "24 个月资金跑道，覆盖 6–8 个生产部署加 6 个月缓冲"
    unit: "runway"
    source: >-
      [BP fundingAsk.runwayMonths 18 + 模型规模] 将 BP 构建窗口延长至足以验证合作伙伴
      主导扩张，并避免在首批转化后立即融资。

