jobsToBeDone:
  - job: >-
      When an import entry stalls because documents, portal statuses, or customs responses are missing, help my
      operations team keep the case alive without paying for idle automation, so they can clear more entries with the
      same headcount.
    currentAlternative: Shared inbox triage plus RPA bots or always-on browser workers that poll systems until something changes
    successMetric: 30 percent lower cost per exception case and 20 percent faster average release time
  - job: >-
      When auditors or customers ask why a shipment was delayed, help me reconstruct every automated and human action on
      the case, so I can defend decisions and improve the workflow.
    currentAlternative: Manual screenshot gathering, portal notes, and fragmented logs across bots, email, and broker systems
    successMetric: Full replayable case history available in under five minutes for 95 percent of exceptions
