topRisks:
  - name: Conservative buyer adoption
    description: Traditional customs brokerages may move slowly on letting agents own customer-facing exception workflows.
    mitigation: Start with human-in-the-loop exception assistance inside one branch, prove backlog and cost reduction, then expand autonomy gradually by workflow.
  - name: Integration brittleness
    description: Carrier portals, inbox formats, and customs-adjacent systems can change often enough to break wake-up triggers or browser checkpoints.
    mitigation: Prioritize event sources with stable signals first, build replay and fallback queues into every connector, and price initial pilots with integration support included.
  - name: Incumbent platform bundling
    description: Customs software vendors or horizontal browser-automation platforms could add basic pause-resume features once the category proves valuable.
    mitigation: Win on deep case-state modeling, trade-specific audit workflows, and cross-system reliability data that horizontal platforms will struggle to collect early.
