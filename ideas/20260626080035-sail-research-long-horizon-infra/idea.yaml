problem: >-
  Customs brokers and import-ops teams still staff large exception desks because a single entry can wait on customer
  documents, carrier updates, CBP responses, or portal retries across hours or days. Today's automation stacks either
  keep browser and model workers alive while nothing is happening or hand work off through brittle RPA timers and manual
  queues. That makes agent economics unattractive precisely in the workflows where autonomy would save the most labor and
  creates weak audit trails when cases bounce between humans, bots, and inboxes.
targetUser:
  primary: CTO or head of automation at a U.S. customs brokerage or freight-tech platform modernizing import-entry exception handling
  secondary: VP operations or branch operations leader responsible for entry throughput, broker productivity, and service-level compliance
  buyer: CTO, COO, or GM of customs brokerage operations
startupThesis:
  nonObviousInsight: >-
    The breakthrough in long-horizon agents is not that models got smarter; it is that suspend-on-idle infrastructure
    finally makes wait-state-heavy workflows economical. Customs exception handling is mostly bursts of reasoning between
    long periods of waiting on portals, emails, EDI messages, and human approvals, so the winning runtime is the one
    that can checkpoint and resume reliably rather than the one with the lowest millisecond latency.
  beachhead: >-
    U.S. customs brokerages and freight-tech import teams processing 5,000-50,000 monthly ocean and air entries, where
    agents must resolve missing-document, tariff-code, carrier-status, and customs-hold exceptions across ACE, carrier
    portals, and shipper email threads over 1-3 day case lifecycles
  wedge: >-
    An event-driven runtime that checkpoints browser state, tool context, and case memory whenever an entry stalls, then
    wakes the agent only when an email, portal update, EDI event, or human approval arrives—billing on active compute
    instead of wall-clock time and returning a full case-level audit trail
  whyNowCatalyst: >-
    Sail's verified suspend-on-idle architecture and 10x cost proof make long-running agent workflows commercially viable
    now for back-office operations that were previously too wait-state-heavy to automate end to end.
  ventureScalePath: >-
    Start with customs entry exceptions, expand into freight-claims handling, duty-drawback casework, export-control
    reviews, and other trade-compliance workflows, then become the default pause-resume operating layer for any
    enterprise agent workflow whose lifecycle is measured in hours or days instead of seconds.
solution: >-
  The product is a checkpointed agent runtime plus case orchestration layer built for asynchronous operations workflows.
  It wraps browser sessions, document parsing, model calls, and inbox actions into a single resumable case record that
  can sleep safely between events without losing state. When a carrier portal changes status, a customer replies with a
  missing commercial invoice, or an internal broker approves a classification decision, the runtime wakes the exact case
  context and routes the next action to the right model, browser worker, or human reviewer. Teams get a dashboard that
  shows active versus sleeping cases, per-case compute cost, exception aging, and replayable audit logs for every
  decision and handoff.
goToMarketSeed:
  firstCustomer: >-
    COO or CTO at a U.S. customs brokerage handling 10,000+ monthly import entries across ocean and air freight, already
    experimenting with browser automation or offshore exception queues and seeing too many cases stall in email and
    portal wait states
  buyingTrigger: >-
    Peak-season backlog, a missed service-level agreement on entry release, or a failed automation pilot that reveals the
    firm is paying people or always-on bots to babysit exceptions between sporadic external updates
  currentAlternative: Manual entry writers and offshore operations teams supported by UiPath-style RPA, always-on Playwright workers, shared inbox queues, and spreadsheets
  switchingReason: >-
    The runtime cuts cost on long-lived cases because it sleeps between events, survives portal and inbox wait states
    without brittle timers, and gives operations leaders a case-by-case audit trail they do not get from ad hoc bot
    scripts.
  pricingHypothesis: >-
    Annual platform fee by broker branch or operations hub plus usage-based pricing per active case-hour and per resumed
    case, aligned to labor savings and faster entry release.
