market:
  tam:
    value: $225.0M
    rationale: >-
      Estimate using NCBFAA membership as a conservative proxy for addressable customs and freight operators. NCBFAA represents more than 1,500 member companies handling more than 97 percent of U.S. entries. At a mature multi-workflow contract value of roughly $150k per company, TAM is about $225M.
    isEstimate: true
    sourceRefs:
      - 7
      - 13
      - 14
      - 15
  sam:
    value: $43.5M
    rationale: >-
      Estimate using current U.S. entry flow. CBP processed more than 2.9M entry summaries in January 2025, or about 34.8M annualized. Dividing by a 10k entry per month target-hub average inside the beachhead band implies about 290 high-volume hubs. At $150k initial ACV per hub, SAM is about $43.5M.
    isEstimate: true
    sourceRefs:
      - 6
  som:
    value: $4.8M
    rationale: >-
      Estimate using 40 year-three hubs or logos at a $120k blended ACV after starting with one exception workflow and expanding gradually inside each account.
    isEstimate: true
    sourceRefs:
      - 13
      - 20
      - 35
