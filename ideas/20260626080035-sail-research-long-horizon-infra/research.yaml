      impact: negative
      point: Many teams still rely on phone coordination, PDFs, and legacy habits, so trust and change management remain real adoption hurdles.
      sourceRefs:
        - 19
    - factor: technological
      impact: positive
      point: Checkpointed sandboxes, durable workflows, external events, and persistent browser sessions have matured enough to make a wait-state-native runtime practical.
