openQuestions:
  - What percentage of entry volume at a typical 10k per month brokerage actually becomes a multi-day exception that benefits from sleep and wake semantics?
  - Which external events are the most reliable wake signals in production such as ACE status changes, inbox replies, document uploads, or carrier portal updates?
  - How much of the buyer budget sits with customs operations leadership versus enterprise automation or IT platform teams?
  - Will customers tolerate a new runtime layer if it does not initially replace existing customs-suite screens and operator habits?
