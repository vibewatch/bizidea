competitors:
  - name: Sail Research
    stage: scale-up
    wedge: Long-horizon AI infrastructure with active-compute billing, Sailboxes, and throughput-optimized inference for agents that run for hours or days.
    pricing: $0.03 used vCPU-hour plus observed RAM and disk usage for Sailboxes
    strength: Strongest proof that idle-wait economics for long-running agents can be improved materially with pause and resume infrastructure.
    weaknessVsUs: Horizontal compute and sandbox layer rather than a customs-native case system with broker supervision logic and workflow-specific audit trails.
    sourceRefs:
      - 1
      - 2
      - 3
      - 4
      - 5
  - name: Temporal
    stage: incumbent
    wedge: Durable execution platform with replay, timers, signals, and workflow observability for long-running distributed applications.
    pricing: $100 per month Essentials, $500 per month Business, enterprise custom
    strength: Mature, battle-tested durability model and timer semantics that fit multi-day waits and callbacks well.
    weaknessVsUs: Requires customers or integrators to build customs connectors, browser handling, case UX, and broker-grade controls themselves.
    sourceRefs:
      - 26
      - 27
      - 28
      - 29
  - name: LangGraph
    stage: scale-up
    wedge: Agent-native framework with checkpoints, interrupts, and memory for resilient stateful agent workflows.
    pricing: Open-source core, managed platform terms not clearly public in cited docs
    strength: Good fit for builders who want thread-level persistence and human-in-the-loop checkpoints around agent logic.
    weaknessVsUs: Framework orientation still leaves the customer responsible for customs domain modeling, portal events, and operating controls.
    sourceRefs:
      - 24
      - 25
  - name: UiPath
    stage: incumbent
    wedge: Long-running automation with Action Center tasks, queues, and orchestration across bots and human approvals.
    pricing: Custom or enterprise pricing
    strength: Credible human-in-the-loop and suspension-resumption model inside a broad enterprise automation suite.
    weaknessVsUs: Robot and process orientation is broader and heavier than a purpose-built customs exception runtime with case-level sleep economics.
    sourceRefs:
      - 35
      - 36
  - name: CargoWise Customs
    stage: incumbent
    wedge: Customs and compliance suite that reuses shipment and ISF data to generate entries and automate declaration workflows.
    pricing: Custom or enterprise pricing
    strength: Deep customs data model and existing operator workflow footprint make it a natural system of record in the brokerage stack.
    weaknessVsUs: Does not center on autonomous pause-resume browser and inbox work across multi-day exception lifecycles.
    sourceRefs:
      - 13
