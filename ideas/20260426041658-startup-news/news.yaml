signals:
  - title: Workflow-completing AI is now the main product race
    summary: Model vendors are competing on task execution, coding, research, and multi-tool workflow completion rather than on chat alone.
    sourceRefs: [18, 10, 12, 11]
  - title: AI is moving into built-in interfaces
    summary: Dictation, ephemeral sharing, social networking, and feed digestion are being embedded into device-level or channel-native interfaces.
    sourceRefs: [11, 16, 17, 9]
  - title: Compute economics are shifting toward agent workloads
    summary: Large AI customers are optimizing for cheaper CPUs, custom silicon, and inference-heavy workloads as agents become more common.
    sourceRefs: [13, 12, 10]
  - title: Security and governance are becoming core product constraints
    summary: Breaches and safety incidents show that AI toolchains, environment variables, and law-enforcement escalation paths now need productized controls.
    sourceRefs: [19, 1, 8]
  - title: Managed labor and services marketplaces are scaling
    summary: Indian house-help startups are raising larger rounds because customers are clearly spending on managed service delivery.
    sourceRefs: [5, 6]
  - title: Climate and energy startups may have a public-market path again
    summary: IPO activity and restructuring in energy-adjacent startups suggest the capital markets are reopening selectively for the sector.
    sourceRefs: [2, 14]
  - title: AI consolidation is accelerating in vertical and regional markets
    summary: Mergers and acquisitions are clustering around sovereign AI, agent workflow, and enterprise integration niches.
    sourceRefs: [3, 15, 20]
  - title: Consumer products are fragmenting into narrow, high-retention use cases
    summary: New launches focus on low-pressure social sharing, niche digests, and purpose-built messaging rather than broad feeds.
    sourceRefs: [16, 17, 9]
