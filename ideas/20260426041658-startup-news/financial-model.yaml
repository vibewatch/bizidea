modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Leads[Target accounts] --> Pilots[Paid pilots]
      Pilots --> Production[Production customers]
      Production --> Seats[Paid engineer seats + protected environments]
      Seats --> Revenue[Subscription revenue]
      Revenue --> GrossProfit[70% gross profit]
      GrossProfit --> Cash[Runway and financing]
modelSanity:
  - checkName: "Revenue engine"
    finding: "Base-case revenue is driven by 34 production customers by Q4Y3 and blended ACV expansion from $60K land deals to $110K multi-environment accounts."
  - checkName: "Must go right"
    finding: "Paid pilots need to convert near the plan's 60%+ target so Y2 ends with 10-15 production customers before the company adds heavier GTM spend."
  - checkName: "Model breaks if"
    finding: "A one-quarter sales-cycle slip plus earlier customer-VPC hiring pushes the downside case slightly below zero cash before Y3 operating leverage shows up."
  - checkName: "Next-round proof"
    finding: "The seed story is strongest once onboarding is standardized and 10-15 production customers prove this is a repeatable cross-vendor control-plane category rather than bespoke services."
sanityChecks:
  ruleOf40: "Y3 growth 252.3% + EBITDA margin -11.8% = 240.5%; directionally strong but inflated by the small Y2 base."
  burnMultiple: "Improves from ~1.1x in Y2 (burn $1.12M / net new ARR ~$0.99M) to ~0.1x in Y3 as account expansion begins to absorb fixed cost."
  revenuePerFte: "$291K Y3 on average 9.25 FTE (benchmark $200–400K SaaS)."
  flags:
    - "Base case assumes the startup wins despite high substitute pressure from GitHub, Vercel, PAM, and secrets vendors noted in research."
    - "The model only turns quarterly EBITDA positive in Q4Y3, so a seed round is still likely before broader connector or customer-VPC expansion."
    - "Y3 ACV expansion to $110K requires successful upsell of protected environments and evidence workflows, not just more seats."
