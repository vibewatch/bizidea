scenarios:
  downside:
    description: Native controls feel good enough for more prospects, stretching sales cycles by one quarter and capping expansion.
    y3RevenueK: 1845.0
    y3EbitdaK: -846.0
    cashLowPointK: -120.0
    keyAssumptionChanges:
      - Y3 blended ACV stays at $90K instead of $110K.
      - Pilot-to-production conversion drops toward 50%.
      - Customer-VPC work pulls one engineering hire forward into H2Y2.
  base:
    description: Founder-led pilots convert into production on the plan timeline, with ACV expanding as environments and evidence workflows are added.
    y3RevenueK: 2695.0
    y3EbitdaK: -318.2
    cashLowPointK: 642.6
    keyAssumptionChanges:
      - 3 paying customers by M12, 13 by Q4Y2, and 34 by Q4Y3.
      - ACV expands from $60K in Y1 to $90K in Y2 and $110K in Y3.
      - Team stays lean until repeatable onboarding is visible.
  upside:
    description: Strong design-partner references and one partner channel compress the path from pilot to rollout and pull multi-environment upsell forward.
    y3RevenueK: 3305.0
    y3EbitdaK: 132.0
    cashLowPointK: 790.0
    keyAssumptionChanges:
      - Y3 customer count reaches 40 instead of 34.
      - Y3 blended ACV reaches $115K through faster environment and evidence upsell.
      - Hiring stays unchanged because onboarding standardization improves services leverage.
