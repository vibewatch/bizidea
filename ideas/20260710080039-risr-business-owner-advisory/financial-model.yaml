slug: founder-succession-gap-os
date: '2026-07-10'
currency: USD
modelStartMonth: 2026-08
assumptions:
- id: A1
  name: Model start month
  value: 2026-08
  unit: YYYY-MM
  source: '[BP date 2026-07-10] the financial model starts in the first full month after the dated business plan.'
- id: A2
  name: Opening cash / pre-seed raise
  value: $3.0M
  unit: USD
  source: '[BP fundingAsk targetFundingRangeUsd $2–4M + BP fundingAsk runwayMonths 18 + model cash curve] the base case uses a midpoint raise that still carries the company through the 12–24 month milestone plus roughly six additional months of buffer.'
- id: A3
  name: Starting paying customers
  value: '0'
  unit: count
  source: '[BP milestones 0–12 months] the company starts pre-revenue and must first win paid pilots.'
- id: A4
  name: Customer definition
  value: One paying centralized planning desk in a paid pilot or annual production contract
  unit: definition
  source: '[BP businessModel.unitOfValue + BP gtm.pricing] customersEop counts paying desks, not individual founder households.'
- id: A5
  name: Paid pilot economics
  value: $45K over 90 days (~$15.0K/mo)
  unit: USD per desk
  source: '[BP gtm.pricing $30k-$60k pilot + BP investorMemo.firstCustomer.initialContract] the model uses the midpoint of the pilot range.'
- id: A6
  name: Annual production desk economics
  value: $180K annual desk subscription + about $45K of engagement fees = ~$225K ARR (~$18.75K/mo)
  unit: USD per desk per year
  source: '[BP gtm.pricing $150k-$200k annual desk subscription plus $1k-$2k per active engagement + Research market blended deployment value ~$216k] the base case uses a slightly-above-research blend once a desk is fully active.'
- id: A7
  name: Customer ramp
  value: 2 paying desks by M12, 6 by Q4Y2, then 11 / 17 / 24 / 30 by Q1 / Q2 / Q3 / Q4Y3
  unit: customersEop
  source: '[BP milestones 0-12, 12-24, 24-36 months + BP market.som 20-30 active customers] the model lands at the top end of the BP year-3 logo range.'
- id: A8
  name: Revenue recognition convention
  value: Each new desk bills at pilot pricing for 3 months, then converts to ~$18.75K monthly production value; Q4Y3 still includes six desks in pilot.
  unit: formula
  source: '[BP wedge 90-day pilot + BP investorMemo.firstCustomer.initialContract + model cohort schedule] revenue is the sum of pilot desks and converted annual desks.'
- id: A9
  name: Gross margin ramp
  value: About 45% on first pilots, 58%-65% through Y2, and 67%-72% through Y3 for ~70.2% annual gross margin in Y3
  unit: gross margin percent
  source: '[BP businessModel.targetGrossMarginPct 70 + BP operations + Research technologyLandscape] early delivery is implementation-heavy before connector reuse and repeatable checklists normalize margins.'
- id: A10
  name: Hiring timeline
  value: M1 founder/CEO, founding eng, and product lead; M4 solutions; M8 partnerships; M13 eng2; M16 solutions2; M19 sales2; M20 ops; M22 eng3; M27 solutions3; M30 sales3; M31 eng4
  unit: timeline
  source: '[BP team + BP strategicChoices.sequencingRationale + startup-finance heuristic] scale hires arrive only after pilot proof and first implementation lessons.'
- id: A11
  name: Founder / CEO loaded compensation
  value: $180.0K
  unit: USD per year
  source: '[BP team Founder/CEO + startup-finance heuristic] lean founder cash compensation with payroll taxes and benefits.'
- id: A12
  name: Engineering loaded compensation
  value: $202.8K per FTE
  unit: USD per year
  source: '[BP team founding eng + startup-finance heuristic] reflects senior workflow and integration engineering talent.'
- id: A13
  name: Planning-domain product loaded compensation
  value: $190.8K
  unit: USD per year
  source: '[BP team planning-domain product lead + startup-finance heuristic] the role blends domain expertise, implementation design, and product ownership.'
- id: A14
  name: Solutions / implementation loaded compensation
  value: $171.6K per FTE
  unit: USD per year
  source: '[BP team solutions engineer + startup-finance heuristic] assumes enterprise onboarding and workflow configuration talent, not partner-level consulting compensation.'
- id: A15
  name: Sales / partnerships loaded compensation
  value: $214.8K per FTE
  unit: USD per year
  source: '[BP team partnerships lead + startup-finance heuristic] includes variable comp, travel, and enterprise field-selling load.'
- id: A16
  name: G&A / ops loaded compensation
  value: $132.0K
  unit: USD per year
  source: '[BP fundingAsk.useOfFundsSummary + startup-finance heuristic] covers lean finance, compliance, and vendor-management operations.'
- id: A17
  name: Payroll allocation to P&L lines
  value: Founder 50% S&M / 20% R&D / 30% G&A; engineering 100% R&D; product 80% R&D / 20% G&A; solutions 35% S&M / 65% R&D; sales 100% S&M; ops 100% G&A
  unit: allocation
  source: '[BP team role rationales + BP operations] maps headcount cost into functional lines without double counting payroll.'
- id: A18
  name: Non-payroll opex ramp
  value: S&M grows from $6K to $22K/mo, R&D from $8K to $20K/mo, and G&A from $8K to $18K/mo across the 36-month model
  unit: USD per month
  source: '[BP operations + BP gtm.channels + Research regulatoryLandscape + startup-finance heuristic] spend covers cloud, travel, security/compliance tooling, insurance, and legal.'
- id: A19
  name: Cash conversion convention
  value: EBITDA approximates cash movement
  unit: formula
  source: '[startup-finance heuristic] taxes, debt service, and working-capital timing are assumed immaterial at pre-seed scale.'
- id: A20
  name: Normalized monthly churn for unit economics
  value: 1.6%
  unit: percent per month
  source: '[startup-finance heuristic for sticky enterprise workflow SaaS + BP expansionLevers] desks should be sticky once embedded, but the model does not assume zero attrition.'
- id: A21
  name: CAC convention
  value: $167.6K of Y1-Y2 sales and marketing spend per first-wave production customer
  unit: USD per customer
  source: '[model calc using Y1-Y2 S&M spend divided by 6 production customers at Q4Y2 + BP funnelTargets] this is intentionally conservative because it uses the hardest early cohort.'
- id: A22
  name: Next-round milestone for funding sizing
  value: 6 production platform customers, 750+ cumulative audits, benchmark dashboards plus core connectors live, and 20% partner-sourced qualified pipeline
  unit: milestone
  source: '[BP milestones 12-24 months + BP fundingAsk.useOfFundsSummary + BP operatingAssumptions partner channel] this is the seed-ready proof package the pre-seed must finance.'
- id: A23
  name: Quarterly salary convention
  value: Y2-Y3 salary rows sum actual monthly hires inside each quarter rather than only using quarter-end snapshots
  unit: convention
  source: '[Headcount column convention + BP team.startTiming] this keeps payroll consistent with the monthly hiring ramp.'
- id: A24
  name: Net-customer modeling convention
  value: Row-level customersEop is a net paying-desk count; normalized churn is used for LTV math rather than explicit fractional logo churn in the base rows.
  unit: convention
  source: '[startup-finance heuristic + BP mustBeTrue conversion focus] early enterprise contracts are annual and logo counts remain small integers in the operating model.'
- id: A25
  name: Funding buffer convention
  value: Pre-seed sizing leaves about $0.67M of cash at Q4Y2 versus roughly $0.46M of modeled burn across the next six months
  unit: cash buffer
  source: '[model calc + BP fundingAsk runwayMonths 18] the round is sized to reach the 12-24 month milestone with roughly six months of additional runway.'
