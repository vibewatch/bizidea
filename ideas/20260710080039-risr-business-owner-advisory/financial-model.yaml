scenarios:
  downside:
    description: Partner referrals arrive later, desk expansion stays usage-light, and implementation remains more bespoke than planned.
    y3RevenueK: 3047.5
    y3EbitdaK: -825.0
    cashLowPointK: -220.1
    keyAssumptionChanges:
    - Q4Y3 customersEop reaches 23 instead of 30 because pilot-to-annual conversion stays closer to 120 days and partner-sourced pipeline materializes later.
    - Mature desk value settles nearer ~$210K ARR instead of ~$225K because buyers cap paid engagement volume and land smaller cohorts.
    - Y3 gross margin stays in the high-60s rather than the modeled ~70% annual level because implementation and data normalization remain more manual.
  base:
    description: Base case follows the BP path of two paid pilots in year 1, six production customers by Q4Y2, and a 30-desk paying footprint by Q4Y3 at roughly $6.5M exit ARR.
    y3RevenueK: 3896.3
    y3EbitdaK: -181.9
    cashLowPointK: 171.2
    keyAssumptionChanges:
    - customersEop moves from 2 at M12 to 6 at Q4Y2 and 30 at Q4Y3, with the last six desks still in paid pilot at year-end.
    - Each new desk contributes ~$45K over a 90-day pilot and then about ~$225K ARR from a ~$180K desk subscription plus engagement fees.
    - Gross margin rises from ~45% on the first pilots to ~72% in Q4Y3, yielding about 70% annual gross margin in Y3.
  upside:
    description: Referenceable logos and CPA / specialist channels compress the sales cycle, allowing faster desk adds and slightly better monetization.
    y3RevenueK: 4420.5
    y3EbitdaK: 231.6
    cashLowPointK: 333.6
    keyAssumptionChanges:
    - Q4Y3 customersEop reaches 33 instead of 30 because partner-sourced opportunities become a real second acquisition motion by late Y2.
    - Mature desk value reaches roughly ~$234K ARR as more founder households convert into paid successor-readiness engagements.
    - Gross margin exits around 73% because connector reuse and implementation playbooks reduce direct delivery work faster than planned.
sensitivity:
- variable: ARPU
  downsideCase: Mature desk value settles near ~$210K ARR.
  baseCase: Mature desk value reaches about ~$225K ARR from subscription plus usage fees.
  upsideCase: Benchmark and engagement expansion lift mature desk value toward ~$234K ARR.
  y3RevenueImpactK: -193.8
  cashImpactK: -176.9
- variable: CAC
  downsideCase: Enterprise selling needs about 25% more field time, travel, and solutioning, pushing CAC toward roughly ~$210K.
  baseCase: CAC stays near roughly ~$168K using Y1-Y2 S&M spend divided by the first six production customers.
  upsideCase: Warm platform and CPA introductions keep CAC closer to ~$150K.
  y3RevenueImpactK: 0.0
  cashImpactK: -304.2
- variable: churn
  downsideCase: Normalized monthly churn rises toward 2.5% as some pilots fail to expand into broader annual use.
  baseCase: Normalized monthly churn holds near 1.6% once the workflow is embedded in the centralized planning desk.
  upsideCase: Normalized monthly churn stays near 1.0% because audit trails and specialist handoffs make the system sticky.
  y3RevenueImpactK: -160.4
  cashImpactK: -137.0
- variable: sales cycle
  downsideCase: Pilot-to-annual conversion drifts toward 120 days and Q4Y3 ends closer to 23 paying desks.
  baseCase: The first desks convert in about 90 days and the company reaches 30 paying desks by Q4Y3.
  upsideCase: Referenceability and channel referrals compress conversion toward 60-75 days and pull adds forward.
  y3RevenueImpactK: -776.3
  cashImpactK: -546.3
- variable: gross margin
  downsideCase: Y3 margin stays roughly three points below plan because onboarding remains too bespoke.
  baseCase: Gross margin reaches roughly 70% annualized in Y3 and about 72% in Q4Y3.
  upsideCase: Structured implementations and connector reuse lift Y3 margin about two points above plan.
  y3RevenueImpactK: 0.0
  cashImpactK: -116.9
- variable: hiring pace
  downsideCase: The final solutions, sales, and engineering hires are pulled forward by one quarter before proof points are locked in.
  baseCase: Scale hires arrive only after pilots convert and benchmark dashboards / connectors are in market.
  upsideCase: The last scale hires wait until referenceability is clear without slowing customer delivery.
  y3RevenueImpactK: 0.0
  cashImpactK: -147.3
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Accounts[Target RIAs / wealth platforms] --> Pilots[90-day paid pilots]
      Pilots --> Desks[Annual desk subscriptions]
      Desks --> Usage[Per-engagement fees]
      Desks --> Revenue[Revenue]
      Usage --> Revenue
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash]
modelSanity:
- checkName: Revenue engine
  finding: Base revenue comes from scaling from 2 paying desks at M12 to 30 by Q4Y3 while each mature production desk settles near ~$225K ARR.
- checkName: Must go right
  finding: The model needs roughly 90-day pilot-to-annual conversion plus a real partner-assisted pipeline by late Y2, or the jump from 6 to 30 paying desks slips materially.
- checkName: Model breaks if
  finding: If desk value stays closer to ~$210K ARR and Q4Y3 paying desks stall near 23, the downside case drives cash below zero before the company reaches scale.
- checkName: Next-round proof
  finding: The seed story is six production customers, 750+ audits, benchmark dashboards and connectors live, and at least ~$0.7M of cash still on hand at the Q4Y2 milestone.
sanityChecks:
  ruleOf40: Y3 growth 260.8% + EBITDA margin -4.7% = 256.1% (inflated by the small Y2 base, so treat it as directional rather than mature-SaaS quality).
  burnMultiple: Y2 burn multiple is about 1.5x using roughly $1.32M of EBITDA burn against about $0.90M of net new exit ARR; Q3Y3 reaches breakeven and Q4Y3 is cash-generative.
  revenuePerFte: $300K Y3 on 13 ending FTE (inside the $200-400K vertical SaaS benchmark for vertical B2B SaaS).
  flags:
  - The jump from 6 paying desks at Q4Y2 to 30 at Q4Y3 is aggressive and depends on partner / specialist channels becoming real, not merely promising.
  - customersEop includes paid pilots and annual production desks, so recurring-only production count trails the headline paying count during ramp periods.
  - Gross margin only reaches the BP target if CRM/data connectors and implementation checklists materially reduce bespoke work; messy customer data could keep margins in the mid-60s.
  - Cash is modeled as EBITDA, so billing timing, implementation prepayments, and slower enterprise procurement can move the real cash curve.
  - The SAM is concentrated in a few hundred enterprise-style wealth platforms, so one or two delayed platform deals can move Y2 bookings and the timing of the next round materially.
