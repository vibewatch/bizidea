problem: 独立财富平台都在抢企业主客户，但非上市企业的接班规划，今天依旧靠零散会议、表格和四处分派的专家转介来做。多数企业主会把真正困难的交接决定一拖再拖，接班人又常以为计划早就有了，结果顾问要等到退休、疾病或出售把时间线压缩，才看见真正卡点。这既伤企业主结果，也让顾问公司没法把高价值的规划服务产品化，规模化覆盖几百个客户关系。
targetUser:
  primary: 美国独立财富平台里负责企业主规划和集中规划团队的负责人
  secondary: 服务创始人主导型下中端市场公司的首席顾问
  buyer: 独立财富平台里负责企业主解决方案、集中规划或顾问技术的负责人
startupThesis:
  nonObviousInsight: 预算起点正在从企业主个人转向顾问平台。财富公司现在要的是一套软件，把专家型的接班工作工业化，铺到大量创始人客户上。最有杠杆的切口不是全套退出规划，而是一套可重复的企业主/接班人差距盘点，先把交接准备究竟卡在哪找出来。
  beachhead: 美国独立财富平台里的企业主规划团队，向年收入 $5M-$50M、由创始人主导、预计 5 年内会做家族或内部交接，且企业主年龄在 55 岁以上的公司提供年度接班准备度复盘。
  wedge: 一套双边的企业主/接班人诊断，把交接准备度打分，找出没对齐的地方，再翻成顾问认可的估值、税务、治理和保险任务清单。
  whyNowCatalyst: 具名财富平台部署，加上年长企业主交接潮，已经把创始人接班从精品咨询推成一个明确的软件采购品类。
  ventureScalePath: 先从独立财富平台的接班准备度盘点切入，再扩成完整的企业主交接操作系统，覆盖估值更新、流动性规划、遗产与税务流程、专家转介，以及 CPA 事务所、区域银行和下中端市场并购顾问等相邻渠道。
solution: 产品先让顾问平台在年度企业主复盘前，跑一轮结构化的企业主/接班人评估。它会采集接班意愿、角色准备度、估值假设、交接时点、关键人风险、治理缺口，以及缺失的税务或遗产工作。软件随后生成准备度评分、优先级行动清单，以及给估值、税务、保险和信托专家的转介任务，让一个集中规划团队能同时服务几十个创始人家庭。时间一长，它会变成顾问平台里企业主交接规划的事实记录系统。
goToMarketSeed:
  firstCustomer: 一家美国独立财富平台的企业主解决方案负责人；平台拥有集中规划团队、80-300 名顾问，以及 50-200 个 55 岁以上的创始人家庭。
  buyingTrigger: 公司会在年度复盘季之前启动或集中化企业主顾问业务，却不想为一批越来越多的年长创始人客户再养一支庞大的专家团队，于是需要一套统一做法。
  currentAlternative: 人工摸底会议、表格问卷、CRM 备注，以及转介给精品退出规划、估值、税务或遗产专家。
  switchingReason: 它能让一个集中规划团队在 50-200 个创始人家庭上跑统一的准备度盘点，挖出可计费的规划工作，还能在不自建完整接班团队的前提下，交付更锋利的行动清单。
  pricingHypothesis: 对集中规划团队收年度平台费，再按活跃的企业主交接项目收单次参与费。
