jobsToBeDone:
- job: 当一位 55 岁以上的创始人客户表示，家人或内部管理者可能接班时，帮集中规划团队跑一套统一的接班准备度复盘，好在危机逼出仓促决定之前，就先给出交接行动清单。
  currentAlternative: 顾问在会议里自己做前期摸底、发表格问卷，再找精品退出规划顾问。
  successMetric: 从启动到行动清单的天数，以及转介给专家之前就识别出的必需交接任务占比。
- job: 当财富平台想把企业主这个细分业务铺到更多顾问上时，帮业务负责人看清下一批家庭里哪些需要估值、税务或接班工作，好把规划收入和客户留存一起拉上去。
  currentAlternative: CRM 备注、人工客户书复盘和零散专家转介。
  successMetric: 每季度完成复盘的企业主家庭数，以及每个创始人家庭转化出的规划工作比例。
ideaScorecard:
  signalStrength:
    score: 4
    rationale: 三个相互印证的来源同时给出具名买家部署、人口结构压力和围绕这条工作流形成的明确预算。
  painIntensity:
    score: 4
    rationale: 接班规划一旦失手，企业主价值和顾问信任都会受损；尤其当退休或疾病把时间线突然压缩时更严重。
  wedgeClarity:
    score: 5
    rationale: 在年度企业主复盘之前，先做企业主/接班人准备度盘点——这是一个很具体的首发产品和采购动作。
  defensibility:
    score: 3
    rationale: 初期护城河来自工作流渗透和专有的交接基准数据，但表层功能仍可能被现有厂商或顾问复制。
  ventureScale:
    score: 4
    rationale: 同一套工作流可以从财富平台扩到银行、CPA 事务所、并购顾问，以及相邻的估值或流动性产品。
topRisks:
- name: 服务化蔓延
  description: 顾问公司仍可能希望最难的接班工作继续由人工专家完成，纯软件渗透就会被卡住。
  mitigation: 让产品只盯住准备度诊断和工作流编排，把复杂税务或法律工作交给合作专家。
- name: 企业级财富销售偏慢
  description: 独立财富平台采购新工作流系统时很谨慎，往往要跨多个顾问团队证明价值。
  mitigation: 先卖给拥有 50-200 个创始人家庭的集中规划团队，跑可量化试点，把 ROI 锚在规划收入和产能提升上。
- name: 顾问边界责任风险
  description: 接班规划会碰到法律、税务和估值等议题，软件生成的输出很容易触发合规顾虑。
  mitigation: 把平台定位成顾问审核后的工作流基础设施，提供清晰的专家交接、审计轨迹和可配置免责声明。
