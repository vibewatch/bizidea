differentiator: 大多数财富科技产品停在 CRM 备注或通用理财规划上，精品退出规划公司又太依赖服务，难以铺满整个顾问网络。这个产品抓的是结构化的企业主到接班人差距数据，并把它翻成可重复的估值、税务、治理和流动性工作流。案例一多，系统就能按公司画像和顾问分群，对交接卡点做基准比较，沉淀出有防守力的规划数据资产。
