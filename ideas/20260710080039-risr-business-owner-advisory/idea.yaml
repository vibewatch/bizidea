jobsToBeDone:
  - job: >-
      When a founder client aged 55+ says a family member or internal leader
      may take over, help the centralized planning desk run a consistent
      successor-readiness review, so they can deliver a transfer action plan
      before a crisis forces a rushed decision.
    currentAlternative: Advisor-led discovery in meetings, spreadsheet questionnaires, and boutique exit-planning consultants
    successMetric: Days from kickoff to action plan and percentage of required transfer tasks identified before specialist referral
  - job: >-
      When a wealth platform wants to monetize a business-owner niche across
      many advisors, help practice leaders identify which households need
      valuation, tax, or succession work next, so they can grow planning
      revenue and client retention.
    currentAlternative: CRM notes, manual book reviews, and ad hoc specialist referrals
    successMetric: Business-owner households reviewed per quarter and planning-work conversion per founder household
ideaScorecard:
  signalStrength:
    score: 4
    rationale: Three corroborating sources show a named buyer deployment, demographic urgency, and explicit budget formation around this workflow.
  painIntensity:
    score: 4
    rationale: Failed succession planning can destroy owner value and advisory trust, especially when timelines collapse around retirement or illness.
  wedgeClarity:
    score: 5
    rationale: An owner-and-successor readiness audit before annual business-owner reviews is a concrete first product and buying motion.
  defensibility:
    score: 3
    rationale: The initial moat is workflow adoption and proprietary transition benchmark data, but surface features can be copied by incumbents or consultants.
  ventureScale:
    score: 4
    rationale: The same workflow can expand from wealth platforms into banks, CPA firms, M&A advisors, and adjacent valuation or liquidity products.
topRisks:
  - name: Services creep
    description: Advisory firms may still expect human specialists to do the hardest succession work, limiting pure-software adoption.
    mitigation: Keep the product focused on readiness diagnostics and workflow orchestration, then hand off complex tax or legal work to partner specialists.
  - name: Slow enterprise wealth sales
    description: Independent wealth platforms buy new workflow systems cautiously and often require proof across multiple advisor teams.
    mitigation: Sell into centralized planning desks with 50-200 founder households, run a measurable pilot, and anchor ROI on planning revenue and capacity gains.
  - name: Advice-boundary liability
    description: Succession planning touches legal, tax, and valuation topics where software-generated outputs could create compliance concerns.
    mitigation: Position the platform as advisor-approved workflow infrastructure with clear specialist handoffs, audit trails, and configurable disclaimers.
