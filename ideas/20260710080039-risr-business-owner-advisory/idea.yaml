problem: >-
  Independent wealth platforms are chasing entrepreneur clients, but succession
  planning for privately held businesses is still delivered through ad hoc
  meetings, spreadsheets, and scattered specialist referrals. Most owners delay
  hard transfer decisions, and successors often believe a plan exists when it
  does not, leaving advisors blind to the real blockers until retirement,
  illness, or a sale compresses the timeline. That hurts founder outcomes and
  prevents advisory firms from productizing a high-value planning service
  across hundreds of relationships.
targetUser:
  primary: Heads of business-owner planning and centralized planning desks at U.S. independent wealth platforms
  secondary: Lead advisors serving founder-led lower-middle-market companies
  buyer: Head of business-owner solutions, centralized planning, or advisor technology at an independent wealth platform
startupThesis:
  nonObviousInsight: >-
    The initial budget is moving from the business owner to the advisory
    platform. Wealth firms now want software that industrializes specialist
    succession work across many founder relationships, and the highest-leverage
    wedge is not full exit planning but a repeatable owner-and-successor gap
    audit that surfaces where transfer readiness is actually broken.
  beachhead: >-
    Annual successor-readiness reviews for owners aged 55+ of $5M-$50M revenue
    founder-led companies who expect a family or internal transfer within five
    years, sold through centralized business-owner planning teams at U.S.
    independent wealth platforms.
  wedge: >-
    A dual-sided owner and successor diagnostic that scores transfer readiness,
    exposes alignment gaps, and turns them into advisor-approved valuation,
    tax, governance, and insurance task plans.
  whyNowCatalyst: >-
    Named wealth-platform deployments plus the aging-owner transfer wave have
    turned founder succession from boutique consulting into an explicit
    software-buying category.
  ventureScalePath: >-
    Start with successor-readiness audits for independent wealth platforms, then
    expand into a full owner-transition operating system spanning valuation
    refreshes, liquidity planning, estate and tax workflows, specialist
    referrals, and adjacent distribution into CPA firms, regional banks, and
    lower-middle-market M&A advisors.
solution: >-
  The product starts with a structured owner-and-successor assessment that an
  advisory platform can run before an annual business-owner review. It captures
  successor intent, role readiness, valuation assumptions, transfer timing,
  key-person risk, governance gaps, and missing tax or estate work. The
  software then generates a readiness score, a prioritized action plan, and
  referral tasks for valuation, tax, insurance, and trust specialists, so one
  centralized planning desk can support dozens of founder households at once.
  Over time it becomes the system of record for business-owner transition
  planning across the advisory platform.
goToMarketSeed:
  firstCustomer: >-
    Head of business-owner solutions at a U.S. independent wealth platform with
    a centralized planning desk, 80-300 advisors, and 50-200 founder
    households aged 55+.
  buyingTrigger: >-
    The firm launches or centralizes a business-owner advisory practice before
    annual review season and needs a consistent way to serve a growing cohort
    of aging founder clients without hiring a large specialist team.
  currentAlternative: >-
    Manual discovery meetings, spreadsheet questionnaires, CRM notes, and
    referrals to boutique exit-planning, valuation, tax, or estate specialists.
  switchingReason: >-
    It lets one centralized desk run consistent readiness audits across 50-200
    founder households, uncover billable planning work, and deliver sharper
    action plans without building a full in-house succession team.
  pricingHypothesis: >-
    Annual platform fee for the centralized planning desk plus a per-active
    business-owner transition engagement fee.
