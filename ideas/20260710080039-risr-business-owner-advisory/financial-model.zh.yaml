slug: founder-succession-gap-os
date: '2026-07-10'
currency: USD
modelStartMonth: 2026-08
assumptions:
- id: A1
  name: 模型起始月
  value: 2026-08
  unit: YYYY-MM
  source: '[BP date 2026-07-10] 财务模型从商业计划日期后的第一个完整月份起算。'
- id: A2
  name: 期初现金 / 种子前融资
  value: $3.0M
  unit: USD
  source: '[BP fundingAsk targetFundingRangeUsd $2–4M + BP fundingAsk runwayMonths 18 + model cash curve] 基准情形取 $3.0M 融资中位数，这样既能跑到 12–24 个月里程碑，又能再多留大约 6 个月缓冲。'
- id: A3
  name: 期初付费客户数
  value: '0'
  unit: 数量
  source: '[BP milestones 0–12 months] 公司从零收入起步，必须先拿下付费试点。'
- id: A4
  name: 客户定义
  value: 一个处于付费试点或年度正式合同中的付费集中规划团队
  unit: 定义
  source: '[BP businessModel.unitOfValue + BP gtm.pricing] customersEop 统计的是付费规划团队，不是单个创始人家庭。'
- id: A5
  name: 付费试点单价
  value: 90 天 $45K（约 $15.0K/月）
  unit: 美元/团队
  source: '[BP gtm.pricing $30k-$60k pilot + BP investorMemo.firstCustomer.initialContract] 模型取试点区间中位数。'
- id: A6
  name: 年度正式团队合同单价
  value: $180K 年度团队订阅 + 约 $45K 项目费 = 约 $225K ARR（约 $18.75K/月）
  unit: 美元/团队/年
  source: '[BP gtm.pricing $150k-$200k annual desk subscription plus $1k-$2k per active engagement + Research market blended deployment value ~$216k] 基准情形假设团队完全跑起来后，单客年值会略高于研究里的混合水平。'
- id: A7
  name: 客户爬坡节奏
  value: 第 12 个月 2 个付费团队，第二年第四季度 6 个，第三年第一/二/三/四季度分别到 11 / 17 / 24 / 30 个
  unit: customersEop
  source: '[BP milestones 0-12, 12-24, 24-36 months + BP market.som 20-30 active customers] 模型最后落在商业计划第 3 年客户数量区间的上沿。'
- id: A8
  name: 收入确认口径
  value: 每个新团队先按 3 个月试点价计费，之后转成每月约 $18.75K 的正式价值；到 Q4Y3 仍有 6 个团队处在试点期。
  unit: 公式
  source: '[BP wedge 90-day pilot + BP investorMemo.firstCustomer.initialContract + model cohort schedule] 收入等于试点团队和已转年度合同团队两部分之和。'
- id: A9
  name: 毛利率爬坡
  value: 首批试点约 45%，第二年在 58%-65%，第三年在 67%-72%，对应 Y3 全年毛利率约 70.2%
  unit: 毛利率百分比
  source: '[BP businessModel.targetGrossMarginPct 70 + BP operations + Research technologyLandscape] 早期交付会更偏实施，直到连接器复用和可复制清单把毛利率拉顺。'
- id: A10
  name: 招聘时间线
  value: M1 创始人/CEO、创始工程师和规划领域产品负责人；M4 解决方案；M8 合作伙伴；M13 第二名工程师；M16 第二名解决方案；M19 第二名销售；M20 运营；M22 第三名工程师；M27 第三名解决方案；M30 第三名销售；M31 第四名工程师
  unit: 时间线
  source: '[BP team + BP strategicChoices.sequencingRationale + startup-finance heuristic] 只有试点验证信号和首批实施教训都跑出来后，规模化招聘才会进场。'
- id: A11
  name: 创始人 / CEO 全成本薪酬
  value: $180.0K
  unit: 美元/年
  source: '[BP team Founder/CEO + startup-finance heuristic] 创始人现金薪酬保持精简，但包含薪资税和福利。'
- id: A12
  name: 工程全成本薪酬
  value: $202.8K / FTE
  unit: 美元/年
  source: '[BP team founding eng + startup-finance heuristic] 体现的是资深工作流与集成工程人才的成本。'
- id: A13
  name: 规划领域产品全成本薪酬
  value: $190.8K
  unit: 美元/年
  source: '[BP team planning-domain product lead + startup-finance heuristic] 这个岗位同时承担领域方法论、实施设计和产品所有权。'
- id: A14
  name: 解决方案 / 实施全成本薪酬
  value: $171.6K / FTE
  unit: 美元/年
  source: '[BP team solutions engineer + startup-finance heuristic] 假设需要的是企业上线和工作流配置能力，而不是合伙人级咨询薪酬。'
- id: A15
  name: 销售 / 合作伙伴全成本薪酬
  value: $214.8K / FTE
  unit: 美元/年
  source: '[BP team partnerships lead + startup-finance heuristic] 含浮动薪酬、差旅和企业外勤销售负担。'
- id: A16
  name: 行政 / 运营全成本薪酬
  value: $132.0K
  unit: 美元/年
  source: '[BP fundingAsk.useOfFundsSummary + startup-finance heuristic] 覆盖精简的财务、合规和供应商管理运营。'
- id: A17
  name: 薪酬在 P&L 科目间的分摊
  value: 创始人 50% 计入销售营销 / 20% 计入研发 / 30% 计入行政；工程 100% 计入研发；产品 80% 计入研发 / 20% 计入行政；解决方案 35% 计入销售营销 / 65% 计入研发；销售 100% 计入销售营销；运营 100% 计入行政
  unit: 分摊比例
  source: '[BP team role rationales + BP operations] 把人力成本映射进职能科目，同时避免重复计入。'
- id: A18
  name: 非薪酬运营开支爬坡
  value: 36 个月内，销售营销从 $6K/月 增到 $22K/月，研发从 $8K/月 增到 $20K/月，行政从 $8K/月 增到 $18K/月
  unit: 美元/月
  source: '[BP operations + BP gtm.channels + Research regulatoryLandscape + startup-finance heuristic] 覆盖云服务、差旅、安全/合规工具、保险和法务支出。'
- id: A19
  name: 现金转换口径
  value: 用 EBITDA 近似现金变动
  unit: 公式
  source: '[startup-finance heuristic] 在 pre-seed 规模下，税、债务和营运资金时点影响都假设不大。'
- id: A20
  name: 单位经济模型的标准化月流失率
  value: 1.6%
  unit: 百分比/月
  source: '[startup-finance heuristic for sticky enterprise workflow SaaS + BP expansionLevers] 团队一旦嵌进集中规划流程，留存应当较高，但模型不假设零流失。'
- id: A21
  name: CAC 口径
  value: 以前两年销售营销支出除以前 6 个正式客户，单客约 $167.6K
  unit: 美元/客户
  source: '[model calc using Y1-Y2 S&M spend divided by 6 production customers at Q4Y2 + BP funnelTargets] 这个口径刻意偏保守，因为它按最难打的首批客户群计算。'
- id: A22
  name: 用于融资额度测算的下一轮里程碑
  value: 6 个正式平台客户、750+ 次累计盘点、基准看板和核心连接器上线，以及 20% 的伙伴来源合格商机
  unit: 里程碑
  source: '[BP milestones 12-24 months + BP fundingAsk.useOfFundsSummary + BP operatingAssumptions partner channel] 这是种子轮就绪前，pre-seed 必须买出来的验证包。'
- id: A23
  name: 季度薪资口径
  value: 第二、三年的薪资行按季度内真实的月度招聘累加，而不是只看季度末快照
  unit: 口径
  source: '[Headcount column convention + BP team.startTiming] 这样能让薪资和逐月招聘节奏对齐。'
- id: A24
  name: 净客户数建模口径
  value: 行级 customersEop 统计的是净付费规划团队数；标准化流失率只用于 LTV 计算，不在基准行里显式写成小数 logo churn。
  unit: 口径
  source: '[startup-finance heuristic + BP mustBeTrue conversion focus] 早期企业合同按年签，logo 数在运营模型里保持小整数更合理。'
- id: A25
  name: 融资缓冲口径
  value: 种子前阶段会在 Q4Y2 留下约 $0.67M 现金，对上后续 6 个月约 $0.46M 的建模烧钱
  unit: 现金缓冲
  source: '[model calc + BP fundingAsk runwayMonths 18] 这一轮融资的大小，目标是撑到 12–24 个月里程碑后，再多留约 6 个月跑道。'
