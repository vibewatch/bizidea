scenarios:
  downside:
    description: 伙伴转介来得更晚，团队扩张的使用量偏轻，实施也比计划更定制化。
    y3RevenueK: 3047.5
    y3EbitdaK: -825.0
    cashLowPointK: -220.1
    keyAssumptionChanges:
    - Q4Y3 的 customersEop 只能到 23 而不是 30，因为试点转年度合同更接近 120 天，伙伴带来的线索也更晚才成形。
    - 成熟团队价值停在约 $210K ARR，而不是 ~$225K，因为买家压低了付费项目量，首批团队规模也更小。
    - Y3 毛利率停在 60% 高段，而不是模型里的全年约 70%，因为实施和数据标准化仍更依赖人工。
  base:
    description: 基准情形沿着 BP 路径走：第 1 年 2 个付费试点，Q4Y2 做到 6 个正式客户，Q4Y3 扩到 30 个付费规划团队，期末 ARR 约 $6.5M。
    y3RevenueK: 3896.3
    y3EbitdaK: -181.9
    cashLowPointK: 171.2
    keyAssumptionChanges:
    - customersEop 会从 M12 的 2 个走到 Q4Y2 的 6 个，再到 Q4Y3 的 30 个；其中最后 6 个团队在年末仍处于付费试点期。
    - 每个新团队先在 90 天试点里贡献约 $45K，之后再靠约 $180K 的团队订阅加项目费，爬到约 $225K ARR。
    - 毛利率从首批试点的约 45% 抬到 Q4Y3 的约 72%，对应 Y3 全年约 70% 毛利率。
  upside:
    description: 可拿来背书的 logo 和 CPA / 专家渠道压缩了销售周期，让团队扩张更快，单客变现也略好。
    y3RevenueK: 4420.5
    y3EbitdaK: 231.6
    cashLowPointK: 333.6
    keyAssumptionChanges:
    - Q4Y3 的 customersEop 会到 33 而不是 30，因为伙伴来源机会在 Y2 后期就长成了真实的第二获客动作。
    - 成熟团队价值会到约 $234K ARR，因为更多创始人家庭转成了付费接班准备度项目。
    - 期末毛利率接近 73%，因为连接器复用和实施手册比计划更快压缩了直接交付工作。
sensitivity:
- variable: ARPU
  downsideCase: 成熟团队价值收在约 $210K ARR。
  baseCase: 订阅加使用费之后，成熟团队价值约为 $225K ARR。
  upsideCase: 基准与项目扩张把成熟团队价值抬到约 $234K ARR。
  y3RevenueImpactK: -193.8
  cashImpactK: -176.9
- variable: CAC
  downsideCase: 企业销售需要多出约 25% 的外勤时间、差旅和方案支持，CAC 会推到约 $210K。
  baseCase: CAC 维持在约 $168K，口径是前两年销售营销支出除以前 6 个正式客户。
  upsideCase: 平台和 CPA 的熟人引荐，让 CAC 更接近 $150K。
  y3RevenueImpactK: 0.0
  cashImpactK: -304.2
- variable: 流失率
  downsideCase: 标准化月流失率抬到约 2.5%，因为部分试点没能扩成更大范围的年度使用。
  baseCase: 一旦工作流嵌进集中规划团队，标准化月流失率维持在约 1.6%。
  upsideCase: 由于审计轨迹和专家交接把系统钉得更深，标准化月流失率维持在约 1.0%。
  y3RevenueImpactK: -160.4
  cashImpactK: -137.0
- variable: 销售周期
  downsideCase: 试点转年度合同拖到约 120 天，Q4Y3 只能做到约 23 个付费规划团队。
  baseCase: 首批团队约 90 天就能转成年度合同，公司在 Q4Y3 做到 30 个付费规划团队。
  upsideCase: 可引用案例和渠道转介把转化压到 60-75 天，并把新增团队提前。
  y3RevenueImpactK: -776.3
  cashImpactK: -546.3
- variable: 毛利率
  downsideCase: Y3 毛利率比计划低约 3 个点，因为上线实施仍然太定制。
  baseCase: Y3 年化毛利率约 70%，Q4Y3 约 72%。
  upsideCase: 结构化实施和连接器复用，把 Y3 毛利率拉到比计划高约 2 个点。
  y3RevenueImpactK: 0.0
  cashImpactK: -116.9
- variable: 招聘节奏
  downsideCase: 最后几名解决方案、销售和工程招聘在验证信号锁定前就提前了一个季度。
  baseCase: 规模化招聘只在试点转化、基准看板/连接器已经进市场之后才启动。
  upsideCase: 最后几名规模化招聘等到参考案例足够清晰后才进场，但不会拖慢客户交付。
  y3RevenueImpactK: 0.0
  cashImpactK: -147.3
modelDiagram:
  title: 单位经济模型流程图
  mermaid: |
    flowchart LR
      Accounts[Target RIAs / wealth platforms] --> Pilots[90-day paid pilots]
      Pilots --> Desks[Annual desk subscriptions]
      Desks --> Usage[Per-engagement fees]
      Desks --> Revenue[Revenue]
      Usage --> Revenue
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash]
modelSanity:
- checkName: 收入引擎
  finding: 基准收入引擎，来自把 M12 的 2 个付费规划团队一路放大到 Q4Y3 的 30 个，同时成熟正式团队价值稳定在约 $225K ARR。
- checkName: 必须做对的事
  finding: 模型必须跑对两件事：试点约 90 天就能转年合同，以及到 Y2 后期真的出现伙伴辅助线索；否则 6 到 30 个付费团队这段跳跃会明显打滑。
- checkName: 模型失效的临界点
  finding: 如果团队价值更接近 $210K ARR，且 Q4Y3 的付费规划团队卡在 23 个左右，下行情形会在公司做大前把现金打到零以下。
- checkName: 下一轮融资的证明
  finding: 能讲种子轮故事的验证结果是：6 个正式客户、750+ 次盘点、基准看板和连接器都上线，而且到 Q4Y2 账上还剩至少约 $0.7M 现金。
sanityChecks:
  ruleOf40: Y3 增速 260.8% + EBITDA 利润率 -4.7% = 256.1%（主要是 Y2 基数太小，所以只能当方向感，不代表成熟 SaaS 质量）。
  burnMultiple: Y2 burn multiple 约 1.5x：约 $1.32M 的 EBITDA 烧钱，对上约 $0.90M 的净新增期末 ARR；到 Q3Y3 打平，Q4Y3 开始转正产现金。
  revenuePerFte: Y3 以 13 名期末 FTE 计，人均收入约 $300K（落在垂直 B2B SaaS 常见的 $200-400K 区间）。
  flags:
  - Q4Y2 的 6 个付费规划团队到 Q4Y3 的 30 个，爬坡很激进，前提是伙伴/专家渠道真的变成现实，而不只是看起来有希望。
  - customersEop 同时包含付费试点和年度正式团队，所以在爬坡期，纯正式订阅团队数会落后于表面上的付费团队数。
  - 只有当 CRM/数据连接器和实施清单真能明显压缩定制工作，毛利率才摸得到 BP 目标；客户数据一脏，毛利率可能一直卡在 60% 中段。
  - 现金按 EBITDA 建模，所以计费时点、实施预付款和更慢的企业采购都可能让真实现金曲线偏移。
  - SAM 集中在几百家企业级财富平台里，因此只要有一两单平台交易延后，Y2 订单和下一轮融资时点就会明显受影响。
