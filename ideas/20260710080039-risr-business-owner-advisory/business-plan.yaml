slug: "founder-succession-gap-os"
date: "2026-07-10"
executiveSummary: >-
  Founder Succession Gap OS should start as the successor-readiness workflow for
  U.S. independent wealth platforms that already serve founder households but
  still run succession work through meetings, spreadsheets, and scattered
  specialists. The first buyer is the head of business-owner solutions or
  centralized planning at an 80-300 advisor platform with 50-200 founder
  households aged 55+ and a mandate to deepen planning revenue before annual
  review season. The product should not try to replace valuation, tax, or legal
  specialists; it should standardize the owner-and-successor audit, generate
  prioritized task plans, and route cases into existing experts with audit
  trails. That wedge is attractive because the buying trigger, delivery team,
  pricing basis, and first proof point all line up around one centralized desk
  trying to cover more founder households without hiring a full in-house
  succession bench. Research-backed sizing suggests a roughly $257.3M TAM,
  $54.0M beachhead SAM, and $6.3M year-3 SOM if the company stays focused on
  enterprise-scale RIAs rather than selling horizontally to every advisor. The
  strongest evidence is that OnePoint BFG has already budgeted for
  business-owner planning software and public advisor-tech pricing supports
  software ACVs in the low-to-mid six figures. The main reason for caution is
  that RISR and adjacent planning suites already occupy nearby budget lines, so
  the startup must prove that owner-successor alignment data and workflow
  conversion create distinct value rather than a feature. A material evidence
  gap remains around pricing and packaging preferences plus successor-side
  participation rates, so the first year must validate pilot-to-annual
  conversion and questionnaire completion before scaling hiring or channel
  expansion.
problem:
  - "Independent wealth platforms chasing entrepreneur clients still deliver succession planning through manual discovery meetings, spreadsheets, and specialist referrals, so they cannot run a consistent review across dozens or hundreds of founder households."
  - "Owners and successors are often misaligned on whether a real transfer plan exists, which means advisors discover governance, valuation, tax, and readiness gaps only after retirement, illness, or a sale compresses the timeline."
  - "Current alternatives either require expensive in-house advanced-planning benches or generic planning software that does not create a repeatable owner-successor workflow or benchmark dataset."
solution:
  - "Run a structured owner-and-successor readiness audit before annual business-owner reviews, capturing transfer intent, successor commitment, valuation assumptions, governance gaps, key-person risk, and missing tax or estate work in one workflow."
  - "Generate a readiness score, prioritized action plan, and tracked specialist handoffs so one centralized planning desk can support 50-200 founder households without pretending the software itself replaces legal, tax, insurance, or valuation experts."
  - "Turn completed audits and follow-on task outcomes into a benchmark layer that shows which households, successor types, and referral paths convert into real planning work fastest."
whyWeWin:
  - "The startup is narrower than RISR or broad advanced-planning suites: it starts with owner-successor alignment, the specific dataset current tools do not clearly own, instead of trying to win the whole business-owner planning stack on day one."
  - "The product fits how platform buyers already want to buy: a centralized-desk workflow that increases planning depth and capacity without forcing a rip-and-replace of CRM, tax, or valuation tools."
  - "Every deployment compounds proprietary data on misalignment patterns, task completion, referral conversion, and timeline slippage, creating benchmarking value that generic planning tools and services-heavy firms are less likely to capture."
strategicChoices:
  beachhead: "Annual successor-readiness reviews for owners aged 55+ of $5M-$50M revenue founder-led companies expecting a family or internal transfer within five years, sold through centralized business-owner planning teams at U.S. independent wealth platforms."
  wedgeRationale: "This narrow entry point creates faster proof than broad exit-planning software because the customer already has a centralized team, a known founder cohort, and an annual review cycle that can absorb a diagnostic workflow. Selling horizontally to all advisors or trying to manage every sale, recapitalization, and estate use case would lengthen implementation, blur ROI, and increase overlap with incumbents."
  sequencingRationale: "Start with the audit, action plan, and specialist handoff workflow because those are the lowest-friction pieces that can prove capacity lift and planning-work conversion without crossing into advice delivery. Build benchmark reporting, deeper integrations, and partner channels only after two or three desks show repeatable pilot conversion, then expand into broader transition modules and adjacent channels."
  notYet:
    - "Direct-to-owner or self-serve SMB products"
    - "External sale or full M&A process management before the internal or family-transfer wedge is repeatable"
    - "In-house certified valuation, tax, or legal services"
    - "Small RIAs without centralized planning desks"
market:
  tam: >-
    $257.3M estimated TAM based on roughly 1,191 enterprise-scale SEC-registered
    advisers or platforms that could support about $216k of annual spend for a
    specialized business-owner planning workflow.
  sam: >-
    $54.0M estimated SAM based on about 250 U.S. independent wealth platforms or
    RIAs with explicit advanced-planning or business-owner motions at roughly
    $216k blended annual deployment value.
  som: >-
    $6.3M modeled year-3 SOM based on 30 active customers at roughly $210k
    blended ARR after pilot-to-platform land-and-expand pricing.
  segments:
    - "Primary: U.S. independent wealth platforms and RIA aggregators with 80-300 advisors, centralized planning desks, and 50-200 founder households aged 55+."
    - "Secondary: CPA-adjacent advisory networks, regional banks, and lower-middle-market deal or advisory channels that can reuse the same successor-readiness workflow after the RIA beachhead is proven."
  buyingProcess: >-
    The day-to-day champion is usually the head of business-owner solutions or a
    centralized planning lead, while the economic buyer is typically the
    executive who owns advisor technology or the business-owner practice P&L.
    Deals should be triggered by a practice launch, annual review season, or a
    visible founder-transition backlog, then pass technology, compliance, and
    advanced-planning review because the system touches customer data and
    specialist handoffs.
product:
  mvp: >-
    MVP covers one centralized desk and one founder cohort: owner and successor
    questionnaires, readiness scoring, action-plan templates, specialist
    handoff tracking, and benchmark-ready reporting exported into existing CRM
    and planning workflows. It excludes full valuation automation, direct owner
    self-service, and autonomous tax or legal recommendations.
  sixMonth: "Launch 2 design-partner deployments with configurable readiness questionnaires, manual-plus-structured specialist handoffs, CRM export, basic benchmark reporting, and a median time-to-action-plan target under 14 days."
  twelveMonth: "Convert at least 2 paid pilots into annual subscriptions, ship production connectors for CRM plus tax-return or accounting-data intake, and add dashboarding for household throughput, successor completion, and planning-work conversion."
  twentyFourMonth: "Expand from the audit wedge into a broader transition operating system with valuation refreshes, liquidity and governance work queues, external collaborator permissions, and multi-desk rollouts across the first customer cohort."
  keyBets:
    - "Successor-side participation can be collected at scale without damaging owner trust or slowing engagement kickoff."
    - "A centralized desk can attribute enough new valuation, tax, governance, or insurance work to the audit to justify six-figure annual software spend."
    - "A small initial integration set of CRM plus tax-return or accounting intake is enough to win the first 2-3 deals."
    - "Incumbents and in-house teams will not immediately neutralize the wedge once buyer conversations focus on alignment benchmarks and workflow conversion."
gtm:
  wedge: "Sell a 90-day successor-readiness pilot to a centralized planning desk before annual review season, start with 20-40 founder households already expected to transfer internally or within the family, and prove faster action-plan delivery plus higher conversion into specialist planning work."
  channels:
    - "Founder-led direct enterprise sales to heads of business-owner solutions, centralized planning leaders, and advisor-technology executives at larger RIAs and wealth platforms"
    - "Warm introductions through advisor peer groups, advanced-planning communities, and succession-planning education ecosystems already serving this buyer set"
    - "Selective CPA and tax-specialist co-sell relationships after the first design partner, used to source founder households and strengthen the buyer's specialist network rather than as the initial platform acquisition channel"
  funnelTargets: "Target account→qualified discovery 25-35%; qualified discovery→paid pilot 25-35%; paid pilot→annual production 50%+; first production desk→second team, region, or founder cohort expansion 40%+ within 12 months."
  pricing: >-
    Start with a $30k-$60k paid pilot for one centralized desk and an initial
    cohort of 20-40 founder households, then convert to a $150k-$200k annual
    desk subscription plus roughly $1k-$2k per active successor-readiness or
    transition engagement. This keeps the first purchase inside a planning or
    advisor-technology budget while preserving a blended ACV near the
    researched ~$210k level once the desk is actively using the workflow.
businessModel:
  revenueStreams:
    - "Annual subscription for one centralized business-owner planning desk"
    - "Usage or engagement fees for active founder-household transition workflows"
    - "Premium benchmarking, pipeline analytics, and external collaborator modules"
    - "Limited onboarding and workflow-configuration fees"
  unitOfValue: "One centralized planning desk running active founder-household successor-readiness engagements"
  targetGrossMarginPct: 70
  expansionLevers:
    - "Increase the number of founder households and advisor teams managed inside an existing platform"
    - "Add benchmark reporting, specialist-network management, and external collaborator workflow once the audit is embedded"
    - "Expand from RIAs into CPA-affiliated advisory channels, regional banks, and lower-middle-market advisory ecosystems using the same data model"
strategyMap:
  northStarMetric: "Number of founder households per quarter that complete a successor-readiness audit and launch at least one approved action-plan workstream within 30 days."
  inputMetrics:
    - "Qualified platform accounts with 50+ founder households aged 55+ and a named review-season or practice-launch trigger"
    - "Median days from household kickoff to advisor-approved action plan"
    - "Successor questionnaire completion rate for enrolled households"
    - "Percent of audited households that open at least one specialist workstream within 90 days"
    - "Paid pilot-to-annual conversion rate"
    - "Expansion rate from first desk deployment to second team, region, or cohort"
  moatsToBuild:
    - "Cross-platform dataset on owner-successor misalignment, blocker patterns, and eventual workstream outcomes"
    - "Workflow telemetry on which valuation, tax, insurance, and governance referrals convert fastest by company profile"
    - "Implementation playbooks and benchmark reviews that make the centralized desk more valuable over time instead of acting as one-off consulting"
  killCriteria:
    - "If fewer than 3 of the first 10 qualified platform buyers agree to a paid pilot, the buying trigger or packaging is too weak."
    - "If successor completion stays below 60% or owner continuation drops below 80% in the first 25 pilot households, the dual-sided audit is too intrusive for the wedge."
    - "If fewer than 50% of paid pilots convert to annual contracts or blended ACV stays below $150k, the platform-budget thesis is not strong enough."
    - "If fewer than 25% of audited households generate a tracked specialist workstream within 90 days, the ROI case is too thin to scale."
  mermaid: |
    flowchart LR
      Wedge[Centralized desk readiness audit] --> MVP[Owner-successor diagnostic workflow]
      MVP --> Proof[Action-plan conversion and benchmark data]
      Proof --> Expansion[Platform expansion and adjacent channels]
investorMemo:
  verdict:
    call: "Meet / investigate further"
    conviction: "Worth a first meeting because the buyer trigger and budget line are real, but conviction depends on proving the successor-alignment wedge is distinct from RISR and adjacent planning suites."
    whyBelieve: "Named wealth-platform deployments, public pricing anchors, and clear centralized-desk pain support a credible software-buying motion around business-owner succession workflow."
    whyDoubt: "The best visible incumbent already sits close to the workflow, so weak successor participation or easy feature replication could collapse the startup into a thin add-on."
    nextDiligence: "Confirm that 2-3 platforms will pay for a successor-readiness pilot and that at least 1 converts into a $150k+ annual desk subscription with measurable workstream conversion."
  firstCustomer:
    title: "Head of business-owner solutions at a U.S. independent wealth platform"
    profile: "An 80-300 advisor platform with a centralized planning desk, 50-200 founder households aged 55+, and a goal to deepen entrepreneur planning coverage without hiring a large in-house succession bench."
    trigger: "The firm launches or centralizes a business-owner practice ahead of annual review season and realizes its current mix of meetings, spreadsheets, and specialist referrals cannot cover the founder backlog consistently."
    buyer: "Head of business-owner solutions or advisor technology"
    initialContract: "A $30k-$60k paid pilot for one centralized desk and 20-40 founder households, converting to a $150k-$200k annual desk subscription plus per-active-engagement fees once the pilot proves faster action-plan delivery, 60%+ successor completion, and visible specialist-work conversion."
  mustBeTrue:
    - "At least 3 of the first 10 qualified platform buyers with centralized desks will fund a paid pilot."
    - "The first 25 pilot households will reach 60%+ successor questionnaire completion while keeping owner continuation above 80%."
    - "At least 25% of audited households will open a tracked valuation, tax, governance, or insurance workstream within 90 days."
    - "At least half of paid pilots will convert into $150k+ annual subscriptions with blended ACV trending toward roughly $200k."
    - "In at least 4 of the first 6 serious evaluations, buyers will state that their current stack does not already deliver a repeatable owner-successor alignment workflow or benchmark layer."
  diligenceQuestions:
    - "Do buyers prefer a centralized-desk subscription plus per-engagement pricing, or will they force the product into seat-based advisor pricing?"
    - "How much successor-side data can be collected before owner trust or household response rates break?"
    - "Why can RISR, FP Alpha, or an internal advanced-planning bench not add a good-enough version of this workflow inside an existing budget line?"
    - "What metric actually closes the annual deal: planning revenue, founder-household coverage, retention, or specialist coordination time saved?"
    - "Which integration is the true blocker in the first deal cycle: CRM, tax-return ingestion, accounting data, or financial-planning software?"
operatingAssumptions:
  - assumption: "Platform buyers will prefer a centralized-desk subscription plus per-engagement pricing over pure seat-based advisor pricing."
    basis: research.yaml
    validationTest: "Run 5 packaging conversations and 2 side-by-side pilot proposals; at least 3 buyers should choose desk-plus-usage pricing."
    decisionImpact: "If false, reprice around seats, lower initial ACV expectations, and reassess whether the beachhead still supports the modeled SAM and SOM."
  - assumption: "Successor-side questionnaires can reach useful completion rates without damaging owner relationships."
    basis: research.yaml
    validationTest: "In the first 25 pilot households, achieve 60%+ successor completion and keep owner continuation above 80%."
    decisionImpact: "If false, narrow the MVP to owner-side readiness plus human-assisted successor interviews, which weakens the core differentiation."
  - assumption: "The audit will generate enough follow-on planning work to justify six-figure annual software spend by the platform."
    basis: idea.yaml
    validationTest: "Show that at least 25% of audited households open one tracked workstream within 90 days and that 2 buyers cite that conversion in the renewal case."
    decisionImpact: "If false, position the product around retention and process control instead of new planning revenue, or reduce pricing expectations materially."
  - assumption: "A lightweight connector set of CRM plus tax-return or accounting intake is sufficient for the first 2-3 wins."
    basis: research.yaml
    validationTest: "Close 2 pilots without mandatory full planning-suite integrations and deliver the first action plan within 21 days of kickoff."
    decisionImpact: "If false, implementation burden and capital needs rise, so integration sequencing must move ahead of channel expansion."
  - assumption: "CPA and tax collaborators will create a useful second-order referral channel after the first RIA design partners are live."
    basis: research.yaml
    validationTest: "Run 3 co-selling experiments with CPA or tax partners and secure 5 qualified founder-household introductions with 40%+ intro-to-audit conversion."
    decisionImpact: "If false, keep distribution concentrated on internal platform books and delay partner-hiring plans."
experimentRoadmap:
  - horizon: "0–90 days"
    experiment: "Interview 12-15 heads of business-owner solutions, centralized planning leads, and advisor-technology buyers at larger RIAs."
    hypothesis: "The strongest purchase trigger is review-season capacity pressure at a centralized desk, not generic interest in business-owner advice."
    successMetric: "At least 8 interviews cite a current founder backlog or review-season trigger and at least 3 agree to scope a paid pilot."
    owner: "Founder/CEO"
  - horizon: "0–90 days"
    experiment: "Run a concierge successor-readiness audit on 15 founder households with one design-partner desk."
    hypothesis: "A structured dual-sided questionnaire plus advisor review can reach usable completion and produce action plans faster than the desk's current workflow."
    successMetric: "60%+ successor completion, median action-plan turnaround under 14 days, and positive desk feedback versus the manual baseline."
    owner: "Planning-domain product lead"
  - horizon: "0–90 days"
    experiment: "Test two pricing packages: desk-plus-usage versus seat-based advisor pricing."
    hypothesis: "Centralized desks will prefer a platform budget construct over broad seat rollout in the first year."
    successMetric: "At least 3 of 5 pricing conversations choose desk-plus-usage or accept it as the preferred renewal structure."
    owner: "Founder/CEO"
  - horizon: "90–180 days"
    experiment: "Ship CRM export plus one tax-return or accounting-data intake connector and launch 2 paid pilots."
    hypothesis: "The first buyers will purchase with a narrow connector set if the audit and action-plan workflow solves the coverage problem."
    successMetric: "2 pilots go live, first action plan delivered within 21 days, and no deal is lost solely for missing a broad planning-suite integration."
    owner: "Founding eng"
  - horizon: "90–180 days"
    experiment: "Track pilot conversion into specialist workstreams and benchmark review meetings."
    hypothesis: "Platforms will renew when the product shows measurable conversion into valuation, tax, governance, or insurance work rather than only nicer reporting."
    successMetric: "At least 25% of audited households open a tracked workstream within 90 days and 1 pilot converts to annual production."
    owner: "Solutions engineer"
  - horizon: "180–360 days"
    experiment: "Run 3 CPA or tax-partner co-sell trials tied to live platform customers."
    hypothesis: "CPA-adjacent partners will expand founder-household pipeline and strengthen the platform buyer's specialist network."
    successMetric: "5 qualified founder-household introductions and at least 2 resulting completed audits sourced through partner referrals."
    owner: "Partnerships lead"
operations:
  - "Maintain a standard implementation checklist for CRM, tax-return, and accounting-data ingestion so the first desk can onboard without custom consulting every time."
  - "Build a vetted network of valuation, tax, estate, insurance, and trust specialists with clear referral statuses, turnaround expectations, and feedback loops."
  - "Operate with Reg S-P aligned permissions, audit logging, service-provider reviews, and incident-response playbooks because the product holds sensitive business-owner information."
  - "Run quarterly benchmark reviews with each centralized desk covering household throughput, successor completion, workstream conversion, and unresolved blockers."
team:
  - role: "Founder/CEO"
    startTiming: "Month 0"
    rationale: "Needed to sell directly into heads of business-owner solutions, shape pricing, and secure early design partners in a concentrated buyer market."
  - role: "Founding eng"
    startTiming: "Month 0"
    rationale: "Owns the workflow engine, permissions model, and first CRM plus data-ingestion connectors that determine whether pilots stay software-like."
  - role: "Planning-domain product lead"
    startTiming: "Month 1"
    rationale: "Translates succession methodology into questionnaires, readiness scoring, and specialist handoff templates without turning the company into a services shop."
  - role: "Solutions engineer"
    startTiming: "Month 4"
    rationale: "Reduces enterprise onboarding friction, configures the first desks, and captures proof that the workflow converts into annual subscriptions."
  - role: "Partnerships lead"
    startTiming: "Month 8"
    rationale: "Owns CPA and specialist-network relationships only after the direct motion and pilot metrics are working."
milestones:
  - horizon: "0–12 months"
    items:
      - "Close 2 design partners and 2 paid pilots with validated desk-plus-usage pricing."
      - "Complete the first 100 founder-household audits with 60%+ successor completion and median action-plan turnaround under 14 days."
      - "Convert at least 1 pilot into an annual subscription and prove that 25%+ of audited households open a tracked specialist workstream within 90 days."
      - "Finish the initial security, permissions, and audit-log baseline required for enterprise advisor-tech diligence."
  - horizon: "12–24 months"
    items:
      - "Reach 6 production platform customers and more than 750 cumulative audited founder households."
      - "Launch benchmark dashboards, external specialist collaboration, and standardized CRM plus financial-data connectors."
      - "Show that partner-sourced founder-household introductions or platform opportunities contribute at least 20% of qualified pipeline."
  - horizon: "24–36 months"
    items:
      - "Reach 20-30 active platform customers at roughly the modeled $6.3M year-3 ARR outcome."
      - "Expand beyond the audit wedge into broader transition operating-system modules for valuation refresh, liquidity planning, and governance tracking."
      - "Launch the first adjacent-channel pilots in CPA-affiliated advisory networks, regional banks, or lower-middle-market advisory ecosystems using the same readiness data model."
risks:
  - risk: "Incumbents such as RISR or adjacent advanced-planning suites add a good-enough successor checklist before the startup builds a differentiated dataset."
    likelihood: "Medium"
    impact: "High"
    mitigation: "Stay focused on dual-sided alignment benchmarks, referral telemetry, and workflow proof that are harder to bolt onto a generic planning surface."
  - risk: "The workflow becomes services-heavy because buyers still expect humans to do most of the succession work."
    likelihood: "High"
    impact: "High"
    mitigation: "Constrain the product to diagnostics, action plans, and tracked handoffs, then template implementation so specialist expertise stays outside the software boundary."
  - risk: "Enterprise wealth-platform sales cycles and integration reviews take longer than planned."
    likelihood: "Medium"
    impact: "High"
    mitigation: "Sell into centralized desks with an immediate review-season trigger, keep required integrations narrow, and use paid pilots to compress proof-of-value."
  - risk: "Successor participation rates remain too low to support the dual-sided moat."
    likelihood: "Medium"
    impact: "Medium"
    mitigation: "Test human-assisted successor outreach, optional phased questionnaires, and owner-approved invite flows before locking the roadmap around full successor data."
  - risk: "Data-privacy and advice-boundary concerns delay procurement or constrain product claims."
    likelihood: "Medium"
    impact: "High"
    mitigation: "Position the software as controlled workflow infrastructure with audit logs, configurable disclaimers, specialist review steps, and clear service-provider controls."
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2–4M"
  runwayMonths: 18
  useOfFundsSummary: "Fund 18 months of product and security build-out, hire the domain, implementation, and GTM roles needed for 2-3 design partners, and prove pilot-to-annual conversion plus the first specialist and CPA channel loops."
