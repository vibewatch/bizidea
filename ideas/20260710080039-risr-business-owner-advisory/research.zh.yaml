  fiveForces:
    supplierPower:
      score: 3
      rationale: 产品依赖集成、外部税务/遗产专家和规划栈上下文，但上游系统和服务伙伴并不止一家，所以供应方有影响力，却不构成单点卡脖子。
      sourceRefs:
      - 17
      - 18
      - 19
      - 23
      - 30
      - 38
    buyerPower:
      score: 4
      rationale: 最有吸引力的买家就是一小撮更大体量的 RIA 和平台渠道；他们下单前完全可以比较内部团队、相邻软件和人工专家流程。
      sourceRefs:
      - 4
      - 5
      - 38
      - 39
    threatOfEntrants:
      score: 3
      rationale: 工作流软件本身不难搭，但信任、企业主数据和“顾问真能把准备度工作转成收入和结果”的验证，会构成不小的执行门槛。
      sourceRefs:
      - 16
      - 20
      - 23
      - 24
      - 25
      - 26
    threatOfSubstitutes:
      score: 4
      rationale: 即便这些选择更慢、也更难复制，买家仍可以把 CPA、律师、估值专家、表格和内部高阶规划团队拼起来应付。
      sourceRefs:
      - 12
      - 30
      - 35
      - 38
    competitiveRivalry:
      score: 4
      rationale: 直接的企业主工具、高阶规划套件、方法论网络和内部规划团队，都在从相邻环节切这条工作流，所以定位必须足够窄、足够清楚。
      sourceRefs:
      - 20
      - 27
      - 31
      - 35
      - 38
  pestle:
  - factor: 政治
    impact: negative
    point: 数据隐私和事件响应要求收紧，抬高了面向顾问工作流厂商的尽调门槛。
    sourceRefs:
    - 40
  - factor: 经济
    impact: positive
    point: 年长企业主交接潮和可能转移的财富价值，让这成为规划驱动型 RIA 的一笔实打实经济机会。
    sourceRefs:
    - 6
    - 8
    - 11
  - factor: 社会
    impact: positive
    point: 企业主在乎传承、家族延续和价值保全，这让交接准备度对话既情绪化又不容易被完全商品化。
    sourceRefs:
    - 9
    - 10
    - 11
  - factor: 技术
    impact: positive
    point: 专业规划工具和模块化顾问科技栈已经足够普及，一层聚焦的接班准备度软件可以直接插进现有流程。
    sourceRefs:
    - 14
    - 16
    - 17
    - 18
    - 19
    - 35
    - 36
  - factor: 法律
    impact: negative
    point: 估值、买卖协议、税务策略和交接结构设计，仍然离不开人工专家和留痕控制，完全自动化建议的边界很窄。
    sourceRefs:
    - 7
    - 11
    - 34
    - 40
  adoptionFrictionMatrix:
  - friction: 企业主常把退出讨论拖到很晚，导致在触发事件发生前，很难先拿到接班人数据。
    severity: high
    affectedBuyer: 企业主规划负责人
    mitigation: 先卖准备度盘点和缺口报告，而不是完整出售流程，让第一轮对话更像诊断，不像交易。
    sourceRefs:
    - 7
    - 11
    - 32
  - friction: 顾问已经习惯依赖 CPA、律师和内部专家；如果新工具不能让协作更顺，他们未必愿意再加一层。
    severity: medium
    affectedBuyer: 高阶规划团队负责人
    mitigation: 把产品设计成协同层——有专家交接、转介跟踪和可直接给客户的交付物——而不是专家替代品。
    sourceRefs:
    - 12
    - 30
    - 35
    - 38
  - friction: 报税表、企业财务和股权数据的采集既脏又敏感，隐私顾虑也大。
    severity: high
    affectedBuyer: 顾问技术负责人
    mitigation: 优先把报税表和会计系统的结构化采集做好，保留人工复核环节，并带着清晰的服务商控制措施上门。
    sourceRefs:
    - 23
    - 40
  - friction: 更大的平台可能觉得内部高阶规划团队已经够用了。
    severity: medium
    affectedBuyer: RIA 渠道负责人
    mitigation: 卖可量化的产能提升、标准化复盘和基准数据——这些都不是人海式团队天然会长出来的东西。
    sourceRefs:
    - 15
    - 38
    - 39
market:
  tam:
    value: $257.3M
    rationale: 自下而上的测算：16,544 家 SEC 注册顾问机构 × 7.2% 拥有 100 名以上员工 ≈ 1,191 家企业级机构；若按 RISR 团队价假设 60 个等效席位、即每月每用户 $300，对应约 $216k ARR，TAM 约为 $257.3M。
    isEstimate: true
    sourceRefs:
    - 4
    - 20
  sam:
    value: $54.0M
    rationale: 滩头市场收窄为约 250 家美国独立财富平台/RIA，它们有明确的高阶规划或企业主业务动作；250 × 约 $216k ARR = 约 $54.0M。
    isEstimate: true
    sourceRefs:
    - 1
    - 4
    - 20
    - 38
    - 39
  som:
    value: $6.3M
    rationale: 第 3 年可达的市场份额按 30 个活跃客户、平均约 $210k ARR 建模，前提是公司能沿着“试点—平台—扩单”的定价路径推进。
    isEstimate: true
    sourceRefs:
    - 20
    - 39
bottomUpSizingDrivers:
- driver: 总可触达客户单元
  value: 1,191 家企业级 RIA/平台买家（= 16,544 家顾问机构 × 7.2% 拥有 100 名以上员工）
  source: '[4], calc'
- driver: 滩头市场单元
  value: 250 家具有明确高阶规划或企业主业务动作的独立财富平台/RIA
  source: '[1], [38], [39], est.'
- driver: 单客混合年度部署价值
  value: $216k（= 60 个等效席位 × $300/月）
  source: '[20], calc'
- driver: 第 3 年活跃客户数
  value: '30'
  source: est.
categoryDynamics:
  growthRate: 2025 年 SEC 注册顾问行业非文职岗位就业增长 7.5%
  growthRateSourceRefs:
  - 4
  tailwinds:
  - point: 独立顾问行业规模更大，也更以规划驱动，足以支撑专业化工作流软件的公司数量在变多。
    sourceRefs:
    - 4
    - 5
  - point: 企业主接班潮已经显性到银行、非营利机构和 RIA 都在持续发布新统计与操作手册。
    sourceRefs:
    - 6
    - 8
    - 9
    - 10
  - point: 专业规划软件的采纳率正在上升，因此一款聚焦接班准备度的产品，教育市场的负担会更低。
    sourceRefs:
    - 14
    - 16
    - 35
    - 36
  headwinds:
  - point: 大多数顾问机构仍然偏小，所以公司必须瞄准高端那一截，而不是整个市场。
    sourceRefs:
    - 4
    - 5
  - point: 这类工作仍然重服务、也情绪负担大，会拖慢纯软件渗透。
    sourceRefs:
    - 11
    - 31
    - 35
    - 38
  - point: 企业主经常推迟规划，很多交接还取决于买方融资或家族关系——这些都不在软件控制之内。
    sourceRefs:
    - 13
    - 32
competitors:
- name: RISR
  stage: scale-up
  wedge: 面向顾问的企业主互动平台，覆盖估值、接班与退出规划、数据采集、风险和财富规划交付。
  pricing: $350/月（单顾问）；$300/用户/月（团队）；企业定制
  strength: 最直接地证明了品类已经存在，也给出公开定价和具名 RIA/平台部署。
  weaknessVsUs: 当前定位更像广义企业主规划，还没有把企业主/接班人双边对齐做成核心事实记录系统。
  sourceRefs:
  - 20
  - 21
  - 22
  - 23
  - 24
- name: FP Alpha
  stage: scale-up
  wedge: 面向顾问的 AI 辅助高阶规划套件，重点是税务、遗产、保险和情景分析。
  pricing: 定制；抓取到的页面没有公开目录价
  strength: 和顾问的税务、遗产规划流程贴得很近，也有清晰的 CPA 协作故事。
  weaknessVsUs: 并不是围着接班准备度、企业主/接班人对齐或交接专属编排打造的产品。
  sourceRefs:
  - 27
  - 28
  - 29
  - 30
- name: Exit Planning Institute / BEI
  stage: incumbent
  wedge: 围绕退出规划和企业主导向规划的方法论、培训和顾问框架。
  pricing: 以认证和服务收入为主；抓取到的页面没有公开软件标价
  strength: 多学科顾问团队对它的概念框架和专业可信度都认可。
  weaknessVsUs: 培训和框架不会自动长成平台级操作系统，也不会天然沉淀基准数据。
  sourceRefs:
  - 31
  - 32
  - 33
  - 34
- name: Holistiplan
  stage: scale-up
  wedge: 帮助顾问把专业规划规模化的税务与遗产规划软件。
  pricing: 公开定价页可见；强调伙伴折扣，但抓取页面没有列出目录价
  strength: 很强地证明了专业规划工具可以成长为主流顾问软件品类。
  weaknessVsUs: 它更像相邻品类，而不是直接对手；重点在税务/遗产工作流，不在接班诊断或交接准备度。
  sourceRefs:
  - 35
  - 36
  - 37
- name: Cetera Advanced Planning Team
  stage: incumbent
  wedge: 平台内置的人工专家团队，以及支撑高端财富、税务智能和接班相邻需求的 RIA/支持渠道基础设施。
  pricing: 作为平台支持的一部分打包/定制，不单独公开列价
  strength: 买家信任高、人工专业度强，而且分发天生嵌在平台里。
  weaknessVsUs: 这种重人力的内部服务模式更难规模化，也更难沉淀可复用的跨客户工作流数据。
  sourceRefs:
  - 38
  - 39
regulatoryTechnicalConstraints:
- point: 专业估值、法务文件复核和多年税务筹备仍然必不可少，因此产品输出必须流向专家复核，而不能伪装成自主建议。
  sourceRefs:
  - 7
  - 11
  - 34
  - 40
- point: 报税表、股权数据和客户记录，会在 Regulation S-P 下触发更高的客户信息保护和服务商控制要求。
  sourceRefs:
  - 23
  - 40
- point: 企业主数据往往不完整也不一致，所以报税表采集和会计系统标准化，是产品层面的关键技术能力。
  sourceRefs:
  - 22
  - 23
  - 24
- point: 内部或家族交接即便表面上“有计划”，也可能在买方融资、治理或沟通环节失败。
  sourceRefs:
  - 13
  - 32
validationSignals:
- point: OnePoint BFG 正在把企业主规划软件部署到集中规划团队和顾问团队里，验证了这是一笔机构化采购。
  sourceRefs:
  - 1
  - 2
  - 3
- point: RISR 的案例研究强调的是可量化经济结果——从新增 AUM、买卖协议保险覆盖，到更高成交价——而不只是更好看的顾问演示。
  sourceRefs:
  - 24
  - 25
  - 26
- point: The American College 把企业接班规划证书定价到 $5,535，说明顾问端已经愿意为这个细分知识付费。
  sourceRefs:
  - 34
- point: Holistiplan 的顾问调查显示，67% 把遗产规划视为战略差异化，说明相邻的高阶规划预算线已经存在。
  sourceRefs:
  - 35
openQuestions:
- 首批买家更偏好集中规划团队授权，还是会要求在 80-300 名顾问网络里大范围铺开？
- 在不拖慢企业主推进、也不抬高关系风险的前提下，接班人侧评估到底能收多少？
- 前 6 个月里，真正卡住首单的集成到底是哪一项：CRM、规划软件、报税表采集，还是会计数据？
- 在现有厂商补出简单接班检查表之前，企业主/接班人错位基准数据能否足够快地长成护城河？
