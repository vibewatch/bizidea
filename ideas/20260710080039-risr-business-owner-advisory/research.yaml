  validationPlan:
  - priority: high
    question: Do business-owner solution heads buy this as a desk license, a seat-based advisor tool, or a per-engagement workflow?
    evidenceToGather: Five pricing and packaging conversations with platform buyers running 80-300 advisor networks, plus one live pilot proposal comparison.
  - priority: high
    question: Will CPA and tax partners reliably refer owners into a successor-readiness audit before a sale process starts?
    evidenceToGather: Three co-selling experiments with CPA firms or tax-focused channels, measuring referral-to-meeting conversion and first-report completion.
  - priority: medium
    question: How much successor-side data can advisors collect without damaging owner trust or slowing engagement kickoff?
    evidenceToGather: Pilot interviews with 15 founder households, including drop-off points for successor questionnaires and owner approvals.
  - priority: medium
    question: 'Which integration is truly mandatory for first close: CRM, tax-return ingestion, accounting data, or financial-planning software?'
    evidenceToGather: Deal-loss analysis across 10 discovery calls plus technical diligence with one design partner and one channel platform.
