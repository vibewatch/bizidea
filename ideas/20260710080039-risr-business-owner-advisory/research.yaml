competitors:
- name: RISR
  stage: scale-up
  wedge: Business-owner engagement platform for advisors spanning valuation, succession and exit planning, data capture, risk, and wealth-planning deliverables.
  pricing: $350/month single-advisor; $300/user/month for teams; enterprise custom
  strength: Most direct evidence of category creation, public pricing, and named RIA/platform deployments.
  weaknessVsUs: Current positioning is broader owner planning; it does not yet foreground a dual-sided owner-successor alignment system of record.
  sourceRefs:
  - 20
  - 21
  - 22
  - 23
  - 24
- name: FP Alpha
  stage: scale-up
  wedge: AI-assisted advanced-planning suite for advisors focused on tax, estate, insurance, and scenario analysis.
  pricing: Custom; fetched pages do not disclose public list pricing
  strength: Strong fit with advisor tax and estate workflows and clear CPA-collaboration story.
  weaknessVsUs: Not purpose-built around successor readiness, owner-successor alignment, or transition-specific orchestration.
  sourceRefs:
  - 27
  - 28
  - 29
  - 30
- name: Exit Planning Institute / BEI
  stage: incumbent
  wedge: Methodology, education, and advisor frameworks for exit planning and owner-based planning.
  pricing: Certification and services-led economics; fetched pages do not disclose public software list pricing
  strength: Strong conceptual framing and credibility with multi-disciplinary advisor teams.
  weaknessVsUs: Training and frameworks do not automatically become a platform-wide operating system or benchmark dataset.
  sourceRefs:
  - 31
  - 32
  - 33
  - 34
- name: Holistiplan
  stage: scale-up
  wedge: Tax and estate planning software that helps advisors deliver specialized planning at scale.
  pricing: Public pricing page available; partner discounts highlighted, but fetched page does not disclose list pricing
  strength: Strong proof that specialized planning tools can become mainstream advisor software categories.
  weaknessVsUs: Adjacent rather than direct; it focuses on tax/estate workflows, not successor diagnostics or transition readiness.
  sourceRefs:
  - 35
  - 36
  - 37
- name: Cetera Advanced Planning Team
  stage: incumbent
  wedge: In-house expert bench and RIA/support channel infrastructure for advanced wealth, tax-intelligent, and succession-adjacent planning.
  pricing: Bundled/custom as part of platform support; not publicly itemized
  strength: High buyer trust, human expertise, and embedded platform distribution.
  weaknessVsUs: People-heavy internal service model is less scalable and less likely to create reusable cross-client workflow data.
  sourceRefs:
  - 38
  - 39
