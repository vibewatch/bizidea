openQuestions:
- Will initial buyers prefer centralized-desk licenses or broader field rollouts across 80-300 advisor networks?
- How often can successor-side assessments be collected without slowing owner engagement or raising relationship risk?
- 'Which integration is the true deal blocker in the first six months: CRM, planning software, tax-return ingestion, or accounting data?'
- Can benchmark data on owner-successor misalignment compound fast enough before incumbents add simple successor checklists?
