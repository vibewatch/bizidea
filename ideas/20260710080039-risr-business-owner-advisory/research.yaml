reportMemo:
  executiveTakeaways:
  - 'Buyer budget is real and moving upmarket: OnePoint BFG deployed RISR across centralized planning and advisor teams, showing business-owner succession has become a software line item at the wealth-platform level ([1], [2], [3]).'
  - 'Urgency is demographic and operational: more than half of U.S. small-business owners are over 55, only 54% have a formal succession plan in the U.S. Bank survey, and Project Equity estimates 2.3 million small businesses are owned by aging boomers ([6], [7], [8], [9]).'
  - 'The category is moving from bespoke advice to repeatable workflow: estate-planning tool penetration has climbed sharply, Holistiplan''s advisor survey shows 41% already use software in estate planning and 59% still rely on in-house or external experts, and Cerulli argues tech-heavy advisory practices outperform peers ([14], [16], [35], [36]).'
  - The open wedge is not generic planning software; it is a successor-readiness operating layer that captures owner-and-successor alignment before valuation, tax, governance, and insurance work begin, because today's direct vendors cluster around valuation, tax/estate automation, or education rather than dual-sided transfer diagnostics ([21], [27], [31], [38]).
  marketDefinition: Software and workflow infrastructure that lets a wealth platform run repeatable business-owner transition reviews across many founder households—capturing business data, estimating valuation, testing exit readiness, surfacing tax/estate/risk gaps, and coordinating specialist handoffs. It sits between generic financial-planning stacks and services-heavy exit-planning engagements ([1], [17], [20], [21], [27], [31], [38]).
  customerAndBuyer: Primary users are heads of business-owner solutions, advanced-planning desks, and lead advisors serving founder-led companies; the economic buyer is usually the platform executive responsible for business-owner planning, advisor technology, or a dedicated RIA/support channel. Named deployments and channel launches show the buying center is increasingly institutional rather than one-off advisor-led ([1], [2], [38], [39]).
  buyingTriggers:
  - point: A wealth platform launches or centralizes a business-owner or advanced-planning practice and needs a repeatable workflow rather than ad hoc specialist referrals.
    sourceRefs:
    - 1
    - 2
    - 38
    - 39
  - point: Aging-owner demographics and low plan readiness make founder transitions urgent enough to surface before a retirement, illness, or sale compresses the timeline.
    sourceRefs:
    - 6
    - 7
    - 8
    - 9
    - 10
  - point: Clients expect broader estate, tax, and transition planning, but advisory firms need software plus expert handoffs to scale that service economically.
    sourceRefs:
    - 14
    - 16
    - 35
    - 36
    - 38
  willingnessToPay:
    summary: 'Budget exists when the product is sold as a specialized planning layer rather than a generic CRM add-on: RISR publicly lists $350/month single-advisor and $300-per-user team plans, OnePoint bought the category at the platform level, and advisors increasingly treat estate/tax planning technology as a differentiator rather than a nice-to-have.'
    sourceRefs:
    - 1
    - 20
    - 35
    - 37
    - 39
  competitiveLandscape: 'The market breaks into four groups: direct business-owner planning platforms (RISR), advanced-planning automation (FP Alpha and Holistiplan), methodology/education networks (Exit Planning Institute and The American College), and in-house advanced-planning benches inside wealth platforms (Cetera and similar firms). None clearly owns a dual-sided owner-successor alignment dataset; most stop at valuation, tax/estate deliverables, or human-led consulting ([20], [27], [31], [34], [35], [38], [39]).'
  incumbentThesis:
  - incumbentClass: Direct business-owner planning platforms
    point: RISR proves the category exists, but its current surface area is broader owner planning and business insight delivery, not a purpose-built owner-successor alignment system of record.
    sourceRefs:
    - 1
    - 20
    - 21
    - 22
    - 23
    - 24
  - incumbentClass: Advanced-planning suites
    point: FP Alpha and Holistiplan are strong in tax and estate planning automation, but they are not built around successor readiness, governance alignment, or transition-specific workflow orchestration.
    sourceRefs:
    - 14
    - 27
    - 28
    - 29
    - 35
    - 36
    - 37
  - incumbentClass: Education and methodology networks
    point: Exit Planning Institute and The American College validate demand and help advisors learn the discipline, yet training and frameworks do not automatically become the operating system used on every annual review cycle.
    sourceRefs:
    - 31
    - 32
    - 33
    - 34
  - incumbentClass: In-house advanced-planning teams
    point: Platform benches like Cetera win on trust and human expertise, but the model is people-heavy and does not naturally create a reusable cross-platform benchmark dataset or successor-readiness workflow layer.
    sourceRefs:
    - 11
    - 38
    - 39
  regulatoryLandscape: The product touches tax returns, ownership data, valuation assumptions, and succession recommendations, so buyers will evaluate it as controlled workflow infrastructure rather than autonomous advice. U.S. Bank still recommends professional valuations, legal document review, and multi-year tax planning; The American College teaches business-succession planning as a specialist discipline; and KPMG's summary of the SEC's Regulation S-P amendments highlights tighter incident-response, service-provider, recordkeeping, and data-protection expectations for advisers handling customer information ([7], [11], [34], [40]).
  technologyLandscape: Modular advisor-tech stacks already exist. Cerulli and Kitces frame wealthtech as a multi-category buy/build/rent market, FP Alpha and Holistiplan show specialized tax/estate modules, and RISR already captures tax-return and accounting-system data to generate branded owner reports. That makes a successor-readiness layer technically feasible without replacing the broader planning stack ([17], [18], [19], [23], [27], [28], [36]).
  distributionChannels:
  - point: Direct enterprise sales into RIAs and wealth platforms that are formalizing business-owner or advanced-planning teams.
    sourceRefs:
    - 1
    - 2
    - 38
    - 39
  - point: CPA and tax-professional relationships are the most credible referral path because owners often mention an exit or sale to their CPA before they mention it to an advisor.
    sourceRefs:
    - 12
    - 30
  - point: Education and certificate ecosystems are viable top-of-funnel channels because advisors already buy specialized succession-planning training.
    sourceRefs:
    - 31
    - 34
  partnershipEcosystem:
  - point: CPA and tax collaborators matter because business-owner exits often start with tax framing and trusted accountant relationships.
    sourceRefs:
    - 12
    - 30
  - point: Estate, insurance, legal, and valuation specialists remain critical execution partners even when software structures the engagement.
    sourceRefs:
    - 7
    - 11
    - 31
    - 33
    - 38
  - point: Advisor-tech and platform ecosystems can distribute the product once it proves it improves planning depth without forcing a rip-and-replace of existing tools.
    sourceRefs:
