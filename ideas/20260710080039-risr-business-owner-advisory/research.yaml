  adoptionFrictionMatrix:
  - friction: Owners often delay exit conversations until late, making it hard to gather successor data before a triggering event.
    severity: high
    affectedBuyer: Head of business-owner planning
    mitigation: Sell a readiness audit and gap report first, not a full sale process, so the first conversation feels diagnostic rather than transactional.
    sourceRefs:
    - 7
    - 11
    - 32
  - friction: Advisors already lean on CPAs, attorneys, and in-house experts and may resist another tool unless it improves collaboration.
    severity: medium
    affectedBuyer: Advanced-planning team leader
    mitigation: Design the product as a coordination layer with specialist handoffs, referral tracking, and client-ready deliverables rather than as expert replacement.
    sourceRefs:
