market:
  tam:
    value: $257.3M
    rationale: 'Bottom-up estimate: 16,544 SEC-registered advisers x 7.2% with more than 100 employees ≈ 1,191 enterprise-scale firms; assume a 60-seat equivalent deployment at RISR team pricing of $300/user/month = ~$216k ARR, yielding ~$257.3M.'
    isEstimate: true
    sourceRefs:
    - 4
    - 20
  sam:
    value: $54.0M
    rationale: Beachhead narrows to an estimated 250 U.S. independent wealth platforms/RIAs with explicit advanced-planning or business-owner motions; 250 x ~$216k ARR = ~$54.0M.
    isEstimate: true
    sourceRefs:
    - 1
    - 4
    - 20
    - 38
    - 39
  som:
