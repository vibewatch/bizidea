scenarios:
  downside:
    description: "Logo starts slip by one quarter and implementation stays more bespoke."
    y3RevenueK: 2280.0
    y3EbitdaK: -420.0
    cashLowPointK: 180.0
    keyAssumptionChanges:
      - "Two logo starts after M15 move back by one quarter."
      - "Expanded ACV tops out near $420K instead of $456K."
      - "Gross margin exits at 68% instead of 73%."
  base:
    description: "Eight paying logos by Y3 end, with expansion revenue doing more work than late hiring."
    y3RevenueK: 2953.0
    y3EbitdaK: 4.0
    cashLowPointK: 893.1
    keyAssumptionChanges:
      - "Logo starts follow M6, M9, M12, M15, M19, M23, M27, and M31."
      - "Initial production ACV is $336K and mature logos expand to $456K."
      - "Gross margin improves from implementation-heavy pilots to a 73% late-Y3 exit."
  upside:
    description: "Channels source deals earlier and second-partner expansions arrive faster."
    y3RevenueK: 3560.0
    y3EbitdaK: 360.0
    cashLowPointK: 1020.0
    keyAssumptionChanges:
      - "Logo starts after M15 pull forward by one quarter."
      - "Mature ACV reaches roughly $480K through faster second-partner expansions."
      - "Gross margin exits at 75% as connector reuse removes more manual work."
sensitivity:
  - variable: "ARPU"
    downsideCase: "Initial production ACV lands at $300K and mature logos reach only $400K."
    baseCase: "Initial production ACV $336K; mature logos $456K."
    upsideCase: "Initial production ACV $360K; mature logos $480K."
    y3RevenueImpactK: -430.0
    cashImpactK: -500.0
  - variable: "CAC"
    downsideCase: "CAC rises to $140K because channels do not materialize."
    baseCase: "CAC holds at $110K with founder-led sales plus referrals."
    upsideCase: "CAC falls to $85K once channel referrals produce a third of wins."
    y3RevenueImpactK: -180.0
    cashImpactK: -260.0
  - variable: "churn"
    downsideCase: "Monthly churn drifts to 2.5% as pilots do not expand cleanly."
    baseCase: "Monthly churn remains 1.5%."
    upsideCase: "Monthly churn improves to 1.0% with strong operational embed."
    y3RevenueImpactK: -250.0
    cashImpactK: -220.0
  - variable: "sales cycle"
    downsideCase: "Median cycle extends to 9 months because procurement adds delay."
    baseCase: "Median cycle is 6-7 months."
    upsideCase: "Median cycle compresses to 5 months through active launch triggers and channel trust."
    y3RevenueImpactK: -370.0
    cashImpactK: -410.0
  - variable: "gross margin"
    downsideCase: "Exit gross margin reaches only 68%."
    baseCase: "Steady-state gross margin is 72% with a 73% late-Y3 exit."
    upsideCase: "Exit gross margin reaches 75%."
    y3RevenueImpactK: 0.0
    cashImpactK: -210.0
  - variable: "hiring pace"
    downsideCase: "One extra engineer and one extra GTM hire are pulled forward by two quarters."
    baseCase: "Hiring stays milestone-gated and flat after Q4Y2."
    upsideCase: "Later hires wait for channel proof and gross margin proof."
    y3RevenueImpactK: -40.0
    cashImpactK: -190.0
modelDiagram:
  title: "unit economics flow"
  mermaid: |
    flowchart LR
      Leads[Qualified launch projects] --> Pilots[Paid pilot launches]
      Pilots --> Production[Production logos]
      Production --> Expansion[Second partner expansion]
      Expansion --> Revenue[Subscription plus pilot revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash runway]
modelSanity:
  - checkName: "Revenue engine"
    finding: "Base-case revenue comes from eight paying logos by Y3 end, with each logo moving from a paid pilot into roughly $336K production ARR and later partner expansion."
  - checkName: "Must go right"
    finding: "The team has to keep deployments under roughly 60 days so pilots convert and referral channels keep feeding a procurement-heavy funnel."
  - checkName: "Model breaks if"
    finding: "A one-quarter procurement slip plus gross margin stalling below 68% pushes cash toward the downside case before the next round."
  - checkName: "Next-round proof"
    finding: "The seed-ready proof point is six production logos, 70%+ gross margin, and at least two channel-sourced wins by Q4Y2."
sanityChecks:
  ruleOf40: "Y3 growth 81% + EBITDA margin 0% = 81%"
  burnMultiple: "Y2 burn multiple 0.5x (EBITDA burn $566K on $1.247M net new revenue); Y3 is near 0.0x at breakeven."
  revenuePerFte: "$295K Y3 using 10 year-end FTE (benchmark $200-400K SaaS)"
  flags:
    - "Revenue concentration stays high because only eight logos drive nearly all Y3 revenue; one delayed bank launch matters."
    - "The model assumes connector reuse is real enough to keep headcount flat after Q4Y2 while gross margin still rises."
    - "Sales timing risk remains the biggest cash risk because CFO and vendor-risk approval sit in the buying path."
