    name: "Steady-state gross margin"
    value: "72"
    unit: "percent"
    source: "[BP businessModel.targetGrossMarginPct = 70; model exits slightly above target after productization]"
  - id: A9
    name: "Late Y3 exit gross margin"
    value: "73"
    unit: "percent"
    source: "[BP businessModel.targetGrossMarginPct = 70; mature connector library and less bespoke support improve margin]"
  - id: A10
    name: "Monthly customer churn"
    value: "1.5"
    unit: "percent"
    source: "[Heuristic: sticky enterprise infrastructure with meaningful procurement friction, but still early-stage logo risk]"
  - id: A11
    name: "Blended CAC per production logo"
    value: "110"
    unit: "usdK"
    source: "[BP founder-led direct sales + channel co-sell; heuristic includes founder time, travel, security diligence, and modest paid pipeline spend]"
