scenarios:
  downside:
    description: 客户起量整体晚一个季度，且实施仍然更偏定制。
    y3RevenueK: 2280.0
    y3EbitdaK: -420.0
    cashLowPointK: 180.0
    keyAssumptionChanges:
    - M15 之后有两个客户的起量时间各往后推一个季度。
    - 扩张后的 ACV 最高只到约 $420K，而不是 $456K。
    - 退出毛利率收在 68%，而不是 73%。
  base:
    description: 到 Y3 末做到 8 个付费客户，且收入增长更多来自扩张，而不是后期继续招人。
    y3RevenueK: 2953.0
    y3EbitdaK: 4.0
    cashLowPointK: 893.1
    keyAssumptionChanges:
    - 客户起量按 M6、M9、M12、M15、M19、M23、M27 和 M31 推进。
    - 初始生产 ACV 为 $336K，成熟客户扩到 $456K。
    - 毛利率从实施密集的试点阶段逐步爬升，到 Y3 后段收在 73%。
  upside:
    description: 渠道更早开始稳定出单，第二合作方扩张也来得更快。
    y3RevenueK: 3560.0
    y3EbitdaK: 360.0
    cashLowPointK: 1020.0
    keyAssumptionChanges:
    - M15 之后的客户起量整体提前一个季度。
    - 成熟 ACV 随着第二合作方更快扩张，大致能到 $480K。
    - 随着连接器复用减少人工工作，退出毛利率可到 75%。
sensitivity:
- variable: ARPU
  downsideCase: 初始生产 ACV 落在 $300K，成熟客户只到 $400K。
  baseCase: 初始生产 ACV 为 $336K；成熟客户为 $456K。
  upsideCase: 初始生产 ACV 为 $360K；成熟客户为 $480K。
  y3RevenueImpactK: -430.0
  cashImpactK: -500.0
- variable: CAC
  downsideCase: 由于渠道始终没跑出来，CAC 升到 $140K。
  baseCase: 在创始人主导销售 + 转介绍的情况下，CAC 维持在 $110K。
  upsideCase: 一旦渠道转介绍贡献三分之一胜单，CAC 可降到 $85K。
  y3RevenueImpactK: -180.0
  cashImpactK: -260.0
- variable: 流失率
  downsideCase: 如果试点扩张不顺，月度流失率会漂到 2.5%。
  baseCase: 月度流失率维持在 1.5%。
  upsideCase: 若运营嵌入更深，月度流失率可改善到 1.0%。
  y3RevenueImpactK: -250.0
  cashImpactK: -220.0
- variable: 销售周期
  downsideCase: 若采购环节继续叠加延迟，中位周期会拉长到 9 个月。
  baseCase: 中位销售周期为 6-7 个月。
  upsideCase: 借助明确的上线触发器和渠道信任，销售周期可压到 5 个月。
  y3RevenueImpactK: -370.0
  cashImpactK: -410.0
- variable: 毛利率
  downsideCase: 退出毛利率只能到 68%。
  baseCase: 稳态毛利率为 72%，Y3 后段退出值为 73%。
  upsideCase: 退出毛利率可到 75%。
  y3RevenueImpactK: 0.0
  cashImpactK: -210.0
- variable: 招聘节奏
  downsideCase: 一名额外工程师和一名额外 GTM 招聘都提前两个季度。
  baseCase: 招聘继续按里程碑卡口推进，Q4Y2 之后保持平。
  upsideCase: 后续招聘要等渠道和毛利证明更扎实后再启动。
  y3RevenueImpactK: -40.0
  cashImpactK: -190.0
modelDiagram:
  title: 单位经济模型流转
  mermaid: "flowchart LR\n  Leads[Qualified launch projects] --> Pilots[Paid pilot launches]\n  Pilots --> Production[Production logos]\n  Production --> Expansion[Second partner expansion]\n  Expansion --> Revenue[Subscription plus pilot revenue]\n  Revenue --> GrossProfit[Gross profit]\n  GrossProfit --> Cash[Cash runway]\n"
modelSanity:
- checkName: 收入引擎
  finding: 基准情形下，到 Y3 末共有 8 个付费客户；每个先从付费试点进入约 $336K 的生产 ARR，之后再通过新增合作方扩张。
- checkName: 必须跑顺的地方
  finding: 团队必须把部署周期压在约 60 天以内，试点才转得动，转介绍渠道也才能持续给这个采购很重的漏斗供血。
- checkName: 模型何时会坏
  finding: 如果采购整体再晚一个季度，且毛利率始终上不去、卡在 68% 以下，公司在下一轮融资前就会逼近 downside 情形。
- checkName: 下一轮证明点
  finding: 能进入下一轮可融资状态的关键证据，是到 Q4Y2 做到 6 个生产客户、70%+ 毛利率，以及至少 2 个渠道来源胜单。
sanityChecks:
  ruleOf40: Y3 增长 81% + EBITDA 利润率 0% = 81%
  burnMultiple: Y2 burn multiple 为 0.5x（EBITDA 亏损 $566K，对应 $1.247M 的净新增收入）；Y3 接近 0.0x，基本打平。
  revenuePerFte: 按年末 10 名 FTE 计算，Y3 人均收入为 $295K（SaaS 基准约 $200-400K）。
  flags:
  - 收入集中度依然很高，因为 Y3 几乎全部收入只靠 8 个客户，任何一家银行上线延后都会有明显影响。
  - 模型假设连接器复用足够真实，因此 Q4Y2 之后团队人数可以不再增长，而毛利率仍继续抬升。
  - 销售时点风险仍是最大的现金风险，因为 CFO 和供应商风险审批都卡在采购路径里。
