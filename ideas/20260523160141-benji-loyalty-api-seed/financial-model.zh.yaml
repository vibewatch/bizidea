slug: loyalty-clearing-ledger
date: '2026-05-23'
currency: USD
modelStartMonth: 2026-06
assumptions:
- id: A1
  name: pre-seed 完成后的期初现金
  value: '2200'
  unit: usdK
  source: '[BP fundingAsk 目标为 $2-4M；模型采用 $2.2M 融资，覆盖到 Q4Y2 里程碑外加 6 个月缓冲]'
- id: A2
  name: 每个客户 的试点月费
  value: '35'
  unit: usdK per month
  source: '[BP investorMemo.initialContract 为 8-12 周、$75k-$125k 的试点；模型采用偏高的中位情形，即 3 个月合计 $105k]'
- id: A3
  name: 试点周期
  value: '3'
  unit: months
  source: '[BP investorMemo.initialContract：8-12 周上线试点]'
- id: A4
  name: 初始生产 ACV
  value: '336'
  unit: usdK per year
  source: '[BP investorMemo.initialContract：$200k-$350k 年度生产合同；模型按区间上沿附近取值，以反映银行级控制能力]'
- id: A5
  name: 扩张后的成熟 ACV
  value: '456'
  unit: usdK per year
  source: '[BP market.som 提到 Y3 约 8 个客户、每个约 $375k ARR；模型假设第二合作方扩张会把成熟客户 拉到初始 ACV 之上]'
- id: A6
  name: 付费 客户起量节奏
  value: M6, M9, M12, M15, M19, M23, M27, M31
  unit: month index
  source: '[BP milestones：第 1 年 2 个付费试点、1 个生产；12-24 个月做到 6-8 个生产客户；research market.som = Y3 可触达 8 个客户]'
- id: A7
  name: 早期交付 COGS 比率
  value: '45'
  unit: percent of revenue
  source: '[BP 的推进顺序从人机协同、实施密集阶段起步，之后才逐步复用连接器]'
- id: A8
  name: 稳态毛利率
  value: '72'
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct = 70；模型在产品化后略高于目标收口]'
- id: A9
  name: Y3 后段退出毛利率
  value: '73'
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct = 70；成熟连接器库和更少的定制支持会继续抬高毛利]'
- id: A10
  name: 月度客户流失率
  value: '1.5'
  unit: percent
  source: '[经验假设：企业基础设施黏性强、采购摩擦明显，但早期 客户 仍存在流失风险]'
- id: A11
  name: 每个生产客户 的综合 CAC
  value: '110'
  unit: usdK
  source: '[BP 创始人主导直营销售 + 渠道共销；经验值已包含创始人时间、差旅、安全尽调和适度付费获客支出]'
- id: A12
  name: 管理层全包薪酬
  value: '216'
  unit: usdK annual
  source: '[经验假设：创始人现金薪酬 + 薪税与福利负担]'
- id: A13
  name: 工程师全包薪酬
  value: '198'
  unit: usdK annual
  source: '[经验假设：美国资深金融科技/基础设施工程师 + 20% 全包负担]'
- id: A14
  name: 解决方案/实施岗位全包薪酬
  value: '168'
  unit: usdK annual
  source: '[经验假设：集成或控制岗位 + 全包负担]'
- id: A15
  name: 销售/合作岗位全包薪酬
  value: '192'
  unit: usdK annual
  source: '[经验假设：企业 GTM 负责人或 AE 底薪 + 全包负担；佣金计入 CAC，不计入工资]'
- id: A16
  name: 财务与运营岗位全包薪酬
  value: '150'
  unit: usdK annual
  source: '[经验假设：精简型财务或供应商风险运营经理 + 全包负担]'
- id: A17
  name: 非薪酬研发支出栈
  value: 4 / 5 / 6
  unit: usdK per month in Y1/Y2/Y3
  source: '[经验假设：云工具、安全软件和开发者 SaaS]'
- id: A18
  name: 非薪酬销售与市场支出
  value: 2 / 3 / 5
  unit: usdK per month in Y1/Y2/Y3
  source: '[经验假设：创始人主导外呼、行业活动和差旅，随规模适度放大]'
- id: A19
  name: 非薪酬 G&A 支出
  value: 7 / 9 / 11
  unit: usdK per month in Y1/Y2/Y3
  source: '[经验假设：法务、保险、审计准备和银行供应商风险文档]'
- id: A20
  name: 招聘启动节奏
  value: Solutions M5, Controls M8, Eng2 M10, GTM M11, CS M17, Sales2 M20, Eng3 M21, FinanceOps M22
  unit: month index
  source: '[BP team.startTiming + BP strategicChoices.sequencingRationale]'
- id: A21
  name: 基础企业销售周期
  value: '6.5'
  unit: months
  source: '[BP buyingProcess 显示交易常需 CFO 和财务审批；经验值以“试点转生产”的银行采购为中心]'
