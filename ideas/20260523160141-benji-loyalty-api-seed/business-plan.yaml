slug: loyalty-clearing-ledger
date: '2026-05-23'
executiveSummary: >-
  Loyalty Clearing Ledger is a neutral subledger and operations layer for North
  American regional banks, card program managers, and consumer fintechs that
  are moving from simple cashback into cross-brand rewards. The researched
  market signal is real: Benji already markets 10x faster partner launches
  across a 50M+-member network, and major issuers already condition consumers
  to expect transfers across airline and hotel ecosystems. The resulting pain is
  less about front-end rewards UX than about partner pricing, deferred-revenue
  logic, settlement, exception handling, and vendor-risk controls once multiple
  external programs are involved. The first product should therefore be a
  human-in-the-loop clearing ledger for one issuer launching its first external
  transfer or merchant-funded partner, not a full loyalty cloud or consumer app.
  Research supports an estimated $90.0M TAM, $36.0M beachhead SAM, and roughly
  $3.0M year-3 SOM if the company stays focused on mid-market issuer programs
  before broader expansion. The go-to-market only works if first customers buy
  during a rewards relaunch or first partner rollout, pricing is tied to active
  members and live partners, and channel access comes through loyalty networks,
  processors, and consultants already inside the launch workflow. The biggest
  strategic risk is that buyers accept manual spreadsheets or buy enough
  settlement functionality from Currency Alliance or other adjacent vendors
  instead of funding a new neutral control layer. Public evidence is still thin
  on who owns the system of record today and how much month-end-close pain
  exists after the first few partners go live, so early diligence must prove
  budget ownership, data access, and repeatable deployment speed.
problem:
  - "Regional issuers and consumer fintechs launching transfer or merchant-funded rewards still manage partner pricing, liabilities, settlement, and exception handling across exports, spreadsheets, email threads, and one-off engineering work."
  - "As API connectivity compresses launch time from months to days, finance, risk, and support teams become the bottleneck because existing loyalty tools are not the neutral system of record for cross-program clearing."
solution:
  - "Provide a neutral loyalty clearing subledger that records each earn, redeem, transfer, and co-acquisition event, calculates partner economics, reconciles liabilities, and produces audit-ready settlement and GL exports."
  - "Start with one issuer launch workflow, human-in-the-loop exception queues, and reusable partner templates so customers can add external rewards partners without building a dedicated finance-operations stack."
whyWeWin:
  - "The wedge sits where current alternatives are weakest: networks and loyalty clouds help connect or run programs, but they do not consistently own the issuer-facing finance workflow, partner settlement desk, and audit-ready subledger across counterparties."
  - "Each deployment compounds reusable pricing rules, partner launch templates, and exception-resolution data that improve onboarding speed and create leverage with processors, API networks, and consultants."
strategicChoices:
  beachhead: "North American regional banks, card program managers, and consumer fintechs with roughly 250,000 to 3 million active rewards members that are launching their first external transfer or merchant-funded rewards partners."
  wedgeRationale: "This slice has visible triggers, named buyers, and painful manual work, yet is still underserved by internal platform teams and large enough to support enterprise ACVs. It creates faster proof than selling into top-10 issuers, where procurement is longer and incumbent relationships are harder to displace."
  sequencingRationale: "Start with one partner-launch clearing workflow, human-approved exception handling, and GL-ready exports because that solves the immediate finance bottleneck without requiring a rip-and-replace of the loyalty stack. Only after repeatable pilots should the company add multi-partner forecasting, fraud workflows, and broader partner-discovery or marketplace features."
  notYet:
    - "Top-10 issuer transformations or airline-scale enterprise programs before mid-market proof"
    - "Consumer-facing rewards discovery, catalog, or wallet experiences"
    - "A full loyalty marketplace or partner-discovery network"
    - "Fully automated settlement actions without explicit human review"
market:
  tam: "$90.0M estimated TAM based on about 180 North American issuer, program-manager, and fintech rewards programs that could support roughly $500k blended annual clearing-software spend."
  sam: "$36.0M estimated initial SAM based on about 90 U.S. beachhead programs likely to add first transfer or merchant partners in the near term at roughly $400k blended annual spend."
  som: "$3.0M estimated year-3 SOM based on about 8 production customers at roughly $375k ARR each if the company stays tightly focused on rewards relaunch and partner-expansion deals."
  segments:
    - "Primary: U.S. regional banks, program managers, and consumer fintechs launching first external loyalty partners"
    - "Secondary: Travel, hospitality, and merchant loyalty programs seeking issuer distribution through interoperable rewards partnerships"
  buyingProcess: >-
    The day-to-day champion is typically the rewards GM, loyalty lead, or VP
    partnerships, but economic approval often requires the CFO or finance lead
    because partner launches change liability accounting and settlement
    operations. Deals are most likely to start during a rewards relaunch, first
    transfer-partner rollout, or executive push to improve top-of-wallet usage
    without building a large internal loyalty-ops team.
product:
  mvp: >-
    The MVP should support one issuer launching one or two external partners by
    ingesting partner events from APIs or files, pricing each event, tracking
    liabilities, reconciling settlement status, and routing exceptions into a
    shared rewards-finance queue with audit logs and GL exports. It should not
    replace the customer's loyalty frontend or general ledger.
  sixMonth: "Ship 3-5 design-partner pilots with configurable event mapping, partner-pricing rules, daily liability reconciliation, exception case management, and exports into the customer's finance stack."
  twelveMonth: "Add repeatable connectors for the most common loyalty API, processor, and ledger environments in the beachhead, launch multi-partner dashboards, and harden role controls and vendor-risk documentation for bank procurement."
  twentyFourMonth: "Expand from first-launch clearing into a broader multi-partner rewards control plane with settlement forecasting, fraud and support workflows, and benchmark data on partner economics and exception rates."
  keyBets:
    - "The first painful workflow is finance-grade clearing for external rewards partners, not another consumer rewards interface."
    - "Customers will accept a neutral subledger alongside their existing loyalty platform if it reduces launch time and close complexity."
    - "Human-in-the-loop exception handling will win trust faster than promising fully automated settlement."
    - "A small connector and rules library can make deployments repeatable before the company hires a large services team."
gtm:
  wedge: "Sell a paid partner-launch control package for issuers or fintechs adding their first external transfer or merchant-funded rewards partners, positioned as faster go-live plus cleaner liability close."
  channels:
    - "Founder-led direct sales to rewards GMs, VP partnerships, and CFOs during rewards relaunches and first partner rollouts"
    - "Referral and co-sell relationships with loyalty API networks, card processors, and loyalty consultants that already participate in partner launches"
    - "Targeted industry outreach through payments, loyalty, and co-brand advisory ecosystems where top-of-wallet and rewards-refresh projects are discussed"
  funnelTargets: "Target account→qualified discovery 15-25%, discovery→paid pilot 25-35%, pilot→production 60%+, production→second partner expansion 50%+ within 12 months."
  pricing: "Paid implementation and ledger-mapping pilot for the first partner launch, then annual SaaS priced by active rewards members and live external partners under clearing, because value tracks avoided manual finance work, faster partner launches, and lower settlement leakage rather than seats alone."
businessModel:
  revenueStreams:
    - "Annual SaaS subscription for the clearing ledger and exception workflow"
    - "Implementation and ledger-mapping fees for the first partner launch"
    - "Expansion fees for additional partners, event types, and advanced control modules"
  unitOfValue: "Active rewards members and live external partner connections under clearing"
  targetGrossMarginPct: 70
  expansionLevers:
    - "Add more transfer, redemption, and merchant-funded partners within each issuer program"
    - "Expand from reconciliation into dispute, fraud, and support workflows"
    - "Add partner-economics analytics, settlement forecasting, and benchmarking"
    - "Embed the ledger through processors, loyalty networks, or consultants that manage multiple programs"
strategyMap:
  northStarMetric: "External loyalty events reconciled to partner liability and settlement status without unresolved exceptions"
  inputMetrics:
    - "Days from signed pilot to first reconciled external partner event"
    - "Percent of cleared events with complete audit trail and GL export"
    - "Open exception rate per 10,000 external loyalty events"
    - "Pilot-to-production conversion rate"
    - "Average live partners per production customer"
  moatsToBuild:
    - "Reusable pricing, liability, and settlement rule library across partner types"
    - "Exception-resolution corpus linking event patterns, disputes, and financial outcomes"
    - "Integration templates and channel relationships inside issuer rewards modernization projects"
  killCriteria:
    - "Fewer than 6 of the first 20 qualified ICP interviews show active spreadsheet or email-based partner-liability workflows tied to an upcoming launch."
    - "Fewer than 2 of the first 4 paid pilots convert to annual production after one partner-launch cycle."
    - "Median time from kickoff to first reconciled external event exceeds 60 days across the first 3 deployments because partner data is too inconsistent."
  mermaid: |
    flowchart LR
      Wedge[First partner launch clearing wedge] --> MVP[Human in the loop clearing ledger]
      MVP --> Proof[Faster launches and cleaner liability close]
      Proof --> Expansion[Multi partner rewards control plane]
investorMemo:
  verdict:
    call: "Watch"
    conviction: "Compelling workflow wedge with credible market timing, but conviction stays moderate until buyers prove standalone budget urgency and repeatable deployment inside procurement-heavy issuer environments."
    whyBelieve: "Cross-brand rewards are clearly expanding, and the research supports a real control gap between connectivity vendors and issuer finance operations."
    whyDoubt: "The company still has to prove that regional issuers feel enough month-end-close pain to buy a new neutral subledger before incumbents or manual processes remain good enough."
    nextDiligence: "Validate 3-5 live launch opportunities, confirm budget owner and data access, and show that one paid pilot can reconcile a partner launch within 60 days."
  firstCustomer:
    title: "Rewards GM at a regional bank launching its first transfer partner"
    profile: "A U.S. issuer or consumer fintech with about 500,000 to 1.5 million active rewards members, an existing cashback program, and a 2026 roadmap to add travel or merchant-funded redemption partners without hiring a dedicated loyalty-ops team."
    trigger: "A rewards relaunch, first transfer-partner launch, or executive mandate to increase top-of-wallet usage exposes spreadsheet-based partner liability and settlement work."
    buyer: "GM of rewards, VP partnerships, or CFO"
    initialContract: "Paid 8-12 week launch pilot around $75k-$125k for ledger mapping and first-partner go-live, credited toward a $200k-$350k annual production contract that expands as more partners go live."
  mustBeTrue:
    - "At least 40% of qualified beachhead issuers must already use spreadsheets or manual exports to manage partner-point liabilities and settlement."
    - "A rewards relaunch or first external partner rollout must create enough urgency that buyers accept a paid pilot instead of deferring the project."
    - "The first 2-3 connectors must cover enough issuer and partner data to reach a first reconciled event within 60 days."
    - "Pilot customers must convert to production above 60% when the product shortens launch and close workflows."
    - "Connectivity vendors and loyalty clouds must remain incomplete as issuer-facing finance systems of record even after adding basic ledger features."
  diligenceQuestions:
    - "Who owns partner-point liability reconciliation today inside a regional issuer: rewards, finance, processor, or an outside consultant?"
    - "How many external partners need to be live before manual workflows become materially painful?"
    - "Which budget line funds this product during a rewards refresh: rewards modernization, finance systems, or partnership launch services?"
    - "How much of the deployment can be standardized across Benji-like networks, processors, and existing loyalty platforms?"
    - "What minimum security, audit, and third-party risk package is required to clear vendor review at a regional bank?"
operatingAssumptions:
  - assumption: "Regional banks, program managers, and consumer fintechs launching first external partners are the highest-intensity early buyers."
    basis: idea.yaml
    validationTest: "Interview 20 target accounts and confirm that at least 8 are actively planning an external partner launch and currently rely on manual liability or settlement workflows."
    decisionImpact: "If false, the ICP must shift toward larger issuer programs, loyalty networks, or partner-side programs with stronger operational pain."
  - assumption: "Buyers will fund the product as part of a rewards refresh or partner-launch budget before they treat it as a standalone finance system."
    basis: research.yaml
    validationTest: "Run at least 6 discovery-to-proposal cycles and confirm that at least 3 buyers identify a live project budget and named executive sponsor."
    decisionImpact: "If false, the company must repackage as an embedded channel product or broaden scope to justify a dedicated line item."
  - assumption: "Human-in-the-loop exception handling and audit-ready exports are sufficient to clear initial trust and vendor-risk objections."
    basis: research.yaml
    validationTest: "Present the security and controls package to 3 prospective buyers and confirm they allow a pilot path without requiring autonomous settlement capabilities."
    decisionImpact: "If false, the roadmap must prioritize deeper compliance work or a read-only analytics product before live clearing workflows."
  - assumption: "Loyalty API networks, processors, and consultants can become channels rather than default blockers."
    basis: research.yaml
    validationTest: "Secure at least 2 channel or referral agreements and source at least 3 qualified pilot opportunities from them."
    decisionImpact: "If false, CAC will stay higher and the company must invest earlier in direct enterprise sales."
  - assumption: "The product can support $200k-$350k initial annual production ACV after the first partner-launch pilot."
    basis: research.yaml
    validationTest: "Close at least 2 paid pilots and convert at least 1 to a production contract within the target ACV band."
    decisionImpact: "If false, the company needs either a narrower product with lower ACV and faster sales or broader scope to justify enterprise pricing."
experimentRoadmap:
  - horizon: 0-90 days
    experiment: "Interview 20 rewards, partnerships, and finance leaders across regional banks, program managers, and consumer fintechs."
    hypothesis: "First external partner launches already create spreadsheet-heavy liability and settlement workflows that are painful enough to fund."
    successMetric: "At least 12 interviews confirm active manual workflows and at least 6 are tied to a live 12-month launch plan."
    owner: "Founder/CEO"
  - horizon: 0-90 days
    experiment: "Collect and map real reconciliation artifacts from 3 design partners, including partner rules, liability reports, and exception queues."
    hypothesis: "A repeatable data model exists for one partner-launch workflow without replacing the loyalty frontend."
    successMetric: "At least 3 design partners produce enough common structure to define one MVP schema and rules engine."
    owner: "Founding eng"
  - horizon: 90-180 days
    experiment: "Run 2-3 paid pilots around one issuer's first external partner launch."
    hypothesis: "The product can reach a first reconciled event within 60 days and materially reduce manual close work."
    successMetric: "At least 2 pilots reconcile live events within 60 days and reduce unresolved launch exceptions or reconciliation effort by at least 30%."
    owner: "Founder/CEO"
  - horizon: 90-180 days
    experiment: "Test pricing anchored to active members plus live partners against transaction-only packaging."
    hypothesis: "Buyers prefer an annual contract tied to program scale and number of partners rather than pure event volume."
    successMetric: "At least 4 of 6 qualified prospects accept member-and-partner-based pricing as a credible buying model."
    owner: "Founder/CEO"
  - horizon: 180-360 days
    experiment: "Launch co-sell motions with one loyalty API network and one loyalty consultant or processor."
    hypothesis: "Channel partners will refer launch-stage customers if the product stays neutral and reduces finance implementation risk."
    successMetric: "At least 4 sourced opportunities and 1 paid pilot from channel referrals."
    owner: "Partnerships lead"
  - horizon: 180-360 days
    experiment: "Add multi-partner dashboards and advanced exception playbooks to the first production customers."
    hypothesis: "Once the first launch workflow works, expansion to second and third partners is the fastest path to higher ACV."
    successMetric: "At least 2 production customers add a second partner workflow and increase contract value by 25% or more."
    owner: "Product lead"
operations:
  - "Maintain immutable event logs, liability snapshots, settlement status, and case history for every external partner transaction."
  - "Design onboarding around file-based and API-based partner data so the product can work before every counterparty exposes clean interfaces."
  - "Package vendor-risk materials early, including access controls, audit logs, data-flow diagrams, and clear system-of-record boundaries."
  - "Run weekly reviews across product, implementation, and customer teams to turn repeated exception patterns into reusable rules and templates."
team:
  - role: "Founder/CEO"
    startTiming: "Month 0"
    rationale: "Own customer discovery, founder-led sales, and channel development because the core risk is whether partner-launch pain is budget-worthy."
  - role: "Founding eng"
    startTiming: "Month 0"
    rationale: "Build the event model, rules engine, reconciliation workflows, and first issuer-partner integrations needed for pilots."
  - role: "Solutions and integration engineer"
    startTiming: "Month 3-6"
    rationale: "Productize repeated connectors and shorten time to first reconciled event across early deployments."
  - role: "Implementation and controls lead"
    startTiming: "Month 6-9"
    rationale: "Turn bespoke launch support into repeatable onboarding while owning audit, vendor-risk, and operating-control requirements."
  - role: "Partnerships and GTM lead"
    startTiming: "Month 9-12"
    rationale: "Scale pipeline only after the company has repeatable paid pilots and a clear channel story with loyalty networks, processors, or consultants."
milestones:
  - horizon: "0-12 months"
    items:
      - "Complete 20 ICP interviews and secure 5-8 design partners with real launch artifacts."
      - "Ship an MVP that prices external loyalty events, reconciles liabilities, and routes exceptions for one partner-launch workflow."
      - "Close at least 2 paid pilots and convert at least 1 customer to production."
      - "Establish at least 2 channel relationships with loyalty networks, processors, or consultants."
  - horizon: "12-24 months"
    items:
      - "Reach 6-8 production logos in the beachhead with deployment to first reconciled event inside 60 days."
      - "Launch multi-partner dashboards, stronger vendor-risk packaging, and expansion into second-partner workflows."
      - "Prove that channel-sourced opportunities contribute a meaningful share of qualified pipeline."
  - horizon: "24-36 months"
    items:
      - "Expand from first-launch clearing into a broader rewards control plane with forecasting, fraud, and dispute workflows."
      - "Build benchmark data and rule templates that materially reduce onboarding time and improve win rate."
      - "Reach a defensible position as the neutral issuer-side clearing layer rather than a services-heavy implementation add-on."
risks:
  - risk: "Currency Alliance, Benji, or other adjacent vendors add enough settlement and reconciliation workflow to compress the standalone wedge."
    likelihood: "Medium"
    impact: "High"
    mitigation: "Differentiate on issuer-facing finance workflow, cross-network neutrality, and audit-ready subledger exports rather than raw partner connectivity."
  - risk: "Buyers decide spreadsheets and consultants are good enough until partner volume is much larger."
    likelihood: "High"
    impact: "High"
    mitigation: "Sell only into active relaunch or first-partner projects, require paid pilots, and measure launch speed and close-effort reduction from the first deployment."
  - risk: "Partner and processor data is too inconsistent for repeatable deployment."
    likelihood: "High"
    impact: "High"
    mitigation: "Start with a narrow event set, support file-based ingestion and human review, and productize the first connector library before broad ICP expansion."
  - risk: "Bank vendor-risk and procurement reviews slow conversion enough to starve the company of early learning."
    likelihood: "Medium"
    impact: "High"
    mitigation: "Target mid-market institutions with live launch projects, ship a strong controls package early, and use channel partners already trusted in the workflow."
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2-4M"
  runwayMonths: 18
  useOfFundsSummary: "Fund 18 months of product build, 5-8 design-partner deployments, bank-ready controls and vendor-risk materials, and founder-led GTM to reach repeatable paid pilots and the first 2-4 production logos."
