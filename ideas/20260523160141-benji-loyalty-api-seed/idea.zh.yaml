jobsToBeDone:
- job: 当我们接入第一批外部转点或商户兑换合作方时，帮奖励和财务团队把每一笔忠诚度事件清清楚楚地跑通，这样我们就能在不打穿经济模型的前提下，上线更丰富的奖励。
  currentAlternative: 在发卡行奖励系统之外，再叠一层表格式结算跟踪和手工合作方对账。
  successMetric: 新合作方上线时间，以及仍未解决的结算异常数量。
- job: 当持卡人开始跨品牌赚取和兑换奖励时，帮客服和反欺诈团队追溯每一笔争议事件，这样我们就能更快处理问题，不让积分或毛利白白流失。
  currentAlternative: 截图、邮件线程，以及从忠诚度和卡系统里临时导出的零散数据。
  successMetric: 争议处理时长，以及忠诚度负债净流失。
ideaScorecard:
  signalStrength:
    score: 4
    rationale: 来源显示忠诚度互操作性的基础设施正在发生明确变化，虽然证据基础目前只有一篇已验证融资简报。
  painIntensity:
    score: 4
    rationale: 发卡行可以容忍基础返现，但一旦接入外部合作方，负债和结算出错会直接打到毛利、客服负担和计划可信度。
  wedgeClarity:
    score: 5
    rationale: 围绕合作方忠诚度事件做清算台账，切口窄、边界清楚，也对应着明确的奖励与财务利益相关方。
  defensibility:
    score: 4
    rationale: 跨计划事件历史、结算数据和定价规则会沉淀出很黏的运营情报，而且每接入一个新合作方都会更强。
  ventureScale:
    score: 4
    rationale: 滩头市场聚焦发卡行，但同一套台账可继续扩到品牌、网络和金融科技渠道上的更广义忠诚度商业基础设施。
topRisks:
- name: 买方教育推进慢
  description: 很多发卡行可能要到前几批合作真正上线后，才会意识到清算和负债才是瓶颈。
  mitigation: 直接切进奖励改版和首次外部合作项目——这些场景痛点最直接，预算也往往已经在。
- name: 合作方数据割裂
  description: 不同忠诚度合作方提供的事件和结算数据口径可能不一致，前期很难做到全自动核对。
  mitigation: 先抓价值最高的事件类型，支持文件导入和人工复核；等合作方数据质量提升后再逐步自动化。
- name: 平台打包进入
  description: 随着赛道成熟，忠诚度 API 网络或现有奖励平台可能补上基础结算能力。
  mitigation: 保持跨网络中立，把优势放在多合作方财务流程、跨品牌负债情报 和发卡行级运营控制，而不是单纯连接能力。
