differentiator: 大多数忠诚度平台擅长帮单一品牌跑积分和活动，联盟网络则更擅长优化流量和商户优惠。这个项目占的是更难的一层：跨多个计划时，合作方积分经济、负债、结算和滥用规则必须对得上账。站在这个位置，团队会沉淀出合作方表现、转点行为和异常模式的专有数据，长期能复利成更强的承保与路由能力。
