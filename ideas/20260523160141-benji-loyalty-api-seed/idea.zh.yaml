problem: 中型发卡行和消费金融科技公司想把奖励做得比简单返现更丰富，但跨品牌忠诚度合作的运营依然很难看。每新增一个赚取、兑换或转点合作方，就要单独处理积分定价、负债核算、清算、滥用控制和客服支持。技术 API 已把集成周期从几个月压到几天，真正卡住扩张的，变成了财务和运营团队——他们仍然没有一套共享系统，能把合作方忠诚度价值的大规模清算和治理跑顺。
targetUser:
  primary: 北美发卡行与消费金融科技公司里，负责奖励、忠诚度和合作伙伴的人，他们正从简单返现走向可转点或商户联名奖励。
  secondary: 负责忠诚度负债、清算和合作方报表的财务与运营团队。
  buyer: 发卡行或消费金融科技公司的奖励业务总经理、合作伙伴副总裁或 CFO。
startupThesis:
  nonObviousInsight: 真正的突破口不是再做一个忠诚度前端，而是跨品牌忠诚度互联已经便宜到足以让瓶颈从前台转到清算、负债和结算。一旦 API 让合作可以几天内上线，最后赢的就会是那个做成积分交换金融操作系统的公司，而不是面向消费者的目录页。
  beachhead: 北美地区拥有 250,000 到 3 million 活跃奖励会员的区域性银行、卡项目管理方和消费金融科技公司；它们想加入旅游和商户兑换/转点合作方，但又不想自建一支专门的忠诚度合作工程与财务团队。
  wedge: 一套忠诚度清算台账：给每一笔赚取、兑换、转点和联合获客事件定价，核对合作方余额与负债，并把异常或滥用案例统一送进产品、财务和客服团队共用的工作流。
  whyNowCatalyst: Benji 已有 50M 会员网络，并承诺把跨品牌忠诚度合作从数月压到数天上线，这说明互操作性正从概念变成基础设施。对那些突然能接入更多合作方的发卡行来说，后台控制软件的紧迫性一下子被抬高了。
  ventureScalePath: 先做发卡行奖励计划里忠诚度清算与负债的记录系统，再扩到合作方发现、活动资助、获客效果归因、反欺诈控制，最终长成更广义的可编程商业网络——让积分、优惠和卡联动奖励都通过一套中立台账流转。
solution: 做一层中立的运营底座，夹在发卡行奖励台账、合作品牌、卡处理商和客户触点之间。产品为每次合作互动计算积分交换经济模型，跟踪谁欠谁什么，并在价值暴露给持卡人之前先把违规规则挑出来。财务团队每天能看到负债和结算视图；合作团队用现成模板就能上线新的赚取、兑换和转点合作，不必每次都从一摞表格重新开始。客服和风控团队也能共享同一条案件历史，处理会员对兑换的争议或刷漏洞行为。时间一长，公司会变成让多品牌忠诚度更像现代支付网络、而不是一堆双边交易拼盘的清算所。
goToMarketSeed:
  firstCustomer: 首个客户应是一家美国区域性银行卡项目或消费金融科技公司，活跃奖励会员在 300,000 到 2 million 之间，已有返现产品，并计划在 2026 年第一次上线旅游或商户转点合作方。
  buyingTrigger: 奖励体系重启、新的联名或转点合作上线，或者管理层要求在不新增完整忠诚度合作运营团队的前提下提高用卡活跃度。
  currentAlternative: 继续用忠诚度平台导出表、财务表格、合作伙伴邮件线程、代理/顾问支持，以及叠加在现有奖励系统上的一次性工程方案，手工把流程拼起来。
  switchingReason: 现有忠诚度软件可以跑单品牌计划，但一旦奖励变成跨品牌、多边协作，它就给不了发卡行一个中立台账，去处理合作方定价、负债核对、结算和异常。
  pricingHypothesis: 按活跃忠诚度会员数和已上线合作方数量收取年度 SaaS 平台费，再加上台账映射和处理商集成的实施费。
