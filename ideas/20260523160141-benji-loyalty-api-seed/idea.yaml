problem: >-
  Mid-market card issuers and consumer fintechs want richer rewards than simple cashback, but cross-brand loyalty
  partnerships are still operationally ugly. Each new earn, burn, or transfer partner creates bespoke rules for point
  pricing, liability accounting, settlement, abuse controls, and customer support. As API connectivity compresses the
  technical integration from months to days, the real blocker becomes finance and operations teams that still have no
  shared system to clear and govern partner loyalty value at scale.
targetUser:
  primary: Rewards, loyalty, and partnerships leaders at North American card issuers and consumer fintechs expanding beyond cashback into transferable or merchant-linked rewards
  secondary: Finance and operations teams responsible for loyalty liability, settlement, and partner reporting
  buyer: GM of rewards, VP partnerships, or CFO at a card issuer or consumer fintech
startupThesis:
  nonObviousInsight: >-
    The breakthrough is not another loyalty front end; it is that cross-brand loyalty connectivity is becoming cheap
    enough that the bottleneck shifts to clearing, liability, and settlement. Once APIs let programs launch partnerships
    in days, the winner is the company that becomes the financial operating system behind point exchange rather than the
    consumer-facing catalog.
  beachhead: >-
    North American regional banks, card program managers, and consumer fintechs with 250,000 to 3 million active rewards
    members that want to add travel and merchant redemption or transfer partners without building a dedicated loyalty
    partnerships engineering and finance team
  wedge: >-
    A loyalty clearing ledger that prices each earn, burn, transfer, and co-acquisition event, reconciles partner
    balances and liabilities, and routes exceptions or abuse cases into one workflow for product, finance, and support
    teams
  whyNowCatalyst: >-
    Benji's 50M-member network and promise of launching cross-brand loyalty partnerships in days instead of months show
    that interoperability is becoming real infrastructure, which makes back-office control software newly urgent for
    issuers that can now turn on many more partnerships.
  ventureScalePath: >-
    Start as the system of record for loyalty clearing and liability across issuer rewards programs, then expand into
    partner discovery, campaign funding, customer acquisition measurement, fraud controls, and ultimately a broader
    programmable commerce network where points, offers, and card-linked rewards move through one neutral ledger.
solution: >-
  Build a neutral operating layer that sits between an issuer's rewards ledger, partner brands, card processors, and
  customer channels. The product calculates point exchange economics for every partner interaction, tracks who owes what
  to whom, and flags broken rules before value is exposed to cardholders. Finance teams get a daily liability and
  settlement view, while partnerships teams get launch templates for new earn, burn, and transfer deals without opening
  a new spreadsheet stack every time. Support and fraud teams share the same case history when members dispute redemptions
  or gaming behavior appears. Over time, the company becomes the clearinghouse that makes multi-brand loyalty behave more
  like a modern payments network than a patchwork of bilateral deals.
goToMarketSeed:
  firstCustomer: >-
    A U.S. regional bank card program or consumer fintech with 300,000 to 2 million active rewards members, an existing
    cashback product, and a 2026 roadmap to launch travel or merchant transfer partners for the first time
  buyingTrigger: >-
    A rewards relaunch, new co-brand or transfer partnership rollout, or executive pressure to increase card engagement
    without hiring a full loyalty partnerships operations team
  currentAlternative: >-
    Manual workflow across loyalty platform exports, finance spreadsheets, partner email threads, agency or consultant
    support, and one-off engineering work layered onto the existing card rewards stack
  switchingReason: >-
    Existing loyalty software can run a single-brand program, but it does not give issuers a neutral ledger for partner
    pricing, liability reconciliation, settlement, and exception handling once rewards become cross-brand and
    multi-sided
  pricingHypothesis: >-
    Annual SaaS platform fee based on active loyalty members and number of live partners, plus onboarding fees for ledger
    mapping and processor integrations
