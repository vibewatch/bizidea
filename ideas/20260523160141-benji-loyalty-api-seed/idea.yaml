differentiator: >-
  Loyalty platforms typically help a single brand run points and campaigns, while affiliate networks optimize traffic and
  merchant offers. This company owns the harder layer where partner-point economics, liabilities, settlement, and abuse
  rules must reconcile across multiple programs. That position creates proprietary data on partner performance, transfer
  behavior, and exception patterns that can compound into better underwriting and routing over time.
