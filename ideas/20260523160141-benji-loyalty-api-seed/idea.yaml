jobsToBeDone:
  - job: >-
      When we add our first external transfer or merchant redemption partners, help our rewards and finance teams clear
      each loyalty event correctly, so we can launch richer rewards without breaking the economics.
    currentAlternative: Spreadsheet settlement trackers and manual partner reconciliations layered onto the issuer rewards system
    successMetric: Time to launch a new partner and number of unresolved settlement exceptions
  - job: >-
      When cardholders start earning and redeeming across brands, help our support and fraud teams trace every disputed
      event, so we can resolve issues quickly without leaking points or margin.
    currentAlternative: Screenshots, email threads, and ad hoc exports from loyalty and card systems
    successMetric: Dispute-resolution time and net loyalty liability leakage
ideaScorecard:
  signalStrength:
    score: 4
    rationale: The source shows a specific infrastructure shift in loyalty interoperability, even though the evidence base is only one verified funding brief.
  painIntensity:
    score: 4
    rationale: Issuers can tolerate basic cashback, but once they add external partners, liability and settlement errors directly hit margin, support load, and program credibility.
  wedgeClarity:
    score: 5
    rationale: A clearing ledger for partner loyalty events is narrow, legible, and owned by a clear combination of rewards and finance stakeholders.
  defensibility:
    score: 4
    rationale: Cross-program event histories, settlement data, and pricing rules create sticky operational intelligence that gets better with each new partner on the network.
  ventureScale:
    score: 4
    rationale: The beachhead is focused on issuers, but the same ledger can expand into broader loyalty commerce infrastructure across brands, networks, and fintech channels.
topRisks:
  - name: Slow buyer education
    description: Many issuers may not realize clearing and liability become the bottleneck until after their first few partner launches go live.
    mitigation: Sell into rewards relaunches and first external partnership projects where the implementation pain is immediate and budget already exists.
  - name: Fragmented partner data
    description: Loyalty partners may expose inconsistent event and settlement data, making fully automated reconciliation difficult early on.
    mitigation: Start with the highest-value event types, support file-based and human-in-the-loop reconciliation, and automate deeper as partner data quality improves.
  - name: Platform bundling
    description: Loyalty API networks or incumbent rewards platforms may add basic settlement features once the category matures.
    mitigation: Stay neutral across networks and win on multi-partner finance workflow, cross-brand liability intelligence, and issuer-grade operational controls rather than raw connectivity.
