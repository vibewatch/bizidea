  willingnessToPay:
    summary: 只要产品被包装成奖励焕新里的基础设施，预算就存在：Benji 已按在线连接和交易量定价，Antavo 把忠诚度能力做进企业套餐，而参与度提升本身也足够重要，发卡行会在意奖励相关性和兑换摩擦。
    sourceRefs:
