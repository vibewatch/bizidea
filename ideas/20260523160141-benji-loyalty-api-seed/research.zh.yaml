openQuestions:
- 今天在区域性发卡行里，合作方积分负债究竟由哪套系统说了算：忠诚度平台、处理商、ERP，还是电子表格？
- 当头两到三个外部转点或商户合作方上线后，财务团队在月末关账上到底会痛到什么程度？
- 买方会更偏好独立销售的中立分户台账，还是更愿意要嵌在 Benji、处理商或忠诚度顾问体系里的白标能力？
- 一家银行在真实供应商评审里，最低会要求怎样的审计包（SOC 2、PCI 范围、模型控制、GL 导出粒度）？
