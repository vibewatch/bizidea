    - 18
    - 20
    - 30
    - 35
  competitiveLandscape: 市场大致分成四类：连接型网络（Benji、Currency Alliance）、忠诚度运营云（SessionM、Open Loyalty、Antavo）、规则/促销引擎（Talon.One），以及卡联动优惠/数据底层（Visa、Fidel、Banyan）。真正空出来的一层，是一个中立、面向发卡行的记录系统——无论买方选哪种前端或网络，它都能承接合作方定价、负债核对、结算和异常（[1], [5], [6], [25], [27], [29], [30], [31], [32], [35], [36], [37]）。
  incumbentThesis:
  - incumbentClass: 连接型网络
    point: Benji 和 Currency Alliance 这类网络解决了接入摩擦，但并不会自动变成买方的财务工作流、异常处理台，或跨所有交易对手的中立台账。
    sourceRefs:
    - 1
    - 3
    - 5
    - 6
  - incumbentClass: 企业忠诚度云
    point: SessionM、Open Loyalty 和 Antavo 很擅长跑单一品牌的赚取与兑换逻辑，但它们优化的是品牌自有计划，而不是独立计划之间的多方清算。
    sourceRefs:
    - 27
    - 28
    - 29
    - 30
  - incumbentClass: 促销与忠诚度引擎
    point: Talon.One 证明灵活的激励逻辑在金融服务里很有价值，但它的核心切口仍是执行与个性化，不是合作方结算和负债核算。
    sourceRefs:
    - 25
    - 26
    - 35
  - incumbentClass: 卡联动优惠底层
    point: Visa 和 Fidel 擅长触发并结算商户出资奖励事件，但它们更像相邻的底层通道，而不是完整的忠诚度负债操作系统。
    sourceRefs:
    - 19
    - 20
    - 31
    - 32
  regulatoryLandscape: 有三层控制要求尤其关键。第一，美国银行监管机构要求覆盖供应商全生命周期的第三方风险管理。第二，忠诚度积分属于独立履约义务，需要做收入分摊与负债跟踪。第三，消费者监管机构越来越愿意审查贬值、隐藏费用和奖励公平性（[8], [9], [10], [11], [16]）。
  technologyLandscape: 底层使能栈已经是 API 优先：Benji 提供统一的合作方 API，Currency Alliance 强调 积分银行 与结算服务，Square/Visa/Fidel 发布事件导向文档，而企业忠诚度平台则突出审计日志、权限控制和灵活积分规则。这意味着，即便不替换前端忠诚度栈，也完全有技术空间加上一层清算台账（[3], [5], [6], [27], [28], [31], [32], [33], [36]）。
  distributionChannels:
