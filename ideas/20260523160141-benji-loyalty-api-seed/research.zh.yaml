competitors:
- name: Currency Alliance
  stage: 成长期
  wedge: API 优先 忠诚度合作、积分银行、积分交换与结算工具。
  pricing: 企业级定制定价；已抓取页面无公开标价。
  strength: 在合作方积分交换、对账、结算和银行场景上，功能重叠度最高。
  weaknessVsUs: 它更像网络/平台层，而不是跨所有合作关系、面向发卡行财务工作流的中立分户台账。
  sourceRefs:
  - 5
  - 6
  - 7
  - 36
- name: SessionM
  stage: 现有厂商
  wedge: 覆盖赚取、兑换和优惠的全栈企业忠诚度平台。
  pricing: 企业级定制定价；已抓取页面无公开标价。
  strength: 企业级落地案例丰富，计划管理能力覆盖面广。
  weaknessVsUs: 它擅长跑单一品牌的忠诚度计划，不擅长多方清算和合作方负债核对。
  sourceRefs:
  - 29
- name: Open Loyalty
  stage: 成长期
  wedge: API 优先 企业忠诚度软件，覆盖积分、分析和审计/安全控制。
  pricing: 企业级定制定价；已抓取页面无公开标价。
  strength: API 形态现代，强调 ISO/GDPR、审计日志和权限控制。
  weaknessVsUs: 它聚焦单个计划的积分系统，而不是独立计划之间的中立清算层。
  sourceRefs:
  - 27
  - 28
- name: Talon.One
  stage: 成长期
  wedge: 被 Bilt 等金融服务品牌采用的企业激励与忠诚度引擎。
  pricing: 企业级定制定价；已抓取页面无公开标价。
  strength: 规则执行非常灵活，迭代快，在金融服务里也有强参考案例。
  weaknessVsUs: 它更适合活动逻辑和个性化，不适合合作方结算、负债核算和关账运营。
  sourceRefs:
  - 25
  - 26
  - 35
regulatoryTechnicalConstraints:
- point: 任何落地到银行或信用合作社的部署，都必须扛住正式的第三方风险管理与持续监控。
  sourceRefs:
  - 8
  - 9
- point: 忠诚度积分与奖励会形成独立履约义务，因此必须做收入分摊和递延收入处理。
  sourceRefs:
  - 10
  - 11
- point: 企业买方在信任合作方清算系统前，必然要求审计日志、基于角色的访问控制和强数据治理。
  sourceRefs:
  - 27
  - 28
- point: 不同生态里的转点时序、转换比例和合作方事件语义都不一样，因此必须有明确的异常处理逻辑。
  sourceRefs:
  - 22
  - 23
  - 24
  - 34
