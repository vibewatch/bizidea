reportMemo:
  executiveTakeaways:
  - 跨品牌奖励互操作已经足够真实，瓶颈正从 API 接线转向财务和控制：Benji 在一个覆盖 50M+ 会员的网络里主打 10 倍提速上线，而大型发卡行也早已把航空与酒店伙伴间的转点做成用户预期（[1], [3], [4], [22], [23], [24], [34]）。
  - 买方痛点既是体验问题，也是运营问题：更相关、更容易用的奖励确实能提升“首选卡”行为，但一半的结账优惠压根没人看到，很多奖励计划还会制造出必须由财务团队递延、核对并解释的负债（[10], [11], [17], [18], [19], [20], [21]）。
  - 竞争格局是割裂的，而不是已经收敛。Currency Alliance 在合作方兑换与结算上最接近；SessionM、Open Loyalty、Antavo 和 Talon.One 则更偏参与度运营或规则执行，而不是中立、发卡行级别的清算层（[5], [6], [7], [25], [26], [27], [28], [29], [30], [35], [36], [37]）。
  - GTM 一定会很重采购，因为银行必须把供应商当成受监管的第三方来管理，而忠诚度积分本身又属于独立履约义务，会带来递延收入和负债管理工作（[8], [9], [10], [11], [16]）。
  marketDefinition: 这是面向发卡行、金融科技和合作方计划之间，多品牌忠诚度价值交换的定价、记账、核对与治理软件/工作流基础设施；它比忠诚度营销云更窄，但在负债、结算和异常处理上更深（[5], [6], [10], [11], [27], [28], [29], [35]）。
  customerAndBuyer: 主要用户是需要上线新转点体验或商户出资奖励体验的奖励、合作伙伴和忠诚度负责人；真正的经济买方通常是奖励业务总经理、合作伙伴副总裁或 CFO，因为合作上线既改变参与度经济模型，也会改写资产负债表上的负债（[8], [9], [11], [18], [22], [23]）。
  buyingTriggers:
  - point: 奖励改版或首个转点合作上线，会把多合作方场景下新增的对账、时序和异常处理工作全都暴露出来。
    sourceRefs:
    - 1
    - 3
    - 22
    - 23
    - 24
  - point: 想提升“首选卡”占比，会逼着发卡行提供更相关、更容易兑换的奖励。
    sourceRefs:
    - 17
