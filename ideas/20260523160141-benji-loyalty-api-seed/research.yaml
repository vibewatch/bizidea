competitors:
- name: Currency Alliance
  stage: scale-up
  wedge: API-first loyalty partnerships, points bank, exchange, and settlement tooling.
  pricing: Custom enterprise pricing; no public list price on fetched pages.
  strength: Closest functional overlap on partner exchange, reconciliation, settlement, and bank use cases.
  weaknessVsUs: Designed as a network/platform layer rather than a neutral issuer finance workflow and subledger across every partner relationship.
  sourceRefs:
  - 5
  - 6
  - 7
  - 36
- name: SessionM
  stage: incumbent
  wedge: Full-stack enterprise loyalty platform for earn-and-burn programs and offers.
  pricing: Custom enterprise pricing; no public list price on fetched pages.
  strength: Enterprise proof points and strong program-management breadth.
  weaknessVsUs: Optimized for running a brand’s loyalty program, not for multi-counterparty clearing and partner liability reconciliation.
  sourceRefs:
  - 29
- name: Open Loyalty
  stage: scale-up
  wedge: API-first enterprise loyalty software with points, analytics, and audit/security controls.
  pricing: Custom enterprise pricing; no public list price on fetched pages.
  strength: Modern API posture, ISO/GDPR language, audit logs, and explicit points-liability features.
  weaknessVsUs: Focuses on one program’s points system rather than a neutral clearing layer between independent programs.
  sourceRefs:
  - 27
  - 28
- name: Talon.One
  stage: scale-up
  wedge: Enterprise incentives and loyalty engine used by Bilt and other financial-services brands.
  pricing: Custom enterprise pricing; no public list price on fetched pages.
  strength: Very flexible rules execution, fast iteration, and strong financial-services references.
  weaknessVsUs: Better suited to campaign logic and personalization than to partner settlement, liability accounting, and close operations.
  sourceRefs:
  - 25
  - 26
  - 35
