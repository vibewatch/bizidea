openQuestions:
- 'Which existing system is actually authoritative for partner-point liabilities at regional issuers today: loyalty platform, processor, ERP, or spreadsheets?'
- How much month-end close pain do finance teams feel after the first two or three external transfer or merchant partners go live?
- Will buyers prefer a neutral subledger sold standalone, or a white-labeled capability embedded through Benji, processors, or loyalty consultancies?
- What minimum audit package (SOC 2, PCI scope, model controls, GL export detail) is required to clear a bank’s vendor review in practice?
