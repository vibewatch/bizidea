      - 10
      - 15
      - 17
      - 27
    competitiveRivalry:
      score: 4
      rationale: 相邻领域的现有厂商已经覆盖 BOM、采购、协作或制造执行，因此任何创业公司都必须占据一个狭窄切口，才能避免功能重叠。
      sourceRefs:
