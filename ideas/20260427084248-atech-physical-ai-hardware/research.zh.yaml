competitors:
- name: Altium 365 / Altium Develop
  stage: incumbent
  wedge: 在主流设计栈内部集成 ECAD 协作、BOM 情报和制造移交。
  pricing: 按席位年度定价；额外的 Altium Designer ECAD Design Authors 席位为每年 $995。
  strength: 在设计、BOM 和 PLM 之间具备深度集成和广泛安装基础。
  weaknessVsUs: 套件宽泛、偏设计中心；并不是为混合工具和混合 CM 场景下的初创公司首板发布而打造。
  sourceRefs:
  - 18
  - 19
  - 21
  - 22
  - 23
- name: JITX
  stage: scale-up
  wedge: 用代码表达制造规则，进行需求驱动的 PCB 生成与优化。
  pricing: 标准授权模式；公开价格未披露。
  strength: 在上游板卡设计与校验自动化上能力很强。
  weaknessVsUs: 重点仍在设计生成上游，而不是 CM 可接收的 RFQ 报价包、获批替代料或 bring-up / 发布可追踪性。
  sourceRefs:
  - 26
- name: Fictiv
  stage: scale-up
  wedge: 从原型到量产提供重服务型的数字制造、NPI 和供应链编排。
  pricing: 按报价收费的制造与工程服务。
  strength: 具备强 DFM/DFX 专长、质量流程和执行支持能力。
  weaknessVsUs: 绑定其制造网络且覆盖更广的机械范围，而不是中立的电子移交系统记录层。
  sourceRefs:
  - 10
  - 11
  - 13
  - 16
  - 17
- name: Atech
  stage: seed
  wedge: 面向极早期硬件创建的提示词原生硬件配置与代码生成。
  pricing: 预购/候补名单；公开价格未披露。
  strength: 在 AI 生成硬件概念上塑造了品类级用户体验。
  weaknessVsUs: 它更可能制造下游移交需求，而不是解决 CM 可接收发布的复杂度。
  sourceRefs:
  - 1
- name: KiCad + spreadsheets + distributor portals
  stage: open-source
  wedge: 零授权成本的 PCB 设计，加上灵活导出与广泛互操作能力。
  pricing: 免费软件 + 人工成本。
  strength: 对精打细算的团队来说是可信默认选项，而且与专有格式的互通性越来越强。
  weaknessVsUs: 没有托管式 BOM 健康度、审批工作流或发布可追踪层。
  sourceRefs:
  - 27
  - 28
  - 29
  - 30
regulatoryTechnicalConstraints:
- point: 认证与 EMC 失败可能直接阻断上市并增加时间/成本，因此发布输出必须支持测试就绪，而不只是工厂可生产。
  sourceRefs:
  - 12
- point: 出口管制和数据处理规则会限制构建流程和设计数据可以流向哪里。
  sourceRefs:
  - 11
  - 38
- point: 云端硬件协作越来越要求可审计权限、可用性承诺与安全响应流程。
  sourceRefs:
  - 22
  - 38
- point: 元器件风险情报的质量，依赖 Octopart、SiliconExpert 和 Z2Data 等第三方数据源。
  sourceRefs:
  - 20
  - 24
  - 36
  - 37
- point: 混合工具互操作仍是刚需，因为早期团队常常横跨 Altium、KiCad、Gerber 和手工表格。
  sourceRefs:
  - 21
  - 27
  - 28
  - 30
validationSignals:
- point: Atech 的 pre-seed 融资，直接说明投资人认为 AI 原生硬件工作流正在形成。
  sourceRefs:
  - 1
- point: IFR 报告称，工业机器人装机市场达到创纪录的 $16.7B，这支持更多硬件项目持续出现。
  sourceRefs:
  - 2
- point: Fictiv 报告显示，制造业领导者几乎普遍采用 AI 与数字制造能力。
  sourceRefs:
  - 6
  - 7
  - 33
- point: Altium 于 2025 年 1 月收购 Part Analytics，说明采购数字化对现有厂商具有战略价值。
  sourceRefs:
  - 24
- point: Luxonis 公开表示，Altium 365 帮助其在 AI 视觉硬件开发中减少了版本控制错误和返工改版。
  sourceRefs:
  - 25
- point: KiCad 持续增加对主要专有工具的导入器，说明开源在电子工作流中的占比仍在扩大。
  sourceRefs:
  - 27
  - 28
  - 29
- point: Fictiv 推出了 landed-cost 与关税工具，进一步说明硬件采购的运营复杂度还在上升。
  sourceRefs:
  - 34
openQuestions:
- 产品能否把替代料与 DFM 推荐的错误率压低到让 CTO 在提交报价前就愿意信任？
- 在客户拥有多个活跃板卡项目之前，早期买家会不会更偏好带服务辅助的发布工作流，而不是纯软件？
- 在购买时点，最有价值的输出到底是 RFQ 报价包生成、BOM 风险压降，还是 bring-up / 测试可追踪性？
- CM 和咨询伙伴能否成为可重复的渠道，而又不把这家公司视为工程收入威胁？
