    - 12
    - 38
  - factor: 社会
    impact: positive
    point: 小型、分布式硬件团队越来越默认云协作，也越来越习惯快节奏迭代。
    sourceRefs:
    - 21
    - 25
  - factor: 政治
    impact: negative
    point: 关税和贸易政策波动会迫使团队重做设计，也会制造一部分更偏宏观而非产品驱动的噪声需求。
    sourceRefs:
    - 6
