categoryDynamics:
  growthRate: 7% CAGR
  growthRateSourceRefs:
  - 2
  tailwinds:
  - point: 工业机器人市场体量和装机量仍足够大，会持续推着新的硬件项目往前走。
    sourceRefs:
    - 2
    - 3
    - 4
  - point: AI 已经被当成制造和供应链运营里的必备基础设施。
    sourceRefs:
    - 6
    - 7
    - 33
  - point: 现有厂商正在持续数字化电子采购，这反过来也验证了 BOM 与风险工作流的重要性。
    sourceRefs:
    - 18
    - 19
    - 24
  - point: 开源互操作性改善后，混合工具环境只会越来越常见，也会推高对中立工作流层的需求。
    sourceRefs:
    - 27
    - 28
  headwinds:
  - point: 对极小团队来说，手工栈仍然勉强可用，因此软件购买时点很容易被往后拖。
    sourceRefs:
    - 27
    - 30
  - point: 相邻现有厂商完全可能把重叠功能打包进更宽的套件。
    sourceRefs:
    - 18
    - 19
    - 20
    - 21
  - point: 只要替代料或合规建议出错，就可能放大信任损伤和责任风险。
    sourceRefs:
    - 11
    - 12
    - 38
competitors:
- name: Altium 365 / Altium Develop
  stage: incumbent
  wedge: 在主流设计栈内部，把 ECAD 协作、BOM intelligence 和制造交接打成一体。
  pricing: 年度席位制定价；额外的 Altium Designer ECAD Design Author 席位为每年 $995。
  strength: 在设计、BOM 和 PLM 之间集成很深，且装机基础广。
  weaknessVsUs: 套件很宽、也更偏设计中心，不是为混合工具、混合代工厂环境下的创业公司第一块板发布而做。
  sourceRefs:
  - 18
  - 19
  - 21
  - 22
  - 23
- name: JITX
  stage: scale-up
  wedge: 用代码承载制造规则，做需求驱动的 PCB 生成与优化。
  pricing: 标准授权模式；未公开价格。
  strength: 在板卡设计和验证的上游自动化很强。
  weaknessVsUs: 它盯的是设计生成，不是可直接发给代工厂的 RFQ 包、审核过的替代料或首板调试 / 发布可追溯性。
  sourceRefs:
  - 26
- name: Fictiv
  stage: scale-up
  wedge: 以服务为主的数字化制造、NPI 和供应链协调平台，从原型一路做到量产。
  pricing: 基于报价的制造与工程服务收费。
  strength: DFM / DFX 专业能力强，质量流程和执行支持也成熟。
  weaknessVsUs: 它绑定的是自家制造网络和更宽的机械范围，不是一套中立的电子交接 system of record。
  sourceRefs:
  - 10
  - 11
  - 13
  - 16
  - 17
- name: Atech
  stage: seed
  wedge: 用提示词驱动硬件配置和代码生成，服务最早期的硬件创建。
  pricing: 预订 / 候补名单阶段；未公开价格。
  strength: 在 AI 生成硬件概念这件事上，用户体验有塑造品类的潜力。
  weaknessVsUs: 它更可能放大下游交接需求，而不是解决代工可接手发布的复杂度。
  sourceRefs:
  - 1
- name: KiCad + spreadsheets + distributor portals
  stage: open-source
  wedge: 零授权成本的 PCB 设计，加上灵活导出和较强互操作性。
  pricing: 软件免费，成本主要是人工。
  strength: 对精简团队来说是可信默认选项，而且与专有格式的互操作性还在增强。
  weaknessVsUs: 没有托管式 BOM 健康度、审批工作流，也没有发布可追溯层。
  sourceRefs:
  - 27
  - 28
  - 29
  - 30
regulatoryTechnicalConstraints:
- point: 认证和 EMC 失败可能直接卡死上市并带来额外时间 / 成本，因此发布产出必须服务于测试就绪，而不只是 fab 就绪。
  sourceRefs:
  - 12
- point: 出口管制和数据处理规则，会限制设计数据和构建活动能流向哪些地区。
  sourceRefs:
  - 11
  - 38
- point: 硬件领域的云协作越来越要求可审计权限、可用性承诺和安全响应流程。
  sourceRefs:
  - 22
  - 38
- point: part-risk intelligence 的质量，高度依赖 Octopart、SiliconExpert 和 Z2Data 等第三方数据源。
  sourceRefs:
  - 20
  - 24
  - 36
  - 37
- point: 由于早期团队混用 Altium、KiCad、Gerber 和电子表格，互操作性仍是刚需。
  sourceRefs:
  - 21
  - 27
  - 28
  - 30
validationSignals:
- point: Atech 拿到 pre-seed 融资，本身就是投资人判断 AI 原生硬件工作流正在形成的直接信号。
  sourceRefs:
  - 1
- point: IFR 披露工业机器人装机市场价值达到创纪录的 $16.7B，这支撑了硬件项目还会继续冒出来。
  sourceRefs:
  - 2
- point: Fictiv 发现制造业领导者几乎都已开始采用 AI 和数字化制造工具。
  sourceRefs:
  - 6
  - 7
  - 33
- point: Altium 在 2025 年 1 月收购 Part Analytics，说明采购数字化对现有厂商来说具有战略价值。
  sourceRefs:
  - 24
- point: Luxonis 公开表示，Altium 365 帮它在 AI 视觉硬件开发中减少了版本错误和重板。
  sourceRefs:
  - 25
- point: KiCad 仍在持续增加对主流专有工具的导入能力，开源方案在电子工作流中的份额因此继续扩大。
  sourceRefs:
  - 27
  - 28
  - 29
- point: Fictiv 上线了 landed-cost 和关税工具，说明硬件采购侧的运营复杂度还在继续上升。
  sourceRefs:
  - 34
openQuestions:
- 产品能否把替代料和 DFM 建议做到足够低的错误率，低到 CTO 愿意在报价前就信任它？
- 早期买方会不会在拥有多个活跃板卡项目之前，更偏好带服务辅助的发布工作流，而不是纯软件？
- 购买当下最值钱的输出到底是哪一项：RFQ 询价包生成、BOM 风险下降，还是首板调试 / 测试可追溯性？
- 在不让代工厂和咨询伙伴觉得被威胁的前提下，它们能否成为可复制渠道？
