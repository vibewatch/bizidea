      - 18
      - 20
      - 36
      - 37
    buyerPower:
      score: 4
      rationale: 早期客户规模小、技术导向且价格敏感，并且存在可信的手工和开源替代方案，因此初期切换成本较低。
      sourceRefs:
      - 15
      - 23
      - 27
      - 30
    threatOfEntrants:
      score: 3
      rationale: 软件门槛中等，但受信任的制造知识、结果数据和集成深度，使这一品类比浅层 AI 套壳更难。
