competitors:
- name: Altium 365 / Altium Develop
  stage: incumbent
  wedge: Integrated ECAD collaboration, BOM intelligence, and manufacturing handoff inside the dominant design stack.
  pricing: Annual seat-based pricing; extra Altium Designer ECAD Design Authors are $995/year each.
  strength: Deep integration across design, BOM, and PLM with broad installed base.
  weaknessVsUs: Broad, design-centric suite; not purpose-built for startup first-board release across mixed tools and mixed CMs.
  sourceRefs:
  - 18
  - 19
  - 21
  - 22
  - 23
- name: JITX
  stage: scale-up
  wedge: Requirements-driven PCB generation and optimization with manufacturing rules captured in code.
  pricing: Standard licensing; public price not listed.
  strength: Strong upstream automation for board design and validation.
  weaknessVsUs: Focused upstream on design generation, not CM-ready RFQ packets, approved alternates, or bring-up/release traceability.
  sourceRefs:
  - 26
- name: Fictiv
  stage: scale-up
  wedge: Service-heavy digital manufacturing, NPI, and supply-chain orchestration from prototype to production.
  pricing: Quote-based manufacturing and engineering services.
  strength: Strong DFM/DFX expertise, quality processes, and execution support.
  weaknessVsUs: Tied to its manufacturing network and broader mechanical scope rather than a neutral electronics handoff system of record.
  sourceRefs:
  - 10
  - 11
  - 13
  - 16
  - 17
- name: Atech
  stage: seed
  wedge: Prompt-native hardware configuration and code generation for very early hardware creation.
  pricing: Pre-order/waitlist; public pricing not listed.
  strength: Category-shaping UX for AI-generated hardware concepts.
  weaknessVsUs: More likely to generate downstream handoff demand than to solve CM-ready release complexity.
  sourceRefs:
  - 1
- name: KiCad + spreadsheets + distributor portals
  stage: open-source
  wedge: Zero-license-cost PCB design with flexible exports and broad interoperability.
  pricing: Free software plus manual labor.
  strength: Credible default for lean teams and increasingly interoperable with proprietary formats.
  weaknessVsUs: No managed BOM health, approval workflow, or release-traceability layer.
  sourceRefs:
