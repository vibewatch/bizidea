  validationPlan:
  - priority: high
    question: 'Which artifact is the true wedge: BOM alternates, RFQ packet generation, or bring-up/test planning?'
    evidenceToGather: Collect the last three release packages from 10 target teams and time each manual step end-to-end.
  - priority: high
    question: Will CTOs trust machine-generated alternates and DFM flags enough to send them to a CM?
    evidenceToGather: Run concierge pilots with 5 CMs or design consultancies and score false positives/false negatives on live boards.
  - priority: medium
    question: Is budget software-first or service-first at the first pilot-build trigger?
    evidenceToGather: Test paid design-review + release-package concierge offers before offering pure software contracts.
  - priority: medium
    question: 'Which channel converts fastest: direct founder sales, CMs, or consultancies?'
    evidenceToGather: Track intro-to-pilot conversion and time-to-close across each channel for the first 20 opportunities.
