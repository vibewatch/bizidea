    - 15
  partnershipEcosystem:
  - point: Part-data and risk partners such as Octopart, SiliconExpert, and Z2Data are core to any credible alternates/reliability workflow.
    sourceRefs:
    - 20
    - 24
    - 36
    - 37
  - point: Cloud PLM and release-system integrations help the product avoid becoming just another export utility.
    sourceRefs:
