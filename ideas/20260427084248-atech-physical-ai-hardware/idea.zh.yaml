problem: >-
  提示词驱动的工具确实能加速最初的硬件概念生成，不过它解决不了把设计真正落到可制造试点板上的脏活累活。种子到 Series A 阶段的机器人和工业设备团队，依然要把大量时间耗在 BOM 清洗、替代料检索、DFM
  反馈、固件首板调试规划和供应商询价包整理上。这个断层会带来反复重板、试点延期，以及在证实市场牵引最关键的时候，不得不花大价钱依赖顾问。
targetUser:
  primary: 正在为试点部署开发第一块自研控制板的种子到 Series A 机器人创业公司创始电气工程师和 CTO
  secondary: 帮工业设备创业公司从开发板迁移到定制板的嵌入式系统咨询公司
  buyer: CTO 或硬件负责人
startupThesis:
  nonObviousInsight: 一旦自然语言工具把硬件概念生成变快，瓶颈就会顺着流程下移到生产交接；可制造性、供料风险和首板调试纪律，今天仍散落在碎片化的经验知识里。
  beachhead: 从现成开发板切换到第一块自研 PCB、准备生产 10-500 台试点设备的机器人和工业设备创业团队
  wedge: 一层 AI 交接系统，吃进需求、原理图或提示词生成的配置，吐出经过 DFM 检查的 BOM、审核过的替代料、固件首板调试清单和可直接发给代工厂的 RFQ 询价包
  whyNowCatalyst: Atech 拿到融资并开放候补名单，说明提示词驱动的硬件创建正在到来，原型到生产的交接自然成了下一处急性瓶颈。
  ventureScalePath: 先抓住创业公司第一块板的交接流程，再扩展到持续性的硬件项目管理、经批准的元器件知识图谱、供应商绩效数据，以及覆盖机器人、无人机、工业 IoT 和 OEM 设计伙伴的合规流程。
solution: >-
  团队上传需求文档、原理图导出文件、BOM 或 AI
  生成的硬件配置后，产品会把它转换成一套试点构建发布包。系统会标出生命周期和供货风险，推荐替代料，生成制造备注和首板调试测试，并把询价所需文件整理成可直接发给代工厂的格式。它还能把产品意图与元器件决策之间的链路保留下来，让小团队说清为什么设计变了、哪些地方必须重新证实。随着供应商反馈、被接受的替代料和首板调试失败案例不断积累，系统会在每一次新板修订上给出更准的建议。
goToMarketSeed:
  firstCustomer: 一家 10-80 人的仓储机器人创业公司 CTO，团队只有一两名电气工程师，却正准备跑第一次 50-200 台试点量产
  buyingTrigger: 团队确认试点部署，开发板原型已撑不住，需要开始向代工厂请求报价
  currentAlternative: 在 Altium 或 KiCad 导出文件、电子表格、分销商门户、代工厂邮件线程和外部 EE 顾问之间手工来回折腾
  switchingReason: 不用额外招聘硬件运营负责人，就能省掉数周容易出错的发布准备工作，并把重板风险压下来
  pricingHypothesis: 按活跃硬件项目收取年度平台费，再按每次发往制造环节的板卡修订收取使用费
