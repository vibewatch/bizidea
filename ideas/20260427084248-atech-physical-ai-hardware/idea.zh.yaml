differentiator: >-
  这不是一个帮人更快画电路的泛用 CAD copilot。它盯住的是创业公司最烧钱、最烧时间的原型到生产交接：元器件风险、制造就绪度、RFQ
  打包，以及固件首板调试纪律。真正有防守力的数据资产，是一张不断扩张的图谱——哪些替代料被接受、哪些供应商结果更好、哪些 DFM
  问题反复出现、哪些首板调试失败和真实板卡修订有关。随着更多设计经过平台并走进制造环节，这个反馈回路只会越来越强。
