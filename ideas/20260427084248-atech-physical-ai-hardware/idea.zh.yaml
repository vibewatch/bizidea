jobsToBeDone:
  - job: 当团队准备从开发板原型切到定制试点板时，帮 CTO 整理出一套可制造的发布包，好让团队更快拿到报价并避开昂贵的重板。
    currentAlternative: 手工电子表格、与代工厂反复沟通，以及顾问评审
    successMetric: 从设计冻结到拿到第一份可接受代工报价的天数，以及首次首板调试成功率
  - job: 当生成中的 BOM 或初稿 BOM 里混进高风险元器件时，帮创始电气工程师快速找出安全替代料并把变更留痕，好让试点排期不被拖垮。
    currentAlternative: 去分销商网站检索，再做临时性的内部评审
    successMetric: 在不改动部署时间线的前提下，解决的供料阻塞数量
ideaScorecard:
  signalStrength:
    score: 4
    rationale: 两条同日、已核验的来源，同时给出投资证实和提示词驱动硬件生成的真实产品信号。
  painIntensity:
    score: 5
    rationale: 第一块板的制造失误既烧钱又卡进度，对小型硬件团队尤其痛。
  wedgeClarity:
    score: 5
    rationale: 原型到生产交接是一个边界清晰的窄流程，产出、买方和切换时点都很明确。
  defensibility:
    score: 4
    rationale: 替代料结果、DFM 发现和供应商反馈会逐步堆成一张很难复制的流程图谱。
  ventureScale:
    score: 4
    rationale: 滩头市场本身不大，不过这套流程可进一步扩成多个大型设备品类泛用的硬件项目操作系统。
topRisks:
  - name: 现有设计工具可能补上相似功能
    description: PCB 和 PLM 厂商可能会沿着设计工具链继续往上，切进制造交接。
    mitigation: 抢先拿住跨工具流程，并积累泛用设计套件拿不到的供应商结果数据。
  - name: 滩头市场可能还太早，付费意愿不足
    description: 小型创业公司也许很喜欢这套流程，不过在真正靠近量产前未必愿意掏钱。
    mitigation: 只在试点构建触发点切入，并把 ROI 明确绑定到避免重板、减少顾问支出和缩短报价周期上。
  - name: 错误建议可能带来硬件责任风险
    description: 如果替代料或发布指导有误，可能导致板卡失败并直接伤害信任。
    mitigation: 初期坚持 human-in-the-loop 审核、透明的置信度分数，以及把范围收窄到可审阅的制造工件，而不是自动签核。
