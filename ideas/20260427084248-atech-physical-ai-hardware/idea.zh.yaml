jobsToBeDone:
- job: 当我们的团队从开发板原型转向定制试产板时，帮助 CTO 打包出可制造的发版版本，以便更快获取报价并避免代价高昂的重转板。
  currentAlternative: 手工表格、与 CM 反复沟通以及顾问评审
  successMetric: 从设计冻结到首个可接受 CM 报价，以及首次 bring-up 成功的天数
- job: 当生成式或草稿版 BOM 包含高风险器件时，帮助创始 EE 找到安全的替代料并记录变更，从而保证试产进度不被打乱。
  currentAlternative: 分销商检索和临时性的内部审查
  successMetric: 在不改变部署时间线的前提下解决的采购阻塞数量
ideaScorecard:
  signalStrength:
    score: 4
    rationale: 两条当天验证来源同时证明了投资人认可，以及提示驱动硬件生成产品已经上线的主张。
  painIntensity:
    score: 5
    rationale: 首板制造错误成本高、对进度影响关键，并且会给小型硬件团队带来巨大痛苦。
  wedgeClarity:
    score: 5
    rationale: 原型到量产交接是一个边界清晰的工作流，拥有明确的输出物、买方和切换时点。
  defensibility:
    score: 4
    rationale: 替代料结果、DFM 发现和供应商反馈形成的结果数据，可以逐步沉淀为难以复制的工作流图谱。
  ventureScale:
    score: 4
    rationale: 切入市场虽然较窄，但该工作流可以扩展为多个大型设备品类中重复性硬件项目的操作系统。
topRisks:
- name: 现有设计工具加入类似功能
  description: PCB 和 PLM 厂商可能从设计创作环节向上延伸至制造交接环节。
  mitigation: 占据跨工具工作流，并积累通用设计套件无法捕获的专有供应商结果数据。
- name: 切入市场可能阶段过早，付费意愿不足
  description: 小型初创公司可能喜欢这套工作流，但在接近量产前仍会犹豫是否购买。
  mitigation: 在试产触发点精准销售，并围绕避免重转板、减少顾问支出和缩短报价时间来包装 ROI。
- name: 错误建议可能带来硬件责任风险
  description: 错误的替代料或发版指导可能导致板卡失败并损害信任。
  mitigation: 先从人机协同审批、清晰的置信度评分以及围绕可审查制造工件的狭窄范围切入，而不是追求自动签核。
