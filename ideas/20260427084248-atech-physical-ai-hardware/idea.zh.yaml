problem: 提示词驱动工具可以加快最初的硬件概念设计，但还解决不了把生成方案真正变成可制造试产版本所需的脏活累活。处于 seed 阶段的机器人与工业设备团队，仍要把大量时间耗在 BOM 清理、替代料调研、DFM 反馈、固件 bring-up 规划，以及给供应商整理报价包上。这个缺口会带来反复改版、试点日期延误，以及在团队最需要证明现场牵引力的时候，不得不高成本依赖顾问。
targetUser:
  primary: 正在为试点部署打造首块自定义控制板、处于 seed 到 Series A 阶段的机器人初创公司中的创始电气工程师与 CTO
  secondary: 帮助工业设备初创公司从开发板转向自定义电路板的嵌入式系统咨询公司
  buyer: CTO 或硬件负责人
startupThesis:
  nonObviousInsight: 当自然语言工具把硬件概念生成变得很快，真正的瓶颈就会下移到量产移交环节——可制造性、采购风险和 bring-up 纪律，至今仍散落在碎片化的经验知识里。
  beachhead: 从现成开发板切换到首块自定义 PCB、准备交付 10-500 台试点设备的机器人与工业设备初创团队
  wedge: 一层 AI 移交系统，接收需求、原理图或提示词生成的硬件配置，然后输出经过 DFM 检查的 BOM、获批替代料、固件 bring-up 清单，以及合同制造商可直接使用的 RFQ 报价包
  whyNowCatalyst: Atech 已拿到融资且上线候补名单，说明基于提示词的硬件创建正在到来，原型到量产的移交因此成为下一个尖锐瓶颈。
  ventureScalePath: 先从初创团队的首板移交流程切入，再扩展到持续性的硬件项目管理、获批元器件知识图谱、供应商表现数据，以及覆盖机器人、无人机、工业 IoT 和 OEM 设计合作伙伴的合规工作流。
solution: 团队上传需求文档、原理图导出文件、BOM，或 AI 生成的硬件配置后，产品会把这些材料转成试产发布包。软件会标记生命周期和采购风险、推荐替代料、生成制造说明和 bring-up 测试，并整理出合同制造商可直接报价的文件。系统还能保留从产品意图到元器件决策的可追踪链路，让小团队讲清楚设计为什么改、哪些部分必须重新验证。随着时间推移，系统再从供应商反馈、被接受的替代料和 bring-up 失败案例里学习，让每一版新电路板的建议都更准。
goToMarketSeed:
  firstCustomer: 一家 10-80 人的仓储机器人初创公司的 CTO，团队正准备首次 50-200 台试点量产，但内部只有一两名电气工程师
  buyingTrigger: 团队正式决定推进试点部署，并在开发板原型已经不够用后，需要向合同制造商发起报价
  currentAlternative: 依赖 Altium 或 KiCad 导出文件、电子表格、分销商门户、CM 邮件往来，以及外部 EE 顾问组成的手工流程
  switchingReason: 不用再专门招聘硬件运营负责人，也能省下数周高出错率的发布准备时间，并降低反复改板风险
  pricingHypothesis: 按活跃硬件项目收取年度平台费，再对每次送去制造的板卡版本按发布次数收费
