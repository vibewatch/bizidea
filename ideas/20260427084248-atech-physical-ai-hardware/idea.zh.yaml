jobsToBeDone:
  - job: 当团队要从开发板原型切到定制试点板时，帮 CTO 把可制造的发布包整理好，这样就能更快拿到报价，并避免一次代价高昂的返工改版。
    currentAlternative: 手工表格、与 CM 的来回沟通，以及顾问评审
    successMetric: 从设计冻结到拿到首个可接受 CM 报价的天数，以及首轮 bring-up 成功率
  - job: 当生成态或草稿态 BOM 里出现高风险器件时，帮创始 EE 找到安全的替代料并记录变更，这样试点进度就不会被采购问题拖住。
    currentAlternative: 去分销商网站搜索，再靠内部临时评审
    successMetric: 在不影响部署时间表的前提下被解决的采购阻塞数量
ideaScorecard:
  signalStrength:
    score: 4
    rationale: 两个同日且已验证的来源同时给出投资人背书和真实产品信号，说明提示词驱动的硬件生成已经开始形成。
  painIntensity:
    score: 5
    rationale: 首板制造出错代价高、卡工期，而且对小型硬件团队非常痛。
  wedgeClarity:
    score: 5
    rationale: 原型到量产的移交流程很窄、输出明确、买家清楚，切换时点也非常具体。
  defensibility:
    score: 4
    rationale: 来自替代料、DFM 发现和供应商响应的结果数据，可以逐步积累成难以复制的工作流图谱。
  ventureScale:
    score: 4
    rationale: 滩头市场虽然很窄，但这个工作流有机会扩展成多个大型设备品类里重复硬件项目的操作系统。
topRisks:
  - name: 现有设计工具补上类似功能
    description: PCB 与 PLM 厂商可能会从设计创作层继续往上延伸，进入制造移交环节。
    mitigation: 抢占跨工具工作流，并积累通用设计套件拿不到的专有供应商结果数据。
  - name: 滩头市场可能还太早，不愿意付费
    description: 小型初创团队可能非常喜欢这个工作流，但在临近量产前仍不愿真正掏钱。
    mitigation: 就卡在试产触发点成交，并把 ROI 包装成避免返工改版、节省顾问费用和缩短报价时间。
  - name: 错误建议可能带来硬件责任风险
    description: 不正确的替代料或发布建议，可能导致板卡失效并损害信任。
    mitigation: 初期采用人工在环审批、清晰的置信度评分，以及把范围限制在可复核的制造交付物，而不是自动签核。
