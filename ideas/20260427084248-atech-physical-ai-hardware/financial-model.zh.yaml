scenarios:
  downside:
    description: 市场对机器辅助替代料的信任仍偏低，因此公司卖出的年度合同更少，服务型试点更多。
    y3RevenueK: 780.0
    y3EbitdaK: -760.0
    cashLowPointK: 410.0
    keyAssumptionChanges:
    - 混合 ARPU 降至 $27K。
    - Y3 期末客户数从 65 降至 50。
    - 由于支持仍高度依赖人工，毛利率压缩至 70%。
  base:
    description: 创始人主导销售加上早期伙伴转介绍，使付费账户从 Y1 的 4 个稳步增长到 Q4Y3 的 65 个。
    y3RevenueK: 1136.25
    y3EbitdaK: -450.31
    cashLowPointK: 1019.56
    keyAssumptionChanges:
    - 混合 ARPU 保持在 $30K。
    - 在服务扩张有限的情况下，毛利率维持在 75%。
    - 招聘按分阶段计划推进，销售岗位招聘推迟到 Q2Y2 验证之后。
  upside:
    description: 咨询公司和 CM 渠道转化速度快于预期，在无需大幅扩大团队的前提下，同时提升客户数和使用收入。
    y3RevenueK: 1520.0
    y3EbitdaK: -180.0
    cashLowPointK: 980.0
    keyAssumptionChanges:
    - 混合 ARPU 升至 $32K。
    - Y3 期末客户数达到 80。
    - 随着导入更加产品化，毛利率提升至 78%。
