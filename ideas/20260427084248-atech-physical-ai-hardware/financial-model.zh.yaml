slug: prototype-to-production-os
date: 2026-04-27
currency: USD
modelStartMonth: 2026-05
assumptions:
  - id: A1
    name: 起始付费客户数。
    value: "0"
    unit: count
    source: "[BP executiveSummary] 公司仍处于上线前阶段，正在证实 10 次共创客户拆解和首批真实试点。"
  - id: A2
    name: 每个付费账户的混合年化 ARPU
    value: "30.0"
    unit: K USD
    source: "[BP gtm pricing] 年度合同区间为 $20k-$35k，外加按次计费的发布费用；模型保守按试点转正后的混合 $30k 估算。"
  - id: A3
    name: 毛利率目标
    value: "75.0"
    unit: pct
    source: "[BP businessModel.targetGrossMarginPct]"
  - id: A4
    name: 月度 logo churn
    value: "1.4"
    unit: pct
    source: "[Research openQuestions + startup-finance heuristic] 在证实第二项目扩张成立之前，面向小型硬件团队的前期流程软件应假设存在温和流失。"
  - id: A5
    name: Y1 新增客户数
    value: "4"
    unit: count
    source: "[BP milestones 0-12 months] 签下 3-5 个付费试点，并把至少 2 个转成年度合同；模型按年末 4 个付费账户估算。"
  - id: A6
    name: Y2 年末客户数
    value: "18"
    unit: count
    source: "[BP milestones 12-24 months] 达到 15-20 个付费账户，并跑通可复制上手。"
  - id: A7
    name: Y3 年末客户数
    value: "65"
    unit: count
    source: "[BP market.som + BP milestones 24-36 months] 第 3 年情形目标约为 65 个付费账户。"
  - id: A8
    name: Y2 季度净增客户
    value: 3, 4, 4, 3
    unit: customers per quarter
    source: "[BP milestones + startup-finance heuristic] 采用创始人主导销售与前期伙伴转介绍驱动的保守爬坡。"
  - id: A9
    name: Y3 季度净增客户
    value: 7, 10, 15, 15
    unit: customers per quarter
    source: "[BP gtm channels + BP milestones 24-36 months] 假设直销加代工厂 / 咨询伙伴转介绍开始放量。"
  - id: A10
    name: 创始产品与硬件运营负责人薪酬
    value: "120"
    unit: K USD annual loaded
    source: "[BP team] 按创始人低于市场价的创业阶段薪酬估算。"
  - id: A11
    name: 工程岗位薪酬区间
    value: 140-150
    unit: K USD annual loaded
    source: "[BP team + startup-finance heuristic] 对应 1 名创始工程师、1 名应用数据 / 流程工程师，以及后续 1 名高级工程师。"
  - id: A12
    name: 解决方案工程师薪酬
    value: "110"
    unit: K USD annual loaded
    source: "[BP team] 第 6 个月入职的客户侧技术岗位。"
  - id: A13
    name: 客户成功与伙伴经理薪酬
    value: "95"
    unit: K USD annual loaded
    source: "[BP team] 第 9 个月入职，用于撑起转正与伙伴渠道。"
  - id: A14
    name: 销售岗位薪酬
    value: "120"
    unit: K USD annual loaded OTE
    source: "[Startup-finance heuristic] 在完成初步证实后，补入前期 AE / BD 角色来支持创始人主导销售。"
  - id: A15
    name: G&A 与运营岗位薪酬
    value: "90"
    unit: K USD annual loaded
    source: "[Startup-finance heuristic] 只有当上手和伙伴流程趋于可复制时，才补入精简运营支持。"
  - id: A16
    name: Y1 非人力 OPEX
    value: 12-18
    unit: K USD per month
    source: "[BP operations + startup-finance heuristic] 覆盖云成本、数据交付商、差旅、法务、安全与内容支出；此时产品仍带 concierge 支持。"
  - id: A17
    name: Y2 非人力 OPEX
    value: 19-25
    unit: K USD per month
    source: "[BP operations + startup-finance heuristic] 随着上手放量，工具、伙伴差旅和合规开销上升。"
  - id: A18
    name: Y3 非人力 OPEX
    value: 24-26
    unit: K USD per month
    source: "[BP operations + startup-finance heuristic] 中等规模下持续承担数据交付商、安全和 GTM 支持成本。"
  - id: A19
    name: Fully diluted CAC
    value: "13.5"
    unit: K USD per new customer
    source: "[BP gtm funnelTargets + startup-finance heuristic] 创始人主导外呼加伙伴转介绍，理论上能把 CAC 压在首年毛利以下。"
  - id: A20
    name: 模型起始现金
    value: "2800.0"
    unit: K USD
    source: "[BP fundingAsk.targetFundingRangeUsd] 采用 $2.8M pre-seed，位于所述 $2-4M 区间中部。"
  - id: A21
    name: 销售周期
    value: "90"
    unit: days
    source: "[Research buyingTriggers + startup-finance heuristic] 由于代工报价 deadline 很硬，评估周期应短于宽泛的企业软件。"
