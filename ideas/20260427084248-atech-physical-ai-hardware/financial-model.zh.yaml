slug: prototype-to-production-os
date: 2026-04-27
currency: USD
modelStartMonth: 2026-05
assumptions:
- id: A1
  name: 期初付费客户数
  value: '0'
  unit: count
  source: '[BP executiveSummary] 公司尚未正式发布，仍在验证 10 个设计合作伙伴拆解与首批真实试点。'
- id: A2
  name: 每个付费账户的混合年度 ARPU
  value: '30.0'
  unit: K USD
  source: '[BP gtm pricing] 年度合同为 $20k-$35k，另加按次计费发版；模型在试点转化后按保守的混合 $30k 计。'
- id: A3
  name: 目标毛利率
  value: '75.0'
  unit: pct
  source: '[BP businessModel.targetGrossMarginPct]'
- id: A4
  name: 月度客户流失率
  value: '1.4'
  unit: pct
  source: '[Research openQuestions + startup-finance heuristic] 面向小型硬件团队的早期工作流软件，在第二项目扩展被证明前，应假设流失率较为温和。'
- id: A5
  name: Y1 新增客户
  value: '4'
  unit: count
  source: '[BP milestones 0-12 months] 达成 3-5 个付费试点，并至少将其中 2 个转化为年度软件合同；模型按年末 4 个付费账户计算。'
- id: A6
  name: Y2 期末客户数
  value: '18'
  unit: count
  source: '[BP milestones 12-24 months] 达到 15-20 个付费账户，并实现可重复导入。'
- id: A7
  name: Y3 期末客户数
  value: '65'
  unit: count
  source: '[BP market.som + BP milestones 24-36 months] 在第 3 年情景中达到约 65 个付费账户。'
- id: A8
  name: Y2 各季度净增
  value: 3, 4, 4, 3
  unit: customers per quarter
  source: '[BP milestones + startup-finance heuristic] 基于创始人主导销售和早期渠道转介绍的保守增长曲线。'
- id: A9
  name: Y3 各季度净增
  value: 7, 10, 15, 15
  unit: customers per quarter
  source: '[BP gtm channels + BP milestones 24-36 months] 加速增长假设直销以及 CM 和咨询伙伴转介绍开始奏效。'
- id: A10
  name: 创始产品与硬件运营负责人薪酬
  value: '120'
  unit: K USD annual loaded
  source: '[BP team] 采用创始人在初创阶段低于市场水平的薪酬假设。'
- id: A11
  name: 工程岗位薪酬区间
  value: 140-150
  unit: K USD annual loaded
  source: '[BP team + startup-finance heuristic] 包含 1 名创始工程师、1 名应用数据/工作流工程师，以及后续加入的 1 名资深工程师。'
- id: A12
  name: 解决方案工程师薪酬
  value: '110'
  unit: K USD annual loaded
  source: '[BP team] 在第 6 个月招聘面向客户的技术岗位。'
- id: A13
  name: 客户成功与合作伙伴经理薪酬
  value: '95'
  unit: K USD annual loaded
  source: '[BP team] 在第 9 个月招聘，以支持转化和转介绍渠道。'
- id: A14
  name: 销售岗位薪酬
  value: '120'
  unit: K USD annual loaded OTE
  source: '[Startup-finance heuristic] 在初步验证后设置早期 AE/BD 岗位，以支持创始人主导的销售动作。'
- id: A15
  name: 综合行政与运营岗位薪酬
  value: '90'
  unit: K USD annual loaded
  source: '[Startup-finance heuristic] 只有在导入和合作伙伴工作流变得可重复后，才增加精简运营支持。'
- id: A16
  name: Y1 非薪酬运营费用
  value: 12-18
  unit: K USD per month
  source: '[BP operations + startup-finance heuristic] 在产品仍以礼宾式辅助为主时，覆盖云资源、数据提供商、差旅、法务、安全和内容等费用。'
- id: A17
  name: Y2 非薪酬运营费用
  value: 19-25
  unit: K USD per month
  source: '[BP operations + startup-finance heuristic] 随着导入扩张，工具、伙伴差旅和合规开销提升。'
- id: A18
  name: Y3 非薪酬运营费用
  value: 24-26
  unit: K USD per month
  source: '[BP operations + startup-finance heuristic] 在中等规模下，持续发生的数据提供商、安全和市场推进支持成本。'
- id: A19
  name: 完全摊薄 CAC
  value: '13.5'
  unit: K USD per new customer
  source: '[BP gtm funnelTargets + startup-finance heuristic] 创始人主导外拓和伙伴转介绍应使 CAC 低于首年毛利润。'
- id: A20
  name: 模型起始现金
  value: '2800.0'
  unit: K USD
  source: '[BP fundingAsk.targetFundingRangeUsd] 在声明的 $2-4M 区间内，采用 $2.8M 的 pre-seed 融资额。'
- id: A21
  name: 销售周期
  value: '90'
  unit: days
  source: '[Research buyingTriggers + startup-finance heuristic] 由截止时间驱动的 CM 询价事件，相比宽泛企业软件会缩短评估周期。'
