slug: prototype-to-production-os
date: 2026-04-27
currency: USD
modelStartMonth: 2026-05
assumptions:
  - id: A1
    name: 起始付费客户数
    value: "0"
    unit: count
    source: "[BP executiveSummary] 公司仍处于产品上线前阶段，还在验证 10 次设计伙伴流程拆解和首批真实试点。"
  - id: A2
    name: 每个付费账户的混合年度 ARPU
    value: "30.0"
    unit: K USD
    source: "[BP gtm pricing] 年度合同价格在 $20k-$35k，加上按次发布收费；模型按试点转化后的保守混合值 $30k 计算。"
  - id: A3
    name: 毛利率目标
    value: "75.0"
    unit: pct
    source: "[BP businessModel.targetGrossMarginPct]"
  - id: A4
    name: 月度 logo 流失率
    value: "1.4"
    unit: pct
    source: "[Research openQuestions + startup-finance heuristic] 面向小型硬件团队的早期工作流软件，在证明第二项目扩展前，应假设存在适度流失。"
  - id: A5
    name: 第 1 年新增客户数
    value: "4"
    unit: count
    source: "[BP milestones 0-12 months] 拿下 3-5 个付费试点，并至少把 2 个转成年度合同；模型按年末 4 个付费账户估算。"
  - id: A6
    name: 第 2 年期末客户数
    value: "18"
    unit: count
    source: "[BP milestones 12-24 months] 达到 15-20 个付费账户，并让 onboarding 可复制。"
  - id: A7
    name: 第 3 年期末客户数
    value: "65"
    unit: count
    source: "[BP market.som + BP milestones 24-36 months] 第 3 年情境下达到约 65 个付费账户。"
  - id: A8
    name: 第 2 年按季度净新增
    value: "3, 4, 4, 3"
    unit: customers per quarter
    source: "[BP milestones + startup-finance heuristic] 依据创始人销售加早期渠道转介绍的保守爬坡。"
  - id: A9
    name: 第 3 年按季度净新增
    value: "7, 10, 15, 15"
    unit: customers per quarter
    source: "[BP gtm channels + BP milestones 24-36 months] 假设直销叠加 CM 与咨询伙伴转介绍开始真正起效。"
  - id: A10
    name: 创始产品与硬件运营负责人薪资
    value: "120"
    unit: K USD annual loaded
    source: "[BP team] 采用低于市场价的创始团队薪资假设。"
  - id: A11
    name: 工程团队薪资带宽
    value: "140-150"
    unit: K USD annual loaded
    source: "[BP team + startup-finance heuristic] 包含 1 名创始工程师、1 名应用数据/工作流工程师，以及后续 1 名资深工程师。"
  - id: A12
    name: 解决方案工程师薪资
    value: "110"
    unit: K USD annual loaded
    source: "[BP team] 第 6 个月入职的面向客户技术岗位。"
  - id: A13
    name: 客户成功与伙伴经理薪资
    value: "95"
    unit: K USD annual loaded
    source: "[BP team] 第 9 个月入职，用于支撑转化与转介绍渠道。"
  - id: A14
    name: 销售岗位薪资
    value: "120"
    unit: K USD annual loaded OTE
    source: "[Startup-finance heuristic] 在初步验证后，补充早期客户经理/BD 角色，支持创始人主导销售。"
  - id: A15
    name: G&A 与运营岗位薪资
    value: "90"
    unit: K USD annual loaded
    source: "[Startup-finance heuristic] 只有当 onboarding 与伙伴流程开始可复制时，才增配精简运营支持。"
  - id: A16
    name: 第 1 年非薪酬运营支出
    value: "12-18"
    unit: K USD per month
    source: "[BP operations + startup-finance heuristic] 覆盖云资源、数据提供商、差旅、法务、安全和内容投入；此时产品仍以礼宾式服务为主。"
  - id: A17
    name: 第 2 年非薪酬运营支出
    value: "19-25"
    unit: K USD per month
    source: "[BP operations + startup-finance heuristic] 随 onboarding 扩大，工具、伙伴差旅和合规开销同步上升。"
  - id: A18
    name: 第 3 年非薪酬运营支出
    value: "24-26"
    unit: K USD per month
    source: "[BP operations + startup-finance heuristic] 在中等规模下持续承担数据提供商、安全与 GTM 支持成本。"
  - id: A19
    name: 完全摊薄 CAC
    value: "13.5"
    unit: K USD per new customer
    source: "[BP gtm funnelTargets + startup-finance heuristic] 创始人外呼与伙伴转介绍，应让 CAC 保持在首年毛利润以下。"
  - id: A20
    name: 模型起始现金
    value: "2800.0"
    unit: K USD
    source: "[BP fundingAsk.targetFundingRangeUsd] 采用区间 $2-4M 中的 $2.8M pre-seed 作为建模基准。"
  - id: A21
    name: 销售周期
    value: "90"
    unit: days
    source: "[Research buyingTriggers + startup-finance heuristic] 由 CM 报价节点驱动的场景，比宽泛企业软件更容易压缩评估周期。"
