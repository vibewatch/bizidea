scenarios:
  downside:
    description: "客户对机器辅助替代料的信任仍然偏低，因此业务会卖出更少年度合同、更多偏服务型试点。"
    y3RevenueK: 780.0
    y3EbitdaK: -760.0
    cashLowPointK: 410.0
    keyAssumptionChanges:
      - "混合 ARPU 下降到 $27K。"
      - "第 3 年期末客户数从 65 降到 50。"
      - "由于支持仍高度依赖人工，毛利率压缩到 70%。"
  base:
    description: "创始人主导销售加上早期伙伴转介绍，带来稳定爬坡：第 1 年 4 个付费账户，到 Q4Y3 增长到 65 个。"
    y3RevenueK: 1136.25
    y3EbitdaK: -450.31
    cashLowPointK: 1019.56
    keyAssumptionChanges:
      - "混合 ARPU 保持在 $30K。"
      - "在服务蔓延有限的前提下，毛利率维持 75%。"
      - "招聘按分阶段计划推进，销售岗位等到 Q2Y2 验证后再上。"
  upside:
    description: "咨询公司和 CM 渠道的转化快于预期，在不显著扩大团队的情况下同时抬升客户数和按次使用收入。"
    y3RevenueK: 1520.0
    y3EbitdaK: -180.0
    cashLowPointK: 980.0
    keyAssumptionChanges:
      - "混合 ARPU 提高到 $32K。"
      - "第 3 年期末客户数达到 80。"
      - "随着 onboarding 更产品化，毛利率提升到 78%。"
sensitivity:
  - variable: ARPU
    downsideCase: "$27K 混合年度 ARPU"
    baseCase: "$30K 混合年度 ARPU"
    upsideCase: "$33K 混合年度 ARPU"
    y3RevenueImpactK: -113.63
    cashImpactK: -85.0
  - variable: CAC
    downsideCase: "伙伴转化偏弱，CAC 升至 $18K"
    baseCase: "$13.5K CAC"
    upsideCase: "强转介绍带来 $10K CAC"
    y3RevenueImpactK: -170.0
    cashImpactK: -220.0
  - variable: churn
    downsideCase: "月度 churn 2.0%"
    baseCase: "月度 churn 1.4%"
    upsideCase: "月度 churn 1.0%"
    y3RevenueImpactK: -90.0
    cashImpactK: -70.0
  - variable: sales cycle
    downsideCase: "销售周期 6 个月"
    baseCase: "销售周期 90 天"
    upsideCase: "销售周期 60 天"
    y3RevenueImpactK: -140.0
    cashImpactK: -150.0
  - variable: gross margin
    downsideCase: "由于 onboarding 仍偏服务化，GM 降至 70%"
    baseCase: "GM 75%"
    upsideCase: "GM 78%"
    y3RevenueImpactK: 0.0
    cashImpactK: -57.0
  - variable: hiring pace
    downsideCase: "两名 GTM 和运营岗位提前两个季度入职"
    baseCase: "按当前分阶段招聘计划执行"
    upsideCase: "一名非工程岗位推迟一个季度入职"
    y3RevenueImpactK: 0.0
    cashImpactK: -180.0
modelDiagram:
  title: 单位经济流转图
  mermaid: |
    flowchart LR
      Leads --> QualifiedPilots
      QualifiedPilots --> PayingAccounts
      PayingAccounts --> SubscriptionRevenue
      PayingAccounts --> ReleaseUsageRevenue
      SubscriptionRevenue --> GrossProfit
      ReleaseUsageRevenue --> GrossProfit
      GrossProfit --> Opex
      Opex --> Cash
modelSanity:
  - checkName: 收入引擎
    finding: 基准情境收入来自 Q4Y3 达到 65 个付费账户、$30K 混合 ARPU，以及创始人销售叠加伙伴转介绍共同驱动的增长。
  - checkName: 必须跑通的条件
    finding: 付费试点必须足够快地转成年度合同，才能证明应在产品与客户信任建立后再招聘第一位销售。
  - checkName: 模型失效的情形
    finding: 如果客户持续要求人工重度复核替代料，业务就会落入 downside 情境，ARPU 与毛利率一起下滑，现金低点会逼近 $410K。
  - checkName: 下一轮融资证明点
    finding: 当公司在 Q4Y2 前做到 18 个付费账户、onboarding 可复制，并出现来自 CM 或咨询伙伴的真实管线时，seed 融资故事会最有说服力。
sanityChecks:
  ruleOf40: "第 3 年增长 244% + EBITDA 利润率 -40% = 204%"
  burnMultiple: "按约 $450K 净消耗对应约 $1.41M 新增 ARR 计算，第 3 年 burn multiple 约为 0.3x。"
  revenuePerFte: "第 3 年退出时 9 名 FTE 对应 $126K 收入/FTE，低于约 $200-400K 的 SaaS 粗略基准。"
  flags:
    - "收入/FTE 仍低于软件公司常见基准，因此在更大 seed 扩张前，模型还需要更高 ACV、更强自动化，或更克制的招聘节奏。"
    - "毛利率假设建立在人工复核只处理例外情况之上；如果 onboarding 与替代料审批持续服务化，毛利率可能跌破 75% 目标。"
    - "客户爬坡依赖 CM 和咨询伙伴转介绍；研究方向上支持这一点，但公司尚未在市场中完成验证。"
