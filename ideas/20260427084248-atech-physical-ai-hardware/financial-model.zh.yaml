scenarios:
  downside:
    description: 客户对机器辅助替代料的信任拉升更慢，因此公司签下的年度合同更少、服务化试点更多。
    y3RevenueK: 780
    y3EbitdaK: -760
    cashLowPointK: 410
    keyAssumptionChanges:
      - 混合年化 ARPU 降到 $27K。
      - Y3 年末客户数从 65 降到 50。
      - 由于支持仍偏人工，毛利率压到 70%。
  base:
    description: 创始人主导销售加前期伙伴转介绍，撑起客户数从 Y1 的 4 家稳步爬升到 Q4Y3 的 65 家。
    y3RevenueK: 1136.25
    y3EbitdaK: -450.31
    cashLowPointK: 1019.56
    keyAssumptionChanges:
      - 混合年化 ARPU 维持在 $30K。
      - 在服务范围没有失控的前提下，毛利率保持 75%。
      - 招聘按阶段推进，销售岗位等到 Q2Y2 证实成立后再补。
  upside:
    description: 咨询公司和代工厂渠道比预期更快起量，在不显著扩编的情况下同时推高客户数和使用费收入。
    y3RevenueK: 1520
    y3EbitdaK: -180
    cashLowPointK: 980
    keyAssumptionChanges:
      - 混合年化 ARPU 拉升到 $32K。
      - Y3 年末客户数达到 80。
      - 随着上手流程产品化，毛利率扩到 78%。
sensitivity:
  - variable: ARPU
    downsideCase: $27K blended annual ARPU
    baseCase: $30K blended annual ARPU
    upsideCase: $33K blended annual ARPU
    y3RevenueImpactK: -113.63
    cashImpactK: -85
  - variable: CAC
    downsideCase: $18K CAC from weaker partner conversion
    baseCase: $13.5K CAC
    upsideCase: $10K CAC from strong referrals
    y3RevenueImpactK: -170
    cashImpactK: -220
  - variable: 流失率
    downsideCase: 2.0% 月度流失
    baseCase: 1.4% 月度流失
    upsideCase: 1.0% 月度流失
    y3RevenueImpactK: -90
    cashImpactK: -70
  - variable: 销售周期
    downsideCase: 6 个月销售周期
    baseCase: 90 天销售周期
    upsideCase: 60 天销售周期
    y3RevenueImpactK: -140
    cashImpactK: -150
  - variable: 毛利率
    downsideCase: 若上手仍高度依赖服务，则 GM 为 70%
    baseCase: 75% GM
    upsideCase: 78% GM
    y3RevenueImpactK: 0
    cashImpactK: -57
  - variable: 招聘节奏
    downsideCase: 2 个 GTM 与运营岗位提前 2 个季度入职
    baseCase: 按眼下分阶段招聘计划执行
    upsideCase: 1 个非工程岗位延后 1 个季度入职
    y3RevenueImpactK: 0
    cashImpactK: -180
modelDiagram:
  title: 单位经济流转图
  mermaid: |
    flowchart LR
      Leads --> QualifiedPilots
      QualifiedPilots --> PayingAccounts
      PayingAccounts --> SubscriptionRevenue
      PayingAccounts --> ReleaseUsageRevenue
      SubscriptionRevenue --> GrossProfit
      ReleaseUsageRevenue --> GrossProfit
      GrossProfit --> Opex
      Opex --> Cash
modelSanity:
  - checkName: 收入引擎
    finding: 基础情形收入来自 Q4Y3 达到 65 个付费账户，以及在创始人主导销售和伙伴转介绍带动下实现的 $30K 混合 ARPU。
  - checkName: 必须成立的前提
    finding: 付费试点必须够快地转成年度合同，才能证实在 Q2Y2 之后再补首个销售岗位是合理的。
  - checkName: 模型何时会失灵
    finding: 如果客户始终要求人工审核替代料，业务就会滑向 downside 情形：ARPU 和毛利被压低，现金最低点会逼近 $410K。
  - checkName: 下一轮融资证实点
    finding: 当公司在 Q4Y2 做到 18 个付费账户、上手流程可复制，并证实代工厂或咨询伙伴能稳定贡献管线时，seed 叙事才最扎实。
sanityChecks:
  ruleOf40: Y3 增长率 244% + EBITDA 利润率 -40% = 204%
  burnMultiple: 按约 $450K 净烧钱和约 $1.41M 新增 ARR 估算，Y3 burn multiple 约为 0.3x。
  revenuePerFte: $126K Y3 / 9 名期末 FTE，对照粗略 $200-400K SaaS 基准仍偏低。
  flags:
    - 人均收入仍低于软件基准，因此在扩大 seed 轮之前，模型需要更高 ACV、更强自动化，或更克制的招聘节奏。
    - 毛利率默认人工审核只处理例外情况；如果上手和替代料审批持续服务化，毛利率会跌破 75% 目标。
    - 客户爬坡依赖代工厂和咨询伙伴转介绍；研究支持方向成立，不过公司尚未完成真实市场证实。
