modelDiagram:
  title: 单位经济模型流转
  mermaid: "flowchart LR\n  Leads --> QualifiedPilots\n  QualifiedPilots --> PayingAccounts\n  PayingAccounts --> SubscriptionRevenue\n  PayingAccounts --> ReleaseUsageRevenue\n  SubscriptionRevenue --> GrossProfit\n  ReleaseUsageRevenue --> GrossProfit\n  GrossProfit --> Opex\n  Opex --> Cash\n"
modelSanity:
- checkName: 收入引擎
  finding: 基准情景收入来自在创始人主导销售和伙伴转介绍带动下，于 Q4Y3 达到 65 个付费账户、混合 ARPU 为 $30K。
- checkName: 必须成立的条件
  finding: 付费试点必须足够快地转化为年度合同，才能证明应在导入和产品信任被验证后再招聘首名销售。
- checkName: 模型失效条件
  finding: 如果客户持续要求对替代料进行重服务式审核，就会出现下行情景，导致 ARPU 与毛利率下降，并使现金降至约 $410K。
- checkName: 下一轮融资所需证明
  finding: 一旦公司在 Q4Y2 前达到 18 个付费账户、实现可重复导入，并获得一定来自 CM 或咨询伙伴的销售管道，种子轮故事就最具说服力。
sanityChecks:
  ruleOf40: Y3 growth 244% + EBITDA margin -40% = 204%
  burnMultiple: Y3 burn multiple is approximately 0.3x using $450K net burn over roughly $1.41M of net new ARR.
  revenuePerFte: $126K Y3 on 9 exit FTE versus a rough $200-400K SaaS benchmark.
  flags:
  - 每名 FTE 对应收入仍低于软件行业基准，因此在进行更大规模 seed 扩张前，模型需要更高 ACV、更多自动化或更严格的招聘纪律。
  - 毛利率假设人工审查仅限于例外情况；若导入和替代料审批变得重服务化，毛利率可能跌破 75% 目标。
  - 客户增长依赖 CM 和咨询伙伴转介绍，研究在方向上支持这一点，但公司尚未在市场中完成验证。
