  - id: A4
    name: Monthly logo churn
    value: "1.4"
    unit: pct
    source: "[Research openQuestions + startup-finance heuristic] Early workflow software for small hardware teams should assume modest churn until second-program expansion is proven."
  - id: A5
    name: Y1 customer additions
    value: "4"
    unit: count
    source: "[BP milestones 0-12 months] Close 3-5 paid pilots and convert at least 2 into annual software contracts; modeled as 4 paying accounts by year end."
  - id: A6
    name: Y2 ending customers
    value: "18"
    unit: count
    source: "[BP milestones 12-24 months] Reach 15-20 paying accounts with repeatable onboarding."
  - id: A7
    name: Y3 ending customers
    value: "65"
    unit: count
    source: "[BP market.som + BP milestones 24-36 months] Reach roughly 65 paying accounts in the year-3 case."
  - id: A8
    name: Y2 quarterly net adds
    value: "3, 4, 4, 3"
    unit: customers per quarter
    source: "[BP milestones + startup-finance heuristic] Conservative ramp from founder-led sales and early channel referrals."
  - id: A9
    name: Y3 quarterly net adds
    value: "7, 10, 15, 15"
    unit: customers per quarter
    source: "[BP gtm channels + BP milestones 24-36 months] Acceleration assumes direct sales plus CM and consultancy referrals begin to work."
  - id: A10
    name: Founding product and hardware operations lead salary
    value: "120"
    unit: K USD annual loaded
    source: "[BP team] Founder below-market startup salary heuristic."
  - id: A11
    name: Engineering salary band
    value: "140-150"
    unit: K USD annual loaded
    source: "[BP team + startup-finance heuristic] One founding engineer, one applied data/workflow engineer, and one later senior engineer."
  - id: A12
    name: Solutions engineer salary
    value: "110"
    unit: K USD annual loaded
    source: "[BP team] Customer-facing technical hire at month 6."
  - id: A13
    name: Customer success and partner manager salary
    value: "95"
    unit: K USD annual loaded
    source: "[BP team] Hire at month 9 to support conversions and referral channels."
  - id: A14
    name: Sales hire salary
    value: "120"
    unit: K USD annual loaded OTE
    source: "[Startup-finance heuristic] Early account executive/BD role supporting founder-led motion after initial validation."
  - id: A15
    name: G&A and operations hire salary
    value: "90"
    unit: K USD annual loaded
    source: "[Startup-finance heuristic] Lean operations support added only after onboarding and partner workflows become repeatable."
  - id: A16
    name: Y1 non-payroll opex
    value: "12-18"
    unit: K USD per month
    source: "[BP operations + startup-finance heuristic] Covers cloud, data providers, travel, legal, security, and content while product is still concierge-assisted."
  - id: A17
    name: Y2 non-payroll opex
    value: "19-25"
    unit: K USD per month
    source: "[BP operations + startup-finance heuristic] Higher tooling, partner travel, and compliance overhead as onboarding scales."
  - id: A18
    name: Y3 non-payroll opex
    value: "24-26"
    unit: K USD per month
    source: "[BP operations + startup-finance heuristic] Ongoing data-provider, security, and go-to-market support costs at moderate scale."
  - id: A19
    name: Fully diluted CAC
    value: "13.5"
    unit: K USD per new customer
    source: "[BP gtm funnelTargets + startup-finance heuristic] Founder-led outbound and partner referrals should keep CAC below first-year gross profit."
  - id: A20
    name: Starting cash at model start
    value: "2800.0"
    unit: K USD
    source: "[BP fundingAsk.targetFundingRangeUsd] Uses a $2.8M pre-seed inside the stated $2-4M range."
  - id: A21
    name: Sales cycle
    value: "90"
    unit: days
    source: "[Research buyingTriggers + startup-finance heuristic] Deadline-driven CM quote events compress evaluation relative to broad enterprise software."
