scenarios:
  downside:
    description: "Trust stays lower for machine-assisted alternates, so the business sells fewer annual contracts and more service-like pilots."
    y3RevenueK: 780.0
    y3EbitdaK: -760.0
    cashLowPointK: 410.0
    keyAssumptionChanges:
      - "Blended ARPU falls to $27K."
      - "Y3 ending customers fall to 50 instead of 65."
      - "Gross margin compresses to 70% because support stays human-heavy."
  base:
    description: "Founder-led sales plus early partner referrals produce a steady ramp from 4 paying accounts in Y1 to 65 by Q4Y3."
    y3RevenueK: 1136.25
    y3EbitdaK: -450.31
    cashLowPointK: 1019.56
    keyAssumptionChanges:
      - "Blended ARPU stays at $30K."
      - "Gross margin stays at 75% with limited services creep."
      - "Hiring follows the staged plan and sales hiring waits for Q2Y2 proof."
  upside:
    description: "Consultancy and CM channels convert faster than expected, lifting both customer count and usage revenue without needing a much larger team."
    y3RevenueK: 1520.0
    y3EbitdaK: -180.0
    cashLowPointK: 980.0
    keyAssumptionChanges:
      - "Blended ARPU rises to $32K."
      - "Y3 ending customers reach 80."
      - "Gross margin expands to 78% as onboarding becomes more productized."
