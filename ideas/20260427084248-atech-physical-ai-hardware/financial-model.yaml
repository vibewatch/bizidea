modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Leads --> QualifiedPilots
      QualifiedPilots --> PayingAccounts
      PayingAccounts --> SubscriptionRevenue
      PayingAccounts --> ReleaseUsageRevenue
      SubscriptionRevenue --> GrossProfit
      ReleaseUsageRevenue --> GrossProfit
      GrossProfit --> Opex
      Opex --> Cash
modelSanity:
  - checkName: Revenue engine
    finding: Base-case revenue comes from reaching 65 paying accounts by Q4Y3 at a $30K blended ARPU driven by founder-led sales and partner referrals.
  - checkName: Must go right
    finding: Paid pilots must convert into annual contracts quickly enough to justify the first sales hire only after onboarding and product trust are proven.
  - checkName: Model breaks if
    finding: The downside case appears if customers keep demanding service-heavy review of alternates, which cuts ARPU and margin and drives cash toward roughly $410K.
  - checkName: Next-round proof
    finding: The seed story is strongest once the company reaches 18 paying accounts with repeatable onboarding and at least some CM or consultancy-sourced pipeline by Q4Y2.
sanityChecks:
  ruleOf40: "Y3 growth 244% + EBITDA margin -40% = 204%"
  burnMultiple: "Y3 burn multiple is approximately 0.3x using $450K net burn over roughly $1.41M of net new ARR."
  revenuePerFte: "$126K Y3 on 9 exit FTE versus a rough $200-400K SaaS benchmark."
  flags:
    - "Revenue per FTE is still below software benchmarks, so the model needs higher ACV, more automation, or tighter hiring discipline before a large seed expansion."
    - "Gross margin assumes human review remains scoped to exceptions; if onboarding and alternate approval become service-heavy, margin can fall below the 75% target."
    - "The customer ramp relies on CM and consultancy referrals that research supports directionally but the company has not yet validated in-market."
