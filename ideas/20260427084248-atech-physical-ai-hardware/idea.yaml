differentiator: >-
  This is not a generic CAD copilot that helps draw circuits faster. It owns
  the prototype-to-production handoff where startups actually burn cash:
  component risk, manufacturing readiness, RFQ packaging, and firmware
  bring-up discipline. The defensible data asset is a growing graph of accepted
  alternates, supplier outcomes, DFM issues, and bring-up failures tied to
  real board revisions. That feedback loop gets stronger as more designs move
  through the platform and into manufacturing.
