topRisks:
  - name: Incumbent design tools add similar features
    description: PCB and PLM vendors could extend upward from design authoring into manufacturing handoff.
    mitigation: Own the cross-tool workflow and accumulate proprietary supplier outcome data that generic design suites do not capture.
  - name: Beachhead may be too early-stage to pay
    description: Small startups may love the workflow but hesitate to buy until they are close to production.
    mitigation: Sell at the exact pilot-build trigger and package ROI around avoided respins, consultant spend, and time-to-quote savings.
  - name: Bad recommendations could create hardware liability
    description: Incorrect alternates or release guidance could cause failed boards and trust loss.
    mitigation: Start with human-in-the-loop approvals, clear confidence scoring, and a narrow scope around reviewable manufacturing artifacts rather than autonomous signoff.
