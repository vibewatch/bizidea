jobsToBeDone:
  - job: When our team is moving from a dev-board prototype to a custom pilot board, help our CTO package a manufacturable release, so they can get quotes quickly and avoid a costly respin.
    currentAlternative: Manual spreadsheets, CM back-and-forth, and consultant review
    successMetric: Days from design freeze to first acceptable CM quote and first-pass bring-up success
  - job: When a generated or draft BOM contains risky parts, help the founding EE find safe alternates and document changes, so they can keep the pilot schedule on track.
    currentAlternative: Distributor searches and ad hoc internal review
    successMetric: Number of sourcing blockers resolved without changing the deployment timeline
