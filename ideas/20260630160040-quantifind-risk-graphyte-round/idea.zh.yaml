jobsToBeDone:
- job: 当一条跨境制裁或 AML 预警进队列时，帮调查员在本地规则约束下尽快拉齐证据，让他们能在不踩内部控制红线的前提下清案或升级。
  currentAlternative: 在案件工具、供应商门户、共享盘和离岸分析交接之间手工研究。
  successMetric: 案件处置的中位耗时，以及首轮审核就能拿出完整带引证据的案件占比。
- job: 当我们要在金融犯罪运营里试点 AI 时，帮合规负责人先定清楚智能体能做什么、人怎么留在环里，这样自动化才能上线而不被治理评审打回。
  currentAlternative: 静态操作手册、政策 PDF、一次性试点护栏，以及需要人工盯着的通用 AI 副驾。
  successMetric: 从试点获批到生产上线的时间，以及带有效审核节点记录的智能体动作占比。
