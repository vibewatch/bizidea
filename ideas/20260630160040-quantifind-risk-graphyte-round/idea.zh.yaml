topRisks:
- name: 规则包维护负担
  description: 要同时跟上制裁、AML 和数据共享制度在各辖区的变化，运营可能会很重，也会拖慢扩张。
  mitigation: 先盯住三个金融中心，把规则包做成模块化，并和区域顾问伙伴一起更新。
- name: 从试点到生产的怀疑
  description: 银行合规团队可能愿意批只读实验，却不肯把线上工作流权限交给智能体。
  mitigation: 先上受限的取证任务、强制人工节点和逐动作日志，再逐步卖更深的自动化。
- name: 现有厂商打包工作流
  description: 案件管理或筛查厂商可能会补上轻量智能体控制能力，并直接塞进现有银行合同。
  mitigation: 靠跨厂商治理、辖区深度和在混合栈上更快落地来赢；单一厂商工具通常做不到这点。
