problem: 全球银行想让 AI 帮忙清理制裁和 AML 调查队列，真正卡住的却不是模型有没有。各地区升级规则、数据访问边界和叙事标准都不一样，所以一个能在多套系统里自由搜索、总结或给建议的智能体，还没带来提效，先成了治理问题。今天的调查仍在现有案件工具、供应商门户、共享盘和离岸分析团队之间来回跳，拉长了结案时间，也让智能体试点卡在合规审批。
targetUser:
  primary: 在跨境预警运营里负责制裁调查和金融犯罪转型的全球交易银行负责人。
  secondary: 负责调查标准的区域 AML 政策负责人和金融犯罪 QA 经理。
  buyer: 全球金融犯罪负责人、首席合规官，或交易银行 COO。
startupThesis:
  nonObviousInsight: 银行并不缺案件系统、筛查工具和风险数据。真正变的是，AI 现在已经能做实打实的调查动作，因此缺的不是再一套模型，而是一层能按辖区约束智能体行为、保住人工节点、并把每一步都变成可辩护证据的运行时。最后赢的不会是最聪明的金融犯罪模型，而是那层能让智能体工作进入受监管运营的控制平面。
  beachhead: 在伦敦、迪拜和新加坡跨境处理代理行业务与贸易融资预警的 Tier-1 和 Tier-2 交易银行；这些地方的区域调查团队遵循不同的制裁、 AML 和数据共享规则，但共用一条全球案件队列。
  wedge: 做一层调查控制平面：通过合规连接器放出受限 AI 办案智能体，去收集支付链路、受益所有权、负面舆情和历史案件证据；再按辖区规则包校验，只把打上异常分的草稿连同完整审计日志交给人工调查员。
  whyNowCatalyst: Quantifind 围绕 Graphyte Agentic Middleware、监管对齐和本地化风险情报拿到 $200 million 投资，说明银行现在已经想让 AI 真正下场做金融犯罪工作，但前提是必须先过一层按地区可监管的治理层。
  ventureScalePath: 先吃下跨境制裁和 AML 调查，再往代理行尽调、贸易融资筛查、KYC 刷新、SAR 辅助起草、托管服务监督，最终扩成受监管风险运营的一整层智能体治理系统。
solution: 产品不替换现有案件管理和筛查系统，而是压在它们上面。它吃进案件元数据、客户记录、历史预警结果和本地规则，再为负面舆情收集、受益所有权梳理、支付链路核对这类窄任务放出最小权限智能体。上层监督模块会拿辖区规则包逐步校验每个动作，敏感步骤必须人工批准，最后按各区域团队现成格式吐出带引文的调查备忘录。银行因此能更快把案子拼起来，又不用把一只通用智能体不设防地放进受监管工作流。时间一久，公司还能沉淀一套动作结果数据集，知道哪些智能体操作剧本清预警最快、又不会踩规则红线。
goToMarketSeed:
  firstCustomer: 第一批客户应是同时在伦敦、迪拜和新加坡做 USD 清算与贸易融资的全球银行制裁调查团队，已在用 NICE Actimize 或 Quantexa，再配共享服务调查员。
  buyingTrigger: 当银行批准金融犯罪调查的 AI 试点，或新开一个区域入账中心时，合规团队就得立刻回答：智能体能看什么数据、哪些步骤必须保留人工审批。
  currentAlternative: 现有替代方案是案件管理套件、离岸调查团队、内部操作手册，以及在供应商门户和共享盘之间手工拉证据。
  switchingReason: 这层控制平面让银行保留现有栈的同时，加上一层受治理的智能体执行、区域规则一致性和逐动作审计轨迹；这些都是通用 AI 副驾 和服务团队给不了的。
  pricingHypothesis: 按受治理工作流、启用的辖区规则包和调查量收企业年费，起步价大概率在 $250k-$1M ARR，外加实施费。
