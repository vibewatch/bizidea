differentiator: 现有 AML 平台负责存案件和风险数据，咨询公司写政策文档，共享服务团队做手工研究。这家公司占住的是它们中间那层控制运行时：哪类智能体能做什么，用哪些数据，套用哪套区域规则，在哪些人工节点停下来。护城河来自辖区规则包库、连接器覆盖率，以及越来越厚的逐动作调查轨迹语料——这些数据能证明，受治理的智能体工作流在真实生产里到底跑得怎样。
