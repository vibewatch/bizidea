differentiator: >-
  Incumbent AML platforms store cases and risk data, while consulting firms write policy documents and shared
  services execute manual research. This company owns the control runtime between them: which agent may do
  what, with which data, under which regional policy, and with which human checkpoint. Its defensibility comes
  from jurisdiction pack libraries, connector coverage, and a growing corpus of action-level investigation
  traces that show how governed agent workflows actually perform in production.
