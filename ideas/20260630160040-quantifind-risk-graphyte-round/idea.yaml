problem: >-
  Global banks want AI to help clear sanctions and AML investigation queues, but the real blocker is not
  model availability. Each region has different escalation rules, data-access limits, and narrative
  standards, so an agent that can freely search, summarize, or recommend across systems becomes a
  governance problem before it becomes a productivity gain. Today those investigations still bounce among
  incumbent case tools, vendor portals, shared drives, and offshore analyst teams, which stretches
  resolution times and stalls agent pilots in compliance review.
targetUser:
  primary: >-
    Global sanctions investigations and financial-crime transformation leaders at transaction banks running
    cross-border alert operations.
  secondary: Regional AML policy owners and fincrime QA managers responsible for investigation standards.
  buyer: Global Head of Financial Crime, Chief Compliance Officer, or COO of transaction banking.
startupThesis:
  nonObviousInsight: >-
    Banks already own case systems, screening tools, and risk data. What changed is that AI can now perform
    real investigative steps, so the missing layer is a runtime that constrains agent behavior by
    jurisdiction, preserves human checkpoints, and turns every action into defensible evidence. The winner
    is not the smartest fincrime model; it is the control plane that makes agentic work admissible inside
    regulated operations.
  beachhead: >-
    Tier-1 and Tier-2 transaction banks processing correspondent-banking and trade-finance alerts across
    London, Dubai, and Singapore, where regional investigations teams follow different sanctions, AML, and
    data-sharing rules but share a global case queue.
  wedge: >-
    An investigation control plane that launches bounded AI caseworkers to gather payment-chain, ownership,
    adverse-media, and prior-case evidence through approved connectors, applies jurisdiction-specific policy
    packs, and routes only exception-scored drafts to human investigators with a full audit log.
  whyNowCatalyst: >-
    Quantifind's $200 million investment around Graphyte Agentic Middleware, regulatory alignment, and
    localized risk intelligence signals that banks now want AI to execute fincrime work, but only through a
    governed layer that can survive region-by-region oversight.
  ventureScalePath: >-
    Start with cross-border sanctions and AML investigations, then expand into correspondent due diligence,
    trade-finance screening, KYC refresh, SAR-support drafting, managed-service oversight, and eventually a
    full agent-governance layer for regulated risk operations.
solution: >-
  The product sits above existing case management and screening systems rather than replacing them. It ingests
  case metadata, customer records, prior alert outcomes, and local policy rules, then spins up least-
  privilege agents for narrowly defined tasks such as gathering adverse media, mapping beneficial ownership,
  or reconciling payment-chain inconsistencies. A supervisor layer checks every agent action against
  jurisdictional policy packs, requires human approval for sensitive steps, and generates cited investigation
  memos in the format each regional team already uses. The bank gets faster case assembly without handing a
  general-purpose agent unchecked access to regulated workflows. Over time, the company compounds an action-
  outcome dataset showing which agent playbooks clear alerts fastest without breaching policy.
goToMarketSeed:
  firstCustomer: >-
    The sanctions investigations team at a global bank with USD clearing and trade-finance operations in
    London, Dubai, and Singapore, already running NICE Actimize or Quantexa plus shared-service investigators.
  buyingTrigger: >-
    A bank approves an AI pilot for fincrime investigations or opens a new regional booking center, forcing
    compliance to define how agents can access data and where human approval must remain.
  currentAlternative: Incumbent case-management suites, offshore investigation teams, internal playbooks, and manual evidence gathering across vendor portals and shared drives.
  switchingReason: >-
    The control plane lets the bank keep its existing stack while adding governed agent execution, regional
    policy consistency, and action-level audit trace that generic copilots and services teams do not provide.
  pricingHypothesis: >-
    Annual enterprise subscription priced by governed workflow, active jurisdiction pack, and investigation
    volume, likely starting around $250k-$1M ARR plus implementation.
