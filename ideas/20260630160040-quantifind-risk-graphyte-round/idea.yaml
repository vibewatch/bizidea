jobsToBeDone:
  - job: >-
      When a cross-border sanctions or AML alert lands in our queue, help our investigators gather the right
      evidence under local policy fast, so they can clear or escalate the case without breaching internal
      controls.
    currentAlternative: Manual research across case tools, vendor portals, shared drives, and offshore analyst handoffs.
    successMetric: Median time to case disposition and percentage of cases with complete cited evidence on first review.
  - job: >-
      When we pilot AI in financial-crime operations, help our compliance leadership define what the agent may
      do and how humans stay in the loop, so we can deploy automation without failing governance review.
    currentAlternative: Static playbooks, policy PDFs, one-off pilot guardrails, and generic copilots with manual supervision.
    successMetric: Time from pilot approval to production launch and percentage of agent actions captured with valid reviewer checkpoints.
ideaScorecard:
  signalStrength:
    score: 4
    rationale: The source names a concrete workflow and product architecture, but evidence depth is limited to one fetched report.
  painIntensity:
    score: 5
    rationale: Cross-border fincrime investigations are expensive, exam-sensitive, and operationally slow when evidence gathering and approvals fragment across regions.
  wedgeClarity:
    score: 5
    rationale: Governing agent behavior inside one investigation queue is a narrow, repeated workflow with clear users, inputs, approvals, and success metrics.
  defensibility:
    score: 4
    rationale: Jurisdiction packs, connector coverage, and action-outcome traces can compound into sticky advantage, though large incumbents could copy basic control features.
  ventureScale:
    score: 5
    rationale: A sanctions investigation beachhead can expand across multiple bank workflows and adjacent regulated industries that need governed agent execution.
topRisks:
  - name: Policy-pack maintenance burden
    description: Keeping jurisdiction rules current across sanctions, AML, and data-sharing regimes could become operationally heavy and slow expansion.
    mitigation: Start with three financial hubs, build modular policy packs, and pair product updates with regional advisory partners.
  - name: Pilot-to-production skepticism
    description: Bank compliance teams may approve read-only experiments but resist giving agents live workflow authority.
    mitigation: Launch with bounded evidence-gathering tasks, mandatory human checkpoints, and action-level logs before offering deeper automation.
  - name: Incumbent workflow bundling
    description: Case-management or screening vendors could add lightweight agent controls and bundle them into existing bank contracts.
    mitigation: Win on cross-vendor governance, jurisdiction specificity, and faster deployment across mixed stacks that single-vendor tools do not cover.
