slug: sanctions-agent-control-plane
date: '2026-06-30'
executiveSummary: 制裁智能体控制平面，是给全球银行用的一套受治理调查运行时：让 AI 能在制裁和 AML 调查里负责证据收集，但又不至于过不了合规评审。滩头市场是那些在伦敦、迪拜和新加坡跑跨境预警队列的 Tier-1 和 Tier-2 交易银行；在那里，同一条全球案件流要同时面对不同的制裁、AML 和数据共享规则。首个产品不是新筛查引擎，而是一层控制平面：为支付链路追踪、受益所有权查询、负面舆情收集和历史案件调取放出受限 AI 办案智能体，再把打上异常分的草稿连同完整动作溯源交给人工调查员。这个切口正好对上研究里最明确的采购触发：银行一旦批准 AI 试点，或新开一个区域入账中心，就必须先界定智能体在真实案件里能做什么。GTM 应该从一条制裁队列、一套现有案件栈和三个辖区规则包起步，因为买方更看重周期缩短和可审计性，而不是一上来覆盖所有工作流。银行本来就在金融犯罪现代化和调查运营上花钱，只要公司能拿出清晰的吞吐提升，就能挂到现成预算里。真正的战略风险不在模型质量，而在规则包维护和企业集成能不能继续保持像软件那样扩张——只有这样，70% 毛利率才守得住。研究证明痛点和时点都强，但还没拿到具名客户背书，也没直接证明银行会买一层中立控制平面，而不是等 NICE、Quantexa 或服务伙伴把方案一起打包，所以前 12 个月必须优先验证付费试点和试点转生产。
problem:
- 跨境制裁和 AML 调查还在案件工具、筛查系统、数据供应商、共享盘和离岸分析交接之间来回跳，导致拼案慢、QA 压力重。
- AI 试点之所以一直上不了生产，是因为银行没法证明：在英国、阿联酋和新加坡的规则与复核要求下，智能体到底能看什么、写什么、升什么级。
solution:
- 在现有案件管理、筛查和数据系统之上部署一层中立控制平面，让最小权限智能体按辖区规则包去做受限的取证任务。
- 把每个智能体动作、每次证据拉取、审核人改动和最终案件结果都记进审计图谱，让银行既能为调查结论辩护，也能持续优化操作剧本。
whyWeWin:
- 我们先卡住买方最焦虑、也最窄的那个点：一条跨境制裁队列里，AI 现在已经有用，但治理还卡着生产上线，所以产品是在增强现有栈，不是逼客户整套替换。
- 辖区规则包、跨厂商连接器和动作结果轨迹，会沉淀出工作流级的防守；这是通用 AI 副驾、咨询公司和单平台功能很难同样快积累出来的。
strategicChoices:
  beachhead: Tier-1 和 Tier-2 交易银行里，跑伦敦、迪拜和新加坡跨境代理行业务与贸易融资预警调查的队列。
  wedgeRationale: 这条队列买方清楚、AI 试点触发具体、取证步骤重复、周期和审计结果都可量化；如果一上来扩到更广的 AML 或 KYC，系统数和规则差异都会先膨胀，信任还没建立就会失控。
  sequencingRationale: 先在一条队列上只读、且必须人工批准；等规则包和相邻调查任务站稳，再往更深的自动化走。销售上先直打共创客户，部署打法可复制后再交给集成商放大；招聘上也要先补集成和规则深度，再扩配额销售。
  notYet:
  - 不替换筛查引擎或交易监控系统。
  - 在第一条调查队列之外，先不做 KYC 刷新、代理行尽调和贸易融资开户。
  - 先不做全自动结案、SAR 辅助起草或监管申报建议。
market:
  tam: 估算 TAM 为 $250M：大约 250 家全球 Tier-1 / Tier-2 跨境银行，每家每年约愿意为受治理调查控制层花 $1.0M。
  sam: 估算 SAM 为 $48M：大约 60 家在伦敦、迪拜、新加坡或相邻 EMEA / APAC 调查中心运营的银行，每家每年约为滩头工作流投入 $800k。
  som: 估算第 3 年可触达 SOM 为 $9M：先拿下一条队列，再扩到更多辖区规则包和相邻调查场景，做到 12 家银行、约 $750k 的混合 ACV。
  segments:
  - 在伦敦、迪拜和新加坡跑代理行业务与贸易融资预警调查的 Tier-1 和 Tier-2 交易银行。
  - 服务大型银行制裁和 AML 调查的金融犯罪转型项目与托管服务运营方。
  buyingProcess: 试点通常由制裁负责人或金融犯罪转型负责人发起，但合规政策、模型风险、IT 安全、采购和区域运营都握有一票否决权。只有银行能从现成的调查或现代化项目里拨款，并批准一条带明确人工节点的真实队列，交易才关得掉。
product:
  mvp: MVP 只覆盖一条跨境制裁调查队列：接入一套现有案件平台和经批准的数据供应商，内置英国、阿联酋和新加坡 3 个辖区规则包，支持受限的智能体取证任务、审核人批准、审计日志和带引文备忘录导出。它明确不做新的检测模型、交易监控或自动结案。
  sixMonth: 把第一条可生产的制裁队列发出去，接上毗邻 NICE Actimize 和 Quantexa 的连接器，补齐规则包编写、审核人看板和案件耗时基准。
  twelveMonth: 补上 AML 调查、第二套栈的连接器覆盖、规则变更工作流和伙伴部署工具包，让同一家银行能把这套运行时推到更多业务走廊，而不是每次都靠定制工程。
  twentyFourMonth: 沿用同一套权限、审批和审计架构，扩到代理行尽调、贸易融资筛查和 KYC 刷新。
  keyBets:
  - 只读取证加人工节点，足以在产品自动化更高权限步骤之前，先拿下付费试点。
  - 前三个辖区规则包可以靠可配置软件和有限的政策运营维护，不必变成定制咨询。
  - 即便客户继续使用 NICE Actimize、Quantexa 和内部案件工具，银行也会接受一层中立叠加层。
gtm:
  wedge: 先卖一个围绕单条跨境制裁队列的付费共创试点，让受限取证智能体以影子模式或只读模式运行；等案件拼装时间降下来、合规也签字认可可审计性，再转生产。
  channels:
  - 创始人主导，直接打全球金融犯罪负责人、制裁调查负责人和交易银行 COO 办公室。
  - 和已经在做调查现代化的 AML 套件集成商、区域合规顾问一起共售。
  - 第一条线上队列证明价值后，再在现有 NICE Actimize 或 Quantexa 项目里靠口碑扩张。
  funnelTargets: 线索→合格试点 15-25%，合格试点→付费试点 30-40%，付费试点→生产 50%+；在生产账户里，首条队列→第二个辖区规则包或相邻工作流，12 个月内做到 40%+。
  pricing: 按受治理调查队列、启用的辖区规则包和案件量收年费；付费试点转生产后，年化 ACV 大约在 $350k-$750k，外加实施费。这也贴合银行按具体工作流拨现代化预算、而不是按调查员 seat 计费的习惯。
businessModel:
  revenueStreams:
  - 线上受治理调查队列的年度平台订阅费。
  - 实施费和连接器接入费。
  - 高级辖区规则包更新、审计证据导出和托管治理模块。
  unitOfValue: 一条启用辖区规则包和受限智能体剧本的受治理调查队列。
  targetGrossMarginPct: 70
  expansionLevers:
  - 在同一家银行里加更多业务走廊和辖区规则包。
  - 从制裁调查扩到 AML 调查、代理行尽调和 KYC 刷新。
  - 把高级报告、QA 和规则变更工作流卖给二线合规与内审团队。
strategyMap:
  northStarMetric: 每月通过受治理智能体剧本完成、且满足必需人工节点的调查数量。
  inputMetrics:
  - 从试点启动到第一单已审核案件的时间。
  - 真实队列上的中位案件拼装时间降幅。
  - 付费试点转生产的转化率。
  - 智能体准备的调查备忘录在首轮审核中的通过率。
  - 从第一条队列扩到第二个辖区规则包或工作流的速度。
  moatsToBuild:
  - 英国、阿联酋、新加坡，后续再扩更多业务走廊的辖区规则包库。
  - 把智能体动作、证据来源、审核人改动和案件结果连起来的跨厂商审计图谱。
  - 跨案件系统、筛查厂商和数据供应商可复用的连接器与剧本库。
  killCriteria:
  - 前 6 个付费试点里，不到 2 个能在 12 个月内以 $300k+ ACV 转成生产。
  - 第一条真实队列的取证时间没有至少改善 30%，而且还引入了新的控制例外。
  - 前三个枢纽之后，每新增一个辖区规则包仍然要超过 1 个月的定制政策工作。
  mermaid: |
    flowchart LR
      Wedge[Cross-border sanctions queue] --> MVP[Bounded evidence-gathering agents]
      MVP --> Proof[Cycle-time reduction plus audit trace]
      Proof --> Expansion[More jurisdiction packs and adjacent workflows]
investorMemo:
  verdict:
    call: 值得见面 / 继续深挖
    conviction: 中等把握：控制点逻辑站得住，但预算归属和规则包经济性还没被直接验证。
    whyBelieve: 银行已经在金融犯罪运营上重金投入，而这个切口正卡在 AI 部署最具体的关口上——混合栈治理依然很痛。
    whyDoubt: 如果买方更愿意接受现有厂商打包，或辖区维护最终把产品做成服务生意，公司依然可能输。
    nextDiligence: 先拿两条单一跨境制裁队列的付费试点，量出案件耗时下降、审核通过率和规则更新工作量，再考虑更大的融资。
  firstCustomer:
    title: Tier-1 代理行的全球制裁调查总监
    profile: 一家 2 万人以上的交易银行，在伦敦、迪拜和新加坡通过 NICE Actimize 或 Quantexa 跑同一条全球队列，由共享服务调查员和区域政策负责人共同处理。
    trigger: 银行批准制裁调查的真实 AI 试点，或新开一个区域入账中心，迫使团队把智能体权限和人工节点写清楚。
    buyer: 全球金融犯罪运营负责人
    initialContract: $100k-$200k 的付费试点，覆盖一条制裁队列和 3 个辖区规则包；只要中位案件拼装时间下降 30% 以上、且合规批准生产使用，就转成 $350k-$750k 的年订阅，外加实施费。
  mustBeTrue:
  - 至少有一个目标银行细分，会把受治理 AI 调查当成未来 12 个月内的真实采购优先级，而且预算负责人明确。
  - 一层中立叠加层可以落在 NICE Actimize 或 Quantexa 旁边，而不用逼客户做多年期的平台替换。
  - 首个打包部署能在 90 天内接上一条真实队列、一套案件系统和关键数据源。
  - 受治理智能体能在不制造审计例外的前提下，把中位取证或案件拼装时间至少打下 30%。
  - 英国、阿联酋和新加坡的规则包维护，可以靠软件和有限的政策运营完成，同时守住 70% 毛利率。
  diligenceQuestions:
  - 真正握预算的是谁：金融犯罪运营、合规、交易银行 COO，还是现有转型项目？
  - 首个部署能不能插进一条真实的 NICE Actimize 或 Quantexa 工作流，而不触发跨季度的安全评审？
  - 银行到底要看到多大的周期和 QA 提升，才愿意为这层系统每年花 $350k-$750k？
  - 英国、阿联酋和新加坡的规则包到底多久变一次，怎样的人力配置才能把它们持续维护住？
  - 为什么银行会买这层叠加层，而不是接受 Lucinity、Quantifind、NICE Actimize 或集成商主导的替代方案？
operatingAssumptions:
- assumption: 在现有厂商补齐之前，银行会直接出钱，或从现有调查现代化预算里拨钱给一层中立控制平面。
  basis: research.yaml
  validationTest: 至少赢下 2 个付费试点，而且 公司 既是明确预算行项目，也是现有现代化项目里的核准工作流。
  decisionImpact: 如果这条不成立，就别再坚持直销，应改成给现有厂商做 OEM，或优先走渠道分发。
- assumption: 光靠受限取证自动化，就能在产品接管更高权限动作前先把 ROI 跑出来。
  basis: idea.yaml
  validationTest: 在 50 多个试点案件上，把中位案件拼装时间至少打下 30%，同时不让人工审批率和升级质量变差。
  decisionImpact: 如果不成立，产品要么得自动化更深的动作，要么放弃当前定价逻辑。
- assumption: 英国、阿联酋和新加坡的规则包，可以靠可配置产品逻辑和小型 政策运营 团队维护。
  basis: research.yaml
  validationTest: 跟踪 12 个月规则变更，证明前 3 个规则包能按月发布更新，且专职 政策运营 人力不超过 1 个 FTE。
  decisionImpact: 如果不成立，就收窄地理范围、大幅提价，或接受更低毛利的服务化模式。
- assumption: 第一组连接器可以被压缩成足够紧凑的标准包，让部署始终控制在 90 天内。
  basis: 经营判断
  validationTest: 用同一套核心集成打法完成 3 个共创客户实施，每个项目的定制工作不超过 4 个工程师周。
  decisionImpact: 如果不成立，GTM 效率和毛利率都会断掉，因此 ICP 必须收窄到单一技术栈，或把实施明确定义成服务线。
- assumption: 买方会接受按队列、辖区规则包和案件量定价，而不是按调查员 seat 定价。
  basis: idea.yaml
  validationTest: 让 3 个合格潜在客户在试点方案或非约束性报价反馈里接受这套商务结构。
  decisionImpact: 如果不成立，公司就得改成平台模块、节省分成或重实施合同。
experimentRoadmap:
- horizon: 0–90 天
  experiment: 对两支目标银行调查团队做工时拆解研究，抽样观察制裁案件。
  hypothesis: 证据收集和叙事拼装占用的调查员时间，已经大到足以支撑控制平面这个切口。
  successMetric: 至少抽样 30 个案件，证明证据收集加备忘录起草占处理时间的 35% 或以上。
  owner: 创始产品负责人
- horizon: 0–90 天
  experiment: 把规则包和审计轨迹原型演示给 6 位制裁和 AML 买方。
  hypothesis: 买方真正想要的是按队列定制的智能体权限和审核节点，而不是通用 AI 副驾。
  successMetric: 原型评审之后，至少 4 个潜在客户愿意继续做试点范围界定或付费 需求摸底。
  owner: 创始人 / CEO
- horizon: 0–90 天
  experiment: 围绕一套案件栈和两个已批准数据源，用历史案件做只读连接器 概念验证。
  hypothesis: 产品能在不越过规则边界的前提下，把带引文的调查草稿从头到尾跑通。
  successMetric: 1 个共创客户在启动后 45 天内，用这套工作流复核 20 个历史案件。
  owner: 创始工程师
- horizon: 3–6 个月
  experiment: 把 前期摸底 转成 2 个围绕单条跨境制裁队列的付费试点。
  hypothesis: 在产品拿到完整生产权限之前，市场上已经有直签或伙伴带来的真实预算。
  successMetric: 签下 2 个单价至少 $100k 的付费试点，而且都写明生产上线标准。
  owner: 创始人 / CEO
- horizon: 6–12 个月
  experiment: 把第一条队列推上生产，并量化运营影响。
  hypothesis: 试点证据足够强，能让合规团队批准受限任务的真实上线。
  successMetric: 1 条生产队列上线，案件拼装效率提升 30% 以上，且 90 天后没有未解决的审计问题。
  owner: 解决方案负责人
- horizon: 6–12 个月
  experiment: 签下 2 家实施或监管咨询伙伴，并测试渠道带来的 销售线索。
  hypothesis: 伙伴能缩短采购和部署周期，同时不把公司拖回定制服务生意。
  successMetric: 签下 2 家伙伴，并带来 1 个部署周期低于 90 天的付费试点。
  owner: 合作伙伴负责人
- horizon: 12–18 个月
  experiment: 让 1 家生产客户扩到第二个辖区规则包或相邻调查工作流。
  hypothesis: 在同一家银行里先落地再扩张，比只靠新客户获客更快也更便宜。
  successMetric: 首个 正式上线 后 6 个月内，至少 1 家生产客户再买第二条队列、第二个业务走廊或相邻工作流。
  owner: 政策运营负责人
operations:
- 和区域顾问伙伴一起，为英国、阿联酋和新加坡建立按月发版的规则包更新与变更日志流程。
- 把队列接入标准化：案件系统权限、已批准数据源、审核角色和紧急 紧急停机开关 归属都先写清楚。
- 把动作日志和证据来源输出到客户的 GRC、审计和 SIEM 系统，而不是第一天就自己造一整套合规套件。
- 先认证一小批连接器和数据伙伴，再扩到新技术栈或新地理区域。
team:
- role: 创始人 / CEO
  startTiming: Month 0
  rationale: 亲自扛银行销售、共创客户招募和打包方式，因为早期每一单都需要高层教育和快速迭代。
- role: 创始工程师
  startTiming: Month 0
  rationale: 做出第一组连接器、规则运行时、审计图谱和智能体编排控制，让试点足够可信。
- role: 创始合规产品负责人
  startTiming: Month 0
  rationale: 从第一天就把英国、阿联酋和新加坡的规则差异翻成产品化审批逻辑和调查工作流。
- role: 解决方案架构师
  startTiming: Month 4
  rationale: 缩短遗留银行技术栈里的部署周期，别让核心工程团队被定制接入工作拖垮。
- role: 政策运营负责人
  startTiming: Month 6
  rationale: 维护辖区规则包、对接监管顾问伙伴，并把真实客户的变更沉淀成可复用模板。
- role: 合作伙伴负责人
  startTiming: Month 9
  rationale: 等第一批直签试点跑出可复制部署后，把集成商和区域顾问变成可放大的渠道。
milestones:
- horizon: 0–12 个月
  items:
  - 打包出一条现有栈部署路径，覆盖英国、阿联酋和新加坡规则包。
  - 签下 5-6 家共创客户，并把至少 2 家转成付费试点。
  - 让 1 条队列带着完整审计轨迹上生产，并把案件拼装效率打下 30% 或以上。
  - 拿下第一批区域顾问和实施伙伴。
- horizon: 12–24 个月
  items:
  - 扩到 4-6 家生产银行，并在至少 2 个 客户 里拿到第二条队列或第二个规则包扩张。
  - 补上 AML 调查、规则变更工作流工具和更广的连接器覆盖。
  - 把主栈的打包部署压到 8 周内，并让伙伴来源 销售线索 成为新增试点里有分量的一部分。
- horizon: 24–36 个月
  items:
  - 做到 10-12 家生产银行，并沿着模型里 $9M 的可触达 SOM 轨迹往前推。
  - 扩到代理行尽调、贸易融资筛查和 KYC 刷新，但不把自己做成泛合规套件。
  - 沉淀足够耐用的动作结果数据集和辖区规则包库，持续抬高银行线上运营里的切换成本。
risks:
- risk: 银行愿意批只读试点，却不肯把真实队列的生产权限交给智能体。
  likelihood: High
  impact: High
  mitigation: 先做受限取证任务、要求明确人工节点，并先量出审核人信任，再卖更深的自动化。
- risk: 现有厂商把相似的智能体治理功能，打包进更大的 AML 或案件管理合同。
  likelihood: High
  impact: High
  mitigation: 别和套件比宽度，而要靠混合栈中立、更快部署和更深的多辖区规则控制来赢。
- risk: 辖区规则包维护最终变成重服务负担，把毛利率压扁。
  likelihood: Medium
  impact: High
  mitigation: 首个版本只盯 3 个枢纽，把变更管理写成标准流程；只有当产品配置接不住规则变化时，才调用区域顾问。
- risk: 遗留系统集成和数据访问审批，把首次见效时间拖到试点承受不了。
  likelihood: Medium
  impact: High
  mitigation: 先打包一条主技术栈，第一条工作流保持只读，并拒掉会打碎部署打法的边角集成。
- risk: 内审或模型风险团队认为证据来源和审核控制还不够硬。
  likelihood: Medium
  impact: High
  mitigation: 在 MVP 里把动作日志、审核人批准和证据血缘做成一等对象，并让控制职能从试点设计阶段就进场。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $3-5M
  runwayMonths: 18
  useOfFundsSummary: 这 18 个月的资金，买的是第一套可打包连接器栈、3 个辖区规则包、5-6 家共创客户、2 个付费试点、首条生产队列，以及证明试点转生产可复制所需的合规、解决方案和合作伙伴岗位。
