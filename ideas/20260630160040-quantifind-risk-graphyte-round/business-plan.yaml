slug: sanctions-agent-control-plane
date: "2026-06-30"
executiveSummary: >-
  Sanctions agent control plane is a governed investigation runtime for global
  banks that want AI to perform evidence-gathering work inside sanctions and AML
  investigations without failing compliance review. The beachhead is Tier-1 and
  Tier-2 transaction banks running cross-border alert queues across London,
  Dubai, and Singapore, where one global case flow meets different sanctions,
  AML, and data-sharing rules. The first product is not a new screening engine;
  it is a control plane that launches bounded AI caseworkers for payment-chain
  tracing, beneficial-ownership lookup, adverse-media gathering, and prior-case
  retrieval, then routes exception-scored drafts to human investigators with
  full action provenance. That wedge matches the clearest buying trigger in the
  research: a bank approves an AI pilot or opens a new regional booking center
  and must define what agents may do before touching live cases. Go-to-market
  should start with one sanctions queue, one incumbent case stack, and three
  jurisdiction packs because proof on cycle time and auditability matters more
  than broad workflow coverage. Banks already spend against financial-crime
  modernization and investigations operations, so the company can fit an
  existing budget line if it demonstrates measurable throughput gains. The main
  strategic risk is not model quality; it is whether policy-pack upkeep and
  enterprise integrations can stay software-like enough to preserve 70% gross
  margin. Research supports strong pain and timing, but it does not provide
  named customer references or direct proof that banks will buy a neutral
  control plane rather than wait for NICE, Quantexa, or services partners, so
  the first 12 months must validate paid pilots and pilot-to-production
  conversion.
problem:
  - Cross-border sanctions and AML investigations still bounce among case tools, screening systems, data vendors, shared drives, and offshore analyst handoffs, which keeps case assembly slow and QA-heavy.
  - AI pilots stall before production because banks cannot prove what an agent may access, draft, or escalate under UK, UAE, and Singapore policy and review rules.
solution:
  - Deploy a neutral control plane above existing case-management, screening, and data systems that launches least-privilege agents for bounded evidence-gathering tasks under jurisdiction-specific policy packs.
  - Record every agent action, evidence pull, reviewer edit, and final case outcome in an audit graph so banks can defend investigations and improve playbooks over time.
whyWeWin:
  - We start at the narrowest point of highest buyer anxiety: one cross-border sanctions queue where AI is useful now but governance blocks production, so the product augments existing stacks instead of asking for a rip-and-replace.
  - Jurisdiction packs, cross-vendor connectors, and action-outcome traces create workflow-specific defensibility that generic copilots, advisory firms, and single-platform features do not compound as quickly.
strategicChoices:
  beachhead: Correspondent-banking and trade-finance sanctions investigation queues at Tier-1 and Tier-2 transaction banks operating across London, Dubai, and Singapore.
  wedgeRationale: This queue has a clear buyer, a concrete AI-pilot trigger, repeated evidence-gathering steps, and measurable cycle-time and audit outcomes; broader AML or KYC expansion would add more systems and policy variance before trust is proven.
  sequencingRationale: Start read-only and human-approved on one queue, then add more jurisdiction packs and adjacent investigation tasks before moving into deeper automation; sell direct to design partners first, then through integrators once deployment playbooks are repeatable; hire integration and policy depth before scaling quota sales.
  notYet:
    - Replacing screening engines or transaction-monitoring systems.
    - KYC refresh, correspondent due diligence, and trade-finance onboarding outside the first investigation queue.
    - Fully autonomous case closure, SAR-support drafting, or regulator filing recommendations.
market:
  tam: Estimated $250M TAM from roughly 250 global Tier-1 and Tier-2 cross-border banks spending about $1.0M annually on a governed investigations control layer.
  sam: Estimated $48M SAM from roughly 60 banks with London, Dubai, Singapore, or adjacent EMEA and APAC investigation hubs spending about $800k annually on the beachhead workflow.
  som: Estimated $9M year-3 SOM from 12 banks at about $750k blended ACV after landing one queue and expanding into more jurisdiction packs and adjacent investigations.
  segments:
    - Tier-1 and Tier-2 transaction banks running correspondent-banking and trade-finance alert investigations across London, Dubai, and Singapore.
    - Fincrime transformation programs and managed-service operators supporting large-bank sanctions and AML investigations.
  buyingProcess: >-
    A sanctions or financial-crime transformation leader usually sponsors the
    pilot, but compliance policy, model risk, IT security, procurement, and
    regional operations all have veto power. The deal closes only when the bank
    can fund the product from an existing investigations or modernization
    program and approve one live queue with explicit human checkpoints.
product:
  mvp: >-
    MVP covers one cross-border sanctions investigations queue: connectors into
    an incumbent case platform and approved data vendors, three jurisdiction
    packs for the UK, UAE, and Singapore, bounded agent tasks for evidence
    gathering, reviewer approvals, audit logging, and cited memo export. It
    explicitly excludes new detection models, transaction monitoring, and
    autonomous case disposition.
  sixMonth: Ship the first production-ready sanctions queue with NICE Actimize- and Quantexa-adjacent connectors, policy-pack authoring, reviewer dashboards, and case-time benchmarking.
  twelveMonth: Add AML investigations, second-stack connector coverage, policy-change workflow, and a partner deployment kit so one bank can roll the runtime into more corridors without custom engineering each time.
  twentyFourMonth: Expand into correspondent due diligence, trade-finance screening, and KYC refresh while reusing the same permissioning, approval, and audit architecture.
  keyBets:
    - Read-only evidence gathering plus human checkpoints is enough to win paid pilots before the product automates higher-authority steps.
    - Three initial jurisdiction packs can be maintained with configurable software and limited policy ops rather than bespoke consulting.
    - Banks will accept a neutral overlay that coexists with NICE Actimize, Quantexa, and internal case tooling.
gtm:
  wedge: Sell a paid design-partner pilot for one cross-border sanctions queue that runs bounded evidence-gathering agents in shadow or read-only mode, then convert to production once case-assembly time drops and compliance signs off on auditability.
  channels:
    - Founder-led direct sales into global heads of financial crime, sanctions investigation leaders, and transaction-banking COO offices.
    - Co-sell with AML-suite integrators and regional compliance advisory firms already involved in investigations modernization.
    - Reference-driven expansion inside existing NICE Actimize or Quantexa programs after the first live queue proves value.
  funnelTargets: "Lead→qualified pilot 15-25%, qualified pilot→paid pilot 30-40%, paid pilot→production 50%+, first queue→second jurisdiction pack or adjacent workflow within 12 months in 40%+ of production accounts."
  pricing: >-
    Annual subscription priced by governed investigation queue, active
    jurisdiction packs, and case volume, with a paid pilot converting into
    roughly $350k-$750k production ACV plus implementation. This matches how
    banks budget modernization around specific workflows rather than per-seat
    investigator licenses.
businessModel:
  revenueStreams:
    - Annual platform subscription for live governed investigation queues.
    - Implementation and connector-onboarding fees.
    - Premium jurisdiction-pack updates, audit-evidence exports, and managed-governance modules.
  unitOfValue: Governed investigation queue with active jurisdiction packs and bounded agent playbooks.
  targetGrossMarginPct: 70
  expansionLevers:
    - Add more corridors and jurisdiction packs inside the same bank.
    - Expand from sanctions investigations into AML investigations, correspondent due diligence, and KYC refresh.
    - Sell premium reporting, QA, and policy-change workflows to second-line compliance and internal-audit teams.
strategyMap:
  northStarMetric: Monthly investigations completed through governed agent playbooks with required human checkpoints satisfied.
  inputMetrics:
    - Time from pilot kickoff to first reviewed case.
    - Median case-assembly time reduction on the live queue.
    - Paid pilot to production conversion rate.
    - First-review acceptance rate of agent-prepared investigation memos.
    - Expansion from first queue to second jurisdiction pack or workflow.
  moatsToBuild:
    - Jurisdiction-pack library for UK, UAE, Singapore, and later corridors.
    - Cross-vendor audit graph linking agent actions, evidence sources, reviewer edits, and case outcomes.
    - Reusable connector and playbook library across case systems, screening vendors, and data providers.
  killCriteria:
    - "Fewer than 2 of the first 6 paid pilots convert to production at $300k+ ACV within 12 months."
    - Median evidence-gathering time does not improve by at least 30% on the first live queue without new control exceptions.
    - Each new jurisdiction pack still requires more than one month of custom policy work after the first three hubs.
  mermaid: |
    flowchart LR
      Wedge[Cross-border sanctions queue] --> MVP[Bounded evidence-gathering agents]
      MVP --> Proof[Cycle-time reduction plus audit trace]
      Proof --> Expansion[More jurisdiction packs and adjacent workflows]
investorMemo:
  verdict:
    call: Meet / investigate further
    conviction: Medium conviction because the control-point thesis is credible, but direct budget ownership and policy-pack economics still need proof.
    whyBelieve: Banks already spend heavily on fincrime operations, and this wedge sits at a concrete AI-deployment gate where mixed-stack governance is still painful.
    whyDoubt: The startup can still lose if buyers prefer incumbent bundles or if jurisdiction upkeep turns the product into a services business.
    nextDiligence: Secure two paid pilots on one cross-border sanctions queue and measure case-time reduction, reviewer acceptance, and policy-update workload before underwriting a larger round.
  firstCustomer:
    title: Global sanctions investigations director at a Tier-1 correspondent bank
    profile: A 20,000-plus employee transaction bank using NICE Actimize or Quantexa across London, Dubai, and Singapore, with shared-service investigators and regional policy owners handling one global queue.
    trigger: The bank approves a live AI pilot for sanctions investigations or opens a new regional booking center that forces explicit agent permissions and human checkpoints.
    buyer: Global Head of Financial Crime Operations
    initialContract: >-
      $100k-$200k paid pilot on one sanctions queue and three jurisdiction packs,
      converting to a $350k-$750k annual subscription plus implementation once
      median case-assembly time falls by 30% or more and compliance approves
      production use.
  mustBeTrue:
    - At least one target-bank segment treats governed AI investigations as a current 12-month buying priority with a named budget owner.
    - A neutral overlay can land beside NICE Actimize or Quantexa without forcing a multiyear platform replacement.
    - The first packaged deployment can connect one live queue, one case system, and key data sources in under 90 days.
    - Governed agents can reduce median evidence-gathering or case-assembly time by at least 30% without creating audit exceptions.
    - UK, UAE, and Singapore policy-pack maintenance can be handled with software and limited policy ops while preserving 70% gross margin.
  diligenceQuestions:
    - Which executive truly owns the budget: financial-crime operations, compliance, transaction-banking COO, or the incumbent transformation program?
    - Can the first deployment plug into a live NICE Actimize or Quantexa workflow without a multi-quarter security review?
    - What cycle-time and QA gains are required for a bank to justify $350k-$750k annual spend?
    - How often do UK, UAE, and Singapore policy packs change, and what staffing model keeps them current?
    - Why will banks buy this overlay instead of accepting Lucinity, Quantifind, NICE Actimize, or integrator-led alternatives?
operatingAssumptions:
  - assumption: Banks will fund a neutral control plane either directly or from an existing investigations-modernization budget before incumbent vendors close the gap.
    basis: research.yaml
    validationTest: Win at least 2 paid pilots where the startup is a named line item or approved workstream inside an existing modernization program.
    decisionImpact: If false, reposition toward OEM or channel-first distribution through incumbents and integrators instead of direct enterprise sales.
  - assumption: Bounded evidence-gathering automation creates enough ROI before the product takes on higher-authority actions.
    basis: idea.yaml
    validationTest: Show at least 30% reduction in median case-assembly time on 50-plus pilot cases while keeping human approval rates and escalation quality stable.
    decisionImpact: If false, the product must either automate deeper workflow steps or abandon the current pricing basis.
  - assumption: UK, UAE, and Singapore policy packs can be maintained with configurable product logic and a small policy-ops team.
    basis: research.yaml
    validationTest: Track 12 months of rule changes and prove the first three packs can be updated on a monthly release cycle with no more than 1 dedicated policy-ops FTE.
    decisionImpact: If false, narrow geography, raise prices materially, or accept a lower-margin services-heavy model.
  - assumption: The first connector bundle can be packaged tightly enough to keep deployment under 90 days.
    basis: operator judgment
    validationTest: Complete 3 design-partner implementations using the same core integration playbook with less than 4 engineer-weeks of custom work each.
    decisionImpact: If false, GTM efficiency and gross margin break, so the ICP must narrow to one stack or implementation must become a deliberate services line.
  - assumption: Buyers will accept pricing by queue, jurisdiction pack, and case volume rather than by investigator seat.
    basis: idea.yaml
    validationTest: Get 3 qualified prospects to accept the proposed commercial structure in pilot proposals or non-binding pricing feedback.
    decisionImpact: If false, the company must repackage around platform modules, savings share, or implementation-heavy contracts.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Run time-and-motion studies on two target-bank investigation teams using sampled sanctions cases.
    hypothesis: Evidence gathering and narrative assembly represent a large enough share of investigator time to justify a control-plane wedge.
    successMetric: At least 30 sampled cases show evidence gathering plus memo drafting consumes 35% or more of handling time.
    owner: Founder product
  - horizon: 0–90 days
    experiment: Demo a policy-pack and audit-trace prototype to six sanctions and AML buyers.
    hypothesis: Buyers want queue-specific agent permissions and reviewer checkpoints more than a generic AI copilot.
    successMetric: Four or more prospects agree to pilot scoping or paid discovery after the prototype review.
    owner: Founder CEO
  - horizon: 0–90 days
    experiment: Build a read-only connector proof of concept for one case stack and two approved data sources using historical cases.
    hypothesis: The product can assemble cited draft memos end to end without breaching policy boundaries.
    successMetric: One design partner reviews 20 historical cases through the workflow within 45 days of kickoff.
    owner: Founding eng
  - horizon: 3–6 months
    experiment: Convert discovery into two paid pilots on one cross-border sanctions queue.
    hypothesis: Direct or partner-led budget exists before the product reaches full production authority.
    successMetric: Two paid pilots signed at $100k or more each with explicit production-go-live criteria.
    owner: Founder CEO
  - horizon: 6–12 months
    experiment: Put the first queue into production and benchmark operational impact.
    hypothesis: Pilot evidence is strong enough for compliance to approve live use on bounded tasks.
    successMetric: One production queue live with 30% or greater case-assembly improvement and no unresolved audit findings after 90 days.
    owner: Solutions lead
  - horizon: 6–12 months
    experiment: Recruit two implementation or regulatory-advisory partners and test channel-sourced pipeline.
    hypothesis: Partners can shorten procurement and deployment without turning the company into custom services.
    successMetric: Two signed partners and one partner-sourced paid pilot with deployment under 90 days.
    owner: Head of partnerships
  - horizon: 12–18 months
    experiment: Expand one production customer into a second jurisdiction pack or adjacent investigation workflow.
    hypothesis: Land-and-expand inside one bank is faster and cheaper than relying only on new-logo acquisition.
    successMetric: One production customer buys a second queue, corridor, or workflow within 6 months of initial go-live.
    owner: Policy ops lead
operations:
  - Maintain a monthly policy-pack release and change-log process with regional advisory partners for the UK, UAE, and Singapore.
  - Standardize queue onboarding for case-system access, approved data sources, reviewer roles, and emergency kill-switch ownership.
  - Export action logs and evidence provenance into customer GRC, audit, and SIEM systems instead of building a full compliance suite on day one.
  - Certify a small set of connectors and data partners before adding new stacks or geographies.
team:
  - role: Founder CEO
    startTiming: Month 0
    rationale: Own founder-led bank sales, design-partner recruitment, and packaging because early deals require executive education and fast iteration.
  - role: Founding eng
    startTiming: Month 0
    rationale: Build the first connector bundle, policy runtime, audit graph, and agent-orchestration controls needed for credible pilots.
  - role: Founding compliance product
    startTiming: Month 0
    rationale: Translate UK, UAE, and Singapore policy differences into productized approval logic and investigator workflows from day one.
  - role: Solutions architect
    startTiming: Month 4
    rationale: Shorten deployment cycles inside legacy bank stacks and protect core engineering from custom onboarding work.
  - role: Policy ops lead
    startTiming: Month 6
    rationale: Maintain jurisdiction packs, coordinate regulatory-advisory partners, and turn live customer changes into repeatable templates.
  - role: Head of partnerships
    startTiming: Month 9
    rationale: Turn integrators and regional advisors into a scalable channel after the first direct pilots prove repeatable deployment.
milestones:
  - horizon: 0–12 months
    items:
      - Package one incumbent-stack deployment path with UK, UAE, and Singapore policy packs.
      - Sign 5-6 design partners and convert at least 2 into paid pilots.
      - Put 1 queue into production with full audit trace and 30% or greater case-assembly improvement.
      - Close the first regional advisory and implementation partnerships.
  - horizon: 12–24 months
    items:
      - Expand to 4-6 production banks and win second-queue or second-pack expansion in at least 2 logos.
      - Add AML investigations, policy-change workflow tooling, and broader connector coverage.
      - Bring packaged deployment under 8 weeks on the primary stack and make partner-sourced pipeline a meaningful share of new pilots.
  - horizon: 24–36 months
    items:
      - Reach 10-12 production banks and the modeled $9M reachable SOM trajectory.
      - Expand into correspondent due diligence, trade-finance screening, and KYC refresh without becoming a generic compliance suite.
      - Build a durable action-outcome dataset and jurisdiction-pack library that raises switching cost inside live bank operations.
risks:
  - risk: Banks approve read-only pilots but refuse to grant production authority on live queues.
    likelihood: High
    impact: High
    mitigation: Start with bounded evidence-gathering tasks, require explicit human checkpoints, and measure reviewer trust before selling deeper automation.
  - risk: Incumbent vendors bundle similar agent-governance features into broader AML or case-management contracts.
    likelihood: High
    impact: High
    mitigation: Win on mixed-stack neutrality, faster deployment, and deeper multi-jurisdiction policy control rather than on broad suite breadth.
  - risk: Jurisdiction-pack maintenance becomes a services-heavy burden that compresses gross margin.
    likelihood: Medium
    impact: High
    mitigation: Limit the first release to three hubs, codify change management, and use regional advisors only where product configuration cannot absorb policy change.
  - risk: Legacy integrations and data-access approvals delay time to first value beyond what pilots can tolerate.
    likelihood: Medium
    impact: High
    mitigation: Package one primary stack, keep the first workflow read-only, and reject edge-case integrations that break the deployment playbook.
  - risk: Internal audit or model-risk teams reject evidence provenance and reviewer controls as insufficient.
    likelihood: Medium
    impact: High
    mitigation: Make action logs, reviewer approvals, and evidence lineage first-class objects in the MVP and involve control functions in pilot design.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$3-5M"
  runwayMonths: 18
  useOfFundsSummary: 18 months buys the first packaged connector stack, three jurisdiction packs, 5-6 design partners, 2 paid pilots, the first production queue, and the compliance, solutions, and partnership hires needed to prove repeatable pilot-to-production conversion.
