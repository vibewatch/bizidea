scenarios:
  downside:
    description: "Pilot-to-production approvals slip by a quarter, expansion is slower, and policy-pack upkeep stays more manual than planned."
    y3RevenueK: 4325.0
    y3EbitdaK: -140.0
    cashLowPointK: 250.0
    keyAssumptionChanges:
      - "Q4Y3 customersEop reaches 8 instead of 10."
      - "Exit blended ARR per paying bank lands closer to $650K than $750K."
      - "Gross margin exits around 66%-67% because policy updates and integrations remain more services-heavy."
  base:
    description: "The connector and policy-pack playbook becomes repeatable enough to move from 2 paying banks at Y1 exit to 10 by Q4Y3 while gross margin only reaches target at the end of the period."
    y3RevenueK: 5525.0
    y3EbitdaK: 550.8
    cashLowPointK: 761.2
    keyAssumptionChanges:
      - "CustomersEop moves from 2 at M12 to 5 at Q4Y2 and 10 at Q4Y3."
      - "Blended realized ARR per paying bank rises from about $570K at Y1 exit to $750K at Q4Y3."
      - "Quarterly EBITDA turns positive in Q2Y3 as gross margin reaches the high 60s."
  upside:
    description: "Partner-sourced pilots convert sooner, more banks add second packs or adjacent workflows, and deployment effort standardizes faster."
    y3RevenueK: 6710.0
    y3EbitdaK: 1225.0
    cashLowPointK: 920.0
    keyAssumptionChanges:
      - "Q4Y3 customersEop reaches 12 instead of 10."
      - "Exit blended ARR per paying bank rises toward $800K as expansion attaches earlier."
      - "Gross margin exits around 72%-73% as connector work and policy upkeep become more templated."
sensitivity:
  - variable: "ARPU"
    downsideCase: "Exit blended ARR per bank lands around $675K instead of $750K."
    baseCase: "Q4Y3 exit blended ARR per bank reaches $750K."
    upsideCase: "Expansion into more packs and adjacent workflows lifts exit ARR per bank toward $800K."
    y3RevenueImpactK: -550.0
    cashImpactK: -380.0
  - variable: "CAC"
    downsideCase: "Paid pilots require more founder time and partner sourcing lags, pushing CAC toward $280K."
    baseCase: "CAC stays around $223K per net new paying bank."
    upsideCase: "Partner referrals and references lower CAC toward $180K."
    y3RevenueImpactK: -100.0
    cashImpactK: -260.0
  - variable: "churn"
    downsideCase: "Monthly churn rises to 3.0% as incumbents counterbundle faster."
    baseCase: "Monthly churn holds at 2.0% once banks reach production."
    upsideCase: "Monthly churn stays near 1.0% because the governed queue becomes a sticky control point."
    y3RevenueImpactK: -220.0
    cashImpactK: -170.0
  - variable: "sales cycle"
    downsideCase: "Pilot-to-production conversion stretches by one extra quarter."
    baseCase: "Banks move from paid pilot to production in about one quarter after control approvals clear."
    upsideCase: "Reference customers compress the cycle to well under one quarter."
    y3RevenueImpactK: -500.0
    cashImpactK: -420.0
  - variable: "gross margin"
    downsideCase: "Gross margin exits near 66% because policy-pack upkeep remains manual."
    baseCase: "Gross margin reaches 70% in Q4Y3 and about 68%-70% across Y3."
    upsideCase: "Gross margin exits near 73% as connectors and packs standardize faster."
    y3RevenueImpactK: 0.0
    cashImpactK: -300.0
  - variable: "hiring pace"
    downsideCase: "Two Y3 hires are pulled into Y2 before repeatable expansion is proven."
    baseCase: "Hiring follows the integration-first sequencing in the business plan."
    upsideCase: "The final policy and GTM hires wait until after Q3Y3 without slowing launches."
    y3RevenueImpactK: 80.0
    cashImpactK: -220.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      DesignPartners[Design partners] --> PaidPilots[Paid pilots]
      PaidPilots --> ProductionBanks[Production banks]
      ProductionBanks --> ExpansionPacks[More packs and adjacent workflows]
      ExpansionPacks --> Revenue[Revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash and runway]
modelSanity:
  - checkName: "Revenue engine"
    finding: "Base revenue comes from growing paying banks from 2 at Y1 exit to 10 at Q4Y3 while blended annualized revenue per bank climbs from about $570K to $750K as second packs and adjacent workflows attach."
  - checkName: "Must go right"
    finding: "The deployment playbook has to compress toward the business plan's sub-8-week packaging target so a 14-person team can support 5 banks by Q4Y2 and 10 by Q4Y3 without dragging gross margin below target."
  - checkName: "Model breaks if"
    finding: "If pilot-to-production cycles slip a quarter or policy-pack upkeep keeps gross margin in the mid-60s, the downside case drives the cash floor toward roughly $250K before seed-ready proof appears."
  - checkName: "Next-round proof"
    finding: "The seed story is 7 paying banks by Q2Y3, at least 2 in-logo expansions, partner-sourced pilots that convert, and quarterly EBITDA turning positive before the pre-seed cash floor tightens."
sanityChecks:
  ruleOf40: "Y3 growth 145.6% + EBITDA margin 10.0% = 155.6%"
  burnMultiple: "Y2 burn multiple is about 0.5x using roughly $1.0M of EBITDA burn against about $2.1M of net new ARR; quarterly EBITDA crosses positive in Q2Y3."
