scenarios:
  downside:
    description: 试点转生产的审批慢了一个季度，扩张更慢，规则包维护也比计划更手工。
    y3RevenueK: 4325.0
    y3EbitdaK: -140.0
    cashLowPointK: 250.0
    keyAssumptionChanges:
    - Q4Y3 的 customersEop 只有 8 家，不是 10 家。
    - 单家付费银行的退出混合 ARR 更接近 $650K，而不是 $750K。
    - 因为规则更新和集成仍更偏服务化，退出毛利率只有约 66%-67%。
  base:
    description: 连接器和规则包的部署打法足够可复制，能把付费银行数从 Y1 末的 2 家推到 Q4Y3 的 10 家，但毛利率要到周期末才摸到目标。
    y3RevenueK: 5525.0
    y3EbitdaK: 550.8
    cashLowPointK: 761.2
    keyAssumptionChanges:
    - CustomersEop 从 M12 的 2 家，爬到 Q4Y2 的 5 家，再到 Q4Y3 的 10 家。
    - 单家付费银行的混合已实现 ARR，从 Y1 末约 $570K 提升到 Q4Y3 的 $750K。
    - 随着毛利率爬到高 60%，季度 EBITDA 在 Q2Y3 转正。
  upside:
    description: 伙伴带来的试点转化更快，更多银行加购第二个规则包或相邻工作流，部署工作也更快标准化。
    y3RevenueK: 6710.0
    y3EbitdaK: 1225.0
    cashLowPointK: 920.0
    keyAssumptionChanges:
    - Q4Y3 的 customersEop 做到 12 家，而不是 10 家。
    - 因为扩张更早落地，单家付费银行的退出混合 ARR 向 $800K 抬升。
    - 随着连接器工作和规则维护更模板化，退出毛利率大约能到 72%-73%。
sensitivity:
- variable: ARPU
  downsideCase: 单家银行的退出混合 ARR 只到约 $675K，而不是 $750K。
  baseCase: Q4Y3 的退出混合 ARR / 银行做到 $750K。
  upsideCase: 更多规则包和相邻工作流扩张，把单家银行的退出 ARR 往 $800K 抬。
  y3RevenueImpactK: -550.0
  cashImpactK: -380.0
- variable: CAC
  downsideCase: 付费试点更吃创始人时间，伙伴导流也更慢，把 CAC 推到约 $280K。
  baseCase: 每家净新增付费银行的 CAC 维持在约 $223K。
  upsideCase: 伙伴转介绍和客户背书把 CAC 压向 $180K。
  y3RevenueImpactK: -100.0
  cashImpactK: -260.0
- variable: 流失率
  downsideCase: 随着现有厂商更快反打包，月度流失率升到 3.0%。
  baseCase: 银行一旦上线生产，月度流失率守在 2.0%。
  upsideCase: 因为受治理队列成了强控制点，月度流失率接近 1.0%。
  y3RevenueImpactK: -220.0
  cashImpactK: -170.0
- variable: 销售周期
  downsideCase: 试点转生产再额外拖一个季度。
  baseCase: 控制审批一过，银行大约用一个季度从付费试点转到生产。
  upsideCase: 有参考客户后，转化周期压到明显短于一个季度。
  y3RevenueImpactK: -500.0
  cashImpactK: -420.0
- variable: 毛利率
  downsideCase: 因为规则包维护仍偏手工，退出毛利率只有约 66%。
  baseCase: 毛利率在 Q4Y3 打到 70%，Y3 全年大约落在 68%-70%。
  upsideCase: 随着连接器和规则包更快标准化，退出毛利率接近 73%。
  y3RevenueImpactK: 0.0
  cashImpactK: -300.0
- variable: 招聘节奏
  downsideCase: 在扩张打法还没跑顺前，就把 2 个 Y3 岗位提前拉进 Y2。
  baseCase: 招聘按商业计划里“集成优先”的顺序推进。
  upsideCase: 最后一批政策和 GTM 岗位拖到 Q3Y3 之后再上，也不影响发布。
  y3RevenueImpactK: 80.0
  cashImpactK: -220.0
modelDiagram:
  title: 单位经济流转
  mermaid: |
    flowchart LR
      DesignPartners[Design partners] --> PaidPilots[Paid pilots]
      PaidPilots --> ProductionBanks[Production banks]
      ProductionBanks --> ExpansionPacks[More packs and adjacent workflows]
      ExpansionPacks --> Revenue[Revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash and runway]
modelSanity:
- checkName: 收入引擎
  finding: 基准收入引擎来自两件事：付费银行数从 Y1 末的 2 家长到 Q4Y3 的 10 家；同时单家银行的年化收入也从约 $570K 抬到 $750K，因为第二个规则包和相邻工作流开始加购。
- checkName: 必须跑通的地方
  finding: 部署打法必须往商业计划里“打包后 8 周以内上线”的目标压缩，否则 14 人团队撑不起 Q4Y2 的 5 家银行和 Q4Y3 的 10 家银行，毛利率也会掉出目标带。
- checkName: 模型会断在这里
  finding: 如果试点转生产再慢一个季度，或者规则包维护让毛利率一直停在 60% 中段，下行情景就会在种子轮就绪证据出现前，把现金低点压到约 $250K。
- checkName: 下一轮要看的证据
  finding: 种子轮故事要拿出的，是 Q2Y3 的 7 家付费银行、至少 2 次同一客户扩张、能转化的伙伴来源试点，以及在 pre-seed 现金低点收紧前，季度 EBITDA 已经转正。
sanityChecks:
  ruleOf40: Y3 growth 145.6% + EBITDA margin 10.0% = 155.6%
  burnMultiple: Y2 的烧钱倍数约 0.5x：大约 $1.0M 的 EBITDA burn，对应约 $2.1M 的净新增 ARR；季度 EBITDA 在 Q2Y3 转正。
  revenuePerFte: $395K 的 Y3 人均收入，对应期末 14 个 FTE（SaaS 基准约 $200-400K）。
  flags:
  - CustomersEop 在 Y1 和 Y2 前段把付费试点也算成付费银行，所以直到 Y2 后段，真实生产银行数都低于表面客户总数。
  - Q4Y3 的退出 ARPU 打到了研究里的 $750K 年支出水平，所以第二个规则包或相邻工作流扩张，必须在多家客户上真正落地，不能只靠单条队列定价。
  - 收入集中度依然很高，因为 Q4Y3 仍然只靠 10 家银行；少掉 1 次续约，就会明显打到增长和现金。
  - 现金曲线拿 EBITDA 当代理，因此企业计费节点、实施预付款或递延收入，都可能把真实低点往前后挪。
