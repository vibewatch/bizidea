competitors:
- name: Quantifind
  stage: scale-up
  wedge: AI-native investigations, watchlist screening, and sanctions intelligence on the Graphyte platform
  pricing: Custom enterprise pricing; not publicly disclosed
  strength: 'Most direct evidence of the category: it combines explainable risk intelligence with agentic middleware and strong screening-investigations messaging.'
  weaknessVsUs: Its center of gravity is risk intelligence and screening performance; the startup still has room to own the cross-stack jurisdiction-governance runtime as a more neutral control layer.
  sourceRefs:
  - 1
  - 3
  - 4
  - 87
- name: NICE Actimize
  stage: incumbent
  wedge: End-to-end AML suite, sanctions screening, enterprise case management, and agentic investigation features
  pricing: Custom enterprise pricing; not publicly disclosed
  strength: Deep installed base, auditable case-management posture, and explicit agentic AI positioning for investigations.
  weaknessVsUs: A large-suite posture can leave room for a faster neutral layer that works across mixed stacks and localized policy needs without a broader platform migration.
  sourceRefs:
