- name: Quantexa
  stage: scale-up
  wedge: Connected-data and decision-intelligence foundation for AML, KYC, and financial-crime investigations
  pricing: Custom enterprise pricing; not publicly disclosed
  strength: Strong entity-resolution and contextual-data story that improves detection and investigation quality across large institutions.
  weaknessVsUs: It is stronger on context and detection than on the explicit permissions, reviewer checkpoints, and jurisdiction-pack runtime that govern every agent action.
