  validationPlan:
  - priority: high
    question: How much of investigator time in one live sanctions queue is evidence gathering versus QA, escalation, and narrative drafting?
    evidenceToGather: Shadow one bank team for a week and time-box the work across three alert severities using actual case artifacts.
  - priority: high
    question: Will banks buy a neutral control plane directly, or only through an incumbent AML-suite or transformation program?
    evidenceToGather: Interview five buyers and collect one recent sanctions or investigations RFP to see where budget and procurement authority actually sit.
  - priority: medium
    question: What level of jurisdiction-pack maintenance requires legal or policy-ops headcount versus product configuration?
    evidenceToGather: Map rule-change histories for the UK, UAE, and Singapore corridors over the past 12 months and estimate update cadence by workflow step.
