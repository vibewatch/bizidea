- name: Lucinity
  stage: scale-up
  wedge: AI-native investigator workflow and case actioning for sanctions and fincrime teams
  pricing: Custom enterprise pricing; not publicly disclosed
  strength: Investigator-centric UX and explicit workflow/action tooling make it credible for operational adoption.
  weaknessVsUs: The product reads as a strong workbench, but the startup can differentiate with deeper multi-jurisdiction policy governance and broader mixed-stack neutrality.
