competitors:
- name: Quantifind
  stage: scale-up
  wedge: 基于 Graphyte 平台的 AI 原生调查、观察名单筛查和制裁情报
  pricing: 企业定制价；未公开
  strength: 它最直接地证明了这个类目存在：把可解释的风险情报、智能体中间件和强势的筛查 / 调查叙事揉到了一起。
  weaknessVsUs: 它的重心更偏风险情报和筛查表现；创业公司仍有空间占住跨栈、按辖区治理的运行时，做成更中立的控制层。
  sourceRefs:
  - 1
  - 3
  - 4
  - 87
- name: NICE Actimize
  stage: incumbent
  wedge: 端到端 AML 套件、制裁筛查、企业案件管理，加上智能体调查功能
  pricing: 企业定制价；未公开
  strength: 装机量深、案件管理可审计，而且已经明确把智能体 AI 叙事打到调查场景。
  weaknessVsUs: 大套件打法会给更快、更中立的一层系统留下空间——尤其是在混合栈和本地规则需求更重、又不想整个平台迁移的银行里。
  sourceRefs:
  - 37
  - 38
  - 41
  - 44
  - 88
- name: Quantexa
  stage: scale-up
  wedge: 给 AML、KYC 和金融犯罪调查打底的连接数据与决策智能底座
  pricing: 企业定制价；未公开
  strength: 实体解析和上下文数据叙事很强，能明显提升大型机构里的检测和调查质量。
  weaknessVsUs: 它在上下文和检测上更强，但在逐个智能体动作的权限、审核节点和辖区规则运行时上，定义没有那么明确。
  sourceRefs:
