  - 90
- name: Lucinity
  stage: scale-up
  wedge: 给制裁和金融犯罪团队用的 AI 原生调查员工作流与案件处置台
  pricing: 企业定制价；未公开
  strength: 以调查员为中心的体验，加上明确的工作流 / 动作工具，让它在运营采用上很有说服力。
  weaknessVsUs: 它像一张很强的工作台，但创业公司还能靠更深的多辖区规则治理和更广的混合栈中立性拉开差距。
  sourceRefs:
