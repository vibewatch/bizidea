      sourceRefs:
      - 38
      - 41
      - 44
      - 52
      - 69
    competitiveRivalry:
      score: 5
      rationale: 竞争度高，因为多家可信厂商都在卖智能体 AI、案件管理现代化或上下文化 AML 提效，瞄的都是同一个调查控制点。
      sourceRefs:
      - 87
      - 88
      - 89
      - 90
      - 37
      - 52
  pestle:
  - factor: 政治
    impact: negative
    point: 制裁制度和定向金融制裁要求变化很快，逼着银行必须跨业务走廊持续维护规则。
    sourceRefs:
    - 76
    - 99
    - 101
    - 102
  - factor: 经济
    impact: positive
    point: 金融犯罪合规的绝对成本，以及调查速度慢带来的运营拖累，让自动化的 ROI 叙事很容易站住，而且不需要另开预算类目。
    sourceRefs:
    - 95
    - 96
    - 69
  - factor: 社会
    impact: negative
    point: 金融犯罪团队依然背着大量手工复核和定期复查工作，这既带来采用需求，也会带来组织层面的变革疲劳。
    sourceRefs:
    - 69
    - 95
  - factor: 技术
    impact: positive
    point: AI 在金融服务里已经走向主流，厂商发布节奏也表明，半自主调查工具正在进入生产环境。
    sourceRefs:
    - 79
    - 84
    - 88
    - 89
  - factor: 法律
    impact: negative
    point: 制裁和 AML 控制必须风险导向、文档齐全、且可复核，这会抬高任何想在真实调查里拿权限的产品门槛。
    sourceRefs:
    - 99
    - 76
    - 101
    - 102
  - factor: 环境
    impact: neutral
    point: 环境和贸易扰动不是首要采购触发，但它们会在暴露较高的业务走廊里抬高跨境贸易 AML 的复杂度和调查量。
    sourceRefs:
    - 17
    - 98
  adoptionFrictionMatrix:
  - friction: 调查上下文散落在案件系统、筛查工具、数据供应商和分析师流程里
    severity: high
    affectedBuyer: 金融犯罪运营与调查负责人
    mitigation: 先在一条队列上接只读连接器，先证明拼案更快，再自动化更广的工作流步骤。
    sourceRefs:
    - 15
    - 16
    - 41
  - friction: 人在环、测试和模型治理要求，在生产合规工作流里没有讨价还价空间
    severity: high
    affectedBuyer: 首席合规官、模型风险和内审团队
    mitigation: 把审批、控制测试和可审计日志做成一等产品对象，而不是事后报表。
    sourceRefs:
    - 79
    - 82
    - 99
  - friction: 横跨英国、阿联酋和 APAC 业务走廊的规则包维护，可能很快卡住运营
    severity: high
    affectedBuyer: 区域 AML 政策 负责人 和 QA 经理
    mitigation: 先上少量走廊专用规则包，再用区域顾问接住变更管理。
    sourceRefs:
    - 76
    - 101
    - 102
  - friction: 如果看不到证据来源和覆盖逻辑，调查员不会信任智能体动作
    severity: medium
    affectedBuyer: 调查员和二线审核人
    mitigation: 先从取证和草稿备忘录起步，等审核人信心起来，再往更高权限动作走。
    sourceRefs:
    - 1
    - 34
    - 37
    - 88
