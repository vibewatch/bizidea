regulatoryTechnicalConstraints:
- point: 任何进入制裁工作流的系统，都必须支撑一套风险导向的合规计划：管理层承诺、风险评估、内部控制、测试 / 审计和培训，一个都不能少。
  sourceRefs:
  - 99
- point: 在迪拜 / 阿联酋落地时，必须按阿联酋框架把定向金融制裁流程、政策和处罚写进去，不能只靠一套泛全球配置。
  sourceRefs:
  - 101
  - 102
- point: 实体解析、数据统一和上下文拼装是核心技术约束，因为多数遗留 AML 工具默认给不了调查员完整的交易对手视图。
  sourceRefs:
  - 15
  - 16
  - 72
- point: 英国制裁合规要求规则高频更新、且操作理解必须清晰，这会把产品设计推向可配置规则包，而不是写死的工作流。
  sourceRefs:
  - 76
  - 78
validationSignals:
- point: Quantifind 这轮 $200M 成长融资，明确押注 AI 原生风险情报和智能体中间件，说明围绕金融犯罪运营控制层的赛道已经能撑起风险投资级别的下注。
  sourceRefs:
  - 87
- point: NICE Actimize 和 Quantexa 现在都在卖智能体或为智能体就绪的金融犯罪产品，说明买方已经不满足于通用 AI 副驾，而是要受控执行。
  sourceRefs:
  - 88
  - 89
  - 90
- point: Fenergo 报告称，打击金融犯罪是 2025 年 AI 投资的头号优先级，而且受访的英美机构里，47% 已在合规运营中使用 AI。
  sourceRefs:
  - 69
- point: 筛查厂商已经开始宣传硬自动化指标，例如 65-85% 的常规误报自动修复，或显著降低误报，说明买方要的是可量化的工作流改善。
  sourceRefs:
  - 3
  - 58
openQuestions:
- 这一轮抓取里 MAS 的 FEAT 材料拉取不顺，接下来要怎样用一手来源把新加坡层面的 AI 治理要求补实，尤其是制裁调查场景？
- 在真实制裁队列里，工作量到底有多少花在取证，多少花在审核 QA，多少花在最终处置文书？
- 全球银行会不会直接采购一层中立控制平面，还是必须借道现有 AML 套件、数据底座或咨询项目？
- 要把 3 个业务走廊的辖区规则包持续维护住，到底要配多少长期法务 / 政策运营 人力，才不会把软件毛利侵蚀掉？
