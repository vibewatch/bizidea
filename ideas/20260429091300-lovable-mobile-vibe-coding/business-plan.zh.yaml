slug: store-walk-app-builder
date: 2026-04-29
executiveSummary: >-
  Store-walk app builder 瞄准的是 75-250 家门店 QSR
  品牌里一个很窄、但够着急的流程：在现场运营语境变旧之前，把区域经理在巡店时看到的问题，转成受治理、可上线的活流程。这个切口卖的不是泛用应用生成，而是围绕菜单上新、审计整改和劳动政策更新，做到当天创建、当天审批、当天发布，并带完工证实。研究说明，买方已在餐饮执行与检查清单软件上持续花钱，不过现有套件大多由中心团队配置，横向构建器又不会默认打包审批、证据采集、离线执行和
  QSR 模板。第一单最适合做成一次付费区域试点，绑定一个明确触发事件，直接卖给运营副总裁或一线运营总监，并用发布时间和门店完成率来衡量成效。定价应从试点过渡到年度平台费加按店
  SaaS，由于真正累积价值的不是“给多少个构建席位”，而是能否把流程推到整条连锁。研究给出的滩头 SAM 只有约 $23.9M，因此 venture case
  必须证实：这层流程能力未来能扩到其他前线垂直行业。眼下最大的证伪风险是行为层面的——区域经理也许愿意在手机上记录问题，不过最终还是会依赖中心运营分析师来写出正式流程。此外，目前仍没有直接试点证据，因此这份计划默认的不是自动发布，而是“AI
  先出草稿 + 人工强制审批”。
problem:
  - 一线运营团队在巡店、上新和审计复盘时会发现流程已失灵，不过新流程往往还要经过 IT、无代码管理员或审计软件配置，拖上数天甚至数周。
  - 现有替代方案要么优化的是检查与审计，要么优化的是泛用应用构建；它们都不会默认交付“当天受治理发布”所需的审批、照片证据、离线执行和全链条整改追踪。
solution:
  - 一名移动副驾让区域经理在店里直接说出或输入问题、附上照片，然后生成一份草稿流程，内含任务、执行人、截止时间、升级逻辑和完工证实要求。
  - 随后，一层“审批优先”的控制平面把流程发布给门店团队，按门店跟踪完成进度，并保留可供审计的版本历史，让连锁品牌能看清反复失败点并安全地发布更新。
whyWeWin:
  - 记录动作从问题被看到的现场开始；因此产品保住了桌面管理工具和延迟搭表单最容易丢失的运营语境。
  - 发布前审批、RBAC、离线照片证据，以及 QSR 专属模板，正好补上横向构建器和泛用检查工具最薄弱的信任与治理空档。
  - 第一版 ROI 叙事直接对准那些有预算、又很着急的运营事件，而不是卖一个泛泛的 AI 构建器故事，销售锋芒会更集中。
strategicChoices:
  beachhead: 拥有 75-250 家门店、区域经理每周巡店、且菜单或标准发布频繁的美国区域型 QSR 品牌。
  wedgeRationale: 这个切片里有反复出现的触发事件、既有软件预算，以及非常清楚的用户—买方配对；同时它又够小，能先把审计、上新和整改周围的一组狭窄模板产品化，再考虑更宽的一线流程。
  sequencingRationale: >-
    先把独立可用的移动编排、审批、离线证据采集和基础连锁分析做出来，让最初几次试点先证实“当天部署”这件事；之后再补 SSO
    与最常被点名的消息或任务系统集成，由于采购与推广摩擦只有在流程本身证实价值后才会真正出现；等两个付费试点证实这套打法不需要重服务化，才去补实施与集成能力。
  notYet:
    - 覆盖完整餐饮运营套件，比如排班、POS、库存或 LMS。
    - 纯自助式 SMB 餐饮分发。
    - 在 QSR 模板包和试点转化打法可复制前，就提前扩到零售、便利店、酒店或现场服务。
market:
  tam: 以每店每年约 $600 的估算口径计算，美国有限服务餐饮软件支出 TAM 约为 $159.1M。
  sam: 50-300 家门店区域型连锁里的美国支出约为 $23.9M，够撑起一个集中滩头，不过还不够撑起长期单一垂直的大故事。
  som: 研究模型里第 3 年可触达收入约为 $1.5M，对应 20 个品牌、平均 120 家门店，再加一笔不高的平台费。
  segments:
    - 拥有 75-250 家门店、且一线运营团队每周巡店的美国 QSR 品牌。
    - 在核心 QSR 流程模板被证实后，向更大连锁内的 QA、品牌标准和加盟运营团队扩张。
  buyingProcess: 运营副总裁或一线运营总监通常会围绕一次菜单上新、一次审计失利，或一次政策更新，发起一个事件驱动的试点。IT 和安全团队会在推广前介入，由于审批控制、审计日志、身份连接和少量关键集成，多半都是上线门槛。
product:
  mvp: >-
    交付移动端语音与照片采集、AI 草稿生成检查清单与整改流程、发布前强制经理审批、支持离线的门店执行，以及一块可查看完成进度与证据的连锁看板。MVP
    只解决一个狭窄承诺：在问题被看到的同一天，把一套安全、可审计的流程推到整条连锁。
  sixMonth: 上线可复用模板，覆盖菜单上新、审计整改和劳动政策更新，同时补齐角色权限、版本历史，以及可导出的完成证据。
  twelveMonth: 加上 SSO、试点里最常被要求的消息或任务系统集成、多区域看板，以及能推荐模板复用的重复失败分析。
  twentyFourMonth: 把同样的“创建—审批—发布”模式，从 QSR 扩到一个相邻的一线垂直行业，并能做跨地点的上线基准对比。
  keyBets:
    - 区域经理会在手机上亲自编写或显著修改流程，而不是只把原始笔记往上传。
    - 经人工审批的 AI 草稿，会比“全自动发布”更快赢得信任。
    - 离线执行、照片证据和连锁分析，够帮产品拿下第一笔预算，而不必先做深度 POS 或劳动力系统集成。
    - 跨门店整改数据最终会沉淀为可复用的运营本体与模板护城河。
gtm:
  wedge: 围绕一次菜单上新、审计整改或劳动政策更新，先卖出一个区域级付费试点；如果产品能证实当天发布和完成率拉升，再转成品牌级年度 rollout。
  channels:
    - 创始人主导外呼，直接找 75-250 家门店 QSR 品牌的运营副总裁、一线运营负责人、QA 与品牌标准负责人。
    - 已在执行工具领域服务客户的餐饮运营顾问和审计软件迁移伙伴。
    - 前两次 rollout 之后，通过行业活动和客户案例带动口碑销售。
  funnelTargets: 10-15 个目标账户 → 4-6 个高层评估 → 每季度 2-3 个付费试点；试点转年度 rollout 高于 40%；上线后 90 天内发起第二个流程的比例高于 60%。
  pricing: >-
    8-12 周区域试点收费 $15k-$25k，随后转为年度 SaaS：品牌费 $5k-$10k，加每个活跃门店每年约 $500-$700。这样按 rollout
    价值计价，比按席位卖构建器，更贴近现有检查或执行软件预算。
businessModel:
  revenueStreams:
    - 用于单一区域价值证实的付费试点与实施收入。
    - 按品牌收平台费、按门店订阅的年度 SaaS 合同。
    - 同一品牌内部新增流程、区域和合规/QA 情境带来的扩张收入。
  unitOfValue: 品牌合同下的活跃门店地点，外加一笔用于治理与分析的小额平台费。
  targetGrossMarginPct: 75
  expansionLevers:
    - 每个品牌内跑出更多流程，比如上新、整改、食品安全和劳动政策发布。
    - 区域试点后，把同一连锁更多门店和区域卷进来。
    - 进入同一账户内的相邻买方，例如 QA、品牌标准和加盟运营团队。
    - 以后把同一套流程引擎复用到便利店、零售、酒店和现场服务网络。
strategyMap:
  northStarMetric: 由现场观察生成并发布的活流程数量，以及这些流程是否能在要求时限内达到跨门店完成目标。
  inputMetrics:
    - 从巡店观察到审批通过并发布的中位耗时（小时）
    - 试点流程里，由区域经理在手机上创建或实质性修改的占比
    - 上新或整改流程在截止时间内的门店完成率
    - 付费试点转年度 rollout 的转化率
    - 品牌上线后前 90 天内启动的流程数量
  moatsToBuild:
    - 面向上新、审计和纠正措施的 QSR 专属模板库与运营本体
    - 与流程结果绑定的跨门店整改与证据数据集
    - 被运营与安全团队信任的审批、版本控制和审计轨迹
    - 接到试点常见身份、消息与任务系统上的轻量集成层
  killCriteria:
    - 前 5 个付费试点里，不到 2 个能在 6 个月内转成年费 rollout。
    - 试点流程中，不到 50% 由区域经理在手机上创建或显著修改。
    - 关闭前 3 个正式生产客户时，平均需要超过 2 个定制集成。
  mermaid: |
    flowchart LR
      Wedge[QSR 巡店切口] --> MVP[移动草稿与审批 MVP]
      MVP --> Proof[当天发布与完成证明]
      Proof --> Expansion[QSR 多工作流 rollout]
      Expansion --> Adjacency[相邻前线垂直行业]
investorMemo:
  verdict:
    call: 继续观察
    conviction: 流程切口有吸引力，买方触发事件也很真实，不过在证实区域经理行为和试点后的 rollout 转化前，判断仍应克制。
    whyBelieve: 现有厂商已证实预算与紧迫性都存在，而“当天受治理 rollout”也确实处在检查清单套件与泛用 AI 构建器之间的空档上。
    whyDoubt: QSR 滩头本身不大，同时还没有直接证据说明区域经理会持续在手机上写流程，也没有证据说明买方会从现有套件上切走。
    nextDiligence: 拿下一个 75-250 家门店品牌的付费试点，并证实它会围绕一个明确触发事件，转成年度、多流程 rollout。
  firstCustomer:
    title: 75-250 家门店连锁里的区域型 QSR 一线运营负责人
    profile: 一家美国快餐品牌，区域经理每周巡店，促销或标准变更频繁，目前仍混用表单、SOP 文档和执行软件。
    trigger: 季节性菜单上新、审计失败，或劳动政策变更，要求品牌在几天内把新检查清单和完工证实流程推到所有门店。
    buyer: 运营副总裁或一线运营总监
    initialContract: $15k-$25k 的付费试点，覆盖单一区域 20-40 家门店；随着流程扩到 75-250 家门店，再转成约 $60k-$120k 的年度 rollout。
  mustBeTrue:
    - 区域经理能在巡店当场或结束后 15 分钟内，做出一份可发布的首稿。
    - 至少有一种高紧迫运营事件，能在 30 天内稳定触发预算和高层注意力。
    - 经人工审批的 AI 流程，能把 rollout 时间从数天或数周压到当天，同时不增加合规或审计例外。
    - 前 5 个客户只需 SSO 加一个消息或任务系统集成，就能完成上线，而不必先做重型 POS 或劳动力系统工作。
    - 一家 75-250 家门店连锁愿意在试点后付费 $60k-$120k 年费，由于产品替代或整合了既有执行/检查清单预算。
  diligenceQuestions:
    - 巡店之后，今天到底是谁在起草、编辑和审批流程？
    - 第一份合同会从哪条既有预算线上出，预算续期时间点是什么时候？
    - 哪个 KPI 能在前 60 天里显著拉升到够撑起全品牌 rollout？
    - 为了完成正式上线，哪一两个集成是绝对必需的？
    - 在第一次上新或整改情境之后，品牌还会多频繁地需要新流程？
  riskHeatmap:
    - risk: 区域经理可能不会成为持续的移动端作者
      likelihood: High
      impact: High
      leadingIndicator: 在被观察的巡店里，不到一半的试点流程由区域经理创建或做出实质修改。
      mitigation: 先把产品定位成草稿捕捉 + 中心审批，再不断收窄 UX，直到移动端编写显著快过现在的记笔记方式。
    - risk: 现有厂商或横向构建器压缩切口
      likelihood: High
      impact: High
      leadingIndicator: 潜在客户认为现有检查清单或应用构建工具稍作配置就能解决问题，并因功能重叠而拒绝试点。
      mitigation: 把差异化压在 QSR 模板、审批流、离线证据采集和可量化的当天 rollout 结果上，而不是原始生成能力上。
    - risk: 安全与集成要求拖慢 rollout
      likelihood: Medium
      impact: High
      leadingIndicator: 试点因 SSO、审计日志或集成缺口，在采购阶段卡住超过 90 天。
      mitigation: 前期试点一旦被证实，就立刻把 SSO、审计日志和最常见的消息/任务集成产品化，同时避免过早承诺深度系统记录层集成。
    - risk: QSR 滩头对 venture scale 来说仍太小
      likelihood: Medium
      impact: High
      leadingIndicator: 新 logo 长时间只集中在一个极窄细分里，到第 2 年也看不到第二类流程或相邻买方扩张。
      mitigation: 从第一批试点起就测量流程复用率和模板可迁移性，好尽早判断是否该扩到相邻前线垂直领域。
operatingAssumptions:
  - assumption: 区域经理会在手机上写出第一版可用草稿，而不止是替中心运营收集原始笔记。
    basis: research.yaml
    validationTest: 在 3 个品牌里跟 10 次巡店，要求至少 7/10 个流程能在移动端 15 分钟内达到可发布草稿质量。
    decisionImpact: 如果不成立，就把产品重定位成面向分析师辅助的流程采集工具，并压低在手机端生成 UX 上的投入。
  - assumption: 第一份合同能挤占现有检查清单或执行预算，而不必新开一条软件预算科目。
    basis: research.yaml
    validationTest: 完成 12 次买方访谈，并至少拿到 5 个明确表态：试点预算会来自现有审计、食品安全或现场执行预算。
    decisionImpact: 如果不成立，销售周期会显著拉长，公司可能需要更轻量的切入动作或更窄的合规 ROI 情境。
  - assumption: 两个产品化集成就够关闭前五个正式生产账户。
    basis: research.yaml
    validationTest: 跟踪试点需求，确认前 5 个生产部署里至少 4 个只靠 SSO 加不超过一个消息/任务集成就能成交。
    decisionImpact: 如果不成立，工程能力就得转向集成平台，融资需求或滩头细分也可能要改。
  - assumption: 只要能证实当天 rollout，围绕研究 sizing 基准的按店定价就能被接受。
    basis: operator judgment
    validationTest: 在定价访谈和试点谈判里，至少拿到 3 个口头接受，愿意按每店每年 $500-$700 外加适度品牌费成交。
    decisionImpact: 如果不成立，模型就得更依赖平台费、服务收入或相邻流程扩张，毛利目标会变弱。
  - assumption: 这套流程引擎在 QSR 模板 fit 之后，能泛化到至少一个相邻前线垂直行业。
    basis: idea.yaml
    validationTest: 到第 18 个月，在便利店、零售或酒店做 6 次 discovery，并拿到至少 2 个设计伙伴承诺，且问题形态仍符合“创建—审批—发布”模式。
    decisionImpact: 如果不成立，公司就应该优化成一家扎实的垂直软件公司，而不是继续讲更宽的平台型 venture 故事。
experimentRoadmap:
  - horizon: 0-90 天
    experiment: 跟随区域经理做真实巡店，并把他们的笔记人工转成原型流程。
    hypothesis: 这个痛够尖，以至于经理会更愿意现场起草流程，而不是巡店后再回到邮件和表格里补录。
    successMetric: 在 10 个被观察到的问题里，至少 7 个能在 24 小时内被买方认定为可发布流程，且中位起草时间低于 15 分钟。
    owner: 创始人和产品负责人
  - horizon: 0-90 天
    experiment: 与 12 个目标 QSR 品牌的 VP Ops、QA 和品牌标准负责人做买方与定价调研。
    hypothesis: 菜单上新、审计失利和政策更新，确实会沉淀出可付费试点的预算窗口。
    successMetric: 至少 5 位买方确认有可信预算来源，且 3 位愿意按提议价位进入试点范围讨论。
    owner: GTM 创始人
  - horizon: 90-180 天
    experiment: 围绕单一触发事件，启动一个覆盖 20-40 家门店区域的付费试点。
    hypothesis: 只要有当天发布和审批控制，就能在不做重集成的前提下，优于现有 rollout 方法。
    successMetric: 流程在当天上线，超过 85% 的门店在要求窗口内完成，且买方签署扩张计划。
    owner: 创始工程负责人和 GTM 创始人
  - horizon: 90-180 天
    experiment: 把试点里最常出现的 SSO 与一个消息/任务集成产品化。
    hypothesis: 轻量级企业就绪能力，够移除正式 rollout 最主要的采购障碍。
    successMetric: 第二个试点在 45 天内拿到安全批准，且不需要超过一个定制集成。
    owner: 集成工程师
  - horizon: 6-12 个月
    experiment: 在多个品牌里推出三套标准模板包，并跟踪复用情况。
    hypothesis: 菜单上新、审计整改和劳动政策模板，会推动同一账户里第二、第三个流程上线。
    successMetric: 至少 60% 的正式客户在 90 天内发起第二个流程，且至少 2 个客户同时采用三套模板包。
    owner: 产品负责人和实施负责人
  - horizon: 12-18 个月
    experiment: 用现有流程引擎，测试一个相邻前线垂直行业的可迁移性。
    hypothesis: “创建—审批—发布”模式能扩出 QSR，而不需要推倒重做整套产品。
    successMetric: 在 QSR 之外拿到 2 个设计伙伴，且至少 70% 的现有产品能力和模板逻辑仍可复用。
    owner: CEO
operations:
  - 从第一天起就把移动发布流程做成带审计日志、角色权限和发布前复核的机制。
  - 建立提示词与流程评估闭环，把 AI 草稿与最终获批流程进行对比，并跟踪失败模式。
  - 维护一套围绕菜单上新、审计整改和劳动政策更新的模板运营库，并带版本治理。
  - 用重服务试点实施手册，明确触发事件、成功指标、培训节奏和高层复盘方式。
  - 合作策略优先对准餐饮运营顾问和轻量集成伙伴，而不是一开始就找重型系统集成商做替换。
team:
  - role: 创始工程负责人
    startTiming: Month 0
    rationale: 产品和泛用构建器拉开差距的核心，在于移动、离线、审批和证据采集能力，因此这块必须从第一天就有人扛。
  - role: GTM 创始人
    startTiming: Month 0
    rationale: 前期销售依赖创始人亲自做 discovery、设计事件驱动试点，并建立和一线运营买方的直接可信关系。
  - role: 产品与设计负责人
    startTiming: Month 2
    rationale: 最大的产品风险在于非技术运营人员能否顺手写流程，因此设计必须尽早嵌入客户观察里。
  - role: 集成与安全工程师
    startTiming: Month 6
    rationale: 一旦试点要转 rollout，SSO、审计日志和消息/任务集成就会变成明确门槛。
  - role: 实施负责人
    startTiming: Month 6
    rationale: 重服务 onboarding 和 ROI 量化是试点转成年度多区域部署的关键，不能全压在创始人身上。
milestones:
  - horizon: 0-12 个月
    items:
      - 在 75-250 家门店 QSR 细分里签下 3 个设计伙伴。
      - 发布 MVP，包含移动采集、草稿生成、发布前审批、离线执行和连锁完成看板。
      - 围绕真实触发事件拿下 2 个付费试点，并至少把其中 1 个转成年度 rollout。
      - 找出试点采购里反复出现的前 2 个集成或安全要求，并把它们产品化。
  - horizon: 12-24 个月
    items:
      - 把菜单上新、审计整改和劳动政策模板包标准化，并证实有可量化的重复使用。
      - 做到 8-10 个品牌客户，并拿下 3 个可对外引用的案例，且能量化 rollout 或审计结果。
      - 上线 SSO、消息/任务集成，以及能推动第二个流程扩张的重复失败分析。
      - 在 QSR 内证实一类相邻买方扩张，例如 QA 或加盟运营。
  - horizon: 24-36 个月
    items:
      - 用同一套流程引擎进入一个相邻前线垂直行业，并拿到至少 2 个设计伙伴。
      - 基于跨门店整改数据，做出基准对比与推荐能力。
      - 证实公司能超出最初的 QSR 切口扩张，而不会滑成一家定制服务公司。
risks:
  - risk: 区域经理更愿意做笔记采集，中心运营仍是实际流程作者。
    likelihood: High
    impact: High
    mitigation: 先从移动端草稿采集加人工审批做起，只有在使用数据证实成立后，才继续优化现场编排体验。
  - risk: 横向构建器和餐饮现有厂商迅速缩小功能差距，并压低定价。
    likelihood: High
    impact: High
    mitigation: 竞争焦点放在垂直模板、治理能力、离线证据和 rollout 时间指标上，而不是泛用应用生成。
  - risk: 安全、身份和集成诉求把采购拖得太慢，击穿小团队销售节奏。
    likelihood: Medium
    impact: High
    mitigation: 前期尽量保持独立部署，然后在大规模外呼前，先把 SSO 和最常见集成补齐。
  - risk: QSR 滩头太小或太窄，不够撑起 venture 回报。
    likelihood: Medium
    impact: High
    mitigation: 把 QSR 明确视作证实切口，并在第 18 个月前就系统测试向相邻前线垂直行业迁移的可行性。
fundingAsk:
  stage: pre-seed
  targetFundingRangeUsd: $2-3M
  runwayMonths: 18
  useOfFundsSummary: 用这笔钱把“审批优先”的移动产品做出来，拿下 3-5 个付费 QSR 试点，补齐核心安全与集成要求，并把前期试点转成可复制的年度 rollout，再决定这个切口能否扩出 QSR。
