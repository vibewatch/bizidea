differentiator: >-
  The differentiation is not a better generic AI app generator; it is a vertical control plane for frontline operations changes. The product starts from a specific workflow moment, the store walk, and bakes in permissions, evidence capture, escalation paths, and chain-wide rollout. That lets it replace a messy combination of audit apps, form tools, SOP documents, and ops tickets instead of competing head-on with broad vibe-coding platforms.
