topRisks:
  - name: Generic builder compression
    description: Broad vibe-coding platforms may move down-market into frontline workflow generation and squeeze feature differentiation.
    mitigation: Own the vertical layer with QSR-specific templates, rollout governance, proof-of-completion, and operational integrations that generic builders do not prioritize.
  - name: Buyer skepticism on reliability
    description: Operations leaders may not trust AI-generated workflows to control audits or compliance-sensitive tasks without human review.
    mitigation: Start with draft generation plus mandatory manager approval, auditable version history, and limited high-value use cases such as launches and remediation.
  - name: Integration drag
    description: If the product cannot plug into existing task, messaging, and identity systems, rollout friction will slow adoption.
    mitigation: Narrow the first product to standalone mobile execution, then prioritize the 2-3 integrations most common in mid-market QSR operations.
