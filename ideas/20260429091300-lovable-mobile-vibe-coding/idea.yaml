jobsToBeDone:
  - job: When a district manager finds the same operational issue across multiple stores, help them turn that observation into a deployable workflow, so they can standardize the fix before the next audit cycle.
    currentAlternative: Emailing notes, updating SOP docs, and waiting for forms or audit software admins to build a new flow
    successMetric: New workflow live across affected stores within 24 hours
  - job: When a brand launches a new menu item or compliance requirement, help field ops publish and verify execution steps, so they can prove rollout consistency across every location.
    currentAlternative: Static PDFs, LMS modules, and manual follow-up calls
    successMetric: Completion and proof-of-execution rate by store within the launch window
