slug: store-walk-app-builder
date: 2026-04-29
currency: USD
modelStartMonth: 2026-05
assumptions:
  - id: A1
    name: 模型起始月份
    value: "2026-05"
    unit: month
    source: "根据 2026-04-29 的计划日期做启发式推算，假设融资完成后次月开始运营爬坡。"
  - id: A2
    name: 平均付费试点合同金额
    value: "20"
    unit: USDK per pilot
    source: "[BP gtm.pricing] 取 $15k-$25k 的 8-12 周试点价格中点。"
  - id: A3
    name: 稳态下单品牌年 ACV
    value: "78"
    unit: USDK per brand per year
    source: "[BP gtm.pricing, research market.som] 假设每品牌 $6k 平台费，加 120 家门店 × 每店每年 $600。"
  - id: A4
    name: 每个活跃付费品牌月度确认收入
    value: "6.5"
    unit: USDK per month
    source: "由 A2 和 A3 推导；试点收入按约 3 个月确认，与稳态 ACV 除以 12 接近，因此取每品牌每月 $6.5K 的混合口径，能让收入前后一致。"
  - id: A5
    name: 第 1 年付费品牌爬坡
    value: "4"
    unit: brands at EOY
    source: "[BP milestones 0-12 months, BP gtm.funnelTargets] 基准情形下拿下 2 个付费试点，并在第 1 年末形成 4 个在付 logo，其中包含 1 个转年费和若干持续中的试点。"
  - id: A6
    name: 第 2 年付费品牌爬坡
    value: "10"
    unit: brands at EOY
    source: "[BP milestones 12-24 months] 对应 12-24 个月内达到 8-10 个品牌客户的目标。"
  - id: A7
    name: 第 3 年付费品牌爬坡
    value: "20"
    unit: brands at EOY
    source: "[research market.som] 可触达情景按第 3 年达到 20 个品牌计算。"
  - id: A8
    name: 毛利率
    value: "75"
    unit: percent
    source: "[BP businessModel.targetGrossMarginPct]"
  - id: A9
    name: 月度 logo 流失率
    value: "2.0"
    unit: percent
    source: "创业财务启发式：针对年费合同、但留存尚未被充分验证的早期垂直 SaaS。"
  - id: A10
    name: 客户获取成本
    value: "35"
    unit: USDK per brand
    source: "[BP gtm channels and funnelTargets] 加上创业财务启发式，适用于创始人主导的企业外呼、试点范围界定和实施支持。"
  - id: A11
    name: 创始工程负责人综合现金成本
    value: "180"
    unit: USDK annualized
    source: "[BP team] 加上创业财务启发式，采用精简创始人工资和 20% 薪酬负担。"
  - id: A12
    name: GTM 创始人综合现金成本
    value: "144"
    unit: USDK annualized
    source: "[BP team] 加上创业财务启发式，采用精简创始人工资和 20% 薪酬负担。"
  - id: A13
    name: 产品与设计负责人综合现金成本
    value: "156"
    unit: USDK annualized
    source: "[BP team] 加上创业财务启发式，适用于早期产品/设计岗位。"
  - id: A14
    name: 工程师综合现金成本
    value: "180"
    unit: USDK annualized
    source: "[BP team] 加上创业财务启发式，适用于集成与安全工程师及后续工程招聘。"
  - id: A15
    name: 实施或客户成功综合现金成本
    value: "120"
    unit: USDK annualized
    source: "[BP team] 加上创业财务启发式，适用于实施驱动的企业 onboarding。"
  - id: A16
    name: 客户经理综合现金成本
    value: "168"
    unit: USDK annualized
    source: "[BP milestones 12-24 months] 加上创业财务启发式，适用于 seed 阶段企业销售。"
  - id: A17
    name: 运营与 G&A 岗位综合现金成本
    value: "108"
    unit: USDK annualized
    source: "创业财务启发式，适用于在首批正式 rollout 后补入的精简运营/财务通才。"
  - id: A18
    name: 非薪酬运营负荷
    value: "9 in early Y1 rising to 45-54 per quarter by Y3"
    unit: USDK
    source: "创业财务启发式，涵盖云成本、AI 推理、差旅、安全工具、法务、保险和活动等非薪酬支出。"
  - id: A19
    name: 融资带来的期初现金
    value: "2450"
    unit: USDK
    source: "[BP fundingAsk.targetFundingRangeUsd] 基准情形按 pre-seed 融资 $2.45M 在模型起点到账计算。"
  - id: A20
    name: 下一轮融资里程碑
    value: "到第 30 个月前达到 12-14 个付费品牌、3 个可引用案例，并拿到相邻垂直行业设计伙伴证据"
    unit: milestone
    source: "[BP milestones 12-24 months and 24-36 months] 加上投资人常用启发式：应在现金进入最后 6 个月前启动下一轮融资。"
