slug: store-walk-app-builder
date: 2026-04-29
currency: USD
modelStartMonth: 2026-05
assumptions:
  - id: A1
    name: 模型起始月份
    value: "2026-05"
    unit: month
    source: "基于计划日期 2026-04-29 的启发式假设：融资完成与运营爬坡从下一个月开始。"
  - id: A2
    name: 平均付费试点合同价值
    value: "20"
    unit: USDK per pilot
    source: "[BP gtm.pricing] $15k-$25k、8-12 周试点价格区间的中点。"
  - id: A3
    name: 稳态单品牌年度 ACV
    value: "78"
    unit: USDK per brand per year
    source: "[BP gtm.pricing, research market.som] 假设 $6k 品牌费加 120 家门店、每店每年 $600。"
  - id: A4
    name: 每个活跃付费品牌月的确认收入
    value: "6.5"
    unit: USDK per month
    source: "由 A2 和 A3 推导；按约 3 个月确认的试点收入，与稳态 ACV 除以 12 接近，因此以每品牌月混合 $6.5K 维持收入口径内部一致。"
  - id: A5
    name: Year 1 付费品牌爬坡
    value: "4"
    unit: brands at EOY
    source: "[BP milestones 0-12 months, BP gtm.funnelTargets] 基础情景下拿下 2 个付费试点，并在 Year 1 结束时因 1 个年度转化和持续试点活动达到 4 个付费 logo。"
  - id: A6
    name: Year 2 付费品牌爬坡
    value: "10"
    unit: brands at EOY
    source: "[BP milestones 12-24 months] 与 12-24 个月达到 8-10 个品牌客户的目标一致。"
  - id: A7
    name: Year 3 付费品牌爬坡
    value: "20"
    unit: brands at EOY
    source: "[research market.som] 可达情景以 Year 3 拥有 20 个品牌为基础。"
  - id: A8
    name: 毛利率
    value: "75"
    unit: percent
    source: "[BP businessModel.targetGrossMarginPct]"
  - id: A9
    name: 月度 logo 流失率
    value: "2.0"
    unit: percent
    source: "针对早期垂直 SaaS 产品的创业财务启发式假设：采用年度合同，但留存证明仍在形成。"
  - id: A10
    name: 获客成本
    value: "35"
    unit: USDK per brand
    source: "[BP gtm channels and funnelTargets] 加上针对创始人主导企业外呼、试点范围界定和实施支持的创业财务启发式假设。"
  - id: A11
    name: 创始工程师综合现金成本
    value: "180"
    unit: USDK annualized
    source: "[BP team] 加上创业财务启发式假设，采用精简创始人薪酬和 20% 薪资负担。"
  - id: A12
    name: GTM 创始人综合现金成本
    value: "144"
    unit: USDK annualized
    source: "[BP team] 加上创业财务启发式假设，采用精简创始人薪酬和 20% 薪资负担。"
  - id: A13
    name: 产品与设计负责人综合现金成本
    value: "156"
    unit: USDK annualized
    source: "[BP team] 加上针对早期产品设计岗位的创业财务启发式假设。"
  - id: A14
    name: 工程师综合现金成本
    value: "180"
    unit: USDK annualized
    source: "[BP team] 加上创业财务启发式假设，适用于集成与安全工程师以及后续工程招聘。"
  - id: A15
    name: 实施或客户成功综合现金成本
    value: "120"
    unit: USDK annualized
    source: "[BP team] 加上面向实施主导型企业导入的创业财务启发式假设。"
  - id: A16
    name: 客户经理综合现金成本
    value: "168"
    unit: USDK annualized
    source: "[BP milestones 12-24 months] 加上针对种子前企业销售岗位的创业财务启发式假设，包含浮动薪酬。"
  - id: A17
    name: 运营与 G&A 综合现金成本
    value: "108"
    unit: USDK annualized
    source: "针对在初始生产 rollout 后加入的精简运营与财务通才岗位的创业财务启发式假设。"
  - id: A18
    name: 非薪酬运营负载
    value: "Y1 早期为 9，到 Y3 每季度升至 45-54"
    unit: USDK
    source: "创业财务启发式假设，覆盖薪酬之外的云、AI 推理、差旅、安全工具、法务、保险和活动成本。"
  - id: A19
    name: 融资带来的期初现金
    value: "2450"
    unit: USDK
    source: "[BP fundingAsk.targetFundingRangeUsd] 基础情景采用模型起始时完成 $2.45M pre-seed 融资。"
  - id: A20
    name: 下一轮融资里程碑
    value: "到 month 30 实现 12-14 个付费品牌、3 个可引用案例研究，以及相邻垂直行业设计伙伴证据"
    unit: milestone
    source: "[BP milestones 12-24 months and 24-36 months] 加上投资人启发式判断：应在现金进入最后 6 个月前完成下一轮融资。"
