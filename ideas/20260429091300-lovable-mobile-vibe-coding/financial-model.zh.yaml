scenarios:
  downside:
    description: "试点到 rollout 的转化率滑落到约 30%，混合 ACV 下探至约 $65K，且销售周期延长 1 个季度。"
    y3RevenueK: 760.0
    y3EbitdaK: -1015.0
    cashLowPointK: -120.0
    keyAssumptionChanges:
      - "Year 3 结束时只有 14 个品牌，而不是 20 个。"
      - "每个品牌月的确认收入低于 A4 基础情景。"
      - "招聘速度没有及时下调，无法抵消转化放缓。"
  base:
    description: "创始人主导外呼能够持续每季度带来 2-3 个付费试点，公司在 Q4Y3 走到研究中的 SOM 路径，即达到 20 个品牌。"
    y3RevenueK: 1131.1
    y3EbitdaK: -806.7
    cashLowPointK: 245.7
    keyAssumptionChanges:
      - "采用 A4 中每品牌月 $6.5K 的混合收入。"
      - "采用 A8 中 75% 的毛利率。"
      - "采用 A5、A6 和 A7 中的里程碑爬坡。"
  upside:
    description: "试点转化率超过 50%，QSR 相邻买方扩展更快，且 Year 3 结束前额外多拿到 1 个季度的 logo 增长。"
    y3RevenueK: 1440.0
    y3EbitdaK: -540.0
    cashLowPointK: 510.0
    keyAssumptionChanges:
      - "Year 3 结束时达到 24 个品牌，而不是 20 个。"
      - "混合 ACV 走向 BP 定价区间的上沿。"
      - "现有品牌内部的第二工作流挂接速度更快。"
sensitivity:
  - variable: ARPU
    downsideCase: "$65K ACV，定价向横向构建器基准压缩。"
    baseCase: "$78K ACV，来自 $6K 品牌费加 120 家门店、每店 $600。"
    upsideCase: "$85K ACV，来自更强的平台费和略大的平均 rollout 规模。"
    y3RevenueImpactK: -188.5
    cashImpactK: -141.4
  - variable: CAC
    downsideCase: "$45K CAC，如果试点需要更多创始人和实施时间。"
    baseCase: "$35K CAC per paying brand."
    upsideCase: "$28K CAC，当案例和合作伙伴降低外呼成本后。"
    y3RevenueImpactK: 0.0
    cashImpactK: -100.0
  - variable: churn
    downsideCase: "月度 logo 流失率 3%，因为首个工作流使用未能扩展。"
    baseCase: "月度 logo 流失率 2%。"
    upsideCase: "月度 logo 流失率 1%，且第二工作流挂接强劲。"
    y3RevenueImpactK: -84.0
    cashImpactK: -63.0
  - variable: sales cycle
    downsideCase: "平均周期从 4 个月拉长到 6 个月，因为安全和集成审查更早介入。"
    baseCase: "创始人主导的试点销售平均为 4 个月。"
    upsideCase: "当事件驱动触发因素真实存在时，平均销售周期为 3 个月。"
    y3RevenueImpactK: -175.0
    cashImpactK: -175.0
  - variable: gross margin
    downsideCase: "毛利率 70%，因为推理、支持和导入仍然高度依赖人工。"
    baseCase: "毛利率 75%。"
    upsideCase: "在模板和实施手册成熟后，毛利率提升至 80%。"
    y3RevenueImpactK: 0.0
    cashImpactK: -56.6
  - variable: hiring pace
    downsideCase: "比基础计划提早 2 个季度增加 1 名客户经理和 1 名工程师。"
    baseCase: "按照 headcount 中展示的分阶段招聘节奏执行。"
    upsideCase: "将 2 个非关键岗位延后到达到 10 个生产品牌之后再招。"
    y3RevenueImpactK: 0.0
    cashImpactK: -180.0
modelDiagram:
  title: 单位经济流转
  mermaid: |
    flowchart LR
      Accounts[目标账户] --> Pilots[付费试点]
      Pilots --> Rollouts[年度 Rollouts]
      Rollouts --> Revenue[订阅收入]
      Rollouts --> Expansion[更多工作流]
      Expansion --> Revenue
      Revenue --> GrossProfit[毛利润]
      GrossProfit --> Cash[现金]
modelSanity:
  - checkName: Revenue engine
    finding: "基础情景收入来自在 Q4Y3 达到 20 个付费区域连锁品牌，单品牌 ACV 约 $78K，并开始附加第二工作流。"
  - checkName: Must go right
    finding: "试点到 rollout 的转化率必须接近计划中的 40%+ 目标，同时前几次生产成交只需要 2 个产品化集成。"
  - checkName: Model breaks if
    finding: "如果销售周期延后 1 个季度，或定价压缩到 $65K ACV 左右，就会消耗足够多的现金并迫使公司更早进行 bridge 融资。"
  - checkName: Next-round proof
    finding: "可信的 seed 故事应是在现金进入最后 6 个月前，达到 12-14 个付费品牌、3 个可引用案例，以及相邻垂直行业设计伙伴证据。"
sanityChecks:
  ruleOf40: "Y3 增长率 123.1% + EBITDA 利润率 -71.3% = 51.8%。"
  burnMultiple: "Y3 burn multiple 为 1.0x，计算方式是 $806.7K EBITDA burn 除以从 10 个品牌增至 20 个品牌所带来的 $780.0K net new ARR。"
  revenuePerFte: "Y3 平均 FTE 为 9.5，对应每 FTE 收入为 $119K，低于 $200-400K 的 SaaS 基准；只有在试点后的 rollout 密度提升时，这个水平才算可以接受。"
  flags:
    - "研究中的 QSR 滩头市场 SAM 只有约 $23.9M，因此风险投资故事仍依赖在 QSR 证明后向相邻垂直行业扩展。"
    - "基础情景的客户数没有显式反映 churn，尽管单位经济假设了 2% 的月度流失率；这一点之所以暂时合理，只是因为前 20 个 logo 属于高度管理的试点队列。"
    - "Year 3 期末现金仅约为 $246K，因此转化、ARPU 或招聘纪律稍有失误，就会把 seed 融资时间点提前。"
    - "到 Year 3 为止，每 FTE 收入仍低于成熟 SaaS 基准，因此投资人应将其视为工作流 rollout 证明阶段，而不是效率故事。"
