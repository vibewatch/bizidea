scenarios:
  downside:
    description: "试点转 rollout 比例跌到约 30%，混合 ACV 下滑到约 $65K，销售周期再拉长一个季度。"
    y3RevenueK: 760.0
    y3EbitdaK: -1015.0
    cashLowPointK: -120.0
    keyAssumptionChanges:
      - "第 3 年末只有 14 个品牌，而不是 20 个。"
      - "每品牌每月确认收入低于 A4 基准。"
      - "招聘节奏收不住，无法对冲更慢的转化。"
  base:
    description: "创始人主导外呼可以稳定带来每季度 2-3 个付费试点，公司按研究里的 SOM 路径在 Q4Y3 达到 20 个品牌。"
    y3RevenueK: 1131.1
    y3EbitdaK: -806.7
    cashLowPointK: 245.7
    keyAssumptionChanges:
      - "采用 A4 的每品牌每月 $6.5K 混合收入。"
      - "采用 A8 的 75% 毛利率。"
      - "采用 A5、A6 和 A7 的品牌增长里程碑。"
  upside:
    description: "试点转化超过 50%，QSR 内相邻买方扩张更快，且第 3 年末前多拿到一个季度的 logo 增长。"
    y3RevenueK: 1440.0
    y3EbitdaK: -540.0
    cashLowPointK: 510.0
    keyAssumptionChanges:
      - "第 3 年末达到 24 个品牌，而不是 20 个。"
      - "混合 ACV 走到 BP 定价区间上沿。"
      - "同一品牌里第二个工作流附着速度更快。"
sensitivity:
  - variable: ARPU
    downsideCase: "$65K ACV，定价被横向构建器基准向下拉。"
    baseCase: "$78K ACV，对应 $6K 品牌费 + 120 家门店 × 每店 $600。"
    upsideCase: "$85K ACV，来自更强的平台费和略大的平均 rollout 规模。"
    y3RevenueImpactK: -188.5
    cashImpactK: -141.4
  - variable: CAC
    downsideCase: "$45K CAC，如果试点需要更多创始人与实施投入。"
    baseCase: "$35K CAC per paying brand."
    upsideCase: "$28K CAC，当案例与合作伙伴降低外呼成本后。"
    y3RevenueImpactK: 0.0
    cashImpactK: -100.0
  - variable: churn
    downsideCase: "月度 logo 流失 3%，因为第一个工作流未能成功扩张。"
    baseCase: "月度 logo 流失 2%。"
    upsideCase: "月度 logo 流失 1%，因为第二个工作流附着很强。"
    y3RevenueImpactK: -84.0
    cashImpactK: -63.0
  - variable: sales cycle
    downsideCase: "平均销售周期从 4 个月拖到 6 个月，因为安全与集成审查更早介入。"
    baseCase: "创始人主导的试点销售周期平均为 4 个月。"
    upsideCase: "在事件驱动触发点明确时，平均销售周期缩短到 3 个月。"
    y3RevenueImpactK: -175.0
    cashImpactK: -175.0
  - variable: gross margin
    downsideCase: "毛利率 70%，因为推理、支持和 onboarding 仍然过于高触达。"
    baseCase: "毛利率 75%。"
    upsideCase: "模板和实施手册成熟后，毛利率达到 80%。"
    y3RevenueImpactK: 0.0
    cashImpactK: -56.6
  - variable: hiring pace
    downsideCase: "比基准计划提早两个季度新增 1 名 AE 和 1 名工程师。"
    baseCase: "按 headcount 里的分阶段招聘节奏执行。"
    upsideCase: "把两名非关键岗位延后到 10 个正式生产品牌之后再招。"
    y3RevenueImpactK: 0.0
    cashImpactK: -180.0
modelDiagram:
  title: 单位经济流转
  mermaid: |
    flowchart LR
      Accounts[目标账户] --> Pilots[付费试点]
      Pilots --> Rollouts[年度 Rollout]
      Rollouts --> Revenue[订阅收入]
      Rollouts --> Expansion[更多工作流]
      Expansion --> Revenue
      Revenue --> GrossProfit[毛利润]
      GrossProfit --> Cash[现金]
modelSanity:
  - checkName: 收入引擎
    finding: "基准情形收入，来自 Q4Y3 达到 20 个区域型连锁品牌付费账户，平均 ACV 约 $78K，并开始附着第二个工作流。"
  - checkName: 必须成立的前提
    finding: "试点转 rollout 比例必须保持在计划的 40%+ 附近，同时前几次正式部署只需要两项产品化集成。"
  - checkName: 模型失效条件
    finding: "如果销售周期多拖一个季度，或定价被压到 $65K ACV 左右，现金水位就会下降到必须更早桥接融资。"
  - checkName: 下一轮融资证明点
    finding: "一条可信的 seed 融资故事线，是在现金进入最后 6 个月前拿到 12-14 个付费品牌、3 个可引用案例，以及相邻垂直行业设计伙伴证据。"
sanityChecks:
  ruleOf40: "第 3 年增长 123.1% + EBITDA 利润率 -71.3% = 51.8%。"
  burnMultiple: "第 3 年 burn multiple 为 1.0x，计算口径是 $806.7K EBITDA burn ÷ 从 10 个品牌到 20 个品牌新增的 $780.0K ARR。"
  revenuePerFte: "按第 3 年平均 9.5 名 FTE 计算，人均收入约 $119K，低于常见 SaaS 的 $200-400K 基准；只有当试点后 rollout 密度显著提升时，这个水平才说得过去。"
  flags:
    - "研究里的 QSR 滩头 SAM 只有约 $23.9M，因此 venture 叙事仍依赖 QSR 之后的相邻垂直扩张。"
    - "基准情形的客户数没有显式反映流失，尽管单位经济假设了 2% 月流失；这只有在前 20 个 logo 都被高强度管理时才勉强合理。"
    - "第 3 年末现金只有约 $246K，所以只要转化、ARPU 或招聘纪律稍有偏差，seed 融资时点就会被迫前移。"
    - "到第 3 年，人均收入仍低于成熟 SaaS 基准，因此投资人应把这看成“验证工作流 rollout”的阶段，而不是效率故事。"