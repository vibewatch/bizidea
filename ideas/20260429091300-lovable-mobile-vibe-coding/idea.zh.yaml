problem: >-
  连锁餐饮品牌的区域经理在巡店、菜单上新和审计复盘时，经常能发现流程已经坏掉了；但要把这些观察变成软件，往往还得和 IT、无代码管理员或老牌审计软件供应商来回拉扯几周。等新的检查清单或整改流程终于上线，现场语境早已过期，门店也已经各自跑偏。通用 AI 建应用工具能生成界面，但它们并不会顺手打包一线运营真正需要的治理能力：前线权限、发布控制、落地推进，以及合规留痕。
targetUser:
  primary: 负责巡店并推动 SOP 变更落地的 50-300 家门店 QSR 连锁品牌区域经理
  secondary: 维护审计检查清单与整改手册的加盟运营分析师
  buyer: 多门店 QSR 品牌的运营副总裁或一线运营总监
startupThesis:
  nonObviousInsight: 移动端 vibe-coding 真正有意思的地方，不是消费级新奇感，而是让现场最先看到流程问题的人，也能在运营语境还没流失前，亲手把修复方案写出来。
  beachhead: QSR 区域经理在巡店过程中创建检查、上新与整改类微应用
  wedge: 一名受治理约束的移动副驾，把巡店时说出口的观察，转成带角色权限的检查清单、照片任务和后续跟进工作流，并在当天发布给门店团队
  whyNowCatalyst: Lovable 推出移动端、语音优先提示逐步成熟，再加上 Apple 的收紧并未封死分发渠道，让“当场写工作流”这件事第一次真正变得可行。
  ventureScalePath: 先在 QSR 一线运营里跑通，再把同一层工作流编排能力扩展到零售、便利店、酒店和现场服务，成为前线流程变更的控制平面。
solution: >-
  从 QSR 区域经理出发，做一款面向一线运营负责人的移动优先工作流构建器。经理在巡店时把变化说出来或打进去，顺手拍下现场照片，产品就会生成一个受治理约束的微应用：检查步骤、升级逻辑、执行角色、截止时间，以及完工证明要求。系统随后把这个工作流发布给门店经理和一线员工，按门店追踪完成情况，并把跨门店反复出现的失败模式亮出来。和通用 vibe-coding 工具不同，这个产品从一开始就围绕一线运营来设计：内置审计和上新模板、SOP 变更版本控制，以及新工作流上线前的管理员审批。时间一长，它会变成运营修复方案被记录、发布与衡量的系统记录层。
goToMarketSeed:
  firstCustomer: 拥有 75-250 家门店、区域经理每周巡店、且菜单与标准更新频繁的区域型 QSR 品牌
  buyingTrigger: 季节性菜单上新、品牌审计失利，或劳动合规更新，要求品牌在几天内把新检查清单推到所有门店
  currentAlternative: Google Forms 和 SOP 文档、老牌审计软件，以及排队中的内部 IT 或无代码需求池
  switchingReason: 经理可以站在门店里就把工作流做出来，然后立刻发布一个带版本控制和分析能力的受治理移动流程，而不是再等几周桌面端开发周期。
  pricingHypothesis: 按品牌收取年度平台费，再按活跃区域经理或门店数计费
whyNow:
  - point: 移动端应用创建如今已原生进入 iOS 和 Android，这让一线人员在真实巡店过程中就能写出工作流软件，而不必事后回到桌面整理。
    signalRefs: ["应用构建进入手机端"]
    sourceRefs: [1]
  - point: 语音和文本提示让运营人员能在发现流程问题的当下直接描述问题，保留下那些通常会在 IT 把工具需求写出来之前就消失的语境。
    signalRefs: ["语音提示能在现场捕捉工作流意图"]
    sourceRefs: [1]
  - point: 构建者画像正在从工程师向外扩展，因此运营团队第一次有了合理的理由，去亲自拥有轻量级内部应用的创建权。
    signalRefs: ["非技术团队也开始成为构建者"]
    sourceRefs: [2]
  - point: Lovable 能在 Apple 收紧之后仍然上线，说明合规 AI 构建器的移动分发窗口仍未关闭，这也降低了垂直移动构建器面对的平台风险焦虑。
    signalRefs: ["移动分发风险低于预期"]
    sourceRefs: [1]
differentiator: >-
  真正的差异化，不是把通用 AI 应用生成器做得更好，而是做成一线运营变更的垂直控制平面。产品从一个非常具体的工作流时刻——巡店——切进去，把权限、证据采集、升级路径和全链条发布都预埋进去。这样它替代的是审计应用、表单工具、SOP 文档和运营工单拼出来的混乱组合，而不是正面去和宽泛的 vibe-coding 平台拼功能表。
