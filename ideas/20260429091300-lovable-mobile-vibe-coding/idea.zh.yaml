problem: >-
  多门店餐饮连锁的区域经理会在巡店、菜单上新和审计整改跟进中发现流程断点，但把这些观察转化为软件，通常需要与 IT、无代码管理员或传统审计供应商来回沟通数周。等到新的检查清单或整改流程真正上线时，运营场景往往已经过时，门店也早已偏离标准。通用 AI 应用构建器可以生成界面，但它们并不会为一线运营封装治理机制、角色权限、发布流程和合规证据留存。
targetUser:
  primary: 在 50-300 家门店的快速服务餐饮连锁中负责巡店并推动 SOP 变更执行的区域经理
  secondary: 维护审计检查清单和整改手册的加盟运营分析师
  buyer: 多门店 QSR 品牌的运营副总裁或现场运营总监
startupThesis:
  nonObviousInsight: 移动端 vibe-coding 的意义并不主要在于消费级新奇感；它让在一线看到流程问题的人，能在运营上下文消失前亲手写出修复方案。
  beachhead: 在巡店过程中为检查、上新和整改场景创建微应用的 QSR 区域经理
  wedge: 一个受治理的移动副驾，把口述的巡店观察转化为基于角色的检查清单、拍照任务和后续工作流，并在当天发布给门店团队
  whyNowCatalyst: Lovable 的移动端发布、语音优先提示方式，以及苹果整顿并未阻断分发的迹象，使得在现场即时编写工作流首次变得切实可行。
  ventureScalePath: 先从 QSR 现场运营切入，再将同一套工作流编写层扩展到零售、便利店、酒店和现场服务，成为一线流程变更的控制平面。
solution: >-
  为现场运营负责人打造一款移动优先的工作流构建器，首批用户从 QSR 区域经理开始。经理在巡店过程中说出或输入发生的变化，拍下辅助照片，产品就会生成一个受治理的微应用：检查步骤、升级逻辑、执行角色、截止日期以及完成证明要求。系统随后把工作流发布给店长和门店员工，按门店位置跟踪完成情况，并识别跨门店重复出现的失败模式。与通用 vibe-coding 工具不同，该产品从一开始就围绕一线运营进行设计：内置审计和上新模板、SOP 变更版本控制，以及新工作流上线前的管理员审批。随着时间推移，它会成为记录运营修复方案如何被捕捉、下发和衡量的系统记录源。
goToMarketSeed:
  firstCustomer: 拥有 75-250 家门店、每周安排区域经理巡店、且经常进行菜单或标准更新的区域性快速服务餐饮品牌
  buyingTrigger: 季节性菜单上新、品牌审计失利，或要求在数天内向所有门店下发新检查清单的劳动合规更新
  currentAlternative: Google Forms 和 SOP 文档、传统审计软件，以及内部 IT 或无代码待办队列
  switchingReason: 经理可以在门店现场创建工作流，然后发布一个带版本控制和分析能力的受治理移动流程，而不是等待数周的桌面构建周期。
  pricingHypothesis: 按品牌收取年度平台费，并按活跃区域经理或门店数量计费用量。
whyNow:
  - point: 移动应用创建如今已成为 iOS 和 Android 的原生能力，这让现场人员在真实巡店过程中而不是事后回到桌面时，编写工作流软件成为可能。
    signalRefs: ["应用构建转移到了手机上"]
    sourceRefs: [1]
  - point: 语音和文本提示让运营人员能在发现流程断点的当下就描述问题，从而保留那些通常会在 IT 编写工具规格前就消失的上下文。
    signalRefs: ["语音提示能在现场捕捉工作流意图"]
    sourceRefs: [1]
  - point: 构建者画像正在从工程师扩展出去，因此运营团队有了可信基础来亲自拥有轻量级内部应用的创建。
    signalRefs: ["非技术团队正在成为构建者"]
    sourceRefs: [2]
  - point: Lovable 在苹果整顿之下仍然完成发布，说明合规 AI 构建器的移动分发窗口依然开放，降低了垂直移动构建器的平台风险焦虑。
    signalRefs: ["移动分发风险低于预期"]
    sourceRefs: [1]
differentiator: >-
  真正的差异化不在于做一个更好的通用 AI 应用生成器，而在于为一线运营变更提供一个垂直控制平面。产品从一个具体的工作流时刻——巡店——出发，并内建权限、证据采集、升级路径和全连锁发布能力。这样它替代的是审计应用、表单工具、SOP 文档和运营工单的混合拼盘，而不是与广义 vibe-coding 平台正面竞争。
