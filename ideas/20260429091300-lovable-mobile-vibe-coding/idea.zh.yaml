jobsToBeDone:
  - job: 当区域经理在多家门店里反复看到同样的运营问题时，帮他们把观察快速变成一个可部署的工作流，从而在下一轮审计到来前把修复标准化。
    currentAlternative: 发邮件记录、更新 SOP 文档，再等表单或审计软件管理员去搭一个新流程
    successMetric: 24 小时内把新工作流发布到受影响门店
  - job: 当品牌推出新菜单项或新的合规要求时，帮一线运营发布并验证执行步骤，从而证明每家门店都按同样标准完成落地。
    currentAlternative: 静态 PDF、LMS 模块和人工电话追踪
    successMetric: 在发布窗口内，按门店统计完成率和执行证明覆盖率
ideaScorecard:
  signalStrength:
    score: 4
    rationale: 这个信号簇展示了真实产品发布、移动端可用性，以及“边走边建”这种明确的行为变化，只是采用数据还非常早期。
  painIntensity:
    score: 4
    rationale: 多门店运营团队在流程更新跟不上审计或上新节奏时，痛感很真实；只是当前信号簇本身更像工具形态变化，而不是直接描述客户痛点。
  wedgeClarity:
    score: 5
    rationale: 巡店工作流编排是一个边界很窄、可被观察到的工作流，用户、触发条件和替代方案都很清楚。
  defensibility:
    score: 3
    rationale: 核心生成能力本身容易被复制，所以真正的护城河必须来自垂直模板、集成、治理能力，以及沉淀下来的运营数据。
  ventureScale:
    score: 4
    rationale: QSR 是一个聚焦良好的起点，但同一层前线工作流系统可以扩展到零售、酒店和现场服务网络，这些网络同样覆盖成千上万地点。
topRisks:
  - name: 通用构建器挤压
    description: 宽泛的 vibe-coding 平台可能会下沉到一线工作流生成场景，压缩产品在功能层面的差异化空间。
    mitigation: 把垂直层做深，围绕 QSR 专属模板、发布治理、完工证明与运营集成建立优势，这些都不是通用构建器的优先级。
  - name: 买方对可靠性存疑
    description: 如果没有人工复核，运营负责人可能不会信任 AI 生成的工作流来承接审计或高合规敏感任务。
    mitigation: 从草稿生成加强制经理审批开始，提供可审计版本历史，并聚焦上新与整改等少数高价值场景。
  - name: 集成拖慢落地
    description: 如果产品无法接入现有任务、消息和身份系统，发布摩擦会直接拖慢采用。
    mitigation: 第一版先把产品收窄成可独立运行的移动执行层，然后优先做中端 QSR 最常见的 2-3 个集成。