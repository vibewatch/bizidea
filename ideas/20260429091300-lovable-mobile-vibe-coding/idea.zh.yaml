jobsToBeDone:
  - job: 当区域经理在多家门店发现同一运营问题时，帮助他们把这一观察转化为可部署的工作流，以便在下一轮审计前完成标准化修复。
    currentAlternative: 发送邮件记录、更新 SOP 文档，并等待表单或审计软件管理员构建新流程
    successMetric: 24 小时内在受影响门店上线新工作流
  - job: 当品牌推出新菜单项或新的合规要求时，帮助现场运营发布并核验执行步骤，以便证明每家门店的发布一致性。
    currentAlternative: 静态 PDF、LMS 模块和人工跟进电话
    successMetric: 在上线窗口内按门店统计的完成率和执行证明覆盖率
ideaScorecard:
  signalStrength:
    score: 4
    rationale: 该信号簇显示出真实的产品发布、移动端可用性以及向随时随地应用构建迁移的明确行为变化，不过采用证据仍然偏早期。
  painIntensity:
    score: 4
    rationale: 当流程更新落后于审计或上新节奏时，多门店运营者确实会感受到痛点，即便源信号簇本身描述的更多是工具变化而非客户痛点。
  wedgeClarity:
    score: 5
    rationale: 巡店工作流编写是一个狭窄且可观察的工作流，用户、触发因素和替代路径都很清晰。
  defensibility:
    score: 3
    rationale: 核心生成功能容易被复制，因此防御性必须来自垂直模板、集成、治理机制以及嵌入式运营数据。
  ventureScale:
    score: 4
    rationale: QSR 是一个聚焦的切入口，但同样的一线工作流层可以扩展到零售、酒店和现场服务网络中的数千个地点。
topRisks:
  - name: 通用构建器挤压
    description: 广义 vibe-coding 平台可能向下进入一线工作流生成场景，从而压缩产品层面的差异化空间。
    mitigation: 以 QSR 专属模板、发布治理、完成证明和运营集成为核心，拥有垂直层，而这些不是通用构建器的优先方向。
  - name: 买方对可靠性存疑
    description: 如果没有人工复核，运营负责人可能不会信任 AI 生成的工作流来控制审计或合规敏感任务。
    mitigation: 从草稿生成加必需的经理审批开始，配合可审计的版本历史，并把范围限制在上新和整改等高价值用例上。
  - name: 集成拖累
    description: 如果产品无法接入现有任务、消息和身份系统，发布摩擦将拖慢采用。
    mitigation: 首个产品先聚焦独立的移动执行，再优先支持中型 QSR 运营中最常见的 2-3 个集成。
