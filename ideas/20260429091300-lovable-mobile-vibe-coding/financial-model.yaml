assumptions:
  - id: A1
    name: Model start month
    value: "2026-05"
    unit: month
    source: "Heuristic from plan date 2026-04-29 with fundraising close and operating ramp starting the next month."
  - id: A2
    name: Average paid pilot contract value
    value: "20"
    unit: USDK per pilot
    source: "[BP gtm.pricing] midpoint of $15k-$25k for an 8-12 week pilot."
  - id: A3
    name: Steady-state annual ACV per brand
    value: "78"
    unit: USDK per brand per year
    source: "[BP gtm.pricing, research market.som] assumes $6k brand fee plus 120 stores at $600 per store per year."
  - id: A4
    name: Recognized revenue per active paying brand-month
    value: "6.5"
    unit: USDK per month
    source: "Derived from A2 and A3; pilot revenue recognized over ~3 months is close to steady-state ACV divided by 12, so a blended $6.5K per brand-month keeps revenue internally consistent."
  - id: A5
    name: Year 1 paying brand ramp
    value: "4"
    unit: brands at EOY
    source: "[BP milestones 0-12 months, BP gtm.funnelTargets] base case closes 2 paid pilots and ends Year 1 with 4 paying logos after one annual conversion and continued pilot activity."
  - id: A6
    name: Year 2 paying brand ramp
    value: "10"
    unit: brands at EOY
    source: "[BP milestones 12-24 months] matches the stated goal of 8-10 brand customers by months 12-24."
  - id: A7
    name: Year 3 paying brand ramp
    value: "20"
    unit: brands at EOY
    source: "[research market.som] reachable case uses 20 brands by Year 3."
  - id: A8
    name: Gross margin
    value: "75"
    unit: percent
    source: "[BP businessModel.targetGrossMarginPct]"
  - id: A9
    name: Monthly logo churn
    value: "2.0"
    unit: percent
    source: "Startup-finance heuristic for an early vertical SaaS product with annual contracts and still-forming retention proof."
  - id: A10
    name: Customer acquisition cost
    value: "35"
    unit: USDK per brand
    source: "[BP gtm channels and funnelTargets] plus startup-finance heuristic for founder-led enterprise outbound with pilot scoping and implementation support."
  - id: A11
    name: Founding engineer burdened cash cost
    value: "180"
    unit: USDK annualized
    source: "[BP team] plus startup-finance heuristic using a lean founder salary and 20% payroll burden."
  - id: A12
    name: GTM founder burdened cash cost
    value: "144"
    unit: USDK annualized
    source: "[BP team] plus startup-finance heuristic using a lean founder salary and 20% payroll burden."
  - id: A13
    name: Product and design lead burdened cash cost
    value: "156"
    unit: USDK annualized
    source: "[BP team] plus startup-finance heuristic for an early product-design hire."
  - id: A14
    name: Engineer burdened cash cost
    value: "180"
    unit: USDK annualized
    source: "[BP team] plus startup-finance heuristic applied to the integrations and security engineer and later engineering hires."
  - id: A15
    name: Implementation or customer success burdened cash cost
    value: "120"
    unit: USDK annualized
    source: "[BP team] plus startup-finance heuristic for implementation-led enterprise onboarding."
  - id: A16
    name: Account executive burdened cash cost
    value: "168"
    unit: USDK annualized
    source: "[BP milestones 12-24 months] plus startup-finance heuristic for a seed-stage enterprise seller with variable compensation."
  - id: A17
    name: Operations and G&A hire burdened cash cost
    value: "108"
    unit: USDK annualized
    source: "Startup-finance heuristic for a lean operations and finance generalist added after initial production rollouts."
  - id: A18
    name: Non-payroll operating load
    value: "9 in early Y1 rising to 45-54 per quarter by Y3"
    unit: USDK
    source: "Startup-finance heuristic for cloud, AI inference, travel, security tooling, legal, insurance, and events layered on top of payroll."
  - id: A19
    name: Opening cash from financing
    value: "2450"
    unit: USDK
    source: "[BP fundingAsk.targetFundingRangeUsd] base case uses a $2.45M pre-seed close at model start."
  - id: A20
    name: Next-round milestone
    value: "12-14 paying brands, 3 referenceable case studies, and adjacent-vertical design-partner evidence by month 30"
    unit: milestone
    source: "[BP milestones 12-24 months and 24-36 months] plus investor heuristic to raise the next round before the final 6 months of cash."
