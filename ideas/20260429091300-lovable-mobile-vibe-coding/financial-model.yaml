scenarios:
  downside:
    description: "Pilot-to-rollout conversion slips to ~30%, blended ACV falls toward $65K, and the sales cycle extends by one quarter."
    y3RevenueK: 760.0
    y3EbitdaK: -1015.0
    cashLowPointK: -120.0
    keyAssumptionChanges:
      - "Year 3 exits at 14 brands instead of 20."
      - "Recognized revenue per brand-month falls below the A4 base case."
      - "Hiring is not cut fast enough to offset slower conversions."
  base:
    description: "Founder-led outbound consistently produces 2-3 paid pilots per quarter and the company reaches the research SOM path of 20 brands by Q4Y3."
    y3RevenueK: 1131.1
    y3EbitdaK: -806.7
    cashLowPointK: 245.7
    keyAssumptionChanges:
      - "Uses A4 blended revenue of $6.5K per brand-month."
      - "Uses A8 gross margin of 75%."
      - "Uses the milestone ramps in A5, A6, and A7."
  upside:
    description: "Pilot conversion clears 50%, adjacent QSR buyers expand faster, and one extra quarter of logo growth lands before Year 3 end."
    y3RevenueK: 1440.0
    y3EbitdaK: -540.0
    cashLowPointK: 510.0
    keyAssumptionChanges:
      - "Year 3 exits at 24 brands instead of 20."
      - "Blended ACV moves toward the upper end of BP pricing."
      - "Second workflows attach faster inside existing brands."
sensitivity:
  - variable: ARPU
    downsideCase: "$65K ACV as pricing compresses toward horizontal-builder benchmarks."
    baseCase: "$78K ACV from a $6K brand fee plus 120 stores at $600 each."
    upsideCase: "$85K ACV from stronger platform fees and slightly larger average rollouts."
    y3RevenueImpactK: -188.5
    cashImpactK: -141.4
  - variable: CAC
    downsideCase: "$45K CAC if pilots require heavier founder and implementation time."
    baseCase: "$35K CAC per paying brand."
    upsideCase: "$28K CAC once references and partners reduce outbound effort."
    y3RevenueImpactK: 0.0
    cashImpactK: -100.0
  - variable: churn
    downsideCase: "3% monthly logo churn as first workflow usage fails to expand."
    baseCase: "2% monthly logo churn."
    upsideCase: "1% monthly logo churn with strong second-workflow attach."
    y3RevenueImpactK: -84.0
    cashImpactK: -63.0
  - variable: sales cycle
    downsideCase: "Average cycle stretches from 4 months to 6 months because security and integration reviews arrive earlier."
    baseCase: "Average 4 month founder-led pilot sale."
    upsideCase: "Average 3 month sale when event-driven triggers are live."
    y3RevenueImpactK: -175.0
    cashImpactK: -175.0
  - variable: gross margin
    downsideCase: "70% margin because inference, support, and onboarding remain high-touch."
    baseCase: "75% margin."
    upsideCase: "80% margin after templates and implementation playbooks mature."
    y3RevenueImpactK: 0.0
    cashImpactK: -56.6
  - variable: hiring pace
    downsideCase: "Add one AE and one engineer two quarters earlier than the base plan."
    baseCase: "Follow the staged hiring ramp shown in headcount."
    upsideCase: "Delay two non-critical hires until after 10 production brands."
    y3RevenueImpactK: 0.0
    cashImpactK: -180.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Accounts[Target Accounts] --> Pilots[Paid Pilots]
      Pilots --> Rollouts[Annual Rollouts]
      Rollouts --> Revenue[Subscription Revenue]
      Rollouts --> Expansion[More Workflows]
      Expansion --> Revenue
      Revenue --> GrossProfit[Gross Profit]
      GrossProfit --> Cash[Cash]
modelSanity:
  - checkName: Revenue engine
    finding: "Base-case revenue comes from reaching 20 paying regional-chain brands by Q4Y3 at roughly $78K ACV with second workflows beginning to attach."
  - checkName: Must go right
    finding: "Pilot-to-rollout conversion must stay near the plan's 40%+ target while two productized integrations remain enough for the first production wins."
  - checkName: Model breaks if
    finding: "A one-quarter sales-cycle delay or pricing compression toward $65K ACV removes enough cash to force an earlier bridge round."
  - checkName: Next-round proof
    finding: "A credible seed story is 12-14 paying brands, three referenceable case studies, and adjacent-vertical design-partner evidence before cash falls into the final six months."
sanityChecks:
  ruleOf40: "Y3 growth 123.1% + EBITDA margin -71.3% = 51.8%."
  burnMultiple: "Y3 burn multiple 1.0x using $806.7K EBITDA burn divided by $780.0K net new ARR from 10 to 20 brands."
  revenuePerFte: "$119K Y3 revenue per average Y3 FTE of 9.5, below the $200-400K SaaS benchmark and only acceptable if post-pilot rollout density improves."
  flags:
    - "The QSR beachhead SAM in research is only about $23.9M, so the venture case still depends on adjacent-vertical expansion after QSR proof."
    - "Base-case customer counts show no explicit forecast churn even though unit economics assume 2% monthly churn, which is reasonable only because the first 20 logos are tightly managed pilot cohorts."
    - "Year 3 ending cash is only about $246K, so a modest slip in conversion, ARPU, or hiring discipline can pull the seed timing forward."
    - "Revenue per FTE remains below mature SaaS benchmarks through Year 3, so investors should underwrite this as a workflow-rollout proof stage rather than an efficiency story."
