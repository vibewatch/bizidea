  sensitivityCases:
  - case: 目标连锁在有限服务门店中的占比是 10%，而不是 15%
    impact: 在相同混合门店 ACV 下，SAM 将从约 $23.9M 降到约 $15.9M，这会让 QSR 更像滩头市场，而不是可独立成立的大类目。
    sourceRefs:
