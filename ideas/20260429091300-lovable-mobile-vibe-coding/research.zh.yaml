  validationPlan:
  - priority: high
    question: 区域经理会亲自在手机上编写工作流，还是只会为中心运营分析师记录草稿？
    evidenceToGather: 在 3 家区域性 QSR 品牌中跟随 10 次巡店；记录从观察到草稿的时间、发布率，以及审批前的修改量。
  - priority: high
    question: 产品能否替代已经存在于审计/检查清单中的预算，还是只能作为新的预算项出售？
    evidenceToGather: 与运营副总裁/QA 负责人访谈，了解当前对 Jolt/Crunchtime/SafetyCulture/GoAudits 的使用与续约节奏。
  - priority: medium
    question: 首批 5 个成交里，哪些集成是必需的？
    evidenceToGather: 通过试点范围界定收集身份、消息和任务系统需求；量化因集成导致的丢单原因。
  - priority: medium
    question: 哪个 KPI 能最快讲清 ROI：更少的审计失败、更快的菜单 rollout 完成，还是更少的区域经理行政时间？
    evidenceToGather: 围绕 1 次上新和 1 次整改工作流，收集前后对比的试点指标。
