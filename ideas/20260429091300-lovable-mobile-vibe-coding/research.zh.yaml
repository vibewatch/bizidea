competitors:
- name: Crunchtime Ops Execution
  stage: incumbent
  wedge: 覆盖运营执行、食品安全、劳动力、库存和集成的一体化餐饮运营套件。
  pricing: 报价制 / demo-led 企业定价。
  strength: 餐饮行业分发深、后厨与总部数据覆盖广。
  weaknessVsUs: 为中心配置执行而生，而不是为巡店现场即时生成微应用而设计。
  sourceRefs:
  - 15
  - 16
  - 28
- name: Jolt
  stage: scale-up
  wedge: 面向餐饮任务、食品安全、标签和 SOP 管理。
  pricing: 报价制 / demo-led。
  strength: 一线合规、数字化食品安全和餐饮垂直性都很强。
  weaknessVsUs: 更偏检查清单，对基于新鲜现场观察生成全新角色化工作流的灵活性较弱。
  sourceRefs:
  - 13
  - 14
- name: SafetyCulture
  stage: scale-up
  wedge: 跨行业检查与运营平台，公开席位定价，并提供丰富集成。
  pricing: Premium 为 $24/seat/month（年付）；企业版定制。
  strength: 推广容易、报表能力强，生态覆盖面广。
  weaknessVsUs: 跨行业通用，QSR 专属治理与 rollout 逻辑较弱。
  sourceRefs:
  - 17
  - 29
- name: GoAudits
  stage: scale-up
  wedge: 覆盖审计、纠正措施、离线检查，以及餐饮/酒店工作流。
  pricing: Starter 起价 $10/user/month（年付）。
  strength: 食品安全和离线移动检查能力强。
  weaknessVsUs: 默认仍是“先做检查”，而不是 AI 原生的工作流编排与区域经理发布。
  sourceRefs:
  - 18
  - 19
- name: Google AppSheet
  stage: incumbent
  wedge: Google 旗下低代码应用构建器，公开席位定价低廉。
  pricing: Starter $5/user/month，Core $10/user/month，Enterprise Plus $20/user/month。
  strength: 便宜、灵活，而且运营与分析团队往往已经熟悉。
  weaknessVsUs: 仍需要构建/管理员投入，也没有前线审批、完工证明默认项和 QSR 本体。
  sourceRefs:
  - 21
regulatoryTechnicalConstraints:
- point: 在合规敏感运营场景里，企业买方在信任 AI 工作流前，一定会要求审批控制、RBAC 和审计日志。
  sourceRefs:
  - 30
- point: 移动应用分发虽然可行，但仍暴露在不断变化的应用审核标准之下，尤其是那些在审批后行为还会变化的应用。
  sourceRefs:
  - 2
- point: 能否接入身份系统和后台系统，是采购与部署中的实际门槛。
  sourceRefs:
  - 28
  - 29
  - 30
- point: 门店现场对离线采集和稳定的照片/任务同步有刚性要求；网络差就会直接毁掉日常使用。
  sourceRefs:
  - 18
- point: 劳动政策变化会持续带来模板与版本更新压力，产品必须把这件事处理得很干净。
  sourceRefs:
  - 11
validationSignals:
- point: Lovable 已发布 iOS 和 Android 应用，并支持语音/文本提示，这说明移动端工作流编排在技术上已经成立。
  sourceRefs:
  - 1
  - 2
  - 3
- point: Lovable 以 $6.6B 估值完成 $330M 融资，且 ARR 超过 $200M，说明 AI 构建底层能力背后有很强的资本和需求支撑。
  sourceRefs:
  - 5
  - 6
- point: Crunchtime 收购 Zenput 来加强运营执行能力，说明这一层工作流对战略买家确实有价值。
  sourceRefs:
  - 16
- point: Quorso 对外宣称覆盖 50,000+ 家门店的区域经理工作流，这证明多门店运营场景里，经理导向执行软件确实有需求。
  sourceRefs:
  - 20
- point: 餐饮行业销售额和就业仍在增长，但运营方同时承受成本压力——这正是“只要 ROI 清楚，快执行工具就能赢”的土壤。
  sourceRefs:
  - 8
  - 12
openQuestions:
- 真正每天在构建的人，会是区域经理，还是产品最终只是中心运营分析师的结构化采集工具？
- 创业公司能否切走 Jolt/Crunchtime/SafetyCulture 这类工具的既有预算，还是一开始只能作为叠加层卖进去？
- 前五个 75-250 家门店 QSR 账户里，哪两个集成是必不可少的？
- 在试点里，最快能拿来证明价值的指标究竟是什么：审计失败减少、上新完成更快，还是经理行政时间下降？
