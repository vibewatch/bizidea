  adoptionFrictionMatrix:
  - friction: 安全、审批与审计日志要求
    severity: high
    affectedBuyer: IT/安全与运营管理层
    mitigation: 对每一次工作流变更都默认提供发布前复核、RBAC 和责任归属记录。
