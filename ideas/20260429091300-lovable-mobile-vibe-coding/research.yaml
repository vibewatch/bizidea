    - 21
    - 22
    - 24
    - 25
  validationPlan:
  - priority: high
    question: Will district managers author workflows on-phone themselves or only capture drafts for central ops analysts?
    evidenceToGather: 10 shadowed store walks across 3 regional QSR brands; time-to-draft, publish rate, and edits before approval.
  - priority: high
    question: Can the product replace spend already budgeted for audits/checklists, or is it sold as a new line item?
    evidenceToGather: Buyer interviews with VP Ops/QA on current Jolt/Crunchtime/SafetyCulture/GoAudits usage and renewal timing.
  - priority: medium
    question: Which integrations are mandatory for the first 5 wins?
    evidenceToGather: Pilot scoping with identity, messaging, and task-system requirements; quantify closed-lost reasons tied to integrations.
  - priority: medium
    question: 'Which KPI produces the fastest ROI story: fewer failed audits, faster menu rollout completion, or less district-manager admin time?'
    evidenceToGather: Before/after pilot metrics tied to one launch and one remediation workflow.
