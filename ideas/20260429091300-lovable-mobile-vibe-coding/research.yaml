openQuestions:
- Does the true daily builder become the district manager, or does the product mainly become a structured capture tool for central ops analysts?
- Can the startup land as a replacement budget against Jolt/Crunchtime/SafetyCulture-class tools, or is it initially sold as an overlay?
- Which two integrations are mandatory to close the first five 75-250 store QSR accounts?
- 'What is the fastest proof-of-value metric in pilots: fewer failed audits, faster launch completion, or lower manager admin time?'
