competitors:
- name: Motion
  stage: scale-up
  wedge: AI calendar and task planner for professionals and teams
  pricing: Pro AI $19/seat/mo; Business AI $29/seat/mo
  strength: Strong scheduling automation and clear willingness-to-pay benchmark for premium productivity software.
  weaknessVsUs: Lives in screens and calendars, not ambient routine moments; optimized for work planning more than ADHD-specific
    follow-through.
  sourceRefs:
  - 19
  - 34
- name: Focusmate
  stage: scale-up
  wedge: Body-doubling accountability through scheduled coworking sessions
  pricing: Free tier; $8/mo billed annually or $12/mo monthly
  strength: Directly attacks follow-through and accountability with a very low consumer price point.
  weaknessVsUs: Requires synchronous sessions and deliberate booking; not persistent, personalized, or ambient across the
    day.
  sourceRefs:
  - 18
- name: Sunsama
  stage: scale-up
  wedge: Premium daily planning and work-life-balance workflow
  pricing: $25/mo or about $20/mo on annual plan
  strength: Premium positioning proves some users will pay for deliberate daily planning and calmer workflow design.
  weaknessVsUs: Still a software planner that assumes the user opens the app and self-manages task transitions.
  sourceRefs:
  - 20
  - 35
- name: Alexa+
  stage: incumbent
  wedge: General-purpose ambient AI assistant inside a massive smart-home footprint
  pricing: Free with Prime
  strength: Huge installed base, broad integrations, and increasingly agentic task execution.
  weaknessVsUs: Breadth-first design makes ADHD-specific routine memory and accountability a non-core use case.
  sourceRefs:
  - 12
  - 13
  - 37
- name: Google Home Speaker
  stage: incumbent
  wedge: Gemini-powered smart speaker for the broader home-assistant market
  pricing: $99.99 hardware with a 6-month Google Home Premium trial
  strength: Mass-market pricing, voice-first presence, and strong household surfaces for reminders and summaries.
  weaknessVsUs: Still optimized for general home utility rather than a narrow executive-function loop that learns derailers
    and prompt efficacy over time.
  sourceRefs:
  - 23
  - 24
  - 16
regulatoryTechnicalConstraints:
- point: Health apps and connected devices outside HIPAA can still trigger FTC Health Breach Notification Rule obligations
    after unauthorized disclosures or breaches.
  sourceRefs:
  - 14
- point: Any objective health-related claim needs competent and reliable scientific evidence before launch communications
    or ads go live.
  sourceRefs:
  - 15
- point: Assistant-platform integrations are powerful but also make the product partially dependent on Amazon, Google, or
    Apple surfaces and permissions.
  sourceRefs:
  - 13
  - 16
  - 17
- point: Evidence supports structured time-management help, but there is still no guarantee an ambient device outperforms
    simpler digital or coaching interventions without careful design.
  sourceRefs:
  - 9
  - 10
validationSignals:
- point: CDC estimates 15.5M U.S. adults have a current ADHD diagnosis, and about half were diagnosed in adulthood.
  sourceRefs:
  - 1
- point: Adults with ADHD report meaningful work-related problems, especially around meeting their own standards and handling
    attention-linked job demands.
  sourceRefs:
  - 11
- point: The first major ADHD coaching survey reported median pricing around $150 per hour and positioned coaching outside
    insurance-backed care, showing paid demand for accountability help.
  sourceRefs:
  - 8
- point: ADHD consumers appear more willing than neurotypical consumers to pay for efficiency and reward low-friction brands
    with loyalty.
  sourceRefs:
  - 5
- point: Productivity substitutes already sell recurring consumer plans from low-cost accountability to premium planning,
    providing pricing anchors for a paid software layer.
  sourceRefs:
  - 18
  - 19
  - 20
openQuestions:
- Does a dedicated device outperform an app-plus-speaker workflow strongly enough to justify extra household clutter and setup?
- 'Which single loop drives the best retention: morning start, between-meeting transitions, or evening shutdown?'
- How much passive sensing and memory retention will buyers tolerate before privacy concerns outweigh utility?
- Can the product create meaningful behavioral outcomes while staying clearly outside treatment or diagnostic claims?
