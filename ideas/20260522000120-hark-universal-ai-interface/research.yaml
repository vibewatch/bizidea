    - 19
    - 20
  sam:
    value: $0.7B
    rationale: 'Proxy U.S. beachhead SAM: 15.5M diagnosed adults [1] × 62.8% diagnosed adults in the 25-49 age band proxy
      [2] × 28.1% with bachelor’s degree or above as a knowledge-work proxy [2] × $240 recurring ARPU ≈ $658M, rounded to
      $0.7B. Gallup-backed work-model data suggests remote/hybrid remains the default once work is remote-capable [3].'
    isEstimate: true
    sourceRefs:
    - 1
    - 2
    - 3
    - 18
    - 19
    - 20
  som:
    value: $5.3M
    rationale: Year-3 SOM assumes capturing roughly 0.8% of the proxy SAM, or about 22k paying users, which is aggressive
      but reachable only if a narrow routine loop earns retention despite hardware friction; 22k × $240 recurring ARPU ≈ $5.3M.
    isEstimate: true
    sourceRefs:
    - 3
    - 18
    - 19
    - 20
