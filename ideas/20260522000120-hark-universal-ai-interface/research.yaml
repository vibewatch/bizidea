  fiveForces:
    supplierPower:
      score: 4
      rationale: Hardware components, cloud inference, and assistant-platform integrations all matter. Incumbent ecosystems
        already control major in-home surfaces, so a startup does not start from a neutral infrastructure position.
      sourceRefs:
      - 12
      - 13
      - 23
    buyerPower:
      score: 4
      rationale: Consumers can fall back to cheap or bundled substitutes, and ADHD buyers are already paying significant care
        costs. That makes proof of immediate value essential before they add another paid tool or device.
      sourceRefs:
      - 4
      - 5
      - 18
    threatOfEntrants:
      score: 3
      rationale: Software-only entrants can emerge quickly, but pairing behavior design, memory, hardware, and privacy into
        a retained habit loop is meaningfully harder than shipping another planner app.
      sourceRefs:
      - 9
      - 12
      - 37
    threatOfSubstitutes:
      score: 5
      rationale: Substitutes span reminders, task managers, AI schedulers, coaching, body doubling, and generic assistants.
        Buyers already have many ways to approximate parts of the job-to-be-done.
      sourceRefs:
      - 18
      - 19
      - 20
      - 31
      - 33
    competitiveRivalry:
      score: 4
      rationale: Rivalry is intense because planners, assistants, and accountability tools all attack adjacent parts of the
        same workflow, while large platforms can bundle capabilities into existing devices.
      sourceRefs:
      - 12
      - 16
      - 17
      - 19
      - 23
  pestle:
  - factor: political
    impact: neutral
    point: U.S. regulators are paying closer attention to health apps and connected devices, increasing scrutiny but also
      clarifying the rule set for non-HIPAA products.
    sourceRefs:
    - 14
  - factor: economic
    impact: negative
    point: Many adults with ADHD already face high annual out-of-pocket care costs, which can limit discretionary hardware
      adoption unless value is immediate.
    sourceRefs:
    - 4
  - factor: social
    impact: positive
    point: ADHD consumers appear unusually responsive to convenience and friction reduction, which supports a product built
      around one low-effort next step.
    sourceRefs:
    - 5
  - factor: technological
    impact: positive
    point: Generative AI assistants and smart speakers are becoming more action-oriented, making ambient interaction newly
      credible in the home and at the desk.
    sourceRefs:
    - 12
    - 23
    - 37
  - factor: legal
    impact: negative
    point: Any slide from productivity claims toward health or symptom claims raises the evidentiary bar and expands risk
      if sensitive data is mishandled.
    sourceRefs:
    - 14
    - 15
  adoptionFrictionMatrix:
  - friction: Another device on the desk or nightstand
    severity: high
    affectedBuyer: Self-pay adult with existing apps and speakers
    mitigation: Prove the loop in software or on existing speakers first, then earn the right to dedicated hardware with visible
      first-week wins.
    sourceRefs:
    - 12
    - 23
    - 24
  - friction: Persistent memory and privacy concerns
    severity: high
    affectedBuyer: Privacy-sensitive consumer and household members
    mitigation: Offer explicit memory controls, deletion/export, and restrained data collection from day one.
    sourceRefs:
    - 14
    - 16
    - 17
  - friction: Prompt fatigue or shame response
    severity: high
    affectedBuyer: Adults with variable routines and low tolerance for nagging
    mitigation: Constrain the product to one next action, learn preferred timing quickly, and suppress prompts after repeated
      rejection.
    sourceRefs:
    - 6
    - 10
    - 31
  - friction: Confusion about whether the product is treatment
    severity: medium
    affectedBuyer: Consumers, coaches, and referral partners
    mitigation: Position as planning and accountability support, not diagnosis or therapy, until stronger outcome evidence
      exists.
    sourceRefs:
    - 6
    - 14
    - 15
market:
  tam:
    value: $3.7B
    rationale: 'Bottom-up recurring TAM: 15.5M U.S. adults with diagnosed ADHD [1] × estimated $240 annual recurring ARPU,
      cross-checked against premium software price anchors from Focusmate, Motion, and Sunsama [18,19,20].'
    isEstimate: true
