  unit: definition
  source: '[BP strategicChoices.sequencingRationale] + [BP businessModel.revenueStreams] software-first interpretation'
- id: A3
  name: Blended recognized ARPU
  value: $16.50 per month ($198 annualized)
  unit: USD per paying user per month
