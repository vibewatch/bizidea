- id: A10
  name: Starting cash / pre-seed close
  value: $2.40M
  unit: USD
  source: '[BP fundingAsk targetFundingRangeUsd $2-4M] modeled near the lower-middle of the range to fund the 18-month plan plus the required 6-month buffer'
- id: A11
  name: Loaded compensation factor
  value: 15% on top of cash salary
  unit: percent
  source: 'Startup-finance heuristic, named source: early-stage U.S. startup payroll-load heuristic'
- id: A12
  name: Loaded annual payroll by role
  value: Founder/CEO $132K; Founding eng $180K; Product and behavior design lead $150K; Growth lead $120K; Hardware advisor $30K retainer; Community support $42K at 0.5 FTE; Second eng $165K
  unit: USD thousands per year
  source: '[BP team roles] + startup-finance heuristic for seed-stage U.S. consumer-software hiring'
- id: A13
  name: Hiring timing
  value: Founder and founding eng M1; product lead M2; growth lead M6; hardware advisor M10-M24; community support 0.5 FTE M18; second eng M27
  unit: start month
  source: '[BP team] + [BP strategicChoices.sequencingRationale] software-first ramp before hardware spend'
- id: A14
  name: R&D non-payroll spend
  value: M1-M6 $3K/mo, M7-M12 $4K/mo, M13-M24 $5K/mo, M25-M36 $6K/mo
  unit: USD thousands per month
  source: '[BP operations] + startup-finance heuristic for cloud tools, model usage outside direct COGS, and prototype iteration'
- id: A15
  name: G&A non-payroll spend
  value: M1-M6 $4.5K/mo, M7-M12 $5.5K/mo, M13-M24 $6.5K/mo, M25-M36 $7K/mo
  unit: USD thousands per month
  source: '[BP operations privacy and trust controls] + startup-finance heuristic for legal, accounting, and admin'
- id: A16
  name: GTM spend formula
  value: Fixed brand spend ramps from $1K/mo to $7K/mo plus $55 variable spend per new paying user
  unit: USD
  source: '[BP operatingAssumptions creator and coach channels lower CAC] + [BP gtm.channels] + startup-finance heuristic for early content-led consumer acquisition'
- id: A17
  name: Funding milestone
  value: Reach ~2.3K paying users by Q4Y2, prove creator/coach CAC near $55, hold paid retention above the BP threshold, and make a data-backed hardware go/no-go decision with 6 months of buffer remaining
  unit: milestone
  source: '[BP milestones 0-24 months] + [BP investorMemo.nextDiligence] + Financial Modeler funding-buffer rule'
- id: A18
  name: Cash flow simplification
  value: Cash approximates EBITDA; no debt, capex, or working-capital swing is modeled, and any hardware pilot spend is expensed rather than inventoried
  unit: heuristic
  source: 'Startup-finance heuristic, named source: early-stage consumer SaaS cash simplification'
