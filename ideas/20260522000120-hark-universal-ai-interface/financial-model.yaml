scenarios:
  downside:
    description: Creator and coach channels scale slower, pricing stays closer to the low end of the software band, and churn remains stubbornly high.
    y3RevenueK: 780.5
    y3EbitdaK: -1133.9
    cashLowPointK: -286.0
    keyAssumptionChanges:
    - ARPU falls to $15.00 per month because accountability-sharing upsell does not land.
    - Monthly paid churn worsens to 7.0% and channel-driven new adds run 20% below the base case in Y2-Y3.
    - Gross margin settles at 68% and CAC rises to $70 as broad paid acquisition replaces referrals sooner than planned.
  base:
    description: The software-first wedge proves retention, creator and coach channels become repeatable, and hardware remains optional rather than a prerequisite for value.
    y3RevenueK: 1148.4
    y3EbitdaK: -849.0
    cashLowPointK: 44.6
    keyAssumptionChanges:
    - Blended ARPU is $16.50 per month across monthly and annual plans with modest premium-feature uplift.
    - Monthly paid churn holds at 5.5%, letting the company accumulate 10.6K paying subscribers by Q4Y3.
    - Gross margin reaches the 70% BP target while creator, search, and coach channels keep variable CAC near $55.
  upside:
    description: Retention is stronger, referral loops compound faster, and the company monetizes premium accountability features near the top of the pricing band.
    y3RevenueK: 1556.0
    y3EbitdaK: -520.5
    cashLowPointK: 424.5
    keyAssumptionChanges:
    - ARPU rises to $18.00 per month as premium personalization and accountability-sharing attach faster.
    - Monthly paid churn improves to 4.5% and Y2-Y3 gross adds run 15-20% above the base case.
    - Gross margin reaches 72% and variable CAC improves to $45 because creator and coach referrals dominate paid acquisition.
