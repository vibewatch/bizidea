modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Leads[Creator/search/coach leads] --> Trials[Qualified trials]
      Trials --> Paid[Paying subscribers]
      Paid --> Revenue[Subscription revenue]
      Revenue --> GrossProfit[Gross profit after hosting and support COGS]
      GrossProfit --> Cash[Cash after payroll and GTM spend]
modelSanity:
- checkName: Revenue engine
  finding: Base-case revenue comes from compounding a $16.50 monthly subscription from 116 paying users at Y1 exit to 2,259 at Y2 exit and 10,601 at Y3 exit through creator, search, and coach channels.
- checkName: Must go right
  finding: Paid churn must stay near 5.5% monthly so recurring gross profit accumulates faster than the GTM line.
- checkName: Model breaks if
  finding: If churn drifts to 7% or CAC rises toward $75, the downside case takes cash below zero before the end of Y3.
- checkName: Next-round proof
  finding: A credible seed story is ~2.3K paying subscribers by Q4Y2 with creator and coach CAC near $55 and software-only retention strong enough to keep hardware optional.
sanityChecks:
  ruleOf40: Y3 growth 523% + EBITDA margin -74% = 449% (inflated by the small Y2 base)
  burnMultiple: Y3 burn multiple ~0.88x ($849.0K EBITDA loss / $964.0K net new revenue proxy)
  revenuePerFte: $209K Y3 on 5.5 Q4Y3 FTE (benchmark ~$150-250K early consumer SaaS)
  flags:
  - The model still exits Y3 with only $44.6K of cash, so a seed round is needed before year-end even if the base case holds.
  - Hardware upside is intentionally excluded from base-case revenue because the BP says custom hardware should wait for software retention proof.
  - Rule-of-40 looks artificially strong because Y2 revenue is only $184.4K; retention, CAC payback, and cash runway are more decision-useful metrics at this stage.
  - If paid churn worsens to 7% or creator/coach CAC stops outperforming broad paid acquisition, the model turns cash-negative in the downside case.
  - Revenue per FTE is only at the low end of software benchmarks by Y3, so hiring discipline matters as much as topline growth.
