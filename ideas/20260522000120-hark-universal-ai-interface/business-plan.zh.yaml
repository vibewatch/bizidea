slug: ambient-adhd-routine-coach
date: '2026-05-22'
executiveSummary: Ambient ADHD Routine Coach 应该先以消费级问责产品切入，服务对象是美国已确诊 ADHD、从事远程或混合知识工作的成年人，而不是一上来就做通用 AI 助手或医疗器械。痛点既具体又高频：目标用户明明已经在用日历、提醒和任务应用，却还是会漏掉晨间启动、会议交接、用药窗口和收工流程，因为现有工具都要求用户先主动打开。研究说明这个市场有真实的价格带和聚焦空间：滩头市场 SAM 约 $0.7B，用户也已经在为问责和高端效率工具付费；但研究还没证明，买家愿意长期把另一台实体设备摆在桌上。因此，第一个关键证明不该是硬件销量，而该是“软件 + 现有音箱”工作流的留存：能不能在晨间启动和会间切换时，稳定给出一个下一步动作。只有先把这一点跑通，公司才该大规模投定制硬件。GTM 应该以自助获客为主，靠 ADHD 创作者、聚焦工作场景的 ADHD 搜索与内容，以及教练转介绍，因为这类买家通常是在确诊之后、工作切换期，或连续掉链子之后才行动，而不是通过正式医疗采购进来。定价也该先放进已经被验证的软件价格带，等习惯闭环稳住之后，再叠加硬件，因为教练服务证明了大家愿意为问责付费，但捆绑式智能助手也给消费端愿付上限设了天花板。真正的护城河不在设备外壳，而在那张日常节律、掉链子触发点、提示有效性和抑制规则的记忆图谱上——它决定产品是显得懂你，还是显得烦你。最大的证伪风险是，新鲜感掩盖了弱留存；如果真是这样，公司就该停留在软件和伙伴分发的问责层，而不是硬推独立硬件。
problem:
- ADHD 成年人明明已经在维护日历、任务应用、计时器和用药提醒，但一到晨间启动、任务切换和收工节点，还是会掉链子，因为执行功能最容易断的时候，恰恰需要用户自己先发起动作。
- 通用助手和智能音箱覆盖面很广，但它们既不会维护 ADHD 专属的日常记忆，也学不会哪种提示方式、时机和升级节奏，才能真正让某个用户动起来。
- 现有替代方案要么困在屏幕里，要么必须依赖同步的人力支持，所以在那些真正需要跟进的物理时刻，市场上仍缺一层始终在线的问责。
solution:
- 先从移动应用开始，再接入现有音箱和桌面触点。产品记住用户的日常节律、截止时间、未完成工作和已知掉链子触发点，然后在用户开始漂移的那一刻，给出一句语音或一眼能看懂的下一步动作。
- 第一版产品要刻意做窄，只做晨间启动、会间切换和收工三个场景，好让用户能很快感受到系统到底有没有改善真实的跟进表现。
- 可以加入伴侣或 ADHD 教练的共享问责；但只有当行为闭环已经证明能留住用户、值得承受硬件摩擦时，才引入专用床头和桌面设备。
whyWeWin:
- 这个切口比通用效率 AI 更窄，也因此更容易验证：一条重复出现的执行功能闭环、一个下一步动作、一个可量化结果。
- 软件规划器、body-doubling 工具和智能助手都只验证了需求的一部分，但没有谁把环境式存在、长期日常记忆和 ADHD 专属提示调优放进同一个产品。
- 真正的防御力会从提示—响应数据、日常图谱和信任控制里不断积累，干预质量会越用越准，而不只是靠通用 LLM 接口。
strategicChoices:
  beachhead: 美国 25–45 岁、已确诊 ADHD、从事远程或混合知识工作的成年人；他们已经在为效率工具或教练服务付费，但每周仍至少错过两次启动或交接。
  wedgeRationale: 最快能拿到证明的是晨间启动和会间切换：这两个场景高频、可量化，而且情绪痛感强；如果一开始就讲更大的“生活操作系统”，价值主张会发散，学习速度也会慢下来。
  sequencingRationale: 先在手机、桌面触点和现有智能音箱上做软件层，因为这样能降低安装摩擦、减少硬件现金消耗，也能先验证留存；接着再加教练共享和更深个性化；只有当产品能证明，硬件相对纯软件确实能带来更高留存或转化时，才发独立硬件。
  notYet:
  - 在直接面向消费者的留存尚未验证前，不做雇主或健康计划分发
  - 不做治疗、症状改善或诊断性表述
  - 不做泛化的家庭排程或学生工作流
  - 不加那些不能提升日常完成率的开放式聊天机器人功能
  - 在软件留存和付费意愿还不清楚前，不做完全定制的独立硬件
market:
  tam: $3.7B 的美国年度经常性 TAM 估算，基于 15.5M 名已确诊 ADHD 成年人，以及约 $240 的年化经常性 ARPU。
  sam: $0.7B 的美国年度 SAM 估算，对象是 25–49 岁、处在知识工作代理人群中的已确诊成年人，定价参考高端效率软件。
  som: $5.3M 的第 3 年 SOM 估算，相当于约 22,000 名付费用户、每人年化经常性收入约 $240；前提是这个滩头闭环能在硬件摩擦下依然守住留存。
  segments:
  - 远程或混合知识工作中的已确诊 ADHD 自费成年人
  - 帮助强化问责、并可能影响购买决策的 ADHD 教练或伴侣
  buyingProcess: 购买通常是自助完成，触发点往往是确诊、换工作、回办公室、用药受阻，或反复错过承诺。只有当产品能快速接上现有日历和任务系统，并在第一周就给出改善、同时又不显得像临床工具或入侵式监控时，买家才愿意接受一段不算太短的设置流程。
product:
  mvp: MVP 是一个移动应用，接入日历、提醒和任务系统，再把“一个下一步动作”的提示送到音箱和桌面触点。它只做一条晨间日常和一条工作切换日常，包含基础提示学习和 snooze 逻辑，不做被动感知、不做定制硬件，也不做健康宣称。
  sixMonth: 上线一个 100–200 人的 beta，重点测 onboarding 完成率、第 4 周留存、提示接受率，以及晨间启动和会间切换场景下“错过启动”是否减少。
  twelveMonth: 推出面向消费者的付费订阅，加入习惯报告、伴侣或教练共享问责、更好的个性化，以及面向高留存人群做过 A/B 测试的低成本陪伴硬件试点。
  twentyFourMonth: 只有当专用床头和桌面伙伴能把留存、转化或日活显著拉高到纯软件队列之上时，才正式推出；随后再扩到相邻的执行功能闭环，比如用药窗口和通勤缓冲。
  keyBets:
  - 晨间启动和会间切换会比收工场景更容易成为第一个守住留存的闭环。
  - 现有手机和音箱触点足以先证明这个切口，不必先做定制硬件。
  - 如果产品能在前两周减少错过承诺，用户愿意按高端软件价格为适应式问责付费。
  - 相比做更全的助手能力，个性化的抑制和升级逻辑对留存更关键。
gtm:
  wedge: 先向自费 ADHD 成年人卖“马上缓解错过启动和交接”的价值，再把留住的用户升级到共享问责和可选硬件。
  channels:
  - ADHD 创作者、播客和神经多样性社群
  - 围绕职场成人 ADHD、执行功能障碍和日常支持的搜索与内容
  - 不碰治疗宣称的教练、治疗师和倡议网络转介绍
  - 创始人亲自转化 waitlist，并为第一批用户提供 concierge onboarding
  funnelTargets: 获客→合格试用 20–30%，合格试用→第 4 周留存 35%+，留存用户→付费 10–15%，付费用户第 6 个月留存 65%+，留存的软件用户→硬件附加率 25%+
  pricing: 先定在每月 $12-20，或每年 $120-180，覆盖记忆、集成和问责功能；只有当软件队列证明能守住留存后，再加一个 $149-199 的陪伴设备。这样既能把第一次购买放进研究验证过的软件价格带，也保留原来“硬件 + 订阅”的上行空间。
businessModel:
  revenueStreams:
  - 消费者订阅收入
  - 年度预付方案
  - 陪伴设备带来的可选硬件毛利
  - 只有在直接消费需求被验证后，才考虑面向教练团队或打包方案的未来收入
  unitOfValue: 至少接入一条工作流、并拥有活跃日常图谱的付费用户
  targetGrossMarginPct: 70
  expansionLevers:
  - 当日常留存被证明后，把月订用户转成年度方案
  - 通过共享问责和高阶个性化提升 ARPU
  - 只在能显著改善留存或转化的队列里加硬件
  - 当滩头场景守住之后，再从工作日常扩到相邻的执行功能闭环
strategyMap:
  northStarMetric: 目标闭环里，每周至少完成 5 次被提示日常动作的活跃付费用户数
  inputMetrics:
  - 连接日历和任务系统的激活率
  - 晨间启动闭环在第 4 周仍留存的用户数
  - 提示接受率相对 dismiss 或 snooze 率
  - 每位用户每月自报的错过承诺次数
  - 试用转付费转化率
  - 软件队列与硬件队列的留存差值
  moatsToBuild:
  - 与真实提示—响应结果绑定的纵向日常记忆图谱
  - 会学“什么时候该安静、什么时候该升级、什么措辞对哪个用户有效”的提示策略引擎
  - 可导出、可删除、限制采集的可信数据控制
  - 把规划数据接到真实执行时刻的工作流集成
  killCriteria:
  - 在做过三轮 onboarding 迭代后，合格用户第 4 周留存仍低于 30%
  - 激活用户达到 300 人后，按年化 $120-180 定价，试用转付费仍低于 8%
  - 硬件试点相对纯软件队列，无法把留存或付费转化至少提高 15 个百分点
  - 合格用户里，完成“接入日历 + 收到第一条提示” onboarding 的比例低于 50%
  mermaid: |
    flowchart LR
      Wedge[Morning start and transition wedge] --> MVP[Software plus speaker MVP]
      MVP --> Proof[Proof of retained routines and reduced misses]
      Proof --> Expansion[Accountability sharing and selective hardware]
investorMemo:
  verdict:
    call: 观察
    conviction: 痛点很强，切口也很利，但在定制硬件之前，公司必须先证明留存和付费意愿，否则判断仍有限。
    whyBelieve: ADHD 成年人已经在为问责和高端效率工具付费，而这个产品瞄准的是一个具体的环境式工作流缺口——广谱助手和规划器都还没有占住。
    whyDoubt: 专用设备摩擦、隐私顾虑，以及大量只能部分满足需求的替代品，都意味着这家公司最后可能只是一个小众习惯硬件，而不是耐久的风险投资级生意。
    nextDiligence: 先证明一个 100–200 人的 beta，能把晨间和切换场景的使用留住 4 周，并在扩硬件投入前，把软件队列转成付费方案。
  firstCustomer:
    title: 自费的远程办公 ADHD 专业人士
    profile: 美国 25–45 岁知识工作者，已确诊 ADHD，至少在用两套任务系统，经常晚启动或交接掉链子，也已经为效率或问责工具花过钱。
    trigger: 新的确诊、换工作、回办公室、用药中断，或一段明显连续的错过截止时间，会让他觉得现有提醒应用已经顶不住。
    buyer: 自费消费者
    initialContract: 先以 founding-member beta 身份加入；在持续使用 2–4 周后，转成每年 $120-180 的订阅；只有高互动队列，后续才会上一个 $149-199 的硬件 upsell。
  mustBeTrue:
  - 至少 50% 的合格用户能完成“接入日历 + 第一条提示动作”的 onboarding。
  - 在滩头人群里，晨间启动或会间切换场景必须做到至少 35% 的第 4 周留存。
  - 在已研究的软件高端价格点上，付费转化必须达到 8% 以上，且不能靠免费送硬件来换。
  - 在试点队列里，个性化提示必须把错过启动或交接的情况相对用户基线至少降低 25%。
  - 现有音箱或手机触点必须先证明足够价值，让定制硬件只是优化项，而不是 PMF 的前提。
  diligenceQuestions:
  - 按人群分层看，哪条闭环留存最好：晨间启动、工作切换，还是收工？
  - 要让买家接受持久日常记忆，需要哪些隐私控制？
  - 对首批客户来说，前两周里，这个产品比 Alexa、Google Home、Focusmate 或 Motion 好多少？
  - 教练或伴侣转介绍，能否把激活和付费转化拉高到值得做伙伴渠道？
  - 头对头测试时，专用硬件带来的留存提升，是否足以覆盖库存和支持复杂度？
operatingAssumptions:
- assumption: 第一个能守住留存的产品，可以先交付在现有手机和音箱触点上，不必先做定制设备。
  basis: research.yaml
  validationTest: 做“软件 + 音箱”对“专用硬件原型”的 A/B 试点；在给硬件开模前，要求纯软件队列先达到至少 35% 的第 4 周留存。
  decisionImpact: 如果不成立，公司要么更早为硬件去融资，要么放弃环境式设备这条主线。
- assumption: 晨间启动和会间切换的痛感足够强，能撑起一个聚焦的双闭环 MVP。
  basis: idea.yaml
  validationTest: 给 beta 用户的晨间、切换和收工流程都埋点并访谈；只保留那些周复用率至少达到 40% 的闭环。
  decisionImpact: 如果不成立，公司要么进一步收缩到单一闭环，要么转向由教练驱动的问责，而不是继续做更泛的日常助手。
- assumption: 在引入硬件购买前，用户愿意接受高端软件定价。
  basis: research.yaml
  validationTest: 在每月 $12-20 的区间测试月付和年付价格点，并要求试用转付费至少 8%，同时 60 天留存稳定。
  decisionImpact: 如果不成立，生意可能需要更低定价、赞助型渠道，或接受消费端 CAC 回本周期不适合走风险投资路线。
- assumption: 持久记忆能改善结果，同时又不踩进治疗宣称，也不会引发用户无法接受的隐私反弹。
  basis: research.yaml
  validationTest: 在前 100 名用户里测 opt-in、删除行为和信任感受；上线营销前，再对所有表述做一次 FTC 健康宣称审查。
  decisionImpact: 如果不成立，产品必须缩小记忆范围、简化数据采集，并把定位牢牢放在规划和问责支持里。
- assumption: 教练和创作者渠道，能比泛消费付费投放更早带来低 CAC 用户。
  basis: operator judgment
  validationTest: 追踪前 500 条线索的渠道级 CAC、激活和第 4 周留存，要求伙伴带来的队列在 CAC 和留存上都优于付费社媒队列。
  decisionImpact: 如果不成立，公司应该放慢增长投入，更依赖自然搜索和转介绍，或重新审视消费分发模型。
experimentRoadmap:
- horizon: 0–90 天
  experiment: 用 20 名发现访谈 + 日记研究用户，跑一个聚焦晨间启动和会间切换的 concierge 原型。
  hypothesis: 在用户掉链子的当下给出一个下一步动作，对滩头买家来说，比更泛的规划功能更有价值。
  successMetric: 20 人里至少有 12 人每周会把这套流程复用 4 次或以上，并明确指出其中一条闭环明显优于现有提醒。
  owner: 创始人
- horizon: 0–90 天
  experiment: 测试“接入日历 + 任务系统”的 onboarding，与更轻量的手动录入流程对比。
  hypothesis: 接入已有工作流带来的感知价值，足以覆盖额外设置摩擦。
  successMetric: 连接式 onboarding 完成率保持在 50% 以上，且感知有用性至少比手动设置高 20 个百分点。
  owner: 产品
- horizon: 0–90 天
  experiment: 在原型队列里比较不同提示风格、声音和升级规则。
  hypothesis: 个性化的抑制和升级逻辑，能显著压低羞耻反应和流失风险。
  successMetric: 最佳变体里，提示接受率超过 45%，同时 opt-out 和静音率低于 20%。
  owner: 创始工程师
- horizon: 90–180 天
  experiment: 在手机 + 音箱触点上，按研究得到的软件价格点上线一个 100–200 人的付费 beta。
  hypothesis: 如果产品能在两周内减少错过启动和交接，滩头人群愿意按高端软件价格付费。
  successMetric: 第 4 周留存 35%+，试用转付费 8%+，并且自报错过承诺相对基线下降 25%+。
  owner: 创始人
- horizon: 90–180 天
  experiment: 跑一个教练转介绍队列，并和创作者获客队列做对比。
  hypothesis: 由教练引入的用户会更快激活、也更容易留住，因为价值主张一开始就被框定为问责支持。
  successMetric: 教练来源用户在 onboarding 完成率或第 4 周留存上，至少比创作者队列高 10 个百分点。
  owner: 增长负责人
- horizon: 6–12 个月
  experiment: 在留存最好的软件队列里，试点一款低成本陪伴硬件。
  hypothesis: 专用床头和桌面硬件带来的日活和留存提升，足以覆盖库存、支持和制造复杂度。
  successMetric: 硬件队列在付费留存或日常动作完成日活上，至少比纯软件对照组高 15 个百分点。
  owner: 硬件负责人
operations:
- 从第一批 beta 开始，就给用户明确的记忆创建、删除、导出和共享问责权限控制。
- 每周复盘提示接受、dismiss、snooze 和流失信号，持续调优干预逻辑。
- 把 onboarding 标准化在日历、提醒和任务系统集成上，而不是为每个用户做定制设置。
- 可以借教练和创作者伙伴做获客和 onboarding 支持，但产品定位必须停留在消费级问责，而不是治疗。
- 在软件留存数据明确显示值得做某个硬件 SKU 之前，不做库存承诺。
team:
- role: 创始工程师
  startTiming: 第 0 个月
  rationale: 先把日常图谱、提示引擎和首批集成做出来，决定这个切口能不能守住留存。
- role: 创始人/CEO
  startTiming: 第 0 个月
  rationale: 在消费叙事跑顺之前，亲自抓用户发现、定价、创作者和教练合作，以及早期队列转化。
- role: 产品与行为设计负责人
  startTiming: 第 2 个月
  rationale: 把 ADHD 工作流洞察变成提示策略、onboarding 和结果衡量，同时避免产品滑向泛化助手。
- role: 增长负责人
  startTiming: 第 6 个月
  rationale: 只有当留存和定价数据已经指向最优人群后，才把创作者、搜索和转介绍飞轮放大。
- role: 硬件负责人
  startTiming: 第 9 个月
  rationale: 只有当软件数据表明专用触点确实能显著提高留存时，才正式定义陪伴设备。
milestones:
- horizon: 0–12 个月
  items:
  - 用 100–200 名用户验证一条能守住留存的滩头闭环，并把表现最好的队列转成月付或年付订阅。
  - 在不触碰治疗宣称的前提下，证明连接式记忆功能的 onboarding、定价和信任阈值。
  - 是否推进专用硬件，必须看实测留存和转化提升，而不是创始人直觉。
- horizon: 12–24 个月
  items:
  - 在美国 ADHD 知识工作人群里，把已验证留存的消费者订阅广泛推开，并把创作者和转介绍渠道跑成可复制。
  - 上线共享问责；如果数据证明值得，再给高留存队列加陪伴设备。
  - 建立一套提示有效性和日常模式的参考数据集，让干预质量随着时间持续变好。
- horizon: 24–36 个月
  items:
  - 在不稀释核心切口的前提下，把工作日常扩到相邻的执行功能闭环，比如用药支持、通勤缓冲和家庭交接提醒。
  - 只有当留存、付费转化和硬件经济性都守在阈值内，才去追研究给出的第 3 年 SOM 路径。
  - 在直接面向消费者的 PMF 确立之后，再选择性测试教练打包或雇主赞助分发。
risks:
- risk: 即便喜欢软件体验，买家也未必愿意再接受一台实体设备。
  likelihood: High
  impact: High
  mitigation: 先在现有触点上证明工作流成立；只有留存或转化提升足够清楚，才投入硬件库存。
- risk: 提示可能显得唠叨或带来羞耻感，反而在日常最不稳定的人群里引发流失。
  likelihood: High
  impact: High
  mitigation: 把产品收紧到“一个下一步动作”，尽快做好个性化抑制，并把 opt-out 行为当成核心产品信号来盯。
- risk: 公司可能滑向医疗或症状改善表述，从而背上更重的合规负担。
  likelihood: Medium
  impact: High
  mitigation: 定位牢牢放在规划与问责支持，仔细审核上线表述；在证据和合规能力更强之前，不碰治疗语言。
- risk: 广谱助手和效率应用可能进化得够快，在公司建立可信品牌前就把切口挤窄。
  likelihood: Medium
  impact: Medium
  mitigation: 聚焦 ADHD 专属的日常记忆和单一闭环结果，不去和大平台拼通用助手的广度。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: 这 18 个月的资金，够公司把能守住留存的软件 MVP 跑出来、完成首个 100–200 人付费 beta、测试创作者与教练渠道、补齐隐私与信任控制；只有当软件数据证明值得时，才做有限的陪伴硬件试点。
