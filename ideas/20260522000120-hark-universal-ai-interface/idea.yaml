differentiator: >-
  Most AI productivity products are software overlays that wait for users to
  remember to open them. This concept is differentiated by combining a
  purpose-built physical interface with a narrow behavior-change loop, so the
  product can intervene during the exact moments when executive function breaks
  down. The memory graph of routines, derailers, and successful prompts becomes
  a retention and data moat that generic assistants and commodity hardware
  struggle to match.
