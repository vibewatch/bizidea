problem: >-
  Adults with ADHD often maintain calendars, to-do apps, timers, and medication
  reminders, yet still lose the thread during mornings, task-switches, and
  handoffs because every tool waits to be opened or prompted. Generic chatbots
  forget routines and prior failures, while smart speakers were not built to
  track personal context over time. The result is repeated lateness, missed
  commitments, and shame around "knowing what to do" but failing to do it in
  the moment.
targetUser:
  primary: Adults ages 25-45 with diagnosed ADHD working remote or hybrid knowledge jobs
  secondary: Partners or ADHD coaches who help reinforce routines and accountability
  buyer: Consumers self-purchasing productivity and wellness tools for ADHD support
startupThesis:
  nonObviousInsight: >-
    The first breakout AI hardware products will not win by being universal for
    everyone; they will win by owning one chronic, high-frequency cognitive loop
    that current phones and smart speakers cannot remember well enough to manage.
  beachhead: >-
    U.S. adults ages 25-45 with diagnosed ADHD, remote or hybrid knowledge-work
    jobs, at least two active task systems, and repeated late starts or missed
    handoffs despite using digital calendars
  wedge: >-
    A persistent bedside-and-desk AI companion that remembers routines,
    deadlines, and avoidance patterns, then proactively issues spoken and
    glanceable next-step prompts during morning startup, work transitions, and
    end-of-day shutdown
  whyNowCatalyst: >-
    Hark's funding and explicit claim that current consumer devices lack
    persistent memory and intelligent-interaction hardware make an ambient ADHD
    routine device newly credible now rather than just another productivity app.
  ventureScalePath: >-
    Start with ADHD routine support, then expand the same memory graph and
    ambient hardware layer into broader executive-function products for students,
    anxiety and burnout users, family scheduling, and employer or health-plan
    distribution.
solution: >-
  Ambient ADHD Routine Coach is a small voice-and-light device paired to a
  mobile app and calendar integrations. It builds a persistent memory of the
  user's working patterns, medication windows, commute buffers, unfinished
  tasks, and common derailers, then proactively cues one next action instead of
  waiting for a prompt. The product is deliberately narrow: it is optimized for
  morning startup, task transition, and shutdown rituals where ADHD users most
  often stall. Over time, it learns which prompts actually create action,
  escalates gently when someone drifts, and lets a partner or coach join an
  accountability loop without turning the product into therapy.
goToMarketSeed:
  firstCustomer: >-
    Self-serve ADHD adults ages 25-40 in U.S. remote or hybrid knowledge jobs
    who already pay for tools like Todoist, Notion, Focusmate, or coaching and
    still miss at least two commitments per week
  buyingTrigger: >-
    A new diagnosis, return-to-office transition, job change, or a run of missed
    deadlines and late starts that makes current reminder apps feel inadequate
  currentAlternative: Phone calendars and reminder apps, task managers, ADHD coaching, body-doubling tools, and smart speakers
  switchingReason: >-
    This wedge remembers patterns across days and lives in the physical moments
    when people derail, so it can intervene proactively in a way prompt-based
    apps and generic voice assistants cannot.
  pricingHypothesis: $199 for the device plus $20 per month for memory, integrations, and shared accountability features
