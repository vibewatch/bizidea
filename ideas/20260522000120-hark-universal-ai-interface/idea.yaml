topRisks:
  - name: Hardware adoption friction
    description: Consumers may resist buying another device unless it delivers obvious value within days.
    mitigation: Start with a narrow daily routine promise, subsidize early hardware via subscription, and prove immediate wins in the first week of onboarding.
  - name: Behavior-change churn
    description: Users with ADHD may abandon the product if prompts become nagging or fail to adapt to real routines.
    mitigation: Personalize prompt timing quickly, optimize for one or two critical loops first, and use outcome metrics to tune interventions continuously.
  - name: Medical expectation creep
    description: Customers or regulators could interpret the product as treatment rather than a consumer support tool for routines.
    mitigation: Position it as a consumer productivity and accountability product, avoid diagnostic claims, and add clinical partnerships only after core consumer pull is proven.
