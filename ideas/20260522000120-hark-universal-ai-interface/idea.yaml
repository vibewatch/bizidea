jobsToBeDone:
  - job: >-
      When my workday begins and I am drifting between tabs, help me start the
      right next task, so I can avoid losing the first productive hour.
    currentAlternative: Phone reminders, sticky notes, and self-talk
    successMetric: More mornings started on the planned task within 10 minutes
  - job: >-
      When I am switching between meetings, errands, and medication windows, help
      me remember the one commitment most likely to slip, so I can stop missing
      important handoffs.
    currentAlternative: Calendar alerts plus overloaded to-do lists
    successMetric: Fewer missed deadlines, appointments, or medication events per month
