scenarios:
  downside:
    description: 创作者和教练渠道扩张更慢，定价更贴近软件价格带下沿，流失率也顽固地维持高位。
    y3RevenueK: 780.5
    y3EbitdaK: -1133.9
    cashLowPointK: -286.0
    keyAssumptionChanges:
    - ARPU 降到每月 $15.00，因为共享问责的 upsell 没有跑出来。
    - 月度付费流失恶化到 7.0%，且 Y2-Y3 的渠道新增比基准情形低 20%。
    - 毛利率落在 68%，CAC 升到 $70，因为公司比计划更早依赖大盘付费投放，而不是转介绍。
  base:
    description: “软件优先”的切口证明了留存，创作者和教练渠道变得可复制，硬件始终是加分项，而不是价值成立的前提。
    y3RevenueK: 1148.4
    y3EbitdaK: -849.0
    cashLowPointK: 44.6
    keyAssumptionChanges:
    - 混合 ARPU 为每月 $16.50；月付和年付混合，并带来适度的高阶功能提升。
    - 月度付费流失维持在 5.5%，让公司在 Q4Y3 前累计到 10.6K 付费订阅用户。
    - 毛利率达到 BP 里的 70% 目标，创作者、搜索和教练渠道把变量 CAC 稳在约 $55。
  upside:
    description: 留存更强，转介绍飞轮转得更快，公司也能在价格带上沿附近把高阶问责功能卖出去。
    y3RevenueK: 1556.0
    y3EbitdaK: -520.5
    cashLowPointK: 424.5
    keyAssumptionChanges:
    - 随着高阶个性化和共享问责更快挂上去，ARPU 升到每月 $18.00。
    - 月度付费流失改善到 4.5%，Y2-Y3 的新增比基准情形高 15-20%。
    - 毛利率达到 72%，变量 CAC 改善到 $45，因为创作者和教练转介绍成为主要获客来源。
