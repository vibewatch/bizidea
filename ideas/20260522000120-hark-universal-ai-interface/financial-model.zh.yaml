modelDiagram:
  title: 单位经济模型流程
  mermaid: |
    flowchart LR
      Leads[Creator/search/coach leads] --> Trials[Qualified trials]
      Trials --> Paid[Paying subscribers]
      Paid --> Revenue[Subscription revenue]
      Revenue --> GrossProfit[Gross profit after hosting and support COGS]
      GrossProfit --> Cash[Cash after payroll and GTM spend]
modelSanity:
- checkName: 收入引擎
  finding: 基准情形下的收入，来自每月 $16.50 的订阅：Y1 期末 116 名付费用户，Y2 期末 2,259 名，Y3 期末 10,601 名，增长主要靠创作者、搜索和教练渠道累积。
- checkName: 必须成立
  finding: 月度付费流失必须稳在约 5.5%，这样经常性毛利的积累速度才能超过 GTM 支出线。
- checkName: 模型失效条件
  finding: 如果流失飘到 7%，或 CAC 往 $75 走，悲观情形会在 Y3 结束前把现金打到零以下。
- checkName: 下一轮证明点
  finding: 一个可信的 seed 故事是：到 Q4Y2 做到约 2.3K 付费订阅用户，创作者和教练 CAC 接近 $55，同时纯软件留存足够强，让硬件保持可选。
sanityChecks:
  ruleOf40: Y3 增长 523% + EBITDA 利润率 -74% = 449%（主要被 Y2 基数过小抬高）
  burnMultiple: Y3 burn multiple 约 0.88x（$849.0K EBITDA 亏损 / $964.0K 净新增收入代理值）
  revenuePerFte: Y3 在 5.5 名 Q4Y3 FTE 上做到每 FTE $209K（早期消费 SaaS 基准约 $150-250K）
  flags:
  - 即便基准情形成立，模型到 Y3 期末也只剩 $44.6K 现金，所以年末前仍需要再融一轮 seed。
  - 基准收入刻意没有计入硬件上行，因为 BP 明确写了：定制硬件要等软件留存证明后再推进。
  - Rule of 40 看起来很亮眼，但那主要是因为 Y2 收入只有 $184.4K；在这个阶段，更该盯的是留存、CAC 回本和现金跑道。
  - 如果付费流失恶化到 7%，或者创作者 / 教练 CAC 不再优于大盘付费投放，悲观情形会转成现金为负。
  - 到 Y3 时，每 FTE 收入也只在软件基准的低端，所以招聘纪律和 topline 增长同样重要。
