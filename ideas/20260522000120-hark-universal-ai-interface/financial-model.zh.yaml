slug: ambient-adhd-routine-coach
date: '2026-05-22'
currency: USD
modelStartMonth: 2026-06
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-06
  unit: 月份
  source: '[BP date 2026-05-22] 建模为商业计划日期后的第一个完整月份'
- id: A2
  name: 客户定义
  value: 付费订阅账户；基准情形在软件留存证明切口成立前，不计入大额硬件收入
  unit: 定义
  source: '[BP strategicChoices.sequencingRationale] + [BP businessModel.revenueStreams]，按“软件优先”理解'
- id: A3
  name: 混合确认 ARPU
  value: $16.50 每月（年化 $198）
  unit: 每位付费用户每月 USD
  source: '[BP gtm.pricing $12-20/mo or $120-180 annual] + [BP businessModel.expansionLevers accountability sharing and premium personalization] + 创业财务经验：月付 / 年付按 65% / 35% 混合'
- id: A4
  name: 毛利率
  value: 70%
  unit: 百分比
  source: '[BP businessModel.targetGrossMarginPct 70]'
- id: A5
  name: 月度付费流失率
  value: 5.5%
  unit: 百分比
  source: '[BP gtm.funnelTargets paid month-6 retention 65%+] + 创业财务经验：只有留住的合格队列会转成付费'
- id: A6
  name: 收入确认约定
  value: 各期收入 = 该期平均活跃客户数 × 月度 ARPU
  unit: 经验规则
  source: 创业财务经验，命名来源：Financial Modeler 期中激活约定
- id: A7
  name: Y1 新增付费爬坡
  value: '[0, 0, 0, 5, 8, 10, 12, 15, 18, 20, 22, 25]'
  unit: 每月新增付费用户
  source: '[BP product.sixMonth 100-200 user beta] + [BP experimentRoadmap 100-200 user paid beta in 90-180 days]'
- id: A8
  name: Y2 新增付费爬坡
  value: '[70, 95, 120, 145, 170, 195, 230, 265, 300, 335, 370, 405]'
  unit: 每月新增付费用户
  source: '[BP milestones 12-24 months] 在留存被证明后，通过创作者、搜索和转介绍渠道做美国消费端扩张'
- id: A9
  name: Y3 新增付费爬坡
  value: '[500, 590, 680, 770, 860, 950, 1040, 1130, 1220, 1310, 1400, 1490]'
  unit: 每月新增付费用户
  source: '[BP milestones 24-36 months] + [Research market.som 22K paying users]；基准情形做到 10.6K 付费用户，刻意低于研究里的 SOM 上限'
- id: A10
  name: 期初现金 / pre-seed 交割
  value: $2.40M
  unit: USD
  source: '[BP fundingAsk targetFundingRangeUsd $2-4M] 建模取区间偏低中位，用来覆盖 18 个月计划和额外 6 个月缓冲'
- id: A11
  name: 全成本薪酬系数
  value: 现金工资上浮 15%
  unit: 百分比
  source: 创业财务经验，命名来源：美国早期创业公司薪资负担系数
- id: A12
  name: 按角色计的年化全成本薪酬
  value: 创始人/CEO $132K；创始工程师 $180K；产品与行为设计负责人 $150K；增长负责人 $120K；硬件顾问 $30K 顾问费；社区支持 0.5 FTE 为 $42K；第二名工程师 $165K
  unit: 每年 USD 千元
  source: '[BP team roles] + 创业财务经验：美国种子阶段消费软件招聘水平'
- id: A13
  name: 招聘时间表
  value: 创始人和创始工程师 M1 入职；产品负责人 M2；增长负责人 M6；硬件顾问 M10-M24；社区支持 0.5 FTE 从 M18；第二名工程师 M27
  unit: 起始月份
  source: '[BP team] + [BP strategicChoices.sequencingRationale] 先跑软件，再加硬件投入'
- id: A14
  name: R&D 非人力支出
  value: M1-M6 每月 $3K，M7-M12 每月 $4K，M13-M24 每月 $5K，M25-M36 每月 $6K
  unit: 每月 USD 千元
  source: '[BP operations] + 创业财务经验：云工具、直接 COGS 之外的模型使用，以及原型迭代'
- id: A15
  name: G&A 非人力支出
  value: M1-M6 每月 $4.5K，M7-M12 每月 $5.5K，M13-M24 每月 $6.5K，M25-M36 每月 $7K
  unit: 每月 USD 千元
  source: '[BP operations privacy and trust controls] + 创业财务经验：法务、会计和行政'
- id: A16
  name: GTM 支出公式
  value: 固定品牌支出从每月 $1K 爬到 $7K，外加每新增 1 位付费用户配 $55 变量支出
  unit: USD
  source: '[BP operatingAssumptions creator and coach channels lower CAC] + [BP gtm.channels] + 创业财务经验：早期内容驱动的消费获客'
- id: A17
  name: 下一轮融资里程碑
  value: 在 Q4Y2 前做到约 2.3K 付费用户，证明创作者 / 教练 CAC 接近 $55，付费留存高于 BP 阈值，并在还剩 6 个月缓冲时做出有数据支撑的硬件 go/no-go 决策
  unit: 里程碑
  source: '[BP milestones 0-24 months] + [BP investorMemo.nextDiligence] + Financial Modeler 资金缓冲规则'
- id: A18
  name: 现金流简化
  value: 现金近似按 EBITDA 走；模型不计债务、capex 或营运资本波动，任何硬件试点支出都直接费用化，不进库存
  unit: 经验规则
  source: 创业财务经验，命名来源：早期消费 SaaS 现金流简化
