categoryDynamics:
  growthRate: 没有抓到一个单一、权威、可直接引用的公开 CAGR；但代理信号显示，2020 年后 ADHD 教练在扩张，成人 ADHD 数字工具的尝试也在加快。
  growthRateSourceRefs:
  - 8
  - 9
  tailwinds:
  - point: 成人 ADHD 已经足够可见，足以支撑直接面向消费者做细分；确诊患病率高，远程医疗接触也很广。
    sourceRefs:
    - 1
    - 2
  - point: 教练热说明，在正式医疗之外，用户对更实操的问责和规划支持有未被满足的需求。
    sourceRefs:
    - 6
    - 7
    - 8
  - point: 环境式助手平台变得更会对话、也更会执行动作，这让低摩擦语音交互第一次站得住。
    sourceRefs:
    - 12
    - 23
    - 37
  - point: 混合办公让用户必须自己管理任务启动和交接，这些环节继续直接影响工作表现。
    sourceRefs:
    - 3
    - 40
  headwinds:
  - point: 目标买家本来就承担着不低的 ADHD 相关开销，可自由支配支出并不宽裕。
    sourceRefs:
    - 4
  - point: 捆绑式助手和低价效率应用，已经可以满足部分需求，不一定需要新硬件。
    sourceRefs:
    - 16
    - 17
    - 18
    - 23
    - 24
  - point: 成人 ADHD 数字干预的证据基础虽然在增长，但仍然宽泛且不均衡，这会抬高产品设计风险。
    sourceRefs:
    - 9
    - 10
competitors:
- name: Motion
  stage: 扩张期
  wedge: 给专业人士和团队用的 AI 日历与任务规划器
  pricing: Pro AI $19/seat/mo；Business AI $29/seat/mo
  strength: 强在排程自动化，以及给高端效率软件提供了清晰的付费意愿锚点。
  weaknessVsUs: 它活在屏幕和日历里，不在环境式日常时刻里；更偏工作规划，不是为 ADHD 专属跟进设计的。
  sourceRefs:
  - 19
  - 34
- name: Focusmate
  stage: 扩张期
  wedge: 通过预约共工会话提供 body-doubling 问责
  pricing: 免费层；年付 $8/mo 或月付 $12/mo
  strength: 它直击跟进和问责，而且消费端价格极低。
  weaknessVsUs: 它要求同步约时、也要求用户主动预约；无法做到全天持续、个性化、环境式存在。
  sourceRefs:
  - 18
- name: Sunsama
  stage: 扩张期
  wedge: 高端日常规划与工作 / 生活平衡工作流
  pricing: $25/mo，或年付约 $20/mo
  strength: 高端定位说明，确实有一部分用户愿意为更有意识的日常规划和更平稳的工作流付费。
  weaknessVsUs: 它仍然是个软件规划器，默认用户会主动打开应用并自己管理任务切换。
  sourceRefs:
  - 20
  - 35
- name: Alexa+
  stage: 现有厂商
  wedge: 铺在大规模智能家居设备上的通用环境式 AI 助手
  pricing: Prime 用户免费
  strength: 装机量巨大、集成广，而且执行任务的能力越来越强。
  weaknessVsUs: 它的设计是先做广度，不会把 ADHD 专属的日常记忆和问责放在核心位置。
  sourceRefs:
  - 12
  - 13
  - 37
- name: Google Home Speaker
  stage: 现有厂商
  wedge: 由 Gemini 驱动、面向更广家庭助手市场的智能音箱
  pricing: $99.99 硬件，附带 6 个月 Google Home Premium 试用
  strength: 大众价位、语音优先，而且家庭触点对提醒和摘要天然有利。
  weaknessVsUs: 它仍然是围绕泛家庭实用性优化的，而不是围绕会学习掉链子模式和提示效果的窄执行功能闭环。
  sourceRefs:
  - 23
  - 24
  - 16
regulatoryTechnicalConstraints:
- point: 即便不受 HIPAA 约束，健康应用和连接设备一旦发生未授权披露或数据泄露，仍可能触发 FTC Health Breach Notification Rule。
  sourceRefs:
  - 14
- point: 任何客观的健康相关宣称，在上线沟通或广告前，都需要有充分且可靠的科学证据支撑。
  sourceRefs:
  - 15
- point: 助手平台集成功能强大，但也意味着产品会部分依赖 Amazon、Google 或 Apple 的触点和权限体系。
  sourceRefs:
  - 13
  - 16
  - 17
- point: 证据确实支持结构化时间管理帮助，但在没有精细设计之前，谁也不能保证一个环境式设备一定比更简单的数字工具或教练干预更有效。
  sourceRefs:
  - 9
  - 10
validationSignals:
- point: CDC 估计，美国有 15.5M 名成年人处于当前 ADHD 确诊状态，其中约一半是在成年后确诊。
  sourceRefs:
  - 1
- point: ADHD 成年人在工作里确实会遇到明显摩擦，尤其是在达到自我标准和处理注意力相关工作要求上。
  sourceRefs:
  - 11
- point: 第一份大型 ADHD 教练调查给出的价格中位数约为每小时 $150，而且明确把教练放在保险支持体系之外，说明用户确实愿意为问责帮助付费。
  sourceRefs:
  - 8
- point: 相比神经典型消费者，ADHD 消费者似乎更愿意为效率付费，也更容易对低摩擦品牌形成忠诚。
  sourceRefs:
  - 5
- point: 现有替代品已经能把持续性的消费计划卖出去，从低价问责到高端规划，说明付费软件层本身有定价锚点。
  sourceRefs:
  - 18
  - 19
  - 20
openQuestions:
- 专用设备相对“应用 + 音箱”的工作流，是否真的能显著好到值得多承受家庭杂物和设置成本？
- 到底是哪一条单一闭环最能带来留存：晨间启动、会间切换，还是晚间收工？
- 在隐私顾虑压过效用之前，买家究竟能接受多少被动感知和记忆保留？
- 产品能否在明确不碰治疗或诊断宣称的前提下，依然做出有意义的行为结果？
