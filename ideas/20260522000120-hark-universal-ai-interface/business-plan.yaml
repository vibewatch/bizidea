slug: ambient-adhd-routine-coach
date: '2026-05-22'
executiveSummary: >-
  Ambient ADHD Routine Coach should launch as a consumer accountability product
  for diagnosed U.S. adults with ADHD in remote or hybrid knowledge work, not
  as a general AI assistant or a medical device. The pain is specific and
  frequent: target users already use calendars, reminders, and task apps but
  still miss morning starts, meeting handoffs, medication windows, and shutdown
  routines because existing tools wait to be opened. Research supports a real
  price envelope and a focused market, with an estimated $0.7B beachhead SAM
  and existing willingness to pay for accountability and premium productivity,
  but it does not yet prove buyers will keep another physical device on the
  desk. The first proof point should therefore be retention in a software plus
  existing-speaker workflow that delivers one next action during morning
  startup and between-meeting transitions before the company funds custom
  hardware at scale. Go-to-market should be self-serve through ADHD creators,
  work-focused ADHD search and content, and coach referrals, because the buyer
  acts after diagnosis, work-transition pain, or repeated follow-through
  failures rather than through formal healthcare procurement. Pricing should
  begin inside the proven software band, then layer in hardware only after the
  habit loop is retained, because coaching validates demand for accountability
  but bundled assistants cap what consumers will pay without immediate relief.
  The core moat is not the device shell; it is the memory graph of routines,
  derailers, prompt efficacy, and suppression rules that makes the product feel
  adaptive rather than nagging. The biggest disconfirming risk is that novelty
  masks weak retention, in which case the company should stay a software and
  partner-distributed accountability layer rather than force a standalone
  hardware rollout.
problem:
  - Adults with ADHD already maintain calendars, task apps, timers, and medication reminders, yet still fail at morning starts, task switches, and shutdowns because the tools require self-initiation in the exact moments executive function breaks down.
  - Generic assistants and smart speakers provide breadth, but they do not maintain ADHD-specific routine memory or learn which prompt style, timing, and escalation actually gets a given user moving.
  - Existing alternatives either stay on screens or require synchronous human support, leaving a gap for always-available accountability in the physical moments where follow-through fails.
solution:
  - Start with a mobile app plus integrations to existing speakers and desktop surfaces that remembers routines, deadlines, unfinished work, and known derailers, then delivers one spoken or glanceable next action at the moment of drift.
  - Constrain the initial product to morning startup, between-meeting transitions, and end-of-day shutdown so users can quickly feel whether the system improves real follow-through.
  - Add optional shared accountability with a partner or ADHD coach and only introduce a dedicated bedside-and-desk device after the behavior loop proves retained and worth hardware friction.
whyWeWin:
  - The wedge is narrower than generic productivity AI and therefore easier to test: one repeated executive-function loop, one next action, and one measurable outcome.
  - Software planners, body-doubling tools, and smart assistants each validate part of the demand, but none combine ambient presence, longitudinal routine memory, and ADHD-specific prompt tuning in one product.
  - Defensibility compounds from prompt-response data, routine graphs, and trust controls that improve intervention quality over time rather than from generic LLM access alone.
strategicChoices:
  beachhead: U.S. adults ages 25-45 with diagnosed ADHD in remote or hybrid knowledge-work roles who already pay for productivity tools or coaching and still miss at least two starts or handoffs per week.
  wedgeRationale: The fastest proof comes from morning startup and between-meeting transitions because they are high-frequency, measurable, and emotionally painful; a broader "life operating system" would blur the value proposition and slow learning.
  sequencingRationale: Start in software on phones, desktop surfaces, and existing smart speakers because that reduces setup friction, lowers hardware cash burn, and tests retention first; add coach-sharing and richer personalization next; ship dedicated hardware only after the product can prove better retention or conversion than software alone.
  notYet:
    - Employer or health-plan distribution before direct consumer retention is proven
    - Treatment, symptom-improvement, or diagnostic claims
    - Broad family scheduling or student workflows
    - Open-ended chatbot features that do not improve routine completion
    - Fully custom standalone hardware before software retention and willingness to pay are clear
market:
  tam: $3.7B estimated U.S. annual recurring TAM based on 15.5M diagnosed adults with ADHD and roughly $240 annual recurring ARPU.
  sam: $0.7B estimated U.S. annual SAM for diagnosed adults ages 25-49 in knowledge-work proxy segments, priced around premium productivity software levels.
  som: $5.3M estimated year-3 SOM, equivalent to roughly 22,000 paying users at about $240 annual recurring revenue per user if the beachhead loop retains despite hardware friction.
  segments:
    - Self-pay adults with diagnosed ADHD in remote or hybrid knowledge-work roles
    - ADHD coaches or partners who reinforce accountability and may influence purchase
  buyingProcess: >-
    Purchase is usually self-serve and triggered by a diagnosis, job change,
    return-to-office shift, medication friction, or repeated missed
    commitments. The buyer will tolerate a short setup flow only if the product
    connects existing calendars and task systems quickly and shows first-week
    improvement without sounding clinical or invasive.
product:
  mvp: >-
    The MVP is a mobile app with calendar, reminder, and task integrations plus
    speaker and desktop delivery surfaces for one-next-step prompts. It should
    focus on one morning routine and one work-transition routine, include basic
    prompt learning and snooze logic, and exclude passive sensing, custom
    hardware, and health claims.
  sixMonth: Launch a 100-200 user beta that measures onboarding completion, week-4 retention, prompt acceptance, and missed-start reduction for morning startup and between-meeting transitions.
  twelveMonth: Ship a paid consumer subscription with habit reports, partner or coach accountability sharing, better personalization, and an A/B-tested low-cost companion hardware pilot for the highest-retaining cohort.
  twentyFourMonth: Introduce a dedicated bedside-and-desk companion only if it lifts retention, conversion, or daily engagement materially above software-only cohorts, then expand into adjacent executive-function loops such as medication windows and commute buffers.
  keyBets:
    - Morning startup and between-meeting transitions will outperform shutdown as the first retained loop.
    - Existing phone and speaker surfaces are sufficient to prove the wedge before custom hardware.
    - Users will pay premium software pricing for adaptive accountability if the product reduces missed commitments within the first two weeks.
    - Personalized suppression and escalation logic will matter more for retention than broader assistant capability.
gtm:
  wedge: Sell immediate relief for missed starts and handoffs to self-pay ADHD adults, then upsell retained users into accountability sharing and optional hardware.
  channels:
    - ADHD creators, podcasts, and neurodivergent communities
    - Search and content around adult ADHD at work, executive dysfunction, and routine support
    - Coach, therapist, and advocacy-network referrals that stay outside treatment claims
    - Founder-led waitlist conversion and concierge onboarding for the first cohorts
  funnelTargets: "Lead→qualified trial 20-30%, qualified trial→4-week retained 35%+, retained→paid 10-15%, paid month-6 retention 65%+, retained software user→hardware attach 25%+"
  pricing: Start with a $12-20 per month or $120-180 annual subscription for memory, integrations, and accountability features, then offer a $149-199 companion device only after software cohorts prove retention. This keeps the first purchase inside researched software price bands while preserving the original hardware-plus-subscription upside.
businessModel:
  revenueStreams:
    - Consumer subscription revenue
    - Annual prepay plans
    - Optional hardware margin from companion devices
    - Future coach-enabled team or bundle revenue after direct consumer pull is proven
  unitOfValue: Paying user with an active routine graph and at least one connected workflow
  targetGrossMarginPct: 70
  expansionLevers:
    - Convert monthly subscribers to annual plans after routine retention is demonstrated
    - Increase ARPU through accountability sharing and premium personalization
    - Add hardware only to cohorts where it improves retention or conversion
    - Expand from workday routines into adjacent executive-function loops after the beachhead is retained
strategyMap:
  northStarMetric: Weekly active paying users completing at least 5 prompted routine actions in their target loops
  inputMetrics:
    - Connected-calendar and task-system activation rate
    - Week-4 retained users in the morning startup loop
    - Prompt acceptance versus dismiss or snooze rate
    - Self-reported missed commitments per user per month
    - Trial-to-paid conversion rate
    - Software cohort versus hardware cohort retention delta
  moatsToBuild:
    - Longitudinal routine memory graph tied to real prompt-response outcomes
    - Prompt policy engine that learns when to stay quiet, when to escalate, and what wording works by user
    - Trusted data controls for memory export, deletion, and constrained collection
    - Workflow integrations that connect planning data to real execution moments
  killCriteria:
    - Week-4 retention stays below 30% for qualified users after three onboarding iterations
    - Trial-to-paid conversion remains below 8% at $120-180 annualized pricing after 300 activated users
    - Hardware pilot fails to improve retention or paid conversion by at least 15 percentage points versus software-only cohorts
    - Fewer than 50% of qualified users complete setup through connected calendar plus first prompt within the onboarding flow
  mermaid: |
    flowchart LR
      Wedge[Morning start and transition wedge] --> MVP[Software plus speaker MVP]
      MVP --> Proof[Proof of retained routines and reduced misses]
      Proof --> Expansion[Accountability sharing and selective hardware]
investorMemo:
  verdict:
    call: Watch
    conviction: Strong pain and a crisp wedge, but conviction is limited until the company proves retention and willingness to pay before custom hardware.
    whyBelieve: Adults with ADHD already pay for accountability and premium productivity, and the product targets a specific ambient workflow gap that broad assistants and planners still do not own.
    whyDoubt: Dedicated-device friction, privacy concerns, and many partial substitutes mean the startup could still become a niche habit gadget rather than a durable venture-scale business.
    nextDiligence: Prove a 100-200 user beta can retain morning and transition usage for four weeks and convert software cohorts to paid plans before expanding hardware spend.
  firstCustomer:
    title: Self-pay remote-work ADHD professional
    profile: A U.S. knowledge worker ages 25-45 with a diagnosed ADHD history, at least two task systems, recurring late starts or missed handoffs, and prior spend on productivity or accountability tools.
    trigger: A new diagnosis, job change, return-to-office shift, medication disruption, or a visible run of missed deadlines that makes current reminder apps feel insufficient.
    buyer: Self-pay consumer
    initialContract: Founding-member beta that converts into a $120-180 annual subscription after 2-4 weeks of retained use, with a later $149-199 hardware upsell only for cohorts that show strong engagement.
  mustBeTrue:
    - At least 50% of qualified users complete onboarding through connected calendar plus first prompted action.
    - Morning startup or between-meeting transitions must show at least 35% week-4 retention in the beachhead cohort.
    - Paid conversion must reach 8% or more at researched premium-software price points without relying on a free hardware giveaway.
    - Personalized prompts must reduce missed starts or handoffs by at least 25% versus user baseline in pilot cohorts.
    - Existing speakers or phone surfaces must prove enough value that custom hardware is an optimization, not a prerequisite for product-market fit.
  diligenceQuestions:
    - Which loop retains best by cohort: morning startup, work transitions, or shutdown?
    - What privacy controls are necessary for buyers to allow persistent routine memory?
    - How much better is the product than Alexa, Google Home, Focusmate, or Motion for the first customer in the first two weeks?
    - Does a coach or partner referral increase activation and paid conversion enough to justify a partner channel?
    - When tested head-to-head, does dedicated hardware lift retention enough to justify inventory and support complexity?
operatingAssumptions:
  - assumption: The first retained product can be delivered on existing phone and speaker surfaces before a custom device is necessary.
    basis: research.yaml
    validationTest: Run an A/B pilot of software plus speaker versus dedicated-hardware mockup and require software cohorts to achieve at least 35% week-4 retention before funding hardware tooling.
    decisionImpact: If false, the company must either raise more capital for hardware earlier or abandon the ambient-device thesis.
  - assumption: Morning startup and between-meeting transitions are painful enough to support a focused two-loop MVP.
    basis: idea.yaml
    validationTest: Instrument beta usage and interviews across morning, transition, and shutdown flows; keep only loops where at least 40% of engaged users repeat the behavior weekly.
    decisionImpact: If false, the company should narrow to a single loop or reposition toward coach-enabled accountability instead of a broader routine assistant.
  - assumption: Premium software pricing is acceptable before a hardware purchase is introduced.
    basis: research.yaml
    validationTest: Test monthly and annual price points across the $12-20 per month range and require at least 8% trial-to-paid conversion with stable 60-day retention.
    decisionImpact: If false, the business may need lower pricing, sponsor channels, or non-venture expectations on consumer CAC payback.
  - assumption: Persistent memory can improve outcomes without crossing into treatment claims or creating intolerable privacy backlash.
    basis: research.yaml
    validationTest: Measure opt-in, deletion, and trust sentiment in the first 100 users and review all messaging against FTC health-claim guidance before launch campaigns.
    decisionImpact: If false, the product must reduce memory scope, simplify data collection, and stay firmly inside planning and accountability language.
  - assumption: Coach and creator channels can supply lower-CAC early users than broad consumer paid acquisition.
    basis: operator judgment
    validationTest: Track source-level CAC, activation, and week-4 retention across the first 500 leads and require partner-led cohorts to outperform paid-social cohorts on both CAC and retention.
    decisionImpact: If false, the company should slow growth spend, rely more on organic search and referrals, or reconsider the consumer distribution model.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Run 20 discovery and diary-study users through a concierge prototype focused on morning startup and between-meeting transitions.
    hypothesis: A one-next-step intervention at the derailment moment is more valuable than broader planning features for the beachhead buyer.
    successMetric: At least 12 of 20 users reuse the workflow 4 or more times per week and identify one loop as materially better than existing reminders.
    owner: Founder
  - horizon: 0–90 days
    experiment: Test onboarding with calendar plus task integrations against a lighter manual-entry flow.
    hypothesis: Connected workflows increase perceived value enough to justify the added setup friction.
    successMetric: Connected onboarding completion stays above 50% and produces at least 20 points higher perceived usefulness than manual setup.
    owner: Product
  - horizon: 0–90 days
    experiment: Compare prompt styles, voices, and escalation rules in a prototype cohort.
    hypothesis: Personalized suppression and escalation materially reduce shame response and churn risk.
    successMetric: Prompt acceptance exceeds 45% while opt-out and mute rates stay below 20% in the best-performing variant.
    owner: Founding eng
  - horizon: 90–180 days
    experiment: Launch a 100-200 user paid beta on phone plus speaker surfaces at researched software price points.
    hypothesis: The beachhead will pay premium-software pricing if the product reduces missed starts and handoffs within two weeks.
    successMetric: 35%+ week-4 retention, 8%+ trial-to-paid conversion, and 25%+ reduction in self-reported missed commitments versus baseline.
    owner: Founder
  - horizon: 90–180 days
    experiment: Run a coach-referral cohort and compare it against creator-acquired users.
    hypothesis: Coach-introduced users activate faster and retain better because the value proposition is already framed as accountability support.
    successMetric: Coach-sourced users outperform creator cohorts by at least 10 points on onboarding completion or week-4 retention.
    owner: Growth lead
  - horizon: 6–12 months
    experiment: Pilot a low-cost companion hardware device with the highest-retaining software cohort.
    hypothesis: Dedicated bedside-and-desk hardware increases daily engagement and retention enough to justify inventory, support, and manufacturing complexity.
    successMetric: Hardware cohort improves paid retention or daily active routine completion by at least 15 points over software-only controls.
    owner: Hardware lead
operations:
  - Maintain explicit user controls for memory creation, deletion, export, and shared-accountability permissions from the first beta.
  - Run weekly prompt-review sessions on acceptance, dismissal, snooze, and churn signals to tune intervention logic.
  - Standardize onboarding around calendar, reminder, and task integrations rather than bespoke setup by user.
  - Use coach and creator partners for acquisition and onboarding support, but keep the product positioned as consumer accountability rather than treatment.
  - Delay inventory commitments until software retention data defines whether a hardware SKU is justified.
team:
  - role: Founding eng
    startTiming: Month 0
    rationale: Build the routine graph, prompt engine, and first integrations that determine whether the wedge retains.
  - role: Founder/CEO
    startTiming: Month 0
    rationale: Own discovery, pricing, creator and coach partnerships, and early cohort conversion until the consumer narrative is repeatable.
  - role: Product and behavior design lead
    startTiming: Month 2
    rationale: Convert ADHD workflow insights into prompt policies, onboarding, and outcome measurement without drifting into generic assistant sprawl.
  - role: Growth lead
    startTiming: Month 6
    rationale: Scale creator, search, and referral loops only after retention and pricing data identify the best-acquiring cohort.
  - role: Hardware lead
    startTiming: Month 9
    rationale: Scope the companion device only after software data shows that a dedicated surface could materially improve retention.
milestones:
  - horizon: 0–12 months
    items:
      - Validate one retained beachhead loop with 100-200 users and convert the best cohort into paid annual or monthly subscribers.
      - Prove onboarding, pricing, and trust thresholds for connected memory features without making treatment claims.
      - Decide whether dedicated hardware advances based on measured retention and conversion lift rather than founder intuition.
  - horizon: 12–24 months
    items:
      - Launch the retained consumer subscription broadly in the U.S. ADHD knowledge-work segment with repeatable creator and referral channels.
      - Introduce accountability sharing and, if justified by data, a companion device for high-retention cohorts.
      - Build a reference dataset of prompt efficacy and routine patterns that improves intervention quality over time.
  - horizon: 24–36 months
    items:
      - Expand from workday routines into adjacent executive-function loops such as medication support, commute buffers, and family handoff reminders without diluting the core wedge.
      - Reach the researched year-3 SOM trajectory only if retention, paid conversion, and hardware economics stay inside threshold.
      - Test selective expansion into coach bundles or employer-sponsored distribution after direct consumer product-market fit is established.
risks:
  - risk: Buyers may not tolerate another physical device even if they like the software experience.
    likelihood: High
    impact: High
    mitigation: Prove the workflow first on existing surfaces and require clear retention or conversion lift before funding hardware inventory.
  - risk: Prompts may feel nagging or shaming, causing churn in the exact cohort with the most variable routines.
    likelihood: High
    impact: High
    mitigation: Limit the product to one-next-step prompts, personalize suppression quickly, and monitor opt-out behavior as a primary product signal.
  - risk: The company could drift into medical or symptom-improvement claims that trigger a higher compliance burden.
    likelihood: Medium
    impact: High
    mitigation: Keep positioning in planning and accountability support, review launch messaging carefully, and avoid treatment language until evidence and compliance posture are stronger.
  - risk: Broad assistants and productivity apps may improve enough to narrow the wedge before the startup builds a trusted brand.
    likelihood: Medium
    impact: Medium
    mitigation: Focus on ADHD-specific routine memory and measured outcomes in one loop rather than competing on general assistant breadth.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: 18 months funds the retained software MVP, the first 100-200 user paid beta, creator and coach channel tests, privacy and trust controls, and a limited companion-hardware pilot only if software data justifies it.
