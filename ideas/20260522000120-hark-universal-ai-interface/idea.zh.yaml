problem: 很多 ADHD 成年人已经在用日历、待办应用、计时器和用药提醒，但一到早晨启动、任务切换和交接节点，还是会断线，因为这些工具都得先打开、先主动触发。通用聊天机器人记不住日常节律，也记不住过去失败的模式；智能音箱也不是按长期跟踪个人语境来设计的。结果就是反复迟到、承诺掉链子，以及那种“明明知道该做什么，却偏偏在当下做不出来”的羞耻感。
targetUser:
  primary: 25–45 岁、已确诊 ADHD、从事远程或混合办公知识工作的成年人
  secondary: 帮助用户强化日常节律和问责的伴侣或 ADHD 教练
  buyer: 自己掏钱购买 ADHD 支持类效率与健康工具的消费者
startupThesis:
  nonObviousInsight: 第一批真正跑出来的 AI 硬件，不会靠“谁都能用”的通用性取胜；它们会赢在吃下一条长期、高频、而且今天的手机和智能音箱根本记不牢也管不好的认知闭环。
  beachhead: 美国 25–45 岁、已确诊 ADHD、从事远程或混合知识工作的成年人；至少同时在用两套任务系统，并且即使用数字日历，仍反复出现晚启动或交接掉链子的情况。
  wedge: 一个常驻床头和桌面的 AI 伙伴，能记住日常节律、截止时间和回避模式；在早晨启动、工作切换和收工阶段，主动给出语音或一眼就能看懂的下一步提示。
  whyNowCatalyst: Hark 的融资，以及它明确指出现有消费设备缺少持久记忆和智能交互硬件，让“环境式 ADHD 日常设备”这件事第一次像个可信品类，而不只是又一个效率应用。
  ventureScalePath: 先从 ADHD 日常支持切入，再把同一套记忆图谱和环境硬件层扩到更广的执行功能产品：学生、焦虑和倦怠人群、家庭排程，以及企业或健康险分发。
solution: Ambient ADHD Routine Coach 是一个小型语音 + 灯光设备，配套移动应用和日历集成。它会持续记住用户的工作节律、用药窗口、通勤缓冲、未完成任务和常见掉链子触发点，然后不等用户来问，直接主动给出一个下一步动作。产品刻意做窄：它只盯早晨启动、任务切换和收工仪式，因为这是 ADHD 用户最容易卡住的时刻。随着使用加深，它会学会什么样的提示真能推动行动、在用户开始飘时怎么温和升级提醒，也允许伴侣或教练加入问责闭环，而不把产品做成治疗工具。
goToMarketSeed:
  firstCustomer: 首批客户是 25–40 岁、在美国从事远程或混合知识工作的 ADHD 成年人；他们已经在为 Todoist、Notion、Focusmate 或教练服务付费，但每周仍至少错过两次承诺。
  buyingTrigger: 新的确诊、回办公室过渡、工作变动，或一连串错过截止时间和晚启动，会让他们觉得现有提醒应用已经不够用。
  currentAlternative: 手机日历和提醒应用、任务管理器、ADHD 教练、body-doubling 工具，以及智能音箱
  switchingReason: 这个切口能跨天记住用户模式，而且就待在人最容易掉链子的物理场景里，所以它能主动介入；这一点，靠 prompt 才能启动的应用和通用语音助手都做不到。
  pricingHypothesis: $199 的设备售价，外加每月 $20 的记忆、集成和共享问责功能订阅费
