topRisks:
- name: 硬件采纳阻力
  description: 如果产品不能在几天内给出非常直观的价值，消费者可能不愿再买一台设备。
  mitigation: 先承诺一个很窄的日常结果，用订阅补贴早期硬件成本，并在 onboarding 第一周证明立竿见影的收益。
- name: 行为改变流失
  description: 如果提示变得唠叨，或者跟不上真实日常，ADHD 用户可能很快放弃产品。
  mitigation: 尽快把提示时机个性化，先把一两个关键闭环跑通，再用结果指标持续调优干预。
- name: 医疗预期外溢
  description: 客户或监管方可能把产品理解成治疗工具，而不是面向日常的消费支持产品。
  mitigation: 把产品定位在消费级效率和问责支持上，避免诊断性表述；只有在核心消费需求被证明之后，再考虑临床合作。
