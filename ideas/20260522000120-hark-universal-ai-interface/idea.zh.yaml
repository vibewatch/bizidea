differentiator: 大多数 AI 效率产品都只是叠在软件上的一层，前提还是用户先记得打开它。这个概念的不同之处在于，它把专用物理界面和一个很窄的行为改变闭环绑在一起，所以能在执行功能真正掉线的那一刻介入。围绕日常节律、掉链子触发点和有效提示建立起来的记忆图谱，会变成留存和数据护城河——这不是通用助手和通用硬件能轻松补上的。
