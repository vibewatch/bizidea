jobsToBeDone:
- job: 当我的工作日开始、我还在标签页之间飘的时候，帮我立刻启动正确的下一项任务，别让我把第一小时白白丢掉。
  currentAlternative: 手机提醒、便利贴和自我说服
  successMetric: 更多早晨能在 10 分钟内按计划启动任务
- job: 当我在会议、跑腿和用药窗口之间切换时，帮我记住那件最容易滑掉的承诺，好让我别再漏掉关键交接。
  currentAlternative: 日历提醒加上过载的待办清单
  successMetric: 每月错过的截止时间、预约或用药事件更少
