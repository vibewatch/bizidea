jobsToBeDone:
  - job: >-
      当新用户加入酷儿地理社交应用时，帮助信任团队在不暴露法定身份的前提下确认其为真人，从而在不伤害注册转化的情况下减少滥用。
    currentAlternative: 人工审核，加上通用自拍或证件校验
    successMetric: 假账号率下降，已验证注册转换率上升
ideaScorecard:
  signalStrength:
    score: 4
    rationale: 战略投资、收购选择权和现网产品证据都指向真实的市场变化。
  painIntensity:
    score: 4
    rationale: 实时见面产品里的信任失灵会直接伤害留存、审核成本和平台价值。
  wedgeClarity:
    score: 5
    rationale: 化名验证加封禁规避防控是一个边界清晰、买方明确的狭窄首个工作流。
  defensibility:
    score: 4
    rationale: 跨平台滥用图谱数据和围绕隐私打造的产品设计，能逐步积累成持久护城河。
  ventureScale:
    score: 4
    rationale: 滩头市场很窄，但这层信任基础设施可以扩展到成人、夜生活、旅行和主流约会平台。
topRisks:
  - name: 隐私反弹
    description: 用户可能担心任何验证层都是变相去匿名化。
    mitigation: 采用隐私内建架构，使用化名令牌、最小化数据留存和清晰的用户控制项。
  - name: 初始市场过窄
    description: 如果真正购买的酷儿应用太少，第一批客户群可能不够大。
    mitigation: 先从酷儿地理社交应用切入，但从第一天起就把 API 设计成可服务相邻的成人、活动和主流约会平台。
  - name: 信任数据冷启动
    description: 在图谱覆盖不足之前，早期客户可能感受不到强力的重复违规者识别效果。
    mitigation: 把共享网络情报与独立可用的设备、行为和审核工作流价值打包，让第一次部署单独也能跑通。
