problem: >-
  高意图的酷儿地理社交应用既需要足够匿名才能好用，但同样的匿名性又会让冒名顶替、重复违规者和信任失灵变得昂贵且难以管理。
  当发现流程是实时且基于位置时，一个坏演员就能比人工信任与安全团队更快地伤害用户留存、应用商店关系和收购价值。
targetUser:
  primary: 独立酷儿地理社交或约会应用的信任与安全负责人或 GM
  secondary: 服务酷儿男性的性积极活动主办方运营负责人
  buyer: 月活 50k+ 的酷儿社交平台上的 VP Product、GM 或信任与安全负责人
startupThesis:
  nonObviousInsight: >-
    下一代酷儿约会真正的护城河不会是更好的匹配，而是化名信任基础设施——它能让行为特征鲜明的社区在不强推实名、也不牺牲产品亲密感的情况下安全扩张。
  beachhead: >-
    面向美国主要都会区、用户会在几小时内从线上发现转到线下会面的酷儿男性地图式社交应用，提供化名验证与重复违规者防控。
  wedge: >-
    一个可嵌入的信任层，发放持久的私密身份令牌，跨设备识别封禁规避，并让用户在不暴露法定身份的前提下自愿分享同意与安全卡片。
  whyNowCatalyst: >-
    Match Group 围绕 Sniffies 的投资与收购选择权说明，细分酷儿平台的价值已经高到足以让运营方在整合发生前采购专用信任基础设施。
  ventureScalePath: >-
    先从酷儿地理社交应用切入，再把同一套隐私友好的信任图谱扩展到成人社区、夜生活平台、旅行聚会，最终进入既需要安全又不愿完全披露身份的主流约会产品。
solution: >-
  构建一个位于注册、私信和见面之间的开发者平台与用户护照。应用通过 SDK 接入化名身份校验、设备级重复违规者识别，以及在 burner 账号重置后依然可延续的可携带信任徽章，同时对其他用户隐藏法定身份。
  对用户来说，产品表现为一个私密信任钱包，可选边界偏好、场所签到确认和紧急升级工具；对平台来说，它用一套针对实时地理社交行为调优的共享风险引擎，替代碎片化的审核工具。
goToMarketSeed:
  firstCustomer: >-
    纽约、洛杉矶或芝加哥的一款独立酷儿男性地理社交应用，月活 50k-500k，审核团队精简且线下见面使用率高。
  buyingTrigger: >-
    假账号激增、封禁规避投诉上升，或来自投资人、收购方、应用商店政策审核的尽调请求突然增加。
  currentAlternative: 人工审核，加上通用身份验证供应商和零散的内部反滥用工具
  switchingReason: >-
    这个切口能在保留匿名性的同时减少重复滥用和审核负担，而通用 KYC 工具和内部点状方案做不到这一点，或者会明显伤害转化。
  pricingHypothesis: 平台 SaaS 订阅费，加上按月度已验证活跃用户计费的使用费
