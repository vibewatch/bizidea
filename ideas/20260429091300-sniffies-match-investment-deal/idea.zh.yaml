    - 隐私保护身份令牌系统
    - SDK 集成能力
  keyActivities:
    - 信任图谱训练
    - 客户集成
    - 滥用运营研究
  keyPartners:
    - 隐私保护身份供应商
    - 活动平台和场馆运营方
    - 专业审核公司
  costStructure:
    - 工程研发
    - 信任与安全运营
    - 合规与隐私法律顾问
jobsToBeDone:
  - job: >-
      当新用户加入酷儿地理社交应用时，帮助信任团队在不暴露法定身份的前提下验证其为真人，从而在不伤害注册转化的情况下减少滥用。
    currentAlternative: 人工审核加通用自拍或证件校验
    successMetric: 假资料率更低、验证后注册转化更高
ideaScorecard:
  signalStrength:
    score: 4
    rationale: 战略投资、收购选择权和产品存在性证据共同指向真实的市场变化。
  painIntensity:
    score: 4
    rationale: 实时线下会面产品中的信任失效会直接损害留存、审核成本和平台价值。
  wedgeClarity:
    score: 5
    rationale: 假名化验证加封禁规避防护是一个边界清晰、买方明确的首个工作流。
  defensibility:
    score: 4
    rationale: 跨平台滥用图谱数据与隐私特化产品设计可以累积成持久护城河。
  ventureScale:
    score: 4
    rationale: 虽然滩头市场狭窄，但该信任层可扩展至成人、夜生活、旅行和主流约会平台。
topRisks:
  - name: 隐私反弹
    description: 用户可能会担心任何验证层都是一种隐蔽的去匿名化手段。
    mitigation: 采用隐私内建架构，使用假名令牌、最小化数据保留和清晰的用户控制。
  - name: 初始市场过窄
    description: 如果只有少数酷儿应用愿意购买，首个客户细分可能太小。
    mitigation: 从酷儿地理社交应用起步，但从第一天起就为相邻的成人、活动和主流约会平台设计 API。
  - name: 信任数据冷启动
    description: 在图谱覆盖度不足之前，早期客户可能无法看到足够强的屡犯者检测效果。
    mitigation: 将共享网络智能与独立可用的设备、行为和审核工作流价值结合起来，让首个部署单独也能成立。
