differentiator: >-
  既有验证工具主要为银行和交易平台而建，在那些场景里完整披露法定身份是可接受的。这家公司赢在解决更难的问题：在隐私本身就是核心使用条件的社区里，如何在化名状态下维持持久信任。跨应用信任图谱和重复违规者网络会随着每个客户接入而变强，形成单个应用内部工具无法匹敌的数据复利防御。
