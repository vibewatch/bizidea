problem: >-
  高意图的酷儿地理社交应用需要足够的匿名性才具有可用性，但同样的匿名性也让冒充、屡次违规者和信任失效变得昂贵且难以审核。
  当发现过程是实时且基于位置时，一个坏演员就能在人工信任与安全团队来得及响应之前，更快地破坏用户留存、应用商店关系和并购价值。
targetUser:
  primary: 独立酷儿地理社交或约会应用的信任与安全负责人或总经理
  secondary: 服务酷儿男性的性积极活动组织者的运营负责人
  buyer: 月活用户 50k+ 的酷儿社交平台的产品副总裁、总经理或信任与安全负责人
startupThesis:
  nonObviousInsight: >-
    下一波酷儿约会的真正护城河不会是更好的匹配，而是能让特定行为社群在不强制法定实名的情况下安全扩张、同时不损害产品亲密感的假名化信任基础设施。
  beachhead: >-
    面向美国主要都市的酷儿男性地图式社交应用，提供假名化验证和屡犯者防护；这些用户通常会在数小时内从线上发现转为线下见面。
  wedge: >-
    一个可嵌入的信任层，发放持久化私密身份令牌、跨设备识别封禁规避，并允许用户在不暴露法定身份的前提下共享可选的同意与安全卡。
  whyNowCatalyst: >-
    Match Group 围绕 Sniffies 的投资与收购选择权表明，细分酷儿平台已经足够有价值，运营方现在有理由在整合发生前先购买专门的信任基础设施。
  ventureScalePath: >-
    先从酷儿地理社交应用切入，再把同样的隐私保护信任图谱扩展到成人社群、夜生活平台、旅行聚会，最终进入既需要安全又不希望完全披露身份的主流约会产品。
solution: >-
  构建一个位于注册、消息和见面之间的开发者平台与用户护照。应用通过 SDK 接入假名身份验证、设备级屡犯者检测，以及在一次性小号重置后依旧有效的可移植信任徽章，同时对其他用户隐藏法定身份。
  对用户而言，产品看起来像一个私密的信任钱包，包含可选的边界偏好、场馆签到确认和紧急升级工具。对平台而言，它以一套针对实时地理社交行为调优的共享风险引擎，替代碎片化的审核工具。
goToMarketSeed:
  firstCustomer: >-
    一家位于纽约、洛杉矶或芝加哥、月活 50k-500k 的独立酷儿男性地理社交应用，拥有精简审核团队且线下会面使用强烈。
  buyingTrigger: >-
    假资料、封禁规避投诉激增，或来自投资人、收购方、应用商店政策审核者的尽调要求上升。
  currentAlternative: 人工审核加通用身份验证供应商，再辅以零散的一次性内部滥用工具
  switchingReason: >-
    这一切入点能在保留匿名性的同时降低重复滥用和审核负担，而通用 KYC 工具和内部点状方案做不到这一点，往往还会伤害转化。
  pricingHypothesis: 平台 SaaS 费用加按月验证活跃用户计费的用量定价
whyNow:
