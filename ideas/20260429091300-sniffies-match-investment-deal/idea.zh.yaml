  - point: 市场正被视为独立的 LGBTQ+ 品类，这为专门化基础设施提供了空间，而不是继续依赖通用约会工具。
    signalRefs:
      - LGBTQ+ 约会已成为独立的战略细分市场
    sourceRefs:
      - 2
differentiator: >-
  现有验证工具主要为银行和交易市场而生，在那些场景里，完整的法定身份披露是可以接受的。这家公司赢在解决更难的问题：在以隐私为核心使用前提的社群里，在假名状态下建立持久信任。跨应用信任图谱和屡犯者网络会随着每个客户的加入而变强，形成单一应用的内部工具无法匹敌的复利式数据防御力。
conceptDiagram:
  title: 假名化信任闭环
  mermaid: |
    flowchart LR
      Buyer[信任与安全负责人] --> Pain[匿名滥用与封禁规避]
      Pain --> Product[假名化信任层]
      Product --> Outcome[更安全的线下会面与更低的审核负担]
businessModelCanvas:
