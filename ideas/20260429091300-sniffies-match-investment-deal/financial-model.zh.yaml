scenarios:
  downside:
    description: 第 2 年有 1 个 logo 延后，相邻品类扩张推迟，且供应商成本维持高位。
    y3RevenueK: 1480.0
    y3EbitdaK: -690.0
    cashLowPointK: -210.0
    keyAssumptionChanges:
    - 第 2 年期末 logo 从 5 降到 4，第 3 年期末从 10 降到 8。
    - 第 3 年混合 ARPU 停留在约 $205K，而不是 $228K。
    - 毛利率降到 68%，因为第三方验证和设备成本维持高位。
  base:
    description: 两个付费试点顺利转正，实施在第 3-5 个 logo 时完成标准化，混合 logo ARPU 随 usage 和模块扩张而上升。
    y3RevenueK: 1890.5
    y3EbitdaK: -386.65
    cashLowPointK: 176.425
    keyAssumptionChanges:
    - 匹配主模型：第 1 年期末 2 个付费 logo，第 2 年期末 5 个，第 3 年期末 10 个。
    - 混合 logo ARPU 从第 1 年的 $180K 提升到第 3 年的 $228K。
    - 毛利率保持在商业计划设定的 70% 目标。
  upside:
    description: 试点转正率高于计划，且第 3 年多拿下 1 个相邻品类 logo。
    y3RevenueK: 2265.0
    y3EbitdaK: 35.0
    cashLowPointK: 250.0
    keyAssumptionChanges:
    - 第 3 年期末 logo 达到 11 个，而不是 10 个。
    - 第 3 年混合 ARPU 提升到约 $240K，因为分析和 trust-card 模块更早落地。
    - 随着供应商组合和部署流程标准化，毛利率提高到 72%。
