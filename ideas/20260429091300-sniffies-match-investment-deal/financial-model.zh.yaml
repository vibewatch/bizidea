scenarios:
  downside:
    description: 一个 Y2 正式生产客户延后、相邻品类扩张推迟，且供应商成本维持高位。
    y3RevenueK: 1480.0
    y3EbitdaK: -690.0
    cashLowPointK: -210.0
    keyAssumptionChanges:
    - Y2 结束时正式生产客户从 5 个降至 4 个，Y3 结束时从 10 个降至 8 个。
    - Y3 混合 ARPU 维持在约 $205K，而不是 $228K。
    - 由于第三方验证和设备成本仍高，毛利率降至 68%。
  base:
    description: 两个付费试点成功转正，实施在第 3-5 个正式生产客户时标准化，且混合客户 ARPU 随用量和模块扩张而上升。
    y3RevenueK: 1890.5
    y3EbitdaK: -386.65
    cashLowPointK: 176.425
    keyAssumptionChanges:
    - '与主模型一致：Y1 结束时 2 个付费客户，Y2 结束时 5 个，Y3 结束时 10 个。'
    - 混合客户 ARPU 从 Y1 的 $180K 提升到 Y3 的 $228K。
    - 毛利率维持在商业计划中的 70% 目标。
  upside:
    description: 试点转正率高于计划，并在 Y3 多拿下 1 个相邻品类客户。
    y3RevenueK: 2265.0
    y3EbitdaK: 35.0
    cashLowPointK: 250.0
    keyAssumptionChanges:
    - Y3 结束时正式生产客户达到 11 个，而不是 10 个。
    - 随着分析和信任卡模块更早落地，Y3 混合 ARPU 提升到约 $240K。
    - 一旦供应商组合和部署标准化，毛利率提升到 72%。
