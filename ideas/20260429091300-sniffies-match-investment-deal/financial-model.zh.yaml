modelDiagram:
  title: 单位经济模型流转
  mermaid: |-
    flowchart LR
      Outbound --> PaidPilots
      PaidPilots --> ProductionLogos
      ProductionLogos --> PlatformFees
      ProductionLogos --> UsageFees
      PlatformFees --> Revenue
      UsageFees --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
- checkName: 收入引擎
  finding: 基准情境下，第 3 年收入来自 10 个生产 logo、每个约 $228K 的混合年化 ARPU，而不是依赖大众市场用户增长假设。
- checkName: 必须做对的事
  finding: 前两个付费试点必须顺利转正，并把实施摩擦降到足以在第 2 年末达到 5 个生产 logo。
- checkName: 模型失效条件
  finding: 若试点转生产周期更长，或毛利率跌破 65%，在证明下一里程碑前现金低点就会跌破零。
- checkName: 下一轮融资证明点
  finding: 当公司证明已拥有 5 个生产 logo、1 个相邻品类客户，以及可复用的 8-10 周上线周期时，才足以支撑下一轮融资。
sanityChecks:
  ruleOf40: Y3 growth 146.4% + EBITDA margin -20.5% = 125.9%
  burnMultiple: 第 2 年 burn multiple 约为 1.6x，随着扩张收入在第 3 年到来，改善到约 0.3x。
  revenuePerFte: 第 3 年每个期末 FTE 对应 $204K 收入（SaaS 参考区间 $200-400K）
  flags:
  - 基准情境在第 3 年已经触及研究中的 SOM 上限，因此更高上行仍然依赖滩头市场之外的相邻品类采纳。
  - 第 3 年期末收入仍集中在 10 个 logo 上；只要有 1 次续约延迟，就会明显影响现金。
  - 模型从第一天起就假设 70% 毛利率，但第一批试点在集成尚未标准化前，实际毛利可能低于目标。
