slug: pseudonymous-dating-trust-layer
date: '2026-04-29'
currency: USD
modelStartMonth: 2026-05
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-05
  unit: 月
  source: '[BP date 2026-04-29]; 模型假设融资在计划日期后立即完成交割'
- id: A2
  name: 融资完成后的期初现金
  value: $2.3M
  unit: 美元
  source: '[BP fundingAsk targetFundingRangeUsd $2-3M]; 基础情景采用 $2.3M，以匹配里程碑需求并留出 6 个月缓冲'
- id: A3
  name: 试点定价中位数
  value: $45K 每个试点
  unit: 美元/试点
  source: '[BP gtm.pricing $25K-$75K pilot]; 采用中位数作为早期 logo 收入的混合值'
- id: A4
  name: Y1 每个付费客户的混合收入
  value: $15.0K 每月 / $180K 年化
  unit: 美元/客户-月
  source: '[BP investorMemo.firstCustomer.initialContract $100K-$300K 年度订阅加用量] 与 A3 试点定价混合得出'
- id: A5
  name: Y2 每个付费客户的混合收入
  value: $15.5K 每月 / $186K 年化
  unit: 美元/客户-月
  source: '[BP 商业模式 unitOfValue] 与 [BP 里程碑：12-24 个月]；假设试点转正式后用量有小幅提升'
- id: A6
  name: Y3 每个付费客户的混合收入
  value: $19.0K 每月 / $228K 年化
  unit: 美元/客户-月
  source: '[BP GTM 定价：$100K-$300K 年度订阅加用量定价]；假设正式生产客户内部出现模块与用量扩张'
- id: A7
  name: 客户爬坡
  value: 0 -> Y1 结束时 2 个付费客户 -> Y2 结束时 5 个 -> Y3 结束时 10 个
  unit: 客户数
  source: '[BP 里程碑] 与 [RS market.som $1.9M 第 3 年 SOM]'
- id: A8
  name: 毛利率目标
  value: 70%
  unit: 百分比
  source: '[BP businessModel.targetGrossMarginPct 70]; 模型将 COGS 设为收入的 30%'
- id: A9
  name: 创始人总现金薪资
  value: $144K 每年
  unit: 美元/FTE-年
  source: 创业公司财务经验值：种子前轮阶段创始人薪资低于市场价，以延长现金跑道
- id: A10
  name: 工程岗位总薪资
  value: $156K 每年
  unit: 美元/FTE-年
  source: 创业公司财务经验值：美国 seed 阶段后端/集成工程师现金薪酬
- id: A11
  name: 信任产品负责人总薪资
  value: $132K 每年
  unit: 美元/FTE-年
  source: 创业公司财务经验值：seed 阶段产品负责人现金薪酬
- id: A12
  name: 解决方案工程师总薪资
  value: $144K 每年
  unit: 美元/FTE-年
  source: '[BP 团队：解决方案工程师，第 4-6 个月] 加创业公司财务经验值，用于客户侧技术岗位'
- id: A13
  name: 销售 / AE 总薪资
  value: $144K 每年
  unit: 美元/FTE-年
  source: 创业公司财务经验值：早期 GTM 岗位采用中等底薪加浮动现金结构
- id: A14
  name: 隐私与运营人员成本
  value: Y1-Y2 为每年 $36K 顾问费用，Y3 起为每年 $108K 运营负责人
  unit: 美元/年
  source: '[BP 团队：隐私 / 合规顾问] 加创业公司财务经验值，用于兼职顾问和后续运营岗位'
- id: A15
  name: 非薪酬研发支出
  value: Y1 为 $8K/月，Y2 为 $9K/月，Y3 为 $10K/月
  unit: 美元/月
  source: 种子前轮规模下云、工具和有限外包支持的创业公司财务经验值
- id: A16
  name: 非薪酬销售与市场支出
  value: $4K-$14K 每月爬坡
  unit: 美元/月
  source: '[BP GTM：创始人主导外呼 + 暖介绍]；用于差旅、工具和试点支持的创业公司财务经验值'
- id: A17
  name: 非薪酬 G&A 支出
  value: 前 2 个月 $10K/月，第 3-6 个月 $18K/月，之后 $11K-$13K/月
  unit: 美元/月
  source: '[BP 里程碑：隐私审查 / 治理包] 加创业公司财务经验值，用于法务、保险和行政'
- id: A18
  name: 客户获取成本
  value: $80K 每个正式生产客户
  unit: 美元/客户
  source: 创业公司财务经验值：面向狭窄买方群体、由创始人主导且以试点为核心的企业 SaaS 销售
- id: A19
  name: 月度客户流失率
  value: 2.5%
  unit: 百分比
  source: 创业公司财务经验值：在续约历史尚未验证前，早期企业客户高度集中
- id: A20
  name: 下一轮融资里程碑
  value: 5 个正式生产客户、1 个相邻品类客户、可重复的 8-10 周部署，以及通过隐私审查的治理包
  unit: 里程碑
  source: '[BP 里程碑：12-24 个月] 与 [BP fundingAsk.useOfFundsSummary]'
- id: A21
  name: 招聘爬坡
  value: 创始人 / 首席执行官 + 创始工程师起步；M2 加入产品负责人；M3 加入隐私顾问；M6 加入解决方案工程师；M9 加入第二名工程师；M10 加入首个 GTM；M15 加入首个 AE；M20 加入第三名工程师；M31 加入运营负责人
  unit: 招聘计划
  source: '[BP team] 加精益创业财务经验值，以在收入拐点前尽量推迟非关键岗位招聘'
