modelDiagram:
  title: 单位经济流转
  mermaid: |-
    flowchart LR
      外联 --> 付费试点
      付费试点 --> 正式生产客户
      正式生产客户 --> 平台费
      正式生产客户 --> 用量费
      平台费 --> 营收
      用量费 --> 营收
      营收 --> 毛利润
      毛利润 --> 现金
modelSanity:
- checkName: 收入引擎
  finding: 基础情景下的 Y3 收入来自 10 个正式生产客户、每个约 $228K 的混合年化 ARPU，而不是依赖大众市场用户增长假设。
- checkName: 必须成立的前提
  finding: 前两个付费试点必须成功转正，并把实施摩擦降到足以在 Y2 结束前达到 5 个正式生产客户。
- checkName: 模型失效条件
  finding: 如果试点转生产周期拉长，或毛利率跌破 65%，则在证明下一阶段里程碑之前现金低点会跌破零。
- checkName: 下一轮融资证明
  finding: 一旦公司证明了 5 个正式生产客户、1 个相邻品类胜利，以及可重复的 8-10 周部署，下一轮融资就具备合理性。
sanityChecks:
  ruleOf40: Y3 growth 146.4% + EBITDA margin -20.5% = 125.9%
  burnMultiple: Y2 的 burn multiple 约为 1.6x（基于净新增 ARR），随着扩张收入到来，Y3 改善至约 0.3x。
  revenuePerFte: $204K Y3 退出时每 FTE（SaaS 基准为 $200-400K）
  flags:
  - 基础情景在 Y3 已触达研究中测算的 SOM 上限，因此进一步上行仍需要超出滩头市场的相邻品类采纳。
  - Y3 结束时收入仍集中在 10 个正式生产客户上；任何一次续约延迟都会明显影响现金。
  - 模型从第一天起就假设 70% 毛利率，但前几个试点在集成标准化前可能会低于目标。
