- id: A19
  name: 月度 logo 流失率
  value: 2.5%
  unit: percent
  source: 'Startup-finance heuristic: concentrated early enterprise customer base before renewal history is proven'
- id: A20
  name: 下一轮融资里程碑
  value: 5 production logos, 1 adjacent-category customer, repeatable 8-10 week deployments, privacy-reviewed governance pack
  unit: milestone
  source: '[BP milestones 12-24 months] and [BP fundingAsk.useOfFundsSummary]'
- id: A21
  name: 招聘节奏
  value: CEO + founding eng at start; product by M2; privacy advisor by M3; solutions by M6; second eng by M9; first GTM by M10; first AE by M15; third eng by M20; ops lead by M31
