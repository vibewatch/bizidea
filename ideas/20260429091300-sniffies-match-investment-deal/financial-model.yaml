modelDiagram:
  title: unit economics flow
  mermaid: |-
    flowchart LR
      Outbound --> PaidPilots
      PaidPilots --> ProductionLogos
      ProductionLogos --> PlatformFees
      ProductionLogos --> UsageFees
      PlatformFees --> Revenue
      UsageFees --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
- checkName: Revenue engine
  finding: Base-case Y3 revenue comes from 10 production logos at roughly $228K blended annual ARPU, not from a mass-market user growth assumption.
- checkName: Must go right
  finding: The first two paid pilots must convert and reduce implementation friction enough to reach 5 production logos by the end of Y2.
- checkName: Model breaks if
  finding: A longer pilot-to-production cycle or gross margin below 65% pushes the cash floor below zero before the next milestone is proved.
- checkName: Next-round proof
  finding: The next financing is justified once the company shows 5 production logos, one adjacent-category win, and repeatable 8-10 week deployments.
sanityChecks:
  ruleOf40: Y3 growth 146.4% + EBITDA margin -20.5% = 125.9%
  burnMultiple: Y2 burn multiple is about 1.6x on net new ARR, improving toward 0.3x in Y3 as expansion revenue arrives.
  revenuePerFte: $204K Y3 on exit FTE (benchmark $200-400K SaaS)
  flags:
  - The base case reaches the research SOM ceiling by Y3, so material upside still requires adjacent-category adoption beyond the beachhead.
  - Revenue remains concentrated in 10 logos at Y3 exit; one delayed renewal would move cash meaningfully.
  - The model holds 70% gross margin from day one even though first pilots may run below target until integrations standardize.
