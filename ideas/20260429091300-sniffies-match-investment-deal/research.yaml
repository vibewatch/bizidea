  "competitiveLandscape": "The practical alternative set breaks into full-identity vendors (Veriff, Sumsub, Persona), device-intelligence vendors (Fingerprint, Castle), and internal/manual moderation inside platforms like Grindr or Sniffies [15][3][27][30][32][36][38]. The proposed wedge is not better KYC or better bot blocking alone; it is combining persistent private identity, cross-app repeat-offender detection, and user-facing safety artifacts without deanonymizing queer users."
  "incumbentThesis":
  - "incumbentClass": "Cloud platforms and app stores"
    "point": "Apple and Google impose baseline moderation, user-generated content, and sensitive-data rules, but they do not solve cross-app repeat offenders or portable pseudonymous trust for queer communities."
