    "summary": "Public pricing shows that trust budgets are already real: Veriff lists self-serve from $0.80 per verification with a $49 monthly minimum; Sumsub lists $1.35 per verification with a $149 monthly minimum; Fingerprint starts at $99/month for 20K API calls; Castle lists $200/month for its Pro plan and enterprise from $4,000/month."
