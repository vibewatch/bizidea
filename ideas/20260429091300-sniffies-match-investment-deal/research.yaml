  "regulatoryLandscape": "The product sits at the intersection of privacy law and platform safety. GDPR requires data minimization and lawful handling of identity/device data, the DSA raises governance and transparency expectations for online platforms, and Apple plus Google require stronger moderation and careful treatment of user-generated and sensitive data [9][10][11][12][13]."
  "technologyLandscape": "The underlying components already exist—identity verification, reusable identity, device intelligence, graph queries, and fraud rules—but they are sold separately and mostly optimized for fintech, marketplaces, or generic fraud rather than queer-community trust UX [27][28][30][32][33][36][38]."
