"competitors":
- "name": "Veriff"
  "stage": "scale-up"
  "wedge": "面向自助和企业客户的身份、年龄、生物特征和地址证明验证。"
  "pricing": "$0.80 per verification with a $49/month minimum on self-serve."
  "strength": "在受监管的身份与年龄校验流程上能力强，且 onboarding 摩擦较低。"
  "weaknessVsUs": "为实名验证而设计，而不是为持久化的化名信誉与跨社区信任凭证而设计。"
  "sourceRefs":
  - 29
  - 30
- "name": "Sumsub"
  "stage": "scale-up"
  "wedge": "覆盖合规与反欺诈的一体化身份验证、可重复使用 KYC 和设备情报栈。"
  "pricing": "$1.35 per verification with a $149 monthly minimum for its non-regulated plan; regulated plan starts higher."
  "strength": "产品面广，把身份验证、可重复使用身份和设备信号放在一套产品里。"
  "weaknessVsUs": "产品为通用合规和反欺诈流程优化，而不是为酷儿社区的化名信任与同意 UX 优化。"
  "sourceRefs":
  - 31
  - 32
  - 33
- "name": "Fingerprint"
  "stage": "scale-up"
  "wedge": "设备情报、访客识别，以及反 bot / 反多账号滥用工具。"
  "pricing": "Free tier available; Pro Plus starts at $99/month for 20K API calls."
  "strength": "在封禁规避、anti-detect 浏览器和设备关联滥用识别上技术覆盖很强。"
  "weaknessVsUs": "不提供可携带用户信任凭证、年龄/真人信号或社区特定的安全工作流。"
  "sourceRefs":
  - 35
  - 36
- "name": "Castle"
  "stage": "scale-up"
  "wedge": "针对假账号、内容滥用、多账号和账户接管的反欺诈规则与设备情报。"
  "pricing": "Free up to 1K API calls; Pro is $200/month for the first 100K API calls; enterprise starts at $4,000/month."
  "strength": "在假账号与内容滥用检测上贴合度高，且定价透明。"
  "weaknessVsUs": "其风险引擎对应用欺诈很有价值，但不是面向用户的化名信任钱包，也不是跨应用的酷儿安全层。"
  "sourceRefs":
  - 37
