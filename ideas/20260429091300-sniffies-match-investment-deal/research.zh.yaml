  "competitiveLandscape": "现实中的替代方案可分为三类：完整实名厂商（Veriff、Sumsub、Persona）、设备情报厂商（Fingerprint、Castle），以及像 Grindr 或 Sniffies 这样的应用内部/人工审核 [15][3][27][30][32][36][38]。提出中的切口不是更好的 KYC，也不是单独更强的 bot 拦截，而是在不去匿名化酷儿用户的前提下，把持久私密身份、跨应用重复违规者识别和面向用户的安全凭证组合起来。"
