differentiator: >-
  Incumbent verification tools are built for banks and marketplaces, where full
  legal identity disclosure is acceptable. This company wins by solving the
  harder problem: persistent trust under pseudonymity for communities where
  privacy is core to product usage. A cross-app trust graph and repeat-offender
  network become stronger with each customer, creating compounding data
  defensibility that a single app's internal tools cannot match.
