topRisks:
  - name: Privacy backlash
    description: Users may fear any verification layer is covert deanonymization.
    mitigation: Ship privacy-by-design architecture with pseudonymous tokens, minimal data retention, and clear user controls.
  - name: Narrow initial market
    description: The first customer segment may be too small if only a few queer apps buy.
    mitigation: Start with queer geosocial apps but design APIs for adjacent adult, event, and mainstream dating platforms from day one.
  - name: Trust data cold start
    description: Early customers may not see strong repeat-offender detection before the network has enough graph coverage.
    mitigation: Pair shared-network intelligence with standalone device, behavior, and moderation workflow value so the first deployment works on its own.
