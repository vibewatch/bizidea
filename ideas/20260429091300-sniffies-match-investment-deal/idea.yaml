problem: >-
  High-intent queer geosocial apps need enough anonymity to feel usable, but
  that same anonymity makes impersonation, repeat offenders, and trust failures
  expensive to moderate. When discovery is realtime and location-based, one bad
  actor can damage user retention, app-store relationships, and acquisition
  value faster than manual trust-and-safety teams can respond.
targetUser:
  primary: Head of Trust & Safety or GM at an independent queer geosocial or dating app
  secondary: Operations lead at a sex-positive event organizer serving queer men
  buyer: VP Product, GM, or Head of Trust & Safety at a queer social platform with 50k+ monthly active users
startupThesis:
  nonObviousInsight: >-
    The real moat in next-wave queer dating will not be better matching; it
    will be pseudonymous trust infrastructure that lets behavior-specific
    communities scale safely without forcing legal-name identity or losing the
    product intimacy that made them valuable.
  beachhead: >-
    Pseudonymous verification and repeat-offender prevention for queer men's
    map-based social apps in major U.S. metros where users move from online
    discovery to in-person meetings within hours
  wedge: >-
    An embeddable trust layer that issues persistent private identity tokens,
    detects ban evasion across devices, and lets users share optional consent
    and safety cards without revealing legal identity
  whyNowCatalyst: >-
    Match Group's investment and acquisition option around Sniffies signals that
    niche queer platforms are valuable enough that operators can now justify
    buying specialized trust infrastructure before consolidation.
  ventureScalePath: >-
    Start with queer geosocial apps, then expand the same privacy-preserving
    trust graph to adult communities, nightlife platforms, travel meetups, and
    eventually mainstream dating products that need safety without full
    identity disclosure.
solution: >-
  Build a developer platform and user passport that sits between signup,
  messaging, and meetup. Apps integrate SDKs for pseudonymous identity proof,
  device-level repeat-offender detection, and portable trust badges that survive
  burner-account resets while keeping legal identity hidden from other users.
  For users, the product looks like a private trust wallet with optional
  boundary preferences, venue check-in confirmation, and emergency escalation
  tools. For platforms, it replaces fragmented moderation tooling with a shared
  risk engine tuned for realtime geosocial behavior.
goToMarketSeed:
  firstCustomer: >-
    An independent queer men's geosocial app with 50k-500k MAUs in New York,
    Los Angeles, or Chicago that has a lean moderation team and strong in-person
    meetup usage
  buyingTrigger: >-
    A spike in fake profiles, ban-evasion complaints, or diligence requests from
    investors, acquirers, or app-store policy reviewers
  currentAlternative: Manual moderation plus generic ID-verification vendors and one-off internal abuse tooling
  switchingReason: >-
    This wedge preserves anonymity while reducing repeat abuse and moderation
    load, which generic KYC tools and internal point solutions cannot do
    without hurting conversion.
  pricingHypothesis: Platform SaaS fee plus usage-based pricing per monthly verified active user
