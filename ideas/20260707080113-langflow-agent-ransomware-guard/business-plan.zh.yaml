slug: agent-secret-fuse
date: "2026-07-07"
executiveSummary: >-
  Agent Secret Fuse 瞄准的是自建智能体运行时里一个刚刚暴露的管控缺口：Langflow 类工作流常常把可复用的模型厂商、数据库和内部 API 凭证，直接挂进一台随时可能被攻破的主机。JadePuffer 印证了这种失效模式——从一个 Langflow 漏洞一路打到生产数据库访问权限和多模型密钥窃取，所以第一单该卖的是针对单个生产工作流的加固试点，而不是泛泛的 AI 治理提案。滩头市场是 100-300 人规模的垂直 SaaS 厂商——它们在自己的 VPC 里跑客户专属的 Langflow 或 Flowise 自动化，现在正被企业客户、董事会或网络保险公司拉去做安全审查。MVP 是一套 Langflow/Flowise 代理与 sidecar，为模型厂商、数据库和内部 API 调用签发按步授权的访问权限，构建执行图，先以观察模式起步，再开启内联熔断动作。定价、渠道和上线流程都围绕单个受保护工作区来设计，因为这正是首个客户感受到痛点的方式，也是相邻的密钥和 IAM 预算已经分配的方式。研究测算这个窄切口的 TAM 和 SAM 只有约 $400M 和 $72M，所以创投层面的上行空间，取决于能否证明从 Langflow、Flowise 扩展到 MCP 服务器和更广泛的企业内部 AI 平台，而不是把一个小众框架功能做到极致。最大的证伪风险是：买家认定 Vault、工作负载身份和人工管控已经够用，或者代理给面向客户的流程增加了太多延迟或噪音。研究支持事件的严重性和相邻预算的存在，但没有量化到底有多少目标团队已经在生产环境自建 Langflow 或 Flowise，所以前 18 个月必须先证明部署速度、付费试点转化率和第二工作区扩展，公司才能扩大销售规模。
problem:
  - "自建智能体的团队常把 OpenAI、Anthropic、数据库和内部 API 凭证一起挂进 Langflow 或 Flowise 运行时，一次运行时漏洞就可能演变成跨系统的密钥窃取。"
  - "现有的密钥库、云密钥管理器和提示词护栏，都决定不了某个智能体步骤该实时拿到哪把凭证，也无法在被攻陷的运行扩散到多个租户或系统之前把它叫停。"
solution:
  - "在 Langflow 或 Flowise 与每个依赖密钥的下游之间插入代理和 sidecar，让高风险步骤拿到的是短期、受策略约束的访问权限，而不是可复用的环境密钥。"
  - "为每一次带凭证的运行构建执行图和事件回放轨迹，客户先在观察模式下起步，等策略在真实工作负载上调优完成，再升级到暂停、熔断和轮换动作。"
whyWeWin:
  - "我们把守的是运行时凭证签发这道边界——纯存储型密钥管理器管不到这里，提示词或内容护栏也触及不到。"
  - "首个买家和购买触发点都很具体——一个正在接受安全审查的生产工作流——这比卖一套横向 AI 安全平台的销售节奏要快。"
  - "跨客户的执行图、被拦截运行的回放记录，以及针对具体连接器的策略模板，会不断叠加成一道专属于运行时层的护城河，而这不是 Vault、Teleport 或 Langflow 自身天然就有的东西。"
strategicChoices:
  beachhead: >-
    100-300 人规模的垂直 SaaS 厂商，在自己的 VPC 里自建客户专属的 Langflow 或 Flowise 自动化，拥有生产环境的模型厂商和数据库访问权限，也愿意按租户或工作区隔离高风险的工作负载。
  wedgeRationale: >-
    这一批客户手上握着真实的密钥、面对真实的客户审查，工程团队规模又小到更愿意买一层外挂方案，而不是自己造；比起卖给有内部平台团队的超大型企业，或者没有安全预算的小型创业公司，从这里出发能更快跑通验证。
  sequencingRationale: >-
    产品先从 Langflow 或 Flowise，加上风险最高的几类连接器、以观察模式起步，因为研究显示集成广度和误报率是最大的采用风险；GTM 从创始人卖出的一个受保护工作区开始，因为触发点是一次安全审查，不是整家公司的平台迁移；招聘上优先部署和策略调优岗位，再招背销售指标的人，因为价值兑现的速度决定了现有替代方案看起来够不够用。
  notYet:
    - "无法按工作区或租户隔离高风险工作流的共享租户部署。"
    - "泛化的 AI 治理、提示词监控或 SIEM 替代类功能。"
    - "在 Langflow 或 Flowise 代理路径还没跑通、稳定复现之前，为每个 MCP 服务器和自定义运行时做原生插件。"
market:
  tam: "$400M（研究测算：约 8,000 家中型软件与 AI 平台客户，初始 ACV 约 $50k）"
  sam: "$72M（研究测算：约 1,600 家北美和欧洲的垂直 SaaS 或 AI 平台团队，已经自建客户专属智能体工作流，ACV 约 $45k）"
  som: "$3.6M（研究测算：第 3 年约 60 个客户，落地扩张后混合 ARR 约 $60k）"
  segments:
    - "100-300 人规模的垂直 SaaS 厂商，在 Langflow 或 Flowise 上自建客户专属的支持或工作流自动化。"
    - "为多个客户运营高风险智能体工作区的 AI 咨询公司和托管平台团队。"
  buyingProcess: >-
    通常是平台安全或 AI 平台工程师，在客户安全审查、网络保险问卷或事后复盘会上先发现这个缺口，然后由 工程副总裁 或 CISO 出面，为一个受保护工作区拉一次付费试点。等买家能证明共享的模型和数据库凭证已经从运行时里拿掉，工作流没坏，运维负担也没超出可接受范围，这笔交易就能成交。
product:
  mvp: >-
    以 Langflow 和 Flowise 为先的代理与 sidecar，覆盖单个生产工作流所需的模型厂商密钥、MySQL 或 Postgres 凭证，以及部分内部 API 令牌，提供按步授权访问、执行图回放、观察模式，以及手动暂停或熔断开关。不包括泛化的提示词安全、共享租户策略自动化，以及对每个自定义连接器的深度原生覆盖。
  sixMonth: >-
    把 Langflow 和 Flowise 的部署打包成可复用的 Kubernetes 方案，为几类主要凭证发布策略模板，再交付证据导出和手动轮换接口，让客户能向安全审查人员证明遏制到位。
  twelveMonth: >-
    加上强制执行的短期租约、遏制事件后的自动密钥轮换、首个 MCP 连接器包，以及生产级的策略调优流程，把误报率压到面向客户的自动化能接受的水平。
  twentyFourMonth: >-
    把控制平面从 Langflow 和 Flowise 扩展到 MCP 服务器、自定义工具调用运行器和企业内部 AI 平台，同时保留同一套按步授权、回放和熔断架构。
  keyBets:
    - "在客户要求深度、框架专属插件之前，一套代理和 sidecar 就能覆盖大部分高风险的带凭证调用。"
    - "观察模式下建立的行为基线，能积累足够信任，让半数以上付费试点愿意开启内联遏制。"
    - "买家更在意去掉共享的运行时密钥、证明爆炸半径可控，而不是再买一个通用的 AI 仪表盘。"
gtm:
  wedge: >-
    针对一套已有的 Langflow 或 Flowise 部署，卖一次付费加固试点：从单个生产工作流里去掉共享的模型和数据库密钥，先以观察模式运行，等客户看到延迟和误报率都在可接受范围后，再转为生产级强制执行。
  channels:
    - "创始人主导销售，对接 100-300 人规模垂直 SaaS 厂商的 工程副总裁、平台安全负责人和 AI 平台负责人。"
    - "已经在做自建智能体技术栈、工作负载身份和队列或代理模式落地的 Kubernetes 与平台安全咨询公司。"
    - "网络保险、事件响应和企业安全审查带来的转介——触发点都是 Langflow 事件之后需要证明遏制能力。"
  funnelTargets: "线索转安全合格调研 25%-35%，调研转付费试点 40%-50%，付费试点转生产环境 50%以上，生产环境客户里有 35%以上会在 9 个月内新增第二个受保护工作区。"
  pricing: >-
    按受保护工作区或运行时集群计费的年度订阅，再加上凭证租约和回放留存的用量部分，因为买家批准的是一个边界清晰的生产工作流，而不是按坐席采购。首份合同应该是 $15k-$25k 的付费试点，等强制策略上线后转为约 $45k-$75k 的年度合同价值。
businessModel:
  revenueStreams:
    - "受保护工作区或运行时集群的年度订阅。"
    - "凭证租约、事件回放留存和高级策略包的使用费。"
    - "首个生产工作流的一次性上线与部署套餐。"
  unitOfValue: "带凭证智能体动作的受保护生产工作区/运行时集群。"
  targetGrossMarginPct: 72
  expansionLevers:
    - "在同一账户内增加更多受保护工作区、关键业务工作流和环境。"
    - "从模型厂商和数据库覆盖扩展到内部 API、对象存储和 MCP 连接器。"
    - "一旦客户离不开证据导出，就追加销售高级审计、保险响应和长周期回放模块。"
strategyMap:
  northStarMetric: >-
    不依赖长期共享凭证、且具备可强制执行遏制策略的生产智能体工作区数量。
  inputMetrics:
    - "从启动到在真实工作流上拿到首份观察模式证据的中位天数。"
    - "通过按步租约（而非可复用密钥）完成的带凭证工具调用占比。"
    - "付费试点转生产环境的转化率。"
    - "策略调优满 30 天后的误报暂停率。"
    - "生产环境客户新增第二工作区的扩展率。"
  moatsToBuild:
    - "面向 Langflow、Flowise 及 MCP 类工作流的跨客户执行图与密钥请求数据集。"
    - "针对具体连接器的策略模板，把模型、数据库和内部 API 访问中哪些步骤模式属于正常，固化下来。"
    - "把异常扩散模式和真正奏效的遏制动作关联起来的事件回放语料库。"
  killCriteria:
    - "首次正式演示后 6 个月内，前 10 个安全合格商机里买单付费试点的不到 3 个。"
    - "前 3 个部署案例，在 30 天内没能把至少 70% 的模型厂商和数据库调用导流到短期访问权限。"
    - "调优后，误报暂停仍超过已批准运行的 2%，或每个带凭证步骤的 P95 延迟开销超过 150 毫秒。"
    - "到第 12 个月，转化为年化价值 $45k 以上生产合同的试点客户不到 2 个。"
  mermaid: |
    flowchart LR
      Wedge[Langflow/Flowise containment pilot] --> MVP[Observe-mode proxy and step-scoped access]
      MVP --> Proof[Paid pilot converts to production evidence]
      Proof --> Expansion[MCP and internal AI platform expansion]
investorMemo:
  verdict:
    call: "值得见面/进一步调研"
    conviction: >-
      痛点信号强烈，首个客户的打法也说得通，值得见一面；但在代理优先的部署证明客户愿意在现有密钥库和 IAM 支出之外额外付费之前，信心只能维持中等。
    whyBelieve: >-
      一条真实的攻击链，抛出了一个董事会级别的问题——谁能拿到哪把凭证、能用多久、团队怎么在运行途中叫停被攻陷的流程——而现有方案答得都不好。
    whyDoubt: >-
      起步的切口窄，还得啃大量集成工作，买家可能更愿意扩展 Vault、云工作负载身份或框架自身的加固，而不是再加一层内联控制平面。
    nextDiligence: >-
      看到一个真实的 Langflow 或 Flowise 试点，把共享密钥从生产工作流里清除，并在一个预算周期内转为付费部署。
  firstCustomer:
    title: "一家 100-300 人规模垂直 SaaS 厂商的 工程副总裁，公司自建客户专属的智能体工作流"
    profile: >-
      公司在自有 VPC 里跑 Langflow 或 Flowise，做客服或后台自动化，把模型厂商密钥和生产数据库凭证当作可复用的运行时密钥存放，还得通过企业安全审查才能继续上线这些工作流。
    trigger: >-
      保险公司、董事会成员或企业客户在 Langflow 事件后追问：一个流程被攻陷该怎么遏制？逼着团队证明密钥不会跨租户或跨系统扩散。
    buyer: 工程副总裁
    initialContract: >-
      针对一个受保护工作区和主要凭证类别的 $15k-$25k 付费试点，等观察模式升级为强制策略后，转为 $45k-$75k 的年度订阅加用量费。
  mustBeTrue:
    - "至少有一个滩头细分市场，在经历客户、董事会或保险公司审查后，已经把运行时遏制当作当下的预算项。"
    - "代理优先的部署方案，能在不改写代码的前提下，从首个生产工作流里去掉 70% 以上的长期有效模型厂商和数据库密钥。"
    - "观察模式下的基线建模，能把面向客户工作流的误报遏制动作，控制在已批准运行的 2% 以下。"
    - "半数以上付费试点会转化为年度价值 $45k 以上的生产合同，因为买家认定纯存储型密钥管控还不够。"
    - "至少 35% 的生产客户会在 12 个月内扩展到第二个受保护工作区或运行时，证明这个切口不是一次性的事件驱动采购。"
  diligenceQuestions:
    - "有多少目标客户已经在生产环境自建 Langflow、Flowise 或类似的工具调用型工作流？"
    - "哪类凭证最容易触发购买——模型厂商密钥、数据库凭证、内部 API 令牌，还是对象存储访问权限？"
    - "代理给典型生产流程增加了多少 P95 延迟开销和运维负担？"
    - "在真实评估中，买家正确使用 Vault 或云工作负载身份之后，还留有哪些防护缺口？"
    - "保险问卷和企业安全审查，是否已经在强制要求专门的管控措施，还是这个触发点目前还只是个案？"
operatingAssumptions:
  - assumption: "相邻的密钥和机器身份预算足够灵活，能资助一次独立的运行时遏制试点，不用等新一轮年度预算周期。"
    basis: research.yaml
    validationTest: "在正式评估启动后 90 天内，从前 8 个安全合格商机里签下至少 4 个付费试点。"
    decisionImpact: "如果不成立，公司必须转向合作伙伴主导的服务模式、捆绑 OEM 分销，或更长周期的企业融资计划，而不是走快节奏的直销路线。"
  - assumption: "一套代理和 sidecar，能在需要深度原生插件之前，覆盖足够多的高风险连接器类别来证明价值。"
    basis: research.yaml
    validationTest: "在前 3 个部署案例中，把至少 70% 的模型厂商、数据库和部分内部 API 调用导流到代理，且不破坏现有工作流。"
    decisionImpact: "如果不成立，产品路线图和招聘就要转向框架专属适配器和更窄的 ICP，毛利率改善也会延后。"
  - assumption: "买家会接受首批受保护工作流按工作区或租户隔离，而不是从第一天就要求完全共享的多租户强制执行。"
    basis: research.yaml
    validationTest: "拿下 3 个共创客户，同意在部署时按工作区或租户边界隔离首个高风险工作流。"
    decisionImpact: "如果不成立，滩头市场就得收窄到单租户部署，或者上探到基础设施管控能力更强的大客户。"
  - assumption: "观察模式下的回放和策略调优，能把误报遏制动作压低到面向客户自动化能接受的水平。"
    basis: 运营判断
    validationTest: "积累 30 天基线数据后，把误报暂停控制在已批准运行的 2% 以下，每次复核在 15 分钟内解决。"
    decisionImpact: "如果不成立，产品就只能停留在建议或告警优先的阶段，定价权被削弱，试点转生产的速度也会变慢。"
  - assumption: "安全审查和保险触发点，能把首轮销售周期压缩到足以支撑一个种子前 GTM 计划的程度。"
    basis: idea.yaml
    validationTest: "在前 6 笔合格交易中，从确认触发点到签下付费试点的中位耗时保持在 90 天以内。"
    decisionImpact: "如果不成立，融资需求和招聘节奏都要调整，因为公司实际面对的合规周期会比计划的更慢。"
experimentRoadmap:
  - horizon: "0–90 天"
    experiment: "访谈 25 家目标客户，梳理当前的密钥暴露情况、工作流类型和触发事件。"
    hypothesis: "至少 10 家合格潜客已经在跑或计划跑一个客户专属的自建智能体工作流，而这类工作流放到今天的正式安全审查里会不及格。"
    successMetric: "10 家以上合格客户，明确工作流名称、凭证类别，并确认买家或审查人。"
    owner: 创始人 CEO
  - horizon: "0–90 天"
    experiment: "在一个 Langflow 或 Flowise 共创客户上，为 OpenAI、Anthropic、Gemini 和 MySQL 或 Postgres 上线观察模式代理。"
    hypothesis: "首个部署案例能在 30 天内覆盖大部分高风险带凭证调用，且不用改写工作流。"
    successMetric: "一个共创客户在启动 30 天内，把 70% 以上的目标调用导流到代理。"
    owner: 创始工程师
  - horizon: "0–90 天"
    experiment: "在典型流程上对延迟、回放质量和误报策略建议做基准测试。"
    hypothesis: "内联代理能守住客户的 SLO，同时揪出人工容易漏掉的异常扩散模式。"
    successMetric: "每个带凭证步骤新增的 P95 延迟低于 150 毫秒，测试中至少识别出 3 起实质性风险的偏离图谱事件。"
    owner: 安全/平台工程师
  - horizon: "3–6 个月"
    experiment: "把 3 个共创客户转化为由安全审查或保险压力触发的付费试点。"
    hypothesis: "在全自动熔断逻辑大面积开启之前，买家就愿意为加固和证据付费。"
    successMetric: "签下 3 个付费试点，单笔 $15k 以上，并约定好生产上线标准。"
    owner: 创始人 CEO
  - horizon: "6–12 个月"
    experiment: "为首批生产客户开启强制暂停或熔断策略，并测算转化率。"
    hypothesis: "观察模式积累的证据，足以让半数以上付费试点建立起对生产环境的信任。"
    successMetric: "2 个以上付费试点转化为年化价值 $45k 以上的生产合同，误报暂停率低于 2%。"
    owner: 安全产品负责人
  - horizon: "6–12 个月"
    experiment: "招募咨询公司、保险公司或事件响应类合作伙伴，并测算伙伴带来的销售管道。"
    hypothesis: "合作伙伴降低信任门槛和集成摩擦的速度，比纯粹的主动外呼销售更快。"
    successMetric: "签下 3 个合作伙伴，到第 12 个月合格销售管道里有 30% 以上来自合作伙伴。"
    owner: 合作伙伴负责人
operations:
  - "在代理任何凭证之前，维护一份标准的上线清单，梳理每条工作流的模型、数据库、内部 API、工作区，以及紧急熔断的责任人。"
  - "在开启强制暂停或熔断策略之前，每个客户都要先跑一遍观察模式基线、事件桌面推演和回滚方案。"
  - "把回放证据和遏制事件导出到客户现有的密钥库、SIEM 和工单系统，而不是试图取而代之。"
  - "与部分咨询公司合作，把队列模式、代理数量、工作负载身份和反向代理处理，打包成参考 Kubernetes 部署方案。"
team:
  - role: 创始工程师
    startTiming: 第 0 月
    rationale: "搭建代理、执行图，以及付费试点所需的首批 Langflow 或 Flowise 连接器覆盖。"
  - role: 创始人 CEO
    startTiming: 第 0 月
    rationale: "在产品和 ICP 还在打磨阶段时，主抓创始人主导销售、共创客户招募和安全审查话术。"
  - role: 安全/平台工程师
    startTiming: 第 2 月
    rationale: "负责首批客户部署的工作负载身份集成、密钥轮换和生产可靠性。"
  - role: 解决方案工程师
    startTiming: 第 4 月
    rationale: "缩短部署时间、把 Kubernetes 打法固化成手册，在试点数量增多时保住核心工程团队的带宽。"
  - role: 安全产品负责人
    startTiming: 第 7 月
    rationale: "把试点里学到的经验，沉淀成可复用的策略、回放流程和客户在生产环境里信得过的证据导出。"
  - role: 合作伙伴负责人
    startTiming: 第 10 月
    rationale: "等打包好的部署路径和转化故事都跑通后，搭建咨询、保险和事件响应渠道。"
milestones:
  - horizon: "0–12 个月"
    items:
      - "为模型厂商密钥、MySQL 或 Postgres 及部分内部 API，上线 Langflow 和 Flowise 的观察模式覆盖。"
      - "拿下 3 个付费试点，至少 2 个转化为年化价值 $45k 以上的生产合同。"
      - "证明首个部署案例能在 30 天内拿到观察模式证据，调优后误报暂停率低于 2%。"
      - "拿下 2 个咨询合作伙伴，以及 1 条保险或事件响应转介渠道。"
  - horizon: "12–24 个月"
    items:
      - "加上强制执行的短期租约、遏制事件后的自动轮换，以及首个 MCP 连接器包。"
      - "达到 10-15 个生产客户，其中至少 35% 完成第二工作区扩展。"
      - "推出高级审计和保险响应证据模块，在不扩大核心部署范围的前提下拉高 ACV。"
  - horizon: "24–36 个月"
    items:
      - "从 Langflow 和 Flowise 扩展到 MCP 服务器、自定义运行器和企业内部 AI 平台。"
      - "达到约 60 个客户，通过多工作区的落地扩张验证第 3 年的 SOM 测算。"
      - "把跨客户执行数据，沉淀成可复用的默认策略和基准指标，强化合作伙伴分销和客户留存。"
risks:
  - risk: "跨运行时和连接器的代理集成需要太多定制开发。"
    likelihood: High
    impact: High
    mitigation: "先做 Langflow、Flowise 和一份精简的连接器清单，把参考部署产品化之后，再加长尾连接器。"
  - risk: "买家认定现有的密钥库、工作负载身份和手动轮换已经够用。"
    likelihood: Medium
    impact: High
    mitigation: "在单个生产工作流上卖可衡量的爆炸半径缩减效果，并与客户现有的密钥库或 IAM 工具集成，而不是取而代之。"
  - risk: "误报暂停或新增延迟拖垮了面向客户的自动化。"
    likelihood: Medium
    impact: High
    mitigation: "默认使用观察模式，对典型流程做基准测试，在开启内联强制执行前，必须先指定回滚责任人。"
  - risk: "滩头市场比研究测算的规模更小、增长更慢。"
    likelihood: Medium
    impact: High
    mitigation: "尽早跟踪生产部署数量和触发点质量，等验证过 5-10 个共创客户之后，再扩展到 MCP 和企业内部 AI 平台。"
  - risk: "框架厂商或云平台捆绑了足够多按步感知的管控功能，抹平了这个切口。"
    likelihood: Medium
    impact: Medium
    mitigation: "坚持跨框架，与密钥和 IAM 厂商结盟，持续积累回放和策略数据集，让捆绑功能一时难以追上。"
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2.5-3.5M"
  runwayMonths: 18
  useOfFundsSummary: >-
    这笔资金支撑 18 个月，用来打造以 Langflow 和 Flowise 为先的遏制产品、签下 3-5 个付费试点、把其中 2-3 个转化为生产合同、和合作伙伴一起打包部署手册，并在扩招更大规模销售团队之前，验证向 MCP 和企业内部 AI 平台扩展是否真实可行。
