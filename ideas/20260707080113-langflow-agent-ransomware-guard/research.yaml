market:
  tam:
    value: $400M
    rationale: >-
      Estimate 8,000 mid-market software and AI-platform accounts over time × roughly $50k ACV; adoption is anchored by 87% genAI deployment or pilot rates and 72% weekly enterprise usage, but only a minority are truly AI-led today, which keeps the runtime-security slice smaller than headline AI spend [17][22][25][31][32][33].
    isEstimate: true
    sourceRefs:
      - 17
      - 22
      - 25
      - 31
      - 32
      - 33
  sam:
    value: $72M
    rationale: >-
      Constrain TAM to about 1,600 North America and Europe vertical SaaS or AI-platform teams already self-hosting customer-specific agent workflows × roughly $45k ACV [6][9][10][31][33].
    isEstimate: true
    sourceRefs:
      - 6
      - 9
      - 10
      - 31
      - 33
  som:
    value: $3.6M
    rationale: >-
      Reach about 60 accounts by year three at roughly $60k blended ARR after land-and-expand into the highest-risk production flows; this is plausible for founder-led sales where adjacent secret-management budgets already exist [17][22][25][26][29].
    isEstimate: true
    sourceRefs:
      - 17
      - 22
      - 25
      - 26
      - 29
