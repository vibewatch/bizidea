slug: agent-secret-fuse
date: "2026-07-07"
currency: USD
modelStartMonth: "2026-08"
assumptions:
- id: A1
  name: "Model start month"
  value: "2026-08"
  unit: "YYYY-MM"
  source: "[BP date 2026-07-07] the financial model starts in the first full month after the dated business plan."
- id: A2
  name: "Opening cash / pre-seed raise"
  value: "$3.2M"
  unit: "USD"
  source: "[BP fundingAsk round pre-seed + BP fundingAsk targetFundingRangeUsd $2.5-3.5M + model cash trough] the base case uses the upper-middle of the stated range because the wedge is integration-heavy and needs six months of buffer beyond the original 18-month proof plan."
- id: A3
  name: "Starting paid accounts"
  value: "0"
  unit: "count"
  source: "[BP milestones 0–12 months] the company starts pre-revenue and must first close design partners and pilots."
- id: A4
  name: "Customer definition"
  value: "One paying customer logo under either a paid hardening pilot or a production subscription; ARPU can rise as more protected workspaces and premium evidence modules attach inside the logo."
  unit: "definition"
  source: "[BP gtm.wedge + BP businessModel.unitOfValue + BP gtm.pricing] customersEop counts paying logos while pricing remains workspace-based inside each logo."
- id: A5
  name: "Paid pilot revenue realization"
  value: "$18K over ~3 months (~$6K/mo per pilot account)"
  unit: "USD/account"
  source: "[BP gtm.pricing and investorMemo.firstCustomer.initialContract $15k-$25k paid pilot] modeled slightly below the midpoint to reflect early deployment discounting."
- id: A6
  name: "First production subscription"
  value: "$60K ARR (~$5K/mo) for the first protected workspace"
  unit: "USD/account/year"
  source: "[BP gtm.pricing converts to roughly $45k-$75k annual value] uses the midpoint of the stated production range."
- id: A7
  name: "Mature blended account value"
  value: "~$95K ARR by Q4Y3 (~$7.9K/mo realized)"
  unit: "USD/account/year"
  source: "[BP businessModel.expansionLevers + BP milestones second-workspace expansion in 35%+ of accounts + Research market.som ~$60K blended ARR] mature accounts rise above the first-workspace contract as second workspace, usage, and evidence modules attach."
- id: A8
  name: "Second-workspace expansion"
  value: "35% of production accounts add a second protected workspace within ~9 months; 45 logos by Q4Y3 imply about 61 protected workspaces."
  unit: "expansion rate"
  source: "[BP gtm.funnelTargets production→second protected workspace within 9 months in 35%+ of accounts + BP milestones 12–24 months] this bridges the logo count to the workspace-based product value."
- id: A9
  name: "Net paid-logo ramp"
  value: "1 paid logo by M6, 4 by M12, 14 by Q4Y2, and 45 by Q4Y3"
  unit: "customersEop"
  source: "[BP experimentRoadmap 3 paid pilots by 3–6 months + BP milestones 2 production contracts by month 12, 10-15 production customers by 12–24 months, and year-3 expansion proof] the base case underwrites below the 60-account SOM headline but gets close on protected-workspace volume through expansion."
- id: A10
  name: "Revenue recognition convention"
  value: "Revenue equals period-end paying logos multiplied by the blended realized monthly revenue per logo for that period."
  unit: "formula"
  source: "[BP businessModel.revenueStreams + BP gtm.pricing] this keeps the P&L directly reconcilable to customers × ARPU."
- id: A11
  name: "Gross margin ramp"
  value: "55-61% in late Y1, 64-70% in Y2, and 71-74% in Y3"
  unit: "gross margin percent"
  source: "[BP businessModel.targetGrossMarginPct 72 + BP operatingAssumptions on connector coverage and policy tuning] margins start below target while deployments are services-heavy and reach the low-70s after playbooks harden."
- id: A12
  name: "Hiring timeline"
  value: "M1 founder CEO + founding engineer; M2 security/platform engineer; M4 solutions engineer; M7 security product lead; M10 partnerships lead; M15 second GTM hire; M18 second solutions engineer; M20 third platform engineer; M22 customer success/ops; M28 third GTM hire; M30 second customer success/ops."
  unit: "timeline"
  source: "[BP team + BP strategicChoices.sequencingRationale + startup-finance heuristic] hiring stays deployment-first and only adds GTM capacity after the first paid proof points."
- id: A13
  name: "Founder loaded compensation"
  value: "$175K"
  unit: "USD/year"
  source: "[BP team Founder CEO + startup-finance heuristic] lean founder cash pay plus payroll taxes and benefits."
- id: A14
  name: "Platform engineering loaded compensation"
  value: "$205K/FTE"
  unit: "USD/year"
  source: "[BP team Founding eng and Security / platform engineer + startup-finance heuristic] reflects senior security and platform talent in a small startup."
- id: A15
  name: "Solutions engineering loaded compensation"
  value: "$170K/FTE"
  unit: "USD/year"
  source: "[BP team Solutions engineer + startup-finance heuristic] customer-facing deployment talent with payroll load."
- id: A16
  name: "Security product lead loaded compensation"
  value: "$190K"
  unit: "USD/year"
  source: "[BP team Security product lead + startup-finance heuristic] senior product/security operator translating pilot learnings into reusable policy packs."
- id: A17
  name: "GTM / partnerships loaded compensation"
  value: "$180K/FTE"
  unit: "USD/year"
  source: "[BP team Partnerships lead + BP gtm.channels + startup-finance heuristic] lean enterprise-selling and partner-management cost before a larger quota bench."
- id: A18
  name: "Customer success / ops loaded compensation"
  value: "$145K/FTE"
  unit: "USD/year"
  source: "[BP operations + startup-finance heuristic] covers post-sale adoption, vendor management, finance, and admin support."
- id: A19
  name: "Payroll allocation to P&L lines"
  value: "Founder 70% S&M / 30% G&A; platform engineering and security product 100% R&D; solutions engineering 50% S&M / 50% R&D; GTM 100% S&M; first customer-success/ops hire 60% S&M / 40% G&A; second customer-success/ops hire 30% S&M / 70% G&A."
  unit: "allocation"
  source: "[BP role rationales + BP operations] maps payroll into the functional lines used in the operating model."
- id: A20
  name: "Non-payroll sales & marketing spend"
  value: "$4K/mo in M1-3, $8K/mo by Q4Y1, then stepping to $25K/mo by Q4Y3"
  unit: "USD/month"
  source: "[BP gtm.channels + startup-finance heuristic] covers founder outbound, partner travel, workshops, and lightweight enterprise GTM tooling."
- id: A21
  name: "Non-payroll R&D spend"
  value: "$8K/mo in M1-3, $11K/mo by Q4Y1, then stepping to $22K/mo by Q4Y3"
  unit: "USD/month"
  source: "[BP product + BP operations + startup-finance heuristic] covers cloud, logging, security testing, and connector infrastructure."
- id: A22
  name: "Non-payroll G&A spend"
  value: "$3K/mo in M1-6, $4K/mo by Q4Y1, then stepping to $12K/mo by Q4Y3"
  unit: "USD/month"
  source: "[BP operations + startup-finance heuristic] covers legal, accounting, insurance, and admin tooling."
- id: A23
  name: "Cash conversion convention"
  value: "Cash movement equals EBITDA."
  unit: "formula"
  source: "[startup-finance heuristic] taxes, capex, debt service, and working-capital timing are assumed immaterial relative to operating burn at pre-seed scale."
- id: A24
  name: "Unit-economics churn assumption"
  value: "1.5% monthly steady-state churn; the 36-month customer ramp is net of only modest early losses rather than cohort-modeled churn."
  unit: "percent per month"
  source: "[startup-finance heuristic for early enterprise security infrastructure] deployed controls should be sticky after adoption, but the model is still more conservative than mature infrastructure SaaS."
- id: A25
  name: "CAC convention"
  value: "~$47K = Y2-Y3 S&M spend / 41 modeled new paid logos"
  unit: "USD/new paid logo"
  source: "[model calc using Y2-Y3 S&M spend + BP gtm.funnelTargets] uses the founder-plus-partner motion actually modeled rather than a self-serve SaaS assumption."
- id: A26
  name: "Funding milestone for sizing"
  value: "Raise enough to reach 12-14 paid logos, show 35%+ second-workspace expansion, and package a reusable partner-led deployment motion while keeping roughly six months of buffer beyond the original 18-month proof plan."
  unit: "milestone"
  source: "[BP fundingAsk targetFundingRangeUsd + BP fundingAsk runwayMonths 18 + BP milestones 12–24 months + model cash curve] this is why the model uses a $3.2M ask instead of the low end of the range."
