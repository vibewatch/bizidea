scenarios:
  downside:
    description: "Vault and workload-identity alternatives look good enough for more buyers, approvals drag, and the company exits Y3 with fewer logos and more services-heavy deployments."
    y3RevenueK: 2057.4
    y3EbitdaK: -1202.2
    cashLowPointK: -454.4
    keyAssumptionChanges:
    - "Q4Y3 paid logos stop near 34 instead of 45 because more security reviews stall after the pilot or stay on manual controls."
    - "Mature blended account value lands closer to ~$89K ARR instead of ~$95K because second-workspace and premium evidence attach more slowly."
    - "Gross margin stays a couple of points lower because deployments remain more custom and policy tuning stays labor-intensive."
  base:
    description: "Founder-led selling plus consultancy and insurer referrals turn four Y1 paid accounts into fourteen by Q4Y2 and forty-five by Q4Y3 while expansion lifts value inside the best accounts."
    y3RevenueK: 2831.1
    y3EbitdaK: -596.3
    cashLowPointK: 180.8
    keyAssumptionChanges:
    - "The company exits Y1 with 4 paying logos, Y2 with 14, and Y3 with 45 while still keeping headcount at 12 FTE."
    - "First paid pilots realize about $18K over three months and mature production accounts trend toward roughly $95K blended ARR as expansion attaches."
    - "About 35% of production accounts add a second protected workspace within nine months, taking 45 logos to roughly 61 protected workspaces by Q4Y3."
  upside:
    description: "Reference deployments and partner channels reduce friction earlier, allowing faster logo adds, better expansion, and higher margin standardization."
    y3RevenueK: 3386.7
    y3EbitdaK: -156.4
    cashLowPointK: 486.6
    keyAssumptionChanges:
    - "Q4Y3 paid logos reach about 52 as partner-sourced opportunities close faster after the first referenceable production deployments."
    - "Mature blended account value reaches roughly $101K ARR because premium evidence and second-workspace expansion attach earlier."
    - "Gross margin exits around the mid-70s because repeatable deployment templates reduce services load without requiring more headcount."
sensitivity:
- variable: "ARPU"
  downsideCase: "Mature blended account value settles closer to ~$89K ARR and late-year usage uplift stays muted."
  baseCase: "Mature blended account value reaches about ~$95K ARR as second-workspace and evidence modules attach."
  upsideCase: "Mature blended account value pushes toward ~$100K ARR as premium evidence and usage attach early."
  y3RevenueImpactK: -198.2
  cashImpactK: -132.5
- variable: "CAC"
  downsideCase: "Partner contribution is weaker, so Q4Y3 paid logos stop near the high-30s and effective CAC moves toward the high-$50Ks."
  baseCase: "CAC is about $46.9K using Y2-Y3 S&M spend divided by 41 modeled new paid logos."
  upsideCase: "Consultancy and insurer referrals keep effective CAC in the low-$40Ks while lifting the customer ramp."
  y3RevenueImpactK: -506.4
  cashImpactK: -378.1
- variable: "churn"
  downsideCase: "Steady-state churn behaves closer to 2.5% monthly, trimming late-year renewals and expansion cohorts."
  baseCase: "Unit economics use 1.5% monthly churn and the P&L assumes only modest net losses before Y4."
  upsideCase: "Retention behaves closer to 1.0% monthly once enforcement policies and evidence exports become part of the workflow."
  y3RevenueImpactK: -231.0
  cashImpactK: -98.5
- variable: "sales cycle"
  downsideCase: "Security reviews and deployment approvals slip by about two months, pushing several starts out of the modeled quarters."
  baseCase: "Triggered deals stay close to the BP target of sub-90-day pilot closes and roughly a three-month pilot-to-production motion."
  upsideCase: "Reference deployments and partner playbooks pull most new starts forward by roughly one month."
  y3RevenueImpactK: -184.2
  cashImpactK: -149.7
- variable: "gross margin"
  downsideCase: "Y3 average gross margin lands near 71% instead of the low-73% range because deployments stay more custom."
  baseCase: "Y3 average gross margin is about 72.9% and Q4Y3 exits at roughly 74%."
  upsideCase: "Y3 average gross margin pushes into the mid-73%s as the deployment playbook standardizes faster."
  y3RevenueImpactK: 0.0
  cashImpactK: -54.1
- variable: "hiring pace"
  downsideCase: "One extra platform hire and earlier GTM / ops hiring are pulled forward before repeatability is proven."
  baseCase: "Hiring follows the sequencing in business-plan.yaml and exits Y3 at 12 FTE."
  upsideCase: "Late Y3 GTM and ops hires can wait until after Q3 proof without hurting revenue delivery."
  y3RevenueImpactK: 0.0
  cashImpactK: -149.5
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Trigger[Security review trigger] --> Pilot[Paid hardening pilot]
      Pilot --> Production[Production subscription]
      Production --> Expansion[Second workspace or premium evidence modules]
      Expansion --> Revenue[Revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash and runway]
modelSanity:
- checkName: "Revenue engine"
  finding: "Base-case revenue comes from growing paying logos from 4 at Y1 exit to 45 by Q4Y3 while mature accounts rise toward roughly $95K ARR as second-workspace and evidence modules attach."
- checkName: "Must go right"
  finding: "Deployment speed and partner-sourced pipeline have to improve enough that a 12-FTE team can support 45 logos without pulling forward a larger quota-carrying sales bench."
- checkName: "Model breaks if"
  finding: "If sales cycles slip by about two months or second-workspace attach stays well below 35%, the downside case goes cash-negative before the company finishes Y3."
- checkName: "Next-round proof"
  finding: "The seed-ready proof point is 12-14 paid logos with low-false-positive production enforcement, 35%+ second-workspace expansion, and a reusable partner-led deployment playbook."
sanityChecks:
  ruleOf40: "Y3 growth 245.9% + EBITDA margin -21.1% = 224.9% (inflated by the small Y2 base)."
  burnMultiple: "Y3 burn multiple is about 0.2x (($596.3K burn) / ~$2.8M net new ARR at a $90K steady-state ACV); Y2 is still the heavier build year."
  revenuePerFte: "$235.9K Y3 using Q4Y3 headcount of 12 (benchmark $200–400K SaaS)"
  flags:
  - "The base case exits Y3 with 45 paying logos, so it still underwrites below the 60-account SOM shorthand in research.yaml and needs second-workspace expansion to reach similar protected-workspace volume."
  - "Cash is modeled from EBITDA and ignores collections timing, annual prepaids, and any capitalized software spend."
