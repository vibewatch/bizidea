market:
  tam:
    value: $400M
    rationale: >-
      测算基于约 8,000 家中型软件与 AI 平台客户，长期乘以约 $50k ACV；采用率的支撑是 87% 的生成式 AI 部署或试点比例和 72% 的企业每周使用率，但今天真正"AI 主导"运营的公司仍是少数，这让运行时安全这块切片，比 AI 支出的整体标题数字要小 [17][22][25][31][32][33]。
    isEstimate: true
    sourceRefs:
      - 17
      - 22
      - 25
      - 31
      - 32
      - 33
  sam:
    value: $72M
    rationale: >-
      把 TAM 收窄到约 1,600 家已经自建客户专属智能体工作流的北美和欧洲垂直 SaaS 或 AI 平台团队，乘以约 $45k ACV [6][9][10][31][33]。
    isEstimate: true
    sourceRefs:
      - 6
      - 9
      - 10
      - 31
      - 33
  som:
    value: $3.6M
    rationale: >-
      第 3 年落地扩张进最高风险的生产流程后，达到约 60 个客户、混合 ARR 约 $60k；在相邻密钥管理预算已经存在的前提下，靠创始人主导销售实现这个数字是合理的 [17][22][25][26][29]。
    isEstimate: true
    sourceRefs:
      - 17
      - 22
      - 25
      - 26
      - 29
bottomUpSizingDrivers:
  - driver: "潜在目标客户数（TAM）"
    value: "约 8,000 个账户"
    source: "基于信源 31、32、33 加上自建工作流假设测算"
  - driver: "滩头客户数（SAM）"
    value: "约 1,600 个账户"
    source: "基于信源 6、9、10、31、33 测算"
  - driver: "混合 ACV"
    value: "$45k-$60k/年"
    source: "基于信源 17、22、25、28 做基准对比"
  - driver: "第 3 年客户数（SOM）"
    value: "约 60 个账户"
    source: "创始人主导的共创客户模型；测算得出"
categoryDynamics:
  growthRate: "2025 年公开检测到的硬编码密钥同比增长 34% [29]"
  growthRateSourceRefs:
    - 29
  tailwinds:
    - point: >-
        公开证据显示，一次智能体运行时入侵，就能演变成多系统密钥窃取和破坏性数据库勒索 [1][2][3]。
      sourceRefs:
        - 1
        - 2
        - 3
    - point: >-
        企业生成式 AI 的采用范围广、预算也在增加，运行时管控产品可以搭上现有平台项目的顺风车，而不用从零创造需求 [31][32][33]。
      sourceRefs:
        - 31
        - 32
        - 33
    - point: >-
        AI 身份、密钥泛滥和权限债务的增长速度，已经超过传统 IAM 团队能从容治理的极限 [26][29][30][34]。
      sourceRefs:
        - 26
        - 29
        - 30
        - 34
  headwinds:
    - point: >-
        云工作负载不用另买新平台，就已经能用上工作负载身份、密钥轮换和临时凭证 [18][19][20][21]。
      sourceRefs:
        - 18
        - 19
        - 20
        - 21
    - point: >-
        对还没真正感受到运行时凭证之痛的买家来说，AWS、Google 和 Azure 的提示词护栏套件可能看起来已经"够接近"了 [37][38][39]。
      sourceRefs:
        - 37
        - 38
        - 39
    - point: >-
        ICP 目前仍然很窄，因为今天只有一部分生成式 AI 采用者，在生产环境跑自建的、客户专属的工具调用型流程 [31][33]。
      sourceRefs:
        - 31
        - 33
competitors:
  - name: HashiCorp Vault
    stage: "现有厂商"
    wedge: "动态密钥、多样的认证方式，以及企业级密钥治理。"
    pricing: "托管版 HCP Vault Dedicated 按用量付费，另加按客户端计费；企业自建版本按报价。"
    strength: "生态深厚，租约模型成熟，Kubernetes 集成能力强。"
    weaknessVsUs: "本质上不感知流程结构；租约不绑定智能体步骤拓扑，也没有运行中途的熔断逻辑。"
    sourceRefs:
      - 22
      - 23
  - name: Akeyless
    stage: "成长期"
    wedge: "无需密钥库的动态密钥，以及非人类身份编排。"
    pricing: "提供入门套餐；更高客户端和动态密钥额度走企业/定制方案。"
    strength: "非人类身份（NHI）定位清晰，支持混合部署，动态密钥覆盖面广。"
    weaknessVsUs: "运行时上下文仍然是通用的，不掌握 Langflow 或 Flowise 的执行图。"
    sourceRefs:
      - 24
      - 25
  - name: CyberArk
    stage: "现有厂商"
    wedge: "覆盖面广的机器身份安全，加上面向企业环境的工作负载身份治理。"
    pricing: "企业定制定价。"
    strength: "有一套董事会层面的身份叙事，机器身份做得深，合规可信度也强。"
    weaknessVsUs: "平台打法偏重，相对于按智能体步骤签发密钥而言，管控粒度偏粗。"
    sourceRefs:
      - 26
      - 40
  - name: Teleport Machine & Workload Identity
    stage: "成长期"
    wedge: "面向机器、机器人、CI/CD 和工作负载的短期证书身份。"
    pricing: "社区版对小公司免费；企业版按用量报价。"
    strength: "可审计性出色，非人类身份原语也很扎实。"
    weaknessVsUs: "更适合基础设施访问场景，而不是在智能体运行中代理厂商、数据库和应用层的密钥。"
    sourceRefs:
      - 27
      - 28
regulatoryTechnicalConstraints:
  - point: >-
      Langflow 不提供应用层的租户隔离；安全的多租户部署需要在应用之外自行做进程、磁盘、网络和数据库隔离 [6]。
    sourceRefs:
      - 6
  - point: >-
      Flowise 的生产模式依赖正确的代理配置、队列模式和外部密钥存储，才能避免全局限流和不安全的密钥处理 [10][11]。
    sourceRefs:
      - 10
      - 11
  - point: >-
      工作负载身份的模式因云而异，跨云的策略和密钥代理，天生就是集成密集型的工作 [19][20][21]。
    sourceRefs:
      - 19
      - 20
      - 21
  - point: >-
      最小权限和审计方面的要求，增长速度已经超过了那些为人类用户或长期服务账号设计的企业 IAM 工具 [13][14][16][34]。
    sourceRefs:
      - 13
      - 14
      - 16
      - 34
validationSignals:
  - point: >-
      一起真实的公开事件，完整演示了目标运行时家族里的失效链条——从 RCE 到密钥窃取，再到破坏性数据库操作 [1][2][3][4]。
    sourceRefs:
      - 1
      - 2
      - 3
      - 4
  - point: >-
      Langflow 和 Flowise 发布的生产/自建指南，都默认操作者要自己管理密钥、代理、存储或隔离 [6][10][11]。
    sourceRefs:
      - 6
      - 10
      - 11
  - point: >-
      机器身份和密钥泛滥在加速蔓延，给了安全团队更充分的预算和政策理由，去重新审视运行时管控 [26][29][30][34]。
    sourceRefs:
      - 26
      - 29
      - 30
      - 34
  - point: >-
      企业生成式 AI 的采用已经足够普及，一个窄的运行时安全切口，完全可以搭上现有 AI 平台项目的顺风车 [31][32][33]。
    sourceRefs:
      - 31
      - 32
      - 33
openQuestions:
  - >-
    有多少 100-300 人规模的垂直 SaaS 厂商，已经在自管 VPC 里跑客户专属的 Langflow、Flowise 或 MCP 类工作流？
  - >-
    安全审查之后，哪类密钥——模型密钥、数据库凭证、对象存储密钥，还是内部 API 令牌——最能推动紧迫的转化？
  - >-
    买家会先接受一个不依赖具体框架的代理或 sidecar，还是坚持要每个智能体运行时都有深度原生插件？
  - >-
    保险公司和企业采购团队，能多快把对智能体运行时的担忧，转化成一项专门的管控要求，而不是一句"把你的密钥库用好一点"？
