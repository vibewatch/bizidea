fiveForces:
  supplierPower:
    score: 4
    rationale: >-
      云平台和模型厂商掌控着身份原语、密钥 API 和护栏接口——任何运行时安全层都得跟它们集成，而它们随时可能把相邻管控功能捆绑进自己的产品 [17][19][20][21][37][38][39]。
    sourceRefs:
      - 17
      - 19
