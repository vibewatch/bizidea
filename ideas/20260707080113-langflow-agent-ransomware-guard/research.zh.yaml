      - 39
  buyerPower:
    score: 4
    rationale: >-
      早期买家自己就能把云密钥存储、Vault 类工具和人工管控拼凑起来，所以新厂商必须证明自己遏制更快、运维负担更小，而不只是又一块仪表盘 [10][17][22][25][26]。
