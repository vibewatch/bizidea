        - 26
  dataMoats:
    - point: >-
        跨客户记录哪些智能体节点合理请求了哪些凭证，能比任何单一运营方靠自己更快地训练出默认策略和异常阈值 [1][13][34]。
      sourceRefs:
        - 1
        - 13
        - 34
    - point: >-
        被拦截或暂停运行留下的事件回放数据，会沉淀成一份专有语料库，用来分辨哪些是预期内的自动化重试、哪些是恶意扩散 [1][2][35]。
      sourceRefs:
        - 1
        - 2
        - 35
  geographicConsiderations:
    - point: >-
        优先聚焦北美和英国/欧盟——这份证据基础里采用度、保险和身份治理信号最强的地区——但产品定位要做成跨云，而不是锁定单一地区 [26][31][32][33]。
