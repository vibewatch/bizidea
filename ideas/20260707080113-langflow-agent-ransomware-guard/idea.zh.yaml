topRisks:
  - name: "集成碎片化"
    description: "Langflow、Flowise、自定义 Python 运行器和 MCP 服务器暴露凭证的方式各不相同，可能拖慢产品覆盖的速度。"
    mitigation: "先做 Langflow 和 Flowise，配一个不依赖具体框架的凭证代理 sidecar，等代理在早期部署中站稳脚跟，再加更深的适配器。"
  - name: "误报式遏制"
    description: "过于激进的熔断机制可能误停正常的生产自动化，让工程团队不再信任这款产品。"
    mitigation: "先以观察模式起步，学习每条流程的行为基线，让客户按策略自行选择二次审批、暂停还是熔断。"
  - name: "现有厂商捆绑"
    description: "一旦这个切口被看见，密钥库、云 IAM 或智能体安全厂商都可能加上基础的短期令牌功能。"
    mitigation: "靠对流程拓扑的感知能力、运行途中的熔断开关，以及跨客户执行数据集来做差异化，同时与存储和检测领域的现有厂商结盟。"
