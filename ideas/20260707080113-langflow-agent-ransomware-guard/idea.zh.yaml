jobsToBeDone:
  - job: >-
      上线新的客户专属智能体流程时，帮平台安全团队去掉共享的生产密钥，又不耽误部署进度，让工作流能顺利上线并通过安全审查。
    currentAlternative: "Kubernetes secrets 加手动密钥库配置和例外审批文档"
    successMetric: "使用按步授权访问的生产智能体节点占比，以及拿到安全审批所需天数"
  - job: >-
      当可疑的智能体运行开始调用陌生工具或疯狂消耗 token 时，帮事件响应人员冻结爆炸半径、只轮换受影响的那部分权限，防止一次流程被攻陷演变成跨租户泄露。
    currentAlternative: "SIEM 告警、pod 隔离和一刀切式的全量密钥轮换"
    successMetric: "平均遏制耗时，以及每起事件波及的下游系统数量"
