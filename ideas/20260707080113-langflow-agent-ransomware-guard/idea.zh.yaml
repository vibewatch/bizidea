problem: >-
  自建智能体的团队为求上线快，直接把模型厂商密钥、数据库凭证和内部 API 密钥一股脑塞进 Langflow 类运行时。这份图省事的代价是：一台有漏洞的流程主机就能变成跳板——密钥被窃、攻击者横向渗透，还能以机器速度对生产系统反复重试。安全团队有密钥库和网络策略，却缺一层运行时控制——它得清楚哪个智能体步骤该拿哪把密钥、能用多久，以及流程行为什么时候已经从正常自动化滑向该被遏制的状态。
targetUser:
  primary: >-
    垂直领域 B2B SaaS 厂商里负责平台安全或 AI 平台工程的负责人——公司在自己的 VPC 里跑着面向客户的 Langflow 或 Flowise 自动化流程。
  secondary: >-
    负责智能体运行时 Kubernetes 密钥、模型厂商账号和生产数据库访问权限的资深安全工程师与 DevOps 负责人。
  buyer: "工程副总裁、CISO 或平台负责人"
startupThesis:
  nonObviousInsight: >-
    智能体安全里第一个站得住的控制点，不是又一个提示词监控器或密钥扫描器，而是运行时内部的密钥签发路径。一旦攻击型智能体能在得手后自我修复载荷，能赢的系统就是把每一个工具或模型调用步骤都变成短期、受策略约束的访问权限，并能在被盗密钥演变成跨系统大规模泄露之前掐断这次运行。
  beachhead: >-
    在自有 VPC 里跑客户专属 Langflow 或 Flowise 自动化的 B2B SaaS 厂商——每个租户的流程都握着生产数据库凭证和多家模型厂商的密钥。
  wedge: >-
    一层运行时密钥隔离平面：用按步授权的临时凭证取代共享环境密钥，记录每一张工具调用图，并在被攻陷的流程扩散到各家模型厂商和数据存储之前跳闸断路。
  whyNowCatalyst: >-
    JadePuffer 把一个 Langflow 漏洞变成了生产数据库入侵、多模型密钥窃取和机器速度的勒索软件执行——运行时密钥隔离，对任何在生产环境跑自建智能体的团队来说，都成了迫在眉睫的管控缺口。
  ventureScalePath: >-
    先从 Langflow 和 Flowise 的运营方切入，再扩展到 MCP 服务器、工作流搭建工具、企业内部 AI 平台，最终成为所有具备行动能力的 AI 工作负载通用的身份、出站流量和熔断层。
solution: >-
  这家创业公司在智能体运行时和每一个依赖密钥的下游——模型厂商、数据库、向量库、消息队列、内部 API——之间，插入一层策略与凭证 sidecar。不再把厂商或数据库的原始密钥直接挂进容器，而是只在获批节点执行时才签发短期凭证或签名代理会话，并严格绑定该步骤被允许触达的模型、租户和目标地址。系统会为每条流程构建实时执行图：一旦被攻陷的节点突然调用陌生工具、疯狂重试载荷，或者跨越租户边界，系统就会暂停该次运行、轮换已暴露的权限，并留存可回放的证据供事后调查。团队可以照常用自己的 Langflow 或 Flowise 项目，但多了一道可强制执行的密钥边界，以及通用密钥管理器给不了的一键熔断开关。随着时间推移，公司会沉淀一套关于生产智能体应用中正常凭证与工具使用模式的专有数据集，让防护效果和未来攻击的风险评估都越来越准。
goToMarketSeed:
  firstCustomer: >-
    一家 100-300 人规模垂直 SaaS 厂商的 工程副总裁——公司自建 Langflow 跑客户专属的支持或工作流自动化，目前把 Anthropic、OpenAI 和生产数据库凭证都当作可复用的共享密钥存放。
  buyingTrigger: >-
    网络保险公司、企业客户或董事会安全审查，会在 Langflow 事件之后追问：一旦某个智能体流程被攻陷，该怎么遏制？这逼着团队必须证明，共享的厂商和数据库密钥不会跨租户泄露。
  currentAlternative: >-
    云密钥管理器和 Kubernetes secrets、手动轮换密钥、粗粒度网络策略，以及临时拼凑的事件响应手册。
  switchingReason: >-
    这款产品让开发者继续用开源智能体框架，同时去掉长期有效的共享凭证，加上通用密钥库、CNAPP 和 SIEM 告警都给不了的、能感知流程的熔断开关。
  pricingHypothesis: >-
    按受保护的智能体工作区数量和每月凭证调用次数计费的年度订阅，再针对安全团队推出高级事件回放与策略包作为增值项。
whyNow:
  - point: >-
      600 多次有针对性的载荷，加上 31 秒内自我修正的失败路径，说明遏制必须在运行时内联发生，而不是等人工分析师看完告警之后才动手。
    signalRefs: ["智能体载荷循环已能自我修复"]
    sourceRefs: [1]
  - point: >-
      攻击者靠一个 Langflow 立足点就打到了生产环境的 MySQL 和 Nacos，证明开源智能体运行时离配置和数据系统已经近到——一次入侵就能迅速连锁扩散。
    signalRefs: ["一台智能体主机就能打通核心系统"]
    sourceRefs: [1]
  - point: >-
      OpenAI、Anthropic、DeepSeek 和 Gemini 的凭证被一并窃取，说明多模型密钥隔离已经是当下的运营刚需，而不是纸面上的最佳实践。
    signalRefs: ["多模型密钥正在放大泄露损失"]
    sourceRefs: [2]
  - point: >-
      人类只需挑目标，执行交给模型——智能体勒索软件不需要完全自主，就能变成一种可复制、可实操的现实威胁。
    signalRefs: ["人类攻击者只需负责掌舵"]
    sourceRefs: [1, 2]
differentiator: >-
  密钥管理器解决的是存储和轮换，但通常把一把长期有效的凭证交给运行时之后就撒手不管了。智能体安全厂商大多盯着提示词滥用、策略审查或事后监控，却漏掉了流程把意图变成带凭证执行动作的那个瞬间。这家公司守的正是这个执行边界：按步铸造访问权限、理解预期的流程拓扑，还能在运行途中掐断或轮换权限，而不用逼团队放弃现有框架。它的护城河靠深度集成，加上一份跨框架、记录正常工具调用与密钥使用行为的数据集不断加厚——这是现有厂商看不到的东西。
