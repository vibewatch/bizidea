      Production --> Expansion[Second workspace or premium evidence modules]
      Expansion --> Revenue[Revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash and runway]
modelSanity:
- checkName: "收入引擎"
  finding: "基准情景的收入，来自付费账号从 Y1 末的 4 个增长到 Q4Y3 的 45 个，同时随着第二工作区和证据模块附着，成熟账户的合同价值升向约 $95K ARR。"
- checkName: "必须成立的前提"
  finding: "部署速度和合作伙伴带来的销售管道必须提升到——12 个 FTE 的团队就能支撑 45 个账号，而不用提前扩充更大规模的销售指标团队。"
- checkName: "模型失效的条件"
  finding: "如果销售周期延后约两个月，或者第二工作区附着率明显低于 35%，下行情景会在公司走完 Y3 之前就出现现金为负。"
- checkName: "下一轮融资的验证点"
  finding: "具备 seed 轮融资条件的验证点是：12-14 个付费账号、低误报的生产级强制执行、35% 以上的第二工作区扩展率，以及一套可复用的合作伙伴主导部署手册。"
sanityChecks:
  ruleOf40: "Y3 增长率 245.9% + EBITDA 利润率 -21.1% = 224.9%（因 Y2 基数较小而被推高）。"
  burnMultiple: "Y3 烧钱倍数约为 0.2x（$596.3K 烧钱 / 约 $2.8M 净新增 ARR，按 $90K 稳态 ACV 计算）；Y2 仍是投入更重的建设年份。"
  revenuePerFte: "Y3 人均收入 $235.9K，按 Q4Y3 的 12 人计算（SaaS 基准区间为 $200K–$400K）"
  flags:
  - "基准情景 Y3 末有 45 个付费账号，仍低于 research.yaml 里 60 个账户的 SOM 速记数字，需要靠第二工作区扩展才能在受保护工作区总量上接近这一水平。"
  - "现金是从 EBITDA 推算的，没有考虑回款时点、年度预付款和任何资本化的软件支出。"
  - "客户爬坡曲线是净值，Y4 之前没有做队列层面的流失建模，因此流失率的敏感性分析承担着真实的风险。"
  - "Q4Y3 转正的 EBITDA，依赖合作伙伴带来的需求和标准化部署；如果试点仍然偏定制化，CAC 和毛利率很可能会同时恶化。"
