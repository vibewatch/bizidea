slug: agent-secret-fuse
date: "2026-07-07"
currency: USD
modelStartMonth: "2026-08"
assumptions:
- id: A1
  name: "模型起始月份"
  value: "2026-08"
  unit: "YYYY-MM"
  source: "[BP date 2026-07-07] 财务模型从计划日期之后的首个完整月份开始建模。"
- id: A2
  name: "期初现金/pre-seed 融资额"
  value: "$3.2M"
  unit: "USD"
  source: "[BP fundingAsk round pre-seed + BP fundingAsk targetFundingRangeUsd $2.5-3.5M + 模型现金低点] 基准情景取区间偏上的中段值，因为这个切口集成工作量大，需要在原定 18 个月验证计划之外再留 6 个月缓冲。"
- id: A3
  name: "起始付费客户数"
  value: "0"
  unit: "count"
  source: "[BP milestones 0–12 months] 公司从零收入起步，必须先签下共创客户和试点。"
- id: A4
  name: "客户定义"
  value: "一个付费客户账号，处于付费加固试点或生产订阅状态；当同一账号内挂上更多受保护工作区和高级证据模块时，ARPU 会随之上升。"
  unit: "definition"
  source: "[BP gtm.wedge + BP businessModel.unitOfValue + BP gtm.pricing] customersEop 统计的是付费账号数，定价仍按每个账号内的工作区计费。"
- id: A5
  name: "付费试点收入兑现"
  value: "约 3 个月累计 $18K（每个试点账号约 $6K/月）"
  unit: "USD/account"
  source: "[BP gtm.pricing 及 investorMemo.firstCustomer.initialContract 中 $15k-$25k 的付费试点] 建模时取略低于中点的水平，反映早期部署的折扣。"
- id: A6
  name: "首份生产订阅"
  value: "首个受保护工作区的 $60K ARR（约 $5K/月）"
  unit: "USD/account/year"
  source: "[BP gtm.pricing 转化为约 $45k-$75k 的年度合同价值] 取所述生产区间的中点。"
- id: A7
  name: "成熟期混合账户价值"
  value: "到 Q4Y3 时约 $95K ARR（已实现月收入约 $7.9K）"
  unit: "USD/account/year"
  source: "[BP businessModel.expansionLevers + BP milestones 中 35% 以上账户的第二工作区扩展 + Research market.som 约 $60K 混合 ARR] 随着第二工作区、用量和证据模块陆续加上，成熟账户的合同价值会高于首个工作区的初始合同。"
- id: A8
  name: "第二工作区扩展"
  value: "35% 的生产账户会在约 9 个月内新增第二个受保护工作区；到 Q4Y3 的 45 个客户账号，意味着约 61 个受保护工作区。"
  unit: "expansion rate"
  source: "[BP gtm.funnelTargets 中生产环境客户 9 个月内 35% 以上新增第二工作区 + BP milestones 12–24 months] 这一项把客户账号数和按工作区计价的产品价值连接起来。"
- id: A9
  name: "净付费账号爬坡曲线"
  value: "M6 时 1 个付费账号，M12 时 4 个，Q4Y2 时 14 个，Q4Y3 时 45 个"
  unit: "customersEop"
  source: "[BP experimentRoadmap 中 3–6 个月内 3 个付费试点 + BP milestones 中第 12 个月 2 份生产合同、12–24 个月 10-15 个生产客户，以及第 3 年扩展验证] 基准情景比 60 个客户的 SOM headline 数字保守，但通过扩展在受保护工作区总量上能接近这个水平。"
- id: A10
  name: "收入确认惯例"
  value: "收入等于期末付费账号数，乘以该期间每个账号的混合月度已实现收入。"
  unit: "formula"
  source: "[BP businessModel.revenueStreams + BP gtm.pricing] 这样可以让损益表直接对应到客户数 × ARPU。"
- id: A11
  name: "毛利率爬坡"
  value: "Y1 后段为 55-61%，Y2 为 64-70%，Y3 为 71-74%"
  unit: "gross margin percent"
  source: "[BP businessModel.targetGrossMarginPct 72 + BP operatingAssumptions 中关于连接器覆盖和策略调优的假设] 部署初期偏服务化，毛利率低于目标值，等打法固化后回升到 70% 出头。"
- id: A12
  name: "招聘时间线"
  value: "M1 创始人 CEO + 创始工程师；M2 安全/平台工程师；M4 解决方案工程师；M7 安全产品负责人；M10 合作伙伴负责人；M15 第二位 GTM 员工；M18 第二位解决方案工程师；M20 第三位平台工程师；M22 客户成功/运营；M28 第三位 GTM 员工；M30 第二位客户成功/运营。"
  unit: "timeline"
  source: "[BP team + BP strategicChoices.sequencingRationale + 创业融资经验法则] 招聘始终以部署优先，等首批付费验证点出现后才增加 GTM 人力。"
- id: A13
  name: "创始人全成本薪酬"
  value: "$175K"
  unit: "USD/year"
  source: "[BP team Founder CEO + 创业融资经验法则] 精简的创始人现金薪酬，加上工资税和福利。"
- id: A14
  name: "平台工程全成本薪酬"
  value: "$205K/FTE"
  unit: "USD/year"
  source: "[BP team Founding eng 及 Security / platform engineer + 创业融资经验法则] 反映小型创业公司里资深安全与平台人才的薪酬水平。"
- id: A15
  name: "解决方案工程全成本薪酬"
  value: "$170K/FTE"
  unit: "USD/year"
  source: "[BP team Solutions engineer + 创业融资经验法则] 面向客户做部署的岗位，含薪资负担。"
- id: A16
  name: "安全产品负责人全成本薪酬"
  value: "$190K"
  unit: "USD/year"
  source: "[BP team Security product lead + 创业融资经验法则] 资深产品/安全负责人，把试点经验转化为可复用的策略包。"
- id: A17
  name: "GTM/合作伙伴全成本薪酬"
  value: "$180K/FTE"
  unit: "USD/year"
  source: "[BP team Partnerships lead + BP gtm.channels + 创业融资经验法则] 在扩大销售指标团队之前，精简的企业销售与合作伙伴管理成本。"
- id: A18
  name: "客户成功/运营全成本薪酬"
  value: "$145K/FTE"
  unit: "USD/year"
  source: "[BP operations + 创业融资经验法则] 覆盖售后落地采纳、供应商管理、财务和行政支持。"
- id: A19
  name: "薪酬在损益表科目间的分摊"
  value: "创始人 70% 计入 S&M / 30% 计入 G&A；平台工程和安全产品 100% 计入 R&D；解决方案工程 50% 计入 S&M / 50% 计入 R&D；GTM 100% 计入 S&M；第一位客户成功/运营员工 60% 计入 S&M / 40% 计入 G&A；第二位客户成功/运营员工 30% 计入 S&M / 70% 计入 G&A。"
  unit: "allocation"
  source: "[BP role rationales + BP operations] 把薪酬映射到运营模型使用的各功能科目。"
- id: A20
  name: "非薪酬类销售与市场支出"
  value: "M1-3 为 $4K/月，至 Q4Y1 升至 $8K/月，至 Q4Y3 再逐步升至 $25K/月"
  unit: "USD/month"
  source: "[BP gtm.channels + 创业融资经验法则] 覆盖创始人主动外呼、合作伙伴差旅、研讨会和轻量级企业 GTM 工具。"
- id: A21
  name: "非薪酬类研发支出"
  value: "M1-3 为 $8K/月，至 Q4Y1 升至 $11K/月，至 Q4Y3 再逐步升至 $22K/月"
  unit: "USD/month"
  source: "[BP product + BP operations + 创业融资经验法则] 覆盖云资源、日志、安全测试和连接器基础设施。"
- id: A22
  name: "非薪酬类 G&A 支出"
  value: "M1-6 为 $3K/月，至 Q4Y1 升至 $4K/月，至 Q4Y3 再逐步升至 $12K/月"
  unit: "USD/month"
  source: "[BP operations + 创业融资经验法则] 覆盖法务、会计、保险和行政工具。"
- id: A23
  name: "现金转换惯例"
  value: "现金变动等于 EBITDA。"
  unit: "formula"
  source: "[创业融资经验法则] 假设在 pre-seed 规模下，税费、资本支出、债务偿还和营运资金时点，相对于经营性烧钱都不重大。"
- id: A24
  name: "单位经济流失率假设"
  value: "稳态月流失率 1.5%；36 个月的客户爬坡曲线只扣除了早期少量流失，并未做队列层面的流失建模。"
  unit: "percent per month"
  source: "[面向早期企业安全基础设施的创业融资经验法则] 已部署的管控措施在客户采用后应该有较高黏性，但模型仍比成熟的基础设施类 SaaS 更保守。"
- id: A25
  name: "CAC 惯例"
  value: "约 $47K = Y2-Y3 的 S&M 支出 / 41 个模型测算新增付费账号"
  unit: "USD/new paid logo"
  source: "[基于 Y2-Y3 S&M 支出的模型测算 + BP gtm.funnelTargets] 采用的是模型里实际建模的创始人加合作伙伴打法，而不是自助式 SaaS 的假设。"
- id: A26
  name: "用于定额的融资里程碑"
  value: "融资规模要能支撑达到 12-14 个付费账号、证明 35% 以上的第二工作区扩展率，并打包出一套可复用的合作伙伴主导部署打法，同时在原定 18 个月验证计划之外再留约 6 个月缓冲。"
  unit: "milestone"
  source: "[BP fundingAsk targetFundingRangeUsd + BP fundingAsk runwayMonths 18 + BP milestones 12–24 months + 模型现金曲线] 这就是模型采用 $3.2M 融资额、而非区间低值的原因。"
