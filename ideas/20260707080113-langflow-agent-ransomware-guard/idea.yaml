jobsToBeDone:
  - job: >-
      When launching a new customer-specific agent flow, help the platform security team remove shared production secrets without blocking deployment, so they can ship the workflow and pass security review.
    currentAlternative: "Kubernetes secrets plus manual vault configuration and exception documents"
    successMetric: "Percentage of production agent nodes using step-scoped access and days to security approval"
  - job: >-
      When a suspicious agent run begins calling unfamiliar tools or draining tokens, help the incident responder freeze blast radius and rotate only the affected access, so one compromised flow does not become a cross-tenant breach.
    currentAlternative: "SIEM alerts, pod isolation, and blanket credential rotation"
    successMetric: "Mean time to contain and number of downstream systems reached per incident"
