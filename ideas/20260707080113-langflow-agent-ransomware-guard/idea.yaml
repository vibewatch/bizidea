topRisks:
  - name: "Integration fragmentation"
    description: "Langflow, Flowise, custom Python runners, and MCP servers expose credentials differently, which could slow product coverage."
    mitigation: "Start with Langflow and Flowise plus a framework-agnostic credential proxy sidecar, then add deeper adapters only after the proxy wins initial deployments."
  - name: "False-positive containment"
    description: "Aggressive circuit breakers could pause legitimate production automations and make engineering teams distrust the product."
    mitigation: "Begin in observe mode, learn per-flow baselines, and let customers choose step-up approval, pause, or kill actions by policy."
  - name: "Incumbent bundling"
    description: "Vault, cloud IAM, or agent-security vendors could add basic short-lived token features once the wedge is visible."
    mitigation: "Differentiate on flow-topology awareness, mid-run kill switches, and the cross-customer execution dataset while partnering with storage and detection incumbents."
