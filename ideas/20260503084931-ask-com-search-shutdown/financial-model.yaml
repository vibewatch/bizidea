    y3RevenueImpactK: -40.0
    cashImpactK: -180.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Leads --> PaidPilots
      PaidPilots --> ConvertedCustomers
      ConvertedCustomers --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: Revenue engine
    finding: "Base-case revenue comes from two Y1 pilots converting into recurring analytics customers and a partner-assisted ramp to 16.5 customer equivalents by Q4Y3 at $135K blended annual value."
  - checkName: Must go right
    finding: "The company has to prove retained-query lift fast enough that at least half of pilots renew into software revenue instead of ending as one-off services projects."
  - checkName: Model breaks if
    finding: "If migration frequency or conversion only supports 12.5 customer equivalents by Q4Y3, cash falls to roughly breakeven in the downside case."
  - checkName: Next-round proof
    finding: "The next financing is justified once the company can show about 8 customer equivalents, recurring renewals, and partner-led launches with declining delivery effort by Q4Y2 to Q2Y3."
sanityChecks:
  ruleOf40: "Y3 growth 135.4% + EBITDA margin -26.3% = 109.1%"
  burnMultiple: "Y3 burn multiple 0.37x = $427.85K EBITDA burn / $1.15M net new ARR, improved from about 0.90x in Y2."
  revenuePerFte: "$186K Y3 using 8.75 average FTE, below the typical $200-400K SaaS benchmark and acceptable only if services intensity keeps declining."
  flags:
    - "The model still assumes enough live shutdown or replatform projects exist to grow from 3.0 to 8.0 customer equivalents by the end of Y2 even though market frequency is the main open research risk."
    - "Y3 remains EBITDA negative, so the business still depends on next-round financing rather than reaching full self-sufficiency inside this model horizon."
    - "Revenue per FTE is still a bit below normal SaaS benchmarks because implementation work remains material through Y2."
    - "If pilot-to-recurring conversion drops materially below the business-plan target of 50%+, the company behaves more like an agency and the ARPU and churn assumptions stop holding."
