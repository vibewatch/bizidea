scenarios:
  downside:
    description: "Migration volume proves narrower than expected, pilot conversion slips, and blended contract value falls toward the low end of the pricing range."
    y3RevenueK: 1134.0
    y3EbitdaK: -773.97
    cashLowPointK: 47.63
    keyAssumptionChanges:
      - "Blended annual revenue per customer falls to $120K."
      - "Q4Y3 customer equivalents end at 12.5 instead of 16.5."
      - "Partner-sourced deals do not accelerate the sales cycle."
  base:
    description: "Base case matches the operating plan with two paid pilots in Y1, 8.0 customer equivalents by end Y2, and 16.5 by end Y3 on a $135K blended contract value."
    y3RevenueK: 1628.44
    y3EbitdaK: -427.85
    cashLowPointK: 526.75
    keyAssumptionChanges:
      - "Founder-led sales land two paid pilots in Y1."
      - "At least half of pilots convert into recurring analytics subscriptions."
      - "One partner channel starts contributing by Y2 without forcing a much heavier hiring plan."
  upside:
    description: "Partner referrals and stronger retained-query proof push both conversion and recurring software mix above the base plan."
    y3RevenueK: 2184.39
    y3EbitdaK: -38.7
    cashLowPointK: 1012.06
    keyAssumptionChanges:
      - "Blended annual revenue per customer rises to $150K."
      - "Q4Y3 customer equivalents end at 20.0 because partner-led deployments work earlier."
      - "The same core team supports higher customer volume before another major hiring step."
