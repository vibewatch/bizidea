assumptions:
  - id: A1
    name: Model start month
    value: "2026-05"
    unit: month
    source: "[business-plan date 2026-05-03] model starts in the same month as plan creation."
  - id: A2
    name: Production-equivalent annual revenue per customer
    value: "135"
    unit: USDK per customer-year
    source: "[business-plan.firstCustomer.initialContract $40k-$90k pilot] plus [business-plan.gtm.pricing $25k-$100k implementation and $2k-$8k monthly platform fee]; modeled at $135k blended to reflect converted customers carrying both implementation and post-cutover analytics revenue."
  - id: A3
    name: Target gross margin
    value: "70"
    unit: percent
    source: "[business-plan.businessModel.targetGrossMarginPct]"
  - id: A4
    name: Year 1 customer-equivalent ramp
    value: "M4 0.8, M6 1.6, M9 2.1, M11 2.8, M12 3.0"
    unit: customer equivalents
    source: "[business-plan.milestones 0-12 months] two design partners, one production migration, and one recurring conversion; customer equivalents normalize pilot and production revenue into one ARPU-driven model."
  - id: A5
    name: Year 2 customer-equivalent ramp
    value: "Q1Y2 3.5; Q2Y2 5.0; Q3Y2 6.5; Q4Y2 8.0"
    unit: customer equivalents at quarter end
    source: "[business-plan.milestones 12-24 months] reach 5-8 production customers and show multi-brand expansion; ramp is net of churn."
  - id: A6
    name: Year 3 customer-equivalent ramp
    value: "Q1Y3 10.0; Q2Y3 12.0; Q3Y3 14.0; Q4Y3 16.5"
    unit: customer equivalents at quarter end
    source: "[business-plan.market.som $1.5M from 15 reachable customers in year 3] plus [business-plan.businessModel.expansionLevers] multi-brand expansion; modeled as 16.5 customer equivalents, which implies roughly 14-15 logos plus limited cross-brand expansion."
  - id: A7
    name: Monthly churn
    value: "2.0"
    unit: percent
    source: "[startup-finance heuristic: early B2B workflow software with annual contracts but meaningful project risk]"
  - id: A8
    name: Founder / CEO loaded cash compensation
    value: "110"
    unit: USDK annual per FTE
    source: "[business-plan.team Founder/CEO] plus [startup-finance heuristic: below-market pre-seed founder salary including payroll taxes and benefits]"
  - id: A9
    name: Platform engineering loaded cash compensation
    value: "155"
    unit: USDK annual per FTE
    source: "[business-plan.team Founding eng and Search/ML engineer] plus [startup-finance heuristic for senior startup technical hires]"
  - id: A10
    name: SEO implementation and solutions loaded cash compensation
    value: "125"
    unit: USDK annual per FTE
    source: "[business-plan.team SEO implementation lead and solutions engineer / partner success] plus [startup-finance heuristic for customer-facing technical implementation roles]"
  - id: A11
    name: Sales / partnerships loaded cash compensation
    value: "145"
    unit: USDK annual per FTE
    source: "[business-plan.gtm channels and partner motion] plus [startup-finance heuristic for an early account executive / partnerships hire]"
  - id: A12
    name: G&A / ops loaded cash compensation
    value: "85"
    unit: USDK annual per FTE
    source: "[startup-finance heuristic for lean finance, legal, and admin support]"
  - id: A13
    name: Hiring cadence
    value: "Founder and founding eng M1; Search/ML eng M3; SEO implementation lead M6; solutions engineer M9; sales / partnerships M16; ops M19; additional engineer M25; additional solutions hire M31; second sales hire M34"
    unit: hire months
    source: "[business-plan.team startTiming] translated into a conservative 3-year ramp that delays noncritical hires until delivery proof appears."
  - id: A14
    name: Paid demand generation and travel spend
    value: "2K/mo M1-M6; 4K/mo M7-M12; 6/8/10/12K per month across Y2 quarters; 14/16/18/20K per month across Y3 quarters"
    unit: USDK per month
    source: "[business-plan.gtm founder-led outbound and partner referrals] plus [startup-finance heuristic for disciplined early GTM spend]"
  - id: A15
    name: R&D tooling and hosting spend
    value: "3K/mo Y1; 4K/mo Q1-Q2 Y2; 5K/mo Q3-Q4 Y2; 6K/mo Q1-Q2 Y3; 7K/mo Q3-Q4 Y3"
    unit: USDK per month
    source: "[business-plan.operations privacy-safe ingestion, staging, and retained-query monitoring] plus [research.reportMemo.regulatoryLandscape] and [startup-finance heuristic]"
  - id: A16
    name: G&A overhead
    value: "5K/mo M1-M6; 7K/mo M7-M12; 8/9/10/10K per month across Y2 quarters; 11K/mo across Y3"
    unit: USDK per month
    source: "[business-plan.operations privacy, QA, and partner playbooks] plus [startup-finance heuristic for legal, accounting, insurance, and admin software]"
  - id: A17
    name: Revenue recognition convention
    value: "Average active customer equivalents in period × 11.25K monthly revenue or 33.75K quarterly revenue"
    unit: formula
    source: "[A2] and [startup-finance heuristic: early software and implementation contracts recognized ratably over the delivery period]"
  - id: A18
    name: Pre-seed cash raised at M1
    value: "2100"
    unit: USDK
    source: "[business-plan.fundingAsk.targetFundingRangeUsd $2-3M] modeled near the low end because the hiring plan stays lean until partner-led proof exists."
  - id: A19
    name: Steady-state CAC
    value: "48"
    unit: USDK per new customer equivalent
    source: "[business-plan.gtm funnelTargets] and modeled from late-Y2 sales and marketing run rate divided by new customer-equivalent additions."
  - id: A20
    name: Next-round milestone
    value: "8 customer equivalents by Q4Y2, 4 recurring analytics renewals, 2 partner-led launches, and one multi-brand expansion proof point by Q2Y3"
    unit: milestone
    source: "[business-plan.milestones 12-24 months] plus [business-plan.strategyMap.inputMetrics] on pilot conversion and additional brands per portfolio customer."
