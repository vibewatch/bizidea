scenarios:
  downside:
    description: 如果迁移量比预期更窄、试点转化变差，且混合合同价值掉到定价区间低位，业务会落入这个情景。
    y3RevenueK: 1134
    y3EbitdaK: -773.97
    cashLowPointK: 47.63
    keyAssumptionChanges:
      - 每个客户的混合年收入降到 $120K。
      - Q4Y3 的客户等价数不是 16.5，而是 12.5。
      - 伙伴带来的交易没有加快销售周期。
  base:
    description: 基础情景与经营计划一致：Y1 拿下两个付费试点，Y2 末达到 8.0 个客户等价数，Y3 末达到 16.5 个，混合合同价值为 $135K。
    y3RevenueK: 1628.44
    y3EbitdaK: -427.85
    cashLowPointK: 526.75
    keyAssumptionChanges:
      - 创始人主导销售在 Y1 拿下两个付费试点。
      - 至少一半试点会转成经常性分析订阅。
      - 到 Y2 时，至少有一个伙伴渠道开始贡献，而无需显著加重招聘。
  upside:
    description: 如果伙伴转介绍更顺、流量保留证据更强，转化率和经常性软件收入占比都会高于基础情景。
    y3RevenueK: 2184.39
    y3EbitdaK: -38.7
    cashLowPointK: 1012.06
    keyAssumptionChanges:
      - 每个客户的混合年收入提高到 $150K。
      - 由于伙伴主导部署更早跑通，Q4Y3 的客户等价数达到 20.0。
      - 在不大幅提前招聘的前提下，同一核心团队能撑起更高客户量。
sensitivity:
  - variable: ARPU
    downsideCase: $120K 混合年度客户收入
    baseCase: $135K 混合年度客户收入
    upsideCase: $150K 混合年度客户收入
    y3RevenueImpactK: -180.94
    cashImpactK: -126.66
  - variable: CAC
    downsideCase: $60K CAC，由于创始人时间和伙伴赋能仍低效
    baseCase: $48K CAC
    upsideCase: $38K CAC，前提是伙伴转介绍可重复
    y3RevenueImpactK: -80
    cashImpactK: -144
  - variable: churn
    downsideCase: 月流失率 3.0%，由于迁移无法顺利转成持续分析订阅
    baseCase: 月流失率 2.0%
    upsideCase: 月流失率 1.0%，前提是出现多品牌扩张
    y3RevenueImpactK: -220
    cashImpactK: -154
  - variable: 销售周期
    downsideCase: 从发现到生产上线需要 9 个月
    baseCase: 从发现到生产上线需要 6 个月
    upsideCase: 伙伴打法被证实后缩短到 4-5 个月
    y3RevenueImpactK: -260
    cashImpactK: -210
  - variable: 毛利率
    downsideCase: 65%，由于托管和实施支持更重
    baseCase: 70%
    upsideCase: 74%，由于经常性分析收入占比更高
    y3RevenueImpactK: 0
    cashImpactK: -81.42
  - variable: 招聘节奏
    downsideCase: 把额外工程师和第二名销售各提前两个季度招进来
    baseCase: 在证实点出现后再逐步招聘
    upsideCase: 第二个 GTM 岗位延后到客户等价数超过 14 再招
    y3RevenueImpactK: -40
    cashImpactK: -180
modelDiagram:
  title: 单位经济流程
  mermaid: |
    flowchart LR
      Leads --> PaidPilots
      PaidPilots --> ConvertedCustomers
      ConvertedCustomers --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: 收入引擎
    finding: 基础情景收入来自 Y1 的两个试点转成经常性分析客户，再叠加伙伴辅助拉动，到 Q4Y3 达到 16.5 个客户等价数，每个客户混合年价值为 $135K。
  - checkName: 必须做对的事
    finding: 公司必须够快地证实保留查询拉升，至少让一半试点续成软件收入，而不是停留在一次性服务项目。
  - checkName: 模型会失效的条件
    finding: 如果迁移频率或转化率只够撑起到 Q4Y3 的 12.5 个客户等价数，那么在 downside 情景里，现金会接近打平边缘。
  - checkName: 下一轮融资证实点
    finding: 到 Q4Y2-Q2Y3 之间，只要公司能拿出约 8 个客户等价数、经常性续约、伙伴主导上线，以及持续下降的交付强度，就够撑起下一轮融资。
sanityChecks:
  ruleOf40: Y3 growth 135.4% + EBITDA margin -26.3% = 109.1%
  burnMultiple: Y3 burn multiple 0.37x = $427.85K EBITDA burn / $1.15M net new ARR，比 Y2 约 0.90x 显著改进。
  revenuePerFte: $186K Y3，按 8.75 平均 FTE 计算；低于常见 SaaS 的 $200-400K 基准，只有在服务强度持续下降时才算合理。
  flags:
    - 模型仍假设市场里存在够多真实的关停或重构项目，能让客户等价数在 Y2 末从 3.0 长到 8.0；但市场频率恰恰是眼下研究里最大的未解风险。
    - Y3 仍是 EBITDA 负值，因此在这个模型区间内，业务仍依赖下一轮融资，尚未实现完全自给自足。
    - 由于 Y2 仍有较重实施工作，单位人效收入略低于典型 SaaS 水平。
    - 如果试点转经常性订阅的比例显著低于商业计划里 50%+ 的目标，这门生意就会更像代理商，ARPU 和流失率假设也会一起失真。
