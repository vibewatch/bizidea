slug: archive-answer-migration
date: '2026-05-03'
currency: USD
modelStartMonth: 2026-05
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-05
  unit: month
  source: '[business-plan date 2026-05-03] 模型在计划创建的同月启动。'
- id: A2
  name: 每客户生产等效年度收入
  value: '135'
  unit: USDK per customer-year
  source: '[business-plan.firstCustomer.initialContract $40k-$90k pilot] 加上 [business-plan.gtm.pricing $25k-$100k implementation and $2k-$8k monthly platform fee]；模型按 $135k 的综合值处理，以反映转化客户同时贡献实施收入与切换后的分析收入。'
- id: A3
  name: 目标毛利率
  value: '70'
  unit: percent
  source: '[business-plan.businessModel.targetGrossMarginPct]'
- id: A4
  name: 第 1 年客户等效爬坡
  value: M4 0.8, M6 1.6, M9 2.1, M11 2.8, M12 3.0
  unit: customer equivalents
  source: '[business-plan.milestones 0-12 months] 两个设计合作伙伴、一次生产级迁移和一次持续性转化；客户等效值把试点和生产收入归一到同一个 ARPU 驱动模型中。'
- id: A5
  name: 第 2 年客户等效爬坡
  value: Q1Y2 3.5; Q2Y2 5.0; Q3Y2 6.5; Q4Y2 8.0
  unit: customer equivalents at quarter end
  source: '[business-plan.milestones 12-24 months] 达到 5-8 个生产客户并展示多品牌扩展；爬坡已扣除流失。'
- id: A6
  name: 第 3 年客户等效爬坡
  value: Q1Y3 10.0; Q2Y3 12.0; Q3Y3 14.0; Q4Y3 16.5
  unit: customer equivalents at quarter end
  source: '[business-plan.market.som $1.5M from 15 reachable customers in year 3] 加上 [business-plan.businessModel.expansionLevers] 的多品牌扩展；模型设为 16.5 个客户等效值，意味着大约 14-15 个 logo 加少量跨品牌扩展。'
- id: A7
  name: 月流失率
  value: '2.0'
  unit: percent
  source: '[startup-finance heuristic: early B2B workflow software with annual contracts but meaningful project risk]'
- id: A8
  name: 创始人 / CEO 全包现金薪酬
  value: '110'
  unit: USDK annual per FTE
  source: '[business-plan.team Founder/CEO] 加上 [startup-finance heuristic: below-market pre-seed founder salary including payroll taxes and benefits]'
- id: A9
  name: 平台工程全包现金薪酬
  value: '155'
  unit: USDK annual per FTE
  source: '[business-plan.team Founding eng and Search/ML engineer] 加上 [startup-finance heuristic for senior startup technical hires]'
- id: A10
  name: SEO 实施与解决方案全包现金薪酬
  value: '125'
  unit: USDK annual per FTE
  source: '[business-plan.team SEO implementation lead and solutions engineer / partner success] 加上 [startup-finance heuristic for customer-facing technical implementation roles]'
- id: A11
  name: 销售 / 合作伙伴全包现金薪酬
  value: '145'
  unit: USDK annual per FTE
  source: '[business-plan.gtm channels and partner motion] 加上 [startup-finance heuristic for an early account executive / partnerships hire]'
- id: A12
  name: G&A / 运营全包现金薪酬
  value: '85'
  unit: USDK annual per FTE
  source: '[startup-finance heuristic for lean finance, legal, and admin support]'
- id: A13
  name: 招聘节奏
  value: Founder and founding eng M1; Search/ML eng M3; SEO implementation lead M6; solutions engineer M9; sales / partnerships M16; ops M19; additional engineer M25; additional solutions hire M31; second sales hire M34
  unit: hire months
  source: '[business-plan.team startTiming] 转换为保守的 3 年爬坡，在交付证明出现前推迟非关键招聘。'
- id: A14
  name: 付费获客与差旅支出
  value: 2K/mo M1-M6; 4K/mo M7-M12; 6/8/10/12K per month across Y2 quarters; 14/16/18/20K per month across Y3 quarters
  unit: USDK per month
  source: '[business-plan.gtm founder-led outbound and partner referrals] 加上 [startup-finance heuristic for disciplined early GTM spend]'
- id: A15
  name: 研发工具与托管支出
  value: 3K/mo Y1; 4K/mo Q1-Q2 Y2; 5K/mo Q3-Q4 Y2; 6K/mo Q1-Q2 Y3; 7K/mo Q3-Q4 Y3
  unit: USDK per month
  source: '[business-plan.operations privacy-safe ingestion, staging, and retained-query monitoring] 加上 [research.reportMemo.regulatoryLandscape] 与 [startup-finance heuristic]'
- id: A16
  name: G&A 间接开销
  value: 5K/mo M1-M6; 7K/mo M7-M12; 8/9/10/10K per month across Y2 quarters; 11K/mo across Y3
  unit: USDK per month
  source: '[business-plan.operations privacy, QA, and partner playbooks] 加上 [startup-finance heuristic for legal, accounting, insurance, and admin software]'
- id: A17
  name: 收入确认口径
  value: Average active customer equivalents in period × 11.25K monthly revenue or 33.75K quarterly revenue
  unit: formula
  source: '[A2] 与 [startup-finance heuristic: early software and implementation contracts recognized ratably over the delivery period]'
- id: A18
  name: M1 完成的 pre-seed 融资
  value: '2100'
  unit: USDK
  source: '[business-plan.fundingAsk.targetFundingRangeUsd $2-3M] 模型取接近下限，因为在合作伙伴驱动证明出现前招聘计划保持精简。'
- id: A19
  name: 稳定期 CAC
  value: '48'
  unit: USDK per new customer equivalent
  source: '[business-plan.gtm funnelTargets]，并基于 Y2 后期销售营销支出率除以新增客户等效值建模。'
- id: A20
  name: 下一轮融资里程碑
  value: 8 customer equivalents by Q4Y2, 4 recurring analytics renewals, 2 partner-led launches, and one multi-brand expansion proof point by Q2Y3
  unit: milestone
  source: '[business-plan.milestones 12-24 months] 加上 [business-plan.strategyMap.inputMetrics] 中关于试点转化和每个投资组合客户新增品牌数的指标。'
