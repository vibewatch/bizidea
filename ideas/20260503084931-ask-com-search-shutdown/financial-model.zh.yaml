scenarios:
  downside:
    description: 迁移项目量被证明比预期更窄，试点转化下滑，综合合同价值滑向定价区间低端。
    y3RevenueK: 1134.0
    y3EbitdaK: -773.97
    cashLowPointK: 47.63
    keyAssumptionChanges:
    - 每客户综合年度收入降至 $120K。
    - Q4Y3 客户等效值收于 12.5，而不是 16.5。
    - 合作伙伴来源交易未能加快销售周期。
  base:
    description: 基准情景与运营计划一致：Y1 有两个付费试点，Y2 年底达到 8.0 个客户等效值，并在 Y3 年底以 $135K 综合合同价值达到 16.5。
    y3RevenueK: 1628.44
    y3EbitdaK: -427.85
    cashLowPointK: 526.75
    keyAssumptionChanges:
    - 创始人主导销售在 Y1 拿下两个付费试点。
    - 至少一半试点转化为持续性分析订阅。
    - 一个合作伙伴渠道在 Y2 开始贡献收入，且不需要显著更重的招聘计划。
  upside:
    description: 合作伙伴引荐和更强的保留查询证明，让转化率和持续性软件收入占比都高于基准计划。
    y3RevenueK: 2184.39
    y3EbitdaK: -38.7
    cashLowPointK: 1012.06
    keyAssumptionChanges:
    - 每客户综合年度收入提升至 $150K。
    - 由于合作伙伴主导部署更早奏效，Q4Y3 客户等效值达到 20.0。
    - 同一核心团队在下一次大规模招聘前支撑更高客户体量。
sensitivity:
- variable: ARPU
  downsideCase: 每客户综合年度收入 $120K
  baseCase: 每客户综合年度收入 $135K
  upsideCase: 每客户综合年度收入 $150K
  y3RevenueImpactK: -180.94
  cashImpactK: -126.66
- variable: CAC
  downsideCase: CAC 为 $60K，因为创始人时间与合作伙伴赋能仍然低效
  baseCase: CAC 为 $48K
  upsideCase: CAC 为 $38K，前提是合作伙伴引荐已可重复
  y3RevenueImpactK: -80.0
  cashImpactK: -144.0
- variable: churn
  downsideCase: 月流失率 3.0%，前提是迁移无法顺利转化为持续性分析
  baseCase: 月流失率 2.0%
  upsideCase: 月流失率 1.0%，前提是出现多品牌扩展
  y3RevenueImpactK: -220.0
  cashImpactK: -154.0
- variable: 销售周期
  downsideCase: 从发现到生产需 9 个月
  baseCase: 从发现到生产需 6 个月
  upsideCase: 合作伙伴 playbook 被验证后缩短为 4-5 个月
  y3RevenueImpactK: -260.0
  cashImpactK: -210.0
- variable: 毛利率
  downsideCase: 毛利率 65%，因为托管与实施支持更重
  baseCase: 70%
  upsideCase: 毛利率 74%，因为持续性分析收入占比更高
  y3RevenueImpactK: 0.0
  cashImpactK: -81.42
- variable: 招聘节奏
  downsideCase: 将额外工程师和第二名销售的招聘提前两个季度
  baseCase: 在证明点达成后分阶段招聘
  upsideCase: 将第二名 GTM 招聘推迟到客户等效值超过 14 之后
  y3RevenueImpactK: -40.0
  cashImpactK: -180.0
modelDiagram:
  title: 单位经济性流转
  mermaid: "flowchart LR\n  Leads[线索] --> PaidPilots[付费试点]\n  PaidPilots --> ConvertedCustomers[转化客户]\n  ConvertedCustomers --> Revenue[收入]\n  Revenue --> GrossProfit[毛利润]\n  GrossProfit --> Cash[现金]\n"
modelSanity:
- checkName: 收入引擎
  finding: 基准情景收入来自 Y1 的两个试点转化为持续性分析客户，以及在合作伙伴辅助下，到 Q4Y3 以 $135K 综合年价值爬坡至 16.5 个客户等效值。
- checkName: 必须做对的事
  finding: 公司必须足够快地证明保留查询提升，使至少一半试点能够续约为软件收入，而不是以一次性服务项目结束。
- checkName: 模型失效条件
  finding: 如果迁移频率或转化率只能支撑 Q4Y3 达到 12.5 个客户等效值，那么在下行情景下现金将降至大致盈亏平衡。
- checkName: 下一轮证明点
  finding: 一旦公司能在 Q4Y2 到 Q2Y3 期间展示约 8 个客户等效值、持续续约、合作伙伴主导上线，以及逐步下降的交付投入，下一轮融资就有了依据。
sanityChecks:
  ruleOf40: Y3 增长率 135.4% + EBITDA 利润率 -26.3% = 109.1%
  burnMultiple: Y3 burn multiple 为 0.37x = $427.85K EBITDA burn / $1.15M 净新增 ARR，较 Y2 的约 0.90x 有所改善。
  revenuePerFte: 按平均 8.75 名 FTE 计算，Y3 每名 FTE 收入为 $186K，低于典型 SaaS 的 $200-400K 基准；只有在服务强度持续下降时才可接受。
  flags:
  - 模型仍假设存在足够多真实的关停或平台迁移项目，使客户等效值能在 Y2 末从 3.0 增长到 8.0，尽管市场频率仍是研究中最主要的未决风险。
  - Y3 仍为 EBITDA 亏损，因此在该模型期内，业务仍依赖下一轮融资，而不是实现完全自给自足。
  - 每名 FTE 收入仍略低于常规 SaaS 基准，因为实施工作在 Y2 仍占较大比重。
  - 如果试点转持续性订阅的转化率明显低于 business-plan 中 50%+ 的目标，公司会更像代理机构，ARPU 和流失率假设也将失效。
