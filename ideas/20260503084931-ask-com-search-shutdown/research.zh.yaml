competitors:
- name: Algolia
  stage: 扩张期
  wedge: 以开发者为先的搜索与发现 SaaS，并具备 AI 搜索定位。
  pricing: 按使用量计费，提供免费与付费层级；也有企业方案。
  strength: 相关性工具成熟、部署快速，并已广泛应用于多类搜索场景。
  weaknessVsUs: 并非为关停执行、规范重定向规划或保留查询迁移分析而设计。
  sourceRefs:
  - 19
  - 20
- name: Yext Scout
  stage: 上市扩张期
  wedge: 面向品牌答案触点的品牌可见性与 AI 搜索代理。
  pricing: 以打包式平台定价为主，采用企业销售模式。
  strength: 在结构化品牌数据、营销分发和分析方面优势明显。
  weaknessVsUs: 针对的是品牌可见性，而不是对长尾传统内容存档进行大规模摄取和 SEO 迁移工作流。
  sourceRefs:
  - 21
  - 22
- name: Elastic Enterprise Search
  stage: 成熟期
  wedge: 灵活的开源与云搜索栈，具备 RAG 与相关性工具。
  pricing: 按使用量计费的无服务器搜索，加上订阅与支持。
  strength: 可定制性强、开发者心智广，并具备强大的相关性/RAG 原语。
  weaknessVsUs: 需要更多工程投入，也没有把迁移特有的 SEO 与重定向工作流打包起来。
  sourceRefs:
  - 23
  - 24
  - 25
- name: Google Programmable Search Engine
  stage: 成熟期
  wedge: 基于 Google 索引的低成本站内搜索与搜索 API 替代方案。
  pricing: 提供广告支持或免费选项，另有每 1,000 次查询 $5 的 Custom Search JSON API。
  strength: 索引可信、可作为基础站内搜索的简单兜底方案，买方教育成本低。
  weaknessVsUs: 返回的是搜索结果，而不是把内容存档转化为自有答案旅程并附带迁移分析。
  sourceRefs:
  - 18
regulatoryTechnicalConstraints:
- point: 查询日志和行为数据在消费者隐私规则下需要配套隐私权处理，以及删除/访问工作流。
  sourceRefs:
  - 27
- point: AI 答案生成应通过测试、监督和文档化风险控制进行治理，而不应被视为完全自治功能。
  sourceRefs:
  - 28
- point: 在迁移过程中，301 重定向、规范链接和站点迁移时序是不可谈判的技术控制点。
  sourceRefs:
  - 15
  - 16
- point: FAQ 或 QAPage 标记可以提升表达清晰度，但搜索引擎已收窄富结果曝光，因此仅靠标记无法保住流量。
  sourceRefs:
  - 8
  - 9
  - 17
- point: 即便技术上迁移完全正确，业务仍会暴露在 AI Overviews 和答案摘要带来的平台级点击流失风险中。
  sourceRefs:
  - 2
  - 3
  - 4
  - 13
  - 14
validationSignals:
- point: Ask.com 的关闭说明，所有者会让传统答案或搜索资产退役，而不是无限期维持。
  sourceRefs:
  - 1
- point: Yahoo Answers 和 Neeva 进一步证明，问答或搜索产品会消失，或转向消费者搜索之外的方向。
  sourceRefs:
  - 5
  - 6
- point: Google 已在全球推出 AI Overviews 和 AI Mode，使“答案优先”UX 成为主流预期。
  sourceRefs:
  - 11
  - 13
  - 14
- point: TechCrunch、BBC 和 Pew 的出版商证据表明，AI 摘要会减少下游点击，从而提升在自有触点上捕获用户的紧迫性。
  sourceRefs:
  - 2
  - 3
  - 4
- point: Algolia、Yext 和 Elastic 都在加码 AI 搜索或 RAG 定位，说明相邻工作流中已存在买方关注与预算。
  sourceRefs:
  - 20
  - 21
  - 24
  - 25
openQuestions:
- 未来 12 个月内，PE 持有或投资组合旗下内容网站中，究竟有多少真实的关停或平台迁移项目？
- 产品能否在 60-90 天内足够有力地证明保留查询流量提升，从而支撑软件经济性而非代理服务模式？
- 这个问题的预算究竟稳定地由谁掌握：总经理或产品负责人、集中式投资组合运营，还是 SEO 与内容负责人？
- 买方在关停前多久能够提供足够干净的历史查询日志，以支撑高质量答案生成？
- 这个切入点会自然扩展成常驻答案层，还是市场本质上仍以项目制为主？
