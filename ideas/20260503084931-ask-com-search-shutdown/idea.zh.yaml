jobsToBeDone:
- job: 当一个传统知识网站即将关闭时，帮助总经理保住高意图流量和用户价值，让其在不摧毁存档经济性的前提下完成产品退役。
  currentAlternative: 代理机构主导的 SEO 迁移，加上手工重定向和通用站内搜索。
  successMetric: 关停后 90 天仍被保留下来的头部查询流量占比。
