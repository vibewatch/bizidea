topRisks:
- name: 信号基础薄弱
  description: 该论点建立在一个带日期的来源之上，可能高估了真正进入关停阶段的传统资产数量。
  mitigation: 从正在进行的平台迁移和关停项目中直接做客户发现，仅在存在近期迁移截止日期时销售。
- name: SEO 保留效果难以证明
  description: 若迁移后流量下滑，即便同时存在更广泛的排名变化，客户也可能将责任归咎于产品。
  mitigation: 让人工参与重定向审批，跟踪保留查询分群，并将早期交易定价与可衡量的流量保留里程碑挂钩。
- name: 买方可能将其视为服务项目
  description: 客户可能把这项工作视为一次性代理服务，而不是可重复购买的软件。
  mitigation: 把摄取、答案分发和分析模块产品化，让实施伙伴可以在标准平台上交付项目。
