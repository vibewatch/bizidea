problem: 运营老化消费者知识网站的团队常希望关闭旧搜索或问答产品，但真正有价值的资产是仍能获得排名的长尾内容存档和查询意图。如今这些迁移仍主要依靠电子表格、手工重定向和通用搜索工具完成，既无法保留答案质量，也无法保留用户路径。一旦发生关停，团队在重新包装存档之前就可能失去自然流量、广告收入和邮件获客能力。
targetUser:
  primary: 计划淘汰老旧搜索栈的投资组合旗下参考、论坛或问答网站的总经理或产品副总裁。
  secondary: 负责同一站点迁移效果的 SEO 或内容运营负责人。
  buyer: 该站点的总经理、产品副总裁或投资组合运营负责人。
startupThesis:
  nonObviousInsight: 一家走向衰退的搜索资产，真正有价值的已不再是搜索引擎本身，而是历史语料库和查询意图映射。随着 AI 答案界面成为用户的默认预期，每一次传统搜索关停都会形成一个短暂窗口：在排名和用户流失之前，把这批存档转化为有依据的答案产品。
  beachhead: 未来 12 个月内将下线独立搜索或问答体验、且拥有 100,000 个以上常青页面的投资组合旗下 how-to、健康、金融和参考类网站。
  wedge: 一个“一站式关停迁移”平台：摄取传统内容与查询日志，为高频查询生成基于来源的答案页和组件，并输出规范重定向方案与转化捕获能力。
  whyNowCatalyst: Ask.com 的关停说明标志性的“答案优先”品牌也开始被退役，形成紧急迁移项目；若不能快速重包装，存档价值就会迅速消失。
  ventureScalePath: 先从一次性关停迁移切入，再扩展为面向出版商、论坛和互联网投资组合的常驻答案层与变现分析栈，服务其跨多个品牌的大规模常青内容存档。
solution: 产品会接入传统站点的 sitemap、FAQ 页面、历史查询日志和经批准的内容导出，识别最有价值的答案意图，为这些意图生成基于来源的答案页与站内对话组件，并给出可人工审核的 301 重定向映射建议，将旧 URL 指向新目标。产品还会加入邮件或联盟转化模块，让所有者无需等待完整重构，就能立即对保留下来的意图进行变现。首要承诺不是提供更强的通用搜索，而是在更快完成关停执行的同时，实现可量化的流量保留。
goToMarketSeed:
  firstCustomer: 一家 PE 持有的消费者参考站点总经理，该站点存在已废弃的站内搜索或问答产品，且需在未来两个季度内完成重构迁移。
  buyingTrigger: 董事会批准的关停、CMS 迁移、托管合同续签，或搜索变现显著下滑，迫使团队做出产品退役决定。
  currentAlternative: 手工迁移表格、由代理机构主导的 SEO 项目，以及 Algolia、Elastic 或内部自研等通用站内搜索工具。
  switchingReason: 该切入点能在关停期间以更少工程投入保住高意图页面和用户路径，并提供比代理或通用搜索软件更清晰的流量保留分析。
  pricingHypothesis: 每次迁移收取 $25k-$100k 实施费，另加与答案会话量或保留查询量挂钩的月度平台费。
