jobsToBeDone:
  - job: 当一个传统知识站点即将被关闭时，帮 GM 尽量保住高意图流量和用户价值，让团队能下线产品而不把档案的经济价值一并毁掉。
    currentAlternative: 代理商主导的 SEO 迁移，加上人工跳转和通用站内搜索。
    successMetric: 关停后 90 天，核心查询流量的保留比例。
