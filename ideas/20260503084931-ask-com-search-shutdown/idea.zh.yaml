topRisks:
  - name: 信号基础过薄
    description: 这套论点只建立在一个带日期的来源上，可能高估了真正进入关停期的传统资产数量。
    mitigation: 先直接验证正在进行的重构与关停项目，只在存在近期迁移截止日的场景里销售。
  - name: 很难证明 SEO 保留效果
    description: 如果迁移后流量下滑，客户可能会把责任归到产品头上，即便背后还有更广泛的排名变化。
    mitigation: 让人工参与跳转审批，跟踪保留查询队列，并把早期定价绑到可衡量的流量保留里程碑上。
  - name: 买方可能把它当成服务项目
    description: 客户可能把这项工作看成一次性代理服务，而不是可重复购买的软件。
    mitigation: 把接入、答案分发和分析模块产品化，让实施伙伴能在标准平台上交付项目。
