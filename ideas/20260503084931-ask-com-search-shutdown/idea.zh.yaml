      sourceRefs: [1]
problem: >-
  经营老化消费者知识站点的团队，经常想关掉遗留的搜索或问答产品，但真正值钱的资产，其实是仍在搜索结果里有排名的长尾内容档案和查询意图。如今这类迁移大多还靠表格、人工跳转和通用搜索工具来拼，既保不住答案质量，也保不住用户路径。真到关站那一刻，如果团队还没把档案重新包装出来，就可能先丢掉自然流量、广告收入和邮件获客。
targetUser:
  primary: 计划淘汰老旧搜索栈的资产组合旗下参考站、论坛或问答站的 GM 或产品副总裁。
  secondary: 同一站点里对迁移表现负责的 SEO 或内容运营负责人。
  buyer: 该站点的 GM、产品副总裁或资产组合运营负责人。
startupThesis:
  nonObviousInsight: >-
    一家走向衰退的搜索资产，真正有价值的已不再是搜索引擎本身，而是历史语料库加上查询意图地图。随着 AI 答案界面变成用户默认预期，每一次传统搜索关停，都会短暂打开一个窗口：要么趁排名和用户还没衰减前，把档案改造成有依据的答案产品；要么眼看价值继续流失。
  beachhead: 未来 12 个月内计划下线独立搜索或问答体验、且拥有 10 万页以上常青内容的资产组合旗下 how-to、健康、金融与参考类站点。
  wedge: >-
    一个“关停即服务”的迁移平台，吃进旧内容和查询日志，为高价值问题生成有来源支撑的答案页与站内组件，并交付规范化跳转方案和转化捕获能力。
  whyNowCatalyst: Ask.com 的关停说明，标志性的“答案优先”品牌如今也开始退场；如果不能迅速重打包档案价值，迁移项目就会变得非常紧急。
  ventureScalePath: >-
    先做一次性关停迁移，之后再扩展成面向出版商、论坛和互联网资产组合的常开型答案层与变现分析栈，服务它们跨多个品牌管理的大型常青档案。
solution: >-
  产品会接入旧站点的 sitemap、FAQ 页面、历史查询日志，以及已批准导出的内容。它先找出价值最高的答案意图，再生成带来源依据的答案页和站内对话组件，并给出可由人工审核的 301 跳转映射，把旧 URL 导到新去处。系统还会加入邮件或联盟转化模块，让资产方不必等完整重构完成，就能先把保留下来的意图变现。首要承诺不是把通用搜索做得更好，而是在更短时间内完成关停，并可量化地保住流量。
goToMarketSeed:
  firstCustomer: 资产由 PE 持有、站内搜索或问答产品已被弃用、且两个季度内必须完成重构迁移的消费者参考站 GM。
  buyingTrigger: 董事会批准关停、CMS 迁移、托管合同续约，或搜索变现突然下滑，迫使团队做出产品退役决定。
  currentAlternative: 人工迁移表格、代理商主导的 SEO 项目，以及 Algolia、Elastic 或内部自研等通用站内搜索工具。
  switchingReason: 相比代理商或通用搜索软件，这个切口能用更少工程投入、配合更清晰的流量保留分析，在关停过程中守住高意图页面和用户路径。
  pricingHypothesis: 每次迁移收取 $25k-$100k 实施费，外加按答案会话量或保留查询量计费的平台月费。
whyNow:
  - point: 老旧搜索与问答资产的关停，正把团队推向必须立刻执行的迁移决策。
    signalRefs: ["老牌搜索品牌真的会被关停"]
    sourceRefs: [1]
  - point: 那些曾支撑旧问答品牌的档案，如今可以通过用户已经习惯的答案界面重新暴露出来。
    signalRefs: ["旧问答档案能变成答案引擎燃料"]
    sourceRefs: [1]
  - point: 资产组合持有者正在收缩非核心互联网资产，因此相比重建整套搜索栈，轻量迁移工具更有吸引力。
    signalRefs: ["组合资产持有者正回收非核心业务"]
    sourceRefs: [1]
differentiator: >-
  这不是一个通用 AI 站内搜索产品。它专门围绕关停和迁移时刻设计，把有来源依据的答案生成、跳转规划和流量保留分析放进同一条工作流。正因为聚焦这一场景，实施会更快，也能凭借专有迁移模板、查询意图映射，以及“哪些档案在下线后更能保住流量”的基准数据建立防御力。
