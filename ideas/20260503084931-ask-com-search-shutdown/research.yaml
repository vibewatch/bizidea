competitors:
- name: Algolia
  stage: scale-up
  wedge: Developer-first search and discovery SaaS with AI search positioning.
  pricing: Usage-based with free and paid tiers; enterprise plans available.
  strength: Mature relevance tooling, fast deployment, and broad adoption across search use cases.
  weaknessVsUs: Not purpose-built for shutdown execution, canonical redirect planning, or retained-query migration analytics.
  sourceRefs:
  - 19
  - 20
- name: Yext Scout
  stage: public scale-up
  wedge: Brand-visibility and AI search agent for branded answer surfaces.
  pricing: Package-led platform pricing with enterprise sales motion.
  strength: Strong in structured brand data, marketing distribution, and analytics.
  weaknessVsUs: Optimized for brand visibility, not mass ingestion of long-tail legacy archives and SEO migration workflow.
  sourceRefs:
  - 21
  - 22
- name: Elastic Enterprise Search
  stage: incumbent
  wedge: Flexible open-source and cloud search stack with RAG and relevance tooling.
  pricing: Usage-based serverless search plus subscriptions and support.
  strength: Highly customizable, broad developer mindshare, and strong relevance or RAG primitives.
  weaknessVsUs: Requires more engineering effort and does not package the migration-specific SEO and redirect workflow.
  sourceRefs:
  - 23
  - 24
  - 25
- name: Google Programmable Search Engine
  stage: incumbent
  wedge: Low-cost on-site search and search API substitute built on Google indexing.
  pricing: Ad-supported or free options plus Custom Search JSON API at $5 per 1,000 queries.
  strength: Trusted index, simple fallback for basic site search, and low buyer education cost.
  weaknessVsUs: Returns search results rather than transforming archives into owned answer journeys with migration analytics.
  sourceRefs:
  - 18
