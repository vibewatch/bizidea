openQuestions:
- How many live shutdown or replatform projects exist inside PE-owned or portfolio-owned content sites over the next 12 months?
- Can the product prove retained-query traffic lift within 60-90 days strongly enough to justify software economics versus agency services?
- 'Who reliably owns budget for this problem: GM or product, central portfolio ops, or SEO and content leadership?'
- How often do buyers have enough clean historical query-log access to power high-quality answer generation before sunset?
- Does the wedge expand naturally into an always-on answer layer, or does the market remain mostly project-based?
