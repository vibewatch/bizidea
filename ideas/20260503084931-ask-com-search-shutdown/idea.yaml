topRisks:
  - name: Thin signal base
    description: The thesis rests on one dated source and may overestimate how many legacy properties are actually entering shutdown.
    mitigation: Start with direct discovery on active replatform and shutdown projects, and sell only where a near-term migration deadline exists.
  - name: SEO preservation is hard to prove
    description: If traffic drops after migration, customers may blame the product even when broader ranking changes are involved.
    mitigation: Keep humans in the loop on redirect approval, instrument retained-query cohorts, and price early deals around measurable retention milestones.
  - name: Buyers may see a services project
    description: Customers could treat the work as a one-off agency engagement instead of buying repeatable software.
    mitigation: Productize ingestion, answer serving, and analytics modules so implementation partners can deliver projects on a standard platform.
