topRisks:
  - name: Technical coverage gaps
    description: A startup may not be able to neutralize or reliably measure ME and PSP behavior across every server SKU buyers already use.
    mitigation: Start with a tightly supported list of common sovereign cloud platforms and offer clear evidence tiers for detected, hardened, and unsupported hardware states.
  - name: Auditor acceptance risk
    description: Government buyers may hesitate to trust a new vendor's hardware evidence in place of incumbent OEM or lab reports.
    mitigation: Partner early with accredited labs and certification advisors so the product's outputs become an input to accepted review processes rather than a standalone claim.
  - name: Incumbent feature response
    description: Server OEMs or large security vendors could add overlapping firmware posture features once the gap becomes commercially visible.
    mitigation: Move faster on cross-vendor control mappings, procurement workflow integrations, and evidence libraries that incumbents will struggle to assemble across mixed fleets.
