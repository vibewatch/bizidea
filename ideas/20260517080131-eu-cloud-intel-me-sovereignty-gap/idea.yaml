        - Microsoft's PLATINUM actor used Intel Serial-over-LAN as a covert exfiltration channel that bypassed host firewalls and endpoint detection; researcher John Goodacre concluded unmitigated ME can defeat the entire host security stack on corporate networks.
        - Under the US RISAA 2024, hardware manufacturers count as electronic communications service providers subject to secret government orders, meaning Intel and AMD chips in European sovereign clouds could face invisible legal compulsion outside certification audits.
