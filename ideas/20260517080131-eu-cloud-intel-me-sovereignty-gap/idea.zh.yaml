jobsToBeDone:
- job: 当我们要在 x86 基础设施上准备主权云投标时，帮保障团队证明哪些机柜适合承载敏感工作负载，这样我们不用整批换掉服务器，也能拿下合同。
  currentAlternative: 人工硬件审查加 OEM 证明
  successMetric: 有审计员认可的硬件证据支撑的可投标机柜占比
