  - title: 隐藏控制平面能绕过主机安全
    description: Intel ME 和 AMD PSP 拥有独立内存与网络能力，运行在 OS 和虚拟机监控器之外，现有证明体系漏掉了这一层信任边界。
    sourceRefs:
    - 1
  - title: 国家级滥用已有公开案例
