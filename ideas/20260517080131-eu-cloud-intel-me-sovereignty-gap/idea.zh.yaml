- point: 隐藏管理引擎拥有自己的网络路径，意味着只做软件层证明，根本没法诚实回答敏感工作负载的主权问题。
  signalRefs:
  - 隐藏控制平面能绕过主机安全
  sourceRefs:
  - 1
- point: PLATINUM 的 Serial-over-LAN 案例，把管理引擎暴露从抽象的架构缺陷，变成了采购团队必须正面回答的真实外传路径。
  signalRefs:
  - 国家级滥用已有公开案例
  sourceRefs:
  - 1
- point: RISAA 2024 让主权问题不只是技术问题，也成了法律问题，因为即便云托管在欧洲，芯片供应商仍可能成为看不见的合规依赖。
  signalRefs:
  - 芯片供应商会让法律主权失效
  sourceRefs:
  - 1
differentiator: 通用固件盘点工具和机密计算产品，并不会产出可直接用于采购的管理引擎状态证据；一次性的咨询项目，也没法在在线运行的集群上形成持续控制。这家初创公司从一开始就围绕这次聚类点出的主权盲点来设计：ME 和 PSP 状态、危险功能压制，以及政府云环境里工作负载与机柜的准入判定。它真正能积累成资产的，是跨厂商服务器画像、加固检查项、控制映射和审计证据库，把底层固件状态直接连到真实的主权云采购决策上。
