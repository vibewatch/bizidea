    sourceRefs:
    - 1
  - title: 芯片供应商会让法律主权失效
    description: RISAA 2024 意味着，即便工作负载托管在欧洲主权云里，底层仍可能依赖能在审计视野之外接收美国政府秘密命令的硬件供应商。
    sourceRefs:
    - 1
problem: 欧洲主权云运营商为了公共部门和国防相关工作负载，要花大价钱满足软件、数据驻留和运维控制要求；但装在认证机柜里的处理器，仍在运行一个多数审计员从不检查的隐藏管理子系统。结果就是，云服务商说不清 Intel ME 或 AMD PSP 在这些系统里到底是被禁用、受限、隔离，还是仍可被利用。现有证明、BIOS 基线和咨询报告都停在栈的上层，买方最终面对的是一个既量不清、也很难写进合同的硬件主权风险。
targetUser:
  primary: 在欧洲主权云运营商内部，负责公共部门和国防相关工作负载、同时管理 Intel 或 AMD 服务器集群的安全架构与平台保障负责人
  secondary: 为部委和公共部门采购打包主权云环境的认证顾问与国防系统集成商
  buyer: CISO、首席安全架构师，或主权云认证项目负责人
startupThesis:
  nonObviousInsight: 欧洲真正缺的不是又一个主权云品牌，而是一套采购级的证明方法，能说明现有主权基础设施里处理器隐藏控制平面到底能做什么、不能做什么。切口不是一夜之间把 x86 全换掉，而是把通用服务器集群在管理引擎这一层做成可审计资产，让买方按可量化的硬件状态采购，而不是继续听厂商口头保证。
  beachhead: 正在为 SecNumCloud、IPCEI-CIS 或国防云投标做准备的法国和德国主权云运营商，规模约 100-1,000 台 Intel 或 AMD 服务器，服务对象是部委、关键基础设施和国防相关工作负载
  wedge: 机柜级固件主权证明：盘点 ME 和 PSP 状态，验证 Serial-over-LAN 等高风险功能是否已关闭或被隔离，并为主权云投标和续期持续产出可直接交给审计员的证据
  whyNowCatalyst: 欧洲主权云框架正在加速落地，而管理引擎被滥用的公开案例，加上芯片供应商面临的法律强制风险，已经让这块硬件盲点在下一轮采购里很难再被忽视。
  ventureScalePath: 先做欧洲主权云的硬件信任证据层，再向国防数据中心、关键基础设施运营商、受监管 AI 工厂延伸，最终进入盟友市场可信服务器集群的采购标准。
solution: 做一套固件主权平台，发现主权云机柜里主板、BMC 和处理器管理引擎的真实状态，再把这些状态翻成买方看得懂的合规证据。产品会检查 ME 或 PSP 是开启、被中和、被隔离、已打补丁，还是仍暴露高风险远程管理能力，然后把结果映射到具体加固动作和补偿性控制上。它会持续生成绑定具体服务器 SKU 与工作负载隔离域的审计材料、投标附件和续期证据包，而不是一次性的实验室报告。往后走，这个平台会变成一套控制平面：哪些机柜能承载主权工作负载，哪些需要整改，哪些该直接排除在敏感合同之外，都由它来判。
goToMarketSeed:
  firstCustomer: 一家法国 SecNumCloud 候选厂商，或一家德国主权云服务商，运营 200-800 台 Intel 或 AMD 服务器，服务对象是部委和国防相关合同
  buyingTrigger: 临近的主权云投标、年度认证续期、客户安全问卷或红队评审，要求其拿出位于虚拟机监控器之下的硬件主权证据
  currentAlternative: OEM 白皮书、TPM 和 BIOS 证明工具、电子表格式资产盘点、网络隔离策略，以及精品型硬件安全咨询报告
  switchingReason: 这家初创公司能给运营商持续、机柜级的 ME 和 PSP 暴露证明与整改流程，把原本静态的保证换成可直接附在投标、审计和客户评审里的证据。
  pricingHypothesis: 按已证明服务器或机柜收取年度订阅费，外加认证就绪与硬件画像导入的一次性费用
whyNow:
- point: 主权云项目已经要认证数百项控制，所以一旦公共买方追问 OS 之下到底是什么，缺失的处理器这一层就会立刻变成显眼缺口。
  signalRefs:
