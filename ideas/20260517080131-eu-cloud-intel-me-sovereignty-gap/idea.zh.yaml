topRisks:
- name: 技术覆盖缺口
  description: 初创公司未必能在买家现有使用的每一种服务器 SKU 上，都可靠地中和或测量 ME 和 PSP 行为。
  mitigation: 先只支持一小批常见主权云平台，并对已识别、已加固和不支持的硬件状态给出清晰证据分层。
- name: 审计接受度风险
  description: 政府买方可能不愿用新厂商的硬件证据，来替代现有 OEM 或实验室报告。
  mitigation: 尽早和认可实验室、认证顾问合作，让产品输出成为既有审查流程的输入，而不是孤立的一套新主张。
- name: 现有厂商的功能跟进
  description: 一旦这个缺口在商业上被看见，服务器 OEM 或大型安全厂商可能迅速补上相近的固件状态能力。
  mitigation: 在跨厂商控制映射、采购工作流集成和证据库上更快堆规模，这些能力现有厂商很难在混合集群里短期拼起来。
