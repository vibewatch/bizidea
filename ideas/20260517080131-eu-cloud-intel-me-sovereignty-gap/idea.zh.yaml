  sources:
  - id: 1
    title: 欧洲建设主权云是为摆脱美国控制，却忘了处理器这一层
    url: https://www.theregister.com/systems/2026/05/16/europe-built-sovereign-clouds-to-escape-us-control-then-forgot-about-the-processors/5237735
    publisher: The Register
    publishedDate: '2026-05-16'
    company: Intel
    eventType: news
    fetchVerified: true
    keyPoints:
    - 欧洲的 IPCEI-CIS 项目正在资助主权云建设，法国 SecNumCloud 框架也有大约 1,200 条技术要求，但两者都没有评估 Intel ME（CSME）或 AMD PSP——这些管理引擎运行在 Ring-3，拥有独立内存、时钟和网络栈，对宿主 OS 和虚拟机监控器都不可见。
    - 微软追踪的 PLATINUM 攻击者曾把 Intel Serial-over-LAN 当作隐蔽的数据外传通道，绕过主机防火墙和终端检测；研究者 John Goodacre 的结论是，只要 ME 没被缓解，它就可能击穿企业网络上的整套主机安全栈。
    - 按美国 2024 年 RISAA，硬件厂商也被算作电子通信服务提供商，可能收到秘密政府命令；这意味着欧洲主权云里用到的 Intel 和 AMD 芯片，依然可能承受认证审计之外、对外不可见的法律强制。
  signals:
  - title: 认证止步于处理器之上
    description: 欧洲的主权云项目可以把软件控制认证得很细，但依然完全忽视处理器内部的管理引擎。
