slug: firmware-sovereignty-attestation
date: '2026-05-17'
executiveSummary: >-
  Firmware Sovereignty Attestation should start as an evidence layer for French
  and German sovereign cloud operators preparing SecNumCloud-style
  qualifications, public-sector bids, or defense-adjacent renewals on existing
  x86 fleets. The urgent pain is not generic firmware risk discovery; it is the
  inability to show a buyer or auditor what Intel ME and AMD PSP can and cannot
  do on the specific racks hosting sensitive workloads. The first product should
  support a narrow server matrix, verify management-engine posture and risky
  feature exposure such as Serial-over-LAN, and emit rack-level evidence packs
  tied to workload eligibility and remediation steps. GTM should begin with
  paid qualification-readiness pilots sold directly to platform-assurance leads
  and co-delivered with accredited labs or certification advisors, then convert
  to annual coverage once the evidence is accepted in a live bid, renewal, or
  security review. Research suggests a modeled "$24.0M" TAM, "$6.0M" SAM, and
  "$1.8M" year-3 SOM for the initial France-and-Germany wedge, so this looks
  more like a high-value compliance infrastructure wedge than a broad software
  category at day one. The deliberate strategic choice is to sell procurement
  evidence and rack-eligibility decisions, not a full firmware-security suite,
  because BINARLY, OEM documents, open-source attestation stacks, and
  hyperscaler controls already cover adjacent discovery or platform-integrated
  use cases. The biggest disconfirming risk is that qualification reviewers may
  accept OEM attestations, segmentation, or hardware refresh plans as
  sufficient, which would keep the startup in a niche services lane instead of a
  repeatable software motion. Two material gaps remain unresolved in the
  inputs: there is no public evidence yet of how many live RFPs explicitly ask
  for below-hypervisor proof, and telemetry coverage by target server SKU is
  still an assumption rather than demonstrated fact.
problem:
  - Sovereign cloud operators can certify software, residency, and operational controls, but they still lack procurement-grade evidence about Intel ME or AMD PSP posture on the racks carrying sensitive workloads.
  - Current alternatives such as OEM whitepapers, BIOS or TPM attestation, isolated networks, and boutique consulting produce static assurances rather than continuous rack-level proof that an auditor or ministry buyer can reuse.
  - When a bid, renewal, or security review asks what sits below the hypervisor, platform-assurance teams cannot quickly show which servers are eligible, which need remediation, and which should be excluded.
solution:
  - Collect rack-level telemetry from a narrow support matrix of Intel and AMD server families, classify ME or PSP posture, and flag risky remote-management features and unsupported hardware states.
  - Map those findings to sovereign-cloud control language and emit evidence packs, exception records, and workload-eligibility decisions that buyers, auditors, and certification advisors can review.
  - Add remediation workflows and partner-lab validation so operators can move a rack from unsupported or risky to bid-ready without replacing the entire fleet.
whyWeWin:
  - The wedge is narrower than generic firmware security: it ties low-level processor posture to a boardroom outcome buyers already pay for, namely bid readiness and trusted-workload eligibility.
  - Cross-vendor server-profile data, evidence templates, and accepted exception patterns should compound with each deployment and are harder for cloud-native incumbents or services firms to assemble across mixed sovereign fleets.
  - The first customer, pricing basis, and channel are coherent around one trigger: a sovereign-cloud qualification or renewal that needs accepted evidence before revenue can land.
strategicChoices:
  beachhead: >-
    French and German sovereign cloud operators and defense-adjacent integrators
    running roughly 200-800 Intel or AMD servers for SecNumCloud-style,
    ministry, or critical-infrastructure workloads and facing a bid, renewal, or
    assurance review in the next 12 months.
  wedgeRationale: >-
    This slice has the clearest combination of buyer urgency, existing
    sovereignty language, and enough rack count that manual evidence gathering
    is painful, yet it is still narrow enough to support a constrained hardware
    matrix and founder-led selling. It creates faster proof than selling all EU
    public cloud operators because the qualification context, buyer titles, and
    partner set are more homogeneous.
  sequencingRationale: >-
    The company should first ship read-only evidence capture, rack eligibility,
    and auditor-facing exports for a few common server families before it adds
    broader remediation automation, AMD depth, or adjacent verticals, because
    the first commercial proof is evidence acceptance, not technical breadth.
    GTM and hiring should mirror that order: founder-led sales plus lab and
    advisor partnerships first, then solutions delivery, then scaled channel
    coverage after pilots convert and supported-SKU coverage is proven.
  notYet:
    - Full firmware vulnerability management or supply-chain security already served by horizontal firmware vendors
    - Building or selling replacement sovereign server hardware instead of making existing x86 fleets auditable
    - Selling broadly into private-sector enterprise clouds before sovereign and defense-adjacent workflows are repeatable
    - Expanding into every EU qualification framework before France and Germany have accepted evidence templates
market:
  tam: "$24.0M modeled TAM based on about 60 European sovereign or public-sector operators and integrators, roughly 500 in-scope servers each, and approximately $800 annual evidence spend per server."
  sam: "$6.0M modeled SAM based on about 15 France-and-Germany beachhead operators around SecNumCloud-style and public-sector sovereign workloads, again at roughly 500 servers and $800 annual spend."
  som: "$1.8M modeled year-3 SOM based on 3 production customers averaging about 750 attested servers each at roughly $800 annual spend after onboarding."
  segments:
    - "Primary segment: French and German sovereign cloud operators with active public-sector or defense-adjacent qualification cycles on mixed x86 fleets"
    - "Secondary segment: Certification advisors, accredited labs, and defense systems integrators packaging sovereign cloud environments for ministries and critical infrastructure buyers"
  buyingProcess: >-
    The operational champion is the platform-assurance or chief-architect team
    that must answer below-hypervisor trust questions, while the economic buyer
    is usually the CISO, qualification-program lead, or sovereign cloud GM. The
    deal should start as a paid qualification-readiness pilot before a bid or
    renewal deadline and convert when the customer uses the evidence in a live
    review and expands from the initial racks to broader fleet coverage.
product:
  mvp: >-
    The MVP should support a tightly defined set of common Intel-led server
    families, detect ME or PSP state and risky feature exposure, classify
    supported versus unsupported hardware, and generate auditor-ready
    rack-eligibility evidence packs with compensating-control notes. It should
    remain read-only in the first release, with remediation guidance rather than
    deep firmware writeback.
  sixMonth: >-
    Ship collection and posture classification for the first 3-5 target server
    families, rack-level eligibility tagging, evidence exports for bid and
    renewal appendices, and a partner-facing review workflow that lets an
    accredited lab or advisor co-sign findings.
  twelveMonth: >-
    Add AMD PSP coverage for the most common target SKUs, remediation tracking
    for risky features such as Serial-over-LAN, APIs or exports into CMDB or
    ticketing tools, and exception-management templates for operators that
    cannot fully neutralize the management engine.
  twentyFourMonth: >-
    Expand into defense datacenters, regulated AI factories, and
    critical-infrastructure sovereign enclaves, broaden the hardware profile
    library across more server families, and package country-specific evidence
    templates for adjacent allied markets only after the France-and-Germany
    wedge converts predictably.
  keyBets:
    - A narrow support matrix can still cover enough of the first 10 target opportunities to support a software-first product rather than a bespoke consulting business.
    - Buyers value accepted evidence and workload-eligibility decisions more than another dashboard of firmware findings.
    - Accredited labs and qualification advisors will treat the product as an input to accepted review processes rather than as an untrusted substitute.
    - Mixed-fleet data on server posture and accepted compensating controls will compound into a durable moat faster than incumbents can repackage adjacent features.
gtm:
  wedge: >-
    Sell a paid qualification-readiness pilot on one sovereign environment ahead
    of a bid, renewal, or security review, then convert to annual rack coverage
    once the operator uses the evidence pack in a live customer or auditor
    interaction and expands coverage to more in-scope servers.
  channels:
    - Direct founder-led enterprise sales to sovereign cloud operators and platform-assurance leaders in France and Germany
    - Co-sell and co-delivery through accredited labs, certification advisors, and trusted-cloud ecosystem partners
    - Defense and public-sector systems integrators that already package sovereign infrastructure for ministry procurements
  funnelTargets: "Target lead→qualified pilot conversion of 10-20%, pilot→production conversion of 50%+, and production→additional rack expansion in 60%+ of the first 5 accounts."
  pricing: >-
    Charge a paid onboarding and evidence-baselining fee, then an annual
    subscription priced by attested server bands or rack groups, with optional
    partner-lab review fees passed through separately. This matches how the pain
    is felt at fleet level, supports six-figure production ACVs in accounts with
    a few hundred covered servers, and ties value directly to the number of
    servers the operator can credibly place into sovereign workloads.
businessModel:
  revenueStreams:
    - Annual platform subscription for continuous evidence coverage of attested servers or rack groups
    - Paid onboarding for hardware discovery, support-matrix fit, and first evidence-pack generation
    - Premium modules or services for renewal packs, exception-management workflows, and partner-reviewed assessments
  unitOfValue: Attested server under continuous sovereign-evidence coverage
  targetGrossMarginPct: 75
  expansionLevers:
    - Expand from the initial qualification project to more racks, workload enclaves, and server families inside the first operator
    - Add defense datacenters, regulated AI factories, and critical-infrastructure enclaves that reuse the same evidence model
    - Layer renewal, exception-management, and partner-reviewed evidence modules on top of the base monitoring footprint
strategyMap:
  northStarMetric: Number of in-scope servers classified as sovereign-eligible with buyer-accepted evidence
  inputMetrics:
    - Qualified pilot rate from target sovereign-cloud accounts
    - Percentage of customer servers that fall inside the supported hardware matrix
    - Median days from data collection start to first accepted evidence pack
    - Pilot to production conversion rate
    - Net server expansion within each production account
  moatsToBuild:
    - Server-SKU and firmware-version corpus mapping ME or PSP posture to evidence confidence tiers
    - Library of accepted evidence templates and exception patterns for sovereign bids, renewals, and audit reviews
    - Workflow data showing which compensating controls and remediation paths actually move racks into eligible status
    - Trusted distribution through labs, advisors, and integrators who standardize on the startup's evidence format
  killCriteria:
    - Fewer than 2 paid pilots after 20 qualified conversations with French and German sovereign-cloud operators or integrators
    - Less than 70% of in-scope servers in the first 3 pilots fall within the supported telemetry matrix
    - Pilot to production conversion below 50% after the first 4 pilots
    - No partner lab, advisor, or buyer accepts the evidence pack in a real bid, renewal, or formal security review within 12 months
  mermaid: |
    flowchart LR
      Wedge[SecNumCloud-style bid or renewal deadline] --> MVP[ME or PSP evidence and rack eligibility MVP]
      MVP --> Proof[Accepted evidence pack and first production expansion]
      Proof --> Expansion[More racks plus adjacent defense and sovereign enclaves]
investorMemo:
  verdict:
    call: Watch
    conviction: Real pain and a differentiated wedge, but conviction stays low-to-moderate until SKU coverage and evidence acceptance are proven and the narrow initial market shows a credible expansion path.
    whyBelieve: The company targets a specific, externally triggered workflow where failure to prove hardware trust can delay or weaken high-value sovereign-cloud revenue.
    whyDoubt: The modeled market is narrow, the core pain signal is still anchored in limited public evidence, and buyers may accept OEM paperwork, lab services, or hardware refresh instead of a new software category.
    nextDiligence: Verify that at least 2 target operators will pay for a qualification-readiness pilot and that one partner lab or advisor will stand behind the resulting evidence format.
  firstCustomer:
    title: French or German sovereign cloud platform-assurance team
    profile: An operator or defense-adjacent integrator running a few hundred Intel or AMD servers for ministry or critical-infrastructure workloads and facing a qualification or renewal review within the next year.
    trigger: A bid, certification milestone, annual renewal, or customer questionnaire asks for trust evidence below the hypervisor and static OEM materials are not enough.
    buyer: CISO, chief architect, or sovereign cloud qualification program lead
    initialContract: "€75k-€150k paid pilot and onboarding for 150-250 servers, converting to roughly €200k-€500k annual coverage as more racks are brought under continuous evidence and used in bids or renewals."
  mustBeTrue:
    - At least 5 of the first 10 qualified target accounts must confirm that hardware-trust questions below the hypervisor can block, delay, or materially complicate a sovereign-cloud bid or renewal.
    - In the first 3 pilots, the product must classify at least 70% of in-scope servers with evidence confidence high enough for a customer review without bespoke reverse engineering.
    - At least 1 accredited lab, certification advisor, or lighthouse operator must accept the evidence pack as a meaningful input to a live qualification or audit process within 12 months.
    - More than half of pilot customers must convert to annual production coverage once the evidence is used in a real review.
    - Early customers must prefer ongoing evidence coverage over one-time consulting or hardware-refresh alternatives strongly enough to support six-figure annual ACVs.
  diligenceQuestions:
    - Which live French or German sovereign-cloud RFPs already ask for hardware-root or below-hypervisor evidence rather than generic firmware assurances?
    - Which target server SKUs expose enough telemetry to distinguish disabled, segmented, and merely patched management-engine states?
    - What exact evidence artifacts will SecNumCloud-style reviewers, public buyers, or defense customers accept when a management engine cannot be fully disabled?
    - How often will buyers choose hardware refresh, network isolation, or third-party lab reports instead of continuous software evidence?
    - Can accredited labs and qualification advisors become repeatable channels, or will every deployment remain a custom services engagement?
operatingAssumptions:
  - assumption: A narrow initial hardware matrix can cover enough of the first market to win repeatable pilots.
    basis: research.yaml
    validationTest: Confirm that at least 70% of servers across the first 10 qualified opportunities fall inside the first 5 supported server families without custom engineering.
    decisionImpact: If false, the company must narrow the beachhead further or budget for a more services-heavy onboarding model and slower gross-margin ramp.
  - assumption: Qualification reviewers will accept vendor-generated evidence when it is packaged with familiar controls and partner-lab validation.
    basis: research.yaml
    validationTest: Secure written feedback on draft evidence packs from 2 certification advisors or accredited labs and use one pack in a live customer review within 12 months.
    decisionImpact: If false, the product shifts toward tooling for internal assurance teams and loses much of its procurement wedge.
  - assumption: Buyers prefer continuous evidence and exception management over a one-time lab report or accelerated hardware refresh.
    basis: idea.yaml
    validationTest: In at least 3 pilot proposals, win budget for annual coverage rather than one-off assessment scope and document the reason for selection.
    decisionImpact: If false, the startup should reposition as a services-led assessment business or reduce software revenue expectations materially.
  - assumption: Per-server pricing near the modeled "$800" annual spend is acceptable in sovereign accounts with a few hundred covered servers.
    basis: research.yaml
    validationTest: Close 2 paid pilots and obtain production pricing confirmation from at least 2 additional qualified accounts without discounting below the modeled range.
    decisionImpact: If false, the business model must move toward project pricing, lower ACVs, or bundled partner delivery.
  - assumption: France and Germany provide a reference path into adjacent defense, critical-infrastructure, and regulated AI environments.
    basis: idea.yaml
    validationTest: Win 1 expansion opportunity or formal design-partner commitment outside the initial sovereign cloud operator segment within 18 months.
    decisionImpact: If false, the company remains a narrow sovereign-cloud niche and fundraising should be sized to a smaller outcome.
experimentRoadmap:
  - horizon: 0-90 days
    experiment: Interview target operators, labs, and advisors around recent bids and renewals to collect the exact hardware-trust questions they could not answer well.
    hypothesis: The strongest buying trigger is a live qualification or renewal review, not generic firmware hygiene.
    successMetric: At least 8 of 12 qualified interviews identify a recent or upcoming review that would justify a paid evidence pilot.
    owner: Founder CEO
  - horizon: 0-90 days
    experiment: Build a read-only prototype that classifies ME posture and risky feature exposure on one representative Intel server family and produces a draft evidence pack.
    hypothesis: Buyers and advisors will react most strongly to workload-eligibility output and plain-language evidence packaging.
    successMetric: 3 design partners review the draft pack and at least 2 say it is materially better than OEM documents or generic attestation output.
    owner: Founding engineer
  - horizon: 3-6 months
    experiment: Run 2 paid pilots on tightly scoped sovereign environments with a partner lab or advisor attached to the review workflow.
    hypothesis: Co-delivered pilots can overcome auditor skepticism faster than a pure software-only sale.
    successMetric: 2 signed pilots and at least 1 partner-backed evidence package accepted in a real bid, renewal, or customer review.
    owner: Founder CEO
  - horizon: 3-6 months
    experiment: Expand support to the next most common Intel family and one AMD family in the target pipeline.
    hypothesis: Supporting a small set of common server families is enough to cover most near-term revenue opportunities.
    successMetric: Supported hardware covers at least 70% of servers in the active pilot and pipeline accounts.
    owner: Firmware security engineer
  - horizon: 6-12 months
    experiment: Add exception-management and remediation tracking for risky features such as Serial-over-LAN plus export into the customer's CMDB or ticketing workflow.
    hypothesis: Production conversion depends on showing not only posture evidence but also a credible path from risky to eligible status.
    successMetric: More than 50% of pilots convert to annual contracts and at least 1 customer expands coverage after using the remediation workflow.
    owner: Solutions engineer
  - horizon: 12-18 months
    experiment: Sign 1 repeatable distribution agreement with an accredited lab, certification advisor, or defense integrator.
    hypothesis: Trusted channel partners can lower sales friction and make the evidence format feel standard rather than novel.
    successMetric: 1 partner-sourced pilot and 1 partner-assisted production deployment within 6 months of signing.
    owner: Assurance partnerships lead
operations:
  - Maintain a controlled hardware profile release process for supported server families, firmware versions, and evidence-confidence tiers.
  - Run evidence quality review with partner labs or advisors before outputs are attached to customer bids, renewals, or audit packets.
  - Reconcile rack-level findings to workload placement and customer asset inventories so eligibility decisions stay current as hardware changes.
  - Operate a recurring customer review cadence around upcoming bids, renewals, and exception deadlines rather than generic security reporting.
team:
  - role: Founder CEO
    startTiming: Month 0
    rationale: Own founder-led sales, ecosystem credibility, and design-partner discovery because early deals depend on trust with sovereign-cloud operators and advisors.
  - role: Founding engineer
    startTiming: Month 0
    rationale: Build the first collection, classification, and evidence-generation pipeline quickly enough to support paid pilots on a narrow hardware matrix.
  - role: Firmware security engineer
    startTiming: Month 2
    rationale: Expand supported server coverage, validate telemetry quality, and translate low-level posture into consistent confidence tiers across Intel and AMD families.
  - role: Solutions engineer
    startTiming: Month 4
    rationale: Reduce services drag by owning onboarding, evidence-pack customization, and integrations with customer asset and ticketing workflows.
  - role: Assurance partnerships lead
    startTiming: Month 8
    rationale: Turn lab, advisor, and integrator relationships into accepted evidence templates and partner-sourced pipeline.
  - role: GTM lead
    startTiming: Month 12
    rationale: Add structured pipeline management only after the pilot package, reference motion, and partner channel show repeatable conversion.
milestones:
  - horizon: 0-12 months
    items:
      - Sign 2-3 paid qualification-readiness pilots with French or German sovereign-cloud operators or defense-adjacent integrators
      - Support 3-5 common server families and classify at least 70% of in-scope servers in the active pipeline
      - Deliver at least 1 evidence pack that a lab, advisor, or customer uses in a real bid, renewal, or formal security review
      - Convert at least 1 pilot to annual production coverage and secure 1 repeatable partner relationship
  - horizon: 12-24 months
    items:
      - Reach 3-4 production customers and approximately "$1.0M-$1.4M" ARR through fleet expansion and renewals
      - Add AMD depth, exception-management workflows, and ticketing or CMDB exports needed for production deployments
      - Expand from sovereign cloud operators into at least 1 adjacent defense, critical-infrastructure, or regulated AI environment
      - Publish country-specific evidence templates for the next adjacent market only after France and Germany references are established
  - horizon: 24-36 months
    items:
      - Reach the modeled "$1.8M" year-3 SOM scenario with 3 large production customers or an equivalent mix of smaller production accounts
      - Establish the company as a standard input to sovereign-cloud qualification and renewal workflows in the initial markets
      - Build a proprietary corpus of supported hardware profiles and accepted exception patterns that materially lowers onboarding time for new customers
      - Decide whether to broaden into adjacent allied markets or stay narrowly focused based on partner pull and evidence acceptance rates
risks:
  - risk: Buyers accept OEM paperwork, segmentation, or one-time lab reports as sufficient and never budget for continuous software evidence.
    likelihood: High
    impact: High
    mitigation: Co-design pilots with live qualification events, price against manual evidence effort, and prove that recurring evidence shortens renewals and expansions.
  - risk: Telemetry quality varies too much across target server SKUs to classify ME or PSP posture reliably.
    likelihood: High
    impact: High
    mitigation: Start with an explicit support matrix, publish evidence-confidence tiers, and avoid promising universal coverage before lab validation.
  - risk: The France-and-Germany beachhead is too small or too slow to support venture-style growth.
    likelihood: Medium
    impact: High
    mitigation: Use the first 18 months to test pull from defense, critical infrastructure, and regulated AI buyers before scaling headcount or raising a larger round.
  - risk: Accredited labs and certification advisors treat the company as a custom project rather than a repeatable product channel.
    likelihood: Medium
    impact: Medium
    mitigation: Standardize evidence formats early, keep the product read-only at first, and structure partner workflows around reusable templates rather than bespoke reports.
  - risk: Adjacent incumbents such as BINARLY or hyperscaler sovereignty teams add comparable evidence packaging once demand becomes visible.
    likelihood: Medium
    impact: Medium
    mitigation: Move quickly on cross-vendor rack eligibility, accepted exception patterns, and mixed-fleet workflows that platform-specific or horizontal vendors are less likely to prioritize.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2-3M"
  runwayMonths: 18
  useOfFundsSummary: >-
    Fund 18 months of runway to build the initial evidence engine and supported
    hardware matrix, hire the firmware and solutions capacity needed for paid
    pilots, secure partner-lab and advisor distribution, and prove that at least
    one evidence format is accepted in a live sovereign-cloud review with a path
    to recurring production revenue.
