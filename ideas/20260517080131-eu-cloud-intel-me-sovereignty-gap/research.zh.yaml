  - point: 现有公开资质语言还没有明确要求检查 ME 或 PSP 状态，所以买方可能会把问题往后拖，直到某次具体评审点名。
    sourceRefs:
    - 1
    - 4
    - 18
  - point: 如果需求足够大，超大云和固件安全现有厂商都能把相邻功能往这边扩。
    sourceRefs:
    - 5
    - 9
    - 23
    - 24
  - point: 在部分账户里，硬件刷新、隔离或咨询服务都可能替代单独的产品。
    sourceRefs:
    - 14
    - 20
    - 26
competitors:
- name: BINARLY
  stage: 规模化
  wedge: 提供深度漏洞研究与设备可见性的商业固件与供应链安全平台。
  pricing: 定制企业套餐
  strength: 固件研究可信度强，且对设备安全的叙事很完整。
  weaknessVsUs: 公开材料更强调风险发现，而不是把 Intel ME 或 AMD PSP 状态翻成主权混合集群里的采购证据。
  sourceRefs:
  - 23
  - 24
  - 25
- name: Microsoft Sovereign Cloud + Azure Attestation
  stage: 现有厂商
  wedge: 把主权控制、证明和 trusted boot 功能直接嵌进 Azure。
  pricing: 随 Azure 服务与用量打包计费
  strength: 在 Microsoft 自管环境里，平台集成深、控制原语也可信。
  weaknessVsUs: 它以 Azure 为中心，更强调 VM / 平台度量，而不是面向第三方主权机柜导出证据。
  sourceRefs:
  - 5
  - 7
  - 8
- name: Google Sovereign Controls + Confidential VM
  stage: 现有厂商
  wedge: 在 Google Cloud 内提供主权控制、机密计算与完整性监控。
  pricing: 随云功能打包，按工作负载计费
  strength: 对云原生机密工作负载，证明与完整性监控叙事很强。
  weaknessVsUs: 它解决不了 Google 控制域之外、本地主权运营商混合集群上的 Intel ME 和 AMD PSP 证据问题。
  sourceRefs:
  - 9
  - 10
  - 11
  - 12
- name: Keylime / TrenchBoot stack
  stage: 开源
  wedge: 愿意自己搭栈的安全团队可以用这套远程证明与 DRTM 构件。
  pricing: 开源
  strength: 技术原语灵活可信，也有社区采用。
  weaknessVsUs: 集成成本高，而且没有被打包成面向资质流程、可直接给审计员看的采购证据。
  sourceRefs:
  - 26
  - 27
  - 28
  - 29
regulatoryTechnicalConstraints:
- point: 抓到的公开框架里，还没有哪套把 Intel ME 或 AMD PSP 状态标准化成一个明确命名的主权云控制项，所以产品在卖的时候也得顺手教育市场。
  sourceRefs:
  - 1
  - 4
  - 18
- point: 固件证据质量高度依赖服务器 SKU、BIOS 暴露和主板实现，这会把覆盖和支持风险直接带到每个硬件家族上。
  sourceRefs:
  - 20
  - 21
  - 22
- point: 混合集群需要统一的证据语义，哪怕 Intel、AMD 和老平台的整改手段并不一样。
  sourceRefs:
  - 22
  - 23
  - 26
- point: 输出必须同时让采购和审计相关方买单，而不只是安全工程师觉得有道理，这让包装的重要性不亚于检测本身。
  sourceRefs:
  - 14
  - 18
  - 19
validationSignals:
- point: 欧洲运营商已经在直接向公共买方营销数据主权和可信云定位。
  sourceRefs:
  - 15
  - 16
  - 17
- point: 超大云已经把主权打包成一整套控制，反过来证明市场确实需要更细颗粒度的信任保障。
  sourceRefs:
  - 5
  - 9
- point: 围绕远程证明、DRTM 和管理引擎缓解的开源社区仍很活跃，说明运营商痛点并没有消失。
  sourceRefs:
  - 26
  - 27
  - 28
  - 29
- point: 商业固件安全厂商还在持续投入研究和公告，说明这一类目既有预算，也有紧迫度。
  sourceRefs:
  - 23
  - 24
  - 25
openQuestions:
- 现在到底有多少法国和德国主权云 RFP，会明确索要虚拟机监控器以下的证据，而不是泛泛的固件保证？
- 目标集群里常见的服务器 SKU，哪些真的能提供足够遥测，区分 Intel ME 或 AMD PSP 是被禁用、被隔离，还是只是打过补丁？
- 如果某个平台无法彻底中和管理引擎，资质审核方会不会接受补偿性控制和分段证据？
- 买方从第一天起更想要的是单独的软件证据层，还是软件加实验室服务的组合？
