    - 17
  - friction: ME 或 PSP 这类主张很难讲给非技术人听
    severity: medium
    affectedBuyer: Public-sector buyer
    mitigation: 把底层发现翻成工作负载准入、补偿性控制和浅白易懂的投标材料。
    sourceRefs:
    - 1
    - 14
    - 18
