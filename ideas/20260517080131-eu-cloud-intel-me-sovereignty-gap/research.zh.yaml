  adoptionFrictionMatrix:
  - friction: 混合服务器集群的硬件遥测并不一致
    severity: high
    affectedBuyer: Platform assurance lead
    mitigation: 先从窄支持矩阵起步，并按支持 SKU 与固件路径给出明确的证据分层。
    sourceRefs:
    - 22
    - 23
    - 26
  - friction: 审计员会质疑一家新证据厂商
    severity: high
    affectedBuyer: Qualification program lead
    mitigation: 与认可实验室联合销售，并把输出绑定到熟悉的控制框架和投标附件里。
    sourceRefs:
    - 14
    - 18
    - 20
  - friction: 对不够技术的买方来说，现有云原生控制看起来已经够用
    severity: medium
    affectedBuyer: CISO
    mitigation: 定位成跨厂商机柜准入与采购可辩护性工具，而不是泛化证明产品。
