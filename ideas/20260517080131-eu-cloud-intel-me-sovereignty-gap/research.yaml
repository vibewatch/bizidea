        BINARLY: [0.55, 0.80]
        Keylime: [0.50, 0.70]
        Proposed startup: [0.85, 0.88]
  fiveForces:
    supplierPower:
      score: 4
      rationale: >-
        Chip vendors, OEMs, and motherboard ecosystems control much of the low-level telemetry and remediation surface, so a new entrant depends on imperfect vendor interfaces and broad hardware coverage to deliver consistent evidence.
      sourceRefs: [1, 20, 21, 22]
    buyerPower:
      score: 4
      rationale: >-
        The beachhead has relatively few high-value buyers, each with large deals and high audit leverage, which gives them negotiating power and long validation cycles.
      sourceRefs: [14, 16, 17, 18]
    threatOfEntrants:
      score: 3
      rationale: >-
        Open-source attestation and firmware tooling lowers technical barriers, but turning it into accepted procurement evidence with mixed-fleet coverage and audit credibility is materially harder.
      sourceRefs: [23, 26, 27, 28, 29]
    threatOfSubstitutes:
      score: 4
      rationale: >-
        Buyers can patch together OEM documents, hyperscaler controls, labs, consultants, and open-source tooling, even if none individually solve the full evidence problem.
      sourceRefs: [7, 8, 10, 20, 21, 26]
    competitiveRivalry:
      score: 3
      rationale: >-
        Adjacency is crowded, but the specific wedge of ME and PSP-focused sovereign procurement evidence is still lightly occupied in public materials.
      sourceRefs: [5, 9, 23, 24, 26]
  pestle:
    - factor: political
      impact: positive
      point: European policy and industrial strategy continue to elevate sovereign cloud and trusted infrastructure as strategic priorities.
      sourceRefs: [2, 19]
    - factor: economic
      impact: neutral
      point: Budget exists in sovereign-cloud programs, but public-sector procurement can still be slow and programmatic rather than bottoms-up tool buying.
      sourceRefs: [2, 14, 16]
    - factor: social
      impact: positive
      point: Public buyers increasingly expect visible sovereignty claims and trusted-cloud narratives from operators serving critical workloads.
      sourceRefs: [15, 16, 17]
    - factor: technological
      impact: positive
      point: Attestation, measured boot, and confidential-computing primitives are mature enough to support a commercial evidence layer.
      sourceRefs: [7, 8, 10, 20, 26]
    - factor: legal
      impact: positive
      point: NIS2 and related compliance pressure create more occasions where operators need defensible, documented control evidence.
      sourceRefs: [4, 18]
  adoptionFrictionMatrix:
    - friction: Inconsistent hardware telemetry across mixed server fleets
      severity: high
      affectedBuyer: Platform assurance lead
      mitigation: Start with a narrow support matrix and explicit evidence tiers by supported SKU and firmware path.
      sourceRefs: [22, 23, 26]
    - friction: Auditor skepticism toward a new evidence vendor
      severity: high
      affectedBuyer: Qualification program lead
      mitigation: Co-sell with accredited labs and tie outputs to familiar control frameworks and appendices.
      sourceRefs: [14, 18, 20]
    - friction: Incumbent cloud-native controls seem good enough to less technical buyers
      severity: medium
      affectedBuyer: CISO
      mitigation: Position the product around cross-vendor rack eligibility and procurement defensibility rather than generic attestation.
      sourceRefs: [5, 7, 9, 10]
    - friction: Operators may prefer hardware refresh over evidence on legacy fleets
      severity: medium
      affectedBuyer: Infrastructure director
      mitigation: Target environments where replacement is slow, expensive, or contractually constrained.
      sourceRefs: [1, 15, 17]
    - friction: ME or PSP claims are hard to explain to non-specialists
      severity: medium
      affectedBuyer: Public-sector buyer
      mitigation: Translate low-level findings into workload eligibility, compensating controls, and plain-language bid artifacts.
      sourceRefs: [1, 14, 18]
