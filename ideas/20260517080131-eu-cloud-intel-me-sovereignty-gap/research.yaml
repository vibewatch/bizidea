      Modeled as ~60 addressable European sovereign and public-sector operators and integrators × ~500 in-scope x86 servers each × ~$800 annual evidence spend per server; cross-check: this remains a very small fraction of the multi-billion-euro sovereign-cloud investment pool already visible in Europe.
    isEstimate: true
    sourceRefs: [2, 15, 17, 31]
  sam:
