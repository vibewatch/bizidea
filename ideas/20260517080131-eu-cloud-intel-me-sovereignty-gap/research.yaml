      Constrains TAM to an initial France-and-Germany beachhead of ~15 target operators around SecNumCloud-like and public-sector sovereign workloads × ~500 servers × ~$800 annual spend.
    isEstimate: true
    sourceRefs: [15, 16, 17, 18]
  som:
