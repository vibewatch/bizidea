assumptions:
- id: A1
  name: Model start month
  value: 2026-06
  unit: month
  source: Starts the first full month after the 2026-05-17 business-plan date.
- id: A2
  name: Paid pilot package
  value: $120.0K over 4 months
  unit: usdK_per_pilot
  source: "[BP investorMemo.firstCustomer.initialContract] Midpoint of the stated \u20AC75k-\u20AC150k pilot/onboarding range, rounded into USD."
- id: A3
  name: Steady-state production ACV
  value: $450.0K per customer per year
  unit: usdK_per_customer_year
  source: "[BP investorMemo.firstCustomer.initialContract] Fits the stated \u20AC200k-\u20AC500k annual coverage range and the BP note that Y3 SOM can be an equivalent mix of smaller production accounts."
- id: A4
  name: Revenue recognition per customer
  value: $30.0K per month during the first 4 pilot months, then $37.5K per month in production
  unit: usdK_per_customer_month
  source: Derived from A2 and A3 so revenue reconciles to the pilot-to-production customer ramp.
- id: A5
  name: Customer ramp
  value: 3 paying accounts by M12, 3 production accounts plus 1 in-flight pilot by Q4Y2, and 4 production accounts by Q1Y3 onward
  unit: paying_accounts
  source: '[BP milestones] Year 1 targets 2-3 paid pilots and at least 1 conversion; 12-24 months targets 3-4 production customers and about $1.0M-$1.4M ARR; 24-36 months targets the modeled $1.8M SOM.'
- id: A6
  name: Gross margin
  value: 75%
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct] 75% target gross margin.'
- id: A7
  name: Loaded salary bands
  value: Founder CEO $90K; engineering $165K; solutions $135K; assurance partnerships $145K; GTM lead $150K; customer success/ops $100K
  unit: usdK_per_fte_year
  source: Startup-finance heuristic for senior early-stage hires in France/Germany enterprise security software, anchored to the BP team plan.
- id: A8
  name: Headcount ramp snapshots
  value: Founder 1/1/1/1/1/1; engineering 2/2/2/2/3/3; solutions 0/1/1/1/1/1; assurance partnerships 0/0/1/1/1/1; GTM 0/0/0/1/1/1; customer success and ops 0/0/0/0/1/2 across q1y1/q2y1/q3y1/q4y1/q4y2/q4y3
  unit: fte
  source: '[BP team + strategicChoices.sequencingRationale] Follow the named Month 0/2/4/8/12 hires first, then add only one extra engineer and lean customer-success capacity after production proof.'
- id: A9
  name: Non-payroll operating spend
  value: About $27K per month pre-pilot, rising toward roughly $30K-$33K per month once partner-assisted pilots and customer reviews are active
  unit: usdK_per_month
  source: Startup-finance heuristic covering cloud telemetry processing, lab travel, compliance support, legal, and software tools for a sovereign enterprise motion.
- id: A10
  name: Starting cash after pre-seed close
  value: $2.00M
  unit: usdM
  source: '[BP fundingAsk.targetFundingRangeUsd] Modeled at the low end of the stated $2M-$3M pre-seed target range.'
- id: A11
  name: CAC
  value: $180.0K per production customer
  unit: usdK_per_customer
  source: '[BP gtm.funnelTargets + research reportMemo.distributionChannels] Founder-led sovereign sales with lab/advisor co-delivery and 10-20% lead-to-pilot conversion implies a high but manageable enterprise CAC.'
- id: A12
  name: Monthly churn
  value: 1.5%
  unit: percent
  source: Startup-finance heuristic for sticky but not yet fully proven annual compliance infrastructure contracts.
- id: A13
  name: Sales cycle
  value: 6 months base case
  unit: months
  source: '[BP market.buyingProcess + experimentRoadmap] Paid pilots are tied to bids, renewals, and reviews, so the base case assumes a long but still closeable procurement path.'
- id: A14
  name: Y2-Y3 opex smoothing
  value: Quarterly opex rises gradually from $324K in Q1Y2 to $378K in Q4Y3 rather than stepping only at the year-end headcount snapshots
  unit: method
  source: '[Financial Modeler instructions] Salary and operating expense lines are smoothed between the required snapshot columns to reflect staged hiring and partner-delivery costs.'
- id: A15
  name: Downside scenario deltas
  value: $360K ACV, 68% gross margin, 9-month sales cycle, and the fourth production account slips into Y4
  unit: scenario_inputs
  source: Built from BP risks around buyer substitution, telemetry coverage, and public-sector procurement slowness.
- id: A16
  name: Upside scenario deltas
  value: $500K ACV, 78% gross margin, 4-5 month sales cycle, and faster rack expansion inside converted accounts
  unit: scenario_inputs
  source: Upside assumes partner-accepted evidence templates compress sales friction and expansion inside lighthouse operators happens sooner than base plan.
