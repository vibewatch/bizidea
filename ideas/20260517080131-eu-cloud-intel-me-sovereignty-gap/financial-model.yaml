scenarios:
  downside:
    description: Procurement stretches toward 9 months, the fourth account slips into Y4, and deployments stay more services-heavy than planned.
    y3RevenueK: 1320.0
    y3EbitdaK: -430.0
    cashLowPointK: 410.0
    keyAssumptionChanges:
    - Production ACV drops from $450K to $360K.
    - Gross margin falls from 75% to 68%.
    - Sales cycle extends from 6 months to 9 months and the fourth production conversion slips out of Y3.
  base:
    description: Three paid pilots in Y1 convert into a lean sovereign-assurance motion that exits Y2 with 3 production accounts and reaches 4 equivalent-smaller production accounts in Y3.
    y3RevenueK: 1800.0
    y3EbitdaK: -126.0
    cashLowPointK: 990.6
    keyAssumptionChanges:
    - Production ACV stays at $450K per customer.
    - Gross margin stays at the 75% target from the business plan.
    - Sales cycle holds near 6 months with partner-assisted evidence acceptance.
  upside:
    description: One accepted evidence format turns into a repeatable channel motion, pulling forward expansion and improving pricing on production renewals.
    y3RevenueK: 2150.0
    y3EbitdaK: 90.0
    cashLowPointK: 1085.0
    keyAssumptionChanges:
    - Production ACV rises from $450K to $500K through broader server coverage and premium evidence modules.
    - Gross margin improves from 75% to 78%.
    - Sales cycle compresses toward 4-5 months and one expansion step lands earlier than base case.
sensitivity:
- variable: ARPU
  downsideCase: $360K ACV if sovereign buyers keep the rollout narrower and buy fewer covered servers.
  baseCase: $450K ACV for an equivalent mix of smaller production accounts.
  upsideCase: $500K ACV with deeper rack expansion and premium evidence modules.
  y3RevenueImpactK: -360.0
  cashImpactK: -270.0
- variable: CAC
  downsideCase: $220K if every deal needs bespoke lab and founder involvement.
  baseCase: $180K fully loaded CAC.
  upsideCase: $150K with one repeatable advisor or lab channel.
  y3RevenueImpactK: 0.0
  cashImpactK: -160.0
- variable: churn
  downsideCase: 2.5% monthly churn if customers treat the product as project-based evidence instead of ongoing coverage.
  baseCase: 1.5% monthly churn.
  upsideCase: 1.0% monthly churn with recurring renewals and rack expansion.
  y3RevenueImpactK: -90.0
  cashImpactK: -70.0
- variable: sales cycle
  downsideCase: 9 months because buyers rely on one-off reports or delayed public-sector procurement.
  baseCase: 6 months tied to live bids, renewals, and qualification reviews.
  upsideCase: 4-5 months once one evidence template is accepted by partners and buyers.
  y3RevenueImpactK: -300.0
  cashImpactK: -240.0
- variable: gross margin
  downsideCase: 68% if telemetry gaps force more bespoke services and lab support.
  baseCase: 75% target gross margin.
  upsideCase: 78% with a stable support matrix and lighter onboarding.
  y3RevenueImpactK: 0.0
  cashImpactK: -145.0
- variable: hiring pace
  downsideCase: Add extra delivery and GTM capacity a quarter before production proof is visible.
  baseCase: Follow the BP sequencing and add only one extra engineer plus lean customer-success coverage after conversion proof.
  upsideCase: Delay the second ops/customer-success hire until partner-sourced pipeline is repeatable.
  y3RevenueImpactK: 0.0
  cashImpactK: -120.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Trigger[Qualification deadline] --> Pilot[Paid pilot]
      Pilot --> Conversion[Annual coverage]
      Conversion --> Expansion[More attested servers]
      Expansion --> Revenue[Subscription revenue]
      Revenue --> GrossProfit[75% gross profit]
      GrossProfit --> Opex[Hiring plus partner delivery]
      Opex --> Cash[Ending cash]
modelSanity:
- checkName: Revenue engine
  finding: Base-case revenue comes from converting 3 paid pilots into production and reaching 4 smaller production accounts at roughly $450K ACV by Y3.
- checkName: Must go right
  finding: At least one lab or advisor must help validate an evidence format quickly enough to keep the sales cycle near 6 months, because that is the largest revenue sensitivity.
- checkName: Model breaks if
  finding: If the fourth account slips into Y4 while gross margin falls toward 68%, downside cash compresses toward roughly $0.4M and forces an earlier raise.
- checkName: Next-round proof
  finding: A seed raise is justified once the company shows 3 production customers, a repeatable partner channel, and exit ARR around the $1.35M to $1.8M range with improving burn efficiency.
sanityChecks:
  ruleOf40: Y3 growth 23.7% plus EBITDA margin -7.0% = 16.7%.
  burnMultiple: Y2 burn multiple is about 0.7x on roughly $0.45M of net-new ARR as the third production customer lands; Y3 improves toward about 0.3x once the fourth account is fully live.
  revenuePerFte: $200K Y3 using $1.8M revenue against 9 Q4Y3 FTE, at the low end of the $200K-$400K enterprise software benchmark.
  flags:
  - Rule of 40 remains well below mature software benchmarks because the market is narrow and production deployments still require heavy customer-facing work.
  - The base case assumes 4 of roughly 15 beachhead operators convert or expand inside 3 years, so one stalled lighthouse account has an outsized effect on the Y3 outcome.
  - Gross margin and cash both depend on the narrow support matrix covering at least 70% of target servers; if telemetry gaps force bespoke services, both COGS and opex worsen quickly.
