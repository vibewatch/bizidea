slug: firmware-sovereignty-attestation
date: '2026-05-17'
executiveSummary: Firmware Sovereignty Attestation 应该先从证据层切入，服务对象是法国和德国正在用现有 x86 集群准备 SecNumCloud 类资质、公共部门投标或国防相关续期的主权云运营商。真正紧迫的痛点，不是泛泛地发现固件风险，而是没法向买方或审计员说明：承载敏感工作负载的具体机柜上，Intel ME 和 AMD PSP 到底能做什么、不能做什么。首个产品应只支持一个很窄的服务器矩阵，验证管理引擎状态和 Serial-over-LAN 之类高风险功能是否暴露，并产出绑定工作负载准入和整改步骤的机柜级证据包。GTM 应从付费的资质就绪试点开始，直接卖给平台保障负责人，并与认可实验室或认证顾问联合交付；一旦这些证据在真实投标、续期或安全评审里被接受，再转成年度覆盖。研究显示，法国和德国这一初始切口对应的建模 TAM 为 $24.0M、SAM 为 $6.0M、3 年 SOM 为 $1.8M，所以它更像一个高价值的合规基础设施切口，而不是 Day 1 就能铺开的软件大类。这里的刻意取舍，是卖采购证据和机柜准入决策，而不是一整套固件安全平台，因为 BINARLY、OEM 文档、开源证明栈和超大云控制已经覆盖了相邻场景。最大的反证风险在于，资质审核方也许会认为 OEM 证明、网络分段或硬件刷新已经够用；那公司就会被困在利基型服务生意里，而不是形成可复制的软件增长。当前输入里还有两个关键空白没补上：没有公开证据显示到底有多少在跑的 RFP 会明确索要虚拟机监控器以下的证明，也还没有证实目标服务器 SKU 的遥测覆盖率。
problem:
- 主权云运营商可以把软件、驻留和运维控制都认证清楚，但依然拿不出采购级证据，说明承载敏感工作负载的机柜上 Intel ME 或 AMD PSP 到底处于什么状态。
- 现有替代方案——例如 OEM 白皮书、BIOS 或 TPM 证明、隔离网络以及精品咨询——给到的更多是静态保证，而不是审计员或部委买方能复用的持续性机柜级证明。
- 一旦投标、续期或安全评审追问虚拟机监控器之下是什么，平台保障团队就很难迅速说清哪些服务器可用、哪些需要整改、哪些该被排除。
solution:
- 从一套窄支持矩阵里的 Intel 和 AMD 服务器家族采集机柜级遥测，对 ME 或 PSP 状态做分类，并标出高风险远程管理功能和不支持的硬件状态。
- 把这些发现映射到主权云控制语言里，产出买方、审计员和认证顾问都能审阅的证据包、例外记录和工作负载准入结论。
- 再叠加整改流程和合作实验室验证，让运营商不必整批换掉服务器，也能把机柜从不支持或高风险状态推进到可投标状态。
whyWeWin:
- 这个切口比泛化的固件安全更窄，但更值钱：它把底层处理器状态直接连到买方已经愿意付费的结果上，也就是投标准备度和可信工作负载准入。
- 跨厂商的服务器画像数据、证据模板和被接受的例外处理模式，会随着每次部署越积越多；相比之下，云原生现有厂商或服务公司很难在混合主权集群里把这些东西拼齐。
- 首个客户、定价基础和销售渠道都围绕同一个触发点展开：主权云资质或续期要在收入落袋之前，先拿到被接受的证据。
strategicChoices:
  beachhead: 法国和德国的主权云运营商，以及国防相关集成商；他们通常运行约 200-800 台 Intel 或 AMD 服务器，服务 SecNumCloud 类、部委或关键基础设施工作负载，并且未来 12 个月内就要面对投标、续期或保障评审。
  wedgeRationale: 这一小块市场里，买方紧迫度、现成的主权话语体系，以及足够多到让人工取证很痛苦的机柜数量同时成立；但它又足够窄，便于在受限硬件矩阵上做产品，也适合创始人亲自打单。相比一开始就卖给所有欧盟公共云运营商，这条路径更容易更快拿到证明，因为资质场景、买方头衔和伙伴画像都更同质。
  sequencingRationale: 公司第一步应该只发只读证据采集、机柜准入判定和面向审计员的导出，先覆盖少数常见服务器家族；等到商业上先证明“证据能被接受”，再补更广的整改自动化、AMD 深度或相邻垂类。GTM 和招聘也要按这个顺序走：先创始人主导销售，叠加实验室和顾问伙伴；再补解决方案交付；等试点转化、支持 SKU 覆盖被证明后，再扩大渠道覆盖。
  notYet:
  - 暂不做横向固件厂商已经覆盖的完整固件漏洞管理或供应链安全
  - 暂不自建或销售替代性的主权服务器硬件，而是先把现有 x86 集群做成可审计资产
  - 在主权云和国防相关工作流尚未跑通前，暂不广泛进入私营企业云
  - 在法国和德国还没形成被接受的证据模板前，暂不同时扩展到所有欧盟认证框架
market:
  tam: 建模 TAM 为 $24.0M：大约 60 家欧洲主权或公共部门运营商及集成商、每家约 500 台在范围内服务器、每台服务器年度证据支出约 $800。
  sam: 建模 SAM 为 $6.0M：范围收窄到约 15 家法国和德国滩头运营商，主要围绕 SecNumCloud 类和公共部门主权工作负载，同样按约 500 台服务器、每台 $800 年度支出计算。
  som: 建模第 3 年 SOM 为 $1.8M：3 家生产客户，平均每家约 750 台已证明服务器，完成导入后按每台每年约 $800 计费。
  segments:
  - 主要细分：在混合 x86 集群上跑公共部门或国防相关资质周期的法国和德国主权云运营商
  - 次级细分：为部委和关键基础设施买方打包主权云环境的认证顾问、认可实验室和国防系统集成商
  buyingProcess: 业务上的操作型 champion，是必须回答虚拟机监控器以下信任问题的平台保障团队或首席架构师团队；真正拍预算的，通常是 CISO、资质项目负责人或主权云业务负责人。交易应从投标或续期节点前的付费资质就绪试点开始；等客户在真实评审里用了这套证据，再从最初机柜扩展到更广的集群覆盖。
product:
  mvp: MVP 应该只支持一组定义清晰、以 Intel 为主的常见服务器家族，识别 ME 或 PSP 状态与高风险功能暴露，区分支持和不支持的硬件，并生成附带补偿性控制说明的、面向审计员的机柜准入证据包。首版保持只读，给整改建议，但不做深度固件回写。
  sixMonth: 在 6 个月内，交付首批 3-5 个目标服务器家族的采集与状态分类、机柜级准入标签、用于投标和续期附件的证据导出，以及可让认可实验室或顾问共同签署结论的伙伴评审流程。
  twelveMonth: 在 12 个月内，补上最常见目标 SKU 的 AMD PSP 覆盖，加入对 Serial-over-LAN 等高风险功能的整改跟踪，提供接入 CMDB 或工单工具的 API / 导出，并为无法彻底中和管理引擎的运营商准备例外管理模板。
  twentyFourMonth: 在 24 个月内，扩展到国防数据中心、受监管 AI 工厂和关键基础设施主权隔离域，扩大硬件画像库覆盖的服务器家族；只有在法国和德国这条切口已稳定转化后，才把针对相邻盟友市场的国家化证据模板打包推出。
  keyBets:
  - 一条窄支持矩阵，依然能覆盖前 10 个目标机会里足够多的服务器，从而支撑软件优先的产品，而不是沦为定制咨询。
  - 相比再多一个固件发现看板，买方更看重被接受的证据和工作负载准入判定。
  - 认可实验室和资质顾问会把产品当成既有审查流程的输入，而不是不可信的替代品。
  - 围绕服务器状态和被接受补偿性控制积累起来的混合集群数据，会比现有厂商重打包相邻功能更快沉淀成护城河。
gtm:
  wedge: 先在一次投标、续期或安全评审前，卖一个主权环境的付费资质就绪试点；等运营商在真实客户或审计互动里用了证据包，再转成年度机柜覆盖，并把覆盖面扩到更多在范围内服务器。
  channels:
  - 由创始人直接向法国和德国的主权云运营商及平台保障负责人做企业销售
  - 通过认可实验室、认证顾问和可信云生态伙伴联合销售、联合交付
  - 通过已经为部委采购打包主权基础设施的国防与公共部门系统集成商切入
  funnelTargets: 目标漏斗是：线索→合格试点转化率 10-20%，试点→生产转化率 50%+，首批 5 个客户里有 60%+ 能从生产继续扩到更多机柜。
  pricing: 先收一笔付费导入和证据基线建立费，再按已证明服务器带宽或机柜组收年度订阅费；需要伙伴实验室复核的费用单独转嫁。这和痛点发生的层级一致——问题出在整批集群，而不是单个资产；同时也能在几百台受覆盖服务器的账户里支撑六位数 ACV，并把价值直接绑到运营商能以可信方式放进主权工作负载的服务器数量上。
businessModel:
  revenueStreams:
  - 为已证明服务器或机柜组提供持续证据覆盖的年度平台订阅
  - 为硬件发现、支持矩阵匹配和首个证据包生成收取付费导入费
  - 为续期材料、例外管理流程和伙伴审阅评估提供高级模块或服务
  unitOfValue: 处于持续主权证据覆盖下的已证明服务器
  targetGrossMarginPct: 75
  expansionLevers:
  - 从首个资质项目扩到同一运营商内部更多机柜、工作负载隔离域和服务器家族
  - 进入复用同一证据模型的国防数据中心、受监管 AI 工厂和关键基础设施隔离域
  - 在基础监控覆盖之上叠加续期、例外管理和伙伴审阅证据模块
strategyMap:
  northStarMetric: 被判定为主权合格、且有买方认可证据支撑的在范围内服务器数量
  inputMetrics:
  - 目标主权云账户的合格试点率
  - 客户服务器中落在支持硬件矩阵内的占比
  - 从开始采集数据到产出首个被接受证据包的中位天数
  - 试点转生产转化率
  - 每个生产账户内的净服务器扩张量
  moatsToBuild:
  - 把 ME 或 PSP 状态映射到证据可信度层级的服务器 SKU 与固件版本语料库
  - 面向主权投标、续期和审计评审的已接受证据模板与例外模式库
  - 显示哪些补偿性控制和整改路径真能把机柜推进到合格状态的工作流数据
  - 通过实验室、顾问和集成商建立可信分发，让他们逐步把公司的证据格式当成标准
  killCriteria:
  - 在与法国和德国主权云运营商或集成商做了 20 次合格沟通后，仍拿不到 2 个付费试点
  - 前 3 个试点里，落在支持遥测矩阵内的在范围服务器占比低于 70%
  - 前 4 个试点之后，试点转生产的转化率低于 50%
  - 12 个月内，没有伙伴实验室、顾问或买方在真实投标、续期或正式安全评审里接受这套证据包
  mermaid: "flowchart LR\n  Wedge[SecNumCloud-style bid or renewal deadline] --> MVP[ME or PSP evidence and rack eligibility MVP]\n  MVP --> Proof[Accepted evidence pack and first production expansion]\n  Proof --> Expansion[More racks plus adjacent defense and sovereign enclaves]\n"
investorMemo:
  verdict:
    call: Watch
    conviction: 痛点真实，切口也有区分度，但在 SKU 覆盖和证据接受度被证实之前、以及狭窄初始市场尚未显示出可信扩张路径之前，信心仍应维持在低到中等。
    whyBelieve: 公司瞄准的是一个由外部事件触发的具体工作流：一旦没法证明硬件信任，主权云高价值收入就可能被拖延或削弱。
    whyDoubt: 建模市场偏窄，核心痛点信号仍建立在有限公开证据上，而且买方也可能接受 OEM 文档、实验室服务或硬件刷新，而不是为此形成一类新软件。
    nextDiligence: 需要验证至少 2 个目标运营商愿意为资质就绪试点付费，并确认至少 1 个伙伴实验室或顾问愿意为最终证据格式背书。
  firstCustomer:
    title: 法国或德国的主权云平台保障团队
    profile: 一家运营商或国防相关集成商，管理数百台 Intel 或 AMD 服务器，服务对象是部委或关键基础设施工作负载，并且未来一年内就要面对资质或续期评审。
    trigger: 投标、认证里程碑、年度续期或客户问卷开始索要虚拟机监控器以下的信任证据，而静态 OEM 材料已经不够。
    buyer: CISO、首席架构师，或主权云资质项目负责人
    initialContract: €75k-€150k 的付费试点与导入，覆盖 150-250 台服务器；随后随着更多机柜被纳入持续证据覆盖并用于投标或续期，转成约 €200k-€500k 的年度合同。
  mustBeTrue:
  - 前 10 个合格目标账户里，至少 5 个要明确承认：虚拟机监控器以下的硬件信任问题足以阻断、拖延或显著复杂化主权云投标或续期。
  - 前 3 个试点里，产品必须能在不做定制逆向的前提下，对至少 70% 的在范围服务器给出足以进入客户评审的高可信度分类。
  - 12 个月内，至少 1 家认可实验室、认证顾问或灯塔客户，必须在真实资质或审计流程里把这套证据包当成有意义的输入。
  - 超过一半的试点客户，必须在证据被用于真实评审后，转成年度生产覆盖。
  - 早期客户对持续证据覆盖的偏好，必须明显强于一次性咨询或硬件刷新，强到足以支撑六位数年度 ACV。
  diligenceQuestions:
  - 现在有哪些法国或德国主权云 RFP，已经在要求硬件根信任或虚拟机监控器以下的证据，而不是泛泛的固件保证？
  - 哪些目标服务器 SKU 暴露出足够遥测，能区分管理引擎是被禁用、被隔离，还是只是打过补丁？
  - 当管理引擎无法彻底关闭时，SecNumCloud 类审查方、公共买家或国防客户到底会接受什么证据材料？
  - 买方有多大概率会改选硬件刷新、网络隔离或第三方实验室报告，而不是持续的软件证据？
  - 认可实验室和资质顾问能不能变成可复制渠道，还是每次部署最后都会回到定制服务？
operatingAssumptions:
- assumption: 窄硬件矩阵足以覆盖首批市场的大部分需求，并拿下可复制试点。
  basis: research.yaml
  validationTest: 确认前 10 个合格机会里，至少 70% 的服务器落在首批 5 个支持服务器家族内，而且不需要定制工程。
  decisionImpact: 如果不成立，公司就必须把滩头市场再缩小，或接受更重服务化导入和更慢毛利爬坡。
- assumption: 只要包装成买方熟悉的控制语言并加上伙伴实验室验证，资质审核方会接受厂商生成的证据。
  basis: research.yaml
  validationTest: 从 2 家认证顾问或认可实验室那里拿到对证据包草稿的书面反馈，并在 12 个月内把其中 1 份用于真实客户评审。
  decisionImpact: 如果不成立，产品就会退化成内部保障团队工具，采购切口的大部分价值会随之流失。
- assumption: 相比一次性实验室报告或加速硬件刷新，买方更愿意为持续证据和例外管理付费。
  basis: idea.yaml
  validationTest: 在至少 3 份试点方案里拿到年度覆盖预算，而不是一次性评估范围，并记录客户为何这么选。
  decisionImpact: 如果不成立，公司就该把自己重定位为服务主导的评估业务，或者大幅下调软件收入预期。
- assumption: 在覆盖几百台服务器的主权账户里，每台服务器接近 $800 的年费是可以被接受的。
  basis: research.yaml
  validationTest: 拿下 2 个付费试点，并从至少另外 2 个合格账户那里确认生产定价，不要低于建模区间打折。
  decisionImpact: 如果不成立，商业模式就必须转向项目制定价、更低 ACV，或把交付与伙伴服务捆在一起。
- assumption: 法国和德国能作为样板路径，带公司进入相邻的国防、关键基础设施和受监管 AI 场景。
  basis: idea.yaml
  validationTest: 18 个月内，在初始主权云运营商细分之外，拿下 1 个扩张机会或正式共创客户承诺。
  decisionImpact: 如果不成立，公司就会停留在狭窄的主权云利基市场，融资规模也应按更小结果来设计。
experimentRoadmap:
- horizon: 0–90 天
  experiment: 围绕最近一次投标和续期，访谈目标运营商、实验室与顾问，收集他们真正答不好的硬件信任问题。
  hypothesis: 最强购买触发点是正在进行的资质或续期评审，而不是泛泛的固件卫生。
  successMetric: 12 次合格访谈里，至少 8 次指出最近或即将到来的评审足以支撑一个付费证据试点。
  owner: 创始人/CEO
- horizon: 0–90 天
  experiment: 做一个只读原型，在一类代表性的 Intel 服务器家族上识别 ME 状态和高风险功能暴露，并产出证据包草稿。
  hypothesis: 买方和顾问最看重的，会是工作负载准入输出和浅白易懂的证据包装。
  successMetric: 3 个共创客户审阅证据包草稿，其中至少 2 个认为它明显优于 OEM 文档或通用证明输出。
  owner: 创始工程师
- horizon: 3–6 个月
  experiment: 在范围清晰的主权环境里跑 2 个付费试点，并让伙伴实验室或顾问挂在评审流程里联合交付。
  hypothesis: 与伙伴联合交付的试点，比纯软件销售更快打消审计怀疑。
  successMetric: 签下 2 个试点，并至少有 1 份由伙伴背书的证据包在真实投标、续期或客户评审里被接受。
  owner: 创始人/CEO
- horizon: 3–6 个月
  experiment: 把支持范围扩到目标 pipeline 里下一个最常见的 Intel 家族和 1 个 AMD 家族。
  hypothesis: 支持少量常见服务器家族，已经足以覆盖大部分近期收入机会。
  successMetric: 已支持硬件覆盖活跃试点和 pipeline 账户中至少 70% 的服务器。
  owner: 固件安全工程师
- horizon: 6–12 个月
  experiment: 加入对 Serial-over-LAN 等高风险功能的例外管理与整改跟踪，并支持导出到客户的 CMDB 或工单流程。
  hypothesis: 能否从试点转成生产，不只取决于状态证据，还取决于能否给出从高风险走到可用状态的可信路径。
  successMetric: 超过 50% 的试点转成年合同，且至少 1 个客户在使用整改工作流后扩大覆盖范围。
  owner: 解决方案工程师
- horizon: 12–18 个月
  experiment: 与 1 家认可实验室、认证顾问或国防集成商签下可复制的分发协议。
  hypothesis: 可信渠道伙伴能降低销售阻力，让证据格式更像行业标准，而不是新鲜玩意。
  successMetric: 签约后 6 个月内，拿到 1 个伙伴来源试点和 1 个伙伴协助的生产部署。
  owner: 保障合作负责人
operations:
- 为受支持服务器家族、固件版本和证据可信度层级维护一套受控的硬件画像发布流程。
- 在输出被附到客户投标、续期或审计材料前，与伙伴实验室或顾问一起做证据质量复核。
- 把机柜级发现与工作负载部署和客户资产盘点持续对齐，确保硬件变化后准入判断仍然有效。
- 围绕即将到来的投标、续期和例外截止日期，建立周期性客户复盘，而不是只做泛泛的安全报表。
team:
- role: 创始人/CEO
  startTiming: Month 0
  rationale: 负责创始人主导销售、生态可信度和共创客户发现，因为早期成交高度依赖与主权云运营商和顾问建立信任。
- role: 创始工程师
  startTiming: Month 0
  rationale: 尽快搭起首版采集、分类和证据生成链路，好在窄硬件矩阵上支撑付费试点。
- role: 固件安全工程师
  startTiming: Month 2
  rationale: 扩大受支持服务器覆盖、验证遥测质量，并把底层状态翻成跨 Intel 和 AMD 家族一致的可信度层级。
- role: 解决方案工程师
  startTiming: Month 4
  rationale: 负责导入、证据包定制和与客户资产及工单流程的集成，压低服务化拖累。
- role: 保障合作负责人
  startTiming: Month 8
  rationale: 把实验室、顾问和集成商关系转成可被接受的证据模板和伙伴来源 pipeline。
- role: GTM 负责人
  startTiming: Month 12
  rationale: 只有当试点包、参考案例打法和伙伴渠道已显示可复制转化后，才补结构化 pipeline 管理。
milestones:
- horizon: 0–12 个月
  items:
  - 签下 2-3 个法国或德国主权云运营商或国防相关集成商的付费资质就绪试点
  - 支持 3-5 个常见服务器家族，并对活跃 pipeline 中至少 70% 的在范围服务器完成分类
  - 至少交付 1 份由实验室、顾问或客户用于真实投标、续期或正式安全评审的证据包
  - 至少把 1 个试点转成年度生产覆盖，并拿到 1 个可复制伙伴关系
- horizon: 12–24 个月
  items:
  - 通过集群扩张和续期，把生产客户做到 3-4 家，ARR 达到约 $1.0M-$1.4M
  - 补上生产部署所需的 AMD 深度、例外管理流程，以及工单或 CMDB 导出
  - 从主权云运营商扩到至少 1 个相邻的国防、关键基础设施或受监管 AI 场景
  - 只有在法国和德国样板成立后，才发布下一个相邻市场的国家化证据模板
- horizon: 24–36 个月
  items:
  - 达到建模中的第 3 年 $1.8M SOM 场景：3 家大型生产客户，或等价的更多小型生产账户组合
  - 在初始市场里，把公司做成主权云资质与续期流程的标准输入之一
  - 建立自有的受支持硬件画像与已接受例外模式语料库，显著缩短新客户导入时间
  - 依据伙伴拉动和证据接受率，决定是向相邻盟友市场扩张，还是继续聚焦窄市场
risks:
- risk: 买方接受 OEM 文档、网络分段或一次性实验室报告，觉得这已经够用，从而始终不给持续软件证据单独预算。
  likelihood: High
  impact: High
  mitigation: 围绕真实资质事件共同设计试点，按人工取证成本定价，并证明持续证据能缩短续期和扩容周期。
- risk: 目标服务器 SKU 的遥测质量差异太大，导致公司无法稳定判断 ME 或 PSP 状态。
  likelihood: High
  impact: High
  mitigation: 先公布明确的支持矩阵和证据可信度分层，在实验室验证前绝不承诺通用覆盖。
- risk: 法国和德国这一滩头市场太小，或推进太慢，撑不起风险投资风格的增长。
  likelihood: Medium
  impact: High
  mitigation: 用前 18 个月测试国防、关键基础设施和受监管 AI 买方的拉力，再决定是否扩大团队或加大融资。
- risk: 认可实验室和认证顾问把公司当成定制项目，而不是可复制的产品渠道。
  likelihood: Medium
  impact: Medium
  mitigation: 尽早把证据格式标准化，首版保持只读，并把伙伴工作流设计成围绕可复用模板，而不是定制报告。
- risk: 像 BINARLY 或超大云主权团队这样的相邻现有厂商，一旦看到需求，就补上相近的证据包装能力。
  likelihood: Medium
  impact: Medium
  mitigation: 尽快在跨厂商机柜准入、被接受的例外模式和混合集群工作流上跑出优势，这些方向平台专用或横向厂商通常不会优先。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2-3M
  runwayMonths: 18
  useOfFundsSummary: 融资将覆盖 18 个月跑道，用来搭起首版证据引擎和受支持硬件矩阵，补齐做付费试点所需的固件与解决方案交付能力，拿下伙伴实验室和顾问分发，并证明至少有 1 种证据格式能在真实主权云评审里被接受，并通向持续生产收入。
