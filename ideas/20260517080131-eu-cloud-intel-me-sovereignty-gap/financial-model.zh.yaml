scenarios:
  downside:
    description: 采购周期拉长到 9 个月左右，第 4 个账户推迟到 Y4，且部署比计划中更偏服务化。
    y3RevenueK: 1320.0
    y3EbitdaK: -430.0
    cashLowPointK: 410.0
    keyAssumptionChanges:
    - 生产 ACV 从 $450K 降到 $360K。
    - 毛利率从 75% 降到 68%。
    - 销售周期从 6 个月拉长到 9 个月，第 4 个生产转化滑出 Y3。
  base:
    description: Y1 的 3 个付费试点逐步转成一套精简的主权保障销售动作：Y2 末做到 3 个生产账户，Y3 做到 4 个等价规模较小的生产账户。
    y3RevenueK: 1800.0
    y3EbitdaK: -126.0
    cashLowPointK: 990.6
    keyAssumptionChanges:
    - 生产 ACV 维持在每客户 $450K。
    - 毛利率维持 business plan 里的 75% 目标。
    - 在伙伴协助下，证据接受度使销售周期保持在约 6 个月。
  upside:
    description: 一种被接受的证据格式长成可复制渠道打法，提前带动扩张，并提升生产续约阶段的定价。
    y3RevenueK: 2150.0
    y3EbitdaK: 90.0
    cashLowPointK: 1085.0
    keyAssumptionChanges:
    - 通过扩大服务器覆盖和高级证据模块，生产 ACV 从 $450K 提升到 $500K。
    - 毛利率从 75% 提升到 78%。
    - 销售周期压缩到 4-5 个月，并且有一步扩张早于基准情形落地。
sensitivity:
- variable: ARPU
  downsideCase: $360K ACV——如果主权买方把 rollout 收得更窄、购买的受覆盖服务器更少。
  baseCase: $450K ACV——对应更多小型生产账户的等价组合。
  upsideCase: $500K ACV——伴随机柜扩张更深、并叠加高级证据模块。
  y3RevenueImpactK: -360.0
  cashImpactK: -270.0
- variable: CAC
  downsideCase: $220K——如果每笔交易都要高度定制的实验室支持和创始人深度参与。
  baseCase: $180K 的完全成本 CAC。
  upsideCase: $150K——如果形成 1 条可复制的顾问或实验室渠道。
  y3RevenueImpactK: 0.0
  cashImpactK: -160.0
- variable: churn
  downsideCase: 月度流失率 2.5%——如果客户把产品当成项目制取证，而不是持续覆盖。
  baseCase: 月度流失率 1.5%。
  upsideCase: 月度流失率 1.0%——如果续约和机柜扩张形成循环。
  y3RevenueImpactK: -90.0
  cashImpactK: -70.0
- variable: sales cycle
  downsideCase: 9 个月——因为买方继续依赖一次性报告，或公共部门采购延后。
  baseCase: 6 个月——绑定真实投标、续期和资质评审。
  upsideCase: 4-5 个月——一旦有 1 个证据模板被伙伴和买方接受。
  y3RevenueImpactK: -300.0
  cashImpactK: -240.0
- variable: gross margin
  downsideCase: 68%——如果遥测缺口迫使公司投入更多定制服务和实验室支持。
  baseCase: 75% 目标毛利率。
  upsideCase: 78%——当支持矩阵稳定、导入变轻。
  y3RevenueImpactK: 0.0
  cashImpactK: -145.0
- variable: hiring pace
  downsideCase: 在生产验证出现前，就提前一个季度补更多交付和 GTM 人手。
  baseCase: 按 BP 节奏推进，只额外补 1 名工程师和精简客户成功覆盖。
  upsideCase: 把第二个运营/客户成功岗位延后到伙伴来源 pipeline 可复制之后。
  y3RevenueImpactK: 0.0
  cashImpactK: -120.0
modelDiagram:
  title: 单位经济模型流转
  mermaid: "flowchart LR\n  Trigger[Qualification deadline] --> Pilot[Paid pilot]\n  Pilot --> Conversion[Annual coverage]\n  Conversion --> Expansion[More attested servers]\n  Expansion --> Revenue[Subscription revenue]\n  Revenue --> GrossProfit[75% gross profit]\n  GrossProfit --> Opex[Hiring plus partner delivery]\n  Opex --> Cash[Ending cash]\n"
modelSanity:
- checkName: 收入引擎
  finding: 基准收入来自 3 个付费试点转生产，并在 Y3 把生产账户做到 4 个、单客户 ACV 约 $450K。
- checkName: 必须跑对的事
  finding: 至少要有 1 家实验室或顾问足够快地帮公司验证一种证据格式，把销售周期守在 6 个月附近，因为这是对收入最敏感的变量。
- checkName: 模型会在哪断
  finding: 如果第 4 个账户滑到 Y4、同时毛利率掉向 68%，下行情景下现金低点会压到约 $0.4M，并迫使公司更早融资。
- checkName: 下一轮融资证明
  finding: 只要公司证明自己有 3 个生产客户、1 条可复制伙伴渠道，并能以更好的 burn efficiency 跑出约 $1.35M-$1.8M 的退出 ARR，就足以支撑 seed 融资。
sanityChecks:
  ruleOf40: Y3 增长率 23.7% 加 EBITDA 利润率 -7.0%，合计 16.7%。
  burnMultiple: Y2 的 burn multiple 约为 0.7x，对应新增 ARR 约 $0.45M、第三个生产客户落地；Y3 在第 4 个账户完全上线后改善到约 0.3x。
  revenuePerFte: 以 $1.8M 收入对 9 名 Q4Y3 FTE 计算，Y3 的 revenue per FTE 为 $200K，处在企业软件 $200K-$400K 基准区间的低端。
  flags:
  - Rule of 40 仍明显低于成熟软件基准，因为市场狭窄，生产部署也还需要较重的客户侧工作。
  - 基准情形假设约 15 家滩头运营商里有 4 家会在 3 年内转化或扩张，所以只要 1 个灯塔账户卡住，都会明显拖累 Y3 结果。
  - 毛利和现金都高度依赖那条窄支持矩阵能覆盖至少 70% 的目标服务器；如果遥测缺口迫使公司走定制服务，COGS 和 opex 都会很快恶化。
