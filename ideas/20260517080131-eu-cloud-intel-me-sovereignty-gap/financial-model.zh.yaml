slug: firmware-sovereignty-attestation
date: '2026-05-17'
currency: USD
modelStartMonth: 2026-06
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-06
  unit: month
  source: '[BP date] 从 2026-05-17 的 business-plan 日期往后推一个完整月。'
- id: A2
  name: 付费试点方案
  value: $120.0K over 4 months
  unit: usdK_per_pilot
  source: '[BP investorMemo.firstCustomer.initialContract] 取文中 €75k-€150k 试点/导入区间的中点，并换算后按美元取整。'
- id: A3
  name: 稳定期生产 ACV
  value: $450.0K per customer per year
  unit: usdK_per_customer_year
  source: '[BP investorMemo.firstCustomer.initialContract] 落在文中 €200k-€500k 年度覆盖区间内，也符合 BP 关于第 3 年 SOM 可由更多小型生产账户等价构成的说明。'
- id: A4
  name: 单客户收入确认
  value: $30.0K per month during the first 4 pilot months, then $37.5K per month in production
  unit: usdK_per_customer_month
  source: 由 A2 和 A3 推导，确保收入与“试点转生产”的客户爬坡一致。
- id: A5
  name: 客户爬坡
  value: 3 paying accounts by M12, 3 production accounts plus 1 in-flight pilot by Q4Y2, and 4 production accounts by Q1Y3 onward
  unit: paying_accounts
  source: '[BP milestones] 第 1 年目标是 2-3 个付费试点且至少 1 个转化；12-24 个月目标是 3-4 个生产客户、约 $1.0M-$1.4M ARR；24-36 个月目标是模型里的 $1.8M SOM。'
- id: A6
  name: 毛利率
  value: 75%
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct] 目标毛利率 75%。'
- id: A7
  name: 完全成本薪资带
  value: Founder CEO $90K; engineering $165K; solutions $135K; assurance partnerships $145K; GTM lead $150K; customer success/ops $100K
  unit: usdK_per_fte_year
  source: 面向法国/德国企业安全软件早期团队的创业财务经验值，并锚定 BP 的团队配置。
- id: A8
  name: 人员爬坡快照
  value: Founder 1/1/1/1/1/1; engineering 2/2/2/2/3/3; solutions 0/1/1/1/1/1; assurance partnerships 0/0/1/1/1/1; GTM 0/0/0/1/1/1; customer success and ops 0/0/0/0/1/2 across q1y1/q2y1/q3y1/q4y1/q4y2/q4y3
  unit: fte
  source: '[BP team + strategicChoices.sequencingRationale] 先按 Month 0/2/4/8/12 的已命名岗位招聘；生产验证跑通前，只额外补 1 名工程师和精简客服/运营能力。'
- id: A9
  name: 非薪资运营支出
  value: About $27K per month pre-pilot, rising toward roughly $30K-$33K per month once partner-assisted pilots and customer reviews are active
  unit: usdK_per_month
  source: 覆盖主权企业销售动作下的云遥测处理、实验室差旅、合规支持、法务和软件工具等创业财务经验值。
- id: A10
  name: pre-seed 交割后起始现金
  value: $2.00M
  unit: usdM
  source: '[BP fundingAsk.targetFundingRangeUsd] 按文中 $2M-$3M pre-seed 目标区间的低端建模。'
- id: A11
  name: CAC
  value: $180.0K per production customer
  unit: usdK_per_customer
  source: '[BP gtm.funnelTargets + research reportMemo.distributionChannels] 由创始人主导的主权销售、叠加实验室/顾问联合交付，以及 10-20% 的线索到试点转化率，意味着 CAC 偏高但仍可控。'
- id: A12
  name: 月度流失率
  value: 1.5%
  unit: percent
  source: 适用于黏性较强但尚未完全验证的年度合规基础设施合同的创业财务经验值。
- id: A13
  name: 销售周期
  value: 6 months base case
  unit: months
  source: '[BP market.buyingProcess + experimentRoadmap] 付费试点绑定投标、续期和评审，因此基准情形假设采购路径偏长，但仍能成交。'
- id: A14
  name: Y2-Y3 运营费用平滑
  value: Quarterly opex rises gradually from $324K in Q1Y2 to $378K in Q4Y3 rather than stepping only at the year-end headcount snapshots
  unit: method
  source: '[Financial Modeler instructions] 薪资和运营费用按季度快照之间做平滑处理，以反映分阶段招聘和伙伴交付成本。'
- id: A15
  name: 下行情景调整
  value: $360K ACV, 68% gross margin, 9-month sales cycle, and the fourth production account slips into Y4
  unit: scenario_inputs
  source: 基于 BP 中关于买方替代、遥测覆盖和公共部门采购缓慢的风险构建。
- id: A16
  name: 上行情景调整
  value: $500K ACV, 78% gross margin, 4-5 month sales cycle, and faster rack expansion inside converted accounts
  unit: scenario_inputs
  source: 上行情形假设：被伙伴接受的证据模板降低销售摩擦，且灯塔客户内部机柜扩张比基准计划更早发生。
