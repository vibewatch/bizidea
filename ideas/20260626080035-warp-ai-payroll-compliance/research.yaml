  "willingnessToPay":
    "summary": "Target buyers already absorb the cost of payroll corrections in internal labor, penalty risk, and external provider time. Symmetry and BSI quantify the error burden, while ADP and Warp show the market already buys premium layers for tax filing and notice resolution rather than relying only on base payroll calculation."
