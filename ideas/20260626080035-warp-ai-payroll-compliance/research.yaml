"reportMemo":
  "executiveTakeaways":
  - "Notice-resolution is a real budget line, not an edge case: Symmetry cites 15 payroll corrections per pay period at about $291 each, BSI says payroll professionals spend 29 weeks per year fixing errors, and ADP customers describe winning back 5–10 hours per week once tax/agency workflows are outsourced [6][8][16][17]."
  - "The wedge is viable because incumbents already separate core payroll from compliance execution: Warp sells AI tax-notice resolution as a higher-tier capability, while ADP sells SmartCompliance as a standalone compliance layer that integrates with Workday and other payroll systems [2][4][5][6]."
  - "The addressable pain is focused but large enough to matter: the Census SUSB table shows 33,134 U.S. firms in the 300–4,999 employee bands, giving a substantial installed base of employers that can accumulate multi-state notice and registration debt [21][22]."
  - "Winning will depend less on OCR and more on trust, auditability, and cross-system execution because corrected payroll work touches federal forms, state unemployment rules, and state-specific employer registrations before or after every pay cycle [23][24][25][26][27][29][30][31][32][33][34]."
  "marketDefinition": "A compliance-operations layer that sits on top of incumbent payroll/HCM systems and agency portals to detect, triage, and resolve state payroll tax registration, withholding, unemployment, amendment, and agency-notice work for U.S. multi-state employers [4][6][9][23][24][29][30][31][32][33][34]."
  "customerAndBuyer": "The day-to-day user is a payroll tax manager or lean payroll operations lead; the economic buyer is usually a controller, CFO, or VP People once notice volume, audit pain, or new-state expansion overwhelms a small payroll team. Workday shows payroll is already seen as strategic by leadership, while ADP customer testimony shows lean payroll teams cannot absorb tax-handling complexity manually [6][15]."
  "buyingTriggers":
  - "point": "A remote hire, office opening, or acquisition adds a new state and forces employer registration, withholding setup, and unemployment-tax readiness before the first paycheck."
    "sourceRefs":
