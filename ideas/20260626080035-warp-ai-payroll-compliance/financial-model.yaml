modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Leads[Triggered target accounts] --> Pilots[Paid pilots]
      Pilots --> Customers[Annual production customers]
      CACSpend[CAC spend] --> Pilots
      Customers --> Revenue[Subscription revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> EBITDA[EBITDA]
      EBITDA --> Cash[Ending cash]
      Churn[Churn and incumbent pressure] --> Customers
modelSanity:
  - checkName: Revenue engine
    finding: The base case is driven by converting paid pilots into $45K annual subscriptions and scaling from 3 production accounts at the end of Y1 to 54 by Q4Y3.
  - checkName: Must go right
    finding: The company has to make notice-resolution onboarding repeatable enough that partner referrals can add accounts without forcing a services-heavy delivery team.
  - checkName: Model breaks if
    finding: If realized ACV falls toward $40K while gross margin stays below 70%, the current pre-seed raise would likely not carry the company to a clean seed proof point.
  - checkName: Next-round proof
    finding: The next financing is justified once the company reaches roughly 12-15 production accounts, 12-15 supported states, and a partner channel that sources at least 30% of qualified pipeline.
sanityChecks:
  ruleOf40: Y3 growth 197.0% + EBITDA margin -19.5% = 177.5%.
  burnMultiple: Y2 burn multiple 1.6x based on $0.89M burn over $0.57M net new revenue; Y3 burn multiple 0.3x as revenue growth outpaces remaining burn.
  revenuePerFte: $208K Y3 using Q4Y3 headcount of 9 FTE (benchmark roughly $200K-$400K for B2B SaaS).
  flags:
    - The model assumes production customers land at the top of the stated $35K-$45K pricing band, so weaker notice density or discounting would hit both revenue and payback.
    - Even in the base case, EBITDA stays negative through Y3 because the company keeps building state coverage and implementation capacity before the partner motion is fully proven.
    - Cash remains positive on a $3.0M raise, but a slower pilot-to-production conversion rate or earlier-than-planned hiring would likely force a seed bridge before the company reaches year-3 scale.
