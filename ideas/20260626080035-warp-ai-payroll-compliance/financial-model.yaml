scenarios:
  downside:
    description: Slower pilot conversion, lower realized ACV, and a more services-heavy implementation motion keep the company well below the year-3 account milestone.
    y3RevenueK: 1240.0
    y3EbitdaK: -830.0
    cashLowPointK: 180.0
    keyAssumptionChanges:
      - Q4Y3 customersEop reaches 36 instead of 54.
      - Blended annual ARPU lands at $40K instead of $45K.
      - Gross margin stays at 65% because implementation work remains manual.
  base:
    description: Annual subscription conversions compound from founder-led pilots into a partner-assisted motion, while the company stays lean and excludes pilot revenue from the core P&L.
    y3RevenueK: 1871.3
    y3EbitdaK: -364.1
    cashLowPointK: 941.9
    keyAssumptionChanges:
      - Q4Y3 customersEop reaches 54 at a $45K blended annual subscription value.
      - Gross margin holds at the 70% business-plan target.
      - Headcount scales only to 9 FTE by Q4Y3.
  upside:
    description: Referral channels mature earlier, more customers attach premium correction and prevention workflows, and onboarding becomes more templated.
    y3RevenueK: 2240.0
    y3EbitdaK: 80.0
    cashLowPointK: 980.0
    keyAssumptionChanges:
      - Q4Y3 customersEop reaches 62 instead of 54.
      - Blended annual ARPU rises to $47K through premium workflow attach.
      - Gross margin improves to 72% as state playbooks and portal automation standardize.
