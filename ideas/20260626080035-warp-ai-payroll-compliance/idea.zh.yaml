problem: >-
  企业一旦在足够多的美国州份招聘，真正的痛点就不再是计算总工资，而是随之而来的例外处理：漏报的注册、失业率通知、预扣税错配、季度申报更正，以及散落在政府机构门户、薪资系统、中介和 HR 工单中的 W-2 清理工作。使用 ADP 或 Workday 的精简薪资团队通常既缺乏足够的税务专业深度，也没有足够的人力，无法在罚款累积或下一次薪资发放出错之前把每一份通知追溯到根因。最终是一场永无止境的救火演习——每当远程招聘把公司推入新的税务辖区，就要再经历一轮电子表格、外部薪资税务供应商和人工往来的循环。
targetUser:
  primary: "在 ADP Workforce Now 或 Workday 上运行薪资的美国多州雇主中，拥有 300–3000 名员工的薪资运营副总裁或薪资税务经理。"
  secondary: "负责新州入职、员工配置和福利设置的人事运营及 HRIS 团队。"
  buyer: "对薪资合规罚款和外部服务支出负责的财务总监、CFO 或人事运营副总裁。"
startupThesis:
  nonObviousInsight: >-
    薪资领域近期最佳的 AI 切入点不是先替换薪资引擎，而是把大量州级通知和配置错误转化成一个覆盖在现有薪资系统之上的行动层。一旦 AI 能读取政府机构函件、将其映射到员工和企业的配置错误，并执行纠正文书，雇主就能在不冒险整体迁移的情况下获取绝大部分合规价值。
  beachhead: >-
    美国本土、风险投资支持的软件与 AI 公司，员工规模 300–1500 人、活跃薪资州数 10–25 个、使用 ADP Workforce Now 或 Workday，且精简的薪资团队在快速远程招聘后已在持续处理州级税务和失业通知。
  wedge: >-
    一条"通知到修复"轨道——摄取州级薪资税务与失业通知、识别每条通知背后的配置或申报错误、在薪资、HRIS 和政府机构门户中起草或执行纠正措施，并在罚款落地前留下审计跟踪。
  whyNowCatalyst: >-
    Warp 的融资及其宣称的能力——自动化全美 50 州的注册、申报、W-2、政府机构通知和入职——证明 AI 现在已能执行传统薪资系统仍留给人工的繁杂文书层。
  ventureScalePath: >-
    从分布式雇主的薪资税务和失业通知起步，然后用同一张税区图和行动引擎扩展至注册、工伤补偿、带薪休假合规、福利资格、实体维护，以及面向薪资平台和垂直 SaaS 供应商的嵌入式合规基础设施。
solution: >-
  产品连接薪资、HRIS、福利、工单和文档系统，在州或地方政府机构发出通知时自动建立案件档案。它解析通知、匹配雇主和员工记录，并判断根本问题是注册缺失、税率错误、预扣税配置有误、申报延迟还是主数据过期。随后起草纠正后的申报或回复函件、在薪资和 HR 系统内提出记录修改建议，并仅将敏感步骤路由给人工审批。随着时间积累，系统构建出特定税区的根因图，能够在新州入职、员工变更或申报事件实际产生通知之前预测风险。
goToMarketSeed:
  firstCustomer: >-
    总部位于加利福尼亚州或纽约州、完成 B–D 轮融资的 AI 或 SaaS 公司，员工约 500 人，使用 ADP Workforce Now 或 Workday，每季度向 12–20 个美国州份招聘 5–15 人，且已在花钱雇外部专家处理薪资税务通知。
  buyingTrigger: >-
    远程招聘引发州级税务或失业通知激增、新设办公室或并购驱动的州份扩张，或薪资供应商升级后暴露的罚款流失。
  currentAlternative: "薪资专员人工操作、外部薪资税务机构或注册会计师、政府机构门户、电子表格，以及叠加在 ADP 或 Workday 之上的工单流程。"
  switchingReason: >-
    首批客户之所以切换，是因为这个切口能在现有薪资系统内部解决最棘手的合规问题，削减罚款流失和外部服务支出，而无需强制整体迁移薪资系统。
  pricingHypothesis: >-
    按活跃薪资州数和月度通知量计费的年度订阅，附加自动纠正、注册和托管升级的高级工作流费用。
