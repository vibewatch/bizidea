jobsToBeDone:
  - job: "当州政府发来薪资税务或失业通知时，帮助薪资团队找到根因并在罚款累积之前提交正确的修复文件，让我们无需一周人工往来就能保持薪资合规。"
    currentAlternative: "薪资专员、外部税务机构、政府机构门户和电子表格追踪。"
    successMetric: "通知处理中位时间从 10 个工作日降至 48 小时以内。"
  - job: "当我们进入新州招聘时，帮助我们及早发现注册和配置错误，让第一次薪资发放和季度申报不会触发本可避免的通知。"
    currentAlternative: "跨 HR、薪资、中介和 IT 团队的人工项目计划，加上外部顾问。"
    successMetric: "扩张后头两个季度内，新州通知率降低至少 70%。"
ideaScorecard:
  signalStrength:
    score: 4
    rationale: "该集群通过重大融资轮次、官方产品叙事及第三方对具体多州工作流与客户采用的确认，提供了可信的时机论据。"
  painIntensity:
    score: 5
    rationale: "州级薪资税务通知一旦招聘跨越税区，就会给精简团队带来直接罚款风险、薪资错误和高昂的救火成本。"
  wedgeClarity:
    score: 5
    rationale: "通知到修复自动化是一个窄而痛苦的工作流，有明确的买家、触发事件、现有替代方案和在现有薪资系统之上的集成路径。"
  defensibility:
    score: 4
    rationale: "不断增长的通知类型、根因、纠正路径和各州特有异常模式语料库，应该比通用 AI 工具或服务公司的复制速度更快地形成壁垒。"
  ventureScale:
    score: 5
    rationale: "同一套税区图可以从通知处理扩展至更广泛的就业合规体系——注册、申报、福利、休假、工伤补偿，以及嵌入式薪资基础设施。"
topRisks:
  - name: "在位厂商捆绑销售"
    description: "ADP、Workday 或薪资税务服务提供商可能推出基础通知自动化功能，压缩初始切口。"
    mitigation: "优先与在位系统集成，凭借跨系统根因解析、更快的部署速度和更深的各州特有纠正语料库胜出。"
  - name: "责任敏感性"
    description: "雇主可能对让新供应商自动化税务纠正（可能影响员工工资或法定申报）持谨慎态度。"
    mitigation: "从人在环路的审批开始，采用风险分级的自动操作，并提供审计就绪的证据，让产品以受监督的发布基础设施而非盲目自动化的面目被采用。"
  - name: "通知量不足"
    description: "较小的雇主可能接收到的通知不足以支撑独立产品的支出，或难以产生足够数据来优化产品。"
    mitigation: "优先瞄准 300–3000 人的多州雇主，待根因图成熟后再通过薪资合作伙伴向下延伸到更小规模市场。"
