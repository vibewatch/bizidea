    y3RevenueImpactK: -60.0
    cashImpactK: -260.0
modelDiagram:
  title: 单位经济模型流程
  mermaid: |
    flowchart LR
      Leads[Triggered target accounts] --> Pilots[Paid pilots]
      Pilots --> Customers[Annual production customers]
      CACSpend[CAC spend] --> Pilots
      Customers --> Revenue[Subscription revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> EBITDA[EBITDA]
      EBITDA --> Cash[Ending cash]
      Churn[Churn and incumbent pressure] --> Customers
modelSanity:
  - checkName: 收入引擎
    finding: 基础情形通过将付费试点转化为 $45K 年度订阅驱动，从第 1 年末的 3 个生产账户扩展至 Q4Y3 的 54 个。
  - checkName: 必须做对的事
    finding: 公司必须让通知处理引导流程足够可复制，使合作伙伴转介能在不需要重度服务交付团队的情况下增加账户。
  - checkName: 模型失效条件
    finding: 若实际 ACV 跌向 $40K 而毛利率维持在 70% 以下，当前 pre-seed 融资可能无法将公司带到清晰的种子轮验证点。
  - checkName: 下一轮融资证明
    finding: 公司达到约 12–15 个生产账户、12–15 个支持州，以及合作伙伴渠道产生至少 30% 合格管道后，下一轮融资即可成立。
sanityChecks:
  ruleOf40: "第 3 年增长率 197.0% + EBITDA 利润率 -19.5% = 177.5%。"
  burnMultiple: "第 2 年消耗乘数 1.6x（$0.89M 消耗 / $0.57M 净新增收入）；第 3 年消耗乘数 0.3x，收入增长超过剩余消耗。"
  revenuePerFte: "第 3 年每 FTE 收入 $208K（以 Q4Y3 共 9 名 FTE 计算，基准约 $200K–$400K 适用于 B2B SaaS）。"
  flags:
    - 模型假设生产客户以 $35K–$45K 定价区间高端落单，因此通知密度低于预期或打折都会同时影响收入和回收期。
    - 即使在基础情形下，EBITDA 在整个第 3 年仍为负，因为公司在合作伙伴模式完全验证之前持续构建州份覆盖和实施能力。
    - 在 $3.0M 融资下现金保持正值，但试点到生产转化放缓或提前招聘可能迫使公司在达到第 3 年规模之前寻求种子轮过桥。
