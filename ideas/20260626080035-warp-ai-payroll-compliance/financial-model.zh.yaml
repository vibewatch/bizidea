scenarios:
  downside:
    description: 试点转化较慢、实际 ACV 偏低且实施模式偏服务型，使公司远低于第 3 年账户里程碑。
    y3RevenueK: 1240.0
    y3EbitdaK: -830.0
    cashLowPointK: 180.0
    keyAssumptionChanges:
      - Q4Y3 期末客户数达到 36 而非 54。
      - 混合年度 ARPU 落在 $40K 而非 $45K。
      - 毛利率因实施工作仍以人工为主而停留在 65%。
  base:
    description: 年度订阅转化从创始人主导的试点复合增长至合作伙伴辅助模式，公司保持精简并将试点收入排除在核心损益表之外。
    y3RevenueK: 1871.3
    y3EbitdaK: -364.1
    cashLowPointK: 941.9
    keyAssumptionChanges:
      - Q4Y3 期末客户数以 $45K 混合年度订阅价值达到 54。
      - 毛利率维持在 70% 的业务计划目标。
      - 人员规模至 Q4Y3 仅扩展至 9 名 FTE。
  upside:
    description: 转介渠道提前成熟，更多客户附加高级纠正和预防工作流，引导流程更加模板化。
    y3RevenueK: 2240.0
    y3EbitdaK: 80.0
    cashLowPointK: 980.0
    keyAssumptionChanges:
      - Q4Y3 期末客户数达到 62 而非 54。
      - 混合年度 ARPU 通过高级工作流附加提升至 $47K。
      - 随着州级手册和门户自动化标准化，毛利率改善至 72%。
