topRisks:
  - name: "Incumbent bundling"
    description: "ADP, Workday, or payroll-tax service providers may ship basic notice automation and compress the initial wedge."
    mitigation: "Integrate into incumbent stacks first and win on cross-system root-cause resolution, faster deployment, and a deeper state-specific correction corpus."
  - name: "Liability sensitivity"
    description: "Employers may hesitate to let a new vendor automate tax corrections that could affect employee pay or statutory filings."
    mitigation: "Start with human-in-the-loop approvals, risk-tiered auto-actions, and audit-ready evidence so the product is adopted as supervised release infrastructure rather than blind autonomy."
  - name: "Insufficient notice density"
    description: "Smaller employers may not receive enough notices to justify standalone spend or generate enough data to train the product well."
    mitigation: "Target 300-3,000 employee multi-state employers first, then move downmarket later through payroll partners once the root-cause graph is mature."
