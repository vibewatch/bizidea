problem: >-
  Once a company hires across enough U.S. states, the real pain is not gross-pay calculation but the exception work that follows: missing registrations, unemployment-rate notices, withholding mismatches, quarterly filing corrections, and W-2 cleanups scattered across agency portals, payroll systems, brokers, and HR tickets. Lean payroll teams on ADP or Workday rarely have the tax depth or bandwidth to trace each notice back to the root cause before penalties stack up or the next payroll run goes out wrong. The result is a permanent fire drill of spreadsheets, outside payroll-tax vendors, and manual back-and-forth every time remote hiring pushes the company into another jurisdiction.
targetUser:
  primary: "VP Payroll Operations or payroll tax manager at a U.S. multi-state employer with 300-3,000 employees running ADP Workforce Now or Workday."
  secondary: "People operations and HRIS teams responsible for new-state onboarding, employee setup, and benefits configuration."
  buyer: "Controller, CFO, or VP People Operations accountable for payroll-compliance penalties and outside service spend."
startupThesis:
  nonObviousInsight: >-
    The best near-term AI wedge in payroll is not replacing the payroll engine first; it is turning the ugly long tail of state notices and setup errors into an action layer that sits on top of incumbent payroll stacks. Once AI can read agency letters, map them to employee and company setup mistakes, and execute corrective paperwork, employers can capture most of the compliance value without a risky rip-and-replace.
  beachhead: >-
    U.S.-headquartered, venture-backed software and AI companies with 300-1,500 employees, 10-25 active payroll states, and ADP Workforce Now or Workday, where a lean payroll team is already processing recurring state tax and unemployment notices after rapid remote hiring.
  wedge: >-
    A notice-to-fix rail that ingests state payroll tax and unemployment notices, identifies the setup or filing error behind each one, drafts or executes corrective actions across payroll, HRIS, and agency portals, and leaves an audit trail before penalties land.
  whyNowCatalyst: >-
    Warp's funding and its claimed ability to automate registrations, filings, W-2s, agency notices, and onboarding across all 50 states show AI can now execute the messy paperwork layer that legacy payroll stacks still leave to humans.
  ventureScalePath: >-
    Start with payroll tax and unemployment notices for distributed employers, then expand the same jurisdiction graph and action engine into registrations, workers' compensation, paid-leave compliance, benefits eligibility, entity maintenance, and embedded compliance rails for payroll platforms and vertical SaaS vendors.
solution: >-
  The product connects to payroll, HRIS, benefits, ticketing, and document systems to build a case file whenever a state or local agency sends a notice. It parses the notice, matches it to employer and employee records, and identifies whether the underlying issue is a missing registration, wrong rate, bad withholding setup, late filing, or stale master data. From there, it drafts the corrected filing or response, proposes record changes inside payroll and HR systems, and routes only the sensitive steps for human approval. Over time, the system builds a jurisdiction-specific root-cause graph that predicts which new-state hires, employee changes, or filing events are likely to generate notices before they happen.
goToMarketSeed:
  firstCustomer: >-
    A 500-person Series B-D AI or SaaS company headquartered in California or New York, using ADP Workforce Now or Workday, hiring 5-15 people per quarter into 12-20 U.S. states, and already paying outside specialists to clear payroll tax notices.
  buyingTrigger: >-
    A spike in state tax or unemployment notices after remote hiring, a new-office or acquisition-driven state expansion, or a payroll-vendor escalation that exposes penalty leakage.
  currentAlternative: "Manual casework by payroll specialists, outside payroll-tax bureaus or CPAs, agency portals, spreadsheets, and ticketing workflows layered on top of ADP or Workday."
  switchingReason: >-
    The first customer switches because this wedge resolves the most painful compliance fires inside the existing payroll stack, cutting penalty leakage and outside-service spend without forcing a full payroll migration.
  pricingHypothesis: >-
    Annual subscription priced by active payroll states and monthly notice volume, with premium workflow fees for automated corrections, registrations, and managed escalation.
