    - 13
    - 19
  - friction: 雇主不愿在没有强有力控制的情况下让新供应商修改税务记录或提交更正。
    severity: high
    affectedBuyer: 财务总监或 CFO
    mitigation: 从人在环路的审批、不可变审计日志和与每份 941-X、W-2 或州回复挂钩的逐步证据包开始。
    sourceRefs:
    - 23
    - 24
    - 25
    - 26
  - friction: 产品必须集成到在位薪资系统中，而非取代它们。
    severity: high
    affectedBuyer: HRIS 或薪资系统负责人
    mitigation: 在向 ADP/Workday 客户推送更深层写入之前，先用读取优先的连接器和高置信度操作建议上线。
    sourceRefs:
    - 4
    - 5
    - 6
    - 15
  - friction: 政府机构工作流分散在众多独立的州账户和申报节奏中。
    severity: high
    affectedBuyer: 薪资运营负责人
    mitigation: 编码各州手册、账户前置条件和升级模板，而非承诺千篇一律的机器人方案。
    sourceRefs:
    - 9
    - 29
    - 30
    - 31
    - 32
    - 33
    - 34
  - friction: 规模较小或分布范围不广的雇主可能没有足够的通知量来证明独立产品支出的合理性。
    severity: medium
    affectedBuyer: CFO
    mitigation: 优先瞄准 10 个以上州份的雇主，并将 ROI 锚定在避免人工成本、加快结账和减少罚款流失上，而非原始文档吞吐量。
    sourceRefs:
    - 2
    - 19
    - 20
