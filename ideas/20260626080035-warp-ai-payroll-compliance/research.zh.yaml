  adoptionFrictionMatrix:
  - friction: 在薪资系统接触数据之前，工作地点和地址数据往往已过期。
    severity: high
    affectedBuyer: 薪资税务经理
    mitigation: 从 HR 地址变更、远程工作审批和新州招聘事件触发薪资工作流审查，而非从薪资运行异常触发。
    sourceRefs:
    - 11
