openQuestions:
- 500–1500 名员工的分布式软件公司中，哪类通知占主导：SUI 税率通知、注册缺失、预扣税错配还是陈旧账户评估？
- 实际操作中谁签批自动纠正操作——薪资税务经理、财务总监、CFO 还是第三方薪资机构？
- 目标工作流中有多少可通过 ADP/Workday 权限执行，相比直接通过州门户或供应商介入？
- 当前支出中有多少比例是直接罚款流失、内部薪资人工，以及外部机构/CPA 费用？
