slug: lbm-quote-control-plane
date: '2026-07-01'
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-07
  unit: YYYY-MM
  source: '[BP date 2026-07-01] 创始人和第一位工程师都从 Month 0 开始计入，所以模型与计划在同一个月份启动。'
- id: A2
  name: 客户定义
  value: 1 个已上线、且有 1 个被治理开发商项目的正式生产经销商账户
  unit: 客户定义
  source: '[BP businessModel.unitOfValue + BP investorMemo.firstCustomer.initialContract] 只有当一个开发商项目真正上线后，客户数才计为正式生产账户，不把未付费的共创客户算进去。'
- id: A3
  name: 每个正式生产客户的年 ARPU
  value: '300'
  unit: USDK per year
  source: '[BP market.som + research.market.som + BP gtm.pricing] 第 3 年 SOM 按 8 个账户、每个约 $300K ACV 建模；这也对应 15-25 个分支上线后，$150K-$300K 正式生产区间的上沿。'
- id: A4
  name: 基础情景收入确认
  value: 平均活跃客户数 × $25.0K MRR
  unit: formula
  source: '[BP businessModel.revenueStreams + BP gtm.pricing] 基础情景只确认正式生产订阅收入；付费试点和导入费故意不计入，这样收入可以完全和客户数 × ARPU 对上。'
- id: A5
  name: 基础客户爬坡
  value: M9 首次上线、M11 第二个客户上线，之后 Y2 每季度净增 1 个客户，Y3 H1 再增 2 个；Y1 年末 2 个，Y2 年末 6 个，Y3 年末 8 个
  unit: 正式生产客户
  source: '[BP milestones + research.market.som] 对齐 12 个月内 2 家经销商进入正式生产、24 个月内 5-6 个正式生产客户，以及研究里第 3 年 8 个账户的 SOM 路径。'
- id: A6
  name: 试点转化与扩张动作
  value: 90 天试点、60% 试点转正式生产、50% 的首个账户在 9 个月内扩张
  unit: 漏斗转化率
  source: '[BP investorMemo.firstCustomer.initialContract + BP gtm.funnelTargets] 基础情景默认前 4-6 个共创客户能在 Y1 转出 2 个正式生产客户，后续再靠 先落地再扩张 扩张。'
- id: A7
  name: 目标毛利率
  value: '70'
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct] 报价治理业务成熟后的软件毛利率目标。'
- id: A8
  name: COGS 比例
  value: '30'
  unit: percent of revenue
  source: '[Derived from A7] 把 COGS 固定在收入的 30%，让模型始终对齐 BP 里 70% 的毛利率目标。'
- id: A9
  name: 月度流失率
  value: '1.5'
  unit: percent
  source: 创业财务经验值：面向企业工作流、集成较重、切换成本不低，但又真实面临 Higharc、Epicor 或 Spruce 打包风险的软件。
- id: A10
  name: 全负担年现金薪酬基准
  value: CEO $156K、核心工程 $192K、产品/数据 $180K、解决方案/实施 $150K、GTM/合作 $168K、G&A/营收运营 $120K
  unit: USDK per FTE-year
  source: 创业财务经验值：针对一家精干的美国 pre-seed 垂直 SaaS 团队，卖进企业客户，但不按大厂现金水平给薪。
- id: A11
  name: Y1 招聘节奏
  value: CEO + 创始工程师起步；M4 招解决方案；M7 招产品/数据；M10 招合作负责人
  unit: 招聘时点
  source: '[BP team] 直接把计划里 Month 0 / 3 / 6 / 9 的招聘顺序映射到月份。'
- id: A12
  name: Y2-Y3 招聘节奏
  value: M14 招第二名核心工程师，M17 招第二名 GTM，M20 招第二名解决方案，M29 招第二名产品/数据，M33 招营收运营/G&A
  unit: 招聘时点
  source: '[BP milestones + BP strategicChoices.sequencingRationale] 非创始团队的扩编都以里程碑为闸门，前提是第一条叠加工作流、第二个连接器和伙伴动作已经跑通。'
- id: A13
  name: 非薪酬经营支出爬坡
  value: 固定开销从 Q1Y1 每月 $16K 增长到 Q4Y3 每月 $45K
  unit: USDK per month
  source: '[BP operations + BP fundingAsk.useOfFundsSummary + research.regulatoryTechnicalConstraints] 包含云计算、差旅、安全审查、法务、财务和企业级经销商部署需要的集成工具。'
- id: A14
  name: 本轮 pre-seed 融资额
  value: '2.2'
  unit: M USD
  source: '[BP fundingAsk.targetFundingRangeUsd] 取已给出 $2M-$4M 区间的下沿，因为模型把 配额销售 招聘推迟到了前两个正式生产客户之后。'
- id: A15
  name: 本轮融资里程碑
  value: 做到 6 个正式生产客户、证明第二条连接器路径、把导入稳定在 45 天，并通过伙伴拿到至少 2 个商机
  unit: milestone
  source: '[BP milestones 12–24 months + BP experimentRoadmap 12–18 months] 这就是本轮 pre-seed 用 6 个月安全缓冲去换来的证明包。'
- id: A16
  name: 现金转化政策
  value: EBITDA 近似经营现金流
  unit: policy
  source: 创业财务经验值：现阶段按纯软件公司建模，不显著计债务、CapEx、税或营运资金波动。
- id: A17
  name: 混合 CAC
  value: '138.7'
  unit: USDK per new production customer
  source: '[Derived from A5 + A12 + A13] 用 Y2-Y3 的销售与市场支出 $832K 除以 6 个新增正式生产客户。'
- id: A18
  name: 现金跑道规划窗口
  value: '24'
  unit: months
  source: '[BP fundingAsk.runwayMonths + BP strategicChoices.sequencingRationale] BP 只申请 18 个月，但模型通过把 GTM 招聘延后到试点转正后，把计划证明窗口拉到 24 个月。'
