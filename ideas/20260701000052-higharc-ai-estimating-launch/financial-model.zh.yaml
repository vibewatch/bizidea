scenarios:
  downside:
    description: 结构化算量的采用扩散更慢，试点转化延后，ACV 只能落在 $240K，导入也比计划更偏服务化。
    y3RevenueK: 1650.0
    y3EbitdaK: -950.0
    cashLowPointK: -320.0
    keyAssumptionChanges:
    - 由于账户只做到部分分支上线，ARPU 从 $300K 降到 $240K。
    - 到 Y3 末只有 6 个正式生产客户，而不是 8 个。
    - 由于映射和导入仍更依赖人工，毛利率从 70% 滑到 65%。
  base:
    description: 基础情景只把收入记成经常性订阅，Y1 落下 2 个正式生产客户，Y2 末做到 6 个，Y3 末做到 8 个，每个客户 $300K ACV、毛利率 70%。
    y3RevenueK: 2250.0
    y3EbitdaK: -445.1
    cashLowPointK: 187.6
    keyAssumptionChanges:
    - 按模型中的 A1-A18 全部运营假设执行。
  upside:
    description: 伙伴带来的项目更早进来，分支扩张更快落地，ACV 升到 $330K，公司在 Y3 末做到 10 个正式生产客户，毛利率也小幅改善。
    y3RevenueK: 2880.0
    y3EbitdaK: -20.0
    cashLowPointK: 420.0
    keyAssumptionChanges:
    - 随着早期客户更早加购放单和协同模块，ARPU 从 $300K 提升到 $330K。
    - 因为伙伴转介绍压缩了销售周期，Y3 末正式生产客户从 8 个增到 10 个。
    - 随着映射规则和异常规则更可复用，毛利率从 70% 提升到 72%。
sensitivity:
- variable: ARPU
  downsideCase: 如果客户只接受部分分支上线或更像 人头式定价，年 ACV 会降到 $240K
  baseCase: 按 A3，每个正式生产客户 ACV 为 $300K
  upsideCase: 如果分支扩张和放单加购更早落地，ACV 可升到 $330K
  y3RevenueImpactK: -450.0
  cashImpactK: -315.0
- variable: CAC
  downsideCase: 如果企业采购流程和伙伴赋能都比计划更慢，CAC 会升到 $180K
  baseCase: 按 A17，混合 CAC 为 $138.7K
  upsideCase: 如果伙伴来源商机缩短 前期商机发现，且信任迁移顺畅，CAC 可降到 $110K
  y3RevenueImpactK: -150.0
  cashImpactK: -250.0
- variable: churn
  downsideCase: 如果产品始终停留在窄报价工具，且 现有厂商 打包出足够重叠功能，月流失率会升到 2.5%
  baseCase: 按 A9，月流失率为 1.5%
  upsideCase: 如果分支映射和替代品历史变成真正黏住客户的续约资产，月流失率可降到 1.0%
  y3RevenueImpactK: -180.0
  cashImpactK: -140.0
- variable: 销售周期
  downsideCase: 如果安全、法务或 ERP 审查拖长，试点到正式生产会拉到 9 个月
  baseCase: 按 A6，从试点启动到正式生产大约 6 个月
  upsideCase: 如果开发商续约或 AI 算量上线已经把紧迫感拉满，周期可缩到 4-5 个月
  y3RevenueImpactK: -300.0
  cashImpactK: -260.0
- variable: 毛利率
  downsideCase: 如果导入仍更偏服务化，且映射覆盖率达不到 BP 的 70% 门槛，毛利率会掉到 65%
  baseCase: 按 A7，目标毛利率为 70%
  upsideCase: 如果映射、异常规则和安全导入都被产品化，毛利率可升到 72%
  y3RevenueImpactK: 0.0
  cashImpactK: -113.0
- variable: 招聘节奏
  downsideCase: 在可重复性尚未证明前，就把第二名 GTM 和第二名解决方案岗位提前一个季度招进来
  baseCase: 按 A11 和 A12，以里程碑为闸门推进扩编
  upsideCase: 在核心产品里程碑不受影响的前提下，把非关键岗位再往后顺延一个季度
  y3RevenueImpactK: 0.0
  cashImpactK: -180.0
modelDiagram:
  title: 单位经济流转
  mermaid: |
    flowchart LR
      DesignPartners --> PaidPilots
      PaidPilots --> ProductionAccounts
      ProductionAccounts --> ARR
      Expansion --> ARR
      ARR --> GrossProfit
      GrossProfit --> Cash
modelSanity:
- checkName: 收入引擎
  finding: 基础情景收入来自前两个试点转成正式生产，之后 Y2 每季度新增 1 个正式生产账户，Y3 H1 再增 2 个，每个账户按 $300K 年 ACV 计。
- checkName: 必须跑通的事
  finding: 首批部署必须达到 BP 里 70% 自动映射和 45 天导入两条门槛，否则 Y1 那 2 个正式生产客户就撑不起 $300K ARPU 锚点，也带不动后续伙伴动作。
- checkName: 模型会失效的情况
  finding: 如果 ACV 被压向 $240K，同时毛利率滑到 65%，下行情景就会把现金打成负数，公司下一轮前就得先接桥。
- checkName: 下一轮融资证明点
  finding: 只要公司在同一套精干成本结构上，做到 6 个正式生产客户、第二条连接器路径、可重复的 45 天导入，以及至少两条伙伴来源商机，下一轮融资就有充分理由。
sanityChecks:
  ruleOf40: Y3 收入增速 87.5% + EBITDA 利润率 -19.8% = 67.7%
  burnMultiple: Y2 为 0.7x（$790.7K 净烧钱 / $1200.0K 净新增 ARR）；Y3 为 0.7x（$445.1K 净烧钱 / $600.0K 净新增 ARR）
  revenuePerFte: Y3 平均每 FTE 收入 $250.0K（平均 9.0 FTE；收入 $2250.0K；企业 SaaS 基准为 $200–400K）
  flags:
  - ARPU 锚在 BP 给出的 $150K-$300K 正式生产区间上沿，所以模型对早期账户能否真扩到 15-25 个活跃分支和相邻模块非常敏感。
  - 基础情景故意不计试点费和导入费，这让收入更保守，也能完全和客户数 × ARPU 对上，但烧钱曲线会比按现金开票的计划更难看。
  - Q4Y3 期末现金只剩 $187.6K，所以只要有一次 正式上线 延迟，或有一个季度导入重新变成重服务，公司大概率就得接桥，即便单位经济本身并不差。
  - 初始切口只有 $55.8M TAM 和 $18.0M SAM，所以风险投资级上行仍取决于在报价治理验证后，继续往放单、制造商协同或其他模块扩。
  - 模型默认团队会把 配额销售 招聘往后压；如果管理层在可重复性还没证明前就提前加 GTM，这轮 pre-seed 就该往 BP 提的 $2M-$4M 区间上沿走。
