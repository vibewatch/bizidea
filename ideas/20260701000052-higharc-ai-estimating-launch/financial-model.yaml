slug: lbm-quote-control-plane
date: "2026-07-01"
currency: USD
modelStartMonth: "2026-07"
assumptions:
  - id: A1
    name: "Model start month"
    value: "2026-07"
    unit: "YYYY-MM"
    source: "[BP date 2026-07-01] founders and the first engineer are already modeled at Month 0, so the model starts in the same month as the plan."
  - id: A2
    name: "Customer definition"
    value: "Production distributor account with one governed builder program live"
    unit: "customer definition"
    source: "[BP businessModel.unitOfValue + BP investorMemo.firstCustomer.initialContract] customer count tracks production accounts once a builder program is fully live, not unpaid design partners."
  - id: A3
    name: "Annual ARPU per production customer"
    value: "300"
    unit: "USDK per year"
    source: "[BP market.som + research.market.som + BP gtm.pricing] year-3 SOM is defined as eight accounts at roughly $300K ACV, which is also the top end of the stated $150K-$300K production range after 15-25 branches are live."
  - id: A4
    name: "Base-case revenue recognition"
    value: "Average active customers × $25.0K MRR"
    unit: "formula"
    source: "[BP businessModel.revenueStreams + BP gtm.pricing] the base case recognizes only recurring production subscription revenue; paid pilots and onboarding fees are excluded to keep revenue fully reconcilable to customers × ARPU."
  - id: A5
    name: "Base customer ramp"
    value: "M9 first go-live, M11 second, then one net new customer in each Y2 quarter and two more in Y3 H1; 2 EOY Y1, 6 EOY Y2, 8 EOY Y3"
    unit: "production customers"
    source: "[BP milestones + research.market.som] matches 2 distributors in production within 12 months, 5-6 production customers within 24 months, and the researched 8-account year-3 SOM path."
  - id: A6
    name: "Pilot conversion and expansion motion"
    value: "90-day pilot, 60% pilot-to-production, 50% first-account expansion within 9 months"
    unit: "funnel rates"
    source: "[BP investorMemo.firstCustomer.initialContract + BP gtm.funnelTargets] base customer additions assume the first 4-6 design partners produce 2 production customers in Y1 and later land-and-expand behavior."
  - id: A7
    name: "Target gross margin"
    value: "70"
    unit: "percent"
    source: "[BP businessModel.targetGrossMarginPct] steady-state software gross margin target for the quote-governance business."
  - id: A8
    name: "COGS ratio"
    value: "30"
    unit: "percent of revenue"
    source: "[Derived from A7] COGS is fixed at 30% so the model stays at the BP 70% gross-margin target."
  - id: A9
    name: "Monthly churn"
    value: "1.5"
    unit: "percent"
    source: "Startup-finance heuristic for integration-heavy enterprise workflow software with meaningful switching costs but real bundling risk from Higharc, Epicor, or Spruce."
  - id: A10
    name: "Loaded annual cash compensation benchmarks"
    value: "CEO $156K, core engineering $192K, product/data $180K, solutions/implementation $150K, GTM/partnerships $168K, G&A/revops $120K"
    unit: "USDK per FTE-year"
    source: "Startup-finance heuristic for a lean U.S. pre-seed vertical SaaS team selling into enterprise accounts without paying big-tech cash rates."
  - id: A11
    name: "Y1 hiring ramp"
    value: "CEO + founding eng at start; solutions in M4; product/data in M7; partnerships in M10"
    unit: "hire timing"
    source: "[BP team] direct month-mapped translation of the stated Month 0 / 3 / 6 / 9 hiring sequence."
  - id: A12
    name: "Y2-Y3 hiring ramp"
    value: "Second core engineer M14, second GTM M17, second solutions hire M20, second product/data hire M29, revops/G&A M33"
    unit: "hire timing"
    source: "[BP milestones + BP strategicChoices.sequencingRationale] non-founder hiring stays milestone-gated until the first overlay workflow, second connector, and partner motion are proven."
  - id: A13
    name: "Non-payroll operating spend ramp"
    value: "Overhead grows from $16K per month in Q1Y1 to $45K per month in Q4Y3"
    unit: "USDK per month"
    source: "[BP operations + BP fundingAsk.useOfFundsSummary + research.regulatoryTechnicalConstraints] includes cloud, travel, security review, legal, accounting, and integration tooling required for enterprise distributor deployments."
  - id: A14
    name: "Current pre-seed raise"
    value: "2.2"
    unit: "M USD"
    source: "[BP fundingAsk.targetFundingRangeUsd] uses the low end of the stated $2M-$4M range because the model delays quota-sales hiring until after the first two production wins."
  - id: A15
    name: "Funding milestone for the current round"
    value: "Reach 6 production customers, prove a second connector path, sustain 45-day onboarding, and source at least 2 opportunities through partners"
    unit: "milestone"
    source: "[BP milestones 12–24 months + BP experimentRoadmap 12–18 months] this is the proof package the pre-seed is sized to reach with a six-month cash buffer."
  - id: A16
    name: "Cash conversion policy"
    value: "EBITDA approximates operating cash flow"
    unit: "policy"
    source: "Startup-finance heuristic; the model assumes no debt, capex, taxes, or material working-capital swings because the company is software-only at this stage."
  - id: A17
    name: "Blended CAC"
    value: "138.7"
    unit: "USDK per new production customer"
    source: "[Derived from A5 + A12 + A13] Y2-Y3 sales and marketing spend of $832K divided by 6 new production customers."
  - id: A18
    name: "Runway planning horizon"
    value: "24"
    unit: "months"
    source: "[BP fundingAsk.runwayMonths + BP strategicChoices.sequencingRationale] BP asks for 18 months, but the model extends the planned proof window to 24 months by holding GTM hiring back until post-pilot conversion."
