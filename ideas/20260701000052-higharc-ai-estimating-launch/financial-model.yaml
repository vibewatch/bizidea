scenarios:
  downside:
    description: "Structured-takeoff adoption spreads more slowly, pilot conversions slip, ACV lands at $240K, and onboarding stays more services-heavy than planned."
    y3RevenueK: 1650.0
    y3EbitdaK: -950.0
    cashLowPointK: -320.0
    keyAssumptionChanges:
      - "ARPU falls from $300K to $240K because accounts stop at partial branch rollout."
      - "Only 6 production customers are live by end Y3 instead of 8."
      - "Gross margin slips from 70% to 65% because mapping and onboarding remain more manual."
  base:
    description: "Base case keeps revenue recurring-only, lands 2 production customers in Y1, reaches 6 by Y2 exit, and ends Y3 with 8 production customers at $300K ACV and 70% gross margin."
    y3RevenueK: 2250.0
    y3EbitdaK: -445.1
    cashLowPointK: 187.6
    keyAssumptionChanges:
      - "All operating assumptions A1-A18 as modeled."
  upside:
    description: "Partner-sourced deals arrive earlier, branch expansion lands faster, ACV rises to $330K, and the company reaches 10 production customers by Y3 exit with modest gross-margin improvement."
    y3RevenueK: 2880.0
    y3EbitdaK: -20.0
    cashLowPointK: 420.0
    keyAssumptionChanges:
      - "ARPU rises from $300K to $330K as early customers add release-order and collaboration modules sooner."
      - "Production customers reach 10 by Y3 exit instead of 8 because partner referrals compress the sales cycle."
      - "Gross margin improves from 70% to 72% once mappings and exception rules are more repeatable."
sensitivity:
  - variable: "ARPU"
    downsideCase: "$240K annual ACV if customers accept only partial branch rollout or seat-like pricing"
    baseCase: "$300K ACV per production customer from A3"
    upsideCase: "$330K ACV if branch expansion and release-order add-ons land earlier"
    y3RevenueImpactK: -450.0
    cashImpactK: -315.0
  - variable: "CAC"
    downsideCase: "$180K if enterprise procurement and partner enablement both take longer than planned"
    baseCase: "$138.7K blended CAC from A17"
    upsideCase: "$110K if partner-sourced deals shorten discovery and trust transfer works"
    y3RevenueImpactK: -150.0
    cashImpactK: -250.0
  - variable: "churn"
    downsideCase: "2.5% monthly if the product stays a narrow quote tool and incumbents bundle enough overlap"
    baseCase: "1.5% monthly from A9"
    upsideCase: "1.0% monthly if branch mappings and substitute history become sticky renewal assets"
    y3RevenueImpactK: -180.0
    cashImpactK: -140.0
  - variable: "sales cycle"
    downsideCase: "9 months from pilot start to production if security, legal, or ERP review drags"
    baseCase: "About 6 months from pilot kickoff to production per A6"
    upsideCase: "4-5 months when a builder renewal or AI-takeoff rollout is already forcing urgency"
    y3RevenueImpactK: -300.0
    cashImpactK: -260.0
  - variable: "gross margin"
    downsideCase: "65% if onboarding stays services-heavy and mapping coverage misses the BP 70% threshold"
    baseCase: "70% target gross margin from A7"
    upsideCase: "72% once mappings, exception rules, and security onboarding are productized"
    y3RevenueImpactK: 0.0
    cashImpactK: -113.0
  - variable: "hiring pace"
    downsideCase: "Second GTM and solutions hires are pulled one quarter forward before repeatability is proven"
    baseCase: "Milestone-gated ramp per A11 and A12"
    upsideCase: "Non-critical hires slide one quarter later while core product milestones still hold"
    y3RevenueImpactK: 0.0
    cashImpactK: -180.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      DesignPartners --> PaidPilots
      PaidPilots --> ProductionAccounts
      ProductionAccounts --> ARR
      Expansion --> ARR
      ARR --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: "Revenue engine"
    finding: "Base-case revenue is driven by converting the first two pilots into production, then adding one production account per Y2 quarter and two more in Y3 H1 at a $300K annual ACV."
  - checkName: "Must go right"
    finding: "The first deployments must hit the BP 70% auto-mapping and 45-day onboarding thresholds so the two Y1 production wins actually support the $300K ARPU anchor and later partner motion."
  - checkName: "Model breaks if"
    finding: "If ACV compresses toward $240K while gross margin slips to 65%, the downside case turns cash negative and the company needs a bridge before the next round."
  - checkName: "Next-round proof"
    finding: "The next financing is justified once the company shows 6 production customers, a second connector path, repeatable 45-day onboarding, and at least two partner-sourced opportunities on the same lean cost base."
sanityChecks:
  ruleOf40: "Y3 revenue growth 87.5% + EBITDA margin -19.8% = 67.7%"
  burnMultiple: "Y2 0.7x ($790.7K burn / $1200.0K net new ARR); Y3 0.7x ($445.1K burn / $600.0K net new ARR)"
  revenuePerFte: "$250.0K Y3 average (9.0 avg FTE; $2250.0K revenue; benchmark $200–400K enterprise SaaS)"
  flags:
    - "ARPU is anchored to the top end of the BP $150K-$300K production range, so the model is sensitive to whether early accounts really expand to 15-25 live branches and adjacent modules."
    - "The base case excludes pilot and onboarding fees on purpose, which keeps revenue conservative and fully reconcilable to customers × ARPU but makes the burn profile look harsher than a cash-billed plan would."
    - "Ending cash is only $187.6K in Q4Y3, so one delayed go-live or one quarter of services-heavy onboarding likely forces a bridge despite otherwise solid unit economics."
    - "The initial wedge is small at $55.8M TAM and $18.0M SAM, so venture-scale upside still depends on downstream expansion into release ordering, manufacturer collaboration, or other modules after quote-governance proof."
    - "The model assumes the team keeps quota-sales hiring late; if management pulls GTM hiring forward before repeatability is proven, the pre-seed should move toward the high end of the BP $2M-$4M range."
