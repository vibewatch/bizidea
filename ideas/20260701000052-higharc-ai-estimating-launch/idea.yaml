jobsToBeDone:
  - job: >-
      When a production builder sends a revised floorplan or option package
      before a quote deadline, help the branch estimating team generate a
      contract-compliant quote delta, so they can respond the same day without
      reworking the whole estimate.
    currentAlternative: Spreadsheet quote books stitched together from takeoff exports, ERP lookups, and email approval threads
    successMetric: Hours from revised plan receipt to outbound quote and gross-margin variance versus target
  - job: >-
      When a requested product is missing, long-lead, or unprofitable in one
      branch, help the category manager approve a builder-safe substitute, so
      orders can release without blowing pricing or spec compliance.
    currentAlternative: Phone calls, email, and branch-level tribal knowledge about acceptable substitutions
    successMetric: Quote exception resolution time and percent of quotes released without manual escalation
ideaScorecard:
  signalStrength:
    score: 4
    rationale: A named US LBM launch, fresh Series C, and concrete workflow details are strong proof that distributor-side digital estimating is happening now, even though public adoption data is still early.
  painIntensity:
    score: 4
    rationale: Quote delays and underpriced exceptions hit distributor gross margin and strategic builder relationships, but the pain is operational rather than existential.
  wedgeClarity:
    score: 5
    rationale: Branch-level quote exception governance for production-homebuilder accounts is a narrow workflow with obvious owners, triggers, and measurable ROI.
  defensibility:
    score: 4
    rationale: The moat comes from branch catalog mappings, substitute approval history, and quote-to-order outcome data that compound over time, though estimating vendors may try to move adjacent.
  ventureScale:
    score: 5
    rationale: A successful beachhead can expand across categories, distributors, manufacturers, and forecasting workflows inside a massive residential building-products supply chain.
topRisks:
  - name: Dirty branch catalogs
    description: Branch item masters, pack sizes, and local price books are often inconsistent enough to weaken automation accuracy early.
    mitigation: Start with one builder program and a limited set of categories, then use human-in-the-loop approval and reusable mapping rules before broader rollout.
  - name: Workflow fragmentation
    description: Estimators, category managers, and branch leaders may resist a centralized control layer if it feels like it slows local quoting autonomy.
    mitigation: Position the product as an exception queue that preserves branch ownership, and prove faster turnaround plus fewer margin misses on one flagship account before standardizing company-wide.
  - name: Adjacent platform squeeze
    description: Estimating vendors or distributor ERPs could add lightweight exception workflows once this wedge proves valuable.
    mitigation: Integrate across multiple design-data and ERP systems quickly and own the cross-branch substitute and margin dataset that point tools cannot assemble alone.
