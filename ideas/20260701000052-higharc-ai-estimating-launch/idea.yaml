differentiator: >-
  Estimating vendors focus on generating quantities, while distributor ERPs store
  item masters and prices after someone has already made the mapping decisions.
  This company owns the messy middle: branch-specific catalog translation, quote
  exception routing, and substitute governance for builder accounts. Over time it
  builds a proprietary dataset on which plan variants create quote delays, which
  substitutes get accepted, and where margin leaks by branch, builder, and
  category, which is hard for either a generic ERP or a takeoff tool to
  recreate.
