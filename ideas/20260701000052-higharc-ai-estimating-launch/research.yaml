competitors:
- name: Higharc
  stage: scale-up
  wedge: Turns floorplans into spatial data and AI estimates for builders and now distributors.
  pricing: Custom enterprise / not public
  strength: Owns upstream plan data and already has live builder and US LBM relationships.
  weaknessVsUs: Likely optimized for Higharc-native plan workflows, not neutral cross-ERP branch governance.
  sourceRefs:
  - 15
  - 16
  - 17
  - 35
- name: Epicor BisTrack / TradeTek
  stage: incumbent
  wedge: LBM ERP with quote, order, inventory, and newer digital estimating tools.
  pricing: Custom enterprise / not public
  strength: Deep system-of-record position inside pro-dealer operations.
  weaknessVsUs: ERP-first implementation and broad scope can leave AI exception routing and substitute governance under-built.
  sourceRefs:
  - 24
  - 25
- name: ECI Spruce
  stage: incumbent
  wedge: Branch-centric ERP and POS with EDI and estimator-import integrations for regional dealers.
  pricing: Custom enterprise / not public
  strength: Real-time branch visibility, vendor integrations, and strong fit for regional multi-location dealers.
  weaknessVsUs: Improves transaction visibility but is not a neutral control plane for plan revisions, contract checks, and substitution approvals.
  sourceRefs:
  - 26
  - 38
  - 39
- name: Hyphen SupplyPro
  stage: incumbent
  wedge: Builder-supplier portal for order collaboration, scheduling, and job management.
  pricing: Custom enterprise / not public
  strength: Embedded with large homebuilders and supplier coordination once orders are live.
  weaknessVsUs: Starts downstream of quote generation, so it does not solve branch SKU mapping or margin guardrails before the quote leaves.
  sourceRefs:
  - 27
- name: SaberisConnect
  stage: niche
  wedge: Middleware that transfers quotes and orders between design systems and LBM ERPs.
  pricing: Not public; often sold through reseller or integration partners
  strength: Reduces manual re-keying and already understands LBM integration patterns.
  weaknessVsUs: Acts as a data pipe rather than a governed decision layer for pricing, missing SKUs, or approved substitutes.
  sourceRefs:
  - 28
  - 26
regulatoryTechnicalConstraints:
- point: Electronic quotes and approvals must respect E-SIGN and state e-transaction rules, especially when counterparties still want paper alternatives.
  sourceRefs:
  - 31
  - 34
- point: The system has to interchange structured commercial data with ERPs and trading partners, not just export PDFs.
  sourceRefs:
  - 26
  - 32
- point: Product-master normalization matters because distributors need reliable identifiers across suppliers, branches, and customer programs.
  sourceRefs:
  - 26
  - 33
- point: Enterprise buyers will run AI and cyber review against recognized governance and control frameworks.
  sourceRefs:
  - 29
  - 30
validationSignals:
- point: Higharc launched AI estimating for distributors with US LBM as a named first partner, proving live demand at the enterprise edge.
  sourceRefs:
  - 15
  - 16
  - 17
- point: Builders FirstSource processed $1B of digital orders in 2024 and expected more incremental digital sales in 2025, showing distributors can monetize digital workflow upgrades.
  sourceRefs:
  - 21
  - 22
- point: Dealers still advertise manual plan-submission estimating while peers describe same-day response pressure, which is exactly the gap a control plane can close.
  sourceRefs:
  - 18
