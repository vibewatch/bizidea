openQuestions:
- What percentage of quotes on one target builder account currently require manual substitute approval or price override after the takeoff is finished?
- How many 10-75 branch distributors already receive AI-generated takeoffs from Higharc or similar tools beyond the named US LBM launch?
- Will builders accept distributor-generated delta quotes directly, or must every revision flow back through a builder procurement portal?
- Which product categories have clean enough item masters for a first deployment without a heavy services burden?
