  pestle:
  - factor: political
    impact: negative
    point: Tariff and duty policy keeps lumber economics unstable and increases the cost of stale price books.
    sourceRefs:
    - 12
  - factor: economic
    impact: negative
    point: Single-family permits softened at the start of 2026, so enterprise software budgets will face more ROI scrutiny.
    sourceRefs:
    - 11
  - factor: social
    impact: positive
    point: Builders still need personalization without slower cycle times, which increases pressure on suppliers to answer changes faster.
    sourceRefs:
    - 35
  - factor: technological
    impact: positive
    point: Plan AI is now good enough to enter live builder and distributor workflows, shifting value toward governance and interoperability.
    sourceRefs:
    - 15
    - 17
    - 29
  - factor: legal
    impact: neutral
    point: Electronic quotes are legally supportable, but counterparties still need clear acceptance and record-handling rules.
    sourceRefs:
    - 31
    - 34
  adoptionFrictionMatrix:
  - friction: Dirty branch item masters and unit-of-measure conversions
    severity: high
    affectedBuyer: COO or chief digital officer
    mitigation: Start with one builder program and a narrow category pack, then use human-approved mapping rules before wider rollout.
    sourceRefs:
    - 20
    - 26
    - 38
  - friction: Estimator distrust of AI-generated quantities
    severity: high
    affectedBuyer: VP estimating
    mitigation: Keep humans on exception lines only and log overrides against plan and version history until trust improves.
    sourceRefs:
    - 15
    - 17
    - 18
    - 35
  - friction: Cross-branch process standardization
    severity: medium
    affectedBuyer: branch estimating managers
    mitigation: Roll out per builder account with shared pricing and substitute policies before mandating company-wide standardization.
    sourceRefs:
    - 23
    - 24
    - 26
  - friction: Security and legal review for electronic quotes
    severity: medium
    affectedBuyer: CDTO or CIO
    mitigation: Map controls to CSF and AI RMF, enforce SSO and MFA, and document e-record consent and retention practices.
    sourceRefs:
    - 29
    - 30
    - 31
    - 34
