  fiveForces:
    supplierPower:
      score: 3
      rationale: 产品确实依赖 ERP、EDI 和物料主数据集成，但这些输入并非被单一厂商垄断；真正难的是集成深度，不是某一个供应商闸门。
      sourceRefs:
      - 26
      - 28
      - 32
      - 33
    buyerPower:
      score: 4
      rationale: 规模化经销商数量不多、量产住宅开发商又高度集中，它们完全可以在放量前要求看到明确 ROI，因此企业买方议价力很强。
      sourceRefs:
      - 9
      - 10
      - 21
      - 23
    threatOfEntrants:
      score: 3
      rationale: AI 算量新玩家不断冒头，Higharc 也已经跨进分销端；但跨分支映射数据和工作流信任的搭建，远比做一个原始算量功能更难。
      sourceRefs:
      - 15
      - 17
      - 29
      - 35
    threatOfSubstitutes:
      score: 4
      rationale: 经销商完全可以拿 ERP 报价、手工表格、开发商门户和算量工具拼出一个替代方案，不一定非买一层专门控制层。
      sourceRefs:
      - 19
      - 20
      - 24
      - 26
      - 27
      - 28
    competitiveRivalry:
      score: 4
      rationale: 竞争更像相邻挤压而不是正面肉搏：开发商侧 AI、ERP、门户和中间件都已经碰到了工作流的一部分，所以创业公司必须把中立异常治理这一层咬得很深。
      sourceRefs:
      - 15
      - 24
      - 26
      - 27
      - 28
  pestle:
  - factor: 政治
    impact: negative
    point: 关税和税费政策让木材经济性持续不稳，也抬高了过期价目表的代价。
    sourceRefs:
    - 12
  - factor: 经济
    impact: negative
    point: 2026 年初独栋住宅许可走软，企业软件预算会更认真地拷问 ROI。
    sourceRefs:
    - 11
  - factor: 社会
    impact: positive
    point: 开发商仍想继续做个性化，又不愿拖慢周期，这会把供应商的变更响应压力继续往上推。
    sourceRefs:
    - 35
  - factor: 技术
    impact: positive
    point: 图纸 AI 已经好到能进真实的开发商和经销商工作流，价值自然往治理和互操作性迁移。
    sourceRefs:
    - 15
    - 17
    - 29
  - factor: 法律
    impact: neutral
    point: 电子报价在法律上站得住脚，但交易对手仍需要清晰的接受规则和记录处理规则。
    sourceRefs:
    - 31
    - 34
  adoptionFrictionMatrix:
  - friction: 分支物料主数据脏乱、计量单位换算不统一
    severity: high
    affectedBuyer: COO 或首席数字官
    mitigation: 先从一个开发商项目和窄品类包切起，再用人工审核过的映射规则慢慢向更大范围铺开。
    sourceRefs:
    - 20
    - 26
    - 38
  - friction: 估算员不信任 AI 生成的数量
    severity: high
    affectedBuyer: 估算副总裁
    mitigation: 先只把人留在异常行上，并把每次覆盖都和图纸、版本历史绑在一起记清楚，等信任慢慢建立。
    sourceRefs:
    - 15
    - 17
    - 18
    - 35
  - friction: 跨分支流程标准化
    severity: medium
    affectedBuyer: 分支估算经理
    mitigation: 按单一开发商账户逐步上线，先共享定价和替代品政策，再谈全公司的强制标准化。
    sourceRefs:
    - 23
    - 24
    - 26
  - friction: 电子报价的安全和法务审查
    severity: medium
    affectedBuyer: CDTO 或 CIO
    mitigation: 把控制项映射到 CSF 和 AI RMF，强制 SSO 与 MFA，并把电子记录同意和留存规则写清楚。
    sourceRefs:
    - 29
    - 30
    - 31
    - 34
