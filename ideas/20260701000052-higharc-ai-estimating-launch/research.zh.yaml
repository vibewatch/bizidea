  wedge: 在设计系统和 LBM ERP 之间搬运报价与订单的中间件。
  pricing: 未公开；通常通过经销或集成伙伴出售
  strength: 能减少人工二次录入，而且已经理解 LBM 常见的集成模式。
  weaknessVsUs: 它更像数据管道，而不是一层能替客户做改价、缺失 SKU 和已批准替代品决策的治理层。
  sourceRefs:
  - 28
  - 26
regulatoryTechnicalConstraints:
- point: 电子报价和审批必须符合 E-SIGN 及各州电子交易规则，尤其是在交易对手仍想保留纸质替代方案时。
  sourceRefs:
  - 31
  - 34
- point: 系统必须能和 ERP 及交易伙伴交换结构化商业数据，而不只是导出 PDF。
  sourceRefs:
  - 26
  - 32
- point: 物料主数据归一非常关键，因为经销商必须在供应商、分支和客户项目之间拿到可靠标识。
  sourceRefs:
  - 26
  - 33
- point: 企业买家会按照他们熟悉的治理和控制框架，对 AI 与网络安全做正式审查。
  sourceRefs:
  - 29
  - 30
validationSignals:
- point: Higharc 已经和 US LBM 这类具名伙伴一起，把面向经销商的 AI 算量正式上线，说明企业边缘的真实需求已经出现。
  sourceRefs:
  - 15
  - 16
  - 17
- point: Builders FirstSource 在 2024 年处理了 $1B 的数字化订单，而且预期 2025 年数字化销售还会继续增长，说明经销商确实能把数字化工作流升级变成收入。
  sourceRefs:
  - 21
  - 22
- point: 一边是经销商还在宣传手工图纸提交估算，一边是同行已经承认当天响应压力，这正好说明控制层要补的缺口是真实存在的。
  sourceRefs:
  - 18
  - 20
openQuestions:
- 一个目标开发商账户里，当前到底有多少报价在算量完成后仍需要手工审批替代品或手工改价？
- 除了已公布的 US LBM 之外，究竟有多少 10-75 个分支的经销商已经开始接收 Higharc 或类似工具产出的 AI 算量？
- 开发商会不会直接接受经销商给出的差异报价，还是每次修订都必须回到采购门户流转？
- 哪些产品品类的物料主数据足够干净，能在第一轮部署里避开重服务负担？
