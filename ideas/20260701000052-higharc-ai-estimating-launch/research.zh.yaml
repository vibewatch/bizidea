reportMemo:
  executiveTakeaways:
  - AI 算量已经进入真实的经销商工作流，所以瓶颈正从数量生成转向 SKU、定价和替代品的治理决策。
  - 最强切口是一层叠加在现有系统上的报价提速层：能把速度拉起来，但不逼经销商替换 ERP、EDI 或估算系统。
  - Sun Belt 的量产住宅市场最适合做滩头阵地，因为重复户型、年度价目表和开发商集中度会把分支不一致放大。
  - 现有厂商各自占着相邻层，但中立的跨分支异常治理仍明显供给不足。
  marketDefinition: 这个市场是面向美国多分支木材与建材经销商的报价治理软件：把由图纸推导出的算量结果，转成可直接下发到分支、又符合合同的报价，服务的是反复出现的量产住宅开发商项目。
  customerAndBuyer: 日常用户通常是服务量产住宅开发商的 10-75 个分支木材与建材经销商里的估算副总裁或数字化销售总监；真正拍板的往往是多分支建材经销商的 COO 或首席数字官。这个产品最重要的场景，是经销商必须在不更换 ERP 的前提下，把一个开发商大客户在很多分支上的报价口径统一起来。
  buyingTriggers:
  - point: 开发商合同续签，或上游 AI 算量上线，逼着经销商承诺更快、也更一致的报价。
    sourceRefs:
    - 15
    - 16
    - 17
    - 18
    - 23
  - point: 大型量产住宅开发商会把不同社区之间的分支改价差异和替代品口径不一直接暴露出来，而且他们只接受一套商业答案。
    sourceRefs:
    - 9
    - 10
    - 23
  - point: 输入端波动太大，到了续约和重报价周期，过期价目表和临时拍脑袋审批的风险都太高。
    sourceRefs:
    - 12
    - 13
  willingnessToPay:
    summary: 只要报价速度和毛利准确度已经和数字化增长绑在一起，预算就讲得通：BFS 证明数字化下单能直接带来增量材料收入，而 ERP 厂商也把实时毛利控制当成核心价值主张。
    sourceRefs:
    - 21
    - 22
    - 24
    - 26
    - 39
  competitiveLandscape: 竞争主要分散在相邻层：开发商侧 AI 算量、LBM ERP、供应商门户和中间件，而不是某一个完全对位的直接竞品。真正的机会，是把自己做成一层中立决策层，在这些系统之间路由异常。
  incumbentThesis:
  - incumbentClass: AI 算量平台
    point: Higharc 能生成数量，未来也可能继续往下游延伸，但它的核心优势仍是图纸智能，而不是面向任意算量来源、跨 ERP 的中立分支治理。
    sourceRefs:
    - 15
    - 17
    - 35
  - incumbentClass: LBM ERP 系统
    point: Epicor 和 Spruce 已经管住订单、库存和价格可视性，但它们产品太宽、实施也太重，围绕异常密集的开发商项目做细分，动作往往更慢。
    sourceRefs:
    - 24
    - 25
    - 26
  - incumbentClass: 开发商-供应商协同门户
    point: 像 SupplyPro 这样的门户在订单已经活跃之后很有用，但它们并不解决报价前的 SKU 映射、合同合规和替代品审批。
    sourceRefs:
    - 27
  - incumbentClass: 集成中间件
    point: 中间件能在系统间搬运数据，但真正漏毛利的，是改价、缺失 SKU 和已批准替代品这些决策，它们并不拥有。
    sourceRefs:
    - 28
    - 26
    - 32
  regulatoryLandscape: 这个品类更像软件采购问题，而不是牌照问题。真正卡点在电子记录是否有效、网络安全审查能不能过，以及产品能否和买卖双方系统干净地交换结构化商业数据。
  technologyLandscape: 技术栈现在已经可行，因为上游的图纸 AI 能产出结构化数量，下游的现代叠加层也能把 ERP、EDI、物料主数据和规则数据拼起来。难点早就不是 OCR 本身，而是怎么在脏乱的分支数据之上做受控决策。
  distributionChannels:
  - point: 直接卖给那些已经在投电商、ERP 和数字化下单项目的规模化经销商里的 COO/CDTO 与估算负责人。
    sourceRefs:
    - 14
    - 21
    - 22
    - 23
  - point: 和 ERP 顾问、实施伙伴及上游算量厂商联合销售，因为大多数经销商更愿意叠一层，而不是推倒重来。
    sourceRefs:
    - 24
    - 26
    - 28
  - point: 先在一个战略开发商账户上落地，证明差异报价更快、人工升级更少，再按分支和品类扩。
    sourceRefs:
    - 18
    - 20
    - 37
  partnershipEcosystem:
  - point: Higharc 这类上游伙伴，可以直接提供结构化数量数据，而不是只给原始 PDF。
    sourceRefs:
    - 15
    - 17
    - 35
  - point: ERP 和集成伙伴依然绕不过去，因为经销商的价目表、采购规则和订单创建仍在核心系统里。
    sourceRefs:
    - 24
    - 26
    - 28
    - 32
  - point: 开发商侧采购和协同平台更像下游集成点，而不是眼下就要替换掉的对象。
    sourceRefs:
    - 27
    - 37
  dataMoats:
  - point: 最值钱的数据不是原始图纸本身，而是每个分支如何把图纸数量映射成可销售 SKU、价格和可接受替代品的历史。
    sourceRefs:
    - 18
    - 20
    - 26
    - 28
  - point: 时间一长，重复户型上的报价差异、覆盖模式和毛利结果，会慢慢长成一套专有推荐引擎。
    sourceRefs:
    - 15
    - 17
    - 35
  geographicConsiderations:
  - point: 先去量产住宅最集中的地方：前 10 个州已经贡献了大部分独栋许可，而很多都市圈又被头部开发商牢牢占住。
    sourceRefs:
    - 10
    - 11
  - point: 在更碎片化的定制住宅商市场里，分支标准化 ROI 没那么高，所以早期还是该盯紧重复户型社区和年度价目表大客户。
    sourceRefs:
    - 9
    - 10
  sensitivityCases:
  - case: 独栋住宅许可连续几个季度偏弱
    impact: 销售周期会被拉长，买家也会推迟上新软件；除非你把 ROI 讲成毛利保护和人效杠杆，而不是增长工具。
    sourceRefs:
    - 8
    - 11
  - case: 大宗材料波动明显降温
    impact: 定价治理的紧迫感会略降，但重报价控制和分支一致性依然重要，因为图纸改版和替代品不会消失。
    sourceRefs:
    - 12
    - 13
  - case: Higharc 或 ERP 厂商把轻量异常功能打包进去
    impact: 如果创业公司不能保持对多种算量来源、分支目录和开发商项目的中立性，这个切口就会迅速变窄。
    sourceRefs:
    - 15
    - 24
    - 25
    - 26
  validationPlan:
  - priority: high
    question: 一个开发商账户每周到底有多少报价，在算量完成后仍需要手工改价、替代品审批或重新映射？
    evidenceToGather: 连续 12 周的报价日志，按分支和开发商拆出异常原因。
  - priority: high
    question: 哪些产品品类的物料主数据足够干净，适合做第一轮上线？
    evidenceToGather: 框架、窗户和木作在 3 个分支上的 SKU、包装规格和合同价样本导出。
  - priority: medium
    question: 开发商会不会直接接受经销商给出的差异报价，还是每次变更都得回到采购门户流转？
    evidenceToGather: 2 个目标开发商账户的流程图和系统截图。
  - priority: medium
    question: 估算员在放出报价前，究竟多常会否掉或修改 AI 生成的数量？
    evidenceToGather: 拿 25 套近期住宅，逐一对比 AI 算量结果与最终发货订单。
analysisModels:
  marketMapDiagram:
    title: LBM 报价治理地图
    mermaid: |-
      quadrantChart
        title LBM quote-governance map
        x-axis Low branch specificity --> High branch specificity
        y-axis Low workflow urgency --> High workflow urgency
        quadrant-1 Broad but urgent
        quadrant-2 Specialized and urgent
        quadrant-3 Broad and lower urgency
        quadrant-4 Specialized but slower
