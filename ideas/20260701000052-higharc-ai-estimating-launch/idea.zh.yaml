differentiator: 算量厂商专注把数量算出来，经销商 ERP 则是在有人做完映射决定之后才存物料主数据和价格。这个公司吃的是中间最脏的一层：面向开发商大客户的分支级目录翻译、报价异常分发和替代品治理。时间越久，它越能积累一套专有数据：哪些户型变体最容易拖慢报价、哪些替代品更容易被接受、毛利到底在什么分支、哪个开发商、哪类品类上漏掉。这些都不是通用 ERP 或算量工具容易补出来的。
