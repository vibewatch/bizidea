problem: 多分支木材和建材经销商今天仍在靠估算员、电子表格、ERP 物料主数据和各分支的经验，把开发商的图纸包、选配手册和版本变更拼成报价。AI 算量能更快给出数量，但最后一公里——把数量映射到本地 SKU、包装规格、已批准替代品、合同价和放单规则——依然没人解决。结果就是报价周转被卡住，大客户上的选配项经常少报、各分支口径不一，毛利也在大开发商账户上不断流失。
targetUser:
  primary: 服务量产型住宅开发商的美国 10-75 个分支木材与建材经销商中的估算副总裁或数字化销售总监
  secondary: 负责处理开发商图纸包和选配手册的分支估算经理、品类经理与战略客户团队
  buyer: 多分支建材经销商的 COO 或首席数字官
startupThesis:
  nonObviousInsight: Higharc 这次上线说明，算量本身正在变成一个功能，而不再是完整产品。一旦户型图能转成结构化 3D 数量数据，真正卡人的环节就移到分支级目录映射、合同合规、替代品审批，以及几十个开发商项目上的毛利异常处理。变化在于，供应商侧的设计数据终于能被机器读懂并流进经销商系统，这让一层中立的报价治理层既可行，也变得紧迫。
  beachhead: 服务量产型住宅开发商、拥有 10-75 个分支的美国木材与建材经销商；这些客户会在多个在建社区重复使用 20-200 套户型和选配手册。
  wedge: 一层接入 AI 算量结果、选配包和各分支物料主数据的控制层，产出可直接下发到分支的报价，并附带合同价校验、缺失 SKU 提醒和已批准替代品推荐。
  whyNowCatalyst: Higharc 与 US LBM 的合作说明，供应商侧 AI 算量已经进入真实的经销商工作流；一旦数量几分钟就能生成，手工处理异常的那一层马上就会变成下一个痛点。
  ventureScalePath: 先从开发商大客户的报价治理切入，再扩到放单、返利回收、库存预留、制造商协同和社区级需求预测，最终吃到住宅建材分销的运营层。
solution: 产品接入由图纸推导出的算量文件、开发商选配手册、分支 ERP 目录和价格协议，先把住宅设计与可销售的分支 SKU 建起一层实时映射。凡是因为缺少物料映射、包装规格吃掉毛利、合同价过期，或替代品还没获批而无法顺畅履约的报价行，系统都会直接标出来。估算团队看到的不再是一张空白电子表格，而是一条异常队列；品类经理则只需要把替代品和目录规则批一次，就能推到所有相关分支。等开发商改了图纸或选配组合，系统会重新生成报价差异，只高亮发生变化的行，团队当天就能回复，不必把整份估算重来一遍。早期部署还能先叠在导出的算量结果和 ERP 数据之上，不用逼客户把现有估算系统或分销系统整套替掉。
goToMarketSeed:
  firstCustomer: 一家位于 Sun Belt、拥有 20-50 个分支的 LBM 经销商，给两家或以上 top-50 量产住宅开发商供应框架、窗户和木作包，靠年度议价价目表和各分支独立物料主数据运作。
  buyingTrigger: 一年一度的开发商合同续签，或 AI 算量项目落地，逼着经销商承诺更快的报价周转和跨分支一致的选配定价。
  currentAlternative: 各分支估算员靠 CAD 或算量软件、ERP 导出的价格表、电子表格报价本和邮件审批拼起来的手工流程。
  switchingReason: 经销商不用换掉现有 ERP 和算量栈，只自动化真正拖慢报价、泄露毛利的异常处理层，因此采用感受更像拿回控制和速度，而不是重做一套系统。
  pricingHypothesis: 按活跃分支和开发商项目收年度 SaaS 费用，再对放单自动化和替代品分析模块加价。
