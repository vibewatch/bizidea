topRisks:
- name: 分支目录脏乱
  description: 各分支的物料主数据、包装规格和本地价目表常常不一致，早期很容易拉低自动化准确率。
  mitigation: 先从一个开发商项目和少量品类切起，用人工审核兜住，再把可复用的映射规则沉淀出来后再扩。
- name: 工作流碎片化
  description: 如果中心化控制层让分支觉得本地报价自主权被削弱，估算员、品类经理和分支负责人可能会抵触。
  mitigation: 把产品包装成保留分支所有权的异常队列，先在一个旗舰账户上证明周转更快、毛利漏损更少，再谈全公司标准化。
- name: 相邻平台挤压
  description: 一旦这个切口被证明值钱，算量厂商或经销商 ERP 都可能补上一层轻量异常工作流。
  mitigation: 尽快跨多种设计数据和 ERP 系统做深集成，并先拿下跨分支替代品与毛利数据集，这些不是单点工具能独立拼出来的。
