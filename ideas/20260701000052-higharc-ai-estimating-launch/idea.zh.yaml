jobsToBeDone:
- job: 当量产住宅开发商在报价截止前发来修订版户型或选配包时，帮分支估算团队快速生成符合合同的报价差异，这样他们当天就能回复，而不用把整份估算重做一遍。
  currentAlternative: 把算量导出、ERP 查询和邮件审批线程硬拼在一起的电子表格报价本。
  successMetric: 从收到修订图纸到报价发出的小时数，以及相对目标值的毛利偏差。
- job: 当某个产品在单个分支缺货、交期太长或利润过薄时，帮品类经理快速批出对开发商安全可用的替代品，这样订单能顺利放行，又不至于打穿价格或规格合规。
  currentAlternative: 围绕可接受替代品展开的电话、邮件，以及分支层面的经验判断。
  successMetric: 报价异常解决时长，以及无需人工升级就能放出的报价占比。
