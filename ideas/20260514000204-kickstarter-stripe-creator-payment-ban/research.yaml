reportMemo:
  executiveTakeaways:
    - >-
      Processor pressure is no longer confined to fringe sites: itch.io publicly said it deindexed content to protect Stripe and PayPal
      relationships, while Kickstarter moved from promoting "After Dark" adult projects to a reported Stripe-driven mature-content clampdown.[1][2][3]
    - >-
      The real buyer pain is not checkout optimization in the abstract; it is preserving lawful GMV when card-network, acquirer, or PSP policy
      shifts force abrupt bans, manual reviews, or merchant-of-record changes.[4][8][14][16][17][18][19]
    - >-
      Generic orchestration vendors already sell multi-PSP routing, but they do not own the sensitive-content workflow across policy mapping,
      creator classification, fallback checkout, and payout continuity—leaving a credible wedge for a specialized control plane.[5][20][21][23][24][26][27]
  marketDefinition: >-
    [1][3][5][35] The relevant market is payment-continuity software for creator and digital-content platforms whose legal inventory can fall
    outside the risk tolerance of card networks, acquirers, or mainstream PSPs. It sits between creator-monetization infrastructure and payment
    orchestration: the buyer is not shopping for another gateway, but for a system that can classify risky inventory, quantify GMV exposure,
    and switch processing or payout paths before a platform-wide ban.
  customerAndBuyer: >-
    [1][3][8][17][18] The day-to-day user is the payments, operations, trust-and-safety, and finance team that has to interpret processor policy,
    forecast GMV at risk, and manage disputes, reserves, and payout continuity. The economic buyer is usually the CFO, VP Payments, or GM of the
    platform because merchant-of-record liability, compliance obligations, and revenue exposure sit at the platform entity level rather than with
    any individual creator.
  buyingTriggers:
    - point: A peer platform crackdown or direct processor warning makes category-wide GMV loss feel imminent.
      sourceRefs:
        - 1
        - 2
        - 3
        - 4
    - point: Decline spikes, reserve pressure, or failed reviews expose the cost of relying on a single processor or static routing logic.
      sourceRefs:
        - 5
        - 6
        - 17
        - 19
        - 21
        - 24
    - point: Leadership needs clarity on who is merchant of record, who owns refunds and disputes, and how to preserve payouts if the primary PSP retreats.
      sourceRefs:
        - 7
        - 8
        - 14
        - 15
        - 16
  willingnessToPay:
    summary: >-
      Budget is easiest to unlock when the product is framed as GMV protection plus operational risk reduction. itch.io explicitly prioritized
      payment-partner continuity over creator convenience, and orchestration vendors already sell reliability, authorization-rate, and redundancy
      benefits into enterprise merchants; that means a platform can justify spend if the tool reduces lost campaigns, emergency engineering work,
      and broad category bans.[3][5][7][20][23]
    sourceRefs:
      - 3
      - 5
      - 7
      - 20
      - 23
  competitiveLandscape: >-
    [5][11][20][23][26][27] The competitive set comes from three directions. High-risk specialists like CCBill can process categories others avoid,
    but they are not neutral control planes across multiple rails. Generic orchestration vendors such as Primer, Spreedly, and IXOPAY can route
    payments across providers, but they do not specialize in content-policy interpretation or creator migration workflows. Stripe Connect and
    similar embedded PSP stacks offer scale and payouts, yet they remain part of the concentration problem if the platform still depends on one
    policy center.
  incumbentThesis:
    - incumbentClass: Embedded PSP stacks
      point: Stripe-class platforms win on onboarding, global payouts, and ecosystem breadth, but they remain a single-policy surface and therefore do not solve continuity when the PSP itself becomes the constraint.
      sourceRefs:
        - 4
        - 7
        - 8
    - incumbentClass: Generic orchestration vendors
      point: Primer, Spreedly, and IXOPAY can route and retry across providers, but they stop short of sensitive-content taxonomy, campaign-level approvals, and creator-by-creator fallback playbooks.
      sourceRefs:
        - 20
        - 21
        - 23
        - 24
        - 26
        - 27
    - incumbentClass: High-risk processors and MoRs
      point: CCBill-class specialists can keep difficult categories live, but they are closer to a destination processor than a control layer coordinating multiple acquirers, payout options, and policy states.
      sourceRefs:
        - 11
        - 13
        - 16
    - incumbentClass: In-house payments teams
      point: Larger platforms can assemble their own spreadsheets, policy reviews, and migrations, but doing so is slow, brittle, and difficult to maintain as network rules and processor relationships keep changing.
      sourceRefs:
        - 5
        - 17
        - 18
        - 30
  regulatoryLandscape: >-
    [4][8][13][14][15][16][17][18][19] The constraint set is contractual and quasi-regulatory as much as statutory. Card networks and acquiring
    banks require enhanced controls for higher-risk merchants; banks are instructed to monitor third-party payment processors for complaint volume,
    return rates, and suspicious activity; and merchant-of-record rules must be unambiguous to the customer. In practice, a creator platform can be
    fully legal yet still lose mainstream processing if its controls, disclosures, or category profile no longer fit partner tolerances.
  technologyLandscape: >-
    [5][6][20][21][23][24][26][27] The building blocks are already mature: multi-PSP routing, retries, reconciliation, payout controls, and neutral
    abstraction layers all exist. The missing layer is content-policy-aware orchestration that connects moderation metadata with payment eligibility,
    fallback routing, and payout continuity instead of treating every decline as a generic payment event.
  distributionChannels:
    - point: Founder-led outbound to CFOs, heads of payments, and platform GMs immediately after a public crackdown or internal processor warning.
      sourceRefs:
        - 1
        - 2
        - 3
    - point: Co-sell motions with orchestration vendors, alternative acquirers, and high-risk processors that need a policy and migration layer above their own rail.
      sourceRefs:
        - 11
        - 20
        - 23
        - 26
    - point: Referrals from payments consultants, trust-and-safety advisers, and compliance specialists already helping platforms respond to reserves, complaints, or category reviews.
      sourceRefs:
        - 17
        - 18
        - 19
  partnershipEcosystem:
    - point: Alternative or high-risk processors and MoR partners are necessary for the recovery path, but they become more valuable when wrapped in a neutral decision layer that can selectively route inventory.
      sourceRefs:
        - 11
        - 13
        - 16
    - point: Orchestration vendors and PSP-agnostic infrastructure providers can shorten time-to-market by handling routing, tokenization, and retries while the startup owns policy and continuity logic.
      sourceRefs:
        - 20
        - 23
        - 24
        - 26
        - 27
    - point: Legal and compliance partners matter because the product will frequently be sold during live policy disputes, where buyers need documented controls as much as code.
      sourceRefs:
        - 17
        - 18
        - 19
  dataMoats:
    - point: A proprietary map linking content classes, creator histories, processor restrictions, decline patterns, and escalation outcomes can improve pre-approval and fallback recommendations over time.
      sourceRefs:
        - 1
        - 3
        - 4
        - 16
    - point: Recovered-GMV and approval-rate data across fallback routes can become a defensible benchmark corpus that generic orchestrators do not naturally accumulate.
      sourceRefs:
        - 5
        - 21
        - 24
        - 27
  geographicConsiderations:
    - point: The U.S. is the most practical first market because it already has a large crowdfunding base, large creator-payment platforms, and the clearest evidence of processor-pressure incidents.
      sourceRefs:
        - 29
        - 30
        - 37
    - point: Expansion into the UK and EU is attractive but requires more explicit handling of PSD2, SCA, and cross-border merchant and payout rules.
      sourceRefs:
        - 13
        - 18
    - point: Global platforms will also care about payout continuity, not just checkout continuity, because losing PayPal or card processing can disrupt creator disbursements as well as buyer conversion.
      sourceRefs:
        - 3
        - 7
        - 8
  sensitivityCases:
    - case: Card-network scrutiny intensifies
      impact: If Visa and Mastercard push more enhanced registration, identity, consent, and monitoring requirements into acquiring relationships, buyer urgency rises but implementation complexity rises with it.
      sourceRefs:
        - 14
        - 15
        - 16
    - case: Generic orchestration catches up
      impact: If Primer, Spreedly, or IXOPAY add enough policy logic and workflow tooling, standalone differentiation compresses and the startup must win on content taxonomy, incident playbooks, and GMV-at-risk analytics.
      sourceRefs:
        - 20
        - 23
        - 26
    - case: Alternative rails convert poorly
      impact: If rerouted checkout or specialist processors materially reduce buyer conversion or increase payout friction, the product becomes a niche insurance tool instead of a broad operating layer.
      sourceRefs:
        - 3
        - 9
        - 11
  validationPlan:
    - priority: high
      question: Which design partners will share real processor-review logs, reserve notices, and decline data so the exposure model can be calibrated on live cases?
      evidenceToGather: Signed access to one quarter of campaign-level processor review outcomes, decline codes, reserve changes, and payout incidents from 3 to 5 platforms.
    - priority: high
      question: How much GMV can actually be preserved when creators move from a primary card setup to a fallback processor or MoR path?
      evidenceToGather: Before and after conversion, dispute, refund, and payout timing metrics for at least two cohorts that are rerouted rather than banned.
    - priority: medium
      question: "Which integrations are mandatory for the first deployment: moderation system, catalog, checkout, payout ledger, or general ledger?"
      evidenceToGather: A prioritized integration map across the first ten prospect interviews, including which systems already hold the classification and transaction data needed for continuity decisions.
