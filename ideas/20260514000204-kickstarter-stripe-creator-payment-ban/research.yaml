openQuestions:
  - Which mid-market creator platforms will share real processor-review and reserve data so the at-risk GMV model can be benchmarked on live cohorts?
  - What conversion penalty should be expected when a campaign moves from mainstream card processing to a fallback processor, MoR, or non-card method?
  - Can a single fallback partner cover enough lawful but sensitive inventory, or does the product need a truly multi-acquirer network from day one?
  - Which moderation systems and catalog taxonomies already hold enough metadata to drive content-policy-aware routing without a major labeling project?
