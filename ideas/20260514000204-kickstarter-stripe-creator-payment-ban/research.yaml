competitors:
  - name: Stripe Connect
    stage: incumbent
    wedge: Embedded payments, onboarding, global payouts, and marketplace money movement for software platforms.
    pricing: "$2 per monthly active account when the platform handles pricing, plus 0.25% + 25¢ per payout; alternative rev-share model when Stripe prices users."
    strength: Massive distribution, deep platform tooling, and strong MoR and payout primitives.
    weaknessVsUs: If Stripe is the policy chokepoint, adding more Stripe does not solve continuity for lawful sensitive categories.
    sourceRefs:
      - 7
      - 8
  - name: Primer
    stage: scale-up
    wedge: No-code unified payments infrastructure for routing, retries, checkout optimization, and multi-provider experimentation.
    pricing: Custom enterprise pricing; the public site is demo-led and does not show carded rates.
    strength: Strong abstraction layer, broad integrations, and clear value proposition around fallback routing and speed.
    weaknessVsUs: Generic orchestration rather than category-specific policy intelligence, creator migration workflows, or payout continuity for sensitive inventory.
    sourceRefs:
      - 20
      - 21
      - 22
  - name: Spreedly
    stage: scale-up
    wedge: Open payment orchestration with smart routing, gateway abstraction, and low-code optimization.
    pricing: Custom enterprise pricing; public materials emphasize contact sales and demo-led deployment.
    strength: Mature routing stack, broad integrations, and strong positioning for authorization-rate improvement.
    weaknessVsUs: Optimizes payment paths but does not own content-policy decisions or platform-level continuity playbooks.
    sourceRefs:
      - 23
      - 24
      - 25
  - name: IXOPAY
    stage: scale-up
    wedge: Vendor-neutral payment orchestration, reconciliation, and white-label multi-merchant infrastructure.
    pricing: Custom enterprise pricing; docs reference Starter, Growth, and Enterprise packaging but no public transaction pricing.
    strength: Strong fit for complex multi-entity setups, vendor neutrality, and reconciliation-heavy merchants.
    weaknessVsUs: Better at generic multi-PSP control than at handling sensitive-content policy state, moderation context, and creator-specific fallbacks.
    sourceRefs:
      - 26
      - 27
      - 28
  - name: CCBill
    stage: incumbent
    wedge: High-risk and adult-friendly payment processing, subscriptions, and billing support.
    pricing: Custom processing bundle; public site does not list carded pricing.
    strength: Deep specialization in categories mainstream PSPs often avoid and long operating history in adult and high-risk processing.
    weaknessVsUs: Primarily a destination processor, not a neutral continuity layer across multiple providers and policy states.
    sourceRefs:
      - 11
      - 12
      - 13
