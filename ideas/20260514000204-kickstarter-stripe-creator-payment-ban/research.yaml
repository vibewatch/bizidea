  fiveForces:
    supplierPower:
      score: 5
      rationale: Card networks, acquirers, and mainstream PSPs can unilaterally tighten policy and force platforms to react, so any continuity vendor still depends on powerful upstream counterparties.
      sourceRefs:
        - 4
        - 14
        - 15
        - 16
    buyerPower:
      score: 4
      rationale: The buyer pool is concentrated and sophisticated; many platforms can delay purchase by using bans, spreadsheets, or internal payment teams until an incident becomes severe.
      sourceRefs:
        - 5
        - 17
        - 20
        - 30
    threatOfEntrants:
      score: 3
      rationale: The technical primitives for orchestration are commercially available, but trust, incident handling, policy expertise, and partner relationships still create meaningful barriers.
      sourceRefs:
        - 20
        - 21
        - 23
        - 26
    threatOfSubstitutes:
      score: 4
      rationale: Manual bans, emergency migrations to specialist processors, and generic multi-PSP routing can all substitute for a dedicated continuity layer, even if they are operationally weaker.
      sourceRefs:
        - 5
        - 11
        - 17
        - 24
    competitiveRivalry:
      score: 4
      rationale: Rivalry is already moderate-high because PSPs, orchestration vendors, and specialist processors all touch part of the workflow, even though none owns the full sensitive-content continuity stack.
      sourceRefs:
        - 7
        - 20
        - 23
        - 26
        - 27
  pestle:
    - factor: political
      impact: negative
      point: Civil-liberties groups increasingly frame payment restrictions as private financial censorship, which raises controversy and reputational sensitivity around any lawful-but-sensitive category.
      sourceRefs:
        - 39
        - 40
        - 41
    - factor: economic
      impact: positive
      point: The creator economy continues to expand, increasing the amount of GMV that platforms and investors are motivated to preserve during processor shocks.
      sourceRefs:
        - 35
        - 36
        - 42
    - factor: social
      impact: positive
      point: Direct fan monetization is increasingly accepted as a primary business model for creators, making abrupt platform or processor interruptions more visible and more costly.
      sourceRefs:
        - 30
        - 31
        - 33
    - factor: technological
      impact: positive
      point: Routing, retries, payout tooling, and neutral abstractions are now mature enough that a specialized continuity layer can be assembled without building a full PSP from scratch.
      sourceRefs:
        - 5
        - 20
        - 23
        - 26
        - 27
    - factor: legal
      impact: negative
      point: Merchant-of-record clarity, PCI and PSD2-style requirements, AML monitoring, and network-specific controls all expand implementation scope and increase false-positive risk.
      sourceRefs:
        - 8
        - 13
        - 16
        - 17
        - 18
        - 19
  adoptionFrictionMatrix:
    - friction: False positives in content classification or processor-policy mapping
      severity: high
      affectedBuyer: Head of trust and payments operations
      mitigation: Start with approval-gated recommendations and human review queues before automating routing or takedown actions.
      sourceRefs:
        - 1
        - 3
        - 16
    - friction: Merchant-of-record and liability confusion during fallback flows
      severity: high
      affectedBuyer: CFO or VP Payments
      mitigation: Limit early deployments to a small number of explicit fallback patterns with clear statement descriptors, receipts, and refund ownership.
      sourceRefs:
        - 8
        - 14
        - 15
    - friction: Alternative-rail conversion and payout friction
      severity: high
      affectedBuyer: GM Platform
      mitigation: Deploy first on the riskiest creator cohorts and compare recovered GMV versus full-category bans before expanding automation.
      sourceRefs:
        - 3
        - 9
        - 11
    - friction: Integration complexity across moderation, checkout, and payouts
      severity: medium
      affectedBuyer: Engineering and platform operations lead
      mitigation: Land first with read-only exposure analytics and routing playbooks, then add execution hooks once data quality is proven.
      sourceRefs:
        - 5
        - 20
        - 26
        - 27
market:
  tam:
    value: $90.0M
    rationale: >-
      Estimate: 300 global creator-monetization, crowdfunding, fan-membership, and adjacent digital-content platforms that could justify a
      continuity layer × $300k blended ACV. Anchors include 74 active crowdfunding platforms in the U.S. alone, creator-economy scale at
      Kickstarter and Patreon, and evidence that multi-provider payment infrastructure is already an established enterprise spend category.
      Calc: 300 × $300,000 = $90,000,000.
    isEstimate: true
    sourceRefs:
      - 5
      - 20
      - 23
      - 26
      - 29
      - 30
      - 37
  sam:
    value: $18.0M
    rationale: >-
      Beachhead estimate: 60 U.S./UK/EU crowdfunding, fan-membership, and digital-download platforms with meaningful sensitive-content exposure
      and processor concentration × $300k ACV. This is a constrained subset of the broader creator-platform universe and roughly matches a
      screened slice of the U.S. platform base plus a small number of comparable English-speaking and EU operators. Calc: 60 × $300,000 =
      $18,000,000.
    isEstimate: true
    sourceRefs:
      - 29
      - 30
      - 35
      - 37
  som:
    value: $2.4M
    rationale: >-
      Year-3 reachable case assumes 8 production customers at roughly $300k ARR after a services-heavy enterprise motion that starts with
      exposure analytics and approval-gated fallback routing rather than full automation. Calc: 8 × $300,000 = $2,400,000.
    isEstimate: true
    sourceRefs:
      - 5
      - 20
      - 23
      - 37
