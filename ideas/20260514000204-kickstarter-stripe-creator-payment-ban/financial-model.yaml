date: "2026-05-14"
currency: "USD"
modelStartMonth: "2026-06"
assumptions:
  - id: "A1"
    name: "Model start month"
    value: "2026-06"
    unit: "YYYY-MM"
    source: "[BP date] Model starts the first full month after the 2026-05-14 business-plan date."
  - id: "A2"
    name: "Paid pilot revenue"
    value: "$18K per month for a 3-month pilot"
    unit: "USD/month"
    source: "[BP gtm pricing][BP investorMemo.firstCustomer] Blended from a roughly $30K implementation fee plus an $8K monthly pilot subscription, which keeps the pilot in the low-six-figure annualized range."
  - id: "A3"
    name: "Production revenue per customer"
    value: "$29K per month"
    unit: "USD/month"
    source: "[BP investorMemo.firstCustomer][BP operatingAssumptions] Maps to about $348K ARR, inside the stated roughly $250K-$350K production contract range."
  - id: "A4"
    name: "Customer ramp"
    value: "2 paying customers by M12; 5 production customers by Q4Y2; 8 production customers by Q4Y3"
    unit: "count"
    source: "[BP milestones][BP market.som][Research market.som] Directly anchored to the stated 4-6 customers in years 1-2 and 8 customers / $2.4M year-3 goal."
  - id: "A5"
    name: "Pilot-to-production timing"
    value: "Each new logo runs a 3-month paid pilot before converting to production the following quarter."
    unit: "months"
    source: "[BP experimentRoadmap][BP gtm funnelTargets] The roadmap centers on paid pilots first, then production conversion once recovered-GMV evidence exists."
  - id: "A6"
    name: "Gross margin ramp"
    value: "65%-72% in Y1, 72%-74% in Y2, 75% in Y3"
    unit: "percent"
    source: "[BP businessModel.targetGrossMarginPct][BP strategicChoices.sequencingRationale] Early pilots carry extra partner and manual-review cost before the model reaches the 75% steady-state target."
  - id: "A7"
    name: "Starting cash / pre-seed raise"
    value: "$2.0M"
    unit: "USD"
    source: "[BP fundingAsk] Uses the low end of the stated $2M-$3M pre-seed target range."
  - id: "A8"
    name: "Loaded annual cash compensation by role"
    value: "CEO $120K; engineering $180K; product/risk $168K; solutions $156K; risk ops $132K; AE $150K; customer success $126K; finance/G&A $114K"
    unit: "USD/year"
    source: "[BP team] Pre-seed U.S. fintech SaaS compensation heuristic using lean cash pay and no executive layering."
  - id: "A9"
    name: "Year-1 hiring timing"
    value: "Month 0 CEO/founder, founding engineer, and founding product/risk lead; month 4 solutions engineer; month 6 risk operations lead; month 9 first account executive"
    unit: "timing"
    source: "[BP team] Mirrors the hiring sequence stated in the plan."
  - id: "A10"
    name: "Post-pilot hires"
    value: "Second engineer in M15, customer success in M18, second AE in M28, finance/G&A in M32"
    unit: "timing"
    source: "[BP strategicChoices.sequencingRationale] Startup-finance heuristic: later hires are pulled only after paid pilots and repeatable implementations exist."
  - id: "A11"
    name: "Non-payroll operating expense"
    value: "$22K-$44K per month across cloud, compliance, travel, legal, and partner onboarding"
    unit: "USD/month"
    source: "[BP operations][Research regulatoryTechnicalConstraints] Payments-risk tooling needs higher-than-average legal, compliance, and partner support spend even before scale."
  - id: "A12"
    name: "Sales efficiency / CAC"
    value: "$90K CAC and about a 6-month enterprise sales cycle"
    unit: "USD/customer"
    source: "[BP gtm funnelTargets] CAC is rounded from modeled steady-state S&M spend per new production customer and is consistent with an incident-led mid-market enterprise sale."
  - id: "A13"
    name: "Steady-state churn"
    value: "2.0% monthly logo churn"
    unit: "percent"
    source: "[Research sensitivityCases][Research openQuestions] Heuristic for a small, concentrated, high-stakes platform customer base where partner-policy shifts can still cause logo loss."
  - id: "A14"
    name: "Cash flow simplification"
    value: "No debt, no capex, and working-capital swings assumed immaterial, so cash roughly follows EBITDA."
    unit: "policy"
    source: "Startup-finance heuristic: acceptable for a pre-seed software model when payment-float balances are not being funded on balance sheet."
  - id: "A15"
    name: "Funding milestone"
    value: "Use pre-seed to reach 5 production customers, 2 referenceable case studies, and seed-ready proof that rerouted cohorts preserve at least 60% of at-risk GMV, then keep a 6-month buffer."
    unit: "milestone"
    source: "[BP milestones][BP fundingAsk][BP investorMemo.mustBeTrue]"
