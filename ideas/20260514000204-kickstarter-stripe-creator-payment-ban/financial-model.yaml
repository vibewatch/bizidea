scenarios:
  downside:
    description: "Sales cycles slip one quarter, production ARPU lands at $26K MRR, and gross margin stalls at 72% because fallback cohorts stay manual."
    y3RevenueK: 1848.0
    y3EbitdaK: -238.0
    cashLowPointK: 182.0
    keyAssumptionChanges:
      - "Production pricing averages $26K MRR instead of $29K."
      - "Only 7 production customers are live by Q4Y3."
      - "Gross margin reaches only 72% because manual review and partner fees persist."
  base:
    description: "The company closes one new logo per quarter after proof points emerge, converts each through a 3-month paid pilot, and reaches 75% gross margin in Y3."
    y3RevenueK: 2424.0
    y3EbitdaK: 11.5
    cashLowPointK: 616.2
    keyAssumptionChanges:
      - "Production ARPU stays at $29K MRR."
      - "Three new Y3 logos follow the planned pilot-to-production cadence."
      - "Gross margin reaches the 75% target by Y3."
  upside:
    description: "Reference accounts shorten sales cycles, the second AE ramps cleanly, and customers expand payout workflows earlier than planned."
    y3RevenueK: 2856.0
    y3EbitdaK: 278.0
    cashLowPointK: 742.0
    keyAssumptionChanges:
      - "Production pricing averages $31K MRR through earlier workflow expansion."
      - "The eighth customer is live by Q3Y3 instead of Q4Y3."
      - "Gross margin reaches 77% as manual-review cost falls faster."
sensitivity:
  - variable: "ARPU"
    downsideCase: "$26K production MRR"
    baseCase: "$29K production MRR"
    upsideCase: "$31K production MRR"
    y3RevenueImpactK: -252.0
    cashImpactK: -189.0
  - variable: "CAC"
    downsideCase: "$120K CAC"
    baseCase: "$90K CAC"
    upsideCase: "$75K CAC"
    y3RevenueImpactK: 0.0
    cashImpactK: -90.0
  - variable: "churn"
    downsideCase: "3.0% monthly logo churn"
    baseCase: "2.0% monthly logo churn"
    upsideCase: "1.0% monthly logo churn"
    y3RevenueImpactK: -116.0
    cashImpactK: -84.0
  - variable: "sales cycle"
    downsideCase: "9-month enterprise cycle"
    baseCase: "6-month enterprise cycle"
    upsideCase: "4-month incident-led cycle"
    y3RevenueImpactK: -348.0
    cashImpactK: -226.0
  - variable: "gross margin"
    downsideCase: "72% steady-state gross margin"
    baseCase: "75% steady-state gross margin"
    upsideCase: "77% steady-state gross margin"
    y3RevenueImpactK: 0.0
    cashImpactK: -73.0
  - variable: "hiring pace"
    downsideCase: "Second AE and finance hire pulled forward by 2 quarters without faster closes"
    baseCase: "Planned milestone-based hiring"
    upsideCase: "Support hires delayed one quarter until case studies are live"
    y3RevenueImpactK: -40.0
    cashImpactK: -128.0
modelDiagram:
  title: "unit economics flow"
  mermaid: |
    flowchart LR
      IncidentSignals[Processor warning / decline spike] --> Pipeline[Qualified pilot pipeline]
      Pipeline --> PaidPilots[3-month paid pilots]
      PaidPilots --> Production[Production contracts]
      Production --> Revenue[Subscription + GMV-preservation fees]
      Revenue --> GrossProfit[Gross profit after partner and review costs]
      GrossProfit --> Cash[Cash runway and next-round milestone]
modelSanity:
  - checkName: "Revenue engine"
    finding: "Base-case revenue reaches $2.4M in Y3 by converting one new logo per quarter from a 3-month pilot into a roughly $348K production contract."
  - checkName: "Must go right"
    finding: "The model needs paid pilots to convert within one quarter because hiring stays lean and only one AE is funded until Y3."
  - checkName: "Model breaks if"
    finding: "If the sales cycle stretches to 9 months or gross margin stays near 72%, downside cash falls toward roughly $182K before the next raise."
  - checkName: "Next-round proof"
    finding: "The next financing is justified once 5 production customers and 2 referenceable case studies prove at least 60% GMV preservation with acceptable dispute and payout metrics."
sanityChecks:
  ruleOf40: "Y3 growth 75.7% + EBITDA margin 0.5% = 76.2%"
  burnMultiple: "Y2 burn multiple 0.4x ($473K net burn / $1.145M net new revenue); Y3 turns slightly EBITDA positive."
  revenuePerFte: "$242K Y3 using 10 Q4Y3 FTE (benchmark roughly $200K-$400K SaaS)"
  flags:
    - "The model is still concentrated: 8 production customers generate nearly all Y3 revenue, so one lost logo would materially change the outcome."
    - "Gross margin only reaches target in Y3; if manual review, partner support, or reserve-management work stays heavy, profitability is delayed."
    - "Cash stays positive in the base case, but only because hiring remains disciplined and the company does not add extra partner, compliance, or support staff ahead of proof points."
