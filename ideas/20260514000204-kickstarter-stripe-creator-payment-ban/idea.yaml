topRisks:
  - name: Alternative-rail conversion risk
    description: Backers and subscribers may convert worse on fallback payment methods than on standard card checkout, limiting recovered GMV.
    mitigation: Start where customers only need to save high-risk segments, optimize routing by cohort, and prove revenue recovery versus blanket bans before expanding scope.
  - name: Acquirer concentration risk
    description: Backup processors may also tighten policies, leaving the company exposed if it depends on too few partners or geographies.
    mitigation: Build a multi-acquirer network from day one, avoid promising one universal rail, and position the product as continuity orchestration rather than a single processor replacement.
  - name: Integration and trust complexity
    description: Platforms will hesitate to adopt if the system touches moderation, checkout, payouts, and reserves without proving operational accuracy.
    mitigation: Land first with exposure analytics and approval-gated fallback workflows, then expand into automated routing after showing recovered GMV and low error rates.
