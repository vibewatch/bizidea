competitors:
  - name: Stripe Connect
    stage: incumbent
    wedge: 为软件平台提供嵌入式支付、上线引导、全球打款和市场资金流转。
    pricing: "$2 per monthly active account when the platform handles pricing, plus 0.25% + 25¢ per payout; alternative rev-share model when Stripe prices users."
    strength: 超大分发规模、深度平台工具，以及强大的 MoR 和打款原语。
    weaknessVsUs: 若 Stripe 本身就是政策卡口，叠加更多 Stripe 并不能解决合法敏感品类的连续性问题。
    sourceRefs:
      - 7
      - 8
  - name: Primer
    stage: scale-up
    wedge: 面向路由、重试、结账优化和多提供商实验的无代码统一支付基础设施。
    pricing: Custom enterprise pricing; the public site is demo-led and does not show carded rates.
    strength: 强大的抽象层、广泛集成，以及围绕备用路由和速度的清晰价值主张。
    weaknessVsUs: 通用编排，不具备品类专属的政策情报、创作者迁移工作流或敏感库存的打款连续性。
    sourceRefs:
      - 20
      - 21
      - 22
  - name: Spreedly
    stage: scale-up
    wedge: 具备智能路由、网关抽象和低代码优化的开放支付编排平台。
    pricing: Custom enterprise pricing; public materials emphasize contact sales and demo-led deployment.
    strength: 成熟的路由协议栈、广泛集成，以及围绕授权率提升的强力定位。
    weaknessVsUs: 优化支付路径，但不掌握内容政策决策或平台级连续性手册。
    sourceRefs:
      - 23
      - 24
      - 25
  - name: IXOPAY
    stage: scale-up
    wedge: 供应商中立的支付编排、对账和白标多商户基础设施。
    pricing: Custom enterprise pricing; docs reference Starter, Growth, and Enterprise packaging but no public transaction pricing.
    strength: 非常适合复杂多主体架构、供应商中立性和对账密集型商户。
    weaknessVsUs: 擅长通用多 PSP 管控，而非处理敏感内容政策状态、审核上下文和创作者专属备用方案。
    sourceRefs:
      - 26
      - 27
      - 28
  - name: CCBill
    stage: incumbent
    wedge: 高风险和成人友好的支付处理、订阅和账单支持。
    pricing: Custom processing bundle; public site does not list carded pricing.
    strength: 深度专注于主流 PSP 常常回避的品类，在成人和高风险处理领域拥有悠久运营历史。
    weaknessVsUs: 主要是目的地处理商，而非跨多个提供商和政策状态的中立连续性层。
    sourceRefs:
      - 11
      - 12
      - 13
regulatoryTechnicalConstraints:
  - point: 卡组织及其收单行生态要求高风险商户品类具备强化管控、监控和明确保障措施。
    sourceRefs:
      - 14
      - 15
      - 16
  - point: 银行被要求监测第三方支付处理商的投诉、退款率、欺诈指标和可疑活动，这给任何备用网络带来了更重的合规负担。
    sourceRefs:
      - 17
      - 18
      - 19
  - point: 商户记录方身份、账单描述符、退款和争议归属必须明确，否则平台和处理商将面临真实的罚款风险。
    sourceRefs:
      - 8
      - 15
  - point: PSD2、SCA、PCI 以及本地化支付合规要求，一旦初创公司将业务扩展到初始窄场景之外，就会增加复杂度。
    sourceRefs:
      - 13
      - 18
validationSignals:
  - point: Itch.io 明确表示，为保护与 Stripe 和 PayPal 的关系，下架了成人 NSFW 内容，并正在寻找更具包容性的处理商。
    sourceRefs:
      - 3
  - point: Kickstarter 在据报由 Stripe 主导的内容收紧之前，曾主动通过"After Dark"推广成人项目——这显示了可接受库存的变化有多快。
    sourceRefs:
      - 1
      - 2
  - point: Patreon 的增长证明，创作者直接付费可以支撑主流规模的大型持久业务。
    sourceRefs:
      - 31
      - 33
  - point: YouTube 过去三年向创作者、艺术家和媒体公司支付了超过 700 亿美元，证实创作者变现基础设施能支撑极大规模的支付流量。
    sourceRefs:
      - 42
  - point: "Gumroad 和 CCBill 呈现了市场上已有的两种默认回应：彻底禁止，或接入专业高风险处理商。"
    sourceRefs:
      - 9
      - 10
      - 11
