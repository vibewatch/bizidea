  - point: 据报活动可被中途或追溯拒付，意味着平台需要在事故发生前就准备好备用通道，而不是等创作者已被停播后再补救。
    signalRefs: [项目上线后也可能遭到执法打压]
    sourceRefs: [1]
  - point: 有长期变现记录的创作者也受到波及，说明可寻址消费是现有的 GMV 风险敞口，而非对新创作者供给的投机性预测。
    signalRefs: [有成熟变现记录的创作者也可能被一刀切断]
    sourceRefs: [1]
