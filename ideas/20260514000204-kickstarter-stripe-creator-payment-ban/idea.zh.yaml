jobsToBeDone:
  - job: 当处理商收紧内容规则时，帮助我们的平台让合规创作者保持变现，从而守住 GMV 而不必封禁整个品类。
    currentAlternative: 人工审核、紧急联系处理商和大范围内容封禁
    successMetric: 风险 GMV 的守住比例，以及备用结账的启动耗时
  - job: 当财务团队追问我们对某处理商政策变化的敞口时，帮助我们的团队量化活动、创作者和打款风险，让管理层在营收落空之前就能行动。
    currentAlternative: 跨处理商导出数据、审核标签和打款数据的电子表格分析
    successMetric: 生成处理商敞口报告的耗时，以及突发支付中断次数的减少幅度
