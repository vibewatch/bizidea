      sourceRefs: [1]
problem: >-
  承载合法但对卡组织敏感内容的创作者平台，往往只依赖单一处理商完成活动结账、
  质押收款和创作者打款。一旦处理商调整政策，平台可能在几乎没有任何操作预警的情
  况下被迫封禁品类、回滚进行中的活动，或导致老创作者的营收瞬间落空。现有信任与
  安全工具能帮助审核内容，但无法给支付、财务和平台团队提供一种在卡组织压力打压
  合法品类时守住 GMV 的手段。
targetUser:
  primary: 服务于合法但敏感内容品类的创作者变现平台，其支付与平台运营负责人
  secondary: 同类平台的信任安全与财务负责人
  buyer: CFO、支付副总裁或创作者平台 GM
startupThesis:
  nonObviousInsight: >-
    最值得做的初创公司不是又一个成人专属平台，也不是通用加密支付。Steam、
    Itch.io、Kickstarter相继出现同一模式之后，最紧迫的预算项目变成了支付连续性
    软件——帮助平台对敏感内容分类、让合规创作者保持活跃，并在政策冲击演变为 GMV
    损失之前切换处理通道。
  beachhead: >-
    年 GMV 在 2000 万至 2 亿美元之间、5%–30% 的合法成人或擦边内容敞口、
    以 Stripe 作为主要银行卡处理商的众筹、粉丝会员制和数字下载平台
  wedge: >-
    一个支付连续性控制面——对活动风险评分、预审备用处理通道资格，并在卡组织
    拒绝敏感内容时自动启动备用结账和打款流程
  whyNowCatalyst: >-
    Kickstarter 步 Steam 和 Itch.io 后尘，加上活动中途或追溯拒付的风险，让支付
    审查从政治抱怨变成了迫在眉睫的基础设施问题和董事会级营收风险。
  ventureScalePath: >-
    先从承受成人内容压力的创作者平台起步，再扩展到其他合法但敏感的商户——粉丝圈
    市场、远程医疗订阅、交友平台，以及在收单方政策变化时需要多通道连续性的全球
    数字商品业务。
solution: >-
  打造一个支付连续性平台，嵌入创作者内容目录、审核系统、结账流程和打款账本。
  产品将活动和创作者与处理商政策进行比对分类，维护一张符合资质的收单行与备用通
  道的动态地图，并在活动被封禁前自动准备好备用流程。对于受影响的活动，可将结账
  重定向到托管商户记录方或合作收单行，呈现 ACH 或钱包备用方案，并通过冻结资金
  和拒付管控保障创作者打款运营。系统还为财务团队提供实时敞口看板，按处理商、内
  容类型和地域展示 GMV 风险，让平台在决定是否分割库存时无需封禁整个品类。
goToMarketSeed:
  firstCustomer: >-
    一家美国粉丝会员制或众筹平台，付费用户超过 10 万，GMV 超过 5000 万美元，
    拥有一定比例的合法成人创作者，其营收目前依赖 Stripe
  buyingTrigger: >-
    平台收到 Stripe 或收单行的政策警告、遭遇品类级拒付激增，或在同行平台公开
    封禁类似内容后需要应急预案
  currentAlternative: >-
    由财务、信任安全和工程团队拼凑的人工政策分类、全品类封禁、临时备用处理商
    和内部支付迁移
  switchingReason: >-
    平台无需在全面停播与漫长内部重建之间二选一，而是直接获得一个现成的控制层——
    覆盖活动分类、备用路由和创作者迁移，快速守住合法 GMV
  pricingHypothesis: >-
    平台订阅费加上通过备用通道路由的受保护 GMV 的基点收费，另收政策映射和处理
    商集成的实施费
whyNow:
  - point: Kickstarter 步 Steam 和 Itch.io 后尘，说明卡组织压力正在向更大的创作者平台蔓延，支付连续性已成为主流平台问题。
    signalRefs: [卡组织压力正向主流创作者平台蔓延]
