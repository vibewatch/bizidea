topRisks:
  - name: 备用通道转化风险
    description: 付款人和订阅者在备用支付方式上的转化率可能低于标准银行卡结账，从而限制可恢复的 GMV。
    mitigation: 优先服务只需保住高风险细分市场的客户，按用户群优化路由，并在扩大规模之前证明营收恢复效果优于全品类封禁。
  - name: 收单行集中风险
    description: 备用处理商也可能收紧政策，若公司过度依赖少数合作方或地区，将面临集中风险。
    mitigation: 从第一天起就构建多收单行网络，避免承诺通用通道，并将产品定位为连续性编排而非单一处理商替代品。
  - name: 集成与信任复杂性
    description: 如果系统同时触及审核、结账、打款和冻结资金，在证明运营准确性之前，平台会对引入产品持谨慎态度。
    mitigation: 先以敞口分析和审批门控备用流程切入，在展示恢复 GMV 和低错误率之后再扩展至自动化路由。
