slug: "creator-payment-continuity"
date: "2026-05-14"
currency: "USD"
modelStartMonth: "2026-06"
assumptions:
  - id: "A1"
    name: "模型起始月份"
    value: "2026-06"
    unit: "YYYY-MM"
    source: "[BP date] 模型从 2026-05-14 商业计划日期后的第一个完整月份开始。"
  - id: "A2"
    name: "付费试点收入"
    value: "$18K per month for a 3-month pilot"
    unit: "USD/month"
    source: "[BP gtm pricing][BP investorMemo.firstCustomer] 由约 $30K 实施费加每月 $8K 试点订阅费混合而来，使试点年化金额维持在六位数低端。"
  - id: "A3"
    name: "每客户生产收入"
    value: "$29K per month"
    unit: "USD/month"
    source: "[BP investorMemo.firstCustomer][BP operatingAssumptions] 对应约 $348K ARR，位于stated roughly $250K–$350K 生产合同区间内。"
  - id: "A4"
    name: "客户增长节奏"
    value: "2 paying customers by M12; 5 production customers by Q4Y2; 8 production customers by Q4Y3"
    unit: "count"
    source: "[BP milestones][BP market.som][Research market.som] 直接锚定于 1–2 年内 4–6 个客户以及第 3 年 8 个客户 / $2.4M 目标。"
  - id: "A5"
    name: "试点转生产时间"
    value: "Each new logo runs a 3-month paid pilot before converting to production the following quarter."
    unit: "months"
    source: "[BP experimentRoadmap][BP gtm funnelTargets] 路线图以付费试点优先，在 GMV 恢复证据存在后才转生产。"
  - id: "A6"
    name: "毛利率爬坡"
    value: "65%-72% in Y1, 72%-74% in Y2, 75% in Y3"
    unit: "percent"
    source: "[BP businessModel.targetGrossMarginPct][BP strategicChoices.sequencingRationale] 早期试点在模型达到 75% 稳态目标之前，承担额外的合作方和人工审核成本。"
  - id: "A7"
    name: "初始现金 / 天使轮融资"
    value: "$2.0M"
    unit: "USD"
    source: "[BP fundingAsk] 使用 $2M–$3M Pre-Seed 目标区间的低端。"
  - id: "A8"
    name: "各岗位年度现金薪酬（含附加福利）"
    value: "CEO $120K; engineering $180K; product/risk $168K; solutions $156K; risk ops $132K; AE $150K; customer success $126K; finance/G&A $114K"
    unit: "USD/year"
    source: "[BP team] Pre-Seed 阶段美国金融科技 SaaS 薪酬启发式：现金偏低、无高管层级。"
  - id: "A9"
    name: "第 1 年招聘节奏"
    value: "Month 0 CEO/founder, founding engineer, and founding product/risk lead; month 4 solutions engineer; month 6 risk operations lead; month 9 first account executive"
    unit: "timing"
    source: "[BP team] 与计划中描述的招聘顺序保持一致。"
  - id: "A10"
    name: "试点后新增人员"
    value: "Second engineer in M15, customer success in M18, second AE in M28, finance/G&A in M32"
    unit: "timing"
    source: "[BP strategicChoices.sequencingRationale] 初创公司财务启发式：后期增员仅在付费试点和可重复实施存在之后才拉动。"
  - id: "A11"
    name: "非薪酬运营支出"
    value: "$22K-$44K per month across cloud, compliance, travel, legal, and partner onboarding"
    unit: "USD/month"
    source: "[BP operations][Research regulatoryTechnicalConstraints] 支付风险工具即便在规模化之前也需要高于平均水平的法律、合规和合作方支持支出。"
  - id: "A12"
    name: "销售效率 / CAC"
    value: "$90K CAC and about a 6-month enterprise sales cycle"
    unit: "USD/customer"
    source: "[BP gtm funnelTargets] CAC 由建模的稳态每新增生产客户销售与营销支出四舍五入而来，与事件驱动的中端市场企业销售一致。"
  - id: "A13"
    name: "稳态流失率"
    value: "2.0% monthly logo churn"
    unit: "percent"
    source: "[Research sensitivityCases][Research openQuestions] 针对小规模、高集中、高风险平台客户群的启发式，合作方政策变化仍可能导致客户流失。"
  - id: "A14"
    name: "现金流简化"
    value: "No debt, no capex, and working-capital swings assumed immaterial, so cash roughly follows EBITDA."
    unit: "policy"
    source: "初创公司财务启发式：在支付浮动余额未计入资产负债表的情况下，Pre-Seed 软件模型可以接受此简化。"
  - id: "A15"
    name: "融资里程碑"
    value: "Use pre-seed to reach 5 production customers, 2 referenceable case studies, and seed-ready proof that rerouted cohorts preserve at least 60% of at-risk GMV, then keep a 6-month buffer."
    unit: "milestone"
    source: "[BP milestones][BP fundingAsk][BP investorMemo.mustBeTrue]"
