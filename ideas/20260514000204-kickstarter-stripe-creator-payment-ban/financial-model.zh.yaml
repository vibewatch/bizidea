scenarios:
  downside:
    description: "销售周期推迟一个季度，生产 ARPU 落在每月 $26K，毛利率因备用队列保持人工处理而停滞在 72%。"
    y3RevenueK: 1848.0
    y3EbitdaK: -238.0
    cashLowPointK: 182.0
    keyAssumptionChanges:
      - "生产定价平均每月 $26K，而非 $29K。"
      - "Q4Y3 只有 7 个生产客户在线。"
      - "因人工审核和合作方费用持续存在，毛利率仅达 72%。"
  base:
    description: "公司在证明点出现后每季度完成一个新客户，每个客户经过 3 个月付费试点转化，并在第 3 年达到 75% 毛利率。"
    y3RevenueK: 2424.0
    y3EbitdaK: 11.5
    cashLowPointK: 616.2
    keyAssumptionChanges:
      - "生产 ARPU 维持在每月 $29K。"
      - "第 3 年三个新客户按计划试点转生产节奏推进。"
      - "毛利率在第 3 年达到 75% 目标。"
  upside:
    description: "标杆客户缩短销售周期，第二位客户主管顺利提速，客户提前扩展打款工作流。"
    y3RevenueK: 2856.0
    y3EbitdaK: 278.0
    cashLowPointK: 742.0
    keyAssumptionChanges:
      - "因工作流提前扩展，生产定价平均每月 $31K。"
      - "第八个客户在 Q3Y3 而非 Q4Y3 上线。"
      - "人工审核成本下降更快，毛利率达 77%。"
sensitivity:
  - variable: "ARPU"
    downsideCase: "$26K production MRR"
    baseCase: "$29K production MRR"
    upsideCase: "$31K production MRR"
    y3RevenueImpactK: -252.0
    cashImpactK: -189.0
  - variable: "CAC"
    downsideCase: "$120K CAC"
    baseCase: "$90K CAC"
    upsideCase: "$75K CAC"
    y3RevenueImpactK: 0.0
    cashImpactK: -90.0
  - variable: "churn"
    downsideCase: "3.0% monthly logo churn"
    baseCase: "2.0% monthly logo churn"
    upsideCase: "1.0% monthly logo churn"
    y3RevenueImpactK: -116.0
    cashImpactK: -84.0
  - variable: "sales cycle"
    downsideCase: "9-month enterprise cycle"
    baseCase: "6-month enterprise cycle"
    upsideCase: "4-month incident-led cycle"
    y3RevenueImpactK: -348.0
    cashImpactK: -226.0
  - variable: "gross margin"
    downsideCase: "72% steady-state gross margin"
    baseCase: "75% steady-state gross margin"
    upsideCase: "77% steady-state gross margin"
    y3RevenueImpactK: 0.0
    cashImpactK: -73.0
  - variable: "hiring pace"
    downsideCase: "Second AE and finance hire pulled forward by 2 quarters without faster closes"
    baseCase: "Planned milestone-based hiring"
    upsideCase: "Support hires delayed one quarter until case studies are live"
    y3RevenueImpactK: -40.0
    cashImpactK: -128.0
modelDiagram:
  title: "单位经济模型流程"
  mermaid: |
    flowchart LR
      IncidentSignals[Processor warning / decline spike] --> Pipeline[Qualified pilot pipeline]
      Pipeline --> PaidPilots[3-month paid pilots]
      PaidPilots --> Production[Production contracts]
      Production --> Revenue[Subscription + GMV-preservation fees]
      Revenue --> GrossProfit[Gross profit after partner and review costs]
      GrossProfit --> Cash[Cash runway and next-round milestone]
modelSanity:
  - checkName: "营收引擎"
    finding: "基准情景下，通过每季度将一个新客户从 3 个月试点转化为约 $348K 生产合同，第 3 年营收达到 $2.4M。"
  - checkName: "必须跑通的关键点"
    finding: "模型要求付费试点在一个季度内转化，因为招聘保持精简，第 3 年之前只有一名客户主管。"
  - checkName: "模型崩塌条件"
    finding: "若销售周期延长至 9 个月，或毛利率停滞在 72% 附近，下行情景的现金在下次融资前将下探至约 $182K。"
  - checkName: "下轮融资证明材料"
    finding: "当 5 个生产客户和 2 个可引用案例研究证明至少 60% 的 GMV 守住率并附带可接受的争议和打款指标时，即可启动下一轮融资。"
sanityChecks:
  ruleOf40: "Y3 增长率 75.7% + EBITDA 利润率 0.5% = 76.2%"
  burnMultiple: "Y2 净烧钱倍数 0.4x（$473K 净烧钱 / $1.145M 净新增营收）；Y3 转为略微 EBITDA 正。"
  revenuePerFte: "Y3 每员工营收 $242K，采用 Q4Y3 的 10 人（SaaS 基准约 $200K–$400K）"
  flags:
    - "模型集中度仍高：8 个生产客户贡献几乎全部 Y3 营收，流失任何一个客户都将显著改变结果。"
    - "毛利率仅在 Y3 达到目标；若人工审核、合作方支持或冻结资金管理工作持续繁重，盈利将推迟。"
    - "基准情景下现金保持正值，但前提是招聘保持纪律性，且公司在证明点之前不提前增加合作方、合规或支持人员。"
