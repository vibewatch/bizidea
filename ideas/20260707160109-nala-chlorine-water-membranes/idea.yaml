differentiator: >-
  Generic water-treatment integrators sell bespoke projects and standard RO
  vendors optimize for cleaner feedwater, so neither owns the repeatable
  operating model for chlorinated, high-fouling industrial reuse. This company
  would package a narrow vertical system around one wastewater chemistry, one
  buyer, and one payback motion, then learn across plants which pretreatment
  steps, clean cycles, and reuse endpoints maximize uptime. That site-by-site
  performance dataset becomes the moat: membrane-life predictions, recovery
  guarantees, and benchmarked water-savings economics that a component supplier
  or EPC contractor cannot easily replicate.
