topRisks:
  - name: Food-facility reuse caution
    description: Food processors may resist any new reuse loop until water-quality boundaries and sanitation controls are proven beyond a pilot.
    mitigation: Start with non-product-contact endpoints, third-party validation, and explicit QA separation before proposing broader plant reuse.
  - name: Wastewater variability
    description: Fats, solids, salt loads, and cleaning chemistry can vary widely by plant and production line, which could make performance less repeatable than the membrane claim suggests.
    mitigation: Focus on poultry first, standardize sampling and pretreatment envelopes, and keep human-in-the-loop operating recipes during early deployments.
  - name: Project-heavy sales motion
    description: Industrial water retrofits can become slow, capex-heavy projects that stretch payback and limit how fast the company scales.
    mitigation: Sell a standardized skid with shared-savings pricing and channel delivery through EPC partners to compress engineering scope and budget friction.
