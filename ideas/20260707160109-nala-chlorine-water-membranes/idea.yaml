problem: >-
  Poultry processors generate chlorinated, high-fouling wastewater from sanitation
  and wash steps, but conventional reverse-osmosis trains break down when
  operators clean hard or keep chlorine in the loop. That forces plants to choose
  between expensive dechlorination and membrane-replacement programs or simply
  buying fresh water and discharging water that could have been reused. The
  result is higher utility spend, tighter drought exposure, and slower
  plant-expansion decisions because reuse systems do not survive the real
  chemistry of food-grade sanitation.
targetUser:
  primary: Directors of utilities, wastewater, or plant engineering at 3-10 plant U.S. poultry processors running chlorine-based sanitation
  secondary: Environmental compliance and sustainability leaders at protein processors tasked with cutting freshwater use and discharge volume
  buyer: VP Engineering or Director of Utilities at a multi-plant poultry processor
startupThesis:
  nonObviousInsight: >-
    The breakthrough is not that industrial plants suddenly want water reuse; it
    is that chlorine tolerance removes the operational tax that made reuse fail
    in sanitized facilities. Once a membrane can survive aggressive cleaning
    while still rejecting oil and salt, the bottleneck shifts from chemistry risk
    to deployment and financing, which creates room for a verticalized operator
    rather than another membrane science company.
  beachhead: >-
    Mid-market U.S. poultry processors operating 3-10 plants in water-stressed or
    discharge-constrained regions, using chlorine-based sanitation, and evaluating
    wastewater-upgrade projects to reclaim non-product-contact utility water
  wedge: >-
    A modular tertiary-treatment and operating layer that retrofits after
    pretreatment, uses chlorine-stable membranes on chlorinated wash wastewater,
    and guarantees non-product-contact reuse water for washdown, cooling, or
    boiler makeup
  whyNowCatalyst: >-
    Flathead Forge's investment and NALA's claim of membranes that survive 1,000
    times normal chlorine exposure indicate that the chemistry barrier behind
    harsh-stream reuse is breaking right as industrial plants need
    lower-water-intensity operations.
  ventureScalePath: >-
    Start with poultry plants, expand into meat, dairy, beverage, and chemical
    facilities that run aggressive clean-in-place or sanitation regimes, then add
    fleetwide monitoring, performance financing, and procurement orchestration to
    become the operating layer for distributed industrial water reuse.
solution: >-
  The company installs modular tertiary-treatment skids downstream of existing
  pretreatment or equalization systems and uses chlorine-stable membranes to
  polish chlorinated wash wastewater into non-product-contact reuse water for
  washdown, cooling, and boiler makeup. An operating layer monitors fouling,
  clean-cycle recipes, salt and oil rejection, and gallons recovered so plant
  teams can see whether reuse is actually outperforming discharge. Because the
  membrane can tolerate aggressive cleaning, the system can stay inside the
  plant's sanitation reality instead of forcing a fragile dechlorination
  workaround. The first sale is a single-plant retrofit with a guaranteed
  recovery target, then expansion follows to sister plants once water savings and
  membrane life are proven. Over time, the startup becomes a reuse-as-a-service
  network with shared performance data across plants and wastewater profiles.
goToMarketSeed:
  firstCustomer: >-
    A 3-10 plant U.S. poultry processor in a water-stressed or
    discharge-constrained region that sanitizes with chlorine and is planning a
    wastewater upgrade or plant-capacity expansion within 12 months
  buyingTrigger: >-
    A wastewater permit renewal, plant expansion, or another failed
    membrane-replacement cycle forces the operator to find reuse capacity without
    changing sanitation chemistry.
  currentAlternative: >-
    Conventional reverse-osmosis trains with dechlorination, DAF and biological
    treatment plus discharge, evaporators, and engineering-firm-designed one-off
    retrofit projects
  switchingReason: >-
    The wedge lets the plant keep its existing sanitation regime while getting
    reuse economics and longer run time between membrane swaps, so the
    operational change feels smaller than a full water-treatment redesign.
  pricingHypothesis: >-
    Shared-savings or per-gallon-recovered contracts with a site minimum, plus
    installation and commissioning fees for the first skid
