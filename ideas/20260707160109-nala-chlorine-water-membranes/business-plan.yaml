slug: chlorinated-wash-reuse-platform
date: "2026-07-07"
executiveSummary: >-
  This company installs modular tertiary-treatment skids downstream of existing
  pretreatment at 3-10 plant U.S. poultry processors and uses chlorine-stable
  membranes to convert chlorinated wash wastewater into non-product-contact
  reuse water for washdown, cooling, and boiler makeup. The wedge exists
  because conventional polyamide RO cannot survive aggressive chlorine
  cleaning, forcing plants into fragile dechlorination workarounds or simply
  discharging water they could reuse; NALA's chlorine-stable membrane claim
  and Flathead Forge's investment signal the enabling chemistry is maturing
  from lab curiosity to product. The company does not build membranes; it
  packages the operating layer, deployment playbook, and performance data
  around chlorine-tolerant membrane supply so a single plant retrofit can be
  sold, proven, and repeated across sister sites. Research sizes the beachhead
  at roughly $135M TAM, $50M SAM, and a $7M three-year SOM based on ~10
  qualifying mid-market processors and ~50 candidate sites at ~$1.0M
  annualized site value. Go-to-market starts with one design-partner plant
  facing a permit renewal, surcharge pressure, or expansion decision, sold on
  a shared-savings or per-gallon-recovered contract with an installation fee,
  then expands to sister plants once recovery and membrane life are proven.
  The primary risks are translational, not conceptual: no plant-level data yet
  exists on chlorine-stable membrane life, salt/oil rejection, or cleaning
  cadence in real poultry DAF or MBR effluent over multi-month runs, and food
  safety QA caution could slow even non-product-contact deployments.
  Competitors (ZwitterCo, Gradiant, Veolia, Nijhuis, Membrion) prove budget
  exists but none owns a poultry-specific chlorine-sanitized operating layer,
  leaving room for a narrow vertical entrant if it can convert one pilot into
  a repeatable, financeable playbook within 12-18 months.
problem:
  - >-
    Chlorine-based sanitation in poultry plants degrades conventional
    polyamide RO membranes, forcing operators to choose between fragile
    dechlorination steps, frequent membrane replacement, or abandoning reuse
    and simply discharging water and buying fresh supply instead.
  - >-
    Permit renewals, sewer surcharge pressure, and capacity-expansion plans are
    pushing wastewater upgrades onto the capital plan, but engineered EPC
    projects are slow, bespoke, and rarely give plant engineering a
    repeatable, benchmarked reuse product to evaluate.
solution:
  - >-
    Modular tertiary-treatment skids retrofit after existing pretreatment,
    using chlorine-stable membranes to polish chlorinated wash wastewater into
    utility-grade water for non-product-contact endpoints (washdown, cooling,
    boiler makeup) without requiring a sanitation-chemistry change.
  - >-
    An operating layer instruments fouling, clean-cycle recipes, salt/oil
    rejection, and gallons recovered so plant engineering can see recovery and
    uptime evidence, turning a one-off water project into a monitored,
    repeatable operating utility with a QA-ready evidence pack.
whyWeWin:
  - >-
    A narrow focus on one wastewater chemistry (chlorinated poultry wash
    water), one buyer (VP Engineering/Director of Utilities), and one payback
    motion (per-gallon-recovered or shared savings) lets the company build a
    cross-plant dataset on foulant mix, clean cycles, and membrane life that
    generalist EPCs and component vendors are not structured to accumulate.
  - >-
    Competitors sell either membranes (ZwitterCo, Membrion), broad industrial
    reuse/ZLD (Gradiant), or plantwide wastewater services (Veolia, Nijhuis) —
    none packages a poultry-specific chlorine-sanitized retrofit with recovery
    guarantees, leaving a defensible wedge between component supply and
    full-stack EPC work.
strategicChoices:
  beachhead: >-
    Mid-market U.S. poultry processors operating 3-10 plants in water-stressed
    or discharge-constrained regions (Southeast and Texas broiler corridor),
    using chlorine-based sanitation, and facing a permit renewal, surcharge
    change, or capacity-expansion decision within 12 months.
  wedgeRationale: >-
    Non-product-contact reuse for chlorine-sanitized poultry plants is
    narrower than "industrial water reuse" or "food-and-beverage wastewater,"
    which lets the first deployment avoid full food-safety redesign, produce
    measurable gallons-recovered and uptime evidence within one plant cycle,
    and de-risk the technology claim before expanding into meat, dairy,
    beverage, or chemical verticals that face the same chlorine-tolerance
    problem but carry different QA and regulatory profiles.
  sequencingRationale: >-
    The company must first prove membrane performance and QA-acceptable
    non-product-contact endpoints at one design-partner plant before it can
    sell a standardized skid on shared-savings terms; only after that proof
    point does it make sense to build channel partnerships with EPCs (who
    already own retrofit scope) and pursue sister-site land-and-expand within
    the same multi-plant processor, since that expansion path is the fastest
    route to the $7M three-year SOM implied by the research.
  notYet:
    - >-
      Product-contact water reuse or potable-adjacent applications, which
      require a materially higher QA and regulatory bar than washdown,
      cooling, or boiler makeup.
    - >-
      Expansion into meat, dairy, beverage, and chemical verticals (per the
      ventureScalePath) before poultry-specific membrane life and QA data
      exist to de-risk the claim in adjacent chemistries.
    - >-
      Owning membrane manufacturing or chemistry IP; the company is a
      verticalized operator on top of chlorine-stable membrane supply, not a
      membrane science company.
market:
  tam: "$135.0M (≈30 integrated U.S. chicken companies × ~5 reuse-eligible sites/company × ~$0.9M annualized site spend, per research.yaml)"
  sam: "$50.0M (≈10 mid-market 3-10 plant processors × ~5 candidate sites each × ~$1.0M site-year)"
  som: "$7.0M (one design partner plus ~6 follow-on sister sites at ~$1.0M annualized value each by year three)"
  segments:
    - Mid-market (3-10 plant) U.S. poultry processors in water-stressed or discharge-constrained regions
    - Larger multi-state poultry processors (Mountaire, Peco, Simmons, Koch-scale) as later-stage sister-site expansion targets
  buyingProcess: >-
    The VP of Engineering or Director of Utilities sponsors evaluation after a
    permit renewal, surcharge renegotiation, or expansion decision; approval
    requires plant QA signoff on non-product-contact endpoint separation and,
    for larger contracts, VP Operations or CFO sign-off on a seven-figure-scale
    capital or shared-savings commitment.
product:
  mvp: >-
    A single modular tertiary-treatment skid deployed at one design-partner
    plant, using third-party chlorine-stable membranes, with basic monitoring
    of flux, rejection, and recovered gallons, sold on a guaranteed recovery
    target for one non-product-contact endpoint.
  sixMonth: >-
    Complete a 90+ day pilot at the design-partner plant with full CIP logs,
    chlorine exposure, flux decline, rejection, and membrane-life data;
    finalize QA-approved sampling and endpoint-separation protocol reusable
    across future sites.
  twelveMonth: >-
    Convert the design partner into a standardized shared-savings contract,
    add remote monitoring dashboards for uptime and recovery, and close one
    sister-site expansion inside the same processor to validate the
    land-and-expand motion.
  twentyFourMonth: >-
    Operate 4-6 sites across 2-3 multi-plant processors with a repeatable
    deployment playbook, a benchmarked membrane-life and recovery dataset, and
    at least one signed EPC or pretreatment-vendor co-delivery channel.
  keyBets:
    - >-
      Chlorine-stable membranes will hold target salt/oil rejection and
      economical flux for 90+ days on real chlorinated poultry DAF/MBR
      effluent, not just adjacent industrial streams.
    - >-
      Plant QA teams will approve non-product-contact reuse endpoints without
      requiring a sanitation-chemistry change, given a documented evidence
      pack and third-party validation.
    - >-
      Shared-savings or per-gallon-recovered pricing will close faster than a
      capex-heavy engineered project because it compresses budget approval
      friction.
gtm:
  wedge: >-
    Land one design-partner plant with a guaranteed non-product-contact
    recovery target, tied to an active permit renewal, surcharge change, or
    expansion decision, then expand to sister plants inside the same
    processor once recovery and membrane life are proven.
  channels:
    - Direct sales to plant engineering, utilities, and sustainability leaders at multi-plant poultry processors
    - Co-delivery through industrial water EPCs and pretreatment integrators who already sit inside retrofit scope
    - Reference pilots tied to wastewater-upgrade, permit-renewal, and plant-expansion project cycles
  funnelTargets: "lead→qualified design-partner conversation 20-30%, design-partner pilot→shared-savings contract 50%+, single-site contract→sister-site expansion 40%+ within 18 months"
  pricing: >-
    Shared-savings or per-gallon-recovered contracts with a site minimum, plus
    upfront installation and commissioning fees for the first skid and
    recurring monitoring/membrane/service plans; rationale is that this
    converts a capex-heavy engineered-project sale into an operating-expense
    decision the plant engineering buyer can approve faster than a full
    capital project.
businessModel:
  revenueStreams:
    - Per-gallon-recovered or shared-savings contracts
    - Upfront installation and commissioning fees
    - Recurring monitoring, membrane, and service plans
  unitOfValue: Gallons of chlorinated wash wastewater reused per plant-day at guaranteed water quality
  targetGrossMarginPct: 55
  expansionLevers:
    - Sister-site rollouts within the same multi-plant processor once one site proves recovery and uptime
    - Adjacent non-product-contact endpoints (cooling, boiler makeup) at an already-deployed site
    - Cross-plant performance dataset that supports tighter recovery guarantees and premium service-plan pricing over time
strategyMap:
  northStarMetric: Gallons of chlorinated wastewater reused per day across active sites, at guaranteed water quality
  inputMetrics:
    - Membrane run-days between changeouts (target: multi-month, beating conventional RO burnout)
    - Percent uptime at target salt/oil rejection
    - Design-partner to sister-site conversion rate within the same processor
    - QA signoff cycle time for non-product-contact endpoints
  moatsToBuild:
    - Cross-plant dataset linking foulant mix, clean-cycle recipes, and membrane life to recovery guarantees
    - QA-ready evidence packs and endpoint-validation playbooks that shorten future signoff cycles
    - Reference relationships with 2-3 multi-plant processors that unlock land-and-expand without new sales cycles
  killCriteria:
    - >-
      If chlorine-stable membranes cannot sustain target rejection and
      economical flux for 90+ days on real poultry DAF/MBR effluent across two
      independent pilot sites, the core technical bet fails and the company
      should not scale deployment.
    - >-
      If fewer than 1 in 3 target processors reach a permit renewal, surcharge
      renegotiation, or expansion decision within 18 months, the buying-trigger
      thesis is too thin to support a repeatable sales motion at this stage.
  mermaid: |
    flowchart LR
      Wedge[Beachhead: chlorine-sanitized poultry non-product-contact reuse] --> MVP[MVP: single design-partner skid]
      MVP --> Proof[Proof: 90+ day recovery and membrane-life data]
      Proof --> Expansion[Expansion: sister-site rollout within processor]
      Expansion --> Network[Reuse-as-a-service network across food/beverage/chemical plants]
investorMemo:
  verdict:
    call: "Watch"
    conviction: >-
      Credible wedge and real pain, but the core technical and QA-acceptance
      claims are unproven in production poultry wastewater and competition is
      fragmented but well-funded.
    whyBelieve: >-
      Chlorine tolerance removes a specific, well-documented RO failure mode
      in a market with a concentrated buyer set (~30 integrated poultry
      companies) already facing permit and surcharge pressure per the
      researched signals.
    whyDoubt: >-
      No plant-level pilot data exists yet on membrane life, rejection, or
      cleaning cadence in real chlorinated poultry effluent, and the SOM
      ($7M by year three) implies a slow, project-heavy sales motion typical
      of industrial water infrastructure.
    nextDiligence: >-
      Secure and report 90+ day pilot data (CIP logs, flux decline, rejection,
      membrane autopsy) from a signed design-partner plant before further
      capital commitment.
  firstCustomer:
    title: Director of Utilities/Plant Engineering at a 3-10 plant U.S. poultry processor
    profile: >-
      A mid-market integrated poultry processor with chlorine-based
      sanitation, operating in a water-stressed or surcharge-heavy region
      (Southeast or Texas broiler corridor), currently facing a wastewater
      upgrade decision.
    trigger: >-
      A wastewater permit renewal, sewer surcharge renegotiation, plant
      expansion, or a failed membrane-replacement cycle forces the operator to
      find reuse capacity without changing sanitation chemistry.
    buyer: VP Engineering or Director of Utilities
    initialContract: >-
      A single-plant pilot with installation/commissioning fee plus a
      shared-savings or per-gallon-recovered structure, targeting conversion
      to a standardized annualized contract (~$1.0M site-year per the
      researched SAM math) within 6-12 months of pilot start.
  mustBeTrue:
    - "Chlorine-stable membranes sustain target salt/oil rejection and economical flux for 90+ days on real poultry DAF/MBR effluent, not just adjacent industrial streams."
    - "Plant QA teams approve non-product-contact reuse endpoints without requiring a change to chlorine-based sanitation chemistry."
    - "At least 1 in 3 targeted 3-10 plant processors reach a permit renewal, surcharge renegotiation, or expansion decision within 18 months."
    - "A design-partner site converts to at least one sister-site expansion within the same processor within 12 months of proof."
    - "Shared-savings/per-gallon pricing closes materially faster than a capex-heavy engineered RFP process, validating the compressed sales-cycle thesis."
  diligenceQuestions:
    - "What membrane-life and rejection data exists today on real chlorinated poultry DAF or MBR effluent, versus adjacent industrial streams cited in the NALA announcement?"
    - "Is there a signed or verbally committed design-partner plant, and what is its specific buying trigger and timeline?"
    - "How dependent is the technology roadmap on a single membrane supplier (NALA or similar), and what is the fallback if supply or performance disappoints?"
    - "What does plant QA actually require to sign off on non-product-contact reuse, and has that requirement been tested with a real processor's QA team?"
    - "How does the sales cycle length and capital-approval process compare to Veolia/Nijhuis engineered projects the company must displace or ride alongside?"
operatingAssumptions:
  - assumption: >-
      Chlorine-stable membranes will perform on real chlorinated poultry
      wastewater (DAF/MBR effluent) at rejection and flux levels comparable to
      NALA's stated adjacent-industrial claims.
    basis: idea.yaml
    validationTest: >-
      Run a 90+ day pilot with full CIP logs, chlorine exposure tracking, flux
      decline, rejection measurement, and membrane autopsy at one
      design-partner plant.
    decisionImpact: >-
      If performance falls materially short, the recovery-guarantee pricing
      model and membrane-life economics must be re-priced or the wedge
      re-scoped to a less aggressive cleaning regime.
  - assumption: >-
      Plant QA teams will accept non-product-contact reuse endpoints
      (washdown, cooling, boiler makeup) without requiring changes to existing
      chlorine-based sanitation chemistry.
    basis: research.yaml
    validationTest: >-
      Document QA signoff criteria and third-party validation requirements
      from at least two processors before scaling beyond the first pilot.
    decisionImpact: >-
      If QA requires sanitation-chemistry changes or additional controls, the
      sales cycle lengthens and the "smaller operational change" switching
      argument in goToMarketSeed weakens.
  - assumption: >-
      Shared-savings/per-gallon-recovered pricing will close faster than
      traditional capex-heavy engineered project procurement.
    basis: operator judgment
    validationTest: >-
      Compare time-to-signature and internal approval steps for the first
      shared-savings contract against a comparable EPC-led RFP at a peer
      plant.
    decisionImpact: >-
      If shared-savings pricing does not meaningfully compress the sales
      cycle, the company should shift toward EPC co-delivery and standard
      project pricing instead of leading with its own commercial terms.
  - assumption: >-
      At least 1 in 3 targeted 3-10 plant poultry processors will hit a
      permit renewal, surcharge renegotiation, or capacity-expansion decision
      within the next 18 months.
    basis: research.yaml
    validationTest: >-
      Map permit renewal dates, known surcharge discussions, and public
      expansion announcements across the ~10 SAM-qualifying processors.
    decisionImpact: >-
      If fewer processors are near a trigger event, the company must extend
      its sales cycle assumptions and reconsider the 12-24 month milestone
      targets.
experimentRoadmap:
  - horizon: 0-90 days
    experiment: Site qualification and wastewater sampling at 3-5 candidate poultry plants
    hypothesis: At least one candidate plant has a near-term permit, surcharge, or expansion trigger and chlorinated wash wastewater suitable for the wedge.
    successMetric: One signed design-partner LOI with sampling data confirming suitable influent characteristics
    owner: Founder/Head of Sales
  - horizon: 0-90 days
    experiment: Membrane supplier qualification and bench-scale foulant testing
    hypothesis: A chlorine-stable membrane supplier can be qualified and integrated into a skid design within the pilot timeline
    successMetric: Signed supply agreement or pilot-access agreement with at least one chlorine-stable membrane vendor
    owner: Founding engineer
  - horizon: 3-6 months
    experiment: 90+ day design-partner pilot with full CIP and performance logging
    hypothesis: Chlorine-stable membranes sustain target rejection and economical flux on real poultry DAF/MBR effluent
    successMetric: 90-day pilot report with rejection, flux decline, and membrane-life data meeting or exceeding conventional RO baselines
    owner: Founding engineer / process lead
  - horizon: 3-6 months
    experiment: QA and endpoint-validation protocol development with design-partner plant
    hypothesis: Plant QA will approve non-product-contact reuse endpoints without a sanitation-chemistry change, given a documented evidence pack
    successMetric: Signed QA approval for at least one non-product-contact endpoint
    owner: Head of Sales / Regulatory advisor
  - horizon: 6-12 months
    experiment: Convert design partner to standardized shared-savings contract
    hypothesis: Shared-savings/per-gallon pricing closes faster than capex project procurement
    successMetric: Signed annualized contract within 90 days of pilot completion
    owner: Founder/Head of Sales
  - horizon: 6-12 months
    experiment: EPC/pretreatment-vendor co-delivery partnership pilot
    hypothesis: Co-delivery through an existing EPC or pretreatment vendor accelerates access to retrofit scope
    successMetric: One signed co-delivery agreement generating at least one qualified lead
    owner: Founder/BD lead
  - horizon: 12-18 months
    experiment: Sister-site expansion within the design-partner's processor network
    hypothesis: Proven recovery and uptime at one site converts to a second site within the same processor without a new sales cycle
    successMetric: Signed second-site contract within 12 months of first-site go-live
    owner: Head of Sales / Customer Success
operations:
  - Site qualification and wastewater sampling protocol for each candidate plant before quoting
  - Modular skid design and control software tuned for harsh, high-fouling chlorinated wastewater
  - Remote monitoring stack tracking fouling, clean-cycle recipes, rejection, and gallons recovered
  - Partnerships with chlorine-stable membrane suppliers, module manufacturers, and local field-service partners
  - Channel relationships with industrial water EPCs and pretreatment vendors for co-delivery
team:
  - role: Founding process engineer (membrane/water treatment)
    startTiming: Month 0
    rationale: >-
      Owns skid design, membrane qualification, and the 90+ day pilot data
      collection that determines whether the core technical bet holds.
  - role: Founder/Head of Sales (industrial water or food-processing background)
    startTiming: Month 0
    rationale: >-
      Owns design-partner acquisition, buyer relationships with VP
      Engineering/Director of Utilities, and pricing negotiation.
  - role: Field service/commissioning engineer
    startTiming: Month 4-6
    rationale: >-
      Needed once the first skid is deployed to support commissioning,
      operator training, and ongoing monitoring at the design-partner site.
  - role: Regulatory/QA advisor (contract or part-time)
    startTiming: Month 3-6
    rationale: >-
      Supports endpoint-validation protocol design and QA signoff, which
      research identifies as a high-severity adoption friction point.
  - role: Business development lead for EPC/channel partnerships
    startTiming: Month 9-12
    rationale: >-
      Brought on once the design-partner pilot proves the model, to build the
      co-delivery channel needed for the sister-site and multi-processor
      expansion phase.
milestones:
  - horizon: 0-12 months
    items:
      - Sign one design-partner plant with a documented buying trigger
      - Complete 90+ day pilot with full CIP, flux, rejection, and membrane-life data
      - Secure QA approval for at least one non-product-contact endpoint
      - Convert design partner to a standardized shared-savings or per-gallon-recovered contract
  - horizon: 12-24 months
    items:
      - Close at least one sister-site expansion within the design partner's processor network
      - Sign at least one EPC or pretreatment-vendor co-delivery partnership
      - Reach 4-6 operating sites across 2-3 multi-plant processors
      - Publish a benchmarked membrane-life and recovery dataset used to tighten guarantees
  - horizon: 24-36 months
    items:
      - Reach the researched $7M SOM (~7 sites at ~$1.0M annualized value each)
      - Begin qualifying a second vertical (meat, dairy, beverage, or chemical) using the poultry dataset as evidence
      - Formalize a reuse-as-a-service financing structure for future site rollouts
risks:
  - risk: >-
      Chlorine-stable membranes underperform on real chlorinated poultry
      DAF/MBR effluent relative to adjacent industrial pilots cited in the
      NALA announcement.
    likelihood: Medium
    impact: High
    mitigation: >-
      Require a 90+ day pilot with full performance logging and membrane
      autopsy before any recovery guarantee is contractually offered; qualify
      a second membrane supplier as a fallback.
  - risk: >-
      Food-processing QA teams resist new reuse loops until water-quality
      boundaries and sanitation controls are proven beyond a single pilot.
    likelihood: Medium
    impact: High
    mitigation: >-
      Start with non-product-contact endpoints only, bring in third-party
      validation, and document explicit QA separation before proposing
      broader plant reuse.
  - risk: >-
      Wastewater variability (fats, solids, salt loads, cleaning chemistry)
      across plants and production lines makes performance less repeatable
      than the membrane claim suggests.
    likelihood: Medium
    impact: Medium
    mitigation: >-
      Standardize influent qualification and pretreatment envelopes, keep
      human-in-the-loop operating recipes during early deployments, and limit
      early sites to poultry wastewater profiles that match the pilot.
  - risk: >-
      Industrial water retrofits become slow, capex-heavy projects that
      stretch payback and limit how fast the company scales, especially versus
      incumbents like Veolia and Nijhuis with existing relationships.
    likelihood: High
    impact: Medium
    mitigation: >-
      Sell a standardized skid with shared-savings pricing, compress
      engineering scope via modular design, and route deals through EPC
      channel partners rather than competing head-on for plantwide contracts.
  - risk: >-
      Supplier concentration in chlorine-stable membrane technology creates
      dependency risk if a single vendor's supply, pricing, or performance
      changes.
    likelihood: Medium
    impact: Medium
    mitigation: >-
      Qualify multiple membrane partners early and instrument performance
      tightly enough to swap supply if needed.
fundingAsk:
  round: seed
  targetFundingRangeUsd: "$2-4M"
  runwayMonths: 18
  useOfFundsSummary: >-
    18 months of runway funds the founding process engineer and field
    engineer, one design-partner pilot skid and commissioning, QA/regulatory
    advisory support, and initial EPC channel development needed to convert
    one proven site into a repeatable sister-site expansion motion.
