slug: chlorinated-wash-reuse-platform
date: "2026-07-07"
currency: USD
modelStartMonth: "2026-07"
assumptions:
  - id: A1
    name: "Model start month"
    value: "2026-07"
    unit: "YYYY-MM"
    source: "[BP date 2026-07-07] the model starts in the same month as the dated business plan because the raise and design-partner search are immediate."
  - id: A2
    name: "Opening cash / seed raise"
    value: "$2.4M"
    unit: "USD"
    source: "[BP fundingAsk targetFundingRangeUsd $2-4M + BP fundingAsk runwayMonths 18 + model cash curve] the base case uses a mid-range seed sized to reach the 12-24 month operating-site milestone with a six-month buffer."
  - id: A3
    name: "Starting paying sites"
    value: "0"
    unit: "count"
    source: "[BP executiveSummary + BP milestones 0-12 months] the company starts pre-revenue and must first win a design-partner plant."
  - id: A4
    name: "Paying site definition"
    value: "A site counts once it is paying either for a pilot/install phase or for a standardized annual reuse contract."
    unit: "definition"
    source: "[BP gtm.pricing + BP businessModel.revenueStreams] customersEop includes active paid pilots and production contracts because both generate real cash receipts."
  - id: A5
    name: "Design-partner timing"
    value: "One design-partner site signs by M4 and converts to a standardized contract by M9."
    unit: "timeline"
    source: "[BP experimentRoadmap 0-90 days and 6-12 months + BP milestones 0-12 months] the base case assumes fast execution on the first plant because the whole wedge depends on early proof."
  - id: A6
    name: "Standardized site-year revenue"
    value: "$1.02M annualized per active site"
    unit: "USD/site/year"
    source: "[BP market.sam and BP market.som use about $1.0M site-year + BP investorMemo.firstCustomer.initialContract] the model sets the steady-state contract slightly above $1.0M to reflect installation plus monitoring/service revenue inside the researched range."
  - id: A7
    name: "Y1 pilot-to-production revenue ramp"
    value: "M4-M6 at $25K/$35K/$45K, M7-M8 at $60K/$75K, and M9+ at $85K per month for the first site."
    unit: "USD/month"
    source: "[BP gtm.pricing + BP investorMemo.firstCustomer.initialContract + startup-finance heuristic] revenue starts as pilot/install fees and ramps to the standardized site minimum once commissioning is complete."
  - id: A8
    name: "Customer ramp"
    value: "1 paying site by M12, 5 by Q4Y2, and 7 by Q4Y3."
    unit: "customersEop"
    source: "[BP milestones 12-24 months target 4-6 sites + BP milestones 24-36 months target ~7 sites + Research market.som] the base case tracks the business-plan rollout milestones directly."
  - id: A9
    name: "Gross margin ramp"
    value: "Y1 pilot months at ~20-45%, Y2 quarters at ~45-52%, and Y3 quarters at ~52-55% gross margin."
    unit: "gross margin percent"
    source: "[BP businessModel.targetGrossMarginPct 55 + BP operations + startup-finance heuristic] early deployments are service-heavy before reuse of commissioning playbooks lifts margin toward the target."
  - id: A10
    name: "Hiring timeline"
    value: "M1 founders; M4 field service; M8 process/applications engineer; M10 BD/channel lead; M14 second field engineer; M16 ops/admin; M18 second process engineer; M27 third field engineer; M30 second ops/admin; M33 third process engineer."
    unit: "timeline"
    source: "[BP team + BP strategicChoices.sequencingRationale + startup-finance heuristic] hiring stays lean until the first site proves out, then scales delivery and support ahead of the 4-6 site milestone."
  - id: A11
    name: "Founding process engineer loaded compensation"
    value: "$180K"
    unit: "USD/year"
    source: "[BP team founding process engineer + startup-finance heuristic] reflects senior membrane/process talent with modest early-stage cash compensation plus benefits and payroll tax."
  - id: A12
    name: "Founder / Head of Sales loaded compensation"
    value: "$180K"
    unit: "USD/year"
    source: "[BP team Founder/Head of Sales + startup-finance heuristic] reflects concentrated industrial enterprise selling with travel and light variable compensation."
  - id: A13
    name: "Field service / commissioning loaded compensation"
    value: "$135K"
    unit: "USD/year"
    source: "[BP team field service/commissioning engineer + startup-finance heuristic] supports on-site commissioning, operator training, and early troubleshooting."
  - id: A14
    name: "Process / applications engineer loaded compensation"
    value: "$155K"
    unit: "USD/year"
    source: "[BP product + BP operations + startup-finance heuristic] this hire standardizes skid recipes, data capture, and future site replication."
  - id: A15
    name: "BD / channels loaded compensation"
    value: "$165K"
    unit: "USD/year"
    source: "[BP team business development lead for EPC/channel partnerships + startup-finance heuristic] reflects one senior partnership seller rather than a broad field-sales team."
  - id: A16
    name: "Ops / admin loaded compensation"
    value: "$120K"
    unit: "USD/year"
    source: "[BP operations + startup-finance heuristic] covers finance, insurance, vendor management, and basic program operations."
  - id: A17
    name: "Payroll allocation to P&L lines"
    value: "Founding process engineer 80% R&D / 20% G&A; head of sales 80% S&M / 20% G&A; field service 60% R&D / 20% S&M / 20% G&A; process/applications 100% R&D; BD/channel 100% S&M; ops/admin 100% G&A."
    unit: "allocation"
    source: "[BP team role rationales + BP operations] this maps all cash payroll into functional opex while keeping delivery-heavy work concentrated in R&D and support."
  - id: A18
    name: "Non-payroll opex ramp"
    value: "Monthly non-payroll S&M/R&D/G&A rises from $8K/$12K/$8K in early Y1 to $34K/$40K/$22K by Q4Y3."
    unit: "USD/month"
    source: "[BP operations + BP risks + startup-finance heuristic] includes travel, QA/regulatory advisory, lab testing, insurance, software, legal, and channel support needed for industrial pilots."
  - id: A19
    name: "Pilot skid and monitoring cash outlay"
    value: "$300K across M3-M6 plus $25K of monitoring stack spend in M8."
    unit: "USD"
    source: "[BP fundingAsk.useOfFundsSummary one design-partner pilot skid + BP product.mvp + BP operations remote monitoring stack] the first deployment requires real equipment and instrumentation before the customer base is broad enough to finance it from operations."
  - id: A20
    name: "Expansion working-capital convention"
    value: "$75K net cash for sites 2-4, $60K for site 5, and $50K for sites 6-7."
    unit: "USD/site"
    source: "[BP gtm.pricing upfront installation and commissioning fees + startup-finance heuristic] installation fees and deposits offset most procurement cash, but each new site still carries short-cycle deployment working capital."
  - id: A21
    name: "Steady-state monthly churn"
    value: "2.0%"
    unit: "percent/month"
    source: "[startup-finance heuristic for high-switch-cost industrial utility contracts + BP whyWeWin sister-site data moat] the operating plan assumes no churn in the first 36 months, but the unit-economics layer still uses a conservative steady-state retention assumption."
  - id: A22
    name: "CAC convention"
    value: "36-month sales and marketing spend divided by 7 net new paying sites."
    unit: "formula"
    source: "[model calc using base-case S&M spend + BP gtm.funnelTargets] this yields a conservative blended CAC because the early motion is founder-led and site-specific."
  - id: A23
    name: "Next-round milestone for funding sizing"
    value: "By Q4Y2 the company should have 4-6 operating sites across 2-3 processors, one EPC/pretreatment co-delivery partner, and a benchmarked membrane-life dataset."
    unit: "milestone"
    source: "[BP milestones 12-24 months + BP fundingAsk runwayMonths 18] the seed is sized to reach the next round with hard plant proof rather than just a single pilot."
  - id: A24
    name: "Quarterly salary-roll convention"
    value: "Y2-Y3 salary rows use the actual monthly hire dates inside each quarter rather than only quarter-end snapshots."
    unit: "convention"
    source: "[Headcount column convention + BP team startTiming] this keeps salary expense consistent with the hiring ramp even though the headcount table only shows year-end snapshots for Y2 and Y3."
