scenarios:
  downside:
    description: "Pilot conversion slips by roughly one quarter, the model exits nearer five sites than seven, and margin improvement stalls before the BP target is reached."
    y3RevenueK: 4890.0
    y3EbitdaK: -120.0
    cashLowPointK: 75.0
    keyAssumptionChanges:
      - "The first design partner does not convert to a standardized contract until about M12 instead of M9."
      - "Q4Y3 customersEop reaches about 5 instead of 7 because sister-site replication is slower."
      - "Exit gross margin stalls near 50% because membrane life and field-service intensity do not improve as quickly."
  base:
    description: "One fast design partner creates the proof pack, EPC/channel support starts in Y2, and the company reaches seven paid sites with steady-state site value near $1.0M."
    y3RevenueK: 6320.0
    y3EbitdaK: 874.9
    cashLowPointK: 400.1
    keyAssumptionChanges:
      - "One paying site is active by M12, five by Q4Y2, and seven by Q4Y3."
      - "Steady-state annualized site revenue lands at about $1.02M including service and monitoring."
      - "Gross margin reaches the BP target 55% by Q4Y3 as commissioning playbooks and supplier terms improve."
  upside:
    description: "The first pilot converts early, one more sister site lands in Y3, and the operations layer reaches target margin sooner than planned."
    y3RevenueK: 7160.0
    y3EbitdaK: 1425.0
    cashLowPointK: 520.0
    keyAssumptionChanges:
      - "The first design partner converts by about M7 and the company reaches 8 paid sites by Q4Y3."
      - "Annualized site value trends toward about $1.08M as monitoring and membrane-service attach strengthen."
      - "Gross margin exits near 57% because early datasets reduce field-service and membrane-change costs faster."
sensitivity:
  - variable: "ARPU"
    downsideCase: "Annualized site value settles nearer $0.95M because shared-savings realization is weaker than planned."
    baseCase: "Steady-state site value is about $1.02M with installation, monitoring, and membrane-service revenue attached."
    upsideCase: "Annualized site value reaches about $1.08M after the first sister-site rollouts prove economics."
    y3RevenueImpactK: -430.0
    cashImpactK: -330.0
  - variable: "CAC"
    downsideCase: "CAC drifts toward $325K as direct sales and site sampling stay bespoke."
    baseCase: "CAC stays near $251K with founder-led selling and one channel BD hire."
    upsideCase: "CAC falls toward $220K if EPC introductions generate qualified plant opportunities faster."
    y3RevenueImpactK: -150.0
    cashImpactK: -290.0
  - variable: "churn"
    downsideCase: "Steady-state churn is 3.0% monthly because some pilot economics fail to expand or renew."
    baseCase: "Steady-state churn is 2.0% monthly while the first 36 months remain effectively logo-retention neutral."
    upsideCase: "Steady-state churn is 1.0% monthly once sister sites standardize the operating layer."
    y3RevenueImpactK: -180.0
    cashImpactK: -170.0
  - variable: "sales cycle"
    downsideCase: "Pilot-to-standardized-contract timing stretches from about five months to about eight months."
    baseCase: "The first pilot converts in about five months and later sites close off proven QA and uptime data."
    upsideCase: "Pilot-to-contract timing compresses toward about four months once the first proof pack is reusable."
    y3RevenueImpactK: -950.0
    cashImpactK: -650.0
  - variable: "gross margin"
    downsideCase: "Exit gross margin stalls at about 50% because membrane life and field support stay worse than planned."
    baseCase: "Exit gross margin reaches the BP target 55% after five live sites."
    upsideCase: "Exit gross margin reaches about 57% as commissioning, cleaning recipes, and supplier terms improve faster."
    y3RevenueImpactK: 0.0
    cashImpactK: -350.0
  - variable: "hiring pace"
    downsideCase: "One field and one ops hire are pulled forward before the site-replication motion is proven."
    baseCase: "Hiring follows the BP sequencing and stays lean until the first sister-site proof points exist."
    upsideCase: "One back-office hire slips to post-Q4Y3 without slowing deployments."
    y3RevenueImpactK: 80.0
    cashImpactK: -250.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      PermitTriggers[Permit or surcharge trigger] --> DesignPartner[Design-partner pilot]
      DesignPartner --> QAProof[QA-approved proof pack]
      QAProof --> SiteContracts[Standardized site contracts]
      SiteContracts --> SisterSites[Sister-site rollout]
      SisterSites --> Revenue[Revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash and runway]
modelSanity:
  - checkName: "Revenue engine"
    finding: "Base revenue comes from converting one design-partner site into seven paid sites by Q4Y3 at roughly $1.02M of annualized value each, with most growth arriving through sister-site replication rather than broad logo acquisition."
  - checkName: "Must go right"
    finding: "The first 90-plus-day pilot has to convert by about M9 and earn QA approval quickly enough that Y2 can add four more sites without a large direct-sales bench."
  - checkName: "Model breaks if"
    finding: "If the sales cycle slips by one quarter or gross margin stalls near 50%, the downside case drives cash close to zero before the next round is earned."
  - checkName: "Next-round proof"
    finding: "The next financing is justified only after 4-6 operating sites, one live EPC/channel partner, and a benchmarked membrane-life dataset prove that the first plant can replicate across fleets."
sanityChecks:
  ruleOf40: "Y3 growth 116.8% + EBITDA margin 13.8% = 130.6%"
  burnMultiple: "Y2 cash burn multiple is about 0.3x using roughly $0.80M of net burn (EBITDA plus deployment cash) against about $2.33M of added revenue; Y3 turns net cash generative."
  revenuePerFte: "$574K Y3 on 11 ending FTE (benchmark $300-600K lean industrial-service heuristic)"
  flags:
    - "The base case assumes the first design-partner site signs by M4 and converts by M9; a one-quarter slip is the single biggest cash-risk variable in the sensitivity table."
