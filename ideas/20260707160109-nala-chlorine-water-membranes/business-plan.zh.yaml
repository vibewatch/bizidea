slug: chlorinated-wash-reuse-platform
date: '2026-07-07'
executiveSummary: 这家公司把模块化三级处理 skid 装在现有预处理下游，卖给在美国拥有 3-10 家工厂的家禽加工企业；靠耐氯膜把含氯清洗废水变成可用于冲洗、冷却和锅炉补水的非产品接触回用水。切口成立，是因为传统聚酰胺 RO 扛不住高强度含氯清洗，工厂只能上脆弱的脱氯补丁，或干脆把本可回用的水排掉；NALA 的耐氯膜主张和 Flathead Forge 的投资，说明这层关键化学能力正从实验室概念走向产品化。公司自己不造膜，而是把运营层、部署手册和性能数据包在耐氯膜供应之上，先把单厂改造卖出去、跑通，再向同集团工厂复制。研究测算，滩头市场大约有 $135M TAM、$50M SAM，三年 SOM 约 $7M，基础是约 10 家符合条件的中型加工企业、约 50 个候选站点，以及每站点年化约 $1.0M 的价值。GTM 从一个共创客户工厂起步——它正面临许可证续期、附加费压力或扩产决策；商业模式是按节省收益分成或按回收水量计费，外加安装费。回收率和膜寿命一旦跑出来，再往姐妹工厂扩。眼下最大风险不是概念错了，而是落地数据还没出来：真实家禽 DAF 或 MBR 出水里，耐氯膜的寿命、盐/油截留和清洗节奏都还没有工厂级、多月数据；食品安全 QA 的谨慎态度，也可能拖慢哪怕只是非产品接触场景的部署。ZwitterCo、Gradiant、Veolia、Nijhuis、Membrion 说明预算确实存在，但谁都还没拿下“面向家禽行业、围绕耐氯消杀体系”的运营层，因此只要能在 12-18 个月内把一个试点打磨成可融资、可复制的手册，窄垂直新进入者仍有机会。
problem:
- 家禽工厂里的含氯消杀体系会持续伤害传统聚酰胺 RO 膜，运营方只剩下三种难看选择：上脆弱的脱氯步骤、频繁换膜，或者放弃回用、继续买新水并把废水排掉。
- 许可证续期、污水附加费压力和扩产计划，正在把废水升级推上资本开支清单；但传统 EPC 项目又慢、又重、又是一次性定制，厂务工程团队很难拿到一套可复制、可对标的回用产品。
solution:
- 模块化三级处理 skid 装在现有预处理之后，用耐氯膜把含氯清洗废水打磨成适用于非产品接触场景的公用工程级用水（冲洗、冷却、锅炉补水），不用改动消杀化学体系。
- 上层运营系统会记录污堵、清洗配方、盐/油截留和回收水量，让厂务工程团队看到实打实的回收率和开机证据，把一次性水处理工程变成可监控、可复制、能拿给 QA 看的运行能力。
whyWeWin:
- 把焦点收窄到一种废水化学（含氯家禽清洗废水）、一个买方（工程 VP / 公用工程总监）和一套回本逻辑（按回收水量计费或节省分成），公司才有机会把污堵物组合、清洗节奏和膜寿命跨工厂沉淀成数据资产。这种数据，一般 EPC 和部件供应商的组织形态都攒不出来。
- 竞争对手卖的要么是膜（ZwitterCo、Membrion）、要么是广谱工业回用 / ZLD（Gradiant），要么是全厂级废水服务（Veolia、Nijhuis）。还没人把“面向家禽、适配含氯消杀、带回收承诺的改造方案”打成标准品，这正好在部件供应和全栈 EPC 之间留出一个可守的切口。
strategicChoices:
  beachhead: 位于缺水或排放受限地区（美国东南部和德州肉鸡走廊）、拥有 3-10 家工厂、采用含氯消杀，并将在 12 个月内面临许可证续期、附加费调整或扩产决策的美国中型家禽加工企业。
  wedgeRationale: 与“工业水回用”或“食品饮料废水”这种大词相比，面向含氯消杀家禽工厂的非产品接触回用要窄得多。这样一来，首个部署可以先避开全面的食品安全重设计，在一个工厂周期内跑出可量化的回收水量和开机时长，再把技术主张去风险，之后再扩到同样受耐氯问题困扰、但 QA 和监管轮廓不同的肉类、乳品、饮料和化工垂直领域。
  sequencingRationale: 公司必须先在一个共创客户工厂里，证明耐氯膜性能和 QA 可接受的非产品接触用水点；只有这个证明点跑出来，才值得把标准化 skid 按节省分成卖出去。再往后，才轮到和 EPC 建渠道合作（因为他们本来就掌握改造范围），并沿着同一家多工厂加工企业往姐妹工厂扩——这也是研究里通向三年 $7M SOM 的最快路径。
  notYet:
  - 产品接触用水回用，或接近饮用水标准的应用。这类场景的 QA 和监管门槛，明显高于冲洗、冷却或锅炉补水。
  - 在家禽场景的膜寿命和 QA 数据还没跑出来前，就提前扩到肉类、乳品、饮料和化工等垂直领域。
  - 自己下场做膜制造或化学 IP；公司是叠在耐氯膜供应之上的垂直运营商，不是膜材料公司。
market:
  tam: $135.0M（约 30 家美国一体化鸡肉企业 × 每家约 5 个适合回用的站点 × 每站点年化约 $0.9M 支出，见 research.yaml）
  sam: $50.0M（约 10 家拥有 3-10 家工厂的中型加工企业 × 每家约 5 个候选站点 × 每站点每年约 $1.0M）
  som: $7.0M（1 个共创客户工厂，加上约 6 个后续姐妹工厂；到第 3 年合计约 7 个站点，每站点年化价值约 $1.0M）
  segments:
  - 位于缺水或排放受限地区、拥有 3-10 家工厂的美国中型家禽加工企业。
  - 更大体量、跨多个州运营的家禽加工企业（如 Mountaire、Peco、Simmons、Koch 这一档），可作为后续姐妹工厂扩张目标。
  buyingProcess: 工程 VP 或公用工程总监会在许可证续期、附加费重谈或扩产决策后发起评估；想拿下批准，先要过工厂 QA 对非产品接触用水点隔离的签字，金额更大的合同还要再拿到运营 VP 或 CFO 对七位数级资本支出或节省分成承诺的同意。
product:
  mvp: 在一个共创客户工厂部署单套模块化三级处理 skid，使用第三方耐氯膜，先把通量、截留率和回收水量这些基础监控跑起来，并围绕一个非产品接触用水点给出保底回收目标。
  sixMonth: 在共创客户工厂完成一个 90+ 天试点，拿到完整的 CIP 记录、氯暴露、通量衰减、截留率和膜寿命数据；同时定稿一套可复用到后续站点的 QA 认可采样与用水点隔离流程。
  twelveMonth: 把共创客户转成标准化的节省分成合同，补上开机时长和回收率的远程监控看板，并在同一家加工企业里拿下一个姐妹工厂，验证单点切入再扩张的打法。
  twentyFourMonth: 在 2-3 家多工厂加工企业里跑 4-6 个站点，跑出可复制的部署手册和一套可对标的膜寿命 / 回收数据，并至少签下一家 EPC 或预处理厂商的联合交付渠道。
  keyBets:
  - 耐氯膜在真实家禽 DAF / MBR 出水里，能连续 90+ 天稳住目标盐/油截留和经济可行的通量，而不只是隔壁工业场景表现好。
  - 只要证据包完整、再加第三方验证，工厂 QA 团队就会放行非产品接触回用端点，而不要求改动消杀化学体系。
  - 相比资本开支更重的定制工程项目，按节省分成或按回收水量计费会更容易签下，因为预算审批摩擦更小。
gtm:
  wedge: 先拿下一个共创客户工厂，并围绕非产品接触回收目标给出承诺；这个工厂最好正处在许可证续期、附加费变化或扩产决策期。等回收率和膜寿命跑出来后，再向同一家加工企业里的姐妹工厂扩。
  channels:
  - 直接销售给多工厂家禽加工企业里的厂务工程、公用工程和可持续发展负责人。
  - 通过已经深度参与改造范围定义的工业水 EPC 和预处理集成商联合交付。
  - 把标杆试点绑在废水升级、许可证续期和工厂扩产项目周期上。
  funnelTargets: 线索→合格共创客户对话 20-30%，共创客户试点→节省分成合同 50%+，单站点合同→18 个月内姐妹工厂扩张 40%+。
  pricing: 按节省收益分成或按回收水量计费，并设置单站点最低收费；首套 skid 另外收安装和调试费，后续再叠加持续性的监控 / 膜材 / 服务计划。这样能把一个资本开支很重的工程项目，改造成厂务工程买方更容易批准的运营费用决策。
businessModel:
  revenueStreams:
  - 按回收水量计费或按节省收益分成。
  - 前置安装与调试费。
  - 持续性的监控、膜材和服务计划收入。
  unitOfValue: 在保证水质达标的前提下，每个工厂每天回用的含氯清洗废水加仑数。
  targetGrossMarginPct: 55
  expansionLevers:
  - 一旦某个站点证明了回收率和开机时长，就在同一家多工厂加工企业里向姐妹工厂复制。
  - 在已经部署的站点里，继续扩到相邻的非产品接触用水点（冷却、锅炉补水等）。
  - 随着跨工厂性能数据沉淀，用更紧的回收承诺和更高价的服务计划持续抬升价值。
strategyMap:
  northStarMetric: 在所有活跃站点里、于保证水质达标前提下，每天回用的含氯废水总量。
  inputMetrics:
  - 两次换膜之间的运行天数（目标：持续数月，明显好于传统 RO 膜动辄报废）。
  - 达到目标盐 / 油截留率时的开机率。
  - 同一加工企业内，从共创客户到姐妹工厂的转化率。
  - 非产品接触用水点的 QA 签字周期。
  moatsToBuild:
  - 一套把污堵物组合、清洗配方和膜寿命连到回收承诺上的跨工厂数据集。
  - 让后续签字更快的 QA 证据包和用水点验证手册。
  - 与 2-3 家多工厂加工企业建立标杆关系，不用重新跑销售周期就能往里扩。
  killCriteria:
  - 如果耐氯膜在两个独立试点站点的真实家禽 DAF / MBR 出水里，都无法连续 90+ 天稳住目标截留率和经济通量，那核心技术赌注就失败了，公司不该继续扩部署。
  - 如果 18 个月内，目标加工企业里不到三分之一会碰到许可证续期、附加费重谈或扩产决策，那买方触发假设就太薄，撑不起现阶段可复制的销售动作。
  mermaid: |
    flowchart LR
      Wedge[Beachhead: chlorine-sanitized poultry non-product-contact reuse] --> MVP[MVP: single design-partner skid]
      MVP --> Proof[Proof: 90+ day recovery and membrane-life data]
      Proof --> Expansion[Expansion: sister-site rollout within processor]
      Expansion --> Network[Reuse-as-a-service network across food/beverage/chemical plants]
investorMemo:
  verdict:
    call: 观望
    conviction: 切口可信、痛点也真实，但核心技术主张和 QA 接受度还没在真实家禽废水生产环境里被证明；竞争格局虽然分散，却并不缺钱。
    whyBelieve: 耐氯能力正好拿掉一个具体、可验证的 RO 失效模式；而根据研究，美国大约 30 家一体化家禽企业这个买方集合，本来就在承受许可证和附加费压力。
    whyDoubt: 真实含氯家禽废水里，关于膜寿命、截留率和清洗节奏的工厂级试点数据目前还没有；而且第 3 年 $7M SOM 这个目标，本身也意味着一条典型的工业水基础设施式、项目很重的销售路径。
    nextDiligence: 先拿到并披露一个签约共创客户工厂的 90+ 天试点数据（CIP 记录、通量衰减、截留率、膜尸检），再谈进一步的资本投入。
  firstCustomer:
    title: 拥有 3-10 家工厂的美国家禽加工企业中的公用工程 / 厂务工程总监
    profile: 一家采用含氯消杀、位于缺水或附加费压力较重地区（美国东南部或德州肉鸡走廊）、并正面临废水升级决策的中型一体化家禽加工企业。
    trigger: 废水许可证续期、污水附加费重谈、工厂扩产，或一次失败的换膜周期，逼着运营方在不改消杀化学体系的前提下补出回用能力。
    buyer: 工程 VP 或公用工程总监
    initialContract: 先签一个单厂试点，收安装 / 调试费，再叠加节省分成或按回收水量计费；目标是在试点启动后 6-12 个月内，把它转成标准化的年度合同（按研究里的 SAM 测算，站点年化价值约 $1.0M）。
  mustBeTrue:
  - 耐氯膜在真实家禽 DAF / MBR 出水里，能连续 90+ 天稳住目标盐 / 油截留和经济通量，而不只是隔壁工业场景好看。
  - 工厂 QA 团队会放行非产品接触回用端点，而不要求改动含氯消杀化学体系。
  - 目标里的 3-10 厂加工企业中，至少每 3 家就有 1 家会在 18 个月内碰到许可证续期、附加费重谈或扩产决策。
  - 一个共创客户站点在证明点跑出来后的 12 个月内，至少能转成同一家加工企业里的一个姐妹工厂扩张。
  - 按节省分成 / 按回收水量计费，会比资本开支很重的工程 RFP 流程快得多，从而验证“压缩销售周期”的假设。
  diligenceQuestions:
  - 今天到底有没有真实含氯家禽 DAF 或 MBR 出水里的膜寿命和截留率数据？还是仍然主要来自 NALA 公告里提到的相邻工业流体场景？
  - 是否已经有签约或口头承诺的共创客户工厂？它的具体购买触发点和时间线是什么？
  - 技术路线图到底有多依赖单一膜供应商（NALA 或类似公司）？如果供货或性能不达预期，备用方案是什么？
  - 工厂 QA 真正要看什么，才会给非产品接触回用签字？这一要求有没有拿真实加工企业的 QA 团队测过？
  - 公司的销售周期和资本审批流程，与它必须替代或绑定的 Veolia / Nijhuis 工程项目相比，到底快多少？
operatingAssumptions:
- assumption: 耐氯膜会在真实的含氯家禽废水（DAF / MBR 出水）上跑出与 NALA 在相邻工业场景宣称相近的截留率和通量。
  basis: idea.yaml
  validationTest: 在一个共创客户工厂里做 90+ 天试点，完整记录 CIP、氯暴露、通量衰减、截留率，并做膜尸检。
  decisionImpact: 如果实际表现明显低于预期，就得重定价回收承诺模式和膜寿命经济性，甚至把切口缩到清洗强度更低的场景。
- assumption: 工厂 QA 团队会接受非产品接触回用端点（冲洗、冷却、锅炉补水），而不要求改动现有含氯消杀化学体系。
  basis: research.yaml
  validationTest: 在扩到首个试点之外前，先从至少两家加工企业那里拿到 QA 签字标准和第三方验证要求。
  decisionImpact: 如果 QA 要求改动消杀化学体系或增加额外控制，“运营改动更小”的切换理由就会变弱，销售周期也会被拉长。
- assumption: 按节省分成 / 按回收水量计费，会比传统资本开支很重的工程项目采购签得更快。
  basis: operator judgment
  validationTest: 把第一份节省分成合同的签约耗时和内部审批步骤，与同类工厂里一个 EPC 主导的 RFP 对照。
  decisionImpact: 如果这种定价并没有明显压缩销售周期，公司就该转向 EPC 联合交付和标准项目定价，而不是继续用自己的商业条款打头阵。
- assumption: 目标里的 3-10 厂家禽加工企业中，至少每 3 家就有 1 家会在未来 18 个月内碰到许可证续期、附加费重谈或扩产决策。
  basis: research.yaml
  validationTest: 把约 10 家符合 SAM 条件的加工企业的许可证续期时间、已知附加费讨论和公开扩产公告逐一拉表。
  decisionImpact: 如果接近触发事件的加工企业比预想少，公司就得拉长销售周期假设，并重新评估 12-24 个月里程碑。
experimentRoadmap:
- horizon: 0-90 天
  experiment: 在 3-5 家候选家禽工厂做站点筛选和废水取样
  hypothesis: 至少有一家候选工厂既有近期许可证 / 附加费 / 扩产触发，也有适合这个切口的含氯清洗废水。
  successMetric: 拿到 1 份签约共创客户 LOI，并用取样数据确认进水特征合适。
  owner: 创始人 / 销售负责人
- horizon: 0-90 天
  experiment: 完成膜供应商筛选和台架级污堵测试
  hypothesis: 至少一家耐氯膜供应商能在试点时间线内完成资格确认并接入 skid 设计。
  successMetric: 与至少一家耐氯膜供应商签下供货协议或试点准入协议。
  owner: 创始工程师
- horizon: 3-6 个月
  experiment: 完成一个 90+ 天共创客户试点，并记录完整 CIP 和性能数据
  hypothesis: 耐氯膜能在真实家禽 DAF / MBR 出水里稳住目标截留率和经济通量。
  successMetric: 交出 90 天试点报告，里面的截留率、通量衰减和膜寿命数据达到或超过传统 RO 基线。
  owner: 创始工程师 / 工艺负责人
- horizon: 3-6 个月
  experiment: 与共创客户工厂一起开发 QA 和用水点验证流程
  hypothesis: 只要证据包完整，工厂 QA 就会放行非产品接触回用端点，而不要求改动消杀化学体系。
  successMetric: 至少拿到一个非产品接触用水点的 QA 签字。
  owner: 销售负责人 / 法规顾问
- horizon: 6-12 个月
  experiment: 把共创客户转成标准化节省分成合同
  hypothesis: 按节省分成 / 按回收水量计费的签约速度会快于资本项目采购。
  successMetric: 在试点结束后 90 天内签下标准化年度合同。
  owner: 创始人 / 销售负责人
- horizon: 6-12 个月
  experiment: 跑通一个 EPC / 预处理厂商联合交付试点
  hypothesis: 通过现有 EPC 或预处理厂商联合交付，可以更快拿到改造项目范围。
  successMetric: 签下 1 份联合交付协议，并因此带来至少 1 个合格线索。
  owner: 创始人 / BD 负责人
- horizon: 12-18 个月
  experiment: 在共创客户所属加工企业网络内完成姐妹工厂扩张
  hypothesis: 一个站点跑通后的回收率和开机时长证明，可以在不重跑完整销售周期的前提下转成同集团第二个站点。
  successMetric: 首站点上线后 12 个月内签下第二个站点合同。
  owner: 销售负责人 / 客户成功
operations:
- 在报价前，为每个候选工厂建立站点筛选和废水取样流程。
- 把模块化 skid 设计和控制软件调到适配高强度、易污堵的含氯废水。
- 搭一套远程监控系统，持续跟踪污堵、清洗配方、截留率和回收水量。
- 和耐氯膜供应商、组件制造商、本地现场服务伙伴建合作关系。
- 和工业水 EPC、预处理厂商建立联合交付渠道。
team:
- role: 创始工艺工程师（膜 / 水处理）
  startTiming: 第 0 月
  rationale: 负责 skid 设计、膜资格确认，以及决定核心技术赌注能否成立的 90+ 天试点数据采集。
- role: 创始人 / 销售负责人（工业水或食品加工背景）
  startTiming: 第 0 月
  rationale: 负责拿下共创客户、维护与工程 VP / 公用工程总监的买方关系，并谈定价。
- role: 现场服务 / 调试工程师
  startTiming: 第 4-6 月
  rationale: 首套 skid 部署后就需要这个人，负责调试、操作员培训和共创客户站点的持续监控。
- role: 法规 / QA 顾问（合同制或兼职）
  startTiming: 第 3-6 月
  rationale: 负责设计用水点验证流程并推动 QA 签字；研究已经把这点识别为高严重度的采用摩擦。
- role: EPC / 渠道合作 BD 负责人
  startTiming: 第 9-12 月
  rationale: 等共创客户试点证明模型成立后再引入，用来搭建后续姐妹工厂和多加工企业扩张所需的联合交付渠道。
milestones:
- horizon: 0-12 个月
  items:
  - 签下 1 个具有明确购买触发点的共创客户工厂。
  - 完成 90+ 天试点，拿到完整的 CIP、通量、截留率和膜寿命数据。
  - 至少拿到 1 个非产品接触用水点的 QA 批准。
  - 把共创客户转成标准化的节省分成或按回收水量计费合同。
- horizon: 12-24 个月
  items:
  - 在共创客户所属加工企业网络内，至少拿下 1 个姐妹工厂扩张。
  - 至少签下 1 家 EPC 或预处理厂商的联合交付合作。
  - 在 2-3 家多工厂加工企业里跑 4-6 个运行站点。
  - 发布一套可对标的膜寿命和回收数据，用来收紧回收承诺。
- horizon: 24-36 个月
  items:
  - 达到研究中的 $7M SOM（约 7 个站点，每个站点年化价值约 $1.0M）。
  - 开始验证第二个垂直行业（肉类、乳品、饮料或化工），并把家禽数据集当成证据。
  - 把未来站点复制所需的回用即服务融资结构正式搭起来。
risks:
- risk: 与 NALA 公告里提到的相邻工业试点相比，耐氯膜在真实家禽 DAF / MBR 出水里的表现可能明显偏弱。
  likelihood: Medium
  impact: High
  mitigation: 在合同里给任何回收承诺前，先要求完成 90+ 天试点、完整性能记录和膜尸检；同时再备一个第二供应商。
- risk: 食品加工企业的 QA 团队，可能在水质边界和消杀控制被充分证明之前，都不会轻易接受新的回用闭环。
  likelihood: Medium
  impact: High
  mitigation: 先只做非产品接触用水点，引入第三方验证，并在提更大范围回用前把 QA 隔离边界写清楚。
- risk: 不同工厂和产线之间，油脂、固体物、盐负荷和清洗化学体系差异太大，实际表现可能没有膜材料主张那么可复制。
  likelihood: Medium
  impact: Medium
  mitigation: 把进水筛选和预处理边界标准化，在早期部署里保留人工参与的运行配方，并只在与试点相近的家禽废水画像上扩站。
- risk: 工业水改造很容易变成周期长、资本开支重的项目，拉长回本，也拖慢公司扩张，尤其是面对已经有关系网的 Veolia 和 Nijhuis 时。
  likelihood: High
  impact: Medium
  mitigation: 卖标准化 skid，用节省收益分成定价，靠模块化设计压缩工程范围，并尽量通过 EPC 渠道伙伴走单，而不是正面去抢全厂级合同。
- risk: 耐氯膜技术如果高度集中在单一供应商手里，一旦供货、价格或性能变化，公司会有明显依赖风险。
  likelihood: Medium
  impact: Medium
  mitigation: 尽早把多个膜合作伙伴资格跑通，并把性能数据盯得足够细，以便必要时切换供应。
fundingAsk:
  round: seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: 18 个月的跑道主要用来覆盖创始工艺工程师和现场工程师、首个共创客户试点 skid 与调试、QA / 法规顾问支持，以及把一个已验证站点扩成可复制姐妹工厂动作所需的初始 EPC 渠道开发。
