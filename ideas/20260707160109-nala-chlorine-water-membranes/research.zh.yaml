    - 35
    - 37
  validationPlan:
  - priority: high
    question: 耐氯膜能否在含氯家禽 DAF 或 MBR 出水里，连续 90+ 天维持目标截留率和通量？
    evidenceToGather: 收集带完整 CIP 记录、氯暴露、通量衰减、截留率和膜尸检结果的试点数据。
  - priority: high
    question: 工厂 QA 会不会在不要求改动消杀化学体系的前提下，放行非产品接触回用端点？
    evidenceToGather: 收集两个加工企业在具体用水点上的采样要求、QA 签字标准和第三方验证要求。
  - priority: medium
    question: 首批目标工厂能省下多少污水附加费、新水采购和换膜成本？
    evidenceToGather: 收集共创客户 12 个月的公用工程账单、附加费表、换膜历史和许可证往来材料。
  - priority: low
    question: DAF 浮渣和膜浓缩液里的副产物回收，能不能显著改善项目回本？
    evidenceToGather: 做油脂、蛋白等物料平衡，并与渲染商或废弃物承运方沟通。
