  sensitivityCases:
  - case: 如果 EPA 对营养盐和废水的收紧，比预期来得更慢或更轻。
    impact: 合规紧迫性会减弱，销售故事就得更依赖开机时长、扩产能力和节省公用工程成本。
    sourceRefs:
    - 6
    - 7
  - case: 如果耐氯或抗污堵膜在真实家禽废水里的表现，低于相邻试点的结果。
    impact: 换膜间隔会缩短、回收承诺会变弱，客户信任也可能在多工厂扩张前先掉下来。
    sourceRefs:
    - 2
    - 10
    - 29
  - case: 如果现有厂商把回用打包进更广的废水或 ZLD 升级项目里。
    impact: 创业公司会更难直接赢下新客户，只能更多地作为合作方嵌进全厂级大项目。
