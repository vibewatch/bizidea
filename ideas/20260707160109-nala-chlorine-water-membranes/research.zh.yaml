competitors:
- name: ZwitterCo
  stage: scale-up
  wedge: 面向高难度工业废水的抗污堵 RO 膜和工程化系统，并明确打出肉类 / 家禽场景。
  pricing: 联系销售；更像是带承诺的膜 + 系统打法，而不是公开价表。
  strength: 抗污堵清洗故事强、系统能力完整，对食品加工买家的销售叙事也很清楚。
  weaknessVsUs: 它的差异点更偏抗污堵，而不是耐氯消杀兼容或面向家禽的专属运营层。
  sourceRefs:
  - 28
  - 29
  - 30
  - 31
- name: Gradiant
  stage: scale-up
  wedge: 面向大型关键站点的一体化工业工艺用水、回收和 ZLD 解决方案。
  pricing: 工程化回用和 ZLD 部署采用定制项目报价。
  strength: 规模、融资能力和大型工业水循环项目验证都很强。
  weaknessVsUs: 覆盖行业太广、项目属性更重，因此天然不如一个可复制的家禽改造方案聚焦。
  sourceRefs:
  - 32
  - 33
  - 34
- name: Veolia Water Technologies
  stage: incumbent
  wedge: 面向食品饮料的全栈废水、回用和审计驱动优化服务。
  pricing: 定制 EPC 和服务报价，没有公开价目。
  strength: 装机基础深、食品饮料案例多、工艺能力也很全面。
  weaknessVsUs: 更偏向卖全厂级废水方案，而不是一个能快速复制的含氯家禽回用产品。
  sourceRefs:
  - 35
  - 36
- name: Nijhuis Saur Industries
  stage: incumbent
  wedge: 面向食品行业的废水、回用、膜过滤和资源回收方案，并已有家禽案例。
  pricing: 按废水处理和回收范围做定制项目报价。
  strength: 行业聚焦强，在食品和家禽场景里也有真实参考项目。
  weaknessVsUs: 它更偏整体废水与回收导向，因此给更聚焦的耐氯三级回用运营商留出了空间。
  sourceRefs:
  - 37
  - 38
- name: Membrion
  stage: scale-up
  wedge: 面向高强度工业废水、RO 浓水回收和资源回收的电陶瓷脱盐方案。
  pricing: 先试点、再项目报价，而不是公开价格。
  strength: 在高强化学体系和高回收率的难处理溶解固体场景里定位很强。
  weaknessVsUs: 它还没有清楚证明自己就是家禽有机废水运营层，或者食品工厂 QA 工作流的默认解决方案。
  sourceRefs:
  - 39
  - 40
regulatoryTechnicalConstraints:
- point: 直接排放和间接排放工厂仍然受 EPA 肉类与家禽废水规则，以及围绕营养盐收紧的持续讨论约束。
  sourceRefs:
  - 6
  - 7
- point: 食品工厂对回用的接受度仍然高度依赖具体用水点，因此首批闭环应只做非产品接触，而且必须经得起审计。
  sourceRefs:
  - 10
  - 15
- point: 传统聚酰胺 RO 一般都要求先去氯，或者改用替代清洗流程；一旦消杀化学体系不能改，复杂度就会明显上升。
  sourceRefs:
  - 12
  - 13
- point: 预处理质量仍然关键；即便耐氯能力改善，油脂、固体物和上游波动仍可能把下游膜系统直接打穿。
  sourceRefs:
  - 11
  - 30
  - 37
validationSignals:
- point: NALA 的融资、专利和 Concord 协议说明，耐氯膜这一层已经在走出纯学术主张。
  sourceRefs:
  - 3
  - 4
  - 5
- point: ZwitterCo 已经面向肉类 / 家禽卖解决方案，并用带承诺的销售动作来背书自己的膜故事。
  sourceRefs:
  - 29
  - 30
- point: Veolia 和 Nijhuis 仍在持续拿下食品、乳品和家禽废水项目，这说明买方本来就会为先进处理升级留预算。
  sourceRefs:
  - 35
  - 37
  - 38
- point: Pilgrim's 和 Mountaire 的公开水资源管理叙事说明，大型加工企业已经在整张工厂网络上被迫更认真地管理用水。
  sourceRefs:
  - 23
  - 24
