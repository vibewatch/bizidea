  - friction: 七位数项目审批和内部资本竞争
    severity: high
    affectedBuyer: 运营 VP 或 CFO 发起人
    mitigation: 先卖分阶段试点和年度绩效合同，并把叙事绑在节省成本与回收指标上。
    sourceRefs:
    - 29
    - 33
    - 35
    - 36
  - friction: 与现有 DAF、生化和公用工程系统的集成
    severity: medium
    affectedBuyer: 厂务工程经理
    mitigation: 优先使用模块化 skid，并与现有预处理或 EPC 厂商合作，而不是替换上游资产。
    sourceRefs:
    - 28
    - 30
    - 35
    - 37
  - friction: 差异化膜供应过于集中
    severity: medium
    affectedBuyer: 采购与技术运营
    mitigation: 尽早跑多个膜合作方资格，并把性能盯得足够细，以便必要时切换。
    sourceRefs:
    - 1
    - 29
    - 39
