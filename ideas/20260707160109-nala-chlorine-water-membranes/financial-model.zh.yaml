slug: chlorinated-wash-reuse-platform
date: '2026-07-07'
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: 模型起始月
  value: 2026-07
  unit: YYYY-MM
  source: '[BP date 2026-07-07] 模型与已成文商业计划同月启动，因为融资和寻找共创客户会立刻开始。'
- id: A2
  name: 期初现金 / seed 融资规模
  value: $2.4M
  unit: USD
  source: '[BP fundingAsk targetFundingRangeUsd $2-4M + BP fundingAsk runwayMonths 18 + model cash curve] 基本情景取融资区间中段，目标是跑到 12-24 个月的运行站点里程碑，并额外留出 6 个月缓冲。'
- id: A3
  name: 起始付费站点数
  value: '0'
  unit: count
  source: '[BP executiveSummary + BP milestones 0-12 months] 公司从零收入起步，必须先拿下一个共创客户工厂。'
- id: A4
  name: 付费站点定义
  value: 只要一个站点在付费，不管付的是试点 / 安装阶段，还是标准化年度回用合同，都计作 1 个站点。
  unit: definition
  source: '[BP gtm.pricing + BP businessModel.revenueStreams] customersEop 统计的是活跃付费试点和正式生产合同，因为两者都会带来真实现金回款。'
- id: A5
  name: 共创客户时间线
  value: 1 个共创客户站点在 M4 签约，并在 M9 转成标准化合同。
  unit: timeline
  source: '[BP experimentRoadmap 0-90 days and 6-12 months + BP milestones 0-12 months] 基本情景假设首个工厂推进很快，因为整个切口都押在早期证明点上。'
- id: A6
  name: 标准化单站点年收入
  value: 每个活跃站点年化 $1.02M
  unit: USD/site/year
  source: '[BP market.sam and BP market.som use about $1.0M site-year + BP investorMemo.firstCustomer.initialContract] 模型把稳态合同额略微抬到 $1.0M 之上，以反映安装费以及研究区间内的监控 / 服务收入。'
- id: A7
  name: Y1 试点转生产收入爬坡
  value: 首个站点 M4-M6 分别为 $25K / $35K / $45K，M7-M8 为 $60K / $75K，M9 起每月 $85K。
  unit: USD/month
  source: '[BP gtm.pricing + BP investorMemo.firstCustomer.initialContract + startup-finance heuristic] 收入先来自试点 / 安装费，调试完成后再爬到标准化站点最低收费。'
- id: A8
  name: 客户爬坡
  value: M12 时 1 个付费站点，Q4Y2 时 5 个，Q4Y3 时 7 个。
  unit: customersEop
  source: '[BP milestones 12-24 months target 4-6 sites + BP milestones 24-36 months target ~7 sites + Research market.som] 基本情景直接沿用商业计划里的扩站节奏。'
- id: A9
  name: 毛利率爬坡
  value: Y1 试点月份约 20-45%，Y2 各季度约 45-52%，Y3 各季度约 52-55%。
  unit: gross margin percent
  source: '[BP businessModel.targetGrossMarginPct 55 + BP operations + startup-finance heuristic] 早期部署里服务占比更高，等调试手册开始复用，毛利率才会抬到目标水平。'
- id: A10
  name: 招聘时间线
  value: M1 创始团队；M4 现场服务；M8 工艺 / 应用工程师；M10 BD / 渠道负责人；M14 第二名现场工程师；M16 运营 / 行政；M18 第二名工艺工程师；M27 第三名现场工程师；M30 第二名运营 / 行政；M33 第三名工艺工程师。
  unit: timeline
  source: '[BP team + BP strategicChoices.sequencingRationale + startup-finance heuristic] 在首个站点跑通前，团队尽量保持精简；之后再提前补部署和支持能力，为 4-6 个站点的里程碑做准备。'
- id: A11
  name: 创始工艺工程师全包薪酬
  value: $180K
  unit: USD/year
  source: '[BP team founding process engineer + startup-finance heuristic] 对应资深膜 / 工艺人才的早期团队现金薪酬，已含福利和薪资税。'
- id: A12
  name: 创始人 / 销售负责人全包薪酬
  value: $180K
  unit: USD/year
  source: '[BP team Founder/Head of Sales + startup-finance heuristic] 对应工业企业销售高度集中的角色，已含出差和轻量浮动激励。'
- id: A13
  name: 现场服务 / 调试全包薪酬
  value: $135K
  unit: USD/year
  source: '[BP team field service/commissioning engineer + startup-finance heuristic] 覆盖现场调试、操作员培训和早期排障。'
- id: A14
  name: 工艺 / 应用工程师全包薪酬
  value: $155K
  unit: USD/year
  source: '[BP product + BP operations + startup-finance heuristic] 这个岗位负责把 skid 配方、数据采集和后续站点复制标准化。'
- id: A15
  name: BD / 渠道负责人全包薪酬
  value: $165K
  unit: USD/year
  source: '[BP team business development lead for EPC/channel partnerships + startup-finance heuristic] 这里配置的是 1 名资深合作伙伴销售，而不是大规模地面销售团队。'
- id: A16
  name: 运营 / 行政全包薪酬
  value: $120K
  unit: USD/year
  source: '[BP operations + startup-finance heuristic] 覆盖财务、保险、供应商管理和基础项目运营。'
- id: A17
  name: 薪酬在损益表里的分摊口径
  value: 创始工艺工程师 80% 研发 / 20% G&A；销售负责人 80% 销售&市场 / 20% G&A；现场服务 60% 研发 / 20% 销售&市场 / 20% G&A；工艺 / 应用工程师 100% 研发；BD / 渠道 100% 销售&市场；运营 / 行政 100% G&A。
  unit: allocation
  source: '[BP team role rationales + BP operations] 这套口径把现金薪酬全部映射进各项经营费用，同时让交付密集型工作集中体现在研发和支持端。'
- id: A18
  name: 非薪酬 OPEX 爬坡
  value: Y1 前期每月非薪酬 S&M / R&D / G&A 为 $8K / $12K / $8K，到 Q4Y3 升至 $34K / $40K / $22K。
  unit: USD/month
  source: '[BP operations + BP risks + startup-finance heuristic] 涵盖出差、QA / 法规顾问、实验测试、保险、软件、法务和工业试点所需的渠道支持。'
- id: A19
  name: 试点 skid 与监控现金投入
  value: $300K 分布在 M3-M6，M8 另有 $25K 用于监控系统。
  unit: USD
  source: '[BP fundingAsk.useOfFundsSummary one design-partner pilot skid + BP product.mvp + BP operations remote monitoring stack] 首次部署必须先把设备和监测仪表真金白银投进去，等客户基数变大后，运营现金才足以覆盖这类支出。'
- id: A20
  name: 扩张营运资金约定
  value: 第 2-4 个站点每个净占用 $75K 现金，第 5 个站点 $60K，第 6-7 个站点每个 $50K。
  unit: USD/site
  source: '[BP gtm.pricing upfront installation and commissioning fees + startup-finance heuristic] 安装费和客户预付款可以覆盖大部分采购现金，但每新增一个站点仍会带来短周期的部署营运资金占用。'
- id: A21
  name: 稳态月流失率
  value: 2.0%
  unit: percent/month
  source: '[startup-finance heuristic for high-switch-cost industrial utility contracts + BP whyWeWin sister-site data moat] 36 个月经营计划里默认没有客户流失，但单位经济模型仍保守地假设了一个稳态留存水平。'
- id: A22
  name: CAC 口径
  value: 36 个月销售与市场费用 ÷ 7 个净新增付费站点。
  unit: formula
  source: '[model calc using base-case S&M spend + BP gtm.funnelTargets] 这个口径给出的是偏保守的综合 CAC，因为早期打法仍由创始人主导，并且高度围绕单站点展开。'
- id: A23
  name: 决定融资规模的下一轮里程碑
  value: 到 Q4Y2，公司应跑到 2-3 家加工企业、4-6 个运行站点，拿下 1 个 EPC / 预处理联合交付伙伴，并沉淀出一套可对标的膜寿命数据集。
  unit: milestone
  source: '[BP milestones 12-24 months + BP fundingAsk runwayMonths 18] 这轮 seed 的规模，是按“拿到下一轮所需的工厂级硬证明”来定，而不是只够跑完一个试点。'
- id: A24
  name: 季度薪酬口径
  value: Y2-Y3 的薪酬行按季度内真实月度入职时间计算，而不是只看季末快照。
  unit: convention
  source: '[Headcount column convention + BP team startTiming] 这样即便 headcount 表只展示 Y2 和 Y3 的年末快照，薪酬费用仍能与招聘节奏保持一致。'
