scenarios:
  downside:
    description: 共创客户转正大约晚了一个季度，公司到退出时更接近 5 个站点而不是 7 个，毛利率改善也在达到商业计划目标前停住。
    y3RevenueK: 4890.0
    y3EbitdaK: -120.0
    cashLowPointK: 75.0
    keyAssumptionChanges:
    - 首个共创客户直到 M12 左右才转成标准化合同，而不是 M9。
    - 由于姐妹工厂复制更慢，Q4Y3 的 customersEop 约为 5，而不是 7。
    - 退出毛利率停在约 50%，因为膜寿命和现场服务强度没有像预期那样改善。
  base:
    description: 首个共创客户很快跑出证明包，EPC / 渠道支持从 Y2 开始起作用，公司最终达到 7 个付费站点，单站点稳态价值约 $1.0M。
    y3RevenueK: 6320.0
    y3EbitdaK: 874.9
    cashLowPointK: 400.1
    keyAssumptionChanges:
    - M12 时有 1 个付费站点，Q4Y2 时 5 个，Q4Y3 时 7 个。
    - 单站点稳态年化收入约为 $1.02M，其中包含服务和监控。
    - 随着调试手册和供应商条款改善，毛利率到 Q4Y3 达到商业计划目标的 55%。
  upside:
    description: 首个试点更早转正，Y3 再多拿下 1 个姐妹工厂，运营层也比计划更早跑到目标毛利率。
    y3RevenueK: 7160.0
    y3EbitdaK: 1425.0
    cashLowPointK: 520.0
    keyAssumptionChanges:
    - 首个共创客户大约在 M7 就完成转正，公司到 Q4Y3 能跑到 8 个付费站点。
    - 随着监控和膜服务的附加销售增强，单站点年化价值会向约 $1.08M 靠近。
    - 由于早期数据集更快压低现场服务和换膜成本，退出毛利率能到约 57%。
sensitivity:
- variable: ARPU
  downsideCase: 如果节省分成兑现度低于预期，单站点年化价值会落在更接近 $0.95M。
  baseCase: 稳态单站点价值约 $1.02M，并包含安装、监控和膜服务收入。
  upsideCase: 首轮姐妹工厂复制证明经济性后，单站点年化价值可达到约 $1.08M。
  y3RevenueImpactK: -430.0
  cashImpactK: -330.0
- variable: CAC
  downsideCase: 如果直销和站点取样始终保持高度定制，CAC 会漂到约 $325K。
  baseCase: 在创始人主导销售并配 1 名渠道 BD 的情况下，CAC 维持在约 $251K。
  upsideCase: 如果 EPC 引荐能更快带来合格工厂机会，CAC 可降到约 $220K。
  y3RevenueImpactK: -150.0
  cashImpactK: -290.0
- variable: churn
  downsideCase: 如果部分试点经济性既无法扩张也无法续约，稳态月流失率会到 3.0%。
  baseCase: 稳态月流失率为 2.0%，而前 36 个月基本不出现真实客户流失。
  upsideCase: 一旦姐妹工厂把运营层标准化，稳态月流失率可降到 1.0%。
  y3RevenueImpactK: -180.0
  cashImpactK: -170.0
- variable: sales cycle
  downsideCase: 从试点到标准化合同的时间会从约 5 个月拉长到约 8 个月。
  baseCase: 首个试点大约 5 个月转正，后续站点则靠已验证的 QA 和开机数据签得更快。
  upsideCase: 一旦首套证明包可以复用，从试点到合同的时间可压到约 4 个月。
  y3RevenueImpactK: -950.0
  cashImpactK: -650.0
- variable: gross margin
  downsideCase: 如果膜寿命和现场支持一直弱于预期，退出毛利率会停在约 50%。
  baseCase: 在 5 个站点上线后，退出毛利率达到商业计划目标的 55%。
  upsideCase: 如果调试、清洗配方和供应商条款改善更快，退出毛利率可达约 57%。
  y3RevenueImpactK: 0.0
  cashImpactK: -350.0
- variable: hiring pace
  downsideCase: 如果在站点复制动作尚未证明前，就提前招 1 名现场和 1 名运营人员，现金会更吃紧。
  baseCase: 招聘节奏按商业计划推进，在首个姐妹工厂证明点出来前都尽量保持精简。
  upsideCase: 如果不影响部署，1 名后台岗位可以推迟到 Q4Y3 之后再招。
  y3RevenueImpactK: 80.0
  cashImpactK: -250.0
modelDiagram:
  title: 单位经济模型流程
  mermaid: |
    flowchart LR
      PermitTriggers[Permit or surcharge trigger] --> DesignPartner[Design-partner pilot]
      DesignPartner --> QAProof[QA-approved proof pack]
      QAProof --> SiteContracts[Standardized site contracts]
      SiteContracts --> SisterSites[Sister-site rollout]
      SisterSites --> Revenue[Revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash and runway]
modelSanity:
- checkName: 营收引擎
  finding: 基本情景的收入引擎，是把 1 个共创客户工厂一路转成到 Q4Y3 的 7 个付费站点，每个站点年化价值约 $1.02M；大部分增长来自姐妹工厂复制，而不是到处撒新客户。
- checkName: 必须做对的事
  finding: 第一个 90+ 天试点必须在 M9 左右完成转正，并且 QA 批准要足够快，这样 Y2 才能在没有大型直销团队的情况下再加 4 个站点。
- checkName: 模型崩溃条件
  finding: 如果销售周期晚一个季度，或毛利率停在 50% 左右，下行情景会在公司挣到下一轮融资资格前，把现金压到接近见底。
- checkName: 下一轮融资证明包
  finding: 只有在 4-6 个运行站点、1 个真实 EPC / 渠道伙伴和一套可对标的膜寿命数据集都跑出来后，下一轮融资才有说服力，因为这才证明首个工厂能复制到整个工厂群。
sanityChecks:
  ruleOf40: Y3 增速 116.8% + EBITDA 利润率 13.8% = 130.6%
  burnMultiple: 按约 $0.80M 的净消耗（EBITDA 加部署现金）对比约 $2.33M 的新增收入，Y2 现金燃烧倍数约 0.3x；到 Y3 公司转为净现金创造。
  revenuePerFte: Y3 年末 11 名 FTE 对应人均收入约 $574K（处于精简工业服务模型 $300-600K 基准区间内）
  flags:
  - 基本情景假设首个共创客户站点在 M4 签约、M9 转正；在敏感性表里，晚一个季度就是最大的现金风险变量。
  - customersEop 从 M4 起就把付费试点计入活跃站点，因此在 Y1 大部分时间和 Y2 前段，完全标准化的生产合同会落后于表面客户数。
  - 36 个月经营计划里没有计入真实客户流失，尽管单位经济模型用了 2.0% 的稳态月流失率启发式；续约能力要等第一批合同成熟后才会被证明。
  - 毛利率要到 5 个站点上线后才爬到商业计划目标的 55%；如果膜寿命更差或现场服务更重，Y3 EBITDA 会被明显吃掉。
  - 现金模型假设安装费和客户预付款能覆盖大部分采购需求；如果加工企业要求供应商融资，$2.4M 的 seed 轮很可能偏轻。
  - 由于膜制造、skid 制造和部分现场支持按商业计划是外包的，人均收入看起来会更高；如果未来把更多交付环节收回自营，需要的人头也会更多。
