  - 性能监控软件与服务网络。
jobsToBeDone:
- job: 当工厂扩产或许可证续期逼着我们压淡水需求时，帮公用工程团队把含氯清洗废水回用起来，这样我们扩产时就不用再去拿整套新增水资源配额。
  currentAlternative: 采购新水、升级排放系统，以及带脱氯段的传统反渗透系统。
  successMetric: 日回用水量，以及回本所需月数。
- job: 当换膜和污堵把回用试点拖得不稳定时，帮厂务工程团队在强力清洗下依然稳住盐和油的去除效果，让回用从一个科学项目，变成可以信赖的日常公用工程能力。
  currentAlternative: 人工清洗膜、频繁更换滤芯，以及找顾问一单一单排障。
  successMetric: 两次换膜之间的运行天数，以及达标水质下的开机率。
ideaScorecard:
  signalStrength:
    score: 4
    rationale: 技术主张足够具体，又绑定了真实融资事件；但现阶段的佐证仍以公告为主，缺少独立运行数据。
  painIntensity:
    score: 5
    rationale: 一旦工厂无法在高消杀强度的废水里做回用，就要反复为新水采购、排放成本、停机和延期扩产买单。
  wedgeClarity:
    score: 5
    rationale: 面向耐氯消杀家禽工厂的非产品接触回用，是一个很窄的首个工作流：买方明确、触发清晰、节省可量化。
  defensibility:
    score: 4
    rationale: 护城河来自膜相关运行数据、回收承诺，以及在高强度废水场景里可复制的部署手册；即便核心化学 IP 可能掌握在上游供应商手里，这层运营资产依然能沉淀。
  ventureScale:
    score: 5
    rationale: 如果先在家禽场景打透，就可以向相邻的食品、饮料和化工工厂扩展，并最终演进成一张更广的、带融资能力的工业水回用网络。
topRisks:
- name: 食品工厂对回用仍然谨慎
  description: 在水质边界和消杀控制被试点之外充分证明之前，食品加工企业可能会对任何新的回用闭环保持谨慎。
  mitigation: 先从非产品接触用水点切入，引入第三方验证，并在提更大范围的工厂回用前，把 QA 隔离边界写清楚。
- name: 废水波动太大
  description: 不同工厂、不同产线的油脂、固体物、盐负荷和清洗化学体系差异很大，实际表现可能没有膜材料主张那么可复制。
  mitigation: 先聚焦家禽场景，把取样和预处理边界标准化，并在早期部署里保留人工参与的运行配方。
- name: 项目制销售拖慢扩张
  description: 工业水改造很容易演变成周期长、资本开支重的项目，拉长回本，也拖慢公司放大的速度。
  mitigation: 卖标准化 skid，采用节省收益分成定价，并通过 EPC 渠道伙伴交付，压缩工程范围和预算摩擦。
