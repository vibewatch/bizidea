problem: 家禽加工厂在消杀和清洗环节会排出含氯、易污堵的废水。可一旦操作员加强清洗，或让氯留在流程里，传统反渗透系统就会扛不住。结果工厂只能在高成本脱氯、频繁换膜，或者继续买新水、把本可回用的水直接排掉之间做选择。这会推高公用工程支出、放大缺水风险，也会拖慢扩产决策，因为现有回用系统扛不住食品级消杀的真实水化学。
targetUser:
  primary: 在美国拥有 3-10 家工厂、采用含氯消杀体系的家禽加工企业中，负责公用工程、废水或厂务工程的总监。
  secondary: 在蛋白加工企业内，负责降低淡水用量和排放量的环境合规与可持续发展负责人。
  buyer: 多工厂家禽加工企业的工程副总裁或公用工程总监
startupThesis:
  nonObviousInsight: 突破点不在于工业企业突然想做水回用，而在于耐氯把消杀工厂里最难扛的运营税拿掉了。一旦膜既能扛住强力清洗，又能继续拦住油和盐，瓶颈就会从化学风险转到部署和融资。这样腾出来的空间，适合做垂直化运营商，而不是再造一家膜材料公司。
  beachhead: 位于缺水或排放受限地区、拥有 3-10 家工厂的美国中型家禽加工企业；它们采用含氯消杀，并且正在评估废水升级项目，希望回收非产品接触的公用工程用水。
  wedge: 装在预处理之后的模块化三级处理与运营层，专门处理含氯清洗废水；用耐氯膜稳定产出非产品接触回用水，供冲洗、冷却或锅炉补水使用。
  whyNowCatalyst: Flathead Forge 的投资，加上 NALA 宣称膜能承受正常耐氯暴露的 1,000 倍，说明高强度废水回用背后的化学瓶颈正在松动；与此同时，工业工厂也越来越需要更低水强度的运营方式。
  ventureScalePath: 先从家禽加工厂切入，再扩到同样依赖强力就地清洗或消杀体系的肉类、乳品、饮料和化工工厂；随后叠加跨工厂监控、绩效融资和采购协同，成为分布式工业水回用的运营层。
solution: 公司把模块化三级处理 skid 装在现有预处理或均衡池之后，用耐氯膜把含氯清洗废水打磨成非产品接触的回用水，供冲洗、冷却和锅炉补水使用。上层运营系统会盯住污堵、清洗配方、盐和油的截留效果，以及回收水量，让厂务团队看清回用到底有没有比直接排放更划算。因为膜本身扛得住强力清洗，系统可以顺着工厂既有的消杀现实去跑，而不用再塞一层脆弱的脱氯补丁。第一单先卖单厂改造，并给出回收目标承诺；一旦节水效果和膜寿命跑出来，再向姐妹工厂扩开。时间拉长后，这家公司可以演进成一张回用即服务网络，把不同工厂、不同废水特征的性能数据都沉淀下来。
goToMarketSeed:
  firstCustomer: 位于缺水或排放受限地区、采用含氯消杀，并计划在 12 个月内升级废水系统或扩产的美国 3-10 厂家禽加工企业。
  buyingTrigger: 废水许可证续期、工厂扩产，或又一次失败的换膜周期，逼着运营方在不改消杀化学体系的前提下补出回用能力。
  currentAlternative: 带脱氯段的传统反渗透系统、DAF 加生化处理后直接排放、蒸发器，以及由工程公司一次性定制的改造项目。
  switchingReason: 这个切口让工厂不用改现有消杀体系，也能拿到回用经济性和更长的换膜间隔；这样一来，运营团队承受的改动远小于重做整套水处理方案。
  pricingHypothesis: 按回收水量计费或按节省收益分成，并设置单站点最低收费；首套 skid 另外收安装和调试费。
