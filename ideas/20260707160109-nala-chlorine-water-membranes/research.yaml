openQuestions:
- What membrane-life and salt/oil rejection data exists for chlorinated poultry DAF or MBR effluent over multi-month runs, not just for adjacent industrial streams?
- Which non-product-contact endpoints—washdown, cooling tower makeup, or boiler makeup—are easiest to clear with plant QA and local regulators?
- How many 3-10 plant poultry processors will hit a permit renewal, sewer surcharge renegotiation, or capacity expansion decision in the next 18 months?
- Can grease or protein recovery from DAF float and membrane concentrate materially improve project payback at the first sites?
