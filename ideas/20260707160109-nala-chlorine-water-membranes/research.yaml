competitors:
- name: ZwitterCo
  stage: scale-up
  wedge: Anti-fouling RO membranes and engineered systems for tough industrial wastewater, with explicit meat and poultry positioning.
  pricing: Contact sales; guarantee-backed membrane and system motion rather than list pricing.
  strength: Strong cleanability story, engineered systems, and a clear food-processing sales narrative.
  weaknessVsUs: Differentiates on anti-fouling more than on chlorine-stable sanitation compatibility or a poultry-specific operating layer.
  sourceRefs:
  - 28
  - 29
  - 30
  - 31
- name: Gradiant
  stage: scale-up
  wedge: Integrated industrial process water, recycling, and ZLD solutions for large mission-critical sites.
  pricing: Custom project pricing for engineered reuse and ZLD deployments.
  strength: Scale, financing, and validation from large industrial water-circularity projects.
  weaknessVsUs: Broad sector scope and heavier project posture make it less naturally focused on a repeatable poultry retrofit motion.
  sourceRefs:
  - 32
  - 33
  - 34
- name: Veolia Water Technologies
  stage: incumbent
  wedge: Full-stack food and beverage wastewater, reuse, and audit-led optimization services.
  pricing: Custom EPC and service pricing; no public list rates.
  strength: Deep installed base, food-and-beverage references, and broad process expertise.
  weaknessVsUs: Tends to sell plantwide wastewater solutions rather than a narrow chlorinated poultry reuse product with fast replication.
  sourceRefs:
  - 35
  - 36
- name: Nijhuis Saur Industries
  stage: incumbent
  wedge: Food-sector wastewater, reuse, membrane filtration, and resource-recovery solutions with poultry references.
  pricing: Custom project pricing tied to wastewater and recovery scope.
  strength: Sector specialization and real reference projects in food and poultry environments.
  weaknessVsUs: Broader wastewater and recovery orientation leaves room for a more focused chlorine-sanitized tertiary reuse operator.
  sourceRefs:
  - 37
  - 38
- name: Membrion
  stage: scale-up
  wedge: Electro-ceramic desalination for harsh industrial streams, RO reject recovery, and resource recovery.
  pricing: Pilot-first and project-quote motion rather than published pricing.
  strength: Strong harsh-chemistry and high-recovery positioning for difficult dissolved-solids streams.
  weaknessVsUs: Less clearly proven as a poultry-organics operating layer or as a food-plant QA workflow solution.
  sourceRefs:
  - 39
  - 40
