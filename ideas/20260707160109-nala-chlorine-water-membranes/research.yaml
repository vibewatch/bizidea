  validationPlan:
  - priority: high
    question: Can a chlorine-stable membrane maintain target rejection and flux on chlorinated poultry DAF or MBR effluent for 90-plus days?
    evidenceToGather: Pilot data with full CIP logs, chlorine exposure, flux decline, rejection, and membrane autopsy results.
  - priority: high
    question: Will plant QA approve non-product-contact reuse endpoints without forcing a sanitation-chemistry change?
    evidenceToGather: Endpoint-specific sampling requirements, QA signoff criteria, and third-party validation from two processors.
  - priority: medium
    question: How large are avoided sewer surcharges, freshwater purchases, and membrane replacement costs at the first target plants?
    evidenceToGather: Twelve months of utility bills, surcharge schedules, membrane replacement history, and permit correspondence from a design partner.
  - priority: low
    question: Can by-product recovery from DAF float and membrane concentrate materially improve project payback?
    evidenceToGather: Mass balances on fats, oils, and proteins plus conversations with renderers or waste haulers.
