problem: >-
  保荐银行和跨境金融科技公司随着新支付流、新地区和新欺诈模式的出现，需要持续调整
  交易监控规则、名单阈值和调查操作手册。难题不再是发明新的风险评分，而是在规则变更
  或 AI 建议上线前证明其安全可行——否则就会让分析师淹没在误报中，或在 AML 检查时
  失守。如今这套发布流程依然散落在电子表格、SQL 回测、Jira 票据和委员会 PPT 里，
  合规负责人要么把变更拖得很慢，要么接受审计风险。
targetUser:
  primary: >-
    美国保荐银行或 BaaS 银行的 AML 运营主管或金融犯罪模型治理负责人，
    需监管多个金融科技项目的合规工作。
  secondary: 负责规则变更审批的金融犯罪 QA 经理和模型风险分析师。
  buyer: 首席合规官、金融犯罪主管或嵌入式金融风险业务负责人。
startupThesis:
  nonObviousInsight: >-
    金融犯罪团队已有交易监控、筛查和案件管理工具；新的瓶颈是 AI 辅助决策的受控
    变更管理。随着可解释 AI 渗入规则优化和审计就绪工作流，胜出者不是检测能力最强的，
    而是让合规负责人能以产品速度发布、解释并捍卫每一次调优变更的系统。
  beachhead: >-
    运营 5–20 个金融科技项目的美国保荐银行和持牌 BaaS 银行——其 AML 团队需要在
    保荐银行和监管机构的双重审查下，频繁审批 ACH、卡、RTP 和跨境支付流的
    规则和阈值变更。
  wedge: >-
    一个 AML 发布治理工作台：回放历史告警，模拟误报率和分析师负载影响，
    解释每条阈值或 AI 建议，并自动生成面向模型风险委员会、审计机构和
    保荐银行审查的审批包。
  whyNowCatalyst: >-
    Flagright 围绕可解释 AI、规则优化和审计就绪工作流的融资，标志着金融犯罪预算
    正从静态监控工具转向可在检查中站得住脚的有治理运营软件。
  ventureScalePath: >-
    从保荐银行项目的交易监控和名单规则发布起步，逐步扩展至制裁调优、
    告警分类 QA、调查员副驾驶、SAR 支撑证据、金融科技项目基准测试，
    最终成为银行、金融科技公司和托管服务商的完整金融犯罪控制系统。
solution: >-
  产品架构在银行现有交易监控和筛查系统之上，而非取而代之。它接入历史告警、
  案件结果、升级记录和规则版本，搭建受控沙箱，让合规团队在上线前测试阈值变更、
  新的 AI 解释层或修订版调查操作手册。针对每个拟议变更，系统估算告警量影响、
  呈现哪些客户或支付细分会受影响，并生成包含决策依据、审阅人和引用先例案件的
  证据链。审批通过后，系统将变更日志、监控清单和审查就绪包发布到合规、模型风险
  和内部审计已在使用的系统中。随着时间推移，公司将成为告诉机构"哪些金融犯罪变更
  真正降低了噪音而不削弱控制"的发布层。
goToMarketSeed:
  firstCustomer: >-
    一家运营 5–20 个嵌入式金融项目、已有 Actimize、Hawk 或 Sardine 等 AML 供应商、
    且每月有一批与新支付产品或金融科技上线挂钩的规则或阈值变更任务的
    美国保荐银行或 BaaS 银行。
  buyingTrigger: >-
    某个新金融科技项目、支付通道或地区带来一波告警调优任务，恰逢银行准备接受
    保荐银行审查、监管检查或内部模型风险委员会。
  currentAlternative: 传统交易监控平台加电子表格、SQL 回测、Jira 票据和人工模型风险审查委员会。
  switchingReason: >-
    切入点不要求团队替换现有 AML 系统；它缩短的是最痛苦的最后一英里——展示
    前后对比影响、保留可解释性，把每次发布变成一个审计就绪的制品包。
  pricingHypothesis: >-
    按受治理项目数量、监控规则族和已审批发布数量计费的年度平台订阅，
    初始约 $60k–$180k ARR，另加付费实施和检查支持模块。
