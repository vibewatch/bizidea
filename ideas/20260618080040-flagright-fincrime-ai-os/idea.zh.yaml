differentiator: >-
  现有 AML 套件优化检测，咨询公司事后帮助整理控制文档，但没有人真正拥有二者之间
  的受治理发布工作流。这家公司专门服务于合规团队想要变更规则、提示词、阈值或审查
  策略、并在上线前必须证明下游影响的那个关键时刻。其防御力来自历史告警结果语料库、
  跨支付项目原型的发布基准，以及把每个决策与案件、审阅人和审查制品关联起来的
  机构专属证据图谱。
