jobsToBeDone:
  - job: >-
      当我们上线新金融科技项目或支付通道时，帮 AML 团队快速测试并审批规则变更，
      让我们可以按时上线，不产生告警积压或审查异常。
    currentAlternative: 电子表格审批包、SQL 回测、AML 供应商仪表板和委员会会议。
    successMetric: 从规则变更提案到审批通过生产发布的天数，以及上线后的误报率。
  - job: >-
      当审计人员或保荐银行审查方询问 AML 阈值为何变更时，帮合规和模型风险团队
      提供一份有引用出处的决策记录，让他们无需从多个系统重新拼凑证据就能
      捍卫这次发布。
    currentAlternative: Jira 历史记录、分析师备注、邮件审批和手工拼装的审查活页夹。
    successMetric: 生成审查包所需时间，以及有完整决策依据和审阅人历史的发布比例。
