topRisks:
  - name: 现有厂商捆绑销售
    description: 现有 AML 平台可能将基本的发布模拟或审批日志功能捆绑入现有合同。
    mitigation: 掌控跨系统工作流、检查打包和跨多个供应商及委员会的基准数据集，而不只覆盖单一监控引擎。
  - name: 历史标注数据不足
    description: 部分银行可能缺乏干净的案件结果和版本历史，早期会削弱模拟质量。
    mitigation: 先从确定性回放、审阅人工作流和有限的高频规则族起步，待数据改善后再叠加更丰富的影响模型。
  - name: 监管保守主义
    description: 合规负责人可能对在检查敏感工作流中信任 AI 辅助发布建议持保留态度。
    mitigation: 保持人工审批，公开每条建议背后的引用证据，并将产品首先定位为治理软件而非自主决策工具。
