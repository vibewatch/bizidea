    competitiveRivalry:
      score: 4
      rationale: "Adjacent vendors already market AI-native AML, overlays, audit-ready case management, and FRAML bundles, even if the direct release-governance niche is less explicit."
      sourceRefs: [16, 58, 23, 22, 71]
  pestle:
    - factor: political
      impact: neutral
      point: "Regulators still support responsible bank-fintech innovation, but sponsor-bank oversight is measurably tighter than it was before the 2024 disruptions."
      sourceRefs: [9, 3]
    - factor: economic
      impact: positive
      point: "Broader AML and financial-crime-compliance spending is still growing, which helps buyers justify workflow automation if it reduces manual control costs."
      sourceRefs: [75, 76]
    - factor: social
      impact: positive
      point: "Trust in opaque AI is low inside compliance teams, which makes explainability and human oversight a feature rather than a burden."
      sourceRefs: [13, 18]
    - factor: technological
      impact: positive
      point: "Overlay AI, backtesting, agentic investigation, and unified case-management capabilities are now mature enough to support a release-governance layer."
      sourceRefs: [58, 24, 22, 71]
    - factor: legal
      impact: negative
      point: "Daily reconciliation, third-party risk management, and model-risk expectations mean the product enters a high-documentation, exam-sensitive environment."
      sourceRefs: [12, 2, 4, 1]
  adoptionFrictionMatrix:
    - friction: "Fragmented rule-version, alert, and case-history data across incumbent systems"
      severity: high
      affectedBuyer: "AML operations leader and data engineering partner"
      mitigation: "Start with read-only ingestion, narrow rule families, and a standardized release packet before full replay automation."
      sourceRefs: [5, 19, 24]
    - friction: "Model-risk and audit skepticism toward AI-assisted recommendations"
      severity: high
      affectedBuyer: "Chief Compliance Officer and model-risk lead"
      mitigation: "Keep humans in the approval loop and expose evidence, rationale, and versioned audit logs on every recommendation."
      sourceRefs: [2, 13, 17, 18]
    - friction: "Institutional preference to buy from existing AML vendors"
      severity: medium
      affectedBuyer: "Head of financial crime or CIO"
      mitigation: "Position as a neutral governance layer that improves current systems rather than replacing them."
      sourceRefs: [58, 24, 71]
    - friction: "Small concentrated buyer universe with long procurement cycles"
      severity: medium
      affectedBuyer: "Bank executive sponsor"
      mitigation: "Lead with remediation, new-program launches, and committee bottlenecks where urgency is already budgeted."
      sourceRefs: [9, 19, 80]
market:
  tam:
    value: "$12.0M"
    rationale: "Model the core U.S. wedge as roughly 80 institutions: 65 U.S.-chartered commercial banks above the Fed's $30B model-risk relevance threshold plus about 20 truly active sponsor banks, less an overlap adjustment of five. That is under 2% of the 4,278 FDIC-insured institutions reported in Q1 2026; 80 x est. $150k ARR = $12.0M."
    isEstimate: true
    sourceRefs: [80, 20, 6]
  sam:
    value: "$6.8M"
    rationale: "Narrow to about 45 sponsor banks and fintech-heavy banks where third-party deposit oversight, reconciliation burden, and recurring partner launches make release governance acute; 45 x est. $150k ARR = $6.75M."
    isEstimate: true
    sourceRefs: [9, 1, 5, 19, 80]
  som:
    value: "$3.0M"
    rationale: "Reach 20 institutions by year 3 through direct sponsor-bank sales, AML advisory partners, and overlay-friendly vendor integrations; 20 x est. $150k ARR = $3.0M."
    isEstimate: true
    sourceRefs: [19, 58, 71]
