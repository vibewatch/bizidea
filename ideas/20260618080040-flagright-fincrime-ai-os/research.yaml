    wedge: "AI-native fincrime platform spanning transaction monitoring, screening, risk scoring, case management, AI forensics, and governance workflows."
    pricing: "Custom enterprise quote; public product pages do not show list pricing."
    strength: "Strong unified positioning around explainable AI, governance workflows, and rapid deployment into modern fintech stacks."
    weaknessVsUs: "Still positioned as an end-to-end monitoring and investigation platform rather than a neutral release-governance layer above existing AML systems."
    sourceRefs: [16, 7, 57]
  - name: "Hawk"
    stage: scale-up
    wedge: "Explainable AML AI overlay plus unified case management for banks that want better detection without replacing the core system."
    pricing: "Custom enterprise quote."
    strength: "Clear overlay message, false-positive reduction claim, and modern case-management experience fit banks that want incremental change."
    weaknessVsUs: "The center of gravity is alert scoring and investigations, not committee release simulation and approval packet generation."
    sourceRefs: [58, 70, 69]
  - name: "Unit21"
    stage: scale-up
    wedge: "Unified AML platform with configurable rules, AI recommendations, historical backtesting, and audit-ready case management."
    pricing: "Custom enterprise quote."
    strength: "Backtesting and audit-ready investigation workflows overlap most directly with the proposed replay-and-governance motion."
    weaknessVsUs: "Unit21 still aims to be the monitoring system itself, which weakens its neutrality as a cross-vendor governance layer."
    sourceRefs: [24, 23]
  - name: "Sardine"
    stage: scale-up
    wedge: "Agentic AML operations spanning sanctions, monitoring, due diligence, and SAR drafting with defensible audit trails."
    pricing: "Custom enterprise quote."
    strength: "Strong automation narrative around clearing queues and accelerating investigations makes it a compelling workflow competitor."
    weaknessVsUs: "Focuses on triage and investigation throughput more than pre-release governance, historical replay, and committee sign-off."
    sourceRefs: [22]
  - name: "NICE Actimize"
    stage: incumbent
    wedge: "End-to-end AML and FRAML suite for regional, community, and enterprise institutions."
    pricing: "Custom enterprise quote."
    strength: "Large installed base and broad financial-crime automation make it the default incumbent in many bank procurement cycles."
    weaknessVsUs: "Its incentive is to keep governance inside the NICE stack rather than provide a vendor-neutral release layer across mixed environments."
    sourceRefs: [71]
regulatoryTechnicalConstraints:
  - point: "If the product touches deposit-program release evidence, banks will expect daily-reconciliation-friendly data, beneficiary traceability, and direct access to third-party records."
    sourceRefs: [1, 10]
  - point: "Any AI recommendation in AML change control must support human oversight and model-risk governance rather than autonomous release decisions."
    sourceRefs: [2, 13, 17, 18]
  - point: "Historical replay quality depends on clean transaction IDs, case outcomes, and version history from incumbent engines and partner-bank data feeds."
    sourceRefs: [5, 19, 24]
validationSignals:
