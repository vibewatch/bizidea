    sourceRefs: [16, 106]
  - point: "Hawk, Unit21, Sardine, and NICE all market overlays, agentic investigations, or unified case-management layers, showing banks are already buying AI workflow software before full core replacement."
    sourceRefs: [58, 23, 22, 71]
  - point: "FDIC, OCC, and FinCEN guidance is forcing banks toward tighter third-party controls, risk-based AML programs, and better recordkeeping."
    sourceRefs: [12, 3, 1, 10]
  - point: "Lithic says sponsor-bank selection often runs through 5-10 bank RFPs and migrations are complex, showing the operational pain is real and budget-relevant."
    sourceRefs: [19]
openQuestions:
  - "How many U.S. sponsor and BaaS banks maintain a monthly rule-change queue large enough to justify dedicated release-governance software rather than consulting or internal analytics?"
  - "Will model-risk teams classify AI-assisted rule recommendations as model changes requiring full validation, or accept them first as workflow tooling with human sign-off?"
  - "How clean is the average bank's rule-version and case-outcome history for phase-one replay, especially when the incumbent stack spans multiple vendors?"
  - "Can the startup integrate with enough incumbent AML systems quickly enough to avoid becoming a services-heavy project?"
