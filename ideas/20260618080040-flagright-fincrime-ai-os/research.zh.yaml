  fiveForces:
    supplierPower:
      score: 4
      rationale: "集成依赖、保荐银行数据访问和监管依赖足够集中，产品若得不到现有系统和银行管控负责人的配合，就赢不了市场。"
      sourceRefs: [4, 5, 19, 80]
    buyerPower:
      score: 4
      rationale: "买方池子小且经验丰富，许多机构随时可以退回人工委员会、现有 AML 套件或内部分析团队。"
      sourceRefs: [19, 80, 6, 71]
    threatOfEntrants:
      score: 3
      rationale: "工作流在技术上可复制，但在银行环境中赢得信任、完成历史数据映射、建立审计公信力都需要时间。"
      sourceRefs: [2, 13, 5, 58]
    threatOfSubstitutes:
      score: 5
      rationale: "默认替代方案仍是电子表格、SQL 回测、Jira、人工证据包，或在现有 AML 系统上叠加新模块。"
      sourceRefs: [5, 19, 58, 24, 71]
    competitiveRivalry:
      score: 4
      rationale: "周边厂商已在主推 AI 原生 AML、叠加层、审计就绪案例管理和 FRAML 捆绑，即便直接的发布治理细分市场定位尚不明确。"
      sourceRefs: [16, 58, 23, 22, 71]
  pestle:
  - factor: political
    impact: neutral
    point: "监管机构仍支持负责任的银行—金融科技创新，但保荐银行监管可见度在 2024 年以来明显收紧。"
    sourceRefs: [9, 3]
  - factor: economic
    impact: positive
    point: "AML 和金融犯罪合规支出整体仍在增长，如果产品能降低人工管控成本，买方就有理由为工作流自动化付费。"
    sourceRefs: [75, 76]
  - factor: social
    impact: positive
    point: "合规团队对不透明 AI 的信任度较低，可解释性和人工监督因此成为产品特性，而非负担。"
    sourceRefs: [13, 18]
  - factor: technological
    impact: positive
    point: "叠加 AI、回测、代理调查和统一案例管理能力已经足够成熟，可以支撑发布治理层的构建。"
    sourceRefs: [58, 24, 22, 71]
  - factor: legal
    impact: negative
    point: "日常对账、第三方风险管理和模型风险预期，意味着产品进入的是一个高文档要求、对审查高度敏感的环境。"
    sourceRefs: [12, 2, 4, 1]
  adoptionFrictionMatrix:
  - friction: "现有系统中规则版本、告警和案例历史数据碎片化"
    severity: high
    affectedBuyer: "AML 运营负责人和数据工程团队"
    mitigation: "从只读摄取入手，聚焦窄范围规则族和标准化发布包，待全量回放自动化再推进。"
    sourceRefs: [5, 19, 24]
  - friction: "模型风险和审计对 AI 辅助建议的疑虑"
    severity: high
    affectedBuyer: "首席合规官和模型风险负责人"
    mitigation: "保留人工审批环节，在每条建议上暴露证据、理由和版本化审计日志。"
    sourceRefs: [2, 13, 17, 18]
  - friction: "机构倾向于从现有 AML 厂商采购"
    severity: medium
    affectedBuyer: "金融犯罪负责人或 CIO"
    mitigation: "定位为中立治理层，强调改善现有系统而非取而代之。"
    sourceRefs: [58, 24, 71]
  - friction: "买方宇宙小且集中，采购周期漫长"
    severity: medium
    affectedBuyer: "银行执行层赞助人"
    mitigation: "从整改项目、新项目启动和委员会瓶颈入手，在紧迫性已经有预算的地方先打。"
    sourceRefs: [9, 19, 80]
market:
  tam:
    value: "$12.0M"
    rationale: "将美国核心楔形市场估算为约 80 家机构：65 家资产超过美联储 $30B 模型风险门槛的美国特许商业银行，加上约 20 家真正活跃的保荐银行，减去 5 家重叠。约 80 家占 2026 年第一季度 FDIC 投保机构总数 4,278 家的不到 2%；80 × 估算 $150k ARR = $12.0M。"
    isEstimate: true
    sourceRefs: [80, 20, 6]
  sam:
    value: "$6.8M"
    rationale: "收窄至约 45 家保荐银行和金融科技重仓银行，第三方存款监管、对账负担和频繁的合作方上线使发布治理需求最为迫切；45 × 估算 $150k ARR = $6.75M。"
    isEstimate: true
    sourceRefs: [9, 1, 5, 19, 80]
  som:
    value: "$3.0M"
    rationale: "通过直销保荐银行、AML 咨询伙伴和叠加友好型厂商集成，在第 3 年触达 20 家机构；20 × 估算 $150k ARR = $3.0M。"
    isEstimate: true
    sourceRefs: [19, 58, 71]
