assumptions:
  - id: A1
    name: 初始生产客户数
    value: "0"
    unit: count
    source: "[BP executive summary — product in pre-revenue stage at model start]"
  - id: A2
    name: 每次试点费用
    value: "36"
    unit: kUSD one-time
    source: "[BP investorMemo.firstCustomer — $25k-$50k paid pilot; $36k midpoint recognised over 3 months at $12k/month]"
  - id: A3
    name: 首个付费试点月份
    value: "6"
    unit: month of model
    source: "[BP experimentRoadmap 90-180 day horizon for first paid pilot; M6 is conservative start allowing 5 months of product build and discovery]"
  - id: A4
    name: 第一年年度 SaaS ARPU
    value: "90"
    unit: kUSD per year
    source: "[BP pricing — $60k-$180k ARR production; $90k conservative entry for first-cohort sponsor banks]"
  - id: A5
    name: 第二年年度 SaaS ARPU
    value: "120"
    unit: kUSD per year
    source: "[BP expansionLevers — multi-rule-family and module upsell creates 33% step-up from Y1 base]"
  - id: A6
    name: 第三年年度 SaaS ARPU
    value: "150"
    unit: kUSD per year
    source: "[research.yaml market.som — $3M SOM from 20 institutions implies $150k ARR each; matches BP market model]"
  - id: A7
    name: 试点转化为生产的转化率
    value: "67"
    unit: percent
    source: "[BP gtm.funnelTargets — paid pilot to annual production 50%+; 67% base case above 50% kill-criteria floor]"
  - id: A8
    name: 目标毛利率
    value: "70"
    unit: percent
    source: "[BP businessModel.targetGrossMarginPct = 70]"
  - id: A9
    name: 第一年综合 COGS 率
    value: "32"
    unit: percent of revenue
    source: "[Implementation-heavy pilot phase adds ~5pp COGS above steady-state; converges to 28% by Y3 as SaaS mix rises]"
  - id: A10
    name: 年度客户流失率
    value: "10"
    unit: percent
    source: "[Enterprise compliance SaaS heuristic — governance workflow tools embedded in audit cycles churn 8-15% annually; 10% is base]"
  - id: A11
    name: Pre-seed 融资金额
    value: "3000"
    unit: kUSD
    source: "[BP fundingAsk — $2-4M range; $3M midpoint used as starting cash at M0]"
  - id: A12
    name: 创始人/CEO 基础薪资
    value: "180"
    unit: kUSD per year
    source: "[Below-market operator heuristic for pre-seed fintech founder taking equity upside circa 2026]"
  - id: A13
    name: 创始工程师基础薪资
    value: "180"
    unit: kUSD per year
    source: "[Senior engineer rate in fintech regulatory infrastructure circa 2026]"
  - id: A14
    name: AML 解决方案负责人基础薪资
    value: "160"
    unit: kUSD per year
    source: "[BP team — compliance and sponsor-bank domain specialist; equity-discounted below market; joins M3]"
  - id: A15
    name: 数据与集成工程师基础薪资
    value: "150"
    unit: kUSD per year
    source: "[Mid-level data engineer in financial services; joins M4 per BP team timing]"
  - id: A16
    name: 产品负责人基础薪资
    value: "160"
    unit: kUSD per year
    source: "[BP team — joins M9; enterprise SaaS product lead market rate]"
  - id: A17
    name: GTM 负责人基础薪资
    value: "150"
    unit: kUSD per year
    source: "[BP team — joins M12; early commercial hire with meaningful equity component]"
  - id: A18
    name: 福利和工资税附加率
    value: "25"
    unit: percent of base salary
    source: "[Standard startup benefits heuristic — health insurance, 401k match, payroll taxes circa 2026]"
  - id: A19
    name: 非薪资运营费用
    value: "5"
    unit: kUSD per month at model start
    source: "[Cloud infra $2k plus legal/compliance $2k plus tools $1k; grows to ~$15k/month by Q4Y3 with team and customer scale]"
  - id: A20
    name: 第三年生产客户目标数
    value: "20"
    unit: count
    source: "[BP milestones 24-36 months — approach year-3 SOM through roughly 20 production institutions; research.yaml market.som]"
  - id: A21
    name: 第二年净新增生产客户数
    value: "8"
    unit: count
    source: "[BP milestones 12-24 months — 8-12 production customers; 8 conservative net adds on top of 2 carried from Y1]"
  - id: A22
    name: 第三年净新增生产客户数
    value: "10"
    unit: count
    source: "[BP milestones 24-36 months — reach 20 institutions; 10 net adds from base of 10 at Y2 end]"
  - id: A23
    name: 第三年综合 CAC
    value: "43"
    unit: kUSD
    source: "[Estimated Y3 S&M spend ~$430k divided by 10 new customers; founder-led plus GTM lead plus advisory referrals per BP channels]"
  - id: A24
    name: 后续种子轮融资时间
    value: "M18-M24"
    unit: month of model
    source: "[BP fundingAsk.runwayMonths = 18; seed of ~$5M assumed necessary to sustain post-Y1 growth but not modelled in cash — flagged in sanityChecks]"
  - id: A25
    name: 第三年毛利率
    value: "72"
    unit: percent
    source: "[A8 target 70% improved slightly by SaaS mix shift as fewer implementation-heavy pilots are required per production customer base in Y3]"

