modelDiagram:
  title: 单位经济模型流转
  mermaid: |
    flowchart LR
      Discovery[Sponsor Bank Discovery] --> Pilot[Paid Pilot $36k]
      Pilot --> Replay[Replay and Packet Delivery]
      Replay --> Committee[Committee Sign-off]
      Committee --> AnnualSub[Annual SaaS $90-150k ARR]
      AnnualSub --> Revenue[Revenue]
      Revenue --> COGS[COGS 28-32pct]
      Revenue --> GrossProfit[Gross Profit 68-72pct]
      GrossProfit --> Opex[Opex S-and-M plus R-and-D plus G-and-A]
      Opex --> EBITDA[EBITDA]
      EBITDA --> Cash[Cash Runway]
      AnnualSub --> Expansion[Expansion: more programs and rule families]
      Expansion --> AnnualSub

modelSanity:
  - checkName: 收入引擎
    finding: >-
      基准情形收入由第三年末 20 家生产客户驱动，每家支付 $150k ARR，均通过
      $36k 付费试点以 67% 转化率进入，SaaS 收入从第一年到第二年增长 7 倍——
      随着试点转化加速和通过模块增购推高 ARPU。
  - checkName: 必须成立的假设
    finding: >-
      试点到生产转化率必须维持在 50% 或以上（BP 红线），要求目标保荐银行能提供
      干净的规则版本和告警历史数据，使回放包在启动后 30 天内可信交付。
  - checkName: 模型崩溃条件
    finding: >-
      若试点转化率降至 40%（悲观情形），第三年现金降至约 $250k，公司需在第四年前
      获得过桥或种子融资——因为 $1.56M 第三年收入无法覆盖 10 名全职员工超过 $2M
      的运营支出。
  - checkName: 下一轮融资证明
    finding: >-
      第二年达到 8 家生产客户、年留存率 80% 以上、并有 30 天部署记录，足以支持
      约 $5M 种子轮，加速从 10 家扩展至 30 家以上机构，并拓展相邻金融犯罪
      控制工作流。

sanityChecks:
  ruleOf40: "第三年 ARR 增长率 150%（从 10 家到 20 家客户，ARPU 更高）+ 第三年 EBITDA 利润率 -10.8% = 139.2（远高于 40；受第二年基数偏低影响数字虚高）"
  burnMultiple: "第二年烧钱倍数 0.92x（烧掉 $885k / 新增 ARR $960k）；第三年烧钱倍数 0.18x（烧掉 $277k / 新增 ARR $1.5M）——试点转化后资本效率极佳"
  revenuePerFte: "$257k 第三年均值（平均 10 名全职员工；在 $200k–$400k SaaS 基准范围内）"
  flags:
