    description: >-
      试点转化率因数据就绪度问题和目标银行入驻缓慢而降至 40%，第三年生产客户
      限制在 12 家，精简招聘维持在最多 10 名全职员工。
    y3RevenueK: 1560.0
    y3EbitdaK: -800.0
    cashLowPointK: 250.0
    keyAssumptionChanges:
      - "试点到生产转化率 40%（基准 67%）"
      - "因数据质量问题入驻时间延至 60 天以上（基准 30 天）"
      - "第三年末生产客户 12 家（基准 20 家）"
      - "精简招聘全程维持在最多 10 名全职员工"
  base:
    description: >-
      67% 试点转化率，30 天部署窗口，ARPU 通过项目扩展从 $90k 增至 $150k，
      第三年末 20 家生产客户，基于 $3M pre-seed，未建模后续融资。
    y3RevenueK: 2573.0
    y3EbitdaK: -277.0
    cashLowPointK: 1056.0
    keyAssumptionChanges:
      - "67% 试点到生产转化率（A7）"
      - "30 天部署窗口（BP product.sixMonth 里程碑）"
      - "第三年末综合 ARPU $150k（A6）"
      - "第三年末 20 家生产客户（A20）"
  upside:
    description: >-
      顾问渠道贡献 50% 合格管道，ARPU 通过基准测试和检查支持模块扩展至 $175k，
      第三年末 28 家客户，第三年 EBITDA 转正。
    y3RevenueK: 3850.0
    y3EbitdaK: 310.0
    cashLowPointK: 900.0
    keyAssumptionChanges:
      - "顾问渠道和集成伙伴贡献 50% 合格管道"
      - "通过基准测试和检查支持模块 ARPU 增至 $175k"
      - "第三年末 28 家生产客户"
      - "第三年 EBITDA 转正，收入规模超过招聘速度"

