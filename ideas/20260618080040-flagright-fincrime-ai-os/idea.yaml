problem: >-
  Sponsor banks and cross-border fintechs constantly retune transaction-monitoring rules,
  watchlist thresholds, and investigation playbooks as new payment flows, geographies, and fraud
  patterns appear. The hard part is no longer inventing another risk score; it is proving why a
  rule change or AI recommendation is safe before it floods analysts with false positives or fails
  an AML exam. Today that release process still lives in spreadsheets, SQL backtests, Jira tickets,
  and committee decks, so compliance leaders either ship changes too slowly or accept audit risk.
targetUser:
  primary: >-
    Head of AML operations or financial-crime model governance at a U.S. sponsor bank or BaaS bank
    overseeing multiple fintech programs.
  secondary: Fincrime QA managers and model-risk analysts responsible for rule-change approvals.
  buyer: Chief Compliance Officer, Head of Financial Crime, or GM of embedded-finance risk.
startupThesis:
  nonObviousInsight: >-
    Financial-crime teams already have transaction monitoring, screening, and case tools; the new
    bottleneck is governed change management for AI-assisted decisions. As explainable AI moves into
    rule optimization and audit-ready workflows, the winner is not the best detector but the system
    that lets compliance leaders ship, explain, and defend every tuning change at product speed.
  beachhead: >-
    U.S. sponsor banks and licensed BaaS banks running 5-20 fintech programs, where AML teams must
    approve frequent rule and threshold changes for ACH, card, RTP, and cross-border payment flows
    under sponsor-bank and regulator scrutiny.
  wedge: >-
    An AML release-governance workspace that replays historical alerts, simulates false-positive and
    analyst-load impact, explains each threshold or AI recommendation, and auto-generates approval
    packets for model-risk committees, auditors, and sponsor-bank reviews.
  whyNowCatalyst: >-
    Flagright's funding around explainable AI, rule optimization, and audit-ready workflows signals
    that financial-crime budgets are shifting from static monitoring tools toward governed
    operational software that can be defended in exams.
  ventureScalePath: >-
    Start with transaction-monitoring and watchlist rule releases for sponsor-bank programs, then
    expand into sanctions tuning, alert-triage QA, investigator copilots, SAR-support evidence,
    fintech-program benchmarking, and eventually a full financial-crime system of control for banks,
    fintechs, and managed-service providers.
solution: >-
  The product sits above the bank's existing transaction-monitoring and screening stack rather than
  replacing it. It ingests historical alerts, case outcomes, escalation notes, and rule versions,
  then creates a controlled sandbox where compliance teams can test a threshold change, a new AI
  explanation layer, or a revised investigation playbook before release. For every proposed change,
  it estimates alert-volume impact, surfaces which customer or payment segments would move, and
  builds an evidence trail showing the rationale, reviewers, and cited prior cases. Once approved,
  it publishes the change log, monitoring checklist, and exam-ready packet to the systems already
  used by compliance, model risk, and internal audit. Over time, the company becomes the release
  layer that tells institutions which fincrime changes actually reduce noise without weakening
  controls.
goToMarketSeed:
  firstCustomer: >-
    A U.S. sponsor bank or BaaS bank with 5-20 embedded-finance programs, an existing AML vendor
    such as Actimize, Hawk, or Sardine, and a monthly queue of rule or threshold changes tied to
    new payment products or fintech launches.
  buyingTrigger: >-
    A new fintech program, payment rail, or geography creates a burst of alert-tuning work just as
    the bank prepares for a sponsor-bank review, regulatory exam, or internal model-risk committee.
  currentAlternative: Legacy transaction-monitoring platforms plus spreadsheets, SQL backtests, Jira tickets, and manual model-risk review committees.
  switchingReason: >-
    The wedge does not ask teams to rip out their AML stack; it shortens the painful last mile by
    showing before-and-after impact, preserving explainability, and turning every release into an
    audit-ready artifact package.
  pricingHypothesis: >-
    Annual platform subscription priced by number of governed programs, monitored rule families, and
    approved releases, starting around $60k-$180k ARR with paid implementation and exam-support
    modules.
