jobsToBeDone:
  - job: >-
      When we launch a new fintech program or payment rail, help our AML team test and approve rule
      changes fast, so we can go live without creating an alert backlog or exam exception.
    currentAlternative: Spreadsheet sign-off packs, SQL backtests, AML-vendor dashboards, and committee meetings.
    successMetric: Days from proposed rule change to approved production release, plus false-positive rate after launch.
  - job: >-
      When auditors or sponsor-bank reviewers ask why an AML threshold changed, help our compliance
      and model-risk teams produce a cited decision record, so they can defend the release without
      reassembling evidence from multiple systems.
    currentAlternative: Jira histories, analyst notes, email approvals, and manually assembled exam binders.
    successMetric: Time to produce a review packet and percentage of releases with complete rationale and reviewer history.
ideaScorecard:
  signalStrength:
    score: 5
    rationale: Multiple fetched sources describe a well-funded shift toward explainable, audit-ready financial-crime workflows with concrete usage and ROI claims.
  painIntensity:
    score: 5
    rationale: Rule-release mistakes can create direct exam exposure, analyst overload, and delayed product launches for banks and fintech programs.
  wedgeClarity:
    score: 5
    rationale: Rule and threshold governance is a narrow recurring workflow with clear inputs, reviewers, outputs, and measurable time-to-release value.
  defensibility:
    score: 4
    rationale: Institution-specific evidence graphs and release-outcome benchmarks can compound, though AML incumbents could copy surface features over time.
  ventureScale:
    score: 5
