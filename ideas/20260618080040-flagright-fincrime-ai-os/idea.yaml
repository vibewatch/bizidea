topRisks:
  - name: Incumbent bundling
    description: Existing AML platforms could add basic release simulation or approval logging and bundle it into current contracts.
    mitigation: Own the cross-system workflow, exam packeting, and benchmark dataset that spans multiple vendors and committees rather than only one monitoring engine.
  - name: Thin historical labels
    description: Some banks may lack clean case outcomes and version history, which can weaken simulation quality early on.
    mitigation: Start with deterministic replay, reviewer workflows, and limited high-volume rule families before layering in richer impact models as data improves.
  - name: Regulatory conservatism
    description: Compliance leaders may hesitate to trust AI-assisted release recommendations in exam-sensitive workflows.
    mitigation: Keep humans in approval, expose cited evidence behind every recommendation, and position the product first as governance software rather than autonomous decisioning.
