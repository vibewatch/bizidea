modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Discovery[Sponsor Bank Discovery] --> Pilot[Paid Pilot $36k]
      Pilot --> Replay[Replay and Packet Delivery]
      Replay --> Committee[Committee Sign-off]
      Committee --> AnnualSub[Annual SaaS $90-150k ARR]
      AnnualSub --> Revenue[Revenue]
      Revenue --> COGS[COGS 28-32pct]
      Revenue --> GrossProfit[Gross Profit 68-72pct]
      GrossProfit --> Opex[Opex S-and-M plus R-and-D plus G-and-A]
      Opex --> EBITDA[EBITDA]
      EBITDA --> Cash[Cash Runway]
      AnnualSub --> Expansion[Expansion: more programs and rule families]
      Expansion --> AnnualSub

modelSanity:
  - checkName: Revenue engine
    finding: >-
      Base-case revenue is driven by 20 production customers paying $150k ARR
      by Y3 end, each entering through a $36k paid pilot that converts at 67%,
      with SaaS revenue growing 7x from Y1 to Y2 as pilot-to-production
      conversions ramp and ARPU expands through module upsell.
  - checkName: Must go right
    finding: >-
      Pilot-to-production conversion must stay at or above 50% (BP kill
      criteria), which requires target sponsor banks to provide clean
      rule-version and alert-history data enabling a credible replay packet
      within 30 days of kickoff.
  - checkName: Model breaks if
    finding: >-
      If pilot conversion falls to 40% (downside scenario), Y3 cash drops to
      approximately $250k and the company requires a bridge or seed round before
      Y4, as Y3 revenue of $1.56M cannot cover the $2M+ opex of a 10-FTE team.
  - checkName: Next-round proof
    finding: >-
      Reaching 8 production customers in Y2 with 80%+ annual retention and a
      documented 30-day deployment track record justifies a seed round of
      approximately $5M to accelerate from 10 to 30+ institutions and expand
      into adjacent fincrime control workflows.

sanityChecks:
  ruleOf40: "Y3 ARR growth 150% (10 to 20 customers at higher ARPU) + Y3 EBITDA margin -10.8% = 139.2 (well above 40; inflated by small Y2 base)"
  burnMultiple: "Y2 burn multiple 0.92x ($885k burned / $960k net new ARR); Y3 burn multiple 0.18x ($277k burned / $1.5M net new ARR) — excellent capital efficiency once pilots convert"
  revenuePerFte: "$257k Y3 average (avg 10 FTE; within $200-400k SaaS benchmark range)"
  flags:
    - "TAM is narrow ($12M US wedge); venture-scale requires expansion into adjacent fincrime workflows and eventual international markets not yet modelled"
    - "20-customer concentration at Y3 end means 2-3 churned accounts represent 10-15% revenue risk; no enterprise contract floor modelled"
    - "Data readiness at target sponsor banks is the single largest onboarding risk; if more than half of pilots require bespoke data engineering, COGS will exceed 40% and gross margin will miss the 70% target"
    - "No follow-on raise modelled in the 3-year cash flow; a seed round of approximately $5M will be needed around M18-M24 to sustain growth past 20 customers — without it cash reaches a low of $1.1M at Y3 end with thin margin for error"
    - "Y1 revenue of $138k is pre-revenue for practical purposes; the model depends entirely on the assumption that 3 paid pilots can be closed in M6-M9 with no prior reference customer"
    - "Rule replay credibility depends on historical alert and case data from incumbent AML systems; if clean data is unavailable in the first 2-3 accounts the onboarding thesis breaks before the model can be validated"
