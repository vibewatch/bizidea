scenarios:
  downside:
    description: >-
      Pilot conversion drops to 40% due to data readiness issues and slow
      onboarding at target banks, limiting Y3 to 12 production customers with
      lean hiring held at 10 FTE.
    y3RevenueK: 1560.0
    y3EbitdaK: -800.0
    cashLowPointK: 250.0
    keyAssumptionChanges:
      - "Pilot-to-production conversion 40% (vs 67% base)"
      - "Onboarding takes 60+ days instead of 30 due to data quality gaps"
      - "12 production customers by Y3 end (vs 20)"
      - "Lean hiring holds at 10 FTE maximum through Y3"
  base:
    description: >-
      67% pilot conversion, 30-day deployment window, ARPU growing from $90k to
      $150k through program expansion, and 20 production customers by Y3 end on
      $3M pre-seed with no modelled follow-on raise.
    y3RevenueK: 2573.0
    y3EbitdaK: -277.0
    cashLowPointK: 1056.0
    keyAssumptionChanges:
      - "67% pilot-to-production conversion rate (A7)"
      - "30-day deployment window per BP product.sixMonth milestone"
      - "$150k blended ARPU by Y3 end (A6)"
      - "20 production customers by Y3 end (A20)"
  upside:
    description: >-
      Advisory channel sources 50% of qualified pipeline, ARPU expands to $175k
      through benchmarking and exam-support modules, and 28 customers by Y3 end
      with Y3 EBITDA turning positive.
    y3RevenueK: 3850.0
    y3EbitdaK: 310.0
    cashLowPointK: 900.0
    keyAssumptionChanges:
      - "Advisory channel and integration partners source 50% of qualified pipeline"
      - "ARPU grows to $175k through benchmarking and exam-support modules"
      - "28 production customers by Y3 end"
      - "Y3 EBITDA positive as revenue scale outpaces hiring"

