  validationPlan:
  - priority: 高
    question: 轨道电力供给方会向运营方开放怎样的商业定价、SLA 和预订原语？
    evidenceToGather: 拿到面向客户的 试点 合同、演示 预订工作流，以及供给方 API 或运营文档。
  - priority: 高
    question: 对一个代表性的 EO 星座来说，额外电力到底能带来多少增量成像、推理或下行价值？
    evidenceToGather: 拿到一个共创客户星座模型，覆盖任务历史、日蚀约束和任务毛利数据。
  - priority: 中
    question: 运营方会不会信任第三方优化器进入贴近飞行的规划闭环？
    evidenceToGather: 拿到安全评审记录、影子模式 试点 结果和运营方签字标准。
