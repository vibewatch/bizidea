reportMemo:
  executiveTakeaways:
  - Star Catcher 已把轨道电力从“科学项目”叙事，往近期开采购的现实问题上推：它拿到了一轮大额 Series A，展示了无需改装的波束供电，签下了 购电协议，并正瞄准一次在轨演示。
  - 滩头买家真实存在，但很窄：EO 和 ISR 运营方本来就在卖速度、重访和分析，因此只有当突发任务或星上处理场景的任务价值足够明确时，增量电力才最值钱。
  - 竞争更像替代品之争，而不是正面冲突。通用地面软件套件、自动化创业公司和垂直一体化运营商都在打相邻流程痛点，但目前看，还没人真正占住“中立电力预订 + 任务产出结算”这一层。
  - 这家创业公司最大的风险来自外部：供给方落地节奏、不清楚的波束供电定价 / SLA，以及进入贴近飞行的规划闭环所需要的漫长信任建立。
  marketDefinition: 这类软件用来预测轨道电力需求、预订外部波束供电窗口、重排任务优先级，并结算其对 EO 与 ISR 星座任务产出的影响。它夹在轨道电力供给方和通用 任务运营 栈之间，而不是和供电硬件本身竞争。
  customerAndBuyer: 主要用户是 EO / ISR 星座运营商里的 任务运营、规划和 chief architect 团队；他们本来就在管理跨时段任务下达、电池约束和客户 SLA。真正掏钱的是掌握星座 uptime、紧急采集毛利和客户交付风险的运营或项目负责人。
  buyingTriggers:
  - point: 某个星座签下试点购电协议或演示合作，需要一套安全流程来判断什么时候该消耗外部电力。
    sourceRefs:
    - 1
    - 7
    - 9
  - point: 国防或主权客户开始为快速重访和低时延 ISR 付费，使每一次额外成像或下行窗口的价值都上升。
    sourceRefs:
    - 14
    - 15
    - 18
    - 20
  - point: 运营方开始把星上 AI、SAR 或更重的分析工作负载叠到本就功率紧张的卫星上，尤其在峰值运营时段。
    sourceRefs:
    - 3
    - 12
    - 18
    - 24
  willingnessToPay:
    summary: 公开资料没有披露波束供电价目表，但付费意愿已经能看见：Star Catcher 说自己签下了 购电协议；BlackSky 在卖合同保障接入；Capella 在工作流里直接展示预估 任务下达 成本；EO 买家也越来越习惯采购“硬件 + 软件 + 商业数据”的打包方案。这说明，只要软件能证明任务提升，而不是只给一个通用 看板，预算就能挤出来。
    sourceRefs:
    - 1
    - 7
    - 15
    - 17
    - 20
  competitiveLandscape: 今天这个市场主要由替代品定义：现有 任务运营 套件、较新的自主化厂商、开源或自研控制栈，以及自己优化自家星座的垂直 EO 运营商。一个中立、可跨供给方的调度与结算层，目前基本还空着。
  incumbentThesis:
  - incumbentClass: 广谱任务运营套件
    point: 它们本来就覆盖 C2、排程和遥测，但公开资料看不出这些系统是围绕外部电力预订、供电窗口 仲裁或收入归因设计的。
    sourceRefs:
    - 25
    - 26
    - 27
  - incumbentClass: 自动化专长厂商
    point: AI 原生运营厂商能减少人工规划，但它们公开对外讲的是更广义的星座自动化，而不是围绕电力市场的专门编排。
    sourceRefs:
    - 28
    - 29
  - incumbentClass: 垂直 EO 运营商
    point: Planet、BlackSky、Capella 和 ICEYE 都在优化重访和交付，但它们先卖的是图像结果或主权能力，不是给第三方星座用的中立软件。
    sourceRefs:
    - 12
    - 14
    - 16
    - 18
  - incumbentClass: 开源与自研栈
    point: 这类方案依然有吸引力，因为运营方能以较低成本拼出灵活控制层，但集成、安全和经济性建模的负担也会重新压回客户自己身上。
    sourceRefs:
    - 25
    - 30
  regulatoryLandscape: 太空到太空的电力调度会落在一套现成政策栈里：遥感监管、国家对私人航天活动的责任，以及对新型商业任务的持续监管。软件层会继承运营方和供给方两边对安全、可审计性和授权控制的要求。
  technologyLandscape: 关键组件分别都已经存在：光学波束供电演示、面向电力约束的小卫星工程、云化 任务运营 平台，以及高频 EO 任务下达 系统。真正还缺的，是把 波束可用性、电池状态、任务优先级和商业结算跨星座连起来的中立控制平面。
  distributionChannels:
  - point: 和 Star Catcher、Loft，以及相邻的在轨计算或托管载荷伙伴一起联合销售。
    sourceRefs:
    - 1
    - 7
    - 8
  - point: 接入现有地面软件厂商，让产品先作为优化层落地，而不是上来就替换整套 运营栈。
    sourceRefs:
    - 25
