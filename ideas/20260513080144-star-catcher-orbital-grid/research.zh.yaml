  - case: 垂直运营商把电力优化留在内部
    impact: 如果大型 EO 星座更愿意用自研工具，这家公司可能得先从更小的星座或电力供给方切入。
    sourceRefs:
    - 12
    - 14
    - 17
  - case: 波束供电只在高紧迫度任务里才算得过账
    impact: 那客户群就会收缩到国防、主权 ISR 和少量突发采集场景，初始软件市场也会更小。
    sourceRefs:
