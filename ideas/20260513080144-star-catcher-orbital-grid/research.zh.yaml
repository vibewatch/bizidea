  - point: Loft 这类托管平台运营方，是切进已聚合多类高功耗载荷需求星座的早期通道。
    sourceRefs:
    - 7
  - point: 地面软件和数字孪生厂商既能做渠道，也能做集成伙伴，因为它们本来就嵌在规划流程里。
    sourceRefs:
