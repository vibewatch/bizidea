  - point: 轨道电力供给仍处于前规模化阶段，因此这家公司最终得依赖供给方兑现，而不只是软件侧有需求。
    sourceRefs:
    - 1
    - 3
    - 9
  - point: 人工和定制化运营根基很深，跨星座做标准化集成会慢。
    sourceRefs:
    - 25
    - 28
competitors:
- name: Lockheed Martin Ground Software
  stage: 现有厂商
  wedge: 面向小到大的星座，提供模块化的指挥、控制、任务规划和网络栈。
  pricing: 定制 / 按价值定价
  strength: 深厚的航天积累、网络安全能力，以及广泛的星座控制能力。
  weaknessVsUs: 并没有定位成面向商业 EO 运营商的中立外部电力预订与结算层。
  sourceRefs:
  - 25
  - 26
- name: Rocket Lab InterMission + MAX Constellation
  stage: 成长期
  wedge: 整合地面数据、航天器运营、数字孪生和星座软件。
  pricing: 定制 / 平台打包定价
  strength: 现代自主运行栈，并和成熟飞行软件、数字孪生工具深度绑定。
  weaknessVsUs: 公开定位是端到端任务软件，不是跨供给方的电力经济性或 ROI 归因。
  sourceRefs:
  - 27
- name: Antaris
  stage: 成长期
  wedge: 覆盖全生命周期的任务虚拟化、仿真、编排和指挥中心软件。
  pricing: 定制 SaaS / 平台定价
  strength: 很强的多厂商建模与编排故事。
  weaknessVsUs: 本质上仍是通用平台，没有公开聚焦“可购买轨道电力”的调度。
  sourceRefs:
  - 29
- name: Cognitive Space
  stage: 成长期
  wedge: 用 AI 驱动复杂卫星和星座运营自动化。
  pricing: 定制企业定价
  strength: 在“如何减少增长中星座的人工作业”这件事上，痛点贴得很准。
  weaknessVsUs: 公开材料强调的是广义自动化，不是外部供电窗口优化和结算。
  sourceRefs:
  - 28
- name: OpenC3 COSMOS
  stage: 成长期
  wedge: 从硬件测试一路延伸到星座运营的开源到企业级指挥与运营栈。
  pricing: 开源 + 企业版
  strength: 对偏好自研控制层的运营方来说，起步灵活、成本也低。
  weaknessVsUs: 把电力市场逻辑和经济性建模的工作都留给了客户自己。
  sourceRefs:
  - 30
regulatoryTechnicalConstraints:
- point: 新型商业航天活动仍落在不断演进的美国监管框架和基于条约的国家责任之下。
  sourceRefs:
  - 43
  - 44
  - 45
- point: 小卫星电力系统依旧受质量和体积强约束，尤其在日蚀期和峰值 duty operation 里更明显。
  sourceRefs:
  - 9
  - 24
- point: 地面与任务运营依然高度依赖 API、指令系统和通信流程之间的复杂集成。
  sourceRefs:
  - 25
  - 26
  - 27
- point: 国家安全场景会比标准商业 EO 工作流多出安全、主权和审批负担。
  sourceRefs:
  - 18
  - 19
  - 44
validationSignals:
- point: Star Catcher 在真实服务上线前就已披露 7 份 购电协议、多项政府合同和一条足够大的合格 销售管线。
  sourceRefs:
  - 1
  - 7
  - 9
- point: Payload 报道显示，主权客户越来越倾向于把软件和商业数据与硬件一起打包采购。
  sourceRefs:
  - 20
- point: BlackSky、Capella 和 ICEYE 都在卖快速重访、低时延或快速交付，这说明在紧急采集场景里，额外电力很可能真有价值。
  sourceRefs:
  - 14
  - 15
  - 17
  - 18
- point: Cognitive Space 和 NASA 都指出，人工卫星运营又慢又贵，而且随着 星座 变大越来越不适合继续沿用。
  sourceRefs:
  - 24
