  - 28
openQuestions:
- 波束供电时段真实的商业定价、SLA 和预订条款是什么？它们会随轨道和需求窗口波动到什么程度？
- 到 2027 年前，Star Catcher 或同行能不能把真实供电窗口做得足够频繁，从而 证明值不值y 专门调度系统，而不是只停留在仿真工具？
- 在第三方优化器能影响贴近飞行的 占空比 之前，运营方还需要多少信任建立和认证工作？
- 如果常态化运行太空到太空的光学供电服务，监管方或保险方会不会要求超出现有 任务运营 实践的新控制措施？
