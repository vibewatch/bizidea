problem: >-
  Satellite operators still plan missions around fixed battery and solar-array limits, so they routinely decline extra imaging,
  onboard inference, or urgent downlink tasks when peak power is unavailable. If optical power beaming becomes purchasable
  without retrofit, the new bottleneck shifts to deciding which satellite should buy energy, when to consume it, and whether
  the incremental mission output clears the cost. Today that tradeoff lives in spreadsheets, conservative flight rules, and
  manual mission-ops calls.
targetUser:
  primary: VP of Mission Operations or Chief Architect at a commercial Earth-observation smallsat constellation with 8-30 satellites
  secondary: Defense payload operators piloting surge-collection or onboard-processing missions on compatible satellite buses
  buyer: COO or VP of Operations at an Earth-observation constellation operator
startupThesis:
  nonObviousInsight: >-
    The breakthrough is not just more watts in orbit; it is the shift from power as a fixed spacecraft-design constraint to
    power as a schedulable network service. Once compatible satellites can buy incremental energy without hardware retrofit,
    the control point becomes the software layer that books, allocates, and settles power against mission revenue.
  beachhead: >-
    Power-window booking and mission-yield optimization for commercial Earth-observation constellations using third-party
    beamed power to run extra imaging, onboard inference, and high-rate downlink sessions during high-value events
  wedge: >-
    Orbital power dispatch OS that forecasts battery and payload demand, reserves external power windows, reprioritizes tasking,
    and attributes purchased energy to incremental image, inference, and downlink output
  whyNowCatalyst: >-
    Star Catcher's funding, no-retrofit compatibility claim, seven PPAs, and late-2026 demo timeline mean orbital power is
    moving from physics demo to commercial procurement problem right now.
  ventureScalePath: >-
    Start with EO constellations, then expand the same dispatch and settlement layer to communications satellites, in-space
    compute platforms, defense payloads, insurers, and eventually the market infrastructure that prices power availability
    across multiple orbital-energy providers.
solution: >-
  The product ingests ephemeris, battery state, payload duty cycles, imaging backlog, downlink windows, and available beamed
  power sessions to recommend when each satellite should buy external energy. It converts those recommendations into operator
  runbooks, provider booking requests, and mission-level ROI forecasts tied to specific customer SLAs or surge events. A
  settlement layer maps purchased power to incremental output such as additional images captured, inference jobs completed,
  or data downlinked, so operators can see whether power spend created profitable mission yield. Over time the platform learns
  fleet-specific power-response curves and becomes the system of record for orbital energy procurement and dispatch.
goToMarketSeed:
  firstCustomer: >-
    US or European operator of an 8-30 satellite optical or hyperspectral Earth-observation constellation planning its first
    high-power onboard inference or surge-collection program on standard solar-powered buses
  buyingTrigger: >-
    The operator signs a pilot power-purchase or demo agreement, or wins a defense or enterprise collection SLA that demands
    more nighttime or burst-capacity imaging than the current power budget supports
  currentAlternative: Mission-planning spreadsheets, conservative fixed duty-cycle rules in flight software, and manual trade studies with satellite OEMs
  switchingReason: >-
    It turns beamed power from an experimental capability into a quantified operational decision, showing exactly which power
    purchases lift mission yield and automating the booking and dispatch workflow that operators would otherwise manage by hand.
  pricingHypothesis: "$4k-$12k per satellite per month plus 5%-10% of managed power spend or incremental mission revenue"
