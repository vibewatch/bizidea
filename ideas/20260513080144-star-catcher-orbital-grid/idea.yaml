differentiator: >-
  This is not generic satellite mission-planning software and not a hardware bet on the power-beaming network itself. It is
  the orchestration and settlement layer for a new utility market in orbit, built around the specific economics of buying
  watts only when a mission spike justifies it. The defensible advantage comes from accumulating real data on beam-window
  availability, battery-response curves, payload uplift, and power-to-revenue conversion across multiple fleets and providers.
