jobsToBeDone:
  - job: When a high-value collection event spikes demand, help mission operators decide which satellites should buy extra power and how to use it, so they can capture more profitable imagery and data.
    currentAlternative: Manual spreadsheet tradeoffs plus conservative duty-cycle limits
    successMetric: Incremental revenue or mission output per dollar of purchased power
  - job: When piloting a new orbital-power agreement, help operations and finance teams forecast booked power windows and settle outcomes, so they can prove the contract should expand fleetwide.
    currentAlternative: Ad hoc mission reviews and offline cost attribution
    successMetric: Time to approve the next power purchase and gross margin uplift from powered missions
