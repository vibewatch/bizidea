topRisks:
  - name: Provider rollout slips
    description: If orbital power demonstrations or commercial service availability slip beyond 2026, customers may defer buying workflow software.
    mitigation: Start with simulation, pilot planning, and contract-readiness modules that deliver value before live power sessions are available.
  - name: Integration friction
    description: Mission-planning, flight-software, and provider-booking systems may be bespoke enough that onboarding each fleet is slow and expensive.
    mitigation: Focus first on a narrow set of EO operators using common bus and mission-planning stacks, then productize adapters from those deployments.
  - name: Narrow initial market
    description: The first set of fleets able and willing to buy external orbital power may be small, creating customer concentration risk.
    mitigation: Sell into adjacent defense payload programs and emerging power providers, then expand from EO into comms and orbital-compute operators as supply grows.
