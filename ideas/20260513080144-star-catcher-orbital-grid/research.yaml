competitors:
  - name: Lockheed Martin Ground Software
    stage: incumbent
    wedge: "Modular command, control, mission planning, and networking stack for small through large constellations."
    pricing: "Custom / value-based pricing"
    strength: "Deep heritage, cybersecurity posture, and broad constellation control capability."
    weaknessVsUs: "Not positioned as a neutral external-power booking and settlement layer for commercial EO operators."
    sourceRefs: [25, 26]
  - name: Rocket Lab InterMission + MAX Constellation
    stage: scale-up
    wedge: "Integrated ground data, spacecraft operations, digital twin, and constellation software."
    pricing: "Custom / bundled platform pricing"
    strength: "Modern autonomy stack tied to proven flight software and digital-twin tooling."
    weaknessVsUs: "Public positioning is end-to-end mission software, not cross-provider power economics or ROI attribution."
    sourceRefs: [27]
  - name: Antaris
    stage: scale-up
    wedge: "Mission virtualization, simulation, orchestration, and command-center software across the lifecycle."
    pricing: "Custom SaaS / platform pricing"
    strength: "Strong multi-vendor modeling and orchestration story."
    weaknessVsUs: "Still general-purpose; no public focus on dispatching purchasable orbital energy."
    sourceRefs: [29]
  - name: Cognitive Space
    stage: scale-up
    wedge: "AI-driven automation for complex satellite and constellation operations."
    pricing: "Custom enterprise pricing"
    strength: "Clear pain-point fit around reducing manual planning for growing fleets."
    weaknessVsUs: "Public materials emphasize automation broadly, not external power-window optimization and settlement."
    sourceRefs: [28]
  - name: OpenC3 COSMOS
    stage: scale-up
    wedge: "Open-source-to-enterprise command and operations stack from hardware test through constellation operations."
    pricing: "Open source + enterprise edition"
    strength: "Flexible and inexpensive starting point for operators that prefer in-house control."
    weaknessVsUs: "Leaves the domain-specific power-market logic and economics modeling to the customer."
    sourceRefs: [30]
