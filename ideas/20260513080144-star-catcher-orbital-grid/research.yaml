  - "What are the real commercial price, SLA, and booking terms for beamed power sessions, and how variable are they by orbit and demand window?"
  - "Will Star Catcher or any peer deliver frequent enough live power windows by 2027 to justify a dedicated dispatch system instead of simulation-only tooling?"
  - "How much operator trust and certification work is required before a third-party optimizer can influence flight-adjacent duty cycles?"
  - "Will regulators or insurers require new controls for routine space-to-space optical power services beyond current mission-ops practice?"
