slug: orbital-power-dispatch-os
date: '2026-05-13'
executiveSummary: >-
  Orbital Power Dispatch OS sells a narrow workflow at the moment orbital power shifts from physics demo to procurement problem:
  helping EO constellation operators decide when purchased beamed power is worth using and proving whether that spend lifted
  mission yield. The first customer is a U.S. or European EO operator with roughly 8-30 satellites that is entering its first
  external-power pilot, surge-collection contract, or high-power onboard-inference program on standard solar-powered buses.
  The product starts as a dispatch and settlement layer that forecasts demand, books power windows, recommends operator-approved
  mission reprioritization, and ties purchased energy to incremental images, analytics jobs, or downlink output. Research supports
  the timing signal: Star Catcher has raised a large Series A, reports seven PPAs, claims no-retrofit compatibility, and plans a
  late-2026 demo, while EO and sovereign ISR buyers already pay for faster revisit and lower-latency delivery. The strategic choice
  is to start with EO fleets rather than broader mission-ops software because urgent imaging and downlink events create the clearest
  before-and-after ROI case for external power purchases. The market is still small and externally constrained, with an estimated
  $4.5M near-term SAM and the biggest risk tied to provider rollout timing and unclear commercial power pricing. Public evidence on
  actual beamed-power SLA and price terms remains missing, so the first 12 months must prove not just interest but live operator
  willingness to pay for dispatch software before power supply is routine.
problem:
  - EO operators still manage battery limits, duty-cycle tradeoffs, and event-driven mission spikes with spreadsheets, fixed flight rules, and manual mission-ops calls, so they cannot consistently decide when extra orbital power would create positive mission ROI.
  - If external power becomes purchasable without retrofit, the bottleneck moves from hardware scarcity to booking, prioritizing, and settling power use across fleets in a way operators and finance teams can trust.
solution:
  - The MVP ingests ephemeris, battery state, payload duty cycles, imaging backlog, downlink windows, and provider power availability to recommend which satellite should buy power, when, and for which mission event.
  - The same workflow generates booking requests, operator runbooks, and settlement reports that map purchased power to incremental output such as added images, faster delivery, or extra onboard inference completed.
whyWeWin:
  - The company owns a narrower control point than generic constellation software: neutral external-power dispatch and mission-yield settlement across operators and providers.
  - If it wins early pilots, it compounds fleet-specific power-response curves, beam-window reliability data, and power-to-revenue attribution that adjacent mission-ops vendors and in-house stacks do not naturally capture.
strategicChoices:
  beachhead: Commercial Earth-observation constellations with 8-30 satellites that are preparing to use third-party beamed power for surge imaging, high-rate downlink, or onboard inference on compatible buses.
  wedgeRationale: EO fleets have the clearest buying trigger because a single urgent collection event or assured-delivery SLA can justify extra power in dollars, while broader satellite categories would require a longer sales cycle and fuzzier ROI proof.
  sequencingRationale: Start with read-heavy planning and settlement inside one EO fleet, then add provider booking integrations and repeatable ROI models, and only later expand into defense payloads, orbital compute, or multi-provider market infrastructure once live dispatch data exists.
  notYet:
    - Full command-and-control replacement for mission-operations suites
    - Communications-satellite or general space-energy market making before EO dispatch is repeatable
    - Autonomous closed-loop optimization without operator approval gates
market:
  tam: $24.0M estimated TAM from roughly 120 eventual orbital-power-sensitive EO, ISR, and adjacent high-power fleet programs at about $200k annual control-layer spend each.
  sam: $4.5M estimated SAM from roughly 25 near-term EO or sovereign ISR programs likely to test third-party beamed power or simulation workflows at about $180k annual spend per fleet.
  som: $1.1M estimated year-3 SOM assuming 6 fleet logos at about $180k ARR each via founder-led sales, provider partnerships, and incumbent mission-ops integrations.
  segments:
    - Commercial EO constellation operators
    - Sovereign ISR and defense-adjacent payload programs
  buyingProcess: >-
    The sale starts when an operations or program leader needs a safe dispatch process after a power-purchase pilot, a surge
    collection commitment, or a new onboard-compute workload. Deals likely begin as high-touch paid pilots led by the COO, VP of
    Operations, or mission-operations chief, then convert to annual workflow subscriptions once the platform becomes the standing
    system of record for power booking and ROI settlement.
product:
  mvp: >-
    The MVP is a shadow-mode dispatch workspace for one EO fleet with demand forecasting, event-level power recommendations,
    operator approval flows, provider booking output, and post-mission settlement tied to incremental mission yield. It should
    optimize for explainability and audit trails rather than autonomous control or broad mission-ops replacement.
  sixMonth: Ship a paid design-partner pilot for one EO fleet with simulation-backed dispatch recommendations, booking workflow exports, and auditable settlement against actual mission events.
  twelveMonth: Add provider API or workflow integrations, reusable fleet adapters for the first common mission-planning stacks, and benchmark ROI models from the first two to three pilots.
  twentyFourMonth: Expand into a multi-fleet dispatch layer with cross-account reliability benchmarks, defense-grade security posture, and adjacent support for sovereign ISR or orbital-compute power buyers.
  keyBets:
    - Operators will buy a planning and settlement layer before live beaming is routine if it reduces contract-readiness risk and proves event-level ROI.
    - One repeatable EO workflow can be adapted to sovereign ISR and hosted-payload programs faster than a broad mission-ops suite can specialize for external power economics.
    - Operator-approved recommendations and transparent settlement will build trust faster than fully autonomous optimization in flight-adjacent workflows.
gtm:
  wedge: Sell the first deployment as an orbital-power dispatch and settlement system for an EO fleet entering a power-purchase pilot or surge-collection program where extra watts can be tied to specific image, inference, or downlink value.
  channels:
    - Founder-led direct sales to EO constellation operators already marketing rapid revisit, fast delivery, or onboard analytics
    - Co-selling with orbital power providers and hosted-payload operators that originate booking rights and pilot demand
    - Integration partnerships with incumbent ground-software and mission-planning vendors so the product lands as an optimization layer
  funnelTargets: lead→qualified design partner 20%+, qualified design partner→paid pilot 50%+, pilot→production annual contract 60%+, first operator pilot→provider or defense-adjacent expansion within 9 months on 40%+ of accounts
  pricing: "$4k-$12k per satellite per month plus 5%-10% of managed power spend or incremental mission revenue, because buyers will anchor spend to satellite count and only tolerate variable pricing when the product proves mission uplift on high-value events."
businessModel:
  revenueStreams:
    - Annual per-satellite SaaS subscription for dispatch, booking workflow, and settlement
    - Implementation and integration fees for fleet onboarding and data-model setup
    - Usage-linked fee on managed power spend or verified incremental mission revenue
  unitOfValue: Satellite-months and event-level power spend managed through the platform.
  targetGrossMarginPct: 70
  expansionLevers:
    - Add more satellites, fleets, and mission teams within the same operator
    - Add provider-side workflow and settlement seats around the same power bookings
    - Expand from EO into sovereign ISR, hosted payloads, and later orbital-compute programs using the same dispatch data model
strategyMap:
  northStarMetric: Annualized dollar value of purchased orbital power dispatched and settled through the platform.
  inputMetrics:
    - Number of active fleet pilots with usable historical mission data
    - Share of recommended power windows approved by operators
    - Incremental mission yield per dollar of purchased power
    - Pilot-to-production conversion rate
    - Integration time from first fleet data access to first dispatch recommendation
  moatsToBuild:
    - Proprietary dataset of beam-window availability, reliability, and realized fleet response under different mission loads
    - Settlement record linking purchased power to incremental images, analytics jobs, and delivery speed across fleets
    - Embedded workflow position between provider booking systems and incumbent mission-planning tools
  killCriteria:
    - No paid pilot signed with an EO or ISR fleet within 9 months
    - Fewer than 2 pilots converting to annual contracts within 15 months
    - No customer showing at least one mission event where software-guided power use materially improved yield or delivery economics
    - Discovery proving most target fleets will keep external-power optimization fully in-house or bundled into incumbent tools
  mermaid: |
    flowchart LR
      Wedge[EO power dispatch wedge] --> MVP[Shadow-mode dispatch and settlement MVP]
      MVP --> Proof[Paid pilots with mission-yield proof]
      Proof --> Expansion[Provider integrations and adjacent ISR or compute expansion]
investorMemo:
  verdict:
    call: Watch
    conviction: Strong wedge clarity and timing signal, but conviction stays limited until live power pricing, provider cadence, and operator trust are proven.
    whyBelieve: A neutral dispatch and settlement layer addresses a real new workflow created by no-retrofit orbital power and event-driven EO mission economics.
    whyDoubt: The initial market is small and depends on external provider rollout, while generic mission-ops vendors and in-house stacks remain credible substitutes.
    nextDiligence: Confirm one power provider and two EO operators will run a paid shadow-mode pilot around a real booking or surge-collection workflow in the next 12 months.
  firstCustomer:
    title: VP of Mission Operations or COO at an EO constellation operator
    profile: Operator with 8-30 satellites, event-driven imaging or analytics commitments, and a credible near-term path to third-party orbital power usage on standard buses.
    trigger: The company signs a demo power-purchase agreement or wins a defense or enterprise collection SLA that needs more nighttime, burst, or onboard-compute capacity than current power budgets allow.
    buyer: COO or VP of Operations
    initialContract: "$120k-$250k paid pilot and first-year subscription for one fleet, converting to annual per-satellite pricing plus a power-spend or mission-uplift fee after operator approval workflows and settlement are in production."
  mustBeTrue:
    - At least 5-10 beachhead EO or ISR fleets will evaluate external-power dispatch software within the next 24 months.
    - Mission and operations leaders will pay for a third-party planning and settlement layer before live beaming supply is routine.
    - At least one provider will expose booking rights, workflow hooks, or APIs that a neutral software layer can integrate with.
    - Early pilots will demonstrate measurable mission-yield uplift or decision-speed improvement that exceeds software cost.
    - Generic mission-ops vendors and in-house stacks will not close the external-power workflow gap fast enough to block a standalone entrant.
  diligenceQuestions:
    - What exact booking, pricing, and SLA primitives will early power providers expose to operators and software partners?
    - Which EO fleets have both compatible buses and near-term mission events valuable enough to justify purchased power?
    - How much integration work is required before operators trust recommendations inside flight-adjacent planning loops?
    - Can the company prove event-level ROI without direct access to sensitive customer revenue or payload data?
    - If live beaming slips into 2027 or later, does the product remain software or collapse into simulation-heavy services?
operatingAssumptions:
  - assumption: The first repeatable buyer is an EO operations leader rather than the power provider itself.
    basis: idea.yaml
    validationTest: Run 12 discovery meetings and confirm that at least 8 target accounts put budget ownership with the operator-side COO, VP of Operations, or mission-operations lead.
    decisionImpact: If false, shift the product toward provider-embedded software and change sales from fleet-led to channel-led.
  - assumption: Buyers will pay six-figure pilot contracts before routine live power windows exist if the product improves contract readiness and ROI modeling.
    basis: research.yaml
    validationTest: Close 2 paid pilots above $120k each before the first commercial beaming mission becomes routine.
    decisionImpact: If false, narrow scope to lower-cost simulation tooling or defer fundraising until supply becomes more certain.
  - assumption: One or two common mission-planning integrations can cover enough of the beachhead to keep onboarding under six weeks.
    basis: research.yaml
    validationTest: Deliver the first 3 pilots with less than 6 weeks of integration work each and without bespoke rewrites of core dispatch logic.
    decisionImpact: If false, margins and hiring plans break and the company behaves like an aerospace services firm.
  - assumption: Operator-approved recommendations and audit trails are sufficient to earn trust before autonomous control is acceptable.
    basis: operator judgment
    validationTest: In the first 2 pilots, users accept at least 70% of recommended power-window actions after review and request no closed-loop autonomy requirement.
    decisionImpact: If false, the roadmap must move toward deeper certification, simulation, and safety engineering sooner.
  - assumption: Settlement data tying power spend to mission yield can be collected without blocking on perfect customer revenue visibility.
    basis: operator judgment
    validationTest: Produce 2 post-mission reports that customers agree are credible enough to inform the next power-purchase decision using operational metrics rather than full revenue disclosure.
    decisionImpact: If false, variable pricing and moat formation weaken, and the product should lean more on fixed workflow pricing.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Interview 12 EO and ISR operators about power-purchase planning, surge collection, and onboard-compute decision workflows.
    hypothesis: The most urgent pain is deciding when external power is worth using, not generic constellation scheduling.
    successMetric: At least 8 of 12 prospects identify a concrete event-driven workflow where external power decisions would reach director-level urgency in the next 12 months.
    owner: CEO
  - horizon: 0–90 days
    experiment: Build a manual shadow-mode model for one representative EO fleet using historical tasking, battery limits, and simulated beam availability.
    hypothesis: A recommendation and settlement workflow can show credible mission-yield tradeoffs before live power windows are routine.
    successMetric: Two design partners agree the model is credible enough to use in pilot planning or internal contract-readiness reviews.
    owner: Founding eng
  - horizon: 90–180 days
    experiment: Secure one power-provider workflow partnership covering booking requests, status updates, and post-session settlement data.
    hypothesis: Providers will support a neutral software layer if it helps operators consume booked power safely and prove ROI.
    successMetric: One signed partner agreement or live pilot workflow with defined booking and settlement data exchange.
    owner: CEO
  - horizon: 90–180 days
    experiment: Convert one EO design partner into a paid pilot tied to a real surge-collection, inference, or downlink program.
    hypothesis: Buyers will pay before full commercial beaming scale if the software reduces decision time and de-risks power spend.
    successMetric: One paid contract above $120k signed and used on at least one live or contractually scheduled mission event.
    owner: Founding GTM
  - horizon: 180–365 days
    experiment: Productize reusable fleet adapters and settlement templates from the first two pilots.
    hypothesis: Repeatability can reduce onboarding enough to preserve 70%+ target gross margin.
    successMetric: Third deployment goes live in under 4 weeks with less than 20% new custom field creation.
    owner: Product lead
  - horizon: 180–365 days
    experiment: Expand one operator pilot into a defense-adjacent or provider-side seat on the same dispatch data model.
    hypothesis: Multi-party workflow usage is the fastest path to higher ACV and stronger data moat formation.
    successMetric: At least one account adds a second paying stakeholder within 9 months of pilot start.
    owner: Founding GTM
operations:
  - Maintain an auditable decision log linking recommended power windows, operator approvals, booked sessions, and realized mission output.
  - Use simulation and shadow-mode planning before requesting any deeper flight-adjacent integration or automation.
  - Build provider and incumbent mission-software partnerships early so the product lands as a control layer rather than a rip-and-replace stack.
  - Implement security, access control, and exportable reporting suitable for sovereign and defense-adjacent reviews from the first pilot onward.
team:
  - role: Founding eng
    startTiming: Month 0
    rationale: Own the dispatch engine, fleet adapters, and settlement data model linking power usage to mission output.
  - role: Founding GTM
    startTiming: Month 0
    rationale: Run founder-led sales into a small account universe where timing around pilots, PPAs, and mission events matters more than top-of-funnel volume.
  - role: Aerospace operations lead
    startTiming: Month 3
    rationale: Translate mission-planning constraints, operator trust requirements, and provider workflow details into a credible deployment process.
  - role: Product and integration engineer
    startTiming: Month 6
    rationale: Productize common mission-stack adapters and keep onboarding from turning into custom services work.
milestones:
  - horizon: 0–12 months
    items:
      - Sign 2 paid EO or ISR pilots tied to real power-purchase, surge-collection, or onboard-compute programs.
      - Complete first provider booking and settlement integration.
      - Prove one customer case where software-guided power use improved mission-yield economics or decision speed.
  - horizon: 12–24 months
    items:
      - Reach 6 fleet logos and at least 1 multi-party account with provider or defense-adjacent expansion.
      - Reduce onboarding time to under 4 weeks for repeat deployments on common mission stacks.
      - Publish benchmark ROI and reliability models from aggregated dispatch and settlement data.
  - horizon: 24–36 months
    items:
      - Become the default neutral dispatch layer for a meaningful share of early orbital-power-enabled EO and ISR fleets.
      - Expand into adjacent hosted-payload or orbital-compute power buyers using the same settlement rail.
      - Demonstrate that accumulated data materially improves booking accuracy, conversion, or ACV versus first-generation deployments.
risks:
  - risk: Orbital power providers may slip commercial rollout, leaving too little live demand for dispatch software.
    likelihood: High
    impact: High
    mitigation: Start with simulation, contract-readiness, and shadow-mode settlement modules that create value before live power sessions are frequent.
  - risk: Fleet integration remains too bespoke, making deployments slow and margin-destructive.
    likelihood: High
    impact: High
    mitigation: Constrain the beachhead to EO fleets on a narrow set of buses and mission-planning stacks, then productize adapters before expanding.
  - risk: Operators keep the workflow in-house or accept bundled features from existing mission-ops vendors.
    likelihood: Medium
    impact: High
    mitigation: Stay focused on neutral provider booking plus ROI settlement and collect cross-party data that incumbent suites do not naturally own.
  - risk: Power economics stay too uncertain for operators to trust variable pricing or frequent dispatch decisions.
    likelihood: Medium
    impact: Medium
    mitigation: Tie recommendations to event-specific value thresholds, begin with fixed pilot pricing, and use settlement reports to narrow uncertainty.
  - risk: Defense and sovereign buyers require more security and approval controls than an early startup can support.
    likelihood: Medium
    impact: Medium
    mitigation: Sequence defense-adjacent expansion after the commercial EO workflow works and invest early in auditable access controls and reporting.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2–4M
  runwayMonths: 18
  useOfFundsSummary: 18 months funds two founding builders, early aerospace operations and integration hires, three to five design-partner deployments, and the provider plus mission-stack integrations needed to prove a repeatable EO dispatch wedge.
