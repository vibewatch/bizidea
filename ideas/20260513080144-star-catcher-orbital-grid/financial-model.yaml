scenarios:
  downside:
    description: Provider rollout slips and pilots convert one quarter later, leaving only 4 active logos by Q4Y2 and 5 by Q4Y3.
    y3RevenueK: 892.5
    y3EbitdaK: -395.0
    cashLowPointK: 210.0
    keyAssumptionChanges:
      - First paid pilot shifts from M7 to M10.
      - Y3 blended annual revenue per logo stays at $180K instead of expanding to $220K.
      - Gross margin tops out at 67% because integrations remain services-heavy.
  base:
    description: Two paid pilots in Y1 expand to 5 paid logos by Q4Y2 and 6 logos with modest usage-linked uplift in Y3.
    y3RevenueK: 1292.5
    y3EbitdaK: -184.2
    cashLowPointK: 641.3
    keyAssumptionChanges:
      - First pilot lands in M7 and second in M11.
      - Blended annual revenue per logo rises from $180K in pilots to $220K in Y3.
      - Hiring stays stage-gated until repeatable onboarding is proven.
  upside:
    description: Power-provider pull-through accelerates logo adds and one multi-party account lifts blended ACV above plan.
    y3RevenueK: 1595.0
    y3EbitdaK: 12.0
    cashLowPointK: 792.0
    keyAssumptionChanges:
      - First pilot lands in M5 and second in M9.
      - The sixth logo lands by Q4Y2 and Y3 exits with 7 active logos.
      - Blended annual revenue per logo reaches $235K as provider-side seats attach earlier.
sensitivity:
  - variable: ARPU
    downsideCase: $190K blended annual revenue per logo by Y3
    baseCase: $220K blended annual revenue per logo by Y3
    upsideCase: $235K blended annual revenue per logo by Y3
    y3RevenueImpactK: -176.0
    cashImpactK: -123.0
  - variable: CAC
    downsideCase: $160K CAC because each sale needs more founder and partner time
    baseCase: $120K CAC
    upsideCase: $90K CAC via provider referrals and reference accounts
    y3RevenueImpactK: 0.0
    cashImpactK: -120.0
  - variable: churn
    downsideCase: 3.0% monthly churn if pilots do not become standing workflows
    baseCase: 1.5% monthly churn
    upsideCase: 1.0% monthly churn after benchmark data becomes sticky
    y3RevenueImpactK: -160.0
    cashImpactK: -145.0
  - variable: sales cycle
    downsideCase: Paid pilots and conversions land about one quarter later than plan
    baseCase: M7 and M11 pilot starts with one new logo in each of Q1Y2, Q2Y2, Q3Y2, and Q1Y3
    upsideCase: First two pilots land two months earlier and the sixth logo lands by Q4Y2
    y3RevenueImpactK: -310.0
    cashImpactK: -280.0
  - variable: gross margin
    downsideCase: 65% steady-state gross margin because onboarding stays bespoke
    baseCase: 70%-72% steady-state gross margin
    upsideCase: 74% steady-state gross margin with reusable adapters and settlement templates
    y3RevenueImpactK: 0.0
    cashImpactK: -90.0
  - variable: hiring pace
    downsideCase: A second GTM and an extra engineer are hired 2 quarters before revenue supports them
    baseCase: Only one G&A hire in Y2 and one additional engineer by Q4Y3
    upsideCase: One noncritical Y3 hire is delayed until the sixth logo is live
    y3RevenueImpactK: 0.0
    cashImpactK: -180.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      DesignPartners --> PaidPilots
      PaidPilots --> AnnualContracts
      AnnualContracts --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: Revenue engine
    finding: Base-case revenue comes from 2 paid pilots in Y1 compounding into 6 active fleet logos by Q1Y3 at about $220K blended annual revenue each by Y3.
  - checkName: Must go right
    finding: Provider integrations and reusable fleet adapters must cut onboarding below 4 weeks so gross margin can climb toward the 70% target while logos grow.
  - checkName: Model breaks if
    finding: If power-provider rollout slips by a quarter and blended ACV stays near $180K, cash cushion compresses toward the downside case before a seed raise.
  - checkName: Next-round proof
    finding: A credible seed story is 5 paid fleet logos plus one provider-backed workflow by Q4Y2, showing this is becoming a repeatable control layer rather than bespoke services.
sanityChecks:
  ruleOf40: Y3 growth 75.5% + EBITDA margin -14.2% = 61.3%
  burnMultiple: Y2 burn multiple is about 0.7x and Y3 about 0.3x as net burn of $452.3K and $184.2K sits against roughly $631.4K and $556.1K of net new revenue.
  revenuePerFte: $215K Y3 (6 FTE versus roughly $200K-$400K for vertical SaaS)
  flags:
    - The near-term SAM is only about 25 EO or ISR programs, so losing one lighthouse fleet or one provider partner materially changes the growth curve.
    - Y1 gross margin is intentionally low because early deployments still look partly like services work before reusable adapters exist.
    - Base case still exits Y3 slightly EBITDA negative, so the next raise depends on repeatability and proof of expansion, not on profitability alone.
    - Y3 ARPU assumes buyers accept a modest managed-power or provider-seat uplift even though public power-pricing benchmarks are still thin in the research corpus.
