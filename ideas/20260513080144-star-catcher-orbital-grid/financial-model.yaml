    value: '220'
    unit: USDK per logo per year
    source: '[BP gtm pricing $4k-$12k per satellite per month plus 5%-10% variable fee and BP expansionLevers include provider-side seats and usage-linked expansion]'
  - id: A6
    name: First paid pilot timing
    value: M7
    unit: month
    source: '[BP experimentRoadmap 90–180 days to convert one EO design partner into a paid pilot]'
  - id: A7
    name: Second paid pilot timing
    value: M11
    unit: month
    source: '[BP milestones 0–12 months require 2 paid EO or ISR pilots]'
  - id: A8
    name: Logo ramp
    value: 2 logos by M12, 5 logos by Q3Y2, 6 logos by Q1Y3
    unit: count
    source: '[BP milestones 12–24 months call for 6 fleet logos; base case lands 5 by Q4Y2 and the sixth in Q1Y3 to reflect provider-rollout risk from research sensitivity cases]'
  - id: A9
    name: Revenue recognition method
    value: Revenue equals average active customers in period times period ARPU
    unit: formula
    source: '[Startup-finance heuristic: new logos contribute half-period revenue in the landing month or quarter]'
  - id: A10
    name: Gross margin ramp
    value: 45%-58% in Y1, 62%-70% in Y2, 70%-72% in Y3
    unit: percent
    source: '[BP businessModel.targetGrossMarginPct 70 and BP operatingAssumptions warn early integrations are bespoke before reusable adapters reduce services load]'
  - id: A11
    name: Loaded engineering compensation
    value: '190'
    unit: USDK per FTE per year
    source: '[BP team requires founding eng plus product and integration engineering; startup-finance heuristic for senior technical talent with benefits and payroll taxes]'
  - id: A12
    name: Loaded GTM compensation
    value: '180'
    unit: USDK per FTE per year
    source: '[BP team calls for founder-led enterprise sales in a concentrated buyer universe; startup-finance heuristic for one senior GTM seller/founder]'
  - id: A13
    name: Loaded aerospace operations compensation
    value: '170'
    unit: USDK per FTE per year
    source: '[BP team adds an aerospace operations lead in Month 3; startup-finance heuristic for a specialized domain operator]'
  - id: A14
    name: Loaded G&A or customer success compensation
    value: '130'
    unit: USDK per FTE per year
    source: '[Startup-finance heuristic for lean finance, customer success, and compliance support in an early vertical SaaS company]'
  - id: A15
    name: Headcount ramp
    value: 2, 3, 4, 4, 5, 6 FTE across q1y1, q2y1, q3y1, q4y1, q4y2, q4y3
    unit: FTE
    source: '[BP team start timings plus strategicChoices.sequencingRationale; hiring stays stage-gated until repeatable onboarding is proven]'
  - id: A16
    name: Non-payroll operating spend
    value: $10K-$14K per month in Y1 and $36K-$61K per quarter in Y2-Y3
    unit: USDK
    source: '[BP operations require audit trails, security, partner travel, software, and compliance; spend held lean to fit the BP pre-seed range]'
  - id: A17
    name: Customer acquisition cost
    value: '120'
    unit: USDK per new logo
    source: '[Startup-finance heuristic: concentrated founder-led enterprise sales usually consume roughly 50%-70% of first-year ACV before referrals lower cost]'
  - id: A18
    name: Monthly churn
    value: '1.5'
    unit: percent
    source: '[Startup-finance heuristic for sticky but still unproven annual enterprise workflow software in a narrow market]'
  - id: A19
    name: Cash conversion policy
    value: EBITDA approximates cash movement
    unit: policy
    source: '[Startup-finance heuristic: no debt, taxes, capex, or working-capital timing is modeled for this early software company]'
  - id: A20
    name: Funding ask sizing
    value: '2.0'
    unit: USDM
    source: '[Modeled to reach 5 paid fleet logos, the first provider integration, and a sub-4-week onboarding proof point by Q4Y2 with more than 6 months of cash buffer]'
