problem: 卫星运营商现在仍按电池和太阳能阵列的固定上限来排任务，所以一到峰值功耗不够，就得放弃额外成像、星上推理或紧急下行。要是光束供电真能在不改硬件的前提下按需购买，新的瓶颈就不再是有没有电，而是谁该买、什么时候买，以及多出来的任务产出能不能覆盖成本。今天这些判断还散落在表格、保守飞规和人工 任务运营 电话里。
targetUser:
  primary: 拥有 8-30 颗卫星的商业 EO 小卫星星座里的 任务运营副总裁 或 首席架构师
  secondary: 在兼容卫星平台上试点突发采集或星上处理任务的国防载荷运营方
  buyer: EO 星座运营商的 COO 或 运营副总裁
startupThesis:
  nonObviousInsight: 真正的突破不只是轨道上多了几瓦电，而是电力从航天器设计里的固定约束，变成了一种可调度的网络服务。只要兼容卫星能在不改硬件的情况下购买增量电力，控制点就会转到软件层：谁来预订、分配和结算这些电力，并把它对上任务收入。
  beachhead: 面向商业 EO 星座的供电窗口预订与任务产出优化：用第三方波束供电，在高价值事件里多跑成像、星上推理和高速下行。
  wedge: 轨道电力调度 OS：预测电池和载荷需求，预订外部供电窗口，重排任务优先级，并把购入电力归因到新增图像、推理结果和下行产出。
  whyNowCatalyst: Star Catcher 的融资、无需改装的兼容性主张、7 份 购电协议 和 2026 年底演示时间表，说明轨道电力正在从物理演示，转成眼下就要解决的商业采购问题。
  ventureScalePath: 先从 EO 星座切入，再把同一套调度和结算层扩到通信卫星、在轨计算平台、国防载荷、保险方，最终做成跨多家轨道能源供给方的电力可用性定价基础设施。
solution: 产品会接入轨道参数、电池状态、载荷 占空比、成像积压、下行窗口和可用的波束供电时段，给出每颗卫星什么时候该买外部电力的建议。接着，它把建议落成运营 操作手册、供给方预订请求，以及和具体客户 SLA 或突发事件绑定的任务级 ROI 预测。结算层再把购入电力映射到新增图像、完成的推理任务或下传的数据量，让运营方看清这笔电费到底有没有换来赚钱的任务产出。时间一长，平台会学到各个星座自己的电力响应曲线，最后变成轨道能源采购和调度的 核心记录系统。
goToMarketSeed:
  firstCustomer: 美国或欧洲一家拥有 8-30 颗卫星的光学或高光谱 EO 星座运营商；它正在标准太阳能平台上启动首个高功耗星上推理或突发采集项目。
  buyingTrigger: 运营方签下试点购电协议或演示协议，或者拿下一份国防 / 企业采集 SLA，需要的夜间或突发成像能力已经超出当前电力预算。
  currentAlternative: 任务规划表格、飞行软件里保守而固定的 占空比 规则，以及和卫星 OEM 一起做的人工 权衡分析。
  switchingReason: 它把波束供电从一个实验能力，变成可量化的运营决策：哪几笔购电真能抬高任务产出，一眼能看出来；原本要人工处理的预订和调度流程，也能自动跑起来。
  pricingHypothesis: $4k-$12k per satellite per month，再加 5%-10% 的托管电力支出或增量任务收入分成
