topRisks:
- name: 供给方落地延期
  description: 如果轨道电力演示或商业服务可用时间拖到 2026 年之后，客户可能会推迟采购这类工作流软件。
  mitigation: 先从仿真、试点规划和合同就绪模块做起，在真实供电时段还不频繁时先交付价值。
- name: 集成摩擦
  description: 任务规划、飞行软件和供给方预订系统很可能都足够定制化，导致每个星座的 接入 都慢又贵。
  mitigation: 先盯住使用相似平台和任务规划栈的一小批 EO 运营商，再把这些部署里沉淀出的 适配器 产品化。
- name: 初期市场过窄
  description: 第一批既有能力、也有意愿购买外部轨道电力的星座可能很少，客户集中度风险高。
  mitigation: 先卖给相邻的国防载荷项目和新兴电力供给方，等供给起来后，再从 EO 扩到通信和在轨计算运营商。
