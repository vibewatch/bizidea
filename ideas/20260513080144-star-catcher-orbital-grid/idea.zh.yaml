jobsToBeDone:
- job: 当高价值采集事件把需求拉高时，帮任务运营团队判断哪几颗卫星该买额外电力、买来怎么用，才能把更赚钱的图像和数据拿下来。
  currentAlternative: 人工在表格里做权衡，再叠加保守的 占空比 上限
  successMetric: 每 1 美元购入电力对应的增量收入或任务产出
- job: 当团队在试跑新的轨道电力协议时，帮运营和财务团队预测预订到的供电窗口并完成结果结算，好证明这份合同值得扩到全星座。
  currentAlternative: 临时性的任务复盘和离线成本归因
  successMetric: 批准下一笔购电所需时间，以及供电任务带来的毛利抬升
