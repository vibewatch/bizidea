slug: orbital-power-dispatch-os
date: '2026-05-13'
currency: USD
modelStartMonth: 2026-06
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-06
  unit: month
  source: '[BP date 2026-05-13；模型从下一个月开始]'
- id: A2
  name: pre-seed 轮起始现金
  value: '2000'
  unit: USDK
  source: '[BP fundingAsk targetFundingRangeUsd $2–4M；基准情景取低位，起始到账 $2.0M]'
- id: A3
  name: 首个付费 试点 年合同价值
  value: '180'
  unit: USDK per logo per year
  source: '[BP market/SOM 和 research market.som 都指向滩头市场每个 星座年 约 $180K]'
- id: A4
  name: 第 2 年单个活跃客户的综合年收入
  value: '190'
  unit: USDK per logo per year
  source: '[BP firstCustomer initialContract $120k-$250k，且 BP businessModel 包含实施费和使用量挂钩费用；Y2 假设在 试点 价格之上有轻度扩容]'
- id: A5
  name: 第 3 年单个活跃客户的综合年收入
  value: '220'
  unit: USDK per logo per year
  source: '[BP gtm pricing $4k-$12k per satellite per month + 5%-10% variable fee，且 BP expansionLevers 包含 供给方 侧 席位 与 按使用量挂钩 扩容]'
- id: A6
  name: 首个付费 试点 时间点
  value: M7
  unit: month
  source: '[BP experimentRoadmap 90–180 天：把 1 家 EO 共创客户转成付费 试点]'
- id: A7
  name: 第二个付费 试点 时间点
  value: M11
  unit: month
  source: '[BP milestones 0–12 months 要求 2 个付费 EO 或 ISR 试点s]'
- id: A8
  name: 客户数爬坡
  value: M12 前 2 个客户，Q3Y2 前 5 个客户，Q1Y3 前 6 个客户
  unit: count
  source: '[BP milestones 12–24 months 要求 6 个 星座客户；基准情景按 Q4Y2 落 5 个、Q1Y3 落第 6 个，以反映 research sensitivity cases 里的供给方落地风险]'
- id: A9
  name: 收入确认方法
  value: 收入 = 期间平均活跃客户数 × 当期 ARPU
  unit: formula
  source: '[创业财务通用假设：新 客户 在签约当月或当季只确认半个期间收入]'
- id: A10
  name: 毛利率爬坡
  value: 45%-58% in Y1, 62%-70% in Y2, 70%-72% in Y3
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct 70，且 BP operatingAssumptions 提醒早期集成偏定制，等可复用 适配器 出来后服务负担才会下降]'
- id: A11
  name: 工程团队总包薪酬
  value: '190'
  unit: USDK per FTE per year
  source: '[BP team 需要创始工程师以及产品、集成工程能力；采用高级技术人才含福利与薪资税的创业公司口径]'
- id: A12
  name: GTM 团队总包薪酬
  value: '180'
  unit: USDK per FTE per year
  source: '[BP team 指向创始人主导的企业销售，买家池子集中；采用 1 位高级 GTM 销售 / 创始人的创业公司口径]'
- id: A13
  name: 航天运营岗位总包薪酬
  value: '170'
  unit: USDK per FTE per year
  source: '[BP team 在第 3 个月加入航天运营负责人；采用专业领域运营人才的创业公司口径]'
- id: A14
  name: G&A / 客户成功总包薪酬
  value: '130'
  unit: USDK per FTE per year
  source: '[创业财务通用假设：早期垂直 SaaS 公司里，精简的财务、客户成功和合规支持团队口径]'
- id: A15
  name: 招聘节奏
  value: 2, 3, 4, 4, 5, 6 FTE across q1y1, q2y1, q3y1, q4y1, q4y2, q4y3
  unit: FTE
  source: '[BP team 的起始时间和 strategicChoices.sequencingRationale；在可复制 接入 被证明前，招聘保持分阶段推进]'
- id: A16
  name: 非薪酬运营支出
  value: Y1 每月 $10K-$14K；Y2-Y3 每季度 $36K-$61K
  unit: USDK
  source: '[BP operations 需要审计轨迹、安全、合作伙伴差旅、软件和合规；支出保持精简，以匹配 BP 的 pre-seed 区间]'
- id: A17
  name: 获客成本
  value: '120'
  unit: USDK per new logo
  source: '[创业财务通用假设：买家高度集中的创始人主导企业销售，通常会消耗首年 ACV 的约 50%-70%，直到转介绍把成本拉下来]'
- id: A18
  name: 月流失率
  value: '1.5'
  unit: percent
  source: '[创业财务通用假设：面向企业的工作流软件粘性较高，但市场仍窄、产品尚未完全验证]'
- id: A19
  name: 现金转换政策
  value: EBITDA 近似等于现金变动
  unit: policy
  source: '[创业财务通用假设：该早期软件公司未建模债务、税、资本开支和营运资金时点，因此用 EBITDA 近似现金变动]'
- id: A20
  name: 融资额度设定
  value: '2.0'
  unit: USDM
  source: '[模型目标是到 Q4Y2 拿到 5 个付费 星座客户、首个 供给方 集成，以及小于 4 周的可复制 接入 证明，同时保留超过 6 个月现金缓冲]'
