scenarios:
  downside:
    description: 供给方落地延期，试点 晚 1 个季度才转付费，导致到 Q4Y2 只有 4 个活跃客户，Q4Y3 也只有 5 个。
    y3RevenueK: 892.5
    y3EbitdaK: -395.0
    cashLowPointK: 210.0
    keyAssumptionChanges:
    - 首个付费 试点 从 M7 推迟到 M10。
    - Y3 每个客户的综合年收入停在 $180K，而不是扩到 $220K。
    - 由于集成仍然偏服务化，毛利率最高只能到 67%。
  base:
    description: Y1 的 2 个付费 试点 扩到 Q4Y2 的 5 个付费客户，并在 Y3 以适度 使用量提升 扩到 6 个客户。
    y3RevenueK: 1292.5
    y3EbitdaK: -184.2
    cashLowPointK: 641.3
    keyAssumptionChanges:
    - 首个 试点 在 M7 落地，第二个在 M11。
    - 每个客户的综合年收入从 试点 阶段的 $180K 提升到 Y3 的 $220K。
    - 只有在可复制 接入 被证明后，招聘才继续往前推。
  upside:
    description: 供给方 带来的拉动更快，客户增加提速，同时有 1 个多方账户把综合 ACV 拉到计划之上。
    y3RevenueK: 1595.0
    y3EbitdaK: 12.0
    cashLowPointK: 792.0
    keyAssumptionChanges:
    - 首个 试点 提前到 M5，第二个提前到 M9。
    - 第 6 个客户在 Q4Y2 就落地，Y3 结束时共有 7 个活跃客户。
    - 由于 供给方 侧 席位 更早挂上，每个客户的综合年收入提高到 $235K。
sensitivity:
- variable: ARPU
  downsideCase: 到 Y3，每个客户的综合年收入只有 $190K
  baseCase: 到 Y3，每个客户的综合年收入为 $220K
  upsideCase: 到 Y3，每个客户的综合年收入升到 $235K
  y3RevenueImpactK: -176.0
  cashImpactK: -123.0
- variable: CAC
  downsideCase: CAC 升到 $160K，因为每笔交易都要吃掉更多创始人和合作伙伴时间
  baseCase: CAC 为 $120K
  upsideCase: 通过 供给方 转介绍和标杆账户，CAC 降到 $90K
  y3RevenueImpactK: 0.0
  cashImpactK: -120.0
- variable: 流失率
  downsideCase: 如果 试点 迟迟变不成常设工作流，月流失率升到 3.0%
  baseCase: 月流失率 1.5%
  upsideCase: 基准数据变粘后，月流失率降到 1.0%
  y3RevenueImpactK: -160.0
  cashImpactK: -145.0
- variable: 销售周期
  downsideCase: 付费 试点 和转化都比计划晚约 1 个季度
  baseCase: 试点 分别从 M7 和 M11 起跑，且 Q1Y2、Q2Y2、Q3Y2、Q1Y3 各新增 1 个客户
  upsideCase: 前两个 试点 都提前 2 个月落地，第 6 个客户在 Q4Y2 前落地
  y3RevenueImpactK: -310.0
  cashImpactK: -280.0
- variable: 毛利率
  downsideCase: 稳态毛利率只有 65%，因为 接入 一直没摆脱定制化
  baseCase: 稳态毛利率 70%-72%
  upsideCase: 有了可复用 适配器 和结算模板后，稳态毛利率升到 74%
  y3RevenueImpactK: 0.0
  cashImpactK: -90.0
- variable: 招聘节奏
  downsideCase: 第二位 GTM 和额外 1 名工程师比收入支持时点早 2 个季度入场
  baseCase: Y2 只招 1 名 G&A，直到 Q4Y3 才再加 1 名工程师
  upsideCase: 1 名非关键的 Y3 招聘推迟到第 6 个客户真正上线后再进行
  y3RevenueImpactK: 0.0
  cashImpactK: -180.0
modelDiagram:
  title: 单位经济模型流转
  mermaid: |
    flowchart LR
      DesignPartners --> PaidPilots
      PaidPilots --> AnnualContracts
      AnnualContracts --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
- checkName: 收入引擎
  finding: 基准情景的收入来自 Y1 的 2 个付费 试点，并在 Q1Y3 前复利到 6 个活跃 星座客户；到 Y3，每个客户的综合年收入约为 $220K。
- checkName: 必须跑通的环节
  finding: 供给方 集成和可复用 星座 适配器 必须把 接入 压到 4 周以内，毛利率才能在客户增长时往 70% 目标爬。
- checkName: 模型会失灵如果
  finding: 如果 供给方 落地慢了 1 个季度，而且综合 ACV 一直停在 $180K 左右，现金缓冲就会在 seed 融资前朝 downside 情景快速收缩。
- checkName: 下一轮融资证明点
  finding: 一个有说服力的 seed 故事应该是：到 Q4Y2 拿到 5 个付费 星座客户，再跑出 1 条有 供给方 背书的工作流，证明这正在变成可复制控制层，而不是定制服务。
sanityChecks:
  ruleOf40: Y3 增长率 75.5% + EBITDA 利润率 -14.2% = 61.3%
  burnMultiple: Y2 的 烧钱倍数 约为 0.7x，Y3 约为 0.3x；对应净消耗分别为 $452.3K 和 $184.2K，对应净新增收入约为 $631.4K 和 $556.1K。
  revenuePerFte: Y3 为每名 FTE 约 $215K（6 名 FTE，对比垂直 SaaS 常见的约 $200K-$400K）
  flags:
  - 近端 SAM 只有约 25 个 EO 或 ISR 项目，因此丢掉 1 个灯塔客户或 1 个 供给方 合作，就会明显改写增长曲线。
  - Y1 毛利率刻意做低，因为早期部署在可复用 适配器 出来前，仍有相当一部分像服务项目。
  - 基准情景到 Y3 结束时 EBITDA 仍略为负值，因此下一轮融资靠的是可复制性和扩张证明，而不是单纯盈利。
  - Y3 的 ARPU 假设买家愿意接受适度的托管电力抽成或 供给方 侧 席位 提升，但公开语料里关于电力定价的 基准 依然很薄。
