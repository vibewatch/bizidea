slug: orbital-power-dispatch-os
date: '2026-05-13'
executiveSummary: 轨道电力调度 OS 卡在一个很窄、但时间点极对的工作流上：当轨道电力从物理演示变成采购问题时，它帮 EO 星座运营商判断买来的波束供电值不值得用，并证明这笔支出有没有抬高任务产出。第一位客户会是美国或欧洲一家拥有约 8-30 颗卫星的 EO 运营商：它正准备启动首个外部供电试点、突发采集合同，或在标准太阳能平台上跑高功耗星上推理项目。产品起步是调度与结算层：预测需求、预订供电窗口、给出经运营方审批的任务重排建议，并把购入电力对上新增图像、分析任务或下行产出。研究给出的时机信号也很强：Star Catcher 拿到一轮大额 Series A，披露了 7 份 购电协议，声称无需改装即可兼容，并计划在 2026 年底做演示；与此同时，EO 和主权 ISR 买家本来就在为更快重访和更低时延交付买单。战略上之所以先从 EO 星座切，而不是更广的 任务运营 软件，是因为紧急成像和下行事件能最清楚地做出“买电前后”的 ROI 对照。这个市场暂时仍小，也受外部供给约束：近端 SAM 估算只有 $4.5M，最大风险在于供给方落地节奏和商业电力定价仍不清晰。公开资料里还没有真实波束供电的 SLA 和价格条款，所以前 12 个月必须证明的不只是有人感兴趣，而是——在供电还没常态化前，运营方也愿意为调度软件真掏钱。
problem:
- EO 运营商现在仍靠表格、固定飞规和人工 任务运营 电话来处理电池上限、占空比 权衡和事件驱动的任务高峰，所以他们没法稳定判断：多买一点轨道电力，究竟能不能换来正向任务 ROI。
- 如果外部电力能在不改装硬件的情况下买到，瓶颈就会从硬件稀缺转向另一件事：怎样在跨星座层面预订、排序和结算电力使用，让运营和财务团队都信。
solution:
- MVP 会接入轨道参数、电池状态、载荷 占空比、成像积压、下行窗口和供给方可用电力，给出哪颗卫星该买电、什么时候买、用在哪个任务事件上的建议。
- 同一套工作流还会生成预订请求、运营 操作手册 和结算报告，把购入电力映射到新增图像、更快交付或额外完成的星上推理。
whyWeWin:
- 公司卡住的控制点比通用星座软件更窄——它做的是跨运营商、跨供给方的中立外部电力调度与任务产出结算。
- 如果早期 试点 能赢下来，公司就会持续积累 星座 级电力响应曲线、供电窗口可靠性数据，以及电力到收入的归因数据；相邻的 任务运营厂商和自研栈并不会天然拥有这些东西。
strategicChoices:
  beachhead: 拥有 8-30 颗卫星、正准备在兼容平台上使用第三方波束供电来支持突发成像、高速下行或星上推理的商业 EO 星座。
  wedgeRationale: EO 星座的购买触发最清晰：只要一次紧急采集事件或 保障交付 SLA，就足以把额外电力换算成美元回报；而更广的卫星类别既要更长销售周期，也很难先讲清 ROI。
  sequencingRationale: 先在一家 EO 星座内部做以读取为主的规划与结算，再补上供给方预订集成和可复用 ROI 模型；等真实调度数据跑出来后，再往国防载荷、在轨计算或多供给方市场基础设施扩。
  notYet:
  - 不做 任务运营 套件的全量替换
  - 在 EO 调度尚未可复制前，不做通信卫星或泛太空能源市场撮合
  - 在没有运营方审批闸门前，不做自治闭环优化
market:
  tam: TAM 估算为 $24.0M：按大约 120 个最终会对轨道电力敏感的 EO、ISR 及相邻高功耗星座项目计算，每个项目每年约有 $200k 的控制层支出。
  sam: SAM 估算为 $4.5M：按大约 25 个近期最可能测试第三方波束供电或仿真工作流的 EO 或主权 ISR 项目计算，每个星座每年约支出 $180k。
  som: 第 3 年可触达 SOM 估算为 $1.1M：假设拿下 6 个 星座客户，每个约 $180k ARR，获取方式靠创始人主导销售、供给方合作和现有 任务运营 集成。
  segments:
  - 商业 EO 星座运营商
  - 主权 ISR 与国防相邻载荷项目
  buyingProcess: 销售通常从一个运营或项目负责人开始：他在购电试点、突发采集承诺，或新的星上计算负载出现后，需要一套安全的调度流程。交易大概率会先以高触达的付费 试点 起步，由 COO、运营副总裁 或 任务运营 负责人主导；等平台成为电力预订与 ROI 结算的常设 核心记录系统后，再转成年费订阅。
product:
  mvp: MVP 是给一家 EO 星座用的影子模式调度工作台，覆盖需求预测、事件级电力建议、运营方审批流、供给方预订输出，以及和增量任务产出绑定的事后结算。它应优先把可解释性和审计轨迹做扎实，而不是一开始就追求自治控制或广谱 任务运营 替换。
  sixMonth: 6 个月内，为一家 EO 星座交付付费共创客户 试点：用仿真支撑调度建议，输出预订工作流，并围绕真实任务事件做可审计结算。
  twelveMonth: 12 个月内，补上供给方 API 或工作流集成、第一批通用 任务规划 栈的可复用 适配器，以及来自前 2-3 个 试点 的基准 ROI 模型。
  twentyFourMonth: 24 个月内，扩成多星座调度层：跑出跨账户可靠性基准、具备国防级安全姿态，并开始支持主权 ISR 或在轨计算买家的相邻需求。
  keyBets:
  - 即便真实波束供电还没常态化，只要能降低合同就绪风险并证明事件级 ROI，运营方也会先买规划与结算层。
  - 一套可复制的 EO 工作流，比广谱 任务运营 套件更快适配到主权 ISR 和托管载荷项目。
  - 运营方审批式建议和透明结算，比贴近飞行工作流里的全自动优化更容易先建立信任。
gtm:
  wedge: 第一笔部署就把产品卖成“轨道电力调度与结算系统”：服务对象是正进入购电试点或突发采集项目的 EO 星座，额外电力可以直接对到某次图像、推理或下行的具体价值。
  channels:
  - 对已经在卖快速重访、快速交付或星上分析的 EO 星座做创始人直销
  - 和掌握预订权与试点需求的轨道电力供给方、托管载荷运营方联合销售
  - 与现有地面软件和 任务规划 厂商做集成合作，让产品以优化层身份落地
  funnelTargets: 线索→合格共创客户 20%+；合格共创客户→付费 试点 50%+；试点→正式年约 60%+；首个运营方 试点→9 个月内扩到供给方或国防相邻场景的比例达到 40%+。
  pricing: $4k-$12k per satellite per month，再加 5%-10% 的托管电力支出或增量任务收入分成；因为买家会先按卫星数锚定预算，只有当产品能在高价值事件里证明任务提升 时，他们才愿意接受可变定价。
businessModel:
  revenueStreams:
  - 按卫星计费的年费 SaaS，覆盖调度、预订工作流和结算
  - 星座 接入 与数据模型搭建的实施 / 集成费
  - 按托管电力支出或已验证增量任务收入抽成的使用费
  unitOfValue: 通过平台被调度和结算的卫星月数，以及事件级电力支出。
  targetGrossMarginPct: 70
  expansionLevers:
  - 在同一运营商内部增加更多卫星、更多星座和更多任务团队
  - 围绕同一批电力预订，增加供给方侧工作流与结算 席位
  - 沿着同一套调度数据模型，从 EO 扩到主权 ISR、托管载荷，以及后续的在轨计算项目
strategyMap:
  northStarMetric: 通过平台被调度并完成结算的外购轨道电力年化金额。
  inputMetrics:
  - 拥有可用历史任务数据的活跃 星座 试点 数量
  - 运营方批准的建议供电窗口占比
  - 每 1 美元购入电力带来的增量任务产出
  - 试点 转正式生产的转化率
  - 从拿到第一份 星座 数据到给出第一条调度建议所需的集成时间
  moatsToBuild:
  - 不同任务负载下，供电窗口 可用性、可靠性和真实 星座 响应的专有数据集
  - 把购入电力与新增图像、分析任务和交付速度连起来的结算记录
  - 嵌在供给方预订系统和现有 任务规划 工具之间的工作流位置
  killCriteria:
  - 9 个月内仍签不下任何一家 EO 或 ISR 星座的付费 试点
  - 15 个月内，转成年约的 试点 少于 2 个
  - 没有任何客户能证明：至少有一次任务事件里，软件引导的购电显著改善了产出或交付经济性
  - 调研证明大多数目标星座会把外部电力优化完全留在内部，或直接捆进现有工具里
  mermaid: |
    flowchart LR
      Wedge[EO power dispatch wedge] --> MVP[Shadow-mode dispatch and settlement MVP]
      MVP --> Proof[Paid pilots with mission-yield proof]
      Proof --> Expansion[Provider integrations and adjacent ISR or compute expansion]
investorMemo:
  verdict:
    call: 观察
    conviction: 切口和时机都很强，但在真实电力定价、供给方节奏和运营方信任被验证前，整体判断仍只能保持克制。
    whyBelieve: 无需改装的轨道电力和事件驱动的 EO 任务经济性，确实催生了一个新的工作流，而中立的调度与结算层正好卡在这个位置。
    whyDoubt: 初始市场小，而且高度依赖外部供给方落地；与此同时，通用 任务运营厂商和自研栈仍是可信替代。
    nextDiligence: 确认未来 12 个月内，至少 1 家供给方和 2 家 EO 运营商愿意围绕真实预订或突发采集工作流跑付费影子模式 试点。
  firstCustomer:
    title: EO 星座运营商里的 VP of 任务运营 或 COO
    profile: 拥有 8-30 颗卫星、承接事件驱动成像或分析任务，并且在标准平台上有明确的第三方轨道电力近期使用路径的运营商。
    trigger: 公司签下演示购电协议，或拿到一份国防 / 企业采集 SLA，需要的夜间、突发或星上计算能力已经超出现有电力预算。
    buyer: COO 或 运营副总裁
    initialContract: 一家星座的付费 试点 和首年订阅约为 $120k-$250k；等运营审批流和结算进入生产后，再转成按卫星年费 + 电力支出 / 任务提升 抽成。
  mustBeTrue:
  - 未来 24 个月内，至少有 5-10 家滩头 EO / ISR 星座会评估外部电力调度软件。
  - 即便真实波束供电还没常态化，任务和运营负责人也愿意为第三方规划与结算层付费。
  - 至少有 1 家供给方会开放预订权、工作流 接口钩子 或 API，让中立软件层可以接入。
  - 早期 试点 能证明可度量的任务产出 提升 或决策提速，而且价值高于软件成本。
  - 通用 任务运营厂商和自研栈来不及补齐外部电力工作流缺口，给独立切入者留出窗口。
  diligenceQuestions:
  - 早期电力供给方究竟会向运营方和软件伙伴开放哪些预订、定价和 SLA 原语？
  - 哪些 EO 星座既有兼容平台，又有足够高价值的近期任务事件，能 证明值不值y 购电？
  - 在运营方愿意把建议接进贴近飞行的规划闭环前，还需要做多少集成工作？
  - 在拿不到敏感收入或载荷数据的情况下，公司能不能照样证明事件级 ROI？
  - 如果真实波束供电拖到 2027 年或更晚，产品还能保持软件属性，还是会滑成重服务的仿真业务？
operatingAssumptions:
- assumption: 第一个可复制买家在运营方侧的 EO 运营负责人，而不是电力供给方自己。
  basis: idea.yaml
  validationTest: 做 12 场 发现性访谈，确认至少 8 个目标账户把预算 ownership 放在运营方侧 COO、运营副总裁 或 任务运营 负责人手里。
  decisionImpact: 如果不成立，产品就要转向嵌入供给方的软件，销售也要从 星座-led 改成 channel-led。
- assumption: 即便真实供电窗口还不常见，只要产品能提高合同就绪度和 ROI 建模能力，买家也愿意为六位数 试点 合同买单。
  basis: research.yaml
  validationTest: 在第一趟商业波束供电任务常态化前，签下 2 个单价高于 $120k 的付费 试点。
  decisionImpact: 如果不成立，就要把范围收窄到更低价的仿真工具，或者等供给确定性更高再融资。
- assumption: 只要打通一到两个常见的 任务规划 集成，就足以覆盖滩头市场并把 接入 压到 6 周以内。
  basis: research.yaml
  validationTest: 前 3 个 试点 的集成工作都控制在 6 周以内，而且不需要重写核心调度逻辑。
  decisionImpact: 如果不成立，毛利率和招聘计划都会失效，公司会更像航天服务公司。
- assumption: 在闭环自治还不可接受前，运营方审批式建议和审计轨迹已经足够建立信任。
  basis: 运营方判断
  validationTest: 前 2 个 试点 里，用户在复核后接受至少 70% 的供电窗口建议，且不要求闭环自治。
  decisionImpact: 如果不成立，路线图就得更早转向更深的认证、仿真和安全工程。
- assumption: 即使看不到完整客户收入，仍能收集到“电力支出 → 任务产出”的结算数据。
  basis: 运营方判断
  validationTest: 用运营指标而不是完整收入披露，做出 2 份任务后报告，并让客户认可它足以支持下一次购电决策。
  decisionImpact: 如果不成立，可变定价和 moat 都会变弱，产品应更多依赖固定工作流定价。
experimentRoadmap:
- horizon: 0–90 天
  experiment: 采访 12 家 EO 和 ISR 运营方，了解购电规划、突发采集和星上计算的决策流程。
  hypothesis: 最紧迫的痛点不是通用星座排程，而是判断外部电力什么时候值得用。
  successMetric: 12 个潜在客户里至少有 8 个指出，未来 12 个月内会出现一个具体的事件驱动流程，让外部电力决策上升到总监级紧迫度。
  owner: CEO
- horizon: 0–90 天
  experiment: 基于历史 任务下达、电池约束和模拟 波束可用性，为一家代表性 EO 星座手工搭一个影子模式模型。
  hypothesis: 即便真实供电窗口还不常见，推荐与结算工作流也能先把任务产出权衡讲清楚。
  successMetric: 至少 2 个共创客户认可这套模型可信，可以拿来做 试点 规划或内部合同就绪评审。
  owner: 创始工程师
- horizon: 90–180 天
  experiment: 拿下一家电力供给方工作流合作，覆盖预订请求、状态更新和会后结算数据。
  hypothesis: 只要能帮助运营方安全消耗已预订电力并证明 ROI，供给方就愿意支持中立软件层。
  successMetric: 签下 1 份合作协议，或跑出 1 条真实 试点 工作流，明确预订与结算的数据交换方式。
  owner: CEO
- horizon: 90–180 天
  experiment: 把一家 EO 共创客户转成付费 试点，并绑到真实的突发采集、推理或下行项目上。
  hypothesis: 即便商业波束供电尚未全面铺开，只要软件能缩短决策时间、降低电力支出风险，买家就会付费。
  successMetric: 签下 1 份高于 $120k 的付费合同，并至少在 1 个真实或合同已排定的任务事件上使用。
  owner: 创始 GTM
- horizon: 180–365 天
  experiment: 把前两个 试点 里沉淀出的 星座 适配器 和结算模板产品化。
  hypothesis: 只要可复制性起来，接入 就能压到足以守住 70%+ 的目标毛利率。
  successMetric: 第 3 次部署在 4 周内上线，新增自定义字段不超过 20%。
  owner: 产品负责人
- horizon: 180–365 天
  experiment: 把一家运营方 试点 扩到同一套调度数据模型下的国防相邻 席位 或供给方侧 席位。
  hypothesis: 多方工作流使用，是最快拉高 ACV 并形成更强数据 moat 的路径。
  successMetric: 至少有 1 个账户在 试点 启动后 9 个月内增加第二个付费利益相关方。
  owner: 创始 GTM
operations:
- 维护一条可审计的决策日志，把推荐供电窗口、运营审批、已预订时段和真实任务产出串起来。
- 在请求更深的贴近飞行集成或自动化前，先用仿真和影子模式规划。
- 尽早和供给方、现有 任务软件 厂商建合作，让产品以控制层身份落地，而不是替换整套栈。
- 从第一个 试点 起，就把安全、访问控制和可导出报告做成能过主权和国防相邻评审的标准。
team:
- role: 创始工程师
  startTiming: 第 0 个月
  rationale: 负责调度引擎、星座 适配器，以及把电力使用和任务产出连起来的结算数据模型。
- role: 创始 GTM
  startTiming: 第 0 个月
  rationale: 在一个小而集中的账户池里做创始人主导销售；这里真正重要的是 试点、购电协议 和任务事件的时间点，而不是漏斗顶部的量。
- role: 航天运营负责人
  startTiming: 第 3 个月
  rationale: 把 任务规划 约束、运营方信任要求和供给方工作流细节，翻译成一套可信的部署流程。
- role: 产品与集成工程师
  startTiming: 第 6 个月
  rationale: 把常见任务栈 适配器 做成产品，避免 接入 滑成定制服务。
milestones:
- horizon: 0–12 个月
  items:
  - 签下 2 个付费 EO 或 ISR 试点，且都绑定真实的购电、突发采集或星上计算项目。
  - 完成首个供给方预订与结算集成。
  - 证明至少有 1 个客户案例里，软件引导的购电改善了任务经济性或决策速度。
- horizon: 12–24 个月
  items:
  - 拿到 6 个 星座客户，并至少有 1 个账户扩到供给方侧或国防相邻场景。
  - 在常见 任务栈 上把重复部署的 接入 时间压到 4 周以内。
  - 基于汇总后的调度与结算数据，发布 ROI 和可靠性基准模型。
- horizon: 24–36 个月
  items:
  - 成为早期具备轨道电力能力的 EO / ISR 星座里，足够大份额的默认中立调度层。
  - 沿着同一条结算 rail，扩到相邻的托管载荷和在轨计算买家。
  - 证明累计数据能比第一代部署显著提升预订准确率、转化率或 ACV。
risks:
- risk: 轨道电力供给方可能推迟商业落地，导致真实调度需求太少，撑不起软件。
  likelihood: High
  impact: High
  mitigation: 先从仿真、合同就绪和影子模式结算模块做起，在真实供电时段还不常见前先交付价值。
- risk: 星座 集成仍然太定制，导致部署既慢又吞毛利。
  likelihood: High
  impact: High
  mitigation: 把滩头市场压缩到少数平台和 任务规划 栈相近的 EO 星座，等 适配器 做成产品后再扩。
- risk: 运营方可能把这套流程留在内部，或直接接受现有 任务运营厂商打包好的功能。
  likelihood: Medium
  impact: High
  mitigation: 继续死盯“中立供给方预订 + ROI 结算”这个切口，并收集现有套件天然拿不到的跨方数据。
- risk: 电力经济性如果长期不清楚，运营方就不会信任可变定价，也不会频繁做调度决策。
  likelihood: Medium
  impact: Medium
  mitigation: 把建议绑到具体事件价值阈值上，先用固定 试点 定价，再用结算报告逐步缩小不确定性。
- risk: 国防和主权买家需要的安全与审批控制，可能超出早期创业公司能承担的范围。
  likelihood: Medium
  impact: Medium
  mitigation: 等商业 EO 工作流先跑通后，再排国防相邻扩张；同时及早投入可审计的访问控制和报告能力。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2–4M
  runwayMonths: 18
  useOfFundsSummary: 这笔 18 个月资金会覆盖两位创始 核心搭建者、早期航天运营和集成人员招聘、3-5 个共创客户部署，以及证明 EO 调度切口可复制所需的供给方和 任务栈 集成。
