scenarios:
  downside:
    description: 预算话语权继续分散，试点转化放缓，公司在第 3 年结束时只拿到 8 个生产客户，每家约 $500K ARR。
    y3RevenueK: 3780.0
    y3EbitdaK: -310.0
    cashLowPointK: -95.0
    keyAssumptionChanges:
    - 试点转生产的转化率跌破商业计划 50%+ 的目标，第 3 年第 4 季度 customersEop 只到 8 而不是 10。
    - 成熟生产价值收在约 $500K ARR，因为买家把范围锁定在一个工作流，并抵制用量超额收费。
    - 毛利率收在约 66%，因为连接器复用和验证打包比计划更定制化。
  base:
    description: 第 1 年两个付费试点转成第 2 年第 4 季度的 6 个生产客户，到第 3 年第 4 季度扩到 10 个，混合合同价值逐步走向研究测算的 $600K ARR SOM 锚点。
    y3RevenueK: 4950.0
    y3EbitdaK: 209.1
    cashLowPointK: 441.2
    keyAssumptionChanges:
    - 客户爬坡沿着商业计划里程碑路径走：M12 前 2 个付费客户，第 2 年第 4 季度 6 个生产客户，第 3 年第 4 季度 10 个。
    - 生产合同价值从约 $500K ARR 起步，只有在 2-3 种申报类型和更多工作包量上线之后，才升到约 $600K ARR。
    - 毛利率从第 1 年试点主导的 50% 出头，爬升到第 3 年后期商业计划设定的 70% 目标，因为证据包和连接器变得可复用。
  upside:
    description: 可引用的 QA 证明和伙伴转介把转化提前拉动，公司到第 3 年第 4 季度拿到 12 个生产客户，工作流扩张也更充分。
    y3RevenueK: 5850.0
    y3EbitdaK: 890.0
    cashLowPointK: 620.0
    keyAssumptionChanges:
    - 第 3 年第 4 季度 customersEop 到 12 而不是 10，因为第一个参考客户出现后，CRO 和 RIM 伙伴带来了更多合格试点。
    - 混合生产价值升到约 $650K ARR，因为更多客户在 12 个月内突破了单一工作包类型。
    - 毛利率收在约 72%，因为可复用的 QA 打包和集成模板比计划更快压缩了直接交付负担。
sensitivity:
- variable: ARPU
  downsideCase: 每个生产客户成熟 ARR 约 $500K
