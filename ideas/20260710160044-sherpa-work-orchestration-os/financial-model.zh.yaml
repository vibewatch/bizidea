modelDiagram:
  title: 单位经济模型流程图
  mermaid: |
    flowchart LR
      Discovery[Qualified discovery] --> Pilot[Paid pilot]
      Partners[CRO and RIM partners] --> Pilot
      Pilot --> Production[Production workflow]
      Production --> Expansion[More packet types and volume]
      Production --> Revenue[Subscription and implementation revenue]
      Expansion --> Revenue
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash after opex]
modelSanity:
- checkName: 收入引擎
  finding: 基准情形的收入靠把第 1 年两个付费试点，转化成第 3 年第 4 季度的 10 个生产客户，同时已确认合同价值逐步走向每个客户约 $600K ARR。
- checkName: 必须做对的事
  finding: 公司必须尽快把前两个试点变成可引用的生产客户，才能在雇一支庞大直销团队之前，让伙伴开始输送合格商机。
- checkName: 模型失效的临界点
  finding: 如果部署始终超过 90 天，且买家把年度范围压在约 $500K 上限，下行情形会让现金在第 3 年结束前就跌破零。
- checkName: 下一轮融资的证明
  finding: 只有当 6 个生产客户真正上线、部署可复制地压在 90 天以内，且伙伴商机证明这不只是创始人亲自打单，种子轮才站得住。
sanityChecks:
  ruleOf40: 第 3 年增速 140.9% + EBITDA 利润率 4.2% = 145.1%。
  burnMultiple: 第 2 年 burn multiple 约 0.5x，对应约 $2.0M 的净新增 ARR；第 3 年转为 EBITDA 为正，同时期末 ARR 再增加约 $3.0M。
  revenuePerFte: 第 3 年以年化收入和 12 名期末 FTE 计算，人均收入约 $412K（对标企业级 SaaS 常见的 $200-400K 区间）。
  flags:
  - 模型假设第一个付费试点在 M7 开始计费；采购周期一旦变慢，现金表现会很快滑向下行情形。
  - 毛利率要到第 3 年后期才完全达到商业计划 70% 的目标，反复出现的定制化验证或连接器工作会同时压缩 EBITDA 和现金跑道。
  - 基准情形已经达到研究测算里第 3 年 10 个客户的 SOM 锚点，所以长期创投级机会仍取决于这个切口跑通后能否扩展到标签变更、药物警戒或其他受监管工作流。
  - 到第 3 年，收入集中度依然偏高，因为少数几个大型制药客户贡献了大部分 ARR 和可参考案例。
