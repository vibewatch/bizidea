slug: gxp-submission-work-os
date: '2026-07-10'
currency: USD
modelStartMonth: 2026-08
assumptions:
- id: A1
  name: 模型起始月
  value: 2026-08
  unit: YYYY-MM
  source: '[BP date 2026-07-10] 模型从商业计划日期后的第一个完整月份开始起算。'
- id: A2
  name: 期初现金 / 种子前融资
  value: $2.8M
  unit: USD
  source: '[BP fundingAsk.targetFundingRangeUsd $2-4M + BP fundingAsk.runwayMonths 18 + model cash curve] $2.8M 的融资额既能撑到第 2 年第 4 季度里程碑，又能在基准情形现金最低点之前留出大约六个月缓冲。'
- id: A3
  name: 期初付费客户数
  value: '0'
  unit: count
  source: '[BP milestones 0-12 months] 公司从零收入起步，必须先拿下付费试点。'
- id: A4
  name: 客户定义
  value: 一个处于付费试点或年度正式合同中、覆盖一个受管控批准后工作流的申办方客户
  unit: definition
  source: '[BP gtm.pricing + BP businessModel.unitOfValue] customersEop 统计的是付费客户数，不是席位或单个工作包数量。'
- id: A5
  name: 首个试点节奏
  value: 第一个付费试点在 M7 开始计费，第二个在 M10，第一个生产客户在 M11 前落地
  unit: timing
  source: '[BP milestones 0-12 months + BP investorMemo.verdict.nextDiligence] 这是既偏慢又可信的节奏，第 1 年仍能拿到两个付费试点和一次生产转化。'
- id: A6
  name: 付费试点单价
  value: 约 4 个月 $180K（约 $45K/月）
  unit: USD/logo
  source: '[BP investorMemo.firstCustomer.initialContract $150k-$250k pilot + BP gtm.pricing 12-16 week pilot] 模型取单一常规工作流试点价格的中位数。'
- id: A7
  name: 生产合同与扩张单价
  value: 首个生产合同约 $500K ARR（约 $41.7K/月），到第 3 年逐步成熟为约 $600K ARR（约 $50K/月）
  unit: USD/logo/year
  source: '[BP investorMemo.firstCustomer.initialContract $450k-$650k annual contract + BP market.sam/$600k land price + Research market.som] 基准情形起点略低于 SOM 锚点，到第 3 年后期升到研究里 $600K 的混合水平。'
- id: A8
  name: 客户爬坡节奏
  value: M12 前 2 个付费客户，第 2 年第 4 季度 6 个生产客户，第 3 年第 4 季度到 10 个
  unit: customersEop
  source: '[BP milestones 0-12, 12-24, 24-36 months + Research market.som] 这与商业计划的里程碑路径以及研究里第 3 年 10 个客户的 SOM 锚点一致。'
- id: A9
  name: 收入确认口径
  value: 试点收入从约 $45K/月起步；混合已确认收入到第 2 年初约每客户每季度 $100K，到第 3 年第 4 季度约每客户每季度 $150K
  unit: formula
  source: '[BP businessModel.revenueStreams + BP gtm.pricing + Research market.som] 收入始终绑定付费客户数和合同价值，后续季度反映更多生产客户到达 SOM 价位。'
- id: A10
  name: 部署与转化周期
  value: 首批试点大约跑 4 个月，公司只有在拿下前 6 个生产客户之后，才能把部署压到 90 天以内
  unit: days / timing
  source: '[BP investorMemo.mustBeTrue + BP milestones 12-24 months + BP strategicChoices.sequencingRationale] 模型假设只有验证打包和伙伴模板跑通、有了可复制的证明之后，部署时间才能被压缩。'
- id: A11
  name: 毛利率爬坡
  value: 第 1 年 50%-55%，第 2 年 60%-67%，第 3 年 68%-71%
  unit: gross margin percent
  source: '[BP businessModel.targetGrossMarginPct 70 + BP operations + Research regulatoryLandscape] 早期试点在有可复用证据包、连接器和 SOP 模板之前偏重服务，之后毛利率才向计划目标抬升。'
- id: A12
  name: 招聘时间表
  value: M1 创始人、创始工程师和监管工作流负责人；M4 首位集成岗；M7 实施岗；M10 合作伙伴岗；M16 第二名工程师；M18 QA/运营岗；M21 第二名集成岗；M23 第二名实施岗；M29 第二名销售；M34 第三名工程师
  unit: timeline
  source: '[BP team + BP fundingAsk.useOfFundsSummary + startup-finance heuristic] 招聘保持克制，直到前 6 个生产客户落地，之后才增加为部署可复制性和伙伴市场进入所需的规模化岗位。'
- id: A13
  name: 创始人全成本薪酬
  value: $180.0K
  unit: USD/year
  source: '[BP team Founder/CEO + startup-finance heuristic: U.S. enterprise software pre-seed] 精简的创始人现金薪酬，已含税费和福利。'
- id: A14
  name: 工程全成本薪酬
  value: 每名 FTE $210.0K
  unit: USD/year
  source: '[BP team Founding eng + startup-finance heuristic: regulated enterprise SaaS] 重集成的平台工作需要资深工程人才，不能按海外外包商品化假设定价。'
- id: A15
  name: 监管工作流/产品全成本薪酬
  value: $190.0K
  unit: USD/year
  source: '[BP team Regulatory workflow lead + startup-finance heuristic] 这个角色兼顾领域专长、产品配置和面向客户的验证工作。'
- id: A16
  name: 集成/解决方案全成本薪酬
  value: 每名 FTE $195.0K
  unit: USD/year
  source: '[BP team Solutions and integration engineer + startup-finance heuristic] 反映跨 RIM、身份和导出式财务交接的企业级集成责任。'
- id: A17
  name: 实施/客户成功全成本薪酬
  value: 每名 FTE $170.0K
  unit: USD/year
  source: '[BP team Implementation lead + startup-finance heuristic] 这个角色偏技术、懂受监管工作流，但不按背指标的销售岗定价。'
- id: A18
  name: 销售/合作伙伴全成本薪酬
  value: 每名 FTE $220.0K
  unit: USD/year
  source: '[BP team Partnerships lead + BP gtm.channels + startup-finance heuristic] 包含变动薪酬、伙伴出差和面向大型制药客户的现场销售成本。'
- id: A19
  name: QA/运营全成本薪酬
  value: $140.0K
  unit: USD/year
  source: '[BP fundingAsk.useOfFundsSummary security and validation packaging + startup-finance heuristic] 一旦试点开始转化、验证就绪的打包工作变成关卡职能，就补一名 ops/QA 岗。'
- id: A20
  name: 薪酬在损益表科目间的分摊
  value: 创始人 55% 销售营销 / 20% 研发 / 25% 行政管理；工程 100% 研发；监管工作流负责人 70% 研发 / 30% 行政管理；集成岗 30% 销售营销 / 70% 研发；实施岗 45% 销售营销 / 55% 研发；销售岗 100% 销售营销；QA/运营 100% 行政管理
  unit: allocation
  source: '[BP team role rationales + BP operations] 让薪酬完整计入各职能运营费用，不在 COGS 里重复计算。'
- id: A21
  name: 非薪酬运营费用爬坡
  value: 36 个月里，销售营销从每月 $10K 升到 $46K，研发从 $15K 升到 $34K，行政管理从 $12K 升到 $25K
  unit: USD/month
  source: '[BP operations + BP risks + startup-finance heuristic] 覆盖云服务、安全、验证工具、法务、保险、出差和伙伴赋能支出，不假设大规模付费需求投放。'
- id: A22
  name: 现金转换口径
  value: EBITDA 近似等于现金变动
  unit: policy
  source: '[Modeling heuristic] 在这个种子前阶段，模型未纳入债务、税费、资本性支出，或明显的营运资金时点差异。'
- id: A23
  name: 月度流失率
  value: 2.0%
  unit: percent/month
  source: '[Startup-finance heuristic: early enterprise workflow SaaS] 产品一旦嵌入应当很粘，但模型仍计入有意义的客户集中度和续约风险。'
- id: A24
  name: CAC 口径
  value: 前 6 个生产客户，摊得的第 1-2 年销售营销支出为每个客户 $208K
  unit: USD/logo
  source: '[Model calc using Y1-Y2 S&M spend ÷ 6 Q4Y2 production logos + BP gtm.funnelTargets] 用的是首批验证客户群的数据，而不是成熟规模化销售假设。'
- id: A25
  name: 融资规模对应的种子轮就绪里程碑
  value: 6 个生产客户，2 个可引用的全球前 20 大制药账户，从启动到首个受管控工作包的中位时间在 90 天以内，且至少 25% 的合格商机来自伙伴渠道
  unit: milestone
  source: '[BP milestones 12-24 months + BP fundingAsk.useOfFundsSummary] 这是种子前这轮融资必须资助出来的下一轮融资证明包。'
- id: A26
  name: 季度薪酬口径
  value: 第 2-3 年的薪酬行使用季度内实际按月发生的招聘数字，不只是季末快照
  unit: policy
  source: '[Headcount column convention + BP team.startTiming] 即便人员表只展示第 2、3 年的年末快照，这也能让 salaryK 与按月推进的招聘节奏保持一致。'
