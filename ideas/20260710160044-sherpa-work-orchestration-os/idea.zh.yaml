differentiator: >-
  现有的 VMS 工具管供应商，AI 治理工具管模型风险，但没有一个真正占住外部人力和代理协作发生的那个受监管
  工作包。这家公司从申报交付物本身切入，而不是从工人或模型切入，因此能把指派、策略、审核证据和付款统一
  进同一条记录。这种以交付物为原点的定位很难被复制，因为背后需要深度工作流集成，还需要不断积累的审计级
  执行数据。
