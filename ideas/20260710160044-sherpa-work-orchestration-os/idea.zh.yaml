jobsToBeDone:
- job: 当一次批准后申报需要外包撰写和 QC 时，帮监管运营团队把获批的 CRO 和受限范围的 AI 代理指派进同一个
    受 SOP 约束的工作包，好让他们按时交付，还带着一条经得起审计的记录。
  currentAlternative: 邮件、表格追踪、RIM 任务列表、VMS 记录，以及人工 QA 签核
  successMetric: 从请求到 QA 批准申报包所用的天数，以及具备完整溯源证据的任务占比
- job: 当 QA 想知道谁碰过某个申报章节、受限数据是否越过了获批边界时，帮药政事务团队立刻重建出执行人、
    源文档和审核链条，好让他们不用花几周回溯就能过审计。
  currentAlternative: 人工翻查文档历史、供应商自证声明，以及从多个系统里临时拼凑证据
  successMetric: 生成一份审计材料所需的小时数，以及与外部工作相关的审计不合规项数量
