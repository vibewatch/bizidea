problem: >-
  大型制药公司的监管运营团队，已经把申报工作分给 CRO、自由撰稿专家、翻译供应商，现在还加上早期 AI
  代理，但整套工作流散落在 RIM 工具、VMS 记录、邮件、表格和 AP 系统里。没有一个系统能说清谁碰过每份申报包、
  哪些源文档是被允许使用的、SOP 审核是否走完，或者什么时候该放款。这种碎片化拖慢了申报进度，加重了审计焦虑，
  也让 AI 试点比底层的撰写或 QC 任务本身更难获批。
targetUser:
  primary: 一家全球前 50 大制药公司的全球申报运营负责人，统筹 CRO 交付的撰写、QC 和标签变更工作，覆盖欧盟和美国申报
  secondary: 药政事务部门内的监管 QA 经理或供应商治理负责人
  buyer: VP 级监管运营负责人，或监管信息管理（RIM）负责人
startupThesis:
  nonObviousInsight: >-
    受监管企业不需要一套系统管供应商、另一套管 AI 代理；在申报运营里，两者本质上是同一种外部劳动力单元——
    都必须被指派、被约束、被审核、被留证，并按同一个 SOP 约束的工作包放款。
  beachhead: >-
    全球前 50 大制药公司的申报运营团队，每年准备 10-100 份欧盟和美国的批准后变更、续展及说明书变更申报，
    把医学撰写和 QC 外包给 5-20 家 CRO，同时在受监管的文档流程里试点 AI 撰写或审核代理
  wedge: >-
    一个申报工作包控制层：从一次申报请求出发，指派获批的人员或代理，把每项任务绑定到允许使用的源文档和
    SOP 上，采集审核证据，只有 QA 签核后才放款给供应商。
  whyNowCatalyst: >-
    Sherpa 的信号说明，企业已经在把外包工治理和 AI 代理监管统一起来，并为此投入合规和集成预算，这为现在
    切入受监管工作包这个领域打开了窗口。
  ventureScalePath: >-
    先在批准后申报场景打赢，再扩展到标签变更、药物警戒、质量事件整改、临床运营外包，最终成为整个生命科学
    行业受监管外部用工的通用控制层。
solution: >-
  产品为每一份申报交付物创建一个 GxP 工作包，把获批的 CRO 人员、自由职业者和受限范围的 AI 代理都拉进同一个
  队列。它把每项任务绑定到获批的源文档、模板和 SOP 上，再把溯源、审核和付款事件记录进同一条审计轨迹。
  与 RIM 或 eTMF 系统、VMS 工具、ERP 或 AP 系统以及身份管控的集成，让客户在保留现有记录系统的同时，
  在其之上叠加一层策略和证据管控。AI 代理只能在划定范围内的任务里运作，配合私有化部署和审核节点，
  这样质量和数据主权团队可以先批准小范围用例，再逐步放开自主权限。第一个可衡量的成果是：批准后申报
  周期变快、交接失误变少、审计材料更干净。
goToMarketSeed:
  firstCustomer: 一家全球前 20 大制药公司，拥有集中式监管运营 COE、5-20 家优选 CRO，并且已经在为欧盟和美国批准后
    申报跑一个 AI 医学撰写或档案 QC 试点
  buyingTrigger: 一次 AI 撰写或审核试点、一次申报延误，或一次审计发现暴露出跨供应商工作缺乏溯源、证据留存薄弱
  currentAlternative: RIM 或 eTMF 工作流工具，加上 VMS、邮件、表格追踪、ERP 或 AP 审批链，以及人工 QA 审核
  switchingReason: 一层统一的记录，能让监管运营和 QA 实时看清谁（或什么）做了每一步、允许使用哪些源文档、
    SOP 审核是否通过，以及什么时候该放款。
  pricingHypothesis: 平台费按活跃受监管工作包数量或外部用工支出计费，每个业务单元设六位数年费下限
