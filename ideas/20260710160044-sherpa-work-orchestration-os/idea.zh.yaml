topRisks:
- name: 验证摩擦
  description: 除非产品从第一天就能证明 GxP 验证能力、审核可控性和可导出的证据，质量和监管团队可能拒绝 AI 辅助工作。
  mitigation: 先从治理人力-供应商工作流开始，让 AI 保持可选且严格限定范围，并提供适配现有验证项目的审计材料导出。
- name: 现有套件功能蔓延
  description: RIM、VMS 或 ERP 厂商可能加上轻量级编排功能，把自己定位成够用的延伸方案。
  mitigation: 靠跨系统证据、付款关卡，以及现有厂商难以在同一条工作流记录里天然具备的人力加代理策略管控取胜。
- name: 企业销售周期长
  description: 大型制药买家决策慢，可能要求先做重服务式部署，才愿意把新的控制层标准化下来。
  mitigation: 从一个带可衡量周期时间 KPI 的批准后工作流切入，借助实施伙伴，只有在证明申报速度和审计价值之后才扩张。
