      sourceRefs:
        - 3
        - 12
        - 24
        - 45
        - 54
  pestle:
    - factor: political
      impact: positive
      point: 欧洲监管机构已经把变更规则现代化，这为规范化的批准后运营模式提供了更有力的理由。
      sourceRefs:
        - 76
    - factor: economic
      impact: positive
      point: 外部用工本来就占了企业预算的大头，哪怕只是适度的效率或合规提升，也足以撑起软件支出。
      sourceRefs:
        - 1
        - 8
        - 10
    - factor: social
      impact: negative
      point: 监管运营岗位在快速演变，人才培养仍是瓶颈，这会拖慢新工作流的落地速度。
      sourceRefs:
        - 60
        - 94
    - factor: technological
      impact: positive
      point: AI、持续发布和以数据为中心的 eCTD 4.0 工作流，给编排类软件打开了一个明确的窗口期。
      sourceRefs:
        - 18
        - 20
        - 34
    - factor: legal
      impact: negative
      point: GxP 数据完整性、电子记录和 AI 治理方面的要求，让任何新工作流层都要付出更多验证工作量。
      sourceRefs:
        - 71
        - 74
        - 78
        - 79
        - 86
  adoptionFrictionMatrix:
    - friction: 计算机化系统验证与 QA 签核
      severity: high
      affectedBuyer: 监管 QA 和质量体系负责人
      mitigation: 先从人力供应商治理、可导出证据包和窄范围 AI 用例（配明确审核检查点）入手。
      sourceRefs:
        - 71
        - 74
        - 78
        - 79
        - 83
    - friction: 与现有 RIM、发布、财务和身份体系的集成
      severity: high
      affectedBuyer: 监管运营和企业架构团队
      mitigation: 以记录系统之上的控制层落地，优先打通围绕 RIM 和付款放行的一小组连接器。
      sourceRefs:
        - 12
        - 24
        - 45
        - 54
    - friction: 对受监管工作包内 AI 生成内容的信任
      severity: high
      affectedBuyer: QA、申报负责人和监管领导层
      mitigation: 默认人在回路，任何 AI 任务都配完整的引用、溯源和异常日志。
      sourceRefs:
        - 18
        - 34
        - 83
        - 85
    - friction: 申办方团队和外部供应商之间的变更管理
      severity: medium
      affectedBuyer: 申报运营负责人
      mitigation: 先在一种常规申报类型上试点，配清晰的供应商角色、里程碑和 ROI 指标。
      sourceRefs:
        - 5
        - 10
        - 54
        - 60
