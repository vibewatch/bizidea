    pricing: 定制企业定价
    strength: 装机量大、生命周期覆盖深，eCTD 4.0/持续发布路线图强劲。
    weaknessVsUs: 重心在档案和元数据生命周期，不是申办方自持的执行控制——跨 CRO、AI 代理、QA 证据和付款放行都不归它管。
    sourceRefs:
      - 12
      - 14
      - 20
      - 22
  - name: IQVIA
    stage: incumbent
    wedge: 把监管服务、SmartSolve RIM、医学撰写和 AI 辅助工作流增强组合在一起。
    pricing: 定制企业定价
    strength: 能把产能、专长和软件打包，覆盖复杂的全球监管项目。
    weaknessVsUs: 重服务式交付能解决吞吐量问题，但不会给申办方一个可复用的跨供应商控制层。
    sourceRefs:
      - 24
      - 25
      - 26
      - 28
      - 34
  - name: Ennov
    stage: scale-up
    wedge: RIM、档案和内容管理套件，服务集中监管数据和发布就绪。
    pricing: 定制企业定价
    strength: 在数据治理、RIM 集中化和 eCTD 4.0 准备上契合度很高。
    weaknessVsUs: 更像一套记录系统，而不是面向外部人力和代理的工作包编排层。
    sourceRefs:
      - 45
      - 49
  - name: Beeline
    stage: incumbent
    wedge: 延伸用工与服务采购治理，带支出可视化和合规管控。
    pricing: 定制企业定价
    strength: ROI 故事清晰，供应商/工作说明书管控成熟，契合企业采购习惯。
    weaknessVsUs: 不是围着 GxP 交付物设计的，没有针对申报证据、源文档边界或监管 QA 做设计。
    sourceRefs:
      - 3
      - 5
      - 8
      - 10
  - name: Sherpa
    stage: seed
    wedge: 从请求到付款，统一管理外部人力和 AI 工作的操作系统。
    pricing: 定制企业定价
    strength: 天生就是人力加代理的框架，主打私有/主权数据定位，且已有早期财富 500 强试点。
    weaknessVsUs: 仍处早期且偏横向；还没有针对制药申报交付物、SOP 和卫生监管机构细节做专门打造。
    sourceRefs:
      - 1
      - 11
regulatoryTechnicalConstraints:
  - point: 电子记录、签名和审计轨迹必须可导出，并随时准备好接受检查。
    sourceRefs:
      - 71
      - 74
      - 78
      - 79
  - point: eCTD 4.0 引入了元数据、关键词和验证要求，让脏源数据和人工发布交接的成本更高。
    sourceRefs:
      - 20
      - 49
      - 72
      - 80
      - 81
  - point: 批准后变更需要准确的变更分类、分组变更处理和正确的生产场地管理。
    sourceRefs:
      - 75
      - 76
      - 77
  - point: AI 辅助工作必须保留人工监督、留档、监测和可信 AI 管控。
    sourceRefs:
      - 83
      - 85
      - 86
  - point: 当 AI 代理或外部供应商触碰受监管文档和产品信息时，数据隐私和主权问题同样重要。
    sourceRefs:
      - 1
      - 83
      - 86
validationSignals:
  - point: Sherpa 的融资以及财富 500 强试点活动，说明企业已经在评估面向人力和 AI 外部工作的统一治理方案。
    sourceRefs:
      - 1
      - 11
  - point: Veeva 的 450+ 家 RIM 客户和 85+ 家持续发布用户，说明监管运营买家已经在为大规模工作流现代化付费。
    sourceRefs:
      - 22
  - point: Beeline 的 Forrester 研究显示，外部用工治理平台可以带来 CFO 能看懂、回本快的收益。
    sourceRefs:
      - 10
  - point: RAPS 和 Syneos 都把监管运营定义为人才和运营模式问题，这提高了对编排和自动化的接受度。
    sourceRefs:
      - 60
      - 94
openQuestions:
  - 全球前 20 大制药买家会把这笔预算归为监管运营软件、质量/合规基础设施，还是采购转型？
  - 申办方对把付款关卡绑定 QA 签核这件事，接受度有多高，还是更愿意让供应商付款留在现有 AP 工作流里？
  - 第一个试点真正必须打通的那一个集成是什么：RIM、身份、财务，还是文档库？
  - 第一版产品能不能在不强制先跑完整 CSV/验证项目的前提下，就证明 AI 任务有足够的审计级溯源？
