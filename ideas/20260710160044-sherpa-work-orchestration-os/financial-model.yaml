scenarios:
  downside:
    description: Budget authority stays fragmented, pilot conversion slips, and the company exits Y3 with only 8 production logos at about $500K ARR each.
    y3RevenueK: 3780.0
    y3EbitdaK: -310.0
    cashLowPointK: -95.0
    keyAssumptionChanges:
    - Pilot-to-production conversion falls below the BP 50%+ target, so Q4Y3 customersEop reaches 8 instead of 10.
    - Mature production value settles near $500K ARR because buyers limit scope to one workflow and resist volume overages.
    - Gross margin exits near 66% because connector reuse and validation packaging stay more bespoke than planned.
  base:
    description: Two Y1 paid pilots convert into 6 production logos by Q4Y2 and 10 by Q4Y3, with blended contract value stepping toward the researched $600K ARR SOM anchor.
    y3RevenueK: 4950.0
    y3EbitdaK: 209.1
    cashLowPointK: 441.2
    keyAssumptionChanges:
    - The customer ramp follows the BP milestone path of 2 paying logos by M12, 6 production logos by Q4Y2, and 10 by Q4Y3.
    - Production contract value starts around $500K ARR and reaches about $600K ARR only after 2-3 submission types and more work-packet volume move live.
    - Gross margin climbs from pilot-heavy low-50s in Y1 to the BP 70% target in late Y3 as evidence packs and connectors become repeatable.
  upside:
    description: Referenceable QA proof and partner referrals pull conversions forward, so the company reaches 12 production logos and fuller workflow expansion by Q4Y3.
    y3RevenueK: 5850.0
    y3EbitdaK: 890.0
    cashLowPointK: 620.0
    keyAssumptionChanges:
    - Q4Y3 customersEop reaches 12 instead of 10 because CRO and RIM partners source more qualified pilots after the first reference logo.
    - Blended production value rises toward about $650K ARR as more logos move beyond one packet type within 12 months.
    - Gross margin exits around 72% because reusable QA packaging and integration templates reduce direct delivery load faster than planned.
