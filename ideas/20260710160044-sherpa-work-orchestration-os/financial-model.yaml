slug: gxp-submission-work-os
date: '2026-07-10'
currency: USD
modelStartMonth: 2026-08
assumptions:
- id: A1
  name: Model start month
  value: 2026-08
  unit: YYYY-MM
  source: '[BP date 2026-07-10] The model begins in the first full month after the dated business plan.'
- id: A2
  name: Opening cash / pre-seed raise
  value: $2.8M
  unit: USD
  source: '[BP fundingAsk.targetFundingRangeUsd $2-4M + BP fundingAsk.runwayMonths 18 + model cash curve] A $2.8M raise funds the Q4Y2 milestone and still leaves roughly six months of buffer before the base-case cash low point.'
- id: A3
  name: Starting paying logos
  value: '0'
  unit: count
  source: '[BP milestones 0-12 months] The company starts pre-revenue and must first win paid pilots.'
- id: A4
  name: Customer definition
  value: One sponsor logo in a paid pilot or annual production contract for a governed post-approval workflow
  unit: definition
  source: '[BP gtm.pricing + BP businessModel.unitOfValue] customersEop counts paying logos, not seats or individual packets.'
- id: A5
  name: First pilot timing
  value: First paid pilot bills in M7, second paid pilot in M10, and the first production logo is live by M11
  unit: timing
  source: '[BP milestones 0-12 months + BP investorMemo.verdict.nextDiligence] This is the slow-but-credible cadence that still delivers two paid pilots and one production conversion in year 1.'
- id: A6
  name: Paid pilot economics
  value: $180K over roughly 4 months (~$45K/mo)
  unit: USD/logo
  source: '[BP investorMemo.firstCustomer.initialContract $150k-$250k pilot + BP gtm.pricing 12-16 week pilot] The model uses a midpoint pilot price for a single recurring workflow.'
- id: A7
  name: Production contract and expansion economics
  value: Initial production realizes about $500K ARR (~$41.7K/mo) and matures toward about $600K ARR (~$50K/mo) by Y3
  unit: USD/logo/year
  source: '[BP investorMemo.firstCustomer.initialContract $450k-$650k annual contract + BP market.sam/$600k land price + Research market.som] The base case starts slightly below the SOM anchor and reaches the researched $600K blended level by late Y3.'
- id: A8
  name: Customer ramp
  value: 2 paying logos by M12, 6 production logos by Q4Y2, and 10 by Q4Y3
  unit: customersEop
  source: '[BP milestones 0-12, 12-24, 24-36 months + Research market.som] This matches the business-plan milestone path and the researched 10-logo year-3 SOM anchor.'
- id: A9
  name: Revenue recognition convention
  value: Pilot revenue starts near $45K/mo; blended realized revenue per paying logo reaches about $100K per quarter in early Y2 and about $150K per quarter by Q4Y3
  unit: formula
  source: '[BP businessModel.revenueStreams + BP gtm.pricing + Research market.som] Revenue stays tied to paying logos and contract value, with later quarters reflecting more production logos at the SOM price point.'
- id: A10
  name: Deployment and conversion cycle
  value: First pilots run about 4 months and the company reaches sub-90-day deployment only after the first 6 production logos
  unit: days / timing
  source: '[BP investorMemo.mustBeTrue + BP milestones 12-24 months + BP strategicChoices.sequencingRationale] The model assumes validation packaging and partner templates compress deployment only after repeatable proof exists.'
- id: A11
  name: Gross margin ramp
  value: 50%-55% in Y1, 60%-67% in Y2, and 68%-71% in Y3
  unit: gross margin percent
  source: '[BP businessModel.targetGrossMarginPct 70 + BP operations + Research regulatoryLandscape] Early pilots are services-heavy before reusable evidence packs, connectors, and SOP templates lift margin toward the plan target.'
- id: A12
  name: Hiring timeline
  value: M1 founder, founding engineer, and regulatory workflow lead; M4 first integration hire; M7 implementation; M10 partnerships; M16 second engineer; M18 QA/ops; M21 second integration hire; M23 second implementation hire; M29 second seller; M34 third engineer
  unit: timeline
  source: '[BP team + BP fundingAsk.useOfFundsSummary + startup-finance heuristic] Hiring stays disciplined until the first six production logos are in place, then adds only the scale roles needed for deployment repeatability and partner GTM.'
- id: A13
  name: Founder loaded compensation
  value: $180.0K
  unit: USD/year
  source: '[BP team Founder/CEO + startup-finance heuristic: U.S. enterprise software pre-seed] Lean founder cash compensation with taxes and benefits included.'
- id: A14
  name: Engineering loaded compensation
  value: $210.0K per FTE
  unit: USD/year
  source: '[BP team Founding eng + startup-finance heuristic: regulated enterprise SaaS] Integration-heavy platform work requires senior engineering talent rather than commodity offshore assumptions.'
- id: A15
  name: Regulatory workflow / product loaded compensation
  value: $190.0K
  unit: USD/year
  source: '[BP team Regulatory workflow lead + startup-finance heuristic] This role blends domain expertise, product configuration, and customer-facing validation work.'
- id: A16
  name: Integration / solutions loaded compensation
  value: $195.0K per FTE
  unit: USD/year
  source: '[BP team Solutions and integration engineer + startup-finance heuristic] Reflects enterprise integration ownership across RIM, identity, and export-based finance handoff.'
- id: A17
  name: Implementation / customer success loaded compensation
  value: $170.0K per FTE
  unit: USD/year
  source: '[BP team Implementation lead + startup-finance heuristic] The role is technical and regulated-workflow aware, but not priced like a quota-carrying seller.'
- id: A18
  name: Sales / partnerships loaded compensation
  value: $220.0K per FTE
  unit: USD/year
  source: '[BP team Partnerships lead + BP gtm.channels + startup-finance heuristic] Includes variable compensation, partner travel, and field-selling cost for top-pharma accounts.'
- id: A19
  name: QA / ops loaded compensation
  value: $140.0K
  unit: USD/year
  source: '[BP fundingAsk.useOfFundsSummary security and validation packaging + startup-finance heuristic] A single ops / QA hire is added once pilots are converting and validation-ready packaging becomes a gating function.'
- id: A20
  name: Payroll allocation to P&L lines
  value: Founder 55% S&M / 20% R&D / 25% G&A; engineering 100% R&D; regulatory workflow lead 70% R&D / 30% G&A; integration 30% S&M / 70% R&D; implementation 45% S&M / 55% R&D; sales 100% S&M; QA/ops 100% G&A
  unit: allocation
  source: '[BP team role rationales + BP operations] This keeps payroll fully rolled into functional opex without double-counting salaries in COGS.'
- id: A21
  name: Non-payroll opex ramp
  value: S&M rises from $10K to $46K per month, R&D from $15K to $34K, and G&A from $12K to $25K over 36 months
  unit: USD/month
  source: '[BP operations + BP risks + startup-finance heuristic] Covers cloud, security, validation tooling, legal, insurance, travel, and partner enablement without assuming broad paid-demand spend.'
- id: A22
  name: Cash conversion convention
  value: EBITDA approximates cash movement
  unit: policy
  source: '[Modeling heuristic] No debt, taxes, capex, or material working-capital timing differences are modeled at this pre-seed stage.'
- id: A23
  name: Monthly churn
  value: 2.0%
  unit: percent/month
  source: '[Startup-finance heuristic: early enterprise workflow SaaS] The product should be sticky once embedded, but the model still prices in meaningful logo concentration and renewal risk.'
- id: A24
  name: CAC convention
  value: $208K of Y1-Y2 sales and marketing spend per first 6 production logos
  unit: USD/logo
  source: '[Model calc using Y1-Y2 S&M spend ÷ 6 Q4Y2 production logos + BP gtm.funnelTargets] This uses the first proof cohort rather than a mature scaled-sales assumption.'
- id: A25
  name: Seed-ready milestone for funding sizing
  value: 6 production logos, 2 referenceable top-pharma accounts, median time to first governed packet under 90 days, and at least 25% partner-sourced qualified pipeline
  unit: milestone
  source: '[BP milestones 12-24 months + BP fundingAsk.useOfFundsSummary] This is the next-round proof package the pre-seed must finance.'
- id: A26
  name: Quarterly salary convention
  value: Y2-Y3 salary rows use actual monthly hires inside each quarter, not just quarter-end snapshots
  unit: policy
  source: '[Headcount column convention + BP team.startTiming] This keeps salaryK consistent with the monthly hiring ramp even though the headcount table only shows year-end snapshots for Y2 and Y3.'
