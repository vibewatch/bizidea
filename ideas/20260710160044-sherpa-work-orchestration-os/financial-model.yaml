modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Discovery[Qualified discovery] --> Pilot[Paid pilot]
      Partners[CRO and RIM partners] --> Pilot
      Pilot --> Production[Production workflow]
      Production --> Expansion[More packet types and volume]
      Production --> Revenue[Subscription and implementation revenue]
      Expansion --> Revenue
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash after opex]
modelSanity:
- checkName: Revenue engine
  finding: Base-case revenue is driven by converting two Y1 paid pilots into 10 production logos by Q4Y3, with realized contract value stepping toward roughly $600K ARR per logo.
- checkName: Must go right
  finding: The company has to turn the first two pilots into referenceable production logos quickly enough that partners start feeding qualified opportunities before a large direct-sales team is hired.
- checkName: Model breaks if
  finding: If deployments stay above 90 days and buyers cap annual scope near $500K, the downside case pushes cash below zero even before Y3 finishes.
- checkName: Next-round proof
  finding: A seed round is justified once six production logos are live, deployment is repeatably under 90 days, and partner-sourced pipeline proves this is more than founder-led selling.
sanityChecks:
  ruleOf40: Y3 growth 140.9% + EBITDA margin 4.2% = 145.1%.
  burnMultiple: Y2 burn multiple is about 0.5x on roughly $2.0M of net new ARR; Y3 turns EBITDA positive while adding roughly $3.0M of exit ARR.
  revenuePerFte: $412K Y3 using annual revenue and 12 year-end FTE (benchmark $200–400K enterprise SaaS).
  flags:
  - The model assumes the first paid pilot starts by M7; a slower procurement cycle would push cash performance quickly toward the downside case.
  - Gross margin does not fully clear the BP 70% target until late Y3, so repeated bespoke validation or connector work would compress both EBITDA and runway.
  - The base case already reaches the researched 10-logo Y3 SOM anchor, so the long-term venture case still depends on expansion into labeling, pharmacovigilance, or other regulated workflows after the wedge works.
  - Revenue concentration stays high through Y3 because a small number of top-pharma logos drives most ARR and referenceability.
