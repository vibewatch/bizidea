topRisks:
  - name: Validation friction
    description: Quality and regulatory teams may refuse AI-assisted work unless the product proves GxP validation, reviewer control, and exportable evidence from day one.
    mitigation: Start by governing human-vendor workflows first, keep AI optional and tightly scoped, and ship audit-package exports that fit existing validation programs.
  - name: Incumbent suite creep
    description: RIM, VMS, or ERP vendors could add lightweight orchestration features and position them as good-enough extensions.
    mitigation: Win on cross-system evidence, payment gating, and human-plus-agent policy controls that incumbents do not naturally own in one workflow record.
  - name: Long enterprise sales cycles
    description: Top pharma buyers move slowly and may require services-heavy deployments before standardizing on a new control layer.
    mitigation: Sell into one post-approval workflow with a measurable cycle-time KPI, use implementation partners, and expand only after proving submission-speed and audit-value.
