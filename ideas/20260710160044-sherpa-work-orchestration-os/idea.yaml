problem: >-
  Regulatory-operations teams at large pharma companies already run submission work through CROs, freelance specialists,
  translation vendors, and now early AI agents, but the workflow is split across RIM tools, VMS records, email,
  spreadsheets, and AP systems. No one system shows who touched each submission packet, which source documents were
  allowed, whether SOP reviews were completed, or when payment should be released. That fragmentation slows filings,
  creates audit anxiety, and makes AI pilots harder to approve than the underlying writing or QC tasks.
targetUser:
  primary: Head of Global Submission Operations at a top-50 pharma company coordinating CRO-delivered writing, QC, and labeling changes across EU and U.S. filings
  secondary: Regulatory QA manager or vendor-governance lead inside regulatory affairs
  buyer: VP Regulatory Operations or Head of Regulatory Information Management
startupThesis:
  nonObviousInsight: >-
    Regulated enterprises do not need one system for vendors and another for AI agents; in submission operations both are
    external labor units that must be assigned, constrained, reviewed, evidenced, and paid against the same SOP-bound
    work packet.
  beachhead: >-
    Global submission-operations teams at top-50 pharma companies preparing 10-100 annual EU and U.S. post-approval
    variations, renewals, and labeling submissions that outsource medical writing and QC to 5-20 CROs while piloting AI
    drafting or review agents inside regulated document flows
  wedge: >-
    A submission work-packet control plane that starts from a filing request, assigns approved humans or agents, binds
    each task to allowed source documents and SOPs, captures review evidence, and releases vendor payment only after QA
    sign-off.
  whyNowCatalyst: >-
    Sherpa’s signal shows enterprises are already unifying contractor governance and AI-agent oversight, and spending on
    compliance and integrations to do it, creating an opening to own the regulated work packet now.
  ventureScalePath: >-
    Win in post-approval submissions, then expand into labeling, pharmacovigilance, quality-event remediation, clinical
    operations outsourcing, and eventually the broader control layer for regulated external work across life sciences.
solution: >-
  The product creates a GxP work packet for each submission deliverable and pulls approved CRO staff, freelancers, and
  bounded AI agents into one queue. It binds every task to approved source documents, templates, and SOPs, then records
  lineage, review, and payment events in a single audit trail. Integrations with RIM or eTMF systems, VMS tools, ERP or
  AP systems, and identity controls let customers keep existing systems of record while adding policy and evidence above
  them. AI agents can only operate inside scoped tasks with private deployment and reviewer checkpoints, so quality and
  sovereignty teams can approve narrow use cases before broader autonomy. The first measurable win is faster
  post-approval submission cycles with fewer handoff errors and cleaner audit packages.
goToMarketSeed:
  firstCustomer: A top-20 pharma company with a centralized regulatory-operations COE, 5-20 preferred CROs, and a live AI medical-writing or dossier-QC pilot for EU and U.S. post-approval submissions
  buyingTrigger: An AI drafting or review pilot, a submission delay, or an audit finding that exposes missing cross-vendor work lineage and weak evidence collection
  currentAlternative: RIM or eTMF workflow tools plus VMS, email, spreadsheet trackers, ERP or AP approval chains, and manual QA review
  switchingReason: One layer gives regulatory ops and QA a live record of who or what performed each step, which source documents were allowed, whether SOP reviews cleared, and when payment should release.
  pricingHypothesis: Platform fee tied to active regulated work packets or external-work spend, with a six-figure annual minimum per business unit
