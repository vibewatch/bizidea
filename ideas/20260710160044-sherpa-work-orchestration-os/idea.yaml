jobsToBeDone:
  - job: When a post-approval submission needs outsourced writing and QC, help regulatory-operations teams assign approved CROs and bounded AI agents under one SOP-controlled work packet, so they can ship on time with an audit-ready trail.
    currentAlternative: Email, spreadsheet trackers, RIM task lists, VMS records, and manual QA sign-offs
    successMetric: Days from request to QA-approved submission packet and percentage of tasks with complete lineage evidence
  - job: When QA asks who touched a submission section or whether restricted data left approved boundaries, help regulatory-affairs teams reconstruct actor, source, and review lineage instantly, so they can clear audits without weeks of backtracking.
    currentAlternative: Manual document-history reviews, vendor attestations, and ad hoc evidence collection from multiple systems
    successMetric: Hours to produce an audit package and number of audit exceptions tied to external work
