  validationPlan:
  - priority: high
    question: Will a top-20 pharma team buy a sponsor-owned control layer rather than expanding CRO-managed process and staffing?
    evidenceToGather: Three live discovery calls with heads of submission operations plus one pilot design with a current CRO-heavy program.
  - priority: high
    question: Can the product attach to one measurable KPI in post-authorisation work?
    evidenceToGather: Baseline data for cycle time, rework, and audit-package preparation on 2-3 recent variation or labeling submissions.
  - priority: medium
    question: 'Which integrations are truly mandatory in phase one: RIM, VMS, ERP/AP, identity, or document repository?'
    evidenceToGather: Architecture interviews with one RIM owner, one procurement/VMS owner, and one regulatory QA lead at the same target account.
  - priority: medium
    question: How much AI control do quality teams accept initially?
    evidenceToGather: A design-partner workshop that maps which tasks can be human-in-the-loop versus human-by-exception under existing SOPs.
