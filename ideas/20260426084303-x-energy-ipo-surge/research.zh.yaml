  fiveForces:
    supplierPower:
      score: 4
      rationale: 核能领域专家、熟悉监管的操盘手以及合格供应商数据都很稀缺；X-energy 的供应链扩张和多国预订协议表明，这类能力基础仍高度集中。
      sourceRefs:
      - 8
      - 20
      - 22
      - 23
    buyerPower:
      score: 4
      rationale: 短期内可信买方很少，每家规模都足以要求集成与企业级控制，而相邻软件替代方案本身也已经是定制报价的企业销售动作。
      sourceRefs:
      - 17
      - 18
      - 19
      - 25
    threatOfEntrants:
      score: 3
      rationale: 通用工作流工具易于搭建，但在核能交付、许可和供应商 QA 中建立信任要难得多。
