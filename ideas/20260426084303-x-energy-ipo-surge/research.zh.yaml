categoryDynamics:
  growthRate: DOE 引述的路径是到 2050 年美国先进核能达到 200 GW（这是装机爬坡，不是软件 CAGR）。
  growthRateSourceRefs:
  - 13
  tailwinds:
  - point: Amazon 和 Google 已开始通过具名项目和购电结构，为首批先进核能需求提供背书。
    sourceRefs:
    - 10
    - 11
    - 12
    - 13
  - point: DOE 支持以及首台示范燃料和反应堆里程碑，正把市场从概念阶段推向部署执行。
    sourceRefs:
    - 5
    - 15
    - 21
    - 23
  - point: X-energy 的供应商预订和燃料设施进展表明，商业化正在变得更加依赖供应商，也更加依赖审计。
    sourceRefs:
    - 20
    - 21
    - 22
    - 23
    - 30
  headwinds:
  - point: 许可和建设进度可能明显推迟，即便电力需求真实存在，也会延后软件预算释放。
    sourceRefs:
    - 15
    - 16
    - 24
    - 29
  - point: HALEU 与核材料处理带来了通用工业软件无法开箱即用解决的约束。
    sourceRefs:
    - 21
    - 26
    - 34
  - point: 直接买方群体仍然足够小，少数几个项目延迟就会迅速改变市场规模。
    sourceRefs:
    - 5
    - 7
    - 15
    - 16
competitors:
- name: ETQ Reliance
  stage: 现有厂商
  wedge: 广义企业级 QMS，覆盖 40 多个应用，包括供应商质量、CAPA、审计和文档控制。
  pricing: 定制报价 / 演示驱动
  strength: 在受监管制造业拥有深厚工作流广度和既有的质量采购动作。
  weaknessVsUs: 定位偏横向；并未围绕核能供应商资格认定、部件谱系或贯穿反应堆与燃料项目的监管就绪审计包进行营销。
  sourceRefs:
  - 17
- name: AssurX
  stage: 现有厂商
  wedge: 企业级质量与供应商质量软件，并明确面向能源与公用事业行业。
  pricing: 定制报价 / 演示驱动
  strength: 合规导向强，对受监管行业具备垂直认知。
  weaknessVsUs: 其质量/合规框架更为通用，而非核能专用就绪；几乎没有证据显示其具备项目/部件级的核能追溯能力。
  sourceRefs:
  - 18
- name: MasterControl Manufacturing Excellence
  stage: 现有厂商
  wedge: 面向受监管生产的无纸化制造、MES、电子日志和审计就绪质量工作流。
  pricing: 定制报价 / 演示驱动
  strength: 拥有打通制造执行和审计追踪的强叙事。
  weaknessVsUs: 更偏向生命科学制造运营，而不是授标前供应商资格认定和首台反应堆证据链。
  sourceRefs:
  - 19
- name: In-house stack plus consultants
  stage: 现有替代方案
  wedge: 现有 ERP/PLM/文档库、内部 PMO 和领域顾问。
  pricing: 内部人力成本 + 服务支出
  strength: 在谨慎的核能项目内部，信任度最高、组织阻力最小。
  weaknessVsUs: 高度依赖人力、信息割裂，且难以跨项目形成可复用的供应商图谱或实时管理视图。
  sourceRefs:
  - 8
  - 24
  - 25
  - 28
regulatoryTechnicalConstraints:
- point: 先进反应堆部署需要满足 NRC 的反应堆许可要求，而燃料业务还可能单独涉及 Part 70 许可和特殊核材料控制。
  sourceRefs:
  - 6
  - 21
  - 26
- point: 任何工作流系统都必须与现有 ERP、PLM、数字线程、云和受监管信息系统集成，而不能假设从零开始部署。
  sourceRefs:
  - 25
- point: 供应商资格认定横跨长周期部件、燃料和建设，因此产品大概率会面对较重的实施和数据标准化工作。
  sourceRefs:
  - 20
  - 22
  - 23
  - 24
- point: HALEU 和 TRISO 供应链带来了超出标准工业 QA 的额外监管链路、安全和审计要求。
  sourceRefs:
  - 21
  - 26
  - 32
  - 34
- point: 为核能项目服务的创业公司，需要面对异常高的出口管制、合规和网络安全预期。
  sourceRefs:
  - 25
  - 35
validationSignals:
- point: X-energy 将 IPO 发行价上调至 $23/股，上市首日上涨 27%，表明公开市场对先进核能执行故事兴趣强烈。
  sourceRefs:
  - 1
  - 2
  - 3
- point: Amazon 向 X-energy 投资约 $500 million，并将其与到 2039 年超过 5 GW 的项目计划绑定。
  sourceRefs:
  - 10
  - 11
  - 12
- point: Google 签下首个购买多个 Kairos SMR 电力的企业协议，验证了超大规模云厂商愿意为早期需求提供背书。
  sourceRefs:
  - 13
  - 14
- point: X-energy 已与 Doosan、SGL、Toyo Tanso 和 IHI 预留钢材和石墨产能，这强烈说明供应商就绪性已经成为执行关键。
  sourceRefs:
  - 20
  - 22
  - 30
- point: TRISO-X 获得首个同类 Part 70 HALEU 燃料制造许可，并正在建设 TX-1，说明燃料侧商业化已进入运营阶段，而非概念阶段。
  sourceRefs:
  - 21
  - 23
- point: Oklo 的大型数据中心协议说明客户需求确实存在，但其许可限制也表明为何进度风险工具会变得重要。
  sourceRefs:
  - 16
  - 29
openQuestions:
- 一家缺乏深厚前 NRC 或核运营者背景的创业公司，能否足够快地获得信任，成为首批项目中的工作流关键层？
- 初始预算最容易从供应链、质量、IT，还是项目交付端释放？
- Which narrow wedge delivers the fastest ROI proof: 供应商导入、合格制造商逻辑、谱系管理，还是审计包生成？
- 供应商会直接付费吗，还是供应商变现主要只是叠加在开发商交易上的一个模块？
