  - factor: 法律
    impact: 负面
    point: 燃料许可和特殊核材料控制增加了安全、文档和审计要求，从而拖慢采购和集成。
    sourceRefs:
    - 21
    - 26
  - factor: 环境
    impact: 正面
    point: 工业脱碳和无碳基荷叙事，正在帮助核能项目获得企业层面的关注。
    sourceRefs:
    - 10
    - 12
    - 24
  adoptionFrictionMatrix:
  - friction: 信任与核能领域公信力
    severity: 高
    affectedBuyer: 供应链、质量和监管负责人
    mitigation: 让前核能操盘手参与销售，并先证明一个狭窄工作流，再去宣称接近系统记录层。
    sourceRefs:
    - 8
    - 9
    - 21
  - friction: 与现有 ERP、PLM 和文档系统的集成
    severity: 高
    affectedBuyer: CIO 和项目运营团队
    mitigation: 将产品定位为编排/证据层，尽量减少“推倒重来”。
    sourceRefs:
    - 19
    - 25
  - friction: 买方群体小且企业采购周期慢
    severity: 高
    affectedBuyer: 创始 GTM 团队
    mitigation: 瞄准许可申报、融资和首批供应商授标等催化时点。
    sourceRefs:
    - 3
    - 4
    - 21
    - 22
    - 24
  - friction: 供应商数据标准化与谱系初始化
    severity: 中
    affectedBuyer: 项目交付和质量团队
    mitigation: 先从单个部件族和可复用证据模板开始。
    sourceRefs:
    - 20
    - 22
    - 23
    - 24
  - friction: 敏感核能数据的安全与合规要求
    severity: 高
    affectedBuyer: 法务、合规和 IT 安全团队
    mitigation: 从第一天起就围绕核级信息控制、审计追踪和基于角色的访问来构建产品。
    sourceRefs:
    - 21
    - 25
    - 26
    - 35
