categoryDynamics:
  growthRate: DOE 提到美国先进核能到 2050 年可达 200 GW 的路径（这是装机爬坡，不是软件 CAGR）
  growthRateSourceRefs: [13]
  tailwinds:
    - point: Amazon 和 Google 已开始为首波先进核能需求买单，而且都对应到具体项目和购电安排。
      sourceRefs: [10, 11, 12, 13]
    - point: DOE 支持，以及首台套燃料和反应堆里程碑，都在把市场从概念推向部署。
      sourceRefs: [5, 15, 21, 23]
    - point: X-energy 的供应商预留和燃料设施进展，说明商业化正在变得既依赖供应商，也依赖审计。
      sourceRefs: [20, 21, 22, 23, 30]
  headwinds:
    - point: 许可和施工排期可能大幅后滑，即便电力需求真实存在，软件预算也会被拖住。
      sourceRefs: [15, 16, 24, 29]
    - point: HALEU 和核材料处理会额外叠加限制，这不是通用工业软件开箱就能解决的。
      sourceRefs: [21, 26, 34]
    - point: 直接买家池仍小到只要少数项目延后，市场面貌就会迅速变化。
      sourceRefs: [5, 7, 15, 16]
competitors:
  - name: ETQ Reliance
    stage: incumbent
    wedge: 覆盖 40 多个应用的企业级 QMS，包含供应商质量、CAPA、审计和文档控制。
    pricing: 定制定价 / 以演示驱动
    strength: 在受监管制造业的工作流广度很深，而且已经有现成的质量采购动作。
    weaknessVsUs: 定位仍是横向平台；它并不主打核能供应商准入、部件谱系，或横跨反应堆与燃料项目的监管级审计资料包。
    sourceRefs: [17]
  - name: AssurX
    stage: incumbent
    wedge: 企业级质量和供应商质量软件，明确打出能源与公用事业定位。
    pricing: 定制定价 / 以演示驱动
    strength: 合规导向很强，对受监管行业也有垂直熟悉度。
    weaknessVsUs: 叙事更偏通用质量/合规，而不是核能专用就绪；也几乎看不到项目/部件级核能追溯的直接证据。
    sourceRefs: [18]
  - name: MasterControl Manufacturing Excellence
    stage: incumbent
    wedge: 面向受监管生产场景的无纸化制造、MES、电子日志和可审计质量工作流。
    pricing: 定制定价 / 以演示驱动
    strength: 制造执行链路更完整，审计轨迹叙事也很强。
    weaknessVsUs: 更偏生命科学制造运营，不是授标前供应商准入和首台反应堆证据链。
    sourceRefs: [19]
  - name: 内部工具栈 + 顾问
    stage: incumbent substitute
    wedge: 现有 ERP/PLM/文档库、内部 PMO 和领域顾问。
    pricing: 内部人力 + 服务费用
    strength: 在谨慎的核能项目里，信任度最高、组织阻力也最小。
    weaknessVsUs: 人力消耗重、数据零散，也很难沉淀可复用的供应商图谱或跨项目的高管可视化。
    sourceRefs: [8, 24, 25, 28]
regulatoryTechnicalConstraints:
  - point: 先进反应堆部署既要满足 NRC 的反应堆许可要求，燃料业务还可能单独面对 Part 70 许可和特殊核材料管控。
    sourceRefs: [6, 21, 26]
  - point: 任何工作流系统都必须接进现有 ERP、PLM、数字线程、云和受监管信息系统，而不能假设客户会在绿地环境重来一遍。
    sourceRefs: [25]
  - point: 供应商准入横跨长周期部件、燃料和施工，所以产品大概率会面对较重的实施和数据标准化工作。
    sourceRefs: [20, 22, 23, 24]
  - point: HALEU 和 TRISO 供应链，会比普通工业 QA 额外叠上链路保管、安全和审计要求。
    sourceRefs: [21, 26, 32, 34]
  - point: 对服务核能项目的创业公司来说，出口管制、合规和网络安全预期会异常严格。
    sourceRefs: [25, 35]
validationSignals:
  - point: X-energy 把 IPO 发行价提到每股 $23，上市首日又涨了 27%，说明公开市场对先进核能执行故事的热情很强。
    sourceRefs: [1, 2, 3]
  - point: Amazon 向 X-energy 投了约 $500M，并把这笔投资绑在到 2039 年超过 5 GW 的项目计划上。
    sourceRefs: [10, 11, 12]
  - point: Google 签下全球首个企业级协议，从多个 Kairos SMR 采购核电，证明超大规模云厂商愿意为早期需求兜底。
    sourceRefs: [13, 14]
  - point: X-energy 已在和 Doosan、SGL、Toyo Tanso、IHI 预留钢材和石墨产能，这强烈说明供应商就绪已经成了执行关键环节。
    sourceRefs: [20, 22, 30]
  - point: TRISO-X 拿下首个 Part 70 HALEU 燃料制造许可，并已开建 TX-1，这说明燃料侧商业化已经是运营问题，不再只是概念问题。
    sourceRefs: [21, 23]
  - point: Oklo 的大型数据中心协议说明客户拉力真实存在，但它在许可上的限制，也恰恰说明排期风险工具为什么可能重要。
    sourceRefs: [16, 29]
openQuestions:
  - 没有深厚前 NRC 或核能运营者背景的创业公司，能不能足够快拿到信任，贴着首批项目的工作流卖进去？
  - 首笔预算最容易从供应链、质量、IT，还是项目交付团队手里拿出来？
  - 哪条窄切口最能最快打出 ROI——供应商接入、批准制造商逻辑、谱系追踪，还是审计资料包生成？
  - 供应商会不会直接付费，还是供应商侧的商业化本质上只会是开发商交易上的一个模块？
