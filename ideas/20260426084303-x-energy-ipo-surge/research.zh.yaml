      - 6
      - 9
      - 21
      - 25
    threatOfSubstitutes:
      score: 5
      rationale: 电子表格、文档库、PLM/ERP、QMS 套件和咨询人力都能以低效但勉强可接受的方式完成这项工作，这正是该切口最核心的挑战。
      sourceRefs:
      - 8
      - 17
      - 18
      - 19
      - 25
    competitiveRivalry:
      score: 3
      rationale: 直接的核能原生软件竞争似乎有限，但来自相邻既有厂商的竞争仍然显著，因为它们已经掌握了邻近工作流和客户关系。
      sourceRefs:
      - 17
      - 18
      - 19
      - 25
  pestle:
  - factor: 政治
    impact: 正面
    point: DOE 的成本分摊和政策支持，正在把先进反应堆项目从概念阶段推向执行阶段。
    sourceRefs:
    - 5
    - 15
  - factor: 经济
    impact: 正面
    point: 超大规模云厂商对 24/7 电力的需求，正在为首批项目创造真实的商业牵引。
    sourceRefs:
    - 10
    - 11
    - 12
    - 13
  - factor: 社会
    impact: 中性
    point: 公众热情正在改善，但信任仍然会更多地给予那些能展示安全、可落地执行的项目，而非仅停留在演示材料。
    sourceRefs:
    - 1
    - 10
    - 15
  - factor: 技术
    impact: 正面
    point: TRISO 燃料、模块化反应堆和数字线程基础设施正在同步成熟，提升了对以证据为中心的运营软件的需求。
    sourceRefs:
