  - driver: 可能需要资格准入/证据工具的供应商侧机构
    value: "120 家机构（估算）"
    source: "[8][20][22][23][24][30]"
  - driver: 每个活跃开发商项目的年度平台支出
    value: "$0.5M 估算"
    source: "[17][18][19][27][28]"
  - driver: 供应商侧年度支出
    value: "$0.125M 估算"
    source: "[17][18][19]"
categoryDynamics:
  growthRate: "DOE 提到到 2050 年美国先进核能可达 200 GW 的路径（这是装机爬坡，不是软件 CAGR）"
  growthRateSourceRefs: [13]
  tailwinds:
    - point: "Amazon 和 Google 已开始通过明确项目和购电结构，为首波先进核能需求买单。"
      sourceRefs: [10, 11, 12, 13]
    - point: "DOE 支持，以及首台燃料和反应堆节点的推进，正在把市场从概念阶段推向部署阶段。"
      sourceRefs: [5, 15, 21, 23]
    - point: "X-energy 的供应商预留和燃料设施进展，说明商业化正变得更依赖供应商，也更依赖审计。"
      sourceRefs: [20, 21, 22, 23, 30]
  headwinds:
    - point: "许可和建设排期可能明显后移；即便电力需求是真实的，软件预算也会因此延后。"
      sourceRefs: [15, 16, 24, 29]
    - point: "HALEU 与核材料处理带来了通用工业软件开箱即用无法解决的约束。"
      sourceRefs: [21, 26, 34]
    - point: "直接买方池仍然小到只要少数几个项目延后，就会迅速改写整个市场。"
      sourceRefs: [5, 7, 15, 16]
competitors:
  - name: ETQ Reliance
    stage: incumbent
    wedge: "宽泛的企业级 QMS，包含 40 多个应用，覆盖供应商质量、CAPA、审计和文档控制。"
    pricing: "定制报价 / 演示驱动"
    strength: "在受监管制造业工作流上覆盖面深，而且已经建立质量软件采购动作。"
    weaknessVsUs: "定位偏横向；并未围绕核能供应商资格准入、部件谱系或跨反应堆/燃料项目的监管级审计包来销售。"
    sourceRefs: [17]
  - name: AssurX
    stage: incumbent
    wedge: "企业级质量与供应商质量软件，并明确服务能源与公用事业。"
    pricing: "定制报价 / 演示驱动"
    strength: "合规导向很强，对受监管行业也有垂直认知。"
    weaknessVsUs: "更像通用质量/合规框架，而非核能专用的就绪度系统；几乎看不到项目/部件级核能可追溯能力的明确证据。"
    sourceRefs: [18]
  - name: MasterControl Manufacturing Excellence
    stage: incumbent
    wedge: "面向受监管生产场景的无纸化制造、MES、日志和可直接审计质量工作流。"
    pricing: "定制报价 / 演示驱动"
    strength: "制造执行打得比较通，审计轨迹叙事也强。"
    weaknessVsUs: "更偏生命科学制造运营，而不是授标前的供应商资格准入和首台反应堆的证据链。"
    sourceRefs: [19]
  - name: In-house stack plus consultants
    stage: incumbent substitute
    wedge: "既有 ERP/PLM/文档仓库，叠加内部 PMO 和领域顾问。"
    pricing: "内部人力成本 + 服务支出"
    strength: "在谨慎的核能项目中，政治阻力最小，也最容易获得信任。"
    weaknessVsUs: "高度依赖人力、信息分散，而且难以在多个项目之间形成可复用的供应商图谱或实时管理可见性。"
    sourceRefs: [8, 24, 25, 28]
regulatoryTechnicalConstraints:
  - point: "先进反应堆部署必须满足 NRC 的反应堆许可要求，而燃料业务可能还要单独满足 Part 70 许可和特殊核材料控制。"
    sourceRefs: [6, 21, 26]
  - point: "任何工作流系统都必须与现有 ERP、PLM、数字线索、云和受监管信息系统集成，而不能假设客户可以从零搭一套新栈。"
    sourceRefs: [25]
  - point: "供应商资格准入覆盖长周期部件、燃料和施工，因此产品大概率会面临很重的实施和数据标准化工作。"
    sourceRefs: [20, 22, 23, 24]
  - point: "HALEU 和 TRISO 供应链会引入额外的 custody、安全和审计要求，超过了标准工业 QA 的复杂度。"
    sourceRefs: [21, 26, 32, 34]
  - point: "对于服务核能项目的创业公司来说，出口管制、合规和网络安全期望值都异常高。"
    sourceRefs: [25, 35]
validationSignals:
  - point: "X-energy 将 IPO 发行价上调至每股 $23，首日又上涨 27%，说明公开市场对先进核能执行故事兴趣强烈。"
    sourceRefs: [1, 2, 3]
  - point: "Amazon 向 X-energy 投资约 $500 million，并把这笔投资与到 2039 年超过 5 GW 的项目计划绑定在一起。"
    sourceRefs: [10, 11, 12]
  - point: "Google 签下首个企业层面的多台 Kairos SMR 核电购电协议，验证了超大规模云厂商愿意为早期需求买单。"
    sourceRefs: [13, 14]
  - point: "X-energy 已经与 Doosan、SGL、Toyo Tanso 和 IHI 预留钢材与石墨产能，这强烈说明供应商就绪度已经成了执行关键。"
    sourceRefs: [20, 22, 30]
  - point: "TRISO-X 拿下了首个 Part 70 HALEU 燃料制造许可，并正在建设 TX-1，说明燃料侧商业化已经进入实操阶段，而不是停留在概念里。"
    sourceRefs: [21, 23]
  - point: "Oklo 的大型数据中心协议说明客户拉力确实存在，但其许可方面的限制也说明了为什么面向排期风险的工具会变得重要。"
    sourceRefs: [16, 29]
openQuestions:
  - "一家没有深厚前 NRC 或核能运营背景的创业公司，能否足够快赢得信任，成为首批项目里的关键工作流层？"
  - "最容易打开的初始预算究竟来自供应链、质量、IT，还是项目交付？"
  - "哪个狭窄切口最容易最快证明 ROI：供应商入驻、已批准制造商逻辑、谱系追踪，还是审计包生成？"
  - "供应商会不会直接付费，还是说供应商变现本质上只是开发商销售上的一个附加模块？"
