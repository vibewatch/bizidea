assumptions:
  - id: A1
    name: Starting cash at model start
    value: "2600"
    unit: USDK
    source: "[BP fundingAsk $2-4M range]; base case uses a conservative in-range $2.6M pre-seed close at model start."
  - id: A2
    name: Developer paid pilot contract value
    value: "192"
    unit: USDK per pilot
    source: "[BP investorMemo.firstCustomer] $150K-300K paid pilot range; modeled as $60K onboarding plus 6 months at $22K MRR."
  - id: A3
    name: Production developer subscription
    value: "540"
    unit: USDK ARR
    source: "[BP investorMemo.firstCustomer] $400K-700K annual software after rollout; modeled at the midpoint-low end for conservatism."
  - id: A4
    name: Supplier organization module
    value: "144"
    unit: USDK ARR
    source: "[Research market.som and bottomUpSizingDrivers] supplier-side annual spend estimated at $125K; modeled at $144K to include compliance-heavy onboarding and support."
  - id: A5
    name: Supplier module onboarding fee
    value: "20"
    unit: USDK per new supplier logo
    source: "[Startup finance heuristic] light enterprise implementation for a module sale in a regulated workflow stack."
  - id: A6
    name: Pilot conversion timing
    value: "6"
    unit: months
    source: "[BP gtm funnelTargets] pilot-to-production 50%+ within 9 months; base case assumes successful pilots convert in 6 months."
  - id: A7
    name: New logo ramp
    value: "2 developer logos in Y1; 3 additional developers by end Y2; 8 supplier logos added across Y3"
    unit: customer timeline
    source: "[BP milestones] 2-3 design partners and 1 paid pilot in year 1, 2 production customers by months 12-24, and [Research som] 5 projects plus supplier expansion by year 3."
  - id: A8
    name: Cohort churn modeled in revenue build
    value: "0"
    unit: percent inside 36-month cohort model
    source: "[BP milestones and investorMemo] base case is dominated by new wins on multi-year project timelines; churn is held out of cohort revenue and handled separately in unit economics."
  - id: A9
    name: Unit economics monthly churn heuristic
    value: "2.0"
    unit: percent
    source: "[Startup finance heuristic] conservative steady-state churn for a niche enterprise workflow product before renewal data exists."
  - id: A10
    name: Fully loaded CEO cash cost
    value: "150"
    unit: USDK annual
    source: "[Startup finance heuristic] seed-stage founder salary kept below market."
  - id: A11
    name: Fully loaded engineering cash cost
    value: "205"
    unit: USDK annual per FTE
    source: "[Startup finance heuristic] enterprise integration/security engineers in a regulated vertical."
  - id: A12
    name: Fully loaded nuclear QA or product cash cost
    value: "195"
    unit: USDK annual per FTE
    source: "[BP team] domain-trusted nuclear workflow talent is required early; compensation modeled near senior specialist market."
  - id: A13
    name: Fully loaded solutions and customer success cash cost
    value: "165"
    unit: USDK annual per FTE
    source: "[BP team] implementation-heavy deployment motion requires experienced solutions talent."
  - id: A14
    name: Fully loaded sales and GTM cash cost
    value: "185"
    unit: USDK annual per FTE
    source: "[Startup finance heuristic] enterprise AE with meaningful variable pay in a technical vertical."
  - id: A15
    name: Fully loaded G&A and operations cash cost
    value: "135"
    unit: USDK annual per FTE
    source: "[Startup finance heuristic] lean finance and operations support."
  - id: A16
    name: Variable COGS ramp
    value: "31% of revenue in Y1; 28% in Y2; 25% in Y3"
    unit: percent of revenue
    source: "[BP businessModel targetGrossMarginPct 70] with [Research regulatoryTechnicalConstraints] implementation burden; margin improves as templates and connectors standardize."
  - id: A17
    name: Solutions payroll allocation
    value: "40% COGS; 35% sales and marketing; 25% G&A"
    unit: percent of solutions payroll
    source: "[BP product and gtm] solution engineers support implementation, presales integration work, and customer operations."
  - id: A18
    name: Non-payroll operating stack
    value: "R&D tools $7K/mo; GTM programs $5K/mo Y1, $8K/mo Y2, $12K/mo Y3; G&A overhead $11K/mo Y1, $14K/mo Y2, $17K/mo Y3"
    unit: USDK per month
    source: "[Startup finance heuristic] lean vertical SaaS software stack, travel, legal, insurance, and compliance overhead."
  - id: A19
    name: Variable selling expense
    value: "4.0"
    unit: percent of revenue
    source: "[Startup finance heuristic] travel, commissions, and partner referral spend on enterprise deals."
  - id: A20
    name: Funding objective
    value: "2600"
    unit: USDK
    source: "[BP fundingAsk] modeled pre-seed ask funds the MVP, design-partner conversions, and a 6-month buffer to seed proof."
