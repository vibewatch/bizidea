scenarios:
  downside:
    description: "Two developer programs slip by two quarters, pilot conversion stretches to 9 months, and supplier modules start one half later."
    y3RevenueK: 2330.0
    y3EbitdaK: -790.0
    cashLowPointK: -180.0
    keyAssumptionChanges:
      - "Developer start dates shift by 2 quarters."
      - "Pilot-to-production conversion moves from 6 months to 9 months."
      - "Steady-state gross margin tops out near 64% instead of 69.5%."
  base:
    description: "Five developer projects convert on schedule and eight supplier modules are added through Y3 with no modeled logo churn."
    y3RevenueK: 3325.0
    y3EbitdaK: -287.5
    cashLowPointK: 718.3
    keyAssumptionChanges:
      - "As modeled in the operating plan."
      - "Developer pilots convert after 6 months."
      - "Supplier module ramp begins in Q4Y2 and accelerates through Y3."
  upside:
    description: "One extra developer closes in Y2, supplier modules reach 10 by Q4Y3, and templates compress implementation load faster than planned."
    y3RevenueK: 4080.0
    y3EbitdaK: 120.0
    cashLowPointK: 820.0
    keyAssumptionChanges:
      - "One additional developer project closes by Q4Y2."
      - "Supplier logos reach 10 by Q4Y3."
      - "Steady-state gross margin rises to roughly 72% on better deployment leverage."
sensitivity:
  - variable: ARPU
    downsideCase: "Developer production contracts price 10% below base and supplier modules land at $130K ARR."
    baseCase: "Developer projects at $540K ARR and supplier modules at $144K ARR."
    upsideCase: "Developer projects land near $600K ARR with the same logo count."
    y3RevenueImpactK: -333.0
    cashImpactK: -250.0
  - variable: CAC
    downsideCase: "CAC rises 20% as deals require more travel, security diligence, and founder time."
    baseCase: "Blended CAC of $129.9K per new logo."
    upsideCase: "CAC falls 15% as referrals and partner channels mature."
    y3RevenueImpactK: -180.0
    cashImpactK: -260.0
  - variable: churn
    downsideCase: "Monthly churn moves to 3% once first renewals arrive."
    baseCase: "2% heuristic used for unit economics; no churn modeled in the 36-month cohort build."
    upsideCase: "Monthly churn stays near 1% because projects are tied to long program timelines."
    y3RevenueImpactK: -210.0
    cashImpactK: -170.0
  - variable: sales cycle
    downsideCase: "Average sales cycle extends from roughly 6 months to 9 months."
    baseCase: "Milestone-linked design partner motion closes logos on the current schedule."
    upsideCase: "Budget releases around financing and permit milestones pull deals forward by one quarter."
    y3RevenueImpactK: -520.0
    cashImpactK: -360.0
  - variable: gross margin
    downsideCase: "Gross margin reaches only 64.5% because implementation stays services-heavy."
    baseCase: "Gross margin exits near 69.5% as templates and connectors standardize."
    upsideCase: "Gross margin reaches 72% with stronger partner-assisted deployment."
    y3RevenueImpactK: 0.0
    cashImpactK: -166.0
  - variable: hiring pace
    downsideCase: "Two hires are pulled forward by two quarters before revenue catches up."
    baseCase: "Hiring follows the milestone-based quarter plan in this model."
    upsideCase: "One non-core hire is delayed until after the second production conversion."
    y3RevenueImpactK: 0.0
    cashImpactK: -330.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Leads --> DesignPartners
      DesignPartners --> PaidPilots
      PaidPilots --> ProductionProjects
      ProductionProjects --> SupplierModules
      ProductionProjects --> Revenue
      SupplierModules --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: Revenue engine
    finding: "Base case revenue comes from converting five $192K developer pilots into $540K production projects and then layering eight $144K supplier modules by Q4Y3."
  - checkName: Must go right
    finding: "Pilot conversions need to happen inside 6-9 months so a small GTM team can fund later supplier expansion without another early bridge round."
  - checkName: Model breaks if
    finding: "If reactor or fuel program timing slips by two quarters, downside cash goes negative before the company reaches seed-quality proof."
  - checkName: Next-round proof
    finding: "The next round is justified when two production nuclear customers are live, partner-assisted deployments cut delivery drag, and Q4Y3 EBITDA turns positive."
sanityChecks:
  ruleOf40: "Y3 growth 84.5% + EBITDA margin -8.6% = 75.9%."
  burnMultiple: "Y2 burn multiple 0.4x on $703.9K net burn and $1.76M net new ARR; Q4Y3 EBITDA is positive."
  revenuePerFte: "$271K Y3 on 12.25 average FTE (benchmark roughly $200K-$400K for vertical SaaS)."
  flags:
    - "The market is still narrow, so five developer projects drive a large share of recurring revenue and concentration risk remains high."
    - "The base case assumes no logo churn in the 36-month revenue cohort build; real renewals could underperform the separate 2% monthly churn heuristic."
    - "Q4Y3 only barely turns EBITDA positive, so a slower deployment tempo would likely require either a larger pre-seed or tighter hiring discipline."
    - "The Q4Y3 exit run-rate is close to the research SOM, so the venture case still depends on adjacency expansion after the nuclear wedge."
