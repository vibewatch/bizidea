differentiator: 通用制造软件可以跟踪文档，但不会编码核能项目如何完成供应商资格认定、如何把证据与部件谱系绑定、以及如何跨反应堆和燃料工作流通过外部审计。该公司将围绕先进核能证据链、合格供应商逻辑和首台示范项目交付进行专门构建。如果它成为 OEM 与其供应商体系之间的运营层，就能积累独特的流程数据，知道哪些供应商真正具备部署能力，而不只是合同上被批准。
