jobsToBeDone:
  - job: 当首台套反应堆项目进入供应商遴选时，帮供应链负责人更快把供应商做完准入，这样他们在授标时就不会带着没暴露出来的合规风险。
    currentAlternative: 用电子表格和共享文件夹维护手工供应商清单
    successMetric: 从提名供应商到拿到批准状态的天数
  - job: 当监管方、客户或内部质量团队要证据时，帮质量组织迅速拼出完整的审计资料包，这样采购和施工不会被拖慢。
    currentAlternative: 手工从 PLM、邮件、顾问和文件共享里四处找文档
    successMetric: 产出完整审计包所需小时数
ideaScorecard:
  signalStrength:
    score: 5
    rationale: 多条已验证信号都指向同一件事：先进核能需求是真的，而真正卡进度的已经是商业化执行层。
  painIntensity:
    score: 5
    rationale: 供应商准入或审计失败，足以让首个电站延期、预算失控，甚至在强监管市场里直接威胁融资。
  wedgeClarity:
    score: 5
    rationale: 首个工作流足够窄、足够急，而且明确归属于有预算、有人负责的团队。
  defensibility:
    score: 4
    rationale: 工作流深度、领域模板、系统集成和跨项目的供应商履约数据，能够慢慢堆出真正的护城河。
  ventureScale:
    score: 4
    rationale: 滩头市场很窄，但后面可以往受监管工业供应链和关键基础设施交付的操作系统扩出去。
topRisks:
  - name: 部署节奏偏慢
    description: 先进核能项目时间表可能继续往后滑，预算释放会更慢，短期里市场看起来也会比实际更小。
    mitigation: 先卖那些在电站投运前数年就已经开始的准入工作，再向有同类追溯痛点的受监管行业扩张。
  - name: 现有厂商栈位根深蒂固
    description: 客户可能更愿意拉长现有 PLM、QMS 或顾问关系的寿命，而不是上一个新平台。
    mitigation: 把产品定位成一层很薄的编排和证据层，先接入现有系统，并先在单个项目上把 ROI 证明出来。
  - name: 行业信任门槛
    description: 如果创业公司缺少足够深的 QA 和监管背书，核能买方不会信。
    mitigation: 团队里尽早引入做过核能质量、采购和监管的一线操盘手，并用共创客户在大规模销售前先把真实证据工作流写进产品里。
