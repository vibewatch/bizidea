jobsToBeDone:
- job: 当首台示范反应堆项目进入供应商选择阶段时，帮助供应链负责人更快完成供应商资格认定，从而在没有隐藏合规风险的情况下完成授标。
  currentAlternative: 用电子表格和共享文件夹手工维护供应商检查清单
  successMetric: 从提名供应商到获批状态所需的天数
- job: 当监管机构、客户或内部质量团队要求提供证据时，帮助质量组织快速组装完整的审计包，从而保证采购与建设按计划推进。
  currentAlternative: 手工从 PLM、邮件、顾问和文件共享中提取文档
  successMetric: 生成完整审计包所需的小时数
ideaScorecard:
  signalStrength:
    score: 5
    rationale: 多个已验证信号共同指向同一结论：先进核能需求真实存在，而商业化执行如今已成为关键制约层。
  painIntensity:
    score: 5
    rationale: 在高度监管的市场中，供应商资格认定和审计失败会推迟首厂建设、侵蚀预算，并威胁融资。
  wedgeClarity:
    score: 5
    rationale: 初始工作流足够聚焦、足够紧迫，并由拥有明确预算的可识别团队负责。
  defensibility:
    score: 4
    rationale: 工作流深度、领域模板、集成能力以及跨项目供应商绩效数据，有机会叠加形成有意义的护城河。
  ventureScale:
    score: 4
    rationale: 虽然起步市场较窄，但它可以扩展为受监管工业供应链和关键基础设施交付的更广义操作系统。
topRisks:
- name: 部署时间线缓慢
  description: 先进核能项目进度可能推迟，导致预算释放延后，并让短期市场显得更小。
  mitigation: 切入在电站投运前数年就会启动的资格认定工作，并扩展到具有相似追溯痛点的相邻受监管行业。
- name: 既有技术栈根深蒂固
  description: 客户可能会尽量延展现有 PLM、QMS 或咨询合作关系，而不是采用新平台。
  mitigation: 将产品定位为可与既有系统集成的轻量编排和证据层，并先在单个项目上证明 ROI。
- name: 领域信任缺口
  description: 如果一家创业公司缺乏深厚的 QA 与监管公信力，核能买方不会信任它。
  mitigation: 由前核能质量、采购和监管操盘手共同打造产品，并通过设计合作伙伴在扩大销售前固化真实证据工作流。
