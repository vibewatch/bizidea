jobsToBeDone:
  - job: "当首台示范反应堆项目进入供应商遴选阶段时，帮助供应链负责人更快完成供应商资格准入，这样他们就能在没有隐藏合规风险的情况下完成授标。"
    currentAlternative: "用电子表格和共享文件夹手工维护供应商清单"
    successMetric: "从供应商提名到获批所需的天数"
  - job: "当监管方、客户或内部质量团队要求提交证据时，帮助质量组织快速拼出完整审计包，这样采购和建设进度就不会被拖慢。"
    currentAlternative: "手工从 PLM、邮件、顾问和文件共享中拉取材料"
    successMetric: "生成完整审计包所需的小时数"
ideaScorecard:
  signalStrength:
    score: 5
    rationale: "多个已验证信号都指向同一个结论：先进核能需求真实存在，而商业化执行如今才是真正的卡点。"
  painIntensity:
    score: 5
    rationale: "供应商资格准入和审计失手，足以拖慢首座电站、打爆预算，并在高监管市场里危及融资。"
  wedgeClarity:
    score: 5
    rationale: "初始工作流足够聚焦、足够紧迫，而且归属于有明确预算的具体团队。"
  defensibility:
    score: 4
    rationale: "工作流深度、领域模板、系统集成以及跨项目供应商绩效数据，可以逐步累积成一条有分量的护城河。"
  ventureScale:
    score: 4
    rationale: "滩头市场本身偏窄，但后续可以扩展为受监管工业供应链和关键基础设施交付的更广泛操作系统。"
topRisks:
  - name: "部署周期缓慢"
    description: "先进核能项目排期可能继续后移，导致预算释放推迟，让短期市场规模看起来更小。"
    mitigation: "先卖给那些会在电站投运前数年就启动的资格准入工作，再逐步切入具有相似可追溯痛点的相邻受监管行业。"
  - name: "既有系统栈根深蒂固"
    description: "客户可能更愿意继续拉长现有 PLM、QMS 或顾问合作关系，而不是采用新平台。"
    mitigation: "把产品定位成一层轻量的编排与证据层，先在单个项目上证明 ROI，并与既有系统集成。"
  - name: "领域信任缺口"
    description: "如果一家创业公司缺少深厚的 QA 和监管公信力，核能买方不会轻易信任。"
    mitigation: "让前核能质量、采购和监管一线操盘手参与共建，并通过共创客户把真实证据工作流先固化下来，再扩大销售。"
