  fiveForces:
    supplierPower:
      score: 4
      rationale: Nuclear-domain experts, regulator-literate operators, and qualified supplier data are scarce; X-energy's supply-chain buildout and multi-country reservations show how concentrated the capability base still is.
      sourceRefs: [8, 20, 22, 23]
    buyerPower:
      score: 4
      rationale: There are few credible near-term buyers, each large enough to demand integrations and enterprise controls, and adjacent software alternatives are already quote-led enterprise sales motions.
      sourceRefs: [17, 18, 19, 25]
    threatOfEntrants:
      score: 3
      rationale: Generic workflow tooling is easy to build, but earning trust in nuclear delivery, licensing, and supplier QA is materially harder.
      sourceRefs: [6, 9, 21, 25]
    threatOfSubstitutes:
      score: 5
      rationale: Spreadsheets, document repositories, PLM/ERP, QMS suites, and consulting labor can all satisfy the job badly but acceptably, which is the core wedge challenge.
      sourceRefs: [8, 17, 18, 19, 25]
    competitiveRivalry:
      score: 3
      rationale: Direct nuclear-native software competition appears limited, but rivalry from adjacent incumbents is meaningful because they already own adjacent workflows and relationships.
      sourceRefs: [17, 18, 19, 25]
  pestle:
    - factor: political
      impact: positive
      point: DOE cost-share and policy support are pulling advanced reactor projects from concept toward execution.
      sourceRefs: [5, 15]
    - factor: economic
      impact: positive
      point: Hyperscaler demand for 24/7 power is creating real commercial pull for first projects.
      sourceRefs: [10, 11, 12, 13]
    - factor: social
      impact: neutral
      point: Public enthusiasm is improving, but trust still accrues to projects that demonstrate safe, tangible execution rather than slideware.
      sourceRefs: [1, 10, 15]
    - factor: technological
      impact: positive
      point: TRISO fuel, modular reactors, and digital-thread infrastructure are maturing together, increasing the need for evidence-centric operating software.
      sourceRefs: [21, 23, 25, 31, 32, 34]
    - factor: legal
      impact: negative
      point: Fuel licensing and special-nuclear-material controls add security, documentation, and audit requirements that slow procurement and integrations.
      sourceRefs: [21, 26]
    - factor: environmental
      impact: positive
      point: Industrial decarbonization and carbon-free baseload narratives are helping nuclear projects win corporate attention.
      sourceRefs: [10, 12, 24]
  adoptionFrictionMatrix:
    - friction: Trust and nuclear-domain credibility
      severity: high
      affectedBuyer: Supply-chain, quality, and regulatory leaders
      mitigation: Sell with former nuclear operators and prove one narrow workflow before claiming system-of-record status.
      sourceRefs: [8, 9, 21]
    - friction: Integration with existing ERP, PLM, and document systems
      severity: high
      affectedBuyer: CIO and program operations
      mitigation: Position as orchestration/evidence layer with minimal rip-and-replace.
      sourceRefs: [19, 25]
    - friction: Small buyer universe and slow enterprise procurement
      severity: high
      affectedBuyer: Founding GTM team
      mitigation: Target catalyst moments such as permit submissions, financing, and first supplier awards.
      sourceRefs: [3, 4, 21, 22, 24]
    - friction: Supplier data normalization and genealogy setup
      severity: medium
      affectedBuyer: Project delivery and quality teams
      mitigation: Start with one component family and reusable evidence templates.
      sourceRefs: [20, 22, 23, 24]
    - friction: Security and compliance requirements for sensitive nuclear data
      severity: high
      affectedBuyer: Legal, compliance, and IT security
      mitigation: Build around nuclear-grade information controls, audit trails, and role-based access from day one.
      sourceRefs: [21, 25, 26, 35]
