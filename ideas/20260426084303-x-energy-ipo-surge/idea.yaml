jobsToBeDone:
  - job: When a first-of-a-kind reactor project enters vendor selection, help the supply-chain leader qualify suppliers faster, so they can award packages without hidden compliance risk.
    currentAlternative: Manual supplier checklists in spreadsheets and shared folders
    successMetric: Days from supplier nomination to approved status
  - job: When regulators, customers, or internal quality teams request evidence, help the quality organization assemble a complete audit package quickly, so they can keep procurement and construction on schedule.
    currentAlternative: Pulling documents from PLM, email, consultants, and file shares by hand
    successMetric: Hours required to produce a complete audit packet
ideaScorecard:
  signalStrength:
    score: 5
    rationale: Multiple verified signals converge on the same conclusion that advanced nuclear demand is real and commercialization execution is now the gating layer.
  painIntensity:
    score: 5
    rationale: Supplier qualification and audit failure can delay first plants, destroy budgets, and threaten financing in a highly regulated market.
  wedgeClarity:
    score: 5
    rationale: The initial workflow is narrow, urgent, and owned by identifiable teams with active budgets.
  defensibility:
    score: 4
    rationale: Workflow depth, domain templates, integrations, and cross-project supplier performance data can compound into a meaningful moat.
  ventureScale:
    score: 4
    rationale: The beachhead is niche, but it expands into the broader operating system for regulated industrial supply chains and critical infrastructure delivery.
topRisks:
  - name: Slow deployment timelines
    description: Advanced nuclear project schedules may slip, delaying budget release and making the market look smaller in the near term.
    mitigation: Sell into qualification work that starts years before plant operation and expand into adjacent regulated sectors that share similar traceability pain.
  - name: Entrenched incumbent stack
    description: Customers may try to stretch existing PLM, QMS, or consulting relationships instead of adopting a new platform.
    mitigation: Position the product as a thin orchestration and evidence layer that integrates with incumbent systems and proves ROI on one project first.
  - name: Domain trust gap
    description: Nuclear buyers will not trust a startup that lacks deep QA and regulatory credibility.
    mitigation: Build with former nuclear quality, procurement, and regulatory operators and use design partners to codify real evidence workflows before scaling sales.
