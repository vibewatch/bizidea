slug: nuclear-supplier-readiness
date: 2026-04-26
currency: USD
modelStartMonth: 2026-05
assumptions:
  - id: A1
    name: 起始现金余额
    value: "2600"
    unit: USDK
    source: "[BP fundingAsk $2-4M range]；基准情景采用区间内偏保守的 $2.6M pre-seed 融资，并在模型起始月到账。"
  - id: A2
    name: 开发商付费试点合同金额
    value: "192"
    unit: USDK per pilot
    source: "[BP investorMemo.firstCustomer] 的 $150K-300K 付费试点区间；模型按 $60K 启动费加 6 个月、每月 $22K MRR 计算。"
  - id: A3
    name: 开发商生产订阅合同
    value: "540"
    unit: USDK ARR
    source: "[BP investorMemo.firstCustomer] 中 rollout 后 $400K-700K 年度软件收入；模型按中低位取值以保持保守。"
  - id: A4
    name: 供应商机构模块
    value: "144"
    unit: USDK ARR
    source: "[Research market.som and bottomUpSizingDrivers] 估算供应商侧年支出约为 $125K；模型设为 $144K，以覆盖更重的合规入驻与支持。"
  - id: A5
    name: 供应商模块入驻费
    value: "20"
    unit: USDK per new supplier logo
    source: "[Startup finance heuristic] 适用于受监管工作流栈中轻量级企业模块销售的实施费假设。"
  - id: A6
    name: 试点转生产周期
    value: "6"
    unit: months
    source: "[BP gtm funnelTargets] 试点在 9 个月内转生产达到 50%+；基准情景假设成功试点在 6 个月后转化。"
  - id: A7
    name: 新客户爬坡节奏
    value: "Y1 拿下 2 家开发商；Y2 结束前再增加 3 家开发商；Y3 期间新增 8 家供应商客户"
    unit: customer timeline
    source: "[BP milestones] 第 1 年拿下 2-3 个共创客户并完成 1 个付费试点；第 12-24 个月拿下 2 个生产客户；以及 [Research som] 第 3 年做到 5 个项目并扩展供应商侧。"
  - id: A8
    name: 收入模型中的 cohort 流失
    value: "0"
    unit: percent inside 36-month cohort model
    source: "[BP milestones and investorMemo] 基准情景主要由多年度项目上的新增客户驱动；cohort 收入模型里暂不计流失，相关影响放在单位经济模型单独处理。"
  - id: A9
    name: 单位经济月度流失率启发式
    value: "2.0"
    unit: percent
    source: "[Startup finance heuristic] 在续约数据尚未形成前，针对小众企业工作流产品采用偏保守的稳定月流失假设。"
  - id: A10
    name: CEO 全成本现金支出
    value: "150"
    unit: USDK annual
    source: "[Startup finance heuristic] 种子前阶段创始人工资低于市场水平。"
  - id: A11
    name: 工程岗位全成本现金支出
    value: "205"
    unit: USDK annual per FTE
    source: "[Startup finance heuristic] 面向受监管垂直行业的企业级集成与安全工程师成本。"
  - id: A12
    name: 核能 QA 或产品岗位全成本现金支出
    value: "195"
    unit: USDK annual per FTE
    source: "[BP team] 早期必须配备受信任的核能工作流人才；薪酬按资深专家市场水平建模。"
  - id: A13
    name: 解决方案与客户成功岗位全成本现金支出
    value: "165"
    unit: USDK annual per FTE
    source: "[BP team] 重实施的部署模式需要经验丰富的解决方案人才。"
  - id: A14
    name: 销售与 GTM 岗位全成本现金支出
    value: "185"
    unit: USDK annual per FTE
    source: "[Startup finance heuristic] 技术型垂直市场中的企业 AE，需要具备较高浮动薪酬。"
  - id: A15
    name: G&A 与运营岗位全成本现金支出
    value: "135"
    unit: USDK annual per FTE
    source: "[Startup finance heuristic] 精简财务与运营支持团队的成本。"
  - id: A16
    name: 可变 COGS 爬坡
    value: "Y1 为收入的 31%；Y2 为 28%；Y3 为 25%"
    unit: percent of revenue
    source: "[BP businessModel targetGrossMarginPct 70] 叠加 [Research regulatoryTechnicalConstraints] 所体现的实施负担；随着模板和连接器标准化，毛利逐步改善。"
  - id: A17
    name: 解决方案团队薪酬分摊
    value: "40% 计入 COGS；35% 计入销售与市场；25% 计入 G&A"
    unit: percent of solutions payroll
    source: "[BP product and gtm] 解决方案工程师既支持实施，也支撑售前集成和客户运营。"
  - id: A18
    name: 非薪酬运营支出栈
    value: "R&D 工具每月 $7K；GTM 项目 Y1 每月 $5K、Y2 每月 $8K、Y3 每月 $12K；G&A 开销 Y1 每月 $11K、Y2 每月 $14K、Y3 每月 $17K"
    unit: USDK per month
    source: "[Startup finance heuristic] 适用于垂直 SaaS 的精简软件栈、差旅、法务、保险与合规开销。"
  - id: A19
    name: 可变销售费用
    value: "4.0"
    unit: percent of revenue
    source: "[Startup finance heuristic] 面向企业交易的差旅、佣金和伙伴转介支出。"
  - id: A20
    name: 融资目标
    value: "2600"
    unit: USDK
    source: "[BP fundingAsk] 模型中的 pre-seed 融资将覆盖 MVP、共创客户转化，以及为拿到种子轮证明预留 6 个月缓冲。"
