scenarios:
  downside:
    description: 两个开发商项目均推迟两个季度，试点转化拉长至 9 个月，且供应商模块晚半个周期启动。
    y3RevenueK: 2330.0
    y3EbitdaK: -790.0
    cashLowPointK: -180.0
    keyAssumptionChanges:
    - 开发商项目启动时间整体后移 2 个季度。
    - 试点转生产时间从 6 个月延长到 9 个月。
    - 稳态毛利率最高仅约 64%，而不是 69.5%。
  base:
    description: 5 个开发商项目按计划转化，并在第三年内新增 8 个供应商模块，且未假设客户标识流失。
    y3RevenueK: 3325.0
    y3EbitdaK: -287.5
    cashLowPointK: 718.3
    keyAssumptionChanges:
    - 按运营计划建模。
    - 开发商试点在 6 个月后转化。
    - 供应商模块爬坡从 Q4Y2 开始，并在第三年加速。
  upside:
    description: 第二年额外签下 1 个开发商，供应商模块在 Q4Y3 达到 10 个，且模板使实施负担比计划更快下降。
    y3RevenueK: 4080.0
    y3EbitdaK: 120.0
    cashLowPointK: 820.0
    keyAssumptionChanges:
    - 在 Q4Y2 前额外签下 1 个开发商项目。
    - 供应商客户在 Q4Y3 达到 10 个。
    - 依靠更强的部署杠杆，稳态毛利率提升至约 72%。
sensitivity:
- variable: ARPU
  downsideCase: 开发商生产合同价格比基准低 10%，且供应商模块仅做到 $130K ARR。
  baseCase: 开发商项目按 $540K ARR，供应商模块按 $144K ARR。
  upsideCase: 在客户数量不变的情况下，开发商项目接近 $600K ARR。
  y3RevenueImpactK: -333.0
  cashImpactK: -250.0
- variable: CAC
  downsideCase: 随着交易需要更多差旅、安全尽调和创始人时间，CAC 上升 20%。
  baseCase: 每个新客户标识的综合 CAC 为 $129.9K。
  upsideCase: 随着转介绍和合作伙伴渠道成熟，CAC 下降 15%。
  y3RevenueImpactK: -180.0
  cashImpactK: -260.0
- variable: 流失率
  downsideCase: 在首批续约到来后，月流失率升至 3%。
  baseCase: 单位经济采用 2% 经验值；36 个月队列收入模型中未计流失。
  upsideCase: 由于项目与长期计划周期绑定，月流失率维持在约 1%。
  y3RevenueImpactK: -210.0
  cashImpactK: -170.0
- variable: 销售周期
  downsideCase: 平均销售周期从约 6 个月延长至 9 个月。
  baseCase: 与里程碑绑定的设计合作伙伴动作，按当前节奏完成客户签约。
  upsideCase: 围绕融资和许可里程碑的预算释放，使交易提前 1 个季度。
  y3RevenueImpactK: -520.0
  cashImpactK: -360.0
- variable: 毛利率
  downsideCase: 由于实施仍偏服务化，毛利率只能达到 64.5%。
  baseCase: 随着模板和连接器标准化，退出时毛利率约为 69.5%。
  upsideCase: 借助更强的合作伙伴协同部署，毛利率达到 72%。
  y3RevenueImpactK: 0.0
  cashImpactK: -166.0
- variable: 招聘节奏
  downsideCase: 在收入尚未跟上前，有 2 个岗位提前 2 个季度招聘。
  baseCase: 招聘遵循本模型中基于里程碑的季度计划。
  upsideCase: 1 个非核心岗位延后到第二个生产客户转化之后再招。
  y3RevenueImpactK: 0.0
  cashImpactK: -330.0
modelDiagram:
  title: 单位经济流转
  mermaid: "flowchart LR\n  Leads[线索] --> DesignPartners[设计合作伙伴]\n  DesignPartners --> PaidPilots[付费试点]\n  PaidPilots --> ProductionProjects[生产项目]\n  ProductionProjects --> SupplierModules[供应商模块]\n  ProductionProjects --> Revenue[收入]\n  SupplierModules --> Revenue\n  Revenue --> GrossProfit[毛利润]\n  GrossProfit --> Cash[现金]\n"
modelSanity:
- checkName: 收入引擎
  finding: 基准情景收入来自把 5 个 $192K 的开发商试点转化为 $540K 的生产项目，并在此基础上于 Q4Y3 前叠加 8 个 $144K 的供应商模块。
- checkName: 必须顺利发生的事
  finding: 试点需要在 6-9 个月内完成转化，这样一个小型 GTM 团队才能在无需额外过桥融资的情况下，支撑后续供应商侧扩张。
- checkName: 模型失效条件
  finding: 如果反应堆或燃料项目时间线推迟两个季度，下行情景中的现金将在公司拿到可支撑种子轮的证据前转负。
- checkName: 下一轮融资证明
  finding: 当 2 个核能生产客户真正上线、合作伙伴协同部署降低交付拖累，且 Q4Y3 EBITDA 转正时，下一轮融资才更有说服力。
sanityChecks:
  ruleOf40: Y3 增长率 84.5% + EBITDA 利润率 -8.6% = 75.9%。
  burnMultiple: Y2 的 burn multiple 为 0.4x，对应 $703.9K 净烧钱和 $1.76M 净新增 ARR；Q4Y3 EBITDA 为正。
  revenuePerFte: Y3 每名 FTE 收入为 $271K，按平均 12.25 名 FTE 计算（垂直 SaaS 基准约为 $200K-$400K）。
  flags:
  - 市场仍然狭窄，因此 5 个开发商项目贡献了较大比例的经常性收入，客户集中风险仍高。
  - 基准情景在 36 个月收入队列模型中未计入客户标识流失；实际续约表现可能弱于单独使用的 2% 月流失率经验值。
  - Q4Y3 只是勉强实现 EBITDA 转正，因此若部署节奏稍慢，很可能需要更大的 pre-seed 融资或更严格的招聘纪律。
  - Q4Y3 的退出 run-rate 已接近研究中的 SOM，因此创投逻辑仍依赖在核能切口之外做相邻扩张。
