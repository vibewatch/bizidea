scenarios:
  downside:
    description: "两家开发商项目各延后两个季度，试点转生产拉长到 9 个月，供应商模块启动时间再晚半个周期。"
    y3RevenueK: 2330.0
    y3EbitdaK: -790.0
    cashLowPointK: -180.0
    keyAssumptionChanges:
      - "开发商启动时间整体后移 2 个季度。"
      - "试点转生产周期从 6 个月延长到 9 个月。"
      - "稳定态毛利率最高只能到约 64%，而不是 69.5%。"
  base:
    description: "5 个开发商项目按计划转化，且到 Y3 期间新增 8 个供应商模块，不考虑 logo 流失。"
    y3RevenueK: 3325.0
    y3EbitdaK: -287.5
    cashLowPointK: 718.3
    keyAssumptionChanges:
      - "按当前经营计划执行。"
      - "开发商试点在 6 个月后转生产。"
      - "供应商模块从 Q4Y2 开始爬坡，并在 Y3 加速。"
  upside:
    description: "Y2 多签下一家开发商，Q4Y3 前供应商模块达到 10 个，且模板让实施负担下降得比计划更快。"
    y3RevenueK: 4080.0
    y3EbitdaK: 120.0
    cashLowPointK: 820.0
    keyAssumptionChanges:
      - "到 Q4Y2 前额外拿下一家开发商项目。"
      - "到 Q4Y3 前供应商 logo 达到 10 个。"
      - "依靠更高效的部署杠杆，稳定态毛利率提升到约 72%。"
sensitivity:
  - variable: ARPU
    downsideCase: "开发商生产合同价格比基准低 10%，供应商模块落在 $130K ARR。"
    baseCase: "开发商项目按 $540K ARR，供应商模块按 $144K ARR。"
    upsideCase: "在客户数不变的情况下，开发商项目成交价接近 $600K ARR。"
    y3RevenueImpactK: -333.0
    cashImpactK: -250.0
  - variable: CAC
    downsideCase: "随着差旅、安全尽调和创始人投入上升，CAC 增加 20%。"
    baseCase: "综合 CAC 为每个新 logo $129.9K。"
    upsideCase: "随着转介绍和伙伴渠道成熟，CAC 下降 15%。"
    y3RevenueImpactK: -180.0
    cashImpactK: -260.0
  - variable: churn
    downsideCase: "首批续约到来后，月流失率升至 3%。"
    baseCase: "单位经济里采用 2% 的启发式假设；36 个月 cohort 收入模型中不计流失。"
    upsideCase: "由于项目绑定长周期计划，月流失率维持在约 1%。"
    y3RevenueImpactK: -210.0
    cashImpactK: -170.0
  - variable: 销售周期
    downsideCase: "平均销售周期从约 6 个月拉长到 9 个月。"
    baseCase: "与里程碑绑定的共创客户打法按当前节奏签下客户。"
    upsideCase: "围绕融资和许可节点的预算释放让成交提前一个季度。"
    y3RevenueImpactK: -520.0
    cashImpactK: -360.0
  - variable: 毛利率
    downsideCase: "由于实施持续偏服务化，毛利率最高只能到 64.5%。"
    baseCase: "随着模板和连接器标准化，退出期毛利率接近 69.5%。"
    upsideCase: "依靠更强的伙伴辅助部署，毛利率提升到 72%。"
    y3RevenueImpactK: 0.0
    cashImpactK: -166.0
  - variable: 招聘节奏
    downsideCase: "在收入尚未跟上前，两名员工提前两个季度入职。"
    baseCase: "招聘按本模型中的里程碑季度计划推进。"
    upsideCase: "一名非核心岗位延后到第二个生产转化完成后再招聘。"
    y3RevenueImpactK: 0.0
    cashImpactK: -330.0
modelDiagram:
  title: 单位经济流转图
  mermaid: |
    flowchart LR
      Leads --> DesignPartners
      DesignPartners --> PaidPilots
      PaidPilots --> ProductionProjects
      ProductionProjects --> SupplierModules
      ProductionProjects --> Revenue
      SupplierModules --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: 收入引擎
    finding: "基准情景收入来自 5 个价值 $192K 的开发商试点转成 $540K 的生产项目，再到 Q4Y3 前叠加 8 个价值 $144K 的供应商模块。"
  - checkName: 必须做对的事
    finding: "试点必须在 6-9 个月内转生产，小规模 GTM 团队才有机会靠后续供应商扩张自我供血，而不是提前再搭一轮过桥融资。"
  - checkName: 模型何时失效
    finding: "如果反应堆或燃料项目节奏后移两个季度，悲观情景下公司会在达到种子轮级证明前先把现金烧穿。"
  - checkName: 下一轮融资证明
    finding: "当两家核能生产客户上线、伙伴辅助部署降低交付负担、且 Q4Y3 EBITDA 转正时，下一轮融资才真正站得住。"
sanityChecks:
  ruleOf40: "Y3 增长 84.5% + EBITDA 利润率 -8.6% = 75.9%。"
  burnMultiple: "Y2 burn multiple 为 0.4x，对应 $703.9K 净烧钱和 $1.76M 净新增 ARR；Q4Y3 EBITDA 转正。"
  revenuePerFte: "按 12.25 名平均 FTE 计算，Y3 每名员工对应收入为 $271K（垂直 SaaS 常见基准约为 $200K-$400K）。"
  flags:
