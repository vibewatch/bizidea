slug: nuclear-supplier-readiness
date: 2026-04-26
currency: USD
modelStartMonth: 2026-05
assumptions:
- id: A1
  name: 模型起始时的初始现金
  value: '2600'
  unit: USDK
  source: '[BP fundingAsk $2-4M range]；基准情景采用区间内相对保守的 $2.6M，假设在模型起始时完成 pre-seed 融资。'
- id: A2
  name: 开发商付费试点合同金额
  value: '192'
  unit: USDK per pilot
  source: '[BP investorMemo.firstCustomer] 付费试点区间为 $150K-300K；模型按 $60K 导入费加 6 个月、每月 $22K MRR 计。'
- id: A3
  name: 开发商生产订阅
  value: '540'
  unit: USDK ARR
  source: '[BP investorMemo.firstCustomer] 上线后的年软件合同为 $400K-700K；模型按偏低中位数计，以保持保守。'
- id: A4
  name: 供应商组织模块
  value: '144'
  unit: USDK ARR
  source: '[Research market.som and bottomUpSizingDrivers] 供应商侧年支出估算为 $125K；模型按 $144K 计入，以覆盖高合规导入和支持。'
- id: A5
  name: 供应商模块导入费
  value: '20'
  unit: USDK per new supplier logo
  source: '[Startup finance heuristic] 在受监管工作流技术栈中，模块销售通常对应较轻量的企业实施。'
- id: A6
  name: 试点转化周期
  value: '6'
  unit: months
  source: '[BP gtm funnelTargets] 试点到生产在 9 个月内转化率为 50%+；基准情景假设成功试点在 6 个月内转化。'
- id: A7
  name: 新客户爬坡
  value: Y1 2 个开发商客户；到 Y2 末新增 3 个开发商；Y3 累计新增 8 个供应商客户
  unit: customer timeline
  source: '[BP milestones] 第一年有 2-3 个设计合作伙伴和 1 个付费试点，第 12-24 个月有 2 个生产客户，且 [Research som] 显示到第三年有 5 个项目并向供应商扩张。'
- id: A8
  name: 收入模型中假设的队列流失
  value: '0'
  unit: percent inside 36-month cohort model
  source: '[BP milestones and investorMemo] 基准情景主要由多年度项目时间线上的新增获客驱动；队列收入中不计流失，流失单独体现在单位经济模型。'
- id: A9
  name: 单位经济月流失率经验值
  value: '2.0'
  unit: percent
  source: '[Startup finance heuristic] 在尚未有续约数据前，针对细分企业工作流产品采用保守的稳态流失率。'
- id: A10
  name: CEO 全成本现金支出
  value: '150'
  unit: USDK annual
  source: '[Startup finance heuristic] 种子前阶段创始人薪资低于市场水平。'
- id: A11
  name: 工程岗位全成本现金支出
  value: '205'
  unit: USDK annual per FTE
  source: '[Startup finance heuristic] 面向受监管垂直行业的企业集成/安全工程师。'
- id: A12
  name: 核能 QA/产品岗位全成本现金支出
  value: '195'
  unit: USDK annual per FTE
  source: '[BP team] 早期必须配备值得信赖的核能工作流人才；薪酬按高级专业人才市场水平建模。'
- id: A13
  name: 解决方案与客户成功岗位全成本现金支出
  value: '165'
  unit: USDK annual per FTE
  source: '[BP team] 以实施为核心的部署方式需要有经验的解决方案人才。'
- id: A14
  name: 销售与 GTM 岗位全成本现金支出
  value: '185'
  unit: USDK annual per FTE
  source: '[Startup finance heuristic] 技术垂直领域中的企业客户经理，含有显著浮动薪酬。'
- id: A15
  name: G&A/运营岗位全成本现金支出
  value: '135'
  unit: USDK annual per FTE
  source: '[Startup finance heuristic] 精简的财务与运营支持。'
- id: A16
  name: 可变 COGS 爬坡
  value: Y1 为收入的 31%；Y2 为 28%；Y3 为 25%
  unit: percent of revenue
  source: '[BP businessModel targetGrossMarginPct 70] 结合 [Research regulatoryTechnicalConstraints] 所述实施负担；随着模板和连接器标准化，毛利率逐步提升。'
- id: A17
  name: 解决方案团队薪资分摊
  value: 40% 计入 COGS；35% 计入销售与市场；25% 计入 G&A
  unit: percent of solutions payroll
  source: '[BP product and gtm] 解决方案工程师同时支持实施、售前集成工作和客户运营。'
- id: A18
  name: 非薪资运营成本栈
  value: 研发工具 $7K/mo；GTM 项目 Y1 为 $5K/mo、Y2 为 $8K/mo、Y3 为 $12K/mo；G&A 间接费用 Y1 为 $11K/mo、Y2 为 $14K/mo、Y3 为 $17K/mo
  unit: USDK per month
  source: '[Startup finance heuristic] 精简垂直 SaaS 的软件栈、差旅、法务、保险与合规支出。'
- id: A19
  name: 可变销售费用
  value: '4.0'
  unit: percent of revenue
  source: '[Startup finance heuristic] 企业级交易中的差旅、佣金和合作伙伴转介支出。'
- id: A20
  name: 融资目标
  value: '2600'
  unit: USDK
  source: '[BP fundingAsk] 模型中的 pre-seed 融资用于 MVP、设计合作伙伴转化，以及验证种子轮前的 6 个月缓冲。'
