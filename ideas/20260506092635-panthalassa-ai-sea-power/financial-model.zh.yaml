scenarios:
  downside:
    description: 试点转化延长一个季度，一项原计划站点扩张未能成交，且收入结构更接近核心在管 MW 定价而非综合打包。
    y3RevenueK: 3135.0
    y3EbitdaK: -186.0
    cashLowPointK: 214.0
    keyAssumptionChanges:
    - 每个活跃客户的年综合收入从 $660K 降至 $600K。
    - 由于一个试点延后、一个扩张从未落地，客户爬坡在 Y3 结束时只有 6 个活跃运营商，而非 8 个。
    - 由于实施在更长时间内仍然高度站点定制化，毛利率维持在 67%。
  base:
    description: 第 1 年由创始人主导拿下两个产生收入的运营商，第 2 年达到 4 个生产客户 / 约 40 MW，第 3 年扩展至 8 个活跃运营商 / 约 80 MW。
    y3RevenueK: 4180.0
    y3EbitdaK: 353.4
    cashLowPointK: 826.6
    keyAssumptionChanges:
    - 每个活跃客户的年综合收入维持在 $660K。
    - 客户爬坡在 Y1 达到 2 个活跃运营商，Y2 达到 4 个，Y3 达到 8 个。
    - 随着集成更可复用，毛利率达到商业计划中的 70% 目标。
  upside:
    description: 首个生产客户扩张更快，可背书性缩短销售周期，且 Y3 多拿下一家运营商，而固定成本并未明显增加。
    y3RevenueK: 4945.0
    y3EbitdaK: 920.0
    cashLowPointK: 910.0
    keyAssumptionChanges:
    - 每个活跃客户的年综合收入从 $660K 升至 $700K，原因是使用费捕获更强。
    - 客户爬坡通过一次额外的站点扩张，在 Q4Y3 达到 9 个活跃运营商。
    - 由于一条集成路径实现标准化，毛利率从 70% 改善到 72%。
sensitivity:
- variable: ARPU
  downsideCase: 每客户 $600K 的年综合收入
  baseCase: 每客户 $660K 的年综合收入
  upsideCase: 每客户 $720K 的年综合收入
  y3RevenueImpactK: -380.0
  cashImpactK: -330.0
- variable: CAC
  downsideCase: 随着首位销售代表需要更多现场时间和客户背书，CAC 升至约 ~$340K
  baseCase: 预测净新增运营商的 CAC 约为 ~$301K
  upsideCase: 依靠客户背书的销售把 CAC 维持在接近 ~$260K
  y3RevenueImpactK: 0.0
  cashImpactK: -235.0
- variable: 流失率
  downsideCase: 月流失率走高至 2.5%，且 Y3 结束时少保留 1 个运营商
  baseCase: 月流失率维持在 1.5%，扩张抵消早期 logo 风险
  upsideCase: 在强续约和扩张下，月流失率维持在接近 1.0%
  y3RevenueImpactK: -220.0
  cashImpactK: -180.0
- variable: 销售周期
  downsideCase: 由于安全和运维审查耗时更长，试点转生产推迟约 1 个季度
  baseCase: 在证明价值后，试点转生产大致维持在 2 个季度内
  upsideCase: 参考客户将新 logo 销售压缩约 1 个季度
  y3RevenueImpactK: -550.0
  cashImpactK: -430.0
- variable: 毛利率
  downsideCase: 由于实施仍高度依赖服务，毛利率停留在 67%
  baseCase: 毛利率达到商业计划中的 70% 目标
  upsideCase: 随着集成更整洁、支持负担更低，毛利率提升至 72%
  y3RevenueImpactK: 0.0
  cashImpactK: -125.0
- variable: 招聘节奏
  downsideCase: 在可复用性尚未被证明前，第二位 AE 和额外工程师被提前招聘
  baseCase: 招聘仍围绕试点、转化和多站点验证等里程碑推进
  upsideCase: 一项非核心招聘被推迟到 Q4Y2 转化目标达成之后
  y3RevenueImpactK: 0.0
  cashImpactK: -210.0
modelDiagram:
  title: 单体经济流转
  mermaid: "flowchart LR\n  TargetAccounts[目标账户] --> PaidPilots[付费试点]\n  PaidPilots --> ManagedMW[在管 MW]\n  ManagedMW --> ProductionCustomers[生产客户]\n  ProductionCustomers --> Revenue[收入]\n  Revenue --> GrossProfit[毛利润]\n  GrossProfit --> Cash[现金]"
modelSanity:
- checkName: 收入引擎
  finding: 基准情景的增长来自：活跃运营商从 2 家扩至 8 家，每家约 10 在管 MW，且每家运营商年综合收入约为 $660K。
- checkName: 必须顺利实现的事项
  finding: 首批付费试点必须在约两个季度内完成转化，这样公司才能在 Y2 结束前达到 4 个生产客户和约 40 MW 在管容量。
- checkName: 模型失效条件
  finding: 如果滩头管道最多只支撑 6 个活跃运营商，或毛利率停留在 60% 高位区间，种子轮里程碑证明前的下行情景现金将逼近底线。
- checkName: 下一轮融资证明点
  finding: 一轮 seed 的合理性建立在 4 个生产客户、一个已进入市场的受控准入控制模块，以及至少 1 个多站点扩张案例之上。
sanityChecks:
  ruleOf40: Y3 增长 117.1% + EBITDA 利润率 8.5% = 125.6%
  burnMultiple: Y2 burn multiple 为 0.38x，采用 $498K EBITDA burn / $1.32M net new ARR 计算；Y3 转为正向造血，EBITDA 为 +$354K。
  revenuePerFte: Y3 每 FTE 收入为 $372K，按平均约 11.3 名 FTE 计算（对标 $200–400K enterprise SaaS / infrastructure software）
  flags:
  - 初始 SAM 仍然狭窄，因此基准情景依赖于在 Q4Y3 前赢下北美少量可变电力运营商部署中的 8 个。
  - 收入被建模为每运营商综合 ARPU，未按合同单独展示订阅、使用费和实施费的构成。
  - 假设现金在当期回款，尽管基础设施运营商可能仍采用 45–60 天账期，这将削弱基准情景的现金缓冲。
  - 从 Y2 开始维持 70% 毛利率，意味着站点集成将明显变得可复用，而不是持续高度依赖服务。
