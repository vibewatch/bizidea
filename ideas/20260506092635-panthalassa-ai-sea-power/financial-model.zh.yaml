slug: power-aware-gpu-scheduler
date: '2026-05-06'
currency: USD
modelStartMonth: 2026-06
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-06
  unit: month
  source: '[business-plan.yaml date] 创业财务启发式：计划日期后的第一个完整月份'
- id: A2
  name: M1 期初现金
  value: '2000'
  unit: USDK
  source: '[business-plan.yaml fundingAsk.targetFundingRangeUsd] 选取所述 $2–4M pre-seed 区间的低端，因为基准情景在现金降至约 ~$0.8M 以下前即可达到下一个里程碑'
- id: A3
  name: 每个活跃运营商的成熟在管 MW
  value: '10'
  unit: MW/customer
  source: '[research.yaml market.som] 第 3 年 SOM 的 80 MW 在基准情景下映射为 8 个活跃运营商'
- id: A4
  name: 成熟客户的年均综合收入
  value: '660'
  unit: USDK/year
  source: '[business-plan.yaml gtm.pricing; businessModel.revenueStreams; research.yaml bottomUpSizingDrivers] 10 MW x 约 $60K/MW-year，外加约 10% 的使用费和分析增值'
- id: A5
  name: 落地月份确认收入
  value: '50'
  unit: percent of monthly ARPU
  source: 创业财务启发式：企业试点与首次生产爬坡平均在月中开始
- id: A6
  name: 活跃付费客户爬坡
  value: Y1 达到 2 / Y2 达到 4 / Y3 达到 8
  unit: customers
  source: '[business-plan.yaml milestones; research.yaml validationPlan] 位于所述 4–8 个早期商业部署与第 3 年 80 MW 目标之内的保守路径'
- id: A7
  name: 毛利率目标
  value: '70'
  unit: percent
  source: '[business-plan.yaml businessModel.targetGrossMarginPct]'
- id: A8
  name: 创始人 CEO 全负担年现金成本
  value: '144'
  unit: USDK/year
  source: 创业财务启发式：$120K 现金薪资外加 20% 的薪资税和福利
- id: A9
  name: 工程师全负担年现金成本
  value: '180'
  unit: USDK/year
  source: 创业财务启发式：GPU 基础设施人才按 $150K 薪资外加 20% 的薪资税和福利
- id: A10
  name: 产品/基础设施岗位全负担年现金成本
  value: '168'
  unit: USDK/year
  source: 创业财务启发式：$140K 薪资外加 20% 的薪资税和福利
- id: A11
  name: 解决方案工程师全负担年现金成本
  value: '156'
  unit: USDK/year
  source: 创业财务启发式：$130K 薪资外加 20% 的薪资税和福利
- id: A12
  name: 客户成功 / 实施岗位全负担年现金成本
  value: '132'
  unit: USDK/year
  source: 创业财务启发式：$110K 薪资外加 20% 的薪资税和福利
- id: A13
  name: 销售 AE 全负担年基础成本
  value: '168'
  unit: USDK/year
  source: 创业财务启发式：$140K 固定底薪外加 20% 的薪资税和福利；佣金单独建模
- id: A14
  name: 行政 / 财务岗位全负担年现金成本
  value: '120'
  unit: USDK/year
  source: 创业财务启发式：$100K 薪资外加 20% 的薪资税和福利
- id: A15
  name: 研发非薪酬支出
  value: 10 in Y1, 12 in Y2, 14 in Y3
  unit: USDK/month
  source: 创业财务启发式：面向基础设施软件的云遥测、可观测性和安全工具
- id: A16
  name: 销售与市场非薪酬支出
  value: 6 in Y1, 8 in Y2, 10 in Y3 + 1.5 per AE + 8% of revenue
  unit: USDK/month
  source: 创业财务启发式：高触达企业销售所需的创始人差旅、客户推荐、会议和佣金
- id: A17
  name: 行政与财务非薪酬支出
  value: Y1 为 7，Y2 在财务岗位招聘前为 9、之后为 10，Y3 为 11
  unit: USDK/month
  source: 创业财务启发式：服务关键基础设施客户所需的法务、保险、审计和后台管理开销
- id: A18
  name: 首位解决方案工程师招聘
  value: 第 5 个月
  unit: month
  source: '[business-plan.yaml team] 一旦试点开始，就需要集成 / 解决方案工程师'
- id: A19
  name: 第二位工程师招聘
  value: 第 9 个月
  unit: month
  source: 与 [business-plan.yaml milestones 0–12 months] 挂钩的创业财务启发式：在首个转化前完成可复用集成和生产级安全封装
- id: A20
  name: 首位客户成功招聘
  value: 第 10 个月
  unit: month
  source: '[business-plan.yaml team] 客户成功 / 实施负责人在第 9–12 个月窗口开始'
- id: A21
  name: 首位 AE 招聘
  value: 第 14 个月
  unit: month
  source: '[business-plan.yaml gtm.funnelTargets; team] 创业财务启发式：只有在首个生产合同证明切入点后才增设专职销售'
- id: A22
  name: 第三位工程师招聘
  value: 第 16 个月
  unit: month
  source: '[business-plan.yaml milestones 12–24 months] 支撑受控准入控制和多站点基准数据采集'
- id: A23
  name: 财务 / 合规招聘
  value: 第 22 个月
  unit: month
  source: 与 [business-plan.yaml milestones 12–24 months] 挂钩的创业财务启发式：当 3–4 个生产客户需要更多供应商管理和财务运营时招聘
- id: A24
  name: 第四位工程师招聘
  value: 第 22 个月
  unit: month
  source: '[business-plan.yaml milestones 24–36 months] 支撑组合分析以及第二站点扩张准备'
- id: A25
  name: 第二位客户成功招聘
  value: 第 28 个月
  unit: month
  source: 与 [business-plan.yaml milestones 24–36 months] 挂钩的创业财务启发式：当客户增加更多 MW 或第二站点时招聘
- id: A26
  name: 第二位 AE 招聘
  value: 第 31 个月
  unit: month
  source: 创业财务启发式：只有在已有可供引用的生产部署后才增加第二名销售
- id: A27
  name: 单体经济所用稳态月流失率
  value: '1.5'
  unit: percent
  source: 创业财务启发式：保守估计的早期企业基础设施软件续约风险
- id: A28
  name: 综合 CAC
  value: '300.8'
  unit: USDK/customer
  source: 由预测中 Y2–Y3 的销售与市场支出 $1.805M 除以 6 个净新增活跃运营商计算得出
- id: A29
  name: 现金回款时点
  value: 当期回款
  unit: policy
  source: 当期回款；采用创业财务启发式，并特别标注因为基础设施运营商仍可能按 45–60 天账期付款
- id: A30
  name: 融资需求
  value: '2.0'
  unit: USDM
  source: '[business-plan.yaml fundingAsk] 与所述区间低端对齐，同时在基准情景下保留 >$0.8M 的现金底线'
