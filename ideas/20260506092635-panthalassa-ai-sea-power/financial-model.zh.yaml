slug: power-aware-gpu-scheduler
date: '2026-05-06'
currency: USD
modelStartMonth: 2026-06
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-06
  unit: month
  source: '[business-plan.yaml date] 创业财务经验法则：从计划日期后的第一个完整月份开始'
- id: A2
  name: M1 期初现金
  value: '2000'
  unit: USDK
  source: '[business-plan.yaml fundingAsk.targetFundingRangeUsd] 选择已表述 $2–4M pre-seed 区间的下限，因为基准情景在现金跌破约 $0.8M 前就能达到下一阶段里程碑'
- id: A3
  name: 每个活跃运营商成熟后的托管 MW
  value: '10'
  unit: MW/customer
  source: '[research.yaml market.som] 将第 3 年 80 MW 的 SOM 映射为基准情景下 8 个活跃运营商'
- id: A4
  name: 每个成熟客户的混合年收入
  value: '660'
  unit: USDK/year
  source: '[business-plan.yaml gtm.pricing; businessModel.revenueStreams; research.yaml bottomUpSizingDrivers] 10 MW x 约 $60K/MW-year，再加上约 10% 的用量与分析增收'
- id: A5
  name: 落地月份确认收入比例
  value: '50'
  unit: percent
  source: '创业财务经验法则：企业试点和首次生产爬坡通常平均从月中开始'
- id: A6
  name: 付费活跃客户爬坡
  value: 2 by Y1 / 4 by Y2 / 8 by Y3
  unit: customers
  source: '[business-plan.yaml milestones; research.yaml validationPlan] 在已表述的 4–8 个早期商业部署和第 3 年 80 MW 目标范围内的保守路径'
- id: A7
  name: 毛利率目标
  value: '70'
  unit: percent
  source: '[business-plan.yaml businessModel.targetGrossMarginPct]'
- id: A8
  name: 创始人/CEO 全成本年现金支出
  value: '144'
  unit: USDK/year
  source: '创业财务经验法则：$120K 现金薪资，加 20% 工资税和福利'
- id: A9
  name: 工程师全成本年现金支出
  value: '180'
  unit: USDK/year
  source: '创业财务经验法则：GPU 基础设施人才按 $150K 薪资，加 20% 工资税和福利'
- id: A10
  name: 产品/基础设施负责人全成本年现金支出
  value: '168'
  unit: USDK/year
  source: '创业财务经验法则：$140K 薪资，加 20% 工资税和福利'
- id: A11
  name: 解决方案工程师全成本年现金支出
  value: '156'
  unit: USDK/year
  source: '创业财务经验法则：$130K 薪资，加 20% 工资税和福利'
- id: A12
  name: 客户成功 / 实施负责人全成本年现金支出
  value: '132'
  unit: USDK/year
  source: '创业财务经验法则：$110K 薪资，加 20% 工资税和福利'
- id: A13
  name: 销售 AE 全成本年基础支出
  value: '168'
  unit: USDK/year
  source: '创业财务经验法则：$140K 底薪，加 20% 工资税和福利；佣金另行建模'
- id: A14
  name: G&A / 财务全成本年现金支出
  value: '120'
  unit: USDK/year
  source: '创业财务经验法则：$100K 薪资，加 20% 工资税和福利'
- id: A15
  name: R&D 非人员支出
  value: 10 in Y1, 12 in Y2, 14 in Y3
  unit: USDK/month
  source: '创业财务经验法则：面向基础设施软件的云遥测、可观测性和安全工具'
- id: A16
  name: 销售与市场非人员支出
  value: 6 in Y1, 8 in Y2, 10 in Y3 + 1.5 per AE + 8% of revenue
  unit: USDK/month
  source: '创业财务经验法则：高触达企业销售所需的创始人差旅、客户背书、会议和佣金'
- id: A17
  name: G&A 非人员支出
  value: 7 in Y1, 9 in Y2 pre-finance hire, 10 after finance hire, and 11 in Y3
  unit: USDK/month
  source: '创业财务经验法则：面向关键基础设施客户的法务、保险、审计和后台开销'
- id: A18
  name: 首位解决方案工程师入职时间
  value: 第 5 个月
  unit: month
  source: '[business-plan.yaml team] 试点启动后就需要集成 / 解决方案工程师'
- id: A19
  name: 第二位工程师入职时间
  value: 第 9 个月
  unit: month
  source: 创业财务经验法则，结合 [business-plan.yaml milestones 0–12 months]，用于在首个转正前完成可复用集成和生产级安全能力包
- id: A20
  name: 首位客户成功负责人入职时间
  value: 第 10 个月
  unit: month
  source: '[business-plan.yaml team] 客户成功 / 实施负责人在第 9–12 个月窗口入职'
- id: A21
  name: 首位 AE 入职时间
  value: 第 14 个月
  unit: month
  source: '[business-plan.yaml gtm.funnelTargets; team] 创业财务经验法则：只有在首个生产合同证明切口成立后，才增加专职销售'
- id: A22
  name: 第三位工程师入职时间
  value: 第 16 个月
  unit: month
  source: '[business-plan.yaml milestones 12–24 months] 支撑带保护的准入控制和多站点基准数据接入'
- id: A23
  name: 财务 / 合规负责人入职时间
  value: 第 22 个月
  unit: month
  source: 创业财务经验法则，结合 [business-plan.yaml milestones 12–24 months]，因为当客户达到 3–4 家生产部署后，会需要更完整的供应商管理和财务运营
- id: A24
  name: 第四位工程师入职时间
  value: 第 22 个月
  unit: month
  source: '[business-plan.yaml milestones 24–36 months] 支撑组合级分析和第二站点扩展准备'
- id: A25
  name: 第二位客户成功负责人入职时间
  value: 第 28 个月
  unit: month
  source: 创业财务经验法则，结合 [business-plan.yaml milestones 24–36 months]，对应客户增加更多 MW 或第二站点
- id: A26
  name: 第二位 AE 入职时间
  value: 第 31 个月
  unit: month
  source: '创业财务经验法则：只有在形成可引用的生产部署后，才增加第二位销售'
- id: A27
  name: 用于单位经济模型的稳态月流失率
  value: '1.5'
  unit: percent
  source: '创业财务经验法则：保守估计早期企业基础设施软件的续约风险'
- id: A28
  name: 混合 CAC
  value: '300.8'
  unit: USDK/customer
  source: 由 Y2–Y3 销售与市场支出预测 $1.805M 除以 6 个净新增活跃运营商计算得出
- id: A29
  name: 现金回收时点
  value: 当期回款
  unit: policy
  source: 创业财务经验法则；但需特别标记，因为基础设施运营商仍可能按 45–60 天账期付款
- id: A30
  name: 融资需求
  value: '2.0'
  unit: USDM
  source: '[business-plan.yaml fundingAsk] 与已表述区间下限对齐，同时在基准情景下保留高于 $0.8M 的现金安全垫'
