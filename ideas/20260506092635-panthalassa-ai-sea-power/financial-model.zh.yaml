fundingAsk:
  round: pre-seed
  amountM: 2.0
  runwayMonths: 30
  milestone: 达到 4 个生产客户和约 40 MW 托管规模，交付面向弹性工作负载的带保护准入控制，并在 seed 融资前证明首个多站点扩张。
  useOfFunds:
  - bucket: Engineering
    amountUsd: 820000
    percentage: 41
  - bucket: GTM
    amountUsd: 450000
    percentage: 23
  - bucket: G&A
    amountUsd: 180000
    percentage: 9
  - bucket: Buffer (6 mo)
    amountUsd: 550000
    percentage: 27
scenarios:
  downside:
    description: 试点转正延后一季度，一次原计划站点扩展未能成交，收入结构也更接近核心托管 MW 定价，而不是混合打包。
    y3RevenueK: 3135.0
    y3EbitdaK: -186.0
    cashLowPointK: 214.0
    keyAssumptionChanges:
    - 每个活跃客户的混合年收入从 $660K 降到 $600K。
    - 由于一个试点延期、一个扩展没有落地，Y3 结束时活跃运营商不是 8 家，而是 6 家。
    - 毛利率维持在 67%，因为实施工作在更长时间内仍然偏站点定制。
  base:
    description: 创始人主导的第 1 年拿下两家产生收入的运营商；第 2 年达到 4 个生产客户 / 约 40 MW；第 3 年扩展到 8 个活跃运营商 / 约 80 MW。
    y3RevenueK: 4180.0
    y3EbitdaK: 353.4
    cashLowPointK: 826.6
    keyAssumptionChanges:
    - 每个活跃客户的混合年收入维持在 $660K。
    - 客户爬坡在 Y1 达到 2 家活跃运营商、Y2 达到 4 家、Y3 达到 8 家。
    - 随着集成更可复用，毛利率达到商业计划中的 70% 目标。
  upside:
    description: 第一家生产客户扩张更快，可引用案例压缩了销售周期，而且在不明显增加固定成本的前提下，Y3 又多拿下一家运营商。
    y3RevenueK: 4945.0
    y3EbitdaK: 920.0
    cashLowPointK: 910.0
    keyAssumptionChanges:
    - 每个活跃客户的混合年收入从 $660K 提升到 $700K，因为用量费捕获更强。
    - 通过额外一次站点扩展，客户爬坡在 Q4Y3 达到 9 家活跃运营商。
    - 随着一条集成路径标准化，毛利率从 70% 提升到 72%。
sensitivity:
- variable: ARPU
  downsideCase: 每个客户混合年收入 $600K
  baseCase: 每个客户混合年收入 $660K
  upsideCase: 每个客户混合年收入 $720K
  y3RevenueImpactK: -380.0
  cashImpactK: -330.0
- variable: CAC
  downsideCase: 由于第一位销售需要更多现场时间和客户背书，CAC 升至约 $340K
  baseCase: 预测 CAC 约为每个净新增运营商 $301K
  upsideCase: 依靠案例驱动销售，CAC 保持在约 $260K
  y3RevenueImpactK: 0.0
  cashImpactK: -235.0
- variable: churn
  downsideCase: 月流失率走向 2.5%，Y3 结束时少留住 1 家运营商
  baseCase: 月流失率维持在 1.5%，扩张足以抵消早期 logo 风险
  upsideCase: 月流失率接近 1.0%，续约和扩张都表现强劲
  y3RevenueImpactK: -220.0
  cashImpactK: -180.0
- variable: sales cycle
  downsideCase: 由于安全和运维审查拉长，试点转生产延后约 1 个季度
  baseCase: 试点转生产大致能保持在价值证明后的 2 个季度内
  upsideCase: 可引用客户把新 logo 销售周期缩短约 1 个季度
  y3RevenueImpactK: -550.0
  cashImpactK: -430.0
- variable: gross margin
  downsideCase: 因实施仍然偏服务化，毛利率维持在 67%
  baseCase: 毛利率达到商业计划中的 70% 目标
  upsideCase: 因集成更干净、支持负担更低，毛利率提升到 72%
  y3RevenueImpactK: 0.0
