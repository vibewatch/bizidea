modelDiagram:
  title: 单位经济流转图
  mermaid: |-
    flowchart LR
      目标账户 --> 付费试点
      付费试点 --> 托管MW
      托管MW --> 生产客户
      生产客户 --> 收入
      收入 --> 毛利润
      毛利润 --> 现金
modelSanity:
- checkName: 收入引擎
  finding: 基准情景的增长来自活跃运营商从 2 家扩到 8 家，每家约托管 10 MW，对应每家约 $660K 的混合年收入。
- checkName: 必须顺利发生的事
  finding: 首批付费试点必须在大约两个季度内转正，公司才能在 Y2 结束前达到 4 个生产客户和约 40 MW 托管规模。
- checkName: 模型会失效的情况
  finding: 如果滩头管线最终只能支撑 6 家活跃运营商，或毛利率停留在高 60% 区间， downside 情景的现金会在 seed 里程碑验证前逼近底线。
- checkName: 下一轮融资证明
  finding: 当公司达到 4 个生产客户、市场中已有带保护准入控制模块，并拥有至少一个多站点扩展案例时，才足以支撑 seed 融资。
sanityChecks:
  ruleOf40: Y3 growth 117.1% + EBITDA margin 8.5% = 125.6%
  burnMultiple: Y2 burn multiple 0.38x using $498K EBITDA burn / $1.32M net new ARR; Y3 turns cash-generative with +$354K EBITDA.
  revenuePerFte: $372K Y3 on ~11.3 average FTE (benchmark $200–400K enterprise SaaS / infrastructure software)
  flags:
  - 初始 SAM 仍然很窄，所以基准情景要求公司在 Q4Y3 前，从数量有限的北美波动供电运营商部署中拿下 8 家。
  - 收入按每个运营商的混合 ARPU 建模，没有把订阅、用量和实施三部分合同结构单独拆开。
  - 现金回款按当期收款假设，但基础设施运营商仍可能走 45–60 天账期，这会压缩基准情景的现金缓冲。
  - 从 Y2 开始维持 70% 毛利率，隐含前提是站点集成已显著变得可复用，而不是持续保持高服务化。
