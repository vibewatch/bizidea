reportMemo:
  executiveTakeaways:
  - 滩头市场真实存在，但仍然狭窄：公开的能源优先 AI 建设已从最新的 Panthalassa 融资，扩展到从数十 MW 跃升至 166 MW 和 900 MW 级项目的站点公告，但首批买方仍只是少数新型云和电力支撑运营商。
  - 最强的切入点是商业化，而不只是调度：超大云的现货/可抢占产品证明了折扣灵活算力存在需求，而通用调度器仍把电力视为静态约束，而非可销售的产品属性。
  - 既有厂商风险在于功能被云厂商和调度器供应商吸收，因此创业公司必须掌握面向可变能源站点的实时电力预测、作业准入和 SLA 打包，而不是沦为又一个集群看板。
  - 公开 GPU 定价表明，即便软件抽成很薄，也具有经济意义，因为每 MW 的 AI 容量在任何灵活容量增益出现前，就能创造很高的收入密度。
  - 采用摩擦主要来自运营而非概念：基础设施团队已经会购买托管 Slurm、Kubernetes 和集群工具，但他们对在关键路径插入新的控制层仍然谨慎。
  - 当前时点比最初仅有的海上叙事更强：电池、现场发电和可再生能源弃电策略正在成为 AI 基础设施设计的一部分，扩大了需要电力感知控制平面的站点数量。
  marketDefinition: 这个市场是：把受约束或可变电力的 AI 集群转化为可销售算力产品的软件，服务对象是独立 GPU 云、可再生能源支撑的数据中心开发商，以及其他无法假设自己拥有平坦电网式容量的运营商。首个买方地域是北美，这里公开的现货/可抢占算力市场已较成熟，且大量可见的能源优先 AI 项目正在宣布。纳入范围包括位于现有集群管理器之上的实时电力预测、准入控制、灵活层级打包和队列编排；排除范围包括通用调度器、通用 DCIM/能源管理工具、零售型 GPU 经纪，以及由运营商内部自行消化问题的垂直整合云。 [3][4][6][8][10][12][22][24][27]
  customerAndBuyer: 主要使用者是容量工程和集群运维团队，他们必须决定在非平坦电力包络下哪些任务可以被承诺。经济买方通常是 GPU 云或电力支撑算力运营商中的 COO、基础设施副总裁或容量总经理。他们最紧迫的工作，是保护高级 SLA、将灵活工作负载货币化，并阻止销售团队对一个可用电力、制冷或送电计划仍在变化的站点做出过度承诺。当前替代方案是基于 Slurm/Kubernetes 的通用队列、人工限流和电子表格容量规划。 [3][4][6][8][9][10][11][12][14][17][19][21]
  buyingTriggers:
  - point: 一个新站点或扩容阶段上线，且供电并非平坦或采用分阶段送电，运营商需要一种可信方式在利用率稳定前签约容量。
    sourceRefs:
    - 1
    - 22
    - 25
  - point: 销售团队希望提供类似现货/可抢占算力的折扣灵活容量，而不是让间歇性容量闲置。
    sourceRefs:
    - 3
    - 6
    - 8
    - 20
  - point: 现有 Slurm 或 Kubernetes 队列已不够用，因为运营商现在需要明确：稀缺容量该给谁、何时允许抢占，以及如何把这些权衡以商业方式呈现出来。
    sourceRefs:
    - 10
    - 11
    - 12
    - 14
    - 17
    - 19
  willingnessToPay:
    summary: 付费意愿得到现有灵活算力和集群运维支出的间接支撑。AWS 和 Google 以比按需定价低 90%+ 的折扣销售可中断容量，而 Lambda 和 Crusoe 公布的 H100/H200 定价大致位于每 GPU 小时 $3.9 到 $6.2。也就是说，即便只是适度提升可销售利用率或更安全地打包灵活容量，也足以证明软件支出的合理性，而无需新设预算科目。 [3][6][16][20][32]
    sourceRefs:
    - 3
    - 6
    - 16
    - 20
    - 32
  competitiveLandscape: 竞争来自四个方向：已经销售可中断或预留容量的云平台、掌握作业放置的开源调度器、把运维与容量销售打包的新型云，以及在自身技术栈内解决该问题的垂直整合能源优先运营商。创业公司不应试图替换 Slurm，也不应成为另一个 GPU 经纪；它应掌握“波动兆瓦”与“可签约 GPU 产品”之间的翻译层。 [3][4][8][10][11][16][18][20][21][29][35]
  incumbentThesis:
  - incumbentClass: 云平台
    point: AWS、Google Cloud 和 Azure 已经训练买方接受现货、可抢占和预留 GPU 容量，但这些产品绑定于其自身基础设施，无法围绕站点特定的电力包络、分阶段送电或中立的多站点商业化进行优化。
    sourceRefs:
    - 3
    - 4
    - 6
    - 8
    - 31
    - 33
  - incumbentClass: 开源调度器
    point: Slurm、Kueue 和 Kubernetes 能处理配额、抢占、队列公平性和作业放置，但它们并不会原生地把变化中的电力可用性转化为产品层级、交付窗口或收益感知的准入规则。
    sourceRefs:
    - 10
    - 11
    - 12
    - 13
    - 14
  - incumbentClass: 新型云运营商
    point: Lambda 和 Runpod 能快速销售托管集群和容量，但它们的经济中心仍是出售标准算力库存；在一些站点尚未长成常规云区域之前，中立控制平面仍有机会以商业化软件切入。
    sourceRefs:
    - 16
    - 17
    - 18
    - 19
    - 34
  - incumbentClass: 垂直整合的能源优先 AI 云
    point: Crusoe 是最强的战略替代方案，因为它将能源、数据中心、云定价和运维平台整合在一起；但当运营商希望获得软件能力而不是外包整套基础设施栈时，这种垂直模式并不会天然胜出。
    sourceRefs:
    - 20
    - 21
    - 22
    - 23
    - 29
    - 35
  - incumbentClass: 内部运维
    point: 许多运营商可以把调度器控制、电子表格和人工限流拼接在一起，但预测、打包并证明灵活容量的运营负担，正是专业软件应创造价值的地方。
    sourceRefs:
    - 5
    - 9
    - 10
    - 17
    - 19
  regulatoryLandscape: 目前还没有单一的应用层监管直接驱动这一细分；更硬的约束来自基础设施本身。数据中心仍是高耗能资产，大负荷选址和效率很关键，而运营商需要清晰证据来说明站点电力如何转化为已交付算力。这有利于能够暴露假设、保护承诺并建立可审计运营历史的软件。 [27][28]
  technologyLandscape: 底层调度栈已经相当丰富：Slurm 覆盖抢占、预留、QoS 和节能；Kueue 与 Kubernetes 在云原生环境中增加配额、公平性和抢占；NVIDIA、Lambda 和 Runpod 也都提供托管集群控制。因此，可持续的切入点不是基础编排，而是跨越运营商既有控制平面的电力感知预测与商业化。 [9][10][11][12][13][14][15][17][19][21]
  distributionChannels:
  - point: 直接向新型云或电力支撑运营商中的基础设施和容量负责人销售，是最清晰的首个动作，因为产品帮助他们更早、更安全地签约容量。
    sourceRefs:
    - 1
    - 16
    - 22
    - 24
    - 25
  - point: 托管 Slurm 和托管 Kubernetes 生态是实用的集成渠道，因为许多买方已经以这种方式消费集群运维。
    sourceRefs:
    - 9
    - 17
    - 19
  - point: 能源和数据中心开发商是天然渠道伙伴，因为他们越来越多地推广 AI 专用站点，而不只是单纯销售电力。
    sourceRefs:
    - 22
    - 23
