  - friction: 终端客户对关键任务仍可能更偏好固定供电合同
    severity: medium
    affectedBuyer: Sales / procurement
    mitigation: 先瞄准批量训练、回填任务和离线推理，因为这些场景本来就具备一定中断容忍度。
    sourceRefs:
    - 3
    - 6
    - 8
    - 20
market:
  tam:
    value: $74.6M
    rationale: '自下而上、保守的可见 MW 测算法：Crusoe 在 Abilene 新宣布 900 MW 园区，Soluna 的 Project Kati 为 166 MW，两者合计 1,066 MW 的公开可见能源优先 AI 产能；若按每 MW 每年约 $70k 的软件支出估算，对应 TAM 约 $74.6M。这个估算刻意没有计入其他站点，且假设定价只占隐含 GPU 算力收入的一小部分。 [22][25]'
    isEstimate: true
    sourceRefs:
    - 22
    - 25
  sam:
    value: $30.0M
    rationale: '把 TAM 进一步收缩到第一波滩头市场：大约 500 MW 的北美独立 GPU 云和可再生能源支撑站点，更可能向第三方出售产能，而不是把能力内部化；按每 MW 每年 $60k 估算，SAM 约为 $30.0M。 [1][22][24][25]'
    isEstimate: true
    sourceRefs:
    - 1
    - 22
    - 24
    - 25
  som:
    value: $4.8M
    rationale: 第 3 年可达的 SOM 假设托管规模为 80 MW，按每 MW 每年约 $60k 计算，相当于 8 个平均 10 MW 的站点，或 4 个平均 20 MW 的站点。这个规模相对公开可见站点体量并不激进，也符合先滩头后扩张的节奏。 [16][18][22][25]
    isEstimate: true
    sourceRefs:
    - 16
    - 18
    - 22
    - 25
bottomUpSizingDrivers:
- driver: 公开能源优先 AI 站点中的可触达 MW
  value: 1,066 MW (Crusoe 900 MW + Soluna Project Kati 166 MW)
  source: '[22][25]'
- driver: 隐含付费意愿锚点
  value: est. $60k-$70k per MW-year
  source: calc from public GPU cloud price density [16][20]
- driver: 第 3 年可达到的托管 MW
  value: 80 MW
  source: est. based on 4-8 design-partner / early commercial sites
categoryDynamics:
  growthRate: 公开的能源优先 AI 项目已从 83–166 MW 阶段性建设，跃迁到 2025–26 年 900 MW 园区级公告。
  growthRateSourceRefs:
  - 22
  - 25
  - 26
  tailwinds:
  - point: Spot 和 preemptible 算力市场已经让用户习惯了这样一个概念：某些 AI 工作负载可以拿交付确定性去换更低价格。
    sourceRefs:
    - 3
    - 6
    - 8
  - point: 能源优先运营商正在把 AI 算力和现场发电、储能或弃电型可再生能源绑定起来，这会增加供电不平稳站点的数量。
    sourceRefs:
    - 22
    - 23
    - 24
    - 25
    - 35
  - point: 调度原语正在商品化，因此相比重新造一个集群管理器，叠加一层商业化软件更现实。
    sourceRefs:
    - 10
    - 12
    - 15
    - 17
    - 19
  headwinds:
  - point: 初始买方群体仍然很小，而且最成熟的一些运营商可能会更偏好垂直整合方案或内部工具。
    sourceRefs:
    - 20
    - 21
    - 22
    - 29
  - point: 任何触碰准入控制的软件，都会遇到运行昂贵 GPU 集群的运营商在信任、集成和回滚上的顾虑。
    sourceRefs:
    - 10
    - 11
    - 12
    - 17
    - 19
competitors:
- name: SchedMD / Slurm
  stage: incumbent
  wedge: 面向 HPC 和 AI 集群的默认开源工作负载管理器，内置 QoS、预留和抢占。
  pricing: 开源软件；企业支持和服务另行收费。
  strength: 在 GPU / HPC 环境里具备深厚的运行可信度和广泛部署基础。
  weaknessVsUs: 它优化的是调度原语，而不是把波动供电产能打包成面向客户的产品或收入感知的准入规则。
  sourceRefs:
  - 10
  - 11
- name: AWS EC2 Spot + Capacity Blocks
  stage: incumbent
  wedge: 直接在 hyperscaler 云内商业化可中断和预留 GPU 产能。
  pricing: Spot 最多可比按需价格低 90%；Capacity Blocks 用于预留 ML GPU 产能。
  strength: 买方熟悉度高、API 成熟，而且直接证明弹性算力是现实存在的购买行为。
  weaknessVsUs: 它只解决 AWS 内部的问题，帮不了第三方运营商把自己的波动供电站点商业化。
  sourceRefs:
  - 3
  - 4
  - 5
  - 31
- name: Lambda
  stage: scale-up
  wedge: 拥有公开 GPU 定价，并提供托管 Slurm / Kubernetes 的 neocloud。
  pricing: 公开 H100 和 B200 实例 / 集群价格；大规模预留集群的 H100 定价大致为每 GPU-hour $5.54–$6.16。
  strength: 定价透明、运行成熟，而且通过托管集群进入的正是创业公司想拿下的买方群体。
  weaknessVsUs: Lambda 卖的是产能和托管基础设施，而不是面向第三方站点的中立电力感知商业化软件层。
  sourceRefs:
  - 16
  - 17
  - 34
- name: Runpod
  stage: scale-up
  wedge: 面向开发者、交付速度快的 GPU 云，并提供 instant clusters 和基于 Slurm 的集群文档。
  pricing: 公开 pods 和 serverless 定价，并附带 instant-cluster 文档。
  strength: 上手快，适合那些最看重速度和灵活性的运营商或买方。
  weaknessVsUs: 它并不围绕供电边界预测，也不以受站点能源约束驱动的弹性产能打包为核心。
  sourceRefs:
  - 18
  - 19
- name: Crusoe
  stage: scale-up
  wedge: 一家垂直整合的能源优先 AI 云，把数据中心、电力策略、云定价和运维工具打包在一起。
  pricing: 提供公开云定价，包括 H100 / H200 费率以及 spot / on-demand 选项。
  strength: 它是最完整的替代方案，因为可以通过垂直整合而不是中立软件来解决问题。
  weaknessVsUs: 中立创业公司可以服务那些想获得这项能力、却不愿购买 Crusoe 整套基础设施栈或转投其云的运营商。
  sourceRefs:
  - 20
  - 21
  - 22
  - 23
  - 29
  - 35
regulatoryTechnicalConstraints:
- point: 数据中心能耗强度和大负载规划依然是真实约束，因此任何商业化软件层都必须把承诺出去的算力准确映射到站点实际的电力和制冷上限。
  sourceRefs:
  - 27
  - 28
- point: 弹性产能产品只有在工作负载能容忍中断、抢占或完工窗口的前提下才成立。
  sourceRefs:
  - 3
  - 5
  - 6
  - 8
- point: 集成风险很高，因为产品必须在不引发不稳定的前提下接入或影响 Slurm、Kubernetes 或托管式集群控制平面。
  sourceRefs:
  - 10
  - 12
  - 15
  - 17
  - 19
- point: 预测质量依赖对实时电力、制冷和队列遥测的访问，而这些数据往往分散在不同运营系统里。
  sourceRefs:
  - 11
  - 21
  - 27
- point: 安全和运营方信任非常关键，因为软件会触碰调度策略、产能分配，以及可能面向客户做出的交付承诺。
  sourceRefs:
  - 15
  - 17
  - 19
validationSignals:
- point: Panthalassa 的 $140M 融资说明，投资人愿意为非传统 AI 供电架构下注，而不再默认未来所有产能都必须落在传统电网支撑园区里。
  sourceRefs:
  - 1
  - 2
- point: Crusoe 宣布为 Microsoft 建设新的 900 MW AI 园区，并表示更大的 Abilene 站点预计可达 2.1 GW，这表明“电力塑形”的 AI 基础设施需求已经来到园区级规模。
  sourceRefs:
  - 22
- point: Crusoe 与 Form Energy 宣布为 AI 数据中心提供 12 GWh 铁空气电池，说明“塑形供电”正在进入新站点的实际运行设计。
  sourceRefs:
  - 23
- point: Soluna 明确把 AI 负载描述为弹性需求，并表示 Project Kati 是一个 166 MW 的风电数据中心，其中首期为 83 MW。
  sourceRefs:
  - 24
  - 25
- point: Lambda 和 Runpod 都提供托管 Slurm / 集群产品，这说明运营商已经愿意在裸 GPU 之上购买更高层控制与运维工具。
  sourceRefs:
  - 17
  - 19
- point: AWS、Google 和 Azure 都在销售可中断产能产品，这证明市场确实接受“更低价格换更弱交付保证”的算力。
  sourceRefs:
  - 3
  - 6
  - 8
openQuestions:
- 未来 24 个月，究竟会有多少非超大云厂商的 AI 站点，会带着明显波动的供电画像真正商业化上线？
- 早期买方更愿意采购中立的商业化软件，还是会默认转向像 Crusoe 这样的垂直整合运营商？
- 在运营商愿意把实时准入控制交出去之前，一层只读预测和弹性队列软件，能不能先把 ROI 跑出来？
- 到底哪些工作负载对完工窗口足够宽容，能撑起第一个可重复的弹性产能产品？
