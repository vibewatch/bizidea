  sensitivityCases:
  - case: 能源优先 AI 站点仍集中在少数垂直整合运营商手中
    impact: 如果很多最大的可变电力站点倾向于内部消化运营模型而非购买第三方控制软件，中立软件的 SAM 将在更长时间内保持较小。
