  validationPlan:
  - priority: high
    question: 未来 24 个月，究竟会有多少非超大云厂商的 AI 站点会带着不平稳供电画像上线？
    evidenceToGather: 访谈能源支撑型算力运营商、数据中心开发商和 GPU 云；收集站点 MW、分阶段送电情况和销售模式。
  - priority: high
    question: 买方会为中立软件付费，还是更愿意选择像 Crusoe 这样的垂直整合供应商？
    evidenceToGather: 访谈 5–10 位基础设施负责人，对比中立软件、内部运维和垂直整合云三种 make/buy 偏好。
  - priority: medium
    question: 只读预测与弹性队列产品，能否在公司接管准入控制前就交出 ROI？
    evidenceToGather: 通过共创客户试点，测量在不插入控制路径时，可销售利用率提升、预测误差以及避免 SLA 失约的效果。
  - priority: medium
    question: 哪些工作负载真的足够能容忍中断，足以填满弹性队列？
    evidenceToGather: 对批量训练、回填任务、离线推理和内部实验做任务级分析，量化它们对完工窗口的容忍度。
