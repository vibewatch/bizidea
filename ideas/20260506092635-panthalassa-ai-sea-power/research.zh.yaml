  sensitivityCases:
  - case: 能源优先 AI 站点继续集中在少数垂直整合运营商手里
    impact: 如果最大的波动供电站点更倾向于把这套运营模型内部化，而不是购买第三方控制软件，那么中立软件的 SAM 会更长时间维持在较小规模。
