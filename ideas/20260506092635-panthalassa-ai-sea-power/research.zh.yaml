reportMemo:
  executiveTakeaways:
  - '滩头市场已经冒出来了，但买方池依旧很窄：从 Panthalassa 新融资，到一批从数十 MW 直接跃迁到 166 MW、900 MW 级别的项目公告，能源优先的 AI 基础设施不再只是概念，可首批客户仍主要集中在新型 GPU 云和能源支撑型运营商这小一圈。'
  - '最硬的切口不在“再做一个调度器”，而在把产能卖出去：超大云厂商的 spot / preemptible 产品已经证明，打折弹性算力有人买；反过来看，通用调度器至今仍把电力当静态约束，而不是可以对外售卖的产品属性。'
  - 现有厂商最大的威胁是把功能顺手吸收掉，所以创业公司必须掌握面向波动能源站点的实时电力预测、任务准入和 SLA 打包，而不是沦为又一块集群大屏。
  - 公开 GPU 定价说明，就算软件抽成不厚，账也能算过来，因为每个 MW 的 AI 产能在弹性产能带来的额外抬升出现前，本身就有很高的收入密度。
  - '采用阻力主要卡在运维链路，而不是认知教育：基础设施团队本来就会采购托管 Slurm、Kubernetes 和各类集群工具，但只要软件要碰关键路径，他们就会格外谨慎。'
  - '为什么是现在，理由已经不止“海上算力”这一条：电池、现场发电和可再生能源弃电消纳都在进入 AI 基础设施设计，这会把需要电力感知控制平面的站点数量继续往上推。'
  marketDefinition: 这个市场是一类软件：它把受限或波动供电的 AI 集群包装成能拿去卖的算力产品，服务对象包括独立 GPU 云、可再生能源支撑的数据中心开发商，以及其他无法假设电网始终平稳的运营方。第一波买方主要在北美，因为当地可中断与弹性算力市场已经被教育出来，而且不少能源优先 AI 项目正在密集公开。纳入范围的能力包括实时电力预测、准入控制、弹性分层打包，以及叠在现有集群管理器之上的队列编排。排除范围则包括通用调度器、泛化的 DCIM / 能源管理工具、零售 GPU 中介，以及那些把问题完全内化、并不出售中立控制软件的垂直整合云。 [3][4][6][8][10][12][22][24][27]
  customerAndBuyer: 一线用户通常是容量工程和集群运维团队，他们每天要决定在不断变化的供电边界下，哪些任务能答应、该答应给谁。经济买方通常是 GPU 云或能源支撑型算力运营商的 COO、基础设施副总裁或产能 GM。他们最急的事，是守住高价值 SLA、把弹性工作负载卖出钱，并拦住销售团队在站点可用电力、制冷或送电计划仍在变时把合同卖穿。现有替代方案，基本还是基于 Slurm / Kubernetes 的通用队列、人工限流和表格容量规划。 [3][4][6][8][9][10][11][12][14][17][19][21]
  buyingTriggers:
  - point: 新站点或扩容阶段上线时，如果供电并不平稳或是分阶段送电，运营商就需要一种可信的方法，在利用率尚未稳定前先把产能签出去。
    sourceRefs:
    - 1
    - 22
    - 25
  - point: 销售团队想像 spot / preemptible 算力那样推出打折弹性产能，而不是让间歇性产能白白闲置。
    sourceRefs:
    - 3
    - 6
    - 8
    - 20
  - point: 当运营商开始需要处理“谁拿到稀缺产能”“何时允许抢占”“这些取舍如何商业化对外呈现”等策略问题时，现有 Slurm 或 Kubernetes 队列就不够用了。
    sourceRefs:
    - 10
    - 11
    - 12
    - 14
    - 17
    - 19
  willingnessToPay:
    summary: 付费意愿主要由现有弹性算力和集群运维开支侧面托住。AWS 和 Google 早已把可中断产能做成相对按需价打 90%+ 折扣的标准产品；Lambda 和 Crusoe 公布的 H100 / H200 定价也大致落在每 GPU-hour $3.9 到 $6.2 区间。换句话说，只要软件能把可销售利用率往上抬一点，或让弹性产能卖得更稳，足以支撑一笔不小的软件预算，而不需要企业额外新开一类成本中心。 [3][6][16][20][32]
    sourceRefs:
    - 3
    - 6
    - 16
    - 20
    - 32
  competitiveLandscape: '竞争从四个方向涌来：已经卖可中断或预留产能的云平台、掌握任务放置权的开源调度器、把运维和算力销售打包的新型 GPU 云，以及在自有技术栈里把问题吃掉的垂直整合能源优先运营商。创业公司不该去替代 Slurm，也不该退化成另一个 GPU 中介；它真正该拿下的，是把波动的 MW 翻成可签约 GPU 产品的那一层。 [3][4][8][10][11][16][18][20][21][29][35]'
  incumbentThesis:
  - incumbentClass: 云平台
    point: AWS、Google Cloud 和 Azure 已经训练买方接受 spot、preemptible 和 reserved GPU 产能，但这些产品都绑定在各自的基础设施里，既不会围绕具体站点的供电边界或分阶段送电优化，也不提供中立的多站点商业化能力。
    sourceRefs:
    - 3
    - 4
    - 6
    - 8
    - 31
    - 33
  - incumbentClass: 开源调度器
    point: Slurm、Kueue 和 Kubernetes 能处理配额、抢占、队列公平性和任务放置，但它们并不会原生把不断变化的电力供给转成产品层级、交付窗口或收入感知的准入规则。
    sourceRefs:
    - 10
    - 11
    - 12
    - 13
    - 14
  - incumbentClass: Neocloud 运营商
    point: Lambda 和 Runpod 的确能快速卖出托管集群和算力，但它们的经济重心仍是售卖标准化算力库存；而对于那些在变成传统云区域之前，就需要商业化软件的站点，中立控制平面仍然有机会胜出。
    sourceRefs:
    - 16
    - 17
    - 18
    - 19
    - 34
  - incumbentClass: 垂直整合的能源优先 AI 云
    point: Crusoe 是最强的战略替代方案，因为它把能源、数据中心、云定价和运维平台全都打包了；但当运营商只想获得这项软件能力，而不愿把整套基础设施栈外包出去时，这种垂直模式并不会天然取胜。
    sourceRefs:
    - 20
    - 21
    - 22
    - 23
    - 29
    - 35
  - incumbentClass: 内部运维
    point: 许多运营商可以把调度器控制、表格和人工限流拼起来用，但预测、打包和证明弹性产能的运维负担，正是专业软件应当创造价值的地方。
    sourceRefs:
    - 5
    - 9
    - 10
    - 17
    - 19
  regulatoryLandscape: 当前并没有一条直接驱动这个细分市场的应用层监管；更难的约束来自基础设施本身。数据中心依旧是高耗能资产，大负载选址和效率都很关键，运营商也需要拿出清楚证据，说明站点电力是如何转化成可交付算力的。这正有利于那些能暴露假设、保护承诺并形成可审计运行历史的软件。 [27][28]
  technologyLandscape: '底层调度栈已经相当丰富：Slurm 覆盖抢占、预留、QoS 和节能；Kueue 与 Kubernetes 在云原生环境里增加配额、公平性和抢占；NVIDIA、Lambda 和 Runpod 也都在打包托管式集群控制。因此，持久的切口不在基础编排，而在围绕运营商现有控制平面的电力感知预测与商业化能力。 [9][10][11][12][13][14][15][17][19][21]'
  distributionChannels:
  - point: 直接向 neocloud 或能源支撑运营商中的基础设施和产能负责人销售，是最清晰的第一步，因为产品能帮他们更早、更安全地签约产能。
    sourceRefs:
