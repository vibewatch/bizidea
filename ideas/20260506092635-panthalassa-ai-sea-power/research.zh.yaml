  validationPlan:
  - priority: high
    question: 未来 24 个月内，会有多少非超大规模、具有非平坦电力画像的 AI 站点上线？
    evidenceToGather: 与电力支撑算力运营商、数据中心开发商和 GPU 云开展管道访谈；收集站点 MW、送电阶段安排和销售模式。
  - priority: high
    question: 买方会为中立软件付费，还是更偏好像 Crusoe 这样的垂直整合提供商？
    evidenceToGather: 对 5 到 10 位基础设施负责人进行访谈，比较他们在中立软件、内部运维和垂直整合云之间的自建/购买偏好。
  - priority: medium
    question: 在创业公司尚未掌握准入控制前，只读预测和灵活队列产品能否先交付 ROI？
    evidenceToGather: 与设计合作伙伴开展试点，衡量在不插入控制路径的情况下，可销售利用率提升、预测误差和避免的 SLA 未命中。
  - priority: medium
    question: 哪些工作负载实际上足够能容忍中断，从而填满灵活队列？
    evidenceToGather: 对批量训练、回填任务、离线推理和内部实验做作业级分析，量化其对完成窗口的容忍度。
