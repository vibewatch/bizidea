  tam:
    value: $74.6M
    rationale: 采用自下而上、保守的“可见 MW”方法：Crusoe 新 Abilene 园区宣布 900 MW，Soluna 的 Project Kati 为 166 MW，总计 1,066 MW 的公开可见能源优先 AI 容量；按估计每 MW-year $70k 的软件支出计算，TAM 约为 $74.6M。该方法有意低估了其他站点，并假设定价仅占隐含 GPU 算力收入的一小部分。 [22][25]
    isEstimate: true
    sourceRefs:
    - 22
    - 25
  sam:
    value: $30.0M
    rationale: 将 TAM 收束到首波滩头市场：大约 500 MW 的北美独立 GPU 云和可再生能源支撑站点，更可能向第三方出售容量而不是内部消化该能力；按每 MW-year $60k 计算，SAM 约为 $30.0M。 [1][22][24][25]
    isEstimate: true
    sourceRefs:
    - 1
    - 22
    - 24
    - 25
  som:
    value: $4.8M
    rationale: 可触达的第 3 年 SOM 假设为约 80 MW 在管容量，按 roughly $60k per MW-year 计，相当于 8 个平均 10 MW 的站点，或 4 个平均 20 MW 的站点。相对于公开可见站点规模，这个目标较为克制，也符合先占领滩头的 rollout 路径。 [16][18][22][25]
    isEstimate: true
    sourceRefs:
    - 16
    - 18
    - 22
    - 25
bottomUpSizingDrivers:
- driver: 公开能源优先 AI 站点中的可见可触达 MW
  value: 1,066 MW（Crusoe 900 MW + Soluna Project Kati 166 MW）
  source: '[22][25]'
- driver: 隐含付费意愿锚点
  value: 估计 $60k-$70k per MW-year
  source: 由公开 GPU 云价格密度 [16][20] 推算
- driver: 第 3 年可触达在管 MW
  value: 80 MW
  source: 基于 4-8 个设计合作伙伴 / 早期商业站点的估计
categoryDynamics:
  growthRate: 公开的能源优先 AI 项目在 2025-26 年从 83-166 MW 阶段跃升至 900 MW 园区级公告。
  growthRateSourceRefs:
  - 22
  - 25
  - 26
  tailwinds:
  - point: 现货和可抢占算力市场已经让“部分 AI 工作负载可以用确定性换取更低成本”的理念常态化。
    sourceRefs:
    - 3
    - 6
    - 8
  - point: 能源优先运营商正在把 AI 算力与现场发电、储能或弃电可再生能源结合，增加非平坦供电站点的数量。
    sourceRefs:
    - 22
    - 23
    - 24
    - 25
    - 35
  - point: 调度器基础能力正在商品化，使得在其上构建商业化层，比重造一个新的集群管理器更可行。
    sourceRefs:
    - 10
    - 12
    - 15
    - 17
    - 19
  headwinds:
  - point: 初始买方群体仍然很小，而且最成熟的一些运营商可能更偏好垂直整合方案或内部工具。
    sourceRefs:
    - 20
    - 21
    - 22
    - 29
  - point: 任何触及准入控制的软件，都会面临运营商对信任、集成和回滚的顾虑，尤其在昂贵 GPU 机群场景下。
    sourceRefs:
    - 10
    - 11
    - 12
    - 17
    - 19
competitors:
- name: SchedMD / Slurm
  stage: 既有厂商
  wedge: HPC 和 AI 集群的默认开源工作负载管理器，内置 QoS、预留和抢占。
  pricing: 开源软件；企业支持和服务单独销售。
  strength: 在 GPU/HPC 环境中具备深厚的运营可信度和广泛部署。
  weaknessVsUs: 它优化的是调度原语，而不是把可变电力容量打包成面向客户的产品或收益感知的准入规则。
  sourceRefs:
  - 10
  - 11
- name: AWS EC2 Spot + Capacity Blocks
  stage: 既有厂商
  wedge: 在超大云内部直接商业化可中断和预留的 GPU 容量。
  pricing: Spot 定价最高可比按需低 90%；Capacity Blocks 用于预留 ML GPU 容量。
  strength: 买方熟悉度高、API 成熟，并直接证明灵活算力是真实购买行为。
  weaknessVsUs: 它只解决 AWS 内部问题，无法帮助第三方运营商将自有可变电力站点货币化。
  sourceRefs:
  - 3
  - 4
  - 5
  - 31
- name: Lambda
  stage: 成长阶段
  wedge: 拥有公开 GPU 定价和托管 Slurm/Kubernetes 产品的新型云。
  pricing: 公开 H100 和 B200 实例 / 集群定价；大型预留 H100 集群定价约为每 GPU 小时 $5.54-$6.16。
  strength: 定价透明、运营成熟，并已分销到创业公司瞄准的那类买方。
  weaknessVsUs: Lambda 销售的是容量和托管基础设施，而不是面向第三方站点的中立电力感知商业化层。
  sourceRefs:
  - 16
  - 17
  - 34
- name: Runpod
  stage: 成长阶段
  wedge: 面向开发者友好的 GPU 云，提供 instant clusters 和基于 Slurm 的集群文档。
  pricing: Pods 与 serverless 的公开定价，以及 instant-cluster 文档。
  strength: 价值实现速度快，适合优先追求速度与灵活性的运营商或买方。
  weaknessVsUs: 它并不以电力包络预测或与站点能源约束绑定的灵活容量打包为核心。
  sourceRefs:
  - 18
  - 19
- name: Crusoe
  stage: 成长阶段
  wedge: 垂直整合的能源优先 AI 云，将数据中心、电力策略、云定价和运维工具结合在一起。
  pricing: 公开云定价，包括 H100/H200 费率以及现货 / 按需选项。
  strength: 它是最完整的替代方案，因为可以通过垂直整合来解决这一问题，而非依赖中立软件。
  weaknessVsUs: 中立创业公司可以服务那些想获得该能力、却不想购买 Crusoe 整套基础设施栈或竞争云的运营商。
  sourceRefs:
  - 20
  - 21
  - 22
  - 23
  - 29
  - 35
regulatoryTechnicalConstraints:
- point: 数据中心能耗强度和大负荷规划仍是现实约束，因此任何商业化层都必须把承诺的算力映射到实际站点的能源和制冷上限。
  sourceRefs:
  - 27
  - 28
- point: 灵活容量产品只适用于那些能够容忍中断、抢占或完成窗口的工作负载。
  sourceRefs:
  - 3
  - 5
  - 6
  - 8
- point: 集成风险很高，因为产品必须在不制造不稳定性的前提下，接入或影响 Slurm、Kubernetes 或托管集群控制平面。
  sourceRefs:
  - 10
  - 12
  - 15
  - 17
  - 19
- point: 预测质量取决于能否获得实时电力、制冷和队列遥测，而这些数据往往分散在不同运营系统中。
  sourceRefs:
  - 11
  - 21
  - 27
- point: 安全性和运营商信任很重要，因为该软件会触及调度策略、容量分配以及潜在的面向客户承诺。
  sourceRefs:
  - 15
  - 17
  - 19
validationSignals:
- point: Panthalassa 的 $140M 融资表明，投资者愿意为非传统 AI 供电架构提供资金，而不是假设未来所有产能都只会落在传统电网支撑园区。
  sourceRefs:
  - 1
  - 2
- point: Crusoe 宣布为 Microsoft 建设一个新的 900 MW AI 园区，并称更大的 Abilene 站点预计将达到 2.1 GW，表明“受电力塑形的 AI 基础设施”已具备园区级需求。
  sourceRefs:
  - 22
- point: Crusoe 与 Form Energy 宣布将为 AI 数据中心部署 12 GWh 的铁空气电池，表明“电力塑形”正在进入新站点的运行设计。
  sourceRefs:
  - 23
- point: Soluna 明确把 AI 负载描述为灵活需求，并称 Project Kati 是一个 166 MW 的风电数据中心，其中首期为 83 MW。
  sourceRefs:
  - 24
  - 25
- point: Lambda 和 Runpod 都提供托管 Slurm / 集群产品，证明运营商已经愿意在原始 GPU 之上购买更高层级的控制和运维工具。
  sourceRefs:
  - 17
  - 19
- point: AWS、Google 和 Azure 都在销售可中断容量产品，证明市场确实存在对更低成本、但交付保障更弱的算力需求。
  sourceRefs:
  - 3
  - 6
  - 8
openQuestions:
- 未来 24 个月内，会有多少具有明显可变电力画像的非超大规模 AI 站点实现商业化上线？
- 早期买方会偏好中立的商业化软件，还是默认选择像 Crusoe 这样的垂直整合运营商？
- 在运营商愿意把实时准入控制交给创业公司之前，只读预测和灵活队列层能否先证明 ROI？
- 哪些工作负载类别足够容忍完成窗口，从而形成首个可重复的灵活容量产品？
