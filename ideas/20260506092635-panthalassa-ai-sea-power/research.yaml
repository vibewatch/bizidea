market:
  tam:
    value: $74.6M
    rationale: 'Bottom-up, conservative visible-MW method: 900 MW announced at Crusoe''s new Abilene campus plus 166 MW for Soluna''s Project Kati = 1,066 MW of publicly visible energy-first AI capacity; applying an estimated $70k per MW-year software spend yields about $74.6M. This intentionally undercounts other sites and assumes pricing that is a small fraction of implied GPU compute revenue. [22][25]'
    isEstimate: true
    sourceRefs:
    - 22
    - 25
  sam:
    value: $30.0M
    rationale: 'Constraint the TAM to the first-wave beachhead: roughly 500 MW of North American independent GPU-cloud and renewable-backed sites likely to sell third-party capacity rather than internalize the capability; at $60k per MW-year, SAM is about $30.0M. [1][22][24][25]'
    isEstimate: true
    sourceRefs:
    - 1
    - 22
    - 24
    - 25
  som:
    value: $4.8M
    rationale: Reachable year-3 SOM assumes 80 MW under management at roughly $60k per MW-year, equivalent to 8 sites averaging 10 MW or 4 sites averaging 20 MW. This is modest relative to visible public site sizes and fits a beachhead-first rollout. [16][18][22][25]
    isEstimate: true
    sourceRefs:
    - 16
    - 18
    - 22
    - 25
