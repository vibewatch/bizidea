openQuestions:
- How many non-hyperscaler AI sites with materially variable power profiles will be commercially live in the next 24 months?
- Do early buyers prefer neutral commercialization software, or will they default to vertically integrated operators such as Crusoe?
- Can a read-only forecasting and flex-queue layer prove ROI before operators trust the startup with live admission control?
- Which workload classes are tolerant enough of completion windows to form the first repeatable flex-capacity product?
