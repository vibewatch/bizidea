  validationPlan:
  - priority: high
    question: How many non-hyperscaler AI sites with non-flat power profiles will launch in the next 24 months?
    evidenceToGather: Pipeline interviews with energy-backed compute operators, data-center developers, and GPU clouds; collect site MW, energization phasing, and sales model.
  - priority: high
    question: Will buyers pay for neutral software or prefer a vertically integrated provider such as Crusoe?
    evidenceToGather: Five to ten interviews with infra leaders comparing make/buy preferences across neutral software, in-house ops, and vertically integrated clouds.
  - priority: medium
    question: Can a read-only forecasting and flex-queue product deliver ROI before the startup owns admission control?
    evidenceToGather: Design-partner pilots measuring sellable utilization lift, forecast error, and avoided SLA misses with no control-path insertion.
  - priority: medium
    question: Which workloads are actually interruption-tolerant enough to fill flex queues?
    evidenceToGather: Job-level analysis across batch training, backfills, offline inference, and internal experimentation to quantify completion-window tolerance.
