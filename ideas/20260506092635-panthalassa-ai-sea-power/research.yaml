reportMemo:
  executiveTakeaways:
  - 'The beachhead is real but narrow: public energy-first AI buildouts now span fresh Panthalassa funding and site announcements that jumped from tens of MW to 166 MW and 900 MW-class projects, but the first buyer set is still a small club of neoclouds and power-backed operators.'
  - 'The strongest wedge is commercialization, not scheduling alone: hyperscaler spot/preemptible products prove demand for discounted flexible compute, while generic schedulers still treat power as a static constraint rather than a sellable product attribute.'
  - Incumbent risk is feature absorption by cloud and scheduler vendors, so the startup must own live power forecasting, job admission, and SLA packaging specific to variable-energy sites rather than compete as yet another cluster dashboard.
  - Public GPU pricing shows that even a thin software take-rate can matter economically because each MW of AI capacity can produce high revenue density before any flex-capacity uplift.
  - 'Adoption friction is operational rather than conceptual: infra teams already buy managed Slurm, Kubernetes, and cluster tooling, but they are cautious about inserting a new control layer into the critical path.'
  - 'Why now is stronger than the original offshore narrative alone: batteries, onsite generation, and renewable-curtailment strategies are becoming part of AI infrastructure design, expanding the number of sites that need a power-aware control plane.'
  marketDefinition: The market is software that turns constrained or variable-power AI clusters into sellable compute products for independent GPU clouds, renewable-backed data-center developers, and other operators who cannot assume flat grid-like capacity. The first buyer geography is North America, where public spot/preemptible compute markets are mature and many visible energy-first AI projects are being announced. Included are live power forecasting, admission control, flex-tier packaging, and queue orchestration above existing cluster managers. Excluded are generic schedulers, general DCIM/energy-management tools, retail GPU brokers, and vertically integrated clouds where the operator internalizes the problem instead of selling neutral control software. [3][4][6][8][10][12][22][24][27]
  customerAndBuyer: Primary users are capacity-engineering and cluster-operations teams who must decide which jobs can be promised under a non-flat power envelope. The economic buyer is typically the COO, VP Infrastructure, or GM of capacity at a GPU cloud or power-backed compute operator. Their urgent jobs are to protect premium SLAs, monetize flexible workloads, and stop sales teams from overcommitting a site whose available power, cooling, or energization schedule is still changing. Current alternatives are generic Slurm/Kubernetes-based queues, manual throttling, and spreadsheet capacity planning. [3][4][6][8][9][10][11][12][14][17][19][21]
  buyingTriggers:
  - point: A new site or expansion phase comes online with non-flat power delivery or staged energization, and the operator needs a credible way to contract capacity before utilization is stable.
    sourceRefs:
    - 1
    - 22
    - 25
  - point: The sales team wants to offer discounted flex capacity analogous to spot/preemptible compute rather than leave intermittent capacity idle.
    sourceRefs:
    - 3
    - 6
    - 8
    - 20
  - point: Existing Slurm or Kubernetes queues stop being enough because the operator now needs policy around who gets scarce capacity, when preemption is acceptable, and how to expose those tradeoffs commercially.
    sourceRefs:
    - 10
    - 11
    - 12
    - 14
    - 17
    - 19
  willingnessToPay:
    summary: Willingness to pay is supported indirectly by existing spend on flexible compute and cluster operations. AWS and Google market interruptible capacity as 90%+ discounts to on-demand pricing, while Lambda and Crusoe publish H100/H200 pricing in the roughly $3.9 to $6.2 per GPU-hour range. That means even modest improvements in sellable utilization or safer flex-capacity packaging can justify meaningful software spend without requiring a new budget category. [3][6][16][20][32]
    sourceRefs:
    - 3
    - 6
    - 16
    - 20
    - 32
  competitiveLandscape: 'Competition comes from four directions: cloud platforms that already sell interruptible or reserved capacity, open-source schedulers that own job placement, neoclouds that bundle operations with capacity sales, and vertically integrated energy-first operators that solve the problem inside their own stack. The startup should not try to replace Slurm or become another GPU broker; it should own the translation layer between volatile megawatts and contractual GPU products. [3][4][8][10][11][16][18][20][21][29][35]'
  incumbentThesis:
  - incumbentClass: Cloud platforms
    point: AWS, Google Cloud, and Azure already train buyers to accept spot, preemptible, and reserved GPU capacity, but their products are tied to their own infrastructure and do not optimize around site-specific power envelopes, phased energization, or neutral multi-site commercialization.
    sourceRefs:
    - 3
    - 4
    - 6
    - 8
    - 31
    - 33
  - incumbentClass: Open-source schedulers
    point: Slurm, Kueue, and Kubernetes handle quotas, preemption, queue fairness, and job placement, but they do not natively convert changing power availability into product tiers, delivery windows, or revenue-aware admission rules.
    sourceRefs:
    - 10
    - 11
    - 12
    - 13
    - 14
  - incumbentClass: Neocloud operators
    point: Lambda and Runpod sell managed clusters and capacity quickly, yet their economic center is selling standard compute inventory; a neutral control plane can still win at sites that need commercialization software before they look like a conventional cloud region.
    sourceRefs:
    - 16
    - 17
    - 18
    - 19
    - 34
  - incumbentClass: Vertically integrated power-first AI clouds
    point: Crusoe is the strongest strategic substitute because it combines energy, data centers, cloud pricing, and an operations platform, but that vertical model does not win by default when operators want the software capability without outsourcing the entire infrastructure stack.
    sourceRefs:
    - 20
    - 21
    - 22
    - 23
    - 29
    - 35
  - incumbentClass: In-house operations
    point: Many operators can stitch together scheduler controls, spreadsheets, and manual throttling, but the operational burden of forecasting, packaging, and proving flexible capacity is precisely where specialist software should add value.
    sourceRefs:
    - 5
    - 9
    - 10
    - 17
    - 19
  regulatoryLandscape: There is no single application-layer regulation driving this niche yet; the harder constraints are infrastructure ones. Data centers remain energy-intensive assets, large-load siting and efficiency matter, and operators need clean evidence on how site power translates into delivered compute. That favors software that can expose assumptions, protect commitments, and create an auditable operating history. [27][28]
  technologyLandscape: 'The underlying scheduling stack is already rich: Slurm covers preemption, reservations, QoS, and power saving; Kueue and Kubernetes add quota, fairness, and preemption in cloud-native environments; NVIDIA, Lambda, and Runpod all package managed cluster control. The durable wedge is therefore not basic orchestration but power-aware forecasting and commercialization across whichever control plane the operator already runs. [9][10][11][12][13][14][15][17][19][21]'
  distributionChannels:
  - point: Direct selling into infrastructure and capacity leaders at neoclouds or power-backed operators is the clearest first motion because the product helps them contract capacity sooner and more safely.
    sourceRefs:
