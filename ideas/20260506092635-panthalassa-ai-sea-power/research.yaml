competitors:
- name: SchedMD / Slurm
  stage: incumbent
  wedge: Default open-source workload manager for HPC and AI clusters with built-in QoS, reservations, and preemption.
  pricing: Open-source software; enterprise support and services sold separately.
  strength: Deep operational credibility and broad deployment in GPU/HPC environments.
  weaknessVsUs: Optimizes scheduling primitives but does not package variable-power capacity into customer-facing products or revenue-aware admission rules.
  sourceRefs:
  - 10
  - 11
- name: AWS EC2 Spot + Capacity Blocks
  stage: incumbent
  wedge: Commercializes interruptible and reserved GPU capacity directly inside a hyperscaler cloud.
  pricing: Spot priced at up to 90% below on-demand; Capacity Blocks reserve ML GPU capacity.
  strength: Buyer familiarity, mature APIs, and immediate proof that flexible compute is a real buying behavior.
  weaknessVsUs: Only solves the problem inside AWS and does not help third-party operators monetize their own variable-power sites.
  sourceRefs:
  - 3
  - 4
  - 5
  - 31
- name: Lambda
  stage: scale-up
  wedge: Neocloud with public GPU pricing and managed Slurm/Kubernetes offerings.
  pricing: Public H100 and B200 instance / cluster pricing; H100 cluster pricing published from roughly $5.54-$6.16 per GPU-hour for larger reserved clusters.
  strength: Transparent pricing, operational maturity, and managed cluster distribution into exactly the kind of buyer the startup wants.
  weaknessVsUs: Lambda sells capacity and managed infrastructure, not a neutral power-aware commercialization layer for third-party sites.
  sourceRefs:
  - 16
  - 17
  - 34
- name: Runpod
  stage: scale-up
  wedge: Developer-friendly GPU cloud with instant clusters and Slurm-based cluster docs.
  pricing: Public pricing for pods and serverless plus instant-cluster documentation.
  strength: Fast time-to-value and strong fit for operators or buyers who prioritize speed and flexibility.
  weaknessVsUs: Not centered on power-envelope forecasting or flex-capacity packaging tied to site energy constraints.
  sourceRefs:
  - 18
  - 19
- name: Crusoe
  stage: scale-up
  wedge: Vertically integrated energy-first AI cloud combining data centers, power strategy, cloud pricing, and operations tooling.
  pricing: Public cloud pricing including H100/H200 rates and spot / on-demand options.
  strength: Most complete substitute because it can solve the problem via vertical integration rather than neutral software.
  weaknessVsUs: A neutral startup can serve operators that want the capability without buying Crusoe's full infrastructure stack or competing clouds.
  sourceRefs:
  - 20
  - 21
  - 22
  - 23
  - 29
  - 35
