problem: AI 基础设施建设者越来越多地拿到间歇性、偏远或运行条件特殊的 MW，却还在按电力稳定且有保障的前提销售算力。通用调度器优化的是 GPU，而不是背后不断变化的供电边界，所以运营方只能在超配、让昂贵硬件闲置，或错过客户 SLA 之间做取舍。随着新的海上与可再生能源支撑的数据中心项目上线，商业瓶颈正从“找 GPU”转向“如何把波动电力稳定打包成可用算力产品”。
targetUser:
  primary: 正在上线 10–100 MW 非传统电力支撑算力集群的独立 GPU 云运营商，其基础设施副总裁或容量工程负责人
  secondary: 愿意购买打折弹性训练产能的基础模型实验室容量规划负责人
  buyer: AI 基础设施服务商的 COO、基础设施副总裁，或云算力业务 GM
startupThesis:
  nonObviousInsight: AI 里真正稀缺的资源，已不只是 GPU，而是可以拿去签约的电力可预测性。随着海上、储能支撑和表后供电站点变得可行，真正能赢的控制层会把波动的 MW 变成可签约的 GPU 产品，而不是默认电网会像传统机房那样稳定。
  beachhead: 为首批部署海上、表后可再生能源或储能支撑电力集群的独立 GPU 云运营商服务；这些客户最初销售的是允许灵活完工窗口的批量训练和离线推理任务
  wedge: 一层电力感知的调度与商业化软件，接入实时电力边界，预测可用 GPU-hour，并自动只准入、定价和路由那些符合该能源画像的任务
  whyNowCatalyst: Panthalassa 这轮 $140 million 融资说明，AI 运营商正在主动把算力迁往非传统电源，因为电力可得性已经成了真正的限制项。
  ventureScalePath: 先从波动电力集群上的弹性 AI 工作负载控制平面切入，再扩展到标准调度、能源来源证明、产能交易市场，以及面向所有受电力约束 AI 基础设施的融资级表现数据。
solution: 产品位于 Slurm、Kubernetes 或自研集群管理器之上，把实时供电能力转成可以销售的算力分层。它会预测一个站点究竟能安全承诺多少 GPU-hour，把高价关键负载与弹性负载分开，并随着能源条件变化重新定价排队时段。对运营商来说，它能把搁浅或间歇性的电力变成新的收入来源，同时不去冒核心 SLA 的风险。对客户来说，它提供更便宜的弹性产能，并清楚给出完工窗口和能源来源。长期看，公司还能沉淀一套基准数据，说明波动性电力站点究竟怎样把 MW 兑现成 AI 吞吐。
goToMarketSeed:
  firstCustomer: 一家处于 Series A 或 B 的 GPU 云创业公司，正在用表后可再生能源、储能或近海电力上线首个 20–50 MW 集群，并希望在利用率稳定前就卖出企业训练合同
  buyingTrigger: 新站点上线后供电并不平稳，销售团队必须拿出一种可信的方法来签约产能，又不能把 uptime 承诺做爆
  currentAlternative: 通用集群调度器，加上基于表格的容量规划、人工限流和保守超配
  switchingReason: 这层切口让运营商能把电力波动直接货币化为打折弹性算力，同时保护高价队列，因此比人工管控更快卖出更多产能
  pricingHypothesis: 按托管 MW 收取平台费，再对排入弹性产能层的 GPU-hour 收取用量费
whyNow:
  - point: 电力可得性如今已被明确指出，是更大 AI 模型和新数据中心建设的瓶颈。
    signalRefs: [AI 电力瓶颈已上升到资本级问题]
    sourceRefs: [1]
  - point: 海上数据中心基础设施正从思想实验走向获得资金支持的实际部署，催生出一类有全新调度需求的运营商。
    signalRefs: [海上算力已从概念走向获资建设]
    sourceRefs: [1, 3]
  - point: 可再生能源和海洋能源公司如今是在直接为 AI 算力需求做设计，而不只是卖电。
    signalRefs: [可再生能源正成为 AI 基础设施设计的一部分]
    sourceRefs: [2]
  - point: 领投机构正在资助替代性的 AI 供电架构，这会增加需要软件来商业化波动能源的站点数量。
    signalRefs: [投资人愿意押注 AI 的非传统供电架构]
    sourceRefs: [2]
differentiator: 现有集群调度器默认电力只是一个静态约束，而公用事业软件又默认算力需求不是自己的问题。这家公司做的正是把波动的 MW 翻译成可签约 GPU 产品的中间层。它的护城河来自站点级数据：电力波动、队列结构和硬件行为究竟如何交互。这会持续提升预测、定价和 SLA 设计能力。随着时间推移，这套数据不仅对运营商有价值，对金融机构、保险方，以及评估非传统 AI 产能的客户也有价值。
