topRisks:
  - name: 市场起量仍早
    description: 今年真正投入生产的波动供电 AI 集群也许还太少，无法支撑初期 ARR 快速增长。
    mitigation: 起步阶段覆盖所有表后供电或弃电型 GPU 站点，而不是只盯海上部署，同时保持同一套产品架构。
  - name: 集成阻力
    description: 基础设施团队可能不愿意在关键集群运行链路里插入一层新的控制软件。
    mitigation: 先以只读预测和弹性队列产品切入，建立信任后再接管准入控制。
  - name: 客户可能更偏好固定电力合同
    description: 如果操作取舍太复杂，企业买家可能会回避弹性产能。
    mitigation: 早期销售聚焦批量训练、回填任务和离线推理，这些场景里价格优势通常明显大于时间灵活性的代价。
