problem: AI 基础设施建设者越来越多地拥有间歇性、偏远或运行条件非常规的兆瓦电力，但他们仍按电力平稳且有保障的前提销售算力。通用调度器优化的是 GPU，而不是其背后不断变化的电力包络，因此运营商要么超配、让昂贵硬件闲置，要么无法兑现客户 SLA。随着新的海上和可再生能源支撑数据中心项目上线，商业瓶颈正从“找到 GPU”转向“如何把波动的电力可靠地打包成可用的算力产品”。
targetUser:
  primary: 独立 GPU 云运营商中负责将 10 到 100 MW 非传统电力支撑算力上线的基础设施副总裁或容量工程负责人
  secondary: 愿意购买折扣灵活训练容量的基础模型实验室容量规划负责人
  buyer: AI 基础设施提供商中的 COO、基础设施副总裁或云容量总经理
startupThesis:
  nonObviousInsight: AI 中稀缺的资源不再只是 GPU，而是可被承诺的电力可预测性。随着海上、储能支撑和表后站点变得可行，胜出的控制层将把波动兆瓦转化为可签约的 GPU 产品，而不是假设其具备类似电网的稳定性。
  beachhead: 正在调试其首批海上、表后可再生能源或储能支撑集群的独立 GPU 云运营商，并且起步时销售具有灵活完成窗口的批量训练和离线推理任务
  wedge: 一层电力感知的调度与商业化能力，接入实时电力包络，预测可用 GPU 小时，并自动准入、定价和路由仅适合该能源画像的任务
  whyNowCatalyst: Panthalassa 的 $140 million 融资表明，AI 运营商正积极把算力迁移到非传统电力来源，因为电力可用性已成为限制因素。
  ventureScalePath: 先成为可变电力集群上灵活 AI 工作负载的控制平面，再扩展到标准调度、能源溯源、容量市场，以及面向所有受电力约束 AI 基础设施的融资级性能数据。
solution: 该产品位于 Slurm、Kubernetes 或专有集群管理器之上，把实时电力可用性转化为可销售的算力层级。它预测站点能够安全承诺多少 GPU 小时，将高级工作负载与灵活工作负载分流，并随着能源条件变化对队列时段重新定价。对运营商而言，它能在不危及核心 SLA 的情况下，把闲置或间歇性电力转化为新的收入来源；对客户而言，它提供更便宜、具备透明完成窗口和能源溯源的灵活容量。长期来看，公司还可构建“可变电力站点如何将兆瓦转化为 AI 吞吐”的基准数据集。
goToMarketSeed:
  firstCustomer: 一家处于 Series A 或 B 阶段的 GPU 云创业公司，正把其首个 20 到 50 MW 集群部署在表后可再生能源、储能支撑或近海电力站点上，并在利用率尚未稳定前尝试出售企业训练合同
  buyingTrigger: 一个供电并非平坦的新站点上线，而销售团队需要一种可信方式在不过度承诺可用性的前提下签约容量
  currentAlternative: 通用集群调度器，加上基于电子表格的容量规划、人工限流和保守超配
  switchingReason: 这一切入点让运营商能把电力波动货币化为折扣灵活算力，同时保护高级队列，因此比手工设闸更快卖出更多容量
  pricingHypothesis: 按在管 MW 收取平台费，并按调度进入灵活容量层级的 GPU 小时收取使用费
