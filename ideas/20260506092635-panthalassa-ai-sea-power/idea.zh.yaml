jobsToBeDone:
  - job: 当一个新的波动供电 AI 站点上线时，帮助基础设施运营商把合适的任务承诺给合适的客户，让他们在不违背 SLA 的前提下卖出更多产能。
    currentAlternative: 在通用调度器里做人工限流和保守超卖
    successMetric: 可销售利用率和弹性产能收入提升，同时未履约任务承诺不增加
