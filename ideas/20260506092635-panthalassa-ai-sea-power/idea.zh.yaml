  defensibility:
    score: 4
    rationale: 将电力包络与吞吐及 SLA 结果相联系的专有运营数据，能够复利形成强护城河。
  ventureScale:
    score: 5
    rationale: 如果非传统电力成为 AI 容量的重要来源，这一调度与商业化层可成为核心基础设施。
topRisks:
- name: 市场仍处早期
  description: 今年投入生产的可变电力 AI 集群可能仍然太少，无法支撑 ARR 的快速初始增长。
  mitigation: 从任何表后或弃电 GPU 站点切入，而不仅限于海上部署，同时保持相同的产品架构。
- name: 集成摩擦
  description: 基础设施团队可能抗拒在关键任务集群运行中引入新的控制层。
  mitigation: 先以只读预测和灵活队列产品上线，再在赢得信任后接管准入控制。
- name: 客户可能更偏好固定电力合同
  description: 如果运营权衡显得过于复杂，企业买家可能会回避灵活容量。
  mitigation: 早期销售聚焦于批量训练、回填任务和离线推理，在这些场景中价格节省明显大于时间灵活性的代价。
