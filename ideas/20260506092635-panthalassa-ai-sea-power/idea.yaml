topRisks:
  - name: Market still early
    description: There may be too few variable-power AI clusters in production this year to support fast initial ARR growth.
    mitigation: Start with any behind-the-meter or curtailed-power GPU sites, not only offshore deployments, while keeping the same product architecture.
  - name: Integration friction
    description: Infrastructure teams may resist inserting a new control layer into mission-critical cluster operations.
    mitigation: Launch as a read-only forecasting and flex-queue product first, then earn trust before taking over admission control.
  - name: Customers may prefer fixed-power contracts
    description: Enterprise buyers could avoid flex capacity if the operational tradeoff feels too complex.
    mitigation: Focus early sales on batch training, backfills, and offline inference workloads where price savings clearly outweigh timing flexibility.
