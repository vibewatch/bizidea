problem: AI infrastructure builders increasingly have megawatts that are intermittent, remote, or operationally unusual, but still sell compute as if power were flat and guaranteed. Generic schedulers optimize GPUs, not the changing power envelope behind them, so operators either overprovision, idle expensive hardware, or miss customer SLAs. As new offshore and renewable-backed data-center projects come online, the commercial bottleneck shifts from finding GPUs to reliably packaging volatile power into usable compute products.
targetUser:
  primary: VP Infrastructure or Head of Capacity Engineering at an independent GPU cloud operator bringing 10 to 100 MW of nontraditional power-backed compute online
  secondary: Capacity planning lead at a foundation model lab willing to buy discounted flexible training capacity
  buyer: COO, VP Infrastructure, or GM of cloud capacity at an AI infrastructure provider
startupThesis:
  nonObviousInsight: The scarce resource in AI is no longer just GPUs but bankable power predictability. As offshore, battery-backed, and behind-the-meter sites become viable, the winning control layer will convert variable megawatts into contractual GPU products rather than assume grid-like stability.
  beachhead: Independent GPU cloud operators commissioning first clusters on offshore, behind-the-meter renewable, or battery-backed power and initially selling batch training and offline inference jobs with flexible completion windows
  wedge: A power-aware scheduling and commercialization layer that ingests live power envelopes, forecasts available GPU-hours, and automatically admits, prices, and routes only the jobs that fit that energy profile
  whyNowCatalyst: Panthalassa's $140 million funding round shows that AI operators are actively moving compute toward nontraditional power sources because power availability has become the limiting factor.
  ventureScalePath: Start as the control plane for flexible AI workloads on variable-power clusters, then expand into standard scheduling, energy provenance, capacity marketplaces, and financing-grade performance data for all power-constrained AI infrastructure.
solution: The product sits above Slurm, Kubernetes, or proprietary cluster managers and turns real-time power availability into sellable compute tiers. It forecasts how many GPU-hours a site can safely promise, gates premium workloads from flex workloads, and reprices queue slots as energy conditions change. For operators, it converts stranded or intermittent power into a new revenue line without risking core SLAs. For customers, it exposes cheaper flex capacity with transparent completion windows and energy provenance. Over time, the company can build the benchmark dataset for how variable-power sites actually translate megawatts into AI throughput.
goToMarketSeed:
  firstCustomer: A Series A or B GPU cloud startup launching its first 20 to 50 MW cluster on behind-the-meter renewable, battery-backed, or offshore-adjacent power and trying to sell enterprise training contracts before utilization is stable
  buyingTrigger: A new site comes online with non-flat power delivery, and the sales team needs a credible way to contract capacity without overcommitting uptime
  currentAlternative: Generic cluster schedulers plus spreadsheet-based capacity planning, manual throttling, and conservative overprovisioning
  switchingReason: The wedge lets operators monetize power variability as discounted flex compute while protecting premium queues, so they can sell more capacity faster than with manual gating
  pricingHypothesis: Platform fee per MW under management plus a usage fee on GPU-hours scheduled into flex capacity tiers
