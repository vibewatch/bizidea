slug: power-aware-gpu-scheduler
date: "2026-05-06"
executiveSummary: >-
  这家公司应该把一层电力感知的商业化软件卖给北美 GPU 云运营商：这些客户正在上线 10–50 MW 的波动供电集群，又必须在站点性能尚未稳定前先把产能签出去。首个产品不该是新的调度器，而应是位于 Slurm、Kubernetes 或托管式集群控制平面之上的只读预测、弹性队列和 SLA 打包层。第一批客户应是处于 Series A 或 B 的 neocloud，或具备能源支撑能力的运营商；它们正在上线表后供电、储能支撑、弃电可再生能源或近海电力站点，并想在保护高价值队列的同时，把更便宜的弹性训练产能卖出去。真正的购买触发点是站点上线或扩容时出现分阶段送电、供电不平稳，因为这正是表格规划和通用调度器开始不够用的时刻。研究证明这个切口真实存在，也有明确付费意愿，但短期市场仍然狭窄，SAM 约为 $30.0M，因此如果想跑出风险投资级别的体量，必须继续扩展到更多受电力约束的 AI 基础设施类别。产品和 GTM 的节奏也因此必须从只读验证开始，先做弹性产能打包，再在公司拿到站点级预测数据和运营方信任后，逐步走到准入控制。当前最大的市场风险仍是量：现有输入并没有证明未来 24 个月会有多少非 hyperscaler 的波动供电 AI 站点真正商业化落地，所以早期成败更该看付费试点和托管 MW，而不是 logo 数量。
problem:
  - 独立 GPU 云和能源支撑型 AI 站点越来越多地拿到可用但间歇、分阶段上线或运行条件特殊的 MW，可它们仍然得带着可信交付承诺去卖算力。
  - 通用调度器和人工容量规划能分配任务，却不能把不断变化的供电边界转成可销售的产品层级、定价和 SLA 规则，所以运营商要么让 GPU 闲着，要么过度收缩销售，要么承担失约风险。
solution:
  - 在现有集群管理器之上提供一层控制软件，根据实时电力和站点遥测预测可用 GPU-hour，打包高价值与弹性产能层级，并建议哪些工作负载适合当前供电边界。
  - 先从只读预测、弹性队列创建和商业策略工具做起；等运营商信任预测和异常处理能力后，再升级到自动准入控制。
whyWeWin:
  - 滩头市场的痛点与一个明确触发条件、明确买方和明确工作流绑定在一起：新的波动供电站点需要一套方法，在利用率稳定前安全地把产能签出去。
  - 现有调度器掌握队列机制，云平台掌握自己的 spot 产品，但两者都没有给第三方运营商提供一层中立软件，把站点级电力波动翻译成可签约的 GPU 产品。
  - 早期部署能持续沉淀一套专有数据集，把电力波动、队列结构和实际交付 GPU-hour 连起来，从而不断提升预测、定价和 SLA 设计能力。
strategicChoices:
  beachhead: 北美独立 GPU 云运营商；它们正在上线首批 10–50 MW 的表后可再生能源、储能支撑、弃电型或近海供电影响下的集群，最初销售的是允许灵活完工窗口的批量训练或离线推理。
  wedgeRationale: 这块切片的购买触发最清晰，可触达的技术买家数量有限而聚焦，且有明确验证指标——如托管 MW、可销售利用率提升、预测误差、弹性队列填充率和避免 SLA 失约；相比卖一个泛化的 AI 基础设施优化平台，这条路径更快验证。
  sequencingRationale: 先做预测和弹性产能打包，因为运营商会比起一项新的控制平面依赖，更早接受一层只读覆盖；等公司证明带来商业提升并赢得运行信任后，再补上准入控制、更广泛的站点集成和扩展分析。
  notYet:
    - 完整替换 Slurm、Kubernetes 或托管式集群控制平面。
    - 面向终端客户、跨多家提供商的零售型聚合市场。
    - 需要平稳供电假设的常开低时延推理或高端企业工作负载。
    - 在核心控制软件尚未部署前，就单独售卖融资、保险或能源来源分析产品。
market:
  tam: "$74.6M"
  sam: "$30.0M"
  som: "$4.8M"
  segments:
    - 从波动供电站点向第三方出售算力的独立 GPU 云运营商和可再生能源支撑型 AI 基础设施开发商。
    - 会向这些运营商购买打折弹性训练或离线推理产能的基础模型实验室与大型 AI 团队。
  buyingProcess: 使用者通常是容量工程或集群运维团队，但经济买方通常是 COO、基础设施副总裁或产能 GM，因为他们要为商业策略与运营风险拍板。最快的成交路径，是把付费试点和站点上线或送电阶段绑定起来；一旦运营商看到在不增加 SLA 失约的情况下，可销售利用率更高，再推进正式生产部署。
product:
  mvp: MVP 应该接入实时或周期性的电力边界输入与队列遥测，预测可安全销售的 GPU-hour，建立高价值与弹性产能规则，并为运行在 Slurm、Kubernetes 或同类托管控制平面上的单个集群提供一套只读规划控制台和审计日志。它一开始不该接管完整任务放置；要证明的是，运营商在把产品插进关键链路前，就能更有把握地签约和路由弹性工作负载。
  sixMonth: 落地 1–2 个付费试点，支持一个接近生产环境的集群集成，交付适用于批量训练和离线推理的弹性队列策略模板，并在真实工作负载上证明预测精度与利用率提升。
  twelveMonth: 增加带保护机制的准入控制自动化、站点级 SLA 策略管理、面向客户的弹性产能报价工作流，以及在试点中最常见的集群遥测与调度栈上的可复用集成。
  twentyFourMonth: 在多家运营商之间标准化一层多站点控制软件，加入中断容忍度与能源关联吞吐的基准测试，并从单站点弹性产能打包扩展到现有客户内部的组合级容量规划。
  keyBets:
    - 一层只读覆盖软件在运营商愿意信任实时准入控制前，就能展示足够高的 ROI。
    - 早期站点会有足够多能容忍中断的批量训练和离线推理需求，足以填满弹性层。
    - 买方愿意为托管 MW 和商业提升付费，而不是把这看成一个低价值的调度器功能。
    - 随着跨客户运行数据积累，站点级预测精度会显著提升，从而相对自研工具形成可防守优势。
gtm:
  wedge: 把一个付费试点卖给正在上线波动供电站点的 GPU 云基础设施或产能负责人，把软件包装成“最快创建折扣弹性算力产品、又不冒高价值 SLA 风险的工具”；一旦试点证明可销售利用率提升且完工窗口表现稳定，再转成年付生产定价。
  channels:
    - 面向 neocloud、AI 基础设施和能源支撑站点运营商的创始人主导直销。
    - 会面向 AI 站点做市场推广、且能在送电前介绍新项目的能源和数据中心开发商。
    - 已经深入集群运维环节的托管 Slurm、Kubernetes 和 NVIDIA 生态伙伴。
  funnelTargets: 每年 12–15 个目标账户 -> 30–40% 合格试点洽谈 -> 25–35% 付费试点转化率 -> 50%+ 试点转生产转化率 -> 60%+ 的生产客户在 12 个月内扩展托管 MW 或增加第二个站点。
  pricing: 先做付费试点，再转为按活跃托管 MW 计价的年度软件收费，同时对通过平台排期的弹性 GPU-hour 收取二级用量费；定价逻辑是，研究表明如果软件真能提高可销售利用率并降低 SLA 风险，大约 $60k–$70k 每 MW 每年是站得住的。
businessModel:
  revenueStreams:
    - 按波动供电 AI 产能托管 MW 计价的年度平台订阅。
    - 按通过平台排期或签约的弹性 GPU-hour 计费的用量收入。
    - 首站点部署的实施与集成费用。
    - 预测、SLA 报告和组合基准测试的高级分析模块。
  unitOfValue: 波动供电 AI 产能的托管 MW。
  targetGrossMarginPct: 70
  expansionLevers:
    - 从一个试点站点扩展到同一运营商内部更多 MW 与更多站点。
    - 在预测被信任后，再追加准入控制与商业策略模块。
    - 随着基准数据改善，从批量训练扩展到更多能容忍中断的工作负载类别。
    - 在形成多站点数据后，向现有运营商客户销售基准和规划分析。
strategyMap:
  northStarMetric: 来自托管波动供电站点、并在承诺完工窗口内交付的已签约弹性 GPU-hour。
  inputMetrics:
    - 处于活跃预测中的托管 MW。
    - 承诺 GPU-hour 与实际交付 GPU-hour 之间的预测误差。
    - 相对部署前基线的可销售利用率提升。
    - 高价值队列的 SLA 失约率。
    - 弹性队列填充率与复购率。
    - 付费试点转生产的转化率。
  moatsToBuild:
    - 把站点电力边界、队列结构和 GPU 实际吞吐连起来的专有数据集。
    - 按工作负载类别打包高价值与弹性 AI 产能的商业策略模板。
    - 可复用的集成能力，以及部署在常见集群控制平面之上的可安全回滚手册。
  killCriteria:
    - 如果前 3 个试点无法证明至少 10% 的可销售利用率提升，或无法在不增加高价值 SLA 失约的前提下显著降低超卖风险，这个切口就太弱。
    - 如果没有任何运营商能在试点启动后的 12 个月内，转成一个有意义托管 MW 规模的生产合同，这个品类很可能要么太窄，要么太容易被内部消化。
    - 如果买方始终要求先完整替换控制平面才愿意付款，这个产品对 pre-seed 阶段来说就会过于重集成。
  mermaid: |
    flowchart LR
      Wedge[波动供电站点上线切口] --> MVP[只读预测与弹性队列 MVP]
      MVP --> Proof[先证明预测准确率、利用率提升和首个付费试点]
      Proof --> Expansion[准入控制、多站点扩展与基准测试]
investorMemo:
  verdict:
    call: 观察
    conviction: 中低信心，因为产品切口足够清晰、时点也好，但第一波买方池和独立市场规模可能太小，除非扩张速度足够快。
    whyBelieve: 受电力约束的 AI 基础设施正在变成现实，而一层中立软件把波动的 MW 转成可签约的算力产品，确实击中了通用调度器解决不了的具体运营痛点。
    whyDoubt: 现有输入仍然无法回答两个问题：未来是否会有足够多的第三方波动供电站点很快上线；以及运营商究竟会买中立软件，还是会自己做，或直接选择垂直整合型供应商。
    nextDiligence: 在公司要求拿到更深控制平面权限之前，先确认至少有两家目标运营商愿意为这层覆盖式试点付费，而且其波动供电集群已经上线或即将上线。
  firstCustomer:
    title: 波动供电 neocloud 的产能负责人
    profile: 一家北美 GPU 云创业公司，正在建设首个 20–50 MW 站点，供电来自分阶段送电或并不平稳的表后电力，并向外部客户销售批量训练产能。
    trigger: 站点接近上线，销售团队想签约产能，而运营团队还无法有把握地承诺平稳、始终在线的交付。
    buyer: 基础设施副总裁
    initialContract: 假设在单个站点签下 $75k–$150k 的付费试点；一旦运营商证明能安全提升利用率，再按托管 MW 和弹性 GPU-hour 规模转为年度生产定价。可信的早期生产合同年化区间大约在 $300k–$800k，取决于在线 MW 和使用量。
  mustBeTrue:
    - 目标地域在未来 24 个月内，至少会有 5–10 个非 hyperscaler 的波动供电 AI 站点成为有商业价值的买方。
    - 运营商愿意先为只读预测和弹性产能层付费，而不是一上来就要求替换完整调度器，或完全内部自建。
    - 至少有一种早期工作负载类别——如批量训练或离线推理——能接受足够大的完工窗口，从而形成可重复的弹性需求。
    - 平台能足够提升可销售利用率或承诺可信度，从而支撑大约 $60k–$70k 每 MW 每年的定价。
    - 早期部署会产生持续改善预测和商业化能力的数据，并且长期明显优于人工规划和通用调度规则。
  diligenceQuestions:
    - 未来 24 个月上线或已获资的站点里，究竟有多少真的符合这个滩头画像，以及第三方软件采购模型？
    - 要让基础设施负责人先信任覆盖模式、再信任准入控制，这个产品需要拿出怎样的量化证据？
    - 为什么像 Crusoe 这样的垂直整合供应商，或内部扩展调度器的方案，不会默认先拿下第一单？
    - 哪些工作负载类型能在不过度增加客户支持负担的情况下，带来最高的早期弹性队列填充率？
    - 按托管 MW 定价是否真的符合买方预算方式，还是他们会坚持纯用量计费或打包式服务？
  riskHeatmap:
    - risk: 滩头市场在未来 24 个月内仍然太小
      likelihood: High
      impact: High
      leadingIndicator: 在针对 15–20 家目标运营商的访谈后，可信的付费试点机会少于 3 个。
      mitigation: 叙事上不要只盯海上场景，而要覆盖所有表后供电、储能支撑、弃电型或分阶段送电站点，同时保持同一套产品架构。
    - risk: 运营商抗拒在调度路径里加入新的一层软件
      likelihood: High
      impact: High
      leadingIndicator: 试点潜在客户只愿在创业公司第一天就接管直接任务准入或深度调度器改造的前提下接触。
      mitigation: 先从一层只读覆盖做起，提供可安全回滚的集成、明确的审计日志，以及范围有限的弹性队列，再逐步碰高价值工作负载。
    - risk: 垂直整合云或现有厂商吸收了这个切口
      likelihood: Medium
      impact: High
      leadingIndicator: 买方反复把产品拿去和 Crusoe、AWS spot 产品或原生 Slurm 策略做比较，却看不到独特的商业提升。
      mitigation: 聚焦中立的第三方运营商，快速交付站点级预测与商业化功能，并证明通用工具做不到的可销售利用率提升。
    - risk: 弹性工作负载需求比假设更弱
      likelihood: Medium
      impact: Medium
      leadingIndicator: 即便给出折扣，试点也填不满弹性队列，因为买方需要更强的交付保证。
      mitigation: 先瞄准批量训练、回填任务和离线推理，并在对外放大市场叙事前，先验证价格与完工窗口之间的真实取舍。
operatingAssumptions:
  - assumption: 北美会有足够多的波动供电 AI 站点在近期上线，从而支撑 4–8 个早期商业部署。
    basis: research.yaml
    validationTest: 建立一条具名目标账户管线，至少覆盖 10 个已融资或即将上线的站点，并记录 MW 规模、送电时间线、供电特征和买/建倾向。
    decisionImpact: 如果不成立，公司必须把 ICP 扩大到第一波能源优先站点之外，否则市场会太薄，撑不起风险投资节奏。
  - assumption: 买方愿意在允许实时准入控制前，先采购只读预测和弹性队列覆盖层。
    basis: research.yaml
    validationTest: 拿下 2 个付费试点设计，而且明确以只读模式起步，成功指标绑定利用率、预测精度和 SLA 保护。
    decisionImpact: 如果不成立，路线图就必须把更深的控制平面集成提前，公司也会更早需要更多资金和实施人才。
  - assumption: 以托管 MW 加弹性用量为核心的定价方式，能被经济买方接受。
    basis: idea.yaml
    validationTest: 在至少 5 次买方访谈中测试定价，并拿下 1 个付费试点，书面约定基于 MW 或等价产能承诺的生产定价路径。
    decisionImpact: 如果不成立，打包方式就得转向服务费或纯用量计费，这会削弱毛利，也让收入更难预测。
  - assumption: 批量训练和离线推理工作负载具备足够的中断容忍度，可以形成第一个可重复的弹性产品。
    basis: research.yaml
    validationTest: 分析历史或试点任务日志，测量有多少工作负载能接受抢占或更宽的完工窗口而不流失。
    decisionImpact: 如果不成立，滩头工作负载会进一步收窄，公司可能需要把自己重新定位成内部容量规划软件，而不是商业化基础设施。
  - assumption: 跨站点运行数据会显著提升预测质量，从而形成相对人工规则和通用调度器的真实护城河。
    basis: operator judgment
    validationTest: 在前 3 个站点上，把模型精度和商业结果与客户基线及简单规则预测做对比。
    decisionImpact: 如果不成立，产品就有沦为一层薄功能的风险，定价权和防守力都会更弱。
experimentRoadmap:
  - horizon: 0–90 天
    experiment: 访谈 12–15 家目标运营商和站点开发商，建立一份具名滩头账户名单，记录上线时间、MW 规模和买/建偏好。
    hypothesis: 市场中存在足够多即将落地的波动供电站点，能在未来 12 个月支撑至少 3 个付费试点机会。
    successMetric: 至少 10 个合格目标账户和 3 个活跃的试点范围讨论。
    owner: 创始人/CEO
  - horizon: 0–90 天
    experiment: 做一个仿真或 shadow mode 原型，把样本电力边界变化转换成修正后的可销售 GPU-hour 预测和弹性层建议。
    hypothesis: 在产品触碰实时准入控制前，运营商就会从预测与打包能力中看到明确商业价值。
    successMetric: 至少 2 个共创客户认可原型足够有价值，愿意推进付费覆盖式试点范围。
    owner: 创始工程师
  - horizon: 3–6 个月
    experiment: 在一个真实在线集群上运行首个付费覆盖式试点，提供预测看板、弹性队列策略规则，以及与人工规划的事后对比。
    hypothesis: 产品能在不增加高价值 SLA 失约的前提下，提高安全的可销售利用率。
    successMetric: 试点窗口内，可销售利用率至少提升 10%，或等价地显著降低超卖风险，同时高价值队列 SLA 失约不增加。
    owner: 创始产品/基础设施负责人
  - horizon: 6–12 个月
    experiment: 在首个有望转生产的客户处，为弹性工作负载增加带保护机制的准入控制建议或自动化。
    hypothesis: 一旦覆盖层的价值被证明，运营商会信任针对非高价值任务的有限控制路径自动化。
    successMetric: 第一个客户授权至少一种弹性工作负载类别进入生产使用，并签下年合同。
    owner: 集成 / 解决方案工程师
  - horizon: 12–18 个月
    experiment: 在早期工作负载类型和站点之间，对中断容忍度、价格敏感度和完工窗口接受度做基准测试。
    hypothesis: 跨客户数据会揭示出可重复的弹性产能产品模板，从而提高赢单率和预测质量。
    successMetric: 形成一份内部基准，被至少 2 笔扩张交易采用，并证明其预测精度优于单站点人工规则。
    owner: 创始人/CEO
operations:
  - 把电力、制冷和调度器遥测标准化接入一层可审计的统一预测系统。
  - 保证每次部署都可安全回滚，并且最初不进入关键调度路径。
  - 以预测误差、可销售利用率、弹性队列填充率和 SLA 达标情况为核心，每周做一次试点业务复盘。
  - 尽早补齐安全、审计日志和变更控制能力，因为软件会影响合同层面的产能承诺。
  - 优先建立托管 Slurm、Kubernetes 和站点开发商转介绍的伙伴打法，而不是一开始就搭大范围地面销售团队。
team:
  - role: 创始工程师
    startTiming: 第 0 个月
    rationale: 负责预测引擎、遥测接入、策略逻辑和首批运营商集成。
  - role: 创始人/CEO
    startTiming: 第 0 个月
    rationale: 必须由创始人亲自推进，才能在高度集中的技术买方群体里完成销售和共创客户获取。
  - role: 创始产品/基础设施负责人
    startTiming: 第 0 个月
    rationale: 负责把运营商工作流、试点指标和调度器集成细节连起来，确保路线图始终围绕商业验证展开。
  - role: 集成 / 解决方案工程师
    startTiming: 第 4-6 个月
    rationale: 一旦试点启动，就需要有人专门处理调度器集成、部署安全和客户定制遥测映射，避免拖慢核心产品进度。
  - role: 客户成功 / 实施负责人
    startTiming: 第 9-12 个月
    rationale: 支持从试点到生产的转化，并在客户增加更多 MW 或更多站点时，沉淀可复制的上线流程。
milestones:
  - horizon: 0–12 个月
    items:
      - 拿下 2 个共创客户，并至少把其中 1 个转成付费覆盖式试点。
      - 证明一套只读部署可以提升可销售利用率或承诺可信度，同时不增加高价值 SLA 失约。
      - 在常见集群控制栈之上交付一条可复用的集成路径，并完成面向生产的安全能力包。
      - 把第一个试点转成年付生产合同，并明确托管 MW 的扩张路径。
  - horizon: 12–24 个月
    items:
      - 达到 3–4 个生产客户，以及大约 30–40 MW 的活跃托管规模。
      - 为生产客户上线弹性工作负载的带保护准入控制。
      - 至少证明一个客户从首站点扩展到更多 MW 或第二站点。
      - 在多次部署之间建立关于预测准确率和中断容忍度的内部基准。
  - horizon: 24–36 个月
    items:
      - 达到研究中第 3 年约 80 MW 托管规模的目标。
      - 在其滩头细分市场里，把公司建立成第三方波动供电 AI 站点的默认商业化软件层。
      - 在保持中立控制平面定位的前提下，把产品扩展到组合级规划和基准测试。
risks:
  - risk: 具备商业价值的波动供电 AI 站点数量可能太少，无法支撑 ARR 快速增长。
    likelihood: High
    impact: High
    mitigation: 把销售范围扩大到所有有相同商业化问题的受电力约束或分阶段送电 AI 站点，而不只是海上部署。
  - risk: 运营商可能不愿意让一家创业公司进入调度控制路径。
    likelihood: High
    impact: High
    mitigation: 从只读预测和弹性打包切入，先在非高价值工作负载上证明价值，再逐步增加自动化。
  - risk: 垂直整合供应商或内部团队可能会把这项功能吸收掉。
    likelihood: Medium
    impact: High
    mitigation: 聚焦中立的第三方运营商，并持续积累难以快速复制的预测与商业化数据集。
  - risk: 弹性产能需求深度可能不足，无法支撑定价模型。
    likelihood: Medium
    impact: Medium
    mitigation: 尽早验证可容忍中断的工作负载类别，并围绕具体的完工窗口偏好调整产品打包。
fundingAsk:
  stage: pre-seed
  targetFundingRangeUsd: "$2–4M"
  runwayMonths: 18
  useOfFundsSummary: 构建覆盖式 MVP，落下 2–3 个付费试点，转化首批生产客户，招聘核心工程与集成人员，并积累足够的托管 MW 与预测精度证明，从而判断这个品类是否值得进入更大一轮 seed 融资。
