slug: power-aware-gpu-scheduler
date: '2026-05-06'
executiveSummary: 这家公司应向北美 GPU 云运营商销售一层电力感知的商业化控制层，目标客户是正在上线 10-50 MW 可变电力集群、且需要在站点性能稳定前先签约容量的运营商。初始产品不是一个新调度器，而是位于 Slurm、Kubernetes 或托管集群控制平面之上的只读预测、灵活队列和 SLA 打包层。首个客户应是一家处于 Series A 或 B 阶段的新型云或电力支撑运营商，正启动一个表后、储能支撑、弃电可再生能源或近海站点，并试图在保护高级队列的同时，将更便宜的灵活训练容量货币化。购买触发点是站点启动或扩容且伴随分阶段送电或非平坦供电，因为在这个时点，电子表格规划和通用调度器已无法满足商业需求。研究支持存在真实切入点和明确付费意愿，但短期市场仍然狭窄，SAM 约为 $30.0M，因此必须向更多受电力约束的 AI 基础设施类别扩张，才能达到风险投资规模。产品和 GTM 因而应按顺序推进：从只读验证，到灵活容量打包，再到仅在公司拥有站点级预测数据和运营商信任后才加入准入控制。当前最大的开放市场风险是体量：现有输入尚未证明未来 24 个月内会有多少非超大规模、可变电力的 AI 站点实现商业化上线，因此早期成功应以付费试点和在管 MW 衡量，而不是广泛的客户 logo 数量。
problem:
- 独立 GPU 云和电力支撑 AI 站点越来越多地拥有间歇性、分阶段或运行条件非常规的可用兆瓦电力，但它们仍需要以可信的交付承诺出售算力。
- 通用调度器和人工容量规划能够分配任务，但无法把变化中的电力包络转化为可销售的产品层级、定价和 SLA 规则，因此运营商要么让 GPU 闲置、要么过度收紧销售、要么面临承诺落空的风险。
solution:
- 在现有集群管理器之上提供一层控制能力，从实时电力和站点遥测中预测可用 GPU 小时，打包高级与灵活容量层级，并推荐哪些工作负载适合当前包络。
- 从只读预测、灵活队列创建和商业策略工具起步，待运营商信任预测与异常处理后，再升级到自动化准入控制。
whyWeWin:
- The beachhead pain is tied to a specific trigger, buyer, and workflow: 新的可变电力站点需要一种方式，在利用率稳定前安全签约容量。
- 既有调度器掌握队列机制，云厂商掌握自有现货产品，但二者都无法为第三方运营商提供一层中立能力，把站点特定的电力波动转化为可签约的 GPU 产品。
- 早期部署能够积累一套专有数据集，把电力波动、队列结构和实际交付的 GPU 小时联系起来，并随着时间推移改进预测、定价和 SLA 设计。
strategicChoices:
  beachhead: 北美独立 GPU 云运营商，正在上线其首批 10-50 MW 的表后可再生能源、储能支撑、弃电电力或近海集群，并在起步阶段销售具有灵活完成窗口的批量训练或离线推理。
  wedgeRationale: 这一细分拥有最清晰的购买触发点、数量有限但可触达的技术买方，以及可验证的证明指标，如在管 MW、可销售利用率提升、预测误差、灵活队列填充率和 SLA 未命中避免率；相比销售一个泛化的 AI 基础设施优化平台，它更容易被快速验证。
  sequencingRationale: 先从预测和灵活容量打包切入，因为运营商会比引入新的控制平面依赖更早接受一个只读叠加层；待公司证明商业提升并赢得运营信任后，再加入准入控制、更广泛的站点集成和扩张分析。
  notYet:
  - 不替换 Slurm、Kubernetes 或托管集群控制平面。
  - 不为终端客户做跨多家供应商的零售型聚合市场。
  - 不做需要平坦供电假设的常开低时延推理或高级企业工作负载。
  - 在核心控制软件尚未部署前，不把融资、保险或能源溯源分析作为独立产品销售。
market:
  tam: $74.6M
  sam: $30.0M
  som: $4.8M
  segments:
  - 从可变电力站点向第三方出售容量的独立 GPU 云运营商和可再生能源支撑的 AI 基础设施开发商。
  - 会从这些运营商购买折扣灵活训练或离线推理容量的基础模型实验室和大型 AI 团队。
  buyingProcess: 运营商侧的使用者通常是容量工程或集群运维团队，但经济买方通常是 COO、基础设施副总裁或容量总经理，他们必须批准商业策略和运营风险。最快的成交路径，是与站点上线或送电阶段绑定的付费试点；一旦运营商看到在不增加 SLA 违约的情况下实现更高的可销售利用率，就会进入生产部署。
product:
  mvp: MVP 应接入实时或周期性的电力包络输入以及队列遥测，预测可安全销售的 GPU 小时，建立高级与灵活容量规则，并为运行在 Slurm、Kubernetes 或同等托管控制平面上的单个集群提供一个带审计日志的只读规划控制台。它起初不应接管完整作业放置；首个证明点是，在产品进入关键路径之前，运营商就能更有信心地签约并路由灵活工作负载。
  sixMonth: 拿下 1-2 个付费试点，支持一个接近生产环境的集群集成，为批量训练和离线推理发布灵活队列策略模板，并在真实工作负载上证明预测准确率和利用率提升。
  twelveMonth: 加入受控的准入控制自动化、站点级 SLA 策略管理、面向客户的灵活容量报价工作流，以及在试点中最常见的集群遥测和调度器栈上的可复用集成。
  twentyFourMonth: 在多家运营商之间标准化一层多站点控制层，增加对中断容忍度和能源关联吞吐的基准能力，并从单站点灵活打包扩展到现有客户内部的组合级容量规划与扩张。
  keyBets:
  - 只读叠加层能够展示足够 ROI，在运营商信任实时准入控制前就赢得部署。
  - 早期站点会拥有足够多的可容忍中断的批量训练和离线推理需求，以填满灵活层级。
  - 买方会按在管 MW 和商业提升付费，而不会把它视为低价值的调度器功能。
  - 借助跨客户运营数据，站点级预测精度会显著提升，从而形成相对内部工具的可防御优势。
gtm:
  wedge: 向正在上线可变电力站点的 GPU 云中的基础设施或容量负责人出售付费试点，把软件包装成“在不危及高级 SLA 的前提下，最快创建折扣灵活算力产品”的方案；当试点证明可销售利用率提升和完成窗口兑现表现可靠后，再转为按年生产定价。
  channels:
  - 由创始人主导，直接面向新型云、AI 基础设施和电力支撑站点运营商销售。
  - 面向推广 AI 专用站点、并可在送电前引荐新部署的能源和数据中心开发商。
  - 已经进入集群运维环节的托管 Slurm、Kubernetes 和 NVIDIA 生态合作伙伴。
  funnelTargets: 每年 12-15 个目标账户 -> 30-40% 进入合格试点讨论 -> 25-35% 形成付费试点 -> 50%+ 的试点转生产 -> 60%+ 的生产客户在 12 个月内扩大在管 MW 或新增第二站点。
  pricing: 先收取付费试点费用，再按活跃在管 MW 收取年度软件费用，并对通过平台调度的灵活 GPU 小时收取次级使用费；其依据是研究显示，如果软件能显著提高可销售利用率并降低 SLA 风险，则约 $60k-$70k per MW-year 的定价是可支撑的。
businessModel:
  revenueStreams:
  - 按可变电力 AI 容量在管 MW 计价的年度平台订阅费。
  - 按通过平台调度或签约的灵活 GPU 小时收取使用费。
  - 首站点部署的实施和集成费用。
  - 面向预测、SLA 报告和组合基准的高级分析模块。
  unitOfValue: 可变电力 AI 容量的在管 MW。
  targetGrossMarginPct: 70
  expansionLevers:
  - 从单个试点站点扩展到同一运营商内部更多 MW 和更多站点。
  - 在预测被信任后，增加准入控制和商业策略模块。
  - 随着基准数据改善，从批量训练扩展到更多可容忍中断的工作负载类别。
  - 当具备多站点数据后，向现有运营商客户销售基准和规划分析。
strategyMap:
  northStarMetric: 来自在管可变电力站点、并在承诺完成窗口内交付的已签约灵活 GPU 小时。
  inputMetrics:
  - 处于主动预测中的在管 MW。
  - 承诺 GPU 小时与实际交付 GPU 小时之间的预测误差。
  - 相对于部署前基线的可销售利用率提升。
  - 高级队列 SLA 未命中率。
  - 灵活队列填充率和复购率。
  - 付费试点转生产率。
  moatsToBuild:
  - 将站点电力包络、队列结构和实际 GPU 吞吐相联系的专有数据集。
  - 按工作负载类别打包高级与灵活 AI 容量的商业策略模板。
  - 位于常见集群控制平面之上、可安全回滚的可复用集成与部署手册。
  killCriteria:
  - 如果前 3 个试点无法在不提高高级 SLA 未命中率的情况下，展示至少 10% 的可销售利用率提升或显著降低超卖风险，则说明切入点过弱。
  - 如果在试点启动后的 12 个月内，没有运营商转为按有意义的在管 MW 合同付费的生产定价，则该类别很可能过窄或过于容易被内部化。
  - 如果买方持续要求先完全替换控制平面才愿意付费，那么该产品在 pre-seed 阶段的执行将过于集成密集。
  mermaid: "flowchart LR\n  Wedge[可变电力站点上线切入点] --> MVP[只读预测与灵活队列 MVP]\n  MVP --> Proof[预测准确率、利用率提升、首个付费试点]\n  Proof --> Expansion[准入控制、多站点扩张、基准能力]"
investorMemo:
  verdict:
    call: 观察
    conviction: 中低确信度，因为产品切入点清晰且时机良好，但除非能迅速扩张，否则首波买方池和独立市场规模可能都过小。
    whyBelieve: 受电力约束的 AI 基础设施正变成现实，而一层中立能力可以把波动兆瓦转化为可签约算力产品，解决通用调度器无法覆盖的具体运营痛点。
    whyDoubt: 现有输入仍未回答：是否会有足够多的第三方可变电力站点很快上线，以及运营商会购买中立软件而不是自行构建或转向垂直整合提供商。
    nextDiligence: 在公司请求更深控制平面权限之前，确认至少两家目标运营商拥有已上线或即将上线的可变电力集群，并愿意为只读叠加层试点付费。
  firstCustomer:
    title: 可变电力新型云中的容量负责人
    profile: 一家北美 GPU 云创业公司，正调试其首个 20-50 MW 站点，站点具备分阶段送电或非平坦的表后电力，并向外部客户销售批量训练容量。
    trigger: 站点接近上线，销售团队希望签约容量，而运维团队尚无法自信地承诺平坦、常开的交付。
    buyer: 基础设施副总裁
    initialContract: 假设首站点付费试点金额为 $75k-$150k；在运营商证明能够安全提升利用率后，转为按在管 MW 和灵活 GPU 小时量计价的年度生产定价；可信的早期生产年化区间约为 $300k-$800k，取决于上线 MW 和使用量。
  mustBeTrue:
  - 目标区域内至少有 5-10 个非超大规模、具备可变电力特征的 AI 站点，会在未来 24 个月内成为具备商业相关性的买方。
  - 运营商会在要求完全替换调度器或完全内部自建之前，为只读预测和灵活容量层付费。
  - 一种或多种早期工作负载类别，如批量训练或离线推理，将接受足够宽的完成窗口，从而形成可重复的灵活需求。
  - 平台能足够提升可销售利用率或承诺信心，从而支撑约 $60k-$70k per MW-year 的定价。
  - 早期部署会生成预测和商业化数据，并随时间显著优于人工规划与通用调度器规则。
  diligenceQuestions:
  - 未来 24 个月内，究竟有多少已上线或已融资的站点真正符合滩头画像和第三方软件采购模型？
  - 什么样的量化证据会让基础设施负责人先在叠加模式下、再在准入控制模式下信任该产品？
  - 为什么类似 Crusoe 的垂直提供商或内部调度器扩展，不会默认赢下第一单？
  - 哪些工作负载类型能在不过度增加客户支持负担的情况下，形成最高的早期灵活队列填充率？
  - 按在管 MW 定价是否与买方预算方式匹配，还是他们会坚持纯使用量定价或打包服务？
  riskHeatmap:
  - risk: 前 24 个月的滩头市场仍然过小
    likelihood: High
    impact: High
    leadingIndicator: 在 15-20 次针对性运营商沟通后，出现的可信付费试点机会少于 3 个。
    mitigation: 将叙事从仅限海上扩展到任何表后、储能支撑、弃电可再生能源或分阶段送电站点，同时保持相同产品架构。
  - risk: 运营商抗拒在调度路径中加入新的一层
    likelihood: High
    impact: High
    leadingIndicator: 试点潜在客户只有在创业公司第一天就接管直接作业准入或对调度器做深度修改时才愿意接触。
    mitigation: 先以只读叠加层、可安全回滚的集成、清晰审计日志和有限的灵活队列范围切入，再逐步触碰高级工作负载。
  - risk: 垂直整合云或既有厂商吸收该切入点
    likelihood: Medium
    impact: High
    leadingIndicator: 买方反复将产品与 Crusoe、AWS 现货产品或原生 Slurm 策略能力进行比较，并认为没有独特的商业提升。
    mitigation: 聚焦中立的第三方运营商，交付站点特定的预测与商业化功能，并证明通用工具无法提供的可衡量可销售利用率增益。
  - risk: 灵活工作负载需求弱于假设
    likelihood: Medium
    impact: Medium
    leadingIndicator: 尽管提供折扣，试点仍无法填满灵活队列，因为买方需要更强的交付保障。
    mitigation: 先聚焦批量训练、回填任务和离线推理，并在对外做广泛市场主张前验证价格与完成窗口之间的权衡。
operatingAssumptions:
- assumption: 将有足够多的北美可变电力 AI 站点在近期上线，以支撑 4-8 个早期商业部署。
  basis: research.yaml
  validationTest: 建立一条具名目标账户管道，至少覆盖 10 个已融资或即将上线的站点，并包含 MW 规模、送电时间线、电力画像以及买入或自建倾向。
  decisionImpact: 如果不成立，公司必须将 ICP 扩展到首波能源优先站点之外，否则市场将过薄，无法支撑风险投资节奏。
- assumption: 买方会先购买只读预测和灵活队列叠加层，再允许实时准入控制。
  basis: research.yaml
  validationTest: 拿下 2 个明确从只读模式开始的付费试点设计，成功指标绑定利用率、预测准确率和 SLA 保护。
  decisionImpact: 如果不成立，路线图就必须提前引入更深的控制平面集成，公司也需要更早投入更多资金和实施人才。
- assumption: 按在管 MW 加灵活使用量锚定的定价方式，对经济买方是可接受的。
  basis: idea.yaml
  validationTest: 至少与 5 位买方测试定价，并完成 1 个付费试点签约，其中写明基于 MW 或等效容量承诺的生产定价路径。
  decisionImpact: 如果不成立，产品打包必须转向服务费或纯使用量定价，这会削弱毛利并降低收入可预测性。
- assumption: 批量训练和离线推理工作负载具备足够的中断容忍度，可形成首个可重复的灵活产品。
  basis: research.yaml
  validationTest: 分析历史或试点作业日志，衡量有多少工作负载能够接受抢占或更宽的完成窗口且不导致流失。
  decisionImpact: 如果不成立，滩头工作负载将进一步收窄，公司可能需要重新定位为内部容量规划软件，而非商业化基础设施。
- assumption: 跨站点运营数据将足以提升预测质量，从而形成相对人工规则和通用调度器的真实护城河。
  basis: operator judgment
  validationTest: 将前 3 个站点的模型准确率和商业结果，与客户基线和简单规则式预测进行比较。
  decisionImpact: 如果不成立，产品就有沦为薄功能层的风险，定价权和防御性都会更弱。
experimentRoadmap:
- horizon: 0–90 days
  experiment: 访谈 12-15 家目标运营商和站点开发商，建立具名滩头账户清单，包括上线时点、MW 规模以及买入或自建偏好。
  hypothesis: 市场中存在足够多的即将上线的可变电力站点，可在未来 12 个月支撑至少 3 个付费试点机会。
  successMetric: 至少 10 个合格目标账户，以及 3 个活跃的试点范围讨论。
  owner: 创始人 CEO
- horizon: 0–90 days
  experiment: 构建一个模拟或影子模式原型，把样例电力包络变化转换为更新后的可销售 GPU 小时预测和灵活层级建议。
  hypothesis: 在产品接触实时准入控制之前，运营商就会从预测与打包中看到清晰的商业价值。
  successMetric: 至少 2 个设计合作伙伴认可该原型足够有价值，愿意界定付费叠加层试点。
  owner: 创始工程师
- horizon: 3–6 months
  experiment: 在一个真实运行的集群上开展首个付费叠加层试点，提供预测看板、灵活队列策略规则，并与人工规划进行事后对比。
  hypothesis: 该产品能够在不增加高级 SLA 未命中率的情况下，提高安全的可销售利用率。
  successMetric: 试点期间至少实现 10% 的利用率提升，或实现等效的超卖风险下降，且高级队列 SLA 未命中率不增加。
  owner: 创始产品/基础设施负责人
- horizon: 6–12 months
  experiment: 在首个候选生产客户处，为灵活工作负载增加受控的准入控制建议或自动化。
  hypothesis: 一旦叠加层价值得到证明，运营商会信任针对非高级作业的有限控制路径自动化。
  successMetric: 首个客户授权至少一种灵活工作负载类别进入生产使用，并签署年度合同。
  owner: 集成 / 解决方案工程师
- horizon: 12–18 months
  experiment: 在早期工作负载类型和站点之间，对中断容忍度、价格敏感度和完成窗口接受度进行基准测量。
  hypothesis: 跨客户数据将揭示可重复的灵活容量产品模板，从而提高赢单率和预测质量。
  successMetric: 发布用于至少 2 笔扩张交易的内部基准，并显示其预测准确率优于仅依赖站点特定人工规则。
  owner: 创始人 CEO
operations:
- 将来自电力、制冷和调度器遥测的数据接入标准化到一个可审计的统一预测层。
- 确保每次部署都可安全回滚，并在初期位于关键调度路径之外。
- 围绕预测误差、可销售利用率、灵活填充率和 SLA 遵守情况，每周开展试点业务复盘。
- 尽早打包安全、审计日志和变更控制能力，因为该软件会影响合同容量承诺。
- 优先为托管 Slurm、Kubernetes 和站点开发商引荐构建合作伙伴手册，而不是过早雇佣大规模外勤销售团队。
team:
- role: 创始工程师
  startTiming: Month 0
  rationale: 负责预测引擎、遥测接入、策略逻辑以及首批运营商集成。
- role: 创始人 CEO
  startTiming: Month 0
  rationale: 在一个高度集中的技术买方群体中，需要其负责创始人主导销售和设计合作伙伴招募。
- role: 创始产品/基础设施负责人
  startTiming: Month 0
  rationale: 把运营商工作流、试点指标和调度器集成细节连接起来，确保路线图始终绑定商业验证。
- role: 集成 / 解决方案工程师
  startTiming: Month 4-6
  rationale: 试点启动后需要其处理调度器集成、部署安全和客户特定遥测映射，而不拖慢核心产品工作。
- role: 客户成功 / 实施负责人
  startTiming: Month 9-12
  rationale: 支撑试点转生产的转化，并在客户增加更多 MW 或站点时建立可复用的上线流程。
milestones:
- horizon: 0–12 months
  items:
  - 拿下 2 个设计合作伙伴，并至少将其中 1 个转化为付费叠加层试点。
  - 证明只读部署能在不增加高级 SLA 未命中率的前提下，提高可销售利用率或承诺信心。
  - 在一种常见集群控制栈之上交付一条可复用的集成路径，并完成生产就绪的安全封装。
  - 将首个试点转为年度生产合同，并明确按在管 MW 扩张的路径。
- horizon: 12–24 months
  items:
  - 达到 3-4 个生产客户，以及约 30-40 MW 的主动在管容量。
  - 在生产客户处为灵活工作负载上线受控准入控制。
  - 证明至少 1 个客户从首站点扩展到更多 MW 或第二站点。
  - 在多次部署中建立关于预测准确率和中断容忍度的内部基准。
- horizon: 24–36 months
  items:
  - 达到研究中第 3 年约 80 MW 在管容量的目标。
  - 在其滩头细分中，成为第三方可变电力 AI 站点默认的商业化层。
  - 在保持中立控制平面定位的同时，把产品范围扩展到组合级规划与基准能力。
risks:
- risk: 具备商业相关性的可变电力 AI 站点数量，可能不足以支撑 ARR 的快速增长。
  likelihood: High
  impact: High
  mitigation: 将销售对象扩展到任何面临相同商业化问题的受电力约束或分阶段送电 AI 站点，而不只是海上部署。
- risk: 运营商可能拒绝在调度控制路径上信任一家创业公司。
  likelihood: High
  impact: High
  mitigation: 先从只读预测和灵活打包开始，在非高级工作负载上证明价值，再逐步增加自动化。
- risk: 垂直整合提供商或内部团队可能吸收这项功能。
  likelihood: Medium
  impact: High
  mitigation: 聚焦中立的第三方运营商，并积累难以快速复制的“预测 + 商业化”数据集。
- risk: 灵活容量需求可能不足以支撑该定价模型。
  likelihood: Medium
  impact: Medium
  mitigation: 尽早验证可容忍中断的工作负载类别，并围绕明确的完成窗口偏好调整产品打包。
fundingAsk:
  stage: pre-seed
  targetFundingRangeUsd: $2–4M
  runwayMonths: 18
  useOfFundsSummary: 构建叠加层 MVP，拿下 2-3 个付费试点，转化首批生产客户，招聘核心工程与集成团队，并建立足够的在管 MW 与预测准确率证明，以判断该类别是否足以支撑更大一轮 seed。
