scenarios:
  downside:
    description: Pilot conversion stretches by a quarter, one planned site expansion does not close, and the revenue mix lands
      closer to core managed-MW pricing than the blended package.
    y3RevenueK: 3135.0
    y3EbitdaK: -186.0
    cashLowPointK: 214.0
    keyAssumptionChanges:
    - Blended annual revenue per active customer falls from $660K to $600K.
    - Customer ramp ends Y3 at 6 active operators instead of 8 because one pilot slips and one expansion never lands.
    - Gross margin stays at 67% because implementation remains more site-specific for longer.
  base:
    description: Founder-led year 1 lands two revenue-generating operators, year 2 reaches 4 production customers / ~40 MW,
      and year 3 expands to 8 active operators / ~80 MW.
    y3RevenueK: 4180.0
    y3EbitdaK: 353.4
    cashLowPointK: 826.6
    keyAssumptionChanges:
    - Blended annual revenue per active customer stays at $660K.
    - Customer ramp reaches 2 active operators by Y1, 4 by Y2, and 8 by Y3.
    - Gross margin reaches the 70% business-plan target as integrations become more repeatable.
  upside:
    description: The first production customer expands faster, referenceability compresses the sales cycle, and one extra
      operator lands in Y3 without materially increasing fixed cost.
    y3RevenueK: 4945.0
    y3EbitdaK: 920.0
    cashLowPointK: 910.0
    keyAssumptionChanges:
    - Blended annual revenue per active customer rises from $660K to $700K on stronger usage-fee capture.
    - Customer ramp reaches 9 active operators by Q4Y3 through one additional site expansion.
    - Gross margin improves from 70% to 72% as one integration path becomes standard.
sensitivity:
- variable: ARPU
  downsideCase: $600K blended annual revenue per customer
  baseCase: $660K blended annual revenue per customer
  upsideCase: $720K blended annual revenue per customer
  y3RevenueImpactK: -380.0
  cashImpactK: -330.0
- variable: CAC
  downsideCase: CAC rises toward ~$340K as the first rep needs more field time and references
  baseCase: Forecast CAC of ~$301K per net new operator
  upsideCase: Reference-led selling keeps CAC near ~$260K
  y3RevenueImpactK: 0.0
  cashImpactK: -235.0
- variable: churn
  downsideCase: Monthly churn trends toward 2.5% and Y3 exits with one fewer retained operator
  baseCase: Monthly churn stays at 1.5% with expansions offsetting early logo risk
  upsideCase: Monthly churn holds near 1.0% with strong renewal and expansion
  y3RevenueImpactK: -220.0
  cashImpactK: -180.0
- variable: sales cycle
  downsideCase: Pilot-to-production conversion slips by ~1 quarter because security and ops reviews take longer
  baseCase: Pilot-to-production conversion stays inside roughly 2 quarters after proof of value
  upsideCase: Reference customers compress new-logo sales by ~1 quarter
  y3RevenueImpactK: -550.0
  cashImpactK: -430.0
- variable: gross margin
  downsideCase: Gross margin stays at 67% because implementation remains service-heavy
  baseCase: Gross margin reaches the 70% business-plan target
  upsideCase: Gross margin improves to 72% with cleaner integrations and less support load
  y3RevenueImpactK: 0.0
  cashImpactK: -125.0
- variable: hiring pace
  downsideCase: A second AE and extra engineering hire are pulled forward before repeatability is proven
  baseCase: Hires stay milestone-based around pilots, conversions, and multi-site proof
  upsideCase: One non-core hire is delayed until after Q4Y2 conversion targets are met
  y3RevenueImpactK: 0.0
  cashImpactK: -210.0
modelDiagram:
  title: unit economics flow
  mermaid: |-
    flowchart LR
      TargetAccounts --> PaidPilots
      PaidPilots --> ManagedMW
      ManagedMW --> ProductionCustomers
      ProductionCustomers --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
- checkName: Revenue engine
  finding: Base-case growth comes from scaling from 2 to 8 active operators at about 10 managed MW each and roughly $660K
    blended annual revenue per operator.
- checkName: Must go right
  finding: The first paid pilots have to convert within about two quarters so the company reaches 4 production customers and
    ~40 MW under management by the end of Y2.
- checkName: Model breaks if
  finding: If the beachhead pipeline only supports 6 active operators or gross margin stays in the high-60s, downside cash
    falls close to the floor before the seed milestone is proven.
- checkName: Next-round proof
  finding: A seed round is justified by 4 production customers, a guarded admission-control module in market, and at least
    one multi-site expansion reference.
sanityChecks:
  ruleOf40: Y3 growth 117.1% + EBITDA margin 8.5% = 125.6%
  burnMultiple: Y2 burn multiple 0.38x using $498K EBITDA burn / $1.32M net new ARR; Y3 turns cash-generative with +$354K
    EBITDA.
  revenuePerFte: $372K Y3 on ~11.3 average FTE (benchmark $200–400K enterprise SaaS / infrastructure software)
  flags:
  - The initial SAM is still narrow, so the base case depends on winning 8 of a small number of North American variable-power
    operator deployments by Q4Y3.
  - Revenue is modeled as a blended per-operator ARPU and does not separately show subscription, usage, and implementation
    mix by contract.
  - Cash collection is assumed in-period even though infrastructure operators may still pay on 45–60 day terms, which would
    reduce the base-case cash cushion.
  - Holding 70% gross margin from Y2 onward assumes site integrations become meaningfully repeatable instead of remaining
    service-heavy.
