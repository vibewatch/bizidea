slug: power-aware-gpu-scheduler
date: "2026-05-06"
executiveSummary: >-
  This company should sell a power-aware commercialization layer to North American GPU cloud operators bringing 10-50 MW variable-power clusters online and needing to contract capacity before site performance is stable. The initial product is not a new scheduler; it is a read-only forecasting, flex-queue, and SLA-packaging layer above Slurm, Kubernetes, or managed cluster control planes. The first customer should be a Series A or B neocloud or power-backed operator launching a behind-the-meter, battery-backed, curtailed-renewable, or offshore-adjacent site and trying to protect premium queues while monetizing cheaper flexible training capacity. The buying trigger is a site launch or expansion with staged energization or non-flat power delivery, because that is when spreadsheet planning and generic schedulers stop being commercially sufficient. Research supports a real wedge and clear willingness to pay, but the near-term market is still narrow at roughly $30.0M SAM, so expansion into additional power-constrained AI infrastructure categories is required for venture scale. Product and GTM therefore need to sequence from read-only proof, to flex-capacity packaging, to admission control only after the company has site-level forecasting data and operator trust. The biggest open market risk is volume: the inputs do not establish how many non-hyperscaler variable-power AI sites will be commercially live in the next 24 months, so early success should be judged by paid pilots and managed MW rather than broad logo count.
problem:
  - Independent GPU clouds and energy-backed AI sites increasingly have usable megawatts that are intermittent, staged, or operationally unusual, but they still need to sell compute with credible delivery commitments.
  - Generic schedulers and manual capacity planning allocate jobs, but they do not convert changing power envelopes into sellable product tiers, pricing, and SLA rules, so operators either idle GPUs, overconstrain sales, or risk missed commitments.
solution:
  - Provide a control layer above existing cluster managers that forecasts available GPU-hours from live power and site telemetry, packages premium and flex capacity tiers, and recommends which workloads fit the current envelope.
  - Start with read-only forecasting, flex-queue creation, and commercial policy tooling, then graduate to automated admission control once operators trust the forecasts and exception handling.
whyWeWin:
  - The beachhead pain is tied to a specific trigger, buyer, and workflow: new variable-power sites need a way to contract capacity safely before utilization is stable.
  - Incumbent schedulers own queue mechanics, and clouds own their own spot products, but neither gives third-party operators a neutral layer that translates site-specific power volatility into contractual GPU products.
  - Early deployments can compound a proprietary dataset linking power variability, queue mix, and delivered GPU-hours, which improves forecasting, pricing, and SLA design over time.
strategicChoices:
  beachhead: North American independent GPU cloud operators launching their first 10-50 MW behind-the-meter renewable, battery-backed, curtailed-power, or offshore-adjacent clusters and initially selling batch training or offline inference with flexible completion windows.
  wedgeRationale: This slice has the clearest buying trigger, a small number of reachable technical buyers, and proof metrics such as managed MW, sellable utilization lift, forecast error, flex-queue fill rate, and SLA miss avoidance; it is faster to validate than selling a generic AI infrastructure optimization platform.
  sequencingRationale: Start with forecasting and flex-capacity packaging because operators will tolerate a read-only overlay sooner than a new control-plane dependency, then add admission control, broader site integrations, and expansion analytics only after the company proves commercial lift and earns operational trust.
  notYet:
    - Full replacement of Slurm, Kubernetes, or managed cluster control planes.
    - Retail marketplace aggregation for end customers across many providers.
    - Always-on latency-sensitive inference or premium enterprise workloads that require flat-power assumptions.
    - Financing, insurance, or energy-provenance analytics sold as standalone products before core control software is deployed.
market:
  tam: "$74.6M"
  sam: "$30.0M"
  som: "$4.8M"
  segments:
    - Independent GPU cloud operators and renewable-backed AI infrastructure developers selling third-party capacity from variable-power sites.
    - Foundation model labs and large AI teams that will buy discounted flexible training or offline inference capacity from those operators.
  buyingProcess: The operator user is the capacity-engineering or cluster-operations team, but the economic buyer is usually the COO, VP Infrastructure, or GM of capacity who must approve commercial policy and operational risk. The fastest sale is a paid pilot tied to a site launch or energization phase, followed by production rollout once the operator sees higher sellable utilization without added SLA misses.
product:
  mvp: The MVP should ingest live or periodic power-envelope inputs plus queue telemetry, forecast safe sellable GPU-hours, create premium versus flex capacity rules, and surface a read-only planning console with audit logs for one cluster running on Slurm, Kubernetes, or an equivalent managed control plane. It should not own full job placement at first; the proof point is that operators can contract and route flex workloads more confidently before inserting the product into the critical path.
  sixMonth: Land 1-2 paid pilots, support one production-like cluster integration, ship flex-queue policy templates for batch training and offline inference, and prove forecast accuracy and utilization lift on live workloads.
  twelveMonth: Add guarded admission-control automation, site-level SLA policy management, customer-facing flex-capacity quoting workflows, and reusable integrations for the most common cluster telemetry and scheduler stacks seen in pilots.
  twentyFourMonth: Standardize a multi-site control layer across several operators, add benchmarking for interruption tolerance and energy-linked throughput, and expand from single-site flex packaging into portfolio-level capacity planning and expansion inside existing customers.
  keyBets:
    - A read-only overlay can show enough ROI to win deployment before operators trust live admission control.
    - Early sites will have enough interruption-tolerant batch training and offline inference demand to fill flex tiers.
    - Buyers will pay on managed MW and commercial uplift rather than view this as a low-value scheduler feature.
    - Site-level forecasting accuracy will improve materially with cross-customer operating data, creating a defensible advantage over in-house tooling.
gtm:
  wedge: Sell a paid pilot to the infrastructure or capacity leader at a GPU cloud bringing a variable-power site online, package the software as the fastest way to create a discounted flex-compute product without risking premium SLAs, and convert to annual production pricing once the pilot demonstrates higher sellable utilization and reliable completion-window performance.
  channels:
    - Founder-led direct sales to neocloud, AI infrastructure, and power-backed site operators.
    - Energy and data-center developers that market AI-specific sites and can introduce new deployments before energization.
    - Managed Slurm, Kubernetes, and NVIDIA ecosystem partners that already sit in cluster operations.
  funnelTargets: 12-15 target accounts per year -> 30-40% qualified pilot discussions -> 25-35% paid pilot rate -> 50%+ pilot-to-production conversion -> 60%+ of production customers expanding managed MW or adding a second site within 12 months.
  pricing: Paid pilot followed by annual software pricing anchored to MW under active management, with a secondary usage fee on flex GPU-hours scheduled through the platform; the rationale is that research indicates roughly $60k-$70k per MW-year is supportable if the software materially increases sellable utilization and reduces SLA risk.
businessModel:
  revenueStreams:
    - Annual platform subscription priced by managed MW of variable-power AI capacity.
    - Usage-based fees on flex GPU-hours scheduled or contracted through the platform.
    - Implementation and integration fees for first-site deployment.
    - Premium analytics modules for forecasting, SLA reporting, and portfolio benchmarking.
  unitOfValue: Managed MW of variable-power AI capacity.
  targetGrossMarginPct: 70
  expansionLevers:
    - Grow from one pilot site to more MW and additional sites inside the same operator.
    - Add admission-control and commercial-policy modules after forecasting is trusted.
    - Expand from batch training into additional interruption-tolerant workload classes as benchmark data improves.
    - Sell benchmarking and planning analytics to existing operator customers once multi-site data exists.
strategyMap:
  northStarMetric: Contracted flex GPU-hours delivered within promised completion windows from managed variable-power sites.
  inputMetrics:
    - Managed MW under active forecasting.
    - Forecast error between promised and delivered GPU-hours.
    - Sellable utilization lift versus pre-deployment baseline.
    - Premium queue SLA miss rate.
    - Flex-queue fill rate and repeat purchase rate.
    - Paid pilot to production conversion rate.
  moatsToBuild:
    - Proprietary dataset linking site power envelopes, queue mix, and delivered GPU throughput.
    - Commercial-policy templates for packaging premium versus flex AI capacity by workload class.
    - Reusable integrations and rollback-safe deployment playbooks above common cluster control planes.
  killCriteria:
    - If the first 3 pilots cannot show at least 10% sellable utilization lift or materially lower overcommit risk without increasing premium SLA misses, the wedge is too weak.
    - If no operator converts to production pricing above a meaningful managed-MW contract within 12 months of pilot start, the category is likely too narrow or too easy to internalize.
    - If buyers consistently require full control-plane replacement before paying, the product will be too integration-heavy for efficient pre-seed execution.
  mermaid: |
    flowchart LR
      Wedge[Variable-power site launch wedge] --> MVP[Read-only forecasting and flex-queue MVP]
      MVP --> Proof[Forecast accuracy utilization lift first paid pilot]
      Proof --> Expansion[Admission control multi-site expansion benchmarking]
investorMemo:
  verdict:
    call: Watch
    conviction: Medium-low conviction because the product wedge is crisp and timely, but the first-wave buyer pool and standalone market size may be too small unless expansion happens quickly.
    whyBelieve: Power-constrained AI infrastructure is becoming real, and a neutral layer that converts volatile megawatts into contractual compute products addresses a concrete operational pain that generic schedulers do not solve.
    whyDoubt: The inputs still leave open whether enough third-party variable-power sites will launch soon, and whether operators will buy neutral software instead of building internally or defaulting to vertically integrated providers.
    nextDiligence: Confirm that at least two target operators with live or imminent variable-power clusters will fund a paid overlay pilot before the company asks for deep control-plane authority.
  firstCustomer:
    title: Capacity leader at a variable-power neocloud
    profile: A North American GPU cloud startup commissioning its first 20-50 MW site with staged energization or non-flat behind-the-meter power and selling batch training capacity to external customers.
    trigger: The site is nearing launch, the sales team wants to contract capacity, and operations cannot yet promise flat always-on delivery with confidence.
    buyer: VP Infrastructure
    initialContract: Assumed $75k-$150k paid pilot on one site, converting to annual production pricing based on managed MW and flex GPU-hour volume once the operator proves safe utilization lift; credible early production range is roughly $300k-$800k annualized depending on live MW and usage.
  mustBeTrue:
    - At least 5-10 non-hyperscaler variable-power AI sites in the target geography will be commercially relevant buyers within the next 24 months.
    - Operators will pay for a read-only forecasting and flex-capacity layer before demanding full scheduler replacement or full in-house builds.
    - One or more early workload classes such as batch training or offline inference will accept completion windows large enough to create repeatable flex demand.
    - The platform can improve sellable utilization or commitment confidence enough to justify roughly $60k-$70k per MW-year pricing.
    - Early deployments will generate forecasting and commercialization data that meaningfully outperform manual planning and generic scheduler rules over time.
  diligenceQuestions:
    - How many live or funded sites in the next 24 months actually match the beachhead profile and third-party software buying model?
    - What quantitative proof would make an infra leader trust this product in overlay mode, and later in admission control?
    - Why will Crusoe-like vertical providers or in-house scheduler extensions not win the first deal by default?
    - Which workload types create the highest early flex fill rate without unacceptable customer support burden?
    - Does pricing by managed MW map to how buyers budget, or will they insist on pure usage pricing or bundled services?
  riskHeatmap:
    - risk: Beachhead market remains too small in the first 24 months
      likelihood: High
      impact: High
      leadingIndicator: Fewer than 3 credible paid-pilot prospects emerge after 15-20 targeted operator conversations.
      mitigation: Broaden from offshore-only narratives to any behind-the-meter, battery-backed, curtailed-renewable, or staged-energization site while keeping the same product architecture.
    - risk: Operators resist a new layer in the scheduling path
      likelihood: High
      impact: High
      leadingIndicator: Pilot prospects will only engage if the startup owns direct job admission or deep scheduler changes on day one.
      mitigation: Start as a read-only overlay with rollback-safe integrations, clear audit logs, and limited flex-queue scope before touching premium workloads.
    - risk: Vertically integrated clouds or incumbents absorb the wedge
      likelihood: Medium
      impact: High
      leadingIndicator: Buyers repeatedly compare the product to Crusoe, AWS spot products, or native Slurm policy work and see no unique commercial lift.
      mitigation: Focus on neutral third-party operators, ship site-specific forecasting and commercialization features, and prove measurable sellable utilization gains unavailable from generic tooling.
    - risk: Flex workload demand is weaker than assumed
      likelihood: Medium
      impact: Medium
      leadingIndicator: Pilots cannot fill flex queues despite discounts because buyers need harder delivery guarantees.
      mitigation: Target batch training, backfills, and offline inference first, and validate price-versus-completion-window tradeoffs before broad market claims.
operatingAssumptions:
  - assumption: Enough North American variable-power AI sites will launch soon to support 4-8 early commercial deployments.
    basis: research.yaml
    validationTest: Build a named target-account pipeline with at least 10 funded or imminent sites, including MW size, energization timeline, power profile, and buy-versus-build posture.
    decisionImpact: If false, the company must widen the ICP beyond first-wave energy-first sites or the market will be too thin for venture-backed pacing.
  - assumption: Buyers will purchase a read-only forecasting and flex-queue overlay before allowing live admission control.
    basis: research.yaml
    validationTest: Secure 2 paid pilot designs that explicitly start in read-only mode with success metrics tied to utilization, forecast accuracy, and SLA protection.
    decisionImpact: If false, the roadmap must pull forward deeper control-plane integration and the company will need more capital and implementation talent earlier.
  - assumption: Pricing anchored to managed MW plus flex usage is acceptable to economic buyers.
    basis: idea.yaml
    validationTest: Test pricing with at least 5 buyer conversations and close 1 paid pilot with a written production pricing path based on MW or equivalent capacity commitment.
    decisionImpact: If false, packaging must shift toward services or pure usage pricing, which would weaken margins and make revenue less predictable.
  - assumption: Batch training and offline inference workloads provide enough interruption tolerance to form the first repeatable flex product.
    basis: research.yaml
    validationTest: Analyze historical or pilot job logs to measure what share of workloads can accept preemption or wider completion windows without churn.
    decisionImpact: If false, the beachhead workload narrows and the company may need to reposition as internal capacity planning software rather than commercialization infrastructure.
  - assumption: Cross-site operating data will improve forecast quality enough to create a real moat over manual rules and generic schedulers.
    basis: operator judgment
    validationTest: Compare model accuracy and commercial outcomes across the first 3 sites against customer baselines and simple rule-based forecasts.
    decisionImpact: If false, the product risks becoming a thin feature layer with limited pricing power and weaker defensibility.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Interview 12-15 target operators and site developers to build a named beachhead account list with launch timing, MW size, and buy-versus-build preferences.
    hypothesis: The market contains enough imminent variable-power sites to support at least 3 paid pilot opportunities in the next 12 months.
    successMetric: At least 10 qualified target accounts and 3 active pilot-scope discussions.
    owner: Founder CEO
  - horizon: 0–90 days
    experiment: Build a simulation or shadow-mode prototype that converts sample power-envelope changes into revised sellable GPU-hour forecasts and flex-tier recommendations.
    hypothesis: Operators will see clear commercial value from forecasting and packaging before the product touches live admission control.
    successMetric: At least 2 design partners agree the prototype is valuable enough to scope a paid overlay pilot.
    owner: Founding eng
  - horizon: 3–6 months
    experiment: Run the first paid overlay pilot on one live cluster with forecast dashboards, flex-queue policy rules, and post hoc comparison against manual planning.
    hypothesis: The product can increase safe sellable utilization without increasing premium SLA misses.
    successMetric: At least 10% utilization lift or equivalent reduction in overcommit risk with no increase in premium queue SLA misses during the pilot window.
    owner: Founding product/infrastructure
  - horizon: 6–12 months
    experiment: Add guarded admission-control recommendations or automation for flex workloads at the first production candidate.
    hypothesis: Once overlay value is proven, operators will trust limited control-path automation for non-premium jobs.
    successMetric: First customer authorizes production use for at least one flex workload class and signs an annual contract.
    owner: Integration / solutions engineer
  - horizon: 12–18 months
    experiment: Benchmark interruption tolerance, price sensitivity, and completion-window acceptance across early workload types and sites.
    hypothesis: Cross-customer data will reveal repeatable flex-capacity product templates that raise win rate and forecast quality.
    successMetric: Publish internal benchmarks used in at least 2 expansion deals and show better forecast accuracy than site-specific manual rules alone.
    owner: Founder CEO
operations:
  - Standardize data ingestion from power, cooling, and scheduler telemetry into a single auditable forecasting layer.
  - Keep every deployment rollback-safe and initially outside the critical scheduling path.
  - Run weekly pilot business reviews around forecast error, sellable utilization, flex fill rate, and SLA adherence.
  - Package security, audit logging, and change-control controls early because the software influences contractual capacity commitments.
  - Build partner playbooks for managed Slurm, Kubernetes, and site developer introductions rather than hiring a broad field sales team first.
team:
  - role: Founding eng
    startTiming: Month 0
    rationale: Owns forecasting engine, telemetry ingestion, policy logic, and first operator integrations.
  - role: Founder CEO
    startTiming: Month 0
    rationale: Required for founder-led sales into a concentrated technical buyer set and for design-partner recruitment.
  - role: Founding product/infrastructure
    startTiming: Month 0
    rationale: Bridges operator workflows, pilot metrics, and scheduler integration details so the roadmap stays tied to commercial proof.
  - role: Integration / solutions engineer
    startTiming: Month 4-6
    rationale: Needed once pilots start to handle scheduler integrations, deployment safety, and customer-specific telemetry mapping without slowing core product work.
  - role: Customer success / implementation lead
    startTiming: Month 9-12
    rationale: Supports pilot-to-production conversion and creates a repeatable rollout process as customers add more MW or sites.
milestones:
  - horizon: 0–12 months
    items:
      - Secure 2 design partners and convert at least 1 into a paid overlay pilot.
      - Prove a read-only deployment that improves sellable utilization or commitment confidence without increasing premium SLA misses.
      - Ship one repeatable integration path above a common cluster control stack and complete a production-ready security package.
      - Convert the first pilot into an annual production contract with a defined managed-MW expansion path.
  - horizon: 12–24 months
    items:
      - Reach 3-4 production customers and roughly 30-40 MW under active management.
      - Launch guarded admission control for flex workloads at production customers.
      - Show at least one customer expansion from the first site into additional MW or a second site.
      - Build internal benchmarking on forecast accuracy and interruption tolerance across multiple deployments.
  - horizon: 24–36 months
    items:
      - Reach the researched year-3 target of roughly 80 MW under management.
      - Establish the company as the default commercialization layer for third-party variable-power AI sites in its beachhead segment.
      - Expand product scope into portfolio-level planning and benchmarking while preserving neutral-control-plane positioning.
risks:
  - risk: The number of commercially relevant variable-power AI sites may be too small for fast ARR growth.
    likelihood: High
    impact: High
    mitigation: Sell to any power-constrained or staged-energization AI site with the same commercialization problem, not just offshore deployments.
  - risk: Operators may refuse to trust a startup in the scheduling control path.
    likelihood: High
    impact: High
    mitigation: Begin with read-only forecasting and flex packaging, prove value on non-premium workloads, and add automation gradually.
  - risk: Vertically integrated providers or in-house teams may absorb the functionality.
    likelihood: Medium
    impact: High
    mitigation: Focus on neutral third-party operators and compound a forecasting plus commercialization dataset that is hard to recreate quickly.
  - risk: Flex-capacity demand may not be deep enough to justify the pricing model.
    likelihood: Medium
    impact: Medium
    mitigation: Validate interruption-tolerant workload classes early and tune product packaging around concrete completion-window preferences.
fundingAsk:
  stage: pre-seed
  targetFundingRangeUsd: "$2–4M"
  runwayMonths: 18
  useOfFundsSummary: Build the overlay MVP, land 2-3 paid pilots, convert the first production customers, hire the core engineering and integration team, and create enough managed-MW and forecast-accuracy proof to decide whether the category can support a larger seed round.
