  validationPlan:
  - priority: high
    question: Can the product retrospectively shrink a real regression matrix without missing defects on one historical controller program?
    evidenceToGather: Backtest 6-10 recent model or firmware changes against existing HIL logs, release packets, and escaped defects from one design-partner program.
  - priority: high
    question: Which toolchain combinations show up most often in early target accounts?
    evidenceToGather: Ten discovery calls plus an artifact inventory covering MCU families, modelers, test rigs, CI systems, and log formats.
  - priority: medium
    question: What minimum audit and human-review package is required before a firmware-quality leader will trust recommendation-only regression pruning?
    evidenceToGather: Structured reviews with quality leads and certification advisers using a draft release packet generated from one real program.
