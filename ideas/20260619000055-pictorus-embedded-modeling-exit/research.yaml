openQuestions:
- How many first-wave buyers are truly moving to model-generated Rust versus model-generated C or mixed-language controllers?
- Which HIL log formats and lab data schemas dominate in the first 20 target accounts, and can read-only ingestion cover most of them?
- Will safety-sensitive teams accept recommendation-only regression pruning without additional third-party qualification of the proof workflow?
- How far will Renesas extend Pictorus into verification and release evidence, and does that narrow the vendor-neutral wedge over the next 12-24 months?
