competitors:
- name: Renesas 365 + Pictorus
  stage: 现有厂商
  wedge: 浏览器原生建模、仿真，以及与芯片强绑定的平台工作流。
  pricing: 平台化定制报价；未公开列表价格。
  strength: 在半导体厂商生态里，它直接占住了写作层和虚拟原型叙事。
  weaknessVsUs: 最适合单一厂商引力场内的流程；混合 MCU 的 OEM 仍需要横跨工具链和目标端的中立证明层。
