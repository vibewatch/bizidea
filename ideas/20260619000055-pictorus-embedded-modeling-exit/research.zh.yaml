  adoptionFrictionMatrix:
  - friction: 在混合 MCU 目标上，把模型意图映射回生成固件
    severity: 高
    affectedBuyer: 系统架构师或验证负责人
    mitigation: 先做只读，先只比对发生变更的行为表面，再把每条回归推荐背后的证据逐项摊开。
    sourceRefs:
    - 1
    - 2
    - 3
    - 4
  - friction: 实验室数据混乱、HIL 集成面过多
    severity: 高
    affectedBuyer: 固件质量负责人
    mitigation: 先支持文件式接入和少量台架，再考虑更深的编排。
    sourceRefs:
    - 8
    - 11
    - 12
    - 15
    - 23
  - friction: 安全相邻发版决策里的信任上限
    severity: 高
    affectedBuyer: 固件质量负责人或控制总监
    mitigation: 把人留在审批回路里，让输出对齐标准导向的评审包，而不是宣称能自动签核。
    sourceRefs:
    - 29
    - 33
    - 34
    - 35
    - 36
  - friction: 对偏 CI 的团队来说，开源替代方案已经足够好
    severity: 中
    affectedBuyer: 嵌入式工具负责人
    mitigation: 差异化要押在分析、跨制品比对和发版证据质量上，而不是只拼自动化。
    sourceRefs:
    - 13
    - 15
    - 16
    - 30
