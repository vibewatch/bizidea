      sourceRefs:
      - 1
      - 2
      - 7
      - 8
      - 11
      - 22
      - 31
  pestle:
  - factor: 政治
    impact: negative
    point: 欧洲的网络与机械法规，抬高了联网工业产品在文档和后续维护上的要求。
    sourceRefs:
    - 19
  - factor: 经济
    impact: positive
    point: 工业机器人部署和自动化投资仍然够强，足以继续支撑控制器质量工作流上的预算。
    sourceRefs:
    - 24
    - 25
  - factor: 社会
    impact: positive
    point: 劳动力稀缺和更快交付自动化系统的压力，继续把 OEM 往软件更重的机器人和嵌入式工具上推。
    sourceRefs:
    - 25
  - factor: 技术
    impact: positive
