  pricing: 开源 + 内部工程投入。
  strength: 灵活、厂商中立，而且在软件式嵌入式测试上越来越站得住。
  weaknessVsUs: 集成负担、分析能力和可审计发版打包，最后还是留给用户团队自己扛。
