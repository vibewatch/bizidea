slug: intent-to-hil-verification
date: "2026-06-19"
executiveSummary: >-
  Renesas buying Pictorus validates browser-native embedded modeling and memory-safe code generation as strategic workflow layers, but it leaves a vendor-neutral gap in proving that model intent survives code generation and target-specific integration. The company should attack that gap with a read-only intent-to-HIL verification layer for industrial motion-control OEMs first and mobile-robotics programs second. The first product should ingest model revisions, generated firmware artifacts, hardware configuration data, and HIL outputs for one controller-family release, then recommend the smallest regression set and generate a traceable release packet. This beachhead is attractive because the pain is acute at signoff, budgets already exist inside HIL and test-automation spend, and buyers do not need to replace incumbent authoring or bench tools. The go-to-market system should start with founder-led paid pilots on live release programs where HIL scarcity or audit pressure already threatens a launch date, then expand account by account as the product proves fewer reruns and cleaner evidence. The defensible asset is not another modeler; it is the cross-program corpus that links model deltas, MCU targets, reviewer overrides, and failure patterns well enough to prune regressions safely. The core risks are integration drag, trust ceilings in safety-adjacent workflows, and the possibility that chip-vendor or HIL incumbents bundle enough evidence features to compress the wedge. The biggest evidence gap is direct proof that enough first-wave buyers are moving to model-generated Rust or similarly model-driven firmware, so pricing and market-expansion assumptions should be treated as hypotheses until three paid pilots convert.
problem:
  - "As browser-native modelers and generated firmware move creation upstream, verification teams still prove correctness downstream with custom HIL scripts, spreadsheets, and release meetings."
  - "Mixed-MCU controller programs waste scarce bench time rerunning too many tests because no neutral system maps model changes to the minimum safe regression set or assembles release evidence."
solution:
  - "Read-only ingestion compares behavioral models, generated Rust or C artifacts, hardware configurations, and HIL results for one active controller program, then flags model-to-device drift."
  - "The product recommends the smallest defensible regression matrix per MCU target and auto-generates a release packet with provenance, uncovered assumptions, and required human approvals."
whyWeWin:
  - "A vendor-neutral, read-only deployment fits mixed-MCU OEMs that already own modelers, HIL rigs, CI glue, and safety review steps."
  - "Value is measured at signoff through fewer reruns, faster release packets, and earlier drift detection rather than asking buyers to adopt a new authoring stack."
  - "The moat compounds from model-delta-to-failure mappings, reviewer override data, and reusable release-evidence templates across programs."
strategicChoices:
  beachhead: "100-1,000 employee industrial automation OEMs releasing one new motor-control controller family on mixed Renesas, STM32, or NXP targets with existing HIL benches and 15-40 firmware engineers"
  wedgeRationale: >-
    One controller-family release is the smallest budgetable unit where bench scarcity, model drift, and signoff pain are already visible. It produces measurable proof faster than trying to replace the customer's full modeling, CI, or validation stack.
  sequencingRationale: >-
    Start read-only on one live release to earn trust and learn artifact formats, then productize the first reusable connectors and release-packet workflow, then add partner-assisted distribution and multi-program expansion only after pilots show fewer reruns and accepted evidence packets.
  notYet:
    - "Replacing model authoring tools or HIL hardware"
    - "Autonomous release approval without human signoff"
    - "Automotive, medical, or aerospace programs before industrial and robotics reference accounts exist"
market:
  tam: "$180M estimated TAM from ~1,200 global industrial automation and mobile-robotics OEM accounts, ~1.5 active programs per account, and ~$100k ACV"
  sam: "$36M estimated SAM from roughly 400 reachable NA, EU, and Japan controller programs at about $90k ACV"
  som: "$5.6M estimated year-3 SOM from ~70 active programs across 20-25 accounts at about $80k ACV"
  segments:
    - "Industrial motion-control OEM controller programs"
    - "Mobile-robotics OEM controller programs"
  buyingProcess: >-
    An embedded verification or firmware-quality lead champions a pilot on one active controller-family release and proves value with existing model, firmware, and HIL artifacts. The director of embedded platforms or controls engineering signs the budget because spend can come from existing validation-tooling and lab-efficiency budgets, usually with input from safety or lab managers.
product:
  mvp: >-
    Read-only ingestion for one controller program that diffs behavioral-model revisions against generated Rust or C artifacts, maps each change to target-specific HIL obligations, and produces a draft release packet with provenance and required human approvals.
  sixMonth: >-
    Support the first two dominant toolchain patterns found in discovery, cover two MCU targets inside one account, and prove retrospective regression pruning on historical defects before promising live automation.
  twelveMonth: >-
    Move from backtests to live signoff assistance on 3-5 paid controller programs, add reusable connectors for one HIL bench class and one CI or simulation stack, and capture reviewer override data on every recommendation.
  twentyFourMonth: >-
    Recommend smallest safe regression sets across multiple programs per account, ship reusable release-packet templates for industrial and robotics review gates, and turn one-program wins into portfolio expansions.
  keyBets:
    - "Model deltas can be mapped to verification obligations accurately enough to cut reruns without missing known defects."
    - "Read-only ingestion covers enough of the first-wave toolchains to deliver value before deep integrations are required."
    - "Release-packet quality and reviewer trust matter as much as bench-time savings in winning budget and expansion."
gtm:
  wedge: "Paid design-partner pilot on one controller-family release where HIL queues or audit-evidence prep already threaten a fixed ship date"
  channels:
    - "Founder-led direct sales to embedded-platform, controls, and firmware-quality leaders"
    - "Design-partner pilots scoped to one live controller-family release"
    - "Co-sell with HIL integrators and safety or compliance advisers already inside the lab workflow"
  funnelTargets: "Discovery→artifact-qualified pilot 25-35%, paid pilot→annual program subscription 50%+, first program→second program expansion within 12 months 40%+"
  pricing: "Charge for an 8-12 week pilot on one controller program, credit it into an $80k-$100k annual subscription priced per active controller program, and upsell extra MCU targets, release-packet templates, and deeper HIL integrations."
businessModel:
  revenueStreams:
    - "Annual subscription per active controller program"
    - "Paid onboarding and integration services"
    - "Premium modules for additional MCU targets, regression analytics, and release-packet templates"
  unitOfValue: "Active controller program under release signoff"
  targetGrossMarginPct: 70
  expansionLevers:
    - "Add second controller programs or extra MCU targets inside the same account"
    - "Sell release-packet and compliance templates for more safety and cyber review paths"
    - "Monetize deeper HIL, CI, and analytics modules after read-only proof is trusted"
strategyMap:
  northStarMetric: "Quarterly controller releases that ship with a platform-generated regression recommendation and evidence packet accepted by the customer's signoff team"
  inputMetrics:
    - "Historical change sets backtested per account"
    - "Pilot releases with 30% or greater regression reduction and zero missed known defects"
    - "Median days from model revision to draft release packet"
    - "Second-program expansion rate inside existing accounts"
  moatsToBuild:
    - "Corpus linking model deltas, MCU targets, and failure patterns"
    - "Release-packet templates aligned to IEC 61508, robotics-safety, and cyber-documentation reviews"
    - "Override data showing when human reviewers accept or reject regression recommendations"
  killCriteria:
    - "After three design-partner backtests, the product cannot reduce required reruns by at least 20% with zero missed known defects."
    - "Read-only ingestion cannot cover 70% of target-account artifacts within four weeks."
    - "Fewer than three of the first eight qualified pilots convert to annual subscriptions."
  mermaid: |
    flowchart LR
      Wedge[One controller-family release pilot] --> MVP[Read-only intent-to-HIL proof MVP]
      MVP --> Proof[Smaller regression sets and accepted release packets]
      Proof --> Expansion[More programs per account and cross-MCU analytics]
investorMemo:
  verdict:
    call: "Watch"
    conviction: "Compelling workflow wedge, but conviction stays low until one buyer proves budget ownership and trust in regression pruning."
    whyBelieve: "Renesas validated the authoring shift, and no incumbent clearly owns vendor-neutral proof across model intent, generated firmware, and mixed-MCU test evidence."
    whyDoubt: "The reachable market is modest today and the product could become a services-heavy feature unless read-only pilots convert quickly into trusted software subscriptions."
    nextDiligence: "See one design-partner backtest and one paid live pilot that cut reruns materially, preserve defect detection, and create a budgeted path to annual subscription."
  firstCustomer:
    title: "Embedded verification lead at an industrial motion-control OEM"
    profile: "100-1,000 employee OEM with 15-40 firmware engineers, one active controller-family release, mixed MCU targets, and existing HIL benches."
    trigger: "A 2027 controller launch shifts from hand-coded C toward model-generated firmware and exposes coverage gaps, long bench queues, or weak release evidence."
    buyer: "Director of embedded platforms"
    initialContract: "8-12 week paid pilot at $15k-$25k on one historical plus one live release, converting to an $80k-$100k annual subscription for that controller program if the team accepts the release packet and reruns fall."
  mustBeTrue:
    - "At least half of interviewed target OEMs plan a model-based or generated-code controller release within 24 months."
    - "A read-only deployment can ingest model, firmware, and HIL artifacts for a pilot account in under four weeks."
    - "Historical backtests reduce required regression executions by 30% or more with zero missed known defects."
    - "Economic buyers convert successful pilots into $80k or higher annual per-program subscriptions."
    - "Vendor-neutral proof wins even when a chip-vendor or HIL incumbent already owns adjacent workflow spend."
  diligenceQuestions:
    - "How common is model-generated Rust versus mixed Rust and C across the first 20 target accounts?"
    - "Which three artifact or log formats create most of the integration work in early pilots?"
    - "Who owns the budget for release-evidence tooling today: lab, platform, or quality?"
    - "What proof threshold makes a firmware-quality leader trust recommendation-only regression pruning?"
    - "How quickly are Renesas and HIL incumbents adding comparable evidence features?"
operatingAssumptions:
  - assumption: "The first 10 target accounts will share enough model and HIL artifact patterns that three connector types cover most ingestion work."
    basis: research.yaml
    validationTest: "Run artifact inventories on 10 discovery accounts and show 70% or more of files map to the first three connector types."
    decisionImpact: "If false, narrow the ICP to one modeling stack or budget more services-heavy onboarding."
  - assumption: "A read-only, human-approved deployment is enough to win initial pilots."
    basis: research.yaml
    validationTest: "Close three design-partner pilots without asking buyers to replace authoring tools or HIL benches."
    decisionImpact: "If false, roadmap deeper workflow automation and accept longer integration-led sales cycles."
  - assumption: "Regression recommendations can remove at least 30% of reruns without missing known defects."
    basis: idea.yaml
    validationTest: "Backtest 6-10 recent controller changes per design partner against HIL logs and escaped defects."
    decisionImpact: "If false, reposition around evidence packaging and drift detection instead of regression pruning."
  - assumption: "Successful pilots can convert to $80k-$100k annual subscriptions per active controller program."
    basis: "operator judgment"
    validationTest: "Offer paid pilots with conversion terms to five accounts and secure at least two conversions at target pricing."
    decisionImpact: "If false, broaden expansion modules or reassess whether the market supports venture returns."
  - assumption: "Vendor-neutral positioning matters enough to beat bundled chip-vendor verification features."
    basis: idea.yaml
    validationTest: "Win three pilots where incumbent silicon-vendor or HIL tooling is already installed."
    decisionImpact: "If false, partner tightly with one ecosystem or narrow to mixed-MCU accounts only."
experimentRoadmap:
  - horizon: "0-90 days"
    experiment: "Run 10 discovery calls and artifact inventories across industrial and robotics targets."
    hypothesis: "Early design partners cluster into a small number of toolchain patterns that a read-only connector strategy can cover."
    successMetric: "Ten completed calls and 70% or more of artifacts explained by the first three connector types."
    owner: "Founder / CEO"
  - horizon: "0-90 days"
    experiment: "Backtest recent model and firmware changes on one historical controller program."
    hypothesis: "The engine can prune at least 30% of reruns without missing known failures."
    successMetric: "Six to ten changes replayed, 30% or greater regression reduction, and zero missed known defects."
    owner: "Founding eng"
  - horizon: "90-180 days"
    experiment: "Generate a draft release packet for one live controller-family signoff."
    hypothesis: "Quality and systems reviewers will use the packet if every recommendation includes provenance and manual approval steps."
    successMetric: "One live signoff meeting uses the packet and release-packet prep time falls by 50% or more."
    owner: "Founding eng"
  - horizon: "90-180 days"
    experiment: "Test paid pilot pricing on two live release programs."
    hypothesis: "Buyers will pay before full production deployment if the pilot is scoped to one urgent release."
    successMetric: "Two paid pilots signed at $15k or more each with conversion language to annual subscriptions."
    owner: "Founder / CEO"
  - horizon: "6-12 months"
    experiment: "Review evidence packets with firmware-quality leads and one certification adviser."
    hypothesis: "Recommendation-only regression pruning is acceptable if the evidence packet maps cleanly to existing internal review gates."
    successMetric: "Four of five reviewers say the packet is sufficient for an internal signoff meeting with only minor changes."
    owner: "Firmware verification domain lead"
  - horizon: "6-12 months"
    experiment: "Launch one co-sell motion with an HIL integrator or safety adviser."
    hypothesis: "Partner-assisted deals qualify faster than cold outbound because the partner already understands the bench and audit workflow."
    successMetric: "One signed referral agreement or two partner-sourced qualified pilots."
    owner: "Founder / CEO"
  - horizon: "6-12 months"
    experiment: "Ask the first four customers to expand from one program to a second program or extra MCU target."
    hypothesis: "Once trust is established on one release, expansion inside the same account is easier than landing a new logo."
    successMetric: "At least two of the first four customers add a second program or target within 12 months."
    owner: "Solutions / integration engineer"
operations:
  - "Artifact-ingestion pipeline that snapshots model revisions, generated firmware artifacts, board configurations, HIL logs, and signoff documents per controller program."
  - "Recommendation review queue that records provenance, human overrides, and final regression decisions."
  - "Weekly design-partner release reviews plus monthly escaped-defect postmortems to improve mapping rules."
  - "Integration partnerships with one HIL bench integrator and one safety or compliance adviser."
team:
  - role: "Founder / CEO"
    startTiming: "Month 0"
    rationale: "Founder-led selling is required to learn toolchain variants, win design partners, and negotiate partner motions with HIL integrators and safety advisers."
  - role: "Founding eng"
    startTiming: "Month 0"
    rationale: "Builds ingestion, model-diff logic, the first regression-recommendation engine, and the evidence packet workflow."
  - role: "Solutions / integration engineer"
    startTiming: "Month 3"
    rationale: "Shortens time to first value across messy lab data and turns pilot work into reusable connectors."
  - role: "Firmware verification domain lead"
    startTiming: "Month 6"
    rationale: "Translates safety and signoff expectations into release-packet templates and review rules buyers will trust."
  - role: "Account executive"
    startTiming: "Month 12"
    rationale: "Added only after two repeatable pilot-to-production conversions prove a narrow sales playbook."
milestones:
  - horizon: "0-12 months"
    items:
      - "Complete artifact inventories across 10 target accounts and choose the first two supported toolchain patterns."
      - "Ship the read-only MVP on one live controller-family release and prove 30% or greater regression reduction with zero missed known defects in backtests."
      - "Convert 2-3 paid pilots into 3-5 annual program subscriptions."
      - "Sign one HIL or safety-channel partner that can source or accelerate pilots."
  - horizon: "12-24 months"
    items:
      - "Expand successful accounts from one controller program to two or more programs or MCU targets."
      - "Standardize release-packet templates for industrial automation and mobile-robotics safety and cyber review gates."
      - "Reach 10-15 active paid programs with reviewer override data feeding recommendation quality."
  - horizon: "24-36 months"
    items:
      - "Approach the researched year-3 case of about 70 active programs across 20-25 accounts only if the expansion motion holds."
      - "Decide whether to enter automotive, medical, or aerospace only after industrial and robotics referenceability and mixed-MCU moat are established."
      - "Use cross-program failure data to launch analytics and benchmark modules, not just workflow automation."
risks:
  - risk: "Chip vendors or HIL incumbents bundle enough verification and release-evidence features to narrow the independent wedge."
    likelihood: Medium
    impact: High
    mitigation: "Stay read-only, mixed-MCU, and evidence-centric; win accounts where authoring and bench stacks are already heterogeneous."
  - risk: "Artifact normalization across modelers, code generators, and benches takes longer than planned."
    likelihood: High
    impact: High
    mitigation: "Start with one controller program, file-based ingestion, and a small connector set before deeper workflow automation."
  - risk: "Safety-adjacent teams refuse regression pruning without stronger provenance or third-party review."
    likelihood: High
    impact: High
    mitigation: "Keep humans in approval loops, expose provenance on every recommendation, and validate against historical defects before live reliance."
  - risk: "Model-generated or model-driven firmware adoption stays limited to a small set of advanced teams."
    likelihood: Medium
    impact: High
    mitigation: "Sell into mixed Rust and C model-based programs first and narrow the ICP rather than broadening product scope prematurely."
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2-4M"
  runwayMonths: 18
  useOfFundsSummary: "Fund a 4-5 person team to ship the read-only MVP, prove regression reduction on 3-5 design partners, build the first reusable connector library, and establish one repeatable partner-assisted channel before a seed round."
