slug: intent-to-hil-verification
date: '2026-06-19'
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-07
  unit: month
  source: '[BP date 2026-06-19] 模型从商业计划日期后的第一个完整月份开始。'
- id: A2
  name: pre-seed 交割后的期初现金
  value: $2.4M
  unit: usdM
  source: '[BP fundingAsk.targetFundingRangeUsd $2-4M; BP fundingAsk.runwayMonths 18] 模型采用接近下限但仍然克制的 pre-seed 交割规模，同时保证公司带着超过 6 个月缓冲跑到下一个里程碑。'
- id: A3
  name: 付费试点定价
  value: 3 个月共 $21K
  unit: usdK_per_pilot
  source: '[BP gtm.pricing; BP investorMemo.firstCustomer.initialContract] 取商业计划里 $15K-$25K 试点区间的中位数，建模为约 3 个月共 $21K，也就是每月约 $7K 试点收入。'
- id: A4
  name: 基础年订阅价格
  value: 每个活跃控制器项目年 ARR 为 $96K
  unit: usdK_per_program_year
  source: '[BP gtm.pricing $80K-$100K annual subscription] 基准情景采用订阅价格区间中位数：每个活跃控制器项目年 ARR 为 $96K。'
- id: A5
  name: 扩张模块挂载率
  value: 综合单项目价值会从 Y2 早期每月约 $8.2K，升到 Q4Y3 每月约 $10.0K。
  unit: usdK_per_program_month
  source: '[BP businessModel.revenueStreams; BP businessModel.expansionLevers; research.market.som] 额外 MCU 目标、回归分析和发版包模板，会把实际单项目价值从 Y2 初期约每月 $8.2K 拉升到 Q4Y3 约每月 $10.0K，同时仍低于研究里约 70 个项目、$80K ACV 的 SOM 上沿。'
- id: A6
  name: 客户爬坡
  value: 到 M12 做到 5 个活跃付费项目，Q4Y2 到 14 个，Q4Y3 到 40 个
  unit: active_programs
  source: '[BP milestones; BP market.som; BP strategicChoices.sequencingRationale] 到 M12 做到 5 个活跃付费项目，Q4Y2 到 14 个，Q4Y3 到 40 个；这样既能打到商业计划里 Y2 末 10-15 个项目的目标，也把研究中的 Y3 70 项目 SOM 只当上行边界，不把它写成基准。'
- id: A7
  name: 毛利率爬坡
  value: Y1 为 35%-50%，Y2 为 55%-65%，Y3 为 67%-70%。
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct 70; BP strategicChoices.sequencingRationale] Y1 毛利率 35%-50%，Y2 为 55%-65%，Y3 为 67%-70%；前期试点服务属性更重，因为接入和证据格式化仍带定制色彩，随着连接器标准化，毛利率才逐步贴近商业计划里的软件型目标。'
- id: A8
  name: 月度流失率
  value: 1.75%
  unit: percent
  source: 面向工业工作流软件的创业财务经验值：一旦进入签核流程，客户粘性会不低，但产品尚早、预算也不稳，因此仍需保留非零流失。
- id: A9
  name: 完全摊销 CAC
  value: 每个年订阅项目的完全摊销 CAC 为 $90K
  unit: usdK_per_customer
  source: '[BP gtm.channels; BP gtm.funnelTargets; research.reportMemo.distributionChannels] 创始人直销、制品资格审查和偏解决方案的实施方式，意味着即便还没靠伙伴转介绍，CAC 也会偏高。'
- id: A10
  name: 全包薪酬带
  value: 创始人 / CEO $160K；工程 $180K；解决方案 / 集成 $145K；固件验证 $170K；销售 $150K；G&A $120K
  unit: usdK_per_fte_year
  source: 面向美国 pre-seed 工业软件团队的创业财务经验值，并映射到 [BP team] 的角色和计划中的领域招聘顺序。
- id: A11
  name: 人员爬坡快照
  value: 创始人 1/1/1/1/1/1；工程 1/1/1/1/2/3；解决方案 0/1/1/1/2/2；固件验证 0/0/1/1/1/1；销售 0/0/0/1/1/2；G&A 0/0/0/0/0/1，覆盖 q1y1/q2y1/q3y1/q4y1/q4y2/q4y3
  unit: fte
  source: '[BP team; BP fundingAsk.useOfFundsSummary] 模型在 Y1 让公司基本维持在商业计划里的 4-5 人核心班底；Y2 只补足把连接器产品化所需的人；Y3 再放大 GTM 和轻量运营。'
- id: A12
  name: 薪酬平滑
  value: Y2 和 Y3 的薪资费用会在要求的年末快照之间逐步抬升，而不是只在 Q4 跳变。
  unit: method
  source: '[Financial Modeler contract] Y2 和 Y3 的薪资费用会在要求的年末快照之间平滑递增，而不是只在 Q4 阶跃变化，这样 P&L 才和商业计划的招聘顺序、以及固定六列表头的人员结构保持一致。'
- id: A13
  name: 非薪酬运营预算
  value: Y1 的非薪资 opex 为每月 $26K-$40K；Y2 为每季度 $120K-$150K；Y3 为每季度 $165K-$205K。
  unit: usdK
  source: 面向工业 B2B 软件创业公司的创业财务经验值：覆盖云工具、差旅、法务、保险、伙伴支持，以及在薪酬之外适度的实验室集成开销。
- id: A14
  name: 现金转换简化
  value: 融资交割后，用 EBITDA 近似现金变动。
  unit: method
  source: 面向轻资产软件业务的创业财务经验值：在现阶段不单独建债务、税务或 capex 计划，因此用 EBITDA 近似融资交割后的现金变动。
- id: A15
  name: 下行情景变量
  value: Y3 末约有 24 个活跃项目，综合 ARPU 更接近 $96K，毛利率上限约 65%。
  unit: scenario_inputs
  source: '[BP risks; research.sensitivityCases] 下行情景反映的是：试点转化更慢、模块挂载更弱，如果买方对回归裁剪建立信任的过程拖长，服务负担就会更顽固。'
- id: A16
  name: 上行情景变量
  value: Y3 末约有 50 个活跃项目，综合 ARPU 约到 $120K，毛利率约升到 72%。
  unit: scenario_inputs
  source: '[BP milestones; BP businessModel.expansionLevers] 上行情景假设：第二项目扩张、伙伴辅助上手和高级证据模块都比基准更早兑现。'
