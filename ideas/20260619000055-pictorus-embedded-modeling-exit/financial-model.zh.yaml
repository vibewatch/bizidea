  baseCase: $90K 每个转成年订阅项目的 CAC
  upsideCase: 伙伴来源扩张更强时降到 $70K
  y3RevenueImpactK: 0.0
  cashImpactK: -300.0
- variable: 流失率
  downsideCase: 如果项目 ROI 仍然偏窄，月度流失率升到 2.5%
  baseCase: 月度流失率 1.75%
  upsideCase: 工作流锁定更深时，月度流失率降到 1.0%
  y3RevenueImpactK: -180.0
  cashImpactK: -140.0
- variable: 销售周期
  downsideCase: 从 discovery 到年订阅要 12-15 个月
  baseCase: 从 discovery 到年订阅要 8-10 个月
  upsideCase: 制品资格审查更顺、参考案例更强时缩到 6-8 个月
  y3RevenueImpactK: -720.0
  cashImpactK: -520.0
- variable: 毛利率
  downsideCase: 稳定期毛利率 65%
  baseCase: 稳定期毛利率 70%
  upsideCase: 稳定期毛利率 72%
  y3RevenueImpactK: 0.0
  cashImpactK: -200.0
- variable: 招聘节奏
  downsideCase: 在证明连接器复用前，提前两个季度把 1 位工程和 1 位解决方案招聘拉进来
  baseCase: 按商业计划顺序招聘，并在快照季度之间平滑薪酬
  upsideCase: 把 1 个规模化岗位延后到活跃项目超过 30 个再招
  y3RevenueImpactK: 0.0
  cashImpactK: -260.0
modelDiagram:
  title: 单位经济模型流
  mermaid: "flowchart LR\n  Leads[Qualified discovery + artifact audit] --> Pilots[Paid pilot programs]\n  Pilots --> Programs[Annual active programs]\n  Programs --> Revenue[Subscription + module revenue]\n  Revenue --> GrossProfit[Gross profit]\n  GrossProfit --> Cash[Ending cash]\n"
modelSanity:
- checkName: 收入引擎
  finding: 基准情景收入的驱动，是活跃付费项目从 Y1 末的 5 个，走到 Q4Y2 的 14 个，再到 Q4Y3 的 40 个；Y2 之后，已成交账户内部的扩张比新 logo 数量更重要。
- checkName: 必须顺利的前提
  finding: 模型默认连接器复用会足够成熟，试点才能顺利转成年订阅，并在不同比例增加服务人头的情况下，继续往额外项目或 MCU 目标扩。
- checkName: 模型会在哪种情况下失效
  finding: 如果销售周期拖到一年以上，或单项目 ARPU 只能停在基础订阅附近，下行情景就会出现：Y3 EBITDA 会重新掉到 -$500K 以下，现金也会逼近仅剩十几万美元的低位。
- checkName: 下一轮融资证明
  finding: 当公司做到 14 个活跃付费项目、证明两类可复用连接器模式成立，并跑出第二项目扩张能比创始人单打独斗更低 GTM 摩擦时，下一轮融资才算站得住。
sanityChecks:
  ruleOf40: Y3 增长率 223.8% + EBITDA 利润率 4.4% = 228.2%。
  burnMultiple: Y2 burn multiple 约为 0.8x，对应约 $1.03M 的净新增 ARR；Y3 在新增约 $3.29M 净新增 ARR 的同时转正 EBITDA。
  revenuePerFte: $330K 的 Y3 人均收入，基于 $3.30M 收入和 10 名年末 FTE（对比 SaaS 对标区间 $200-400K）。
  flags:
  - 第 3 年收入要成立，前提是单项目综合价值必须高于商业计划里的 $80K-$100K 基础订阅，靠的是额外 MCU 目标和发版包模块；如果挂载率起不来，模型就打不准。
  - 表面上很好看的 rule of 40，被 Y2 过小的收入基数放大了，因此投资人更该盯 ARR 扩张、转化证明和 burn multiple，而不是这个裸百分比。
  - 只靠 10 名年末 FTE 去服务 40 个活跃项目，要求连接器复用和伙伴辅助上手必须比很多工业、重服务工作流更早跑通。
  - 收入集中度依然不低，因为即便做到 40 个活跃项目，大概率也还是集中在相对少数几家工业 OEM 账户里。
