slug: intent-to-hil-verification
date: "2026-06-19"
currency: USD
modelStartMonth: "2026-07"
assumptions:
  - id: A1
    name: Model start month
    value: "2026-07"
    unit: month
    source: "[BP date 2026-06-19] The model starts in the first full month after the business-plan date."
  - id: A2
    name: Opening cash after pre-seed close
    value: "$2.4M"
    unit: usdM
    source: "[BP fundingAsk.targetFundingRangeUsd $2-4M; BP fundingAsk.runwayMonths 18] The model uses a disciplined near-low-end pre-seed close that still reaches the next milestone with more than six months of buffer."
  - id: A3
    name: Paid pilot pricing
    value: "$21K over 3 months"
    unit: usdK_per_pilot
    source: "[BP gtm.pricing; BP investorMemo.firstCustomer.initialContract] The midpoint of the BP's $15K-$25K pilot range is modeled as roughly $7K of monthly pilot revenue."
  - id: A4
    name: Base annual subscription price
    value: "$96K ARR per active controller program"
    unit: usdK_per_program_year
    source: "[BP gtm.pricing $80K-$100K annual subscription] The base case uses the middle of the subscription range once a pilot converts."
  - id: A5
    name: Expansion module attach
    value: "Blended program value rises from about $8.2K monthly in early Y2 to about $10.0K monthly in Q4Y3."
    unit: usdK_per_program_month
    source: "[BP businessModel.revenueStreams; BP businessModel.expansionLevers; research.market.som] Extra MCU targets, regression analytics, and release-packet templates lift realized value above the base subscription while staying below the research SOM stretch of about 70 programs at $80K ACV."
  - id: A6
    name: Customer ramp
    value: "5 active paid programs by M12, 14 by Q4Y2, and 40 by Q4Y3"
    unit: active_programs
    source: "[BP milestones; BP market.som; BP strategicChoices.sequencingRationale] The ramp hits the BP's 10-15 active-program target by the end of Y2 and treats the researched 70-program Y3 SOM as an upside boundary rather than the base case."
  - id: A7
    name: Gross margin ramp
    value: "35%-50% in Y1, 55%-65% in Y2, and 67%-70% in Y3"
    unit: percent
    source: "[BP businessModel.targetGrossMarginPct 70; BP strategicChoices.sequencingRationale] Early pilots are services-heavy because ingestion and evidence formatting are still bespoke, then the model approaches the BP's software-like margin target as connectors standardize."
  - id: A8
    name: Monthly churn
    value: "1.75%"
    unit: percent
    source: "Startup-finance heuristic for sticky but still unproven industrial workflow software; once a program is in signoff flow it should be durable, but early-product and budget risk still justify non-zero churn."
  - id: A9
    name: Fully loaded CAC
    value: "$90K per annual program"
    unit: usdK_per_customer
    source: "[BP gtm.channels; BP gtm.funnelTargets; research.reportMemo.distributionChannels] Founder-led direct sales, artifact qualification, and solutions-heavy implementation imply a high-touch CAC even before partner referrals help."
  - id: A10
    name: Loaded salary bands
    value: "Founder/CEO $160K; engineering $180K; solutions/integration $145K; firmware verification $170K; sales $150K; G&A $120K"
    unit: usdK_per_fte_year
    source: "Startup-finance heuristic for a U.S. pre-seed industrial software team, mapped to [BP team] roles and the domain-specialist hiring sequence in the plan."
  - id: A11
    name: Headcount ramp snapshots
    value: "Founder 1/1/1/1/1/1; engineering 1/1/1/1/2/3; solutions 0/1/1/1/2/2; firmware verification 0/0/1/1/1/1; sales 0/0/0/1/1/2; G&A 0/0/0/0/0/1 across q1y1/q2y1/q3y1/q4y1/q4y2/q4y3"
    unit: fte
    source: "[BP team; BP fundingAsk.useOfFundsSummary] The model keeps the company near the BP's 4-5 person operating core through Y1, adds only the hires needed to productize connectors in Y2, and scales GTM plus lightweight ops in Y3."
  - id: A12
    name: Payroll smoothing
    value: "Y2 and Y3 salary expense ramps between the required year-end snapshots instead of stepping only at Q4."
    unit: method
    source: "[Financial Modeler contract] Quarterly salary lines are smoothed so the P&L stays consistent with the BP hiring order and the fixed six-column headcount schema."
  - id: A13
    name: Non-payroll operating budgets
    value: "Y1 non-salary opex runs from $26K to $40K per month, Y2 from $120K to $150K per quarter, and Y3 from $165K to $205K per quarter."
    unit: usdK
    source: "Startup-finance heuristic for cloud tooling, travel, legal, insurance, partner support, and modest lab-integration overhead on top of payroll for an industrial B2B software startup."
  - id: A14
    name: Cash conversion simplification
    value: "EBITDA approximates cash movement after the financing close."
    unit: method
    source: "Startup-finance heuristic for an asset-light software business with no debt, tax, or capex schedule modeled separately at this stage."
  - id: A15
    name: Downside scenario deltas
    value: "Y3 ends with about 24 active programs, blended ARPU stays closer to $96K, and gross margin tops out near 65%."
    unit: scenario_inputs
    source: "[BP risks; research.sensitivityCases] The downside reflects slower pilot conversion, weaker module attach, and more persistent services load if trust in regression pruning develops slowly."
  - id: A16
    name: Upside scenario deltas
    value: "Y3 ends with about 50 active programs, blended ARPU reaches roughly $120K, and gross margin rises to about 72%."
    unit: scenario_inputs
    source: "[BP milestones; BP businessModel.expansionLevers] The upside assumes second-program expansion, partner-assisted onboarding, and premium evidence modules arrive earlier than base case."
