    downsideCase: "Pull one engineering and one solutions hire forward by two quarters before connector reuse is proven"
    baseCase: "Hire in the BP sequence and smooth payroll between snapshot quarters"
    upsideCase: "Delay one scale hire until active programs exceed 30"
    y3RevenueImpactK: 0.0
    cashImpactK: -260.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Leads[Qualified discovery + artifact audit] --> Pilots[Paid pilot programs]
      Pilots --> Programs[Annual active programs]
      Programs --> Revenue[Subscription + module revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Ending cash]
modelSanity:
  - checkName: Revenue engine
    finding: Base-case revenue is driven by moving from 5 active paid programs at the end of Y1 to 14 by Q4Y2 and 40 by Q4Y3, with expansion inside landed accounts doing more work than new-logo volume after Y2.
  - checkName: Must go right
    finding: The model assumes connector reuse becomes good enough that pilots convert into annual subscriptions and then expand to extra programs or MCU targets without a matching increase in services headcount.
  - checkName: Model breaks if
    finding: The downside appears if sales cycles stretch past a year or blended ARPU stays near the base subscription only, because that combination drives Y3 EBITDA back below negative $500K and pushes cash toward the low hundreds.
  - checkName: Next-round proof
    finding: The next round is justified once the company reaches 14 active paid programs, proves two reusable connector patterns, and shows that second-program expansion lowers go-to-market friction versus founder-only selling.
sanityChecks:
  ruleOf40: "Y3 growth 223.8% + EBITDA margin 4.4% = 228.2%."
  burnMultiple: "Y2 burn multiple is about 0.8x on roughly $1.03M of net new ARR; Y3 turns EBITDA positive while adding about $3.29M of net new ARR."
  revenuePerFte: "$330K Y3 using $3.30M revenue and 10 year-end FTE (benchmark $200-400K SaaS)."
  flags:
    - "Year-3 revenue depends on blended program value rising above the BP's $80K-$100K base subscription through extra MCU targets and release-packet modules; if attach rates stay weak, the model misses."
    - "The headline rule-of-40 result is flattered by the very small year-2 revenue base, so investors should focus more on ARR expansion, conversion proof, and burn multiple than on the raw percentage."
    - "Serving 40 active programs with only 10 year-end FTE requires connector reuse and partner-assisted onboarding to work earlier than in many industrial, services-heavy workflows."
    - "Revenue concentration remains meaningful because even 40 active programs are still likely concentrated in a relatively small number of industrial OEM accounts."
