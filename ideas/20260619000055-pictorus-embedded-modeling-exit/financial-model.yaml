    y3RevenueImpactK: -180.0
    cashImpactK: -140.0
  - variable: sales cycle
    downsideCase: "12-15 months from discovery to annual subscription"
    baseCase: "8-10 months from discovery to annual subscription"
    upsideCase: "6-8 months with cleaner artifact qualification and references"
    y3RevenueImpactK: -720.0
    cashImpactK: -520.0
  - variable: gross margin
