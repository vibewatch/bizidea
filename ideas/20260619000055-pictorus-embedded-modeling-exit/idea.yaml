topRisks:
  - name: "Incumbent bundling"
    description: "Chip vendors or large modeling-suite providers could bundle enough verification features to narrow the independent wedge."
    mitigation: "Stay vendor-neutral, integrate across mixed MCU stacks, and win where buyers need proof that spans multiple authoring tools and hardware targets."
  - name: "Integration drag"
    description: "Embedded toolchains, HIL benches, and lab data are notoriously messy, which can slow time to first value."
    mitigation: "Start with read-only connectors and file-based ingestion around one controller program before expanding into deeper workflow automation."
  - name: "Trust ceiling"
    description: "If the product misses a real drift issue or suggests the wrong regression set, embedded teams may reject it for safety-relevant releases."
    mitigation: "Keep humans in approval loops, expose evidence provenance for every recommendation, and launch first as decision support rather than autonomous release approval."
