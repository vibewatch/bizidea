slug: intent-to-hil-verification
date: '2026-06-19'
executiveSummary: Renesas 收购 Pictorus，说明浏览器原生嵌入式建模和内存安全代码生成已经成了战略工作流层，但市场里仍缺一套厂商中立的能力，去证明模型意图在代码生成和目标端集成后没有走样。公司该先打这块空白：先为工业运动控制 OEM 做只读的意图到 HIL 验证层，第二步再切到移动机器人项目。第一版产品应接入单一控制器家族发版里的模型版本、生成固件制品、硬件配置数据和 HIL 输出，再给出最小回归集合，并生成一份可追溯的发版包。这个滩头市场吸引人的地方在于：签核时的痛最尖，HIL 和测试自动化预算本来就有，而且买方不用替换现有的写作工具和台架工具。GTM 打法应从创始人主导的付费试点起步，直接盯住那些因为 HIL 稀缺或审计压力，已经要拖慢上市日期的真实发版项目；等产品证明自己能减少重跑、把证据包做干净，再一户一户往外扩。真正可防守的资产不是又一个建模器，而是一套跨项目语料库，能把模型改动、MCU 目标、审阅人覆盖修改和故障模式连起来，最后安全地砍掉多余回归。核心风险在于集成拖慢、安全相邻工作流里的信任上限，以及芯片厂商或 HIL 现有厂商也许会补出足够多的证据功能，把切口压窄。最大证据缺口是：还没有直接证明足够多的首波买家正在转向模型生成 Rust 或类似的模型驱动固件，所以定价和市场扩张假设都只能算假说，至少要等三家付费试点转正。
problem:
- 随着浏览器原生建模器和生成固件把“写代码”这件事前移，验证团队却还在下游靠自研 HIL 脚本、电子表格和发版会议来证明正确性。
- 混合 MCU 的控制器项目会浪费稀缺台架时间，重跑太多测试，因为还没有一套中立系统，能把模型改动映射到最小安全回归集合，并顺手把发版证据拼好。
solution:
- 只读接入会比对单一活跃控制器项目里的行为模型、生成出来的 Rust 或 C 制品、硬件配置和 HIL 结果，再把模型到设备的偏移揪出来。
- 产品会按 MCU 目标推荐最小且站得住脚的回归矩阵，并自动生成一份带证据来源、未覆盖假设和人工审批节点的发版包。
whyWeWin:
- 厂商中立、只读部署，正适合那些已经有建模器、HIL 台架、CI 胶水和安全评审流程的混合 MCU OEM。
- 价值不靠让买方换一套新的写作栈，而是体现在签核环节：更少重跑、更快产出发版包、更早抓出偏移。
- 护城河会从模型改动到故障的映射、审阅人覆盖修改数据，以及跨项目复用的发版证据模板不断变厚。
strategicChoices:
  beachhead: 100-1,000 人规模的工业自动化 OEM，正把一条新的电机控制器家族发到混合 Renesas、STM32 或 NXP 目标上，已有 HIL 台架，固件团队规模 15-40 人
  wedgeRationale: 单一控制器家族的一次发版，就是最小、也最容易单独批预算的单元：台架稀缺、模型偏移和签核痛点在这里已经看得见。先打这一点，比试图替换客户整套建模、CI 或验证栈，更快拿到可量化结果。
  sequencingRationale: 先在一条真实发版上做只读接入，换信任、摸清制品格式；再把第一批可复用连接器和发版包工作流产品化；只有当试点证明重跑更少、证据包被接受后，再上渠道合作和多项目扩张。
  notYet:
  - 替换建模写作工具或 HIL 硬件
  - 在没有人工签核的情况下做自动发版审批
  - 在拿到工业和机器人参考案例之前，就贸然进入汽车、医疗或航天项目
market:
  tam: $180M 估算 TAM，来自约 1,200 家全球工业自动化和移动机器人 OEM 账户、每户约 1.5 个活跃项目，以及约 $100k ACV
  sam: $36M 估算 SAM，来自约 400 个北美、欧洲和日本可触达的控制器项目，ACV 约 $90k
  som: $5.6M 估算第 3 年 SOM，来自约 20-25 个账户上的约 70 个活跃项目，ACV 约 $80k
  segments:
  - 工业运动控制 OEM 控制器项目
  - 移动机器人 OEM 控制器项目
  buyingProcess: 嵌入式验证负责人或固件质量负责人会先在一条活跃的控制器家族发版上发起试点，再拿现有模型、固件和 HIL 制品把价值跑出来。最后拍预算的人通常是嵌入式平台总监或控制工程负责人，因为这笔钱可以直接从现有验证工具和实验室效率预算里出，安全负责人或实验室经理往往也会参与。
product:
  mvp: 围绕一个控制器项目做只读接入：把行为模型版本和生成出来的 Rust 或 C 制品做 diff，把每次变更映射到目标端 HIL 义务，再产出一份带证据来源和人工审批节点的发版包草稿。
  sixMonth: 先覆盖调研中最常见的两类工具链模式，在同一账户内支持两个 MCU 目标，并先在历史缺陷上证明能回溯式砍掉回归，再去承诺线上自动化。
  twelveMonth: 从回溯测试走到 3-5 个付费控制器项目的真实签核辅助，补上一类 HIL 台架和一类 CI 或仿真栈的可复用连接器，并把每次推荐的人为覆盖修改数据都记下来。
  twentyFourMonth: 在同一账户内，跨多个项目推荐最小安全回归集合；推出适配工业和机器人评审关卡的可复用发版包模板；再把单项目胜利变成组合式扩张。
  keyBets:
  - 模型改动可以足够准确地映射到验证义务，既减少重跑，又不漏掉已知缺陷。
  - 只读接入能覆盖足够多的首波工具链，在深度集成之前就先交付价值。
  - 想拿下预算和后续扩张，发版包质量和审阅人信任度的重要性，不会低于节省台架时间。
gtm:
  wedge: 围绕一条控制器家族的付费共创客户试点：HIL 排队或审计证据准备，已经在威胁固定发版日期
  channels:
  - 创始人直接卖给嵌入式平台、控制和固件质量负责人
  - 把共创客户试点范围锁在一条真实控制器家族发版上
  - 与已经深入实验室工作流的 HIL 集成商、安全或合规顾问联合销售
  funnelTargets: Discovery→制品合格试点 25-35%；付费试点→年度项目订阅 50%+；首个项目→12 个月内扩到第二个项目 40%+
  pricing: 先按单一控制器项目收 8-12 周试点费，再冲抵进一份 $80k-$100k 的年订阅；额外 MCU 目标、发版包模板和更深的 HIL 集成另行加价。
businessModel:
  revenueStreams:
  - 按活跃控制器项目收年订阅费
  - 收取上手和集成服务费
  - 针对额外 MCU 目标、回归分析和发版包模板卖高级模块
  unitOfValue: 处于发版签核中的活跃控制器项目
  targetGrossMarginPct: 70
  expansionLevers:
  - 在同一账户内加第二个控制器项目或额外 MCU 目标
  - 把发版包和合规模板卖进更多安全与网络安全评审路径
  - 当只读证明建立起信任后，再把更深的 HIL、CI 和分析模块卖进去
strategyMap:
  northStarMetric: 每个季度里，使用平台生成的回归推荐和证据包，并被客户签核团队接受后顺利发版的控制器数量
  inputMetrics:
  - 每个账户回测过的历史变更集合数
  - 能把回归执行量降低 30% 或以上、且零漏掉已知缺陷的试点发版数
  - 从模型版本变更到发版包草稿生成的中位天数
  - 现有账户内扩到第二个项目的比例
  moatsToBuild:
  - 连接模型改动、MCU 目标和故障模式的语料库
  - 对齐 IEC 61508、机器人安全和网络安全文档评审的发版包模板
  - 显示人工审阅人何时接受或否决回归推荐的覆盖修改数据
  killCriteria:
  - 做完三次共创客户回测后，产品仍无法在零漏掉已知缺陷的前提下，把必跑重跑次数至少减少 20%。
  - 只读接入在四周内仍覆盖不了目标账户 70% 的制品。
  - 前 8 个合格试点里，转成年订阅的少于 3 个。
  mermaid: "flowchart LR\n  Wedge[One controller-family release pilot] --> MVP[Read-only intent-to-HIL proof MVP]\n  MVP --> Proof[Smaller regression sets and accepted release packets]\n  Proof --> Expansion[More programs per account and cross-MCU analytics]\n"
investorMemo:
  verdict:
    call: 观察
    conviction: 工作流切口很有吸引力，但在看到有买方愿意真的掏预算，并信任回归裁剪前，判断仍应保持谨慎。
    whyBelieve: Renesas 已经把写作层前移坐实了，而现有厂商里还没有谁真正拿住横跨模型意图、生成固件和混合 MCU 测试证据的中立证明层。
    whyDoubt: 今天可触达市场还不大；如果只读试点不能很快转成可信的软件订阅，这个产品就可能滑成一个服务很重的功能包。
    nextDiligence: 先看一次共创客户回测和一次付费真实试点：既要明显减少重跑，又不能伤到缺陷检出，还得跑出一条能走向年订阅的预算路径。
  firstCustomer:
    title: 工业运动控制 OEM 的嵌入式验证负责人
    profile: 100-1,000 人规模的 OEM，固件团队 15-40 人，有一条活跃控制器家族发版、混合 MCU 目标和现成 HIL 台架。
    trigger: 一条 2027 年上市的控制器项目，从手写 C 转向模型生成固件后，暴露出覆盖缺口、台架排队过长或发版证据薄弱。
    buyer: 嵌入式平台总监
    initialContract: 针对一个历史版本加一个真实发版，做 8-12 周、$15k-$25k 的付费试点；如果团队接受发版包且重跑次数下降，就转成该控制器项目的 $80k-$100k 年订阅。
  mustBeTrue:
  - 至少一半受访目标 OEM 计划在 24 个月内做一次模型化或生成代码的控制器发版。
  - 只读部署能在四周内接入试点账户的模型、固件和 HIL 制品。
  - 历史回测能在零漏掉已知缺陷的前提下，把必跑回归执行量降到原来的 70% 或更低。
  - 经济买家会把成功试点转成每项目每年 $80k 或更高的订阅。
  - 即便芯片厂商或 HIL 现有厂商已占住邻近预算，厂商中立的证明层依然能赢。
  diligenceQuestions:
  - 前 20 个目标账户里，模型生成 Rust 与 Rust/C 混合的普及度到底有多高？
  - 早期试点里，最耗集成工作量的三个制品或日志格式到底是哪几类？
  - 今天发版证据工具的预算归谁管：实验室、平台团队，还是质量团队？
  - 固件质量负责人要看到什么级别的证明，才会信任“只推荐、不自动放行”的回归裁剪？
  - Renesas 和 HIL 现有厂商补上相近证据功能的速度到底有多快？
operatingAssumptions:
- assumption: 前 10 个目标账户在模型和 HIL 制品上的模式足够相似，前三类连接器就能覆盖大部分接入工作。
  basis: research.yaml
  validationTest: 在 10 个 discovery 账户里盘点制品，证明 70% 或以上的文件都能落进前三类连接器。
  decisionImpact: 如果不成立，就把 ICP 收窄到单一建模栈，或接受更重的服务式上手投入。
- assumption: 只读、且由人审批的部署方式，足以拿下第一批试点。
  basis: research.yaml
  validationTest: 在不要求买方替换写作工具或 HIL 台架的前提下，拿下三家共创客户试点。
  decisionImpact: 如果不成立，就得把更深的工作流自动化提前排进路线图，并接受更长、更偏集成驱动的销售周期。
- assumption: 回归推荐能在不漏掉已知缺陷的前提下，至少砍掉 30% 的重跑。
  basis: idea.yaml
  validationTest: 针对每个共创客户，拿最近 6-10 次控制器变更，对照 HIL 日志和逃逸缺陷做回测。
  decisionImpact: 如果不成立，就把定位从回归裁剪转回证据打包和偏移检测。
- assumption: 成功试点可以转成每个活跃控制器项目 $80k-$100k 的年订阅。
  basis: 运营判断
  validationTest: 带着转正条款向五个账户卖付费试点，并至少拿到两个按目标价格成交的转化。
  decisionImpact: 如果不成立，就得增加扩张模块，或重估这个市场能否撑起风险投资回报。
- assumption: 厂商中立定位的重要性，足以压过芯片厂商打包进来的验证功能。
  basis: idea.yaml
  validationTest: 在现有硅厂或 HIL 工具已经装进场的情况下，赢下三家试点。
  decisionImpact: 如果不成立，就和某一个生态深度绑定，或者只盯混合 MCU 账户。
experimentRoadmap:
- horizon: 0-90 天
  experiment: 在工业和机器人目标客户里做 10 次 discovery 访谈和制品盘点。
  hypothesis: 早期共创客户会收敛到少数几类工具链模式，靠只读连接器策略就能覆盖。
  successMetric: 完成 10 次访谈，且 70% 或以上的制品都能被前三类连接器解释。
  owner: 创始人 / CEO
- horizon: 0-90 天
  experiment: 在一个历史控制器项目上回测近期的模型和固件变更。
  hypothesis: 引擎能在不漏掉已知故障的前提下，砍掉至少 30% 的重跑。
  successMetric: 回放 6-10 次变更，回归量减少 30% 或以上，且零漏掉已知缺陷。
  owner: 创始工程师
- horizon: 90-180 天
  experiment: 为一条真实控制器家族签核生成一份发版包草稿。
  hypothesis: 只要每条推荐都带证据来源和人工审批步骤，质量与系统审阅人就会真的拿这份包来用。
  successMetric: 至少有一次真实签核会议使用该发版包，且准备时间下降 50% 或以上。
  owner: 创始工程师
- horizon: 90-180 天
  experiment: 在两个真实发版项目上测试付费试点定价。
  hypothesis: 哪怕还没全面量产部署，只要试点锁定一条紧急发版，买方也愿意先付钱。
  successMetric: 签下两个单价至少 $15k 的付费试点，并带有转成年订阅的条款。
  owner: 创始人 / CEO
- horizon: 6-12 个月
  experiment: 拿发版证据包和固件质量负责人外加一位认证顾问逐份过。
  hypothesis: 只做推荐、不自动放行的回归裁剪，只要证据包能干净映射到现有内部评审关卡，就能被接受。
  successMetric: 5 位审阅人里至少 4 位认为，这份包只需小改就足以支撑一次内部签核会议。
  owner: 固件验证领域负责人
- horizon: 6-12 个月
  experiment: 和一家 HIL 集成商或安全顾问跑一轮联合销售。
  hypothesis: 合作方已经懂台架和审计工作流，所以伙伴带来的单子会比冷启动外呼更快合格。
  successMetric: 签下一份引荐协议，或拿到两个由合作方带来的合格试点。
  owner: 创始人 / CEO
- horizon: 6-12 个月
  experiment: 让前四家客户从一个项目扩到第二个项目或额外 MCU 目标。
  hypothesis: 一旦在一条发版上建立起信任，同一账户内扩张会比拿新 logo 更容易。
  successMetric: 前四家客户里至少两家，在 12 个月内加购第二个项目或新的目标。
  owner: 解决方案 / 集成工程师
operations:
- 按控制器项目快照模型版本、生成固件制品、板级配置、HIL 日志和签核文档的制品接入流水线
- 记录证据来源、人工覆盖修改和最终回归决策的推荐审阅队列
- 每周与共创客户做发版复盘，每月做逃逸缺陷复盘，用来改进映射规则
- 与一家 HIL 台架集成商和一家安全或合规顾问建立集成合作
team:
- role: 创始人 / CEO
  startTiming: 第 0 个月
  rationale: 必须由创始人亲自卖单，才能摸清工具链差异、拿下共创客户，并和 HIL 集成商、安全顾问谈成合作动作。
- role: 创始工程师
  startTiming: 第 0 个月
  rationale: 负责接入、模型 diff 逻辑、第一版回归推荐引擎，以及证据包工作流。
- role: 解决方案 / 集成工程师
  startTiming: 第 3 个月
  rationale: 缩短在混乱实验室数据上的首个价值落地时间，把试点工作沉淀成可复用连接器。
- role: 固件验证领域负责人
  startTiming: 第 6 个月
  rationale: 把安全与签核预期翻成买方愿意相信的发版包模板和评审规则。
- role: 客户经理
  startTiming: 第 12 个月
  rationale: 只有在至少两次“试点转量产”证明销售打法可复制后，才补这位。
milestones:
- horizon: 0-12 个月
  items:
  - 完成 10 个目标账户的制品盘点，并选定首批支持的两类工具链模式。
  - 把只读 MVP 跑进一条真实控制器家族发版，并在回测里证明回归量减少 30% 或以上、且零漏掉已知缺陷。
  - 把 2-3 个付费试点转成 3-5 个年度项目订阅。
  - 签下一家能带来或加速试点的 HIL 或安全渠道伙伴。
- horizon: 12-24 个月
  items:
  - 把成功账户从一个控制器项目扩到两个或更多项目、或更多 MCU 目标。
  - 把适用于工业自动化和移动机器人安全/网络安全评审关卡的发版包模板标准化。
  - 做到 10-15 个活跃付费项目，并让审阅人覆盖修改数据持续反哺推荐质量。
- horizon: 24-36 个月
  items:
  - 只有在扩张动作站稳后，才去逼近研究里第 3 年约 70 个活跃项目、20-25 个账户的目标情景。
  - 只有在工业和机器人参考案例、以及混合 MCU 护城河真正建立后，才决定是否进入汽车、医疗或航天。
  - 利用跨项目故障数据推出分析和对标模块，而不只是继续堆工作流自动化。
risks:
- risk: 芯片厂商或 HIL 现有厂商把验证和发版证据功能补到足够好，独立切口被压窄。
  likelihood: Medium
  impact: High
  mitigation: 坚持只读、混合 MCU、证据优先；优先拿下那些写作栈和台架栈本来就异构的账户。
- risk: 建模器、代码生成器和台架之间的制品规范化，比计划更慢。
  likelihood: High
  impact: High
  mitigation: 先围绕一个控制器项目、文件式接入和少量连接器起步，再扩到更深的工作流自动化。
- risk: 安全相邻团队在没有更强证据来源或第三方审阅前，不愿接受回归裁剪。
  likelihood: High
  impact: High
  mitigation: 把人留在审批回路里，每条推荐都摊开证据来源，并先在历史缺陷上验证，再进入真实依赖。
- risk: 模型生成或模型驱动固件的采用，长期只停留在少数先进团队。
  likelihood: Medium
  impact: High
  mitigation: 先卖给混合 Rust/C 的模型化项目，把 ICP 收窄，而不是过早把产品范围越做越大。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: 用这笔钱养一支 4-5 人团队，做出只读 MVP，在 3-5 个共创客户身上证明回归减少，搭起第一版可复用连接器库，并在种子轮前跑通一条可重复的伙伴辅助渠道。
