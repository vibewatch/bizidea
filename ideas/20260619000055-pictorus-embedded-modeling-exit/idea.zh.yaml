jobsToBeDone:
- job: 当控制器模型在发版后期发生变更时，帮验证负责人看清哪些目标端测试真的要重跑，这样他们就能不浪费台架时间，尽快完成签核。
  currentAlternative: 自研 HIL 脚本、电子表格回归矩阵和工程师经验判断
  successMetric: 从模型版本变更到控制器发版包获批的天数
- job: 当同一套控制逻辑要发到多个 MCU 家族上时，帮固件质量团队证明生成代码仍然符合系统意图，从而避开临门一脚的偏移和重新打板。
  currentAlternative: 人工代码评审、重复台架测试和厂商专属调试流程
  successMetric: 每个控制器项目中，后期验证缺陷或跨目标回归的下降幅度
ideaScorecard:
  signalStrength:
    score: 4
    rationale: 这笔并购直接验证了浏览器原生嵌入式建模、内存安全代码生成和更早期系统验证，都是已经成形的类别信号。
  painIntensity:
