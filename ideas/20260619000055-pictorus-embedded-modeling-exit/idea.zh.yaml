topRisks:
- name: 现有厂商打包
  description: 芯片厂商或大型建模套件可能把验证功能补到“够用”，把独立切口压窄。
  mitigation: 坚持厂商中立，覆盖混合 MCU 栈，优先赢下那些需要横跨多种写作工具和硬件目标来拿证明的买方。
- name: 集成拖慢
  description: 嵌入式工具链、HIL 台架和实验室数据天生就乱，首个价值点可能来得很慢。
  mitigation: 先围绕单一控制器项目做只读连接器和文件式接入，再逐步扩进更深的工作流自动化。
- name: 信任上限
  description: 如果产品漏掉真实偏移问题，或推荐了错误的回归集合，嵌入式团队在安全相关发版上可能直接不用。
  mitigation: 把人留在审批回路里，把每条建议的证据来源都摊开，首发只做决策支持，不做全自动放行。
