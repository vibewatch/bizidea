slug: stablecoin-treasury-control-plane
date: '2026-05-12'
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: M1 起始客户数
  value: '0'
  unit: count
  source: '[BP milestones Y1] 共创客户探索在 M1-M4 进行；模型起点时还没有付费客户。'
- id: A2
  name: 生产期 ACV（年合同价值）
  value: '250000'
  unit: USD/year
  source: '[BP investorMemo.firstCustomer] 初始合同会转成 $200k-$300k ARR；模型采用中位数 $250k。'
- id: A3
  name: 试点订阅费率（生产前）
  value: '200000'
  unit: USD/year
  source: '[BP investorMemo.firstCustomer] 将 $75k-$150k 的付费试点按 $100k / 6 个月建模，年化约 $200k。'
- id: A4
  name: 单客户实施费（一次性）
  value: '50000'
  unit: USD
  source: '[BP investorMemo.firstCustomer] 试点预算为 $75k-$150k；其中约 $50k 归为一次性集成与 onboarding 服务，其余计入试点订阅。'
- id: A5
  name: 规模化目标毛利率
  value: '70'
  unit: pct
  source: '[BP businessModel.targetGrossMarginPct] 明确写为 70%。'
- id: A6
  name: COGS 底盘（月度基础设施）
  value: '8000'
  unit: USD/month
  source: '[Heuristic] 早期 SaaS 基础设施、合规 API 与云成本，在没有客户前约为 $8k / 月；参考 Stripe Atlas SaaS 成本基准。'
- id: A7
  name: 订阅收入对应的可变 COGS 比例
  value: '15'
  unit: pct
  source: '[Heuristic] 稳定币服务商 API 费、ERP 连接器授权、AML 工具等；企业 SaaS 的可变 COGS 通常在 10-20% 之间；参考 OpenView 2024 SaaS benchmark。'
- id: A8
  name: 实施交付成本（占实施费比例）
  value: '30'
  unit: pct
  source: '[Heuristic] 主要对应 solutions engineer 工时和外部集成成本；早期垂直 SaaS 的专业服务毛利通常在 65-75% 左右。'
- id: A9
  name: 单客户月度基础设施成本
  value: '1500'
  unit: USD/month/customer
  source: '[Heuristic] 活跃客户对应的钱包数据流、对账计算与 ERP 同步作业；按 AWS/GCP 企业集成模式估算。'
- id: A10
  name: M0 创始团队规模（2 FTE）
  value: '2'
  unit: FTE
  source: '[BP team] 创始工程师（Month 0）+ 产品与合规负责人（Month 0）。'
- id: A11
  name: 解决方案工程师在 M4 入职
  value: '1'
  unit: FTE
  source: '[BP team] startTiming 为 Month 4；目标是缩短企业实施周期。'
- id: A12
  name: 资金解决方案负责人在 M6 入职
  value: '1'
  unit: FTE
  source: '[BP team] startTiming 为 Month 6；负责围绕预注资与关账指标证明 ROI。'
- id: A13
  name: 客户经理在 M9 入职
  value: '1'
  unit: FTE
  source: '[BP team] startTiming 为 Month 9；只有试点转生产路径可复用后才加。'
- id: A14
  name: 平均全包年人力成本
  value: '175000'
  unit: USD/FTE/year
  source: '[Heuristic] 美英 fintech 创业公司薪酬通常为 $130k-$200k 基本工资 + 约 25-30% 福利与税费；参考 2024-2025 Levels.fyi fintech SaaS 区间。'
- id: A15
  name: 种子轮融资（起始现金）
  value: '3000000'
  unit: USD
  source: '[BP fundingAsk] 区间为 $2-4M；模型用中位数 $3M，以更保守地覆盖缓冲并对齐 M18 的证明点。'
- id: A16
  name: 每月非薪酬经营开销
  value: 20000-50000
  unit: USD/month
  source: '[Heuristic] SaaS overhead（工具、D&O、法务、会计、远程补贴、营销）会从 2 FTE 时约 $20k / 月，爬到 13+ FTE 时约 $50k / 月；参考 Kruze Consulting 基准。'
- id: A17
  name: 首个付费客户签约于 M5
  value: '5'
  unit: month
  source: '[BP milestones Y1] 90-180 天实验目标包含 2 个付费走廊试点；发现与原型在 M1-M4 进行。'
- id: A18
  name: 第二个客户签约于 M9
  value: '9'
  unit: month
  source: '[BP milestones Y1] 首年拿到 2 个付费试点；BP funnelTargets 假设 design partner 到 paid pilot 转化 30%+。'
- id: A19
  name: 第三个客户签约于 M12
  value: '12'
  unit: month
  source: '[BP milestones Y1] 在 0-12 个月内签下 3 家 payroll、EOR 或承包商出款方向的共创客户。'
- id: A20
  name: 第 3 年总客户目标
  value: '12'
  unit: count
  source: '[BP market.som] $3.0M 的 Y3 SOM，按 12 家客户、每家约 $250k ARR 计算。'
- id: A21
  name: 第 2 年团队扩张（5 到 10 FTE）
  value: '+5'
  unit: FTE over Y2
  source: '[Heuristic] 拿到 seed 的企业 SaaS 一般会在第 2 年把团队翻倍，以补实施能力和第二个销售资源；对应 BP 的 Y2 里程碑。'
- id: A22
  name: 第 3 年团队扩张（10 到 15 FTE）
  value: '+5'
  unit: FTE over Y3
  source: '[Heuristic] 假设公司在 Series A 前后继续扩编以支撑 12 家客户；到 Y3 末，revenue per FTE 约为 $169k，符合企业 SaaS 早期阶段。'
- id: A23
  name: 企业客户年流失率
  value: '14'
  unit: pct/year
  source: '[Heuristic] 企业 SaaS 年合同流失通常在 10-20%；参考 OpenView 2024 retention benchmark；折算月流失率约 1.2%。'
- id: A24
  name: 客户获取成本（CAC）
  value: '80000'
  unit: USD
  source: '[Heuristic] 2 个销售 FTE（每人全包成本约 $180k）合计每年拿下约 4.5 单，对应 CAC 约 $80k；约为首年 ACV 的 0.32x。'
- id: A25
  name: Y2 第三季度 headcount 阶跃上升（+2 FTE）
  value: '+2'
  unit: FTE in Q3Y2
  source: '[BP milestones Y2] 要建立 2 个渠道伙伴并加上多服务商路由，因此假设在 Q3Y2 同时补上 BD/partnership 与第二个 AE。'
