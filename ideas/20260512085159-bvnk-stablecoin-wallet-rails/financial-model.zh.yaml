  upsideCase: 把 Y2 的销售招聘提前 1 个季度到 Q2Y2
  y3RevenueImpactK: -200.0
  cashImpactK: 150.0
modelDiagram:
  title: 单位经济流转
  mermaid: "flowchart LR\n  Leads[CFO 与资金团队外呼，加上伙伴转介绍] --> Pilots[走廊受限的付费试点]\n  Pilots --> Customers[年度合同下的生产客户]\n  Customers --> ARR[每客户 250K 的 ARR]\n  ARR --> GrossProfit[70% 毛利率下的毛利润]\n  GrossProfit --> Cash[经营现金]\n  Customers --> Expansion[第二走廊与第二服务商 upsell]\n  Expansion --> ARR"
modelSanity:
- checkName: 收入引擎
  finding: 基准情景里，收入从 Y1 的 $300K 长到 Y3 的 $2.5M，驱动因素是 12 家企业客户、每家约 $250K ACV；获客方式是高触达的走廊试点，再转成年度生产合同，对应 BP 里 firstCustomer 的设定。
- checkName: 必须跑对的事
  finding: 试点转生产转化率必须高于 60%，而且平均销售周期必须压在 6 个月以内；否则按 Q4Y2 约 $82K / 月的 burn 来看，$3M seed 会在拿不到 Series A 之前被烧光。
- checkName: 模型会在哪些地方断掉
  finding: 如果 BVNK、Circle、Fireblocks 等通道厂商在第 4 或第 5 个生产 logo 之前，就把“足够好”的供应商中立控制功能打包出来，差异化叙事会塌，销售周期也会被拉长到 12 个月以上；敏感性分析显示，这会直接打掉 Y3 超过 $500K 的收入，并让 downside 情景的现金转负。
- checkName: 下一轮证明点
  finding: 只要在 M18-M24 前，让 5-6 家客户在真实走廊上拿出“预注资下降 ≥15%”或“关账时间下降 ≥30%”的记录，就足以支撑 Series A，和 BP 的 Y1 里程碑以及 fundingAsk milestone 一致。
sanityChecks:
  ruleOf40: Y3 收入增速 91%（(2530-1327)/1327）+ Y3 EBITDA 利润率 -20%（-515/2530）= 71（明显通过 Rule of 40；高速增长足以覆盖尚未盈利的 burn）
  burnMultiple: Y3 净 burn 为 $515K / Y3 新增 ARR 约 $1250K（5 个新客户 × $250K）= 0.41x（很优秀；远低于高效增长常见的 1.0x 基准）
  revenuePerFte: 到 Y3 末，revenue per FTE 约为 $169K（15 FTE）；低于典型 SaaS 的 $200-400K 区间，但对一家仍处在 pre-Series-A 扩建阶段的 15 人企业公司来说合理。
  flags:
  - 第 3 年末只有 12 家客户，意味着单一 logo 流失就会抹掉约 8% 收入；到 Y4 之前，公司都谈不上统计意义上的分散化。
  - Y1 毛利率只有 45%，因为固定基础设施 COGS 和实施交付成本太重；若想达成 70%，到 Q3Y2 前后必须让订阅收入占比升到 80%+。
  - 模型假设 $3M seed 能支撑 36 个月跑道，但真正的触发点其实是 M18-M24 的 Series A readiness；如果 M24 之后仍无法完成融资，即使账上还有钱，执行风险也会快速上升。
  - CAC 为 $80K 的前提，是 2 个销售 FTE 一年合计做成 4.5 单；如果 close rate 下滑或招聘延误，等效 CAC 会快速抬升，LTV/CAC 会从模型里的 18x 压向 10x 地板。
  - 在 downside 情景里，现金会在 Q4Y3 转负至 -$59K；如果轨迹真的朝那里滑，最晚在 Q2Y3 就得开始准备 bridge round 或主动收缩开支。
