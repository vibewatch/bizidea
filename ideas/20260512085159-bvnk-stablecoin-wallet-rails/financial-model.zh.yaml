    - 销售周期从 6 个月拉长到 12 个月，等效 CAC 从 $80k 升到 $130k（A24）
    - 没有第二走廊扩张收入；ARPU 停在 $200k 年化试点水平（A2、A3）
  base:
    description: 到第 3 年末拿下 12 家生产客户，ACV 为 $250k；试点转生产转化率 60%+；到 M12 已有 2 个服务商集成和 1 个 ERP 连接器上线。
    y3RevenueK: 2530.0
    y3EbitdaK: -515.0
    cashLowPointK: 766.0
    keyAssumptionChanges:
    - 所有假设均按模型值成立（A1-A25）
  upside:
    description: 到第 3 年末拿下 15 家客户，随着更多走廊扩张，平均 ACV 提升到 $300k；伙伴渠道在 M18 前带来 3 个合格线索。
    y3RevenueK: 3480.0
    y3EbitdaK: -180.0
    cashLowPointK: 1100.0
    keyAssumptionChanges:
    - 第 3 年末客户数升到 15 家，而不是 12 家（A20）
    - 靠第二走廊 upsell，平均 ACV 从 $250k 提升到 $300k（A2）
    - 渠道伙伴让 CAC 下降 20%，至 $64k（A24）
