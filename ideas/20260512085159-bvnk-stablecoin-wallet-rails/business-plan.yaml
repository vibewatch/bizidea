slug: stablecoin-treasury-control-plane
date: '2026-05-12'
executiveSummary: >-
  Stablecoin settlement is becoming enterprise-buyable faster than finance teams can operationalize it, creating a software gap above the wallet layer. The initial customer is a U.S.- or UK-based cross-border payroll, employer-of-record, or contractor-payout platform running $200M-$2B in annual payout volume and opening Latin America or Southeast Asia corridors that need weekend or after-hours settlement. The product starts as a provider-neutral treasury control plane that defines corridor policies, approval gates, auto-sweeps, and journal-ready reconciliation across stablecoin and fiat movements. The first proof point is not generic transaction volume; it is measurable reduction in trapped prefunding and close-time effort on one or two live corridors. The GTM motion is a direct sale to CFO, treasurer, or VP Finance triggered by a new 24/7 payout launch or a mandate to reduce idle balances without adding treasury headcount. Pricing should combine a platform subscription, implementation, and usage-based volume fee so the product gets paid when the customer expands stablecoin-settled flows. The main strategic risk is that rail vendors bundle basic controls before this company proves provider-neutral reconciliation depth and finance-owned workflows matter. The plan therefore sequences read-only reconciliation and approval-gated execution before broader automation; exact corridor mix and first-three-logo integration priorities remain open and must be resolved in design-partner diligence.
problem:
  - Finance teams at payout-heavy platforms still manage cross-border treasury with banking cutoffs, pre-funded local accounts, provider dashboards, and spreadsheet approvals.
  - Stablecoin rails can speed settlement, but controllers still lack corridor policy, approval controls, and ERP-ready reconciliation for wallet balances, conversions, fees, and onchain movements.
solution:
  - Deliver a provider-neutral control plane that whitelists eligible corridors, counterparties, ticket sizes, issuers, and approval thresholds before any stablecoin settlement is executed.
  - Sync wallet, fiat, and ledger events into journal-ready records so treasury and accounting can prove prefunding savings and close stablecoin activity without manual journal hunts.
whyWeWin:
  - The wedge targets the finance-owned control gap that rail providers do not naturally solve across multiple providers, ERP mappings, and close workflows.
  - The product can compound proprietary corridor policy data, exception-resolution history, and reconciliation logic into a sticky control graph that is hard to replace with a single provider feature.
strategicChoices:
  beachhead: U.S.- and UK-based cross-border payroll, employer-of-record, and contractor-payout platforms piloting stablecoin settlement into Latin America and Southeast Asia corridors.
  wedgeRationale: This segment feels prefunding pain, off-hours payout pressure, and month-end reconciliation friction in the same workflow, so one product can remove a visible operating bottleneck and produce CFO-legible ROI quickly.
  sequencingRationale: The company should sell reconciliation and policy control first, then add approval-gated execution, then expand to multi-provider routing because finance leaders will trust read-only auditability before they trust automated movement of funds.
  notYet:
    - Broad supplier-payments AP automation outside recurring payout workflows
    - Stablecoin card issuance or wallet infrastructure sold directly to developers
    - Custody, principal risk, or regulated money-movement functions
market:
  tam: $600M estimated TAM based on roughly 2,000 global payout, PSP, EOR, marketplace, and adjacent finance teams that could support about $300k ACV.
  sam: $52.5M estimated SAM based on about 210 U.S., UK, and EU payout-heavy platforms likely to pilot stablecoin treasury controls first at about $250k ACV.
  som: $3.0M Year-3 reachable SOM based on 12 customers at about $250k ARR after a services-heavy enterprise rollout.
  segments:
    - Cross-border payroll, employer-of-record, and contractor-payout platforms
    - Adjacent PSPs and marketplaces with recurring supplier or contractor disbursements
  buyingProcess: Finance usually starts with treasury operations and controller review, then the economic buyer approves a corridor-limited pilot once compliance, ERP impact, and prefunding ROI are clear. The sale is consultative and integration-led rather than self-serve.
product:
  mvp: >-
    MVP is a read-only plus approval-gated treasury workspace for one ERP, one internal ledger, and one to two wallet providers. It shows corridor eligibility, balance and sweep recommendations, exception queues, and journal-ready exports before any fully automated routing is enabled.
  sixMonth: Launch design-partner product with BVNK plus one secondary provider, NetSuite or equivalent ERP export, corridor policy templates, and ROI dashboards for prefunding saved and close hours reduced.
  twelveMonth: Add production-grade approval workflows, multi-provider routing recommendations, auto-sweep rules with human approval, and standardized exception handling for controllers and treasury ops.
  twentyFourMonth: Expand into a broader multi-rail treasury control plane spanning stablecoin, bank, and payout-provider settlement for payroll, contractor payouts, and adjacent supplier disbursements.
  keyBets:
    - Controllers will trust journal-ready exports before they trust autonomous fund movement.
    - A provider-neutral layer will matter enough to win against bundled controls from rails and wallet vendors.
    - Corridor-level policy templates and reconciliation logic will shorten implementation time enough to support enterprise sales efficiency.
gtm:
  wedge: Sell a corridor-limited control and reconciliation pilot to payout platforms launching weekend or off-hours stablecoin settlement and needing finance sign-off before production volume.
  channels:
    - Direct outbound to CFOs, treasurers, and heads of payments after a stablecoin pilot or corridor launch
    - Co-sell with stablecoin infrastructure providers that need a finance-control layer to unblock enterprise customers
    - Referral partnerships with ERP, TMS, and treasury-transformation consultancies
  funnelTargets: Design partner to paid pilot 30%+, paid pilot to first production corridor 60%+, first corridor to second corridor expansion 70%+ within 6 months.
  pricing: Annual platform subscription plus one-time implementation and a usage-based fee on stablecoin-settled volume; this aligns with the customer's working-capital ROI and scales as more corridors move into production.
businessModel:
  revenueStreams:
    - Annual software subscription for policy, reconciliation, and control workflows
    - Implementation and integration fees for ERP, ledger, and provider onboarding
    - Usage-based fees on stablecoin-settled volume or active controlled corridors
  unitOfValue: Controlled settlement volume across approved corridors with attached reconciliation workflows
  targetGrossMarginPct: 70
  expansionLevers:
    - Add second and third corridors within the same customer
    - Add additional providers, entities, and ERP or ledger environments
    - Expand from payroll and contractor payouts into supplier payments and broader treasury sweeps
strategyMap:
  northStarMetric: Monthly stablecoin-settled volume managed under approved policy with journal-ready reconciliation
  inputMetrics:
    - Number of production corridors live
    - Prefunding dollars reduced per customer
    - Stablecoin exceptions resolved within SLA
    - Hours removed from month-end close for stablecoin activity
    - Pilot-to-production conversion rate
  moatsToBuild:
    - Customer-specific reconciliation graph from wallet events to ERP journals
    - Corridor policy corpus covering approvals, issuers, counterparties, and sweep thresholds
    - Benchmark dataset linking routing choices to prefunding savings and exception rates
  killCriteria:
    - Fewer than 3 paid design partners after 9 months of targeted enterprise selling
    - No customer can show at least 15% prefunding reduction or at least 30% close-time reduction after a corridor pilot
    - Prospects consistently choose bundled rail-vendor controls over a neutral layer even after live reconciliation demos
  mermaid: |
    flowchart LR
      Wedge[Payroll and contractor payout corridor pilot] --> MVP[Policy and reconciliation MVP]
      MVP --> Proof[Prefunding and close-time proof points]
      Proof --> Expansion[Multi-provider and multi-corridor expansion]
investorMemo:
  verdict:
    call: Watch
    conviction: Strong customer pain and timing, but conviction is capped by bundling risk and unproven willingness to buy a standalone control layer.
    whyBelieve: Incumbents are normalizing stablecoin settlement while leaving a clear finance-owned gap in provider-neutral policy and ERP-grade reconciliation.
    whyDoubt: Rail vendors, custody platforms, or treasury suites may absorb enough of the workflow before an independent vendor proves differentiated ROI.
    nextDiligence: Confirm with design partners that a corridor-limited pilot can cut prefunding or close effort enough to justify a six-figure software budget before vendor bundling catches up.
  firstCustomer:
    title: Treasury lead at a cross-border employer-of-record or contractor-payout platform
    profile: A U.S.-based or UK-based payout platform with 50,000+ monthly payouts, weekend demand in Latin America, and an existing FX or payout-provider relationship but no in-house stablecoin treasury stack.
    trigger: The finance team launches a 24/7 payout corridor or gets a mandate to reduce trapped prefunding before approving stablecoin settlement at production scale.
    buyer: CFO, Treasurer, or VP Finance
    initialContract: $75k-$150k paid pilot for one corridor and core integrations, converting to $200k-$300k ARR after two production corridors and recurring reconciliation workflows are live.
  mustBeTrue:
    - At least one beachhead customer can prove stablecoin settlement meaningfully reduces prefunding on a live payout corridor.
    - Controllers will not approve scaled wallet-based settlement without a repeatable ERP and close workflow.
    - Provider-neutral policy and reconciliation remain valuable even when BVNK, Circle, or Fireblocks improve native controls.
    - One ERP plus one internal ledger plus two provider integrations cover most early design-partner demand.
    - Buyers will fund this from treasury digitization or control budgets rather than experimental crypto budgets.
  diligenceQuestions:
    - Which corridor and payout pattern creates the fastest visible prefunding savings in the first pilot?
    - How often do prospects already use multiple providers, making neutrality materially valuable?
    - Which ERP and internal-ledger integrations are mandatory for the first three deals?
    - What evidence shows a CFO will sign a separate software contract instead of waiting for bundled vendor features?
    - How narrow can approval-gated execution remain before customers demand regulated orchestration or custody capabilities?
operatingAssumptions:
  - assumption: Early buyers will budget the product as treasury-control software, not as a crypto experimentation tool.
    basis: research.yaml
    validationTest: Win 10 finance-buyer interviews and at least 3 paid pilots where budget owner is CFO, treasurer, or VP Finance and success criteria include prefunding or close KPIs.
    decisionImpact: If false, reposition around partner-led implementations or narrow to compliance reporting rather than a standalone enterprise platform.
  - assumption: NetSuite or equivalent ERP exports plus one internal payout ledger and two provider integrations cover the first design partners.
    basis: research.yaml
    validationTest: Build an integration-priority matrix from the first 15 prospects and confirm the top stack covers at least 70% of qualified opportunities.
    decisionImpact: If false, the roadmap shifts toward services-heavy integration or a much narrower vertical slice.
  - assumption: Weekend Latin America and Southeast Asia payout corridors create enough latency and prefunding pain to justify a six-figure pilot.
    basis: idea.yaml
    validationTest: Measure baseline cutoff delays, idle balances, and exception hours across 3 prospective customers before pricing the pilot.
    decisionImpact: If false, move the beachhead to another payout workflow where settlement timing and working-capital pain are more acute.
  - assumption: Provider-neutral reconciliation depth will stay differentiated long enough to establish a beachhead before bundling closes the gap.
    basis: research.yaml
    validationTest: In competitive pilots, win at least half of bake-offs against native provider tooling by demonstrating multi-provider auditability and faster close workflows.
    decisionImpact: If false, double down on a single-provider ecosystem partner or pivot to implementation software rather than an independent control plane.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Interview 15 treasury and controller teams at payroll, EOR, and contractor-payout platforms using current or planned stablecoin settlement.
    hypothesis: The strongest buying trigger is a new off-hours payout corridor combined with controller concern about reconciliation and policy sign-off.
    successMetric: At least 10 interviews confirm the same trigger and 5 agree to share current-state workflow maps.
    owner: CEO
  - horizon: 0–90 days
    experiment: Build a read-only reconciliation prototype using exported wallet, conversion, and ledger data from one provider and one ERP.
    hypothesis: Journal-ready exports and exception queues create immediate value before any automated execution features.
    successMetric: Two prospects rate reconciliation output as sufficient for a pilot and identify less than 10 critical missing fields.
    owner: Founding eng
  - horizon: 90–180 days
    experiment: Run two paid corridor pilots with approval-gated sweeps, policy templates, and ROI dashboards.
    hypothesis: Customers will pay for a narrow pilot if it targets one painful corridor and one clear finance metric.
    successMetric: Two paid pilots signed and at least one shows 15%+ reduction in idle prefunding or 30%+ reduction in close effort.
    owner: CEO
  - horizon: 90–180 days
    experiment: Test packaging and pricing across subscription-only versus subscription plus usage with five qualified prospects.
    hypothesis: Subscription plus usage is easier to justify because it ties price to settlement adoption and measurable savings.
    successMetric: Three of five prospects prefer the hybrid model and accept a conversion path from pilot to annual contract.
    owner: Product lead
  - horizon: 180–360 days
    experiment: Launch one co-sell motion with a stablecoin provider or treasury consultancy serving the same ICP.
    hypothesis: Partner-led distribution can reduce trust friction and shorten implementation timelines for enterprise buyers.
    successMetric: One signed referral or co-sell agreement produces at least three qualified opportunities.
    owner: CEO
  - horizon: 180–360 days
    experiment: Add a second provider and second corridor inside the strongest pilot customer.
    hypothesis: Cross-provider and multi-corridor expansion is the clearest proof that the product is more than custom implementation work.
    successMetric: One customer expands from one to two providers or two corridors within 6 months of go-live.
    owner: Founding eng
operations:
  - Maintain a daily reconciliation pipeline that maps wallet, FX, fee, and ledger events into auditable exception queues.
  - Run corridor policy reviews with finance, compliance, and security stakeholders before enabling new payout routes.
  - Use implementation partners for ERP and treasury-system change management where possible.
  - Keep regulated partners responsible for custody, conversion, and money movement while the startup owns control logic and auditability.
team:
  - role: Founding eng
    startTiming: Month 0
    rationale: Builds integrations, reconciliation engine, and approval workflows that are the technical core of the wedge.
  - role: Product and compliance lead
    startTiming: Month 0
    rationale: Translates corridor policy, audit, and no-custody constraints into a product buyers can approve.
  - role: Solutions engineer
    startTiming: Month 4
    rationale: Shortens enterprise implementation cycles and turns customer workflow variation into reusable templates.
  - role: Treasury solutions lead
    startTiming: Month 6
    rationale: Sells to finance teams with operational credibility and owns ROI proof around prefunding and close metrics.
  - role: Account executive
    startTiming: Month 9
    rationale: Added only after pilot-to-production conversion is repeatable enough to support focused enterprise selling.
milestones:
  - horizon: 0–12 months
    items:
      - Sign 3 design partners in payroll, EOR, or contractor payouts
      - Ship first ERP and internal-ledger integrations plus two provider connectors
      - Convert 2 corridor pilots into paid annual contracts
      - Publish measured case studies on prefunding reduction and close-time improvement
  - horizon: 12–24 months
    items:
      - Support multi-provider routing recommendations and approval-gated auto-sweeps
      - Expand within existing logos to second corridors or adjacent payout entities
      - Establish 2 channel partnerships with providers or treasury consultancies
      - Reach a repeatable pilot-to-production implementation playbook
  - horizon: 24–36 months
    items:
      - Extend from payout workflows into supplier payments and broader treasury sweeps
      - Add multi-rail controls spanning stablecoin and bank settlement
      - Build benchmark data products around corridor policy and prefunding optimization
      - Demonstrate category leadership as the finance-owned control layer above settlement rails
risks:
  - risk: Rail vendors and wallet platforms may bundle enough control and reporting to weaken the standalone wedge.
    likelihood: High
    impact: High
    mitigation: Differentiate on multi-provider neutrality, controller-grade reconciliation, and ERP workflow depth that native tools do not cover well.
  - risk: Buyers may stay in pilot mode too long and delay production budgets.
    likelihood: Medium
    impact: High
    mitigation: Sell narrow corridor pilots with explicit ROI metrics and a defined conversion path to production contracts.
  - risk: Integration complexity across wallets, ledgers, and ERP systems could make deployments too services-heavy.
    likelihood: Medium
    impact: High
    mitigation: Standardize the first stack, productize mapping templates, and hire solutions talent only after a repeatable implementation pattern appears.
  - risk: Regulatory or policy changes by corridor could slow approvals or narrow product scope.
    likelihood: Medium
    impact: Medium
    mitigation: Stay out of custody and money movement, ship corridor-specific policy templates, and rely on regulated partners for execution.
  - risk: The market may be real but too small for a large standalone company if expansion beyond payout workflows fails.
    likelihood: Medium
    impact: High
    mitigation: Use the beachhead only to prove a broader multi-rail treasury control platform across additional disbursement workflows.
fundingAsk:
  round: seed
  targetFundingRangeUsd: $2–4M
  runwayMonths: 18
  useOfFundsSummary: 18 months funds the first provider and ERP integrations, 3 to 5 design partners, two paid production pilots, initial compliance-conscious product leadership, and enough customer proof to test whether the wedge can outrun bundling pressure.
