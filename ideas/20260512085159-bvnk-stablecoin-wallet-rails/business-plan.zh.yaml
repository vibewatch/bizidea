slug: stablecoin-treasury-control-plane
date: '2026-05-12'
executiveSummary: 稳定币结算变成企业可采购能力的速度，已经快过财务团队把它运营起来的速度，因此钱包层之上出现了一块明确的软件缺口。首批客户应是总部位于美国或英国、每年处理 $200M-$2B 出款量的跨境 payroll、EOR 或承包商出款平台；它们正在新开拉美或东南亚走廊，需要在周末或非营业时间完成结算。产品起步形态是一套供应商中立的资金管理控制平面：定义走廊政策、审批闸口、自动归集和法币/稳定币的可直接入账对账结果。第一个证明点不该是泛泛的交易量增长，而是某一两条真实走廊上，被占住的预注资明显下降、月结工时明显减少。GTM 应该直接卖给 CFO、Treasurer 或 VP Finance，触发点是新 24/7 出款走廊上线，或“在不加人头的前提下压降闲置余额”的硬任务。定价应把平台订阅、实施费和按量收费绑在一起：客户稳定币结算流量扩得越大，这家公司赚得越多。最大的战略风险，是通道厂商在这家公司证明“供应商中立的深度对账”和“由财务主导的工作流”真的有价值之前，就先把基础控制能力打包了。因此，计划必须先做只读对账和带审批的执行，再逐步扩自动化；至于首批三家 logo 最该优先打通哪些走廊、哪些集成，仍需在共创客户尽调里补齐。
problem:
- 出款密集型平台的财务团队，今天仍要靠银行 cutoff、预注资本地账户、服务商后台和表格审批来管理跨境资金。
- 稳定币通道能加快结算，但 controller 仍缺少走廊政策、审批控制，以及面向钱包余额、兑换、费用和链上转账的 ERP 级对账能力。
solution:
- 交付一套供应商中立的控制平面：在任何稳定币结算执行之前，先对白名单走廊、交易对手、票面规模、发行方与审批阈值做约束。
- 把钱包、法币和账本事件同步成可直接入账的记录，让资金和会计团队既能证明预注资下降，也能在不四处找手工分录的前提下把稳定币活动关掉。
whyWeWin:
- 这个切口对准的是由财务拥有的控制缺口：多服务商、ERP 映射与月结流程的交叉地带，通道厂商天然补不齐。
- 产品可以把走廊政策、异常处理历史和对账逻辑持续沉淀成一张高粘性的控制图谱，单一服务商的功能项很难替代。
strategicChoices:
  beachhead: 总部位于美国或英国、正在把稳定币结算试点打进拉美和东南亚走廊的跨境 payroll、EOR 与承包商出款平台。
  wedgeRationale: 这个细分场景里，预注资痛点、非营业时间出款压力和月结摩擦都落在同一条工作流上，因此一款产品就能拆掉一个肉眼可见的运营瓶颈，也能很快拿出 CFO 看得懂的 ROI。
  sequencingRationale: 公司应该先卖对账与政策控制，再加带审批的执行，最后扩到多服务商路由。原因很简单：财务负责人会先相信只读的可审计性，之后才会相信系统能自动挪钱。
  notYet:
  - 先不做跨 recurring payout 工作流之外的广义 AP 自动化。
  - 先不做直接卖给开发者的稳定币发卡或钱包基础设施。
  - 先不碰托管、本金风险或受监管的资金移动职能。
market:
  tam: $600M estimated TAM based on roughly 2,000 global payout, PSP, EOR, marketplace, and adjacent finance teams that could support about $300k ACV.
  sam: $52.5M estimated SAM based on about 210 U.S., UK, and EU payout-heavy platforms likely to pilot stablecoin treasury controls first at about $250k ACV.
  som: $3.0M Year-3 reachable SOM based on 12 customers at about $250k ARR after a services-heavy enterprise rollout.
  segments:
  - 跨境 payroll、EOR 与承包商出款平台
  - 存在持续性供应商或承包商分账需求的相邻 PSP 与市场平台
  buyingProcess: 通常会先从资金运营团队和 controller 复核开始；当合规、ERP 影响和预注资 ROI 说清楚后，经济买方才会批准一条走廊范围受限的试点。这个销售过程是顾问式、重集成的，不是自助式购买。
product:
  mvp: MVP 是一套“只读 + 带审批”的资金工作台：先支持 1 个 ERP、1 个内部账本，以及 1-2 家钱包服务商。系统会展示走廊是否可用、余额与归集建议、异常队列，以及可直接导出的分录级结果；在完全自动路由打开前，它先把控制和可见性做好。
  sixMonth: 6 个月内交付共创客户版本：接上 BVNK 与 1 家次级服务商，支持 NetSuite 或同类 ERP 导出、走廊政策模板，以及展示预注资节省额和月结工时下降的 ROI 看板。
  twelveMonth: 12 个月内补齐生产级审批流、多服务商路由建议、带人工确认的自动归集规则，以及面向 controller 与资金运营的标准化异常处理。
  twentyFourMonth: 24 个月内扩成更广的多通道资金管理控制平面，覆盖稳定币、银行与出款服务商结算，并从 payroll / 承包商出款继续延展到相邻供应商付款场景。
  keyBets:
  - 在相信系统能自动挪钱之前，controller 会先接受“可直接生成分录的导出结果”。
  - 供应商中立这一层，足够重要，值得客户为之对抗通道和钱包厂商打包的基础控制功能。
  - 走廊级政策模板和对账逻辑，能把实施周期压短到足以支撑企业销售效率。
gtm:
  wedge: 把“控制 + 对账”的走廊受限试点卖给那些正在上线周末或非营业时间稳定币结算、且需要财务签字后才敢放量的出款平台。
  channels:
  - 在稳定币试点或新走廊上线后，直接外呼 CFO、Treasurer 与支付负责人
  - 与需要财务控制层来解锁企业客户的稳定币基础设施厂商联合销售
  - 通过 ERP、TMS 与资金数字化顾问做转介绍合作
  funnelTargets: Design partner to paid pilot 30%+, paid pilot to first production corridor 60%+, first corridor to second corridor expansion 70%+ within 6 months.
  pricing: 年度平台订阅 + 一次性实施费 + 按稳定币结算量计费；这种结构既贴住客户的营运资金 ROI，也会随着更多走廊转生产而自然放大。
businessModel:
  revenueStreams:
  - 政策、对账与控制工作流的年度软件订阅
  - ERP、账本与服务商接入的实施与集成费用
  - 按稳定币结算量或受控走廊数量计费
  unitOfValue: 在已批准走廊上、带完整对账工作流的受控结算量
  targetGrossMarginPct: 70
  expansionLevers:
  - 在同一客户内增加第二、第三条走廊
  - 增加更多服务商、实体与 ERP / 账本环境
  - 从 payroll / 承包商出款扩到供应商付款与更广的资金归集
strategyMap:
  northStarMetric: 在已批准政策下管理、且带可直接入账对账结果的月度稳定币结算量
  inputMetrics:
  - 已上线的生产走廊数量
  - 每位客户减少的预注资金额
  - 在 SLA 内处理完的稳定币异常数
  - 稳定币相关活动从月结里省掉的工时
  - 试点转生产的转化率
  moatsToBuild:
  - 从钱包事件到 ERP 分录的客户专属对账图谱
  - 覆盖审批、发行方、交易对手与归集阈值的走廊政策语料
  - 把路由选择与预注资节省、异常率关联起来的基准数据集
  killCriteria:
  - 定向企业销售 9 个月后，付费共创客户仍少于 3 家
  - 没有任何客户能在单条走廊试点后证明预注资至少下降 15%，或关账工时至少下降 30%
  - 即使看过真实对账演示，潜在客户仍持续选择通道厂商打包的基础控制功能，而不是中立控制层
  mermaid: "flowchart LR\n  Wedge[Payroll 与承包商出款走廊试点] --> MVP[政策与对账 MVP]\n  MVP --> Proof[预注资与关账效率证明点]\n  Proof --> Expansion[多服务商、多走廊扩张]"
investorMemo:
  verdict:
    call: 观察
    conviction: 客户痛点和时点都站得住，但“通道厂商打包功能”的风险太大，而独立控制层的单独购买意愿又尚未被证明，所以确信度被压住了。
    whyBelieve: 既有厂商正在把稳定币结算标准化，但把供应商中立的政策层与 ERP 级对账缺口留给了财务团队自己扛。
    whyDoubt: 通道厂商、托管平台或资金套件，可能在独立玩家拿出明确 ROI 之前，就先吃掉足够多的工作流。
    nextDiligence: 要先确认：在通道厂商把功能打包追上来之前，一条走廊范围受限的试点，是否真能把预注资或月结工时降到足以支撑六位数软件预算。
  firstCustomer:
    title: 跨境 EOR 或承包商出款平台里的资金负责人
    profile: 一家总部在美国或英国、每月 5 万+ 笔出款、拉美周末需求明显、已接入外汇或出款服务商、但内部没有稳定币资金栈的平台。
    trigger: 财务团队要上线 24/7 出款走廊，或在批准稳定币结算进入生产规模前，被要求先把沉淀的预注资压下来。
    buyer: CFO, Treasurer, or VP Finance
    initialContract: 先签一笔 $75k-$150k 的付费试点，覆盖 1 条走廊和核心集成；等 2 条生产走廊和持续性对账工作流跑起来后，再转成 $200k-$300k ARR。
  mustBeTrue:
  - 至少有 1 个滩头客户能证明，稳定币结算在真实出款走廊上确实能显著降低预注资。
  - 如果没有可复用的 ERP 与关账工作流，controller 不会批准钱包式结算放量。
  - 即便 BVNK、Circle 或 Fireblocks 持续增强原生控制功能，供应商中立的政策层与对账层仍然有价值。
  - 1 个 ERP + 1 个内部账本 + 2 家服务商集成，足以覆盖大部分早期共创客户需求。
  - 买方会把预算归到资金数字化或控制预算，而不是“试验性加密预算”。
  diligenceQuestions:
  - 首个试点里，哪条走廊和哪种出款模式最容易最快做出可见的预注资节省？
  - 潜在客户今天到底多频繁地同时使用多家服务商，从而让“中立”真正值钱？
  - 前三单里，哪些 ERP 与内部账本集成是绝对不能缺的？
  - 有什么证据能证明 CFO 会单独签一份软件合同，而不是继续等厂商把功能打包进来？
  - 在客户开始要求受监管编排或托管能力之前，带审批的执行到底可以切得多窄？
operatingAssumptions:
- assumption: 早期买方会把这款产品按“资金控制软件”来预算，而不是把它当加密试验工具。
  basis: research.yaml
  validationTest: 拿下 10 次财务买方访谈，以及至少 3 个付费试点；预算 owner 必须是 CFO、Treasurer 或 VP Finance，且成功标准里包含预注资或关账 KPI。
  decisionImpact: 如果不成立，就转向伙伴主导实施，或收窄成合规报表工具，而不是独立企业平台。
- assumption: NetSuite 或同类 ERP 导出 + 1 个内部出款账本 + 2 家服务商集成，足以覆盖首批共创客户。
  basis: research.yaml
  validationTest: 从前 15 个潜在客户中拉一张集成优先级矩阵，确认头部技术栈能覆盖至少 70% 的合格机会。
  decisionImpact: 如果不成立，路线图就要转向更重服务化的集成，或只切更窄的垂直切片。
- assumption: 拉美和东南亚的周末出款走廊，具有足够强的时效与预注资痛感，能撑起六位数试点。
  basis: idea.yaml
  validationTest: 在给试点报价前，先量出 3 家潜在客户的 cutoff 延迟、闲置余额与异常处理工时基线。
  decisionImpact: 如果不成立，就把滩头改到另一个结算时效与营运资金痛感更强的出款工作流。
- assumption: 在打包功能追上来之前，供应商中立的深度对账能力会保持足够久的差异化。
  basis: research.yaml
  validationTest: 在竞争性试点里，至少赢下一半与原生服务商工具的比拼，证明多服务商可审计性与更快关账流程真的更强。
  decisionImpact: 如果不成立，就该押注单一生态伙伴，或转成实施软件，而不是独立控制平面。
experimentRoadmap:
- horizon: 0–90 天
  experiment: 访谈 15 个正在使用或计划上线稳定币结算的 payroll、EOR 与承包商出款平台里的资金与 controller 团队。
  hypothesis: 最强购买触发点，是一条新开的非营业时间出款走廊，再叠加 controller 对对账和政策签字的担忧。
  successMetric: 至少 10 次访谈确认同一个触发点，且有 5 家愿意分享现状工作流图。
  owner: CEO
- horizon: 0–90 天
  experiment: 用 1 家服务商和 1 个 ERP 导出的钱包、兑换与账本数据，搭一个只读对账原型。
  hypothesis: 在任何自动执行功能上线之前，可直接生成分录的导出结果与异常队列，就能创造立刻可见的价值。
  successMetric: 2 个潜在客户认为对账输出已足够支撑试点，且指出的关键缺失字段少于 10 个。
  owner: Founding eng
- horizon: 90–180 天
  experiment: 围绕带审批的归集、政策模板和 ROI 看板，跑 2 个付费走廊试点。
  hypothesis: 如果试点只瞄准 1 条最痛的走廊和 1 个清晰的财务指标，客户愿意为这个窄切口付钱。
  successMetric: 签下 2 个付费试点，且至少 1 个证明闲置预注资下降 15%+，或关账工时下降 30%+。
  owner: CEO
- horizon: 90–180 天
  experiment: 和 5 个合格潜在客户测试“纯订阅”与“订阅 + 按量”两种打包与定价方案。
  hypothesis: “订阅 + 按量”更容易被接受，因为价格会跟稳定币采用度和可量化的节省绑定。
  successMetric: 5 家里有 3 家更偏好混合模式，并接受从试点转年约的路径。
  owner: Product lead
- horizon: 180–360 天
  experiment: 与服务同一 ICP 的稳定币服务商或资金顾问，启动 1 个联合销售动作。
  hypothesis: 伙伴带来的分发能降低信任摩擦，并缩短企业客户的实施周期。
  successMetric: 签下 1 个 referral 或联合销售协议，并带来至少 3 个合格商机。
  owner: CEO
- horizon: 180–360 天
  experiment: 在最强的试点客户里接入第 2 家服务商和第 2 条走廊。
  hypothesis: 跨服务商、多走廊扩张，是证明这家公司不只是定制化实施项目的最清晰证据。
  successMetric: 1 家客户在 go-live 后 6 个月内，从 1 家服务商或 1 条走廊扩到 2 家服务商或 2 条走廊。
  owner: Founding eng
operations:
- 维护一条日更的对账流水线，把钱包、FX、费用与账本事件映射进可审计的异常队列。
- 在启用新出款路线前，先和财务、合规与安全相关方做走廊政策评审。
- 只要条件允许，就让实施伙伴承担 ERP 与资金系统的变更管理。
- 把托管、兑换与资金移动责任留给受监管伙伴，创业公司自己只掌握控制逻辑与可审计性。
team:
- role: 创始工程师
  startTiming: Month 0
  rationale: 负责搭建集成、对账引擎和审批工作流，这是整个切口的技术核心。
- role: 产品与合规负责人
  startTiming: Month 0
  rationale: 把走廊政策、审计要求和“不碰托管”的边界翻成买方敢批的产品。
- role: 解决方案工程师
  startTiming: Month 4
  rationale: 缩短企业实施周期，并把客户间的工作流差异沉淀成可复用模板。
- role: 资金解决方案负责人
  startTiming: Month 6
  rationale: 带着真实资金运营经验卖给财务团队，并负责把预注资与关账指标的 ROI 讲透。
- role: 客户经理
  startTiming: Month 9
  rationale: 只有当试点转生产的路径足够可复用时，才值得补上专职企业销售。
milestones:
- horizon: 0–12 个月
  items:
  - 签下 3 家 payroll、EOR 或承包商出款方向的共创客户
  - 交付首个 ERP 与内部账本集成，再加 2 个服务商连接器
  - 把 2 个走廊试点转成付费年约
  - 发布真实测得的案例：预注资下降、关账时间改善
- horizon: 12–24 个月
  items:
  - 支持多服务商路由建议和带审批的自动归集
  - 在现有 logo 内扩到第 2 条走廊或相邻出款实体
  - 建立 2 个服务商或资金顾问渠道伙伴
  - 形成一套可复用的“试点转生产”实施手册
- horizon: 24–36 个月
  items:
  - 从出款工作流扩到供应商付款与更广的资金归集
  - 补上跨稳定币与银行结算的多通道控制
  - 围绕走廊政策与预注资优化，做出基准数据产品
  - 把自己坐实成结算通道之上的“财务拥有的控制层”
risks:
- risk: 通道厂商与钱包平台可能会打包足够多的控制与报表能力，从而削弱独立切口。
  likelihood: High
  impact: High
  mitigation: 在多服务商中立性、controller 级对账，以及 ERP 工作流深度上持续拉开差距，这些点原生工具很难补全。
- risk: 买方可能长期停留在试点阶段，迟迟不给生产预算。
  likelihood: Medium
  impact: High
  mitigation: 只卖窄走廊试点，明确 ROI 指标，并在合同里写清从试点转生产的路径。
- risk: 钱包、账本与 ERP 之间的集成复杂度，可能会让部署过于服务化。
  likelihood: Medium
  impact: High
  mitigation: 先把第一套技术栈标准化，把映射模板产品化；只有看到可复用实施模式后再加解决方案团队。
