openQuestions:
- Which ERP or close-system integrations (for example NetSuite versus SAP) are mandatory for the first three design partners?
- Will CFOs pay for a neutral control layer before their chosen rail vendor bundles a “good enough” approval and reporting package?
- Which corridors generate enough weekend or off-hours payout volume to make stablecoin routing ROI obvious in the first 90 days?
- How much treasury policy logic can sit inside software before customers or regulators view it as regulated payment orchestration rather than control software?
