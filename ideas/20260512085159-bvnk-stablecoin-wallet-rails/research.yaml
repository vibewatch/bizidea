competitors:
- name: BVNK
  stage: scale-up
  wedge: Enterprise stablecoin payments, wallets, fiat/stablecoin conversion, and embedded licensing/custody for businesses.
  pricing: Custom enterprise pricing; licensing/custody can be bundled so customers avoid handling crypto directly.
  strength: Strong enterprise positioning, live Corpay rollout, broad country support, and clear focus on operationalizing stablecoin payments.
  weaknessVsUs: Best positioned when the customer standardizes on BVNK; less naturally neutral as a cross-provider policy, routing, and close layer.
  sourceRefs:
  - 1
  - 27
  - 29
- name: Bridge / Stripe
  stage: scale-up
  wedge: Developer-first stablecoin orchestration plus card issuance, wallets, and payouts distributed through Stripe.
  pricing: Enterprise pricing; card programs emphasize transparent economics and allowing the customer to keep interchange.
  strength: Stripe distribution, strong implementation experience, and a broad product surface across cards, wallets, and stablecoin movement.
  weaknessVsUs: Roadmap centers on payment issuance and developer workflows more than controller-led reconciliation and provider-neutral treasury policy.
  sourceRefs:
  - 12
  - 13
  - 14
  - 15
  - 16
- name: Circle
  stage: incumbent
  wedge: Compliance-first stablecoin network and managed settlement product that abstracts digital asset handling for institutions.
  pricing: Custom network and managed-service pricing.
  strength: Control of USDC/EURC ecosystem, bank design partners, and a clear pitch around prefunding reduction and 24/7 settlement.
  weaknessVsUs: Network-centric and tied to Circle's operating model, which leaves room for a neutral control plane spanning multiple rails and issuers.
  sourceRefs:
  - 17
  - 18
  - 19
- name: Fireblocks
  stage: scale-up
  wedge: Wallet security, network connectivity, payment orchestration, and treasury automation for institutional stablecoin operations.
  pricing: Custom enterprise pricing.
  strength: Deep enterprise trust in custody, policy, compliance, and partner connectivity; especially strong for treasury/security buyers.
  weaknessVsUs: Still infrastructure-heavy for finance teams; customers may need to build their own ERP mappings, approval logic, and close workflows.
  sourceRefs:
  - 20
  - 21
  - 22
  - 23
- name: zerohash
  stage: scale-up
  wedge: Regulated stablecoin funding, settlement, and payouts with production-ready APIs for fintech and payroll use cases.
  pricing: Custom enterprise pricing.
  strength: Strong regulated posture and visible customer demand from Remote, Gusto, and other platforms that need fast global payouts.
  weaknessVsUs: Closer to a payout rail and regulated API stack than a full finance-control plane that governs policy, sweeps, and reconciliation across providers.
  sourceRefs:
  - 25
  - 26
  - 29
