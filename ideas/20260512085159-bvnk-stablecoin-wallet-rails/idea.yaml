differentiator: >-
  This is not another stablecoin wallet, custody product, or cross-border API. Wallet providers sell access to the rail,
  but they do not own the finance team's corridor policy, approval workflow, reconciliation rules, or ERP posting
  logic across fiat and stablecoin balances. That control graph compounds with each deployment and makes the product
  sticky even if settlement itself becomes a commodity feature inside larger payment platforms.
