problem: >-
  Cross-border payroll and payout platforms still manage treasury around banking cutoffs, pre-funded local accounts,
  and spreadsheet-heavy FX operations. Stablecoin wallets promise faster, always-on settlement, but finance teams lack
  policy controls for when to hold, convert, or route stablecoins and how to reconcile those moves into ERP, close, and
  audit workflows. As incumbents like Corpay expose the rail to mainstream customers, the blocker shifts from rail
  access to operational control.
targetUser:
  primary: Treasury operations leads at cross-border payroll, employer-of-record, and contractor-payout platforms
  secondary: Controllers and heads of payments engineering at those same platforms
  buyer: CFO, Treasurer, or VP Finance
startupThesis:
  nonObviousInsight: >-
    Stablecoin infrastructure is not the missing piece anymore. Once incumbent treasury networks add wallets, the new
    bottleneck is the control layer that tells a finance team when stablecoin settlement should be used, how exposure is
    swept back into fiat, and how every movement is made legible to auditors and ERP workflows.
  beachhead: >-
    Treasury teams at U.S.- and UK-based cross-border payroll and employer-of-record platforms processing $200M-$2B in
    annual contractor payouts and piloting stablecoin settlement into Latin America and Southeast Asia corridors
  wedge: >-
    A policy-controlled stablecoin treasury router that approves eligible corridors, auto-sweeps balances, orchestrates
    fiat-stablecoin conversion, and produces journal-ready reconciliation for each wallet movement
  whyNowCatalyst: >-
    Corpay pushing stablecoin wallets to 800,000-plus clients, using the rail in its own treasury stack, and citing new
    regulatory tailwinds makes control-grade stablecoin operations software newly urgent and newly budgetable.
  ventureScalePath: >-
    Start with contractor and payroll payouts, then expand into supplier payments, marketplace disbursements, internal
    treasury sweeps, and eventually a multi-rail control plane across stablecoin, bank, and card settlement for global
    finance teams.
solution: >-
  Build a treasury control plane that sits between ERP, treasury workstations, provider wallets, and the internal payout
  ledger. The product lets finance teams define which corridors, counterparties, times, and ticket sizes can use
  stablecoin settlement, then executes or recommends routing with human approval gates. It auto-reconciles wallet
  balances, conversions, fees, and on-chain movements into journal-ready records, while tracking prefunding saved,
  payout speed, and exception queues. Over time, the platform becomes a multi-provider routing layer that can compare
  stablecoin against local-bank and correspondent-bank options instead of locking the customer into one rail.
goToMarketSeed:
  firstCustomer: >-
    A U.S.-based employer-of-record or contractor-payments platform with 50,000-plus monthly payouts, weekend payout
    demand in Latin America, and an existing Corpay or similar FX relationship but no internal stablecoin treasury team
  buyingTrigger: >-
    The CFO launches a 24/7 payout corridor, pushes treasury to reduce trapped prefunding, or needs a month-end control
    process before approving stablecoin settlement at production volume
  currentAlternative: >-
    Manual treasury operations across provider dashboards, spreadsheets, ERP journals, internal ledger scripts, and ad
    hoc finance reviews layered on top of banks or stablecoin APIs
  switchingReason: >-
    Corpay and BVNK provide the rail, but this product gives the finance team the policy engine, reconciliation layer,
    and audit trail that let it adopt stablecoin settlement without building a custom treasury stack
  pricingHypothesis: >-
    Annual platform subscription plus usage-based pricing on monthly stablecoin-settled volume, with onboarding fees for
    ERP and ledger integrations
