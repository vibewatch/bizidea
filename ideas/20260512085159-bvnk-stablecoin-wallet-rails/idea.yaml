jobsToBeDone:
  - job: When we launch a new always-on payout corridor, help our treasury team decide when stablecoin settlement is safe and economical, so we can reduce cutoff delays without breaking controls.
    currentAlternative: Provider dashboard checks plus spreadsheet-based treasury approvals and manual wallet sweeps
    successMetric: Reduction in prefunded cash per corridor and payout turnaround time outside banking hours
  - job: When month-end close arrives, help finance reconcile stablecoin balances and conversions into the ERP, so controllers can sign off without manual journal hunts.
    currentAlternative: Manual exports from wallets and payment platforms combined with spreadsheet journals and exception reviews
    successMetric: Hours to close stablecoin-related accounts and number of unreconciled treasury exceptions
ideaScorecard:
  signalStrength:
    score: 4
    rationale: Multiple same-day sources confirm a live incumbent rollout with concrete product capabilities, scale data, and treasury-use claims.
  painIntensity:
    score: 4
    rationale: Prefunded cash, delayed payouts, and close-process complexity create meaningful but operationally concentrated pain for treasury teams.
  wedgeClarity:
    score: 5
    rationale: A control and reconciliation layer for payout platforms adopting stablecoin settlement is a narrow, legible first workflow rather than a generic crypto platform.
  defensibility:
    score: 4
    rationale: Corridor policies, ERP mappings, reconciliation logic, and approval histories form sticky workflow data that incumbents do not naturally capture across systems.
  ventureScale:
    score: 5
    rationale: The initial beachhead is specific, but the control-plane model can expand across global payouts, AP, marketplaces, and broader multi-rail treasury orchestration.
topRisks:
  - name: Regulatory perimeter drift
    description: Stablecoin rules can change by corridor or product scope, which could make customers hesitant to operationalize the workflow broadly.
    mitigation: Start as approval-gated treasury software on top of regulated partners, ship corridor-level policy templates, and avoid taking custody or principal risk at launch.
  - name: Incumbent feature bundling
    description: Corpay, BVNK, or other treasury platforms could add basic controls and reporting once stablecoin settlement volume grows.
    mitigation: Win on cross-system reconciliation, multi-provider routing, and ERP-grade control workflows that are harder for a single rail provider to generalize.
  - name: Integration credibility gap
    description: Controllers will not trust the system if wallet, ledger, and ERP data do not reconcile cleanly across edge cases.
    mitigation: Begin with read-only analytics and approval-gated execution, prove close-time and prefunding ROI on a small corridor set, and expand only after exception rates fall.
