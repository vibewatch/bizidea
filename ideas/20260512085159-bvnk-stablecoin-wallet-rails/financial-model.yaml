    name: Per-customer monthly infrastructure cost
    value: "1500"
    unit: USD/month/customer
    source: "[Heuristic] Wallet-provider data feeds, reconciliation pipeline compute, ERP sync jobs per active customer; estimated from AWS/GCP enterprise integration patterns."
