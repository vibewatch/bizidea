    name: Solutions engineer joins M4
    value: "1"
    unit: FTE
    source: "[BP team] startTiming Month 4; shortens enterprise implementation cycles."
  - id: A12
    name: Treasury solutions lead joins M6
    value: "1"
    unit: FTE
    source: "[BP team] startTiming Month 6; owns ROI proof around prefunding and close metrics."
  - id: A13
    name: Account executive joins M9
    value: "1"
    unit: FTE
    source: "[BP team] startTiming Month 9; added after pilot-to-production conversion is repeatable."
  - id: A14
    name: Average fully-loaded annual headcount cost
    value: "175000"
    unit: USD/FTE/year
    source: "[Heuristic] US/UK fintech startup salary $130-200k base + ~25-30% benefits and payroll taxes; Levels.fyi fintech SaaS ranges 2024-2025."
  - id: A15
    name: Seed raise (starting cash)
    value: "3000000"
    unit: USD
    source: "[BP fundingAsk] $2-4M range; model uses $3M (midpoint) to provide conservative buffer and align with 12-month proof-point milestone at M18."
  - id: A16
    name: Non-salary operating overhead per month
    value: "20000-50000"
    unit: USD/month
    source: "[Heuristic] SaaS overhead (tools, D&O insurance, legal, accounting, remote stipends, marketing) scales from ~$20k/mo at 2 FTEs to ~$50k/mo at 13+ FTEs; Kruze Consulting startup cost benchmarks."
  - id: A17
    name: First paid customer signed M5
    value: "5"
    unit: month
    source: "[BP milestones Y1] 90-180 day experiment target: two paid corridor pilots; discovery and prototype run M1-M4 per experimentRoadmap."
  - id: A18
    name: Second customer signed M9
    value: "9"
    unit: month
    source: "[BP milestones Y1] 2 paid pilots within first 12 months; BP funnelTargets: design-partner to paid-pilot 30%+ conversion."
  - id: A19
    name: Third customer signed M12
    value: "12"
    unit: month
    source: "[BP milestones Y1] Sign 3 design partners in payroll, EOR, or contractor payouts within 0-12 months."
  - id: A20
    name: Y3 total customers target
    value: "12"
    unit: count
    source: "[BP market.som] $3.0M Y3 SOM based on 12 customers at ~$250k ARR."
  - id: A21
    name: Y2 headcount scale-up (5 to 10 FTEs)
    value: "+5"
    unit: FTE over Y2
    source: "[Heuristic] Seed-funded enterprise SaaS doubles headcount in Y2 to add implementation capacity and second sales resource; BP milestones Y2: repeatable implementation playbook."
  - id: A22
    name: Y3 headcount scale-up (10 to 15 FTEs)
    value: "+5"
    unit: FTE over Y3
    source: "[Heuristic] Post-Series-A growth supporting 12-customer base; revenue-per-FTE at Y3 end ~$169k (stage-appropriate for enterprise SaaS pre-Series B)."
  - id: A23
    name: Annual customer churn rate (enterprise)
    value: "14"
    unit: pct/year
    source: "[Heuristic] Enterprise SaaS annual contract churn 10-20%; OpenView 2024 SaaS retention benchmarks; monthly equivalent 1.2%."
  - id: A24
    name: Customer acquisition cost (CAC)
    value: "80000"
    unit: USD
    source: "[Heuristic] 2 sales FTEs (~$180k FL avg each) closing ~4.5 deals/year combined = $80k CAC; enterprise SaaS CAC typically 0.25-0.5x first-year ACV; aligns with 0.32x here."
  - id: A25
    name: Y2 sharp headcount step-change Q3Y2 (+2 FTEs)
    value: "+2"
    unit: FTE in Q3Y2
    source: "[BP milestones Y2] Establish 2 channel partnerships and add multi-provider routing; requires BD/partnerships hire and second AE simultaneously in Q3Y2."

