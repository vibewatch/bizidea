scenarios:
  downside:
    description: "Rail-vendor bundling accelerates and CFOs stay in pilot mode; only 7 production customers by EOY3, 50% longer sales cycles, no expansion ARR."
    y3RevenueK: 1380.0
    y3EbitdaK: -1340.0
    cashLowPointK: -59.0
    keyAssumptionChanges:
      - "Customer count at EOY3 drops from 12 to 7 (A20)"
      - "Sales cycle extends from 6 to 12 months, raising effective CAC from $80k to $130k (A24)"
      - "No second-corridor expansion revenue; ARPU stays at $200k annualised pilot rate (A2, A3)"
  base:
    description: "12 production customers by EOY3 at $250k ACV; pilot-to-production conversion 60%+; two provider integrations and one ERP connector live by M12."
    y3RevenueK: 2530.0
    y3EbitdaK: -515.0
    cashLowPointK: 766.0
    keyAssumptionChanges:
      - "All assumptions held at modelled values (A1-A25)"
  upside:
    description: "15 customers by EOY3, expanded-corridor upsell lifts average ACV to $300k, partnership channel delivers 3 qualified leads by M18."
    y3RevenueK: 3480.0
    y3EbitdaK: -180.0
    cashLowPointK: 1100.0
    keyAssumptionChanges:
      - "Customers reach 15 by EOY3 vs 12 base (A20)"
      - "Average ACV rises to $300k from $250k via second-corridor upsell (A2)"
      - "Channel partnerships reduce CAC by 20% to $64k (A24)"

