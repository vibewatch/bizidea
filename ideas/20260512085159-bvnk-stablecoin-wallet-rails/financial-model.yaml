    value: "8000"
    unit: USD/month
    source: "[Heuristic] Early-stage SaaS infra, compliance APIs, cloud costs ~$8k/month before any customers; source: Stripe Atlas SaaS cost benchmarks."
  - id: A7
    name: Variable COGS rate on subscription revenue
    value: "15"
    unit: pct
    source: "[Heuristic] Stablecoin-provider API fees, ERP connector licensing, AML tooling; enterprise SaaS variable COGS typically 10-20%; source: OpenView 2024 SaaS benchmarks."
  - id: A8
    name: Implementation delivery cost (% of impl fee)
    value: "30"
    unit: pct
    source: "[Heuristic] Solutions-engineer time and contractor integrations; standard professional-services margin 65-75% for vertical SaaS at early stage."
