modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Leads[CFO and treasury outbound plus partner referrals] --> Pilots[Corridor-limited paid pilots]
      Pilots --> Customers[Production customers on annual contracts]
      Customers --> ARR[ARR at 250K per customer]
      ARR --> GrossProfit[Gross profit at 70 pct GM]
      GrossProfit --> Cash[Operating cash]
      Customers --> Expansion[Second corridor and provider upsell]
      Expansion --> ARR

modelSanity:
  - checkName: Revenue engine
    finding: "Base-case revenue grows from $300K in Y1 to $2.5M in Y3 driven by 12 enterprise customers at ~$250K ACV each, acquired through high-touch corridor pilots that convert to annual production contracts per the BP investorMemo firstCustomer model."
  - checkName: Must go right
    finding: "Pilot-to-production conversion must exceed 60% and average sales cycle must stay at or below 6 months, or monthly burn at Q4Y2 rates (~$82K/mo) will exhaust the $3M seed before a Series A can be raised."
  - checkName: Model breaks if
    finding: "Rail vendors (BVNK, Circle, Fireblocks) bundle sufficient provider-neutral controls before the 4th or 5th production logo, collapsing the differentiation thesis and extending sales cycles past 12 months, which the sensitivity analysis shows removes $500K+ of Y3 revenue and pushes the downside case cash position negative."
  - checkName: Next-round proof
    finding: "Series A is justified when 5-6 customers document ≥15% prefunding reduction or ≥30% close-time savings on live corridors by M18-M24, as specified in BP milestones Y1 and the fundingAsk milestone above."

sanityChecks:
  ruleOf40: "Y3 revenue growth 91% ((2530-1327)/1327) + Y3 EBITDA margin -20% (-515/2530) = 71 (Rule of 40 passes comfortably; hypergrowth offsets pre-profitability burn)"
  burnMultiple: "Y3 net burn $515K / net new ARR added in Y3 ~$1250K (5 new customers x $250K) = 0.41x (excellent; below 1.0x benchmark for efficient growth)"
  revenuePerFte: "$169K/FTE at EOY3 (15 FTEs; below the $200-400K SaaS benchmark but stage-appropriate for a 15-person enterprise build still in pre-Series-A growth)"
  flags:
    - "Very low customer count (12 by EOY3) means single-logo churn removes ~8% of revenue and re-opens cash risk; no statistical diversification until Y4+."
    - "Y1 gross margin is only 45% because fixed infra COGS and implementation delivery costs dominate; 70% target requires subscription revenue to represent 80%+ of mix by Q3Y2."
    - "Model assumes $3M seed provides 36 months of runway, but Series A readiness is the actual M18-24 trigger; any delay beyond M24 in closing Series A increases execution risk even if cash remains available."
    - "CAC of $80K assumes 4.5 deals/year across 2 sales FTEs; if close rate falls or headcount slips, effective CAC rises rapidly and LTV/CAC compresses from the modelled 18x toward the 10x floor."
    - "Downside case cash turns negative in Q4Y3 (-$59K); a bridge round or expense reduction would be required six months earlier (Q2Y3) if the downside trajectory materialises."
