problem: 跨境 payroll 和出款平台今天仍围着银行 cutoff、预注资本地账户以及重度依赖表格的外汇操作来做资金管理。稳定币钱包承诺的是更快、全天候的结算；但财务团队依旧缺少一层政策控制：哪些场景该持有稳定币、哪些该兑换回法币、哪些该走这条通道，以及这些动作怎样对进 ERP、月结和审计流程。随着 Corpay 这类既有厂商把稳定币通道暴露给主流客户，真正的堵点已经从“能不能接入通道”转向“能不能把它管起来”。
targetUser:
  primary: 跨境 payroll、EOR 与承包商出款平台里的资金运营负责人
  secondary: 同类平台里的财务控制负责人，以及支付工程负责人
  buyer: CFO、Treasurer 或 VP Finance
startupThesis:
  nonObviousInsight: 缺的已经不是稳定币基础设施了。一旦既有资金网络把钱包接进来，新的瓶颈就变成控制层：它决定财务团队何时该用稳定币结算、敞口何时扫回法币，以及每一笔资金移动怎样才能让审计和 ERP 工作流看得明白。
  beachhead: 总部在美国或英国、每年处理 $200M-$2B 承包商出款，并正试点把稳定币结算打进拉美和东南亚走廊的跨境 payroll 与 EOR 平台资金团队
  wedge: 一套路由受政策约束的稳定币资金管理路由器：先审批可用走廊，再自动归集余额、编排法币与稳定币的兑换，并为每一笔钱包资金移动生成可直接入账的对账结果
  whyNowCatalyst: Corpay 把稳定币钱包推向 80 万+ 客户、自己也在资金栈里使用这条通道，同时监管顺风开始成形，这让“控制级”的稳定币运营软件第一次同时具备了紧迫性和预算合理性。
  ventureScalePath: 先从承包商与 payroll 出款切入，再扩到供应商付款、平台分账、内部资金归集，最后做成一套覆盖稳定币、银行与卡结算的多通道控制平面，服务全球财务团队。
solution: 产品夹在 ERP、资金工作台、服务商钱包和内部出款账本之间。财务团队先定义哪些走廊、交易对手、时间窗口和票面规模可以走稳定币结算，再由系统在人工审批闸口下执行或给出路由建议。平台会自动把钱包余额、兑换、费用和链上转账对成可直接入账的记录，同时跟踪省下多少预注资、出款提速多少，以及异常队列堆在哪里。时间越久，这套系统越像一层多服务商路由：它能把稳定币、当地银行和代理银行方案摆在一起比较，而不是把客户锁死在单一通道上。
goToMarketSeed:
  firstCustomer: 一家总部在美国、拥有每月 5 万+ 笔出款、在拉美存在周末出款需求，并已与 Corpay 或类似外汇服务商合作、但内部没有稳定币资金团队的 EOR 或承包商付款平台
  buyingTrigger: CFO 要上线一条 24/7 出款走廊、要求资金团队压降沉淀的预注资，或在放量使用稳定币结算前，先把月结控制流程补齐
  currentAlternative: 在服务商后台、电子表格、ERP 分录、内部账本脚本与临时财务复核之间手工串起资金运营，再叠在银行或稳定币 API 之上
  switchingReason: Corpay 与 BVNK 提供的是通道；这款产品补上的是财务团队真正缺的政策引擎、对账层和审计留痕，让他们不用自建一整套资金系统，也敢把稳定币结算跑到生产环境。
  pricingHypothesis: 按年收平台订阅费，再按月度稳定币结算量抽使用费；ERP 与账本集成另收上线实施费。
