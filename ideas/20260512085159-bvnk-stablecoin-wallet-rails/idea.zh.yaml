jobsToBeDone:
- job: 当我们上线一条新的全天候出款走廊时，帮资金团队判断稳定币结算何时既安全又划算，这样我们才能减少 cutoff 延迟，又不把控制打穿。
  currentAlternative: 在服务商后台里人工检查，再靠表格做资金审批和手工钱包归集
  successMetric: 每条走廊的预注资金额下降，以及银行营业时间外的出款周转时间缩短
- job: 当月结到来时，帮财务团队把稳定币余额和兑换结果对进 ERP，这样 controller 才能签字，而不用四处找手工分录。
  currentAlternative: 从钱包和支付平台手工导数，再配合表格分录与异常复核
  successMetric: 稳定币相关科目完成关账所需工时，以及未对平的资金异常数量
ideaScorecard:
  signalStrength:
    score: 4
    rationale: 多家同日来源确认了既有厂商的真实 rollout，且给出了具体功能、规模数据与资金使用场景。
  painIntensity:
    score: 4
    rationale: 预注资、延迟出款与关账复杂度，对资金团队来说都是明确痛点，只是痛点高度集中在运营层。
  wedgeClarity:
    score: 5
    rationale: 面向采用稳定币结算的出款平台，做一层控制与对账软件，这是一个窄而清晰的首个工作流，不是泛泛的加密平台。
  defensibility:
    score: 4
    rationale: 走廊政策、ERP 映射、对账逻辑和审批历史会沉淀成高粘性的工作流数据，而既有厂商天然抓不全这些跨系统信息。
  ventureScale:
    score: 5
    rationale: 起步滩头很具体，但控制平面模型可以继续扩到全球出款、AP、市场平台与更广的多通道资金编排。
topRisks:
- name: 监管边界漂移
  description: 稳定币规则可能会按走廊或产品范围变化，这会让客户更谨慎，不愿大范围把这套工作流跑起来。
  mitigation: 起步时只做叠在受监管伙伴之上的审批式资金软件，先发走廊级政策模板，并避免在 launch 阶段承担托管或本金风险。
- name: 既有厂商打包功能
  description: 随着稳定币结算量增长，Corpay、BVNK 或其他资金平台可能会补上基础控制与报表能力。
  mitigation: 在跨系统对账、多服务商路由以及 ERP 级控制工作流上赢下来，这些能力比单一通道服务商更难泛化。
- name: 集成可信度缺口
  description: 如果钱包、账本与 ERP 数据在边角场景下对不平，controller 就不会信任这套系统。
  mitigation: 先从只读分析和带审批的执行开始，在少量走廊上证明月结工时与预注资 ROI，只有当异常率下来之后再扩大范围。
