slug: drone-oem-procurement-passport
date: '2026-05-05'
executiveSummary: >-
  这家公司最该切入的，不是做一个更大的市场平台，而是先成为供应商侧的采购通行证系统，服务那些员工规模不到 200 人、正准备从单一本土国防部扩展出去的欧洲 ISR 与 FPV 无人机 OEM。眼前最痛的，不是谁能发现谁，而是每冒出一个新买方，团队都得反复拉着工程师去拼国防部专属技术附件、安全文件和互操作证明。Intelic 推出 BASE 是个很好的验证信号，因为它说明采购流程正在变成软件化比较；但真正空着的位置，依然是压在这套流程底下的供应商证据层。第一款产品因此应该盯紧可复用产品通行证、按买方生成招标包，以及适用于小范围重复国防部走廊的可审计互操作证据，而不是一上来就去做广义市场平台或通用提案软件。GTM 也得由创始人亲自打单，并且围绕真实招标配服务式落地，因为研究清楚表明，早期采用最大的拦路虎就是信任、部署形态和过于定制化的附件。最硬的验证信号，是拿下第一个客户后，能把材料准备时间显著打下来，并且在第二个国防部投标里复用掉大部分证据，不再把工程团队整段拖进去。最大的证伪风险，则是各国防部要求始终太碎，导致软件复用根本不成立，业务最后被迫滑向低毛利服务。需求是真的，但初始软件 TAM 不大，而且市场对独立“通行证产品”的直接付费意愿还没被证实，所以公司必须按一个窄切口来经营，先跑通，再顺势扩到测试、持续兼容性证据，以及更广泛的自主系统资质认证。
problem:
  - 跨境卖国防无人机时，小型 OEM 往往得为每个国防部重做一遍技术附件、安全声明和互操作主张，材料来源还是 Word、Excel、PDF 和工程截图的拼盘。
  - 买方侧市场平台、招标门户和顾问，能帮你发现机会或递交材料，但它们不会替你搭出一套能跨多个国防部反复复用、还能经得起审计的供应商证据系统。
solution:
  - 做一套采购通行证，把无人机产品线的规格、手册、案例、安全资料和测试结果吃进来，整理成有版本控制和权限体系的结构化证据模型。
  - 在这套证据底座上，为不同国防部生成专属上架包和招标包，并附上贴合标准的互操作证明，覆盖常见 C2 和任务数据流程。
whyWeWin:
  - 这个切口比市场平台更窄：公司先赢下每次跨境投标前都要重复发生的供应商流程，而且第二次卖给另一个国防部时，复用率和节省时间都能量化。
  - 护城河不在通用文档自动化，而在越积越厚的附件映射、互操作测试历史，以及横跨多个国防部和软件环境沉淀下来的买方反馈。
strategicChoices:
  beachhead: 员工规模不到 200 人、已有一款平台落地，并计划在未来 12 个月内向 2–5 个欧洲国防部投标的欧洲 ISR 与 FPV 无人机 OEM。
  wedgeRationale: 这批客户痛得够急、购买触发清晰，而且产品复杂度足够高，能真切感受到可复用证据的价值；与此同时，它们又不像大型主承包商那样，自己就养得起完整的合规和投标运营团队。
  sequencingRationale: 先做通行证导入和招标包生成，把重叠的那 60–80% 证据底座产品化；再用服务式落地跨过信任和附件差异；等这套证据模型在真实投标里站稳，再叠加互操作测试和伙伴集成。
  notYet:
    - 买方侧市场平台聚合或招标发现
    - 从第一天起就要求完整本地部署的涉密数据流程
    - 超出小型无人机产品线之外的广义自主系统覆盖
    - 取代国防部或主承包商已经在用的通用采购套件
market:
  tam: 估算年规模 $9.0M 的欧洲国防无人机供应商通行证市场
  sam: 约 $3.4M 的滩头市场，覆盖约 45 家向多个国防部销售的小型 ISR / FPV OEM
  som: 第 3 年可触达收入约 $1.0M，对应约 15 家 OEM 客户
  segments:
    - 跨国防部销售的小型无人机 OEM 投标团队
    - 管理多国无人机投标的自主系统主承包商或集成商
  buyingProcess: 最可能的购买动作，往往从 OEM 受邀投标、预审或被要求上架采购平台时开始——这时团队突然发现，自己得在很短时间里把技术、安全和互操作证据全都拼出来。经济买方通常是 CEO、销售副总裁或商务拓展负责人，而投标负责人和产品 / 集成负责人则主导评估。
product:
  mvp: 先为一条无人机产品线做一个 EU 托管、单租户的通行证系统，导入现有文档，映射到结构化证据 schema，并生成两套面向不同买方的提交包，带上权限、审计历史和缺口提示。v1 先支持人工上传互操作测试证据，不做自动化测试。
  sixMonth: 从一个国防部模板扩到三个，补上安全协作角色和可复用合规模板矩阵，并在前两个客户身上证明至少有一个“第二次投标复用”的案例。
  twelveMonth: 加入贴合标准的互操作证据对象，打通一个 C2 或任务软件环境的伙伴集成，并沉淀一套能让落地流程可重复的服务打法。
  twentyFourMonth: 把通行证从静态材料系统，扩成持续兼容性监测、相邻自主系统资质流程，以及面向市场平台或框架渠道的中立供应商接入接口。
  keyBets:
    - 国防部之间那部分可复用的证据底座，足够大，能在重度定制化之前就跑出明确 ROI。
    - 对未涉密但敏感的技术资料，OEM 愿意接受 EU 托管的单租户部署。
    - 互操作证明会足够早地变成采购要求，从而支撑一层高于文档管理的溢价能力。
gtm:
  wedge: 先围绕某条产品线的一次真实跨境招标或采购平台上架事件，卖一个服务式采购通行证项目；等下一次投标复用被证明后，再转成年订阅。
  channels:
    - 创始人直接外呼那些处在扩张阶段的无人机 OEM CEO、销售副总裁和商务拓展负责人
    - 由参与互操作证明的 C2 厂商、无人机技术栈供应商和集成顾问转介绍
    - 与采购平台或 NATO 式框架渠道做供应商接入合作
  funnelTargets: 10–15 个目标 OEM 账户 / 季度 -> 30–40% 进入合格的真实投标对话 -> 20–30% 变成付费试点 -> 在第二次复用事件后 60% 以上转为年度合同
  pricing: 按活跃产品线收年度 SaaS 费用，另收落地和互操作证据包费用；这样既贴合买方触发点，也能把价值绑在每条创造收入的产品线上，并对冲早期服务投入偏重的问题。
businessModel:
  revenueStreams:
    - 按活跃无人机产品线收年度订阅费
    - 付费落地与国防部模板搭建
    - 互操作证据或测试包
    - 高级安全协作 / 资料室席位
  unitOfValue: 处于采购通行证管理下的活跃产品线
  targetGrossMarginPct: 70
  expansionLevers:
    - 在同一家 OEM 内扩更多产品线
    - 扩更多国防部走廊和附件库，提升复用率
    - 销售与伙伴软件环境绑定的互操作证据包
    - 只有在 schema 已经被市场信任后，才从无人机扩到相邻自主系统资质认证
strategyMap:
  northStarMetric: 在第二次国防部投标里完成复用后仍愿意续费的活跃产品线数量
  inputMetrics:
    - 从项目启动到材料包可提交所需天数
    - 跨投标复用的证据占比
    - 试点转年约的转化率
    - 已被真实使用的国防部模板与附件映射数量
    - 已交付的伙伴支持互操作证据包数量
  moatsToBuild:
    - 国防部专属附件和声明映射库
    - 与真实软件环境绑定、可版本化的互操作证据语料库
    - 记录哪些主张和材料最能加速过资质的买方反馈数据
  killCriteria:
    - 前 10 个合格 OEM 机会里，愿意为真实投标试点付费的少于 3 个
    - 两套国防部流程跑下来，中位证据复用率仍低于 30%
    - 超过一半的认真机会，在 MVP 价值尚未被证明前就要求本地部署或涉密数据处理
  mermaid: |
    flowchart LR
      Wedge[围绕一条无人机产品线的真实招标通行证] --> MVP[结构化证据与材料包生成]
      MVP --> Proof[更短的投标准备时间与更高复用率]
      Proof --> Expansion[更多产品线、更多国防部、互操作层]
investorMemo:
  verdict:
    call: 观察
    conviction: 流程痛点很强、时机也靠谱，但初始市场偏小，而且软件付费意愿仍未被证明。
    whyBelieve: Intelic 验证了无人机采购在向软件化迁移，而研究也反复说明，供应商侧的资质准备今天依然手工、分散、昂贵。
    whyDoubt: 如果国防部要求始终高度定制化，或者客户只愿在真实投标时买服务，这门生意可能撑不起风投级软件经济性。
    nextDiligence: 找到两个付费设计伙伴，它们都得有活跃的跨境招标，并愿意在第二次投标时量化证据复用率和周期缩短。
  firstCustomer:
    title: 一家 50–200 人规模欧洲 ISR 无人机 OEM 的商务拓展负责人
    profile: 公司已经有一款无人机平台落地，目前只卖给一个本土国防部，并计划在未来一年里向另外两个欧洲买方投标或上架。
    trigger: 收到招标邀请、框架预审，或被要求接入采购平台，而且需要在短时间内拿出技术附件、安全声明和互操作证明。
    buyer: CEO 或销售副总裁
    initialContract: 围绕一条产品线和一次真实投标，先做 $25k-60k 的付费试点；等下一次投标复用起效后，转成 $50k-90k 的年订阅加服务。
  mustBeTrue:
    - 同一条产品线在两个目标国防部流程里，至少有 60% 的供应商证据可以复用。
    - 在采购平台强制要求之前，OEM 投标负责人也愿意先从销售或投标预算里掏钱。
    - 对多数早期客户来说，EU 托管的单租户部署足以承载未涉密但敏感的资料。
    - 互操作证据正在进入供应商过资质环节，而不只是中标后的集成任务。
    - 中立的通行证层能和市场平台、C2 厂商合作，而不是被它们直接替代。
  diligenceQuestions:
    - 哪两个国防部的小型无人机招标，在附件和声明上重叠度最高？
    - 目标 OEM 今天为了做一次跨境提交，会在顾问、工程时间和投标运营上花多少钱？
    - 对目标画像里的 OEM 来说，第二次国防部投标通常会在 12 个月内发生吗？
    - 前五个认真机会在上传敏感技术证据前，对部署形态到底有什么硬要求？
    - Intelic、框架运营方或 C2 厂商，会不会开放接入点，让这套通行证自然嵌进它们流程？
  riskHeatmap:
    - risk: 国防部要求过于定制化，软件复用做不出来
      likelihood: High
      impact: High
      leadingIndicator: 早期试点里，两套国防部提交包之间可复用证据低于 30%。
      mitigation: 先盯住重叠度最高的国防部走廊，并在更广铺开前把复用模式量化清楚。
    - risk: 客户愿意买一次性服务，却不愿买年度软件
      likelihood: Medium
      impact: High
      leadingIndicator: 试点只有在重人工打包时才能成交，而且下一次投标后也转不成年约。
      mitigation: 把试点定价牢牢绑在单条产品线和下一次复用事件上，要求从一开始就设计出订阅转化路径。
    - risk: 国防数据的信任问题卡住采用
      likelihood: Medium
      impact: High
      leadingIndicator: 超过一半合格机会要求本地部署，或连未涉密技术证据都拒绝上传。
      mitigation: 先提供 EU 托管单租户、细粒度权限，以及在需要时支持客户自管密钥，同时把涉密载荷数据排除在首版承诺之外。
    - risk: 市场平台或通用采购套件把功能吸收掉
      likelihood: Medium
      impact: Medium
      leadingIndicator: 一旦 Intelic、JAGGAER 或招标门户补上供应商模板，客户就觉得本产品变得可有可无。
      mitigation: 把自己做成可接多平台的中立证据模型和互操作语料库，而不是去拼通用流程功能。
operatingAssumptions:
  - assumption: 滩头 OEM 愿意从投标或销售预算里拿出 $25k-60k，为一次真实投标支付首单。
    basis: research.yaml
    validationTest: 访谈 8–10 位正在跑招标的投标负责人，并在建议定价区间内拿下至少 2 个付费试点。
    decisionImpact: 如果不成立，就得把报价往高价服务收窄，或者重新审视“软件优先”的风投逻辑。
  - assumption: 对多数早期、未涉密的采购证据流程来说，EU 托管的单租户部署已经够用。
    basis: research.yaml
    validationTest: 在前 10 个合格机会里，让客户把 EU 托管单租户、客户自管密钥和本地部署按 go / no-go 要求排序。
    decisionImpact: 如果不成立，产品路线和融资需求都要往更重基础设施、更长销售周期偏移。
  - assumption: 前两到三个国防部走廊之间有足够高的结构重叠，可以支撑可复用证据 schema。
    basis: idea.yaml
    validationTest: 在全面构建模板前，先收集并映射至少三个目标买方的真实招标包，量化字段级重叠度。
    decisionImpact: 如果不成立，就该转向服务驱动的投标支持，或收窄到标准化更强的单一走廊。
  - assumption: 仅靠文档组装之外，互操作证据也能支撑额外溢价。
    basis: operator judgment
    validationTest: 在材料包生成 ROI 被证明后，向设计伙伴测试一项付费互操作证据包的购买意愿。
    decisionImpact: 如果不成立，就把测试能力留在伙伴支持增值项，不要过早组专门团队。
experimentRoadmap:
  - horizon: 0–90 天
    experiment: 访谈 10 位目标 OEM 投标负责人，并收集 3 份来自不同国防部的真实或近期招标包。
    hypothesis: 同一条产品线可复用的证据底座足够大，能在重服务化之前就跑出软件价值。
    successMetric: 2 条优先国防部流程之间，重叠证据字段至少达到 60%，且 10 次访谈里有 8 次将痛点评为紧急。
    owner: 创始人 / CEO
  - horizon: 0–90 天
    experiment: 围绕各自一条活跃产品线，卖出 2 个付费设计伙伴试点。
    hypothesis: OEM 愿意拿已有的投标预算，为一套围绕真实投标的服务式通行证付费。
    successMetric: 在 $25k-60k 区间签下两个试点，并约定明确的订阅转化条款。
    owner: 创始人 / CEO
  - horizon: 3–6 个月
    experiment: 针对 2 个国防部模板交付 v1 材料包生成，并测量材料准备时间的下降幅度。
    hypothesis: 结构化证据和模板复用，能把投标准备时间相较客户旧流程至少砍掉 40%。
    successMetric: 前几轮试点里的材料包生成中位时间下降 40% 以上。
    owner: 创始工程师
  - horizon: 3–6 个月
    experiment: 与首批客户的安全相关方一起测试 EU 托管单租户部署和细粒度权限。
    hypothesis: 对大多数早期交易来说，不上本地部署也能过安全关。
    successMetric: 至少 70% 的合格机会接受默认托管姿态。
    owner: 安全 / 平台负责人
  - horizon: 6–12 个月
    experiment: 联合一家 C2 或任务软件厂商，推出一个由伙伴背书的互操作证据包。
    hypothesis: 比起只做文档生成，加入贴合标准的兼容证明，能更明显提升转化和扩张。
    successMetric: 50% 以上的活跃客户采用这项证据包，或在续约决策里明确提到它。
    owner: 产品负责人
  - horizon: 12–18 个月
    experiment: 与一家采购平台或框架渠道试跑供应商接入集成。
    hypothesis: 一旦通行证被接受为中立接入基础设施，间接分发能明显拉低 CAC。
    successMetric: 签下一个伙伴流程，并带来至少 3 个合格供应商引荐。
    owner: 创始人 / CEO
operations:
  - 采用 EU 托管单租户部署，提供可审计权限，并为敏感但未涉密数据准备客户自管密钥选项
  - 把结构化证据 taxonomy 和国防部模板库当作受控产品资产维护，而不是临时客户项目
  - 沉淀一套覆盖落地、附件映射和安全审查的服务打法，确保早期部署可重复
  - 与 C2 厂商、测试场或集成顾问建立伙伴流程，收集互操作证据
team:
  - role: 创始工程师
    startTiming: 第 0 个月
    rationale: 负责首批付费试点最核心的东西：证据模型、材料包生成和安全文档架构。
  - role: 创始人 / CEO
    startTiming: 第 0 个月
    rationale: 必须亲自卖给 OEM 高管、主导设计伙伴访谈，并决定先打哪条国防部走廊。
  - role: 安全 / 平台负责人
    startTiming: 第 3 个月
    rationale: 国防部署姿态和访问控制是采用门槛，不是后勤问题，所以必须尽早到位。
  - role: 产品 / 解决方案负责人
    startTiming: 第 6 个月
    rationale: 把真实招标流程抽成可重复模板，减少落地对创始人的依赖。
  - role: 合作伙伴负责人
    startTiming: 第 12 个月
    rationale: 只有在客户验证已经跑出来后，才值得去签市场平台或 C2 厂商的流程合作。
milestones:
  - horizon: 0–12 个月
    items:
      - 签下 2 个付费设计伙伴，并至少交付 2 套国防部模板的通行证流程。
      - 至少在 1 个客户身上证明：材料准备时间下降 40% 以上，且第二次投标的证据复用率超过 50%。
      - 建立起首批客户可接受的 EU 托管单租户、权限和审计控制体系。
  - horizon: 12–24 个月
    items:
      - 在 5–7 家 OEM 客户中，管理 8–10 条活跃产品线。
      - 上线第一个由伙伴背书的互操作证据包，以及第一条采购平台接入集成。
      - 通过压缩每个客户的定制化落地时间，让毛利率趋势走向 70%。
  - horizon: 24–36 个月
    items:
      - 达到模型里的 $1.0M SOM，约对应 15 家 OEM 客户或等价产品线数量。
      - 只有在同一套证据模型可以直接迁移时，才从无人机扩到相邻自主系统资质认证。
      - 根据伙伴合作牵引，决定继续做中立供应商基础设施层，还是更深入平台分发。
risks:
  - risk: 国防部要求依然过于定制化，软件复用无法规模化
    likelihood: High
    impact: High
    mitigation: 把首发范围限定在重叠度最高的走廊，先量化复用率，再决定是否更广铺开。
  - risk: 对年度软件的直接付费意愿，弱于对投标支持服务的付费意愿
    likelihood: Medium
    impact: High
    mitigation: 先卖带明确续费门槛的付费试点，在证明“第二次投标复用会转成年订阅”前，不提前扩招。
  - risk: 数据安全和部署要求把销售周期拖到 pre-seed 承受不起
    likelihood: Medium
    impact: High
    mitigation: 默认走 EU 单租户托管、开发客户自管密钥选项，并把涉密流程明确排除在首版承诺之外。
  - risk: 相邻平台补上足够多的供应商工具，压缩这个切口
    likelihood: Medium
    impact: Medium
    mitigation: 差异化必须押在跨平台中立性、互操作证据和持续累积的附件映射，而不是通用供应商接入流程。
fundingAsk:
  stage: pre-seed
  targetFundingRangeUsd: $2-3M
  runwayMonths: 18
  useOfFundsSummary: 用 18 个月时间拿下 2–3 个付费设计伙伴、搭起安全通行证核心、验证部署姿态、证明第二次投标复用，并换来向互操作证据和渠道合作扩张的资格。
