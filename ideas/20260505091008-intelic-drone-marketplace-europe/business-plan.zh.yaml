slug: drone-oem-procurement-passport
date: '2026-05-05'
executiveSummary: 这家公司应以面向供应商侧的采购通行证切入，服务于员工少于 200 人、正从单一本土国防部向外扩展的欧洲 ISR 和 FPV 无人机 OEM。眼下的痛点不是发现无人机产品，而是每出现一个新买方，都要重复投入大量工程资源，去组装针对不同国防部的技术附件、安全文档和互操作性证明。Intelic 推出 BASE 是有价值的验证，因为这表明采购正在转向软件驱动的比选流程；但研究显示，真正的空白仍是这套流程之下的供应商证据层。因此，首个产品应聚焦可复用的产品通行证、面向买方的定制招标材料包生成，以及面向少数高频国防部通道的可审计互操作性证据，而不是做宽泛市场平台或通用提案软件。进入市场应由创始人主导，并围绕真实招标提供服务辅助，因为研究表明，信任、部署形态和定制附件是早期采用的主要障碍。最有力的验证信号，是首个客户能显著缩短材料准备时间，并在第二个国防部投标中复用大部分证据，而无需再次把工程团队全面拉入流程。最大的反证风险是，各国国防部要求依然过于定制，导致软件复用价值不足，从而把业务拖成低毛利服务。市场需求真实存在，但初始软件 TAM 仍然有限，客户是否愿意为独立通行证产品直接付费也尚未验证，因此公司应以窄切口推进，只有在滩头市场拉力被证明后，才明确扩展到测试、持续兼容性证据，以及更广泛的自主系统资质管理。
problem:
- 跨境防务无人机销售迫使小型 OEM 针对每个国防部，都要从 Word、Excel、PDF 和工程截图中重建技术附件、安全声明和互操作性主张。
- 买方侧市场平台、招标门户和顾问能帮助发现或提交投标，但无法为跨国防部的供应商证据建立一个可复用、可审计的事实系统。
solution:
- 创建一个采购通行证，将无人机产品线的规格、手册、参考案例、安全材料和测试结果纳入一个具备版本控制和权限管理的结构化证据模型。
- 基于该证据核心生成面向不同国防部的上架和招标材料包，并为常见 C2 与任务数据工作流附加符合标准的互操作性证明。
whyWeWin:
- 这一楔子比市场平台更窄: 拿下每次跨境投标前都会重复出现的供应商工作流，在第二次向国防部销售尝试后，复用率和时间节省都可量化。
- 防御力来自跨多个国防部和软件环境累积的附件映射、互操作性测试历史和买方反馈，而不是通用文档自动化。
strategicChoices:
  beachhead: 拥有一个已部署平台，并计划在未来 12 个月内向 2 到 5 个欧洲国防部投标的、员工少于 200 人的欧洲 ISR 与 FPV 无人机 OEM
  wedgeRationale: 这一细分市场痛点紧迫、购买触发明确、产品复杂度足以体现可复用证据的价值，同时又缺乏大型主承包商可自行配置的内部合规与投标运营团队。
  sequencingRationale: 先从重叠的 60-80% 证据核心所需的通行证导入和招标材料包生成开始，再通过服务辅助导入解决信任和附件差异问题，待证据模型在真实投标中被信任后，再叠加互操作性测试和合作方集成。
  notYet:
  - 买方侧市场聚合或招标发现
  - 从第一天起就要求完整本地化处理的涉密数据工作流
  - 超出小型无人机产品线范围的广泛自主系统覆盖
  - 完全替代国防部或主承包商使用的通用采购套件
market:
  tam: $9.0M 的欧洲防务无人机供应商通行证年化市场规模估算
  sam: 约 45 家向多个国防部销售的小型 ISR/FPV OEM 构成的 $3.4M 滩头年化市场估算
  som: 第 3 年约 15 家 OEM 客户对应的 $1.0M 可触达收入估算
  segments:
  - 面向跨国防部销售的欧洲小型无人机 OEM 投标团队
  - 管理多国无人机投标的自主系统主承包商或集成商
  buyingProcess: 典型动作往往始于 OEM 被邀请投标、预审，或被要求在采购枢纽上架，并意识到自己必须快速整理技术、安全与互操作性证据。经济买方通常是 CEO、销售副总裁或业务拓展负责人，而投标负责人以及产品或集成负责人主导评估。
product:
  mvp: 为一条无人机产品线构建一个欧盟托管的单租户通行证，导入现有文档，将其映射到结构化证据 schema，并生成两份面向不同买方的提交材料包，包含权限、审计历史和缺口标记。v1 包含互操作性测试证据的手工上传，而非自动化测试。
  sixMonth: 从一个国防部模板扩展到三个，加入安全协作者角色和可复用合规矩阵，并在前两个客户中证明至少一个第二次投标复用案例。
  twelveMonth: 加入符合标准的互操作性证据对象、与一个 C2 或任务软件环境的合作集成，以及一套让导入保持可复制的服务作业手册。
  twentyFourMonth: 将通行证扩展到持续兼容性监测、相邻自主系统资质工作流，以及面向市场平台或框架渠道的中立供应商导入 API。
  keyBets:
  - 跨国防部的可重复证据核心足够大，能够在重度定制化之前形成清晰 ROI。
  - 对于未涉密但敏感的技术数据，OEM 会接受欧盟托管的单租户部署。
  - 互操作性证明会足够早地成为采购要求，从而支撑高于文档管理的溢价层。
gtm:
  wedge: 围绕单一产品线的一次真实跨境招标或市场平台上架事件，销售带服务辅助的采购通行证项目；待下一次投标验证复用后，再转为年度订阅。
  channels:
  - 由创始人主导，对处于扩张阶段的无人机 OEM 的 CEO、销售副总裁和业务拓展负责人进行外呼
  - 来自参与互操作性证明的 C2 厂商、无人机技术栈供应商和集成咨询公司的转介绍
  - 与采购枢纽或 NATO 风格框架渠道建立供应商导入合作
  funnelTargets: 每季度 10-15 个目标 OEM 账户 -> 30-40% 合格的真实投标对话 -> 20-30% 付费试点 -> 在第二次复用事件后 60%+ 的试点转年度订阅
  pricing: 按每条活跃产品线收取年度 SaaS 费用，另加付费导入和互操作性证据包；这与买方触发点一致，将价值与每个创收平台对齐，并抵消早期较高的服务强度。
businessModel:
  revenueStreams:
  - 按活跃无人机产品线收取年度订阅费
  - 付费导入和国防部模板配置
  - 互操作性证据或测试包
  - 高级安全协作或数据室席位
  unitOfValue: 纳入采购通行证管理的活跃产品线
  targetGrossMarginPct: 70
  expansionLevers:
  - 在同一 OEM 内增加更多产品线
  - 增加国防部通道和附件库以提高复用率
  - 销售与合作方软件环境绑定的互操作性证据包
  - 在 schema 获得信任后，从无人机扩展到相邻自主系统资质管理
strategyMap:
  northStarMetric: 在第二次向国防部投标中被复用后完成续约的活跃产品线数量
  inputMetrics:
  - 从启动到可提交材料包的天数
  - 跨投标复用的证据比例
  - 试点转年度订阅率
  - 已在真实使用中的国防部模板与附件映射数量
  - 已交付的合作方支持互操作性证据包数量
  moatsToBuild:
  - 国防部特定的附件与声明映射库
  - 与真实软件环境相连的版本化互操作性证据语料库
  - 关于哪些主张和材料能加速资质审查的买方反馈数据
  killCriteria:
  - 首批 10 个合格 OEM 意向中，少于 3 个愿意为真实投标试点付费
  - 经过两个国防部工作流后，中位证据复用率仍低于 30%
  - 在 MVP 价值被证明前，超过一半的严肃客户要求本地部署或涉密数据处理
  mermaid: "flowchart LR\n  Wedge[单一无人机产品线的真实招标通行证] --> MVP[结构化证据与材料包生成]\n  MVP --> Proof[更短的投标准备时间与更高复用率]\n  Proof --> Expansion[更多产品线、更多国防部、互操作层]\n"
investorMemo:
  verdict:
    call: 观察
    conviction: 工作流痛点强、时机可信，但初始市场较小，客户为软件直接付费的意愿尚未被证明。
    whyBelieve: Intelic 验证了无人机采购向软件化迁移的趋势，而研究持续表明，供应商侧的资质准备工作仍然是手工、分散且昂贵的。
    whyDoubt: 如果各国国防部要求依旧高度定制，或客户只在真实投标期间购买服务，那么这门生意可能无法形成具备风险投资级别的软体经济性。
    nextDiligence: 确认两个付费设计合作伙伴，它们都拥有活跃的跨境招标，并愿意在第二次投标中衡量证据复用率和周期缩短幅度。
  firstCustomer:
    title: 一家 50-200 人规模欧洲 ISR 无人机 OEM 的业务拓展负责人
    profile: 公司目前有一个已部署的无人机平台，今天只向一个本土国防部销售，并计划在未来一年向另外两个欧洲买方上架或投标。
    trigger: 收到招标邀请、框架预审，或采购枢纽导入要求，需要在很短时间内提交技术附件、安全声明和互操作性证明。
    buyer: CEO 或销售副总裁
    initialContract: 围绕一条产品线和一次真实投标的 $25k-60k 付费试点；一旦下一次投标复用同一证据核心，再转为 $50k-90k 年度订阅加服务。
  mustBeTrue:
  - 同一产品线在两个目标国防部工作流之间，至少有 60% 的所需供应商证据可以复用。
  - 在采购枢纽强制要求通行证之前，OEM 投标负责人就愿意从销售或投标预算中为其付费。
  - 对于处理未涉密但敏感材料的大多数早期客户，欧盟托管的单租户部署是可接受的。
  - 互操作性证据正在成为供应商资质的一部分，而不再只是授标后的集成任务。
  - 一个中立的通行证层可以与市场平台和 C2 厂商合作，而不是被它们替代。
  diligenceQuestions:
  - 哪两个国防部在小型无人机招标的附件和声明上重叠度最高？
  - 如今 OEM 为一次跨境提交在顾问、工程时间和投标运营上花费多少？
  - 对目标 OEM 画像而言，12 个月内出现第二个国防部投标的频率有多高？
  - 在上传敏感技术证据之前，前五个严肃意向客户需要何种部署形态？
  - Intelic、框架运营方或 C2 厂商是否会开放导入接口，使通行证成为其工作流的一部分？
  riskHeatmap:
  - risk: 国防部要求过于定制，无法实现有意义的软件复用
    likelihood: 高
    impact: 高
    leadingIndicator: 早期试点显示，两份国防部提交材料包之间可复用证据低于 30%。
    mitigation: 优先瞄准重叠度最高的国防部通道，在证明复用模式之前，将国家特定覆盖层保持为服务辅助。
  - risk: 客户购买一次性服务，但不购买年度软件
    likelihood: 中
    impact: 高
    leadingIndicator: 只有在捆绑大量人工支持时试点才成交，且在下一次投标后无法转化。
    mitigation: 围绕单一产品线给试点定价，并要求订阅转化路径与第二次复用事件挂钩。
  - risk: 防务数据的信任问题阻碍采用
    likelihood: 中
    impact: 高
    leadingIndicator: 超过一半的合格意向客户要求本地部署，或拒绝上传即便未涉密的技术证据。
    mitigation: 从欧盟托管的单租户、细粒度权限、必要时的客户自管密钥，以及排除涉密载荷数据的工作流开始。
  - risk: 市场平台或通用采购套件吸收该功能
    likelihood: 中
    impact: 中
    leadingIndicator: 一旦 Intelic、JAGGAER 或招标门户加入供应商文档模板，意向客户就认为该产品冗余。
    mitigation: 掌握可插入多个平台的中立证据模型和互操作性语料库，而不是在通用工作流上竞争。
operatingAssumptions:
- assumption: 滩头 OEM 可以从与真实投标相关的投标或销售预算中拿出 $25k-60k 的初始支出。
  basis: research.yaml
  validationTest: 访谈 8-10 位拥有活跃招标的投标负责人，并以建议价格区间拿下至少 2 个付费试点。
  decisionImpact: 若不成立，应将报价收窄至更高价的服务，或重新审视软件优先的风投经济性。
- assumption: 对大多数早期未涉密采购证据工作流而言，欧盟托管的单租户部署已足够。
  basis: research.yaml
  validationTest: 在客户发现阶段，让前 10 个合格意向客户对欧盟托管单租户、客户自管密钥和本地部署进行“是否必须”排序。
  decisionImpact: 若不成立，产品路线图和融资需求将转向更重的基础设施与更慢的销售周期。
- assumption: 最初两到三个国防部通道之间共享足够结构，可支撑一个可复用的证据 schema。
  basis: idea.yaml
  validationTest: 在全面构建模板前，收集并映射至少三个目标买方的真实招标包，量化字段级重叠。
  decisionImpact: 若不成立，则应转向服务驱动的投标支持，或选择标准化更强的更窄通道。
- assumption: 互操作性证据相较于单纯文档整理，能够支撑溢价定价。
  basis: 运营判断
  validationTest: 在材料包生成 ROI 被证明后，与设计合作伙伴测试其对付费互操作性证据包的支付意愿。
  decisionImpact: 若不成立，应将测试保持为合作方支持的附加项，而不要过早招聘专职互操作性团队。
experimentRoadmap:
- horizon: 0–90 天
  experiment: 访谈 10 位目标 OEM 投标负责人，并收集来自不同国防部的 3 份真实或近期招标包。
  hypothesis: 同一产品线拥有足够大的可复用证据核心，能在定制服务主导之前形成软件价值。
  successMetric: 在 2 个重点国防部工作流中，至少 60% 的证据字段重叠；且 10 次访谈中有 8 次认为该痛点紧迫。
  owner: 创始人 CEO
- horizon: 0–90 天
  experiment: 为各一条活跃产品线卖出 2 个付费设计合作伙伴试点。
  hypothesis: OEM 会为与真实投标绑定、带服务辅助的通行证支付预先编列的投标预算。
  successMetric: 以 $25k-60k 价格区间签下两个试点，并明确订阅转化条款。
  owner: 创始人 CEO
- horizon: 3–6 个月
  experiment: 交付面向 2 个国防部模板的 v1 材料包生成能力，并衡量提交准备时间缩短情况。
  hypothesis: 结构化证据与模板复用，可将投标准备时间较客户原有流程至少缩短 40%。
  successMetric: 首批试点中，中位材料包生成时间缩短 40%+。
  owner: 创始工程师
- horizon: 3–6 个月
  experiment: 与首批客户的安全相关方测试欧盟托管单租户部署和细粒度权限。
  hypothesis: 对大多数早期交易而言，无需本地部署即可消除安全异议。
  successMetric: 至少 70% 的合格意向客户接受默认托管形态。
  owner: 安全 / 平台负责人
- horizon: 6–12 个月
  experiment: 与一家 C2 或任务软件供应商推出一个合作方支持的互操作性证据包。
  hypothesis: 加入符合标准的兼容性证明后，相比单纯文档生成，更能提升转化与扩张。
  successMetric: 50%+ 的活跃客户采用该证据包，或在续约决策中提及它。
  owner: 产品负责人
- horizon: 12–18 个月
  experiment: 与一个采购枢纽或框架渠道试点供应商导入集成。
  hypothesis: 一旦通行证被接受为中立导入基础设施，间接分发就能降低 CAC。
  successMetric: 签下 1 个合作工作流，并由其带来至少 3 个合格供应商引荐。
  owner: 创始人 CEO
operations:
- 对敏感但未涉密的数据采用欧盟托管单租户部署，具备可审计权限，并支持客户自管密钥选项
- 将结构化证据分类法和国防部模板库作为受控产品资产管理，而非临时客户工作
- 建立导入、附件映射和安全审查的服务作业手册，使早期部署保持可复制
- 建立与 C2 厂商、测试场或集成咨询公司协同获取互操作性证据的合作流程
team:
- role: 创始工程师
  startTiming: Month 0
  rationale: 负责首批付费试点所需的核心证据模型、材料包生成和安全文档架构。
- role: 创始人 CEO
  startTiming: Month 0
  rationale: 必须主导对 OEM 高管的销售、处理设计合作伙伴发现，并确定优先国防部通道。
- role: 安全 / 平台负责人
  startTiming: Month 3
  rationale: 之所以需要尽早到位，是因为防务部署形态和访问控制是采用的核心障碍，而非后台事务。
- role: 产品 / 解决方案负责人
  startTiming: Month 6
  rationale: 将真实招标工作流转化为可重复模板，减少导入过程对创始人的依赖。
- role: 合作负责人
  startTiming: Month 12
  rationale: 只有在客户验证存在且公司准备好与市场平台或 C2 厂商签署工作流合作时，这个岗位才有意义。
milestones:
- horizon: 0–12 个月
  items:
  - 签下 2 个付费设计合作伙伴，并交付至少 2 个国防部模板的通行证工作流。
  - 在至少 1 个客户身上证明：提交准备时间缩短 40%+，且第二次投标的证据复用率达到 50%+。
  - 建立让首批客户可接受的欧盟托管单租户部署、权限与审计控制。
- horizon: 12–24 个月
  items:
  - 在 5-7 家 OEM 客户中管理 8-10 条活跃产品线。
  - 推出首个合作方支持的互操作性证据包，以及首个采购枢纽导入集成。
  - 通过降低每客户的定制导入时间，证明毛利率正向 70% 靠拢。
- horizon: 24–36 个月
  items:
  - 达到模型中的 $1.0M SOM，对应约 15 家 OEM 客户或等效产品线数量。
  - 只有在相同证据模型能够延展的前提下，才从无人机扩展到相邻自主系统资质。
  - 根据合作牵引情况，决定继续作为中立供应商基础设施层，还是进一步深入平台驱动分发。
risks:
- risk: 国防部要求仍然过于定制，无法形成可扩展的软件复用
  likelihood: 高
  impact: 高
  mitigation: 将首发范围限制在重叠度最高的通道，在广泛推广前量化复用情况，并严格控制定制化服务边界。
- risk: 客户为年度软件直接付费的意愿弱于购买投标支持服务的意愿
  likelihood: 中
  impact: 高
  mitigation: 以付费试点切入，并设置明确的续约门槛；在证明第二次投标复用能转化为订阅前，不要提前扩招。
- risk: 数据安全与托管要求让销售周期拉长，超出 pre-seed 能力范围
  likelihood: 中
  impact: 高
  mitigation: 默认采用欧盟单租户托管，开发客户自管密钥选项，并将涉密工作流排除在初始产品承诺之外。
- risk: 相邻平台加入足够多的供应商工具，压缩了楔子空间
  likelihood: 中
  impact: 中
  mitigation: 通过跨平台中立性、互操作性证据和累积的附件映射实现差异化，而不是做通用供应商导入。
fundingAsk:
  stage: pre-seed
  targetFundingRangeUsd: $2-3M
  runwayMonths: 18
  useOfFundsSummary: 融资 18 个月，以拿下 2-3 个付费设计合作伙伴、构建安全通行证核心、验证托管形态、证明第二次投标复用，并赢得扩展到互操作性证据和渠道合作的资格。
