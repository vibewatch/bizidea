slug: drone-oem-procurement-passport
date: '2026-05-05'
executiveSummary: >-
  这家公司应该从“供应商侧采购护照”切入，服务那些员工少于 200 人、正准备走出本土市场、把 ISR 和 FPV 无人机卖给更多国防部的欧洲 OEM。眼下最痛的不是让买方发现这些无人机，而是每当新买方出现时，都要重复做一轮工程师深度参与的工作：整理国防部特定的技术附件、安全材料和互操作证明。Intelic 推出 BASE 是个很好的验证信号，因为它说明采购正在走向软件化对比流程；但研究真正揭示的缺口，是这个流程底下的“供应商证据层”仍然没人做好。因此，第一款产品不该急着做大而全的市场平台或通用提案软件，而应聚焦于可复用的产品护照、按买方生成的投标材料，以及面向少数高频国防部走廊的、可审计互操作证据。GTM 应由创始人亲自推进，并围绕真实投标用服务辅助落地，因为研究显示，信任、部署姿态和高度定制的附件要求，是早期 adoption 的主要拦路虎。最强的证明点，是拿下第一个客户后，能显著缩短材料准备时间，并且在第二个国防部投标里复用大部分证据，而不用再把工程团队完整拉进流程。最大的反证风险是：如果各国防部始终太过定制化，软件复用就不成立，业务最终会滑向低毛利服务。市场需求是真实的，但初始软件 TAM 不大，客户也还没证明会为独立的护照产品持续买单，所以这家公司必须按狭窄切口来经营，只有在滩头市场确实拉动起来之后，才有资格扩展到测试、持续兼容性证据和更广泛的自主系统资质。
problem:
  - 跨境销售防务无人机会迫使小型 OEM 针对每个国防部，重新从 Word、Excel、PDF 和工程截图里拼出技术附件、安全声明和互操作表述。
  - 买方侧市场平台、投标门户和顾问可以帮助发现机会或提交标书，但它们并不能为供应商建立一套跨国防部、可复用且可审计的证据记录系统。
solution:
  - 做一个采购护照，把某条无人机产品线的规格、手册、参考案例、安全材料和测试结果摄取进带版本控制和权限管理的结构化证据模型。
  - 基于这套核心证据生成面向不同国防部的上架包和投标包，并附上针对常见 C2 和任务数据工作流的、符合标准的互操作证明。
whyWeWin:
  - 这个切口比市场平台更窄：它拿下的是每次跨境投标前都会重复发生的供应商工作流，而且从第二次卖进新国防部起，复用率和时间节省都能被量化。
  - 防御性来自不断积累的附件映射、互操作测试历史，以及跨多个国防部和软件环境沉淀下来的买方反馈，而不是通用文档自动化。
strategicChoices:
  beachhead: 目标滩头市场是员工少于 200 人的欧洲 ISR 和 FPV 无人机 OEM；它们已有一款部署中的平台，并计划在未来 12 个月内向 2 到 5 个欧洲国防部发起投标。
  wedgeRationale: 这批客户痛感强、购买触发明确、产品复杂度也足够高，会真正在意证据复用；但它们通常又没有像大型主承包商那样，自建完整合规和投标运营团队。
  sequencingRationale: 先围绕那 60-80% 可重叠的证据核心，做护照摄取和投标包生成；再用服务辅助 onboarding，解决信任与附件差异；等这套证据模型在真实标书里站稳后，再叠加互操作测试和伙伴集成。
  notYet:
    - 买方侧市场聚合或招标发现
    - 从第一天就要求完整本地部署的涉密数据工作流
    - 小型无人机产品线之外的广泛自主系统覆盖
    - 彻底替代国防部或主承包商现有的通用采购套件
market:
  tam: $9.0M 的欧洲防务无人机供应商护照软件年化市场估算
  sam: 约 $3.4M 的滩头市场估算，对应大约 45 家向多个国防部销售的小型 ISR/FPV OEM
  som: 第 3 年可触达收入约 $1.0M，对应约 15 家 OEM 客户
  segments:
    - 跨多个国防部销售的小型无人机 OEM 攻单团队
    - 负责多国无人机投标的自主系统主承包商或集成商
  buyingProcess: 最可能的购买动作，往往从 OEM 收到投标邀请、资格预审或采购枢纽上架要求时开始——这时它们突然发现，必须在很短时间内把技术、安全和互操作证据拼齐。经济买方通常是 CEO、销售副总裁或业务拓展负责人；评估过程则由攻单负责人以及产品或集成负责人主导。
product:
  mvp: 先做一个 EU 托管、单租户的护照系统，服务一条无人机产品线；系统能导入现有文档，映射到结构化证据 schema，并生成两份面向不同买方的提交包，同时提供权限、审计历史和缺口提示。v1 只支持手工上传互操作测试证据，不做自动化测试。
  sixMonth: 把模板从 1 个扩展到 3 个国防部，加入安全协作者角色和可复用合规矩阵，并在前两位客户身上证明至少一次“第二次投标还能复用”的案例。
  twelveMonth: 增加符合标准的互操作证据对象，与 1 个 C2 或任务软件环境打通伙伴集成，并沉淀一套可重复执行的服务 playbook。
  twentyFourMonth: 把护照扩展到持续兼容性监测、相邻的自主系统资质流程，以及面向市场平台或框架渠道的中立供应商 onboarding API。
  keyBets:
    - 各国防部之间可复用的证据核心足够大，能够在重度定制化之前先打出清晰 ROI。
    - 对于未涉密但敏感的技术数据，OEM 可以接受 EU 托管的单租户部署。
    - 互操作证明会足够早地变成购买要求，从而支撑高于文档管理的溢价层。
gtm:
  wedge: 先把产品卖成一项“围绕单一产品线、绑定一次真实跨境投标或市场上架事件”的服务辅助式采购护照项目；等客户在下一次投标里复用成功后，再转成年订阅。
  channels:
    - 创始人主导外呼，直接触达处于扩张阶段的无人机 OEM 的 CEO、销售副总裁和业务拓展负责人
    - 由参与互操作证明的 C2 厂商、无人机软件栈供应商和集成顾问转介绍
    - 与采购枢纽或类似 NATO 框架渠道建立供应商 onboarding 合作
  funnelTargets: 每季度 10-15 个目标 OEM 账户 -> 30-40% 进入有真实投标的合格对话 -> 20-30% 转成付费试点 -> 第二次复用事件后 60% 以上由试点转成年付
  pricing: 按活跃产品线收年度 SaaS 费用，另收 onboarding 和互操作证据包费用；这样既贴合买方触发点，也能把价值对齐到每一个真正带来收入的平台，同时抵消早期偏服务化的交付强度。
businessModel:
  revenueStreams:
    - 按活跃无人机产品线收取年度订阅费
    - 付费 onboarding 和国防部模板配置
    - 互操作证据或测试包
    - 高级安全协作或数据室席位
  unitOfValue: 处于采购护照管理下的活跃产品线
  targetGrossMarginPct: 70
  expansionLevers:
    - 在同一家 OEM 内增加更多产品线
    - 增加更多国防部走廊和附件库，提升证据复用率
    - 销售与伙伴软件环境绑定的互操作证据包
    - 当 schema 足够可信后，从无人机扩展到相邻的自主系统资质
strategyMap:
  northStarMetric: 在第二次国防部投标中完成复用、并最终续约的活跃产品线数量
  inputMetrics:
    - 从 kick-off 到交付可提交材料包所需天数
    - 不同投标之间的证据复用比例
    - 试点转年付的转化率
    - 已在真实使用中落地的国防部模板和附件映射数量
    - 已交付的伙伴支持型互操作证据包数量
  moatsToBuild:
    - 面向国防部的附件与声明映射库
    - 与真实软件环境挂钩的版本化互操作证据语料库
    - 关于哪些表述和材料能更快通过资质审核的买方反馈数据
  killCriteria:
    - 前 10 个合格 OEM 线索里，愿意为真实投标试点付费的不到 3 个
    - 两轮国防部工作流之后，中位数证据复用率仍低于 30%
    - 超过一半的严肃潜在客户在 MVP 价值尚未证明前，就要求本地部署或涉密数据处理
  mermaid: |
    flowchart LR
      Wedge[单条无人机产品线的真实投标护照] --> MVP[结构化证据与投标包生成]
      MVP --> Proof[更短的备标准备时间和更高的证据复用]
      Proof --> Expansion[更多产品线 更多国防部 以及互操作层]
investorMemo:
  verdict:
    call: 观察
    conviction: 工作流痛点很强，时机也可信，但初始市场偏小，而且客户是否愿意为软件持续付费仍未被证明。
    whyBelieve: Intelic 证明了无人机采购正转向软件化，而研究也反复说明，供应商侧的资质准备工作依旧手工、碎片化且昂贵。
    whyDoubt: 如果各国防部要求高度定制化，或者客户只愿在真实投标期间购买服务，这门生意就很难形成可支撑风投回报的软件经济模型。
    nextDiligence: 确认两家付费设计伙伴；它们都必须有真实的跨境投标，并愿意在第二次投标里量化证据复用和周期缩短。
  firstCustomer:
    title: 一家 50-200 人欧洲 ISR 无人机 OEM 的业务拓展负责人
    profile: 公司已有一款部署中的无人机平台，目前卖给 1 个本土国防部，并计划在未来一年里向另外 2 个欧洲买方上架或投标。
    trigger: 收到投标邀请、框架资格预审，或采购枢纽 onboarding，而对方要求在短时间内提交技术附件、安全声明和互操作证明。
    buyer: CEO 或销售副总裁
    initialContract: 面向 1 条产品线和 1 次真实投标的 $25k-60k 付费试点；一旦下一次投标复用了同一证据核心，再转成 $50k-90k 的年度订阅加服务。
  mustBeTrue:
    - 面向同一条产品线，至少有 60% 的供应商证据可以在两个目标国防部工作流之间复用。
    - 在采购枢纽强制要求之前，OEM 攻单负责人就愿意从销售或攻单预算里为这套软件买单。
    - 对多数早期客户来说，只要处理的是未涉密但敏感的材料，EU 托管单租户部署就已经足够。
    - 互操作证据正在进入供应商资质流程，而不是继续停留在授标后的集成阶段。
    - 中立的护照层可以和市场平台、C2 厂商合作，而不是直接被它们吞掉。
  diligenceQuestions:
    - 哪两个国防部之间，在小型无人机投标的附件和声明上重叠度最高？
    - 目标 OEM 今天为一次跨境提交，究竟要花多少顾问费、工程时间和投标运营成本？
    - 对目标客户画像来说，第二次国防部投标通常会不会在 12 个月内发生？
    - 前 5 个真正有意向的潜在客户，在上传敏感技术证据前，会要求什么样的部署姿态？
    - Intelic、框架运营方或 C2 厂商是否会开放 onboarding 接口，让护照成为它们工作流的一部分？
  riskHeatmap:
    - risk: 各国防部要求过于定制化，导致软件复用价值不成立
      likelihood: High
      impact: High
      leadingIndicator: 早期试点显示，两份面向不同国防部的提交包之间，可复用证据低于 30%。
      mitigation: 先盯住重叠度最高的国防部走廊，并在复用模式跑通前，把国家特定覆盖层维持为服务辅助。
    - risk: 客户只买一次性服务，不买年度软件
      likelihood: Medium
      impact: High
      leadingIndicator: 试点只有在重度人工支持打包时才能成交，而且下一次投标后也不转年付。
      mitigation: 按单一产品线给试点定价，并把第二次复用事件作为转订阅的明确门槛。
    - risk: 防务数据的信任问题阻碍 adoption
      likelihood: Medium
      impact: High
      leadingIndicator: 超过一半的合格潜在客户要求本地部署，或者连未涉密的技术证据都不愿上传。
      mitigation: 从 EU 托管单租户、细粒度权限和必要时的客户自管密钥起步，并设计出不接触涉密载荷数据的工作流。
    - risk: 市场平台或通用采购套件把功能吃掉
      likelihood: Medium
      impact: Medium
      leadingIndicator: 一旦 Intelic、JAGGAER 或投标门户加入供应商文档模板，潜在客户就觉得这个产品变得多余。
      mitigation: 把自己做成可插入多个平台的中立证据模型和互操作语料库，而不是去拼通用工作流。
operatingAssumptions:
  - assumption: 目标滩头 OEM 愿意从攻单或销售预算里，为一次真实投标付出 $25k-60k 的初始投入。
    basis: research.yaml
    validationTest: 访谈 8-10 位有真实投标在手的攻单负责人，并在建议价格带内拿下至少 2 个付费试点。
    decisionImpact: 如果不成立，就要把报价收缩到更高价的服务，或重新判断“软件优先”是否还符合风投逻辑。
  - assumption: 对多数早期未涉密采购证据场景来说，EU 托管单租户部署已经足够。
    basis: research.yaml
    validationTest: 在发现阶段，让前 10 个合格潜在客户给 EU 托管单租户、客户自管密钥和本地部署做 go/no-go 排序。
    decisionImpact: 如果不成立，产品路线图和融资需求都会转向更重的基础设施和更慢的销售周期。
  - assumption: 前两个或三个国防部走廊之间，有足够重叠的结构可支撑一套可复用证据 schema。
    basis: idea.yaml
    validationTest: 收集至少 3 个目标买方的真实招标包，做字段级重叠映射，再决定是否全面建设模板。
    decisionImpact: 如果不成立，就要转向服务型投标支持，或进一步缩窄到标准化程度更高的走廊。
  - assumption: 除了文档整理之外，互操作证据本身还能支撑额外溢价。
    basis: operator judgment
    validationTest: 在设计伙伴已经看到材料生成 ROI 后，再测试它们对付费互操作证据包的付费意愿。
    decisionImpact: 如果不成立，就把测试维持为伙伴支持型附加项，不要太早单独招聘互操作团队。
experimentRoadmap:
  - horizon: 0–90 天
    experiment: 访谈 10 位目标 OEM 攻单负责人，并收集 3 份来自不同国防部的真实或近期招标包。
    hypothesis: 同一条产品线的可复用证据核心足够大，软件价值能先于重度定制服务成立。
    successMetric: 两个重点国防部工作流之间，至少 60% 的证据字段重叠；且 10 次访谈里有 8 次把痛点评为紧急。
    owner: 创始人/CEO
  - horizon: 0–90 天
    experiment: 为两条活跃产品线各卖出 1 个付费设计伙伴试点。
    hypothesis: OEM 愿意从已预算的攻单费用里，为绑定真实投标的服务辅助式护照买单。
    successMetric: 签下两个 $25k-60k 的试点，并附带明确的订阅转化条款。
    owner: 创始人/CEO
  - horizon: 3–6 个月
    experiment: 为 2 个国防部模板交付 v1 材料包生成能力，并测量备标时间下降幅度。
    hypothesis: 结构化证据和模板复用，能把客户的备标时间相比旧流程压缩至少 40%。
    successMetric: 前几次试点里，中位数“从启动到材料包完成”时间下降 40% 以上。
    owner: 创始工程师
  - horizon: 3–6 个月
    experiment: 用前几位客户的安全相关方测试 EU 托管单租户部署和细粒度权限。
    hypothesis: 多数早期交易可以在不做本地部署的前提下，解决安全异议。
    successMetric: 至少 70% 的合格潜在客户接受默认托管姿态。
    owner: 安全/平台负责人
  - horizon: 6–12 个月
    experiment: 与 1 家 C2 或任务软件厂商联合推出 1 个伙伴支持的互操作证据包。
    hypothesis: 与单纯文档生成相比，加入符合标准的兼容性证明，能更明显地提升转化与扩展。
    successMetric: 50% 以上的活跃客户采用该证据包，或在续约时明确提到它。
    owner: 产品负责人
  - horizon: 12–18 个月
    experiment: 与 1 个采购枢纽或框架渠道试点供应商 onboarding 集成。
    hypothesis: 一旦护照被接受为中立的 onboarding 基础设施，间接分销能显著降低 CAC。
    successMetric: 签下 1 条伙伴工作流，并至少带来 3 个合格供应商线索。
    owner: 创始人/CEO
operations:
  - EU 托管的单租户部署，带可审计权限，以及面向敏感但未涉密数据的客户自管密钥选项
  - 把结构化证据 taxonomy 和国防部模板库当成受控产品资产来管理，而不是零散客户项目
  - 一套可重复执行的服务 playbook，用于 onboarding、附件映射和安全审查，保证早期交付不会每次都重来
  - 与 C2 厂商、测试场或集成顾问配合，捕捉互操作证据的伙伴流程
team:
  - role: 创始工程师
    startTiming: Month 0
    rationale: 负责首批付费试点所需的核心证据模型、材料包生成能力和安全文档架构。
  - role: 创始人/CEO
    startTiming: Month 0
    rationale: 必须亲自向 OEM 高管销售、推进设计伙伴 discovery，并决定先打哪些国防部走廊。
  - role: 安全/平台负责人
    startTiming: Month 3
    rationale: 这个角色必须很早到位，因为防务部署姿态和访问控制不是后台问题，而是 adoption 能否发生的核心门槛。
  - role: 产品/解决方案负责人
    startTiming: Month 6
    rationale: 把真实招标工作流翻译成可重复模板，降低 onboarding 对创始人的依赖。
  - role: 合作伙伴负责人
    startTiming: Month 12
    rationale: 只有在客户价值已被证明、公司也准备好签下与市场平台或 C2 厂商的工作流合作时，这个岗位才有意义。
milestones:
  - horizon: 0–12 个月
    items:
      - 签下 2 个付费设计伙伴，并至少为 2 个国防部模板交付护照工作流。
      - 在至少 1 位客户身上，证明备标准备时间下降 40% 以上，且第二次投标的证据复用率超过 50%。
      - 建立首批客户可接受的 EU 托管单租户部署、权限和审计控制。
  - horizon: 12–24 个月
    items:
      - 在 5-7 家 OEM 客户中，管理 8-10 条活跃产品线。
      - 推出第一个伙伴支持型互操作证据包，以及第一个采购枢纽 onboarding 集成。
      - 通过压缩每位客户的定制 onboarding 时间，让毛利率趋势走向 70%。
  - horizon: 24–36 个月
    items:
      - 实现模型中的 $1.0M SOM，对应约 15 家 OEM 客户或等量产品线。
      - 只有在同一套证据模型可以自然迁移时，才从无人机扩展到相邻的自主系统资质。
      - 根据伙伴进展，决定公司是继续做中立供应商基础设施层，还是更深地进入平台式分销。
risks:
  - risk: 各国防部要求仍然太过定制化，无法形成可扩展的软件复用
    likelihood: High
    impact: High
    mitigation: 把首发范围限制在重叠度最高的走廊，先量化复用，再做更广泛 rollout，并严格收紧定制服务边界。
  - risk: 客户对年度软件的直接付费意愿弱于对投标支持服务的付费意愿
    likelihood: Medium
    impact: High
    mitigation: 先卖带明确续费门槛的付费试点，在证明“第二次投标复用会转成订阅”之前，不要提前扩招。
  - risk: 数据安全和托管要求把销售周期拉长到超出 pre-seed 阶段承受能力
    likelihood: Medium
    impact: High
    mitigation: 默认采用单租户 EU 托管，提供客户自管密钥选项，并把涉密工作流排除在初始产品承诺之外。
  - risk: 相邻平台补上足够多的供应商工具，压缩切口空间
    likelihood: Medium
    impact: Medium
    mitigation: 依靠跨平台中立性、互操作证据和不断积累的附件映射来区隔自己，而不是去拼通用供应商 onboarding。
fundingAsk:
  stage: pre-seed
  targetFundingRangeUsd: $2-3M
  runwayMonths: 18
  useOfFundsSummary: 融 18 个月的资金，用来拿下 2-3 个付费设计伙伴、搭起安全的护照核心、验证托管姿态、证明第二次投标复用，并拿到继续扩展到互操作证据和渠道合作的资格。