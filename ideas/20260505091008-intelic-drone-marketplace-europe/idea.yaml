topRisks:
- name: Ministry requirements stay too bespoke
  description: If each ministry keeps unique document formats and review logic, standardization value could be weaker than expected.
  mitigation: Start with the repeating 60-80% of supplier evidence, then layer country-specific templates and service-assisted onboarding for the first markets.
- name: Platforms or primes bundle the feature
  description: A procurement hub or large defense integrator could add basic supplier-document tooling.
  mitigation: Win as the neutral system of record across multiple hubs and command-software environments before any one platform can lock the market.
- name: Defense data trust barrier
  description: OEMs may resist uploading sensitive technical artifacts to a startup system.
  mitigation: Offer EU-hosted and on-prem deployments, strict field-level permissions, and workflows that avoid storing classified payload data.
