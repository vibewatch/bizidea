problem: European ministries are trying to buy drones faster, but the supply base is fragmented across many manufacturers and each buyer asks for different spec sheets, integration evidence, and compliance narratives. For a 50-200 person drone OEM, every new ministry sale becomes a bespoke capture project stitched together from PDFs, spreadsheets, and engineering screenshots. That slows awards, drains scarce technical talent, and makes interoperability claims hard for buyers to trust.
targetUser:
  primary: Head of business development or capture at a 50-200 person European small-UAS manufacturer
  secondary: Product or integration lead preparing technical bid materials
  buyer: CEO or VP Sales at a drone OEM expanding from one domestic ministry to additional European buyers
startupThesis:
  nonObviousInsight: The scarce asset is no longer drone supply alone; it is procurement-ready interoperability evidence that can travel across ministries and software-led buying channels.
  beachhead: European ISR and FPV drone OEMs selling into 2-5 ministries and needing repeatable listing packets for multi-vendor procurement hubs tied to ministry command-and-control environments
  wedge: A reusable digital product passport that turns one drone platform's specs, battlefield references, security documents, and integration test results into buyer-specific tender and listing packets
  whyNowCatalyst: Intelic's BASE launch, built with ministry input and linked to Nexus command-and-control software, shows European drone buying is moving into interoperable software workflows now.
  ventureScalePath: Start with supplier-side procurement passports for drones, then expand into autonomous-systems qualification, shared test harnesses, post-award integration monitoring, and eventually the data rail connecting OEMs, primes, and ministries.
solution: The product connects to a drone OEM's existing technical documents, manuals, trial reports, and security paperwork and converts them into a structured catalog of capabilities. It generates buyer-specific response packs for different ministries, maintains an auditable version history, and highlights missing evidence before a tender is submitted. A lightweight test layer records compatibility results for common command-and-control and mission-data workflows so suppliers can prove interoperability instead of just asserting it. Over time, the platform becomes the system of record for what each product line can legally, technically, and operationally promise in each European market.
goToMarketSeed:
  firstCustomer: A sub-200-person European drone OEM with one deployed ISR platform and an active plan to respond to procurement requests from two additional ministries in the next 12 months
  buyingTrigger: Invitation to tender, request to list on a procurement hub, or requirement to show compatibility with ministry-selected command software
  currentAlternative: Manual bid-writing in Word and Excel plus ad hoc consultant support and one-off integration demos
  switchingReason: The passport reuses verified technical evidence across buyers, shortens capture cycles, and gives ministries cleaner interoperability proof than static PDFs.
  pricingHypothesis: Annual SaaS fee per product line plus paid interoperability test packages and premium secure data-room seats
