slug: drone-oem-procurement-passport
date: '2026-05-05'
currency: USD
modelStartMonth: '2026-06'
assumptions:
  - id: A1
    name: 模型起始月份
    value: '2026-06'
    unit: YYYY-MM
    source: '[BP date] + 创业财务经验法则，默认在计划定稿后的次月启动经营模型。'
  - id: A2
    name: 商业计费单元
    value: 处于采购通行证管理下的活跃产品线
    unit: 价值单元
    source: '[BP businessModel.unitOfValue]'
  - id: A3
    name: 期初活跃产品线
    value: '0'
    unit: 数量
    source: '[BP experimentRoadmap] 假设只有在首个付费试点成交后才开始确认收入。'
  - id: A4
    name: 每条活跃产品线的混合年收入
    value: '$81.6K'
    unit: 每条产品线年收入
    source: '[BP investorMemo.firstCustomer] 给出的年订阅加服务区间是 $50K-90K；[research.bottomUpSizingDrivers] 则用每条产品线约 $50K；模型取偏上中位数，因为早期通常会把落地和证据包一起卖。'
  - id: A5
    name: 月度 logo 等价流失率
    value: '1.0%'
    unit: 月百分比
    source: '创业财务经验法则：一旦嵌进采购流程，年度 B2B 工作流软件通常较粘；但这一点仍在 sanity flags 中标注为未验证。'
  - id: A6
    name: 第 1 年新增活跃产品线
    value: '4'
    unit: 数量
    source: '[BP gtm.funnelTargets] + [BP milestones 0–12 months]，要求拿下 2 个付费设计伙伴并完成早期真实投标转化。'
  - id: A7
    name: 第 2 年新增活跃产品线
    value: '6'
    unit: 数量
    source: '[BP milestones 12–24 months] 提出的目标是，在 5–7 家 OEM 中管理 8–10 条活跃产品线。'
  - id: A8
    name: 第 3 年新增活跃产品线
    value: '7'
    unit: 数量
    source: '[BP milestones 24–36 months] + [research.market.som]，目标是在第 3 年达到约 15 家客户或等价产品线。'
  - id: A9
    name: 毛利率爬坡
    value: 'Y1 COGS 50%-36%, Y2 35%-33%, Y3 32%-30%'
    unit: 占收入百分比
    source: '[BP businessModel.targetGrossMarginPct] 的 70% 目标，加上 [research.reportMemo.sensitivityCases] 对早期重服务落地压低毛利的提醒。'
  - id: A10
    name: 招聘计划
    value: 'M1 配置创始人 / CEO 和创始工程师；M4 配安全 / 平台负责人；M7 配产品 / 解决方案负责人；M13 配首位 GTM / 合作伙伴负责人；M19 配第二位工程师；M31 配第二位 GTM'
    unit: 时间表
    source: '[BP team] 覆盖前五位核心成员；额外销售岗位则按创业财务经验法则延后到验证后扩张阶段。'
  - id: A11
    name: 创始人 / CEO 现金薪酬
    value: '$120K'
    unit: 年化总薪酬
    source: pre-seed 阶段低于市场价的创始人薪酬经验值。
  - id: A12
    name: 创始工程师现金薪酬
    value: '$144K'
    unit: 年化总薪酬
    source: 欧洲国防 SaaS 资深产品工程师的创业期经验值。
  - id: A13
    name: 安全 / 平台负责人现金薪酬
    value: '$144K'
    unit: 年化总薪酬
    source: '[BP team] 里的岗位重要性 + 安全基础设施人才的创业期经验值。'
  - id: A14
    name: 产品 / 解决方案负责人现金薪酬
    value: '$120K'
    unit: 年化总薪酬
    source: '[BP team] + 资深解决方案 / 产品运营岗位的创业期经验值。'
  - id: A15
    name: GTM / 合作伙伴负责人现金薪酬
    value: '$108K'
    unit: 年化总薪酬
    source: '[BP team] + 由创始人协同推进的企业 GTM 负责人的创业期经验值。'
  - id: A16
    name: 额外工程师现金薪酬
    value: '$132K'
    unit: 年化总薪酬
    source: 在模板和安全验证后补充第二位工程师的创业期经验值。
  - id: A17
    name: 创始人成本分摊
    value: 70% 销售与市场 / 30% G&A
    unit: 分摊规则
    source: '[BP gtm] 显示前期以创始人主导外呼为主，因此按创业财务经验法则做功能分摊。'
  - id: A18
    name: 非人力经营成本爬坡
    value: 'S&M $3.5K/mo to $13.3K/mo; R&D/compliance/tooling $3.0K/mo to $7.6K/mo; G&A/legal/insurance $4.0K/mo to $7.5K/mo'
    unit: 月现金经营费用
    source: 面向国防工作流 SaaS 的创业财务经验值：需要差旅、安全工具和法务支出，但不需要重资本开支。
  - id: A19
    name: 现金转换假设
    value: EBITDA 近似经营现金流
    unit: 政策
    source: 创业财务经验法则：资本开支极小、无债务，而且落地服务现金流大体能对冲回款时点造成的营运资金扰动。
  - id: A20
    name: pre-seed 融资规模
    value: '$2.0M'
    unit: 融资金额
    source: '[BP fundingAsk.targetFundingRangeUsd] 给出的区间是 $2-3M；模型取 $2.0M，以覆盖模型烧钱并保留 6 个月缓冲，同时仍落在计划范围内。'
