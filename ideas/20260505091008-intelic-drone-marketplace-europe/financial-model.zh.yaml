scenarios:
  downside:
    description: 付费试点转化更慢、定制附件工作更重、定价更弱，导致公司始终停留在重服务模式。
    y3RevenueK: 669.2
    y3EbitdaK: -686.0
    cashLowPointK: 69.2
    keyAssumptionChanges:
      - 每条产品线的 ARPU 下滑到年化 $74.4K。
      - 月度流失率升到 1.5%。
      - 新增客户速度放慢约 25%。
      - 毛利率卡在约 65%，无法继续逼近 70%。
  base:
    description: 创始人主导销售，把围绕真实招标的试点转成可复用的年度产品线订阅，模板复用率持续改善。
    y3RevenueK: 979.4
    y3EbitdaK: -457.7
    cashLowPointK: 456.6
    keyAssumptionChanges:
      - ARPU 维持在每条活跃产品线年化 $81.6K 的混合收入。
      - 月度流失率稳定在 1.0%。
      - 产品线新增数分别为 Y1 的 4 条、Y2 的 6 条和 Y3 的 7 条。
      - 毛利率从 Y1 的高 50% 段，逐步爬升到 Y3 的约 69%。
  upside:
    description: 市场平台和伙伴转介绍缩短销售周期，而互操作证据比预期更快成为必选增值项。
    y3RevenueK: 1405.3
    y3EbitdaK: -136.3
    cashLowPointK: 954.1
    keyAssumptionChanges:
      - ARPU 升到每条产品线年化 $86.4K。
      - 月度流失率改善到 0.8%。
      - 伙伴渠道带动新增客户加速。
      - 随着落地流程更可重复，毛利率提升到低 70% 区间。
sensitivity:
  - variable: ARPU
    downsideCase: 每条活跃产品线年化混合收入 $74.4K
    baseCase: 每条活跃产品线年化混合收入 $81.6K
    upsideCase: 每条活跃产品线年化混合收入 $86.4K
    y3RevenueImpactK: -117.0
    cashImpactK: -92.0
  - variable: CAC
    downsideCase: '$65K 的混合 CAC，因为创始人外呼始终没有拿到渠道杠杆'
    baseCase: '$55.5K 的混合 CAC'
    upsideCase: '$45K 的混合 CAC，靠伙伴线索拉低获客成本'
    y3RevenueImpactK: -90.0
    cashImpactK: -125.0
  - variable: churn
    downsideCase: 第二次投标后试点无法转年约，月流失率升到 1.5%
    baseCase: 月流失率 1.0%
    upsideCase: 年度续约更稳定，月流失率改善到 0.8%
    y3RevenueImpactK: -72.0
    cashImpactK: -95.0
  - variable: sales cycle
    downsideCase: 试点转年约整体延后一到两个季度
    baseCase: 第二次投标复用在 6–9 个月内完成转化
    upsideCase: 转介绍和案例把周期缩短一个季度
    y3RevenueImpactK: -160.0
    cashImpactK: -180.0
  - variable: gross margin
    downsideCase: 重服务落地把毛利率压在约 65%
    baseCase: 毛利率走到 69%
    upsideCase: 模板和集成复用更快，毛利率上到 72%
    y3RevenueImpactK: 0.0
    cashImpactK: -85.0
  - variable: hiring pace
    downsideCase: 第二位工程师和第二位 GTM 各提前一到两个季度入职
    baseCase: 到 Q4Y3 维持 7 人精干团队
    upsideCase: 在达到验证节点前，额外延后一位非创始成员招聘
    y3RevenueImpactK: -20.0
    cashImpactK: -120.0
modelDiagram:
  title: 单位经济流转图
  mermaid: |
    flowchart LR
      Leads[目标 OEM 账户] --> Pilots[付费真实招标试点]
      Pilots --> ActiveLines[活跃产品线]
      ActiveLines --> Revenue[订阅收入 + 证据收入]
      Revenue --> GrossProfit[毛利润]
      GrossProfit --> Cash[期末现金]
modelSanity:
  - checkName: 收入引擎
    finding: 基础情形下的收入，来自活跃产品线从 4 条增长到约 15 条；每条产品线年化混合收入约 $81.6K，主要靠创始人围绕真实招标推进销售。
  - checkName: 必须跑顺的关键点
    finding: 付费试点必须在第二次投标复用后转成年订阅，否则 CAC 会高得让模型失去扩张性。
  - checkName: 模型失效条件
    finding: 如果国防部要求始终高度定制化，业务滑向 downside 情形，那么在拿到种子轮级验证前，现金会掉到约 $69K。
  - checkName: 下一轮融资证明
    finding: 当 Intelic 跑到 8–12 条活跃产品线、上线首个由伙伴背书的互操作证据能力，并把毛利率稳定推过 65% 时，才有资格讲下一轮。
sanityChecks:
  ruleOf40: Y3 增长率 78.5% + EBITDA 利润率 -46.7% = 31.8%
  burnMultiple: 1.06x in Y3 using EBITDA burn of $457.7K over Y2-to-Y3 revenue growth of $430.6K as a recurring-revenue proxy.
  revenuePerFte: $151K Y3 using $979.4K revenue over 6.5 average FTE (below the $200-400K SaaS benchmark).
  flags:
    - 相比研究里“每条产品线约 $50K”的基准，模型使用的混合 ARPU 偏高；只有在落地和互操作证据包能稳定带单时，这个假设才站得住。
    - 到 Y3 为止，人均收入仍低于典型 SaaS 基准，因此在可重复性被更强证明前，团队必须保持精简。
    - 月度流失率仍是经验假设，因为市场里还没有真实观察到续约和第二次投标复用。
    - 基础情形下现金虽然不为负，但 downside 情形几乎不给销售周期拖延或本地部署要求留缓冲。
