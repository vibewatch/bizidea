scenarios:
  downside:
    description: 付费试点转化更慢、需要更多定制附件工作且定价更弱，使公司持续偏服务化。
    y3RevenueK: 669.2
    y3EbitdaK: -686.0
    cashLowPointK: 69.2
    keyAssumptionChanges:
    - ARPU 下降至每条产品线年化 $74.4K。
    - 月度流失率升至 1.5%。
    - 新增客户速度放缓约 25%。
    - 毛利率停留在约 65%，而非逼近 70%。
  base:
    description: 创始人主导销售将真实投标试点转化为可重复的年度产品线订阅，同时模板复用持续改善。
    y3RevenueK: 979.4
    y3EbitdaK: -457.7
    cashLowPointK: 456.6
    keyAssumptionChanges:
    - ARPU 维持在每条活跃产品线混合年收入 $81.6K。
    - 月度流失率保持在 1.0%。
    - 新增产品线分别为 Y1 的 4 条、Y2 的 6 条和 Y3 的 7 条。
    - 毛利率从 Y1 的高 50% 段提升到 Y3 的约 69%。
  upside:
    description: 市场平台与合作方转介绍缩短销售周期，互操作性证据也更快成为必选增值项。
    y3RevenueK: 1405.3
    y3EbitdaK: -136.3
    cashLowPointK: 954.1
    keyAssumptionChanges:
    - ARPU 提升至每条产品线年化 $86.4K。
    - 月度流失率改善至 0.8%。
    - 新增客户通过合作渠道加速。
    - 随着导入可重复性更快改善，毛利率达到低 70% 区间。
sensitivity:
- variable: ARPU
  downsideCase: 每条活跃产品线年化混合收入 $74.4K
  baseCase: 每条活跃产品线年化混合收入 $81.6K
  upsideCase: 每条活跃产品线年化混合收入 $86.4K
  y3RevenueImpactK: -117.0
  cashImpactK: -92.0
- variable: CAC
  downsideCase: 混合 CAC 为 $65K，因为创始人主导外呼未获得渠道杠杆
  baseCase: 混合 CAC 为 $55.5K
  upsideCase: 通过合作方来源线索，混合 CAC 为 $45K
  y3RevenueImpactK: -90.0
  cashImpactK: -125.0
- variable: churn
  downsideCase: 当试点在第二次投标后无法转化时，月度 churn 为 1.5%
  baseCase: 月度 churn 为 1.0%
  upsideCase: 在高粘性年度续约下，月度 churn 为 0.8%
  y3RevenueImpactK: -72.0
  cashImpactK: -95.0
- variable: sales cycle
  downsideCase: 试点转年度订阅延后一到两个季度
  baseCase: 第二次投标复用可在 6-9 个月内转化
  upsideCase: 转介绍和验证案例将销售周期缩短一个季度
  y3RevenueImpactK: -160.0
  cashImpactK: -180.0
- variable: gross margin
  downsideCase: 服务密集型导入使 GM 停留在约 65%
  baseCase: GM 趋向 69%
  upsideCase: 随着模板和集成复用，GM 达到 72%
  y3RevenueImpactK: 0.0
  cashImpactK: -85.0
- variable: hiring pace
  downsideCase: 第二名工程师和第二名 GTM 提前一到两个季度入职
  baseCase: 到 Q4Y3 保持精简的 7 FTE 团队
  upsideCase: 有 1 个非创始岗位延后到验证里程碑达成后再招聘
  y3RevenueImpactK: -20.0
  cashImpactK: -120.0
modelDiagram:
  title: 单位经济性流程
  mermaid: "flowchart LR\n  Leads[目标 OEM 账户] --> Pilots[付费真实投标试点]\n  Pilots --> ActiveLines[活跃产品线]\n  ActiveLines --> Revenue[订阅 + 证据收入]\n  Revenue --> GrossProfit[毛利润]\n  GrossProfit --> Cash[期末现金]\n"
modelSanity:
- checkName: 收入引擎
  finding: 基准情景收入来自活跃产品线从 4 条增长到约 15 条，按每条约 $81.6K 的混合年收入，通过创始人主导的真实招标销售实现。
- checkName: 必须成立的条件
  finding: 付费试点必须在第二次投标复用后转化为年度订阅，否则 CAC 将过高，模型无法扩张。
- checkName: 模型失效条件
  finding: 如果各国国防部仍高度定制，且模型转入 downside 情景，则在达到可支持下一轮融资的验证点前，现金将降至约 $69K。
- checkName: 下一轮验证依据
  finding: 当 Intelic 展示出 8-12 条活跃产品线、首个由合作方支持的互操作性证据，以及可持续高于 65% 的毛利率时，下一轮融资才有充分依据。
sanityChecks:
  ruleOf40: Y3 growth 78.5% + EBITDA margin -46.7% = 31.8%
  burnMultiple: 1.06x in Y3 using EBITDA burn of $457.7K over Y2-to-Y3 revenue growth of $430.6K as a recurring-revenue proxy.
  revenuePerFte: $151K Y3 using $979.4K revenue over 6.5 average FTE (below the $200-400K SaaS benchmark).
  flags:
  - 模型依赖相对较高的混合 ARPU，高于 research 中每条产品线约 ~$50K 的估算；只有在导入和互操作性包能够稳定附加时，这一假设才成立。
  - 到 Y3 时，每 FTE 收入仍低于典型 SaaS 基准，因此在可重复性验证更强之前，应保持团队精简。
  - 月度 churn 只是经验假设，因为市场尚未观察到续约和第二次投标复用。
  - 基准情景下现金保持为正，但 downside 情景几乎不给销售周期延迟或本地部署需求留出空间。
