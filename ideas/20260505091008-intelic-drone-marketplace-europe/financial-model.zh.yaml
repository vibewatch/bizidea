slug: drone-oem-procurement-passport
date: '2026-05-05'
currency: USD
modelStartMonth: 2026-06
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-06
  unit: YYYY-MM
  source: '[BP date] + startup-finance heuristic，用于在计划定稿后的次月启动经营模型。'
- id: A2
  name: 商业单位
  value: 纳入采购通行证管理的活跃产品线
  unit: value unit
  source: '[BP businessModel.unitOfValue]'
- id: A3
  name: 起始活跃产品线数
  value: '0'
  unit: count
  source: '[BP experimentRoadmap] 假设只有在首个付费试点成交后才开始确认收入。'
- id: A4
  name: 每条活跃产品线的混合年收入
  value: $81.6K
  unit: annual revenue per line
  source: '[BP investorMemo.firstCustomer] 显示年度订阅加服务为 $50K-90K；[research.bottomUpSizingDrivers] 使用每条线约 ~$50K；模型取偏上的中位值，因为早期绑定了导入/证据包。'
- id: A5
  name: 月度 logo 等价流失率
  value: 1.0%
  unit: percent per month
  source: 针对嵌入采购运营后的高粘性年度 B2B 工作流软件的 startup-finance heuristic；在 sanity flags 中标记为尚未验证。
- id: A6
  name: 第 1 年新增活跃产品线
  value: '4'
  unit: count
  source: '[BP gtm.funnelTargets] + [BP milestones 0–12 months]，要求 2 个付费设计合作伙伴和早期真实投标转化。'
- id: A7
  name: 第 2 年新增活跃产品线
  value: '6'
  unit: count
  source: '[BP milestones 12–24 months]，目标是在 5-7 家 OEM 客户中实现 8-10 条活跃产品线。'
- id: A8
  name: 第 3 年新增活跃产品线
  value: '7'
  unit: count
  source: '[BP milestones 24–36 months] + [research.market.som]，目标是到第 3 年达到约 15 家客户或等效产品线数量。'
- id: A9
  name: 毛利率爬坡
  value: Y1 COGS 50%-36%, Y2 35%-33%, Y3 32%-30%
  unit: percent of revenue
  source: '[BP businessModel.targetGrossMarginPct] 70% 目标，加上 [research.reportMemo.sensitivityCases] 对早期服务密集型导入压低毛利率的提醒。'
- id: A10
  name: 招聘计划
  value: 创始人 CEO 和创始工程师在 M1 到位；安全/平台在 M4；产品/解决方案在 M7；首个 GTM/合作岗位在 M13；第二名工程师在 M19；第二名 GTM 在 M31
  unit: schedule
  source: '[BP team] 中前五个招聘岗位 + startup-finance heuristic，在验证后扩张前延后额外销售招聘。'
- id: A11
  name: 创始人 CEO 现金薪酬
  value: $120K
  unit: annual loaded salary
  source: pre-seed 阶段低于市场水平的创始人薪酬 startup-finance heuristic。
- id: A12
  name: 创始工程师现金薪酬
  value: $144K
  unit: annual loaded salary
  source: 面向欧盟防务 SaaS 资深产品工程师的 startup-finance heuristic。
- id: A13
  name: 安全 / 平台负责人现金薪酬
  value: $144K
  unit: annual loaded salary
  source: '[BP team] 的岗位关键性 + 面向安全基础设施人才的 startup-finance heuristic。'
- id: A14
  name: 产品 / 解决方案负责人现金薪酬
  value: $120K
  unit: annual loaded salary
  source: '[BP team] + 面向资深解决方案/产品运营负责人的 startup-finance heuristic。'
- id: A15
  name: GTM / 合作岗位现金薪酬
  value: $108K
  unit: annual loaded salary
  source: '[BP team] + 面向创始人辅助式企业 GTM 负责人的 startup-finance heuristic。'
- id: A16
  name: 额外工程师现金薪酬
  value: $132K
  unit: annual loaded salary
  source: 在模板和安全能力得到验证后增加第二名工程师的 startup-finance heuristic。
- id: A17
  name: 创始人成本分摊
  value: 70% sales & marketing / 30% G&A
  unit: allocation
  source: '[BP gtm] 创始人主导外呼 + pre-seed 阶段职能分摊的 startup-finance heuristic。'
- id: A18
  name: 非薪酬运营成本爬坡
  value: S&M $3.5K/mo to $13.3K/mo; R&D/compliance/tooling $3.0K/mo to $7.6K/mo; G&A/legal/insurance $4.0K/mo to $7.5K/mo
  unit: monthly cash opex
  source: 面向防务工作流 SaaS 的 startup-finance heuristic：包含差旅、安全工具和法务开销，但无重资本支出。
- id: A19
  name: 现金转换假设
  value: EBITDA approximates operating cash flow
  unit: policy
  source: startup-finance heuristic：资本开支极少、无债务，且因导入/服务现金大体抵消回款时点，营运资本扭曲有限。
- id: A20
  name: pre-seed 轮融资规模
  value: $2.0M
  unit: funding amount
  source: '[BP fundingAsk.targetFundingRangeUsd] 为 $2-3M；模型采用 $2.0M，以覆盖模型烧钱并保留 6 个月缓冲，同时仍在计划范围内。'
