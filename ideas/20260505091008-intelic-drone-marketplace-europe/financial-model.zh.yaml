modelStartMonth: '2026-06'
assumptions:
  - id: A1
    name: 模型起始月份
    value: '2026-06'
    unit: YYYY-MM
    source: '[BP date] + startup-finance heuristic to start the operating model in the month after plan finalization.'
  - id: A2
    name: 商业化单位
    value: 处于采购护照管理下的活跃产品线
    unit: value unit
    source: '[BP businessModel.unitOfValue]'
  - id: A3
    name: 期初活跃产品线
    value: '0'
    unit: count
    source: '[BP experimentRoadmap] assumes revenue starts only after first paid pilot closes.'
  - id: A4
    name: 每条活跃产品线的混合年收入
    value: '$81.6K'
    unit: annual revenue per line
    source: '[BP investorMemo.firstCustomer] shows $50K-90K annual subscription plus services; [research.bottomUpSizingDrivers] uses ~$50K per line; model uses the upper-midpoint because onboarding/evidence packages are bundled early.'
  - id: A5
    name: 月度 logo 等价流失率
    value: '1.0%'
    unit: percent per month
    source: 'Startup-finance heuristic for sticky annual B2B workflow software once embedded in procurement operations; marked as unproven in sanity flags.'
  - id: A6
    name: 第 1 年新增活跃产品线
    value: '4'
    unit: count
    source: '[BP gtm.funnelTargets] + [BP milestones 0–12 months] calling for 2 paid design partners and early live-bid conversions.'
  - id: A7
    name: 第 2 年新增活跃产品线
    value: '6'
    unit: count
    source: '[BP milestones 12–24 months] target of 8-10 active product lines across 5-7 OEM customers.'
  - id: A8
    name: 第 3 年新增活跃产品线
    value: '7'
    unit: count
    source: '[BP milestones 24–36 months] + [research.market.som] target of roughly 15 customers or equivalent product-line count by year 3.'
  - id: A9
    name: 毛利率爬坡
    value: Y1 COGS 50%-36%, Y2 35%-33%, Y3 32%-30%
    unit: percent of revenue
    source: '[BP businessModel.targetGrossMarginPct] 70% target plus [research.reportMemo.sensitivityCases] warning that early service-heavy onboarding suppresses margin before templates repeat.'
  - id: A10
    name: 招聘计划
    value: Founder CEO and founding engineer at M1; security/platform at M4; product/solutions at M7; first GTM/partnerships at M13; second engineer at M19; second GTM at M31
    unit: schedule
    source: '[BP team] for first five hires + startup-finance heuristic to delay extra sales hiring until post-proof expansion.'
  - id: A11
    name: 创始人/CEO 现金薪酬
    value: '$120K'
    unit: annual loaded salary
    source: 'Startup-finance heuristic for below-market founder pay at pre-seed.'
  - id: A12
    name: 创始工程师现金薪酬
    value: '$144K'
    unit: annual loaded salary
    source: 'Startup-finance heuristic for senior product engineer in EU defence SaaS.'
  - id: A13
    name: 安全/平台负责人现金薪酬
    value: '$144K'
    unit: annual loaded salary
    source: '[BP team] role criticality + startup-finance heuristic for security infrastructure talent.'
  - id: A14
    name: 产品/解决方案负责人现金薪酬
    value: '$120K'
    unit: annual loaded salary
    source: '[BP team] + startup-finance heuristic for senior solutions/product operator.'
  - id: A15
    name: GTM/合作伙伴岗位现金薪酬
    value: '$108K'
    unit: annual loaded salary
    source: '[BP team] + startup-finance heuristic for founder-assisted enterprise GTM lead.'
  - id: A16
    name: 额外工程师现金薪酬
    value: '$132K'
    unit: annual loaded salary
    source: 'Startup-finance heuristic for second engineering hire added after template and security proof.'
  - id: A17
    name: 创始人成本分摊
    value: 70% sales & marketing / 30% G&A
    unit: allocation
    source: '[BP gtm] founder-led outbound + startup-finance heuristic for pre-seed functional allocation.'
  - id: A18
    name: 非薪酬运营成本爬坡
    value: S&M $3.5K/mo to $13.3K/mo; R&D/compliance/tooling $3.0K/mo to $7.6K/mo; G&A/legal/insurance $4.0K/mo to $7.5K/mo
    unit: monthly cash opex
    source: 'Startup-finance heuristic for defence workflow SaaS with travel, security tooling, and legal overhead but no heavy capex.'
  - id: A19
    name: 现金转换假设
    value: EBITDA approximates operating cash flow
    unit: policy
    source: 'Startup-finance heuristic: minimal capex, no debt, and limited working-capital distortion because onboarding/services cash roughly offsets collections timing.'
  - id: A20
    name: pre-seed 轮融资规模
    value: '$2.0M'
    unit: funding amount
    source: '[BP fundingAsk.targetFundingRangeUsd] $2-3M range; model uses $2.0M to cover modeled burn and a 6-month buffer while staying within plan.'
