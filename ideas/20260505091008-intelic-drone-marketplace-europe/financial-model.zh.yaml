scenarios:
  downside:
    description: 付费试点转化更慢、附件工作更定制化、定价也更弱，导致公司长期偏服务化。
    y3RevenueK: 669.2
    y3EbitdaK: -686.0
    cashLowPointK: 69.2
    keyAssumptionChanges:
      - ARPU 降到每条产品线年化 $74.4K。
      - 月流失率升到 1.5%。
      - 新增客户速度放慢约 25%。
      - 毛利率停在约 65%，而不是继续逼近 70%。
  base:
    description: 创始人主导销售，能把绑定真实投标的试点转成可重复的年度产品线订阅，而且模板复用持续改善。
    y3RevenueK: 979.4
    y3EbitdaK: -457.7
    cashLowPointK: 456.6
    keyAssumptionChanges:
      - ARPU 维持在每条活跃产品线年化 $81.6K 的混合收入水平。
      - 月流失率维持在 1.0%。
      - 新增产品线分别为 Y1 的 4 条、Y2 的 6 条和 Y3 的 7 条。
      - 毛利率从 Y1 的高 50% 区间提升到 Y3 的约 69%。
  upside:
    description: 市场平台与伙伴转介绍缩短销售周期，而互操作证据也更快变成必买附加层。
    y3RevenueK: 1405.3
    y3EbitdaK: -136.3
    cashLowPointK: 954.1
    keyAssumptionChanges:
      - ARPU 提升到每条产品线年化 $86.4K。
      - 月流失率改善到 0.8%。
      - 通过伙伴渠道更快拿下新增客户。
      - 随着 onboarding 可重复性提升，毛利率进入低 70% 区间。
sensitivity:
  - variable: ARPU
    downsideCase: 每条活跃产品线年化混合收入 $74.4K
    baseCase: 每条活跃产品线年化混合收入 $81.6K
    upsideCase: 每条活跃产品线年化混合收入 $86.4K
    y3RevenueImpactK: -117.0
    cashImpactK: -92.0
  - variable: CAC
    downsideCase: 因创始人主导外呼缺乏渠道杠杆，混合 CAC 升至 $65K
    baseCase: 混合 CAC 为 $55.5K
    upsideCase: 在伙伴转介绍下，CAC 降到 $45K
    y3RevenueImpactK: -90.0
    cashImpactK: -125.0
  - variable: churn
    downsideCase: 当试点在第二次投标后无法转年付时，月流失率升到 1.5%
    baseCase: 月流失率 1.0%
    upsideCase: 由于年度续约更黏，月流失率改善到 0.8%
    y3RevenueImpactK: -72.0
    cashImpactK: -95.0
  - variable: sales cycle
    downsideCase: 试点转年付延后 1-2 个季度
    baseCase: 第二次投标复用会在 6-9 个月内转化
    upsideCase: 转介绍与证明点把周期缩短 1 个季度
    y3RevenueImpactK: -160.0
    cashImpactK: -180.0
  - variable: gross margin
    downsideCase: 偏服务化的 onboarding 让 GM 停在约 65%
    baseCase: GM 走到 69%
    upsideCase: 随模板与集成可重复性增强，GM 升到 72%
    y3RevenueImpactK: 0.0
    cashImpactK: -85.0
  - variable: hiring pace
    downsideCase: 第二位工程师和第二位 GTM 提前 1-2 个季度入职
    baseCase: 到 Q4Y3 保持 7 人精干团队
    upsideCase: 其中一个非创始岗位延后到证明点达成后再招
    y3RevenueImpactK: -20.0
    cashImpactK: -120.0
modelDiagram:
  title: 单位经济模型流转
  mermaid: |
    flowchart LR
      Leads[目标 OEM 账户] --> Pilots[付费真实投标试点]
      Pilots --> ActiveLines[活跃产品线]
      ActiveLines --> Revenue[订阅加证据服务收入]
      Revenue --> GrossProfit[毛利润]
      GrossProfit --> Cash[期末现金]
modelSanity:
  - checkName: 收入引擎
    finding: 基准情景下的收入，来自活跃产品线从 4 条增长到约 15 条，且每条线的混合年收入约为 $81.6K；销售动作以创始人主导、围绕真实招标推进。
  - checkName: 必须成立的前提
    finding: 付费试点必须在第二次投标复用后转成年订阅，否则 CAC 会过高，模型无法扩张。
  - checkName: 模型会在哪种情况下失效
    finding: 如果各国防部始终高度定制化，模型滑入 downside 情景，那么在达到 seed 证明点之前，现金最低只会剩下约 $69K。
  - checkName: 下一轮融资证明点
    finding: 当 Intelic 拿到 8-12 条活跃产品线、推出首个伙伴支持型互操作证据，并把毛利率稳定拉到 65% 以上时，才有资格讲下一轮融资故事。
sanityChecks:
  ruleOf40: Y3 growth 78.5% + EBITDA margin -46.7% = 31.8%
  burnMultiple: 1.06x in Y3 using EBITDA burn of $457.7K over Y2-to-Y3 revenue growth of $430.6K as a recurring-revenue proxy.
  revenuePerFte: $151K Y3 using $979.4K revenue over 6.5 average FTE (below the $200-400K SaaS benchmark).
  flags:
    - 这个模型依赖相对偏高的混合 ARPU，而研究里每条产品线的基准只有约 $50K；只有当 onboarding 和互操作证据包能稳定附加销售时，这个假设才站得住。
    - 到 Y3 为止，人均收入仍低于典型 SaaS 基准，因此在证明可重复性更强之前，团队必须继续保持精瘦。
    - 月流失率只是经验假设，因为市场上还没有看到真实的续约和“第二次投标复用”数据。
    - 基准情景下现金虽为正，但 downside 情景几乎不给销售周期滑延或本地部署要求留下任何缓冲。