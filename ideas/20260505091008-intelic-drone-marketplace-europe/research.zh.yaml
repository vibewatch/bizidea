  fiveForces:
    supplierPower:
      score: 3
      rationale: 核心投入要素是标准化 know-how、安全架构，以及接入无人机/C2 软件栈的能力；这些能力很专业，但并未被单一厂商垄断。
      sourceRefs:
        - 4
        - 14
        - 15
    buyerPower:
      score: 4
      rationale: 花钱的一方主要是少数几个国防部和处于扩张阶段的 OEM，而且采购通常绑定到单个招标，证明负担很重。
      sourceRefs:
        - 6
        - 20
    threatOfEntrants:
      score: 3
      rationale: 基础文档自动化并不难复制，但防务信任、模板深度和互操作证据历史都需要时间沉淀。
      sourceRefs:
        - 1
        - 4
        - 6
    threatOfSubstitutes:
      score: 5
      rationale: 手工标书堆、顾问、招标门户和通用采购套件已经存在；除非创业公司能证明强复用 ROI，否则它们都会是默认选择。
      sourceRefs:
        - 6
        - 17
        - 20
    competitiveRivalry:
      score: 4
      rationale: 直接类别的竞争者不多，但相邻的采购和防务软件平台数量很多、融资也更充足。
      sourceRefs:
        - 1
        - 17
        - 19
  pestle:
    - factor: 政治
      impact: positive
      point: 欧盟机构和多个成员国都在明确优先推动无人机与反无人机能力建设。
      sourceRefs:
        - 5
        - 7
        - 9
    - factor: 经济
      impact: positive
      point: 欧洲军费正在快速上升，预算压力也推动买方更快采购能力。
      sourceRefs:
        - 10
        - 13
    - factor: 技术
      impact: positive
      point: 互操作和开放架构标准化工作，正在提升结构化、机器可读证据的价值。
      sourceRefs:
        - 4
        - 14
        - 15
    - factor: 法律
      impact: negative
      point: 信息安全、供应安全以及各国执行不一致，会提高部署和工作流复杂度。
      sourceRefs:
        - 6
    - factor: 社会
      impact: positive
      point: 乌克兰战争带来的战场经验，已经显著降低防务无人机 adoption 的心理门槛，并压缩了决策时间。
      sourceRefs:
        - 9
        - 12
        - 22
  adoptionFrictionMatrix:
    - friction: 对敏感技术与安全数据的信任门槛
      severity: high
      affectedBuyer: CEO / 销售副总裁
      mitigation: 采用 EU 托管单租户部署、细粒度权限，并且不要求客户集中化涉密载荷数据。
      sourceRefs:
        - 6
        - 17
        - 21
    - friction: 互操作证明仍然高度依赖标准化知识和工程团队
      severity: high
      affectedBuyer: 产品 / 集成负责人
      mitigation: 先支持可导入的测试证据和对齐标准的模板，而不是一开始就全自动生成主张。
      sourceRefs:
        - 4
        - 14
        - 15
    - friction: 招标附件和自我声明仍然因买方而异
      severity: medium
      affectedBuyer: 攻单负责人
      mitigation: 先把会重复出现的证据核心做成产品，再叠加国家特定覆盖层和服务。
      sourceRefs:
        - 6
        - 20
    - friction: 现有采购工具已经覆盖通用工作流
      severity: medium
      affectedBuyer: 运营 / 采购相关方
      mitigation: 把产品定位成防务无人机护照的事实记录系统，接入通用套件，而不是取代它们。
      sourceRefs:
        - 17
        - 18
        - 19
market:
  tam:
    value: $9.0M
    rationale: 估算方法 = 120 家欧洲防务无人机 OEM/供应商 × 1.5 条活跃产品线 × 每条线约 $50k 的年度护照加测试合同。单位数量是基于 9-10 个国家供应分散、且供应商基础不断扩大的建模估算，并非直接披露的市场总量。
    isEstimate: true
    sourceRefs:
      - 1
      - 4
      - 22
  sam:
    value: $3.4M
    rationale: 约束条件为：45 家聚焦小型 ISR/FPV 系统、并积极向 2-5 个国防部销售的滩头 OEM × 1.5 条产品线 × 每条线约 $50k。
    isEstimate: true
    sourceRefs:
      - 1
      - 6
      - 22
  som:
    value: $1.0M
    rationale: 第 3 年可触达份额，建模为 15 家 OEM × 1.3 条产品线 × 每条线约 $50k；前提是创始人主导销售，先打穿几个活跃采购走廊。
    isEstimate: true
    sourceRefs:
      - 2
      - 20
      - 22
