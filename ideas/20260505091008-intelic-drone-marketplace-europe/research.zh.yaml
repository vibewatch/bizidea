  - point: 各国军队的采购速度仍可能慢于战场学习周期，这会拖慢软件采用。
    sourceRefs:
    - 12
  - point: 通用采购套件和既有门户，很容易把这条工作流里最简单的部分吃掉。
    sourceRefs:
    - 17
    - 18
    - 20
competitors:
- name: Intelic BASE
  stage: 成长期
  wedge: 与 Nexus 指挥控制软件绑定的买方侧无人机采购平台。
  pricing: 定制定价 / 未公开
  strength: 拿住了买方注意力和采购发现入口，还带着互操作叙事。
  weaknessVsUs: 没有明显解决“供应商如何跨多个平台和国防部生成中立、可重复使用证据”这件事。
  sourceRefs:
  - 1
  - 2
  - 3
- name: Govini
  stage: 既有厂商
  wedge: 面向政府买方的国防采购情报与流程软件。
  pricing: 定制企业合同
  strength: 证明国防软件预算已经成立，而且在采购流程可信度上很强。
  weaknessVsUs: 它站在政府侧、且更偏美国，并不是为欧洲中小无人机 OEM 的产品通行证而建。
  sourceRefs:
  - 19
- name: JAGGAER
  stage: 既有厂商
  wedge: 面向公共部门的采购与供应商管理平台。
  pricing: 定制企业报价
  strength: 合规流程、供应商接入和公共采购深度都很扎实。
  weaknessVsUs: 它解决的是通用采购流程，不是无人机专属互操作证据和国防级产品主张。
  sourceRefs:
  - 17
  - 18
- name: Mercell / 招标门户
  stage: 既有厂商
  wedge: 面向公共部门机会的招标发现和投标门户。
  pricing: 门户 / 招标访问模式
  strength: 离真实招标最近，也最清楚买方到底要求挂哪些附件。
  weaknessVsUs: 发现和提交层本身，不会长出一套可跨国防部复用的技术证据系统记录层。
  sourceRefs:
  - 20
- name: 内部投标材料堆 + 顾问
  stage: 现状默认方案
  wedge: 手工 Word / Excel / 共享盘流程，加上专业投标顾问支持。
  pricing: 内部 FTE + 服务支出
  strength: 可信、灵活，而且已经深嵌在真实国防交易周围。
  weaknessVsUs: 不会把可重复使用附件、兼容性证明或可版本化主张越积越厚地沉淀下来。
  sourceRefs:
  - 6
  - 20
regulatoryTechnicalConstraints:
- point: 国防买方可能要求对涉密信息处理和供应安全给出保证。
  sourceRefs:
  - 6
- point: 互操作预期正在朝开放架构和标准接口移动，而不是停留在供应商自说自话的主张上。
  sourceRefs:
  - 4
  - 14
  - 15
- point: STANAG 对齐认证等适航与集成要求，抬高了“什么样的证据才算可信”的门槛。
  sourceRefs:
  - 14
- point: 真实招标今天仍会要声明、审慎 / 保密表格和随买方变化的合规矩阵。
  sourceRefs:
  - 20
- point: 安全托管和供应商安全姿态会很早就成为购买标准，因为国防客户会拿创业公司去和成熟合规厂商对比。
  sourceRefs:
  - 17
  - 21
validationSignals:
- point: Intelic 已经推出欧洲国防无人机采购枢纽，把供给发现和作战软件连在一起。
  sourceRefs:
  - 1
  - 2
  - 3
- point: EDA 已经完成一个明确围绕军用无人系统互操作标准化的项目。
  sourceRefs:
  - 4
  - 15
- point: 欧盟委员会正在为数十个国防项目拨款，并明确把无人机和快速创新列为优先方向。
  sourceRefs:
  - 7
  - 8
  - 16
- point: 五个欧洲国家已经发起一项低成本无人机与反无人机联合计划（LEAP）。
  sourceRefs:
  - 9
- point: 2025 年欧洲军费显著上升，意味着“更快更好地花钱”这件事更急了。
  sourceRefs:
  - 10
- point: 法国公开承认其轻型无人机采购落后，并承诺到 2030 年重投资源补课。
  sourceRefs:
  - 12
- point: Tekever 在英国拿下合同并计划投资 £400m，也说明可服务生态里的供应商侧正在扩张。
  sourceRefs:
  - 22
- point: NSPA 框架的活跃动作，说明 NATO 渠道也在把小型 UAS 采购流程正规化。
  sourceRefs:
  - 21
openQuestions:
- OEM 会把这笔钱算作软件预算，还是只愿在真实投标周期里买打包服务？
- 哪两到三个国防部之间的附件结构重叠度足够高，能让复用真正有意义？
- 采购平台和 C2 厂商，会更愿意与中立通行证层合作，还是干脆自己补一套轻量功能？
- 最低可接受的部署姿态到底是什么：EU 单租户托管、客户自管密钥，还是必须本地部署？
