  wedge: 与 Nexus 指挥与控制软件相连的买方侧无人机市场平台。
  pricing: Custom / not publicly listed
  strength: 掌握买方注意力和采购发现入口，并具备互操作性叙事。
  weaknessVsUs: 并未明显解决跨多个枢纽和国防部的中立、可复用的供应商侧证据编制问题。
  sourceRefs:
  - 1
  - 2
  - 3
- name: Govini
  stage: incumbent
  wedge: 面向政府买方的防务采办情报与工作流软件。
  pricing: Custom enterprise contract
  strength: 证明防务软件预算真实存在，且具有强采办工作流可信度。
  weaknessVsUs: 偏政府侧且以美国为中心；并非为小型欧洲无人机 OEM 投标团队打造的产品通行证系统。
  sourceRefs:
  - 19
- name: JAGGAER
  stage: incumbent
  wedge: 公共部门采购与供应商管理平台。
  pricing: Custom enterprise quote
  strength: 具备强合规工作流、供应商导入能力和公共采购流程深度。
  weaknessVsUs: 它是通用采购工作流，而非面向无人机的互操作性证据和防务级产品主张。
  sourceRefs:
  - 17
  - 18
- name: Mercell / tender portals
  stage: incumbent
  wedge: 面向公共部门机会的招标发现与投标门户。
  pricing: Portal / tender access model
  strength: 直接贴近真实招标以及买方施加的具体附件负担。
  weaknessVsUs: 发现与提交层并不会形成一个面向跨国防部技术证据的可复用事实系统。
  sourceRefs:
  - 20
- name: In-house bid stack + consultants
  stage: status quo
  wedge: 手工 Word/Excel/共享盘流程，加上专业投标支持。
  pricing: Internal FTE + services spend
  strength: 值得信赖、灵活，而且已深度嵌入真实防务交易流程。
  weaknessVsUs: 无法在不同买方之间持续积累可复用的附件、兼容性证明或版本化主张。
  sourceRefs:
  - 6
  - 20
regulatoryTechnicalConstraints:
- point: 防务买方可能要求对涉密信息处理和供应安全提供保证。
  sourceRefs:
  - 6
- point: 互操作性预期正从定制化主张转向开放架构和标准接口。
  sourceRefs:
  - 4
  - 14
  - 15
- point: 像 STANAG 对齐认证这样的适航与集成要求，提高了何种证据才算可信的门槛。
  sourceRefs:
  - 14
- point: 真实招标仍要求声明、审慎/保密表格，以及因买方而异的合规矩阵。
  sourceRefs:
  - 20
- point: 安全托管和供应商安全姿态会很早变得重要，因为防务客户会将这家初创公司与成熟合规厂商进行比较。
  sourceRefs:
  - 17
  - 21
validationSignals:
- point: Intelic 推出了一个将供应发现与作战软件连接起来的欧洲防务无人机采购枢纽。
  sourceRefs:
  - 1
  - 2
  - 3
- point: EDA 完成了一个专门面向军用无人系统互操作性的标准化项目。
  sourceRefs:
  - 4
  - 15
- point: 欧盟委员会正在资助数十个防务项目，并明确优先支持无人机和快速创新。
  sourceRefs:
  - 7
  - 8
  - 16
- point: 五个欧洲国家启动了一个联合低成本无人机与反无人机项目（LEAP）。
  sourceRefs:
  - 9
- point: 2025 年欧洲军费显著上升，提高了更快、更有效支出的紧迫性。
  sourceRefs:
  - 10
- point: 法国公开承认其在轻型无人机采购上落后，并计划一直大力投资到 2030 年。
  sourceRefs:
  - 12
- point: Tekever 在英国的合同和 £400m 投资计划表明，可寻址生态中的供应商侧正在增长。
  sourceRefs:
  - 22
- point: NSPA 框架活动表明，NATO 渠道正在将小型无人机采购正式化。
  sourceRefs:
  - 21
openQuestions:
- OEM 会把这项预算归为软件，还是只会在真实捕单周期中为打包服务付费？
- 哪 2-3 个国防部共享足够高的附件结构，使复用率真正可观？
- 采购枢纽和 C2 厂商会偏好一个中立的通行证层，还是会自己构建基础供应商工具？
- 最低可接受的部署形态是什么：欧盟托管单租户、客户自管密钥，还是本地部署？
