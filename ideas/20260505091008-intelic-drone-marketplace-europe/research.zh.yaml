    - point: 通用采购套件和现有门户，会先吞掉最容易产品化的那部分工作流。
      sourceRefs:
        - 17
        - 18
        - 20
competitors:
  - name: Intelic BASE
    stage: 成长期
    wedge: 与 Nexus 指挥控制软件绑定的买方侧无人机市场平台。
    pricing: 定制报价 / 未公开
    strength: 占据买方注意力和采购发现入口，同时有互操作叙事加持。
    weaknessVsUs: 并没有明显解决“供应商一侧如何在多个枢纽和国防部之间撰写中立、可复用的证据材料”。
    sourceRefs:
      - 1
      - 2
      - 3
  - name: Govini
    stage: 成熟厂商
    wedge: 面向政府买方的防务采办情报与工作流软件。
    pricing: 定制企业合同
    strength: 证明防务软件预算真实存在，也建立了很强的采办工作流可信度。
    weaknessVsUs: 更偏政府侧、也更偏美国市场；并不是为小型欧洲无人机 OEM 攻单团队做的产品护照系统。
    sourceRefs:
      - 19
  - name: JAGGAER
    stage: 成熟厂商
    wedge: 面向公共部门的采购与供应商管理平台。
    pricing: 定制企业报价
    strength: 在合规工作流、供应商 onboarding 和公共采购流程深度上很强。
    weaknessVsUs: 它解决的是通用采购工作流，而不是无人机专属的互操作证据和防务级产品主张。
    sourceRefs:
      - 17
      - 18
  - name: Mercell / 招标门户
    stage: 成熟厂商
    wedge: 面向公共部门机会的招标发现与投标门户。
    pricing: 门户 / 招标访问模式
    strength: 最贴近真实招标，也最能看到买方到底压给供应商哪些附件负担。
    weaknessVsUs: 发现和提交层并不能沉淀一套跨国防部复用的技术证据事实记录系统。
    sourceRefs:
      - 20
  - name: 内部标书堆 + 顾问
    stage: 现状方案
    wedge: 依靠 Word、Excel、共享盘和专业顾问完成手工流程。
    pricing: 内部人力 + 服务开支
    strength: 值得信任、足够灵活，而且已经深度嵌入真实防务交易。
    weaknessVsUs: 无法在不同买方之间沉淀可复用的附件、兼容性证明和版本化主张。
    sourceRefs:
      - 6
      - 20
regulatoryTechnicalConstraints:
  - point: 防务买方可能要求供应商证明其在涉密信息处理和供应安全上的保障能力。
    sourceRefs:
      - 6
  - point: 互操作要求正在从定制化表述，转向开放架构和标准接口。
    sourceRefs:
      - 4
      - 14
      - 15
  - point: 适航与集成要求，例如与 STANAG 对齐的认证，会继续提高“什么样的证据才算可信”的门槛。
    sourceRefs:
      - 14
  - point: 真实招标仍要求各种声明、审慎/保密表格和合规矩阵，而且不同买方要求不同。
    sourceRefs:
      - 20
  - point: 安全托管与供应商安全姿态会很早变得关键，因为防务客户会拿创业公司和成熟合规厂商作比较。
    sourceRefs:
      - 17
      - 21
