  - point: Intelic 推出了一个把供应发现与作战软件连接起来的欧洲防务无人机采购枢纽。
    sourceRefs:
      - 1
      - 2
      - 3
  - point: EDA 完成了一个专门面向军用无人系统互操作的标准化项目。
    sourceRefs:
      - 4
      - 15
  - point: 欧盟委员会正在资助数十个防务项目，并明确优先支持无人机和快速创新。
    sourceRefs:
      - 7
      - 8
      - 16
  - point: 五个欧洲国家发起了联合低成本无人机与反无人机项目（LEAP）。
    sourceRefs:
      - 9
  - point: 2025 年欧洲军费大幅增长，进一步强化了“必须更快、更好地花钱”的紧迫感。
    sourceRefs:
      - 10
  - point: 法国公开承认其轻型无人机采购落后，并计划在 2030 年前大举投资。
    sourceRefs:
      - 12
  - point: Tekever 的英国合同和 £400m 投资计划，说明可服务生态中的供应商侧仍在增长。
    sourceRefs:
      - 22
  - point: NSPA 框架活动显示，NATO 渠道正在把小型 UAS 采购进一步制度化。
    sourceRefs:
      - 21
openQuestions:
  - OEM 会把这笔预算归类为软件，还是只愿在真实攻单周期里打包购买服务？
  - 哪 2-3 个国防部之间的附件结构足够接近，能让复用率真正成立？
  - 采购枢纽和 C2 厂商，会更愿意与中立护照层合作，还是自己做一套基础供应商工具？
  - 最低可接受的部署姿态到底是什么：EU 托管单租户、客户自管密钥，还是本地部署？
