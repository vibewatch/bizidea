  adoptionFrictionMatrix:
  - friction: 敏感技术和安全数据的信任门槛
    severity: high
    affectedBuyer: CEO / 销售副总裁
    mitigation: EU 托管单租户部署、细粒度权限，以及不要求集中存放涉密载荷数据。
    sourceRefs:
    - 6
    - 17
    - 21
  - friction: 互操作证明今天仍高度依赖标准和工程团队
    severity: high
    affectedBuyer: 产品 / 集成负责人
    mitigation: 先从可导入的测试证据和贴合标准的模板做起，而不是一开始就承诺全自动化主张生成。
