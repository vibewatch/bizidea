scenarios:
  downside:
    description: Slower paid-pilot conversion, more bespoke annex work, and weaker pricing keep the company service-heavy.
    y3RevenueK: 669.2
    y3EbitdaK: -686.0
    cashLowPointK: 69.2
    keyAssumptionChanges:
      - ARPU falls to $74.4K annualized per line.
      - Monthly churn rises to 1.5%.
      - New-customer adds slow by roughly 25%.
      - Gross margin plateaus near 65% instead of approaching 70%.
  base:
    description: Founder-led sales convert live-bid pilots into repeatable annual product-line subscriptions with improving template reuse.
    y3RevenueK: 979.4
    y3EbitdaK: -457.7
    cashLowPointK: 456.6
    keyAssumptionChanges:
      - ARPU stays at $81.6K blended annual revenue per active line.
      - Monthly churn holds at 1.0%.
      - Product-line adds land at 4 in Y1, 6 in Y2, and 7 in Y3.
      - Gross margin trends from the high-50s in Y1 to ~69% in Y3.
  upside:
    description: Marketplace and partner referrals shorten the sales cycle and interoperability evidence becomes a must-have add-on faster.
    y3RevenueK: 1405.3
    y3EbitdaK: -136.3
    cashLowPointK: 954.1
    keyAssumptionChanges:
      - ARPU rises to $86.4K annualized per line.
      - Monthly churn improves to 0.8%.
      - New-customer adds accelerate through partner channels.
      - Gross margin reaches the low-70s as onboarding repeatability improves faster.
sensitivity:
  - variable: ARPU
    downsideCase: '$74.4K annualized blended revenue per active line'
    baseCase: '$81.6K annualized blended revenue per active line'
    upsideCase: '$86.4K annualized blended revenue per active line'
    y3RevenueImpactK: -117.0
    cashImpactK: -92.0
  - variable: CAC
    downsideCase: '$65K blended CAC because founder-led outreach does not get channel leverage'
    baseCase: '$55.5K blended CAC'
    upsideCase: '$45K blended CAC with partner-sourced leads'
    y3RevenueImpactK: -90.0
    cashImpactK: -125.0
  - variable: churn
    downsideCase: '1.5% monthly churn when pilots fail to convert after the second bid'
    baseCase: '1.0% monthly churn'
    upsideCase: '0.8% monthly churn with sticky annual renewals'
    y3RevenueImpactK: -72.0
    cashImpactK: -95.0
  - variable: sales cycle
    downsideCase: 'Pilot-to-annual conversion slips by one to two quarters'
    baseCase: 'Second-bid reuse converts within 6-9 months'
    upsideCase: 'Referrals and proof points shorten the cycle by one quarter'
    y3RevenueImpactK: -160.0
    cashImpactK: -180.0
  - variable: gross margin
    downsideCase: 'Service-heavy onboarding holds GM near 65%'
    baseCase: 'GM trends to 69%'
    upsideCase: 'GM reaches 72% as templates and integrations repeat'
    y3RevenueImpactK: 0.0
    cashImpactK: -85.0
  - variable: hiring pace
    downsideCase: 'Second engineer and second GTM hire come one to two quarters earlier'
    baseCase: 'Lean 7-FTE team by Q4Y3'
    upsideCase: 'One non-founder hire is delayed until proof milestones are met'
    y3RevenueImpactK: -20.0
    cashImpactK: -120.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Leads[Target OEM accounts] --> Pilots[Paid live-bid pilots]
      Pilots --> ActiveLines[Active product lines]
      ActiveLines --> Revenue[Subscription + evidence revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Ending cash]
modelSanity:
  - checkName: Revenue engine
    finding: Base-case revenue is driven by growth from 4 to about 15 active product lines at roughly $81.6K blended annual revenue per line through founder-led live-tender sales.
  - checkName: Must go right
    finding: Paid pilots have to convert into annual subscriptions after a second-bid reuse event or CAC stays too high for the model to scale.
  - checkName: Model breaks if
    finding: If ministries remain bespoke and the model shifts to the downside case, cash falls to about $69K before seed-ready proof points are reached.
  - checkName: Next-round proof
    finding: The next round is justified once Intelic shows 8-12 active product lines, first partner-backed interoperability evidence, and gross margin sustainably above 65%.
sanityChecks:
  ruleOf40: Y3 growth 78.5% + EBITDA margin -46.7% = 31.8%
  burnMultiple: 1.06x in Y3 using EBITDA burn of $457.7K over Y2-to-Y3 revenue growth of $430.6K as a recurring-revenue proxy.
  revenuePerFte: $151K Y3 using $979.4K revenue over 6.5 average FTE (below the $200-400K SaaS benchmark).
  flags:
    - The model relies on a high blended ARPU relative to research's ~$50K line estimate, justified only if onboarding and interoperability packages attach consistently.
    - Revenue per FTE remains below typical SaaS benchmarks by Y3, which argues for holding the team lean until proof of repeatability is stronger.
    - Monthly churn is a heuristic because renewals and second-bid reuse have not yet been observed in the market.
    - Cash stays positive in the base case, but the downside case leaves almost no room for sales-cycle slippage or an on-prem deployment requirement.
