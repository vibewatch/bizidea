  validationPlan:
  - priority: high
    question: Will a sub-200-person drone OEM buy software budget for this, or only project services around a live bid?
    evidenceToGather: Interview 8-10 OEM capture leaders with at least one active cross-border tender; get current spend on consultants, bid prep time, and security-review blockers.
  - priority: high
    question: Which two or three ministries share enough annex structure to create 60-80% evidence reuse?
    evidenceToGather: Collect real tender packs from at least three European buyers and map overlapping fields, declarations, and interoperability asks.
  - priority: medium
    question: Will marketplaces or C2 vendors partner with a neutral supplier passport layer?
    evidenceToGather: Run design-partner discussions with one procurement hub and two mission-software vendors around supplier onboarding APIs and data-sharing boundaries.
  - priority: medium
    question: What hosting and deployment posture is the minimum credible bar?
    evidenceToGather: Ask prospects to rank EU-hosted single-tenant, customer-managed keys, and on-prem requirements; verify whether unclassified but sensitive technical data can leave existing systems.
