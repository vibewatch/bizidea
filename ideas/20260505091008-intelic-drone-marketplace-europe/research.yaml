  wedge: Defense acquisition intelligence and workflow software for government buyers.
  pricing: Custom enterprise contract
  strength: Proves real defence-software budgets and strong acquisition-workflow credibility.
  weaknessVsUs: Government-side and US-centric; not built as a product passport system for small European drone OEM capture teams.
