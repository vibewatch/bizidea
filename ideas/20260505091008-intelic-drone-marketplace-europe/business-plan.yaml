slug: drone-oem-procurement-passport
date: '2026-05-05'
executiveSummary: >-
  This company should start as the supplier-side procurement passport for sub-200-person European ISR and FPV drone OEMs that are expanding beyond one home-market ministry. The immediate pain is not drone discovery; it is the repeated, engineer-heavy work of assembling ministry-specific technical annexes, security documentation, and interoperability proof every time a new buyer appears. Intelic's BASE launch is useful validation because it shows procurement is moving into software-led comparison workflows, but the researched gap remains the supplier evidence layer underneath that workflow. The first product should therefore focus on reusable product passports, buyer-specific tender packet generation, and auditable interoperability evidence for a small set of recurring ministry corridors rather than on a broad marketplace or generic proposal software. Go-to-market should be founder-led and service-assisted around live tenders, because the research shows trust, deployment posture, and bespoke annexes are the main early adoption blockers. The strongest proof point is a first customer that cuts submission-prep time materially and reuses a majority of evidence across a second ministry bid without pulling engineering into the full process again. The biggest disconfirming risk is that ministries remain too bespoke for software reuse to matter, which would turn the business into low-margin services. Market demand is real, but the initial software TAM is modest and direct willingness to pay for a standalone passport product is still unproven, so the company should be run as a narrow wedge with explicit expansion into testing, ongoing compatibility evidence, and broader autonomous-systems qualification only after beachhead pull is demonstrated.
problem:
  - Cross-border defence-drone sales force small OEMs to rebuild technical annexes, security declarations, and interoperability claims for each ministry from Word, Excel, PDFs, and engineer screenshots.
  - Buyer-side marketplaces, tender portals, and consultants help discover or submit bids, but they do not create a reusable, auditable system of record for supplier evidence across ministries.
solution:
  - Create a procurement passport that ingests a drone product line's specs, manuals, references, security paperwork, and test results into a structured evidence model with version control and permissions.
  - Generate ministry-specific listing and tender packets from that evidence core and attach standards-aligned interoperability proof for common C2 and mission-data workflows.
whyWeWin:
  - The wedge is narrower than a marketplace: win the supplier workflow that recurs before every cross-border bid, where reuse and time savings are measurable after the second ministry sale attempt.
  - Defensibility comes from accumulated annex mappings, interoperability test history, and buyer feedback across multiple ministries and software environments, not from generic document automation.
strategicChoices:
  beachhead: Sub-200-person European ISR and FPV drone OEMs with one deployed platform and active plans to bid into two to five European ministries within the next 12 months.
  wedgeRationale: This segment has urgent pain, a visible buying trigger, and enough product complexity to value reusable evidence, while still lacking the internal compliance and bid-operations teams that larger primes can staff themselves.
  sequencingRationale: Start with passport ingestion and tender-packet generation for the overlapping 60-80% evidence core, add service-assisted onboarding to clear trust and annex variability, then layer interoperability testing and partner integrations once the evidence model is trusted in live bids.
  notYet:
    - Buyer-side marketplace aggregation or tender discovery
    - Classified-data workflows that require full on-prem handling from day one
    - Broad autonomous-systems coverage beyond small drone product lines
    - Full replacement of generic procurement suites used by ministries or primes
market:
  tam: $9.0M estimated annual European defence-drone supplier passport market
  sam: $3.4M estimated annual beachhead market across roughly 45 small ISR/FPV OEMs selling into multiple ministries
  som: $1.0M estimated reachable year-3 revenue at roughly 15 OEM customers
  segments:
    - European small-UAS OEM capture teams selling across ministries
    - Autonomous-systems primes or integrators managing multi-country drone bids
  buyingProcess: The likely motion starts when an OEM is invited to tender, pre-qualify, or list on a procurement hub and realizes it must assemble technical, security, and interoperability evidence fast. The economic buyer is usually the CEO, VP Sales, or head of business development, with the capture lead and product or integration lead driving evaluation.
product:
  mvp: Build a single-tenant EU-hosted passport for one drone product line that imports existing documents, maps them to a structured evidence schema, and generates two buyer-specific submission packs with permissions, audit history, and gap flags. Include manual upload of interoperability test evidence rather than automated testing in v1.
  sixMonth: Expand from one to three ministry templates, add secure collaborator roles and reusable compliance matrices, and prove at least one second-bid reuse case with the first two customers.
  twelveMonth: Add standards-aligned interoperability evidence objects, partner integrations with one C2 or mission-software environment, and a services playbook that keeps onboarding repeatable.
  twentyFourMonth: Extend the passport into ongoing compatibility monitoring, adjacent autonomous-systems qualification workflows, and neutral supplier onboarding APIs for marketplaces or framework channels.
  keyBets:
    - The repeatable evidence core across ministries is large enough to drive clear ROI before heavy customization.
    - OEMs will accept EU-hosted single-tenant deployment for unclassified but sensitive technical data.
    - Interoperability proof becomes a buying requirement early enough to justify a premium layer beyond document management.
gtm:
  wedge: Sell a service-assisted procurement passport engagement tied to one live cross-border tender or marketplace-listing event for a single product line, then convert to annual subscription once reuse is proven on the next bid.
  channels:
    - Founder-led outbound to CEOs, VP Sales, and heads of business development at expansion-stage drone OEMs
    - Referrals from C2 vendors, drone-stack suppliers, and integration consultancies involved in interoperability proof
    - Supplier-onboarding partnerships with procurement hubs or NATO-style framework channels
  funnelTargets: 10-15 target OEM accounts per quarter -> 30-40% qualified live-bid conversations -> 20-30% paid pilots -> 60%+ pilot-to-annual conversion after a second reuse event
  pricing: Annual SaaS fee per active product line plus paid onboarding and interoperability evidence packages; this matches the buyer trigger, aligns value to each revenue-generating platform, and offsets early service intensity.
businessModel:
  revenueStreams:
    - Annual subscription per active drone product line
    - Paid onboarding and ministry-template setup
    - Interoperability evidence or testing packages
    - Premium secure collaboration or data-room seats
  unitOfValue: Active product line under procurement passport
  targetGrossMarginPct: 70
  expansionLevers:
    - Add more product lines within the same OEM
    - Add ministry corridors and annex libraries that increase reuse
    - Sell interoperability evidence packages tied to partner software environments
    - Expand from drones into adjacent autonomous-systems qualification once schemas are trusted
strategyMap:
  northStarMetric: Number of active product lines renewed after being reused in a second ministry bid
  inputMetrics:
    - Days from kickoff to submission-ready packet
    - Percentage of evidence reused across bids
    - Pilot-to-annual conversion rate
    - Number of ministry templates and annex mappings with live usage
    - Number of partner-supported interoperability evidence packages delivered
  moatsToBuild:
    - Ministry-specific annex and declaration mapping library
    - Versioned interoperability evidence corpus linked to real software environments
    - Buyer-feedback data on which claims and artifacts accelerate qualification
  killCriteria:
    - Fewer than 3 of the first 10 qualified OEM prospects will pay for a live-bid pilot
    - Median evidence reuse stays below 30% after two ministry workflows
    - More than half of serious prospects require on-prem or classified-data handling before MVP value is proven
  mermaid: |
    flowchart LR
      Wedge[Live tender passport for one drone line] --> MVP[Structured evidence and packet generation]
      MVP --> Proof[Shorter bid prep and higher evidence reuse]
      Proof --> Expansion[More lines, more ministries, interoperability layer]
investorMemo:
  verdict:
    call: Watch
    conviction: Strong workflow pain and credible timing, but the initial market is small and software willingness to pay is not yet proven.
    whyBelieve: Intelic validates the shift to software-led drone procurement while the research consistently shows supplier-side qualification work remains manual, fragmented, and expensive.
    whyDoubt: If ministry requirements stay highly bespoke or customers only buy services during live bids, the business may not support venture-scale software economics.
    nextDiligence: Confirm two paid design partners that each have an active cross-border tender and will measure evidence reuse and cycle-time reduction across a second bid.
  firstCustomer:
    title: Head of business development at a 50-200 person European ISR drone OEM
    profile: Company has one deployed drone platform, sells to one home-market ministry today, and is pursuing listing or tender responses with two additional European buyers in the next year.
    trigger: Invitation to tender, framework pre-qualification, or procurement-hub onboarding that requires technical annexes, security declarations, and interoperability proof on short notice.
    buyer: CEO or VP Sales
    initialContract: $25k-60k paid pilot for one product line and one live bid, converting to $50k-90k annual subscription plus services once the next bid reuses the same evidence core.
  mustBeTrue:
    - At least 60% of required supplier evidence is reusable across two target ministry workflows for the same product line.
    - OEM capture leaders will pay from sales or capture budgets before a procurement hub mandates the passport.
    - EU-hosted single-tenant deployment is acceptable for the majority of early customers handling unclassified but sensitive material.
    - Interoperability evidence is becoming part of supplier qualification rather than remaining only a post-award integration task.
    - A neutral passport layer can partner with marketplaces and C2 vendors instead of being displaced by them.
  diligenceQuestions:
    - Which two ministries share the highest overlap in annexes and declarations for small-UAS bids?
    - What do OEMs spend today on consultants, engineering time, and bid operations for one cross-border submission?
    - How often does a second ministry bid happen within 12 months for the target OEM profile?
    - What deployment posture do the first five serious prospects require before uploading sensitive technical evidence?
    - Will Intelic, framework operators, or C2 vendors expose onboarding points that make the passport part of their workflow?
  riskHeatmap:
    - risk: Ministry requirements are too bespoke for meaningful software reuse
      likelihood: High
      impact: High
      leadingIndicator: Early pilots show less than 30% reusable evidence between two ministry submission packs.
      mitigation: Target the most overlapping ministry corridors first and keep country-specific overlays service-assisted until reuse patterns are proven.
    - risk: Customers buy one-off services but not annual software
      likelihood: Medium
      impact: High
      leadingIndicator: Pilots close only when bundled with heavy manual support and fail to convert after the next bid.
      mitigation: Price the pilot around a single product line and require a subscription conversion path tied to the second reuse event.
    - risk: Defence data trust blocks adoption
      likelihood: Medium
      impact: High
      leadingIndicator: More than half of qualified prospects require on-prem deployment or refuse to upload even unclassified technical evidence.
      mitigation: Start with EU-hosted single-tenant, granular permissions, customer-managed keys where needed, and workflows that omit classified payload data.
    - risk: Marketplaces or generic procurement suites absorb the feature
      likelihood: Medium
      impact: Medium
      leadingIndicator: Prospects view the product as redundant once Intelic, JAGGAER, or tender portals add supplier document templates.
      mitigation: Own the neutral evidence model and interoperability corpus that can plug into multiple platforms rather than compete on generic workflow.
operatingAssumptions:
  - assumption: The beachhead OEM can justify a $25k-60k initial spend from capture or sales budgets tied to a live bid.
    basis: research.yaml
    validationTest: Interview 8-10 capture leaders with active tenders and secure at least 2 paid pilots at the proposed pricing band.
    decisionImpact: If false, narrow the offer to higher-priced services or reconsider software-first venture economics.
  - assumption: EU-hosted single-tenant deployment is sufficient for most early unclassified procurement evidence workflows.
    basis: research.yaml
    validationTest: In discovery, ask the first 10 qualified prospects to rank EU-hosted single-tenant, customer-managed keys, and on-prem as go/no-go requirements.
    decisionImpact: If false, product roadmap and funding need shift toward heavier infrastructure and slower sales cycles.
  - assumption: The first two or three ministry corridors share enough structure to support a reusable evidence schema.
    basis: idea.yaml
    validationTest: Collect and map real tender packs from at least three target buyers and quantify field-level overlap before full template buildout.
    decisionImpact: If false, focus on service-led bid support or choose a narrower corridor with stronger standardization.
  - assumption: Interoperability evidence will command premium pricing beyond document assembly alone.
    basis: operator judgment
    validationTest: Test willingness to pay for a paid interoperability evidence package with design partners after packet-generation ROI is proven.
    decisionImpact: If false, keep testing as a partner-enabled add-on and do not hire a dedicated interoperability team early.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Interview 10 target OEM capture leaders and collect 3 live or recent tender packs from different ministries.
    hypothesis: The same product line has a reusable evidence core large enough to support software value before custom services dominate.
    successMetric: At least 60% overlapping evidence fields across 2 priority ministry workflows and 8 of 10 interviews rating the pain as urgent.
    owner: Founder CEO
  - horizon: 0–90 days
    experiment: Sell 2 paid design-partner pilots for one active product line each.
    hypothesis: OEMs will pay pre-budgeted capture dollars for a service-assisted passport tied to a live bid.
    successMetric: Two signed pilots in the $25k-60k range with explicit subscription conversion terms.
    owner: Founder CEO
  - horizon: 3–6 months
    experiment: Deliver v1 packet generation for 2 ministry templates and measure submission-prep time reduction.
    hypothesis: Structured evidence and template reuse can cut bid-prep time by at least 40% versus the customer's prior process.
    successMetric: Median time-to-packet reduced by 40%+ across first pilots.
    owner: Founding eng
  - horizon: 3–6 months
    experiment: Test EU-hosted single-tenant deployment and granular permissions with first customers' security stakeholders.
    hypothesis: Security objections can be cleared without on-prem deployment for most early deals.
    successMetric: At least 70% of qualified prospects accept the default hosting posture.
    owner: Security / platform lead
  - horizon: 6–12 months
    experiment: Launch one partner-backed interoperability evidence package with a C2 or mission-software vendor.
    hypothesis: Adding standards-aligned compatibility proof increases conversion and expansion more than document generation alone.
    successMetric: 50%+ of active customers adopt the evidence package or cite it in renewal decisions.
    owner: Product lead
  - horizon: 12–18 months
    experiment: Pilot supplier-onboarding integration with one procurement hub or framework channel.
    hypothesis: Indirect distribution can lower CAC once the passport is accepted as neutral onboarding infrastructure.
    successMetric: One signed partner workflow producing at least 3 qualified supplier introductions.
    owner: Founder CEO
operations:
  - EU-hosted single-tenant deployment with auditable permissions and customer-managed key option for sensitive but unclassified data
  - Structured evidence taxonomy and ministry-template library managed as a controlled product asset, not ad hoc customer work
  - Services playbook for onboarding, annex mapping, and security review to keep early deployments repeatable
  - Partner process for capturing interoperability evidence from C2 vendors, test ranges, or integration consultancies
team:
  - role: Founding eng
    startTiming: Month 0
    rationale: Owns core evidence model, packet generation, and secure document architecture needed for the first paid pilots.
  - role: Founder CEO
    startTiming: Month 0
    rationale: Must run founder-led sales into OEM executives, handle design-partner discovery, and shape ministry corridor selection.
  - role: Security / platform lead
    startTiming: Month 3
    rationale: Needed early because defence deployment posture and access controls are core adoption blockers, not back-office tasks.
  - role: Product / solutions lead
    startTiming: Month 6
    rationale: Translates live tender workflows into repeatable templates and reduces founder dependence in onboarding.
  - role: Partnerships lead
    startTiming: Month 12
    rationale: Only makes sense after customer proof exists and the company is ready to sign workflow partnerships with marketplaces or C2 vendors.
milestones:
  - horizon: 0–12 months
    items:
      - Sign 2 paid design partners and deliver passport workflows for at least 2 ministry templates.
      - Prove 40%+ submission-prep time reduction and 50%+ evidence reuse on a second bid for at least 1 customer.
      - Establish EU-hosted single-tenant deployment, permissions, and audit controls acceptable to first customers.
  - horizon: 12–24 months
    items:
      - Reach 8-10 active product lines under management across 5-7 OEM customers.
      - Launch first partner-backed interoperability evidence package and first procurement-hub onboarding integration.
      - Show gross margin trend toward 70% by reducing custom onboarding time per customer.
  - horizon: 24–36 months
    items:
      - Reach the modeled $1.0M SOM with roughly 15 OEM customers or equivalent product-line count.
      - Expand beyond drones into adjacent autonomous-systems qualification only if the same evidence model carries over.
      - Decide whether to remain a neutral supplier infrastructure layer or deepen into platform-led distribution based on partner traction.
risks:
  - risk: Ministry requirements remain too bespoke for scalable software reuse
    likelihood: High
    impact: High
    mitigation: Constrain launch to the highest-overlap corridors, quantify reuse before broad rollout, and keep customization services tightly scoped.
  - risk: Direct willingness to pay for annual software is weaker than willingness to buy bid support services
    likelihood: Medium
    impact: High
    mitigation: Sell paid pilots with explicit renewal gates and avoid hiring ahead of proof that second-bid reuse converts into subscriptions.
  - risk: Data-security and hosting demands lengthen sales cycles beyond pre-seed capacity
    likelihood: Medium
    impact: High
    mitigation: Default to single-tenant EU hosting, develop customer-managed key options, and exclude classified workflows from the initial product promise.
  - risk: Adjacent platforms add enough supplier tooling to compress the wedge
    likelihood: Medium
    impact: Medium
    mitigation: Differentiate on cross-platform neutrality, interoperability evidence, and accumulated annex mappings rather than generic supplier onboarding.
fundingAsk:
  stage: pre-seed
  targetFundingRangeUsd: $2-3M
  runwayMonths: 18
  useOfFundsSummary: Fund 18 months to win 2-3 paid design partners, build the secure passport core, validate hosting posture, prove second-bid reuse, and earn the right to expand into interoperability evidence and channel partnerships.
