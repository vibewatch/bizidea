problem: 欧洲各国国防部正在努力更快采购无人机，但供应基础分散在众多制造商之间，而且每个买方都会要求不同的规格说明、集成证据和合规叙述。对于一家 50-200 人的无人机 OEM 来说，每新增一个国防部客户，都像是一次定制化的商机攻坚项目，只能靠 PDF、电子表格和工程截图拼接完成。这会拖慢授标进度，耗尽稀缺的技术人才，并让买方难以信任所谓的互操作性声明。
targetUser:
  primary: 一家 50-200 人规模的欧洲小型无人机制造商中的业务拓展或投标捕获负责人
  secondary: 负责准备技术投标材料的产品或集成负责人
  buyer: 正在从单一本土国防部扩展至更多欧洲买方的无人机 OEM 的 CEO 或销售副总裁
startupThesis:
  nonObviousInsight: 稀缺资产已不再只是无人机供给本身，而是能够在不同国防部与软件化采购渠道之间流转的、具备采购就绪度的互操作性证据。
  beachhead: 面向向 2-5 个国防部销售、且需要为与国防部指挥控制环境相连的多供应商采购枢纽准备可重复上架材料包的欧洲 ISR 与 FPV 无人机 OEM
  wedge: 一个可复用的数字产品通行证，把某款无人机平台的规格、战场参考、安全文档和集成测试结果转化为面向不同买方的招标与上架材料包
  whyNowCatalyst: Intelic 推出 BASE，并与 Nexus 指挥与控制软件相连且有国防部参与，这表明欧洲无人机采购正在当下转向可互操作的软件工作流。
  ventureScalePath: 先从无人机供应商侧的采购通行证切入，再扩展到自主系统资质认证、共享测试工具、授标后的集成监测，并最终成为连接 OEM、主承包商与国防部的数据轨。
solution: 该产品连接到无人机 OEM 现有的技术文档、手册、试验报告和安全材料，并将其转换为结构化能力目录。它可以为不同国防部生成买方定制化响应材料包，维护可审计的版本历史，并在提交招标前标出缺失证据。一个轻量测试层会记录常见指挥控制与任务数据工作流的兼容性结果，使供应商能够证明互操作性，而不只是口头声称。随着时间推移，这个平台将成为每条产品线在各个欧洲市场可以在法律、技术和作战层面作出何种承诺的事实系统。
goToMarketSeed:
  firstCustomer: 一家不足 200 人的欧洲无人机 OEM，拥有一个已部署的 ISR 平台，并计划在未来 12 个月内回应另外两个国防部的采购请求
  buyingTrigger: 收到招标邀请、被要求在采购枢纽上架，或被要求展示与国防部选定指挥软件的兼容性
  currentAlternative: 使用 Word 和 Excel 手工写标书，辅以临时顾问支持和一次性集成演示
  switchingReason: 该通行证能在不同买方之间复用经过验证的技术证据，缩短捕获周期，并向国防部提供比静态 PDF 更清晰的互操作性证明。
  pricingHypothesis: 按产品线收取年度 SaaS 费用，另加付费互操作性测试包和高级安全数据室席位
whyNow:
- point: 如今已有真实的软件市场让各国国防部比较多家无人机供应商，因此供应商数据必须从定制化资料转为结构化、可复用资产。
  signalRefs:
  - Software-led military buying is starting
  sourceRefs:
  - 1
- point: 互操作性已经从授标后的集成问题转变为采购工作流本身的一部分，提升了机器可读证明的价值。
  signalRefs:
  - Interoperability is moving into procurement
  sourceRefs:
  - 1
- point: 随着来自 10 个国家的制造商进入同一采购渠道，较小的 OEM 需要软件来跨境规范化技术证据。
  signalRefs:
  - European drone supply is fragmented across borders
  sourceRefs:
  - 2
- point: 欧洲无人机主权压力，使国防部和供应商比和平时期更愿意快速采用新的采购基础设施。
  signalRefs:
  - Drone sovereignty is now an explicit policy frame
  sourceRefs:
  - 3
differentiator: 市场平台帮助买方发现供应商，但并不解决供应商如何在分散的各国国防部之间实现采购就绪的问题。这家公司要掌握的是结构化证据层：标准化产品数据、可复用合规工件，以及与真实采购工作流相连、不断增长的互操作性结果库。这样可以在 OEM 投标团队中形成工作流锁定，并凭借不断积累的模板库、买方反馈和测试历史建立防御力。
