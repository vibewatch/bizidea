problem: 欧洲各国国防部都想更快买到无人机，但供应端分散在许多厂商手里，而且每个买方要的规格表、集成证明和合规叙事都不一样。对一家只有 50–200 人的无人机 OEM 来说，每多卖进一个新国防部，就得临时拼一次定制化投标项目：PDF、表格和工程截图满天飞。结果是授标变慢、稀缺工程人力被拖进去，买方也更难相信这些互操作声明到底靠不靠谱。
targetUser:
  primary: 50–200 人规模欧洲小型无人机制造商的商务拓展或投标负责人
  secondary: 负责准备技术投标材料的产品或集成负责人
  buyer: 正在从单一本土国防部扩展到更多欧洲买方的无人机 OEM CEO 或销售副总裁
startupThesis:
  nonObviousInsight: 稀缺资产已经不只是无人机供给本身，更是那套能跨国防部流转、可直接进入软件化采购渠道的互操作证明材料。
  beachhead: 面向卖给 2–5 个国防部、且需要为多厂商采购平台反复生成上架资料包的欧洲 ISR 与 FPV 无人机 OEM，尤其是那些还要接入国防部指挥控制环境的团队。
  wedge: 一套可复用的数字化产品通行证，把某条无人机产品线的规格、战场案例、安全文件和集成测试结果，转成针对不同买方的招标包与上架材料。
  whyNowCatalyst: Intelic 推出 BASE，而且它既有国防部输入，又和 Nexus 指挥控制软件打通，这说明欧洲无人机采购正当下就往可互操作的软件流程迁移。
  ventureScalePath: 先从无人机供应商侧采购通行证切入，再扩到自主系统资质认证、共享测试框架、中标后的集成监测，最终变成连接 OEM、主承包商与国防部的数据底座。
solution: 产品接入无人机 OEM 现有的技术文档、手册、试验报告和安全资料，把它们整理成结构化能力目录。系统可以针对不同国防部生成买方定制回复包，保留可审计的版本历史，并在提交招标前标出缺失证据。一个轻量测试层会记录主流指挥控制与任务数据流程的兼容结果，让供应商拿出互操作证明，而不是只会嘴上说“能接”。时间一长，这个平台就会变成这条产品线在每个欧洲市场里，法律上、技术上、作战上究竟能承诺什么的系统记录。
goToMarketSeed:
  firstCustomer: 员工不到 200 人、已有一款 ISR 平台落地，并计划在未来 12 个月内向另外两个欧洲国防部投标的欧洲无人机 OEM
  buyingTrigger: 收到招标邀请、被要求上架采购平台，或被要求证明与国防部指定指挥软件兼容
  currentAlternative: 用 Word、Excel 手工写标书，辅以零散顾问支持和一次性集成演示
  switchingReason: 这套通行证能把已验证的技术证据在不同买方间反复复用，缩短投标周期，也比静态 PDF 给国防部更干净的互操作证明。
  pricingHypothesis: 按产品线收取年度 SaaS 费用，外加收费型互操作测试包与高级安全资料室席位
whyNow:
- point: 真实的软件采购平台已经出现，国防部现在可以横向比较多家无人机供应商，因此供应商数据必须从定制化材料变成结构化、可复用的资产。
  signalRefs:
  - 军事采购开始软件化
  sourceRefs:
  - 1
- point: 互操作性已经不再只是中标后的集成难题，而是直接前移到采购流程本身，机器可读的证明材料因此更值钱。
  signalRefs:
  - 互操作性正前移到采购环节
  sourceRefs:
  - 1
- point: 当 10 个国家的制造商挤进同一采购渠道，小型 OEM 就需要软件去把跨境技术证据做成统一口径。
  signalRefs:
  - 欧洲无人机供给跨境分散
  sourceRefs:
  - 2
- point: 欧洲在无人机主权上的压力，让国防部和供应商都比和平时期更愿意快速采用新的采购基础设施。
  signalRefs:
  - 无人机主权已成明确政策框架
  sourceRefs:
  - 3
differentiator: 市场平台解决的是买方发现供应商的问题，但它们并不替供应商完成“跨多个国防部把材料准备到可采购状态”的脏活。这家公司要拿下的是结构化证据层：统一口径的产品数据、可复用的合规材料，以及一套会越积越厚的互操作结果库，而且这些结果还直接连着真实采购流程。护城河来自 OEM 投标团队的流程锁定，以及模板库、买方反馈和测试历史不断累积后的复利。
