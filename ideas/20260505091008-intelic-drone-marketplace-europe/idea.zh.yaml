problem: 欧洲各国防部都想更快采购无人机，但供应端分散在许多制造商之间，而且每个买方要求的规格表、集成证据和合规表述都不一样。对一家 50-200 人的无人机 OEM 来说，每多卖进一个新国防部，几乎都要重新做一次定制化攻单项目：从 PDF、表格到工程截图，一样样拼出来。结果就是中标变慢、稀缺技术人力被抽走，买方也更难相信厂商口中的互操作能力。
targetUser:
  primary: 50-200 人欧洲小型无人机厂商中负责业务拓展或攻单的负责人
  secondary: 负责准备技术投标材料的产品或集成负责人
  buyer: 正从单一本土国防部扩展到更多欧洲买方的无人机 OEM 的 CEO 或销售副总裁
startupThesis:
  nonObviousInsight: 稀缺资产已经不只是无人机供给本身，而是能跨国防部、跨软件化采购渠道复用的“可采购互操作证据”。
  beachhead: 滩头市场是把 ISR 和 FPV 无人机卖给 2-5 个国防部、并需要为接入多供应商采购枢纽反复准备上架材料的欧洲 OEM，这些枢纽还会接入国防部使用的指挥控制环境。
  wedge: 一个可复用的数字化产品护照，把某款无人机平台的规格、战场参考、安保材料和集成测试结果，转成面向不同买方的投标包与上架包。
  whyNowCatalyst: Intelic 推出 BASE，且平台是在国防部参与下建设、并与 Nexus 指挥控制软件打通，这说明欧洲无人机采购此刻正在转向可互操作的软件工作流。
  ventureScalePath: 先从无人机厂商侧的采购护照切入，再扩展到自主系统资质、共享测试工具、授标后的集成监测，最终成为连接 OEM、主承包商与国防部的数据底座。
solution: 产品接入无人机 OEM 现有的技术文档、手册、试验报告和安全材料，把它们整理成结构化能力目录。系统会按不同国防部的要求生成专属答复包，维护可审计的版本历史，并在投标提交前指出证据缺口。一个轻量测试层会记录常见指挥控制和任务数据工作流下的兼容性结果，让供应商拿出互操作证据，而不是只靠口头承诺。时间一长，这个平台就会成为每条产品线在各个欧洲市场里“法律上、技术上、作战上到底能承诺什么”的事实记录系统。
goToMarketSeed:
  firstCustomer: 一家欧洲无人机 OEM，员工少于 200 人，已有一款部署中的 ISR 平台，并计划在未来 12 个月内回应另外两个国防部的采购请求
  buyingTrigger: 收到投标邀请、被要求接入采购枢纽，或被要求证明与国防部选定指挥软件的兼容性
  currentAlternative: 用 Word 和 Excel 手工写标书，外加零散顾问支持和一次性的集成演示
  switchingReason: 采购护照能把验证过的技术证据在多个买方之间复用，缩短攻单周期，也能给国防部提供比静态 PDF 更清晰的互操作证明。
  pricingHypothesis: 按产品线收取年度 SaaS 费用，另加付费互操作测试包和高级安全数据室席位
whyNow:
  - point: 现在已经有真实的软件化市场让各国防部比较多家无人机厂商，所以供应商资料必须从“每次单独拼一套”变成“结构化且可复用”。
    signalRefs:
      - 军事采购正开始走向软件化
    sourceRefs:
      - 1
  - point: 互操作性已经不再只是授标后的集成问题，而是直接进入采购流程本身，因此机器可读的证明材料更值钱了。
    signalRefs:
      - 互操作性正前移到采购环节
    sourceRefs:
      - 1
  - point: 当来自 10 个国家的制造商进入同一购买渠道时，较小的 OEM 必须靠软件把跨境技术证据归一化。
    signalRefs:
      - 欧洲无人机供应链天然跨境且分散
    sourceRefs:
      - 2
  - point: 欧洲对无人机主权的压力，让国防部和供应商都比和平时期更愿意快速采用新的采购基础设施。
    signalRefs:
      - 无人机主权已经成为明确的政策框架
    sourceRefs:
      - 3
differentiator: 市场平台能帮买方发现供应商，但解决不了供应商一侧“怎样在碎片化国防部体系里准备好可采购材料”的工作。这家公司要占住的是结构化证据层：标准化产品数据、可复用的合规材料，以及不断积累、并与真实购买流程相连的互操作结果。这会在 OEM 的攻单团队里形成流程黏性，而防御性则来自持续增长的模板库、买方反馈和测试历史。
