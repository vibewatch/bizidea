jobsToBeDone:
- job: 当新的欧洲国防部要求我们让某条无人机产品线过资质时，帮投标团队把可复用的技术证据和互操作证明快速拼齐，这样我们就能更快提交材料，而不必每次都把工程师拖进整套投标流程。
  currentAlternative: 用 Word、Excel、共享盘和外部顾问手工整理材料
  successMetric: 产出可提交材料包所需天数，以及跨投标复用的证据占比
ideaScorecard:
  signalStrength:
    score: 5
    rationale: 这个信号簇点名了真实产品发布、明确的国防部买方，以及一个具体采购瓶颈。
  painIntensity:
    score: 5
    rationale: 赢下跨国国防订单对 OEM 几乎是生死线，而且今天还在大量吞噬稀缺技术人力。
  wedgeClarity:
    score: 5
    rationale: 采购通行证是个很窄的首个流程，用户、触发条件和节省时间都很清楚。
  defensibility:
    score: 4
    rationale: 数据标准化模板、买方专属证据历史和互操作测试结果，会随着时间持续累积。
  ventureScale:
    score: 4
    rationale: 这个滩头可以从无人机扩到更广泛的自主系统资质认证和国防采购基础设施。
topRisks:
- name: 国防部要求始终过于定制化
  description: 如果每个国防部都坚持自己的文档格式和审查逻辑，标准化带来的价值可能会比预期小。
  mitigation: 先拿下会重复出现的那 60–80% 供应商证据，再叠加国家专属模板，并在前几个市场里配合服务式落地。
- name: 平台方或主承包商把功能打包进去
  description: 采购平台或大型国防集成商，完全可能补上一层基础的供应商文档工具。
  mitigation: 在任何单一平台形成锁定前，先把自己做成横跨多个平台和指挥软件环境的中立系统记录层。
- name: 国防数据的信任门槛
  description: OEM 可能不愿把敏感技术资料上传到一家创业公司的系统里。
  mitigation: 提供 EU 托管和本地部署选项、严格到字段级的权限控制，以及不存储涉密载荷数据的流程设计。
