jobsToBeDone:
- job: 当新的欧洲国防部要求我们为某款无人机平台完成资质准备时，帮助我们的投标团队整理可复用的技术与互操作性证据，以便他们能更快提交，而无需在每次投标时都把工程师拉进来。
  currentAlternative: 使用 Word、Excel、共享盘和外部顾问手工拼装文档
  successMetric: 生成可提交材料包所需天数，以及在不同投标之间被复用的证据比例
ideaScorecard:
  signalStrength:
    score: 5
    rationale: 该主题明确对应一项真实产品发布、国防部买方以及具体的采购瓶颈。
  painIntensity:
    score: 5
    rationale: 赢下跨国防务订单对 OEM 具有生存意义，而当前流程会消耗稀缺的技术人员。
  wedgeClarity:
    score: 5
    rationale: 采购通行证是一个狭窄的首个工作流，用户、触发器和可量化的时间节省都很清晰。
  defensibility:
    score: 4
    rationale: 数据标准化模板、面向买方的证据历史以及互操作性测试结果会随时间累积。
  ventureScale:
    score: 4
    rationale: 该滩头可从无人机扩展到更广泛的自主系统资质与国防采购基础设施。
topRisks:
- name: 国防部要求仍然过于定制化
  description: 如果每个国防部都继续保留独特的文档格式和评审逻辑，标准化的价值可能弱于预期。
  mitigation: 先覆盖可重复使用的 60-80% 供应商证据，再为首批市场叠加国家特定模板和服务辅助导入。
- name: 平台方或主承包商将该功能打包进来
  description: 采购枢纽或大型防务集成商可能会加入基础的供应商文档工具。
  mitigation: 在任何单一平台锁定市场之前，先作为跨多个枢纽和指挥软件环境的中立事实系统获胜。
- name: 防务数据的信任壁垒
  description: OEM 可能抗拒将敏感技术资料上传到一家初创公司的系统。
  mitigation: 提供欧盟托管和本地部署、严格的字段级权限，以及避免存储涉密载荷数据的工作流。
