jobsToBeDone:
  - job: 当新的欧洲国防部要求我们为某款无人机平台做资格审核时，帮攻单团队把可复用的技术证据和互操作证据快速拼出来，这样我们就能更快提交材料，而不用每次都把工程团队卷进来。
    currentAlternative: 用 Word、Excel、共享盘和外部顾问手工拼材料
    successMetric: 产出一份可提交材料包所需天数，以及不同投标之间的证据复用比例
ideaScorecard:
  signalStrength:
    score: 5
    rationale: 这个信号簇里既有真实的产品发布，也明确点出了国防部买方和具体采购瓶颈。
  painIntensity:
    score: 5
    rationale: 对 OEM 来说，赢下多国防务订单攸关生死，而这件事现在又会严重吞噬稀缺的技术人力。
  wedgeClarity:
    score: 5
    rationale: 采购护照是一个边界清晰的第一工作流，用户、触发条件和可衡量的时间节省都很明确。
  defensibility:
    score: 4
    rationale: 数据归一化模板、面向不同买方的证据历史和互操作测试结果会随着时间不断复利。
  ventureScale:
    score: 4
    rationale: 这个滩头市场可以从无人机扩展到更广泛的自主系统资质和防务采购基础设施。
topRisks:
  - name: 国防部要求仍然过于定制化
    description: 如果每个国防部始终坚持独特的文档格式和审核逻辑，标准化带来的价值可能会比预期弱。
    mitigation: 先抓住会重复出现的 60-80% 供应商证据，再叠加国家特定模板，并在最初几个市场用服务辅助 onboarding。
  - name: 平台方或主承包商把功能打包进去
    description: 采购枢纽或大型防务集成商可能会补上基础的供应商文档工具。
    mitigation: 在任何单一平台形成锁定前，先把自己做成横跨多个枢纽和指挥软件环境的中立事实记录系统。
  - name: 防务数据的信任门槛
    description: OEM 可能不愿把敏感技术材料上传到一家初创公司的系统里。
    mitigation: 提供 EU 托管和本地部署选项、严格的字段级权限，以及避免存储涉密载荷数据的工作流。