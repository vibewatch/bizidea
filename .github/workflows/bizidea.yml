# Scheduled daily Bizidea run.
#
# This workflow is intentionally a thin CI wrapper. The `Bizidea` agent owns
# orchestration: one News Triage scan, idea generation + dedupe, then parallel
# per-idea report pipelines when the Copilot runtime supports concurrent
# subagents. CI installs dependencies, invokes the orchestrator, validates, and
# commits any completed reports.
#
# Required secrets / setup:
# - COPILOT_PAT — PAT for a Copilot-licensed account; passed to the Copilot CLI.
# - BIZIDEA_PAT — PAT with repo write access for checkout/push and downstream deploy triggers.

name: Bizidea — triage, generate, and publish reports

on:
  # schedule: # Disabled; Cloudflare Worker handles scheduling.
  #   - cron: "0 7 * * *"
  workflow_dispatch:
    inputs:
      cap:
        description: "Max reports per run (1-5)"
        type: choice
        options:
          - "1"
          - "2"
          - "3"
          - "4"
          - "5"
        required: false
        default: "5"
      timeWindow:
        description: "Time window phrase (e.g. 'yesterday', 'last 7 days')"
        type: string
        required: false
        default: "yesterday"
      model:
        description: "Copilot model to use (effect is derived automatically)"
        type: choice
        options:
          - "gpt-5.4"
          - "claude-opus-4.6"
          - "claude-sonnet-4.6"
        required: false
        default: "gpt-5.4"

permissions:
  contents: write

concurrency:
  group: bizidea-daily
  cancel-in-progress: false

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    defaults:
      run:
        shell: bash
    steps:
      - name: Verify required secrets are present
        env:
          BIZIDEA_PAT: ${{ secrets.BIZIDEA_PAT }}
          COPILOT_PAT: ${{ secrets.COPILOT_PAT }}
        run: |
          set -euo pipefail
          missing=0
          if [ -z "${BIZIDEA_PAT:-}" ]; then
            echo "Missing required secret: BIZIDEA_PAT" >&2
            missing=1
          fi
          if [ -z "${COPILOT_PAT:-}" ]; then
            echo "Missing required secret: COPILOT_PAT" >&2
            missing=1
          fi
          exit "$missing"

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.BIZIDEA_PAT }}

      - name: Set up Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            website/package-lock.json

      - name: Install root dependencies
        run: npm ci --no-audit --no-fund

      - name: Install website dependencies
        working-directory: website
        run: npm ci --no-audit --no-fund

      - name: Install GitHub Copilot CLI
        run: npm install -g @github/copilot --no-audit --no-fund

      - name: Validate and resolve run inputs (cap, time window, model)
        id: inputs
        env:
          RAW_CAP: ${{ github.event.inputs.cap }}
          RAW_WINDOW: ${{ github.event.inputs.timeWindow }}
          RAW_MODEL: ${{ github.event.inputs.model }}
        run: |
          set -euo pipefail
          CAP="${RAW_CAP:-}"
          WINDOW="${RAW_WINDOW:-}"
          MODEL="${RAW_MODEL:-}"
          if [ -z "$CAP" ]; then CAP="5"; fi
          if [ -z "$WINDOW" ]; then WINDOW="yesterday"; fi
          if [ -z "$MODEL" ]; then MODEL="gpt-5.4"; fi
          if ! [[ "$CAP" =~ ^[1-5]$ ]]; then
            echo "Invalid cap '$CAP'; expected an integer from 1 to 5." >&2
            exit 2
          fi
          if [ "${#WINDOW}" -gt 80 ] || ! [[ "$WINDOW" =~ ^[A-Za-z0-9][A-Za-z0-9\ .,/_:+-]*$ ]]; then
            echo "Invalid timeWindow '$WINDOW'; use a short plain-text phrase like 'yesterday' or 'last 7 days'." >&2
            exit 2
          fi
          case "$MODEL" in
            gpt-5.4)          EFFECT="xhigh" ;;
            claude-opus-4.6)  EFFECT="high" ;;
            claude-sonnet-4.6) EFFECT="high" ;;
            *)
              echo "Invalid model '$MODEL'; allowed: gpt-5.4, claude-opus-4.6, claude-sonnet-4.6." >&2
              exit 2
              ;;
          esac
          echo "cap=$CAP" >> "$GITHUB_OUTPUT"
          echo "window=$WINDOW" >> "$GITHUB_OUTPUT"
          echo "model=$MODEL" >> "$GITHUB_OUTPUT"
          echo "effect=$EFFECT" >> "$GITHUB_OUTPUT"

      - name: Run Bizidea agent — triage → ideas → research → plan → model → report
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_PAT }}
        run: |
          set -euo pipefail
          copilot --yolo --no-ask-user --model "${{ steps.inputs.outputs.model }}" --effort "${{ steps.inputs.outputs.effect }}" --agent "Bizidea" -p "Run the full Bizidea pipeline for ${{ steps.inputs.outputs.window }}. topic: startup news. cap: ${{ steps.inputs.outputs.cap }}. Orchestrate all stages yourself: News Triage once, generate and dedupe ideas from selected clusters, then run each surviving idea through research -> business plan -> financial model -> reporter. Do not invoke Bizidea recursively. Delete duplicate or failed partial report folders before final validation. Do not run git add or git commit."

      - name: Normalize generated YAML (repair flow style and bare colons)
        working-directory: website
        run: npm run repair:yaml

      - name: Rebuild aggregate history index (ideas/_index.yaml)
        run: node scripts/ideas-index.mjs --strict

      - name: Validate all generated report folders
        run: npm run validate:all

      - name: Commit and push completed reports to main
        run: |
          set -euo pipefail
          git config user.name "bizidea-bot"
          git config user.email "bizidea-bot@users.noreply.github.com"
          git fetch origin "${{ github.ref_name }}"
          git rebase --autostash "origin/${{ github.ref_name }}"
          node scripts/ideas-index.mjs --strict
          git add ideas/
          if git diff --cached --quiet; then
            echo "No new reports today."
            exit 0
          fi
          STAMP="$(date -u +%F)"
          git commit -m "chore(ideas): daily run $STAMP"
          git push origin HEAD:${{ github.ref_name }}
