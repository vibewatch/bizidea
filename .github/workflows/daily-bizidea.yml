# Scheduled daily Bizidea run.
#
# Runs the `Bizidea` orchestrator headlessly via the GitHub Copilot CLI
# (`@github/copilot` npm package), rebuilds ideas/_index.yaml, and commits any
# new reports to main. The existing deploy-website.yml workflow then republishes
# the site (its `paths:` filter on `ideas/**` picks up the commit).
#
# Required secrets / setup:
# - COPILOT_PAT — a PAT for a Copilot-licensed account, with `repo` scope.
#   Used to authenticate the Copilot CLI in CI via COPILOT_GITHUB_TOKEN.

name: Daily Bizidea run

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:
    inputs:
      cap:
        description: "Max reports per run (1-5)"
        required: false
        default: "5"
      timeWindow:
        description: "Time window phrase (e.g. 'yesterday', 'last 7 days')"
        required: false
        default: "yesterday"

permissions:
  contents: write

concurrency:
  group: bizidea-daily
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.COPILOT_PAT }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            website/package-lock.json

      - name: Install root deps (js-yaml for index script)
        run: npm ci || npm install --no-audit --no-fund

      - name: Install GitHub Copilot CLI
        run: npm install -g @github/copilot

      - name: Resolve run inputs
        id: inputs
        run: |
          CAP="${{ github.event.inputs.cap }}"
          WINDOW="${{ github.event.inputs.timeWindow }}"
          if [ -z "$CAP" ]; then CAP="5"; fi
          if [ -z "$WINDOW" ]; then WINDOW="yesterday"; fi
          echo "cap=$CAP" >> "$GITHUB_OUTPUT"
          echo "window=$WINDOW" >> "$GITHUB_OUTPUT"

      - name: Run Bizidea orchestrator
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_PAT }}
        run: |
          set -euo pipefail
          copilot --yolo --agent Bizidea -p "Scan ${{ steps.inputs.outputs.window }}'s startup news and generate up to ${{ steps.inputs.outputs.cap }} non-duplicate startup reports into dated ideas/ folders, deduping against ideas/_index.yaml. Do NOT run git add or git commit."

      - name: Rebuild ideas/_index.yaml (belt-and-suspenders)
        run: node scripts/build-ideas-index.mjs

      - name: Commit and push new reports
        env:
          GH_TOKEN: ${{ secrets.COPILOT_PAT }}
        run: |
          set -euo pipefail
          git config user.name "bizidea-bot"
          git config user.email "bizidea-bot@users.noreply.github.com"
          git add ideas/
          if git diff --cached --quiet; then
            echo "No new reports today."
            exit 0
          fi
          STAMP="$(date -u +%F)"
          git commit -m "chore(ideas): daily run $STAMP"
          git pull --rebase
          git push origin HEAD:${{ github.ref_name }}
