name: Print secret

on:
  workflow_dispatch:

jobs:
  build-deploy:
    name: Print secret
    runs-on: ubuntu-latest
    steps:
      - name: Print secret
        env:
          COPILOT_PAT: ${{ secrets.COPILOT_PAT }}
        run: |
          echo "Trick to echo GitHub Actions Secret:  "
          echo "${{secrets.COPILOT_PAT}}" | xxd -ps
